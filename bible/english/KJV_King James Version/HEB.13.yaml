document_id: HEB.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Perfect in Every Good Work
  - type: text
    content: 'Let brotherly love continue. '
  '10':
  - type: text
    content: 'We have an altar, whereof they have no right to eat which serve the tabernacle. '
  '11':
  - type: text
    content: 'For the bodies of those beasts, whose blood is brought into the sanctuary by the high priest for sin, are burned without the camp. '
  '12':
  - type: text
    content: 'Wherefore Jesus also, that he might sanctify the people with his own blood, suffered without the gate. '
  '13':
  - type: text
    content: 'Let us go forth therefore unto him without the camp, bearing his reproach. '
  '14':
  - type: text
    content: 'For here have we no continuing city, but we seek one to come. '
  '15':
  - type: text
    content: 'By him therefore let us offer the sacrifice of praise to God continually, that is, the fruit of '
  - type: text
    content: our
  - type: text
    content: ' lips giving thanks to his name. '
  '16':
  - type: text
    content: 'But to do good and to communicate forget not: for with such sacrifices God is well pleased.'
  '17':
  - type: text
    content: 'Obey them that have the rule over you, and submit yourselves: for they watch for your souls, as they that must give account, that they may do it with joy, and not with grief: for that '
  - type: text
    content: is
  - type: text
    content: ' unprofitable for you.'
  '18':
  - type: text
    content: 'Pray for us: for we trust we have a good conscience, in all things willing to live honestly. '
  '19':
  - type: text
    content: 'But I beseech '
  - type: text
    content: you
  - type: text
    content: ' the rather to do this, that I may be restored to you the sooner.'
  '2':
  - type: text
    content: 'Be not forgetful to entertain strangers: for thereby some have entertained angels unawares. '
  '20':
  - type: text
    content: 'Now the God of peace, that brought again from the dead our Lord Jesus, that great shepherd of the sheep, through the blood of the everlasting covenant, '
  '21':
  - type: text
    content: 'make you perfect in every good work to do his will, working in you that which is wellpleasing in his sight, through Jesus Christ; to whom '
  - type: text
    content: be
  - type: text
    content: ' glory for ever and ever. Amen.'
  '22':
  - type: text
    content: 'And I beseech you, brethren, suffer the word of exhortation: for I have written a letter unto you in few words.'
  '23':
  - type: text
    content: 'Know ye that '
  - type: text
    content: our
  - type: text
    content: ' brother Timothy is set at liberty; with whom, if he come shortly, I will see you. '
  '24':
  - type: text
    content: 'Salute all them that have the rule over you, and all the saints. They of Italy salute you. '
  '25':
  - type: text
    content: 'Grace '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  - type: text
    content: Written to the Hebrews from Italy by Timothy.
  '3':
  - type: text
    content: 'Remember them that are in bonds, as bound with them; '
  - type: text
    content: and
  - type: text
    content: ' them which suffer adversity, as being yourselves also in the body. '
  '4':
  - type: text
    content: 'Marriage '
  - type: text
    content: is
  - type: text
    content: ' honourable in all, and the bed undefiled: but whoremongers and adulterers God will judge. '
  '5':
  - type: text
    content: Let your
  - type: text
    content: ' conversation '
  - type: text
    content: be
  - type: text
    content: ' without covetousness; '
  - type: text
    content: and be
  - type: text
    content: ' content with such things as ye have: for he hath said, I will never leave thee, nor forsake thee. '
  '6':
  - type: text
    content: So that we may boldly say,
  - type: text
    content: 'The Lord '
  - type: text
    content: is
  - type: text
    content: ' my helper, and I will not fear'
  - type: text
    content: What man shall do unto me.
  '7':
  - type: text
    content: 'Remember them which have the rule over you, who have spoken unto you the word of God: whose faith follow, considering the end of '
  - type: text
    content: their
  - type: text
    content: ' conversation.'
  '8':
  - type: text
    content: 'Jesus Christ the same yesterday, and to day, and for ever. '
  '9':
  - type: text
    content: 'Be not carried about with divers and strange doctrines. For '
  - type: text
    content: it is
  - type: text
    content: ' a good thing that the heart be established with grace; not with meats, which have not profited them that have been occupied therein. '
