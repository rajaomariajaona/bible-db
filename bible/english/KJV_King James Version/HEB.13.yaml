document_id: HEB.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Perfect in Every Good Work
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Let brotherly love continue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'We have an altar, whereof they have no right to eat which serve the tabernacle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the bodies of those beasts, whose blood is brought into the sanctuary by the high priest for sin, are burned without the camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Wherefore Jesus also, that he might sanctify the people with his own blood, suffered without the gate. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Let us go forth therefore unto him without the camp, bearing his reproach. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For here have we no continuing city, but we seek one to come. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'By him therefore let us offer the sacrifice of praise to God continually, that is, the fruit of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' lips giving thanks to his name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But to do good and to communicate forget not: for with such sacrifices God is well pleased.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Obey them that have the rule over you, and submit yourselves: for they watch for your souls, as they that must give account, that they may do it with joy, and not with grief: for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unprofitable for you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pray for us: for we trust we have a good conscience, in all things willing to live honestly. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But I beseech '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' the rather to do this, that I may be restored to you the sooner.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Be not forgetful to entertain strangers: for thereby some have entertained angels unawares. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now the God of peace, that brought again from the dead our Lord Jesus, that great shepherd of the sheep, through the blood of the everlasting covenant, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'make you perfect in every good work to do his will, working in you that which is wellpleasing in his sight, through Jesus Christ; to whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' glory for ever and ever. Amen.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And I beseech you, brethren, suffer the word of exhortation: for I have written a letter unto you in few words.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Know ye that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' brother Timothy is set at liberty; with whom, if he come shortly, I will see you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Salute all them that have the rule over you, and all the saints. They of Italy salute you. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Grace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you all. Amen.'
  - type: usfm
    marker: iex
    children:
    - type: text
      text: Written to the Hebrews from Italy by Timothy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Remember them that are in bonds, as bound with them; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' them which suffer adversity, as being yourselves also in the body. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Marriage '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' honourable in all, and the bed undefiled: but whoremongers and adulterers God will judge. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: add
      children:
      - type: text
        text: Let your
    - type: text
      text: ' conversation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' without covetousness; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and be
    - type: text
      text: ' content with such things as ye have: for he hath said, I will never leave thee, nor forsake thee. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So that we may boldly say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my helper, and I will not fear'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What man shall do unto me.
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Remember them which have the rule over you, who have spoken unto you the word of God: whose faith follow, considering the end of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' conversation.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jesus Christ the same yesterday, and to day, and for ever. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Be not carried about with divers and strange doctrines. For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a good thing that the heart be established with grace; not with meats, which have not profited them that have been occupied therein. '
