document_id: EST.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'On that night could not the king sleep, and he commanded to bring the book of records of the chronicles; and they were read before the king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the king said to Haman, Make haste, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' take the apparel and the horse, as thou hast said, and do even so to Mordecai the Jew, that sitteth at the king''s gate: let nothing fail of all that thou hast spoken. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then took Haman the apparel and the horse, and arrayed Mordecai, and brought him on horseback through the street of the city, and proclaimed before him, Thus shall it be done unto the man whom the king delighteth to honour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Mordecai came again to the king''s gate. But Haman hasted to his house mourning, and having his head covered. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Haman told Zeresh his wife and all his friends every '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' that had befallen him. Then said his wise men and Zeresh his wife unto him, If Mordecai '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' of the seed of the Jews, before whom thou hast begun to fall, thou shalt not prevail against him, but shalt surely fall before him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And while they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' yet talking with him, came the king''s chamberlains, and hasted to bring Haman unto the banquet that Esther had prepared.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And it was found written, that Mordecai had told of Bigthana and Teresh, two of the king''s chamberlains, the keepers of the door, who sought to lay hand on the king Ahasuerus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And the king said, What honour and dignity hath been done to Mordecai for this? Then said the king's servants that ministered unto him, There is nothing done for him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the king said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the court? Now Haman was come into the outward court of the king''s house, to speak unto the king to hang Mordecai on the gallows that he had prepared for him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the king''s servants said unto him, Behold, Haman standeth in the court. And the king said, Let him come in. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Haman came in. And the king said unto him, What shall be done unto the man whom the king delighteth to honour? Now Haman thought in his heart, To whom would the king delight to do honour more than to myself? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Haman answered the king, For the man whom the king delighteth to honour, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'let the royal apparel be brought which the king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: useth
    - type: text
      text: ' to wear, and the horse that the king rideth upon, and the crown royal which is set upon his head: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and let this apparel and horse be delivered to the hand of one of the king''s most noble princes, that they may array the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: withal
    - type: text
      text: ' whom the king delighteth to honour, and bring him on horseback through the street of the city, and proclaim before him, Thus shall it be done to the man whom the king delighteth to honour.'
