document_id: EZK.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Eagle and the Cedar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Yea, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' planted, shall it prosper? shall it not utterly wither, when the east wind toucheth it? it shall wither in the furrows where it grew.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Moreover the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Say now to the rebellious house, Know ye not what these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things mean?
    - type: text
      text: ' tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', Behold, the king of Babylon is come to Jerusalem, and hath taken the king thereof, and the princes thereof, and led them with him to Babylon; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and hath taken of the king''s seed, and made a covenant with him, and hath taken an oath of him: he hath also taken the mighty of the land: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'that the kingdom might be base, that it might not lift itself up, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' that by keeping of his covenant it might stand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But he rebelled against him in sending his ambassadors into Egypt, that they might give him horses and much people. Shall he prosper? shall he escape that doeth such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things?
    - type: text
      text: ' or shall he break the covenant, and be delivered? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' I live, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', surely in the place '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where
    - type: text
      text: ' the king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: dwelleth
    - type: text
      text: ' that made him king, whose oath he despised, and whose covenant he brake, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' with him in the midst of Babylon he shall die. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Neither shall Pharaoh with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mighty army and great company make for him in the war, by casting up mounts, and building forts, to cut off many persons: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'seeing he despised the oath by breaking the covenant, when, lo, he had given his hand, and hath done all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', he shall not escape. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' I live, surely mine oath that he hath despised, and my covenant that he hath broken, even it will I recompense upon his own head. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Son of man, put forth a riddle, and speak a parable unto the house of Israel; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And I will spread my net upon him, and he shall be taken in my snare, and I will bring him to Babylon, and will plead with him there for his trespass that he hath trespassed against me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And all his fugitives with all his bands shall fall by the sword, and they that remain shall be scattered toward all winds: and ye shall know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I will also take of the highest branch of the high cedar, and will set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; I will crop off from the top of his young twigs a tender one, and will plant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon an high mountain and eminent: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'in the mountain of the height of Israel will I plant it: and it shall bring forth boughs, and bear fruit, and be a goodly cedar: and under it shall dwell all fowl of every wing; in the shadow of the branches thereof shall they dwell. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And all the trees of the field shall know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have brought down the high tree, have exalted the low tree, have dried up the green tree, and have made the dry tree to flourish: I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have spoken and have done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; A great eagle with great wings, longwinged, full of feathers, which had divers colours, came unto Lebanon, and took the highest branch of the cedar: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'he cropped off the top of his young twigs, and carried it into a land of traffick; he set it in a city of merchants. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He took also of the seed of the land, and planted it in a fruitful field; he placed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' by great waters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' set it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a willow tree. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And it grew, and became a spreading vine of low stature, whose branches turned toward him, and the roots thereof were under him: so it became a vine, and brought forth branches, and shot forth sprigs.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'There was also another great eagle with great wings and many feathers: and, behold, this vine did bend her roots toward him, and shot forth her branches toward him, that he might water it by the furrows of her plantation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'It was planted in a good soil by great waters, that it might bring forth branches, and that it might bear fruit, that it might be a goodly vine. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Say thou, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Shall it prosper? shall he not pull up the roots thereof, and cut off the fruit thereof, that it wither? it shall wither in all the leaves of her spring, even without great power or many people to pluck it up by the roots thereof. '
