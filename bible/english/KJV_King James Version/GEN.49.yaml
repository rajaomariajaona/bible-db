document_id: GEN.49
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jacob's Blessing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jacob called unto his sons, and said, Gather yourselves together, that I may tell you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which shall befall you in the last days.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Gather yourselves together, and hear, ye sons of Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hearken unto Israel your father.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Reuben, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my firstborn, my might, and the beginning of my strength,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The excellency of dignity, and the excellency of power:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Unstable as water, thou shalt not excel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because thou wentest up to thy father's bed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then defiledst thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' he went up to my couch.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Simeon and Levi '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' brethren;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Instruments of cruelty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are in
  - type: text
    text: ' their habitations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O my soul, come not thou into their secret;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Unto their assembly, mine honour, be not thou united:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For in their anger they slew a man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in their selfwill they digged down a wall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' their anger, for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' fierce;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And their wrath, for it was cruel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will divide them in Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And scatter them in Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Judah, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art he
  - type: text
    text: ' whom thy brethren shall praise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the neck of thine enemies;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thy father's children shall bow down before thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a lion''s whelp:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the prey, my son, thou art gone up:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He stooped down, he couched as a lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as an old lion; who shall rouse him up?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The sceptre shall not depart from Judah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor a lawgiver from between his feet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until Shiloh come;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And unto him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' the gathering of the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Binding his foal unto the vine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his ass's colt unto the choice vine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He washed his garments in wine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his clothes in the blood of grapes:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'His eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' red with wine,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his teeth white with milk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Zebulun shall dwell at the haven of the sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' for an haven of ships;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his border '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' unto Zidon.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Issachar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a strong ass'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Couching down between two burdens:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he saw that rest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' good,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the land that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' pleasant;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bowed his shoulder to bear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And became a servant unto tribute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dan shall judge his people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As one of the tribes of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dan shall be a serpent by the way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: An adder in the path,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That biteth the horse heels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that his rider shall fall backward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I have waited for thy salvation, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Gad, a troop shall overcome him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he shall overcome at the last.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Out of Asher his bread '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' fat,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he shall yield royal dainties.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Naphtali '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a hind let loose:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He giveth goodly words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joseph '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a fruitful bough,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' a fruitful bough by a well;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Whose
  - type: text
    text: ' branches run over the wall:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The archers have sorely grieved him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And shot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at him
  - type: text
    text: ', and hated him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But his bow abode in strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the arms of his hands were made strong
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'By the hands of the mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' of Jacob;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '(From thence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the shepherd, the stone of Israel:)'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' by the God of thy father, who shall help thee;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by the Almighty, who shall bless thee
- type: usfm
  marker: q1
  children:
  - type: text
    text: With blessings of heaven above,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessings of the deep that lieth under,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Blessings of the breasts, and of the womb:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The blessings of thy father
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have prevailed above the blessings of my progenitors
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Unto the utmost bound of the everlasting hills:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shall be on the head of Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the crown of the head of him that was separate from his brethren.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Benjamin shall ravin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a wolf:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the morning he shall devour the prey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And at night he shall divide the spoil.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Death of Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the twelve tribes of Israel: and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' that their father spake unto them, and blessed them; every one according to his blessing he blessed them. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he charged them, and said unto them, I am to be gathered unto my people: bury me with my fathers in the cave that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the field of Ephron the Hittite, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'in the cave that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the field of Machpelah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Mamre, in the land of Canaan, which Abraham bought with the field of Ephron the Hittite for a possession of a buryingplace. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'There they buried Abraham and Sarah his wife; there they buried Isaac and Rebekah his wife; and there I buried Leah. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The purchase of the field and of the cave that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' therein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' from the children of Heth. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: And when Jacob had made an end of commanding his sons, he gathered up his feet into the bed, and yielded up the ghost, and was gathered unto his people.
