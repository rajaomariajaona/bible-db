document_id: GEN.49,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jacob's Blessing
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob called unto his sons, and said, Gather yourselves together, that I may tell you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which shall befall you in the last days.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sceptre shall not depart from Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor a lawgiver from between his feet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until Shiloh come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And unto him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' the gathering of the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Binding his foal unto the vine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his ass's colt unto the choice vine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He washed his garments in wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his clothes in the blood of grapes:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' red with wine,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his teeth white with milk.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zebulun shall dwell at the haven of the sea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' for an haven of ships;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his border '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' unto Zidon.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Issachar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a strong ass'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Couching down between two burdens:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he saw that rest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' good,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the land that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' pleasant;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And bowed his shoulder to bear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And became a servant unto tribute.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan shall judge his people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As one of the tribes of Israel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan shall be a serpent by the way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An adder in the path,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That biteth the horse heels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that his rider shall fall backward.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have waited for thy salvation, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Gad, a troop shall overcome him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he shall overcome at the last.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather yourselves together, and hear, ye sons of Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hearken unto Israel your father.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Out of Asher his bread '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' fat,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall yield royal dainties.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Naphtali '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a hind let loose:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He giveth goodly words.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fruitful bough,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' a fruitful bough by a well;'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Whose
    - type: text
      text: ' branches run over the wall:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The archers have sorely grieved him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And shot '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at him
    - type: text
      text: ', and hated him:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But his bow abode in strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the arms of his hands were made strong
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the hands of the mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' of Jacob;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '(From thence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the shepherd, the stone of Israel:)'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' by the God of thy father, who shall help thee;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by the Almighty, who shall bless thee
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With blessings of heaven above,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessings of the deep that lieth under,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessings of the breasts, and of the womb:'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The blessings of thy father
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have prevailed above the blessings of my progenitors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unto the utmost bound of the everlasting hills:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall be on the head of Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on the crown of the head of him that was separate from his brethren.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Benjamin shall ravin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a wolf:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning he shall devour the prey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And at night he shall divide the spoil.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Death of Jacob
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the twelve tribes of Israel: and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' that their father spake unto them, and blessed them; every one according to his blessing he blessed them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he charged them, and said unto them, I am to be gathered unto my people: bury me with my fathers in the cave that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the field of Ephron the Hittite, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Reuben, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my firstborn, my might, and the beginning of my strength,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The excellency of dignity, and the excellency of power:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in the cave that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the field of Machpelah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Mamre, in the land of Canaan, which Abraham bought with the field of Ephron the Hittite for a possession of a buryingplace. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There they buried Abraham and Sarah his wife; there they buried Isaac and Rebekah his wife; and there I buried Leah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The purchase of the field and of the cave that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' therein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' from the children of Heth. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when Jacob had made an end of commanding his sons, he gathered up his feet into the bed, and yielded up the ghost, and was gathered unto his people.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unstable as water, thou shalt not excel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because thou wentest up to thy father's bed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then defiledst thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' he went up to my couch.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Simeon and Levi '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' brethren;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Instruments of cruelty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are in
    - type: text
      text: ' their habitations.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my soul, come not thou into their secret;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unto their assembly, mine honour, be not thou united:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in their anger they slew a man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in their selfwill they digged down a wall.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' their anger, for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' fierce;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their wrath, for it was cruel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will divide them in Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And scatter them in Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Judah, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art he
    - type: text
      text: ' whom thy brethren shall praise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' in the neck of thine enemies;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thy father's children shall bow down before thee.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Judah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a lion''s whelp:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From the prey, my son, thou art gone up:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stooped down, he couched as a lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as an old lion; who shall rouse him up?
