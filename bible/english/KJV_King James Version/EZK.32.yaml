verses:
  '1':
  - type: heading
    content: Pharaoh's Doom
  - type: text
    content: 'And it came to pass in the twelfth year, in the twelfth month, in the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '10':
  - type: text
    content: 'Yea, I will make many people amazed at thee, and their kings shall be horribly afraid for thee, when I shall brandish my sword before them; and they shall tremble at '
  - type: text
    content: every
  - type: text
    content: ' moment, every man for his own life, in the day of thy fall.'
  '11':
  - type: text
    content: 'For thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; The sword of the king of Babylon shall come upon thee. '
  '12':
  - type: text
    content: 'By the swords of the mighty will I cause thy multitude to fall, the terrible of the nations, all of them: and they shall spoil the pomp of Egypt, and all the multitude thereof shall be destroyed. '
  '13':
  - type: text
    content: 'I will destroy also all the beasts thereof from beside the great waters; neither shall the foot of man trouble them any more, nor the hoofs of beasts trouble them. '
  '14':
  - type: text
    content: 'Then will I make their waters deep, and cause their rivers to run like oil, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'When I shall make the land of Egypt desolate, and the country shall be destitute of that whereof it was full, when I shall smite all them that dwell therein, then shall they know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the lamentation wherewith they shall lament her: the daughters of the nations shall lament her: they shall lament for her, '
  - type: text
    content: even
  - type: text
    content: ' for Egypt, and for all her multitude, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '17':
  - type: text
    content: 'It came to pass also in the twelfth year, in the fifteenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '18':
  - type: text
    content: 'Son of man, wail for the multitude of Egypt, and cast them down, '
  - type: text
    content: even
  - type: text
    content: ' her, and the daughters of the famous nations, unto the nether parts of the earth, with them that go down into the pit. '
  '19':
  - type: text
    content: 'Whom dost thou pass in beauty? go down, and be thou laid with the uncircumcised. '
  '2':
  - type: text
    content: 'Son of man, take up a lamentation for Pharaoh king of Egypt, and say unto him, Thou art like a young lion of the nations, and thou '
  - type: text
    content: art
  - type: text
    content: ' as a whale in the seas: and thou camest forth with thy rivers, and troubledst the waters with thy feet, and fouledst their rivers.'
  '20':
  - type: text
    content: 'They shall fall in the midst of '
  - type: text
    content: them that are
  - type: text
    content: ' slain by the sword: she is delivered to the sword: draw her and all her multitudes. '
  '21':
  - type: text
    content: 'The strong among the mighty shall speak to him out of the midst of hell with them that help him: they are gone down, they lie uncircumcised, slain by the sword.'
  '22':
  - type: text
    content: 'Asshur '
  - type: text
    content: is
  - type: text
    content: ' there and all her company: his graves '
  - type: text
    content: are
  - type: text
    content: ' about him: all of them slain, fallen by the sword: '
  '23':
  - type: text
    content: 'whose graves are set in the sides of the pit, and her company is round about her grave: all of them slain, fallen by the sword, which caused terror in the land of the living.'
  '24':
  - type: text
    content: 'There '
  - type: text
    content: is
  - type: text
    content: ' Elam and all her multitude round about her grave, all of them slain, fallen by the sword, which are gone down uncircumcised into the nether parts of the earth, which caused their terror in the land of the living; yet have they borne their shame with them that go down to the pit. '
  '25':
  - type: text
    content: 'They have set her a bed in the midst of the slain with all her multitude: her graves '
  - type: text
    content: are
  - type: text
    content: ' round about him: all of them uncircumcised, slain by the sword: though their terror was caused in the land of the living, yet have they borne their shame with them that go down to the pit: he is put in the midst of '
  - type: text
    content: them that be
  - type: text
    content: ' slain.'
  '26':
  - type: text
    content: 'There '
  - type: text
    content: is
  - type: text
    content: ' Meshech, Tubal, and all her multitude: her graves '
  - type: text
    content: are
  - type: text
    content: ' round about him: all of them uncircumcised, slain by the sword, though they caused their terror in the land of the living. '
  '27':
  - type: text
    content: 'And they shall not lie with the mighty '
  - type: text
    content: that are
  - type: text
    content: ' fallen of the uncircumcised, which are gone down to hell with their weapons of war: and they have laid their swords under their heads, but their iniquities shall be upon their bones, though '
  - type: text
    content: they were
  - type: text
    content: ' the terror of the mighty in the land of the living. '
  '28':
  - type: text
    content: 'Yea, thou shalt be broken in the midst of the uncircumcised, and shalt lie with '
  - type: text
    content: them that are
  - type: text
    content: ' slain with the sword. '
  '29':
  - type: text
    content: 'There '
  - type: text
    content: is
  - type: text
    content: ' Edom, her kings, and all her princes, which with their might are laid by '
  - type: text
    content: them that were
  - type: text
    content: ' slain by the sword: they shall lie with the uncircumcised, and with them that go down to the pit. '
  '3':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; I will therefore spread out my net over thee with a company of many people; and they shall bring thee up in my net. '
  '30':
  - type: text
    content: 'There '
  - type: text
    content: be
  - type: text
    content: ' the princes of the north, all of them, and all the Zidonians, which are gone down with the slain; with their terror they are ashamed of their might; and they lie uncircumcised with '
  - type: text
    content: them that be
  - type: text
    content: ' slain by the sword, and bear their shame with them that go down to the pit.'
  '31':
  - type: text
    content: 'Pharaoh shall see them, and shall be comforted over all his multitude, '
  - type: text
    content: even
  - type: text
    content: ' Pharaoh and all his army slain by the sword, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'For I have caused my terror in the land of the living: and he shall be laid in the midst of the uncircumcised with '
  - type: text
    content: them that are
  - type: text
    content: ' slain with the sword, '
  - type: text
    content: even
  - type: text
    content: ' Pharaoh and all his multitude, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '4':
  - type: text
    content: 'Then will I leave thee upon the land, I will cast thee forth upon the open field, and will cause all the fowls of the heaven to remain upon thee, and I will fill the beasts of the whole earth with thee. '
  '5':
  - type: text
    content: 'And I will lay thy flesh upon the mountains, and fill the valleys with thy height. '
  '6':
  - type: text
    content: 'I will also water with thy blood the land wherein thou swimmest, '
  - type: text
    content: even
  - type: text
    content: ' to the mountains; and the rivers shall be full of thee. '
  '7':
  - type: text
    content: 'And when I shall put thee out, I will cover the heaven, and make the stars thereof dark; I will cover the sun with a cloud, and the moon shall not give her light. '
  '8':
  - type: text
    content: 'All the bright lights of heaven will I make dark over thee, and set darkness upon thy land, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '9':
  - type: text
    content: 'I will also vex the hearts of many people, when I shall bring thy destruction among the nations, into the countries which thou hast not known. '
