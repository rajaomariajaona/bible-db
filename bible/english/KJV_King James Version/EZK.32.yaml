document_id: EZK.32,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pharaoh's Doom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the twelfth year, in the twelfth month, in the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, I will make many people amazed at thee, and their kings shall be horribly afraid for thee, when I shall brandish my sword before them; and they shall tremble at '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' moment, every man for his own life, in the day of thy fall.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; The sword of the king of Babylon shall come upon thee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By the swords of the mighty will I cause thy multitude to fall, the terrible of the nations, all of them: and they shall spoil the pomp of Egypt, and all the multitude thereof shall be destroyed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will destroy also all the beasts thereof from beside the great waters; neither shall the foot of man trouble them any more, nor the hoofs of beasts trouble them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then will I make their waters deep, and cause their rivers to run like oil, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I shall make the land of Egypt desolate, and the country shall be destitute of that whereof it was full, when I shall smite all them that dwell therein, then shall they know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the lamentation wherewith they shall lament her: the daughters of the nations shall lament her: they shall lament for her, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' for Egypt, and for all her multitude, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It came to pass also in the twelfth year, in the fifteenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, wail for the multitude of Egypt, and cast them down, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' her, and the daughters of the famous nations, unto the nether parts of the earth, with them that go down into the pit. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whom dost thou pass in beauty? go down, and be thou laid with the uncircumcised. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, take up a lamentation for Pharaoh king of Egypt, and say unto him, Thou art like a young lion of the nations, and thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' as a whale in the seas: and thou camest forth with thy rivers, and troubledst the waters with thy feet, and fouledst their rivers.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall fall in the midst of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' slain by the sword: she is delivered to the sword: draw her and all her multitudes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The strong among the mighty shall speak to him out of the midst of hell with them that help him: they are gone down, they lie uncircumcised, slain by the sword.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asshur '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' there and all her company: his graves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' about him: all of them slain, fallen by the sword: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whose graves are set in the sides of the pit, and her company is round about her grave: all of them slain, fallen by the sword, which caused terror in the land of the living.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Elam and all her multitude round about her grave, all of them slain, fallen by the sword, which are gone down uncircumcised into the nether parts of the earth, which caused their terror in the land of the living; yet have they borne their shame with them that go down to the pit. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have set her a bed in the midst of the slain with all her multitude: her graves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about him: all of them uncircumcised, slain by the sword: though their terror was caused in the land of the living, yet have they borne their shame with them that go down to the pit: he is put in the midst of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that be
    - type: text
      text: ' slain.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Meshech, Tubal, and all her multitude: her graves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about him: all of them uncircumcised, slain by the sword, though they caused their terror in the land of the living. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall not lie with the mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' fallen of the uncircumcised, which are gone down to hell with their weapons of war: and they have laid their swords under their heads, but their iniquities shall be upon their bones, though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they were
    - type: text
      text: ' the terror of the mighty in the land of the living. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, thou shalt be broken in the midst of the uncircumcised, and shalt lie with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' slain with the sword. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Edom, her kings, and all her princes, which with their might are laid by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that were
    - type: text
      text: ' slain by the sword: they shall lie with the uncircumcised, and with them that go down to the pit. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I will therefore spread out my net over thee with a company of many people; and they shall bring thee up in my net. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the princes of the north, all of them, and all the Zidonians, which are gone down with the slain; with their terror they are ashamed of their might; and they lie uncircumcised with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that be
    - type: text
      text: ' slain by the sword, and bear their shame with them that go down to the pit.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh shall see them, and shall be comforted over all his multitude, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' Pharaoh and all his army slain by the sword, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have caused my terror in the land of the living: and he shall be laid in the midst of the uncircumcised with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' slain with the sword, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' Pharaoh and all his multitude, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then will I leave thee upon the land, I will cast thee forth upon the open field, and will cause all the fowls of the heaven to remain upon thee, and I will fill the beasts of the whole earth with thee. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will lay thy flesh upon the mountains, and fill the valleys with thy height. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will also water with thy blood the land wherein thou swimmest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the mountains; and the rivers shall be full of thee. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I shall put thee out, I will cover the heaven, and make the stars thereof dark; I will cover the sun with a cloud, and the moon shall not give her light. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the bright lights of heaven will I make dark over thee, and set darkness upon thy land, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will also vex the hearts of many people, when I shall bring thy destruction among the nations, into the countries which thou hast not known. '
