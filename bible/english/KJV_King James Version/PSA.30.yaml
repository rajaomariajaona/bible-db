document_id: PSA.30,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Psalm '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Song '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at
    - type: text
      text: ' the dedication of the house of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will extol thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; for thou hast lifted me up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hast not made my foes to rejoice over me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and have mercy upon me:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', be thou my helper.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast turned for me my mourning into dancing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast put off my sackcloth, and girded me with gladness;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To the end that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' glory may sing praise to thee, and not be silent.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, I will give thanks unto thee for ever.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cried unto thee, and thou hast healed me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou hast brought up my soul from the grave:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast kept me alive, that I should not go down to the pit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O ye saints of his,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And give thanks at the remembrance of his holiness.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For his anger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth but
    - type: text
      text: ' a moment; in his favour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Weeping may endure for a night, but joy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cometh
    - type: text
      text: ' in the morning.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in my prosperity I said, I shall never be moved.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', by thy favour thou hast made my mountain to stand strong:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou didst hide thy face, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' I was troubled.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I cried to thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' I made supplication.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What profit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' in my blood,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I go down to the pit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall the dust praise thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall it declare thy truth?
