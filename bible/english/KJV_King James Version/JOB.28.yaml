document_id: JOB.28
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Surely there is a vein for the silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a place for gold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: where
  - type: text
    text: ' they fine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iron is taken out of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And brass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' molten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: out of
  - type: text
    text: ' the stone.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He setteth an end to darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And searcheth out all perfection:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The stones of darkness, and the shadow of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The flood breaketh out from the inhabitant;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even the waters
  - type: text
    text: ' forgotten of the foot:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are dried up, they are gone away from men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' the earth, out of it cometh bread:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And under it is turned up as it were fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The stones of it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the place of sapphires:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And it hath dust of gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a path which no fowl knoweth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And which the vulture''s eye hath not seen:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The lion's whelps have not trodden it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor the fierce lion passed by it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He putteth forth his hand upon the rock;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He overturneth the mountains by the roots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He cutteth out rivers among the rocks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his eye seeth every precious thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He bindeth the floods from overflowing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the thing that is
  - type: text
    text: ' hid bringeth he forth to light.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But where shall wisdom be found?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the place of understanding?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Man knoweth not the price thereof;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither is it found in the land of the living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The depth saith, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the sea saith, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not with me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: It cannot be gotten for gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither shall silver be weighed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the price thereof.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It cannot be valued with the gold of Ophir,
- type: usfm
  marker: q2
  children:
  - type: text
    text: With the precious onyx, or the sapphire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The gold and the crystal cannot equal it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the exchange of it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall not be for
  - type: text
    text: ' jewels of fine gold.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'No mention shall be made of coral, or of pearls:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For the price of wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' above rubies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The topaz of Ethiopia shall not equal it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither shall it be valued with pure gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Whence then cometh wisdom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the place of understanding?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Seeing it is hid from the eyes of all living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And kept close from the fowls of the air.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Destruction and death say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: We have heard the fame thereof with our ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: God understandeth the way thereof,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he knoweth the place thereof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For he looketh to the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' seeth under the whole heaven;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: To make the weight for the winds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he weigheth the waters by measure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When he made a decree for the rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a way for the lightning of the thunder:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then did he see it, and declare it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He prepared it, yea, and searched it out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And unto man he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Behold, the fear of the Lord, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wisdom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And to depart from evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' understanding.'
