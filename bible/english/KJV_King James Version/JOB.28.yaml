verses:
  '1':
  - type: text
    content: Surely there is a vein for the silver,
  - type: text
    content: 'And a place for gold '
  - type: text
    content: where
  - type: text
    content: ' they fine '
  - type: text
    content: it
  - type: text
    content: .
  '10':
  - type: text
    content: He cutteth out rivers among the rocks;
  - type: text
    content: And his eye seeth every precious thing.
  '11':
  - type: text
    content: He bindeth the floods from overflowing;
  - type: text
    content: 'And '
  - type: text
    content: the thing that is
  - type: text
    content: ' hid bringeth he forth to light.'
  '12':
  - type: text
    content: But where shall wisdom be found?
  - type: text
    content: 'And where '
  - type: text
    content: is
  - type: text
    content: ' the place of understanding?'
  '13':
  - type: text
    content: Man knoweth not the price thereof;
  - type: text
    content: Neither is it found in the land of the living.
  '14':
  - type: text
    content: 'The depth saith, It '
  - type: text
    content: is
  - type: text
    content: ' not in me:'
  - type: text
    content: 'And the sea saith, '
  - type: text
    content: It is
  - type: text
    content: ' not with me.'
  '15':
  - type: text
    content: It cannot be gotten for gold,
  - type: text
    content: 'Neither shall silver be weighed '
  - type: text
    content: for
  - type: text
    content: ' the price thereof.'
  '16':
  - type: text
    content: It cannot be valued with the gold of Ophir,
  - type: text
    content: With the precious onyx, or the sapphire.
  '17':
  - type: text
    content: 'The gold and the crystal cannot equal it:'
  - type: text
    content: 'And the exchange of it '
  - type: text
    content: shall not be for
  - type: text
    content: ' jewels of fine gold.'
  '18':
  - type: text
    content: 'No mention shall be made of coral, or of pearls:'
  - type: text
    content: 'For the price of wisdom '
  - type: text
    content: is
  - type: text
    content: ' above rubies.'
  '19':
  - type: text
    content: The topaz of Ethiopia shall not equal it,
  - type: text
    content: Neither shall it be valued with pure gold.
  '2':
  - type: text
    content: Iron is taken out of the earth,
  - type: text
    content: 'And brass '
  - type: text
    content: is
  - type: text
    content: ' molten '
  - type: text
    content: out of
  - type: text
    content: ' the stone.'
  '20':
  - type: text
    content: Whence then cometh wisdom?
  - type: text
    content: 'And where '
  - type: text
    content: is
  - type: text
    content: ' the place of understanding?'
  '21':
  - type: text
    content: Seeing it is hid from the eyes of all living,
  - type: text
    content: And kept close from the fowls of the air.
  '22':
  - type: text
    content: Destruction and death say,
  - type: text
    content: We have heard the fame thereof with our ears.
  '23':
  - type: text
    content: God understandeth the way thereof,
  - type: text
    content: And he knoweth the place thereof.
  '24':
  - type: text
    content: For he looketh to the ends of the earth,
  - type: text
    content: And
  - type: text
    content: ' seeth under the whole heaven;'
  '25':
  - type: text
    content: To make the weight for the winds;
  - type: text
    content: And he weigheth the waters by measure.
  '26':
  - type: text
    content: When he made a decree for the rain,
  - type: text
    content: 'And a way for the lightning of the thunder:'
  '27':
  - type: text
    content: Then did he see it, and declare it;
  - type: text
    content: He prepared it, yea, and searched it out.
  '28':
  - type: text
    content: And unto man he said,
  - type: text
    content: 'Behold, the fear of the Lord, that '
  - type: text
    content: is
  - type: text
    content: ' wisdom;'
  - type: text
    content: 'And to depart from evil '
  - type: text
    content: is
  - type: text
    content: ' understanding.'
  '3':
  - type: text
    content: He setteth an end to darkness,
  - type: text
    content: 'And searcheth out all perfection:'
  - type: text
    content: The stones of darkness, and the shadow of death.
  '4':
  - type: text
    content: The flood breaketh out from the inhabitant;
  - type: text
    content: Even the waters
  - type: text
    content: ' forgotten of the foot:'
  - type: text
    content: They are dried up, they are gone away from men.
  '5':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' the earth, out of it cometh bread:'
  - type: text
    content: And under it is turned up as it were fire.
  '6':
  - type: text
    content: 'The stones of it '
  - type: text
    content: are
  - type: text
    content: ' the place of sapphires:'
  - type: text
    content: And it hath dust of gold.
  '7':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' a path which no fowl knoweth,'
  - type: text
    content: 'And which the vulture''s eye hath not seen:'
  '8':
  - type: text
    content: The lion's whelps have not trodden it,
  - type: text
    content: Nor the fierce lion passed by it.
  '9':
  - type: text
    content: He putteth forth his hand upon the rock;
  - type: text
    content: He overturneth the mountains by the roots.
