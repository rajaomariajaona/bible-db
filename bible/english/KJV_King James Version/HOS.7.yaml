document_id: HOS.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Half-baked Cake
  - type: text
    content: 'When I would have healed Israel, then the iniquity of Ephraim was discovered, and the wickedness of Samaria: for they commit falsehood; and the thief cometh in, '
  - type: text
    content: and
  - type: text
    content: ' the troop of robbers spoileth without. '
  '10':
  - type: text
    content: 'And the pride of Israel testifieth to his face: and they do not return to the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, nor seek him for all this. '
  '11':
  - type: text
    content: 'Ephraim also is like a silly dove without heart: they call to Egypt, they go to Assyria. '
  '12':
  - type: text
    content: 'When they shall go, I will spread my net upon them; I will bring them down as the fowls of the heaven; I will chastise them, as their congregation hath heard. '
  '13':
  - type: text
    content: 'Woe unto them! for they have fled from me: destruction unto them! because they have transgressed against me: though I have redeemed them, yet they have spoken lies against me. '
  '14':
  - type: text
    content: 'And they have not cried unto me with their heart, when they howled upon their beds: they assemble themselves for corn and wine, '
  - type: text
    content: and
  - type: text
    content: ' they rebel against me. '
  '15':
  - type: text
    content: 'Though I have bound '
  - type: text
    content: and
  - type: text
    content: ' strengthened their arms, yet do they imagine mischief against me. '
  '16':
  - type: text
    content: 'They return, '
  - type: text
    content: but
  - type: text
    content: ' not to the most High: they are like a deceitful bow: their princes shall fall by the sword for the rage of their tongue: this '
  - type: text
    content: shall be
  - type: text
    content: ' their derision in the land of Egypt.'
  '2':
  - type: text
    content: 'And they consider not in their hearts '
  - type: text
    content: that
  - type: text
    content: ' I remember all their wickedness: now their own doings have beset them about; they are before my face. '
  '3':
  - type: text
    content: 'They make the king glad with their wickedness, and the princes with their lies. '
  '4':
  - type: text
    content: 'They '
  - type: text
    content: are
  - type: text
    content: ' all adulterers, as an oven heated by the baker, '
  - type: text
    content: who
  - type: text
    content: ' ceaseth from raising after he hath kneaded the dough, until it be leavened. '
  '5':
  - type: text
    content: 'In the day of our king the princes have made '
  - type: text
    content: him
  - type: text
    content: ' sick with bottles of wine; he stretched out his hand with scorners. '
  '6':
  - type: text
    content: 'For they have made ready their heart like an oven, whiles they lie in wait: their baker sleepeth all the night; in the morning it burneth as a flaming fire. '
  '7':
  - type: text
    content: 'They are all hot as an oven, and have devoured their judges; all their kings are fallen: '
  - type: text
    content: there is
  - type: text
    content: ' none among them that calleth unto me.'
  '8':
  - type: text
    content: 'Ephraim, he hath mixed himself among the people; Ephraim is a cake not turned. '
  '9':
  - type: text
    content: 'Strangers have devoured his strength, and he knoweth '
  - type: text
    content: it
  - type: text
    content: ' not: yea, gray hairs are here and there upon him, yet he knoweth not. '
