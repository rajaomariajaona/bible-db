document_id: HOS.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Half-baked Cake
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I would have healed Israel, then the iniquity of Ephraim was discovered, and the wickedness of Samaria: for they commit falsehood; and the thief cometh in, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the troop of robbers spoileth without. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the pride of Israel testifieth to his face: and they do not return to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, nor seek him for all this. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ephraim also is like a silly dove without heart: they call to Egypt, they go to Assyria. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they shall go, I will spread my net upon them; I will bring them down as the fowls of the heaven; I will chastise them, as their congregation hath heard. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe unto them! for they have fled from me: destruction unto them! because they have transgressed against me: though I have redeemed them, yet they have spoken lies against me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they have not cried unto me with their heart, when they howled upon their beds: they assemble themselves for corn and wine, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' they rebel against me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Though I have bound '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthened their arms, yet do they imagine mischief against me. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They return, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' not to the most High: they are like a deceitful bow: their princes shall fall by the sword for the rage of their tongue: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' their derision in the land of Egypt.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they consider not in their hearts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I remember all their wickedness: now their own doings have beset them about; they are before my face. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They make the king glad with their wickedness, and the princes with their lies. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all adulterers, as an oven heated by the baker, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' ceaseth from raising after he hath kneaded the dough, until it be leavened. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the day of our king the princes have made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' sick with bottles of wine; he stretched out his hand with scorners. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they have made ready their heart like an oven, whiles they lie in wait: their baker sleepeth all the night; in the morning it burneth as a flaming fire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are all hot as an oven, and have devoured their judges; all their kings are fallen: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none among them that calleth unto me.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ephraim, he hath mixed himself among the people; Ephraim is a cake not turned. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Strangers have devoured his strength, and he knoweth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not: yea, gray hairs are here and there upon him, yet he knoweth not. '
