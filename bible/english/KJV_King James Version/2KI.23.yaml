document_id: 2KI.23,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king sent, and they gathered unto him all the elders of Judah and of Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he defiled Topheth, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the valley of the children of Hinnom, that no man might make his son or his daughter to pass through the fire to Molech. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took away the horses that the kings of Judah had given to the sun, at the entering in of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', by the chamber of Nathan-melech the chamberlain, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the suburbs, and burned the chariots of the sun with fire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the altars that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on the top of the upper chamber of Ahaz, which the kings of Judah had made, and the altars which Manasseh had made in the two courts of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', did the king beat down, and brake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' down from thence, and cast the dust of them into the brook Kidron. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the high places that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before Jerusalem, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on the right hand of the mount of corruption, which Solomon the king of Israel had builded for Ashtoreth the abomination of the Zidonians, and for Chemosh the abomination of the Moabites, and for Milcom the abomination of the children of Ammon, did the king defile. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he brake in pieces the images, and cut down the groves, and filled their places with the bones of men.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the altar that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at Beth-el, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the high place which Jeroboam the son of Nebat, who made Israel to sin, had made, both that altar and the high place he brake down, and burned the high place, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' stamped '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' small to powder, and burned the grove. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as Josiah turned himself, he spied the sepulchres that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' there in the mount, and sent, and took the bones out of the sepulchres, and burned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' upon the altar, and polluted it, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' which the man of God proclaimed, who proclaimed these words.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, What title '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' that that I see? And the men of the city told him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' the sepulchre of the man of God, which came from Judah, and proclaimed these things that thou hast done against the altar of Beth-el. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Let him alone; let no man move his bones. So they let his bones alone, with the bones of the prophet that came out of Samaria. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the houses also of the high places that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the cities of Samaria, which the kings of Israel had made to provoke '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
    - type: text
      text: ' to anger, Josiah took away, and did to them according to all the acts that he had done in Beth-el. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king went up into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and all the men of Judah and all the inhabitants of Jerusalem with him, and the priests, and the prophets, and all the people, both small and great: and he read in their ears all the words of the book of the covenant which was found in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he slew all the priests of the high places that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' there upon the altars, and burned men''s bones upon them, and returned to Jerusalem.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king commanded all the people, saying, Keep the passover unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written in the book of this covenant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Surely there was not holden such a passover from the days of the judges that judged Israel, nor in all the days of the kings of Israel, nor of the kings of Judah; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but in the eighteenth year of king Josiah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wherein
    - type: text
      text: ' this passover was holden to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Jerusalem.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: workers with
    - type: text
      text: ' familiar spirits, and the wizards, and the images, and the idols, and all the abominations that were spied in the land of Judah and in Jerusalem, did Josiah put away, that he might perform the words of the law which were written in the book that Hilkiah the priest found in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And like unto him was there no king before him, that turned to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with all his heart, and with all his soul, and with all his might, according to all the law of Moses; neither after him arose there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' like him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notwithstanding the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' turned not from the fierceness of his great wrath, wherewith his anger was kindled against Judah, because of all the provocations that Manasseh had provoked him withal. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, I will remove Judah also out of my sight, as I have removed Israel, and will cast off this city Jerusalem which I have chosen, and the house of which I said, My name shall be there.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Josiah, and all that he did, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his days Pharaoh-nechoh king of Egypt went up against the king of Assyria to the river Euphrates: and king Josiah went against him; and he slew him at Megiddo, when he had seen him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king stood by a pillar, and made a covenant before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to walk after the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and to keep his commandments and his testimonies and his statutes with all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' heart and all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' soul, to perform the words of this covenant that were written in this book. And all the people stood to the covenant.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Josiah's Reforms
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And his servants carried him in a chariot dead from Megiddo, and brought him to Jerusalem, and buried him in his own sepulchre. And the people of the land took Jehoahaz the son of Josiah, and anointed him, and made him king in his father's stead.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jehoahaz
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoahaz '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and three years old when he began to reign; and he reigned three months in Jerusalem. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Hamutal, the daughter of Jeremiah of Libnah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to all that his fathers had done. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh-nechoh put him in bands at Riblah in the land of Hamath, that he might not reign in Jerusalem; and put the land to a tribute of an hundred talents of silver, and a talent of gold. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh-nechoh made Eliakim the son of Josiah king in the room of Josiah his father, and turned his name to Jehoiakim, and took Jehoahaz away: and he came to Egypt, and died there. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoiakim gave the silver and the gold to Pharaoh; but he taxed the land to give the money according to the commandment of Pharaoh: he exacted the silver and the gold of the people of the land, of every one according to his taxation, to give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto Pharaoh-nechoh.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiakim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and five years old when he began to reign; and he reigned eleven years in Jerusalem. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Zebudah, the daughter of Pedaiah of Rumah. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to all that his fathers had done.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king commanded Hilkiah the high priest, and the priests of the second order, and the keepers of the door, to bring forth out of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' all the vessels that were made for Baal, and for the grove, and for all the host of heaven: and he burned them without Jerusalem in the fields of Kidron, and carried the ashes of them unto Beth-el. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he put down the idolatrous priests, whom the kings of Judah had ordained to burn incense in the high places in the cities of Judah, and in the places round about Jerusalem; them also that burned incense unto Baal, to the sun, and to the moon, and to the planets, and to all the host of heaven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought out the grove from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', without Jerusalem, unto the brook Kidron, and burned it at the brook Kidron, and stamped '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' small to powder, and cast the powder thereof upon the graves of the children of the people. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brake down the houses of the sodomites, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' by the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', where the women wove hangings for the grove. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought all the priests out of the cities of Judah, and defiled the high places where the priests had burned incense, from Geba to Beer-sheba, and brake down the high places of the gates that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the entering in of the gate of Joshua the governor of the city, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on a man''s left hand at the gate of the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless the priests of the high places came not up to the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Jerusalem, but they did eat of the unleavened bread among their brethren. '
