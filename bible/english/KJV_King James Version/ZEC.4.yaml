verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Golden Candlestick
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the angel that talked with me came again, and waked me, as a man that is wakened out of his sleep, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For who hath despised the day of small things? for they shall rejoice, and shall see the plummet in the hand of Zerubbabel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' those seven; they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which run to and fro through the whole earth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then answered I, and said unto him, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these two olive trees upon the right '
    - type: usfm
      marker: add
      children:
      - type: text
        text: side
    - type: text
      text: ' of the candlestick and upon the left '
    - type: usfm
      marker: add
      children:
      - type: text
        text: side
    - type: text
      text: ' thereof? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I answered again, and said unto him, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be these
    - type: text
      text: ' two olive branches which through the two golden pipes empty the golden '
    - type: usfm
      marker: add
      children:
      - type: text
        text: oil
    - type: text
      text: ' out of themselves? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered me and said, Knowest thou not what these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be?
    - type: text
      text: ' And I said, No, my lord. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the two anointed ones, that stand by the Lord of the whole earth.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said unto me, What seest thou? And I said, I have looked, and behold a candlestick all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold, with a bowl upon the top of it, and his seven lamps thereon, and seven pipes to the seven lamps, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon the top thereof: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and two olive trees by it, one upon the right '
    - type: usfm
      marker: add
      children:
      - type: text
        text: side
    - type: text
      text: ' of the bowl, and the other upon the left '
    - type: usfm
      marker: add
      children:
      - type: text
        text: side
    - type: text
      text: ' thereof.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I answered and spake to the angel that talked with me, saying, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these, my lord? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel that talked with me answered and said unto me, Knowest thou not what these be? And I said, No, my lord. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he answered and spake unto me, saying, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Zerubbabel, saying, Not by might, nor by power, but by my spirit, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, O great mountain? before Zerubbabel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou shalt become
    - type: text
      text: ' a plain: and he shall bring forth the headstone '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof with
    - type: text
      text: ' shoutings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: crying
    - type: text
      text: ', Grace, grace unto it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hands of Zerubbabel have laid the foundation of this house; his hands shall also finish it; and thou shalt know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts hath sent me unto you. '
