  - type: text
    text: Joseph in Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Joseph was brought down to Egypt; and Potiphar, an officer of Pharaoh, captain of the guard, an Egyptian, bought him of the hands of the Ishmeelites, which had brought him down thither. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was with Joseph, and he was a prosperous man; and he was in the house of his master the Egyptian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And his master saw that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him, and that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made all that he did to prosper in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Joseph found grace in his sight, and he served him: and he made him overseer over his house, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he had he put into his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it came to pass from the time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he had made him overseer in his house, and over all that he had, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' blessed the Egyptian''s house for Joseph''s sake; and the blessing of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was upon all that he had in the house, and in the field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And he left all that he had in Joseph's hand; and he knew not ought he had, save the bread which he did eat. And Joseph was a goodly person, and well favoured.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it came to pass after these things, that his master''s wife cast her eyes upon Joseph; and she said, Lie with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But he refused, and said unto his master''s wife, Behold, my master wotteth not what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with me in the house, and he hath committed all that he hath to my hand; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none greater in this house than I; neither hath he kept back any thing from me but thee, because thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' his wife: how then can I do this great wickedness, and sin against God? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it came to pass, as she spake to Joseph day by day, that he hearkened not unto her, to lie by her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' to be with her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass about this time, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Joseph
  - type: text
    text: ' went into the house to do his business; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none of the men of the house there within. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And she caught him by his garment, saying, Lie with me: and he left his garment in her hand, and fled, and got him out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass, when she saw that he had left his garment in her hand, and was fled forth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'that she called unto the men of her house, and spake unto them, saying, See, he hath brought in an Hebrew unto us to mock us; he came in unto me to lie with me, and I cried with a loud voice: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and it came to pass, when he heard that I lifted up my voice and cried, that he left his garment with me, and fled, and got him out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And she laid up his garment by her, until his lord came home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And she spake unto him according to these words, saying, The Hebrew servant, which thou hast brought unto us, came in unto me to mock me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and it came to pass, as I lifted up my voice and cried, that he left his garment with me, and fled out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it came to pass, when his master heard the words of his wife, which she spake unto him, saying, After this manner did thy servant to me; that his wrath was kindled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Joseph''s master took him, and put him into the prison, a place where the king''s prisoners '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' bound: and he was there in the prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was with Joseph, and shewed him mercy, and gave him favour in the sight of the keeper of the prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the keeper of the prison committed to Joseph''s hand all the prisoners that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the prison; and whatsoever they did there, he was the doer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The keeper of the prison looked not to any thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was
  - type: text
    text: ' under his hand; because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was with him, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which he did, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to prosper.'
