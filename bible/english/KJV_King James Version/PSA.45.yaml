document_id: PSA.45,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician upon Shoshannim, for the sons of Korah, Maschil, A Song of loves.
  - type: text
    content: 'My heart is inditing a good matter:'
  - type: text
    content: 'I speak of the things which I have made touching the king:'
  - type: text
    content: 'My tongue '
  - type: text
    content: is
  - type: text
    content: The pen of a ready writer.
  '10':
  - type: text
    content: Hearken, O daughter, and consider, and incline thine ear;
  - type: text
    content: Forget also thine own people, and thy father's house;
  '11':
  - type: text
    content: 'So shall the king greatly desire thy beauty:'
  - type: text
    content: 'For he '
  - type: text
    content: is
  - type: text
    content: ' thy Lord; and worship thou him.'
  '12':
  - type: text
    content: 'And the daughter of Tyre '
  - type: text
    content: shall be there
  - type: text
    content: ' with a gift;'
  - type: text
    content: Even
  - type: text
    content: ' the rich among the people shall intreat thy favour.'
  '13':
  - type: text
    content: 'The king''s daughter '
  - type: text
    content: is
  - type: text
    content: ' all glorious within:'
  - type: text
    content: 'Her clothing '
  - type: text
    content: is
  - type: text
    content: ' of wrought gold.'
  '14':
  - type: text
    content: 'She shall be brought unto the king in raiment of needlework:'
  - type: text
    content: The virgins her companions that follow her shall be brought unto thee.
  '15':
  - type: text
    content: 'With gladness and rejoicing shall they be brought:'
  - type: text
    content: They shall enter into the king's palace.
  '16':
  - type: text
    content: Instead of thy fathers shall be thy children,
  - type: text
    content: Whom thou mayest make princes in all the earth.
  '17':
  - type: text
    content: 'I will make thy name to be remembered in all generations:'
  - type: text
    content: Therefore shall the people praise thee for ever and ever.
  '2':
  - type: text
    content: 'Thou art fairer than the children of men:'
  - type: text
    content: 'Grace is poured into thy lips: Therefore God hath blessed thee for ever.'
  '3':
  - type: text
    content: 'Gird thy sword upon '
  - type: text
    content: thy
  - type: text
    content: ' thigh, O '
  - type: text
    content: most
  - type: text
    content: ' mighty,'
  - type: text
    content: With thy glory and thy majesty.
  '4':
  - type: text
    content: And in thy majesty ride prosperously
  - type: text
    content: 'Because of truth and meekness '
  - type: text
    content: and
  - type: text
    content: ' righteousness; And thy right hand shall teach thee terrible things.'
  '5':
  - type: text
    content: 'Thine arrows '
  - type: text
    content: are
  - type: text
    content: ' sharp in the heart of the king''s enemies;'
  - type: text
    content: Whereby
  - type: text
    content: ' the people fall under thee.'
  '6':
  - type: text
    content: 'Thy throne, O God, '
  - type: text
    content: is
  - type: text
    content: ' for ever and ever:'
  - type: text
    content: 'The sceptre of thy kingdom '
  - type: text
    content: is
  - type: text
    content: ' a right sceptre.'
  '7':
  - type: text
    content: 'Thou lovest righteousness, and hatest wickedness:'
  - type: text
    content: Therefore God, thy God, hath anointed thee with the oil of gladness above thy fellows.
  '8':
  - type: text
    content: 'All thy garments '
  - type: text
    content: smell
  - type: text
    content: ' of myrrh, and aloes, '
  - type: text
    content: and
  - type: text
    content: ' cassia,'
  - type: text
    content: Out of the ivory palaces, whereby they have made thee glad.
  '9':
  - type: text
    content: 'Kings'' daughters '
  - type: text
    content: were
  - type: text
    content: ' among thy honourable women:'
  - type: text
    content: Upon thy right hand did stand the queen in gold of Ophir.
