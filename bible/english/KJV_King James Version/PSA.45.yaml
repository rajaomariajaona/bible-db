document_id: PSA.45,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician upon Shoshannim, for the sons of Korah, Maschil, A Song of loves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart is inditing a good matter:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I speak of the things which I have made touching the king:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The pen of a ready writer.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hearken, O daughter, and consider, and incline thine ear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forget also thine own people, and thy father's house;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So shall the king greatly desire thy beauty:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy Lord; and worship thou him.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the daughter of Tyre '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be there
    - type: text
      text: ' with a gift;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the rich among the people shall intreat thy favour.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The king''s daughter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' all glorious within:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her clothing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of wrought gold.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She shall be brought unto the king in raiment of needlework:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The virgins her companions that follow her shall be brought unto thee.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With gladness and rejoicing shall they be brought:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall enter into the king's palace.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of thy fathers shall be thy children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom thou mayest make princes in all the earth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will make thy name to be remembered in all generations:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore shall the people praise thee for ever and ever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou art fairer than the children of men:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Grace is poured into thy lips: Therefore God hath blessed thee for ever.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Gird thy sword upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' thigh, O '
    - type: usfm
      marker: add
      children:
      - type: text
        text: most
    - type: text
      text: ' mighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With thy glory and thy majesty.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in thy majesty ride prosperously
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because of truth and meekness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' righteousness; And thy right hand shall teach thee terrible things.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thine arrows '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' sharp in the heart of the king''s enemies;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Whereby
    - type: text
      text: ' the people fall under thee.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy throne, O God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for ever and ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The sceptre of thy kingdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a right sceptre.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou lovest righteousness, and hatest wickedness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore God, thy God, hath anointed thee with the oil of gladness above thy fellows.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All thy garments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: smell
    - type: text
      text: ' of myrrh, and aloes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' cassia,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of the ivory palaces, whereby they have made thee glad.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kings'' daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' among thy honourable women:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Upon thy right hand did stand the queen in gold of Ophir.
