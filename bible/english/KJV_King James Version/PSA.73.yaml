document_id: PSA.73,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Truly God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good to Israel,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' to such as are of a clean heart.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore his people return hither:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And waters of a full '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cup
    - type: text
      text: ' are wrung out to them.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And they say, How doth God know?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And is there knowledge in the most High?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Behold, these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the ungodly, who prosper in the world; they increase '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' riches.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Verily I have cleansed my heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' vain, and washed my hands in innocency.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For all the day long have I been plagued,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And chastened every morning.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: If I say, I will speak thus;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, I should offend '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' the generation of thy children.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When I thought to know this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' too painful for me;'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Until I went into the sanctuary of God;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Then
    - type: text
      text: ' understood I their end.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Surely thou didst set them in slippery places:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou castedst them down into destruction.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'How are they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: brought
    - type: text
      text: ' into desolation, as in a moment!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are utterly consumed with terrors.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: But as for me, my feet were almost gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My steps had well nigh slipped.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'As a dream when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' awaketh;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ', O Lord, when thou awakest, thou shalt despise their image.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Thus my heart was grieved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I was pricked in my reins.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So foolish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' I, and ignorant:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a beast before thee.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nevertheless I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' continually with thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou hast holden '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' by my right hand.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Thou shalt guide me with thy counsel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And afterward receive me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' glory.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Whom have I in heaven '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none upon earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I desire beside thee.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'My flesh and my heart faileth:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the strength of my heart, and my portion for ever.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For, lo, they that are far from thee shall perish:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast destroyed all them that go a whoring from thee.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' good for me to draw near to God: I have put my trust in the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may declare all thy works.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For I was envious at the foolish,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' I saw the prosperity of the wicked.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there are
    - type: text
      text: ' no bands in their death:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But their strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' firm.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not in trouble '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as other
    - type: text
      text: ' men;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither are they plagued like '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' men.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Therefore pride compasseth them about as a chain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Violence covereth them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a garment.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Their eyes stand out with fatness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have more than heart could wish.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'They are corrupt, and speak wickedly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: concerning
    - type: text
      text: ' oppression:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They speak loftily.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: They set their mouth against the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their tongue walketh through the earth.
