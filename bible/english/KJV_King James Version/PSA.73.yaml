verses:
  '1':
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: 'Truly God '
  - type: text
    content: is
  - type: text
    content: ' good to Israel,'
  - type: text
    content: Even
  - type: text
    content: ' to such as are of a clean heart.'
  '10':
  - type: text
    content: 'Therefore his people return hither:'
  - type: text
    content: 'And waters of a full '
  - type: text
    content: cup
  - type: text
    content: ' are wrung out to them.'
  '11':
  - type: text
    content: And they say, How doth God know?
  - type: text
    content: And is there knowledge in the most High?
  '12':
  - type: text
    content: 'Behold, these '
  - type: text
    content: are
  - type: text
    content: ' the ungodly, who prosper in the world; they increase '
  - type: text
    content: in
  - type: text
    content: ' riches.'
  '13':
  - type: text
    content: 'Verily I have cleansed my heart '
  - type: text
    content: in
  - type: text
    content: ' vain, and washed my hands in innocency.'
  '14':
  - type: text
    content: For all the day long have I been plagued,
  - type: text
    content: And chastened every morning.
  '15':
  - type: text
    content: If I say, I will speak thus;
  - type: text
    content: 'Behold, I should offend '
  - type: text
    content: against
  - type: text
    content: ' the generation of thy children.'
  '16':
  - type: text
    content: When I thought to know this,
  - type: text
    content: 'It '
  - type: text
    content: was
  - type: text
    content: ' too painful for me;'
  '17':
  - type: text
    content: Until I went into the sanctuary of God;
  - type: text
    content: Then
  - type: text
    content: ' understood I their end.'
  '18':
  - type: text
    content: 'Surely thou didst set them in slippery places:'
  - type: text
    content: Thou castedst them down into destruction.
  '19':
  - type: text
    content: 'How are they '
  - type: text
    content: brought
  - type: text
    content: ' into desolation, as in a moment!'
  - type: text
    content: They are utterly consumed with terrors.
  '2':
  - type: text
    content: But as for me, my feet were almost gone;
  - type: text
    content: My steps had well nigh slipped.
  '20':
  - type: text
    content: 'As a dream when '
  - type: text
    content: one
  - type: text
    content: ' awaketh;'
  - type: text
    content: So
  - type: text
    content: ', O Lord, when thou awakest, thou shalt despise their image.'
  '21':
  - type: text
    content: Thus my heart was grieved,
  - type: text
    content: And I was pricked in my reins.
  '22':
  - type: text
    content: 'So foolish '
  - type: text
    content: was
  - type: text
    content: ' I, and ignorant:'
  - type: text
    content: 'I was '
  - type: text
    content: as
  - type: text
    content: ' a beast before thee.'
  '23':
  - type: text
    content: 'Nevertheless I '
  - type: text
    content: am
  - type: text
    content: ' continually with thee:'
  - type: text
    content: 'Thou hast holden '
  - type: text
    content: me
  - type: text
    content: ' by my right hand.'
  '24':
  - type: text
    content: Thou shalt guide me with thy counsel,
  - type: text
    content: 'And afterward receive me '
  - type: text
    content: to
  - type: text
    content: ' glory.'
  '25':
  - type: text
    content: 'Whom have I in heaven '
  - type: text
    content: but thee?
  - type: text
    content: 'And '
  - type: text
    content: there is
  - type: text
    content: ' none upon earth '
  - type: text
    content: that
  - type: text
    content: ' I desire beside thee.'
  '26':
  - type: text
    content: 'My flesh and my heart faileth:'
  - type: text
    content: But
  - type: text
    content: ' God '
  - type: text
    content: is
  - type: text
    content: ' the strength of my heart, and my portion for ever.'
  '27':
  - type: text
    content: 'For, lo, they that are far from thee shall perish:'
  - type: text
    content: Thou hast destroyed all them that go a whoring from thee.
  '28':
  - type: text
    content: 'But '
  - type: text
    content: it is
  - type: text
    content: ' good for me to draw near to God: I have put my trust in the Lord '
  - type: text
    content: GOD
  - type: text
    content: ','
  - type: text
    content: That I may declare all thy works.
  '3':
  - type: text
    content: For I was envious at the foolish,
  - type: text
    content: When
  - type: text
    content: ' I saw the prosperity of the wicked.'
  '4':
  - type: text
    content: 'For '
  - type: text
    content: there are
  - type: text
    content: ' no bands in their death:'
  - type: text
    content: 'But their strength '
  - type: text
    content: is
  - type: text
    content: ' firm.'
  '5':
  - type: text
    content: 'They '
  - type: text
    content: are
  - type: text
    content: ' not in trouble '
  - type: text
    content: as other
  - type: text
    content: ' men;'
  - type: text
    content: 'Neither are they plagued like '
  - type: text
    content: other
  - type: text
    content: ' men.'
  '6':
  - type: text
    content: Therefore pride compasseth them about as a chain;
  - type: text
    content: 'Violence covereth them '
  - type: text
    content: as
  - type: text
    content: ' a garment.'
  '7':
  - type: text
    content: 'Their eyes stand out with fatness:'
  - type: text
    content: They have more than heart could wish.
  '8':
  - type: text
    content: 'They are corrupt, and speak wickedly '
  - type: text
    content: concerning
  - type: text
    content: ' oppression:'
  - type: text
    content: They speak loftily.
  '9':
  - type: text
    content: They set their mouth against the heavens,
  - type: text
    content: And their tongue walketh through the earth.
