  '1':
  - type: heading
    content: The Ten Virgins
  - type: text
    content: ' '
  - type: text
    content: Then shall the kingdom of heaven be likened unto ten virgins, which took their lamps, and went forth to meet the bridegroom.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And while they went to buy, the bridegroom came; and they that were ready went in with him to the marriage: and the door was shut.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: Afterward came also the other virgins, saying, Lord, Lord, open to us.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But he answered and said, Verily I say unto you, I know you not.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Watch therefore, for ye know neither the day nor the hour wherein the Son of man cometh.
  - type: heading
    content: The Talents
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'For '
  - type: text
    content: the kingdom of heaven is
  - type: text
    content: ' as a man travelling into a far country, '
  - type: text
    content: who
  - type: text
    content: ' called his own servants, and delivered unto them his goods.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: And unto one he gave five talents, to another two, and to another one; to every man according to his several ability; and straightway took his journey.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Then he that had received the five talents went and traded with the same, and made '
  - type: text
    content: them
  - type: text
    content: ' other five talents.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And likewise he that '
  - type: text
    content: had received
  - type: text
    content: ' two, he also gained other two.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: But he that had received one went and digged in the earth, and hid his lord's money.
  - type: text
    content: ' '
  '19':
  - type: text
    content: After a long time the lord of those servants cometh, and reckoneth with them.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And five of them were wise, and five '
  - type: text
    content: were
  - type: text
    content: ' foolish.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And so he that had received five talents came and brought other five talents, saying, Lord, thou deliveredst unto me five talents: behold, I have gained beside them five talents more.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'His lord said unto him, Well done, '
  - type: text
    content: thou
  - type: text
    content: ' good and faithful servant: thou hast been faithful over a few things, I will make thee ruler over many things: enter thou into the joy of thy lord.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'He also that had received two talents came and said, Lord, thou deliveredst unto me two talents: behold, I have gained two other talents beside them.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'His lord said unto him, Well done, good and faithful servant; thou hast been faithful over a few things, I will make thee ruler over many things: enter thou into the joy of thy lord.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Then he which had received the one talent came and said, Lord, I knew thee that thou art an hard man, reaping where thou hast not sown, and gathering where thou hast not strawed:'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'and I was afraid, and went and hid thy talent in the earth: lo, '
  - type: text
    content: there
  - type: text
    content: ' thou hast '
  - type: text
    content: that is
  - type: text
    content: ' thine.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'His lord answered and said unto him, '
  - type: text
    content: Thou
  - type: text
    content: ' wicked and slothful servant, thou knewest that I reap where I sowed not, and gather where I have not strawed:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'thou oughtest therefore to have put my money to the exchangers, and '
  - type: text
    content: then
  - type: text
    content: ' at my coming I should have received mine own with usury.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Take therefore the talent from him, and give '
  - type: text
    content: it
  - type: text
    content: ' unto him which hath ten talents.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'For unto every one that hath shall be given, and he shall have abundance: but from him that hath not shall be taken away even that which he hath.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'They that '
  - type: text
    content: were
  - type: text
    content: ' foolish took their lamps, and took no oil with them:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And cast ye the unprofitable servant into outer darkness: there shall be weeping and gnashing of teeth.'
  - type: heading
    content: The Judgement
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'When the Son of man shall come in his glory, and all the holy angels with him, then shall he sit upon the throne of his glory:'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'and before him shall be gathered all nations: and he shall separate them one from another, as a shepherd divideth '
  - type: text
    content: his
  - type: text
    content: ' sheep from the goats:'
  - type: text
    content: ' '
  '33':
  - type: text
    content: and he shall set the sheep on his right hand, but the goats on the left.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Then shall the King say unto them on his right hand, Come, ye blessed of my Father, inherit the kingdom prepared for you from the foundation of the world:'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'for I was an hungred, and ye gave me meat: I was thirsty, and ye gave me drink: I was a stranger, and ye took me in:'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'naked, and ye clothed me: I was sick, and ye visited me: I was in prison, and ye came unto me.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Then shall the righteous answer him, saying, Lord, when saw we thee an hungred, and fed '
  - type: text
    content: thee
  - type: text
    content: '? or thirsty, and gave '
  - type: text
    content: thee
  - type: text
    content: ' drink?'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'When saw we thee a stranger, and took '
  - type: text
    content: thee
  - type: text
    content: ' in? or naked, and clothed '
  - type: text
    content: thee
  - type: text
    content: '?'
  - type: text
    content: ' '
  '39':
  - type: text
    content: Or when saw we thee sick, or in prison, and came unto thee?
  - type: text
    content: ' '
  '4':
  - type: text
    content: but the wise took oil in their vessels with their lamps.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And the King shall answer and say unto them, Verily I say unto you, Inasmuch as ye have done '
  - type: text
    content: it
  - type: text
    content: ' unto one of the least of these my brethren, ye have done '
  - type: text
    content: 'it '
  - type: text
    content: unto me.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Then shall he say also unto them on the left hand, Depart from me, ye cursed, into everlasting fire, prepared for the devil and his angels:'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'for I was an hungred, and ye gave me no meat: I was thirsty, and ye gave me no drink:'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'I was a stranger, and ye took me not in: naked, and ye clothed me not: sick, and in prison, and ye visited me not.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: Then shall they also answer him, saying, Lord, when saw we thee an hungred, or athirst, or a stranger, or naked, or sick, or in prison, and did not minister unto thee?
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then shall he answer them, saying, Verily I say unto you, Inasmuch as ye did '
  - type: text
    content: it
  - type: text
    content: ' not to one of the least of these, ye did '
  - type: text
    content: it
  - type: text
    content: ' not to me.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'And these shall go away into everlasting punishment: but the righteous into life eternal.'
  '5':
  - type: text
    content: While the bridegroom tarried, they all slumbered and slept.
  - type: text
    content: ' '
  '6':
  - type: text
    content: And at midnight there was a cry made, Behold, the bridegroom cometh; go ye out to meet him.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Then all those virgins arose, and trimmed their lamps.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And the foolish said unto the wise, Give us of your oil; for our lamps are gone out.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'But the wise answered, saying, '
  - type: text
    content: Not so
  - type: text
    content: '; lest there be not enough for us and you: but go ye rather to them that sell, and buy for yourselves.'
  - type: text
    content: ' '
