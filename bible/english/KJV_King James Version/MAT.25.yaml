document_id: MAT.25,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Ten Virgins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then shall the kingdom of heaven be likened unto ten virgins, which took their lamps, and went forth to meet the bridegroom.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And while they went to buy, the bridegroom came; and they that were ready went in with him to the marriage: and the door was shut.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Afterward came also the other virgins, saying, Lord, Lord, open to us.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But he answered and said, Verily I say unto you, I know you not.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Watch therefore, for ye know neither the day nor the hour wherein the Son of man cometh.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Talents
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For '
      - type: usfm
        marker: add
        children:
        - type: text
          text: the kingdom of heaven is
      - type: text
        text: ' as a man travelling into a far country, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: who
      - type: text
        text: ' called his own servants, and delivered unto them his goods.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And unto one he gave five talents, to another two, and to another one; to every man according to his several ability; and straightway took his journey.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then he that had received the five talents went and traded with the same, and made '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' other five talents.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And likewise he that '
      - type: usfm
        marker: add
        children:
        - type: text
          text: had received
      - type: text
        text: ' two, he also gained other two.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But he that had received one went and digged in the earth, and hid his lord's money.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: After a long time the lord of those servants cometh, and reckoneth with them.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And five of them were wise, and five '
      - type: usfm
        marker: add
        children:
        - type: text
          text: were
      - type: text
        text: ' foolish.'
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And so he that had received five talents came and brought other five talents, saying, Lord, thou deliveredst unto me five talents: behold, I have gained beside them five talents more.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'His lord said unto him, Well done, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thou
      - type: text
        text: ' good and faithful servant: thou hast been faithful over a few things, I will make thee ruler over many things: enter thou into the joy of thy lord.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He also that had received two talents came and said, Lord, thou deliveredst unto me two talents: behold, I have gained two other talents beside them.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'His lord said unto him, Well done, good and faithful servant; thou hast been faithful over a few things, I will make thee ruler over many things: enter thou into the joy of thy lord.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then he which had received the one talent came and said, Lord, I knew thee that thou art an hard man, reaping where thou hast not sown, and gathering where thou hast not strawed:'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and I was afraid, and went and hid thy talent in the earth: lo, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: there
      - type: text
        text: ' thou hast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that is
      - type: text
        text: ' thine.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'His lord answered and said unto him, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: Thou
      - type: text
        text: ' wicked and slothful servant, thou knewest that I reap where I sowed not, and gather where I have not strawed:'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'thou oughtest therefore to have put my money to the exchangers, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: then
      - type: text
        text: ' at my coming I should have received mine own with usury.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take therefore the talent from him, and give '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' unto him which hath ten talents.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For unto every one that hath shall be given, and he shall have abundance: but from him that hath not shall be taken away even that which he hath.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'They that '
      - type: usfm
        marker: add
        children:
        - type: text
          text: were
      - type: text
        text: ' foolish took their lamps, and took no oil with them:'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And cast ye the unprofitable servant into outer darkness: there shall be weeping and gnashing of teeth.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Judgement
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When the Son of man shall come in his glory, and all the holy angels with him, then shall he sit upon the throne of his glory:'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and before him shall be gathered all nations: and he shall separate them one from another, as a shepherd divideth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' sheep from the goats:'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he shall set the sheep on his right hand, but the goats on the left.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then shall the King say unto them on his right hand, Come, ye blessed of my Father, inherit the kingdom prepared for you from the foundation of the world:'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for I was an hungred, and ye gave me meat: I was thirsty, and ye gave me drink: I was a stranger, and ye took me in:'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'naked, and ye clothed me: I was sick, and ye visited me: I was in prison, and ye came unto me.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then shall the righteous answer him, saying, Lord, when saw we thee an hungred, and fed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thee
      - type: text
        text: '? or thirsty, and gave '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thee
      - type: text
        text: ' drink?'
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When saw we thee a stranger, and took '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thee
      - type: text
        text: ' in? or naked, and clothed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thee
      - type: text
        text: '?'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or when saw we thee sick, or in prison, and came unto thee?
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the wise took oil in their vessels with their lamps.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the King shall answer and say unto them, Verily I say unto you, Inasmuch as ye have done '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' unto one of the least of these my brethren, ye have done '
      - type: usfm
        marker: add
        children:
        - type: text
          text: 'it '
      - type: text
        text: unto me.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then shall he say also unto them on the left hand, Depart from me, ye cursed, into everlasting fire, prepared for the devil and his angels:'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for I was an hungred, and ye gave me no meat: I was thirsty, and ye gave me no drink:'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I was a stranger, and ye took me not in: naked, and ye clothed me not: sick, and in prison, and ye visited me not.'
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then shall they also answer him, saying, Lord, when saw we thee an hungred, or athirst, or a stranger, or naked, or sick, or in prison, and did not minister unto thee?
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then shall he answer them, saying, Verily I say unto you, Inasmuch as ye did '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' not to one of the least of these, ye did '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' not to me.'
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And these shall go away into everlasting punishment: but the righteous into life eternal.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: While the bridegroom tarried, they all slumbered and slept.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And at midnight there was a cry made, Behold, the bridegroom cometh; go ye out to meet him.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then all those virgins arose, and trimmed their lamps.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the foolish said unto the wise, Give us of your oil; for our lamps are gone out.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But the wise answered, saying, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: Not so
      - type: text
        text: '; lest there be not enough for us and you: but go ye rather to them that sell, and buy for yourselves.'
    - type: text
      text: ' '
