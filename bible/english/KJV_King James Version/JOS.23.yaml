document_id: JOS.23
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Joshua's Farewell
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass a long time after that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had given rest unto Israel from all their enemies round about, that Joshua waxed old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' stricken in age. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Joshua called for all Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' for their elders, and for their heads, and for their judges, and for their officers, and said unto them, I am old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' stricken in age: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and ye have seen all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath done unto all these nations because of you; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that hath fought for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, I have divided unto you by lot these nations that remain, to be an inheritance for your tribes, from Jordan, with all the nations that I have cut off, even unto the great sea westward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, he shall expel them from before you, and drive them from out of your sight; and ye shall possess their land, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath promised unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Be ye therefore very courageous to keep and to do all that is written in the book of the law of Moses, that ye turn not aside therefrom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the right hand or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the left; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'that ye come not among these nations, these that remain among you; neither make mention of the name of their gods, nor cause to swear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by them
  - type: text
    text: ', neither serve them, nor bow yourselves unto them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but cleave unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, as ye have done unto this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath driven out from before you great nations and strong: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' you, no man hath been able to stand before you unto this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'One man of you shall chase a thousand: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' that fighteth for you, as he hath promised you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Take good heed therefore unto yourselves, that ye love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Else if ye do in any wise go back, and cleave unto the remnant of these nations, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' these that remain among you, and shall make marriages with them, and go in unto them, and they to you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'know for a certainty that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God will no more drive out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any of
  - type: text
    text: ' these nations from before you; but they shall be snares and traps unto you, and scourges in your sides, and thorns in your eyes, until ye perish from off this good land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And, behold, this day I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' going the way of all the earth: and ye know in all your hearts and in all your souls, that not one thing hath failed of all the good things which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God spake concerning you; all are come to pass unto you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' not one thing hath failed thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' as all good things are come upon you, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God promised you; so shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bring upon you all evil things, until he have destroyed you from off this good land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath given you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When ye have transgressed the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, which he commanded you, and have gone and served other gods, and bowed yourselves to them; then shall the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be kindled against you, and ye shall perish quickly from off the good land which he hath given unto you.'
