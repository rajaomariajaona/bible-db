verses:
  '1':
  - type: heading
    content: Joshua's Farewell
  - type: text
    content: 'And it came to pass a long time after that the '
  - type: text
    content: LORD
  - type: text
    content: ' had given rest unto Israel from all their enemies round about, that Joshua waxed old '
  - type: text
    content: and
  - type: text
    content: ' stricken in age. '
  '10':
  - type: text
    content: 'One man of you shall chase a thousand: for the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, he '
  - type: text
    content: it is
  - type: text
    content: ' that fighteth for you, as he hath promised you. '
  '11':
  - type: text
    content: 'Take good heed therefore unto yourselves, that ye love the '
  - type: text
    content: LORD
  - type: text
    content: ' your God. '
  '12':
  - type: text
    content: 'Else if ye do in any wise go back, and cleave unto the remnant of these nations, '
  - type: text
    content: even
  - type: text
    content: ' these that remain among you, and shall make marriages with them, and go in unto them, and they to you: '
  '13':
  - type: text
    content: 'know for a certainty that the '
  - type: text
    content: LORD
  - type: text
    content: ' your God will no more drive out '
  - type: text
    content: any of
  - type: text
    content: ' these nations from before you; but they shall be snares and traps unto you, and scourges in your sides, and thorns in your eyes, until ye perish from off this good land which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath given you.'
  '14':
  - type: text
    content: 'And, behold, this day I '
  - type: text
    content: am
  - type: text
    content: ' going the way of all the earth: and ye know in all your hearts and in all your souls, that not one thing hath failed of all the good things which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God spake concerning you; all are come to pass unto you, '
  - type: text
    content: and
  - type: text
    content: ' not one thing hath failed thereof. '
  '15':
  - type: text
    content: 'Therefore it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' as all good things are come upon you, which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God promised you; so shall the '
  - type: text
    content: LORD
  - type: text
    content: ' bring upon you all evil things, until he have destroyed you from off this good land which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath given you. '
  '16':
  - type: text
    content: 'When ye have transgressed the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, which he commanded you, and have gone and served other gods, and bowed yourselves to them; then shall the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' be kindled against you, and ye shall perish quickly from off the good land which he hath given unto you.'
  '2':
  - type: text
    content: 'And Joshua called for all Israel, '
  - type: text
    content: and
  - type: text
    content: ' for their elders, and for their heads, and for their judges, and for their officers, and said unto them, I am old '
  - type: text
    content: and
  - type: text
    content: ' stricken in age: '
  '3':
  - type: text
    content: 'and ye have seen all that the '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath done unto all these nations because of you; for the '
  - type: text
    content: LORD
  - type: text
    content: ' your God '
  - type: text
    content: is
  - type: text
    content: ' he that hath fought for you. '
  '4':
  - type: text
    content: 'Behold, I have divided unto you by lot these nations that remain, to be an inheritance for your tribes, from Jordan, with all the nations that I have cut off, even unto the great sea westward. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, he shall expel them from before you, and drive them from out of your sight; and ye shall possess their land, as the '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath promised unto you. '
  '6':
  - type: text
    content: 'Be ye therefore very courageous to keep and to do all that is written in the book of the law of Moses, that ye turn not aside therefrom '
  - type: text
    content: to
  - type: text
    content: ' the right hand or '
  - type: text
    content: to
  - type: text
    content: ' the left; '
  '7':
  - type: text
    content: 'that ye come not among these nations, these that remain among you; neither make mention of the name of their gods, nor cause to swear '
  - type: text
    content: by them
  - type: text
    content: ', neither serve them, nor bow yourselves unto them: '
  '8':
  - type: text
    content: 'but cleave unto the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, as ye have done unto this day. '
  '9':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath driven out from before you great nations and strong: but '
  - type: text
    content: as for
  - type: text
    content: ' you, no man hath been able to stand before you unto this day. '
