document_id: DAN.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Also I in the first year of Darius the Mede, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, stood to confirm and to strengthen him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And now will I shew thee the truth. Behold, there shall stand up yet three kings in Persia; and the fourth shall be far richer than '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' all: and by his strength through his riches he shall stir up all against the realm of Grecia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And a mighty king shall stand up, that shall rule with great dominion, and do according to his will. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when he shall stand up, his kingdom shall be broken, and shall be divided toward the four winds of heaven; and not to his posterity, nor according to his dominion which he ruled: for his kingdom shall be plucked up, even for others beside those.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the king of the south shall be strong, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of his princes; and he shall be strong above him, and have dominion; his dominion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a great dominion. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And in the end of years they shall join themselves together; for the king''s daughter of the south shall come to the king of the north to make an agreement: but she shall not retain the power of the arm; neither shall he stand, nor his arm: but she shall be given up, and they that brought her, and he that begat her, and he that strengthened her in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But out of a branch of her roots shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' stand up in his estate, which shall come with an army, and shall enter into the fortress of the king of the north, and shall deal against them, and shall prevail: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and shall also carry captives into Egypt their gods, with their princes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' with their precious vessels of silver and of gold; and he shall continue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' years than the king of the north. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the king of the south shall come into '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' kingdom, and shall return into his own land. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But his sons shall be stirred up, and shall assemble a multitude of great forces: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' shall certainly come, and overflow, and pass through: then shall he return, and be stirred up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to his fortress. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the king of the south shall be moved with choler, and shall come forth and fight with him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' with the king of the north: and he shall set forth a great multitude; but the multitude shall be given into his hand. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' when he hath taken away the multitude, his heart shall be lifted up; and he shall cast down '
  - type: usfm
    marker: add
    children:
    - type: text
      text: many
  - type: text
    text: ' ten thousands: but he shall not be strengthened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the king of the north shall return, and shall set forth a multitude greater than the former, and shall certainly come after certain years with a great army and with much riches. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And in those times there shall many stand up against the king of the south: also the robbers of thy people shall exalt themselves to establish the vision; but they shall fall. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the king of the north shall come, and cast up a mount, and take the most fenced cities: and the arms of the south shall not withstand, neither his chosen people, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall there be any
  - type: text
    text: ' strength to withstand. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But he that cometh against him shall do according to his own will, and none shall stand before him: and he shall stand in the glorious land, which by his hand shall be consumed. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He shall also set his face to enter with the strength of his whole kingdom, and upright ones with him; thus shall he do: and he shall give him the daughter of women, corrupting her: but she shall not stand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on his side
  - type: text
    text: ', neither be for him. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'After this shall he turn his face unto the isles, and shall take many: but a prince for his own behalf shall cause the reproach offered by him to cease; without his own reproach he shall cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to turn upon him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then he shall turn his face toward the fort of his own land: but he shall stumble and fall, and not be found.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then shall stand up in his estate a raiser of taxes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the glory of the kingdom: but within few days he shall be destroyed, neither in anger, nor in battle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And in his estate shall stand up a vile person, to whom they shall not give the honour of the kingdom: but he shall come in peaceably, and obtain the kingdom by flatteries. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And with the arms of a flood shall they be overflown from before him, and shall be broken; yea, also the prince of the covenant. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And after the league '
  - type: usfm
    marker: add
    children:
    - type: text
      text: made
  - type: text
    text: ' with him he shall work deceitfully: for he shall come up, and shall become strong with a small people. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He shall enter peaceably even upon the fattest places of the province; and he shall do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which his fathers have not done, nor his fathers'' fathers; he shall scatter among them the prey, and spoil, and riches: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yea
  - type: text
    text: ', and he shall forecast his devices against the strong holds, even for a time. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he shall stir up his power and his courage against the king of the south with a great army; and the king of the south shall be stirred up to battle with a very great and mighty army; but he shall not stand: for they shall forecast devices against him. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Yea, they that feed of the portion of his meat shall destroy him, and his army shall overflow: and many shall fall down slain. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And both these kings'' hearts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' to do mischief, and they shall speak lies at one table; but it shall not prosper: for yet the end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' at the time appointed. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then shall he return into his land with great riches; and his heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' against the holy covenant; and he shall do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: exploits
  - type: text
    text: ', and return to his own land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'At the time appointed he shall return, and come toward the south; but it shall not be as the former, or as the latter. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For the ships of Chittim shall come against him: therefore he shall be grieved, and return, and have indignation against the holy covenant: so shall he do; he shall even return, and have intelligence with them that forsake the holy covenant. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And arms shall stand on his part, and they shall pollute the sanctuary of strength, and shall take away the daily '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ', and they shall place the abomination that maketh desolate. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And such as do wickedly against the covenant shall he corrupt by flatteries: but the people that do know their God shall be strong, and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: exploits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they that understand among the people shall instruct many: yet they shall fall by the sword, and by flame, by captivity, and by spoil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: many
  - type: text
    text: ' days. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now when they shall fall, they shall be holpen with a little help: but many shall cleave to them with flatteries. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of them of understanding shall fall, to try them, and to purge, and to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' white, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the time of the end: because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' yet for a time appointed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the king shall do according to his will; and he shall exalt himself, and magnify himself above every god, and shall speak marvellous things against the God of gods, and shall prosper till the indignation be accomplished: for that that is determined shall be done. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Neither shall he regard the God of his fathers, nor the desire of women, nor regard any god: for he shall magnify himself above all. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But in his estate shall he honour the God of forces: and a god whom his fathers knew not shall he honour with gold, and silver, and with precious stones, and pleasant things. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Thus shall he do in the most strong holds with a strange god, whom he shall acknowledge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' increase with glory: and he shall cause them to rule over many, and shall divide the land for gain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And at the time of the end shall the king of the south push at him: and the king of the north shall come against him like a whirlwind, with chariots, and with horsemen, and with many ships; and he shall enter into the countries, and shall overflow and pass over. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'He shall enter also into the glorious land, and many '
  - type: usfm
    marker: add
    children:
    - type: text
      text: countries
  - type: text
    text: ' shall be overthrown: but these shall escape out of his hand, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Edom, and Moab, and the chief of the children of Ammon. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'He shall stretch forth his hand also upon the countries: and the land of Egypt shall not escape. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But he shall have power over the treasures of gold and of silver, and over all the precious things of Egypt: and the Libyans and the Ethiopians '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' at his steps. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'But tidings out of the east and out of the north shall trouble him: therefore he shall go forth with great fury to destroy, and utterly to make away many. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: And he shall plant the tabernacles of his palace between the seas in the glorious holy mountain; yet he shall come to his end, and none shall help him.
