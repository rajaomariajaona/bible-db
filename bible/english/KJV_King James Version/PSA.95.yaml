  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O come, let us sing unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let us make a joyful noise to the rock of our salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let us come before his presence with thanksgiving,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And make a joyful noise unto him with psalms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a great God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a great King above all gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In his hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the deep places of the earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The strength of the hills '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his also.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The sea '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his, and he made it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his hands formed the dry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'O come, let us worship and bow down:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let us kneel before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our maker.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the people of his pasture, and the sheep of his hand.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To day if ye will hear his voice, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Harden not your heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As in the provocation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the day of temptation in the wilderness:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When your fathers tempted me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Proved me, and saw my work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Forty years long was I grieved with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' generation,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And said, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a people that do err in their heart, and they have not known my ways:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Unto whom I sware in my wrath
- type: usfm
  marker: q2
  children:
  - type: text
    text: That they should not enter into my rest.
