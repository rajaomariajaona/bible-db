  '1':
  - type: heading
    content: A Flying Roll
  - type: text
    content: 'Then I turned, and lifted up mine eyes, and looked, and behold a flying roll. '
  '10':
  - type: text
    content: 'Then said I to the angel that talked with me, Whither do these bear the ephah? '
  '11':
  - type: text
    content: 'And he said unto me, To build it an house in the land of Shinar: and it shall be established, and set there upon her own base.'
  '2':
  - type: text
    content: 'And he said unto me, What seest thou? And I answered, I see a flying roll; the length thereof '
  - type: text
    content: is
  - type: text
    content: ' twenty cubits, and the breadth thereof ten cubits. '
  '3':
  - type: text
    content: 'Then said he unto me, This '
  - type: text
    content: is
  - type: text
    content: ' the curse that goeth forth over the face of the whole earth: for every one that stealeth shall be cut off '
  - type: text
    content: as
  - type: text
    content: ' on this side according to it; and every one that sweareth shall be cut off '
  - type: text
    content: as
  - type: text
    content: ' on that side according to it.'
  '4':
  - type: text
    content: 'I will bring it forth, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and it shall enter into the house of the thief, and into the house of him that sweareth falsely by my name: and it shall remain in the midst of his house, and shall consume it with the timber thereof and the stones thereof.'
  - type: heading
    content: An Ephah and a Talent
  '5':
  - type: text
    content: 'Then the angel that talked with me went forth, and said unto me, Lift up now thine eyes, and see what '
  - type: text
    content: is
  - type: text
    content: ' this that goeth forth. '
  '6':
  - type: text
    content: 'And I said, What '
  - type: text
    content: is
  - type: text
    content: ' it? And he said, This '
  - type: text
    content: is
  - type: text
    content: ' an ephah that goeth forth. He said moreover, This '
  - type: text
    content: is
  - type: text
    content: ' their resemblance through all the earth. '
  '7':
  - type: text
    content: 'And, behold, there was lifted up a talent of lead: and this '
  - type: text
    content: is
  - type: text
    content: ' a woman that sitteth in the midst of the ephah. '
  '8':
  - type: text
    content: 'And he said, This '
  - type: text
    content: is
  - type: text
    content: ' wickedness. And he cast it into the midst of the ephah; and he cast the weight of lead upon the mouth thereof. '
  '9':
  - type: text
    content: 'Then lifted I up mine eyes, and looked, and, behold, there came out two women, and the wind '
  - type: text
    content: was
  - type: text
    content: ' in their wings; for they had wings like the wings of a stork: and they lifted up the ephah between the earth and the heaven. '
