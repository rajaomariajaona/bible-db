document_id: ZEC.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Flying Roll
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I turned, and lifted up mine eyes, and looked, and behold a flying roll. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said unto me, What seest thou? And I answered, I see a flying roll; the length thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' twenty cubits, and the breadth thereof ten cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then said he unto me, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the curse that goeth forth over the face of the whole earth: for every one that stealeth shall be cut off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' on this side according to it; and every one that sweareth shall be cut off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' on that side according to it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will bring it forth, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, and it shall enter into the house of the thief, and into the house of him that sweareth falsely by my name: and it shall remain in the midst of his house, and shall consume it with the timber thereof and the stones thereof.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Ephah and a Talent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the angel that talked with me went forth, and said unto me, Lift up now thine eyes, and see what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that goeth forth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I said, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it? And he said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an ephah that goeth forth. He said moreover, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their resemblance through all the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And, behold, there was lifted up a talent of lead: and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a woman that sitteth in the midst of the ephah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wickedness. And he cast it into the midst of the ephah; and he cast the weight of lead upon the mouth thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then lifted I up mine eyes, and looked, and, behold, there came out two women, and the wind '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in their wings; for they had wings like the wings of a stork: and they lifted up the ephah between the earth and the heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then said I to the angel that talked with me, Whither do these bear the ephah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said unto me, To build it an house in the land of Shinar: and it shall be established, and set there upon her own base.'
