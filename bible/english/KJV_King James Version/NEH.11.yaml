document_id: NEH.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inhabitants of Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rulers of the people dwelt at Jerusalem: the rest of the people also cast lots, to bring one of ten to dwell in Jerusalem the holy city, and nine parts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to dwell
    - type: text
      text: ' in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' cities. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the priests: Jedaiah the son of Joiarib, Jachin. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seraiah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the ruler of the house of God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their brethren that did the work of the house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' eight hundred twenty and two: and Adaiah the son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashur, the son of Malchiah, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his brethren, chief of the fathers, two hundred forty and two: and Amashai the son of Azareel, the son of Ahasai, the son of Meshillemoth, the son of Immer, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their brethren, mighty men of valour, an hundred twenty and eight: and their overseer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Zabdiel, the son of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one of
    - type: text
      text: ' the great men.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also of the Levites: Shemaiah the son of Hashub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Shabbethai and Jozabad, of the chief of the Levites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' the oversight of the outward business of the house of God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mattaniah the son of Micha, the son of Zabdi, the son of Asaph, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the principal to begin the thanksgiving in prayer: and Bakbukiah the second among his brethren, and Abda the son of Shammua, the son of Galal, the son of Jeduthun. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the Levites in the holy city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two hundred fourscore and four.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the porters, Akkub, Talmon, and their brethren that kept the gates, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' an hundred seventy and two.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: In Other Cities
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the people blessed all the men, that willingly offered themselves to dwell at Jerusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the residue of Israel, of the priests, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the Levites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in all the cities of Judah, every one in his inheritance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Nethinims dwelt in Ophel: and Ziha and Gispa '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' over the Nethinims.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The overseer also of the Levites at Jerusalem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Uzzi the son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Micha. Of the sons of Asaph, the singers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' over the business of the house of God. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' the king''s commandment concerning them, that a certain portion should be for the singers, due for every day. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pethahiah the son of Meshezabeel, of the children of Zerah the son of Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at the king''s hand in all matters concerning the people.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the villages, with their fields, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the children of Judah dwelt at Kirjath-arba, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the villages thereof, and at Dibon, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the villages thereof, and at Jekabzeel, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the villages thereof, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and at Jeshua, and at Moladah, and at Beth-phelet, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and at Hazar-shual, and at Beer-sheba, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the villages thereof, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and at Ziklag, and at Mekonah, and in the villages thereof, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and at En-rimmon, and at Zareah, and at Jarmuth, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the chief of the province that dwelt in Jerusalem: but in the cities of Judah dwelt every one in his possession in their cities, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to wit
    - type: text
      text: ', Israel, the priests, and the Levites, and the Nethinims, and the children of Solomon''s servants. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zanoah, Adullam, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' their villages, at Lachish, and the fields thereof, at Azekah, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the villages thereof. And they dwelt from Beer-sheba unto the valley of Hinnom. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children also of Benjamin from Geba '
    - type: usfm
      marker: add
      children:
      - type: text
        text: dwelt
    - type: text
      text: ' at Michmash, and Aija, and Beth-el, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' their villages, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' at Anathoth, Nob, Ananiah, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazor, Ramah, Gittaim, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadid, Zeboim, Neballat, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lod, and Ono, the valley of craftsmen. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the Levites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' divisions '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' in Benjamin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at Jerusalem dwelt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' of the children of Judah, and of the children of Benjamin. Of the children of Judah; Athaiah the son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalaleel, of the children of Perez; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Maaseiah the son of Baruch, the son of Col-hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of Shiloni. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the sons of Perez that dwelt at Jerusalem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' four hundred threescore and eight valiant men.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Benjamin; Sallu the son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jesaiah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after him Gabbai, Sallai, nine hundred twenty and eight. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joel the son of Zichri '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' their overseer: and Judah the son of Senuah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' second over the city.'
