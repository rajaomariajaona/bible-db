  - type: text
    content: ' thou hast seen, O '
  - type: text
    content: LORD
  - type: text
    content: ': keep not silence:'
  - type: text
    content: O Lord, be not far from me.
  '23':
  - type: text
    content: Stir up thyself, and awake to my judgment,
  - type: text
    content: Even
  - type: text
    content: ' unto my cause, my God and my Lord.'
  '24':
  - type: text
    content: 'Judge me, O '
  - type: text
    content: LORD
  - type: text
    content: ' my God, according to thy righteousness;'
  - type: text
    content: And let them not rejoice over me.
  '25':
  - type: text
    content: 'Let them not say in their hearts, Ah, so would we have it:'
  - type: text
    content: Let them not say, We have swallowed him up.
  '26':
  - type: text
    content: 'Let them be ashamed and brought to confusion together that rejoice at mine hurt:'
  - type: text
    content: 'Let them be clothed with shame and dishonour that magnify '
  - type: text
    content: themselves
  - type: text
    content: ' against me.'
  '27':
  - type: text
    content: 'Let them shout for joy, and be glad, that favour my righteous cause:'
  - type: text
    content: 'Yea, let them say continually, Let the '
  - type: text
    content: LORD
  - type: text
    content: ' be magnified, which hath pleasure in the prosperity of his servant.'
  '28':
  - type: text
    content: And my tongue shall speak of thy righteousness
  - type: text
    content: And
  - type: text
    content: ' of thy praise all the day long.'
  '3':
  - type: text
    content: 'Draw out also the spear, and stop '
  - type: text
    content: the way
  - type: text
    content: ' against them that persecute me:'
  - type: text
    content: 'Say unto my soul, I '
  - type: text
    content: am
  - type: text
    content: ' thy salvation.'
  '4':
  - type: text
    content: 'Let them be confounded and put to shame that seek after my soul:'
  - type: text
    content: Let them be turned back and brought to confusion that devise my hurt.
  '5':
  - type: text
    content: 'Let them be as chaff before the wind:'
  - type: text
    content: 'And let the angel of the '
  - type: text
