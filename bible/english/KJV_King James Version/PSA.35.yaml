document_id: PSA.35,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Plead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my cause
    - type: text
      text: ', O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', with them that strive with me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fight against them that fight against me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All my bones shall say, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like unto thee, which deliverest the poor from him that is too strong for him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, the poor and the needy from him that spoileth him?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: False witnesses did rise up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They laid to my charge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' that I knew not.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They rewarded me evil for good
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: To
    - type: text
      text: ' the spoiling of my soul.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But as for me, when they were sick, my clothing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' sackcloth: I humbled my soul with fasting;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my prayer returned into mine own bosom.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I behaved myself as though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he had been
    - type: text
      text: ' my friend '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' brother:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I bowed down heavily, as one that mourneth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for his
    - type: text
      text: ' mother.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But in mine adversity they rejoiced, and gathered themselves together:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yea
    - type: text
      text: ', the abjects gathered themselves together against me, and I knew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not; they did tear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', and ceased not:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: With hypocritical mockers in feasts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They gnashed upon me with their teeth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Lord, how long wilt thou look on?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rescue my soul from their destructions, my darling from the lions.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I will give thee thanks in the great congregation:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise thee among much people.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Let not them that are mine enemies wrongfully rejoice over me:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Neither
    - type: text
      text: ' let them wink with the eye that hate me without a cause.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Take hold of shield and buckler,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And stand up for mine help.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For they speak not peace:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But they devise deceitful matters against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' quiet in the land.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Yea, they opened their mouth wide against me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' said, Aha, aha, our eye hath seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: This
    - type: text
      text: ' thou hast seen, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': keep not silence:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Lord, be not far from me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Stir up thyself, and awake to my judgment,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' unto my cause, my God and my Lord.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Judge me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, according to thy righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let them not rejoice over me.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Let them not say in their hearts, Ah, so would we have it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them not say, We have swallowed him up.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Let them be ashamed and brought to confusion together that rejoice at mine hurt:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them be clothed with shame and dishonour that magnify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: themselves
    - type: text
      text: ' against me.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Let them shout for joy, and be glad, that favour my righteous cause:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, let them say continually, Let the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' be magnified, which hath pleasure in the prosperity of his servant.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And my tongue shall speak of thy righteousness
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' of thy praise all the day long.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Draw out also the spear, and stop '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the way
    - type: text
      text: ' against them that persecute me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Say unto my soul, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy salvation.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Let them be confounded and put to shame that seek after my soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be turned back and brought to confusion that devise my hurt.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Let them be as chaff before the wind:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And let the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' chase '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Let their way be dark and slippery:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And let the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' persecute them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For without cause have they hid for me their net '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' a pit,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' without cause they have digged for my soul.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Let destruction come upon him at unawares; and let his net that he hath hid catch himself:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Into that very destruction let him fall.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And my soul shall be joyful in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall rejoice in his salvation.
