  - type: text
    content: To
  - type: text
    content: ' the spoiling of my soul.'
  '13':
  - type: text
    content: 'But as for me, when they were sick, my clothing '
  - type: text
    content: was
  - type: text
    content: ' sackcloth: I humbled my soul with fasting;'
  - type: text
    content: And my prayer returned into mine own bosom.
  '14':
  - type: text
    content: 'I behaved myself as though '
  - type: text
    content: he had been
  - type: text
