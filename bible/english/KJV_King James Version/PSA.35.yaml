  '16':
  - type: text
    content: With hypocritical mockers in feasts,
  - type: text
    content: They gnashed upon me with their teeth.
  '17':
  - type: text
    content: Lord, how long wilt thou look on?
  - type: text
    content: Rescue my soul from their destructions, my darling from the lions.
  '18':
  - type: text
    content: 'I will give thee thanks in the great congregation:'
  - type: text
    content: I will praise thee among much people.
  '19':
  - type: text
    content: 'Let not them that are mine enemies wrongfully rejoice over me:'
  - type: text
    content: Neither
  - type: text
    content: ' let them wink with the eye that hate me without a cause.'
  '2':
  - type: text
    content: Take hold of shield and buckler,
  - type: text
    content: And stand up for mine help.
  '20':
  - type: text
    content: 'For they speak not peace:'
  - type: text
    content: 'But they devise deceitful matters against '
  - type: text
    content: them that are
  - type: text
    content: ' quiet in the land.'
  '21':
  - type: text
    content: Yea, they opened their mouth wide against me,
  - type: text
