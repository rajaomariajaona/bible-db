  - type: text
    content: them
  - type: text
    content: .
  '6':
  - type: text
    content: 'Let their way be dark and slippery:'
  - type: text
    content: 'And let the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' persecute them.'
  '7':
  - type: text
    content: 'For without cause have they hid for me their net '
  - type: text
    content: in
  - type: text
    content: ' a pit,'
  - type: text
    content: Which
  - type: text
    content: ' without cause they have digged for my soul.'
  '8':
  - type: text
    content: 'Let destruction come upon him at unawares; and let his net that he hath hid catch himself:'
  - type: text
    content: Into that very destruction let him fall.
  '9':
  - type: text
    content: 'And my soul shall be joyful in the '
  - type: text
