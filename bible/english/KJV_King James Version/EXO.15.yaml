document_id: EXO.15
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Songs of Deliverance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then sang Moses and the children of Israel this song unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and spake, saying,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will sing unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for he hath triumphed gloriously:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The horse and his rider hath he thrown into the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength and song,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he is become my salvation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my God, and I will prepare him an habitation;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My father's God, and I will exalt him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a man of war:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pharaoh''s chariots and his host hath he cast into the sea:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His chosen captains also are drowned in the Red sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The depths have covered them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sank into the bottom as a stone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thy right hand, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', is become glorious in power:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy right hand, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', hath dashed in pieces the enemy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And in the greatness of thine excellency thou hast overthrown them that rose up against thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou sentest forth thy wrath, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' consumed them as stubble.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And with the blast of thy nostrils the waters were gathered together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The floods stood upright as an heap,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the depths were congealed in the heart of the sea.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The enemy said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pursue, I will overtake, I will divide the spoil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My lust shall be satisfied upon them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will draw my sword, my hand shall destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou didst blow with thy wind, the sea covered them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sank as lead in the mighty waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like unto thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', among the gods?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like thee, glorious in holiness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fearful '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' praises, doing wonders?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thou stretchedst out thy right hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth swallowed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou in thy mercy hast led forth the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast redeemed:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou hast guided '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in thy strength unto thy holy habitation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The people shall hear, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' be afraid:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sorrow shall take hold on the inhabitants of Palestina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the dukes of Edom shall be amazed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mighty men of Moab, trembling shall take hold upon them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the inhabitants of Canaan shall melt away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fear and dread shall fall upon them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'By the greatness of thine arm they shall be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' still as a stone;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Till thy people pass over, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Till the people pass over, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast purchased.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Thou shalt bring them in, and plant them in the mountain of thine inheritance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: In
  - type: text
    text: ' the place, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast made for thee to dwell in,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: In
  - type: text
    text: ' the sanctuary, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thy hands have established.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall reign for ever and ever.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For the horse of Pharaoh went in with his chariots and with his horsemen into the sea, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' brought again the waters of the sea upon them; but the children of Israel went on dry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: ' in the midst of the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Miriam the prophetess, the sister of Aaron, took a timbrel in her hand; and all the women went out after her with timbrels and with dances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And Miriam answered them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sing ye to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for he hath triumphed gloriously:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The horse and his rider hath he thrown into the sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Moses brought Israel from the Red sea, and they went out into the wilderness of Shur; and they went three days in the wilderness, and found no water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when they came to Marah, they could not drink of the waters of Marah, for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' bitter: therefore the name of it was called Marah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the people murmured against Moses, saying, What shall we drink? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shewed him a tree, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' when he had cast into the waters, the waters were made sweet: there he made for them a statute and an ordinance, and there he proved them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and said, If thou wilt diligently hearken to the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and wilt do that which is right in his sight, and wilt give ear to his commandments, and keep all his statutes, I will put none of these diseases upon thee, which I have brought upon the Egyptians: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that healeth thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they came to Elim, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' twelve wells of water, and threescore and ten palm trees: and they encamped there by the waters.'
