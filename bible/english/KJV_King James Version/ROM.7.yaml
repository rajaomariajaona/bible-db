document_id: ROM.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Change of Masters
  - type: text
    content: 'Know ye not, brethren, (for I speak to them that know the law,) how that the law hath dominion over a man as long as he liveth? '
  '10':
  - type: text
    content: 'And the commandment, which '
  - type: text
    content: was ordained
  - type: text
    content: ' to life, I found '
  - type: text
    content: to be
  - type: text
    content: ' unto death. '
  '11':
  - type: text
    content: 'For sin, taking occasion by the commandment, deceived me, and by it slew '
  - type: text
    content: me
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Wherefore the law '
  - type: text
    content: is
  - type: text
    content: ' holy, and the commandment holy, and just, and good.'
  '13':
  - type: text
    content: 'Was then that which is good made death unto me? God forbid. But sin, that it might appear sin, working death in me by that which is good; that sin by the commandment might become exceeding sinful. '
  '14':
  - type: text
    content: 'For we know that the law is spiritual: but I am carnal, sold under sin. '
  '15':
  - type: text
    content: 'For that which I do I allow not: for what I would, that do I not; but what I hate, that do I. '
  '16':
  - type: text
    content: 'If then I do that which I would not, I consent unto the law that '
  - type: text
    content: it is
  - type: text
    content: ' good. '
  '17':
  - type: text
    content: 'Now then it is no more I that do it, but sin that dwelleth in me. '
  '18':
  - type: text
    content: 'For I know that in me (that is, in my flesh,) dwelleth no good thing: for to will is present with me; but '
  - type: text
    content: how
  - type: text
    content: ' to perform that which is good I find not. '
  '19':
  - type: text
    content: 'For the good that I would I do not: but the evil which I would not, that I do. '
  '2':
  - type: text
    content: 'For the woman which hath an husband is bound by the law to '
  - type: text
    content: her
  - type: text
    content: ' husband so long as he liveth; but if the husband be dead, she is loosed from the law of '
  - type: text
    content: her
  - type: text
    content: ' husband. '
  '20':
  - type: text
    content: 'Now if I do that I would not, it is no more I that do it, but sin that dwelleth in me. '
  '21':
  - type: text
    content: 'I find then a law, that, when I would do good, evil is present with me. '
  '22':
  - type: text
    content: 'For I delight in the law of God after the inward man: '
  '23':
  - type: text
    content: 'but I see another law in my members, warring against the law of my mind, and bringing me into captivity to the law of sin which is in my members. '
  '24':
  - type: text
    content: 'O wretched man that I am! who shall deliver me from the body of this death? '
  '25':
  - type: text
    content: I thank God through Jesus Christ our Lord. So then with the mind I myself serve the law of God; but with the flesh the law of sin.
  '3':
  - type: text
    content: 'So then if, while '
  - type: text
    content: her
  - type: text
    content: ' husband liveth, she be married to another man, she shall be called an adulteress: but if her husband be dead, she is free from that law; so that she is no adulteress, though she be married to another man. '
  '4':
  - type: text
    content: 'Wherefore, my brethren, ye also are become dead to the law by the body of Christ; that ye should be married to another, '
  - type: text
    content: even
  - type: text
    content: ' to him who is raised from the dead, that we should bring forth fruit unto God. '
  '5':
  - type: text
    content: 'For when we were in the flesh, the motions of sins, which were by the law, did work in our members to bring forth fruit unto death. '
  '6':
  - type: text
    content: 'But now we are delivered from the law, that being dead wherein we were held; that we should serve in newness of spirit, and not '
  - type: text
    content: in
  - type: text
    content: ' the oldness of the letter.'
  '7':
  - type: text
    content: 'What shall we say then? '
  - type: text
    content: Is
  - type: text
    content: ' the law sin? God forbid. Nay, I had not known sin, but by the law: for I had not known lust, except the law had said, Thou shalt not covet. '
  '8':
  - type: text
    content: 'But sin, taking occasion by the commandment, wrought in me all manner of concupiscence. For without the law sin '
  - type: text
    content: was
  - type: text
    content: ' dead. '
  '9':
  - type: text
    content: 'For I was alive without the law once: but when the commandment came, sin revived, and I died. '
