document_id: PSA.28
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Unto thee will I cry, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my rock; be not silent to me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Lest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' thou be silent to me, I become like them that go down into the pit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear the voice of my supplications, when I cry unto thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I lift up my hands toward thy holy oracle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Draw me not away with the wicked, and with the workers of iniquity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Which speak peace to their neighbours, but mischief '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in their hearts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Give them according to their deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And according to the wickedness of their endeavours:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give them after the work of their hands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Render to them their desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Because they regard not the works of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', nor the operation of his hands,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall destroy them, and not build them up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because he hath heard the voice of my supplications.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength and my shield; my heart trusted in him, and I am helped:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore my heart greatly rejoiceth; and with my song will I praise him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their strength,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the saving strength of his anointed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Save thy people, and bless thine inheritance:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Feed them also, and lift them up for ever.
