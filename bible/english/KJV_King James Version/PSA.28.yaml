document_id: PSA.28,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unto thee will I cry, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my rock; be not silent to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' thou be silent to me, I become like them that go down into the pit.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the voice of my supplications, when I cry unto thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I lift up my hands toward thy holy oracle.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Draw me not away with the wicked, and with the workers of iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which speak peace to their neighbours, but mischief '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in their hearts.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them according to their deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And according to the wickedness of their endeavours:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them after the work of their hands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Render to them their desert.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because they regard not the works of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', nor the operation of his hands,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall destroy them, and not build them up.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because he hath heard the voice of my supplications.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my strength and my shield; my heart trusted in him, and I am helped:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore my heart greatly rejoiceth; and with my song will I praise him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' their strength,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the saving strength of his anointed.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save thy people, and bless thine inheritance:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Feed them also, and lift them up for ever.
