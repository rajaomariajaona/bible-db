document_id: 2CH.32,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem Threatened
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things, and the establishment thereof, Sennacherib king of Assyria came, and entered into Judah, and encamped against the fenced cities, and thought to win them for himself. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith Sennacherib king of Assyria, Whereon do ye trust, that ye abide in the siege in Jerusalem? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Doth not Hezekiah persuade you to give over yourselves to die by famine and by thirst, saying, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God shall deliver us out of the hand of the king of Assyria? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hath not the same Hezekiah taken away his high places and his altars, and commanded Judah and Jerusalem, saying, Ye shall worship before one altar, and burn incense upon it? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Know ye not what I and my fathers have done unto all the people of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' lands? were the gods of the nations of those lands any ways able to deliver their lands out of mine hand? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was there
    - type: text
      text: ' among all the gods of those nations that my fathers utterly destroyed, that could deliver his people out of mine hand, that your God should be able to deliver you out of mine hand? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore let not Hezekiah deceive you, nor persuade you on this manner, neither yet believe him: for no god of any nation or kingdom was able to deliver his people out of mine hand, and out of the hand of my fathers: how much less shall your God deliver you out of mine hand?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his servants spake yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: more
    - type: text
      text: ' against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, and against his servant Hezekiah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He wrote also letters to rail on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, and to speak against him, saying, As the gods of the nations of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' lands have not delivered their people out of mine hand, so shall not the God of Hezekiah deliver his people out of mine hand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they cried with a loud voice in the Jews'' speech unto the people of Jerusalem that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on the wall, to affright them, and to trouble them; that they might take the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they spake against the God of Jerusalem, as against the gods of the people of the earth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' the work of the hands of man. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Hezekiah saw that Sennacherib was come, and that he was purposed to fight against Jerusalem, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cause
    - type: text
      text: ' Hezekiah the king, and the prophet Isaiah the son of Amoz, prayed and cried to heaven.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem Delivered
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent an angel, which cut off all the mighty men of valour, and the leaders and captains in the camp of the king of Assyria. So he returned with shame of face to his own land. And when he was come into the house of his god, they that came forth of his own bowels slew him there with the sword. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib the king of Assyria, and from the hand of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ', and guided them on every side. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many brought gifts unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to Jerusalem, and presents to Hezekiah king of Judah: so that he was magnified in the sight of all nations from thenceforth.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days Hezekiah was sick to the death, and prayed unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and he spake unto him, and he gave him a sign. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hezekiah rendered not again according to the benefit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: done
    - type: text
      text: ' unto him; for his heart was lifted up: therefore there was wrath upon him, and upon Judah and Jerusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notwithstanding Hezekiah humbled himself for the pride of his heart, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' he and the inhabitants of Jerusalem, so that the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came not upon them in the days of Hezekiah.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah had exceeding much riches and honour: and he made himself treasuries for silver, and for gold, and for precious stones, and for spices, and for shields, and for all manner of pleasant jewels; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'storehouses also for the increase of corn, and wine, and oil; and stalls for all manner of beasts, and cotes for flocks. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover he provided him cities, and possessions of flocks and herds in abundance: for God had given him substance very much. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he took counsel with his princes and his mighty men to stop the waters of the fountains which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' without the city: and they did help him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This same Hezekiah also stopped the upper watercourse of Gihon, and brought it straight down to the west side of the city of David. And Hezekiah prospered in all his works. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the business of
    - type: text
      text: ' the ambassadors of the princes of Babylon, who sent unto him to enquire of the wonder that was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: done
    - type: text
      text: ' in the land, God left him, to try him, that he might know all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' in his heart.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Hezekiah, and his goodness, behold, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the vision of Isaiah the prophet, the son of Amoz, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' in the book of the kings of Judah and Israel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah slept with his fathers, and they buried him in the chiefest of the sepulchres of the sons of David: and all Judah and the inhabitants of Jerusalem did him honour at his death. And Manasseh his son reigned in his stead.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there was gathered much people together, who stopped all the fountains, and the brook that ran through the midst of the land, saying, Why should the kings of Assyria come, and find much water? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he strengthened himself, and built up all the wall that was broken, and raised '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' up to the towers, and another wall without, and repaired Millo '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the city of David, and made darts and shields in abundance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he set captains of war over the people, and gathered them together to him in the street of the gate of the city, and spake comfortably to them, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong and courageous, be not afraid nor dismayed for the king of Assyria, nor for all the multitude that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with him: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' more with us than with him: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an arm of flesh; but with us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God to help us, and to fight our battles. And the people rested themselves upon the words of Hezekiah king of Judah.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this did Sennacherib king of Assyria send his servants to Jerusalem, (but he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself laid siege
    - type: text
      text: ' against Lachish, and all his power with him,) unto Hezekiah king of Judah, and unto all Judah that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' at Jerusalem, saying, '
