verses:
  '1':
  - type: heading
    content: Jerusalem Threatened
  - type: text
    content: 'After these things, and the establishment thereof, Sennacherib king of Assyria came, and entered into Judah, and encamped against the fenced cities, and thought to win them for himself. '
  '10':
  - type: text
    content: 'Thus saith Sennacherib king of Assyria, Whereon do ye trust, that ye abide in the siege in Jerusalem? '
  '11':
  - type: text
    content: 'Doth not Hezekiah persuade you to give over yourselves to die by famine and by thirst, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' our God shall deliver us out of the hand of the king of Assyria? '
  '12':
  - type: text
    content: 'Hath not the same Hezekiah taken away his high places and his altars, and commanded Judah and Jerusalem, saying, Ye shall worship before one altar, and burn incense upon it? '
  '13':
  - type: text
    content: 'Know ye not what I and my fathers have done unto all the people of '
  - type: text
    content: other
  - type: text
    content: ' lands? were the gods of the nations of those lands any ways able to deliver their lands out of mine hand? '
  '14':
  - type: text
    content: 'Who '
  - type: text
    content: was there
  - type: text
    content: ' among all the gods of those nations that my fathers utterly destroyed, that could deliver his people out of mine hand, that your God should be able to deliver you out of mine hand? '
  '15':
  - type: text
    content: 'Now therefore let not Hezekiah deceive you, nor persuade you on this manner, neither yet believe him: for no god of any nation or kingdom was able to deliver his people out of mine hand, and out of the hand of my fathers: how much less shall your God deliver you out of mine hand?'
  '16':
  - type: text
    content: 'And his servants spake yet '
  - type: text
    content: more
  - type: text
    content: ' against the '
  - type: text
    content: LORD
  - type: text
    content: ' God, and against his servant Hezekiah. '
  '17':
  - type: text
    content: 'He wrote also letters to rail on the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, and to speak against him, saying, As the gods of the nations of '
  - type: text
    content: other
  - type: text
    content: ' lands have not delivered their people out of mine hand, so shall not the God of Hezekiah deliver his people out of mine hand. '
  '18':
  - type: text
    content: 'Then they cried with a loud voice in the Jews'' speech unto the people of Jerusalem that '
  - type: text
    content: were
  - type: text
    content: ' on the wall, to affright them, and to trouble them; that they might take the city. '
  '19':
  - type: text
    content: 'And they spake against the God of Jerusalem, as against the gods of the people of the earth, '
  - type: text
    content: which were
  - type: text
    content: ' the work of the hands of man. '
  '2':
  - type: text
    content: 'And when Hezekiah saw that Sennacherib was come, and that he was purposed to fight against Jerusalem, '
  '20':
  - type: text
    content: 'And for this '
  - type: text
    content: cause
  - type: text
    content: ' Hezekiah the king, and the prophet Isaiah the son of Amoz, prayed and cried to heaven.'
  - type: heading
    content: Jerusalem Delivered
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' sent an angel, which cut off all the mighty men of valour, and the leaders and captains in the camp of the king of Assyria. So he returned with shame of face to his own land. And when he was come into the house of his god, they that came forth of his own bowels slew him there with the sword. '
  '22':
  - type: text
    content: 'Thus the '
  - type: text
    content: LORD
  - type: text
    content: ' saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib the king of Assyria, and from the hand of all '
  - type: text
    content: other
  - type: text
    content: ', and guided them on every side. '
  '23':
  - type: text
    content: 'And many brought gifts unto the '
  - type: text
    content: LORD
  - type: text
    content: ' to Jerusalem, and presents to Hezekiah king of Judah: so that he was magnified in the sight of all nations from thenceforth.'
  '24':
  - type: text
    content: 'In those days Hezekiah was sick to the death, and prayed unto the '
  - type: text
    content: LORD
  - type: text
    content: ': and he spake unto him, and he gave him a sign. '
  '25':
  - type: text
    content: 'But Hezekiah rendered not again according to the benefit '
  - type: text
    content: done
  - type: text
    content: ' unto him; for his heart was lifted up: therefore there was wrath upon him, and upon Judah and Jerusalem. '
  '26':
  - type: text
    content: 'Notwithstanding Hezekiah humbled himself for the pride of his heart, '
  - type: text
    content: both
  - type: text
    content: ' he and the inhabitants of Jerusalem, so that the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' came not upon them in the days of Hezekiah.'
  '27':
  - type: text
    content: 'And Hezekiah had exceeding much riches and honour: and he made himself treasuries for silver, and for gold, and for precious stones, and for spices, and for shields, and for all manner of pleasant jewels; '
  '28':
  - type: text
    content: 'storehouses also for the increase of corn, and wine, and oil; and stalls for all manner of beasts, and cotes for flocks. '
  '29':
  - type: text
    content: 'Moreover he provided him cities, and possessions of flocks and herds in abundance: for God had given him substance very much. '
  '3':
  - type: text
    content: 'he took counsel with his princes and his mighty men to stop the waters of the fountains which '
  - type: text
    content: were
  - type: text
    content: ' without the city: and they did help him. '
  '30':
  - type: text
    content: 'This same Hezekiah also stopped the upper watercourse of Gihon, and brought it straight down to the west side of the city of David. And Hezekiah prospered in all his works. '
  '31':
  - type: text
    content: 'Howbeit in '
  - type: text
    content: the business of
  - type: text
    content: ' the ambassadors of the princes of Babylon, who sent unto him to enquire of the wonder that was '
  - type: text
    content: done
  - type: text
    content: ' in the land, God left him, to try him, that he might know all '
  - type: text
    content: that was
  - type: text
    content: ' in his heart.'
  '32':
  - type: text
    content: 'Now the rest of the acts of Hezekiah, and his goodness, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the vision of Isaiah the prophet, the son of Amoz, '
  - type: text
    content: and
  - type: text
    content: ' in the book of the kings of Judah and Israel. '
  '33':
  - type: text
    content: 'And Hezekiah slept with his fathers, and they buried him in the chiefest of the sepulchres of the sons of David: and all Judah and the inhabitants of Jerusalem did him honour at his death. And Manasseh his son reigned in his stead.'
  '4':
  - type: text
    content: 'So there was gathered much people together, who stopped all the fountains, and the brook that ran through the midst of the land, saying, Why should the kings of Assyria come, and find much water? '
  '5':
  - type: text
    content: 'Also he strengthened himself, and built up all the wall that was broken, and raised '
  - type: text
    content: it
  - type: text
    content: ' up to the towers, and another wall without, and repaired Millo '
  - type: text
    content: in
  - type: text
    content: ' the city of David, and made darts and shields in abundance. '
  '6':
  - type: text
    content: 'And he set captains of war over the people, and gathered them together to him in the street of the gate of the city, and spake comfortably to them, saying, '
  '7':
  - type: text
    content: 'Be strong and courageous, be not afraid nor dismayed for the king of Assyria, nor for all the multitude that '
  - type: text
    content: is
  - type: text
    content: ' with him: for '
  - type: text
    content: there be
  - type: text
    content: ' more with us than with him: '
  '8':
  - type: text
    content: 'with him '
  - type: text
    content: is
  - type: text
    content: ' an arm of flesh; but with us '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' our God to help us, and to fight our battles. And the people rested themselves upon the words of Hezekiah king of Judah.'
  '9':
  - type: text
    content: 'After this did Sennacherib king of Assyria send his servants to Jerusalem, (but he '
  - type: text
    content: himself laid siege
  - type: text
    content: ' against Lachish, and all his power with him,) unto Hezekiah king of Judah, and unto all Judah that '
  - type: text
    content: were
  - type: text
    content: ' at Jerusalem, saying, '
