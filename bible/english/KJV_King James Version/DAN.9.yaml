document_id: DAN.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Time of Restoration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the first year of Darius the son of Ahasuerus, of the seed of the Medes, which was made king over the realm of the Chaldeans; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'neither have we obeyed the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, to walk in his laws, which he set before us by his servants the prophets. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Yea, all Israel have transgressed thy law, even by departing, that they might not obey thy voice; therefore the curse is poured upon us, and the oath that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' written in the law of Moses the servant of God, because we have sinned against him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And he hath confirmed his words, which he spake against us, and against our judges that judged us, by bringing upon us a great evil: for under the whole heaven hath not been done as hath been done upon Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written in the law of Moses, all this evil is come upon us: yet made we not our prayer before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, that we might turn from our iniquities, and understand thy truth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Therefore hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' watched upon the evil, and brought it upon us: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' righteous in all his works which he doeth: for we obeyed not his voice. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And now, O Lord our God, that hast brought thy people forth out of the land of Egypt with a mighty hand, and hast gotten thee renown, as at this day; we have sinned, we have done wickedly.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'O Lord, according to all thy righteousness, I beseech thee, let thine anger and thy fury be turned away from thy city Jerusalem, thy holy mountain: because for our sins, and for the iniquities of our fathers, Jerusalem and thy people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are become
    - type: text
      text: ' a reproach to all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' about us. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now therefore, O our God, hear the prayer of thy servant, and his supplications, and cause thy face to shine upon thy sanctuary that is desolate, for the Lord''s sake. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'O my God, incline thine ear, and hear; open thine eyes, and behold our desolations, and the city which is called by thy name: for we do not present our supplications before thee for our righteousnesses, but for thy great mercies. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'O Lord, hear; O Lord, forgive; O Lord, hearken and do; defer not, for thine own sake, O my God: for thy city and thy people are called by thy name.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'in the first year of his reign I Daniel understood by books the number of the years, whereof the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to Jeremiah the prophet, that he would accomplish seventy years in the desolations of Jerusalem.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And whiles I was speaking, and praying, and confessing my sin and the sin of my people Israel, and presenting my supplication before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God for the holy mountain of my God; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'yea, whiles I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' speaking in prayer, even the man Gabriel, whom I had seen in the vision at the beginning, being caused to fly swiftly, touched me about the time of the evening oblation. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And he informed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', and talked with me, and said, O Daniel, I am now come forth to give thee skill and understanding. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'At the beginning of thy supplications the commandment came forth, and I am come to shew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: '; for thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' greatly beloved: therefore understand the matter, and consider the vision.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Seventy weeks are determined upon thy people and upon thy holy city, to finish the transgression, and to make an end of sins, and to make reconciliation for iniquity, and to bring in everlasting righteousness, and to seal up the vision and prophecy, and to anoint the most Holy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Know therefore and understand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' from the going forth of the commandment to restore and to build Jerusalem unto the Messiah the Prince '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' seven weeks, and threescore and two weeks: the street shall be built again, and the wall, even in troublous times. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And after threescore and two weeks shall Messiah be cut off, but not for himself: and the people of the prince that shall come shall destroy the city and the sanctuary; and the end thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' with a flood, and unto the end of the war desolations are determined. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he shall confirm the covenant with many for one week: and in the midst of the week he shall cause the sacrifice and the oblation to cease, and for the overspreading of abominations he shall make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' desolate, even until the consummation, and that determined shall be poured upon the desolate.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I set my face unto the Lord God, to seek by prayer and supplications, with fasting, and sackcloth, and ashes: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and I prayed unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, and made my confession, and said, O Lord, the great and dreadful God, keeping the covenant and mercy to them that love him, and to them that keep his commandments; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'we have sinned, and have committed iniquity, and have done wickedly, and have rebelled, even by departing from thy precepts and from thy judgments: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'neither have we hearkened unto thy servants the prophets, which spake in thy name to our kings, our princes, and our fathers, and to all the people of the land. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'O Lord, righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' unto thee, but unto us confusion of faces, as at this day; to the men of Judah, and to the inhabitants of Jerusalem, and unto all Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' near, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' far off, through all the countries whither thou hast driven them, because of their trespass that they have trespassed against thee. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'O Lord, to us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' confusion of face, to our kings, to our princes, and to our fathers, because we have sinned against thee. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'To the Lord our God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' mercies and forgivenesses, though we have rebelled against him; '
