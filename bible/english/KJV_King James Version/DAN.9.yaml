document_id: DAN.9,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Time of Restoration
  - type: text
    content: 'In the first year of Darius the son of Ahasuerus, of the seed of the Medes, which was made king over the realm of the Chaldeans; '
  '10':
  - type: text
    content: 'neither have we obeyed the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, to walk in his laws, which he set before us by his servants the prophets. '
  '11':
  - type: text
    content: 'Yea, all Israel have transgressed thy law, even by departing, that they might not obey thy voice; therefore the curse is poured upon us, and the oath that '
  - type: text
    content: is
  - type: text
    content: ' written in the law of Moses the servant of God, because we have sinned against him. '
  '12':
  - type: text
    content: 'And he hath confirmed his words, which he spake against us, and against our judges that judged us, by bringing upon us a great evil: for under the whole heaven hath not been done as hath been done upon Jerusalem. '
  '13':
  - type: text
    content: 'As '
  - type: text
    content: it is
  - type: text
    content: ' written in the law of Moses, all this evil is come upon us: yet made we not our prayer before the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, that we might turn from our iniquities, and understand thy truth. '
  '14':
  - type: text
    content: 'Therefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' watched upon the evil, and brought it upon us: for the '
  - type: text
    content: LORD
  - type: text
    content: ' our God '
  - type: text
    content: is
  - type: text
    content: ' righteous in all his works which he doeth: for we obeyed not his voice. '
  '15':
  - type: text
    content: And now, O Lord our God, that hast brought thy people forth out of the land of Egypt with a mighty hand, and hast gotten thee renown, as at this day; we have sinned, we have done wickedly.
  '16':
  - type: text
    content: 'O Lord, according to all thy righteousness, I beseech thee, let thine anger and thy fury be turned away from thy city Jerusalem, thy holy mountain: because for our sins, and for the iniquities of our fathers, Jerusalem and thy people '
  - type: text
    content: are become
  - type: text
    content: ' a reproach to all '
  - type: text
    content: that are
  - type: text
    content: ' about us. '
  '17':
  - type: text
    content: 'Now therefore, O our God, hear the prayer of thy servant, and his supplications, and cause thy face to shine upon thy sanctuary that is desolate, for the Lord''s sake. '
  '18':
  - type: text
    content: 'O my God, incline thine ear, and hear; open thine eyes, and behold our desolations, and the city which is called by thy name: for we do not present our supplications before thee for our righteousnesses, but for thy great mercies. '
  '19':
  - type: text
    content: 'O Lord, hear; O Lord, forgive; O Lord, hearken and do; defer not, for thine own sake, O my God: for thy city and thy people are called by thy name.'
  '2':
  - type: text
    content: 'in the first year of his reign I Daniel understood by books the number of the years, whereof the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Jeremiah the prophet, that he would accomplish seventy years in the desolations of Jerusalem.'
  '20':
  - type: text
    content: 'And whiles I was speaking, and praying, and confessing my sin and the sin of my people Israel, and presenting my supplication before the '
  - type: text
    content: LORD
  - type: text
    content: ' my God for the holy mountain of my God; '
  '21':
  - type: text
    content: 'yea, whiles I '
  - type: text
    content: was
  - type: text
    content: ' speaking in prayer, even the man Gabriel, whom I had seen in the vision at the beginning, being caused to fly swiftly, touched me about the time of the evening oblation. '
  '22':
  - type: text
    content: 'And he informed '
  - type: text
    content: me
  - type: text
    content: ', and talked with me, and said, O Daniel, I am now come forth to give thee skill and understanding. '
  '23':
  - type: text
    content: 'At the beginning of thy supplications the commandment came forth, and I am come to shew '
  - type: text
    content: thee
  - type: text
    content: '; for thou '
  - type: text
    content: art
  - type: text
    content: ' greatly beloved: therefore understand the matter, and consider the vision.'
  '24':
  - type: text
    content: 'Seventy weeks are determined upon thy people and upon thy holy city, to finish the transgression, and to make an end of sins, and to make reconciliation for iniquity, and to bring in everlasting righteousness, and to seal up the vision and prophecy, and to anoint the most Holy. '
  '25':
  - type: text
    content: 'Know therefore and understand, '
  - type: text
    content: that
  - type: text
    content: ' from the going forth of the commandment to restore and to build Jerusalem unto the Messiah the Prince '
  - type: text
    content: shall be
  - type: text
    content: ' seven weeks, and threescore and two weeks: the street shall be built again, and the wall, even in troublous times. '
  '26':
  - type: text
    content: 'And after threescore and two weeks shall Messiah be cut off, but not for himself: and the people of the prince that shall come shall destroy the city and the sanctuary; and the end thereof '
  - type: text
    content: shall be
  - type: text
    content: ' with a flood, and unto the end of the war desolations are determined. '
  '27':
  - type: text
    content: 'And he shall confirm the covenant with many for one week: and in the midst of the week he shall cause the sacrifice and the oblation to cease, and for the overspreading of abominations he shall make '
  - type: text
    content: it
  - type: text
    content: ' desolate, even until the consummation, and that determined shall be poured upon the desolate.'
  '3':
  - type: text
    content: 'And I set my face unto the Lord God, to seek by prayer and supplications, with fasting, and sackcloth, and ashes: '
  '4':
  - type: text
    content: 'and I prayed unto the '
  - type: text
    content: LORD
  - type: text
    content: ' my God, and made my confession, and said, O Lord, the great and dreadful God, keeping the covenant and mercy to them that love him, and to them that keep his commandments; '
  '5':
  - type: text
    content: 'we have sinned, and have committed iniquity, and have done wickedly, and have rebelled, even by departing from thy precepts and from thy judgments: '
  '6':
  - type: text
    content: 'neither have we hearkened unto thy servants the prophets, which spake in thy name to our kings, our princes, and our fathers, and to all the people of the land. '
  '7':
  - type: text
    content: 'O Lord, righteousness '
  - type: text
    content: belongeth
  - type: text
    content: ' unto thee, but unto us confusion of faces, as at this day; to the men of Judah, and to the inhabitants of Jerusalem, and unto all Israel, '
  - type: text
    content: that are
  - type: text
    content: ' near, and '
  - type: text
    content: that are
  - type: text
    content: ' far off, through all the countries whither thou hast driven them, because of their trespass that they have trespassed against thee. '
  '8':
  - type: text
    content: 'O Lord, to us '
  - type: text
    content: belongeth
  - type: text
    content: ' confusion of face, to our kings, to our princes, and to our fathers, because we have sinned against thee. '
  '9':
  - type: text
    content: 'To the Lord our God '
  - type: text
    content: belong
  - type: text
    content: ' mercies and forgivenesses, though we have rebelled against him; '
