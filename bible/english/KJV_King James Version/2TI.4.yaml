document_id: 2TI.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Farewell Charge
  - type: text
    content: 'I charge '
  - type: text
    content: thee
  - type: text
    content: ' therefore before God, and the Lord Jesus Christ, who shall judge the quick and the dead at his appearing and his kingdom; '
  '10':
  - type: text
    content: 'for Demas hath forsaken me, having loved this present world, and is departed unto Thessalonica; Crescens to Galatia, Titus unto Dalmatia. '
  '11':
  - type: text
    content: 'Only Luke is with me. Take Mark, and bring him with thee: for he is profitable to me for the ministry. '
  '12':
  - type: text
    content: 'And Tychicus have I sent to Ephesus. '
  '13':
  - type: text
    content: 'The cloke that I left at Troas with Carpus, when thou comest, bring '
  - type: text
    content: with thee
  - type: text
    content: ', and the books, '
  - type: text
    content: but
  - type: text
    content: ' especially the parchments. '
  '14':
  - type: text
    content: 'Alexander the coppersmith did me much evil: the Lord reward him according to his works: '
  '15':
  - type: text
    content: 'of whom be thou ware also; for he hath greatly withstood our words. '
  '16':
  - type: text
    content: 'At my first answer no man stood with me, but all '
  - type: text
    content: men
  - type: text
    content: ' forsook me: '
  - type: text
    content: I pray God
  - type: text
    content: ' that it may not be laid to their charge. '
  '17':
  - type: text
    content: 'Notwithstanding the Lord stood with me, and strengthened me; that by me the preaching might be fully known, and '
  - type: text
    content: that
  - type: text
    content: ' all the Gentiles might hear: and I was delivered out of the mouth of the lion. '
  '18':
  - type: text
    content: 'And the Lord shall deliver me from every evil work, and will preserve '
  - type: text
    content: me
  - type: text
    content: ' unto his heavenly kingdom: to whom '
  - type: text
    content: be
  - type: text
    content: ' glory for ever and ever. Amen.'
  '19':
  - type: text
    content: 'Salute Prisca and Aquila, and the household of Onesiphorus. '
  '2':
  - type: text
    content: 'preach the word; be instant in season, out of season; reprove, rebuke, exhort with all longsuffering and doctrine. '
  '20':
  - type: text
    content: 'Erastus abode at Corinth: but Trophimus have I left at Miletum sick. '
  '21':
  - type: text
    content: Do thy diligence to come before winter.
  - type: text
    content: Eubulus greeteth thee, and Pudens, and Linus, and Claudia, and all the brethren.
  '22':
  - type: text
    content: 'The Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with thy spirit. Grace '
  - type: text
    content: be
  - type: text
    content: ' with you. Amen.'
  - type: text
    content: The second epistle unto Timotheus, ordained the first bishop of the church of the Ephesians, was written from Rome, when Paul was brought before Nero the second time.
  '3':
  - type: text
    content: 'For the time will come when they will not endure sound doctrine; but after their own lusts shall they heap to themselves teachers, having itching ears; '
  '4':
  - type: text
    content: 'and they shall turn away '
  - type: text
    content: their
  - type: text
    content: ' ears from the truth, and shall be turned unto fables. '
  '5':
  - type: text
    content: But watch thou in all things, endure afflictions, do the work of an evangelist, make full proof of thy ministry.
  '6':
  - type: text
    content: 'For I am now ready to be offered, and the time of my departure is at hand. '
  '7':
  - type: text
    content: 'I have fought a good fight, I have finished '
  - type: text
    content: my
  - type: text
    content: ' course, I have kept the faith: '
  '8':
  - type: text
    content: 'henceforth there is laid up for me a crown of righteousness, which the Lord, the righteous judge, shall give me at that day: and not to me only, but unto all them also that love his appearing.'
  '9':
  - type: text
    content: 'Do thy diligence to come shortly unto me: '
