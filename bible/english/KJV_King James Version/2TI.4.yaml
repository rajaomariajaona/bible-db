document_id: 2TI.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Farewell Charge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I charge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' therefore before God, and the Lord Jesus Christ, who shall judge the quick and the dead at his appearing and his kingdom; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'preach the word; be instant in season, out of season; reprove, rebuke, exhort with all longsuffering and doctrine. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the time will come when they will not endure sound doctrine; but after their own lusts shall they heap to themselves teachers, having itching ears; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and they shall turn away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' ears from the truth, and shall be turned unto fables. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But watch thou in all things, endure afflictions, do the work of an evangelist, make full proof of thy ministry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For I am now ready to be offered, and the time of my departure is at hand. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I have fought a good fight, I have finished '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' course, I have kept the faith: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'henceforth there is laid up for me a crown of righteousness, which the Lord, the righteous judge, shall give me at that day: and not to me only, but unto all them also that love his appearing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do thy diligence to come shortly unto me: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'for Demas hath forsaken me, having loved this present world, and is departed unto Thessalonica; Crescens to Galatia, Titus unto Dalmatia. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Only Luke is with me. Take Mark, and bring him with thee: for he is profitable to me for the ministry. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Tychicus have I sent to Ephesus. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The cloke that I left at Troas with Carpus, when thou comest, bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with thee
  - type: text
    text: ', and the books, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' especially the parchments. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alexander the coppersmith did me much evil: the Lord reward him according to his works: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'of whom be thou ware also; for he hath greatly withstood our words. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'At my first answer no man stood with me, but all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' forsook me: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I pray God
  - type: text
    text: ' that it may not be laid to their charge. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Notwithstanding the Lord stood with me, and strengthened me; that by me the preaching might be fully known, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' all the Gentiles might hear: and I was delivered out of the mouth of the lion. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the Lord shall deliver me from every evil work, and will preserve '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' unto his heavenly kingdom: to whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' glory for ever and ever. Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Salute Prisca and Aquila, and the household of Onesiphorus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Erastus abode at Corinth: but Trophimus have I left at Miletum sick. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Do thy diligence to come before winter.
- type: usfm
  marker: p
  children:
  - type: text
    text: Eubulus greeteth thee, and Pudens, and Linus, and Claudia, and all the brethren.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The Lord Jesus Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with thy spirit. Grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with you. Amen.'
- type: usfm
  marker: iex
  children:
  - type: text
    text: The second epistle unto Timotheus, ordained the first bishop of the church of the Ephesians, was written from Rome, when Paul was brought before Nero the second time.
