document_id: 2KI.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Athaliah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Athaliah the mother of Ahaziah saw that her son was dead, she arose and destroyed all the seed royal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to the captains over hundreds did the priest give king David''s spears and shields, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the guard stood, every man with his weapons in his hand, round about the king, from the right corner of the temple to the left corner of the temple, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: along
    - type: text
      text: ' by the altar and the temple. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought forth the king''s son, and put the crown upon him, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: gave him
    - type: text
      text: ' the testimony; and they made him king, and anointed him; and they clapped their hands, and said, God save the king.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Athaliah heard the noise of the guard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' of the people, she came to the people into the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she looked, behold, the king stood by a pillar, as the manner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ', and the princes and the trumpeters by the king, and all the people of the land rejoiced, and blew with trumpets: and Athaliah rent her clothes, and cried, Treason, Treason. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoiada the priest commanded the captains of the hundreds, the officers of the host, and said unto them, Have her forth without the ranges: and him that followeth her kill with the sword. For the priest had said, Let her not be slain in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they laid hands on her; and she went by the way by the which the horses came into the king''s house: and there was she slain.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoiada made a covenant between the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' and the king and the people, that they should be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s people; between the king also and the people. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people of the land went into the house of Baal, and brake it down; his altars and his images brake they in pieces thoroughly, and slew Mattan the priest of Baal before the altars. And the priest appointed officers over the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took the rulers over hundreds, and the captains, and the guard, and all the people of the land; and they brought down the king from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and came by the way of the gate of the guard to the king''s house. And he sat on the throne of the kings. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehosheba, the daughter of king Joram, sister of Ahaziah, took Joash the son of Ahaziah, and stole him from among the king''s sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' slain; and they hid him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' him and his nurse, in the bedchamber from Athaliah, so that he was not slain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people of the land rejoiced, and the city was in quiet: and they slew Athaliah with the sword '
    - type: usfm
      marker: add
      children:
      - type: text
        text: beside
    - type: text
      text: ' the king''s house. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seven years old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehoash when he began to reign.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he was with her hid in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' six years. And Athaliah did reign over the land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the seventh year Jehoiada sent and fetched the rulers over hundreds, with the captains and the guard, and brought them to him into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and made a covenant with them, and took an oath of them in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and shewed them the king''s son. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he commanded them, saying, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing that ye shall do; A third part of you that enter in on the sabbath shall even be keepers of the watch of the king''s house; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a third part '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' at the gate of Sur; and a third part at the gate behind the guard: so shall ye keep the watch of the house, that it be not broken down. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And two parts of all you that go forth on the sabbath, even they shall keep the watch of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' about the king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall compass the king round about, every man with his weapons in his hand: and he that cometh within the ranges, let him be slain: and be ye with the king as he goeth out and as he cometh in. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the captains over the hundreds did according to all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' that Jehoiada the priest commanded: and they took every man his men that were to come in on the sabbath, with them that should go out on the sabbath, and came to Jehoiada the priest.'
