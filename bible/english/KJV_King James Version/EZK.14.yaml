  '7':
  - type: text
    content: 'For every one of the house of Israel, or of the stranger that sojourneth in Israel, which separateth himself from me, and setteth up his idols in his heart, and putteth the stumblingblock of his iniquity before his face, and cometh to a prophet to enquire of him concerning me; I the '
  - type: text
    content: LORD
  - type: text
    content: ' will answer him by myself: '
