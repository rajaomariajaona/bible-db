document_id: ECC.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep thy foot when thou goest to the house of God, and be more ready to hear, than to give the sacrifice of fools: for they consider not that they do evil. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that loveth silver shall not be satisfied with silver; nor he that loveth abundance with increase: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also vanity. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When goods increase, they are increased that eat them: and what good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' to the owners thereof, saving the beholding '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of them
    - type: text
      text: ' with their eyes? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sleep of a labouring man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sweet, whether he eat little or much: but the abundance of the rich will not suffer him to sleep.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is a sore evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' I have seen under the sun, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', riches kept for the owners thereof to their hurt. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But those riches perish by evil travail: and he begetteth a son, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' nothing in his hand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he came forth of his mother''s womb, naked shall he return to go as he came, and shall take nothing of his labour, which he may carry away in his hand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a sore evil, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' in all points as he came, so shall he go: and what profit hath he that hath laboured for the wind? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All his days also he eateth in darkness, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he hath
    - type: text
      text: ' much sorrow and wrath with his sickness.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which I have seen: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' good and comely '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for one
    - type: text
      text: ' to eat and to drink, and to enjoy the good of all his labour that he taketh under the sun all the days of his life, which God giveth him: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his portion. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every man also to whom God hath given riches and wealth, and hath given him power to eat thereof, and to take his portion, and to rejoice in his labour; this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the gift of God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be not rash with thy mouth, and let not thine heart be hasty to utter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' thing before God: for God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in heaven, and thou upon earth: therefore let thy words be few. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he shall not much remember the days of his life; because God answereth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' in the joy of his heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a dream cometh through the multitude of business; and a fool''s voice '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is known
    - type: text
      text: ' by multitude of words. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When thou vowest a vow unto God, defer not to pay it; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he hath
    - type: text
      text: ' no pleasure in fools: pay that which thou hast vowed. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' that thou shouldest not vow, than that thou shouldest vow and not pay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suffer not thy mouth to cause thy flesh to sin; neither say thou before the angel, that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' an error: wherefore should God be angry at thy voice, and destroy the work of thine hands? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in the multitude of dreams and many words '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there are
    - type: text
      text: ' also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: divers
    - type: text
      text: ' vanities: but fear thou God.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If thou seest the oppression of the poor, and violent perverting of judgment and justice in a province, marvel not at the matter: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' higher than the highest regardeth; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' higher than they. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the profit of the earth is for all: the king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' is served by the field.'
