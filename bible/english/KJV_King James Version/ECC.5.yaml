document_id: ECC.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Keep thy foot when thou goest to the house of God, and be more ready to hear, than to give the sacrifice of fools: for they consider not that they do evil. '
  '10':
  - type: text
    content: 'He that loveth silver shall not be satisfied with silver; nor he that loveth abundance with increase: this '
  - type: text
    content: is
  - type: text
    content: ' also vanity. '
  '11':
  - type: text
    content: 'When goods increase, they are increased that eat them: and what good '
  - type: text
    content: is there
  - type: text
    content: ' to the owners thereof, saving the beholding '
  - type: text
    content: of them
  - type: text
    content: ' with their eyes? '
  '12':
  - type: text
    content: 'The sleep of a labouring man '
  - type: text
    content: is
  - type: text
    content: ' sweet, whether he eat little or much: but the abundance of the rich will not suffer him to sleep.'
  '13':
  - type: text
    content: 'There is a sore evil '
  - type: text
    content: which
  - type: text
    content: ' I have seen under the sun, '
  - type: text
    content: namely
  - type: text
    content: ', riches kept for the owners thereof to their hurt. '
  '14':
  - type: text
    content: 'But those riches perish by evil travail: and he begetteth a son, and '
  - type: text
    content: there is
  - type: text
    content: ' nothing in his hand. '
  '15':
  - type: text
    content: 'As he came forth of his mother''s womb, naked shall he return to go as he came, and shall take nothing of his labour, which he may carry away in his hand. '
  '16':
  - type: text
    content: 'And this also '
  - type: text
    content: is
  - type: text
    content: ' a sore evil, '
  - type: text
    content: that
  - type: text
    content: ' in all points as he came, so shall he go: and what profit hath he that hath laboured for the wind? '
  '17':
  - type: text
    content: 'All his days also he eateth in darkness, and '
  - type: text
    content: he hath
  - type: text
    content: ' much sorrow and wrath with his sickness.'
  '18':
  - type: text
    content: 'Behold '
  - type: text
    content: that
  - type: text
    content: ' which I have seen: '
  - type: text
    content: it is
  - type: text
    content: ' good and comely '
  - type: text
    content: for one
  - type: text
    content: ' to eat and to drink, and to enjoy the good of all his labour that he taketh under the sun all the days of his life, which God giveth him: for it '
  - type: text
    content: is
  - type: text
    content: ' his portion. '
  '19':
  - type: text
    content: 'Every man also to whom God hath given riches and wealth, and hath given him power to eat thereof, and to take his portion, and to rejoice in his labour; this '
  - type: text
    content: is
  - type: text
    content: ' the gift of God. '
  '2':
  - type: text
    content: 'Be not rash with thy mouth, and let not thine heart be hasty to utter '
  - type: text
    content: any
  - type: text
    content: ' thing before God: for God '
  - type: text
    content: is
  - type: text
    content: ' in heaven, and thou upon earth: therefore let thy words be few. '
  '20':
  - type: text
    content: 'For he shall not much remember the days of his life; because God answereth '
  - type: text
    content: him
  - type: text
    content: ' in the joy of his heart.'
  '3':
  - type: text
    content: 'For a dream cometh through the multitude of business; and a fool''s voice '
  - type: text
    content: is known
  - type: text
    content: ' by multitude of words. '
  '4':
  - type: text
    content: 'When thou vowest a vow unto God, defer not to pay it; for '
  - type: text
    content: he hath
  - type: text
    content: ' no pleasure in fools: pay that which thou hast vowed. '
  '5':
  - type: text
    content: 'Better '
  - type: text
    content: is it
  - type: text
    content: ' that thou shouldest not vow, than that thou shouldest vow and not pay. '
  '6':
  - type: text
    content: 'Suffer not thy mouth to cause thy flesh to sin; neither say thou before the angel, that it '
  - type: text
    content: was
  - type: text
    content: ' an error: wherefore should God be angry at thy voice, and destroy the work of thine hands? '
  '7':
  - type: text
    content: 'For in the multitude of dreams and many words '
  - type: text
    content: there are
  - type: text
    content: ' also '
  - type: text
    content: divers
  - type: text
    content: ' vanities: but fear thou God.'
  '8':
  - type: text
    content: 'If thou seest the oppression of the poor, and violent perverting of judgment and justice in a province, marvel not at the matter: for '
  - type: text
    content: he that is
  - type: text
    content: ' higher than the highest regardeth; and '
  - type: text
    content: there be
  - type: text
    content: ' higher than they. '
  '9':
  - type: text
    content: 'Moreover the profit of the earth is for all: the king '
  - type: text
    content: himself
  - type: text
    content: ' is served by the field.'
