document_id: PRO.15,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'A soft answer turneth away wrath:'
  - type: text
    content: But grievous words stir up anger.
  '10':
  - type: text
    content: 'Correction '
  - type: text
    content: is
  - type: text
    content: ' grievous unto him that forsaketh the way:'
  - type: text
    content: And
  - type: text
    content: ' he that hateth reproof shall die.'
  '11':
  - type: text
    content: 'Hell and destruction '
  - type: text
    content: are
  - type: text
    content: ' before the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: How much more then the hearts of the children of men?
  '12':
  - type: text
    content: 'A scorner loveth not one that reproveth him:'
  - type: text
    content: Neither will he go unto the wise.
  '13':
  - type: text
    content: 'A merry heart maketh a cheerful countenance:'
  - type: text
    content: But by sorrow of the heart the spirit is broken.
  '14':
  - type: text
    content: 'The heart of him that hath understanding seeketh knowledge:'
  - type: text
    content: But the mouth of fools feedeth on foolishness.
  '15':
  - type: text
    content: 'All the days of the afflicted '
  - type: text
    content: are
  - type: text
    content: ' evil:'
  - type: text
    content: 'But he that is of a merry heart '
  - type: text
    content: hath
  - type: text
    content: ' a continual feast.'
  '16':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' little with the fear of the '
  - type: text
    content: LORD
  - type: text
    content: Than great treasure and trouble therewith.
  '17':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' a dinner of herbs where love is,'
  - type: text
    content: Than a stalled ox and hatred therewith.
  '18':
  - type: text
    content: 'A wrathful man stirreth up strife:'
  - type: text
    content: 'But '
  - type: text
    content: he that is
  - type: text
    content: ' slow to anger appeaseth strife.'
  '19':
  - type: text
    content: 'The way of the slothful '
  - type: text
    content: man is
  - type: text
    content: ' as an hedge of thorns:'
  - type: text
    content: 'But the way of the righteous '
  - type: text
    content: is
  - type: text
    content: ' made plain.'
  '2':
  - type: text
    content: 'The tongue of the wise useth knowledge aright:'
  - type: text
    content: But the mouth of fools poureth out foolishness.
  '20':
  - type: text
    content: 'A wise son maketh a glad father:'
  - type: text
    content: But a foolish man despiseth his mother.
  '21':
  - type: text
    content: 'Folly '
  - type: text
    content: is
  - type: text
    content: ' joy to '
  - type: text
    content: him that is
  - type: text
    content: ' destitute of wisdom:'
  - type: text
    content: But a man of understanding walketh uprightly.
  '22':
  - type: text
    content: 'Without counsel purposes are disappointed:'
  - type: text
    content: But in the multitude of counsellors they are established.
  '23':
  - type: text
    content: 'A man hath joy by the answer of his mouth:'
  - type: text
    content: 'And a word '
  - type: text
    content: spoken
  - type: text
    content: ' in due season, how good '
  - type: text
    content: is it!
  '24':
  - type: text
    content: 'The way of life '
  - type: text
    content: is
  - type: text
    content: ' above to the wise,'
  - type: text
    content: That he may depart from hell beneath.
  '25':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will destroy the house of the proud:'
  - type: text
    content: But he will establish the border of the widow.
  '26':
  - type: text
    content: 'The thoughts of the wicked '
  - type: text
    content: are
  - type: text
    content: ' an abomination to the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'But '
  - type: text
    content: the words
  - type: text
    content: ' of the pure '
  - type: text
    content: are
  - type: text
    content: ' pleasant words.'
  '27':
  - type: text
    content: He that is greedy of gain troubleth his own house;
  - type: text
    content: But he that hateth gifts shall live.
  '28':
  - type: text
    content: 'The heart of the righteous studieth to answer:'
  - type: text
    content: But the mouth of the wicked poureth out evil things.
  '29':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' far from the wicked:'
  - type: text
    content: But he heareth the prayer of the righteous.
  '3':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' in every place,'
  - type: text
    content: Beholding the evil and the good.
  '30':
  - type: text
    content: 'The light of the eyes rejoiceth the heart:'
  - type: text
    content: And
  - type: text
    content: ' a good report maketh the bones fat.'
  '31':
  - type: text
    content: The ear that heareth the reproof of life
  - type: text
    content: Abideth among the wise.
  '32':
  - type: text
    content: 'He that refuseth instruction despiseth his own soul:'
  - type: text
    content: But he that heareth reproof getteth understanding.
  '33':
  - type: text
    content: 'The fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the instruction of wisdom;'
  - type: text
    content: 'And before honour '
  - type: text
    content: is
  - type: text
    content: ' humility.'
  '4':
  - type: text
    content: 'A wholesome tongue '
  - type: text
    content: is
  - type: text
    content: ' a tree of life:'
  - type: text
    content: 'But perverseness therein '
  - type: text
    content: is
  - type: text
    content: ' a breach in the spirit.'
  '5':
  - type: text
    content: 'A fool despiseth his father''s instruction:'
  - type: text
    content: But he that regardeth reproof is prudent.
  '6':
  - type: text
    content: 'In the house of the righteous '
  - type: text
    content: is
  - type: text
    content: ' much treasure:'
  - type: text
    content: But in the revenues of the wicked is trouble.
  '7':
  - type: text
    content: 'The lips of the wise disperse knowledge:'
  - type: text
    content: 'But the heart of the foolish '
  - type: text
    content: doeth
  - type: text
    content: ' not so.'
  '8':
  - type: text
    content: 'The sacrifice of the wicked '
  - type: text
    content: is
  - type: text
    content: ' an abomination to the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'But the prayer of the upright '
  - type: text
    content: is
  - type: text
    content: ' his delight.'
  '9':
  - type: text
    content: 'The way of the wicked '
  - type: text
    content: is
  - type: text
    content: ' an abomination unto the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: But he loveth him that followeth after righteousness.
