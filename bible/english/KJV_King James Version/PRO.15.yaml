segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A soft answer turneth away wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But grievous words stir up anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The tongue of the wise useth knowledge aright:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the mouth of fools poureth out foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in every place,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Beholding the evil and the good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A wholesome tongue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a tree of life:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But perverseness therein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a breach in the spirit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A fool despiseth his father''s instruction:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he that regardeth reproof is prudent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In the house of the righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' much treasure:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But in the revenues of the wicked is trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The lips of the wise disperse knowledge:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the heart of the foolish '
  - type: usfm
    marker: add
    children:
    - type: text
      text: doeth
  - type: text
    text: ' not so.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The sacrifice of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the prayer of the upright '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his delight.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The way of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an abomination unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he loveth him that followeth after righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Correction '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' grievous unto him that forsaketh the way:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' he that hateth reproof shall die.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hell and destruction '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How much more then the hearts of the children of men?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A scorner loveth not one that reproveth him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither will he go unto the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A merry heart maketh a cheerful countenance:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But by sorrow of the heart the spirit is broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The heart of him that hath understanding seeketh knowledge:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the mouth of fools feedeth on foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'All the days of the afflicted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' evil:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But he that is of a merry heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' a continual feast.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' little with the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than great treasure and trouble therewith.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a dinner of herbs where love is,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than a stalled ox and hatred therewith.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A wrathful man stirreth up strife:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he that is
  - type: text
    text: ' slow to anger appeaseth strife.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The way of the slothful '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man is
  - type: text
    text: ' as an hedge of thorns:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the way of the righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' made plain.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A wise son maketh a glad father:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a foolish man despiseth his mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Folly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' joy to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' destitute of wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a man of understanding walketh uprightly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Without counsel purposes are disappointed:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But in the multitude of counsellors they are established.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A man hath joy by the answer of his mouth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a word '
  - type: usfm
    marker: add
    children:
    - type: text
      text: spoken
  - type: text
    text: ' in due season, how good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The way of life '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' above to the wise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That he may depart from hell beneath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will destroy the house of the proud:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he will establish the border of the widow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The thoughts of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' an abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the words
  - type: text
    text: ' of the pure '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' pleasant words.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He that is greedy of gain troubleth his own house;
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he that hateth gifts shall live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The heart of the righteous studieth to answer:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the mouth of the wicked poureth out evil things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' far from the wicked:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he heareth the prayer of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The light of the eyes rejoiceth the heart:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' a good report maketh the bones fat.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The ear that heareth the reproof of life
- type: usfm
  marker: q2
  children:
  - type: text
    text: Abideth among the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He that refuseth instruction despiseth his own soul:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he that heareth reproof getteth understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the instruction of wisdom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And before honour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' humility.'
