  - type: text
    content: ' of the sons of Benjamin.'
  '5':
  - type: text
    content: 'and Gera, and Shephuphan, and Huram. '
  '6':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Ehud: these are the heads of the fathers of the inhabitants of Geba, and they removed them to Manahath: '
  '7':
  - type: text
    content: 'and Naaman, and Ahiah, and Gera, he removed them, and begat Uzza, and Ahihud. '
  '8':
  - type: text
    content: 'And Shaharaim begat '
  - type: text
    content: children
  - type: text
    content: ' in the country of Moab, after he had sent them away; Hushim and Baara '
  - type: text
    content: were
  - type: text
    content: ' his wives. '
  '9':
  - type: text
    content: 'And he begat of Hodesh his wife, Jobab, and Zibia, and Mesha, and Malcham, '
