  - type: text
    content: ' Maachah: '
  '3':
  - type: text
    content: 'And the sons of Bela were, Addar, and Gera, and Abihud, '
  '30':
  - type: text
    content: 'and his firstborn son Abdon, and Zur, and Kish, and Baal, and Nadab, '
  '31':
  - type: text
    content: 'and Gedor, and Ahio, and Zacher. '
  '32':
  - type: text
    content: And Mikloth begat Shimeah. And these also dwelt with their brethren in Jerusalem, over against them.
  - type: heading
    content: House of Saul
  '33':
  - type: text
    content: 'And Ner begat Kish, and Kish begat Saul, and Saul begat Jonathan, and Malchi-shua, and Abinadab, and Eshbaal. '
  '34':
  - type: text
    content: 'And the son of Jonathan '
  - type: text
    content: was
  - type: text
    content: ' Merib-baal; and Merib-baal begat Micah. '
  '35':
  - type: text
    content: 'And the sons of Micah '
  - type: text
    content: were
  - type: text
    content: ', Pithon, and Melech, and Tarea, and Ahaz. '
  '36':
  - type: text
    content: 'And Ahaz begat Jehoadah; and Jehoadah begat Alemeth, and Azmaveth, and Zimri; and Zimri begat Moza, '
  '37':
  - type: text
    content: 'and Moza begat Binea: Rapha '
  - type: text
    content: was
  - type: text
    content: ' his son, Eleasah his son, Azel his son: '
  '38':
  - type: text
    content: 'and Azel had six sons, whose names '
  - type: text
    content: are
  - type: text
    content: ' these, Azrikam, Bocheru, and Ishmael, and Sheariah, and Obadiah, and Hanan. All these '
  - type: text
