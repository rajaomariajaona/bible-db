  - type: text
    content: were
  - type: text
    content: ', Ulam his firstborn, Jehush the second, and Eliphelet the third. '
  '4':
  - type: text
    content: 'and Abishua, and Naaman, and Ahoah, '
  '40':
  - type: text
    content: 'And the sons of Ulam were mighty men of valour, archers, and had many sons, and sons'' sons, an hundred and fifty. All these '
  - type: text
