    content: Tribe of Benjamin
  - type: text
    content: 'Now Benjamin begat Bela his firstborn, Ashbel the second, and Aharah the third, '
  '10':
  - type: text
    content: 'and Jeuz, and Shachia, and Mirma. These '
  - type: text
    content: were
  - type: text
    content: ' his sons, heads of the fathers. '
  '11':
  - type: text
    content: 'And of Hushim he begat Abitub, and Elpaal. '
  '12':
  - type: text
    content: 'The sons of Elpaal; Eber, and Misham, and Shamed, who built Ono, and Lod, with the towns thereof: '
  '13':
  - type: text
    content: 'Beriah also, and Shema, who '
  - type: text
    content: were
  - type: text
    content: ' heads of the fathers of the inhabitants of Aijalon, who drove away the inhabitants of Gath: '
  '14':
  - type: text
    content: 'and Ahio, Shashak, and Jeremoth, '
  '15':
  - type: text
    content: 'and Zebadiah, and Arad, and Ader, '
  '16':
  - type: text
    content: 'and Michael, and Ispah, and Joha, the sons of Beriah; '
  '17':
  - type: text
    content: 'and Zebadiah, and Meshullam, and Hezeki, and Heber, '
  '18':
  - type: text
    content: 'Ishmerai also, and Jezliah, and Jobab, the sons of Elpaal; '
  '19':
  - type: text
    content: 'and Jakim, and Zichri, and Zabdi, '
  '2':
  - type: text
    content: 'Nohah the fourth, and Rapha the fifth. '
  '20':
  - type: text
    content: 'and Elienai, and Zilthai, and Eliel, '
  '21':
  - type: text
    content: 'and Adaiah, and Beraiah, and Shimrath, the sons of Shimhi; '
  '22':
  - type: text
    content: 'and Ishpan, and Heber, and Eliel, '
  '23':
  - type: text
    content: 'and Abdon, and Zichri, and Hanan, '
  '24':
  - type: text
    content: 'and Hananiah, and Elam, and Antothijah, '
  '25':
  - type: text
    content: 'and Iphedeiah, and Penuel, the sons of Shashak; '
  '26':
  - type: text
    content: 'and Shamsherai, and Shehariah, and Athaliah, '
  '27':
  - type: text
    content: 'and Jaresiah, and Eliah, and Zichri, the sons of Jeroham. '
  '28':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' heads of the fathers, by their generations, chief '
  - type: text
    content: men
  - type: text
    content: . These dwelt in Jerusalem.
