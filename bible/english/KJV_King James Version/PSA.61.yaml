document_id: PSA.61
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician upon Neginah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear my cry, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Attend unto my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From the end of the earth will I cry unto thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When my heart is overwhelmed:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lead me to the rock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' is higher than I.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For thou hast been a shelter for me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a strong tower from the enemy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will abide in thy tabernacle for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will trust in the covert of thy wings. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For thou, O God, hast heard my vows:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' the heritage of those that fear thy name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thou wilt prolong the king''s life:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' his years as many generations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He shall abide before God for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O prepare mercy and truth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' may preserve him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So will I sing praise unto thy name for ever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That I may daily perform my vows.
