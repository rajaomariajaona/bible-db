document_id: PSA.61,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician upon Neginah, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Hear my cry, O God;
  - type: text
    content: Attend unto my prayer.
  '2':
  - type: text
    content: From the end of the earth will I cry unto thee,
  - type: text
    content: 'When my heart is overwhelmed:'
  - type: text
    content: 'Lead me to the rock '
  - type: text
    content: that
  - type: text
    content: ' is higher than I.'
  '3':
  - type: text
    content: 'For thou hast been a shelter for me, '
  - type: text
    content: and
  - type: text
    content: ' a strong tower from the enemy.'
  '4':
  - type: text
    content: 'I will abide in thy tabernacle for ever:'
  - type: text
    content: 'I will trust in the covert of thy wings. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: 'For thou, O God, hast heard my vows:'
  - type: text
    content: 'Thou hast given '
  - type: text
    content: me
  - type: text
    content: ' the heritage of those that fear thy name.'
  '6':
  - type: text
    content: 'Thou wilt prolong the king''s life:'
  - type: text
    content: And
  - type: text
    content: ' his years as many generations.'
  '7':
  - type: text
    content: 'He shall abide before God for ever:'
  - type: text
    content: 'O prepare mercy and truth, '
  - type: text
    content: which
  - type: text
    content: ' may preserve him.'
  '8':
  - type: text
    content: So will I sing praise unto thy name for ever,
  - type: text
    content: That I may daily perform my vows.
