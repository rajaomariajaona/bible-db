document_id: GEN.25,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Death of Abraham
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then again Abraham took a wife, and her name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Keturah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'the field which Abraham purchased of the sons of Heth: there was Abraham buried, and Sarah his wife. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And it came to pass after the death of Abraham, that God blessed his son Isaac; and Isaac dwelt by the well Lahai-roi.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Ishmael, Abraham''s son, whom Hagar the Egyptian, Sarah''s handmaid, bare unto Abraham: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the sons of Ishmael, by their names, according to their generations: the firstborn of Ishmael, Nebajoth; and Kedar, and Adbeel, and Mibsam, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and Mishma, and Dumah, and Massa, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hadar, and Tema, Jetur, Naphish, and Kedemah: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Ishmael, and these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' their names, by their towns, and by their castles; twelve princes according to their nations. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the years of the life of Ishmael, an hundred and thirty and seven years: and he gave up the ghost and died; and was gathered unto his people.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And they dwelt from Havilah unto Shur, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Egypt, as thou goest toward Assyria: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he died in the presence of all his brethren.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Esau and Jacob
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Isaac, Abraham''s son: Abraham begat Isaac: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And she bare him Zimran, and Jokshan, and Medan, and Midian, and Ishbak, and Shuah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and Isaac was forty years old when he took Rebekah to wife, the daughter of Bethuel the Syrian of Padan-aram, the sister to Laban the Syrian. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Isaac intreated the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for his wife, because she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' barren: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was intreated of him, and Rebekah his wife conceived. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the children struggled together within her; and she said, If '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' so, why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I thus? And she went to enquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto her,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Two nations '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in thy womb,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And two manner of people shall be separated from thy bowels;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the one
    - type: text
      text: ' people shall be stronger than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the other
    - type: text
      text: ' people;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the elder shall serve the younger.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when her days to be delivered were fulfilled, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' twins in her womb. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the first came out red, all over like an hairy garment; and they called his name Esau. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And after that came his brother out, and his hand took hold on Esau''s heel; and his name was called Jacob: and Isaac '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' threescore years old when she bare them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the boys grew: and Esau was a cunning hunter, a man of the field; and Jacob '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a plain man, dwelling in tents. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Isaac loved Esau, because he did eat of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' venison: but Rebekah loved Jacob.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And Jacob sod pottage: and Esau came from the field, and he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' faint: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Jokshan begat Sheba, and Dedan. And the sons of Dedan were Asshurim, and Letushim, and Leummim. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and Esau said to Jacob, Feed me, I pray thee, with that same red '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pottage
    - type: text
      text: '; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' faint: therefore was his name called Edom. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And Jacob said, Sell me this day thy birthright. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And Esau said, Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' at the point to die: and what profit shall this birthright do to me? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And Jacob said, Swear to me this day; and he sware unto him: and he sold his birthright unto Jacob. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then Jacob gave Esau bread and pottage of lentiles; and he did eat and drink, and rose up, and went his way: thus Esau despised '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' birthright.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the sons of Midian; Ephah, and Epher, and Hanoch, and Abidah, and Eldaah. All these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the children of Keturah.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And Abraham gave all that he had unto Isaac. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But unto the sons of the concubines, which Abraham had, Abraham gave gifts, and sent them away from Isaac his son, while he yet lived, eastward, unto the east country. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the days of the years of Abraham''s life which he lived, an hundred threescore and fifteen years. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Abraham gave up the ghost, and died in a good old age, an old man, and full '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of years
    - type: text
      text: '; and was gathered to his people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And his sons Isaac and Ishmael buried him in the cave of Machpelah, in the field of Ephron the son of Zohar the Hittite, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Mamre; '
