document_id: ACT.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Paul's Speech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Agrippa said unto Paul, Thou art permitted to speak for thyself.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Paul stretched forth the hand, and answered for himself: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I think myself happy, king Agrippa, because I shall answer for myself this day before thee touching all the things whereof I am accused of the Jews: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'especially '
  - type: usfm
    marker: add
    children:
    - type: text
      text: because I know
  - type: text
    text: ' thee to be expert in all customs and questions which are among the Jews: wherefore I beseech thee to hear me patiently. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'My manner of life from my youth, which was at the first among mine own nation at Jerusalem, know all the Jews; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'which knew me from the beginning, if they would testify, that after the most straitest sect of our religion I lived a Pharisee. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And now I stand and am judged for the hope of the promise made of God unto our fathers: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'unto which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: promise
  - type: text
    text: ' our twelve tribes, instantly serving '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' day and night, hope to come. For which hope''s sake, king Agrippa, I am accused of the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Why should it be thought a thing incredible with you, that God should raise the dead? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I verily thought with myself, that I ought to do many things contrary to the name of Jesus of Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Which thing I also did in Jerusalem: and many of the saints did I shut up in prison, having received authority from the chief priests; and when they were put to death, I gave my voice against '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I punished them oft in every synagogue, and compelled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to blaspheme; and being exceedingly mad against them, I persecuted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' even unto strange cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Whereupon as I went to Damascus with authority and commission from the chief priests, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'at midday, O king, I saw in the way a light from heaven, above the brightness of the sun, shining round about me and them which journeyed with me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when we were all fallen to the earth, I heard a voice speaking unto me, and saying in the Hebrew tongue, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Saul, Saul, why persecutest thou me? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' hard for thee to kick against the pricks.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I said, Who art thou, Lord? And he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am Jesus whom thou persecutest.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But rise, and stand upon thy feet: for I have appeared unto thee for this purpose, to make thee a minister and a witness both of these things which thou hast seen, and of those things in the which I will appear unto thee;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'delivering thee from the people, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the Gentiles, unto whom now I send thee,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to open their eyes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to turn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' from darkness to light, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the power of Satan unto God, that they may receive forgiveness of sins, and inheritance among them which are sanctified by faith that is in me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Whereupon, O king Agrippa, I was not disobedient unto the heavenly vision: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but shewed first unto them of Damascus, and at Jerusalem, and throughout all the coasts of Judæa, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' to the Gentiles, that they should repent and turn to God, and do works meet for repentance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For these causes the Jews caught me in the temple, and went about to kill '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Having therefore obtained help of God, I continue unto this day, witnessing both to small and great, saying none other things than those which the prophets and Moses did say should come: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'that Christ should suffer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that he should be the first that should rise from the dead, and should shew light unto the people, and to the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And as he thus spake for himself, Festus said with a loud voice, Paul, thou art beside thyself; much learning doth make thee mad.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But he said, I am not mad, most noble Festus; but speak forth the words of truth and soberness. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For the king knoweth of these things, before whom also I speak freely: for I am persuaded that none of these things are hidden from him; for this thing was not done in a corner. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: King Agrippa, believest thou the prophets? I know that thou believest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then Agrippa said unto Paul, Almost thou persuadest me to be a Christian.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And Paul said, I would to God, that not only thou, but also all that hear me this day, were both almost, and altogether such as I am, except these bonds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And when he had thus spoken, the king rose up, and the governor, and Bernice, and they that sat with them: '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and when they were gone aside, they talked between themselves, saying, This man doeth nothing worthy of death or of bonds. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then said Agrippa unto Festus, This man might have been set at liberty, if he had not appealed unto Cæsar.
