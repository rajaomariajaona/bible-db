document_id: PSA.72,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' for Solomon.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give the king thy judgments, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy righteousness unto the king's son.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The kings of Tarshish and of the isles shall bring presents:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The kings of Sheba and Seba shall offer gifts.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yea, all kings shall fall down before him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All nations shall serve him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he shall deliver the needy when he crieth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The poor also, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' that hath no helper.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall spare the poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall save the souls of the needy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall redeem their soul from deceit and violence:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And precious shall their blood be in his sight.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he shall live, and to him shall be given of the gold of Sheba:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Prayer also shall be made for him continually; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' daily shall he be praised.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There shall be an handful of corn in the earth upon the top of the mountains;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The fruit thereof shall shake like Lebanon: And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' of the city shall flourish like grass of the earth.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His name shall endure for ever:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His name shall be continued as long as the sun:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall be blessed in him: All nations shall call him blessed.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who only doeth wondrous things.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' his glorious name for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And let the whole earth be filled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' his glory; Amen, and Amen.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall judge thy people with righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy poor with judgment.
  '20':
  - type: usfm
    marker: iex
    children:
    - type: text
      text: The prayers of David the son of Jesse are ended.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains shall bring peace to the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the little hills, by righteousness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall judge the poor of the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall save the children of the needy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall break in pieces the oppressor.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall fear thee as long as the sun and moon endure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Throughout all generations.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall come down like rain upon the mown grass:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As showers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' water the earth.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his days shall the righteous flourish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And abundance of peace so long as the moon endureth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall have dominion also from sea to sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And from the river unto the ends of the earth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They that dwell in the wilderness shall bow before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his enemies shall lick the dust.
