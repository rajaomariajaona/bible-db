document_id: PSA.72,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm
  - type: text
    content: ' for Solomon.'
  - type: text
    content: Give the king thy judgments, O God,
  - type: text
    content: And thy righteousness unto the king's son.
  '10':
  - type: text
    content: 'The kings of Tarshish and of the isles shall bring presents:'
  - type: text
    content: The kings of Sheba and Seba shall offer gifts.
  '11':
  - type: text
    content: 'Yea, all kings shall fall down before him:'
  - type: text
    content: All nations shall serve him.
  '12':
  - type: text
    content: For he shall deliver the needy when he crieth;
  - type: text
    content: 'The poor also, and '
  - type: text
    content: him
  - type: text
    content: ' that hath no helper.'
  '13':
  - type: text
    content: He shall spare the poor and needy,
  - type: text
    content: And shall save the souls of the needy.
  '14':
  - type: text
    content: 'He shall redeem their soul from deceit and violence:'
  - type: text
    content: And precious shall their blood be in his sight.
  '15':
  - type: text
    content: 'And he shall live, and to him shall be given of the gold of Sheba:'
  - type: text
    content: 'Prayer also shall be made for him continually; '
  - type: text
    content: and
  - type: text
    content: ' daily shall he be praised.'
  '16':
  - type: text
    content: There shall be an handful of corn in the earth upon the top of the mountains;
  - type: text
    content: 'The fruit thereof shall shake like Lebanon: And '
  - type: text
    content: they
  - type: text
    content: ' of the city shall flourish like grass of the earth.'
  '17':
  - type: text
    content: 'His name shall endure for ever:'
  - type: text
    content: 'His name shall be continued as long as the sun:'
  - type: text
    content: 'And '
  - type: text
    content: men
  - type: text
    content: ' shall be blessed in him: All nations shall call him blessed.'
  '18':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' God, the God of Israel,'
  - type: text
    content: Who only doeth wondrous things.
  '19':
  - type: text
    content: 'And blessed '
  - type: text
    content: be
  - type: text
    content: ' his glorious name for ever:'
  - type: text
    content: 'And let the whole earth be filled '
  - type: text
    content: with
  - type: text
    content: ' his glory; Amen, and Amen.'
  '2':
  - type: text
    content: He shall judge thy people with righteousness,
  - type: text
    content: And thy poor with judgment.
  '20':
  - type: text
    content: The prayers of David the son of Jesse are ended.
  '3':
  - type: text
    content: The mountains shall bring peace to the people,
  - type: text
    content: And the little hills, by righteousness.
  '4':
  - type: text
    content: He shall judge the poor of the people,
  - type: text
    content: He shall save the children of the needy,
  - type: text
    content: And shall break in pieces the oppressor.
  '5':
  - type: text
    content: They shall fear thee as long as the sun and moon endure,
  - type: text
    content: Throughout all generations.
  '6':
  - type: text
    content: 'He shall come down like rain upon the mown grass:'
  - type: text
    content: 'As showers '
  - type: text
    content: that
  - type: text
    content: ' water the earth.'
  '7':
  - type: text
    content: In his days shall the righteous flourish;
  - type: text
    content: And abundance of peace so long as the moon endureth.
  '8':
  - type: text
    content: He shall have dominion also from sea to sea,
  - type: text
    content: And from the river unto the ends of the earth.
  '9':
  - type: text
    content: They that dwell in the wilderness shall bow before him;
  - type: text
    content: And his enemies shall lick the dust.
