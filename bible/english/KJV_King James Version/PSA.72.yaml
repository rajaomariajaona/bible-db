document_id: PSA.72
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' for Solomon.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Give the king thy judgments, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy righteousness unto the king's son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He shall judge thy people with righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy poor with judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The mountains shall bring peace to the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the little hills, by righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He shall judge the poor of the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall save the children of the needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shall break in pieces the oppressor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They shall fear thee as long as the sun and moon endure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Throughout all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He shall come down like rain upon the mown grass:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As showers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' water the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In his days shall the righteous flourish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And abundance of peace so long as the moon endureth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He shall have dominion also from sea to sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And from the river unto the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They that dwell in the wilderness shall bow before him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his enemies shall lick the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The kings of Tarshish and of the isles shall bring presents:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The kings of Sheba and Seba shall offer gifts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yea, all kings shall fall down before him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All nations shall serve him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For he shall deliver the needy when he crieth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The poor also, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' that hath no helper.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He shall spare the poor and needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shall save the souls of the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He shall redeem their soul from deceit and violence:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And precious shall their blood be in his sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he shall live, and to him shall be given of the gold of Sheba:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Prayer also shall be made for him continually; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' daily shall he be praised.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: There shall be an handful of corn in the earth upon the top of the mountains;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The fruit thereof shall shake like Lebanon: And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' of the city shall flourish like grass of the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'His name shall endure for ever:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His name shall be continued as long as the sun:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' shall be blessed in him: All nations shall call him blessed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, the God of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who only doeth wondrous things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' his glorious name for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And let the whole earth be filled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' his glory; Amen, and Amen.'
- type: usfm
  marker: iex
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The prayers of David the son of Jesse are ended.
