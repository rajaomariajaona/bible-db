  '16':
  - type: text
    content: 'but was rebuked for his iniquity: the dumb ass speaking with man''s voice forbad the madness of the prophet. '
  '17':
  - type: text
    content: 'These are wells without water, clouds that are carried with a tempest; to whom the mist of darkness is reserved for ever. '
  '18':
  - type: text
    content: 'For when they speak great swelling '
  - type: text
    content: words
  - type: text
    content: ' of vanity, they allure through the lusts of the flesh, '
  - type: text
    content: through much
  - type: text
    content: ' wantonness, those that were clean escaped from them who live in error. '
  '19':
  - type: text
    content: 'While they promise them liberty, they themselves are the servants of corruption: for of whom a man is overcome, of the same is he brought in bondage. '
  '2':
  - type: text
    content: 'And many shall follow their pernicious ways; by reason of whom the way of truth shall be evil spoken of. '
  '20':
  - type: text
    content: 'For if after they have escaped the pollutions of the world through the knowledge of the Lord and Saviour Jesus Christ, they are again entangled therein, and overcome, the latter end is worse with them than the beginning. '
  '21':
  - type: text
    content: 'For it had been better for them not to have known the way of righteousness, than, after they have known '
  - type: text
    content: it
  - type: text
    content: ', to turn from the holy commandment delivered unto them. '
  '22':
  - type: text
    content: 'But it is happened unto them according to the true proverb, The dog '
  - type: text
    content: is
  - type: text
    content: ' turned to his own vomit again; and the sow that was washed to her wallowing in the mire.'
  '3':
  - type: text
    content: 'And through covetousness shall they with feigned words make merchandise of you: whose judgment now of a long time lingereth not, and their damnation slumbereth not. '
  '4':
  - type: text
    content: 'For if God spared not the angels that sinned, but cast '
