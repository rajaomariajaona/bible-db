  '1':
  - type: heading
    content: False Teachers
  - type: text
    content: 'But there were false prophets also among the people, even as there shall be false teachers among you, who privily shall bring in damnable heresies, even denying the Lord that bought them, and bring upon themselves swift destruction. '
  '10':
  - type: text
    content: 'but chiefly them that walk after the flesh in the lust of uncleanness, and despise government. Presumptuous '
  - type: text
    content: are they
  - type: text
    content: ', selfwilled, they are not afraid to speak evil of dignities. '
  '11':
  - type: text
    content: Whereas angels, which are greater in power and might, bring not railing accusation against them before the Lord.
  '12':
  - type: text
    content: 'But these, as natural brute beasts, made to be taken and destroyed, speak evil of the things that they understand not; and shall utterly perish in their own corruption; '
  '13':
  - type: text
    content: 'and shall receive the reward of unrighteousness, '
  - type: text
    content: as
  - type: text
    content: ' they that count it pleasure to riot in the daytime. Spots '
  - type: text
    content: they are
  - type: text
    content: ' and blemishes, sporting themselves with their own deceivings while they feast with you; '
  '14':
  - type: text
    content: 'having eyes full of adultery, and that cannot cease from sin; beguiling unstable souls: an heart they have exercised with covetous practices; cursed children: '
  '15':
  - type: text
    content: 'which have forsaken the right way, and are gone astray, following the way of Balaam '
  - type: text
    content: the son
  - type: text
