document_id: 2PE.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: False Teachers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But there were false prophets also among the people, even as there shall be false teachers among you, who privily shall bring in damnable heresies, even denying the Lord that bought them, and bring upon themselves swift destruction. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'but chiefly them that walk after the flesh in the lust of uncleanness, and despise government. Presumptuous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are they
    - type: text
      text: ', selfwilled, they are not afraid to speak evil of dignities. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Whereas angels, which are greater in power and might, bring not railing accusation against them before the Lord.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But these, as natural brute beasts, made to be taken and destroyed, speak evil of the things that they understand not; and shall utterly perish in their own corruption; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and shall receive the reward of unrighteousness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' they that count it pleasure to riot in the daytime. Spots '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' and blemishes, sporting themselves with their own deceivings while they feast with you; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'having eyes full of adultery, and that cannot cease from sin; beguiling unstable souls: an heart they have exercised with covetous practices; cursed children: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'which have forsaken the right way, and are gone astray, following the way of Balaam '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the son
    - type: text
      text: ' of Bosor, who loved the wages of unrighteousness; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'but was rebuked for his iniquity: the dumb ass speaking with man''s voice forbad the madness of the prophet. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'These are wells without water, clouds that are carried with a tempest; to whom the mist of darkness is reserved for ever. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For when they speak great swelling '
    - type: usfm
      marker: add
      children:
      - type: text
        text: words
    - type: text
      text: ' of vanity, they allure through the lusts of the flesh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: through much
    - type: text
      text: ' wantonness, those that were clean escaped from them who live in error. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'While they promise them liberty, they themselves are the servants of corruption: for of whom a man is overcome, of the same is he brought in bondage. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And many shall follow their pernicious ways; by reason of whom the way of truth shall be evil spoken of. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For if after they have escaped the pollutions of the world through the knowledge of the Lord and Saviour Jesus Christ, they are again entangled therein, and overcome, the latter end is worse with them than the beginning. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For it had been better for them not to have known the way of righteousness, than, after they have known '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', to turn from the holy commandment delivered unto them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But it is happened unto them according to the true proverb, The dog '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' turned to his own vomit again; and the sow that was washed to her wallowing in the mire.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And through covetousness shall they with feigned words make merchandise of you: whose judgment now of a long time lingereth not, and their damnation slumbereth not. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For if God spared not the angels that sinned, but cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' down to hell, and delivered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' into chains of darkness, to be reserved unto judgment; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and spared not the old world, but saved Noah the eighth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: person
    - type: text
      text: ', a preacher of righteousness, bringing in the flood upon the world of the ungodly; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and turning the cities of Sodom and Gomorrha into ashes condemned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with an overthrow, making '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' an ensample unto those that after should live ungodly; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and delivered just Lot, vexed with the filthy conversation of the wicked: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '(for that righteous man dwelling among them, in seeing and hearing, vexed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' righteous soul from day to day with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' unlawful deeds;) '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'the Lord knoweth how to deliver the godly out of temptations, and to reserve the unjust unto the day of judgment to be punished: '
