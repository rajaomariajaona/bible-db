document_id: 2KI.20
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hezekiah's Sickness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days was Hezekiah sick unto death. And the prophet Isaiah the son of Amoz came to him, and said unto him, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Set thine house in order; for thou shalt die, and not live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then he turned his face to the wall, and prayed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I beseech thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', remember now how I have walked before thee in truth and with a perfect heart, and have done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' good in thy sight. And Hezekiah wept sore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it came to pass, afore Isaiah was gone out into the middle court, that the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came to him, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Turn again, and tell Hezekiah the captain of my people, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of David thy father, I have heard thy prayer, I have seen thy tears: behold, I will heal thee: on the third day thou shalt go up unto the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I will add unto thy days fifteen years; and I will deliver thee and this city out of the hand of the king of Assyria; and I will defend this city for mine own sake, and for my servant David''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Isaiah said, Take a lump of figs. And they took and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on the boil, and he recovered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Hezekiah said unto Isaiah, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the sign that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will heal me, and that I shall go up into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the third day? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Isaiah said, This sign shalt thou have of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will do the thing that he hath spoken: shall the shadow go forward ten degrees, or go back ten degrees? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Hezekiah answered, It is a light thing for the shadow to go down ten degrees: nay, but let the shadow return backward ten degrees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Isaiah the prophet cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and he brought the shadow ten degrees backward, by which it had gone down in the dial of Ahaz.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Letters from Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At that time Berodach-baladan, the son of Baladan, king of Babylon, sent letters and a present unto Hezekiah: for he had heard that Hezekiah had been sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Hezekiah hearkened unto them, and shewed them all the house of his precious things, the silver, and the gold, and the spices, and the precious ointment, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the house of his armour, and all that was found in his treasures: there was nothing in his house, nor in all his dominion, that Hezekiah shewed them not.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Isaiah's Prophecy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then came Isaiah the prophet unto king Hezekiah, and said unto him, What said these men? and from whence came they unto thee? And Hezekiah said, They are come from a far country, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' from Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said, What have they seen in thine house? And Hezekiah answered, All '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the things
  - type: text
    text: ' that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in mine house have they seen: there is nothing among my treasures that I have not shewed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Isaiah said unto Hezekiah, Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Behold, the days come, that all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thine house, and that which thy fathers have laid up in store unto this day, shall be carried into Babylon: nothing shall be left, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And of thy sons that shall issue from thee, which thou shalt beget, shall they take away; and they shall be eunuchs in the palace of the king of Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then said Hezekiah unto Isaiah, Good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which thou hast spoken. And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: good
  - type: text
    text: ', if peace and truth be in my days?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the rest of the acts of Hezekiah, and all his might, and how he made a pool, and a conduit, and brought water into the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the chronicles of the kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Hezekiah slept with his fathers: and Manasseh his son reigned in his stead.'
