document_id: PSA.20
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hear thee in the day of trouble;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The name of the God of Jacob defend thee;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Send thee help from the sanctuary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And strengthen thee out of Zion;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Remember all thy offerings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And accept thy burnt sacrifice; '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Grant thee according to thine own heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And fulfil all thy counsel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'We will rejoice in thy salvation, and in the name of our God we will set up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' banners:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' fulfil all thy petitions.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now know I that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saveth his anointed; He will hear him from his holy heaven'
- type: usfm
  marker: q2
  children:
  - type: text
    text: With the saving strength of his right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Some '
  - type: usfm
    marker: add
    children:
    - type: text
      text: trust
  - type: text
    text: ' in chariots, and some in horses:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But we will remember the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They are brought down and fallen:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But we are risen, and stand upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Save, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the king hear us when we call.
