document_id: PSA.20,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hear thee in the day of trouble;'
  - type: text
    content: The name of the God of Jacob defend thee;
  '2':
  - type: text
    content: Send thee help from the sanctuary,
  - type: text
    content: And strengthen thee out of Zion;
  '3':
  - type: text
    content: Remember all thy offerings,
  - type: text
    content: 'And accept thy burnt sacrifice; '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: Grant thee according to thine own heart,
  - type: text
    content: And fulfil all thy counsel.
  '5':
  - type: text
    content: 'We will rejoice in thy salvation, and in the name of our God we will set up '
  - type: text
    content: our
  - type: text
    content: ' banners:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' fulfil all thy petitions.'
  '6':
  - type: text
    content: 'Now know I that the '
  - type: text
    content: LORD
  - type: text
    content: ' saveth his anointed; He will hear him from his holy heaven'
  - type: text
    content: With the saving strength of his right hand.
  '7':
  - type: text
    content: 'Some '
  - type: text
    content: trust
  - type: text
    content: ' in chariots, and some in horses:'
  - type: text
    content: 'But we will remember the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God.'
  '8':
  - type: text
    content: 'They are brought down and fallen:'
  - type: text
    content: But we are risen, and stand upright.
  '9':
  - type: text
    content: 'Save, '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Let the king hear us when we call.
