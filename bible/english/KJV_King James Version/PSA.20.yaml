document_id: PSA.20,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hear thee in the day of trouble;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The name of the God of Jacob defend thee;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send thee help from the sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strengthen thee out of Zion;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember all thy offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And accept thy burnt sacrifice; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grant thee according to thine own heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fulfil all thy counsel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We will rejoice in thy salvation, and in the name of our God we will set up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' banners:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' fulfil all thy petitions.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now know I that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saveth his anointed; He will hear him from his holy heaven'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the saving strength of his right hand.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Some '
    - type: usfm
      marker: add
      children:
      - type: text
        text: trust
    - type: text
      text: ' in chariots, and some in horses:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But we will remember the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are brought down and fallen:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But we are risen, and stand upright.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the king hear us when we call.
