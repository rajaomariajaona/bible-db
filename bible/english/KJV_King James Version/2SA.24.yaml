verses:
  '1':
  - type: heading
    content: Numbering the People
  - type: text
    content: 'And again the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was kindled against Israel, and he moved David against them to say, Go, number Israel and Judah. '
  '10':
  - type: text
    content: 'And David''s heart smote him after that he had numbered the people. And David said unto the '
  - type: text
    content: LORD
  - type: text
    content: ', I have sinned greatly in that I have done: and now, I beseech thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', take away the iniquity of thy servant; for I have done very foolishly. '
  '11':
  - type: text
    content: 'For when David was up in the morning, the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto the prophet Gad, David''s seer, saying, '
  '12':
  - type: text
    content: 'Go and say unto David, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', I offer thee three '
  - type: text
    content: things
  - type: text
    content: '; choose thee one of them, that I may do '
  - type: text
    content: it
  - type: text
    content: ' unto thee. '
  '13':
  - type: text
    content: 'So Gad came to David, and told him, and said unto him, Shall seven years of famine come unto thee in thy land? or wilt thou flee three months before thine enemies, while they pursue thee? or that there be three days'' pestilence in thy land? now advise, and see what answer I shall return to him that sent me. '
  '14':
  - type: text
    content: 'And David said unto Gad, I am in a great strait: let us fall now into the hand of the '
  - type: text
    content: LORD
  - type: text
    content: '; for his mercies '
  - type: text
    content: are
  - type: text
    content: ' great: and let me not fall into the hand of man.'
  '15':
  - type: text
    content: 'So the '
  - type: text
    content: LORD
  - type: text
    content: ' sent a pestilence upon Israel from the morning even to the time appointed: and there died of the people from Dan even to Beer-sheba seventy thousand men. '
  '16':
  - type: text
    content: 'And when the angel stretched out his hand upon Jerusalem to destroy it, the '
  - type: text
    content: LORD
  - type: text
    content: ' repented him of the evil, and said to the angel that destroyed the people, It is enough: stay now thine hand. And the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' was by the threshingplace of Araunah the Jebusite. '
  '17':
  - type: text
    content: 'And David spake unto the '
  - type: text
    content: LORD
  - type: text
    content: ' when he saw the angel that smote the people, and said, Lo, I have sinned, and I have done wickedly: but these sheep, what have they done? let thine hand, I pray thee, be against me, and against my father''s house.'
  - type: heading
    content: An Altar unto the Lord
  '18':
  - type: text
    content: 'And Gad came that day to David, and said unto him, Go up, rear an altar unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in the threshingfloor of Araunah the Jebusite. '
  '19':
  - type: text
    content: 'And David, according to the saying of Gad, went up as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded. '
  '2':
  - type: text
    content: 'For the king said to Joab the captain of the host, which '
  - type: text
    content: was
  - type: text
    content: ' with him, Go now through all the tribes of Israel, from Dan even to Beer-sheba, and number ye the people, that I may know the number of the people. '
  '20':
  - type: text
    content: 'And Araunah looked, and saw the king and his servants coming on toward him: and Araunah went out, and bowed himself before the king on his face upon the ground. '
  '21':
  - type: text
    content: 'And Araunah said, Wherefore is my lord the king come to his servant? And David said, To buy the threshingfloor of thee, to build an altar unto the '
  - type: text
    content: LORD
  - type: text
    content: ', that the plague may be stayed from the people. '
  '22':
  - type: text
    content: 'And Araunah said unto David, Let my lord the king take and offer up what '
  - type: text
    content: seemeth
  - type: text
    content: ' good unto him: behold, '
  - type: text
    content: here be
  - type: text
    content: ' oxen for burnt sacrifice, and threshing instruments and '
  - type: text
    content: other
  - type: text
    content: ' instruments of the oxen for wood. '
  '23':
  - type: text
    content: 'All these '
  - type: text
    content: things
  - type: text
    content: ' did Araunah, '
  - type: text
    content: as
  - type: text
    content: ' a king, give unto the king. And Araunah said unto the king, The '
  - type: text
    content: LORD
  - type: text
    content: ' thy God accept thee. '
  '24':
  - type: text
    content: 'And the king said unto Araunah, Nay; but I will surely buy '
  - type: text
    content: it
  - type: text
    content: ' of thee at a price: neither will I offer burnt offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: ' my God of that which doth cost me nothing. So David bought the threshingfloor and the oxen for fifty shekels of silver. '
  '25':
  - type: text
    content: 'And David built there an altar unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and offered burnt offerings and peace offerings. So the '
  - type: text
    content: LORD
  - type: text
    content: ' was intreated for the land, and the plague was stayed from Israel.'
  '3':
  - type: text
    content: 'And Joab said unto the king, Now the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God add unto the people, how many soever they be, an hundredfold, and that the eyes of my lord the king may see '
  - type: text
    content: 'it:'
  - type: text
    content: ' but why doth my lord the king delight in this thing? '
  '4':
  - type: text
    content: 'Notwithstanding the king''s word prevailed against Joab, and against the captains of the host. And Joab and the captains of the host went out from the presence of the king, to number the people of Israel. '
  '5':
  - type: text
    content: 'And they passed over Jordan, and pitched in Aroer, on the right side of the city that '
  - type: text
    content: lieth
  - type: text
    content: ' in the midst of the river of Gad, and toward Jazer: '
  '6':
  - type: text
    content: 'then they came to Gilead, and to the land of Tahtim-hodshi; and they came to Dan-jaan, and about to Zidon, '
  '7':
  - type: text
    content: 'and came to the strong hold of Tyre, and to all the cities of the Hivites, and of the Canaanites: and they went out to the south of Judah, '
  - type: text
    content: even
  - type: text
    content: ' to Beer-sheba. '
  '8':
  - type: text
    content: 'So when they had gone through all the land, they came to Jerusalem at the end of nine months and twenty days. '
  '9':
  - type: text
    content: 'And Joab gave up the sum of the number of the people unto the king: and there were in Israel eight hundred thousand valiant men that drew the sword; and the men of Judah '
  - type: text
    content: were
  - type: text
    content: ' five hundred thousand men.'
