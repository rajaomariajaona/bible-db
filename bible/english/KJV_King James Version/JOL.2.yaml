document_id: JOL.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Blow ye the trumpet in Zion, and sound an alarm in my holy mountain: let all the inhabitants of the land tremble: for the day of the '
  - type: text
    content: LORD
  - type: text
    content: ' cometh, for '
  - type: text
    content: it is
  - type: text
    content: ' nigh at hand; '
  '10':
  - type: text
    content: 'The earth shall quake before them; the heavens shall tremble: the sun and the moon shall be dark, and the stars shall withdraw their shining: '
  '11':
  - type: text
    content: 'and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall utter his voice before his army: for his camp '
  - type: text
    content: is
  - type: text
    content: ' very great: for '
  - type: text
    content: he is
  - type: text
    content: ' strong that executeth his word: for the day of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' great and very terrible; and who can abide it?'
  '12':
  - type: text
    content: 'Therefore also now, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', turn ye '
  - type: text
    content: even
  - type: text
    content: ' to me with all your heart, and with fasting, and with weeping, and with mourning: '
  '13':
  - type: text
    content: 'and rend your heart, and not your garments, and turn unto the '
  - type: text
    content: LORD
  - type: text
    content: ' your God: for he '
  - type: text
    content: is
  - type: text
    content: ' gracious and merciful, slow to anger, and of great kindness, and repenteth him of the evil. '
  '14':
  - type: text
    content: 'Who knoweth '
  - type: text
    content: if
  - type: text
    content: ' he will return and repent, and leave a blessing behind him; '
  - type: text
    content: even
  - type: text
    content: ' a meat offering and a drink offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' your God?'
  '15':
  - type: text
    content: 'Blow the trumpet in Zion, sanctify a fast, call a solemn assembly: '
  '16':
  - type: text
    content: 'gather the people, sanctify the congregation, assemble the elders, gather the children, and those that suck the breasts: let the bridegroom go forth of his chamber, and the bride out of her closet. '
  '17':
  - type: text
    content: 'Let the priests, the ministers of the '
  - type: text
    content: LORD
  - type: text
    content: ', weep between the porch and the altar, and let them say, Spare thy people, O '
  - type: text
    content: LORD
  - type: text
    content: ', and give not thine heritage to reproach, that the heathen should rule over them: wherefore should they say among the people, Where '
  - type: text
    content: is
  - type: text
    content: ' their God?'
  '18':
  - type: text
    content: 'Then will the '
  - type: text
    content: LORD
  - type: text
    content: ' be jealous for his land, and pity his people. '
  '19':
  - type: text
    content: 'Yea, the '
  - type: text
    content: LORD
  - type: text
    content: ' will answer and say unto his people, Behold, I will send you corn, and wine, and oil, and ye shall be satisfied therewith: and I will no more make you a reproach among the heathen: '
  '2':
  - type: text
    content: 'a day of darkness and of gloominess, a day of clouds and of thick darkness, as the morning spread upon the mountains: a great people and a strong; there hath not been ever the like, neither shall be any more after it, '
  - type: text
    content: even
  - type: text
    content: ' to the years of many generations. '
  '20':
  - type: text
    content: 'but I will remove far off from you the northern '
  - type: text
    content: army
  - type: text
    content: ', and will drive him into a land barren and desolate, with his face toward the east sea, and his hinder part toward the utmost sea, and his stink shall come up, and his ill savour shall come up, because he hath done great things.'
  '21':
  - type: text
    content: 'Fear not, O land; be glad and rejoice: for the '
  - type: text
    content: LORD
  - type: text
    content: ' will do great things. '
  '22':
  - type: text
    content: 'Be not afraid, ye beasts of the field: for the pastures of the wilderness do spring, for the tree beareth her fruit, the fig tree and the vine do yield their strength. '
  '23':
  - type: text
    content: 'Be glad then, ye children of Zion, and rejoice in the '
  - type: text
    content: LORD
  - type: text
    content: ' your God: for he hath given you the former rain moderately, and he will cause to come down for you the rain, the former rain, and the latter rain in the first '
  - type: text
    content: month
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'And the floors shall be full of wheat, and the fats shall overflow with wine and oil. '
  '25':
  - type: text
    content: 'And I will restore to you the years that the locust hath eaten, the cankerworm, and the caterpiller, and the palmerworm, my great army which I sent among you. '
  '26':
  - type: text
    content: 'And ye shall eat in plenty, and be satisfied, and praise the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, that hath dealt wondrously with you: and my people shall never be ashamed. '
  '27':
  - type: text
    content: 'And ye shall know that I '
  - type: text
    content: am
  - type: text
    content: ' in the midst of Israel, and '
  - type: text
    content: that
  - type: text
    content: ' I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and none else: and my people shall never be ashamed.'
  '28':
  - type: text
    content: 'And it shall come to pass afterward, '
  - type: text
    content: that
  - type: text
    content: ' I will pour out my spirit upon all flesh; and your sons and your daughters shall prophesy, your old men shall dream dreams, your young men shall see visions: '
  '29':
  - type: text
    content: and also upon the servants and upon the handmaids in those days will I pour out my spirit.
  '3':
  - type: text
    content: 'A fire devoureth before them; and behind them a flame burneth: the land '
  - type: text
    content: is
  - type: text
    content: ' as the garden of Eden before them, and behind them a desolate wilderness; yea, and nothing shall escape them.'
  '30':
  - type: text
    content: 'And I will shew wonders in the heavens and in the earth, blood, and fire, and pillars of smoke. '
  '31':
  - type: text
    content: 'The sun shall be turned into darkness, and the moon into blood, before the great and the terrible day of the '
  - type: text
    content: LORD
  - type: text
    content: ' come. '
  '32':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' whosoever shall call on the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be delivered: for in mount Zion and in Jerusalem shall be deliverance, as the '
  - type: text
    content: LORD
  - type: text
    content: ' hath said, and in the remnant whom the '
  - type: text
    content: LORD
  - type: text
    content: ' shall call.'
  '4':
  - type: text
    content: 'The appearance of them '
  - type: text
    content: is
  - type: text
    content: ' as the appearance of horses; and as horsemen, so shall they run. '
  '5':
  - type: text
    content: 'Like the noise of chariots on the tops of mountains shall they leap, like the noise of a flame of fire that devoureth the stubble, as a strong people set in battle array. '
  '6':
  - type: text
    content: 'Before their face the people shall be much pained: all faces shall gather blackness. '
  '7':
  - type: text
    content: 'They shall run like mighty men; they shall climb the wall like men of war; and they shall march every one on his ways, and they shall not break their ranks: '
  '8':
  - type: text
    content: 'neither shall one thrust another; they shall walk every one in his path: and '
  - type: text
    content: when
  - type: text
    content: ' they fall upon the sword, they shall not be wounded. '
  '9':
  - type: text
    content: 'They shall run to and fro in the city; they shall run upon the wall, they shall climb up upon the houses; they shall enter in at the windows like a thief. '
