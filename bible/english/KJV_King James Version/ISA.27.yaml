document_id: ISA.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with his sore and great and strong sword shall punish leviathan the piercing serpent, even leviathan that crooked serpent; and he shall slay the dragon that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the sea.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet the defenced city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' desolate, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the habitation forsaken, and left like a wilderness: there shall the calf feed, and there shall he lie down, and consume the branches thereof. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the boughs thereof are withered, they shall be broken off: the women come, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' set them on fire: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a people of no understanding: therefore he that made them will not have mercy on them, and he that formed them will shew them no favour.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall beat off from the channel of the river unto the stream of Egypt, and ye shall be gathered one by one, O ye children of Israel.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the great trumpet shall be blown, and they shall come which were ready to perish in the land of Assyria, and the outcasts in the land of Egypt, and shall worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the holy mount at Jerusalem.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day sing ye unto her, A vineyard of red wine. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' do keep it; I will water it every moment: lest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' hurt it, I will keep it night and day. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fury '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not in me: who would set the briers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thorns against me in battle? I would go through them, I would burn them together. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or let him take hold of my strength, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he may make peace with me; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he shall make peace with me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall cause them that come of Jacob to take root: Israel shall blossom and bud, and fill the face of the world with fruit.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hath he smitten him, as he smote those that smote him? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' is he slain according to the slaughter of them that are slain by him? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In measure, when it shooteth forth, thou wilt debate with it: he stayeth his rough wind in the day of the east wind. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this therefore shall the iniquity of Jacob be purged; and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' all the fruit to take away his sin; when he maketh all the stones of the altar as chalkstones that are beaten in sunder, the groves and images shall not stand up. '
