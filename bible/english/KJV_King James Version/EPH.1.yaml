document_id: EPH.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, an apostle of Jesus Christ by the will of God, to the saints which are at Ephesus, and to the faithful in Christ Jesus: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to you, and peace, from God our Father, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' the Lord Jesus Christ.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Gospel of Your Salvation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the God and Father of our Lord Jesus Christ, who hath blessed us with all spiritual blessings in heavenly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' in Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'according as he hath chosen us in him before the foundation of the world, that we should be holy and without blame before him in love: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'having predestinated us unto the adoption of children by Jesus Christ to himself, according to the good pleasure of his will, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'to the praise of the glory of his grace, wherein he hath made us accepted in the beloved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In whom we have redemption through his blood, the forgiveness of sins, according to the riches of his grace; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'wherein he hath abounded toward us in all wisdom and prudence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'having made known unto us the mystery of his will, according to his good pleasure which he hath purposed in himself: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that in the dispensation of the fulness of times he might gather together in one all things in Christ, both which are in heaven, and which are on earth; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' in him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'in whom also we have obtained an inheritance, being predestinated according to the purpose of him who worketh all things after the counsel of his own will: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'that we should be to the praise of his glory, who first trusted in Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In whom ye also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: trusted
  - type: text
    text: ', after that ye heard the word of truth, the gospel of your salvation: in whom also after that ye believed, ye were sealed with that holy Spirit of promise, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: which is the earnest of our inheritance until the redemption of the purchased possession, unto the praise of his glory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Wherefore I also, after I heard of your faith in the Lord Jesus, and love unto all the saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'cease not to give thanks for you, making mention of you in my prayers; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that the God of our Lord Jesus Christ, the Father of glory, may give unto you the spirit of wisdom and revelation in the knowledge of him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the eyes of your understanding being enlightened; that ye may know what is the hope of his calling, and what the riches of the glory of his inheritance in the saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the exceeding greatness of his power to us-ward who believe, according to the working of his mighty power, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'which he wrought in Christ, when he raised him from the dead, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' at his own right hand in the heavenly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'far above all principality, and power, and might, and dominion, and every name that is named, not only in this world, but also in that which is to come: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and hath put all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' under his feet, and gave him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' the head over all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' to the church, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: which is his body, the fulness of him that filleth all in all.
