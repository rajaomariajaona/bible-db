verses:
  '1':
  - type: text
    content: 'Paul, an apostle of Jesus Christ by the will of God, to the saints which are at Ephesus, and to the faithful in Christ Jesus: '
  '10':
  - type: text
    content: 'that in the dispensation of the fulness of times he might gather together in one all things in Christ, both which are in heaven, and which are on earth; '
  - type: text
    content: even
  - type: text
    content: ' in him: '
  '11':
  - type: text
    content: 'in whom also we have obtained an inheritance, being predestinated according to the purpose of him who worketh all things after the counsel of his own will: '
  '12':
  - type: text
    content: 'that we should be to the praise of his glory, who first trusted in Christ. '
  '13':
  - type: text
    content: 'In whom ye also '
  - type: text
    content: trusted
  - type: text
    content: ', after that ye heard the word of truth, the gospel of your salvation: in whom also after that ye believed, ye were sealed with that holy Spirit of promise, '
  '14':
  - type: text
    content: which is the earnest of our inheritance until the redemption of the purchased possession, unto the praise of his glory.
  '15':
  - type: text
    content: 'Wherefore I also, after I heard of your faith in the Lord Jesus, and love unto all the saints, '
  '16':
  - type: text
    content: 'cease not to give thanks for you, making mention of you in my prayers; '
  '17':
  - type: text
    content: 'that the God of our Lord Jesus Christ, the Father of glory, may give unto you the spirit of wisdom and revelation in the knowledge of him: '
  '18':
  - type: text
    content: 'the eyes of your understanding being enlightened; that ye may know what is the hope of his calling, and what the riches of the glory of his inheritance in the saints, '
  '19':
  - type: text
    content: 'and what '
  - type: text
    content: is
  - type: text
    content: ' the exceeding greatness of his power to us-ward who believe, according to the working of his mighty power, '
  '2':
  - type: text
    content: 'grace '
  - type: text
    content: be
  - type: text
    content: ' to you, and peace, from God our Father, and '
  - type: text
    content: from
  - type: text
    content: ' the Lord Jesus Christ.'
  - type: heading
    content: The Gospel of Your Salvation
  '20':
  - type: text
    content: 'which he wrought in Christ, when he raised him from the dead, and set '
  - type: text
    content: him
  - type: text
    content: ' at his own right hand in the heavenly '
  - type: text
    content: places
  - type: text
    content: ', '
  '21':
  - type: text
    content: 'far above all principality, and power, and might, and dominion, and every name that is named, not only in this world, but also in that which is to come: '
  '22':
  - type: text
    content: 'and hath put all '
  - type: text
    content: things
  - type: text
    content: ' under his feet, and gave him '
  - type: text
    content: to be
  - type: text
    content: ' the head over all '
  - type: text
    content: things
  - type: text
    content: ' to the church, '
  '23':
  - type: text
    content: which is his body, the fulness of him that filleth all in all.
  '3':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the God and Father of our Lord Jesus Christ, who hath blessed us with all spiritual blessings in heavenly '
  - type: text
    content: places
  - type: text
    content: ' in Christ: '
  '4':
  - type: text
    content: 'according as he hath chosen us in him before the foundation of the world, that we should be holy and without blame before him in love: '
  '5':
  - type: text
    content: 'having predestinated us unto the adoption of children by Jesus Christ to himself, according to the good pleasure of his will, '
  '6':
  - type: text
    content: 'to the praise of the glory of his grace, wherein he hath made us accepted in the beloved. '
  '7':
  - type: text
    content: 'In whom we have redemption through his blood, the forgiveness of sins, according to the riches of his grace; '
  '8':
  - type: text
    content: 'wherein he hath abounded toward us in all wisdom and prudence; '
  '9':
  - type: text
    content: 'having made known unto us the mystery of his will, according to his good pleasure which he hath purposed in himself: '
