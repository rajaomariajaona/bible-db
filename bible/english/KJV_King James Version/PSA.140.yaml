verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm of David.
  - type: text
    content: 'Deliver me, O '
  - type: text
    content: LORD
  - type: text
    content: ', from the evil man:'
  - type: text
    content: Preserve me from the violent man;
  '10':
  - type: text
    content: 'Let burning coals fall upon them:'
  - type: text
    content: Let them be cast into the fire; Into deep pits, that they rise not up again.
  '11':
  - type: text
    content: 'Let not an evil speaker be established in the earth:'
  - type: text
    content: 'Evil shall hunt the violent man to overthrow '
  - type: text
    content: him
  - type: text
    content: .
  '12':
  - type: text
    content: 'I know that the '
  - type: text
    content: LORD
  - type: text
    content: ' will maintain the cause of the afflicted,'
  - type: text
    content: And
  - type: text
    content: ' the right of the poor.'
  '13':
  - type: text
    content: 'Surely the righteous shall give thanks unto thy name:'
  - type: text
    content: The upright shall dwell in thy presence.
  '2':
  - type: text
    content: 'Which imagine mischiefs in '
  - type: text
    content: their
  - type: text
    content: ' heart;'
  - type: text
    content: 'Continually are they gathered together '
  - type: text
    content: for
  - type: text
    content: ' war.'
  '3':
  - type: text
    content: They have sharpened their tongues like a serpent;
  - type: text
    content: 'Adders'' poison '
  - type: text
    content: is
  - type: text
    content: ' under their lips. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: 'Keep me, O '
  - type: text
    content: LORD
  - type: text
    content: ', from the hands of the wicked;'
  - type: text
    content: Preserve me from the violent man; Who have purposed to overthrow my goings.
  '5':
  - type: text
    content: The proud have hid a snare for me, and cords; They have spread a net by the wayside;
  - type: text
    content: 'They have set gins for me. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: 'I said unto the '
  - type: text
    content: LORD
  - type: text
    content: ', Thou '
  - type: text
    content: art
  - type: text
    content: ' my God:'
  - type: text
    content: 'Hear the voice of my supplications, O '
  - type: text
    content: LORD
  - type: text
    content: .
  '7':
  - type: text
    content: 'O '
  - type: text
    content: GOD
  - type: text
    content: ' the Lord, the strength of my salvation,'
  - type: text
    content: Thou hast covered my head in the day of battle.
  '8':
  - type: text
    content: 'Grant not, O '
  - type: text
    content: LORD
  - type: text
    content: ', the desires of the wicked:'
  - type: text
    content: 'Further not his wicked device; '
  - type: text
    content: lest
  - type: text
    content: ' they exalt themselves. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' the head of those that compass me about,'
  - type: text
    content: Let the mischief of their own lips cover them.
