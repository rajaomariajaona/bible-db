document_id: PSA.140,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deliver me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', from the evil man:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Preserve me from the violent man;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let burning coals fall upon them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be cast into the fire; Into deep pits, that they rise not up again.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let not an evil speaker be established in the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Evil shall hunt the violent man to overthrow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will maintain the cause of the afflicted,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the right of the poor.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely the righteous shall give thanks unto thy name:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The upright shall dwell in thy presence.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which imagine mischiefs in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Continually are they gathered together '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' war.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have sharpened their tongues like a serpent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Adders'' poison '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' under their lips. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Keep me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', from the hands of the wicked;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Preserve me from the violent man; Who have purposed to overthrow my goings.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The proud have hid a snare for me, and cords; They have spread a net by the wayside;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They have set gins for me. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I said unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Hear the voice of my supplications, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' the Lord, the strength of my salvation,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast covered my head in the day of battle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Grant not, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the desires of the wicked:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Further not his wicked device; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lest
    - type: text
      text: ' they exalt themselves. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' the head of those that compass me about,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the mischief of their own lips cover them.
