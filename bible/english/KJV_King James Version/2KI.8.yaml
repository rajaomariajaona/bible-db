  '11':
  - type: text
    content: 'And he settled his countenance stedfastly, until he was ashamed: and the man of God wept. '
  '12':
  - type: text
    content: 'And Hazael said, Why weepeth my lord? And he answered, Because I know the evil that thou wilt do unto the children of Israel: their strong holds wilt thou set on fire, and their young men wilt thou slay with the sword, and wilt dash their children, and rip up their women with child. '
  '13':
  - type: text
