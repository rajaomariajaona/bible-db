  - type: text
    content: 'Then spake Elisha unto the woman, whose son he had restored to life, saying, Arise, and go thou and thine household, and sojourn wheresoever thou canst sojourn: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath called for a famine; and it shall also come upon the land seven years. '
