  '28':
  - type: text
    content: 'And he went with Joram the son of Ahab to the war against Hazael king of Syria in Ramoth-gilead; and the Syrians wounded Joram. '
  '29':
  - type: text
    content: And king Joram went back to be healed in Jezreel of the wounds which the Syrians had given him at Ramah, when he fought against Hazael king of Syria. And Ahaziah the son of Jehoram king of Judah went down to see Joram the son of Ahab in Jezreel, because he was sick.
  '3':
  - type: text
    content: 'And it came to pass at the seven years'' end, that the woman returned out of the land of the Philistines: and she went forth to cry unto the king for her house and for her land. '
  '4':
  - type: text
    content: 'And the king talked with Gehazi the servant of the man of God, saying, Tell me, I pray thee, all the great things that Elisha hath done. '
  '5':
  - type: text
    content: 'And it came to pass, as he was telling the king how he had restored a dead body to life, that, behold, the woman, whose son he had restored to life, cried to the king for her house and for her land. And Gehazi said, My lord, O king, this '
  - type: text
    content: is
  - type: text
    content: ' the woman, and this '
  - type: text
    content: is
  - type: text
    content: ' her son, whom Elisha restored to life. '
  '6':
  - type: text
    content: 'And when the king asked the woman, she told him. So the king appointed unto her a certain officer, saying, Restore all that '
  - type: text
    content: was
  - type: text
    content: ' her''s, and all the fruits of the field since the day that she left the land, even until now.'
  - type: heading
    content: Elisha and Hazael
  '7':
  - type: text
    content: 'And Elisha came to Damascus; and Ben-hadad the king of Syria was sick; and it was told him, saying, The man of God is come hither. '
  '8':
  - type: text
    content: 'And the king said unto Hazael, Take a present in thine hand, and go, meet the man of God, and enquire of the '
  - type: text
    content: LORD
  - type: text
    content: ' by him, saying, Shall I recover of this disease? '
  '9':
  - type: text
    content: 'So Hazael went to meet him, and took a present with him, even of every good thing of Damascus, forty camels'' burden, and came and stood before him, and said, Thy son Ben-hadad king of Syria hath sent me to thee, saying, Shall I recover of this disease? '
