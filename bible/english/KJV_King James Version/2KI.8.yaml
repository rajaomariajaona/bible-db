  '2':
  - type: text
    content: 'And the woman arose, and did after the saying of the man of God: and she went with her household, and sojourned in the land of the Philistines seven years. '
  '20':
  - type: text
    content: 'In his days Edom revolted from under the hand of Judah, and made a king over themselves. '
  '21':
  - type: text
    content: 'So Joram went over to Zair, and all the chariots with him: and he rose by night, and smote the Edomites which compassed him about, and the captains of the chariots: and the people fled into their tents. '
  '22':
  - type: text
    content: 'Yet Edom revolted from under the hand of Judah unto this day. Then Libnah revolted at the same time. '
  '23':
  - type: text
    content: 'And the rest of the acts of Joram, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '24':
  - type: text
    content: 'And Joram slept with his fathers, and was buried with his fathers in the city of David: and Ahaziah his son reigned in his stead.'
  '25':
  - type: text
    content: 'In the twelfth year of Joram the son of Ahab king of Israel did Ahaziah the son of Jehoram king of Judah begin to reign. '
  '26':
  - type: text
    content: 'Two and twenty years old '
  - type: text
    content: was
  - type: text
    content: ' Ahaziah when he began to reign; and he reigned one year in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Athaliah, the daughter of Omri king of Israel. '
