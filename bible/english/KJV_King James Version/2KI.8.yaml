  '17':
  - type: text
    content: 'Thirty and two years old was he when he began to reign; and he reigned eight years in Jerusalem. '
  '18':
  - type: text
    content: 'And he walked in the way of the kings of Israel, as did the house of Ahab: for the daughter of Ahab was his wife: and he did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Yet the '
  - type: text
