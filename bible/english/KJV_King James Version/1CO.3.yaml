document_id: 1CO.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I, brethren, could not speak unto you as unto spiritual, but as unto carnal, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' as unto babes in Christ. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'According to the grace of God which is given unto me, as a wise masterbuilder, I have laid the foundation, and another buildeth thereon. But let every man take heed how he buildeth thereupon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For other foundation can no man lay than that is laid, which is Jesus Christ. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if any man build upon this foundation gold, silver, precious stones, wood, hay, stubble; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'every man''s work shall be made manifest: for the day shall declare it, because it shall be revealed by fire; and the fire shall try every man''s work of what sort it is. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any man''s work abide which he hath built thereupon, he shall receive a reward. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any man''s work shall be burned, he shall suffer loss: but he himself shall be saved; yet so as by fire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Know ye not that ye are the temple of God, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the Spirit of God dwelleth in you? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any man defile the temple of God, him shall God destroy; for the temple of God is holy, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: temple
    - type: text
      text: ' ye are.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let no man deceive himself. If any man among you seemeth to be wise in this world, let him become a fool, that he may be wise. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the wisdom of this world is foolishness with God. For it is written, He taketh the wise in their own craftiness. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have fed you with milk, and not with meat: for hitherto ye were not able '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to bear it
    - type: text
      text: ', neither yet now are ye able.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And again, The Lord knoweth the thoughts of the wise, that they are vain. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let no man glory in men. For all things are your''s; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whether Paul, or Apollos, or Cephas, or the world, or life, or death, or things present, or things to come; all are your''s; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and ye are Christ''s; and Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God''s.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye are yet carnal: for whereas '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' among you envying, and strife, and divisions, are ye not carnal, and walk as men? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For while one saith, I am of Paul; and another, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' of Apollos; are ye not carnal? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who then is Paul, and who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Apollos, but ministers by whom ye believed, even as the Lord gave to every man? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have planted, Apollos watered; but God gave the increase. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then neither is he that planteth any thing, neither he that watereth; but God that giveth the increase. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now he that planteth and he that watereth are one: and every man shall receive his own reward according to his own labour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we are labourers together with God: ye are God''s husbandry, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye are
    - type: text
      text: ' God''s building.'
