document_id: 1JN.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'My little children, these things write I unto you, that ye sin not. And if any man sin, we have an advocate with the Father, Jesus Christ the righteous: '
  '10':
  - type: text
    content: 'He that loveth his brother abideth in the light, and there is none occasion of stumbling in him. '
  '11':
  - type: text
    content: But he that hateth his brother is in darkness, and walketh in darkness, and knoweth not whither he goeth, because that darkness hath blinded his eyes.
  '12':
  - type: text
    content: 'I write unto you, little children, because your sins are forgiven you for his name''s sake. '
  '13':
  - type: text
    content: 'I write unto you, fathers, because ye have known him '
  - type: text
    content: that is
  - type: text
    content: ' from the beginning. I write unto you, young men, because ye have overcome the wicked one. I write unto you, little children, because ye have known the Father. '
  '14':
  - type: text
    content: 'I have written unto you, fathers, because ye have known him '
  - type: text
    content: that is
  - type: text
    content: ' from the beginning. I have written unto you, young men, because ye are strong, and the word of God abideth in you, and ye have overcome the wicked one. '
  '15':
  - type: text
    content: 'Love not the world, neither the things '
  - type: text
    content: that are
  - type: text
    content: ' in the world. If any man love the world, the love of the Father is not in him. '
  '16':
  - type: text
    content: 'For all that '
  - type: text
    content: is
  - type: text
    content: ' in the world, the lust of the flesh, and the lust of the eyes, and the pride of life, is not of the Father, but is of the world. '
  '17':
  - type: text
    content: 'And the world passeth away, and the lust thereof: but he that doeth the will of God abideth for ever.'
  '18':
  - type: text
    content: 'Little children, it is the last time: and as ye have heard that antichrist shall come, even now are there many antichrists; whereby we know that it is the last time. '
  '19':
  - type: text
    content: 'They went out from us, but they were not of us; for if they had been of us, they would '
  - type: text
    content: no doubt
  - type: text
    content: ' have continued with us: but '
  - type: text
    content: they went out
  - type: text
    content: ', that they might be made manifest that they were not all of us. '
  '2':
  - type: text
    content: 'and he is the propitiation for our sins: and not for our''s only, but also for '
  - type: text
    content: the sins of
  - type: text
    content: ' the whole world. '
  '20':
  - type: text
    content: 'But ye have an unction from the Holy One, and ye know all things. '
  '21':
  - type: text
    content: I have not written unto you because ye know not the truth, but because ye know it, and that no lie is of the truth.
  '22':
  - type: text
    content: 'Who is a liar but he that denieth that Jesus is the Christ? He is antichrist, that denieth the Father and the Son. '
  '23':
  - type: text
    content: 'Whosoever denieth the Son, the same hath not the Father: '
  - type: text
    content: (but) he that acknowledgeth the Son hath the Father also
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Let that therefore abide in you, which ye have heard from the beginning. If that which ye have heard from the beginning shall remain in you, ye also shall continue in the Son, and in the Father. '
  '25':
  - type: text
    content: 'And this is the promise that he hath promised us, '
  - type: text
    content: even
  - type: text
    content: ' eternal life.'
  '26':
  - type: text
    content: 'These things have I written unto you concerning them that seduce you. '
  '27':
  - type: text
    content: 'But the anointing which ye have received of him abideth in you, and ye need not that any man teach you: but as the same anointing teacheth you of all things, and is truth, and is no lie, and even as it hath taught you, ye shall abide in him. '
  '28':
  - type: text
    content: 'And now, little children, abide in him; that, when he shall appear, we may have confidence, and not be ashamed before him at his coming. '
  '29':
  - type: text
    content: If ye know that he is righteous, ye know that every one that doeth righteousness is born of him.
  '3':
  - type: text
    content: 'And hereby we do know that we know him, if we keep his commandments. '
  '4':
  - type: text
    content: 'He that saith, I know him, and keepeth not his commandments, is a liar, and the truth is not in him. '
  '5':
  - type: text
    content: 'But whoso keepeth his word, in him verily is the love of God perfected: hereby know we that we are in him. '
  '6':
  - type: text
    content: He that saith he abideth in him ought himself also so to walk, even as he walked.
  '7':
  - type: text
    content: 'Brethren, I write no new commandment unto you, but an old commandment which ye had from the beginning. The old commandment is the word which ye have heard from the beginning. '
  '8':
  - type: text
    content: 'Again, a new commandment I write unto you, which thing is true in him and in you: because the darkness is past, and the true light now shineth.'
  '9':
  - type: text
    content: 'He that saith he is in the light, and hateth his brother, is in darkness even until now. '
