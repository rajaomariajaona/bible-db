    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now there was a man of Benjamin, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Kish, the son of Abiel, the son of Zeror, the son of Bechorath, the son of Aphiah, a Benjamite, a mighty man of power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he had a son, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Saul, a choice young man, and a goodly: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' not among the children of Israel a goodlier person than he: from his shoulders and upward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' higher than any of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the asses of Kish Saul''s father were lost. And Kish said to Saul his son, Take now one of the servants with thee, and arise, go seek the asses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he passed through mount Ephraim, and passed through the land of Shalisha, but they found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not: then they passed through the land of Shalim, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there they were
  - type: text
    text: ' not: and he passed through the land of the Benjamites, but they found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' when they were come to the land of Zuph, Saul said to his servant that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him, Come, and let us return; lest my father leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: caring
  - type: text
    text: ' for the asses, and take thought for us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said unto him, Behold now, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' in this city a man of God, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' an honourable man; all that he saith cometh surely to pass: now let us go thither; peradventure he can shew us our way that we should go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then said Saul to his servant, But, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' we go, what shall we bring the man? for the bread is spent in our vessels, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' not a present to bring to the man of God: what have we? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the servant answered Saul again, and said, Behold, I have here at hand the fourth part of a shekel of silver: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' will I give to the man of God, to tell us our way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '(Beforetime in Israel, when a man went to enquire of God, thus he spake, Come, and let us go to the seer: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he that is
  - type: text
    text: ' now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: called
  - type: text
    text: ' a Prophet was beforetime called a Seer.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then said Saul to his servant, Well said; come, let us go. So they went unto the city where the man of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' as they went up the hill to the city, they found young maidens going out to draw water, and said unto them, Is the seer here? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they answered them, and said, He is; behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' before you: make haste now, for he came to day to the city; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a sacrifice of the people to day in the high place: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'as soon as ye be come into the city, ye shall straightway find him, before he go up to the high place to eat: for the people will not eat until he come, because he doth bless the sacrifice; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' afterwards they eat that be bidden. Now therefore get you up; for about this time ye shall find him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they went up into the city: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' when they were come into the city, behold, Samuel came out against them, for to go up to the high place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had told Samuel in his ear a day before Saul came, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'To morrow about this time I will send thee a man out of the land of Benjamin, and thou shalt anoint him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' captain over my people Israel, that he may save my people out of the hand of the Philistines: for I have looked upon my people, because their cry is come unto me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when Samuel saw Saul, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Behold the man whom I spake to thee of! this same shall reign over my people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Saul drew near to Samuel in the gate, and said, Tell me, I pray thee, where the seer''s house '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Samuel answered Saul, and said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the seer: go up before me unto the high place; for ye shall eat with me to day, and to morrow I will let thee go, and will tell thee all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thine heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And as for thine asses that were lost three days ago, set not thy mind on them; for they are found. And on whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' all the desire of Israel? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' not on thee, and on all thy father''s house? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Saul answered and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' not I a Benjamite, of the smallest of the tribes of Israel? and my family the least of all the families of the tribe of Benjamin? wherefore then speakest thou so to me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Samuel took Saul and his servant, and brought them into the parlour, and made them sit in the chiefest place among them that were bidden, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' about thirty persons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Samuel said unto the cook, Bring the portion which I gave thee, of which I said unto thee, Set it by thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the cook took up the shoulder, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon it, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' before Saul. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Samuel
  - type: text
    text: ' said, Behold that which is left! set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' before thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' eat: for unto this time hath it been kept for thee since I said, I have invited the people. So Saul did eat with Samuel that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when they were come down from the high place into the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Samuel
  - type: text
    text: ' communed with Saul upon the top of the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they arose early: and it came to pass about the spring of the day, that Samuel called Saul to the top of the house, saying, Up, that I may send thee away. And Saul arose, and they went out both of them, he and Samuel, abroad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' as they were going down to the end of the city, Samuel said to Saul, Bid the servant pass on before us, (and he passed on,) but stand thou still a while, that I may shew thee the word of God.'
