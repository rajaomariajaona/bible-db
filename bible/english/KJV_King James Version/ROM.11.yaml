  - type: text
    content: ' the riches of the world, and the diminishing of them the riches of the Gentiles; how much more their fulness?'
  '13':
  - type: text
    content: 'For I speak to you Gentiles, inasmuch as I am the apostle of the Gentiles, I magnify mine office: '
  '14':
