document_id: ROM.11
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Divine Purpose in It
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I say then, Hath God cast away his people? God forbid. For I also am an Israelite, of the seed of Abraham, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the tribe of Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'God hath not cast away his people which he foreknew. Wot ye not what the scripture saith of Elias? how he maketh intercession to God against Israel, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lord, they have killed thy prophets, and digged down thine altars; and I am left alone, and they seek my life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But what saith the answer of God unto him? I have reserved to myself seven thousand men, who have not bowed the knee to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the image of
  - type: text
    text: ' Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Even so then at this present time also there is a remnant according to the election of grace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And if by grace, then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' no more of works: otherwise grace is no more grace. But if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' of works, then is it no more grace: otherwise work is no more work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'What then? Israel hath not obtained that which he seeketh for; but the election hath obtained it, and the rest were blinded '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: (according as it is written, God hath given them the spirit of slumber, eyes that they should not see, and ears that they should not hear;) unto this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And David saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let their table be made a snare, and a trap,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And a stumblingblock, and a recompence unto them:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let their eyes be darkened, that they may not see,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bow down their back alway.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I say then, Have they stumbled that they should fall? God forbid: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: rather
  - type: text
    text: ' through their fall salvation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is come
  - type: text
    text: ' unto the Gentiles, for to provoke them to jealousy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now if the fall of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the riches of the world, and the diminishing of them the riches of the Gentiles; how much more their fulness?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I speak to you Gentiles, inasmuch as I am the apostle of the Gentiles, I magnify mine office: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'if by any means I may provoke to emulation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them which are
  - type: text
    text: ' my flesh, and might save some of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For if the casting away of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the reconciling of the world, what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' the receiving '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them be
  - type: text
    text: ', but life from the dead? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For if the firstfruit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' holy, the lump '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: holy
  - type: text
    text: ': and if the root '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' holy, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the branches.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Grafted Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And if some of the branches be broken off, and thou, being a wild olive tree, wert graffed in among them, and with them partakest of the root and fatness of the olive tree; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: boast not against the branches. But if thou boast, thou bearest not the root, but the root thee.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Thou wilt say then, The branches were broken off, that I might be graffed in.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Well; because of unbelief they were broken off, and thou standest by faith. Be not highminded, but fear: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'for if God spared not the natural branches, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: take heed
  - type: text
    text: ' lest he also spare not thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Behold therefore the goodness and severity of God: on them which fell, severity; but toward thee, goodness, if thou continue in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' goodness: otherwise thou also shalt be cut off. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they also, if they abide not still in unbelief, shall be graffed in: for God is able to graff them in again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For if thou wert cut out of the olive tree which is wild by nature, and wert graffed contrary to nature into a good olive tree: how much more shall these, which be the natural '
  - type: usfm
    marker: add
    children:
    - type: text
      text: branches
  - type: text
    text: ', be graffed into their own olive tree?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For I would not, brethren, that ye should be ignorant of this mystery, lest ye should be wise in your own conceits; that blindness in part is happened to Israel, until the fulness of the Gentiles be come in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And so all Israel shall be saved: as it is written,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: There shall come out of Sion the Deliverer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And shall turn away ungodliness from Jacob:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my covenant unto them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I shall take away their sins.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'As concerning the gospel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' enemies for your sakes: but as touching the election, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' beloved for the fathers'' sakes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For the gifts and calling of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' without repentance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For as ye in times past have not believed God, yet have now obtained mercy through their unbelief: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'even so have these also now not believed, that through your mercy they also may obtain mercy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For God hath concluded them all in unbelief, that he might have mercy upon all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'O the depth of the riches both of the wisdom and knowledge of God! how unsearchable '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his judgments, and his ways past finding out!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'For who hath known the mind of the Lord? or who hath been his counsellor? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Or who hath first given to him, and it shall be recompensed unto him again? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For of him, and through him, and to him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all things: to whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' glory for ever. Amen.'
