  - type: heading
    content: The Grafted Tree
  '17':
  - type: text
    content: 'And if some of the branches be broken off, and thou, being a wild olive tree, wert graffed in among them, and with them partakest of the root and fatness of the olive tree; '
  '18':
  - type: text
    content: boast not against the branches. But if thou boast, thou bearest not the root, but the root thee.
  '19':
  - type: text
    content: Thou wilt say then, The branches were broken off, that I might be graffed in.
  '2':
  - type: text
    content: 'God hath not cast away his people which he foreknew. Wot ye not what the scripture saith of Elias? how he maketh intercession to God against Israel, saying, '
  '20':
  - type: text
    content: 'Well; because of unbelief they were broken off, and thou standest by faith. Be not highminded, but fear: '
  '21':
  - type: text
    content: 'for if God spared not the natural branches, '
  - type: text
    content: take heed
  - type: text
    content: ' lest he also spare not thee. '
  '22':
  - type: text
    content: 'Behold therefore the goodness and severity of God: on them which fell, severity; but toward thee, goodness, if thou continue in '
  - type: text
    content: his
  - type: text
    content: ' goodness: otherwise thou also shalt be cut off. '
  '23':
  - type: text
    content: 'And they also, if they abide not still in unbelief, shall be graffed in: for God is able to graff them in again. '
  '24':
  - type: text
    content: 'For if thou wert cut out of the olive tree which is wild by nature, and wert graffed contrary to nature into a good olive tree: how much more shall these, which be the natural '
  - type: text
    content: branches
  - type: text
    content: ', be graffed into their own olive tree?'
  '25':
  - type: text
    content: 'For I would not, brethren, that ye should be ignorant of this mystery, lest ye should be wise in your own conceits; that blindness in part is happened to Israel, until the fulness of the Gentiles be come in. '
  '26':
  - type: text
    content: 'And so all Israel shall be saved: as it is written,'
  - type: text
    content: There shall come out of Sion the Deliverer,
  - type: text
    content: 'And shall turn away ungodliness from Jacob:'
  '27':
  - type: text
    content: 'For this '
  - type: text
    content: is
  - type: text
    content: ' my covenant unto them,'
  - type: text
    content: When I shall take away their sins.
  '28':
  - type: text
    content: 'As concerning the gospel, '
  - type: text
    content: they are
  - type: text
    content: ' enemies for your sakes: but as touching the election, '
  - type: text
    content: they are
  - type: text
    content: ' beloved for the fathers'' sakes. '
  '29':
  - type: text
    content: 'For the gifts and calling of God '
  - type: text
    content: are
  - type: text
    content: ' without repentance. '
  '3':
  - type: text
    content: 'Lord, they have killed thy prophets, and digged down thine altars; and I am left alone, and they seek my life. '
  '30':
  - type: text
    content: 'For as ye in times past have not believed God, yet have now obtained mercy through their unbelief: '
  '31':
  - type: text
    content: 'even so have these also now not believed, that through your mercy they also may obtain mercy. '
  '32':
  - type: text
    content: 'For God hath concluded them all in unbelief, that he might have mercy upon all. '
  '33':
  - type: text
    content: 'O the depth of the riches both of the wisdom and knowledge of God! how unsearchable '
  - type: text
    content: are
  - type: text
    content: ' his judgments, and his ways past finding out!'
  '34':
  - type: text
    content: 'For who hath known the mind of the Lord? or who hath been his counsellor? '
  '35':
  - type: text
    content: 'Or who hath first given to him, and it shall be recompensed unto him again? '
  '36':
  - type: text
    content: 'For of him, and through him, and to him, '
  - type: text
    content: are
  - type: text
    content: ' all things: to whom '
  - type: text
    content: be
  - type: text
    content: ' glory for ever. Amen.'
  '4':
  - type: text
    content: 'But what saith the answer of God unto him? I have reserved to myself seven thousand men, who have not bowed the knee to '
  - type: text
    content: the image of
  - type: text
    content: ' Baal. '
  '5':
  - type: text
    content: 'Even so then at this present time also there is a remnant according to the election of grace. '
  '6':
  - type: text
    content: 'And if by grace, then '
  - type: text
    content: is it
  - type: text
    content: ' no more of works: otherwise grace is no more grace. But if '
  - type: text
    content: it be
  - type: text
    content: ' of works, then is it no more grace: otherwise work is no more work. '
  '7':
  - type: text
    content: 'What then? Israel hath not obtained that which he seeketh for; but the election hath obtained it, and the rest were blinded '
  '8':
  - type: text
    content: (according as it is written, God hath given them the spirit of slumber, eyes that they should not see, and ears that they should not hear;) unto this day.
  '9':
  - type: text
    content: And David saith,
  - type: text
    content: Let their table be made a snare, and a trap,
  - type: text
    content: 'And a stumblingblock, and a recompence unto them:'
