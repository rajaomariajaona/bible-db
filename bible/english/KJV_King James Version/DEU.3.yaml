document_id: DEU.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then we turned, and went up the way to Bashan: and Og the king of Bashan came out against us, he and all his people, to battle at Edrei. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, Fear him not: for I will deliver him, and all his people, and his land, into thy hand; and thou shalt do unto him as thou didst unto Sihon king of the Amorites, which dwelt at Heshbon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God delivered into our hands Og also, the king of Bashan, and all his people: and we smote him until none was left to him remaining. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And we took all his cities at that time, there was not a city which we took not from them, threescore cities, all the region of Argob, the kingdom of Og in Bashan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All these cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fenced with high walls, gates, and bars; beside unwalled towns a great many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And we utterly destroyed them, as we did unto Sihon king of Heshbon, utterly destroying the men, women, and children, of every city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But all the cattle, and the spoil of the cities, we took for a prey to ourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And we took at that time out of the hand of the two kings of the Amorites the land that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' on this side Jordan, from the river of Arnon unto mount Hermon; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: (
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' Hermon the Sidonians call Sirion; and the Amorites call it Shenir;) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'all the cities of the plain, and all Gilead, and all Bashan, unto Salchah and Edrei, cities of the kingdom of Og in Bashan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For only Og king of Bashan remained of the remnant of giants; behold, his bedstead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a bedstead of iron; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it not in Rabbath of the children of Ammon? nine cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the length thereof, and four cubits the breadth of it, after the cubit of a man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And this land, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' we possessed at that time, from Aroer, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the river Arnon, and half mount Gilead, and the cities thereof, gave I unto the Reubenites and to the Gadites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the rest of Gilead, and all Bashan, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' the kingdom of Og, gave I unto the half tribe of Manasseh; all the region of Argob, with all Bashan, which was called the land of giants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jair the son of Manasseh took all the country of Argob unto the coasts of Geshuri and Maachathi; and called them after his own name, Bashan-havoth-jair, unto this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I gave Gilead unto Machir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And unto the Reubenites and unto the Gadites I gave from Gilead even unto the river Arnon half the valley, and the border even unto the river Jabbok, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' the border of the children of Ammon; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the plain also, and Jordan, and the coast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', from Chinnereth even unto the sea of the plain, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the salt sea, under Ashdoth-pisgah eastward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And I commanded you at that time, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath given you this land to possess it: ye shall pass over armed before your brethren the children of Israel, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' meet for the war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But your wives, and your little ones, and your cattle, (
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' I know that ye have much cattle,) shall abide in your cities which I have given you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have given rest unto your brethren, as well as unto you, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: until
  - type: text
    text: ' they also possess the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath given them beyond Jordan: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' shall ye return every man unto his possession, which I have given you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I commanded Joshua at that time, saying, Thine eyes have seen all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath done unto these two kings: so shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' do unto all the kingdoms whither thou passest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ye shall not fear them: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God he shall fight for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And I besought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' at that time, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'O Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', thou hast begun to shew thy servant thy greatness, and thy mighty hand: for what God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' in heaven or in earth, that can do according to thy works, and according to thy might? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I pray thee, let me go over, and see the good land that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' beyond Jordan, that goodly mountain, and Lebanon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was wroth with me for your sakes, and would not hear me: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, Let it suffice thee; speak no more unto me of this matter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Get thee up into the top of Pisgah, and lift up thine eyes westward, and northward, and southward, and eastward, and behold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with thine eyes: for thou shalt not go over this Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But charge Joshua, and encourage him, and strengthen him: for he shall go over before this people, and he shall cause them to inherit the land which thou shalt see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So we abode in the valley over against Beth-peor.
