verses:
  '1':
  - type: text
    content: 'Then we turned, and went up the way to Bashan: and Og the king of Bashan came out against us, he and all his people, to battle at Edrei. '
  '10':
  - type: text
    content: 'all the cities of the plain, and all Gilead, and all Bashan, unto Salchah and Edrei, cities of the kingdom of Og in Bashan. '
  '11':
  - type: text
    content: 'For only Og king of Bashan remained of the remnant of giants; behold, his bedstead '
  - type: text
    content: was
  - type: text
    content: ' a bedstead of iron; '
  - type: text
    content: is
  - type: text
    content: ' it not in Rabbath of the children of Ammon? nine cubits '
  - type: text
    content: was
  - type: text
    content: ' the length thereof, and four cubits the breadth of it, after the cubit of a man.'
  '12':
  - type: text
    content: 'And this land, '
  - type: text
    content: which
  - type: text
    content: ' we possessed at that time, from Aroer, which '
  - type: text
    content: is
  - type: text
    content: ' by the river Arnon, and half mount Gilead, and the cities thereof, gave I unto the Reubenites and to the Gadites. '
  '13':
  - type: text
    content: 'And the rest of Gilead, and all Bashan, '
  - type: text
    content: being
  - type: text
    content: ' the kingdom of Og, gave I unto the half tribe of Manasseh; all the region of Argob, with all Bashan, which was called the land of giants. '
  '14':
  - type: text
    content: 'Jair the son of Manasseh took all the country of Argob unto the coasts of Geshuri and Maachathi; and called them after his own name, Bashan-havoth-jair, unto this day. '
  '15':
  - type: text
    content: 'And I gave Gilead unto Machir. '
  '16':
  - type: text
    content: 'And unto the Reubenites and unto the Gadites I gave from Gilead even unto the river Arnon half the valley, and the border even unto the river Jabbok, '
  - type: text
    content: which is
  - type: text
    content: ' the border of the children of Ammon; '
  '17':
  - type: text
    content: 'the plain also, and Jordan, and the coast '
  - type: text
    content: thereof
  - type: text
    content: ', from Chinnereth even unto the sea of the plain, '
  - type: text
    content: even
  - type: text
    content: ' the salt sea, under Ashdoth-pisgah eastward.'
  '18':
  - type: text
    content: 'And I commanded you at that time, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath given you this land to possess it: ye shall pass over armed before your brethren the children of Israel, all '
  - type: text
    content: that are
  - type: text
    content: ' meet for the war. '
  '19':
  - type: text
    content: But your wives, and your little ones, and your cattle, (
  - type: text
    content: for
  - type: text
    content: ' I know that ye have much cattle,) shall abide in your cities which I have given you; '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Fear him not: for I will deliver him, and all his people, and his land, into thy hand; and thou shalt do unto him as thou didst unto Sihon king of the Amorites, which dwelt at Heshbon. '
  '20':
  - type: text
    content: 'until the '
  - type: text
    content: LORD
  - type: text
    content: ' have given rest unto your brethren, as well as unto you, and '
  - type: text
    content: until
  - type: text
    content: ' they also possess the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath given them beyond Jordan: and '
  - type: text
    content: then
  - type: text
    content: ' shall ye return every man unto his possession, which I have given you. '
  '21':
  - type: text
    content: 'And I commanded Joshua at that time, saying, Thine eyes have seen all that the '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath done unto these two kings: so shall the '
  - type: text
    content: LORD
  - type: text
    content: ' do unto all the kingdoms whither thou passest. '
  '22':
  - type: text
    content: 'Ye shall not fear them: for the '
  - type: text
    content: LORD
  - type: text
    content: ' your God he shall fight for you.'
  '23':
  - type: text
    content: 'And I besought the '
  - type: text
    content: LORD
  - type: text
    content: ' at that time, saying, '
  '24':
  - type: text
    content: 'O Lord '
  - type: text
    content: GOD
  - type: text
    content: ', thou hast begun to shew thy servant thy greatness, and thy mighty hand: for what God '
  - type: text
    content: is there
  - type: text
    content: ' in heaven or in earth, that can do according to thy works, and according to thy might? '
  '25':
  - type: text
    content: 'I pray thee, let me go over, and see the good land that '
  - type: text
    content: is
  - type: text
    content: ' beyond Jordan, that goodly mountain, and Lebanon. '
  '26':
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' was wroth with me for your sakes, and would not hear me: and the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Let it suffice thee; speak no more unto me of this matter. '
  '27':
  - type: text
    content: 'Get thee up into the top of Pisgah, and lift up thine eyes westward, and northward, and southward, and eastward, and behold '
  - type: text
    content: it
  - type: text
    content: ' with thine eyes: for thou shalt not go over this Jordan. '
  '28':
  - type: text
    content: 'But charge Joshua, and encourage him, and strengthen him: for he shall go over before this people, and he shall cause them to inherit the land which thou shalt see. '
  '29':
  - type: text
    content: So we abode in the valley over against Beth-peor.
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: LORD
  - type: text
    content: ' our God delivered into our hands Og also, the king of Bashan, and all his people: and we smote him until none was left to him remaining. '
  '4':
  - type: text
    content: 'And we took all his cities at that time, there was not a city which we took not from them, threescore cities, all the region of Argob, the kingdom of Og in Bashan. '
  '5':
  - type: text
    content: 'All these cities '
  - type: text
    content: were
  - type: text
    content: ' fenced with high walls, gates, and bars; beside unwalled towns a great many. '
  '6':
  - type: text
    content: 'And we utterly destroyed them, as we did unto Sihon king of Heshbon, utterly destroying the men, women, and children, of every city. '
  '7':
  - type: text
    content: 'But all the cattle, and the spoil of the cities, we took for a prey to ourselves. '
  '8':
  - type: text
    content: 'And we took at that time out of the hand of the two kings of the Amorites the land that '
  - type: text
    content: was
  - type: text
    content: ' on this side Jordan, from the river of Arnon unto mount Hermon; '
  '9':
  - type: text
    content: (
  - type: text
    content: which
  - type: text
    content: ' Hermon the Sidonians call Sirion; and the Amorites call it Shenir;) '
