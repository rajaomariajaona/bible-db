document_id: EST.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Mordecai perceived all that was done, Mordecai rent his clothes, and put on sackcloth with ashes, and went out into the midst of the city, and cried with a loud and a bitter cry; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again Esther spake unto Hatach, and gave him commandment unto Mordecai; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'all the king''s servants, and the people of the king''s provinces, do know, that whosoever, whether man or woman, shall come unto the king into the inner court, who is not called, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' one law of his to put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to death, except such to whom the king shall hold out the golden sceptre, that he may live: but I have not been called to come in unto the king these thirty days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they told to Mordecai Esther's words.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Mordecai commanded to answer Esther, Think not with thyself that thou shalt escape in the king''s house, more than all the Jews. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if thou altogether holdest thy peace at this time, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' shall there enlargement and deliverance arise to the Jews from another place; but thou and thy father''s house shall be destroyed: and who knoweth whether thou art come to the kingdom for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such
    - type: text
      text: ' a time as this?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Esther bade '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' return Mordecai '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this answer
    - type: text
      text: ', '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go, gather together all the Jews that are present in Shushan, and fast ye for me, and neither eat nor drink three days, night or day: I also and my maidens will fast likewise; and so will I go in unto the king, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not according to the law: and if I perish, I perish. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Mordecai went his way, and did according to all that Esther had commanded him.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and came even before the king''s gate: for none '
    - type: usfm
      marker: add
      children:
      - type: text
        text: might
    - type: text
      text: ' enter into the king''s gate clothed with sackcloth. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in every province, whithersoever the king''s commandment and his decree came, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' great mourning among the Jews, and fasting, and weeping, and wailing; and many lay in sackcloth and ashes.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Esther''s maids and her chamberlains came and told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' her. Then was the queen exceedingly grieved; and she sent raiment to clothe Mordecai, and to take away his sackcloth from him: but he received '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then called Esther for Hatach, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of the king''s chamberlains, whom he had appointed to attend upon her, and gave him a commandment to Mordecai, to know what it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ', and why it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hatach went forth to Mordecai unto the street of the city, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before the king''s gate. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mordecai told him of all that had happened unto him, and of the sum of the money that Haman had promised to pay to the king''s treasuries for the Jews, to destroy them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he gave him the copy of the writing of the decree that was given at Shushan to destroy them, to shew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto Esther, and to declare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto her, and to charge her that she should go in unto the king, to make supplication unto him, and to make request before him for her people.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hatach came and told Esther the words of Mordecai. '
