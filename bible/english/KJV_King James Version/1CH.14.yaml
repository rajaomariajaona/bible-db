document_id: 1CH.14,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Gifts from Tyre
  - type: text
    content: 'Now Hiram king of Tyre sent messengers to David, and timber of cedars, with masons and carpenters, to build him an house. '
  '10':
  - type: text
    content: 'And David enquired of God, saying, Shall I go up against the Philistines? and wilt thou deliver them into mine hand? And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto him, Go up; for I will deliver them into thine hand. '
  '11':
  - type: text
    content: 'So they came up to Baal-perazim; and David smote them there. Then David said, God hath broken in upon mine enemies by mine hand like the breaking forth of waters: therefore they called the name of that place Baal-perazim. '
  '12':
  - type: text
    content: And when they had left their gods there, David gave a commandment, and they were burned with fire.
  '13':
  - type: text
    content: 'And the Philistines yet again spread themselves abroad in the valley. '
  '14':
  - type: text
    content: 'Therefore David enquired again of God; and God said unto him, Go not up after them; turn away from them, and come upon them over against the mulberry trees. '
  '15':
  - type: text
    content: 'And it shall be, when thou shalt hear a sound of going in the tops of the mulberry trees, '
  - type: text
    content: that
  - type: text
    content: ' then thou shalt go out to battle: for God is gone forth before thee to smite the host of the Philistines. '
  '16':
  - type: text
    content: 'David therefore did as God commanded him: and they smote the host of the Philistines from Gibeon even to Gazer. '
  '17':
  - type: text
    content: 'And the fame of David went out into all lands; and the '
  - type: text
    content: LORD
  - type: text
    content: ' brought the fear of him upon all nations.'
  '2':
  - type: text
    content: 'And David perceived that the '
  - type: text
    content: LORD
  - type: text
    content: ' had confirmed him king over Israel, for his kingdom was lifted up on high, because of his people Israel.'
  - type: heading
    content: David's Family
  '3':
  - type: text
    content: 'And David took more wives at Jerusalem: and David begat more sons and daughters. '
  '4':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the names of '
  - type: text
    content: his
  - type: text
    content: ' children which he had in Jerusalem; Shammua, and Shobab, Nathan, and Solomon, '
  '5':
  - type: text
    content: 'and Ibhar, and Elishua, and Elpalet, '
  '6':
  - type: text
    content: 'and Nogah, and Nepheg, and Japhia, '
  '7':
  - type: text
    content: and Elishama, and Beeliada, and Eliphalet.
  - type: heading
    content: His Victories
  '8':
  - type: text
    content: 'And when the Philistines heard that David was anointed king over all Israel, all the Philistines went up to seek David. And David heard '
  - type: text
    content: of it
  - type: text
    content: ', and went out against them. '
  '9':
  - type: text
    content: 'And the Philistines came and spread themselves in the valley of Rephaim. '
