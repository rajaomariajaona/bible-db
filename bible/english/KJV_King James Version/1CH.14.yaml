document_id: 1CH.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Gifts from Tyre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Hiram king of Tyre sent messengers to David, and timber of cedars, with masons and carpenters, to build him an house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David perceived that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had confirmed him king over Israel, for his kingdom was lifted up on high, because of his people Israel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: David's Family
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David took more wives at Jerusalem: and David begat more sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the names of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' children which he had in Jerusalem; Shammua, and Shobab, Nathan, and Solomon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Ibhar, and Elishua, and Elpalet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Nogah, and Nepheg, and Japhia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and Elishama, and Beeliada, and Eliphalet.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Victories
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when the Philistines heard that David was anointed king over all Israel, all the Philistines went up to seek David. And David heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', and went out against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the Philistines came and spread themselves in the valley of Rephaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And David enquired of God, saying, Shall I go up against the Philistines? and wilt thou deliver them into mine hand? And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Go up; for I will deliver them into thine hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So they came up to Baal-perazim; and David smote them there. Then David said, God hath broken in upon mine enemies by mine hand like the breaking forth of waters: therefore they called the name of that place Baal-perazim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And when they had left their gods there, David gave a commandment, and they were burned with fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the Philistines yet again spread themselves abroad in the valley. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore David enquired again of God; and God said unto him, Go not up after them; turn away from them, and come upon them over against the mulberry trees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it shall be, when thou shalt hear a sound of going in the tops of the mulberry trees, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' then thou shalt go out to battle: for God is gone forth before thee to smite the host of the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'David therefore did as God commanded him: and they smote the host of the Philistines from Gibeon even to Gazer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the fame of David went out into all lands; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' brought the fear of him upon all nations.'
