  - type: text
    content: are
  - type: text
    content: ' the ordinances of the altar in the day when they shall make it, to offer burnt offerings thereon, and to sprinkle blood thereon. '
  '19':
  - type: text
    content: 'And thou shalt give to the priests the Levites that be of the seed of Zadok, which approach unto me, to minister unto me, saith the Lord '
  - type: text
    content: GOD
  - type: text
