    content: 'Seven days shalt thou prepare every day a goat '
  - type: text
    content: for
  - type: text
    content: ' a sin offering: they shall also prepare a young bullock, and a ram out of the flock, without blemish. '
  '26':
  - type: text
    content: 'Seven days shall they purge the altar and purify it; and they shall consecrate themselves. '
  '27':
  - type: text
    content: 'And when these days are expired, it shall be, '
  - type: text
    content: that
  - type: text
