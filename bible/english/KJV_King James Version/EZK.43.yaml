document_id: EZK.43
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Return of the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Afterward he brought me to the gate, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the gate that looketh toward the east: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and, behold, the glory of the God of Israel came from the way of the east: and his voice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like a noise of many waters: and the earth shined with his glory. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' according to the appearance of the vision which I saw, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' according to the vision that I saw when I came to destroy the city: and the visions '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' like the vision that I saw by the river Chebar; and I fell upon my face. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came into the house by the way of the gate whose prospect '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' toward the east.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the spirit took me up, and brought me into the inner court; and, behold, the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' filled the house. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' speaking unto me out of the house; and the man stood by me. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he said unto me, Son of man, the place of my throne, and the place of the soles of my feet, where I will dwell in the midst of the children of Israel for ever, and my holy name, shall the house of Israel no more defile, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: neither
  - type: text
    text: ' they, nor their kings, by their whoredom, nor by the carcases of their kings in their high places. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In their setting of their threshold by my thresholds, and their post by my posts, and the wall between me and them, they have even defiled my holy name by their abominations that they have committed: wherefore I have consumed them in mine anger. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Now let them put away their whoredom, and the carcases of their kings, far from me, and I will dwell in the midst of them for ever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou son of man, shew the house to the house of Israel, that they may be ashamed of their iniquities: and let them measure the pattern. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And if they be ashamed of all that they have done, shew them the form of the house, and the fashion thereof, and the goings out thereof, and the comings in thereof, and all the forms thereof, and all the ordinances thereof, and all the forms thereof, and all the laws thereof: and write '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in their sight, that they may keep the whole form thereof, and all the ordinances thereof, and do them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the house; Upon the top of the mountain the whole limit thereof round about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' most holy. Behold, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the house.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Altar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the measures of the altar after the cubits: The cubit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a cubit and an hand breadth; even the bottom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a cubit, and the breadth a cubit, and the border thereof by the edge thereof round about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a span: and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the higher place of the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And from the bottom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' the ground '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the lower settle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' two cubits, and the breadth one cubit; and from the lesser settle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the greater settle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' four cubits, and the breadth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' cubit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the altar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' four cubits; and from the altar and upward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' four horns. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the altar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' twelve '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cubits
  - type: text
    text: ' long, twelve broad, square in the four squares thereof.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the settle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' fourteen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cubits
  - type: text
    text: ' long and fourteen broad in the four squares thereof; and the border about it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' half a cubit; and the bottom thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a cubit about; and his stairs shall look toward the east.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he said unto me, Son of man, thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the ordinances of the altar in the day when they shall make it, to offer burnt offerings thereon, and to sprinkle blood thereon. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And thou shalt give to the priests the Levites that be of the seed of Zadok, which approach unto me, to minister unto me, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', a young bullock for a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And thou shalt take of the blood thereof, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on the four horns of it, and on the four corners of the settle, and upon the border round about: thus shalt thou cleanse and purge it. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Thou shalt take the bullock also of the sin offering, and he shall burn it in the appointed place of the house, without the sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And on the second day thou shalt offer a kid of the goats without blemish for a sin offering; and they shall cleanse the altar, as they did cleanse '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with the bullock. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When thou hast made an end of cleansing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', thou shalt offer a young bullock without blemish, and a ram out of the flock without blemish. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And thou shalt offer them before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the priests shall cast salt upon them, and they shall offer them up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a burnt offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Seven days shalt thou prepare every day a goat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sin offering: they shall also prepare a young bullock, and a ram out of the flock, without blemish. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Seven days shall they purge the altar and purify it; and they shall consecrate themselves. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when these days are expired, it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' upon the eighth day, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' forward, the priests shall make your burnt offerings upon the altar, and your peace offerings; and I will accept you, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
