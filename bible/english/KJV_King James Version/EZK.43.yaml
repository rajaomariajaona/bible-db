  '1':
  - type: heading
    content: The Return of the Lord
  - type: text
    content: 'Afterward he brought me to the gate, '
  - type: text
    content: even
  - type: text
    content: ' the gate that looketh toward the east: '
  '10':
  - type: text
    content: 'Thou son of man, shew the house to the house of Israel, that they may be ashamed of their iniquities: and let them measure the pattern. '
  '11':
  - type: text
    content: 'And if they be ashamed of all that they have done, shew them the form of the house, and the fashion thereof, and the goings out thereof, and the comings in thereof, and all the forms thereof, and all the ordinances thereof, and all the forms thereof, and all the laws thereof: and write '
  - type: text
    content: it
  - type: text
    content: ' in their sight, that they may keep the whole form thereof, and all the ordinances thereof, and do them. '
  '12':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the law of the house; Upon the top of the mountain the whole limit thereof round about '
  - type: text
    content: shall be
  - type: text
    content: ' most holy. Behold, this '
  - type: text
    content: is
  - type: text
    content: ' the law of the house.'
