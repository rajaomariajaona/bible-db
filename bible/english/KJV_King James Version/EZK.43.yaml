  - type: text
    content: so
  - type: text
    content: ' forward, the priests shall make your burnt offerings upon the altar, and your peace offerings; and I will accept you, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '3':
  - type: text
    content: 'And '
  - type: text
    content: it was
  - type: text
    content: ' according to the appearance of the vision which I saw, '
  - type: text
    content: even
  - type: text
    content: ' according to the vision that I saw when I came to destroy the city: and the visions '
  - type: text
    content: were
  - type: text
    content: ' like the vision that I saw by the river Chebar; and I fell upon my face. '
  '4':
  - type: text
    content: 'And the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' came into the house by the way of the gate whose prospect '
  - type: text
