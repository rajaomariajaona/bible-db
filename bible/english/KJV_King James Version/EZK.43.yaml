  - type: text
    content: ' toward the east.'
  '5':
  - type: text
    content: 'So the spirit took me up, and brought me into the inner court; and, behold, the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' filled the house. '
  '6':
  - type: text
    content: 'And I heard '
  - type: text
    content: him
  - type: text
    content: ' speaking unto me out of the house; and the man stood by me. '
  '7':
  - type: text
    content: 'And he said unto me, Son of man, the place of my throne, and the place of the soles of my feet, where I will dwell in the midst of the children of Israel for ever, and my holy name, shall the house of Israel no more defile, '
  - type: text
    content: neither
  - type: text
    content: ' they, nor their kings, by their whoredom, nor by the carcases of their kings in their high places. '
  '8':
  - type: text
    content: 'In their setting of their threshold by my thresholds, and their post by my posts, and the wall between me and them, they have even defiled my holy name by their abominations that they have committed: wherefore I have consumed them in mine anger. '
  '9':
  - type: text
    content: Now let them put away their whoredom, and the carcases of their kings, far from me, and I will dwell in the midst of them for ever.
