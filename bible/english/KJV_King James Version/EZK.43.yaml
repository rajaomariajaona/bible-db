  - type: text
    content: it
  - type: text
    content: ', thou shalt offer a young bullock without blemish, and a ram out of the flock without blemish. '
  '24':
  - type: text
    content: 'And thou shalt offer them before the '
  - type: text
    content: LORD
  - type: text
