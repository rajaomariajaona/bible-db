document_id: JOB.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Debate
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Outburst
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this opened Job his mouth, and cursed his day. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because it shut not up the doors of my '
    - type: usfm
      marker: add
      children:
      - type: text
        text: mother's
    - type: text
      text: ' womb,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor hid sorrow from mine eyes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why died I not from the womb?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Why
    - type: text
      text: ' did I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' give up the ghost'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I came out of the belly?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why did the knees prevent me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or why the breasts that I should suck?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For now should I have lain still and been quiet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I should have slept: then had I been at rest,'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With kings and counsellors of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which built desolate places for themselves;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or with princes that had gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who filled their houses with silver:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or as an hidden untimely birth I had not been;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As infants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' never saw light.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There the wicked cease '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' troubling;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there the weary be at rest.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There
    - type: text
      text: ' the prisoners rest together;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They hear not the voice of the oppressor.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The small and great are there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the servant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' free from his master.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Job spake, and said,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherefore is light given to him that is in misery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And life unto the bitter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' soul;'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which long for death, but it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cometh
    - type: text
      text: ' not;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And dig for it more than for hid treasures;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which rejoice exceedingly,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' are glad, when they can find the grave?'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Why is light given
    - type: text
      text: ' to a man whose way is hid,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And whom God hath hedged in?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my sighing cometh before I eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my roarings are poured out like the waters.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the thing which I greatly feared is come upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And that which I was afraid of is come unto me.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was not in safety, neither had I rest, neither was I quiet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet trouble came.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the day perish wherein I was born,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the night '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in which
    - type: text
      text: ' it was said,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is a man child conceived.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let that day be darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let not God regard it from above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither let the light shine upon it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let darkness and the shadow of death stain it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let a cloud dwell upon it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the blackness of the day terrify it.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' that night, let darkness seize upon it;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let it not be joined unto the days of the year,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let it not come into the number of the months.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lo, let that night be solitary,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let no joyful voice come therein.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them curse it that curse the day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who are ready to raise up their mourning.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the stars of the twilight thereof be dark;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let it look for light, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ' none;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither let it see the dawning of the day:'
