verses:
  '1':
  - type: heading
    content: The Debate
  - type: heading
    content: Job's Outburst
  - type: text
    content: 'After this opened Job his mouth, and cursed his day. '
  '10':
  - type: text
    content: 'Because it shut not up the doors of my '
  - type: text
    content: mother's
  - type: text
    content: ' womb,'
  - type: text
    content: Nor hid sorrow from mine eyes.
  '11':
  - type: text
    content: Why died I not from the womb?
  - type: text
    content: Why
  - type: text
    content: ' did I '
  - type: text
    content: not
  - type: text
    content: ' give up the ghost'
  - type: text
    content: When I came out of the belly?
  '12':
  - type: text
    content: Why did the knees prevent me?
  - type: text
    content: Or why the breasts that I should suck?
  '13':
  - type: text
    content: For now should I have lain still and been quiet,
  - type: text
    content: 'I should have slept: then had I been at rest,'
  '14':
  - type: text
    content: With kings and counsellors of the earth,
  - type: text
    content: Which built desolate places for themselves;
  '15':
  - type: text
    content: Or with princes that had gold,
  - type: text
    content: 'Who filled their houses with silver:'
  '16':
  - type: text
    content: Or as an hidden untimely birth I had not been;
  - type: text
    content: 'As infants '
  - type: text
    content: which
  - type: text
    content: ' never saw light.'
  '17':
  - type: text
    content: 'There the wicked cease '
  - type: text
    content: from
  - type: text
    content: ' troubling;'
  - type: text
    content: And there the weary be at rest.
  '18':
  - type: text
    content: ' '
  - type: text
    content: There
  - type: text
    content: ' the prisoners rest together;'
  - type: text
    content: They hear not the voice of the oppressor.
  '19':
  - type: text
    content: The small and great are there;
  - type: text
    content: 'And the servant '
  - type: text
    content: is
  - type: text
    content: ' free from his master.'
  '2':
  - type: text
    content: And Job spake, and said,
  '20':
  - type: text
    content: Wherefore is light given to him that is in misery,
  - type: text
    content: 'And life unto the bitter '
  - type: text
    content: in
  - type: text
    content: ' soul;'
  '21':
  - type: text
    content: 'Which long for death, but it '
  - type: text
    content: cometh
  - type: text
    content: ' not;'
  - type: text
    content: And dig for it more than for hid treasures;
  '22':
  - type: text
    content: Which rejoice exceedingly,
  - type: text
    content: And
  - type: text
    content: ' are glad, when they can find the grave?'
  '23':
  - type: text
    content: ' '
  - type: text
    content: Why is light given
  - type: text
    content: ' to a man whose way is hid,'
  - type: text
    content: And whom God hath hedged in?
  '24':
  - type: text
    content: For my sighing cometh before I eat,
  - type: text
    content: And my roarings are poured out like the waters.
  '25':
  - type: text
    content: For the thing which I greatly feared is come upon me,
  - type: text
    content: And that which I was afraid of is come unto me.
  '26':
  - type: text
    content: I was not in safety, neither had I rest, neither was I quiet;
  - type: text
    content: Yet trouble came.
  '3':
  - type: text
    content: Let the day perish wherein I was born,
  - type: text
    content: 'And the night '
  - type: text
    content: in which
  - type: text
    content: ' it was said,'
  - type: text
    content: There is a man child conceived.
  '4':
  - type: text
    content: Let that day be darkness;
  - type: text
    content: Let not God regard it from above,
  - type: text
    content: Neither let the light shine upon it.
  '5':
  - type: text
    content: Let darkness and the shadow of death stain it;
  - type: text
    content: Let a cloud dwell upon it;
  - type: text
    content: Let the blackness of the day terrify it.
  '6':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' that night, let darkness seize upon it;'
  - type: text
    content: Let it not be joined unto the days of the year,
  - type: text
    content: Let it not come into the number of the months.
  '7':
  - type: text
    content: Lo, let that night be solitary,
  - type: text
    content: Let no joyful voice come therein.
  '8':
  - type: text
    content: Let them curse it that curse the day,
  - type: text
    content: Who are ready to raise up their mourning.
  '9':
  - type: text
    content: Let the stars of the twilight thereof be dark;
  - type: text
    content: 'Let it look for light, but '
  - type: text
    content: have
  - type: text
    content: ' none;'
  - type: text
    content: 'Neither let it see the dawning of the day:'
