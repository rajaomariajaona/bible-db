document_id: DEU.33,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Blessing of Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the blessing, wherewith Moses the man of God blessed the children of Israel before his death. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They shall teach Jacob thy judgments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Israel thy law:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall put incense before thee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whole burnt sacrifice upon thine altar.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Bless, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', his substance,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And accept the work of his hands:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smite through the loins of them that rise against him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of them that hate him, that they rise not again.
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' of Benjamin he said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The beloved of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall dwell in safety by him;'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'And the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
    - type: text
      text: ' shall cover him all the day long,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall dwell between his shoulders.
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And of Joseph he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' his land,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the precious things of heaven, for the dew,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for the deep that coucheth beneath,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And for the precious fruits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: brought forth
    - type: text
      text: ' by the sun,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for the precious things put forth by the moon,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And for the chief things of the ancient mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for the precious things of the lasting hills,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And for the precious things of the earth and fulness thereof,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the good will of him that dwelt in the bush:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the blessing
    - type: text
      text: ' come upon the head of Joseph,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And upon the top of the head of him that was separated from his brethren.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'His glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is like
    - type: text
      text: ' the firstling of his bullock,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his horns '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are like
    - type: text
      text: ' the horns of unicorns:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With them he shall push the people together to the ends of the earth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the ten thousands of Ephraim,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the thousands of Manasseh.'
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And of Zebulun he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejoice, Zebulun, in thy going out;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, Issachar, in thy tents.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They shall call the people unto the mountain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There they shall offer sacrifices of righteousness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For they shall suck '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the abundance of the seas,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' treasures hid in the sand.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came from Sinai,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rose up from Seir unto them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shined forth from mount Paran,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he came with ten thousands of saints:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From his right hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: went
    - type: text
      text: ' a fiery law for them.'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And of Gad he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' he that enlargeth Gad:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He dwelleth as a lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And teareth the arm with the crown of the head.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And he provided the first part for himself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because there, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' a portion of the lawgiver, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was he
    - type: text
      text: ' seated;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he came with the heads of the people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He executed the justice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his judgments with Israel.
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And of Dan he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dan '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a lion''s whelp:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall leap from Bashan.
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And of Naphtali he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Naphtali, satisfied with favour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And full with the blessing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Possess thou the west and the south.
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And of Asher he said,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Let
    - type: text
      text: ' Asher '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' blessed with children;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him be acceptable to his brethren,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let him dip his foot in oil.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Thy shoes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' iron and brass;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And as thy days, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so shall
    - type: text
      text: ' thy strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' none like unto the God of Jeshurun,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' rideth upon the heaven in thy help,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in his excellency on the sky.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The eternal God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is thy
    - type: text
      text: ' refuge,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And underneath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the everlasting arms:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall thrust out the enemy from before thee;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And shall say, Destroy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Israel then shall dwell in safety alone:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fountain of Jacob
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Shall be
    - type: text
      text: ' upon a land of corn and wine;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also his heavens shall drop down dew.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, O Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like unto thee, O people saved by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The shield of thy help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sword of thy excellency!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And thine enemies shall be found liars unto thee;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And thou shalt tread upon their high places.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Yea, he loved the people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All his saints '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in thy hand:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they sat down at thy feet;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Every one
    - type: text
      text: ' shall receive of thy words.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moses commanded us a law,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the inheritance of the congregation of Jacob.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And he was king in Jeshurun,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the heads of the people
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the tribes of Israel were gathered together.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Let Reuben live, and not die;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' his men be few.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is the blessing
    - type: text
      text: ' of Judah: and he said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the voice of Judah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And bring him unto his people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let his hands be sufficient for him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And be thou an help '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ' from his enemies.'
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And of Levi he said,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Let
    - type: text
      text: ' thy Thummim and thy Urim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with thy holy one,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom thou didst prove at Massah,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And with
    - type: text
      text: ' whom thou didst strive at the waters of Meribah;'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Who said unto his father and to his mother, I have not seen him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither did he acknowledge his brethren,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor knew his own children:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have observed thy word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And kept thy covenant.
