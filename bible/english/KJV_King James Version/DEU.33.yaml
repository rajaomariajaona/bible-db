  '1':
  - type: heading
    content: The Blessing of Moses
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the blessing, wherewith Moses the man of God blessed the children of Israel before his death. '
  '10':
  - type: text
    content: They shall teach Jacob thy judgments,
  - type: text
    content: 'And Israel thy law:'
  - type: text
    content: They shall put incense before thee,
  - type: text
    content: And whole burnt sacrifice upon thine altar.
  '11':
  - type: text
    content: 'Bless, '
  - type: text
    content: LORD
  - type: text
    content: ', his substance,'
  - type: text
    content: 'And accept the work of his hands:'
  - type: text
    content: Smite through the loins of them that rise against him,
  - type: text
    content: And of them that hate him, that they rise not again.
  '12':
  - type: text
    content: ' '
  - type: text
    content: And
  - type: text
    content: ' of Benjamin he said,'
  - type: text
    content: 'The beloved of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall dwell in safety by him;'
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall cover him all the day long,'
  - type: text
    content: And he shall dwell between his shoulders.
  '13':
  - type: text
    content: And of Joseph he said,
  - type: text
    content: 'Blessed of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' his land,'
  - type: text
    content: For the precious things of heaven, for the dew,
  - type: text
    content: And for the deep that coucheth beneath,
  '14':
  - type: text
    content: 'And for the precious fruits '
  - type: text
    content: brought forth
  - type: text
    content: ' by the sun,'
  - type: text
    content: And for the precious things put forth by the moon,
  '15':
  - type: text
    content: And for the chief things of the ancient mountains,
  - type: text
    content: And for the precious things of the lasting hills,
  '16':
  - type: text
    content: And for the precious things of the earth and fulness thereof,
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' the good will of him that dwelt in the bush:'
  - type: text
    content: 'Let '
  - type: text
    content: the blessing
  - type: text
    content: ' come upon the head of Joseph,'
  - type: text
    content: And upon the top of the head of him that was separated from his brethren.
  '17':
  - type: text
    content: 'His glory '
  - type: text
    content: is like
  - type: text
    content: ' the firstling of his bullock,'
  - type: text
    content: 'And his horns '
  - type: text
    content: are like
  - type: text
    content: ' the horns of unicorns:'
  - type: text
    content: 'With them he shall push the people together to the ends of the earth:'
  - type: text
    content: 'And they '
  - type: text
    content: are
  - type: text
    content: ' the ten thousands of Ephraim,'
  - type: text
    content: 'And they '
  - type: text
    content: are
  - type: text
    content: ' the thousands of Manasseh.'
  '18':
  - type: text
    content: And of Zebulun he said,
  - type: text
    content: Rejoice, Zebulun, in thy going out;
  - type: text
    content: And, Issachar, in thy tents.
  '19':
  - type: text
    content: They shall call the people unto the mountain;
  - type: text
    content: 'There they shall offer sacrifices of righteousness:'
  - type: text
    content: 'For they shall suck '
  - type: text
    content: of
  - type: text
    content: ' the abundance of the seas,'
  - type: text
    content: 'And '
  - type: text
    content: of
  - type: text
    content: ' treasures hid in the sand.'
  '2':
  - type: text
    content: And he said,
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' came from Sinai,'
  - type: text
    content: And rose up from Seir unto them;
  - type: text
    content: He shined forth from mount Paran,
  - type: text
    content: 'And he came with ten thousands of saints:'
  - type: text
    content: 'From his right hand '
  - type: text
    content: went
  - type: text
    content: ' a fiery law for them.'
  '20':
  - type: text
    content: And of Gad he said,
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' he that enlargeth Gad:'
  - type: text
    content: He dwelleth as a lion,
  - type: text
    content: And teareth the arm with the crown of the head.
  '21':
  - type: text
    content: And he provided the first part for himself,
  - type: text
    content: 'Because there, '
  - type: text
    content: in
  - type: text
    content: ' a portion of the lawgiver, '
  - type: text
    content: was he
  - type: text
    content: ' seated;'
  - type: text
    content: And he came with the heads of the people,
  - type: text
    content: 'He executed the justice of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And his judgments with Israel.
  '22':
  - type: text
    content: And of Dan he said,
  - type: text
    content: 'Dan '
  - type: text
    content: is
  - type: text
    content: ' a lion''s whelp:'
  - type: text
    content: He shall leap from Bashan.
  '23':
  - type: text
    content: And of Naphtali he said,
  - type: text
    content: O Naphtali, satisfied with favour,
  - type: text
    content: 'And full with the blessing of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Possess thou the west and the south.
  '24':
  - type: text
    content: And of Asher he said,
  - type: text
    content: Let
  - type: text
    content: ' Asher '
  - type: text
    content: be
  - type: text
    content: ' blessed with children;'
  - type: text
    content: Let him be acceptable to his brethren,
  - type: text
    content: And let him dip his foot in oil.
  '25':
  - type: text
    content: 'Thy shoes '
  - type: text
    content: shall be
  - type: text
    content: ' iron and brass;'
  - type: text
    content: 'And as thy days, '
  - type: text
    content: so shall
  - type: text
    content: ' thy strength '
  - type: text
    content: be
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' none like unto the God of Jeshurun,'
  - type: text
    content: Who
  - type: text
    content: ' rideth upon the heaven in thy help,'
  - type: text
    content: And in his excellency on the sky.
  '27':
  - type: text
    content: 'The eternal God '
  - type: text
    content: is thy
  - type: text
    content: ' refuge,'
  - type: text
    content: 'And underneath '
  - type: text
    content: are
  - type: text
    content: ' the everlasting arms:'
  - type: text
    content: And he shall thrust out the enemy from before thee;
  - type: text
    content: 'And shall say, Destroy '
  - type: text
    content: them
  - type: text
    content: .
  '28':
  - type: text
    content: 'Israel then shall dwell in safety alone:'
  - type: text
    content: The fountain of Jacob
  - type: text
    content: Shall be
  - type: text
    content: ' upon a land of corn and wine;'
  - type: text
    content: Also his heavens shall drop down dew.
  '29':
  - type: text
    content: 'Happy '
  - type: text
    content: art
  - type: text
    content: ' thou, O Israel:'
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' like unto thee, O people saved by the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: The shield of thy help,
  - type: text
    content: 'And who '
  - type: text
    content: is
  - type: text
    content: ' the sword of thy excellency!'
  - type: text
    content: And thine enemies shall be found liars unto thee;
  - type: text
    content: And thou shalt tread upon their high places.
  '3':
  - type: text
    content: Yea, he loved the people;
  - type: text
    content: 'All his saints '
  - type: text
    content: are
  - type: text
    content: ' in thy hand:'
  - type: text
    content: And they sat down at thy feet;
  - type: text
    content: Every one
  - type: text
    content: ' shall receive of thy words.'
  '4':
  - type: text
    content: Moses commanded us a law,
  - type: text
    content: Even
  - type: text
    content: ' the inheritance of the congregation of Jacob.'
  '5':
  - type: text
    content: And he was king in Jeshurun,
  - type: text
    content: When the heads of the people
  - type: text
    content: And
  - type: text
    content: ' the tribes of Israel were gathered together.'
  '6':
  - type: text
    content: Let Reuben live, and not die;
  - type: text
    content: 'And let '
  - type: text
    content: not
  - type: text
    content: ' his men be few.'
  '7':
  - type: text
    content: 'And this '
  - type: text
    content: is the blessing
  - type: text
    content: ' of Judah: and he said,'
  - type: text
    content: 'Hear, '
  - type: text
    content: LORD
  - type: text
    content: ', the voice of Judah,'
  - type: text
    content: 'And bring him unto his people:'
  - type: text
    content: Let his hands be sufficient for him;
  - type: text
    content: 'And be thou an help '
  - type: text
    content: to him
  - type: text
    content: ' from his enemies.'
  '8':
  - type: text
    content: And of Levi he said,
  - type: text
    content: Let
  - type: text
    content: ' thy Thummim and thy Urim '
  - type: text
    content: be
  - type: text
    content: ' with thy holy one,'
  - type: text
    content: Whom thou didst prove at Massah,
  - type: text
    content: And with
  - type: text
    content: ' whom thou didst strive at the waters of Meribah;'
  '9':
  - type: text
    content: Who said unto his father and to his mother, I have not seen him;
  - type: text
    content: Neither did he acknowledge his brethren,
  - type: text
    content: 'Nor knew his own children:'
  - type: text
    content: For they have observed thy word,
  - type: text
    content: And kept thy covenant.
