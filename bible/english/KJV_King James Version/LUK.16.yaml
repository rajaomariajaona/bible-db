document_id: LUK.16,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Unjust Steward
  - type: text
    content: 'And he said also unto his disciples, '
  - type: text
    content: There was a certain rich man, which had a steward; and the same was accused unto him that he had wasted his goods.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'He that is faithful in that which is least is faithful also in much: and he that is unjust in the least is unjust also in much.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'If therefore ye have not been faithful in the unrighteous mammon, who will commit to your trust the true '
  - type: text
    content: riches
  - type: text
    content: '?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if ye have not been faithful in that which is another man's, who shall give you that which is your own?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'No servant can serve two masters: for either he will hate the one, and love the other; or else he will hold to the one, and despise the other. Ye cannot serve God and mammon.'
  '14':
  - type: text
    content: 'And the Pharisees also, who were covetous, heard all these things: and they derided him. '
  '15':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Ye are they which justify yourselves before men; but God knoweth your hearts: for that which is highly esteemed among men is abomination in the sight of God.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'The law and the prophets '
  - type: text
    content: were
  - type: text
    content: ' until John: since that time the kingdom of God is preached, and every man presseth into it.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: And it is easier for heaven and earth to pass, than one tittle of the law to fail.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Whosoever putteth away his wife, and marrieth another, committeth adultery: and whosoever marrieth her that is put away from '
  - type: text
    content: her
  - type: text
    content: ' husband committeth adultery.'
  - type: heading
    content: The Rich Man and Lazarus
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'There was a certain rich man, which was clothed in purple and fine linen, and fared sumptuously every day:'
  - type: text
    content: ' '
  '2':
  - type: text
    content: And he called him, and said unto him, How is it that I hear this of thee? give an account of thy stewardship; for thou mayest be no longer steward.
  - type: text
    content: ' '
  '20':
  - type: text
    content: and there was a certain beggar named Lazarus, which was laid at his gate, full of sores,
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'and desiring to be fed with the crumbs which fell from the rich man''s table: moreover the dogs came and licked his sores.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And it came to pass, that the beggar died, and was carried by the angels into Abraham''s bosom: the rich man also died, and was buried;'
  - type: text
    content: ' '
  '23':
  - type: text
    content: and in hell he lift up his eyes, being in torments, and seeth Abraham afar off, and Lazarus in his bosom.
  - type: text
    content: ' '
  '24':
  - type: text
    content: And he cried and said, Father Abraham, have mercy on me, and send Lazarus, that he may dip the tip of his finger in water, and cool my tongue; for I am tormented in this flame.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But Abraham said, Son, remember that thou in thy lifetime receivedst thy good things, and likewise Lazarus evil things: but now he is comforted, and thou art tormented.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And beside all this, between us and you there is a great gulf fixed: so that they which would pass from hence to you cannot; neither can they pass to us, that '
  - type: text
    content: would come
  - type: text
    content: ' from thence.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then he said, I pray thee therefore, father, that thou wouldest send him to my father''s house:'
  - type: text
    content: ' '
  '28':
  - type: text
    content: for I have five brethren; that he may testify unto them, lest they also come into this place of torment.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Abraham saith unto him, They have Moses and the prophets; let them hear them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then the steward said within himself, What shall I do? for my lord taketh away from me the stewardship: I cannot dig; to beg I am ashamed.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And he said, Nay, father Abraham: but if one went unto them from the dead, they will repent.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: And he said unto him, If they hear not Moses and the prophets, neither will they be persuaded, though one rose from the dead.
  '4':
  - type: text
    content: I am resolved what to do, that, when I am put out of the stewardship, they may receive me into their houses.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'So he called every one of his lord''s debtors '
  - type: text
    content: unto him
  - type: text
    content: ', and said unto the first, How much owest thou unto my lord?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: And he said, An hundred measures of oil. And he said unto him, Take thy bill, and sit down quickly, and write fifty.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Then said he to another, And how much owest thou? And he said, An hundred measures of wheat. And he said unto him, Take thy bill, and write fourscore.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And the lord commended the unjust steward, because he had done wisely: for the children of this world are in their generation wiser than the children of light.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: And I say unto you, Make to yourselves friends of the mammon of unrighteousness; that, when ye fail, they may receive you into everlasting habitations.
  - type: text
    content: ' '
