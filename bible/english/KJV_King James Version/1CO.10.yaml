document_id: 1CO.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover, brethren, I would not that ye should be ignorant, how that all our fathers were under the cloud, and all passed through the sea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and were all baptized unto Moses in the cloud and in the sea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and did all eat the same spiritual meat; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and did all drink the same spiritual drink: for they drank of that spiritual Rock that followed them: and that Rock was Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But with many of them God was not well pleased: for they were overthrown in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now these things were our examples, to the intent we should not lust after evil things, as they also lusted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Neither be ye idolaters, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' some of them; as it is written, The people sat down to eat and drink, and rose up to play. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Neither let us commit fornication, as some of them committed, and fell in one day three and twenty thousand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Neither let us tempt Christ, as some of them also tempted, and were destroyed of serpents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Neither murmur ye, as some of them also murmured, and were destroyed of the destroyer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now all these things happened unto them for ensamples: and they are written for our admonition, upon whom the ends of the world are come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Wherefore let him that thinketh he standeth take heed lest he fall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'There hath no temptation taken you but such as is common to man: but God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' faithful, who will not suffer you to be tempted above that ye are able; but will with the temptation also make a way to escape, that ye may be able to bear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Wherefore, my dearly beloved, flee from idolatry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I speak as to wise men; judge ye what I say. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The cup of blessing which we bless, is it not the communion of the blood of Christ? The bread which we break, is it not the communion of the body of Christ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' many are one bread, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' one body: for we are all partakers of that one bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Behold Israel after the flesh: are not they which eat of the sacrifices partakers of the altar? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'What say I then? that the idol is any thing, or that which is offered in sacrifice to idols is any thing? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', that the things which the Gentiles sacrifice, they sacrifice to devils, and not to God: and I would not that ye should have fellowship with devils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ye cannot drink the cup of the Lord, and the cup of devils: ye cannot be partakers of the Lord''s table, and of the table of devils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do we provoke the Lord to jealousy? are we stronger than he?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'All things are lawful for me, but all things are not expedient: all things are lawful for me, but all things edify not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Let no man seek his own, but every man another''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wealth
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Whatsoever is sold in the shambles, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' eat, asking no question for conscience sake: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'for the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the Lord''s, and the fulness thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'If any of them that believe not bid you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to a feast
  - type: text
    text: ', and ye be disposed to go; whatsoever is set before you, eat, asking no question for conscience sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But if any man say unto you, This is offered in sacrifice unto idols, eat not for his sake that shewed it, and for conscience sake: for the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the Lord''s, and the fulness thereof: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'conscience, I say, not thine own, but of the other: for why is my liberty judged of another '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man's
  - type: text
    text: ' conscience? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For if I by grace be a partaker, why am I evil spoken of for that for which I give thanks?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Whether therefore ye eat, or drink, or whatsoever ye do, do all to the glory of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Give none offence, neither to the Jews, nor to the Gentiles, nor to the church of God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'even as I please all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', not seeking mine own profit, but the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: profit
  - type: text
    text: ' of many, that they may be saved.'
