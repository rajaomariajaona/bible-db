document_id: ZEC.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: True Righteousness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass in the fourth year of king Darius, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto Zechariah in the fourth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the ninth month, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' in Chisleu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'when they had sent unto the house of God Sherezer and Regem-melech, and their men, to pray before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to speak unto the priests which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, and to the prophets, saying, Should I weep in the fifth month, separating myself, as I have done these so many years? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then came the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Speak unto all the people of the land, and to the priests, saying, When ye fasted and mourned in the fifth and seventh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: month
  - type: text
    text: ', even those seventy years, did ye at all fast unto me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when ye did eat, and when ye did drink, did not ye eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for yourselves
  - type: text
    text: ', and drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for yourselves?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Should ye
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hear
  - type: text
    text: ' the words which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath cried by the former prophets, when Jerusalem was inhabited and in prosperity, and the cities thereof round about her, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' inhabited the south and the plain?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto Zechariah, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thus speaketh the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, saying, Execute true judgment, and shew mercy and compassions every man to his brother: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and oppress not the widow, nor the fatherless, the stranger, nor the poor; and let none of you imagine evil against his brother in your heart.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But they refused to hearken, and pulled away the shoulder, and stopped their ears, that they should not hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yea, they made their hearts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' an adamant stone, lest they should hear the law, and the words which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts hath sent in his spirit by the former prophets: therefore came a great wrath from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore it is come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' as he cried, and they would not hear; so they cried, and I would not hear, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but I scattered them with a whirlwind among all the nations whom they knew not. Thus the land was desolate after them, that no man passed through nor returned: for they laid the pleasant land desolate.'
