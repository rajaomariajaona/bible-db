  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and to the prophets, saying, Should I weep in the fifth month, separating myself, as I have done these so many years? '
  '4':
  - type: text
    content: 'Then came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts unto me, saying, '
  '5':
  - type: text
    content: 'Speak unto all the people of the land, and to the priests, saying, When ye fasted and mourned in the fifth and seventh '
  - type: text
    content: month
  - type: text
    content: ', even those seventy years, did ye at all fast unto me, '
  - type: text
    content: even
  - type: text
    content: ' to me? '
  '6':
  - type: text
    content: 'And when ye did eat, and when ye did drink, did not ye eat '
  - type: text
    content: for yourselves
  - type: text
    content: ', and drink '
  - type: text
    content: for yourselves?
  - type: text
    content: ' '
  '7':
  - type: text
    content: Should ye
  - type: text
    content: ' not '
  - type: text
    content: hear
  - type: text
    content: ' the words which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath cried by the former prophets, when Jerusalem was inhabited and in prosperity, and the cities thereof round about her, when '
  - type: text
    content: men
  - type: text
    content: ' inhabited the south and the plain?'
  '8':
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto Zechariah, saying, '
  '9':
