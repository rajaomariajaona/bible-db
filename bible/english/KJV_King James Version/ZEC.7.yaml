  - type: text
    content: 'And it came to pass in the fourth year of king Darius, '
  - type: text
    content: that
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto Zechariah in the fourth '
  - type: text
    content: day
  - type: text
    content: ' of the ninth month, '
  - type: text
    content: even
  - type: text
    content: ' in Chisleu; '
  '10':
  - type: text
    content: and oppress not the widow, nor the fatherless, the stranger, nor the poor; and let none of you imagine evil against his brother in your heart.
  '11':
  - type: text
    content: 'But they refused to hearken, and pulled away the shoulder, and stopped their ears, that they should not hear. '
  '12':
  - type: text
    content: 'Yea, they made their hearts '
  - type: text
    content: as
  - type: text
    content: ' an adamant stone, lest they should hear the law, and the words which the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath sent in his spirit by the former prophets: therefore came a great wrath from the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '13':
  - type: text
    content: 'Therefore it is come to pass, '
  - type: text
    content: that
  - type: text
    content: ' as he cried, and they would not hear; so they cried, and I would not hear, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts: '
  '14':
  - type: text
    content: 'but I scattered them with a whirlwind among all the nations whom they knew not. Thus the land was desolate after them, that no man passed through nor returned: for they laid the pleasant land desolate.'
  '2':
  - type: text
    content: 'when they had sent unto the house of God Sherezer and Regem-melech, and their men, to pray before the '
  - type: text
    content: LORD
  - type: text
    content: ', '
