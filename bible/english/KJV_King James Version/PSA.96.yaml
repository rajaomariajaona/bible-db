document_id: PSA.96,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'O Sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ' a new song:'
  - type: text
    content: 'Sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ', all the earth.'
  '10':
  - type: text
    content: 'Say among the heathen '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' reigneth:'
  - type: text
    content: 'The world also shall be established that it shall not be moved: He shall judge the people righteously.'
  '11':
  - type: text
    content: Let the heavens rejoice, and let the earth be glad;
  - type: text
    content: Let the sea roar, and the fulness thereof.
  '12':
  - type: text
    content: 'Let the field be joyful, and all that '
  - type: text
    content: is
  - type: text
    content: ' therein:'
  - type: text
    content: Then shall all the trees of the wood rejoice
  '13':
  - type: text
    content: 'Before the '
  - type: text
    content: LORD
  - type: text
    content: ': for he cometh, for he cometh to judge the earth:'
  - type: text
    content: He shall judge the world with righteousness, and the people with his truth.
  '2':
  - type: text
    content: 'Sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ', bless his name;'
  - type: text
    content: Shew forth his salvation from day to day.
  '3':
  - type: text
    content: Declare his glory among the heathen,
  - type: text
    content: His wonders among all people.
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' great, and greatly to be praised:'
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' to be feared above all gods.'
  '5':
  - type: text
    content: 'For all the gods of the nations '
  - type: text
    content: are
  - type: text
    content: ' idols:'
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' made the heavens.'
  '6':
  - type: text
    content: 'Honour and majesty '
  - type: text
    content: are
  - type: text
    content: ' before him:'
  - type: text
    content: 'Strength and beauty '
  - type: text
    content: are
  - type: text
    content: ' in his sanctuary.'
  '7':
  - type: text
    content: 'Give unto the '
  - type: text
    content: LORD
  - type: text
    content: ', O ye kindreds of the people,'
  - type: text
    content: 'Give unto the '
  - type: text
    content: LORD
  - type: text
    content: ' glory and strength.'
  '8':
  - type: text
    content: 'Give unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the glory '
  - type: text
    content: due unto
  - type: text
    content: ' his name:'
  - type: text
    content: Bring an offering, and come into his courts.
  '9':
  - type: text
    content: 'O worship the '
  - type: text
    content: LORD
  - type: text
    content: ' in the beauty of holiness:'
  - type: text
    content: Fear before him, all the earth.
