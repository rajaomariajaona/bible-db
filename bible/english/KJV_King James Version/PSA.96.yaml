document_id: PSA.96,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' a new song:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all the earth.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say among the heathen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' reigneth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The world also shall be established that it shall not be moved: He shall judge the people righteously.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the heavens rejoice, and let the earth be glad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the sea roar, and the fulness thereof.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the field be joyful, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' therein:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then shall all the trees of the wood rejoice
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for he cometh, for he cometh to judge the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall judge the world with righteousness, and the people with his truth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', bless his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shew forth his salvation from day to day.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare his glory among the heathen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His wonders among all people.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great, and greatly to be praised:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to be feared above all gods.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For all the gods of the nations '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' idols:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made the heavens.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honour and majesty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' before him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Strength and beauty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in his sanctuary.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O ye kindreds of the people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Give unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' glory and strength.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: due unto
    - type: text
      text: ' his name:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bring an offering, and come into his courts.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the beauty of holiness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fear before him, all the earth.
