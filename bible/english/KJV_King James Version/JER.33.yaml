    content: 'And I will cause the captivity of Judah and the captivity of Israel to return, and will build them, as at the first. '
  '8':
  - type: text
    content: 'And I will cleanse them from all their iniquity, whereby they have sinned against me; and I will pardon all their iniquities, whereby they have sinned, and whereby they have transgressed against me. '
  '9':
  - type: text
    content: 'And it shall be to me a name of joy, a praise and an honour before all the nations of the earth, which shall hear all the good that I do unto them: and they shall fear and tremble for all the goodness and for all the prosperity that I procure unto it.'
