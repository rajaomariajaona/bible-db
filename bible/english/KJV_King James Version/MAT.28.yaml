document_id: MAT.28,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: 'In the end of the sabbath, as it began to dawn toward the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, came Mary Magdalene and the other Mary to see the sepulchre. '
  '10':
  - type: text
    content: 'Then said Jesus unto them, '
  - type: text
    content: 'Be not afraid: go tell my brethren that they go into Galilee, and there shall they see me.'
  '11':
  - type: text
    content: 'Now when they were going, behold, some of the watch came into the city, and shewed unto the chief priests all the things that were done. '
  '12':
  - type: text
    content: 'And when they were assembled with the elders, and had taken counsel, they gave large money unto the soldiers, '
  '13':
  - type: text
    content: 'saying, Say ye, His disciples came by night, and stole him '
  - type: text
    content: away
  - type: text
    content: ' while we slept. '
  '14':
  - type: text
    content: 'And if this come to the governor''s ears, we will persuade him, and secure you. '
  '15':
  - type: text
    content: 'So they took the money, and did as they were taught: and this saying is commonly reported among the Jews until this day.'
  '16':
  - type: text
    content: 'Then the eleven disciples went away into Galilee, into a mountain where Jesus had appointed them. '
  '17':
  - type: text
    content: 'And when they saw him, they worshipped him: but some doubted. '
  '18':
  - type: text
    content: 'And Jesus came and spake unto them, saying, '
  - type: text
    content: All power is given unto me in heaven and in earth.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Go ye therefore, and teach all nations, baptizing them in the name of the Father, and of the Son, and of the Holy Ghost:'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And, behold, there was a great earthquake: for the angel of the Lord descended from heaven, and came and rolled back the stone from the door, and sat upon it. '
  '20':
  - type: text
    content: 'teaching them to observe all things whatsoever I have commanded you: and, lo, I am with you alway, '
  - type: text
    content: even
  - type: text
    content: ' unto the end of the world.'
  - type: text
    content: ' Amen.'
  '3':
  - type: text
    content: 'His countenance was like lightning, and his raiment white as snow: '
  '4':
  - type: text
    content: 'and for fear of him the keepers did shake, and became as dead '
  - type: text
    content: men
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And the angel answered and said unto the women, Fear not ye: for I know that ye seek Jesus, which was crucified. '
  '6':
  - type: text
    content: 'He is not here: for he is risen, as he said. Come, see the place where the Lord lay. '
  '7':
  - type: text
    content: 'And go quickly, and tell his disciples that he is risen from the dead; and, behold, he goeth before you into Galilee; there shall ye see him: lo, I have told you. '
  '8':
  - type: text
    content: And they departed quickly from the sepulchre with fear and great joy; and did run to bring his disciples word.
  '9':
  - type: text
    content: 'And as they went to tell his disciples, behold, Jesus met them, saying, '
  - type: text
    content: All hail.
  - type: text
    content: ' And they came and held him by the feet, and worshipped him. '
