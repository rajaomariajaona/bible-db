document_id: PSA.57
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, Altaschith, Michtam of David, when he fled from Saul in the cave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Be merciful unto me, O God, be merciful unto me: For my soul trusteth in thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, in the shadow of thy wings will I make my refuge, until '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' calamities be overpast.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will cry unto God most high;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Unto God that performeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all things
  - type: text
    text: ' for me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He shall send from heaven, and save me
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: From
  - type: text
    text: ' the reproach of him that would swallow me up. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God shall send forth his mercy and his truth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'My soul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among lions:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' I lie '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even among
  - type: text
    text: ' them that are set on fire,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' the sons of men, whose teeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' spears and arrows, and their tongue a sharp sword.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Be thou exalted, O God, above the heavens;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Let
  - type: text
    text: ' thy glory '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' above all the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They have prepared a net for my steps; My soul is bowed down:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They have digged a pit before me, into the midst whereof they are fallen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: '. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'My heart is fixed, O God, my heart is fixed:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing and give praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Awake up, my glory; awake, psaltery and harp:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: myself
  - type: text
    text: ' will awake early.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will praise thee, O Lord, among the people:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing unto thee among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For thy mercy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great unto the heavens,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy truth unto the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Be thou exalted, O God, above the heavens:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Let
  - type: text
    text: ' thy glory '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' above all the earth.'
