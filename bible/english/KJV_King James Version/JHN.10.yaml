document_id: JHN.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Good Shepherd
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily, verily, I say unto you, He that entereth not by the door into the sheepfold, but climbeth up some other way, the same is a thief and a robber.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he that entereth in by the door is the shepherd of the sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'To him the porter openeth; and the sheep hear his voice: and he calleth his own sheep by name, and leadeth them out.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And when he putteth forth his own sheep, he goeth before them, and the sheep follow him: for they know his voice.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And a stranger will they not follow, but will flee from him: for they know not the voice of strangers.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This parable spake Jesus unto them: but they understood not what things they were which he spake unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then said Jesus unto them again, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily, verily, I say unto you, I am the door of the sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'All that ever came before me are thieves and robbers: but the sheep did not hear them.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I am the door: by me if any man enter in, he shall be saved, and shall go in and out, and find pasture.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The thief cometh not, but for to steal, and to kill, and to destroy: I am come that they might have life, and that they might have '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' more abundantly.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I am the good shepherd: the good shepherd giveth his life for the sheep.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But he that is an hireling, and not the shepherd, whose own the sheep are not, seeth the wolf coming, and leaveth the sheep, and fleeth: and the wolf catcheth them, and scattereth the sheep.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The hireling fleeth, because he is an hireling, and careth not for the sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I am the good shepherd, and know my '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sheep
    - type: text
      text: ', and am known of mine.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'As the Father knoweth me, even so know I the Father: and I lay down my life for the sheep.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And other sheep I have, which are not of this fold: them also I must bring, and they shall hear my voice; and there shall be one fold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' one shepherd.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Therefore doth my Father love me, because I lay down my life, that I might take it again.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No man taketh it from me, but I lay it down of myself. I have power to lay it down, and I have power to take it again. This commandment have I received of my Father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'There was a division therefore again among the Jews for these sayings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And many of them said, He hath a devil, and is mad; why hear ye him?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Others said, These are not the words of him that hath a devil. Can a devil open the eyes of the blind?
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Feast of the Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And it was at Jerusalem the feast of the dedication, and it was winter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Jesus walked in the temple in Solomon''s porch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then came the Jews round about him, and said unto him, How long dost thou make us to doubt? If thou be the Christ, tell us plainly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I told you, and ye believed not: the works that I do in my Father''s name, they bear witness of me.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But ye believe not, because ye are not of my sheep, as I said unto you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My sheep hear my voice, and I know them, and they follow me:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and I give unto them eternal life; and they shall never perish, neither shall any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' pluck them out of my hand.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My Father, which gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' me, is greater than all; and no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' is able to pluck '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out of my Father''s hand.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' Father are one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the Jews took up stones again to stone him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Many good works have I shewed you from my Father; for which of those works do ye stone me?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The Jews answered him, saying, For a good work we stone thee not; but for blasphemy; and because that thou, being a man, makest thyself God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Is it not written in your law, I said, Ye are gods?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If he called them gods, unto whom the word of God came, and the scripture cannot be broken;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: say ye of him, whom the Father hath sanctified, and sent into the world, Thou blasphemest; because I said, I am the Son of God?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I do not the works of my Father, believe me not.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But if I do, though ye believe not me, believe the works: that ye may know, and believe, that the Father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in me, and I in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Therefore they sought again to take him: but he escaped out of their hand, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and went away again beyond Jordan into the place where John at first baptized; and there he abode. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And many resorted unto him, and said, John did no miracle: but all things that John spake of this man were true. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And many believed on him there.
