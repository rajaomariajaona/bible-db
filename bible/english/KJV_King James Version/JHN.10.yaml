document_id: JHN.10,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Good Shepherd
  - type: text
    content: ' '
  - type: text
    content: Verily, verily, I say unto you, He that entereth not by the door into the sheepfold, but climbeth up some other way, the same is a thief and a robber.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'The thief cometh not, but for to steal, and to kill, and to destroy: I am come that they might have life, and that they might have '
  - type: text
    content: it
  - type: text
    content: ' more abundantly.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'I am the good shepherd: the good shepherd giveth his life for the sheep.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'But he that is an hireling, and not the shepherd, whose own the sheep are not, seeth the wolf coming, and leaveth the sheep, and fleeth: and the wolf catcheth them, and scattereth the sheep.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: The hireling fleeth, because he is an hireling, and careth not for the sheep.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'I am the good shepherd, and know my '
  - type: text
    content: sheep
  - type: text
    content: ', and am known of mine.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'As the Father knoweth me, even so know I the Father: and I lay down my life for the sheep.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And other sheep I have, which are not of this fold: them also I must bring, and they shall hear my voice; and there shall be one fold, '
  - type: text
    content: and
  - type: text
    content: ' one shepherd.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: Therefore doth my Father love me, because I lay down my life, that I might take it again.
  - type: text
    content: ' '
  '18':
  - type: text
    content: No man taketh it from me, but I lay it down of myself. I have power to lay it down, and I have power to take it again. This commandment have I received of my Father.
  '19':
  - type: text
    content: 'There was a division therefore again among the Jews for these sayings. '
  '2':
  - type: text
    content: But he that entereth in by the door is the shepherd of the sheep.
  - type: text
    content: ' '
  '20':
  - type: text
    content: And many of them said, He hath a devil, and is mad; why hear ye him?
  '21':
  - type: text
    content: Others said, These are not the words of him that hath a devil. Can a devil open the eyes of the blind?
  - type: heading
    content: The Feast of the Dedication
  '22':
  - type: text
    content: 'And it was at Jerusalem the feast of the dedication, and it was winter. '
  '23':
  - type: text
    content: 'And Jesus walked in the temple in Solomon''s porch. '
  '24':
  - type: text
    content: 'Then came the Jews round about him, and said unto him, How long dost thou make us to doubt? If thou be the Christ, tell us plainly. '
  '25':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: 'I told you, and ye believed not: the works that I do in my Father''s name, they bear witness of me.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: But ye believe not, because ye are not of my sheep, as I said unto you.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'My sheep hear my voice, and I know them, and they follow me:'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'and I give unto them eternal life; and they shall never perish, neither shall any '
  - type: text
    content: man
  - type: text
    content: ' pluck them out of my hand.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'My Father, which gave '
  - type: text
    content: them
  - type: text
    content: ' me, is greater than all; and no '
  - type: text
    content: man
  - type: text
    content: ' is able to pluck '
  - type: text
    content: them
  - type: text
    content: ' out of my Father''s hand.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'To him the porter openeth; and the sheep hear his voice: and he calleth his own sheep by name, and leadeth them out.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'I and '
  - type: text
    content: my
  - type: text
    content: ' Father are one.'
  '31':
  - type: text
    content: 'Then the Jews took up stones again to stone him. '
  '32':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: Many good works have I shewed you from my Father; for which of those works do ye stone me?
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'The Jews answered him, saying, For a good work we stone thee not; but for blasphemy; and because that thou, being a man, makest thyself God. '
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: Is it not written in your law, I said, Ye are gods?
  - type: text
    content: ' '
  '35':
  - type: text
    content: If he called them gods, unto whom the word of God came, and the scripture cannot be broken;
  - type: text
    content: ' '
  '36':
  - type: text
    content: say ye of him, whom the Father hath sanctified, and sent into the world, Thou blasphemest; because I said, I am the Son of God?
  - type: text
    content: ' '
  '37':
  - type: text
    content: If I do not the works of my Father, believe me not.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'But if I do, though ye believe not me, believe the works: that ye may know, and believe, that the Father '
  - type: text
    content: is
  - type: text
    content: ' in me, and I in him.'
  '39':
  - type: text
    content: 'Therefore they sought again to take him: but he escaped out of their hand, '
  '4':
  - type: text
    content: 'And when he putteth forth his own sheep, he goeth before them, and the sheep follow him: for they know his voice.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'and went away again beyond Jordan into the place where John at first baptized; and there he abode. '
  '41':
  - type: text
    content: 'And many resorted unto him, and said, John did no miracle: but all things that John spake of this man were true. '
  '42':
  - type: text
    content: And many believed on him there.
  '5':
  - type: text
    content: 'And a stranger will they not follow, but will flee from him: for they know not the voice of strangers.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'This parable spake Jesus unto them: but they understood not what things they were which he spake unto them.'
  '7':
  - type: text
    content: 'Then said Jesus unto them again, '
  - type: text
    content: Verily, verily, I say unto you, I am the door of the sheep.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'All that ever came before me are thieves and robbers: but the sheep did not hear them.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'I am the door: by me if any man enter in, he shall be saved, and shall go in and out, and find pasture.'
  - type: text
    content: ' '
