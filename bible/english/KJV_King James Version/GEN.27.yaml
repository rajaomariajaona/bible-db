    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, that when Isaac was old, and his eyes were dim, so that he could not see, he called Esau his eldest son, and said unto him, My son: and he said unto him, Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here am
  - type: text
    text: ' I. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said, Behold now, I am old, I know not the day of my death: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'now therefore take, I pray thee, thy weapons, thy quiver and thy bow, and go out to the field, and take me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' venison; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and make me savoury meat, such as I love, and bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to me, that I may eat; that my soul may bless thee before I die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Rebekah heard when Isaac spake to Esau his son. And Esau went to the field to hunt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' venison, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Rebekah spake unto Jacob her son, saying, Behold, I heard thy father speak unto Esau thy brother, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bring me venison, and make me savoury meat, that I may eat, and bless thee before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' before my death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now therefore, my son, obey my voice according to that which I command thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Go now to the flock, and fetch me from thence two good kids of the goats; and I will make them savoury meat for thy father, such as he loveth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and thou shalt bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to thy father, that he may eat, and that he may bless thee before his death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Jacob said to Rebekah his mother, Behold, Esau my brother '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a hairy man, and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a smooth man: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'my father peradventure will feel me, and I shall seem to him as a deceiver; and I shall bring a curse upon me, and not a blessing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And his mother said unto him, Upon me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thy curse, my son: only obey my voice, and go fetch me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he went, and fetched, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to his mother: and his mother made savoury meat, such as his father loved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Rebekah took goodly raiment of her eldest son Esau, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with her in the house, and put them upon Jacob her younger son: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and she put the skins of the kids of the goats upon his hands, and upon the smooth of his neck: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: and she gave the savoury meat and the bread, which she had prepared, into the hand of her son Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he came unto his father, and said, My father: and he said, Here '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I; who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou, my son? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Jacob said unto his father, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' Esau thy firstborn; I have done according as thou badest me: arise, I pray thee, sit and eat of my venison, that thy soul may bless me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Isaac said unto his son, How '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' that thou hast found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' so quickly, my son? And he said, Because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Isaac said unto Jacob, Come near, I pray thee, that I may feel thee, my son, whether thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' my very son Esau or not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Jacob went near unto Isaac his father; and he felt him, and said, The voice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Jacob''s voice, but the hands '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the hands of Esau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he discerned him not, because his hands were hairy, as his brother Esau''s hands: so he blessed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou my very son Esau? And he said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he said, Bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' near to me, and I will eat of my son''s venison, that my soul may bless thee. And he brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' near to him, and he did eat: and he brought him wine, and he drank. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And his father Isaac said unto him, Come near now, and kiss me, my son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he came near, and kissed him: and he smelled the smell of his raiment, and blessed him, and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: See, the smell of my son
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' as the smell of a field which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Therefore God give thee of the dew of heaven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the fatness of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And plenty of corn and wine:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Let people serve thee,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And nations bow down to thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be lord over thy brethren,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And let thy mother''s sons bow down to thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' every one that curseth thee,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that blesseth thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And it came to pass, as soon as Isaac had made an end of blessing Jacob, and Jacob was yet scarce gone out from the presence of Isaac his father, that Esau his brother came in from his hunting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he also had made savoury meat, and brought it unto his father, and said unto his father, Let my father arise, and eat of his son''s venison, that thy soul may bless me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Isaac his father said unto him, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? And he said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' thy son, thy firstborn Esau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Isaac trembled very exceedingly, and said, Who? where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that hath taken venison, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' me, and I have eaten of all before thou camest, and have blessed him? yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' he shall be blessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And when Esau heard the words of his father, he cried with a great and exceeding bitter cry, and said unto his father, Bless me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' me also, O my father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And he said, Thy brother came with subtilty, and hath taken away thy blessing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he said, Is not he rightly named Jacob? for he hath supplanted me these two times: he took away my birthright; and, behold, now he hath taken away my blessing. And he said, Hast thou not reserved a blessing for me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Isaac answered and said unto Esau, Behold, I have made him thy lord, and all his brethren have I given to him for servants; and with corn and wine have I sustained him: and what shall I do now unto thee, my son? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Esau said unto his father, Hast thou but one blessing, my father? bless me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' me also, O my father. And Esau lifted up his voice, and wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And Isaac his father answered and said unto him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, thy dwelling shall be the fatness of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of the dew of heaven from above;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And by thy sword shalt thou live, and shalt serve thy brother;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it shall come to pass when thou shalt have the dominion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That thou shalt break his yoke from off thy neck.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And Esau hated Jacob because of the blessing wherewith his father blessed him: and Esau said in his heart, The days of mourning for my father are at hand; then will I slay my brother Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And these words of Esau her elder son were told to Rebekah: and she sent and called Jacob her younger son, and said unto him, Behold, thy brother Esau, as touching thee, doth comfort himself, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: purposing
  - type: text
    text: ' to kill thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Now therefore, my son, obey my voice; and arise, flee thou to Laban my brother to Haran; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and tarry with him a few days, until thy brother''s fury turn away; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'until thy brother''s anger turn away from thee, and he forget '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which thou hast done to him: then I will send, and fetch thee from thence: why should I be deprived also of you both in one day?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And Rebekah said to Isaac, I am weary of my life because of the daughters of Heth: if Jacob take a wife of the daughters of Heth, such as these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' of the daughters of the land, what good shall my life do me?'
