  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went, and fetched, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to his mother: and his mother made savoury meat, such as his father loved. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rebekah took goodly raiment of her eldest son Esau, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with her in the house, and put them upon Jacob her younger son: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and she put the skins of the kids of the goats upon his hands, and upon the smooth of his neck: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and she gave the savoury meat and the bread, which she had prepared, into the hand of her son Jacob.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he came unto his father, and said, My father: and he said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I; who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, my son? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob said unto his father, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' Esau thy firstborn; I have done according as thou badest me: arise, I pray thee, sit and eat of my venison, that thy soul may bless me. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Behold now, I am old, I know not the day of my death: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Isaac said unto his son, How '
    - type: usfm
      marker: add
      children:
      - type: text
