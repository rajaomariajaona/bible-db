    - type: text
      text: ' that thou hast found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' so quickly, my son? And he said, Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Isaac said unto Jacob, Come near, I pray thee, that I may feel thee, my son, whether thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' my very son Esau or not. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob went near unto Isaac his father; and he felt him, and said, The voice '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Jacob''s voice, but the hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the hands of Esau. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he discerned him not, because his hands were hairy, as his brother Esau''s hands: so he blessed him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou my very son Esau? And he said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' near to me, and I will eat of my son''s venison, that my soul may bless thee. And he brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' near to him, and he did eat: and he brought him wine, and he drank. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his father Isaac said unto him, Come near now, and kiss me, my son. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he came near, and kissed him: and he smelled the smell of his raiment, and blessed him, and said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, the smell of my son
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' as the smell of a field which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath blessed:'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore God give thee of the dew of heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fatness of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And plenty of corn and wine:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let people serve thee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And nations bow down to thee:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be lord over thy brethren,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let thy mother''s sons bow down to thee:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' every one that curseth thee,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' he that blesseth thee.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'now therefore take, I pray thee, thy weapons, thy quiver and thy bow, and go out to the field, and take me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' venison; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as soon as Isaac had made an end of blessing Jacob, and Jacob was yet scarce gone out from the presence of Isaac his father, that Esau his brother came in from his hunting. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he also had made savoury meat, and brought it unto his father, and said unto his father, Let my father arise, and eat of his son''s venison, that thy soul may bless me. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Isaac his father said unto him, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou? And he said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy son, thy firstborn Esau. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Isaac trembled very exceedingly, and said, Who? where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that hath taken venison, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' me, and I have eaten of all before thou camest, and have blessed him? yea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he shall be blessed. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Esau heard the words of his father, he cried with a great and exceeding bitter cry, and said unto his father, Bless me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' me also, O my father. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Thy brother came with subtilty, and hath taken away thy blessing. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Is not he rightly named Jacob? for he hath supplanted me these two times: he took away my birthright; and, behold, now he hath taken away my blessing. And he said, Hast thou not reserved a blessing for me? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Isaac answered and said unto Esau, Behold, I have made him thy lord, and all his brethren have I given to him for servants; and with corn and wine have I sustained him: and what shall I do now unto thee, my son? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Esau said unto his father, Hast thou but one blessing, my father? bless me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' me also, O my father. And Esau lifted up his voice, and wept. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Isaac his father answered and said unto him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, thy dwelling shall be the fatness of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of the dew of heaven from above;
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and make me savoury meat, such as I love, and bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to me, that I may eat; that my soul may bless thee before I die. '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by thy sword shalt thou live, and shalt serve thy brother;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it shall come to pass when thou shalt have the dominion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That thou shalt break his yoke from off thy neck.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Esau hated Jacob because of the blessing wherewith his father blessed him: and Esau said in his heart, The days of mourning for my father are at hand; then will I slay my brother Jacob. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these words of Esau her elder son were told to Rebekah: and she sent and called Jacob her younger son, and said unto him, Behold, thy brother Esau, as touching thee, doth comfort himself, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: purposing
    - type: text
      text: ' to kill thee. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, my son, obey my voice; and arise, flee thou to Laban my brother to Haran; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and tarry with him a few days, until thy brother''s fury turn away; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until thy brother''s anger turn away from thee, and he forget '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which thou hast done to him: then I will send, and fetch thee from thence: why should I be deprived also of you both in one day?'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rebekah said to Isaac, I am weary of my life because of the daughters of Heth: if Jacob take a wife of the daughters of Heth, such as these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which are
    - type: text
      text: ' of the daughters of the land, what good shall my life do me?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rebekah heard when Isaac spake to Esau his son. And Esau went to the field to hunt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' venison, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rebekah spake unto Jacob her son, saying, Behold, I heard thy father speak unto Esau thy brother, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring me venison, and make me savoury meat, that I may eat, and bless thee before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' before my death. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, my son, obey my voice according to that which I command thee. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go now to the flock, and fetch me from thence two good kids of the goats; and I will make them savoury meat for thy father, such as he loveth: '
