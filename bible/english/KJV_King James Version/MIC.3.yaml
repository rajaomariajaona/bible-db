document_id: MIC.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem, City of Blood
  - type: text
    content: 'And I said, Hear, I pray you, O heads of Jacob, and ye princes of the house of Israel; '
  - type: text
    content: Is it
  - type: text
    content: ' not for you to know judgment? '
  '10':
  - type: text
    content: 'They build up Zion with blood, and Jerusalem with iniquity. '
  '11':
  - type: text
    content: 'The heads thereof judge for reward, and the priests thereof teach for hire, and the prophets thereof divine for money: yet will they lean upon the '
  - type: text
    content: LORD
  - type: text
    content: ', and say, '
  - type: text
    content: Is
  - type: text
    content: ' not the '
  - type: text
    content: LORD
  - type: text
    content: ' among us? none evil can come upon us. '
  '12':
  - type: text
    content: 'Therefore shall Zion for your sake be plowed '
  - type: text
    content: as
  - type: text
    content: ' a field, and Jerusalem shall become heaps, and the mountain of the house as the high places of the forest.'
  '2':
  - type: text
    content: 'Who hate the good, and love the evil; who pluck off their skin from off them, and their flesh from off their bones; '
  '3':
  - type: text
    content: 'who also eat the flesh of my people, and flay their skin from off them; and they break their bones, and chop them in pieces, as for the pot, and as flesh within the caldron. '
  '4':
  - type: text
    content: 'Then shall they cry unto the '
  - type: text
    content: LORD
  - type: text
    content: ', but he will not hear them: he will even hide his face from them at that time, as they have behaved themselves ill in their doings.'
  '5':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' concerning the prophets that make my people err, that bite with their teeth, and cry, Peace; and he that putteth not into their mouths, they even prepare war against him. '
  '6':
  - type: text
    content: 'Therefore night '
  - type: text
    content: shall be
  - type: text
    content: ' unto you, that ye shall not have a vision; and it shall be dark unto you, that ye shall not divine; and the sun shall go down over the prophets, and the day shall be dark over them. '
  '7':
  - type: text
    content: 'Then shall the seers be ashamed, and the diviners confounded: yea, they shall all cover their lips; for '
  - type: text
    content: there is
  - type: text
    content: ' no answer of God.'
  '8':
  - type: text
    content: 'But truly I am full of power by the spirit of the '
  - type: text
    content: LORD
  - type: text
    content: ', and of judgment, and of might, to declare unto Jacob his transgression, and to Israel his sin.'
  '9':
  - type: text
    content: 'Hear this, I pray you, ye heads of the house of Jacob, and princes of the house of Israel, that abhor judgment, and pervert all equity. '
