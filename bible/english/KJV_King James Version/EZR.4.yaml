  - type: text
    content: ' the copy of the letter that they sent unto him, '
  - type: text
    content: even
  - type: text
    content: ' unto Artaxerxes the king; Thy servants the men on this side the river, and at such a time. '
  '12':
  - type: text
    content: 'Be it known unto the king, that the Jews which came up from thee to us are come unto Jerusalem, building the rebellious and the bad city, and have set up the walls '
  - type: text
    content: thereof
  - type: text
    content: ', and joined the foundations. '
  '13':
  - type: text
    content: 'Be it known now unto the king, that, if this city be builded, and the walls set up '
  - type: text
    content: again, then
  - type: text
    content: ' will they not pay toll, tribute, and custom, and '
  - type: text
    content: so
  - type: text
    content: ' thou shalt endamage the revenue of the kings. '
  '14':
  - type: text
    content: 'Now because we have maintenance from '
  - type: text
    content: the king's
  - type: text
    content: ' palace, and it was not meet for us to see the king''s dishonour, therefore have we sent and certified the king; '
  '15':
  - type: text
    content: 'that search may be made in the book of the records of thy fathers: so shalt thou find in the book of the records, and know that this city '
  - type: text
    content: is
  - type: text
    content: ' a rebellious city, and hurtful unto kings and provinces, and that they have moved sedition within the same of old time: for which cause was this city destroyed. '
  '16':
  - type: text
    content: 'We certify the king that, if this city be builded '
  - type: text
    content: again
  - type: text
    content: ', and the walls thereof set up, by this means thou shalt have no portion on this side the river.'
  '17':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' sent the king an answer unto Rehum the chancellor, and '
  - type: text
    content: to
  - type: text
    content: ' Shimshai the scribe, and '
  - type: text
    content: to
  - type: text
    content: ' the rest of their companions that dwell in Samaria, and '
  - type: text
    content: unto
  - type: text
    content: ' the rest beyond the river, Peace, and at such a time. '
  '18':
  - type: text
    content: 'The letter which ye sent unto us hath been plainly read before me. '
  '19':
  - type: text
    content: 'And I commanded, and search hath been made, and it is found that this city of old time hath made insurrection against kings, and '
  - type: text
    content: that
  - type: text
    content: ' rebellion and sedition have been made therein. '
  '2':
  - type: text
    content: 'then they came to Zerubbabel, and to the chief of the fathers, and said unto them, Let us build with you: for we seek your God, as ye '
  - type: text
    content: do
  - type: text
    content: '; and we do sacrifice unto him since the days of Esarhaddon king of Assur, which brought us up hither. '
  '20':
  - type: text
    content: 'There have been mighty kings also over Jerusalem, which have ruled over all '
  - type: text
    content: countries
  - type: text
    content: ' beyond the river; and toll, tribute, and custom, was paid unto them. '
  '21':
  - type: text
    content: 'Give ye now commandment to cause these men to cease, and that this city be not builded, until '
  - type: text
    content: another
  - type: text
    content: ' commandment shall be given from me. '
  '22':
  - type: text
    content: 'Take heed now that ye fail not to do this: why should damage grow to the hurt of the kings?'
  '23':
  - type: text
    content: 'Now when the copy of king Artaxerxes'' letter '
  - type: text
    content: was
  - type: text
    content: ' read before Rehum, and Shimshai the scribe, and their companions, they went up in haste to Jerusalem unto the Jews, and made them to cease by force and power. '
  '24':
  - type: text
    content: 'Then ceased the work of the house of God which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem. So it ceased unto the second year of the reign of Darius king of Persia.'
  '3':
  - type: text
    content: 'But Zerubbabel, and Jeshua, and the rest of the chief of the fathers of Israel, said unto them, Ye have nothing to do with us to build an house unto our God; but we ourselves together will build unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, as king Cyrus the king of Persia hath commanded us. '
  '4':
  - type: text
    content: 'Then the people of the land weakened the hands of the people of Judah, and troubled them in building, '
  '5':
  - type: text
    content: 'and hired counsellors against them, to frustrate their purpose, all the days of Cyrus king of Persia, even until the reign of Darius king of Persia. '
  '6':
  - type: text
    content: 'And in the reign of Ahasuerus, in the beginning of his reign, wrote they '
  - type: text
    content: unto him
  - type: text
    content: ' an accusation against the inhabitants of Judah and Jerusalem.'
  '7':
  - type: text
    content: 'And in the days of Artaxerxes wrote Bishlam, Mithredath, Tabeel, and the rest of their companions, unto Artaxerxes king of Persia; and the writing of the letter '
  - type: text
    content: was
  - type: text
    content: ' written in the Syrian tongue, and interpreted in the Syrian tongue. '
  '8':
  - type: text
    content: 'Rehum the chancellor and Shimshai the scribe wrote a letter against Jerusalem to Artaxerxes the king in this sort: '
  '9':
  - type: text
    content: 'then '
  - type: text
    content: wrote
  - type: text
    content: ' Rehum the chancellor, and Shimshai the scribe, and the rest of their companions; the Dinaites, the Apharsathchites, the Tarpelites, the Apharsites, the Archevites, the Babylonians, the Susanchites, the Dehavites, '
  - type: text
    content: and
  - type: text
    content: ' the Elamites, '
