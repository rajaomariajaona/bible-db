document_id: EZR.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Work is Hindered
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the adversaries of Judah and Benjamin heard that the children of the captivity builded the temple unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the rest of the nations whom the great and noble Asnapper brought over, and set in the cities of Samaria, and the rest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' on this side the river, and at such a time.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the copy of the letter that they sent unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Artaxerxes the king; Thy servants the men on this side the river, and at such a time. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be it known unto the king, that the Jews which came up from thee to us are come unto Jerusalem, building the rebellious and the bad city, and have set up the walls '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: ', and joined the foundations. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be it known now unto the king, that, if this city be builded, and the walls set up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again, then
    - type: text
      text: ' will they not pay toll, tribute, and custom, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' thou shalt endamage the revenue of the kings. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now because we have maintenance from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the king's
    - type: text
      text: ' palace, and it was not meet for us to see the king''s dishonour, therefore have we sent and certified the king; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that search may be made in the book of the records of thy fathers: so shalt thou find in the book of the records, and know that this city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a rebellious city, and hurtful unto kings and provinces, and that they have moved sedition within the same of old time: for which cause was this city destroyed. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We certify the king that, if this city be builded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again
    - type: text
      text: ', and the walls thereof set up, by this means thou shalt have no portion on this side the river.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Then
    - type: text
      text: ' sent the king an answer unto Rehum the chancellor, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' Shimshai the scribe, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the rest of their companions that dwell in Samaria, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto
    - type: text
      text: ' the rest beyond the river, Peace, and at such a time. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The letter which ye sent unto us hath been plainly read before me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I commanded, and search hath been made, and it is found that this city of old time hath made insurrection against kings, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' rebellion and sedition have been made therein. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then they came to Zerubbabel, and to the chief of the fathers, and said unto them, Let us build with you: for we seek your God, as ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: '; and we do sacrifice unto him since the days of Esarhaddon king of Assur, which brought us up hither. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There have been mighty kings also over Jerusalem, which have ruled over all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: countries
    - type: text
      text: ' beyond the river; and toll, tribute, and custom, was paid unto them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give ye now commandment to cause these men to cease, and that this city be not builded, until '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' commandment shall be given from me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take heed now that ye fail not to do this: why should damage grow to the hurt of the kings?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the copy of king Artaxerxes'' letter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' read before Rehum, and Shimshai the scribe, and their companions, they went up in haste to Jerusalem unto the Jews, and made them to cease by force and power. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then ceased the work of the house of God which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at Jerusalem. So it ceased unto the second year of the reign of Darius king of Persia.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Zerubbabel, and Jeshua, and the rest of the chief of the fathers of Israel, said unto them, Ye have nothing to do with us to build an house unto our God; but we ourselves together will build unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, as king Cyrus the king of Persia hath commanded us. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of the land weakened the hands of the people of Judah, and troubled them in building, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and hired counsellors against them, to frustrate their purpose, all the days of Cyrus king of Persia, even until the reign of Darius king of Persia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the reign of Ahasuerus, in the beginning of his reign, wrote they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ' an accusation against the inhabitants of Judah and Jerusalem.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the days of Artaxerxes wrote Bishlam, Mithredath, Tabeel, and the rest of their companions, unto Artaxerxes king of Persia; and the writing of the letter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' written in the Syrian tongue, and interpreted in the Syrian tongue. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehum the chancellor and Shimshai the scribe wrote a letter against Jerusalem to Artaxerxes the king in this sort: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wrote
    - type: text
      text: ' Rehum the chancellor, and Shimshai the scribe, and the rest of their companions; the Dinaites, the Apharsathchites, the Tarpelites, the Apharsites, the Archevites, the Babylonians, the Susanchites, the Dehavites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the Elamites, '
