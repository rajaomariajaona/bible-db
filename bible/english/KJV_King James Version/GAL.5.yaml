document_id: GAL.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Commends the New Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Stand fast therefore in the liberty wherewith Christ hath made us free, and be not entangled again with the yoke of bondage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Behold, I Paul say unto you, that if ye be circumcised, Christ shall profit you nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I testify again to every man that is circumcised, that he is a debtor to do the whole law. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Christ is become of no effect unto you, whosoever of you are justified by the law; ye are fallen from grace. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For we through the Spirit wait for the hope of righteousness by faith. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For in Jesus Christ neither circumcision availeth any thing, nor uncircumcision; but faith which worketh by love.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ye did run well; who did hinder you that ye should not obey the truth? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This persuasion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cometh
  - type: text
    text: ' not of him that calleth you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A little leaven leaveneth the whole lump. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have confidence in you through the Lord, that ye will be none otherwise minded: but he that troubleth you shall bear his judgment, whosoever he be. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I, brethren, if I yet preach circumcision, why do I yet suffer persecution? then is the offence of the cross ceased. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I would they were even cut off which trouble you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For, brethren, ye have been called unto liberty; only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: use
  - type: text
    text: ' not liberty for an occasion to the flesh, but by love serve one another. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For all the law is fulfilled in one word, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' in this; Thou shalt love thy neighbour as thyself. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But if ye bite and devour one another, take heed that ye be not consumed one of another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: This
  - type: text
    text: ' I say then, Walk in the Spirit, and ye shall not fulfil the lust of the flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the flesh lusteth against the Spirit, and the Spirit against the flesh: and these are contrary the one to the other: so that ye cannot do the things that ye would. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But if ye be led of the Spirit, ye are not under the law. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the works of the flesh are manifest, which are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: '; Adultery, fornication, uncleanness, lasciviousness, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'idolatry, witchcraft, hatred, variance, emulations, wrath, strife, seditions, heresies, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'envyings, murders, drunkenness, revellings, and such like: of the which I tell you before, as I have also told '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' in time past, that they which do such things shall not inherit the kingdom of God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the fruit of the Spirit is love, joy, peace, longsuffering, gentleness, goodness, faith, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'meekness, temperance: against such there is no law. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And they that are Christ's have crucified the flesh with the affections and lusts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'If we live in the Spirit, let us also walk in the Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Let us not be desirous of vain glory, provoking one another, envying one another.
