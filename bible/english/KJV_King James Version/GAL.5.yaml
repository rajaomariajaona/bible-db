document_id: GAL.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Commends the New Life
  - type: text
    content: Stand fast therefore in the liberty wherewith Christ hath made us free, and be not entangled again with the yoke of bondage.
  '10':
  - type: text
    content: 'I have confidence in you through the Lord, that ye will be none otherwise minded: but he that troubleth you shall bear his judgment, whosoever he be. '
  '11':
  - type: text
    content: 'And I, brethren, if I yet preach circumcision, why do I yet suffer persecution? then is the offence of the cross ceased. '
  '12':
  - type: text
    content: I would they were even cut off which trouble you.
  '13':
  - type: text
    content: 'For, brethren, ye have been called unto liberty; only '
  - type: text
    content: use
  - type: text
    content: ' not liberty for an occasion to the flesh, but by love serve one another. '
  '14':
  - type: text
    content: 'For all the law is fulfilled in one word, '
  - type: text
    content: even
  - type: text
    content: ' in this; Thou shalt love thy neighbour as thyself. '
  '15':
  - type: text
    content: But if ye bite and devour one another, take heed that ye be not consumed one of another.
  '16':
  - type: text
    content: ' '
  - type: text
    content: This
  - type: text
    content: ' I say then, Walk in the Spirit, and ye shall not fulfil the lust of the flesh. '
  '17':
  - type: text
    content: 'For the flesh lusteth against the Spirit, and the Spirit against the flesh: and these are contrary the one to the other: so that ye cannot do the things that ye would. '
  '18':
  - type: text
    content: 'But if ye be led of the Spirit, ye are not under the law. '
  '19':
  - type: text
    content: 'Now the works of the flesh are manifest, which are '
  - type: text
    content: these
  - type: text
    content: '; Adultery, fornication, uncleanness, lasciviousness, '
  '2':
  - type: text
    content: 'Behold, I Paul say unto you, that if ye be circumcised, Christ shall profit you nothing. '
  '20':
  - type: text
    content: 'idolatry, witchcraft, hatred, variance, emulations, wrath, strife, seditions, heresies, '
  '21':
  - type: text
    content: 'envyings, murders, drunkenness, revellings, and such like: of the which I tell you before, as I have also told '
  - type: text
    content: you
  - type: text
    content: ' in time past, that they which do such things shall not inherit the kingdom of God. '
  '22':
  - type: text
    content: 'But the fruit of the Spirit is love, joy, peace, longsuffering, gentleness, goodness, faith, '
  '23':
  - type: text
    content: 'meekness, temperance: against such there is no law. '
  '24':
  - type: text
    content: And they that are Christ's have crucified the flesh with the affections and lusts.
  '25':
  - type: text
    content: 'If we live in the Spirit, let us also walk in the Spirit. '
  '26':
  - type: text
    content: Let us not be desirous of vain glory, provoking one another, envying one another.
  '3':
  - type: text
    content: 'For I testify again to every man that is circumcised, that he is a debtor to do the whole law. '
  '4':
  - type: text
    content: 'Christ is become of no effect unto you, whosoever of you are justified by the law; ye are fallen from grace. '
  '5':
  - type: text
    content: 'For we through the Spirit wait for the hope of righteousness by faith. '
  '6':
  - type: text
    content: For in Jesus Christ neither circumcision availeth any thing, nor uncircumcision; but faith which worketh by love.
  '7':
  - type: text
    content: 'Ye did run well; who did hinder you that ye should not obey the truth? '
  '8':
  - type: text
    content: 'This persuasion '
  - type: text
    content: cometh
  - type: text
    content: ' not of him that calleth you. '
  '9':
  - type: text
    content: 'A little leaven leaveneth the whole lump. '
