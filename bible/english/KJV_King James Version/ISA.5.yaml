document_id: ISA.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Parable
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now will I sing to my wellbeloved a song of my beloved touching his vineyard. My wellbeloved hath a vineyard in a very fruitful hill: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he fenced it, and gathered out the stones thereof, and planted it with the choicest vine, and built a tower in the midst of it, and also made a winepress therein: and he looked that it should bring forth grapes, and it brought forth wild grapes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And now, O inhabitants of Jerusalem, and men of Judah, judge, I pray you, betwixt me and my vineyard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'What could have been done more to my vineyard, that I have not done in it? wherefore, when I looked that it should bring forth grapes, brought it forth wild grapes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And now go to; I will tell you what I will do to my vineyard: I will take away the hedge thereof, and it shall be eaten up; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' break down the wall thereof, and it shall be trodden down: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and I will lay it waste: it shall not be pruned, nor digged; but there shall come up briers and thorns: I will also command the clouds that they rain no rain upon it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the vineyard of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the house of Israel, and the men of Judah his pleasant plant: and he looked for judgment, but behold oppression; for righteousness, but behold a cry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Woe unto them that join house to house, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' lay field to field, till '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be
  - type: text
    text: ' no place, that they may be placed alone in the midst of the earth! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In mine ears '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, Of a truth many houses shall be desolate, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' great and fair, without inhabitant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yea, ten acres of vineyard shall yield one bath, and the seed of an homer shall yield an ephah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Woe unto them that rise up early in the morning, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they may follow strong drink; that continue until night, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: till
  - type: text
    text: ' wine inflame them! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the harp, and the viol, the tabret, and pipe, and wine, are in their feasts: but they regard not the work of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', neither consider the operation of his hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore my people are gone into captivity, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they have
  - type: text
    text: ' no knowledge: and their honourable men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' famished, and their multitude dried up with thirst. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore hell hath enlarged herself, and opened her mouth without measure: and their glory, and their multitude, and their pomp, and he that rejoiceth, shall descend into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the mean man shall be brought down, and the mighty man shall be humbled, and the eyes of the lofty shall be humbled: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts shall be exalted in judgment, and God that is holy shall be sanctified in righteousness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then shall the lambs feed after their manner, and the waste places of the fat ones shall strangers eat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Woe unto them that draw iniquity with cords of vanity, and sin as it were with a cart rope: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'that say, Let him make speed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hasten his work, that we may see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' and let the counsel of the Holy One of Israel draw nigh and come, that we may know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Woe unto them that call evil good, and good evil; that put darkness for light, and light for darkness; that put bitter for sweet, and sweet for bitter!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Woe unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' wise in their own eyes, and prudent in their own sight! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Woe unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' mighty to drink wine, and men of strength to mingle strong drink: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'which justify the wicked for reward, and take away the righteousness of the righteous from him! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore as the fire devoureth the stubble, and the flame consumeth the chaff, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' their root shall be as rottenness, and their blossom shall go up as dust: because they have cast away the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, and despised the word of the Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Therefore is the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' kindled against his people, and he hath stretched forth his hand against them, and hath smitten them: and the hills did tremble, and their carcases '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' torn in the midst of the streets. For all this his anger is not turned away, but his hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' stretched out still. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he will lift up an ensign to the nations from far, and will hiss unto them from the end of the earth: and, behold, they shall come with speed swiftly: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'none shall be weary nor stumble among them; none shall slumber nor sleep; neither shall the girdle of their loins be loosed, nor the latchet of their shoes be broken: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'whose arrows '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' sharp, and all their bows bent, their horses'' hoofs shall be counted like flint, and their wheels like a whirlwind: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'their roaring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' like a lion, they shall roar like young lions: yea, they shall roar, and lay hold of the prey, and shall carry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' away safe, and none shall deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And in that day they shall roar against them like the roaring of the sea: and if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' look unto the land, behold darkness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrow, and the light is darkened in the heavens thereof.'
