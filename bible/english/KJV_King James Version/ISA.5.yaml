document_id: ISA.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Parable
  - type: text
    content: 'Now will I sing to my wellbeloved a song of my beloved touching his vineyard. My wellbeloved hath a vineyard in a very fruitful hill: '
  '10':
  - type: text
    content: Yea, ten acres of vineyard shall yield one bath, and the seed of an homer shall yield an ephah.
  '11':
  - type: text
    content: 'Woe unto them that rise up early in the morning, '
  - type: text
    content: that
  - type: text
    content: ' they may follow strong drink; that continue until night, '
  - type: text
    content: till
  - type: text
    content: ' wine inflame them! '
  '12':
  - type: text
    content: 'And the harp, and the viol, the tabret, and pipe, and wine, are in their feasts: but they regard not the work of the '
  - type: text
    content: LORD
  - type: text
    content: ', neither consider the operation of his hands. '
  '13':
  - type: text
    content: 'Therefore my people are gone into captivity, because '
  - type: text
    content: they have
  - type: text
    content: ' no knowledge: and their honourable men '
  - type: text
    content: are
  - type: text
    content: ' famished, and their multitude dried up with thirst. '
  '14':
  - type: text
    content: 'Therefore hell hath enlarged herself, and opened her mouth without measure: and their glory, and their multitude, and their pomp, and he that rejoiceth, shall descend into it. '
  '15':
  - type: text
    content: 'And the mean man shall be brought down, and the mighty man shall be humbled, and the eyes of the lofty shall be humbled: '
  '16':
  - type: text
    content: 'but the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts shall be exalted in judgment, and God that is holy shall be sanctified in righteousness. '
  '17':
  - type: text
    content: Then shall the lambs feed after their manner, and the waste places of the fat ones shall strangers eat.
  '18':
  - type: text
    content: 'Woe unto them that draw iniquity with cords of vanity, and sin as it were with a cart rope: '
  '19':
  - type: text
    content: 'that say, Let him make speed, '
  - type: text
    content: and
  - type: text
    content: ' hasten his work, that we may see '
  - type: text
    content: 'it:'
  - type: text
    content: ' and let the counsel of the Holy One of Israel draw nigh and come, that we may know '
  - type: text
    content: it!
  '2':
  - type: text
    content: 'and he fenced it, and gathered out the stones thereof, and planted it with the choicest vine, and built a tower in the midst of it, and also made a winepress therein: and he looked that it should bring forth grapes, and it brought forth wild grapes.'
  '20':
  - type: text
    content: Woe unto them that call evil good, and good evil; that put darkness for light, and light for darkness; that put bitter for sweet, and sweet for bitter!
  '21':
  - type: text
    content: 'Woe unto '
  - type: text
    content: them that are
  - type: text
    content: ' wise in their own eyes, and prudent in their own sight! '
  '22':
  - type: text
    content: 'Woe unto '
  - type: text
    content: them that are
  - type: text
    content: ' mighty to drink wine, and men of strength to mingle strong drink: '
  '23':
  - type: text
    content: 'which justify the wicked for reward, and take away the righteousness of the righteous from him! '
  '24':
  - type: text
    content: 'Therefore as the fire devoureth the stubble, and the flame consumeth the chaff, '
  - type: text
    content: so
  - type: text
    content: ' their root shall be as rottenness, and their blossom shall go up as dust: because they have cast away the law of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and despised the word of the Holy One of Israel.'
  '25':
  - type: text
    content: 'Therefore is the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' kindled against his people, and he hath stretched forth his hand against them, and hath smitten them: and the hills did tremble, and their carcases '
  - type: text
    content: were
  - type: text
    content: ' torn in the midst of the streets. For all this his anger is not turned away, but his hand '
  - type: text
    content: is
  - type: text
    content: ' stretched out still. '
  '26':
  - type: text
    content: 'And he will lift up an ensign to the nations from far, and will hiss unto them from the end of the earth: and, behold, they shall come with speed swiftly: '
  '27':
  - type: text
    content: 'none shall be weary nor stumble among them; none shall slumber nor sleep; neither shall the girdle of their loins be loosed, nor the latchet of their shoes be broken: '
  '28':
  - type: text
    content: 'whose arrows '
  - type: text
    content: are
  - type: text
    content: ' sharp, and all their bows bent, their horses'' hoofs shall be counted like flint, and their wheels like a whirlwind: '
  '29':
  - type: text
    content: 'their roaring '
  - type: text
    content: shall be
  - type: text
    content: ' like a lion, they shall roar like young lions: yea, they shall roar, and lay hold of the prey, and shall carry '
  - type: text
    content: it
  - type: text
    content: ' away safe, and none shall deliver '
  - type: text
    content: it
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'And now, O inhabitants of Jerusalem, and men of Judah, judge, I pray you, betwixt me and my vineyard. '
  '30':
  - type: text
    content: 'And in that day they shall roar against them like the roaring of the sea: and if '
  - type: text
    content: one
  - type: text
    content: ' look unto the land, behold darkness '
  - type: text
    content: and
  - type: text
    content: ' sorrow, and the light is darkened in the heavens thereof.'
  '4':
  - type: text
    content: 'What could have been done more to my vineyard, that I have not done in it? wherefore, when I looked that it should bring forth grapes, brought it forth wild grapes? '
  '5':
  - type: text
    content: 'And now go to; I will tell you what I will do to my vineyard: I will take away the hedge thereof, and it shall be eaten up; '
  - type: text
    content: and
  - type: text
    content: ' break down the wall thereof, and it shall be trodden down: '
  '6':
  - type: text
    content: 'and I will lay it waste: it shall not be pruned, nor digged; but there shall come up briers and thorns: I will also command the clouds that they rain no rain upon it. '
  '7':
  - type: text
    content: 'For the vineyard of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' the house of Israel, and the men of Judah his pleasant plant: and he looked for judgment, but behold oppression; for righteousness, but behold a cry.'
  '8':
  - type: text
    content: 'Woe unto them that join house to house, '
  - type: text
    content: that
  - type: text
    content: ' lay field to field, till '
  - type: text
    content: there be
  - type: text
    content: ' no place, that they may be placed alone in the midst of the earth! '
  '9':
  - type: text
    content: 'In mine ears '
  - type: text
    content: said
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, Of a truth many houses shall be desolate, '
  - type: text
    content: even
  - type: text
    content: ' great and fair, without inhabitant. '
