document_id: PRO.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Words of Lemuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The words of king Lemuel, the prophecy that his mother taught him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: What, my son? and what, the son of my womb?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And what, the son of my vows?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Give not thy strength unto women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor thy ways to that which destroyeth kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not for kings, O Lemuel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' not for kings to drink wine;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor for princes strong drink:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lest they drink, and forget the law,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And pervert the judgment of any of the afflicted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Give strong drink unto him that is ready to perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And wine unto those that be of heavy hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let him drink, and forget his poverty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And remember his misery no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Open thy mouth for the dumb
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the cause of all such as are appointed to destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Open thy mouth, judge righteously,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And plead the cause of the poor and needy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Good Wife
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who can find a virtuous woman?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For her price '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' far above rubies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The heart of her husband doth safely trust in her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that he shall have no need of spoil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: She will do him good and not evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the days of her life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: She seeketh wool, and flax,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And worketh willingly with her hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She is like the merchants' ships;
- type: usfm
  marker: q2
  children:
  - type: text
    text: She bringeth her food from afar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She riseth also while it is yet night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And giveth meat to her household,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a portion to her maidens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'She considereth a field, and buyeth it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: With the fruit of her hands she planteth a vineyard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: She girdeth her loins with strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And strengtheneth her arms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'She perceiveth that her merchandise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her candle goeth not out by night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: She layeth her hands to the spindle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And her hands hold the distaff.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: She stretcheth out her hand to the poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, she reacheth forth her hands to the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'She is not afraid of the snow for her household:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For all her household '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' clothed with scarlet.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: She maketh herself coverings of tapestry;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Her clothing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' silk and purple.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Her husband is known in the gates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When he sitteth among the elders of the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'She maketh fine linen, and selleth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And delivereth girdles unto the merchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Strength and honour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' her clothing;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And she shall rejoice in time to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: She openeth her mouth with wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in her tongue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of kindness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: She looketh well to the ways of her household,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And eateth not the bread of idleness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Her children arise up, and call her blessed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Her husband '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ', and he praiseth her.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Many daughters have done virtuously,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But thou excellest them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Favour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' deceitful, and beauty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vain:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' a woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' feareth the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', she shall be praised.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Give her of the fruit of her hands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let her own works praise her in the gates.
