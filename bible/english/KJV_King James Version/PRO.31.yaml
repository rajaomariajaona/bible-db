document_id: PRO.31,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Words of Lemuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The words of king Lemuel, the prophecy that his mother taught him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can find a virtuous woman?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For her price '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' far above rubies.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heart of her husband doth safely trust in her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that he shall have no need of spoil.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will do him good and not evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the days of her life.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She seeketh wool, and flax,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And worketh willingly with her hands.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is like the merchants' ships;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She bringeth her food from afar.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She riseth also while it is yet night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And giveth meat to her household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a portion to her maidens.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She considereth a field, and buyeth it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the fruit of her hands she planteth a vineyard.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She girdeth her loins with strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strengtheneth her arms.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She perceiveth that her merchandise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her candle goeth not out by night.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She layeth her hands to the spindle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her hands hold the distaff.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What, my son? and what, the son of my womb?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what, the son of my vows?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She stretcheth out her hand to the poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, she reacheth forth her hands to the needy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She is not afraid of the snow for her household:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For all her household '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' clothed with scarlet.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She maketh herself coverings of tapestry;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her clothing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' silk and purple.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her husband is known in the gates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When he sitteth among the elders of the land.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She maketh fine linen, and selleth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And delivereth girdles unto the merchant.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Strength and honour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' her clothing;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And she shall rejoice in time to come.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She openeth her mouth with wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in her tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of kindness.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She looketh well to the ways of her household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And eateth not the bread of idleness.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her children arise up, and call her blessed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her husband '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ', and he praiseth her.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many daughters have done virtuously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But thou excellest them all.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give not thy strength unto women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor thy ways to that which destroyeth kings.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Favour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' deceitful, and beauty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vain:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' a woman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' feareth the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', she shall be praised.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give her of the fruit of her hands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let her own works praise her in the gates.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' not for kings, O Lemuel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not for kings to drink wine;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor for princes strong drink:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lest they drink, and forget the law,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And pervert the judgment of any of the afflicted.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give strong drink unto him that is ready to perish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wine unto those that be of heavy hearts.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him drink, and forget his poverty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And remember his misery no more.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open thy mouth for the dumb
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the cause of all such as are appointed to destruction.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open thy mouth, judge righteously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And plead the cause of the poor and needy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Good Wife
    marker-yv: yv-h
