verses:
  '1':
  - type: heading
    content: Words of Lemuel
  - type: text
    content: The words of king Lemuel, the prophecy that his mother taught him.
  '10':
  - type: text
    content: Who can find a virtuous woman?
  - type: text
    content: 'For her price '
  - type: text
    content: is
  - type: text
    content: ' far above rubies.'
  '11':
  - type: text
    content: The heart of her husband doth safely trust in her,
  - type: text
    content: So that he shall have no need of spoil.
  '12':
  - type: text
    content: She will do him good and not evil
  - type: text
    content: All the days of her life.
  '13':
  - type: text
    content: She seeketh wool, and flax,
  - type: text
    content: And worketh willingly with her hands.
  '14':
  - type: text
    content: She is like the merchants' ships;
  - type: text
    content: She bringeth her food from afar.
  '15':
  - type: text
    content: She riseth also while it is yet night,
  - type: text
    content: And giveth meat to her household,
  - type: text
    content: And a portion to her maidens.
  '16':
  - type: text
    content: 'She considereth a field, and buyeth it:'
  - type: text
    content: With the fruit of her hands she planteth a vineyard.
  '17':
  - type: text
    content: She girdeth her loins with strength,
  - type: text
    content: And strengtheneth her arms.
  '18':
  - type: text
    content: 'She perceiveth that her merchandise '
  - type: text
    content: is
  - type: text
    content: ' good:'
  - type: text
    content: Her candle goeth not out by night.
  '19':
  - type: text
    content: She layeth her hands to the spindle,
  - type: text
    content: And her hands hold the distaff.
  '2':
  - type: text
    content: What, my son? and what, the son of my womb?
  - type: text
    content: And what, the son of my vows?
  '20':
  - type: text
    content: She stretcheth out her hand to the poor;
  - type: text
    content: Yea, she reacheth forth her hands to the needy.
  '21':
  - type: text
    content: 'She is not afraid of the snow for her household:'
  - type: text
    content: 'For all her household '
  - type: text
    content: are
  - type: text
    content: ' clothed with scarlet.'
  '22':
  - type: text
    content: She maketh herself coverings of tapestry;
  - type: text
    content: 'Her clothing '
  - type: text
    content: is
  - type: text
    content: ' silk and purple.'
  '23':
  - type: text
    content: Her husband is known in the gates,
  - type: text
    content: When he sitteth among the elders of the land.
  '24':
  - type: text
    content: 'She maketh fine linen, and selleth '
  - type: text
    content: it
  - type: text
    content: ;
  - type: text
    content: And delivereth girdles unto the merchant.
  '25':
  - type: text
    content: 'Strength and honour '
  - type: text
    content: are
  - type: text
    content: ' her clothing;'
  - type: text
    content: And she shall rejoice in time to come.
  '26':
  - type: text
    content: She openeth her mouth with wisdom;
  - type: text
    content: 'And in her tongue '
  - type: text
    content: is
  - type: text
    content: ' the law of kindness.'
  '27':
  - type: text
    content: She looketh well to the ways of her household,
  - type: text
    content: And eateth not the bread of idleness.
  '28':
  - type: text
    content: Her children arise up, and call her blessed;
  - type: text
    content: 'Her husband '
  - type: text
    content: also
  - type: text
    content: ', and he praiseth her.'
  '29':
  - type: text
    content: Many daughters have done virtuously,
  - type: text
    content: But thou excellest them all.
  '3':
  - type: text
    content: Give not thy strength unto women,
  - type: text
    content: Nor thy ways to that which destroyeth kings.
  '30':
  - type: text
    content: 'Favour '
  - type: text
    content: is
  - type: text
    content: ' deceitful, and beauty '
  - type: text
    content: is
  - type: text
    content: ' vain:'
  - type: text
    content: But
  - type: text
    content: ' a woman '
  - type: text
    content: that
  - type: text
    content: ' feareth the '
  - type: text
    content: LORD
  - type: text
    content: ', she shall be praised.'
  '31':
  - type: text
    content: Give her of the fruit of her hands;
  - type: text
    content: And let her own works praise her in the gates.
  '4':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' not for kings, O Lemuel, '
  - type: text
    content: it is
  - type: text
    content: ' not for kings to drink wine;'
  - type: text
    content: 'Nor for princes strong drink:'
  '5':
  - type: text
    content: Lest they drink, and forget the law,
  - type: text
    content: And pervert the judgment of any of the afflicted.
  '6':
  - type: text
    content: Give strong drink unto him that is ready to perish,
  - type: text
    content: And wine unto those that be of heavy hearts.
  '7':
  - type: text
    content: Let him drink, and forget his poverty,
  - type: text
    content: And remember his misery no more.
  '8':
  - type: text
    content: Open thy mouth for the dumb
  - type: text
    content: In the cause of all such as are appointed to destruction.
  '9':
  - type: text
    content: Open thy mouth, judge righteously,
  - type: text
    content: And plead the cause of the poor and needy.
  - type: heading
    content: The Good Wife
