document_id: JDG.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Ephraim said unto him, Why hast thou served us thus, that thou calledst us not, when thou wentest to fight with the Midianites? And they did chide with him sharply. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Zebah and Zalmunna '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Karkor, and their hosts with them, about fifteen thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', all that were left of all the hosts of the children of the east: for there fell an hundred and twenty thousand men that drew sword. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon went up by the way of them that dwelt in tents on the east of Nobah and Jogbehah, and smote the host: for the host was secure. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when Zebah and Zalmunna fled, he pursued after them, and took the two kings of Midian, Zebah and Zalmunna, and discomfited all the host.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon the son of Joash returned from battle before the sun '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was up
    - type: text
      text: ', '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and caught a young man of the men of Succoth, and enquired of him: and he described unto him the princes of Succoth, and the elders thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' threescore and seventeen men. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he came unto the men of Succoth, and said, Behold Zebah and Zalmunna, with whom ye did upbraid me, saying, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' the hands of Zebah and Zalmunna now in thine hand, that we should give bread unto thy men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' weary? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took the elders of the city, and thorns of the wilderness and briers, and with them he taught the men of Succoth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he beat down the tower of Penuel, and slew the men of the city.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto Zebah and Zalmunna, What manner of men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were they
    - type: text
      text: ' whom ye slew at Tabor? And they answered, As thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ', so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' they; each one resembled the children of a king. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' my brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the sons of my mother: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, if ye had saved them alive, I would not slay you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, What have I done now in comparison of you? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not the gleaning of the grapes of Ephraim better than the vintage of Abi-ezer? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto Jether his firstborn, Up, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' slay them. But the youth drew not his sword: for he feared, because he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' yet a youth. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Zebah and Zalmunna said, Rise thou, and fall upon us: for as the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is, so is
    - type: text
      text: ' his strength. And Gideon arose, and slew Zebah and Zalmunna, and took away the ornaments that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on their camels'' necks.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men of Israel said unto Gideon, Rule thou over us, both thou, and thy son, and thy son''s son also: for thou hast delivered us from the hand of Midian. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon said unto them, I will not rule over you, neither shall my son rule over you: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall rule over you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon said unto them, I would desire a request of you, that ye would give me every man the earrings of his prey. (For they had golden earrings, because they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' Ishmaelites.) '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered, We will willingly give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. And they spread a garment, and did cast therein every man the earrings of his prey. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the weight of the golden earrings that he requested was a thousand and seven hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of gold; beside ornaments, and collars, and purple raiment that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' on the kings of Midian, and beside the chains that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' about their camels'' necks. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon made an ephod thereof, and put it in his city, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' in Ophrah: and all Israel went thither a whoring after it: which thing became a snare unto Gideon, and to his house. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus was Midian subdued before the children of Israel, so that they lifted up their heads no more. And the country was in quietness forty years in the days of Gideon.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jerubbaal the son of Joash went and dwelt in his own house. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God hath delivered into your hands the princes of Midian, Oreb and Zeeb: and what was I able to do in comparison of you? Then their anger was abated toward him, when he had said that.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon had threescore and ten sons of his body begotten: for he had many wives. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his concubine that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Shechem, she also bare him a son, whose name he called Abimelech. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Gideon the son of Joash died in a good old age, and was buried in the sepulchre of Joash his father, in Ophrah of the Abi-ezrites.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as soon as Gideon was dead, that the children of Israel turned again, and went a whoring after Baalim, and made Baal-berith their god. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel remembered not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, who had delivered them out of the hands of all their enemies on every side: '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'neither shewed they kindness to the house of Jerubbaal, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', Gideon, according to all the goodness which he had shewed unto Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon came to Jordan, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' passed over, he, and the three hundred men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, faint, yet pursuing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto the men of Succoth, Give, I pray you, loaves of bread unto the people that follow me; for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' faint, and I am pursuing after Zebah and Zalmunna, kings of Midian. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the princes of Succoth said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' the hands of Zebah and Zalmunna now in thine hand, that we should give bread unto thine army? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gideon said, Therefore when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath delivered Zebah and Zalmunna into mine hand, then I will tear your flesh with the thorns of the wilderness and with briers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went up thence to Penuel, and spake unto them likewise: and the men of Penuel answered him as the men of Succoth had answered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he spake also unto the men of Penuel, saying, When I come again in peace, I will break down this tower.
