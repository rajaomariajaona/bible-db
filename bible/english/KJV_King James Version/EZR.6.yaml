verses:
  '1':
  - type: heading
    content: The King's Decree
  - type: text
    content: 'Then Darius the king made a decree, and search was made in the house of the rolls, where the treasures were laid up in Babylon. '
  '10':
  - type: text
    content: 'that they may offer sacrifices of sweet savours unto the God of heaven, and pray for the life of the king, and of his sons. '
  '11':
  - type: text
    content: 'Also I have made a decree, that whosoever shall alter this word, let timber be pulled down from his house, and being set up, let him be hanged thereon; and let his house be made a dunghill for this. '
  '12':
  - type: text
    content: 'And the God that hath caused his name to dwell there destroy all kings and people, that shall put to their hand to alter '
  - type: text
    content: and
  - type: text
    content: ' to destroy this house of God which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem. I Darius have made a decree; let it be done with speed.'
  '13':
  - type: text
    content: 'Then Tatnai, governor on this side the river, Shethar-boznai, and their companions, according to that which Darius the king had sent, so they did speedily. '
  '14':
  - type: text
    content: 'And the elders of the Jews builded, and they prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. And they builded, and finished '
  - type: text
    content: it
  - type: text
    content: ', according to the commandment of the God of Israel, and according to the commandment of Cyrus, and Darius, and Artaxerxes king of Persia. '
  '15':
  - type: text
    content: And this house was finished on the third day of the month Adar, which was in the sixth year of the reign of Darius the king.
  - type: heading
    content: The Feast of Dedication
  '16':
  - type: text
    content: 'And the children of Israel, the priests, and the Levites, and the rest of the children of the captivity, kept the dedication of this house of God with joy, '
  '17':
  - type: text
    content: 'and offered at the dedication of this house of God an hundred bullocks, two hundred rams, four hundred lambs; and for a sin offering for all Israel, twelve he goats, according to the number of the tribes of Israel. '
  '18':
  - type: text
    content: 'And they set the priests in their divisions, and the Levites in their courses, for the service of God, which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem; as it is written in the book of Moses.'
  '19':
  - type: text
    content: 'And the children of the captivity kept the passover upon the fourteenth '
  - type: text
    content: day
  - type: text
    content: ' of the first month. '
  '2':
  - type: text
    content: 'And there was found at Achmetha, in the palace that '
  - type: text
    content: is
  - type: text
    content: ' in the province of the Medes, a roll, and therein '
  - type: text
    content: was
  - type: text
    content: ' a record thus written: '
  '20':
  - type: text
    content: 'For the priests and the Levites were purified together, all of them '
  - type: text
    content: were
  - type: text
    content: ' pure, and killed the passover for all the children of the captivity, and for their brethren the priests, and for themselves. '
  '21':
  - type: text
    content: 'And the children of Israel, which were come again out of captivity, and all such as had separated themselves unto them from the filthiness of the heathen of the land, to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, did eat, '
  '22':
  - type: text
    content: 'and kept the feast of unleavened bread seven days with joy: for the '
  - type: text
    content: LORD
  - type: text
    content: ' had made them joyful, and turned the heart of the king of Assyria unto them, to strengthen their hands in the work of the house of God, the God of Israel.'
  '3':
  - type: text
    content: 'in the first year of Cyrus the king '
  - type: text
    content: the same
  - type: text
    content: ' Cyrus the king made a decree '
  - type: text
    content: concerning
  - type: text
    content: ' the house of God at Jerusalem, Let the house be builded, the place where they offered sacrifices, and let the foundations thereof be strongly laid; the height thereof threescore cubits, '
  - type: text
    content: and
  - type: text
    content: ' the breadth thereof threescore cubits; '
  '4':
  - type: text
    content: with
  - type: text
    content: ' three rows of great stones, and a row of new timber: and let the expenses be given out of the king''s house: '
  '5':
  - type: text
    content: 'and also let the golden and silver vessels of the house of God, which Nebuchadnezzar took forth out of the temple which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem, and brought unto Babylon, be restored, and brought again unto the temple which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem, '
  - type: text
    content: every one
  - type: text
    content: ' to his place, and place '
  - type: text
    content: them
  - type: text
    content: ' in the house of God.'
  '6':
  - type: text
    content: 'Now '
  - type: text
    content: therefore
  - type: text
    content: ', Tatnai, governor beyond the river, Shethar-boznai, and your companions the Apharsachites, which '
  - type: text
    content: are
  - type: text
    content: ' beyond the river, be ye far from thence: '
  '7':
  - type: text
    content: 'let the work of this house of God alone; let the governor of the Jews and the elders of the Jews build this house of God in his place. '
  '8':
  - type: text
    content: 'Moreover I make a decree what ye shall do to the elders of these Jews for the building of this house of God: that of the king''s goods, '
  - type: text
    content: even
  - type: text
    content: ' of the tribute beyond the river, forthwith expenses be given unto these men, that they be not hindered. '
  '9':
  - type: text
    content: 'And that which they have need of, both young bullocks, and rams, and lambs, for the burnt offerings of the God of heaven, wheat, salt, wine, and oil, according to the appointment of the priests which '
  - type: text
    content: are
  - type: text
    content: ' at Jerusalem, let it be given them day by day without fail: '
