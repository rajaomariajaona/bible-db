document_id: EZR.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The King's Decree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Darius the king made a decree, and search was made in the house of the rolls, where the treasures were laid up in Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And there was found at Achmetha, in the palace that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the province of the Medes, a roll, and therein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a record thus written: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'in the first year of Cyrus the king '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the same
  - type: text
    text: ' Cyrus the king made a decree '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' the house of God at Jerusalem, Let the house be builded, the place where they offered sacrifices, and let the foundations thereof be strongly laid; the height thereof threescore cubits, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the breadth thereof threescore cubits; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' three rows of great stones, and a row of new timber: and let the expenses be given out of the king''s house: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and also let the golden and silver vessels of the house of God, which Nebuchadnezzar took forth out of the temple which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' at Jerusalem, and brought unto Babylon, be restored, and brought again unto the temple which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' at Jerusalem, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every one
  - type: text
    text: ' to his place, and place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the house of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ', Tatnai, governor beyond the river, Shethar-boznai, and your companions the Apharsachites, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' beyond the river, be ye far from thence: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'let the work of this house of God alone; let the governor of the Jews and the elders of the Jews build this house of God in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moreover I make a decree what ye shall do to the elders of these Jews for the building of this house of God: that of the king''s goods, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of the tribute beyond the river, forthwith expenses be given unto these men, that they be not hindered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And that which they have need of, both young bullocks, and rams, and lambs, for the burnt offerings of the God of heaven, wheat, salt, wine, and oil, according to the appointment of the priests which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' at Jerusalem, let it be given them day by day without fail: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that they may offer sacrifices of sweet savours unto the God of heaven, and pray for the life of the king, and of his sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Also I have made a decree, that whosoever shall alter this word, let timber be pulled down from his house, and being set up, let him be hanged thereon; and let his house be made a dunghill for this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the God that hath caused his name to dwell there destroy all kings and people, that shall put to their hand to alter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to destroy this house of God which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' at Jerusalem. I Darius have made a decree; let it be done with speed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Tatnai, governor on this side the river, Shethar-boznai, and their companions, according to that which Darius the king had sent, so they did speedily. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the elders of the Jews builded, and they prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. And they builded, and finished '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', according to the commandment of the God of Israel, and according to the commandment of Cyrus, and Darius, and Artaxerxes king of Persia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And this house was finished on the third day of the month Adar, which was in the sixth year of the reign of Darius the king.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Feast of Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the children of Israel, the priests, and the Levites, and the rest of the children of the captivity, kept the dedication of this house of God with joy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and offered at the dedication of this house of God an hundred bullocks, two hundred rams, four hundred lambs; and for a sin offering for all Israel, twelve he goats, according to the number of the tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they set the priests in their divisions, and the Levites in their courses, for the service of God, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' at Jerusalem; as it is written in the book of Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the children of the captivity kept the passover upon the fourteenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the first month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the priests and the Levites were purified together, all of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' pure, and killed the passover for all the children of the captivity, and for their brethren the priests, and for themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the children of Israel, which were come again out of captivity, and all such as had separated themselves unto them from the filthiness of the heathen of the land, to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, did eat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and kept the feast of unleavened bread seven days with joy: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had made them joyful, and turned the heart of the king of Assyria unto them, to strengthen their hands in the work of the house of God, the God of Israel.'
