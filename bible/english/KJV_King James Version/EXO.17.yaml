document_id: EXO.17,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And all the congregation of the children of Israel journeyed from the wilderness of Sin, after their journeys, according to the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ', and pitched in Rephidim: and '
  - type: text
    content: there was
  - type: text
    content: ' no water for the people to drink. '
  '10':
  - type: text
    content: 'So Joshua did as Moses had said to him, and fought with Amalek: and Moses, Aaron, and Hur went up to the top of the hill. '
  '11':
  - type: text
    content: 'And it came to pass, when Moses held up his hand, that Israel prevailed: and when he let down his hand, Amalek prevailed. '
  '12':
  - type: text
    content: 'But Moses'' hands '
  - type: text
    content: were
  - type: text
    content: ' heavy; and they took a stone, and put '
  - type: text
    content: it
  - type: text
    content: ' under him, and he sat thereon; and Aaron and Hur stayed up his hands, the one on the one side, and the other on the other side; and his hands were steady until the going down of the sun. '
  '13':
  - type: text
    content: 'And Joshua discomfited Amalek and his people with the edge of the sword. '
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Write this '
  - type: text
    content: for
  - type: text
    content: ' a memorial in a book, and rehearse '
  - type: text
    content: it
  - type: text
    content: ' in the ears of Joshua: for I will utterly put out the remembrance of Amalek from under heaven. '
  '15':
  - type: text
    content: 'And Moses built an altar, and called the name of it Jehovah-nissi: '
  '16':
  - type: text
    content: 'for he said, Because the '
  - type: text
    content: LORD
  - type: text
    content: ' hath sworn '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: will have
  - type: text
    content: ' war with Amalek from generation to generation.'
  '2':
  - type: text
    content: 'Wherefore the people did chide with Moses, and said, Give us water that we may drink. And Moses said unto them, Why chide ye with me? wherefore do ye tempt the '
  - type: text
    content: LORD
  - type: text
    content: '? '
  '3':
  - type: text
    content: 'And the people thirsted there for water; and the people murmured against Moses, and said, Wherefore '
  - type: text
    content: is
  - type: text
    content: ' this '
  - type: text
    content: that
  - type: text
    content: ' thou hast brought us up out of Egypt, to kill us and our children and our cattle with thirst? '
  '4':
  - type: text
    content: 'And Moses cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, What shall I do unto this people? they be almost ready to stone me. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Go on before the people, and take with thee of the elders of Israel; and thy rod, wherewith thou smotest the river, take in thine hand, and go. '
  '6':
  - type: text
    content: 'Behold, I will stand before thee there upon the rock in Horeb; and thou shalt smite the rock, and there shall come water out of it, that the people may drink. And Moses did so in the sight of the elders of Israel. '
  '7':
  - type: text
    content: 'And he called the name of the place Massah, and Meribah, because of the chiding of the children of Israel, and because they tempted the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, Is the '
  - type: text
    content: LORD
  - type: text
    content: ' among us, or not?'
  '8':
  - type: text
    content: 'Then came Amalek, and fought with Israel in Rephidim. '
  '9':
  - type: text
    content: 'And Moses said unto Joshua, Choose us out men, and go out, fight with Amalek: to morrow I will stand on the top of the hill with the rod of God in mine hand. '
