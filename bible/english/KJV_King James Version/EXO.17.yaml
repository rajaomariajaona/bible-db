document_id: EXO.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the congregation of the children of Israel journeyed from the wilderness of Sin, after their journeys, according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and pitched in Rephidim: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no water for the people to drink. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua did as Moses had said to him, and fought with Amalek: and Moses, Aaron, and Hur went up to the top of the hill. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Moses held up his hand, that Israel prevailed: and when he let down his hand, Amalek prevailed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses'' hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' heavy; and they took a stone, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' under him, and he sat thereon; and Aaron and Hur stayed up his hands, the one on the one side, and the other on the other side; and his hands were steady until the going down of the sun. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua discomfited Amalek and his people with the edge of the sword. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Write this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a memorial in a book, and rehearse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the ears of Joshua: for I will utterly put out the remembrance of Amalek from under heaven. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses built an altar, and called the name of it Jehovah-nissi: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for he said, Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will have
    - type: text
      text: ' war with Amalek from generation to generation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore the people did chide with Moses, and said, Give us water that we may drink. And Moses said unto them, Why chide ye with me? wherefore do ye tempt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people thirsted there for water; and the people murmured against Moses, and said, Wherefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast brought us up out of Egypt, to kill us and our children and our cattle with thirst? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, What shall I do unto this people? they be almost ready to stone me. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Go on before the people, and take with thee of the elders of Israel; and thy rod, wherewith thou smotest the river, take in thine hand, and go. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will stand before thee there upon the rock in Horeb; and thou shalt smite the rock, and there shall come water out of it, that the people may drink. And Moses did so in the sight of the elders of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he called the name of the place Massah, and Meribah, because of the chiding of the children of Israel, and because they tempted the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' among us, or not?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came Amalek, and fought with Israel in Rephidim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto Joshua, Choose us out men, and go out, fight with Amalek: to morrow I will stand on the top of the hill with the rod of God in mine hand. '
