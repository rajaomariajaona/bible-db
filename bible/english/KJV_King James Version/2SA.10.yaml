  - type: text
    content: went
  - type: text
    content: ' before them. '
  '17':
  - type: text
    content: 'And when it was told David, he gathered all Israel together, and passed over Jordan, and came to Helam. And the Syrians set themselves in array against David, and fought with him. '
  '18':
  - type: text
    content: 'And the Syrians fled before Israel; and David slew '
  - type: text
    content: the men of
  - type: text
    content: ' seven hundred chariots of the Syrians, and forty thousand horsemen, and smote Shobach the captain of their host, who died there. '
  '19':
  - type: text
    content: 'And when all the kings '
  - type: text
    content: that were
  - type: text
    content: ' servants to Hadarezer saw that they were smitten before Israel, they made peace with Israel, and served them. So the Syrians feared to help the children of Ammon any more.'
  '2':
  - type: text
    content: 'Then said David, I will shew kindness unto Hanun the son of Nahash, as his father shewed kindness unto me. And David sent to comfort him by the hand of his servants for his father. And David''s servants came into the land of the children of Ammon. '
  '3':
  - type: text
    content: 'And the princes of the children of Ammon said unto Hanun their lord, Thinkest thou that David doth honour thy father, that he hath sent comforters unto thee? hath not David '
  - type: text
    content: rather
  - type: text
    content: ' sent his servants unto thee, to search the city, and to spy it out, and to overthrow it? '
  '4':
  - type: text
    content: 'Wherefore Hanun took David''s servants, and shaved off the one half of their beards, and cut off their garments in the middle, '
  - type: text
    content: even
  - type: text
    content: ' to their buttocks, and sent them away. '
  '5':
  - type: text
    content: 'When they told '
  - type: text
    content: it
  - type: text
    content: ' unto David, he sent to meet them, because the men were greatly ashamed: and the king said, Tarry at Jericho until your beards be grown, and '
  - type: text
    content: then
  - type: text
    content: ' return.'
  '6':
  - type: text
    content: 'And when the children of Ammon saw that they stank before David, the children of Ammon sent and hired the Syrians of Beth-rehob, and the Syrians of Zoba, twenty thousand footmen, and of king Maacah a thousand men, and of Ish-tob twelve thousand men. '
  '7':
  - type: text
    content: 'And when David heard of '
  - type: text
    content: it
  - type: text
    content: ', he sent Joab, and all the host of the mighty men. '
  '8':
  - type: text
    content: 'And the children of Ammon came out, and put the battle in array at the entering in of the gate: and the Syrians of Zoba, and of Rehob, and Ish-tob, and Maacah, '
  - type: text
    content: were
  - type: text
    content: ' by themselves in the field.'
  '9':
