  '1':
  - type: text
    content: 'And it came to pass after this, that the king of the children of Ammon died, and Hanun his son reigned in his stead. '
  '10':
  - type: text
    content: 'and the rest of the people he delivered into the hand of Abishai his brother, that he might put '
  - type: text
    content: them
  - type: text
    content: ' in array against the children of Ammon. '
  '11':
  - type: text
    content: 'And he said, If the Syrians be too strong for me, then thou shalt help me: but if the children of Ammon be too strong for thee, then I will come and help thee. '
  '12':
  - type: text
    content: 'Be of good courage, and let us play the men for our people, and for the cities of our God: and the '
  - type: text
    content: LORD
  - type: text
    content: ' do that which seemeth him good. '
  '13':
  - type: text
    content: 'And Joab drew nigh, and the people that '
  - type: text
    content: were
  - type: text
    content: ' with him, unto the battle against the Syrians: and they fled before him. '
  '14':
  - type: text
    content: And when the children of Ammon saw that the Syrians were fled, then fled they also before Abishai, and entered into the city. So Joab returned from the children of Ammon, and came to Jerusalem.
  '15':
  - type: text
    content: 'And when the Syrians saw that they were smitten before Israel, they gathered themselves together. '
  '16':
