document_id: 2SA.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass after this, that the king of the children of Ammon died, and Hanun his son reigned in his stead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the rest of the people he delivered into the hand of Abishai his brother, that he might put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in array against the children of Ammon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, If the Syrians be too strong for me, then thou shalt help me: but if the children of Ammon be too strong for thee, then I will come and help thee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be of good courage, and let us play the men for our people, and for the cities of our God: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' do that which seemeth him good. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joab drew nigh, and the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, unto the battle against the Syrians: and they fled before him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when the children of Ammon saw that the Syrians were fled, then fled they also before Abishai, and entered into the city. So Joab returned from the children of Ammon, and came to Jerusalem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the Syrians saw that they were smitten before Israel, they gathered themselves together. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hadarezer sent, and brought out the Syrians that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' beyond the river: and they came to Helam; and Shobach the captain of the host of Hadarezer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: went
    - type: text
      text: ' before them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when it was told David, he gathered all Israel together, and passed over Jordan, and came to Helam. And the Syrians set themselves in array against David, and fought with him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Syrians fled before Israel; and David slew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the men of
    - type: text
      text: ' seven hundred chariots of the Syrians, and forty thousand horsemen, and smote Shobach the captain of their host, who died there. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when all the kings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' servants to Hadarezer saw that they were smitten before Israel, they made peace with Israel, and served them. So the Syrians feared to help the children of Ammon any more.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said David, I will shew kindness unto Hanun the son of Nahash, as his father shewed kindness unto me. And David sent to comfort him by the hand of his servants for his father. And David''s servants came into the land of the children of Ammon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the princes of the children of Ammon said unto Hanun their lord, Thinkest thou that David doth honour thy father, that he hath sent comforters unto thee? hath not David '
    - type: usfm
      marker: add
      children:
      - type: text
        text: rather
    - type: text
      text: ' sent his servants unto thee, to search the city, and to spy it out, and to overthrow it? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore Hanun took David''s servants, and shaved off the one half of their beards, and cut off their garments in the middle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to their buttocks, and sent them away. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto David, he sent to meet them, because the men were greatly ashamed: and the king said, Tarry at Jericho until your beards be grown, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' return.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the children of Ammon saw that they stank before David, the children of Ammon sent and hired the Syrians of Beth-rehob, and the Syrians of Zoba, twenty thousand footmen, and of king Maacah a thousand men, and of Ish-tob twelve thousand men. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when David heard of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he sent Joab, and all the host of the mighty men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Ammon came out, and put the battle in array at the entering in of the gate: and the Syrians of Zoba, and of Rehob, and Ish-tob, and Maacah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' by themselves in the field.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joab saw that the front of the battle was against him before and behind, he chose of all the choice '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Israel, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in array against the Syrians: '
