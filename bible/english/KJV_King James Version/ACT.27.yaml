document_id: ACT.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul's Journey to Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And when it was determined that we should sail into Italy, they delivered Paul and certain other prisoners unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' named Julius, a centurion of Augustus'' band. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And entering into a ship of Adramyttium, we launched, meaning to sail by the coasts of Asia; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' Aristarchus, a Macedonian of Thessalonica, being with us. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the next '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' we touched at Sidon. And Julius courteously entreated Paul, and gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' liberty to go unto his friends to refresh himself. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And when we had launched from thence, we sailed under Cyprus, because the winds were contrary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when we had sailed over the sea of Cilicia and Pamphylia, we came to Myra, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a city
  - type: text
    text: ' of Lycia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there the centurion found a ship of Alexandria sailing into Italy; and he put us therein. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when we had sailed slowly many days, and scarce were come over against Cnidus, the wind not suffering us, we sailed under Crete, over against Salmone; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and, hardly passing it, came unto a place which is called The fair havens; nigh whereunto was the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Lasea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now when much time was spent, and when sailing was now dangerous, because the fast was now already past, Paul admonished '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and said unto them, Sirs, I perceive that this voyage will be with hurt and much damage, not only of the lading and ship, but also of our lives. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nevertheless the centurion believed the master and the owner of the ship, more than those things which were spoken by Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And because the haven was not commodious to winter in, the more part advised to depart thence also, if by any means they might attain to Phenice, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and there
  - type: text
    text: ' to winter; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' an haven of Crete, and lieth toward the south west and north west.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Storm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when the south wind blew softly, supposing that they had obtained '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' purpose, loosing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thence
  - type: text
    text: ', they sailed close by Crete. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But not long after there arose against it a tempestuous wind, called Euroclydon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when the ship was caught, and could not bear up into the wind, we let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' drive. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And running under a certain island which is called Clauda, we had much work to come by the boat: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'which when they had taken up, they used helps, undergirding the ship; and, fearing lest they should fall into the quicksands, strake sail, and so were driven. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And we being exceedingly tossed with a tempest, the next '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' they lightened the ship; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and the third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' we cast out with our own hands the tackling of the ship. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when neither sun nor stars in many days appeared, and no small tempest lay on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ', all hope that we should be saved was then taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But after long abstinence Paul stood forth in the midst of them, and said, Sirs, ye should have hearkened unto me, and not have loosed from Crete, and to have gained this harm and loss. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And now I exhort you to be of good cheer: for there shall be no loss of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any man's
  - type: text
    text: ' life among you, but of the ship. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For there stood by me this night the angel of God, whose I am, and whom I serve, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'saying, Fear not, Paul; thou must be brought before Cæsar: and, lo, God hath given thee all them that sail with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Wherefore, sirs, be of good cheer: for I believe God, that it shall be even as it was told me. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Howbeit we must be cast upon a certain island.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Shipwreck
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But when the fourteenth night was come, as we were driven up and down in Adria, about midnight the shipmen deemed that they drew near to some country; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and sounded, and found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' twenty fathoms: and when they had gone a little further, they sounded again, and found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' fifteen fathoms. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then fearing lest we should have fallen upon rocks, they cast four anchors out of the stern, and wished for the day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And as the shipmen were about to flee out of the ship, when they had let down the boat into the sea, under colour as though they would have cast anchors out of the foreship, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Paul said to the centurion and to the soldiers, Except these abide in the ship, ye cannot be saved. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then the soldiers cut off the ropes of the boat, and let her fall off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And while the day was coming on, Paul besought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' all to take meat, saying, This day is the fourteenth day that ye have tarried and continued fasting, having taken nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Wherefore I pray you to take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' meat: for this is for your health: for there shall not an hair fall from the head of any of you. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when he had thus spoken, he took bread, and gave thanks to God in presence of them all: and when he had broken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he began to eat. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then were they all of good cheer, and they also took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' meat. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And we were in all in the ship two hundred threescore and sixteen souls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And when they had eaten enough, they lightened the ship, and cast out the wheat into the sea. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And when it was day, they knew not the land: but they discovered a certain creek with a shore, into the which they were minded, if it were possible, to thrust in the ship. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And when they had taken up the anchors, they committed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' unto the sea, and loosed the rudder bands, and hoised up the mainsail to the wind, and made toward shore. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: And falling into a place where two seas met, they ran the ship aground; and the forepart stuck fast, and remained unmoveable, but the hinder part was broken with the violence of the waves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And the soldiers'' counsel was to kill the prisoners, lest any of them should swim out, and escape. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But the centurion, willing to save Paul, kept them from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' purpose; and commanded that they which could swim should cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into the sea
  - type: text
    text: ', and get to land: '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and the rest, some on boards, and some on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: broken pieces
  - type: text
    text: ' of the ship. And so it came to pass, that they escaped all safe to land.'
