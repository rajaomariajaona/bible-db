document_id: JOB.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Eliphaz Speaks
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Eliphaz the Temanite answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore snares '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about thee,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sudden fear troubleth thee;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or darkness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou canst not see;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And abundance of waters cover thee.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not God in the height of heaven?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And behold the height of the stars, how high they are!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And thou sayest, How doth God know?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can he judge through the dark cloud?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thick clouds '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a covering to him, that he seeth not;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he walketh in the circuit of heaven.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou marked the old way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which wicked men have trodden?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which were cut down out of time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whose foundation was overflown with a flood:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which said unto God, Depart from us:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what can the Almighty do for them?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet he filled their houses with good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'things:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the counsel of the wicked is far from me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The righteous see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and are glad:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the innocent laugh them to scorn.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can a man be profitable unto God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As he that is wise may be profitable unto himself?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whereas our substance is not cut down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the remnant of them the fire consumeth.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Acquaint now thyself with him, and be at peace:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thereby good shall come unto thee.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Receive, I pray thee, the law from his mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lay up his words in thine heart.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou return to the Almighty, thou shalt be built up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt put away iniquity far from thy tabernacles.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then shalt thou lay up gold as dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: gold
    - type: text
      text: ' of Ophir as the stones of the brooks.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, the Almighty shall be thy defence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou shalt have plenty of silver.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For then shalt thou have thy delight in the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shalt lift up thy face unto God.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou shalt make thy prayer unto him, and he shall hear thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou shalt pay thy vows.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt also decree a thing, and it shall be established unto thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the light shall shine upon thy ways.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' are cast down, then thou shalt say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' lifting up;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shall save the humble person.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' any pleasure to the Almighty, that thou art righteous?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' gain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ', that thou makest thy ways perfect?'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall deliver the island of the innocent:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it is delivered by the pureness of thine hands.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will he reprove thee for fear of thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will he enter with thee into judgment?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not thy wickedness great?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thine iniquities infinite?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thou hast taken a pledge from thy brother for nought,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And stripped the naked of their clothing.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast not given water to the weary to drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou hast withholden bread from the hungry.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' the mighty man, he had the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the honourable man dwelt in it.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast sent widows away empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the arms of the fatherless have been broken.
