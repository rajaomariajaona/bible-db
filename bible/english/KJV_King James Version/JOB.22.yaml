document_id: JOB.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Eliphaz Speaks
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Eliphaz the Temanite answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Can a man be profitable unto God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: As he that is wise may be profitable unto himself?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' any pleasure to the Almighty, that thou art righteous?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' gain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to him
  - type: text
    text: ', that thou makest thy ways perfect?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Will he reprove thee for fear of thee?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will he enter with thee into judgment?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not thy wickedness great?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thine iniquities infinite?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For thou hast taken a pledge from thy brother for nought,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And stripped the naked of their clothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Thou hast not given water to the weary to drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou hast withholden bread from the hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' the mighty man, he had the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the honourable man dwelt in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Thou hast sent widows away empty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the arms of the fatherless have been broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore snares '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' round about thee,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sudden fear troubleth thee;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Or darkness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou canst not see;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And abundance of waters cover thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not God in the height of heaven?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And behold the height of the stars, how high they are!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And thou sayest, How doth God know?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can he judge through the dark cloud?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thick clouds '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a covering to him, that he seeth not;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he walketh in the circuit of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hast thou marked the old way
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which wicked men have trodden?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Which were cut down out of time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Whose foundation was overflown with a flood:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Which said unto God, Depart from us:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And what can the Almighty do for them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yet he filled their houses with good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'things:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the counsel of the wicked is far from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The righteous see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and are glad:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the innocent laugh them to scorn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Whereas our substance is not cut down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the remnant of them the fire consumeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Acquaint now thyself with him, and be at peace:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thereby good shall come unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Receive, I pray thee, the law from his mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And lay up his words in thine heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: If thou return to the Almighty, thou shalt be built up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou shalt put away iniquity far from thy tabernacles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then shalt thou lay up gold as dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: gold
  - type: text
    text: ' of Ophir as the stones of the brooks.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Yea, the Almighty shall be thy defence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou shalt have plenty of silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For then shalt thou have thy delight in the Almighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shalt lift up thy face unto God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Thou shalt make thy prayer unto him, and he shall hear thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou shalt pay thy vows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Thou shalt also decree a thing, and it shall be established unto thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the light shall shine upon thy ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'When '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' are cast down, then thou shalt say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' lifting up;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he shall save the humble person.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'He shall deliver the island of the innocent:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And it is delivered by the pureness of thine hands.
