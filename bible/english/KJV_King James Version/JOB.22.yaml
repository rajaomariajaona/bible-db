verses:
  '1':
  - type: heading
    content: Eliphaz Speaks
  - type: text
    content: Then Eliphaz the Temanite answered and said,
  '10':
  - type: text
    content: 'Therefore snares '
  - type: text
    content: are
  - type: text
    content: ' round about thee,'
  - type: text
    content: And sudden fear troubleth thee;
  '11':
  - type: text
    content: 'Or darkness, '
  - type: text
    content: that
  - type: text
    content: ' thou canst not see;'
  - type: text
    content: And abundance of waters cover thee.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' not God in the height of heaven?'
  - type: text
    content: And behold the height of the stars, how high they are!
  '13':
  - type: text
    content: And thou sayest, How doth God know?
  - type: text
    content: Can he judge through the dark cloud?
  '14':
  - type: text
    content: 'Thick clouds '
  - type: text
    content: are
  - type: text
    content: ' a covering to him, that he seeth not;'
  - type: text
    content: And he walketh in the circuit of heaven.
  '15':
  - type: text
    content: Hast thou marked the old way
  - type: text
    content: Which wicked men have trodden?
  '16':
  - type: text
    content: Which were cut down out of time,
  - type: text
    content: 'Whose foundation was overflown with a flood:'
  '17':
  - type: text
    content: 'Which said unto God, Depart from us:'
  - type: text
    content: And what can the Almighty do for them?
  '18':
  - type: text
    content: 'Yet he filled their houses with good '
  - type: text
    content: 'things:'
  - type: text
    content: But the counsel of the wicked is far from me.
  '19':
  - type: text
    content: 'The righteous see '
  - type: text
    content: it
  - type: text
    content: ', and are glad:'
  - type: text
    content: And the innocent laugh them to scorn.
  '2':
  - type: text
    content: Can a man be profitable unto God,
  - type: text
    content: As he that is wise may be profitable unto himself?
  '20':
  - type: text
    content: Whereas our substance is not cut down,
  - type: text
    content: But the remnant of them the fire consumeth.
  '21':
  - type: text
    content: 'Acquaint now thyself with him, and be at peace:'
  - type: text
    content: Thereby good shall come unto thee.
  '22':
  - type: text
    content: Receive, I pray thee, the law from his mouth,
  - type: text
    content: And lay up his words in thine heart.
  '23':
  - type: text
    content: If thou return to the Almighty, thou shalt be built up,
  - type: text
    content: Thou shalt put away iniquity far from thy tabernacles.
  '24':
  - type: text
    content: Then shalt thou lay up gold as dust,
  - type: text
    content: 'And the '
  - type: text
    content: gold
  - type: text
    content: ' of Ophir as the stones of the brooks.'
  '25':
  - type: text
    content: Yea, the Almighty shall be thy defence,
  - type: text
    content: And thou shalt have plenty of silver.
  '26':
  - type: text
    content: For then shalt thou have thy delight in the Almighty,
  - type: text
    content: And shalt lift up thy face unto God.
  '27':
  - type: text
    content: Thou shalt make thy prayer unto him, and he shall hear thee,
  - type: text
    content: And thou shalt pay thy vows.
  '28':
  - type: text
    content: 'Thou shalt also decree a thing, and it shall be established unto thee:'
  - type: text
    content: And the light shall shine upon thy ways.
  '29':
  - type: text
    content: 'When '
  - type: text
    content: men
  - type: text
    content: ' are cast down, then thou shalt say, '
  - type: text
    content: there is
  - type: text
    content: ' lifting up;'
  - type: text
    content: And he shall save the humble person.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Is it
  - type: text
    content: ' any pleasure to the Almighty, that thou art righteous?'
  - type: text
    content: 'Or '
  - type: text
    content: is it
  - type: text
    content: ' gain '
  - type: text
    content: to him
  - type: text
    content: ', that thou makest thy ways perfect?'
  '30':
  - type: text
    content: 'He shall deliver the island of the innocent:'
  - type: text
    content: And it is delivered by the pureness of thine hands.
  '4':
  - type: text
    content: Will he reprove thee for fear of thee?
  - type: text
    content: Will he enter with thee into judgment?
  '5':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' not thy wickedness great?'
  - type: text
    content: And thine iniquities infinite?
  '6':
  - type: text
    content: For thou hast taken a pledge from thy brother for nought,
  - type: text
    content: And stripped the naked of their clothing.
  '7':
  - type: text
    content: Thou hast not given water to the weary to drink,
  - type: text
    content: And thou hast withholden bread from the hungry.
  '8':
  - type: text
    content: 'But '
  - type: text
    content: as for
  - type: text
    content: ' the mighty man, he had the earth;'
  - type: text
    content: And the honourable man dwelt in it.
  '9':
  - type: text
    content: Thou hast sent widows away empty,
  - type: text
    content: And the arms of the fatherless have been broken.
