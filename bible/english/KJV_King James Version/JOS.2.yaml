  - type: text
    content: ' of shutting of the gate, when it was dark, that the men went out: whither the men went I wot not: pursue after them quickly; for ye shall overtake them. '
  '6':
  - type: text
    content: 'But she had brought them up to the roof of the house, and hid them with the stalks of flax, which she had laid in order upon the roof. '
  '7':
  - type: text
    content: 'And the men pursued after them the way to Jordan unto the fords: and as soon as they which pursued after them were gone out, they shut the gate.'
  '8':
  - type: text
    content: 'And before they were laid down, she came up unto them upon the roof; '
