  '3':
  - type: text
    content: 'And the king of Jericho sent unto Rahab, saying, Bring forth the men that are come to thee, which are entered into thine house: for they be come to search out all the country. '
  '4':
  - type: text
    content: 'And the woman took the two men, and hid them, and said thus, There came men unto me, but I wist not whence they '
  - type: text
