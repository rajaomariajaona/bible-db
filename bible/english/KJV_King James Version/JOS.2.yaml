document_id: JOS.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Spies Sent Out
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Joshua the son of Nun sent out of Shittim two men to spy secretly, saying, Go view the land, even Jericho. And they went, and came into an harlot''s house, named Rahab, and lodged there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For we have heard how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' dried up the water of the Red sea for you, when ye came out of Egypt; and what ye did unto the two kings of the Amorites, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on the other side Jordan, Sihon and Og, whom ye utterly destroyed. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And as soon as we had heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these things
    - type: text
      text: ', our hearts did melt, neither did there remain any more courage in any man, because of you: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God in heaven above, and in earth beneath. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now therefore, I pray you, swear unto me by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', since I have shewed you kindness, that ye will also shew kindness unto my father''s house, and give me a true token: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye will save alive my father, and my mother, and my brethren, and my sisters, and all that they have, and deliver our lives from death. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the men answered her, Our life for your''s, if ye utter not this our business. And it shall be, when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given us the land, that we will deal kindly and truly with thee.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then she let them down by a cord through the window: for her house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon the town wall, and she dwelt upon the wall. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And she said unto them, Get you to the mountain, lest the pursuers meet you; and hide yourselves there three days, until the pursuers be returned: and afterward may ye go your way. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the men said unto her, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will be
    - type: text
      text: ' blameless of this thine oath which thou hast made us swear. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' we come into the land, thou shalt bind this line of scarlet thread in the window which thou didst let us down by: and thou shalt bring thy father, and thy mother, and thy brethren, and all thy father''s household, home unto thee. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And it shall be, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' whosoever shall go out of the doors of thy house into the street, his blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' upon his head, and we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will be
    - type: text
      text: ' guiltless: and whosoever shall be with thee in the house, his blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' on our head, if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' hand be upon him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And it was told the king of Jericho, saying, Behold, there came men in hither to night of the children of Israel to search out the country. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And if thou utter this our business, then we will be quit of thine oath which thou hast made us to swear. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And she said, According unto your words, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' it. And she sent them away, and they departed: and she bound the scarlet line in the window.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And they went, and came unto the mountain, and abode there three days, until the pursuers were returned: and the pursuers sought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' throughout all the way, but found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So the two men returned, and descended from the mountain, and passed over, and came to Joshua the son of Nun, and told him all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' that befell them: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and they said unto Joshua, Truly the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath delivered into our hands all the land; for even all the inhabitants of the country do faint because of us.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the king of Jericho sent unto Rahab, saying, Bring forth the men that are come to thee, which are entered into thine house: for they be come to search out all the country. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the woman took the two men, and hid them, and said thus, There came men unto me, but I wist not whence they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'were:'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and it came to pass '
    - type: usfm
      marker: add
      children:
      - type: text
        text: about the time
    - type: text
      text: ' of shutting of the gate, when it was dark, that the men went out: whither the men went I wot not: pursue after them quickly; for ye shall overtake them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But she had brought them up to the roof of the house, and hid them with the stalks of flax, which she had laid in order upon the roof. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the men pursued after them the way to Jordan unto the fords: and as soon as they which pursued after them were gone out, they shut the gate.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And before they were laid down, she came up unto them upon the roof; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and she said unto the men, I know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given you the land, and that your terror is fallen upon us, and that all the inhabitants of the land faint because of you. '
