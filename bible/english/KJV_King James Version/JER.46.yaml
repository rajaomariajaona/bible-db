document_id: JER.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Concerning the Foreign Nations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which came to Jeremiah the prophet against the Gentiles; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: against Egypt, against the army of Pharaoh-necho king of Egypt, which was by the river Euphrates in Carchemish, which Nebuchadrezzar king of Babylon smote in the fourth year of Jehoiakim the son of Josiah king of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Order ye the buckler and shield, and draw near to battle. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Harness the horses; and get up, ye horsemen, and stand forth with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' helmets; furbish the spears, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' put on the brigandines. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Wherefore have I seen them dismayed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' turned away back? and their mighty ones are beaten down, and are fled apace, and look not back: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' fear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' round about, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let not the swift flee away, nor the mighty man escape; they shall stumble, and fall toward the north by the river Euphrates.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' cometh up as a flood, whose waters are moved as the rivers? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Egypt riseth up like a flood, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' waters are moved like the rivers; and he saith, I will go up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' will cover the earth; I will destroy the city and the inhabitants thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Come up, ye horses; and rage, ye chariots; and let the mighty men come forth; the Ethiopians and the Libyans, that handle the shield; and the Lydians, that handle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' bend the bow.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Day of the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the day of the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts, a day of vengeance, that he may avenge him of his adversaries: and the sword shall devour, and it shall be satiate and made drunk with their blood: for the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts hath a sacrifice in the north country by the river Euphrates. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Go up into Gilead, and take balm, O virgin, the daughter of Egypt: in vain shalt thou use many medicines; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' thou shalt not be cured. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The nations have heard of thy shame, and thy cry hath filled the land: for the mighty man hath stumbled against the mighty, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they are fallen both together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The word that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake to Jeremiah the prophet, how Nebuchadrezzar king of Babylon should come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' smite the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Declare ye in Egypt, and publish in Migdol, and publish in Noph and in Tahpanhes: say ye, Stand fast, and prepare thee; for the sword shall devour round about thee. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Why are thy valiant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' swept away? they stood not, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' did drive them. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He made many to fall, yea, one fell upon another: and they said, Arise, and let us go again to our own people, and to the land of our nativity, from the oppressing sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They did cry there, Pharaoh king of Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is but
  - type: text
    text: ' a noise; he hath passed the time appointed. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' I live, saith the King, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, Surely as Tabor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among the mountains, and as Carmel by the sea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' shall he come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'O thou daughter dwelling in Egypt, furnish thyself to go into captivity: for Noph shall be waste and desolate without an inhabitant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is like
  - type: text
    text: ' a very fair heifer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' destruction cometh; it cometh out of the north. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Also her hired men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the midst of her like fatted bullocks; for they also are turned back, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' are fled away together: they did not stand, because the day of their calamity was come upon them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the time of their visitation. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The voice thereof shall go like a serpent; for they shall march with an army, and come against her with axes, as hewers of wood. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They shall cut down her forest, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', though it cannot be searched; because they are more than the grasshoppers, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' innumerable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The daughter of Egypt shall be confounded; she shall be delivered into the hand of the people of the north. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of Israel, saith; Behold, I will punish the multitude of No, and Pharaoh, and Egypt, with their gods, and their kings; even Pharaoh, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' them that trust in him: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and I will deliver them into the hand of those that seek their lives, and into the hand of Nebuchadrezzar king of Babylon, and into the hand of his servants: and afterward it shall be inhabited, as in the days of old, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But fear not thou, O my servant Jacob, and be not dismayed, O Israel: for, behold, I will save thee from afar off, and thy seed from the land of their captivity; and Jacob shall return, and be in rest and at ease, and none shall make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' afraid. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fear thou not, O Jacob my servant, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with thee; for I will make a full end of all the nations whither I have driven thee: but I will not make a full end of thee, but correct thee in measure; yet will I not leave thee wholly unpunished.'
