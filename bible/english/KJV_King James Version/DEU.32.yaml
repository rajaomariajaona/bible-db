document_id: DEU.32,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Moses
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Give ear, O ye heavens, and I will speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hear, O earth, the words of my mouth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He found him in a desert land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the waste howling wilderness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He led him about, he instructed him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He kept him as the apple of his eye.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As an eagle stirreth up her nest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fluttereth over her young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spreadeth abroad her wings, taketh them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Beareth them on her wings:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' alone did lead him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no strange god with him.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He made him ride on the high places of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That he might eat the increase of the fields;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he made him to suck honey out of the rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And oil out of the flinty rock;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Butter of kine, and milk of sheep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With fat of lambs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rams of the breed of Bashan, and goats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the fat of kidneys of wheat;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And thou didst drink the pure blood of the grape.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But Jeshurun waxed fat, and kicked:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou art waxen fat, thou art grown thick, thou art covered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with fatness
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then he forsook God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' made him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lightly esteemed the Rock of his salvation.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They provoked him to jealousy with strange '
    - type: usfm
      marker: add
      children:
      - type: text
        text: gods
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With abominations provoked they him to anger.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They sacrificed unto devils, not to God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To gods whom they knew not,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To new '
    - type: usfm
      marker: add
      children:
      - type: text
        text: gods that
    - type: text
      text: ' came newly up,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom your fathers feared not.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Of the Rock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' begat thee thou art unmindful,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hast forgotten God that formed thee.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he abhorred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the provoking of his sons, and of his daughters.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My doctrine shall drop as the rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My speech shall distil as the dew,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the small rain upon the tender herb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And as the showers upon the grass:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And he said, I will hide my face from them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will see what their end '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'shall be:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a very froward generation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Children in whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' no faith.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'They have moved me to jealousy with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' not God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have provoked me to anger with their vanities:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will move them to jealousy with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those which are
    - type: text
      text: ' not a people;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will provoke them to anger with a foolish nation.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For a fire is kindled in mine anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall burn unto the lowest hell,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall consume the earth with her increase,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And set on fire the foundations of the mountains.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I will heap mischiefs upon them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will spend mine arrows upon them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: They shall be
    - type: text
      text: ' burnt with hunger, and devoured with burning heat,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And with bitter destruction:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also send the teeth of beasts upon them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the poison of serpents of the dust.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The sword without,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And terror within,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall destroy both the young man and the virgin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The suckling '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ' with the man of gray hairs.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I said, I would scatter them into corners,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I would make the remembrance of them to cease from among men:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Were it not that I feared the wrath of the enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lest their adversaries should behave themselves strangely,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' lest they should say, Our hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' high,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not done all this.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a nation void of counsel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there any
    - type: text
      text: ' understanding in them.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'O that they were wise, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they understood this,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' they would consider their latter end!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Because I will publish the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ascribe ye greatness unto our God.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: How should one chase a thousand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And two put ten thousand to flight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Except their Rock had sold them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had shut them up?'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For their rock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not as our Rock,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even our enemies themselves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' judges.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'For their vine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of the vine of Sodom,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And of the fields of Gomorrah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their grapes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' grapes of gall,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their clusters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' bitter:'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Their wine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the poison of dragons,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the cruel venom of asps.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not this laid up in store with me,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' sealed up among my treasures?'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'To me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' vengeance, and recompence;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their foot shall slide in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: due
    - type: text
      text: ' time:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the day of their calamity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at hand,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the things that shall come upon them make haste.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall judge his people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And repent himself for his servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When he seeth that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' power is gone,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none shut up, or left.'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And he shall say, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' their gods,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Their
    - type: text
      text: ' rock in whom they trusted,'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Which did eat the fat of their sacrifices,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' drank the wine of their drink offerings?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them rise up and help you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' be your protection.'
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'See now that I, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' I, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' he,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no god with me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I kill, and I make alive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I wound, and I heal:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there any
    - type: text
      text: ' that can deliver out of my hand.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' the Rock, his work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' perfect:'
