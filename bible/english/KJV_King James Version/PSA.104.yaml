  '1':
  - type: text
    content: 'Bless the '
  - type: text
    content: LORD
  - type: text
    content: ', O my soul.'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' my God, thou art very great; Thou art clothed with honour and majesty:'
  '10':
  - type: text
    content: He sendeth the springs into the valleys,
  - type: text
    content: Which
  - type: text
    content: ' run among the hills.'
  '11':
  - type: text
    content: 'They give drink to every beast of the field:'
  - type: text
    content: The wild asses quench their thirst.
  '12':
  - type: text
    content: By them shall the fowls of the heaven have their habitation,
  - type: text
    content: Which
  - type: text
    content: ' sing among the branches.'
  '13':
  - type: text
    content: 'He watereth the hills from his chambers:'
  - type: text
    content: The earth is satisfied with the fruit of thy works.
  '14':
  - type: text
    content: He causeth the grass to grow for the cattle,
  - type: text
    content: 'And herb for the service of man:'
  - type: text
    content: 'That he may bring forth food out of the earth; '
  '15':
  - type: text
    content: 'And wine '
  - type: text
    content: that
  - type: text
    content: ' maketh glad the heart of man,'
  - type: text
    content: And
  - type: text
    content: ' oil to make '
  - type: text
    content: his
  - type: text
    content: ' face to shine, and bread '
  - type: text
    content: which
  - type: text
    content: ' strengtheneth man''s heart.'
  '16':
  - type: text
    content: 'The trees of the '
  - type: text
    content: LORD
  - type: text
    content: ' are full '
  - type: text
    content: of sap
  - type: text
    content: ;
  - type: text
    content: The cedars of Lebanon, which he hath planted;
  '17':
  - type: text
    content: 'Where the birds make their nests:'
  - type: text
    content: As for
  - type: text
    content: ' the stork, the fir trees '
  - type: text
    content: are
  - type: text
    content: ' her house.'
  '18':
  - type: text
    content: 'The high hills '
  - type: text
    content: are
  - type: text
    content: ' a refuge for the wild goats;'
  - type: text
    content: And
  - type: text
    content: ' the rocks for the conies.'
  '19':
  - type: text
    content: 'He appointed the moon for seasons:'
  - type: text
    content: The sun knoweth his going down.
  '2':
  - type: text
    content: 'Who coverest '
  - type: text
    content: thyself
  - type: text
    content: ' with light as '
  - type: text
    content: with
  - type: text
    content: ' a garment:'
  - type: text
    content: 'Who stretchest out the heavens like a curtain:'
  '20':
  - type: text
    content: 'Thou makest darkness, and it is night:'
  - type: text
    content: 'Wherein all the beasts of the forest do creep '
  - type: text
    content: forth
  - type: text
    content: .
  '21':
  - type: text
    content: The young lions roar after their prey,
  - type: text
    content: And seek their meat from God.
  '22':
  - type: text
    content: The sun ariseth, they gather themselves together,
  - type: text
    content: And lay them down in their dens.
  '23':
  - type: text
    content: Man goeth forth unto his work
  - type: text
    content: And to his labour until the evening.
  '24':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', how manifold are thy works!'
  - type: text
    content: 'In wisdom hast thou made them all: The earth is full of thy riches.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: So is
  - type: text
    content: ' this great and wide sea,'
  - type: text
    content: 'Wherein '
  - type: text
    content: are
  - type: text
    content: ' things creeping innumerable, both small and great beasts.'
  '26':
  - type: text
    content: 'There go the ships: '
  - type: text
    content: There is
  - type: text
    content: ' that leviathan,'
  - type: text
    content: Whom
  - type: text
    content: ' thou hast made to play therein.'
  '27':
  - type: text
    content: These wait all upon thee;
  - type: text
    content: 'That thou mayest give '
  - type: text
    content: them
  - type: text
    content: ' their meat in due season.'
  '28':
  - type: text
    content: ' '
  - type: text
    content: That
  - type: text
    content: ' thou givest them they gather:'
  - type: text
    content: Thou openest thine hand, they are filled with good.
  '29':
  - type: text
    content: 'Thou hidest thy face, they are troubled:'
  - type: text
    content: Thou takest away their breath, they die, and return to their dust.
  '3':
  - type: text
    content: 'Who layeth the beams of his chambers in the waters:'
  - type: text
    content: 'Who maketh the clouds his chariot: Who walketh upon the wings of the wind:'
  '30':
  - type: text
    content: 'Thou sendest forth thy spirit, they are created:'
  - type: text
    content: And thou renewest the face of the earth.
  '31':
  - type: text
    content: 'The glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall endure for ever:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall rejoice in his works.'
  '32':
  - type: text
    content: 'He looketh on the earth, and it trembleth:'
  - type: text
    content: He toucheth the hills, and they smoke.
  '33':
  - type: text
    content: 'I will sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ' as long as I live:'
  - type: text
    content: I will sing praise to my God while I have my being.
  '34':
  - type: text
    content: 'My meditation of him shall be sweet:'
  - type: text
    content: 'I will be glad in the '
  - type: text
    content: LORD
  - type: text
    content: .
  '35':
  - type: text
    content: Let the sinners be consumed out of the earth, and let the wicked be no more.
  - type: text
    content: 'Bless thou the '
  - type: text
    content: LORD
  - type: text
    content: ', O my soul.'
  - type: text
    content: 'Praise ye the '
  - type: text
    content: LORD
  - type: text
    content: .
  '4':
  - type: text
    content: Who maketh his angels spirits;
  - type: text
    content: 'His ministers a flaming fire:'
  '5':
  - type: text
    content: ' '
  - type: text
    content: Who
  - type: text
    content: ' laid the foundations of the earth,'
  - type: text
    content: That
  - type: text
    content: ' it should not be removed for ever.'
  '6':
  - type: text
    content: 'Thou coveredst it with the deep as '
  - type: text
    content: with
  - type: text
    content: ' a garment:'
  - type: text
    content: The waters stood above the mountains.
  '7':
  - type: text
    content: At thy rebuke they fled;
  - type: text
    content: At the voice of thy thunder they hasted away.
  '8':
  - type: text
    content: They go up by the mountains; they go down by the valleys
  - type: text
    content: Unto the place which thou hast founded for them.
  '9':
  - type: text
    content: Thou hast set a bound that they may not pass over;
  - type: text
    content: That they turn not again to cover the earth.
