document_id: PSA.104
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O my soul.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, thou art very great; Thou art clothed with honour and majesty:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Who coverest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself
  - type: text
    text: ' with light as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a garment:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who stretchest out the heavens like a curtain:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Who layeth the beams of his chambers in the waters:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who maketh the clouds his chariot: Who walketh upon the wings of the wind:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who maketh his angels spirits;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His ministers a flaming fire:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Who
  - type: text
    text: ' laid the foundations of the earth,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' it should not be removed for ever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thou coveredst it with the deep as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a garment:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The waters stood above the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: At thy rebuke they fled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: At the voice of thy thunder they hasted away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They go up by the mountains; they go down by the valleys
- type: usfm
  marker: q2
  children:
  - type: text
    text: Unto the place which thou hast founded for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Thou hast set a bound that they may not pass over;
- type: usfm
  marker: q2
  children:
  - type: text
    text: That they turn not again to cover the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He sendeth the springs into the valleys,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' run among the hills.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They give drink to every beast of the field:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wild asses quench their thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: By them shall the fowls of the heaven have their habitation,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' sing among the branches.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He watereth the hills from his chambers:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The earth is satisfied with the fruit of thy works.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He causeth the grass to grow for the cattle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And herb for the service of man:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That he may bring forth food out of the earth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And wine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' maketh glad the heart of man,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' oil to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' face to shine, and bread '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' strengtheneth man''s heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The trees of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' are full '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of sap
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The cedars of Lebanon, which he hath planted;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Where the birds make their nests:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' the stork, the fir trees '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' her house.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The high hills '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a refuge for the wild goats;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the rocks for the conies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He appointed the moon for seasons:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The sun knoweth his going down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thou makest darkness, and it is night:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Wherein all the beasts of the forest do creep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: forth
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The young lions roar after their prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And seek their meat from God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The sun ariseth, they gather themselves together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And lay them down in their dens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Man goeth forth unto his work
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to his labour until the evening.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', how manifold are thy works!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In wisdom hast thou made them all: The earth is full of thy riches.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: So is
  - type: text
    text: ' this great and wide sea,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' things creeping innumerable, both small and great beasts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'There go the ships: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' that leviathan,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Whom
  - type: text
    text: ' thou hast made to play therein.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: These wait all upon thee;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That thou mayest give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' their meat in due season.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' thou givest them they gather:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou openest thine hand, they are filled with good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Thou hidest thy face, they are troubled:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou takest away their breath, they die, and return to their dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Thou sendest forth thy spirit, they are created:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou renewest the face of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall endure for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall rejoice in his works.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He looketh on the earth, and it trembleth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He toucheth the hills, and they smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I will sing unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' as long as I live:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing praise to my God while I have my being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'My meditation of him shall be sweet:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will be glad in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Let the sinners be consumed out of the earth, and let the wicked be no more.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Bless thou the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O my soul.'
- type: usfm
  marker: qr
  children:
  - type: text
    text: 'Praise ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
