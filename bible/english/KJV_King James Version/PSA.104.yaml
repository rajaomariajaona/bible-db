document_id: PSA.104,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my soul.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, thou art very great; Thou art clothed with honour and majesty:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sendeth the springs into the valleys,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' run among the hills.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They give drink to every beast of the field:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wild asses quench their thirst.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By them shall the fowls of the heaven have their habitation,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' sing among the branches.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He watereth the hills from his chambers:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth is satisfied with the fruit of thy works.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He causeth the grass to grow for the cattle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And herb for the service of man:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That he may bring forth food out of the earth; '
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And wine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' maketh glad the heart of man,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' oil to make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' face to shine, and bread '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' strengtheneth man''s heart.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The trees of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' are full '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of sap
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The cedars of Lebanon, which he hath planted;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Where the birds make their nests:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' the stork, the fir trees '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' her house.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The high hills '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a refuge for the wild goats;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the rocks for the conies.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He appointed the moon for seasons:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The sun knoweth his going down.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who coverest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thyself
    - type: text
      text: ' with light as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' a garment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who stretchest out the heavens like a curtain:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou makest darkness, and it is night:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wherein all the beasts of the forest do creep '
    - type: usfm
      marker: add
      children:
      - type: text
        text: forth
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young lions roar after their prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And seek their meat from God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun ariseth, they gather themselves together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lay them down in their dens.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Man goeth forth unto his work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to his labour until the evening.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', how manifold are thy works!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In wisdom hast thou made them all: The earth is full of thy riches.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: So is
    - type: text
      text: ' this great and wide sea,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' things creeping innumerable, both small and great beasts.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There go the ships: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' that leviathan,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Whom
    - type: text
      text: ' thou hast made to play therein.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These wait all upon thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That thou mayest give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' their meat in due season.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' thou givest them they gather:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou openest thine hand, they are filled with good.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hidest thy face, they are troubled:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou takest away their breath, they die, and return to their dust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who layeth the beams of his chambers in the waters:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who maketh the clouds his chariot: Who walketh upon the wings of the wind:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou sendest forth thy spirit, they are created:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou renewest the face of the earth.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall endure for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall rejoice in his works.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He looketh on the earth, and it trembleth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He toucheth the hills, and they smoke.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' as long as I live:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing praise to my God while I have my being.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My meditation of him shall be sweet:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will be glad in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the sinners be consumed out of the earth, and let the wicked be no more.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Bless thou the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my soul.'
  - type: usfm
    marker: qr
    children:
    - type: text
      text: 'Praise ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who maketh his angels spirits;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His ministers a flaming fire:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' laid the foundations of the earth,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' it should not be removed for ever.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou coveredst it with the deep as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' a garment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The waters stood above the mountains.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At thy rebuke they fled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the voice of thy thunder they hasted away.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They go up by the mountains; they go down by the valleys
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unto the place which thou hast founded for them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast set a bound that they may not pass over;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That they turn not again to cover the earth.
