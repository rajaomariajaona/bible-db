document_id: MRK.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Parables of the Kingdom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And he began again to teach by the sea side: and there was gathered unto him a great multitude, so that he entered into a ship, and sat in the sea; and the whole multitude was by the sea on the land.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And when he was alone, they that were about him with the twelve asked of him the parable. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Unto you it is given to know the mystery of the kingdom of God: but unto them that are without, all '
      - type: usfm
        marker: add
        children:
        - type: text
          text: these
      - type: text
        text: ' things are done in parables:'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that seeing they may see, and not perceive; and hearing they may hear, and not understand; lest at any time they should be converted, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' sins should be forgiven them.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Know ye not this parable? and how then will ye know all parables?
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The sower soweth the word.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And these are they by the way side, where the word is sown; but when they have heard, Satan cometh immediately, and taketh away the word that was sown in their hearts.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And these are they likewise which are sown on stony ground; who, when they have heard the word, immediately receive it with gladness;
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and have no root in themselves, and so endure but for a time: afterward, when affliction or persecution ariseth for the word''s sake, immediately they are offended.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And these are they which are sown among thorns; such as hear the word,
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the cares of this world, and the deceitfulness of riches, and the lusts of other things entering in, choke the word, and it becometh unfruitful.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he taught them many things by parables, and said unto them in his doctrine, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And these are they which are sown on good ground; such as hear the word, and receive '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', and bring forth fruit, some thirtyfold, some sixty, and some an hundred.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is a candle brought to be put under a bushel, or under a bed? and not to be set on a candlestick?
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For there is nothing hid, which shall not be manifested; neither was any thing kept secret, but that it should come abroad.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If any man have ears to hear, let him hear.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take heed what ye hear: with what measure ye mete, it shall be measured to you: and unto you that hear shall more be given.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For he that hath, to him shall be given: and he that hath not, from him shall be taken even that which he hath.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So is the kingdom of God, as if a man should cast seed into the ground;
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and should sleep, and rise night and day, and the seed should spring and grow up, he knoweth not how.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the earth bringeth forth fruit of herself; first the blade, then the ear, after that the full corn in the ear.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when the fruit is brought forth, immediately he putteth in the sickle, because the harvest is come.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Hearken; Behold, there went out a sower to sow:'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whereunto shall we liken the kingdom of God? or with what comparison shall we compare it?
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: add
        children:
        - type: text
          text: It is
      - type: text
        text: ' like a grain of mustard seed, which, when it is sown in the earth, is less than all the seeds that be in the earth:'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but when it is sown, it groweth up, and becometh greater than all herbs, and shooteth out great branches; so that the fowls of the air may lodge under the shadow of it.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And with many such parables spake he the word unto them, as they were able to hear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But without a parable spake he not unto them: and when they were alone, he expounded all things to his disciples.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Storm on the Lake
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And the same day, when the even was come, he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let us pass over unto the other side.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And when they had sent away the multitude, they took him even as he was in the ship. And there were also with him other little ships. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And there arose a great storm of wind, and the waves beat into the ship, so that it was now full. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And he was in the hinder part of the ship, asleep on a pillow: and they awake him, and say unto him, Master, carest thou not that we perish? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And he arose, and rebuked the wind, and said unto the sea, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Peace, be still.
    - type: text
      text: ' And the wind ceased, and there was a great calm. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and it came to pass, as he sowed, some fell by the way side, and the fowls of the air came and devoured it up.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why are ye so fearful? how is it that ye have no faith?
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: And they feared exceedingly, and said one to another, What manner of man is this, that even the wind and the sea obey him?
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And some fell on stony ground, where it had not much earth; and immediately it sprang up, because it had no depth of earth:'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but when the sun was up, it was scorched; and because it had no root, it withered away.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And some fell among thorns, and the thorns grew up, and choked it, and it yielded no fruit.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And other fell on good ground, and did yield fruit that sprang up and increased; and brought forth, some thirty, and some sixty, and some an hundred.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that hath ears to hear, let him hear.
