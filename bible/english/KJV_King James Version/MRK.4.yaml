document_id: MRK.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Parables of the Kingdom
  - type: text
    content: 'And he began again to teach by the sea side: and there was gathered unto him a great multitude, so that he entered into a ship, and sat in the sea; and the whole multitude was by the sea on the land.'
  '10':
  - type: text
    content: 'And when he was alone, they that were about him with the twelve asked of him the parable. '
  '11':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Unto you it is given to know the mystery of the kingdom of God: but unto them that are without, all '
  - type: text
    content: these
  - type: text
    content: ' things are done in parables:'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'that seeing they may see, and not perceive; and hearing they may hear, and not understand; lest at any time they should be converted, and '
  - type: text
    content: their
  - type: text
    content: ' sins should be forgiven them.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Know ye not this parable? and how then will ye know all parables?
  '14':
  - type: text
    content: ' '
  - type: text
    content: The sower soweth the word.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And these are they by the way side, where the word is sown; but when they have heard, Satan cometh immediately, and taketh away the word that was sown in their hearts.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And these are they likewise which are sown on stony ground; who, when they have heard the word, immediately receive it with gladness;
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'and have no root in themselves, and so endure but for a time: afterward, when affliction or persecution ariseth for the word''s sake, immediately they are offended.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: And these are they which are sown among thorns; such as hear the word,
  - type: text
    content: ' '
  '19':
  - type: text
    content: and the cares of this world, and the deceitfulness of riches, and the lusts of other things entering in, choke the word, and it becometh unfruitful.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And he taught them many things by parables, and said unto them in his doctrine, '
  '20':
  - type: text
    content: 'And these are they which are sown on good ground; such as hear the word, and receive '
  - type: text
    content: it
  - type: text
    content: ', and bring forth fruit, some thirtyfold, some sixty, and some an hundred.'
  '21':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Is a candle brought to be put under a bushel, or under a bed? and not to be set on a candlestick?
  - type: text
    content: ' '
  '22':
  - type: text
    content: For there is nothing hid, which shall not be manifested; neither was any thing kept secret, but that it should come abroad.
  - type: text
    content: ' '
  '23':
  - type: text
    content: If any man have ears to hear, let him hear.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Take heed what ye hear: with what measure ye mete, it shall be measured to you: and unto you that hear shall more be given.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For he that hath, to him shall be given: and he that hath not, from him shall be taken even that which he hath.'
  '26':
  - type: text
    content: 'And he said, '
  - type: text
    content: So is the kingdom of God, as if a man should cast seed into the ground;
  - type: text
    content: ' '
  '27':
  - type: text
    content: and should sleep, and rise night and day, and the seed should spring and grow up, he knoweth not how.
  - type: text
    content: ' '
  '28':
  - type: text
    content: For the earth bringeth forth fruit of herself; first the blade, then the ear, after that the full corn in the ear.
  - type: text
    content: ' '
  '29':
  - type: text
    content: But when the fruit is brought forth, immediately he putteth in the sickle, because the harvest is come.
  '3':
  - type: text
    content: 'Hearken; Behold, there went out a sower to sow:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And he said, '
  - type: text
    content: Whereunto shall we liken the kingdom of God? or with what comparison shall we compare it?
  - type: text
    content: ' '
  '31':
  - type: text
    content: It is
  - type: text
    content: ' like a grain of mustard seed, which, when it is sown in the earth, is less than all the seeds that be in the earth:'
  - type: text
    content: ' '
  '32':
  - type: text
    content: but when it is sown, it groweth up, and becometh greater than all herbs, and shooteth out great branches; so that the fowls of the air may lodge under the shadow of it.
  '33':
  - type: text
    content: 'And with many such parables spake he the word unto them, as they were able to hear '
  - type: text
    content: it
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'But without a parable spake he not unto them: and when they were alone, he expounded all things to his disciples.'
  - type: heading
    content: A Storm on the Lake
  '35':
  - type: text
    content: 'And the same day, when the even was come, he saith unto them, '
  - type: text
    content: Let us pass over unto the other side.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'And when they had sent away the multitude, they took him even as he was in the ship. And there were also with him other little ships. '
  '37':
  - type: text
    content: 'And there arose a great storm of wind, and the waves beat into the ship, so that it was now full. '
  '38':
  - type: text
    content: 'And he was in the hinder part of the ship, asleep on a pillow: and they awake him, and say unto him, Master, carest thou not that we perish? '
  '39':
  - type: text
    content: 'And he arose, and rebuked the wind, and said unto the sea, '
  - type: text
    content: Peace, be still.
  - type: text
    content: ' And the wind ceased, and there was a great calm. '
  '4':
  - type: text
    content: and it came to pass, as he sowed, some fell by the way side, and the fowls of the air came and devoured it up.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Why are ye so fearful? how is it that ye have no faith?
  - type: text
    content: ' '
  '41':
  - type: text
    content: And they feared exceedingly, and said one to another, What manner of man is this, that even the wind and the sea obey him?
  '5':
  - type: text
    content: 'And some fell on stony ground, where it had not much earth; and immediately it sprang up, because it had no depth of earth:'
  - type: text
    content: ' '
  '6':
  - type: text
    content: but when the sun was up, it was scorched; and because it had no root, it withered away.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And some fell among thorns, and the thorns grew up, and choked it, and it yielded no fruit.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And other fell on good ground, and did yield fruit that sprang up and increased; and brought forth, some thirty, and some sixty, and some an hundred.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: He that hath ears to hear, let him hear.
