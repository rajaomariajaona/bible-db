document_id: LUK.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Certain Women
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass afterward, that he went throughout every city and village, preaching and shewing the glad tidings of the kingdom of God: and the twelve '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Unto you it is given to know the mysteries of the kingdom of God: but to others in parables; that seeing they might not see, and hearing they might not understand.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now the parable is this: The seed is the word of God.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Those by the way side are they that hear; then cometh the devil, and taketh away the word out of their hearts, lest they should believe and be saved.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'They on the rock '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are they
      - type: text
        text: ', which, when they hear, receive the word with joy; and these have no root, which for a while believe, and in time of temptation fall away.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And that which fell among thorns are they, which, when they have heard, go forth, and are choked with cares and riches and pleasures of '
      - type: usfm
        marker: add
        children:
        - type: text
          text: this
      - type: text
        text: ' life, and bring no fruit to perfection.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But that on the good ground are they, which in an honest and good heart, having heard the word, keep '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', and bring forth fruit with patience.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'No man, when he hath lighted a candle, covereth it with a vessel, or putteth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' under a bed; but setteth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' on a candlestick, that they which enter in may see the light.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For nothing is secret, that shall not be made manifest; neither '
      - type: usfm
        marker: add
        children:
        - type: text
          text: any thing
      - type: text
        text: ' hid, that shall not be known and come abroad.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take heed therefore how ye hear: for whosoever hath, to him shall be given; and whosoever hath not, from him shall be taken even that which he seemeth to have.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came to him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mother and his brethren, and could not come at him for the press. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and certain women, which had been healed of evil spirits and infirmities, Mary called Magdalene, out of whom went seven devils, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by certain
    - type: text
      text: ' which said, Thy mother and thy brethren stand without, desiring to see thee. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My mother and my brethren are these which hear the word of God, and do it.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Storm on the Lake
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass on a certain day, that he went into a ship with his disciples: and he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let us go over unto the other side of the lake.
    - type: text
      text: ' And they launched forth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as they sailed he fell asleep: and there came down a storm of wind on the lake; and they were filled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with water
    - type: text
      text: ', and were in jeopardy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came to him, and awoke him, saying, Master, master, we perish. Then he arose, and rebuked the wind and the raging of the water: and they ceased, and there was a calm. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Where is your faith?
    - type: text
      text: ' And they being afraid wondered, saying one to another, What manner of man is this! for he commandeth even the winds and water, and they obey him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Casting out Devils
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they arrived at the country of the Gadarenes, which is over against Galilee. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he went forth to land, there met him out of the city a certain man, which had devils long time, and ware no clothes, neither abode in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' house, but in the tombs. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he saw Jesus, he cried out, and fell down before him, and with a loud voice said, What have I to do with thee, Jesus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' Son of God most high? I beseech thee, torment me not. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(For he had commanded the unclean spirit to come out of the man. For oftentimes it had caught him: and he was kept bound with chains and in fetters; and he brake the bands, and was driven of the devil into the wilderness.) '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Joanna the wife of Chuza Herod's steward, and Susanna, and many others, which ministered unto him of their substance.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Parable of the Sower
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus asked him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What is thy name?
    - type: text
      text: ' And he said, Legion: because many devils were entered into him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they besought him that he would not command them to go out into the deep. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was there an herd of many swine feeding on the mountain: and they besought him that he would suffer them to enter into them. And he suffered them. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then went the devils out of the man, and entered into the swine: and the herd ran violently down a steep place into the lake, and were choked. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they that fed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' saw what was done, they fled, and went and told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the city and in the country. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they went out to see what was done; and came to Jesus, and found the man, out of whom the devils were departed, sitting at the feet of Jesus, clothed, and in his right mind: and they were afraid. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They also which saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' told them by what means he that was possessed of the devils was healed.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the whole multitude of the country of the Gadarenes round about besought him to depart from them; for they were taken with great fear; and he went up into the ship, and returned back again. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the man out of whom the devils were departed besought him that he might be with him: but Jesus sent him away, saying, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Return to thine own house, and shew how great things God hath done unto thee.
    - type: text
      text: ' And he went his way, and published throughout the whole city how great things Jesus had done unto him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when much people were gathered together, and were come to him out of every city, he spake by a parable: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, that, when Jesus was returned, the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: gladly
    - type: text
      text: ' received him: for they were all waiting for him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jairus' Daughter
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, there came a man named Jairus, and he was a ruler of the synagogue: and he fell down at Jesus'' feet, and besought him that he would come into his house: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for he had one only daughter, about twelve years of age, and she lay a dying. But as he went the people thronged him.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a woman having an issue of blood twelve years, which had spent all her living upon physicians, neither could be healed of any, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'came behind '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and touched the border of his garment: and immediately her issue of blood stanched. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Who touched me?
    - type: text
      text: ' When all denied, Peter and they that were with him said, Master, the multitude throng thee and press '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ', and sayest thou, Who touched me? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Somebody hath touched me: for I perceive that virtue is gone out of me.'
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the woman saw that she was not hid, she came trembling, and falling down before him, she declared unto him before all the people for what cause she had touched him, and how she was healed immediately. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Daughter, be of good comfort: thy faith hath made thee whole; go in peace.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he yet spake, there cometh one from the ruler of the synagogue''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: house
    - type: text
      text: ', saying to him, Thy daughter is dead: trouble not the Master. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A sower went out to sow his seed: and as he sowed, some fell by the way side; and it was trodden down, and the fowls of the air devoured it.'
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Jesus heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he answered him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Fear not: believe only, and she shall be made whole.'
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he came into the house, he suffered no man to go in, save Peter, and James, and John, and the father and the mother of the maiden. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all wept, and bewailed her: but he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Weep not; she is not dead, but sleepeth.
    - type: text
      text: ' '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they laughed him to scorn, knowing that she was dead. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he put them all out, and took her by the hand, and called, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maid, arise.
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her spirit came again, and she arose straightway: and he commanded to give her meat. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her parents were astonished: but he charged them that they should tell no man what was done.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And some fell upon a rock; and as soon as it was sprung up, it withered away, because it lacked moisture.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And some fell among thorns; and the thorns sprang up with it, and choked it.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And other fell on good ground, and sprang up, and bare fruit an hundredfold.
    - type: text
      text: ' And when he had said these things, he cried, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that hath ears to hear, let him hear.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his disciples asked him, saying, What might this parable be? '
