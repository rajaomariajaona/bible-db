document_id: LUK.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Certain Women
  - type: text
    content: 'And it came to pass afterward, that he went throughout every city and village, preaching and shewing the glad tidings of the kingdom of God: and the twelve '
  - type: text
    content: were
  - type: text
    content: ' with him, '
  '10':
  - type: text
    content: 'And he said, '
  - type: text
    content: 'Unto you it is given to know the mysteries of the kingdom of God: but to others in parables; that seeing they might not see, and hearing they might not understand.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Now the parable is this: The seed is the word of God.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Those by the way side are they that hear; then cometh the devil, and taketh away the word out of their hearts, lest they should believe and be saved.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'They on the rock '
  - type: text
    content: are they
  - type: text
    content: ', which, when they hear, receive the word with joy; and these have no root, which for a while believe, and in time of temptation fall away.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And that which fell among thorns are they, which, when they have heard, go forth, and are choked with cares and riches and pleasures of '
  - type: text
    content: this
  - type: text
    content: ' life, and bring no fruit to perfection.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But that on the good ground are they, which in an honest and good heart, having heard the word, keep '
  - type: text
    content: it
  - type: text
    content: ', and bring forth fruit with patience.'
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'No man, when he hath lighted a candle, covereth it with a vessel, or putteth '
  - type: text
    content: it
  - type: text
    content: ' under a bed; but setteth '
  - type: text
    content: it
  - type: text
    content: ' on a candlestick, that they which enter in may see the light.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'For nothing is secret, that shall not be made manifest; neither '
  - type: text
    content: any thing
  - type: text
    content: ' hid, that shall not be known and come abroad.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Take heed therefore how ye hear: for whosoever hath, to him shall be given; and whosoever hath not, from him shall be taken even that which he seemeth to have.'
  '19':
  - type: text
    content: 'Then came to him '
  - type: text
    content: his
  - type: text
    content: ' mother and his brethren, and could not come at him for the press. '
  '2':
  - type: text
    content: 'and certain women, which had been healed of evil spirits and infirmities, Mary called Magdalene, out of whom went seven devils, '
  '20':
  - type: text
    content: 'And it was told him '
  - type: text
    content: by certain
  - type: text
    content: ' which said, Thy mother and thy brethren stand without, desiring to see thee. '
  '21':
  - type: text
    content: 'And he answered and said unto them, '
  - type: text
    content: My mother and my brethren are these which hear the word of God, and do it.
  - type: heading
    content: Storm on the Lake
  '22':
  - type: text
    content: 'Now it came to pass on a certain day, that he went into a ship with his disciples: and he said unto them, '
  - type: text
    content: Let us go over unto the other side of the lake.
  - type: text
    content: ' And they launched forth. '
  '23':
  - type: text
    content: 'But as they sailed he fell asleep: and there came down a storm of wind on the lake; and they were filled '
  - type: text
    content: with water
  - type: text
    content: ', and were in jeopardy. '
  '24':
  - type: text
    content: 'And they came to him, and awoke him, saying, Master, master, we perish. Then he arose, and rebuked the wind and the raging of the water: and they ceased, and there was a calm. '
  '25':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Where is your faith?
  - type: text
    content: ' And they being afraid wondered, saying one to another, What manner of man is this! for he commandeth even the winds and water, and they obey him.'
  - type: heading
    content: Casting out Devils
  '26':
  - type: text
    content: 'And they arrived at the country of the Gadarenes, which is over against Galilee. '
  '27':
  - type: text
    content: 'And when he went forth to land, there met him out of the city a certain man, which had devils long time, and ware no clothes, neither abode in '
  - type: text
    content: any
  - type: text
    content: ' house, but in the tombs. '
  '28':
  - type: text
    content: 'When he saw Jesus, he cried out, and fell down before him, and with a loud voice said, What have I to do with thee, Jesus, '
  - type: text
    content: thou
  - type: text
    content: ' Son of God most high? I beseech thee, torment me not. '
  '29':
  - type: text
    content: '(For he had commanded the unclean spirit to come out of the man. For oftentimes it had caught him: and he was kept bound with chains and in fetters; and he brake the bands, and was driven of the devil into the wilderness.) '
  '3':
  - type: text
    content: and Joanna the wife of Chuza Herod's steward, and Susanna, and many others, which ministered unto him of their substance.
  - type: heading
    content: Parable of the Sower
  '30':
  - type: text
    content: 'And Jesus asked him, saying, '
  - type: text
    content: What is thy name?
  - type: text
    content: ' And he said, Legion: because many devils were entered into him. '
  '31':
  - type: text
    content: 'And they besought him that he would not command them to go out into the deep. '
  '32':
  - type: text
    content: 'And there was there an herd of many swine feeding on the mountain: and they besought him that he would suffer them to enter into them. And he suffered them. '
  '33':
  - type: text
    content: 'Then went the devils out of the man, and entered into the swine: and the herd ran violently down a steep place into the lake, and were choked. '
  '34':
  - type: text
    content: 'When they that fed '
  - type: text
    content: them
  - type: text
    content: ' saw what was done, they fled, and went and told '
  - type: text
    content: it
  - type: text
    content: ' in the city and in the country. '
  '35':
  - type: text
    content: 'Then they went out to see what was done; and came to Jesus, and found the man, out of whom the devils were departed, sitting at the feet of Jesus, clothed, and in his right mind: and they were afraid. '
  '36':
  - type: text
    content: 'They also which saw '
  - type: text
    content: it
  - type: text
    content: ' told them by what means he that was possessed of the devils was healed.'
  '37':
  - type: text
    content: 'Then the whole multitude of the country of the Gadarenes round about besought him to depart from them; for they were taken with great fear; and he went up into the ship, and returned back again. '
  '38':
  - type: text
    content: 'Now the man out of whom the devils were departed besought him that he might be with him: but Jesus sent him away, saying, '
  '39':
  - type: text
    content: Return to thine own house, and shew how great things God hath done unto thee.
  - type: text
    content: ' And he went his way, and published throughout the whole city how great things Jesus had done unto him. '
  '4':
  - type: text
    content: 'And when much people were gathered together, and were come to him out of every city, he spake by a parable: '
  '40':
  - type: text
    content: 'And it came to pass, that, when Jesus was returned, the people '
  - type: text
    content: gladly
  - type: text
    content: ' received him: for they were all waiting for him.'
  - type: heading
    content: Jairus' Daughter
  '41':
  - type: text
    content: 'And, behold, there came a man named Jairus, and he was a ruler of the synagogue: and he fell down at Jesus'' feet, and besought him that he would come into his house: '
  '42':
  - type: text
    content: for he had one only daughter, about twelve years of age, and she lay a dying. But as he went the people thronged him.
  '43':
  - type: text
    content: 'And a woman having an issue of blood twelve years, which had spent all her living upon physicians, neither could be healed of any, '
  '44':
  - type: text
    content: 'came behind '
  - type: text
    content: him
  - type: text
    content: ', and touched the border of his garment: and immediately her issue of blood stanched. '
  '45':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: Who touched me?
  - type: text
    content: ' When all denied, Peter and they that were with him said, Master, the multitude throng thee and press '
  - type: text
    content: thee
  - type: text
    content: ', and sayest thou, Who touched me? '
  '46':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: 'Somebody hath touched me: for I perceive that virtue is gone out of me.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And when the woman saw that she was not hid, she came trembling, and falling down before him, she declared unto him before all the people for what cause she had touched him, and how she was healed immediately. '
  '48':
  - type: text
    content: 'And he said unto her, '
  - type: text
    content: 'Daughter, be of good comfort: thy faith hath made thee whole; go in peace.'
  '49':
  - type: text
    content: 'While he yet spake, there cometh one from the ruler of the synagogue''s '
  - type: text
    content: house
  - type: text
    content: ', saying to him, Thy daughter is dead: trouble not the Master. '
  '5':
  - type: text
    content: 'A sower went out to sow his seed: and as he sowed, some fell by the way side; and it was trodden down, and the fowls of the air devoured it.'
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'But when Jesus heard '
  - type: text
    content: it
  - type: text
    content: ', he answered him, saying, '
  - type: text
    content: 'Fear not: believe only, and she shall be made whole.'
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And when he came into the house, he suffered no man to go in, save Peter, and James, and John, and the father and the mother of the maiden. '
  '52':
  - type: text
    content: 'And all wept, and bewailed her: but he said, '
  - type: text
    content: Weep not; she is not dead, but sleepeth.
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'And they laughed him to scorn, knowing that she was dead. '
  '54':
  - type: text
    content: 'And he put them all out, and took her by the hand, and called, saying, '
  - type: text
    content: Maid, arise.
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'And her spirit came again, and she arose straightway: and he commanded to give her meat. '
  '56':
  - type: text
    content: 'And her parents were astonished: but he charged them that they should tell no man what was done.'
  '6':
  - type: text
    content: And some fell upon a rock; and as soon as it was sprung up, it withered away, because it lacked moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And some fell among thorns; and the thorns sprang up with it, and choked it.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And other fell on good ground, and sprang up, and bare fruit an hundredfold.
  - type: text
    content: ' And when he had said these things, he cried, '
  - type: text
    content: He that hath ears to hear, let him hear.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And his disciples asked him, saying, What might this parable be? '
