    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall cause thine enemies that rise up against thee to be smitten before thy face: they shall come out against thee one way, and flee before thee seven ways. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall command the blessing upon thee in thy storehouses, and in all that thou settest thine hand unto; and he shall bless thee in the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall establish thee an holy people unto himself, as he hath sworn unto thee, if thou shalt keep the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and walk in his ways. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And all people of the earth shall see that thou art called by the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and they shall be afraid of thee. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall make thee plenteous in goods, in the fruit of thy body, and in the fruit of thy cattle, and in the fruit of thy ground, in the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware unto thy fathers to give thee. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall open unto thee his good treasure, the heaven to give the rain unto thy land in his season, and to bless all the work of thine hand: and thou shalt lend unto many nations, and thou shalt not borrow. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall make thee the head, and not the tail; and thou shalt be above only, and thou shalt not be beneath; if that thou hearken unto the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, which I command thee this day, to observe and to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and thou shalt not go aside from any of the words which I command thee this day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the right hand, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the left, to go after other gods to serve them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But it shall come to pass, if thou wilt not hearken unto the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, to observe to do all his commandments and his statutes which I command thee this day; that all these curses shall come upon thee, and overtake thee: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in the city, and cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in the field. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' thy basket and thy store. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the fruit of thy body, and the fruit of thy land, the increase of thy kine, and the flocks of thy sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' when thou comest in, and cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' when thou goest out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall send upon thee cursing, vexation, and rebuke, in all that thou settest thine hand unto for to do, until thou be destroyed, and until thou perish quickly; because of the wickedness of thy doings, whereby thou hast forsaken me. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall make the pestilence cleave unto thee, until he have consumed thee from off the land, whither thou goest to possess it. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall smite thee with a consumption, and with a fever, and with an inflammation, and with an extreme burning, and with the sword, and with blasting, and with mildew; and they shall pursue thee until thou perish. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And thy heaven that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' over thy head shall be brass, and the earth that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' under thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' iron. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall make the rain of thy land powder and dust: from heaven shall it come down upon thee, until thou be destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall cause thee to be smitten before thine enemies: thou shalt go out one way against them, and flee seven ways before them: and shalt be removed into all the kingdoms of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And thy carcase shall be meat unto all fowls of the air, and unto the beasts of the earth, and no man shall fray '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' away. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will smite thee with the botch of Egypt, and with the emerods, and with the scab, and with the itch, whereof thou canst not be healed. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall smite thee with madness, and blindness, and astonishment of heart: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and thou shalt grope at noonday, as the blind gropeth in darkness, and thou shalt not prosper in thy ways: and thou shalt be only oppressed and spoiled evermore, and no man shall save '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Thou shalt betroth a wife, and another man shall lie with her: thou shalt build an house, and thou shalt not dwell therein: thou shalt plant a vineyard, and shalt not gather the grapes thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Thine ox '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' slain before thine eyes, and thou shalt not eat thereof: thine ass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' violently taken away from before thy face, and shall not be restored to thee: thy sheep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' given unto thine enemies, and thou shalt have none to rescue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Thy sons and thy daughters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' given unto another people, and thine eyes shall look, and fail '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with longing
  - type: text
    text: ' for them all the day long: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' no might in thine hand. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The fruit of thy land, and all thy labours, shall a nation which thou knowest not eat up; and thou shalt be only oppressed and crushed alway: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'so that thou shalt be mad for the sight of thine eyes which thou shalt see. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall smite thee in the knees, and in the legs, with a sore botch that cannot be healed, from the sole of thy foot unto the top of thy head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall bring thee, and thy king which thou shalt set over thee, unto a nation which neither thou nor thy fathers have known; and there shalt thou serve other gods, wood and stone. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And thou shalt become an astonishment, a proverb, and a byword, among all nations whither the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall lead thee. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Thou shalt carry much seed out into the field, and shalt gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' little in; for the locust shall consume it. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Thou shalt plant vineyards, and dress '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', but shalt neither drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the wine, nor gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the grapes
  - type: text
    text: '; for the worms shall eat them. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Thou shalt have olive trees throughout all thy coasts, but thou shalt not anoint '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself
  - type: text
    text: ' with the oil; for thine olive shall cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his fruit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Thou shalt beget sons and daughters, but thou shalt not enjoy them; for they shall go into captivity. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'All thy trees and fruit of thy land shall the locust consume. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The stranger that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' within thee shall get up above thee very high; and thou shalt come down very low. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'He shall lend to thee, and thou shalt not lend to him: he shall be the head, and thou shalt be the tail. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Moreover all these curses shall come upon thee, and shall pursue thee, and overtake thee, till thou be destroyed; because thou hearkenedst not unto the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, to keep his commandments and his statutes which he commanded thee: '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: and they shall be upon thee for a sign and for a wonder, and upon thy seed for ever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Because thou servedst not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God with joyfulness, and with gladness of heart, for the abundance of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'therefore shalt thou serve thine enemies which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall send against thee, in hunger, and in thirst, and in nakedness, and in want of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'things:'
  - type: text
    text: ' and he shall put a yoke of iron upon thy neck, until he have destroyed thee. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall bring a nation against thee from far, from the end of the earth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as swift
  - type: text
    text: ' as the eagle flieth; a nation whose tongue thou shalt not understand; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'a nation of fierce countenance, which shall not regard the person of the old, nor shew favour to the young: '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'and he shall eat the fruit of thy cattle, and the fruit of thy land, until thou be destroyed: which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' shall not leave thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: either
  - type: text
    text: ' corn, wine, or oil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' the increase of thy kine, or flocks of thy sheep, until he have destroyed thee. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And he shall besiege thee in all thy gates, until thy high and fenced walls come down, wherein thou trustedst, throughout all thy land: and he shall besiege thee in all thy gates throughout all thy land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath given thee. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And thou shalt eat the fruit of thine own body, the flesh of thy sons and of thy daughters, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath given thee, in the siege, and in the straitness, wherewith thine enemies shall distress thee: '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: add
    children:
    - type: text
      text: so that
  - type: text
    text: ' the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' tender among you, and very delicate, his eye shall be evil toward his brother, and toward the wife of his bosom, and toward the remnant of his children which he shall leave: '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'so that he will not give to any of them of the flesh of his children whom he shall eat: because he hath nothing left him in the siege, and in the straitness, wherewith thine enemies shall distress thee in all thy gates. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'The tender and delicate woman among you, which would not adventure to set the sole of her foot upon the ground for delicateness and tenderness, her eye shall be evil toward the husband of her bosom, and toward her son, and toward her daughter, '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'and toward her young one that cometh out from between her feet, and toward her children which she shall bear: for she shall eat them for want of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' secretly in the siege and straitness, wherewith thine enemy shall distress thee in thy gates.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Words of Warning
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'If thou wilt not observe to do all the words of this law that are written in this book, that thou mayest fear this glorious and fearful name, THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' THY GOD; '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will make thy plagues wonderful, and the plagues of thy seed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' great plagues, and of long continuance, and sore sicknesses, and of long continuance. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Moreover he will bring upon thee all the diseases of Egypt, which thou wast afraid of; and they shall cleave unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Also every sickness, and every plague, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not written in the book of this law, them will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bring upon thee, until thou be destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'And ye shall be left few in number, whereas ye were as the stars of heaven for multitude; because thou wouldest not obey the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' rejoiced over you to do you good, and to multiply you; so the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will rejoice over you to destroy you, and to bring you to nought; and ye shall be plucked from off the land whither thou goest to possess it. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall scatter thee among all people, from the one end of the earth even unto the other; and there thou shalt serve other gods, which neither thou nor thy fathers have known, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' wood and stone. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'And among these nations shalt thou find no ease, neither shall the sole of thy foot have rest: but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall give thee there a trembling heart, and failing of eyes, and sorrow of mind: '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'and thy life shall hang in doubt before thee; and thou shalt fear day and night, and shalt have none assurance of thy life: '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'in the morning thou shalt say, Would God it were even! and at even thou shalt say, Would God it were morning! for the fear of thine heart wherewith thou shalt fear, and for the sight of thine eyes which thou shalt see. '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall bring thee into Egypt again with ships, by the way whereof I spake unto thee, Thou shalt see it no more again: and there ye shall be sold unto your enemies for bondmen and bondwomen, and no man shall buy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: .
