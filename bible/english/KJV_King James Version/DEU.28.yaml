    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it shall come to pass, if thou shalt hearken diligently unto the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, to observe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to do all his commandments which I command thee this day, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God will set thee on high above all nations of the earth: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and all these blessings shall come on thee, and overtake thee, if thou shalt hearken unto the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in the city, and blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in the field. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the fruit of thy body, and the fruit of thy ground, and the fruit of thy cattle, the increase of thy kine, and the flocks of thy sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
