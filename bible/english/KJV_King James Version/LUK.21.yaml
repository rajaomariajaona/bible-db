document_id: LUK.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Widow's Mites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he looked up, and saw the rich men casting their gifts into the treasury. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Nation shall rise against nation, and kingdom against kingdom:'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and great earthquakes shall be in divers places, and famines, and pestilences; and fearful sights and great signs shall there be from heaven.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But before all these, they shall lay their hands on you, and persecute '
      - type: usfm
        marker: add
        children:
        - type: text
          text: you
      - type: text
        text: ', delivering '
      - type: usfm
        marker: add
        children:
        - type: text
          text: you
      - type: text
        text: ' up to the synagogues, and into prisons, being brought before kings and rulers for my name''s sake.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And it shall turn to you for a testimony.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Settle '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' therefore in your hearts, not to meditate before what ye shall answer:'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I will give you a mouth and wisdom, which all your adversaries shall not be able to gainsay nor resist.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And ye shall be betrayed both by parents, and brethren, and kinsfolks, and friends; and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: some
      - type: text
        text: ' of you shall they cause to be put to death.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And ye shall be hated of all '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' for my name''s sake.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But there shall not an hair of your head perish.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In your patience possess ye your souls.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he saw also a certain poor widow casting in thither two mites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when ye shall see Jerusalem compassed with armies, then know that the desolation thereof is nigh.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then let them which are in Judæa flee to the mountains; and let them which are in the midst of it depart out; and let not them that are in the countries enter thereinto.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For these be the days of vengeance, that all things which are written may be fulfilled.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But woe unto them that are with child, and to them that give suck, in those days! for there shall be great distress in the land, and wrath upon this people.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And they shall fall by the edge of the sword, and shall be led away captive into all nations: and Jerusalem shall be trodden down of the Gentiles, until the times of the Gentiles be fulfilled.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And there shall be signs in the sun, and in the moon, and in the stars; and upon the earth distress of nations, with perplexity; the sea and the waves roaring;
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'men''s hearts failing them for fear, and for looking after those things which are coming on the earth: for the powers of heaven shall be shaken.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And then shall they see the Son of man coming in a cloud with power and great glory.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when these things begin to come to pass, then look up, and lift up your heads; for your redemption draweth nigh.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Behold the Trees
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spake to them a parable; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold the fig tree, and all the trees;
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Of a truth I say unto you, that this poor widow hath cast in more than they all:'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: when they now shoot forth, ye see and know of your own selves that summer is now nigh at hand.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So likewise ye, when ye see these things come to pass, know ye that the kingdom of God is nigh at hand.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, This generation shall not pass away, till all be fulfilled.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Heaven and earth shall pass away: but my words shall not pass away.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And take heed to yourselves, lest at any time your hearts be overcharged with surfeiting, and drunkenness, and cares of this life, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: so
      - type: text
        text: ' that day come upon you unawares.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For as a snare shall it come on all them that dwell on the face of the whole earth.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Watch ye therefore, and pray always, that ye may be accounted worthy to escape all these things that shall come to pass, and to stand before the Son of man.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Visits Olivet
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the day time he was teaching in the temple; and at night he went out, and abode in the mount that is called '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the mount
    - type: text
      text: ' of Olives. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all the people came early in the morning to him in the temple, for to hear him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for all these have of their abundance cast in unto the offerings of God: but she of her penury hath cast in all the living that she had.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Signs of the Times
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as some spake of the temple, how it was adorned with goodly stones and gifts, he said, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: add
        children:
        - type: text
          text: As for
      - type: text
        text: ' these things which ye behold, the days will come, in the which there shall not be left one stone upon another, that shall not be thrown down.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they asked him, saying, Master, but when shall these things be? and what sign '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will there be
    - type: text
      text: ' when these things shall come to pass? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take heed that ye be not deceived: for many shall come in my name, saying, I am '
      - type: usfm
        marker: add
        children:
        - type: text
          text: Christ
      - type: text
        text: '; and the time draweth near: go ye not therefore after them.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when ye shall hear of wars and commotions, be not terrified: for these things must first come to pass; but the end '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' not by and by.'
