verses:
  '1':
  - type: heading
    content: The Widow's Mites
  - type: text
    content: 'And he looked up, and saw the rich men casting their gifts into the treasury. '
  '10':
  - type: text
    content: 'Then said he unto them, '
  - type: text
    content: 'Nation shall rise against nation, and kingdom against kingdom:'
  - type: text
    content: ' '
  '11':
  - type: text
    content: and great earthquakes shall be in divers places, and famines, and pestilences; and fearful sights and great signs shall there be from heaven.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'But before all these, they shall lay their hands on you, and persecute '
  - type: text
    content: you
  - type: text
    content: ', delivering '
  - type: text
    content: you
  - type: text
    content: ' up to the synagogues, and into prisons, being brought before kings and rulers for my name''s sake.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: And it shall turn to you for a testimony.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Settle '
  - type: text
    content: it
  - type: text
    content: ' therefore in your hearts, not to meditate before what ye shall answer:'
  - type: text
    content: ' '
  '15':
  - type: text
    content: for I will give you a mouth and wisdom, which all your adversaries shall not be able to gainsay nor resist.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'And ye shall be betrayed both by parents, and brethren, and kinsfolks, and friends; and '
  - type: text
    content: some
  - type: text
    content: ' of you shall they cause to be put to death.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And ye shall be hated of all '
  - type: text
    content: men
  - type: text
    content: ' for my name''s sake.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: But there shall not an hair of your head perish.
  - type: text
    content: ' '
  '19':
  - type: text
    content: In your patience possess ye your souls.
  '2':
  - type: text
    content: 'And he saw also a certain poor widow casting in thither two mites. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: And when ye shall see Jerusalem compassed with armies, then know that the desolation thereof is nigh.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then let them which are in Judæa flee to the mountains; and let them which are in the midst of it depart out; and let not them that are in the countries enter thereinto.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For these be the days of vengeance, that all things which are written may be fulfilled.
  - type: text
    content: ' '
  '23':
  - type: text
    content: But woe unto them that are with child, and to them that give suck, in those days! for there shall be great distress in the land, and wrath upon this people.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And they shall fall by the edge of the sword, and shall be led away captive into all nations: and Jerusalem shall be trodden down of the Gentiles, until the times of the Gentiles be fulfilled.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: And there shall be signs in the sun, and in the moon, and in the stars; and upon the earth distress of nations, with perplexity; the sea and the waves roaring;
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'men''s hearts failing them for fear, and for looking after those things which are coming on the earth: for the powers of heaven shall be shaken.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: And then shall they see the Son of man coming in a cloud with power and great glory.
  - type: text
    content: ' '
  '28':
  - type: text
    content: And when these things begin to come to pass, then look up, and lift up your heads; for your redemption draweth nigh.
  - type: heading
    content: Behold the Trees
  '29':
  - type: text
    content: 'And he spake to them a parable; '
  - type: text
    content: Behold the fig tree, and all the trees;
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And he said, '
  - type: text
    content: 'Of a truth I say unto you, that this poor widow hath cast in more than they all:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: when they now shoot forth, ye see and know of your own selves that summer is now nigh at hand.
  - type: text
    content: ' '
  '31':
  - type: text
    content: So likewise ye, when ye see these things come to pass, know ye that the kingdom of God is nigh at hand.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Verily I say unto you, This generation shall not pass away, till all be fulfilled.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Heaven and earth shall pass away: but my words shall not pass away.'
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'And take heed to yourselves, lest at any time your hearts be overcharged with surfeiting, and drunkenness, and cares of this life, and '
  - type: text
    content: so
  - type: text
    content: ' that day come upon you unawares.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: For as a snare shall it come on all them that dwell on the face of the whole earth.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Watch ye therefore, and pray always, that ye may be accounted worthy to escape all these things that shall come to pass, and to stand before the Son of man.
  - type: heading
    content: Visits Olivet
  '37':
  - type: text
    content: 'And in the day time he was teaching in the temple; and at night he went out, and abode in the mount that is called '
  - type: text
    content: the mount
  - type: text
    content: ' of Olives. '
  '38':
  - type: text
    content: And all the people came early in the morning to him in the temple, for to hear him.
  '4':
  - type: text
    content: 'for all these have of their abundance cast in unto the offerings of God: but she of her penury hath cast in all the living that she had.'
  - type: heading
    content: Signs of the Times
  '5':
  - type: text
    content: 'And as some spake of the temple, how it was adorned with goodly stones and gifts, he said, '
  '6':
  - type: text
    content: As for
  - type: text
    content: ' these things which ye behold, the days will come, in the which there shall not be left one stone upon another, that shall not be thrown down.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And they asked him, saying, Master, but when shall these things be? and what sign '
  - type: text
    content: will there be
  - type: text
    content: ' when these things shall come to pass? '
  '8':
  - type: text
    content: 'And he said, '
  - type: text
    content: 'Take heed that ye be not deceived: for many shall come in my name, saying, I am '
  - type: text
    content: Christ
  - type: text
    content: '; and the time draweth near: go ye not therefore after them.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'But when ye shall hear of wars and commotions, be not terrified: for these things must first come to pass; but the end '
  - type: text
    content: is
  - type: text
    content: ' not by and by.'
