document_id: LUK.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His First Disciples
  - type: text
    content: 'And it came to pass, that, as the people pressed upon him to hear the word of God, he stood by the lake of Gennesaret, '
  '10':
  - type: text
    content: 'and so '
  - type: text
    content: was
  - type: text
    content: ' also James, and John, the sons of Zebedee, which were partners with Simon. And Jesus said unto Simon, '
  - type: text
    content: Fear not; from henceforth thou shalt catch men.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And when they had brought their ships to land, they forsook all, and followed him.
  - type: heading
    content: His Healing Ministry
  '12':
  - type: text
    content: 'And it came to pass, when he was in a certain city, behold a man full of leprosy: who seeing Jesus fell on '
  - type: text
    content: his
  - type: text
    content: ' face, and besought him, saying, Lord, if thou wilt, thou canst make me clean. '
  '13':
  - type: text
    content: 'And he put forth '
  - type: text
    content: his
  - type: text
    content: ' hand, and touched him, saying, '
  - type: text
    content: 'I will: be thou clean.'
  - type: text
    content: ' And immediately the leprosy departed from him. '
  '14':
  - type: text
    content: 'And he charged him to '
  - type: text
    content: 'tell no man: but go, and shew thyself to the priest, and offer for thy cleansing, according as Moses commanded, for a testimony unto them.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But so much the more went there a fame abroad of him: and great multitudes came together to hear, and to be healed by him of their infirmities.'
  '16':
  - type: text
    content: 'And he withdrew himself into the wilderness, and prayed. '
  '17':
  - type: text
    content: 'And it came to pass on a certain day, as he was teaching, that there were Pharisees and doctors of the law sitting by, which were come out of every town of Galilee, and Judæa, and Jerusalem: and the power of the Lord was '
  - type: text
    content: present
  - type: text
    content: ' to heal them.'
  '18':
  - type: text
    content: 'And, behold, men brought in a bed a man which was taken with a palsy: and they sought '
  - type: text
    content: means
  - type: text
    content: ' to bring him in, and to lay '
  - type: text
    content: him
  - type: text
    content: ' before him. '
  '19':
  - type: text
    content: 'And when they could not find by what '
  - type: text
    content: way
  - type: text
    content: ' they might bring him in because of the multitude, they went upon the housetop, and let him down through the tiling with '
  - type: text
    content: his
  - type: text
    content: ' couch into the midst before Jesus. '
  '2':
  - type: text
    content: 'and saw two ships standing by the lake: but the fishermen were gone out of them, and were washing '
  - type: text
    content: their
  - type: text
    content: ' nets. '
  '20':
  - type: text
    content: 'And when he saw their faith, he said unto him, '
  - type: text
    content: Man, thy sins are forgiven thee.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the scribes and the Pharisees began to reason, saying, Who is this which speaketh blasphemies? Who can forgive sins, but God alone? '
  '22':
  - type: text
    content: 'But when Jesus perceived their thoughts, he answering said unto them, '
  - type: text
    content: What reason ye in your hearts?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Whether is easier, to say, Thy sins be forgiven thee; or to say, Rise up and walk?
  - type: text
    content: ' '
  '24':
  - type: text
    content: But that ye may know that the Son of man hath power upon earth to forgive sins,
  - type: text
    content: ' (he said unto the sick of the palsy,) '
  - type: text
    content: I say unto thee, Arise, and take up thy couch, and go into thine house.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And immediately he rose up before them, and took up that whereon he lay, and departed to his own house, glorifying God. '
  '26':
  - type: text
    content: And they were all amazed, and they glorified God, and were filled with fear, saying, We have seen strange things to day.
  - type: heading
    content: The Call of Levi
  '27':
  - type: text
    content: 'And after these things he went forth, and saw a publican, named Levi, sitting at the receipt of custom: and he said unto him, '
  - type: text
    content: Follow me.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And he left all, rose up, and followed him. '
  '29':
  - type: text
    content: 'And Levi made him a great feast in his own house: and there was a great company of publicans and of others that sat down with them. '
  '3':
  - type: text
    content: 'And he entered into one of the ships, which was Simon''s, and prayed him that he would thrust out a little from the land. And he sat down, and taught the people out of the ship. '
  '30':
  - type: text
    content: 'But their scribes and Pharisees murmured against his disciples, saying, Why do ye eat and drink with publicans and sinners? '
  '31':
  - type: text
    content: 'And Jesus answering said unto them, '
  - type: text
    content: They that are whole need not a physician; but they that are sick.
  - type: text
    content: ' '
  '32':
  - type: text
    content: I came not to call the righteous, but sinners to repentance.
  '33':
  - type: text
    content: 'And they said unto him, Why do the disciples of John fast often, and make prayers, and likewise '
  - type: text
    content: the disciples
  - type: text
    content: ' of the Pharisees; but thine eat and drink? '
  '34':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Can ye make the children of the bridechamber fast, while the bridegroom is with them?
  - type: text
    content: ' '
  '35':
  - type: text
    content: But the days will come, when the bridegroom shall be taken away from them, and then shall they fast in those days.
  '36':
  - type: text
    content: 'And he spake also a parable unto them; '
  - type: text
    content: 'No man putteth a piece of a new garment upon an old; if otherwise, then both the new maketh a rent, and the piece that was '
  - type: text
    content: taken
  - type: text
    content: ' out of the new agreeth not with the old.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: And no man putteth new wine into old bottles; else the new wine will burst the bottles, and be spilled, and the bottles shall perish.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But new wine must be put into new bottles; and both are preserved.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'No man also having drunk old '
  - type: text
    content: wine
  - type: text
    content: ' straightway desireth new: for he saith, The old is better.'
  '4':
  - type: text
    content: 'Now when he had left speaking, he said unto Simon, '
  - type: text
    content: Launch out into the deep, and let down your nets for a draught.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And Simon answering said unto him, Master, we have toiled all the night, and have taken nothing: nevertheless at thy word I will let down the net. '
  '6':
  - type: text
    content: 'And when they had this done, they inclosed a great multitude of fishes: and their net brake. '
  '7':
  - type: text
    content: 'And they beckoned unto '
  - type: text
    content: their
  - type: text
    content: ' partners, which were in the other ship, that they should come and help them. And they came, and filled both the ships, so that they began to sink. '
  '8':
  - type: text
    content: 'When Simon Peter saw '
  - type: text
    content: it
  - type: text
    content: ', he fell down at Jesus'' knees, saying, Depart from me; for I am a sinful man, O Lord. '
  '9':
  - type: text
    content: 'For he was astonished, and all that were with him, at the draught of the fishes which they had taken: '
