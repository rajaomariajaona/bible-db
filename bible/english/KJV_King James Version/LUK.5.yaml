document_id: LUK.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His First Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, that, as the people pressed upon him to hear the word of God, he stood by the lake of Gennesaret, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and saw two ships standing by the lake: but the fishermen were gone out of them, and were washing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' nets. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he entered into one of the ships, which was Simon''s, and prayed him that he would thrust out a little from the land. And he sat down, and taught the people out of the ship. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now when he had left speaking, he said unto Simon, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Launch out into the deep, and let down your nets for a draught.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Simon answering said unto him, Master, we have toiled all the night, and have taken nothing: nevertheless at thy word I will let down the net. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when they had this done, they inclosed a great multitude of fishes: and their net brake. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they beckoned unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' partners, which were in the other ship, that they should come and help them. And they came, and filled both the ships, so that they began to sink. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Simon Peter saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he fell down at Jesus'' knees, saying, Depart from me; for I am a sinful man, O Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For he was astonished, and all that were with him, at the draught of the fishes which they had taken: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' also James, and John, the sons of Zebedee, which were partners with Simon. And Jesus said unto Simon, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Fear not; from henceforth thou shalt catch men.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And when they had brought their ships to land, they forsook all, and followed him.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Healing Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And it came to pass, when he was in a certain city, behold a man full of leprosy: who seeing Jesus fell on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' face, and besought him, saying, Lord, if thou wilt, thou canst make me clean. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he put forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand, and touched him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I will: be thou clean.'
  - type: text
    text: ' And immediately the leprosy departed from him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he charged him to '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'tell no man: but go, and shew thyself to the priest, and offer for thy cleansing, according as Moses commanded, for a testimony unto them.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But so much the more went there a fame abroad of him: and great multitudes came together to hear, and to be healed by him of their infirmities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he withdrew himself into the wilderness, and prayed. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass on a certain day, as he was teaching, that there were Pharisees and doctors of the law sitting by, which were come out of every town of Galilee, and Judæa, and Jerusalem: and the power of the Lord was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: present
  - type: text
    text: ' to heal them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And, behold, men brought in a bed a man which was taken with a palsy: and they sought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: means
  - type: text
    text: ' to bring him in, and to lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' before him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when they could not find by what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: way
  - type: text
    text: ' they might bring him in because of the multitude, they went upon the housetop, and let him down through the tiling with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' couch into the midst before Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when he saw their faith, he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Man, thy sins are forgiven thee.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the scribes and the Pharisees began to reason, saying, Who is this which speaketh blasphemies? Who can forgive sins, but God alone? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when Jesus perceived their thoughts, he answering said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What reason ye in your hearts?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whether is easier, to say, Thy sins be forgiven thee; or to say, Rise up and walk?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But that ye may know that the Son of man hath power upon earth to forgive sins,
  - type: text
    text: ' (he said unto the sick of the palsy,) '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I say unto thee, Arise, and take up thy couch, and go into thine house.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And immediately he rose up before them, and took up that whereon he lay, and departed to his own house, glorifying God. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And they were all amazed, and they glorified God, and were filled with fear, saying, We have seen strange things to day.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Call of Levi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And after these things he went forth, and saw a publican, named Levi, sitting at the receipt of custom: and he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he left all, rose up, and followed him. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Levi made him a great feast in his own house: and there was a great company of publicans and of others that sat down with them. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But their scribes and Pharisees murmured against his disciples, saying, Why do ye eat and drink with publicans and sinners? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Jesus answering said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They that are whole need not a physician; but they that are sick.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I came not to call the righteous, but sinners to repentance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they said unto him, Why do the disciples of John fast often, and make prayers, and likewise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the disciples
  - type: text
    text: ' of the Pharisees; but thine eat and drink? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Can ye make the children of the bridechamber fast, while the bridegroom is with them?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the days will come, when the bridegroom shall be taken away from them, and then shall they fast in those days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he spake also a parable unto them; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'No man putteth a piece of a new garment upon an old; if otherwise, then both the new maketh a rent, and the piece that was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: taken
    - type: text
      text: ' out of the new agreeth not with the old.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And no man putteth new wine into old bottles; else the new wine will burst the bottles, and be spilled, and the bottles shall perish.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But new wine must be put into new bottles; and both are preserved.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'No man also having drunk old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wine
    - type: text
      text: ' straightway desireth new: for he saith, The old is better.'
