document_id: PHP.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Paul and Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Finally, my brethren, rejoice in the Lord. To write the same things to you, to me indeed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not grievous, but for you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' safe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Beware of dogs, beware of evil workers, beware of the concision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For we are the circumcision, which worship God in the spirit, and rejoice in Christ Jesus, and have no confidence in the flesh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Though I might also have confidence in the flesh. If any other man thinketh that he hath whereof he might trust in the flesh, I more: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'circumcised the eighth day, of the stock of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the tribe of Benjamin, an Hebrew of the Hebrews; as touching the law, a Pharisee; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'concerning zeal, persecuting the church; touching the righteousness which is in the law, blameless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But what things were gain to me, those I counted loss for Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yea doubtless, and I count all things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' loss for the excellency of the knowledge of Christ Jesus my Lord: for whom I have suffered the loss of all things, and do count them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' dung, that I may win Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and be found in him, not having mine own righteousness, which is of the law, but that which is through the faith of Christ, the righteousness which is of God by faith: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that I may know him, and the power of his resurrection, and the fellowship of his sufferings, being made conformable unto his death; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'if by any means I might attain unto the resurrection of the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Not as though I had already attained, either were already perfect: but I follow after, if that I may apprehend that for which also I am apprehended of Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Brethren, I count not myself to have apprehended: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' one thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I do
  - type: text
    text: ', forgetting those things which are behind, and reaching forth unto those things which are before, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I press toward the mark for the prize of the high calling of God in Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Let us therefore, as many as be perfect, be thus minded: and if in any thing ye be otherwise minded, God shall reveal even this unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nevertheless, whereto we have already attained, let us walk by the same rule, let us mind the same thing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Brethren, be followers together of me, and mark them which walk so as ye have us for an ensample. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '(For many walk, of whom I have told you often, and now tell you even weeping, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that they are
  - type: text
    text: ' the enemies of the cross of Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'whose end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' destruction, whose God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is their
  - type: text
    text: ' belly, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whose
  - type: text
    text: ' glory '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in their shame, who mind earthly things.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For our conversation is in heaven; from whence also we look for the Saviour, the Lord Jesus Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: who shall change our vile body, that it may be fashioned like unto his glorious body, according to the working whereby he is able even to subdue all things unto himself.
