  '1':
  - type: heading
    content: Paul and Christ
  - type: text
    content: 'Finally, my brethren, rejoice in the Lord. To write the same things to you, to me indeed '
  - type: text
    content: is
  - type: text
    content: ' not grievous, but for you '
  - type: text
    content: it is
  - type: text
    content: ' safe.'
  '10':
  - type: text
    content: 'that I may know him, and the power of his resurrection, and the fellowship of his sufferings, being made conformable unto his death; '
  '11':
  - type: text
    content: 'if by any means I might attain unto the resurrection of the dead. '
  '12':
  - type: text
    content: 'Not as though I had already attained, either were already perfect: but I follow after, if that I may apprehend that for which also I am apprehended of Christ Jesus. '
  '13':
  - type: text
    content: 'Brethren, I count not myself to have apprehended: but '
  - type: text
    content: this
  - type: text
    content: ' one thing '
  - type: text
    content: I do
  - type: text
    content: ', forgetting those things which are behind, and reaching forth unto those things which are before, '
  '14':
  - type: text
    content: 'I press toward the mark for the prize of the high calling of God in Christ Jesus. '
  '15':
  - type: text
    content: 'Let us therefore, as many as be perfect, be thus minded: and if in any thing ye be otherwise minded, God shall reveal even this unto you. '
  '16':
  - type: text
    content: Nevertheless, whereto we have already attained, let us walk by the same rule, let us mind the same thing.
  '17':
  - type: text
    content: 'Brethren, be followers together of me, and mark them which walk so as ye have us for an ensample. '
  '18':
  - type: text
    content: '(For many walk, of whom I have told you often, and now tell you even weeping, '
  - type: text
    content: that they are
  - type: text
    content: ' the enemies of the cross of Christ: '
  '19':
  - type: text
    content: 'whose end '
  - type: text
    content: is
  - type: text
    content: ' destruction, whose God '
  - type: text
    content: is their
  - type: text
    content: ' belly, and '
  - type: text
    content: whose
  - type: text
    content: ' glory '
  - type: text
    content: is
  - type: text
    content: ' in their shame, who mind earthly things.) '
  '2':
  - type: text
    content: 'Beware of dogs, beware of evil workers, beware of the concision. '
  '20':
  - type: text
    content: 'For our conversation is in heaven; from whence also we look for the Saviour, the Lord Jesus Christ: '
  '21':
  - type: text
    content: who shall change our vile body, that it may be fashioned like unto his glorious body, according to the working whereby he is able even to subdue all things unto himself.
  '3':
  - type: text
    content: For we are the circumcision, which worship God in the spirit, and rejoice in Christ Jesus, and have no confidence in the flesh.
  '4':
  - type: text
    content: 'Though I might also have confidence in the flesh. If any other man thinketh that he hath whereof he might trust in the flesh, I more: '
  '5':
  - type: text
    content: 'circumcised the eighth day, of the stock of Israel, '
  - type: text
    content: of
  - type: text
    content: ' the tribe of Benjamin, an Hebrew of the Hebrews; as touching the law, a Pharisee; '
  '6':
  - type: text
    content: 'concerning zeal, persecuting the church; touching the righteousness which is in the law, blameless. '
  '7':
  - type: text
    content: 'But what things were gain to me, those I counted loss for Christ. '
  '8':
  - type: text
    content: 'Yea doubtless, and I count all things '
  - type: text
    content: but
  - type: text
    content: ' loss for the excellency of the knowledge of Christ Jesus my Lord: for whom I have suffered the loss of all things, and do count them '
  - type: text
    content: but
  - type: text
    content: ' dung, that I may win Christ, '
  '9':
  - type: text
    content: 'and be found in him, not having mine own righteousness, which is of the law, but that which is through the faith of Christ, the righteousness which is of God by faith: '
