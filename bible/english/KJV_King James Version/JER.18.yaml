document_id: JER.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Parable of the Potter
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word which came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if it do evil in my sight, that it obey not my voice, then I will repent of the good, wherewith I said I would benefit them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore go to, speak to the men of Judah, and to the inhabitants of Jerusalem, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, I frame evil against you, and devise a device against you: return ye now every one from his evil way, and make your ways and your doings good. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, There is no hope: but we will walk after our own devices, and we will every one do the imagination of his evil heart.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Ask ye now among the heathen, who hath heard such things: the virgin of Israel hath done a very horrible thing. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Will '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a man
    - type: text
      text: ' leave the snow of Lebanon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which cometh
    - type: text
      text: ' from the rock of the field? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' shall the cold flowing waters that come from another place be forsaken? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because my people hath forgotten me, they have burned incense to vanity, and they have caused them to stumble in their ways '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the ancient paths, to walk in paths, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' a way not cast up; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to make their land desolate, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' a perpetual hissing; every one that passeth thereby shall be astonished, and wag his head. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will scatter them as with an east wind before the enemy; I will shew them the back, and not the face, in the day of their calamity.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Enemies of the Prophet
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then said they, Come, and let us devise devices against Jeremiah; for the law shall not perish from the priest, nor counsel from the wise, nor the word from the prophet. Come, and let us smite him with the tongue, and let us not give heed to any of his words.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give heed to me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and hearken to the voice of them that contend with me. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arise, and go down to the potter''s house, and there I will cause thee to hear my words. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shall evil be recompensed for good? for they have digged a pit for my soul. Remember that I stood before thee to speak good for them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to turn away thy wrath from them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore deliver up their children to the famine, and pour out their '
    - type: usfm
      marker: add
      children:
      - type: text
        text: blood
    - type: text
      text: ' by the force of the sword; and let their wives be bereaved of their children, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' widows; and let their men be put to death; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let
    - type: text
      text: ' their young men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' slain by the sword in battle. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let a cry be heard from their houses, when thou shalt bring a troop suddenly upon them: for they have digged a pit to take me, and hid snares for my feet. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou knowest all their counsel against me to slay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'me:'
    - type: text
      text: ' forgive not their iniquity, neither blot out their sin from thy sight, but let them be overthrown before thee; deal '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thus
    - type: text
      text: ' with them in the time of thine anger.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I went down to the potter''s house, and, behold, he wrought a work on the wheels. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the vessel that he made of clay was marred in the hand of the potter: so he made it again another vessel, as seemed good to the potter to make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to me, saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O house of Israel, cannot I do with you as this potter? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Behold, as the clay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the potter''s hand, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ye in mine hand, O house of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: At what
    - type: text
      text: ' instant I shall speak concerning a nation, and concerning a kingdom, to pluck up, and to pull down, and to destroy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if that nation, against whom I have pronounced, turn from their evil, I will repent of the evil that I thought to do unto them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at what
    - type: text
      text: ' instant I shall speak concerning a nation, and concerning a kingdom, to build and to plant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; '
