verses:
  '1':
  - type: heading
    content: Parable of the Potter
  - type: text
    content: 'The word which came to Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '10':
  - type: text
    content: 'if it do evil in my sight, that it obey not my voice, then I will repent of the good, wherewith I said I would benefit them. '
  '11':
  - type: text
    content: 'Now therefore go to, speak to the men of Judah, and to the inhabitants of Jerusalem, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I frame evil against you, and devise a device against you: return ye now every one from his evil way, and make your ways and your doings good. '
  '12':
  - type: text
    content: 'And they said, There is no hope: but we will walk after our own devices, and we will every one do the imagination of his evil heart.'
  '13':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Ask ye now among the heathen, who hath heard such things: the virgin of Israel hath done a very horrible thing. '
  '14':
  - type: text
    content: 'Will '
  - type: text
    content: a man
  - type: text
    content: ' leave the snow of Lebanon '
  - type: text
    content: which cometh
  - type: text
    content: ' from the rock of the field? '
  - type: text
    content: or
  - type: text
    content: ' shall the cold flowing waters that come from another place be forsaken? '
  '15':
  - type: text
    content: 'Because my people hath forgotten me, they have burned incense to vanity, and they have caused them to stumble in their ways '
  - type: text
    content: from
  - type: text
    content: ' the ancient paths, to walk in paths, '
  - type: text
    content: in
  - type: text
    content: ' a way not cast up; '
  '16':
  - type: text
    content: 'to make their land desolate, '
  - type: text
    content: and
  - type: text
    content: ' a perpetual hissing; every one that passeth thereby shall be astonished, and wag his head. '
  '17':
  - type: text
    content: I will scatter them as with an east wind before the enemy; I will shew them the back, and not the face, in the day of their calamity.
  - type: heading
    content: Enemies of the Prophet
  '18':
  - type: text
    content: Then said they, Come, and let us devise devices against Jeremiah; for the law shall not perish from the priest, nor counsel from the wise, nor the word from the prophet. Come, and let us smite him with the tongue, and let us not give heed to any of his words.
  '19':
  - type: text
    content: 'Give heed to me, O '
  - type: text
    content: LORD
  - type: text
    content: ', and hearken to the voice of them that contend with me. '
  '2':
  - type: text
    content: 'Arise, and go down to the potter''s house, and there I will cause thee to hear my words. '
  '20':
  - type: text
    content: 'Shall evil be recompensed for good? for they have digged a pit for my soul. Remember that I stood before thee to speak good for them, '
  - type: text
    content: and
  - type: text
    content: ' to turn away thy wrath from them. '
  '21':
  - type: text
    content: 'Therefore deliver up their children to the famine, and pour out their '
  - type: text
    content: blood
  - type: text
    content: ' by the force of the sword; and let their wives be bereaved of their children, and '
  - type: text
    content: be
  - type: text
    content: ' widows; and let their men be put to death; '
  - type: text
    content: let
  - type: text
    content: ' their young men '
  - type: text
    content: be
  - type: text
    content: ' slain by the sword in battle. '
  '22':
  - type: text
    content: 'Let a cry be heard from their houses, when thou shalt bring a troop suddenly upon them: for they have digged a pit to take me, and hid snares for my feet. '
  '23':
  - type: text
    content: 'Yet, '
  - type: text
    content: LORD
  - type: text
    content: ', thou knowest all their counsel against me to slay '
  - type: text
    content: 'me:'
  - type: text
    content: ' forgive not their iniquity, neither blot out their sin from thy sight, but let them be overthrown before thee; deal '
  - type: text
    content: thus
  - type: text
    content: ' with them in the time of thine anger.'
  '3':
  - type: text
    content: 'Then I went down to the potter''s house, and, behold, he wrought a work on the wheels. '
  '4':
  - type: text
    content: 'And the vessel that he made of clay was marred in the hand of the potter: so he made it again another vessel, as seemed good to the potter to make '
  - type: text
    content: it
  - type: text
    content: .
  '5':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to me, saying, '
  '6':
  - type: text
    content: 'O house of Israel, cannot I do with you as this potter? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. Behold, as the clay '
  - type: text
    content: is
  - type: text
    content: ' in the potter''s hand, so '
  - type: text
    content: are
  - type: text
    content: ' ye in mine hand, O house of Israel. '
  '7':
  - type: text
    content: At what
  - type: text
    content: ' instant I shall speak concerning a nation, and concerning a kingdom, to pluck up, and to pull down, and to destroy '
  - type: text
    content: it
  - type: text
    content: '; '
  '8':
  - type: text
    content: 'if that nation, against whom I have pronounced, turn from their evil, I will repent of the evil that I thought to do unto them. '
  '9':
  - type: text
    content: 'And '
  - type: text
    content: at what
  - type: text
    content: ' instant I shall speak concerning a nation, and concerning a kingdom, to build and to plant '
  - type: text
    content: it
  - type: text
    content: '; '
