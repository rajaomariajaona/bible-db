document_id: JER.21,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem Besieged
  - type: text
    content: 'The word which came unto Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', when king Zedekiah sent unto him Pashur the son of Melchiah, and Zephaniah the son of Maaseiah the priest, saying, '
  '10':
  - type: text
    content: 'For I have set my face against this city for evil, and not for good, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': it shall be given into the hand of the king of Babylon, and he shall burn it with fire.'
  '11':
  - type: text
    content: 'And touching the house of the king of Judah, '
  - type: text
    content: say
  - type: text
    content: ', Hear ye the word of the '
  - type: text
    content: LORD
  - type: text
    content: '; '
  '12':
  - type: text
    content: 'O house of David, thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Execute judgment in the morning, and deliver '
  - type: text
    content: him that is
  - type: text
    content: ' spoiled out of the hand of the oppressor, lest my fury go out like fire, and burn that none can quench '
  - type: text
    content: it
  - type: text
    content: ', because of the evil of your doings.'
  '13':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' against thee, O inhabitant of the valley, '
  - type: text
    content: and
  - type: text
    content: ' rock of the plain, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; which say, Who shall come down against us? or who shall enter into our habitations? '
  '14':
  - type: text
    content: 'But I will punish you according to the fruit of your doings, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': and I will kindle a fire in the forest thereof, and it shall devour all things round about it.'
  '2':
  - type: text
    content: 'Enquire, I pray thee, of the '
  - type: text
    content: LORD
  - type: text
    content: ' for us; for Nebuchadrezzar king of Babylon maketh war against us; if so be that the '
  - type: text
    content: LORD
  - type: text
    content: ' will deal with us according to all his wondrous works, that he may go up from us.'
  '3':
  - type: text
    content: 'Then said Jeremiah unto them, Thus shall ye say to Zedekiah: '
  '4':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel; Behold, I will turn back the weapons of war that '
  - type: text
    content: are
  - type: text
    content: ' in your hands, wherewith ye fight against the king of Babylon, and '
  - type: text
    content: against
  - type: text
    content: ' the Chaldeans, which besiege you without the walls, and I will assemble them into the midst of this city. '
  '5':
  - type: text
    content: 'And I myself will fight against you with an outstretched hand and with a strong arm, even in anger, and in fury, and in great wrath. '
  '6':
  - type: text
    content: 'And I will smite the inhabitants of this city, both man and beast: they shall die of a great pestilence. '
  '7':
  - type: text
    content: 'And afterward, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', I will deliver Zedekiah king of Judah, and his servants, and the people, and such as are left in this city from the pestilence, from the sword, and from the famine, into the hand of Nebuchadrezzar king of Babylon, and into the hand of their enemies, and into the hand of those that seek their life: and he shall smite them with the edge of the sword; he shall not spare them, neither have pity, nor have mercy.'
  '8':
  - type: text
    content: 'And unto this people thou shalt say, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I set before you the way of life, and the way of death. '
  '9':
  - type: text
    content: 'He that abideth in this city shall die by the sword, and by the famine, and by the pestilence: but he that goeth out, and falleth to the Chaldeans that besiege you, he shall live, and his life shall be unto him for a prey. '
