document_id: JER.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem Besieged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word which came unto Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', when king Zedekiah sent unto him Pashur the son of Melchiah, and Zephaniah the son of Maaseiah the priest, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have set my face against this city for evil, and not for good, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': it shall be given into the hand of the king of Babylon, and he shall burn it with fire.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And touching the house of the king of Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: say
    - type: text
      text: ', Hear ye the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O house of David, thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Execute judgment in the morning, and deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that is
    - type: text
      text: ' spoiled out of the hand of the oppressor, lest my fury go out like fire, and burn that none can quench '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', because of the evil of your doings.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, O inhabitant of the valley, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' rock of the plain, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; which say, Who shall come down against us? or who shall enter into our habitations? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will punish you according to the fruit of your doings, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and I will kindle a fire in the forest thereof, and it shall devour all things round about it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enquire, I pray thee, of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for us; for Nebuchadrezzar king of Babylon maketh war against us; if so be that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will deal with us according to all his wondrous works, that he may go up from us.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Jeremiah unto them, Thus shall ye say to Zedekiah: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel; Behold, I will turn back the weapons of war that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in your hands, wherewith ye fight against the king of Babylon, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' the Chaldeans, which besiege you without the walls, and I will assemble them into the midst of this city. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I myself will fight against you with an outstretched hand and with a strong arm, even in anger, and in fury, and in great wrath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will smite the inhabitants of this city, both man and beast: they shall die of a great pestilence. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And afterward, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I will deliver Zedekiah king of Judah, and his servants, and the people, and such as are left in this city from the pestilence, from the sword, and from the famine, into the hand of Nebuchadrezzar king of Babylon, and into the hand of their enemies, and into the hand of those that seek their life: and he shall smite them with the edge of the sword; he shall not spare them, neither have pity, nor have mercy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And unto this people thou shalt say, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, I set before you the way of life, and the way of death. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that abideth in this city shall die by the sword, and by the famine, and by the pestilence: but he that goeth out, and falleth to the Chaldeans that besiege you, he shall live, and his life shall be unto him for a prey. '
