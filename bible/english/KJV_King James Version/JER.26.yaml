  '1':
  - type: heading
    content: Events in the Life of the Prophet
  - type: heading
    content: Attacked in the Temple
  - type: text
    content: 'In the beginning of the reign of Jehoiakim the son of Josiah king of Judah came this word from the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '10':
  - type: text
    content: 'When the princes of Judah heard these things, then they came up from the king''s house unto the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and sat down in the entry of the new gate of the '
  - type: text
    content: LORD
  - type: text
    content: '''s '
  - type: text
    content: house
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Then spake the priests and the prophets unto the princes and to all the people, saying, This man '
  - type: text
    content: is
  - type: text
    content: ' worthy to die; for he hath prophesied against this city, as ye have heard with your ears.'
  '12':
  - type: text
    content: 'Then spake Jeremiah unto all the princes and to all the people, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' sent me to prophesy against this house and against this city all the words that ye have heard. '
  '13':
  - type: text
    content: 'Therefore now amend your ways and your doings, and obey the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God; and the '
  - type: text
    content: LORD
  - type: text
    content: ' will repent him of the evil that he hath pronounced against you. '
  '14':
  - type: text
    content: 'As for me, behold, I '
  - type: text
    content: am
  - type: text
    content: ' in your hand: do with me as seemeth good and meet unto you. '
  '15':
  - type: text
    content: 'But know ye for certain, that if ye put me to death, ye shall surely bring innocent blood upon yourselves, and upon this city, and upon the inhabitants thereof: for of a truth the '
  - type: text
    content: LORD
  - type: text
    content: ' hath sent me unto you to speak all these words in your ears.'
  '16':
  - type: text
    content: 'Then said the princes and all the people unto the priests and to the prophets; This man '
  - type: text
    content: is
  - type: text
    content: ' not worthy to die: for he hath spoken to us in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God.'
  '17':
  - type: text
    content: 'Then rose up certain of the elders of the land, and spake to all the assembly of the people, saying, '
  '18':
  - type: text
    content: 'Micah the Morasthite prophesied in the days of Hezekiah king of Judah, and spake to all the people of Judah, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Zion shall be plowed '
  - type: text
    content: like
  - type: text
    content: ' a field, and Jerusalem shall become heaps, and the mountain of the house as the high places of a forest. '
  '19':
  - type: text
    content: 'Did Hezekiah king of Judah and all Judah put him at all to death? did he not fear the '
  - type: text
    content: LORD
  - type: text
    content: ', and besought the '
  - type: text
    content: LORD
  - type: text
    content: ', and the '
  - type: text
    content: LORD
  - type: text
    content: ' repented him of the evil which he had pronounced against them? Thus might we procure great evil against our souls.'
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Stand in the court of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house, and speak unto all the cities of Judah, which come to worship in the '
  - type: text
    content: LORD
  - type: text
    content: '''s house, all the words that I command thee to speak unto them; diminish not a word: '
  '20':
  - type: text
    content: 'And there was also a man that prophesied in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', Urijah the son of Shemaiah of Kirjath-jearim, who prophesied against this city and against this land according to all the words of Jeremiah: '
  '21':
  - type: text
    content: 'and when Jehoiakim the king, with all his mighty men, and all the princes, heard his words, the king sought to put him to death: but when Urijah heard it, he was afraid, and fled, and went into Egypt; '
  '22':
  - type: text
    content: 'and Jehoiakim the king sent men into Egypt, '
  - type: text
    content: namely
  - type: text
    content: ', Elnathan the son of Achbor, and '
  - type: text
    content: certain
  - type: text
    content: ' men with him into Egypt. '
  '23':
  - type: text
    content: 'And they fetched forth Urijah out of Egypt, and brought him unto Jehoiakim the king; who slew him with the sword, and cast his dead body into the graves of the common people. '
  '24':
  - type: text
    content: Nevertheless the hand of Ahikam the son of Shaphan was with Jeremiah, that they should not give him into the hand of the people to put him to death.
  '3':
  - type: text
    content: 'if so be they will hearken, and turn every man from his evil way, that I may repent me of the evil, which I purpose to do unto them because of the evil of their doings. '
  '4':
  - type: text
    content: 'And thou shalt say unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; If ye will not hearken to me, to walk in my law, which I have set before you, '
  '5':
  - type: text
    content: 'to hearken to the words of my servants the prophets, whom I sent unto you, both rising up early, and sending '
  - type: text
    content: them
  - type: text
    content: ', but ye have not hearkened; '
  '6':
  - type: text
    content: 'then will I make this house like Shiloh, and will make this city a curse to all the nations of the earth. '
  '7':
  - type: text
    content: 'So the priests and the prophets and all the people heard Jeremiah speaking these words in the house of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '8':
  - type: text
    content: 'Now it came to pass, when Jeremiah had made an end of speaking all that the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded '
  - type: text
    content: him
  - type: text
    content: ' to speak unto all the people, that the priests and the prophets and all the people took him, saying, Thou shalt surely die. '
  '9':
  - type: text
    content: 'Why hast thou prophesied in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, This house shall be like Shiloh, and this city shall be desolate without an inhabitant? And all the people were gathered against Jeremiah in the house of the '
  - type: text
    content: LORD
  - type: text
    content: .
