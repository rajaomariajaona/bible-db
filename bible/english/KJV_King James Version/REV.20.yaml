document_id: REV.20,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And I saw an angel come down from heaven, having the key of the bottomless pit and a great chain in his hand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the devil that deceived them was cast into the lake of fire and brimstone, where the beast and the false prophet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ', and shall be tormented day and night for ever and ever.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Visions of Glory
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And I saw a great white throne, and him that sat on it, from whose face the earth and the heaven fled away; and there was found no place for them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I saw the dead, small and great, stand before God; and the books were opened: and another book was opened, which is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the book
    - type: text
      text: ' of life: and the dead were judged out of those things which were written in the books, according to their works. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the sea gave up the dead which were in it; and death and hell delivered up the dead which were in them: and they were judged every man according to their works. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And death and hell were cast into the lake of fire. This is the second death. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And whosoever was not found written in the book of life was cast into the lake of fire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he laid hold on the dragon, that old serpent, which is the Devil, and Satan, and bound him a thousand years, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and cast him into the bottomless pit, and shut him up, and set a seal upon him, that he should deceive the nations no more, till the thousand years should be fulfilled: and after that he must be loosed a little season.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And I saw thrones, and they sat upon them, and judgment was given unto them: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I saw
    - type: text
      text: ' the souls of them that were beheaded for the witness of Jesus, and for the word of God, and which had not worshipped the beast, neither his image, neither had received '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mark upon their foreheads, or in their hands; and they lived and reigned with Christ a thousand years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But the rest of the dead lived not again until the thousand years were finished. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the first resurrection. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Blessed and holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that hath part in the first resurrection: on such the second death hath no power, but they shall be priests of God and of Christ, and shall reign with him a thousand years.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when the thousand years are expired, Satan shall be loosed out of his prison, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and shall go out to deceive the nations which are in the four quarters of the earth, Gog and Magog, to gather them together to battle: the number of whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as the sand of the sea. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And they went up on the breadth of the earth, and compassed the camp of the saints about, and the beloved city: and fire came down from God out of heaven, and devoured them. '
