  '4':
  - type: text
    content: ' '
  - type: text
    content: He is
  - type: text
    content: ' wise in heart, and mighty in strength:'
  - type: text
    content: 'Who hath hardened '
  - type: text
    content: himself
  - type: text
    content: ' against him, and hath prospered?'
  '5':
  - type: text
    content: 'Which removeth the mountains, and they know not:'
  - type: text
    content: Which overturneth them in his anger.
  '6':
  - type: text
    content: Which shaketh the earth out of her place,
  - type: text
    content: And the pillars thereof tremble.
  '7':
  - type: text
    content: Which commandeth the sun, and it riseth not;
  - type: text
    content: And sealeth up the stars.
  '8':
  - type: text
    content: Which alone spreadeth out the heavens,
  - type: text
    content: And treadeth upon the waves of the sea.
  '9':
  - type: text
    content: Which maketh Arcturus, Orion, and Pleiades,
  - type: text
