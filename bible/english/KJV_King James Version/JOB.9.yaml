document_id: JOB.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Job's Reply
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' so of a truth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But how should man be just with God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: If he will contend with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He cannot answer him one of a thousand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' wise in heart, and mighty in strength:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who hath hardened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' against him, and hath prospered?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Which removeth the mountains, and they know not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which overturneth them in his anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Which shaketh the earth out of her place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the pillars thereof tremble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Which commandeth the sun, and it riseth not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sealeth up the stars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Which alone spreadeth out the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And treadeth upon the waves of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Which maketh Arcturus, Orion, and Pleiades,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the chambers of the south.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Which doeth great things past finding out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, and wonders without number.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lo, he goeth by me, and I see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He passeth on also, but I perceive him not.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Behold, he taketh away, who can hinder him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will say unto him, What doest thou?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: If
  - type: text
    text: ' God will not withdraw his anger,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The proud helpers do stoop under him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: How much less shall I answer him,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' choose out my words '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to reason
  - type: text
    text: ' with him?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Whom, though I were righteous, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' would I not answer,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' I would make supplication to my judge.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: If I had called, and he had answered me;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yet
  - type: text
    text: ' would I not believe that he had hearkened unto my voice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For he breaketh me with a tempest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And multiplieth my wounds without cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He will not suffer me to take my breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But filleth me with bitterness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I speak
  - type: text
    text: ' of strength, lo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' strong:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And if of judgment, who shall set me a time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to plead?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'If I justify myself, mine own mouth shall condemn me:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: If I say
  - type: text
    text: ', I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' perfect, it shall also prove me perverse.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Though
  - type: text
    text: ' I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' perfect, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' would I not know my soul:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would despise my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ', therefore I said '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: He destroyeth the perfect and the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: If the scourge slay suddenly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will laugh at the trial of the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The earth is given into the hand of the wicked:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He covereth the faces of the judges thereof;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'If not, where, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now my days are swifter than a post:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They flee away, they see no good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They are passed away as the swift ships:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As the eagle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' hasteth to the prey.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If I say, I will forget my complaint,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will leave off my heaviness, and comfort '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'myself:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I am afraid of all my sorrows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know that thou wilt not hold me innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: If
  - type: text
    text: ' I be wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why then labour I in vain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: If I wash myself with snow water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And make my hands never so clean;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Yet shalt thou plunge me in the ditch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And mine own clothes shall abhor me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' not a man, as I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am, that
  - type: text
    text: ' I should answer him,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' we should come together in judgment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Neither is there any daysman betwixt us,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' might lay his hand upon us both.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Let him take his rod away from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And let not his fear terrify me:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' would I speak, and not fear him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' not so with me.'
