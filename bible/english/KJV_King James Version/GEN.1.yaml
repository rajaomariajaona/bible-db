document_id: GEN.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the beginning God created the heaven and the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And God called the dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: ' Earth; and the gathering together of the waters called he Seas: and God saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' good. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And God said, Let the earth bring forth grass, the herb yielding seed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the fruit tree yielding fruit after his kind, whose seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in itself, upon the earth: and it was so. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the earth brought forth grass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' herb yielding seed after his kind, and the tree yielding fruit, whose seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in itself, after his kind: and God saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' good. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And the evening and the morning were the third day.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And God said, Let there be lights in the firmament of the heaven to divide the day from the night; and let them be for signs, and for seasons, and for days, and years: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and let them be for lights in the firmament of the heaven to give light upon the earth: and it was so. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And God made two great lights; the greater light to rule the day, and the lesser light to rule the night: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he made
    - type: text
      text: ' the stars also. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And God set them in the firmament of the heaven to give light upon the earth, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and to rule over the day and over the night, and to divide the light from the darkness: and God saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' good. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And the evening and the morning were the fourth day.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the earth was without form, and void; and darkness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon the face of the deep. And the Spirit of God moved upon the face of the waters. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And God said, Let the waters bring forth abundantly the moving creature that hath life, and fowl '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' may fly above the earth in the open firmament of heaven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And God created great whales, and every living creature that moveth, which the waters brought forth abundantly, after their kind, and every winged fowl after his kind: and God saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And God blessed them, saying, Be fruitful, and multiply, and fill the waters in the seas, and let fowl multiply in the earth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And the evening and the morning were the fifth day.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And God said, Let the earth bring forth the living creature after his kind, cattle, and creeping thing, and beast of the earth after his kind: and it was so. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And God made the beast of the earth after his kind, and cattle after their kind, and every thing that creepeth upon the earth after his kind: and God saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' good. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And God said, Let us make man in our image, after our likeness: and let them have dominion over the fish of the sea, and over the fowl of the air, and over the cattle, and over all the earth, and over every creeping thing that creepeth upon the earth. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So God created man in his '
    - type: usfm
      marker: add
      children:
      - type: text
        text: own
    - type: text
      text: ' image, in the image of God created he him; male and female created he them. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And God blessed them, and God said unto them, Be fruitful, and multiply, and replenish the earth, and subdue it: and have dominion over the fish of the sea, and over the fowl of the air, and over every living thing that moveth upon the earth. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And God said, Behold, I have given you every herb bearing seed, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the face of all the earth, and every tree, in the which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the fruit of a tree yielding seed; to you it shall be for meat. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And God said, Let there be light: and there was light. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And to every beast of the earth, and to every fowl of the air, and to every thing that creepeth upon the earth, wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' life, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I have given
    - type: text
      text: ' every green herb for meat: and it was so. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And God saw every thing that he had made, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' very good. And the evening and the morning were the sixth day.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And God saw the light, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' good: and God divided the light from the darkness. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And God called the light Day, and the darkness he called Night. And the evening and the morning were the first day.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And God said, Let there be a firmament in the midst of the waters, and let it divide the waters from the waters. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And God made the firmament, and divided the waters which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' under the firmament from the waters which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' above the firmament: and it was so. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And God called the firmament Heaven. And the evening and the morning were the second day.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And God said, Let the waters under the heaven be gathered together unto one place, and let the dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: ' appear: and it was so. '
