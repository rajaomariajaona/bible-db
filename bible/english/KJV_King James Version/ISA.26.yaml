document_id: ISA.26,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: National Hopes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day shall this song be sung in the land of Judah; We have a strong city; salvation will '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' appoint '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' walls and bulwarks. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let favour be shewed to the wicked, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' will he not learn righteousness: in the land of uprightness will he deal unjustly, and will not behold the majesty of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' thy hand is lifted up, they will not see: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' they shall see, and be ashamed for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' envy at the people; yea, the fire of thine enemies shall devour them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou wilt ordain peace for us: for thou also hast wrought all our works in us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' lords beside thee have had dominion over us: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' by thee only will we make mention of thy name. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: They are
    - type: text
      text: ' dead, they shall not live; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' deceased, they shall not rise: therefore hast thou visited and destroyed them, and made all their memory to perish. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou hast increased the nation, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou hast increased the nation: thou art glorified: thou hadst removed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' far '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto
    - type: text
      text: ' all the ends of the earth.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in trouble have they visited thee, they poured out a prayer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' thy chastening '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Like as a woman with child, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' draweth near the time of her delivery, is in pain, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' crieth out in her pangs; so have we been in thy sight, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have been with child, we have been in pain, we have as it were brought forth wind; we have not wrought any deliverance in the earth; neither have the inhabitants of the world fallen. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy dead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall live, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: together with
    - type: text
      text: ' my dead body shall they arise. Awake and sing, ye that dwell in dust: for thy dew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' the dew of herbs, and the earth shall cast out the dead.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Open ye the gates, that the righteous nation which keepeth the truth may enter in. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come, my people, enter thou into thy chambers, and shut thy doors about thee: hide thyself as it were for a little moment, until the indignation be overpast. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' cometh out of his place to punish the inhabitants of the earth for their iniquity: the earth also shall disclose her blood, and shall no more cover her slain.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou wilt keep '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' in perfect peace, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whose
    - type: text
      text: ' mind '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' stayed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'on thee:'
    - type: text
      text: ' because he trusteth in thee. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trust ye in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for ever: for in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' JEHOVAH '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' everlasting strength: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for he bringeth down them that dwell on high; the lofty city, he layeth it low; he layeth it low, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the ground; he bringeth it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the dust. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The foot shall tread it down, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the feet of the poor, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the steps of the needy.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The way of the just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' uprightness: thou, most upright, dost weigh the path of the just. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, in the way of thy judgments, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', have we waited for thee; the desire of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to thy name, and to the remembrance of thee. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With my soul have I desired thee in the night; yea, with my spirit within me will I seek thee early: for when thy judgments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the earth, the inhabitants of the world will learn righteousness. '
