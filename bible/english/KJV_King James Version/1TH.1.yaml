document_id: 1TH.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, and Silvanus, and Timotheus, unto the church of the Thessalonians '
  - type: text
    content: which is
  - type: text
    content: ' in God the Father and '
  - type: text
    content: in
  - type: text
    content: ' the Lord Jesus Christ: Grace '
  - type: text
    content: be
  - type: text
    content: ' unto you, and peace, from God our Father, and the Lord Jesus Christ.'
  - type: heading
    content: Their Work of Faith
  '10':
  - type: text
    content: 'and to wait for his Son from heaven, whom he raised from the dead, '
  - type: text
    content: even
  - type: text
    content: ' Jesus, which delivered us from the wrath to come.'
  '2':
  - type: text
    content: 'We give thanks to God always for you all, making mention of you in our prayers; '
  '3':
  - type: text
    content: 'remembering without ceasing your work of faith, and labour of love, and patience of hope in our Lord Jesus Christ, in the sight of God and our Father; '
  '4':
  - type: text
    content: 'knowing, brethren beloved, your election of God. '
  '5':
  - type: text
    content: 'For our gospel came not unto you in word only, but also in power, and in the Holy Ghost, and in much assurance; as ye know what manner of men we were among you for your sake. '
  '6':
  - type: text
    content: 'And ye became followers of us, and of the Lord, having received the word in much affliction, with joy of the Holy Ghost: '
  '7':
  - type: text
    content: 'so that ye were ensamples to all that believe in Macedonia and Achaia. '
  '8':
  - type: text
    content: 'For from you sounded out the word of the Lord not only in Macedonia and Achaia, but also in every place your faith to God-ward is spread abroad; so that we need not to speak any thing. '
  '9':
  - type: text
    content: 'For they themselves shew of us what manner of entering in we had unto you, and how ye turned to God from idols to serve the living and true God; '
