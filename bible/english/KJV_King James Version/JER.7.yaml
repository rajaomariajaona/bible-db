document_id: JER.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Temple Proclamation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word that came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and come and stand before me in this house, which is called by my name, and say, We are delivered to do all these abominations? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is this house, which is called by my name, become a den of robbers in your eyes? Behold, even I have seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But go ye now unto my place which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Shiloh, where I set my name at the first, and see what I did to it for the wickedness of my people Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, because ye have done all these works, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and I spake unto you, rising up early and speaking, but ye heard not; and I called you, but ye answered not; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore will I do unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' house, which is called by my name, wherein ye trust, and unto the place which I gave to you and to your fathers, as I have done to Shiloh.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will cast you out of my sight, as I have cast out all your brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the whole seed of Ephraim.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore pray not thou for this people, neither lift up cry nor prayer for them, neither make intercession to me: for I will not hear thee. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seest thou not what they do in the cities of Judah and in the streets of Jerusalem? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children gather wood, and the fathers kindle the fire, and the women knead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' dough, to make cakes to the queen of heaven, and to pour out drink offerings unto other gods, that they may provoke me to anger. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do they provoke me to anger? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do they
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: provoke
    - type: text
      text: ' themselves to the confusion of their own faces?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stand in the gate of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s house, and proclaim there this word, and say, Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye of
    - type: text
      text: ' Judah, that enter in at these gates to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ; Behold, mine anger and my fury shall be poured out upon this place, upon man, and upon beast, and upon the trees of the field, and upon the fruit of the ground; and it shall burn, and shall not be quenched.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Put your burnt offerings unto your sacrifices, and eat flesh. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I spake not unto your fathers, nor commanded them in the day that I brought them out of the land of Egypt, concerning burnt offerings or sacrifices: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but this thing commanded I them, saying, Obey my voice, and I will be your God, and ye shall be my people: and walk ye in all the ways that I have commanded you, that it may be well unto you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they hearkened not, nor inclined their ear, but walked in the counsels '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' in the imagination of their evil heart, and went backward, and not forward. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since the day that your fathers came forth out of the land of Egypt unto this day I have even sent unto you all my servants the prophets, daily rising up early and sending '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'them:'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet they hearkened not unto me, nor inclined their ear, but hardened their neck: they did worse than their fathers.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thou shalt speak all these words unto them; but they will not hearken to thee: thou shalt also call unto them; but they will not answer thee. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thou shalt say unto them, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a nation that obeyeth not the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, nor receiveth correction: truth is perished, and is cut off from their mouth.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Let Jerusalem Mourn
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cut off thine hair, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: O Jerusalem
    - type: text
      text: ', and cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' away, and take up a lamentation on high places; for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath rejected and forsaken the generation of his wrath. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel, Amend your ways and your doings, and I will cause you to dwell in this place. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the children of Judah have done evil in my sight, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': they have set their abominations in the house which is called by my name, to pollute it. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they have built the high places of Tophet, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the valley of the son of Hinnom, to burn their sons and their daughters in the fire; which I commanded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not, neither came it into my heart. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, behold, the days come, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that it shall no more be called Tophet, nor The valley of the son of Hinnom, but the valley of slaughter: for they shall bury in Tophet, till there be no place. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the carcases of this people shall be meat for the fowls of the heaven, and for the beasts of the earth; and none shall fray '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' away. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then will I cause to cease from the cities of Judah, and from the streets of Jerusalem, the voice of mirth, and the voice of gladness, the voice of the bridegroom, and the voice of the bride: for the land shall be desolate.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trust ye not in lying words, saying, The temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', The temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', The temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if ye throughly amend your ways and your doings; if ye throughly execute judgment between a man and his neighbour; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' ye oppress not the stranger, the fatherless, and the widow, and shed not innocent blood in this place, neither walk after other gods to your hurt: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then will I cause you to dwell in this place, in the land that I gave to your fathers, for ever and ever.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, ye trust in lying words, that cannot profit. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Will ye steal, murder, and commit adultery, and swear falsely, and burn incense unto Baal, and walk after other gods whom ye know not; '
