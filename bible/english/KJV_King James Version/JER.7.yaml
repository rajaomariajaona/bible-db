  '3':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel, Amend your ways and your doings, and I will cause you to dwell in this place. '
  '30':
  - type: text
    content: 'For the children of Judah have done evil in my sight, saith the '
  - type: text
    content: LORD
  - type: text
