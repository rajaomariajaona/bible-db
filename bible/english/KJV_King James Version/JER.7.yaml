  '20':
  - type: text
    content: 'Therefore thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ; Behold, mine anger and my fury shall be poured out upon this place, upon man, and upon beast, and upon the trees of the field, and upon the fruit of the ground; and it shall burn, and shall not be quenched.
  '21':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Put your burnt offerings unto your sacrifices, and eat flesh. '
  '22':
  - type: text
    content: 'For I spake not unto your fathers, nor commanded them in the day that I brought them out of the land of Egypt, concerning burnt offerings or sacrifices: '
  '23':
  - type: text
    content: 'but this thing commanded I them, saying, Obey my voice, and I will be your God, and ye shall be my people: and walk ye in all the ways that I have commanded you, that it may be well unto you. '
  '24':
  - type: text
    content: 'But they hearkened not, nor inclined their ear, but walked in the counsels '
  - type: text
    content: and
  - type: text
    content: ' in the imagination of their evil heart, and went backward, and not forward. '
  '25':
  - type: text
    content: 'Since the day that your fathers came forth out of the land of Egypt unto this day I have even sent unto you all my servants the prophets, daily rising up early and sending '
  - type: text
    content: 'them:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'yet they hearkened not unto me, nor inclined their ear, but hardened their neck: they did worse than their fathers.'
  '27':
  - type: text
    content: 'Therefore thou shalt speak all these words unto them; but they will not hearken to thee: thou shalt also call unto them; but they will not answer thee. '
  '28':
  - type: text
    content: 'But thou shalt say unto them, This '
