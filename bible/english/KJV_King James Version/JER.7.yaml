  '31':
  - type: text
    content: 'And they have built the high places of Tophet, which '
  - type: text
    content: is
  - type: text
    content: ' in the valley of the son of Hinnom, to burn their sons and their daughters in the fire; which I commanded '
  - type: text
    content: them
  - type: text
    content: ' not, neither came it into my heart. '
  '32':
  - type: text
    content: 'Therefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that it shall no more be called Tophet, nor The valley of the son of Hinnom, but the valley of slaughter: for they shall bury in Tophet, till there be no place. '
  '33':
  - type: text
    content: 'And the carcases of this people shall be meat for the fowls of the heaven, and for the beasts of the earth; and none shall fray '
  - type: text
    content: them
  - type: text
    content: ' away. '
  '34':
  - type: text
    content: 'Then will I cause to cease from the cities of Judah, and from the streets of Jerusalem, the voice of mirth, and the voice of gladness, the voice of the bridegroom, and the voice of the bride: for the land shall be desolate.'
  '4':
  - type: text
    content: 'Trust ye not in lying words, saying, The temple of the '
  - type: text
    content: LORD
  - type: text
    content: ', The temple of the '
  - type: text
    content: LORD
  - type: text
    content: ', The temple of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: are
  - type: text
    content: ' these. '
  '5':
  - type: text
    content: 'For if ye throughly amend your ways and your doings; if ye throughly execute judgment between a man and his neighbour; '
  '6':
  - type: text
    content: if
  - type: text
    content: ' ye oppress not the stranger, the fatherless, and the widow, and shed not innocent blood in this place, neither walk after other gods to your hurt: '
  '7':
  - type: text
    content: then will I cause you to dwell in this place, in the land that I gave to your fathers, for ever and ever.
  '8':
  - type: text
    content: 'Behold, ye trust in lying words, that cannot profit. '
  '9':
