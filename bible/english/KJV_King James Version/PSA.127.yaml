    content: A Song of degrees for Solomon.
  - type: text
    content: 'Except the '
  - type: text
    content: LORD
  - type: text
    content: ' build the house,'
  - type: text
    content: 'They labour in vain that build it:'
  - type: text
    content: 'Except the '
  - type: text
    content: LORD
  - type: text
    content: ' keep the city,'
  - type: text
    content: 'The watchman waketh '
  - type: text
    content: but
  - type: text
    content: ' in vain.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' vain for you to rise up early, to sit up late, to eat the bread of sorrows:'
  - type: text
    content: For
  - type: text
    content: ' so he giveth his beloved sleep.'
  '3':
  - type: text
    content: 'Lo, children '
  - type: text
    content: are
  - type: text
    content: ' an heritage of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: And
  - type: text
    content: ' the fruit of the womb '
  - type: text
    content: is his
  - type: text
    content: ' reward.'
  '4':
  - type: text
    content: 'As arrows '
  - type: text
    content: are
  - type: text
    content: ' in the hand of a mighty man;'
  - type: text
    content: 'So '
  - type: text
    content: are
  - type: text
    content: ' children of the youth.'
  '5':
  - type: text
    content: 'Happy '
  - type: text
    content: is
  - type: text
    content: ' the man that hath his quiver full of them:'
  - type: text
    content: They shall not be ashamed, but they shall speak with the enemies in the gate.
