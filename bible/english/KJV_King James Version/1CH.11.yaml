document_id: 1CH.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: From Hebron to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then all Israel gathered themselves to David unto Hebron, saying, Behold, we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy bone and thy flesh. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'These also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the chief of the mighty men whom David had, who strengthened themselves with him in his kingdom, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' with all Israel, to make him king, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' concerning Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the number of the mighty men whom David had; Jashobeam, an Hachmonite, the chief of the captains: he lifted up his spear against three hundred slain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by him
    - type: text
      text: ' at one time. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And after him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Eleazar the son of Dodo, the Ahohite, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was one
    - type: text
      text: ' of the three mighties. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He was with David at Pas-dammim, and there the Philistines were gathered together to battle, where was a parcel of ground full of barley; and the people fled from before the Philistines. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And they set themselves in the midst of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' parcel, and delivered it, and slew the Philistines; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' by a great deliverance.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now three of the thirty captains went down to the rock to David, into the cave of Adullam; and the host of the Philistines encamped in the valley of Rephaim. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And David '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' then in the hold, and the Philistines'' garrison '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' then at Beth-lehem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And David longed, and said, Oh that one would give me drink of the water of the well of Beth-lehem, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at the gate! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the three brake through the host of the Philistines, and drew water out of the well of Beth-lehem, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' by the gate, and took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to David: but David would not drink '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' it, but poured it out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and said, My God forbid it me, that I should do this thing: shall I drink the blood of these men that have put their lives in jeopardy? for with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the jeopardy of
    - type: text
      text: ' their lives they brought it. Therefore he would not drink it. These things did these three mightiest.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And moreover in time past, even when Saul was king, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wast
    - type: text
      text: ' he that leddest out and broughtest in Israel: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God said unto thee, Thou shalt feed my people Israel, and thou shalt be ruler over my people Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Abishai the brother of Joab, he was chief of the three: for lifting up his spear against three hundred, he slew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and had a name among the three. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Of the three, he was more honourable than the two; for he was their captain: howbeit he attained not to the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: first
    - type: text
      text: ' three.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Benaiah the son of Jehoiada, the son of a valiant man of Kabzeel, who had done many acts; he slew two lionlike men of Moab: also he went down and slew a lion in a pit in a snowy day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he slew an Egyptian, a man of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: great
    - type: text
      text: ' stature, five cubits high; and in the Egyptian''s hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a spear like a weaver''s beam; and he went down to him with a staff, and plucked the spear out of the Egyptian''s hand, and slew him with his own spear. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' did Benaiah the son of Jehoiada, and had the name among the three mighties. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Behold, he was honourable among the thirty, but attained not to the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: first
    - type: text
      text: ' three: and David set him over his guard.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Also the valiant men of the armies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ', Asahel the brother of Joab, Elhanan the son of Dodo of Beth-lehem, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Shammoth the Harorite, Helez the Pelonite, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ira the son of Ikkesh the Tekoite, Abiezer the Antothite, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Sibbecai the Hushathite, Ilai the Ahohite, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore came all the elders of Israel to the king to Hebron; and David made a covenant with them in Hebron before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and they anointed David king over Israel, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by Samuel.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Maharai the Netophathite, Heled the son of Baanah the Netophathite, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ithai the son of Ribai of Gibeah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that pertained
    - type: text
      text: ' to the children of Benjamin, Benaiah the Pirathonite, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Hurai of the brooks of Gaash, Abiel the Arbathite, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Azmaveth the Baharumite, Eliahba the Shaalbonite, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'the sons of Hashem the Gizonite, Jonathan the son of Shage the Hararite, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ahiam the son of Sacar the Hararite, Eliphal the son of Ur, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hepher the Mecherathite, Ahijah the Pelonite, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Hezro the Carmelite, Naarai the son of Ezbai, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Joel the brother of Nathan, Mibhar the son of Haggeri, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Zelek the Ammonite, Naharai the Berothite, the armourbearer of Joab the son of Zeruiah, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And David and all Israel went to Jerusalem, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Jebus; where the Jebusites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ', the inhabitants of the land. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ira the Ithrite, Gareb the Ithrite, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Uriah the Hittite, Zabad the son of Ahlai, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Adina the son of Shiza the Reubenite, a captain of the Reubenites, and thirty with him, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Hanan the son of Maachah, and Joshaphat the Mithnite, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Uzzia the Ashterathite, Shama and Jehiel the sons of Hothan the Aroerite, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Jediael the son of Shimri, and Joha his brother, the Tizite, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Eliel the Mahavite, and Jeribai, and Joshaviah, the sons of Elnaam, and Ithmah the Moabite, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Eliel, and Obed, and Jasiel the Mesobaite.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the inhabitants of Jebus said to David, Thou shalt not come hither. Nevertheless David took the castle of Zion, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the city of David. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And David said, Whosoever smiteth the Jebusites first shall be chief and captain. So Joab the son of Zeruiah went first up, and was chief. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And David dwelt in the castle; therefore they called it the city of David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he built the city round about, even from Millo round about: and Joab repaired the rest of the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So David waxed greater and greater: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David's Mighty Men
    marker-yv: yv-h
