document_id: JOB.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moreover Job continued his parable, and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' God liveth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' hath taken away my judgment;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the Almighty, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' hath vexed my soul;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the while my breath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the spirit of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in my nostrils;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My lips shall not speak wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor my tongue utter deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'God forbid that I should justify you:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Till I die I will not remove mine integrity from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'My righteousness I hold fast, and will not let it go:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My heart shall not reproach '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' so long as I live.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let mine enemy be as the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he that riseth up against me as the unrighteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the hope of the hypocrite, though he hath gained,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When God taketh away his soul?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Will God hear his cry
- type: usfm
  marker: q2
  children:
  - type: text
    text: When trouble cometh upon him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Will he delight himself in the Almighty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will he always call upon God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will teach you by the hand of God:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with the Almighty will I not conceal.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Behold, all ye yourselves have seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why then are ye thus altogether vain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the portion of a wicked man with God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the heritage of oppressors, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' they shall receive of the Almighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If his children be multiplied, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' for the sword:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his offspring shall not be satisfied with bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Those that remain of him shall be buried in death:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his widows shall not weep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Though he heap up silver as the dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And prepare raiment as the clay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He may prepare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', but the just shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the innocent shall divide the silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He buildeth his house as a moth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And as a booth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the keeper maketh.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The rich man shall lie down, but he shall not be gathered:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He openeth his eyes, and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Terrors take hold on him as waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: A tempest stealeth him away in the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The east wind carrieth him away, and he departeth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And as a storm hurleth him out of his place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' shall cast upon him, and not spare:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He would fain flee out of his hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Men
  - type: text
    text: ' shall clap their hands at him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shall hiss him out of his place.
