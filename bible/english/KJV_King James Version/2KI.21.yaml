document_id: 2KI.21,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh
  - type: text
    content: 'Manasseh '
  - type: text
    content: was
  - type: text
    content: ' twelve years old when he began to reign, and reigned fifty and five years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Hephzi-bah. '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake by his servants the prophets, saying, '
  '11':
  - type: text
    content: 'Because Manasseh king of Judah hath done these abominations, '
  - type: text
    content: and
  - type: text
    content: ' hath done wickedly above all that the Amorites did, which '
  - type: text
    content: were
  - type: text
    content: ' before him, and hath made Judah also to sin with his idols: '
  '12':
  - type: text
    content: 'therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, Behold, I '
  - type: text
    content: am
  - type: text
    content: ' bringing '
  - type: text
    content: such
  - type: text
    content: ' evil upon Jerusalem and Judah, that whosoever heareth of it, both his ears shall tingle. '
  '13':
  - type: text
    content: 'And I will stretch over Jerusalem the line of Samaria, and the plummet of the house of Ahab: and I will wipe Jerusalem as '
  - type: text
    content: a man
  - type: text
    content: ' wipeth a dish, wiping '
  - type: text
    content: it
  - type: text
    content: ', and turning '
  - type: text
    content: it
  - type: text
    content: ' upside down. '
  '14':
  - type: text
    content: 'And I will forsake the remnant of mine inheritance, and deliver them into the hand of their enemies; and they shall become a prey and a spoil to all their enemies; '
  '15':
  - type: text
    content: 'because they have done '
  - type: text
    content: that which was
  - type: text
    content: ' evil in my sight, and have provoked me to anger, since the day their fathers came forth out of Egypt, even unto this day.'
  '16':
  - type: text
    content: 'Moreover Manasseh shed innocent blood very much, till he had filled Jerusalem from one end to another; beside his sin wherewith he made Judah to sin, in doing '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Now the rest of the acts of Manasseh, and all that he did, and his sin that he sinned, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '18':
  - type: text
    content: 'And Manasseh slept with his fathers, and was buried in the garden of his own house, in the garden of Uzza: and Amon his son reigned in his stead.'
  - type: heading
    content: Amon
  '19':
  - type: text
    content: 'Amon '
  - type: text
    content: was
  - type: text
    content: ' twenty and two years old when he began to reign, and he reigned two years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Meshullemeth, the daughter of Haruz of Jotbah. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', after the abominations of the heathen, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' cast out before the children of Israel. '
  '20':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', as his father Manasseh did. '
  '21':
  - type: text
    content: 'And he walked in all the way that his father walked in, and served the idols that his father served, and worshipped them: '
  '22':
  - type: text
    content: 'and he forsook the '
  - type: text
    content: LORD
  - type: text
    content: ' God of his fathers, and walked not in the way of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'And the servants of Amon conspired against him, and slew the king in his own house. '
  '24':
  - type: text
    content: 'And the people of the land slew all them that had conspired against king Amon; and the people of the land made Josiah his son king in his stead. '
  '25':
  - type: text
    content: 'Now the rest of the acts of Amon which he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '26':
  - type: text
    content: 'And he was buried in his sepulchre in the garden of Uzza: and Josiah his son reigned in his stead.'
  '3':
  - type: text
    content: 'For he built up again the high places which Hezekiah his father had destroyed; and he reared up altars for Baal, and made a grove, as did Ahab king of Israel; and worshipped all the host of heaven, and served them. '
  '4':
  - type: text
    content: 'And he built altars in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', of which the '
  - type: text
    content: LORD
  - type: text
    content: ' said, In Jerusalem will I put my name. '
  '5':
  - type: text
    content: 'And he built altars for all the host of heaven in the two courts of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And he made his son pass through the fire, and observed times, and used enchantments, and dealt with familiar spirits and wizards: he wrought much wickedness in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', to provoke '
  - type: text
    content: him
  - type: text
    content: ' to anger. '
  '7':
  - type: text
    content: 'And he set a graven image of the grove that he had made in the house, of which the '
  - type: text
    content: LORD
  - type: text
    content: ' said to David, and to Solomon his son, In this house, and in Jerusalem, which I have chosen out of all tribes of Israel, will I put my name for ever: '
  '8':
  - type: text
    content: 'neither will I make the feet of Israel move any more out of the land which I gave their fathers; only if they will observe to do according to all that I have commanded them, and according to all the law that my servant Moses commanded them. '
  '9':
  - type: text
    content: 'But they hearkened not: and Manasseh seduced them to do more evil than did the nations whom the '
  - type: text
    content: LORD
  - type: text
    content: ' destroyed before the children of Israel.'
