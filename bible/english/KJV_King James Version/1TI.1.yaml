document_id: 1TI.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, an apostle of Jesus Christ by the commandment of God our Saviour, and Lord Jesus Christ, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' our hope; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'unto Timothy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' own son in the faith: Grace, mercy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' peace, from God our Father and Jesus Christ our Lord.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Christian Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As I besought thee to abide still at Ephesus, when I went into Macedonia, that thou mightest charge some that they teach no other doctrine, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'neither give heed to fables and endless genealogies, which minister questions, rather than godly edifying which is in faith: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so do
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the end of the commandment is charity out of a pure heart, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' a good conscience, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' faith unfeigned: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'from which some having swerved have turned aside unto vain jangling; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: desiring to be teachers of the law; understanding neither what they say, nor whereof they affirm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But we know that the law '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good, if a man use it lawfully; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'knowing this, that the law is not made for a righteous man, but for the lawless and disobedient, for the ungodly and for sinners, for unholy and profane, for murderers of fathers and murderers of mothers, for manslayers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'for whoremongers, for them that defile themselves with mankind, for menstealers, for liars, for perjured persons, and if there be any other thing that is contrary to sound doctrine; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: according to the glorious gospel of the blessed God, which was committed to my trust.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I thank Christ Jesus our Lord, who hath enabled me, for that he counted me faithful, putting me into the ministry; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'who was before a blasphemer, and a persecutor, and injurious: but I obtained mercy, because I did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' ignorantly in unbelief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the grace of our Lord was exceeding abundant with faith and love which is in Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a faithful saying, and worthy of all acceptation, that Christ Jesus came into the world to save sinners; of whom I am chief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Howbeit for this cause I obtained mercy, that in me first Jesus Christ might shew forth all longsuffering, for a pattern to them which should hereafter believe on him to life everlasting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now unto the King eternal, immortal, invisible, the only wise God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' honour and glory for ever and ever. Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This charge I commit unto thee, son Timothy, according to the prophecies which went before on thee, that thou by them mightest war a good warfare; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'holding faith, and a good conscience; which some having put away concerning faith have made shipwreck: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: of whom is Hymenæus and Alexander; whom I have delivered unto Satan, that they may learn not to blaspheme.
