  '20':
  - type: text
    content: of whom is Hymenæus and Alexander; whom I have delivered unto Satan, that they may learn not to blaspheme.
  '3':
  - type: text
    content: 'As I besought thee to abide still at Ephesus, when I went into Macedonia, that thou mightest charge some that they teach no other doctrine, '
  '4':
  - type: text
