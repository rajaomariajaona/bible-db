  - type: text
    content: 'This charge I commit unto thee, son Timothy, according to the prophecies which went before on thee, that thou by them mightest war a good warfare; '
  '19':
  - type: text
    content: 'holding faith, and a good conscience; which some having put away concerning faith have made shipwreck: '
