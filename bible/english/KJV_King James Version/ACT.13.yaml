document_id: ACT.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now there were in the church that was at Antioch certain prophets and teachers; as Barnabas, and Simeon that was called Niger, and Lucius of Cyrene, and Manaen, which had been brought up with Herod the tetrarch, and Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As they ministered to the Lord, and fasted, the Holy Ghost said, Separate me Barnabas and Saul for the work whereunto I have called them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when they had fasted and prayed, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands on them, they sent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' away.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: First Missionary Journey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they, being sent forth by the Holy Ghost, departed unto Seleucia; and from thence they sailed to Cyprus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when they were at Salamis, they preached the word of God in the synagogues of the Jews: and they had also John to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' minister.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when they had gone through the isle unto Paphos, they found a certain sorcerer, a false prophet, a Jew, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Bar-jesus: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'which was with the deputy of the country, Sergius Paulus, a prudent man; who called for Barnabas and Saul, and desired to hear the word of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But Elymas the sorcerer (for so is his name by interpretation) withstood them, seeking to turn away the deputy from the faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Saul, (who also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is called
  - type: text
    text: ' Paul,) filled with the Holy Ghost, set his eyes on him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and said, O full of all subtilty and all mischief, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' child of the devil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' enemy of all righteousness, wilt thou not cease to pervert the right ways of the Lord? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And now, behold, the hand of the Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon thee, and thou shalt be blind, not seeing the sun for a season. And immediately there fell on him a mist and a darkness; and he went about seeking some to lead him by the hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the deputy, when he saw what was done, believed, being astonished at the doctrine of the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now when Paul and his company loosed from Paphos, they came to Perga in Pamphylia: and John departing from them returned to Jerusalem.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Antioch in Pisidia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But when they departed from Perga, they came to Antioch in Pisidia, and went into the synagogue on the sabbath day, and sat down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And after the reading of the law and the prophets the rulers of the synagogue sent unto them, saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Ye
  - type: text
    text: ' men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, if ye have any word of exhortation for the people, say on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Paul stood up, and beckoning with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand said, Men of Israel, and ye that fear God, give audience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The God of this people of Israel chose our fathers, and exalted the people when they dwelt as strangers in the land of Egypt, and with an high arm brought he them out of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And about the time of forty years suffered he their manners in the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when he had destroyed seven nations in the land of Chanaan, he divided their land to them by lot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And after that he gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto them
  - type: text
    text: ' judges about the space of four hundred and fifty years, until Samuel the prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And afterward they desired a king: and God gave unto them Saul the son of Cis, a man of the tribe of Benjamin, by the space of forty years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when he had removed him, he raised up unto them David to be their king; to whom also he gave testimony, and said, I have found David the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' of Jesse, a man after mine own heart, which shall fulfil all my will.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Of this man''s seed hath God according to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' promise raised unto Israel a Saviour, Jesus: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'when John had first preached before his coming the baptism of repentance to all the people of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And as John fulfilled his course, he said, Whom think ye that I am? I am not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he
  - type: text
    text: '. But, behold, there cometh one after me, whose shoes of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' feet I am not worthy to loose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, children of the stock of Abraham, and whosoever among you feareth God, to you is the word of this salvation sent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For they that dwell at Jerusalem, and their rulers, because they knew him not, nor yet the voices of the prophets which are read every sabbath day, they have fulfilled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in condemning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And though they found no cause of death '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in him
  - type: text
    text: ', yet desired they Pilate that he should be slain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And when they had fulfilled all that was written of him, they took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' down from the tree, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' in a sepulchre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But God raised him from the dead: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: and he was seen many days of them which came up with him from Galilee to Jerusalem, who are his witnesses unto the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And we declare unto you glad tidings, how that the promise which was made unto the fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'God hath fulfilled the same unto us their children, in that he hath raised up Jesus again; as it is also written in the second psalm, Thou art my Son, this day have I begotten thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And as concerning that he raised him up from the dead, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: now
  - type: text
    text: ' no more to return to corruption, he said on this wise, I will give you the sure mercies of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Wherefore he saith also in another '
  - type: usfm
    marker: add
    children:
    - type: text
      text: psalm
  - type: text
    text: ', Thou shalt not suffer thine Holy One to see corruption. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For David, after he had served his own generation by the will of God, fell on sleep, and was laid unto his fathers, and saw corruption: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: but he, whom God raised again, saw no corruption.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Be it known unto you therefore, men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, that through this man is preached unto you the forgiveness of sins: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'and by him all that believe are justified from all things, from which ye could not be justified by the law of Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Beware therefore, lest that come upon you, which is spoken of in the prophets;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Behold, ye despisers, and wonder, and perish:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I work a work in your days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A work which ye shall in no wise believe, though a man declare it unto you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And when the Jews were gone out of the synagogue, the Gentiles besought that these words might be preached to them the next sabbath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Now when the congregation was broken up, many of the Jews and religious proselytes followed Paul and Barnabas: who, speaking to them, persuaded them to continue in the grace of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And the next sabbath day came almost the whole city together to hear the word of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: But when the Jews saw the multitudes, they were filled with envy, and spake against those things which were spoken by Paul, contradicting and blaspheming.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then Paul and Barnabas waxed bold, and said, It was necessary that the word of God should first have been spoken to you: but seeing ye put it from you, and judge yourselves unworthy of everlasting life, lo, we turn to the Gentiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'For so hath the Lord commanded us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have set thee to be a light of the Gentiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That thou shouldest be for salvation unto the ends of the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And when the Gentiles heard this, they were glad, and glorified the word of the Lord: and as many as were ordained to eternal life believed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And the word of the Lord was published throughout all the region. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'But the Jews stirred up the devout and honourable women, and the chief men of the city, and raised persecution against Paul and Barnabas, and expelled them out of their coasts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'But they shook off the dust of their feet against them, and came unto Iconium. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: And the disciples were filled with joy, and with the Holy Ghost.
