document_id: ACT.13,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now there were in the church that was at Antioch certain prophets and teachers; as Barnabas, and Simeon that was called Niger, and Lucius of Cyrene, and Manaen, which had been brought up with Herod the tetrarch, and Saul. '
  '10':
  - type: text
    content: 'and said, O full of all subtilty and all mischief, '
  - type: text
    content: thou
  - type: text
    content: ' child of the devil, '
  - type: text
    content: thou
  - type: text
    content: ' enemy of all righteousness, wilt thou not cease to pervert the right ways of the Lord? '
  '11':
  - type: text
    content: 'And now, behold, the hand of the Lord '
  - type: text
    content: is
  - type: text
    content: ' upon thee, and thou shalt be blind, not seeing the sun for a season. And immediately there fell on him a mist and a darkness; and he went about seeking some to lead him by the hand. '
  '12':
  - type: text
    content: Then the deputy, when he saw what was done, believed, being astonished at the doctrine of the Lord.
  '13':
  - type: text
    content: 'Now when Paul and his company loosed from Paphos, they came to Perga in Pamphylia: and John departing from them returned to Jerusalem.'
  - type: heading
    content: Antioch in Pisidia
  '14':
  - type: text
    content: 'But when they departed from Perga, they came to Antioch in Pisidia, and went into the synagogue on the sabbath day, and sat down. '
  '15':
  - type: text
    content: 'And after the reading of the law and the prophets the rulers of the synagogue sent unto them, saying, '
  - type: text
    content: Ye
  - type: text
    content: ' men '
  - type: text
    content: and
  - type: text
    content: ' brethren, if ye have any word of exhortation for the people, say on.'
  '16':
  - type: text
    content: 'Then Paul stood up, and beckoning with '
  - type: text
    content: his
  - type: text
    content: ' hand said, Men of Israel, and ye that fear God, give audience. '
  '17':
  - type: text
    content: 'The God of this people of Israel chose our fathers, and exalted the people when they dwelt as strangers in the land of Egypt, and with an high arm brought he them out of it. '
  '18':
  - type: text
    content: 'And about the time of forty years suffered he their manners in the wilderness. '
  '19':
  - type: text
    content: 'And when he had destroyed seven nations in the land of Chanaan, he divided their land to them by lot. '
  '2':
  - type: text
    content: 'As they ministered to the Lord, and fasted, the Holy Ghost said, Separate me Barnabas and Saul for the work whereunto I have called them. '
  '20':
  - type: text
    content: 'And after that he gave '
  - type: text
    content: unto them
  - type: text
    content: ' judges about the space of four hundred and fifty years, until Samuel the prophet. '
  '21':
  - type: text
    content: 'And afterward they desired a king: and God gave unto them Saul the son of Cis, a man of the tribe of Benjamin, by the space of forty years. '
  '22':
  - type: text
    content: 'And when he had removed him, he raised up unto them David to be their king; to whom also he gave testimony, and said, I have found David the '
  - type: text
    content: son
  - type: text
    content: ' of Jesse, a man after mine own heart, which shall fulfil all my will.'
  '23':
  - type: text
    content: 'Of this man''s seed hath God according to '
  - type: text
    content: his
  - type: text
    content: ' promise raised unto Israel a Saviour, Jesus: '
  '24':
  - type: text
    content: 'when John had first preached before his coming the baptism of repentance to all the people of Israel. '
  '25':
  - type: text
    content: 'And as John fulfilled his course, he said, Whom think ye that I am? I am not '
  - type: text
    content: he
  - type: text
    content: '. But, behold, there cometh one after me, whose shoes of '
  - type: text
    content: his
  - type: text
    content: ' feet I am not worthy to loose. '
  '26':
  - type: text
    content: 'Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, children of the stock of Abraham, and whosoever among you feareth God, to you is the word of this salvation sent. '
  '27':
  - type: text
    content: 'For they that dwell at Jerusalem, and their rulers, because they knew him not, nor yet the voices of the prophets which are read every sabbath day, they have fulfilled '
  - type: text
    content: them
  - type: text
    content: ' in condemning '
  - type: text
    content: him
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And though they found no cause of death '
  - type: text
    content: in him
  - type: text
    content: ', yet desired they Pilate that he should be slain. '
  '29':
  - type: text
    content: 'And when they had fulfilled all that was written of him, they took '
  - type: text
    content: him
  - type: text
    content: ' down from the tree, and laid '
  - type: text
    content: him
  - type: text
    content: ' in a sepulchre. '
  '3':
  - type: text
    content: 'And when they had fasted and prayed, and laid '
  - type: text
    content: their
  - type: text
    content: ' hands on them, they sent '
  - type: text
    content: them
  - type: text
    content: ' away.'
  - type: heading
    content: First Missionary Journey
  '30':
  - type: text
    content: 'But God raised him from the dead: '
  '31':
  - type: text
    content: and he was seen many days of them which came up with him from Galilee to Jerusalem, who are his witnesses unto the people.
  '32':
  - type: text
    content: 'And we declare unto you glad tidings, how that the promise which was made unto the fathers, '
  '33':
  - type: text
    content: 'God hath fulfilled the same unto us their children, in that he hath raised up Jesus again; as it is also written in the second psalm, Thou art my Son, this day have I begotten thee. '
  '34':
  - type: text
    content: 'And as concerning that he raised him up from the dead, '
  - type: text
    content: now
  - type: text
    content: ' no more to return to corruption, he said on this wise, I will give you the sure mercies of David. '
  '35':
  - type: text
    content: 'Wherefore he saith also in another '
  - type: text
    content: psalm
  - type: text
    content: ', Thou shalt not suffer thine Holy One to see corruption. '
  '36':
  - type: text
    content: 'For David, after he had served his own generation by the will of God, fell on sleep, and was laid unto his fathers, and saw corruption: '
  '37':
  - type: text
    content: but he, whom God raised again, saw no corruption.
  '38':
  - type: text
    content: 'Be it known unto you therefore, men '
  - type: text
    content: and
  - type: text
    content: ' brethren, that through this man is preached unto you the forgiveness of sins: '
  '39':
  - type: text
    content: 'and by him all that believe are justified from all things, from which ye could not be justified by the law of Moses. '
  '4':
  - type: text
    content: 'So they, being sent forth by the Holy Ghost, departed unto Seleucia; and from thence they sailed to Cyprus. '
  '40':
  - type: text
    content: Beware therefore, lest that come upon you, which is spoken of in the prophets;
  '41':
  - type: text
    content: 'Behold, ye despisers, and wonder, and perish:'
  - type: text
    content: For I work a work in your days,
  - type: text
    content: A work which ye shall in no wise believe, though a man declare it unto you.
  '42':
  - type: text
    content: 'And when the Jews were gone out of the synagogue, the Gentiles besought that these words might be preached to them the next sabbath. '
  '43':
  - type: text
    content: 'Now when the congregation was broken up, many of the Jews and religious proselytes followed Paul and Barnabas: who, speaking to them, persuaded them to continue in the grace of God.'
  '44':
  - type: text
    content: 'And the next sabbath day came almost the whole city together to hear the word of God. '
  '45':
  - type: text
    content: But when the Jews saw the multitudes, they were filled with envy, and spake against those things which were spoken by Paul, contradicting and blaspheming.
  '46':
  - type: text
    content: 'Then Paul and Barnabas waxed bold, and said, It was necessary that the word of God should first have been spoken to you: but seeing ye put it from you, and judge yourselves unworthy of everlasting life, lo, we turn to the Gentiles. '
  '47':
  - type: text
    content: 'For so hath the Lord commanded us, '
  - type: text
    content: saying
  - type: text
    content: ','
  - type: text
    content: I have set thee to be a light of the Gentiles,
  - type: text
    content: That thou shouldest be for salvation unto the ends of the earth.
  '48':
  - type: text
    content: 'And when the Gentiles heard this, they were glad, and glorified the word of the Lord: and as many as were ordained to eternal life believed. '
  '49':
  - type: text
    content: 'And the word of the Lord was published throughout all the region. '
  '5':
  - type: text
    content: 'And when they were at Salamis, they preached the word of God in the synagogues of the Jews: and they had also John to '
  - type: text
    content: their
  - type: text
    content: ' minister.'
  '50':
  - type: text
    content: 'But the Jews stirred up the devout and honourable women, and the chief men of the city, and raised persecution against Paul and Barnabas, and expelled them out of their coasts. '
  '51':
  - type: text
    content: 'But they shook off the dust of their feet against them, and came unto Iconium. '
  '52':
  - type: text
    content: And the disciples were filled with joy, and with the Holy Ghost.
  '6':
  - type: text
    content: 'And when they had gone through the isle unto Paphos, they found a certain sorcerer, a false prophet, a Jew, whose name '
  - type: text
    content: was
  - type: text
    content: ' Bar-jesus: '
  '7':
  - type: text
    content: 'which was with the deputy of the country, Sergius Paulus, a prudent man; who called for Barnabas and Saul, and desired to hear the word of God. '
  '8':
  - type: text
    content: But Elymas the sorcerer (for so is his name by interpretation) withstood them, seeking to turn away the deputy from the faith.
  '9':
  - type: text
    content: 'Then Saul, (who also '
  - type: text
    content: is called
  - type: text
    content: ' Paul,) filled with the Holy Ghost, set his eyes on him, '
