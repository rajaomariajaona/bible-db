document_id: JOB.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My soul is weary of my life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will leave my complaint upon myself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will speak in the bitterness of my soul.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hast thou not poured me out as milk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And curdled me like cheese?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Thou hast clothed me with skin and flesh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hast fenced me with bones and sinews.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Thou hast granted me life and favour,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy visitation hath preserved my spirit.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' hast thou hid in thine heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I know that this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thee.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: If I sin, then thou markest me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou wilt not acquit me from mine iniquity.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: If I be wicked, woe unto me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' I be righteous, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' will I not lift up my head.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: I am
    - type: text
      text: ' full of confusion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore see thou mine affliction;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For it increaseth. Thou huntest me as a fierce lion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And again thou shewest thyself marvellous upon me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Thou renewest thy witnesses against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And increasest thine indignation upon me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Changes and war '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' against me.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Wherefore then hast thou brought me forth out of the womb?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh that I had given up the ghost, and no eye had seen me!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I should have been as though I had not been;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I should have been carried from the womb to the grave.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will say unto God, Do not condemn me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shew me wherefore thou contendest with me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' not my days few? Cease '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' let me alone, that I may take comfort a little,'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Before I go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whence
    - type: text
      text: ' I shall not return,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' to the land of darkness and the shadow of death;'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'A land of darkness, as darkness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: itself
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' of the shadow of death, without any order,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where
    - type: text
      text: ' the light '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as darkness.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' good unto thee that thou shouldest oppress,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That thou shouldest despise the work of thine hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shine upon the counsel of the wicked?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hast thou eyes of flesh?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or seest thou as man seeth?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' thy days as the days of man?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' thy years as man''s days,'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: That thou enquirest after mine iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And searchest after my sin?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Thou knowest that I am not wicked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that can deliver out of thine hand.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Thine hands have made me and fashioned me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Together round about; yet thou dost destroy me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Remember, I beseech thee, that thou hast made me as the clay;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wilt thou bring me into dust again?
