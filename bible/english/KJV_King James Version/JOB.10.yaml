  - type: text
    content: I am
  - type: text
    content: ' full of confusion;'
  - type: text
    content: Therefore see thou mine affliction;
  '16':
  - type: text
    content: 'For it increaseth. Thou huntest me as a fierce lion:'
  - type: text
    content: And again thou shewest thyself marvellous upon me.
  '17':
  - type: text
    content: Thou renewest thy witnesses against me,
  - type: text
    content: And increasest thine indignation upon me;
  - type: text
    content: 'Changes and war '
  - type: text
    content: are
  - type: text
    content: ' against me.'
  '18':
  - type: text
    content: Wherefore then hast thou brought me forth out of the womb?
  - type: text
    content: Oh that I had given up the ghost, and no eye had seen me!
  '19':
  - type: text
    content: I should have been as though I had not been;
  - type: text
    content: I should have been carried from the womb to the grave.
  '2':
  - type: text
    content: I will say unto God, Do not condemn me;
  - type: text
    content: Shew me wherefore thou contendest with me.
  '20':
  - type: text
    content: ' '
  - type: text
