verses:
  '1':
  - type: text
    content: My soul is weary of my life;
  - type: text
    content: I will leave my complaint upon myself;
  - type: text
    content: I will speak in the bitterness of my soul.
  '10':
  - type: text
    content: Hast thou not poured me out as milk,
  - type: text
    content: And curdled me like cheese?
  '11':
  - type: text
    content: Thou hast clothed me with skin and flesh,
  - type: text
    content: And hast fenced me with bones and sinews.
  '12':
  - type: text
    content: Thou hast granted me life and favour,
  - type: text
    content: And thy visitation hath preserved my spirit.
  '13':
  - type: text
    content: 'And these '
  - type: text
    content: things
  - type: text
    content: ' hast thou hid in thine heart:'
  - type: text
    content: 'I know that this '
  - type: text
    content: is
  - type: text
    content: ' with thee.'
  '14':
  - type: text
    content: If I sin, then thou markest me,
  - type: text
    content: And thou wilt not acquit me from mine iniquity.
  '15':
  - type: text
    content: If I be wicked, woe unto me;
  - type: text
    content: 'And '
  - type: text
    content: if
  - type: text
    content: ' I be righteous, '
  - type: text
    content: yet
  - type: text
