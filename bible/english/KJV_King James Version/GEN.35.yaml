document_id: GEN.35
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Altar to God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And God said unto Jacob, Arise, go up to Beth-el, and dwell there: and make there an altar unto God, that appeared unto thee when thou fleddest from the face of Esau thy brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Jacob said unto his household, and to all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, Put away the strange gods that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' among you, and be clean, and change your garments: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and let us arise, and go up to Beth-el; and I will make there an altar unto God, who answered me in the day of my distress, and was with me in the way which I went. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they gave unto Jacob all the strange gods which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in their hand, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all their
  - type: text
    text: ' earrings which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in their ears; and Jacob hid them under the oak which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by Shechem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they journeyed: and the terror of God was upon the cities that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' round about them, and they did not pursue after the sons of Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Jacob came to Luz, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the land of Canaan, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', Beth-el, he and all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he built there an altar, and called the place El-beth-el: because there God appeared unto him, when he fled from the face of his brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Deborah Rebekah''s nurse died, and she was buried beneath Beth-el under an oak: and the name of it was called Allon-bachuth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And God appeared unto Jacob again, when he came out of Padan-aram, and blessed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And God said unto him, Thy name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Jacob: thy name shall not be called any more Jacob, but Israel shall be thy name: and he called his name Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And God said unto him, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' God Almighty: be fruitful and multiply; a nation and a company of nations shall be of thee, and kings shall come out of thy loins; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and the land which I gave Abraham and Isaac, to thee I will give it, and to thy seed after thee will I give the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And God went up from him in the place where he talked with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Jacob set up a pillar in the place where he talked with him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a pillar of stone: and he poured a drink offering thereon, and he poured oil thereon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And Jacob called the name of the place where God spake with him, Beth-el.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they journeyed from Beth-el; and there was but a little way to come to Ephrath: and Rachel travailed, and she had hard labour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass, when she was in hard labour, that the midwife said unto her, Fear not; thou shalt have this son also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And it came to pass, as her soul was in departing, (for she died) that she called his name Ben-oni: but his father called him Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Rachel died, and was buried in the way to Ephrath, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Beth-lehem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Jacob set a pillar upon her grave: that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the pillar of Rachel''s grave unto this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Israel journeyed, and spread his tent beyond the tower of Edar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And it came to pass, when Israel dwelt in that land, that Reuben went and lay with Bilhah his father''s concubine: and Israel heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. Now the sons of Jacob were twelve: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the sons of Leah; Reuben, Jacob''s firstborn, and Simeon, and Levi, and Judah, and Issachar, and Zebulun: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'the sons of Rachel; Joseph, and Benjamin: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and the sons of Bilhah, Rachel''s handmaid; Dan, and Naphtali: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and the sons of Zilpah, Leah''s handmaid; Gad, and Asher: these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Jacob, which were born to him in Padan-aram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Jacob came unto Isaac his father unto Mamre, unto the city of Arbah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Hebron, where Abraham and Isaac sojourned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the days of Isaac were an hundred and fourscore years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Isaac gave up the ghost, and died, and was gathered unto his people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' old and full of days: and his sons Esau and Jacob buried him.'
