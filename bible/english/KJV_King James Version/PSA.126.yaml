type_code: eng
verses:
  '1':
  - type: text
    content: A Song of degrees.
  - type: text
    content: 'When the '
  - type: text
    content: LORD
  - type: text
    content: ' turned again the captivity of Zion,'
  - type: text
    content: We were like them that dream.
  '2':
  - type: text
    content: Then was our mouth filled with laughter,
  - type: text
    content: 'And our tongue with singing:'
  - type: text
    content: Then said they among the heathen,
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath done great things for them.'
  '3':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath done great things for us;'
  - type: text
    content: Whereof
  - type: text
    content: ' we are glad.'
  '4':
  - type: text
    content: 'Turn again our captivity, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: As the streams in the south.
  '5':
  - type: text
    content: They that sow in tears
  - type: text
    content: Shall reap in joy.
  '6':
  - type: text
    content: He that goeth forth and weepeth, bearing precious seed,
  - type: text
    content: 'Shall doubtless come again with rejoicing, bringing his sheaves '
  - type: text
    content: with him
  - type: text
    content: .
