    - type: text
      text: '1'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' turned again the captivity of Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We were like them that dream.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then was our mouth filled with laughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And our tongue with singing:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then said they among the heathen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath done great things for them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath done great things for us;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Whereof
  - type: text
    text: ' we are glad.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Turn again our captivity, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: As the streams in the south.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They that sow in tears
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall reap in joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He that goeth forth and weepeth, bearing precious seed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Shall doubtless come again with rejoicing, bringing his sheaves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with him
  - type: text
    text: .
