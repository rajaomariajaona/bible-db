verses:
  '1':
  - type: heading
    content: Nazarites
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And on the eighth day he shall bring two turtles, or two young pigeons, to the priest, to the door of the tabernacle of the congregation: '
  '11':
  - type: text
    content: 'and the priest shall offer the one for a sin offering, and the other for a burnt offering, and make an atonement for him, for that he sinned by the dead, and shall hallow his head that same day. '
  '12':
  - type: text
    content: 'And he shall consecrate unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the days of his separation, and shall bring a lamb of the first year for a trespass offering: but the days that were before shall be lost, because his separation was defiled.'
  '13':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the law of the Nazarite, when the days of his separation are fulfilled: he shall be brought unto the door of the tabernacle of the congregation: '
  '14':
  - type: text
    content: 'and he shall offer his offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ', one he lamb of the first year without blemish for a burnt offering, and one ewe lamb of the first year without blemish for a sin offering, and one ram without blemish for peace offerings, '
  '15':
  - type: text
    content: 'and a basket of unleavened bread, cakes of fine flour mingled with oil, and wafers of unleavened bread anointed with oil, and their meat offering, and their drink offerings. '
  '16':
  - type: text
    content: 'And the priest shall bring '
  - type: text
    content: them
  - type: text
    content: ' before the '
  - type: text
    content: LORD
  - type: text
    content: ', and shall offer his sin offering, and his burnt offering: '
  '17':
  - type: text
    content: 'and he shall offer the ram '
  - type: text
    content: for
  - type: text
    content: ' a sacrifice of peace offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: ', with the basket of unleavened bread: the priest shall offer also his meat offering, and his drink offering. '
  '18':
  - type: text
    content: 'And the Nazarite shall shave the head of his separation '
  - type: text
    content: at
  - type: text
    content: ' the door of the tabernacle of the congregation, and shall take the hair of the head of his separation, and put '
  - type: text
    content: it
  - type: text
    content: ' in the fire which '
  - type: text
    content: is
  - type: text
    content: ' under the sacrifice of the peace offerings. '
  '19':
  - type: text
    content: 'And the priest shall take the sodden shoulder of the ram, and one unleavened cake out of the basket, and one unleavened wafer, and shall put '
  - type: text
    content: them
  - type: text
    content: ' upon the hands of the Nazarite, after '
  - type: text
    content: the hair of
  - type: text
    content: ' his separation is shaven: '
  '2':
  - type: text
    content: 'Speak unto the children of Israel, and say unto them, When either man or woman shall separate '
  - type: text
    content: themselves
  - type: text
    content: ' to vow a vow of a Nazarite, to separate '
  - type: text
    content: themselves
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '20':
  - type: text
    content: 'and the priest shall wave them '
  - type: text
    content: for
  - type: text
    content: ' a wave offering before the '
  - type: text
    content: LORD
  - type: text
    content: ': this '
  - type: text
    content: is
  - type: text
    content: ' holy for the priest, with the wave breast and heave shoulder: and after that the Nazarite may drink wine. '
  '21':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the law of the Nazarite who hath vowed, '
  - type: text
    content: and of
  - type: text
    content: ' his offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' for his separation, beside '
  - type: text
    content: that
  - type: text
    content: ' his hand shall get: according to the vow which he vowed, so he must do after the law of his separation.'
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '23':
  - type: text
    content: Speak unto Aaron and unto his sons, saying, On this wise ye shall bless the children of Israel, saying unto them,
  '24':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' bless thee, and keep thee:'
  '25':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' make his face shine upon thee, and be gracious unto thee:'
  '26':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' lift up his countenance upon thee, and give thee peace.'
  '27':
  - type: text
    content: And they shall put my name upon the children of Israel; and I will bless them.
  '3':
  - type: text
    content: 'he shall separate '
  - type: text
    content: himself
  - type: text
    content: ' from wine and strong drink, and shall drink no vinegar of wine, or vinegar of strong drink, neither shall he drink any liquor of grapes, nor eat moist grapes, or dried. '
  '4':
  - type: text
    content: All the days of his separation shall he eat nothing that is made of the vine tree, from the kernels even to the husk.
  '5':
  - type: text
    content: 'All the days of the vow of his separation there shall no razor come upon his head: until the days be fulfilled, in the which he separateth '
  - type: text
    content: himself
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ', he shall be holy, '
  - type: text
    content: and
  - type: text
    content: ' shall let the locks of the hair of his head grow.'
  '6':
  - type: text
    content: 'All the days that he separateth '
  - type: text
    content: himself
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ' he shall come at no dead body. '
  '7':
  - type: text
    content: 'He shall not make himself unclean for his father, or for his mother, for his brother, or for his sister, when they die: because the consecration of his God '
  - type: text
    content: is
  - type: text
    content: ' upon his head. '
  '8':
  - type: text
    content: 'All the days of his separation he '
  - type: text
    content: is
  - type: text
    content: ' holy unto the '
  - type: text
    content: LORD
  - type: text
    content: .
  '9':
  - type: text
    content: 'And if any man die very suddenly by him, and he hath defiled the head of his consecration; then he shall shave his head in the day of his cleansing, on the seventh day shall he shave it. '
