document_id: NUM.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Nazarites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak unto the children of Israel, and say unto them, When either man or woman shall separate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' to vow a vow of a Nazarite, to separate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'he shall separate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' from wine and strong drink, and shall drink no vinegar of wine, or vinegar of strong drink, neither shall he drink any liquor of grapes, nor eat moist grapes, or dried. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All the days of his separation shall he eat nothing that is made of the vine tree, from the kernels even to the husk.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All the days of the vow of his separation there shall no razor come upon his head: until the days be fulfilled, in the which he separateth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', he shall be holy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' shall let the locks of the hair of his head grow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All the days that he separateth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' he shall come at no dead body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He shall not make himself unclean for his father, or for his mother, for his brother, or for his sister, when they die: because the consecration of his God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon his head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All the days of his separation he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And if any man die very suddenly by him, and he hath defiled the head of his consecration; then he shall shave his head in the day of his cleansing, on the seventh day shall he shave it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And on the eighth day he shall bring two turtles, or two young pigeons, to the priest, to the door of the tabernacle of the congregation: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the priest shall offer the one for a sin offering, and the other for a burnt offering, and make an atonement for him, for that he sinned by the dead, and shall hallow his head that same day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he shall consecrate unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the days of his separation, and shall bring a lamb of the first year for a trespass offering: but the days that were before shall be lost, because his separation was defiled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the Nazarite, when the days of his separation are fulfilled: he shall be brought unto the door of the tabernacle of the congregation: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and he shall offer his offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', one he lamb of the first year without blemish for a burnt offering, and one ewe lamb of the first year without blemish for a sin offering, and one ram without blemish for peace offerings, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and a basket of unleavened bread, cakes of fine flour mingled with oil, and wafers of unleavened bread anointed with oil, and their meat offering, and their drink offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the priest shall bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and shall offer his sin offering, and his burnt offering: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and he shall offer the ram '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sacrifice of peace offerings unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', with the basket of unleavened bread: the priest shall offer also his meat offering, and his drink offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the Nazarite shall shave the head of his separation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle of the congregation, and shall take the hair of the head of his separation, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the fire which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' under the sacrifice of the peace offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the priest shall take the sodden shoulder of the ram, and one unleavened cake out of the basket, and one unleavened wafer, and shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon the hands of the Nazarite, after '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the hair of
  - type: text
    text: ' his separation is shaven: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and the priest shall wave them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a wave offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy for the priest, with the wave breast and heave shoulder: and after that the Nazarite may drink wine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the Nazarite who hath vowed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and of
  - type: text
    text: ' his offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for his separation, beside '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' his hand shall get: according to the vow which he vowed, so he must do after the law of his separation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Speak unto Aaron and unto his sons, saying, On this wise ye shall bless the children of Israel, saying unto them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bless thee, and keep thee:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' make his face shine upon thee, and be gracious unto thee:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' lift up his countenance upon thee, and give thee peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And they shall put my name upon the children of Israel; and I will bless them.
