document_id: MAL.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The burden of the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to Israel by Malachi.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' even among you that would shut the doors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for nought?
    - type: text
      text: ' neither do ye kindle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fire
    - type: text
      text: ' on mine altar for nought. I have no pleasure in you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, neither will I accept an offering at your hand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For from the rising of the sun even unto the going down of the same my name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' great among the Gentiles; and in every place incense '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' offered unto my name, and a pure offering: for my name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' great among the heathen, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But ye have profaned it, in that ye say, The table of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' polluted; and the fruit thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' his meat, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' contemptible. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye said also, Behold, what a weariness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it!
    - type: text
      text: ' and ye have snuffed at it, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; and ye brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' torn, and the lame, and the sick; thus ye brought an offering: should I accept this of your hand? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the deceiver, which hath in his flock a male, and voweth, and sacrificeth unto the Lord a corrupt thing: for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a great King, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and my name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' dreadful among the heathen.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have loved you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Yet ye say, Wherein hast thou loved us? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Was
    - type: text
      text: ' not Esau Jacob''s brother? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': yet I loved Jacob, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I hated Esau, and laid his mountains and his heritage waste for the dragons of the wilderness. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whereas Edom saith, We are impoverished, but we will return and build the desolate places; thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, They shall build, but I will throw down; and they shall call them, The border of wickedness, and, The people against whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath indignation for ever. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And your eyes shall see, and ye shall say, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will be magnified from the border of Israel.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son honoureth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' father, and a servant his master: if then I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a father, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine honour? and if I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a master, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my fear? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts unto you, O priests, that despise my name. And ye say, Wherein have we despised thy name? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye offer polluted bread upon mine altar; and ye say, Wherein have we polluted thee? In that ye say, The table of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' contemptible. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if ye offer the blind for sacrifice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' not evil? and if ye offer the lame and sick, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' not evil? offer it now unto thy governor; will he be pleased with thee, or accept thy person? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, I pray you, beseech God that he will be gracious unto us: this hath been by your means: will he regard your persons? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts.'
