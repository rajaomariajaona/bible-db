document_id: DEU.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses called all Israel, and said unto them, Hear, O Israel, the statutes and judgments which I speak in your ears this day, that ye may learn them, and keep, and do them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and shewing mercy unto thousands of them that love me and keep my commandments.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not take the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God in vain: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will not hold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' guiltless that taketh his name in vain.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep the sabbath day to sanctify it, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath commanded thee. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six days thou shalt labour, and do all thy work: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the seventh day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sabbath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in it
    - type: text
      text: ' thou shalt not do any work, thou, nor thy son, nor thy daughter, nor thy manservant, nor thy maidservant, nor thine ox, nor thine ass, nor any of thy cattle, nor thy stranger that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' within thy gates; that thy manservant and thy maidservant may rest as well as thou. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And remember that thou wast a servant in the land of Egypt, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God brought thee out thence through a mighty hand and by a stretched out arm: therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God commanded thee to keep the sabbath day.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Honour thy father and thy mother, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath commanded thee; that thy days may be prolonged, and that it may go well with thee, in the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God giveth thee.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thou shalt not kill.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neither shalt thou commit adultery.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neither shalt thou steal.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God made a covenant with us in Horeb. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neither shalt thou bear false witness against thy neighbour.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shalt thou desire thy neighbour''s wife, neither shalt thou covet thy neighbour''s house, his field, or his manservant, or his maidservant, his ox, or his ass, or any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy neighbour''s.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These words the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto all your assembly in the mount out of the midst of the fire, of the cloud, and of the thick darkness, with a great voice: and he added no more. And he wrote them in two tables of stone, and delivered them unto me. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when ye heard the voice out of the midst of the darkness, (for the mountain did burn with fire,) that ye came near unto me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all the heads of your tribes, and your elders; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and ye said, Behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God hath shewed us his glory and his greatness, and we have heard his voice out of the midst of the fire: we have seen this day that God doth talk with man, and he liveth. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore why should we die? for this great fire will consume us: if we hear the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God any more, then we shall die. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there of
    - type: text
      text: ' all flesh, that hath heard the voice of the living God speaking out of the midst of the fire, as we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ', and lived? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go thou near, and hear all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God shall say: and speak thou unto us all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God shall speak unto thee; and we will hear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' heard the voice of your words, when ye spake unto me; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, I have heard the voice of the words of this people, which they have spoken unto thee: they have well said all that they have spoken. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O that there were such an heart in them, that they would fear me, and keep all my commandments always, that it might be well with them, and with their children for ever! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made not this covenant with our fathers, but with us, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' us, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all of us here alive this day. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go say to them, Get you into your tents again. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for thee, stand thou here by me, and I will speak unto thee all the commandments, and the statutes, and the judgments, which thou shalt teach them, that they may do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in the land which I give them to possess it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall observe to do therefore as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God hath commanded you: ye shall not turn aside to the right hand or to the left. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall walk in all the ways which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God hath commanded you, that ye may live, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that it may be
    - type: text
      text: ' well with you, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye may prolong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' days in the land which ye shall possess.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' talked with you face to face in the mount out of the midst of the fire, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(I stood between the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' and you at that time, to shew you the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for ye were afraid by reason of the fire, and went not up into the mount;) saying,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which brought thee out of the land of Egypt, from the house of bondage.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thou shalt have none other gods before me.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not make thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' graven image, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' any likeness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of any thing
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in heaven above, or that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the earth beneath, or that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the waters beneath the earth: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shalt not bow down thyself unto them, nor serve them: for I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a jealous God, visiting the iniquity of the fathers upon the children unto the third and fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: generation
    - type: text
      text: ' of them that hate me, '
