  - type: text
    content: him
  - type: text
    content: ' safe unto Felix the governor.'
  '25':
  - type: text
    content: 'And he wrote a letter after this manner: '
  '26':
  - type: text
    content: 'Claudius Lysias unto the most excellent governor Felix '
  - type: text
    content: sendeth
  - type: text
    content: ' greeting. '
  '27':
  - type: text
    content: 'This man was taken of the Jews, and should have been killed of them: then came I with an army, and rescued him, having understood that he was a Roman. '
  '28':
  - type: text
    content: 'And when I would have known the cause wherefore they accused him, I brought him forth into their council: '
  '29':
  - type: text
    content: 'whom I perceived to be accused of questions of their law, but to have nothing laid to his charge worthy of death or of bonds. '
  '3':
  - type: text
    content: 'Then said Paul unto him, God shall smite thee, '
  - type: text
    content: thou
  - type: text
    content: ' whited wall: for sittest thou to judge me after the law, and commandest me to be smitten contrary to the law? '
  '30':
  - type: text
    content: 'And when it was told me how that the Jews laid wait for the man, I sent straightway to thee, and gave commandment to his accusers also to say before thee what '
  - type: text
    content: they had
  - type: text
    content: ' against him. Farewell.'
  '31':
  - type: text
    content: 'Then the soldiers, as it was commanded them, took Paul, and brought '
  - type: text
    content: him
  - type: text
    content: ' by night to Antipatris. '
  '32':
  - type: text
    content: 'On the morrow they left the horsemen to go with him, and returned to the castle: '
  '33':
  - type: text
    content: 'who, when they came to Cæsarea, and delivered the epistle to the governor, presented Paul also before him. '
  '34':
  - type: text
    content: 'And when the governor had read '
  - type: text
    content: the letter
  - type: text
    content: ', he asked of what province he was. And when he understood that '
  - type: text
    content: he was
  - type: text
    content: ' of Cilicia; '
  '35':
  - type: text
    content: I will hear thee, said he, when thine accusers are also come. And he commanded him to be kept in Herod's judgment hall.
  '4':
  - type: text
    content: 'And they that stood by said, Revilest thou God''s high priest? '
  '5':
  - type: text
    content: 'Then said Paul, I wist not, brethren, that he was the high priest: for it is written, Thou shalt not speak evil of the ruler of thy people.'
  '6':
  - type: text
    content: 'But when Paul perceived that the one part were Sadducees, and the other Pharisees, he cried out in the council, Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, I am a Pharisee, the son of a Pharisee: of the hope and resurrection of the dead I am called in question. '
  '7':
  - type: text
    content: 'And when he had so said, there arose a dissension between the Pharisees and the Sadducees: and the multitude was divided. '
  '8':
  - type: text
    content: 'For the Sadducees say that there is no resurrection, neither angel, nor spirit: but the Pharisees confess both. '
  '9':
  - type: text
    content: 'And there arose a great cry: and the scribes '
  - type: text
    content: that were
  - type: text
    content: ' of the Pharisees'' part arose, and strove, saying, We find no evil in this man: but if a spirit or an angel hath spoken to him, let us not fight against God.'
