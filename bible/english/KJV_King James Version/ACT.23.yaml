  '1':
  - type: text
    content: 'And Paul, earnestly beholding the council, said, Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, I have lived in all good conscience before God until this day. '
  '10':
  - type: text
    content: 'And when there arose a great dissension, the chief captain, fearing lest Paul should have been pulled in pieces of them, commanded the soldiers to go down, and to take him by force from among them, and to bring '
  - type: text
    content: him
  - type: text
    content: ' into the castle. '
  '11':
  - type: text
    content: 'And the night following the Lord stood by him, and said, '
  - type: text
    content: 'Be of good cheer, Paul: for as thou hast testified of me in Jerusalem, so must thou bear witness also at Rome.'
  - type: heading
    content: A Plot Defeated
  '12':
  - type: text
    content: 'And when it was day, certain of the Jews banded together, and bound themselves under a curse, saying that they would neither eat nor drink till they had killed Paul. '
  '13':
  - type: text
    content: 'And they were more than forty which had made this conspiracy. '
  '14':
  - type: text
    content: 'And they came to the chief priests and elders, and said, We have bound ourselves under a great curse, that we will eat nothing until we have slain Paul. '
  '15':
  - type: text
    content: 'Now therefore ye with the council signify to the chief captain that he bring him down unto you to morrow, as though ye would enquire something more perfectly concerning him: and we, or ever he come near, are ready to kill him.'
  '16':
  - type: text
    content: 'And when Paul''s sister''s son heard of their lying in wait, he went and entered into the castle, and told Paul. '
  '17':
  - type: text
    content: 'Then Paul called one of the centurions unto '
  - type: text
    content: him
  - type: text
    content: ', and said, Bring this young man unto the chief captain: for he hath a certain thing to tell him. '
  '18':
  - type: text
    content: 'So he took him, and brought '
  - type: text
    content: him
  - type: text
    content: ' to the chief captain, and said, Paul the prisoner called me unto '
  - type: text
    content: him
  - type: text
    content: ', and prayed me to bring this young man unto thee, who hath something to say unto thee. '
  '19':
  - type: text
    content: 'Then the chief captain took him by the hand, and went '
  - type: text
    content: with him
  - type: text
    content: ' aside privately, and asked '
  - type: text
    content: him
  - type: text
    content: ', What is that thou hast to tell me? '
  '2':
  - type: text
    content: 'And the high priest Ananias commanded them that stood by him to smite him on the mouth. '
  '20':
  - type: text
    content: 'And he said, The Jews have agreed to desire thee that thou wouldest bring down Paul to morrow into the council, as though they would enquire somewhat of him more perfectly. '
  '21':
  - type: text
    content: 'But do not thou yield unto them: for there lie in wait for him of them more than forty men, which have bound themselves with an oath, that they will neither eat nor drink till they have killed him: and now are they ready, looking for a promise from thee. '
  '22':
  - type: text
    content: 'So the chief captain '
  - type: text
    content: then
  - type: text
    content: ' let the young man depart, and charged '
  - type: text
    content: him, See thou
  - type: text
    content: ' tell no man that thou hast shewed these things to me.'
  '23':
  - type: text
    content: 'And he called unto '
  - type: text
    content: him
  - type: text
    content: ' two centurions, saying, Make ready two hundred soldiers to go to Cæsarea, and horsemen threescore and ten, and spearmen two hundred, at the third hour of the night; '
  '24':
  - type: text
    content: 'and provide '
  - type: text
    content: them
  - type: text
