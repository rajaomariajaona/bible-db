document_id: ACT.23,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Paul, earnestly beholding the council, said, Men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' brethren, I have lived in all good conscience before God until this day. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And when there arose a great dissension, the chief captain, fearing lest Paul should have been pulled in pieces of them, commanded the soldiers to go down, and to take him by force from among them, and to bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' into the castle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the night following the Lord stood by him, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Be of good cheer, Paul: for as thou hast testified of me in Jerusalem, so must thou bear witness also at Rome.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Plot Defeated
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when it was day, certain of the Jews banded together, and bound themselves under a curse, saying that they would neither eat nor drink till they had killed Paul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they were more than forty which had made this conspiracy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And they came to the chief priests and elders, and said, We have bound ourselves under a great curse, that we will eat nothing until we have slain Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now therefore ye with the council signify to the chief captain that he bring him down unto you to morrow, as though ye would enquire something more perfectly concerning him: and we, or ever he come near, are ready to kill him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when Paul''s sister''s son heard of their lying in wait, he went and entered into the castle, and told Paul. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Paul called one of the centurions unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and said, Bring this young man unto the chief captain: for he hath a certain thing to tell him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So he took him, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to the chief captain, and said, Paul the prisoner called me unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and prayed me to bring this young man unto thee, who hath something to say unto thee. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the chief captain took him by the hand, and went '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with him
    - type: text
      text: ' aside privately, and asked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', What is that thou hast to tell me? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the high priest Ananias commanded them that stood by him to smite him on the mouth. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he said, The Jews have agreed to desire thee that thou wouldest bring down Paul to morrow into the council, as though they would enquire somewhat of him more perfectly. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But do not thou yield unto them: for there lie in wait for him of them more than forty men, which have bound themselves with an oath, that they will neither eat nor drink till they have killed him: and now are they ready, looking for a promise from thee. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So the chief captain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' let the young man depart, and charged '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him, See thou
    - type: text
      text: ' tell no man that thou hast shewed these things to me.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he called unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' two centurions, saying, Make ready two hundred soldiers to go to Cæsarea, and horsemen threescore and ten, and spearmen two hundred, at the third hour of the night; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and provide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' beasts, that they may set Paul on, and bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' safe unto Felix the governor.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And he wrote a letter after this manner: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Claudius Lysias unto the most excellent governor Felix '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sendeth
    - type: text
      text: ' greeting. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'This man was taken of the Jews, and should have been killed of them: then came I with an army, and rescued him, having understood that he was a Roman. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And when I would have known the cause wherefore they accused him, I brought him forth into their council: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'whom I perceived to be accused of questions of their law, but to have nothing laid to his charge worthy of death or of bonds. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then said Paul unto him, God shall smite thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' whited wall: for sittest thou to judge me after the law, and commandest me to be smitten contrary to the law? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And when it was told me how that the Jews laid wait for the man, I sent straightway to thee, and gave commandment to his accusers also to say before thee what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they had
    - type: text
      text: ' against him. Farewell.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then the soldiers, as it was commanded them, took Paul, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' by night to Antipatris. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'On the morrow they left the horsemen to go with him, and returned to the castle: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'who, when they came to Cæsarea, and delivered the epistle to the governor, presented Paul also before him. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And when the governor had read '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the letter
    - type: text
      text: ', he asked of what province he was. And when he understood that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he was
    - type: text
      text: ' of Cilicia; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: I will hear thee, said he, when thine accusers are also come. And he commanded him to be kept in Herod's judgment hall.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And they that stood by said, Revilest thou God''s high priest? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then said Paul, I wist not, brethren, that he was the high priest: for it is written, Thou shalt not speak evil of the ruler of thy people.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But when Paul perceived that the one part were Sadducees, and the other Pharisees, he cried out in the council, Men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' brethren, I am a Pharisee, the son of a Pharisee: of the hope and resurrection of the dead I am called in question. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when he had so said, there arose a dissension between the Pharisees and the Sadducees: and the multitude was divided. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For the Sadducees say that there is no resurrection, neither angel, nor spirit: but the Pharisees confess both. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And there arose a great cry: and the scribes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' of the Pharisees'' part arose, and strove, saying, We find no evil in this man: but if a spirit or an angel hath spoken to him, let us not fight against God.'
