  '11':
  - type: text
    content: 'No meat offering, which ye shall bring unto the '
  - type: text
    content: LORD
  - type: text
    content: ', shall be made with leaven: for ye shall burn no leaven, nor any honey, in any offering of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire.'
  '12':
  - type: text
    content: 'As for the oblation of the firstfruits, ye shall offer them unto the '
  - type: text
    content: LORD
  - type: text
    content: ': but they shall not be burnt on the altar for a sweet savour. '
  '13':
  - type: text
    content: 'And every oblation of thy meat offering shalt thou season with salt; neither shalt thou suffer the salt of the covenant of thy God to be lacking from thy meat offering: with all thine offerings thou shalt offer salt.'
  '14':
  - type: text
    content: 'And if thou offer a meat offering of thy firstfruits unto the '
  - type: text
    content: LORD
  - type: text
    content: ', thou shalt offer for the meat offering of thy firstfruits green ears of corn dried by the fire, '
  - type: text
    content: even
  - type: text
    content: ' corn beaten out of full ears. '
  '15':
  - type: text
    content: 'And thou shalt put oil upon it, and lay frankincense thereon: it '
  - type: text
    content: is
  - type: text
    content: ' a meat offering. '
  '16':
  - type: text
    content: 'And the priest shall burn the memorial of it, '
  - type: text
    content: part
  - type: text
    content: ' of the beaten corn thereof, and '
  - type: text
    content: part
  - type: text
    content: ' of the oil thereof, with all the frankincense thereof: '
  - type: text
    content: it is
  - type: text
    content: ' an offering made by fire unto the '
  - type: text
    content: LORD
  - type: text
    content: .
