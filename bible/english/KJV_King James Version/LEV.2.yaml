  - type: text
    content: 'And if thou bring an oblation of a meat offering baken in the oven, '
  - type: text
    content: it shall be
  - type: text
    content: ' unleavened cakes of fine flour mingled with oil, or unleavened wafers anointed with oil. '
  '5':
  - type: text
    content: 'And if thy oblation '
  - type: text
    content: be
  - type: text
    content: ' a meat offering '
  - type: text
    content: baken
  - type: text
    content: ' in a pan, it shall be '
  - type: text
    content: of
  - type: text
    content: ' fine flour unleavened, mingled with oil. '
  '6':
  - type: text
    content: 'Thou shalt part it in pieces, and pour oil thereon: it '
  - type: text
