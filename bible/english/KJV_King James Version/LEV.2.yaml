    content: The Meat Offering
  - type: text
    content: 'And when any will offer a meat offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ', his offering shall be '
  - type: text
    content: of
  - type: text
    content: ' fine flour; and he shall pour oil upon it, and put frankincense thereon: '
  '10':
  - type: text
    content: 'And that which is left of the meat offering '
  - type: text
    content: shall be
  - type: text
