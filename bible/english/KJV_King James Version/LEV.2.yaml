document_id: LEV.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Meat Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And when any will offer a meat offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', his offering shall be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine flour; and he shall pour oil upon it, and put frankincense thereon: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And that which is left of the meat offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' Aaron''s and his sons'': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a thing most holy of the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'No meat offering, which ye shall bring unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', shall be made with leaven: for ye shall burn no leaven, nor any honey, in any offering of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'As for the oblation of the firstfruits, ye shall offer them unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': but they shall not be burnt on the altar for a sweet savour. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And every oblation of thy meat offering shalt thou season with salt; neither shalt thou suffer the salt of the covenant of thy God to be lacking from thy meat offering: with all thine offerings thou shalt offer salt.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And if thou offer a meat offering of thy firstfruits unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou shalt offer for the meat offering of thy firstfruits green ears of corn dried by the fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' corn beaten out of full ears. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And thou shalt put oil upon it, and lay frankincense thereon: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a meat offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the priest shall burn the memorial of it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of the beaten corn thereof, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of the oil thereof, with all the frankincense thereof: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and he shall bring it to Aaron''s sons the priests: and he shall take thereout his handful of the flour thereof, and of the oil thereof, with all the frankincense thereof; and the priest shall burn the memorial of it upon the altar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' an offering made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and the remnant of the meat offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' Aaron''s and his sons'': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a thing most holy of the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And if thou bring an oblation of a meat offering baken in the oven, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' unleavened cakes of fine flour mingled with oil, or unleavened wafers anointed with oil. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And if thy oblation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a meat offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: baken
    - type: text
      text: ' in a pan, it shall be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine flour unleavened, mingled with oil. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Thou shalt part it in pieces, and pour oil thereon: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a meat offering. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And if thy oblation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a meat offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: baken
    - type: text
      text: ' in the fryingpan, it shall be made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine flour with oil. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And thou shalt bring the meat offering that is made of these things unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and when it is presented unto the priest, he shall bring it unto the altar. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the priest shall take from the meat offering a memorial thereof, and shall burn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the altar: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' an offering made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
