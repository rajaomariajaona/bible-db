document_id: PRO.28,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The wicked flee when no man pursueth:'
  - type: text
    content: But the righteous are bold as a lion.
  '10':
  - type: text
    content: Whoso causeth the righteous to go astray in an evil way,
  - type: text
    content: 'He shall fall himself into his own pit:'
  - type: text
    content: 'But the upright shall have good '
  - type: text
    content: things
  - type: text
    content: ' in possession.'
  '11':
  - type: text
    content: 'The rich man '
  - type: text
    content: is
  - type: text
    content: ' wise in his own conceit;'
  - type: text
    content: But the poor that hath understanding searcheth him out.
  '12':
  - type: text
    content: 'When righteous '
  - type: text
    content: men
  - type: text
    content: ' do rejoice, '
  - type: text
    content: there is
  - type: text
    content: ' great glory:'
  - type: text
    content: But when the wicked rise, a man is hidden.
  '13':
  - type: text
    content: 'He that covereth his sins shall not prosper:'
  - type: text
    content: 'But whoso confesseth and forsaketh '
  - type: text
    content: them
  - type: text
    content: ' shall have mercy.'
  '14':
  - type: text
    content: 'Happy '
  - type: text
    content: is
  - type: text
    content: ' the man that feareth alway:'
  - type: text
    content: But he that hardeneth his heart shall fall into mischief.
  '15':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' a roaring lion, and a ranging bear;'
  - type: text
    content: So is
  - type: text
    content: ' a wicked ruler over the poor people.'
  '16':
  - type: text
    content: 'The prince that wanteth understanding '
  - type: text
    content: is
  - type: text
    content: ' also a great oppressor:'
  - type: text
    content: But
  - type: text
    content: ' he that hateth covetousness shall prolong '
  - type: text
    content: his
  - type: text
    content: ' days.'
  '17':
  - type: text
    content: 'A man that doeth violence to the blood of '
  - type: text
    content: any
  - type: text
    content: ' person'
  - type: text
    content: Shall flee to the pit; let no man stay him.
  '18':
  - type: text
    content: 'Whoso walketh uprightly shall be saved:'
  - type: text
    content: 'But '
  - type: text
    content: he that is
  - type: text
    content: ' perverse '
  - type: text
    content: in his
  - type: text
    content: ' ways shall fall at once.'
  '19':
  - type: text
    content: 'He that tilleth his land shall have plenty of bread:'
  - type: text
    content: 'But he that followeth after vain '
  - type: text
    content: persons
  - type: text
    content: ' shall have poverty enough.'
  '2':
  - type: text
    content: 'For the transgression of a land many '
  - type: text
    content: are
  - type: text
    content: ' the princes thereof:'
  - type: text
    content: 'But by a man of understanding '
  - type: text
    content: and
  - type: text
    content: ' knowledge the state '
  - type: text
    content: thereof
  - type: text
    content: ' shall be prolonged.'
  '20':
  - type: text
    content: 'A faithful man shall abound with blessings:'
  - type: text
    content: But he that maketh haste to be rich shall not be innocent.
  '21':
  - type: text
    content: 'To have respect of persons '
  - type: text
    content: is
  - type: text
    content: ' not good:'
  - type: text
    content: 'For for a piece of bread '
  - type: text
    content: that
  - type: text
    content: ' man will transgress.'
  '22':
  - type: text
    content: 'He that hasteth to be rich '
  - type: text
    content: hath
  - type: text
    content: ' an evil eye,'
  - type: text
    content: And considereth not that poverty shall come upon him.
  '23':
  - type: text
    content: He that rebuketh a man afterwards shall find more favour
  - type: text
    content: Than he that flattereth with the tongue.
  '24':
  - type: text
    content: 'Whoso robbeth his father or his mother, and saith, '
  - type: text
    content: It is
  - type: text
    content: ' no transgression;'
  - type: text
    content: 'The same '
  - type: text
    content: is
  - type: text
    content: ' the companion of a destroyer.'
  '25':
  - type: text
    content: 'He that is of a proud heart stirreth up strife:'
  - type: text
    content: 'But he that putteth his trust in the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be made fat.'
  '26':
  - type: text
    content: 'He that trusteth in his own heart is a fool:'
  - type: text
    content: But whoso walketh wisely, he shall be delivered.
  '27':
  - type: text
    content: 'He that giveth unto the poor shall not lack:'
  - type: text
    content: But he that hideth his eyes shall have many a curse.
  '28':
  - type: text
    content: 'When the wicked rise, men hide themselves:'
  - type: text
    content: But when they perish, the righteous increase.
  '3':
  - type: text
    content: A poor man that oppresseth the poor
  - type: text
    content: Is like
  - type: text
    content: ' a sweeping rain which leaveth no food.'
  '4':
  - type: text
    content: 'They that forsake the law praise the wicked:'
  - type: text
    content: But such as keep the law contend with them.
  '5':
  - type: text
    content: 'Evil men understand not judgment:'
  - type: text
    content: 'But they that seek the '
  - type: text
    content: LORD
  - type: text
    content: ' understand all '
  - type: text
    content: things
  - type: text
    content: .
  '6':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' the poor that walketh in his uprightness,'
  - type: text
    content: 'Than '
  - type: text
    content: he that is
  - type: text
    content: ' perverse '
  - type: text
    content: in his
  - type: text
    content: ' ways, though he '
  - type: text
    content: be
  - type: text
    content: ' rich.'
  '7':
  - type: text
    content: 'Whoso keepeth the law '
  - type: text
    content: is
  - type: text
    content: ' a wise son:'
  - type: text
    content: 'But he that is a companion of riotous '
  - type: text
    content: men
  - type: text
    content: ' shameth his father.'
  '8':
  - type: text
    content: He that by usury and unjust gain increaseth his substance,
  - type: text
    content: He shall gather it for him that will pity the poor.
  '9':
  - type: text
    content: He that turneth away his ear from hearing the law,
  - type: text
    content: 'Even his prayer '
  - type: text
    content: shall be
  - type: text
    content: ' abomination.'
