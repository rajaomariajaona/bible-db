document_id: PRO.28,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The wicked flee when no man pursueth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous are bold as a lion.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Whoso causeth the righteous to go astray in an evil way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall fall himself into his own pit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the upright shall have good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' in possession.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The rich man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wise in his own conceit;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the poor that hath understanding searcheth him out.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' do rejoice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' great glory:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when the wicked rise, a man is hidden.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He that covereth his sins shall not prosper:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But whoso confesseth and forsaketh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' shall have mercy.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man that feareth alway:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that hardeneth his heart shall fall into mischief.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' a roaring lion, and a ranging bear;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So is
    - type: text
      text: ' a wicked ruler over the poor people.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The prince that wanteth understanding '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also a great oppressor:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' he that hateth covetousness shall prolong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' days.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'A man that doeth violence to the blood of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' person'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall flee to the pit; let no man stay him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Whoso walketh uprightly shall be saved:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' perverse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in his
    - type: text
      text: ' ways shall fall at once.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He that tilleth his land shall have plenty of bread:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that followeth after vain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: persons
    - type: text
      text: ' shall have poverty enough.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For the transgression of a land many '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the princes thereof:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But by a man of understanding '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' knowledge the state '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: ' shall be prolonged.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'A faithful man shall abound with blessings:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that maketh haste to be rich shall not be innocent.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'To have respect of persons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For for a piece of bread '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' man will transgress.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He that hasteth to be rich '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' an evil eye,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And considereth not that poverty shall come upon him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He that rebuketh a man afterwards shall find more favour
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than he that flattereth with the tongue.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Whoso robbeth his father or his mother, and saith, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' no transgression;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the companion of a destroyer.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'He that is of a proud heart stirreth up strife:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that putteth his trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be made fat.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He that trusteth in his own heart is a fool:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But whoso walketh wisely, he shall be delivered.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'He that giveth unto the poor shall not lack:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that hideth his eyes shall have many a curse.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When the wicked rise, men hide themselves:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when they perish, the righteous increase.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A poor man that oppresseth the poor
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is like
    - type: text
      text: ' a sweeping rain which leaveth no food.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They that forsake the law praise the wicked:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But such as keep the law contend with them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Evil men understand not judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But they that seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' understand all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the poor that walketh in his uprightness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' perverse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in his
    - type: text
      text: ' ways, though he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' rich.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Whoso keepeth the law '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a wise son:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that is a companion of riotous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shameth his father.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He that by usury and unjust gain increaseth his substance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall gather it for him that will pity the poor.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He that turneth away his ear from hearing the law,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even his prayer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' abomination.'
