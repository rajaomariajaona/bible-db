  '1':
  - type: text
    content: 'And Sarah was an hundred and seven and twenty years old: '
  - type: text
    content: these were
  - type: text
    content: ' the years of the life of Sarah. '
  '10':
  - type: text
    content: 'And Ephron dwelt among the children of Heth: and Ephron the Hittite answered Abraham in the audience of the children of Heth, '
  - type: text
    content: even
  - type: text
    content: ' of all that went in at the gate of his city, saying, '
  '11':
  - type: text
    content: 'Nay, my lord, hear me: the field give I thee, and the cave that '
  - type: text
    content: is
  - type: text
    content: ' therein, I give it thee; in the presence of the sons of my people give I it thee: bury thy dead. '
  '12':
  - type: text
    content: 'And Abraham bowed down himself before the people of the land. '
  '13':
  - type: text
    content: 'And he spake unto Ephron in the audience of the people of the land, saying, But if thou '
  - type: text
    content: wilt give it
  - type: text
    content: ', I pray thee, hear me: I will give thee money for the field; take '
  - type: text
    content: it
  - type: text
    content: ' of me, and I will bury my dead there. '
  '14':
  - type: text
    content: 'And Ephron answered Abraham, saying unto him, '
  '15':
  - type: text
    content: 'My lord, hearken unto me: the land '
  - type: text
    content: is worth
  - type: text
    content: ' four hundred shekels of silver; what '
  - type: text
    content: is
  - type: text
    content: ' that betwixt me and thee? bury therefore thy dead. '
  '16':
  - type: text
    content: 'And Abraham hearkened unto Ephron; and Abraham weighed to Ephron the silver, which he had named in the audience of the sons of Heth, four hundred shekels of silver, current '
  - type: text
    content: money
  - type: text
    content: ' with the merchant.'
  '17':
  - type: text
    content: 'And the field of Ephron, which '
  - type: text
    content: was
  - type: text
    content: ' in Machpelah, which '
  - type: text
    content: was
  - type: text
    content: ' before Mamre, the field, and the cave which '
  - type: text
    content: was
  - type: text
    content: ' therein, and all the trees that '
  - type: text
    content: were
  - type: text
    content: ' in the field, that '
  - type: text
    content: were
  - type: text
    content: ' in all the borders round about, were made sure '
  '18':
  - type: text
    content: 'unto Abraham for a possession in the presence of the children of Heth, before all that went in at the gate of his city. '
  '19':
  - type: text
    content: 'And after this, Abraham buried Sarah his wife in the cave of the field of Machpelah before Mamre: the same '
  - type: text
    content: is
  - type: text
    content: ' Hebron in the land of Canaan. '
  '2':
  - type: text
    content: 'And Sarah died in Kirjath-arba; the same '
  - type: text
    content: is
  - type: text
    content: ' Hebron in the land of Canaan: and Abraham came to mourn for Sarah, and to weep for her.'
  '20':
  - type: text
    content: 'And the field, and the cave that '
  - type: text
    content: is
  - type: text
    content: ' therein, were made sure unto Abraham for a possession of a buryingplace by the sons of Heth.'
  '3':
  - type: text
    content: 'And Abraham stood up from before his dead, and spake unto the sons of Heth, saying, '
  '4':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' a stranger and a sojourner with you: give me a possession of a buryingplace with you, that I may bury my dead out of my sight. '
  '5':
  - type: text
    content: 'And the children of Heth answered Abraham, saying unto him, '
  '6':
  - type: text
    content: 'Hear us, my lord: thou '
  - type: text
    content: art
  - type: text
    content: ' a mighty prince among us: in the choice of our sepulchres bury thy dead; none of us shall withhold from thee his sepulchre, but that thou mayest bury thy dead. '
  '7':
  - type: text
    content: 'And Abraham stood up, and bowed himself to the people of the land, '
  - type: text
    content: even
  - type: text
    content: ' to the children of Heth. '
  '8':
  - type: text
    content: 'And he communed with them, saying, If it be your mind that I should bury my dead out of my sight; hear me, and intreat for me to Ephron the son of Zohar, '
  '9':
  - type: text
    content: 'that he may give me the cave of Machpelah, which he hath, which '
  - type: text
    content: is
  - type: text
    content: ' in the end of his field; for as much money as it is worth he shall give it me for a possession of a buryingplace amongst you. '
