document_id: GEN.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Sarah was an hundred and seven and twenty years old: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these were
  - type: text
    text: ' the years of the life of Sarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Sarah died in Kirjath-arba; the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Hebron in the land of Canaan: and Abraham came to mourn for Sarah, and to weep for her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Abraham stood up from before his dead, and spake unto the sons of Heth, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a stranger and a sojourner with you: give me a possession of a buryingplace with you, that I may bury my dead out of my sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the children of Heth answered Abraham, saying unto him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hear us, my lord: thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a mighty prince among us: in the choice of our sepulchres bury thy dead; none of us shall withhold from thee his sepulchre, but that thou mayest bury thy dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Abraham stood up, and bowed himself to the people of the land, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the children of Heth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he communed with them, saying, If it be your mind that I should bury my dead out of my sight; hear me, and intreat for me to Ephron the son of Zohar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that he may give me the cave of Machpelah, which he hath, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the end of his field; for as much money as it is worth he shall give it me for a possession of a buryingplace amongst you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Ephron dwelt among the children of Heth: and Ephron the Hittite answered Abraham in the audience of the children of Heth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of all that went in at the gate of his city, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nay, my lord, hear me: the field give I thee, and the cave that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' therein, I give it thee; in the presence of the sons of my people give I it thee: bury thy dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Abraham bowed down himself before the people of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he spake unto Ephron in the audience of the people of the land, saying, But if thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wilt give it
  - type: text
    text: ', I pray thee, hear me: I will give thee money for the field; take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' of me, and I will bury my dead there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Ephron answered Abraham, saying unto him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'My lord, hearken unto me: the land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is worth
  - type: text
    text: ' four hundred shekels of silver; what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that betwixt me and thee? bury therefore thy dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Abraham hearkened unto Ephron; and Abraham weighed to Ephron the silver, which he had named in the audience of the sons of Heth, four hundred shekels of silver, current '
  - type: usfm
    marker: add
    children:
    - type: text
      text: money
  - type: text
    text: ' with the merchant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the field of Ephron, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Machpelah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before Mamre, the field, and the cave which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' therein, and all the trees that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the field, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in all the borders round about, were made sure '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'unto Abraham for a possession in the presence of the children of Heth, before all that went in at the gate of his city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And after this, Abraham buried Sarah his wife in the cave of the field of Machpelah before Mamre: the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Hebron in the land of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the field, and the cave that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' therein, were made sure unto Abraham for a possession of a buryingplace by the sons of Heth.'
