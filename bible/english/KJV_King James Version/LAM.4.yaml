document_id: LAM.4,1
type_code: eng
verses:
  '1':
  - type: text
    content: How is the gold become dim!
  - type: text
    content: How
  - type: text
    content: ' is the most fine gold changed!'
  - type: text
    content: The stones of the sanctuary are poured out
  - type: text
    content: In the top of every street.
  '10':
  - type: text
    content: The hands of the pitiful women
  - type: text
    content: 'Have sodden their own children:'
  - type: text
    content: They were their meat
  - type: text
    content: In the destruction of the daughter of my people.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath accomplished his fury;'
  - type: text
    content: He hath poured out his fierce anger,
  - type: text
    content: And hath kindled a fire in Zion,
  - type: text
    content: And it hath devoured the foundations thereof.
  '12':
  - type: text
    content: The kings of the earth,
  - type: text
    content: And all the inhabitants of the world, would not have believed
  - type: text
    content: That the adversary and the enemy should have entered
  - type: text
    content: Into the gates of Jerusalem.
  '13':
  - type: text
    content: For the sins of her prophets,
  - type: text
    content: And
  - type: text
    content: ' the iniquities of her priests,'
  - type: text
    content: That have shed the blood
  - type: text
    content: Of the just in the midst of her,
  '14':
  - type: text
    content: 'They have wandered '
  - type: text
    content: as
  - type: text
    content: ' blind '
  - type: text
    content: men
  - type: text
    content: ' in the streets,'
  - type: text
    content: They have polluted themselves with blood,
  - type: text
    content: So that men could not touch
  - type: text
    content: Their garments.
  '15':
  - type: text
    content: 'They cried unto them, Depart ye; '
  - type: text
    content: it is
  - type: text
    content: ' unclean;'
  - type: text
    content: 'Depart, depart, touch not:'
  - type: text
    content: When they fled away and wandered,
  - type: text
    content: They said among the heathen,
  - type: text
    content: 'They shall no more sojourn '
  - type: text
    content: there
  - type: text
    content: .
  '16':
  - type: text
    content: 'The anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' hath divided them;'
  - type: text
    content: 'He will no more regard them:'
  - type: text
    content: They respected not the persons of the priests,
  - type: text
    content: They favoured not the elders.
  '17':
  - type: text
    content: As for us, our eyes as yet failed
  - type: text
    content: 'For our vain help:'
  - type: text
    content: In our watching we have watched
  - type: text
    content: 'For a nation '
  - type: text
    content: that
  - type: text
    content: ' could not save '
  - type: text
    content: us
  - type: text
    content: .
  '18':
  - type: text
    content: They hunt our steps,
  - type: text
    content: 'That we cannot go in our streets:'
  - type: text
    content: Our end is near, our days are fulfilled;
  - type: text
    content: For our end is come.
  '19':
  - type: text
    content: Our persecutors are swifter
  - type: text
    content: 'Than the eagles of the heaven:'
  - type: text
    content: They pursued us upon the mountains,
  - type: text
    content: They laid wait for us in the wilderness.
  '2':
  - type: text
    content: The precious sons of Zion,
  - type: text
    content: Comparable to fine gold,
  - type: text
    content: How are they esteemed as earthen pitchers,
  - type: text
    content: The work of the hands of the potter!
  '20':
  - type: text
    content: 'The breath of our nostrils, the anointed of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: Was taken in their pits,
  - type: text
    content: Of whom we said, Under his shadow
  - type: text
    content: We shall live among the heathen.
  '21':
  - type: text
    content: Rejoice and be glad, O daughter of Edom,
  - type: text
    content: That dwellest in the land of Uz;
  - type: text
    content: 'The cup also shall pass through unto thee:'
  - type: text
    content: Thou shalt be drunken, and shalt make thyself naked.
  '22':
  - type: text
    content: The punishment of thine iniquity is accomplished, O daughter of Zion;
  - type: text
    content: 'He will no more carry thee away into captivity:'
  - type: text
    content: He will visit thine iniquity, O daughter of Edom;
  - type: text
    content: He will discover thy sins.
  '3':
  - type: text
    content: Even the sea monsters draw out the breast,
  - type: text
    content: 'They give suck to their young ones:'
  - type: text
    content: 'The daughter of my people '
  - type: text
    content: is become
  - type: text
    content: ' cruel,'
  - type: text
    content: Like the ostriches in the wilderness.
  '4':
  - type: text
    content: The tongue of the sucking child cleaveth
  - type: text
    content: 'To the roof of his mouth for thirst:'
  - type: text
    content: The young children ask bread,
  - type: text
    content: And
  - type: text
    content: ' no man breaketh '
  - type: text
    content: it
  - type: text
    content: ' unto them.'
  '5':
  - type: text
    content: They that did feed delicately
  - type: text
    content: 'Are desolate in the streets:'
  - type: text
    content: They that were brought up
  - type: text
    content: In scarlet embrace dunghills.
  '6':
  - type: text
    content: For the punishment of the iniquity of the daughter of my people is greater
  - type: text
    content: Than the punishment of the sin of Sodom,
  - type: text
    content: That was overthrown as in a moment,
  - type: text
    content: And no hands stayed on her.
  '7':
  - type: text
    content: Her Nazarites were purer than snow,
  - type: text
    content: They were whiter than milk,
  - type: text
    content: They were more ruddy in body than rubies,
  - type: text
    content: 'Their polishing '
  - type: text
    content: was
  - type: text
    content: ' of sapphire:'
  '8':
  - type: text
    content: Their visage is blacker than a coal;
  - type: text
    content: 'They are not known in the streets:'
  - type: text
    content: Their skin cleaveth to their bones;
  - type: text
    content: It is withered, it is become like a stick.
  '9':
  - type: text
    content: ' '
  - type: text
    content: They that be
  - type: text
    content: ' slain with the sword'
  - type: text
    content: 'Are better than '
  - type: text
    content: they that be
  - type: text
    content: ' slain with hunger:'
  - type: text
    content: For these pine away, stricken
  - type: text
    content: 'Through for '
  - type: text
    content: want of
  - type: text
    content: ' the fruits of the field.'
