document_id: LAM.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How is the gold become dim!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: How
    - type: text
      text: ' is the most fine gold changed!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stones of the sanctuary are poured out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the top of every street.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hands of the pitiful women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Have sodden their own children:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were their meat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the destruction of the daughter of my people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath accomplished his fury;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath poured out his fierce anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hath kindled a fire in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it hath devoured the foundations thereof.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kings of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the inhabitants of the world, would not have believed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the adversary and the enemy should have entered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Into the gates of Jerusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sins of her prophets,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the iniquities of her priests,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That have shed the blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of the just in the midst of her,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have wandered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' blind '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' in the streets,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have polluted themselves with blood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that men could not touch
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their garments.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They cried unto them, Depart ye; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' unclean;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Depart, depart, touch not:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they fled away and wandered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They said among the heathen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They shall no more sojourn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath divided them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will no more regard them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They respected not the persons of the priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They favoured not the elders.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for us, our eyes as yet failed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For our vain help:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In our watching we have watched
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For a nation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' could not save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hunt our steps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That we cannot go in our streets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our end is near, our days are fulfilled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For our end is come.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our persecutors are swifter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Than the eagles of the heaven:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pursued us upon the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They laid wait for us in the wilderness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The precious sons of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Comparable to fine gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How are they esteemed as earthen pitchers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The work of the hands of the potter!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The breath of our nostrils, the anointed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Was taken in their pits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of whom we said, Under his shadow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We shall live among the heathen.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejoice and be glad, O daughter of Edom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That dwellest in the land of Uz;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The cup also shall pass through unto thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt be drunken, and shalt make thyself naked.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The punishment of thine iniquity is accomplished, O daughter of Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will no more carry thee away into captivity:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will visit thine iniquity, O daughter of Edom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will discover thy sins.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the sea monsters draw out the breast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They give suck to their young ones:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The daughter of my people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is become
    - type: text
      text: ' cruel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the ostriches in the wilderness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tongue of the sucking child cleaveth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To the roof of his mouth for thirst:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young children ask bread,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' no man breaketh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto them.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They that did feed delicately
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Are desolate in the streets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They that were brought up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In scarlet embrace dunghills.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the punishment of the iniquity of the daughter of my people is greater
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than the punishment of the sin of Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That was overthrown as in a moment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And no hands stayed on her.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her Nazarites were purer than snow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were whiter than milk,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were more ruddy in body than rubies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their polishing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of sapphire:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their visage is blacker than a coal;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They are not known in the streets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their skin cleaveth to their bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is withered, it is become like a stick.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: They that be
    - type: text
      text: ' slain with the sword'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Are better than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they that be
    - type: text
      text: ' slain with hunger:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For these pine away, stricken
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Through for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: want of
    - type: text
      text: ' the fruits of the field.'
