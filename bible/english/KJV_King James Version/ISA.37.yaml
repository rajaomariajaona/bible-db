document_id: ISA.37
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when king Hezekiah heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', that he rent his clothes, and covered himself with sackcloth, and went into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he sent Eliakim, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the household, and Shebna the scribe, and the elders of the priests covered with sackcloth, unto Isaiah the prophet the son of Amoz. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they said unto him, Thus saith Hezekiah, This day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a day of trouble, and of rebuke, and of blasphemy: for the children are come to the birth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' not strength to bring forth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'It may be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God will hear the words of Rabshakeh, whom the king of Assyria his master hath sent to reproach the living God, and will reprove the words which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath heard: wherefore lift up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' prayer for the remnant that is left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the servants of king Hezekiah came to Isaiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Isaiah said unto them, Thus shall ye say unto your master, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Be not afraid of the words that thou hast heard, wherewith the servants of the king of Assyria have blasphemed me. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Behold, I will send a blast upon him, and he shall hear a rumour, and return to his own land; and I will cause him to fall by the sword in his own land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Rabshakeh returned, and found the king of Assyria warring against Libnah: for he had heard that he was departed from Lachish. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he heard say concerning Tirhakah king of Ethiopia, He is come forth to make war with thee. And when he heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he sent messengers to Hezekiah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thus shall ye speak to Hezekiah king of Judah, saying, Let not thy God, in whom thou trustest, deceive thee, saying, Jerusalem shall not be given into the hand of the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, thou hast heard what the kings of Assyria have done to all lands by destroying them utterly; and shalt thou be delivered? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Have the gods of the nations delivered them which my fathers have destroyed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' Gozan, and Haran, and Rezeph, and the children of Eden which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in Telassar? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the king of Hamath, and the king of Arphad, and the king of the city of Sepharvaim, Hena, and Ivah?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hezekiah's Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Hezekiah received the letter from the hand of the messengers, and read it: and Hezekiah went up unto the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and spread it before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Hezekiah prayed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, God of Israel, that dwellest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: between
  - type: text
    text: ' the cherubims, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' thou alone, of all the kingdoms of the earth: thou hast made heaven and earth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Incline thine ear, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and hear; open thine eyes, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and see: and hear all the words of Sennacherib, which hath sent to reproach the living God. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Of a truth, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the kings of Assyria have laid waste all the nations, and their countries, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and have cast their gods into the fire: for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' no gods, but the work of men''s hands, wood and stone: therefore they have destroyed them. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now therefore, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, save us from his hand, that all the kingdoms of the earth may know that thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' thou only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Isaiah the son of Amoz sent unto Hezekiah, saying, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, Whereas thou hast prayed to me against Sennacherib king of Assyria: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the word which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken concerning him; The virgin, the daughter of Zion, hath despised thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' laughed thee to scorn; the daughter of Jerusalem hath shaken her head at thee. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Whom hast thou reproached and blasphemed? and against whom hast thou exalted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' voice, and lifted up thine eyes on high? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' against the Holy One of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'By thy servants hast thou reproached the Lord, and hast said, By the multitude of my chariots am I come up to the height of the mountains, to the sides of Lebanon; and I will cut down the tall cedars thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the choice fir trees thereof: and I will enter into the height of his border, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the forest of his Carmel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I have digged, and drunk water; and with the sole of my feet have I dried up all the rivers of the besieged places.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hast thou not heard long ago, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' I have done it; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of ancient times, that I have formed it? now have I brought it to pass, that thou shouldest be to lay waste defenced cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into
  - type: text
    text: ' ruinous heaps. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Therefore their inhabitants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of small power, they were dismayed and confounded: they were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the grass of the field, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the green herb, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the grass on the housetops, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as corn
  - type: text
    text: ' blasted before it be grown up. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But I know thy abode, and thy going out, and thy coming in, and thy rage against me. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Because thy rage against me, and thy tumult, is come up into mine ears, therefore will I put my hook in thy nose, and my bridle in thy lips, and I will turn thee back by the way by which thou camest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a sign unto thee, Ye shall eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' year such as groweth of itself; and the second year that which springeth of the same: and in the third year sow ye, and reap, and plant vineyards, and eat the fruit thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the remnant that is escaped of the house of Judah shall again take root downward, and bear fruit upward: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'for out of Jerusalem shall go forth a remnant, and they that escape out of mount Zion: the zeal of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts shall do this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' concerning the king of Assyria, He shall not come into this city, nor shoot an arrow there, nor come before it with shields, nor cast a bank against it. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'By the way that he came, by the same shall he return, and shall not come into this city, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: For I will defend this city to save it for mine own sake, and for my servant David's sake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' went forth, and smote in the camp of the Assyrians a hundred and fourscore and five thousand: and when they arose early in the morning, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' all dead corpses. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'So Sennacherib king of Assyria departed, and went and returned, and dwelt at Nineveh. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And it came to pass, as he was worshipping in the house of Nisroch his god, that Adrammelech and Sharezer his sons smote him with the sword; and they escaped into the land of Armenia: and Esarhaddon his son reigned in his stead.'
