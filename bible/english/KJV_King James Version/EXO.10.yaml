document_id: EXO.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Go in unto Pharaoh: for I have hardened his heart, and the heart of his servants, that I might shew these my signs before him: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, Let the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' be so with you, as I will let you go, and your little ones: look '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to it
    - type: text
      text: '; for evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not so: go now ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' men, and serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; for that ye did desire. And they were driven out from Pharaoh's presence.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Stretch out thine hand over the land of Egypt for the locusts, that they may come up upon the land of Egypt, and eat every herb of the land, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all that the hail hath left. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses stretched forth his rod over the land of Egypt, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' brought an east wind upon the land all that day, and all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' night; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' when it was morning, the east wind brought the locusts. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the locusts went up over all the land of Egypt, and rested in all the coasts of Egypt: very grievous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were they
    - type: text
      text: '; before them there were no such locusts as they, neither after them shall be such. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they covered the face of the whole earth, so that the land was darkened; and they did eat every herb of the land, and all the fruit of the trees which the hail had left: and there remained not any green thing in the trees, or in the herbs of the field, through all the land of Egypt.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pharaoh called for Moses and Aaron in haste; and he said, I have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, and against you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore forgive, I pray thee, my sin only this once, and intreat the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, that he may take away from me this death only. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went out from Pharaoh, and intreated the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' turned a mighty strong west wind, which took away the locusts, and cast them into the Red sea; there remained not one locust in all the coasts of Egypt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that thou mayest tell in the ears of thy son, and of thy son''s son, what things I have wrought in Egypt, and my signs which I have done among them; that ye may know how that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hardened Pharaoh''s heart, so that he would not let the children of Israel go.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Stretch out thine hand toward heaven, that there may be darkness over the land of Egypt, even darkness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' may be felt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses stretched forth his hand toward heaven; and there was a thick darkness in all the land of Egypt three days: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they saw not one another, neither rose any from his place for three days: but all the children of Israel had light in their dwellings.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh called unto Moses, and said, Go ye, serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; only let your flocks and your herds be stayed: let your little ones also go with you. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, Thou must give us also sacrifices and burnt offerings, that we may sacrifice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our cattle also shall go with us; there shall not an hoof be left behind; for thereof must we take to serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God; and we know not with what we must serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', until we come thither.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hardened Pharaoh''s heart, and he would not let them go. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh said unto him, Get thee from me, take heed to thyself, see my face no more; for in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' day thou seest my face thou shalt die. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Moses said, Thou hast spoken well, I will see thy face again no more.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron came in unto Pharaoh, and said unto him, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of the Hebrews, How long wilt thou refuse to humble thyself before me? let my people go, that they may serve me. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Else, if thou refuse to let my people go, behold, to morrow will I bring the locusts into thy coast: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they shall cover the face of the earth, that one cannot be able to see the earth: and they shall eat the residue of that which is escaped, which remaineth unto you from the hail, and shall eat every tree which groweth for you out of the field: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they shall fill thy houses, and the houses of all thy servants, and the houses of all the Egyptians; which neither thy fathers, nor thy fathers'' fathers have seen, since the day that they were upon the earth unto this day. And he turned himself, and went out from Pharaoh. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh''s servants said unto him, How long shall this man be a snare unto us? let the men go, that they may serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God: knowest thou not yet that Egypt is destroyed? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron were brought again unto Pharaoh: and he said unto them, Go, serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that shall go? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, We will go with our young and with our old, with our sons and with our daughters, with our flocks and with our herds will we go; for we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: must hold
    - type: text
      text: ' a feast unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
