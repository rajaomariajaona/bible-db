type_code: eng
verses:
  '1':
  - type: text
    content: 'Then they told David, saying, Behold, the Philistines fight against Keilah, and they rob the threshingfloors. '
  '10':
  - type: text
    content: 'Then said David, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, thy servant hath certainly heard that Saul seeketh to come to Keilah, to destroy the city for my sake. '
  '11':
  - type: text
    content: 'Will the men of Keilah deliver me up into his hand? will Saul come down, as thy servant hath heard? O '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, I beseech thee, tell thy servant. And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, He will come down. '
  '12':
  - type: text
    content: 'Then said David, Will the men of Keilah deliver me and my men into the hand of Saul? And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, They will deliver '
  - type: text
    content: thee
  - type: text
    content: ' up. '
  '13':
  - type: text
    content: 'Then David and his men, '
  - type: text
    content: which were
  - type: text
    content: ' about six hundred, arose and departed out of Keilah, and went whithersoever they could go. And it was told Saul that David was escaped from Keilah; and he forbare to go forth. '
  '14':
  - type: text
    content: And David abode in the wilderness in strong holds, and remained in a mountain in the wilderness of Ziph. And Saul sought him every day, but God delivered him not into his hand.
  '15':
  - type: text
    content: 'And David saw that Saul was come out to seek his life: and David '
  - type: text
    content: was
  - type: text
    content: ' in the wilderness of Ziph in a wood. '
  '16':
  - type: text
    content: 'And Jonathan Saul''s son arose, and went to David into the wood, and strengthened his hand in God. '
  '17':
  - type: text
    content: 'And he said unto him, Fear not: for the hand of Saul my father shall not find thee; and thou shalt be king over Israel, and I shall be next unto thee; and that also Saul my father knoweth. '
  '18':
  - type: text
    content: 'And they two made a covenant before the '
  - type: text
    content: LORD
  - type: text
    content: ': and David abode in the wood, and Jonathan went to his house.'
  '19':
  - type: text
    content: 'Then came up the Ziphites to Saul to Gibeah, saying, Doth not David hide himself with us in strong holds in the wood, in the hill of Hachilah, which '
  - type: text
    content: is
  - type: text
    content: ' on the south of Jeshimon? '
  '2':
  - type: text
    content: 'Therefore David enquired of the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, Shall I go and smite these Philistines? And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto David, Go, and smite the Philistines, and save Keilah. '
  '20':
  - type: text
    content: 'Now therefore, O king, come down according to all the desire of thy soul to come down; and our part '
  - type: text
    content: shall be
  - type: text
    content: ' to deliver him into the king''s hand. '
  '21':
  - type: text
    content: 'And Saul said, Blessed '
  - type: text
    content: be
  - type: text
    content: ' ye of the '
  - type: text
    content: LORD
  - type: text
    content: '; for ye have compassion on me. '
  '22':
  - type: text
    content: 'Go, I pray you, prepare yet, and know and see his place where his haunt is, '
  - type: text
    content: and
  - type: text
    content: ' who hath seen him there: for it is told me '
  - type: text
    content: that
  - type: text
    content: ' he dealeth very subtilly. '
  '23':
  - type: text
    content: 'See therefore, and take knowledge of all the lurking places where he hideth himself, and come ye again to me with the certainty, and I will go with you: and it shall come to pass, if he be in the land, that I will search him out throughout all the thousands of Judah.'
  '24':
  - type: text
    content: 'And they arose, and went to Ziph before Saul: but David and his men '
  - type: text
    content: were
  - type: text
    content: ' in the wilderness of Maon, in the plain on the south of Jeshimon. '
  '25':
  - type: text
    content: 'Saul also and his men went to seek '
  - type: text
    content: him
  - type: text
    content: '. And they told David: wherefore he came down into a rock, and abode in the wilderness of Maon. And when Saul heard '
  - type: text
    content: that
  - type: text
    content: ', he pursued after David in the wilderness of Maon. '
  '26':
  - type: text
    content: 'And Saul went on this side of the mountain, and David and his men on that side of the mountain: and David made haste to get away for fear of Saul; for Saul and his men compassed David and his men round about to take them. '
  '27':
  - type: text
    content: 'But there came a messenger unto Saul, saying, Haste thee, and come; for the Philistines have invaded the land. '
  '28':
  - type: text
    content: 'Wherefore Saul returned from pursuing after David, and went against the Philistines: therefore they called that place Sela-hammahlekoth. '
  '29':
  - type: text
    content: And David went up from thence, and dwelt in strong holds at En-gedi.
  '3':
  - type: text
    content: 'And David''s men said unto him, Behold, we be afraid here in Judah: how much more then if we come to Keilah against the armies of the Philistines? '
  '4':
  - type: text
    content: 'Then David enquired of the '
  - type: text
    content: LORD
  - type: text
    content: ' yet again. And the '
  - type: text
    content: LORD
  - type: text
    content: ' answered him and said, Arise, go down to Keilah; for I will deliver the Philistines into thine hand. '
  '5':
  - type: text
    content: 'So David and his men went to Keilah, and fought with the Philistines, and brought away their cattle, and smote them with a great slaughter. So David saved the inhabitants of Keilah. '
  '6':
  - type: text
    content: 'And it came to pass, when Abiathar the son of Ahimelech fled to David to Keilah, '
  - type: text
    content: that
  - type: text
    content: ' he came down '
  - type: text
    content: with
  - type: text
    content: ' an ephod in his hand.'
  '7':
  - type: text
    content: 'And it was told Saul that David was come to Keilah. And Saul said, God hath delivered him into mine hand; for he is shut in, by entering into a town that hath gates and bars. '
  '8':
  - type: text
    content: 'And Saul called all the people together to war, to go down to Keilah, to besiege David and his men. '
  '9':
  - type: text
    content: 'And David knew that Saul secretly practised mischief against him; and he said to Abiathar the priest, Bring hither the ephod. '
