  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' Answered Job'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' answered Job out of the whirlwind, and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that darkeneth counsel'
- type: usfm
  marker: q2
  children:
  - type: text
    text: By words without knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Gird up now thy loins like a man;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I will demand of thee, and answer thou me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Where wast thou when I laid the foundations of the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Declare, if thou hast understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Who hath laid the measures thereof, if thou knowest?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who hath stretched the line upon it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Whereupon are the foundations thereof fastened?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who laid the corner stone thereof;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When the morning stars sang together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the sons of God shouted for joy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' shut up the sea with doors,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When it brake forth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as if
  - type: text
    text: ' it had issued out of the womb?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When I made the cloud the garment thereof,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thick darkness a swaddlingband for it,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And brake up for it my decreed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And set bars and doors,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And said, Hitherto shalt thou come, but no further:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And here shall thy proud waves be stayed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hast thou commanded the morning since thy days;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' caused the dayspring to know his place;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: That it might take hold of the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That the wicked might be shaken out of it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'It is turned as clay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the seal;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they stand as a garment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And from the wicked their light is withholden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the high arm shall be broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hast thou entered into the springs of the sea?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or hast thou walked in the search of the depth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Have the gates of death been opened unto thee?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or hast thou seen the doors of the shadow of death?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hast thou perceived the breadth of the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Declare if thou knowest it all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: where
  - type: text
    text: ' light dwelleth?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' darkness, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the place thereof,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: That thou shouldest take it to the bound thereof,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And that thou shouldest know the paths '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the house thereof?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Knowest thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', because thou wast then born?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: because
  - type: text
    text: ' the number of thy days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hast thou entered into the treasures of the snow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or hast thou seen the treasures of the hail,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Which I have reserved against the time of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Against the day of battle and war?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: By what way is the light parted,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' scattereth the east wind upon the earth?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Who hath divided a watercourse for the overflowing of waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or a way for the lightning of thunder;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'To cause it to rain on the earth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: where
  - type: text
    text: ' no man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: On
  - type: text
    text: ' the wilderness, wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no man;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'To satisfy the desolate and waste '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ground
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to cause the bud of the tender herb to spring forth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hath the rain a father?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who hath begotten the drops of dew?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Out of whose womb came the ice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the hoary frost of heaven, who hath gendered it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The waters are hid as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a stone,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the face of the deep is frozen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Canst thou bind the sweet influences of Pleiades,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or loose the bands of Orion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Canst thou bring forth Mazzaroth in his season?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or canst thou guide Arcturus with his sons?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Knowest thou the ordinances of heaven?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Canst thou set the dominion thereof in the earth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Canst thou lift up thy voice to the clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That abundance of waters may cover thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Canst thou send lightnings, that they may go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And say unto thee, Here we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Who hath put wisdom in the inward parts?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who hath given understanding to the heart?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Who can number the clouds in wisdom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who can stay the bottles of heaven,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: When the dust groweth into hardness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the clods cleave fast together?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Wilt thou hunt the prey for the lion?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or fill the appetite of the young lions,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'When they couch in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' dens,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' abide in the covert to lie in wait?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Who provideth for the raven his food?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When his young ones cry unto God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They wander for lack of meat.
