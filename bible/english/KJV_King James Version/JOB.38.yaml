document_id: JOB.38,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' Answered Job'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' answered Job out of the whirlwind, and said,'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And brake up for it my decreed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And set bars and doors,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And said, Hitherto shalt thou come, but no further:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And here shall thy proud waves be stayed?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou commanded the morning since thy days;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' caused the dayspring to know his place;'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That it might take hold of the ends of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That the wicked might be shaken out of it?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is turned as clay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the seal;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they stand as a garment.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from the wicked their light is withholden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the high arm shall be broken.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou entered into the springs of the sea?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or hast thou walked in the search of the depth?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have the gates of death been opened unto thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or hast thou seen the doors of the shadow of death?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou perceived the breadth of the earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Declare if thou knowest it all.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where
    - type: text
      text: ' light dwelleth?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' darkness, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the place thereof,'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this that darkeneth counsel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By words without knowledge?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That thou shouldest take it to the bound thereof,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And that thou shouldest know the paths '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the house thereof?'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Knowest thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', because thou wast then born?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: because
    - type: text
      text: ' the number of thy days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great?'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou entered into the treasures of the snow?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or hast thou seen the treasures of the hail,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which I have reserved against the time of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against the day of battle and war?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By what way is the light parted,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' scattereth the east wind upon the earth?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who hath divided a watercourse for the overflowing of waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or a way for the lightning of thunder;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To cause it to rain on the earth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where
    - type: text
      text: ' no man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: On
    - type: text
      text: ' the wilderness, wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no man;'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To satisfy the desolate and waste '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ground
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to cause the bud of the tender herb to spring forth?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hath the rain a father?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who hath begotten the drops of dew?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of whose womb came the ice?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the hoary frost of heaven, who hath gendered it?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gird up now thy loins like a man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I will demand of thee, and answer thou me.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The waters are hid as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' a stone,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the face of the deep is frozen.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Canst thou bind the sweet influences of Pleiades,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or loose the bands of Orion?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Canst thou bring forth Mazzaroth in his season?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or canst thou guide Arcturus with his sons?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Knowest thou the ordinances of heaven?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Canst thou set the dominion thereof in the earth?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Canst thou lift up thy voice to the clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That abundance of waters may cover thee?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Canst thou send lightnings, that they may go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And say unto thee, Here we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are?
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who hath put wisdom in the inward parts?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who hath given understanding to the heart?
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can number the clouds in wisdom?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who can stay the bottles of heaven,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the dust groweth into hardness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the clods cleave fast together?
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wilt thou hunt the prey for the lion?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or fill the appetite of the young lions,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where wast thou when I laid the foundations of the earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Declare, if thou hast understanding.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When they couch in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' dens,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' abide in the covert to lie in wait?'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who provideth for the raven his food?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When his young ones cry unto God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They wander for lack of meat.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who hath laid the measures thereof, if thou knowest?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who hath stretched the line upon it?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whereupon are the foundations thereof fastened?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who laid the corner stone thereof;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the morning stars sang together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the sons of God shouted for joy?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' shut up the sea with doors,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When it brake forth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as if
    - type: text
      text: ' it had issued out of the womb?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I made the cloud the garment thereof,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thick darkness a swaddlingband for it,
