document_id: 1CH.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Temple Appointments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: So when David was old and full of days, he made Solomon his son king over Israel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Priests and Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he gathered together all the princes of Israel, with the priests and the Levites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now the Levites were numbered from the age of thirty years and upward: and their number by their polls, man by man, was thirty and eight thousand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Of which, twenty and four thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' to set forward the work of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and six thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' officers and judges: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'moreover four thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' porters; and four thousand praised the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with the instruments which I made, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said David
  - type: text
    text: ', to praise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therewith
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And David divided them into courses among the sons of Levi, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', Gershon, Kohath, and Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Of the Gershonites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Laadan, and Shimei. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The sons of Laadan; the chief '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jehiel, and Zetham, and Joel, three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Shimei; Shelomith, and Haziel, and Haran, three. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', the chief of the fathers of Laadan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the sons of Shimei '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Jahath, Zina, and Jeush, and Beriah. These four '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Shimei. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Jahath was the chief, and Zizah the second: but Jeush and Beriah had not many sons; therefore they were in one reckoning, according to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' father''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Kohath; Amram, Izhar, Hebron, and Uzziel, four. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Amram; Aaron and Moses: and Aaron was separated, that he should sanctify the most holy things, he and his sons for ever, to burn incense before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to minister unto him, and to bless in his name for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' Moses the man of God, his sons were named of the tribe of Levi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Moses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Gershom, and Eliezer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Of the sons of Gershom, Shebuel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the chief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the sons of Eliezer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Rehabiah the chief. And Eliezer had none other sons; but the sons of Rehabiah were very many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Of the sons of Izhar; Shelomith the chief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Of the sons of Hebron; Jeriah the first, Amariah the second, Jahaziel the third, and Jekameam the fourth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Of the sons of Uzziel; Micah the first, and Jesiah the second.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Merari; Mahli, and Mushi. The sons of Mahli; Eleazar, and Kish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Eleazar died, and had no sons, but daughters: and their brethren the sons of Kish took them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The sons of Mushi; Mahli, and Eder, and Jeremoth, three.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Levi after the house of their fathers; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the chief of the fathers, as they were counted by number of names by their polls, that did the work for the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', from the age of twenty years and upward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For David said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel hath given rest unto his people, that they may dwell in Jerusalem for ever: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and also unto the Levites; they shall no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' carry the tabernacle, nor any vessels of it for the service thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For by the last words of David the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' numbered from twenty years old and above: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'because their office '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' to wait on the sons of Aaron for the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', in the courts, and in the chambers, and in the purifying of all holy things, and the work of the service of the house of God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'both for the shewbread, and for the fine flour for meat offering, and for the unleavened cakes, and for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is baked in
  - type: text
    text: ' the pan, and for that which is fried, and for all manner of measure and size; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and to stand every morning to thank and praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and likewise at even; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and to offer all burnt sacrifices unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the sabbaths, in the new moons, and on the set feasts, by number, according to the order commanded unto them, continually before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and that they should keep the charge of the tabernacle of the congregation, and the charge of the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', and the charge of the sons of Aaron their brethren, in the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
