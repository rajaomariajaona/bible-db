document_id: 1CH.23,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Temple Appointments
  - type: text
    content: So when David was old and full of days, he made Solomon his son king over Israel.
  - type: heading
    content: Priests and Levites
  '10':
  - type: text
    content: 'And the sons of Shimei '
  - type: text
    content: were
  - type: text
    content: ', Jahath, Zina, and Jeush, and Beriah. These four '
  - type: text
    content: were
  - type: text
    content: ' the sons of Shimei. '
  '11':
  - type: text
    content: 'And Jahath was the chief, and Zizah the second: but Jeush and Beriah had not many sons; therefore they were in one reckoning, according to '
  - type: text
    content: their
  - type: text
    content: ' father''s house.'
  '12':
  - type: text
    content: 'The sons of Kohath; Amram, Izhar, Hebron, and Uzziel, four. '
  '13':
  - type: text
    content: 'The sons of Amram; Aaron and Moses: and Aaron was separated, that he should sanctify the most holy things, he and his sons for ever, to burn incense before the '
  - type: text
    content: LORD
  - type: text
    content: ', to minister unto him, and to bless in his name for ever. '
  '14':
  - type: text
    content: 'Now '
  - type: text
    content: concerning
  - type: text
    content: ' Moses the man of God, his sons were named of the tribe of Levi. '
  '15':
  - type: text
    content: 'The sons of Moses '
  - type: text
    content: were
  - type: text
    content: ', Gershom, and Eliezer. '
  '16':
  - type: text
    content: 'Of the sons of Gershom, Shebuel '
  - type: text
    content: was
  - type: text
    content: ' the chief. '
  '17':
  - type: text
    content: 'And the sons of Eliezer '
  - type: text
    content: were
  - type: text
    content: ', Rehabiah the chief. And Eliezer had none other sons; but the sons of Rehabiah were very many. '
  '18':
  - type: text
    content: 'Of the sons of Izhar; Shelomith the chief. '
  '19':
  - type: text
    content: 'Of the sons of Hebron; Jeriah the first, Amariah the second, Jahaziel the third, and Jekameam the fourth. '
  '2':
  - type: text
    content: 'And he gathered together all the princes of Israel, with the priests and the Levites. '
  '20':
  - type: text
    content: Of the sons of Uzziel; Micah the first, and Jesiah the second.
  '21':
  - type: text
    content: 'The sons of Merari; Mahli, and Mushi. The sons of Mahli; Eleazar, and Kish. '
  '22':
  - type: text
    content: 'And Eleazar died, and had no sons, but daughters: and their brethren the sons of Kish took them. '
  '23':
  - type: text
    content: The sons of Mushi; Mahli, and Eder, and Jeremoth, three.
  '24':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Levi after the house of their fathers; '
  - type: text
    content: even
  - type: text
    content: ' the chief of the fathers, as they were counted by number of names by their polls, that did the work for the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', from the age of twenty years and upward. '
  '25':
  - type: text
    content: 'For David said, The '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel hath given rest unto his people, that they may dwell in Jerusalem for ever: '
  '26':
  - type: text
    content: 'and also unto the Levites; they shall no '
  - type: text
    content: more
  - type: text
    content: ' carry the tabernacle, nor any vessels of it for the service thereof. '
  '27':
  - type: text
    content: 'For by the last words of David the Levites '
  - type: text
    content: were
  - type: text
    content: ' numbered from twenty years old and above: '
  '28':
  - type: text
    content: 'because their office '
  - type: text
    content: was
  - type: text
    content: ' to wait on the sons of Aaron for the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', in the courts, and in the chambers, and in the purifying of all holy things, and the work of the service of the house of God; '
  '29':
  - type: text
    content: 'both for the shewbread, and for the fine flour for meat offering, and for the unleavened cakes, and for '
  - type: text
    content: that which is baked in
  - type: text
    content: ' the pan, and for that which is fried, and for all manner of measure and size; '
  '3':
  - type: text
    content: 'Now the Levites were numbered from the age of thirty years and upward: and their number by their polls, man by man, was thirty and eight thousand. '
  '30':
  - type: text
    content: 'and to stand every morning to thank and praise the '
  - type: text
    content: LORD
  - type: text
    content: ', and likewise at even; '
  '31':
  - type: text
    content: 'and to offer all burnt sacrifices unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in the sabbaths, in the new moons, and on the set feasts, by number, according to the order commanded unto them, continually before the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '32':
  - type: text
    content: 'and that they should keep the charge of the tabernacle of the congregation, and the charge of the holy '
  - type: text
    content: place
  - type: text
    content: ', and the charge of the sons of Aaron their brethren, in the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '4':
  - type: text
    content: 'Of which, twenty and four thousand '
  - type: text
    content: were
  - type: text
    content: ' to set forward the work of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '; and six thousand '
  - type: text
    content: were
  - type: text
    content: ' officers and judges: '
  '5':
  - type: text
    content: 'moreover four thousand '
  - type: text
    content: were
  - type: text
    content: ' porters; and four thousand praised the '
  - type: text
    content: LORD
  - type: text
    content: ' with the instruments which I made, '
  - type: text
    content: said David
  - type: text
    content: ', to praise '
  - type: text
    content: therewith
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And David divided them into courses among the sons of Levi, '
  - type: text
    content: namely
  - type: text
    content: ', Gershon, Kohath, and Merari.'
  '7':
  - type: text
    content: 'Of the Gershonites '
  - type: text
    content: were
  - type: text
    content: ', Laadan, and Shimei. '
  '8':
  - type: text
    content: 'The sons of Laadan; the chief '
  - type: text
    content: was
  - type: text
    content: ' Jehiel, and Zetham, and Joel, three. '
  '9':
  - type: text
    content: 'The sons of Shimei; Shelomith, and Haziel, and Haran, three. These '
  - type: text
    content: were
  - type: text
    content: ', the chief of the fathers of Laadan. '
