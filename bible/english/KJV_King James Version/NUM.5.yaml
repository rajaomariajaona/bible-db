document_id: NUM.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Various Laws
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And every man''s hallowed things shall be his: whatsoever any man giveth the priest, it shall be his.'
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '12':
  - type: text
    content: 'Speak unto the children of Israel, and say unto them, If any man''s wife go aside, and commit a trespass against him, '
  '13':
  - type: text
    content: 'and a man lie with her carnally, and it be hid from the eyes of her husband, and be kept close, and she be defiled, and '
  - type: text
    content: there be
  - type: text
    content: ' no witness against her, neither she be taken '
  - type: text
    content: with the manner
  - type: text
    content: '; '
  '14':
  - type: text
    content: 'and the spirit of jealousy come upon him, and he be jealous of his wife, and she be defiled: or if the spirit of jealousy come upon him, and he be jealous of his wife, and she be not defiled; '
  '15':
  - type: text
    content: 'then shall the man bring his wife unto the priest, and he shall bring her offering for her, the tenth '
  - type: text
    content: part
  - type: text
    content: ' of an ephah of barley meal; he shall pour no oil upon it, nor put frankincense thereon; for it '
  - type: text
    content: is
  - type: text
    content: ' an offering of jealousy, an offering of memorial, bringing iniquity to remembrance.'
  '16':
  - type: text
    content: 'And the priest shall bring her near, and set her before the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '17':
  - type: text
    content: 'and the priest shall take holy water in an earthen vessel; and of the dust that is in the floor of the tabernacle the priest shall take, and put '
  - type: text
    content: it
  - type: text
    content: ' into the water: '
  '18':
  - type: text
    content: 'and the priest shall set the woman before the '
  - type: text
    content: LORD
  - type: text
    content: ', and uncover the woman''s head, and put the offering of memorial in her hands, which '
  - type: text
    content: is
  - type: text
    content: ' the jealousy offering: and the priest shall have in his hand the bitter water that causeth the curse: '
  '19':
  - type: text
    content: 'and the priest shall charge her by an oath, and say unto the woman, If no man have lain with thee, and if thou hast not gone aside to uncleanness '
  - type: text
    content: with another
  - type: text
    content: ' instead of thy husband, be thou free from this bitter water that causeth the curse: '
  '2':
  - type: text
    content: 'Command the children of Israel, that they put out of the camp every leper, and every one that hath an issue, and whosoever is defiled by the dead: '
  '20':
  - type: text
    content: 'but if thou hast gone aside '
  - type: text
    content: to another
  - type: text
    content: ' instead of thy husband, and if thou be defiled, and some man have lain with thee beside thine husband: '
  '21':
  - type: text
    content: 'then the priest shall charge the woman with an oath of cursing, and the priest shall say unto the woman, The '
  - type: text
    content: LORD
  - type: text
    content: ' make thee a curse and an oath among thy people, when the '
  - type: text
    content: LORD
  - type: text
    content: ' doth make thy thigh to rot, and thy belly to swell; '
  '22':
  - type: text
    content: 'and this water that causeth the curse shall go into thy bowels, to make '
  - type: text
    content: thy
  - type: text
    content: ' belly to swell, and '
  - type: text
    content: thy
  - type: text
    content: ' thigh to rot: And the woman shall say, Amen, amen.'
  '23':
  - type: text
    content: 'And the priest shall write these curses in a book, and he shall blot '
  - type: text
    content: them
  - type: text
    content: ' out with the bitter water: '
  '24':
  - type: text
    content: 'and he shall cause the woman to drink the bitter water that causeth the curse: and the water that causeth the curse shall enter into her, '
  - type: text
    content: and become
  - type: text
    content: ' bitter. '
  '25':
  - type: text
    content: 'Then the priest shall take the jealousy offering out of the woman''s hand, and shall wave the offering before the '
  - type: text
    content: LORD
  - type: text
    content: ', and offer it upon the altar: '
  '26':
  - type: text
    content: 'and the priest shall take an handful of the offering, '
  - type: text
    content: even
  - type: text
    content: ' the memorial thereof, and burn '
  - type: text
    content: it
  - type: text
    content: ' upon the altar, and afterward shall cause the woman to drink the water. '
  '27':
  - type: text
    content: 'And when he hath made her to drink the water, then it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ', if she be defiled, and have done trespass against her husband, that the water that causeth the curse shall enter into her, '
  - type: text
    content: and become
  - type: text
    content: ' bitter, and her belly shall swell, and her thigh shall rot: and the woman shall be a curse among her people. '
  '28':
  - type: text
    content: And if the woman be not defiled, but be clean; then she shall be free, and shall conceive seed.
  '29':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the law of jealousies, when a wife goeth aside '
  - type: text
    content: to another
  - type: text
    content: ' instead of her husband, and is defiled; '
  '3':
  - type: text
    content: 'both male and female shall ye put out, without the camp shall ye put them; that they defile not their camps, in the midst whereof I dwell. '
  '30':
  - type: text
    content: 'or when the spirit of jealousy cometh upon him, and he be jealous over his wife, and shall set the woman before the '
  - type: text
    content: LORD
  - type: text
    content: ', and the priest shall execute upon her all this law. '
  '31':
  - type: text
    content: Then shall the man be guiltless from iniquity, and this woman shall bear her iniquity.
  '4':
  - type: text
    content: 'And the children of Israel did so, and put them out without the camp: as the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, so did the children of Israel.'
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '6':
  - type: text
    content: 'Speak unto the children of Israel, When a man or woman shall commit any sin that men commit, to do a trespass against the '
  - type: text
    content: LORD
  - type: text
    content: ', and that person be guilty; '
  '7':
  - type: text
    content: 'then they shall confess their sin which they have done: and he shall recompense his trespass with the principal thereof, and add unto it the fifth '
  - type: text
    content: part
  - type: text
    content: ' thereof, and give '
  - type: text
    content: it
  - type: text
    content: ' unto '
  - type: text
    content: him
  - type: text
    content: ' against whom he hath trespassed. '
  '8':
  - type: text
    content: 'But if the man have no kinsman to recompense the trespass unto, let the trespass be recompensed unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' to the priest; beside the ram of the atonement, whereby an atonement shall be made for him. '
  '9':
  - type: text
    content: 'And every offering of all the holy things of the children of Israel, which they bring unto the priest, shall be his. '
