document_id: NUM.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Various Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Command the children of Israel, that they put out of the camp every leper, and every one that hath an issue, and whosoever is defiled by the dead: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'both male and female shall ye put out, without the camp shall ye put them; that they defile not their camps, in the midst whereof I dwell. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the children of Israel did so, and put them out without the camp: as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, so did the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Speak unto the children of Israel, When a man or woman shall commit any sin that men commit, to do a trespass against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and that person be guilty; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'then they shall confess their sin which they have done: and he shall recompense his trespass with the principal thereof, and add unto it the fifth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' thereof, and give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' against whom he hath trespassed. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if the man have no kinsman to recompense the trespass unto, let the trespass be recompensed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the priest; beside the ram of the atonement, whereby an atonement shall be made for him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And every offering of all the holy things of the children of Israel, which they bring unto the priest, shall be his. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And every man''s hallowed things shall be his: whatsoever any man giveth the priest, it shall be his.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Speak unto the children of Israel, and say unto them, If any man''s wife go aside, and commit a trespass against him, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and a man lie with her carnally, and it be hid from the eyes of her husband, and be kept close, and she be defiled, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be
  - type: text
    text: ' no witness against her, neither she be taken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with the manner
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and the spirit of jealousy come upon him, and he be jealous of his wife, and she be defiled: or if the spirit of jealousy come upon him, and he be jealous of his wife, and she be not defiled; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'then shall the man bring his wife unto the priest, and he shall bring her offering for her, the tenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of an ephah of barley meal; he shall pour no oil upon it, nor put frankincense thereon; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an offering of jealousy, an offering of memorial, bringing iniquity to remembrance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the priest shall bring her near, and set her before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the priest shall take holy water in an earthen vessel; and of the dust that is in the floor of the tabernacle the priest shall take, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the water: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the priest shall set the woman before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and uncover the woman''s head, and put the offering of memorial in her hands, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the jealousy offering: and the priest shall have in his hand the bitter water that causeth the curse: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and the priest shall charge her by an oath, and say unto the woman, If no man have lain with thee, and if thou hast not gone aside to uncleanness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with another
  - type: text
    text: ' instead of thy husband, be thou free from this bitter water that causeth the curse: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but if thou hast gone aside '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to another
  - type: text
    text: ' instead of thy husband, and if thou be defiled, and some man have lain with thee beside thine husband: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'then the priest shall charge the woman with an oath of cursing, and the priest shall say unto the woman, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' make thee a curse and an oath among thy people, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' doth make thy thigh to rot, and thy belly to swell; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and this water that causeth the curse shall go into thy bowels, to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' belly to swell, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' thigh to rot: And the woman shall say, Amen, amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the priest shall write these curses in a book, and he shall blot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out with the bitter water: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and he shall cause the woman to drink the bitter water that causeth the curse: and the water that causeth the curse shall enter into her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and become
  - type: text
    text: ' bitter. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then the priest shall take the jealousy offering out of the woman''s hand, and shall wave the offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and offer it upon the altar: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and the priest shall take an handful of the offering, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the memorial thereof, and burn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the altar, and afterward shall cause the woman to drink the water. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when he hath made her to drink the water, then it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', if she be defiled, and have done trespass against her husband, that the water that causeth the curse shall enter into her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and become
  - type: text
    text: ' bitter, and her belly shall swell, and her thigh shall rot: and the woman shall be a curse among her people. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And if the woman be not defiled, but be clean; then she shall be free, and shall conceive seed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of jealousies, when a wife goeth aside '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to another
  - type: text
    text: ' instead of her husband, and is defiled; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'or when the spirit of jealousy cometh upon him, and he be jealous over his wife, and shall set the woman before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the priest shall execute upon her all this law. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then shall the man be guiltless from iniquity, and this woman shall bear her iniquity.
