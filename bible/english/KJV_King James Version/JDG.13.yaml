document_id: JDG.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the children of Israel did evil again in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' delivered them into the hand of the Philistines forty years.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the woman made haste, and ran, and shewed her husband, and said unto him, Behold, the man hath appeared unto me, that came unto me the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' day. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Manoah arose, and went after his wife, and came to the man, and said unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou the man that spakest unto the woman? And he said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Manoah said, Now let thy words come to pass. How shall we order the child, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: how
    - type: text
      text: ' shall we do unto him? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Manoah, Of all that I said unto the woman let her beware. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'She may not eat of any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' that cometh of the vine, neither let her drink wine or strong drink, nor eat any unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thing:'
    - type: text
      text: ' all that I commanded her let her observe.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Manoah said unto the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I pray thee, let us detain thee, until we shall have made ready a kid for thee. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Manoah, Though thou detain me, I will not eat of thy bread: and if thou wilt offer a burnt offering, thou must offer it unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. For Manoah knew not that he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' an angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Manoah said unto the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy name, that when thy sayings come to pass we may do thee honour? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, Why askest thou thus after my name, seeing it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' secret? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Manoah took a kid with a meat offering, and offered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon a rock unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the angel
    - type: text
      text: ' did wondrously; and Manoah and his wife looked on. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And there was a certain man of Zorah, of the family of the Danites, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Manoah; and his wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' barren, and bare not. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For it came to pass, when the flame went up toward heaven from off the altar, that the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' ascended in the flame of the altar. And Manoah and his wife looked on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and fell on their faces to the ground.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did no more appear to Manoah and to his wife. Then Manoah knew that he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' an angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Manoah said unto his wife, We shall surely die, because we have seen God. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But his wife said unto him, If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' were pleased to kill us, he would not have received a burnt offering and a meat offering at our hands, neither would he have shewed us all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', nor would as at this time have told us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such things
    - type: text
      text: ' as these. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the woman bare a son, and called his name Samson: and the child grew, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' blessed him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' began to move him at times in the camp of Dan between Zorah and Eshtaol.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared unto the woman, and said unto her, Behold now, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' barren, and bearest not: but thou shalt conceive, and bear a son. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now therefore beware, I pray thee, and drink not wine nor strong drink, and eat not any unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thing:'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'for, lo, thou shalt conceive, and bear a son; and no razor shall come on his head: for the child shall be a Nazarite unto God from the womb: and he shall begin to deliver Israel out of the hand of the Philistines. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the woman came and told her husband, saying, A man of God came unto me, and his countenance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like the countenance of an angel of God, very terrible: but I asked him not whence he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ', neither told he me his name: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'but he said unto me, Behold, thou shalt conceive, and bear a son; and now drink no wine nor strong drink, neither eat any unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thing:'
    - type: text
      text: ' for the child shall be a Nazarite to God from the womb to the day of his death.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Manoah intreated the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, O my Lord, let the man of God which thou didst send come again unto us, and teach us what we shall do unto the child that shall be born. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And God hearkened to the voice of Manoah; and the angel of God came again unto the woman as she sat in the field: but Manoah her husband '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not with her. '
