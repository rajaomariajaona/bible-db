document_id: PSA.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician upon Sheminith, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Help, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; for the godly man ceaseth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the faithful fail from among the children of men.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They speak vanity every one with his neighbour:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: With
    - type: text
      text: ' flattering lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' with a double heart do they speak.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall cut off all flattering lips,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the tongue that speaketh proud things:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who have said, With our tongue will we prevail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Our lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' our own: who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' lord over us?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the oppression of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the sighing of the needy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now will I arise, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' in safety '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from him that
    - type: text
      text: ' puffeth at him.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' pure words:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' silver tried in a furnace of earth, purified seven times.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt keep them, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt preserve them from this generation for ever.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked walk on every side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the vilest men are exalted.
