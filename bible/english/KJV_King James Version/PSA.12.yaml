verses:
  '1':
  - type: text
    content: To the chief Musician upon Sheminith, A Psalm of David.
  - type: text
    content: 'Help, '
  - type: text
    content: LORD
  - type: text
    content: ; for the godly man ceaseth;
  - type: text
    content: For the faithful fail from among the children of men.
  '2':
  - type: text
    content: 'They speak vanity every one with his neighbour:'
  - type: text
    content: With
  - type: text
    content: ' flattering lips '
  - type: text
    content: and
  - type: text
    content: ' with a double heart do they speak.'
  '3':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall cut off all flattering lips,'
  - type: text
    content: And
  - type: text
    content: ' the tongue that speaketh proud things:'
  '4':
  - type: text
    content: Who have said, With our tongue will we prevail;
  - type: text
    content: 'Our lips '
  - type: text
    content: are
  - type: text
    content: ' our own: who '
  - type: text
    content: is
  - type: text
    content: ' lord over us?'
  '5':
  - type: text
    content: For the oppression of the poor,
  - type: text
    content: For the sighing of the needy,
  - type: text
    content: 'Now will I arise, saith the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'I will set '
  - type: text
    content: him
  - type: text
    content: ' in safety '
  - type: text
    content: from him that
  - type: text
    content: ' puffeth at him.'
  '6':
  - type: text
    content: 'The words of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' pure words:'
  - type: text
    content: As
  - type: text
    content: ' silver tried in a furnace of earth, purified seven times.'
  '7':
  - type: text
    content: 'Thou shalt keep them, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: Thou shalt preserve them from this generation for ever.
  '8':
  - type: text
    content: The wicked walk on every side,
  - type: text
    content: When the vilest men are exalted.
