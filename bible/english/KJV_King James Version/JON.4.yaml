type_code: eng
verses:
  '1':
  - type: heading
    content: The Prophet's Education
  - type: text
    content: 'But it displeased Jonah exceedingly, and he was very angry. '
  '10':
  - type: text
    content: 'Then said the '
  - type: text
    content: LORD
  - type: text
    content: ', Thou hast had pity on the gourd, for the which thou hast not laboured, neither madest it grow; which came up in a night, and perished in a night: '
  '11':
  - type: text
    content: 'and should not I spare Nineveh, that great city, wherein are more than sixscore thousand persons that cannot discern between their right hand and their left hand; and '
  - type: text
    content: also
  - type: text
    content: ' much cattle?'
  '2':
  - type: text
    content: 'And he prayed unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, I pray thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: was
  - type: text
    content: ' not this my saying, when I was yet in my country? Therefore I fled before unto Tarshish: for I knew that thou '
  - type: text
    content: art
  - type: text
    content: ' a gracious God, and merciful, slow to anger, and of great kindness, and repentest thee of the evil. '
  '3':
  - type: text
    content: 'Therefore now, O '
  - type: text
    content: LORD
  - type: text
    content: ', take, I beseech thee, my life from me; for '
  - type: text
    content: it is
  - type: text
    content: ' better for me to die than to live. '
  '4':
  - type: text
    content: 'Then said the '
  - type: text
    content: LORD
  - type: text
    content: ', Doest thou well to be angry? '
  '5':
  - type: text
    content: So Jonah went out of the city, and sat on the east side of the city, and there made him a booth, and sat under it in the shadow, till he might see what would become of the city.
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God prepared a gourd, and made '
  - type: text
    content: it
  - type: text
    content: ' to come up over Jonah, that it might be a shadow over his head, to deliver him from his grief. So Jonah was exceeding glad of the gourd. '
  '7':
  - type: text
    content: 'But God prepared a worm when the morning rose the next day, and it smote the gourd that it withered. '
  '8':
  - type: text
    content: 'And it came to pass, when the sun did arise, that God prepared a vehement east wind; and the sun beat upon the head of Jonah, that he fainted, and wished in himself to die, and said, '
  - type: text
    content: It is
  - type: text
    content: ' better for me to die than to live.'
  '9':
  - type: text
    content: 'And God said to Jonah, Doest thou well to be angry for the gourd? And he said, I do well to be angry, '
  - type: text
    content: even
  - type: text
    content: ' unto death. '
