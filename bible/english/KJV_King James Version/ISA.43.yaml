document_id: ISA.43
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But now thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that created thee, O Jacob, and he that formed thee, O Israel, Fear not: for I have redeemed thee, I have called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' by thy name; thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' mine. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When thou passest through the waters, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' with thee; and through the rivers, they shall not overflow thee: when thou walkest through the fire, thou shalt not be burned; neither shall the flame kindle upon thee. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, the Holy One of Israel, thy Saviour: I gave Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' thy ransom, Ethiopia and Seba for thee. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Since thou wast precious in my sight, thou hast been honourable, and I have loved thee: therefore will I give men for thee, and people for thy life. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fear not: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with thee: I will bring thy seed from the east, and gather thee from the west; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will say to the north, Give up; and to the south, Keep not back: bring my sons from far, and my daughters from the ends of the earth; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' every one that is called by my name: for I have created him for my glory, I have formed him; yea, I have made him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Bring forth the blind people that have eyes, and the deaf that have ears. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Let all the nations be gathered together, and let the people be assembled: who among them can declare this, and shew us former things? let them bring forth their witnesses, that they may be justified: or let them hear, and say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' truth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my witnesses, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and my servant whom I have chosen: that ye may know and believe me, and understand that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he: before me there was no God formed, neither shall there be after me. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and beside me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no saviour. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I have declared, and have saved, and I have shewed, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no strange '
  - type: usfm
    marker: add
    children:
    - type: text
      text: god
  - type: text
    text: ' among you: therefore ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my witnesses, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' God. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yea, before the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none that can deliver out of my hand: I will work, and who shall let it?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fall of Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', your redeemer, the Holy One of Israel; For your sake I have sent to Babylon, and have brought down all their nobles, and the Chaldeans, whose cry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the ships. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', your Holy One, the creator of Israel, your King. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which maketh a way in the sea, and a path in the mighty waters; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'which bringeth forth the chariot and horse, the army and the power; they shall lie down together, they shall not rise: they are extinct, they are quenched as tow. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Remember ye not the former things, neither consider the things of old. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Behold, I will do a new thing; now it shall spring forth; shall ye not know it? I will even make a way in the wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' rivers in the desert. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The beast of the field shall honour me, the dragons and the owls: because I give waters in the wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' rivers in the desert, to give drink to my people, my chosen. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: This people have I formed for myself; they shall shew forth my praise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But thou hast not called upon me, O Jacob; but thou hast been weary of me, O Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Thou hast not brought me the small cattle of thy burnt offerings; neither hast thou honoured me with thy sacrifices. I have not caused thee to serve with an offering, nor wearied thee with incense. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Thou hast bought me no sweet cane with money, neither hast thou filled me with the fat of thy sacrifices: but thou hast made me to serve with thy sins, thou hast wearied me with thine iniquities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he that blotteth out thy transgressions for mine own sake, and will not remember thy sins. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Put me in remembrance: let us plead together: declare thou, that thou mayest be justified. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Thy first father hath sinned, and thy teachers have transgressed against me. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Therefore I have profaned the princes of the sanctuary, and have given Jacob to the curse, and Israel to reproaches.
