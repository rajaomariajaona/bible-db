  - type: text
    content: ' thy ransom, Ethiopia and Seba for thee. '
  '4':
  - type: text
    content: 'Since thou wast precious in my sight, thou hast been honourable, and I have loved thee: therefore will I give men for thee, and people for thy life. '
  '5':
  - type: text
    content: 'Fear not: for I '
  - type: text
    content: am
  - type: text
    content: ' with thee: I will bring thy seed from the east, and gather thee from the west; '
  '6':
  - type: text
    content: 'I will say to the north, Give up; and to the south, Keep not back: bring my sons from far, and my daughters from the ends of the earth; '
  '7':
  - type: text
    content: even
  - type: text
    content: ' every one that is called by my name: for I have created him for my glory, I have formed him; yea, I have made him.'
  '8':
  - type: text
    content: 'Bring forth the blind people that have eyes, and the deaf that have ears. '
  '9':
  - type: text
    content: 'Let all the nations be gathered together, and let the people be assembled: who among them can declare this, and shew us former things? let them bring forth their witnesses, that they may be justified: or let them hear, and say, '
