  - type: text
    content: 'Remember ye not the former things, neither consider the things of old. '
  '19':
  - type: text
    content: 'Behold, I will do a new thing; now it shall spring forth; shall ye not know it? I will even make a way in the wilderness, '
  - type: text
    content: and
  - type: text
