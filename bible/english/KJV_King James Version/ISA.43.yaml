  - type: text
    content: ' I, '
  - type: text
    content: am
  - type: text
    content: ' he that blotteth out thy transgressions for mine own sake, and will not remember thy sins. '
  '26':
  - type: text
    content: 'Put me in remembrance: let us plead together: declare thou, that thou mayest be justified. '
  '27':
  - type: text
    content: 'Thy first father hath sinned, and thy teachers have transgressed against me. '
  '28':
  - type: text
    content: Therefore I have profaned the princes of the sanctuary, and have given Jacob to the curse, and Israel to reproaches.
  '3':
  - type: text
    content: 'For I '
  - type: text
