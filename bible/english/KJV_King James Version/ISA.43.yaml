  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', which maketh a way in the sea, and a path in the mighty waters; '
  '17':
  - type: text
    content: 'which bringeth forth the chariot and horse, the army and the power; they shall lie down together, they shall not rise: they are extinct, they are quenched as tow. '
