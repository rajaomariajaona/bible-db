    content: 'When thou passest through the waters, I '
  - type: text
    content: will be
  - type: text
    content: ' with thee; and through the rivers, they shall not overflow thee: when thou walkest through the fire, thou shalt not be burned; neither shall the flame kindle upon thee. '
  '20':
  - type: text
    content: 'The beast of the field shall honour me, the dragons and the owls: because I give waters in the wilderness, '
  - type: text
    content: and
  - type: text
    content: ' rivers in the desert, to give drink to my people, my chosen. '
  '21':
  - type: text
    content: This people have I formed for myself; they shall shew forth my praise.
  '22':
  - type: text
    content: 'But thou hast not called upon me, O Jacob; but thou hast been weary of me, O Israel. '
  '23':
  - type: text
    content: 'Thou hast not brought me the small cattle of thy burnt offerings; neither hast thou honoured me with thy sacrifices. I have not caused thee to serve with an offering, nor wearied thee with incense. '
  '24':
  - type: text
    content: 'Thou hast bought me no sweet cane with money, neither hast thou filled me with the fat of thy sacrifices: but thou hast made me to serve with thy sins, thou hast wearied me with thine iniquities.'
  '25':
  - type: text
    content: 'I, '
  - type: text
