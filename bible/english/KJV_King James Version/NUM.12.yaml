document_id: NUM.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Miriam and Aaron
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Miriam and Aaron spake against Moses because of the Ethiopian woman whom he had married: for he had married an Ethiopian woman. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the cloud departed from off the tabernacle; and, behold, Miriam '
    - type: usfm
      marker: add
      children:
      - type: text
        text: became
    - type: text
      text: ' leprous, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: white
    - type: text
      text: ' as snow: and Aaron looked upon Miriam, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: she was
    - type: text
      text: ' leprous. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Aaron said unto Moses, Alas, my lord, I beseech thee, lay not the sin upon us, wherein we have done foolishly, and wherein we have sinned. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let her not be as one dead, of whom the flesh is half consumed when he cometh out of his mother''s womb. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Moses cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Heal her now, O God, I beseech thee. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, If her father had but spit in her face, should she not be ashamed seven days? let her be shut out from the camp seven days, and after that let her be received in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Miriam was shut out from the camp seven days: and the people journeyed not till Miriam was brought in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And afterward the people removed from Hazeroth, and pitched in the wilderness of Paran.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And they said, Hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' indeed spoken only by Moses? hath he not spoken also by us? And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '(Now the man Moses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' very meek, above all the men which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the face of the earth.)'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake suddenly unto Moses, and unto Aaron, and unto Miriam, Come out ye three unto the tabernacle of the congregation. And they three came out. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came down in the pillar of the cloud, and stood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the door of the tabernacle, and called Aaron and Miriam: and they both came forth. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he said, Hear now my words: If there be a prophet among you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will make myself known unto him in a vision, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' will speak unto him in a dream. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'My servant Moses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not so, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' faithful in all mine house. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'With him will I speak mouth to mouth, even apparently, and not in dark speeches; and the similitude of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall he behold: wherefore then were ye not afraid to speak against my servant Moses?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was kindled against them; and he departed. '
