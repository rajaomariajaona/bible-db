document_id: MAT.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parables of the Kingdom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The same day went Jesus out of the house, and sat by the sea side. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the disciples came, and said unto him, Why speakest thou unto them in parables? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Because it is given unto you to know the mysteries of the kingdom of heaven, but to them it is not given.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For whosoever hath, to him shall be given, and he shall have more abundance: but whosoever hath not, from him shall be taken away even that he hath.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Therefore speak I to them in parables: because they seeing see not; and hearing they hear not, neither do they understand.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And in them is fulfilled the prophecy of Esaias, which saith,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: By hearing ye shall hear, and shall not understand;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And seeing ye shall see, and shall not perceive:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For this people's heart is waxed gross
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' ears are dull of hearing,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And their eyes they have closed;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Lest at any time they should see with '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' eyes,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And hear with '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' ears,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And should understand with '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' heart,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And should be converted, and I should heal them.
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' your eyes, for they see: and your ears, for they hear.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For verily I say unto you, That many prophets and righteous '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' have desired to see '
      - type: usfm
        marker: add
        children:
        - type: text
          text: those things
      - type: text
        text: ' which ye see, and have not seen '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: '; and to hear '
      - type: usfm
        marker: add
        children:
        - type: text
          text: those things
      - type: text
        text: ' which ye hear, and have not heard '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Hear ye therefore the parable of the sower.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When any one heareth the word of the kingdom, and understandeth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' not, then cometh the wicked one, and catcheth away that which was sown in his heart. This is he which received seed by the way side.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And great multitudes were gathered together unto him, so that he went into a ship, and sat; and the whole multitude stood on the shore.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Sower
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But he that received the seed into stony places, the same is he that heareth the word, and anon with joy receiveth it;
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'yet hath he not root in himself, but dureth for a while: for when tribulation or persecution ariseth because of the word, by and by he is offended.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He also that received seed among the thorns is he that heareth the word; and the care of this world, and the deceitfulness of riches, choke the word, and he becometh unfruitful.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But he that received seed into the good ground is he that heareth the word, and understandeth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ; which also beareth fruit, and bringeth forth, some an hundredfold, some sixty, some thirty.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Tares
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Another parable put he forth unto them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The kingdom of heaven is likened unto a man which sowed good seed in his field:'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but while men slept, his enemy came and sowed tares among the wheat, and went his way.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when the blade was sprung up, and brought forth fruit, then appeared the tares also.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the servants of the householder came and said unto him, Sir, didst not thou sow good seed in thy field? from whence then hath it tares?
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He said unto them, An enemy hath done this. The servants said unto him, Wilt thou then that we go and gather them up?
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But he said, Nay; lest while ye gather up the tares, ye root up also the wheat with them.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spake many things unto them in parables, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold, a sower went forth to sow;
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Let both grow together until the harvest: and in the time of harvest I will say to the reapers, Gather ye together first the tares, and bind them in bundles to burn them: but gather the wheat into my barn.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Mustard Seed
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Another parable put he forth unto them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The kingdom of heaven is like to a grain of mustard seed, which a man took, and sowed in his field:'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'which indeed is the least of all seeds: but when it is grown, it is the greatest among herbs, and becometh a tree, so that the birds of the air come and lodge in the branches thereof.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Leaven
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Another parable spake he unto them; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The kingdom of heaven is like unto leaven, which a woman took, and hid in three measures of meal, till the whole was leavened.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these things spake Jesus unto the multitude in parables; and without a parable spake he not unto them: '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That it might be fulfilled which was spoken by the prophet, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will open my mouth in parables;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will utter things which have been kept secret from the foundation of the world.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Tares Explained
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus sent the multitude away, and went into the house: and his disciples came unto him, saying, Declare unto us the parable of the tares of the field. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that soweth the good seed is the Son of man;
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the field is the world; the good seed are the children of the kingdom; but the tares are the children of the wicked one;
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the enemy that sowed them is the devil; the harvest is the end of the world; and the reapers are the angels.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and when he sowed, some '
      - type: usfm
        marker: add
        children:
        - type: text
          text: seeds
      - type: text
        text: ' fell by the way side, and the fowls came and devoured them up:'
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As therefore the tares are gathered and burned in the fire; so shall it be in the end of this world.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Son of man shall send forth his angels, and they shall gather out of his kingdom all things that offend, and them which do iniquity;
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and shall cast them into a furnace of fire: there shall be wailing and gnashing of teeth.'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then shall the righteous shine forth as the sun in the kingdom of their Father. Who hath ears to hear, let him hear.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Treasures
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Again, the kingdom of heaven is like unto treasure hid in a field; the which when a man hath found, he hideth, and for joy thereof goeth and selleth all that he hath, and buyeth that field.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Again, the kingdom of heaven is like unto a merchant man, seeking goodly pearls:'
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who, when he had found one pearl of great price, went and sold all that he had, and bought it.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Drag-net
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Again, the kingdom of heaven is like unto a net, that was cast into the sea, and gathered of every kind:'
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: which, when it was full, they drew to shore, and sat down, and gathered the good into vessels, but cast the bad away.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So shall it be at the end of the world: the angels shall come forth, and sever the wicked from among the just,'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'some fell upon stony places, where they had not much earth: and forthwith they sprung up, because they had no deepness of earth:'
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and shall cast them into the furnace of fire: there shall be wailing and gnashing of teeth'
    - type: text
      text: '. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Have ye understood all these things?
    - type: text
      text: ' They say unto him, Yea, Lord. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Therefore every scribe '
      - type: usfm
        marker: add
        children:
        - type: text
          text: which is
      - type: text
        text: ' instructed unto the kingdom of heaven is like unto a man '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that is
      - type: text
        text: ' an householder, which bringeth forth out of his treasure '
      - type: usfm
        marker: add
        children:
        - type: text
          text: things
      - type: text
        text: ' new and old.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' when Jesus had finished these parables, he departed thence.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rejection
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was come into his own country, he taught them in their synagogue, insomuch that they were astonished, and said, Whence hath this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' this wisdom, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' mighty works? '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is not this the carpenter''s son? is not his mother called Mary? and his brethren, James, and Joses, and Simon, and Judas? '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his sisters, are they not all with us? Whence then hath this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' all these things? '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were offended in him. But Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A prophet is not without honour, save in his own country, and in his own house.
    - type: text
      text: ' '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he did not many mighty works there because of their unbelief.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and when the sun was up, they were scorched; and because they had no root, they withered away.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And some fell among thorns; and the thorns sprung up, and choked them:'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but other fell into good ground, and brought forth fruit, some an hundredfold, some sixtyfold, some thirtyfold.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Who hath ears to hear, let him hear.
