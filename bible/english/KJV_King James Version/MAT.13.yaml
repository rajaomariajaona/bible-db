document_id: MAT.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Parables of the Kingdom
  - type: text
    content: 'The same day went Jesus out of the house, and sat by the sea side. '
  '10':
  - type: text
    content: 'And the disciples came, and said unto him, Why speakest thou unto them in parables? '
  '11':
  - type: text
    content: 'He answered and said unto them, '
  - type: text
    content: Because it is given unto you to know the mysteries of the kingdom of heaven, but to them it is not given.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'For whosoever hath, to him shall be given, and he shall have more abundance: but whosoever hath not, from him shall be taken away even that he hath.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Therefore speak I to them in parables: because they seeing see not; and hearing they hear not, neither do they understand.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: And in them is fulfilled the prophecy of Esaias, which saith,
  - type: text
    content: By hearing ye shall hear, and shall not understand;
  - type: text
    content: 'And seeing ye shall see, and shall not perceive:'
  '15':
  - type: text
    content: ' '
  - type: text
    content: For this people's heart is waxed gross
  - type: text
    content: ','
  - type: text
    content: 'And '
  - type: text
    content: their
  - type: text
    content: ' ears are dull of hearing,'
  - type: text
    content: And their eyes they have closed;
  - type: text
    content: 'Lest at any time they should see with '
  - type: text
    content: their
  - type: text
    content: ' eyes,'
  - type: text
    content: 'And hear with '
  - type: text
    content: their
  - type: text
    content: ' ears,'
  - type: text
    content: 'And should understand with '
  - type: text
    content: their
  - type: text
    content: ' heart,'
  - type: text
    content: And should be converted, and I should heal them.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'But blessed '
  - type: text
    content: are
  - type: text
    content: ' your eyes, for they see: and your ears, for they hear.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'For verily I say unto you, That many prophets and righteous '
  - type: text
    content: men
  - type: text
    content: ' have desired to see '
  - type: text
    content: those things
  - type: text
    content: ' which ye see, and have not seen '
  - type: text
    content: them
  - type: text
    content: '; and to hear '
  - type: text
    content: those things
  - type: text
    content: ' which ye hear, and have not heard '
  - type: text
    content: them
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: text
    content: Hear ye therefore the parable of the sower.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'When any one heareth the word of the kingdom, and understandeth '
  - type: text
    content: it
  - type: text
    content: ' not, then cometh the wicked one, and catcheth away that which was sown in his heart. This is he which received seed by the way side.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: And great multitudes were gathered together unto him, so that he went into a ship, and sat; and the whole multitude stood on the shore.
  - type: heading
    content: The Sower
  '20':
  - type: text
    content: But he that received the seed into stony places, the same is he that heareth the word, and anon with joy receiveth it;
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'yet hath he not root in himself, but dureth for a while: for when tribulation or persecution ariseth because of the word, by and by he is offended.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: He also that received seed among the thorns is he that heareth the word; and the care of this world, and the deceitfulness of riches, choke the word, and he becometh unfruitful.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But he that received seed into the good ground is he that heareth the word, and understandeth '
  - type: text
    content: it
  - type: text
    content: ; which also beareth fruit, and bringeth forth, some an hundredfold, some sixty, some thirty.
  - type: heading
    content: The Tares
  '24':
  - type: text
    content: 'Another parable put he forth unto them, saying, '
  - type: text
    content: 'The kingdom of heaven is likened unto a man which sowed good seed in his field:'
  - type: text
    content: ' '
  '25':
  - type: text
    content: but while men slept, his enemy came and sowed tares among the wheat, and went his way.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But when the blade was sprung up, and brought forth fruit, then appeared the tares also.
  - type: text
    content: ' '
  '27':
  - type: text
    content: So the servants of the householder came and said unto him, Sir, didst not thou sow good seed in thy field? from whence then hath it tares?
  - type: text
    content: ' '
  '28':
  - type: text
    content: He said unto them, An enemy hath done this. The servants said unto him, Wilt thou then that we go and gather them up?
  - type: text
    content: ' '
  '29':
  - type: text
    content: But he said, Nay; lest while ye gather up the tares, ye root up also the wheat with them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And he spake many things unto them in parables, saying, '
  - type: text
    content: Behold, a sower went forth to sow;
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Let both grow together until the harvest: and in the time of harvest I will say to the reapers, Gather ye together first the tares, and bind them in bundles to burn them: but gather the wheat into my barn.'
  - type: heading
    content: Mustard Seed
  '31':
  - type: text
    content: 'Another parable put he forth unto them, saying, '
  - type: text
    content: 'The kingdom of heaven is like to a grain of mustard seed, which a man took, and sowed in his field:'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'which indeed is the least of all seeds: but when it is grown, it is the greatest among herbs, and becometh a tree, so that the birds of the air come and lodge in the branches thereof.'
  - type: heading
    content: Leaven
  '33':
  - type: text
    content: 'Another parable spake he unto them; '
  - type: text
    content: The kingdom of heaven is like unto leaven, which a woman took, and hid in three measures of meal, till the whole was leavened.
  '34':
  - type: text
    content: 'All these things spake Jesus unto the multitude in parables; and without a parable spake he not unto them: '
  '35':
  - type: text
    content: That it might be fulfilled which was spoken by the prophet, saying,
  - type: text
    content: I will open my mouth in parables;
  - type: text
    content: I will utter things which have been kept secret from the foundation of the world.
  - type: heading
    content: The Tares Explained
  '36':
  - type: text
    content: 'Then Jesus sent the multitude away, and went into the house: and his disciples came unto him, saying, Declare unto us the parable of the tares of the field. '
  '37':
  - type: text
    content: 'He answered and said unto them, '
  - type: text
    content: He that soweth the good seed is the Son of man;
  - type: text
    content: ' '
  '38':
  - type: text
    content: the field is the world; the good seed are the children of the kingdom; but the tares are the children of the wicked one;
  - type: text
    content: ' '
  '39':
  - type: text
    content: the enemy that sowed them is the devil; the harvest is the end of the world; and the reapers are the angels.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'and when he sowed, some '
  - type: text
    content: seeds
  - type: text
    content: ' fell by the way side, and the fowls came and devoured them up:'
  - type: text
    content: ' '
  '40':
  - type: text
    content: As therefore the tares are gathered and burned in the fire; so shall it be in the end of this world.
  - type: text
    content: ' '
  '41':
  - type: text
    content: The Son of man shall send forth his angels, and they shall gather out of his kingdom all things that offend, and them which do iniquity;
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'and shall cast them into a furnace of fire: there shall be wailing and gnashing of teeth.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: Then shall the righteous shine forth as the sun in the kingdom of their Father. Who hath ears to hear, let him hear.
  - type: heading
    content: Treasures
  '44':
  - type: text
    content: ' '
  - type: text
    content: Again, the kingdom of heaven is like unto treasure hid in a field; the which when a man hath found, he hideth, and for joy thereof goeth and selleth all that he hath, and buyeth that field.
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'Again, the kingdom of heaven is like unto a merchant man, seeking goodly pearls:'
  - type: text
    content: ' '
  '46':
  - type: text
    content: who, when he had found one pearl of great price, went and sold all that he had, and bought it.
  - type: heading
    content: The Drag-net
  '47':
  - type: text
    content: ' '
  - type: text
    content: 'Again, the kingdom of heaven is like unto a net, that was cast into the sea, and gathered of every kind:'
  - type: text
    content: ' '
  '48':
  - type: text
    content: which, when it was full, they drew to shore, and sat down, and gathered the good into vessels, but cast the bad away.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'So shall it be at the end of the world: the angels shall come forth, and sever the wicked from among the just,'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'some fell upon stony places, where they had not much earth: and forthwith they sprung up, because they had no deepness of earth:'
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'and shall cast them into the furnace of fire: there shall be wailing and gnashing of teeth'
  - type: text
    content: '. '
  '51':
  - type: text
    content: 'Jesus saith unto them, '
  - type: text
    content: Have ye understood all these things?
  - type: text
    content: ' They say unto him, Yea, Lord. '
  '52':
  - type: text
    content: 'Then said he unto them, '
  - type: text
    content: 'Therefore every scribe '
  - type: text
    content: which is
  - type: text
    content: ' instructed unto the kingdom of heaven is like unto a man '
  - type: text
    content: that is
  - type: text
    content: ' an householder, which bringeth forth out of his treasure '
  - type: text
    content: things
  - type: text
    content: ' new and old.'
  '53':
  - type: text
    content: 'And it came to pass, '
  - type: text
    content: that
  - type: text
    content: ' when Jesus had finished these parables, he departed thence.'
  - type: heading
    content: The Rejection
  '54':
  - type: text
    content: 'And when he was come into his own country, he taught them in their synagogue, insomuch that they were astonished, and said, Whence hath this '
  - type: text
    content: man
  - type: text
    content: ' this wisdom, and '
  - type: text
    content: these
  - type: text
    content: ' mighty works? '
  '55':
  - type: text
    content: 'Is not this the carpenter''s son? is not his mother called Mary? and his brethren, James, and Joses, and Simon, and Judas? '
  '56':
  - type: text
    content: 'And his sisters, are they not all with us? Whence then hath this '
  - type: text
    content: man
  - type: text
    content: ' all these things? '
  '57':
  - type: text
    content: 'And they were offended in him. But Jesus said unto them, '
  - type: text
    content: A prophet is not without honour, save in his own country, and in his own house.
  - type: text
    content: ' '
  '58':
  - type: text
    content: And he did not many mighty works there because of their unbelief.
  '6':
  - type: text
    content: and when the sun was up, they were scorched; and because they had no root, they withered away.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And some fell among thorns; and the thorns sprung up, and choked them:'
  - type: text
    content: ' '
  '8':
  - type: text
    content: but other fell into good ground, and brought forth fruit, some an hundredfold, some sixtyfold, some thirtyfold.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Who hath ears to hear, let him hear.
