    content: The Death of Jesus
  - type: text
    content: 'And it came to pass, when Jesus had finished all these sayings, he said unto his disciples, '
  '10':
  - type: text
    content: 'When Jesus understood '
  - type: text
    content: it
  - type: text
    content: ', he said unto them, '
  - type: text
    content: Why trouble ye the woman? for she hath wrought a good work upon me.
  - type: text
    content: ' '
  '11':
  - type: text
    content: For ye have the poor always with you; but me ye have not always.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'For in that she hath poured this ointment on my body, she did '
  - type: text
    content: it
  - type: text
    content: ' for my burial.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Verily I say unto you, Wheresoever this gospel shall be preached in the whole world, '
  - type: text
    content: there
  - type: text
