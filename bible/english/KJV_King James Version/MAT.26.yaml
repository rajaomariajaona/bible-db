  '14':
  - type: text
    content: 'Then one of the twelve, called Judas Iscariot, went unto the chief priests, '
  '15':
  - type: text
    content: 'and said '
  - type: text
    content: unto them
  - type: text
    content: ', What will ye give me, and I will deliver him unto you? And they covenanted with him for thirty pieces of silver. '
  '16':
  - type: text
    content: And from that time he sought opportunity to betray him.
  - type: heading
    content: The Last Supper
  '17':
  - type: text
    content: 'Now the first '
  - type: text
    content: day
  - type: text
    content: ' of the '
  - type: text
    content: feast of
  - type: text
    content: ' unleavened bread the disciples came to Jesus, saying unto him, Where wilt thou that we prepare for thee to eat the passover? '
  '18':
  - type: text
    content: 'And he said, '
  - type: text
    content: Go into the city to such a man, and say unto him, The Master saith, My time is at hand; I will keep the passover at thy house with my disciples.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And the disciples did as Jesus had appointed them; and they made ready the passover.
  '2':
  - type: text
    content: 'Ye know that after two days is '
  - type: text
    content: the feast of
  - type: text
    content: ' the passover, and the Son of man is betrayed to be crucified.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now when the even was come, he sat down with the twelve. '
  '21':
  - type: text
    content: 'And as they did eat, he said, '
  - type: text
    content: Verily I say unto you, that one of you shall betray me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And they were exceeding sorrowful, and began every one of them to say unto him, Lord, is it I? '
  '23':
  - type: text
    content: 'And he answered and said, '
  - type: text
    content: 'He that dippeth '
  - type: text
    content: his
  - type: text
    content: ' hand with me in the dish, the same shall betray me.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'The Son of man goeth as it is written of him: but woe unto that man by whom the Son of man is betrayed! it had been good for that man if he had not been born.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Then Judas, which betrayed him, answered and said, Master, is it I? He said unto him, '
  - type: text
    content: Thou hast said.
  '26':
  - type: text
    content: 'And as they were eating, Jesus took bread, and blessed '
  - type: text
    content: it
  - type: text
    content: ', and brake '
  - type: text
    content: it
  - type: text
    content: ', and gave '
  - type: text
    content: it
  - type: text
    content: ' to the disciples, and said, '
  - type: text
    content: Take, eat; this is my body.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he took the cup, and gave thanks, and gave '
  - type: text
    content: it
  - type: text
    content: ' to them, saying, '
  - type: text
    content: Drink ye all of it;
  - type: text
    content: ' '
  '28':
  - type: text
    content: for this is my blood of the new testament, which is shed for many for the remission of sins.
  - type: text
    content: ' '
  '29':
  - type: text
    content: But I say unto you, I will not drink henceforth of this fruit of the vine, until that day when I drink it new with you in my Father's kingdom.
  '3':
  - type: text
    content: 'Then assembled together the chief priests, and the scribes, and the elders of the people, unto the palace of the high priest, who was called Caiaphas, '
  '30':
  - type: text
    content: 'And when they had sung an hymn, they went out into the mount of Olives. '
  '31':
  - type: text
    content: 'Then saith Jesus unto them, '
  - type: text
    content: 'All ye shall be offended because of me this night: for it is written, I will smite the shepherd, and the sheep of the flock shall be scattered abroad.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: But after I am risen again, I will go before you into Galilee.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Peter answered and said unto him, Though all '
  - type: text
    content: men
  - type: text
    content: ' shall be offended because of thee, '
  - type: text
    content: yet
  - type: text
    content: ' will I never be offended. '
  '34':
  - type: text
    content: 'Jesus said unto him, '
  - type: text
    content: Verily I say unto thee, That this night, before the cock crow, thou shalt deny me thrice.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Peter said unto him, Though I should die with thee, yet will I not deny thee. Likewise also said all the disciples.
  - type: heading
    content: Arrest and Trial
  '36':
  - type: text
    content: 'Then cometh Jesus with them unto a place called Gethsemane, and saith unto the disciples, '
  - type: text
    content: Sit ye here, while I go and pray yonder.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And he took with him Peter and the two sons of Zebedee, and began to be sorrowful and very heavy. '
  '38':
  - type: text
    content: 'Then saith he unto them, '
  - type: text
    content: 'My soul is exceeding sorrowful, even unto death: tarry ye here, and watch with me.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And he went a little further, and fell on his face, and prayed, saying, '
  - type: text
    content: 'O my Father, if it be possible, let this cup pass from me: nevertheless not as I will, but as thou '
  - type: text
    content: wilt
  - type: text
    content: .
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'and consulted that they might take Jesus by subtilty, and kill '
  - type: text
    content: him
  - type: text
    content: '. '
  '40':
  - type: text
    content: 'And he cometh unto the disciples, and findeth them asleep, and saith unto Peter, '
  - type: text
    content: What, could ye not watch with me one hour?
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Watch and pray, that ye enter not into temptation: the spirit indeed '
  - type: text
    content: is
  - type: text
    content: ' willing, but the flesh '
  - type: text
    content: is
  - type: text
    content: ' weak.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'He went away again the second time, and prayed, saying, '
  - type: text
    content: O my Father, if this cup may not pass away from me, except I drink it, thy will be done.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And he came and found them asleep again: for their eyes were heavy. '
  '44':
  - type: text
    content: 'And he left them, and went away again, and prayed the third time, saying the same words. '
  '45':
  - type: text
    content: 'Then cometh he to his disciples, and saith unto them, '
  - type: text
    content: 'Sleep on now, and take '
  - type: text
    content: your
  - type: text
    content: ' rest: behold, the hour is at hand, and the Son of man is betrayed into the hands of sinners.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'Rise, let us be going: behold, he is at hand that doth betray me.'
  '47':
  - type: text
    content: 'And while he yet spake, lo, Judas, one of the twelve, came, and with him a great multitude with swords and staves, from the chief priests and elders of the people. '
  '48':
  - type: text
    content: 'Now he that betrayed him gave them a sign, saying, Whomsoever I shall kiss, that same is he: hold him fast. '
  '49':
  - type: text
    content: 'And forthwith he came to Jesus, and said, Hail, master; and kissed him. '
  '5':
  - type: text
    content: 'But they said, Not on the feast '
  - type: text
    content: day
  - type: text
    content: ', lest there be an uproar among the people.'
  - type: heading
    content: Anointing at Bethany
  '50':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: Friend, wherefore art thou come?
  - type: text
    content: ' Then came they, and laid hands on Jesus, and took him. '
  '51':
  - type: text
    content: 'And, behold, one of them which were with Jesus stretched out '
  - type: text
    content: his
  - type: text
    content: ' hand, and drew his sword, and struck a servant of the high priest''s, and smote off his ear. '
  '52':
  - type: text
    content: 'Then said Jesus unto him, '
  - type: text
    content: 'Put up again thy sword into his place: for all they that take the sword shall perish with the sword.'
  - type: text
    content: ' '
  '53':
  - type: text
    content: Thinkest thou that I cannot now pray to my Father, and he shall presently give me more than twelve legions of angels?
  - type: text
    content: ' '
  '54':
  - type: text
    content: But how then shall the scriptures be fulfilled, that thus it must be?
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'In that same hour said Jesus to the multitudes, '
  - type: text
    content: Are ye come out as against a thief with swords and staves for to take me? I sat daily with you teaching in the temple, and ye laid no hold on me.
  - type: text
    content: ' '
  '56':
  - type: text
    content: But all this was done, that the scriptures of the prophets might be fulfilled.
  - type: text
    content: ' Then all the disciples forsook him, and fled.'
  '57':
  - type: text
    content: 'And they that had laid hold on Jesus led '
  - type: text
    content: him
  - type: text
    content: ' away to Caiaphas the high priest, where the scribes and the elders were assembled. '
  '58':
  - type: text
    content: 'But Peter followed him afar off unto the high priest''s palace, and went in, and sat with the servants, to see the end. '
  '59':
  - type: text
    content: 'Now the chief priests, and elders, and all the council, sought false witness against Jesus, to put him to death; '
  '6':
  - type: text
    content: 'Now when Jesus was in Bethany, in the house of Simon the leper, '
  '60':
  - type: text
    content: 'but found none: yea, though many false witnesses came, '
  - type: text
    content: yet
  - type: text
    content: ' found they none. At the last came two false witnesses, '
  '61':
  - type: text
    content: 'and said, This '
  - type: text
    content: fellow
  - type: text
    content: ' said, I am able to destroy the temple of God, and to build it in three days. '
  '62':
  - type: text
    content: 'And the high priest arose, and said unto him, Answerest thou nothing? what '
  - type: text
    content: is it which
  - type: text
    content: ' these witness against thee? '
  '63':
  - type: text
    content: 'But Jesus held his peace. And the high priest answered and said unto him, I adjure thee by the living God, that thou tell us whether thou be the Christ, the Son of God. '
  '64':
  - type: text
    content: 'Jesus saith unto him, '
  - type: text
    content: 'Thou hast said: nevertheless I say unto you, Hereafter shall ye see the Son of man sitting on the right hand of power, and coming in the clouds of heaven.'
  - type: text
    content: ' '
  '65':
  - type: text
    content: 'Then the high priest rent his clothes, saying, He hath spoken blasphemy; what further need have we of witnesses? behold, now ye have heard his blasphemy. '
  '66':
  - type: text
    content: 'What think ye? They answered and said, He is guilty of death. '
  '67':
  - type: text
    content: 'Then did they spit in his face, and buffeted him; and others smote '
  - type: text
    content: him
  - type: text
    content: ' with the palms of their hands, '
  '68':
  - type: text
    content: saying, Prophesy unto us, thou Christ, Who is he that smote thee?
  '69':
  - type: text
    content: 'Now Peter sat without in the palace: and a damsel came unto him, saying, Thou also wast with Jesus of Galilee. '
  '7':
  - type: text
    content: 'there came unto him a woman having an alabaster box of very precious ointment, and poured it on his head, as he sat at meat. '
  '70':
  - type: text
    content: 'But he denied before '
  - type: text
    content: them
  - type: text
    content: ' all, saying, I know not what thou sayest. '
  '71':
  - type: text
    content: 'And when he was gone out into the porch, another '
  - type: text
    content: maid
  - type: text
    content: ' saw him, and said unto them that were there, This '
  - type: text
    content: fellow
  - type: text
    content: ' was also with Jesus of Nazareth. '
  '72':
  - type: text
    content: 'And again he denied with an oath, I do not know the man. '
  '73':
  - type: text
    content: 'And after a while came unto '
  - type: text
    content: him
  - type: text
    content: ' they that stood by, and said to Peter, Surely thou also art '
  - type: text
    content: one
  - type: text
    content: ' of them; for thy speech bewrayeth thee. '
  '74':
  - type: text
    content: 'Then began he to curse and to swear, '
  - type: text
    content: saying
  - type: text
    content: ', I know not the man. And immediately the cock crew. '
  '75':
  - type: text
    content: And Peter remembered the word of Jesus, which said unto him, Before the cock crow, thou shalt deny me thrice. And he went out, and wept bitterly.
  '8':
  - type: text
    content: 'But when his disciples saw '
  - type: text
    content: it
  - type: text
    content: ', they had indignation, saying, To what purpose '
  - type: text
    content: is
  - type: text
    content: ' this waste? '
  '9':
  - type: text
    content: 'For this ointment might have been sold for much, and given to the poor. '
