document_id: MAT.26,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass, when Jesus had finished all these sayings, he said unto his disciples, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When Jesus understood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why trouble ye the woman? for she hath wrought a good work upon me.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For ye have the poor always with you; but me ye have not always.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For in that she hath poured this ointment on my body, she did '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' for my burial.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Verily I say unto you, Wheresoever this gospel shall be preached in the whole world, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: there
      - type: text
        text: ' shall also this, that this woman hath done, be told for a memorial of her.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Betrayal
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then one of the twelve, called Judas Iscariot, went unto the chief priests, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and said '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto them
    - type: text
      text: ', What will ye give me, and I will deliver him unto you? And they covenanted with him for thirty pieces of silver. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And from that time he sought opportunity to betray him.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Last Supper
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: feast of
    - type: text
      text: ' unleavened bread the disciples came to Jesus, saying unto him, Where wilt thou that we prepare for thee to eat the passover? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go into the city to such a man, and say unto him, The Master saith, My time is at hand; I will keep the passover at thy house with my disciples.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And the disciples did as Jesus had appointed them; and they made ready the passover.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye know that after two days is '
      - type: usfm
        marker: add
        children:
        - type: text
          text: the feast of
      - type: text
        text: ' the passover, and the Son of man is betrayed to be crucified.'
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now when the even was come, he sat down with the twelve. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And as they did eat, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, that one of you shall betray me.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And they were exceeding sorrowful, and began every one of them to say unto him, Lord, is it I? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He that dippeth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' hand with me in the dish, the same shall betray me.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The Son of man goeth as it is written of him: but woe unto that man by whom the Son of man is betrayed! it had been good for that man if he had not been born.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Judas, which betrayed him, answered and said, Master, is it I? He said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Thou hast said.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And as they were eating, Jesus took bread, and blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and brake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to the disciples, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Take, eat; this is my body.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he took the cup, and gave thanks, and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Drink ye all of it;
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for this is my blood of the new testament, which is shed for many for the remission of sins.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say unto you, I will not drink henceforth of this fruit of the vine, until that day when I drink it new with you in my Father's kingdom.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then assembled together the chief priests, and the scribes, and the elders of the people, unto the palace of the high priest, who was called Caiaphas, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And when they had sung an hymn, they went out into the mount of Olives. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then saith Jesus unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'All ye shall be offended because of me this night: for it is written, I will smite the shepherd, and the sheep of the flock shall be scattered abroad.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But after I am risen again, I will go before you into Galilee.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Peter answered and said unto him, Though all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall be offended because of thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' will I never be offended. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto thee, That this night, before the cock crow, thou shalt deny me thrice.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Peter said unto him, Though I should die with thee, yet will I not deny thee. Likewise also said all the disciples.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Arrest and Trial
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then cometh Jesus with them unto a place called Gethsemane, and saith unto the disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sit ye here, while I go and pray yonder.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And he took with him Peter and the two sons of Zebedee, and began to be sorrowful and very heavy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then saith he unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'My soul is exceeding sorrowful, even unto death: tarry ye here, and watch with me.'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And he went a little further, and fell on his face, and prayed, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'O my Father, if it be possible, let this cup pass from me: nevertheless not as I will, but as thou '
      - type: usfm
        marker: add
        children:
        - type: text
          text: wilt
      - type: text
        text: .
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and consulted that they might take Jesus by subtilty, and kill '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And he cometh unto the disciples, and findeth them asleep, and saith unto Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What, could ye not watch with me one hour?
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Watch and pray, that ye enter not into temptation: the spirit indeed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' willing, but the flesh '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' weak.'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'He went away again the second time, and prayed, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: O my Father, if this cup may not pass away from me, except I drink it, thy will be done.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And he came and found them asleep again: for their eyes were heavy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And he left them, and went away again, and prayed the third time, saying the same words. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Then cometh he to his disciples, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Sleep on now, and take '
      - type: usfm
        marker: add
        children:
        - type: text
          text: your
      - type: text
        text: ' rest: behold, the hour is at hand, and the Son of man is betrayed into the hands of sinners.'
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Rise, let us be going: behold, he is at hand that doth betray me.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And while he yet spake, lo, Judas, one of the twelve, came, and with him a great multitude with swords and staves, from the chief priests and elders of the people. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Now he that betrayed him gave them a sign, saying, Whomsoever I shall kiss, that same is he: hold him fast. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'And forthwith he came to Jesus, and said, Hail, master; and kissed him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But they said, Not on the feast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ', lest there be an uproar among the people.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anointing at Bethany
    marker-yv: yv-h
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'And Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Friend, wherefore art thou come?
    - type: text
      text: ' Then came they, and laid hands on Jesus, and took him. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And, behold, one of them which were with Jesus stretched out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hand, and drew his sword, and struck a servant of the high priest''s, and smote off his ear. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Then said Jesus unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Put up again thy sword into his place: for all they that take the sword shall perish with the sword.'
    - type: text
      text: ' '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Thinkest thou that I cannot now pray to my Father, and he shall presently give me more than twelve legions of angels?
    - type: text
      text: ' '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But how then shall the scriptures be fulfilled, that thus it must be?
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'In that same hour said Jesus to the multitudes, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Are ye come out as against a thief with swords and staves for to take me? I sat daily with you teaching in the temple, and ye laid no hold on me.
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But all this was done, that the scriptures of the prophets might be fulfilled.
    - type: text
      text: ' Then all the disciples forsook him, and fled.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'And they that had laid hold on Jesus led '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away to Caiaphas the high priest, where the scribes and the elders were assembled. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'But Peter followed him afar off unto the high priest''s palace, and went in, and sat with the servants, to see the end. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Now the chief priests, and elders, and all the council, sought false witness against Jesus, to put him to death; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now when Jesus was in Bethany, in the house of Simon the leper, '
