document_id: 1SA.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And David fled from Naioth in Ramah, and came and said before Jonathan, What have I done? what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine iniquity? and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my sin before thy father, that he seeketh my life? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said unto him, God forbid; thou shalt not die: behold, my father will do nothing either great or small, but that he will shew it me: and why should my father hide this thing from me? it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David sware moreover, and said, Thy father certainly knoweth that I have found grace in thine eyes; and he saith, Let not Jonathan know this, lest he be grieved: but truly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thy soul liveth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' but a step between me and death. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then said Jonathan unto David, Whatsoever thy soul desireth, I will even do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for thee. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David said unto Jonathan, Behold, to morrow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the new moon, and I should not fail to sit with the king at meat: but let me go, that I may hide myself in the field unto the third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' at even. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'If thy father at all miss me, then say, David earnestly asked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: leave
  - type: text
    text: ' of me that he might run to Beth-lehem his city: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a yearly sacrifice there for all the family. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If he say thus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' well; thy servant shall have peace: but if he be very wroth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' be sure that evil is determined by him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore thou shalt deal kindly with thy servant; for thou hast brought thy servant into a covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with thee: notwithstanding, if there be in me iniquity, slay me thyself; for why shouldest thou bring me to thy father? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Jonathan said, Far be it from thee: for if I knew certainly that evil were determined by my father to come upon thee, then would not I tell it thee? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then said David to Jonathan, Who shall tell me? or what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' thy father answer thee roughly?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Jonathan said unto David, Come, and let us go out into the field. And they went out both of them into the field. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jonathan said unto David, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, when I have sounded my father about to morrow any time, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' the third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ', and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if there be
  - type: text
    text: ' good toward David, and I then send not unto thee, and shew it thee; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' do so and much more to Jonathan: but if it please my father '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to do
  - type: text
    text: ' thee evil, then I will shew it thee, and send thee away, that thou mayest go in peace: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be with thee, as he hath been with my father. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And thou shalt not only while yet I live shew me the kindness of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I die not: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' thou shalt not cut off thy kindness from my house for ever: no, not when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath cut off the enemies of David every one from the face of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Jonathan made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a covenant
  - type: text
    text: ' with the house of David, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' even require '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' at the hand of David''s enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jonathan caused David to swear again, because he loved him: for he loved him as he loved his own soul. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jonathan said to David, To morrow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the new moon: and thou shalt be missed, because thy seat will be empty. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' thou hast stayed three days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' thou shalt go down quickly, and come to the place where thou didst hide thyself when the business was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in hand
  - type: text
    text: ', and shalt remain by the stone Ezel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And I will shoot three arrows on the side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', as though I shot at a mark. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And, behold, I will send a lad, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Go, find out the arrows. If I expressly say unto the lad, Behold, the arrows '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' on this side of thee, take them; then come thou: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' peace to thee, and no hurt; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if I say thus unto the young man, Behold, the arrows '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' beyond thee; go thy way: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath sent thee away. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as touching
  - type: text
    text: ' the matter which thou and I have spoken of, behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' between thee and me for ever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So David hid himself in the field: and when the new moon was come, the king sat him down to eat meat. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the king sat upon his seat, as at other times, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' upon a seat by the wall: and Jonathan arose, and Abner sat by Saul''s side, and David''s place was empty. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nevertheless Saul spake not any thing that day: for he thought, Something hath befallen him, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not clean; surely he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not clean. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And it came to pass on the morrow, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which was
  - type: text
    text: ' the second '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, that David''s place was empty: and Saul said unto Jonathan his son, Wherefore cometh not the son of Jesse to meat, neither yesterday, nor to day? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Jonathan answered Saul, David earnestly asked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: leave
  - type: text
    text: ' of me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to go
  - type: text
    text: ' to Beth-lehem: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and he said, Let me go, I pray thee; for our family hath a sacrifice in the city; and my brother, he hath commanded me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'to be there:'
  - type: text
    text: ' and now, if I have found favour in thine eyes, let me get away, I pray thee, and see my brethren. Therefore he cometh not unto the king''s table.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Saul''s anger was kindled against Jonathan, and he said unto him, Thou son of the perverse rebellious '
  - type: usfm
    marker: add
    children:
    - type: text
      text: woman
  - type: text
    text: ', do not I know that thou hast chosen the son of Jesse to thine own confusion, and unto the confusion of thy mother''s nakedness? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For as long as the son of Jesse liveth upon the ground, thou shalt not be established, nor thy kingdom. Wherefore now send and fetch him unto me, for he shall surely die. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Jonathan answered Saul his father, and said unto him, Wherefore shall he be slain? what hath he done? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Saul cast a javelin at him to smite him: whereby Jonathan knew that it was determined of his father to slay David. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So Jonathan arose from the table in fierce anger, and did eat no meat the second day of the month: for he was grieved for David, because his father had done him shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And it came to pass in the morning, that Jonathan went out into the field at the time appointed with David, and a little lad with him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he said unto his lad, Run, find out now the arrows which I shoot. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' as the lad ran, he shot an arrow beyond him. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And when the lad was come to the place of the arrow which Jonathan had shot, Jonathan cried after the lad, and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not the arrow beyond thee? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Jonathan cried after the lad, Make speed, haste, stay not. And Jonathan''s lad gathered up the arrows, and came to his master. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But the lad knew not any thing: only Jonathan and David knew the matter. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And Jonathan gave his artillery unto his lad, and said unto him, Go, carry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to the city. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' as soon as the lad was gone, David arose out of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a place
  - type: text
    text: ' toward the south, and fell on his face to the ground, and bowed himself three times: and they kissed one another, and wept one with another, until David exceeded. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And Jonathan said to David, Go in peace, forasmuch as we have sworn both of us in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be between me and thee, and between my seed and thy seed for ever. And he arose and departed: and Jonathan went into the city.'
