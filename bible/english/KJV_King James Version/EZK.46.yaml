document_id: EZK.46,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sabbath
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; The gate of the inner court that looketh toward the east shall be shut the six working days; but on the sabbath it shall be opened, and in the day of the new moon it shall be opened. '
  '10':
  - type: text
    content: 'And the prince in the midst of them, when they go in, shall go in; and when they go forth, shall go forth. '
  '11':
  - type: text
    content: 'And in the feasts and in the solemnities the meat offering shall be an ephah to a bullock, and an ephah to a ram, and to the lambs as he is able to give, and an hin of oil to an ephah. '
  '12':
  - type: text
    content: 'Now when the prince shall prepare a voluntary burnt offering or peace offerings voluntarily unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: one
  - type: text
    content: ' shall then open him the gate that looketh toward the east, and he shall prepare his burnt offering and his peace offerings, as he did on the sabbath day: then he shall go forth; and after his going forth '
  - type: text
    content: one
  - type: text
    content: ' shall shut the gate.'
  - type: heading
    content: The Daily Offering
  '13':
  - type: text
    content: 'Thou shalt daily prepare a burnt offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' a lamb of the first year without blemish: thou shalt prepare it every morning. '
  '14':
  - type: text
    content: 'And thou shalt prepare a meat offering for it every morning, the sixth part of an ephah, and the third part of an hin of oil, to temper with the fine flour; a meat offering continually by a perpetual ordinance unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Thus shall they prepare the lamb, and the meat offering, and the oil, every morning '
  - type: text
    content: for
  - type: text
    content: ' a continual burnt offering.'
  '16':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; If the prince give a gift unto any of his sons, the inheritance thereof shall be his sons''; it '
  - type: text
    content: shall be
  - type: text
    content: ' their possession by inheritance. '
  '17':
  - type: text
    content: 'But if he give a gift of his inheritance to one of his servants, then it shall be his to the year of liberty; after it shall return to the prince: but his inheritance shall be his sons'' for them. '
  '18':
  - type: text
    content: 'Moreover the prince shall not take of the people''s inheritance by oppression, to thrust them out of their possession; '
  - type: text
    content: but
  - type: text
    content: ' he shall give his sons inheritance out of his own possession: that my people be not scattered every man from his possession.'
  - type: heading
    content: The Temple Kitchens
  '19':
  - type: text
    content: 'After he brought me through the entry, which '
  - type: text
    content: was
  - type: text
    content: ' at the side of the gate, into the holy chambers of the priests, which looked toward the north: and, behold, there '
  - type: text
    content: was
  - type: text
    content: ' a place on the two sides westward. '
  '2':
  - type: text
    content: 'And the prince shall enter by the way of the porch of '
  - type: text
    content: that
  - type: text
    content: ' gate without, and shall stand by the post of the gate, and the priests shall prepare his burnt offering and his peace offerings, and he shall worship at the threshold of the gate: then he shall go forth; but the gate shall not be shut until the evening. '
  '20':
  - type: text
    content: 'Then said he unto me, This '
  - type: text
    content: is
  - type: text
    content: ' the place where the priests shall boil the trespass offering and the sin offering, where they shall bake the meat offering; that they bear '
  - type: text
    content: them
  - type: text
    content: ' not out into the utter court, to sanctify the people.'
  '21':
  - type: text
    content: 'Then he brought me forth into the utter court, and caused me to pass by the four corners of the court; and, behold, in every corner of the court '
  - type: text
    content: there was
  - type: text
    content: ' a court. '
  '22':
  - type: text
    content: 'In the four corners of the court '
  - type: text
    content: there were
  - type: text
    content: ' courts joined of forty '
  - type: text
    content: cubits
  - type: text
    content: ' long and thirty broad: these four corners '
  - type: text
    content: were
  - type: text
    content: ' of one measure. '
  '23':
  - type: text
    content: 'And '
  - type: text
    content: there was
  - type: text
    content: ' a row '
  - type: text
    content: of building
  - type: text
    content: ' round about in them, round about them four, and '
  - type: text
    content: it was
  - type: text
    content: ' made with boiling places under the rows round about. '
  '24':
  - type: text
    content: 'Then said he unto me, These '
  - type: text
    content: are
  - type: text
    content: ' the places of them that boil, where the ministers of the house shall boil the sacrifice of the people.'
  '3':
  - type: text
    content: 'Likewise the people of the land shall worship at the door of this gate before the '
  - type: text
    content: LORD
  - type: text
    content: ' in the sabbaths and in the new moons. '
  '4':
  - type: text
    content: 'And the burnt offering that the prince shall offer unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in the sabbath day '
  - type: text
    content: shall be
  - type: text
    content: ' six lambs without blemish, and a ram without blemish. '
  '5':
  - type: text
    content: 'And the meat offering '
  - type: text
    content: shall be
  - type: text
    content: ' an ephah for a ram, and the meat offering for the lambs as he shall be able to give, and an hin of oil to an ephah.'
  - type: heading
    content: The New Moon
  '6':
  - type: text
    content: 'And in the day of the new moon '
  - type: text
    content: it shall be
  - type: text
    content: ' a young bullock without blemish, and six lambs, and a ram: they shall be without blemish. '
  '7':
  - type: text
    content: 'And he shall prepare a meat offering, an ephah for a bullock, and an ephah for a ram, and for the lambs according as his hand shall attain unto, and an hin of oil to an ephah. '
  '8':
  - type: text
    content: 'And when the prince shall enter, he shall go in by the way of the porch of '
  - type: text
    content: that
  - type: text
    content: ' gate, and he shall go forth by the way thereof.'
  '9':
  - type: text
    content: 'But when the people of the land shall come before the '
  - type: text
    content: LORD
  - type: text
    content: ' in the solemn feasts, he that entereth in by the way of the north gate to worship shall go out by the way of the south gate; and he that entereth by the way of the south gate shall go forth by the way of the north gate: he shall not return by the way of the gate whereby he came in, but shall go forth over against it. '
