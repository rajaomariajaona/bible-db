document_id: EZK.46,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; The gate of the inner court that looketh toward the east shall be shut the six working days; but on the sabbath it shall be opened, and in the day of the new moon it shall be opened. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the prince in the midst of them, when they go in, shall go in; and when they go forth, shall go forth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And in the feasts and in the solemnities the meat offering shall be an ephah to a bullock, and an ephah to a ram, and to the lambs as he is able to give, and an hin of oil to an ephah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now when the prince shall prepare a voluntary burnt offering or peace offerings voluntarily unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' shall then open him the gate that looketh toward the east, and he shall prepare his burnt offering and his peace offerings, as he did on the sabbath day: then he shall go forth; and after his going forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' shall shut the gate.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Daily Offering
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Thou shalt daily prepare a burnt offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' a lamb of the first year without blemish: thou shalt prepare it every morning. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And thou shalt prepare a meat offering for it every morning, the sixth part of an ephah, and the third part of an hin of oil, to temper with the fine flour; a meat offering continually by a perpetual ordinance unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Thus shall they prepare the lamb, and the meat offering, and the oil, every morning '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a continual burnt offering.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; If the prince give a gift unto any of his sons, the inheritance thereof shall be his sons''; it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' their possession by inheritance. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But if he give a gift of his inheritance to one of his servants, then it shall be his to the year of liberty; after it shall return to the prince: but his inheritance shall be his sons'' for them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moreover the prince shall not take of the people''s inheritance by oppression, to thrust them out of their possession; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' he shall give his sons inheritance out of his own possession: that my people be not scattered every man from his possession.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Temple Kitchens
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'After he brought me through the entry, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at the side of the gate, into the holy chambers of the priests, which looked toward the north: and, behold, there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a place on the two sides westward. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the prince shall enter by the way of the porch of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' gate without, and shall stand by the post of the gate, and the priests shall prepare his burnt offering and his peace offerings, and he shall worship at the threshold of the gate: then he shall go forth; but the gate shall not be shut until the evening. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then said he unto me, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the place where the priests shall boil the trespass offering and the sin offering, where they shall bake the meat offering; that they bear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not out into the utter court, to sanctify the people.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then he brought me forth into the utter court, and caused me to pass by the four corners of the court; and, behold, in every corner of the court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a court. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'In the four corners of the court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' courts joined of forty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long and thirty broad: these four corners '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of one measure. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a row '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of building
    - type: text
      text: ' round about in them, round about them four, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' made with boiling places under the rows round about. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then said he unto me, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the places of them that boil, where the ministers of the house shall boil the sacrifice of the people.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Likewise the people of the land shall worship at the door of this gate before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the sabbaths and in the new moons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the burnt offering that the prince shall offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the sabbath day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' six lambs without blemish, and a ram without blemish. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the meat offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an ephah for a ram, and the meat offering for the lambs as he shall be able to give, and an hin of oil to an ephah.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The New Moon
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And in the day of the new moon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a young bullock without blemish, and six lambs, and a ram: they shall be without blemish. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he shall prepare a meat offering, an ephah for a bullock, and an ephah for a ram, and for the lambs according as his hand shall attain unto, and an hin of oil to an ephah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And when the prince shall enter, he shall go in by the way of the porch of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' gate, and he shall go forth by the way thereof.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But when the people of the land shall come before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the solemn feasts, he that entereth in by the way of the north gate to worship shall go out by the way of the south gate; and he that entereth by the way of the south gate shall go forth by the way of the north gate: he shall not return by the way of the gate whereby he came in, but shall go forth over against it. '
