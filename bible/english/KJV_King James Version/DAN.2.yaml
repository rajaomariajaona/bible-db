document_id: DAN.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar's Dream
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And in the second year of the reign of Nebuchadnezzar Nebuchadnezzar dreamed dreams, wherewith his spirit was troubled, and his sleep brake from him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The Chaldeans answered before the king, and said, There is not a man upon the earth that can shew the king''s matter: therefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no king, lord, nor ruler, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' asked such things at any magician, or astrologer, or Chaldean. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a rare thing that the king requireth, and there is none other that can shew it before the king, except the gods, whose dwelling is not with flesh. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For this cause the king was angry and very furious, and commanded to destroy all the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the decree went forth that the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' should be slain; and they sought Daniel and his fellows to be slain.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Daniel answered with counsel and wisdom to Arioch the captain of the king''s guard, which was gone forth to slay the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'he answered and said to Arioch the king''s captain, Why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the decree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' hasty from the king? Then Arioch made the thing known to Daniel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then Daniel went in, and desired of the king that he would give him time, and that he would shew the king the interpretation.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Daniel went to his house, and made the thing known to Hananiah, Mishael, and Azariah, his companions: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'that they would desire mercies of the God of heaven concerning this secret; that Daniel and his fellows should not perish with the rest of the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then was the secret revealed unto Daniel in a night vision. Then Daniel blessed the God of heaven. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then the king commanded to call the magicians, and the astrologers, and the sorcerers, and the Chaldeans, for to shew the king his dreams. So they came and stood before the king. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Daniel answered and said, Blessed be the name of God for ever and ever: for wisdom and might are his: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and he changeth the times and the seasons: he removeth kings, and setteth up kings: he giveth wisdom unto the wise, and knowledge to them that know understanding: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'he revealeth the deep and secret things: he knoweth what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the darkness, and the light dwelleth with him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I thank thee, and praise thee, O thou God of my fathers, who hast given me wisdom and might, and hast made known unto me now what we desired of thee: for thou hast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' made known unto us the king''s matter.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Therefore Daniel went in unto Arioch, whom the king had ordained to destroy the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon: he went and said thus unto him; Destroy not the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon: bring me in before the king, and I will shew unto the king the interpretation.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Arioch brought in Daniel before the king in haste, and said thus unto him, I have found a man of the captives of Judah, that will make known unto the king the interpretation. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The king answered and said to Daniel, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Belteshazzar, Art thou able to make known unto me the dream which I have seen, and the interpretation thereof?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Daniel answered in the presence of the king, and said, The secret which the king hath demanded cannot the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', the astrologers, the magicians, the soothsayers, shew unto the king; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'but there is a God in heaven that revealeth secrets, and maketh known to the king Nebuchadnezzar what shall be in the latter days. Thy dream, and the visions of thy head upon thy bed, are these; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'As for thee, O king, thy thoughts came '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into thy mind
    - type: text
      text: ' upon thy bed, what should come to pass hereafter: and he that revealeth secrets maketh known to thee what shall come to pass. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And the king said unto them, I have dreamed a dream, and my spirit was troubled to know the dream.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But as for me, this secret is not revealed to me for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' wisdom that I have more than any living, but for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' sakes that shall make known the interpretation to the king, and that thou mightest know the thoughts of thy heart.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Thou, O king, sawest, and behold a great image. This great image, whose brightness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' excellent, stood before thee; and the form thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' terrible. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'This image''s head '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of fine gold, his breast and his arms of silver, his belly and his thighs of brass, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'his legs of iron, his feet part of iron and part of clay. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Thou sawest till that a stone was cut out without hands, which smote the image upon his feet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' of iron and clay, and brake them to pieces. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then was the iron, the clay, the brass, the silver, and the gold, broken to pieces together, and became like the chaff of the summer threshingfloors; and the wind carried them away, that no place was found for them: and the stone that smote the image became a great mountain, and filled the whole earth.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the dream; and we will tell the interpretation thereof before the king. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Thou, O king, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' a king of kings: for the God of heaven hath given thee a kingdom, power, and strength, and glory. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And wheresoever the children of men dwell, the beasts of the field and the fowls of the heaven hath he given into thine hand, and hath made thee ruler over them all. Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' this head of gold. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And after thee shall arise another kingdom inferior to thee, and another third kingdom of brass, which shall bear rule over all the earth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then spake the Chaldeans to the king in Syriack, O king, live for ever: tell thy servants the dream, and we will shew the interpretation. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And the fourth kingdom shall be strong as iron: forasmuch as iron breaketh in pieces and subdueth all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'things:'
    - type: text
      text: ' and as iron that breaketh all these, shall it break in pieces and bruise. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And whereas thou sawest the feet and toes, part of potters'' clay, and part of iron, the kingdom shall be divided; but there shall be in it of the strength of the iron, forasmuch as thou sawest the iron mixed with miry clay. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the toes of the feet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' part of iron, and part of clay, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' the kingdom shall be partly strong, and partly broken. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And whereas thou sawest iron mixed with miry clay, they shall mingle themselves with the seed of men: but they shall not cleave one to another, even as iron is not mixed with clay. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And in the days of these kings shall the God of heaven set up a kingdom, which shall never be destroyed: and the kingdom shall not be left to other people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' it shall break in pieces and consume all these kingdoms, and it shall stand for ever. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Forasmuch as thou sawest that the stone was cut out of the mountain without hands, and that it brake in pieces the iron, the brass, the clay, the silver, and the gold; the great God hath made known to the king what shall come to pass hereafter: and the dream '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' certain, and the interpretation thereof sure.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Then the king Nebuchadnezzar fell upon his face, and worshipped Daniel, and commanded that they should offer an oblation and sweet odours unto him. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'The king answered unto Daniel, and said, Of a truth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ', that your God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a God of gods, and a Lord of kings, and a revealer of secrets, seeing thou couldest reveal this secret.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Then the king made Daniel a great man, and gave him many great gifts, and made him ruler over the whole province of Babylon, and chief of the governors over all the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Then Daniel requested of the king, and he set Shadrach, Meshach, and Abed-nego, over the affairs of the province of Babylon: but Daniel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sat
    - type: text
      text: ' in the gate of the king.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The king answered and said to the Chaldeans, The thing is gone from me: if ye will not make known unto me the dream, with the interpretation thereof, ye shall be cut in pieces, and your houses shall be made a dunghill. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But if ye shew the dream, and the interpretation thereof, ye shall receive of me gifts and rewards and great honour: therefore shew me the dream, and the interpretation thereof.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They answered again and said, Let the king tell his servants the dream, and we will shew the interpretation of it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The king answered and said, I know of certainty that ye would gain the time, because ye see the thing is gone from me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But if ye will not make known unto me the dream, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is but
    - type: text
      text: ' one decree for you: for ye have prepared lying and corrupt words to speak before me, till the time be changed: therefore tell me the dream, and I shall know that ye can shew me the interpretation thereof.'
