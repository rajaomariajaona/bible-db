document_id: ROM.16,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'I commend unto you Phebe our sister, which is a servant of the church which is at Cenchrea: '
  '10':
  - type: text
    content: 'Salute Apelles approved in Christ. Salute them which are of Aristobulus'' '
  - type: text
    content: household
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Salute Herodion my kinsman. Greet them that be of the '
  - type: text
    content: household
  - type: text
    content: ' of Narcissus, which are in the Lord. '
  '12':
  - type: text
    content: 'Salute Tryphena and Tryphosa, who labour in the Lord. Salute the beloved Persis, which laboured much in the Lord. '
  '13':
  - type: text
    content: 'Salute Rufus chosen in the Lord, and his mother and mine. '
  '14':
  - type: text
    content: 'Salute Asyncritus, Phlegon, Hermas, Patrobas, Hermes, and the brethren which are with them. '
  '15':
  - type: text
    content: 'Salute Philologus, and Julia, Nereus, and his sister, and Olympas, and all the saints which are with them. '
  '16':
  - type: text
    content: Salute one another with an holy kiss. The churches of Christ salute you.
  '17':
  - type: text
    content: 'Now I beseech you, brethren, mark them which cause divisions and offences contrary to the doctrine which ye have learned; and avoid them. '
  '18':
  - type: text
    content: 'For they that are such serve not our Lord Jesus Christ, but their own belly; and by good words and fair speeches deceive the hearts of the simple. '
  '19':
  - type: text
    content: 'For your obedience is come abroad unto all '
  - type: text
    content: men
  - type: text
    content: '. I am glad therefore on your behalf: but yet I would have you wise unto that which is good, and simple concerning evil. '
  '2':
  - type: text
    content: 'that ye receive her in the Lord, as becometh saints, and that ye assist her in whatsoever business she hath need of you: for she hath been a succourer of many, and of myself also.'
  '20':
  - type: text
    content: And the God of peace shall bruise Satan under your feet shortly.
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you. Amen.'
  '21':
  - type: text
    content: 'Timotheus my workfellow, and Lucius, and Jason, and Sosipater, my kinsmen, salute you. '
  '22':
  - type: text
    content: 'I Tertius, who wrote '
  - type: text
    content: this
  - type: text
    content: ' epistle, salute you in the Lord. '
  '23':
  - type: text
    content: 'Gaius mine host, and of the whole church, saluteth you. Erastus the chamberlain of the city saluteth you, and Quartus a brother. '
  '24':
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '25':
  - type: text
    content: 'Now to him that is of power to stablish you according to my gospel, and the preaching of Jesus Christ, according to the revelation of the mystery, which was kept secret since the world began, '
  '26':
  - type: text
    content: 'but now is made manifest, and by the scriptures of the prophets, according to the commandment of the everlasting God, made known to all nations for the obedience of faith: '
  '27':
  - type: text
    content: 'to God only wise, '
  - type: text
    content: be
  - type: text
    content: ' glory through Jesus Christ for ever. Amen.'
  - type: text
    content: Written to the Romans from Corinthus, and sent by Phebe servant of the church at Cenchrea.
  '3':
  - type: text
    content: 'Greet Priscilla and Aquila my helpers in Christ Jesus: '
  '4':
  - type: text
    content: 'who have for my life laid down their own necks: unto whom not only I give thanks, but also all the churches of the Gentiles. '
  '5':
  - type: text
    content: 'Likewise '
  - type: text
    content: greet
  - type: text
    content: ' the church that is in their house. Salute my wellbeloved Epænetus, who is the firstfruits of Achaia unto Christ. '
  '6':
  - type: text
    content: 'Greet Mary, who bestowed much labour on us. '
  '7':
  - type: text
    content: 'Salute Andronicus and Junia, my kinsmen, and my fellowprisoners, who are of note among the apostles, who also were in Christ before me. '
  '8':
  - type: text
    content: 'Greet Amplias my beloved in the Lord. '
  '9':
  - type: text
    content: 'Salute Urbane, our helper in Christ, and Stachys my beloved. '
