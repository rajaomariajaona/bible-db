document_id: ISA.16,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Send ye the lamb to the ruler of the land from Sela to the wilderness, unto the mount of the daughter of Zion. '
  '10':
  - type: text
    content: 'And gladness is taken away, and joy out of the plentiful field; and in the vineyards there shall be no singing, neither shall there be shouting: the treaders shall tread out no wine in '
  - type: text
    content: their
  - type: text
    content: ' presses; I have made '
  - type: text
    content: their vintage
  - type: text
    content: ' shouting to cease. '
  '11':
  - type: text
    content: 'Wherefore my bowels shall sound like an harp for Moab, and mine inward parts for Kirharesh. '
  '12':
  - type: text
    content: And it shall come to pass, when it is seen that Moab is weary on the high place, that he shall come to his sanctuary to pray; but he shall not prevail.
  '13':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the word that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken concerning Moab since that time. '
  '14':
  - type: text
    content: 'But now the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken, saying, Within three years, as the years of an hireling, and the glory of Moab shall be contemned, with all that great multitude; and the remnant '
  - type: text
    content: shall be
  - type: text
    content: ' very small '
  - type: text
    content: and
  - type: text
    content: ' feeble.'
  '2':
  - type: text
    content: 'For it shall be, '
  - type: text
    content: that
  - type: text
    content: ', as a wandering bird cast out of the nest, '
  - type: text
    content: so
  - type: text
    content: ' the daughters of Moab shall be at the fords of Arnon. '
  '3':
  - type: text
    content: 'Take counsel, execute judgment; make thy shadow as the night in the midst of the noonday; hide the outcasts; bewray not him that wandereth. '
  '4':
  - type: text
    content: 'Let mine outcasts dwell with thee, Moab; be thou a covert to them from the face of the spoiler: for the extortioner is at an end, the spoiler ceaseth, the oppressors are consumed out of the land. '
  '5':
  - type: text
    content: 'And in mercy shall the throne be established: and he shall sit upon it in truth in the tabernacle of David, judging, and seeking judgment, and hasting righteousness.'
  '6':
  - type: text
    content: 'We have heard of the pride of Moab; '
  - type: text
    content: he is
  - type: text
    content: ' very proud: '
  - type: text
    content: even
  - type: text
    content: ' of his haughtiness, and his pride, and his wrath: '
  - type: text
    content: but
  - type: text
    content: ' his lies '
  - type: text
    content: shall
  - type: text
    content: ' not '
  - type: text
    content: be
  - type: text
    content: ' so. '
  '7':
  - type: text
    content: 'Therefore shall Moab howl for Moab, every one shall howl: for the foundations of Kirhareseth shall ye mourn; surely '
  - type: text
    content: they are
  - type: text
    content: ' stricken. '
  '8':
  - type: text
    content: 'For the fields of Heshbon languish, '
  - type: text
    content: and
  - type: text
    content: ' the vine of Sibmah: the lords of the heathen have broken down the principal plants thereof, they are come '
  - type: text
    content: even
  - type: text
    content: ' unto Jazer, they wandered '
  - type: text
    content: through
  - type: text
    content: ' the wilderness: her branches are stretched out, they are gone over the sea.'
  '9':
  - type: text
    content: 'Therefore I will bewail with the weeping of Jazer the vine of Sibmah: I will water thee with my tears, O Heshbon, and Elealeh: for the shouting for thy summer fruits and for thy harvest is fallen. '
