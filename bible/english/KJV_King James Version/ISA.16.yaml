document_id: ISA.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send ye the lamb to the ruler of the land from Sela to the wilderness, unto the mount of the daughter of Zion. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And gladness is taken away, and joy out of the plentiful field; and in the vineyards there shall be no singing, neither shall there be shouting: the treaders shall tread out no wine in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' presses; I have made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their vintage
    - type: text
      text: ' shouting to cease. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore my bowels shall sound like an harp for Moab, and mine inward parts for Kirharesh. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it shall come to pass, when it is seen that Moab is weary on the high place, that he shall come to his sanctuary to pray; but he shall not prevail.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the word that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken concerning Moab since that time. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken, saying, Within three years, as the years of an hireling, and the glory of Moab shall be contemned, with all that great multitude; and the remnant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' very small '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' feeble.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it shall be, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ', as a wandering bird cast out of the nest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' the daughters of Moab shall be at the fords of Arnon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take counsel, execute judgment; make thy shadow as the night in the midst of the noonday; hide the outcasts; bewray not him that wandereth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let mine outcasts dwell with thee, Moab; be thou a covert to them from the face of the spoiler: for the extortioner is at an end, the spoiler ceaseth, the oppressors are consumed out of the land. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in mercy shall the throne be established: and he shall sit upon it in truth in the tabernacle of David, judging, and seeking judgment, and hasting righteousness.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have heard of the pride of Moab; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' very proud: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of his haughtiness, and his pride, and his wrath: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' his lies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' so. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore shall Moab howl for Moab, every one shall howl: for the foundations of Kirhareseth shall ye mourn; surely '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' stricken. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the fields of Heshbon languish, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the vine of Sibmah: the lords of the heathen have broken down the principal plants thereof, they are come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Jazer, they wandered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: through
    - type: text
      text: ' the wilderness: her branches are stretched out, they are gone over the sea.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I will bewail with the weeping of Jazer the vine of Sibmah: I will water thee with my tears, O Heshbon, and Elealeh: for the shouting for thy summer fruits and for thy harvest is fallen. '
