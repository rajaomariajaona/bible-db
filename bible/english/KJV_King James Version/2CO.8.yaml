document_id: 2CO.8
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: God Loves a Cheerful Giver
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover, brethren, we do you to wit of the grace of God bestowed on the churches of Macedonia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'how that in a great trial of affliction the abundance of their joy and their deep poverty abounded unto the riches of their liberality. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' power, I bear record, yea, and beyond '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' power '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' willing of themselves; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'praying us with much intreaty that we would receive the gift, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: take upon us
  - type: text
    text: ' the fellowship of the ministering to the saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this they did
  - type: text
    text: ', not as we hoped, but first gave their own selves to the Lord, and unto us by the will of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Insomuch that we desired Titus, that as he had begun, so he would also finish in you the same grace also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore, as ye abound in every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing, in
  - type: text
    text: ' faith, and utterance, and knowledge, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' all diligence, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' your love to us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: see
  - type: text
    text: ' that ye abound in this grace also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I speak not by commandment, but by occasion of the forwardness of others, and to prove the sincerity of your love. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For ye know the grace of our Lord Jesus Christ, that, though he was rich, yet for your sakes he became poor, that ye through his poverty might be rich. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And herein I give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' advice: for this is expedient for you, who have begun before, not only to do, but also to be forward a year ago. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now therefore perform the doing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '; that as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a readiness to will, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there may be
  - type: text
    text: ' a performance also out of that which ye have. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For if there be first a willing mind, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' accepted according to that a man hath, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' not according to that he hath not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I mean
  - type: text
    text: ' not that other men be eased, and ye burdened: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but by an equality, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' now at this time your abundance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: may be a supply
  - type: text
    text: ' for their want, that their abundance also may be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a supply
  - type: text
    text: ' for your want: that there may be equality: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'as it is written, He that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had gathered
  - type: text
    text: ' much had nothing over; and he that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had gathered
  - type: text
    text: ' little had no lack.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But thanks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to God, which put the same earnest care into the heart of Titus for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For indeed he accepted the exhortation; but being more forward, of his own accord he went unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And we have sent with him the brother, whose praise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the gospel throughout all the churches; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' only, but who was also chosen of the churches to travel with us with this grace, which is administered by us to the glory of the same Lord, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: declaration of
  - type: text
    text: ' your ready mind: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'avoiding this, that no man should blame us in this abundance which is administered by us: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'providing for honest things, not only in the sight of the Lord, but also in the sight of men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And we have sent with them our brother, whom we have oftentimes proved diligent in many things, but now much more diligent, upon the great confidence which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I have
  - type: text
    text: ' in you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any do enquire
  - type: text
    text: ' of Titus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' my partner and fellowhelper concerning you: or our brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be enquired of, they are
  - type: text
    text: ' the messengers of the churches, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the glory of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Wherefore shew ye to them, and before the churches, the proof of your love, and of our boasting on your behalf.
