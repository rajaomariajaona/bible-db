    content: Soliciting Their Support
  - type: text
    content: 'Finally, brethren, pray for us, that the word of the Lord may have '
  - type: text
    content: free
  - type: text
    content: ' course, and be glorified, even as '
  - type: text
    content: it is
  - type: text
    content: ' with you: '
  '10':
  - type: text
    content: 'For even when we were with you, this we commanded you, that if any would not work, neither should he eat. '
  '11':
  - type: text
    content: 'For we hear that there are some which walk among you disorderly, working not at all, but are busybodies. '
  '12':
  - type: text
    content: 'Now them that are such we command and exhort by our Lord Jesus Christ, that with quietness they work, and eat their own bread. '
  '13':
  - type: text
    content: 'But ye, brethren, be not weary in well doing. '
  '14':
  - type: text
    content: 'And if any man obey not our word by this epistle, note that man, and have no company with him, that he may be ashamed. '
  '15':
  - type: text
    content: 'Yet count '
  - type: text
    content: him
  - type: text
    content: ' not as an enemy, but admonish '
  - type: text
    content: him
  - type: text
    content: ' as a brother. '
  '16':
  - type: text
    content: 'Now the Lord of peace himself give you peace always by all means. The Lord '
  - type: text
    content: be
  - type: text
    content: ' with you all.'
  '17':
  - type: text
    content: 'The salutation of Paul with mine own hand, which is the token in every epistle: so I write. '
  '18':
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  - type: text
    content: The second epistle to the Thessalonians was written from Athens.
  '2':
  - type: text
    content: 'and that we may be delivered from unreasonable and wicked men: for all '
  - type: text
    content: men
  - type: text
    content: ' have not faith.'
  '3':
  - type: text
    content: 'But the Lord is faithful, who shall stablish you, and keep '
  - type: text
    content: you
  - type: text
    content: ' from evil. '
  '4':
  - type: text
    content: 'And we have confidence in the Lord touching you, that ye both do and will do the things which we command you. '
  '5':
  - type: text
    content: And the Lord direct your hearts into the love of God, and into the patient waiting for Christ.
  '6':
  - type: text
    content: 'Now we command you, brethren, in the name of our Lord Jesus Christ, that ye withdraw yourselves from every brother that walketh disorderly, and not after the tradition which he received of us. '
  '7':
  - type: text
    content: 'For yourselves know how ye ought to follow us: for we behaved not ourselves disorderly among you; '
  '8':
  - type: text
    content: 'neither did we eat any man''s bread for nought; but wrought with labour and travail night and day, that we might not be chargeable to any of you: '
  '9':
  - type: text
    content: 'not because we have not power, but to make ourselves an ensample unto you to follow us. '
