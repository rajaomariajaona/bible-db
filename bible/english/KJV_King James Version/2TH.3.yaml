document_id: 2TH.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Soliciting Their Support
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Finally, brethren, pray for us, that the word of the Lord may have '
  - type: usfm
    marker: add
    children:
    - type: text
      text: free
  - type: text
    text: ' course, and be glorified, even as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' with you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and that we may be delivered from unreasonable and wicked men: for all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' have not faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But the Lord is faithful, who shall stablish you, and keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' from evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And we have confidence in the Lord touching you, that ye both do and will do the things which we command you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And the Lord direct your hearts into the love of God, and into the patient waiting for Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now we command you, brethren, in the name of our Lord Jesus Christ, that ye withdraw yourselves from every brother that walketh disorderly, and not after the tradition which he received of us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For yourselves know how ye ought to follow us: for we behaved not ourselves disorderly among you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'neither did we eat any man''s bread for nought; but wrought with labour and travail night and day, that we might not be chargeable to any of you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'not because we have not power, but to make ourselves an ensample unto you to follow us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For even when we were with you, this we commanded you, that if any would not work, neither should he eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For we hear that there are some which walk among you disorderly, working not at all, but are busybodies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now them that are such we command and exhort by our Lord Jesus Christ, that with quietness they work, and eat their own bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But ye, brethren, be not weary in well doing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if any man obey not our word by this epistle, note that man, and have no company with him, that he may be ashamed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yet count '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' not as an enemy, but admonish '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' as a brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now the Lord of peace himself give you peace always by all means. The Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The salutation of Paul with mine own hand, which is the token in every epistle: so I write. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The grace of our Lord Jesus Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all. Amen.'
- type: usfm
  marker: iex
  children:
  - type: text
    text: The second epistle to the Thessalonians was written from Athens.
