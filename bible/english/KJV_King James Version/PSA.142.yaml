document_id: PSA.142,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: Maschil of David; A Prayer when he was in the cave.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with my voice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With my voice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did I make my supplication.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I poured out my complaint before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shewed before him my trouble.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When my spirit was overwhelmed within me, then thou knewest my path.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the way wherein I walked have they privily laid a snare for me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I looked on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' right hand,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And beheld, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no man that would know me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refuge failed me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No man cared for my soul.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I cried unto thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I said, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my refuge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my portion in the land of the living.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Attend unto my cry;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I am brought very low:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver me from my persecutors;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For they are stronger than I.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Bring my soul out of prison,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I may praise thy name:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous shall compass me about;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thou shalt deal bountifully with me.
