document_id: PSA.142,1
type_code: eng
verses:
  '1':
  - type: text
    content: Maschil of David; A Prayer when he was in the cave.
  - type: text
    content: 'I cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with my voice;'
  - type: text
    content: 'With my voice unto the '
  - type: text
    content: LORD
  - type: text
    content: ' did I make my supplication.'
  '2':
  - type: text
    content: I poured out my complaint before him;
  - type: text
    content: I shewed before him my trouble.
  '3':
  - type: text
    content: When my spirit was overwhelmed within me, then thou knewest my path.
  - type: text
    content: In the way wherein I walked have they privily laid a snare for me.
  '4':
  - type: text
    content: 'I looked on '
  - type: text
    content: my
  - type: text
    content: ' right hand,'
  - type: text
    content: 'And beheld, but '
  - type: text
    content: there was
  - type: text
    content: ' no man that would know me:'
  - type: text
    content: Refuge failed me;
  - type: text
    content: No man cared for my soul.
  '5':
  - type: text
    content: 'I cried unto thee, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'I said, Thou '
  - type: text
    content: art
  - type: text
    content: ' my refuge '
  - type: text
    content: and
  - type: text
    content: ' my portion in the land of the living.'
  '6':
  - type: text
    content: Attend unto my cry;
  - type: text
    content: 'For I am brought very low:'
  - type: text
    content: Deliver me from my persecutors;
  - type: text
    content: For they are stronger than I.
  '7':
  - type: text
    content: Bring my soul out of prison,
  - type: text
    content: 'That I may praise thy name:'
  - type: text
    content: The righteous shall compass me about;
  - type: text
    content: For thou shalt deal bountifully with me.
