    children:
    - type: text
      text: every
  - type: text
    text: ' seven years thou shalt make a release. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the manner of the release: Every creditor that lendeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' unto his neighbour shall release '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; he shall not exact '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' of his neighbour, or of his brother; because it is called the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s release. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Of a foreigner thou mayest exact '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it again:'
  - type: text
    text: ' but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which is thine with thy brother thine hand shall release; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'save when there shall be no poor among you; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall greatly bless thee in the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an inheritance to possess it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'only if thou carefully hearken unto the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, to observe to do all these commandments which I command thee this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God blesseth thee, as he promised thee: and thou shalt lend unto many nations, but thou shalt not borrow; and thou shalt reign over many nations, but they shall not reign over thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If there be among you a poor man of one of thy brethren within any of thy gates in thy land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, thou shalt not harden thine heart, nor shut thine hand from thy poor brother: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but thou shalt open thine hand wide unto him, and shalt surely lend him sufficient for his need, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in that
  - type: text
    text: ' which he wanteth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Beware that there be not a thought in thy wicked heart, saying, The seventh year, the year of release, is at hand; and thine eye be evil against thy poor brother, and thou givest him nought; and he cry unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' against thee, and it be sin unto thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou shalt surely give him, and thine heart shall not be grieved when thou givest unto him: because that for this thing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall bless thee in all thy works, and in all that thou puttest thine hand unto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the poor shall never cease out of the land: therefore I command thee, saying, Thou shalt open thine hand wide unto thy brother, to thy poor, and to thy needy, in thy land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' if thy brother, an Hebrew man, or an Hebrew woman, be sold unto thee, and serve thee six years; then in the seventh year thou shalt let him go free from thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when thou sendest him out free from thee, thou shalt not let him go away empty: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'thou shalt furnish him liberally out of thy flock, and out of thy floor, and out of thy winepress: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of that
  - type: text
    text: ' wherewith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath blessed thee thou shalt give unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And thou shalt remember that thou wast a bondman in the land of Egypt, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God redeemed thee: therefore I command thee this thing to day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it shall be, if he say unto thee, I will not go away from thee; because he loveth thee and thine house, because he is well with thee; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'then thou shalt take an aul, and thrust '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' through his ear unto the door, and he shall be thy servant for ever. And also unto thy maidservant thou shalt do likewise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'It shall not seem hard unto thee, when thou sendest him away free from thee; for he hath been worth a double hired servant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to thee
  - type: text
    text: ', in serving thee six years: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall bless thee in all that thou doest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'All the firstling males that come of thy herd and of thy flock thou shalt sanctify unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God: thou shalt do no work with the firstling of thy bullock, nor shear the firstling of thy sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thou shalt eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God year by year in the place which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall choose, thou and thy household. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And if there be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' blemish therein, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as if it be
  - type: text
    text: ' lame, or blind, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have
  - type: text
    text: ' any ill blemish, thou shalt not sacrifice it unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thou shalt eat it within thy gates: the unclean and the clean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: person shall eat it
  - type: text
    text: ' alike, as the roebuck, and as the hart. '
  - type: usfm
