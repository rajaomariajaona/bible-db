  - type: text
    content: it
  - type: text
    content: ' to you; but ye have not obeyed the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, nor any '
  - type: text
    content: thing
  - type: text
    content: ' for the which he hath sent me unto you. '
  '22':
