  - type: text
    content: 'Be not afraid of the king of Babylon, of whom ye are afraid; be not afraid of him, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': for I '
  - type: text
    content: am
  - type: text
    content: ' with you to save you, and to deliver you from his hand. '
