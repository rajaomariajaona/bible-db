  - type: text
    content: 'saying, No; but we will go into the land of Egypt, where we shall see no war, nor hear the sound of the trumpet, nor have hunger of bread; and there will we dwell: '
  '15':
  - type: text
    content: 'and now therefore hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', ye remnant of Judah; Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; If ye wholly set your faces to enter into Egypt, and go to sojourn there; '
  '16':
  - type: text
    content: 'then it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' the sword, which ye feared, shall overtake you there in the land of Egypt, and the famine, whereof ye were afraid, shall follow close after you there in Egypt, and there ye shall die. '
  '17':
  - type: text
    content: 'So shall it be with all the men that set their faces to go into Egypt to sojourn there; they shall die by the sword, by the famine, and by the pestilence: and none of them shall remain or escape from the evil that I will bring upon them.'
  '18':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; As mine anger and my fury hath been poured forth upon the inhabitants of Jerusalem; so shall my fury be poured forth upon you, when ye shall enter into Egypt: and ye shall be an execration, and an astonishment, and a curse, and a reproach; and ye shall see this place no more. '
  '19':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath said concerning you, O ye remnant of Judah; Go ye not into Egypt: know certainly that I have admonished you this day. '
  '2':
  - type: text
    content: 'and said unto Jeremiah the prophet, Let, we beseech thee, our supplication be accepted before thee, and pray for us unto the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, '
  - type: text
    content: even
  - type: text
