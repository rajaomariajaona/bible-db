  '4':
  - type: text
    content: 'And I gave unto Isaac Jacob and Esau: and I gave unto Esau mount Seir, to possess it; but Jacob and his children went down into Egypt. '
  '5':
  - type: text
    content: 'I sent Moses also and Aaron, and I plagued Egypt, according to that which I did among them: and afterward I brought you out. '
  '6':
  - type: text
    content: 'And I brought your fathers out of Egypt: and ye came unto the sea; and the Egyptians pursued after your fathers with chariots and horsemen unto the Red sea. '
  '7':
  - type: text
    content: 'And when they cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', he put darkness between you and the Egyptians, and brought the sea upon them, and covered them; and your eyes have seen what I have done in Egypt: and ye dwelt in the wilderness a long season. '
  '8':
  - type: text
    content: 'And I brought you into the land of the Amorites, which dwelt on the other side Jordan; and they fought with you: and I gave them into your hand, that ye might possess their land; and I destroyed them from before you. '
  '9':
  - type: text
    content: 'Then Balak the son of Zippor, king of Moab, arose and warred against Israel, and sent and called Balaam the son of Beor to curse you: '
