document_id: ACT.17,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Thessalonica and Berea
  - type: text
    content: 'Now when they had passed through Amphipolis and Apollonia, they came to Thessalonica, where was a synagogue of the Jews: '
  '10':
  - type: text
    content: 'And the brethren immediately sent away Paul and Silas by night unto Berea: who coming '
  - type: text
    content: thither
  - type: text
    content: ' went into the synagogue of the Jews. '
  '11':
  - type: text
    content: 'These were more noble than those in Thessalonica, in that they received the word with all readiness of mind, and searched the scriptures daily, whether those things were so. '
  '12':
  - type: text
    content: 'Therefore many of them believed; also of honourable women which were Greeks, and of men, not a few. '
  '13':
  - type: text
    content: 'But when the Jews of Thessalonica had knowledge that the word of God was preached of Paul at Berea, they came thither also, and stirred up the people. '
  '14':
  - type: text
    content: 'And then immediately the brethren sent away Paul to go as it were to the sea: but Silas and Timotheus abode there still.'
  '15':
  - type: text
    content: 'And they that conducted Paul brought him unto Athens: and receiving a commandment unto Silas and Timotheus for to come to him with all speed, they departed. '
  '16':
  - type: text
    content: 'Now while Paul waited for them at Athens, his spirit was stirred in him, when he saw the city wholly given to idolatry. '
  '17':
  - type: text
    content: 'Therefore disputed he in the synagogue with the Jews, and with the devout persons, and in the market daily with them that met with him. '
  '18':
  - type: text
    content: 'Then certain philosophers of the Epicureans, and of the Stoicks, encountered him. And some said, What will this babbler say? other some, He seemeth to be a setter forth of strange gods: because he preached unto them Jesus, and the resurrection. '
  '19':
  - type: text
    content: 'And they took him, and brought him unto Areopagus, saying, May we know what this new doctrine, whereof thou speakest, '
  - type: text
    content: is
  - type: text
    content: '? '
  '2':
  - type: text
    content: 'and Paul, as his manner was, went in unto them, and three sabbath days reasoned with them out of the scriptures, '
  '20':
  - type: text
    content: 'For thou bringest certain strange things to our ears: we would know therefore what these things mean. '
  '21':
  - type: text
    content: (For all the Athenians and strangers which were there spent their time in nothing else, but either to tell, or to hear some new thing.)
  - type: heading
    content: Paul's Address
  '22':
  - type: text
    content: Then Paul stood in the midst of Mars' hill, and said,
  - type: text
    content: Ye
  - type: text
    content: ' men of Athens, I perceive that in all things ye are too superstitious. '
  '23':
  - type: text
    content: 'For as I passed by, and beheld your devotions, I found an altar with this inscription, TO THE UNKNOWN GOD. Whom therefore ye ignorantly worship, him declare I unto you. '
  '24':
  - type: text
    content: 'God that made the world and all things therein, seeing that he is Lord of heaven and earth, dwelleth not in temples made with hands; '
  '25':
  - type: text
    content: 'neither is worshipped with men''s hands, as though he needed any thing, seeing he giveth to all life, and breath, and all things; '
  '26':
  - type: text
    content: 'and hath made of one blood all nations of men for to dwell on all the face of the earth, and hath determined the times before appointed, and the bounds of their habitation; '
  '27':
  - type: text
    content: 'that they should seek the Lord, if haply they might feel after him, and find him, though he be not far from every one of us: '
  '28':
  - type: text
    content: 'for in him we live, and move, and have our being; as certain also of your own poets have said, For we are also his offspring. '
  '29':
  - type: text
    content: 'Forasmuch then as we are the offspring of God, we ought not to think that the Godhead is like unto gold, or silver, or stone, graven by art and man''s device. '
  '3':
  - type: text
    content: 'opening and alleging, that Christ must needs have suffered, and risen again from the dead; and that this Jesus, whom I preach unto you, is Christ. '
  '30':
  - type: text
    content: 'And the times of this ignorance God winked at; but now commandeth all men every where to repent: '
  '31':
  - type: text
    content: 'because he hath appointed a day, in the which he will judge the world in righteousness by '
  - type: text
    content: that
  - type: text
    content: ' man whom he hath ordained; '
  - type: text
    content: whereof
  - type: text
    content: ' he hath given assurance unto all '
  - type: text
    content: men
  - type: text
    content: ', in that he hath raised him from the dead.'
  '32':
  - type: text
    content: 'And when they heard of the resurrection of the dead, some mocked: and others said, We will hear thee again of this '
  - type: text
    content: matter
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'So Paul departed from among them. '
  '34':
  - type: text
    content: 'Howbeit certain men clave unto him, and believed: among the which '
  - type: text
    content: was
  - type: text
    content: ' Dionysius the Areopagite, and a woman named Damaris, and others with them.'
  '4':
  - type: text
    content: And some of them believed, and consorted with Paul and Silas; and of the devout Greeks a great multitude, and of the chief women not a few.
  '5':
  - type: text
    content: 'But the Jews which believed not, moved with envy, took unto them certain lewd fellows of the baser sort, and gathered a company, and set all the city on an uproar, and assaulted the house of Jason, and sought to bring them out to the people. '
  '6':
  - type: text
    content: 'And when they found them not, they drew Jason and certain brethren unto the rulers of the city, crying, These that have turned the world upside down are come hither also; '
  '7':
  - type: text
    content: 'whom Jason hath received: and these all do contrary to the decrees of Cæsar, saying that there is another king, '
  - type: text
    content: one
  - type: text
    content: ' Jesus. '
  '8':
  - type: text
    content: 'And they troubled the people and the rulers of the city, when they heard these things. '
  '9':
  - type: text
    content: And when they had taken security of Jason, and of the other, they let them go.
