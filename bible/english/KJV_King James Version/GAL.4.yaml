  '19':
  - type: text
    content: 'My little children, of whom I travail in birth again until Christ be formed in you, '
  '2':
  - type: text
    content: 'but is under tutors and governors until the time appointed of the father. '
  '20':
  - type: text
    content: I desire to be present with you now, and to change my voice; for I stand in doubt of you.
  '21':
  - type: text
    content: 'Tell me, ye that desire to be under the law, do ye not hear the law? '
  '22':
  - type: text
    content: 'For it is written, that Abraham had two sons, the one by a bondmaid, the other by a freewoman. '
  '23':
  - type: text
    content: 'But he '
  - type: text
    content: who was
  - type: text
    content: ' of the bondwoman was born after the flesh; but he of the freewoman '
  - type: text
    content: was
  - type: text
    content: ' by promise. '
  '24':
  - type: text
    content: 'Which things are an allegory: for these are the two covenants; the one from the mount Sinai, which gendereth to bondage, which is Agar. '
  '25':
  - type: text
    content: 'For this Agar is mount Sinai in Arabia, and answereth to Jerusalem which now is, and is in bondage with her children. '
  '26':
  - type: text
    content: 'But Jerusalem which is above is free, which is the mother of us all. '
  '27':
  - type: text
    content: For it is written,
  - type: text
    content: Rejoice, thou barren that bearest not;
  - type: text
    content: 'Break forth and cry, thou that travailest not:'
  - type: text
    content: For the desolate hath many more children than she which hath an husband.
  '28':
  - type: text
    content: 'Now we, brethren, as Isaac was, are the children of promise. '
  '29':
  - type: text
    content: 'But as then he that was born after the flesh persecuted him '
  - type: text
    content: that was born
  - type: text
    content: ' after the Spirit, even so '
  - type: text
    content: it is
  - type: text
    content: ' now. '
  '3':
  - type: text
    content: 'Even so we, when we were children, were in bondage under the elements of the world: '
  '30':
  - type: text
    content: 'Nevertheless what saith the scripture? Cast out the bondwoman and her son: for the son of the bondwoman shall not be heir with the son of the freewoman. '
  '31':
  - type: text
    content: So then, brethren, we are not children of the bondwoman, but of the free.
  '4':
  - type: text
    content: 'but when the fulness of the time was come, God sent forth his Son, made of a woman, made under the law, '
  '5':
  - type: text
    content: to redeem them that were under the law, that we might receive the adoption of sons.
  '6':
  - type: text
    content: 'And because ye are sons, God hath sent forth the Spirit of his Son into your hearts, crying, Abba, Father. '
  '7':
  - type: text
    content: Wherefore thou art no more a servant, but a son; and if a son, then an heir of God through Christ.
  '8':
  - type: text
    content: 'Howbeit then, when ye knew not God, ye did service unto them which by nature are no gods. '
  '9':
  - type: text
    content: 'But now, after that ye have known God, or rather are known of God, how turn ye again to the weak and beggarly elements, whereunto ye desire again to be in bondage? '
