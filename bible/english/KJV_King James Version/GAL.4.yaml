document_id: GAL.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now I say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' the heir, as long as he is a child, differeth nothing from a servant, though he be lord of all; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'but is under tutors and governors until the time appointed of the father. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Even so we, when we were children, were in bondage under the elements of the world: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but when the fulness of the time was come, God sent forth his Son, made of a woman, made under the law, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: to redeem them that were under the law, that we might receive the adoption of sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And because ye are sons, God hath sent forth the Spirit of his Son into your hearts, crying, Abba, Father. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Wherefore thou art no more a servant, but a son; and if a son, then an heir of God through Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Howbeit then, when ye knew not God, ye did service unto them which by nature are no gods. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But now, after that ye have known God, or rather are known of God, how turn ye again to the weak and beggarly elements, whereunto ye desire again to be in bondage? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ye observe days, and months, and times, and years. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I am afraid of you, lest I have bestowed upon you labour in vain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Brethren, I beseech you, be as I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: '; for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' as ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ': ye have not injured me at all. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ye know how through infirmity of the flesh I preached the gospel unto you at the first. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And my temptation which was in my flesh ye despised not, nor rejected; but received me as an angel of God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' as Christ Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Where is then the blessedness ye spake of? for I bear you record, that, if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it had been
  - type: text
    text: ' possible, ye would have plucked out your own eyes, and have given them to me. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Am I therefore become your enemy, because I tell you the truth? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They zealously affect you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' not well; yea, they would exclude you, that ye might affect them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' good to be zealously affected always in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a
  - type: text
    text: ' good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ', and not only when I am present with you. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My little children, of whom I travail in birth again until Christ be formed in you, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I desire to be present with you now, and to change my voice; for I stand in doubt of you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tell me, ye that desire to be under the law, do ye not hear the law? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For it is written, that Abraham had two sons, the one by a bondmaid, the other by a freewoman. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who was
  - type: text
    text: ' of the bondwoman was born after the flesh; but he of the freewoman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by promise. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Which things are an allegory: for these are the two covenants; the one from the mount Sinai, which gendereth to bondage, which is Agar. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For this Agar is mount Sinai in Arabia, and answereth to Jerusalem which now is, and is in bondage with her children. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Jerusalem which is above is free, which is the mother of us all. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For it is written,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rejoice, thou barren that bearest not;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Break forth and cry, thou that travailest not:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the desolate hath many more children than she which hath an husband.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now we, brethren, as Isaac was, are the children of promise. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But as then he that was born after the flesh persecuted him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was born
  - type: text
    text: ' after the Spirit, even so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' now. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nevertheless what saith the scripture? Cast out the bondwoman and her son: for the son of the bondwoman shall not be heir with the son of the freewoman. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So then, brethren, we are not children of the bondwoman, but of the free.
