document_id: GEN.37,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob dwelt in the land wherein his father was a stranger, in the land of Canaan. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to his father, and to his brethren: and his father rebuked him, and said unto him, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this dream that thou hast dreamed? Shall I and thy mother and thy brethren indeed come to bow down ourselves to thee to the earth? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And his brethren envied him; but his father observed the saying.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his brethren went to feed their father''s flock in Shechem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Israel said unto Joseph, Do not thy brethren feed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the flock
    - type: text
      text: ' in Shechem? come, and I will send thee unto them. And he said to him, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am I
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said to him, Go, I pray thee, see whether it be well with thy brethren, and well with the flocks; and bring me word again. So he sent him out of the vale of Hebron, and he came to Shechem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a certain man found him, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he was
    - type: text
      text: ' wandering in the field: and the man asked him, saying, What seekest thou? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, I seek my brethren: tell me, I pray thee, where they feed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their flocks
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the man said, They are departed hence; for I heard them say, Let us go to Dothan. And Joseph went after his brethren, and found them in Dothan. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they saw him afar off, even before he came near unto them, they conspired against him to slay him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said one to another, Behold, this dreamer cometh. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Jacob. Joseph, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' seventeen years old, was feeding the flock with his brethren; and the lad '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with the sons of Bilhah, and with the sons of Zilpah, his father''s wives: and Joseph brought unto his father their evil report. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come now therefore, and let us slay him, and cast him into some pit, and we will say, Some evil beast hath devoured him: and we shall see what will become of his dreams. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Reuben heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and he delivered him out of their hands; and said, Let us not kill him. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Reuben said unto them, Shed no blood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' cast him into this pit that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the wilderness, and lay no hand upon him; that he might rid him out of their hands, to deliver him to his father again.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Joseph was come unto his brethren, that they stript Joseph out of his coat, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' coat of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: many
    - type: text
      text: ' colours that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' on him; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they took him, and cast him into a pit: and the pit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' empty, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no water in it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they sat down to eat bread: and they lifted up their eyes and looked, and, behold, a company of Ishmeelites came from Gilead with their camels bearing spicery and balm and myrrh, going to carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' down to Egypt. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Judah said unto his brethren, What profit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' if we slay our brother, and conceal his blood? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come, and let us sell him to the Ishmeelites, and let not our hand be upon him; for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our brother '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' our flesh. And his brethren were content. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then there passed by Midianites merchantmen; and they drew and lifted up Joseph out of the pit, and sold Joseph to the Ishmeelites for twenty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver: and they brought Joseph into Egypt.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Reuben returned unto the pit; and, behold, Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not in the pit; and he rent his clothes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Israel loved Joseph more than all his children, because he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the son of his old age: and he made him a coat of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: many
    - type: text
      text: ' colours. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he returned unto his brethren, and said, The child '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not; and I, whither shall I go? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took Joseph''s coat, and killed a kid of the goats, and dipped the coat in the blood; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they sent the coat of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: many
    - type: text
      text: ' colours, and they brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to their father; and said, This have we found: know now whether it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' thy son''s coat or no. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he knew it, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' my son''s coat; an evil beast hath devoured him; Joseph is without doubt rent in pieces. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob rent his clothes, and put sackcloth upon his loins, and mourned for his son many days. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all his sons and all his daughters rose up to comfort him; but he refused to be comforted; and he said, For I will go down into the grave unto my son mourning. Thus his father wept for him. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Midianites sold him into Egypt unto Potiphar, an officer of Pharaoh''s, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' captain of the guard.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when his brethren saw that their father loved him more than all his brethren, they hated him, and could not speak peaceably unto him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph dreamed a dream, and he told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' his brethren: and they hated him yet the more. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, Hear, I pray you, this dream which I have dreamed: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for, behold, we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' binding sheaves in the field, and, lo, my sheaf arose, and also stood upright; and, behold, your sheaves stood round about, and made obeisance to my sheaf. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And his brethren said to him, Shalt thou indeed reign over us? or shalt thou indeed have dominion over us? And they hated him yet the more for his dreams, and for his words.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he dreamed yet another dream, and told it his brethren, and said, Behold, I have dreamed a dream more; and, behold, the sun and the moon and the eleven stars made obeisance to me. '
