document_id: HEB.10,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the law having a shadow of good things to come, '
  - type: text
    content: and
  - type: text
    content: ' not the very image of the things, can never with those sacrifices which they offered year by year continually make the comers thereunto perfect. '
  '10':
  - type: text
    content: 'By the which will we are sanctified through the offering of the body of Jesus Christ once '
  - type: text
    content: for all
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And every priest standeth daily ministering and offering oftentimes the same sacrifices, which can never take away sins: '
  '12':
  - type: text
    content: 'but this man, after he had offered one sacrifice for sins for ever, sat down on the right hand of God; '
  '13':
  - type: text
    content: 'from henceforth expecting till his enemies be made his footstool. '
  '14':
  - type: text
    content: 'For by one offering he hath perfected for ever them that are sanctified. '
  '15':
  - type: text
    content: Whereof
  - type: text
    content: ' the Holy Ghost also is a witness to us: for after that he had said before,'
  '16':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the covenant that I will make with them'
  - type: text
    content: After those days, saith the Lord,
  - type: text
    content: I will put my laws into their hearts,
  - type: text
    content: And in their minds will I write them;
  '17':
  - type: text
    content: And their sins and iniquities will I remember no more.
  '18':
  - type: text
    content: 'Now where remission of these '
  - type: text
    content: is, there is
  - type: text
    content: ' no more offering for sin.'
  - type: heading
    content: Draw Near in Faith
  '19':
  - type: text
    content: 'Having therefore, brethren, boldness to enter into the holiest by the blood of Jesus, '
  '2':
  - type: text
    content: 'For then would they not have ceased to be offered? because that the worshippers once purged should have had no more conscience of sins. '
  '20':
  - type: text
    content: 'by a new and living way, which he hath consecrated for us, through the veil, that is to say, his flesh; '
  '21':
  - type: text
    content: 'and '
  - type: text
    content: having
  - type: text
    content: ' an high priest over the house of God; '
  '22':
  - type: text
    content: 'let us draw near with a true heart in full assurance of faith, having our hearts sprinkled from an evil conscience, and our bodies washed with pure water. '
  '23':
  - type: text
    content: 'Let us hold fast the profession of '
  - type: text
    content: our
  - type: text
    content: ' faith without wavering; (for he '
  - type: text
    content: is
  - type: text
    content: ' faithful that promised;) '
  '24':
  - type: text
    content: 'and let us consider one another to provoke unto love and to good works: '
  '25':
  - type: text
    content: 'not forsaking the assembling of ourselves together, as the manner of some '
  - type: text
    content: is
  - type: text
    content: '; but exhorting '
  - type: text
    content: one another
  - type: text
    content: ': and so much the more, as ye see the day approaching.'
  '26':
  - type: text
    content: 'For if we sin wilfully after that we have received the knowledge of the truth, there remaineth no more sacrifice for sins, '
  '27':
  - type: text
    content: 'but a certain fearful looking for of judgment and fiery indignation, which shall devour the adversaries. '
  '28':
  - type: text
    content: 'He that despised Moses'' law died without mercy under two or three witnesses: '
  '29':
  - type: text
    content: 'of how much sorer punishment, suppose ye, shall he be thought worthy, who hath trodden under foot the Son of God, and hath counted the blood of the covenant, wherewith he was sanctified, an unholy thing, and hath done despite unto the Spirit of grace? '
  '3':
  - type: text
    content: 'But in those '
  - type: text
    content: sacrifices there is
  - type: text
    content: ' a remembrance again '
  - type: text
    content: made
  - type: text
    content: ' of sins every year. '
  '30':
  - type: text
    content: 'For we know him that hath said, Vengeance '
  - type: text
    content: belongeth
  - type: text
    content: ' unto me, I will recompense, saith the Lord. And again, The Lord shall judge his people. '
  '31':
  - type: text
    content: It is
  - type: text
    content: ' a fearful thing to fall into the hands of the living God.'
  '32':
  - type: text
    content: 'But call to remembrance the former days, in which, after ye were illuminated, ye endured a great fight of afflictions; '
  '33':
  - type: text
    content: 'partly, whilst ye were made a gazingstock both by reproaches and afflictions; and partly, whilst ye became companions of them that were so used. '
  '34':
  - type: text
    content: 'For ye had compassion of me in my bonds, and took joyfully the spoiling of your goods, knowing in yourselves that ye have in heaven a better and an enduring substance. '
  '35':
  - type: text
    content: 'Cast not away therefore your confidence, which hath great recompence of reward. '
  '36':
  - type: text
    content: For ye have need of patience, that, after ye have done the will of God, ye might receive the promise.
  '37':
  - type: text
    content: For yet a little while,
  - type: text
    content: And he that shall come will come, and will not tarry.
  '38':
  - type: text
    content: 'Now the just shall live by faith:'
  - type: text
    content: 'But if '
  - type: text
    content: any man
  - type: text
    content: ' draw back, my soul shall have no pleasure in him.'
  '39':
  - type: text
    content: But we are not of them who draw back unto perdition; but of them that believe to the saving of the soul.
  '4':
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' not possible that the blood of bulls and of goats should take away sins. '
  '5':
  - type: text
    content: Wherefore when he cometh into the world, he saith,
  - type: text
    content: Sacrifice and offering thou wouldest not,
  - type: text
    content: 'But a body hast thou prepared me:'
  '6':
  - type: text
    content: 'In burnt offerings and '
  - type: text
    content: sacrifices
  - type: text
    content: ' for sin thou hast had no pleasure.'
  '7':
  - type: text
    content: Then said I, Lo, I come
  - type: text
    content: (In the volume of the book it is written of me,)
  - type: text
    content: To do thy will, O God.
  '8':
  - type: text
    content: 'Above when he said, Sacrifice and offering and burnt offerings and '
  - type: text
    content: offering
  - type: text
    content: ' for sin thou wouldest not, neither hadst pleasure '
  - type: text
    content: therein
  - type: text
    content: '; which are offered by the law; '
  '9':
  - type: text
    content: 'then said he, Lo, I come to do thy will, O God. He taketh away the first, that he may establish the second. '
