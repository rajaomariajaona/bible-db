document_id: HEB.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the law having a shadow of good things to come, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' not the very image of the things, can never with those sacrifices which they offered year by year continually make the comers thereunto perfect. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'By the which will we are sanctified through the offering of the body of Jesus Christ once '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for all
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And every priest standeth daily ministering and offering oftentimes the same sacrifices, which can never take away sins: '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but this man, after he had offered one sacrifice for sins for ever, sat down on the right hand of God; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'from henceforth expecting till his enemies be made his footstool. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For by one offering he hath perfected for ever them that are sanctified. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Whereof
    - type: text
      text: ' the Holy Ghost also is a witness to us: for after that he had said before,'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the covenant that I will make with them'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After those days, saith the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my laws into their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in their minds will I write them;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their sins and iniquities will I remember no more.
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now where remission of these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is, there is
    - type: text
      text: ' no more offering for sin.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Draw Near in Faith
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Having therefore, brethren, boldness to enter into the holiest by the blood of Jesus, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For then would they not have ceased to be offered? because that the worshippers once purged should have had no more conscience of sins. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'by a new and living way, which he hath consecrated for us, through the veil, that is to say, his flesh; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: having
    - type: text
      text: ' an high priest over the house of God; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let us draw near with a true heart in full assurance of faith, having our hearts sprinkled from an evil conscience, and our bodies washed with pure water. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us hold fast the profession of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' faith without wavering; (for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' faithful that promised;) '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and let us consider one another to provoke unto love and to good works: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not forsaking the assembling of ourselves together, as the manner of some '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: '; but exhorting '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one another
    - type: text
      text: ': and so much the more, as ye see the day approaching.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if we sin wilfully after that we have received the knowledge of the truth, there remaineth no more sacrifice for sins, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but a certain fearful looking for of judgment and fiery indignation, which shall devour the adversaries. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that despised Moses'' law died without mercy under two or three witnesses: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of how much sorer punishment, suppose ye, shall he be thought worthy, who hath trodden under foot the Son of God, and hath counted the blood of the covenant, wherewith he was sanctified, an unholy thing, and hath done despite unto the Spirit of grace? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But in those '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sacrifices there is
    - type: text
      text: ' a remembrance again '
    - type: usfm
      marker: add
      children:
      - type: text
        text: made
    - type: text
      text: ' of sins every year. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we know him that hath said, Vengeance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' unto me, I will recompense, saith the Lord. And again, The Lord shall judge his people. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' a fearful thing to fall into the hands of the living God.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But call to remembrance the former days, in which, after ye were illuminated, ye endured a great fight of afflictions; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'partly, whilst ye were made a gazingstock both by reproaches and afflictions; and partly, whilst ye became companions of them that were so used. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye had compassion of me in my bonds, and took joyfully the spoiling of your goods, knowing in yourselves that ye have in heaven a better and an enduring substance. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cast not away therefore your confidence, which hath great recompence of reward. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For ye have need of patience, that, after ye have done the will of God, ye might receive the promise.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For yet a little while,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he that shall come will come, and will not tarry.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now the just shall live by faith:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any man
    - type: text
      text: ' draw back, my soul shall have no pleasure in him.'
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But we are not of them who draw back unto perdition; but of them that believe to the saving of the soul.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not possible that the blood of bulls and of goats should take away sins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherefore when he cometh into the world, he saith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sacrifice and offering thou wouldest not,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But a body hast thou prepared me:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In burnt offerings and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' for sin thou hast had no pleasure.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then said I, Lo, I come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (In the volume of the book it is written of me,)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To do thy will, O God.
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Above when he said, Sacrifice and offering and burnt offerings and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: offering
    - type: text
      text: ' for sin thou wouldest not, neither hadst pleasure '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therein
    - type: text
      text: '; which are offered by the law; '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'then said he, Lo, I come to do thy will, O God. He taketh away the first, that he may establish the second. '
