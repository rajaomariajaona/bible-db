document_id: PSA.98,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm.
  - type: text
    content: 'O sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ' a new song;'
  - type: text
    content: 'For he hath done marvellous things:'
  - type: text
    content: His right hand, and his holy arm,
  - type: text
    content: Hath gotten him the victory.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath made known his salvation:'
  - type: text
    content: His righteousness hath he openly shewed in the sight of the heathen.
  '3':
  - type: text
    content: 'He hath remembered his mercy and his truth toward the house of Israel:'
  - type: text
    content: All the ends of the earth have seen the salvation of our God.
  '4':
  - type: text
    content: 'Make a joyful noise unto the '
  - type: text
    content: LORD
  - type: text
    content: ', all the earth:'
  - type: text
    content: Make a loud noise, and rejoice, and sing praise.
  '5':
  - type: text
    content: 'Sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with the harp;'
  - type: text
    content: With the harp, and the voice of a psalm.
  '6':
  - type: text
    content: With trumpets and sound of cornet
  - type: text
    content: 'Make a joyful noise before the '
  - type: text
    content: LORD
  - type: text
    content: ', the King.'
  '7':
  - type: text
    content: Let the sea roar, and the fulness thereof;
  - type: text
    content: The world, and they that dwell therein.
  '8':
  - type: text
    content: 'Let the floods clap '
  - type: text
    content: their
  - type: text
    content: ' hands: Let the hills be joyful together'
  '9':
  - type: text
    content: 'Before the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'For he cometh to judge the earth:'
  - type: text
    content: With righteousness shall he judge the world,
  - type: text
    content: And the people with equity.
