document_id: PSA.98,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' a new song;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For he hath done marvellous things:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His right hand, and his holy arm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hath gotten him the victory.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath made known his salvation:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His righteousness hath he openly shewed in the sight of the heathen.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath remembered his mercy and his truth toward the house of Israel:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the ends of the earth have seen the salvation of our God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make a joyful noise unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make a loud noise, and rejoice, and sing praise.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with the harp;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the harp, and the voice of a psalm.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With trumpets and sound of cornet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Make a joyful noise before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the King.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the sea roar, and the fulness thereof;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The world, and they that dwell therein.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the floods clap '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hands: Let the hills be joyful together'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For he cometh to judge the earth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With righteousness shall he judge the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the people with equity.
