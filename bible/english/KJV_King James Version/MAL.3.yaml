document_id: MAL.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will send my messenger, and he shall prepare the way before me: and the Lord, whom ye seek, shall suddenly come to his temple, even the messenger of the covenant, whom ye delight in: behold, he shall come, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring ye all the tithes into the storehouse, that there may be meat in mine house, and prove me now herewith, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, if I will not open you the windows of heaven, and pour you out a blessing, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be room
    - type: text
      text: ' enough '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to receive it
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will rebuke the devourer for your sakes, and he shall not destroy the fruits of your ground; neither shall your vine cast her fruit before the time in the field, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all nations shall call you blessed: for ye shall be a delightsome land, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Final Triumph
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your words have been stout against me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Yet ye say, What have we spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so much
    - type: text
      text: ' against thee? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye have said, It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vain to serve God: and what profit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' that we have kept his ordinance, and that we have walked mournfully before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now we call the proud happy; yea, they that work wickedness are set up; yea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they that
    - type: text
      text: ' tempt God are even delivered.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they that feared the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake often one to another: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hearkened, and heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and a book of remembrance was written before him for them that feared the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and that thought upon his name. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall be mine, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, in that day when I make up my jewels; and I will spare them, as a man spareth his own son that serveth him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then shall ye return, and discern between the righteous and the wicked, between him that serveth God and him that serveth him not.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But who may abide the day of his coming? and who shall stand when he appeareth? for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like a refiner''s fire, and like fullers'' soap: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall sit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a refiner and purifier of silver: and he shall purify the sons of Levi, and purge them as gold and silver, that they may offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' an offering in righteousness.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall the offering of Judah and Jerusalem be pleasant unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', as in the days of old, and as in former years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will come near to you to judgment; and I will be a swift witness against the sorcerers, and against the adulterers, and against false swearers, and against those that oppress the hireling in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wages, the widow, and the fatherless, and that turn aside the stranger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from his right
    - type: text
      text: ', and fear not me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I change not; therefore ye sons of Jacob are not consumed.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Return Unto Me
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even from the days of your fathers ye are gone away from mine ordinances, and have not kept '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. Return unto me, and I will return unto you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. But ye said, Wherein shall we return?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Will a man rob God? Yet ye have robbed me. But ye say, Wherein have we robbed thee? In tithes and offerings. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' cursed with a curse: for ye have robbed me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' this whole nation. '
