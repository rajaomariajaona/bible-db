    content: Law of Priests and Levites
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Aaron, Thou and thy sons and thy father''s house with thee shall bear the iniquity of the sanctuary: and thou and thy sons with thee shall bear the iniquity of your priesthood. '
  '10':
  - type: text
    content: 'In the most holy '
  - type: text
    content: place
  - type: text
    content: ' shalt thou eat it; every male shall eat it: it shall be holy unto thee. '
  '11':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' thine; the heave offering of their gift, with all the wave offerings of the children of Israel: I have given them unto thee, and to thy sons and to thy daughters with thee, by a statute for ever: every one that is clean in thy house shall eat of it. '
  '12':
  - type: text
    content: 'All the best of the oil, and all the best of the wine, and of the wheat, the firstfruits of them which they shall offer unto the '
  - type: text
    content: LORD
  - type: text
    content: ', them have I given thee. '
  '13':
  - type: text
    content: And
  - type: text
    content: ' whatsoever is first ripe in the land, which they shall bring unto the '
  - type: text
    content: LORD
  - type: text
    content: ', shall be thine; every one that is clean in thine house shall eat '
  - type: text
    content: of
  - type: text
    content: ' it. '
  '14':
  - type: text
    content: 'Every thing devoted in Israel shall be thine. '
  '15':
  - type: text
    content: 'Every thing that openeth the matrix in all flesh, which they bring unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: whether it be
  - type: text
    content: ' of men or beasts, shall be thine: nevertheless the firstborn of man shalt thou surely redeem, and the firstling of unclean beasts shalt thou redeem. '
  '16':
  - type: text
    content: 'And those that are to be redeemed from a month old shalt thou redeem, according to thine estimation, for the money of five shekels, after the shekel of the sanctuary, which '
  - type: text
    content: is
  - type: text
    content: ' twenty gerahs. '
  '17':
  - type: text
    content: 'But the firstling of a cow, or the firstling of a sheep, or the firstling of a goat, thou shalt not redeem; they '
  - type: text
    content: are
  - type: text
    content: ' holy: thou shalt sprinkle their blood upon the altar, and shalt burn their fat '
  - type: text
    content: for
  - type: text
    content: ' an offering made by fire, for a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'And the flesh of them shall be thine, as the wave breast and as the right shoulder are thine. '
  '19':
  - type: text
    content: 'All the heave offerings of the holy things, which the children of Israel offer unto the '
  - type: text
    content: LORD
  - type: text
    content: ', have I given thee, and thy sons and thy daughters with thee, by a statute for ever: it '
  - type: text
    content: is
  - type: text
    content: ' a covenant of salt for ever before the '
  - type: text
    content: LORD
  - type: text
    content: ' unto thee and to thy seed with thee. '
  '2':
  - type: text
    content: 'And thy brethren also of the tribe of Levi, the tribe of thy father, bring thou with thee, that they may be joined unto thee, and minister unto thee: but thou and thy sons with thee '
  - type: text
    content: shall minister
  - type: text
    content: ' before the tabernacle of witness. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Aaron, Thou shalt have no inheritance in their land, neither shalt thou have any part among them: I '
  - type: text
    content: am
  - type: text
    content: ' thy part and thine inheritance among the children of Israel.'
  '21':
  - type: text
    content: 'And, behold, I have given the children of Levi all the tenth in Israel for an inheritance, for their service which they serve, '
  - type: text
    content: even
  - type: text
    content: ' the service of the tabernacle of the congregation. '
  '22':
  - type: text
    content: 'Neither must the children of Israel henceforth come nigh the tabernacle of the congregation, lest they bear sin, and die. '
  '23':
  - type: text
    content: 'But the Levites shall do the service of the tabernacle of the congregation, and they shall bear their iniquity: '
  - type: text
    content: it shall be
  - type: text
    content: ' a statute for ever throughout your generations, that among the children of Israel they have no inheritance. '
  '24':
  - type: text
    content: 'But the tithes of the children of Israel, which they offer '
  - type: text
    content: as
  - type: text
    content: ' an heave offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ', I have given to the Levites to inherit: therefore I have said unto them, Among the children of Israel they shall have no inheritance.'
  '25':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '26':
  - type: text
    content: 'Thus speak unto the Levites, and say unto them, When ye take of the children of Israel the tithes which I have given you from them for your inheritance, then ye shall offer up an heave offering of it for the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' a tenth '
  - type: text
    content: part
  - type: text
    content: ' of the tithe. '
  '27':
  - type: text
    content: 'And '
  - type: text
    content: this
  - type: text
    content: ' your heave offering shall be reckoned unto you, as though '
  - type: text
    content: it were
  - type: text
    content: ' the corn of the threshingfloor, and as the fulness of the winepress. '
  '28':
  - type: text
    content: 'Thus ye also shall offer an heave offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' of all your tithes, which ye receive of the children of Israel; and ye shall give thereof the '
  - type: text
    content: LORD
  - type: text
    content: '''s heave offering to Aaron the priest. '
  '29':
  - type: text
    content: 'Out of all your gifts ye shall offer every heave offering of the '
  - type: text
    content: LORD
  - type: text
    content: ', of all the best thereof, '
  - type: text
    content: even
  - type: text
    content: ' the hallowed part thereof out of it. '
  '3':
  - type: text
    content: 'And they shall keep thy charge, and the charge of all the tabernacle: only they shall not come nigh the vessels of the sanctuary and the altar, that neither they, nor ye also, die. '
  '30':
  - type: text
    content: 'Therefore thou shalt say unto them, When ye have heaved the best thereof from it, then it shall be counted unto the Levites as the increase of the threshingfloor, and as the increase of the winepress. '
  '31':
  - type: text
    content: 'And ye shall eat it in every place, ye and your households: for it '
  - type: text
    content: is
  - type: text
    content: ' your reward for your service in the tabernacle of the congregation. '
  '32':
  - type: text
    content: 'And ye shall bear no sin by reason of it, when ye have heaved from it the best of it: neither shall ye pollute the holy things of the children of Israel, lest ye die.'
  '4':
  - type: text
    content: 'And they shall be joined unto thee, and keep the charge of the tabernacle of the congregation, for all the service of the tabernacle: and a stranger shall not come nigh unto you. '
  '5':
  - type: text
    content: 'And ye shall keep the charge of the sanctuary, and the charge of the altar: that there be no wrath any more upon the children of Israel. '
  '6':
  - type: text
    content: 'And I, behold, I have taken your brethren the Levites from among the children of Israel: to you '
  - type: text
    content: they are
  - type: text
    content: ' given '
  - type: text
    content: as
  - type: text
    content: ' a gift for the '
  - type: text
    content: LORD
  - type: text
    content: ', to do the service of the tabernacle of the congregation. '
  '7':
  - type: text
    content: 'Therefore thou and thy sons with thee shall keep your priest''s office for every thing of the altar, and within the vail; and ye shall serve: I have given your priest''s office '
  - type: text
    content: unto you as
  - type: text
    content: ' a service of gift: and the stranger that cometh nigh shall be put to death.'
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Aaron, Behold, I also have given thee the charge of mine heave offerings of all the hallowed things of the children of Israel; unto thee have I given them by reason of the anointing, and to thy sons, by an ordinance for ever. '
  '9':
  - type: text
    content: 'This shall be thine of the most holy things, '
  - type: text
    content: reserved
  - type: text
    content: ' from the fire: every oblation of their''s, every meat offering of their''s, and every sin offering of their''s, and every trespass offering of their''s, which they shall render unto me, '
  - type: text
    content: shall be
  - type: text
    content: ' most holy for thee and for thy sons. '
