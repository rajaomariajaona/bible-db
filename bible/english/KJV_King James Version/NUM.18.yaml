document_id: NUM.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Law of Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Aaron, Thou and thy sons and thy father''s house with thee shall bear the iniquity of the sanctuary: and thou and thy sons with thee shall bear the iniquity of your priesthood. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the most holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ' shalt thou eat it; every male shall eat it: it shall be holy unto thee. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine; the heave offering of their gift, with all the wave offerings of the children of Israel: I have given them unto thee, and to thy sons and to thy daughters with thee, by a statute for ever: every one that is clean in thy house shall eat of it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the best of the oil, and all the best of the wine, and of the wheat, the firstfruits of them which they shall offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', them have I given thee. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' whatsoever is first ripe in the land, which they shall bring unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', shall be thine; every one that is clean in thine house shall eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every thing devoted in Israel shall be thine. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every thing that openeth the matrix in all flesh, which they bring unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it be
    - type: text
      text: ' of men or beasts, shall be thine: nevertheless the firstborn of man shalt thou surely redeem, and the firstling of unclean beasts shalt thou redeem. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those that are to be redeemed from a month old shalt thou redeem, according to thine estimation, for the money of five shekels, after the shekel of the sanctuary, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' twenty gerahs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the firstling of a cow, or the firstling of a sheep, or the firstling of a goat, thou shalt not redeem; they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' holy: thou shalt sprinkle their blood upon the altar, and shalt burn their fat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an offering made by fire, for a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the flesh of them shall be thine, as the wave breast and as the right shoulder are thine. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the heave offerings of the holy things, which the children of Israel offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', have I given thee, and thy sons and thy daughters with thee, by a statute for ever: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a covenant of salt for ever before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto thee and to thy seed with thee. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thy brethren also of the tribe of Levi, the tribe of thy father, bring thou with thee, that they may be joined unto thee, and minister unto thee: but thou and thy sons with thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall minister
    - type: text
      text: ' before the tabernacle of witness. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Aaron, Thou shalt have no inheritance in their land, neither shalt thou have any part among them: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy part and thine inheritance among the children of Israel.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, I have given the children of Levi all the tenth in Israel for an inheritance, for their service which they serve, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the service of the tabernacle of the congregation. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither must the children of Israel henceforth come nigh the tabernacle of the congregation, lest they bear sin, and die. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Levites shall do the service of the tabernacle of the congregation, and they shall bear their iniquity: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a statute for ever throughout your generations, that among the children of Israel they have no inheritance. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the tithes of the children of Israel, which they offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' an heave offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I have given to the Levites to inherit: therefore I have said unto them, Among the children of Israel they shall have no inheritance.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus speak unto the Levites, and say unto them, When ye take of the children of Israel the tithes which I have given you from them for your inheritance, then ye shall offer up an heave offering of it for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' a tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of the tithe. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' your heave offering shall be reckoned unto you, as though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it were
    - type: text
      text: ' the corn of the threshingfloor, and as the fulness of the winepress. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus ye also shall offer an heave offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of all your tithes, which ye receive of the children of Israel; and ye shall give thereof the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s heave offering to Aaron the priest. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Out of all your gifts ye shall offer every heave offering of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', of all the best thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the hallowed part thereof out of it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall keep thy charge, and the charge of all the tabernacle: only they shall not come nigh the vessels of the sanctuary and the altar, that neither they, nor ye also, die. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thou shalt say unto them, When ye have heaved the best thereof from it, then it shall be counted unto the Levites as the increase of the threshingfloor, and as the increase of the winepress. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall eat it in every place, ye and your households: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' your reward for your service in the tabernacle of the congregation. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall bear no sin by reason of it, when ye have heaved from it the best of it: neither shall ye pollute the holy things of the children of Israel, lest ye die.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall be joined unto thee, and keep the charge of the tabernacle of the congregation, for all the service of the tabernacle: and a stranger shall not come nigh unto you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall keep the charge of the sanctuary, and the charge of the altar: that there be no wrath any more upon the children of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I, behold, I have taken your brethren the Levites from among the children of Israel: to you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' given '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a gift for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to do the service of the tabernacle of the congregation. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thou and thy sons with thee shall keep your priest''s office for every thing of the altar, and within the vail; and ye shall serve: I have given your priest''s office '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto you as
    - type: text
      text: ' a service of gift: and the stranger that cometh nigh shall be put to death.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Aaron, Behold, I also have given thee the charge of mine heave offerings of all the hallowed things of the children of Israel; unto thee have I given them by reason of the anointing, and to thy sons, by an ordinance for ever. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This shall be thine of the most holy things, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: reserved
    - type: text
      text: ' from the fire: every oblation of their''s, every meat offering of their''s, and every sin offering of their''s, and every trespass offering of their''s, which they shall render unto me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' most holy for thee and for thy sons. '
