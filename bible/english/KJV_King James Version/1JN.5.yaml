document_id: 1JN.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Whosoever believeth that Jesus is the Christ is born of God: and every one that loveth him that begat loveth him also that is begotten of him. '
  '10':
  - type: text
    content: 'He that believeth on the Son of God hath the witness in himself: he that believeth not God hath made him a liar; because he believeth not the record that God gave of his Son. '
  '11':
  - type: text
    content: 'And this is the record, that God hath given to us eternal life, and this life is in his Son. '
  '12':
  - type: text
    content: 'He that hath the Son hath life; '
  - type: text
    content: and
  - type: text
    content: ' he that hath not the Son of God hath not life.'
  '13':
  - type: text
    content: 'These things have I written unto you that believe on the name of the Son of God; that ye may know that ye have eternal life, and that ye may believe on the name of the Son of God. '
  '14':
  - type: text
    content: 'And this is the confidence that we have in him, that, if we ask any thing according to his will, he heareth us: '
  '15':
  - type: text
    content: 'and if we know that he hear us, whatsoever we ask, we know that we have the petitions that we desired of him. '
  '16':
  - type: text
    content: 'If any man see his brother sin a sin '
  - type: text
    content: which is
  - type: text
    content: ' not unto death, he shall ask, and he shall give him life for them that sin not unto death. There is a sin unto death: I do not say that he shall pray for it. '
  '17':
  - type: text
    content: 'All unrighteousness is sin: and there is a sin not unto death.'
  '18':
  - type: text
    content: 'We know that whosoever is born of God sinneth not; but he that is begotten of God keepeth himself, and that wicked one toucheth him not. '
  '19':
  - type: text
    content: And
  - type: text
    content: ' we know that we are of God, and the whole world lieth in wickedness. '
  '2':
  - type: text
    content: 'By this we know that we love the children of God, when we love God, and keep his commandments. '
  '20':
  - type: text
    content: 'And we know that the Son of God is come, and hath given us an understanding, that we may know him that is true, and we are in him that is true, '
  - type: text
    content: even
  - type: text
    content: ' in his Son Jesus Christ. This is the true God, and eternal life. '
  '21':
  - type: text
    content: Little children, keep yourselves from idols. Amen.
  '3':
  - type: text
    content: 'For this is the love of God, that we keep his commandments: and his commandments are not grievous. '
  '4':
  - type: text
    content: 'For whatsoever is born of God overcometh the world: and this is the victory that overcometh the world, '
  - type: text
    content: even
  - type: text
    content: ' our faith. '
  '5':
  - type: text
    content: 'Who is he that overcometh the world, but he that believeth that Jesus is the Son of God? '
  '6':
  - type: text
    content: 'This is he that came by water and blood, '
  - type: text
    content: even
  - type: text
    content: ' Jesus Christ; not by water only, but by water and blood. And it is the Spirit that beareth witness, because the Spirit is truth. '
  '7':
  - type: text
    content: 'For there are three that bear record in heaven, the Father, the Word, and the Holy Ghost: and these three are one. '
  '8':
  - type: text
    content: 'And there are three that bear witness in earth, the Spirit, and the water, and the blood: and these three agree in one. '
  '9':
  - type: text
    content: 'If we receive the witness of men, the witness of God is greater: for this is the witness of God which he hath testified of his Son. '
