  - type: text
    content: am
  - type: text
    content: ' holy, and have severed you from '
  - type: text
    content: other
  - type: text
    content: ' people, that ye should be mine.'
  '27':
  - type: text
    content: 'A man also or woman that hath a familiar spirit, or that is a wizard, shall surely be put to death: they shall stone them with stones: their blood '
  - type: text
    content: shall be
  - type: text
    content: ' upon them.'
  '3':
  - type: text
    content: 'And I will set my face against that man, and will cut him off from among his people; because he hath given of his seed unto Molech, to defile my sanctuary, and to profane my holy name. '
  '4':
  - type: text
    content: 'And if the people of the land do any ways hide their eyes from the man, when he giveth of his seed unto Molech, and kill him not: '
  '5':
  - type: text
    content: then I will set my face against that man, and against his family, and will cut him off, and all that go a whoring after him, to commit whoredom with Molech, from among their people.
  '6':
  - type: text
    content: And the soul that turneth after such as have familiar spirits, and after wizards, to go a whoring after them, I will even set my face against that soul, and will cut him off from among his people.
  '7':
  - type: text
    content: 'Sanctify yourselves therefore, and be ye holy: for I '
  - type: text
