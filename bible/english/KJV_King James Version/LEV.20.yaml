  '13':
  - type: text
    content: 'If a man also lie with mankind, as he lieth with a woman, both of them have committed an abomination: they shall surely be put to death; their blood '
  - type: text
    content: shall be
  - type: text
    content: ' upon them. '
  '14':
  - type: text
    content: 'And if a man take a wife and her mother, it '
  - type: text
