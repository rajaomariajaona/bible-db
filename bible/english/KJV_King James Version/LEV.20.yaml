  - type: text
    content: LORD
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: 'And ye shall keep my statutes, and do them: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' which sanctify you.'
  '9':
