  '15':
  - type: text
    content: 'And if a man lie with a beast, he shall surely be put to death: and ye shall slay the beast. '
  '16':
  - type: text
    content: 'And if a woman approach unto any beast, and lie down thereto, thou shalt kill the woman, and the beast: they shall surely be put to death; their blood '
  - type: text
    content: shall be
  - type: text
    content: ' upon them. '
  '17':
  - type: text
    content: 'And if a man shall take his sister, his father''s daughter, or his mother''s daughter, and see her nakedness, and she see his nakedness; it '
  - type: text
    content: is
  - type: text
    content: ' a wicked thing; and they shall be cut off in the sight of their people: he hath uncovered his sister''s nakedness; he shall bear his iniquity. '
  '18':
  - type: text
    content: 'And if a man shall lie with a woman having her sickness, and shall uncover her nakedness; he hath discovered her fountain, and she hath uncovered the fountain of her blood: and both of them shall be cut off from among their people. '
  '19':
  - type: text
    content: 'And thou shalt not uncover the nakedness of thy mother''s sister, nor of thy father''s sister: for he uncovereth his near kin: they shall bear their iniquity. '
  '2':
  - type: text
    content: 'Again, thou shalt say to the children of Israel, Whosoever '
  - type: text
