  '20':
  - type: text
    content: 'And if a man shall lie with his uncle''s wife, he hath uncovered his uncle''s nakedness: they shall bear their sin; they shall die childless. '
  '21':
  - type: text
    content: 'And if a man shall take his brother''s wife, it '
  - type: text
    content: is
  - type: text
    content: ' an unclean thing: he hath uncovered his brother''s nakedness; they shall be childless.'
  '22':
  - type: text
    content: 'Ye shall therefore keep all my statutes, and all my judgments, and do them: that the land, whither I bring you to dwell therein, spue you not out. '
  '23':
  - type: text
    content: 'And ye shall not walk in the manners of the nation, which I cast out before you: for they committed all these things, and therefore I abhorred them. '
  '24':
  - type: text
    content: 'But I have said unto you, Ye shall inherit their land, and I will give it unto you to possess it, a land that floweth with milk and honey: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, which have separated you from '
  - type: text
    content: other
  - type: text
    content: ' people. '
  '25':
  - type: text
    content: 'Ye shall therefore put difference between clean beasts and unclean, and between unclean fowls and clean: and ye shall not make your souls abominable by beast, or by fowl, or by any manner of living thing that creepeth on the ground, which I have separated from you as unclean. '
  '26':
  - type: text
    content: 'And ye shall be holy unto me: for I the '
  - type: text
    content: LORD
  - type: text
