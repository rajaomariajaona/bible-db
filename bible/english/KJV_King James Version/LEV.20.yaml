document_id: LEV.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Again, thou shalt say to the children of Israel, Whosoever '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he be
  - type: text
    text: ' of the children of Israel, or of the strangers that sojourn in Israel, that giveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' of his seed unto Molech; he shall surely be put to death: the people of the land shall stone him with stones. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I will set my face against that man, and will cut him off from among his people; because he hath given of his seed unto Molech, to defile my sanctuary, and to profane my holy name. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And if the people of the land do any ways hide their eyes from the man, when he giveth of his seed unto Molech, and kill him not: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: then I will set my face against that man, and against his family, and will cut him off, and all that go a whoring after him, to commit whoredom with Molech, from among their people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the soul that turneth after such as have familiar spirits, and after wizards, to go a whoring after them, I will even set my face against that soul, and will cut him off from among his people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sanctify yourselves therefore, and be ye holy: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And ye shall keep my statutes, and do them: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which sanctify you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For every one that curseth his father or his mother shall be surely put to death: he hath cursed his father or his mother; his blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the man that committeth adultery with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: another
  - type: text
    text: ' man''s wife, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even he
  - type: text
    text: ' that committeth adultery with his neighbour''s wife, the adulterer and the adulteress shall surely be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the man that lieth with his father''s wife hath uncovered his father''s nakedness: both of them shall surely be put to death; their blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And if a man lie with his daughter in law, both of them shall surely be put to death: they have wrought confusion; their blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'If a man also lie with mankind, as he lieth with a woman, both of them have committed an abomination: they shall surely be put to death; their blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if a man take a wife and her mother, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wickedness: they shall be burnt with fire, both he and they; that there be no wickedness among you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And if a man lie with a beast, he shall surely be put to death: and ye shall slay the beast. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And if a woman approach unto any beast, and lie down thereto, thou shalt kill the woman, and the beast: they shall surely be put to death; their blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And if a man shall take his sister, his father''s daughter, or his mother''s daughter, and see her nakedness, and she see his nakedness; it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a wicked thing; and they shall be cut off in the sight of their people: he hath uncovered his sister''s nakedness; he shall bear his iniquity. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And if a man shall lie with a woman having her sickness, and shall uncover her nakedness; he hath discovered her fountain, and she hath uncovered the fountain of her blood: and both of them shall be cut off from among their people. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And thou shalt not uncover the nakedness of thy mother''s sister, nor of thy father''s sister: for he uncovereth his near kin: they shall bear their iniquity. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And if a man shall lie with his uncle''s wife, he hath uncovered his uncle''s nakedness: they shall bear their sin; they shall die childless. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And if a man shall take his brother''s wife, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an unclean thing: he hath uncovered his brother''s nakedness; they shall be childless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ye shall therefore keep all my statutes, and all my judgments, and do them: that the land, whither I bring you to dwell therein, spue you not out. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And ye shall not walk in the manners of the nation, which I cast out before you: for they committed all these things, and therefore I abhorred them. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But I have said unto you, Ye shall inherit their land, and I will give it unto you to possess it, a land that floweth with milk and honey: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, which have separated you from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' people. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ye shall therefore put difference between clean beasts and unclean, and between unclean fowls and clean: and ye shall not make your souls abominable by beast, or by fowl, or by any manner of living thing that creepeth on the ground, which I have separated from you as unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And ye shall be holy unto me: for I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' holy, and have severed you from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' people, that ye should be mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A man also or woman that hath a familiar spirit, or that is a wizard, shall surely be put to death: they shall stone them with stones: their blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon them.'
