document_id: ISA.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Keep silence before me, O islands; and let the people renew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' strength: let them come near; then let them speak: let us come near together to judgment. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Who raised up the righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' from the east, called him to his foot, gave the nations before him, and made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' rule over kings? he gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' as the dust to his sword, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as driven stubble to his bow. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He pursued them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' passed safely; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' by the way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he had not gone with his feet. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Who hath wrought and done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', calling the generations from the beginning? I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the first, and with the last; I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The isles saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and feared; the ends of the earth were afraid, drew near, and came. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They helped every one his neighbour; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every one
  - type: text
    text: ' said to his brother, Be of good courage. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the carpenter encouraged the goldsmith, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' he that smootheth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' the hammer him that smote the anvil, saying, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' ready for the sodering: and he fastened it with nails, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' it should not be moved.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Appeal to Exiles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But thou, Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my servant, Jacob whom I have chosen, the seed of Abraham my friend. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Thou
  - type: text
    text: ' whom I have taken from the ends of the earth, and called thee from the chief men thereof, and said unto thee, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my servant; I have chosen thee, and not cast thee away. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fear thou not; for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with thee: be not dismayed; for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' thy God: I will strengthen thee; yea, I will help thee; yea, I will uphold thee with the right hand of my righteousness. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, all they that were incensed against thee shall be ashamed and confounded: they shall be as nothing; and they that strive with thee shall perish. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Thou shalt seek them, and shalt not find them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' them that contended with thee: they that war against thee shall be as nothing, and as a thing of nought. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God will hold thy right hand, saying unto thee, Fear not; I will help thee. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fear not, thou worm Jacob, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' ye men of Israel; I will help thee, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and thy redeemer, the Holy One of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Behold, I will make thee a new sharp threshing instrument having teeth: thou shalt thresh the mountains, and beat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' small, and shalt make the hills as chaff. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thou shalt fan them, and the wind shall carry them away, and the whirlwind shall scatter them: and thou shalt rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' shalt glory in the Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: When
  - type: text
    text: ' the poor and needy seek water, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' their tongue faileth for thirst, I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will hear them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I
  - type: text
    text: ' the God of Israel will not forsake them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I will open rivers in high places, and fountains in the midst of the valleys: I will make the wilderness a pool of water, and the dry land springs of water. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I will plant in the wilderness the cedar, the shittah tree, and the myrtle, and the oil tree; I will set in the desert the fir tree, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the pine, and the box tree together: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that they may see, and know, and consider, and understand together, that the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath done this, and the Holy One of Israel hath created it.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Challenge to Nations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Produce your cause, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; bring forth your strong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: reasons
  - type: text
    text: ', saith the King of Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Let them bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' forth, and shew us what shall happen: let them shew the former things, what they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ', that we may consider them, and know the latter end of them; or declare us things for to come. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Shew the things that are to come hereafter, that we may know that ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' gods: yea, do good, or do evil, that we may be dismayed, and behold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' together. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Behold, ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' of nothing, and your work of nought: an abomination '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is he that
  - type: text
    text: ' chooseth you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I have raised up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' from the north, and he shall come: from the rising of the sun shall he call upon my name: and he shall come upon princes as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' morter, and as the potter treadeth clay. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Who hath declared from the beginning, that we may know? and beforetime, that we may say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' righteous? yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none that sheweth, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none that declareth, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none that heareth your words. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall say
  - type: text
    text: ' to Zion, Behold, behold them: and I will give to Jerusalem one that bringeth good tidings. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For I beheld, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no man; even among them, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no counsellor, that, when I asked of them, could answer a word. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all vanity; their works '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' nothing: their molten images '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' wind and confusion.'
