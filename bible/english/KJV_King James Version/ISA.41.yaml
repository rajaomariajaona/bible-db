document_id: ISA.41,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep silence before me, O islands; and let the people renew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' strength: let them come near; then let them speak: let us come near together to judgment. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fear thou not; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' with thee: be not dismayed; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy God: I will strengthen thee; yea, I will help thee; yea, I will uphold thee with the right hand of my righteousness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, all they that were incensed against thee shall be ashamed and confounded: they shall be as nothing; and they that strive with thee shall perish. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt seek them, and shalt not find them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' them that contended with thee: they that war against thee shall be as nothing, and as a thing of nought. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God will hold thy right hand, saying unto thee, Fear not; I will help thee. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fear not, thou worm Jacob, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' ye men of Israel; I will help thee, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and thy redeemer, the Holy One of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will make thee a new sharp threshing instrument having teeth: thou shalt thresh the mountains, and beat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' small, and shalt make the hills as chaff. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt fan them, and the wind shall carry them away, and the whirlwind shall scatter them: and thou shalt rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' shalt glory in the Holy One of Israel.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' the poor and needy seek water, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' their tongue faileth for thirst, I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will hear them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I
    - type: text
      text: ' the God of Israel will not forsake them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will open rivers in high places, and fountains in the midst of the valleys: I will make the wilderness a pool of water, and the dry land springs of water. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will plant in the wilderness the cedar, the shittah tree, and the myrtle, and the oil tree; I will set in the desert the fir tree, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the pine, and the box tree together: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who raised up the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' from the east, called him to his foot, gave the nations before him, and made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' rule over kings? he gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' as the dust to his sword, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as driven stubble to his bow. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that they may see, and know, and consider, and understand together, that the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath done this, and the Holy One of Israel hath created it.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Challenge to Nations
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Produce your cause, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; bring forth your strong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: reasons
    - type: text
      text: ', saith the King of Jacob. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let them bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' forth, and shew us what shall happen: let them shew the former things, what they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ', that we may consider them, and know the latter end of them; or declare us things for to come. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shew the things that are to come hereafter, that we may know that ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' gods: yea, do good, or do evil, that we may be dismayed, and behold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' together. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' of nothing, and your work of nought: an abomination '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is he that
    - type: text
      text: ' chooseth you.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have raised up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' from the north, and he shall come: from the rising of the sun shall he call upon my name: and he shall come upon princes as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon
    - type: text
      text: ' morter, and as the potter treadeth clay. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who hath declared from the beginning, that we may know? and beforetime, that we may say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' righteous? yea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that sheweth, yea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that declareth, yea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that heareth your words. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall say
    - type: text
      text: ' to Zion, Behold, behold them: and I will give to Jerusalem one that bringeth good tidings. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I beheld, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no man; even among them, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no counsellor, that, when I asked of them, could answer a word. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all vanity; their works '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' nothing: their molten images '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wind and confusion.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He pursued them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' passed safely; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' by the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he had not gone with his feet. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who hath wrought and done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', calling the generations from the beginning? I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the first, and with the last; I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' he. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The isles saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and feared; the ends of the earth were afraid, drew near, and came. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They helped every one his neighbour; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every one
    - type: text
      text: ' said to his brother, Be of good courage. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the carpenter encouraged the goldsmith, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he that smootheth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' the hammer him that smote the anvil, saying, It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' ready for the sodering: and he fastened it with nails, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' it should not be moved.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Appeal to Exiles
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thou, Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my servant, Jacob whom I have chosen, the seed of Abraham my friend. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou
    - type: text
      text: ' whom I have taken from the ends of the earth, and called thee from the chief men thereof, and said unto thee, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my servant; I have chosen thee, and not cast thee away. '
