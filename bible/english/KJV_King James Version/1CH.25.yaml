    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover David and the captains of the host separated to the service of the sons of Asaph, and of Heman, and of Jeduthun, who should prophesy with harps, with psalteries, and with cymbals: and the number of the workmen according to their service was: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'of the sons of Asaph; Zaccur, and Joseph, and Nethaniah, and Asarelah, the sons of Asaph under the hands of Asaph, which prophesied according to the order of the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Of Jeduthun: the sons of Jeduthun; Gedaliah, and Zeri, and Jeshaiah, Hashabiah, and Mattithiah, six, under the hands of their father Jeduthun, who prophesied with a harp, to give thanks and to praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Of Heman: the sons of Heman; Bukkiah, Mattaniah, Uzziel, Shebuel, and Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, and Romamti-ezer, Joshbekashah, Mallothi, Hothir, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Mahazioth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'all these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Heman the king''s seer in the words of God, to lift up the horn. And God gave to Heman fourteen sons and three daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' under the hands of their father for song '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', with cymbals, psalteries, and harps, for the service of the house of God, according to the king''s order to Asaph, Jeduthun, and Heman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the number of them, with their brethren that were instructed in the songs of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all that were cunning, was two hundred fourscore and eight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they cast lots, ward against '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ward
  - type: text
    text: ', as well the small as the great, the teacher as the scholar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
