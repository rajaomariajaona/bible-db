  '5':
  - type: text
    content: 'all these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Heman the king''s seer in the words of God, to lift up the horn. And God gave to Heman fourteen sons and three daughters. '
  '6':
  - type: text
    content: 'All these '
  - type: text
    content: were
  - type: text
    content: ' under the hands of their father for song '
  - type: text
    content: in
  - type: text
    content: ' the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', with cymbals, psalteries, and harps, for the service of the house of God, according to the king''s order to Asaph, Jeduthun, and Heman. '
  '7':
  - type: text
    content: 'So the number of them, with their brethren that were instructed in the songs of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' all that were cunning, was two hundred fourscore and eight. '
