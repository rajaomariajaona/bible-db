document_id: PRO.26,1
type_code: eng
verses:
  '1':
  - type: text
    content: As snow in summer, and as rain in harvest,
  - type: text
    content: So honour is not seemly for a fool.
  '10':
  - type: text
    content: 'The great '
  - type: text
    content: God
  - type: text
    content: ' that formed all '
  - type: text
    content: things
  - type: text
    content: Both rewardeth the fool, and rewardeth transgressors.
  '11':
  - type: text
    content: As a dog returneth to his vomit,
  - type: text
    content: So
  - type: text
    content: ' a fool returneth to his folly.'
  '12':
  - type: text
    content: Seest thou a man wise in his own conceit?
  - type: text
    content: There is
  - type: text
    content: ' more hope of a fool than of him.'
  '13':
  - type: text
    content: 'The slothful '
  - type: text
    content: man
  - type: text
    content: ' saith, '
  - type: text
    content: There is
  - type: text
    content: ' a lion in the way;'
  - type: text
    content: 'A lion '
  - type: text
    content: is
  - type: text
    content: ' in the streets.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' the door turneth upon his hinges,'
  - type: text
    content: 'So '
  - type: text
    content: doth
  - type: text
    content: ' the slothful upon his bed.'
  '15':
  - type: text
    content: 'The slothful hideth his hand in '
  - type: text
    content: his
  - type: text
    content: ' bosom;'
  - type: text
    content: It grieveth him to bring it again to his mouth.
  '16':
  - type: text
    content: 'The sluggard '
  - type: text
    content: is
  - type: text
    content: ' wiser in his own conceit'
  - type: text
    content: Than seven men that can render a reason.
  '17':
  - type: text
    content: 'He that passeth by, '
  - type: text
    content: and
  - type: text
    content: ' meddleth with strife '
  - type: text
    content: belonging
  - type: text
    content: ' not to him,'
  - type: text
    content: Is like
  - type: text
    content: ' one that taketh a dog by the ears.'
  '18':
  - type: text
    content: 'As a mad '
  - type: text
    content: man
  - type: text
    content: ' who casteth firebrands,'
  - type: text
    content: Arrows, and death,
  '19':
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' the man '
  - type: text
    content: that
  - type: text
    content: ' deceiveth his neighbour,'
  - type: text
    content: And saith, Am not I in sport?
  '2':
  - type: text
    content: As the bird by wandering, as the swallow by flying,
  - type: text
    content: So the curse causeless shall not come.
  '20':
  - type: text
    content: 'Where no wood is, '
  - type: text
    content: there
  - type: text
    content: ' the fire goeth out:'
  - type: text
    content: 'So where '
  - type: text
    content: there is
  - type: text
    content: ' no talebearer, the strife ceaseth.'
  '21':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' coals '
  - type: text
    content: are
  - type: text
    content: ' to burning coals, and wood to fire;'
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' a contentious man to kindle strife.'
  '22':
  - type: text
    content: 'The words of a talebearer '
  - type: text
    content: are
  - type: text
    content: ' as wounds,'
  - type: text
    content: And they go down into the innermost parts of the belly.
  '23':
  - type: text
    content: Burning lips and a wicked heart
  - type: text
    content: Are like
  - type: text
    content: ' a potsherd covered with silver dross.'
  '24':
  - type: text
    content: He that hateth dissembleth with his lips,
  - type: text
    content: And layeth up deceit within him;
  '25':
  - type: text
    content: 'When he speaketh fair, believe him not:'
  - type: text
    content: 'For '
  - type: text
    content: there are
  - type: text
    content: ' seven abominations in his heart.'
  '26':
  - type: text
    content: ' '
  - type: text
    content: Whose
  - type: text
    content: ' hatred is covered by deceit,'
  - type: text
    content: 'His wickedness shall be shewed before the '
  - type: text
    content: whole
  - type: text
    content: ' congregation.'
  '27':
  - type: text
    content: 'Whoso diggeth a pit shall fall therein:'
  - type: text
    content: And he that rolleth a stone, it will return upon him.
  '28':
  - type: text
    content: 'A lying tongue hateth '
  - type: text
    content: those that are
  - type: text
    content: ' afflicted by it;'
  - type: text
    content: And a flattering mouth worketh ruin.
  '3':
  - type: text
    content: A whip for the horse, a bridle for the ass,
  - type: text
    content: And a rod for the fool's back.
  '4':
  - type: text
    content: Answer not a fool according to his folly,
  - type: text
    content: Lest thou also be like unto him.
  '5':
  - type: text
    content: Answer a fool according to his folly,
  - type: text
    content: Lest he be wise in his own conceit.
  '6':
  - type: text
    content: He that sendeth a message by the hand of a fool
  - type: text
    content: 'Cutteth off the feet, '
  - type: text
    content: and
  - type: text
    content: ' drinketh damage.'
  '7':
  - type: text
    content: 'The legs of the lame are not equal:'
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' a parable in the mouth of fools.'
  '8':
  - type: text
    content: As he that bindeth a stone in a sling,
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' he that giveth honour to a fool.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' a thorn goeth up into the hand of a drunkard,'
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' a parable in the mouth of fools.'
