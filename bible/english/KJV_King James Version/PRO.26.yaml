document_id: PRO.26
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: As snow in summer, and as rain in harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So honour is not seemly for a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As the bird by wandering, as the swallow by flying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So the curse causeless shall not come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A whip for the horse, a bridle for the ass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a rod for the fool's back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Answer not a fool according to his folly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lest thou also be like unto him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Answer a fool according to his folly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lest he be wise in his own conceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He that sendeth a message by the hand of a fool
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Cutteth off the feet, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' drinketh damage.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The legs of the lame are not equal:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a parable in the mouth of fools.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As he that bindeth a stone in a sling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that giveth honour to a fool.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' a thorn goeth up into the hand of a drunkard,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a parable in the mouth of fools.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' that formed all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
- type: usfm
  marker: q2
  children:
  - type: text
    text: Both rewardeth the fool, and rewardeth transgressors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: As a dog returneth to his vomit,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: So
  - type: text
    text: ' a fool returneth to his folly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Seest thou a man wise in his own conceit?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' more hope of a fool than of him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The slothful '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' saith, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a lion in the way;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A lion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the streets.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the door turneth upon his hinges,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: doth
  - type: text
    text: ' the slothful upon his bed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The slothful hideth his hand in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' bosom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It grieveth him to bring it again to his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sluggard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wiser in his own conceit'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than seven men that can render a reason.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He that passeth by, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' meddleth with strife '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonging
  - type: text
    text: ' not to him,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is like
  - type: text
    text: ' one that taketh a dog by the ears.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As a mad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' who casteth firebrands,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Arrows, and death,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' deceiveth his neighbour,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And saith, Am not I in sport?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Where no wood is, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' the fire goeth out:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no talebearer, the strife ceaseth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' coals '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' to burning coals, and wood to fire;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a contentious man to kindle strife.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The words of a talebearer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as wounds,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they go down into the innermost parts of the belly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Burning lips and a wicked heart
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are like
  - type: text
    text: ' a potsherd covered with silver dross.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He that hateth dissembleth with his lips,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And layeth up deceit within him;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When he speaketh fair, believe him not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' seven abominations in his heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Whose
  - type: text
    text: ' hatred is covered by deceit,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His wickedness shall be shewed before the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whole
  - type: text
    text: ' congregation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Whoso diggeth a pit shall fall therein:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he that rolleth a stone, it will return upon him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A lying tongue hateth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those that are
  - type: text
    text: ' afflicted by it;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a flattering mouth worketh ruin.
