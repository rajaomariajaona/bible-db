document_id: EZR.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra's Company
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' now the chief of their fathers, and '
  - type: text
    content: this is
  - type: text
    content: ' the genealogy of them that went up with me from Babylon, in the reign of Artaxerxes the king. '
  '10':
  - type: text
    content: 'And of the sons of Shelomith; the son of Josiphiah, and with him an hundred and threescore males. '
  '11':
  - type: text
    content: 'And of the sons of Bebai; Zechariah the son of Bebai, and with him twenty and eight males. '
  '12':
  - type: text
    content: 'And of the sons of Azgad; Johanan the son of Hakkatan, and with him an hundred and ten males. '
  '13':
  - type: text
    content: 'And of the last sons of Adonikam, whose names '
  - type: text
    content: are
  - type: text
    content: ' these, Eliphelet, Jeiel, and Shemaiah, and with them threescore males. '
  '14':
  - type: text
    content: Of the sons also of Bigvai; Uthai, and Zabbud, and with them seventy males.
  - type: heading
    content: The Journey
  '15':
  - type: text
    content: 'And I gathered them together to the river that runneth to Ahava; and there abode we in tents three days: and I viewed the people, and the priests, and found there none of the sons of Levi. '
  '16':
  - type: text
    content: 'Then sent I for Eliezer, for Ariel, for Shemaiah, and for Elnathan, and for Jarib, and for Elnathan, and for Nathan, and for Zechariah, and for Meshullam, chief men; also for Joiarib, and for Elnathan, men of understanding. '
  '17':
  - type: text
    content: 'And I sent them with commandment unto Iddo the chief at the place Casiphia, and I told them what they should say unto Iddo, '
  - type: text
    content: and
  - type: text
    content: ' to his brethren the Nethinims, at the place Casiphia, that they should bring unto us ministers for the house of our God. '
  '18':
  - type: text
    content: 'And by the good hand of our God upon us they brought us a man of understanding, of the sons of Mahli, the son of Levi, the son of Israel; and Sherebiah, with his sons and his brethren, eighteen; '
  '19':
  - type: text
    content: 'and Hashabiah, and with him Jeshaiah of the sons of Merari, his brethren and their sons, twenty; '
  '2':
  - type: text
    content: 'Of the sons of Phinehas; Gershom: of the sons of Ithamar; Daniel: of the sons of David; Hattush. '
  '20':
  - type: text
    content: 'also of the Nethinims, whom David and the princes had appointed for the service of the Levites, two hundred and twenty Nethinims: all of them were expressed by name.'
  - type: heading
    content: Prayer on the Way
  '21':
  - type: text
    content: 'Then I proclaimed a fast there, at the river of Ahava, that we might afflict ourselves before our God, to seek of him a right way for us, and for our little ones, and for all our substance. '
  '22':
  - type: text
    content: 'For I was ashamed to require of the king a band of soldiers and horsemen to help us against the enemy in the way: because we had spoken unto the king, saying, The hand of our God '
  - type: text
    content: is
  - type: text
    content: ' upon all them for good that seek him; but his power and his wrath '
  - type: text
    content: is
  - type: text
    content: ' against all them that forsake him. '
  '23':
  - type: text
    content: 'So we fasted and besought our God for this: and he was intreated of us.'
  '24':
  - type: text
    content: 'Then I separated twelve of the chief of the priests, Sherebiah, Hashabiah, and ten of their brethren with them, '
  '25':
  - type: text
    content: 'and weighed unto them the silver, and the gold, and the vessels, '
  - type: text
    content: even
  - type: text
    content: ' the offering of the house of our God, which the king, and his counsellors, and his lords, and all Israel '
  - type: text
    content: there
  - type: text
    content: ' present, had offered: '
  '26':
  - type: text
    content: 'I even weighed unto their hand six hundred and fifty talents of silver, and silver vessels an hundred talents, '
  - type: text
    content: and
  - type: text
    content: ' of gold an hundred talents; '
  '27':
  - type: text
    content: 'also twenty basons of gold, of a thousand drams; and two vessels of fine copper, precious as gold. '
  '28':
  - type: text
    content: 'And I said unto them, Ye '
  - type: text
    content: are
  - type: text
    content: ' holy unto the '
  - type: text
    content: LORD
  - type: text
    content: '; the vessels '
  - type: text
    content: are
  - type: text
    content: ' holy also; and the silver and the gold '
  - type: text
    content: are
  - type: text
    content: ' a freewill offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of your fathers. '
  '29':
  - type: text
    content: 'Watch ye, and keep '
  - type: text
    content: them
  - type: text
    content: ', until ye weigh '
  - type: text
    content: them
  - type: text
    content: ' before the chief of the priests and the Levites, and chief of the fathers of Israel, at Jerusalem, in the chambers of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Of the sons of Shechaniah, of the sons of Pharosh; Zechariah: and with him were reckoned by genealogy of the males an hundred and fifty. '
  '30':
  - type: text
    content: 'So took the priests and the Levites the weight of the silver, and the gold, and the vessels, to bring '
  - type: text
    content: them
  - type: text
    content: ' to Jerusalem unto the house of our God.'
  - type: heading
    content: In Jerusalem
  '31':
  - type: text
    content: 'Then we departed from the river of Ahava on the twelfth '
  - type: text
    content: day
  - type: text
    content: ' of the first month, to go unto Jerusalem: and the hand of our God was upon us, and he delivered us from the hand of the enemy, and of such as lay in wait by the way. '
  '32':
  - type: text
    content: And we came to Jerusalem, and abode there three days.
  '33':
  - type: text
    content: 'Now on the fourth day was the silver and the gold and the vessels weighed in the house of our God by the hand of Meremoth the son of Uriah the priest; and with him '
  - type: text
    content: was
  - type: text
    content: ' Eleazar the son of Phinehas; and with them '
  - type: text
    content: was
  - type: text
    content: ' Jozabad the son of Jeshua, and Noadiah the son of Binnui, Levites; '
  '34':
  - type: text
    content: 'by number '
  - type: text
    content: and
  - type: text
    content: ' by weight of every one: and all the weight was written at that time.'
  - type: heading
    content: An Offering to God
  '35':
  - type: text
    content: ' '
  - type: text
    content: Also
  - type: text
    content: ' the children of those that had been carried away, which were come out of the captivity, offered burnt offerings unto the God of Israel, twelve bullocks for all Israel, ninety and six rams, seventy and seven lambs, twelve he goats '
  - type: text
    content: for
  - type: text
    content: ' a sin offering: all '
  - type: text
    content: this was
  - type: text
    content: ' a burnt offering unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'And they delivered the king''s commissions unto the king''s lieutenants, and to the governors on this side the river: and they furthered the people, and the house of God.'
  '4':
  - type: text
    content: 'Of the sons of Pahath-moab; Elihoenai the son of Zerahiah, and with him two hundred males. '
  '5':
  - type: text
    content: 'Of the sons of Shechaniah; the son of Jahaziel, and with him three hundred males. '
  '6':
  - type: text
    content: 'Of the sons also of Adin; Ebed the son of Jonathan, and with him fifty males. '
  '7':
  - type: text
    content: 'And of the sons of Elam; Jeshaiah the son of Athaliah, and with him seventy males. '
  '8':
  - type: text
    content: 'And of the sons of Shephatiah; Zebadiah the son of Michael, and with him fourscore males. '
  '9':
  - type: text
    content: 'Of the sons of Joab; Obadiah the son of Jehiel, and with him two hundred and eighteen males. '
