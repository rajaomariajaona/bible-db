document_id: EZR.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezra's Company
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' now the chief of their fathers, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this is
  - type: text
    text: ' the genealogy of them that went up with me from Babylon, in the reign of Artaxerxes the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Of the sons of Phinehas; Gershom: of the sons of Ithamar; Daniel: of the sons of David; Hattush. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Of the sons of Shechaniah, of the sons of Pharosh; Zechariah: and with him were reckoned by genealogy of the males an hundred and fifty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Of the sons of Pahath-moab; Elihoenai the son of Zerahiah, and with him two hundred males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Of the sons of Shechaniah; the son of Jahaziel, and with him three hundred males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Of the sons also of Adin; Ebed the son of Jonathan, and with him fifty males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And of the sons of Elam; Jeshaiah the son of Athaliah, and with him seventy males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And of the sons of Shephatiah; Zebadiah the son of Michael, and with him fourscore males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Of the sons of Joab; Obadiah the son of Jehiel, and with him two hundred and eighteen males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And of the sons of Shelomith; the son of Josiphiah, and with him an hundred and threescore males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And of the sons of Bebai; Zechariah the son of Bebai, and with him twenty and eight males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And of the sons of Azgad; Johanan the son of Hakkatan, and with him an hundred and ten males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And of the last sons of Adonikam, whose names '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these, Eliphelet, Jeiel, and Shemaiah, and with them threescore males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Of the sons also of Bigvai; Uthai, and Zabbud, and with them seventy males.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Journey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I gathered them together to the river that runneth to Ahava; and there abode we in tents three days: and I viewed the people, and the priests, and found there none of the sons of Levi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then sent I for Eliezer, for Ariel, for Shemaiah, and for Elnathan, and for Jarib, and for Elnathan, and for Nathan, and for Zechariah, and for Meshullam, chief men; also for Joiarib, and for Elnathan, men of understanding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And I sent them with commandment unto Iddo the chief at the place Casiphia, and I told them what they should say unto Iddo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to his brethren the Nethinims, at the place Casiphia, that they should bring unto us ministers for the house of our God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And by the good hand of our God upon us they brought us a man of understanding, of the sons of Mahli, the son of Levi, the son of Israel; and Sherebiah, with his sons and his brethren, eighteen; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and Hashabiah, and with him Jeshaiah of the sons of Merari, his brethren and their sons, twenty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'also of the Nethinims, whom David and the princes had appointed for the service of the Levites, two hundred and twenty Nethinims: all of them were expressed by name.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Prayer on the Way
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I proclaimed a fast there, at the river of Ahava, that we might afflict ourselves before our God, to seek of him a right way for us, and for our little ones, and for all our substance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For I was ashamed to require of the king a band of soldiers and horsemen to help us against the enemy in the way: because we had spoken unto the king, saying, The hand of our God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon all them for good that seek him; but his power and his wrath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' against all them that forsake him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So we fasted and besought our God for this: and he was intreated of us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then I separated twelve of the chief of the priests, Sherebiah, Hashabiah, and ten of their brethren with them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and weighed unto them the silver, and the gold, and the vessels, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the offering of the house of our God, which the king, and his counsellors, and his lords, and all Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' present, had offered: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I even weighed unto their hand six hundred and fifty talents of silver, and silver vessels an hundred talents, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of gold an hundred talents; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'also twenty basons of gold, of a thousand drams; and two vessels of fine copper, precious as gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And I said unto them, Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' holy unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; the vessels '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' holy also; and the silver and the gold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a freewill offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of your fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Watch ye, and keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', until ye weigh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before the chief of the priests and the Levites, and chief of the fathers of Israel, at Jerusalem, in the chambers of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So took the priests and the Levites the weight of the silver, and the gold, and the vessels, to bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to Jerusalem unto the house of our God.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: In Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then we departed from the river of Ahava on the twelfth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the first month, to go unto Jerusalem: and the hand of our God was upon us, and he delivered us from the hand of the enemy, and of such as lay in wait by the way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And we came to Jerusalem, and abode there three days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now on the fourth day was the silver and the gold and the vessels weighed in the house of our God by the hand of Meremoth the son of Uriah the priest; and with him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Eleazar the son of Phinehas; and with them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jozabad the son of Jeshua, and Noadiah the son of Binnui, Levites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'by number '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' by weight of every one: and all the weight was written at that time.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Offering to God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Also
  - type: text
    text: ' the children of those that had been carried away, which were come out of the captivity, offered burnt offerings unto the God of Israel, twelve bullocks for all Israel, ninety and six rams, seventy and seven lambs, twelve he goats '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sin offering: all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this was
  - type: text
    text: ' a burnt offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And they delivered the king''s commissions unto the king''s lieutenants, and to the governors on this side the river: and they furthered the people, and the house of God.'
