document_id: 2CO.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'We then, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' workers together '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with him
    - type: text
      text: ', beseech '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' also that ye receive not the grace of God in vain. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'as sorrowful, yet alway rejoicing; as poor, yet making many rich; as having nothing, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' possessing all things.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'O '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' Corinthians, our mouth is open unto you, our heart is enlarged. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ye are not straitened in us, but ye are straitened in your own bowels. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now for a recompence in the same, (I speak as unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' children,) be ye also enlarged.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Entanglements
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Be ye not unequally yoked together with unbelievers: for what fellowship hath righteousness with unrighteousness? and what communion hath light with darkness? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And what concord hath Christ with Belial? or what part hath he that believeth with an infidel? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And what agreement hath the temple of God with idols? for ye are the temple of the living God; as God hath said, I will dwell in them, and walk in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '; and I will be their God, and they shall be my people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Wherefore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come out from among them, and be ye separate,
  - type: usfm
    marker: m
    children:
    - type: text
      text: saith the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And touch not the unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will receive you,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And will be a Father unto you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And ye shall be my sons and daughters,
  - type: usfm
    marker: m
    children:
    - type: text
      text: saith the Lord Almighty.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: (For he saith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have heard thee in a time accepted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in the day of salvation have I succoured thee:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'behold, now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the accepted time; behold, now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the day of salvation.) '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Giving no offence in any thing, that the ministry be not blamed: '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But in all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' approving ourselves as the ministers of God, in much patience, in afflictions, in necessities, in distresses, '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'in stripes, in imprisonments, in tumults, in labours, in watchings, in fastings; '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'by pureness, by knowledge, by longsuffering, by kindness, by the Holy Ghost, by love unfeigned, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'by the word of truth, by the power of God, by the armour of righteousness on the right hand and on the left, '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'by honour and dishonour, by evil report and good report: as deceivers, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' true; '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'as unknown, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' well known; as dying, and, behold, we live; as chastened, and not killed; '
