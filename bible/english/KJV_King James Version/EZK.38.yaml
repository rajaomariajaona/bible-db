document_id: EZK.38,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Final Triumph
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; It shall also come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' at the same time shall things come into thy mind, and thou shalt think an evil thought: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and thou shalt say, I will go up to the land of unwalled villages; I will go to them that are at rest, that dwell safely, all of them dwelling without walls, and having neither bars nor gates, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to take a spoil, and to take a prey; to turn thine hand upon the desolate places '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are now
    - type: text
      text: ' inhabited, and upon the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' gathered out of the nations, which have gotten cattle and goods, that dwell in the midst of the land.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sheba, and Dedan, and the merchants of Tarshish, with all the young lions thereof, shall say unto thee, Art thou come to take a spoil? hast thou gathered thy company to take a prey? to carry away silver and gold, to take away cattle and goods, to take a great spoil?
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, son of man, prophesy and say unto Gog, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; In that day when my people of Israel dwelleth safely, shalt thou not know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it?
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt come from thy place out of the north parts, thou, and many people with thee, all of them riding upon horses, a great company, and a mighty army: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and thou shalt come up against my people of Israel, as a cloud to cover the land; it shall be in the latter days, and I will bring thee against my land, that the heathen may know me, when I shall be sanctified in thee, O Gog, before their eyes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou he of whom I have spoken in old time by my servants the prophets of Israel, which prophesied in those days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: many
    - type: text
      text: ' years that I would bring thee against them? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass at the same time when Gog shall come against the land of Israel, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' my fury shall come up in my face. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in my jealousy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' in the fire of my wrath have I spoken, Surely in that day there shall be a great shaking in the land of Israel; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, set thy face against Gog, the land of Magog, the chief prince of Meshech and Tubal, and prophesy against him, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that the fishes of the sea, and the fowls of the heaven, and the beasts of the field, and all creeping things that creep upon the earth, and all the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon the face of the earth, shall shake at my presence, and the mountains shall be thrown down, and the steep places shall fall, and every wall shall fall to the ground. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will call for a sword against him throughout all my mountains, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ': every man''s sword shall be against his brother. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will plead against him with pestilence and with blood; and I will rain upon him, and upon his bands, and upon the many people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with him, an overflowing rain, and great hailstones, fire, and brimstone. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus will I magnify myself, and sanctify myself; and I will be known in the eyes of many nations, and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, O Gog, the chief prince of Meshech and Tubal: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will turn thee back, and put hooks into thy jaws, and I will bring thee forth, and all thine army, horses and horsemen, all of them clothed with all sorts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of armour, even
    - type: text
      text: ' a great company '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' bucklers and shields, all of them handling swords: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Persia, Ethiopia, and Libya with them; all of them with shield and helmet: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gomer, and all his bands; the house of Togarmah of the north quarters, and all his bands: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' many people with thee.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be thou prepared, and prepare for thyself, thou, and all thy company that are assembled unto thee, and be thou a guard unto them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After many days thou shalt be visited: in the latter years thou shalt come into the land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' brought back from the sword, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and is
    - type: text
      text: ' gathered out of many people, against the mountains of Israel, which have been always waste: but it is brought forth out of the nations, and they shall dwell safely all of them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thou shalt ascend and come like a storm, thou shalt be like a cloud to cover the land, thou, and all thy bands, and many people with thee.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Gog's Evil Design
    marker-yv: yv-h
