document_id: NEH.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The King's Commission
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass in the month Nisan, in the twentieth year of Artaxerxes the king, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' wine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before him: and I took up the wine, and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto the king. Now I had not been '
    - type: usfm
      marker: add
      children:
      - type: text
        text: beforetime
    - type: text
      text: ' sad in his presence. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When Sanballat the Horonite, and Tobiah the servant, the Ammonite, heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: ' grieved them exceedingly that there was come a man to seek the welfare of the children of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So I came to Jerusalem, and was there three days.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Surveys Jerusalem
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I arose in the night, I and some few men with me; neither told I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' man what my God had put in my heart to do at Jerusalem: neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was there any
    - type: text
      text: ' beast with me, save the beast that I rode upon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And I went out by night by the gate of the valley, even before the dragon well, and to the dung port, and viewed the walls of Jerusalem, which were broken down, and the gates thereof were consumed with fire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then I went on to the gate of the fountain, and to the king''s pool: but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no place for the beast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' under me to pass. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then went I up in the night by the brook, and viewed the wall, and turned back, and entered by the gate of the valley, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' returned. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the rulers knew not whither I went, or what I did; neither had I as yet told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to the Jews, nor to the priests, nor to the nobles, nor to the rulers, nor to the rest that did the work.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then said I unto them, Ye see the distress that we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in, how Jerusalem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ' waste, and the gates thereof are burned with fire: come, and let us build up the wall of Jerusalem, that we be no more a reproach. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then I told them of the hand of my God which was good upon me; as also the king''s words that he had spoken unto me. And they said, Let us rise up and build. So they strengthened their hands for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: work
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Meets Opposition
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But when Sanballat the Horonite, and Tobiah the servant, the Ammonite, and Geshem the Arabian, heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they laughed us to scorn, and despised us, and said, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this thing that ye do? will ye rebel against the king? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Wherefore the king said unto me, Why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy countenance sad, seeing thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' not sick? this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' nothing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: else
    - type: text
      text: ' but sorrow of heart. Then I was very sore afraid, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then answered I them, and said unto them, The God of heaven, he will prosper us; therefore we his servants will arise and build: but ye have no portion, nor right, nor memorial, in Jerusalem.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and said unto the king, Let the king live for ever: why should not my countenance be sad, when the city, the place of my fathers'' sepulchres, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ' waste, and the gates thereof are consumed with fire? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the king said unto me, For what dost thou make request? So I prayed to the God of heaven. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And I said unto the king, If it please the king, and if thy servant have found favour in thy sight, that thou wouldest send me unto Judah, unto the city of my fathers'' sepulchres, that I may build it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the king said unto me, (the queen also sitting by him,) For how long shall thy journey be? and when wilt thou return? So it pleased the king to send me; and I set him a time. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moreover I said unto the king, If it please the king, let letters be given me to the governors beyond the river, that they may convey me over till I come into Judah; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and a letter unto Asaph the keeper of the king''s forest, that he may give me timber to make beams for the gates of the palace which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: appertained
    - type: text
      text: ' to the house, and for the wall of the city, and for the house that I shall enter into. And the king granted me, according to the good hand of my God upon me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I came to the governors beyond the river, and gave them the king''s letters. Now the king had sent captains of the army and horsemen with me. '
