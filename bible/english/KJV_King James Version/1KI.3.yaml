document_id: 1KI.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Marriage to Pharaoh's Daughter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Solomon made affinity with Pharaoh king of Egypt, and took Pharaoh''s daughter, and brought her into the city of David, until he had made an end of building his own house, and the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the wall of Jerusalem round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Only the people sacrificed in high places, because there was no house built unto the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', until those days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Solomon loved the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', walking in the statutes of David his father: only he sacrificed and burnt incense in high places. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the king went to Gibeon to sacrifice there; for that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the great high place: a thousand burnt offerings did Solomon offer upon that altar.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Solomon's Choice of Wisdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In Gibeon the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared to Solomon in a dream by night: and God said, Ask what I shall give thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Solomon said, Thou hast shewed unto thy servant David my father great mercy, according as he walked before thee in truth, and in righteousness, and in uprightness of heart with thee; and thou hast kept for him this great kindness, that thou hast given him a son to sit on his throne, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And now, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, thou hast made thy servant king instead of David my father: and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am but
  - type: text
    text: ' a little child: I know not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' to go out or come in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And thy servant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the midst of thy people which thou hast chosen, a great people, that cannot be numbered nor counted for multitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Give therefore thy servant an understanding heart to judge thy people, that I may discern between good and bad: for who is able to judge this thy so great a people?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the speech pleased the Lord, that Solomon had asked this thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And God said unto him, Because thou hast asked this thing, and hast not asked for thyself long life; neither hast asked riches for thyself, nor hast asked the life of thine enemies; but hast asked for thyself understanding to discern judgment; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'behold, I have done according to thy words: lo, I have given thee a wise and an understanding heart; so that there was none like thee before thee, neither after thee shall any arise like unto thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I have also given thee that which thou hast not asked, both riches, and honour: so that there shall not be any among the kings like unto thee all thy days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if thou wilt walk in my ways, to keep my statutes and my commandments, as thy father David did walk, then I will lengthen thy days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Solomon awoke; and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' a dream. And he came to Jerusalem, and stood before the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and offered up burnt offerings, and offered peace offerings, and made a feast to all his servants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then came there two women, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' harlots, unto the king, and stood before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the one woman said, O my lord, I and this woman dwell in one house; and I was delivered of a child with her in the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And it came to pass the third day after that I was delivered, that this woman was delivered also: and we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' together; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no stranger with us in the house, save we two in the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And this woman''s child died in the night; because she overlaid it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And she arose at midnight, and took my son from beside me, while thine handmaid slept, and laid it in her bosom, and laid her dead child in my bosom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when I rose in the morning to give my child suck, behold, it was dead: but when I had considered it in the morning, behold, it was not my son, which I did bear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the other woman said, Nay; but the living '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my son, and the dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy son. And this said, No; but the dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy son, and the living '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my son. Thus they spake before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then said the king, The one saith, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my son that liveth, and thy son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the dead: and the other saith, Nay; but thy son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the dead, and my son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the king said, Bring me a sword. And they brought a sword before the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the king said, Divide the living child in two, and give half to the one, and half to the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then spake the woman whose the living child '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' unto the king, for her bowels yearned upon her son, and she said, O my lord, give her the living child, and in no wise slay it. But the other said, Let it be neither mine nor thine, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' divide '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the king answered and said, Give her the living child, and in no wise slay it: she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the mother thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And all Israel heard of the judgment which the king had judged; and they feared the king: for they saw that the wisdom of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in him, to do judgment.'
