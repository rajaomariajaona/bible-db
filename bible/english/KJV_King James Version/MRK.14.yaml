      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: 'But he began to curse and to swear, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', I know not this man of whom ye speak. '
  '72':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: And the second time the cock crew. And Peter called to mind the word that Jesus said unto him, Before the cock crow twice, thou shalt deny me thrice. And when he thought thereon, he wept.
  '8':
