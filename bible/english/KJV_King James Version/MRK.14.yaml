document_id: MRK.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Wednesday
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After two days was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the feast of
    - type: text
      text: ' the passover, and of unleavened bread: and the chief priests and the scribes sought how they might take him by craft, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to death. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Judas Iscariot, one of the twelve, went unto the chief priests, to betray him unto them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And when they heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they were glad, and promised to give him money. And he sought how he might conveniently betray him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Thursday
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the first day of unleavened bread, when they killed the passover, his disciples said unto him, Where wilt thou that we go and prepare that thou mayest eat the passover? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he sendeth forth two of his disciples, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Go ye into the city, and there shall meet you a man bearing a pitcher of water: follow him.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And wheresoever he shall go in, say ye to the goodman of the house, The Master saith, Where is the guestchamber, where I shall eat the passover with my disciples?
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he will shew you a large upper room furnished '
      - type: usfm
        marker: add
        children:
        - type: text
          text: and
      - type: text
        text: ' prepared: there make ready for us.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And his disciples went forth, and came into the city, and found as he had said unto them: and they made ready the passover.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And in the evening he cometh with the twelve. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And as they sat and did eat, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, One of you which eateth with me shall betray me.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And they began to be sorrowful, and to say unto him one by one, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' it I? and another '
    - type: usfm
      marker: add
      children:
      - type: text
        text: said, Is
    - type: text
      text: ' it I? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But they said, Not on the feast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ', lest there be an uproar of the people.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: add
        children:
        - type: text
          text: It is
      - type: text
        text: ' one of the twelve, that dippeth with me in the dish.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The Son of man indeed goeth, as it is written of him: but woe to that man by whom the Son of man is betrayed! good were it for that man if he had never been born.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And as they did eat, Jesus took bread, and blessed, and brake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and gave to them, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take, eat: this is my body.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he took the cup, and when he had given thanks, he gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to them: and they all drank of it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is my blood of the new testament, which is shed for many.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, I will drink no more of the fruit of the vine, until that day that I drink it new in the kingdom of God.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when they had sung an hymn, they went out into the mount of Olives. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'All ye shall be offended because of me this night: for it is written, I will smite the shepherd, and the sheep shall be scattered.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But after that I am risen, I will go before you into Galilee.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But Peter said unto him, Although all shall be offended, yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will
    - type: text
      text: ' not I. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And being in Bethany in the house of Simon the leper, as he sat at meat, there came a woman having an alabaster box of ointment of spikenard very precious; and she brake the box, and poured '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on his head. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And Jesus saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Verily I say unto thee, That this day, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: even
      - type: text
        text: ' in this night, before the cock crow twice, thou shalt deny me thrice.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: But he spake the more vehemently, If I should die with thee, I will not deny thee in any wise. Likewise also said they all.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And they came to a place which was named Gethsemane: and he saith to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sit ye here, while I shall pray.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And he taketh with him Peter and James and John, and began to be sore amazed, and to be very heavy; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'My soul is exceeding sorrowful unto death: tarry ye here, and watch.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And he went forward a little, and fell on the ground, and prayed that, if it were possible, the hour might pass from him. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Abba, Father, all things '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' possible unto thee; take away this cup from me: nevertheless not what I will, but what thou wilt.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And he cometh, and findeth them sleeping, and saith unto Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, sleepest thou? couldest not thou watch one hour?
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Watch ye and pray, lest ye enter into temptation. The spirit truly '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' ready, but the flesh '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' weak.'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And again he went away, and prayed, and spake the same words. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And there were some that had indignation within themselves, and said, Why was this waste of the ointment made? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And when he returned, he found them asleep again, (for their eyes were heavy,) neither wist they what to answer him. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And he cometh the third time, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Sleep on now, and take '
      - type: usfm
        marker: add
        children:
        - type: text
          text: your
      - type: text
        text: ' rest: it is enough, the hour is come; behold, the Son of man is betrayed into the hands of sinners.'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rise up, let us go; lo, he that betrayeth me is at hand.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And immediately, while he yet spake, cometh Judas, one of the twelve, and with him a great multitude with swords and staves, from the chief priests and the scribes and the elders. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And he that betrayed him had given them a token, saying, Whomsoever I shall kiss, that same is he; take him, and lead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away safely. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: And as soon as he was come, he goeth straightway to him, and saith, Master, master; and kissed him.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And they laid their hands on him, and took him. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And one of them that stood by drew a sword, and smote a servant of the high priest, and cut off his ear. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'And Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Are ye come out, as against a thief, with swords and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: with
      - type: text
        text: ' staves to take me?'
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I was daily with you in the temple teaching, and ye took me not: but the scriptures must be fulfilled.'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For it might have been sold for more than three hundred pence, and have been given to the poor. And they murmured against her. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: And they all forsook him, and fled.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And there followed him a certain young man, having a linen cloth cast about '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' naked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: body
    - type: text
      text: '; and the young men laid hold on him: '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: and he left the linen cloth, and fled from them naked.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Friday
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'And they led Jesus away to the high priest: and with him were assembled all the chief priests and the elders and the scribes. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'And Peter followed him afar off, even into the palace of the high priest: and he sat with the servants, and warmed himself at the fire.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'And the chief priests and all the council sought for witness against Jesus to put him to death; and found none. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'For many bare false witness against him, but their witness agreed not together. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'And there arose certain, and bare false witness against him, saying, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'We heard him say, I will destroy this temple that is made with hands, and within three days I will build another made without hands. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: But neither so did their witness agree together.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let her alone; why trouble ye her? she hath wrought a good work on me.
    - type: text
      text: ' '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'And the high priest stood up in the midst, and asked Jesus, saying, Answerest thou nothing? what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it which
    - type: text
      text: ' these witness against thee? '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'But he held his peace, and answered nothing. Again the high priest asked him, and said unto him, Art thou the Christ, the Son of the Blessed? '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am: and ye shall see the Son of man sitting on the right hand of power, and coming in the clouds of heaven.'
    - type: text
      text: ' '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Then the high priest rent his clothes, and saith, What need we any further witnesses? '
  '64':
