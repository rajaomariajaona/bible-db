verses:
  '1':
  - type: heading
    content: Wednesday
  - type: text
    content: 'After two days was '
  - type: text
    content: the feast of
  - type: text
    content: ' the passover, and of unleavened bread: and the chief priests and the scribes sought how they might take him by craft, and put '
  - type: text
    content: him
  - type: text
    content: ' to death. '
  '10':
  - type: text
    content: 'And Judas Iscariot, one of the twelve, went unto the chief priests, to betray him unto them. '
  '11':
  - type: text
    content: 'And when they heard '
  - type: text
    content: it
  - type: text
    content: ', they were glad, and promised to give him money. And he sought how he might conveniently betray him.'
  - type: heading
    content: Thursday
  '12':
  - type: text
    content: 'And the first day of unleavened bread, when they killed the passover, his disciples said unto him, Where wilt thou that we go and prepare that thou mayest eat the passover? '
  '13':
  - type: text
    content: 'And he sendeth forth two of his disciples, and saith unto them, '
  - type: text
    content: 'Go ye into the city, and there shall meet you a man bearing a pitcher of water: follow him.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: And wheresoever he shall go in, say ye to the goodman of the house, The Master saith, Where is the guestchamber, where I shall eat the passover with my disciples?
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And he will shew you a large upper room furnished '
  - type: text
    content: and
  - type: text
    content: ' prepared: there make ready for us.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And his disciples went forth, and came into the city, and found as he had said unto them: and they made ready the passover.'
  '17':
  - type: text
    content: 'And in the evening he cometh with the twelve. '
  '18':
  - type: text
    content: 'And as they sat and did eat, Jesus said, '
  - type: text
    content: Verily I say unto you, One of you which eateth with me shall betray me.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And they began to be sorrowful, and to say unto him one by one, '
  - type: text
    content: Is
  - type: text
    content: ' it I? and another '
  - type: text
    content: said, Is
  - type: text
    content: ' it I? '
  '2':
  - type: text
    content: 'But they said, Not on the feast '
  - type: text
    content: day
  - type: text
    content: ', lest there be an uproar of the people.'
  '20':
  - type: text
    content: 'And he answered and said unto them, '
  - type: text
    content: It is
  - type: text
    content: ' one of the twelve, that dippeth with me in the dish.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'The Son of man indeed goeth, as it is written of him: but woe to that man by whom the Son of man is betrayed! good were it for that man if he had never been born.'
  '22':
  - type: text
    content: 'And as they did eat, Jesus took bread, and blessed, and brake '
  - type: text
    content: it
  - type: text
    content: ', and gave to them, and said, '
  - type: text
    content: 'Take, eat: this is my body.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And he took the cup, and when he had given thanks, he gave '
  - type: text
    content: it
  - type: text
    content: ' to them: and they all drank of it. '
  '24':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: This is my blood of the new testament, which is shed for many.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Verily I say unto you, I will drink no more of the fruit of the vine, until that day that I drink it new in the kingdom of God.
  '26':
  - type: text
    content: 'And when they had sung an hymn, they went out into the mount of Olives. '
  '27':
  - type: text
    content: 'And Jesus saith unto them, '
  - type: text
    content: 'All ye shall be offended because of me this night: for it is written, I will smite the shepherd, and the sheep shall be scattered.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: But after that I am risen, I will go before you into Galilee.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'But Peter said unto him, Although all shall be offended, yet '
  - type: text
    content: will
  - type: text
    content: ' not I. '
  '3':
  - type: text
    content: 'And being in Bethany in the house of Simon the leper, as he sat at meat, there came a woman having an alabaster box of ointment of spikenard very precious; and she brake the box, and poured '
  - type: text
    content: it
  - type: text
    content: ' on his head. '
  '30':
  - type: text
    content: 'And Jesus saith unto him, '
  - type: text
    content: 'Verily I say unto thee, That this day, '
  - type: text
    content: even
  - type: text
    content: ' in this night, before the cock crow twice, thou shalt deny me thrice.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: But he spake the more vehemently, If I should die with thee, I will not deny thee in any wise. Likewise also said they all.
  '32':
  - type: text
    content: 'And they came to a place which was named Gethsemane: and he saith to his disciples, '
  - type: text
    content: Sit ye here, while I shall pray.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And he taketh with him Peter and James and John, and began to be sore amazed, and to be very heavy; '
  '34':
  - type: text
    content: 'and saith unto them, '
  - type: text
    content: 'My soul is exceeding sorrowful unto death: tarry ye here, and watch.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And he went forward a little, and fell on the ground, and prayed that, if it were possible, the hour might pass from him. '
  '36':
  - type: text
    content: 'And he said, '
  - type: text
    content: 'Abba, Father, all things '
  - type: text
    content: are
  - type: text
    content: ' possible unto thee; take away this cup from me: nevertheless not what I will, but what thou wilt.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And he cometh, and findeth them sleeping, and saith unto Peter, '
  - type: text
    content: Simon, sleepest thou? couldest not thou watch one hour?
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Watch ye and pray, lest ye enter into temptation. The spirit truly '
  - type: text
    content: is
  - type: text
    content: ' ready, but the flesh '
  - type: text
    content: is
  - type: text
    content: ' weak.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And again he went away, and prayed, and spake the same words. '
  '4':
  - type: text
    content: 'And there were some that had indignation within themselves, and said, Why was this waste of the ointment made? '
  '40':
  - type: text
    content: 'And when he returned, he found them asleep again, (for their eyes were heavy,) neither wist they what to answer him. '
  '41':
  - type: text
    content: 'And he cometh the third time, and saith unto them, '
  - type: text
    content: 'Sleep on now, and take '
  - type: text
    content: your
  - type: text
    content: ' rest: it is enough, the hour is come; behold, the Son of man is betrayed into the hands of sinners.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: Rise up, let us go; lo, he that betrayeth me is at hand.
  '43':
  - type: text
    content: 'And immediately, while he yet spake, cometh Judas, one of the twelve, and with him a great multitude with swords and staves, from the chief priests and the scribes and the elders. '
  '44':
  - type: text
    content: 'And he that betrayed him had given them a token, saying, Whomsoever I shall kiss, that same is he; take him, and lead '
  - type: text
    content: him
  - type: text
    content: ' away safely. '
  '45':
  - type: text
    content: And as soon as he was come, he goeth straightway to him, and saith, Master, master; and kissed him.
  '46':
  - type: text
    content: 'And they laid their hands on him, and took him. '
  '47':
  - type: text
    content: 'And one of them that stood by drew a sword, and smote a servant of the high priest, and cut off his ear. '
  '48':
  - type: text
    content: 'And Jesus answered and said unto them, '
  - type: text
    content: 'Are ye come out, as against a thief, with swords and '
  - type: text
    content: with
  - type: text
    content: ' staves to take me?'
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'I was daily with you in the temple teaching, and ye took me not: but the scriptures must be fulfilled.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'For it might have been sold for more than three hundred pence, and have been given to the poor. And they murmured against her. '
  '50':
  - type: text
    content: And they all forsook him, and fled.
  '51':
  - type: text
    content: 'And there followed him a certain young man, having a linen cloth cast about '
  - type: text
    content: his
  - type: text
    content: ' naked '
  - type: text
    content: body
  - type: text
    content: '; and the young men laid hold on him: '
  '52':
  - type: text
    content: and he left the linen cloth, and fled from them naked.
  - type: heading
    content: Friday
  '53':
  - type: text
    content: 'And they led Jesus away to the high priest: and with him were assembled all the chief priests and the elders and the scribes. '
  '54':
  - type: text
    content: 'And Peter followed him afar off, even into the palace of the high priest: and he sat with the servants, and warmed himself at the fire.'
  '55':
  - type: text
    content: 'And the chief priests and all the council sought for witness against Jesus to put him to death; and found none. '
  '56':
  - type: text
    content: 'For many bare false witness against him, but their witness agreed not together. '
  '57':
  - type: text
    content: 'And there arose certain, and bare false witness against him, saying, '
  '58':
  - type: text
    content: 'We heard him say, I will destroy this temple that is made with hands, and within three days I will build another made without hands. '
  '59':
  - type: text
    content: But neither so did their witness agree together.
  '6':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: Let her alone; why trouble ye her? she hath wrought a good work on me.
  - type: text
    content: ' '
  '60':
  - type: text
    content: 'And the high priest stood up in the midst, and asked Jesus, saying, Answerest thou nothing? what '
  - type: text
    content: is it which
  - type: text
    content: ' these witness against thee? '
  '61':
  - type: text
    content: 'But he held his peace, and answered nothing. Again the high priest asked him, and said unto him, Art thou the Christ, the Son of the Blessed? '
  '62':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: 'I am: and ye shall see the Son of man sitting on the right hand of power, and coming in the clouds of heaven.'
  - type: text
    content: ' '
  '63':
  - type: text
    content: 'Then the high priest rent his clothes, and saith, What need we any further witnesses? '
  '64':
  - type: text
    content: 'Ye have heard the blasphemy: what think ye? And they all condemned him to be guilty of death. '
  '65':
  - type: text
    content: 'And some began to spit on him, and to cover his face, and to buffet him, and to say unto him, Prophesy: and the servants did strike him with the palms of their hands.'
  '66':
  - type: text
    content: 'And as Peter was beneath in the palace, there cometh one of the maids of the high priest: '
  '67':
  - type: text
    content: 'and when she saw Peter warming himself, she looked upon him, and said, And thou also wast with Jesus of Nazareth. '
  '68':
  - type: text
    content: 'But he denied, saying, I know not, neither understand I what thou sayest. And he went out into the porch; and the cock crew. '
  '69':
  - type: text
    content: 'And a maid saw him again, and began to say to them that stood by, This is '
  - type: text
    content: one
  - type: text
    content: ' of them. '
  '7':
  - type: text
    content: 'For ye have the poor with you always, and whensoever ye will ye may do them good: but me ye have not always.'
  - type: text
    content: ' '
  '70':
  - type: text
    content: 'And he denied it again. And a little after, they that stood by said again to Peter, Surely thou art '
  - type: text
    content: one
  - type: text
    content: ' of them: for thou art a Galilæan, and thy speech agreeth '
  - type: text
    content: thereto
  - type: text
    content: '. '
  '71':
  - type: text
    content: 'But he began to curse and to swear, '
  - type: text
    content: saying
  - type: text
    content: ', I know not this man of whom ye speak. '
  '72':
  - type: text
    content: And the second time the cock crew. And Peter called to mind the word that Jesus said unto him, Before the cock crow twice, thou shalt deny me thrice. And when he thought thereon, he wept.
  '8':
  - type: text
    content: 'She hath done what she could: she is come aforehand to anoint my body to the burying.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Verily I say unto you, Wheresoever this gospel shall be preached throughout the whole world, '
  - type: text
    content: this
  - type: text
    content: ' also that she hath done shall be spoken of for a memorial of her.'
