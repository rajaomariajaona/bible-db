    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 'And a maid saw him again, and began to say to them that stood by, This is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For ye have the poor with you always, and whensoever ye will ye may do them good: but me ye have not always.'
    - type: text
      text: ' '
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'And he denied it again. And a little after, they that stood by said again to Peter, Surely thou art '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of them: for thou art a Galilæan, and thy speech agreeth '
    - type: usfm
