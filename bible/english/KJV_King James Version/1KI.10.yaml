  '22':
  - type: text
    content: 'For the king had at sea a navy of Tharshish with the navy of Hiram: once in three years came the navy of Tharshish, bringing gold, and silver, ivory, and apes, and peacocks.'
  '23':
  - type: text
    content: 'So king Solomon exceeded all the kings of the earth for riches and for wisdom. '
  '24':
  - type: text
    content: 'And all the earth sought to Solomon, to hear his wisdom, which God had put in his heart. '
  '25':
  - type: text
    content: And they brought every man his present, vessels of silver, and vessels of gold, and garments, and armour, and spices, horses, and mules, a rate year by year.
  '26':
  - type: text
    content: 'And Solomon gathered together chariots and horsemen: and he had a thousand and four hundred chariots, and twelve thousand horsemen, whom he bestowed in the cities for chariots, and with the king at Jerusalem. '
