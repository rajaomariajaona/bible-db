document_id: 1KI.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Queen of Sheba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And when the queen of Sheba heard of the fame of Solomon concerning the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', she came to prove him with hard questions. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And she gave the king an hundred and twenty talents of gold, and of spices very great store, and precious stones: there came no more such abundance of spices as these which the queen of Sheba gave to king Solomon.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the navy also of Hiram, that brought gold from Ophir, brought in from Ophir great plenty of almug trees, and precious stones. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the king made of the almug trees pillars for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and for the king''s house, harps also and psalteries for singers: there came no such almug trees, nor were seen unto this day.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And king Solomon gave unto the queen of Sheba all her desire, whatsoever she asked, beside '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which Solomon gave her of his royal bounty. So she turned and went to her own country, she and her servants.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Wealth and Splendour
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now the weight of gold that came to Solomon in one year was six hundred threescore and six talents of gold, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'beside '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that he had
    - type: text
      text: ' of the merchantmen, and of the traffick of the spice merchants, and of all the kings of Arabia, and of the governors of the country. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And king Solomon made two hundred targets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' beaten gold: six hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of gold went to one target. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he made
    - type: text
      text: ' three hundred shields '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' beaten gold; three pound of gold went to one shield: and the king put them in the house of the forest of Lebanon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moreover the king made a great throne of ivory, and overlaid it with the best gold. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The throne had six steps, and the top of the throne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' round behind: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' stays on either side on the place of the seat, and two lions stood beside the stays. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And she came to Jerusalem with a very great train, with camels that bare spices, and very much gold, and precious stones: and when she was come to Solomon, she communed with him of all that was in her heart. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And twelve lions stood there on the one side and on the other upon the six steps: there was not the like made in any kingdom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And all king Solomon''s drinking vessels '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' gold, and all the vessels of the house of the forest of Lebanon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' pure gold; none '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' silver: it was nothing accounted of in the days of Solomon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For the king had at sea a navy of Tharshish with the navy of Hiram: once in three years came the navy of Tharshish, bringing gold, and silver, ivory, and apes, and peacocks.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So king Solomon exceeded all the kings of the earth for riches and for wisdom. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And all the earth sought to Solomon, to hear his wisdom, which God had put in his heart. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And they brought every man his present, vessels of silver, and vessels of gold, and garments, and armour, and spices, horses, and mules, a rate year by year.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And Solomon gathered together chariots and horsemen: and he had a thousand and four hundred chariots, and twelve thousand horsemen, whom he bestowed in the cities for chariots, and with the king at Jerusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the king made silver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' in Jerusalem as stones, and cedars made he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' as the sycomore trees that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the vale, for abundance. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Solomon had horses brought out of Egypt, and linen yarn: the king''s merchants received the linen yarn at a price. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And a chariot came up and went out of Egypt for six hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver, and an horse for an hundred and fifty: and so for all the kings of the Hittites, and for the kings of Syria, did they bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out by their means.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Solomon told her all her questions: there was not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' thing hid from the king, which he told her not. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when the queen of Sheba had seen all Solomon''s wisdom, and the house that he had built, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and the meat of his table, and the sitting of his servants, and the attendance of his ministers, and their apparel, and his cupbearers, and his ascent by which he went up unto the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; there was no more spirit in her. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And she said to the king, It was a true report that I heard in mine own land of thy acts and of thy wisdom. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Howbeit I believed not the words, until I came, and mine eyes had seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' and, behold, the half was not told me: thy wisdom and prosperity exceedeth the fame which I heard. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy men, happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these thy servants, which stand continually before thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' that hear thy wisdom. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Blessed be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which delighted in thee, to set thee on the throne of Israel: because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' loved Israel for ever, therefore made he thee king, to do judgment and justice. '
