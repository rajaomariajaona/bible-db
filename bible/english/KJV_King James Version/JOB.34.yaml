document_id: JOB.34,1
type_code: eng
verses:
  '1':
  - type: text
    content: Furthermore Elihu answered and said,
  '10':
  - type: text
    content: 'Therefore hearken unto me, ye men of understanding:'
  - type: text
    content: 'Far be it from God, '
  - type: text
    content: that he should do
  - type: text
    content: ' wickedness;'
  - type: text
    content: 'And '
  - type: text
    content: from
  - type: text
    content: ' the Almighty, '
  - type: text
    content: that he should commit
  - type: text
    content: ' iniquity.'
  '11':
  - type: text
    content: For the work of a man shall he render unto him,
  - type: text
    content: 'And cause every man to find according to '
  - type: text
    content: his
  - type: text
    content: ' ways.'
  '12':
  - type: text
    content: Yea, surely God will not do wickedly,
  - type: text
    content: Neither will the Almighty pervert judgment.
  '13':
  - type: text
    content: Who hath given him a charge over the earth?
  - type: text
    content: Or who hath disposed the whole world?
  '14':
  - type: text
    content: If he set his heart upon man,
  - type: text
    content: If
  - type: text
    content: ' he gather unto himself his spirit and his breath;'
  '15':
  - type: text
    content: All flesh shall perish together,
  - type: text
    content: And man shall turn again unto dust.
  '16':
  - type: text
    content: 'If now '
  - type: text
    content: thou hast
  - type: text
    content: ' understanding, hear this:'
  - type: text
    content: Hearken to the voice of my words.
  '17':
  - type: text
    content: Shall even he that hateth right govern?
  - type: text
    content: And wilt thou condemn him that is most just?
  '18':
  - type: text
    content: ' '
  - type: text
    content: Is it fit
  - type: text
    content: ' to say to a king, '
  - type: text
    content: Thou art
  - type: text
    content: ' wicked?'
  - type: text
    content: and
  - type: text
    content: ' to princes, '
  - type: text
    content: Ye are
  - type: text
    content: ' ungodly?'
  '19':
  - type: text
    content: ' '
  - type: text
    content: How much less to him
  - type: text
    content: ' that accepteth not the persons of princes,'
  - type: text
    content: Nor regardeth the rich more than the poor?
  - type: text
    content: 'For they all '
  - type: text
    content: are
  - type: text
    content: ' the work of his hands.'
  '2':
  - type: text
    content: 'Hear my words, O ye wise '
  - type: text
    content: men
  - type: text
    content: ;
  - type: text
    content: And give ear unto me, ye that have knowledge.
  '20':
  - type: text
    content: In a moment shall they die,
  - type: text
    content: 'And the people shall be troubled at midnight, and pass away:'
  - type: text
    content: And the mighty shall be taken away without hand.
  '21':
  - type: text
    content: 'For his eyes '
  - type: text
    content: are
  - type: text
    content: ' upon the ways of man,'
  - type: text
    content: And he seeth all his goings.
  '22':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' no darkness, nor shadow of death,'
  - type: text
    content: Where the workers of iniquity may hide themselves.
  '23':
  - type: text
    content: 'For he will not lay upon man more '
  - type: text
    content: than right
  - type: text
    content: ;
  - type: text
    content: That he should enter into judgment with God.
  '24':
  - type: text
    content: He shall break in pieces mighty men without number,
  - type: text
    content: And set others in their stead.
  '25':
  - type: text
    content: Therefore he knoweth their works,
  - type: text
    content: 'And he overturneth '
  - type: text
    content: them
  - type: text
    content: ' in the night, so that they are destroyed.'
  '26':
  - type: text
    content: He striketh them as wicked men
  - type: text
    content: In the open sight of others;
  '27':
  - type: text
    content: Because they turned back from him,
  - type: text
    content: 'And would not consider any of his ways:'
  '28':
  - type: text
    content: So that they cause the cry of the poor to come unto him,
  - type: text
    content: And he heareth the cry of the afflicted.
  '29':
  - type: text
    content: When he giveth quietness, who then can make trouble?
  - type: text
    content: 'And when he hideth '
  - type: text
    content: his
  - type: text
    content: ' face, who then can behold him?'
  - type: text
    content: 'Whether '
  - type: text
    content: it be done
  - type: text
    content: ' against a nation, or against a man only:'
  '3':
  - type: text
    content: For the ear trieth words,
  - type: text
    content: As the mouth tasteth meat.
  '30':
  - type: text
    content: That the hypocrite reign not,
  - type: text
    content: Lest the people be ensnared.
  '31':
  - type: text
    content: Surely it is meet to be said unto God,
  - type: text
    content: 'I have borne '
  - type: text
    content: chastisement
  - type: text
    content: ', I will not offend '
  - type: text
    content: 'any more:'
  '32':
  - type: text
    content: ' '
  - type: text
    content: That which
  - type: text
    content: ' I see not teach thou me:'
  - type: text
    content: If I have done iniquity, I will do no more.
  '33':
  - type: text
    content: ' '
  - type: text
    content: Should it be
  - type: text
    content: ' according to thy mind?'
  - type: text
    content: He will recompense it, whether thou refuse,
  - type: text
    content: 'Or whether thou choose; and not I:'
  - type: text
    content: Therefore speak what thou knowest.
  '34':
  - type: text
    content: Let men of understanding tell me,
  - type: text
    content: And let a wise man hearken unto me.
  '35':
  - type: text
    content: Job hath spoken without knowledge,
  - type: text
    content: 'And his words '
  - type: text
    content: were
  - type: text
    content: ' without wisdom.'
  '36':
  - type: text
    content: 'My desire '
  - type: text
    content: is that
  - type: text
    content: ' Job may be tried unto the end'
  - type: text
    content: 'Because of '
  - type: text
    content: his
  - type: text
    content: ' answers for wicked men.'
  '37':
  - type: text
    content: For he addeth rebellion unto his sin,
  - type: text
    content: 'He clappeth '
  - type: text
    content: his hands
  - type: text
    content: ' among us,'
  - type: text
    content: And multiplieth his words against God.
  '4':
  - type: text
    content: 'Let us choose to us judgment:'
  - type: text
    content: 'Let us know among ourselves what '
  - type: text
    content: is
  - type: text
    content: ' good.'
  '5':
  - type: text
    content: 'For Job hath said, I am righteous:'
  - type: text
    content: And God hath taken away my judgment.
  '6':
  - type: text
    content: Should I lie against my right?
  - type: text
    content: 'My wound '
  - type: text
    content: is
  - type: text
    content: ' incurable without transgression.'
  '7':
  - type: text
    content: 'What man '
  - type: text
    content: is
  - type: text
    content: ' like Job,'
  - type: text
    content: Who
  - type: text
    content: ' drinketh up scorning like water?'
  '8':
  - type: text
    content: Which goeth in company with the workers of iniquity,
  - type: text
    content: And walketh with wicked men.
  '9':
  - type: text
    content: For he hath said, It profiteth a man nothing
  - type: text
    content: That he should delight himself with God.
