document_id: JOB.34,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Furthermore Elihu answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore hearken unto me, ye men of understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Far be it from God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that he should do
    - type: text
      text: ' wickedness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the Almighty, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that he should commit
    - type: text
      text: ' iniquity.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For the work of a man shall he render unto him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And cause every man to find according to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' ways.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Yea, surely God will not do wickedly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither will the Almighty pervert judgment.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Who hath given him a charge over the earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who hath disposed the whole world?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: If he set his heart upon man,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' he gather unto himself his spirit and his breath;'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: All flesh shall perish together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And man shall turn again unto dust.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'If now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou hast
    - type: text
      text: ' understanding, hear this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hearken to the voice of my words.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Shall even he that hateth right govern?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wilt thou condemn him that is most just?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it fit
    - type: text
      text: ' to say to a king, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou art
    - type: text
      text: ' wicked?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to princes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye are
    - type: text
      text: ' ungodly?'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: How much less to him
    - type: text
      text: ' that accepteth not the persons of princes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor regardeth the rich more than the poor?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the work of his hands.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hear my words, O ye wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And give ear unto me, ye that have knowledge.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: In a moment shall they die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the people shall be troubled at midnight, and pass away:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the mighty shall be taken away without hand.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For his eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon the ways of man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he seeth all his goings.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' no darkness, nor shadow of death,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where the workers of iniquity may hide themselves.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For he will not lay upon man more '
    - type: usfm
      marker: add
      children:
      - type: text
        text: than right
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he should enter into judgment with God.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He shall break in pieces mighty men without number,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And set others in their stead.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Therefore he knoweth their works,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he overturneth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in the night, so that they are destroyed.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He striketh them as wicked men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the open sight of others;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Because they turned back from him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And would not consider any of his ways:'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So that they cause the cry of the poor to come unto him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he heareth the cry of the afflicted.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When he giveth quietness, who then can make trouble?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And when he hideth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' face, who then can behold him?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be done
    - type: text
      text: ' against a nation, or against a man only:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For the ear trieth words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the mouth tasteth meat.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: That the hypocrite reign not,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest the people be ensnared.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Surely it is meet to be said unto God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have borne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: chastisement
    - type: text
      text: ', I will not offend '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'any more:'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: That which
    - type: text
      text: ' I see not teach thou me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I have done iniquity, I will do no more.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Should it be
    - type: text
      text: ' according to thy mind?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will recompense it, whether thou refuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or whether thou choose; and not I:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore speak what thou knowest.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Let men of understanding tell me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let a wise man hearken unto me.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Job hath spoken without knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his words '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' without wisdom.'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'My desire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' Job may be tried unto the end'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' answers for wicked men.'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: For he addeth rebellion unto his sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He clappeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his hands
    - type: text
      text: ' among us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And multiplieth his words against God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Let us choose to us judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let us know among ourselves what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For Job hath said, I am righteous:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And God hath taken away my judgment.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Should I lie against my right?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My wound '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' incurable without transgression.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'What man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like Job,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' drinketh up scorning like water?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Which goeth in company with the workers of iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And walketh with wicked men.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For he hath said, It profiteth a man nothing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he should delight himself with God.
