document_id: ACT.21,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And it came to pass, that after we were gotten from them, and had launched, we came with a straight course unto Coos, and the '
  - type: text
    content: day
  - type: text
    content: ' following unto Rhodes, and from thence unto Patara: '
  '10':
  - type: text
    content: 'And as we tarried '
  - type: text
    content: there
  - type: text
    content: ' many days, there came down from Judæa a certain prophet, named Agabus. '
  '11':
  - type: text
    content: 'And when he was come unto us, he took Paul''s girdle, and bound his own hands and feet, and said, Thus saith the Holy Ghost, So shall the Jews at Jerusalem bind the man that owneth this girdle, and shall deliver '
  - type: text
    content: him
  - type: text
    content: ' into the hands of the Gentiles. '
  '12':
  - type: text
    content: And when we heard these things, both we, and they of that place, besought him not to go up to Jerusalem.
  '13':
  - type: text
    content: 'Then Paul answered, What mean ye to weep and to break mine heart? for I am ready not to be bound only, but also to die at Jerusalem for the name of the Lord Jesus. '
  '14':
  - type: text
    content: And when he would not be persuaded, we ceased, saying, The will of the Lord be done.
  - type: heading
    content: On to Jerusalem
  '15':
  - type: text
    content: 'And after those days we took up our carriages, and went up to Jerusalem. '
  '16':
  - type: text
    content: 'There went with us also '
  - type: text
    content: certain
  - type: text
    content: ' of the disciples of Cæsarea, and brought with them one Mnason of Cyprus, an old disciple, with whom we should lodge.'
  - type: heading
    content: Paul in Jerusalem
  '17':
  - type: text
    content: 'And when we were come to Jerusalem, the brethren received us gladly. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: day
  - type: text
    content: ' following Paul went in with us unto James; and all the elders were present. '
  '19':
  - type: text
    content: And when he had saluted them, he declared particularly what things God had wrought among the Gentiles by his ministry.
  '2':
  - type: text
    content: and finding a ship sailing over unto Phenicia, we went aboard, and set forth.
  - type: heading
    content: Tyre
  '20':
  - type: text
    content: 'And when they heard '
  - type: text
    content: it
  - type: text
    content: ', they glorified the Lord, and said unto him, Thou seest, brother, how many thousands of Jews there are which believe; and they are all zealous of the law: '
  '21':
  - type: text
    content: 'and they are informed of thee, that thou teachest all the Jews which are among the Gentiles to forsake Moses, saying that they ought not to circumcise '
  - type: text
    content: their
  - type: text
    content: ' children, neither to walk after the customs. '
  '22':
  - type: text
    content: 'What is it therefore? the multitude must needs come together: for they will hear that thou art come. '
  '23':
  - type: text
    content: 'Do therefore this that we say to thee: We have four men which have a vow on them; '
  '24':
  - type: text
    content: 'them take, and purify thyself with them, and be at charges with them, that they may shave '
  - type: text
    content: their
  - type: text
    content: ' heads: and all may know that those things, whereof they were informed concerning thee, are nothing; but '
  - type: text
    content: that
  - type: text
    content: ' thou thyself also walkest orderly, and keepest the law. '
  '25':
  - type: text
    content: 'As touching the Gentiles which believe, we have written '
  - type: text
    content: and
  - type: text
    content: ' concluded that they observe no such thing, save only that they keep themselves from '
  - type: text
    content: things
  - type: text
    content: ' offered to idols, and from blood, and from strangled, and from fornication.'
  '26':
  - type: text
    content: Then Paul took the men, and the next day purifying himself with them entered into the temple, to signify the accomplishment of the days of purification, until that an offering should be offered for every one of them.
  - type: heading
    content: An Uproar
  '27':
  - type: text
    content: 'And when the seven days were almost ended, the Jews which were of Asia, when they saw him in the temple, stirred up all the people, and laid hands on him, '
  '28':
  - type: text
    content: 'crying out, Men of Israel, help: This is the man, that teacheth all '
  - type: text
    content: men
  - type: text
    content: ' every where against the people, and the law, and this place: and further brought Greeks also into the temple, and hath polluted this holy place. '
  '29':
  - type: text
    content: (For they had seen before with him in the city Trophimus an Ephesian, whom they supposed that Paul had brought into the temple.)
  '3':
  - type: text
    content: 'Now when we had discovered Cyprus, we left it on the left hand, and sailed into Syria, and landed at Tyre: for there the ship was to unlade her burden. '
  '30':
  - type: text
    content: 'And all the city was moved, and the people ran together: and they took Paul, and drew him out of the temple: and forthwith the doors were shut. '
  '31':
  - type: text
    content: 'And as they went about to kill him, tidings came unto the chief captain of the band, that all Jerusalem was in an uproar. '
  '32':
  - type: text
    content: 'Who immediately took soldiers and centurions, and ran down unto them: and when they saw the chief captain and the soldiers, they left beating of Paul. '
  '33':
  - type: text
    content: 'Then the chief captain came near, and took him, and commanded '
  - type: text
    content: him
  - type: text
    content: ' to be bound with two chains; and demanded who he was, and what he had done.'
  '34':
  - type: text
    content: 'And some cried one thing, some another, among the multitude: and when he could not know the certainty for the tumult, he commanded him to be carried into the castle. '
  '35':
  - type: text
    content: 'And when he came upon the stairs, so it was, that he was borne of the soldiers for the violence of the people. '
  '36':
  - type: text
    content: For the multitude of the people followed after, crying, Away with him.
  - type: heading
    content: Paul's Defence
  '37':
  - type: text
    content: 'And as Paul was to be led into the castle, he said unto the chief captain, May I speak unto thee? Who said, Canst thou speak Greek? '
  '38':
  - type: text
    content: 'Art not thou that Egyptian, which before these days madest an uproar, and leddest out into the wilderness four thousand men that were murderers? '
  '39':
  - type: text
    content: 'But Paul said, I am a man '
  - type: text
    content: which am
  - type: text
    content: ' a Jew of Tarsus, '
  - type: text
    content: a city
  - type: text
    content: ' in Cilicia, a citizen of no mean city: and, I beseech thee, suffer me to speak unto the people. '
  '4':
  - type: text
    content: 'And finding disciples, we tarried there seven days: who said to Paul through the Spirit, that he should not go up to Jerusalem. '
  '40':
  - type: text
    content: 'And when he had given him licence, Paul stood on the stairs, and beckoned with the hand unto the people. And when there was made a great silence, he spake unto '
  - type: text
    content: them
  - type: text
    content: ' in the Hebrew tongue, saying,'
  '5':
  - type: text
    content: 'And when we had accomplished those days, we departed and went our way; and they all brought us on our way, with wives and children, till '
  - type: text
    content: we were
  - type: text
    content: ' out of the city: and we kneeled down on the shore, and prayed. '
  '6':
  - type: text
    content: And when we had taken our leave one of another, we took ship; and they returned home again.
  '7':
  - type: text
    content: 'And when we had finished '
  - type: text
    content: our
  - type: text
    content: ' course from Tyre, we came to Ptolemais, and saluted the brethren, and abode with them one day.'
  - type: heading
    content: Cæsarea
  '8':
  - type: text
    content: 'And the next '
  - type: text
    content: day
  - type: text
    content: ' we that were of Paul''s company departed, and came unto Cæsarea: and we entered into the house of Philip the evangelist, which was '
  - type: text
    content: one
  - type: text
    content: ' of the seven; and abode with him. '
  '9':
  - type: text
    content: And the same man had four daughters, virgins, which did prophesy.
