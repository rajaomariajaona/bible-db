document_id: ACT.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, that after we were gotten from them, and had launched, we came with a straight course unto Coos, and the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' following unto Rhodes, and from thence unto Patara: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as we tarried '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: ' many days, there came down from Judæa a certain prophet, named Agabus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was come unto us, he took Paul''s girdle, and bound his own hands and feet, and said, Thus saith the Holy Ghost, So shall the Jews at Jerusalem bind the man that owneth this girdle, and shall deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' into the hands of the Gentiles. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when we heard these things, both we, and they of that place, besought him not to go up to Jerusalem.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Paul answered, What mean ye to weep and to break mine heart? for I am ready not to be bound only, but also to die at Jerusalem for the name of the Lord Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when he would not be persuaded, we ceased, saying, The will of the Lord be done.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: On to Jerusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after those days we took up our carriages, and went up to Jerusalem. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There went with us also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' of the disciples of Cæsarea, and brought with them one Mnason of Cyprus, an old disciple, with whom we should lodge.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul in Jerusalem
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when we were come to Jerusalem, the brethren received us gladly. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' following Paul went in with us unto James; and all the elders were present. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when he had saluted them, he declared particularly what things God had wrought among the Gentiles by his ministry.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and finding a ship sailing over unto Phenicia, we went aboard, and set forth.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tyre
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they glorified the Lord, and said unto him, Thou seest, brother, how many thousands of Jews there are which believe; and they are all zealous of the law: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they are informed of thee, that thou teachest all the Jews which are among the Gentiles to forsake Moses, saying that they ought not to circumcise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' children, neither to walk after the customs. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What is it therefore? the multitude must needs come together: for they will hear that thou art come. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do therefore this that we say to thee: We have four men which have a vow on them; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'them take, and purify thyself with them, and be at charges with them, that they may shave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' heads: and all may know that those things, whereof they were informed concerning thee, are nothing; but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou thyself also walkest orderly, and keepest the law. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As touching the Gentiles which believe, we have written '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' concluded that they observe no such thing, save only that they keep themselves from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' offered to idols, and from blood, and from strangled, and from fornication.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Paul took the men, and the next day purifying himself with them entered into the temple, to signify the accomplishment of the days of purification, until that an offering should be offered for every one of them.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: An Uproar
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the seven days were almost ended, the Jews which were of Asia, when they saw him in the temple, stirred up all the people, and laid hands on him, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'crying out, Men of Israel, help: This is the man, that teacheth all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' every where against the people, and the law, and this place: and further brought Greeks also into the temple, and hath polluted this holy place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (For they had seen before with him in the city Trophimus an Ephesian, whom they supposed that Paul had brought into the temple.)
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when we had discovered Cyprus, we left it on the left hand, and sailed into Syria, and landed at Tyre: for there the ship was to unlade her burden. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the city was moved, and the people ran together: and they took Paul, and drew him out of the temple: and forthwith the doors were shut. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they went about to kill him, tidings came unto the chief captain of the band, that all Jerusalem was in an uproar. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who immediately took soldiers and centurions, and ran down unto them: and when they saw the chief captain and the soldiers, they left beating of Paul. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the chief captain came near, and took him, and commanded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to be bound with two chains; and demanded who he was, and what he had done.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And some cried one thing, some another, among the multitude: and when he could not know the certainty for the tumult, he commanded him to be carried into the castle. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he came upon the stairs, so it was, that he was borne of the soldiers for the violence of the people. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the multitude of the people followed after, crying, Away with him.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Paul's Defence
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as Paul was to be led into the castle, he said unto the chief captain, May I speak unto thee? Who said, Canst thou speak Greek? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Art not thou that Egyptian, which before these days madest an uproar, and leddest out into the wilderness four thousand men that were murderers? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Paul said, I am a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which am
    - type: text
      text: ' a Jew of Tarsus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a city
    - type: text
      text: ' in Cilicia, a citizen of no mean city: and, I beseech thee, suffer me to speak unto the people. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And finding disciples, we tarried there seven days: who said to Paul through the Spirit, that he should not go up to Jerusalem. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had given him licence, Paul stood on the stairs, and beckoned with the hand unto the people. And when there was made a great silence, he spake unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in the Hebrew tongue, saying,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when we had accomplished those days, we departed and went our way; and they all brought us on our way, with wives and children, till '
    - type: usfm
      marker: add
      children:
      - type: text
        text: we were
    - type: text
      text: ' out of the city: and we kneeled down on the shore, and prayed. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when we had taken our leave one of another, we took ship; and they returned home again.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when we had finished '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' course from Tyre, we came to Ptolemais, and saluted the brethren, and abode with them one day.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cæsarea
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the next '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' we that were of Paul''s company departed, and came unto Cæsarea: and we entered into the house of Philip the evangelist, which was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of the seven; and abode with him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the same man had four daughters, virgins, which did prophesy.
