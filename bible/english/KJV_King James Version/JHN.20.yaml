document_id: JHN.20,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Resurrection
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week cometh Mary Magdalene early, when it was yet dark, unto the sepulchre, and seeth the stone taken away from the sepulchre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then the disciples went away again unto their own home.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But Mary stood without at the sepulchre weeping: and as she wept, she stooped down, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and looked
    - type: text
      text: ' into the sepulchre, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and seeth two angels in white sitting, the one at the head, and the other at the feet, where the body of Jesus had lain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they say unto her, Woman, why weepest thou? She saith unto them, Because they have taken away my Lord, and I know not where they have laid him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when she had thus said, she turned herself back, and saw Jesus standing, and knew not that it was Jesus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woman, why weepest thou? whom seekest thou?
    - type: text
      text: ' She, supposing him to be the gardener, saith unto him, Sir, if thou have borne him hence, tell me where thou hast laid him, and I will take him away. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mary.
    - type: text
      text: ' She turned herself, and saith unto him, Rabboni; which is to say, Master. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Touch me not; for I am not yet ascended to my Father: but go to my brethren, and say unto them, I ascend unto my Father, and your Father; and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: to
      - type: text
        text: ' my God, and your God.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mary Magdalene came and told the disciples that she had seen the Lord, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he had spoken these things unto her.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the same day at evening, being the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week, when the doors were shut where the disciples were assembled for fear of the Jews, came Jesus and stood in the midst, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Peace '
      - type: usfm
        marker: add
        children:
        - type: text
          text: be
      - type: text
        text: ' unto you.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then she runneth, and cometh to Simon Peter, and to the other disciple, whom Jesus loved, and saith unto them, They have taken away the Lord out of the sepulchre, and we know not where they have laid him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when he had so said, he shewed unto them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hands and his side. Then were the disciples glad, when they saw the Lord. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then said Jesus to them again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Peace '
      - type: usfm
        marker: add
        children:
        - type: text
          text: be
      - type: text
        text: ' unto you: as '
      - type: usfm
        marker: add
        children:
        - type: text
          text: my
      - type: text
        text: ' Father hath sent me, even so send I you.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And when he had said this, he breathed on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Receive ye the Holy Ghost:'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'whose soever sins ye remit, they are remitted unto them; '
      - type: usfm
        marker: add
        children:
        - type: text
          text: and
      - type: text
        text: ' whose soever '
      - type: usfm
        marker: add
        children:
        - type: text
          text: sins
      - type: text
        text: ' ye retain, they are retained.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But Thomas, one of the twelve, called Didymus, was not with them when Jesus came. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The other disciples therefore said unto him, We have seen the Lord. But he said unto them, Except I shall see in his hands the print of the nails, and put my finger into the print of the nails, and thrust my hand into his side, I will not believe.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And after eight days again his disciples were within, and Thomas with them: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' came Jesus, the doors being shut, and stood in the midst, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Peace '
      - type: usfm
        marker: add
        children:
        - type: text
          text: be
      - type: text
        text: ' unto you.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then saith he to Thomas, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Reach hither thy finger, and behold my hands; and reach hither thy hand, and thrust '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' into my side: and be not faithless, but believing.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Thomas answered and said unto him, My Lord and my God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jesus saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Thomas, because thou hast seen me, thou hast believed: blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' they that have not seen, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: yet
      - type: text
        text: ' have believed.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Peter therefore went forth, and that other disciple, and came to the sepulchre. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And many other signs truly did Jesus in the presence of his disciples, which are not written in this book: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: but these are written, that ye might believe that Jesus is the Christ, the Son of God; and that believing ye might have life through his name.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So they ran both together: and the other disciple did outrun Peter, and came first to the sepulchre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And he stooping down, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and looking in
    - type: text
      text: ', saw the linen clothes lying; yet went he not in. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then cometh Simon Peter following him, and went into the sepulchre, and seeth the linen clothes lie, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and the napkin, that was about his head, not lying with the linen clothes, but wrapped together in a place by itself. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then went in also that other disciple, which came first to the sepulchre, and he saw, and believed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For as yet they knew not the scripture, that he must rise again from the dead. '
