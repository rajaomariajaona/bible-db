  '6':
  - type: text
    content: 'Then cometh Simon Peter following him, and went into the sepulchre, and seeth the linen clothes lie, '
  '7':
  - type: text
    content: 'and the napkin, that was about his head, not lying with the linen clothes, but wrapped together in a place by itself. '
  '8':
  - type: text
    content: 'Then went in also that other disciple, which came first to the sepulchre, and he saw, and believed. '
  '9':
  - type: text
    content: 'For as yet they knew not the scripture, that he must rise again from the dead. '
