    content: 'and seeth two angels in white sitting, the one at the head, and the other at the feet, where the body of Jesus had lain. '
  '13':
  - type: text
    content: 'And they say unto her, Woman, why weepest thou? She saith unto them, Because they have taken away my Lord, and I know not where they have laid him. '
  '14':
  - type: text
    content: 'And when she had thus said, she turned herself back, and saw Jesus standing, and knew not that it was Jesus. '
  '15':
