document_id: PSA.47,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm for the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O clap your hands, all ye people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout unto God with the voice of triumph.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' most high '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' terrible;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' a great King over all the earth.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall subdue the people under us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the nations under our feet.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall choose our inheritance for us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The excellency of Jacob whom he loved. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is gone up with a shout,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with the sound of a trumpet.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing praises to God, sing praises:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing praises unto our King, sing praises.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the King of all the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing ye praises with understanding.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God reigneth over the heathen:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God sitteth upon the throne of his holiness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The princes of the people are gathered together, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the people of the God of Abraham:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the shields of the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' unto God: He is greatly exalted.'
