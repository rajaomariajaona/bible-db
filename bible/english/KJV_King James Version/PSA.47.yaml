document_id: PSA.47,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm for the sons of Korah.
  - type: text
    content: O clap your hands, all ye people;
  - type: text
    content: Shout unto God with the voice of triumph.
  '2':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' most high '
  - type: text
    content: is
  - type: text
    content: ' terrible;'
  - type: text
    content: He is
  - type: text
    content: ' a great King over all the earth.'
  '3':
  - type: text
    content: He shall subdue the people under us,
  - type: text
    content: And the nations under our feet.
  '4':
  - type: text
    content: He shall choose our inheritance for us,
  - type: text
    content: 'The excellency of Jacob whom he loved. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: God is gone up with a shout,
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' with the sound of a trumpet.'
  '6':
  - type: text
    content: 'Sing praises to God, sing praises:'
  - type: text
    content: Sing praises unto our King, sing praises.
  '7':
  - type: text
    content: 'For God '
  - type: text
    content: is
  - type: text
    content: ' the King of all the earth:'
  - type: text
    content: Sing ye praises with understanding.
  '8':
  - type: text
    content: 'God reigneth over the heathen:'
  - type: text
    content: God sitteth upon the throne of his holiness.
  '9':
  - type: text
    content: 'The princes of the people are gathered together, '
  - type: text
    content: even
  - type: text
    content: ' the people of the God of Abraham:'
  - type: text
    content: 'For the shields of the earth '
  - type: text
    content: belong
  - type: text
    content: ' unto God: He is greatly exalted.'
