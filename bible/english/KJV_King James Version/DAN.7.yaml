  '1':
  - type: heading
    content: Daniel's Visions
  - type: heading
    content: Four Great Beasts
  - type: text
    content: 'In the first year of Belshazzar king of Babylon Daniel had a dream and visions of his head upon his bed: then he wrote the dream, '
  - type: text
    content: and
  - type: text
    content: ' told the sum of the matters. '
  '10':
  - type: text
    content: 'A fiery stream issued and came forth from before him: thousand thousands ministered unto him, and ten thousand times ten thousand stood before him: the judgment was set, and the books were opened. '
  '11':
  - type: text
    content: 'I beheld then because of the voice of the great words which the horn spake: I beheld '
  - type: text
    content: even
  - type: text
    content: ' till the beast was slain, and his body destroyed, and given to the burning flame. '
  '12':
  - type: text
    content: 'As concerning the rest of the beasts, they had their dominion taken away: yet their lives were prolonged for a season and time.'
  '13':
  - type: text
    content: 'I saw in the night visions, and, behold, '
  - type: text
    content: one
  - type: text
    content: ' like the Son of man came with the clouds of heaven, and came to the Ancient of days, and they brought him near before him. '
  '14':
  - type: text
    content: 'And there was given him dominion, and glory, and a kingdom, that all people, nations, and languages, should serve him: his dominion '
  - type: text
    content: is
  - type: text
    content: ' an everlasting dominion, which shall not pass away, and his kingdom '
  - type: text
    content: that
  - type: text
    content: ' which shall not be destroyed.'
  '15':
  - type: text
    content: 'I Daniel was grieved in my spirit in the midst of '
  - type: text
    content: my
  - type: text
    content: ' body, and the visions of my head troubled me. '
  '16':
  - type: text
    content: 'I came near unto one of them that stood by, and asked him the truth of all this. So he told me, and made me know the interpretation of the things. '
  '17':
  - type: text
    content: 'These great beasts, which are four, '
  - type: text
    content: are
  - type: text
    content: ' four kings, '
  - type: text
    content: which
  - type: text
    content: ' shall arise out of the earth. '
  '18':
  - type: text
    content: 'But the saints of the most High shall take the kingdom, and possess the kingdom for ever, even for ever and ever. '
  '19':
  - type: text
    content: 'Then I would know the truth of the fourth beast, which was diverse from all the others, exceeding dreadful, whose teeth '
  - type: text
    content: were of
  - type: text
    content: ' iron, and his nails '
  - type: text
    content: of
  - type: text
    content: ' brass; '
  - type: text
    content: which
  - type: text
    content: ' devoured, brake in pieces, and stamped the residue with his feet; '
  '2':
  - type: text
    content: 'Daniel spake and said, I saw in my vision by night, and, behold, the four winds of the heaven strove upon the great sea. '
  '20':
  - type: text
    content: 'and of the ten horns that '
  - type: text
    content: were
  - type: text
    content: ' in his head, and '
  - type: text
    content: of
  - type: text
    content: ' the other which came up, and before whom three fell; even '
  - type: text
    content: of
  - type: text
    content: ' that horn that had eyes, and a mouth that spake very great things, whose look '
  - type: text
    content: was
  - type: text
    content: ' more stout than his fellows. '
  '21':
  - type: text
    content: 'I beheld, and the same horn made war with the saints, and prevailed against them; '
  '22':
  - type: text
    content: until the Ancient of days came, and judgment was given to the saints of the most High; and the time came that the saints possessed the kingdom.
  '23':
  - type: text
    content: 'Thus he said, The fourth beast shall be the fourth kingdom upon earth, which shall be diverse from all kingdoms, and shall devour the whole earth, and shall tread it down, and break it in pieces. '
  '24':
  - type: text
    content: 'And the ten horns out of this kingdom '
  - type: text
    content: are
  - type: text
    content: ' ten kings '
  - type: text
    content: that
  - type: text
    content: ' shall arise: and another shall rise after them; and he shall be diverse from the first, and he shall subdue three kings. '
  '25':
  - type: text
    content: 'And he shall speak '
  - type: text
    content: great
  - type: text
    content: ' words against the most High, and shall wear out the saints of the most High, and think to change times and laws: and they shall be given into his hand until a time and times and the dividing of time. '
  '26':
  - type: text
    content: 'But the judgment shall sit, and they shall take away his dominion, to consume and to destroy '
  - type: text
    content: it
  - type: text
    content: ' unto the end. '
  '27':
  - type: text
    content: 'And the kingdom and dominion, and the greatness of the kingdom under the whole heaven, shall be given to the people of the saints of the most High, whose kingdom '
  - type: text
    content: is
  - type: text
    content: ' an everlasting kingdom, and all dominions shall serve and obey him.'
  '28':
  - type: text
    content: 'Hitherto '
  - type: text
    content: is
  - type: text
    content: ' the end of the matter. As for me Daniel, my cogitations much troubled me, and my countenance changed in me: but I kept the matter in my heart.'
  '3':
  - type: text
    content: 'And four great beasts came up from the sea, diverse one from another. '
  '4':
  - type: text
    content: 'The first '
  - type: text
    content: was
  - type: text
    content: ' like a lion, and had eagle''s wings: I beheld till the wings thereof were plucked, and it was lifted up from the earth, and made stand upon the feet as a man, and a man''s heart was given to it. '
  '5':
  - type: text
    content: 'And behold another beast, a second, like to a bear, and it raised up itself on one side, and '
  - type: text
    content: it had
  - type: text
    content: ' three ribs in the mouth of it between the teeth of it: and they said thus unto it, Arise, devour much flesh. '
  '6':
  - type: text
    content: 'After this I beheld, and lo another, like a leopard, which had upon the back of it four wings of a fowl; the beast had also four heads; and dominion was given to it. '
  '7':
  - type: text
    content: 'After this I saw in the night visions, and behold a fourth beast, dreadful and terrible, and strong exceedingly; and it had great iron teeth: it devoured and brake in pieces, and stamped the residue with the feet of it: and it '
  - type: text
    content: was
  - type: text
    content: ' diverse from all the beasts that '
  - type: text
    content: were
  - type: text
    content: ' before it; and it had ten horns. '
  '8':
  - type: text
    content: 'I considered the horns, and, behold, there came up among them another little horn, before whom there were three of the first horns plucked up by the roots: and, behold, in this horn '
  - type: text
    content: were
  - type: text
    content: ' eyes like the eyes of man, and a mouth speaking great things.'
  '9':
  - type: text
    content: 'I beheld till the thrones were cast down, and the Ancient of days did sit, whose garment '
  - type: text
    content: was
  - type: text
    content: ' white as snow, and the hair of his head like the pure wool: his throne '
  - type: text
    content: was like
  - type: text
    content: ' the fiery flame, '
  - type: text
    content: and
  - type: text
    content: ' his wheels '
  - type: text
    content: as
  - type: text
    content: ' burning fire. '
