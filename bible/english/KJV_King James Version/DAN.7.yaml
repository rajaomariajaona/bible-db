document_id: DAN.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel's Visions
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Four Great Beasts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the first year of Belshazzar king of Babylon Daniel had a dream and visions of his head upon his bed: then he wrote the dream, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' told the sum of the matters. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A fiery stream issued and came forth from before him: thousand thousands ministered unto him, and ten thousand times ten thousand stood before him: the judgment was set, and the books were opened. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I beheld then because of the voice of the great words which the horn spake: I beheld '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' till the beast was slain, and his body destroyed, and given to the burning flame. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As concerning the rest of the beasts, they had their dominion taken away: yet their lives were prolonged for a season and time.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw in the night visions, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' like the Son of man came with the clouds of heaven, and came to the Ancient of days, and they brought him near before him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was given him dominion, and glory, and a kingdom, that all people, nations, and languages, should serve him: his dominion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an everlasting dominion, which shall not pass away, and his kingdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which shall not be destroyed.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Daniel was grieved in my spirit in the midst of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' body, and the visions of my head troubled me. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I came near unto one of them that stood by, and asked him the truth of all this. So he told me, and made me know the interpretation of the things. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These great beasts, which are four, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' four kings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' shall arise out of the earth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the saints of the most High shall take the kingdom, and possess the kingdom for ever, even for ever and ever. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I would know the truth of the fourth beast, which was diverse from all the others, exceeding dreadful, whose teeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' iron, and his nails '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' devoured, brake in pieces, and stamped the residue with his feet; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Daniel spake and said, I saw in my vision by night, and, behold, the four winds of the heaven strove upon the great sea. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the ten horns that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in his head, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the other which came up, and before whom three fell; even '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' that horn that had eyes, and a mouth that spake very great things, whose look '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' more stout than his fellows. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I beheld, and the same horn made war with the saints, and prevailed against them; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: until the Ancient of days came, and judgment was given to the saints of the most High; and the time came that the saints possessed the kingdom.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus he said, The fourth beast shall be the fourth kingdom upon earth, which shall be diverse from all kingdoms, and shall devour the whole earth, and shall tread it down, and break it in pieces. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the ten horns out of this kingdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ten kings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall arise: and another shall rise after them; and he shall be diverse from the first, and he shall subdue three kings. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall speak '
    - type: usfm
      marker: add
      children:
      - type: text
        text: great
    - type: text
      text: ' words against the most High, and shall wear out the saints of the most High, and think to change times and laws: and they shall be given into his hand until a time and times and the dividing of time. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the judgment shall sit, and they shall take away his dominion, to consume and to destroy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto the end. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the kingdom and dominion, and the greatness of the kingdom under the whole heaven, shall be given to the people of the saints of the most High, whose kingdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an everlasting kingdom, and all dominions shall serve and obey him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitherto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the end of the matter. As for me Daniel, my cogitations much troubled me, and my countenance changed in me: but I kept the matter in my heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And four great beasts came up from the sea, diverse one from another. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like a lion, and had eagle''s wings: I beheld till the wings thereof were plucked, and it was lifted up from the earth, and made stand upon the feet as a man, and a man''s heart was given to it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold another beast, a second, like to a bear, and it raised up itself on one side, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it had
    - type: text
      text: ' three ribs in the mouth of it between the teeth of it: and they said thus unto it, Arise, devour much flesh. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this I beheld, and lo another, like a leopard, which had upon the back of it four wings of a fowl; the beast had also four heads; and dominion was given to it. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this I saw in the night visions, and behold a fourth beast, dreadful and terrible, and strong exceedingly; and it had great iron teeth: it devoured and brake in pieces, and stamped the residue with the feet of it: and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' diverse from all the beasts that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before it; and it had ten horns. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I considered the horns, and, behold, there came up among them another little horn, before whom there were three of the first horns plucked up by the roots: and, behold, in this horn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' eyes like the eyes of man, and a mouth speaking great things.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I beheld till the thrones were cast down, and the Ancient of days did sit, whose garment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' white as snow, and the hair of his head like the pure wool: his throne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was like
    - type: text
      text: ' the fiery flame, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' his wheels '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' burning fire. '
