  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sacred Calendar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto the children of Israel, and say unto them, When ye be come into the land which I give unto you, and shall reap the harvest thereof, then ye shall bring a sheaf of the firstfruits of your harvest unto the priest: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall wave the sheaf before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to be accepted for you: on the morrow after the sabbath the priest shall wave it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall offer that day when ye wave the sheaf an he lamb without blemish of the first year for a burnt offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the meat offering thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' two tenth deals of fine flour mingled with oil, an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sweet savour: and the drink offering thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' of wine, the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an hin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall eat neither bread, nor parched corn, nor green ears, until the selfsame day that ye have brought an offering unto your God: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a statute for ever throughout your generations in all your dwellings.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall count unto you from the morrow after the sabbath, from the day that ye brought the sheaf of the wave offering; seven sabbaths shall be complete: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'even unto the morrow after the seventh sabbath shall ye number fifty days; and ye shall offer a new meat offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall bring out of your habitations two wave loaves of two tenth deals: they shall be of fine flour; they shall be baken with leaven; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' the firstfruits unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall offer with the bread seven lambs without blemish of the first year, and one young bullock, and two rams: they shall be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', with their meat offering, and their drink offerings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' an offering made by fire, of sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then ye shall sacrifice one kid of the goats for a sin offering, and two lambs of the first year for a sacrifice of peace offerings. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto the children of Israel, and say unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Concerning
    - type: text
      text: ' the feasts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which ye shall proclaim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' holy convocations, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' my feasts. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest shall wave them with the bread of the firstfruits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a wave offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', with the two lambs: they shall be holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for the priest. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall proclaim on the selfsame day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' it may be an holy convocation unto you: ye shall do no servile work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'therein: it shall be'
    - type: text
      text: ' a statute for ever in all your dwellings throughout your generations. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when ye reap the harvest of your land, thou shalt not make clean riddance of the corners of thy field when thou reapest, neither shalt thou gather any gleaning of thy harvest: thou shalt leave them unto the poor, and to the stranger: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto the children of Israel, saying, In the seventh month, in the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, shall ye have a sabbath, a memorial of blowing of trumpets, an holy convocation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall do no servile work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'therein:'
    - type: text
      text: ' but ye shall offer an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also on the tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of this seventh month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' a day of atonement: it shall be an holy convocation unto you; and ye shall afflict your souls, and offer an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall do no work in that same day: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a day of atonement, to make an atonement for you before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whatsoever soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' that shall not be afflicted in that same day, he shall be cut off from among his people. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six days shall work be done: but the seventh day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sabbath of rest, an holy convocation; ye shall do no work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'therein:'
    - type: text
      text: ' it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sabbath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in all your dwellings.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whatsoever soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' that doeth any work in that same day, the same soul will I destroy from among his people. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall do no manner of work: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a statute for ever throughout your generations in all your dwellings. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' unto you a sabbath of rest, and ye shall afflict your souls: in the ninth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month at even, from even unto even, shall ye celebrate your sabbath.'
  '33':
