  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also in the fifteenth day of the seventh month, when ye have gathered in the fruit of the land, ye shall keep a feast unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
