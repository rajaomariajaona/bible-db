verses:
  '1':
  - type: heading
    content: The Return to Jerusalem
  - type: text
    content: 'And when the seventh month was come, and the children of Israel '
  - type: text
    content: were
  - type: text
    content: ' in the cities, the people gathered themselves together as one man to Jerusalem. '
  '10':
  - type: text
    content: 'And when the builders laid the foundation of the temple of the '
  - type: text
    content: LORD
  - type: text
    content: ', they set the priests in their apparel with trumpets, and the Levites the sons of Asaph with cymbals, to praise the '
  - type: text
    content: LORD
  - type: text
    content: ', after the ordinance of David king of Israel. '
  '11':
  - type: text
    content: 'And they sang together by course in praising and giving thanks unto the '
  - type: text
    content: LORD
  - type: text
    content: '; because '
  - type: text
    content: he is
  - type: text
    content: ' good, for his mercy '
  - type: text
    content: endureth
  - type: text
    content: ' for ever toward Israel. And all the people shouted with a great shout, when they praised the '
  - type: text
    content: LORD
  - type: text
    content: ', because the foundation of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' was laid. '
  '12':
  - type: text
    content: 'But many of the priests and Levites and chief of the fathers, '
  - type: text
    content: who were
  - type: text
    content: ' ancient men, that had seen the first house, when the foundation of this house was laid before their eyes, wept with a loud voice; and many shouted aloud for joy: '
  '13':
  - type: text
    content: 'so that the people could not discern the noise of the shout of joy from the noise of the weeping of the people: for the people shouted with a loud shout, and the noise was heard afar off.'
  '2':
  - type: text
    content: 'Then stood up Jeshua the son of Jozadak, and his brethren the priests, and Zerubbabel the son of Shealtiel, and his brethren, and builded the altar of the God of Israel, to offer burnt offerings thereon, as '
  - type: text
    content: it is
  - type: text
    content: ' written in the law of Moses the man of God. '
  '3':
  - type: text
    content: 'And they set the altar upon his bases; for fear '
  - type: text
    content: was
  - type: text
    content: ' upon them because of the people of those countries: and they offered burnt offerings thereon unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' burnt offerings morning and evening. '
  '4':
  - type: text
    content: 'They kept also the feast of tabernacles, as '
  - type: text
    content: it is
  - type: text
    content: ' written, and '
  - type: text
    content: offered
  - type: text
    content: ' the daily burnt offerings by number, according to the custom, as the duty of every day required; '
  '5':
  - type: text
    content: 'and afterward '
  - type: text
    content: offered
  - type: text
    content: ' the continual burnt offering, both of the new moons, and of all the set feasts of the '
  - type: text
    content: LORD
  - type: text
    content: ' that were consecrated, and of every one that willingly offered a freewill offering unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'From the first day of the seventh month began they to offer burnt offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: '. But the foundation of the temple of the '
  - type: text
    content: LORD
  - type: text
    content: ' was not '
  - type: text
    content: yet
  - type: text
    content: ' laid. '
  '7':
  - type: text
    content: They gave money also unto the masons, and to the carpenters; and meat, and drink, and oil, unto them of Zidon, and to them of Tyre, to bring cedar trees from Lebanon to the sea of Joppa, according to the grant that they had of Cyrus king of Persia.
  - type: heading
    content: Rebuilding the Temple
  '8':
  - type: text
    content: 'Now in the second year of their coming unto the house of God at Jerusalem, in the second month, began Zerubbabel the son of Shealtiel, and Jeshua the son of Jozadak, and the remnant of their brethren the priests and the Levites, and all they that were come out of the captivity unto Jerusalem; and appointed the Levites, from twenty years old and upward, to set forward the work of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Then stood Jeshua '
  - type: text
    content: with
  - type: text
    content: ' his sons and his brethren, Kadmiel and his sons, the sons of Judah, together, to set forward the workmen in the house of God: the sons of Henadad, '
  - type: text
    content: with
  - type: text
    content: ' their sons and their brethren the Levites. '
