document_id: EZR.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Return to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the seventh month was come, and the children of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the cities, the people gathered themselves together as one man to Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the builders laid the foundation of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', they set the priests in their apparel with trumpets, and the Levites the sons of Asaph with cymbals, to praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', after the ordinance of David king of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they sang together by course in praising and giving thanks unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' good, for his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' for ever toward Israel. And all the people shouted with a great shout, when they praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', because the foundation of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was laid. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But many of the priests and Levites and chief of the fathers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who were
    - type: text
      text: ' ancient men, that had seen the first house, when the foundation of this house was laid before their eyes, wept with a loud voice; and many shouted aloud for joy: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that the people could not discern the noise of the shout of joy from the noise of the weeping of the people: for the people shouted with a loud shout, and the noise was heard afar off.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then stood up Jeshua the son of Jozadak, and his brethren the priests, and Zerubbabel the son of Shealtiel, and his brethren, and builded the altar of the God of Israel, to offer burnt offerings thereon, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written in the law of Moses the man of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they set the altar upon his bases; for fear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon them because of the people of those countries: and they offered burnt offerings thereon unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' burnt offerings morning and evening. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They kept also the feast of tabernacles, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: offered
    - type: text
      text: ' the daily burnt offerings by number, according to the custom, as the duty of every day required; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and afterward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: offered
    - type: text
      text: ' the continual burnt offering, both of the new moons, and of all the set feasts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that were consecrated, and of every one that willingly offered a freewill offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the first day of the seventh month began they to offer burnt offerings unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. But the foundation of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' laid. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They gave money also unto the masons, and to the carpenters; and meat, and drink, and oil, unto them of Zidon, and to them of Tyre, to bring cedar trees from Lebanon to the sea of Joppa, according to the grant that they had of Cyrus king of Persia.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Rebuilding the Temple
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the second year of their coming unto the house of God at Jerusalem, in the second month, began Zerubbabel the son of Shealtiel, and Jeshua the son of Jozadak, and the remnant of their brethren the priests and the Levites, and all they that were come out of the captivity unto Jerusalem; and appointed the Levites, from twenty years old and upward, to set forward the work of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then stood Jeshua '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' his sons and his brethren, Kadmiel and his sons, the sons of Judah, together, to set forward the workmen in the house of God: the sons of Henadad, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' their sons and their brethren the Levites. '
