document_id: JOB.23
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Job's Reply
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Even to day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my complaint bitter:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My stroke is heavier than my groaning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oh that I knew where I might find him!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' I might come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to his seat!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I would order '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' cause before him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And fill my mouth with arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I would know the words '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' he would answer me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And understand what he would say unto me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Will he plead against me with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' great power?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'No; but he would put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: strength
  - type: text
    text: ' in me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There the righteous might dispute with him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: So should I be delivered for ever from my judge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Behold, I go forward, but he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And backward, but I cannot perceive him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On the left hand, where he doth work, but I cannot behold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hideth himself on the right hand, that I cannot see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But he knoweth the way that I take:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: When
  - type: text
    text: ' he hath tried me, I shall come forth as gold.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My foot hath held his steps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: His way have I kept, and not declined.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Neither have I gone back from the commandment of his lips;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have esteemed the words of his mouth more than my necessary '
  - type: usfm
    marker: add
    children:
    - type: text
      text: food
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mind
  - type: text
    text: ', and who can turn him?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' his soul desireth, even '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he doeth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For he performeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the thing that is
  - type: text
    text: ' appointed for me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And many such '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things are
  - type: text
    text: ' with him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore am I troubled at his presence:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I consider, I am afraid of him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For God maketh my heart soft,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the Almighty troubleth me:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Because I was not cut off before the darkness,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Neither
  - type: text
    text: ' hath he covered the darkness from my face.'
