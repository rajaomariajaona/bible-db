verses:
  '1':
  - type: heading
    content: Job's Reply
  - type: text
    content: Then Job answered and said,
  '10':
  - type: text
    content: 'He hath destroyed me on every side, and I am gone:'
  - type: text
    content: And mine hope hath he removed like a tree.
  '11':
  - type: text
    content: He hath also kindled his wrath against me,
  - type: text
    content: 'And he counteth me unto him as '
  - type: text
    content: one of
  - type: text
    content: ' his enemies.'
  '12':
  - type: text
    content: His troops come together,
  - type: text
    content: And raise up their way against me,
  - type: text
    content: And encamp round about my tabernacle.
  '13':
  - type: text
    content: He hath put my brethren far from me,
  - type: text
    content: And mine acquaintance are verily estranged from me.
  '14':
  - type: text
    content: My kinsfolk have failed, and my familiar friends have forgotten me.
  '15':
  - type: text
    content: They that dwell in mine house,
  - type: text
    content: 'And my maids, count me for a stranger:'
  - type: text
    content: I am an alien in their sight.
  '16':
  - type: text
    content: 'I called my servant, and he gave '
  - type: text
    content: me
  - type: text
    content: ' no answer;'
  - type: text
    content: I intreated him with my mouth.
  '17':
  - type: text
    content: My breath is strange to my wife,
  - type: text
    content: 'Though I intreated for the children''s '
  - type: text
    content: sake
  - type: text
    content: ' of mine own body.'
  '18':
  - type: text
    content: Yea, young children despised me;
  - type: text
    content: I arose, and they spake against me.
  '19':
  - type: text
    content: 'All my inward friends abhorred me:'
  - type: text
    content: And they whom I loved are turned against me.
  '2':
  - type: text
    content: How long will ye vex my soul,
  - type: text
    content: And break me in pieces with words?
  '20':
  - type: text
    content: My bone cleaveth to my skin and to my flesh,
  - type: text
    content: And I am escaped with the skin of my teeth.
  '21':
  - type: text
    content: Have pity upon me, have pity upon me, O ye my friends;
  - type: text
    content: For the hand of God hath touched me.
  '22':
  - type: text
    content: Why do ye persecute me as God,
  - type: text
    content: And are not satisfied with my flesh?
  '23':
  - type: text
    content: Oh that my words were now written!
  - type: text
    content: Oh that they were printed in a book!
  '24':
  - type: text
    content: That they were graven with an iron pen and lead
  - type: text
    content: In the rock for ever!
  '25':
  - type: text
    content: 'For I know '
  - type: text
    content: that
  - type: text
    content: ' my redeemer liveth,'
  - type: text
    content: 'And '
  - type: text
    content: that
  - type: text
    content: ' he shall stand at the latter '
  - type: text
    content: day
  - type: text
    content: ' upon the earth:'
  '26':
  - type: text
    content: 'And '
  - type: text
    content: though
  - type: text
    content: ' after my skin '
  - type: text
    content: worms
  - type: text
    content: ' destroy this '
  - type: text
    content: body
  - type: text
    content: ','
  - type: text
    content: 'Yet in my flesh shall I see God:'
  '27':
  - type: text
    content: Whom I shall see for myself,
  - type: text
    content: And mine eyes shall behold, and not another;
  - type: text
    content: Though
  - type: text
    content: ' my reins be consumed within me.'
  '28':
  - type: text
    content: But ye should say, Why persecute we him,
  - type: text
    content: Seeing the root of the matter is found in me?
  '29':
  - type: text
    content: 'Be ye afraid of the sword:'
  - type: text
    content: 'For wrath '
  - type: text
    content: bringeth
  - type: text
    content: ' the punishments of the sword,'
  - type: text
    content: 'That ye may know '
  - type: text
    content: there is
  - type: text
    content: ' a judgment.'
  '3':
  - type: text
    content: 'These ten times have ye reproached me:'
  - type: text
    content: 'Ye are not ashamed '
  - type: text
    content: that
  - type: text
    content: ' ye make yourselves strange to me.'
  '4':
  - type: text
    content: 'And be it indeed '
  - type: text
    content: that
  - type: text
    content: ' I have erred,'
  - type: text
    content: Mine error remaineth with myself.
  '5':
  - type: text
    content: 'If indeed ye will magnify '
  - type: text
    content: yourselves
  - type: text
    content: ' against me,'
  - type: text
    content: 'And plead against me my reproach:'
  '6':
  - type: text
    content: Know now that God hath overthrown me,
  - type: text
    content: And hath compassed me with his net.
  '7':
  - type: text
    content: 'Behold, I cry out of wrong, but I am not heard:'
  - type: text
    content: 'I cry aloud, but '
  - type: text
    content: there is
  - type: text
    content: ' no judgment.'
  '8':
  - type: text
    content: He hath fenced up my way that I cannot pass,
  - type: text
    content: And he hath set darkness in my paths.
  '9':
  - type: text
    content: He hath stripped me of my glory,
  - type: text
    content: 'And taken the crown '
  - type: text
    content: from
  - type: text
    content: ' my head.'
