document_id: JOB.19,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Reply
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath destroyed me on every side, and I am gone:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And mine hope hath he removed like a tree.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath also kindled his wrath against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he counteth me unto him as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one of
    - type: text
      text: ' his enemies.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His troops come together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And raise up their way against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And encamp round about my tabernacle.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath put my brethren far from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And mine acquaintance are verily estranged from me.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My kinsfolk have failed, and my familiar friends have forgotten me.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They that dwell in mine house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And my maids, count me for a stranger:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am an alien in their sight.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I called my servant, and he gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' no answer;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I intreated him with my mouth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My breath is strange to my wife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Though I intreated for the children''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sake
    - type: text
      text: ' of mine own body.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, young children despised me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I arose, and they spake against me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All my inward friends abhorred me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they whom I loved are turned against me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will ye vex my soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And break me in pieces with words?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My bone cleaveth to my skin and to my flesh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I am escaped with the skin of my teeth.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have pity upon me, have pity upon me, O ye my friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the hand of God hath touched me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do ye persecute me as God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are not satisfied with my flesh?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh that my words were now written!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh that they were printed in a book!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they were graven with an iron pen and lead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the rock for ever!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' my redeemer liveth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he shall stand at the latter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' upon the earth:'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: though
    - type: text
      text: ' after my skin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: worms
    - type: text
      text: ' destroy this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: body
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet in my flesh shall I see God:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom I shall see for myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And mine eyes shall behold, and not another;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Though
    - type: text
      text: ' my reins be consumed within me.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But ye should say, Why persecute we him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Seeing the root of the matter is found in me?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be ye afraid of the sword:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For wrath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: bringeth
    - type: text
      text: ' the punishments of the sword,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That ye may know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a judgment.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'These ten times have ye reproached me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Ye are not ashamed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye make yourselves strange to me.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And be it indeed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I have erred,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mine error remaineth with myself.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If indeed ye will magnify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' against me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And plead against me my reproach:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Know now that God hath overthrown me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hath compassed me with his net.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, I cry out of wrong, but I am not heard:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I cry aloud, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no judgment.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath fenced up my way that I cannot pass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he hath set darkness in my paths.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath stripped me of my glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And taken the crown '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' my head.'
