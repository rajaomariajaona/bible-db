document_id: 1SA.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Amalekites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Samuel also said unto Saul, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent me to anoint thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' king over his people, over Israel: now therefore hearken thou unto the voice of the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Samuel, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'It repenteth me that I have set up Saul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' king: for he is turned back from following me, and hath not performed my commandments. And it grieved Samuel; and he cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' all night. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when Samuel rose early to meet Saul in the morning, it was told Samuel, saying, Saul came to Carmel, and, behold, he set him up a place, and is gone about, and passed on, and gone down to Gilgal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Samuel came to Saul: and Saul said unto him, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' thou of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': I have performed the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Samuel said, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: meaneth
    - type: text
      text: ' then this bleating of the sheep in mine ears, and the lowing of the oxen which I hear? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Saul said, They have brought them from the Amalekites: for the people spared the best of the sheep and of the oxen, to sacrifice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God; and the rest we have utterly destroyed. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Samuel said unto Saul, Stay, and I will tell thee what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath said to me this night. And he said unto him, Say on.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Samuel said, When thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wast
    - type: text
      text: ' little in thine own sight, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wast
    - type: text
      text: ' thou not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: made
    - type: text
      text: ' the head of the tribes of Israel, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' anointed thee king over Israel? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent thee on a journey, and said, Go and utterly destroy the sinners the Amalekites, and fight against them until they be consumed. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Wherefore then didst thou not obey the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', but didst fly upon the spoil, and didst evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, I remember '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which Amalek did to Israel, how he laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wait
    - type: text
      text: ' for him in the way, when he came up from Egypt. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Saul said unto Samuel, Yea, I have obeyed the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and have gone the way which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent me, and have brought Agag the king of Amalek, and have utterly destroyed the Amalekites. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But the people took of the spoil, sheep and oxen, the chief of the things which should have been utterly destroyed, to sacrifice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God in Gilgal. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And Samuel said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as great
    - type: text
      text: ' delight in burnt offerings and sacrifices,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As in obeying the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, to obey '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than sacrifice,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' to hearken than the fat of rams.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For rebellion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' the sin of witchcraft,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And stubbornness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' iniquity and idolatry.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because thou hast rejected the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath also rejected thee from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' king.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And Saul said unto Samuel, I have sinned: for I have transgressed the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and thy words: because I feared the people, and obeyed their voice. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now therefore, I pray thee, pardon my sin, and turn again with me, that I may worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And Samuel said unto Saul, I will not return with thee: for thou hast rejected the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath rejected thee from being king over Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And as Samuel turned about to go away, he laid hold upon the skirt of his mantle, and it rent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Samuel said unto him, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath rent the kingdom of Israel from thee this day, and hath given it to a neighbour of thine, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' better than thou. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And also the Strength of Israel will not lie nor repent: for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not a man, that he should repent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Now go and smite Amalek, and utterly destroy all that they have, and spare them not; but slay both man and woman, infant and suckling, ox and sheep, camel and ass.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then he said, I have sinned: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' honour me now, I pray thee, before the elders of my people, and before Israel, and turn again with me, that I may worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'So Samuel turned again after Saul; and Saul worshipped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then said Samuel, Bring ye hither to me Agag the king of the Amalekites. And Agag came unto him delicately. And Agag said, Surely the bitterness of death is past. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And Samuel said, As thy sword hath made women childless, so shall thy mother be childless among women. And Samuel hewed Agag in pieces before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Gilgal.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then Samuel went to Ramah; and Saul went up to his house to Gibeah of Saul. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And Samuel came no more to see Saul until the day of his death: nevertheless Samuel mourned for Saul: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' repented that he had made Saul king over Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Saul gathered the people together, and numbered them in Telaim, two hundred thousand footmen, and ten thousand men of Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And Saul came to a city of Amalek, and laid wait in the valley. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Saul said unto the Kenites, Go, depart, get you down from among the Amalekites, lest I destroy you with them: for ye shewed kindness to all the children of Israel, when they came up out of Egypt. So the Kenites departed from among the Amalekites. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Saul smote the Amalekites from Havilah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: until
    - type: text
      text: ' thou comest to Shur, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' over against Egypt. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he took Agag the king of the Amalekites alive, and utterly destroyed all the people with the edge of the sword. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But Saul and the people spared Agag, and the best of the sheep, and of the oxen, and of the fatlings, and the lambs, and all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' good, and would not utterly destroy them: but every thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' vile and refuse, that they destroyed utterly.'
