    content: 'Then said Samuel, Bring ye hither to me Agag the king of the Amalekites. And Agag came unto him delicately. And Agag said, Surely the bitterness of death is past. '
  '33':
  - type: text
    content: 'And Samuel said, As thy sword hath made women childless, so shall thy mother be childless among women. And Samuel hewed Agag in pieces before the '
  - type: text
    content: LORD
  - type: text
    content: ' in Gilgal.'
  '34':
  - type: text
    content: 'Then Samuel went to Ramah; and Saul went up to his house to Gibeah of Saul. '
  '35':
  - type: text
    content: 'And Samuel came no more to see Saul until the day of his death: nevertheless Samuel mourned for Saul: and the '
  - type: text
    content: LORD
  - type: text
    content: ' repented that he had made Saul king over Israel.'
  '4':
  - type: text
    content: 'And Saul gathered the people together, and numbered them in Telaim, two hundred thousand footmen, and ten thousand men of Judah. '
  '5':
  - type: text
    content: 'And Saul came to a city of Amalek, and laid wait in the valley. '
  '6':
  - type: text
    content: 'And Saul said unto the Kenites, Go, depart, get you down from among the Amalekites, lest I destroy you with them: for ye shewed kindness to all the children of Israel, when they came up out of Egypt. So the Kenites departed from among the Amalekites. '
  '7':
  - type: text
    content: 'And Saul smote the Amalekites from Havilah '
  - type: text
