document_id: PSA.55,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician on Neginoth, Maschil, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Give ear to my prayer, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hide not thyself from my supplication.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Day and night they go about it upon the walls thereof:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Mischief also and sorrow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the midst of it.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Wickedness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the midst thereof:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deceit and guile depart not from her streets.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' not an enemy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' reproached me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then I could have born '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was it
    - type: text
      text: ' he that hated me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' did magnify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' against me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then I would have hid myself from him:'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' thou, a man mine equal,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My guide, and mine acquaintance.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: We took sweet counsel together,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' walked unto the house of God in company.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Let death seize upon them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' let them go down quick into hell:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For wickedness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in their dwellings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' among them.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: As for me, I will call upon God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall save me.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Evening, and morning, and at noon, will I pray, and cry aloud:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shall hear my voice.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He hath delivered my soul in peace from the battle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' against me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For there were many with me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'God shall hear, and afflict them, even he that abideth of old. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have no changes, therefore they fear not God.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Attend unto me, and hear me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I mourn in my complaint, and make a noise;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He hath put forth his hands against such as be at peace with him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath broken his covenant.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: The words
    - type: text
      text: ' of his mouth were smoother than butter, but war '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in his heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His words were softer than oil, yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' they drawn swords.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Cast thy burden upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and he shall sustain thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall never suffer the righteous to be moved.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But thou,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O God, shalt bring them down into the pit of destruction:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bloody and deceitful men shall not live out half their days;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But I will trust in thee.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Because of the voice of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because of the oppression of the wicked:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they cast iniquity upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in wrath they hate me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'My heart is sore pained within me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the terrors of death are fallen upon me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fearfulness and trembling are come upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And horror hath overwhelmed me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And I said, Oh that I had wings like a dove!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For then
    - type: text
      text: ' would I fly away, and be at rest.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lo, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' would I wander far off,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' remain in the wilderness. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I would hasten my escape
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From the windy storm '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' tempest.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Destroy, O Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' divide their tongues:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I have seen violence and strife in the city.
