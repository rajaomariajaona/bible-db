document_id: PSA.55,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician on Neginoth, Maschil, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Give ear to my prayer, O God;
  - type: text
    content: And hide not thyself from my supplication.
  '10':
  - type: text
    content: 'Day and night they go about it upon the walls thereof:'
  - type: text
    content: 'Mischief also and sorrow '
  - type: text
    content: are
  - type: text
    content: ' in the midst of it.'
  '11':
  - type: text
    content: 'Wickedness '
  - type: text
    content: is
  - type: text
    content: ' in the midst thereof:'
  - type: text
    content: Deceit and guile depart not from her streets.
  '12':
  - type: text
    content: 'For '
  - type: text
    content: it was
  - type: text
    content: ' not an enemy '
  - type: text
    content: that
  - type: text
    content: ' reproached me;'
  - type: text
    content: 'Then I could have born '
  - type: text
    content: 'it:'
  - type: text
    content: 'Neither '
  - type: text
    content: was it
  - type: text
    content: ' he that hated me '
  - type: text
    content: that
  - type: text
    content: ' did magnify '
  - type: text
    content: himself
  - type: text
    content: ' against me;'
  - type: text
    content: 'Then I would have hid myself from him:'
  '13':
  - type: text
    content: 'But '
  - type: text
    content: it was
  - type: text
    content: ' thou, a man mine equal,'
  - type: text
    content: My guide, and mine acquaintance.
  '14':
  - type: text
    content: We took sweet counsel together,
  - type: text
    content: And
  - type: text
    content: ' walked unto the house of God in company.'
  '15':
  - type: text
    content: 'Let death seize upon them, '
  - type: text
    content: and
  - type: text
    content: ' let them go down quick into hell:'
  - type: text
    content: 'For wickedness '
  - type: text
    content: is
  - type: text
    content: ' in their dwellings, '
  - type: text
    content: and
  - type: text
    content: ' among them.'
  '16':
  - type: text
    content: As for me, I will call upon God;
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall save me.'
  '17':
  - type: text
    content: 'Evening, and morning, and at noon, will I pray, and cry aloud:'
  - type: text
    content: And he shall hear my voice.
  '18':
  - type: text
    content: 'He hath delivered my soul in peace from the battle '
  - type: text
    content: that was
  - type: text
    content: ' against me:'
  - type: text
    content: For there were many with me.
  '19':
  - type: text
    content: 'God shall hear, and afflict them, even he that abideth of old. '
  - type: text
    content: Selah.
  - type: text
    content: Because they have no changes, therefore they fear not God.
  '2':
  - type: text
    content: 'Attend unto me, and hear me:'
  - type: text
    content: I mourn in my complaint, and make a noise;
  '20':
  - type: text
    content: 'He hath put forth his hands against such as be at peace with him:'
  - type: text
    content: He hath broken his covenant.
  '21':
  - type: text
    content: ' '
  - type: text
    content: The words
  - type: text
    content: ' of his mouth were smoother than butter, but war '
  - type: text
    content: was
  - type: text
    content: ' in his heart:'
  - type: text
    content: 'His words were softer than oil, yet '
  - type: text
    content: were
  - type: text
    content: ' they drawn swords.'
  '22':
  - type: text
    content: 'Cast thy burden upon the '
  - type: text
    content: LORD
  - type: text
    content: ', and he shall sustain thee:'
  - type: text
    content: He shall never suffer the righteous to be moved.
  '23':
  - type: text
    content: But thou,
  - type: text
    content: 'O God, shalt bring them down into the pit of destruction:'
  - type: text
    content: Bloody and deceitful men shall not live out half their days;
  - type: text
    content: But I will trust in thee.
  '3':
  - type: text
    content: Because of the voice of the enemy,
  - type: text
    content: 'Because of the oppression of the wicked:'
  - type: text
    content: For they cast iniquity upon me,
  - type: text
    content: And in wrath they hate me.
  '4':
  - type: text
    content: 'My heart is sore pained within me:'
  - type: text
    content: And the terrors of death are fallen upon me.
  '5':
  - type: text
    content: Fearfulness and trembling are come upon me,
  - type: text
    content: And horror hath overwhelmed me.
  '6':
  - type: text
    content: And I said, Oh that I had wings like a dove!
  - type: text
    content: For then
  - type: text
    content: ' would I fly away, and be at rest.'
  '7':
  - type: text
    content: 'Lo, '
  - type: text
    content: then
  - type: text
    content: ' would I wander far off,'
  - type: text
    content: And
  - type: text
    content: ' remain in the wilderness. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: I would hasten my escape
  - type: text
    content: 'From the windy storm '
  - type: text
    content: and
  - type: text
    content: ' tempest.'
  '9':
  - type: text
    content: 'Destroy, O Lord, '
  - type: text
    content: and
  - type: text
    content: ' divide their tongues:'
  - type: text
    content: For I have seen violence and strife in the city.
