    content: Wherefore came I forth out of the womb to see labour and sorrow, that my days should be consumed with shame?
  '2':
  - type: text
    content: 'Then Pashur smote Jeremiah the prophet, and put him in the stocks that '
  - type: text
    content: were
  - type: text
    content: ' in the high gate of Benjamin, which '
  - type: text
    content: was
  - type: text
    content: ' by the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'And it came to pass on the morrow, that Pashur brought forth Jeremiah out of the stocks. Then said Jeremiah unto him, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath not called thy name Pashur, but Magor-missabib. '
  '4':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Behold, I will make thee a terror to thyself, and to all thy friends: and they shall fall by the sword of their enemies, and thine eyes shall behold '
  - type: text
    content: 'it:'
  - type: text
    content: ' and I will give all Judah into the hand of the king of Babylon, and he shall carry them captive into Babylon, and shall slay them with the sword. '
  '5':
  - type: text
    content: 'Moreover I will deliver all the strength of this city, and all the labours thereof, and all the precious things thereof, and all the treasures of the kings of Judah will I give into the hand of their enemies, which shall spoil them, and take them, and carry them to Babylon. '
  '6':
  - type: text
    content: 'And thou, Pashur, and all that dwell in thine house shall go into captivity: and thou shalt come to Babylon, and there thou shalt die, and shalt be buried there, thou, and all thy friends, to whom thou hast prophesied lies.'
  '7':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', thou hast deceived me, and I was deceived: thou art stronger than I, and hast prevailed: I am in derision daily, every one mocketh me. '
  '8':
  - type: text
    content: 'For since I spake, I cried out, I cried violence and spoil; because the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' was made a reproach unto me, and a derision, daily. '
  '9':
  - type: text
    content: 'Then I said, I will not make mention of him, nor speak any more in his name. But '
  - type: text
    content: his word
  - type: text
    content: ' was in mine heart as a burning fire shut up in my bones, and I was weary with forbearing, and I could not '
  - type: text
    content: stay
  - type: text
    content: '. '
