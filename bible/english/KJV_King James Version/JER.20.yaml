  - type: text
    content: 'Cursed '
  - type: text
    content: be
  - type: text
    content: ' the man who brought tidings to my father, saying, A man child is born unto thee; making him very glad. '
  '16':
  - type: text
    content: 'And let that man be as the cities which the '
  - type: text
