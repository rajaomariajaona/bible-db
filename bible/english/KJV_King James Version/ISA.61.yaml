document_id: ISA.61
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Lord's Anointed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Spirit of the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon me; because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath anointed me to preach good tidings unto the meek; he hath sent me to bind up the brokenhearted, to proclaim liberty to the captives, and the opening of the prison to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' bound; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'to proclaim the acceptable year of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the day of vengeance of our God; to comfort all that mourn; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'to appoint unto them that mourn in Zion, to give unto them beauty for ashes, the oil of joy for mourning, the garment of praise for the spirit of heaviness; that they might be called trees of righteousness, the planting of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that he might be glorified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they shall build the old wastes, they shall raise up the former desolations, and they shall repair the waste cities, the desolations of many generations. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And strangers shall stand and feed your flocks, and the sons of the alien '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' your plowmen and your vinedressers. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But ye shall be named the Priests of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' shall call you the Ministers of our God: ye shall eat the riches of the Gentiles, and in their glory shall ye boast yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For your shame '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye shall have
  - type: text
    text: ' double; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' confusion they shall rejoice in their portion: therefore in their land they shall possess the double: everlasting joy shall be unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' love judgment, I hate robbery for burnt offering; and I will direct their work in truth, and I will make an everlasting covenant with them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And their seed shall be known among the Gentiles, and their offspring among the people: all that see them shall acknowledge them, that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the seed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I will greatly rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', my soul shall be joyful in my God; for he hath clothed me with the garments of salvation, he hath covered me with the robe of righteousness, as a bridegroom decketh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' with ornaments, and as a bride adorneth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: herself
  - type: text
    text: ' with her jewels. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For as the earth bringeth forth her bud, and as the garden causeth the things that are sown in it to spring forth; so the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' will cause righteousness and praise to spring forth before all the nations.'
