document_id: 2CO.9,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'For as touching the ministering to the saints, it is superfluous for me to write to you: '
  '10':
  - type: text
    content: 'Now he that ministereth seed to the sower both minister bread for '
  - type: text
    content: your
  - type: text
    content: ' food, and multiply your seed sown, and increase the fruits of your righteousness;) '
  '11':
  - type: text
    content: 'being enriched in every thing to all bountifulness, which causeth through us thanksgiving to God. '
  '12':
  - type: text
    content: 'For the administration of this service not only supplieth the want of the saints, but is abundant also by many thanksgivings unto God; '
  '13':
  - type: text
    content: 'whiles by the experiment of this ministration they glorify God for your professed subjection unto the gospel of Christ, and for '
  - type: text
    content: your
  - type: text
    content: ' liberal distribution unto them, and unto all '
  - type: text
    content: men
  - type: text
    content: '; '
  '14':
  - type: text
    content: 'and by their prayer for you, which long after you for the exceeding grace of God in you. '
  '15':
  - type: text
    content: 'Thanks '
  - type: text
    content: be
  - type: text
    content: ' unto God for his unspeakable gift.'
  '2':
  - type: text
    content: 'for I know the forwardness of your mind, for which I boast of you to them of Macedonia, that Achaia was ready a year ago; and your zeal hath provoked very many. '
  '3':
  - type: text
    content: 'Yet have I sent the brethren, lest our boasting of you should be in vain in this behalf; that, as I said, ye may be ready: '
  '4':
  - type: text
    content: 'lest haply if they of Macedonia come with me, and find you unprepared, we (that we say not, ye) should be ashamed in this same confident boasting. '
  '5':
  - type: text
    content: 'Therefore I thought it necessary to exhort the brethren, that they would go before unto you, and make up beforehand your bounty, whereof ye had notice before, that the same might be ready, as '
  - type: text
    content: a matter of
  - type: text
    content: ' bounty, and not as '
  - type: text
    content: of
  - type: text
    content: ' covetousness.'
  '6':
  - type: text
    content: 'But this '
  - type: text
    content: I say
  - type: text
    content: ', He which soweth sparingly shall reap also sparingly; and he which soweth bountifully shall reap also bountifully. '
  '7':
  - type: text
    content: 'Every man according as he purposeth in his heart, '
  - type: text
    content: so let him give
  - type: text
    content: '; not grudgingly, or of necessity: for God loveth a cheerful giver. '
  '8':
  - type: text
    content: 'And God '
  - type: text
    content: is
  - type: text
    content: ' able to make all grace abound toward you; that ye, always having all sufficiency in all '
  - type: text
    content: things
  - type: text
    content: ', may abound to every good work: '
  '9':
  - type: text
    content: (As it is written,
  - type: text
    content: 'He hath dispersed abroad; he hath given to the poor:'
  - type: text
    content: His righteousness remaineth for ever.
