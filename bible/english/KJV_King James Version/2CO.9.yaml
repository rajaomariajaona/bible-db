document_id: 2CO.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For as touching the ministering to the saints, it is superfluous for me to write to you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'for I know the forwardness of your mind, for which I boast of you to them of Macedonia, that Achaia was ready a year ago; and your zeal hath provoked very many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Yet have I sent the brethren, lest our boasting of you should be in vain in this behalf; that, as I said, ye may be ready: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'lest haply if they of Macedonia come with me, and find you unprepared, we (that we say not, ye) should be ashamed in this same confident boasting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore I thought it necessary to exhort the brethren, that they would go before unto you, and make up beforehand your bounty, whereof ye had notice before, that the same might be ready, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a matter of
  - type: text
    text: ' bounty, and not as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' covetousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', He which soweth sparingly shall reap also sparingly; and he which soweth bountifully shall reap also bountifully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Every man according as he purposeth in his heart, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so let him give
  - type: text
    text: '; not grudgingly, or of necessity: for God loveth a cheerful giver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' able to make all grace abound toward you; that ye, always having all sufficiency in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', may abound to every good work: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: (As it is written,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He hath dispersed abroad; he hath given to the poor:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His righteousness remaineth for ever.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now he that ministereth seed to the sower both minister bread for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' food, and multiply your seed sown, and increase the fruits of your righteousness;) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'being enriched in every thing to all bountifulness, which causeth through us thanksgiving to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the administration of this service not only supplieth the want of the saints, but is abundant also by many thanksgivings unto God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'whiles by the experiment of this ministration they glorify God for your professed subjection unto the gospel of Christ, and for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' liberal distribution unto them, and unto all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and by their prayer for you, which long after you for the exceeding grace of God in you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thanks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto God for his unspeakable gift.'
