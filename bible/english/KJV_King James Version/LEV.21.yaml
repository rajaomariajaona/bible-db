    content: Rules for Priests
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Speak unto the priests the sons of Aaron, and say unto them, There shall none be defiled for the dead among his people: '
  '10':
  - type: text
    content: 'And '
  - type: text
    content: he that is
  - type: text
    content: ' the high priest among his brethren, upon whose head the anointing oil was poured, and that is consecrated to put on the garments, shall not uncover his head, nor rend his clothes; '
  '11':
  - type: text
    content: 'neither shall he go in to any dead body, nor defile himself for his father, or for his mother; '
  '12':
  - type: text
    content: 'neither shall he go out of the sanctuary, nor profane the sanctuary of his God; for the crown of the anointing oil of his God '
  - type: text
    content: is
  - type: text
    content: ' upon him: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And he shall take a wife in her virginity. '
  '14':
  - type: text
    content: 'A widow, or a divorced woman, or profane, '
  - type: text
    content: or
  - type: text
    content: ' an harlot, these shall he not take: but he shall take a virgin of his own people to wife. '
  '15':
  - type: text
    content: 'Neither shall he profane his seed among his people: for I the '
  - type: text
    content: LORD
  - type: text
    content: ' do sanctify him.'
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '17':
  - type: text
    content: 'Speak unto Aaron, saying, Whosoever '
  - type: text
    content: he be
  - type: text
    content: ' of thy seed in their generations that hath '
  - type: text
    content: any
  - type: text
    content: ' blemish, let him not approach to offer the bread of his God. '
  '18':
  - type: text
    content: 'For whatsoever man '
  - type: text
    content: he be
  - type: text
    content: ' that hath a blemish, he shall not approach: a blind man, or a lame, or he that hath a flat nose, or any thing superfluous, '
  '19':
  - type: text
    content: 'or a man that is brokenfooted, or brokenhanded, '
  '2':
  - type: text
    content: 'but for his kin, that is near unto him, '
  - type: text
    content: that is
  - type: text
    content: ', for his mother, and for his father, and for his son, and for his daughter, and for his brother, '
  '20':
  - type: text
    content: 'or crookbackt, or a dwarf, or that hath a blemish in his eye, or be scurvy, or scabbed, or hath his stones broken; '
  '21':
  - type: text
    content: 'no man that hath a blemish of the seed of Aaron the priest shall come nigh to offer the offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire: he hath a blemish; he shall not come nigh to offer the bread of his God. '
  '22':
  - type: text
    content: 'He shall eat the bread of his God, '
  - type: text
    content: both
  - type: text
    content: ' of the most holy, and of the holy. '
  '23':
  - type: text
    content: 'Only he shall not go in unto the vail, nor come nigh unto the altar, because he hath a blemish; that he profane not my sanctuaries: for I the '
  - type: text
    content: LORD
  - type: text
    content: ' do sanctify them. '
  '24':
  - type: text
    content: 'And Moses told '
  - type: text
    content: it
  - type: text
    content: ' unto Aaron, and to his sons, and unto all the children of Israel.'
  '3':
  - type: text
    content: 'and for his sister a virgin, that is nigh unto him, which hath had no husband; for her may he be defiled. '
  '4':
  - type: text
    content: But
  - type: text
    content: ' he shall not defile himself, '
  - type: text
    content: being
  - type: text
    content: ' a chief man among his people, to profane himself. '
  '5':
  - type: text
    content: 'They shall not make baldness upon their head, neither shall they shave off the corner of their beard, nor make any cuttings in their flesh. '
  '6':
  - type: text
    content: 'They shall be holy unto their God, and not profane the name of their God: for the offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire, '
  - type: text
    content: and
  - type: text
    content: ' the bread of their God, they do offer: therefore they shall be holy. '
  '7':
  - type: text
    content: 'They shall not take a wife '
  - type: text
    content: that is
  - type: text
    content: ' a whore, or profane; neither shall they take a woman put away from her husband: for he '
  - type: text
    content: is
  - type: text
    content: ' holy unto his God. '
  '8':
  - type: text
    content: 'Thou shalt sanctify him therefore; for he offereth the bread of thy God: he shall be holy unto thee: for I the '
  - type: text
    content: LORD
  - type: text
    content: ', which sanctify you, '
  - type: text
    content: am
  - type: text
    content: ' holy. '
  '9':
  - type: text
    content: 'And the daughter of any priest, if she profane herself by playing the whore, she profaneth her father: she shall be burnt with fire.'
