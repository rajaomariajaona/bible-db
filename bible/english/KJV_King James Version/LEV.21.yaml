document_id: LEV.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Rules for Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Speak unto the priests the sons of Aaron, and say unto them, There shall none be defiled for the dead among his people: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' the high priest among his brethren, upon whose head the anointing oil was poured, and that is consecrated to put on the garments, shall not uncover his head, nor rend his clothes; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'neither shall he go in to any dead body, nor defile himself for his father, or for his mother; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'neither shall he go out of the sanctuary, nor profane the sanctuary of his God; for the crown of the anointing oil of his God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon him: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall take a wife in her virginity. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A widow, or a divorced woman, or profane, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' an harlot, these shall he not take: but he shall take a virgin of his own people to wife. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shall he profane his seed among his people: for I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' do sanctify him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto Aaron, saying, Whosoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he be
    - type: text
      text: ' of thy seed in their generations that hath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' blemish, let him not approach to offer the bread of his God. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whatsoever man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he be
    - type: text
      text: ' that hath a blemish, he shall not approach: a blind man, or a lame, or he that hath a flat nose, or any thing superfluous, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or a man that is brokenfooted, or brokenhanded, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but for his kin, that is near unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ', for his mother, and for his father, and for his son, and for his daughter, and for his brother, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or crookbackt, or a dwarf, or that hath a blemish in his eye, or be scurvy, or scabbed, or hath his stones broken; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'no man that hath a blemish of the seed of Aaron the priest shall come nigh to offer the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire: he hath a blemish; he shall not come nigh to offer the bread of his God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall eat the bread of his God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' of the most holy, and of the holy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only he shall not go in unto the vail, nor come nigh unto the altar, because he hath a blemish; that he profane not my sanctuaries: for I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' do sanctify them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto Aaron, and to his sons, and unto all the children of Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and for his sister a virgin, that is nigh unto him, which hath had no husband; for her may he be defiled. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' he shall not defile himself, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' a chief man among his people, to profane himself. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall not make baldness upon their head, neither shall they shave off the corner of their beard, nor make any cuttings in their flesh. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall be holy unto their God, and not profane the name of their God: for the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the bread of their God, they do offer: therefore they shall be holy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall not take a wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' a whore, or profane; neither shall they take a woman put away from her husband: for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy unto his God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt sanctify him therefore; for he offereth the bread of thy God: he shall be holy unto thee: for I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which sanctify you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' holy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the daughter of any priest, if she profane herself by playing the whore, she profaneth her father: she shall be burnt with fire.'
