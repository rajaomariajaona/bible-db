document_id: 1CH.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Issachar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the sons of Issachar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Tola, and Puah, Jashub, and Shimrom, four. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the sons of Tola; Uzzi, and Rephaiah, and Jeriel, and Jahmai, and Jibsam, and Shemuel, heads of their father''s house, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit
  - type: text
    text: ', of Tola: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' valiant men of might in their generations; whose number '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the days of David two and twenty thousand and six hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the sons of Uzzi; Izrahiah: and the sons of Izrahiah; Michael, and Obadiah, and Joel, Ishiah, five: all of them chief men. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And with them, by their generations, after the house of their fathers, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' bands of soldiers for war, six and thirty thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'men:'
  - type: text
    text: ' for they had many wives and sons. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And their brethren among all the families of Issachar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' valiant men of might, reckoned in all by their genealogies fourscore and seven thousand.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Benjamin and Naphtali
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: The sons
  - type: text
    text: ' of Benjamin; Bela, and Becher, and Jediael, three. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the sons of Bela; Ezbon, and Uzzi, and Uzziel, and Jerimoth, and Iri, five; heads of the house of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' fathers, mighty men of valour; and were reckoned by their genealogies twenty and two thousand and thirty and four. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the sons of Becher; Zemira, and Joash, and Eliezer, and Elioenai, and Omri, and Jerimoth, and Abiah, and Anathoth, and Alameth. All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Becher. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the number of them, after their genealogy by their generations, heads of the house of their fathers, mighty men of valour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' twenty thousand and two hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The sons also of Jediael; Bilhan: and the sons of Bilhan; Jeush, and Benjamin, and Ehud, and Chenaanah, and Zethan, and Tharshish, and Ahishahar. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'All these the sons of Jediael, by the heads of their fathers, mighty men of valour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' seventeen thousand and two hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: soldiers
  - type: text
    text: ', fit to go out for war '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' battle. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Shuppim also, and Huppim, the children of Ir, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Hushim, the sons of Aher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The sons of Naphtali; Jahziel, and Guni, and Jezer, and Shallum, the sons of Bilhah.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Joseph's Family
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The sons of Manasseh; Ashriel, whom she bare: ('
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' his concubine the Aramitess bare Machir the father of Gilead: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Machir took to wife '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the sister
  - type: text
    text: ' of Huppim and Shuppim, whose sister''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Maachah;) and the name of the second '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Zelophehad: and Zelophehad had daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Maachah the wife of Machir bare a son, and she called his name Peresh; and the name of his brother '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Sheresh; and his sons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Ulam and Rakem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the sons of Ulam; Bedan. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Gilead, the son of Machir, the son of Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And his sister Hammoleketh bare Ishod, and Abiezer, and Mahalah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And the sons of Shemidah were, Ahian, and Shechem, and Likhi, and Aniam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the sons of Ephraim; Shuthelah, and Bered his son, and Tahath his son, and Eladah his son, and Tahath his son, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and Zabad his son, and Shuthelah his son, and Ezer, and Elead, whom the men of Gath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' born in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' land slew, because they came down to take away their cattle. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Ephraim their father mourned many days, and his brethren came to comfort him. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when he went in to his wife, she conceived, and bare a son, and he called his name Beriah, because it went evil with his house. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '(And his daughter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Sherah, who built Beth-horon the nether, and the upper, and Uzzen-sherah.) '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Rephah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' his son, also Resheph, and Telah his son, and Tahan his son, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Laadan his son, Ammihud his son, Elishama his son, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Non his son, Jehoshuah his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And their possessions and habitations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Beth-el and the towns thereof, and eastward Naaran, and westward Gezer, with the towns thereof; Shechem also and the towns thereof, unto Gaza and the towns thereof: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: and by the borders of the children of Manasseh, Beth-shean and her towns, Taanach and her towns, Megiddo and her towns, Dor and her towns. In these dwelt the children of Joseph the son of Israel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Asher
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The sons of Asher; Imnah, and Isuah, and Ishuai, and Beriah, and Serah their sister. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the sons of Beriah; Heber, and Malchiel, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the father of Birzavith. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Heber begat Japhlet, and Shomer, and Hotham, and Shua their sister. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the sons of Japhlet; Pasach, and Bimhal, and Ashvath. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the children of Japhlet. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the sons of Shamer; Ahi, and Rohgah, Jehubbah, and Aram. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the sons of his brother Helem; Zophah, and Imna, and Shelesh, and Amal. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The sons of Zophah; Suah, and Harnepher, and Shual, and Beri, and Imrah, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Bezer, and Hod, and Shamma, and Shilshah, and Ithran, and Beera. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the sons of Jether; Jephunneh, and Pispah, and Ara. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And the sons of Ulla; Arah, and Haniel, and Rezia. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the children of Asher, heads of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' father''s house, choice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty men of valour, chief of the princes. And the number throughout the genealogy of them that were apt to the war '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to battle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' twenty and six thousand men.'
