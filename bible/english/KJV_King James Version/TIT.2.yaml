document_id: TIT.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sound Doctrine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But speak thou the things which become sound doctrine: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that the aged men be sober, grave, temperate, sound in faith, in charity, in patience. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The aged women likewise, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' in behaviour as becometh holiness, not false accusers, not given to much wine, teachers of good things; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'that they may teach the young women to be sober, to love their husbands, to love their children, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' discreet, chaste, keepers at home, good, obedient to their own husbands, that the word of God be not blasphemed. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Young men likewise exhort to be sober minded. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In all things shewing thyself a pattern of good works: in doctrine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shewing
  - type: text
    text: ' uncorruptness, gravity, sincerity, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sound speech, that cannot be condemned; that he that is of the contrary part may be ashamed, having no evil thing to say of you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Exhort
  - type: text
    text: ' servants to be obedient unto their own masters, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to please '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' well in all things; not answering again; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: not purloining, but shewing all good fidelity; that they may adorn the doctrine of God our Saviour in all things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the grace of God that bringeth salvation hath appeared to all men, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'teaching us that, denying ungodliness and worldly lusts, we should live soberly, righteously, and godly, in this present world; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'looking for that blessed hope, and the glorious appearing of the great God and our Saviour Jesus Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'who gave himself for us, that he might redeem us from all iniquity, and purify unto himself a peculiar people, zealous of good works. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These things speak, and exhort, and rebuke with all authority. Let no man despise thee.
