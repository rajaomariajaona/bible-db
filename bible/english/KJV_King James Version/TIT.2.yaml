document_id: TIT.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Sound Doctrine
  - type: text
    content: 'But speak thou the things which become sound doctrine: '
  '10':
  - type: text
    content: not purloining, but shewing all good fidelity; that they may adorn the doctrine of God our Saviour in all things.
  '11':
  - type: text
    content: 'For the grace of God that bringeth salvation hath appeared to all men, '
  '12':
  - type: text
    content: 'teaching us that, denying ungodliness and worldly lusts, we should live soberly, righteously, and godly, in this present world; '
  '13':
  - type: text
    content: 'looking for that blessed hope, and the glorious appearing of the great God and our Saviour Jesus Christ; '
  '14':
  - type: text
    content: 'who gave himself for us, that he might redeem us from all iniquity, and purify unto himself a peculiar people, zealous of good works. '
  '15':
  - type: text
    content: These things speak, and exhort, and rebuke with all authority. Let no man despise thee.
  '2':
  - type: text
    content: 'that the aged men be sober, grave, temperate, sound in faith, in charity, in patience. '
  '3':
  - type: text
    content: 'The aged women likewise, that '
  - type: text
    content: they be
  - type: text
    content: ' in behaviour as becometh holiness, not false accusers, not given to much wine, teachers of good things; '
  '4':
  - type: text
    content: 'that they may teach the young women to be sober, to love their husbands, to love their children, '
  '5':
  - type: text
    content: to be
  - type: text
    content: ' discreet, chaste, keepers at home, good, obedient to their own husbands, that the word of God be not blasphemed. '
  '6':
  - type: text
    content: 'Young men likewise exhort to be sober minded. '
  '7':
  - type: text
    content: 'In all things shewing thyself a pattern of good works: in doctrine '
  - type: text
    content: shewing
  - type: text
    content: ' uncorruptness, gravity, sincerity, '
  '8':
  - type: text
    content: 'sound speech, that cannot be condemned; that he that is of the contrary part may be ashamed, having no evil thing to say of you. '
  '9':
  - type: text
    content: Exhort
  - type: text
    content: ' servants to be obedient unto their own masters, '
  - type: text
    content: and
  - type: text
    content: ' to please '
  - type: text
    content: them
  - type: text
    content: ' well in all things; not answering again; '
