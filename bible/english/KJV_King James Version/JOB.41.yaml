document_id: JOB.41,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Canst thou draw out leviathan with an hook?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or his tongue with a cord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' thou lettest down?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'None '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is so
    - type: text
      text: ' fierce that dare stir him up:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who then is able to stand before me?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Who hath prevented me, that I should repay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Whatsoever is
    - type: text
      text: ' under the whole heaven is mine.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will not conceal his parts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor his power, nor his comely proportion.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Who can discover the face of his garment?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Or
    - type: text
      text: ' who can come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ' with his double bridle?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Who can open the doors of his face?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His teeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' terrible round about.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: His
    - type: text
      text: ' scales '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are his
    - type: text
      text: ' pride,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shut up together '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as with
    - type: text
      text: ' a close seal.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: One is so near to another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That no air can come between them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They are joined one to another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They stick together, that they cannot be sundered.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: By his neesings a light doth shine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' like the eyelids of the morning.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Out of his mouth go burning lamps,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' sparks of fire leap out.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Canst thou put an hook into his nose?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or bore his jaw through with a thorn?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Out of his nostrils goeth smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: out
    - type: text
      text: ' of a seething pot or caldron.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: His breath kindleth coals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a flame goeth out of his mouth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: In his neck remaineth strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sorrow is turned into joy before him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The flakes of his flesh are joined together:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are firm in themselves; they cannot be moved.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: His heart is as firm as a stone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, as hard as a piece of the nether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: millstone
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'When he raiseth up himself, the mighty are afraid:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By reason of breakings they purify themselves.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The sword of him that layeth at him cannot hold:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The spear, the dart, nor the habergeon.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: He esteemeth iron as straw,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' brass as rotten wood.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The arrow cannot make him flee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Slingstones are turned with him into stubble.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Darts are counted as stubble:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He laugheth at the shaking of a spear.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Will he make many supplications unto thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Will he speak soft '
    - type: usfm
      marker: add
      children:
      - type: text
        text: words
    - type: text
      text: ' unto thee?'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Sharp stones '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' under him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He spreadeth sharp pointed things upon the mire.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'He maketh the deep to boil like a pot:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He maketh the sea like a pot of ointment.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: He maketh a path to shine after him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: One
    - type: text
      text: ' would think the deep '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' hoary.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Upon earth there is not his like,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is made without fear.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'He beholdeth all high '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'things:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a king over all the children of pride.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Will he make a covenant with thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wilt thou take him for a servant for ever?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Wilt thou play with him as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' a bird?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or wilt thou bind him for thy maidens?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Shall the companions make a banquet of him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall they part him among the merchants?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Canst thou fill his skin with barbed irons?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or his head with fish spears?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Lay thine hand upon him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remember the battle, do no more.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Behold, the hope of him is in vain:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shall not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' be cast down even at the sight of him?'
