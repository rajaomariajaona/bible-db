verses:
  '1':
  - type: text
    content: Canst thou draw out leviathan with an hook?
  - type: text
    content: 'Or his tongue with a cord '
  - type: text
    content: which
  - type: text
    content: ' thou lettest down?'
  '10':
  - type: text
    content: 'None '
  - type: text
    content: is so
  - type: text
    content: ' fierce that dare stir him up:'
  - type: text
    content: Who then is able to stand before me?
  '11':
  - type: text
    content: 'Who hath prevented me, that I should repay '
  - type: text
    content: him?
  - type: text
    content: Whatsoever is
  - type: text
    content: ' under the whole heaven is mine.'
  '12':
  - type: text
    content: I will not conceal his parts,
  - type: text
    content: Nor his power, nor his comely proportion.
  '13':
  - type: text
    content: Who can discover the face of his garment?
  - type: text
    content: Or
  - type: text
    content: ' who can come '
  - type: text
    content: to him
  - type: text
    content: ' with his double bridle?'
  '14':
  - type: text
    content: Who can open the doors of his face?
  - type: text
    content: 'His teeth '
  - type: text
    content: are
  - type: text
    content: ' terrible round about.'
  '15':
  - type: text
    content: ' '
  - type: text
    content: His
  - type: text
    content: ' scales '
  - type: text
    content: are his
  - type: text
    content: ' pride,'
  - type: text
    content: 'Shut up together '
  - type: text
    content: as with
  - type: text
    content: ' a close seal.'
  '16':
  - type: text
    content: One is so near to another,
  - type: text
    content: That no air can come between them.
  '17':
  - type: text
    content: They are joined one to another,
  - type: text
    content: They stick together, that they cannot be sundered.
  '18':
  - type: text
    content: By his neesings a light doth shine,
  - type: text
    content: 'And his eyes '
  - type: text
    content: are
  - type: text
    content: ' like the eyelids of the morning.'
  '19':
  - type: text
    content: Out of his mouth go burning lamps,
  - type: text
    content: And
  - type: text
    content: ' sparks of fire leap out.'
  '2':
  - type: text
    content: Canst thou put an hook into his nose?
  - type: text
    content: Or bore his jaw through with a thorn?
  '20':
  - type: text
    content: Out of his nostrils goeth smoke,
  - type: text
    content: 'As '
  - type: text
    content: out
  - type: text
    content: ' of a seething pot or caldron.'
  '21':
  - type: text
    content: His breath kindleth coals,
  - type: text
    content: And a flame goeth out of his mouth.
  '22':
  - type: text
    content: In his neck remaineth strength,
  - type: text
    content: And sorrow is turned into joy before him.
  '23':
  - type: text
    content: 'The flakes of his flesh are joined together:'
  - type: text
    content: They are firm in themselves; they cannot be moved.
  '24':
  - type: text
    content: His heart is as firm as a stone;
  - type: text
    content: 'Yea, as hard as a piece of the nether '
  - type: text
    content: millstone
  - type: text
    content: .
  '25':
  - type: text
    content: 'When he raiseth up himself, the mighty are afraid:'
  - type: text
    content: By reason of breakings they purify themselves.
  '26':
  - type: text
    content: 'The sword of him that layeth at him cannot hold:'
  - type: text
    content: The spear, the dart, nor the habergeon.
  '27':
  - type: text
    content: He esteemeth iron as straw,
  - type: text
    content: And
  - type: text
    content: ' brass as rotten wood.'
  '28':
  - type: text
    content: 'The arrow cannot make him flee:'
  - type: text
    content: Slingstones are turned with him into stubble.
  '29':
  - type: text
    content: 'Darts are counted as stubble:'
  - type: text
    content: He laugheth at the shaking of a spear.
  '3':
  - type: text
    content: Will he make many supplications unto thee?
  - type: text
    content: 'Will he speak soft '
  - type: text
    content: words
  - type: text
    content: ' unto thee?'
  '30':
  - type: text
    content: 'Sharp stones '
  - type: text
    content: are
  - type: text
    content: ' under him:'
  - type: text
    content: He spreadeth sharp pointed things upon the mire.
  '31':
  - type: text
    content: 'He maketh the deep to boil like a pot:'
  - type: text
    content: He maketh the sea like a pot of ointment.
  '32':
  - type: text
    content: He maketh a path to shine after him;
  - type: text
    content: One
  - type: text
    content: ' would think the deep '
  - type: text
    content: to be
  - type: text
    content: ' hoary.'
  '33':
  - type: text
    content: Upon earth there is not his like,
  - type: text
    content: Who is made without fear.
  '34':
  - type: text
    content: 'He beholdeth all high '
  - type: text
    content: 'things:'
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' a king over all the children of pride.'
  '4':
  - type: text
    content: Will he make a covenant with thee?
  - type: text
    content: Wilt thou take him for a servant for ever?
  '5':
  - type: text
    content: 'Wilt thou play with him as '
  - type: text
    content: with
  - type: text
    content: ' a bird?'
  - type: text
    content: Or wilt thou bind him for thy maidens?
  '6':
  - type: text
    content: Shall the companions make a banquet of him?
  - type: text
    content: Shall they part him among the merchants?
  '7':
  - type: text
    content: Canst thou fill his skin with barbed irons?
  - type: text
    content: Or his head with fish spears?
  '8':
  - type: text
    content: Lay thine hand upon him,
  - type: text
    content: Remember the battle, do no more.
  '9':
  - type: text
    content: 'Behold, the hope of him is in vain:'
  - type: text
    content: 'Shall not '
  - type: text
    content: one
  - type: text
    content: ' be cast down even at the sight of him?'
