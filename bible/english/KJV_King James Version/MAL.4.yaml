document_id: MAL.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, the day cometh, that shall burn as an oven; and all the proud, yea, and all that do wickedly, shall be stubble: and the day that cometh shall burn them up, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, that it shall leave them neither root nor branch. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But unto you that fear my name shall the Sun of righteousness arise with healing in his wings; and ye shall go forth, and grow up as calves of the stall. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall tread down the wicked; for they shall be ashes under the soles of your feet in the day that I shall do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Call to Remembrance
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember ye the law of Moses my servant, which I commanded unto him in Horeb for all Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' the statutes and judgments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will send you Elijah the prophet before the coming of the great and dreadful day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he shall turn the heart of the fathers to the children, and the heart of the children to their fathers, lest I come and smite the earth with a curse.
