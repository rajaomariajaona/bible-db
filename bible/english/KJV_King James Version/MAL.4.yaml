document_id: MAL.4,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'For, behold, the day cometh, that shall burn as an oven; and all the proud, yea, and all that do wickedly, shall be stubble: and the day that cometh shall burn them up, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, that it shall leave them neither root nor branch. '
  '2':
  - type: text
    content: 'But unto you that fear my name shall the Sun of righteousness arise with healing in his wings; and ye shall go forth, and grow up as calves of the stall. '
  '3':
  - type: text
    content: 'And ye shall tread down the wicked; for they shall be ashes under the soles of your feet in the day that I shall do '
  - type: text
    content: this
  - type: text
    content: ', saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  - type: heading
    content: A Call to Remembrance
  '4':
  - type: text
    content: 'Remember ye the law of Moses my servant, which I commanded unto him in Horeb for all Israel, '
  - type: text
    content: with
  - type: text
    content: ' the statutes and judgments. '
  '5':
  - type: text
    content: 'Behold, I will send you Elijah the prophet before the coming of the great and dreadful day of the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '6':
  - type: text
    content: and he shall turn the heart of the fathers to the children, and the heart of the children to their fathers, lest I come and smite the earth with a curse.
