document_id: 1JN.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Behold, what manner of love the Father hath bestowed upon us, that we should be called the sons of God: therefore the world knoweth us not, because it knew him not. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In this the children of God are manifest, and the children of the devil: whosoever doeth not righteousness is not of God, neither he that loveth not his brother. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For this is the message that ye heard from the beginning, that we should love one another. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Not as Cain, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' was of that wicked one, and slew his brother. And wherefore slew he him? Because his own works were evil, and his brother''s righteous.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Marvel not, my brethren, if the world hate you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'We know that we have passed from death unto life, because we love the brethren. He that loveth not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' brother abideth in death. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Whosoever hateth his brother is a murderer: and ye know that no murderer hath eternal life abiding in him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hereby perceive we the love '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of God
    - type: text
      text: ', because he laid down his life for us: and we ought to lay down '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' lives for the brethren. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But whoso hath this world''s good, and seeth his brother have need, and shutteth up his bowels '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of compassion
    - type: text
      text: ' from him, how dwelleth the love of God in him? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: My little children, let us not love in word, neither in tongue; but in deed and in truth.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And hereby we know that we are of the truth, and shall assure our hearts before him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Beloved, now are we the sons of God, and it doth not yet appear what we shall be: but we know that, when he shall appear, we shall be like him; for we shall see him as he is. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For if our heart condemn us, God is greater than our heart, and knoweth all things. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Beloved, if our heart condemn us not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' have we confidence toward God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And whatsoever we ask, we receive of him, because we keep his commandments, and do those things that are pleasing in his sight. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And this is his commandment, That we should believe on the name of his Son Jesus Christ, and love one another, as he gave us commandment. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And he that keepeth his commandments dwelleth in him, and he in him. And hereby we know that he abideth in us, by the Spirit which he hath given us.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And every man that hath this hope in him purifieth himself, even as he is pure.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Whosoever committeth sin transgresseth also the law: for sin is the transgression of the law. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And ye know that he was manifested to take away our sins; and in him is no sin. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Whosoever abideth in him sinneth not: whosoever sinneth hath not seen him, neither known him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Little children, let no man deceive you: he that doeth righteousness is righteous, even as he is righteous. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He that committeth sin is of the devil; for the devil sinneth from the beginning. For this purpose the Son of God was manifested, that he might destroy the works of the devil.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Whosoever is born of God doth not commit sin; for his seed remaineth in him: and he cannot sin, because he is born of God. '
