document_id: 1CH.26,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Officers and Judges
  - type: text
    content: 'Concerning the divisions of the porters: Of the Korhites '
  - type: text
    content: was
  - type: text
    content: ' Meshelemiah the son of Kore, of the sons of Asaph. '
  '10':
  - type: text
    content: 'Also Hosah, of the children of Merari, had sons; Simri the chief, (for '
  - type: text
    content: though
  - type: text
    content: ' he was not the firstborn, yet his father made him the chief;) '
  '11':
  - type: text
    content: 'Hilkiah the second, Tebaliah the third, Zechariah the fourth: all the sons and brethren of Hosah '
  - type: text
    content: were
  - type: text
    content: ' thirteen.'
  '12':
  - type: text
    content: 'Among these '
  - type: text
    content: were
  - type: text
    content: ' the divisions of the porters, '
  - type: text
    content: even
  - type: text
    content: ' among the chief men, '
  - type: text
    content: having
  - type: text
    content: ' wards one against another, to minister in the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And they cast lots, as well the small as the great, according to the house of their fathers, for every gate. '
  '14':
  - type: text
    content: 'And the lot eastward fell to Shelemiah. Then for Zechariah his son, a wise counsellor, they cast lots; and his lot came out northward. '
  '15':
  - type: text
    content: 'To Obed-edom southward; and to his sons the house of Asuppim. '
  '16':
  - type: text
    content: 'To Shuppim and Hosah '
  - type: text
    content: the lot came forth
  - type: text
    content: ' westward, with the gate Shallecheth, by the causeway of the going up, ward against ward. '
  '17':
  - type: text
    content: 'Eastward '
  - type: text
    content: were
  - type: text
    content: ' six Levites, northward four a day, southward four a day, and toward Asuppim two '
  - type: text
    content: and
  - type: text
    content: ' two. '
  '18':
  - type: text
    content: 'At Parbar westward, four at the causeway, '
  - type: text
    content: and
  - type: text
    content: ' two at Parbar. '
  '19':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the divisions of the porters among the sons of Kore, and among the sons of Merari.'
  '2':
  - type: text
    content: 'And the sons of Meshelemiah '
  - type: text
    content: were
  - type: text
    content: ', Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  '20':
  - type: text
    content: 'And of the Levites, Ahijah '
  - type: text
    content: was
  - type: text
    content: ' over the treasures of the house of God, and over the treasures of the dedicated things. '
  '21':
  - type: text
    content: As concerning
  - type: text
    content: ' the sons of Laadan; the sons of the Gershonite Laadan, chief fathers, '
  - type: text
    content: even
  - type: text
    content: ' of Laadan the Gershonite, '
  - type: text
    content: were
  - type: text
    content: ' Jehieli. '
  '22':
  - type: text
    content: 'The sons of Jehieli; Zetham, and Joel his brother, '
  - type: text
    content: which were
  - type: text
    content: ' over the treasures of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Of the Amramites, '
  - type: text
    content: and
  - type: text
    content: ' the Izharites, the Hebronites, '
  - type: text
    content: and
  - type: text
    content: ' the Uzzielites: '
  '24':
  - type: text
    content: 'and Shebuel the son of Gershom, the son of Moses, '
  - type: text
    content: was
  - type: text
    content: ' ruler of the treasures. '
  '25':
  - type: text
    content: 'And his brethren by Eliezer; Rehabiah his son, and Jeshaiah his son, and Joram his son, and Zichri his son, and Shelomith his son. '
  '26':
  - type: text
    content: 'Which Shelomith and his brethren '
  - type: text
    content: were
  - type: text
    content: ' over all the treasures of the dedicated things, which David the king, and the chief fathers, the captains over thousands and hundreds, and the captains of the host, had dedicated. '
  '27':
  - type: text
    content: 'Out of the spoils won in battles did they dedicate to maintain the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And all that Samuel the seer, and Saul the son of Kish, and Abner the son of Ner, and Joab the son of Zeruiah, had dedicated; '
  - type: text
    content: and
  - type: text
    content: ' whosoever had dedicated '
  - type: text
    content: any thing, it was
  - type: text
    content: ' under the hand of Shelomith, and of his brethren.'
  '29':
  - type: text
    content: 'Of the Izharites, Chenaniah and his sons '
  - type: text
    content: were
  - type: text
    content: ' for the outward business over Israel, for officers and judges. '
  '3':
  - type: text
    content: 'Elam the fifth, Jehohanan the sixth, Elioenai the seventh. '
  '30':
  - type: text
    content: And
  - type: text
    content: ' of the Hebronites, Hashabiah and his brethren, men of valour, a thousand and seven hundred, '
  - type: text
    content: were
  - type: text
    content: ' officers among them of Israel on this side Jordan westward in all the business of the '
  - type: text
    content: LORD
  - type: text
    content: ', and in the service of the king. '
  '31':
  - type: text
    content: 'Among the Hebronites '
  - type: text
    content: was
  - type: text
    content: ' Jerijah the chief, '
  - type: text
    content: even
  - type: text
    content: ' among the Hebronites, according to the generations of his fathers. In the fortieth year of the reign of David they were sought for, and there were found among them mighty men of valour at Jazer of Gilead. '
  '32':
  - type: text
    content: 'And his brethren, men of valour, '
  - type: text
    content: were
  - type: text
    content: ' two thousand and seven hundred chief fathers, whom king David made rulers over the Reubenites, the Gadites, and the half tribe of Manasseh, for every matter pertaining to God, and affairs of the king.'
  '4':
  - type: text
    content: 'Moreover the sons of Obed-edom '
  - type: text
    content: were
  - type: text
    content: ', Shemaiah the firstborn, Jehozabad the second, Joah the third, and Sacar the fourth, and Nethaneel the fifth, '
  '5':
  - type: text
    content: 'Ammiel the sixth, Issachar the seventh, Peulthai the eighth: for God blessed him. '
  '6':
  - type: text
    content: 'Also unto Shemaiah his son were sons born, that ruled throughout the house of their father: for they '
  - type: text
    content: were
  - type: text
    content: ' mighty men of valour. '
  '7':
  - type: text
    content: 'The sons of Shemaiah; Othni, and Rephael, and Obed, Elzabad, whose brethren '
  - type: text
    content: were
  - type: text
    content: ' strong men, Elihu, and Semachiah. '
  '8':
  - type: text
    content: 'All these of the sons of Obed-edom: they and their sons and their brethren, able men for strength for the service, '
  - type: text
    content: were
  - type: text
    content: ' threescore and two of Obed-edom. '
  '9':
  - type: text
    content: 'And Meshelemiah had sons and brethren, strong men, eighteen. '
