document_id: 1CH.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Officers and Judges
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Concerning the divisions of the porters: Of the Korhites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Meshelemiah the son of Kore, of the sons of Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the sons of Meshelemiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elam the fifth, Jehohanan the sixth, Elioenai the seventh. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moreover the sons of Obed-edom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Shemaiah the firstborn, Jehozabad the second, Joah the third, and Sacar the fourth, and Nethaneel the fifth, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ammiel the sixth, Issachar the seventh, Peulthai the eighth: for God blessed him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Also unto Shemaiah his son were sons born, that ruled throughout the house of their father: for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' mighty men of valour. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Shemaiah; Othni, and Rephael, and Obed, Elzabad, whose brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' strong men, Elihu, and Semachiah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All these of the sons of Obed-edom: they and their sons and their brethren, able men for strength for the service, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' threescore and two of Obed-edom. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Meshelemiah had sons and brethren, strong men, eighteen. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Also Hosah, of the children of Merari, had sons; Simri the chief, (for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: though
  - type: text
    text: ' he was not the firstborn, yet his father made him the chief;) '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hilkiah the second, Tebaliah the third, Zechariah the fourth: all the sons and brethren of Hosah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirteen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Among these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the divisions of the porters, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' among the chief men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: having
  - type: text
    text: ' wards one against another, to minister in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they cast lots, as well the small as the great, according to the house of their fathers, for every gate. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the lot eastward fell to Shelemiah. Then for Zechariah his son, a wise counsellor, they cast lots; and his lot came out northward. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'To Obed-edom southward; and to his sons the house of Asuppim. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'To Shuppim and Hosah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the lot came forth
  - type: text
    text: ' westward, with the gate Shallecheth, by the causeway of the going up, ward against ward. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eastward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' six Levites, northward four a day, southward four a day, and toward Asuppim two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' two. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'At Parbar westward, four at the causeway, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' two at Parbar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the divisions of the porters among the sons of Kore, and among the sons of Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And of the Levites, Ahijah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the treasures of the house of God, and over the treasures of the dedicated things. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As concerning
  - type: text
    text: ' the sons of Laadan; the sons of the Gershonite Laadan, chief fathers, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of Laadan the Gershonite, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Jehieli. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The sons of Jehieli; Zetham, and Joel his brother, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' over the treasures of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Of the Amramites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the Izharites, the Hebronites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the Uzzielites: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and Shebuel the son of Gershom, the son of Moses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' ruler of the treasures. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And his brethren by Eliezer; Rehabiah his son, and Jeshaiah his son, and Joram his son, and Zichri his son, and Shelomith his son. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Which Shelomith and his brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' over all the treasures of the dedicated things, which David the king, and the chief fathers, the captains over thousands and hundreds, and the captains of the host, had dedicated. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Out of the spoils won in battles did they dedicate to maintain the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And all that Samuel the seer, and Saul the son of Kish, and Abner the son of Ner, and Joab the son of Zeruiah, had dedicated; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' whosoever had dedicated '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any thing, it was
  - type: text
    text: ' under the hand of Shelomith, and of his brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Of the Izharites, Chenaniah and his sons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' for the outward business over Israel, for officers and judges. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' of the Hebronites, Hashabiah and his brethren, men of valour, a thousand and seven hundred, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' officers among them of Israel on this side Jordan westward in all the business of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and in the service of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Among the Hebronites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jerijah the chief, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' among the Hebronites, according to the generations of his fathers. In the fortieth year of the reign of David they were sought for, and there were found among them mighty men of valour at Jazer of Gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And his brethren, men of valour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' two thousand and seven hundred chief fathers, whom king David made rulers over the Reubenites, the Gadites, and the half tribe of Manasseh, for every matter pertaining to God, and affairs of the king.'
