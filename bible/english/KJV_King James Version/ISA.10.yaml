document_id: ISA.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe unto them that decree unrighteous decrees, and that write grievousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' they have prescribed; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As my hand hath found the kingdoms of the idols, and whose graven images did excel them of Jerusalem and of Samaria; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shall I not, as I have done unto Samaria and her idols, so do to Jerusalem and her idols?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' when the Lord hath performed his whole work upon mount Zion and on Jerusalem, I will punish the fruit of the stout heart of the king of Assyria, and the glory of his high looks. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he saith, By the strength of my hand I have done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and by my wisdom; for I am prudent: and I have removed the bounds of the people, and have robbed their treasures, and I have put down the inhabitants like a valiant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'man:'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and my hand hath found as a nest the riches of the people: and as one gathereth eggs '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' left, have I gathered all the earth; and there was none that moved the wing, or opened the mouth, or peeped.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shall the axe boast itself against him that heweth therewith? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' shall the saw magnify itself against him that shaketh it? as if the rod should shake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: itself
    - type: text
      text: ' against them that lift it up, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' as if the staff should lift up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: itself, as if it were
    - type: text
      text: ' no wood. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore shall the Lord, the Lord of hosts, send among his fat ones leanness; and under his glory he shall kindle a burning like the burning of a fire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the light of Israel shall be for a fire, and his Holy One for a flame: and it shall burn and devour his thorns and his briers in one day; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and shall consume the glory of his forest, and of his fruitful field, both soul and body: and they shall be as when a standardbearer fainteth. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the rest of the trees of his forest shall be few, that a child may write them.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to turn aside the needy from judgment, and to take away the right from the poor of my people, that widows may be their prey, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they may rob the fatherless! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the remnant of Israel, and such as are escaped of the house of Jacob, shall no more again stay upon him that smote them; but shall stay upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the Holy One of Israel, in truth. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The remnant shall return, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the remnant of Jacob, unto the mighty God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For though thy people Israel be as the sand of the sea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' a remnant of them shall return: the consumption decreed shall overflow with righteousness. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' of hosts shall make a consumption, even determined, in the midst of all the land.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' of hosts, O my people that dwellest in Zion, be not afraid of the Assyrian: he shall smite thee with a rod, and shall lift up his staff against thee, after the manner of Egypt. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For yet a very little while, and the indignation shall cease, and mine anger in their destruction. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts shall stir up a scourge for him according to the slaughter of Midian at the rock of Oreb: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' his rod '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon the sea, so shall he lift it up after the manner of Egypt. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' his burden shall be taken away from off thy shoulder, and his yoke from off thy neck, and the yoke shall be destroyed because of the anointing.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is come to Aiath, he is passed to Migron; at Michmash he hath laid up his carriages: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they are gone over the passage: they have taken up their lodging at Geba; Ramah is afraid; Gibeah of Saul is fled. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And what will ye do in the day of visitation, and in the desolation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' shall come from far? to whom will ye flee for help? and where will ye leave your glory? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lift up thy voice, O daughter of Gallim: cause it to be heard unto Laish, O poor Anathoth. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Madmenah is removed; the inhabitants of Gebim gather themselves to flee. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As yet shall he remain at Nob that day: he shall shake his hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' the mount of the daughter of Zion, the hill of Jerusalem.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, shall lop the bough with terror: and the high ones of stature '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' hewn down, and the haughty shall be humbled. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he shall cut down the thickets of the forest with iron, and Lebanon shall fall by a mighty one.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Without me they shall bow down under the prisoners, and they shall fall under the slain. For all this his anger is not turned away, but his hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' stretched out still.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Assyria
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O Assyrian, the rod of mine anger, and the staff in their hand is mine indignation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will send him against an hypocritical nation, and against the people of my wrath will I give him a charge, to take the spoil, and to take the prey, and to tread them down like the mire of the streets. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit he meaneth not so, neither doth his heart think so; but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' in his heart to destroy and cut off nations not a few. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he saith, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' not my princes altogether kings? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not Calno as Carchemish? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not Hamath as Arpad? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not Samaria as Damascus? '
