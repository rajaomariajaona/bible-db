document_id: ISA.10,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Woe unto them that decree unrighteous decrees, and that write grievousness '
  - type: text
    content: which
  - type: text
    content: ' they have prescribed; '
  '10':
  - type: text
    content: 'As my hand hath found the kingdoms of the idols, and whose graven images did excel them of Jerusalem and of Samaria; '
  '11':
  - type: text
    content: Shall I not, as I have done unto Samaria and her idols, so do to Jerusalem and her idols?
  '12':
  - type: text
    content: 'Wherefore it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' when the Lord hath performed his whole work upon mount Zion and on Jerusalem, I will punish the fruit of the stout heart of the king of Assyria, and the glory of his high looks. '
  '13':
  - type: text
    content: 'For he saith, By the strength of my hand I have done '
  - type: text
    content: it
  - type: text
    content: ', and by my wisdom; for I am prudent: and I have removed the bounds of the people, and have robbed their treasures, and I have put down the inhabitants like a valiant '
  - type: text
    content: 'man:'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'and my hand hath found as a nest the riches of the people: and as one gathereth eggs '
  - type: text
    content: that are
  - type: text
    content: ' left, have I gathered all the earth; and there was none that moved the wing, or opened the mouth, or peeped.'
  '15':
  - type: text
    content: 'Shall the axe boast itself against him that heweth therewith? '
  - type: text
    content: or
  - type: text
    content: ' shall the saw magnify itself against him that shaketh it? as if the rod should shake '
  - type: text
    content: itself
  - type: text
    content: ' against them that lift it up, '
  - type: text
    content: or
  - type: text
    content: ' as if the staff should lift up '
  - type: text
    content: itself, as if it were
  - type: text
    content: ' no wood. '
  '16':
  - type: text
    content: 'Therefore shall the Lord, the Lord of hosts, send among his fat ones leanness; and under his glory he shall kindle a burning like the burning of a fire. '
  '17':
  - type: text
    content: 'And the light of Israel shall be for a fire, and his Holy One for a flame: and it shall burn and devour his thorns and his briers in one day; '
  '18':
  - type: text
    content: 'and shall consume the glory of his forest, and of his fruitful field, both soul and body: and they shall be as when a standardbearer fainteth. '
  '19':
  - type: text
    content: And the rest of the trees of his forest shall be few, that a child may write them.
  '2':
  - type: text
    content: 'to turn aside the needy from judgment, and to take away the right from the poor of my people, that widows may be their prey, and '
  - type: text
    content: that
  - type: text
    content: ' they may rob the fatherless! '
  '20':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' the remnant of Israel, and such as are escaped of the house of Jacob, shall no more again stay upon him that smote them; but shall stay upon the '
  - type: text
    content: LORD
  - type: text
    content: ', the Holy One of Israel, in truth. '
  '21':
  - type: text
    content: 'The remnant shall return, '
  - type: text
    content: even
  - type: text
    content: ' the remnant of Jacob, unto the mighty God. '
  '22':
  - type: text
    content: 'For though thy people Israel be as the sand of the sea, '
  - type: text
    content: yet
  - type: text
    content: ' a remnant of them shall return: the consumption decreed shall overflow with righteousness. '
  '23':
  - type: text
    content: 'For the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts shall make a consumption, even determined, in the midst of all the land.'
  '24':
  - type: text
    content: 'Therefore thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts, O my people that dwellest in Zion, be not afraid of the Assyrian: he shall smite thee with a rod, and shall lift up his staff against thee, after the manner of Egypt. '
  '25':
  - type: text
    content: 'For yet a very little while, and the indignation shall cease, and mine anger in their destruction. '
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts shall stir up a scourge for him according to the slaughter of Midian at the rock of Oreb: and '
  - type: text
    content: as
  - type: text
    content: ' his rod '
  - type: text
    content: was
  - type: text
    content: ' upon the sea, so shall he lift it up after the manner of Egypt. '
  '27':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' his burden shall be taken away from off thy shoulder, and his yoke from off thy neck, and the yoke shall be destroyed because of the anointing.'
  '28':
  - type: text
    content: 'He is come to Aiath, he is passed to Migron; at Michmash he hath laid up his carriages: '
  '29':
  - type: text
    content: 'they are gone over the passage: they have taken up their lodging at Geba; Ramah is afraid; Gibeah of Saul is fled. '
  '3':
  - type: text
    content: 'And what will ye do in the day of visitation, and in the desolation '
  - type: text
    content: which
  - type: text
    content: ' shall come from far? to whom will ye flee for help? and where will ye leave your glory? '
  '30':
  - type: text
    content: 'Lift up thy voice, O daughter of Gallim: cause it to be heard unto Laish, O poor Anathoth. '
  '31':
  - type: text
    content: 'Madmenah is removed; the inhabitants of Gebim gather themselves to flee. '
  '32':
  - type: text
    content: 'As yet shall he remain at Nob that day: he shall shake his hand '
  - type: text
    content: against
  - type: text
    content: ' the mount of the daughter of Zion, the hill of Jerusalem.'
  '33':
  - type: text
    content: 'Behold, the Lord, the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, shall lop the bough with terror: and the high ones of stature '
  - type: text
    content: shall be
  - type: text
    content: ' hewn down, and the haughty shall be humbled. '
  '34':
  - type: text
    content: And he shall cut down the thickets of the forest with iron, and Lebanon shall fall by a mighty one.
  '4':
  - type: text
    content: 'Without me they shall bow down under the prisoners, and they shall fall under the slain. For all this his anger is not turned away, but his hand '
  - type: text
    content: is
  - type: text
    content: ' stretched out still.'
  - type: heading
    content: Assyria
  '5':
  - type: text
    content: 'O Assyrian, the rod of mine anger, and the staff in their hand is mine indignation. '
  '6':
  - type: text
    content: 'I will send him against an hypocritical nation, and against the people of my wrath will I give him a charge, to take the spoil, and to take the prey, and to tread them down like the mire of the streets. '
  '7':
  - type: text
    content: 'Howbeit he meaneth not so, neither doth his heart think so; but '
  - type: text
    content: it is
  - type: text
    content: ' in his heart to destroy and cut off nations not a few. '
  '8':
  - type: text
    content: 'For he saith, '
  - type: text
    content: Are
  - type: text
    content: ' not my princes altogether kings? '
  '9':
  - type: text
    content: Is
  - type: text
    content: ' not Calno as Carchemish? '
  - type: text
    content: is
  - type: text
    content: ' not Hamath as Arpad? '
  - type: text
    content: is
  - type: text
    content: ' not Samaria as Damascus? '
