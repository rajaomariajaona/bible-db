document_id: JOB.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Zophar's Speech
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then answered Zophar the Naamathite, and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he cut off, and shut up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or gather together, then who can hinder him?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he knoweth vain men:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He seeth wickedness also; will he not then consider '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For vain man would be wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Though man be born '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' a wild ass''s colt.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou prepare thine heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And stretch out thine hands toward him;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If iniquity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in thine hand, put it far away,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let not wickedness dwell in thy tabernacles.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For then shalt thou lift up thy face without spot;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, thou shalt be stedfast, and shalt not fear:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because thou shalt forget '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' misery,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' remember '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' as waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' pass away:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thine
    - type: text
      text: ' age shall be clearer than the noonday;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt shine forth, thou shalt be as the morning.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And thou shalt be secure, because there is hope;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, thou shalt dig '
    - type: usfm
      marker: add
      children:
      - type: text
        text: about thee, and
    - type: text
      text: ' thou shalt take thy rest in safety.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Also thou shalt lie down, and none shall make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' afraid;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, many shall make suit unto thee.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should not the multitude of words be answered?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And should a man full of talk be justified?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the eyes of the wicked shall fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they shall not escape,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their hope '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be as
    - type: text
      text: ' the giving up of the ghost.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should thy lies make men hold their peace?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when thou mockest, shall no man make thee ashamed?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thou hast said, My doctrine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' pure,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I am clean in thine eyes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But oh that God would speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And open his lips against thee;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that he would shew thee the secrets of wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' double to that which is!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Know therefore that God exacteth of thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: less
    - type: text
      text: ' than thine iniquity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: deserveth
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Canst thou by searching find out God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Canst thou find out the Almighty unto perfection?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' as high as heaven; what canst thou do?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deeper than hell; what canst thou know?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The measure thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' longer than the earth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And broader than the sea.
