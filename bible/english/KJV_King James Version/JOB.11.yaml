  '3':
  - type: text
    content: Should thy lies make men hold their peace?
  - type: text
    content: And when thou mockest, shall no man make thee ashamed?
  '4':
  - type: text
    content: 'For thou hast said, My doctrine '
  - type: text
    content: is
  - type: text
