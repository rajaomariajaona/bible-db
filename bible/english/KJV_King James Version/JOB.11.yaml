  '2':
  - type: text
    content: Should not the multitude of words be answered?
  - type: text
    content: And should a man full of talk be justified?
  '20':
  - type: text
    content: But the eyes of the wicked shall fail,
  - type: text
    content: And they shall not escape,
  - type: text
    content: 'And their hope '
  - type: text
