document_id: GEN.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when men began to multiply on the face of the earth, and daughters were born unto them, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that the sons of God saw the daughters of men that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fair; and they took them wives of all which they chose. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, My spirit shall not always strive with man, for that he also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' flesh: yet his days shall be an hundred and twenty years. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'There were giants in the earth in those days; and also after that, when the sons of God came in unto the daughters of men, and they bare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: children
  - type: text
    text: ' to them, the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: became
  - type: text
    text: ' mighty men which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of old, men of renown.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' saw that the wickedness of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' great in the earth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every imagination of the thoughts of his heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' only evil continually. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it repented the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that he had made man on the earth, and it grieved him at his heart. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, I will destroy man whom I have created from the face of the earth; both man, and beast, and the creeping thing, and the fowls of the air; for it repenteth me that I have made them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Noah found grace in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the generations of Noah: Noah was a just man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' perfect in his generations, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Noah walked with God. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Noah begat three sons, Shem, Ham, and Japheth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The earth also was corrupt before God, and the earth was filled with violence. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And God looked upon the earth, and, behold, it was corrupt; for all flesh had corrupted his way upon the earth.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Ark
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And God said unto Noah, The end of all flesh is come before me; for the earth is filled with violence through them; and, behold, I will destroy them with the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Make thee an ark of gopher wood; rooms shalt thou make in the ark, and shalt pitch it within and without with pitch. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is the fashion
  - type: text
    text: ' which thou shalt make it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of:'
  - type: text
    text: ' The length of the ark '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' three hundred cubits, the breadth of it fifty cubits, and the height of it thirty cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A window shalt thou make to the ark, and in a cubit shalt thou finish it above; and the door of the ark shalt thou set in the side thereof; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' lower, second, and third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stories
  - type: text
    text: ' shalt thou make it. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And, behold, I, even I, do bring a flood of waters upon the earth, to destroy all flesh, wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the breath of life, from under heaven; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' every thing that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the earth shall die. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But with thee will I establish my covenant; and thou shalt come into the ark, thou, and thy sons, and thy wife, and thy sons'' wives with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And of every living thing of all flesh, two of every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sort
  - type: text
    text: ' shalt thou bring into the ark, to keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' alive with thee; they shall be male and female. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Of fowls after their kind, and of cattle after their kind, of every creeping thing of the earth after his kind, two of every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sort
  - type: text
    text: ' shall come unto thee, to keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' alive. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And take thou unto thee of all food that is eaten, and thou shalt gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to thee; and it shall be for food for thee, and for them. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Thus did Noah; according to all that God commanded him, so did he.
