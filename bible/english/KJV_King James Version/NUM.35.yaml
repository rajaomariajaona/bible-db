    content: 'Speak unto the children of Israel, and say unto them, When ye be come over Jordan into the land of Canaan; '
  '11':
  - type: text
    content: 'then ye shall appoint you cities to be cities of refuge for you; that the slayer may flee thither, which killeth any person at unawares. '
  '12':
  - type: text
    content: 'And they shall be unto you cities for refuge from the avenger; that the manslayer die not, until he stand before the congregation in judgment. '
  '13':
  - type: text
    content: 'And of these cities which ye shall give six cities shall ye have for refuge. '
  '14':
  - type: text
    content: 'Ye shall give three cities on this side Jordan, and three cities shall ye give in the land of Canaan, '
  - type: text
    content: which
  - type: text
    content: ' shall be cities of refuge. '
  '15':
  - type: text
    content: 'These six cities shall be a refuge, '
  - type: text
    content: both
  - type: text
    content: ' for the children of Israel, and for the stranger, and for the sojourner among them: that every one that killeth any person unawares may flee thither.'
