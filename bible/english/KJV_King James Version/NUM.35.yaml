document_id: NUM.35
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cities for Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses in the plains of Moab by Jordan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: near
  - type: text
    text: ' Jericho, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Command the children of Israel, that they give unto the Levites of the inheritance of their possession cities to dwell in; and ye shall give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' unto the Levites suburbs for the cities round about them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the cities shall they have to dwell in; and the suburbs of them shall be for their cattle, and for their goods, and for all their beasts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the suburbs of the cities, which ye shall give unto the Levites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall reach
  - type: text
    text: ' from the wall of the city and outward a thousand cubits round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And ye shall measure from without the city on the east side two thousand cubits, and on the south side two thousand cubits, and on the west side two thousand cubits, and on the north side two thousand cubits; and the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the midst: this shall be to them the suburbs of the cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And among the cities which ye shall give unto the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' six cities for refuge, which ye shall appoint for the manslayer, that he may flee thither: and to them ye shall add forty and two cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: add
    children:
    - type: text
      text: So
  - type: text
    text: ' all the cities which ye shall give to the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' forty and eight cities: them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall ye give
  - type: text
    text: ' with their suburbs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the cities which ye shall give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' of the possession of the children of Israel: from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that have
  - type: text
    text: ' many ye shall give many; but from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that have
  - type: text
    text: ' few ye shall give few: every one shall give of his cities unto the Levites according to his inheritance which he inheriteth.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cities of Refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Speak unto the children of Israel, and say unto them, When ye be come over Jordan into the land of Canaan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'then ye shall appoint you cities to be cities of refuge for you; that the slayer may flee thither, which killeth any person at unawares. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they shall be unto you cities for refuge from the avenger; that the manslayer die not, until he stand before the congregation in judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And of these cities which ye shall give six cities shall ye have for refuge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ye shall give three cities on this side Jordan, and three cities shall ye give in the land of Canaan, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' shall be cities of refuge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'These six cities shall be a refuge, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' for the children of Israel, and for the stranger, and for the sojourner among them: that every one that killeth any person unawares may flee thither.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And if he smite him with an instrument of iron, so that he die, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a murderer: the murderer shall surely be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And if he smite him with throwing a stone, wherewith he may die, and he die, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a murderer: the murderer shall surely be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' he smite him with an hand weapon of wood, wherewith he may die, and he die, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a murderer: the murderer shall surely be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The revenger of blood himself shall slay the murderer: when he meeteth him, he shall slay him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But if he thrust him of hatred, or hurl at him by laying of wait, that he die; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'or in enmity smite him with his hand, that he die: he that smote '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' shall surely be put to death; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a murderer: the revenger of blood shall slay the murderer, when he meeteth him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if he thrust him suddenly without enmity, or have cast upon him any thing without laying of wait, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'or with any stone, wherewith a man may die, seeing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' not, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon him, that he die, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not his enemy, neither sought his harm: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'then the congregation shall judge between the slayer and the revenger of blood according to these judgments: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and the congregation shall deliver the slayer out of the hand of the revenger of blood, and the congregation shall restore him to the city of his refuge, whither he was fled: and he shall abide in it unto the death of the high priest, which was anointed with the holy oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But if the slayer shall at any time come without the border of the city of his refuge, whither he was fled; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and the revenger of blood find him without the borders of the city of his refuge, and the revenger of blood kill the slayer; he shall not be guilty of blood: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'because he should have remained in the city of his refuge until the death of the high priest: but after the death of the high priest the slayer shall return into the land of his possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' shall be for a statute of judgment unto you throughout your generations in all your dwellings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Whoso killeth any person, the murderer shall be put to death by the mouth of witnesses: but one witness shall not testify against any person '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to cause him
  - type: text
    text: ' to die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moreover ye shall take no satisfaction for the life of a murderer, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' guilty of death: but he shall be surely put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And ye shall take no satisfaction for him that is fled to the city of his refuge, that he should come again to dwell in the land, until the death of the priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So ye shall not pollute the land wherein ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'are:'
  - type: text
    text: ' for blood it defileth the land: and the land cannot be cleansed of the blood that is shed therein, but by the blood of him that shed it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Defile not therefore the land which ye shall inhabit, wherein I dwell: for I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' dwell among the children of Israel.'
