  '25':
  - type: text
    content: 'and the congregation shall deliver the slayer out of the hand of the revenger of blood, and the congregation shall restore him to the city of his refuge, whither he was fled: and he shall abide in it unto the death of the high priest, which was anointed with the holy oil. '
  '26':
  - type: text
    content: 'But if the slayer shall at any time come without the border of the city of his refuge, whither he was fled; '
  '27':
  - type: text
    content: 'and the revenger of blood find him without the borders of the city of his refuge, and the revenger of blood kill the slayer; he shall not be guilty of blood: '
  '28':
  - type: text
    content: 'because he should have remained in the city of his refuge until the death of the high priest: but after the death of the high priest the slayer shall return into the land of his possession.'
  '29':
  - type: text
    content: 'So these '
  - type: text
