    content: 'And the cities shall they have to dwell in; and the suburbs of them shall be for their cattle, and for their goods, and for all their beasts. '
  '30':
  - type: text
    content: 'Whoso killeth any person, the murderer shall be put to death by the mouth of witnesses: but one witness shall not testify against any person '
