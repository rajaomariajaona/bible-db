document_id: MIC.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now gather thyself in troops, O daughter of troops: he hath laid siege against us: they shall smite the judge of Israel with a rod upon the cheek.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Little Town of Beth-lehem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But thou, Beth-lehem Ephratah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: though
  - type: text
    text: ' thou be little among the thousands of Judah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' out of thee shall he come forth unto me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' to be ruler in Israel; whose goings forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have been
  - type: text
    text: ' from of old, from everlasting. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore will he give them up, until the time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' she which travaileth hath brought forth: then the remnant of his brethren shall return unto the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he shall stand and feed in the strength of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', in the majesty of the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God; and they shall abide: for now shall he be great unto the ends of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' shall be the peace, when the Assyrian shall come into our land: and when he shall tread in our palaces, then shall we raise against him seven shepherds, and eight principal men. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they shall waste the land of Assyria with the sword, and the land of Nimrod in the entrances thereof: thus shall he deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' from the Assyrian, when he cometh into our land, and when he treadeth within our borders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the remnant of Jacob shall be in the midst of many people as a dew from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as the showers upon the grass, that tarrieth not for man, nor waiteth for the sons of men. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the remnant of Jacob shall be among the Gentiles in the midst of many people as a lion among the beasts of the forest, as a young lion among the flocks of sheep: who, if he go through, both treadeth down, and teareth in pieces, and none can deliver. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Thine hand shall be lifted up upon thine adversaries, and all thine enemies shall be cut off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it shall come to pass in that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I will cut off thy horses out of the midst of thee, and I will destroy thy chariots: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and I will cut off the cities of thy land, and throw down all thy strong holds: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and I will cut off witchcrafts out of thine hand; and thou shalt have no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' soothsayers: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'thy graven images also will I cut off, and thy standing images out of the midst of thee; and thou shalt no more worship the work of thine hands. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And I will pluck up thy groves out of the midst of thee: so will I destroy thy cities. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And I will execute vengeance in anger and fury upon the heathen, such as they have not heard.
