document_id: MIC.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now gather thyself in troops, O daughter of troops: he hath laid siege against us: they shall smite the judge of Israel with a rod upon the cheek.'
  - type: heading
    content: Little Town of Beth-lehem
  '10':
  - type: text
    content: 'And it shall come to pass in that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will cut off thy horses out of the midst of thee, and I will destroy thy chariots: '
  '11':
  - type: text
    content: 'and I will cut off the cities of thy land, and throw down all thy strong holds: '
  '12':
  - type: text
    content: 'and I will cut off witchcrafts out of thine hand; and thou shalt have no '
  - type: text
    content: more
  - type: text
    content: ' soothsayers: '
  '13':
  - type: text
    content: 'thy graven images also will I cut off, and thy standing images out of the midst of thee; and thou shalt no more worship the work of thine hands. '
  '14':
  - type: text
    content: 'And I will pluck up thy groves out of the midst of thee: so will I destroy thy cities. '
  '15':
  - type: text
    content: And I will execute vengeance in anger and fury upon the heathen, such as they have not heard.
  '2':
  - type: text
    content: 'But thou, Beth-lehem Ephratah, '
  - type: text
    content: though
  - type: text
    content: ' thou be little among the thousands of Judah, '
  - type: text
    content: yet
  - type: text
    content: ' out of thee shall he come forth unto me '
  - type: text
    content: that is
  - type: text
    content: ' to be ruler in Israel; whose goings forth '
  - type: text
    content: have been
  - type: text
    content: ' from of old, from everlasting. '
  '3':
  - type: text
    content: 'Therefore will he give them up, until the time '
  - type: text
    content: that
  - type: text
    content: ' she which travaileth hath brought forth: then the remnant of his brethren shall return unto the children of Israel. '
  '4':
  - type: text
    content: 'And he shall stand and feed in the strength of the '
  - type: text
    content: LORD
  - type: text
    content: ', in the majesty of the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God; and they shall abide: for now shall he be great unto the ends of the earth.'
  '5':
  - type: text
    content: 'And this '
  - type: text
    content: man
  - type: text
    content: ' shall be the peace, when the Assyrian shall come into our land: and when he shall tread in our palaces, then shall we raise against him seven shepherds, and eight principal men. '
  '6':
  - type: text
    content: 'And they shall waste the land of Assyria with the sword, and the land of Nimrod in the entrances thereof: thus shall he deliver '
  - type: text
    content: us
  - type: text
    content: ' from the Assyrian, when he cometh into our land, and when he treadeth within our borders.'
  '7':
  - type: text
    content: 'And the remnant of Jacob shall be in the midst of many people as a dew from the '
  - type: text
    content: LORD
  - type: text
    content: ', as the showers upon the grass, that tarrieth not for man, nor waiteth for the sons of men. '
  '8':
  - type: text
    content: 'And the remnant of Jacob shall be among the Gentiles in the midst of many people as a lion among the beasts of the forest, as a young lion among the flocks of sheep: who, if he go through, both treadeth down, and teareth in pieces, and none can deliver. '
  '9':
  - type: text
    content: Thine hand shall be lifted up upon thine adversaries, and all thine enemies shall be cut off.
