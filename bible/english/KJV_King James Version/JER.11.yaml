document_id: JER.11
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Covenant Recalled
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word that came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hear ye the words of this covenant, and speak unto the men of Judah, and to the inhabitants of Jerusalem; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and say thou unto them, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel; Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the man that obeyeth not the words of this covenant, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'which I commanded your fathers in the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I brought them forth out of the land of Egypt, from the iron furnace, saying, Obey my voice, and do them, according to all which I command you: so shall ye be my people, and I will be your God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'that I may perform the oath which I have sworn unto your fathers, to give them a land flowing with milk and honey, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' this day. Then answered I, and said, So be it, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, Proclaim all these words in the cities of Judah, and in the streets of Jerusalem, saying, Hear ye the words of this covenant, and do them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For I earnestly protested unto your fathers in the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I brought them up out of the land of Egypt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto this day, rising early and protesting, saying, Obey my voice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yet they obeyed not, nor inclined their ear, but walked every one in the imagination of their evil heart: therefore I will bring upon them all the words of this covenant, which I commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to do; but they did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, A conspiracy is found among the men of Judah, and among the inhabitants of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They are turned back to the iniquities of their forefathers, which refused to hear my words; and they went after other gods to serve them: the house of Israel and the house of Judah have broken my covenant which I made with their fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Behold, I will bring evil upon them, which they shall not be able to escape; and though they shall cry unto me, I will not hearken unto them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then shall the cities of Judah and inhabitants of Jerusalem go, and cry unto the gods unto whom they offer incense: but they shall not save them at all in the time of their trouble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according to
  - type: text
    text: ' the number of thy cities were thy gods, O Judah; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according to
  - type: text
    text: ' the number of the streets of Jerusalem have ye set up altars to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shameful thing, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' altars to burn incense unto Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore pray not thou for this people, neither lift up a cry or prayer for them: for I will not hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the time that they cry unto me for their trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'What hath my beloved to do in mine house, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: seeing
  - type: text
    text: ' she hath wrought lewdness with many, and the holy flesh is passed from thee? when thou doest evil, then thou rejoicest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' called thy name, A green olive tree, fair, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of goodly fruit: with the noise of a great tumult he hath kindled fire upon it, and the branches of it are broken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, that planted thee, hath pronounced evil against thee, for the evil of the house of Israel and of the house of Judah, which they have done against themselves to provoke me to anger in offering incense unto Baal.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Plot Against the Prophet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath given me knowledge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', and I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' then thou shewedst me their doings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like a lamb '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' an ox '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' is brought to the slaughter; and I knew not that they had devised devices against me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Let us destroy the tree with the fruit thereof, and let us cut him off from the land of the living, that his name may be no more remembered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, that judgest righteously, that triest the reins and the heart, let me see thy vengeance on them: for unto thee have I revealed my cause. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of the men of Anathoth, that seek thy life, saying, Prophesy not in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that thou die not by our hand: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, Behold, I will punish them: the young men shall die by the sword; their sons and their daughters shall die by famine: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and there shall be no remnant of them: for I will bring evil upon the men of Anathoth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the year of their visitation.'
