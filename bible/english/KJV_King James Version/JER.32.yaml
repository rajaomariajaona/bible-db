  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ' in the tenth year of Zedekiah king of Judah, which '
  - type: text
    content: was
  - type: text
    content: ' the eighteenth year of Nebuchadrezzar. '
  '10':
  - type: text
    content: 'And I subscribed the evidence, and sealed '
  - type: text
    content: it
  - type: text
    content: ', and took witnesses, and weighed '
  - type: text
    content: him
  - type: text
    content: ' the money in the balances. '
  '11':
  - type: text
    content: 'So I took the evidence of the purchase, '
  - type: text
    content: both
  - type: text
    content: ' that which was sealed '
  - type: text
    content: according
  - type: text
    content: ' to the law and custom, and that which was open: '
  '12':
  - type: text
    content: 'and I gave the evidence of the purchase unto Baruch the son of Neriah, the son of Maaseiah, in the sight of Hanameel mine uncle''s '
  - type: text
    content: son
  - type: text
    content: ', and in the presence of the witnesses that subscribed the book of the purchase, before all the Jews that sat in the court of the prison. '
  '13':
  - type: text
    content: 'And I charged Baruch before them, saying, '
  '14':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Take these evidences, this evidence of the purchase, both which is sealed, and this evidence which is open; and put them in an earthen vessel, that they may continue many days. '
  '15':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Houses and fields and vineyards shall be possessed again in this land.'
  '16':
  - type: text
    content: 'Now when I had delivered the evidence of the purchase unto Baruch the son of Neriah, I prayed unto the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '17':
  - type: text
    content: 'Ah Lord '
  - type: text
    content: GOD
  - type: text
    content: '! behold, thou hast made the heaven and the earth by thy great power and stretched out arm, '
  - type: text
    content: and
  - type: text
    content: ' there is nothing too hard for thee: '
  '18':
  - type: text
    content: 'thou shewest lovingkindness unto thousands, and recompensest the iniquity of the fathers into the bosom of their children after them: the Great, the Mighty God, the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, '
  - type: text
    content: is
  - type: text
    content: ' his name, '
  '19':
  - type: text
    content: 'great in counsel, and mighty in work: for thine eyes '
  - type: text
    content: are
  - type: text
    content: ' open upon all the ways of the sons of men: to give every one according to his ways, and according to the fruit of his doings: '
  '2':
  - type: text
    content: 'For then the king of Babylon''s army besieged Jerusalem: and Jeremiah the prophet was shut up in the court of the prison, which '
  - type: text
    content: was
  - type: text
    content: ' in the king of Judah''s house. '
  '20':
  - type: text
    content: 'which hast set signs and wonders in the land of Egypt, '
  - type: text
    content: even
  - type: text
    content: ' unto this day, and in Israel, and among '
  - type: text
    content: other
  - type: text
    content: ' men; and hast made thee a name, as at this day; '
  '21':
  - type: text
    content: 'and hast brought forth thy people Israel out of the land of Egypt with signs, and with wonders, and with a strong hand, and with a stretched out arm, and with great terror; '
  '22':
  - type: text
    content: 'and hast given them this land, which thou didst swear to their fathers to give them, a land flowing with milk and honey; '
  '23':
  - type: text
    content: 'and they came in, and possessed it; but they obeyed not thy voice, neither walked in thy law; they have done nothing of all that thou commandedst them to do: therefore thou hast caused all this evil to come upon them: '
  '24':
  - type: text
    content: 'behold the mounts, they are come unto the city to take it; and the city is given into the hand of the Chaldeans, that fight against it, because of the sword, and of the famine, and of the pestilence: and what thou hast spoken is come to pass; and, behold, thou seest '
  - type: text
    content: it
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'And thou hast said unto me, O Lord '
  - type: text
    content: GOD
  - type: text
    content: ', Buy thee the field for money, and take witnesses; for the city is given into the hand of the Chaldeans.'
  '26':
  - type: text
    content: 'Then came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Jeremiah, saying, '
  '27':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of all flesh: is there any thing too hard for me? '
  '28':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I will give this city into the hand of the Chaldeans, and into the hand of Nebuchadrezzar king of Babylon, and he shall take it: '
  '29':
  - type: text
    content: 'and the Chaldeans, that fight against this city, shall come and set fire on this city, and burn it with the houses, upon whose roofs they have offered incense unto Baal, and poured out drink offerings unto other gods, to provoke me to anger. '
  '3':
  - type: text
    content: 'For Zedekiah king of Judah had shut him up, saying, Wherefore dost thou prophesy, and say, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Behold, I will give this city into the hand of the king of Babylon, and he shall take it; '
  '30':
  - type: text
    content: 'For the children of Israel and the children of Judah have only done evil before me from their youth: for the children of Israel have only provoked me to anger with the work of their hands, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'For this city hath been to me '
  - type: text
    content: as
  - type: text
    content: ' a provocation of mine anger and of my fury from the day that they built it even unto this day; that I should remove it from before my face, '
  '32':
  - type: text
    content: 'because of all the evil of the children of Israel and of the children of Judah, which they have done to provoke me to anger, they, their kings, their princes, their priests, and their prophets, and the men of Judah, and the inhabitants of Jerusalem. '
  '33':
  - type: text
    content: 'And they have turned unto me the back, and not the face: though I taught them, rising up early and teaching '
  - type: text
    content: them
  - type: text
    content: ', yet they have not hearkened to receive instruction. '
  '34':
  - type: text
    content: 'But they set their abominations in the house, which is called by my name, to defile it. '
  '35':
  - type: text
    content: 'And they built the high places of Baal, which '
  - type: text
    content: are
  - type: text
    content: ' in the valley of the son of Hinnom, to cause their sons and their daughters to pass through '
  - type: text
    content: the fire
  - type: text
    content: ' unto Molech; which I commanded them not, neither came it into my mind, that they should do this abomination, to cause Judah to sin.'
  '36':
  - type: text
    content: 'And now therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel, concerning this city, whereof ye say, It shall be delivered into the hand of the king of Babylon by the sword, and by the famine, and by the pestilence; '
  '37':
  - type: text
    content: 'behold, I will gather them out of all countries, whither I have driven them in mine anger, and in my fury, and in great wrath; and I will bring them again unto this place, and I will cause them to dwell safely: '
  '38':
  - type: text
    content: 'and they shall be my people, and I will be their God: '
  '39':
  - type: text
    content: 'and I will give them one heart, and one way, that they may fear me for ever, for the good of them, and of their children after them: '
  '4':
  - type: text
    content: 'and Zedekiah king of Judah shall not escape out of the hand of the Chaldeans, but shall surely be delivered into the hand of the king of Babylon, and shall speak with him mouth to mouth, and his eyes shall behold his eyes; '
  '40':
  - type: text
    content: 'and I will make an everlasting covenant with them, that I will not turn away from them, to do them good; but I will put my fear in their hearts, that they shall not depart from me. '
  '41':
  - type: text
    content: 'Yea, I will rejoice over them to do them good, and I will plant them in this land assuredly with my whole heart and with my whole soul. '
  '42':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Like as I have brought all this great evil upon this people, so will I bring upon them all the good that I have promised them. '
  '43':
  - type: text
    content: 'And fields shall be bought in this land, whereof ye say, '
  - type: text
    content: It is
  - type: text
    content: ' desolate without man or beast; it is given into the hand of the Chaldeans. '
  '44':
  - type: text
    content: 'Men shall buy fields for money, and subscribe evidences, and seal '
  - type: text
    content: them
  - type: text
    content: ', and take witnesses in the land of Benjamin, and in the places about Jerusalem, and in the cities of Judah, and in the cities of the mountains, and in the cities of the valley, and in the cities of the south: for I will cause their captivity to return, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '5':
  - type: text
    content: 'and he shall lead Zedekiah to Babylon, and there shall he be until I visit him, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': though ye fight with the Chaldeans, ye shall not prosper.'
  '6':
  - type: text
    content: 'And Jeremiah said, The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '7':
  - type: text
    content: 'Behold, Hanameel the son of Shallum thine uncle shall come unto thee, saying, Buy thee my field that '
  - type: text
    content: is
  - type: text
    content: ' in Anathoth: for the right of redemption '
  - type: text
    content: is
  - type: text
    content: ' thine to buy '
  - type: text
    content: it
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'So Hanameel mine uncle''s son came to me in the court of the prison according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', and said unto me, Buy my field, I pray thee, that '
  - type: text
    content: is
  - type: text
    content: ' in Anathoth, which '
  - type: text
    content: is
  - type: text
    content: ' in the country of Benjamin: for the right of inheritance '
  - type: text
    content: is
  - type: text
    content: ' thine, and the redemption '
  - type: text
    content: is
  - type: text
    content: ' thine; buy '
  - type: text
    content: it
  - type: text
    content: ' for thyself. Then I knew that this '
  - type: text
    content: was
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And I bought the field of Hanameel my uncle''s son, that '
  - type: text
    content: was
  - type: text
    content: ' in Anathoth, and weighed him the money, '
  - type: text
    content: even
  - type: text
