document_id: JER.32,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jeremiah Buys a Field
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word that came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the tenth year of Zedekiah king of Judah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the eighteenth year of Nebuchadrezzar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I subscribed the evidence, and sealed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and took witnesses, and weighed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' the money in the balances. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I took the evidence of the purchase, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' that which was sealed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: according
    - type: text
      text: ' to the law and custom, and that which was open: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I gave the evidence of the purchase unto Baruch the son of Neriah, the son of Maaseiah, in the sight of Hanameel mine uncle''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ', and in the presence of the witnesses that subscribed the book of the purchase, before all the Jews that sat in the court of the prison. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I charged Baruch before them, saying, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Take these evidences, this evidence of the purchase, both which is sealed, and this evidence which is open; and put them in an earthen vessel, that they may continue many days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Houses and fields and vineyards shall be possessed again in this land.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when I had delivered the evidence of the purchase unto Baruch the son of Neriah, I prayed unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ah Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '! behold, thou hast made the heaven and the earth by thy great power and stretched out arm, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' there is nothing too hard for thee: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shewest lovingkindness unto thousands, and recompensest the iniquity of the fathers into the bosom of their children after them: the Great, the Mighty God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'great in counsel, and mighty in work: for thine eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' open upon all the ways of the sons of men: to give every one according to his ways, and according to the fruit of his doings: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For then the king of Babylon''s army besieged Jerusalem: and Jeremiah the prophet was shut up in the court of the prison, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the king of Judah''s house. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which hast set signs and wonders in the land of Egypt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto this day, and in Israel, and among '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' men; and hast made thee a name, as at this day; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and hast brought forth thy people Israel out of the land of Egypt with signs, and with wonders, and with a strong hand, and with a stretched out arm, and with great terror; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and hast given them this land, which thou didst swear to their fathers to give them, a land flowing with milk and honey; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they came in, and possessed it; but they obeyed not thy voice, neither walked in thy law; they have done nothing of all that thou commandedst them to do: therefore thou hast caused all this evil to come upon them: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'behold the mounts, they are come unto the city to take it; and the city is given into the hand of the Chaldeans, that fight against it, because of the sword, and of the famine, and of the pestilence: and what thou hast spoken is come to pass; and, behold, thou seest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou hast said unto me, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', Buy thee the field for money, and take witnesses; for the city is given into the hand of the Chaldeans.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Jeremiah, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the God of all flesh: is there any thing too hard for me? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, I will give this city into the hand of the Chaldeans, and into the hand of Nebuchadrezzar king of Babylon, and he shall take it: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the Chaldeans, that fight against this city, shall come and set fire on this city, and burn it with the houses, upon whose roofs they have offered incense unto Baal, and poured out drink offerings unto other gods, to provoke me to anger. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Zedekiah king of Judah had shut him up, saying, Wherefore dost thou prophesy, and say, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Behold, I will give this city into the hand of the king of Babylon, and he shall take it; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the children of Israel and the children of Judah have only done evil before me from their youth: for the children of Israel have only provoked me to anger with the work of their hands, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this city hath been to me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a provocation of mine anger and of my fury from the day that they built it even unto this day; that I should remove it from before my face, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because of all the evil of the children of Israel and of the children of Judah, which they have done to provoke me to anger, they, their kings, their princes, their priests, and their prophets, and the men of Judah, and the inhabitants of Jerusalem. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they have turned unto me the back, and not the face: though I taught them, rising up early and teaching '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', yet they have not hearkened to receive instruction. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they set their abominations in the house, which is called by my name, to defile it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they built the high places of Baal, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the valley of the son of Hinnom, to cause their sons and their daughters to pass through '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the fire
    - type: text
      text: ' unto Molech; which I commanded them not, neither came it into my mind, that they should do this abomination, to cause Judah to sin.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the God of Israel, concerning this city, whereof ye say, It shall be delivered into the hand of the king of Babylon by the sword, and by the famine, and by the pestilence; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'behold, I will gather them out of all countries, whither I have driven them in mine anger, and in my fury, and in great wrath; and I will bring them again unto this place, and I will cause them to dwell safely: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they shall be my people, and I will be their God: '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will give them one heart, and one way, that they may fear me for ever, for the good of them, and of their children after them: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Zedekiah king of Judah shall not escape out of the hand of the Chaldeans, but shall surely be delivered into the hand of the king of Babylon, and shall speak with him mouth to mouth, and his eyes shall behold his eyes; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will make an everlasting covenant with them, that I will not turn away from them, to do them good; but I will put my fear in their hearts, that they shall not depart from me. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, I will rejoice over them to do them good, and I will plant them in this land assuredly with my whole heart and with my whole soul. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Like as I have brought all this great evil upon this people, so will I bring upon them all the good that I have promised them. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And fields shall be bought in this land, whereof ye say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' desolate without man or beast; it is given into the hand of the Chaldeans. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Men shall buy fields for money, and subscribe evidences, and seal '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and take witnesses in the land of Benjamin, and in the places about Jerusalem, and in the cities of Judah, and in the cities of the mountains, and in the cities of the valley, and in the cities of the south: for I will cause their captivity to return, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall lead Zedekiah to Babylon, and there shall he be until I visit him, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': though ye fight with the Chaldeans, ye shall not prosper.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jeremiah said, The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, Hanameel the son of Shallum thine uncle shall come unto thee, saying, Buy thee my field that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Anathoth: for the right of redemption '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine to buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hanameel mine uncle''s son came to me in the court of the prison according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said unto me, Buy my field, I pray thee, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Anathoth, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the country of Benjamin: for the right of inheritance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine, and the redemption '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine; buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for thyself. Then I knew that this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I bought the field of Hanameel my uncle''s son, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Anathoth, and weighed him the money, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' seventeen shekels of silver. '
