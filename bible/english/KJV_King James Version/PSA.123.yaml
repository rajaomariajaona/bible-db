document_id: PSA.123,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Song of degrees.
  - type: text
    content: Unto thee lift I up mine eyes,
  - type: text
    content: O thou that dwellest in the heavens.
  '2':
  - type: text
    content: Behold, as the eyes of servants
  - type: text
    content: Look
  - type: text
    content: ' unto the hand of their masters, '
  - type: text
    content: and
  - type: text
    content: ' as the eyes of a maiden unto the hand of her mistress;'
  - type: text
    content: 'So our eyes '
  - type: text
    content: wait
  - type: text
    content: ' upon the '
  - type: text
    content: LORD
  - type: text
    content: ' our God,'
  - type: text
    content: Until that he have mercy upon us.
  '3':
  - type: text
    content: 'Have mercy upon us, O '
  - type: text
    content: LORD
  - type: text
    content: ', have mercy upon us:'
  - type: text
    content: For we are exceedingly filled with contempt.
  '4':
  - type: text
    content: Our soul is exceedingly filled with the scorning of those that are at ease,
  - type: text
    content: And
  - type: text
    content: ' with the contempt of the proud.'
