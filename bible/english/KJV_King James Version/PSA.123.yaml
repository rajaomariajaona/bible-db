document_id: PSA.123,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of degrees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unto thee lift I up mine eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O thou that dwellest in the heavens.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, as the eyes of servants
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Look
    - type: text
      text: ' unto the hand of their masters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as the eyes of a maiden unto the hand of her mistress;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So our eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wait
    - type: text
      text: ' upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until that he have mercy upon us.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy upon us, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', have mercy upon us:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For we are exceedingly filled with contempt.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our soul is exceedingly filled with the scorning of those that are at ease,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' with the contempt of the proud.'
