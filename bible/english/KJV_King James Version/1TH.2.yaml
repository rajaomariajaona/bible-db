document_id: 1TH.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Their Ties With the Apostle
  - type: text
    content: 'For yourselves, brethren, know our entrance in unto you, that it was not in vain: '
  '10':
  - type: text
    content: 'Ye '
  - type: text
    content: are
  - type: text
    content: ' witnesses, and God '
  - type: text
    content: also
  - type: text
    content: ', how holily and justly and unblameably we behaved ourselves among you that believe: '
  '11':
  - type: text
    content: 'as ye know how we exhorted and comforted and charged every one of you, as a father '
  - type: text
    content: doth
  - type: text
    content: ' his children, '
  '12':
  - type: text
    content: that ye would walk worthy of God, who hath called you unto his kingdom and glory.
  '13':
  - type: text
    content: 'For this cause also thank we God without ceasing, because, when ye received the word of God which ye heard of us, ye received '
  - type: text
    content: it
  - type: text
    content: ' not '
  - type: text
    content: as
  - type: text
    content: ' the word of men, but as it is in truth, the word of God, which effectually worketh also in you that believe. '
  '14':
  - type: text
    content: 'For ye, brethren, became followers of the churches of God which in Judæa are in Christ Jesus: for ye also have suffered like things of your own countrymen, even as they '
  - type: text
    content: have
  - type: text
    content: ' of the Jews: '
  '15':
  - type: text
    content: 'who both killed the Lord Jesus, and their own prophets, and have persecuted us; and they please not God, and are contrary to all men: '
  '16':
  - type: text
    content: 'forbidding us to speak to the Gentiles that they might be saved, to fill up their sins alway: for the wrath is come upon them to the uttermost.'
  '17':
  - type: text
    content: 'But we, brethren, being taken from you for a short time in presence, not in heart, endeavoured the more abundantly to see your face with great desire. '
  '18':
  - type: text
    content: 'Wherefore we would have come unto you, even I Paul, once and again; but Satan hindered us. '
  '19':
  - type: text
    content: 'For what '
  - type: text
    content: is
  - type: text
    content: ' our hope, or joy, or crown of rejoicing? '
  - type: text
    content: Are
  - type: text
    content: ' not even ye in the presence of our Lord Jesus Christ at his coming? '
  '2':
  - type: text
    content: 'but even after that we had suffered before, and were shamefully entreated, as ye know, at Philippi, we were bold in our God to speak unto you the gospel of God with much contention. '
  '20':
  - type: text
    content: For ye are our glory and joy.
  '3':
  - type: text
    content: 'For our exhortation '
  - type: text
    content: was
  - type: text
    content: ' not of deceit, nor of uncleanness, nor in guile: '
  '4':
  - type: text
    content: 'but as we were allowed of God to be put in trust with the gospel, even so we speak; not as pleasing men, but God, which trieth our hearts. '
  '5':
  - type: text
    content: 'For neither at any time used we flattering words, as ye know, nor a cloke of covetousness; God '
  - type: text
    content: is
  - type: text
    content: ' witness: '
  '6':
  - type: text
    content: 'nor of men sought we glory, neither of you, nor '
  - type: text
    content: yet
  - type: text
    content: ' of others, when we might have been burdensome, as the apostles of Christ. '
  '7':
  - type: text
    content: 'But we were gentle among you, even as a nurse cherisheth her children: '
  '8':
  - type: text
    content: 'so being affectionately desirous of you, we were willing to have imparted unto you, not the gospel of God only, but also our own souls, because ye were dear unto us. '
  '9':
  - type: text
    content: 'For ye remember, brethren, our labour and travail: for labouring night and day, because we would not be chargeable unto any of you, we preached unto you the gospel of God. '
