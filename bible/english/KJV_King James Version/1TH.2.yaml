document_id: 1TH.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Their Ties With the Apostle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For yourselves, brethren, know our entrance in unto you, that it was not in vain: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' witnesses, and God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ', how holily and justly and unblameably we behaved ourselves among you that believe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'as ye know how we exhorted and comforted and charged every one of you, as a father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doth
    - type: text
      text: ' his children, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: that ye would walk worthy of God, who hath called you unto his kingdom and glory.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For this cause also thank we God without ceasing, because, when ye received the word of God which ye heard of us, ye received '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the word of men, but as it is in truth, the word of God, which effectually worketh also in you that believe. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For ye, brethren, became followers of the churches of God which in Judæa are in Christ Jesus: for ye also have suffered like things of your own countrymen, even as they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ' of the Jews: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'who both killed the Lord Jesus, and their own prophets, and have persecuted us; and they please not God, and are contrary to all men: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'forbidding us to speak to the Gentiles that they might be saved, to fill up their sins alway: for the wrath is come upon them to the uttermost.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But we, brethren, being taken from you for a short time in presence, not in heart, endeavoured the more abundantly to see your face with great desire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Wherefore we would have come unto you, even I Paul, once and again; but Satan hindered us. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our hope, or joy, or crown of rejoicing? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' not even ye in the presence of our Lord Jesus Christ at his coming? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'but even after that we had suffered before, and were shamefully entreated, as ye know, at Philippi, we were bold in our God to speak unto you the gospel of God with much contention. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For ye are our glory and joy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For our exhortation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not of deceit, nor of uncleanness, nor in guile: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'but as we were allowed of God to be put in trust with the gospel, even so we speak; not as pleasing men, but God, which trieth our hearts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For neither at any time used we flattering words, as ye know, nor a cloke of covetousness; God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' witness: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'nor of men sought we glory, neither of you, nor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' of others, when we might have been burdensome, as the apostles of Christ. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But we were gentle among you, even as a nurse cherisheth her children: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'so being affectionately desirous of you, we were willing to have imparted unto you, not the gospel of God only, but also our own souls, because ye were dear unto us. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For ye remember, brethren, our labour and travail: for labouring night and day, because we would not be chargeable unto any of you, we preached unto you the gospel of God. '
