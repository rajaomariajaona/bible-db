  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now there were seven brethren: and the first took a wife, and dying left no seed. '
  '21':
  - type: text
    content: 'And the second took her, and died, neither left he any seed: and the third likewise. '
  '22':
  - type: text
    content: 'And the seven had her, and left no seed: last of all the woman died also. '
  '23':
  - type: text
    content: 'In the resurrection therefore, when they shall rise, whose wife shall she be of them? for the seven had her to wife. '
  '24':
  - type: text
