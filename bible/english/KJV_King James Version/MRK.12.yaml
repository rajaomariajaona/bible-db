document_id: MRK.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he began to speak unto them by parables. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' man planted a vineyard, and set an hedge about '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and digged '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a place for
    - type: text
      text: ' the winefat, and built a tower, and let it out to husbandmen, and went into a far country.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And at the season he sent to the husbandmen a servant, that he might receive from the husbandmen of the fruit of the vineyard.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And they caught '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and beat him, and sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away empty.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And again he sent unto them another servant; and at him they cast stones, and wounded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' in the head, and sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away shamefully handled.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And again he sent another; and him they killed, and many others; beating some, and killing some.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Having yet therefore one son, his wellbeloved, he sent him also last unto them, saying, They will reverence my son.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But those husbandmen said among themselves, This is the heir; come, let us kill him, and the inheritance shall be our's.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And they took him, and killed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' out of the vineyard.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What shall therefore the lord of the vineyard do? he will come and destroy the husbandmen, and will give the vineyard unto others.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And have ye not read this scripture;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The stone which the builders rejected
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Is become the head of the corner:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This was the Lord's doing,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And it is marvellous in our eyes?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they sought to lay hold on him, but feared the people: for they knew that he had spoken the parable against them: and they left him, and went their way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they send unto him certain of the Pharisees and of the Herodians, to catch him in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when they were come, they say unto him, Master, we know that thou art true, and carest for no man: for thou regardest not the person of men, but teachest the way of God in truth: Is it lawful to give tribute to Cæsar, or not? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Shall we give, or shall we not give? But he, knowing their hypocrisy, said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Why tempt ye me? bring me a penny, that I may see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. And he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Whose '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this image and superscription?'
  - type: text
    text: ' And they said unto him, Cæsar''s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jesus answering said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Render to Cæsar the things that are Cæsar's, and to God the things that are God's.
  - type: text
    text: ' And they marvelled at him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then come unto him the Sadducees, which say there is no resurrection; and they asked him, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Master, Moses wrote unto us, If a man''s brother die, and leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' wife '
  - type: usfm
    marker: add
    children:
    - type: text
      text: behind him
  - type: text
    text: ', and leave no children, that his brother should take his wife, and raise up seed unto his brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now there were seven brethren: and the first took a wife, and dying left no seed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the second took her, and died, neither left he any seed: and the third likewise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the seven had her, and left no seed: last of all the woman died also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In the resurrection therefore, when they shall rise, whose wife shall she be of them? for the seven had her to wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Jesus answering said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do ye not therefore err, because ye know not the scriptures, neither the power of God?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For when they shall rise from the dead, they neither marry, nor are given in marriage; but are as the angels which are in heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And as touching the dead, that they rise: have ye not read in the book of Moses, how in the bush God spake unto him, saying, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the God of Abraham, and the God of Isaac, and the God of Jacob?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He is not the God of the dead, but the God of the living: ye therefore do greatly err.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And one of the scribes came, and having heard them reasoning together, and perceiving that he had answered them well, asked him, Which is the first commandment of all? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The first of all the commandments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'is '
    - type: text
      text: ', Hear, O Israel; The Lord our God is one Lord:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy mind, and with all thy strength: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the first commandment.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And the second '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ' this, Thou shalt love thy neighbour as thyself. There is none other commandment greater than these.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the scribe said unto him, Well, Master, thou hast said the truth: for there is one God; and there is none other but he: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and to love him with all the heart, and with all the understanding, and with all the soul, and with all the strength, and to love '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' neighbour as himself, is more than all whole burnt offerings and sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And when Jesus saw that he answered discreetly, he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou art not far from the kingdom of God.
  - type: text
    text: ' And no man after that durst ask him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any question
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And Jesus answered and said, while he taught in the temple, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How say the scribes that Christ is the son of David?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For David himself said by the Holy Ghost,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to my Lord,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Sit thou on my right hand,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Till I make thine enemies thy footstool.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'David therefore himself calleth him Lord; and whence is he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' his son?'
  - type: text
    text: ' And the common people heard him gladly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he said unto them in his doctrine, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Beware of the scribes, which love to go in long clothing, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: love
    - type: text
      text: ' salutations in the marketplaces,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and the chief seats in the synagogues, and the uppermost rooms at feasts:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'which devour widows'' houses, and for a pretence make long prayers: these shall receive greater damnation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And Jesus sat over against the treasury, and beheld how the people cast money into the treasury: and many that were rich cast in much. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And there came a certain poor widow, and she threw in two mites, which make a farthing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And he called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' his disciples, and saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Verily I say unto you, That this poor widow hath cast more in, than all they which have cast into the treasury:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' did cast in of their abundance; but she of her want did cast in all that she had, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all her living.'
