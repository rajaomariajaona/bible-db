    content: 'He is not the God of the dead, but the God of the living: ye therefore do greatly err.'
  '28':
  - type: text
    content: 'And one of the scribes came, and having heard them reasoning together, and perceiving that he had answered them well, asked him, Which is the first commandment of all? '
  '29':
  - type: text
