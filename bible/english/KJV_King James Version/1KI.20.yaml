document_id: 1KI.20
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Syria Attacks Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Ben-hadad the king of Syria gathered all his host together: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' thirty and two kings with him, and horses, and chariots: and he went up and besieged Samaria, and warred against it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he sent messengers to Ahab king of Israel into the city, and said unto him, Thus saith Ben-hadad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thy silver and thy gold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine; thy wives also and thy children, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the goodliest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' mine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the king of Israel answered and said, My lord, O king, according to thy saying, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' thine, and all that I have. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the messengers came again, and said, Thus speaketh Ben-hadad, saying, Although I have sent unto thee, saying, Thou shalt deliver me thy silver, and thy gold, and thy wives, and thy children; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'yet I will send my servants unto thee to morrow about this time, and they shall search thine house, and the houses of thy servants; and it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' whatsoever is pleasant in thine eyes, they shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in their hand, and take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the king of Israel called all the elders of the land, and said, Mark, I pray you, and see how this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' seeketh mischief: for he sent unto me for my wives, and for my children, and for my silver, and for my gold; and I denied him not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And all the elders and all the people said unto him, Hearken not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', nor consent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Wherefore he said unto the messengers of Ben-hadad, Tell my lord the king, All that thou didst send for to thy servant at the first I will do: but this thing I may not do. And the messengers departed, and brought him word again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Ben-hadad sent unto him, and said, The gods do so unto me, and more also, if the dust of Samaria shall suffice for handfuls for all the people that follow me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the king of Israel answered and said, Tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', Let not him that girdeth on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his harness
  - type: text
    text: ' boast himself as he that putteth it off. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And it came to pass, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Ben-hadad
  - type: text
    text: ' heard this message, as he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' drinking, he and the kings in the pavilions, that he said unto his servants, Set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yourselves in array
  - type: text
    text: '. And they set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves in array
  - type: text
    text: ' against the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And, behold, there came a prophet unto Ahab king of Israel, saying, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Hast thou seen all this great multitude? behold, I will deliver it into thine hand this day; and thou shalt know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Ahab said, By whom? And he said, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' by the young men of the princes of the provinces. Then he said, Who shall order the battle? And he answered, Thou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then he numbered the young men of the princes of the provinces, and they were two hundred and thirty two: and after them he numbered all the people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the children of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' seven thousand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they went out at noon. But Ben-hadad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' drinking himself drunk in the pavilions, he and the kings, the thirty and two kings that helped him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the young men of the princes of the provinces went out first; and Ben-hadad sent out, and they told him, saying, There are men come out of Samaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he said, Whether they be come out for peace, take them alive; or whether they be come out for war, take them alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So these young men of the princes of the provinces came out of the city, and the army which followed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they slew every one his man: and the Syrians fled; and Israel pursued them: and Ben-hadad the king of Syria escaped on an horse with the horsemen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And the king of Israel went out, and smote the horses and chariots, and slew the Syrians with a great slaughter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the prophet came to the king of Israel, and said unto him, Go, strengthen thyself, and mark, and see what thou doest: for at the return of the year the king of Syria will come up against thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the servants of the king of Syria said unto him, Their gods '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' gods of the hills; therefore they were stronger than we; but let us fight against them in the plain, and surely we shall be stronger than they. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And do this thing, Take the kings away, every man out of his place, and put captains in their rooms: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and number thee an army, like the army that thou hast lost, horse for horse, and chariot for chariot: and we will fight against them in the plain, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' surely we shall be stronger than they. And he hearkened unto their voice, and did so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And it came to pass at the return of the year, that Ben-hadad numbered the Syrians, and went up to Aphek, to fight against Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the children of Israel were numbered, and were all present, and went against them: and the children of Israel pitched before them like two little flocks of kids; but the Syrians filled the country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And there came a man of God, and spake unto the king of Israel, and said, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Because the Syrians have said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God of the hills, but he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not God of the valleys, therefore will I deliver all this great multitude into thine hand, and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And they pitched one over against the other seven days. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' it was, that in the seventh day the battle was joined: and the children of Israel slew of the Syrians an hundred thousand footmen in one day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But the rest fled to Aphek, into the city; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' a wall fell upon twenty and seven thousand of the men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' left. And Ben-hadad fled, and came into the city, into an inner chamber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And his servants said unto him, Behold now, we have heard that the kings of the house of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' merciful kings: let us, I pray thee, put sackcloth on our loins, and ropes upon our heads, and go out to the king of Israel: peradventure he will save thy life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they girded sackcloth on their loins, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: put
  - type: text
    text: ' ropes on their heads, and came to the king of Israel, and said, Thy servant Ben-hadad saith, I pray thee, let me live. And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' he yet alive? he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now the men did diligently observe whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any thing would come
  - type: text
    text: ' from him, and did hastily catch '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' and they said, Thy brother Ben-hadad. Then he said, Go ye, bring him. Then Ben-hadad came forth to him; and he caused him to come up into the chariot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Ben-hadad
  - type: text
    text: ' said unto him, The cities, which my father took from thy father, I will restore; and thou shalt make streets for thee in Damascus, as my father made in Samaria. Then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said Ahab
  - type: text
    text: ', I will send thee away with this covenant. So he made a covenant with him, and sent him away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And a certain man of the sons of the prophets said unto his neighbour in the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Smite me, I pray thee. And the man refused to smite him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then said he unto him, Because thou hast not obeyed the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', behold, as soon as thou art departed from me, a lion shall slay thee. And as soon as he was departed from him, a lion found him, and slew him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then he found another man, and said, Smite me, I pray thee. And the man smote him, so that in smiting he wounded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So the prophet departed, and waited for the king by the way, and disguised himself with ashes upon his face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And as the king passed by, he cried unto the king: and he said, Thy servant went out into the midst of the battle; and, behold, a man turned aside, and brought a man unto me, and said, Keep this man: if by any means he be missing, then shall thy life be for his life, or else thou shalt pay a talent of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And as thy servant was busy here and there, he was gone. And the king of Israel said unto him, So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' thy judgment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: '; thyself hast decided '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And he hasted, and took the ashes away from his face; and the king of Israel discerned him that he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And he said unto him, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Because thou hast let go out of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' hand a man whom I appointed to utter destruction, therefore thy life shall go for his life, and thy people for his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And the king of Israel went to his house heavy and displeased, and came to Samaria.
