document_id: JOS.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Promised Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now after the death of Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' it came to pass, that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Joshua the son of Nun, Moses'' minister, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua commanded the officers of the people, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pass through the host, and command the people, saying, Prepare you victuals; for within three days ye shall pass over this Jordan, to go in to possess the land, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God giveth you to possess it.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to the Reubenites, and to the Gadites, and to half the tribe of Manasseh, spake Joshua, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember the word which Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded you, saying, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God hath given you rest, and hath given you this land. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your wives, your little ones, and your cattle, shall remain in the land which Moses gave you on this side Jordan; but ye shall pass before your brethren armed, all the mighty men of valour, and help them; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have given your brethren rest, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he hath given
    - type: text
      text: ' you, and they also have possessed the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God giveth them: then ye shall return unto the land of your possession, and enjoy it, which Moses the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s servant gave you on this side Jordan toward the sunrising. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered Joshua, saying, All that thou commandest us we will do, and whithersoever thou sendest us, we will go. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'According as we hearkened unto Moses in all things, so will we hearken unto thee: only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God be with thee, as he was with Moses. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whosoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he be
    - type: text
      text: ' that doth rebel against thy commandment, and will not hearken unto thy words in all that thou commandest him, he shall be put to death: only be strong and of a good courage.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses my servant is dead; now therefore arise, go over this Jordan, thou, and all this people, unto the land which I do give to them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the children of Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every place that the sole of your foot shall tread upon, that have I given unto you, as I said unto Moses. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the wilderness and this Lebanon even unto the great river, the river Euphrates, all the land of the Hittites, and unto the great sea toward the going down of the sun, shall be your coast. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall not any man be able to stand before thee all the days of thy life: as I was with Moses, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' I will be with thee: I will not fail thee, nor forsake thee. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong and of a good courage: for unto this people shalt thou divide for an inheritance the land, which I sware unto their fathers to give them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only be thou strong and very courageous, that thou mayest observe to do according to all the law, which Moses my servant commanded thee: turn not from it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the right hand or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the left, that thou mayest prosper whithersoever thou goest. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This book of the law shall not depart out of thy mouth; but thou shalt meditate therein day and night, that thou mayest observe to do according to all that is written therein: for then thou shalt make thy way prosperous, and then thou shalt have good success. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have not I commanded thee? Be strong and of a good courage; be not afraid, neither be thou dismayed: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thee whithersoever thou goest.'
