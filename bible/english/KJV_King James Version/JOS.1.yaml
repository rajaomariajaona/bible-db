verses:
  '1':
  - type: heading
    content: The Promised Land
  - type: text
    content: 'Now after the death of Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' it came to pass, that the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Joshua the son of Nun, Moses'' minister, saying, '
  '10':
  - type: text
    content: 'Then Joshua commanded the officers of the people, saying, '
  '11':
  - type: text
    content: 'Pass through the host, and command the people, saying, Prepare you victuals; for within three days ye shall pass over this Jordan, to go in to possess the land, which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God giveth you to possess it.'
  '12':
  - type: text
    content: 'And to the Reubenites, and to the Gadites, and to half the tribe of Manasseh, spake Joshua, saying, '
  '13':
  - type: text
    content: 'Remember the word which Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded you, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' your God hath given you rest, and hath given you this land. '
  '14':
  - type: text
    content: 'Your wives, your little ones, and your cattle, shall remain in the land which Moses gave you on this side Jordan; but ye shall pass before your brethren armed, all the mighty men of valour, and help them; '
  '15':
  - type: text
    content: 'until the '
  - type: text
    content: LORD
  - type: text
    content: ' have given your brethren rest, as '
  - type: text
    content: he hath given
  - type: text
    content: ' you, and they also have possessed the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God giveth them: then ye shall return unto the land of your possession, and enjoy it, which Moses the '
  - type: text
    content: LORD
  - type: text
    content: '''s servant gave you on this side Jordan toward the sunrising. '
  '16':
  - type: text
    content: 'And they answered Joshua, saying, All that thou commandest us we will do, and whithersoever thou sendest us, we will go. '
  '17':
  - type: text
    content: 'According as we hearkened unto Moses in all things, so will we hearken unto thee: only the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God be with thee, as he was with Moses. '
  '18':
  - type: text
    content: 'Whosoever '
  - type: text
    content: he be
  - type: text
    content: ' that doth rebel against thy commandment, and will not hearken unto thy words in all that thou commandest him, he shall be put to death: only be strong and of a good courage.'
  '2':
  - type: text
    content: 'Moses my servant is dead; now therefore arise, go over this Jordan, thou, and all this people, unto the land which I do give to them, '
  - type: text
    content: even
  - type: text
    content: ' to the children of Israel. '
  '3':
  - type: text
    content: 'Every place that the sole of your foot shall tread upon, that have I given unto you, as I said unto Moses. '
  '4':
  - type: text
    content: 'From the wilderness and this Lebanon even unto the great river, the river Euphrates, all the land of the Hittites, and unto the great sea toward the going down of the sun, shall be your coast. '
  '5':
  - type: text
    content: 'There shall not any man be able to stand before thee all the days of thy life: as I was with Moses, '
  - type: text
    content: so
  - type: text
    content: ' I will be with thee: I will not fail thee, nor forsake thee. '
  '6':
  - type: text
    content: 'Be strong and of a good courage: for unto this people shalt thou divide for an inheritance the land, which I sware unto their fathers to give them. '
  '7':
  - type: text
    content: 'Only be thou strong and very courageous, that thou mayest observe to do according to all the law, which Moses my servant commanded thee: turn not from it '
  - type: text
    content: to
  - type: text
    content: ' the right hand or '
  - type: text
    content: to
  - type: text
    content: ' the left, that thou mayest prosper whithersoever thou goest. '
  '8':
  - type: text
    content: 'This book of the law shall not depart out of thy mouth; but thou shalt meditate therein day and night, that thou mayest observe to do according to all that is written therein: for then thou shalt make thy way prosperous, and then thou shalt have good success. '
  '9':
  - type: text
    content: 'Have not I commanded thee? Be strong and of a good courage; be not afraid, neither be thou dismayed: for the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God '
  - type: text
    content: is
  - type: text
    content: ' with thee whithersoever thou goest.'
