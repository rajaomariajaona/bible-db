document_id: MAT.24,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Destruction of the Temple
  - type: text
    content: 'And Jesus went out, and departed from the temple: and his disciples came to '
  - type: text
    content: him
  - type: text
    content: ' for to shew him the buildings of the temple. '
  '10':
  - type: text
    content: And then shall many be offended, and shall betray one another, and shall hate one another.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And many false prophets shall rise, and shall deceive many.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And because iniquity shall abound, the love of many shall wax cold.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But he that shall endure unto the end, the same shall be saved.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And this gospel of the kingdom shall be preached in all the world for a witness unto all nations; and then shall the end come.
  - type: heading
    content: The Abomination of Desolation
  '15':
  - type: text
    content: ' '
  - type: text
    content: When ye therefore shall see the abomination of desolation, spoken of by Daniel the prophet, stand in the holy place, (whoso readeth, let him understand:)
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'then let them which be in Judæa flee into the mountains:'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'let him which is on the house top not come down to take any thing out of his house:'
  - type: text
    content: ' '
  '18':
  - type: text
    content: neither let him which is in the field return back to take his clothes.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And woe unto them that are with child, and to them that give suck in those days!
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Jesus said unto them, '
  - type: text
    content: See ye not all these things? verily I say unto you, There shall not be left here one stone upon another, that shall not be thrown down.
  '20':
  - type: text
    content: 'But pray ye that your flight be not in the winter, neither on the sabbath day:'
  - type: text
    content: ' '
  '21':
  - type: text
    content: for then shall be great tribulation, such as was not since the beginning of the world to this time, no, nor ever shall be.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And except those days should be shortened, there should no flesh be saved: but for the elect''s sake those days shall be shortened.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Then if any man shall say unto you, Lo, here '
  - type: text
    content: is
  - type: text
    content: ' Christ, or there; believe '
  - type: text
    content: it
  - type: text
    content: ' not.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For there shall arise false Christs, and false prophets, and shall shew great signs and wonders; insomuch that, if '
  - type: text
    content: it were
  - type: text
    content: ' possible, they shall deceive the very elect.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Behold, I have told you before.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Wherefore if they shall say unto you, Behold, he is in the desert; go not forth: behold, '
  - type: text
    content: he is
  - type: text
    content: ' in the secret chambers; believe '
  - type: text
    content: it
  - type: text
    content: ' not.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: For as the lightning cometh out of the east, and shineth even unto the west; so shall also the coming of the Son of man be.
  - type: text
    content: ' '
  '28':
  - type: text
    content: For wheresoever the carcase is, there will the eagles be gathered together.
  - type: heading
    content: The Coming of the Son of Man
  '29':
  - type: text
    content: ' '
  - type: text
    content: 'Immediately after the tribulation of those days shall the sun be darkened, and the moon shall not give her light, and the stars shall fall from heaven, and the powers of the heavens shall be shaken:'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And as he sat upon the mount of Olives, the disciples came unto him privately, saying, Tell us, when shall these things be? and what '
  - type: text
    content: shall be
  - type: text
    content: ' the sign of thy coming, and of the end of the world? '
  '30':
  - type: text
    content: 'and then shall appear the sign of the Son of man in heaven: and then shall all the tribes of the earth mourn, and they shall see the Son of man coming in the clouds of heaven with power and great glory.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: And he shall send his angels with a great sound of a trumpet, and they shall gather together his elect from the four winds, from one end of heaven to the other.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Now learn a parable of the fig tree; When his branch is yet tender, and putteth forth leaves, ye know that summer '
  - type: text
    content: is
  - type: text
    content: ' nigh:'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'so likewise ye, when ye shall see all these things, know that it is near, '
  - type: text
    content: even
  - type: text
    content: ' at the doors.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: Verily I say unto you, This generation shall not pass, till all these things be fulfilled.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Heaven and earth shall pass away, but my words shall not pass away.
  '36':
  - type: text
    content: ' '
  - type: text
    content: 'But of that day and hour knoweth no '
  - type: text
    content: man
  - type: text
    content: ', no, not the angels of heaven, but my Father only.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But as the days of Noe '
  - type: text
    content: were
  - type: text
    content: ', so shall also the coming of the Son of man be.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: For as in the days that were before the flood they were eating and drinking, marrying and giving in marriage, until the day that Noe entered into the ark,
  - type: text
    content: ' '
  '39':
  - type: text
    content: and knew not until the flood came, and took them all away; so shall also the coming of the Son of man be.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And Jesus answered and said unto them, '
  - type: text
    content: Take heed that no man deceive you.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Then shall two be in the field; the one shall be taken, and the other left.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Two '
  - type: text
    content: women shall be
  - type: text
    content: ' grinding at the mill; the one shall be taken, and the other left.'
  - type: heading
    content: Watch therefore
  '42':
  - type: text
    content: ' '
  - type: text
    content: 'Watch therefore: for ye know not what hour your Lord doth come.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: But know this, that if the goodman of the house had known in what watch the thief would come, he would have watched, and would not have suffered his house to be broken up.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Therefore be ye also ready: for in such an hour as ye think not the Son of man cometh.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Who then is a faithful and wise servant, whom his lord hath made ruler over his household, to give them meat in due season?
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' that servant, whom his lord when he cometh shall find so doing.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: Verily I say unto you, That he shall make him ruler over all his goods.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But and if that evil servant shall say in his heart, My lord delayeth his coming;
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'and shall begin to smite '
  - type: text
    content: his
  - type: text
    content: ' fellowservants, and to eat and drink with the drunken;'
  - type: text
    content: ' '
  '5':
  - type: text
    content: For many shall come in my name, saying, I am Christ; and shall deceive many.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'the lord of that servant shall come in a day when he looketh not for '
  - type: text
    content: him
  - type: text
    content: ', and in an hour that he is not aware of,'
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'and shall cut him asunder, and appoint '
  - type: text
    content: him
  - type: text
    content: ' his portion with the hypocrites: there shall be weeping and gnashing of teeth.'
  '6':
  - type: text
    content: 'And ye shall hear of wars and rumours of wars: see that ye be not troubled: for all '
  - type: text
    content: these things
  - type: text
    content: ' must come to pass, but the end is not yet.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For nation shall rise against nation, and kingdom against kingdom: and there shall be famines, and pestilences, and earthquakes, in divers places.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'All these '
  - type: text
    content: are
  - type: text
    content: ' the beginning of sorrows.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Then shall they deliver you up to be afflicted, and shall kill you: and ye shall be hated of all nations for my name''s sake.'
  - type: text
    content: ' '
