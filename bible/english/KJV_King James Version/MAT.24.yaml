document_id: MAT.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Destruction of the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jesus went out, and departed from the temple: and his disciples came to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' for to shew him the buildings of the temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: See ye not all these things? verily I say unto you, There shall not be left here one stone upon another, that shall not be thrown down.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And as he sat upon the mount of Olives, the disciples came unto him privately, saying, Tell us, when shall these things be? and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the sign of thy coming, and of the end of the world? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jesus answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take heed that no man deceive you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For many shall come in my name, saying, I am Christ; and shall deceive many.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And ye shall hear of wars and rumours of wars: see that ye be not troubled: for all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these things
    - type: text
      text: ' must come to pass, but the end is not yet.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For nation shall rise against nation, and kingdom against kingdom: and there shall be famines, and pestilences, and earthquakes, in divers places.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'All these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the beginning of sorrows.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then shall they deliver you up to be afflicted, and shall kill you: and ye shall be hated of all nations for my name''s sake.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And then shall many be offended, and shall betray one another, and shall hate one another.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And many false prophets shall rise, and shall deceive many.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And because iniquity shall abound, the love of many shall wax cold.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he that shall endure unto the end, the same shall be saved.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And this gospel of the kingdom shall be preached in all the world for a witness unto all nations; and then shall the end come.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Abomination of Desolation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When ye therefore shall see the abomination of desolation, spoken of by Daniel the prophet, stand in the holy place, (whoso readeth, let him understand:)
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'then let them which be in Judæa flee into the mountains:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'let him which is on the house top not come down to take any thing out of his house:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: neither let him which is in the field return back to take his clothes.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And woe unto them that are with child, and to them that give suck in those days!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But pray ye that your flight be not in the winter, neither on the sabbath day:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for then shall be great tribulation, such as was not since the beginning of the world to this time, no, nor ever shall be.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And except those days should be shortened, there should no flesh be saved: but for the elect''s sake those days shall be shortened.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then if any man shall say unto you, Lo, here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Christ, or there; believe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For there shall arise false Christs, and false prophets, and shall shew great signs and wonders; insomuch that, if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it were
    - type: text
      text: ' possible, they shall deceive the very elect.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Behold, I have told you before.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Wherefore if they shall say unto you, Behold, he is in the desert; go not forth: behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' in the secret chambers; believe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For as the lightning cometh out of the east, and shineth even unto the west; so shall also the coming of the Son of man be.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For wheresoever the carcase is, there will the eagles be gathered together.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Coming of the Son of Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Immediately after the tribulation of those days shall the sun be darkened, and the moon shall not give her light, and the stars shall fall from heaven, and the powers of the heavens shall be shaken:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and then shall appear the sign of the Son of man in heaven: and then shall all the tribes of the earth mourn, and they shall see the Son of man coming in the clouds of heaven with power and great glory.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he shall send his angels with a great sound of a trumpet, and they shall gather together his elect from the four winds, from one end of heaven to the other.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Now learn a parable of the fig tree; When his branch is yet tender, and putteth forth leaves, ye know that summer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' nigh:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'so likewise ye, when ye shall see all these things, know that it is near, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' at the doors.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, This generation shall not pass, till all these things be fulfilled.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heaven and earth shall pass away, but my words shall not pass away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But of that day and hour knoweth no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', no, not the angels of heaven, but my Father only.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But as the days of Noe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ', so shall also the coming of the Son of man be.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For as in the days that were before the flood they were eating and drinking, marrying and giving in marriage, until the day that Noe entered into the ark,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and knew not until the flood came, and took them all away; so shall also the coming of the Son of man be.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then shall two be in the field; the one shall be taken, and the other left.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: women shall be
    - type: text
      text: ' grinding at the mill; the one shall be taken, and the other left.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Watch therefore
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Watch therefore: for ye know not what hour your Lord doth come.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But know this, that if the goodman of the house had known in what watch the thief would come, he would have watched, and would not have suffered his house to be broken up.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Therefore be ye also ready: for in such an hour as ye think not the Son of man cometh.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who then is a faithful and wise servant, whom his lord hath made ruler over his household, to give them meat in due season?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' that servant, whom his lord when he cometh shall find so doing.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, That he shall make him ruler over all his goods.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But and if that evil servant shall say in his heart, My lord delayeth his coming;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and shall begin to smite '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' fellowservants, and to eat and drink with the drunken;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'the lord of that servant shall come in a day when he looketh not for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and in an hour that he is not aware of,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and shall cut him asunder, and appoint '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' his portion with the hypocrites: there shall be weeping and gnashing of teeth.'
