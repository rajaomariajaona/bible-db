  '1':
  - type: heading
    content: Jerusalem a Fruitless Vine
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '2':
  - type: text
    content: 'Son of man, What is the vine tree more than any tree, '
  - type: text
    content: or than
  - type: text
    content: ' a branch which is among the trees of the forest? '
  '3':
  - type: text
    content: 'Shall wood be taken thereof to do any work? or will '
  - type: text
    content: men
  - type: text
    content: ' take a pin of it to hang any vessel thereon? '
  '4':
  - type: text
    content: 'Behold, it is cast into the fire for fuel; the fire devoureth both the ends of it, and the midst of it is burned. Is it meet for '
  - type: text
    content: any
  - type: text
    content: ' work? '
  '5':
  - type: text
    content: 'Behold, when it was whole, it was meet for no work: how much less shall it be meet yet for '
  - type: text
    content: any
  - type: text
    content: ' work, when the fire hath devoured it, and it is burned? '
  '6':
  - type: text
    content: 'Therefore thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; As the vine tree among the trees of the forest, which I have given to the fire for fuel, so will I give the inhabitants of Jerusalem. '
  '7':
  - type: text
    content: 'And I will set my face against them; they shall go out from '
  - type: text
    content: one
  - type: text
    content: ' fire, and '
  - type: text
    content: another
  - type: text
    content: ' fire shall devour them; and ye shall know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', when I set my face against them. '
  '8':
  - type: text
    content: 'And I will make the land desolate, because they have committed a trespass, saith the Lord '
  - type: text
    content: GOD
