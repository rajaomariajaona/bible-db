document_id: EZK.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem a Fruitless Vine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, What is the vine tree more than any tree, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or than
    - type: text
      text: ' a branch which is among the trees of the forest? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shall wood be taken thereof to do any work? or will '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' take a pin of it to hang any vessel thereon? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, it is cast into the fire for fuel; the fire devoureth both the ends of it, and the midst of it is burned. Is it meet for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' work? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, when it was whole, it was meet for no work: how much less shall it be meet yet for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' work, when the fire hath devoured it, and it is burned? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; As the vine tree among the trees of the forest, which I have given to the fire for fuel, so will I give the inhabitants of Jerusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will set my face against them; they shall go out from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' fire, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' fire shall devour them; and ye shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', when I set my face against them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will make the land desolate, because they have committed a trespass, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
