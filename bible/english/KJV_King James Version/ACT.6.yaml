document_id: ACT.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Appointment of Stephen
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in those days, when the number of the disciples was multiplied, there arose a murmuring of the Grecians against the Hebrews, because their widows were neglected in the daily ministration. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were not able to resist the wisdom and the spirit by which he spake. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they suborned men, which said, We have heard him speak blasphemous words against Moses, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they stirred up the people, and the elders, and the scribes, and came upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and caught him, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to the council, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and set up false witnesses, which said, This man ceaseth not to speak blasphemous words against this holy place, and the law: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for we have heard him say, that this Jesus of Nazareth shall destroy this place, and shall change the customs which Moses delivered us. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all that sat in the council, looking stedfastly on him, saw his face as it had been the face of an angel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the twelve called the multitude of the disciples '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto them
    - type: text
      text: ', and said, It is not reason that we should leave the word of God, and serve tables. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore, brethren, look ye out among you seven men of honest report, full of the Holy Ghost and wisdom, whom we may appoint over this business. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we will give ourselves continually to prayer, and to the ministry of the word. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the saying pleased the whole multitude: and they chose Stephen, a man full of faith and of the Holy Ghost, and Philip, and Prochorus, and Nicanor, and Timon, and Parmenas, and Nicolas a proselyte of Antioch: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whom they set before the apostles: and when they had prayed, they laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hands on them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of God increased; and the number of the disciples multiplied in Jerusalem greatly; and a great company of the priests were obedient to the faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Stephen, full of faith and power, did great wonders and miracles among the people.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then there arose certain of the synagogue, which is called '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the synagogue
    - type: text
      text: ' of the Libertines, and Cyrenians, and Alexandrians, and of them of Cilicia and of Asia, disputing with Stephen. '
