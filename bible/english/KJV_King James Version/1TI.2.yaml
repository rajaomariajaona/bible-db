document_id: 1TI.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'I exhort therefore, that, first of all, supplications, prayers, intercessions, '
  - type: text
    content: and
  - type: text
    content: ' giving of thanks, be made for all men; '
  '10':
  - type: text
    content: but (which becometh women professing godliness) with good works.
  '11':
  - type: text
    content: 'Let the woman learn in silence with all subjection. '
  '12':
  - type: text
    content: 'But I suffer not a woman to teach, nor to usurp authority over the man, but to be in silence. '
  '13':
  - type: text
    content: 'For Adam was first formed, then Eve. '
  '14':
  - type: text
    content: 'And Adam was not deceived, but the woman being deceived was in the transgression. '
  '15':
  - type: text
    content: Notwithstanding she shall be saved in childbearing, if they continue in faith and charity and holiness with sobriety.
  '2':
  - type: text
    content: 'for kings, and '
  - type: text
    content: for
  - type: text
    content: ' all that are in authority; that we may lead a quiet and peaceable life in all godliness and honesty. '
  '3':
  - type: text
    content: 'For this '
  - type: text
    content: is
  - type: text
    content: ' good and acceptable in the sight of God our Saviour; '
  '4':
  - type: text
    content: who will have all men to be saved, and to come unto the knowledge of the truth.
  '5':
  - type: text
    content: 'For '
  - type: text
    content: there is
  - type: text
    content: ' one God, and one mediator between God and men, the man Christ Jesus; '
  '6':
  - type: text
    content: 'who gave himself a ransom for all, to be testified in due time. '
  '7':
  - type: text
    content: 'Whereunto I am ordained a preacher, and an apostle, (I speak the truth in Christ, '
  - type: text
    content: and
  - type: text
    content: ' lie not;) a teacher of the Gentiles in faith and verity.'
  '8':
  - type: text
    content: 'I will therefore that men pray every where, lifting up holy hands, without wrath and doubting. '
  '9':
  - type: text
    content: 'In like manner also, that women adorn themselves in modest apparel, with shamefacedness and sobriety; not with broided hair, or gold, or pearls, or costly array; '
