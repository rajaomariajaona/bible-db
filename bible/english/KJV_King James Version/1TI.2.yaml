document_id: 1TI.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I exhort therefore, that, first of all, supplications, prayers, intercessions, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' giving of thanks, be made for all men; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but (which becometh women professing godliness) with good works.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the woman learn in silence with all subjection. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I suffer not a woman to teach, nor to usurp authority over the man, but to be in silence. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Adam was first formed, then Eve. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Adam was not deceived, but the woman being deceived was in the transgression. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Notwithstanding she shall be saved in childbearing, if they continue in faith and charity and holiness with sobriety.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for kings, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' all that are in authority; that we may lead a quiet and peaceable life in all godliness and honesty. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good and acceptable in the sight of God our Saviour; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who will have all men to be saved, and to come unto the knowledge of the truth.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' one God, and one mediator between God and men, the man Christ Jesus; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who gave himself a ransom for all, to be testified in due time. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whereunto I am ordained a preacher, and an apostle, (I speak the truth in Christ, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' lie not;) a teacher of the Gentiles in faith and verity.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will therefore that men pray every where, lifting up holy hands, without wrath and doubting. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In like manner also, that women adorn themselves in modest apparel, with shamefacedness and sobriety; not with broided hair, or gold, or pearls, or costly array; '
