verses:
  '1':
  - type: heading
    content: Proverbs of Solomon
  - type: text
    content: The proverbs of Solomon.
  - type: text
    content: 'A wise son maketh a glad father:'
  - type: text
    content: 'But a foolish son '
  - type: text
    content: is
  - type: text
    content: ' the heaviness of his mother.'
  '10':
  - type: text
    content: 'He that winketh with the eye causeth sorrow:'
  - type: text
    content: But a prating fool shall fall.
  '11':
  - type: text
    content: 'The mouth of a righteous '
  - type: text
    content: man is
  - type: text
    content: ' a well of life:'
  - type: text
    content: But violence covereth the mouth of the wicked.
  '12':
  - type: text
    content: 'Hatred stirreth up strifes:'
  - type: text
    content: But love covereth all sins.
  '13':
  - type: text
    content: 'In the lips of him that hath understanding wisdom is found:'
  - type: text
    content: 'But a rod '
  - type: text
    content: is
  - type: text
    content: ' for the back of him that is void of understanding.'
  '14':
  - type: text
    content: 'Wise '
  - type: text
    content: men
  - type: text
    content: ' lay up knowledge:'
  - type: text
    content: 'But the mouth of the foolish '
  - type: text
    content: is
  - type: text
    content: ' near destruction.'
  '15':
  - type: text
    content: 'The rich man''s wealth '
  - type: text
    content: is
  - type: text
    content: ' his strong city:'
  - type: text
    content: 'The destruction of the poor '
  - type: text
    content: is
  - type: text
    content: ' their poverty.'
  '16':
  - type: text
    content: 'The labour of the righteous '
  - type: text
    content: tendeth
  - type: text
    content: ' to life:'
  - type: text
    content: The fruit of the wicked to sin.
  '17':
  - type: text
    content: 'He '
  - type: text
    content: is in
  - type: text
    content: ' the way of life that keepeth instruction:'
  - type: text
    content: But he that refuseth reproof erreth.
  '18':
  - type: text
    content: 'He that hideth hatred '
  - type: text
    content: with
  - type: text
    content: ' lying lips,'
  - type: text
    content: 'And he that uttereth a slander, '
  - type: text
    content: is
  - type: text
    content: ' a fool.'
  '19':
  - type: text
    content: 'In the multitude of words there wanteth not sin:'
  - type: text
    content: 'But he that refraineth his lips '
  - type: text
    content: is
  - type: text
    content: ' wise.'
  '2':
  - type: text
    content: 'Treasures of wickedness profit nothing:'
  - type: text
    content: But righteousness delivereth from death.
  '20':
  - type: text
    content: 'The tongue of the just '
  - type: text
    content: is as
  - type: text
    content: ' choice silver:'
  - type: text
    content: 'The heart of the wicked '
  - type: text
    content: is
  - type: text
    content: ' little worth.'
  '21':
  - type: text
    content: 'The lips of the righteous feed many:'
  - type: text
    content: But fools die for want of wisdom.
  '22':
  - type: text
    content: 'The blessing of the '
  - type: text
    content: LORD
  - type: text
    content: ', it maketh rich,'
  - type: text
    content: And he addeth no sorrow with it.
  '23':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' as sport to a fool to do mischief:'
  - type: text
    content: But a man of understanding hath wisdom.
  '24':
  - type: text
    content: 'The fear of the wicked, it shall come upon him:'
  - type: text
    content: But the desire of the righteous shall be granted.
  '25':
  - type: text
    content: 'As the whirlwind passeth, so '
  - type: text
    content: is
  - type: text
    content: ' the wicked no '
  - type: text
    content: 'more:'
  - type: text
    content: 'But the righteous '
  - type: text
    content: is
  - type: text
    content: ' an everlasting foundation.'
  '26':
  - type: text
    content: As vinegar to the teeth, and as smoke to the eyes,
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' the sluggard to them that send him.'
  '27':
  - type: text
    content: 'The fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' prolongeth days:'
  - type: text
    content: But the years of the wicked shall be shortened.
  '28':
  - type: text
    content: 'The hope of the righteous '
  - type: text
    content: shall be
  - type: text
    content: ' gladness:'
  - type: text
    content: But the expectation of the wicked shall perish.
  '29':
  - type: text
    content: 'The way of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' strength to the upright:'
  - type: text
    content: 'But destruction '
  - type: text
    content: shall be
  - type: text
    content: ' to the workers of iniquity.'
  '3':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will not suffer the soul of the righteous to famish:'
  - type: text
    content: But he casteth away the substance of the wicked.
  '30':
  - type: text
    content: 'The righteous shall never be removed:'
  - type: text
    content: But the wicked shall not inhabit the earth.
  '31':
  - type: text
    content: 'The mouth of the just bringeth forth wisdom:'
  - type: text
    content: But the froward tongue shall be cut out.
  '32':
  - type: text
    content: 'The lips of the righteous know what is acceptable:'
  - type: text
    content: 'But the mouth of the wicked '
  - type: text
    content: speaketh
  - type: text
    content: ' frowardness.'
  '4':
  - type: text
    content: 'He becometh poor that dealeth '
  - type: text
    content: with
  - type: text
    content: ' a slack hand:'
  - type: text
    content: But the hand of the diligent maketh rich.
  '5':
  - type: text
    content: 'He that gathereth in summer '
  - type: text
    content: is
  - type: text
    content: ' a wise son:'
  - type: text
    content: But
  - type: text
    content: ' he that sleepeth in harvest '
  - type: text
    content: is
  - type: text
    content: ' a son that causeth shame.'
  '6':
  - type: text
    content: 'Blessings '
  - type: text
    content: are
  - type: text
    content: ' upon the head of the just:'
  - type: text
    content: But violence covereth the mouth of the wicked.
  '7':
  - type: text
    content: 'The memory of the just '
  - type: text
    content: is
  - type: text
    content: ' blessed:'
  - type: text
    content: But the name of the wicked shall rot.
  '8':
  - type: text
    content: 'The wise in heart will receive commandments:'
  - type: text
    content: But a prating fool shall fall.
  '9':
  - type: text
    content: 'He that walketh uprightly walketh surely:'
  - type: text
    content: But he that perverteth his ways shall be known.
