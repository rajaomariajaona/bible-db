document_id: PRO.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proverbs of Solomon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The proverbs of Solomon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A wise son maketh a glad father:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a foolish son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the heaviness of his mother.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He that winketh with the eye causeth sorrow:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a prating fool shall fall.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The mouth of a righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man is
    - type: text
      text: ' a well of life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But violence covereth the mouth of the wicked.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hatred stirreth up strifes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But love covereth all sins.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'In the lips of him that hath understanding wisdom is found:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a rod '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for the back of him that is void of understanding.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' lay up knowledge:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the mouth of the foolish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' near destruction.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The rich man''s wealth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his strong city:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The destruction of the poor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' their poverty.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The labour of the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tendeth
    - type: text
      text: ' to life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The fruit of the wicked to sin.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is in
    - type: text
      text: ' the way of life that keepeth instruction:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that refuseth reproof erreth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He that hideth hatred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' lying lips,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he that uttereth a slander, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fool.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'In the multitude of words there wanteth not sin:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that refraineth his lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wise.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Treasures of wickedness profit nothing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But righteousness delivereth from death.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The tongue of the just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' choice silver:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The heart of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' little worth.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The lips of the righteous feed many:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But fools die for want of wisdom.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The blessing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', it maketh rich,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he addeth no sorrow with it.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' as sport to a fool to do mischief:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a man of understanding hath wisdom.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The fear of the wicked, it shall come upon him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the desire of the righteous shall be granted.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'As the whirlwind passeth, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the wicked no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'more:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an everlasting foundation.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: As vinegar to the teeth, and as smoke to the eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sluggard to them that send him.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' prolongeth days:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the years of the wicked shall be shortened.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The hope of the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' gladness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the expectation of the wicked shall perish.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The way of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' strength to the upright:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But destruction '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' to the workers of iniquity.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will not suffer the soul of the righteous to famish:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he casteth away the substance of the wicked.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The righteous shall never be removed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked shall not inhabit the earth.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The mouth of the just bringeth forth wisdom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the froward tongue shall be cut out.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The lips of the righteous know what is acceptable:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the mouth of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: speaketh
    - type: text
      text: ' frowardness.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He becometh poor that dealeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' a slack hand:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the hand of the diligent maketh rich.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He that gathereth in summer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a wise son:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' he that sleepeth in harvest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a son that causeth shame.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Blessings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon the head of the just:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But violence covereth the mouth of the wicked.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The memory of the just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' blessed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the name of the wicked shall rot.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The wise in heart will receive commandments:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a prating fool shall fall.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He that walketh uprightly walketh surely:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that perverteth his ways shall be known.
