document_id: JHN.16,1
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: These things have I spoken unto you, that ye should not be offended.
  - type: text
    content: ' '
  '10':
  - type: text
    content: of righteousness, because I go to my Father, and ye see me no more;
  - type: text
    content: ' '
  '11':
  - type: text
    content: of judgment, because the prince of this world is judged.
  '12':
  - type: text
    content: ' '
  - type: text
    content: I have yet many things to say unto you, but ye cannot bear them now.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Howbeit when he, the Spirit of truth, is come, he will guide you into all truth: for he shall not speak of himself; but whatsoever he shall hear, '
  - type: text
    content: that
  - type: text
    content: ' shall he speak: and he will shew you things to come.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'He shall glorify me: for he shall receive of mine, and shall shew '
  - type: text
    content: it
  - type: text
    content: ' unto you.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'All things that the Father hath are mine: therefore said I, that he shall take of mine, and shall shew '
  - type: text
    content: it
  - type: text
    content: ' unto you.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'A little while, and ye shall not see me: and again, a little while, and ye shall see me, because I go to the Father.'
  '17':
  - type: text
    content: 'Then said '
  - type: text
    content: some
  - type: text
    content: ' of his disciples among themselves, What is this that he saith unto us, '
  - type: text
    content: 'A little while, and ye shall not see me: and again, a little while, and ye shall see me:'
  - type: text
    content: ' and, '
  - type: text
    content: Because I go to the Father?
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'They said therefore, What is this that he saith, '
  - type: text
    content: A little while?
  - type: text
    content: ' we cannot tell what he saith. '
  '19':
  - type: text
    content: 'Now Jesus knew that they were desirous to ask him, and said unto them, '
  - type: text
    content: 'Do ye enquire among yourselves of that I said, A little while, and ye shall not see me: and again, a little while, and ye shall see me?'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'They shall put you out of the synagogues: yea, the time cometh, that whosoever killeth you will think that he doeth God service.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Verily, verily, I say unto you, That ye shall weep and lament, but the world shall rejoice: and ye shall be sorrowful, but your sorrow shall be turned into joy.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'A woman when she is in travail hath sorrow, because her hour is come: but as soon as she is delivered of the child, she remembereth no more the anguish, for joy that a man is born into the world.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And ye now therefore have sorrow: but I will see you again, and your heart shall rejoice, and your joy no man taketh from you.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And in that day ye shall ask me nothing. Verily, verily, I say unto you, Whatsoever ye shall ask the Father in my name, he will give '
  - type: text
    content: it
  - type: text
    content: ' you.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Hitherto have ye asked nothing in my name: ask, and ye shall receive, that your joy may be full.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: 'These things have I spoken unto you in proverbs: but the time cometh, when I shall no more speak unto you in proverbs, but I shall shew you plainly of the Father.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'At that day ye shall ask in my name: and I say not unto you, that I will pray the Father for you:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: for the Father himself loveth you, because ye have loved me, and have believed that I came out from God.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'I came forth from the Father, and am come into the world: again, I leave the world, and go to the Father.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'His disciples said unto him, Lo, now speakest thou plainly, and speakest no proverb. '
  '3':
  - type: text
    content: And these things will they do unto you, because they have not known the Father, nor me.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Now are we sure that thou knowest all things, and needest not that any man should ask thee: by this we believe that thou camest forth from God. '
  '31':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: Do ye now believe?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Behold, the hour cometh, yea, is now come, that ye shall be scattered, every man to his own, and shall leave me alone: and yet I am not alone, because the Father is with me.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'These things I have spoken unto you, that in me ye might have peace. In the world ye shall have tribulation: but be of good cheer; I have overcome the world.'
  '4':
  - type: text
    content: But these things have I told you, that when the time shall come, ye may remember that I told you of them. And these things I said not unto you at the beginning, because I was with you.
  - type: text
    content: ' '
  '5':
  - type: text
    content: But now I go my way to him that sent me; and none of you asketh me, Whither goest thou?
  - type: text
    content: ' '
  '6':
  - type: text
    content: But because I have said these things unto you, sorrow hath filled your heart.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Nevertheless I tell you the truth; It is expedient for you that I go away: for if I go not away, the Comforter will not come unto you; but if I depart, I will send him unto you.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And when he is come, he will reprove the world of sin, and of righteousness, and of judgment:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: of sin, because they believe not on me;
  - type: text
    content: ' '
