document_id: 2CH.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Queen of Sheba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the queen of Sheba heard of the fame of Solomon, she came to prove Solomon with hard questions at Jerusalem, with a very great company, and camels that bare spices, and gold in abundance, and precious stones: and when she was come to Solomon, she communed with him of all that was in her heart. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the servants also of Huram, and the servants of Solomon, which brought gold from Ophir, brought algum trees and precious stones. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the algum trees terraces to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and to the king''s palace, and harps and psalteries for singers: and there were none such seen before in the land of Judah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Solomon gave to the queen of Sheba all her desire, whatsoever she asked, beside '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which she had brought unto the king. So she turned, and went away to her own land, she and her servants.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Solomon's Wealth
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the weight of gold that came to Solomon in one year was six hundred and threescore and six talents of gold; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'beside '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which
    - type: text
      text: ' chapmen and merchants brought. And all the kings of Arabia and governors of the country brought gold and silver to Solomon.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Solomon made two hundred targets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' beaten gold: six hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of beaten gold went to one target. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And three hundred shields '
    - type: usfm
      marker: add
      children:
      - type: text
        text: made he of
    - type: text
      text: ' beaten gold: three hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of gold went to one shield. And the king put them in the house of the forest of Lebanon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the king made a great throne of ivory, and overlaid it with pure gold. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' six steps to the throne, with a footstool of gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' fastened to the throne, and stays on each side of the sitting place, and two lions standing by the stays: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and twelve lions stood there on the one side and on the other upon the six steps. There was not the like made in any kingdom. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon told her all her questions: and there was nothing hid from Solomon which he told her not. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the drinking vessels of king Solomon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' gold, and all the vessels of the house of the forest of Lebanon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' pure gold: none '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' silver; it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' any thing accounted of in the days of Solomon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the king''s ships went to Tarshish with the servants of Huram: every three years once came the ships of Tarshish bringing gold, and silver, ivory, and apes, and peacocks.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Wisdom
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Solomon passed all the kings of the earth in riches and wisdom. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the kings of the earth sought the presence of Solomon, to hear his wisdom, that God had put in his heart. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought every man his present, vessels of silver, and vessels of gold, and raiment, harness, and spices, horses, and mules, a rate year by year. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon had four thousand stalls for horses and chariots, and twelve thousand horsemen; whom he bestowed in the chariot cities, and with the king at Jerusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he reigned over all the kings from the river even unto the land of the Philistines, and to the border of Egypt. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king made silver in Jerusalem as stones, and cedar trees made he as the sycomore trees that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the low plains in abundance. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they brought unto Solomon horses out of Egypt, and out of all lands.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Solomon, first and last, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of Nathan the prophet, and in the prophecy of Ahijah the Shilonite, and in the visions of Iddo the seer against Jeroboam the son of Nebat? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the queen of Sheba had seen the wisdom of Solomon, and the house that he had built, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon reigned in Jerusalem over all Israel forty years. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon slept with his fathers, and he was buried in the city of David his father: and Rehoboam his son reigned in his stead.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the meat of his table, and the sitting of his servants, and the attendance of his ministers, and their apparel; his cupbearers also, and their apparel; and his ascent by which he went up into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; there was no more spirit in her. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said to the king, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It was
    - type: text
      text: ' a true report which I heard in mine own land of thine acts, and of thy wisdom: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'howbeit I believed not their words, until I came, and mine eyes had seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' and, behold, the one half of the greatness of thy wisdom was not told me: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' thou exceedest the fame that I heard. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy men, and happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these thy servants, which stand continually before thee, and hear thy wisdom. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Blessed be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which delighted in thee to set thee on his throne, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' king for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God: because thy God loved Israel, to establish them for ever, therefore made he thee king over them, to do judgment and justice.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she gave the king an hundred and twenty talents of gold, and of spices great abundance, and precious stones: neither was there any such spice as the queen of Sheba gave king Solomon. '
