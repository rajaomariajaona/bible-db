    content: 'For the king''s ships went to Tarshish with the servants of Huram: every three years once came the ships of Tarshish bringing gold, and silver, ivory, and apes, and peacocks.'
  - type: heading
    content: His Wisdom
  '22':
  - type: text
    content: 'And king Solomon passed all the kings of the earth in riches and wisdom. '
  '23':
  - type: text
    content: 'And all the kings of the earth sought the presence of Solomon, to hear his wisdom, that God had put in his heart. '
  '24':
  - type: text
    content: 'And they brought every man his present, vessels of silver, and vessels of gold, and raiment, harness, and spices, horses, and mules, a rate year by year. '
  '25':
  - type: text
    content: 'And Solomon had four thousand stalls for horses and chariots, and twelve thousand horsemen; whom he bestowed in the chariot cities, and with the king at Jerusalem. '
  '26':
  - type: text
    content: 'And he reigned over all the kings from the river even unto the land of the Philistines, and to the border of Egypt. '
  '27':
  - type: text
    content: 'And the king made silver in Jerusalem as stones, and cedar trees made he as the sycomore trees that '
  - type: text
