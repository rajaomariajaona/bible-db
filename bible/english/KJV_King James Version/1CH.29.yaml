document_id: 1CH.29
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Furthermore David the king said unto all the congregation, Solomon my son, whom alone God hath chosen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is yet
  - type: text
    text: ' young and tender, and the work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great: for the palace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not for man, but for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now I have prepared with all my might for the house of my God the gold for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things to be made
  - type: text
    text: ' of gold, and the silver for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of silver, and the brass for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of brass, the iron for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of iron, and wood for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of wood; onyx stones, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stones
  - type: text
    text: ' to be set, glistering stones, and of divers colours, and all manner of precious stones, and marble stones in abundance. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moreover, because I have set my affection to the house of my God, I have of mine own proper good, of gold and silver, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' I have given to the house of my God, over and above all that I have prepared for the holy house, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' three thousand talents of gold, of the gold of Ophir, and seven thousand talents of refined silver, to overlay the walls of the houses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'withal:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the gold for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of gold, and the silver for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of silver, and for all manner of work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be made
  - type: text
    text: ' by the hands of artificers. And who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' is willing to consecrate his service this day unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the chief of the fathers and princes of the tribes of Israel, and the captains of thousands and of hundreds, with the rulers of the king''s work, offered willingly, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and gave for the service of the house of God of gold five thousand talents and ten thousand drams, and of silver ten thousand talents, and of brass eighteen thousand talents, and one hundred thousand talents of iron. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they with whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: precious
  - type: text
    text: ' stones were found gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to the treasure of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', by the hand of Jehiel the Gershonite. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the people rejoiced, for that they offered willingly, because with perfect heart they offered willingly to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and David the king also rejoiced with great joy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Gives Thanks to God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Wherefore David blessed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' before all the congregation: and David said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thou, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel our father, for ever and ever. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thine, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the greatness, and the power, and the glory, and the victory, and the majesty: for all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' in the heaven and in the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is thine
  - type: text
    text: '; thine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the kingdom, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and thou art exalted as head above all. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Both riches and honour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' of thee, and thou reignest over all; and in thine hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' power and might; and in thine hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' to make great, and to give strength unto all. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now therefore, our God, we thank thee, and praise thy glorious name. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I, and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my people, that we should be able to offer so willingly after this sort? for all things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' of thee, and of thine own have we given thee. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' strangers before thee, and sojourners, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' all our fathers: our days on the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as a shadow, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none abiding. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, all this store that we have prepared to build thee an house for thine holy name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cometh
  - type: text
    text: ' of thine hand, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' all thine own. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I know also, my God, that thou triest the heart, and hast pleasure in uprightness. As for me, in the uprightness of mine heart I have willingly offered all these things: and now have I seen with joy thy people, which are present here, to offer willingly unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Abraham, Isaac, and of Israel, our fathers, keep this for ever in the imagination of the thoughts of the heart of thy people, and prepare their heart unto thee: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and give unto Solomon my son a perfect heart, to keep thy commandments, thy testimonies, and thy statutes, and to do all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these things
  - type: text
    text: ', and to build the palace, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the which I have made provision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And David said to all the congregation, Now bless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God. And all the congregation blessed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of their fathers, and bowed down their heads, and worshipped the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the king. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they sacrificed sacrifices unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and offered burnt offerings unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', on the morrow after that day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a thousand bullocks, a thousand rams, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a thousand lambs, with their drink offerings, and sacrifices in abundance for all Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and did eat and drink before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' on that day with great gladness.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And they made Solomon the son of David king the second time, and anointed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' the chief governor, and Zadok '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' priest. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Solomon sat on the throne of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' as king instead of David his father, and prospered; and all Israel obeyed him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And all the princes, and the mighty men, and all the sons likewise of king David, submitted themselves unto Solomon the king. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' magnified Solomon exceedingly in the sight of all Israel, and bestowed upon him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: such
  - type: text
    text: ' royal majesty as had not been on any king before him in Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Thus David the son of Jesse reigned over all Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the time that he reigned over Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' forty years; seven years reigned he in Hebron, and thirty and three '
  - type: usfm
    marker: add
    children:
    - type: text
      text: years
  - type: text
    text: ' reigned he in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he died in a good old age, full of days, riches, and honour: and Solomon his son reigned in his stead. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now the acts of David the king, first and last, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the book of Samuel the seer, and in the book of Nathan the prophet, and in the book of Gad the seer, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: with all his reign and his might, and the times that went over him, and over Israel, and over all the kingdoms of the countries.
