document_id: JER.36,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Burning of the Scroll
  - type: text
    content: 'And it came to pass in the fourth year of Jehoiakim the son of Josiah king of Judah, '
  - type: text
    content: that
  - type: text
    content: ' this word came unto Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '10':
  - type: text
    content: 'Then read Baruch in the book the words of Jeremiah in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', in the chamber of Gemariah the son of Shaphan the scribe, in the higher court, at the entry of the new gate of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house, in the ears of all the people.'
  '11':
  - type: text
    content: 'When Michaiah the son of Gemariah, the son of Shaphan, had heard out of the book all the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  '12':
  - type: text
    content: 'then he went down into the king''s house, into the scribe''s chamber: and, lo, all the princes sat there, '
  - type: text
    content: even
  - type: text
    content: ' Elishama the scribe, and Delaiah the son of Shemaiah, and Elnathan the son of Achbor, and Gemariah the son of Shaphan, and Zedekiah the son of Hananiah, and all the princes. '
  '13':
  - type: text
    content: 'Then Michaiah declared unto them all the words that he had heard, when Baruch read the book in the ears of the people. '
  '14':
  - type: text
    content: 'Therefore all the princes sent Jehudi the son of Nethaniah, the son of Shelemiah, the son of Cushi, unto Baruch, saying, Take in thine hand the roll wherein thou hast read in the ears of the people, and come. So Baruch the son of Neriah took the roll in his hand, and came unto them. '
  '15':
  - type: text
    content: 'And they said unto him, Sit down now, and read it in our ears. So Baruch read '
  - type: text
    content: it
  - type: text
    content: ' in their ears. '
  '16':
  - type: text
    content: 'Now it came to pass, when they had heard all the words, they were afraid both one and other, and said unto Baruch, We will surely tell the king of all these words. '
  '17':
  - type: text
    content: 'And they asked Baruch, saying, Tell us now, how didst thou write all these words at his mouth? '
  '18':
  - type: text
    content: 'Then Baruch answered them, He pronounced all these words unto me with his mouth, and I wrote '
  - type: text
    content: them
  - type: text
    content: ' with ink in the book. '
  '19':
  - type: text
    content: Then said the princes unto Baruch, Go, hide thee, thou and Jeremiah; and let no man know where ye be.
  '2':
  - type: text
    content: 'Take thee a roll of a book, and write therein all the words that I have spoken unto thee against Israel, and against Judah, and against all the nations, from the day I spake unto thee, from the days of Josiah, even unto this day. '
  '20':
  - type: text
    content: 'And they went in to the king into the court, but they laid up the roll in the chamber of Elishama the scribe, and told all the words in the ears of the king. '
  '21':
  - type: text
    content: 'So the king sent Jehudi to fetch the roll: and he took it out of Elishama the scribe''s chamber. And Jehudi read it in the ears of the king, and in the ears of all the princes which stood beside the king. '
  '22':
  - type: text
    content: 'Now the king sat in the winterhouse in the ninth month: and '
  - type: text
    content: there was a fire
  - type: text
    content: ' on the hearth burning before him. '
  '23':
  - type: text
    content: 'And it came to pass, '
  - type: text
    content: that
  - type: text
    content: ' when Jehudi had read three or four leaves, he cut it with the penknife, and cast '
  - type: text
    content: it
  - type: text
    content: ' into the fire that '
  - type: text
    content: was
  - type: text
    content: ' on the hearth, until all the roll was consumed in the fire that '
  - type: text
    content: was
  - type: text
    content: ' on the hearth. '
  '24':
  - type: text
    content: 'Yet they were not afraid, nor rent their garments, '
  - type: text
    content: neither
  - type: text
    content: ' the king, nor any of his servants that heard all these words. '
  '25':
  - type: text
    content: 'Nevertheless Elnathan and Delaiah and Gemariah had made intercession to the king that he would not burn the roll: but he would not hear them. '
  '26':
  - type: text
    content: 'But the king commanded Jerahmeel the son of Hammelech, and Seraiah the son of Azriel, and Shelemiah the son of Abdeel, to take Baruch the scribe and Jeremiah the prophet: but the '
  - type: text
    content: LORD
  - type: text
    content: ' hid them.'
  '27':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Jeremiah, after that the king had burned the roll, and the words which Baruch wrote at the mouth of Jeremiah, saying, '
  '28':
  - type: text
    content: 'Take thee again another roll, and write in it all the former words that were in the first roll, which Jehoiakim the king of Judah hath burned. '
  '29':
  - type: text
    content: 'And thou shalt say to Jehoiakim king of Judah, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Thou hast burned this roll, saying, Why hast thou written therein, saying, The king of Babylon shall certainly come and destroy this land, and shall cause to cease from thence man and beast? '
  '3':
  - type: text
    content: It may be that the house of Judah will hear all the evil which I purpose to do unto them; that they may return every man from his evil way; that I may forgive their iniquity and their sin.
  '30':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of Jehoiakim king of Judah; He shall have none to sit upon the throne of David: and his dead body shall be cast out in the day to the heat, and in the night to the frost. '
  '31':
  - type: text
    content: And I will punish him and his seed and his servants for their iniquity; and I will bring upon them, and upon the inhabitants of Jerusalem, and upon the men of Judah, all the evil that I have pronounced against them; but they hearkened not.
  '32':
  - type: text
    content: 'Then took Jeremiah another roll, and gave it to Baruch the scribe, the son of Neriah; who wrote therein from the mouth of Jeremiah all the words of the book which Jehoiakim king of Judah had burned in the fire: and there were added besides unto them many like words.'
  '4':
  - type: text
    content: 'Then Jeremiah called Baruch the son of Neriah: and Baruch wrote from the mouth of Jeremiah all the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he had spoken unto him, upon a roll of a book. '
  '5':
  - type: text
    content: 'And Jeremiah commanded Baruch, saying, I '
  - type: text
    content: am
  - type: text
    content: ' shut up; I cannot go into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '6':
  - type: text
    content: 'therefore go thou, and read in the roll, which thou hast written from my mouth, the words of the '
  - type: text
    content: LORD
  - type: text
    content: ' in the ears of the people in the '
  - type: text
    content: LORD
  - type: text
    content: '''s house upon the fasting day: and also thou shalt read them in the ears of all Judah that come out of their cities. '
  '7':
  - type: text
    content: 'It may be they will present their supplication before the '
  - type: text
    content: LORD
  - type: text
    content: ', and will return every one from his evil way: for great '
  - type: text
    content: is
  - type: text
    content: ' the anger and the fury that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath pronounced against this people. '
  '8':
  - type: text
    content: 'And Baruch the son of Neriah did according to all that Jeremiah the prophet commanded him, reading in the book the words of the '
  - type: text
    content: LORD
  - type: text
    content: ' in the '
  - type: text
    content: LORD
  - type: text
    content: '''s house.'
  '9':
  - type: text
    content: 'And it came to pass in the fifth year of Jehoiakim the son of Josiah king of Judah, in the ninth month, '
  - type: text
    content: that
  - type: text
    content: ' they proclaimed a fast before the '
  - type: text
    content: LORD
  - type: text
    content: ' to all the people in Jerusalem, and to all the people that came from the cities of Judah unto Jerusalem. '
