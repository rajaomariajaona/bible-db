  '3':
  - type: text
    content: 'lest I strip her naked, and set her as in the day that she was born, and make her as a wilderness, and set her like a dry land, and slay her with thirst. '
  '4':
  - type: text
    content: 'And I will not have mercy upon her children; for they '
  - type: text
    content: be
  - type: text
    content: ' the children of whoredoms. '
  '5':
  - type: text
    content: 'For their mother hath played the harlot: she that conceived them hath done shamefully: for she said, I will go after my lovers, that give '
  - type: text
    content: me
  - type: text
    content: ' my bread and my water, my wool and my flax, mine oil and my drink. '
  '6':
  - type: text
    content: 'Therefore, behold, I will hedge up thy way with thorns, and make a wall, that she shall not find her paths. '
  '7':
  - type: text
    content: 'And she shall follow after her lovers, but she shall not overtake them; and she shall seek them, but shall not find '
  - type: text
