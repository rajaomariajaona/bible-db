document_id: HOS.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Say ye unto your brethren, Ammi; and to your sisters, Ruhamah.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Israel, a Faithless Wife
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Plead with your mother, plead: for she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not my wife, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I her husband: let her therefore put away her whoredoms out of her sight, and her adulteries from between her breasts; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'lest I strip her naked, and set her as in the day that she was born, and make her as a wilderness, and set her like a dry land, and slay her with thirst. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I will not have mercy upon her children; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the children of whoredoms. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For their mother hath played the harlot: she that conceived them hath done shamefully: for she said, I will go after my lovers, that give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' my bread and my water, my wool and my flax, mine oil and my drink. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore, behold, I will hedge up thy way with thorns, and make a wall, that she shall not find her paths. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And she shall follow after her lovers, but she shall not overtake them; and she shall seek them, but shall not find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' then shall she say, I will go and return to my first husband; for then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was it
  - type: text
    text: ' better with me than now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For she did not know that I gave her corn, and wine, and oil, and multiplied her silver and gold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' they prepared for Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Therefore will I return, and take away my corn in the time thereof, and my wine in the season thereof, and will recover my wool and my flax '
  - type: usfm
    marker: add
    children:
    - type: text
      text: given
  - type: text
    text: ' to cover her nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And now will I discover her lewdness in the sight of her lovers, and none shall deliver her out of mine hand. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will also cause all her mirth to cease, her feast days, her new moons, and her sabbaths, and all her solemn feasts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I will destroy her vines and her fig trees, whereof she hath said, These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my rewards that my lovers have given me: and I will make them a forest, and the beasts of the field shall eat them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I will visit upon her the days of Baalim, wherein she burned incense to them, and she decked herself with her earrings and her jewels, and she went after her lovers, and forgat me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore, behold, I will allure her, and bring her into the wilderness, and speak comfortably unto her. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I will give her her vineyards from thence, and the valley of Achor for a door of hope: and she shall sing there, as in the days of her youth, and as in the day when she came up out of the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it shall be at that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou shalt call me Ishi; and shalt call me no more Baali. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For I will take away the names of Baalim out of her mouth, and they shall no more be remembered by their name. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And in that day will I make a covenant for them with the beasts of the field, and with the fowls of heaven, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' the creeping things of the ground: and I will break the bow and the sword and the battle out of the earth, and will make them to lie down safely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I will betroth thee unto me for ever; yea, I will betroth thee unto me in righteousness, and in judgment, and in lovingkindness, and in mercies. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I will even betroth thee unto me in faithfulness: and thou shalt know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And it shall come to pass in that day, I will hear, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I will hear the heavens, and they shall hear the earth; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and the earth shall hear the corn, and the wine, and the oil; and they shall hear Jezreel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And I will sow her unto me in the earth; and I will have mercy upon her that had not obtained mercy; and I will say to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them which were
  - type: text
    text: ' not my people, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my people; and they shall say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Thou art
  - type: text
    text: ' my God.'
