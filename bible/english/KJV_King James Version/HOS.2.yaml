verses:
  '1':
  - type: text
    content: Say ye unto your brethren, Ammi; and to your sisters, Ruhamah.
  - type: heading
    content: Israel, a Faithless Wife
  '10':
  - type: text
    content: 'And now will I discover her lewdness in the sight of her lovers, and none shall deliver her out of mine hand. '
  '11':
  - type: text
    content: 'I will also cause all her mirth to cease, her feast days, her new moons, and her sabbaths, and all her solemn feasts. '
  '12':
  - type: text
    content: 'And I will destroy her vines and her fig trees, whereof she hath said, These '
  - type: text
    content: are
  - type: text
    content: ' my rewards that my lovers have given me: and I will make them a forest, and the beasts of the field shall eat them. '
  '13':
  - type: text
    content: 'And I will visit upon her the days of Baalim, wherein she burned incense to them, and she decked herself with her earrings and her jewels, and she went after her lovers, and forgat me, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '14':
  - type: text
    content: 'Therefore, behold, I will allure her, and bring her into the wilderness, and speak comfortably unto her. '
  '15':
  - type: text
    content: 'And I will give her her vineyards from thence, and the valley of Achor for a door of hope: and she shall sing there, as in the days of her youth, and as in the day when she came up out of the land of Egypt. '
  '16':
  - type: text
    content: 'And it shall be at that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: that
  - type: text
    content: ' thou shalt call me Ishi; and shalt call me no more Baali. '
  '17':
  - type: text
    content: 'For I will take away the names of Baalim out of her mouth, and they shall no more be remembered by their name. '
  '18':
  - type: text
    content: 'And in that day will I make a covenant for them with the beasts of the field, and with the fowls of heaven, and '
  - type: text
    content: with
  - type: text
    content: ' the creeping things of the ground: and I will break the bow and the sword and the battle out of the earth, and will make them to lie down safely.'
  '19':
  - type: text
    content: 'And I will betroth thee unto me for ever; yea, I will betroth thee unto me in righteousness, and in judgment, and in lovingkindness, and in mercies. '
  '2':
  - type: text
    content: 'Plead with your mother, plead: for she '
  - type: text
    content: is
  - type: text
    content: ' not my wife, neither '
  - type: text
    content: am
  - type: text
    content: ' I her husband: let her therefore put away her whoredoms out of her sight, and her adulteries from between her breasts; '
  '20':
  - type: text
    content: 'I will even betroth thee unto me in faithfulness: and thou shalt know the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And it shall come to pass in that day, I will hear, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', I will hear the heavens, and they shall hear the earth; '
  '22':
  - type: text
    content: 'and the earth shall hear the corn, and the wine, and the oil; and they shall hear Jezreel. '
  '23':
  - type: text
    content: 'And I will sow her unto me in the earth; and I will have mercy upon her that had not obtained mercy; and I will say to '
  - type: text
