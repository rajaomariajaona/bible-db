verses:
  '1':
  - type: heading
    content: Words of Agur
  - type: text
    content: 'The words of Agur the son of Jakeh, '
  - type: text
    content: even
  - type: text
    content: ' the prophecy:'
  - type: text
    content: The man spake unto Ithiel,
  - type: text
    content: even unto Ithiel and Ucal,
  '10':
  - type: text
    content: Accuse not a servant unto his master,
  - type: text
    content: Lest he curse thee, and thou be found guilty.
  '11':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' a generation '
  - type: text
    content: that
  - type: text
    content: ' curseth their father,'
  - type: text
    content: And doth not bless their mother.
  '12':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' a generation '
  - type: text
    content: that are
  - type: text
    content: ' pure in their own eyes,'
  - type: text
    content: 'And '
  - type: text
    content: yet
  - type: text
    content: ' is not washed from their filthiness.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' a generation, O how lofty are their eyes!'
  - type: text
    content: And their eyelids are lifted up.
  '14':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' a generation, whose teeth '
  - type: text
    content: are as
  - type: text
    content: ' swords, and their jaw teeth '
  - type: text
    content: as
  - type: text
    content: ' knives,'
  - type: text
    content: 'To devour the poor from off the earth, and the needy from '
  - type: text
    content: among
  - type: text
    content: ' men.'
  '15':
  - type: text
    content: 'The horseleach hath two daughters, '
  - type: text
    content: crying
  - type: text
    content: ', Give, give.'
  - type: text
    content: 'There are three '
  - type: text
    content: things that
  - type: text
    content: ' are never satisfied,'
  - type: text
    content: Yea
  - type: text
    content: ', four '
  - type: text
    content: things
  - type: text
    content: ' say not,'
  - type: text
    content: It is
  - type: text
    content: ' enough:'
  '16':
  - type: text
    content: The grave; and the barren womb;
  - type: text
    content: 'The earth '
  - type: text
    content: that
  - type: text
    content: ' is not filled with water;'
  - type: text
    content: 'And the fire '
  - type: text
    content: that
  - type: text
    content: ' saith not, '
  - type: text
    content: It is
  - type: text
    content: ' enough.'
  '17':
  - type: text
    content: 'The eye '
  - type: text
    content: that
  - type: text
    content: ' mocketh at '
  - type: text
    content: his
  - type: text
    content: ' father,'
  - type: text
    content: 'And despiseth to obey '
  - type: text
    content: his
  - type: text
    content: ' mother,'
  - type: text
    content: The ravens of the valley shall pick it out,
  - type: text
    content: And the young eagles shall eat it.
  '18':
  - type: text
    content: 'There be three '
  - type: text
    content: things which
  - type: text
    content: ' are too wonderful for me,'
  - type: text
    content: 'Yea, four which I know not:'
  '19':
  - type: text
    content: The way of an eagle in the air;
  - type: text
    content: The way of a serpent upon a rock;
  - type: text
    content: The way of a ship in the midst of the sea;
  - type: text
    content: And the way of a man with a maid.
  '2':
  - type: text
    content: 'Surely I '
  - type: text
    content: am
  - type: text
    content: ' more brutish than '
  - type: text
    content: any
  - type: text
    content: ' man,'
  - type: text
    content: And have not the understanding of a man.
  '20':
  - type: text
    content: 'Such '
  - type: text
    content: is
  - type: text
    content: ' the way of an adulterous woman;'
  - type: text
    content: She eateth, and wipeth her mouth,
  - type: text
    content: And saith, I have done no wickedness.
  '21':
  - type: text
    content: 'For three '
  - type: text
    content: things
  - type: text
    content: ' the earth is disquieted,'
  - type: text
    content: 'And for four '
  - type: text
    content: which
  - type: text
    content: ' it cannot bear:'
  '22':
  - type: text
    content: For a servant when he reigneth;
  - type: text
    content: And a fool when he is filled with meat;
  '23':
  - type: text
    content: 'For an odious '
  - type: text
    content: woman
  - type: text
    content: ' when she is married;'
  - type: text
    content: And an handmaid that is heir to her mistress.
  '24':
  - type: text
    content: 'There be four '
  - type: text
    content: things which are
  - type: text
    content: ' little upon the earth,'
  - type: text
    content: 'But they '
  - type: text
    content: are
  - type: text
    content: ' exceeding wise:'
  '25':
  - type: text
    content: 'The ants '
  - type: text
    content: are
  - type: text
    content: ' a people not strong,'
  - type: text
    content: Yet they prepare their meat in the summer;
  '26':
  - type: text
    content: 'The conies '
  - type: text
    content: are but
  - type: text
    content: ' a feeble folk,'
  - type: text
    content: Yet make they their houses in the rocks;
  '27':
  - type: text
    content: The locusts have no king,
  - type: text
    content: Yet go they forth all of them by bands;
  '28':
  - type: text
    content: The spider taketh hold with her hands,
  - type: text
    content: And is in kings' palaces.
  '29':
  - type: text
    content: 'There be three '
  - type: text
    content: things
  - type: text
    content: ' which go well,'
  - type: text
    content: 'Yea, four are comely in going:'
  '3':
  - type: text
    content: I neither learned wisdom,
  - type: text
    content: Nor have the knowledge of the holy.
  '30':
  - type: text
    content: 'A lion '
  - type: text
    content: which is
  - type: text
    content: ' strongest among beasts,'
  - type: text
    content: And turneth not away for any;
  '31':
  - type: text
    content: An greyhound; an he goat also;
  - type: text
    content: 'And a king, against whom '
  - type: text
    content: there is
  - type: text
    content: ' no rising up.'
  '32':
  - type: text
    content: If thou hast done foolishly in lifting up thyself,
  - type: text
    content: Or if thou hast thought evil,
  - type: text
    content: Lay
  - type: text
    content: ' thine hand upon thy mouth.'
  '33':
  - type: text
    content: Surely the churning of milk bringeth forth butter,
  - type: text
    content: 'And the wringing of the nose bringeth forth blood:'
  - type: text
    content: So the forcing of wrath bringeth forth strife.
  '4':
  - type: text
    content: Who hath ascended up into heaven, or descended?
  - type: text
    content: Who hath gathered the wind in his fists?
  - type: text
    content: Who hath bound the waters in a garment?
  - type: text
    content: Who hath established all the ends of the earth?
  - type: text
    content: 'What '
  - type: text
    content: is
  - type: text
    content: ' his name, and what '
  - type: text
    content: is
  - type: text
    content: ' his son''s name,'
  - type: text
    content: If thou canst tell?
  '5':
  - type: text
    content: 'Every word of God '
  - type: text
    content: is
  - type: text
    content: ' pure:'
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' a shield unto them that put their trust in him.'
  '6':
  - type: text
    content: Add thou not unto his words,
  - type: text
    content: Lest he reprove thee, and thou be found a liar.
  '7':
  - type: text
    content: 'Two '
  - type: text
    content: things
  - type: text
    content: ' have I required of thee;'
  - type: text
    content: 'Deny me '
  - type: text
    content: them
  - type: text
    content: ' not before I die:'
  '8':
  - type: text
    content: 'Remove far from me vanity and lies:'
  - type: text
    content: Give me neither poverty nor riches;
  - type: text
    content: 'Feed me with food convenient for me:'
  '9':
  - type: text
    content: 'Lest I be full, and deny '
  - type: text
    content: thee
  - type: text
    content: ', and say,'
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '?'
  - type: text
    content: Or lest I be poor, and steal,
  - type: text
    content: 'And take the name of my God '
  - type: text
    content: in vain
  - type: text
    content: .
