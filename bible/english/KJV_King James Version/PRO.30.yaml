document_id: PRO.30,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Words of Agur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of Agur the son of Jakeh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the prophecy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The man spake unto Ithiel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even unto Ithiel and Ucal,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accuse not a servant unto his master,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest he curse thee, and thou be found guilty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' a generation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' curseth their father,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And doth not bless their mother.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' a generation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' pure in their own eyes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' is not washed from their filthiness.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' a generation, O how lofty are their eyes!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their eyelids are lifted up.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' a generation, whose teeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are as
    - type: text
      text: ' swords, and their jaw teeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' knives,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To devour the poor from off the earth, and the needy from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: among
    - type: text
      text: ' men.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The horseleach hath two daughters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: crying
    - type: text
      text: ', Give, give.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'There are three '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things that
    - type: text
      text: ' are never satisfied,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yea
    - type: text
      text: ', four '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' say not,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' enough:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grave; and the barren womb;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' is not filled with water;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the fire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' saith not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' enough.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The eye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' mocketh at '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' father,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And despiseth to obey '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mother,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ravens of the valley shall pick it out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the young eagles shall eat it.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There be three '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things which
    - type: text
      text: ' are too wonderful for me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, four which I know not:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way of an eagle in the air;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The way of a serpent upon a rock;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way of a ship in the midst of the sea;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the way of a man with a maid.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' more brutish than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have not the understanding of a man.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the way of an adulterous woman;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She eateth, and wipeth her mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And saith, I have done no wickedness.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For three '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' the earth is disquieted,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And for four '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' it cannot bear:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a servant when he reigneth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a fool when he is filled with meat;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For an odious '
    - type: usfm
      marker: add
      children:
      - type: text
        text: woman
    - type: text
      text: ' when she is married;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And an handmaid that is heir to her mistress.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There be four '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things which are
    - type: text
      text: ' little upon the earth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' exceeding wise:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The ants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a people not strong,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet they prepare their meat in the summer;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The conies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are but
    - type: text
      text: ' a feeble folk,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet make they their houses in the rocks;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The locusts have no king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet go they forth all of them by bands;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The spider taketh hold with her hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And is in kings' palaces.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There be three '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' which go well,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, four are comely in going:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I neither learned wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor have the knowledge of the holy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A lion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' strongest among beasts,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And turneth not away for any;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An greyhound; an he goat also;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a king, against whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no rising up.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou hast done foolishly in lifting up thyself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or if thou hast thought evil,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Lay
    - type: text
      text: ' thine hand upon thy mouth.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely the churning of milk bringeth forth butter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the wringing of the nose bringeth forth blood:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So the forcing of wrath bringeth forth strife.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who hath ascended up into heaven, or descended?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who hath gathered the wind in his fists?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who hath bound the waters in a garment?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who hath established all the ends of the earth?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name, and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his son''s name,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If thou canst tell?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every word of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' pure:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a shield unto them that put their trust in him.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Add thou not unto his words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest he reprove thee, and thou be found a liar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' have I required of thee;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Deny me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not before I die:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remove far from me vanity and lies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give me neither poverty nor riches;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Feed me with food convenient for me:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lest I be full, and deny '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ', and say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or lest I be poor, and steal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And take the name of my God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in vain
    - type: text
      text: .
