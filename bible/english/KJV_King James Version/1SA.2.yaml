document_id: 1SA.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And Hannah prayed, and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My heart rejoiceth in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mine horn is exalted in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My mouth is enlarged over mine enemies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I rejoice in thy salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' none holy as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none beside thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' any rock like our God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Talk no more so exceeding proudly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' arrogancy come out of your mouth:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a God of knowledge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by him actions are weighed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The bows of the mighty men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' broken,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they that stumbled are girded with strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: They that were
  - type: text
    text: ' full have hired out themselves for bread;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they that were
  - type: text
    text: ' hungry ceased:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that the barren hath born seven;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And she that hath many children is waxed feeble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' killeth, and maketh alive:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He bringeth down to the grave, and bringeth up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' maketh poor, and maketh rich:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He bringeth low, and lifteth up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He raiseth up the poor out of the dust,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' lifteth up the beggar from the dunghill,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' among princes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And to make them inherit the throne of glory:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the pillars of the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he hath set the world upon them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He will keep the feet of his saints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the wicked shall be silent in darkness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For by strength shall no man prevail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The adversaries of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be broken to pieces;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Out of heaven shall he thunder upon them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall judge the ends of the earth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he shall give strength unto his king,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And exalt the horn of his anointed.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Elkanah went to Ramah to his house. And the child did minister unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' before Eli the priest.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Sons of Eli
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now the sons of Eli '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' sons of Belial; they knew not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the priests'' custom with the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was, that
  - type: text
    text: ', when any man offered sacrifice, the priest''s servant came, while the flesh was in seething, with a fleshhook of three teeth in his hand; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and he struck '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the pan, or kettle, or caldron, or pot; all that the fleshhook brought up the priest took for himself. So they did in Shiloh unto all the Israelites that came thither. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Also before they burnt the fat, the priest''s servant came, and said to the man that sacrificed, Give flesh to roast for the priest; for he will not have sodden flesh of thee, but raw. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' any man said unto him, Let them not fail to burn the fat presently, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as much
  - type: text
    text: ' as thy soul desireth; then he would answer him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Nay
  - type: text
    text: '; but thou shalt give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it me
  - type: text
    text: ' now: and if not, I will take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' by force. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Wherefore the sin of the young men was very great before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for men abhorred the offering of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Samuel and Eli
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But Samuel ministered before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' a child, girded with a linen ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moreover his mother made him a little coat, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to him from year to year, when she came up with her husband to offer the yearly sacrifice. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Eli blessed Elkanah and his wife, and said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' give thee seed of this woman for the loan which is lent to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. And they went unto their own home. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' visited Hannah, so that she conceived, and bare three sons and two daughters. And the child Samuel grew before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now Eli was very old, and heard all that his sons did unto all Israel; and how they lay with the women that assembled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he said unto them, Why do ye such things? for I hear of your evil dealings by all this people. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nay, my sons; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' no good report that I hear: ye make the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s people to transgress. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'If one man sin against another, the judge shall judge him: but if a man sin against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who shall intreat for him? Notwithstanding they hearkened not unto the voice of their father, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' would slay them. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the child Samuel grew on, and was in favour both with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and also with men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And there came a man of God unto Eli, and said unto him, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Did I plainly appear unto the house of thy father, when they were in Egypt in Pharaoh''s house? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And did I choose him out of all the tribes of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' my priest, to offer upon mine altar, to burn incense, to wear an ephod before me? and did I give unto the house of thy father all the offerings made by fire of the children of Israel? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Wherefore kick ye at my sacrifice and at mine offering, which I have commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in my
  - type: text
    text: ' habitation; and honourest thy sons above me, to make yourselves fat with the chiefest of all the offerings of Israel my people? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Wherefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel saith, I said indeed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thy house, and the house of thy father, should walk before me for ever: but now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saith, Be it far from me; for them that honour me I will honour, and they that despise me shall be lightly esteemed. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Behold, the days come, that I will cut off thine arm, and the arm of thy father''s house, that there shall not be an old man in thine house. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And thou shalt see an enemy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in my
  - type: text
    text: ' habitation, in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the wealth
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' shall give Israel: and there shall not be an old man in thine house for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the man of thine, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whom
  - type: text
    text: ' I shall not cut off from mine altar, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' to consume thine eyes, and to grieve thine heart: and all the increase of thine house shall die in the flower of their age. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a sign unto thee, that shall come upon thy two sons, on Hophni and Phinehas; in one day they shall die both of them. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And I will raise me up a faithful priest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall do according to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in mine heart and in my mind: and I will build him a sure house; and he shall walk before mine anointed for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every one that is left in thine house shall come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' crouch to him for a piece of silver and a morsel of bread, and shall say, Put me, I pray thee, into one of the priests'' offices, that I may eat a piece of bread.'
