document_id: 1TI.3,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' a true saying, If a man desire the office of a bishop, he desireth a good work. '
  '10':
  - type: text
    content: 'And let these also first be proved; then let them use the office of a deacon, being '
  - type: text
    content: found
  - type: text
    content: ' blameless. '
  '11':
  - type: text
    content: 'Even so '
  - type: text
    content: must their
  - type: text
    content: ' wives '
  - type: text
    content: be
  - type: text
    content: ' grave, not slanderers, sober, faithful in all things. '
  '12':
  - type: text
    content: 'Let the deacons be the husbands of one wife, ruling their children and their own houses well. '
  '13':
  - type: text
    content: For they that have used the office of a deacon well purchase to themselves a good degree, and great boldness in the faith which is in Christ Jesus.
  '14':
  - type: text
    content: 'These things write I unto thee, hoping to come unto thee shortly: '
  '15':
  - type: text
    content: 'But if I tarry long, that thou mayest know how thou oughtest to behave thyself in the house of God, which is the church of the living God, the pillar and ground of the truth. '
  '16':
  - type: text
    content: 'And without controversy great is the mystery of godliness: God was manifest in the flesh, justified in the Spirit, seen of angels, preached unto the Gentiles, believed on in the world, received up into glory.'
  '2':
  - type: text
    content: 'A bishop then must be blameless, the husband of one wife, vigilant, sober, of good behaviour, given to hospitality, apt to teach; '
  '3':
  - type: text
    content: 'not given to wine, no striker, not greedy of filthy lucre; but patient, not a brawler, not covetous; '
  '4':
  - type: text
    content: 'one that ruleth well his own house, having his children in subjection with all gravity; '
  '5':
  - type: text
    content: '(for if a man know not how to rule his own house, how shall he take care of the church of God?) '
  '6':
  - type: text
    content: 'Not a novice, lest being lifted up with pride he fall into the condemnation of the devil. '
  '7':
  - type: text
    content: 'Moreover he must have a good report of them which are without; lest he fall into reproach and the snare of the devil. '
  '8':
  - type: text
    content: 'Likewise '
  - type: text
    content: must
  - type: text
    content: ' the deacons '
  - type: text
    content: be
  - type: text
    content: ' grave, not doubletongued, not given to much wine, not greedy of filthy lucre; '
  '9':
  - type: text
    content: 'holding the mystery of the faith in a pure conscience. '
