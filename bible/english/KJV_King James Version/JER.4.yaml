  - type: text
    content: 'How long shall I see the standard, '
  - type: text
    content: and
  - type: text
    content: ' hear the sound of the trumpet? '
  '22':
  - type: text
    content: 'For my people '
  - type: text
    content: is
  - type: text
    content: ' foolish, they have not known me; they '
  - type: text
    content: are
  - type: text
    content: ' sottish children, and they have none understanding: they '
  - type: text
    content: are
  - type: text
