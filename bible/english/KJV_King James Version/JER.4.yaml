  '5':
  - type: text
    content: 'Declare ye in Judah, and publish in Jerusalem; and say, Blow ye the trumpet in the land: cry, gather together, and say, Assemble yourselves, and let us go into the defenced cities. '
  '6':
  - type: text
    content: 'Set up the standard toward Zion: retire, stay not: for I will bring evil from the north, and a great destruction. '
  '7':
  - type: text
    content: 'The lion is come up from his thicket, and the destroyer of the Gentiles is on his way; he is gone forth from his place to make thy land desolate; '
  - type: text
    content: and
  - type: text
    content: ' thy cities shall be laid waste, without an inhabitant. '
  '8':
  - type: text
    content: 'For this gird you with sackcloth, lament and howl: for the fierce anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' is not turned back from us.'
  '9':
  - type: text
    content: 'And it shall come to pass at that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
