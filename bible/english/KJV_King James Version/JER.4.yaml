document_id: JER.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'If thou wilt return, O Israel, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', return unto me: and if thou wilt put away thine abominations out of my sight, then shalt thou not remove. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And thou shalt swear, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, in truth, in judgment, and in righteousness; and the nations shall bless themselves in him, and in him shall they glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to the men of Judah and Jerusalem, Break up your fallow ground, and sow not among thorns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Circumcise yourselves to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and take away the foreskins of your heart, ye men of Judah and inhabitants of Jerusalem: lest my fury come forth like fire, and burn that none can quench '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', because of the evil of your doings.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Coming Judgement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Declare ye in Judah, and publish in Jerusalem; and say, Blow ye the trumpet in the land: cry, gather together, and say, Assemble yourselves, and let us go into the defenced cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Set up the standard toward Zion: retire, stay not: for I will bring evil from the north, and a great destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The lion is come up from his thicket, and the destroyer of the Gentiles is on his way; he is gone forth from his place to make thy land desolate; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thy cities shall be laid waste, without an inhabitant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For this gird you with sackcloth, lament and howl: for the fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' is not turned back from us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it shall come to pass at that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the heart of the king shall perish, and the heart of the princes; and the priests shall be astonished, and the prophets shall wonder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then said I, Ah, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '! surely thou hast greatly deceived this people and Jerusalem, saying, Ye shall have peace; whereas the sword reacheth unto the soul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At that time shall it be said to this people and to Jerusalem, A dry wind of the high places in the wilderness toward the daughter of my people, not to fan, nor to cleanse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a full wind from those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' shall come unto me: now also will I give sentence against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Behold, he shall come up as clouds, and his chariots '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' as a whirlwind: his horses are swifter than eagles. Woe unto us! for we are spoiled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'O Jerusalem, wash thine heart from wickedness, that thou mayest be saved. How long shall thy vain thoughts lodge within thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For a voice declareth from Dan, and publisheth affliction from mount Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Make ye mention to the nations; behold, publish against Jerusalem, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' watchers come from a far country, and give out their voice against the cities of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'As keepers of a field, are they against her round about; because she hath been rebellious against me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Thy way and thy doings have procured these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' unto thee; this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy wickedness, because it is bitter, because it reacheth unto thine heart.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Prophet's Grief
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My bowels, my bowels! I am pained at my very heart; my heart maketh a noise in me; I cannot hold my peace, because thou hast heard, O my soul, the sound of the trumpet, the alarm of war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Destruction upon destruction is cried; for the whole land is spoiled: suddenly are my tents spoiled, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' my curtains in a moment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'How long shall I see the standard, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hear the sound of the trumpet? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For my people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' foolish, they have not known me; they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' sottish children, and they have none understanding: they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' wise to do evil, but to do good they have no knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I beheld the earth, and, lo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' without form, and void; and the heavens, and they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' no light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I beheld the mountains, and, lo, they trembled, and all the hills moved lightly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I beheld, and, lo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no man, and all the birds of the heavens were fled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I beheld, and, lo, the fruitful place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a wilderness, and all the cities thereof were broken down at the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' by his fierce anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For thus hath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, The whole land shall be desolate; yet will I not make a full end. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For this shall the earth mourn, and the heavens above be black: because I have spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', I have purposed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and will not repent, neither will I turn back from it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The whole city shall flee for the noise of the horsemen and bowmen; they shall go into thickets, and climb up upon the rocks: every city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' forsaken, and not a man dwell therein. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' spoiled, what wilt thou do? Though thou clothest thyself with crimson, though thou deckest thee with ornaments of gold, though thou rentest thy face with painting, in vain shalt thou make thyself fair; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' lovers will despise thee, they will seek thy life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For I have heard a voice as of a woman in travail, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the anguish as of her that bringeth forth her first child, the voice of the daughter of Zion, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' bewaileth herself, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' spreadeth her hands, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Woe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' me now! for my soul is wearied because of murderers.'
