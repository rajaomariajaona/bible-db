document_id: JER.37,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The King's Appeal
  - type: text
    content: 'And king Zedekiah the son of Josiah reigned instead of Coniah the son of Jehoiakim, whom Nebuchadrezzar king of Babylon made king in the land of Judah. '
  '10':
  - type: text
    content: 'For though ye had smitten the whole army of the Chaldeans that fight against you, and there remained '
  - type: text
    content: but
  - type: text
    content: ' wounded men among them, '
  - type: text
    content: yet
  - type: text
    content: ' should they rise up every man in his tent, and burn this city with fire.'
  - type: heading
    content: Jeremiah Imprisoned
  '11':
  - type: text
    content: 'And it came to pass, that when the army of the Chaldeans was broken up from Jerusalem for fear of Pharaoh''s army, '
  '12':
  - type: text
    content: 'then Jeremiah went forth out of Jerusalem to go into the land of Benjamin, to separate himself thence in the midst of the people. '
  '13':
  - type: text
    content: 'And when he was in the gate of Benjamin, a captain of the ward '
  - type: text
    content: was
  - type: text
    content: ' there, whose name '
  - type: text
    content: was
  - type: text
    content: ' Irijah, the son of Shelemiah, the son of Hananiah; and he took Jeremiah the prophet, saying, Thou fallest away to the Chaldeans. '
  '14':
  - type: text
    content: 'Then said Jeremiah, '
  - type: text
    content: It is
  - type: text
    content: ' false; I fall not away to the Chaldeans. But he hearkened not to him: so Irijah took Jeremiah, and brought him to the princes. '
  '15':
  - type: text
    content: 'Wherefore the princes were wroth with Jeremiah, and smote him, and put him in prison in the house of Jonathan the scribe: for they had made that the prison.'
  '16':
  - type: text
    content: 'When Jeremiah was entered into the dungeon, and into the cabins, and Jeremiah had remained there many days; '
  '17':
  - type: text
    content: 'then Zedekiah the king sent, and took him out: and the king asked him secretly in his house, and said, Is there '
  - type: text
    content: any
  - type: text
    content: ' word from the '
  - type: text
    content: LORD
  - type: text
    content: '? And Jeremiah said, There is: for, said he, thou shalt be delivered into the hand of the king of Babylon. '
  '18':
  - type: text
    content: 'Moreover Jeremiah said unto king Zedekiah, What have I offended against thee, or against thy servants, or against this people, that ye have put me in prison? '
  '19':
  - type: text
    content: 'Where '
  - type: text
    content: are
  - type: text
    content: ' now your prophets which prophesied unto you, saying, The king of Babylon shall not come against you, nor against this land? '
  '2':
  - type: text
    content: 'But neither he, nor his servants, nor the people of the land, did hearken unto the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he spake by the prophet Jeremiah.'
  '20':
  - type: text
    content: 'Therefore hear now, I pray thee, O my lord the king: let my supplication, I pray thee, be accepted before thee; that thou cause me not to return to the house of Jonathan the scribe, lest I die there.'
  '21':
  - type: text
    content: Then Zedekiah the king commanded that they should commit Jeremiah into the court of the prison, and that they should give him daily a piece of bread out of the bakers' street, until all the bread in the city were spent. Thus Jeremiah remained in the court of the prison.
  '3':
  - type: text
    content: 'And Zedekiah the king sent Jehucal the son of Shelemiah and Zephaniah the son of Maaseiah the priest to the prophet Jeremiah, saying, Pray now unto the '
  - type: text
    content: LORD
  - type: text
    content: ' our God for us. '
  '4':
  - type: text
    content: 'Now Jeremiah came in and went out among the people: for they had not put him into prison. '
  '5':
  - type: text
    content: 'Then Pharaoh''s army was come forth out of Egypt: and when the Chaldeans that besieged Jerusalem heard tidings of them, they departed from Jerusalem.'
  '6':
  - type: text
    content: 'Then came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto the prophet Jeremiah, saying, '
  '7':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel; Thus shall ye say to the king of Judah, that sent you unto me to enquire of me; Behold, Pharaoh''s army, which is come forth to help you, shall return to Egypt into their own land. '
  '8':
  - type: text
    content: 'And the Chaldeans shall come again, and fight against this city, and take it, and burn it with fire. '
  '9':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Deceive not yourselves, saying, The Chaldeans shall surely depart from us: for they shall not depart. '
