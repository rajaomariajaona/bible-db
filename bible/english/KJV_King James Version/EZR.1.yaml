document_id: EZR.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the first year of Cyrus king of Persia, that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by the mouth of Jeremiah might be fulfilled, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' stirred up the spirit of Cyrus king of Persia, that he made a proclamation throughout all his kingdom, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: put it
    - type: text
      text: ' also in writing, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thirty basons of gold, silver basons of a second '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sort
    - type: text
      text: ' four hundred and ten, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' other vessels a thousand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the vessels of gold and of silver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' five thousand and four hundred. All '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' did Sheshbazzar bring up with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them of
    - type: text
      text: ' the captivity that were brought up from Babylon unto Jerusalem.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith Cyrus king of Persia, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of heaven hath given me all the kingdoms of the earth; and he hath charged me to build him an house at Jerusalem, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Judah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' among you of all his people? his God be with him, and let him go up to Jerusalem, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Judah, and build the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, (he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the God,) which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whosoever remaineth in any place where he sojourneth, let the men of his place help him with silver, and with gold, and with goods, and with beasts, beside the freewill offering for the house of God that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then rose up the chief of the fathers of Judah and Benjamin, and the priests, and the Levites, with all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' whose spirit God had raised, to go up to build the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all they that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' about them strengthened their hands with vessels of silver, with gold, with goods, and with beasts, and with precious things, beside all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' was willingly offered. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also Cyrus the king brought forth the vessels of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which Nebuchadnezzar had brought forth out of Jerusalem, and had put them in the house of his gods; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'even those did Cyrus king of Persia bring forth by the hand of Mithredath the treasurer, and numbered them unto Sheshbazzar, the prince of Judah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the number of them: thirty chargers of gold, a thousand chargers of silver, nine and twenty knives, '
