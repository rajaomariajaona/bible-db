  '1':
  - type: heading
    content: The Death of Moses
  - type: text
    content: 'And Moses went up from the plains of Moab unto the mountain of Nebo, to the top of Pisgah, that '
  - type: text
    content: is
  - type: text
    content: ' over against Jericho. And the '
  - type: text
    content: LORD
  - type: text
    content: ' shewed him all the land of Gilead, unto Dan, '
  '10':
  - type: text
    content: 'And there arose not a prophet since in Israel like unto Moses, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' knew face to face, '
  '11':
  - type: text
    content: 'in all the signs and the wonders, which the '
  - type: text
    content: LORD
  - type: text
    content: ' sent him to do in the land of Egypt to Pharaoh, and to all his servants, and to all his land, '
  '12':
  - type: text
    content: and in all that mighty hand, and in all the great terror which Moses shewed in the sight of all Israel.
  '2':
  - type: text
    content: 'and all Naphtali, and the land of Ephraim, and Manasseh, and all the land of Judah, unto the utmost sea, '
  '3':
  - type: text
    content: 'and the south, and the plain of the valley of Jericho, the city of palm trees, unto Zoar. '
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto him, This '
  - type: text
    content: is
  - type: text
    content: ' the land which I sware unto Abraham, unto Isaac, and unto Jacob, saying, I will give it unto thy seed: I have caused thee to see '
  - type: text
    content: it
  - type: text
    content: ' with thine eyes, but thou shalt not go over thither.'
  '5':
  - type: text
    content: 'So Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' died there in the land of Moab, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And he buried him in a valley in the land of Moab, over against Beth-peor: but no man knoweth of his sepulchre unto this day. '
  '7':
  - type: text
    content: 'And Moses '
  - type: text
    content: was
  - type: text
    content: ' an hundred and twenty years old when he died: his eye was not dim, nor his natural force abated. '
  '8':
  - type: text
    content: 'And the children of Israel wept for Moses in the plains of Moab thirty days: so the days of weeping '
  - type: text
    content: and
  - type: text
    content: ' mourning for Moses were ended.'
  '9':
  - type: text
    content: 'And Joshua the son of Nun was full of the spirit of wisdom; for Moses had laid his hands upon him: and the children of Israel hearkened unto him, and did as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
