document_id: PSA.49,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm for the sons of Korah.
  - type: text
    content: 'Hear this, all '
  - type: text
    content: ye
  - type: text
    content: ' people;'
  - type: text
    content: 'Give ear, all '
  - type: text
    content: ye
  - type: text
    content: ' inhabitants of the world:'
  '10':
  - type: text
    content: 'For he seeth '
  - type: text
    content: that
  - type: text
    content: ' wise men die,'
  - type: text
    content: Likewise the fool and the brutish person perish, and leave their wealth to others.
  '11':
  - type: text
    content: 'Their inward thought '
  - type: text
    content: is, that
  - type: text
    content: ' their houses '
  - type: text
    content: shall continue
  - type: text
    content: ' for ever,'
  - type: text
    content: And
  - type: text
    content: ' their dwelling places to all generations;'
  - type: text
    content: 'They call '
  - type: text
    content: their
  - type: text
    content: ' lands after their own names.'
  '12':
  - type: text
    content: 'Nevertheless man '
  - type: text
    content: being
  - type: text
    content: ' in honour abideth not:'
  - type: text
    content: 'He is like the beasts '
  - type: text
    content: that
  - type: text
    content: ' perish.'
  '13':
  - type: text
    content: 'This their way '
  - type: text
    content: is
  - type: text
    content: ' their folly:'
  - type: text
    content: 'Yet their posterity approve their sayings. '
  - type: text
    content: Selah.
  '14':
  - type: text
    content: Like sheep they are laid in the grave; Death shall feed on them; And the upright shall have dominion over them in the morning;
  - type: text
    content: And their beauty shall consume in the grave from their dwelling.
  '15':
  - type: text
    content: 'But God will redeem my soul from the power of the grave:'
  - type: text
    content: 'For he shall receive me. '
  - type: text
    content: Selah.
  '16':
  - type: text
    content: Be not thou afraid when one is made rich,
  - type: text
    content: When the glory of his house is increased;
  '17':
  - type: text
    content: 'For when he dieth he shall carry nothing away:'
  - type: text
    content: His glory shall not descend after him.
  '18':
  - type: text
    content: Though while he lived he blessed his soul,
  - type: text
    content: 'And '
  - type: text
    content: men
  - type: text
    content: ' will praise thee, when thou doest well to thyself.'
  '19':
  - type: text
    content: He shall go to the generation of his fathers;
  - type: text
    content: They shall never see light.
  '2':
  - type: text
    content: Both low and high,
  - type: text
    content: Rich and poor, together.
  '20':
  - type: text
    content: 'Man '
  - type: text
    content: that is
  - type: text
    content: ' in honour, and understandeth not,'
  - type: text
    content: 'Is like the beasts '
  - type: text
    content: that
  - type: text
    content: ' perish.'
  '3':
  - type: text
    content: My mouth shall speak of wisdom;
  - type: text
    content: 'And the meditation of my heart '
  - type: text
    content: shall be
  - type: text
    content: ' of understanding.'
  '4':
  - type: text
    content: 'I will incline mine ear to a parable:'
  - type: text
    content: I will open my dark saying upon the harp.
  '5':
  - type: text
    content: Wherefore should I fear in the days of evil,
  - type: text
    content: When
  - type: text
    content: ' the iniquity of my heels shall compass me about?'
  '6':
  - type: text
    content: They that trust in their wealth,
  - type: text
    content: And boast themselves in the multitude of their riches;
  '7':
  - type: text
    content: 'None '
  - type: text
    content: of them
  - type: text
    content: ' can by any means redeem his brother,'
  - type: text
    content: 'Nor give to God a ransom for him:'
  '8':
  - type: text
    content: '(For the redemption of their soul '
  - type: text
    content: is
  - type: text
    content: ' precious,'
  - type: text
    content: And it ceaseth for ever:)
  '9':
  - type: text
    content: That he should still live for ever,
  - type: text
    content: And
  - type: text
    content: ' not see corruption.'
