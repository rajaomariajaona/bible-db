document_id: PSA.49
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, A Psalm for the sons of Korah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear this, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye
  - type: text
    text: ' people;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Give ear, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye
  - type: text
    text: ' inhabitants of the world:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Both low and high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rich and poor, together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: My mouth shall speak of wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the meditation of my heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' of understanding.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will incline mine ear to a parable:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will open my dark saying upon the harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Wherefore should I fear in the days of evil,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: When
  - type: text
    text: ' the iniquity of my heels shall compass me about?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They that trust in their wealth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And boast themselves in the multitude of their riches;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'None '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ' can by any means redeem his brother,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor give to God a ransom for him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(For the redemption of their soul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' precious,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And it ceaseth for ever:)
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: That he should still live for ever,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' not see corruption.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For he seeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' wise men die,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Likewise the fool and the brutish person perish, and leave their wealth to others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Their inward thought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is, that
  - type: text
    text: ' their houses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall continue
  - type: text
    text: ' for ever,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' their dwelling places to all generations;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They call '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' lands after their own names.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nevertheless man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' in honour abideth not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He is like the beasts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' perish.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This their way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their folly:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yet their posterity approve their sayings. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Like sheep they are laid in the grave; Death shall feed on them; And the upright shall have dominion over them in the morning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their beauty shall consume in the grave from their dwelling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But God will redeem my soul from the power of the grave:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For he shall receive me. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Be not thou afraid when one is made rich,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the glory of his house is increased;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For when he dieth he shall carry nothing away:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His glory shall not descend after him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Though while he lived he blessed his soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' will praise thee, when thou doest well to thyself.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He shall go to the generation of his fathers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall never see light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' in honour, and understandeth not,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Is like the beasts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' perish.'
