document_id: JER.43,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jeremiah Taken to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' when Jeremiah had made an end of speaking unto all the people all the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, for which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God had sent him to them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all these words, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say unto them, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Behold, I will send and take Nebuchadrezzar the king of Babylon, my servant, and will set his throne upon these stones that I have hid; and he shall spread his royal pavilion over them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he cometh, he shall smite the land of Egypt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and deliver
    - type: text
      text: ' such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as are
    - type: text
      text: ' for death to death; and such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as are
    - type: text
      text: ' for captivity to captivity; and such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as are
    - type: text
      text: ' for the sword to the sword. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will kindle a fire in the houses of the gods of Egypt; and he shall burn them, and carry them away captives: and he shall array himself with the land of Egypt, as a shepherd putteth on his garment; and he shall go forth from thence in peace. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall break also the images of Beth-shemesh, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the land of Egypt; and the houses of the gods of the Egyptians shall he burn with fire.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then spake Azariah the son of Hoshaiah, and Johanan the son of Kareah, and all the proud men, saying unto Jeremiah, Thou speakest falsely: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God hath not sent thee to say, Go not into Egypt to sojourn there: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but Baruch the son of Neriah setteth thee on against us, for to deliver us into the hand of the Chaldeans, that they might put us to death, and carry us away captives into Babylon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Johanan the son of Kareah, and all the captains of the forces, and all the people, obeyed not the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to dwell in the land of Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Johanan the son of Kareah, and all the captains of the forces, took all the remnant of Judah, that were returned from all nations, whither they had been driven, to dwell in the land of Judah; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' men, and women, and children, and the king''s daughters, and every person that Nebuzar-adan the captain of the guard had left with Gedaliah the son of Ahikam the son of Shaphan, and Jeremiah the prophet, and Baruch the son of Neriah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they came into the land of Egypt: for they obeyed not the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': thus came they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to Tahpanhes.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Jeremiah in Tahpanhes, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take great stones in thine hand, and hide them in the clay in the brickkiln, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at the entry of Pharaoh''s house in Tahpanhes, in the sight of the men of Judah; '
