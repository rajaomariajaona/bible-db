  - type: text
    content: ' all these words, '
  '10':
  - type: text
    content: 'and say unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Behold, I will send and take Nebuchadrezzar the king of Babylon, my servant, and will set his throne upon these stones that I have hid; and he shall spread his royal pavilion over them. '
  '11':
  - type: text
    content: 'And when he cometh, he shall smite the land of Egypt, '
  - type: text
    content: and deliver
  - type: text
    content: ' such '
  - type: text
    content: as are
  - type: text
    content: ' for death to death; and such '
  - type: text
    content: as are
  - type: text
    content: ' for captivity to captivity; and such '
  - type: text
    content: as are
  - type: text
    content: ' for the sword to the sword. '
  '12':
  - type: text
    content: 'And I will kindle a fire in the houses of the gods of Egypt; and he shall burn them, and carry them away captives: and he shall array himself with the land of Egypt, as a shepherd putteth on his garment; and he shall go forth from thence in peace. '
  '13':
  - type: text
    content: 'He shall break also the images of Beth-shemesh, that '
  - type: text
    content: is
  - type: text
    content: ' in the land of Egypt; and the houses of the gods of the Egyptians shall he burn with fire.'
  '2':
  - type: text
    content: 'then spake Azariah the son of Hoshaiah, and Johanan the son of Kareah, and all the proud men, saying unto Jeremiah, Thou speakest falsely: the '
  - type: text
    content: LORD
  - type: text
    content: ' our God hath not sent thee to say, Go not into Egypt to sojourn there: '
  '3':
  - type: text
    content: but Baruch the son of Neriah setteth thee on against us, for to deliver us into the hand of the Chaldeans, that they might put us to death, and carry us away captives into Babylon.
  '4':
  - type: text
    content: 'So Johanan the son of Kareah, and all the captains of the forces, and all the people, obeyed not the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ', to dwell in the land of Judah. '
  '5':
  - type: text
    content: 'But Johanan the son of Kareah, and all the captains of the forces, took all the remnant of Judah, that were returned from all nations, whither they had been driven, to dwell in the land of Judah; '
  '6':
  - type: text
    content: even
  - type: text
    content: ' men, and women, and children, and the king''s daughters, and every person that Nebuzar-adan the captain of the guard had left with Gedaliah the son of Ahikam the son of Shaphan, and Jeremiah the prophet, and Baruch the son of Neriah. '
  '7':
  - type: text
    content: 'So they came into the land of Egypt: for they obeyed not the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ': thus came they '
  - type: text
    content: even
  - type: text
    content: ' to Tahpanhes.'
  '8':
  - type: text
    content: 'Then came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Jeremiah in Tahpanhes, saying, '
  '9':
  - type: text
    content: 'Take great stones in thine hand, and hide them in the clay in the brickkiln, which '
  - type: text
    content: is
  - type: text
    content: ' at the entry of Pharaoh''s house in Tahpanhes, in the sight of the men of Judah; '
