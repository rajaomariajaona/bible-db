verses:
  '1':
  - type: text
    content: A Psalm of David.
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', who shall abide in thy tabernacle?'
  - type: text
    content: Who shall dwell in thy holy hill?
  '2':
  - type: text
    content: He that walketh uprightly,
  - type: text
    content: and worketh righteousness, and speaketh the truth in his heart.
  '3':
  - type: text
    content: ' '
  - type: text
    content: He that
  - type: text
    content: ' backbiteth not with his tongue, nor doeth evil to his neighbour,'
  - type: text
    content: Nor taketh up a reproach against his neighbour.
  '4':
  - type: text
    content: In whose eyes a vile person is contemned;
  - type: text
    content: 'But he honoureth them that fear the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: text
    content: He that
  - type: text
    content: ' sweareth to '
  - type: text
    content: his own
  - type: text
    content: ' hurt, and changeth not.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: He that
  - type: text
    content: ' putteth not out his money to usury,'
  - type: text
    content: Nor taketh reward against the innocent.
  - type: text
    content: 'He that doeth these '
  - type: text
    content: things
  - type: text
    content: ' shall never be moved.'
