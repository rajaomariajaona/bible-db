document_id: PSA.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', who shall abide in thy tabernacle?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who shall dwell in thy holy hill?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that walketh uprightly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worketh righteousness, and speaketh the truth in his heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that
    - type: text
      text: ' backbiteth not with his tongue, nor doeth evil to his neighbour,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor taketh up a reproach against his neighbour.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In whose eyes a vile person is contemned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he honoureth them that fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that
    - type: text
      text: ' sweareth to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his own
    - type: text
      text: ' hurt, and changeth not.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that
    - type: text
      text: ' putteth not out his money to usury,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor taketh reward against the innocent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that doeth these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' shall never be moved.'
