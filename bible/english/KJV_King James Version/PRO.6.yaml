document_id: PRO.6,1
type_code: eng
verses:
  '1':
  - type: text
    content: My son, if thou be surety for thy friend,
  - type: text
    content: If
  - type: text
    content: ' thou hast stricken thy hand with a stranger,'
  '10':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' a little sleep, a little slumber,'
  - type: text
    content: 'A little folding of the hands to sleep:'
  '11':
  - type: text
    content: So shall thy poverty come as one that travelleth,
  - type: text
    content: And thy want as an armed man.
  '12':
  - type: text
    content: A naughty person, a wicked man,
  - type: text
    content: Walketh with a froward mouth.
  '13':
  - type: text
    content: He winketh with his eyes, he speaketh with his feet,
  - type: text
    content: He teacheth with his fingers;
  '14':
  - type: text
    content: 'Frowardness '
  - type: text
    content: is
  - type: text
    content: ' in his heart, he deviseth mischief continually;'
  - type: text
    content: He soweth discord.
  '15':
  - type: text
    content: Therefore shall his calamity come suddenly;
  - type: text
    content: Suddenly shall he be broken without remedy.
  '16':
  - type: text
    content: 'These six '
  - type: text
    content: things
  - type: text
    content: ' doth the '
  - type: text
    content: LORD
  - type: text
    content: ' hate:'
  - type: text
    content: 'Yea, seven '
  - type: text
    content: are
  - type: text
    content: ' an abomination unto him:'
  '17':
  - type: text
    content: A proud look, a lying tongue,
  - type: text
    content: And hands that shed innocent blood,
  '18':
  - type: text
    content: An heart that deviseth wicked imaginations,
  - type: text
    content: Feet that be swift in running to mischief,
  '19':
  - type: text
    content: 'A false witness '
  - type: text
    content: that
  - type: text
    content: ' speaketh lies,'
  - type: text
    content: And he that soweth discord among brethren.
  '2':
  - type: text
    content: Thou art snared with the words of thy mouth,
  - type: text
    content: Thou art taken with the words of thy mouth.
  '20':
  - type: text
    content: My son, keep thy father's commandment,
  - type: text
    content: 'And forsake not the law of thy mother:'
  '21':
  - type: text
    content: Bind them continually upon thine heart,
  - type: text
    content: And
  - type: text
    content: ' tie them about thy neck.'
  '22':
  - type: text
    content: When thou goest, it shall lead thee;
  - type: text
    content: When thou sleepest, it shall keep thee;
  - type: text
    content: 'And '
  - type: text
    content: when
  - type: text
    content: ' thou awakest, it shall talk with thee.'
  '23':
  - type: text
    content: 'For the commandment '
  - type: text
    content: is
  - type: text
    content: ' a lamp; and the law '
  - type: text
    content: is
  - type: text
    content: ' light;'
  - type: text
    content: 'And reproofs of instruction '
  - type: text
    content: are
  - type: text
    content: ' the way of life:'
  '24':
  - type: text
    content: To keep thee from the evil woman,
  - type: text
    content: From the flattery of the tongue of a strange woman.
  '25':
  - type: text
    content: Lust not after her beauty in thine heart;
  - type: text
    content: Neither let her take thee with her eyelids.
  '26':
  - type: text
    content: 'For by means of a whorish woman '
  - type: text
    content: a man is brought
  - type: text
    content: ' to a piece of bread:'
  - type: text
    content: And the adulteress will hunt for the precious life.
  '27':
  - type: text
    content: Can a man take fire in his bosom,
  - type: text
    content: And his clothes not be burned?
  '28':
  - type: text
    content: Can one go upon hot coals,
  - type: text
    content: And his feet not be burned?
  '29':
  - type: text
    content: So he that goeth in to his neighbour's wife;
  - type: text
    content: Whosoever toucheth her shall not be innocent.
  '3':
  - type: text
    content: Do this now, my son, and deliver thyself,
  - type: text
    content: When thou art come into the hand of thy friend;
  - type: text
    content: Go, humble thyself, and make sure thy friend.
  '30':
  - type: text
    content: ' '
  - type: text
    content: Men
  - type: text
    content: ' do not despise a thief, if he steal'
  - type: text
    content: To satisfy his soul when he is hungry;
  '31':
  - type: text
    content: 'But '
  - type: text
    content: if
  - type: text
    content: ' he be found, he shall restore sevenfold;'
  - type: text
    content: He shall give all the substance of his house.
  '32':
  - type: text
    content: ' '
  - type: text
    content: But
  - type: text
    content: ' whoso committeth adultery with a woman lacketh understanding:'
  - type: text
    content: 'He '
  - type: text
    content: that
  - type: text
    content: ' doeth it destroyeth his own soul.'
  '33':
  - type: text
    content: A wound and dishonour shall he get;
  - type: text
    content: And his reproach shall not be wiped away.
  '34':
  - type: text
    content: 'For jealousy '
  - type: text
    content: is
  - type: text
    content: ' the rage of a man:'
  - type: text
    content: Therefore he will not spare in the day of vengeance.
  '35':
  - type: text
    content: He will not regard any ransom;
  - type: text
    content: Neither will he rest content, though thou givest many gifts.
  '4':
  - type: text
    content: Give not sleep to thine eyes,
  - type: text
    content: Nor slumber to thine eyelids.
  '5':
  - type: text
    content: 'Deliver thyself as a roe from the hand '
  - type: text
    content: of the hunter
  - type: text
    content: ','
  - type: text
    content: And as a bird from the hand of the fowler.
  '6':
  - type: text
    content: Go to the ant, thou sluggard;
  - type: text
    content: 'Consider her ways, and be wise:'
  '7':
  - type: text
    content: Which having no guide,
  - type: text
    content: Overseer, or ruler,
  '8':
  - type: text
    content: Provideth her meat in the summer,
  - type: text
    content: And
  - type: text
    content: ' gathereth her food in the harvest.'
  '9':
  - type: text
    content: How long wilt thou sleep, O sluggard?
  - type: text
    content: When wilt thou arise out of thy sleep?
