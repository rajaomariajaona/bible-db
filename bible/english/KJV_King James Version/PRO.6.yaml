document_id: PRO.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, if thou be surety for thy friend,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' thou hast stricken thy hand with a stranger,'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' a little sleep, a little slumber,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A little folding of the hands to sleep:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So shall thy poverty come as one that travelleth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy want as an armed man.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A naughty person, a wicked man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Walketh with a froward mouth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He winketh with his eyes, he speaketh with his feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He teacheth with his fingers;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Frowardness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his heart, he deviseth mischief continually;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He soweth discord.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Therefore shall his calamity come suddenly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Suddenly shall he be broken without remedy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'These six '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' doth the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hate:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, seven '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination unto him:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A proud look, a lying tongue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hands that shed innocent blood,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: An heart that deviseth wicked imaginations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Feet that be swift in running to mischief,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A false witness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' speaketh lies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he that soweth discord among brethren.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Thou art snared with the words of thy mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou art taken with the words of thy mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: My son, keep thy father's commandment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And forsake not the law of thy mother:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Bind them continually upon thine heart,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' tie them about thy neck.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: When thou goest, it shall lead thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When thou sleepest, it shall keep thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' thou awakest, it shall talk with thee.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For the commandment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a lamp; and the law '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' light;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And reproofs of instruction '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the way of life:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: To keep thee from the evil woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the flattery of the tongue of a strange woman.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Lust not after her beauty in thine heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither let her take thee with her eyelids.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For by means of a whorish woman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a man is brought
    - type: text
      text: ' to a piece of bread:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the adulteress will hunt for the precious life.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Can a man take fire in his bosom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his clothes not be burned?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Can one go upon hot coals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his feet not be burned?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So he that goeth in to his neighbour's wife;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whosoever toucheth her shall not be innocent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do this now, my son, and deliver thyself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When thou art come into the hand of thy friend;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go, humble thyself, and make sure thy friend.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Men
    - type: text
      text: ' do not despise a thief, if he steal'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To satisfy his soul when he is hungry;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' he be found, he shall restore sevenfold;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall give all the substance of his house.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' whoso committeth adultery with a woman lacketh understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' doeth it destroyeth his own soul.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: A wound and dishonour shall he get;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his reproach shall not be wiped away.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'For jealousy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the rage of a man:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore he will not spare in the day of vengeance.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: He will not regard any ransom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither will he rest content, though thou givest many gifts.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Give not sleep to thine eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor slumber to thine eyelids.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Deliver thyself as a roe from the hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the hunter
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And as a bird from the hand of the fowler.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Go to the ant, thou sluggard;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Consider her ways, and be wise:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Which having no guide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Overseer, or ruler,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Provideth her meat in the summer,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' gathereth her food in the harvest.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: How long wilt thou sleep, O sluggard?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When wilt thou arise out of thy sleep?
