document_id: NAM.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The End of Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe to the bloody city! it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' all full of lies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' robbery; the prey departeth not; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' she carried away, she went into captivity: her young children also were dashed in pieces at the top of all the streets: and they cast lots for her honourable men, and all her great men were bound in chains. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou also shalt be drunken: thou shalt be hid, thou also shalt seek strength because of the enemy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All thy strong holds '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be like
    - type: text
      text: ' fig trees with the firstripe figs: if they be shaken, they shall even fall into the mouth of the eater. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, thy people in the midst of thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' women: the gates of thy land shall be set wide open unto thine enemies: the fire shall devour thy bars.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Draw thee waters for the siege, fortify thy strong holds: go into clay, and tread the morter, make strong the brickkiln. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall the fire devour thee; the sword shall cut thee off, it shall eat thee up like the cankerworm: make thyself many as the cankerworm, make thyself many as the locusts. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou hast multiplied thy merchants above the stars of heaven: the cankerworm spoileth, and fleeth away. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy crowned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as the locusts, and thy captains as the great grasshoppers, which camp in the hedges in the cold day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' when the sun ariseth they flee away, and their place is not known where they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy shepherds slumber, O king of Assyria: thy nobles shall dwell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'in the dust:'
    - type: text
      text: ' thy people is scattered upon the mountains, and no man gathereth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' no healing of thy bruise; thy wound is grievous: all that hear the bruit of thee shall clap the hands over thee: for upon whom hath not thy wickedness passed continually?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the noise of a whip, and the noise of the rattling of the wheels, and of the pransing horses, and of the jumping chariots. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The horseman lifteth up both the bright sword and the glittering spear: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a multitude of slain, and a great number of carcases; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none end of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' corpses; they stumble upon their corpses: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because of the multitude of the whoredoms of the wellfavoured harlot, the mistress of witchcrafts, that selleth nations through her whoredoms, and families through her witchcrafts.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; and I will discover thy skirts upon thy face, and I will shew the nations thy nakedness, and the kingdoms thy shame. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will cast abominable filth upon thee, and make thee vile, and will set thee as a gazingstock. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' all they that look upon thee shall flee from thee, and say, Nineveh is laid waste: who will bemoan her? whence shall I seek comforters for thee?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Art thou better than populous No, that was situate among the rivers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that had
    - type: text
      text: ' the waters round about it, whose rampart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the sea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' her wall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' from the sea? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ethiopia and Egypt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' her strength, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' infinite; Put and Lubim were thy helpers. '
