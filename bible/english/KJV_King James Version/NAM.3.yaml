    content: The End of Nineveh
  - type: text
    content: 'Woe to the bloody city! it '
  - type: text
    content: is
  - type: text
    content: ' all full of lies '
  - type: text
    content: and
  - type: text
    content: ' robbery; the prey departeth not; '
  '10':
  - type: text
    content: 'Yet '
  - type: text
    content: was
  - type: text
    content: ' she carried away, she went into captivity: her young children also were dashed in pieces at the top of all the streets: and they cast lots for her honourable men, and all her great men were bound in chains. '
  '11':
  - type: text
    content: 'Thou also shalt be drunken: thou shalt be hid, thou also shalt seek strength because of the enemy. '
  '12':
  - type: text
    content: 'All thy strong holds '
  - type: text
    content: shall be like
  - type: text
    content: ' fig trees with the firstripe figs: if they be shaken, they shall even fall into the mouth of the eater. '
  '13':
  - type: text
    content: 'Behold, thy people in the midst of thee '
  - type: text
    content: are
  - type: text
    content: ' women: the gates of thy land shall be set wide open unto thine enemies: the fire shall devour thy bars.'
  '14':
  - type: text
    content: 'Draw thee waters for the siege, fortify thy strong holds: go into clay, and tread the morter, make strong the brickkiln. '
  '15':
  - type: text
    content: 'There shall the fire devour thee; the sword shall cut thee off, it shall eat thee up like the cankerworm: make thyself many as the cankerworm, make thyself many as the locusts. '
  '16':
  - type: text
    content: 'Thou hast multiplied thy merchants above the stars of heaven: the cankerworm spoileth, and fleeth away. '
  '17':
  - type: text
    content: 'Thy crowned '
  - type: text
    content: are
  - type: text
    content: ' as the locusts, and thy captains as the great grasshoppers, which camp in the hedges in the cold day, '
  - type: text
    content: but
  - type: text
    content: ' when the sun ariseth they flee away, and their place is not known where they '
  - type: text
    content: are
  - type: text
    content: .
  '18':
  - type: text
    content: 'Thy shepherds slumber, O king of Assyria: thy nobles shall dwell '
  - type: text
    content: 'in the dust:'
  - type: text
    content: ' thy people is scattered upon the mountains, and no man gathereth '
  - type: text
    content: them
  - type: text
    content: '. '
  '19':
  - type: text
    content: There is
  - type: text
    content: ' no healing of thy bruise; thy wound is grievous: all that hear the bruit of thee shall clap the hands over thee: for upon whom hath not thy wickedness passed continually?'
  '2':
  - type: text
    content: 'the noise of a whip, and the noise of the rattling of the wheels, and of the pransing horses, and of the jumping chariots. '
  '3':
  - type: text
    content: 'The horseman lifteth up both the bright sword and the glittering spear: and '
  - type: text
