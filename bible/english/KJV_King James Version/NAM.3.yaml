  '4':
  - type: text
    content: because of the multitude of the whoredoms of the wellfavoured harlot, the mistress of witchcrafts, that selleth nations through her whoredoms, and families through her witchcrafts.
  '5':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' against thee, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; and I will discover thy skirts upon thy face, and I will shew the nations thy nakedness, and the kingdoms thy shame. '
  '6':
  - type: text
    content: 'And I will cast abominable filth upon thee, and make thee vile, and will set thee as a gazingstock. '
  '7':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' all they that look upon thee shall flee from thee, and say, Nineveh is laid waste: who will bemoan her? whence shall I seek comforters for thee?'
  '8':
  - type: text
    content: 'Art thou better than populous No, that was situate among the rivers, '
  - type: text
