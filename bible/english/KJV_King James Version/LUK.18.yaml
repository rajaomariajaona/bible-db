document_id: LUK.18,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Parables on Prayer
  - type: text
    content: 'And he spake a parable unto them '
  - type: text
    content: to this end
  - type: text
    content: ', that men ought always to pray, and not to faint; '
  '10':
  - type: text
    content: Two men went up into the temple to pray; the one a Pharisee, and the other a publican.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The Pharisee stood and prayed thus with himself, God, I thank thee, that I am not as other men '
  - type: text
    content: are
  - type: text
    content: ', extortioners, unjust, adulterers, or even as this publican.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: I fast twice in the week, I give tithes of all that I possess.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And the publican, standing afar off, would not lift up so much as '
  - type: text
    content: his
  - type: text
    content: ' eyes unto heaven, but smote upon his breast, saying, God be merciful to me a sinner.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'I tell you, this man went down to his house justified '
  - type: text
    content: rather
  - type: text
    content: ' than the other: for every one that exalteth himself shall be abased; and he that humbleth himself shall be exalted.'
  - type: heading
    content: Little Children
  '15':
  - type: text
    content: 'And they brought unto him also infants, that he would touch them: but when '
  - type: text
    content: his
  - type: text
    content: ' disciples saw '
  - type: text
    content: it
  - type: text
    content: ', they rebuked them. '
  '16':
  - type: text
    content: 'But Jesus called them '
  - type: text
    content: unto him
  - type: text
    content: ', and said, '
  - type: text
    content: 'Suffer little children to come unto me, and forbid them not: for of such is the kingdom of God.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: Verily I say unto you, Whosoever shall not receive the kingdom of God as a little child shall in no wise enter therein.
  - type: heading
    content: A Rich Young Ruler
  '18':
  - type: text
    content: 'And a certain ruler asked him, saying, Good Master, what shall I do to inherit eternal life? '
  '19':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: 'Why callest thou me good? none '
  - type: text
    content: is
  - type: text
    content: ' good, save one, '
  - type: text
    content: that is
  - type: text
    content: ', God.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'saying, '
  - type: text
    content: 'There was in a city a judge, which feared not God, neither regarded man:'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Thou knowest the commandments, Do not commit adultery, Do not kill, Do not steal, Do not bear false witness, Honour thy father and thy mother.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And he said, All these have I kept from my youth up. '
  '22':
  - type: text
    content: 'Now when Jesus heard these things, he said unto him, '
  - type: text
    content: 'Yet lackest thou one thing: sell all that thou hast, and distribute unto the poor, and thou shalt have treasure in heaven: and come, follow me.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And when he heard this, he was very sorrowful: for he was very rich. '
  '24':
  - type: text
    content: 'And when Jesus saw that he was very sorrowful, he said, '
  - type: text
    content: How hardly shall they that have riches enter into the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: For it is easier for a camel to go through a needle's eye, than for a rich man to enter into the kingdom of God.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And they that heard '
  - type: text
    content: it
  - type: text
    content: ' said, Who then can be saved? '
  '27':
  - type: text
    content: 'And he said, '
  - type: text
    content: The things which are impossible with men are possible with God.
  - type: heading
    content: Peter's Reaction
  '28':
  - type: text
    content: 'Then Peter said, Lo, we have left all, and followed thee. '
  '29':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Verily I say unto you, There is no man that hath left house, or parents, or brethren, or wife, or children, for the kingdom of God's sake,
  - type: text
    content: ' '
  '3':
  - type: text
    content: and there was a widow in that city; and she came unto him, saying, Avenge me of mine adversary.
  - type: text
    content: ' '
  '30':
  - type: text
    content: who shall not receive manifold more in this present time, and in the world to come life everlasting.
  - type: heading
    content: An Aside to the Disciples
  '31':
  - type: text
    content: 'Then he took '
  - type: text
    content: unto him
  - type: text
    content: ' the twelve, and said unto them, '
  - type: text
    content: Behold, we go up to Jerusalem, and all things that are written by the prophets concerning the Son of man shall be accomplished.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For he shall be delivered unto the Gentiles, and shall be mocked, and spitefully entreated, and spitted on:'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'and they shall scourge '
  - type: text
    content: him
  - type: text
    content: ', and put him to death: and the third day he shall rise again.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And they understood none of these things: and this saying was hid from them, neither knew they the things which were spoken.'
  - type: heading
    content: On the Jericho Road
  '35':
  - type: text
    content: 'And it came to pass, that as he was come nigh unto Jericho, a certain blind man sat by the way side begging: '
  '36':
  - type: text
    content: 'and hearing the multitude pass by, he asked what it meant. '
  '37':
  - type: text
    content: 'And they told him, that Jesus of Nazareth passeth by. '
  '38':
  - type: text
    content: 'And he cried, saying, Jesus, '
  - type: text
    content: thou
  - type: text
    content: ' Son of David, have mercy on me. '
  '39':
  - type: text
    content: 'And they which went before rebuked him, that he should hold his peace: but he cried so much the more, '
  - type: text
    content: Thou
  - type: text
    content: ' Son of David, have mercy on me. '
  '4':
  - type: text
    content: 'And he would not for a while: but afterward he said within himself, Though I fear not God, nor regard man;'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And Jesus stood, and commanded him to be brought unto him: and when he was come near, he asked him, '
  '41':
  - type: text
    content: 'saying, '
  - type: text
    content: What wilt thou that I shall do unto thee?
  - type: text
    content: ' And he said, Lord, that I may receive my sight. '
  '42':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: 'Receive thy sight: thy faith hath saved thee.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And immediately he received his sight, and followed him, glorifying God: and all the people, when they saw '
  - type: text
    content: it
  - type: text
    content: ', gave praise unto God.'
  '5':
  - type: text
    content: yet because this widow troubleth me, I will avenge her, lest by her continual coming she weary me.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: Hear what the unjust judge saith.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And shall not God avenge his own elect, which cry day and night unto him, though he bear long with them?
  - type: text
    content: ' '
  '8':
  - type: text
    content: I tell you that he will avenge them speedily. Nevertheless when the Son of man cometh, shall he find faith on the earth?
  '9':
  - type: text
    content: 'And he spake this parable unto certain which trusted in themselves that they were righteous, and despised others: '
