document_id: LUK.18
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Parables on Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he spake a parable unto them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to this end
  - type: text
    text: ', that men ought always to pray, and not to faint; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'There was in a city a judge, which feared not God, neither regarded man:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and there was a widow in that city; and she came unto him, saying, Avenge me of mine adversary.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he would not for a while: but afterward he said within himself, Though I fear not God, nor regard man;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: yet because this widow troubleth me, I will avenge her, lest by her continual coming she weary me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hear what the unjust judge saith.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And shall not God avenge his own elect, which cry day and night unto him, though he bear long with them?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you that he will avenge them speedily. Nevertheless when the Son of man cometh, shall he find faith on the earth?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he spake this parable unto certain which trusted in themselves that they were righteous, and despised others: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Two men went up into the temple to pray; the one a Pharisee, and the other a publican.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The Pharisee stood and prayed thus with himself, God, I thank thee, that I am not as other men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ', extortioners, unjust, adulterers, or even as this publican.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I fast twice in the week, I give tithes of all that I possess.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And the publican, standing afar off, would not lift up so much as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' eyes unto heaven, but smote upon his breast, saying, God be merciful to me a sinner.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I tell you, this man went down to his house justified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: rather
    - type: text
      text: ' than the other: for every one that exalteth himself shall be abased; and he that humbleth himself shall be exalted.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Little Children
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they brought unto him also infants, that he would touch them: but when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' disciples saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they rebuked them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Jesus called them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Suffer little children to come unto me, and forbid them not: for of such is the kingdom of God.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, Whosoever shall not receive the kingdom of God as a little child shall in no wise enter therein.
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Rich Young Ruler
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And a certain ruler asked him, saying, Good Master, what shall I do to inherit eternal life? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Why callest thou me good? none '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good, save one, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ', God.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou knowest the commandments, Do not commit adultery, Do not kill, Do not steal, Do not bear false witness, Honour thy father and thy mother.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he said, All these have I kept from my youth up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now when Jesus heard these things, he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Yet lackest thou one thing: sell all that thou hast, and distribute unto the poor, and thou shalt have treasure in heaven: and come, follow me.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when he heard this, he was very sorrowful: for he was very rich. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when Jesus saw that he was very sorrowful, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How hardly shall they that have riches enter into the kingdom of God!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For it is easier for a camel to go through a needle's eye, than for a rich man to enter into the kingdom of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' said, Who then can be saved? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The things which are impossible with men are possible with God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Peter's Reaction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Peter said, Lo, we have left all, and followed thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, There is no man that hath left house, or parents, or brethren, or wife, or children, for the kingdom of God's sake,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who shall not receive manifold more in this present time, and in the world to come life everlasting.
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Aside to the Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then he took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' the twelve, and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Behold, we go up to Jerusalem, and all things that are written by the prophets concerning the Son of man shall be accomplished.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For he shall be delivered unto the Gentiles, and shall be mocked, and spitefully entreated, and spitted on:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and they shall scourge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and put him to death: and the third day he shall rise again.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And they understood none of these things: and this saying was hid from them, neither knew they the things which were spoken.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: On the Jericho Road
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And it came to pass, that as he was come nigh unto Jericho, a certain blind man sat by the way side begging: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and hearing the multitude pass by, he asked what it meant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And they told him, that Jesus of Nazareth passeth by. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he cried, saying, Jesus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' Son of David, have mercy on me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And they which went before rebuked him, that he should hold his peace: but he cried so much the more, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Thou
  - type: text
    text: ' Son of David, have mercy on me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And Jesus stood, and commanded him to be brought unto him: and when he was come near, he asked him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What wilt thou that I shall do unto thee?
  - type: text
    text: ' And he said, Lord, that I may receive my sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Receive thy sight: thy faith hath saved thee.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And immediately he received his sight, and followed him, glorifying God: and all the people, when they saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', gave praise unto God.'
