document_id: ISA.4,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And in that day seven women shall take hold of one man, saying, We will eat our own bread, and wear our own apparel: only let us be called by thy name, to take away our reproach.'
  '2':
  - type: text
    content: 'In that day shall the branch of the '
  - type: text
    content: LORD
  - type: text
    content: ' be beautiful and glorious, and the fruit of the earth '
  - type: text
    content: shall be
  - type: text
    content: ' excellent and comely for them that are escaped of Israel. '
  '3':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that he that is
  - type: text
    content: ' left in Zion, and '
  - type: text
    content: he that
  - type: text
    content: ' remaineth in Jerusalem, shall be called holy, '
  - type: text
    content: even
  - type: text
    content: ' every one that is written among the living in Jerusalem: '
  '4':
  - type: text
    content: 'when the Lord shall have washed away the filth of the daughters of Zion, and shall have purged the blood of Jerusalem from the midst thereof by the spirit of judgment, and by the spirit of burning. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' will create upon every dwelling place of mount Zion, and upon her assemblies, a cloud and smoke by day, and the shining of a flaming fire by night: for upon all the glory '
  - type: text
    content: shall be
  - type: text
    content: ' a defence. '
  '6':
  - type: text
    content: And there shall be a tabernacle for a shadow in the daytime from the heat, and for a place of refuge, and for a covert from storm and from rain.
