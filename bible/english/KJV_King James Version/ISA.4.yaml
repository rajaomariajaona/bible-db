document_id: ISA.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And in that day seven women shall take hold of one man, saying, We will eat our own bread, and wear our own apparel: only let us be called by thy name, to take away our reproach.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In that day shall the branch of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' be beautiful and glorious, and the fruit of the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' excellent and comely for them that are escaped of Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that he that is
    - type: text
      text: ' left in Zion, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that
    - type: text
      text: ' remaineth in Jerusalem, shall be called holy, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' every one that is written among the living in Jerusalem: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'when the Lord shall have washed away the filth of the daughters of Zion, and shall have purged the blood of Jerusalem from the midst thereof by the spirit of judgment, and by the spirit of burning. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will create upon every dwelling place of mount Zion, and upon her assemblies, a cloud and smoke by day, and the shining of a flaming fire by night: for upon all the glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a defence. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And there shall be a tabernacle for a shadow in the daytime from the heat, and for a place of refuge, and for a covert from storm and from rain.
