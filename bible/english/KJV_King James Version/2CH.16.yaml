document_id: 2CH.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the six and thirtieth year of the reign of Asa Baasha king of Israel came up against Judah, and built Ramah, to the intent that he might let none go out or come in to Asa king of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Asa brought out silver and gold out of the treasures of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' and of the king''s house, and sent to Ben-hadad king of Syria, that dwelt at Damascus, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a league between me and thee, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' between my father and thy father: behold, I have sent thee silver and gold; go, break thy league with Baasha king of Israel, that he may depart from me. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Ben-hadad hearkened unto king Asa, and sent the captains of his armies against the cities of Israel; and they smote Ijon, and Dan, and Abel-maim, and all the store cities of Naphtali. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it came to pass, when Baasha heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', that he left off building of Ramah, and let his work cease. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then Asa the king took all Judah; and they carried away the stones of Ramah, and the timber thereof, wherewith Baasha was building; and he built therewith Geba and Mizpah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And at that time Hanani the seer came to Asa king of Judah, and said unto him, Because thou hast relied on the king of Syria, and not relied on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, therefore is the host of the king of Syria escaped out of thine hand. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Were not the Ethiopians and the Lubims a huge host, with very many chariots and horsemen? yet, because thou didst rely on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', he delivered them into thine hand. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' run to and fro throughout the whole earth, to shew himself strong in the behalf of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' whose heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' perfect toward him. Herein thou hast done foolishly: therefore from henceforth thou shalt have wars. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Asa was wroth with the seer, and put him in a prison house; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' in a rage with him because of this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: '. And Asa oppressed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the people the same time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And, behold, the acts of Asa, first and last, lo, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the book of the kings of Judah and Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Asa in the thirty and ninth year of his reign was diseased in his feet, until his disease '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' exceeding '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'great:'
  - type: text
    text: ' yet in his disease he sought not to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', but to the physicians. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Asa slept with his fathers, and died in the one and fortieth year of his reign. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they buried him in his own sepulchres, which he had made for himself in the city of David, and laid him in the bed which was filled with sweet odours and divers kinds '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of spices
  - type: text
    text: ' prepared by the apothecaries'' art: and they made a very great burning for him.'
