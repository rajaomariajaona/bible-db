document_id: 2CH.16,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the six and thirtieth year of the reign of Asa Baasha king of Israel came up against Judah, and built Ramah, to the intent that he might let none go out or come in to Asa king of Judah. '
  '10':
  - type: text
    content: 'Then Asa was wroth with the seer, and put him in a prison house; for '
  - type: text
    content: he was
  - type: text
    content: ' in a rage with him because of this '
  - type: text
    content: thing
  - type: text
    content: '. And Asa oppressed '
  - type: text
    content: some
  - type: text
    content: ' of the people the same time.'
  '11':
  - type: text
    content: 'And, behold, the acts of Asa, first and last, lo, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Judah and Israel. '
  '12':
  - type: text
    content: 'And Asa in the thirty and ninth year of his reign was diseased in his feet, until his disease '
  - type: text
    content: was
  - type: text
    content: ' exceeding '
  - type: text
    content: 'great:'
  - type: text
    content: ' yet in his disease he sought not to the '
  - type: text
    content: LORD
  - type: text
    content: ', but to the physicians. '
  '13':
  - type: text
    content: 'And Asa slept with his fathers, and died in the one and fortieth year of his reign. '
  '14':
  - type: text
    content: 'And they buried him in his own sepulchres, which he had made for himself in the city of David, and laid him in the bed which was filled with sweet odours and divers kinds '
  - type: text
    content: of spices
  - type: text
    content: ' prepared by the apothecaries'' art: and they made a very great burning for him.'
  '2':
  - type: text
    content: 'Then Asa brought out silver and gold out of the treasures of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' and of the king''s house, and sent to Ben-hadad king of Syria, that dwelt at Damascus, saying, '
  '3':
  - type: text
    content: There is
  - type: text
    content: ' a league between me and thee, as '
  - type: text
    content: there was
  - type: text
    content: ' between my father and thy father: behold, I have sent thee silver and gold; go, break thy league with Baasha king of Israel, that he may depart from me. '
  '4':
  - type: text
    content: 'And Ben-hadad hearkened unto king Asa, and sent the captains of his armies against the cities of Israel; and they smote Ijon, and Dan, and Abel-maim, and all the store cities of Naphtali. '
  '5':
  - type: text
    content: 'And it came to pass, when Baasha heard '
  - type: text
    content: it
  - type: text
    content: ', that he left off building of Ramah, and let his work cease. '
  '6':
  - type: text
    content: Then Asa the king took all Judah; and they carried away the stones of Ramah, and the timber thereof, wherewith Baasha was building; and he built therewith Geba and Mizpah.
  '7':
  - type: text
    content: 'And at that time Hanani the seer came to Asa king of Judah, and said unto him, Because thou hast relied on the king of Syria, and not relied on the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, therefore is the host of the king of Syria escaped out of thine hand. '
  '8':
  - type: text
    content: 'Were not the Ethiopians and the Lubims a huge host, with very many chariots and horsemen? yet, because thou didst rely on the '
  - type: text
    content: LORD
  - type: text
    content: ', he delivered them into thine hand. '
  '9':
  - type: text
    content: 'For the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ' run to and fro throughout the whole earth, to shew himself strong in the behalf of '
  - type: text
    content: them
  - type: text
    content: ' whose heart '
  - type: text
    content: is
  - type: text
    content: ' perfect toward him. Herein thou hast done foolishly: therefore from henceforth thou shalt have wars. '
