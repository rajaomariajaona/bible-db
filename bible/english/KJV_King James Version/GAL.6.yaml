document_id: GAL.6,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Brethren, if a man be overtaken in a fault, ye which are spiritual, restore such an one in the spirit of meekness; considering thyself, lest thou also be tempted. '
  '10':
  - type: text
    content: 'As we have therefore opportunity, let us do good unto all '
  - type: text
    content: men
  - type: text
    content: ', especially unto them who are of the household of faith.'
  '11':
  - type: text
    content: 'Ye see how large a letter I have written unto you with mine own hand. '
  '12':
  - type: text
    content: 'As many as desire to make a fair shew in the flesh, they constrain you to be circumcised; only lest they should suffer persecution for the cross of Christ. '
  '13':
  - type: text
    content: 'For neither they themselves who are circumcised keep the law; but desire to have you circumcised, that they may glory in your flesh. '
  '14':
  - type: text
    content: 'But God forbid that I should glory, save in the cross of our Lord Jesus Christ, by whom the world is crucified unto me, and I unto the world. '
  '15':
  - type: text
    content: 'For in Christ Jesus neither circumcision availeth any thing, nor uncircumcision, but a new creature. '
  '16':
  - type: text
    content: 'And as many as walk according to this rule, peace '
  - type: text
    content: be
  - type: text
    content: ' on them, and mercy, and upon the Israel of God.'
  '17':
  - type: text
    content: 'From henceforth let no man trouble me: for I bear in my body the marks of the Lord Jesus. '
  '18':
  - type: text
    content: 'Brethren, the grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with your spirit. Amen.'
  - type: text
    content: Unto the Galatians written from Rome.
  '2':
  - type: text
    content: 'Bear ye one another''s burdens, and so fulfil the law of Christ. '
  '3':
  - type: text
    content: 'For if a man think himself to be something, when he is nothing, he deceiveth himself. '
  '4':
  - type: text
    content: 'But let every man prove his own work, and then shall he have rejoicing in himself alone, and not in another. '
  '5':
  - type: text
    content: For every man shall bear his own burden.
  '6':
  - type: text
    content: 'Let him that is taught in the word communicate unto him that teacheth in all good things. '
  '7':
  - type: text
    content: 'Be not deceived; God is not mocked: for whatsoever a man soweth, that shall he also reap. '
  '8':
  - type: text
    content: 'For he that soweth to his flesh shall of the flesh reap corruption; but he that soweth to the Spirit shall of the Spirit reap life everlasting. '
  '9':
  - type: text
    content: 'And let us not be weary in well doing: for in due season we shall reap, if we faint not. '
