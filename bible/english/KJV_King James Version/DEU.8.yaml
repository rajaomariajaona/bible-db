document_id: DEU.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'All the commandments which I command thee this day shall ye observe to do, that ye may live, and multiply, and go in and possess the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware unto your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And thou shalt remember all the way which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God led thee these forty years in the wilderness, to humble thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to prove thee, to know what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in thine heart, whether thou wouldest keep his commandments, or no. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he humbled thee, and suffered thee to hunger, and fed thee with manna, which thou knewest not, neither did thy fathers know; that he might make thee know that man doth not live by bread only, but by every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: word
  - type: text
    text: ' that proceedeth out of the mouth of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' doth man live. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thy raiment waxed not old upon thee, neither did thy foot swell, these forty years. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thou shalt also consider in thine heart, that, as a man chasteneth his son, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God chasteneth thee. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore thou shalt keep the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, to walk in his ways, and to fear him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God bringeth thee into a good land, a land of brooks of water, of fountains and depths that spring out of valleys and hills; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'a land of wheat, and barley, and vines, and fig trees, and pomegranates; a land of oil olive, and honey; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'a land wherein thou shalt eat bread without scarceness, thou shalt not lack any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ' in it; a land whose stones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' iron, and out of whose hills thou mayest dig brass. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When thou hast eaten and art full, then thou shalt bless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God for the good land which he hath given thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Beware that thou forget not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, in not keeping his commandments, and his judgments, and his statutes, which I command thee this day: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'lest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' thou hast eaten and art full, and hast built goodly houses, and dwelt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therein
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' thy herds and thy flocks multiply, and thy silver and thy gold is multiplied, and all that thou hast is multiplied; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'then thine heart be lifted up, and thou forget the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, which brought thee forth out of the land of Egypt, from the house of bondage; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'who led thee through that great and terrible wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wherein were
  - type: text
    text: ' fiery serpents, and scorpions, and drought, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no water; who brought thee forth water out of the rock of flint; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'who fed thee in the wilderness with manna, which thy fathers knew not, that he might humble thee, and that he might prove thee, to do thee good at thy latter end; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and thou say in thine heart, My power and the might of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mine
  - type: text
    text: ' hand hath gotten me this wealth. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But thou shalt remember the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' he that giveth thee power to get wealth, that he may establish his covenant which he sware unto thy fathers, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' this day. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it shall be, if thou do at all forget the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and walk after other gods, and serve them, and worship them, I testify against you this day that ye shall surely perish. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As the nations which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' destroyeth before your face, so shall ye perish; because ye would not be obedient unto the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
