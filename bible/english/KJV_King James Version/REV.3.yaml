document_id: REV.3,1
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: And unto the angel of the church in Sardis write; These things saith he that hath the seven Spirits of God, and the seven stars; I know thy works, that thou hast a name that thou livest, and art dead.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Because thou hast kept the word of my patience, I also will keep thee from the hour of temptation, which shall come upon all the world, to try them that dwell upon the earth.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Behold, I come quickly: hold that fast which thou hast, that no man take thy crown.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Him that overcometh will I make a pillar in the temple of my God, and he shall go no more out: and I will write upon him the name of my God, and the name of the city of my God, '
  - type: text
    content: which is
  - type: text
    content: ' new Jerusalem, which cometh down out of heaven from my God: and '
  - type: text
    content: I will write upon him
  - type: text
    content: ' my new name.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: He that hath an ear, let him hear what the Spirit saith unto the churches.
  '14':
  - type: text
    content: ' '
  - type: text
    content: And unto the angel of the church of the Laodiceans write; These things saith the Amen, the faithful and true witness, the beginning of the creation of God;
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'I know thy works, that thou art neither cold nor hot: I would thou wert cold or hot.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: So then because thou art lukewarm, and neither cold nor hot, I will spue thee out of my mouth.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Because thou sayest, I am rich, and increased with goods, and have need of nothing; and knowest not that thou art wretched, and miserable, and poor, and blind, and naked:'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I counsel thee to buy of me gold tried in the fire, that thou mayest be rich; and white raiment, that thou mayest be clothed, and '
  - type: text
    content: that
  - type: text
    content: ' the shame of thy nakedness do not appear; and anoint thine eyes with eyesalve, that thou mayest see.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'As many as I love, I rebuke and chasten: be zealous therefore, and repent.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Be watchful, and strengthen the things which remain, that are ready to die: for I have not found thy works perfect before God.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Behold, I stand at the door, and knock: if any man hear my voice, and open the door, I will come in to him, and will sup with him, and he with me.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: To him that overcometh will I grant to sit with me in my throne, even as I also overcame, and am set down with my Father in his throne.
  - type: text
    content: ' '
  '22':
  - type: text
    content: He that hath an ear, let him hear what the Spirit saith unto the churches.
  '3':
  - type: text
    content: Remember therefore how thou hast received and heard, and hold fast, and repent. If therefore thou shalt not watch, I will come on thee as a thief, and thou shalt not know what hour I will come upon thee.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Thou hast a few names even in Sardis which have not defiled their garments; and they shall walk with me in white: for they are worthy.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: He that overcometh, the same shall be clothed in white raiment; and I will not blot out his name out of the book of life, but I will confess his name before my Father, and before his angels.
  - type: text
    content: ' '
  '6':
  - type: text
    content: He that hath an ear, let him hear what the Spirit saith unto the churches.
  '7':
  - type: text
    content: ' '
  - type: text
    content: And to the angel of the church in Philadelphia write; These things saith he that is holy, he that is true, he that hath the key of David, he that openeth, and no man shutteth; and shutteth, and no man openeth;
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'I know thy works: behold, I have set before thee an open door, and no man can shut it: for thou hast a little strength, and hast kept my word, and hast not denied my name.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Behold, I will make them of the synagogue of Satan, which say they are Jews, and are not, but do lie; behold, I will make them to come and worship before thy feet, and to know that I have loved thee.
  - type: text
    content: ' '
