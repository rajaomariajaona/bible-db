document_id: GEN.41,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass at the end of two full years, that Pharaoh dreamed: and, behold, he stood by the river. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Pharaoh was wroth with his servants, and put me in ward in the captain of the guard''s house, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' me and the chief baker: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and we dreamed a dream in one night, I and he; we dreamed each man according to the interpretation of his dream. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' there with us a young man, an Hebrew, servant to the captain of the guard; and we told him, and he interpreted to us our dreams; to each man according to his dream he did interpret. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And it came to pass, as he interpreted to us, so it was; me he restored unto mine office, and him he hanged.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Pharaoh sent and called Joseph, and they brought him hastily out of the dungeon: and he shaved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ', and changed his raiment, and came in unto Pharaoh. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Pharaoh said unto Joseph, I have dreamed a dream, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that can interpret it: and I have heard say of thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou canst understand a dream to interpret it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Joseph answered Pharaoh, saying, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' not in me: God shall give Pharaoh an answer of peace. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Pharaoh said unto Joseph, In my dream, behold, I stood upon the bank of the river: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and, behold, there came up out of the river seven kine, fatfleshed and well favoured; and they fed in a meadow: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and, behold, seven other kine came up after them, poor and very ill favoured and leanfleshed, such as I never saw in all the land of Egypt for badness: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And, behold, there came up out of the river seven well favoured kine and fatfleshed; and they fed in a meadow. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and the lean and the ill favoured kine did eat up the first seven fat kine: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and when they had eaten them up, it could not be known that they had eaten them; but they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' still ill favoured, as at the beginning. So I awoke. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And I saw in my dream, and, behold, seven ears came up in one stalk, full and good: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and, behold, seven ears, withered, thin, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' blasted with the east wind, sprung up after them: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and the thin ears devoured the seven good ears: and I told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' unto the magicians; but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' none that could declare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to me.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Joseph said unto Pharaoh, The dream of Pharaoh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' one: God hath shewed Pharaoh what he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' about to do. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The seven good kine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' seven years; and the seven good ears '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' seven years: the dream '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' one. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the seven thin and ill favoured kine that came up after them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' seven years; and the seven empty ears blasted with the east wind shall be seven years of famine. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which I have spoken unto Pharaoh: What God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' about to do he sheweth unto Pharaoh. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Behold, there come seven years of great plenty throughout all the land of Egypt: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And, behold, seven other kine came up after them out of the river, ill favoured and leanfleshed; and stood by the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' kine upon the brink of the river. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and there shall arise after them seven years of famine; and all the plenty shall be forgotten in the land of Egypt; and the famine shall consume the land; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and the plenty shall not be known in the land by reason of that famine following; for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' very grievous. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And for that the dream was doubled unto Pharaoh twice; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' because the thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' established by God, and God will shortly bring it to pass. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Now therefore let Pharaoh look out a man discreet and wise, and set him over the land of Egypt. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Let Pharaoh do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', and let him appoint officers over the land, and take up the fifth part of the land of Egypt in the seven plenteous years. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And let them gather all the food of those good years that come, and lay up corn under the hand of Pharaoh, and let them keep food in the cities. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: And that food shall be for store to the land against the seven years of famine, which shall be in the land of Egypt; that the land perish not through the famine.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And the thing was good in the eyes of Pharaoh, and in the eyes of all his servants. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And Pharaoh said unto his servants, Can we find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such a one
    - type: text
      text: ' as this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', a man in whom the Spirit of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: '? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And Pharaoh said unto Joseph, Forasmuch as God hath shewed thee all this, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none so discreet and wise as thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'art:'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the ill favoured and leanfleshed kine did eat up the seven well favoured and fat kine. So Pharaoh awoke. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'thou shalt be over my house, and according unto thy word shall all my people be ruled: only in the throne will I be greater than thou. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And Pharaoh said unto Joseph, See, I have set thee over all the land of Egypt. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And Pharaoh took off his ring from his hand, and put it upon Joseph''s hand, and arrayed him in vestures of fine linen, and put a gold chain about his neck; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'and he made him to ride in the second chariot which he had; and they cried before him, Bow the knee: and he made him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ruler
    - type: text
      text: ' over all the land of Egypt. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And Pharaoh said unto Joseph, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' Pharaoh, and without thee shall no man lift up his hand or foot in all the land of Egypt. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And Pharaoh called Joseph''s name Zaphnath-paaneah; and he gave him to wife Asenath the daughter of Poti-pherah priest of On. And Joseph went out over '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' the land of Egypt.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty years old when he stood before Pharaoh king of Egypt. And Joseph went out from the presence of Pharaoh, and went throughout all the land of Egypt. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And in the seven plenteous years the earth brought forth by handfuls. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'And he gathered up all the food of the seven years, which were in the land of Egypt, and laid up the food in the cities: the food of the field, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' round about every city, laid he up in the same. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'And Joseph gathered corn as the sand of the sea, very much, until he left numbering; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' without number. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And he slept and dreamed the second time: and, behold, seven ears of corn came up upon one stalk, rank and good. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'And unto Joseph were born two sons before the years of famine came, which Asenath the daughter of Poti-pherah priest of On bare unto him. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And Joseph called the name of the firstborn Manasseh: For God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: said he
    - type: text
      text: ', hath made me forget all my toil, and all my father''s house. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'And the name of the second called he Ephraim: For God hath caused me to be fruitful in the land of my affliction.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'And the seven years of plenteousness, that was in the land of Egypt, were ended. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'And the seven years of dearth began to come, according as Joseph had said: and the dearth was in all lands; but in all the land of Egypt there was bread. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'And when all the land of Egypt was famished, the people cried to Pharaoh for bread: and Pharaoh said unto all the Egyptians, Go unto Joseph; what he saith to you, do. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'And the famine was over all the face of the earth: And Joseph opened all the storehouses, and sold unto the Egyptians; and the famine waxed sore in the land of Egypt. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'And all countries came into Egypt to Joseph for to buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: corn
    - type: text
      text: '; because that the famine was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' sore in all lands.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And, behold, seven thin ears and blasted with the east wind sprung up after them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the seven thin ears devoured the seven rank and full ears. And Pharaoh awoke, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' a dream. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And it came to pass in the morning that his spirit was troubled; and he sent and called for all the magicians of Egypt, and all the wise men thereof: and Pharaoh told them his dream; but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' none that could interpret them unto Pharaoh.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then spake the chief butler unto Pharaoh, saying, I do remember my faults this day: '
