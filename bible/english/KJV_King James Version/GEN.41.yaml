verses:
  '1':
  - type: text
    content: 'And it came to pass at the end of two full years, that Pharaoh dreamed: and, behold, he stood by the river. '
  '10':
  - type: text
    content: 'Pharaoh was wroth with his servants, and put me in ward in the captain of the guard''s house, '
  - type: text
    content: both
  - type: text
    content: ' me and the chief baker: '
  '11':
  - type: text
    content: 'and we dreamed a dream in one night, I and he; we dreamed each man according to the interpretation of his dream. '
  '12':
  - type: text
    content: 'And '
  - type: text
    content: there was
  - type: text
    content: ' there with us a young man, an Hebrew, servant to the captain of the guard; and we told him, and he interpreted to us our dreams; to each man according to his dream he did interpret. '
  '13':
  - type: text
    content: And it came to pass, as he interpreted to us, so it was; me he restored unto mine office, and him he hanged.
  '14':
  - type: text
    content: 'Then Pharaoh sent and called Joseph, and they brought him hastily out of the dungeon: and he shaved '
  - type: text
    content: himself
  - type: text
    content: ', and changed his raiment, and came in unto Pharaoh. '
  '15':
  - type: text
    content: 'And Pharaoh said unto Joseph, I have dreamed a dream, and '
  - type: text
    content: there is
  - type: text
    content: ' none that can interpret it: and I have heard say of thee, '
  - type: text
    content: that
  - type: text
    content: ' thou canst understand a dream to interpret it. '
  '16':
  - type: text
    content: 'And Joseph answered Pharaoh, saying, '
  - type: text
    content: It is
  - type: text
    content: ' not in me: God shall give Pharaoh an answer of peace. '
  '17':
  - type: text
    content: 'And Pharaoh said unto Joseph, In my dream, behold, I stood upon the bank of the river: '
  '18':
  - type: text
    content: 'and, behold, there came up out of the river seven kine, fatfleshed and well favoured; and they fed in a meadow: '
  '19':
  - type: text
    content: 'and, behold, seven other kine came up after them, poor and very ill favoured and leanfleshed, such as I never saw in all the land of Egypt for badness: '
  '2':
  - type: text
    content: 'And, behold, there came up out of the river seven well favoured kine and fatfleshed; and they fed in a meadow. '
  '20':
  - type: text
    content: 'and the lean and the ill favoured kine did eat up the first seven fat kine: '
  '21':
  - type: text
    content: 'and when they had eaten them up, it could not be known that they had eaten them; but they '
  - type: text
    content: were
  - type: text
    content: ' still ill favoured, as at the beginning. So I awoke. '
  '22':
  - type: text
    content: 'And I saw in my dream, and, behold, seven ears came up in one stalk, full and good: '
  '23':
  - type: text
    content: 'and, behold, seven ears, withered, thin, '
  - type: text
    content: and
  - type: text
    content: ' blasted with the east wind, sprung up after them: '
  '24':
  - type: text
    content: 'and the thin ears devoured the seven good ears: and I told '
  - type: text
    content: this
  - type: text
    content: ' unto the magicians; but '
  - type: text
    content: there was
  - type: text
    content: ' none that could declare '
  - type: text
    content: it
  - type: text
    content: ' to me.'
  '25':
  - type: text
    content: 'And Joseph said unto Pharaoh, The dream of Pharaoh '
  - type: text
    content: is
  - type: text
    content: ' one: God hath shewed Pharaoh what he '
  - type: text
    content: is
  - type: text
    content: ' about to do. '
  '26':
  - type: text
    content: 'The seven good kine '
  - type: text
    content: are
  - type: text
    content: ' seven years; and the seven good ears '
  - type: text
    content: are
  - type: text
    content: ' seven years: the dream '
  - type: text
    content: is
  - type: text
    content: ' one. '
  '27':
  - type: text
    content: 'And the seven thin and ill favoured kine that came up after them '
  - type: text
    content: are
  - type: text
    content: ' seven years; and the seven empty ears blasted with the east wind shall be seven years of famine. '
  '28':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the thing which I have spoken unto Pharaoh: What God '
  - type: text
    content: is
  - type: text
    content: ' about to do he sheweth unto Pharaoh. '
  '29':
  - type: text
    content: 'Behold, there come seven years of great plenty throughout all the land of Egypt: '
  '3':
  - type: text
    content: 'And, behold, seven other kine came up after them out of the river, ill favoured and leanfleshed; and stood by the '
  - type: text
    content: other
  - type: text
    content: ' kine upon the brink of the river. '
  '30':
  - type: text
    content: 'and there shall arise after them seven years of famine; and all the plenty shall be forgotten in the land of Egypt; and the famine shall consume the land; '
  '31':
  - type: text
    content: 'and the plenty shall not be known in the land by reason of that famine following; for it '
  - type: text
    content: shall be
  - type: text
    content: ' very grievous. '
  '32':
  - type: text
    content: 'And for that the dream was doubled unto Pharaoh twice; '
  - type: text
    content: it is
  - type: text
    content: ' because the thing '
  - type: text
    content: is
  - type: text
    content: ' established by God, and God will shortly bring it to pass. '
  '33':
  - type: text
    content: 'Now therefore let Pharaoh look out a man discreet and wise, and set him over the land of Egypt. '
  '34':
  - type: text
    content: 'Let Pharaoh do '
  - type: text
    content: this
  - type: text
    content: ', and let him appoint officers over the land, and take up the fifth part of the land of Egypt in the seven plenteous years. '
  '35':
  - type: text
    content: 'And let them gather all the food of those good years that come, and lay up corn under the hand of Pharaoh, and let them keep food in the cities. '
  '36':
  - type: text
    content: And that food shall be for store to the land against the seven years of famine, which shall be in the land of Egypt; that the land perish not through the famine.
  '37':
  - type: text
    content: 'And the thing was good in the eyes of Pharaoh, and in the eyes of all his servants. '
  '38':
  - type: text
    content: 'And Pharaoh said unto his servants, Can we find '
  - type: text
    content: such a one
  - type: text
    content: ' as this '
  - type: text
    content: is
  - type: text
    content: ', a man in whom the Spirit of God '
  - type: text
    content: is
  - type: text
    content: '? '
  '39':
  - type: text
    content: 'And Pharaoh said unto Joseph, Forasmuch as God hath shewed thee all this, '
  - type: text
    content: there is
  - type: text
    content: ' none so discreet and wise as thou '
  - type: text
    content: 'art:'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And the ill favoured and leanfleshed kine did eat up the seven well favoured and fat kine. So Pharaoh awoke. '
  '40':
  - type: text
    content: 'thou shalt be over my house, and according unto thy word shall all my people be ruled: only in the throne will I be greater than thou. '
  '41':
  - type: text
    content: 'And Pharaoh said unto Joseph, See, I have set thee over all the land of Egypt. '
  '42':
  - type: text
    content: 'And Pharaoh took off his ring from his hand, and put it upon Joseph''s hand, and arrayed him in vestures of fine linen, and put a gold chain about his neck; '
  '43':
  - type: text
    content: 'and he made him to ride in the second chariot which he had; and they cried before him, Bow the knee: and he made him '
  - type: text
    content: ruler
  - type: text
    content: ' over all the land of Egypt. '
  '44':
  - type: text
    content: 'And Pharaoh said unto Joseph, I '
  - type: text
    content: am
  - type: text
    content: ' Pharaoh, and without thee shall no man lift up his hand or foot in all the land of Egypt. '
  '45':
  - type: text
    content: 'And Pharaoh called Joseph''s name Zaphnath-paaneah; and he gave him to wife Asenath the daughter of Poti-pherah priest of On. And Joseph went out over '
  - type: text
    content: all
  - type: text
    content: ' the land of Egypt.'
  '46':
  - type: text
    content: 'And Joseph '
  - type: text
    content: was
  - type: text
    content: ' thirty years old when he stood before Pharaoh king of Egypt. And Joseph went out from the presence of Pharaoh, and went throughout all the land of Egypt. '
  '47':
  - type: text
    content: 'And in the seven plenteous years the earth brought forth by handfuls. '
  '48':
  - type: text
    content: 'And he gathered up all the food of the seven years, which were in the land of Egypt, and laid up the food in the cities: the food of the field, which '
  - type: text
    content: was
  - type: text
    content: ' round about every city, laid he up in the same. '
  '49':
  - type: text
    content: 'And Joseph gathered corn as the sand of the sea, very much, until he left numbering; for '
  - type: text
    content: it was
  - type: text
    content: ' without number. '
  '5':
  - type: text
    content: 'And he slept and dreamed the second time: and, behold, seven ears of corn came up upon one stalk, rank and good. '
  '50':
  - type: text
    content: 'And unto Joseph were born two sons before the years of famine came, which Asenath the daughter of Poti-pherah priest of On bare unto him. '
  '51':
  - type: text
    content: 'And Joseph called the name of the firstborn Manasseh: For God, '
  - type: text
    content: said he
  - type: text
    content: ', hath made me forget all my toil, and all my father''s house. '
  '52':
  - type: text
    content: 'And the name of the second called he Ephraim: For God hath caused me to be fruitful in the land of my affliction.'
  '53':
  - type: text
    content: 'And the seven years of plenteousness, that was in the land of Egypt, were ended. '
  '54':
  - type: text
    content: 'And the seven years of dearth began to come, according as Joseph had said: and the dearth was in all lands; but in all the land of Egypt there was bread. '
  '55':
  - type: text
    content: 'And when all the land of Egypt was famished, the people cried to Pharaoh for bread: and Pharaoh said unto all the Egyptians, Go unto Joseph; what he saith to you, do. '
  '56':
  - type: text
    content: 'And the famine was over all the face of the earth: And Joseph opened all the storehouses, and sold unto the Egyptians; and the famine waxed sore in the land of Egypt. '
  '57':
  - type: text
    content: 'And all countries came into Egypt to Joseph for to buy '
  - type: text
    content: corn
  - type: text
    content: '; because that the famine was '
  - type: text
    content: so
  - type: text
    content: ' sore in all lands.'
  '6':
  - type: text
    content: 'And, behold, seven thin ears and blasted with the east wind sprung up after them. '
  '7':
  - type: text
    content: 'And the seven thin ears devoured the seven rank and full ears. And Pharaoh awoke, and, behold, '
  - type: text
    content: it was
  - type: text
    content: ' a dream. '
  '8':
  - type: text
    content: 'And it came to pass in the morning that his spirit was troubled; and he sent and called for all the magicians of Egypt, and all the wise men thereof: and Pharaoh told them his dream; but '
  - type: text
    content: there was
  - type: text
    content: ' none that could interpret them unto Pharaoh.'
  '9':
  - type: text
    content: 'Then spake the chief butler unto Pharaoh, saying, I do remember my faults this day: '
