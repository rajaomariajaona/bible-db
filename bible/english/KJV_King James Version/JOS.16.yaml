document_id: JOS.16,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the lot of the children of Joseph fell from Jordan by Jericho, unto the water of Jericho on the east, to the wilderness that goeth up from Jericho throughout mount Beth-el, '
  '10':
  - type: text
    content: 'And they drave not out the Canaanites that dwelt in Gezer: but the Canaanites dwell among the Ephraimites unto this day, and serve under tribute.'
  '2':
  - type: text
    content: 'and goeth out from Beth-el to Luz, and passeth along unto the borders of Archi to Ataroth, '
  '3':
  - type: text
    content: 'and goeth down westward to the coast of Japhleti, unto the coast of Beth-horon the nether, and to Gezer: and the goings out thereof are at the sea. '
  '4':
  - type: text
    content: So the children of Joseph, Manasseh and Ephraim, took their inheritance.
  '5':
  - type: text
    content: 'And the border of the children of Ephraim according to their families was '
  - type: text
    content: 'thus:'
  - type: text
    content: ' even the border of their inheritance on the east side was Ataroth-addar, unto Beth-horon the upper; '
  '6':
  - type: text
    content: 'and the border went out toward the sea to Michmethah on the north side; and the border went about eastward unto Taanath-shiloh, and passed by it on the east to Janohah; '
  '7':
  - type: text
    content: 'and it went down from Janohah to Ataroth, and to Naarath, and came to Jericho, and went out at Jordan. '
  '8':
  - type: text
    content: 'The border went out from Tappuah westward unto the river Kanah; and the goings out thereof were at the sea. This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Ephraim by their families. '
  '9':
  - type: text
    content: 'And the separate cities for the children of Ephraim '
  - type: text
    content: were
  - type: text
    content: ' among the inheritance of the children of Manasseh, all the cities with their villages. '
