document_id: EZK.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover he said unto me, Son of man, eat that thou findest; eat this roll, and go speak unto the house of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover he said unto me, Son of man, all my words that I shall speak unto thee receive in thine heart, and hear with thine ears. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And go, get thee to them of the captivity, unto the children of thy people, and speak unto them, and tell them, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ; whether they will hear, or whether they will forbear.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the spirit took me up, and I heard behind me a voice of a great rushing, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' from his place. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: I heard
    - type: text
      text: ' also the noise of the wings of the living creatures that touched one another, and the noise of the wheels over against them, and a noise of a great rushing. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the spirit lifted me up, and took me away, and I went in bitterness, in the heat of my spirit; but the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was strong upon me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I came to them of the captivity at Tel-abib, that dwelt by the river of Chebar, and I sat where they sat, and remained there astonished among them seven days.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Mission
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the end of seven days, that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, I have made thee a watchman unto the house of Israel: therefore hear the word at my mouth, and give them warning from me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I say unto the wicked, Thou shalt surely die; and thou givest him not warning, nor speakest to warn the wicked from his wicked way, to save his life; the same wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' shall die in his iniquity; but his blood will I require at thine hand. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet if thou warn the wicked, and he turn not from his wickedness, nor from his wicked way, he shall die in his iniquity; but thou hast delivered thy soul. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I opened my mouth, and he caused me to eat that roll. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again, When a righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' doth turn from his righteousness, and commit iniquity, and I lay a stumblingblock before him, he shall die: because thou hast not given him warning, he shall die in his sin, and his righteousness which he hath done shall not be remembered; but his blood will I require at thine hand. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless if thou warn the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', that the righteous sin not, and he doth not sin, he shall surely live, because he is warned; also thou hast delivered thy soul.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was there upon me; and he said unto me, Arise, go forth into the plain, and I will there talk with thee. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I arose, and went forth into the plain: and, behold, the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' stood there, as the glory which I saw by the river of Chebar: and I fell on my face. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the spirit entered into me, and set me upon my feet, and spake with me, and said unto me, Go, shut thyself within thine house. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thou, O son of man, behold, they shall put bands upon thee, and shall bind thee with them, and thou shalt not go out among them: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will make thy tongue cleave to the roof of thy mouth, that thou shalt be dumb, and shalt not be to them a reprover: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a rebellious house. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when I speak with thee, I will open thy mouth, and thou shalt say unto them, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; He that heareth, let him hear; and he that forbeareth, let him forbear: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a rebellious house.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto me, Son of man, cause thy belly to eat, and fill thy bowels with this roll that I give thee. Then did I eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ; and it was in my mouth as honey for sweetness.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto me, Son of man, go, get thee unto the house of Israel, and speak with my words unto them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' not sent to a people of a strange speech and of an hard language, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' to the house of Israel; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not to many people of a strange speech and of an hard language, whose words thou canst not understand. Surely, had I sent thee to them, they would have hearkened unto thee. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the house of Israel will not hearken unto thee; for they will not hearken unto me: for all the house of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' impudent and hardhearted. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I have made thy face strong against their faces, and thy forehead strong against their foreheads. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As an adamant harder than flint have I made thy forehead: fear them not, neither be dismayed at their looks, though they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a rebellious house. '
