  - type: text
    content: LORD
  - type: text
    content: ' our God, to leave us a remnant to escape, and to give us a nail in his holy place, that our God may lighten our eyes, and give us a little reviving in our bondage. '
  '9':
  - type: text
    content: 'For we '
  - type: text
