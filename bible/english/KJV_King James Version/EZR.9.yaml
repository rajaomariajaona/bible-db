    content: Foreign Marriages
  - type: text
    content: 'Now when these things were done, the princes came to me, saying, The people of Israel, and the priests, and the Levites, have not separated themselves from the people of the lands, '
  - type: text
    content: doing
  - type: text
    content: ' according to their abominations, '
  - type: text
    content: even
  - type: text
    content: ' of the Canaanites, the Hittites, the Perizzites, the Jebusites, the Ammonites, the Moabites, the Egyptians, and the Amorites. '
  '10':
  - type: text
    content: 'And now, O our God, what shall we say after this? for we have forsaken thy commandments, '
  '11':
  - type: text
    content: 'which thou hast commanded by thy servants the prophets, saying, The land, unto which ye go to possess it, is an unclean land with the filthiness of the people of the lands, with their abominations, which have filled it from one end to another with their uncleanness. '
  '12':
  - type: text
    content: 'Now therefore give not your daughters unto their sons, neither take their daughters unto your sons, nor seek their peace or their wealth for ever: that ye may be strong, and eat the good of the land, and leave '
  - type: text
    content: it
  - type: text
    content: ' for an inheritance to your children for ever. '
  '13':
  - type: text
    content: 'And after all that is come upon us for our evil deeds, and for our great trespass, seeing that thou our God hast punished us less than our iniquities '
  - type: text
    content: deserve
  - type: text
    content: ', and hast given us '
  - type: text
    content: such
  - type: text
    content: ' deliverance as this; '
  '14':
  - type: text
    content: 'should we again break thy commandments, and join in affinity with the people of these abominations? wouldest not thou be angry with us till thou hadst consumed '
  - type: text
    content: us
  - type: text
    content: ', so that '
  - type: text
    content: there should be
  - type: text
    content: ' no remnant nor escaping? '
  '15':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, thou '
  - type: text
    content: art
  - type: text
    content: ' righteous: for we remain yet escaped, as '
  - type: text
    content: it is
  - type: text
    content: ' this day: behold, we '
  - type: text
    content: are
  - type: text
    content: ' before thee in our trespasses: for we cannot stand before thee because of this.'
  '2':
  - type: text
    content: 'For they have taken of their daughters for themselves, and for their sons: so that the holy seed have mingled themselves with the people of '
  - type: text
    content: those
  - type: text
    content: ' lands: yea, the hand of the princes and rulers hath been chief in this trespass. '
  '3':
  - type: text
    content: 'And when I heard this thing, I rent my garment and my mantle, and plucked off the hair of my head and of my beard, and sat down astonied. '
  '4':
  - type: text
    content: Then were assembled unto me every one that trembled at the words of the God of Israel, because of the transgression of those that had been carried away; and I sat astonied until the evening sacrifice.
  '5':
  - type: text
    content: 'And at the evening sacrifice I arose up from my heaviness; and having rent my garment and my mantle, I fell upon my knees, and spread out my hands unto the '
  - type: text
    content: LORD
  - type: text
    content: ' my God, '
  '6':
  - type: text
    content: 'and said, O my God, I am ashamed and blush to lift up my face to thee, my God: for our iniquities are increased over '
  - type: text
    content: our
  - type: text
    content: ' head, and our trespass is grown up unto the heavens. '
  '7':
  - type: text
    content: 'Since the days of our fathers '
  - type: text
    content: have
  - type: text
    content: ' we '
  - type: text
    content: been
  - type: text
    content: ' in a great trespass unto this day; and for our iniquities have we, our kings, '
  - type: text
    content: and
  - type: text
    content: ' our priests, been delivered into the hand of the kings of the lands, to the sword, to captivity, and to a spoil, and to confusion of face, as '
  - type: text
    content: it is
  - type: text
