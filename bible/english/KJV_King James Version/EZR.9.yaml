document_id: EZR.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Foreign Marriages
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when these things were done, the princes came to me, saying, The people of Israel, and the priests, and the Levites, have not separated themselves from the people of the lands, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doing
    - type: text
      text: ' according to their abominations, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the Canaanites, the Hittites, the Perizzites, the Jebusites, the Ammonites, the Moabites, the Egyptians, and the Amorites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, O our God, what shall we say after this? for we have forsaken thy commandments, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which thou hast commanded by thy servants the prophets, saying, The land, unto which ye go to possess it, is an unclean land with the filthiness of the people of the lands, with their abominations, which have filled it from one end to another with their uncleanness. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore give not your daughters unto their sons, neither take their daughters unto your sons, nor seek their peace or their wealth for ever: that ye may be strong, and eat the good of the land, and leave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for an inheritance to your children for ever. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after all that is come upon us for our evil deeds, and for our great trespass, seeing that thou our God hast punished us less than our iniquities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: deserve
    - type: text
      text: ', and hast given us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such
    - type: text
      text: ' deliverance as this; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'should we again break thy commandments, and join in affinity with the people of these abominations? wouldest not thou be angry with us till thou hadst consumed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', so that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there should be
    - type: text
      text: ' no remnant nor escaping? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' righteous: for we remain yet escaped, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' this day: behold, we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' before thee in our trespasses: for we cannot stand before thee because of this.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they have taken of their daughters for themselves, and for their sons: so that the holy seed have mingled themselves with the people of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those
    - type: text
      text: ' lands: yea, the hand of the princes and rulers hath been chief in this trespass. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I heard this thing, I rent my garment and my mantle, and plucked off the hair of my head and of my beard, and sat down astonied. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then were assembled unto me every one that trembled at the words of the God of Israel, because of the transgression of those that had been carried away; and I sat astonied until the evening sacrifice.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at the evening sacrifice I arose up from my heaviness; and having rent my garment and my mantle, I fell upon my knees, and spread out my hands unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, O my God, I am ashamed and blush to lift up my face to thee, my God: for our iniquities are increased over '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' head, and our trespass is grown up unto the heavens. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since the days of our fathers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ' we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: been
    - type: text
      text: ' in a great trespass unto this day; and for our iniquities have we, our kings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' our priests, been delivered into the hand of the kings of the lands, to the sword, to captivity, and to a spoil, and to confusion of face, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' this day. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now for a little space grace hath been '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shewed
    - type: text
      text: ' from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, to leave us a remnant to escape, and to give us a nail in his holy place, that our God may lighten our eyes, and give us a little reviving in our bondage. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' bondmen; yet our God hath not forsaken us in our bondage, but hath extended mercy unto us in the sight of the kings of Persia, to give us a reviving, to set up the house of our God, and to repair the desolations thereof, and to give us a wall in Judah and in Jerusalem. '
