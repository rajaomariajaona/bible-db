document_id: NUM.33,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Itinerary of the Journey
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the journeys of the children of Israel, which went forth out of the land of Egypt with their armies under the hand of Moses and Aaron. '
  '10':
  - type: text
    content: 'And they removed from Elim, and encamped by the Red sea. '
  '11':
  - type: text
    content: 'And they removed from the Red sea, and encamped in the wilderness of Sin. '
  '12':
  - type: text
    content: 'And they took their journey out of the wilderness of Sin, and encamped in Dophkah. '
  '13':
  - type: text
    content: 'And they departed from Dophkah, and encamped in Alush. '
  '14':
  - type: text
    content: 'And they removed from Alush, and encamped at Rephidim, where was no water for the people to drink. '
  '15':
  - type: text
    content: 'And they departed from Rephidim, and pitched in the wilderness of Sinai. '
  '16':
  - type: text
    content: 'And they removed from the desert of Sinai, and pitched at Kibroth-hattaavah. '
  '17':
  - type: text
    content: 'And they departed from Kibroth-hattaavah, and encamped at Hazeroth. '
  '18':
  - type: text
    content: 'And they departed from Hazeroth, and pitched in Rithmah. '
  '19':
  - type: text
    content: 'And they departed from Rithmah, and pitched at Rimmon-parez. '
  '2':
  - type: text
    content: 'And Moses wrote their goings out according to their journeys by the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ': and these '
  - type: text
    content: are
  - type: text
    content: ' their journeys according to their goings out. '
  '20':
  - type: text
    content: 'And they departed from Rimmon-parez, and pitched in Libnah. '
  '21':
  - type: text
    content: 'And they removed from Libnah, and pitched at Rissah. '
  '22':
  - type: text
    content: 'And they journeyed from Rissah, and pitched in Kehelathah. '
  '23':
  - type: text
    content: 'And they went from Kehelathah, and pitched in mount Shapher. '
  '24':
  - type: text
    content: 'And they removed from mount Shapher, and encamped in Haradah. '
  '25':
  - type: text
    content: 'And they removed from Haradah, and pitched in Makheloth. '
  '26':
  - type: text
    content: 'And they removed from Makheloth, and encamped at Tahath. '
  '27':
  - type: text
    content: 'And they departed from Tahath, and pitched at Tarah. '
  '28':
  - type: text
    content: 'And they removed from Tarah, and pitched in Mithcah. '
  '29':
  - type: text
    content: 'And they went from Mithcah, and pitched in Hashmonah. '
  '3':
  - type: text
    content: 'And they departed from Rameses in the first month, on the fifteenth day of the first month; on the morrow after the passover the children of Israel went out with an high hand in the sight of all the Egyptians. '
  '30':
  - type: text
    content: 'And they departed from Hashmonah, and encamped at Moseroth. '
  '31':
  - type: text
    content: 'And they departed from Moseroth, and pitched in Bene-jaakan. '
  '32':
  - type: text
    content: 'And they removed from Bene-jaakan, and encamped at Hor-hagidgad. '
  '33':
  - type: text
    content: 'And they went from Hor-hagidgad, and pitched in Jotbathah. '
  '34':
  - type: text
    content: 'And they removed from Jotbathah, and encamped at Ebronah. '
  '35':
  - type: text
    content: 'And they departed from Ebronah, and encamped at Ezion-geber. '
  '36':
  - type: text
    content: 'And they removed from Ezion-geber, and pitched in the wilderness of Zin, which '
  - type: text
    content: is
  - type: text
    content: ' Kadesh. '
  '37':
  - type: text
    content: And they removed from Kadesh, and pitched in mount Hor, in the edge of the land of Edom.
  '38':
  - type: text
    content: 'And Aaron the priest went up into mount Hor at the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ', and died there, in the fortieth year after the children of Israel were come out of the land of Egypt, in the first '
  - type: text
    content: day
  - type: text
    content: ' of the fifth month. '
  '39':
  - type: text
    content: 'And Aaron '
  - type: text
    content: was
  - type: text
    content: ' an hundred and twenty and three years old when he died in mount Hor.'
  '4':
  - type: text
    content: 'For the Egyptians buried all '
  - type: text
    content: their
  - type: text
    content: ' firstborn, which the '
  - type: text
    content: LORD
  - type: text
    content: ' had smitten among them: upon their gods also the '
  - type: text
    content: LORD
  - type: text
    content: ' executed judgments.'
  '40':
  - type: text
    content: 'And king Arad the Canaanite, which dwelt in the south in the land of Canaan, heard of the coming of the children of Israel. '
  '41':
  - type: text
    content: 'And they departed from mount Hor, and pitched in Zalmonah. '
  '42':
  - type: text
    content: 'And they departed from Zalmonah, and pitched in Punon. '
  '43':
  - type: text
    content: And they departed from Punon, and pitched in Oboth.
  '44':
  - type: text
    content: 'And they departed from Oboth, and pitched in Ije-abarim, in the border of Moab. '
  '45':
  - type: text
    content: 'And they departed from Iim, and pitched in Dibon-gad. '
  '46':
  - type: text
    content: 'And they removed from Dibon-gad, and encamped in Almon-diblathaim. '
  '47':
  - type: text
    content: 'And they removed from Almon-diblathaim, and pitched in the mountains of Abarim, before Nebo. '
  '48':
  - type: text
    content: 'And they departed from the mountains of Abarim, and pitched in the plains of Moab by Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho. '
  '49':
  - type: text
    content: 'And they pitched by Jordan, from Beth-jeshimoth '
  - type: text
    content: even
  - type: text
    content: ' unto Abel-shittim in the plains of Moab.'
  - type: heading
    content: Division of Canaan
  '5':
  - type: text
    content: 'And the children of Israel removed from Rameses, and pitched in Succoth. '
  '50':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses in the plains of Moab by Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho, saying, '
  '51':
  - type: text
    content: 'Speak unto the children of Israel, and say unto them, When ye are passed over Jordan into the land of Canaan; '
  '52':
  - type: text
    content: 'then ye shall drive out all the inhabitants of the land from before you, and destroy all their pictures, and destroy all their molten images, and quite pluck down all their high places: '
  '53':
  - type: text
    content: 'and ye shall dispossess '
  - type: text
    content: the inhabitants of
  - type: text
    content: ' the land, and dwell therein: for I have given you the land to possess it. '
  '54':
  - type: text
    content: 'And ye shall divide the land by lot for an inheritance among your families: '
  - type: text
    content: and
  - type: text
    content: ' to the more ye shall give the more inheritance, and to the fewer ye shall give the less inheritance: every man''s '
  - type: text
    content: inheritance
  - type: text
    content: ' shall be in the place where his lot falleth; according to the tribes of your fathers ye shall inherit. '
  '55':
  - type: text
    content: 'But if ye will not drive out the inhabitants of the land from before you; then it shall come to pass, that those which ye let remain of them '
  - type: text
    content: shall be
  - type: text
    content: ' pricks in your eyes, and thorns in your sides, and shall vex you in the land wherein ye dwell. '
  '56':
  - type: text
    content: 'Moreover it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' I shall do unto you, as I thought to do unto them.'
  '6':
  - type: text
    content: 'And they departed from Succoth, and pitched in Etham, which '
  - type: text
    content: is
  - type: text
    content: ' in the edge of the wilderness. '
  '7':
  - type: text
    content: 'And they removed from Etham, and turned again unto Pi-hahiroth, which '
  - type: text
    content: is
  - type: text
    content: ' before Baal-zephon: and they pitched before Migdol. '
  '8':
  - type: text
    content: 'And they departed from before Pi-hahiroth, and passed through the midst of the sea into the wilderness, and went three days'' journey in the wilderness of Etham, and pitched in Marah. '
  '9':
  - type: text
    content: 'And they removed from Marah, and came unto Elim: and in Elim '
  - type: text
    content: were
  - type: text
    content: ' twelve fountains of water, and threescore and ten palm trees; and they pitched there. '
