document_id: EXO.36,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then wrought Bezaleel and Aholiab, and every wise hearted man, in whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' put wisdom and understanding to know how to work all manner of work for the service of the sanctuary, according to all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he coupled the five curtains one unto another: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the other
    - type: text
      text: ' five curtains he coupled one unto another. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he made loops of blue on the edge of one curtain from the selvedge in the coupling: likewise he made in the uttermost side of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' curtain, in the coupling of the second. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fifty loops made he in one curtain, and fifty loops made he in the edge of the curtain which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the coupling of the second: the loops held one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: curtain
    - type: text
      text: ' to another. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he made fifty taches of gold, and coupled the curtains one unto another with the taches: so it became one tabernacle.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he made curtains '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' goats'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: ' for the tent over the tabernacle: eleven curtains he made them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The length of one curtain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty cubits, and four cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the breadth of one curtain: the eleven curtains '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of one size. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he coupled five curtains by themselves, and six curtains by themselves. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he made fifty loops upon the uttermost edge of the curtain in the coupling, and fifty loops made he upon the edge of the curtain which coupleth the second. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he made fifty taches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass to couple the tent together, that it might be one. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he made a covering for the tent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' rams'' skins dyed red, and a covering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' badgers'' skins above '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Moses called Bezaleel and Aholiab, and every wise hearted man, in whose heart the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had put wisdom, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' every one whose heart stirred him up to come unto the work to do it: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he made boards for the tabernacle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood, standing up. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The length of a board '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' ten cubits, and the breadth of a board one cubit and a half. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'One board had two tenons, equally distant one from another: thus did he make for all the boards of the tabernacle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he made boards for the tabernacle; twenty boards for the south side southward: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and forty sockets of silver he made under the twenty boards; two sockets under one board for his two tenons, and two sockets under another board for his two tenons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And for the other side of the tabernacle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' toward the north corner, he made twenty boards, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and their forty sockets of silver; two sockets under one board, and two sockets under another board. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And for the sides of the tabernacle westward he made six boards. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And two boards made he for the corners of the tabernacle in the two sides. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And they were coupled beneath, and coupled together at the head thereof, to one ring: thus he did to both of them in both the corners. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and they received of Moses all the offering, which the children of Israel had brought for the work of the service of the sanctuary, to make it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: withal
    - type: text
      text: '. And they brought yet unto him free offerings every morning. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And there were eight boards; and their sockets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sixteen sockets of silver, under every board two sockets.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And he made bars of shittim wood; five for the boards of the one side of the tabernacle, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'and five bars for the boards of the other side of the tabernacle, and five bars for the boards of the tabernacle for the sides westward. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And he made the middle bar to shoot through the boards from the one end to the other. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And he overlaid the boards with gold, and made their rings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' places for the bars, and overlaid the bars with gold.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And he made a vail '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and purple, and scarlet, and fine twined linen: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' cherubims made he it of cunning work. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And he made thereunto four pillars '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wood
    - type: text
      text: ', and overlaid them with gold: their hooks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' gold; and he cast for them four sockets of silver. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And he made an hanging for the tabernacle door '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and purple, and scarlet, and fine twined linen, of needlework; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'and the five pillars of it with their hooks: and he overlaid their chapiters and their fillets with gold: but their five sockets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' brass.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And all the wise men, that wrought all the work of the sanctuary, came every man from his work which they made; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they spake unto Moses, saying, The people bring much more than enough for the service of the work, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded to make. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Moses gave commandment, and they caused it to be proclaimed throughout the camp, saying, Let neither man nor woman make any more work for the offering of the sanctuary. So the people were restrained from bringing. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For the stuff they had was sufficient for all the work to make it, and too much.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Tabernacle
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And every wise hearted man among them that wrought the work of the tabernacle made ten curtains '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine twined linen, and blue, and purple, and scarlet: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' cherubims of cunning work made he them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The length of one curtain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and eight cubits, and the breadth of one curtain four cubits: the curtains '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' all of one size. '
