document_id: 2KI.22,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah
  - type: text
    content: 'Josiah '
  - type: text
    content: was
  - type: text
    content: ' eight years old when he began to reign, and he reigned thirty and one years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Jedidah, the daughter of Adaiah of Boscath. '
  '10':
  - type: text
    content: 'And Shaphan the scribe shewed the king, saying, Hilkiah the priest hath delivered me a book. And Shaphan read it before the king. '
  '11':
  - type: text
    content: 'And it came to pass, when the king had heard the words of the book of the law, that he rent his clothes. '
  '12':
  - type: text
    content: 'And the king commanded Hilkiah the priest, and Ahikam the son of Shaphan, and Achbor the son of Michaiah, and Shaphan the scribe, and Asahiah a servant of the king''s, saying, '
  '13':
  - type: text
    content: 'Go ye, enquire of the '
  - type: text
    content: LORD
  - type: text
    content: ' for me, and for the people, and for all Judah, concerning the words of this book that is found: for great '
  - type: text
    content: is
  - type: text
    content: ' the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' that is kindled against us, because our fathers have not hearkened unto the words of this book, to do according unto all that which is written concerning us.'
  '14':
  - type: text
    content: 'So Hilkiah the priest, and Ahikam, and Achbor, and Shaphan, and Asahiah, went unto Huldah the prophetess, the wife of Shallum the son of Tikvah, the son of Harhas, keeper of the wardrobe; (now she dwelt in Jerusalem in the college;) and they communed with her. '
  '15':
  - type: text
    content: 'And she said unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, Tell the man that sent you to me, '
  '16':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Behold, I will bring evil upon this place, and upon the inhabitants thereof, '
  - type: text
    content: even
  - type: text
    content: ' all the words of the book which the king of Judah hath read: '
  '17':
  - type: text
    content: 'because they have forsaken me, and have burned incense unto other gods, that they might provoke me to anger with all the works of their hands; therefore my wrath shall be kindled against this place, and shall not be quenched. '
  '18':
  - type: text
    content: 'But to the king of Judah which sent you to enquire of the '
  - type: text
    content: LORD
  - type: text
    content: ', thus shall ye say to him, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, '
  - type: text
    content: As touching
  - type: text
    content: ' the words which thou hast heard; '
  '19':
  - type: text
    content: 'because thine heart was tender, and thou hast humbled thyself before the '
  - type: text
    content: LORD
  - type: text
    content: ', when thou heardest what I spake against this place, and against the inhabitants thereof, that they should become a desolation and a curse, and hast rent thy clothes, and wept before me; I also have heard '
  - type: text
    content: thee
  - type: text
    content: ', saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and walked in all the way of David his father, and turned not aside to the right hand or to the left.'
  - type: heading
    content: The Repair of the Temple
  '20':
  - type: text
    content: Behold therefore, I will gather thee unto thy fathers, and thou shalt be gathered into thy grave in peace; and thine eyes shall not see all the evil which I will bring upon this place. And they brought the king word again.
  '3':
  - type: text
    content: 'And it came to pass in the eighteenth year of king Josiah, '
  - type: text
    content: that
  - type: text
    content: ' the king sent Shaphan the son of Azaliah, the son of Meshullam, the scribe, to the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '4':
  - type: text
    content: 'Go up to Hilkiah the high priest, that he may sum the silver which is brought into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', which the keepers of the door have gathered of the people: '
  '5':
  - type: text
    content: 'and let them deliver it into the hand of the doers of the work, that have the oversight of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': and let them give it to the doers of the work which '
  - type: text
    content: is
  - type: text
    content: ' in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', to repair the breaches of the house, '
  '6':
  - type: text
    content: 'unto carpenters, and builders, and masons, and to buy timber and hewn stone to repair the house. '
  '7':
  - type: text
    content: Howbeit there was no reckoning made with them of the money that was delivered into their hand, because they dealt faithfully.
  - type: heading
    content: The Book of the Law
  '8':
  - type: text
    content: 'And Hilkiah the high priest said unto Shaphan the scribe, I have found the book of the law in the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. And Hilkiah gave the book to Shaphan, and he read it. '
  '9':
  - type: text
    content: 'And Shaphan the scribe came to the king, and brought the king word again, and said, Thy servants have gathered the money that was found in the house, and have delivered it into the hand of them that do the work, that have the oversight of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
