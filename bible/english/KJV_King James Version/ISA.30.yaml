verses:
  '1':
  - type: heading
    content: Relations with Egypt
  - type: text
    content: 'Woe to the rebellious children, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that take counsel, but not of me; and that cover with a covering, but not of my spirit, that they may add sin to sin: '
  '10':
  - type: text
    content: 'which say to the seers, See not; and to the prophets, Prophesy not unto us right things, speak unto us smooth things, prophesy deceits: '
  '11':
  - type: text
    content: get you out of the way, turn aside out of the path, cause the Holy One of Israel to cease from before us.
  '12':
  - type: text
    content: 'Wherefore thus saith the Holy One of Israel, Because ye despise this word, and trust in oppression and perverseness, and stay thereon: '
  '13':
  - type: text
    content: 'therefore this iniquity shall be to you as a breach ready to fall, swelling out in an high wall, whose breaking cometh suddenly at an instant. '
  '14':
  - type: text
    content: 'And he shall break it as the breaking of the potters'' vessel that is broken in pieces; he shall not spare: so that there shall not be found in the bursting of it a sherd to take fire from the hearth, or to take water '
  - type: text
    content: withal
  - type: text
    content: ' out of the pit.'
  '15':
  - type: text
    content: 'For thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', the Holy One of Israel; In returning and rest shall ye be saved; in quietness and in confidence shall be your strength: and ye would not. '
  '16':
  - type: text
    content: 'But ye said, No; for we will flee upon horses; therefore shall ye flee: and, We will ride upon the swift; therefore shall they that pursue you be swift. '
  '17':
  - type: text
    content: 'One thousand '
  - type: text
    content: shall flee
  - type: text
    content: ' at the rebuke of one; at the rebuke of five shall ye flee: till ye be left as a beacon upon the top of a mountain, and as an ensign on an hill.'
  '18':
  - type: text
    content: 'And therefore will the '
  - type: text
    content: LORD
  - type: text
    content: ' wait, that he may be gracious unto you, and therefore will he be exalted, that he may have mercy upon you: for the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a God of judgment: blessed '
  - type: text
    content: are
  - type: text
    content: ' all they that wait for him. '
  '19':
  - type: text
    content: 'For the people shall dwell in Zion at Jerusalem: thou shalt weep no more: he will be very gracious unto thee at the voice of thy cry; when he shall hear it, he will answer thee. '
  '2':
  - type: text
    content: 'that walk to go down into Egypt, and have not asked at my mouth; to strengthen themselves in the strength of Pharaoh, and to trust in the shadow of Egypt! '
  '20':
  - type: text
    content: 'And '
  - type: text
    content: though
  - type: text
    content: ' the Lord give you the bread of adversity, and the water of affliction, yet shall not thy teachers be removed into a corner any more, but thine eyes shall see thy teachers: '
  '21':
  - type: text
    content: 'and thine ears shall hear a word behind thee, saying, This '
  - type: text
    content: is
  - type: text
    content: ' the way, walk ye in it, when ye turn to the right hand, and when ye turn to the left. '
  '22':
  - type: text
    content: 'Ye shall defile also the covering of thy graven images of silver, and the ornament of thy molten images of gold: thou shalt cast them away as a menstruous cloth; thou shalt say unto it, Get thee hence.'
  '23':
  - type: text
    content: 'Then shall he give the rain of thy seed, that thou shalt sow the ground withal; and bread of the increase of the earth, and it shall be fat and plenteous: in that day shall thy cattle feed in large pastures. '
  '24':
  - type: text
    content: 'The oxen likewise and the young asses that ear the ground shall eat clean provender, which hath been winnowed with the shovel and with the fan. '
  '25':
  - type: text
    content: 'And there shall be upon every high mountain, and upon every high hill, rivers '
  - type: text
    content: and
  - type: text
    content: ' streams of waters in the day of the great slaughter, when the towers fall. '
  '26':
  - type: text
    content: 'Moreover the light of the moon shall be as the light of the sun, and the light of the sun shall be sevenfold, as the light of seven days, in the day that the '
  - type: text
    content: LORD
  - type: text
    content: ' bindeth up the breach of his people, and healeth the stroke of their wound.'
  '27':
  - type: text
    content: 'Behold, the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' cometh from far, burning '
  - type: text
    content: with
  - type: text
    content: ' his anger, and the burden '
  - type: text
    content: thereof is
  - type: text
    content: ' heavy: his lips are full of indignation, and his tongue as a devouring fire: '
  '28':
  - type: text
    content: 'and his breath, as an overflowing stream, shall reach to the midst of the neck, to sift the nations with the sieve of vanity: and '
  - type: text
    content: there shall be
  - type: text
    content: ' a bridle in the jaws of the people, causing '
  - type: text
    content: them
  - type: text
    content: ' to err. '
  '29':
  - type: text
    content: 'Ye shall have a song, as in the night '
  - type: text
    content: when
  - type: text
    content: ' a holy solemnity is kept; and gladness of heart, as when one goeth with a pipe to come into the mountain of the '
  - type: text
    content: LORD
  - type: text
    content: ', to the mighty One of Israel. '
  '3':
  - type: text
    content: 'Therefore shall the strength of Pharaoh be your shame, and the trust in the shadow of Egypt '
  - type: text
    content: your
  - type: text
    content: ' confusion. '
  '30':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall cause his glorious voice to be heard, and shall shew the lighting down of his arm, with the indignation of '
  - type: text
    content: his
  - type: text
    content: ' anger, and '
  - type: text
    content: with
  - type: text
    content: ' the flame of a devouring fire, '
  - type: text
    content: with
  - type: text
    content: ' scattering, and tempest, and hailstones. '
  '31':
  - type: text
    content: 'For through the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall the Assyrian be beaten down, '
  - type: text
    content: which
  - type: text
    content: ' smote with a rod. '
  '32':
  - type: text
    content: 'And '
  - type: text
    content: in
  - type: text
    content: ' every place where the grounded staff shall pass, which the '
  - type: text
    content: LORD
  - type: text
    content: ' shall lay upon him, '
  - type: text
    content: it
  - type: text
    content: ' shall be with tabrets and harps: and in battles of shaking will he fight with it. '
  '33':
  - type: text
    content: 'For Tophet '
  - type: text
    content: is
  - type: text
    content: ' ordained of old; yea, for the king it is prepared; he hath made '
  - type: text
    content: it
  - type: text
    content: ' deep '
  - type: text
    content: and
  - type: text
    content: ' large: the pile thereof '
  - type: text
    content: is
  - type: text
    content: ' fire and much wood; the breath of the '
  - type: text
    content: LORD
  - type: text
    content: ', like a stream of brimstone, doth kindle it.'
  '4':
  - type: text
    content: 'For his princes were at Zoan, and his ambassadors came to Hanes. '
  '5':
  - type: text
    content: 'They were all ashamed of a people '
  - type: text
    content: that
  - type: text
    content: ' could not profit them, nor be an help nor profit, but a shame, and also a reproach.'
  '6':
  - type: text
    content: 'The burden of the beasts of the south: into the land of trouble and anguish, from whence '
  - type: text
    content: come
  - type: text
    content: ' the young and old lion, the viper and fiery flying serpent, they will carry their riches upon the shoulders of young asses, and their treasures upon the bunches of camels, to a people '
  - type: text
    content: that
  - type: text
    content: ' shall not profit '
  - type: text
    content: them
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'For the Egyptians shall help in vain, and to no purpose: therefore have I cried concerning this, Their strength '
  - type: text
    content: is
  - type: text
    content: ' to sit still.'
  '8':
  - type: text
    content: 'Now go, write it before them in a table, and note it in a book, that it may be for the time to come for ever and ever: '
  '9':
  - type: text
    content: 'that this '
  - type: text
    content: is
  - type: text
    content: ' a rebellious people, lying children, children '
  - type: text
