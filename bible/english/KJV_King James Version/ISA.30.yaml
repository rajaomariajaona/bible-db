document_id: ISA.30
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Relations with Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Woe to the rebellious children, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that take counsel, but not of me; and that cover with a covering, but not of my spirit, that they may add sin to sin: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that walk to go down into Egypt, and have not asked at my mouth; to strengthen themselves in the strength of Pharaoh, and to trust in the shadow of Egypt! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore shall the strength of Pharaoh be your shame, and the trust in the shadow of Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' confusion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For his princes were at Zoan, and his ambassadors came to Hanes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They were all ashamed of a people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' could not profit them, nor be an help nor profit, but a shame, and also a reproach.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The burden of the beasts of the south: into the land of trouble and anguish, from whence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' the young and old lion, the viper and fiery flying serpent, they will carry their riches upon the shoulders of young asses, and their treasures upon the bunches of camels, to a people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall not profit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the Egyptians shall help in vain, and to no purpose: therefore have I cried concerning this, Their strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to sit still.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now go, write it before them in a table, and note it in a book, that it may be for the time to come for ever and ever: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a rebellious people, lying children, children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' will not hear the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'which say to the seers, See not; and to the prophets, Prophesy not unto us right things, speak unto us smooth things, prophesy deceits: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: get you out of the way, turn aside out of the path, cause the Holy One of Israel to cease from before us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Wherefore thus saith the Holy One of Israel, Because ye despise this word, and trust in oppression and perverseness, and stay thereon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'therefore this iniquity shall be to you as a breach ready to fall, swelling out in an high wall, whose breaking cometh suddenly at an instant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he shall break it as the breaking of the potters'' vessel that is broken in pieces; he shall not spare: so that there shall not be found in the bursting of it a sherd to take fire from the hearth, or to take water '
  - type: usfm
    marker: add
    children:
    - type: text
      text: withal
  - type: text
    text: ' out of the pit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', the Holy One of Israel; In returning and rest shall ye be saved; in quietness and in confidence shall be your strength: and ye would not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But ye said, No; for we will flee upon horses; therefore shall ye flee: and, We will ride upon the swift; therefore shall they that pursue you be swift. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'One thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall flee
  - type: text
    text: ' at the rebuke of one; at the rebuke of five shall ye flee: till ye be left as a beacon upon the top of a mountain, and as an ensign on an hill.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And therefore will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' wait, that he may be gracious unto you, and therefore will he be exalted, that he may have mercy upon you: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a God of judgment: blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all they that wait for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For the people shall dwell in Zion at Jerusalem: thou shalt weep no more: he will be very gracious unto thee at the voice of thy cry; when he shall hear it, he will answer thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: though
  - type: text
    text: ' the Lord give you the bread of adversity, and the water of affliction, yet shall not thy teachers be removed into a corner any more, but thine eyes shall see thy teachers: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and thine ears shall hear a word behind thee, saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the way, walk ye in it, when ye turn to the right hand, and when ye turn to the left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ye shall defile also the covering of thy graven images of silver, and the ornament of thy molten images of gold: thou shalt cast them away as a menstruous cloth; thou shalt say unto it, Get thee hence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then shall he give the rain of thy seed, that thou shalt sow the ground withal; and bread of the increase of the earth, and it shall be fat and plenteous: in that day shall thy cattle feed in large pastures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The oxen likewise and the young asses that ear the ground shall eat clean provender, which hath been winnowed with the shovel and with the fan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And there shall be upon every high mountain, and upon every high hill, rivers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' streams of waters in the day of the great slaughter, when the towers fall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moreover the light of the moon shall be as the light of the sun, and the light of the sun shall be sevenfold, as the light of seven days, in the day that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bindeth up the breach of his people, and healeth the stroke of their wound.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Behold, the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' cometh from far, burning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' his anger, and the burden '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof is
  - type: text
    text: ' heavy: his lips are full of indignation, and his tongue as a devouring fire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and his breath, as an overflowing stream, shall reach to the midst of the neck, to sift the nations with the sieve of vanity: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' a bridle in the jaws of the people, causing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to err. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ye shall have a song, as in the night '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' a holy solemnity is kept; and gladness of heart, as when one goeth with a pipe to come into the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to the mighty One of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall cause his glorious voice to be heard, and shall shew the lighting down of his arm, with the indignation of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' anger, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' the flame of a devouring fire, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' scattering, and tempest, and hailstones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For through the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall the Assyrian be beaten down, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' smote with a rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' every place where the grounded staff shall pass, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall lay upon him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' shall be with tabrets and harps: and in battles of shaking will he fight with it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For Tophet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' ordained of old; yea, for the king it is prepared; he hath made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' deep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' large: the pile thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' fire and much wood; the breath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', like a stream of brimstone, doth kindle it.'
