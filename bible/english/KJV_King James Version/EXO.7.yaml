document_id: EXO.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, See, I have made thee a god to Pharaoh: and Aaron thy brother shall be thy prophet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron went in unto Pharaoh, and they did so as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded: and Aaron cast down his rod before Pharaoh, and before his servants, and it became a serpent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pharaoh also called the wise men and the sorcerers: now the magicians of Egypt, they also did in like manner with their enchantments. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they cast down every man his rod, and they became serpents: but Aaron''s rod swallowed up their rods. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he hardened Pharaoh''s heart, that he hearkened not unto them; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had said.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Plagues
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Pharaoh''s heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' hardened, he refuseth to let the people go. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Get thee unto Pharaoh in the morning; lo, he goeth out unto the water; and thou shalt stand by the river''s brink against he come; and the rod which was turned to a serpent shalt thou take in thine hand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt say unto him, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of the Hebrews hath sent me unto thee, saying, Let my people go, that they may serve me in the wilderness: and, behold, hitherto thou wouldest not hear. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', In this thou shalt know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': behold, I will smite with the rod that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in mine hand upon the waters which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the river, and they shall be turned to blood. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the fish that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the river shall die, and the river shall stink; and the Egyptians shall lothe to drink of the water of the river. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, Say unto Aaron, Take thy rod, and stretch out thine hand upon the waters of Egypt, upon their streams, upon their rivers, and upon their ponds, and upon all their pools of water, that they may become blood; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' there may be blood throughout all the land of Egypt, both in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: vessels of
    - type: text
      text: ' wood, and in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: vessels of
    - type: text
      text: ' stone.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt speak all that I command thee: and Aaron thy brother shall speak unto Pharaoh, that he send the children of Israel out of his land. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron did so, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded; and he lifted up the rod, and smote the waters that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the river, in the sight of Pharaoh, and in the sight of his servants; and all the waters that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the river were turned to blood. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the fish that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the river died; and the river stank, and the Egyptians could not drink of the water of the river; and there was blood throughout all the land of Egypt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the magicians of Egypt did so with their enchantments: and Pharaoh''s heart was hardened, neither did he hearken unto them; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had said. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh turned and went into his house, neither did he set his heart to this also. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the Egyptians digged round about the river for water to drink; for they could not drink of the water of the river. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seven days were fulfilled, after that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had smitten the river.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will harden Pharaoh''s heart, and multiply my signs and my wonders in the land of Egypt. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Pharaoh shall not hearken unto you, that I may lay my hand upon Egypt, and bring forth mine armies, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my people the children of Israel, out of the land of Egypt by great judgments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Egyptians shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', when I stretch forth mine hand upon Egypt, and bring out the children of Israel from among them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded them, so did they. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' fourscore years old, and Aaron fourscore and three years old, when they spake unto Pharaoh.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses and unto Aaron, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pharaoh shall speak unto you, saying, Shew a miracle for you: then thou shalt say unto Aaron, Take thy rod, and cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' before Pharaoh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' it shall become a serpent. '
