    content: The Father's Love
  - type: text
    content: 'When Israel '
  - type: text
    content: was
  - type: text
    content: ' a child, then I loved him, and called my son out of Egypt. '
  '10':
  - type: text
    content: 'They shall walk after the '
  - type: text
    content: LORD
  - type: text
    content: ': he shall roar like a lion: when he shall roar, then the children shall tremble from the west. '
  '11':
  - type: text
    content: 'They shall tremble as a bird out of Egypt, and as a dove out of the land of Assyria: and I will place them in their houses, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '12':
  - type: text
    content: 'Ephraim compasseth me about with lies, and the house of Israel with deceit: but Judah yet ruleth with God, and is faithful with the saints.'
  '2':
  - type: text
    content: As
  - type: text
    content: ' they called them, so they went from them: they sacrificed unto Baalim, and burned incense to graven images.'
  '3':
  - type: text
    content: 'I taught Ephraim also to go, taking them by their arms; but they knew not that I healed them. '
  '4':
  - type: text
    content: 'I drew them with cords of a man, with bands of love: and I was to them as they that take off the yoke on their jaws, and I laid meat unto them.'
  '5':
  - type: text
    content: 'He shall not return into the land of Egypt, but the Assyrian shall be his king, because they refused to return. '
  '6':
  - type: text
    content: 'And the sword shall abide on his cities, and shall consume his branches, and devour '
  - type: text
    content: them
  - type: text
    content: ', because of their own counsels. '
  '7':
  - type: text
    content: 'And my people are bent to backsliding from me: though they called them to the most High, none at all would exalt '
  - type: text
    content: him
  - type: text
    content: .
  '8':
  - type: text
    content: 'How shall I give thee up, Ephraim? '
  - type: text
    content: how
  - type: text
    content: ' shall I deliver thee, Israel? how shall I make thee as Admah? '
  - type: text
    content: how
  - type: text
    content: ' shall I set thee as Zeboim? mine heart is turned within me, my repentings are kindled together. '
  '9':
  - type: text
    content: 'I will not execute the fierceness of mine anger, I will not return to destroy Ephraim: for I '
  - type: text
    content: am
  - type: text
    content: ' God, and not man; the Holy One in the midst of thee: and I will not enter into the city. '
