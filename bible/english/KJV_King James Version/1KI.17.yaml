    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Elijah the Tishbite, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who was
  - type: text
    text: ' of the inhabitants of Gilead, said unto Ahab, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel liveth, before whom I stand, there shall not be dew nor rain these years, but according to my word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto him, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Get thee hence, and turn thee eastward, and hide thyself by the brook Cherith, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou shalt drink of the brook; and I have commanded the ravens to feed thee there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So he went and did according unto the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for he went and dwelt by the brook Cherith, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the ravens brought him bread and flesh in the morning, and bread and flesh in the evening; and he drank of the brook. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And it came to pass after a while, that the brook dried up, because there had been no rain in the land.
- type: usfm
  marker: s2
  children:
  - type: text
    text: At Zarephath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto him, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Arise, get thee to Zarephath, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belongeth
  - type: text
    text: ' to Zidon, and dwell there: behold, I have commanded a widow woman there to sustain thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So he arose and went to Zarephath. And when he came to the gate of the city, behold, the widow woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' there gathering of sticks: and he called to her, and said, Fetch me, I pray thee, a little water in a vessel, that I may drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And as she was going to fetch '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he called to her, and said, Bring me, I pray thee, a morsel of bread in thine hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And she said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God liveth, I have not a cake, but an handful of meal in a barrel, and a little oil in a cruse: and, behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' gathering two sticks, that I may go in and dress it for me and my son, that we may eat it, and die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Elijah said unto her, Fear not; go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' do as thou hast said: but make me thereof a little cake first, and bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto me, and after make for thee and for thy son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, The barrel of meal shall not waste, neither shall the cruse of oil fail, until the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sendeth rain upon the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And she went and did according to the saying of Elijah: and she, and he, and her house, did eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: many
  - type: text
    text: ' days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the barrel of meal wasted not, neither did the cruse of oil fail, according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which he spake by Elijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass after these things, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the son of the woman, the mistress of the house, fell sick; and his sickness was so sore, that there was no breath left in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And she said unto Elijah, What have I to do with thee, O thou man of God? art thou come unto me to call my sin to remembrance, and to slay my son? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he said unto her, Give me thy son. And he took him out of her bosom, and carried him up into a loft, where he abode, and laid him upon his own bed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, hast thou also brought evil upon the widow with whom I sojourn, by slaying her son? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he stretched himself upon the child three times, and cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, I pray thee, let this child''s soul come into him again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' heard the voice of Elijah; and the soul of the child came into him again, and he revived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Elijah took the child, and brought him down out of the chamber into the house, and delivered him unto his mother: and Elijah said, See, thy son liveth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the woman said to Elijah, Now by this I know that thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a man of God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in thy mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' truth.'
