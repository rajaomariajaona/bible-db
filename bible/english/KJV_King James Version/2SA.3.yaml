document_id: 2SA.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was long war between the house of Saul and the house of David: but David waxed stronger and stronger, and the house of Saul waxed weaker and weaker.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to translate the kingdom from the house of Saul, and to set up the throne of David over Israel and over Judah, from Dan even to Beer-sheba. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he could not answer Abner a word again, because he feared him.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David, Abner, and Joab
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abner sent messengers to David on his behalf, saying, Whose '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the land? saying '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ', Make thy league with me, and, behold, my hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' with thee, to bring about all Israel unto thee. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Well; I will make a league with thee: but one thing I require of thee, that is, Thou shalt not see my face, except thou first bring Michal Saul''s daughter, when thou comest to see my face. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David sent messengers to Ish-bosheth Saul''s son, saying, Deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' my wife Michal, which I espoused to me for an hundred foreskins of the Philistines. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ish-bosheth sent, and took her from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' husband, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' from Phaltiel the son of Laish. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And her husband went with her along weeping behind her to Bahurim. Then said Abner unto him, Go, return. And he returned.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abner had communication with the elders of Israel, saying, Ye sought for David in times past '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' king over you: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'now then do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken of David, saying, By the hand of my servant David I will save my people Israel out of the hand of the Philistines, and out of the hand of all their enemies. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abner also spake in the ears of Benjamin: and Abner went also to speak in the ears of David in Hebron all that seemed good to Israel, and that seemed good to the whole house of Benjamin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And unto David were sons born in Hebron: and his firstborn was Amnon, of Ahinoam the Jezreelitess; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abner came to David to Hebron, and twenty men with him. And David made Abner and the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him a feast. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abner said unto David, I will arise and go, and will gather all Israel unto my lord the king, that they may make a league with thee, and that thou mayest reign over all that thine heart desireth. And David sent Abner away; and he went in peace.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, the servants of David and Joab came from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pursuing
    - type: text
      text: ' a troop, and brought in a great spoil with them: but Abner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not with David in Hebron; for he had sent him away, and he was gone in peace. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joab and all the host that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with him were come, they told Joab, saying, Abner the son of Ner came to the king, and he hath sent him away, and he is gone in peace. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joab came to the king, and said, What hast thou done? behold, Abner came unto thee; why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast sent him away, and he is quite gone? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou knowest Abner the son of Ner, that he came to deceive thee, and to know thy going out and thy coming in, and to know all that thou doest. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Joab was come out from David, he sent messengers after Abner, which brought him again from the well of Sirah: but David knew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Abner was returned to Hebron, Joab took him aside in the gate to speak with him quietly, and smote him there under the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: rib
    - type: text
      text: ', that he died, for the blood of Asahel his brother. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And afterward when David heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he said, I and my kingdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' guiltless before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for ever from the blood of Abner the son of Ner: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let it rest on the head of Joab, and on all his father''s house; and let there not fail from the house of Joab one that hath an issue, or that is a leper, or that leaneth on a staff, or that falleth on the sword, or that lacketh bread. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his second, Chileab, of Abigail the wife of Nabal the Carmelite; and the third, Absalom the son of Maacah the daughter of Talmai king of Geshur; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Joab and Abishai his brother slew Abner, because he had slain their brother Asahel at Gibeon in the battle.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Joab, and to all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, Rend your clothes, and gird you with sackcloth, and mourn before Abner. And king David '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' followed the bier. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they buried Abner in Hebron: and the king lifted up his voice, and wept at the grave of Abner; and all the people wept. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king lamented over Abner, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Died Abner as a fool dieth?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not bound, nor thy feet put into fetters:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As a man falleth before wicked men, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' fellest thou.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all the people wept again over him. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And when all the people came to cause David to eat meat while it was yet day, David sware, saying, So do God to me, and more also, if I taste bread, or ought else, till the sun be down. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all the people took notice '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: ', and it pleased them: as whatsoever the king did pleased all the people. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For all the people and all Israel understood that day that it was not of the king to slay Abner the son of Ner. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And the king said unto his servants, Know ye not that there is a prince and a great man fallen this day in Israel? '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' this day weak, though anointed king; and these men the sons of Zeruiah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' too hard for me: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall reward the doer of evil according to his wickedness.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the fourth, Adonijah the son of Haggith; and the fifth, Shephatiah the son of Abital; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the sixth, Ithream, by Eglah David's wife. These were born to David in Hebron.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, while there was war between the house of Saul and the house of David, that Abner made himself strong for the house of Saul. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul had a concubine, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Rizpah, the daughter of Aiah: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ish-bosheth
    - type: text
      text: ' said to Abner, Wherefore hast thou gone in unto my father''s concubine? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then was Abner very wroth for the words of Ish-bosheth, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Am
    - type: text
      text: ' I a dog''s head, which against Judah do shew kindness this day unto the house of Saul thy father, to his brethren, and to his friends, and have not delivered thee into the hand of David, that thou chargest me to day with a fault concerning this woman? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So do God to Abner, and more also, except, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn to David, even so I do to him; '
