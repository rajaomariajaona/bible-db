  '1':
  - type: heading
    content: The Call of Cyrus
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' to his anointed, to Cyrus, whose right hand I have holden, to subdue nations before him; and I will loose the loins of kings, to open before him the two leaved gates; and the gates shall not be shut; '
  '10':
  - type: text
    content: 'Woe unto him that saith unto '
  - type: text
    content: his
  - type: text
    content: ' father, What begettest thou? or to the woman, What hast thou brought forth?'
  '11':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the Holy One of Israel, and his Maker, Ask me of things to come concerning my sons, and concerning the work of my hands command ye me. '
  '12':
  - type: text
    content: 'I have made the earth, and created man upon it: I, '
  - type: text
    content: even
  - type: text
    content: ' my hands, have stretched out the heavens, and all their host have I commanded. '
  '13':
  - type: text
    content: 'I have raised him up in righteousness, and I will direct all his ways: he shall build my city, and he shall let go my captives, not for price nor reward, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  '14':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', The labour of Egypt, and merchandise of Ethiopia and of the Sabeans, men of stature, shall come over unto thee, and they shall be thine: they shall come after thee; in chains they shall come over, and they shall fall down unto thee, they shall make supplication unto thee, '
  - type: text
    content: saying
  - type: text
    content: ', Surely God '
  - type: text
    content: is
  - type: text
    content: ' in thee; and '
  - type: text
    content: there is
  - type: text
    content: ' none else, '
  - type: text
    content: there is
  - type: text
    content: ' no God. '
  '15':
  - type: text
    content: 'Verily thou '
  - type: text
    content: art
  - type: text
    content: ' a God that hidest thyself, O God of Israel, the Saviour. '
  '16':
  - type: text
    content: 'They shall be ashamed, and also confounded, all of them: they shall go to confusion together '
  - type: text
    content: that are
  - type: text
    content: ' makers of idols. '
  '17':
  - type: text
    content: But
  - type: text
    content: ' Israel shall be saved in the '
  - type: text
    content: LORD
  - type: text
    content: ' with an everlasting salvation: ye shall not be ashamed nor confounded world without end.'
  '18':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' that created the heavens; God himself that formed the earth and made it; he hath established it, he created it not in vain, he formed it to be inhabited: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '; and '
  - type: text
    content: there is
  - type: text
    content: ' none else. '
  '19':
  - type: text
    content: 'I have not spoken in secret, in a dark place of the earth: I said not unto the seed of Jacob, Seek ye me in vain: I the '
  - type: text
    content: LORD
  - type: text
    content: ' speak righteousness, I declare things that are right.'
  '2':
  - type: text
    content: 'I will go before thee, and make the crooked places straight: I will break in pieces the gates of brass, and cut in sunder the bars of iron: '
  '20':
  - type: text
    content: 'Assemble yourselves and come; draw near together, ye '
  - type: text
    content: that are
  - type: text
    content: ' escaped of the nations: they have no knowledge that set up the wood of their graven image, and pray unto a god '
  - type: text
    content: that
  - type: text
    content: ' cannot save. '
  '21':
  - type: text
    content: 'Tell ye, and bring '
  - type: text
    content: them
  - type: text
    content: ' near; yea, let them take counsel together: who hath declared this from ancient time? '
  - type: text
    content: who
  - type: text
    content: ' hath told it from that time? '
  - type: text
    content: have
  - type: text
    content: ' not I the '
  - type: text
    content: LORD
  - type: text
    content: '? and '
  - type: text
    content: there is
  - type: text
    content: ' no God else beside me; a just God and a Saviour; '
  - type: text
    content: there is
  - type: text
    content: ' none beside me. '
  '22':
  - type: text
    content: 'Look unto me, and be ye saved, all the ends of the earth: for I '
  - type: text
    content: am
  - type: text
    content: ' God, and '
  - type: text
    content: there is
  - type: text
    content: ' none else. '
  '23':
  - type: text
    content: 'I have sworn by myself, the word is gone out of my mouth '
  - type: text
    content: in
  - type: text
    content: ' righteousness, and shall not return, That unto me every knee shall bow, every tongue shall swear. '
  '24':
  - type: text
    content: 'Surely, shall '
  - type: text
    content: one
  - type: text
    content: ' say, in the '
  - type: text
    content: LORD
  - type: text
    content: ' have I righteousness and strength: '
  - type: text
    content: even
  - type: text
    content: ' to him shall '
  - type: text
    content: men
  - type: text
    content: ' come; and all that are incensed against him shall be ashamed. '
  '25':
  - type: text
    content: 'In the '
  - type: text
    content: LORD
  - type: text
    content: ' shall all the seed of Israel be justified, and shall glory.'
  '3':
  - type: text
    content: 'and I will give thee the treasures of darkness, and hidden riches of secret places, that thou mayest know that I, the '
  - type: text
    content: LORD
  - type: text
    content: ', which call '
  - type: text
    content: thee
  - type: text
    content: ' by thy name, '
  - type: text
    content: am
  - type: text
    content: ' the God of Israel. '
  '4':
  - type: text
    content: 'For Jacob my servant''s sake, and Israel mine elect, I have even called thee by thy name: I have surnamed thee, though thou hast not known me. '
  '5':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', and '
  - type: text
    content: there is
  - type: text
    content: ' none else, '
  - type: text
    content: there is
  - type: text
    content: ' no God beside me: I girded thee, though thou hast not known me: '
  '6':
  - type: text
    content: 'that they may know from the rising of the sun, and from the west, that '
  - type: text
    content: there is
  - type: text
    content: ' none beside me. I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', and '
  - type: text
    content: there is
  - type: text
    content: ' none else. '
  '7':
  - type: text
    content: 'I form the light, and create darkness: I make peace, and create evil: I the '
  - type: text
    content: LORD
  - type: text
    content: ' do all these '
  - type: text
    content: things
  - type: text
    content: .
  '8':
  - type: text
    content: 'Drop down, ye heavens, from above, and let the skies pour down righteousness: let the earth open, and let them bring forth salvation, and let righteousness spring up together; I the '
  - type: text
    content: LORD
  - type: text
    content: ' have created it.'
  '9':
  - type: text
    content: 'Woe unto him that striveth with his Maker! '
  - type: text
    content: Let
  - type: text
    content: ' the potsherd '
  - type: text
    content: strive
  - type: text
    content: ' with the potsherds of the earth. Shall the clay say to him that fashioneth it, What makest thou? or thy work, He hath no hands? '
