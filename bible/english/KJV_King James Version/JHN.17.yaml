verses:
  '1':
  - type: heading
    content: The Prayer of Jesus
  - type: text
    content: 'These words spake Jesus, and lifted up his eyes to heaven, and said, '
  - type: text
    content: 'Father, the hour is come; glorify thy Son, that thy Son also may glorify thee:'
  - type: text
    content: ' '
  '10':
  - type: text
    content: And all mine are thine, and thine are mine; and I am glorified in them.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And now I am no more in the world, but these are in the world, and I come to thee. Holy Father, keep through thine own name those whom thou hast given me, that they may be one, as we '
  - type: text
    content: are
  - type: text
    content: .
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'While I was with them in the world, I kept them in thy name: those that thou gavest me I have kept, and none of them is lost, but the son of perdition; that the scripture might be fulfilled.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: And now come I to thee; and these things I speak in the world, that they might have my joy fulfilled in themselves.
  - type: text
    content: ' '
  '14':
  - type: text
    content: I have given them thy word; and the world hath hated them, because they are not of the world, even as I am not of the world.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I pray not that thou shouldest take them out of the world, but that thou shouldest keep them from the evil.
  - type: text
    content: ' '
  '16':
  - type: text
    content: They are not of the world, even as I am not of the world.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Sanctify them through thy truth: thy word is truth.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: As thou hast sent me into the world, even so have I also sent them into the world.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And for their sakes I sanctify myself, that they also might be sanctified through the truth.
  - type: text
    content: ' '
  '2':
  - type: text
    content: as thou hast given him power over all flesh, that he should give eternal life to as many as thou hast given him.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Neither pray I for these alone, but for them also which shall believe on me through their word;
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'that they all may be one; as thou, Father, '
  - type: text
    content: art
  - type: text
    content: ' in me, and I in thee, that they also may be one in us: that the world may believe that thou hast sent me.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And the glory which thou gavest me I have given them; that they may be one, even as we are one:'
  - type: text
    content: ' '
  '23':
  - type: text
    content: I in them, and thou in me, that they may be made perfect in one; and that the world may know that thou hast sent me, and hast loved them, as thou hast loved me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Father, I will that they also, whom thou hast given me, be with me where I am; that they may behold my glory, which thou hast given me: for thou lovedst me before the foundation of the world.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'O righteous Father, the world hath not known thee: but I have known thee, and these have known that thou hast sent me.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And I have declared unto them thy name, and will declare '
  - type: text
    content: it
  - type: text
    content: ': that the love wherewith thou hast loved me may be in them, and I in them.'
  '3':
  - type: text
    content: And this is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'I have glorified thee on the earth: I have finished the work which thou gavest me to do.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: And now, O Father, glorify thou me with thine own self with the glory which I had with thee before the world was.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'I have manifested thy name unto the men which thou gavest me out of the world: thine they were, and thou gavest them me; and they have kept thy word.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: Now they have known that all things whatsoever thou hast given me are of thee.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For I have given unto them the words which thou gavest me; and they have received '
  - type: text
    content: them
  - type: text
    content: ', and have known surely that I came out from thee, and they have believed that thou didst send me.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'I pray for them: I pray not for the world, but for them which thou hast given me; for they are thine.'
  - type: text
    content: ' '
