document_id: 2CO.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Treasure in Earthen Vessels
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore seeing we have this ministry, as we have received mercy, we faint not; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'always bearing about in the body the dying of the Lord Jesus, that the life also of Jesus might be made manifest in our body. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For we which live are alway delivered unto death for Jesus'' sake, that the life also of Jesus might be made manifest in our mortal flesh. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So then death worketh in us, but life in you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'We having the same spirit of faith, according as it is written, I believed, and therefore have I spoken; we also believe, and therefore speak; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'knowing that he which raised up the Lord Jesus shall raise up us also by Jesus, and shall present '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' with you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For all things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for your sakes, that the abundant grace might through the thanksgiving of many redound to the glory of God.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For which cause we faint not; but though our outward man perish, yet the inward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' is renewed day by day. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For our light affliction, which is but for a moment, worketh for us a far more exceeding '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' eternal weight of glory; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'while we look not at the things which are seen, but at the things which are not seen: for the things which are seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' temporal; but the things which are not seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' eternal.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'but have renounced the hidden things of dishonesty, not walking in craftiness, nor handling the word of God deceitfully; but by manifestation of the truth commending ourselves to every man''s conscience in the sight of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But if our gospel be hid, it is hid to them that are lost: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'in whom the god of this world hath blinded the minds of them which believe not, lest the light of the glorious gospel of Christ, who is the image of God, should shine unto them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For we preach not ourselves, but Christ Jesus the Lord; and ourselves your servants for Jesus'' sake. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For God, who commanded the light to shine out of darkness, hath shined in our hearts, to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: give
    - type: text
      text: ' the light of the knowledge of the glory of God in the face of Jesus Christ.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But we have this treasure in earthen vessels, that the excellency of the power may be of God, and not of us. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: add
      children:
      - type: text
        text: We are
    - type: text
      text: ' troubled on every side, yet not distressed; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: we are
    - type: text
      text: ' perplexed, but not in despair; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'persecuted, but not forsaken; cast down, but not destroyed; '
