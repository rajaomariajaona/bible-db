document_id: 2CO.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Treasure in Earthen Vessels
  - type: text
    content: 'Therefore seeing we have this ministry, as we have received mercy, we faint not; '
  '10':
  - type: text
    content: 'always bearing about in the body the dying of the Lord Jesus, that the life also of Jesus might be made manifest in our body. '
  '11':
  - type: text
    content: 'For we which live are alway delivered unto death for Jesus'' sake, that the life also of Jesus might be made manifest in our mortal flesh. '
  '12':
  - type: text
    content: 'So then death worketh in us, but life in you. '
  '13':
  - type: text
    content: 'We having the same spirit of faith, according as it is written, I believed, and therefore have I spoken; we also believe, and therefore speak; '
  '14':
  - type: text
    content: 'knowing that he which raised up the Lord Jesus shall raise up us also by Jesus, and shall present '
  - type: text
    content: us
  - type: text
    content: ' with you. '
  '15':
  - type: text
    content: 'For all things '
  - type: text
    content: are
  - type: text
    content: ' for your sakes, that the abundant grace might through the thanksgiving of many redound to the glory of God.'
  '16':
  - type: text
    content: 'For which cause we faint not; but though our outward man perish, yet the inward '
  - type: text
    content: man
  - type: text
    content: ' is renewed day by day. '
  '17':
  - type: text
    content: 'For our light affliction, which is but for a moment, worketh for us a far more exceeding '
  - type: text
    content: and
  - type: text
    content: ' eternal weight of glory; '
  '18':
  - type: text
    content: 'while we look not at the things which are seen, but at the things which are not seen: for the things which are seen '
  - type: text
    content: are
  - type: text
    content: ' temporal; but the things which are not seen '
  - type: text
    content: are
  - type: text
    content: ' eternal.'
  '2':
  - type: text
    content: 'but have renounced the hidden things of dishonesty, not walking in craftiness, nor handling the word of God deceitfully; but by manifestation of the truth commending ourselves to every man''s conscience in the sight of God. '
  '3':
  - type: text
    content: 'But if our gospel be hid, it is hid to them that are lost: '
  '4':
  - type: text
    content: 'in whom the god of this world hath blinded the minds of them which believe not, lest the light of the glorious gospel of Christ, who is the image of God, should shine unto them. '
  '5':
  - type: text
    content: 'For we preach not ourselves, but Christ Jesus the Lord; and ourselves your servants for Jesus'' sake. '
  '6':
  - type: text
    content: 'For God, who commanded the light to shine out of darkness, hath shined in our hearts, to '
  - type: text
    content: give
  - type: text
    content: ' the light of the knowledge of the glory of God in the face of Jesus Christ.'
  '7':
  - type: text
    content: 'But we have this treasure in earthen vessels, that the excellency of the power may be of God, and not of us. '
  '8':
  - type: text
    content: We are
  - type: text
    content: ' troubled on every side, yet not distressed; '
  - type: text
    content: we are
  - type: text
    content: ' perplexed, but not in despair; '
  '9':
  - type: text
    content: 'persecuted, but not forsaken; cast down, but not destroyed; '
