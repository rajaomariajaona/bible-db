document_id: LUK.22,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His Death and Resurrection
  - type: text
    content: 'Now the feast of unleavened bread drew nigh, which is called the Passover. '
  '10':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Behold, when ye are entered into the city, there shall a man meet you, bearing a pitcher of water; follow him into the house where he entereth in.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And ye shall say unto the goodman of the house, The Master saith unto thee, Where is the guestchamber, where I shall eat the passover with my disciples?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And he shall shew you a large upper room furnished: there make ready.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And they went, and found as he had said unto them: and they made ready the passover.'
  '14':
  - type: text
    content: 'And when the hour was come, he sat down, and the twelve apostles with him. '
  '15':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'With desire I have desired to eat this passover with you before I suffer:'
  - type: text
    content: ' '
  '16':
  - type: text
    content: for I say unto you, I will not any more eat thereof, until it be fulfilled in the kingdom of God.
  '17':
  - type: text
    content: 'And he took the cup, and gave thanks, and said, '
  - type: text
    content: 'Take this, and divide '
  - type: text
    content: it
  - type: text
    content: ' among yourselves:'
  - type: text
    content: ' '
  '18':
  - type: text
    content: for I say unto you, I will not drink of the fruit of the vine, until the kingdom of God shall come.
  '19':
  - type: text
    content: 'And he took bread, and gave thanks, and brake '
  - type: text
    content: it
  - type: text
    content: ', and gave unto them, saying, '
  - type: text
    content: 'This is my body which is given for you: this do in remembrance of me.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: And the chief priests and scribes sought how they might kill him; for they feared the people.
  '20':
  - type: text
    content: 'Likewise also the cup after supper, saying, '
  - type: text
    content: 'This cup '
  - type: text
    content: is
  - type: text
    content: ' the new testament in my blood, which is shed for you.'
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'But, behold, the hand of him that betrayeth me '
  - type: text
    content: is
  - type: text
    content: ' with me on the table.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And truly the Son of man goeth, as it was determined: but woe unto that man by whom he is betrayed!'
  - type: text
    content: ' '
  '23':
  - type: text
    content: And they began to enquire among themselves, which of them it was that should do this thing.
  '24':
  - type: text
    content: 'And there was also a strife among them, which of them should be accounted the greatest. '
  '25':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: The kings of the Gentiles exercise lordship over them; and they that exercise authority upon them are called benefactors.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But ye '
  - type: text
    content: shall
  - type: text
    content: ' not '
  - type: text
    content: be
  - type: text
    content: ' so: but he that is greatest among you, let him be as the younger; and he that is chief, as he that doth serve.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'For whether '
  - type: text
    content: is
  - type: text
    content: ' greater, he that sitteth at meat, or he that serveth? '
  - type: text
    content: is
  - type: text
    content: ' not he that sitteth at meat? but I am among you as he that serveth.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Ye are they which have continued with me in my temptations.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And I appoint unto you a kingdom, as my Father hath appointed unto me;
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then entered Satan into Judas surnamed Iscariot, being of the number of the twelve. '
  '30':
  - type: text
    content: that ye may eat and drink at my table in my kingdom, and sit on thrones judging the twelve tribes of Israel.
  '31':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: 'Simon, Simon, behold, Satan hath desired '
  - type: text
    content: to have
  - type: text
    content: ' you, that he may sift '
  - type: text
    content: you
  - type: text
    content: ' as wheat:'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'but I have prayed for thee, that thy faith fail not: and when thou art converted, strengthen thy brethren.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And he said unto him, Lord, I am ready to go with thee, both into prison, and to death. '
  '34':
  - type: text
    content: 'And he said, '
  - type: text
    content: I tell thee, Peter, the cock shall not crow this day, before that thou shalt thrice deny that thou knowest me.
  '35':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: When I sent you without purse, and scrip, and shoes, lacked ye any thing?
  - type: text
    content: ' And they said, Nothing. '
  '36':
  - type: text
    content: 'Then said he unto them, '
  - type: text
    content: 'But now, he that hath a purse, let him take '
  - type: text
    content: it
  - type: text
    content: ', and likewise '
  - type: text
    content: his
  - type: text
    content: ' scrip: and he that hath no sword, let him sell his garment, and buy one.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For I say unto you, that this that is written must yet be accomplished in me, And he was reckoned among the transgressors: for the things concerning me have an end.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And they said, Lord, behold, here '
  - type: text
    content: are
  - type: text
    content: ' two swords. And he said unto them, '
  - type: text
    content: It is enough.
  - type: heading
    content: Gethsemane
  '39':
  - type: text
    content: 'And he came out, and went, as he was wont, to the mount of Olives; and his disciples also followed him. '
  '4':
  - type: text
    content: 'And he went his way, and communed with the chief priests and captains, how he might betray him unto them. '
  '40':
  - type: text
    content: 'And when he was at the place, he said unto them, '
  - type: text
    content: Pray that ye enter not into temptation.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'And he was withdrawn from them about a stone''s cast, and kneeled down, and prayed, '
  '42':
  - type: text
    content: 'saying, '
  - type: text
    content: 'Father, if thou be willing, remove this cup from me: nevertheless not my will, but thine, be done.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And there appeared an angel unto him from heaven, strengthening him. '
  '44':
  - type: text
    content: 'And being in an agony he prayed more earnestly: and his sweat was as it were great drops of blood falling down to the ground. '
  '45':
  - type: text
    content: 'And when he rose up from prayer, and was come to his disciples, he found them sleeping for sorrow, '
  '46':
  - type: text
    content: 'and said unto them, '
  - type: text
    content: Why sleep ye? rise and pray, lest ye enter into temptation.
  - type: heading
    content: Betrayal and Arrest
  '47':
  - type: text
    content: 'And while he yet spake, behold a multitude, and he that was called Judas, one of the twelve, went before them, and drew near unto Jesus to kiss him. '
  '48':
  - type: text
    content: 'But Jesus said unto him, '
  - type: text
    content: Judas, betrayest thou the Son of man with a kiss?
  - type: text
    content: ' '
  '49':
  - type: text
    content: When they which were about him saw what would follow, they said unto him, Lord, shall we smite with the sword?
  '5':
  - type: text
    content: 'And they were glad, and covenanted to give him money. '
  '50':
  - type: text
    content: 'And one of them smote the servant of the high priest, and cut off his right ear. '
  '51':
  - type: text
    content: 'And Jesus answered and said, '
  - type: text
    content: Suffer ye thus far.
  - type: text
    content: ' And he touched his ear, and healed him. '
  '52':
  - type: text
    content: 'Then Jesus said unto the chief priests, and captains of the temple, and the elders, which were come to him, '
  - type: text
    content: Be ye come out, as against a thief, with swords and staves?
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'When I was daily with you in the temple, ye stretched forth no hands against me: but this is your hour, and the power of darkness.'
  - type: heading
    content: Peter's Denial
  '54':
  - type: text
    content: 'Then took they him, and led '
  - type: text
    content: him
  - type: text
    content: ', and brought him into the high priest''s house. And Peter followed afar off. '
  '55':
  - type: text
    content: 'And when they had kindled a fire in the midst of the hall, and were set down together, Peter sat down among them. '
  '56':
  - type: text
    content: 'But a certain maid beheld him as he sat by the fire, and earnestly looked upon him, and said, This man was also with him. '
  '57':
  - type: text
    content: 'And he denied him, saying, Woman, I know him not. '
  '58':
  - type: text
    content: 'And after a little while another saw him, and said, Thou art also of them. And Peter said, Man, I am not. '
  '59':
  - type: text
    content: 'And about the space of one hour after another confidently affirmed, saying, Of a truth this '
  - type: text
    content: fellow
  - type: text
    content: ' also was with him: for he is a Galilæan. '
  '6':
  - type: text
    content: And he promised, and sought opportunity to betray him unto them in the absence of the multitude.
  - type: heading
    content: The Last Supper
  '60':
  - type: text
    content: 'And Peter said, Man, I know not what thou sayest. And immediately, while he yet spake, the cock crew. '
  '61':
  - type: text
    content: 'And the Lord turned, and looked upon Peter. And Peter remembered the word of the Lord, how he had said unto him, Before the cock crow, thou shalt deny me thrice. '
  '62':
  - type: text
    content: And Peter went out, and wept bitterly.
  '63':
  - type: text
    content: 'And the men that held Jesus mocked him, and smote '
  - type: text
    content: him
  - type: text
    content: '. '
  '64':
  - type: text
    content: 'And when they had blindfolded him, they struck him on the face, and asked him, saying, Prophesy, who is it that smote thee? '
  '65':
  - type: text
    content: And many other things blasphemously spake they against him.
  - type: heading
    content: Early Morning Trial
  '66':
  - type: text
    content: 'And as soon as it was day, the elders of the people and the chief priests and the scribes came together, and led him into their council, saying, '
  '67':
  - type: text
    content: 'Art thou the Christ? tell us. And he said unto them, '
  - type: text
    content: 'If I tell you, ye will not believe:'
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'and if I also ask '
  - type: text
    content: you
  - type: text
    content: ', ye will not answer me, nor let '
  - type: text
    content: me
  - type: text
    content: ' go.'
  - type: text
    content: ' '
  '69':
  - type: text
    content: Hereafter shall the Son of man sit on the right hand of the power of God.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then came the day of unleavened bread, when the passover must be killed. '
  '70':
  - type: text
    content: 'Then said they all, Art thou then the Son of God? And he said unto them, '
  - type: text
    content: Ye say that I am.
  - type: text
    content: ' '
  '71':
  - type: text
    content: And they said, What need we any further witness? for we ourselves have heard of his own mouth.
  '8':
  - type: text
    content: 'And he sent Peter and John, saying, '
  - type: text
    content: Go and prepare us the passover, that we may eat.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And they said unto him, Where wilt thou that we prepare? '
