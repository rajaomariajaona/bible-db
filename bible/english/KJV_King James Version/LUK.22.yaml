document_id: LUK.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: His Death and Resurrection
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the feast of unleavened bread drew nigh, which is called the Passover. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold, when ye are entered into the city, there shall a man meet you, bearing a pitcher of water; follow him into the house where he entereth in.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And ye shall say unto the goodman of the house, The Master saith unto thee, Where is the guestchamber, where I shall eat the passover with my disciples?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he shall shew you a large upper room furnished: there make ready.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they went, and found as he had said unto them: and they made ready the passover.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when the hour was come, he sat down, and the twelve apostles with him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'With desire I have desired to eat this passover with you before I suffer:'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I say unto you, I will not any more eat thereof, until it be fulfilled in the kingdom of God.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he took the cup, and gave thanks, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take this, and divide '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' among yourselves:'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I say unto you, I will not drink of the fruit of the vine, until the kingdom of God shall come.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he took bread, and gave thanks, and brake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and gave unto them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This is my body which is given for you: this do in remembrance of me.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And the chief priests and scribes sought how they might kill him; for they feared the people.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Likewise also the cup after supper, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This cup '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' the new testament in my blood, which is shed for you.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But, behold, the hand of him that betrayeth me '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' with me on the table.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And truly the Son of man goeth, as it was determined: but woe unto that man by whom he is betrayed!'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And they began to enquire among themselves, which of them it was that should do this thing.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And there was also a strife among them, which of them should be accounted the greatest. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The kings of the Gentiles exercise lordship over them; and they that exercise authority upon them are called benefactors.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But ye '
      - type: usfm
        marker: add
        children:
        - type: text
          text: shall
      - type: text
        text: ' not '
      - type: usfm
        marker: add
        children:
        - type: text
          text: be
      - type: text
        text: ' so: but he that is greatest among you, let him be as the younger; and he that is chief, as he that doth serve.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For whether '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' greater, he that sitteth at meat, or he that serveth? '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' not he that sitteth at meat? but I am among you as he that serveth.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye are they which have continued with me in my temptations.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I appoint unto you a kingdom, as my Father hath appointed unto me;
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then entered Satan into Judas surnamed Iscariot, being of the number of the twelve. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that ye may eat and drink at my table in my kingdom, and sit on thrones judging the twelve tribes of Israel.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the Lord said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Simon, Simon, behold, Satan hath desired '
      - type: usfm
        marker: add
        children:
        - type: text
          text: to have
      - type: text
        text: ' you, that he may sift '
      - type: usfm
        marker: add
        children:
        - type: text
          text: you
      - type: text
        text: ' as wheat:'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but I have prayed for thee, that thy faith fail not: and when thou art converted, strengthen thy brethren.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And he said unto him, Lord, I am ready to go with thee, both into prison, and to death. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell thee, Peter, the cock shall not crow this day, before that thou shalt thrice deny that thou knowest me.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I sent you without purse, and scrip, and shoes, lacked ye any thing?
    - type: text
      text: ' And they said, Nothing. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then said he unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But now, he that hath a purse, let him take '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', and likewise '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' scrip: and he that hath no sword, let him sell his garment, and buy one.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For I say unto you, that this that is written must yet be accomplished in me, And he was reckoned among the transgressors: for the things concerning me have an end.'
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And they said, Lord, behold, here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' two swords. And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is enough.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Gethsemane
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And he came out, and went, as he was wont, to the mount of Olives; and his disciples also followed him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And he went his way, and communed with the chief priests and captains, how he might betray him unto them. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And when he was at the place, he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pray that ye enter not into temptation.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And he was withdrawn from them about a stone''s cast, and kneeled down, and prayed, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Father, if thou be willing, remove this cup from me: nevertheless not my will, but thine, be done.'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And there appeared an angel unto him from heaven, strengthening him. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And being in an agony he prayed more earnestly: and his sweat was as it were great drops of blood falling down to the ground. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And when he rose up from prayer, and was come to his disciples, he found them sleeping for sorrow, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why sleep ye? rise and pray, lest ye enter into temptation.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Betrayal and Arrest
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And while he yet spake, behold a multitude, and he that was called Judas, one of the twelve, went before them, and drew near unto Jesus to kiss him. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'But Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Judas, betrayest thou the Son of man with a kiss?
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: When they which were about him saw what would follow, they said unto him, Lord, shall we smite with the sword?
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they were glad, and covenanted to give him money. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'And one of them smote the servant of the high priest, and cut off his right ear. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suffer ye thus far.
    - type: text
      text: ' And he touched his ear, and healed him. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Then Jesus said unto the chief priests, and captains of the temple, and the elders, which were come to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Be ye come out, as against a thief, with swords and staves?
    - type: text
      text: ' '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When I was daily with you in the temple, ye stretched forth no hands against me: but this is your hour, and the power of darkness.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Peter's Denial
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Then took they him, and led '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and brought him into the high priest''s house. And Peter followed afar off. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'And when they had kindled a fire in the midst of the hall, and were set down together, Peter sat down among them. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'But a certain maid beheld him as he sat by the fire, and earnestly looked upon him, and said, This man was also with him. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'And he denied him, saying, Woman, I know him not. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'And after a little while another saw him, and said, Thou art also of them. And Peter said, Man, I am not. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'And about the space of one hour after another confidently affirmed, saying, Of a truth this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fellow
    - type: text
      text: ' also was with him: for he is a Galilæan. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And he promised, and sought opportunity to betray him unto them in the absence of the multitude.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Last Supper
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'And Peter said, Man, I know not what thou sayest. And immediately, while he yet spake, the cock crew. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'And the Lord turned, and looked upon Peter. And Peter remembered the word of the Lord, how he had said unto him, Before the cock crow, thou shalt deny me thrice. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: And Peter went out, and wept bitterly.
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'And the men that held Jesus mocked him, and smote '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'And when they had blindfolded him, they struck him on the face, and asked him, saying, Prophesy, who is it that smote thee? '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: And many other things blasphemously spake they against him.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Early Morning Trial
    marker-yv: yv-h
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'And as soon as it was day, the elders of the people and the chief priests and the scribes came together, and led him into their council, saying, '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'Art thou the Christ? tell us. And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If I tell you, ye will not believe:'
    - type: text
      text: ' '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and if I also ask '
      - type: usfm
        marker: add
        children:
        - type: text
          text: you
      - type: text
        text: ', ye will not answer me, nor let '
      - type: usfm
        marker: add
        children:
        - type: text
          text: me
      - type: text
        text: ' go.'
    - type: text
      text: ' '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Hereafter shall the Son of man sit on the right hand of the power of God.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then came the day of unleavened bread, when the passover must be killed. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'Then said they all, Art thou then the Son of God? And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye say that I am.
    - type: text
      text: ' '
  '71':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: And they said, What need we any further witness? for we ourselves have heard of his own mouth.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he sent Peter and John, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go and prepare us the passover, that we may eat.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And they said unto him, Where wilt thou that we prepare? '
