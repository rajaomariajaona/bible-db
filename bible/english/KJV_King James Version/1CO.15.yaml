document_id: 1CO.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection of the Dead
  - type: text
    content: 'Moreover, brethren, I declare unto you the gospel which I preached unto you, which also ye have received, and wherein ye stand; '
  '10':
  - type: text
    content: 'But by the grace of God I am what I am: and his grace which '
  - type: text
    content: was bestowed
  - type: text
    content: ' upon me was not in vain; but I laboured more abundantly than they all: yet not I, but the grace of God which was with me. '
  '11':
  - type: text
    content: 'Therefore whether '
  - type: text
    content: it were
  - type: text
    content: ' I or they, so we preach, and so ye believed.'
  '12':
  - type: text
    content: 'Now if Christ be preached that he rose from the dead, how say some among you that there is no resurrection of the dead? '
  '13':
  - type: text
    content: 'But if there be no resurrection of the dead, then is Christ not risen: '
  '14':
  - type: text
    content: 'and if Christ be not risen, then '
  - type: text
    content: is
  - type: text
    content: ' our preaching vain, and your faith '
  - type: text
    content: is
  - type: text
    content: ' also vain. '
  '15':
  - type: text
    content: 'Yea, and we are found false witnesses of God; because we have testified of God that he raised up Christ: whom he raised not up, if so be that the dead rise not. '
  '16':
  - type: text
    content: 'For if the dead rise not, then is not Christ raised: '
  '17':
  - type: text
    content: 'and if Christ be not raised, your faith '
  - type: text
    content: is
  - type: text
    content: ' vain; ye are yet in your sins. '
  '18':
  - type: text
    content: 'Then they also which are fallen asleep in Christ are perished. '
  '19':
  - type: text
    content: If in this life only we have hope in Christ, we are of all men most miserable.
  '2':
  - type: text
    content: 'by which also ye are saved, if ye keep in memory what I preached unto you, unless ye have believed in vain. '
  '20':
  - type: text
    content: 'But now is Christ risen from the dead, '
  - type: text
    content: and
  - type: text
    content: ' become the firstfruits of them that slept. '
  '21':
  - type: text
    content: 'For since by man '
  - type: text
    content: came
  - type: text
    content: ' death, by man '
  - type: text
    content: came
  - type: text
    content: ' also the resurrection of the dead. '
  '22':
  - type: text
    content: 'For as in Adam all die, even so in Christ shall all be made alive. '
  '23':
  - type: text
    content: 'But every man in his own order: Christ the firstfruits; afterward they that are Christ''s at his coming. '
  '24':
  - type: text
    content: 'Then '
  - type: text
    content: cometh
  - type: text
    content: ' the end, when he shall have delivered up the kingdom to God, even the Father; when he shall have put down all rule and all authority and power. '
  '25':
  - type: text
    content: 'For he must reign, till he hath put all enemies under his feet. '
  '26':
  - type: text
    content: 'The last enemy '
  - type: text
    content: that
  - type: text
    content: ' shall be destroyed '
  - type: text
    content: is
  - type: text
    content: ' death. '
  '27':
  - type: text
    content: 'For he hath put all things under his feet. But when he saith all things are put under '
  - type: text
    content: him, it is
  - type: text
    content: ' manifest that he is excepted, which did put all things under him. '
  '28':
  - type: text
    content: And when all things shall be subdued unto him, then shall the Son also himself be subject unto him that put all things under him, that God may be all in all.
  '29':
  - type: text
    content: 'Else what shall they do which are baptized for the dead, if the dead rise not at all? why are they then baptized for the dead? '
  '3':
  - type: text
    content: 'For I delivered unto you first of all that which I also received, how that Christ died for our sins according to the scriptures; '
  '30':
  - type: text
    content: 'And why stand we in jeopardy every hour? '
  '31':
  - type: text
    content: 'I protest by your rejoicing which I have in Christ Jesus our Lord, I die daily. '
  '32':
  - type: text
    content: 'If after the manner of men I have fought with beasts at Ephesus, what advantageth it me, if the dead rise not? let us eat and drink; for to morrow we die. '
  '33':
  - type: text
    content: 'Be not deceived: evil communications corrupt good manners. '
  '34':
  - type: text
    content: 'Awake to righteousness, and sin not; for some have not the knowledge of God: I speak '
  - type: text
    content: this
  - type: text
    content: ' to your shame.'
  '35':
  - type: text
    content: 'But some '
  - type: text
    content: man
  - type: text
    content: ' will say, How are the dead raised up? and with what body do they come? '
  '36':
  - type: text
    content: Thou
  - type: text
    content: ' fool, that which thou sowest is not quickened, except it die: '
  '37':
  - type: text
    content: 'and that which thou sowest, thou sowest not that body that shall be, but bare grain, it may chance of wheat, or of some other '
  - type: text
    content: grain
  - type: text
    content: ': '
  '38':
  - type: text
    content: 'but God giveth it a body as it hath pleased him, and to every seed his own body. '
  '39':
  - type: text
    content: 'All flesh '
  - type: text
    content: is
  - type: text
    content: ' not the same flesh: but '
  - type: text
    content: there is
  - type: text
    content: ' one '
  - type: text
    content: kind of
  - type: text
    content: ' flesh of men, another flesh of beasts, another of fishes, '
  - type: text
    content: and
  - type: text
    content: ' another of birds. '
  '4':
  - type: text
    content: 'and that he was buried, and that he rose again the third day according to the scriptures: '
  '40':
  - type: text
    content: There are
  - type: text
    content: ' also celestial bodies, and bodies terrestrial: but the glory of the celestial '
  - type: text
    content: is
  - type: text
    content: ' one, and the '
  - type: text
    content: glory
  - type: text
    content: ' of the terrestrial '
  - type: text
    content: is
  - type: text
    content: ' another. '
  '41':
  - type: text
    content: There is
  - type: text
    content: ' one glory of the sun, and another glory of the moon, and another glory of the stars: for '
  - type: text
    content: one
  - type: text
    content: ' star differeth from '
  - type: text
    content: another
  - type: text
    content: ' star in glory. '
  '42':
  - type: text
    content: 'So also '
  - type: text
    content: is
  - type: text
    content: ' the resurrection of the dead. It is sown in corruption; it is raised in incorruption: '
  '43':
  - type: text
    content: 'it is sown in dishonour; it is raised in glory: it is sown in weakness; it is raised in power: '
  '44':
  - type: text
    content: 'it is sown a natural body; it is raised a spiritual body. There is a natural body, and there is a spiritual body. '
  '45':
  - type: text
    content: 'And so it is written, The first man Adam was made a living soul; the last Adam '
  - type: text
    content: was made
  - type: text
    content: ' a quickening spirit. '
  '46':
  - type: text
    content: 'Howbeit that '
  - type: text
    content: was
  - type: text
    content: ' not first which is spiritual, but that which is natural; and afterward that which is spiritual. '
  '47':
  - type: text
    content: 'The first man '
  - type: text
    content: is
  - type: text
    content: ' of the earth, earthy: the second man '
  - type: text
    content: is
  - type: text
    content: ' the Lord from heaven. '
  '48':
  - type: text
    content: 'As '
  - type: text
    content: is
  - type: text
    content: ' the earthy, such '
  - type: text
    content: are
  - type: text
    content: ' they also that are earthy: and as '
  - type: text
    content: is
  - type: text
    content: ' the heavenly, such '
  - type: text
    content: are
  - type: text
    content: ' they also that are heavenly. '
  '49':
  - type: text
    content: 'And as we have borne the image of the earthy, we shall also bear the image of the heavenly. '
  '5':
  - type: text
    content: 'and that he was seen of Cephas, then of the twelve: '
  '50':
  - type: text
    content: 'Now this I say, brethren, that flesh and blood cannot inherit the kingdom of God; neither doth corruption inherit incorruption. '
  '51':
  - type: text
    content: 'Behold, I shew you a mystery; We shall not all sleep, but we shall all be changed, '
  '52':
  - type: text
    content: 'in a moment, in the twinkling of an eye, at the last trump: for the trumpet shall sound, and the dead shall be raised incorruptible, and we shall be changed. '
  '53':
  - type: text
    content: 'For this corruptible must put on incorruption, and this mortal '
  - type: text
    content: must
  - type: text
    content: ' put on immortality. '
  '54':
  - type: text
    content: 'So when this corruptible shall have put on incorruption, and this mortal shall have put on immortality, then shall be brought to pass the saying that is written, Death is swallowed up in victory. '
  '55':
  - type: text
    content: 'O death, where '
  - type: text
    content: is
  - type: text
    content: ' thy sting? O grave, where '
  - type: text
    content: is
  - type: text
    content: ' thy victory? '
  '56':
  - type: text
    content: 'The sting of death '
  - type: text
    content: is
  - type: text
    content: ' sin; and the strength of sin '
  - type: text
    content: is
  - type: text
    content: ' the law. '
  '57':
  - type: text
    content: 'But thanks '
  - type: text
    content: be
  - type: text
    content: ' to God, which giveth us the victory through our Lord Jesus Christ. '
  '58':
  - type: text
    content: Therefore, my beloved brethren, be ye stedfast, unmoveable, always abounding in the work of the Lord, forasmuch as ye know that your labour is not in vain in the Lord.
  '6':
  - type: text
    content: 'after that, he was seen of above five hundred brethren at once; of whom the greater part remain unto this present, but some are fallen asleep. '
  '7':
  - type: text
    content: 'After that, he was seen of James; then of all the apostles. '
  '8':
  - type: text
    content: 'And last of all he was seen of me also, as of one born out of due time. '
  '9':
  - type: text
    content: 'For I am the least of the apostles, that am not meet to be called an apostle, because I persecuted the church of God. '
