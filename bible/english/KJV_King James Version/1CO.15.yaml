document_id: 1CO.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Resurrection of the Dead
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover, brethren, I declare unto you the gospel which I preached unto you, which also ye have received, and wherein ye stand; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But by the grace of God I am what I am: and his grace which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was bestowed
    - type: text
      text: ' upon me was not in vain; but I laboured more abundantly than they all: yet not I, but the grace of God which was with me. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it were
    - type: text
      text: ' I or they, so we preach, and so ye believed.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now if Christ be preached that he rose from the dead, how say some among you that there is no resurrection of the dead? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But if there be no resurrection of the dead, then is Christ not risen: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and if Christ be not risen, then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our preaching vain, and your faith '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also vain. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Yea, and we are found false witnesses of God; because we have testified of God that he raised up Christ: whom he raised not up, if so be that the dead rise not. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For if the dead rise not, then is not Christ raised: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and if Christ be not raised, your faith '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vain; ye are yet in your sins. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then they also which are fallen asleep in Christ are perished. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: If in this life only we have hope in Christ, we are of all men most miserable.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'by which also ye are saved, if ye keep in memory what I preached unto you, unless ye have believed in vain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But now is Christ risen from the dead, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' become the firstfruits of them that slept. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For since by man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came
    - type: text
      text: ' death, by man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came
    - type: text
      text: ' also the resurrection of the dead. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For as in Adam all die, even so in Christ shall all be made alive. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But every man in his own order: Christ the firstfruits; afterward they that are Christ''s at his coming. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cometh
    - type: text
      text: ' the end, when he shall have delivered up the kingdom to God, even the Father; when he shall have put down all rule and all authority and power. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For he must reign, till he hath put all enemies under his feet. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The last enemy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall be destroyed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' death. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For he hath put all things under his feet. But when he saith all things are put under '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him, it is
    - type: text
      text: ' manifest that he is excepted, which did put all things under him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And when all things shall be subdued unto him, then shall the Son also himself be subject unto him that put all things under him, that God may be all in all.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Else what shall they do which are baptized for the dead, if the dead rise not at all? why are they then baptized for the dead? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For I delivered unto you first of all that which I also received, how that Christ died for our sins according to the scriptures; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And why stand we in jeopardy every hour? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'I protest by your rejoicing which I have in Christ Jesus our Lord, I die daily. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'If after the manner of men I have fought with beasts at Ephesus, what advantageth it me, if the dead rise not? let us eat and drink; for to morrow we die. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Be not deceived: evil communications corrupt good manners. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Awake to righteousness, and sin not; for some have not the knowledge of God: I speak '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' to your shame.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'But some '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' will say, How are the dead raised up? and with what body do they come? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou
    - type: text
      text: ' fool, that which thou sowest is not quickened, except it die: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'and that which thou sowest, thou sowest not that body that shall be, but bare grain, it may chance of wheat, or of some other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: grain
    - type: text
      text: ': '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'but God giveth it a body as it hath pleased him, and to every seed his own body. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'All flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not the same flesh: but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: kind of
    - type: text
      text: ' flesh of men, another flesh of beasts, another of fishes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' another of birds. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and that he was buried, and that he rose again the third day according to the scriptures: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: add
      children:
      - type: text
        text: There are
    - type: text
      text: ' also celestial bodies, and bodies terrestrial: but the glory of the celestial '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' one, and the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: glory
    - type: text
      text: ' of the terrestrial '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' another. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' one glory of the sun, and another glory of the moon, and another glory of the stars: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' star differeth from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' star in glory. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'So also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the resurrection of the dead. It is sown in corruption; it is raised in incorruption: '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'it is sown in dishonour; it is raised in glory: it is sown in weakness; it is raised in power: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'it is sown a natural body; it is raised a spiritual body. There is a natural body, and there is a spiritual body. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And so it is written, The first man Adam was made a living soul; the last Adam '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was made
    - type: text
      text: ' a quickening spirit. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Howbeit that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not first which is spiritual, but that which is natural; and afterward that which is spiritual. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'The first man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of the earth, earthy: the second man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the Lord from heaven. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the earthy, such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they also that are earthy: and as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the heavenly, such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they also that are heavenly. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'And as we have borne the image of the earthy, we shall also bear the image of the heavenly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and that he was seen of Cephas, then of the twelve: '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Now this I say, brethren, that flesh and blood cannot inherit the kingdom of God; neither doth corruption inherit incorruption. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Behold, I shew you a mystery; We shall not all sleep, but we shall all be changed, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'in a moment, in the twinkling of an eye, at the last trump: for the trumpet shall sound, and the dead shall be raised incorruptible, and we shall be changed. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'For this corruptible must put on incorruption, and this mortal '
    - type: usfm
      marker: add
      children:
      - type: text
        text: must
    - type: text
      text: ' put on immortality. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'So when this corruptible shall have put on incorruption, and this mortal shall have put on immortality, then shall be brought to pass the saying that is written, Death is swallowed up in victory. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'O death, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy sting? O grave, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy victory? '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'The sting of death '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sin; and the strength of sin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'But thanks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' to God, which giveth us the victory through our Lord Jesus Christ. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: Therefore, my beloved brethren, be ye stedfast, unmoveable, always abounding in the work of the Lord, forasmuch as ye know that your labour is not in vain in the Lord.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'after that, he was seen of above five hundred brethren at once; of whom the greater part remain unto this present, but some are fallen asleep. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'After that, he was seen of James; then of all the apostles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And last of all he was seen of me also, as of one born out of due time. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For I am the least of the apostles, that am not meet to be called an apostle, because I persecuted the church of God. '
