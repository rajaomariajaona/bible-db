type_code: eng
verses:
  '1':
  - type: heading
    content: Their Divided Heart
  - type: text
    content: 'Israel '
  - type: text
    content: is
  - type: text
    content: ' an empty vine, he bringeth forth fruit unto himself: according to the multitude of his fruit he hath increased the altars; according to the goodness of his land they have made goodly images. '
  '10':
  - type: text
    content: It is
  - type: text
    content: ' in my desire that I should chastise them; and the people shall be gathered against them, when they shall bind themselves in their two furrows. '
  '11':
  - type: text
    content: 'And Ephraim '
  - type: text
    content: is as
  - type: text
    content: ' an heifer '
  - type: text
    content: that is
  - type: text
    content: ' taught, '
  - type: text
    content: and
  - type: text
    content: ' loveth to tread out '
  - type: text
    content: the corn
  - type: text
    content: '; but I passed over upon her fair neck: I will make Ephraim to ride; Judah shall plow, '
  - type: text
    content: and
  - type: text
    content: ' Jacob shall break his clods.'
  '12':
  - type: text
    content: 'Sow to yourselves in righteousness, reap in mercy; break up your fallow ground: for '
  - type: text
    content: it is
  - type: text
    content: ' time to seek the '
  - type: text
    content: LORD
  - type: text
    content: ', till he come and rain righteousness upon you. '
  '13':
  - type: text
    content: 'Ye have plowed wickedness, ye have reaped iniquity; ye have eaten the fruit of lies: because thou didst trust in thy way, in the multitude of thy mighty men.'
  '14':
  - type: text
    content: 'Therefore shall a tumult arise among thy people, and all thy fortresses shall be spoiled, as Shalman spoiled Beth-arbel in the day of battle: the mother was dashed in pieces upon '
  - type: text
    content: her
  - type: text
    content: ' children. '
  '15':
  - type: text
    content: 'So shall Beth-el do unto you because of your great wickedness: in a morning shall the king of Israel utterly be cut off.'
  '2':
  - type: text
    content: 'Their heart is divided; now shall they be found faulty: he shall break down their altars, he shall spoil their images. '
  '3':
  - type: text
    content: 'For now they shall say, We have no king, because we feared not the '
  - type: text
    content: LORD
  - type: text
    content: ; what then should a king do to us?
  '4':
  - type: text
    content: 'They have spoken words, swearing falsely in making a covenant: thus judgment springeth up as hemlock in the furrows of the field. '
  '5':
  - type: text
    content: 'The inhabitants of Samaria shall fear because of the calves of Beth-aven: for the people thereof shall mourn over it, and the priests thereof '
  - type: text
    content: that
  - type: text
    content: ' rejoiced on it, for the glory thereof, because it is departed from it. '
  '6':
  - type: text
    content: 'It shall be also carried unto Assyria '
  - type: text
    content: for
  - type: text
    content: ' a present to king Jareb: Ephraim shall receive shame, and Israel shall be ashamed of his own counsel.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' Samaria, her king is cut off as the foam upon the water. '
  '8':
  - type: text
    content: 'The high places also of Aven, the sin of Israel, shall be destroyed: the thorn and the thistle shall come up on their altars; and they shall say to the mountains, Cover us; and to the hills, Fall on us.'
  '9':
  - type: text
    content: 'O Israel, thou hast sinned from the days of Gibeah: there they stood: the battle in Gibeah against the children of iniquity did not overtake them. '
