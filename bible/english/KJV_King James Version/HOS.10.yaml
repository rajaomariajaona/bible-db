document_id: HOS.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Their Divided Heart
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an empty vine, he bringeth forth fruit unto himself: according to the multitude of his fruit he hath increased the altars; according to the goodness of his land they have made goodly images. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Their heart is divided; now shall they be found faulty: he shall break down their altars, he shall spoil their images. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For now they shall say, We have no king, because we feared not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ; what then should a king do to us?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They have spoken words, swearing falsely in making a covenant: thus judgment springeth up as hemlock in the furrows of the field. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The inhabitants of Samaria shall fear because of the calves of Beth-aven: for the people thereof shall mourn over it, and the priests thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' rejoiced on it, for the glory thereof, because it is departed from it. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'It shall be also carried unto Assyria '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a present to king Jareb: Ephraim shall receive shame, and Israel shall be ashamed of his own counsel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' Samaria, her king is cut off as the foam upon the water. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The high places also of Aven, the sin of Israel, shall be destroyed: the thorn and the thistle shall come up on their altars; and they shall say to the mountains, Cover us; and to the hills, Fall on us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O Israel, thou hast sinned from the days of Gibeah: there they stood: the battle in Gibeah against the children of iniquity did not overtake them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' in my desire that I should chastise them; and the people shall be gathered against them, when they shall bind themselves in their two furrows. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is as
  - type: text
    text: ' an heifer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' taught, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' loveth to tread out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the corn
  - type: text
    text: '; but I passed over upon her fair neck: I will make Ephraim to ride; Judah shall plow, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Jacob shall break his clods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sow to yourselves in righteousness, reap in mercy; break up your fallow ground: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' time to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', till he come and rain righteousness upon you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ye have plowed wickedness, ye have reaped iniquity; ye have eaten the fruit of lies: because thou didst trust in thy way, in the multitude of thy mighty men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore shall a tumult arise among thy people, and all thy fortresses shall be spoiled, as Shalman spoiled Beth-arbel in the day of battle: the mother was dashed in pieces upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' children. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So shall Beth-el do unto you because of your great wickedness: in a morning shall the king of Israel utterly be cut off.'
