document_id: MAT.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When he was come down from the mountain, great multitudes followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And, behold, there came a leper and worshipped him, saying, Lord, if thou wilt, thou canst make me clean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Jesus put forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand, and touched him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will; be thou clean.
  - type: text
    text: ' And immediately his leprosy was cleansed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jesus saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: See thou tell no man; but go thy way, shew thyself to the priest, and offer the gift that Moses commanded, for a testimony unto them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marvellous Deeds
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Power Over Disease
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when Jesus was entered into Capernaum, there came unto him a centurion, beseeching him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and saying, Lord, my servant lieth at home sick of the palsy, grievously tormented. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Jesus saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will come and heal him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The centurion answered and said, Lord, I am not worthy that thou shouldest come under my roof: but speak the word only, and my servant shall be healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For I am a man under authority, having soldiers under me: and I say to this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', Go, and he goeth; and to another, Come, and he cometh; and to my servant, Do this, and he doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Jesus heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he marvelled, and said to them that followed, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, I have not found so great faith, no, not in Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I say unto you, That many shall come from the east and west, and shall sit down with Abraham, and Isaac, and Jacob, in the kingdom of heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But the children of the kingdom shall be cast out into outer darkness: there shall be weeping and gnashing of teeth.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Jesus said unto the centurion, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go thy way; and as thou hast believed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' be it done unto thee.'
  - type: text
    text: ' And his servant was healed in the selfsame hour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when Jesus was come into Peter''s house, he saw his wife''s mother laid, and sick of a fever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he touched her hand, and the fever left her: and she arose, and ministered unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the even was come, they brought unto him many that were possessed with devils: and he cast out the spirits with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' word, and healed all that were sick: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that it might be fulfilled which was spoken by Esaias the prophet, saying, Himself took our infirmities, and bare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' sicknesses.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Power Over Men
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now when Jesus saw great multitudes about him, he gave commandment to depart unto the other side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And a certain scribe came, and said unto him, Master, I will follow thee whithersoever thou goest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Jesus saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The foxes have holes, and the birds of the air '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ' nests; but the Son of man hath not where to lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' head.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And another of his disciples said unto him, Lord, suffer me first to go and bury my father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow me; and let the dead bury their dead
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Power Over Nature
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when he was entered into a ship, his disciples followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And, behold, there arose a great tempest in the sea, insomuch that the ship was covered with the waves: but he was asleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And his disciples came to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and awoke him, saying, Lord, save us: we perish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why are ye fearful, O ye of little faith?
  - type: text
    text: ' Then he arose, and rebuked the winds and the sea; and there was a great calm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But the men marvelled, saying, What manner of man is this, that even the winds and the sea obey him!
- type: usfm
  marker: s2
  children:
  - type: text
    text: Power Over Devils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And when he was come to the other side into the country of the Gergesenes, there met him two possessed with devils, coming out of the tombs, exceeding fierce, so that no man might pass by that way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And, behold, they cried out, saying, What have we to do with thee, Jesus, thou Son of God? art thou come hither to torment us before the time? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And there was a good way off from them an herd of many swine feeding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So the devils besought him, saying, If thou cast us out, suffer us to go away into the herd of swine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go.
  - type: text
    text: ' And when they were come out, they went into the herd of swine: and, behold, the whole herd of swine ran violently down a steep place into the sea, and perished in the waters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they that kept them fled, and went their ways into the city, and told every thing, and what was befallen to the possessed of the devils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And, behold, the whole city came out to meet Jesus: and when they saw him, they besought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' that he would depart out of their coasts.'
