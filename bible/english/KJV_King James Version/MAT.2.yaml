document_id: MAT.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Wise Men from the East
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Jesus was born in Bethlehem of Judæa in the days of Herod the king, behold, there came wise men from the east to Jerusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: saying, Where is he that is born King of the Jews? for we have seen his star in the east, and are come to worship him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When Herod the king had heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these things
  - type: text
    text: ', he was troubled, and all Jerusalem with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when he had gathered all the chief priests and scribes of the people together, he demanded of them where Christ should be born. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they said unto him, In Bethlehem of Judæa: for thus it is written by the prophet,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And thou Bethlehem, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the land of Juda,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Art not the least among the princes of Juda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For out of thee shall come a Governor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That shall rule my people Israel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then Herod, when he had privily called the wise men, enquired of them diligently what time the star appeared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he sent them to Bethlehem, and said, Go and search diligently for the young child; and when ye have found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', bring me word again, that I may come and worship him also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they had heard the king, they departed; and, lo, the star, which they saw in the east, went before them, till it came and stood over where the young child was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When they saw the star, they rejoiced with exceeding great joy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when they were come into the house, they saw the young child with Mary his mother, and fell down, and worshipped him: and when they had opened their treasures, they presented unto him gifts; gold, and frankincense, and myrrh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And being warned of God in a dream that they should not return to Herod, they departed into their own country another way.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Flight to Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when they were departed, behold, the angel of the Lord appeareth to Joseph in a dream, saying, Arise, and take the young child and his mother, and flee into Egypt, and be thou there until I bring thee word: for Herod will seek the young child to destroy him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When he arose, he took the young child and his mother by night, and departed into Egypt: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and was there until the death of Herod: that it might be fulfilled which was spoken of the Lord by the prophet, saying, Out of Egypt have I called my son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Herod, when he saw that he was mocked of the wise men, was exceeding wroth, and sent forth, and slew all the children that were in Bethlehem, and in all the coasts thereof, from two years old and under, according to the time which he had diligently enquired of the wise men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then was fulfilled that which was spoken by Jeremy the prophet, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In Rama was there a voice heard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamentation, and weeping, and great mourning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Rachel weeping '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' her children,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And would not be comforted, because they are not.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Return to Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But when Herod was dead, behold, an angel of the Lord appeareth in a dream to Joseph in Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'saying, Arise, and take the young child and his mother, and go into the land of Israel: for they are dead which sought the young child''s life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he arose, and took the young child and his mother, and came into the land of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when he heard that Archelaus did reign in Judæa in the room of his father Herod, he was afraid to go thither: notwithstanding, being warned of God in a dream, he turned aside into the parts of Galilee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and he came and dwelt in a city called Nazareth: that it might be fulfilled which was spoken by the prophets, He shall be called a Nazarene.'
