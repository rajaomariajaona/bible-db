document_id: MAT.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Wise Men from the East
  - type: text
    content: 'Now when Jesus was born in Bethlehem of Judæa in the days of Herod the king, behold, there came wise men from the east to Jerusalem, '
  '10':
  - type: text
    content: When they saw the star, they rejoiced with exceeding great joy.
  '11':
  - type: text
    content: 'And when they were come into the house, they saw the young child with Mary his mother, and fell down, and worshipped him: and when they had opened their treasures, they presented unto him gifts; gold, and frankincense, and myrrh. '
  '12':
  - type: text
    content: And being warned of God in a dream that they should not return to Herod, they departed into their own country another way.
  - type: heading
    content: The Flight to Egypt
  '13':
  - type: text
    content: 'And when they were departed, behold, the angel of the Lord appeareth to Joseph in a dream, saying, Arise, and take the young child and his mother, and flee into Egypt, and be thou there until I bring thee word: for Herod will seek the young child to destroy him. '
  '14':
  - type: text
    content: 'When he arose, he took the young child and his mother by night, and departed into Egypt: '
  '15':
  - type: text
    content: 'and was there until the death of Herod: that it might be fulfilled which was spoken of the Lord by the prophet, saying, Out of Egypt have I called my son.'
  '16':
  - type: text
    content: 'Then Herod, when he saw that he was mocked of the wise men, was exceeding wroth, and sent forth, and slew all the children that were in Bethlehem, and in all the coasts thereof, from two years old and under, according to the time which he had diligently enquired of the wise men. '
  '17':
  - type: text
    content: Then was fulfilled that which was spoken by Jeremy the prophet, saying,
  '18':
  - type: text
    content: In Rama was there a voice heard,
  - type: text
    content: Lamentation, and weeping, and great mourning,
  - type: text
    content: 'Rachel weeping '
  - type: text
    content: for
  - type: text
    content: ' her children,'
  - type: text
    content: And would not be comforted, because they are not.
  - type: heading
    content: Return to Nazareth
  '19':
  - type: text
    content: 'But when Herod was dead, behold, an angel of the Lord appeareth in a dream to Joseph in Egypt, '
  '2':
  - type: text
    content: saying, Where is he that is born King of the Jews? for we have seen his star in the east, and are come to worship him.
  '20':
  - type: text
    content: 'saying, Arise, and take the young child and his mother, and go into the land of Israel: for they are dead which sought the young child''s life. '
  '21':
  - type: text
    content: 'And he arose, and took the young child and his mother, and came into the land of Israel. '
  '22':
  - type: text
    content: 'But when he heard that Archelaus did reign in Judæa in the room of his father Herod, he was afraid to go thither: notwithstanding, being warned of God in a dream, he turned aside into the parts of Galilee: '
  '23':
  - type: text
    content: 'and he came and dwelt in a city called Nazareth: that it might be fulfilled which was spoken by the prophets, He shall be called a Nazarene.'
  '3':
  - type: text
    content: 'When Herod the king had heard '
  - type: text
    content: these things
  - type: text
    content: ', he was troubled, and all Jerusalem with him. '
  '4':
  - type: text
    content: 'And when he had gathered all the chief priests and scribes of the people together, he demanded of them where Christ should be born. '
  '5':
  - type: text
    content: 'And they said unto him, In Bethlehem of Judæa: for thus it is written by the prophet,'
  '6':
  - type: text
    content: 'And thou Bethlehem, '
  - type: text
    content: in
  - type: text
    content: ' the land of Juda,'
  - type: text
    content: 'Art not the least among the princes of Juda:'
  - type: text
    content: For out of thee shall come a Governor,
  - type: text
    content: That shall rule my people Israel.
  '7':
  - type: text
    content: Then Herod, when he had privily called the wise men, enquired of them diligently what time the star appeared.
  '8':
  - type: text
    content: 'And he sent them to Bethlehem, and said, Go and search diligently for the young child; and when ye have found '
  - type: text
    content: him
  - type: text
    content: ', bring me word again, that I may come and worship him also. '
  '9':
  - type: text
    content: 'When they had heard the king, they departed; and, lo, the star, which they saw in the east, went before them, till it came and stood over where the young child was. '
