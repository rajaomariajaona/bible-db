  '13':
  - type: text
    content: 'The copy of the writing for a commandment to be given in every province '
  - type: text
    content: was
  - type: text
    content: ' published unto all people, and that the Jews should be ready against that day to avenge themselves on their enemies. '
  '14':
  - type: text
    content: So
  - type: text
    content: ' the posts that rode upon mules '
  - type: text
    content: and
  - type: text
    content: ' camels went out, being hastened and pressed on by the king''s commandment. And the decree was given at Shushan the palace.'
  '15':
  - type: text
    content: 'And Mordecai went out from the presence of the king in royal apparel of blue and white, and with a great crown of gold, and with a garment of fine linen and purple: and the city of Shushan rejoiced and was glad. '
  '16':
  - type: text
    content: 'The Jews had light, and gladness, and joy, and honour. '
  '17':
  - type: text
    content: And in every province, and in every city, whithersoever the king's commandment and his decree came, the Jews had joy and gladness, a feast and a good day. And many of the people of the land became Jews; for the fear of the Jews fell upon them.
  '2':
  - type: text
    content: And the king took off his ring, which he had taken from Haman, and gave it unto Mordecai. And Esther set Mordecai over the house of Haman.
  '3':
  - type: text
    content: 'And Esther spake yet again before the king, and fell down at his feet, and besought him with tears to put away the mischief of Haman the Agagite, and his device that he had devised against the Jews. '
  '4':
  - type: text
    content: 'Then the king held out the golden sceptre toward Esther. So Esther arose, and stood before the king, '
  '5':
  - type: text
    content: 'and said, If it please the king, and if I have found favour in his sight, and the thing '
  - type: text
    content: seem
  - type: text
    content: ' right before the king, and I '
  - type: text
    content: be
  - type: text
    content: ' pleasing in his eyes, let it be written to reverse the letters devised by Haman the son of Hammedatha the Agagite, which he wrote to destroy the Jews which '
  - type: text
    content: are
  - type: text
    content: ' in all the king''s provinces: '
  '6':
  - type: text
    content: 'for how can I endure to see the evil that shall come unto my people? or how can I endure to see the destruction of my kindred? '
  '7':
  - type: text
    content: 'Then the king Ahasuerus said unto Esther the queen and to Mordecai the Jew, Behold, I have given Esther the house of Haman, and him they have hanged upon the gallows, because he laid his hand upon the Jews. '
  '8':
  - type: text
    content: 'Write ye also for the Jews, as it liketh you, in the king''s name, and seal '
  - type: text
    content: it
  - type: text
    content: ' with the king''s ring: for the writing which is written in the king''s name, and sealed with the king''s ring, may no man reverse.'
  '9':
  - type: text
    content: 'Then were the king''s scribes called at that time in the third month, that '
  - type: text
    content: is
  - type: text
    content: ', the month Sivan, on the three and twentieth '
  - type: text
    content: day
  - type: text
    content: ' thereof; and it was written according to all that Mordecai commanded unto the Jews, and to the lieutenants, and the deputies and rulers of the provinces which '
  - type: text
    content: are
  - type: text
    content: ' from India unto Ethiopia, an hundred twenty and seven provinces, unto every province according to the writing thereof, and unto every people after their language, and to the Jews according to their writing, and according to their language. '
