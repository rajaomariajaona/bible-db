document_id: EST.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Mordecai Honoured
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day did the king Ahasuerus give the house of Haman the Jews'' enemy unto Esther the queen. And Mordecai came before the king; for Esther had told what he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' unto her. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he wrote in the king Ahasuerus'' name, and sealed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with the king''s ring, and sent letters by posts on horseback, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' riders on mules, camels, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' young dromedaries: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'wherein the king granted the Jews which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in every city to gather themselves together, and to stand for their life, to destroy, to slay, and to cause to perish, all the power of the people and province that would assault them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' little ones and women, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to take
    - type: text
      text: ' the spoil of them for a prey, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'upon one day in all the provinces of king Ahasuerus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', upon the thirteenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the twelfth month, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the month Adar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The copy of the writing for a commandment to be given in every province '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' published unto all people, and that the Jews should be ready against that day to avenge themselves on their enemies. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' the posts that rode upon mules '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' camels went out, being hastened and pressed on by the king''s commandment. And the decree was given at Shushan the palace.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mordecai went out from the presence of the king in royal apparel of blue and white, and with a great crown of gold, and with a garment of fine linen and purple: and the city of Shushan rejoiced and was glad. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews had light, and gladness, and joy, and honour. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And in every province, and in every city, whithersoever the king's commandment and his decree came, the Jews had joy and gladness, a feast and a good day. And many of the people of the land became Jews; for the fear of the Jews fell upon them.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king took off his ring, which he had taken from Haman, and gave it unto Mordecai. And Esther set Mordecai over the house of Haman.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Esther spake yet again before the king, and fell down at his feet, and besought him with tears to put away the mischief of Haman the Agagite, and his device that he had devised against the Jews. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king held out the golden sceptre toward Esther. So Esther arose, and stood before the king, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, If it please the king, and if I have found favour in his sight, and the thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: seem
    - type: text
      text: ' right before the king, and I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' pleasing in his eyes, let it be written to reverse the letters devised by Haman the son of Hammedatha the Agagite, which he wrote to destroy the Jews which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in all the king''s provinces: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for how can I endure to see the evil that shall come unto my people? or how can I endure to see the destruction of my kindred? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king Ahasuerus said unto Esther the queen and to Mordecai the Jew, Behold, I have given Esther the house of Haman, and him they have hanged upon the gallows, because he laid his hand upon the Jews. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Write ye also for the Jews, as it liketh you, in the king''s name, and seal '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with the king''s ring: for the writing which is written in the king''s name, and sealed with the king''s ring, may no man reverse.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then were the king''s scribes called at that time in the third month, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the month Sivan, on the three and twentieth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' thereof; and it was written according to all that Mordecai commanded unto the Jews, and to the lieutenants, and the deputies and rulers of the provinces which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' from India unto Ethiopia, an hundred twenty and seven provinces, unto every province according to the writing thereof, and unto every people after their language, and to the Jews according to their writing, and according to their language. '
