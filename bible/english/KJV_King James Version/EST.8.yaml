    content: Mordecai Honoured
  - type: text
    content: 'On that day did the king Ahasuerus give the house of Haman the Jews'' enemy unto Esther the queen. And Mordecai came before the king; for Esther had told what he '
  - type: text
    content: was
  - type: text
