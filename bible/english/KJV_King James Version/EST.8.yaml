  - type: text
    content: were
  - type: text
    content: ' in every city to gather themselves together, and to stand for their life, to destroy, to slay, and to cause to perish, all the power of the people and province that would assault them, '
  - type: text
    content: both
  - type: text
    content: ' little ones and women, and '
  - type: text
    content: to take
  - type: text
    content: ' the spoil of them for a prey, '
  '12':
  - type: text
    content: 'upon one day in all the provinces of king Ahasuerus, '
  - type: text
    content: namely
  - type: text
