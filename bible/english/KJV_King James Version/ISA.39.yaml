verses:
  '1':
  - type: heading
    content: Towards the Captivity
  - type: text
    content: 'At that time Merodachbaladan, the son of Baladan, king of Babylon, sent letters and a present to Hezekiah: for he had heard that he had been sick, and was recovered. '
  '2':
  - type: text
    content: 'And Hezekiah was glad of them, and shewed them the house of his precious things, the silver, and the gold, and the spices, and the precious ointment, and all the house of his armour, and all that was found in his treasures: there was nothing in his house, nor in all his dominion, that Hezekiah shewed them not.'
  '3':
  - type: text
    content: 'Then came Isaiah the prophet unto king Hezekiah, and said unto him, What said these men? and from whence came they unto thee? And Hezekiah said, They are come from a far country unto me, '
  - type: text
    content: even
  - type: text
    content: ' from Babylon. '
  '4':
  - type: text
    content: 'Then said he, What have they seen in thine house? And Hezekiah answered, All that '
  - type: text
    content: is
  - type: text
    content: ' in mine house have they seen: there is nothing among my treasures that I have not shewed them.'
  '5':
  - type: text
    content: 'Then said Isaiah to Hezekiah, Hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts: '
  '6':
  - type: text
    content: 'Behold, the days come, that all that '
  - type: text
    content: is
  - type: text
    content: ' in thine house, and '
  - type: text
    content: that
  - type: text
    content: ' which thy fathers have laid up in store until this day, shall be carried to Babylon: nothing shall be left, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And of thy sons that shall issue from thee, which thou shalt beget, shall they take away; and they shall be eunuchs in the palace of the king of Babylon. '
  '8':
  - type: text
    content: 'Then said Hezekiah to Isaiah, Good '
  - type: text
    content: is
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' which thou hast spoken. He said moreover, For there shall be peace and truth in my days.'
