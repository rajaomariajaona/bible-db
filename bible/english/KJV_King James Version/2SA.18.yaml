document_id: 2SA.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And David numbered the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, and set captains of thousands and captains of hundreds over them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And a certain man saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and told Joab, and said, Behold, I saw Absalom hanged in an oak. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Joab said unto the man that told him, And, behold, thou sawest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and why didst thou not smite him there to the ground? and I would have given thee ten '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver, and a girdle. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the man said unto Joab, Though I should receive a thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver in mine hand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' would I not put forth mine hand against the king''s son: for in our hearing the king charged thee and Abishai and Ittai, saying, Beware that none '
    - type: usfm
      marker: add
      children:
      - type: text
        text: touch
    - type: text
      text: ' the young man Absalom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Otherwise I should have wrought falsehood against mine own life: for there is no matter hid from the king, and thou thyself wouldest have set thyself against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then said Joab, I may not tarry thus with thee. And he took three darts in his hand, and thrust them through the heart of Absalom, while he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' yet alive in the midst of the oak. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And ten young men that bare Joab's armour compassed about and smote Absalom, and slew him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Joab blew the trumpet, and the people returned from pursuing after Israel: for Joab held back the people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they took Absalom, and cast him into a great pit in the wood, and laid a very great heap of stones upon him: and all Israel fled every one to his tent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now Absalom in his lifetime had taken and reared up for himself a pillar, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the king''s dale: for he said, I have no son to keep my name in remembrance: and he called the pillar after his own name: and it is called unto this day, Absalom''s place.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then said Ahimaaz the son of Zadok, Let me now run, and bear the king tidings, how that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath avenged him of his enemies. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And David sent forth a third part of the people under the hand of Joab, and a third part under the hand of Abishai the son of Zeruiah, Joab''s brother, and a third part under the hand of Ittai the Gittite. And the king said unto the people, I will surely go forth with you myself also. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Joab said unto him, Thou shalt not bear tidings this day, but thou shalt bear tidings another day: but this day thou shalt bear no tidings, because the king''s son is dead. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then said Joab to Cushi, Go tell the king what thou hast seen. And Cushi bowed himself unto Joab, and ran. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then said Ahimaaz the son of Zadok yet again to Joab, But howsoever, let me, I pray thee, also run after Cushi. And Joab said, Wherefore wilt thou run, my son, seeing that thou hast no tidings ready? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But howsoever, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: said he
    - type: text
      text: ', let me run. And he said unto him, Run. Then Ahimaaz ran by the way of the plain, and overran Cushi.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And David sat between the two gates: and the watchman went up to the roof over the gate unto the wall, and lifted up his eyes, and looked, and behold a man running alone. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the watchman cried, and told the king. And the king said, If he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' alone, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' tidings in his mouth. And he came apace, and drew near. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the watchman saw another man running: and the watchman called unto the porter, and said, Behold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' man running alone. And the king said, He also bringeth tidings. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the watchman said, Me thinketh the running of the foremost is like the running of Ahimaaz the son of Zadok. And the king said, He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a good man, and cometh with good tidings.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Ahimaaz called, and said unto the king, All is well. And he fell down to the earth upon his face before the king, and said, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which hath delivered up the men that lifted up their hand against my lord the king. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And the king said, Is the young man Absalom safe? And Ahimaaz answered, When Joab sent the king''s servant, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' thy servant, I saw a great tumult, but I knew not what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But the people answered, Thou shalt not go forth: for if we flee away, they will not care for us; neither if half of us die, will they care for us: but now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou art
    - type: text
      text: ' worth ten thousand of us: therefore now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' better that thou succour us out of the city. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And the king said '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ', Turn aside, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' stand here. And he turned aside, and stood still.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And, behold, Cushi came; and Cushi said, Tidings, my lord the king: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath avenged thee this day of all them that rose up against thee. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And the king said unto Cushi, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' the young man Absalom safe? And Cushi answered, The enemies of my lord the king, and all that rise against thee to do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' hurt, be as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' young man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And the king was much moved, and went up to the chamber over the gate, and wept: and as he went, thus he said, O my son Absalom, my son, my son Absalom! would God I had died for thee, O Absalom, my son, my son!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the king said unto them, What seemeth you best I will do. And the king stood by the gate side, and all the people came out by hundreds and by thousands. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the king commanded Joab and Abishai and Ittai, saying, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Deal
    - type: text
      text: ' gently for my sake with the young man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' with Absalom. And all the people heard when the king gave all the captains charge concerning Absalom.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the people went out into the field against Israel: and the battle was in the wood of Ephraim; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'where the people of Israel were slain before the servants of David, and there was there a great slaughter that day of twenty thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For the battle was there scattered over the face of all the country: and the wood devoured more people that day than the sword devoured.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Death of Absalom
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Absalom met the servants of David. And Absalom rode upon a mule, and the mule went under the thick boughs of a great oak, and his head caught hold of the oak, and he was taken up between the heaven and the earth; and the mule that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' under him went away. '
