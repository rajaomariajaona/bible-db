document_id: PSA.38
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David, to bring to remembrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', rebuke me not in thy wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither chasten me in thy hot displeasure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For thine arrows stick fast in me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy hand presseth me sore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no soundness in my flesh because of thine anger;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there any
  - type: text
    text: ' rest in my bones because of my sin.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For mine iniquities are gone over mine head:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: As an heavy burden they are too heavy for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My wounds stink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' are corrupt'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of my foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am troubled; I am bowed down greatly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I go mourning all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For my loins are filled with a loathsome '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'disease:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no soundness in my flesh.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I am feeble and sore broken:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have roared by reason of the disquietness of my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lord, all my desire '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before thee;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my groaning is not hid from thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'My heart panteth, my strength faileth me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: As for the light of mine eyes, it also is gone from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My lovers and my friends stand aloof from my sore;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my kinsmen stand afar off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They also that seek after my life lay snares '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'for me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they that seek my hurt speak mischievous things, and imagine deceits all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I, as a deaf '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', heard not;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I was
  - type: text
    text: ' as a dumb man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' openeth not his mouth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thus I was as a man that heareth not,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in whose mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' no reproofs.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For in thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', do I hope:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou wilt hear, O Lord my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For I said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Hear me
  - type: text
    text: ', lest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: otherwise
  - type: text
    text: ' they should rejoice over me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When my foot slippeth, they magnify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' against me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' ready to halt,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my sorrow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' continually before me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For I will declare mine iniquity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be sorry for my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But mine enemies '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' lively, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they are strong:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they that hate me wrongfully are multiplied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They also that render evil for good
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Are mine adversaries; because I follow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the thing that
  - type: text
    text: ' good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Forsake me not, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O my God, be not far from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Make haste to help me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Lord my salvation.
