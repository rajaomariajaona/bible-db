document_id: PSA.38,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David, to bring to remembrance.
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', rebuke me not in thy wrath:'
  - type: text
    content: Neither chasten me in thy hot displeasure.
  '10':
  - type: text
    content: 'My heart panteth, my strength faileth me:'
  - type: text
    content: As for the light of mine eyes, it also is gone from me.
  '11':
  - type: text
    content: My lovers and my friends stand aloof from my sore;
  - type: text
    content: And my kinsmen stand afar off.
  '12':
  - type: text
    content: 'They also that seek after my life lay snares '
  - type: text
    content: 'for me:'
  - type: text
    content: And they that seek my hurt speak mischievous things, and imagine deceits all the day long.
  '13':
  - type: text
    content: 'But I, as a deaf '
  - type: text
    content: man
  - type: text
    content: ', heard not;'
  - type: text
    content: 'And '
  - type: text
    content: I was
  - type: text
    content: ' as a dumb man '
  - type: text
    content: that
  - type: text
    content: ' openeth not his mouth.'
  '14':
  - type: text
    content: Thus I was as a man that heareth not,
  - type: text
    content: 'And in whose mouth '
  - type: text
    content: are
  - type: text
    content: ' no reproofs.'
  '15':
  - type: text
    content: 'For in thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', do I hope:'
  - type: text
    content: Thou wilt hear, O Lord my God.
  '16':
  - type: text
    content: 'For I said, '
  - type: text
    content: Hear me
  - type: text
    content: ', lest '
  - type: text
    content: otherwise
  - type: text
    content: ' they should rejoice over me:'
  - type: text
    content: 'When my foot slippeth, they magnify '
  - type: text
    content: themselves
  - type: text
    content: ' against me.'
  '17':
  - type: text
    content: 'For I '
  - type: text
    content: am
  - type: text
    content: ' ready to halt,'
  - type: text
    content: 'And my sorrow '
  - type: text
    content: is
  - type: text
    content: ' continually before me.'
  '18':
  - type: text
    content: For I will declare mine iniquity;
  - type: text
    content: I will be sorry for my sin.
  '19':
  - type: text
    content: 'But mine enemies '
  - type: text
    content: are
  - type: text
    content: ' lively, '
  - type: text
    content: and
  - type: text
    content: ' they are strong:'
  - type: text
    content: And they that hate me wrongfully are multiplied.
  '2':
  - type: text
    content: For thine arrows stick fast in me,
  - type: text
    content: And thy hand presseth me sore.
  '20':
  - type: text
    content: They also that render evil for good
  - type: text
    content: 'Are mine adversaries; because I follow '
  - type: text
    content: the thing that
  - type: text
    content: ' good '
  - type: text
    content: is
  - type: text
    content: .
  '21':
  - type: text
    content: 'Forsake me not, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: O my God, be not far from me.
  '22':
  - type: text
    content: Make haste to help me,
  - type: text
    content: O Lord my salvation.
  '3':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' no soundness in my flesh because of thine anger;'
  - type: text
    content: 'Neither '
  - type: text
    content: is there any
  - type: text
    content: ' rest in my bones because of my sin.'
  '4':
  - type: text
    content: 'For mine iniquities are gone over mine head:'
  - type: text
    content: As an heavy burden they are too heavy for me.
  '5':
  - type: text
    content: 'My wounds stink '
  - type: text
    content: and
  - type: text
    content: ' are corrupt'
  - type: text
    content: Because of my foolishness.
  '6':
  - type: text
    content: I am troubled; I am bowed down greatly;
  - type: text
    content: I go mourning all the day long.
  '7':
  - type: text
    content: 'For my loins are filled with a loathsome '
  - type: text
    content: 'disease:'
  - type: text
    content: 'And '
  - type: text
    content: there is
  - type: text
    content: ' no soundness in my flesh.'
  '8':
  - type: text
    content: 'I am feeble and sore broken:'
  - type: text
    content: I have roared by reason of the disquietness of my heart.
  '9':
  - type: text
    content: 'Lord, all my desire '
  - type: text
    content: is
  - type: text
    content: ' before thee;'
  - type: text
    content: And my groaning is not hid from thee.
