document_id: 1CO.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And I, brethren, when I came to you, came not with excellency of speech or of wisdom, declaring unto you the testimony of God. '
  '10':
  - type: text
    content: 'But God hath revealed '
  - type: text
    content: them
  - type: text
    content: ' unto us by his Spirit: for the Spirit searcheth all things, yea, the deep things of God. '
  '11':
  - type: text
    content: 'For what man knoweth the things of a man, save the spirit of man which is in him? even so the things of God knoweth no man, but the Spirit of God. '
  '12':
  - type: text
    content: 'Now we have received, not the spirit of the world, but the spirit which is of God; that we might know the things that are freely given to us of God. '
  '13':
  - type: text
    content: 'Which things also we speak, not in the words which man''s wisdom teacheth, but which the Holy Ghost teacheth; comparing spiritual things with spiritual. '
  '14':
  - type: text
    content: 'But the natural man receiveth not the things of the Spirit of God: for they are foolishness unto him: neither can he know '
  - type: text
    content: them
  - type: text
    content: ', because they are spiritually discerned. '
  '15':
  - type: text
    content: 'But he that is spiritual judgeth all things, yet he himself is judged of no man. '
  '16':
  - type: text
    content: For who hath known the mind of the Lord, that he may instruct him? But we have the mind of Christ.
  '2':
  - type: text
    content: 'For I determined not to know any thing among you, save Jesus Christ, and him crucified. '
  '3':
  - type: text
    content: 'And I was with you in weakness, and in fear, and in much trembling. '
  '4':
  - type: text
    content: 'And my speech and my preaching '
  - type: text
    content: was
  - type: text
    content: ' not with enticing words of man''s wisdom, but in demonstration of the Spirit and of power: '
  '5':
  - type: text
    content: that your faith should not stand in the wisdom of men, but in the power of God.
  '6':
  - type: text
    content: 'Howbeit we speak wisdom among them that are perfect: yet not the wisdom of this world, nor of the princes of this world, that come to nought: '
  '7':
  - type: text
    content: 'but we speak the wisdom of God in a mystery, '
  - type: text
    content: even
  - type: text
    content: ' the hidden '
  - type: text
    content: wisdom
  - type: text
    content: ', which God ordained before the world unto our glory: '
  '8':
  - type: text
    content: 'which none of the princes of this world knew: for had they known '
  - type: text
    content: it
  - type: text
    content: ', they would not have crucified the Lord of glory. '
  '9':
  - type: text
    content: But as it is written,
  - type: text
    content: Eye hath not seen, nor ear heard,
  - type: text
    content: Neither have entered into the heart of man,
  - type: text
    content: The things which God hath prepared for them that love him.
