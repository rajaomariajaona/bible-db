document_id: 1CO.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And I, brethren, when I came to you, came not with excellency of speech or of wisdom, declaring unto you the testimony of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I determined not to know any thing among you, save Jesus Christ, and him crucified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I was with you in weakness, and in fear, and in much trembling. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And my speech and my preaching '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not with enticing words of man''s wisdom, but in demonstration of the Spirit and of power: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: that your faith should not stand in the wisdom of men, but in the power of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Howbeit we speak wisdom among them that are perfect: yet not the wisdom of this world, nor of the princes of this world, that come to nought: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but we speak the wisdom of God in a mystery, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the hidden '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wisdom
  - type: text
    text: ', which God ordained before the world unto our glory: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'which none of the princes of this world knew: for had they known '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they would not have crucified the Lord of glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But as it is written,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eye hath not seen, nor ear heard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither have entered into the heart of man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The things which God hath prepared for them that love him.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But God hath revealed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' unto us by his Spirit: for the Spirit searcheth all things, yea, the deep things of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For what man knoweth the things of a man, save the spirit of man which is in him? even so the things of God knoweth no man, but the Spirit of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now we have received, not the spirit of the world, but the spirit which is of God; that we might know the things that are freely given to us of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Which things also we speak, not in the words which man''s wisdom teacheth, but which the Holy Ghost teacheth; comparing spiritual things with spiritual. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the natural man receiveth not the things of the Spirit of God: for they are foolishness unto him: neither can he know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', because they are spiritually discerned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But he that is spiritual judgeth all things, yet he himself is judged of no man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For who hath known the mind of the Lord, that he may instruct him? But we have the mind of Christ.
