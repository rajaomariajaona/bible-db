document_id: 1SA.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Call of Samuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the child Samuel ministered unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' before Eli. And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was precious in those days; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no open vision. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came, and stood, and called as at other times, Samuel, Samuel. Then Samuel answered, Speak; for thy servant heareth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to Samuel, Behold, I will do a thing in Israel, at which both the ears of every one that heareth it shall tingle. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day I will perform against Eli all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' which I have spoken concerning his house: when I begin, I will also make an end. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have told him that I will judge his house for ever for the iniquity which he knoweth; because his sons made themselves vile, and he restrained them not. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And therefore I have sworn unto the house of Eli, that the iniquity of Eli's house shall not be purged with sacrifice nor offering for ever.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samuel lay until the morning, and opened the doors of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And Samuel feared to shew Eli the vision. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eli called Samuel, and said, Samuel, my son. And he answered, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
    - type: text
      text: ' hath said unto thee? I pray thee hide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not from me: God do so to thee, and more also, if thou hide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' thing from me of all the things that he said unto thee. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samuel told him every whit, and hid nothing from him. And he said, It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': let him do what seemeth him good.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samuel grew, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was with him, and did let none of his words fall to the ground. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at that time, when Eli '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' laid down in his place, and his eyes began to wax dim, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he could not see; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all Israel from Dan even to Beer-sheba knew that Samuel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' established '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared again in Shiloh: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' revealed himself to Samuel in Shiloh by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and ere the lamp of God went out in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', where the ark of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ', and Samuel was laid down '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to sleep
    - type: text
      text: '; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' called Samuel: and he answered, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he ran unto Eli, and said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I; for thou calledst me. And he said, I called not; lie down again. And he went and lay down. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' called yet again, Samuel. And Samuel arose and went to Eli, and said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I; for thou didst call me. And he answered, I called not, my son; lie down again. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Samuel did not yet know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', neither was the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' yet revealed unto him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' called Samuel again the third time. And he arose and went to Eli, and said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I; for thou didst call me. And Eli perceived that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had called the child. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Eli said unto Samuel, Go, lie down: and it shall be, if he call thee, that thou shalt say, Speak, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; for thy servant heareth. So Samuel went and lay down in his place.
