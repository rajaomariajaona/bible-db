document_id: JER.50,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word that the '
  - type: text
    content: LORD
  - type: text
    content: ' spake against Babylon '
  - type: text
    content: and
  - type: text
    content: ' against the land of the Chaldeans by Jeremiah the prophet. '
  '10':
  - type: text
    content: 'And Chaldea shall be a spoil: all that spoil her shall be satisfied, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '11':
  - type: text
    content: 'Because ye were glad, because ye rejoiced, O ye destroyers of mine heritage, because ye are grown fat as the heifer at grass, and bellow as bulls; '
  '12':
  - type: text
    content: 'your mother shall be sore confounded; she that bare you shall be ashamed: behold, the hindermost of the nations '
  - type: text
    content: shall be
  - type: text
    content: ' a wilderness, a dry land, and a desert. '
  '13':
  - type: text
    content: 'Because of the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' it shall not be inhabited, but it shall be wholly desolate: every one that goeth by Babylon shall be astonished, and hiss at all her plagues.'
  '14':
  - type: text
    content: 'Put yourselves in array against Babylon round about: all ye that bend the bow, shoot at her, spare no arrows: for she hath sinned against the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Shout against her round about: she hath given her hand: her foundations are fallen, her walls are thrown down: for it '
  - type: text
    content: is
  - type: text
    content: ' the vengeance of the '
  - type: text
    content: LORD
  - type: text
    content: ': take vengeance upon her; as she hath done, do unto her. '
  '16':
  - type: text
    content: 'Cut off the sower from Babylon, and him that handleth the sickle in the time of harvest: for fear of the oppressing sword they shall turn every one to his people, and they shall flee every one to his own land.'
  '17':
  - type: text
    content: 'Israel '
  - type: text
    content: is
  - type: text
    content: ' a scattered sheep; the lions have driven '
  - type: text
    content: him
  - type: text
    content: ' away: first the king of Assyria hath devoured him; and last this Nebuchadrezzar king of Babylon hath broken his bones. '
  '18':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Behold, I will punish the king of Babylon and his land, as I have punished the king of Assyria. '
  '19':
  - type: text
    content: 'And I will bring Israel again to his habitation, and he shall feed on Carmel and Bashan, and his soul shall be satisfied upon mount Ephraim and Gilead. '
  '2':
  - type: text
    content: 'Declare ye among the nations, and publish, and set up a standard; publish, '
  - type: text
    content: and
  - type: text
    content: ' conceal not: say, Babylon is taken, Bel is confounded, Merodach is broken in pieces; her idols are confounded, her images are broken in pieces. '
  '20':
  - type: text
    content: 'In those days, and in that time, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the iniquity of Israel shall be sought for, and '
  - type: text
    content: there shall be
  - type: text
    content: ' none; and the sins of Judah, and they shall not be found: for I will pardon them whom I reserve.'
  '21':
  - type: text
    content: 'Go up against the land of Merathaim, '
  - type: text
    content: even
  - type: text
    content: ' against it, and against the inhabitants of Pekod: waste and utterly destroy after them, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and do according to all that I have commanded thee. '
  '22':
  - type: text
    content: 'A sound of battle '
  - type: text
    content: is
  - type: text
    content: ' in the land, and of great destruction. '
  '23':
  - type: text
    content: 'How is the hammer of the whole earth cut asunder and broken! how is Babylon become a desolation among the nations! '
  '24':
  - type: text
    content: 'I have laid a snare for thee, and thou art also taken, O Babylon, and thou wast not aware: thou art found, and also caught, because thou hast striven against the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath opened his armoury, and hath brought forth the weapons of his indignation: for this '
  - type: text
    content: is
  - type: text
    content: ' the work of the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts in the land of the Chaldeans.'
  '26':
  - type: text
    content: 'Come against her from the utmost border, open her storehouses: cast her up as heaps, and destroy her utterly: let nothing of her be left. '
  '27':
  - type: text
    content: 'Slay all her bullocks; let them go down to the slaughter: woe unto them! for their day is come, the time of their visitation. '
  '28':
  - type: text
    content: 'The voice of them that flee and escape out of the land of Babylon, to declare in Zion the vengeance of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, the vengeance of his temple.'
  '29':
  - type: text
    content: 'Call together the archers against Babylon: all ye that bend the bow, camp against it round about; let none thereof escape: recompense her according to her work; according to all that she hath done, do unto her: for she hath been proud against the '
  - type: text
    content: LORD
  - type: text
    content: ', against the Holy One of Israel. '
  '3':
  - type: text
    content: 'For out of the north there cometh up a nation against her, which shall make her land desolate, and none shall dwell therein: they shall remove, they shall depart, both man and beast.'
  '30':
  - type: text
    content: 'Therefore shall her young men fall in the streets, and all her men of war shall be cut off in that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '31':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' against thee, '
  - type: text
    content: O thou
  - type: text
    content: ' most proud, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts: for thy day is come, the time '
  - type: text
    content: that
  - type: text
    content: ' I will visit thee. '
  '32':
  - type: text
    content: 'And the most proud shall stumble and fall, and none shall raise him up: and I will kindle a fire in his cities, and it shall devour all round about him.'
  '33':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; The children of Israel and the children of Judah '
  - type: text
    content: were
  - type: text
    content: ' oppressed together: and all that took them captives held them fast; they refused to let them go. '
  '34':
  - type: text
    content: 'Their Redeemer '
  - type: text
    content: is
  - type: text
    content: ' strong; The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' his name: he shall throughly plead their cause, that he may give rest to the land, and disquiet the inhabitants of Babylon.'
  '35':
  - type: text
    content: 'A sword '
  - type: text
    content: is
  - type: text
    content: ' upon the Chaldeans, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and upon the inhabitants of Babylon, and upon her princes, and upon her wise '
  - type: text
    content: men
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'A sword '
  - type: text
    content: is
  - type: text
    content: ' upon the liars; and they shall dote: a sword '
  - type: text
    content: is
  - type: text
    content: ' upon her mighty men; and they shall be dismayed. '
  '37':
  - type: text
    content: 'A sword '
  - type: text
    content: is
  - type: text
    content: ' upon their horses, and upon their chariots, and upon all the mingled people that '
  - type: text
    content: are
  - type: text
    content: ' in the midst of her; and they shall become as women: a sword '
  - type: text
    content: is
  - type: text
    content: ' upon her treasures; and they shall be robbed. '
  '38':
  - type: text
    content: 'A drought '
  - type: text
    content: is
  - type: text
    content: ' upon her waters; and they shall be dried up: for it '
  - type: text
    content: is
  - type: text
    content: ' the land of graven images, and they are mad upon '
  - type: text
    content: their
  - type: text
    content: ' idols.'
  '39':
  - type: text
    content: 'Therefore the wild beasts of the desert with the wild beasts of the islands shall dwell '
  - type: text
    content: there
  - type: text
    content: ', and the owls shall dwell therein: and it shall be no more inhabited for ever; neither shall it be dwelt in from generation to generation. '
  '4':
  - type: text
    content: 'In those days, and in that time, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the children of Israel shall come, they and the children of Judah together, going and weeping: they shall go, and seek the '
  - type: text
    content: LORD
  - type: text
    content: ' their God. '
  '40':
  - type: text
    content: 'As God overthrew Sodom and Gomorrah and the neighbour '
  - type: text
    content: cities
  - type: text
    content: ' thereof, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; '
  - type: text
    content: so
  - type: text
    content: ' shall no man abide there, neither shall any son of man dwell therein.'
  '41':
  - type: text
    content: 'Behold, a people shall come from the north, and a great nation, and many kings shall be raised up from the coasts of the earth. '
  '42':
  - type: text
    content: 'They shall hold the bow and the lance: they '
  - type: text
    content: are
  - type: text
    content: ' cruel, and will not shew mercy: their voice shall roar like the sea, and they shall ride upon horses, '
  - type: text
    content: every one
  - type: text
    content: ' put in array, like a man to the battle, against thee, O daughter of Babylon. '
  '43':
  - type: text
    content: 'The king of Babylon hath heard the report of them, and his hands waxed feeble: anguish took hold of him, '
  - type: text
    content: and
  - type: text
    content: ' pangs as of a woman in travail.'
  '44':
  - type: text
    content: 'Behold, he shall come up like a lion from the swelling of Jordan unto the habitation of the strong: but I will make them suddenly run away from her: and who '
  - type: text
    content: is
  - type: text
    content: ' a chosen '
  - type: text
    content: man, that
  - type: text
    content: ' I may appoint over her? for who '
  - type: text
    content: is
  - type: text
    content: ' like me? and who will appoint me the time? and who '
  - type: text
    content: is
  - type: text
    content: ' that shepherd that will stand before me? '
  '45':
  - type: text
    content: 'Therefore hear ye the counsel of the '
  - type: text
    content: LORD
  - type: text
    content: ', that he hath taken against Babylon; and his purposes, that he hath purposed against the land of the Chaldeans: Surely the least of the flock shall draw them out: surely he shall make '
  - type: text
    content: their
  - type: text
    content: ' habitation desolate with them. '
  '46':
  - type: text
    content: At the noise of the taking of Babylon the earth is moved, and the cry is heard among the nations.
  '5':
  - type: text
    content: 'They shall ask the way to Zion with their faces thitherward, '
  - type: text
    content: saying
  - type: text
    content: ', Come, and let us join ourselves to the '
  - type: text
    content: LORD
  - type: text
    content: ' in a perpetual covenant '
  - type: text
    content: that
  - type: text
    content: ' shall not be forgotten.'
  '6':
  - type: text
    content: 'My people hath been lost sheep: their shepherds have caused them to go astray, they have turned them away '
  - type: text
    content: on
  - type: text
    content: ' the mountains: they have gone from mountain to hill, they have forgotten their restingplace. '
  '7':
  - type: text
    content: 'All that found them have devoured them: and their adversaries said, We offend not, because they have sinned against the '
  - type: text
    content: LORD
  - type: text
    content: ', the habitation of justice, even the '
  - type: text
    content: LORD
  - type: text
    content: ', the hope of their fathers.'
  '8':
  - type: text
    content: 'Remove out of the midst of Babylon, and go forth out of the land of the Chaldeans, and be as the he goats before the flocks. '
  '9':
  - type: text
    content: 'For, lo, I will raise and cause to come up against Babylon an assembly of great nations from the north country: and they shall set themselves in array against her; from thence she shall be taken: their arrows '
  - type: text
    content: shall be
  - type: text
    content: ' as of a mighty expert man; none shall return in vain. '
