document_id: JER.50
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake against Babylon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' against the land of the Chaldeans by Jeremiah the prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Declare ye among the nations, and publish, and set up a standard; publish, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' conceal not: say, Babylon is taken, Bel is confounded, Merodach is broken in pieces; her idols are confounded, her images are broken in pieces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For out of the north there cometh up a nation against her, which shall make her land desolate, and none shall dwell therein: they shall remove, they shall depart, both man and beast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In those days, and in that time, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the children of Israel shall come, they and the children of Judah together, going and weeping: they shall go, and seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They shall ask the way to Zion with their faces thitherward, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Come, and let us join ourselves to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in a perpetual covenant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall not be forgotten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'My people hath been lost sheep: their shepherds have caused them to go astray, they have turned them away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on
  - type: text
    text: ' the mountains: they have gone from mountain to hill, they have forgotten their restingplace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All that found them have devoured them: and their adversaries said, We offend not, because they have sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the habitation of justice, even the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the hope of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Remove out of the midst of Babylon, and go forth out of the land of the Chaldeans, and be as the he goats before the flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For, lo, I will raise and cause to come up against Babylon an assembly of great nations from the north country: and they shall set themselves in array against her; from thence she shall be taken: their arrows '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' as of a mighty expert man; none shall return in vain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Chaldea shall be a spoil: all that spoil her shall be satisfied, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Because ye were glad, because ye rejoiced, O ye destroyers of mine heritage, because ye are grown fat as the heifer at grass, and bellow as bulls; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'your mother shall be sore confounded; she that bare you shall be ashamed: behold, the hindermost of the nations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a wilderness, a dry land, and a desert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Because of the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' it shall not be inhabited, but it shall be wholly desolate: every one that goeth by Babylon shall be astonished, and hiss at all her plagues.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Put yourselves in array against Babylon round about: all ye that bend the bow, shoot at her, spare no arrows: for she hath sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Shout against her round about: she hath given her hand: her foundations are fallen, her walls are thrown down: for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the vengeance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': take vengeance upon her; as she hath done, do unto her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cut off the sower from Babylon, and him that handleth the sickle in the time of harvest: for fear of the oppressing sword they shall turn every one to his people, and they shall flee every one to his own land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a scattered sheep; the lions have driven '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' away: first the king of Assyria hath devoured him; and last this Nebuchadrezzar king of Babylon hath broken his bones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of Israel; Behold, I will punish the king of Babylon and his land, as I have punished the king of Assyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I will bring Israel again to his habitation, and he shall feed on Carmel and Bashan, and his soul shall be satisfied upon mount Ephraim and Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In those days, and in that time, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the iniquity of Israel shall be sought for, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' none; and the sins of Judah, and they shall not be found: for I will pardon them whom I reserve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Go up against the land of Merathaim, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' against it, and against the inhabitants of Pekod: waste and utterly destroy after them, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and do according to all that I have commanded thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A sound of battle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the land, and of great destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'How is the hammer of the whole earth cut asunder and broken! how is Babylon become a desolation among the nations! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I have laid a snare for thee, and thou art also taken, O Babylon, and thou wast not aware: thou art found, and also caught, because thou hast striven against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath opened his armoury, and hath brought forth the weapons of his indignation: for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the work of the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts in the land of the Chaldeans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Come against her from the utmost border, open her storehouses: cast her up as heaps, and destroy her utterly: let nothing of her be left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Slay all her bullocks; let them go down to the slaughter: woe unto them! for their day is come, the time of their visitation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The voice of them that flee and escape out of the land of Babylon, to declare in Zion the vengeance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, the vengeance of his temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Call together the archers against Babylon: all ye that bend the bow, camp against it round about; let none thereof escape: recompense her according to her work; according to all that she hath done, do unto her: for she hath been proud against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', against the Holy One of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Therefore shall her young men fall in the streets, and all her men of war shall be cut off in that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' against thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: O thou
  - type: text
    text: ' most proud, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts: for thy day is come, the time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I will visit thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the most proud shall stumble and fall, and none shall raise him up: and I will kindle a fire in his cities, and it shall devour all round about him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts; The children of Israel and the children of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' oppressed together: and all that took them captives held them fast; they refused to let them go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Their Redeemer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' strong; The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name: he shall throughly plead their cause, that he may give rest to the land, and disquiet the inhabitants of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'A sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the Chaldeans, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and upon the inhabitants of Babylon, and upon her princes, and upon her wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'A sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the liars; and they shall dote: a sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon her mighty men; and they shall be dismayed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'A sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon their horses, and upon their chariots, and upon all the mingled people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the midst of her; and they shall become as women: a sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon her treasures; and they shall be robbed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'A drought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon her waters; and they shall be dried up: for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the land of graven images, and they are mad upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Therefore the wild beasts of the desert with the wild beasts of the islands shall dwell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ', and the owls shall dwell therein: and it shall be no more inhabited for ever; neither shall it be dwelt in from generation to generation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'As God overthrew Sodom and Gomorrah and the neighbour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cities
  - type: text
    text: ' thereof, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' shall no man abide there, neither shall any son of man dwell therein.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Behold, a people shall come from the north, and a great nation, and many kings shall be raised up from the coasts of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They shall hold the bow and the lance: they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' cruel, and will not shew mercy: their voice shall roar like the sea, and they shall ride upon horses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every one
  - type: text
    text: ' put in array, like a man to the battle, against thee, O daughter of Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The king of Babylon hath heard the report of them, and his hands waxed feeble: anguish took hold of him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' pangs as of a woman in travail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Behold, he shall come up like a lion from the swelling of Jordan unto the habitation of the strong: but I will make them suddenly run away from her: and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a chosen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man, that
  - type: text
    text: ' I may appoint over her? for who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like me? and who will appoint me the time? and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that shepherd that will stand before me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Therefore hear ye the counsel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that he hath taken against Babylon; and his purposes, that he hath purposed against the land of the Chaldeans: Surely the least of the flock shall draw them out: surely he shall make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' habitation desolate with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: At the noise of the taking of Babylon the earth is moved, and the cry is heard among the nations.
