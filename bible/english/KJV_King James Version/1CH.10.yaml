document_id: 1CH.10,1
type_code: eng
verses:
  '1':
  - type: heading
    content: From Saul to David
  - type: text
    content: 'Now the Philistines fought against Israel; and the men of Israel fled from before the Philistines, and fell down slain in mount Gilboa. '
  '10':
  - type: text
    content: 'And they put his armour in the house of their gods, and fastened his head in the temple of Dagon. '
  '11':
  - type: text
    content: 'And when all Jabesh-gilead heard all that the Philistines had done to Saul, '
  '12':
  - type: text
    content: they arose, all the valiant men, and took away the body of Saul, and the bodies of his sons, and brought them to Jabesh, and buried their bones under the oak in Jabesh, and fasted seven days.
  '13':
  - type: text
    content: 'So Saul died for his transgression which he committed against the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' against the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he kept not, and also for asking '
  - type: text
    content: counsel
  - type: text
    content: ' of '
  - type: text
    content: one that had
  - type: text
    content: ' a familiar spirit, to enquire '
  - type: text
    content: of it
  - type: text
    content: '; '
  '14':
  - type: text
    content: 'and enquired not of the '
  - type: text
    content: LORD
  - type: text
    content: ': therefore he slew him, and turned the kingdom unto David the son of Jesse.'
  '2':
  - type: text
    content: 'And the Philistines followed hard after Saul, and after his sons; and the Philistines slew Jonathan, and Abinadab, and Malchi-shua, the sons of Saul. '
  '3':
  - type: text
    content: 'And the battle went sore against Saul, and the archers hit him, and he was wounded of the archers. '
  '4':
  - type: text
    content: 'Then said Saul to his armourbearer, Draw thy sword, and thrust me through therewith; lest these uncircumcised come and abuse me. But his armourbearer would not; for he was sore afraid. So Saul took a sword, and fell upon it. '
  '5':
  - type: text
    content: 'And when his armourbearer saw that Saul was dead, he fell likewise on the sword, and died. '
  '6':
  - type: text
    content: So Saul died, and his three sons, and all his house died together.
  '7':
  - type: text
    content: 'And when all the men of Israel that '
  - type: text
    content: were
  - type: text
    content: ' in the valley saw that they fled, and that Saul and his sons were dead, then they forsook their cities, and fled: and the Philistines came and dwelt in them. '
  '8':
  - type: text
    content: 'And it came to pass on the morrow, when the Philistines came to strip the slain, that they found Saul and his sons fallen in mount Gilboa. '
  '9':
  - type: text
    content: 'And when they had stripped him, they took his head, and his armour, and sent into the land of the Philistines round about, to carry tidings unto their idols, and to the people. '
