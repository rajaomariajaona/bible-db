document_id: NEH.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Zerubbabel's Company
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the priests and the Levites that went up with Zerubbabel the son of Shealtiel, and Jeshua: Seraiah, Jeremiah, Ezra, '
  '10':
  - type: text
    content: 'And Jeshua begat Joiakim, Joiakim also begat Eliashib, and Eliashib begat Joiada, '
  '11':
  - type: text
    content: and Joiada begat Jonathan, and Jonathan begat Jaddua.
  '12':
  - type: text
    content: 'And in the days of Joiakim were priests, the chief of the fathers: of Seraiah, Meraiah; of Jeremiah, Hananiah; '
  '13':
  - type: text
    content: 'of Ezra, Meshullam; of Amariah, Jehohanan; '
  '14':
  - type: text
    content: 'of Melicu, Jonathan; of Shebaniah, Joseph; '
  '15':
  - type: text
    content: 'of Harim, Adna; of Meraioth, Helkai; '
  '16':
  - type: text
    content: 'of Iddo, Zechariah; of Ginnethon, Meshullam; '
  '17':
  - type: text
    content: 'of Abijah, Zichri; of Miniamin, of Moadiah, Piltai; '
  '18':
  - type: text
    content: 'of Bilgah, Shammua; of Shemaiah, Jehonathan; '
  '19':
  - type: text
    content: 'and of Joiarib, Mattenai; of Jedaiah, Uzzi; '
  '2':
  - type: text
    content: 'Amariah, Malluch, Hattush, '
  '20':
  - type: text
    content: 'of Sallai, Kallai; of Amok, Eber; '
  '21':
  - type: text
    content: of Hilkiah, Hashabiah; of Jedaiah, Nethaneel.
  '22':
  - type: text
    content: 'The Levites in the days of Eliashib, Joiada, and Johanan, and Jaddua, '
  - type: text
    content: were
  - type: text
    content: ' recorded chief of the fathers: also the priests, to the reign of Darius the Persian. '
  '23':
  - type: text
    content: 'The sons of Levi, the chief of the fathers, '
  - type: text
    content: were
  - type: text
    content: ' written in the book of the chronicles, even until the days of Johanan the son of Eliashib. '
  '24':
  - type: text
    content: 'And the chief of the Levites: Hashabiah, Sherebiah, and Jeshua the son of Kadmiel, with their brethren over against them, to praise '
  - type: text
    content: and
  - type: text
    content: ' to give thanks, according to the commandment of David the man of God, ward over against ward. '
  '25':
  - type: text
    content: 'Mattaniah, and Bakbukiah, Obadiah, Meshullam, Talmon, Akkub, '
  - type: text
    content: were
  - type: text
    content: ' porters keeping the ward at the thresholds of the gates. '
  '26':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' in the days of Joiakim the son of Jeshua, the son of Jozadak, and in the days of Nehemiah the governor, and of Ezra the priest, the scribe.'
  - type: heading
    content: At the Dedication
  '27':
  - type: text
    content: 'And at the dedication of the wall of Jerusalem they sought the Levites out of all their places, to bring them to Jerusalem, to keep the dedication with gladness, both with thanksgivings, and with singing, '
  - type: text
    content: with
  - type: text
    content: ' cymbals, psalteries, and with harps. '
  '28':
  - type: text
    content: 'And the sons of the singers gathered themselves together, both out of the plain country round about Jerusalem, and from the villages of Netophathi; '
  '29':
  - type: text
    content: 'also from the house of Gilgal, and out of the fields of Geba and Azmaveth: for the singers had builded them villages round about Jerusalem. '
  '3':
  - type: text
    content: 'Shechaniah, Rehum, Meremoth, '
  '30':
  - type: text
    content: And the priests and the Levites purified themselves, and purified the people, and the gates, and the wall.
  '31':
  - type: text
    content: 'Then I brought up the princes of Judah upon the wall, and appointed two great '
  - type: text
    content: companies of them that gave
  - type: text
    content: ' thanks, '
  - type: text
    content: whereof one
  - type: text
    content: ' went on the right hand upon the wall toward the dung gate: '
  '32':
  - type: text
    content: 'and after them went Hoshaiah, and half of the princes of Judah, '
  '33':
  - type: text
    content: 'and Azariah, Ezra, and Meshullam, '
  '34':
  - type: text
    content: 'Judah, and Benjamin, and Shemaiah, and Jeremiah, '
  '35':
  - type: text
    content: 'and '
  - type: text
    content: certain
  - type: text
    content: ' of the priests'' sons with trumpets; '
  - type: text
    content: namely
  - type: text
    content: ', Zechariah the son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Michaiah, the son of Zaccur, the son of Asaph: '
  '36':
  - type: text
    content: 'and his brethren, Shemaiah, and Azarael, Milalai, Gilalai, Maai, Nethaneel, and Judah, Hanani, with the musical instruments of David the man of God, and Ezra the scribe before them. '
  '37':
  - type: text
    content: And at the fountain gate, which was over against them, they went up by the stairs of the city of David, at the going up of the wall, above the house of David, even unto the water gate eastward.
  '38':
  - type: text
    content: 'And the other '
  - type: text
    content: company of them that gave
  - type: text
    content: ' thanks went over against '
  - type: text
    content: them
  - type: text
    content: ', and I after them, and the half of the people upon the wall, from beyond the tower of the furnaces even unto the broad wall; '
  '39':
  - type: text
    content: 'and from above the gate of Ephraim, and above the old gate, and above the fish gate, and the tower of Hananeel, and the tower of Meah, even unto the sheep gate: and they stood still in the prison gate. '
  '4':
  - type: text
    content: 'Iddo, Ginnetho, Abijah, '
  '40':
  - type: text
    content: 'So stood the two '
  - type: text
    content: companies of them that gave
  - type: text
    content: ' thanks in the house of God, and I, and the half of the rulers with me: '
  '41':
  - type: text
    content: 'and the priests; Eliakim, Maaseiah, Miniamin, Michaiah, Elioenai, Zechariah, '
  - type: text
    content: and
  - type: text
    content: ' Hananiah, with trumpets; '
  '42':
  - type: text
    content: 'and Maaseiah, and Shemaiah, and Eleazar, and Uzzi, and Jehohanan, and Malchijah, and Elam, and Ezer. And the singers sang loud, with Jezrahiah '
  - type: text
    content: their
  - type: text
    content: ' overseer. '
  '43':
  - type: text
    content: 'Also that day they offered great sacrifices, and rejoiced: for God had made them rejoice with great joy: the wives also and the children rejoiced: so that the joy of Jerusalem was heard even afar off.'
  '44':
  - type: text
    content: 'And at that time were some appointed over the chambers for the treasures, for the offerings, for the firstfruits, and for the tithes, to gather into them out of the fields of the cities the portions of the law for the priests and Levites: for Judah rejoiced for the priests and for the Levites that waited. '
  '45':
  - type: text
    content: 'And both the singers and the porters kept the ward of their God, and the ward of the purification, according to the commandment of David, '
  - type: text
    content: and
  - type: text
    content: ' of Solomon his son. '
  '46':
  - type: text
    content: 'For in the days of David and Asaph of old '
  - type: text
    content: there were
  - type: text
    content: ' chief of the singers, and songs of praise and thanksgiving unto God. '
  '47':
  - type: text
    content: 'And all Israel in the days of Zerubbabel, and in the days of Nehemiah, gave the portions of the singers and the porters, every day his portion: and they sanctified '
  - type: text
    content: holy things
  - type: text
    content: ' unto the Levites; and the Levites sanctified '
  - type: text
    content: them
  - type: text
    content: ' unto the children of Aaron.'
  '5':
  - type: text
    content: 'Miamin, Maadiah, Bilgah, '
  '6':
  - type: text
    content: 'Shemaiah, and Joiarib, Jedaiah, '
  '7':
  - type: text
    content: 'Sallu, Amok, Hilkiah, Jedaiah. These '
  - type: text
    content: were
  - type: text
    content: ' the chief of the priests and of their brethren in the days of Jeshua.'
  '8':
  - type: text
    content: 'Moreover the Levites: Jeshua, Binnui, Kadmiel, Sherebiah, Judah, '
  - type: text
    content: and
  - type: text
    content: ' Mattaniah, '
  - type: text
    content: which was
  - type: text
    content: ' over the thanksgiving, he and his brethren. '
  '9':
  - type: text
    content: 'Also Bakbukiah and Unni, their brethren, '
  - type: text
    content: were
  - type: text
    content: ' over against them in the watches. '
