document_id: NEH.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Zerubbabel's Company
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the priests and the Levites that went up with Zerubbabel the son of Shealtiel, and Jeshua: Seraiah, Jeremiah, Ezra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Jeshua begat Joiakim, Joiakim also begat Eliashib, and Eliashib begat Joiada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and Joiada begat Jonathan, and Jonathan begat Jaddua.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And in the days of Joiakim were priests, the chief of the fathers: of Seraiah, Meraiah; of Jeremiah, Hananiah; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'of Ezra, Meshullam; of Amariah, Jehohanan; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'of Melicu, Jonathan; of Shebaniah, Joseph; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'of Harim, Adna; of Meraioth, Helkai; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'of Iddo, Zechariah; of Ginnethon, Meshullam; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'of Abijah, Zichri; of Miniamin, of Moadiah, Piltai; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'of Bilgah, Shammua; of Shemaiah, Jehonathan; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and of Joiarib, Mattenai; of Jedaiah, Uzzi; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amariah, Malluch, Hattush, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'of Sallai, Kallai; of Amok, Eber; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: of Hilkiah, Hashabiah; of Jedaiah, Nethaneel.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The Levites in the days of Eliashib, Joiada, and Johanan, and Jaddua, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' recorded chief of the fathers: also the priests, to the reign of Darius the Persian. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The sons of Levi, the chief of the fathers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' written in the book of the chronicles, even until the days of Johanan the son of Eliashib. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the chief of the Levites: Hashabiah, Sherebiah, and Jeshua the son of Kadmiel, with their brethren over against them, to praise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to give thanks, according to the commandment of David the man of God, ward over against ward. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mattaniah, and Bakbukiah, Obadiah, Meshullam, Talmon, Akkub, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' porters keeping the ward at the thresholds of the gates. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the days of Joiakim the son of Jeshua, the son of Jozadak, and in the days of Nehemiah the governor, and of Ezra the priest, the scribe.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: At the Dedication
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And at the dedication of the wall of Jerusalem they sought the Levites out of all their places, to bring them to Jerusalem, to keep the dedication with gladness, both with thanksgivings, and with singing, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' cymbals, psalteries, and with harps. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And the sons of the singers gathered themselves together, both out of the plain country round about Jerusalem, and from the villages of Netophathi; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'also from the house of Gilgal, and out of the fields of Geba and Azmaveth: for the singers had builded them villages round about Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Shechaniah, Rehum, Meremoth, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: And the priests and the Levites purified themselves, and purified the people, and the gates, and the wall.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then I brought up the princes of Judah upon the wall, and appointed two great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: companies of them that gave
    - type: text
      text: ' thanks, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whereof one
    - type: text
      text: ' went on the right hand upon the wall toward the dung gate: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'and after them went Hoshaiah, and half of the princes of Judah, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'and Azariah, Ezra, and Meshullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Judah, and Benjamin, and Shemaiah, and Jeremiah, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' of the priests'' sons with trumpets; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', Zechariah the son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Michaiah, the son of Zaccur, the son of Asaph: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and his brethren, Shemaiah, and Azarael, Milalai, Gilalai, Maai, Nethaneel, and Judah, Hanani, with the musical instruments of David the man of God, and Ezra the scribe before them. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: And at the fountain gate, which was over against them, they went up by the stairs of the city of David, at the going up of the wall, above the house of David, even unto the water gate eastward.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: company of them that gave
    - type: text
      text: ' thanks went over against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and I after them, and the half of the people upon the wall, from beyond the tower of the furnaces even unto the broad wall; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'and from above the gate of Ephraim, and above the old gate, and above the fish gate, and the tower of Hananeel, and the tower of Meah, even unto the sheep gate: and they stood still in the prison gate. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iddo, Ginnetho, Abijah, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'So stood the two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: companies of them that gave
    - type: text
      text: ' thanks in the house of God, and I, and the half of the rulers with me: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'and the priests; Eliakim, Maaseiah, Miniamin, Michaiah, Elioenai, Zechariah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Hananiah, with trumpets; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'and Maaseiah, and Shemaiah, and Eleazar, and Uzzi, and Jehohanan, and Malchijah, and Elam, and Ezer. And the singers sang loud, with Jezrahiah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' overseer. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Also that day they offered great sacrifices, and rejoiced: for God had made them rejoice with great joy: the wives also and the children rejoiced: so that the joy of Jerusalem was heard even afar off.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And at that time were some appointed over the chambers for the treasures, for the offerings, for the firstfruits, and for the tithes, to gather into them out of the fields of the cities the portions of the law for the priests and Levites: for Judah rejoiced for the priests and for the Levites that waited. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And both the singers and the porters kept the ward of their God, and the ward of the purification, according to the commandment of David, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' of Solomon his son. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'For in the days of David and Asaph of old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' chief of the singers, and songs of praise and thanksgiving unto God. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And all Israel in the days of Zerubbabel, and in the days of Nehemiah, gave the portions of the singers and the porters, every day his portion: and they sanctified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: holy things
    - type: text
      text: ' unto the Levites; and the Levites sanctified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' unto the children of Aaron.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Miamin, Maadiah, Bilgah, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Shemaiah, and Joiarib, Jedaiah, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sallu, Amok, Hilkiah, Jedaiah. These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the chief of the priests and of their brethren in the days of Jeshua.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moreover the Levites: Jeshua, Binnui, Kadmiel, Sherebiah, Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Mattaniah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which was
    - type: text
      text: ' over the thanksgiving, he and his brethren. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Also Bakbukiah and Unni, their brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' over against them in the watches. '
