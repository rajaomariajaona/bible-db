document_id: ECC.10,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Dead flies cause the ointment of the apothecary to send forth a stinking savour: '
  - type: text
    content: so doth
  - type: text
    content: ' a little folly him that is in reputation for wisdom '
  - type: text
    content: and
  - type: text
    content: ' honour. '
  '10':
  - type: text
    content: 'If the iron be blunt, and he do not whet the edge, then must he put to more strength: but wisdom '
  - type: text
    content: is
  - type: text
    content: ' profitable to direct. '
  '11':
  - type: text
    content: Surely the serpent will bite without enchantment; and a babbler is no better.
  '12':
  - type: text
    content: 'The words of a wise man''s mouth '
  - type: text
    content: are
  - type: text
    content: ' gracious; but the lips of a fool will swallow up himself. '
  '13':
  - type: text
    content: 'The beginning of the words of his mouth '
  - type: text
    content: is
  - type: text
    content: ' foolishness: and the end of his talk '
  - type: text
    content: is
  - type: text
    content: ' mischievous madness. '
  '14':
  - type: text
    content: 'A fool also is full of words: a man cannot tell what shall be; and what shall be after him, who can tell him? '
  '15':
  - type: text
    content: The labour of the foolish wearieth every one of them, because he knoweth not how to go to the city.
  '16':
  - type: text
    content: 'Woe to thee, O land, when thy king '
  - type: text
    content: is
  - type: text
    content: ' a child, and thy princes eat in the morning! '
  '17':
  - type: text
    content: 'Blessed '
  - type: text
    content: art
  - type: text
    content: ' thou, O land, when thy king '
  - type: text
    content: is
  - type: text
    content: ' the son of nobles, and thy princes eat in due season, for strength, and not for drunkenness! '
  '18':
  - type: text
    content: 'By much slothfulness the building decayeth; and through idleness of the hands the house droppeth through. '
  '19':
  - type: text
    content: 'A feast is made for laughter, and wine maketh merry: but money answereth all '
  - type: text
    content: things
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'A wise man''s heart '
  - type: text
    content: is
  - type: text
    content: ' at his right hand; but a fool''s heart at his left. '
  '20':
  - type: text
    content: 'Curse not the king, no not in thy thought; and curse not the rich in thy bedchamber: for a bird of the air shall carry the voice, and that which hath wings shall tell the matter.'
  '3':
  - type: text
    content: 'Yea also, when he that is a fool walketh by the way, his wisdom faileth '
  - type: text
    content: him
  - type: text
    content: ', and he saith to every one '
  - type: text
    content: that
  - type: text
    content: ' he '
  - type: text
    content: is
  - type: text
    content: ' a fool. '
  '4':
  - type: text
    content: 'If the spirit of the ruler rise up against thee, leave not thy place; for yielding pacifieth great offences. '
  '5':
  - type: text
    content: 'There is an evil '
  - type: text
    content: which
  - type: text
    content: ' I have seen under the sun, as an error '
  - type: text
    content: which
  - type: text
    content: ' proceedeth from the ruler: '
  '6':
  - type: text
    content: 'folly is set in great dignity, and the rich sit in low place. '
  '7':
  - type: text
    content: I have seen servants upon horses, and princes walking as servants upon the earth.
  '8':
  - type: text
    content: 'He that diggeth a pit shall fall into it; and whoso breaketh an hedge, a serpent shall bite him. '
  '9':
  - type: text
    content: 'Whoso removeth stones shall be hurt therewith; '
  - type: text
    content: and
  - type: text
    content: ' he that cleaveth wood shall be endangered thereby. '
