document_id: ECC.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dead flies cause the ointment of the apothecary to send forth a stinking savour: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so doth
    - type: text
      text: ' a little folly him that is in reputation for wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' honour. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the iron be blunt, and he do not whet the edge, then must he put to more strength: but wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' profitable to direct. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Surely the serpent will bite without enchantment; and a babbler is no better.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of a wise man''s mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' gracious; but the lips of a fool will swallow up himself. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beginning of the words of his mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' foolishness: and the end of his talk '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mischievous madness. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A fool also is full of words: a man cannot tell what shall be; and what shall be after him, who can tell him? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The labour of the foolish wearieth every one of them, because he knoweth not how to go to the city.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe to thee, O land, when thy king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a child, and thy princes eat in the morning! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, O land, when thy king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the son of nobles, and thy princes eat in due season, for strength, and not for drunkenness! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By much slothfulness the building decayeth; and through idleness of the hands the house droppeth through. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A feast is made for laughter, and wine maketh merry: but money answereth all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A wise man''s heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at his right hand; but a fool''s heart at his left. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Curse not the king, no not in thy thought; and curse not the rich in thy bedchamber: for a bird of the air shall carry the voice, and that which hath wings shall tell the matter.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea also, when he that is a fool walketh by the way, his wisdom faileth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and he saith to every one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fool. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the spirit of the ruler rise up against thee, leave not thy place; for yielding pacifieth great offences. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is an evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' I have seen under the sun, as an error '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' proceedeth from the ruler: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'folly is set in great dignity, and the rich sit in low place. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have seen servants upon horses, and princes walking as servants upon the earth.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that diggeth a pit shall fall into it; and whoso breaketh an hedge, a serpent shall bite him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoso removeth stones shall be hurt therewith; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he that cleaveth wood shall be endangered thereby. '
