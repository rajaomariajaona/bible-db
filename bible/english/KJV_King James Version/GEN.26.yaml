    content: The Philistines
  - type: text
    content: 'And there was a famine in the land, beside the first famine that was in the days of Abraham. And Isaac went unto Abimelech king of the Philistines unto Gerar. '
  '10':
  - type: text
    content: 'And Abimelech said, What '
  - type: text
    content: is
  - type: text
    content: ' this thou hast done unto us? one of the people might lightly have lien with thy wife, and thou shouldest have brought guiltiness upon us. '
  '11':
  - type: text
    content: 'And Abimelech charged all '
  - type: text
    content: his
  - type: text
    content: ' people, saying, He that toucheth this man or his wife shall surely be put to death. '
  '12':
  - type: text
    content: 'Then Isaac sowed in that land, and received in the same year an hundredfold: and the '
  - type: text
    content: LORD
  - type: text
    content: ' blessed him. '
  '13':
  - type: text
    content: 'And the man waxed great, and went forward, and grew until he became very great: '
  '14':
  - type: text
    content: 'for he had possession of flocks, and possession of herds, and great store of servants: and the Philistines envied him. '
  '15':
  - type: text
    content: 'For all the wells which his father''s servants had digged in the days of Abraham his father, the Philistines had stopped them, and filled them with earth. '
  '16':
  - type: text
    content: And Abimelech said unto Isaac, Go from us; for thou art much mightier than we.
  '17':
  - type: text
    content: 'And Isaac departed thence, and pitched his tent in the valley of Gerar, and dwelt there. '
  '18':
  - type: text
    content: 'And Isaac digged again the wells of water, which they had digged in the days of Abraham his father; for the Philistines had stopped them after the death of Abraham: and he called their names after the names by which his father had called them. '
  '19':
  - type: text
    content: 'And Isaac''s servants digged in the valley, and found there a well of springing water. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' appeared unto him, and said, Go not down into Egypt; dwell in the land which I shall tell thee of: '
  '20':
  - type: text
    content: 'And the herdmen of Gerar did strive with Isaac''s herdmen, saying, The water '
  - type: text
    content: is
  - type: text
    content: ' our''s: and he called the name of the well Esek; because they strove with him. '
  '21':
  - type: text
    content: 'And they digged another well, and strove for that also: and he called the name of it Sitnah. '
  '22':
  - type: text
    content: 'And he removed from thence, and digged another well; and for that they strove not: and he called the name of it Rehoboth; and he said, For now the '
  - type: text
    content: LORD
  - type: text
    content: ' hath made room for us, and we shall be fruitful in the land.'
  '23':
  - type: text
    content: 'And he went up from thence to Beer-sheba. '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' appeared unto him the same night, and said, I '
  - type: text
    content: am
  - type: text
    content: ' the God of Abraham thy father: fear not, for I '
  - type: text
    content: am
  - type: text
    content: ' with thee, and will bless thee, and multiply thy seed for my servant Abraham''s sake. '
  '25':
  - type: text
    content: 'And he builded an altar there, and called upon the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', and pitched his tent there: and there Isaac''s servants digged a well.'
  '26':
  - type: text
    content: 'Then Abimelech went to him from Gerar, and Ahuzzath one of his friends, and Phichol the chief captain of his army. '
  '27':
  - type: text
    content: 'And Isaac said unto them, Wherefore come ye to me, seeing ye hate me, and have sent me away from you? '
  '28':
  - type: text
    content: 'And they said, We saw certainly that the '
  - type: text
    content: LORD
  - type: text
    content: ' was with thee: and we said, Let there be now an oath betwixt us, '
  - type: text
    content: even
  - type: text
    content: ' betwixt us and thee, and let us make a covenant with thee; '
  '29':
  - type: text
    content: 'that thou wilt do us no hurt, as we have not touched thee, and as we have done unto thee nothing but good, and have sent thee away in peace: thou '
  - type: text
    content: art
  - type: text
    content: ' now the blessed of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'sojourn in this land, and I will be with thee, and will bless thee; for unto thee, and unto thy seed, I will give all these countries, and I will perform the oath which I sware unto Abraham thy father; '
  '30':
  - type: text
    content: 'And he made them a feast, and they did eat and drink. '
  '31':
  - type: text
    content: 'And they rose up betimes in the morning, and sware one to another: and Isaac sent them away, and they departed from him in peace. '
  '32':
  - type: text
    content: 'And it came to pass the same day, that Isaac''s servants came, and told him concerning the well which they had digged, and said unto him, We have found water. '
  '33':
  - type: text
    content: 'And he called it Shebah: therefore the name of the city '
  - type: text
    content: is
  - type: text
    content: ' Beer-sheba unto this day.'
  '34':
  - type: text
    content: 'And Esau was forty years old when he took to wife Judith the daughter of Beeri the Hittite, and Bashemath the daughter of Elon the Hittite: '
  '35':
  - type: text
    content: which were a grief of mind unto Isaac and to Rebekah.
  '4':
  - type: text
    content: 'and I will make thy seed to multiply as the stars of heaven, and will give unto thy seed all these countries; and in thy seed shall all the nations of the earth be blessed; '
  '5':
  - type: text
    content: because that Abraham obeyed my voice, and kept my charge, my commandments, my statutes, and my laws.
  '6':
  - type: text
    content: 'And Isaac dwelt in Gerar: '
