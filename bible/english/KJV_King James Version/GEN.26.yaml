document_id: GEN.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And there was a famine in the land, beside the first famine that was in the days of Abraham. And Isaac went unto Abimelech king of the Philistines unto Gerar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared unto him, and said, Go not down into Egypt; dwell in the land which I shall tell thee of: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sojourn in this land, and I will be with thee, and will bless thee; for unto thee, and unto thy seed, I will give all these countries, and I will perform the oath which I sware unto Abraham thy father; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and I will make thy seed to multiply as the stars of heaven, and will give unto thy seed all these countries; and in thy seed shall all the nations of the earth be blessed; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: because that Abraham obeyed my voice, and kept my charge, my commandments, my statutes, and my laws.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Isaac dwelt in Gerar: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the men of the place asked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' of his wife; and he said, She '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my sister: for he feared to say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: She is
  - type: text
    text: ' my wife; lest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said he
  - type: text
    text: ', the men of the place should kill me for Rebekah; because she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fair to look upon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it came to pass, when he had been there a long time, that Abimelech king of the Philistines looked out at a window, and saw, and, behold, Isaac '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' sporting with Rebekah his wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Abimelech called Isaac, and said, Behold, of a surety she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy wife: and how saidst thou, She '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my sister? And Isaac said unto him, Because I said, Lest I die for her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Abimelech said, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this thou hast done unto us? one of the people might lightly have lien with thy wife, and thou shouldest have brought guiltiness upon us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Abimelech charged all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' people, saying, He that toucheth this man or his wife shall surely be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Isaac sowed in that land, and received in the same year an hundredfold: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' blessed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the man waxed great, and went forward, and grew until he became very great: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'for he had possession of flocks, and possession of herds, and great store of servants: and the Philistines envied him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For all the wells which his father''s servants had digged in the days of Abraham his father, the Philistines had stopped them, and filled them with earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And Abimelech said unto Isaac, Go from us; for thou art much mightier than we.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Isaac departed thence, and pitched his tent in the valley of Gerar, and dwelt there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Isaac digged again the wells of water, which they had digged in the days of Abraham his father; for the Philistines had stopped them after the death of Abraham: and he called their names after the names by which his father had called them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Isaac''s servants digged in the valley, and found there a well of springing water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the herdmen of Gerar did strive with Isaac''s herdmen, saying, The water '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our''s: and he called the name of the well Esek; because they strove with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they digged another well, and strove for that also: and he called the name of it Sitnah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he removed from thence, and digged another well; and for that they strove not: and he called the name of it Rehoboth; and he said, For now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath made room for us, and we shall be fruitful in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he went up from thence to Beer-sheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared unto him the same night, and said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the God of Abraham thy father: fear not, for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with thee, and will bless thee, and multiply thy seed for my servant Abraham''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he builded an altar there, and called upon the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and pitched his tent there: and there Isaac''s servants digged a well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Abimelech went to him from Gerar, and Ahuzzath one of his friends, and Phichol the chief captain of his army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Isaac said unto them, Wherefore come ye to me, seeing ye hate me, and have sent me away from you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they said, We saw certainly that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was with thee: and we said, Let there be now an oath betwixt us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' betwixt us and thee, and let us make a covenant with thee; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'that thou wilt do us no hurt, as we have not touched thee, and as we have done unto thee nothing but good, and have sent thee away in peace: thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' now the blessed of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And he made them a feast, and they did eat and drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And they rose up betimes in the morning, and sware one to another: and Isaac sent them away, and they departed from him in peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And it came to pass the same day, that Isaac''s servants came, and told him concerning the well which they had digged, and said unto him, We have found water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he called it Shebah: therefore the name of the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Beer-sheba unto this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Esau was forty years old when he took to wife Judith the daughter of Beeri the Hittite, and Bashemath the daughter of Elon the Hittite: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: which were a grief of mind unto Isaac and to Rebekah.
