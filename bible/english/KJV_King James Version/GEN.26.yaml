  - type: text
    content: ' my sister: for he feared to say, '
  - type: text
    content: She is
  - type: text
    content: ' my wife; lest, '
  - type: text
    content: said he
  - type: text
    content: ', the men of the place should kill me for Rebekah; because she '
  - type: text
    content: was
  - type: text
    content: ' fair to look upon. '
  '8':
  - type: text
    content: 'And it came to pass, when he had been there a long time, that Abimelech king of the Philistines looked out at a window, and saw, and, behold, Isaac '
  - type: text
    content: was
  - type: text
    content: ' sporting with Rebekah his wife. '
  '9':
  - type: text
    content: 'And Abimelech called Isaac, and said, Behold, of a surety she '
  - type: text
    content: is
  - type: text
    content: ' thy wife: and how saidst thou, She '
  - type: text
