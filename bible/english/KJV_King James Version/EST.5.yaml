document_id: EST.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Esther's Request
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass on the third day, that Esther put on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' royal '
  - type: usfm
    marker: add
    children:
    - type: text
      text: apparel
  - type: text
    text: ', and stood in the inner court of the king''s house, over against the king''s house: and the king sat upon his royal throne in the royal house, over against the gate of the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it was so, when the king saw Esther the queen standing in the court, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' she obtained favour in his sight: and the king held out to Esther the golden sceptre that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in his hand. So Esther drew near, and touched the top of the sceptre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then said the king unto her, What wilt thou, queen Esther? and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy request? it shall be even given thee to the half of the kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Esther answered, If '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it seem
  - type: text
    text: ' good unto the king, let the king and Haman come this day unto the banquet that I have prepared for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the king said, Cause Haman to make haste, that he may do as Esther hath said. So the king and Haman came to the banquet that Esther had prepared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the king said unto Esther at the banquet of wine, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy petition? and it shall be granted thee: and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy request? even to the half of the kingdom it shall be performed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then answered Esther, and said, My petition and my request '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: if I have found favour in the sight of the king, and if it please the king to grant my petition, and to perform my request, let the king and Haman come to the banquet that I shall prepare for them, and I will do to morrow as the king hath said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then went Haman forth that day joyful and with a glad heart: but when Haman saw Mordecai in the king''s gate, that he stood not up, nor moved for him, he was full of indignation against Mordecai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nevertheless Haman refrained himself: and when he came home, he sent and called for his friends, and Zeresh his wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Haman told them of the glory of his riches, and the multitude of his children, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the things
  - type: text
    text: ' wherein the king had promoted him, and how he had advanced him above the princes and servants of the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Haman said moreover, Yea, Esther the queen did let no man come in with the king unto the banquet that she had prepared but myself; and to morrow am I invited unto her also with the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet all this availeth me nothing, so long as I see Mordecai the Jew sitting at the king''s gate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then said Zeresh his wife and all his friends unto him, Let a gallows be made of fifty cubits high, and to morrow speak thou unto the king that Mordecai may be hanged thereon: then go thou in merrily with the king unto the banquet. And the thing pleased Haman; and he caused the gallows to be made.'
