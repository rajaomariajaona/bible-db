  '1':
  - type: heading
    content: Esther's Request
  - type: text
    content: 'Now it came to pass on the third day, that Esther put on '
  - type: text
    content: her
  - type: text
    content: ' royal '
  - type: text
    content: apparel
  - type: text
    content: ', and stood in the inner court of the king''s house, over against the king''s house: and the king sat upon his royal throne in the royal house, over against the gate of the house. '
  '10':
  - type: text
    content: 'Nevertheless Haman refrained himself: and when he came home, he sent and called for his friends, and Zeresh his wife. '
  '11':
  - type: text
    content: 'And Haman told them of the glory of his riches, and the multitude of his children, and all '
  - type: text
    content: the things
  - type: text
    content: ' wherein the king had promoted him, and how he had advanced him above the princes and servants of the king. '
  '12':
  - type: text
    content: 'Haman said moreover, Yea, Esther the queen did let no man come in with the king unto the banquet that she had prepared but myself; and to morrow am I invited unto her also with the king. '
  '13':
  - type: text
    content: 'Yet all this availeth me nothing, so long as I see Mordecai the Jew sitting at the king''s gate. '
  '14':
  - type: text
    content: 'Then said Zeresh his wife and all his friends unto him, Let a gallows be made of fifty cubits high, and to morrow speak thou unto the king that Mordecai may be hanged thereon: then go thou in merrily with the king unto the banquet. And the thing pleased Haman; and he caused the gallows to be made.'
  '2':
  - type: text
    content: 'And it was so, when the king saw Esther the queen standing in the court, '
  - type: text
    content: that
  - type: text
    content: ' she obtained favour in his sight: and the king held out to Esther the golden sceptre that '
  - type: text
    content: was
  - type: text
    content: ' in his hand. So Esther drew near, and touched the top of the sceptre. '
  '3':
  - type: text
    content: 'Then said the king unto her, What wilt thou, queen Esther? and what '
  - type: text
    content: is
  - type: text
    content: ' thy request? it shall be even given thee to the half of the kingdom. '
  '4':
  - type: text
    content: 'And Esther answered, If '
  - type: text
    content: it seem
  - type: text
    content: ' good unto the king, let the king and Haman come this day unto the banquet that I have prepared for him.'
  '5':
  - type: text
    content: 'Then the king said, Cause Haman to make haste, that he may do as Esther hath said. So the king and Haman came to the banquet that Esther had prepared. '
  '6':
  - type: text
    content: 'And the king said unto Esther at the banquet of wine, What '
  - type: text
    content: is
  - type: text
    content: ' thy petition? and it shall be granted thee: and what '
  - type: text
    content: is
  - type: text
    content: ' thy request? even to the half of the kingdom it shall be performed. '
  '7':
  - type: text
    content: 'Then answered Esther, and said, My petition and my request '
  - type: text
    content: is
  - type: text
    content: '; '
  '8':
  - type: text
    content: if I have found favour in the sight of the king, and if it please the king to grant my petition, and to perform my request, let the king and Haman come to the banquet that I shall prepare for them, and I will do to morrow as the king hath said.
  '9':
  - type: text
    content: 'Then went Haman forth that day joyful and with a glad heart: but when Haman saw Mordecai in the king''s gate, that he stood not up, nor moved for him, he was full of indignation against Mordecai. '
