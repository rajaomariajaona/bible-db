  - type: text
    content: ' when he came unto Lehi, the Philistines shouted against him: and the Spirit of the '
  - type: text
    content: LORD
  - type: text
    content: ' came mightily upon him, and the cords that '
  - type: text
    content: were
  - type: text
    content: ' upon his arms became as flax that was burnt with fire, and his bands loosed from off his hands. '
  '15':
  - type: text
    content: 'And he found a new jawbone of an ass, and put forth his hand, and took it, and slew a thousand men therewith. '
  '16':
  - type: text
    content: And Samson said,
  - type: text
    content: With the jawbone of an ass, heaps upon heaps,
  - type: text
    content: With the jaw of an ass have I slain a thousand men.
  '17':
  - type: text
    content: 'And it came to pass, when he had made an end of speaking, that he cast away the jawbone out of his hand, and called that place Ramath-lehi. '
  '18':
  - type: text
    content: 'And he was sore athirst, and called on the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, Thou hast given this great deliverance into the hand of thy servant: and now shall I die for thirst, and fall into the hand of the uncircumcised? '
  '19':
  - type: text
    content: 'But God clave an hollow place that '
  - type: text
    content: was
  - type: text
    content: ' in the jaw, and there came water thereout; and when he had drunk, his spirit came again, and he revived: wherefore he called the name thereof En-hakkore, which '
  - type: text
    content: is
  - type: text
    content: ' in Lehi unto this day. '
  '2':
  - type: text
    content: 'And her father said, I verily thought that thou hadst utterly hated her; therefore I gave her to thy companion: '
  - type: text
    content: is
  - type: text
    content: ' not her younger sister fairer than she? take her, I pray thee, instead of her. '
  '20':
  - type: text
    content: And he judged Israel in the days of the Philistines twenty years.
  '3':
  - type: text
    content: 'And Samson said concerning them, Now shall I be more blameless than the Philistines, though I do them a displeasure. '
  '4':
  - type: text
    content: 'And Samson went and caught three hundred foxes, and took firebrands, and turned tail to tail, and put a firebrand in the midst between two tails. '
  '5':
  - type: text
    content: 'And when he had set the brands on fire, he let '
  - type: text
    content: them
  - type: text
    content: ' go into the standing corn of the Philistines, and burnt up both the shocks, and also the standing corn, with the vineyards '
  - type: text
    content: and
  - type: text
    content: ' olives. '
  '6':
  - type: text
    content: 'Then the Philistines said, Who hath done this? And they answered, Samson, the son in law of the Timnite, because he had taken his wife, and given her to his companion. And the Philistines came up, and burnt her and her father with fire. '
  '7':
  - type: text
    content: 'And Samson said unto them, Though ye have done this, yet will I be avenged of you, and after that I will cease. '
  '8':
  - type: text
    content: 'And he smote them hip and thigh with a great slaughter: and he went down and dwelt in the top of the rock Etam.'
  '9':
  - type: text
    content: 'Then the Philistines went up, and pitched in Judah, and spread themselves in Lehi. '
