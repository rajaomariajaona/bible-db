document_id: JDG.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it came to pass within a while after, in the time of wheat harvest, that Samson visited his wife with a kid; and he said, I will go in to my wife into the chamber. But her father would not suffer him to go in. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Judah said, Why are ye come up against us? And they answered, To bind Samson are we come up, to do to him as he hath done to us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then three thousand men of Judah went to the top of the rock Etam, and said to Samson, Knowest thou not that the Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' rulers over us? what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast done unto us? And he said unto them, As they did unto me, so have I done unto them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said unto him, We are come down to bind thee, that we may deliver thee into the hand of the Philistines. And Samson said unto them, Swear unto me, that ye will not fall upon me yourselves. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they spake unto him, saying, No; but we will bind thee fast, and deliver thee into their hand: but surely we will not kill thee. And they bound him with two new cords, and brought him up from the rock.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' when he came unto Lehi, the Philistines shouted against him: and the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came mightily upon him, and the cords that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon his arms became as flax that was burnt with fire, and his bands loosed from off his hands. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he found a new jawbone of an ass, and put forth his hand, and took it, and slew a thousand men therewith. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Samson said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the jawbone of an ass, heaps upon heaps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the jaw of an ass have I slain a thousand men.
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And it came to pass, when he had made an end of speaking, that he cast away the jawbone out of his hand, and called that place Ramath-lehi. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And he was sore athirst, and called on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, Thou hast given this great deliverance into the hand of thy servant: and now shall I die for thirst, and fall into the hand of the uncircumcised? '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But God clave an hollow place that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the jaw, and there came water thereout; and when he had drunk, his spirit came again, and he revived: wherefore he called the name thereof En-hakkore, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Lehi unto this day. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her father said, I verily thought that thou hadst utterly hated her; therefore I gave her to thy companion: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not her younger sister fairer than she? take her, I pray thee, instead of her. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he judged Israel in the days of the Philistines twenty years.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said concerning them, Now shall I be more blameless than the Philistines, though I do them a displeasure. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson went and caught three hundred foxes, and took firebrands, and turned tail to tail, and put a firebrand in the midst between two tails. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had set the brands on fire, he let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' go into the standing corn of the Philistines, and burnt up both the shocks, and also the standing corn, with the vineyards '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' olives. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines said, Who hath done this? And they answered, Samson, the son in law of the Timnite, because he had taken his wife, and given her to his companion. And the Philistines came up, and burnt her and her father with fire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said unto them, Though ye have done this, yet will I be avenged of you, and after that I will cease. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he smote them hip and thigh with a great slaughter: and he went down and dwelt in the top of the rock Etam.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines went up, and pitched in Judah, and spread themselves in Lehi. '
