verses:
  '1':
  - type: text
    content: 'But it came to pass within a while after, in the time of wheat harvest, that Samson visited his wife with a kid; and he said, I will go in to my wife into the chamber. But her father would not suffer him to go in. '
  '10':
  - type: text
    content: 'And the men of Judah said, Why are ye come up against us? And they answered, To bind Samson are we come up, to do to him as he hath done to us. '
  '11':
  - type: text
    content: 'Then three thousand men of Judah went to the top of the rock Etam, and said to Samson, Knowest thou not that the Philistines '
  - type: text
    content: are
  - type: text
    content: ' rulers over us? what '
  - type: text
    content: is
  - type: text
    content: ' this '
  - type: text
    content: that
  - type: text
    content: ' thou hast done unto us? And he said unto them, As they did unto me, so have I done unto them. '
  '12':
  - type: text
    content: 'And they said unto him, We are come down to bind thee, that we may deliver thee into the hand of the Philistines. And Samson said unto them, Swear unto me, that ye will not fall upon me yourselves. '
  '13':
  - type: text
    content: 'And they spake unto him, saying, No; but we will bind thee fast, and deliver thee into their hand: but surely we will not kill thee. And they bound him with two new cords, and brought him up from the rock.'
  '14':
  - type: text
    content: ' '
  - type: text
