verses:
  '1':
  - type: text
    content: 'There was a man in the land of Uz, whose name '
  - type: text
    content: was
  - type: text
    content: ' Job; and that man was perfect and upright, and one that feared God, and eschewed evil. '
  '10':
  - type: text
    content: 'Hast not thou made an hedge about him, and about his house, and about all that he hath on every side? thou hast blessed the work of his hands, and his substance is increased in the land. '
  '11':
  - type: text
    content: 'But put forth thine hand now, and touch all that he hath, and he will curse thee to thy face. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Satan, Behold, all that he hath '
  - type: text
    content: is
  - type: text
    content: ' in thy power; only upon himself put not forth thine hand. So Satan went forth from the presence of the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: His Afflictions
  '13':
  - type: text
    content: 'And there was a day when his sons and his daughters '
  - type: text
    content: were
  - type: text
    content: ' eating and drinking wine in their eldest brother''s house: '
  '14':
  - type: text
    content: 'and there came a messenger unto Job, and said, The oxen were plowing, and the asses feeding beside them: '
  '15':
  - type: text
    content: 'and the Sabeans fell '
  - type: text
    content: upon them
  - type: text
    content: ', and took them away; yea, they have slain the servants with the edge of the sword; and I only am escaped alone to tell thee. '
  '16':
  - type: text
    content: 'While he was yet speaking, there came also another, and said, The fire of God is fallen from heaven, and hath burned up the sheep, and the servants, and consumed them; and I only am escaped alone to tell thee. '
  '17':
  - type: text
    content: 'While he was yet speaking, there came also another, and said, The Chaldeans made out three bands, and fell upon the camels, and have carried them away, yea, and slain the servants with the edge of the sword; and I only am escaped alone to tell thee. '
  '18':
  - type: text
    content: 'While he was yet speaking, there came also another, and said, Thy sons and thy daughters '
  - type: text
    content: were
  - type: text
    content: ' eating and drinking wine in their eldest brother''s house: '
  '19':
  - type: text
    content: and, behold, there came a great wind from the wilderness, and smote the four corners of the house, and it fell upon the young men, and they are dead; and I only am escaped alone to tell thee.
  '2':
  - type: text
    content: 'And there were born unto him seven sons and three daughters. '
  '20':
  - type: text
    content: 'Then Job arose, and rent his mantle, and shaved his head, and fell down upon the ground, and worshipped, '
  '21':
  - type: text
    content: 'and said, Naked came I out of my mother''s womb, and naked shall I return thither: the '
  - type: text
    content: LORD
  - type: text
    content: ' gave, and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath taken away; blessed be the name of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: In all this Job sinned not, nor charged God foolishly.
  '3':
  - type: text
    content: 'His substance also was seven thousand sheep, and three thousand camels, and five hundred yoke of oxen, and five hundred she asses, and a very great household; so that this man was the greatest of all the men of the east. '
  '4':
  - type: text
    content: 'And his sons went and feasted '
  - type: text
    content: in their
  - type: text
    content: ' houses, every one his day; and sent and called for their three sisters to eat and to drink with them. '
  '5':
  - type: text
    content: 'And it was so, when the days of '
  - type: text
    content: their
  - type: text
    content: ' feasting were gone about, that Job sent and sanctified them, and rose up early in the morning, and offered burnt offerings '
  - type: text
    content: according
  - type: text
    content: ' to the number of them all: for Job said, It may be that my sons have sinned, and cursed God in their hearts. Thus did Job continually.'
  - type: heading
    content: Job's Character
  '6':
  - type: text
    content: 'Now there was a day when the sons of God came to present themselves before the '
  - type: text
    content: LORD
  - type: text
    content: ', and Satan came also among them. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Satan, Whence comest thou? Then Satan answered the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, From going to and fro in the earth, and from walking up and down in it. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Satan, Hast thou considered my servant Job, that '
  - type: text
    content: there is
  - type: text
    content: ' none like him in the earth, a perfect and an upright man, one that feareth God, and escheweth evil? '
  '9':
  - type: text
    content: 'Then Satan answered the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, Doth Job fear God for nought? '
