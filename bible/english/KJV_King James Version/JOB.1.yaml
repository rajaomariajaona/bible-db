document_id: JOB.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'There was a man in the land of Uz, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Job; and that man was perfect and upright, and one that feared God, and eschewed evil. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hast not thou made an hedge about him, and about his house, and about all that he hath on every side? thou hast blessed the work of his hands, and his substance is increased in the land. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But put forth thine hand now, and touch all that he hath, and he will curse thee to thy face. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, Behold, all that he hath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thy power; only upon himself put not forth thine hand. So Satan went forth from the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Afflictions
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And there was a day when his sons and his daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' eating and drinking wine in their eldest brother''s house: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and there came a messenger unto Job, and said, The oxen were plowing, and the asses feeding beside them: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and the Sabeans fell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon them
    - type: text
      text: ', and took them away; yea, they have slain the servants with the edge of the sword; and I only am escaped alone to tell thee. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'While he was yet speaking, there came also another, and said, The fire of God is fallen from heaven, and hath burned up the sheep, and the servants, and consumed them; and I only am escaped alone to tell thee. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'While he was yet speaking, there came also another, and said, The Chaldeans made out three bands, and fell upon the camels, and have carried them away, yea, and slain the servants with the edge of the sword; and I only am escaped alone to tell thee. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'While he was yet speaking, there came also another, and said, Thy sons and thy daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' eating and drinking wine in their eldest brother''s house: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: and, behold, there came a great wind from the wilderness, and smote the four corners of the house, and it fell upon the young men, and they are dead; and I only am escaped alone to tell thee.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And there were born unto him seven sons and three daughters. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Job arose, and rent his mantle, and shaved his head, and fell down upon the ground, and worshipped, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and said, Naked came I out of my mother''s womb, and naked shall I return thither: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' gave, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath taken away; blessed be the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: In all this Job sinned not, nor charged God foolishly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'His substance also was seven thousand sheep, and three thousand camels, and five hundred yoke of oxen, and five hundred she asses, and a very great household; so that this man was the greatest of all the men of the east. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And his sons went and feasted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in their
    - type: text
      text: ' houses, every one his day; and sent and called for their three sisters to eat and to drink with them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And it was so, when the days of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' feasting were gone about, that Job sent and sanctified them, and rose up early in the morning, and offered burnt offerings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: according
    - type: text
      text: ' to the number of them all: for Job said, It may be that my sons have sinned, and cursed God in their hearts. Thus did Job continually.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Character
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now there was a day when the sons of God came to present themselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and Satan came also among them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, Whence comest thou? Then Satan answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, From going to and fro in the earth, and from walking up and down in it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, Hast thou considered my servant Job, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like him in the earth, a perfect and an upright man, one that feareth God, and escheweth evil? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Satan answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, Doth Job fear God for nought? '
