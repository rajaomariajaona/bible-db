document_id: 1CH.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they brought the ark of God, and set it in the midst of the tent that David had pitched for it: and they offered burnt sacrifices and peace offerings before God. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Glory ye in his holy name:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the heart of them rejoice that seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' and his strength,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek his face continually.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember his marvellous works that he hath done,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His wonders, and the judgments of his mouth;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O ye seed of Israel his servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ye children of Jacob, his chosen ones.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His judgments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in all the earth.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be ye mindful always of his covenant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The word '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' he commanded to a thousand generations;'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even of the covenant
    - type: text
      text: ' which he made with Abraham,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of his oath unto Isaac;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hath confirmed the same to Jacob for a law,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' to Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an everlasting covenant,'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saying, Unto thee will I give the land of Canaan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lot of your inheritance;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When ye were but few,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even a few, and strangers in it.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when David had made an end of offering the burnt offerings and the peace offerings, he blessed the people in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' they went from nation to nation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' kingdom to another people;'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He suffered no man to do them wrong:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, he reproved kings for their sakes,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Saying
    - type: text
      text: ', Touch not mine anointed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do my prophets no harm.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all the earth;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shew forth from day to day his salvation.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare his glory among the heathen;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His marvellous works among all nations.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and greatly to be praised:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to be feared above all gods.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For all the gods of the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' idols:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made the heavens.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Glory and honour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in his presence;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Strength and gladness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in his place.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', ye kindreds of the people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' glory and strength.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: due
    - type: text
      text: ' unto his name:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bring an offering, and come before him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the beauty of holiness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he dealt to every one of Israel, both man and woman, to every one a loaf of bread, and a good piece of flesh, and a flagon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of wine
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fear before him, all the earth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The world also shall be stable, that it be not moved.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the heavens be glad, and let the earth rejoice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' say among the nations, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' reigneth.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the sea roar, and the fulness thereof:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the fields rejoice, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' therein.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then shall the trees of the wood sing out at the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he cometh to judge the earth.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O give thanks unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' good;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' for ever.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And say ye, Save us, O God of our salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gather us together, and deliver us from the heathen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we may give thanks to thy holy name,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' glory in thy praise.'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For ever and ever.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all the people said, Amen, and praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he left there before the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' Asaph and his brethren, to minister before the ark continually, as every day''s work required: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Obed-edom with their brethren, threescore and eight; Obed-edom also the son of Jeduthun and Hosah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' porters: '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Zadok the priest, and his brethren the priests, before the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the high place that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at Gibeon, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he appointed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' of the Levites to minister before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and to record, and to thank and praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to offer burnt offerings unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' upon the altar of the burnt offering continually morning and evening, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to do
    - type: text
      text: ' according to all that is written in the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he commanded Israel; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with them Heman and Jeduthun, and the rest that were chosen, who were expressed by name, to give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', because his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' for ever; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with them Heman and Jeduthun with trumpets and cymbals for those that should make a sound, and with musical instruments of God. And the sons of Jeduthun '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' porters. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people departed every man to his house: and David returned to bless his house.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asaph the chief, and next to him Zechariah, Jeiel, and Shemiramoth, and Jehiel, and Mattithiah, and Eliab, and Benaiah, and Obed-edom: and Jeiel with psalteries and with harps; but Asaph made a sound with cymbals; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benaiah also and Jahaziel the priests with trumpets continually before the ark of the covenant of God.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Psalm of Praise
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then on that day David delivered first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this psalm
    - type: text
      text: ' to thank the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' into the hand of Asaph and his brethren.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', call upon his name,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make known his deeds among the people.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing unto him, sing psalms unto him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Talk ye of all his wondrous works.
