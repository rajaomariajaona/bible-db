document_id: 1CO.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Administrative and Personal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now concerning the collection for the saints, as I have given order to the churches of Galatia, even so do ye. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if Timotheus come, see that he may be with you without fear: for he worketh the work of the Lord, as I also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let no man therefore despise him: but conduct him forth in peace, that he may come unto me: for I look for him with the brethren.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As touching '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' brother Apollos, I greatly desired him to come unto you with the brethren: but his will was not at all to come at this time; but he will come when he shall have convenient time.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Watch ye, stand fast in the faith, quit you like men, be strong. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let all your things be done with charity.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I beseech you, brethren, (ye know the house of Stephanas, that it is the firstfruits of Achaia, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they have addicted themselves to the ministry of the saints,) '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that ye submit yourselves unto such, and to every one that helpeth with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', and laboureth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am glad of the coming of Stephanas and Fortunatus and Achaicus: for that which was lacking on your part they have supplied. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they have refreshed my spirit and your''s: therefore acknowledge ye them that are such.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The churches of Asia salute you. Aquila and Priscilla salute you much in the Lord, with the church that is in their house. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Upon the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week let every one of you lay by him in store, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' hath prospered him, that there be no gatherings when I come. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the brethren greet you. Greet ye one another with an holy kiss.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The salutation of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' Paul with mine own hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any man love not the Lord Jesus Christ, let him be Anathema Maran-atha. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The grace of our Lord Jesus Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My love '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you all in Christ Jesus. Amen.'
  - type: usfm
    marker: iex
    children:
    - type: text
      text: The first epistle to the Corinthians was written from Philippi by Stephanas, and Fortunatus, and Achaicus, and Timotheus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I come, whomsoever ye shall approve by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' letters, them will I send to bring your liberality unto Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if it be meet that I go also, they shall go with me.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I will come unto you, when I shall pass through Macedonia: for I do pass through Macedonia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it may be that I will abide, yea, and winter with you, that ye may bring me on my journey whithersoever I go. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will not see you now by the way; but I trust to tarry a while with you, if the Lord permit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will tarry at Ephesus until Pentecost. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a great door and effectual is opened unto me, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there are
    - type: text
      text: ' many adversaries.'
