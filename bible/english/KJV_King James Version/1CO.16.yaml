document_id: 1CO.16,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Administrative and Personal
  - type: text
    content: 'Now concerning the collection for the saints, as I have given order to the churches of Galatia, even so do ye. '
  '10':
  - type: text
    content: 'Now if Timotheus come, see that he may be with you without fear: for he worketh the work of the Lord, as I also '
  - type: text
    content: do
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Let no man therefore despise him: but conduct him forth in peace, that he may come unto me: for I look for him with the brethren.'
  '12':
  - type: text
    content: 'As touching '
  - type: text
    content: our
  - type: text
    content: ' brother Apollos, I greatly desired him to come unto you with the brethren: but his will was not at all to come at this time; but he will come when he shall have convenient time.'
  '13':
  - type: text
    content: 'Watch ye, stand fast in the faith, quit you like men, be strong. '
  '14':
  - type: text
    content: Let all your things be done with charity.
  '15':
  - type: text
    content: 'I beseech you, brethren, (ye know the house of Stephanas, that it is the firstfruits of Achaia, and '
  - type: text
    content: that
  - type: text
    content: ' they have addicted themselves to the ministry of the saints,) '
  '16':
  - type: text
    content: 'that ye submit yourselves unto such, and to every one that helpeth with '
  - type: text
    content: us
  - type: text
    content: ', and laboureth. '
  '17':
  - type: text
    content: 'I am glad of the coming of Stephanas and Fortunatus and Achaicus: for that which was lacking on your part they have supplied. '
  '18':
  - type: text
    content: 'For they have refreshed my spirit and your''s: therefore acknowledge ye them that are such.'
  '19':
  - type: text
    content: 'The churches of Asia salute you. Aquila and Priscilla salute you much in the Lord, with the church that is in their house. '
  '2':
  - type: text
    content: 'Upon the first '
  - type: text
    content: day
  - type: text
    content: ' of the week let every one of you lay by him in store, as '
  - type: text
    content: God
  - type: text
    content: ' hath prospered him, that there be no gatherings when I come. '
  '20':
  - type: text
    content: All the brethren greet you. Greet ye one another with an holy kiss.
  '21':
  - type: text
    content: 'The salutation of '
  - type: text
    content: me
  - type: text
    content: ' Paul with mine own hand. '
  '22':
  - type: text
    content: 'If any man love not the Lord Jesus Christ, let him be Anathema Maran-atha. '
  '23':
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you. '
  '24':
  - type: text
    content: 'My love '
  - type: text
    content: be
  - type: text
    content: ' with you all in Christ Jesus. Amen.'
  - type: text
    content: The first epistle to the Corinthians was written from Philippi by Stephanas, and Fortunatus, and Achaicus, and Timotheus.
  '3':
  - type: text
    content: 'And when I come, whomsoever ye shall approve by '
  - type: text
    content: your
  - type: text
    content: ' letters, them will I send to bring your liberality unto Jerusalem. '
  '4':
  - type: text
    content: And if it be meet that I go also, they shall go with me.
  '5':
  - type: text
    content: 'Now I will come unto you, when I shall pass through Macedonia: for I do pass through Macedonia. '
  '6':
  - type: text
    content: 'And it may be that I will abide, yea, and winter with you, that ye may bring me on my journey whithersoever I go. '
  '7':
  - type: text
    content: 'For I will not see you now by the way; but I trust to tarry a while with you, if the Lord permit. '
  '8':
  - type: text
    content: 'But I will tarry at Ephesus until Pentecost. '
  '9':
  - type: text
    content: 'For a great door and effectual is opened unto me, and '
  - type: text
    content: there are
  - type: text
    content: ' many adversaries.'
