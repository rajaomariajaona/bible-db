    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ask ye of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' rain in the time of the latter rain; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall make bright clouds, and give them showers of rain, to every one grass in the field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For the idols have spoken vanity, and the diviners have seen a lie, and have told false dreams; they comfort in vain: therefore they went their way as a flock, they were troubled, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no shepherd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mine anger was kindled against the shepherds, and I punished the goats: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts hath visited his flock the house of Judah, and hath made them as his goodly horse in the battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Out of him came forth the corner, out of him the nail, out of him the battle bow, out of him every oppressor together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they shall be as mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', which tread down '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their enemies
  - type: text
    text: ' in the mire of the streets in the battle: and they shall fight, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with them, and the riders on horses shall be confounded.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Judah and Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I will strengthen the house of Judah, and I will save the house of Joseph, and I will bring them again to place them; for I have mercy upon them: and they shall be as though I had not cast them off: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, and will hear them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they of
  - type: text
    text: ' Ephraim shall be like a mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', and their heart shall rejoice as through wine: yea, their children shall see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and be glad; their heart shall rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will hiss for them, and gather them; for I have redeemed them: and they shall increase as they have increased. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And I will sow them among the people: and they shall remember me in far countries; and they shall live with their children, and turn again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I will bring them again also out of the land of Egypt, and gather them out of Assyria; and I will bring them into the land of Gilead and Lebanon; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' shall not be found for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he shall pass through the sea with affliction, and shall smite the waves in the sea, and all the deeps of the river shall dry up: and the pride of Assyria shall be brought down, and the sceptre of Egypt shall depart away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I will strengthen them in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and they shall walk up and down in his name, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
