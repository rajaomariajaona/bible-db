document_id: NUM.23,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balaam said unto Balak, Build me here seven altars, and prepare me here seven oxen and seven rams. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can count the dust of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the number of the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of Israel?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me die the death of the righteous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let my last end be like his!
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak said unto Balaam, What hast thou done unto me? I took thee to curse mine enemies, and, behold, thou hast blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' altogether. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered and said, Must I not take heed to speak that which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath put in my mouth?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak said unto him, Come, I pray thee, with me unto another place, from whence thou mayest see them: thou shalt see but the utmost part of them, and shalt not see them all: and curse me them from thence. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought him into the field of Zophim, to the top of Pisgah, and built seven altars, and offered a bullock and a ram on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' altar. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto Balak, Stand here by thy burnt offering, while I meet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
    - type: text
      text: ' yonder. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' met Balaam, and put a word in his mouth, and said, Go again unto Balak, and say thus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he came to him, behold, he stood by his burnt offering, and the princes of Moab with him. And Balak said unto him, What hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spoken? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise up, Balak, and hear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hearken unto me, thou son of Zippor:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not a man, that he should lie;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Neither the son of man, that he should repent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hath he said, and shall he not do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or hath he spoken, and shall he not make it good?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak did as Balaam had spoken; and Balak and Balaam offered on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' altar a bullock and a ram. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, I have received '
    - type: usfm
      marker: add
      children:
      - type: text
        text: commandment
    - type: text
      text: ' to bless:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he hath blessed; and I cannot reverse it.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath not beheld iniquity in Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Neither hath he seen perverseness in Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the shout of a king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among them.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God brought them out of Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath as it were the strength of an unicorn.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no enchantment against Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' any divination against Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to this time it shall be said of Jacob and of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What hath God wrought!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, the people shall rise up as a great lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And lift up himself as a young lion:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall not lie down until he eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the prey,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And drink the blood of the slain.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak said unto Balaam, Neither curse them at all, nor bless them at all. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Balaam answered and said unto Balak, Told not I thee, saying, All that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' speaketh, that I must do?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak said unto Balaam, Come, I pray thee, I will bring thee unto another place; peradventure it will please God that thou mayest curse me them from thence. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak brought Balaam unto the top of Peor, that looketh toward Jeshimon. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balaam said unto Balak, Build me here seven altars, and prepare me here seven bullocks and seven rams. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balaam said unto Balak, Stand by thy burnt offering, and I will go: peradventure the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will come to meet me: and whatsoever he sheweth me I will tell thee. And he went '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' an high place. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak did as Balaam had said, and offered a bullock and a ram on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' altar.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God met Balaam: and he said unto him, I have prepared seven altars, and I have offered upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' altar a bullock and a ram. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' put a word in Balaam''s mouth, and said, Return unto Balak, and thus thou shalt speak. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he returned unto him, and, lo, he stood by his burnt sacrifice, he, and all the princes of Moab. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Balak the king of Moab hath brought me from Aram,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of the mountains of the east,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Saying
    - type: text
      text: ', Come, curse me Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And come, defy Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How shall I curse, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
    - type: text
      text: ' God hath not cursed?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or how shall I defy, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not defied?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For from the top of the rocks I see him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And from the hills I behold him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lo, the people shall dwell alone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall not be reckoned among the nations.
