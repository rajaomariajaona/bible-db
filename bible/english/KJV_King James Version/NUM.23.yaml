verses:
  '1':
  - type: text
    content: 'And Balaam said unto Balak, Build me here seven altars, and prepare me here seven oxen and seven rams. '
  '10':
  - type: text
    content: Who can count the dust of Jacob,
  - type: text
    content: 'And the number of the fourth '
  - type: text
    content: part
  - type: text
    content: ' of Israel?'
  - type: text
    content: Let me die the death of the righteous,
  - type: text
    content: And let my last end be like his!
  '11':
  - type: text
    content: 'And Balak said unto Balaam, What hast thou done unto me? I took thee to curse mine enemies, and, behold, thou hast blessed '
  - type: text
    content: them
  - type: text
    content: ' altogether. '
  '12':
  - type: text
    content: 'And he answered and said, Must I not take heed to speak that which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath put in my mouth?'
  '13':
  - type: text
    content: 'And Balak said unto him, Come, I pray thee, with me unto another place, from whence thou mayest see them: thou shalt see but the utmost part of them, and shalt not see them all: and curse me them from thence. '
  '14':
  - type: text
    content: 'And he brought him into the field of Zophim, to the top of Pisgah, and built seven altars, and offered a bullock and a ram on '
  - type: text
    content: every
  - type: text
    content: ' altar. '
  '15':
  - type: text
    content: 'And he said unto Balak, Stand here by thy burnt offering, while I meet '
  - type: text
    content: 'the '
  - type: text
    content: LORD
  - type: text
    content: ' yonder. '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' met Balaam, and put a word in his mouth, and said, Go again unto Balak, and say thus. '
  '17':
  - type: text
    content: 'And when he came to him, behold, he stood by his burnt offering, and the princes of Moab with him. And Balak said unto him, What hath the '
  - type: text
    content: LORD
  - type: text
    content: ' spoken? '
  '18':
  - type: text
    content: And he took up his parable, and said,
  - type: text
    content: Rise up, Balak, and hear;
  - type: text
    content: 'Hearken unto me, thou son of Zippor:'
  '19':
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' not a man, that he should lie;'
  - type: text
    content: 'Neither the son of man, that he should repent:'
  - type: text
    content: 'Hath he said, and shall he not do '
  - type: text
    content: it?
  - type: text
    content: Or hath he spoken, and shall he not make it good?
  '2':
  - type: text
    content: 'And Balak did as Balaam had spoken; and Balak and Balaam offered on '
  - type: text
    content: every
  - type: text
    content: ' altar a bullock and a ram. '
  '20':
  - type: text
    content: 'Behold, I have received '
  - type: text
    content: commandment
  - type: text
    content: ' to bless:'
  - type: text
    content: And he hath blessed; and I cannot reverse it.
  '21':
  - type: text
    content: He hath not beheld iniquity in Jacob,
  - type: text
    content: 'Neither hath he seen perverseness in Israel:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' his God '
  - type: text
    content: is
  - type: text
    content: ' with him,'
  - type: text
    content: 'And the shout of a king '
  - type: text
    content: is
  - type: text
    content: ' among them.'
  '22':
  - type: text
    content: God brought them out of Egypt;
  - type: text
    content: He hath as it were the strength of an unicorn.
  '23':
  - type: text
    content: 'Surely '
  - type: text
    content: there is
  - type: text
    content: ' no enchantment against Jacob,'
  - type: text
    content: 'Neither '
  - type: text
    content: is there
  - type: text
    content: ' any divination against Israel:'
  - type: text
    content: According to this time it shall be said of Jacob and of Israel,
  - type: text
    content: What hath God wrought!
  '24':
  - type: text
    content: Behold, the people shall rise up as a great lion,
  - type: text
    content: 'And lift up himself as a young lion:'
  - type: text
    content: 'He shall not lie down until he eat '
  - type: text
    content: of
  - type: text
    content: ' the prey,'
  - type: text
    content: And drink the blood of the slain.
  '25':
  - type: text
    content: 'And Balak said unto Balaam, Neither curse them at all, nor bless them at all. '
  '26':
  - type: text
    content: 'But Balaam answered and said unto Balak, Told not I thee, saying, All that the '
  - type: text
    content: LORD
  - type: text
    content: ' speaketh, that I must do?'
  '27':
  - type: text
    content: 'And Balak said unto Balaam, Come, I pray thee, I will bring thee unto another place; peradventure it will please God that thou mayest curse me them from thence. '
  '28':
  - type: text
    content: 'And Balak brought Balaam unto the top of Peor, that looketh toward Jeshimon. '
  '29':
  - type: text
    content: 'And Balaam said unto Balak, Build me here seven altars, and prepare me here seven bullocks and seven rams. '
  '3':
  - type: text
    content: 'And Balaam said unto Balak, Stand by thy burnt offering, and I will go: peradventure the '
  - type: text
    content: LORD
  - type: text
    content: ' will come to meet me: and whatsoever he sheweth me I will tell thee. And he went '
  - type: text
    content: to
  - type: text
    content: ' an high place. '
  '30':
  - type: text
    content: 'And Balak did as Balaam had said, and offered a bullock and a ram on '
  - type: text
    content: every
  - type: text
    content: ' altar.'
  '4':
  - type: text
    content: 'And God met Balaam: and he said unto him, I have prepared seven altars, and I have offered upon '
  - type: text
    content: every
  - type: text
    content: ' altar a bullock and a ram. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' put a word in Balaam''s mouth, and said, Return unto Balak, and thus thou shalt speak. '
  '6':
  - type: text
    content: 'And he returned unto him, and, lo, he stood by his burnt sacrifice, he, and all the princes of Moab. '
  '7':
  - type: text
    content: And he took up his parable, and said,
  - type: text
    content: Balak the king of Moab hath brought me from Aram,
  - type: text
    content: Out of the mountains of the east,
  - type: text
    content: Saying
  - type: text
    content: ', Come, curse me Jacob,'
  - type: text
    content: And come, defy Israel.
  '8':
  - type: text
    content: 'How shall I curse, '
  - type: text
    content: whom
  - type: text
    content: ' God hath not cursed?'
  - type: text
    content: 'Or how shall I defy, '
  - type: text
    content: whom
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' hath not defied?'
  '9':
  - type: text
    content: For from the top of the rocks I see him,
  - type: text
    content: 'And from the hills I behold him:'
  - type: text
    content: Lo, the people shall dwell alone,
  - type: text
    content: And shall not be reckoned among the nations.
