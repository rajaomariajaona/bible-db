document_id: ACT.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Ephesus
  - type: text
    content: 'And it came to pass, that, while Apollos was at Corinth, Paul having passed through the upper coasts came to Ephesus: and finding certain disciples, '
  '10':
  - type: text
    content: And this continued by the space of two years; so that all they which dwelt in Asia heard the word of the Lord Jesus, both Jews and Greeks.
  '11':
  - type: text
    content: 'And God wrought special miracles by the hands of Paul: '
  '12':
  - type: text
    content: so that from his body were brought unto the sick handkerchiefs or aprons, and the diseases departed from them, and the evil spirits went out of them.
  '13':
  - type: text
    content: 'Then certain of the vagabond Jews, exorcists, took upon them to call over them which had evil spirits the name of the Lord Jesus, saying, We adjure you by Jesus whom Paul preacheth. '
  '14':
  - type: text
    content: 'And there were seven sons of '
  - type: text
    content: one
  - type: text
    content: ' Sceva, a Jew, '
  - type: text
    content: and
  - type: text
    content: ' chief of the priests, which did so. '
  '15':
  - type: text
    content: 'And the evil spirit answered and said, Jesus I know, and Paul I know; but who are ye? '
  '16':
  - type: text
    content: 'And the man in whom the evil spirit was leaped on them, and overcame them, and prevailed against them, so that they fled out of that house naked and wounded. '
  '17':
  - type: text
    content: 'And this was known to all the Jews and Greeks also dwelling at Ephesus; and fear fell on them all, and the name of the Lord Jesus was magnified. '
  '18':
  - type: text
    content: 'And many that believed came, and confessed, and shewed their deeds. '
  '19':
  - type: text
    content: 'Many of them also which used curious arts brought their books together, and burned them before all '
  - type: text
    content: men
  - type: text
    content: ': and they counted the price of them, and found '
  - type: text
    content: it
  - type: text
    content: ' fifty thousand '
  - type: text
    content: pieces
  - type: text
    content: ' of silver. '
  '2':
  - type: text
    content: 'he said unto them, Have ye received the Holy Ghost since ye believed? And they said unto him, We have not so much as heard whether there be any Holy Ghost. '
  '20':
  - type: text
    content: So mightily grew the word of God and prevailed.
  '21':
  - type: text
    content: 'After these things were ended, Paul purposed in the spirit, when he had passed through Macedonia and Achaia, to go to Jerusalem, saying, After I have been there, I must also see Rome. '
  '22':
  - type: text
    content: So he sent into Macedonia two of them that ministered unto him, Timotheus and Erastus; but he himself stayed in Asia for a season.
  - type: heading
    content: Diana of the Ephesians
  '23':
  - type: text
    content: 'And the same time there arose no small stir about that way. '
  '24':
  - type: text
    content: 'For a certain '
  - type: text
    content: man
  - type: text
    content: ' named Demetrius, a silversmith, which made silver shrines for Diana, brought no small gain unto the craftsmen; '
  '25':
  - type: text
    content: 'whom he called together with the workmen of like occupation, and said, Sirs, ye know that by this craft we have our wealth. '
  '26':
  - type: text
    content: 'Moreover ye see and hear, that not alone at Ephesus, but almost throughout all Asia, this Paul hath persuaded and turned away much people, saying that they be no gods, which are made with hands: '
  '27':
  - type: text
    content: 'so that not only this our craft is in danger to be set at nought; but also that the temple of the great goddess Diana should be despised, and her magnificence should be destroyed, whom all Asia and the world worshippeth. '
  '28':
  - type: text
    content: 'And when they heard '
  - type: text
    content: these sayings
  - type: text
    content: ', they were full of wrath, and cried out, saying, Great '
  - type: text
    content: is
  - type: text
    content: ' Diana of the Ephesians.'
  '29':
  - type: text
    content: 'And the whole city was filled with confusion: and having caught Gaius and Aristarchus, men of Macedonia, Paul''s companions in travel, they rushed with one accord into the theatre. '
  '3':
  - type: text
    content: 'And he said unto them, Unto what then were ye baptized? And they said, Unto John''s baptism. '
  '30':
  - type: text
    content: 'And when Paul would have entered in unto the people, the disciples suffered him not. '
  '31':
  - type: text
    content: 'And certain of the chief of Asia, which were his friends, sent unto him, desiring '
  - type: text
    content: him
  - type: text
    content: ' that he would not adventure himself into the theatre. '
  '32':
  - type: text
    content: 'Some therefore cried one thing, and some another: for the assembly was confused; and the more part knew not wherefore they were come together. '
  '33':
  - type: text
    content: 'And they drew Alexander out of the multitude, the Jews putting him forward. And Alexander beckoned with the hand, and would have made his defence unto the people. '
  '34':
  - type: text
    content: 'But when they knew that he was a Jew, all with one voice about the space of two hours cried out, Great '
  - type: text
    content: is
  - type: text
    content: ' Diana of the Ephesians.'
  '35':
  - type: text
    content: 'And when the townclerk had appeased the people, he said, '
  - type: text
    content: Ye
  - type: text
    content: ' men of Ephesus, what man is there that knoweth not how that the city of the Ephesians is a worshipper of the great goddess Diana, and of the '
  - type: text
    content: image
  - type: text
    content: ' which fell down from Jupiter? '
  '36':
  - type: text
    content: 'Seeing then that these things cannot be spoken against, ye ought to be quiet, and to do nothing rashly. '
  '37':
  - type: text
    content: 'For ye have brought hither these men, which are neither robbers of churches, nor yet blasphemers of your goddess. '
  '38':
  - type: text
    content: 'Wherefore if Demetrius, and the craftsmen which are with him, have a matter against any man, the law is open, and there are deputies: let them implead one another. '
  '39':
  - type: text
    content: 'But if ye enquire any thing concerning other matters, it shall be determined in a lawful assembly. '
  '4':
  - type: text
    content: 'Then said Paul, John verily baptized with the baptism of repentance, saying unto the people, that they should believe on him which should come after him, that is, on Christ Jesus. '
  '40':
  - type: text
    content: 'For we are in danger to be called in question for this day''s uproar, there being no cause whereby we may give an account of this concourse. '
  '41':
  - type: text
    content: And when he had thus spoken, he dismissed the assembly.
  '5':
  - type: text
    content: 'When they heard '
  - type: text
    content: this
  - type: text
    content: ', they were baptized in the name of the Lord Jesus.'
  '6':
  - type: text
    content: 'And when Paul had laid '
  - type: text
    content: his
  - type: text
    content: ' hands upon them, the Holy Ghost came on them; and they spake with tongues, and prophesied. '
  '7':
  - type: text
    content: 'And all the men were about twelve. '
  '8':
  - type: text
    content: And he went into the synagogue, and spake boldly for the space of three months, disputing and persuading the things concerning the kingdom of God.
  '9':
  - type: text
    content: 'But when divers were hardened, and believed not, but spake evil of that way before the multitude, he departed from them, and separated the disciples, disputing daily in the school of one Tyrannus. '
