  '13':
  - type: text
    content: Return, return, O Shulamite;
  - type: text
    content: Return, return, that we may look upon thee.
  - type: text
    content: What will ye see in the Shulamite?
  - type: text
    content: As it were the company of two armies.
  '2':
  - type: text
    content: My beloved is gone down into his garden,
  - type: text
    content: To the beds of spices,
  - type: text
    content: To feed in the gardens,
  - type: text
    content: And to gather lilies.
