document_id: SNG.6
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Whither is thy beloved gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O thou fairest among women?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whither is thy beloved turned aside?
- type: usfm
  marker: q2
  children:
  - type: text
    text: That we may seek him with thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My beloved is gone down into his garden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: To the beds of spices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To feed in the gardens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to gather lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' my beloved''s, and my beloved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He feedeth among the lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' beautiful, O my love, as Tirzah,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Comely as Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Terrible as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: an army
  - type: text
    text: ' with banners.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Turn away thine eyes from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For they have overcome me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy hair '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as a flock of goats'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That appear from Gilead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thy teeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as a flock of sheep'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which go up from the washing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whereof every one beareth twins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' not one barren among them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As a piece of a pomegranate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy temples'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Within thy locks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: There are threescore queens, and fourscore concubines,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And virgins without number.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My dove, my undefiled is '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' one;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'She '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: only
  - type: text
    text: ' one of her mother,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'She '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the choice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of her that bare her.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The daughters saw her, and blessed her;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yea
  - type: text
    text: ', the queens and the concubines, and they praised her.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' looketh forth as the morning,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fair as the moon, clear as the sun,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' terrible as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: an army
  - type: text
    text: ' with banners?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I went down into the garden of nuts
- type: usfm
  marker: q2
  children:
  - type: text
    text: To see the fruits of the valley,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' to see whether the vine flourished,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the pomegranates budded.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Or ever I was aware,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My soul made me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like
  - type: text
    text: ' the chariots of Amminadib.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Return, return, O Shulamite;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Return, return, that we may look upon thee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What will ye see in the Shulamite?
- type: usfm
  marker: q2
  children:
  - type: text
    text: As it were the company of two armies.
