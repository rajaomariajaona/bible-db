  '36':
  - type: text
    content: 'Simon Peter said unto him, Lord, whither goest thou? Jesus answered him, '
  - type: text
    content: Whither I go, thou canst not follow me now; but thou shalt follow me afterwards.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Peter said unto him, Lord, why cannot I follow thee now? I will lay down my life for thy sake. '
  '38':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: Wilt thou lay down thy life for my sake? Verily, verily, I say unto thee, The cock shall not crow, till thou hast denied me thrice.
  '4':
  - type: text
    content: 'he riseth from supper, and laid aside his garments; and took a towel, and girded himself. '
