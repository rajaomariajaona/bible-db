  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Little children, yet a little while I am with you. Ye shall seek me: and as I said unto the Jews, Whither I go, ye cannot come; so now I say to you.'
  - type: text
    content: ' '
  '34':
  - type: text
