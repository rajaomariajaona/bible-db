document_id: JHN.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Third Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now before the feast of the passover, when Jesus knew that his hour was come that he should depart out of this world unto the Father, having loved his own which were in the world, he loved them unto the end.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Last Supper
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus saith to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He that is washed needeth not save to wash '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' feet, but is clean every whit: and ye are clean, but not all.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he knew who should betray him; therefore said he, Ye are not all clean.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So after he had washed their feet, and had taken his garments, and was set down again, he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Know ye what I have done to you?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye call me Master and Lord: and ye say well; for '
      - type: usfm
        marker: add
        children:
        - type: text
          text: so
      - type: text
        text: ' I am.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If I then, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: your
      - type: text
        text: ' Lord and Master, have washed your feet; ye also ought to wash one another''s feet.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I have given you an example, that ye should do as I have done to you.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, The servant is not greater than his lord; neither he that is sent greater than he that sent him.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If ye know these things, happy are ye if ye do them.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I speak not of you all: I know whom I have chosen: but that the scripture may be fulfilled, He that eateth bread with me hath lifted up his heel against me.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now I tell you before it come, that, when it is come to pass, ye may believe that I am '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: .
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And supper being ended, the devil having now put into the heart of Judas Iscariot, Simon''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ', to betray him; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, He that receiveth whomsoever I send receiveth me; and he that receiveth me receiveth him that sent me.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus had thus said, he was troubled in spirit, and testified, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, that one of you shall betray me.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the disciples looked one on another, doubting of whom he spake. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was leaning on Jesus'' bosom one of his disciples, whom Jesus loved. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter therefore beckoned to him, that he should ask who it should be of whom he spake. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He then lying on Jesus'' breast saith unto him, Lord, who is it? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He it is, to whom I shall give a sop, when I have dipped '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: .
    - type: text
      text: ' And when he had dipped the sop, he gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to Judas Iscariot, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the son
    - type: text
      text: ' of Simon. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after the sop Satan entered into him. Then said Jesus unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: That thou doest, do quickly.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now no man at the table knew for what intent he spake this unto him. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For some '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of them
    - type: text
      text: ' thought, because Judas had the bag, that Jesus had said unto him, Buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those things
    - type: text
      text: ' that we have need of against the feast; or, that he should give something to the poor. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus knowing that the Father had given all things into his hands, and that he was come from God, and went to God; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He then having received the sop went immediately out: and it was night.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, when he was gone out, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now is the Son of man glorified, and God is glorified in him.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If God be glorified in him, God shall also glorify him in himself, and shall straightway glorify him.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Little children, yet a little while I am with you. Ye shall seek me: and as I said unto the Jews, Whither I go, ye cannot come; so now I say to you.'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A new commandment I give unto you, That ye love one another; as I have loved you, that ye also love one another.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'By this shall all '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' know that ye are my disciples, if ye have love one to another.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter said unto him, Lord, whither goest thou? Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whither I go, thou canst not follow me now; but thou shalt follow me afterwards.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter said unto him, Lord, why cannot I follow thee now? I will lay down my life for thy sake. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wilt thou lay down thy life for my sake? Verily, verily, I say unto thee, The cock shall not crow, till thou hast denied me thrice.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he riseth from supper, and laid aside his garments; and took a towel, and girded himself. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After that he poureth water into a bason, and began to wash the disciples'' feet, and to wipe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with the towel wherewith he was girded. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then cometh he to Simon Peter: and Peter saith unto him, Lord, dost thou wash my feet? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered and said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What I do thou knowest not now; but thou shalt know hereafter.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter saith unto him, Thou shalt never wash my feet. Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I wash thee not, thou hast no part with me.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter saith unto him, Lord, not my feet only, but also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' hands and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' head. '
