document_id: JHN.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Feast of Tabernacles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things Jesus walked in Galilee: for he would not walk in Jewry, because the Jews sought to kill him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now the Jews'' feast of tabernacles was at hand. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'His brethren therefore said unto him, Depart hence, and go into Judæa, that thy disciples also may see the works that thou doest. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' doeth any thing in secret, and he himself seeketh to be known openly. If thou do these things, shew thyself to the world. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For neither did his brethren believe in him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My time is not yet come: but your time is alway ready.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The world cannot hate you; but me it hateth, because I testify of it, that the works thereof are evil.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go ye up unto this feast: I go not up yet unto this feast; for my time is not yet full come.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When he had said these words unto them, he abode '
  - type: usfm
    marker: add
    children:
    - type: text
      text: still
  - type: text
    text: ' in Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But when his brethren were gone up, then went he also up unto the feast, not openly, but as it were in secret. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the Jews sought him at the feast, and said, Where is he? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And there was much murmuring among the people concerning him: for some said, He is a good man: others said, Nay; but he deceiveth the people. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Howbeit no man spake openly of him for fear of the Jews.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now about the midst of the feast Jesus went up into the temple, and taught. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the Jews marvelled, saying, How knoweth this man letters, having never learned? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus answered them, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My doctrine is not mine, but his that sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If any man will do his will, he shall know of the doctrine, whether it be of God, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether
    - type: text
      text: ' I speak of myself.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He that speaketh of himself seeketh his own glory: but he that seeketh his glory that sent him, the same is true, and no unrighteousness is in him.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Did not Moses give you the law, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' none of you keepeth the law? Why go ye about to kill me?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The people answered and said, Thou hast a devil: who goeth about to kill thee? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have done one work, and ye all marvel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moses therefore gave unto you circumcision; (not because it is of Moses, but of the fathers;) and ye on the sabbath day circumcise a man.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If a man on the sabbath day receive circumcision, that the law of Moses should not be broken; are ye angry at me, because I have made a man every whit whole on the sabbath day?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Judge not according to the appearance, but judge righteous judgment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then said some of them of Jerusalem, Is not this he, whom they seek to kill? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But, lo, he speaketh boldly, and they say nothing unto him. Do the rulers know indeed that this is the very Christ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Howbeit we know this man whence he is: but when Christ cometh, no man knoweth whence he is. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then cried Jesus in the temple as he taught, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ye both know me, and ye know whence I am: and I am not come of myself, but he that sent me is true, whom ye know not.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But I know him: for I am from him, and he hath sent me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then they sought to take him: but no man laid hands on him, because his hour was not yet come. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And many of the people believed on him, and said, When Christ cometh, will he do more miracles than these which this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' hath done?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The Pharisees heard that the people murmured such things concerning him; and the Pharisees and the chief priests sent officers to take him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then said Jesus unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Yet a little while am I with you, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' I go unto him that sent me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ye shall seek me, and shall not find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ': and where I am, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thither
    - type: text
      text: ' ye cannot come.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then said the Jews among themselves, Whither will he go, that we shall not find him? will he go unto the dispersed among the Gentiles, and teach the Gentiles? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: manner of
  - type: text
    text: ' saying is this that he said, Ye shall seek me, and shall not find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ': and where I am, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thither
  - type: text
    text: ' ye cannot come? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'In the last day, that great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the feast, Jesus stood and cried, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If any man thirst, let him come unto me, and drink.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He that believeth on me, as the scripture hath said, out of his belly shall flow rivers of living water.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '(But this spake he of the Spirit, which they that believe on him should receive: for the Holy Ghost was not yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: given
  - type: text
    text: ; because that Jesus was not yet glorified.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Many of the people therefore, when they heard this saying, said, Of a truth this is the Prophet. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Others said, This is the Christ. But some said, Shall Christ come out of Galilee? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Hath not the scripture said, That Christ cometh of the seed of David, and out of the town of Bethlehem, where David was? '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So there was a division among the people because of him. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And some of them would have taken him; but no man laid hands on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then came the officers to the chief priests and Pharisees; and they said unto them, Why have ye not brought him? '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The officers answered, Never man spake like this man. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Then answered them the Pharisees, Are ye also deceived? '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Have any of the rulers or of the Pharisees believed on him? '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But this people who knoweth not the law are cursed. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nicodemus saith unto them, (he that came to Jesus by night, being one of them,) '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Doth our law judge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' man, before it hear him, and know what he doeth? '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'They answered and said unto him, Art thou also of Galilee? Search, and look: for out of Galilee ariseth no prophet. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: And every man went unto his own house.
