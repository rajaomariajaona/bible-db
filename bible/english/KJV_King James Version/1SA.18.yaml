    content: 'But it came to pass at the time when Merab Saul''s daughter should have been given to David, that she was given unto Adriel the Meholathite to wife. '
  '2':
  - type: text
    content: 'And Saul took him that day, and would let him go no more home to his father''s house. '
  '20':
