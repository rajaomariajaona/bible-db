document_id: 1SA.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David and Jonathan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when he had made an end of speaking unto Saul, that the soul of Jonathan was knit with the soul of David, and Jonathan loved him as his own soul. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass on the morrow, that the evil spirit from God came upon Saul, and he prophesied in the midst of the house: and David played with his hand, as at other times: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a javelin in Saul''s hand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul cast the javelin; for he said, I will smite David even to the wall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with it
    - type: text
      text: '. And David avoided out of his presence twice. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul was afraid of David, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was with him, and was departed from Saul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Saul removed him from him, and made him his captain over a thousand; and he went out and came in before the people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David behaved himself wisely in all his ways; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore when Saul saw that he behaved himself very wisely, he was afraid of him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But all Israel and Judah loved David, because he went out and came in before them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said to David, Behold my elder daughter Merab, her will I give thee to wife: only be thou valiant for me, and fight the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s battles. For Saul said, Let not mine hand be upon him, but let the hand of the Philistines be upon him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said unto Saul, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I? and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my life, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' my father''s family in Israel, that I should be son in law to the king? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it came to pass at the time when Merab Saul''s daughter should have been given to David, that she was given unto Adriel the Meholathite to wife. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul took him that day, and would let him go no more home to his father''s house. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Michal Saul''s daughter loved David: and they told Saul, and the thing pleased him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said, I will give him her, that she may be a snare to him, and that the hand of the Philistines may be against him. Wherefore Saul said to David, Thou shalt this day be my son in law in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the one of
    - type: text
      text: ' the twain.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul commanded his servants, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Commune with David secretly, and say, Behold, the king hath delight in thee, and all his servants love thee: now therefore be the king''s son in law. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul''s servants spake those words in the ears of David. And David said, Seemeth it to you a light thing to be a king''s son in law, seeing that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a poor man, and lightly esteemed? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the servants of Saul told him, saying, On this manner spake David. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said, Thus shall ye say to David, The king desireth not any dowry, but an hundred foreskins of the Philistines, to be avenged of the king''s enemies. But Saul thought to make David fall by the hand of the Philistines. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when his servants told David these words, it pleased David well to be the king''s son in law: and the days were not expired. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore David arose and went, he and his men, and slew of the Philistines two hundred men; and David brought their foreskins, and they gave them in full tale to the king, that he might be the king''s son in law. And Saul gave him Michal his daughter to wife. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul saw and knew that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with David, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Michal Saul''s daughter loved him. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Saul was yet the more afraid of David; and Saul became David's enemy continually.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jonathan and David made a covenant, because he loved him as his own soul. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the princes of the Philistines went forth: and it came to pass, after they went forth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' David behaved himself more wisely than all the servants of Saul; so that his name was much set by.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jonathan stripped himself of the robe that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon him, and gave it to David, and his garments, even to his sword, and to his bow, and to his girdle. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David went out whithersoever Saul sent him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' behaved himself wisely: and Saul set him over the men of war, and he was accepted in the sight of all the people, and also in the sight of Saul''s servants.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass as they came, when David was returned from the slaughter of the Philistine, that the women came out of all cities of Israel, singing and dancing, to meet king Saul, with tabrets, with joy, and with instruments of musick. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the women answered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one another
    - type: text
      text: ' as they played, and said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saul hath slain his thousands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And David his ten thousands.
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And Saul was very wroth, and the saying displeased him; and he said, They have ascribed unto David ten thousands, and to me they have ascribed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' thousands: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: what
    - type: text
      text: ' can he have more but the kingdom? '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And Saul eyed David from that day and forward.
