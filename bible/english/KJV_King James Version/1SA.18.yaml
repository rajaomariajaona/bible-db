    content: 'And Michal Saul''s daughter loved David: and they told Saul, and the thing pleased him. '
  '21':
  - type: text
    content: 'And Saul said, I will give him her, that she may be a snare to him, and that the hand of the Philistines may be against him. Wherefore Saul said to David, Thou shalt this day be my son in law in '
  - type: text
    content: the one of
  - type: text
