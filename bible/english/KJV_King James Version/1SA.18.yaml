  '25':
  - type: text
    content: 'And Saul said, Thus shall ye say to David, The king desireth not any dowry, but an hundred foreskins of the Philistines, to be avenged of the king''s enemies. But Saul thought to make David fall by the hand of the Philistines. '
  '26':
  - type: text
    content: 'And when his servants told David these words, it pleased David well to be the king''s son in law: and the days were not expired. '
  '27':
  - type: text
    content: 'Wherefore David arose and went, he and his men, and slew of the Philistines two hundred men; and David brought their foreskins, and they gave them in full tale to the king, that he might be the king''s son in law. And Saul gave him Michal his daughter to wife. '
  '28':
