document_id: 2CO.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Having therefore these promises, dearly beloved, let us cleanse ourselves from all filthiness of the flesh and spirit, perfecting holiness in the fear of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Receive us; we have wronged no man, we have corrupted no man, we have defrauded no man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I speak not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' to condemn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ': for I have said before, that ye are in our hearts to die and live with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my boldness of speech toward you, great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my glorying of you: I am filled with comfort, I am exceeding joyful in all our tribulation.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Mission of Titus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For, when we were come into Macedonia, our flesh had no rest, but we were troubled on every side; without '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fightings, within '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fears. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nevertheless God, that comforteth those that are cast down, comforted us by the coming of Titus; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and not by his coming only, but by the consolation wherewith he was comforted in you, when he told us your earnest desire, your mourning, your fervent mind toward me; so that I rejoiced the more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For though I made you sorry with a letter, I do not repent, though I did repent: for I perceive that the same epistle hath made you sorry, though '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it were
  - type: text
    text: ' but for a season. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now I rejoice, not that ye were made sorry, but that ye sorrowed to repentance: for ye were made sorry after a godly manner, that ye might receive damage by us in nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For godly sorrow worketh repentance to salvation not to be repented of: but the sorrow of the world worketh death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For behold this selfsame thing, that ye sorrowed after a godly sort, what carefulness it wrought in you, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' clearing of yourselves, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' indignation, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' fear, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' vehement desire, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' zeal, yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' revenge! In all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' ye have approved yourselves to be clear in this matter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Wherefore, though I wrote unto you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I did it
  - type: text
    text: ' not for his cause that had done the wrong, nor for his cause that suffered wrong, but that our care for you in the sight of God might appear unto you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore we were comforted in your comfort: yea, and exceedingly the more joyed we for the joy of Titus, because his spirit was refreshed by you all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if I have boasted any thing to him of you, I am not ashamed; but as we spake all things to you in truth, even so our boasting, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I made
  - type: text
    text: ' before Titus, is found a truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And his inward affection is more abundant toward you, whilst he remembereth the obedience of you all, how with fear and trembling ye received him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I rejoice therefore that I have confidence in you in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: .
