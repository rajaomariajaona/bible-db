document_id: LEV.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Marriage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nakedness of thy son''s daughter, or of thy daughter''s daughter, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' their nakedness thou shalt not uncover: for their''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine own nakedness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nakedness of thy father''s wife''s daughter, begotten of thy father, she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy sister, thou shalt not uncover her nakedness. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not uncover the nakedness of thy father''s sister: she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy father''s near kinswoman. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not uncover the nakedness of thy mother''s sister: for she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy mother''s near kinswoman. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not uncover the nakedness of thy father''s brother, thou shalt not approach to his wife: she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine aunt. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not uncover the nakedness of thy daughter in law: she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy son''s wife; thou shalt not uncover her nakedness. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not uncover the nakedness of thy brother''s wife: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy brother''s nakedness. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not uncover the nakedness of a woman and her daughter, neither shalt thou take her son''s daughter, or her daughter''s daughter, to uncover her nakedness; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' her near kinswomen: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wickedness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shalt thou take a wife to her sister, to vex '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ', to uncover her nakedness, beside the other in her life '
    - type: usfm
      marker: add
      children:
      - type: text
        text: time
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also thou shalt not approach unto a woman to uncover her nakedness, as long as she is put apart for her uncleanness. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto the children of Israel, and say unto them, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover thou shalt not lie carnally with thy neighbour''s wife, to defile thyself with her. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt not let any of thy seed pass through '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the fire
    - type: text
      text: ' to Molech, neither shalt thou profane the name of thy God: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not lie with mankind, as with womankind: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' abomination. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shalt thou lie with any beast to defile thyself therewith: neither shall any woman stand before a beast to lie down thereto: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' confusion. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Defile not ye yourselves in any of these things: for in all these the nations are defiled which I cast out before you: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the land is defiled: therefore I do visit the iniquity thereof upon it, and the land itself vomiteth out her inhabitants. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall therefore keep my statutes and my judgments, and shall not commit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' of these abominations; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: neither
    - type: text
      text: ' any of your own nation, nor any stranger that sojourneth among you: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(for all these abominations have the men of the land done, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before you, and the land is defiled;) '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the land spue not you out also, when ye defile it, as it spued out the nations that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before you. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whosoever shall commit any of these abominations, even the souls that commit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' shall be cut off from among their people. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the doings of the land of Egypt, wherein ye dwelt, shall ye not do: and after the doings of the land of Canaan, whither I bring you, shall ye not do: neither shall ye walk in their ordinances. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore shall ye keep mine ordinance, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' commit not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any one
    - type: text
      text: ' of these abominable customs, which were committed before you, and that ye defile not yourselves therein: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall do my judgments, and keep mine ordinances, to walk therein: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall therefore keep my statutes, and my judgments: which if a man do, he shall live in them: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'None of you shall approach to any that is near of kin to him, to uncover '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' nakedness: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nakedness of thy father, or the nakedness of thy mother, shalt thou not uncover: she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy mother; thou shalt not uncover her nakedness. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nakedness of thy father''s wife shalt thou not uncover: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy father''s nakedness. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nakedness of thy sister, the daughter of thy father, or daughter of thy mother, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether she be
    - type: text
      text: ' born at home, or born abroad, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' their nakedness thou shalt not uncover. '
