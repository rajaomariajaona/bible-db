      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak unto the children of Israel, and say unto them, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After the doings of the land of Egypt, wherein ye dwelt, shall ye not do: and after the doings of the land of Canaan, whither I bring you, shall ye not do: neither shall ye walk in their ordinances. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ye shall do my judgments, and keep mine ordinances, to walk therein: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ye shall therefore keep my statutes, and my judgments: which if a man do, he shall live in them: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'None of you shall approach to any that is near of kin to him, to uncover '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' nakedness: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The nakedness of thy father, or the nakedness of thy mother, shalt thou not uncover: she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy mother; thou shalt not uncover her nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The nakedness of thy father''s wife shalt thou not uncover: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy father''s nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The nakedness of thy sister, the daughter of thy father, or daughter of thy mother, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whether she be
  - type: text
    text: ' born at home, or born abroad, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' their nakedness thou shalt not uncover. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The nakedness of thy son''s daughter, or of thy daughter''s daughter, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' their nakedness thou shalt not uncover: for their''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine own nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The nakedness of thy father''s wife''s daughter, begotten of thy father, she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy sister, thou shalt not uncover her nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Thou shalt not uncover the nakedness of thy father''s sister: she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy father''s near kinswoman. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou shalt not uncover the nakedness of thy mother''s sister: for she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy mother''s near kinswoman. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou shalt not uncover the nakedness of thy father''s brother, thou shalt not approach to his wife: she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine aunt. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thou shalt not uncover the nakedness of thy daughter in law: she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy son''s wife; thou shalt not uncover her nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thou shalt not uncover the nakedness of thy brother''s wife: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy brother''s nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thou shalt not uncover the nakedness of a woman and her daughter, neither shalt thou take her son''s daughter, or her daughter''s daughter, to uncover her nakedness; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' her near kinswomen: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wickedness. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Neither shalt thou take a wife to her sister, to vex '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ', to uncover her nakedness, beside the other in her life '
  - type: usfm
    marker: add
    children:
    - type: text
      text: time
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also thou shalt not approach unto a woman to uncover her nakedness, as long as she is put apart for her uncleanness. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moreover thou shalt not lie carnally with thy neighbour''s wife, to defile thyself with her. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And thou shalt not let any of thy seed pass through '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the fire
  - type: text
    text: ' to Molech, neither shalt thou profane the name of thy God: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thou shalt not lie with mankind, as with womankind: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' abomination. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Neither shalt thou lie with any beast to defile thyself therewith: neither shall any woman stand before a beast to lie down thereto: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' confusion. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Defile not ye yourselves in any of these things: for in all these the nations are defiled which I cast out before you: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and the land is defiled: therefore I do visit the iniquity thereof upon it, and the land itself vomiteth out her inhabitants. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ye shall therefore keep my statutes and my judgments, and shall not commit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' of these abominations; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: neither
  - type: text
    text: ' any of your own nation, nor any stranger that sojourneth among you: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '(for all these abominations have the men of the land done, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' before you, and the land is defiled;) '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'that the land spue not you out also, when ye defile it, as it spued out the nations that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' before you. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For whosoever shall commit any of these abominations, even the souls that commit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' shall be cut off from among their people. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Therefore shall ye keep mine ordinance, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye
  - type: text
    text: ' commit not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any one
  - type: text
    text: ' of these abominable customs, which were committed before you, and that ye defile not yourselves therein: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
