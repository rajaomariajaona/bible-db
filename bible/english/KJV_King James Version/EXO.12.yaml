document_id: EXO.12
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Passover
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and Aaron in the land of Egypt, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This month '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' unto you the beginning of months: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the first month of the year to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Speak ye unto all the congregation of Israel, saying, In the tenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of this month they shall take to them every man a lamb, according to the house of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' fathers, a lamb for an house: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and if the household be too little for the lamb, let him and his neighbour next unto his house take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' according to the number of the souls; every man according to his eating shall make your count for the lamb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Your lamb shall be without blemish, a male of the first year: ye shall take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out from the sheep, or from the goats: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and ye shall keep it up until the fourteenth day of the same month: and the whole assembly of the congregation of Israel shall kill it in the evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they shall take of the blood, and strike '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on the two side posts and on the upper door post of the houses, wherein they shall eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they shall eat the flesh in that night, roast with fire, and unleavened bread; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' with bitter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: herbs
  - type: text
    text: ' they shall eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eat not of it raw, nor sodden at all with water, but roast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' fire; his head with his legs, and with the purtenance thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And ye shall let nothing of it remain until the morning; and that which remaineth of it until the morning ye shall burn with fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And thus shall ye eat it; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' your loins girded, your shoes on your feet, and your staff in your hand; and ye shall eat it in haste: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For I will pass through the land of Egypt this night, and will smite all the firstborn in the land of Egypt, both man and beast; and against all the gods of Egypt I will execute judgment: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the blood shall be to you for a token upon the houses where ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'are:'
  - type: text
    text: ' and when I see the blood, I will pass over you, and the plague shall not be upon you to destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ', when I smite the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And this day shall be unto you for a memorial; and ye shall keep it a feast to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' throughout your generations; ye shall keep it a feast by an ordinance for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Seven days shall ye eat unleavened bread; even the first day ye shall put away leaven out of your houses: for whosoever eateth leavened bread from the first day until the seventh day, that soul shall be cut off from Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And in the first day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' an holy convocation, and in the seventh day there shall be an holy convocation to you; no manner of work shall be done in them, save '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which every man must eat, that only may be done of you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And ye shall observe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the feast of
  - type: text
    text: ' unleavened bread; for in this selfsame day have I brought your armies out of the land of Egypt: therefore shall ye observe this day in your generations by an ordinance for ever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: month
  - type: text
    text: ', on the fourteenth day of the month at even, ye shall eat unleavened bread, until the one and twentieth day of the month at even. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Seven days shall there be no leaven found in your houses: for whosoever eateth that which is leavened, even that soul shall be cut off from the congregation of Israel, whether he be a stranger, or born in the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ye shall eat nothing leavened; in all your habitations shall ye eat unleavened bread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Moses called for all the elders of Israel, and said unto them, Draw out and take you a lamb according to your families, and kill the passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And ye shall take a bunch of hyssop, and dip '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the blood that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the bason, and strike the lintel and the two side posts with the blood that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the bason; and none of you shall go out at the door of his house until the morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will pass through to smite the Egyptians; and when he seeth the blood upon the lintel, and on the two side posts, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will pass over the door, and will not suffer the destroyer to come in unto your houses to smite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And ye shall observe this thing for an ordinance to thee and to thy sons for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it shall come to pass, when ye be come to the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will give you, according as he hath promised, that ye shall keep this service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And it shall come to pass, when your children shall say unto you, What mean ye by this service? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'That ye shall say, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the sacrifice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s passover, who passed over the houses of the children of Israel in Egypt, when he smote the Egyptians, and delivered our houses. And the people bowed the head and worshipped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the children of Israel went away, and did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had commanded Moses and Aaron, so did they.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And it came to pass, that at midnight the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' smote all the firstborn in the land of Egypt, from the firstborn of Pharaoh that sat on his throne unto the firstborn of the captive that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the dungeon; and all the firstborn of cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Pharaoh rose up in the night, he, and all his servants, and all the Egyptians; and there was a great cry in Egypt; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' not a house where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' not one dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he called for Moses and Aaron by night, and said, Rise up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' get you forth from among my people, both ye and the children of Israel; and go, serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as ye have said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Also take your flocks and your herds, as ye have said, and be gone; and bless me also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the Egyptians were urgent upon the people, that they might send them out of the land in haste; for they said, We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' all dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the people took their dough before it was leavened, their kneadingtroughs being bound up in their clothes upon their shoulders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the children of Israel did according to the word of Moses; and they borrowed of the Egyptians jewels of silver, and jewels of gold, and raiment: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave the people favour in the sight of the Egyptians, so that they lent unto them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: such things as they required
  - type: text
    text: . And they spoiled the Egyptians.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And the children of Israel journeyed from Rameses to Succoth, about six hundred thousand on foot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' men, beside children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And a mixed multitude went up also with them; and flocks, and herds, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' very much cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And they baked unleavened cakes of the dough which they brought forth out of Egypt, for it was not leavened; because they were thrust out of Egypt, and could not tarry, neither had they prepared for themselves any victual.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Now the sojourning of the children of Israel, who dwelt in Egypt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' four hundred and thirty years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And it came to pass at the end of the four hundred and thirty years, even the selfsame day it came to pass, that all the hosts of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' went out from the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a night to be much observed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for bringing them out from the land of Egypt: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that night of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to be observed of all the children of Israel in their generations.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ordinance of the Passover
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses and Aaron, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the ordinance of the passover: there shall no stranger eat thereof: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'but every man''s servant that is bought for money, when thou hast circumcised him, then shall he eat thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'A foreigner and an hired servant shall not eat thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'In one house shall it be eaten; thou shalt not carry forth ought of the flesh abroad out of the house; neither shall ye break a bone thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'All the congregation of Israel shall keep it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And when a stranger shall sojourn with thee, and will keep the passover to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', let all his males be circumcised, and then let him come near and keep it; and he shall be as one that is born in the land: for no uncircumcised person shall eat thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'One law shall be to him that is homeborn, and unto the stranger that sojourneth among you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Thus did all the children of Israel; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses and Aaron, so did they. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And it came to pass the selfsame day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' did bring the children of Israel out of the land of Egypt by their armies.'
