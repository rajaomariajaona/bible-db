document_id: PRO.13,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'A wise son '
  - type: text
    content: heareth
  - type: text
    content: ' his father''s instruction:'
  - type: text
    content: But a scorner heareth not rebuke.
  '10':
  - type: text
    content: 'Only by pride cometh contention:'
  - type: text
    content: 'But with the well advised '
  - type: text
    content: is
  - type: text
    content: ' wisdom.'
  '11':
  - type: text
    content: 'Wealth '
  - type: text
    content: gotten
  - type: text
    content: ' by vanity shall be diminished:'
  - type: text
    content: But he that gathereth by labour shall increase.
  '12':
  - type: text
    content: 'Hope deferred maketh the heart sick:'
  - type: text
    content: 'But '
  - type: text
    content: when
  - type: text
    content: ' the desire cometh, '
  - type: text
    content: it is
  - type: text
    content: ' a tree of life.'
  '13':
  - type: text
    content: 'Whoso despiseth the word shall be destroyed:'
  - type: text
    content: But he that feareth the commandment shall be rewarded.
  '14':
  - type: text
    content: 'The law of the wise '
  - type: text
    content: is
  - type: text
    content: ' a fountain of life,'
  - type: text
    content: To depart from the snares of death.
  '15':
  - type: text
    content: 'Good understanding giveth favour:'
  - type: text
    content: 'But the way of transgressors '
  - type: text
    content: is
  - type: text
    content: ' hard.'
  '16':
  - type: text
    content: 'Every prudent '
  - type: text
    content: man
  - type: text
    content: ' dealeth with knowledge:'
  - type: text
    content: 'But a fool layeth open '
  - type: text
    content: his
  - type: text
    content: ' folly.'
  '17':
  - type: text
    content: 'A wicked messenger falleth into mischief:'
  - type: text
    content: 'But a faithful ambassador '
  - type: text
    content: is
  - type: text
    content: ' health.'
  '18':
  - type: text
    content: 'Poverty and shame '
  - type: text
    content: shall be to
  - type: text
    content: ' him that refuseth instruction:'
  - type: text
    content: But he that regardeth reproof shall be honoured.
  '19':
  - type: text
    content: 'The desire accomplished is sweet to the soul:'
  - type: text
    content: 'But '
  - type: text
    content: it is
  - type: text
    content: ' abomination to fools to depart from evil.'
  '2':
  - type: text
    content: 'A man shall eat good by the fruit of '
  - type: text
    content: his
  - type: text
    content: ' mouth:'
  - type: text
    content: 'But the soul of the transgressors '
  - type: text
    content: shall eat
  - type: text
    content: ' violence.'
  '20':
  - type: text
    content: 'He that walketh with wise '
  - type: text
    content: men
  - type: text
    content: ' shall be wise:'
  - type: text
    content: But a companion of fools shall be destroyed.
  '21':
  - type: text
    content: 'Evil pursueth sinners:'
  - type: text
    content: But to the righteous good shall be repaid.
  '22':
  - type: text
    content: 'A good '
  - type: text
    content: man
  - type: text
    content: ' leaveth an inheritance to his children''s children:'
  - type: text
    content: 'And the wealth of the sinner '
  - type: text
    content: is
  - type: text
    content: ' laid up for the just.'
  '23':
  - type: text
    content: 'Much food '
  - type: text
    content: is in
  - type: text
    content: ' the tillage of the poor:'
  - type: text
    content: 'But there is '
  - type: text
    content: that is
  - type: text
    content: ' destroyed for want of judgment.'
  '24':
  - type: text
    content: 'He that spareth his rod hateth his son:'
  - type: text
    content: But he that loveth him chasteneth him betimes.
  '25':
  - type: text
    content: 'The righteous eateth to the satisfying of his soul:'
  - type: text
    content: But the belly of the wicked shall want.
  '3':
  - type: text
    content: 'He that keepeth his mouth keepeth his life:'
  - type: text
    content: But
  - type: text
    content: ' he that openeth wide his lips shall have destruction.'
  '4':
  - type: text
    content: 'The soul of the sluggard desireth, and '
  - type: text
    content: hath
  - type: text
    content: ' nothing:'
  - type: text
    content: But the soul of the diligent shall be made fat.
  '5':
  - type: text
    content: 'A righteous '
  - type: text
    content: man
  - type: text
    content: ' hateth lying:'
  - type: text
    content: 'But a wicked '
  - type: text
    content: man
  - type: text
    content: ' is loathsome, and cometh to shame.'
  '6':
  - type: text
    content: 'Righteousness keepeth '
  - type: text
    content: him that is
  - type: text
    content: ' upright in the way:'
  - type: text
    content: But wickedness overthroweth the sinner.
  '7':
  - type: text
    content: 'There is that maketh himself rich, yet '
  - type: text
    content: hath
  - type: text
    content: ' nothing:'
  - type: text
    content: There is
  - type: text
    content: ' that maketh himself poor, yet '
  - type: text
    content: hath
  - type: text
    content: ' great riches.'
  '8':
  - type: text
    content: 'The ransom of a man''s life '
  - type: text
    content: are
  - type: text
    content: ' his riches:'
  - type: text
    content: But the poor heareth not rebuke.
  '9':
  - type: text
    content: 'The light of the righteous rejoiceth:'
  - type: text
    content: But the lamp of the wicked shall be put out.
