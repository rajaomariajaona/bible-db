document_id: PRO.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A wise son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: heareth
    - type: text
      text: ' his father''s instruction:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a scorner heareth not rebuke.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only by pride cometh contention:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But with the well advised '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wisdom.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wealth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: gotten
    - type: text
      text: ' by vanity shall be diminished:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that gathereth by labour shall increase.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hope deferred maketh the heart sick:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' the desire cometh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a tree of life.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoso despiseth the word shall be destroyed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that feareth the commandment shall be rewarded.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The law of the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fountain of life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To depart from the snares of death.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Good understanding giveth favour:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the way of transgressors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' hard.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' dealeth with knowledge:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a fool layeth open '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' folly.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A wicked messenger falleth into mischief:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a faithful ambassador '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' health.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Poverty and shame '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be to
    - type: text
      text: ' him that refuseth instruction:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that regardeth reproof shall be honoured.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The desire accomplished is sweet to the soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' abomination to fools to depart from evil.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A man shall eat good by the fruit of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mouth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the soul of the transgressors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall eat
    - type: text
      text: ' violence.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that walketh with wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall be wise:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a companion of fools shall be destroyed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Evil pursueth sinners:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But to the righteous good shall be repaid.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' leaveth an inheritance to his children''s children:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the wealth of the sinner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' laid up for the just.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Much food '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is in
    - type: text
      text: ' the tillage of the poor:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But there is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' destroyed for want of judgment.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that spareth his rod hateth his son:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that loveth him chasteneth him betimes.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The righteous eateth to the satisfying of his soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the belly of the wicked shall want.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that keepeth his mouth keepeth his life:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' he that openeth wide his lips shall have destruction.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The soul of the sluggard desireth, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' nothing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the soul of the diligent shall be made fat.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' hateth lying:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' is loathsome, and cometh to shame.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Righteousness keepeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that is
    - type: text
      text: ' upright in the way:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But wickedness overthroweth the sinner.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is that maketh himself rich, yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' nothing:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' that maketh himself poor, yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' great riches.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The ransom of a man''s life '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' his riches:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the poor heareth not rebuke.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The light of the righteous rejoiceth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the lamp of the wicked shall be put out.
