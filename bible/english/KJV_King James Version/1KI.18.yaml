    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass '
    - type: usfm
      marker: add
      children:
      - type: text
        text: after
    - type: text
      text: ' many days, that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to Elijah in the third year, saying, Go, shew thyself unto Ahab; and I will send rain upon the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God liveth, there is no nation or kingdom, whither my lord hath not sent to seek thee: and when they said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: '; he took an oath of the kingdom and nation, that they found thee not. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now thou sayest, Go, tell thy lord, Behold, Elijah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is here
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as soon as
    - type: text
      text: ' I am gone from thee, that the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall carry thee whither I know not; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' when I come and tell Ahab, and he cannot find thee, he shall slay me: but I thy servant fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' from my youth. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Was it not told my lord what I did when Jezebel slew the prophets of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', how I hid an hundred men of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s prophets by fifty in a cave, and fed them with bread and water? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now thou sayest, Go, tell thy lord, Behold, Elijah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'is here:'
    - type: text
      text: ' and he shall slay me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts liveth, before whom I stand, I will surely shew myself unto him to day.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Obadiah went to meet Ahab, and told him: and Ahab went to meet Elijah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Ahab saw Elijah, that Ahab said unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou he that troubleth Israel? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered, I have not troubled Israel; but thou, and thy father''s house, in that ye have forsaken the commandments of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and thou hast followed Baalim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore send, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' gather to me all Israel unto mount Carmel, and the prophets of Baal four hundred and fifty, and the prophets of the groves four hundred, which eat at Jezebel''s table.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Mount Carmel
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah went to shew himself unto Ahab. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a sore famine in Samaria. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ahab sent unto all the children of Israel, and gathered the prophets together unto mount Carmel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah came unto all the people, and said, How long halt ye between two opinions? if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' God, follow him: but if Baal, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' follow him. And the people answered him not a word. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Elijah unto the people, I, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' I only, remain a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; but Baal''s prophets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' four hundred and fifty men. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let them therefore give us two bullocks; and let them choose one bullock for themselves, and cut it in pieces, and lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on wood, and put no fire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'under:'
    - type: text
      text: ' and I will dress the other bullock, and lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on wood, and put no fire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'under:'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and call ye on the name of your gods, and I will call on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and the God that answereth by fire, let him be God. And all the people answered and said, It is well spoken.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah said unto the prophets of Baal, Choose you one bullock for yourselves, and dress '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' first; for ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' many; and call on the name of your gods, but put no fire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: under
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took the bullock which was given them, and they dressed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and called on the name of Baal from morning even until noon, saying, O Baal, hear us. But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no voice, nor any that answered. And they leaped upon the altar which was made. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at noon, that Elijah mocked them, and said, Cry aloud: for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a god; either he is talking, or he is pursuing, or he is in a journey, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' peradventure he sleepeth, and must be awaked. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they cried aloud, and cut themselves after their manner with knives and lancets, till the blood gushed out upon them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when midday was past, and they prophesied until the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: time
    - type: text
      text: ' of the offering of the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: evening
    - type: text
      text: ' sacrifice, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' neither voice, nor any to answer, nor any that regarded.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahab called Obadiah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the governor of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' house. (Now Obadiah feared the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' greatly: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah said unto all the people, Come near unto me. And all the people came near unto him. And he repaired the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' broken down. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah took twelve stones, according to the number of the tribes of the sons of Jacob, unto whom the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came, saying, Israel shall be thy name: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with the stones he built an altar in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and he made a trench about the altar, as great as would contain two measures of seed. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he put the wood in order, and cut the bullock in pieces, and laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' on the wood, and said, Fill four barrels with water, and pour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on the burnt sacrifice, and on the wood. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' the second time. And they did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' the second time. And he said, Do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' the third time. And they did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' the third time. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the water ran round about the altar; and he filled the trench also with water. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the time of
    - type: text
      text: ' the offering of the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: evening
    - type: text
      text: ' sacrifice, that Elijah the prophet came near, and said, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Abraham, Isaac, and of Israel, let it be known this day that thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' God in Israel, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy servant, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I have done all these things at thy word. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hear me, that this people may know that thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast turned their heart back again. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the fire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' fell, and consumed the burnt sacrifice, and the wood, and the stones, and the dust, and licked up the water that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the trench. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when all the people saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they fell on their faces: and they said, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the God; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', when Jezebel cut off the prophets of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that Obadiah took an hundred prophets, and hid them by fifty in a cave, and fed them with bread and water.) '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah said unto them, Take the prophets of Baal; let not one of them escape. And they took them: and Elijah brought them down to the brook Kishon, and slew them there.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah said unto Ahab, Get thee up, eat and drink; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a sound of abundance of rain. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ahab went up to eat and to drink. And Elijah went up to the top of Carmel; and he cast himself down upon the earth, and put his face between his knees, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to his servant, Go up now, look toward the sea. And he went up, and looked, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' nothing. And he said, Go again seven times. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the seventh time, that he said, Behold, there ariseth a little cloud out of the sea, like a man''s hand. And he said, Go up, say unto Ahab, Prepare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy chariot
    - type: text
      text: ', and get thee down, that the rain stop thee not. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the mean while, that the heaven was black with clouds and wind, and there was a great rain. And Ahab rode, and went to Jezreel. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was on Elijah; and he girded up his loins, and ran before Ahab to the entrance of Jezreel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahab said unto Obadiah, Go into the land, unto all fountains of water, and unto all brooks: peradventure we may find grass to save the horses and mules alive, that we lose not all the beasts. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they divided the land between them to pass throughout it: Ahab went one way by himself, and Obadiah went another way by himself.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as Obadiah was in the way, behold, Elijah met him: and he knew him, and fell on his face, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou that my lord Elijah? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered him, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'am:'
    - type: text
      text: ' go, tell thy lord, Behold, Elijah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is here
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, What have I sinned, that thou wouldest deliver thy servant into the hand of Ahab, to slay me? '
