document_id: 2KI.14,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Amaziah
  - type: text
    content: 'In the second year of Joash son of Jehoahaz king of Israel reigned Amaziah the son of Joash king of Judah. '
  '10':
  - type: text
    content: 'Thou hast indeed smitten Edom, and thine heart hath lifted thee up: glory '
  - type: text
    content: of this
  - type: text
    content: ', and tarry at home: for why shouldest thou meddle to '
  - type: text
    content: thy
  - type: text
    content: ' hurt, that thou shouldest fall, '
  - type: text
    content: even
  - type: text
    content: ' thou, and Judah with thee?'
  '11':
  - type: text
    content: 'But Amaziah would not hear. Therefore Jehoash king of Israel went up; and he and Amaziah king of Judah looked one another in the face at Beth-shemesh, which '
  - type: text
    content: belongeth
  - type: text
    content: ' to Judah. '
  '12':
  - type: text
    content: 'And Judah was put to the worse before Israel; and they fled every man to their tents. '
  '13':
  - type: text
    content: 'And Jehoash king of Israel took Amaziah king of Judah, the son of Jehoash the son of Ahaziah, at Beth-shemesh, and came to Jerusalem, and brake down the wall of Jerusalem from the gate of Ephraim unto the corner gate, four hundred cubits. '
  '14':
  - type: text
    content: 'And he took all the gold and silver, and all the vessels that were found in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and in the treasures of the king''s house, and hostages, and returned to Samaria.'
  '15':
  - type: text
    content: 'Now the rest of the acts of Jehoash which he did, and his might, and how he fought with Amaziah king of Judah, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '16':
  - type: text
    content: And Jehoash slept with his fathers, and was buried in Samaria with the kings of Israel; and Jeroboam his son reigned in his stead.
  - type: heading
    content: 'Azariah (Uzziah: II Chron. 26.1)'
  '17':
  - type: text
    content: 'And Amaziah the son of Joash king of Judah lived after the death of Jehoash son of Jehoahaz king of Israel fifteen years. '
  '18':
  - type: text
    content: 'And the rest of the acts of Amaziah, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '19':
  - type: text
    content: 'Now they made a conspiracy against him in Jerusalem: and he fled to Lachish; but they sent after him to Lachish, and slew him there. '
  '2':
  - type: text
    content: 'He was twenty and five years old when he began to reign, and reigned twenty and nine years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Jehoaddan of Jerusalem. '
  '20':
  - type: text
    content: 'And they brought him on horses: and he was buried at Jerusalem with his fathers in the city of David. '
  '21':
  - type: text
    content: 'And all the people of Judah took Azariah, which '
  - type: text
    content: was
  - type: text
    content: ' sixteen years old, and made him king instead of his father Amaziah. '
  '22':
  - type: text
    content: He built Elath, and restored it to Judah, after that the king slept with his fathers.
  - type: heading
    content: Jeroboam II
  '23':
  - type: text
    content: 'In the fifteenth year of Amaziah the son of Joash king of Judah Jeroboam the son of Joash king of Israel began to reign in Samaria, '
  - type: text
    content: and reigned
  - type: text
    content: ' forty and one years. '
  '24':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ': he departed not from all the sins of Jeroboam the son of Nebat, who made Israel to sin. '
  '25':
  - type: text
    content: 'He restored the coast of Israel from the entering of Hamath unto the sea of the plain, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, which he spake by the hand of his servant Jonah, the son of Amittai, the prophet, which '
  - type: text
    content: was
  - type: text
    content: ' of Gath-hepher. '
  '26':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' saw the affliction of Israel, '
  - type: text
    content: that it was
  - type: text
    content: ' very bitter: for '
  - type: text
    content: there was
  - type: text
    content: ' not any shut up, nor any left, nor any helper for Israel. '
  '27':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said not that he would blot out the name of Israel from under heaven: but he saved them by the hand of Jeroboam the son of Joash.'
  - type: heading
    content: Zachariah
  '28':
  - type: text
    content: 'Now the rest of the acts of Jeroboam, and all that he did, and his might, how he warred, and how he recovered Damascus, and Hamath, '
  - type: text
    content: which belonged
  - type: text
    content: ' to Judah, for Israel, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '29':
  - type: text
    content: 'And Jeroboam slept with his fathers, '
  - type: text
    content: even
  - type: text
    content: ' with the kings of Israel; and Zachariah his son reigned in his stead.'
  '3':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', yet not like David his father: he did according to all things as Joash his father did. '
  '4':
  - type: text
    content: 'Howbeit the high places were not taken away: as yet the people did sacrifice and burnt incense on the high places.'
  '5':
  - type: text
    content: 'And it came to pass, as soon as the kingdom was confirmed in his hand, that he slew his servants which had slain the king his father. '
  '6':
  - type: text
    content: 'But the children of the murderers he slew not: according unto that which is written in the book of the law of Moses, wherein the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded, saying, The fathers shall not be put to death for the children, nor the children be put to death for the fathers; but every man shall be put to death for his own sin. '
  '7':
  - type: text
    content: He slew of Edom in the valley of salt ten thousand, and took Selah by war, and called the name of it Joktheel unto this day.
  '8':
  - type: text
    content: 'Then Amaziah sent messengers to Jehoash, the son of Jehoahaz son of Jehu, king of Israel, saying, Come, let us look one another in the face. '
  '9':
  - type: text
    content: 'And Jehoash the king of Israel sent to Amaziah king of Judah, saying, The thistle that '
  - type: text
    content: was
  - type: text
    content: ' in Lebanon sent to the cedar that '
  - type: text
    content: was
  - type: text
    content: ' in Lebanon, saying, Give thy daughter to my son to wife: and there passed by a wild beast that '
  - type: text
    content: was
  - type: text
    content: ' in Lebanon, and trode down the thistle. '
