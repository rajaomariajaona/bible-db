verses:
  '1':
  - type: heading
    content: Iconium
  - type: text
    content: 'And it came to pass in Iconium, that they went both together into the synagogue of the Jews, and so spake, that a great multitude both of the Jews and also of the Greeks believed. '
  '10':
  - type: text
    content: said with a loud voice, Stand upright on thy feet. And he leaped and walked.
  '11':
  - type: text
    content: 'And when the people saw what Paul had done, they lifted up their voices, saying in the speech of Lycaonia, The gods are come down to us in the likeness of men. '
  '12':
  - type: text
    content: 'And they called Barnabas, Jupiter; and Paul, Mercurius, because he was the chief speaker. '
  '13':
  - type: text
    content: 'Then the priest of Jupiter, which was before their city, brought oxen and garlands unto the gates, and would have done sacrifice with the people. '
  '14':
  - type: text
    content: Which
  - type: text
    content: ' when the apostles, Barnabas and Paul, heard '
  - type: text
    content: of
  - type: text
    content: ', they rent their clothes, and ran in among the people, crying out, '
  '15':
  - type: text
    content: 'and saying, Sirs, why do ye these things? We also are men of like passions with you, and preach unto you that ye should turn from these vanities unto the living God, which made heaven, and earth, and the sea, and all things that are therein: '
  '16':
  - type: text
    content: 'who in times past suffered all nations to walk in their own ways. '
  '17':
  - type: text
    content: 'Nevertheless he left not himself without witness, in that he did good, and gave us rain from heaven, and fruitful seasons, filling our hearts with food and gladness. '
  '18':
  - type: text
    content: And with these sayings scarce restrained they the people, that they had not done sacrifice unto them.
  - type: heading
    content: Derbe
  '19':
  - type: text
    content: 'And there came thither '
  - type: text
    content: certain
  - type: text
    content: ' Jews from Antioch and Iconium, who persuaded the people, and, having stoned Paul, drew '
  - type: text
    content: him
  - type: text
    content: ' out of the city, supposing he had been dead. '
  '2':
  - type: text
    content: 'But the unbelieving Jews stirred up the Gentiles, and made their minds evil affected against the brethren. '
  '20':
  - type: text
    content: 'Howbeit, as the disciples stood round about him, he rose up, and came into the city: and the next day he departed with Barnabas to Derbe.'
  '21':
  - type: text
    content: 'And when they had preached the gospel to that city, and had taught many, they returned again to Lystra, and '
  - type: text
    content: to
  - type: text
    content: ' Iconium, and Antioch, '
  '22':
  - type: text
    content: 'confirming the souls of the disciples, '
  - type: text
    content: and
  - type: text
    content: ' exhorting them to continue in the faith, and that we must through much tribulation enter into the kingdom of God. '
  '23':
  - type: text
    content: And when they had ordained them elders in every church, and had prayed with fasting, they commended them to the Lord, on whom they believed.
  - type: heading
    content: Antioch
  '24':
  - type: text
    content: 'And after they had passed throughout Pisidia, they came to Pamphylia. '
  '25':
  - type: text
    content: 'And when they had preached the word in Perga, they went down into Attalia: '
  '26':
  - type: text
    content: 'and thence sailed to Antioch, from whence they had been recommended to the grace of God for the work which they fulfilled. '
  '27':
  - type: text
    content: 'And when they were come, and had gathered the church together, they rehearsed all that God had done with them, and how he had opened the door of faith unto the Gentiles. '
  '28':
  - type: text
    content: And there they abode long time with the disciples.
  '3':
  - type: text
    content: 'Long time therefore abode they speaking boldly in the Lord, which gave testimony unto the word of his grace, and granted signs and wonders to be done by their hands. '
  '4':
  - type: text
    content: 'But the multitude of the city was divided: and part held with the Jews, and part with the apostles. '
  '5':
  - type: text
    content: 'And when there was an assault made both of the Gentiles, and also of the Jews with their rulers, to use '
  - type: text
    content: them
  - type: text
    content: ' despitefully, and to stone them, '
  '6':
  - type: text
    content: 'they were ware of '
  - type: text
    content: it
  - type: text
    content: ', and fled unto Lystra and Derbe, cities of Lycaonia, and unto the region that lieth round about: '
  '7':
  - type: text
    content: and there they preached the gospel.
  - type: heading
    content: Lystra
  '8':
  - type: text
    content: 'And there sat a certain man at Lystra, impotent in his feet, being a cripple from his mother''s womb, who never had walked: '
  '9':
  - type: text
    content: 'the same heard Paul speak: who stedfastly beholding him, and perceiving that he had faith to be healed, '
