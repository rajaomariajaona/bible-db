document_id: ACT.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Iconium
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass in Iconium, that they went both together into the synagogue of the Jews, and so spake, that a great multitude both of the Jews and also of the Greeks believed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But the unbelieving Jews stirred up the Gentiles, and made their minds evil affected against the brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Long time therefore abode they speaking boldly in the Lord, which gave testimony unto the word of his grace, and granted signs and wonders to be done by their hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the multitude of the city was divided: and part held with the Jews, and part with the apostles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when there was an assault made both of the Gentiles, and also of the Jews with their rulers, to use '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' despitefully, and to stone them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'they were ware of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and fled unto Lystra and Derbe, cities of Lycaonia, and unto the region that lieth round about: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and there they preached the gospel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lystra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And there sat a certain man at Lystra, impotent in his feet, being a cripple from his mother''s womb, who never had walked: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'the same heard Paul speak: who stedfastly beholding him, and perceiving that he had faith to be healed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: said with a loud voice, Stand upright on thy feet. And he leaped and walked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when the people saw what Paul had done, they lifted up their voices, saying in the speech of Lycaonia, The gods are come down to us in the likeness of men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they called Barnabas, Jupiter; and Paul, Mercurius, because he was the chief speaker. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the priest of Jupiter, which was before their city, brought oxen and garlands unto the gates, and would have done sacrifice with the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' when the apostles, Barnabas and Paul, heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ', they rent their clothes, and ran in among the people, crying out, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and saying, Sirs, why do ye these things? We also are men of like passions with you, and preach unto you that ye should turn from these vanities unto the living God, which made heaven, and earth, and the sea, and all things that are therein: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'who in times past suffered all nations to walk in their own ways. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nevertheless he left not himself without witness, in that he did good, and gave us rain from heaven, and fruitful seasons, filling our hearts with food and gladness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And with these sayings scarce restrained they the people, that they had not done sacrifice unto them.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Derbe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And there came thither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' Jews from Antioch and Iconium, who persuaded the people, and, having stoned Paul, drew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' out of the city, supposing he had been dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Howbeit, as the disciples stood round about him, he rose up, and came into the city: and the next day he departed with Barnabas to Derbe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when they had preached the gospel to that city, and had taught many, they returned again to Lystra, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' Iconium, and Antioch, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'confirming the souls of the disciples, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' exhorting them to continue in the faith, and that we must through much tribulation enter into the kingdom of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And when they had ordained them elders in every church, and had prayed with fasting, they commended them to the Lord, on whom they believed.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Antioch
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And after they had passed throughout Pisidia, they came to Pamphylia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when they had preached the word in Perga, they went down into Attalia: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and thence sailed to Antioch, from whence they had been recommended to the grace of God for the work which they fulfilled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when they were come, and had gathered the church together, they rehearsed all that God had done with them, and how he had opened the door of faith unto the Gentiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And there they abode long time with the disciples.
