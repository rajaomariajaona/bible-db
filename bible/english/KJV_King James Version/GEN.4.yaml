document_id: GEN.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cain and Abel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Adam knew Eve his wife; and she conceived, and bare Cain, and said, I have gotten a man from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And she again bare his brother Abel. And Abel was a keeper of sheep, but Cain was a tiller of the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And in process of time it came to pass, that Cain brought of the fruit of the ground an offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Abel, he also brought of the firstlings of his flock and of the fat thereof. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had respect unto Abel and to his offering: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but unto Cain and to his offering he had not respect. And Cain was very wroth, and his countenance fell. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Cain, Why art thou wroth? and why is thy countenance fallen? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If thou doest well, shalt thou not be accepted? and if thou doest not well, sin lieth at the door. And unto thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' his desire, and thou shalt rule over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Cain talked with Abel his brother: and it came to pass, when they were in the field, that Cain rose up against Abel his brother, and slew him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Cain, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Abel thy brother? And he said, I know not: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' I my brother''s keeper? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said, What hast thou done? the voice of thy brother''s blood crieth unto me from the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou cursed from the earth, which hath opened her mouth to receive thy brother''s blood from thy hand; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'when thou tillest the ground, it shall not henceforth yield unto thee her strength; a fugitive and a vagabond shalt thou be in the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Cain said unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', My punishment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' greater than I can bear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Behold, thou hast driven me out this day from the face of the earth; and from thy face shall I be hid; and I shall be a fugitive and a vagabond in the earth; and it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every one that findeth me shall slay me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Therefore whosoever slayeth Cain, vengeance shall be taken on him sevenfold. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' set a mark upon Cain, lest any finding him should kill him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Cain went out from the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and dwelt in the land of Nod, on the east of Eden. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Cain knew his wife; and she conceived, and bare Enoch: and he builded a city, and called the name of the city, after the name of his son, Enoch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And unto Enoch was born Irad: and Irad begat Mehujael: and Mehujael begat Methusael: and Methusael begat Lamech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Lamech took unto him two wives: the name of the one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Adah, and the name of the other Zillah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Adah bare Jabal: he was the father of such as dwell in tents, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of such as have
  - type: text
    text: ' cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And his brother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jubal: he was the father of all such as handle the harp and organ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Zillah, she also bare Tubal-cain, an instructer of every artificer in brass and iron: and the sister of Tubal-cain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Naamah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And Lamech said unto his wives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Adah and Zillah, Hear my voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ye wives of Lamech, hearken unto my speech:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have slain a man to my wounding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a young man to my hurt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: If Cain shall be avenged sevenfold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Truly Lamech seventy and sevenfold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Adam knew his wife again; and she bare a son, and called his name Seth: For God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said she
  - type: text
    text: ', hath appointed me another seed instead of Abel, whom Cain slew. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And to Seth, to him also there was born a son; and he called his name Enos: then began men to call upon the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
