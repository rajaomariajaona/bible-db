document_id: ISA.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ethiopia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe to the land shadowing with wings, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' beyond the rivers of Ethiopia: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that sendeth ambassadors by the sea, even in vessels of bulrushes upon the waters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Go, ye swift messengers, to a nation scattered and peeled, to a people terrible from their beginning hitherto; a nation meted out and trodden down, whose land the rivers have spoiled! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All ye inhabitants of the world, and dwellers on the earth, see ye, when he lifteth up an ensign on the mountains; and when he bloweth a trumpet, hear ye.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, I will take my rest, and I will consider in my dwelling place like a clear heat upon herbs, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' like a cloud of dew in the heat of harvest. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For afore the harvest, when the bud is perfect, and the sour grape is ripening in the flower, he shall both cut off the sprigs with pruning hooks, and take away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' cut down the branches. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall be left together unto the fowls of the mountains, and to the beasts of the earth: and the fowls shall summer upon them, and all the beasts of the earth shall winter upon them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that time shall the present be brought unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts of a people scattered and peeled, and from a people terrible from their beginning hitherto; a nation meted out and trodden under foot, whose land the rivers have spoiled, to the place of the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the mount Zion.'
