document_id: EZK.41,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Holy of Holies
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Afterward he brought me to the temple, and measured the posts, six cubits broad on the one side, and six cubits broad on the other side, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which was
    - type: text
      text: ' the breadth of the tabernacle. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And between the chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the wideness of twenty cubits round about the house on every side. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the doors of the side chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' toward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the place that was
    - type: text
      text: ' left, one door toward the north, and another door toward the south: and the breadth of the place that was left '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits round about.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now the building that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before the separate place at the end toward the west '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' seventy cubits broad; and the wall of the building '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits thick round about, and the length thereof ninety cubits. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So he measured the house, an hundred cubits long; and the separate place, and the building, with the walls thereof, an hundred cubits long; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: also the breadth of the face of the house, and of the separate place toward the east, an hundred cubits.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Interior of the Temple
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he measured the length of the building over against the separate place which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' behind it, and the galleries thereof on the one side and on the other side, an hundred cubits, with the inner temple, and the porches of the court; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'the door posts, and the narrow windows, and the galleries round about on their three stories, over against the door, cieled with wood round about, and from the ground up to the windows, and the windows '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' covered; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: to that above the door, even unto the inner house, and without, and by all the wall round about within and without, by measure.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' made with cherubims and palm trees, so that a palm tree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' between a cherub and a cherub; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' cherub had two faces; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'so that the face of a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' toward the palm tree on the one side, and the face of a young lion toward the palm tree on the other side: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' made through all the house round about. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the breadth of the door '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' ten cubits; and the sides of the door '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' five cubits on the one side, and five cubits on the other side: and he measured the length thereof, forty cubits: and the breadth, twenty cubits. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'From the ground unto above the door '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' cherubims and palm trees made, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: on
    - type: text
      text: ' the wall of the temple.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The posts of the temple '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' squared, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the face of the sanctuary; the appearance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the one
    - type: text
      text: ' as the appearance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the other
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The altar of wood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' three cubits high, and the length thereof two cubits; and the corners thereof, and the length thereof, and the walls thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of wood: and he said unto me, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the table that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the temple and the sanctuary had two doors. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the doors had two leaves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: apiece
    - type: text
      text: ', two turning leaves; two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: leaves
    - type: text
      text: ' for the one door, and two leaves for the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: door
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' made on them, on the doors of the temple, cherubims and palm trees, like as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' made upon the walls; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' thick planks upon the face of the porch without. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' narrow windows and palm trees on the one side and on the other side, on the sides of the porch, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon
    - type: text
      text: ' the side chambers of the house, and thick planks.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then went he inward, and measured the post of the door, two cubits; and the door, six cubits; and the breadth of the door, seven cubits. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So he measured the length thereof, twenty cubits; and the breadth, twenty cubits, before the temple: and he said unto me, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the most holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After he measured the wall of the house, six cubits; and the breadth of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' side chamber, four cubits, round about the house on every side. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the side chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' three, one over another, and thirty in order; and they entered into the wall which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of the house for the side chambers round about, that they might have hold, but they had not hold in the wall of the house. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' an enlarging, and a winding about still upward to the side chambers: for the winding about of the house went still upward round about the house: therefore the breadth of the house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was still
    - type: text
      text: ' upward, and so increased '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the lowest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: chamber
    - type: text
      text: ' to the highest by the midst. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I saw also the height of the house round about: the foundations of the side chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' a full reed of six great cubits. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The thickness of the wall, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' for the side chamber without, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' left '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the place of the side chambers that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' within. '
