document_id: COL.4,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Masters, give unto '
  - type: text
    content: your
  - type: text
    content: ' servants that which is just and equal; knowing that ye also have a Master in heaven.'
  '10':
  - type: text
    content: 'Aristarchus my fellowprisoner saluteth you, and Marcus, sister''s son to Barnabas, (touching whom ye received commandments: if he come unto you, receive him;) '
  '11':
  - type: text
    content: 'and Jesus, which is called Justus, who are of the circumcision. These only '
  - type: text
    content: are my
  - type: text
    content: ' fellowworkers unto the kingdom of God, which have been a comfort unto me. '
  '12':
  - type: text
    content: 'Epaphras, who is '
  - type: text
    content: one
  - type: text
    content: ' of you, a servant of Christ, saluteth you, always labouring fervently for you in prayers, that ye may stand perfect and complete in all the will of God. '
  '13':
  - type: text
    content: 'For I bear him record, that he hath a great zeal for you, and them '
  - type: text
    content: that are
  - type: text
    content: ' in Laodicea, and them in Hierapolis. '
  '14':
  - type: text
    content: 'Luke, the beloved physician, and Demas, greet you. '
  '15':
  - type: text
    content: 'Salute the brethren which are in Laodicea, and Nymphas, and the church which is in his house. '
  '16':
  - type: text
    content: 'And when this epistle is read among you, cause that it be read also in the church of the Laodiceans; and that ye likewise read the '
  - type: text
    content: epistle
  - type: text
    content: ' from Laodicea. '
  '17':
  - type: text
    content: And say to Archippus, Take heed to the ministry which thou hast received in the Lord, that thou fulfil it.
  '18':
  - type: text
    content: 'The salutation by the hand of me Paul. Remember my bonds. Grace '
  - type: text
    content: be
  - type: text
    content: ' with you. Amen.'
  - type: text
    content: Written from Rome to the Colossians by Tychicus and Onesimus.
  '2':
  - type: text
    content: 'Continue in prayer, and watch in the same with thanksgiving; '
  '3':
  - type: text
    content: 'withal praying also for us, that God would open unto us a door of utterance, to speak the mystery of Christ, for which I am also in bonds: '
  '4':
  - type: text
    content: 'that I may make it manifest, as I ought to speak. '
  '5':
  - type: text
    content: 'Walk in wisdom toward them that are without, redeeming the time. '
  '6':
  - type: text
    content: 'Let your speech '
  - type: text
    content: be
  - type: text
    content: ' alway with grace, seasoned with salt, that ye may know how ye ought to answer every man.'
  '7':
  - type: text
    content: 'All my state shall Tychicus declare unto you, '
  - type: text
    content: who is
  - type: text
    content: ' a beloved brother, and a faithful minister and fellowservant in the Lord: '
  '8':
  - type: text
    content: 'whom I have sent unto you for the same purpose, that he might know your estate, and comfort your hearts; '
  '9':
  - type: text
    content: 'with Onesimus, a faithful and beloved brother, who is '
  - type: text
    content: one
  - type: text
    content: ' of you. They shall make known unto you all things which '
  - type: text
    content: are done
  - type: text
    content: ' here.'
