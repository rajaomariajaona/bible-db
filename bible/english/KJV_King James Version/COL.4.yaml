document_id: COL.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Masters, give unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' servants that which is just and equal; knowing that ye also have a Master in heaven.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aristarchus my fellowprisoner saluteth you, and Marcus, sister''s son to Barnabas, (touching whom ye received commandments: if he come unto you, receive him;) '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jesus, which is called Justus, who are of the circumcision. These only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are my
    - type: text
      text: ' fellowworkers unto the kingdom of God, which have been a comfort unto me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Epaphras, who is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of you, a servant of Christ, saluteth you, always labouring fervently for you in prayers, that ye may stand perfect and complete in all the will of God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I bear him record, that he hath a great zeal for you, and them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' in Laodicea, and them in Hierapolis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Luke, the beloved physician, and Demas, greet you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salute the brethren which are in Laodicea, and Nymphas, and the church which is in his house. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when this epistle is read among you, cause that it be read also in the church of the Laodiceans; and that ye likewise read the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: epistle
    - type: text
      text: ' from Laodicea. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And say to Archippus, Take heed to the ministry which thou hast received in the Lord, that thou fulfil it.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The salutation by the hand of me Paul. Remember my bonds. Grace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. Amen.'
  - type: usfm
    marker: iex
    children:
    - type: text
      text: Written from Rome to the Colossians by Tychicus and Onesimus.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Continue in prayer, and watch in the same with thanksgiving; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'withal praying also for us, that God would open unto us a door of utterance, to speak the mystery of Christ, for which I am also in bonds: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that I may make it manifest, as I ought to speak. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Walk in wisdom toward them that are without, redeeming the time. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let your speech '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' alway with grace, seasoned with salt, that ye may know how ye ought to answer every man.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All my state shall Tychicus declare unto you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who is
    - type: text
      text: ' a beloved brother, and a faithful minister and fellowservant in the Lord: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whom I have sent unto you for the same purpose, that he might know your estate, and comfort your hearts; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with Onesimus, a faithful and beloved brother, who is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of you. They shall make known unto you all things which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are done
    - type: text
      text: ' here.'
