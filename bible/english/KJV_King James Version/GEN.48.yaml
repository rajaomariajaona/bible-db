document_id: GEN.48
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass after these things, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' told Joseph, Behold, thy father '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sick: and he took with him his two sons, Manasseh and Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' told Jacob, and said, Behold, thy son Joseph cometh unto thee: and Israel strengthened himself, and sat upon the bed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Jacob said unto Joseph, God Almighty appeared unto me at Luz in the land of Canaan, and blessed me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and said unto me, Behold, I will make thee fruitful, and multiply thee, and I will make of thee a multitude of people; and will give this land to thy seed after thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an everlasting possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And now thy two sons, Ephraim and Manasseh, which were born unto thee in the land of Egypt before I came unto thee into Egypt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' mine; as Reuben and Simeon, they shall be mine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And thy issue, which thou begettest after them, shall be thine, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' shall be called after the name of their brethren in their inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And as for me, when I came from Padan, Rachel died by me in the land of Canaan in the way, when yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' but a little way to come unto Ephrath: and I buried her there in the way of Ephrath; the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Beth-lehem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Israel beheld Joseph''s sons, and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Joseph said unto his father, They '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my sons, whom God hath given me in this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: '. And he said, Bring them, I pray thee, unto me, and I will bless them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now the eyes of Israel were dim for age, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so that
  - type: text
    text: ' he could not see. And he brought them near unto him; and he kissed them, and embraced them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Israel said unto Joseph, I had not thought to see thy face: and, lo, God hath shewed me also thy seed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Joseph brought them out from between his knees, and he bowed himself with his face to the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Joseph took them both, Ephraim in his right hand toward Israel''s left hand, and Manasseh in his left hand toward Israel''s right hand, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' near unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Israel stretched out his right hand, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon Ephraim''s head, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the younger, and his left hand upon Manasseh''s head, guiding his hands wittingly; for Manasseh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the firstborn. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he blessed Joseph, and said, God, before whom my fathers Abraham and Isaac did walk, the God which fed me all my life long unto this day, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the Angel which redeemed me from all evil, bless the lads; and let my name be named on them, and the name of my fathers Abraham and Isaac; and let them grow into a multitude in the midst of the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when Joseph saw that his father laid his right hand upon the head of Ephraim, it displeased him: and he held up his father''s hand, to remove it from Ephraim''s head unto Manasseh''s head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Joseph said unto his father, Not so, my father: for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the firstborn; put thy right hand upon his head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And his father refused, and said, I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', my son, I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' he also shall become a people, and he also shall be great: but truly his younger brother shall be greater than he, and his seed shall become a multitude of nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he blessed them that day, saying, In thee shall Israel bless, saying, God make thee as Ephraim and as Manasseh: and he set Ephraim before Manasseh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Israel said unto Joseph, Behold, I die: but God shall be with you, and bring you again unto the land of your fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moreover I have given to thee one portion above thy brethren, which I took out of the hand of the Amorite with my sword and with my bow.
