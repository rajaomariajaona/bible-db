document_id: JER.49
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ammon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Concerning the Ammonites, thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Hath Israel no sons? hath he no heir? why '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' doth their king inherit Gad, and his people dwell in his cities? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Therefore, behold, the days come, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I will cause an alarm of war to be heard in Rabbah of the Ammonites; and it shall be a desolate heap, and her daughters shall be burned with fire: then shall Israel be heir unto them that were his heirs, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Howl, O Heshbon, for Ai is spoiled: cry, ye daughters of Rabbah, gird you with sackcloth; lament, and run to and fro by the hedges; for their king shall go into captivity, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' his priests and his princes together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Wherefore gloriest thou in the valleys, thy flowing valley, O backsliding daughter? that trusted in her treasures, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Who shall come unto me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Behold, I will bring a fear upon thee, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts, from all those that be about thee; and ye shall be driven out every man right forth; and none shall gather up him that wandereth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And afterward I will bring again the captivity of the children of Ammon, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Concerning Edom, thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' wisdom no more in Teman? is counsel perished from the prudent? is their wisdom vanished? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Flee ye, turn back, dwell deep, O inhabitants of Dedan; for I will bring the calamity of Esau upon him, the time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I will visit him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If grapegatherers come to thee, would they not leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' gleaning grapes? if thieves by night, they will destroy till they have enough. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But I have made Esau bare, I have uncovered his secret places, and he shall not be able to hide himself: his seed is spoiled, and his brethren, and his neighbours, and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Leave thy fatherless children, I will preserve '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' alive; and let thy widows trust in me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Behold, they whose judgment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not to drink of the cup have assuredly drunken; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall altogether go unpunished? thou shalt not go unpunished, but thou shalt surely drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I have sworn by myself, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that Bozrah shall become a desolation, a reproach, a waste, and a curse; and all the cities thereof shall be perpetual wastes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard a rumour from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and an ambassador is sent unto the heathen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Gather ye together, and come against her, and rise up to the battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For, lo, I will make thee small among the heathen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' despised among men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thy terribleness hath deceived thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the pride of thine heart, O thou that dwellest in the clefts of the rock, that holdest the height of the hill: though thou shouldest make thy nest as high as the eagle, I will bring thee down from thence, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Also Edom shall be a desolation: every one that goeth by it shall be astonished, and shall hiss at all the plagues thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As in the overthrow of Sodom and Gomorrah and the neighbour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cities
  - type: text
    text: ' thereof, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', no man shall abide there, neither shall a son of man dwell in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Behold, he shall come up like a lion from the swelling of Jordan against the habitation of the strong: but I will suddenly make him run away from her: and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a chosen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man, that
  - type: text
    text: ' I may appoint over her? for who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like me? and who will appoint me the time? and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that shepherd that will stand before me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore hear the counsel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that he hath taken against Edom; and his purposes, that he hath purposed against the inhabitants of Teman: Surely the least of the flock shall draw them out: surely he shall make their habitations desolate with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The earth is moved at the noise of their fall, at the cry the noise thereof was heard in the Red sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Behold, he shall come up and fly as the eagle, and spread his wings over Bozrah: and at that day shall the heart of the mighty men of Edom be as the heart of a woman in her pangs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Concerning Damascus. Hamath is confounded, and Arpad: for they have heard evil tidings: they are fainthearted; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' sorrow on the sea; it cannot be quiet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Damascus is waxed feeble, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' turneth herself to flee, and fear hath seized on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'her:'
  - type: text
    text: ' anguish and sorrows have taken her, as a woman in travail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'How is the city of praise not left, the city of my joy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Therefore her young men shall fall in her streets, and all the men of war shall be cut off in that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And I will kindle a fire in the wall of Damascus, and it shall consume the palaces of Ben-hadad.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Kedar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Concerning Kedar, and concerning the kingdoms of Hazor, which Nebuchadrezzar king of Babylon shall smite, thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Arise ye, go up to Kedar, and spoil the men of the east. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Their tents and their flocks shall they take away: they shall take to themselves their curtains, and all their vessels, and their camels; and they shall cry unto them, Fear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' on every side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Flee, get you far off, dwell deep, O ye inhabitants of Hazor, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ; for Nebuchadrezzar king of Babylon hath taken counsel against you, and hath conceived a purpose against you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Arise, get you up unto the wealthy nation, that dwelleth without care, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which have neither gates nor bars, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' dwell alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And their camels shall be a booty, and the multitude of their cattle a spoil: and I will scatter into all winds them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' in the utmost corners; and I will bring their calamity from all sides thereof, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Hazor shall be a dwelling for dragons, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a desolation for ever: there shall no man abide there, nor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' son of man dwell in it.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Elam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that came to Jeremiah the prophet against Elam in the beginning of the reign of Zedekiah king of Judah, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts; Behold, I will break the bow of Elam, the chief of their might. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And upon Elam will I bring the four winds from the four quarters of heaven, and will scatter them toward all those winds; and there shall be no nation whither the outcasts of Elam shall not come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'For I will cause Elam to be dismayed before their enemies, and before them that seek their life: and I will bring evil upon them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' my fierce anger, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and I will send the sword after them, till I have consumed them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and I will set my throne in Elam, and will destroy from thence the king and the princes, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But it shall come to pass in the latter days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I will bring again the captivity of Elam, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
