verses:
  '1':
  - type: heading
    content: Ammon
  - type: text
    content: 'Concerning the Ammonites, thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Hath Israel no sons? hath he no heir? why '
  - type: text
    content: then
  - type: text
    content: ' doth their king inherit Gad, and his people dwell in his cities? '
  '10':
  - type: text
    content: 'But I have made Esau bare, I have uncovered his secret places, and he shall not be able to hide himself: his seed is spoiled, and his brethren, and his neighbours, and he '
  - type: text
    content: is
  - type: text
    content: ' not. '
  '11':
  - type: text
    content: 'Leave thy fatherless children, I will preserve '
  - type: text
    content: them
  - type: text
    content: ' alive; and let thy widows trust in me.'
  '12':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, they whose judgment '
  - type: text
    content: was
  - type: text
    content: ' not to drink of the cup have assuredly drunken; and '
  - type: text
    content: art
  - type: text
    content: ' thou he '
  - type: text
    content: that
  - type: text
    content: ' shall altogether go unpunished? thou shalt not go unpunished, but thou shalt surely drink '
  - type: text
    content: of it
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'For I have sworn by myself, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that Bozrah shall become a desolation, a reproach, a waste, and a curse; and all the cities thereof shall be perpetual wastes.'
  '14':
  - type: text
    content: 'I have heard a rumour from the '
  - type: text
    content: LORD
  - type: text
    content: ', and an ambassador is sent unto the heathen, '
  - type: text
    content: saying
  - type: text
    content: ', Gather ye together, and come against her, and rise up to the battle. '
  '15':
  - type: text
    content: 'For, lo, I will make thee small among the heathen, '
  - type: text
    content: and
  - type: text
    content: ' despised among men. '
  '16':
  - type: text
    content: 'Thy terribleness hath deceived thee, '
  - type: text
    content: and
  - type: text
    content: ' the pride of thine heart, O thou that dwellest in the clefts of the rock, that holdest the height of the hill: though thou shouldest make thy nest as high as the eagle, I will bring thee down from thence, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Also Edom shall be a desolation: every one that goeth by it shall be astonished, and shall hiss at all the plagues thereof. '
  '18':
  - type: text
    content: 'As in the overthrow of Sodom and Gomorrah and the neighbour '
  - type: text
    content: cities
  - type: text
    content: ' thereof, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', no man shall abide there, neither shall a son of man dwell in it. '
  '19':
  - type: text
    content: 'Behold, he shall come up like a lion from the swelling of Jordan against the habitation of the strong: but I will suddenly make him run away from her: and who '
  - type: text
    content: is
  - type: text
    content: ' a chosen '
  - type: text
    content: man, that
  - type: text
    content: ' I may appoint over her? for who '
  - type: text
    content: is
  - type: text
    content: ' like me? and who will appoint me the time? and who '
  - type: text
    content: is
  - type: text
    content: ' that shepherd that will stand before me?'
  '2':
  - type: text
    content: 'Therefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will cause an alarm of war to be heard in Rabbah of the Ammonites; and it shall be a desolate heap, and her daughters shall be burned with fire: then shall Israel be heir unto them that were his heirs, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '20':
  - type: text
    content: 'Therefore hear the counsel of the '
  - type: text
    content: LORD
  - type: text
    content: ', that he hath taken against Edom; and his purposes, that he hath purposed against the inhabitants of Teman: Surely the least of the flock shall draw them out: surely he shall make their habitations desolate with them. '
  '21':
  - type: text
    content: 'The earth is moved at the noise of their fall, at the cry the noise thereof was heard in the Red sea. '
  '22':
  - type: text
    content: 'Behold, he shall come up and fly as the eagle, and spread his wings over Bozrah: and at that day shall the heart of the mighty men of Edom be as the heart of a woman in her pangs.'
  '23':
  - type: text
    content: 'Concerning Damascus. Hamath is confounded, and Arpad: for they have heard evil tidings: they are fainthearted; '
  - type: text
    content: there is
  - type: text
    content: ' sorrow on the sea; it cannot be quiet. '
  '24':
  - type: text
    content: 'Damascus is waxed feeble, '
  - type: text
    content: and
  - type: text
    content: ' turneth herself to flee, and fear hath seized on '
  - type: text
    content: 'her:'
  - type: text
    content: ' anguish and sorrows have taken her, as a woman in travail. '
  '25':
  - type: text
    content: 'How is the city of praise not left, the city of my joy! '
  '26':
  - type: text
    content: 'Therefore her young men shall fall in her streets, and all the men of war shall be cut off in that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '27':
  - type: text
    content: And I will kindle a fire in the wall of Damascus, and it shall consume the palaces of Ben-hadad.
  - type: heading
    content: Kedar
  '28':
  - type: text
    content: 'Concerning Kedar, and concerning the kingdoms of Hazor, which Nebuchadrezzar king of Babylon shall smite, thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Arise ye, go up to Kedar, and spoil the men of the east. '
  '29':
  - type: text
    content: 'Their tents and their flocks shall they take away: they shall take to themselves their curtains, and all their vessels, and their camels; and they shall cry unto them, Fear '
  - type: text
    content: is
  - type: text
    content: ' on every side. '
  '3':
  - type: text
    content: 'Howl, O Heshbon, for Ai is spoiled: cry, ye daughters of Rabbah, gird you with sackcloth; lament, and run to and fro by the hedges; for their king shall go into captivity, '
  - type: text
    content: and
  - type: text
    content: ' his priests and his princes together. '
  '30':
  - type: text
    content: 'Flee, get you far off, dwell deep, O ye inhabitants of Hazor, saith the '
  - type: text
    content: LORD
  - type: text
    content: ; for Nebuchadrezzar king of Babylon hath taken counsel against you, and hath conceived a purpose against you.
  '31':
  - type: text
    content: 'Arise, get you up unto the wealthy nation, that dwelleth without care, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', which have neither gates nor bars, '
  - type: text
    content: which
  - type: text
    content: ' dwell alone. '
  '32':
  - type: text
    content: 'And their camels shall be a booty, and the multitude of their cattle a spoil: and I will scatter into all winds them '
  - type: text
    content: that are
  - type: text
    content: ' in the utmost corners; and I will bring their calamity from all sides thereof, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'And Hazor shall be a dwelling for dragons, '
  - type: text
    content: and
  - type: text
    content: ' a desolation for ever: there shall no man abide there, nor '
  - type: text
    content: any
  - type: text
    content: ' son of man dwell in it.'
  - type: heading
    content: Elam
  '34':
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' that came to Jeremiah the prophet against Elam in the beginning of the reign of Zedekiah king of Judah, saying, '
  '35':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Behold, I will break the bow of Elam, the chief of their might. '
  '36':
  - type: text
    content: 'And upon Elam will I bring the four winds from the four quarters of heaven, and will scatter them toward all those winds; and there shall be no nation whither the outcasts of Elam shall not come. '
  '37':
  - type: text
    content: 'For I will cause Elam to be dismayed before their enemies, and before them that seek their life: and I will bring evil upon them, '
  - type: text
    content: even
  - type: text
    content: ' my fierce anger, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; and I will send the sword after them, till I have consumed them: '
  '38':
  - type: text
    content: 'and I will set my throne in Elam, and will destroy from thence the king and the princes, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'But it shall come to pass in the latter days, '
  - type: text
    content: that
  - type: text
    content: ' I will bring again the captivity of Elam, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '4':
  - type: text
    content: 'Wherefore gloriest thou in the valleys, thy flowing valley, O backsliding daughter? that trusted in her treasures, '
  - type: text
    content: saying
  - type: text
    content: ', Who shall come unto me? '
  '5':
  - type: text
    content: 'Behold, I will bring a fear upon thee, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts, from all those that be about thee; and ye shall be driven out every man right forth; and none shall gather up him that wandereth. '
  '6':
  - type: text
    content: 'And afterward I will bring again the captivity of the children of Ammon, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Edom
  '7':
  - type: text
    content: 'Concerning Edom, thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; '
  - type: text
    content: Is
  - type: text
    content: ' wisdom no more in Teman? is counsel perished from the prudent? is their wisdom vanished? '
  '8':
  - type: text
    content: 'Flee ye, turn back, dwell deep, O inhabitants of Dedan; for I will bring the calamity of Esau upon him, the time '
  - type: text
    content: that
  - type: text
    content: ' I will visit him. '
  '9':
  - type: text
    content: 'If grapegatherers come to thee, would they not leave '
  - type: text
    content: some
  - type: text
    content: ' gleaning grapes? if thieves by night, they will destroy till they have enough. '
