  - type: text
    content: 'And when the sabbath was past, Mary Magdalene, and Mary the '
  - type: text
    content: mother
  - type: text
    content: ' of James, and Salome, had bought sweet spices, that they might come and anoint him. '
  '10':
  - type: text
    content: And
  - type: text
    content: ' she went and told them that had been with him, as they mourned and wept. '
  '11':
  - type: text
    content: And they, when they had heard that he was alive, and had been seen of her, believed not.
  '12':
  - type: text
    content: 'After that he appeared in another form unto two of them, as they walked, and went into the country. '
  '13':
  - type: text
    content: 'And they went and told '
  - type: text
    content: it
  - type: text
    content: ' unto the residue: neither believed they them.'
  '14':
  - type: text
    content: 'Afterward he appeared unto the eleven as they sat at meat, and upbraided them with their unbelief and hardness of heart, because they believed not them which had seen him after he was risen. '
  '15':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Go ye into all the world, and preach the gospel to every creature.
  - type: text
    content: ' '
  '16':
  - type: text
    content: He that believeth and is baptized shall be saved; but he that believeth not shall be damned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: And these signs shall follow them that believe; In my name shall they cast out devils; they shall speak with new tongues;
  - type: text
    content: ' '
  '18':
  - type: text
    content: they shall take up serpents; and if they drink any deadly thing, it shall not hurt them; they shall lay hands on the sick, and they shall recover.
  '19':
  - type: text
    content: 'So then after the Lord had spoken unto them, he was received up into heaven, and sat on the right hand of God. '
  '2':
  - type: text
    content: 'And very early in the morning the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, they came unto the sepulchre at the rising of the sun. '
  '20':
  - type: text
    content: 'And they went forth, and preached every where, the Lord working with '
  - type: text
    content: them
  - type: text
    content: ', and confirming the word with signs following. Amen.'
  '3':
  - type: text
    content: 'And they said among themselves, Who shall roll us away the stone from the door of the sepulchre? '
  '4':
  - type: text
    content: 'And when they looked, they saw that the stone was rolled away: for it was very great. '
  '5':
  - type: text
    content: 'And entering into the sepulchre, they saw a young man sitting on the right side, clothed in a long white garment; and they were affrighted. '
  '6':
  - type: text
    content: 'And he saith unto them, Be not affrighted: Ye seek Jesus of Nazareth, which was crucified: he is risen; he is not here: behold the place where they laid him. '
  '7':
  - type: text
    content: 'But go your way, tell his disciples and Peter that he goeth before you into Galilee: there shall ye see him, as he said unto you. '
  '8':
  - type: text
    content: 'And they went out quickly, and fled from the sepulchre; for they trembled and were amazed: neither said they any thing to any '
  - type: text
    content: man
  - type: text
    content: ; for they were afraid.
  '9':
  - type: text
    content: 'Now when '
  - type: text
    content: Jesus
  - type: text
    content: ' was risen early the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, he appeared first to Mary Magdalene, out of whom he had cast seven devils. '
