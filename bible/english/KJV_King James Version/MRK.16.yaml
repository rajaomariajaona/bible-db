document_id: MRK.16
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sunday
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And when the sabbath was past, Mary Magdalene, and Mary the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mother
  - type: text
    text: ' of James, and Salome, had bought sweet spices, that they might come and anoint him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And very early in the morning the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the week, they came unto the sepulchre at the rising of the sun. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they said among themselves, Who shall roll us away the stone from the door of the sepulchre? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when they looked, they saw that the stone was rolled away: for it was very great. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And entering into the sepulchre, they saw a young man sitting on the right side, clothed in a long white garment; and they were affrighted. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he saith unto them, Be not affrighted: Ye seek Jesus of Nazareth, which was crucified: he is risen; he is not here: behold the place where they laid him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But go your way, tell his disciples and Peter that he goeth before you into Galilee: there shall ye see him, as he said unto you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they went out quickly, and fled from the sepulchre; for they trembled and were amazed: neither said they any thing to any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ; for they were afraid.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' was risen early the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the week, he appeared first to Mary Magdalene, out of whom he had cast seven devils. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' she went and told them that had been with him, as they mourned and wept. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And they, when they had heard that he was alive, and had been seen of her, believed not.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After that he appeared in another form unto two of them, as they walked, and went into the country. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they went and told '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto the residue: neither believed they them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Afterward he appeared unto the eleven as they sat at meat, and upbraided them with their unbelief and hardness of heart, because they believed not them which had seen him after he was risen. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go ye into all the world, and preach the gospel to every creature.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He that believeth and is baptized shall be saved; but he that believeth not shall be damned.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And these signs shall follow them that believe; In my name shall they cast out devils; they shall speak with new tongues;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: they shall take up serpents; and if they drink any deadly thing, it shall not hurt them; they shall lay hands on the sick, and they shall recover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So then after the Lord had spoken unto them, he was received up into heaven, and sat on the right hand of God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they went forth, and preached every where, the Lord working with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and confirming the word with signs following. Amen.'
