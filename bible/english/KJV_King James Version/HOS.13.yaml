document_id: HOS.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Only Saviour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Ephraim spake trembling, he exalted himself in Israel; but when he offended in Baal, he died. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And now they sin more and more, and have made them molten images of their silver, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' idols according to their own understanding, all of it the work of the craftsmen: they say of them, Let the men that sacrifice kiss the calves. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore they shall be as the morning cloud, and as the early dew that passeth away, as the chaff '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' is driven with the whirlwind out of the floor, and as the smoke out of the chimney.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yet I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God from the land of Egypt, and thou shalt know no god but me: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no saviour beside me. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I did know thee in the wilderness, in the land of great drought. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'According to their pasture, so were they filled; they were filled, and their heart was exalted; therefore have they forgotten me. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore I will be unto them as a lion: as a leopard by the way will I observe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will meet them as a bear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' bereaved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of her whelps
  - type: text
    text: ', and will rend the caul of their heart, and there will I devour them like a lion: the wild beast shall tear them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O Israel, thou hast destroyed thyself; but in me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine help. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I will be thy king: where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is any other
  - type: text
    text: ' that may save thee in all thy cities? and thy judges of whom thou saidst, Give me a king and princes? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I gave thee a king in mine anger, and took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' away in my wrath. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The iniquity of Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' bound up; his sin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' hid. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sorrows of a travailing woman shall come upon him: he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an unwise son; for he should not stay long in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the place of
  - type: text
    text: ' the breaking forth of children. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will ransom them from the power of the grave; I will redeem them from death: O death, I will be thy plagues; O grave, I will be thy destruction: repentance shall be hid from mine eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Though he be fruitful among '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' brethren, an east wind shall come, the wind of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall come up from the wilderness, and his spring shall become dry, and his fountain shall be dried up: he shall spoil the treasure of all pleasant vessels. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Samaria shall become desolate; for she hath rebelled against her God: they shall fall by the sword: their infants shall be dashed in pieces, and their women with child shall be ripped up.'
