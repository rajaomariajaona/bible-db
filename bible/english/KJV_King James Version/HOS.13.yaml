    content: The Only Saviour
  - type: text
    content: 'When Ephraim spake trembling, he exalted himself in Israel; but when he offended in Baal, he died. '
  '10':
  - type: text
    content: 'I will be thy king: where '
  - type: text
    content: is any other
  - type: text
