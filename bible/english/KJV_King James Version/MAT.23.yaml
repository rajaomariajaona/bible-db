verses:
  '1':
  - type: heading
    content: The Great Denunciation
  - type: text
    content: 'Then spake Jesus to the multitude, and to his disciples, '
  '10':
  - type: text
    content: 'Neither be ye called masters: for one is your Master, '
  - type: text
    content: even
  - type: text
    content: ' Christ.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: But he that is greatest among you shall be your servant.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And whosoever shall exalt himself shall be abased; and he that shall humble himself shall be exalted.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'But woe unto you, scribes and Pharisees, hypocrites! for ye shut up the kingdom of heaven against men: for ye neither go in '
  - type: text
    content: yourselves
  - type: text
    content: ', neither suffer ye them that are entering to go in.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Woe unto you, scribes and Pharisees, hypocrites! for ye devour widows'' houses, and for a pretence make long prayer: therefore ye shall receive the greater damnation.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Woe unto you, scribes and Pharisees, hypocrites! for ye compass sea and land to make one proselyte, and when he is made, ye make him twofold more the child of hell than yourselves.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Woe unto you, '
  - type: text
    content: ye
  - type: text
    content: ' blind guides, which say, Whosoever shall swear by the temple, it is nothing; but whosoever shall swear by the gold of the temple, he is a debtor!'
  - type: text
    content: ' '
  '17':
  - type: text
    content: Ye
  - type: text
    content: ' fools and blind: for whether is greater, the gold, or the temple that sanctifieth the gold?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: And, Whosoever shall swear by the altar, it is nothing; but whosoever sweareth by the gift that is upon it, he is guilty.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Ye
  - type: text
    content: ' fools and blind: for whether '
  - type: text
    content: is
  - type: text
    content: ' greater, the gift, or the altar that sanctifieth the gift?'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'saying, '
  - type: text
    content: 'The scribes and the Pharisees sit in Moses'' seat:'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Whoso therefore shall swear by the altar, sweareth by it, and by all things thereon.
  - type: text
    content: ' '
  '21':
  - type: text
    content: And whoso shall swear by the temple, sweareth by it, and by him that dwelleth therein.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And he that shall swear by heaven, sweareth by the throne of God, and by him that sitteth thereon.
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Woe unto you, scribes and Pharisees, hypocrites! for ye pay tithe of mint and anise and cummin, and have omitted the weightier '
  - type: text
    content: matters
  - type: text
    content: ' of the law, judgment, mercy, and faith: these ought ye to have done, and not to leave the other undone.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Ye
  - type: text
    content: ' blind guides, which strain at a gnat, and swallow a camel.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Woe unto you, scribes and Pharisees, hypocrites! for ye make clean the outside of the cup and of the platter, but within they are full of extortion and excess.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Thou
  - type: text
    content: ' blind Pharisee, cleanse first that '
  - type: text
    content: which is
  - type: text
    content: ' within the cup and platter, that the outside of them may be clean also.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Woe unto you, scribes and Pharisees, hypocrites! for ye are like unto whited sepulchres, which indeed appear beautiful outward, but are within full of dead '
  - type: text
    content: men's
  - type: text
    content: ' bones, and of all uncleanness.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Even so ye also outwardly appear righteous unto men, but within ye are full of hypocrisy and iniquity.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Woe unto you, scribes and Pharisees, hypocrites! because ye build the tombs of the prophets, and garnish the sepulchres of the righteous,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'all therefore whatsoever they bid you observe, '
  - type: text
    content: that
  - type: text
    content: ' observe and do; but do not ye after their works: for they say, and do not.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: and say, If we had been in the days of our fathers, we would not have been partakers with them in the blood of the prophets.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Wherefore ye be witnesses unto yourselves, that ye are the children of them which killed the prophets.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Fill ye up then the measure of your fathers.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Ye
  - type: text
    content: ' serpents, '
  - type: text
    content: ye
  - type: text
    content: ' generation of vipers, how can ye escape the damnation of hell?'
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Wherefore, behold, I send unto you prophets, and wise men, and scribes: and '
  - type: text
    content: some
  - type: text
    content: ' of them ye shall kill and crucify; and '
  - type: text
    content: some
  - type: text
    content: ' of them shall ye scourge in your synagogues, and persecute '
  - type: text
    content: them
  - type: text
    content: ' from city to city:'
  - type: text
    content: ' '
  '35':
  - type: text
    content: that upon you may come all the righteous blood shed upon the earth, from the blood of righteous Abel unto the blood of Zacharias son of Barachias, whom ye slew between the temple and the altar.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Verily I say unto you, All these things shall come upon this generation.
  '37':
  - type: text
    content: ' '
  - type: text
    content: 'O Jerusalem, Jerusalem, '
  - type: text
    content: thou
  - type: text
    content: ' that killest the prophets, and stonest them which are sent unto thee, how often would I have gathered thy children together, even as a hen gathereth her chickens under '
  - type: text
    content: her
  - type: text
    content: ' wings, and ye would not!'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Behold, your house is left unto you desolate.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'For I say unto you, Ye shall not see me henceforth, till ye shall say, Blessed '
  - type: text
    content: is
  - type: text
    content: ' he that cometh in the name of the Lord.'
  '4':
  - type: text
    content: 'For they bind heavy burdens and grievous to be borne, and lay '
  - type: text
    content: them
  - type: text
    content: ' on men''s shoulders; but they '
  - type: text
    content: themselves
  - type: text
    content: ' will not move them with one of their fingers.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But all their works they do for to be seen of men: they make broad their phylacteries, and enlarge the borders of their garments,'
  - type: text
    content: ' '
  '6':
  - type: text
    content: and love the uppermost rooms at feasts, and the chief seats in the synagogues,
  - type: text
    content: ' '
  '7':
  - type: text
    content: and greetings in the markets, and to be called of men, Rabbi, Rabbi.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But be not ye called Rabbi: for one is your Master, '
  - type: text
    content: even
  - type: text
    content: ' Christ; and all ye are brethren.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And call no '
  - type: text
    content: man
  - type: text
    content: ' your father upon the earth: for one is your Father, which is in heaven.'
  - type: text
    content: ' '
