document_id: GEN.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Offering of Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass after these things, that God did tempt Abraham, and said unto him, Abraham: and he said, Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here
  - type: text
    text: ' I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said, Take now thy son, thine only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' Isaac, whom thou lovest, and get thee into the land of Moriah; and offer him there for a burnt offering upon one of the mountains which I will tell thee of.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Abraham rose up early in the morning, and saddled his ass, and took two of his young men with him, and Isaac his son, and clave the wood for the burnt offering, and rose up, and went unto the place of which God had told him. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then on the third day Abraham lifted up his eyes, and saw the place afar off. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Abraham said unto his young men, Abide ye here with the ass; and I and the lad will go yonder and worship, and come again to you. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Abraham took the wood of the burnt offering, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon Isaac his son; and he took the fire in his hand, and a knife; and they went both of them together. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Isaac spake unto Abraham his father, and said, My father: and he said, Here '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I, my son. And he said, Behold the fire and the wood: but where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the lamb for a burnt offering? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Abraham said, My son, God will provide himself a lamb for a burnt offering: so they went both of them together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they came to the place which God had told him of; and Abraham built an altar there, and laid the wood in order, and bound Isaac his son, and laid him on the altar upon the wood. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Abraham stretched forth his hand, and took the knife to slay his son. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' called unto him out of heaven, and said, Abraham, Abraham: and he said, Here '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said, Lay not thine hand upon the lad, neither do thou any thing unto him: for now I know that thou fearest God, seeing thou hast not withheld thy son, thine only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' from me. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Abraham lifted up his eyes, and looked, and behold behind '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' a ram caught in a thicket by his horns: and Abraham went and took the ram, and offered him up for a burnt offering in the stead of his son. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Abraham called the name of that place Jehovah-jireh: as it is said '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' this day, In the mount of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' it shall be seen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' called unto Abraham out of heaven the second time, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and said, By myself have I sworn, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for because thou hast done this thing, and hast not withheld thy son, thine only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that in blessing I will bless thee, and in multiplying I will multiply thy seed as the stars of the heaven, and as the sand which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the sea shore; and thy seed shall possess the gate of his enemies; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and in thy seed shall all the nations of the earth be blessed; because thou hast obeyed my voice. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So Abraham returned unto his young men, and they rose up and went together to Beer-sheba; and Abraham dwelt at Beer-sheba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And it came to pass after these things, that it was told Abraham, saying, Behold, Milcah, she hath also born children unto thy brother Nahor; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Huz his firstborn, and Buz his brother, and Kemuel the father of Aram, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Chesed, and Hazo, and Pildash, and Jidlaph, and Bethuel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Bethuel begat Rebekah: these eight Milcah did bear to Nahor, Abraham''s brother. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And his concubine, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Reumah, she bare also Tebah, and Gaham, and Thahash, and Maachah.'
