document_id: ZEP.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Gather yourselves together, yea, gather together, O nation not desired; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'before the decree bring forth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: before
  - type: text
    text: ' the day pass as the chaff, before the fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' come upon you, before the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anger come upon you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Seek ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', all ye meek of the earth, which have wrought his judgment; seek righteousness, seek meekness: it may be ye shall be hid in the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anger.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For Gaza shall be forsaken, and Ashkelon a desolation: they shall drive out Ashdod at the noon day, and Ekron shall be rooted up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Woe unto the inhabitants of the sea coast, the nation of the Cherethites! the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' against you; O Canaan, the land of the Philistines, I will even destroy thee, that there shall be no inhabitant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the sea coast shall be dwellings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' cottages for shepherds, and folds for flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the coast shall be for the remnant of the house of Judah; they shall feed thereupon: in the houses of Ashkelon shall they lie down in the evening: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God shall visit them, and turn away their captivity.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Moab and Ammon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I have heard the reproach of Moab, and the revilings of the children of Ammon, whereby they have reproached my people, and magnified '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' against their border. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' I live, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of Israel, Surely Moab shall be as Sodom, and the children of Ammon as Gomorrah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the breeding of nettles, and saltpits, and a perpetual desolation: the residue of my people shall spoil them, and the remnant of my people shall possess them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This shall they have for their pride, because they have reproached and magnified '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' against the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' terrible unto them: for he will famish all the gods of the earth; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' shall worship him, every one from his place, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the isles of the heathen.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ethiopia and Assyria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ye Ethiopians also, ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' slain by my sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he will stretch out his hand against the north, and destroy Assyria; and will make Nineveh a desolation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' dry like a wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And flocks shall lie down in the midst of her, all the beasts of the nations: both the cormorant and the bittern shall lodge in the upper lintels of it; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' voice shall sing in the windows; desolation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the thresholds: for he shall uncover the cedar work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the rejoicing city that dwelt carelessly, that said in her heart, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ', and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none beside me: how is she become a desolation, a place for beasts to lie down in! every one that passeth by her shall hiss, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' wag his hand.'
