  - type: heading
    content: The Philistines
  '4':
  - type: text
    content: 'For Gaza shall be forsaken, and Ashkelon a desolation: they shall drive out Ashdod at the noon day, and Ekron shall be rooted up. '
  '5':
  - type: text
    content: 'Woe unto the inhabitants of the sea coast, the nation of the Cherethites! the word of the '
  - type: text
