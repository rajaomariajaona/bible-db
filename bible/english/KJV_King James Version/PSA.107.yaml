document_id: PSA.107,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'O give thanks unto the '
  - type: text
    content: LORD
  - type: text
    content: ', for '
  - type: text
    content: he is
  - type: text
    content: ' good:'
  - type: text
    content: 'For his mercy '
  - type: text
    content: endureth
  - type: text
    content: ' for ever.'
  '10':
  - type: text
    content: Such as sit in darkness and in the shadow of death,
  - type: text
    content: Being
  - type: text
    content: ' bound in affliction and iron;'
  '11':
  - type: text
    content: Because they rebelled against the words of God,
  - type: text
    content: 'And contemned the counsel of the Most High:'
  '12':
  - type: text
    content: Therefore he brought down their heart with labour;
  - type: text
    content: 'They fell down, and '
  - type: text
    content: there was
  - type: text
    content: ' none to help.'
  '13':
  - type: text
    content: 'Then they cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And
  - type: text
    content: ' he saved them out of their distresses.'
  '14':
  - type: text
    content: He brought them out of darkness and the shadow of death,
  - type: text
    content: And brake their bands in sunder.
  '15':
  - type: text
    content: 'Oh that '
  - type: text
    content: men
  - type: text
    content: ' would praise the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' his goodness,'
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' his wonderful works to the children of men!'
  '16':
  - type: text
    content: For he hath broken the gates of brass,
  - type: text
    content: And cut the bars of iron in sunder.
  '17':
  - type: text
    content: Fools because of their transgression,
  - type: text
    content: And because of their iniquities, are afflicted.
  '18':
  - type: text
    content: Their soul abhorreth all manner of meat;
  - type: text
    content: And they draw near unto the gates of death.
  '19':
  - type: text
    content: 'Then they cry unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And
  - type: text
    content: ' he saveth them out of their distresses.'
  '2':
  - type: text
    content: 'Let the redeemed of the '
  - type: text
    content: LORD
  - type: text
    content: ' say '
  - type: text
    content: so
  - type: text
    content: ','
  - type: text
    content: Whom he hath redeemed from the hand of the enemy;
  '20':
  - type: text
    content: He sent his word, and healed them,
  - type: text
    content: 'And delivered '
  - type: text
    content: them
  - type: text
    content: ' from their destructions.'
  '21':
  - type: text
    content: 'Oh that '
  - type: text
    content: men
  - type: text
    content: ' would praise the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' his goodness,'
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' his wonderful works to the children of men!'
  '22':
  - type: text
    content: And let them sacrifice the sacrifices of thanksgiving,
  - type: text
    content: And declare his works with rejoicing.
  '23':
  - type: text
    content: They that go down to the sea in ships,
  - type: text
    content: That do business in great waters;
  '24':
  - type: text
    content: 'These see the works of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And his wonders in the deep.
  '25':
  - type: text
    content: For he commandeth, and raiseth the stormy wind,
  - type: text
    content: Which lifteth up the waves thereof.
  '26':
  - type: text
    content: 'They mount up to the heaven, they go down again to the depths:'
  - type: text
    content: Their soul is melted because of trouble.
  '27':
  - type: text
    content: They reel to and fro, and stagger like a drunken man,
  - type: text
    content: And are at their wits' end.
  '28':
  - type: text
    content: 'Then they cry unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And he bringeth them out of their distresses.
  '29':
  - type: text
    content: He maketh the storm a calm,
  - type: text
    content: So that the waves thereof are still.
  '3':
  - type: text
    content: And gathered them out of the lands, from the east, and from the west,
  - type: text
    content: From the north, and from the south.
  '30':
  - type: text
    content: Then are they glad because they be quiet;
  - type: text
    content: So he bringeth them unto their desired haven.
  '31':
  - type: text
    content: 'Oh that '
  - type: text
    content: men
  - type: text
    content: ' would praise the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' his goodness,'
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' his wonderful works to the children of men!'
  '32':
  - type: text
    content: Let them exalt him also in the congregation of the people,
  - type: text
    content: And praise him in the assembly of the elders.
  '33':
  - type: text
    content: He turneth rivers into a wilderness,
  - type: text
    content: And the watersprings into dry ground;
  '34':
  - type: text
    content: A fruitful land into barrenness,
  - type: text
    content: For the wickedness of them that dwell therein.
  '35':
  - type: text
    content: He turneth the wilderness into a standing water,
  - type: text
    content: And dry ground into watersprings.
  '36':
  - type: text
    content: And there he maketh the hungry
  - type: text
    content: To dwell, that they may prepare a city for habitation;
  '37':
  - type: text
    content: And sow the fields, and plant vineyards,
  - type: text
    content: Which may yield fruits of increase.
  '38':
  - type: text
    content: He blesseth them also, so that they are multiplied greatly;
  - type: text
    content: And suffereth not their cattle to decrease.
  '39':
  - type: text
    content: Again, they are minished and brought low
  - type: text
    content: Through oppression, affliction, and sorrow.
  '4':
  - type: text
    content: They wandered in the wilderness in a solitary way;
  - type: text
    content: They found no city to dwell in.
  '40':
  - type: text
    content: He poureth contempt upon princes,
  - type: text
    content: 'And causeth them to wander in the wilderness, '
  - type: text
    content: where there is
  - type: text
    content: ' no way.'
  '41':
  - type: text
    content: Yet setteth he the poor on high from affliction,
  - type: text
    content: 'And maketh '
  - type: text
    content: him
  - type: text
    content: ' families like a flock.'
  '42':
  - type: text
    content: 'The righteous shall see '
  - type: text
    content: it
  - type: text
    content: ', and rejoice:'
  - type: text
    content: And all iniquity shall stop her mouth.
  '43':
  - type: text
    content: 'Whoso '
  - type: text
    content: is
  - type: text
    content: ' wise, and will observe these '
  - type: text
    content: things
  - type: text
    content: ','
  - type: text
    content: 'Even they shall understand the lovingkindness of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '5':
  - type: text
    content: Hungry and thirsty,
  - type: text
    content: Their soul fainted in them.
  '6':
  - type: text
    content: 'Then they cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And
  - type: text
    content: ' he delivered them out of their distresses.'
  '7':
  - type: text
    content: And he led them forth by the right way,
  - type: text
    content: That they might go to a city of habitation.
  '8':
  - type: text
    content: 'Oh that '
  - type: text
    content: men
  - type: text
    content: ' would praise the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' his goodness,'
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' his wonderful works to the children of men!'
  '9':
  - type: text
    content: For he satisfieth the longing soul,
  - type: text
    content: And filleth the hungry soul with goodness.
