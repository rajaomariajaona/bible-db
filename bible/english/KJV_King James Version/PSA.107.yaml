document_id: PSA.107,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O give thanks unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' for ever.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such as sit in darkness and in the shadow of death,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Being
    - type: text
      text: ' bound in affliction and iron;'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they rebelled against the words of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And contemned the counsel of the Most High:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore he brought down their heart with labour;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They fell down, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' none to help.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he saved them out of their distresses.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought them out of darkness and the shadow of death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And brake their bands in sunder.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' would praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his goodness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his wonderful works to the children of men!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he hath broken the gates of brass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cut the bars of iron in sunder.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools because of their transgression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And because of their iniquities, are afflicted.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their soul abhorreth all manner of meat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they draw near unto the gates of death.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cry unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he saveth them out of their distresses.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the redeemed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' say '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom he hath redeemed from the hand of the enemy;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent his word, and healed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And delivered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' from their destructions.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' would praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his goodness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his wonderful works to the children of men!'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let them sacrifice the sacrifices of thanksgiving,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And declare his works with rejoicing.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They that go down to the sea in ships,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That do business in great waters;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'These see the works of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his wonders in the deep.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he commandeth, and raiseth the stormy wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which lifteth up the waves thereof.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They mount up to the heaven, they go down again to the depths:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their soul is melted because of trouble.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They reel to and fro, and stagger like a drunken man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are at their wits' end.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cry unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he bringeth them out of their distresses.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He maketh the storm a calm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that the waves thereof are still.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gathered them out of the lands, from the east, and from the west,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the north, and from the south.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then are they glad because they be quiet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he bringeth them unto their desired haven.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' would praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his goodness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his wonderful works to the children of men!'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them exalt him also in the congregation of the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And praise him in the assembly of the elders.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turneth rivers into a wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the watersprings into dry ground;
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fruitful land into barrenness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the wickedness of them that dwell therein.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turneth the wilderness into a standing water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And dry ground into watersprings.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there he maketh the hungry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To dwell, that they may prepare a city for habitation;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sow the fields, and plant vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which may yield fruits of increase.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He blesseth them also, so that they are multiplied greatly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And suffereth not their cattle to decrease.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Again, they are minished and brought low
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Through oppression, affliction, and sorrow.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wandered in the wilderness in a solitary way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They found no city to dwell in.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He poureth contempt upon princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And causeth them to wander in the wilderness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where there is
    - type: text
      text: ' no way.'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet setteth he the poor on high from affliction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And maketh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' families like a flock.'
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The righteous shall see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and rejoice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all iniquity shall stop her mouth.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoso '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wise, and will observe these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even they shall understand the lovingkindness of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hungry and thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their soul fainted in them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he delivered them out of their distresses.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he led them forth by the right way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That they might go to a city of habitation.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' would praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his goodness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his wonderful works to the children of men!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he satisfieth the longing soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And filleth the hungry soul with goodness.
