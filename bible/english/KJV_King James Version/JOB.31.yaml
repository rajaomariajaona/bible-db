document_id: JOB.31,1
type_code: eng
verses:
  '1':
  - type: text
    content: I made a covenant with mine eyes;
  - type: text
    content: Why then should I think upon a maid?
  '10':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' let my wife grind unto another,'
  - type: text
    content: And let others bow down upon her.
  '11':
  - type: text
    content: 'For this '
  - type: text
    content: is
  - type: text
    content: ' an heinous crime;'
  - type: text
    content: 'Yea, it '
  - type: text
    content: is
  - type: text
    content: ' an iniquity '
  - type: text
    content: to be punished by
  - type: text
    content: ' the judges.'
  '12':
  - type: text
    content: 'For it '
  - type: text
    content: is
  - type: text
    content: ' a fire '
  - type: text
    content: that
  - type: text
    content: ' consumeth to destruction,'
  - type: text
    content: And would root out all mine increase.
  '13':
  - type: text
    content: If I did despise the cause of my manservant or of my maidservant,
  - type: text
    content: When they contended with me;
  '14':
  - type: text
    content: What then shall I do when God riseth up?
  - type: text
    content: And when he visiteth, what shall I answer him?
  '15':
  - type: text
    content: Did not he that made me in the womb make him?
  - type: text
    content: And did not one fashion us in the womb?
  '16':
  - type: text
    content: 'If I have withheld the poor from '
  - type: text
    content: their
  - type: text
    content: ' desire,'
  - type: text
    content: Or have caused the eyes of the widow to fail;
  '17':
  - type: text
    content: Or have eaten my morsel myself alone,
  - type: text
    content: And the fatherless hath not eaten thereof;
  '18':
  - type: text
    content: '(For from my youth he was brought up with me, as '
  - type: text
    content: with
  - type: text
    content: ' a father,'
  - type: text
    content: And I have guided her from my mother's womb;)
  '19':
  - type: text
    content: If I have seen any perish for want of clothing,
  - type: text
    content: Or any poor without covering;
  '2':
  - type: text
    content: 'For what portion of God '
  - type: text
    content: is there
  - type: text
    content: ' from above?'
  - type: text
    content: 'And '
  - type: text
    content: what
  - type: text
    content: ' inheritance of the Almighty from on high?'
  '20':
  - type: text
    content: If his loins have not blessed me,
  - type: text
    content: 'And '
  - type: text
    content: if
  - type: text
    content: ' he were '
  - type: text
    content: not
  - type: text
    content: ' warmed with the fleece of my sheep;'
  '21':
  - type: text
    content: If I have lifted up my hand against the fatherless,
  - type: text
    content: 'When I saw my help in the gate:'
  '22':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' let mine arm fall from my shoulder blade,'
  - type: text
    content: And mine arm be broken from the bone.
  '23':
  - type: text
    content: 'For destruction '
  - type: text
    content: from
  - type: text
    content: ' God '
  - type: text
    content: was
  - type: text
    content: ' a terror to me,'
  - type: text
    content: And by reason of his highness I could not endure.
  '24':
  - type: text
    content: If I have made gold my hope,
  - type: text
    content: 'Or have said to the fine gold, '
  - type: text
    content: Thou art
  - type: text
    content: ' my confidence;'
  '25':
  - type: text
    content: 'If I rejoiced because my wealth '
  - type: text
    content: was
  - type: text
    content: ' great,'
  - type: text
    content: And because mine hand had gotten much;
  '26':
  - type: text
    content: If I beheld the sun when it shined,
  - type: text
    content: 'Or the moon walking '
  - type: text
    content: in
  - type: text
    content: ' brightness;'
  '27':
  - type: text
    content: And my heart hath been secretly enticed,
  - type: text
    content: 'Or my mouth hath kissed my hand:'
  '28':
  - type: text
    content: 'This also '
  - type: text
    content: were
  - type: text
    content: ' an iniquity '
  - type: text
    content: to be punished by
  - type: text
    content: ' the judge:'
  - type: text
    content: 'For I should have denied the God '
  - type: text
    content: that is
  - type: text
    content: ' above.'
  '29':
  - type: text
    content: If I rejoiced at the destruction of him that hated me,
  - type: text
    content: 'Or lifted up myself when evil found him:'
  '3':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' not destruction to the wicked?'
  - type: text
    content: 'And a strange '
  - type: text
    content: punishment
  - type: text
    content: ' to the workers of iniquity?'
  '30':
  - type: text
    content: Neither have I suffered my mouth to sin
  - type: text
    content: By wishing a curse to his soul.
  '31':
  - type: text
    content: If the men of my tabernacle said not,
  - type: text
    content: Oh that we had of his flesh! we cannot be satisfied.
  '32':
  - type: text
    content: 'The stranger did not lodge in the street:'
  - type: text
    content: But
  - type: text
    content: ' I opened my doors to the traveller.'
  '33':
  - type: text
    content: If I covered my transgressions as Adam,
  - type: text
    content: 'By hiding mine iniquity in my bosom:'
  '34':
  - type: text
    content: Did I fear a great multitude,
  - type: text
    content: Or did the contempt of families terrify me,
  - type: text
    content: 'That I kept silence, '
  - type: text
    content: and
  - type: text
    content: ' went not out of the door?'
  '35':
  - type: text
    content: Oh that one would hear me!
  - type: text
    content: 'Behold, my desire '
  - type: text
    content: is, that
  - type: text
    content: ' the Almighty would answer me,'
  - type: text
    content: 'And '
  - type: text
    content: that
  - type: text
    content: ' mine adversary had written a book.'
  '36':
  - type: text
    content: Surely I would take it upon my shoulder,
  - type: text
    content: And
  - type: text
    content: ' bind it '
  - type: text
    content: as
  - type: text
    content: ' a crown to me.'
  '37':
  - type: text
    content: I would declare unto him the number of my steps;
  - type: text
    content: As a prince would I go near unto him.
  '38':
  - type: text
    content: If my land cry against me,
  - type: text
    content: Or that the furrows likewise thereof complain;
  '39':
  - type: text
    content: If I have eaten the fruits thereof without money,
  - type: text
    content: 'Or have caused the owners thereof to lose their life:'
  '4':
  - type: text
    content: Doth not he see my ways,
  - type: text
    content: And count all my steps?
  '40':
  - type: text
    content: Let thistles grow instead of wheat,
  - type: text
    content: And cockle instead of barley.
  - type: text
    content: The words of Job are ended.
  '5':
  - type: text
    content: If I have walked with vanity,
  - type: text
    content: Or if my foot hath hasted to deceit;
  '6':
  - type: text
    content: Let me be weighed in an even balance,
  - type: text
    content: That God may know mine integrity.
  '7':
  - type: text
    content: If my step hath turned out of the way,
  - type: text
    content: And mine heart walked after mine eyes,
  - type: text
    content: And if any blot hath cleaved to mine hands;
  '8':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' let me sow, and let another eat;'
  - type: text
    content: Yea, let my offspring be rooted out.
  '9':
  - type: text
    content: If mine heart have been deceived by a woman,
  - type: text
    content: 'Or '
  - type: text
    content: if
  - type: text
    content: ' I have laid wait at my neighbour''s door;'
