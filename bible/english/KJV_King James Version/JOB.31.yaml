document_id: JOB.31
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I made a covenant with mine eyes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why then should I think upon a maid?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For what portion of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' from above?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' inheritance of the Almighty from on high?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not destruction to the wicked?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a strange '
  - type: usfm
    marker: add
    children:
    - type: text
      text: punishment
  - type: text
    text: ' to the workers of iniquity?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Doth not he see my ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And count all my steps?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If I have walked with vanity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or if my foot hath hasted to deceit;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let me be weighed in an even balance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That God may know mine integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If my step hath turned out of the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And mine heart walked after mine eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And if any blot hath cleaved to mine hands;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' let me sow, and let another eat;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, let my offspring be rooted out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If mine heart have been deceived by a woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' I have laid wait at my neighbour''s door;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' let my wife grind unto another,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let others bow down upon her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an heinous crime;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be punished by
  - type: text
    text: ' the judges.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a fire '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' consumeth to destruction,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And would root out all mine increase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If I did despise the cause of my manservant or of my maidservant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When they contended with me;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: What then shall I do when God riseth up?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And when he visiteth, what shall I answer him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Did not he that made me in the womb make him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And did not one fashion us in the womb?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'If I have withheld the poor from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' desire,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or have caused the eyes of the widow to fail;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Or have eaten my morsel myself alone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the fatherless hath not eaten thereof;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '(For from my youth he was brought up with me, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a father,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I have guided her from my mother's womb;)
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If I have seen any perish for want of clothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or any poor without covering;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If his loins have not blessed me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' he were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' warmed with the fleece of my sheep;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If I have lifted up my hand against the fatherless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When I saw my help in the gate:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' let mine arm fall from my shoulder blade,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And mine arm be broken from the bone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For destruction '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a terror to me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by reason of his highness I could not endure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: If I have made gold my hope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or have said to the fine gold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Thou art
  - type: text
    text: ' my confidence;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'If I rejoiced because my wealth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' great,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And because mine hand had gotten much;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: If I beheld the sun when it shined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or the moon walking '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' brightness;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And my heart hath been secretly enticed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or my mouth hath kissed my hand:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be punished by
  - type: text
    text: ' the judge:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For I should have denied the God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' above.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: If I rejoiced at the destruction of him that hated me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or lifted up myself when evil found him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Neither have I suffered my mouth to sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: By wishing a curse to his soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If the men of my tabernacle said not,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh that we had of his flesh! we cannot be satisfied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The stranger did not lodge in the street:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' I opened my doors to the traveller.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: If I covered my transgressions as Adam,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'By hiding mine iniquity in my bosom:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Did I fear a great multitude,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or did the contempt of families terrify me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That I kept silence, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' went not out of the door?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Oh that one would hear me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Behold, my desire '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is, that
  - type: text
    text: ' the Almighty would answer me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' mine adversary had written a book.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Surely I would take it upon my shoulder,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' bind it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a crown to me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: I would declare unto him the number of my steps;
- type: usfm
  marker: q2
  children:
  - type: text
    text: As a prince would I go near unto him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: If my land cry against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or that the furrows likewise thereof complain;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: If I have eaten the fruits thereof without money,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or have caused the owners thereof to lose their life:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Let thistles grow instead of wheat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cockle instead of barley.
- type: usfm
  marker: p
  children:
  - type: text
    text: The words of Job are ended.
