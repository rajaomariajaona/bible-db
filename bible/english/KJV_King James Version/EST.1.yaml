  - type: text
    content: ' deed of the queen shall come abroad unto all women, so that they shall despise their husbands in their eyes, when it shall be reported, The king Ahasuerus commanded Vashti the queen to be brought in before him, but she came not. '
  '18':
  - type: text
    content: Likewise
  - type: text
    content: ' shall the ladies of Persia and Media say this day unto all the king''s princes, which have heard of the deed of the queen. Thus '
  - type: text
