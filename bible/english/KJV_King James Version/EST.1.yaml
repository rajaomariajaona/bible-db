    content: 'what shall we do unto the queen Vashti according to law, because she hath not performed the commandment of the king Ahasuerus by the chamberlains? '
  '16':
  - type: text
    content: 'And Memucan answered before the king and the princes, Vashti the queen hath not done wrong to the king only, but also to all the princes, and to all the people that '
  - type: text
    content: are
  - type: text
