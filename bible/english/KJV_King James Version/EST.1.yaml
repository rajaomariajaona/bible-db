document_id: EST.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass in the days of Ahasuerus, (this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Ahasuerus which reigned, from India even unto Ethiopia, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: over
  - type: text
    text: ' an hundred and seven and twenty provinces:) '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' in those days, when the king Ahasuerus sat on the throne of his kingdom, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Shushan the palace, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'in the third year of his reign, he made a feast unto all his princes and his servants; the power of Persia and Media, the nobles and princes of the provinces, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' before him: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'when he shewed the riches of his glorious kingdom and the honour of his excellent majesty many days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' an hundred and fourscore days. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when these days were expired, the king made a feast unto all the people that were present in Shushan the palace, both unto great and small, seven days, in the court of the garden of the king''s palace; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: add
    children:
    - type: text
      text: where were
  - type: text
    text: ' white, green, and blue, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hangings
  - type: text
    text: ', fastened with cords of fine linen and purple to silver rings and pillars of marble: the beds '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' gold and silver, upon a pavement of red, and blue, and white, and black, marble. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' drink in vessels of gold, (the vessels being diverse one from another,) and royal wine in abundance, according to the state of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the drinking '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' according to the law; none did compel: for so the king had appointed to all the officers of his house, that they should do according to every man''s pleasure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Also Vashti the queen made a feast for the women '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the royal house which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonged
  - type: text
    text: ' to king Ahasuerus. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the seventh day, when the heart of the king was merry with wine, he commanded Mehuman, Biztha, Harbona, Bigtha, and Abagtha, Zethar, and Carcas, the seven chamberlains that served in the presence of Ahasuerus the king, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'to bring Vashti the queen before the king with the crown royal, to shew the people and the princes her beauty: for she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fair to look on. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the queen Vashti refused to come at the king''s commandment by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' chamberlains: therefore was the king very wroth, and his anger burned in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the king said to the wise men, which knew the times, (for so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the king''s manner toward all that knew law and judgment: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and the next unto him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Memucan, the seven princes of Persia and Media, which saw the king''s face, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' which sat the first in the kingdom;) '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'what shall we do unto the queen Vashti according to law, because she hath not performed the commandment of the king Ahasuerus by the chamberlains? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Memucan answered before the king and the princes, Vashti the queen hath not done wrong to the king only, but also to all the princes, and to all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in all the provinces of the king Ahasuerus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' deed of the queen shall come abroad unto all women, so that they shall despise their husbands in their eyes, when it shall be reported, The king Ahasuerus commanded Vashti the queen to be brought in before him, but she came not. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Likewise
  - type: text
    text: ' shall the ladies of Persia and Media say this day unto all the king''s princes, which have heard of the deed of the queen. Thus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall there arise
  - type: text
    text: ' too much contempt and wrath. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If it please the king, let there go a royal commandment from him, and let it be written among the laws of the Persians and the Medes, that it be not altered, That Vashti come no more before king Ahasuerus; and let the king give her royal estate unto another that is better than she. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when the king''s decree which he shall make shall be published throughout all his empire, (for it is great,) all the wives shall give to their husbands honour, both to great and small. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the saying pleased the king and the princes; and the king did according to the word of Memucan: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'for he sent letters into all the king''s provinces, into every province according to the writing thereof, and to every people after their language, that every man should bear rule in his own house, and that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' should be published according to the language of every people.'
