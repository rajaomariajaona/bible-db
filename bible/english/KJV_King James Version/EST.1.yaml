  '19':
  - type: text
    content: 'If it please the king, let there go a royal commandment from him, and let it be written among the laws of the Persians and the Medes, that it be not altered, That Vashti come no more before king Ahasuerus; and let the king give her royal estate unto another that is better than she. '
  '2':
  - type: text
    content: that
  - type: text
    content: ' in those days, when the king Ahasuerus sat on the throne of his kingdom, which '
  - type: text
    content: was
  - type: text
    content: ' in Shushan the palace, '
  '20':
  - type: text
    content: 'And when the king''s decree which he shall make shall be published throughout all his empire, (for it is great,) all the wives shall give to their husbands honour, both to great and small. '
  '21':
  - type: text
    content: 'And the saying pleased the king and the princes; and the king did according to the word of Memucan: '
  '22':
  - type: text
    content: 'for he sent letters into all the king''s provinces, into every province according to the writing thereof, and to every people after their language, that every man should bear rule in his own house, and that '
  - type: text
    content: it
  - type: text
    content: ' should be published according to the language of every people.'
  '3':
  - type: text
    content: 'in the third year of his reign, he made a feast unto all his princes and his servants; the power of Persia and Media, the nobles and princes of the provinces, '
  - type: text
