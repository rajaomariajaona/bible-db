document_id: MIC.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem, City of God
  - type: text
    content: 'But in the last days it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' the mountain of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be established in the top of the mountains, and it shall be exalted above the hills; and people shall flow unto it. '
  '10':
  - type: text
    content: 'Be in pain, and labour to bring forth, O daughter of Zion, like a woman in travail: for now shalt thou go forth out of the city, and thou shalt dwell in the field, and thou shalt go '
  - type: text
    content: even
  - type: text
    content: ' to Babylon; there shalt thou be delivered; there the '
  - type: text
    content: LORD
  - type: text
    content: ' shall redeem thee from the hand of thine enemies.'
  '11':
  - type: text
    content: 'Now also many nations are gathered against thee, that say, Let her be defiled, and let our eye look upon Zion. '
  '12':
  - type: text
    content: 'But they know not the thoughts of the '
  - type: text
    content: LORD
  - type: text
    content: ', neither understand they his counsel: for he shall gather them as the sheaves into the floor. '
  '13':
  - type: text
    content: 'Arise and thresh, O daughter of Zion: for I will make thine horn iron, and I will make thy hoofs brass: and thou shalt beat in pieces many people: and I will consecrate their gain unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and their substance unto the Lord of the whole earth.'
  '2':
  - type: text
    content: 'And many nations shall come, and say, Come, and let us go up to the mountain of the '
  - type: text
    content: LORD
  - type: text
    content: ', and to the house of the God of Jacob; and he will teach us of his ways, and we will walk in his paths: for the law shall go forth of Zion, and the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' from Jerusalem. '
  '3':
  - type: text
    content: 'And he shall judge among many people, and rebuke strong nations afar off; and they shall beat their swords into plowshares, and their spears into pruninghooks: nation shall not lift up a sword against nation, neither shall they learn war any more. '
  '4':
  - type: text
    content: 'But they shall sit every man under his vine and under his fig tree; and none shall make '
  - type: text
    content: them
  - type: text
    content: ' afraid: for the mouth of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath spoken '
  - type: text
    content: it
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'For all people will walk every one in the name of his god, and we will walk in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God for ever and ever.'
  '6':
  - type: text
    content: 'In that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', will I assemble her that halteth, and I will gather her that is driven out, and her that I have afflicted; '
  '7':
  - type: text
    content: 'and I will make her that halted a remnant, and her that was cast far off a strong nation: and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall reign over them in mount Zion from henceforth, even for ever. '
  '8':
  - type: text
    content: And thou, O tower of the flock, the strong hold of the daughter of Zion, unto thee shall it come, even the first dominion; the kingdom shall come to the daughter of Jerusalem.
  '9':
  - type: text
    content: 'Now why dost thou cry out aloud? '
  - type: text
    content: is there
  - type: text
    content: ' no king in thee? is thy counsellor perished? for pangs have taken thee as a woman in travail. '
