segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hezekiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass in the third year of Hoshea son of Elah king of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Hezekiah the son of Ahaz king of Judah began to reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Twenty and five years old was he when he began to reign; and he reigned twenty and nine years in Jerusalem. His mother''s name also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Abi, the daughter of Zachariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', according to all that David his father did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He removed the high places, and brake the images, and cut down the groves, and brake in pieces the brasen serpent that Moses had made: for unto those days the children of Israel did burn incense to it: and he called it Nehushtan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He trusted in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel; so that after him was none like him among all the kings of Judah, nor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' that were before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For he clave to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' departed not from following him, but kept his commandments, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was with him; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' he prospered whithersoever he went forth: and he rebelled against the king of Assyria, and served him not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He smote the Philistines, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto Gaza, and the borders thereof, from the tower of the watchmen to the fenced city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it came to pass in the fourth year of king Hezekiah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the seventh year of Hoshea son of Elah king of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Shalmaneser king of Assyria came up against Samaria, and besieged it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And at the end of three years they took it: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' in the sixth year of Hezekiah, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the ninth year of Hoshea king of Israel, Samaria was taken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the king of Assyria did carry away Israel unto Assyria, and put them in Halah and in Habor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' the river of Gozan, and in the cities of the Medes: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'because they obeyed not the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, but transgressed his covenant, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all that Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded, and would not hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', nor do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Assyria's Threat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now in the fourteenth year of king Hezekiah did Sennacherib king of Assyria come up against all the fenced cities of Judah, and took them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Hezekiah king of Judah sent to the king of Assyria to Lachish, saying, I have offended; return from me: that which thou puttest on me will I bear. And the king of Assyria appointed unto Hezekiah king of Judah three hundred talents of silver and thirty talents of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Hezekiah gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' all the silver that was found in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and in the treasures of the king''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'At that time did Hezekiah cut off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the gold from
  - type: text
    text: ' the doors of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' the pillars which Hezekiah king of Judah had overlaid, and gave it to the king of Assyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the king of Assyria sent Tartan and Rabsaris and Rab-shakeh from Lachish to king Hezekiah with a great host against Jerusalem. And they went up and came to Jerusalem. And when they were come up, they came and stood by the conduit of the upper pool, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the highway of the fuller''s field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when they had called to the king, there came out to them Eliakim the son of Hilkiah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the household, and Shebna the scribe, and Joah the son of Asaph the recorder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Rab-shakeh said unto them, Speak ye now to Hezekiah, Thus saith the great king, the king of Assyria, What confidence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this wherein thou trustest? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thou sayest, (but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are but
  - type: text
    text: ' vain words,) '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I have
  - type: text
    text: ' counsel and strength for the war. Now on whom dost thou trust, that thou rebellest against me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now, behold, thou trustest upon the staff of this bruised reed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' upon Egypt, on which if a man lean, it will go into his hand, and pierce it: so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Pharaoh king of Egypt unto all that trust on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if ye say unto me, We trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not that he, whose high places and whose altars Hezekiah hath taken away, and hath said to Judah and Jerusalem, Ye shall worship before this altar in Jerusalem? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now therefore, I pray thee, give pledges to my lord the king of Assyria, and I will deliver thee two thousand horses, if thou be able on thy part to set riders upon them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'How then wilt thou turn away the face of one captain of the least of my master''s servants, and put thy trust on Egypt for chariots and for horsemen? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Am I now come up without the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' against this place to destroy it? The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said to me, Go up against this land, and destroy it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then said Eliakim the son of Hilkiah, and Shebna, and Joah, unto Rab-shakeh, Speak, I pray thee, to thy servants in the Syrian language; for we understand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' and talk not with us in the Jews'' language in the ears of the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' on the wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But Rab-shakeh said unto them, Hath my master sent me to thy master, and to thee, to speak these words? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath he
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sent me
  - type: text
    text: ' to the men which sit on the wall, that they may eat their own dung, and drink their own piss with you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Rab-shakeh stood and cried with a loud voice in the Jews'' language, and spake, saying, Hear the word of the great king, the king of Assyria: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Thus saith the king, Let not Hezekiah deceive you: for he shall not be able to deliver you out of his hand: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'neither let Hezekiah make you trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will surely deliver us, and this city shall not be delivered into the hand of the king of Assyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hearken not to Hezekiah: for thus saith the king of Assyria, Make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: an agreement
  - type: text
    text: ' with me by a present, and come out to me, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' eat ye every man of his own vine, and every one of his fig tree, and drink ye every one the waters of his cistern: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'until I come and take you away to a land like your own land, a land of corn and wine, a land of bread and vineyards, a land of oil olive and of honey, that ye may live, and not die: and hearken not unto Hezekiah, when he persuadeth you, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will deliver us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hath any of the gods of the nations delivered at all his land out of the hand of the king of Assyria? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the gods of Hamath, and of Arpad? where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the gods of Sepharvaim, Hena, and Ivah? have they delivered Samaria out of mine hand? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they among all the gods of the countries, that have delivered their country out of mine hand, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' should deliver Jerusalem out of mine hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'But the people held their peace, and answered him not a word: for the king''s commandment was, saying, Answer him not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then came Eliakim the son of Hilkiah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the household, and Shebna the scribe, and Joah the son of Asaph the recorder, to Hezekiah with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' clothes rent, and told him the words of Rab-shakeh.'
