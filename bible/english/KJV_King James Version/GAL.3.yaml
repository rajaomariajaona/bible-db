document_id: GAL.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Defends the Truth of His Message
  - type: text
    content: 'O foolish Galatians, who hath bewitched you, that ye should not obey the truth, before whose eyes Jesus Christ hath been evidently set forth, crucified among you? '
  '10':
  - type: text
    content: 'For as many as are of the works of the law are under the curse: for it is written, Cursed '
  - type: text
    content: is
  - type: text
    content: ' every one that continueth not in all things which are written in the book of the law to do them. '
  '11':
  - type: text
    content: 'But that no man is justified by the law in the sight of God, '
  - type: text
    content: it is
  - type: text
    content: ' evident: for, The just shall live by faith. '
  '12':
  - type: text
    content: 'And the law is not of faith: but, The man that doeth them shall live in them. '
  '13':
  - type: text
    content: 'Christ hath redeemed us from the curse of the law, being made a curse for us: for it is written, Cursed '
  - type: text
    content: is
  - type: text
    content: ' every one that hangeth on a tree: '
  '14':
  - type: text
    content: that the blessing of Abraham might come on the Gentiles through Jesus Christ; that we might receive the promise of the Spirit through faith.
  '15':
  - type: text
    content: 'Brethren, I speak after the manner of men; Though '
  - type: text
    content: it be
  - type: text
    content: ' but a man''s covenant, yet '
  - type: text
    content: if it be
  - type: text
    content: ' confirmed, no man disannulleth, or addeth thereto. '
  '16':
  - type: text
    content: 'Now to Abraham and his seed were the promises made. He saith not, And to seeds, as of many; but as of one, And to thy seed, which is Christ. '
  '17':
  - type: text
    content: 'And this I say, '
  - type: text
    content: that
  - type: text
    content: ' the covenant, that was confirmed before of God in Christ, the law, which was four hundred and thirty years after, cannot disannul, that it should make the promise of none effect. '
  '18':
  - type: text
    content: 'For if the inheritance '
  - type: text
    content: be
  - type: text
    content: ' of the law, '
  - type: text
    content: it is
  - type: text
    content: ' no more of promise: but God gave '
  - type: text
    content: it
  - type: text
    content: ' to Abraham by promise.'
  '19':
  - type: text
    content: 'Wherefore then '
  - type: text
    content: serveth
  - type: text
    content: ' the law? It was added because of transgressions, till the seed should come to whom the promise was made; '
  - type: text
    content: and it was
  - type: text
    content: ' ordained by angels in the hand of a mediator. '
  '2':
  - type: text
    content: 'This only would I learn of you, Received ye the Spirit by the works of the law, or by the hearing of faith? '
  '20':
  - type: text
    content: 'Now a mediator is not '
  - type: text
    content: a mediator
  - type: text
    content: ' of one, but God is one. '
  '21':
  - type: text
    content: Is
  - type: text
    content: ' the law then against the promises of God? God forbid: for if there had been a law given which could have given life, verily righteousness should have been by the law. '
  '22':
  - type: text
    content: But the scripture hath concluded all under sin, that the promise by faith of Jesus Christ might be given to them that believe.
  '23':
  - type: text
    content: 'But before faith came, we were kept under the law, shut up unto the faith which should afterwards be revealed. '
  '24':
  - type: text
    content: 'Wherefore the law was our schoolmaster '
  - type: text
    content: to bring us
  - type: text
    content: ' unto Christ, that we might be justified by faith. '
  '25':
  - type: text
    content: But after that faith is come, we are no longer under a schoolmaster.
  '26':
  - type: text
    content: 'For ye are all the children of God by faith in Christ Jesus. '
  '27':
  - type: text
    content: 'For as many of you as have been baptized into Christ have put on Christ. '
  '28':
  - type: text
    content: 'There is neither Jew nor Greek, there is neither bond nor free, there is neither male nor female: for ye are all one in Christ Jesus. '
  '29':
  - type: text
    content: 'And if ye '
  - type: text
    content: be
  - type: text
    content: ' Christ''s, then are ye Abraham''s seed, and heirs according to the promise.'
  '3':
  - type: text
    content: 'Are ye so foolish? having begun in the Spirit, are ye now made perfect by the flesh? '
  '4':
  - type: text
    content: 'Have ye suffered so many things in vain? if '
  - type: text
    content: it be
  - type: text
    content: ' yet in vain. '
  '5':
  - type: text
    content: 'He therefore that ministereth to you the Spirit, and worketh miracles among you, '
  - type: text
    content: doeth he it
  - type: text
    content: ' by the works of the law, or by the hearing of faith? '
  '6':
  - type: text
    content: Even as Abraham believed God, and it was accounted to him for righteousness.
  '7':
  - type: text
    content: 'Know ye therefore that they which are of faith, the same are the children of Abraham. '
  '8':
  - type: text
    content: 'And the scripture, foreseeing that God would justify the heathen through faith, preached before the gospel unto Abraham, '
  - type: text
    content: saying
  - type: text
    content: ', In thee shall all nations be blessed. '
  '9':
  - type: text
    content: So then they which be of faith are blessed with faithful Abraham.
