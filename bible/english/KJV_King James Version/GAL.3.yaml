document_id: GAL.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Defends the Truth of His Message
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O foolish Galatians, who hath bewitched you, that ye should not obey the truth, before whose eyes Jesus Christ hath been evidently set forth, crucified among you? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For as many as are of the works of the law are under the curse: for it is written, Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' every one that continueth not in all things which are written in the book of the law to do them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But that no man is justified by the law in the sight of God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' evident: for, The just shall live by faith. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the law is not of faith: but, The man that doeth them shall live in them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Christ hath redeemed us from the curse of the law, being made a curse for us: for it is written, Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' every one that hangeth on a tree: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: that the blessing of Abraham might come on the Gentiles through Jesus Christ; that we might receive the promise of the Spirit through faith.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Brethren, I speak after the manner of men; Though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' but a man''s covenant, yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if it be
    - type: text
      text: ' confirmed, no man disannulleth, or addeth thereto. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now to Abraham and his seed were the promises made. He saith not, And to seeds, as of many; but as of one, And to thy seed, which is Christ. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And this I say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the covenant, that was confirmed before of God in Christ, the law, which was four hundred and thirty years after, cannot disannul, that it should make the promise of none effect. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For if the inheritance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' of the law, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' no more of promise: but God gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to Abraham by promise.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Wherefore then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: serveth
    - type: text
      text: ' the law? It was added because of transgressions, till the seed should come to whom the promise was made; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and it was
    - type: text
      text: ' ordained by angels in the hand of a mediator. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'This only would I learn of you, Received ye the Spirit by the works of the law, or by the hearing of faith? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now a mediator is not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a mediator
    - type: text
      text: ' of one, but God is one. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' the law then against the promises of God? God forbid: for if there had been a law given which could have given life, verily righteousness should have been by the law. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But the scripture hath concluded all under sin, that the promise by faith of Jesus Christ might be given to them that believe.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But before faith came, we were kept under the law, shut up unto the faith which should afterwards be revealed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Wherefore the law was our schoolmaster '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to bring us
    - type: text
      text: ' unto Christ, that we might be justified by faith. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But after that faith is come, we are no longer under a schoolmaster.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For ye are all the children of God by faith in Christ Jesus. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For as many of you as have been baptized into Christ have put on Christ. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'There is neither Jew nor Greek, there is neither bond nor free, there is neither male nor female: for ye are all one in Christ Jesus. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And if ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' Christ''s, then are ye Abraham''s seed, and heirs according to the promise.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Are ye so foolish? having begun in the Spirit, are ye now made perfect by the flesh? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Have ye suffered so many things in vain? if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' yet in vain. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He therefore that ministereth to you the Spirit, and worketh miracles among you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doeth he it
    - type: text
      text: ' by the works of the law, or by the hearing of faith? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Even as Abraham believed God, and it was accounted to him for righteousness.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Know ye therefore that they which are of faith, the same are the children of Abraham. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the scripture, foreseeing that God would justify the heathen through faith, preached before the gospel unto Abraham, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', In thee shall all nations be blessed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So then they which be of faith are blessed with faithful Abraham.
