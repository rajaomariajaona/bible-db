document_id: EZK.44,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Temple Officers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought me back the way of the gate of the outward sanctuary which looketh toward the east; and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' shut. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Levites that are gone away far from me, when Israel went astray, which went astray away from me after their idols; they shall even bear their iniquity. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet they shall be ministers in my sanctuary, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: having
    - type: text
      text: ' charge at the gates of the house, and ministering to the house: they shall slay the burnt offering and the sacrifice for the people, and they shall stand before them to minister unto them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because they ministered unto them before their idols, and caused the house of Israel to fall into iniquity; therefore have I lifted up mine hand against them, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', and they shall bear their iniquity. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall not come near unto me, to do the office of a priest unto me, nor to come near to any of my holy things, in the most holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'place:'
    - type: text
      text: ' but they shall bear their shame, and their abominations which they have committed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But I will make them keepers of the charge of the house, for all the service thereof, and for all that shall be done therein.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Priests
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the priests the Levites, the sons of Zadok, that kept the charge of my sanctuary when the children of Israel went astray from me, they shall come near to me to minister unto me, and they shall stand before me to offer unto me the fat and the blood, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ': '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they shall enter into my sanctuary, and they shall come near to my table, to minister unto me, and they shall keep my charge. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' when they enter in at the gates of the inner court, they shall be clothed with linen garments; and no wool shall come upon them, whiles they minister in the gates of the inner court, and within. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall have linen bonnets upon their heads, and shall have linen breeches upon their loins; they shall not gird '
    - type: usfm
      marker: add
      children:
      - type: text
        text: themselves
    - type: text
      text: ' with any thing that causeth sweat. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they go forth into the utter court, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' into the utter court to the people, they shall put off their garments wherein they ministered, and lay them in the holy chambers, and they shall put on other garments; and they shall not sanctify the people with their garments. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto me; This gate shall be shut, it shall not be opened, and no man shall enter in by it; because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the God of Israel, hath entered in by it, therefore it shall be shut. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shall they shave their heads, nor suffer their locks to grow long; they shall only poll their heads. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shall any priest drink wine, when they enter into the inner court. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither shall they take for their wives a widow, nor her that is put away: but they shall take maidens of the seed of the house of Israel, or a widow that had a priest before. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall teach my people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the difference
    - type: text
      text: ' between the holy and profane, and cause them to discern between the unclean and the clean. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in controversy they shall stand in judgment; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' they shall judge it according to my judgments: and they shall keep my laws and my statutes in all mine assemblies; and they shall hallow my sabbaths. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall come at no dead person to defile themselves: but for father, or for mother, or for son, or for daughter, for brother, or for sister that hath had no husband, they may defile themselves. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after he is cleansed, they shall reckon unto him seven days. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the day that he goeth into the sanctuary, unto the inner court, to minister in the sanctuary, he shall offer his sin offering, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be unto them for an inheritance: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' their inheritance: and ye shall give them no possession in Israel: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' their possession. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall eat the meat offering, and the sin offering, and the trespass offering; and every dedicated thing in Israel shall be their''s. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' for the prince; the prince, he shall sit in it to eat bread before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; he shall enter by the way of the porch of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' gate, and shall go out by the way of the same.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the first of all the firstfruits of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', and every oblation of all, of every '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sort
    - type: text
      text: ' of your oblations, shall be the priest''s: ye shall also give unto the priest the first of your dough, that he may cause the blessing to rest in thine house. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priests shall not eat of any thing that is dead of itself, or torn, whether it be fowl or beast.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then brought he me the way of the north gate before the house: and I looked, and, behold, the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' filled the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and I fell upon my face. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, Son of man, mark well, and behold with thine eyes, and hear with thine ears all that I say unto thee concerning all the ordinances of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and all the laws thereof; and mark well the entering in of the house, with every going forth of the sanctuary. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt say to the rebellious, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the house of Israel, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; O ye house of Israel, let it suffice you of all your abominations, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in that ye have brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into my sanctuary
    - type: text
      text: ' strangers, uncircumcised in heart, and uncircumcised in flesh, to be in my sanctuary, to pollute it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' my house, when ye offer my bread, the fat and the blood, and they have broken my covenant because of all your abominations. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye have not kept the charge of mine holy things: but ye have set keepers of my charge in my sanctuary for yourselves.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Levites
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; No stranger, uncircumcised in heart, nor uncircumcised in flesh, shall enter into my sanctuary, of any stranger that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among the children of Israel. '
