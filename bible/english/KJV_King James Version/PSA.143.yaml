document_id: PSA.143
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear my prayer, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', give ear to my supplications:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In thy faithfulness answer me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' in thy righteousness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And enter not into judgment with thy servant:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For in thy sight shall no man living be justified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the enemy hath persecuted my soul; He hath smitten my life down to the ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath made me to dwell in darkness, as those that have been long dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Therefore is my spirit overwhelmed within me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart within me is desolate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I remember the days of old; I meditate on all thy works;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I muse on the work of thy hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I stretch forth my hands unto thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My soul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thirsteth
  - type: text
    text: ' after thee, as a thirsty land. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hear me speedily, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': my spirit faileth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hide not thy face from me, lest I be like unto them that go down into the pit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cause me to hear thy lovingkindness in the morning; For in thee do I trust:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cause me to know the way wherein I should walk; For I lift up my soul unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Deliver me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', from mine enemies:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I flee unto thee to hide me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Teach me to do thy will; for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thy spirit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good; lead me into the land of uprightness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quicken me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for thy name''s sake:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For thy righteousness' sake bring my soul out of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And of thy mercy cut off mine enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And destroy all them that afflict my soul: For I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' thy servant.'
