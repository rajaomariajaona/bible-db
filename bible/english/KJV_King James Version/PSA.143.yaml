document_id: PSA.143,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'Hear my prayer, O '
  - type: text
    content: LORD
  - type: text
    content: ', give ear to my supplications:'
  - type: text
    content: 'In thy faithfulness answer me, '
  - type: text
    content: and
  - type: text
    content: ' in thy righteousness.'
  '10':
  - type: text
    content: 'Teach me to do thy will; for thou '
  - type: text
    content: art
  - type: text
    content: ' my God:'
  - type: text
    content: 'Thy spirit '
  - type: text
    content: is
  - type: text
    content: ' good; lead me into the land of uprightness.'
  '11':
  - type: text
    content: 'Quicken me, O '
  - type: text
    content: LORD
  - type: text
    content: ', for thy name''s sake:'
  - type: text
    content: For thy righteousness' sake bring my soul out of trouble.
  '12':
  - type: text
    content: And of thy mercy cut off mine enemies,
  - type: text
    content: 'And destroy all them that afflict my soul: For I '
  - type: text
    content: am
  - type: text
    content: ' thy servant.'
  '2':
  - type: text
    content: 'And enter not into judgment with thy servant:'
  - type: text
    content: For in thy sight shall no man living be justified.
  '3':
  - type: text
    content: For the enemy hath persecuted my soul; He hath smitten my life down to the ground;
  - type: text
    content: He hath made me to dwell in darkness, as those that have been long dead.
  '4':
  - type: text
    content: Therefore is my spirit overwhelmed within me;
  - type: text
    content: My heart within me is desolate.
  '5':
  - type: text
    content: I remember the days of old; I meditate on all thy works;
  - type: text
    content: I muse on the work of thy hands.
  '6':
  - type: text
    content: 'I stretch forth my hands unto thee:'
  - type: text
    content: 'My soul '
  - type: text
    content: thirsteth
  - type: text
    content: ' after thee, as a thirsty land. '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: 'Hear me speedily, O '
  - type: text
    content: LORD
  - type: text
    content: ': my spirit faileth:'
  - type: text
    content: Hide not thy face from me, lest I be like unto them that go down into the pit.
  '8':
  - type: text
    content: 'Cause me to hear thy lovingkindness in the morning; For in thee do I trust:'
  - type: text
    content: Cause me to know the way wherein I should walk; For I lift up my soul unto thee.
  '9':
  - type: text
    content: 'Deliver me, O '
  - type: text
    content: LORD
  - type: text
    content: ', from mine enemies:'
  - type: text
    content: I flee unto thee to hide me.
