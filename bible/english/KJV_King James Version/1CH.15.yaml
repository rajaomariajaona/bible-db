  - type: text
    content: 'For because ye '
  - type: text
    content: did it
  - type: text
    content: ' not at the first, the '
  - type: text
    content: LORD
  - type: text
    content: ' our God made a breach upon us, for that we sought him not after the due order. '
  '14':
  - type: text
    content: 'So the priests and the Levites sanctified themselves to bring up the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '15':
  - type: text
    content: 'And the children of the Levites bare the ark of God upon their shoulders with the staves thereon, as Moses commanded according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '16':
  - type: text
    content: 'And David spake to the chief of the Levites to appoint their brethren '
  - type: text
    content: to be
  - type: text
    content: ' the singers with instruments of musick, psalteries and harps and cymbals, sounding, by lifting up the voice with joy. '
  '17':
  - type: text
    content: 'So the Levites appointed Heman the son of Joel; and of his brethren, Asaph the son of Berechiah; and of the sons of Merari their brethren, Ethan the son of Kushaiah; '
  '18':
  - type: text
    content: 'and with them their brethren of the second '
  - type: text
    content: degree
  - type: text
    content: ', Zechariah, Ben, and Jaaziel, and Shemiramoth, and Jehiel, and Unni, Eliab, and Benaiah, and Maaseiah, and Mattithiah, and Elipheleh, and Mikneiah, and Obed-edom, and Jeiel, the porters. '
  '19':
  - type: text
    content: 'So the singers, Heman, Asaph, and Ethan, '
  - type: text
    content: were appointed
  - type: text
    content: ' to sound with cymbals of brass; '
  '2':
  - type: text
    content: 'Then David said, None ought to carry the ark of God but the Levites: for them hath the '
  - type: text
    content: LORD
  - type: text
    content: ' chosen to carry the ark of God, and to minister unto him for ever. '
  '20':
  - type: text
    content: 'and Zechariah, and Aziel, and Shemiramoth, and Jehiel, and Unni, and Eliab, and Maaseiah, and Benaiah, with psalteries on Alamoth; '
  '21':
  - type: text
    content: 'and Mattithiah, and Elipheleh, and Mikneiah, and Obed-edom, and Jeiel, and Azaziah, with harps on the Sheminith to excel. '
  '22':
  - type: text
    content: 'And Chenaniah, chief of the Levites, '
  - type: text
    content: was
  - type: text
    content: ' for song: he instructed about the song, because he '
  - type: text
    content: was
  - type: text
    content: ' skilful. '
  '23':
  - type: text
    content: 'And Berechiah and Elkanah '
  - type: text
    content: were
  - type: text
    content: ' doorkeepers for the ark. '
  '24':
  - type: text
    content: 'And Shebaniah, and Jehoshaphat, and Nethaneel, and Amasai, and Zechariah, and Benaiah, and Eliezer, the priests, did blow with the trumpets before the ark of God: and Obed-edom and Jehiah '
  - type: text
    content: were
  - type: text
    content: ' doorkeepers for the ark.'
  '25':
  - type: text
    content: 'So David, and the elders of Israel, and the captains over thousands, went to bring up the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' out of the house of Obed-edom with joy. '
  '26':
  - type: text
    content: 'And it came to pass, when God helped the Levites that bare the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ', that they offered seven bullocks and seven rams. '
  '27':
  - type: text
    content: 'And David '
  - type: text
    content: was
  - type: text
    content: ' clothed with a robe of fine linen, and all the Levites that bare the ark, and the singers, and Chenaniah the master of the song with the singers: David also '
  - type: text
    content: had
  - type: text
    content: ' upon him an ephod of linen. '
  '28':
  - type: text
    content: 'Thus all Israel brought up the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' with shouting, and with sound of the cornet, and with trumpets, and with cymbals, making a noise with psalteries and harps.'
  '29':
  - type: text
    content: 'And it came to pass, '
  - type: text
    content: as
  - type: text
    content: ' the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to the city of David, that Michal the daughter of Saul looking out at a window saw king David dancing and playing: and she despised him in her heart.'
  '3':
  - type: text
    content: 'And David gathered all Israel together to Jerusalem, to bring up the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto his place, which he had prepared for it. '
  '4':
  - type: text
    content: 'And David assembled the children of Aaron, and the Levites: '
  '5':
  - type: text
    content: 'of the sons of Kohath; Uriel the chief, and his brethren an hundred and twenty: '
  '6':
  - type: text
    content: 'of the sons of Merari; Asaiah the chief, and his brethren two hundred and twenty: '
  '7':
  - type: text
    content: 'of the sons of Gershom; Joel the chief, and his brethren an hundred and thirty: '
  '8':
  - type: text
    content: 'of the sons of Elizaphan; Shemaiah the chief, and his brethren two hundred: '
  '9':
  - type: text
    content: 'of the sons of Hebron; Eliel the chief, and his brethren fourscore: '
