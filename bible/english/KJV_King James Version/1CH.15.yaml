    content: 'And David called for Zadok and Abiathar the priests, and for the Levites, for Uriel, Asaiah, and Joel, Shemaiah, and Eliel, and Amminadab, '
  '12':
  - type: text
    content: 'and said unto them, Ye '
  - type: text
    content: are
  - type: text
