document_id: ISA.52
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Awake, awake; put on thy strength, O Zion; put on thy beautiful garments, O Jerusalem, the holy city: for henceforth there shall no more come into thee the uncircumcised and the unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Shake thyself from the dust; arise, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' sit down, O Jerusalem: loose thyself from the bands of thy neck, O captive daughter of Zion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Ye have sold yourselves for nought; and ye shall be redeemed without money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', My people went down aforetime into Egypt to sojourn there; and the Assyrian oppressed them without cause. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now therefore, what have I here, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that my people is taken away for nought? they that rule over them make them to howl, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and my name continually every day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' blasphemed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore my people shall know my name: therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they shall know
  - type: text
    text: ' in that day that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he that doth speak: behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' I.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'How beautiful upon the mountains are the feet of him that bringeth good tidings, that publisheth peace; that bringeth good tidings of good, that publisheth salvation; that saith unto Zion, Thy God reigneth! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Thy watchmen shall lift up the voice; with the voice together shall they sing: for they shall see eye to eye, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall bring again Zion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Break forth into joy, sing together, ye waste places of Jerusalem: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath comforted his people, he hath redeemed Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath made bare his holy arm in the eyes of all the nations; and all the ends of the earth shall see the salvation of our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Depart ye, depart ye, go ye out from thence, touch no unclean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: '; go ye out of the midst of her; be ye clean, that bear the vessels of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For ye shall not go out with haste, nor go by flight: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will go before you; and the God of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' your rereward.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Suffering Servant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Behold, my servant shall deal prudently, he shall be exalted and extolled, and be very high. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As many were astonied at thee; his visage was so marred more than any man, and his form more than the sons of men: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'so shall he sprinkle many nations; the kings shall shut their mouths at him: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which had not been told them shall they see; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which they had not heard shall they consider.'
