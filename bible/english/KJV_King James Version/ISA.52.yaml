document_id: ISA.52,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Awake, awake; put on thy strength, O Zion; put on thy beautiful garments, O Jerusalem, the holy city: for henceforth there shall no more come into thee the uncircumcised and the unclean. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath made bare his holy arm in the eyes of all the nations; and all the ends of the earth shall see the salvation of our God.'
  '11':
  - type: text
    content: 'Depart ye, depart ye, go ye out from thence, touch no unclean '
  - type: text
    content: thing
  - type: text
    content: '; go ye out of the midst of her; be ye clean, that bear the vessels of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'For ye shall not go out with haste, nor go by flight: for the '
  - type: text
    content: LORD
  - type: text
    content: ' will go before you; and the God of Israel '
  - type: text
    content: will be
  - type: text
    content: ' your rereward.'
  - type: heading
    content: The Suffering Servant
  '13':
  - type: text
    content: 'Behold, my servant shall deal prudently, he shall be exalted and extolled, and be very high. '
  '14':
  - type: text
    content: 'As many were astonied at thee; his visage was so marred more than any man, and his form more than the sons of men: '
  '15':
  - type: text
    content: 'so shall he sprinkle many nations; the kings shall shut their mouths at him: for '
  - type: text
    content: that
  - type: text
    content: ' which had not been told them shall they see; and '
  - type: text
    content: that
  - type: text
    content: ' which they had not heard shall they consider.'
  '2':
  - type: text
    content: 'Shake thyself from the dust; arise, '
  - type: text
    content: and
  - type: text
    content: ' sit down, O Jerusalem: loose thyself from the bands of thy neck, O captive daughter of Zion. '
  '3':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Ye have sold yourselves for nought; and ye shall be redeemed without money.'
  '4':
  - type: text
    content: 'For thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', My people went down aforetime into Egypt to sojourn there; and the Assyrian oppressed them without cause. '
  '5':
  - type: text
    content: 'Now therefore, what have I here, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that my people is taken away for nought? they that rule over them make them to howl, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; and my name continually every day '
  - type: text
    content: is
  - type: text
    content: ' blasphemed. '
  '6':
  - type: text
    content: 'Therefore my people shall know my name: therefore '
  - type: text
    content: they shall know
  - type: text
    content: ' in that day that I '
  - type: text
    content: am
  - type: text
    content: ' he that doth speak: behold, '
  - type: text
    content: it is
  - type: text
    content: ' I.'
  '7':
  - type: text
    content: 'How beautiful upon the mountains are the feet of him that bringeth good tidings, that publisheth peace; that bringeth good tidings of good, that publisheth salvation; that saith unto Zion, Thy God reigneth! '
  '8':
  - type: text
    content: 'Thy watchmen shall lift up the voice; with the voice together shall they sing: for they shall see eye to eye, when the '
  - type: text
    content: LORD
  - type: text
    content: ' shall bring again Zion. '
  '9':
  - type: text
    content: 'Break forth into joy, sing together, ye waste places of Jerusalem: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath comforted his people, he hath redeemed Jerusalem. '
