document_id: ROM.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Brethren, my heart''s desire and prayer to God for Israel is, that they might be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I bear them record that they have a zeal of God, but not according to knowledge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For they being ignorant of God''s righteousness, and going about to establish their own righteousness, have not submitted themselves unto the righteousness of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the end of the law for righteousness to every one that believeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For Moses describeth the righteousness which is of the law, That the man which doeth those things shall live by them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But the righteousness which is of faith speaketh on this wise, Say not in thine heart, Who shall ascend into heaven? (that is, to bring Christ down '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from above
  - type: text
    text: ':) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'or, Who shall descend into the deep? (that is, to bring up Christ again from the dead.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But what saith it? The word is nigh thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' in thy mouth, and in thy heart: that is, the word of faith, which we preach; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that if thou shalt confess with thy mouth the Lord Jesus, and shalt believe in thine heart that God hath raised him from the dead, thou shalt be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For with the heart man believeth unto righteousness; and with the mouth confession is made unto salvation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the scripture saith, Whosoever believeth on him shall not be ashamed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For there is no difference between the Jew and the Greek: for the same Lord over all is rich unto all that call upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For whosoever shall call upon the name of the Lord shall be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'How then shall they call on him in whom they have not believed? and how shall they believe in him of whom they have not heard? and how shall they hear without a preacher? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And how shall they preach, except they be sent? as it is written, How beautiful are the feet of them that preach the gospel of peace, and bring glad tidings of good things!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But they have not all obeyed the gospel. For Esaias saith, Lord, who hath believed our report? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So then faith '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cometh
  - type: text
    text: ' by hearing, and hearing by the word of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But I say, Have they not heard? Yes verily,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their sound went into all the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their words unto the ends of the world.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But I say, Did not Israel know? First Moses saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will provoke you to jealousy by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' no people,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' by a foolish nation I will anger you.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But Esaias is very bold, and saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was found of them that sought me not;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was made manifest unto them that asked not after me.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But to Israel he saith, All day long I have stretched forth my hands unto a disobedient and gainsaying people.
