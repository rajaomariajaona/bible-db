document_id: ROM.10,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Brethren, my heart''s desire and prayer to God for Israel is, that they might be saved. '
  '10':
  - type: text
    content: 'For with the heart man believeth unto righteousness; and with the mouth confession is made unto salvation. '
  '11':
  - type: text
    content: 'For the scripture saith, Whosoever believeth on him shall not be ashamed. '
  '12':
  - type: text
    content: 'For there is no difference between the Jew and the Greek: for the same Lord over all is rich unto all that call upon him. '
  '13':
  - type: text
    content: 'For whosoever shall call upon the name of the Lord shall be saved. '
  '14':
  - type: text
    content: 'How then shall they call on him in whom they have not believed? and how shall they believe in him of whom they have not heard? and how shall they hear without a preacher? '
  '15':
  - type: text
    content: And how shall they preach, except they be sent? as it is written, How beautiful are the feet of them that preach the gospel of peace, and bring glad tidings of good things!
  '16':
  - type: text
    content: 'But they have not all obeyed the gospel. For Esaias saith, Lord, who hath believed our report? '
  '17':
  - type: text
    content: 'So then faith '
  - type: text
    content: cometh
  - type: text
    content: ' by hearing, and hearing by the word of God. '
  '18':
  - type: text
    content: But I say, Have they not heard? Yes verily,
  - type: text
    content: Their sound went into all the earth,
  - type: text
    content: And their words unto the ends of the world.
  '19':
  - type: text
    content: But I say, Did not Israel know? First Moses saith,
  - type: text
    content: 'I will provoke you to jealousy by '
  - type: text
    content: them that are
  - type: text
    content: ' no people,'
  - type: text
    content: And
  - type: text
    content: ' by a foolish nation I will anger you.'
  '2':
  - type: text
    content: 'For I bear them record that they have a zeal of God, but not according to knowledge. '
  '20':
  - type: text
    content: But Esaias is very bold, and saith,
  - type: text
    content: I was found of them that sought me not;
  - type: text
    content: I was made manifest unto them that asked not after me.
  '21':
  - type: text
    content: But to Israel he saith, All day long I have stretched forth my hands unto a disobedient and gainsaying people.
  '3':
  - type: text
    content: 'For they being ignorant of God''s righteousness, and going about to establish their own righteousness, have not submitted themselves unto the righteousness of God. '
  '4':
  - type: text
    content: 'For Christ '
  - type: text
    content: is
  - type: text
    content: ' the end of the law for righteousness to every one that believeth. '
  '5':
  - type: text
    content: 'For Moses describeth the righteousness which is of the law, That the man which doeth those things shall live by them. '
  '6':
  - type: text
    content: 'But the righteousness which is of faith speaketh on this wise, Say not in thine heart, Who shall ascend into heaven? (that is, to bring Christ down '
  - type: text
    content: from above
  - type: text
    content: ':) '
  '7':
  - type: text
    content: 'or, Who shall descend into the deep? (that is, to bring up Christ again from the dead.) '
  '8':
  - type: text
    content: 'But what saith it? The word is nigh thee, '
  - type: text
    content: even
  - type: text
    content: ' in thy mouth, and in thy heart: that is, the word of faith, which we preach; '
  '9':
  - type: text
    content: 'that if thou shalt confess with thy mouth the Lord Jesus, and shalt believe in thine heart that God hath raised him from the dead, thou shalt be saved. '
