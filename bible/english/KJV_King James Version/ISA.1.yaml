verses:
  '1':
  - type: text
    content: 'The vision of Isaiah the son of Amoz, which he saw concerning Judah and Jerusalem in the days of Uzziah, Jotham, Ahaz, '
  - type: text
    content: and
  - type: text
    content: ' Hezekiah, kings of Judah. '
  '10':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', ye rulers of Sodom; give ear unto the law of our God, ye people of Gomorrah. '
  '11':
  - type: text
    content: 'To what purpose '
  - type: text
    content: is
  - type: text
    content: ' the multitude of your sacrifices unto me? saith the '
  - type: text
    content: LORD
  - type: text
    content: ': I am full of the burnt offerings of rams, and the fat of fed beasts; and I delight not in the blood of bullocks, or of lambs, or of he goats. '
  '12':
  - type: text
    content: 'When ye come to appear before me, who hath required this at your hand, to tread my courts? '
  '13':
  - type: text
    content: 'Bring no more vain oblations; incense is an abomination unto me; the new moons and sabbaths, the calling of assemblies, I cannot away with; '
  - type: text
    content: it is
  - type: text
    content: ' iniquity, even the solemn meeting. '
  '14':
  - type: text
    content: 'Your new moons and your appointed feasts my soul hateth: they are a trouble unto me; I am weary to bear '
  - type: text
    content: them
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And when ye spread forth your hands, I will hide mine eyes from you: yea, when ye make many prayers, I will not hear: your hands are full of blood. '
  '16':
  - type: text
    content: 'Wash you, make you clean; put away the evil of your doings from before mine eyes; cease to do evil; '
  '17':
  - type: text
    content: learn to do well; seek judgment, relieve the oppressed, judge the fatherless, plead for the widow.
  '18':
  - type: text
    content: 'Come now, and let us reason together, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': though your sins be as scarlet, they shall be as white as snow; though they be red like crimson, they shall be as wool. '
  '19':
  - type: text
    content: 'If ye be willing and obedient, ye shall eat the good of the land: '
  '2':
  - type: text
    content: 'Hear, O heavens, and give ear, O earth: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken, I have nourished and brought up children, and they have rebelled against me. '
  '20':
  - type: text
    content: 'but if ye refuse and rebel, ye shall be devoured with the sword: for the mouth of the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken '
  - type: text
    content: it
  - type: text
    content: .
  '21':
  - type: text
    content: 'How is the faithful city become an harlot! it was full of judgment; righteousness lodged in it; but now murderers. '
  '22':
  - type: text
    content: 'Thy silver is become dross, thy wine mixed with water: '
  '23':
  - type: text
    content: 'thy princes '
  - type: text
    content: are
  - type: text
    content: ' rebellious, and companions of thieves: every one loveth gifts, and followeth after rewards: they judge not the fatherless, neither doth the cause of the widow come unto them.'
  '24':
  - type: text
    content: 'Therefore saith the Lord, the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the mighty One of Israel, Ah, I will ease me of mine adversaries, and avenge me of mine enemies: '
  '25':
  - type: text
    content: 'and I will turn my hand upon thee, and purely purge away thy dross, and take away all thy tin: '
  '26':
  - type: text
    content: 'and I will restore thy judges as at the first, and thy counsellors as at the beginning: afterward thou shalt be called, The city of righteousness, the faithful city. '
  '27':
  - type: text
    content: 'Zion shall be redeemed with judgment, and her converts with righteousness. '
  '28':
  - type: text
    content: 'And the destruction of the transgressors and of the sinners '
  - type: text
    content: shall be
  - type: text
    content: ' together, and they that forsake the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be consumed. '
  '29':
  - type: text
    content: 'For they shall be ashamed of the oaks which ye have desired, and ye shall be confounded for the gardens that ye have chosen. '
  '3':
  - type: text
    content: 'The ox knoweth his owner, and the ass his master''s crib: '
  - type: text
    content: but
  - type: text
    content: ' Israel doth not know, my people doth not consider. '
  '30':
  - type: text
    content: 'For ye shall be as an oak whose leaf fadeth, and as a garden that hath no water. '
  '31':
  - type: text
    content: 'And the strong shall be as tow, and the maker of it as a spark, and they shall both burn together, and none shall quench '
  - type: text
    content: them
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ah sinful nation, a people laden with iniquity, a seed of evildoers, children that are corrupters: they have forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ', they have provoked the Holy One of Israel unto anger, they are gone away backward. '
  '5':
  - type: text
    content: 'Why should ye be stricken any more? ye will revolt more and more: the whole head is sick, and the whole heart faint. '
  '6':
  - type: text
    content: 'From the sole of the foot even unto the head '
  - type: text
    content: there is
  - type: text
    content: ' no soundness in it; '
  - type: text
    content: but
  - type: text
    content: ' wounds, and bruises, and putrifying sores: they have not been closed, neither bound up, neither mollified with ointment. '
  '7':
  - type: text
    content: 'Your country '
  - type: text
    content: is
  - type: text
    content: ' desolate, your cities '
  - type: text
    content: are
  - type: text
    content: ' burned with fire: your land, strangers devour it in your presence, and '
  - type: text
    content: it is
  - type: text
    content: ' desolate, as overthrown by strangers. '
  '8':
  - type: text
    content: 'And the daughter of Zion is left as a cottage in a vineyard, as a lodge in a garden of cucumbers, as a besieged city. '
  '9':
  - type: text
    content: 'Except the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts had left unto us a very small remnant, we should have been as Sodom, '
  - type: text
    content: and
  - type: text
    content: ' we should have been like unto Gomorrah.'
