document_id: ISA.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The vision of Isaiah the son of Amoz, which he saw concerning Judah and Jerusalem in the days of Uzziah, Jotham, Ahaz, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Hezekiah, kings of Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', ye rulers of Sodom; give ear unto the law of our God, ye people of Gomorrah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To what purpose '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the multitude of your sacrifices unto me? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': I am full of the burnt offerings of rams, and the fat of fed beasts; and I delight not in the blood of bullocks, or of lambs, or of he goats. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When ye come to appear before me, who hath required this at your hand, to tread my courts? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring no more vain oblations; incense is an abomination unto me; the new moons and sabbaths, the calling of assemblies, I cannot away with; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' iniquity, even the solemn meeting. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your new moons and your appointed feasts my soul hateth: they are a trouble unto me; I am weary to bear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when ye spread forth your hands, I will hide mine eyes from you: yea, when ye make many prayers, I will not hear: your hands are full of blood. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wash you, make you clean; put away the evil of your doings from before mine eyes; cease to do evil; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: learn to do well; seek judgment, relieve the oppressed, judge the fatherless, plead for the widow.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come now, and let us reason together, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': though your sins be as scarlet, they shall be as white as snow; though they be red like crimson, they shall be as wool. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If ye be willing and obedient, ye shall eat the good of the land: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear, O heavens, and give ear, O earth: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken, I have nourished and brought up children, and they have rebelled against me. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but if ye refuse and rebel, ye shall be devoured with the sword: for the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How is the faithful city become an harlot! it was full of judgment; righteousness lodged in it; but now murderers. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy silver is become dross, thy wine mixed with water: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thy princes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' rebellious, and companions of thieves: every one loveth gifts, and followeth after rewards: they judge not the fatherless, neither doth the cause of the widow come unto them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore saith the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the mighty One of Israel, Ah, I will ease me of mine adversaries, and avenge me of mine enemies: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will turn my hand upon thee, and purely purge away thy dross, and take away all thy tin: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will restore thy judges as at the first, and thy counsellors as at the beginning: afterward thou shalt be called, The city of righteousness, the faithful city. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zion shall be redeemed with judgment, and her converts with righteousness. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the destruction of the transgressors and of the sinners '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' together, and they that forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be consumed. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they shall be ashamed of the oaks which ye have desired, and ye shall be confounded for the gardens that ye have chosen. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The ox knoweth his owner, and the ass his master''s crib: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' Israel doth not know, my people doth not consider. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye shall be as an oak whose leaf fadeth, and as a garden that hath no water. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the strong shall be as tow, and the maker of it as a spark, and they shall both burn together, and none shall quench '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ah sinful nation, a people laden with iniquity, a seed of evildoers, children that are corrupters: they have forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', they have provoked the Holy One of Israel unto anger, they are gone away backward. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why should ye be stricken any more? ye will revolt more and more: the whole head is sick, and the whole heart faint. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the sole of the foot even unto the head '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no soundness in it; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' wounds, and bruises, and putrifying sores: they have not been closed, neither bound up, neither mollified with ointment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your country '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' desolate, your cities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' burned with fire: your land, strangers devour it in your presence, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' desolate, as overthrown by strangers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the daughter of Zion is left as a cottage in a vineyard, as a lodge in a garden of cucumbers, as a besieged city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Except the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts had left unto us a very small remnant, we should have been as Sodom, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' we should have been like unto Gomorrah.'
