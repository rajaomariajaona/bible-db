document_id: JOB.30
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they that are
  - type: text
    text: ' younger than I have me in derision,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whose fathers I would have disdained to have set with the dogs of my flock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Yea, whereto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: might
  - type: text
    text: ' the strength of their hands '
  - type: usfm
    marker: add
    children:
    - type: text
      text: profit
  - type: text
    text: ' me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In whom old age was perished?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For want and famine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' solitary;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fleeing into the wilderness in former time desolate and waste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who cut up mallows by the bushes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And juniper roots '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' their meat.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They were driven forth from among '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: '(They cried after them as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after
  - type: text
    text: ' a thief;)'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: To dwell in the cliffs of the valleys,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' caves of the earth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the rocks.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Among the bushes they brayed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Under the nettles they were gathered together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: They were
  - type: text
    text: ' children of fools, yea, children of base men:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They were viler than the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And now am I their song,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, I am their byword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They abhor me, they flee far from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And spare not to spit in my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Because he hath loosed my cord, and afflicted me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have also let loose the bridle before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' right '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hand
  - type: text
    text: ' rise the youth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They push away my feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they raise up against me the ways of their destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They mar my path,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They set forward my calamity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have no helper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They came '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon me
  - type: text
    text: ' as a wide breaking in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of waters:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the desolation they rolled themselves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon me
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Terrors are turned upon me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They pursue my soul as the wind:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my welfare passeth away as a cloud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And now my soul is poured out upon me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The days of affliction have taken hold upon me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'My bones are pierced in me in the night season:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my sinews take no rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'By the great force '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of my disease
  - type: text
    text: ' is my garment changed:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It bindeth me about as the collar of my coat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He hath cast me into the mire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I am become like dust and ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I cry unto thee, and thou dost not hear me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I stand up, and thou regardest me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Thou art become cruel to me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: With thy strong hand thou opposest thyself against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thou liftest me up to the wind; thou causest me to ride '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon it
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And dissolvest my substance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou wilt bring me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' death,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the house appointed for all living.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Howbeit he will not stretch out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand to the grave,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though they cry in his destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Did not I weep for him that was in trouble?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' my soul grieved for the poor?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When I looked for good, then evil came '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'unto me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And when I waited for light, there came darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'My bowels boiled, and rested not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The days of affliction prevented me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'I went mourning without the sun:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I stood up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I cried in the congregation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I am a brother to dragons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a companion to owls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: My skin is black upon me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my bones are burned with heat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'My harp also is '
  - type: usfm
    marker: add
    children:
    - type: text
      text: turned
  - type: text
    text: ' to mourning,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my organ into the voice of them that weep.
