document_id: JOB.30,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'But now '
  - type: text
    content: they that are
  - type: text
    content: ' younger than I have me in derision,'
  - type: text
    content: Whose fathers I would have disdained to have set with the dogs of my flock.
  '10':
  - type: text
    content: They abhor me, they flee far from me,
  - type: text
    content: And spare not to spit in my face.
  '11':
  - type: text
    content: Because he hath loosed my cord, and afflicted me,
  - type: text
    content: They have also let loose the bridle before me.
  '12':
  - type: text
    content: 'Upon '
  - type: text
    content: my
  - type: text
    content: ' right '
  - type: text
    content: hand
  - type: text
    content: ' rise the youth;'
  - type: text
    content: They push away my feet,
  - type: text
    content: And they raise up against me the ways of their destruction.
  '13':
  - type: text
    content: They mar my path,
  - type: text
    content: They set forward my calamity,
  - type: text
    content: They have no helper.
  '14':
  - type: text
    content: 'They came '
  - type: text
    content: upon me
  - type: text
    content: ' as a wide breaking in '
  - type: text
    content: 'of waters:'
  - type: text
    content: 'In the desolation they rolled themselves '
  - type: text
    content: upon me
  - type: text
    content: .
  '15':
  - type: text
    content: 'Terrors are turned upon me:'
  - type: text
    content: 'They pursue my soul as the wind:'
  - type: text
    content: And my welfare passeth away as a cloud.
  '16':
  - type: text
    content: And now my soul is poured out upon me;
  - type: text
    content: The days of affliction have taken hold upon me.
  '17':
  - type: text
    content: 'My bones are pierced in me in the night season:'
  - type: text
    content: And my sinews take no rest.
  '18':
  - type: text
    content: 'By the great force '
  - type: text
    content: of my disease
  - type: text
    content: ' is my garment changed:'
  - type: text
    content: It bindeth me about as the collar of my coat.
  '19':
  - type: text
    content: He hath cast me into the mire,
  - type: text
    content: And I am become like dust and ashes.
  '2':
  - type: text
    content: 'Yea, whereto '
  - type: text
    content: might
  - type: text
    content: ' the strength of their hands '
  - type: text
    content: profit
  - type: text
    content: ' me,'
  - type: text
    content: In whom old age was perished?
  '20':
  - type: text
    content: 'I cry unto thee, and thou dost not hear me:'
  - type: text
    content: 'I stand up, and thou regardest me '
  - type: text
    content: not
  - type: text
    content: .
  '21':
  - type: text
    content: 'Thou art become cruel to me:'
  - type: text
    content: With thy strong hand thou opposest thyself against me.
  '22':
  - type: text
    content: 'Thou liftest me up to the wind; thou causest me to ride '
  - type: text
    content: upon it
  - type: text
    content: ','
  - type: text
    content: And dissolvest my substance.
  '23':
  - type: text
    content: 'For I know '
  - type: text
    content: that
  - type: text
    content: ' thou wilt bring me '
  - type: text
    content: to
  - type: text
    content: ' death,'
  - type: text
    content: 'And '
  - type: text
    content: to
  - type: text
    content: ' the house appointed for all living.'
  '24':
  - type: text
    content: 'Howbeit he will not stretch out '
  - type: text
    content: his
  - type: text
    content: ' hand to the grave,'
  - type: text
    content: Though they cry in his destruction.
  '25':
  - type: text
    content: Did not I weep for him that was in trouble?
  - type: text
    content: 'Was '
  - type: text
    content: not
  - type: text
    content: ' my soul grieved for the poor?'
  '26':
  - type: text
    content: 'When I looked for good, then evil came '
  - type: text
    content: 'unto me:'
  - type: text
    content: And when I waited for light, there came darkness.
  '27':
  - type: text
    content: 'My bowels boiled, and rested not:'
  - type: text
    content: The days of affliction prevented me.
  '28':
  - type: text
    content: 'I went mourning without the sun:'
  - type: text
    content: 'I stood up, '
  - type: text
    content: and
  - type: text
    content: ' I cried in the congregation.'
  '29':
  - type: text
    content: I am a brother to dragons,
  - type: text
    content: And a companion to owls.
  '3':
  - type: text
    content: 'For want and famine '
  - type: text
    content: they were
  - type: text
    content: ' solitary;'
  - type: text
    content: Fleeing into the wilderness in former time desolate and waste.
  '30':
  - type: text
    content: My skin is black upon me,
  - type: text
    content: And my bones are burned with heat.
  '31':
  - type: text
    content: 'My harp also is '
  - type: text
    content: turned
  - type: text
    content: ' to mourning,'
  - type: text
    content: And my organ into the voice of them that weep.
  '4':
  - type: text
    content: Who cut up mallows by the bushes,
  - type: text
    content: 'And juniper roots '
  - type: text
    content: for
  - type: text
    content: ' their meat.'
  '5':
  - type: text
    content: 'They were driven forth from among '
  - type: text
    content: men
  - type: text
    content: ','
  - type: text
    content: '(They cried after them as '
  - type: text
    content: after
  - type: text
    content: ' a thief;)'
  '6':
  - type: text
    content: To dwell in the cliffs of the valleys,
  - type: text
    content: in
  - type: text
    content: ' caves of the earth, and '
  - type: text
    content: in
  - type: text
    content: ' the rocks.'
  '7':
  - type: text
    content: Among the bushes they brayed;
  - type: text
    content: Under the nettles they were gathered together.
  '8':
  - type: text
    content: ' '
  - type: text
    content: They were
  - type: text
    content: ' children of fools, yea, children of base men:'
  - type: text
    content: They were viler than the earth.
  '9':
  - type: text
    content: And now am I their song,
  - type: text
    content: Yea, I am their byword.
