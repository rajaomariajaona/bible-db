document_id: PSA.44,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician for the sons of Korah, Maschil.
  - type: text
    content: We have heard with our ears, O God, our fathers have told us,
  - type: text
    content: What
  - type: text
    content: ' work thou didst in their days, in the times of old.'
  '10':
  - type: text
    content: 'Thou makest us to turn back from the enemy:'
  - type: text
    content: And they which hate us spoil for themselves.
  '11':
  - type: text
    content: 'Thou hast given us like sheep '
  - type: text
    content: appointed
  - type: text
    content: ' for meat;'
  - type: text
    content: And hast scattered us among the heathen.
  '12':
  - type: text
    content: Thou sellest thy people for nought,
  - type: text
    content: 'And dost not increase '
  - type: text
    content: thy wealth
  - type: text
    content: ' by their price.'
  '13':
  - type: text
    content: Thou makest us a reproach to our neighbours,
  - type: text
    content: A scorn and a derision to them that are round about us.
  '14':
  - type: text
    content: Thou makest us a byword among the heathen,
  - type: text
    content: A shaking of the head among the people.
  '15':
  - type: text
    content: 'My confusion '
  - type: text
    content: is
  - type: text
    content: ' continually before me,'
  - type: text
    content: And the shame of my face hath covered me,
  '16':
  - type: text
    content: For the voice of him that reproacheth and blasphemeth;
  - type: text
    content: By reason of the enemy and avenger.
  '17':
  - type: text
    content: All this is come upon us; yet have we not forgotten thee,
  - type: text
    content: Neither have we dealt falsely in thy covenant.
  '18':
  - type: text
    content: Our heart is not turned back,
  - type: text
    content: Neither have our steps declined from thy way;
  '19':
  - type: text
    content: Though thou hast sore broken us in the place of dragons,
  - type: text
    content: And covered us with the shadow of death.
  '2':
  - type: text
    content: ' '
  - type: text
    content: How
  - type: text
    content: ' thou didst drive out the heathen with thy hand, and plantedst them;'
  - type: text
    content: How
  - type: text
    content: ' thou didst afflict the people, and cast them out.'
  '20':
  - type: text
    content: If we have forgotten the name of our God, or stretched out our hands to a strange god;
  '21':
  - type: text
    content: Shall not God search this out? For he knoweth the secrets of the heart.
  '22':
  - type: text
    content: Yea, for thy sake are we killed all the day long;
  - type: text
    content: We are counted as sheep for the slaughter.
  '23':
  - type: text
    content: Awake, why sleepest thou, O Lord?
  - type: text
    content: 'Arise, cast '
  - type: text
    content: us
  - type: text
    content: ' not off for ever.'
  '24':
  - type: text
    content: Wherefore hidest thou thy face,
  - type: text
    content: And
  - type: text
    content: ' forgettest our affliction and our oppression?'
  '25':
  - type: text
    content: 'For our soul is bowed down to the dust:'
  - type: text
    content: Our belly cleaveth unto the earth.
  '26':
  - type: text
    content: Arise for our help,
  - type: text
    content: And redeem us for thy mercies' sake.
  '3':
  - type: text
    content: For they got not the land in possession by their own sword,
  - type: text
    content: 'Neither did their own arm save them:'
  - type: text
    content: But thy right hand, and thine arm, and the light of thy countenance,
  - type: text
    content: Because thou hadst a favour unto them.
  '4':
  - type: text
    content: 'Thou art my King, O God: Command deliverances for Jacob.'
  '5':
  - type: text
    content: 'Through thee will we push down our enemies:'
  - type: text
    content: Through thy name will we tread them under that rise up against us.
  '6':
  - type: text
    content: For I will not trust in my bow,
  - type: text
    content: Neither shall my sword save me.
  '7':
  - type: text
    content: But thou hast saved us from our enemies,
  - type: text
    content: And hast put them to shame that hated us.
  '8':
  - type: text
    content: In God we boast all the day long,
  - type: text
    content: 'And praise thy name for ever. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: But thou hast cast off, and put us to shame;
  - type: text
    content: And goest not forth with our armies.
