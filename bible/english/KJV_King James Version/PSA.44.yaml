document_id: PSA.44
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician for the sons of Korah, Maschil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We have heard with our ears, O God, our fathers have told us,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: What
  - type: text
    text: ' work thou didst in their days, in the times of old.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: How
  - type: text
    text: ' thou didst drive out the heathen with thy hand, and plantedst them;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: How
  - type: text
    text: ' thou didst afflict the people, and cast them out.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For they got not the land in possession by their own sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither did their own arm save them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But thy right hand, and thine arm, and the light of thy countenance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because thou hadst a favour unto them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thou art my King, O God: Command deliverances for Jacob.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Through thee will we push down our enemies:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Through thy name will we tread them under that rise up against us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For I will not trust in my bow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither shall my sword save me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But thou hast saved us from our enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And hast put them to shame that hated us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In God we boast all the day long,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And praise thy name for ever. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But thou hast cast off, and put us to shame;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And goest not forth with our armies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou makest us to turn back from the enemy:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they which hate us spoil for themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thou hast given us like sheep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: appointed
  - type: text
    text: ' for meat;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And hast scattered us among the heathen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thou sellest thy people for nought,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And dost not increase '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy wealth
  - type: text
    text: ' by their price.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Thou makest us a reproach to our neighbours,
- type: usfm
  marker: q2
  children:
  - type: text
    text: A scorn and a derision to them that are round about us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thou makest us a byword among the heathen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: A shaking of the head among the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'My confusion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' continually before me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the shame of my face hath covered me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For the voice of him that reproacheth and blasphemeth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: By reason of the enemy and avenger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All this is come upon us; yet have we not forgotten thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither have we dealt falsely in thy covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Our heart is not turned back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither have our steps declined from thy way;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Though thou hast sore broken us in the place of dragons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And covered us with the shadow of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If we have forgotten the name of our God, or stretched out our hands to a strange god;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Shall not God search this out? For he knoweth the secrets of the heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Yea, for thy sake are we killed all the day long;
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are counted as sheep for the slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Awake, why sleepest thou, O Lord?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Arise, cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' not off for ever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Wherefore hidest thou thy face,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' forgettest our affliction and our oppression?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For our soul is bowed down to the dust:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our belly cleaveth unto the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Arise for our help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And redeem us for thy mercies' sake.
