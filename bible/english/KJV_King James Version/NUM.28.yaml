document_id: NUM.28,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Calendar of Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: add
      children:
      - type: text
        text: this is
    - type: text
      text: ' the burnt offering of every sabbath, beside the continual burnt offering, and his drink offering.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And in the beginnings of your months ye shall offer a burnt offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; two young bullocks, and one ram, seven lambs of the first year without spot; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and three tenth deals of flour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a meat offering, mingled with oil, for one bullock; and two tenth deals of flour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a meat offering, mingled with oil, for one ram; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and a several tenth deal of flour mingled with oil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a meat offering unto one lamb; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering of a sweet savour, a sacrifice made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And their drink offerings shall be half an hin of wine unto a bullock, and the third '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an hin unto a ram, and a fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an hin unto a lamb: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the burnt offering of every month throughout the months of the year. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And one kid of the goats for a sin offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be offered, beside the continual burnt offering, and his drink offering.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And in the fourteenth day of the first month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the passover of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And in the fifteenth day of this month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the feast: seven days shall unleavened bread be eaten. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'In the first day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an holy convocation; ye shall do no manner of servile work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'therein:'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'but ye shall offer a sacrifice made by fire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; two young bullocks, and one ram, and seven lambs of the first year: they shall be unto you without blemish: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Command the children of Israel, and say unto them, My offering, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my bread for my sacrifices made by fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sweet savour unto me, shall ye observe to offer unto me in their due season. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and their meat offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be of
    - type: text
      text: ' flour mingled with oil: three tenth deals shall ye offer for a bullock, and two tenth deals for a ram; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'a several tenth deal shalt thou offer for every lamb, throughout the seven lambs: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and one goat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering, to make an atonement for you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ye shall offer these beside the burnt offering in the morning, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for a continual burnt offering. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'After this manner ye shall offer daily, throughout the seven days, the meat of the sacrifice made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': it shall be offered beside the continual burnt offering, and his drink offering. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And on the seventh day ye shall have an holy convocation; ye shall do no servile work.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Also in the day of the firstfruits, when ye bring a new meat offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', after your weeks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be out
    - type: text
      text: ', ye shall have an holy convocation; ye shall do no servile work: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'but ye shall offer the burnt offering for a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; two young bullocks, one ram, seven lambs of the first year; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and their meat offering of flour mingled with oil, three tenth deals unto one bullock, two tenth deals unto one ram, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'a several tenth deal unto one lamb, throughout the seven lambs; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And thou shalt say unto them, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the offering made by fire which ye shall offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; two lambs of the first year without spot day by day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a continual burnt offering. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' one kid of the goats, to make an atonement for you. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ye shall offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' beside the continual burnt offering, and his meat offering, (they shall be unto you without blemish) and their drink offerings.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The one lamb shalt thou offer in the morning, and the other lamb shalt thou offer at even; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and a tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an ephah of flour for a meat offering, mingled with the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an hin of beaten oil. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' a continual burnt offering, which was ordained in mount Sinai for a sweet savour, a sacrifice made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the drink offering thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an hin for the one lamb: in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ' shalt thou cause the strong wine to be poured unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a drink offering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the other lamb shalt thou offer at even: as the meat offering of the morning, and as the drink offering thereof, thou shalt offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', a sacrifice made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And on the sabbath day two lambs of the first year without spot, and two tenth deals of flour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a meat offering, mingled with oil, and the drink offering thereof: '
