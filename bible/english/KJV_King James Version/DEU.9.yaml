  '1':
  - type: text
    content: 'Hear, O Israel: Thou '
  - type: text
    content: art
  - type: text
    content: ' to pass over Jordan this day, to go in to possess nations greater and mightier than thyself, cities great and fenced up to heaven, '
  '10':
  - type: text
    content: 'and the '
  - type: text
    content: LORD
  - type: text
