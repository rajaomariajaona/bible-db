  - type: text
    content: was written
  - type: text
    content: ' according to all the words, which the '
  - type: text
    content: LORD
  - type: text
    content: ' spake with you in the mount out of the midst of the fire in the day of the assembly. '
  '11':
  - type: text
    content: 'And it came to pass at the end of forty days and forty nights, '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
