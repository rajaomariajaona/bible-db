  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Arise, get thee down quickly from hence; for thy people which thou hast brought forth out of Egypt have corrupted '
  - type: text
    content: themselves
  - type: text
    content: '; they are quickly turned aside out of the way which I commanded them; they have made them a molten image. '
  '13':
  - type: text
    content: 'Furthermore the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto me, saying, I have seen this people, and, behold, it '
  - type: text
    content: is
  - type: text
    content: ' a stiffnecked people: '
  '14':
  - type: text
    content: 'let me alone, that I may destroy them, and blot out their name from under heaven: and I will make of thee a nation mightier and greater than they. '
  '15':
  - type: text
    content: 'So I turned and came down from the mount, and the mount burned with fire: and the two tables of the covenant '
  - type: text
    content: were
  - type: text
    content: ' in my two hands. '
  '16':
  - type: text
    content: 'And I looked, and, behold, ye had sinned against the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, '
  - type: text
    content: and
  - type: text
    content: ' had made you a molten calf: ye had turned aside quickly out of the way which the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded you. '
  '17':
  - type: text
    content: 'And I took the two tables, and cast them out of my two hands, and brake them before your eyes. '
  '18':
  - type: text
    content: 'And I fell down before the '
  - type: text
    content: LORD
  - type: text
    content: ', as at the first, forty days and forty nights: I did neither eat bread, nor drink water, because of all your sins which ye sinned, in doing wickedly in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', to provoke him to anger. '
  '19':
  - type: text
    content: 'For I was afraid of the anger and hot displeasure, wherewith the '
  - type: text
    content: LORD
  - type: text
    content: ' was wroth against you to destroy you. But the '
  - type: text
    content: LORD
  - type: text
    content: ' hearkened unto me at that time also. '
  '2':
  - type: text
    content: 'a people great and tall, the children of the Anakims, whom thou knowest, and '
  - type: text
    content: of whom
  - type: text
    content: ' thou hast heard '
  - type: text
    content: say
  - type: text
    content: ', Who can stand before the children of Anak! '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' was very angry with Aaron to have destroyed him: and I prayed for Aaron also the same time. '
  '21':
  - type: text
    content: 'And I took your sin, the calf which ye had made, and burnt it with fire, and stamped it, '
  - type: text
    content: and
  - type: text
    content: ' ground '
  - type: text
    content: it
  - type: text
    content: ' very small, '
  - type: text
    content: even
  - type: text
    content: ' until it was as small as dust: and I cast the dust thereof into the brook that descended out of the mount. '
  '22':
  - type: text
    content: 'And at Taberah, and at Massah, and at Kibroth-hattaavah, ye provoked the '
  - type: text
    content: LORD
  - type: text
    content: ' to wrath. '
  '23':
  - type: text
    content: 'Likewise when the '
  - type: text
    content: LORD
  - type: text
    content: ' sent you from Kadesh-barnea, saying, Go up and possess the land which I have given you; then ye rebelled against the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and ye believed him not, nor hearkened to his voice. '
  '24':
  - type: text
    content: 'Ye have been rebellious against the '
  - type: text
    content: LORD
  - type: text
    content: ' from the day that I knew you.'
  '25':
  - type: text
    content: 'Thus I fell down before the '
  - type: text
    content: LORD
  - type: text
    content: ' forty days and forty nights, as I fell down '
  - type: text
    content: at the first
  - type: text
    content: '; because the '
  - type: text
    content: LORD
  - type: text
    content: ' had said he would destroy you. '
  '26':
  - type: text
    content: 'I prayed therefore unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, O Lord '
  - type: text
    content: GOD
  - type: text
    content: ', destroy not thy people and thine inheritance, which thou hast redeemed through thy greatness, which thou hast brought forth out of Egypt with a mighty hand. '
  '27':
  - type: text
    content: 'Remember thy servants, Abraham, Isaac, and Jacob; look not unto the stubbornness of this people, nor to their wickedness, nor to their sin: '
  '28':
  - type: text
    content: 'lest the land whence thou broughtest us out say, Because the '
  - type: text
    content: LORD
  - type: text
    content: ' was not able to bring them into the land which he promised them, and because he hated them, he hath brought them out to slay them in the wilderness. '
  '29':
  - type: text
    content: 'Yet they '
  - type: text
    content: are
  - type: text
    content: ' thy people and thine inheritance, which thou broughtest out by thy mighty power and by thy stretched out arm.'
  '3':
  - type: text
    content: 'Understand therefore this day, that the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God '
  - type: text
    content: is
  - type: text
    content: ' he which goeth over before thee; '
  - type: text
    content: as
  - type: text
    content: ' a consuming fire he shall destroy them, and he shall bring them down before thy face: so shalt thou drive them out, and destroy them quickly, as the '
  - type: text
    content: LORD
  - type: text
    content: ' hath said unto thee. '
  '4':
  - type: text
    content: 'Speak not thou in thine heart, after that the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath cast them out from before thee, saying, For my righteousness the '
  - type: text
    content: LORD
  - type: text
    content: ' hath brought me in to possess this land: but for the wickedness of these nations the '
  - type: text
    content: LORD
  - type: text
    content: ' doth drive them out from before thee. '
  '5':
  - type: text
    content: 'Not for thy righteousness, or for the uprightness of thine heart, dost thou go to possess their land: but for the wickedness of these nations the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God doth drive them out from before thee, and that he may perform the word which the '
  - type: text
    content: LORD
  - type: text
    content: ' sware unto thy fathers, Abraham, Isaac, and Jacob.'
  '6':
  - type: text
    content: 'Understand therefore, that the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God giveth thee not this good land to possess it for thy righteousness; for thou '
  - type: text
    content: art
  - type: text
    content: ' a stiffnecked people. '
  '7':
  - type: text
    content: 'Remember, '
  - type: text
    content: and
  - type: text
    content: ' forget not, how thou provokedst the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God to wrath in the wilderness: from the day that thou didst depart out of the land of Egypt, until ye came unto this place, ye have been rebellious against the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Also in Horeb ye provoked the '
  - type: text
    content: LORD
  - type: text
    content: ' to wrath, so that the '
  - type: text
    content: LORD
  - type: text
    content: ' was angry with you to have destroyed you. '
  '9':
  - type: text
    content: 'When I was gone up into the mount to receive the tables of stone, '
  - type: text
    content: even
  - type: text
    content: ' the tables of the covenant which the '
  - type: text
    content: LORD
  - type: text
    content: ' made with you, then I abode in the mount forty days and forty nights, I neither did eat bread nor drink water: '
