  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Naomi had a kinsman of her husband''s, a mighty man of wealth, of the family of Elimelech; and his name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Boaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Ruth the Moabitess said unto Naomi, Let me now go to the field, and glean ears of corn after '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' in whose sight I shall find grace. And she said unto her, Go, my daughter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And she went, and came, and gleaned in the field after the reapers: and her hap was to light on a part of the field '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonging
  - type: text
    text: ' unto Boaz, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of the kindred of Elimelech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And, behold, Boaz came from Beth-lehem, and said unto the reapers, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with you. And they answered him, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bless thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then said Boaz unto his servant that was set over the reapers, Whose damsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the servant that was set over the reapers answered and said, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the Moabitish damsel that came back with Naomi out of the country of Moab: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and she said, I pray you, let me glean and gather after the reapers among the sheaves: so she came, and hath continued even from the morning until now, that she tarried a little in the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then said Boaz unto Ruth, Hearest thou not, my daughter? Go not to glean in another field, neither go from hence, but abide here fast by my maidens: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' thine eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' on the field that they do reap, and go thou after them: have I not charged the young men that they shall not touch thee? and when thou art athirst, go unto the vessels, and drink of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which the young men have drawn. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then she fell on her face, and bowed herself to the ground, and said unto him, Why have I found grace in thine eyes, that thou shouldest take knowledge of me, seeing I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a stranger? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Boaz answered and said unto her, It hath fully been shewed me, all that thou hast done unto thy mother in law since the death of thine husband: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' thou hast left thy father and thy mother, and the land of thy nativity, and art come unto a people which thou knewest not heretofore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' recompense thy work, and a full reward be given thee of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, under whose wings thou art come to trust. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then she said, Let me find favour in thy sight, my lord; for that thou hast comforted me, and for that thou hast spoken friendly unto thine handmaid, though I be not like unto one of thine handmaidens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Boaz said unto her, At mealtime come thou hither, and eat of the bread, and dip thy morsel in the vinegar. And she sat beside the reapers: and he reached her parched '
  - type: usfm
    marker: add
    children:
    - type: text
      text: corn
  - type: text
    text: ', and she did eat, and was sufficed, and left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when she was risen up to glean, Boaz commanded his young men, saying, Let her glean even among the sheaves, and reproach her not: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and let fall also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the handfuls of purpose for her, and leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', that she may glean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and rebuke her not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So she gleaned in the field until even, and beat out that she had gleaned: and it was about an ephah of barley. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And she took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' up, and went into the city: and her mother in law saw what she had gleaned: and she brought forth, and gave to her that she had reserved after she was sufficed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And her mother in law said unto her, Where hast thou gleaned to day? and where wroughtest thou? blessed be he that did take knowledge of thee. And she shewed her mother in law with whom she had wrought, and said, The man''s name with whom I wrought to day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Boaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Naomi said unto her daughter in law, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who hath not left off his kindness to the living and to the dead. And Naomi said unto her, The man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near of kin unto us, one of our next kinsmen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Ruth the Moabitess said, He said unto me also, Thou shalt keep fast by my young men, until they have ended all my harvest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Naomi said unto Ruth her daughter in law, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' good, my daughter, that thou go out with his maidens, that they meet thee not in any other field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So she kept fast by the maidens of Boaz to glean unto the end of barley harvest and of wheat harvest; and dwelt with her mother in law.
