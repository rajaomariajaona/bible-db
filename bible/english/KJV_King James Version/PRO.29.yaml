document_id: PRO.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'He, that being often reproved hardeneth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' neck,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall suddenly be destroyed, and that without remedy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The bloodthirsty hate the upright:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the just seek his soul.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'A fool uttereth all his mind:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' keepeth it in till afterwards.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If a ruler hearken to lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All his servants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wicked.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The poor and the deceitful man meet together:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' lighteneth both their eyes.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The king that faithfully judgeth the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His throne shall be established for ever.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The rod and reproof give wisdom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a child left '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to himself
    - type: text
      text: ' bringeth his mother to shame.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When the wicked are multiplied, transgression increaseth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous shall see their fall.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Correct thy son, and he shall give thee rest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, he shall give delight unto thy soul.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no vision, the people perish:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that keepeth the law, happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A servant will not be corrected by words:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For though he understand he will not answer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When the righteous are in authority, the people rejoice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when the wicked beareth rule, the people mourn.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Seest thou a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' hasty in his words?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' more hope of a fool than of him.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He that delicately bringeth up his servant from a child
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shall have him become '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' son at the length.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: An angry man stirreth up strife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a furious man aboundeth in transgression.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'A man''s pride shall bring him low:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But honour shall uphold the humble in spirit.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Whoso is partner with a thief hateth his own soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He heareth cursing, and bewrayeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The fear of man bringeth a snare:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But whoso putteth his trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be safe.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Many seek the ruler's favour;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' man''s judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cometh
    - type: text
      text: ' from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'An unjust man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an abomination to the just:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' upright in the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' abomination to the wicked.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Whoso loveth wisdom rejoiceth his father:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that keepeth company with harlots spendeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' substance.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The king by judgment establisheth the land:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that receiveth gifts overthroweth it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A man that flattereth his neighbour
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Spreadeth a net for his feet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In the transgression of an evil man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a snare:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous doth sing and rejoice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The righteous considereth the cause of the poor:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' the wicked regardeth not to know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Scornful men bring a city into a snare:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' turn away wrath.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' a wise man contendeth with a foolish man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whether he rage or laugh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no rest.'
