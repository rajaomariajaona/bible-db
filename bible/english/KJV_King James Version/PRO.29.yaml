document_id: PRO.29,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'He, that being often reproved hardeneth '
  - type: text
    content: his
  - type: text
    content: ' neck,'
  - type: text
    content: Shall suddenly be destroyed, and that without remedy.
  '10':
  - type: text
    content: 'The bloodthirsty hate the upright:'
  - type: text
    content: But the just seek his soul.
  '11':
  - type: text
    content: 'A fool uttereth all his mind:'
  - type: text
    content: 'But a wise '
  - type: text
    content: man
  - type: text
    content: ' keepeth it in till afterwards.'
  '12':
  - type: text
    content: If a ruler hearken to lies,
  - type: text
    content: 'All his servants '
  - type: text
    content: are
  - type: text
    content: ' wicked.'
  '13':
  - type: text
    content: 'The poor and the deceitful man meet together:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' lighteneth both their eyes.'
  '14':
  - type: text
    content: The king that faithfully judgeth the poor,
  - type: text
    content: His throne shall be established for ever.
  '15':
  - type: text
    content: 'The rod and reproof give wisdom:'
  - type: text
    content: 'But a child left '
  - type: text
    content: to himself
  - type: text
    content: ' bringeth his mother to shame.'
  '16':
  - type: text
    content: 'When the wicked are multiplied, transgression increaseth:'
  - type: text
    content: But the righteous shall see their fall.
  '17':
  - type: text
    content: Correct thy son, and he shall give thee rest;
  - type: text
    content: Yea, he shall give delight unto thy soul.
  '18':
  - type: text
    content: 'Where '
  - type: text
    content: there is
  - type: text
    content: ' no vision, the people perish:'
  - type: text
    content: 'But he that keepeth the law, happy '
  - type: text
    content: is
  - type: text
    content: ' he.'
  '19':
  - type: text
    content: 'A servant will not be corrected by words:'
  - type: text
    content: For though he understand he will not answer.
  '2':
  - type: text
    content: 'When the righteous are in authority, the people rejoice:'
  - type: text
    content: But when the wicked beareth rule, the people mourn.
  '20':
  - type: text
    content: 'Seest thou a man '
  - type: text
    content: that is
  - type: text
    content: ' hasty in his words?'
  - type: text
    content: There is
  - type: text
    content: ' more hope of a fool than of him.'
  '21':
  - type: text
    content: He that delicately bringeth up his servant from a child
  - type: text
    content: 'Shall have him become '
  - type: text
    content: his
  - type: text
    content: ' son at the length.'
  '22':
  - type: text
    content: An angry man stirreth up strife,
  - type: text
    content: And a furious man aboundeth in transgression.
  '23':
  - type: text
    content: 'A man''s pride shall bring him low:'
  - type: text
    content: But honour shall uphold the humble in spirit.
  '24':
  - type: text
    content: 'Whoso is partner with a thief hateth his own soul:'
  - type: text
    content: 'He heareth cursing, and bewrayeth '
  - type: text
    content: it
  - type: text
    content: ' not.'
  '25':
  - type: text
    content: 'The fear of man bringeth a snare:'
  - type: text
    content: 'But whoso putteth his trust in the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be safe.'
  '26':
  - type: text
    content: Many seek the ruler's favour;
  - type: text
    content: 'But '
  - type: text
    content: every
  - type: text
    content: ' man''s judgment '
  - type: text
    content: cometh
  - type: text
    content: ' from the '
  - type: text
    content: LORD
  - type: text
    content: .
  '27':
  - type: text
    content: 'An unjust man '
  - type: text
    content: is
  - type: text
    content: ' an abomination to the just:'
  - type: text
    content: 'And '
  - type: text
    content: he that is
  - type: text
    content: ' upright in the way '
  - type: text
    content: is
  - type: text
    content: ' abomination to the wicked.'
  '3':
  - type: text
    content: 'Whoso loveth wisdom rejoiceth his father:'
  - type: text
    content: 'But he that keepeth company with harlots spendeth '
  - type: text
    content: his
  - type: text
    content: ' substance.'
  '4':
  - type: text
    content: 'The king by judgment establisheth the land:'
  - type: text
    content: But he that receiveth gifts overthroweth it.
  '5':
  - type: text
    content: A man that flattereth his neighbour
  - type: text
    content: Spreadeth a net for his feet.
  '6':
  - type: text
    content: 'In the transgression of an evil man '
  - type: text
    content: there is
  - type: text
    content: ' a snare:'
  - type: text
    content: But the righteous doth sing and rejoice.
  '7':
  - type: text
    content: 'The righteous considereth the cause of the poor:'
  - type: text
    content: But
  - type: text
    content: ' the wicked regardeth not to know '
  - type: text
    content: it
  - type: text
    content: .
  '8':
  - type: text
    content: 'Scornful men bring a city into a snare:'
  - type: text
    content: 'But wise '
  - type: text
    content: men
  - type: text
    content: ' turn away wrath.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: If
  - type: text
    content: ' a wise man contendeth with a foolish man,'
  - type: text
    content: 'Whether he rage or laugh, '
  - type: text
    content: there is
  - type: text
    content: ' no rest.'
