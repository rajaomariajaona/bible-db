document_id: 2KI.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Elisha said, Hear ye the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', To morrow about this time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' a measure of fine flour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be sold
    - type: text
      text: ' for a shekel, and two measures of barley for a shekel, in the gate of Samaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So they came and called unto the porter of the city: and they told them, saying, We came to the camp of the Syrians, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no man there, neither voice of man, but horses tied, and asses tied, and the tents as they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he called the porters; and they told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to the king''s house within. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the king arose in the night, and said unto his servants, I will now shew you what the Syrians have done to us. They know that we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' hungry; therefore are they gone out of the camp to hide themselves in the field, saying, When they come out of the city, we shall catch them alive, and get into the city. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And one of his servants answered and said, Let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' take, I pray thee, five of the horses that remain, which are left in the city, (behold, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as all the multitude of Israel that are left in it: behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I say
    - type: text
      text: ', they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' even as all the multitude of the Israelites that are consumed:) and let us send and see. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They took therefore two chariot horses; and the king sent after the host of the Syrians, saying, Go and see. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they went after them unto Jordan: and, lo, all the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' full of garments and vessels, which the Syrians had cast away in their haste. And the messengers returned, and told the king.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the people went out, and spoiled the tents of the Syrians. So a measure of fine flour was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sold
    - type: text
      text: ' for a shekel, and two measures of barley for a shekel, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the king appointed the lord on whose hand he leaned to have the charge of the gate: and the people trode upon him in the gate, and he died, as the man of God had said, who spake when the king came down to him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And it came to pass as the man of God had spoken to the king, saying, Two measures of barley for a shekel, and a measure of fine flour for a shekel, shall be to morrow about this time in the gate of Samaria: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and that lord answered the man of God, and said, Now, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' should make windows in heaven, might such a thing be? And he said, Behold, thou shalt see it with thine eyes, but shalt not eat thereof. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then a lord on whose hand the king leaned answered the man of God, and said, Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' would make windows in heaven, might this thing be? And he said, Behold, thou shalt see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with thine eyes, but shalt not eat thereof.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Flight of the Syrians
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And so it fell out unto him: for the people trode upon him in the gate, and he died.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And there were four leprous men at the entering in of the gate: and they said one to another, Why sit we here until we die? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'If we say, We will enter into the city, then the famine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the city, and we shall die there: and if we sit still here, we die also. Now therefore come, and let us fall unto the host of the Syrians: if they save us alive, we shall live; and if they kill us, we shall but die. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they rose up in the twilight, to go unto the camp of the Syrians: and when they were come to the uttermost part of the camp of Syria, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no man there. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had made the host of the Syrians to hear a noise of chariots, and a noise of horses, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the noise of a great host: and they said one to another, Lo, the king of Israel hath hired against us the kings of the Hittites, and the kings of the Egyptians, to come upon us. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Wherefore they arose and fled in the twilight, and left their tents, and their horses, and their asses, even the camp as it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ', and fled for their life. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And when these lepers came to the uttermost part of the camp, they went into one tent, and did eat and drink, and carried thence silver, and gold, and raiment, and went and hid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; and came again, and entered into another tent, and carried thence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ', and went and hid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then they said one to another, We do not well: this day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a day of good tidings, and we hold our peace: if we tarry till the morning light, some mischief will come upon us: now therefore come, that we may go and tell the king''s household. '
