  '6':
  - type: text
    content: 'For by wise counsel thou shalt make thy war:'
  - type: text
    content: 'And in multitude of counsellors '
  - type: text
    content: there is
  - type: text
    content: ' safety.'
  '7':
  - type: text
    content: 'Wisdom '
  - type: text
    content: is
  - type: text
    content: ' too high for a fool:'
  - type: text
