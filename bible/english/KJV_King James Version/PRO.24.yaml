  '23':
  - type: text
    content: 'These '
  - type: text
    content: things
  - type: text
    content: ' also '
  - type: text
    content: belong
  - type: text
    content: ' to the wise.'
  - type: text
    content: It is
  - type: text
    content: ' not good to have respect of persons in judgment.'
  '24':
  - type: text
    content: 'He that saith unto the wicked, Thou '
  - type: text
    content: art
  - type: text
    content: ' righteous;'
  - type: text
    content: 'Him shall the people curse, nations shall abhor him:'
  '25':
  - type: text
    content: 'But to them that rebuke '
  - type: text
    content: him
  - type: text
    content: ' shall be delight,'
  - type: text
