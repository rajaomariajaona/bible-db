  - type: text
    content: ' shall kiss '
  - type: text
    content: his
  - type: text
    content: ' lips'
  - type: text
    content: That giveth a right answer.
  '27':
  - type: text
    content: Prepare thy work without,
  - type: text
    content: And make it fit for thyself in the field;
  - type: text
    content: And afterwards build thine house.
  '28':
  - type: text
    content: Be not a witness against thy neighbour without cause;
  - type: text
    content: 'And deceive '
  - type: text
    content: not
  - type: text
    content: ' with thy lips.'
  '29':
  - type: text
    content: 'Say not, I will do so to him as he hath done to me:'
  - type: text
    content: I will render to the man according to his work.
  '3':
  - type: text
    content: Through wisdom is an house builded;
  - type: text
    content: 'And by understanding it is established:'
  '30':
  - type: text
    content: I went by the field of the slothful,
  - type: text
    content: And by the vineyard of the man void of understanding;
  '31':
  - type: text
    content: And, lo, it was all grown over with thorns,
  - type: text
    content: And
  - type: text
    content: ' nettles had covered the face thereof,'
  - type: text
