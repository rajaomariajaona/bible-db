document_id: PRO.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be not thou envious against evil men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither desire to be with them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' thou faint in the day of adversity,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thy strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' small.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If thou forbear to deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' drawn unto death,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those that are
    - type: text
      text: ' ready to be slain;'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou sayest, Behold, we knew it not;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Doth not he that pondereth the heart consider '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he that keepeth thy soul, doth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' he know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' he render to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' man according to his works?'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My son, eat thou honey, because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the honeycomb, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' sweet to thy taste:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' the knowledge of wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto thy soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When thou hast found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', then there shall be a reward,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy expectation shall not be cut off.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lay not wait, O wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', against the dwelling of the righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Spoil not his resting place:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For a just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' falleth seven times, and riseth up again:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked shall fall into mischief.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejoice not when thine enemy falleth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And let not thine heart be glad when he stumbleth:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lest the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and it displease him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he turn away his wrath from him.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fret not thyself because of evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither be thou envious at the wicked;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their heart studieth destruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their lips talk of mischief.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For there shall be no reward to the evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The candle of the wicked shall be put out.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My son, fear thou the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' and the king:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' meddle not with them that are given to change:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their calamity shall rise suddenly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And who knoweth the ruin of them both?
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' to the wise.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' not good to have respect of persons in judgment.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that saith unto the wicked, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Him shall the people curse, nations shall abhor him:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But to them that rebuke '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' shall be delight,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a good blessing shall come upon them.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Every man
    - type: text
      text: ' shall kiss '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' lips'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That giveth a right answer.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare thy work without,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And make it fit for thyself in the field;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And afterwards build thine house.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be not a witness against thy neighbour without cause;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And deceive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' with thy lips.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say not, I will do so to him as he hath done to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will render to the man according to his work.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through wisdom is an house builded;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And by understanding it is established:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I went by the field of the slothful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by the vineyard of the man void of understanding;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, lo, it was all grown over with thorns,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' nettles had covered the face thereof,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the stone wall thereof was broken down.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then I saw, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' considered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' well:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I looked upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it, and
    - type: text
      text: ' received instruction.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' a little sleep, a little slumber,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A little folding of the hands to sleep:'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So shall thy poverty come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' one that travelleth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy want as an armed man.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by knowledge shall the chambers be filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With all precious and pleasant riches.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A wise man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' strong;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, a man of knowledge increaseth strength.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For by wise counsel thou shalt make thy war:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in multitude of counsellors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' safety.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' too high for a fool:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He openeth not his mouth in the gate.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that deviseth to do evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall be called a mischievous person.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The thought of foolishness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sin:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the scorner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an abomination to men.'
