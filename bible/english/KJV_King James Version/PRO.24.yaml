  '19':
  - type: text
    content: 'Fret not thyself because of evil '
  - type: text
    content: men
  - type: text
    content: ','
  - type: text
    content: Neither be thou envious at the wicked;
  '2':
  - type: text
    content: For their heart studieth destruction,
  - type: text
    content: And their lips talk of mischief.
  '20':
  - type: text
    content: 'For there shall be no reward to the evil '
  - type: text
    content: man
  - type: text
    content: ;
  - type: text
    content: The candle of the wicked shall be put out.
  '21':
  - type: text
    content: 'My son, fear thou the '
  - type: text
