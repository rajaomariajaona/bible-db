document_id: PRO.24
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Be not thou envious against evil men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither desire to be with them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For their heart studieth destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their lips talk of mischief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Through wisdom is an house builded;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And by understanding it is established:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And by knowledge shall the chambers be filled
- type: usfm
  marker: q2
  children:
  - type: text
    text: With all precious and pleasant riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A wise man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' strong;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, a man of knowledge increaseth strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For by wise counsel thou shalt make thy war:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in multitude of counsellors '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' safety.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' too high for a fool:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He openeth not his mouth in the gate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He that deviseth to do evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall be called a mischievous person.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The thought of foolishness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sin:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the scorner '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an abomination to men.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: If
  - type: text
    text: ' thou faint in the day of adversity,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thy strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' small.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If thou forbear to deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' drawn unto death,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those that are
  - type: text
    text: ' ready to be slain;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If thou sayest, Behold, we knew it not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Doth not he that pondereth the heart consider '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And he that keepeth thy soul, doth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' he know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' he render to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every
  - type: text
    text: ' man according to his works?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'My son, eat thou honey, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' good;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the honeycomb, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' sweet to thy taste:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' the knowledge of wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto thy soul:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When thou hast found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', then there shall be a reward,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy expectation shall not be cut off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lay not wait, O wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', against the dwelling of the righteous;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Spoil not his resting place:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For a just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' falleth seven times, and riseth up again:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the wicked shall fall into mischief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Rejoice not when thine enemy falleth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And let not thine heart be glad when he stumbleth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lest the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and it displease him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he turn away his wrath from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fret not thyself because of evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither be thou envious at the wicked;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For there shall be no reward to the evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The candle of the wicked shall be put out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'My son, fear thou the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' and the king:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' meddle not with them that are given to change:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For their calamity shall rise suddenly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And who knoweth the ruin of them both?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belong
  - type: text
    text: ' to the wise.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not good to have respect of persons in judgment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He that saith unto the wicked, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' righteous;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Him shall the people curse, nations shall abhor him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But to them that rebuke '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' shall be delight,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a good blessing shall come upon them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Every man
  - type: text
    text: ' shall kiss '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' lips'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That giveth a right answer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Prepare thy work without,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And make it fit for thyself in the field;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And afterwards build thine house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Be not a witness against thy neighbour without cause;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And deceive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' with thy lips.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Say not, I will do so to him as he hath done to me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will render to the man according to his work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I went by the field of the slothful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by the vineyard of the man void of understanding;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And, lo, it was all grown over with thorns,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' nettles had covered the face thereof,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the stone wall thereof was broken down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then I saw, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' considered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' well:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I looked upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it, and
  - type: text
    text: ' received instruction.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yet
  - type: text
    text: ' a little sleep, a little slumber,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A little folding of the hands to sleep:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So shall thy poverty come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' one that travelleth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy want as an armed man.
