document_id: 1CH.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass after this, that Nahash the king of the children of Ammon died, and his son reigned in his stead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David said, I will shew kindness unto Hanun the son of Nahash, because his father shewed kindness to me. And David sent messengers to comfort him concerning his father. So the servants of David came into the land of the children of Ammon to Hanun, to comfort him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But the princes of the children of Ammon said to Hanun, Thinkest thou that David doth honour thy father, that he hath sent comforters unto thee? are not his servants come unto thee for to search, and to overthrow, and to spy out the land? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Wherefore Hanun took David''s servants, and shaved them, and cut off their garments in the midst hard by their buttocks, and sent them away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then there went '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ', and told David how the men were served. And he sent to meet them: for the men were greatly ashamed. And the king said, Tarry at Jericho until your beards be grown, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when the children of Ammon saw that they had made themselves odious to David, Hanun and the children of Ammon sent a thousand talents of silver to hire them chariots and horsemen out of Mesopotamia, and out of Syria-maachah, and out of Zobah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So they hired thirty and two thousand chariots, and the king of Maachah and his people; who came and pitched before Medeba. And the children of Ammon gathered themselves together from their cities, and came to battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when David heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', he sent Joab, and all the host of the mighty men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the children of Ammon came out, and put the battle in array before the gate of the city: and the kings that were come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' by themselves in the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now when Joab saw that the battle was set against him before and behind, he chose out of all the choice of Israel, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in array against the Syrians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the rest of the people he delivered unto the hand of Abishai his brother, and they set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' in array against the children of Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said, If the Syrians be too strong for me, then thou shalt help me: but if the children of Ammon be too strong for thee, then I will help thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be of good courage, and let us behave ourselves valiantly for our people, and for the cities of our God: and let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' good in his sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Joab and the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him drew nigh before the Syrians unto the battle; and they fled before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And when the children of Ammon saw that the Syrians were fled, they likewise fled before Abishai his brother, and entered into the city. Then Joab came to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And when the Syrians saw that they were put to the worse before Israel, they sent messengers, and drew forth the Syrians that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' beyond the river: and Shophach the captain of the host of Hadarezer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: went
  - type: text
    text: ' before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it was told David; and he gathered all Israel, and passed over Jordan, and came upon them, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the battle
  - type: text
    text: ' in array against them. So when David had put the battle in array against the Syrians, they fought with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the Syrians fled before Israel; and David slew of the Syrians seven thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men which fought in
  - type: text
    text: ' chariots, and forty thousand footmen, and killed Shophach the captain of the host. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when the servants of Hadarezer saw that they were put to the worse before Israel, they made peace with David, and became his servants: neither would the Syrians help the children of Ammon any more.'
