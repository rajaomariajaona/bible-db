  '2':
  - type: text
    content: 'And David said, I will shew kindness unto Hanun the son of Nahash, because his father shewed kindness to me. And David sent messengers to comfort him concerning his father. So the servants of David came into the land of the children of Ammon to Hanun, to comfort him. '
  '3':
  - type: text
    content: 'But the princes of the children of Ammon said to Hanun, Thinkest thou that David doth honour thy father, that he hath sent comforters unto thee? are not his servants come unto thee for to search, and to overthrow, and to spy out the land? '
  '4':
  - type: text
    content: 'Wherefore Hanun took David''s servants, and shaved them, and cut off their garments in the midst hard by their buttocks, and sent them away. '
  '5':
