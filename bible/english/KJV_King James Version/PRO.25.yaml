document_id: PRO.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Proverbs of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' also proverbs of Solomon, which the men of Hezekiah king of Judah copied out.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' the glory of God to conceal a thing:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the honour of kings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to search out a matter.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The heaven for height, and the earth for depth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the heart of kings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unsearchable.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Take away the dross from the silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And there shall come forth a vessel for the finer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Take away the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' before the king,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his throne shall be established in righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Put not forth thyself in the presence of the king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And stand not in the place of great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'men:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' that it be said unto thee, Come up hither;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than that thou shouldest be put lower in the presence of the prince
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whom thine eyes have seen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Go not forth hastily to strive,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Lest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou know not
  - type: text
    text: ' what to do in the end thereof,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When thy neighbour hath put thee to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Debate thy cause with thy neighbour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And discover not a secret to another:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lest he that heareth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' put thee to shame,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thine infamy turn not away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A word fitly spoken
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is like
  - type: text
    text: ' apples of gold in pictures of silver.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' an earring of gold, and an ornament of fine gold,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: So is
  - type: text
    text: ' a wise reprover upon an obedient ear.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: As the cold of snow in the time of harvest,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: So is
  - type: text
    text: ' a faithful messenger to them that send him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For he refresheth the soul of his masters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Whoso boasteth himself of a false gift
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is like
  - type: text
    text: ' clouds and wind without rain.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: By long forbearing is a prince persuaded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a soft tongue breaketh the bone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hast thou found honey? eat so much as is sufficient for thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lest thou be filled therewith, and vomit it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Withdraw thy foot from thy neighbour's house;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Lest he be weary of thee, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' hate thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A man that beareth false witness against his neighbour
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' a maul, and a sword, and a sharp arrow.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Confidence in an unfaithful man in time of trouble
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is like
  - type: text
    text: ' a broken tooth, and a foot out of joint.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' he that taketh away a garment in cold weather, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and as
  - type: text
    text: ' vinegar upon nitre,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that singeth songs to an heavy heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If thine enemy be hungry, give him bread to eat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And if he be thirsty, give him water to drink:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For thou shalt heap coals of fire upon his head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall reward thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The north wind driveth away rain:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: doth
  - type: text
    text: ' an angry countenance a backbiting tongue.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' better to dwell in the corner of the housetop,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than with a brawling woman and in a wide house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' cold waters to a thirsty soul,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good news from a far country.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A righteous man falling down before the wicked
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is as
  - type: text
    text: ' a troubled fountain, and a corrupt spring.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not good to eat much honey:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for men
  - type: text
    text: ' to search their own glory '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is not
  - type: text
    text: ' glory.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' no rule over his own spirit'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is like
  - type: text
    text: ' a city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' broken down, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' without walls.'
