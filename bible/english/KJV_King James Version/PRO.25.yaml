  '1':
  - type: heading
    content: Proverbs of Solomon
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' also proverbs of Solomon, which the men of Hezekiah king of Judah copied out.'
  '10':
  - type: text
    content: 'Lest he that heareth '
  - type: text
    content: it
  - type: text
    content: ' put thee to shame,'
  - type: text
    content: And thine infamy turn not away.
  '11':
  - type: text
    content: A word fitly spoken
  - type: text
    content: Is like
  - type: text
    content: ' apples of gold in pictures of silver.'
  '12':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' an earring of gold, and an ornament of fine gold,'
  - type: text
    content: So is
  - type: text
    content: ' a wise reprover upon an obedient ear.'
  '13':
  - type: text
    content: As the cold of snow in the time of harvest,
  - type: text
    content: So is
  - type: text
    content: ' a faithful messenger to them that send him:'
  - type: text
    content: For he refresheth the soul of his masters.
  '14':
  - type: text
    content: Whoso boasteth himself of a false gift
  - type: text
    content: Is like
  - type: text
    content: ' clouds and wind without rain.'
  '15':
  - type: text
    content: By long forbearing is a prince persuaded,
  - type: text
    content: And a soft tongue breaketh the bone.
  '16':
  - type: text
    content: Hast thou found honey? eat so much as is sufficient for thee,
  - type: text
    content: Lest thou be filled therewith, and vomit it.
  '17':
  - type: text
    content: Withdraw thy foot from thy neighbour's house;
  - type: text
    content: 'Lest he be weary of thee, and '
  - type: text
    content: so
  - type: text
    content: ' hate thee.'
  '18':
  - type: text
    content: A man that beareth false witness against his neighbour
  - type: text
    content: Is
  - type: text
    content: ' a maul, and a sword, and a sharp arrow.'
  '19':
  - type: text
    content: Confidence in an unfaithful man in time of trouble
  - type: text
    content: Is like
  - type: text
    content: ' a broken tooth, and a foot out of joint.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' the glory of God to conceal a thing:'
  - type: text
    content: 'But the honour of kings '
  - type: text
    content: is
  - type: text
    content: ' to search out a matter.'
  '20':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' he that taketh away a garment in cold weather, '
  - type: text
    content: and as
  - type: text
    content: ' vinegar upon nitre,'
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' he that singeth songs to an heavy heart.'
  '21':
  - type: text
    content: If thine enemy be hungry, give him bread to eat;
  - type: text
    content: 'And if he be thirsty, give him water to drink:'
  '22':
  - type: text
    content: For thou shalt heap coals of fire upon his head,
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall reward thee.'
  '23':
  - type: text
    content: 'The north wind driveth away rain:'
  - type: text
    content: 'So '
  - type: text
    content: doth
  - type: text
    content: ' an angry countenance a backbiting tongue.'
  '24':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' better to dwell in the corner of the housetop,'
  - type: text
    content: Than with a brawling woman and in a wide house.
  '25':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' cold waters to a thirsty soul,'
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' good news from a far country.'
  '26':
  - type: text
    content: A righteous man falling down before the wicked
  - type: text
    content: Is as
  - type: text
    content: ' a troubled fountain, and a corrupt spring.'
  '27':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' not good to eat much honey:'
  - type: text
    content: 'So '
  - type: text
    content: for men
  - type: text
    content: ' to search their own glory '
  - type: text
    content: is not
  - type: text
    content: ' glory.'
  '28':
  - type: text
    content: 'He that '
  - type: text
    content: hath
  - type: text
    content: ' no rule over his own spirit'
  - type: text
    content: Is like
  - type: text
    content: ' a city '
  - type: text
    content: that is
  - type: text
    content: ' broken down, '
  - type: text
    content: and
  - type: text
    content: ' without walls.'
  '3':
  - type: text
    content: The heaven for height, and the earth for depth,
  - type: text
    content: 'And the heart of kings '
  - type: text
    content: is
  - type: text
    content: ' unsearchable.'
  '4':
  - type: text
    content: Take away the dross from the silver,
  - type: text
    content: And there shall come forth a vessel for the finer.
  '5':
  - type: text
    content: 'Take away the wicked '
  - type: text
    content: from
  - type: text
    content: ' before the king,'
  - type: text
    content: And his throne shall be established in righteousness.
  '6':
  - type: text
    content: Put not forth thyself in the presence of the king,
  - type: text
    content: 'And stand not in the place of great '
  - type: text
    content: 'men:'
  '7':
  - type: text
    content: 'For better '
  - type: text
    content: it is
  - type: text
    content: ' that it be said unto thee, Come up hither;'
  - type: text
    content: Than that thou shouldest be put lower in the presence of the prince
  - type: text
    content: Whom thine eyes have seen.
  '8':
  - type: text
    content: Go not forth hastily to strive,
  - type: text
    content: 'Lest '
  - type: text
    content: thou know not
  - type: text
    content: ' what to do in the end thereof,'
  - type: text
    content: When thy neighbour hath put thee to shame.
  '9':
  - type: text
    content: 'Debate thy cause with thy neighbour '
  - type: text
    content: himself
  - type: text
    content: ;
  - type: text
    content: 'And discover not a secret to another:'
