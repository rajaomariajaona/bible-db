document_id: 1CH.27,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Overseers
  - type: text
    content: 'Now the children of Israel after their number, '
  - type: text
    content: to wit
  - type: text
    content: ', the chief fathers and captains of thousands and hundreds, and their officers that served the king in any matter of the courses, which came in and went out month by month throughout all the months of the year, of every course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '10':
  - type: text
    content: 'The seventh '
  - type: text
    content: captain
  - type: text
    content: ' for the seventh month '
  - type: text
    content: was
  - type: text
    content: ' Helez the Pelonite, of the children of Ephraim: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '11':
  - type: text
    content: 'The eighth '
  - type: text
    content: captain
  - type: text
    content: ' for the eighth month '
  - type: text
    content: was
  - type: text
    content: ' Sibbecai the Hushathite, of the Zarhites: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '12':
  - type: text
    content: 'The ninth '
  - type: text
    content: captain
  - type: text
    content: ' for the ninth month '
  - type: text
    content: was
  - type: text
    content: ' Abiezer the Anetothite, of the Benjamites: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '13':
  - type: text
    content: 'The tenth '
  - type: text
    content: captain
  - type: text
    content: ' for the tenth month '
  - type: text
    content: was
  - type: text
    content: ' Maharai the Netophathite, of the Zarhites: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '14':
  - type: text
    content: 'The eleventh '
  - type: text
    content: captain
  - type: text
    content: ' for the eleventh month '
  - type: text
    content: was
  - type: text
    content: ' Benaiah the Pirathonite, of the children of Ephraim: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '15':
  - type: text
    content: 'The twelfth '
  - type: text
    content: captain
  - type: text
    content: ' for the twelfth month '
  - type: text
    content: was
  - type: text
    content: ' Heldai the Netophathite, of Othniel: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand.'
  '16':
  - type: text
    content: 'Furthermore over the tribes of Israel: the ruler of the Reubenites '
  - type: text
    content: was
  - type: text
    content: ' Eliezer the son of Zichri: of the Simeonites, Shephatiah the son of Maachah: '
  '17':
  - type: text
    content: 'of the Levites, Hashabiah the son of Kemuel: of the Aaronites, Zadok: '
  '18':
  - type: text
    content: 'of Judah, Elihu, '
  - type: text
    content: one
  - type: text
    content: ' of the brethren of David: of Issachar, Omri the son of Michael: '
  '19':
  - type: text
    content: 'of Zebulun, Ishmaiah the son of Obadiah: of Naphtali, Jerimoth the son of Azriel: '
  '2':
  - type: text
    content: 'Over the first course for the first month '
  - type: text
    content: was
  - type: text
    content: ' Jashobeam the son of Zabdiel: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '20':
  - type: text
    content: 'of the children of Ephraim, Hoshea the son of Azaziah: of the half tribe of Manasseh, Joel the son of Pedaiah: '
  '21':
  - type: text
    content: 'of the half '
  - type: text
    content: tribe
  - type: text
    content: ' of Manasseh in Gilead, Iddo the son of Zechariah: of Benjamin, Jaasiel the son of Abner: '
  '22':
  - type: text
    content: 'of Dan, Azareel the son of Jeroham. These '
  - type: text
    content: were
  - type: text
    content: ' the princes of the tribes of Israel. '
  '23':
  - type: text
    content: 'But David took not the number of them from twenty years old and under: because the '
  - type: text
    content: LORD
  - type: text
    content: ' had said he would increase Israel like to the stars of the heavens. '
  '24':
  - type: text
    content: Joab the son of Zeruiah began to number, but he finished not, because there fell wrath for it against Israel; neither was the number put in the account of the chronicles of king David.
  '25':
  - type: text
    content: 'And over the king''s treasures '
  - type: text
    content: was
  - type: text
    content: ' Azmaveth the son of Adiel: and over the storehouses in the fields, in the cities, and in the villages, and in the castles, '
  - type: text
    content: was
  - type: text
    content: ' Jehonathan the son of Uzziah: '
  '26':
  - type: text
    content: 'and over them that did the work of the field for tillage of the ground '
  - type: text
    content: was
  - type: text
    content: ' Ezri the son of Chelub: '
  '27':
  - type: text
    content: 'and over the vineyards '
  - type: text
    content: was
  - type: text
    content: ' Shimei the Ramathite: over the increase of the vineyards for the wine cellars '
  - type: text
    content: was
  - type: text
    content: ' Zabdi the Shiphmite: '
  '28':
  - type: text
    content: 'and over the olive trees and the sycomore trees that '
  - type: text
    content: were
  - type: text
    content: ' in the low plains '
  - type: text
    content: was
  - type: text
    content: ' Baal-hanan the Gederite: and over the cellars of oil '
  - type: text
    content: was
  - type: text
    content: ' Joash: '
  '29':
  - type: text
    content: 'and over the herds that fed in Sharon '
  - type: text
    content: was
  - type: text
    content: ' Shitrai the Sharonite: and over the herds '
  - type: text
    content: that were
  - type: text
    content: ' in the valleys '
  - type: text
    content: was
  - type: text
    content: ' Shaphat the son of Adlai: '
  '3':
  - type: text
    content: 'Of the children of Perez '
  - type: text
    content: was
  - type: text
    content: ' the chief of all the captains of the host for the first month. '
  '30':
  - type: text
    content: 'over the camels also '
  - type: text
    content: was
  - type: text
    content: ' Obil the Ishmaelite: and over the asses '
  - type: text
    content: was
  - type: text
    content: ' Jehdeiah the Meronothite: '
  '31':
  - type: text
    content: 'and over the flocks '
  - type: text
    content: was
  - type: text
    content: ' Jaziz the Hagerite. All these '
  - type: text
    content: were
  - type: text
    content: ' the rulers of the substance which '
  - type: text
    content: was
  - type: text
    content: ' king David''s.'
  '32':
  - type: text
    content: 'Also Jonathan David''s uncle was a counsellor, a wise man, and a scribe: and Jehiel the son of Hachmoni '
  - type: text
    content: was
  - type: text
    content: ' with the king''s sons: '
  '33':
  - type: text
    content: 'and Ahithophel '
  - type: text
    content: was
  - type: text
    content: ' the king''s counsellor: and Hushai the Archite '
  - type: text
    content: was
  - type: text
    content: ' the king''s companion: '
  '34':
  - type: text
    content: 'and after Ahithophel '
  - type: text
    content: was
  - type: text
    content: ' Jehoiada the son of Benaiah, and Abiathar: and the general of the king''s army '
  - type: text
    content: was
  - type: text
    content: ' Joab.'
  '4':
  - type: text
    content: 'And over the course of the second month '
  - type: text
    content: was
  - type: text
    content: ' Dodai an Ahohite, and of his course '
  - type: text
    content: was
  - type: text
    content: ' Mikloth also the ruler: in his course likewise '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '5':
  - type: text
    content: 'The third captain of the host for the third month '
  - type: text
    content: was
  - type: text
    content: ' Benaiah the son of Jehoiada, a chief priest: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '6':
  - type: text
    content: 'This '
  - type: text
    content: is that
  - type: text
    content: ' Benaiah, '
  - type: text
    content: who was
  - type: text
    content: ' mighty '
  - type: text
    content: among
  - type: text
    content: ' the thirty, and above the thirty: and in his course '
  - type: text
    content: was
  - type: text
    content: ' Ammizabad his son. '
  '7':
  - type: text
    content: 'The fourth '
  - type: text
    content: captain
  - type: text
    content: ' for the fourth month '
  - type: text
    content: was
  - type: text
    content: ' Asahel the brother of Joab, and Zebadiah his son after him: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '8':
  - type: text
    content: 'The fifth captain for the fifth month '
  - type: text
    content: was
  - type: text
    content: ' Shamhuth the Izrahite: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
  '9':
  - type: text
    content: 'The sixth '
  - type: text
    content: captain
  - type: text
    content: ' for the sixth month '
  - type: text
    content: was
  - type: text
    content: ' Ira the son of Ikkesh the Tekoite: and in his course '
  - type: text
    content: were
  - type: text
    content: ' twenty and four thousand. '
