document_id: 1CH.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Overseers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the children of Israel after their number, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to wit
    - type: text
      text: ', the chief fathers and captains of thousands and hundreds, and their officers that served the king in any matter of the courses, which came in and went out month by month throughout all the months of the year, of every course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The seventh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the seventh month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Helez the Pelonite, of the children of Ephraim: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The eighth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the eighth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Sibbecai the Hushathite, of the Zarhites: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The ninth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the ninth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Abiezer the Anetothite, of the Benjamites: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the tenth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Maharai the Netophathite, of the Zarhites: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The eleventh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the eleventh month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Benaiah the Pirathonite, of the children of Ephraim: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The twelfth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the twelfth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Heldai the Netophathite, of Othniel: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Furthermore over the tribes of Israel: the ruler of the Reubenites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Eliezer the son of Zichri: of the Simeonites, Shephatiah the son of Maachah: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'of the Levites, Hashabiah the son of Kemuel: of the Aaronites, Zadok: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'of Judah, Elihu, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of the brethren of David: of Issachar, Omri the son of Michael: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'of Zebulun, Ishmaiah the son of Obadiah: of Naphtali, Jerimoth the son of Azriel: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Over the first course for the first month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jashobeam the son of Zabdiel: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'of the children of Ephraim, Hoshea the son of Azaziah: of the half tribe of Manasseh, Joel the son of Pedaiah: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'of the half '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tribe
    - type: text
      text: ' of Manasseh in Gilead, Iddo the son of Zechariah: of Benjamin, Jaasiel the son of Abner: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'of Dan, Azareel the son of Jeroham. These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the princes of the tribes of Israel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But David took not the number of them from twenty years old and under: because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had said he would increase Israel like to the stars of the heavens. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Joab the son of Zeruiah began to number, but he finished not, because there fell wrath for it against Israel; neither was the number put in the account of the chronicles of king David.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And over the king''s treasures '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Azmaveth the son of Adiel: and over the storehouses in the fields, in the cities, and in the villages, and in the castles, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehonathan the son of Uzziah: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and over them that did the work of the field for tillage of the ground '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ezri the son of Chelub: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and over the vineyards '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Shimei the Ramathite: over the increase of the vineyards for the wine cellars '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Zabdi the Shiphmite: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and over the olive trees and the sycomore trees that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the low plains '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Baal-hanan the Gederite: and over the cellars of oil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Joash: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and over the herds that fed in Sharon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Shitrai the Sharonite: and over the herds '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' in the valleys '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Shaphat the son of Adlai: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Of the children of Perez '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the chief of all the captains of the host for the first month. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'over the camels also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Obil the Ishmaelite: and over the asses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehdeiah the Meronothite: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and over the flocks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jaziz the Hagerite. All these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the rulers of the substance which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' king David''s.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Also Jonathan David''s uncle was a counsellor, a wise man, and a scribe: and Jehiel the son of Hachmoni '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with the king''s sons: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'and Ahithophel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the king''s counsellor: and Hushai the Archite '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the king''s companion: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'and after Ahithophel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehoiada the son of Benaiah, and Abiathar: and the general of the king''s army '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Joab.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And over the course of the second month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Dodai an Ahohite, and of his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Mikloth also the ruler: in his course likewise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The third captain of the host for the third month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Benaiah the son of Jehoiada, a chief priest: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' Benaiah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who was
    - type: text
      text: ' mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: among
    - type: text
      text: ' the thirty, and above the thirty: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ammizabad his son. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the fourth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Asahel the brother of Joab, and Zebadiah his son after him: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The fifth captain for the fifth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Shamhuth the Izrahite: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The sixth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the sixth month '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ira the son of Ikkesh the Tekoite: and in his course '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and four thousand. '
