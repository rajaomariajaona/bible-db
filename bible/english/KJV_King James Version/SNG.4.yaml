- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Within thy locks:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy hair '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as a flock of goats,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That appear from mount Gilead.
