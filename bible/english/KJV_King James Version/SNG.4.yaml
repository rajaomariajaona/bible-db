  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Thy teeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like a flock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of sheep that are even
  - type: text
    text: ' shorn,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which came up from the washing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whereof every one bear twins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And none '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' barren among them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thy lips '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like a thread of scarlet,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And thy speech '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' comely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy temples '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like a piece of a pomegranate'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Within thy locks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thy neck '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like the tower of David'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Builded for an armoury,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whereon there hang a thousand bucklers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: All shields of mighty men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thy two breasts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like two young roes'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That are twins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which feed among the lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Until the day break,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the shadows flee away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will get me to the mountain of myrrh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to the hill of frankincense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' all fair, my love;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no spot in thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Come with me from Lebanon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' spouse,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'With me from Lebanon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look from the top of Amana,
- type: usfm
  marker: q2
  children:
  - type: text
    text: From the top of Shenir and Hermon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the lions' dens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: From the mountains of the leopards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thou hast ravished my heart, my sister, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' spouse;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast ravished my heart with one of thine eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: With one chain of thy neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'How fair is thy love, my sister, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' spouse!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How much better is thy love than wine!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the smell of thine ointments than all spices!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thy lips, O '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' spouse, drop '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the honeycomb:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Honey and milk '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' under thy tongue;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the smell of thy garments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like the smell of Lebanon.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A garden inclosed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my sister, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' spouse;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A spring shut up, a fountain sealed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thy plants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' an orchard of pomegranates,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: With pleasant fruits;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Camphire, with spikenard,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Spikenard and saffron;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Calamus and cinnamon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With all trees of frankincense;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Myrrh and aloes, with all the chief spices:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A fountain of gardens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: A well of living waters, and streams from Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Awake, O north wind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And come, thou south;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blow upon my garden,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' the spices thereof may flow out.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let my beloved come into his garden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And eat his pleasant fruits.
