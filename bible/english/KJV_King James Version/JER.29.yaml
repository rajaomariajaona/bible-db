document_id: JER.29,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His Letter to the Exiles
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the words of the letter that Jeremiah the prophet sent from Jerusalem unto the residue of the elders which were carried away captives, and to the priests, and to the prophets, and to all the people whom Nebuchadnezzar had carried away captive from Jerusalem to Babylon; '
  '10':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', That after seventy years be accomplished at Babylon I will visit you, and perform my good word toward you, in causing you to return to this place. '
  '11':
  - type: text
    content: 'For I know the thoughts that I think toward you, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', thoughts of peace, and not of evil, to give you an expected end. '
  '12':
  - type: text
    content: 'Then shall ye call upon me, and ye shall go and pray unto me, and I will hearken unto you. '
  '13':
  - type: text
    content: 'And ye shall seek me, and find '
  - type: text
    content: me
  - type: text
    content: ', when ye shall search for me with all your heart. '
  '14':
  - type: text
    content: 'And I will be found of you, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': and I will turn away your captivity, and I will gather you from all the nations, and from all the places whither I have driven you, saith the '
  - type: text
    content: LORD
  - type: text
    content: ; and I will bring you again into the place whence I caused you to be carried away captive.
  '15':
  - type: text
    content: 'Because ye have said, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath raised us up prophets in Babylon; '
  '16':
  - type: text
    content: know
  - type: text
    content: ' that thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of the king that sitteth upon the throne of David, and of all the people that dwelleth in this city, '
  - type: text
    content: and
  - type: text
    content: ' of your brethren that are not gone forth with you into captivity; '
  '17':
  - type: text
    content: 'thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Behold, I will send upon them the sword, the famine, and the pestilence, and will make them like vile figs, that cannot be eaten, they are so evil. '
  '18':
  - type: text
    content: 'And I will persecute them with the sword, with the famine, and with the pestilence, and will deliver them to be removed to all the kingdoms of the earth, to be a curse, and an astonishment, and an hissing, and a reproach, among all the nations whither I have driven them: '
  '19':
  - type: text
    content: 'because they have not hearkened to my words, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', which I sent unto them by my servants the prophets, rising up early and sending '
  - type: text
    content: them
  - type: text
    content: '; but ye would not hear, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '2':
  - type: text
    content: '(after that Jeconiah the king, and the queen, and the eunuchs, the princes of Judah and Jerusalem, and the carpenters, and the smiths, were departed from Jerusalem;) '
  '20':
  - type: text
    content: 'Hear ye therefore the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', all ye of the captivity, whom I have sent from Jerusalem to Babylon:'
  '21':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel, of Ahab the son of Kolaiah, and of Zedekiah the son of Maaseiah, which prophesy a lie unto you in my name; Behold, I will deliver them into the hand of Nebuchadrezzar king of Babylon; and he shall slay them before your eyes; '
  '22':
  - type: text
    content: 'and of them shall be taken up a curse by all the captivity of Judah which '
  - type: text
    content: are
  - type: text
    content: ' in Babylon, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' make thee like Zedekiah and like Ahab, whom the king of Babylon roasted in the fire; '
  '23':
  - type: text
    content: 'because they have committed villany in Israel, and have committed adultery with their neighbours'' wives, and have spoken lying words in my name, which I have not commanded them; even I know, and '
  - type: text
    content: am
  - type: text
    content: ' a witness, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Concerning Shemaiah
  '24':
  - type: text
    content: ' '
  - type: text
    content: Thus
  - type: text
    content: ' shalt thou also speak to Shemaiah the Nehelamite, saying, '
  '25':
  - type: text
    content: 'Thus speaketh the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel, saying, Because thou hast sent letters in thy name unto all the people that '
  - type: text
    content: are
  - type: text
    content: ' at Jerusalem, and to Zephaniah the son of Maaseiah the priest, and to all the priests, saying, '
  '26':
  - type: text
    content: 'the '
  - type: text
    content: LORD
  - type: text
    content: ' hath made thee priest in the stead of Jehoiada the priest, that ye should be officers in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', for every man '
  - type: text
    content: that is
  - type: text
    content: ' mad, and maketh himself a prophet, that thou shouldest put him in prison, and in the stocks. '
  '27':
  - type: text
    content: 'Now therefore why hast thou not reproved Jeremiah of Anathoth, which maketh himself a prophet to you? '
  '28':
  - type: text
    content: 'For therefore he sent unto us '
  - type: text
    content: in
  - type: text
    content: ' Babylon, saying, This '
  - type: text
    content: captivity is
  - type: text
    content: ' long: build ye houses, and dwell '
  - type: text
    content: in them
  - type: text
    content: '; and plant gardens, and eat the fruit of them. '
  '29':
  - type: text
    content: And Zephaniah the priest read this letter in the ears of Jeremiah the prophet.
  '3':
  - type: text
    content: 'by the hand of Elasah the son of Shaphan, and Gemariah the son of Hilkiah, (whom Zedekiah king of Judah sent unto Babylon to Nebuchadnezzar king of Babylon) saying, '
  '30':
  - type: text
    content: 'Then came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Jeremiah, saying, '
  '31':
  - type: text
    content: 'Send to all them of the captivity, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' concerning Shemaiah the Nehelamite; Because that Shemaiah hath prophesied unto you, and I sent him not, and he caused you to trust in a lie: '
  '32':
  - type: text
    content: 'therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I will punish Shemaiah the Nehelamite, and his seed: he shall not have a man to dwell among this people; neither shall he behold the good that I will do for my people, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; because he hath taught rebellion against the '
  - type: text
    content: LORD
  - type: text
    content: .
  '4':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel, unto all that are carried away captives, whom I have caused to be carried away from Jerusalem unto Babylon; '
  '5':
  - type: text
    content: 'Build ye houses, and dwell '
  - type: text
    content: in them
  - type: text
    content: '; and plant gardens, and eat the fruit of them; '
  '6':
  - type: text
    content: 'take ye wives, and beget sons and daughters; and take wives for your sons, and give your daughters to husbands, that they may bear sons and daughters; that ye may be increased there, and not diminished. '
  '7':
  - type: text
    content: 'And seek the peace of the city whither I have caused you to be carried away captives, and pray unto the '
  - type: text
    content: LORD
  - type: text
    content: ' for it: for in the peace thereof shall ye have peace. '
  '8':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Let not your prophets and your diviners, that '
  - type: text
    content: be
  - type: text
    content: ' in the midst of you, deceive you, neither hearken to your dreams which ye cause to be dreamed. '
  '9':
  - type: text
    content: 'For they prophesy falsely unto you in my name: I have not sent them, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
