document_id: JER.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Letter to the Exiles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the words of the letter that Jeremiah the prophet sent from Jerusalem unto the residue of the elders which were carried away captives, and to the priests, and to the prophets, and to all the people whom Nebuchadnezzar had carried away captive from Jerusalem to Babylon; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', That after seventy years be accomplished at Babylon I will visit you, and perform my good word toward you, in causing you to return to this place. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know the thoughts that I think toward you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thoughts of peace, and not of evil, to give you an expected end. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall ye call upon me, and ye shall go and pray unto me, and I will hearken unto you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall seek me, and find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', when ye shall search for me with all your heart. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will be found of you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and I will turn away your captivity, and I will gather you from all the nations, and from all the places whither I have driven you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; and I will bring you again into the place whence I caused you to be carried away captive.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because ye have said, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath raised us up prophets in Babylon; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: know
    - type: text
      text: ' that thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of the king that sitteth upon the throne of David, and of all the people that dwelleth in this city, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' of your brethren that are not gone forth with you into captivity; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; Behold, I will send upon them the sword, the famine, and the pestilence, and will make them like vile figs, that cannot be eaten, they are so evil. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will persecute them with the sword, with the famine, and with the pestilence, and will deliver them to be removed to all the kingdoms of the earth, to be a curse, and an astonishment, and an hissing, and a reproach, among all the nations whither I have driven them: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because they have not hearkened to my words, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which I sent unto them by my servants the prophets, rising up early and sending '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '; but ye would not hear, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(after that Jeconiah the king, and the queen, and the eunuchs, the princes of Judah and Jerusalem, and the carpenters, and the smiths, were departed from Jerusalem;) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear ye therefore the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all ye of the captivity, whom I have sent from Jerusalem to Babylon:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel, of Ahab the son of Kolaiah, and of Zedekiah the son of Maaseiah, which prophesy a lie unto you in my name; Behold, I will deliver them into the hand of Nebuchadrezzar king of Babylon; and he shall slay them before your eyes; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of them shall be taken up a curse by all the captivity of Judah which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in Babylon, saying, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' make thee like Zedekiah and like Ahab, whom the king of Babylon roasted in the fire; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because they have committed villany in Israel, and have committed adultery with their neighbours'' wives, and have spoken lying words in my name, which I have not commanded them; even I know, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a witness, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Concerning Shemaiah
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thus
    - type: text
      text: ' shalt thou also speak to Shemaiah the Nehelamite, saying, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus speaketh the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel, saying, Because thou hast sent letters in thy name unto all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' at Jerusalem, and to Zephaniah the son of Maaseiah the priest, and to all the priests, saying, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath made thee priest in the stead of Jehoiada the priest, that ye should be officers in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', for every man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' mad, and maketh himself a prophet, that thou shouldest put him in prison, and in the stocks. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore why hast thou not reproved Jeremiah of Anathoth, which maketh himself a prophet to you? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For therefore he sent unto us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' Babylon, saying, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: captivity is
    - type: text
      text: ' long: build ye houses, and dwell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in them
    - type: text
      text: '; and plant gardens, and eat the fruit of them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Zephaniah the priest read this letter in the ears of Jeremiah the prophet.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'by the hand of Elasah the son of Shaphan, and Gemariah the son of Hilkiah, (whom Zedekiah king of Judah sent unto Babylon to Nebuchadnezzar king of Babylon) saying, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Jeremiah, saying, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send to all them of the captivity, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' concerning Shemaiah the Nehelamite; Because that Shemaiah hath prophesied unto you, and I sent him not, and he caused you to trust in a lie: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, I will punish Shemaiah the Nehelamite, and his seed: he shall not have a man to dwell among this people; neither shall he behold the good that I will do for my people, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; because he hath taught rebellion against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel, unto all that are carried away captives, whom I have caused to be carried away from Jerusalem unto Babylon; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Build ye houses, and dwell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in them
    - type: text
      text: '; and plant gardens, and eat the fruit of them; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'take ye wives, and beget sons and daughters; and take wives for your sons, and give your daughters to husbands, that they may bear sons and daughters; that ye may be increased there, and not diminished. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seek the peace of the city whither I have caused you to be carried away captives, and pray unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for it: for in the peace thereof shall ye have peace. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Let not your prophets and your diviners, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in the midst of you, deceive you, neither hearken to your dreams which ye cause to be dreamed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they prophesy falsely unto you in my name: I have not sent them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
