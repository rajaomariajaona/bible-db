document_id: REV.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And I saw another sign in heaven, great and marvellous, seven angels having the seven last plagues; for in them is filled up the wrath of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I saw as it were a sea of glass mingled with fire: and them that had gotten the victory over the beast, and over his image, and over his mark, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' over the number of his name, stand on the sea of glass, having the harps of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they sing the song of Moses the servant of God, and the song of the Lamb, saying, Great and marvellous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy works, Lord God Almighty; just and true '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy ways, thou King of saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Who shall not fear thee, O Lord, and glorify thy name? for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' holy: for all nations shall come and worship before thee; for thy judgments are made manifest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And after that I looked, and, behold, the temple of the tabernacle of the testimony in heaven was opened: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the seven angels came out of the temple, having the seven plagues, clothed in pure and white linen, and having their breasts girded with golden girdles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And one of the four beasts gave unto the seven angels seven golden vials full of the wrath of God, who liveth for ever and ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the temple was filled with smoke from the glory of God, and from his power; and no man was able to enter into the temple, till the seven plagues of the seven angels were fulfilled.
