document_id: MAL.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And now, O ye priests, this commandment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If ye will not hear, and if ye will not lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to heart, to give glory unto my name, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, I will even send a curse upon you, and I will curse your blessings: yea, I have cursed them already, because ye do not lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Behold, I will corrupt your seed, and spread dung upon your faces, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the dung of your solemn feasts; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' shall take you away with it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And ye shall know that I have sent this commandment unto you, that my covenant might be with Levi, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My covenant was with him of life and peace; and I gave them to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the fear wherewith he feared me, and was afraid before my name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The law of truth was in his mouth, and iniquity was not found in his lips: he walked with me in peace and equity, and did turn many away from iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the priest''s lips should keep knowledge, and they should seek the law at his mouth: for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the messenger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But ye are departed out of the way; ye have caused many to stumble at the law; ye have corrupted the covenant of Levi, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore have I also made you contemptible and base before all the people, according as ye have not kept my ways, but have been partial in the law.
- type: usfm
  marker: s2
  children:
  - type: text
    text: One Father
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Have we not all one father? hath not one God created us? why do we deal treacherously every man against his brother, by profaning the covenant of our fathers? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Judah hath dealt treacherously, and an abomination is committed in Israel and in Jerusalem; for Judah hath profaned the holiness of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which he loved, and hath married the daughter of a strange god. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will cut off the man that doeth this, the master and the scholar, out of the tabernacles of Jacob, and him that offereth an offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And this have ye done again, covering the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with tears, with weeping, and with crying out, insomuch that he regardeth not the offering any more, or receiveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with good will at your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yet ye say, Wherefore? Because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath been witness between thee and the wife of thy youth, against whom thou hast dealt treacherously: yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' she thy companion, and the wife of thy covenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And did not he make one? Yet had he the residue of the spirit. And wherefore one? That he might seek a godly seed. Therefore take heed to your spirit, and let none deal treacherously against the wife of his youth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of Israel, saith that he hateth putting away: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' covereth violence with his garment, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts: therefore take heed to your spirit, that ye deal not treacherously.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ye have wearied the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with your words. Yet ye say, Wherein have we wearied '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him?
  - type: text
    text: ' When ye say, Every one that doeth evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and he delighteth in them; or, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the God of judgment?'
