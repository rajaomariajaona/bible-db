verses:
  '1':
  - type: text
    content: 'And now, O ye priests, this commandment '
  - type: text
    content: is
  - type: text
    content: ' for you. '
  '10':
  - type: text
    content: 'Have we not all one father? hath not one God created us? why do we deal treacherously every man against his brother, by profaning the covenant of our fathers? '
  '11':
  - type: text
    content: 'Judah hath dealt treacherously, and an abomination is committed in Israel and in Jerusalem; for Judah hath profaned the holiness of the '
  - type: text
    content: LORD
  - type: text
    content: ' which he loved, and hath married the daughter of a strange god. '
  '12':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will cut off the man that doeth this, the master and the scholar, out of the tabernacles of Jacob, and him that offereth an offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '13':
  - type: text
    content: 'And this have ye done again, covering the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ' with tears, with weeping, and with crying out, insomuch that he regardeth not the offering any more, or receiveth '
  - type: text
    content: it
  - type: text
    content: ' with good will at your hand.'
  '14':
  - type: text
    content: 'Yet ye say, Wherefore? Because the '
  - type: text
    content: LORD
  - type: text
    content: ' hath been witness between thee and the wife of thy youth, against whom thou hast dealt treacherously: yet '
  - type: text
    content: is
  - type: text
    content: ' she thy companion, and the wife of thy covenant. '
  '15':
  - type: text
    content: 'And did not he make one? Yet had he the residue of the spirit. And wherefore one? That he might seek a godly seed. Therefore take heed to your spirit, and let none deal treacherously against the wife of his youth. '
  '16':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel, saith that he hateth putting away: for '
  - type: text
    content: one
  - type: text
    content: ' covereth violence with his garment, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts: therefore take heed to your spirit, that ye deal not treacherously.'
  '17':
  - type: text
    content: 'Ye have wearied the '
  - type: text
    content: LORD
  - type: text
    content: ' with your words. Yet ye say, Wherein have we wearied '
  - type: text
    content: him?
  - type: text
    content: ' When ye say, Every one that doeth evil '
  - type: text
    content: is
  - type: text
    content: ' good in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and he delighteth in them; or, Where '
  - type: text
    content: is
  - type: text
    content: ' the God of judgment?'
  '2':
  - type: text
    content: 'If ye will not hear, and if ye will not lay '
  - type: text
    content: it
  - type: text
    content: ' to heart, to give glory unto my name, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, I will even send a curse upon you, and I will curse your blessings: yea, I have cursed them already, because ye do not lay '
  - type: text
    content: it
  - type: text
    content: ' to heart. '
  '3':
  - type: text
    content: 'Behold, I will corrupt your seed, and spread dung upon your faces, '
  - type: text
    content: even
  - type: text
    content: ' the dung of your solemn feasts; and '
  - type: text
    content: one
  - type: text
    content: ' shall take you away with it. '
  '4':
  - type: text
    content: 'And ye shall know that I have sent this commandment unto you, that my covenant might be with Levi, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  '5':
  - type: text
    content: 'My covenant was with him of life and peace; and I gave them to him '
  - type: text
    content: for
  - type: text
    content: ' the fear wherewith he feared me, and was afraid before my name. '
  '6':
  - type: text
    content: 'The law of truth was in his mouth, and iniquity was not found in his lips: he walked with me in peace and equity, and did turn many away from iniquity. '
  '7':
  - type: text
    content: 'For the priest''s lips should keep knowledge, and they should seek the law at his mouth: for he '
  - type: text
    content: is
  - type: text
    content: ' the messenger of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '8':
  - type: text
    content: 'But ye are departed out of the way; ye have caused many to stumble at the law; ye have corrupted the covenant of Levi, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '9':
  - type: text
    content: Therefore have I also made you contemptible and base before all the people, according as ye have not kept my ways, but have been partial in the law.
  - type: heading
    content: One Father
