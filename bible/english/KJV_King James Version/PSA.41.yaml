document_id: PSA.41,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that considereth the poor:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will deliver him in time of trouble.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', be merciful unto me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And raise me up, that I may requite them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: By this I know that thou favourest me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because mine enemy doth not triumph over me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And as for me, thou upholdest me in mine integrity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And settest me before thy face for ever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From everlasting, and to everlasting. Amen, and Amen.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will preserve him, and keep him alive; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he shall be blessed upon the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou wilt not deliver him unto the will of his enemies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will strengthen him upon the bed of languishing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou wilt make all his bed in his sickness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I said, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', be merciful unto me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Heal my soul; for I have sinned against thee.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mine enemies speak evil of me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When shall he die, and his name perish?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And if he come to see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', he speaketh vanity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His heart gathereth iniquity to itself; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' he goeth abroad, he telleth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'All that hate me whisper together against me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against me do they devise my hurt.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'An evil disease, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: say they
    - type: text
      text: ', cleaveth fast unto him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' that he lieth he shall rise up no more.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Yea, mine own familiar friend, in whom I trusted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which did eat of my bread, hath lifted up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' heel against me.'
