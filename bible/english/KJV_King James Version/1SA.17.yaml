document_id: 1SA.17
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: David Slays Goliath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Philistines gathered together their armies to battle, and were gathered together at Shochoh, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belongeth
  - type: text
    text: ' to Judah, and pitched between Shochoh and Azekah, in Ephes-dammim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Saul and the men of Israel were gathered together, and pitched by the valley of Elah, and set the battle in array against the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the Philistines stood on a mountain on the one side, and Israel stood on a mountain on the other side: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a valley between them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And there went out a champion out of the camp of the Philistines, named Goliath, of Gath, whose height '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' six cubits and a span. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he had
  - type: text
    text: ' an helmet of brass upon his head, and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' armed with a coat of mail; and the weight of the coat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five thousand shekels of brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he had
  - type: text
    text: ' greaves of brass upon his legs, and a target of brass between his shoulders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the staff of his spear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like a weaver''s beam; and his spear''s head '
  - type: usfm
    marker: add
    children:
    - type: text
      text: weighed
  - type: text
    text: ' six hundred shekels of iron: and one bearing a shield went before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he stood and cried unto the armies of Israel, and said unto them, Why are ye come out to set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' battle in array? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' not I a Philistine, and ye servants to Saul? choose you a man for you, and let him come down to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If he be able to fight with me, and to kill me, then will we be your servants: but if I prevail against him, and kill him, then shall ye be our servants, and serve us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the Philistine said, I defy the armies of Israel this day; give me a man, that we may fight together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When Saul and all Israel heard those words of the Philistine, they were dismayed, and greatly afraid.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the son of that Ephrathite of Beth-lehem-judah, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jesse; and he had eight sons: and the man went among men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an old man in the days of Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the three eldest sons of Jesse went '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' followed Saul to the battle: and the names of his three sons that went to the battle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Eliab the firstborn, and next unto him Abinadab, and the third Shammah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the youngest: and the three eldest followed Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But David went and returned from Saul to feed his father''s sheep at Beth-lehem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the Philistine drew near morning and evening, and presented himself forty days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jesse said unto David his son, Take now for thy brethren an ephah of this parched '
  - type: usfm
    marker: add
    children:
    - type: text
      text: corn
  - type: text
    text: ', and these ten loaves, and run to the camp to thy brethren; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and carry these ten cheeses unto the captain of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' thousand, and look how thy brethren fare, and take their pledge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now Saul, and they, and all the men of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the valley of Elah, fighting with the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And David rose up early in the morning, and left the sheep with a keeper, and took, and went, as Jesse had commanded him; and he came to the trench, as the host was going forth to the fight, and shouted for the battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For Israel and the Philistines had put the battle in array, army against army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And David left his carriage in the hand of the keeper of the carriage, and ran into the army, and came and saluted his brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And as he talked with them, behold, there came up the champion, the Philistine of Gath, Goliath by name, out of the armies of the Philistines, and spake according to the same words: and David heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And all the men of Israel, when they saw the man, fled from him, and were sore afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the men of Israel said, Have ye seen this man that is come up? surely to defy Israel is he come up: and it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the man who killeth him, the king will enrich him with great riches, and will give him his daughter, and make his father''s house free in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And David spake to the men that stood by him, saying, What shall be done to the man that killeth this Philistine, and taketh away the reproach from Israel? for who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this uncircumcised Philistine, that he should defy the armies of the living God? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And the people answered him after this manner, saying, So shall it be done to the man that killeth him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Eliab his eldest brother heard when he spake unto the men; and Eliab''s anger was kindled against David, and he said, Why camest thou down hither? and with whom hast thou left those few sheep in the wilderness? I know thy pride, and the naughtiness of thine heart; for thou art come down that thou mightest see the battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And David said, What have I now done? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is there
  - type: text
    text: ' not a cause? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And he turned from him toward another, and spake after the same manner: and the people answered him again after the former manner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And when the words were heard which David spake, they rehearsed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before Saul: and he sent for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And David said to Saul, Let no man''s heart fail because of him; thy servant will go and fight with this Philistine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Saul said to David, Thou art not able to go against this Philistine to fight with him: for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art but
  - type: text
    text: ' a youth, and he a man of war from his youth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And David said unto Saul, Thy servant kept his father''s sheep, and there came a lion, and a bear, and took a lamb out of the flock: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and I went out after him, and smote him, and delivered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out of his mouth: and when he arose against me, I caught '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' by his beard, and smote him, and slew him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Thy servant slew both the lion and the bear: and this uncircumcised Philistine shall be as one of them, seeing he hath defied the armies of the living God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'David said moreover, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that delivered me out of the paw of the lion, and out of the paw of the bear, he will deliver me out of the hand of this Philistine. And Saul said unto David, Go, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be with thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Saul armed David with his armour, and he put an helmet of brass upon his head; also he armed him with a coat of mail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And David girded his sword upon his armour, and he assayed to go; for he had not proved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. And David said unto Saul, I cannot go with these; for I have not proved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. And David put them off him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And he took his staff in his hand, and chose him five smooth stones out of the brook, and put them in a shepherd''s bag which he had, even in a scrip; and his sling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in his hand: and he drew near to the Philistine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the Philistine came on and drew near unto David; and the man that bare the shield '
  - type: usfm
    marker: add
    children:
    - type: text
      text: went
  - type: text
    text: ' before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And when the Philistine looked about, and saw David, he disdained him: for he was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' a youth, and ruddy, and of a fair countenance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And the Philistine said unto David, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' I a dog, that thou comest to me with staves? And the Philistine cursed David by his gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And the Philistine said to David, Come to me, and I will give thy flesh unto the fowls of the air, and to the beasts of the field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then said David to the Philistine, Thou comest to me with a sword, and with a spear, and with a shield: but I come to thee in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of the armies of Israel, whom thou hast defied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'This day will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' deliver thee into mine hand; and I will smite thee, and take thine head from thee; and I will give the carcases of the host of the Philistines this day unto the fowls of the air, and to the wild beasts of the earth; that all the earth may know that there is a God in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And all this assembly shall know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saveth not with sword and spear: for the battle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s, and he will give you into our hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And it came to pass, when the Philistine arose, and came and drew nigh to meet David, that David hasted, and ran toward the army to meet the Philistine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And David put his hand in his bag, and took thence a stone, and slang '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and smote the Philistine in his forehead, that the stone sunk into his forehead; and he fell upon his face to the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'So David prevailed over the Philistine with a sling and with a stone, and smote the Philistine, and slew him; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no sword in the hand of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Therefore David ran, and stood upon the Philistine, and took his sword, and drew it out of the sheath thereof, and slew him, and cut off his head therewith. And when the Philistines saw their champion was dead, they fled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And the men of Israel and of Judah arose, and shouted, and pursued the Philistines, until thou come to the valley, and to the gates of Ekron. And the wounded of the Philistines fell down by the way to Shaaraim, even unto Gath, and unto Ekron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And the children of Israel returned from chasing after the Philistines, and they spoiled their tents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: And David took the head of the Philistine, and brought it to Jerusalem; but he put his armour in his tent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And when Saul saw David go forth against the Philistine, he said unto Abner, the captain of the host, Abner, whose son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this youth? And Abner said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' thy soul liveth, O king, I cannot tell. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'And the king said, Enquire thou whose son the stripling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'And as David returned from the slaughter of the Philistine, Abner took him, and brought him before Saul with the head of the Philistine in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'And Saul said to him, Whose son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' young man? And David answered, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I am
  - type: text
    text: ' the son of thy servant Jesse the Beth-lehemite.'
