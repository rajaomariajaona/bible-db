verses:
  '1':
  - type: heading
    content: His Temptation
  - type: text
    content: 'And Jesus being full of the Holy Ghost returned from Jordan, and was led by the Spirit into the wilderness, '
  '10':
  - type: text
    content: 'for it is written, He shall give his angels charge over thee, to keep thee: '
  '11':
  - type: text
    content: 'And in '
  - type: text
    content: their
  - type: text
    content: ' hands they shall bear thee up, lest at any time thou dash thy foot against a stone. '
  '12':
  - type: text
    content: 'And Jesus answering said unto him, '
  - type: text
    content: It is said, Thou shalt not tempt the Lord thy God.
  '13':
  - type: text
    content: And when the devil had ended all the temptation, he departed from him for a season.
  - type: heading
    content: His Message and Mission
  '14':
  - type: text
    content: 'And Jesus returned in the power of the Spirit into Galilee: and there went out a fame of him through all the region round about. '
  '15':
  - type: text
    content: And he taught in their synagogues, being glorified of all.
  - type: heading
    content: His Proclamation
  '16':
  - type: text
    content: 'And he came to Nazareth, where he had been brought up: and, as his custom was, he went into the synagogue on the sabbath day, and stood up for to read. '
  '17':
  - type: text
    content: And there was delivered unto him the book of the prophet Esaias. And when he had opened the book, he found the place where it was written,
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'The Spirit of the Lord '
  - type: text
    content: is
  - type: text
    content: ' upon me,'
  - type: text
    content: Because he hath anointed me to preach the gospel to the poor;
  - type: text
    content: He hath sent me to heal the brokenhearted, to preach deliverance to the captives,
  - type: text
    content: And recovering of sight to the blind,
  - type: text
    content: To set at liberty them that are bruised,
  '19':
  - type: text
    content: ' '
  - type: text
    content: To preach the acceptable year of the Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'being forty days tempted of the devil. And in those days he did eat nothing: and when they were ended, he afterward hungered. '
  '20':
  - type: text
    content: 'And he closed the book, and he gave '
  - type: text
    content: it
  - type: text
    content: ' again to the minister, and sat down. And the eyes of all them that were in the synagogue were fastened on him. '
  '21':
  - type: text
    content: 'And he began to say unto them, '
  - type: text
    content: This day is this scripture fulfilled in your ears.
  '22':
  - type: text
    content: 'And all bare him witness, and wondered at the gracious words which proceeded out of his mouth. And they said, Is not this Joseph''s son? '
  '23':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Ye will surely say unto me this proverb, Physician, heal thyself: whatsoever we have heard done in Capernaum, do also here in thy country.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he said, '
  - type: text
    content: Verily I say unto you, No prophet is accepted in his own country.
  - type: text
    content: ' '
  '25':
  - type: text
    content: But I tell you of a truth, many widows were in Israel in the days of Elias, when the heaven was shut up three years and six months, when great famine was throughout all the land;
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'but unto none of them was Elias sent, save unto Sarepta, '
  - type: text
    content: a city
  - type: text
    content: ' of Sidon, unto a woman '
  - type: text
    content: that was
  - type: text
    content: ' a widow'
  - type: text
    content: '. '
  '27':
  - type: text
    content: And many lepers were in Israel in the time of Eliseus the prophet; and none of them was cleansed, saving Naaman the Syrian.
  - type: text
    content: ' '
  '28':
  - type: text
    content: And all they in the synagogue, when they heard these things, were filled with wrath,
  '29':
  - type: text
    content: And rose up, and thrust him out of the city, and led him unto the brow of the hill whereon their city was built, that they might cast him down headlong.
  - type: heading
    content: At Capernaum
  '3':
  - type: text
    content: 'And the devil said unto him, If thou be the Son of God, command this stone that it be made bread. '
  '30':
  - type: text
    content: 'But he passing through the midst of them went his way, '
  '31':
  - type: text
    content: 'and came down to Capernaum, a city of Galilee, and taught them on the sabbath days. '
  '32':
  - type: text
    content: 'And they were astonished at his doctrine: for his word was with power.'
  '33':
  - type: text
    content: 'And in the synagogue there was a man, which had a spirit of an unclean devil, and cried out with a loud voice, '
  '34':
  - type: text
    content: 'saying, Let '
  - type: text
    content: us
  - type: text
    content: ' alone; what have we to do with thee, '
  - type: text
    content: thou
  - type: text
    content: ' Jesus of Nazareth? art thou come to destroy us? I know thee who thou art; the Holy One of God. '
  '35':
  - type: text
    content: 'And Jesus rebuked him, saying, '
  - type: text
    content: Hold thy peace, and come out of him.
  - type: text
    content: ' And when the devil had thrown him in the midst, he came out of him, and hurt him not. '
  '36':
  - type: text
    content: 'And they were all amazed, and spake among themselves, saying, What a word '
  - type: text
    content: is
  - type: text
    content: ' this! for with authority and power he commandeth the unclean spirits, and they come out. '
  '37':
  - type: text
    content: And the fame of him went out into every place of the country round about.
  '38':
  - type: text
    content: 'And he arose out of the synagogue, and entered into Simon''s house. And Simon''s wife''s mother was taken with a great fever; and they besought him for her. '
  '39':
  - type: text
    content: 'And he stood over her, and rebuked the fever; and it left her: and immediately she arose and ministered unto them.'
  '4':
  - type: text
    content: 'And Jesus answered him, saying, '
  - type: text
    content: It is written, That man shall not live by bread alone, but by every word of God.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Now when the sun was setting, all they that had any sick with divers diseases brought them unto him; and he laid his hands on every one of them, and healed them. '
  '41':
  - type: text
    content: 'And devils also came out of many, crying out, and saying, Thou art Christ the Son of God. And he rebuking '
  - type: text
    content: them
  - type: text
    content: ' suffered them not to speak: for they knew that he was Christ. '
  '42':
  - type: text
    content: 'And when it was day, he departed and went into a desert place: and the people sought him, and came unto him, and stayed him, that he should not depart from them. '
  '43':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'I must preach the kingdom of God to other cities also: for therefore am I sent.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: And he preached in the synagogues of Galilee.
  '5':
  - type: text
    content: 'And the devil, taking him up into an high mountain, shewed unto him all the kingdoms of the world in a moment of time. '
  '6':
  - type: text
    content: 'And the devil said unto him, All this power will I give thee, and the glory of them: for that is delivered unto me; and to whomsoever I will I give it. '
  '7':
  - type: text
    content: 'If thou therefore wilt worship me, all shall be thine. '
  '8':
  - type: text
    content: 'And Jesus answered and said unto him, '
  - type: text
    content: 'Get thee behind me, Satan: for it is written, Thou shalt worship the Lord thy God, and him only shalt thou serve.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And he brought him to Jerusalem, and set him on a pinnacle of the temple, and said unto him, If thou be the Son of God, cast thyself down from hence: '
