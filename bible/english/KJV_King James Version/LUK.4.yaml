document_id: LUK.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Temptation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jesus being full of the Holy Ghost returned from Jordan, and was led by the Spirit into the wilderness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'being forty days tempted of the devil. And in those days he did eat nothing: and when they were ended, he afterward hungered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the devil said unto him, If thou be the Son of God, command this stone that it be made bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jesus answered him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is written, That man shall not live by bread alone, but by every word of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the devil, taking him up into an high mountain, shewed unto him all the kingdoms of the world in a moment of time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the devil said unto him, All this power will I give thee, and the glory of them: for that is delivered unto me; and to whomsoever I will I give it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If thou therefore wilt worship me, all shall be thine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Jesus answered and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Get thee behind me, Satan: for it is written, Thou shalt worship the Lord thy God, and him only shalt thou serve.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he brought him to Jerusalem, and set him on a pinnacle of the temple, and said unto him, If thou be the Son of God, cast thyself down from hence: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'for it is written, He shall give his angels charge over thee, to keep thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands they shall bear thee up, lest at any time thou dash thy foot against a stone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jesus answering said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is said, Thou shalt not tempt the Lord thy God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And when the devil had ended all the temptation, he departed from him for a season.
- type: usfm
  marker: s1
  children:
  - type: text
    text: His Message and Mission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Jesus returned in the power of the Spirit into Galilee: and there went out a fame of him through all the region round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And he taught in their synagogues, being glorified of all.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Proclamation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he came to Nazareth, where he had been brought up: and, as his custom was, he went into the synagogue on the sabbath day, and stood up for to read. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And there was delivered unto him the book of the prophet Esaias. And when he had opened the book, he found the place where it was written,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The Spirit of the Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon me,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Because he hath anointed me to preach the gospel to the poor;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He hath sent me to heal the brokenhearted, to preach deliverance to the captives,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And recovering of sight to the blind,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: To set at liberty them that are bruised,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: To preach the acceptable year of the Lord
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he closed the book, and he gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' again to the minister, and sat down. And the eyes of all them that were in the synagogue were fastened on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he began to say unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This day is this scripture fulfilled in your ears.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And all bare him witness, and wondered at the gracious words which proceeded out of his mouth. And they said, Is not this Joseph''s son? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ye will surely say unto me this proverb, Physician, heal thyself: whatsoever we have heard done in Capernaum, do also here in thy country.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, No prophet is accepted in his own country.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I tell you of a truth, many widows were in Israel in the days of Elias, when the heaven was shut up three years and six months, when great famine was throughout all the land;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'but unto none of them was Elias sent, save unto Sarepta, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a city
    - type: text
      text: ' of Sidon, unto a woman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' a widow'
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And many lepers were in Israel in the time of Eliseus the prophet; and none of them was cleansed, saving Naaman the Syrian.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And all they in the synagogue, when they heard these things, were filled with wrath,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And rose up, and thrust him out of the city, and led him unto the brow of the hill whereon their city was built, that they might cast him down headlong.
- type: usfm
  marker: s2
  children:
  - type: text
    text: At Capernaum
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But he passing through the midst of them went his way, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and came down to Capernaum, a city of Galilee, and taught them on the sabbath days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they were astonished at his doctrine: for his word was with power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And in the synagogue there was a man, which had a spirit of an unclean devil, and cried out with a loud voice, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'saying, Let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' alone; what have we to do with thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' Jesus of Nazareth? art thou come to destroy us? I know thee who thou art; the Holy One of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And Jesus rebuked him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hold thy peace, and come out of him.
  - type: text
    text: ' And when the devil had thrown him in the midst, he came out of him, and hurt him not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And they were all amazed, and spake among themselves, saying, What a word '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this! for with authority and power he commandeth the unclean spirits, and they come out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And the fame of him went out into every place of the country round about.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he arose out of the synagogue, and entered into Simon''s house. And Simon''s wife''s mother was taken with a great fever; and they besought him for her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And he stood over her, and rebuked the fever; and it left her: and immediately she arose and ministered unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Now when the sun was setting, all they that had any sick with divers diseases brought them unto him; and he laid his hands on every one of them, and healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And devils also came out of many, crying out, and saying, Thou art Christ the Son of God. And he rebuking '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' suffered them not to speak: for they knew that he was Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And when it was day, he departed and went into a desert place: and the people sought him, and came unto him, and stayed him, that he should not depart from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I must preach the kingdom of God to other cities also: for therefore am I sent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And he preached in the synagogues of Galilee.
