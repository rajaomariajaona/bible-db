  '1':
  - type: text
    content: 'And it came to pass, when Saul was returned from following the Philistines, that it was told him, saying, Behold, David '
  - type: text
    content: is
  - type: text
    content: ' in the wilderness of En-gedi. '
  '10':
  - type: text
    content: 'Behold, this day thine eyes have seen how that the '
  - type: text
    content: LORD
  - type: text
    content: ' had delivered thee to day into mine hand in the cave: and '
  - type: text
    content: some
  - type: text
    content: ' bade '
  - type: text
    content: me
  - type: text
    content: ' kill thee: but '
  - type: text
    content: mine eye
  - type: text
    content: ' spared thee; and I said, I will not put forth mine hand against my lord; for he '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '''s anointed. '
  '11':
  - type: text
    content: 'Moreover, my father, see, yea, see the skirt of thy robe in my hand: for in that I cut off the skirt of thy robe, and killed thee not, know thou and see that '
  - type: text
    content: there is
  - type: text
    content: ' neither evil nor transgression in mine hand, and I have not sinned against thee; yet thou huntest my soul to take it. '
  '12':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' judge between me and thee, and the '
  - type: text
    content: LORD
  - type: text
    content: ' avenge me of thee: but mine hand shall not be upon thee. '
  '13':
  - type: text
    content: 'As saith the proverb of the ancients, Wickedness proceedeth from the wicked: but mine hand shall not be upon thee. '
  '14':
  - type: text
    content: 'After whom is the king of Israel come out? after whom dost thou pursue? after a dead dog, after a flea. '
  '15':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' therefore be judge, and judge between me and thee, and see, and plead my cause, and deliver me out of thine hand.'
  '16':
  - type: text
    content: 'And it came to pass, when David had made an end of speaking these words unto Saul, that Saul said, '
  - type: text
    content: Is
  - type: text
    content: ' this thy voice, my son David? And Saul lifted up his voice, and wept. '
  '17':
  - type: text
    content: 'And he said to David, Thou '
  - type: text
    content: art
  - type: text
    content: ' more righteous than I: for thou hast rewarded me good, whereas I have rewarded thee evil. '
  '18':
  - type: text
    content: 'And thou hast shewed this day how that thou hast dealt well with me: forasmuch as when the '
  - type: text
    content: LORD
  - type: text
    content: ' had delivered me into thine hand, thou killedst me not. '
  '19':
  - type: text
    content: 'For if a man find his enemy, will he let him go well away? wherefore the '
  - type: text
    content: LORD
  - type: text
    content: ' reward thee good for that thou hast done unto me this day. '
  '2':
  - type: text
    content: 'Then Saul took three thousand chosen men out of all Israel, and went to seek David and his men upon the rocks of the wild goats. '
  '20':
  - type: text
    content: 'And now, behold, I know well that thou shalt surely be king, and that the kingdom of Israel shall be established in thine hand. '
  '21':
  - type: text
    content: 'Swear now therefore unto me by the '
  - type: text
    content: LORD
  - type: text
    content: ', that thou wilt not cut off my seed after me, and that thou wilt not destroy my name out of my father''s house. '
  '22':
  - type: text
    content: And David sware unto Saul. And Saul went home; but David and his men gat them up unto the hold.
  '3':
  - type: text
    content: 'And he came to the sheepcotes by the way, where '
  - type: text
    content: was
  - type: text
    content: ' a cave; and Saul went in to cover his feet: and David and his men remained in the sides of the cave. '
  '4':
  - type: text
    content: 'And the men of David said unto him, Behold the day of which the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto thee, Behold, I will deliver thine enemy into thine hand, that thou mayest do to him as it shall seem good unto thee. Then David arose, and cut off the skirt of Saul''s robe privily. '
  '5':
  - type: text
    content: 'And it came to pass afterward, that David''s heart smote him, because he had cut off Saul''s skirt. '
  '6':
  - type: text
    content: 'And he said unto his men, The '
  - type: text
    content: LORD
  - type: text
    content: ' forbid that I should do this thing unto my master, the '
  - type: text
    content: LORD
  - type: text
    content: '''s anointed, to stretch forth mine hand against him, seeing he '
  - type: text
    content: is
  - type: text
    content: ' the anointed of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'So David stayed his servants with these words, and suffered them not to rise against Saul. But Saul rose up out of the cave, and went on '
  - type: text
    content: his
  - type: text
    content: ' way.'
  '8':
  - type: text
    content: 'David also arose afterward, and went out of the cave, and cried after Saul, saying, My lord the king. And when Saul looked behind him, David stooped with his face to the earth, and bowed himself. '
  '9':
  - type: text
    content: 'And David said to Saul, Wherefore hearest thou men''s words, saying, Behold, David seeketh thy hurt? '
