document_id: 1SA.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when Saul was returned from following the Philistines, that it was told him, saying, Behold, David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the wilderness of En-gedi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Saul took three thousand chosen men out of all Israel, and went to seek David and his men upon the rocks of the wild goats. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he came to the sheepcotes by the way, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a cave; and Saul went in to cover his feet: and David and his men remained in the sides of the cave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the men of David said unto him, Behold the day of which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto thee, Behold, I will deliver thine enemy into thine hand, that thou mayest do to him as it shall seem good unto thee. Then David arose, and cut off the skirt of Saul''s robe privily. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it came to pass afterward, that David''s heart smote him, because he had cut off Saul''s skirt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said unto his men, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' forbid that I should do this thing unto my master, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed, to stretch forth mine hand against him, seeing he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the anointed of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So David stayed his servants with these words, and suffered them not to rise against Saul. But Saul rose up out of the cave, and went on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David also arose afterward, and went out of the cave, and cried after Saul, saying, My lord the king. And when Saul looked behind him, David stooped with his face to the earth, and bowed himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And David said to Saul, Wherefore hearest thou men''s words, saying, Behold, David seeketh thy hurt? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Behold, this day thine eyes have seen how that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had delivered thee to day into mine hand in the cave: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' bade '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' kill thee: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mine eye
  - type: text
    text: ' spared thee; and I said, I will not put forth mine hand against my lord; for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moreover, my father, see, yea, see the skirt of thy robe in my hand: for in that I cut off the skirt of thy robe, and killed thee not, know thou and see that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' neither evil nor transgression in mine hand, and I have not sinned against thee; yet thou huntest my soul to take it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' judge between me and thee, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' avenge me of thee: but mine hand shall not be upon thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'As saith the proverb of the ancients, Wickedness proceedeth from the wicked: but mine hand shall not be upon thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'After whom is the king of Israel come out? after whom dost thou pursue? after a dead dog, after a flea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' therefore be judge, and judge between me and thee, and see, and plead my cause, and deliver me out of thine hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it came to pass, when David had made an end of speaking these words unto Saul, that Saul said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' this thy voice, my son David? And Saul lifted up his voice, and wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said to David, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' more righteous than I: for thou hast rewarded me good, whereas I have rewarded thee evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And thou hast shewed this day how that thou hast dealt well with me: forasmuch as when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had delivered me into thine hand, thou killedst me not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For if a man find his enemy, will he let him go well away? wherefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' reward thee good for that thou hast done unto me this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And now, behold, I know well that thou shalt surely be king, and that the kingdom of Israel shall be established in thine hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Swear now therefore unto me by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that thou wilt not cut off my seed after me, and that thou wilt not destroy my name out of my father''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And David sware unto Saul. And Saul went home; but David and his men gat them up unto the hold.
