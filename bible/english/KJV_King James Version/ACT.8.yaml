document_id: ACT.8,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And Saul was consenting unto his death. And at that time there was a great persecution against the church which was at Jerusalem; and they were all scattered abroad throughout the regions of Judæa and Samaria, except the apostles. '
  '10':
  - type: text
    content: 'to whom they all gave heed, from the least to the greatest, saying, This man is the great power of God. '
  '11':
  - type: text
    content: 'And to him they had regard, because that of long time he had bewitched them with sorceries. '
  '12':
  - type: text
    content: 'But when they believed Philip preaching the things concerning the kingdom of God, and the name of Jesus Christ, they were baptized, both men and women. '
  '13':
  - type: text
    content: 'Then Simon himself believed also: and when he was baptized, he continued with Philip, and wondered, beholding the miracles and signs which were done.'
  '14':
  - type: text
    content: 'Now when the apostles which were at Jerusalem heard that Samaria had received the word of God, they sent unto them Peter and John: '
  '15':
  - type: text
    content: 'who, when they were come down, prayed for them, that they might receive the Holy Ghost: '
  '16':
  - type: text
    content: '(for as yet he was fallen upon none of them: only they were baptized in the name of the Lord Jesus.) '
  '17':
  - type: text
    content: 'Then laid they '
  - type: text
    content: their
  - type: text
    content: ' hands on them, and they received the Holy Ghost.'
  '18':
  - type: text
    content: 'And when Simon saw that through laying on of the apostles'' hands the Holy Ghost was given, he offered them money, '
  '19':
  - type: text
    content: 'saying, Give me also this power, that on whomsoever I lay hands, he may receive the Holy Ghost. '
  '2':
  - type: text
    content: 'And devout men carried Stephen '
  - type: text
    content: to his burial
  - type: text
    content: ', and made great lamentation over him. '
  '20':
  - type: text
    content: 'But Peter said unto him, Thy money perish with thee, because thou hast thought that the gift of God may be purchased with money. '
  '21':
  - type: text
    content: 'Thou hast neither part nor lot in this matter: for thy heart is not right in the sight of God. '
  '22':
  - type: text
    content: 'Repent therefore of this thy wickedness, and pray God, if perhaps the thought of thine heart may be forgiven thee. '
  '23':
  - type: text
    content: 'For I perceive that thou art in the gall of bitterness, and '
  - type: text
    content: in
  - type: text
    content: ' the bond of iniquity. '
  '24':
  - type: text
    content: Then answered Simon, and said, Pray ye to the Lord for me, that none of these things which ye have spoken come upon me.
  '25':
  - type: text
    content: And they, when they had testified and preached the word of the Lord, returned to Jerusalem, and preached the gospel in many villages of the Samaritans.
  - type: heading
    content: Philip and an Ethiopian
  '26':
  - type: text
    content: 'And the angel of the Lord spake unto Philip, saying, Arise, and go toward the south unto the way that goeth down from Jerusalem unto Gaza, which is desert. '
  '27':
  - type: text
    content: 'And he arose and went: and, behold, a man of Ethiopia, an eunuch of great authority under Candace queen of the Ethiopians, who had the charge of all her treasure, and had come to Jerusalem for to worship, '
  '28':
  - type: text
    content: was returning, and sitting in his chariot read Esaias the prophet.
  '29':
  - type: text
    content: 'Then the Spirit said unto Philip, Go near, and join thyself to this chariot. '
  '3':
  - type: text
    content: 'As for Saul, he made havock of the church, entering into every house, and haling men and women committed '
  - type: text
    content: them
  - type: text
    content: ' to prison.'
  - type: heading
    content: The Church in Judæa and Samaria
  '30':
  - type: text
    content: 'And Philip ran thither to '
  - type: text
    content: him
  - type: text
    content: ', and heard him read the prophet Esaias, and said, Understandest thou what thou readest? '
  '31':
  - type: text
    content: 'And he said, How can I, except some man should guide me? And he desired Philip that he would come up and sit with him. '
  '32':
  - type: text
    content: The place of the scripture which he read was this,
  - type: text
    content: He was led as a sheep to the slaughter;
  - type: text
    content: And like a lamb dumb before his shearer,
  - type: text
    content: 'So opened he not his mouth:'
  '33':
  - type: text
    content: 'In his humiliation his judgment was taken away:'
  - type: text
    content: And who shall declare his generation?
  - type: text
    content: For his life is taken from the earth.
  '34':
  - type: text
    content: And the eunuch answered Philip, and said, I pray thee, of whom speaketh the prophet this? of himself, or of some other man?
  '35':
  - type: text
    content: 'Then Philip opened his mouth, and began at the same scripture, and preached unto him Jesus. '
  '36':
  - type: text
    content: 'And as they went on '
  - type: text
    content: their
  - type: text
    content: ' way, they came unto a certain water: and the eunuch said, See, '
  - type: text
    content: here is
  - type: text
    content: ' water; what doth hinder me to be baptized? '
  '37':
  - type: text
    content: 'And Philip said, If thou believest with all thine heart, thou mayest. And he answered and said, I believe that Jesus Christ is the Son of God. '
  '38':
  - type: text
    content: 'And he commanded the chariot to stand still: and they went down both into the water, both Philip and the eunuch; and he baptized him. '
  '39':
  - type: text
    content: 'And when they were come up out of the water, the Spirit of the Lord caught away Philip, that the eunuch saw him no more: and he went on his way rejoicing. '
  '4':
  - type: text
    content: 'Therefore they that were scattered abroad went every where preaching the word. '
  '40':
  - type: text
    content: 'But Philip was found at Azotus: and passing through he preached in all the cities, till he came to Cæsarea.'
  '5':
  - type: text
    content: 'Then Philip went down to the city of Samaria, and preached Christ unto them. '
  '6':
  - type: text
    content: 'And the people with one accord gave heed unto those things which Philip spake, hearing and seeing the miracles which he did. '
  '7':
  - type: text
    content: 'For unclean spirits, crying with loud voice, came out of many that were possessed '
  - type: text
    content: with them
  - type: text
    content: ': and many taken with palsies, and that were lame, were healed. '
  '8':
  - type: text
    content: And there was great joy in that city.
  '9':
  - type: text
    content: 'But there was a certain man, called Simon, which beforetime in the same city used sorcery, and bewitched the people of Samaria, giving out that himself was some great one: '
