document_id: ACT.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Saul was consenting unto his death. And at that time there was a great persecution against the church which was at Jerusalem; and they were all scattered abroad throughout the regions of Judæa and Samaria, except the apostles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And devout men carried Stephen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to his burial
  - type: text
    text: ', and made great lamentation over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As for Saul, he made havock of the church, entering into every house, and haling men and women committed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to prison.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Church in Judæa and Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore they that were scattered abroad went every where preaching the word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Philip went down to the city of Samaria, and preached Christ unto them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the people with one accord gave heed unto those things which Philip spake, hearing and seeing the miracles which he did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For unclean spirits, crying with loud voice, came out of many that were possessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with them
  - type: text
    text: ': and many taken with palsies, and that were lame, were healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And there was great joy in that city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But there was a certain man, called Simon, which beforetime in the same city used sorcery, and bewitched the people of Samaria, giving out that himself was some great one: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'to whom they all gave heed, from the least to the greatest, saying, This man is the great power of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And to him they had regard, because that of long time he had bewitched them with sorceries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when they believed Philip preaching the things concerning the kingdom of God, and the name of Jesus Christ, they were baptized, both men and women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Simon himself believed also: and when he was baptized, he continued with Philip, and wondered, beholding the miracles and signs which were done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now when the apostles which were at Jerusalem heard that Samaria had received the word of God, they sent unto them Peter and John: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'who, when they were come down, prayed for them, that they might receive the Holy Ghost: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(for as yet he was fallen upon none of them: only they were baptized in the name of the Lord Jesus.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then laid they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands on them, and they received the Holy Ghost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when Simon saw that through laying on of the apostles'' hands the Holy Ghost was given, he offered them money, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'saying, Give me also this power, that on whomsoever I lay hands, he may receive the Holy Ghost. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Peter said unto him, Thy money perish with thee, because thou hast thought that the gift of God may be purchased with money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Thou hast neither part nor lot in this matter: for thy heart is not right in the sight of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Repent therefore of this thy wickedness, and pray God, if perhaps the thought of thine heart may be forgiven thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For I perceive that thou art in the gall of bitterness, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the bond of iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then answered Simon, and said, Pray ye to the Lord for me, that none of these things which ye have spoken come upon me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And they, when they had testified and preached the word of the Lord, returned to Jerusalem, and preached the gospel in many villages of the Samaritans.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Philip and an Ethiopian
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the angel of the Lord spake unto Philip, saying, Arise, and go toward the south unto the way that goeth down from Jerusalem unto Gaza, which is desert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he arose and went: and, behold, a man of Ethiopia, an eunuch of great authority under Candace queen of the Ethiopians, who had the charge of all her treasure, and had come to Jerusalem for to worship, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: was returning, and sitting in his chariot read Esaias the prophet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then the Spirit said unto Philip, Go near, and join thyself to this chariot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Philip ran thither to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and heard him read the prophet Esaias, and said, Understandest thou what thou readest? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said, How can I, except some man should guide me? And he desired Philip that he would come up and sit with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The place of the scripture which he read was this,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was led as a sheep to the slaughter;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like a lamb dumb before his shearer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So opened he not his mouth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'In his humiliation his judgment was taken away:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And who shall declare his generation?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For his life is taken from the earth.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And the eunuch answered Philip, and said, I pray thee, of whom speaketh the prophet this? of himself, or of some other man?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then Philip opened his mouth, and began at the same scripture, and preached unto him Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And as they went on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' way, they came unto a certain water: and the eunuch said, See, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here is
  - type: text
    text: ' water; what doth hinder me to be baptized? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Philip said, If thou believest with all thine heart, thou mayest. And he answered and said, I believe that Jesus Christ is the Son of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he commanded the chariot to stand still: and they went down both into the water, both Philip and the eunuch; and he baptized him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And when they were come up out of the water, the Spirit of the Lord caught away Philip, that the eunuch saw him no more: and he went on his way rejoicing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But Philip was found at Azotus: and passing through he preached in all the cities, till he came to Cæsarea.'
