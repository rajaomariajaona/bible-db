document_id: LUK.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then drew near unto him all the publicans and sinners for to hear him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Likewise, I say unto you, there is joy in the presence of the angels of God over one sinner that repenteth.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prodigal Son
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A certain man had two sons:'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and the younger of them said to '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' father, Father, give me the portion of goods that falleth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: to me
      - type: text
        text: '. And he divided unto them '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' living.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And not many days after the younger son gathered all together, and took his journey into a far country, and there wasted his substance with riotous living.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when he had spent all, there arose a mighty famine in that land; and he began to be in want.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he went and joined himself to a citizen of that country; and he sent him into his fields to feed swine.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he would fain have filled his belly with the husks that the swine did eat: and no man gave unto him.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when he came to himself, he said, How many hired servants of my father's have bread enough and to spare, and I perish with hunger!
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will arise and go to my father, and will say unto him, Father, I have sinned against heaven, and before thee,
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and am no more worthy to be called thy son: make me as one of thy hired servants.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the Pharisees and scribes murmured, saying, This man receiveth sinners, and eateth with them.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Lost Sheep
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he arose, and came to his father. But when he was yet a great way off, his father saw him, and had compassion, and ran, and fell on his neck, and kissed him.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the son said unto him, Father, I have sinned against heaven, and in thy sight, and am no more worthy to be called thy son.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But the father said to his servants, Bring forth the best robe, and put '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' on him; and put a ring on his hand, and shoes on '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' feet:'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and bring hither the fatted calf, and kill '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: '; and let us eat, and be merry:'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for this my son was dead, and is alive again; he was lost, and is found. And they began to be merry.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now his elder son was in the field: and as he came and drew nigh to the house, he heard musick and dancing.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he called one of the servants, and asked what these things meant.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he said unto him, Thy brother is come; and thy father hath killed the fatted calf, because he hath received him safe and sound.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he was angry, and would not go in: therefore came his father out, and intreated him.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he answering said to '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' father, Lo, these many years do I serve thee, neither transgressed I at any time thy commandment: and yet thou never gavest me a kid, that I might make merry with my friends:'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spake this parable unto them, saying, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but as soon as this thy son was come, which hath devoured thy living with harlots, thou hast killed for him the fatted calf.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he said unto him, Son, thou art ever with me, and all that I have is thine.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It was meet that we should make merry, and be glad: for this thy brother was dead, and is alive again; and was lost, and is found.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What man of you, having an hundred sheep, if he lose one of them, doth not leave the ninety and nine in the wilderness, and go after that which is lost, until he find it?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when he hath found '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', he layeth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' on his shoulders, rejoicing.'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when he cometh home, he calleth together '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' friends and neighbours, saying unto them, Rejoice with me; for I have found my sheep which was lost.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I say unto you, that likewise joy shall be in heaven over one sinner that repenteth, more than over ninety and nine just persons, which need no repentance.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Lost Coin
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Either what woman having ten pieces of silver, if she lose one piece, doth not light a candle, and sweep the house, and seek diligently till she find '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: '?'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when she hath found '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', she calleth '
      - type: usfm
        marker: add
        children:
        - type: text
          text: her
      - type: text
        text: ' friends and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: her
      - type: text
        text: ' neighbours together, saying, Rejoice with me; for I have found the piece which I had lost.'
    - type: text
      text: ' '
