document_id: LUK.15,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then drew near unto him all the publicans and sinners for to hear him. '
  '10':
  - type: text
    content: Likewise, I say unto you, there is joy in the presence of the angels of God over one sinner that repenteth.
  - type: heading
    content: The Prodigal Son
  '11':
  - type: text
    content: 'And he said, '
  - type: text
    content: 'A certain man had two sons:'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'and the younger of them said to '
  - type: text
    content: his
  - type: text
    content: ' father, Father, give me the portion of goods that falleth '
  - type: text
    content: to me
  - type: text
    content: '. And he divided unto them '
  - type: text
    content: his
  - type: text
    content: ' living.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: And not many days after the younger son gathered all together, and took his journey into a far country, and there wasted his substance with riotous living.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And when he had spent all, there arose a mighty famine in that land; and he began to be in want.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And he went and joined himself to a citizen of that country; and he sent him into his fields to feed swine.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And he would fain have filled his belly with the husks that the swine did eat: and no man gave unto him.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: And when he came to himself, he said, How many hired servants of my father's have bread enough and to spare, and I perish with hunger!
  - type: text
    content: ' '
  '18':
  - type: text
    content: I will arise and go to my father, and will say unto him, Father, I have sinned against heaven, and before thee,
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'and am no more worthy to be called thy son: make me as one of thy hired servants.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: And the Pharisees and scribes murmured, saying, This man receiveth sinners, and eateth with them.
  - type: heading
    content: The Lost Sheep
  '20':
  - type: text
    content: And he arose, and came to his father. But when he was yet a great way off, his father saw him, and had compassion, and ran, and fell on his neck, and kissed him.
  - type: text
    content: ' '
  '21':
  - type: text
    content: And the son said unto him, Father, I have sinned against heaven, and in thy sight, and am no more worthy to be called thy son.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'But the father said to his servants, Bring forth the best robe, and put '
  - type: text
    content: it
  - type: text
    content: ' on him; and put a ring on his hand, and shoes on '
  - type: text
    content: his
  - type: text
    content: ' feet:'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'and bring hither the fatted calf, and kill '
  - type: text
    content: it
  - type: text
    content: '; and let us eat, and be merry:'
  - type: text
    content: ' '
  '24':
  - type: text
    content: for this my son was dead, and is alive again; he was lost, and is found. And they began to be merry.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Now his elder son was in the field: and as he came and drew nigh to the house, he heard musick and dancing.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: And he called one of the servants, and asked what these things meant.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he said unto him, Thy brother is come; and thy father hath killed the fatted calf, because he hath received him safe and sound.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And he was angry, and would not go in: therefore came his father out, and intreated him.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And he answering said to '
  - type: text
    content: his
  - type: text
    content: ' father, Lo, these many years do I serve thee, neither transgressed I at any time thy commandment: and yet thou never gavest me a kid, that I might make merry with my friends:'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And he spake this parable unto them, saying, '
  '30':
  - type: text
    content: but as soon as this thy son was come, which hath devoured thy living with harlots, thou hast killed for him the fatted calf.
  - type: text
    content: ' '
  '31':
  - type: text
    content: And he said unto him, Son, thou art ever with me, and all that I have is thine.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'It was meet that we should make merry, and be glad: for this thy brother was dead, and is alive again; and was lost, and is found.'
  '4':
  - type: text
    content: What man of you, having an hundred sheep, if he lose one of them, doth not leave the ninety and nine in the wilderness, and go after that which is lost, until he find it?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And when he hath found '
  - type: text
    content: it
  - type: text
    content: ', he layeth '
  - type: text
    content: it
  - type: text
    content: ' on his shoulders, rejoicing.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And when he cometh home, he calleth together '
  - type: text
    content: his
  - type: text
    content: ' friends and neighbours, saying unto them, Rejoice with me; for I have found my sheep which was lost.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: I say unto you, that likewise joy shall be in heaven over one sinner that repenteth, more than over ninety and nine just persons, which need no repentance.
  - type: heading
    content: The Lost Coin
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Either what woman having ten pieces of silver, if she lose one piece, doth not light a candle, and sweep the house, and seek diligently till she find '
  - type: text
    content: it
  - type: text
    content: '?'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And when she hath found '
  - type: text
    content: it
  - type: text
    content: ', she calleth '
  - type: text
    content: her
  - type: text
    content: ' friends and '
  - type: text
    content: her
  - type: text
    content: ' neighbours together, saying, Rejoice with me; for I have found the piece which I had lost.'
  - type: text
    content: ' '
