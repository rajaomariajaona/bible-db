document_id: 1PE.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The elders which are among you I exhort, who am also an elder, and a witness of the sufferings of Christ, and also a partaker of the glory that shall be revealed: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'feed the flock of God which is among you, taking the oversight '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', not by constraint, but willingly; not for filthy lucre, but of a ready mind; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'neither as being lords over '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God's
  - type: text
    text: ' heritage, but being ensamples to the flock. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the chief Shepherd shall appear, ye shall receive a crown of glory that fadeth not away. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Likewise, ye younger, submit yourselves unto the elder. Yea, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of you
  - type: text
    text: ' be subject one to another, and be clothed with humility: for God resisteth the proud, and giveth grace to the humble. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Humble yourselves therefore under the mighty hand of God, that he may exalt you in due time: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'casting all your care upon him; for he careth for you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Be sober, be vigilant; because your adversary the devil, as a roaring lion, walketh about, seeking whom he may devour: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'whom resist stedfast in the faith, knowing that the same afflictions are accomplished in your brethren that are in the world. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the God of all grace, who hath called us unto his eternal glory by Christ Jesus, after that ye have suffered a while, make you perfect, stablish, strengthen, settle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'To him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' glory and dominion for ever and ever. Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'By Silvanus, a faithful brother unto you, as I suppose, I have written briefly, exhorting, and testifying that this is the true grace of God wherein ye stand. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: add
    children:
    - type: text
      text: church that is
  - type: text
    text: ' at Babylon, elected together with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ', saluteth you; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so doth
  - type: text
    text: ' Marcus my son. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Greet ye one another with a kiss of charity.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all that are in Christ Jesus. Amen.'
