document_id: 1PE.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The elders which are among you I exhort, who am also an elder, and a witness of the sufferings of Christ, and also a partaker of the glory that shall be revealed: '
  '10':
  - type: text
    content: 'But the God of all grace, who hath called us unto his eternal glory by Christ Jesus, after that ye have suffered a while, make you perfect, stablish, strengthen, settle '
  - type: text
    content: you
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'To him '
  - type: text
    content: be
  - type: text
    content: ' glory and dominion for ever and ever. Amen.'
  '12':
  - type: text
    content: 'By Silvanus, a faithful brother unto you, as I suppose, I have written briefly, exhorting, and testifying that this is the true grace of God wherein ye stand. '
  '13':
  - type: text
    content: 'The '
  - type: text
    content: church that is
  - type: text
    content: ' at Babylon, elected together with '
  - type: text
    content: you
  - type: text
    content: ', saluteth you; and '
  - type: text
    content: so doth
  - type: text
    content: ' Marcus my son. '
  '14':
  - type: text
    content: Greet ye one another with a kiss of charity.
  - type: text
    content: 'Peace '
  - type: text
    content: be
  - type: text
    content: ' with you all that are in Christ Jesus. Amen.'
  '2':
  - type: text
    content: 'feed the flock of God which is among you, taking the oversight '
  - type: text
    content: thereof
  - type: text
    content: ', not by constraint, but willingly; not for filthy lucre, but of a ready mind; '
  '3':
  - type: text
    content: 'neither as being lords over '
  - type: text
    content: God's
  - type: text
    content: ' heritage, but being ensamples to the flock. '
  '4':
  - type: text
    content: 'And when the chief Shepherd shall appear, ye shall receive a crown of glory that fadeth not away. '
  '5':
  - type: text
    content: 'Likewise, ye younger, submit yourselves unto the elder. Yea, all '
  - type: text
    content: of you
  - type: text
    content: ' be subject one to another, and be clothed with humility: for God resisteth the proud, and giveth grace to the humble. '
  '6':
  - type: text
    content: 'Humble yourselves therefore under the mighty hand of God, that he may exalt you in due time: '
  '7':
  - type: text
    content: 'casting all your care upon him; for he careth for you. '
  '8':
  - type: text
    content: 'Be sober, be vigilant; because your adversary the devil, as a roaring lion, walketh about, seeking whom he may devour: '
  '9':
  - type: text
    content: 'whom resist stedfast in the faith, knowing that the same afflictions are accomplished in your brethren that are in the world. '
