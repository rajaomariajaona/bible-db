document_id: MAT.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then came to Jesus scribes and Pharisees, which were of Jerusalem, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Why do thy disciples transgress the tradition of the elders? for they wash not their hands when they eat bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But he answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why do ye also transgress the commandment of God by your tradition?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For God commanded, saying, Honour thy father and mother: and, He that curseth father or mother, let him die the death.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But ye say, Whosoever shall say to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' father or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mother, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' a gift, by whatsoever thou mightest be profited by me;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and honour not his father or his mother, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he shall be free
    - type: text
      text: . Thus have ye made the commandment of God of none effect by your tradition.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye
    - type: text
      text: ' hypocrites, well did Esaias prophesy of you, saying,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This people draweth nigh unto me with their mouth, and honoureth me with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' lips;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But their heart is far from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But in vain they do worship me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Teaching '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' doctrines the commandments of men.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he called the multitude, and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Hear, and understand:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: not that which goeth into the mouth defileth a man; but that which cometh out of the mouth, this defileth a man.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then came his disciples, and said unto him, Knowest thou that the Pharisees were offended, after they heard this saying? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But he answered and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Every plant, which my heavenly Father hath not planted, shall be rooted up.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Let them alone: they be blind leaders of the blind. And if the blind lead the blind, both shall fall into the ditch.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then answered Peter and said unto him, Declare unto us this parable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Are ye also yet without understanding?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do not ye yet understand, that whatsoever entereth in at the mouth goeth into the belly, and is cast out into the draught?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But those things which proceed out of the mouth come forth from the heart; and they defile the man.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For out of the heart proceed evil thoughts, murders, adulteries, fornications, thefts, false witness, blasphemies:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'these are '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the things
    - type: text
      text: ' which defile a man: but to eat with unwashen hands defileth not a man.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tyre and Sidon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Jesus went thence, and departed into the coasts of Tyre and Sidon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And, behold, a woman of Canaan came out of the same coasts, and cried unto him, saying, Have mercy on me, O Lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' Son of David; my daughter is grievously vexed with a devil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But he answered her not a word. And his disciples came and besought him, saying, Send her away; for she crieth after us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But he answered and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am not sent but unto the lost sheep of the house of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then came she and worshipped him, saying, Lord, help me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But he answered and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'It is not meet to take the children''s bread, and to cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to dogs.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And she said, Truth, Lord: yet the dogs eat of the crumbs which fall from their masters'' table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Jesus answered and said unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'O woman, great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy faith: be it unto thee even as thou wilt.'
  - type: text
    text: ' And her daughter was made whole from that very hour.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: By the Sea of Galilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Jesus departed from thence, and came nigh unto the sea of Galilee; and went up into a mountain, and sat down there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And great multitudes came unto him, having with them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those that were
  - type: text
    text: ' lame, blind, dumb, maimed, and many others, and cast them down at Jesus'' feet; and he healed them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'insomuch that the multitude wondered, when they saw the dumb to speak, the maimed to be whole, the lame to walk, and the blind to see: and they glorified the God of Israel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Feeding Four Thousand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Jesus called his disciples '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I have compassion on the multitude, because they continue with me now three days, and have nothing to eat: and I will not send them away fasting, lest they faint in the way.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And his disciples say unto him, Whence should we have so much bread in the wilderness, as to fill so great a multitude? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How many loaves have ye?
  - type: text
    text: ' And they said, Seven, and a few little fishes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And he commanded the multitude to sit down on the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he took the seven loaves and the fishes, and gave thanks, and brake '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and gave to his disciples, and the disciples to the multitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And they did all eat, and were filled: and they took up of the broken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: meat
  - type: text
    text: ' that was left seven baskets full. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And they that did eat were four thousand men, beside women and children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And he sent away the multitude, and took ship, and came into the coasts of Magdala.
