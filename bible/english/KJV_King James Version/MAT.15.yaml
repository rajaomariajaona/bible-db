  - type: text
    content: thou
  - type: text
    content: ' Son of David; my daughter is grievously vexed with a devil. '
  '23':
  - type: text
    content: 'But he answered her not a word. And his disciples came and besought him, saying, Send her away; for she crieth after us. '
  '24':
  - type: text
    content: 'But he answered and said, '
  - type: text
    content: I am not sent but unto the lost sheep of the house of Israel.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Then came she and worshipped him, saying, Lord, help me. '
  '26':
  - type: text
    content: 'But he answered and said, '
  - type: text
    content: 'It is not meet to take the children''s bread, and to cast '
  - type: text
    content: it
  - type: text
    content: ' to dogs.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And she said, Truth, Lord: yet the dogs eat of the crumbs which fall from their masters'' table. '
  '28':
  - type: text
