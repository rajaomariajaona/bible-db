verses:
  '1':
  - type: text
    content: 'Then came to Jesus scribes and Pharisees, which were of Jerusalem, saying, '
  '10':
  - type: text
    content: 'And he called the multitude, and said unto them, '
  - type: text
    content: 'Hear, and understand:'
  - type: text
    content: ' '
  '11':
  - type: text
    content: not that which goeth into the mouth defileth a man; but that which cometh out of the mouth, this defileth a man.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Then came his disciples, and said unto him, Knowest thou that the Pharisees were offended, after they heard this saying? '
  '13':
  - type: text
    content: 'But he answered and said, '
  - type: text
    content: Every plant, which my heavenly Father hath not planted, shall be rooted up.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Let them alone: they be blind leaders of the blind. And if the blind lead the blind, both shall fall into the ditch.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Then answered Peter and said unto him, Declare unto us this parable. '
  '16':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: Are ye also yet without understanding?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Do not ye yet understand, that whatsoever entereth in at the mouth goeth into the belly, and is cast out into the draught?
  - type: text
    content: ' '
  '18':
  - type: text
    content: But those things which proceed out of the mouth come forth from the heart; and they defile the man.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'For out of the heart proceed evil thoughts, murders, adulteries, fornications, thefts, false witness, blasphemies:'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Why do thy disciples transgress the tradition of the elders? for they wash not their hands when they eat bread. '
  '20':
  - type: text
    content: 'these are '
  - type: text
    content: the things
  - type: text
    content: ' which defile a man: but to eat with unwashen hands defileth not a man.'
  - type: heading
    content: Tyre and Sidon
  '21':
  - type: text
    content: 'Then Jesus went thence, and departed into the coasts of Tyre and Sidon. '
  '22':
