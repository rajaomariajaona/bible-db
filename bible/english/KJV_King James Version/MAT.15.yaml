  - type: heading
    content: By the Sea of Galilee
  '29':
  - type: text
    content: 'And Jesus departed from thence, and came nigh unto the sea of Galilee; and went up into a mountain, and sat down there. '
  '3':
  - type: text
    content: 'But he answered and said unto them, '
  - type: text
    content: Why do ye also transgress the commandment of God by your tradition?
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And great multitudes came unto him, having with them '
  - type: text
    content: those that were
  - type: text
