    content: 'Let not him that eateth despise him that eateth not; and let not him which eateth not judge him that eateth: for God hath received him. '
  '4':
  - type: text
    content: 'Who art thou that judgest another man''s servant? to his own master he standeth or falleth. Yea, he shall be holden up: for God is able to make him stand. '
