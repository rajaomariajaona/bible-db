document_id: ROM.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Christian Charity and Unity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Him that is weak in the faith receive ye, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' not to doubtful disputations. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For one believeth that he may eat all things: another, who is weak, eateth herbs. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Let not him that eateth despise him that eateth not; and let not him which eateth not judge him that eateth: for God hath received him. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Who art thou that judgest another man''s servant? to his own master he standeth or falleth. Yea, he shall be holden up: for God is able to make him stand. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'One man esteemeth one day above another: another esteemeth every day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: alike
  - type: text
    text: '. Let every man be fully persuaded in his own mind. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He that regardeth the day, regardeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto the Lord; and he that regardeth not the day, to the Lord he doth not regard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. He that eateth, eateth to the Lord, for he giveth God thanks; and he that eateth not, to the Lord he eateth not, and giveth God thanks. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For none of us liveth to himself, and no man dieth to himself. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For whether we live, we live unto the Lord; and whether we die, we die unto the Lord: whether we live therefore, or die, we are the Lord''s. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For to this end Christ both died, and rose, and revived, that he might be Lord both of the dead and living. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But why dost thou judge thy brother? or why dost thou set at nought thy brother? for we shall all stand before the judgment seat of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For it is written,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' I live, saith the Lord, every knee shall bow to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And every tongue shall confess to God.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So then every one of us shall give account of himself to God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Christian Spirit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let us not therefore judge one another any more: but judge this rather, that no man put a stumblingblock or an occasion to fall in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' brother''s way. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I know, and am persuaded by the Lord Jesus, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' nothing unclean of itself: but to him that esteemeth any thing to be unclean, to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if thy brother be grieved with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' meat, now walkest thou not charitably. Destroy not him with thy meat, for whom Christ died. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Let not then your good be evil spoken of: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'for the kingdom of God is not meat and drink; but righteousness, and peace, and joy in the Holy Ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For he that in these things serveth Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' acceptable to God, and approved of men. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Let us therefore follow after the things which make for peace, and things wherewith one may edify another. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For meat destroy not the work of God. All things indeed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' pure; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' evil for that man who eateth with offence. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' good neither to eat flesh, nor to drink wine, nor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any thing
  - type: text
    text: ' whereby thy brother stumbleth, or is offended, or is made weak. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hast thou faith? have '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to thyself before God. Happy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that condemneth not himself in that thing which he alloweth. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he that doubteth is damned if he eat, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he eateth
  - type: text
    text: ' not of faith: for whatsoever '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not of faith is sin.'
