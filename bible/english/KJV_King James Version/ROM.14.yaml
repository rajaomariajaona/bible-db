  - type: text
    content: ' unto the Lord; and he that regardeth not the day, to the Lord he doth not regard '
  - type: text
    content: it
  - type: text
    content: '. He that eateth, eateth to the Lord, for he giveth God thanks; and he that eateth not, to the Lord he eateth not, and giveth God thanks. '
  '7':
  - type: text
    content: 'For none of us liveth to himself, and no man dieth to himself. '
  '8':
  - type: text
    content: 'For whether we live, we live unto the Lord; and whether we die, we die unto the Lord: whether we live therefore, or die, we are the Lord''s. '
  '9':
  - type: text
    content: 'For to this end Christ both died, and rose, and revived, that he might be Lord both of the dead and living. '
