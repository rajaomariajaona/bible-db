  - type: text
    content: day
  - type: text
    content: ' of the month, the waters were dried up from off the earth: and Noah removed the covering of the ark, and looked, and, behold, the face of the ground was dry. '
  '14':
  - type: text
    content: And in the second month, on the seven and twentieth day of the month, was the earth dried.
  '15':
  - type: text
    content: 'And God spake unto Noah, saying, '
  '16':
  - type: text
    content: 'Go forth of the ark, thou, and thy wife, and thy sons, and thy sons'' wives with thee. '
  '17':
  - type: text
    content: 'Bring forth with thee every living thing that '
  - type: text
    content: is
  - type: text
    content: ' with thee, of all flesh, '
  - type: text
    content: both
  - type: text
    content: ' of fowl, and of cattle, and of every creeping thing that creepeth upon the earth; that they may breed abundantly in the earth, and be fruitful, and multiply upon the earth. '
  '18':
  - type: text
    content: 'And Noah went forth, and his sons, and his wife, and his sons'' wives with him: '
  '19':
  - type: text
    content: 'every beast, every creeping thing, and every fowl, '
  - type: text
    content: and
  - type: text
    content: ' whatsoever creepeth upon the earth, after their kinds, went forth out of the ark.'
  '2':
  - type: text
    content: 'the fountains also of the deep and the windows of heaven were stopped, and the rain from heaven was restrained; '
  '20':
  - type: text
    content: 'And Noah builded an altar unto the '
  - type: text
    content: LORD
  - type: text
    content: '; and took of every clean beast, and of every clean fowl, and offered burnt offerings on the altar. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' smelled a sweet savour; and the '
  - type: text
    content: LORD
  - type: text
