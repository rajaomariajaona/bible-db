document_id: GEN.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And God remembered Noah, and every living thing, and all the cattle that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him in the ark: and God made a wind to pass over the earth, and the waters asswaged; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'the fountains also of the deep and the windows of heaven were stopped, and the rain from heaven was restrained; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and the waters returned from off the earth continually: and after the end of the hundred and fifty days the waters were abated. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the ark rested in the seventh month, on the seventeenth day of the month, upon the mountains of Ararat. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the waters decreased continually until the tenth month: in the tenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: month
  - type: text
    text: ', on the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, were the tops of the mountains seen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it came to pass at the end of forty days, that Noah opened the window of the ark which he had made: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and he sent forth a raven, which went forth to and fro, until the waters were dried up from off the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also he sent forth a dove from him, to see if the waters were abated from off the face of the ground; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but the dove found no rest for the sole of her foot, and she returned unto him into the ark, for the waters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on the face of the whole earth: then he put forth his hand, and took her, and pulled her in unto him into the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he stayed yet other seven days; and again he sent forth the dove out of the ark; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the dove came in to him in the evening; and, lo, in her mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an olive leaf pluckt off: so Noah knew that the waters were abated from off the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And he stayed yet other seven days; and sent forth the dove; which returned not again unto him any more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass in the six hundredth and first year, in the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: month
  - type: text
    text: ', the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, the waters were dried up from off the earth: and Noah removed the covering of the ark, and looked, and, behold, the face of the ground was dry. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And in the second month, on the seven and twentieth day of the month, was the earth dried.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And God spake unto Noah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Go forth of the ark, thou, and thy wife, and thy sons, and thy sons'' wives with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Bring forth with thee every living thing that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with thee, of all flesh, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' of fowl, and of cattle, and of every creeping thing that creepeth upon the earth; that they may breed abundantly in the earth, and be fruitful, and multiply upon the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Noah went forth, and his sons, and his wife, and his sons'' wives with him: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'every beast, every creeping thing, and every fowl, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' whatsoever creepeth upon the earth, after their kinds, went forth out of the ark.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Noah builded an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and took of every clean beast, and of every clean fowl, and offered burnt offerings on the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' smelled a sweet savour; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said in his heart, I will not again curse the ground any more for man''s sake; for the imagination of man''s heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' evil from his youth; neither will I again smite any more every thing living, as I have done. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: While the earth remaineth, seedtime and harvest, and cold and heat, and summer and winter, and day and night shall not cease.
