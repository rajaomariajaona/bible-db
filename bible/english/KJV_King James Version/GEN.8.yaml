  - type: text
    content: ' evil from his youth; neither will I again smite any more every thing living, as I have done. '
  '22':
  - type: text
    content: While the earth remaineth, seedtime and harvest, and cold and heat, and summer and winter, and day and night shall not cease.
  '3':
  - type: text
    content: 'and the waters returned from off the earth continually: and after the end of the hundred and fifty days the waters were abated. '
  '4':
  - type: text
    content: 'And the ark rested in the seventh month, on the seventeenth day of the month, upon the mountains of Ararat. '
  '5':
  - type: text
    content: 'And the waters decreased continually until the tenth month: in the tenth '
  - type: text
