  - type: text
    content: day
  - type: text
    content: ' of the month, were the tops of the mountains seen.'
  '6':
  - type: text
    content: 'And it came to pass at the end of forty days, that Noah opened the window of the ark which he had made: '
  '7':
  - type: text
    content: 'and he sent forth a raven, which went forth to and fro, until the waters were dried up from off the earth. '
  '8':
  - type: text
    content: 'Also he sent forth a dove from him, to see if the waters were abated from off the face of the ground; '
  '9':
  - type: text
    content: 'but the dove found no rest for the sole of her foot, and she returned unto him into the ark, for the waters '
  - type: text
    content: were
  - type: text
    content: ' on the face of the whole earth: then he put forth his hand, and took her, and pulled her in unto him into the ark. '
