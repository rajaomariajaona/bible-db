document_id: ACT.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Men, brethren, and fathers, hear ye my defence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which I make
  - type: text
    text: ' now unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(And when they heard that he spake in the Hebrew tongue to them, they kept the more silence: and he saith,)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I am verily a man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which am
  - type: text
    text: ' a Jew, born in Tarsus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a city
  - type: text
    text: ' in Cilicia, yet brought up in this city at the feet of Gamaliel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' taught according to the perfect manner of the law of the fathers, and was zealous toward God, as ye all are this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I persecuted this way unto the death, binding and delivering into prisons both men and women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As also the high priest doth bear me witness, and all the estate of the elders: from whom also I received letters unto the brethren, and went to Damascus, to bring them which were there bound unto Jerusalem, for to be punished. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it came to pass, that, as I made my journey, and was come nigh unto Damascus about noon, suddenly there shone from heaven a great light round about me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I fell unto the ground, and heard a voice saying unto me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Saul, Saul, why persecutest thou me?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I answered, Who art thou, Lord? And he said unto me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am Jesus of Nazareth, whom thou persecutest.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they that were with me saw indeed the light, and were afraid; but they heard not the voice of him that spake to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I said, What shall I do, Lord? And the Lord said unto me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Arise, and go into Damascus; and there it shall be told thee of all things which are appointed for thee to do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when I could not see for the glory of that light, being led by the hand of them that were with me, I came into Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And one Ananias, a devout man according to the law, having a good report of all the Jews which dwelt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'came unto me, and stood, and said unto me, Brother Saul, receive thy sight. And the same hour I looked up upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he said, The God of our fathers hath chosen thee, that thou shouldest know his will, and see that Just One, and shouldest hear the voice of his mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For thou shalt be his witness unto all men of what thou hast seen and heard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And now why tarriest thou? arise, and be baptized, and wash away thy sins, calling on the name of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass, that, when I was come again to Jerusalem, even while I prayed in the temple, I was in a trance; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and saw him saying unto me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Make haste, and get thee quickly out of Jerusalem: for they will not receive thy testimony concerning me.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I said, Lord, they know that I imprisoned and beat in every synagogue them that believed on thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and when the blood of thy martyr Stephen was shed, I also was standing by, and consenting unto his death, and kept the raiment of them that slew him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he said unto me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Depart: for I will send thee far hence unto the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And they gave him audience unto this word, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' lifted up their voices, and said, Away with such a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' from the earth: for it is not fit that he should live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And as they cried out, and cast off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' clothes, and threw dust into the air, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'the chief captain commanded him to be brought into the castle, and bade that he should be examined by scourging; that he might know wherefore they cried so against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And as they bound him with thongs, Paul said unto the centurion that stood by, Is it lawful for you to scourge a man that is a Roman, and uncondemned? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When the centurion heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', he went and told the chief captain, saying, Take heed what thou doest: for this man is a Roman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the chief captain came, and said unto him, Tell me, art thou a Roman? He said, Yea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the chief captain answered, With a great sum obtained I this freedom. And Paul said, But I was free born. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then straightway they departed from him which should have examined him: and the chief captain also was afraid, after he knew that he was a Roman, and because he had bound him.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Before the Sanhedrin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On the morrow, because he would have known the certainty wherefore he was accused of the Jews, he loosed him from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' bands, and commanded the chief priests and all their council to appear, and brought Paul down, and set him before them.'
