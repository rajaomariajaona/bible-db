  - type: text
    content: 'Men, brethren, and fathers, hear ye my defence '
  - type: text
    content: which I make
  - type: text
    content: ' now unto you. '
  '10':
  - type: text
    content: 'And I said, What shall I do, Lord? And the Lord said unto me, '
  - type: text
    content: Arise, and go into Damascus; and there it shall be told thee of all things which are appointed for thee to do.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And when I could not see for the glory of that light, being led by the hand of them that were with me, I came into Damascus. '
  '12':
  - type: text
    content: 'And one Ananias, a devout man according to the law, having a good report of all the Jews which dwelt '
  - type: text
    content: there
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'came unto me, and stood, and said unto me, Brother Saul, receive thy sight. And the same hour I looked up upon him. '
  '14':
  - type: text
    content: 'And he said, The God of our fathers hath chosen thee, that thou shouldest know his will, and see that Just One, and shouldest hear the voice of his mouth. '
  '15':
  - type: text
    content: 'For thou shalt be his witness unto all men of what thou hast seen and heard. '
  '16':
  - type: text
    content: 'And now why tarriest thou? arise, and be baptized, and wash away thy sins, calling on the name of the Lord. '
  '17':
  - type: text
    content: 'And it came to pass, that, when I was come again to Jerusalem, even while I prayed in the temple, I was in a trance; '
  '18':
  - type: text
    content: 'and saw him saying unto me, '
  - type: text
    content: 'Make haste, and get thee quickly out of Jerusalem: for they will not receive thy testimony concerning me.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I said, Lord, they know that I imprisoned and beat in every synagogue them that believed on thee: '
  '2':
  - type: text
    content: '(And when they heard that he spake in the Hebrew tongue to them, they kept the more silence: and he saith,)'
  '20':
  - type: text
    content: 'and when the blood of thy martyr Stephen was shed, I also was standing by, and consenting unto his death, and kept the raiment of them that slew him. '
  '21':
  - type: text
    content: 'And he said unto me, '
  - type: text
    content: 'Depart: for I will send thee far hence unto the Gentiles.'
  '22':
  - type: text
    content: 'And they gave him audience unto this word, and '
  - type: text
    content: then
  - type: text
    content: ' lifted up their voices, and said, Away with such a '
  - type: text
    content: fellow
  - type: text
    content: ' from the earth: for it is not fit that he should live. '
  '23':
  - type: text
    content: 'And as they cried out, and cast off '
  - type: text
    content: their
  - type: text
    content: ' clothes, and threw dust into the air, '
  '24':
  - type: text
    content: 'the chief captain commanded him to be brought into the castle, and bade that he should be examined by scourging; that he might know wherefore they cried so against him. '
  '25':
  - type: text
    content: 'And as they bound him with thongs, Paul said unto the centurion that stood by, Is it lawful for you to scourge a man that is a Roman, and uncondemned? '
  '26':
  - type: text
    content: 'When the centurion heard '
  - type: text
    content: that
  - type: text
    content: ', he went and told the chief captain, saying, Take heed what thou doest: for this man is a Roman. '
  '27':
  - type: text
    content: 'Then the chief captain came, and said unto him, Tell me, art thou a Roman? He said, Yea. '
  '28':
  - type: text
    content: 'And the chief captain answered, With a great sum obtained I this freedom. And Paul said, But I was free born. '
  '29':
  - type: text
    content: 'Then straightway they departed from him which should have examined him: and the chief captain also was afraid, after he knew that he was a Roman, and because he had bound him.'
  - type: heading
    content: Before the Sanhedrin
  '3':
  - type: text
    content: 'I am verily a man '
  - type: text
    content: which am
  - type: text
    content: ' a Jew, born in Tarsus, '
  - type: text
    content: a city
  - type: text
    content: ' in Cilicia, yet brought up in this city at the feet of Gamaliel, '
  - type: text
    content: and
  - type: text
    content: ' taught according to the perfect manner of the law of the fathers, and was zealous toward God, as ye all are this day. '
  '30':
  - type: text
    content: 'On the morrow, because he would have known the certainty wherefore he was accused of the Jews, he loosed him from '
  - type: text
    content: his
  - type: text
    content: ' bands, and commanded the chief priests and all their council to appear, and brought Paul down, and set him before them.'
  '4':
  - type: text
    content: 'And I persecuted this way unto the death, binding and delivering into prisons both men and women. '
  '5':
  - type: text
    content: 'As also the high priest doth bear me witness, and all the estate of the elders: from whom also I received letters unto the brethren, and went to Damascus, to bring them which were there bound unto Jerusalem, for to be punished. '
  '6':
  - type: text
    content: 'And it came to pass, that, as I made my journey, and was come nigh unto Damascus about noon, suddenly there shone from heaven a great light round about me. '
  '7':
  - type: text
    content: 'And I fell unto the ground, and heard a voice saying unto me, '
  - type: text
    content: Saul, Saul, why persecutest thou me?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And I answered, Who art thou, Lord? And he said unto me, '
  - type: text
    content: I am Jesus of Nazareth, whom thou persecutest.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And they that were with me saw indeed the light, and were afraid; but they heard not the voice of him that spake to me. '
