verses:
  '1':
  - type: heading
    content: Unworthy Rulers
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Go down to the house of the king of Judah, and speak there this word, '
  '10':
  - type: text
    content: 'Weep ye not for the dead, neither bemoan him: '
  - type: text
    content: but
  - type: text
    content: ' weep sore for him that goeth away: for he shall return no more, nor see his native country. '
  '11':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' touching Shallum the son of Josiah king of Judah, which reigned instead of Josiah his father, which went forth out of this place; He shall not return thither any more: '
  '12':
  - type: text
    content: but he shall die in the place whither they have led him captive, and shall see this land no more.
  '13':
  - type: text
    content: 'Woe unto him that buildeth his house by unrighteousness, and his chambers by wrong; '
  - type: text
    content: that
  - type: text
    content: ' useth his neighbour''s service without wages, and giveth him not for his work; '
  '14':
  - type: text
    content: 'that saith, I will build me a wide house and large chambers, and cutteth him out windows; and '
  - type: text
    content: it is
  - type: text
    content: ' cieled with cedar, and painted with vermilion. '
  '15':
  - type: text
    content: 'Shalt thou reign, because thou closest '
  - type: text
    content: thyself
  - type: text
    content: ' in cedar? did not thy father eat and drink, and do judgment and justice, '
  - type: text
    content: and
  - type: text
    content: ' then '
  - type: text
    content: it was
  - type: text
    content: ' well with him? '
  '16':
  - type: text
    content: 'He judged the cause of the poor and needy; then '
  - type: text
    content: it was
  - type: text
    content: ' well '
  - type: text
    content: 'with him: was'
  - type: text
    content: ' not this to know me? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'But thine eyes and thine heart '
  - type: text
    content: are
  - type: text
    content: ' not but for thy covetousness, and for to shed innocent blood, and for oppression, and for violence, to do '
  - type: text
    content: it
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' concerning Jehoiakim the son of Josiah king of Judah; They shall not lament for him, '
  - type: text
    content: saying
  - type: text
    content: ', Ah my brother! or, Ah sister! they shall not lament for him, '
  - type: text
    content: saying
  - type: text
    content: ', Ah lord! or, Ah his glory! '
  '19':
  - type: text
    content: He shall be buried with the burial of an ass, drawn and cast forth beyond the gates of Jerusalem.
  '2':
  - type: text
    content: 'and say, Hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', O king of Judah, that sittest upon the throne of David, thou, and thy servants, and thy people that enter in by these gates: '
  '20':
  - type: text
    content: 'Go up to Lebanon, and cry; and lift up thy voice in Bashan, and cry from the passages: for all thy lovers are destroyed. '
  '21':
  - type: text
    content: 'I spake unto thee in thy prosperity; '
  - type: text
    content: but
  - type: text
    content: ' thou saidst, I will not hear. This '
  - type: text
    content: hath been
  - type: text
    content: ' thy manner from thy youth, that thou obeyedst not my voice. '
  '22':
  - type: text
    content: 'The wind shall eat up all thy pastors, and thy lovers shall go into captivity: surely then shalt thou be ashamed and confounded for all thy wickedness. '
  '23':
  - type: text
    content: O inhabitant of Lebanon, that makest thy nest in the cedars, how gracious shalt thou be when pangs come upon thee, the pain as of a woman in travail!
  '24':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' I live, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', though Coniah the son of Jehoiakim king of Judah were the signet upon my right hand, yet would I pluck thee thence; '
  '25':
  - type: text
    content: 'and I will give thee into the hand of them that seek thy life, and into the hand '
  - type: text
    content: of them
  - type: text
    content: ' whose face thou fearest, even into the hand of Nebuchadrezzar king of Babylon, and into the hand of the Chaldeans. '
  '26':
  - type: text
    content: 'And I will cast thee out, and thy mother that bare thee, into another country, where ye were not born; and there shall ye die. '
  '27':
  - type: text
    content: But to the land whereunto they desire to return, thither shall they not return.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' this man Coniah a despised broken idol? '
  - type: text
    content: is he
  - type: text
    content: ' a vessel wherein '
  - type: text
    content: is
  - type: text
    content: ' no pleasure? wherefore are they cast out, he and his seed, and are cast into a land which they know not? '
  '29':
  - type: text
    content: 'O earth, earth, earth, hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Execute ye judgment and righteousness, and deliver the spoiled out of the hand of the oppressor: and do no wrong, do no violence to the stranger, the fatherless, nor the widow, neither shed innocent blood in this place. '
  '30':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Write ye this man childless, a man '
  - type: text
    content: that
  - type: text
    content: ' shall not prosper in his days: for no man of his seed shall prosper, sitting upon the throne of David, and ruling any more in Judah.'
  '4':
  - type: text
    content: 'For if ye do this thing indeed, then shall there enter in by the gates of this house kings sitting upon the throne of David, riding in chariots and on horses, he, and his servants, and his people. '
  '5':
  - type: text
    content: 'But if ye will not hear these words, I swear by myself, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that this house shall become a desolation. '
  '6':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' unto the king''s house of Judah; Thou '
  - type: text
    content: art
  - type: text
    content: ' Gilead unto me, '
  - type: text
    content: and
  - type: text
    content: ' the head of Lebanon: '
  - type: text
    content: yet
  - type: text
    content: ' surely I will make thee a wilderness, '
  - type: text
    content: and
  - type: text
    content: ' cities '
  - type: text
    content: which
  - type: text
    content: ' are not inhabited. '
  '7':
  - type: text
    content: 'And I will prepare destroyers against thee, every one with his weapons: and they shall cut down thy choice cedars, and cast '
  - type: text
    content: them
  - type: text
    content: ' into the fire. '
  '8':
  - type: text
    content: 'And many nations shall pass by this city, and they shall say every man to his neighbour, Wherefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' done thus unto this great city? '
  '9':
  - type: text
    content: 'Then they shall answer, Because they have forsaken the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, and worshipped other gods, and served them.'
