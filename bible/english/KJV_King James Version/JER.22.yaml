document_id: JER.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Unworthy Rulers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Go down to the house of the king of Judah, and speak there this word, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and say, Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O king of Judah, that sittest upon the throne of David, thou, and thy servants, and thy people that enter in by these gates: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Execute ye judgment and righteousness, and deliver the spoiled out of the hand of the oppressor: and do no wrong, do no violence to the stranger, the fatherless, nor the widow, neither shed innocent blood in this place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For if ye do this thing indeed, then shall there enter in by the gates of this house kings sitting upon the throne of David, riding in chariots and on horses, he, and his servants, and his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if ye will not hear these words, I swear by myself, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that this house shall become a desolation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto the king''s house of Judah; Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' Gilead unto me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the head of Lebanon: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' surely I will make thee a wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' are not inhabited. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I will prepare destroyers against thee, every one with his weapons: and they shall cut down thy choice cedars, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' into the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And many nations shall pass by this city, and they shall say every man to his neighbour, Wherefore hath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' done thus unto this great city? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then they shall answer, Because they have forsaken the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, and worshipped other gods, and served them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Weep ye not for the dead, neither bemoan him: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' weep sore for him that goeth away: for he shall return no more, nor see his native country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' touching Shallum the son of Josiah king of Judah, which reigned instead of Josiah his father, which went forth out of this place; He shall not return thither any more: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: but he shall die in the place whither they have led him captive, and shall see this land no more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Woe unto him that buildeth his house by unrighteousness, and his chambers by wrong; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' useth his neighbour''s service without wages, and giveth him not for his work; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'that saith, I will build me a wide house and large chambers, and cutteth him out windows; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' cieled with cedar, and painted with vermilion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Shalt thou reign, because thou closest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself
  - type: text
    text: ' in cedar? did not thy father eat and drink, and do judgment and justice, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' well with him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He judged the cause of the poor and needy; then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' well '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'with him: was'
  - type: text
    text: ' not this to know me? saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But thine eyes and thine heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not but for thy covetousness, and for to shed innocent blood, and for oppression, and for violence, to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' concerning Jehoiakim the son of Josiah king of Judah; They shall not lament for him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Ah my brother! or, Ah sister! they shall not lament for him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Ah lord! or, Ah his glory! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He shall be buried with the burial of an ass, drawn and cast forth beyond the gates of Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Go up to Lebanon, and cry; and lift up thy voice in Bashan, and cry from the passages: for all thy lovers are destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I spake unto thee in thy prosperity; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' thou saidst, I will not hear. This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath been
  - type: text
    text: ' thy manner from thy youth, that thou obeyedst not my voice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The wind shall eat up all thy pastors, and thy lovers shall go into captivity: surely then shalt thou be ashamed and confounded for all thy wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: O inhabitant of Lebanon, that makest thy nest in the cedars, how gracious shalt thou be when pangs come upon thee, the pain as of a woman in travail!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' I live, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', though Coniah the son of Jehoiakim king of Judah were the signet upon my right hand, yet would I pluck thee thence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and I will give thee into the hand of them that seek thy life, and into the hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ' whose face thou fearest, even into the hand of Nebuchadrezzar king of Babylon, and into the hand of the Chaldeans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And I will cast thee out, and thy mother that bare thee, into another country, where ye were not born; and there shall ye die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But to the land whereunto they desire to return, thither shall they not return.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' this man Coniah a despised broken idol? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is he
  - type: text
    text: ' a vessel wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' no pleasure? wherefore are they cast out, he and his seed, and are cast into a land which they know not? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'O earth, earth, earth, hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Write ye this man childless, a man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall not prosper in his days: for no man of his seed shall prosper, sitting upon the throne of David, and ruling any more in Judah.'
