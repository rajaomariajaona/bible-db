document_id: EXO.28,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And take thou unto thee Aaron thy brother, and his sons with him, from among the children of Israel, that he may minister unto me in the priest''s office, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' Aaron, Nadab and Abihu, Eleazar and Ithamar, Aaron''s sons. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'six of their names on one stone, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the other
    - type: text
      text: ' six names of the rest on the other stone, according to their birth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'With the work of an engraver in stone, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' the engravings of a signet, shalt thou engrave the two stones with the names of the children of Israel: thou shalt make them to be set in ouches of gold. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And thou shalt put the two stones upon the shoulders of the ephod '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' stones of memorial unto the children of Israel: and Aaron shall bear their names before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' upon his two shoulders for a memorial.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And thou shalt make ouches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and two chains '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold at the ends; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' wreathen work shalt thou make them, and fasten the wreathen chains to the ouches.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And thou shalt make the breastplate of judgment with cunning work; after the work of the ephod thou shalt make it; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' purple, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' scarlet, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine twined linen, shalt thou make it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Foursquare it shall be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' doubled; a span '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the length thereof, and a span '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the breadth thereof. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And thou shalt set in it settings of stones, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' four rows of stones: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the first
    - type: text
      text: ' row '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a sardius, a topaz, and a carbuncle: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this shall be
    - type: text
      text: ' the first row. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the second row '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an emerald, a sapphire, and a diamond. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the third row a ligure, an agate, and an amethyst. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And thou shalt make holy garments for Aaron thy brother for glory and for beauty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the fourth row a beryl, and an onyx, and a jasper: they shall be set in gold in their inclosings. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the stones shall be with the names of the children of Israel, twelve, according to their names, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' the engravings of a signet; every one with his name shall they be according to the twelve tribes.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And thou shalt make upon the breastplate chains at the ends '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' wreathen work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And thou shalt make upon the breastplate two rings of gold, and shalt put the two rings on the two ends of the breastplate. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And thou shalt put the two wreathen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: chains
    - type: text
      text: ' of gold in the two rings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which are
    - type: text
      text: ' on the ends of the breastplate. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the other
    - type: text
      text: ' two ends of the two wreathen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: chains
    - type: text
      text: ' thou shalt fasten in the two ouches, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' on the shoulderpieces of the ephod before it.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And thou shalt make two rings of gold, and thou shalt put them upon the two ends of the breastplate in the border thereof, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the side of the ephod inward. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' rings of gold thou shalt make, and shalt put them on the two sides of the ephod underneath, toward the forepart thereof, over against the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' coupling thereof, above the curious girdle of the ephod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And they shall bind the breastplate by the rings thereof unto the rings of the ephod with a lace of blue, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' may be above the curious girdle of the ephod, and that the breastplate be not loosed from the ephod. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And Aaron shall bear the names of the children of Israel in the breastplate of judgment upon his heart, when he goeth in unto the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', for a memorial before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' continually.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And thou shalt speak unto all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' wise hearted, whom I have filled with the spirit of wisdom, that they may make Aaron''s garments to consecrate him, that he may minister unto me in the priest''s office. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And thou shalt put in the breastplate of judgment the Urim and the Thummim; and they shall be upon Aaron''s heart, when he goeth in before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and Aaron shall bear the judgment of the children of Israel upon his heart before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' continually.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And thou shalt make the robe of the ephod all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And there shall be an hole in the top of it, in the midst thereof: it shall have a binding of woven work round about the hole of it, as it were the hole of an habergeon, that it be not rent. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: beneath
    - type: text
      text: ' upon the hem of it thou shalt make pomegranates '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' purple, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' scarlet, round about the hem thereof; and bells of gold between them round about: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'a golden bell and a pomegranate, a golden bell and a pomegranate, upon the hem of the robe round about. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And it shall be upon Aaron to minister: and his sound shall be heard when he goeth in unto the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and when he cometh out, that he die not.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And thou shalt make a plate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold, and grave upon it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' the engravings of a signet, HOLINESS TO THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And thou shalt put it on a blue lace, that it may be upon the mitre; upon the forefront of the mitre it shall be. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And it shall be upon Aaron''s forehead, that Aaron may bear the iniquity of the holy things, which the children of Israel shall hallow in all their holy gifts; and it shall be always upon his forehead, that they may be accepted before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And thou shalt embroider the coat of fine linen, and thou shalt make the mitre '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine linen, and thou shalt make the girdle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' needlework.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the garments which they shall make; a breastplate, and an ephod, and a robe, and a broidered coat, a mitre, and a girdle: and they shall make holy garments for Aaron thy brother, and his sons, that he may minister unto me in the priest''s office. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And for Aaron''s sons thou shalt make coats, and thou shalt make for them girdles, and bonnets shalt thou make for them, for glory and for beauty. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And thou shalt put them upon Aaron thy brother, and his sons with him; and shalt anoint them, and consecrate them, and sanctify them, that they may minister unto me in the priest''s office. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And thou shalt make them linen breeches to cover their nakedness; from the loins even unto the thighs they shall reach: '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'and they shall be upon Aaron, and upon his sons, when they come in unto the tabernacle of the congregation, or when they come near unto the altar to minister in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: '; that they bear not iniquity, and die: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a statute for ever unto him and his seed after him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And they shall take gold, and blue, and purple, and scarlet, and fine linen.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And they shall make the ephod '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' purple, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' scarlet, and fine twined linen, with cunning work. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'It shall have the two shoulderpieces thereof joined at the two edges thereof; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' it shall be joined together. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the curious girdle of the ephod, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon it, shall be of the same, according to the work thereof; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even of
    - type: text
      text: ' gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and purple, and scarlet, and fine twined linen. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And thou shalt take two onyx stones, and grave on them the names of the children of Israel: '
