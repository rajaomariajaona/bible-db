document_id: HEB.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now faith is the substance of things hoped for, the evidence of things not seen. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'for he looked for a city which hath foundations, whose builder and maker '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Through faith also Sara herself received strength to conceive seed, and was delivered of a child when she was past age, because she judged him faithful who had promised. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore sprang there even of one, and him as good as dead, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so many
    - type: text
      text: ' as the stars of the sky in multitude, and as the sand which is by the sea shore innumerable.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'These all died in faith, not having received the promises, but having seen them afar off, and were persuaded of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and embraced '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and confessed that they were strangers and pilgrims on the earth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For they that say such things declare plainly that they seek a country. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And truly, if they had been mindful of that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: country
    - type: text
      text: ' from whence they came out, they might have had opportunity to have returned. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But now they desire a better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: country
    - type: text
      text: ', that is, an heavenly: wherefore God is not ashamed to be called their God: for he hath prepared for them a city.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'By faith Abraham, when he was tried, offered up Isaac: and he that had received the promises offered up his only begotten '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'of whom it was said, That in Isaac shall thy seed be called: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'accounting that God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' able to raise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' up, even from the dead; from whence also he received him in a figure. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For by it the elders obtained a good report.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'By faith Isaac blessed Jacob and Esau concerning things to come. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'By faith Jacob, when he was a dying, blessed both the sons of Joseph; and worshipped, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: leaning
    - type: text
      text: ' upon the top of his staff. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'By faith Joseph, when he died, made mention of the departing of the children of Israel; and gave commandment concerning his bones. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'By faith Moses, when he was born, was hid three months of his parents, because they saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he was
    - type: text
      text: ' a proper child; and they were not afraid of the king''s commandment. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'By faith Moses, when he was come to years, refused to be called the son of Pharaoh''s daughter; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'choosing rather to suffer affliction with the people of God, than to enjoy the pleasures of sin for a season; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'esteeming the reproach of Christ greater riches than the treasures in Egypt: for he had respect unto the recompence of the reward. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'By faith he forsook Egypt, not fearing the wrath of the king: for he endured, as seeing him who is invisible. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Through faith he kept the passover, and the sprinkling of blood, lest he that destroyed the firstborn should touch them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'By faith they passed through the Red sea as by dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: ': which the Egyptians assaying to do were drowned. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Through faith we understand that the worlds were framed by the word of God, so that things which are seen were not made of things which do appear. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'By faith the walls of Jericho fell down, after they were compassed about seven days. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: By faith the harlot Rahab perished not with them that believed not, when she had received the spies with peace.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And what shall I more say? for the time would fail me to tell of Gedeon, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' Barak, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' Samson, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' Jephthae; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' David also, and Samuel, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the prophets: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'who through faith subdued kingdoms, wrought righteousness, obtained promises, stopped the mouths of lions, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'quenched the violence of fire, escaped the edge of the sword, out of weakness were made strong, waxed valiant in fight, turned to flight the armies of the aliens. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Women received their dead raised to life again: and others were tortured, not accepting deliverance; that they might obtain a better resurrection: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and others had trial of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cruel
    - type: text
      text: ' mockings and scourgings, yea, moreover of bonds and imprisonment: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'they were stoned, they were sawn asunder, were tempted, were slain with the sword: they wandered about in sheepskins and goatskins; being destitute, afflicted, tormented; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '(of whom the world was not worthy:) they wandered in deserts, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' mountains, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' dens and caves of the earth.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And these all, having obtained a good report through faith, received not the promise: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'By faith Abel offered unto God a more excellent sacrifice than Cain, by which he obtained witness that he was righteous, God testifying of his gifts: and by it he being dead yet speaketh. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: God having provided some better thing for us, that they without us should not be made perfect.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'By faith Enoch was translated that he should not see death; and was not found, because God had translated him: for before his translation he had this testimony, that he pleased God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But without faith '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' impossible to please '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ': for he that cometh to God must believe that he is, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he is a rewarder of them that diligently seek him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'By faith Noah, being warned of God of things not seen as yet, moved with fear, prepared an ark to the saving of his house; by the which he condemned the world, and became heir of the righteousness which is by faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'By faith Abraham, when he was called to go out into a place which he should after receive for an inheritance, obeyed; and he went out, not knowing whither he went. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'By faith he sojourned in the land of promise, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' a strange country, dwelling in tabernacles with Isaac and Jacob, the heirs with him of the same promise: '
