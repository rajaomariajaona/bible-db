document_id: HEB.11,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now faith is the substance of things hoped for, the evidence of things not seen. '
  '10':
  - type: text
    content: 'for he looked for a city which hath foundations, whose builder and maker '
  - type: text
    content: is
  - type: text
    content: ' God. '
  '11':
  - type: text
    content: 'Through faith also Sara herself received strength to conceive seed, and was delivered of a child when she was past age, because she judged him faithful who had promised. '
  '12':
  - type: text
    content: 'Therefore sprang there even of one, and him as good as dead, '
  - type: text
    content: so many
  - type: text
    content: ' as the stars of the sky in multitude, and as the sand which is by the sea shore innumerable.'
  '13':
  - type: text
    content: 'These all died in faith, not having received the promises, but having seen them afar off, and were persuaded of '
  - type: text
    content: them
  - type: text
    content: ', and embraced '
  - type: text
    content: them
  - type: text
    content: ', and confessed that they were strangers and pilgrims on the earth. '
  '14':
  - type: text
    content: 'For they that say such things declare plainly that they seek a country. '
  '15':
  - type: text
    content: 'And truly, if they had been mindful of that '
  - type: text
    content: country
  - type: text
    content: ' from whence they came out, they might have had opportunity to have returned. '
  '16':
  - type: text
    content: 'But now they desire a better '
  - type: text
    content: country
  - type: text
    content: ', that is, an heavenly: wherefore God is not ashamed to be called their God: for he hath prepared for them a city.'
  '17':
  - type: text
    content: 'By faith Abraham, when he was tried, offered up Isaac: and he that had received the promises offered up his only begotten '
  - type: text
    content: son
  - type: text
    content: ', '
  '18':
  - type: text
    content: 'of whom it was said, That in Isaac shall thy seed be called: '
  '19':
  - type: text
    content: 'accounting that God '
  - type: text
    content: was
  - type: text
    content: ' able to raise '
  - type: text
    content: him
  - type: text
    content: ' up, even from the dead; from whence also he received him in a figure. '
  '2':
  - type: text
    content: For by it the elders obtained a good report.
  '20':
  - type: text
    content: 'By faith Isaac blessed Jacob and Esau concerning things to come. '
  '21':
  - type: text
    content: 'By faith Jacob, when he was a dying, blessed both the sons of Joseph; and worshipped, '
  - type: text
    content: leaning
  - type: text
    content: ' upon the top of his staff. '
  '22':
  - type: text
    content: 'By faith Joseph, when he died, made mention of the departing of the children of Israel; and gave commandment concerning his bones. '
  '23':
  - type: text
    content: 'By faith Moses, when he was born, was hid three months of his parents, because they saw '
  - type: text
    content: he was
  - type: text
    content: ' a proper child; and they were not afraid of the king''s commandment. '
  '24':
  - type: text
    content: 'By faith Moses, when he was come to years, refused to be called the son of Pharaoh''s daughter; '
  '25':
  - type: text
    content: 'choosing rather to suffer affliction with the people of God, than to enjoy the pleasures of sin for a season; '
  '26':
  - type: text
    content: 'esteeming the reproach of Christ greater riches than the treasures in Egypt: for he had respect unto the recompence of the reward. '
  '27':
  - type: text
    content: 'By faith he forsook Egypt, not fearing the wrath of the king: for he endured, as seeing him who is invisible. '
  '28':
  - type: text
    content: 'Through faith he kept the passover, and the sprinkling of blood, lest he that destroyed the firstborn should touch them. '
  '29':
  - type: text
    content: 'By faith they passed through the Red sea as by dry '
  - type: text
    content: land
  - type: text
    content: ': which the Egyptians assaying to do were drowned. '
  '3':
  - type: text
    content: 'Through faith we understand that the worlds were framed by the word of God, so that things which are seen were not made of things which do appear. '
  '30':
  - type: text
    content: 'By faith the walls of Jericho fell down, after they were compassed about seven days. '
  '31':
  - type: text
    content: By faith the harlot Rahab perished not with them that believed not, when she had received the spies with peace.
  '32':
  - type: text
    content: 'And what shall I more say? for the time would fail me to tell of Gedeon, and '
  - type: text
    content: of
  - type: text
    content: ' Barak, and '
  - type: text
    content: of
  - type: text
    content: ' Samson, and '
  - type: text
    content: of
  - type: text
    content: ' Jephthae; '
  - type: text
    content: of
  - type: text
    content: ' David also, and Samuel, and '
  - type: text
    content: of
  - type: text
    content: ' the prophets: '
  '33':
  - type: text
    content: 'who through faith subdued kingdoms, wrought righteousness, obtained promises, stopped the mouths of lions, '
  '34':
  - type: text
    content: 'quenched the violence of fire, escaped the edge of the sword, out of weakness were made strong, waxed valiant in fight, turned to flight the armies of the aliens. '
  '35':
  - type: text
    content: 'Women received their dead raised to life again: and others were tortured, not accepting deliverance; that they might obtain a better resurrection: '
  '36':
  - type: text
    content: 'and others had trial of '
  - type: text
    content: cruel
  - type: text
    content: ' mockings and scourgings, yea, moreover of bonds and imprisonment: '
  '37':
  - type: text
    content: 'they were stoned, they were sawn asunder, were tempted, were slain with the sword: they wandered about in sheepskins and goatskins; being destitute, afflicted, tormented; '
  '38':
  - type: text
    content: '(of whom the world was not worthy:) they wandered in deserts, and '
  - type: text
    content: in
  - type: text
    content: ' mountains, and '
  - type: text
    content: in
  - type: text
    content: ' dens and caves of the earth.'
  '39':
  - type: text
    content: 'And these all, having obtained a good report through faith, received not the promise: '
  '4':
  - type: text
    content: 'By faith Abel offered unto God a more excellent sacrifice than Cain, by which he obtained witness that he was righteous, God testifying of his gifts: and by it he being dead yet speaketh. '
  '40':
  - type: text
    content: God having provided some better thing for us, that they without us should not be made perfect.
  '5':
  - type: text
    content: 'By faith Enoch was translated that he should not see death; and was not found, because God had translated him: for before his translation he had this testimony, that he pleased God. '
  '6':
  - type: text
    content: 'But without faith '
  - type: text
    content: it is
  - type: text
    content: ' impossible to please '
  - type: text
    content: him
  - type: text
    content: ': for he that cometh to God must believe that he is, and '
  - type: text
    content: that
  - type: text
    content: ' he is a rewarder of them that diligently seek him. '
  '7':
  - type: text
    content: 'By faith Noah, being warned of God of things not seen as yet, moved with fear, prepared an ark to the saving of his house; by the which he condemned the world, and became heir of the righteousness which is by faith. '
  '8':
  - type: text
    content: 'By faith Abraham, when he was called to go out into a place which he should after receive for an inheritance, obeyed; and he went out, not knowing whither he went. '
  '9':
  - type: text
    content: 'By faith he sojourned in the land of promise, as '
  - type: text
    content: in
  - type: text
    content: ' a strange country, dwelling in tabernacles with Isaac and Jacob, the heirs with him of the same promise: '
