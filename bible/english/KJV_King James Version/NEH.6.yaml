document_id: NEH.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: More Opposition
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass, when Sanballat, and Tobiah, and Geshem the Arabian, and the rest of our enemies, heard that I had builded the wall, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' there was no breach left therein; (though at that time I had not set up the doors upon the gates;) '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that Sanballat and Geshem sent unto me, saying, Come, let us meet together in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some one of
  - type: text
    text: ' the villages in the plain of Ono. But they thought to do me mischief. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I sent messengers unto them, saying, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' doing a great work, so that I cannot come down: why should the work cease, whilst I leave it, and come down to you? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yet they sent unto me four times after this sort; and I answered them after the same manner. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then sent Sanballat his servant unto me in like manner the fifth time with an open letter in his hand; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' written, It is reported among the heathen, and Gashmu saith '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it, that
  - type: text
    text: ' thou and the Jews think to rebel: for which cause thou buildest the wall, that thou mayest be their king, according to these words. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And thou hast also appointed prophets to preach of thee at Jerusalem, saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a king in Judah: and now shall it be reported to the king according to these words. Come now therefore, and let us take counsel together. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then I sent unto him, saying, There are no such things done as thou sayest, but thou feignest them out of thine own heart. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For they all made us afraid, saying, Their hands shall be weakened from the work, that it be not done. Now therefore, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: O God
  - type: text
    text: ', strengthen my hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Afterward I came unto the house of Shemaiah the son of Delaiah the son of Mehetabeel, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' shut up; and he said, Let us meet together in the house of God, within the temple, and let us shut the doors of the temple: for they will come to slay thee; yea, in the night will they come to slay thee. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I said, Should such a man as I flee? and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ', that, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' as I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ', would go into the temple to save his life? I will not go in. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And, lo, I perceived that God had not sent him; but that he pronounced this prophecy against me: for Tobiah and Sanballat had hired him. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' he hired, that I should be afraid, and do so, and sin, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they might have '
  - type: usfm
    marker: add
    children:
    - type: text
      text: matter
  - type: text
    text: ' for an evil report, that they might reproach me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My God, think thou upon Tobiah and Sanballat according to these their works, and on the prophetess Noadiah, and the rest of the prophets, that would have put me in fear.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Wall Finished
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the wall was finished in the twenty and fifth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the month
  - type: text
    text: ' Elul, in fifty and two days. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it came to pass, that when all our enemies heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', and all the heathen that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' about us saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these things
  - type: text
    text: ', they were much cast down in their own eyes: for they perceived that this work was wrought of our God. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moreover in those days the nobles of Judah sent many letters unto Tobiah, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the letters
  - type: text
    text: ' of Tobiah came unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' many in Judah sworn unto him, because he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the son in law of Shechaniah the son of Arah; and his son Johanan had taken the daughter of Meshullam the son of Berechiah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also they reported his good deeds before me, and uttered my words to him. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' Tobiah sent letters to put me in fear.'
