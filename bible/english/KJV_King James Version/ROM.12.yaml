document_id: ROM.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Christian Living
  - type: text
    content: 'I beseech you therefore, brethren, by the mercies of God, that ye present your bodies a living sacrifice, holy, acceptable unto God, '
  - type: text
    content: which is
  - type: text
    content: ' your reasonable service. '
  '10':
  - type: text
    content: Be
  - type: text
    content: ' kindly affectioned one to another with brotherly love; in honour preferring one another; '
  '11':
  - type: text
    content: 'not slothful in business; fervent in spirit; serving the Lord; '
  '12':
  - type: text
    content: 'rejoicing in hope; patient in tribulation; continuing instant in prayer; '
  '13':
  - type: text
    content: 'distributing to the necessity of saints; given to hospitality. '
  '14':
  - type: text
    content: 'Bless them which persecute you: bless, and curse not. '
  '15':
  - type: text
    content: 'Rejoice with them that do rejoice, and weep with them that weep. '
  '16':
  - type: text
    content: Be
  - type: text
    content: ' of the same mind one toward another. Mind not high things, but condescend to men of low estate. Be not wise in your own conceits. '
  '17':
  - type: text
    content: 'Recompense to no man evil for evil. Provide things honest in the sight of all men. '
  '18':
  - type: text
    content: 'If it be possible, as much as lieth in you, live peaceably with all men. '
  '19':
  - type: text
    content: 'Dearly beloved, avenge not yourselves, but '
  - type: text
    content: rather
  - type: text
    content: ' give place unto wrath: for it is written, Vengeance '
  - type: text
    content: is
  - type: text
    content: ' mine; I will repay, saith the Lord. '
  '2':
  - type: text
    content: 'And be not conformed to this world: but be ye transformed by the renewing of your mind, that ye may prove what '
  - type: text
    content: is
  - type: text
    content: ' that good, and acceptable, and perfect, will of God.'
  '20':
  - type: text
    content: 'Therefore if thine enemy hunger, feed him; if he thirst, give him drink: for in so doing thou shalt heap coals of fire on his head. '
  '21':
  - type: text
    content: Be not overcome of evil, but overcome evil with good.
  '3':
  - type: text
    content: 'For I say, through the grace given unto me, to every man that is among you, not to think '
  - type: text
    content: of himself
  - type: text
    content: ' more highly than he ought to think; but to think soberly, according as God hath dealt to every man the measure of faith. '
  '4':
  - type: text
    content: 'For as we have many members in one body, and all members have not the same office: '
  '5':
  - type: text
    content: 'so we, '
  - type: text
    content: being
  - type: text
    content: ' many, are one body in Christ, and every one members one of another. '
  '6':
  - type: text
    content: 'Having then gifts differing according to the grace that is given to us, whether prophecy, '
  - type: text
    content: let us prophesy
  - type: text
    content: ' according to the proportion of faith; '
  '7':
  - type: text
    content: 'or ministry, '
  - type: text
    content: let us wait
  - type: text
    content: ' on '
  - type: text
    content: our
  - type: text
    content: ' ministering: or he that teacheth, on teaching; '
  '8':
  - type: text
    content: 'or he that exhorteth, on exhortation: he that giveth, '
  - type: text
    content: let him do it
  - type: text
    content: ' with simplicity; he that ruleth, with diligence; he that sheweth mercy, with cheerfulness.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: Let
  - type: text
    content: ' love be without dissimulation. Abhor that which is evil; cleave to that which is good. '
