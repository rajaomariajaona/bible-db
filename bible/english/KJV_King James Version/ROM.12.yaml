document_id: ROM.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christian Living
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I beseech you therefore, brethren, by the mercies of God, that ye present your bodies a living sacrifice, holy, acceptable unto God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' your reasonable service. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Be
    - type: text
      text: ' kindly affectioned one to another with brotherly love; in honour preferring one another; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not slothful in business; fervent in spirit; serving the Lord; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'rejoicing in hope; patient in tribulation; continuing instant in prayer; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'distributing to the necessity of saints; given to hospitality. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bless them which persecute you: bless, and curse not. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejoice with them that do rejoice, and weep with them that weep. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Be
    - type: text
      text: ' of the same mind one toward another. Mind not high things, but condescend to men of low estate. Be not wise in your own conceits. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Recompense to no man evil for evil. Provide things honest in the sight of all men. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If it be possible, as much as lieth in you, live peaceably with all men. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dearly beloved, avenge not yourselves, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: rather
    - type: text
      text: ' give place unto wrath: for it is written, Vengeance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine; I will repay, saith the Lord. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And be not conformed to this world: but be ye transformed by the renewing of your mind, that ye may prove what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' that good, and acceptable, and perfect, will of God.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore if thine enemy hunger, feed him; if he thirst, give him drink: for in so doing thou shalt heap coals of fire on his head. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be not overcome of evil, but overcome evil with good.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I say, through the grace given unto me, to every man that is among you, not to think '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of himself
    - type: text
      text: ' more highly than he ought to think; but to think soberly, according as God hath dealt to every man the measure of faith. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as we have many members in one body, and all members have not the same office: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so we, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' many, are one body in Christ, and every one members one of another. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Having then gifts differing according to the grace that is given to us, whether prophecy, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let us prophesy
    - type: text
      text: ' according to the proportion of faith; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or ministry, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let us wait
    - type: text
      text: ' on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' ministering: or he that teacheth, on teaching; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or he that exhorteth, on exhortation: he that giveth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let him do it
    - type: text
      text: ' with simplicity; he that ruleth, with diligence; he that sheweth mercy, with cheerfulness.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Let
    - type: text
      text: ' love be without dissimulation. Abhor that which is evil; cleave to that which is good. '
