verses:
  '1':
  - type: heading
    content: The Death of Ahab
  - type: text
    content: 'And they continued three years without war between Syria and Israel. '
  '10':
  - type: text
    content: 'And the king of Israel and Jehoshaphat the king of Judah sat each on his throne, having put on their robes, in a void place in the entrance of the gate of Samaria; and all the prophets prophesied before them. '
  '11':
  - type: text
    content: 'And Zedekiah the son of Chenaanah made him horns of iron: and he said, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', With these shalt thou push the Syrians, until thou have consumed them. '
  '12':
  - type: text
    content: 'And all the prophets prophesied so, saying, Go up to Ramoth-gilead, and prosper: for the '
  - type: text
    content: LORD
  - type: text
    content: ' shall deliver '
  - type: text
    content: it
  - type: text
    content: ' into the king''s hand.'
  '13':
  - type: text
    content: 'And the messenger that was gone to call Micaiah spake unto him, saying, Behold now, the words of the prophets '
  - type: text
    content: declare
  - type: text
    content: ' good unto the king with one mouth: let thy word, I pray thee, be like the word of one of them, and speak '
  - type: text
    content: that which is
  - type: text
    content: ' good. '
  '14':
  - type: text
    content: 'And Micaiah said, '
  - type: text
    content: As
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' liveth, what the '
  - type: text
    content: LORD
  - type: text
    content: ' saith unto me, that will I speak. '
  '15':
  - type: text
    content: 'So he came to the king. And the king said unto him, Micaiah, shall we go against Ramoth-gilead to battle, or shall we forbear? And he answered him, Go, and prosper: for the '
  - type: text
    content: LORD
  - type: text
    content: ' shall deliver '
  - type: text
    content: it
  - type: text
    content: ' into the hand of the king. '
  '16':
  - type: text
    content: 'And the king said unto him, How many times shall I adjure thee that thou tell me nothing but '
  - type: text
    content: that which is
  - type: text
    content: ' true in the name of the '
  - type: text
    content: LORD
  - type: text
    content: '? '
  '17':
  - type: text
    content: 'And he said, I saw all Israel scattered upon the hills, as sheep that have not a shepherd: and the '
  - type: text
    content: LORD
  - type: text
    content: ' said, These have no master: let them return every man to his house in peace. '
  '18':
  - type: text
    content: 'And the king of Israel said unto Jehoshaphat, Did I not tell thee that he would prophesy no good concerning me, but evil? '
  '19':
  - type: text
    content: 'And he said, Hear thou therefore the word of the '
  - type: text
    content: LORD
  - type: text
    content: ': I saw the '
  - type: text
    content: LORD
  - type: text
    content: ' sitting on his throne, and all the host of heaven standing by him on his right hand and on his left. '
  '2':
  - type: text
    content: 'And it came to pass in the third year, that Jehoshaphat the king of Judah came down to the king of Israel. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, Who shall persuade Ahab, that he may go up and fall at Ramoth-gilead? And one said on this manner, and another said on that manner. '
  '21':
  - type: text
    content: 'And there came forth a spirit, and stood before the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, I will persuade him. '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto him, Wherewith? And he said, I will go forth, and I will be a lying spirit in the mouth of all his prophets. And he said, Thou shalt persuade '
  - type: text
    content: him
  - type: text
    content: ', and prevail also: go forth, and do so. '
  '23':
  - type: text
    content: 'Now therefore, behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' hath put a lying spirit in the mouth of all these thy prophets, and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken evil concerning thee.'
  '24':
  - type: text
    content: 'But Zedekiah the son of Chenaanah went near, and smote Micaiah on the cheek, and said, Which way went the Spirit of the '
  - type: text
    content: LORD
  - type: text
    content: ' from me to speak unto thee? '
  '25':
  - type: text
    content: 'And Micaiah said, Behold, thou shalt see in that day, when thou shalt go into an inner chamber to hide thyself. '
  '26':
  - type: text
    content: 'And the king of Israel said, Take Micaiah, and carry him back unto Amon the governor of the city, and to Joash the king''s son; '
  '27':
  - type: text
    content: 'and say, Thus saith the king, Put this '
  - type: text
    content: fellow
  - type: text
    content: ' in the prison, and feed him with bread of affliction and with water of affliction, until I come in peace. '
  '28':
  - type: text
    content: 'And Micaiah said, If thou return at all in peace, the '
  - type: text
    content: LORD
  - type: text
    content: ' hath not spoken by me. And he said, Hearken, O people, every one of you.'
  '29':
  - type: text
    content: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  '3':
  - type: text
    content: 'And the king of Israel said unto his servants, Know ye that Ramoth in Gilead '
  - type: text
    content: is
  - type: text
    content: ' ours, and we '
  - type: text
    content: be
  - type: text
    content: ' still, '
  - type: text
    content: and
  - type: text
    content: ' take it not out of the hand of the king of Syria? '
  '30':
  - type: text
    content: 'And the king of Israel said unto Jehoshaphat, I will disguise myself, and enter into the battle; but put thou on thy robes. And the king of Israel disguised himself, and went into the battle. '
  '31':
  - type: text
    content: 'But the king of Syria commanded his thirty and two captains that had rule over his chariots, saying, Fight neither with small nor great, save only with the king of Israel. '
  '32':
  - type: text
    content: 'And it came to pass, when the captains of the chariots saw Jehoshaphat, that they said, Surely it '
  - type: text
    content: is
  - type: text
    content: ' the king of Israel. And they turned aside to fight against him: and Jehoshaphat cried out. '
  '33':
  - type: text
    content: 'And it came to pass, when the captains of the chariots perceived that it '
  - type: text
    content: was
  - type: text
    content: ' not the king of Israel, that they turned back from pursuing him. '
  '34':
  - type: text
    content: 'And a '
  - type: text
    content: certain
  - type: text
    content: ' man drew a bow at a venture, and smote the king of Israel between the joints of the harness: wherefore he said unto the driver of his chariot, Turn thine hand, and carry me out of the host; for I am wounded. '
  '35':
  - type: text
    content: 'And the battle increased that day: and the king was stayed up in his chariot against the Syrians, and died at even: and the blood ran out of the wound into the midst of the chariot. '
  '36':
  - type: text
    content: And there went a proclamation throughout the host about the going down of the sun, saying, Every man to his city, and every man to his own country.
  '37':
  - type: text
    content: 'So the king died, and was brought to Samaria; and they buried the king in Samaria. '
  '38':
  - type: text
    content: 'And '
  - type: text
    content: one
  - type: text
    content: ' washed the chariot in the pool of Samaria; and the dogs licked up his blood; and they washed his armour; according unto the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' which he spake. '
  '39':
  - type: text
    content: 'Now the rest of the acts of Ahab, and all that he did, and the ivory house which he made, and all the cities that he built, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '4':
  - type: text
    content: 'And he said unto Jehoshaphat, Wilt thou go with me to battle to Ramoth-gilead? And Jehoshaphat said to the king of Israel, I '
  - type: text
    content: am
  - type: text
    content: ' as thou '
  - type: text
    content: art
  - type: text
    content: ', my people as thy people, my horses as thy horses.'
  '40':
  - type: text
    content: So Ahab slept with his fathers; and Ahaziah his son reigned in his stead.
  - type: heading
    content: The Two Kingdoms
  '41':
  - type: text
    content: 'And Jehoshaphat the son of Asa began to reign over Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: text
    content: 'Jehoshaphat '
  - type: text
    content: was
  - type: text
    content: ' thirty and five years old when he began to reign; and he reigned twenty and five years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Azubah the daughter of Shilhi. '
  '43':
  - type: text
    content: 'And he walked in all the ways of Asa his father; he turned not aside from it, doing '
  - type: text
    content: that which was
  - type: text
    content: ' right in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ': nevertheless the high places were not taken away; '
  - type: text
    content: for
  - type: text
    content: ' the people offered and burnt incense yet in the high places. '
  '44':
  - type: text
    content: And Jehoshaphat made peace with the king of Israel.
  '45':
  - type: text
    content: 'Now the rest of the acts of Jehoshaphat, and his might that he shewed, and how he warred, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '46':
  - type: text
    content: 'And the remnant of the sodomites, which remained in the days of his father Asa, he took out of the land. '
  '47':
  - type: text
    content: There was
  - type: text
    content: ' then no king in Edom: a deputy '
  - type: text
    content: was
  - type: text
    content: ' king. '
  '48':
  - type: text
    content: 'Jehoshaphat made ships of Tharshish to go to Ophir for gold: but they went not; for the ships were broken at Ezion-geber. '
  '49':
  - type: text
    content: 'Then said Ahaziah the son of Ahab unto Jehoshaphat, Let my servants go with thy servants in the ships. But Jehoshaphat would not. '
  '5':
  - type: text
    content: 'And Jehoshaphat said unto the king of Israel, Enquire, I pray thee, at the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' to day. '
  '50':
  - type: text
    content: 'And Jehoshaphat slept with his fathers, and was buried with his fathers in the city of David his father: and Jehoram his son reigned in his stead.'
  '51':
  - type: text
    content: 'Ahaziah the son of Ahab began to reign over Israel in Samaria the seventeenth year of Jehoshaphat king of Judah, and reigned two years over Israel. '
  '52':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and walked in the way of his father, and in the way of his mother, and in the way of Jeroboam the son of Nebat, who made Israel to sin: '
  '53':
  - type: text
    content: 'for he served Baal, and worshipped him, and provoked to anger the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, according to all that his father had done.'
  '6':
  - type: text
    content: 'Then the king of Israel gathered the prophets together, about four hundred men, and said unto them, Shall I go against Ramoth-gilead to battle, or shall I forbear? And they said, Go up; for the Lord shall deliver '
  - type: text
    content: it
  - type: text
    content: ' into the hand of the king. '
  '7':
  - type: text
    content: 'And Jehoshaphat said, '
  - type: text
    content: Is there
  - type: text
    content: ' not here a prophet of the '
  - type: text
    content: LORD
  - type: text
    content: ' besides, that we might enquire of him? '
  '8':
  - type: text
    content: 'And the king of Israel said unto Jehoshaphat, '
  - type: text
    content: There is
  - type: text
    content: ' yet one man, Micaiah the son of Imlah, by whom we may enquire of the '
  - type: text
    content: LORD
  - type: text
    content: ': but I hate him; for he doth not prophesy good concerning me, but evil. And Jehoshaphat said, Let not the king say so. '
  '9':
  - type: text
    content: 'Then the king of Israel called an officer, and said, Hasten '
  - type: text
    content: hither
  - type: text
    content: ' Micaiah the son of Imlah. '
