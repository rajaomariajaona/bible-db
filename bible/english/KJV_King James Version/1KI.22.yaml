document_id: 1KI.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Death of Ahab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they continued three years without war between Syria and Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel and Jehoshaphat the king of Judah sat each on his throne, having put on their robes, in a void place in the entrance of the gate of Samaria; and all the prophets prophesied before them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Zedekiah the son of Chenaanah made him horns of iron: and he said, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', With these shalt thou push the Syrians, until thou have consumed them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the prophets prophesied so, saying, Go up to Ramoth-gilead, and prosper: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' into the king''s hand.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the messenger that was gone to call Micaiah spake unto him, saying, Behold now, the words of the prophets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: declare
    - type: text
      text: ' good unto the king with one mouth: let thy word, I pray thee, be like the word of one of them, and speak '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' good. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Micaiah said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saith unto me, that will I speak. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he came to the king. And the king said unto him, Micaiah, shall we go against Ramoth-gilead to battle, or shall we forbear? And he answered him, Go, and prosper: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' into the hand of the king. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said unto him, How many times shall I adjure thee that thou tell me nothing but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' true in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, I saw all Israel scattered upon the hills, as sheep that have not a shepherd: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, These have no master: let them return every man to his house in peace. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel said unto Jehoshaphat, Did I not tell thee that he would prophesy no good concerning me, but evil? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Hear thou therefore the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': I saw the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sitting on his throne, and all the host of heaven standing by him on his right hand and on his left. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the third year, that Jehoshaphat the king of Judah came down to the king of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, Who shall persuade Ahab, that he may go up and fall at Ramoth-gilead? And one said on this manner, and another said on that manner. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there came forth a spirit, and stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, I will persuade him. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, Wherewith? And he said, I will go forth, and I will be a lying spirit in the mouth of all his prophets. And he said, Thou shalt persuade '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and prevail also: go forth, and do so. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath put a lying spirit in the mouth of all these thy prophets, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken evil concerning thee.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Zedekiah the son of Chenaanah went near, and smote Micaiah on the cheek, and said, Which way went the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' from me to speak unto thee? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Micaiah said, Behold, thou shalt see in that day, when thou shalt go into an inner chamber to hide thyself. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel said, Take Micaiah, and carry him back unto Amon the governor of the city, and to Joash the king''s son; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say, Thus saith the king, Put this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fellow
    - type: text
      text: ' in the prison, and feed him with bread of affliction and with water of affliction, until I come in peace. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Micaiah said, If thou return at all in peace, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not spoken by me. And he said, Hearken, O people, every one of you.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel said unto his servants, Know ye that Ramoth in Gilead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' ours, and we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' still, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' take it not out of the hand of the king of Syria? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel said unto Jehoshaphat, I will disguise myself, and enter into the battle; but put thou on thy robes. And the king of Israel disguised himself, and went into the battle. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king of Syria commanded his thirty and two captains that had rule over his chariots, saying, Fight neither with small nor great, save only with the king of Israel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when the captains of the chariots saw Jehoshaphat, that they said, Surely it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the king of Israel. And they turned aside to fight against him: and Jehoshaphat cried out. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when the captains of the chariots perceived that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not the king of Israel, that they turned back from pursuing him. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' man drew a bow at a venture, and smote the king of Israel between the joints of the harness: wherefore he said unto the driver of his chariot, Turn thine hand, and carry me out of the host; for I am wounded. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the battle increased that day: and the king was stayed up in his chariot against the Syrians, and died at even: and the blood ran out of the wound into the midst of the chariot. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there went a proclamation throughout the host about the going down of the sun, saying, Every man to his city, and every man to his own country.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king died, and was brought to Samaria; and they buried the king in Samaria. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' washed the chariot in the pool of Samaria; and the dogs licked up his blood; and they washed his armour; according unto the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' which he spake. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Ahab, and all that he did, and the ivory house which he made, and all the cities that he built, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto Jehoshaphat, Wilt thou go with me to battle to Ramoth-gilead? And Jehoshaphat said to the king of Israel, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' as thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ', my people as thy people, my horses as thy horses.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ahab slept with his fathers; and Ahaziah his son reigned in his stead.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Two Kingdoms
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat the son of Asa began to reign over Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty and five years old when he began to reign; and he reigned twenty and five years in Jerusalem. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Azubah the daughter of Shilhi. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he walked in all the ways of Asa his father; he turned not aside from it, doing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': nevertheless the high places were not taken away; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the people offered and burnt incense yet in the high places. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jehoshaphat made peace with the king of Israel.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Jehoshaphat, and his might that he shewed, and how he warred, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the remnant of the sodomites, which remained in the days of his father Asa, he took out of the land. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There was
    - type: text
      text: ' then no king in Edom: a deputy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' king. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat made ships of Tharshish to go to Ophir for gold: but they went not; for the ships were broken at Ezion-geber. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Ahaziah the son of Ahab unto Jehoshaphat, Let my servants go with thy servants in the ships. But Jehoshaphat would not. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat said unto the king of Israel, Enquire, I pray thee, at the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to day. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat slept with his fathers, and was buried with his fathers in the city of David his father: and Jehoram his son reigned in his stead.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaziah the son of Ahab began to reign over Israel in Samaria the seventeenth year of Jehoshaphat king of Judah, and reigned two years over Israel. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and walked in the way of his father, and in the way of his mother, and in the way of Jeroboam the son of Nebat, who made Israel to sin: '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for he served Baal, and worshipped him, and provoked to anger the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, according to all that his father had done.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Israel gathered the prophets together, about four hundred men, and said unto them, Shall I go against Ramoth-gilead to battle, or shall I forbear? And they said, Go up; for the Lord shall deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' into the hand of the king. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' not here a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' besides, that we might enquire of him? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel said unto Jehoshaphat, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' yet one man, Micaiah the son of Imlah, by whom we may enquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': but I hate him; for he doth not prophesy good concerning me, but evil. And Jehoshaphat said, Let not the king say so. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Israel called an officer, and said, Hasten '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hither
    - type: text
      text: ' Micaiah the son of Imlah. '
