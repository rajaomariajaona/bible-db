document_id: EST.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the king and Haman came to banquet with Esther the queen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the king said again unto Esther on the second day at the banquet of wine, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy petition, queen Esther? and it shall be granted thee: and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy request? and it shall be performed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the half of the kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Esther the queen answered and said, If I have found favour in thy sight, O king, and if it please the king, let my life be given me at my petition, and my people at my request: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: for we are sold, I and my people, to be destroyed, to be slain, and to perish. But if we had been sold for bondmen and bondwomen, I had held my tongue, although the enemy could not countervail the king's damage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the king Ahasuerus answered and said unto Esther the queen, Who is he, and where is he, that durst presume in his heart to do so? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Esther said, The adversary and enemy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this wicked Haman. Then Haman was afraid before the king and the queen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the king arising from the banquet of wine in his wrath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: went
  - type: text
    text: ' into the palace garden: and Haman stood up to make request for his life to Esther the queen; for he saw that there was evil determined against him by the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the king returned out of the palace garden into the place of the banquet of wine; and Haman was fallen upon the bed whereon Esther '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: '. Then said the king, Will he force the queen also before me in the house? As the word went out of the king''s mouth, they covered Haman''s face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Harbonah, one of the chamberlains, said before the king, Behold also, the gallows fifty cubits high, which Haman had made for Mordecai, who had spoken good for the king, standeth in the house of Haman. Then the king said, Hang him thereon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So they hanged Haman on the gallows that he had prepared for Mordecai. Then was the king's wrath pacified.
