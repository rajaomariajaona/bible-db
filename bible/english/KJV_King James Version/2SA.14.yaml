document_id: 2SA.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Joab the son of Zeruiah perceived that the king''s heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' toward Absalom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the king said, Whosoever saith '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' unto thee, bring him to me, and he shall not touch thee any more. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then said she, I pray thee, let the king remember the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, that thou wouldest not suffer the revengers of blood to destroy any more, lest they destroy my son. And he said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, there shall not one hair of thy son fall to the earth.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the woman said, Let thine handmaid, I pray thee, speak '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' word unto my lord the king. And he said, Say on. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the woman said, Wherefore then hast thou thought such a thing against the people of God? for the king doth speak this thing as one which is faulty, in that the king doth not fetch home again his banished. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For we must needs die, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as water spilt on the ground, which cannot be gathered up again; neither doth God respect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' person: yet doth he devise means, that his banished be not expelled from him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now therefore that I am come to speak of this thing unto my lord the king, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' because the people have made me afraid: and thy handmaid said, I will now speak unto the king; it may be that the king will perform the request of his handmaid. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For the king will hear, to deliver his handmaid out of the hand of the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that would
    - type: text
      text: ' destroy me and my son together out of the inheritance of God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then thine handmaid said, The word of my lord the king shall now be comfortable: for as an angel of God, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my lord the king to discern good and bad: therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God will be with thee.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then the king answered and said unto the woman, Hide not from me, I pray thee, the thing that I shall ask thee. And the woman said, Let my lord the king now speak. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the king said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is not
    - type: text
      text: ' the hand of Joab with thee in all this? And the woman answered and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' thy soul liveth, my lord the king, none can turn to the right hand or to the left from ought that my lord the king hath spoken: for thy servant Joab, he bade me, and he put all these words in the mouth of thine handmaid: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Joab sent to Tekoah, and fetched thence a wise woman, and said unto her, I pray thee, feign thyself to be a mourner, and put on now mourning apparel, and anoint not thyself with oil, but be as a woman that had a long time mourned for the dead: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'to fetch about this form of speech hath thy servant Joab done this thing: and my lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wise, according to the wisdom of an angel of God, to know all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the earth.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the king said unto Joab, Behold now, I have done this thing: go therefore, bring the young man Absalom again. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Joab fell to the ground on his face, and bowed himself, and thanked the king: and Joab said, To day thy servant knoweth that I have found grace in thy sight, my lord, O king, in that the king hath fulfilled the request of his servant. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So Joab arose and went to Geshur, and brought Absalom to Jerusalem. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And the king said, Let him turn to his own house, and let him not see my face. So Absalom returned to his own house, and saw not the king's face.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But in all Israel there was none to be so much praised as Absalom for his beauty: from the sole of his foot even to the crown of his head there was no blemish in him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when he polled his head, (for it was at every year''s end that he polled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the hair
    - type: text
      text: ' was heavy on him, therefore he polled it;) he weighed the hair of his head at two hundred shekels after the king''s weight. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And unto Absalom there were born three sons, and one daughter, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Tamar: she was a woman of a fair countenance.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So Absalom dwelt two full years in Jerusalem, and saw not the king''s face. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Therefore Absalom sent for Joab, to have sent him to the king; but he would not come to him: and when he sent again the second time, he would not come. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: and come to the king, and speak on this manner unto him. So Joab put the words in her mouth.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Therefore he said unto his servants, See, Joab''s field is near mine, and he hath barley there; go and set it on fire. And Absalom''s servants set the field on fire. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then Joab arose, and came to Absalom unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' house, and said unto him, Wherefore have thy servants set my field on fire? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And Absalom answered Joab, Behold, I sent unto thee, saying, Come hither, that I may send thee to the king, to say, Wherefore am I come from Geshur? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it had been
    - type: text
      text: ' good for me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to have been
    - type: text
      text: ' there still: now therefore let me see the king''s face; and if there be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' iniquity in me, let him kill me. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So Joab came to the king, and told him: and when he had called for Absalom, he came to the king, and bowed himself on his face to the ground before the king: and the king kissed Absalom.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when the woman of Tekoah spake to the king, she fell on her face to the ground, and did obeisance, and said, Help, O king. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the king said unto her, What aileth thee? And she answered, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' indeed a widow woman, and mine husband is dead. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And thy handmaid had two sons, and they two strove together in the field, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' none to part them, but the one smote the other, and slew him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And, behold, the whole family is risen against thine handmaid, and they said, Deliver him that smote his brother, that we may kill him, for the life of his brother whom he slew; and we will destroy the heir also: and so they shall quench my coal which is left, and shall not leave to my husband '
    - type: usfm
      marker: add
      children:
      - type: text
        text: neither
    - type: text
      text: ' name nor remainder upon the earth.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the king said unto the woman, Go to thine house, and I will give charge concerning thee. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the woman of Tekoah said unto the king, My lord, O king, the iniquity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' on me, and on my father''s house: and the king and his throne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' guiltless. '
