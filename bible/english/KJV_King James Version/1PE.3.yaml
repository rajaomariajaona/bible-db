document_id: 1PE.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Likewise, ye wives, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in subjection to your own husbands; that, if any obey not the word, they also may without the word be won by the conversation of the wives; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that will love life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And see good days,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him refrain his tongue from evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his lips that they speak no guile:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Let him eschew evil, and do good;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him seek peace, and ensue it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For the eyes of the Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' over the righteous,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his ears '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are open
    - type: text
      text: ' unto their prayers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the face of the Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' against them that do evil.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that will harm you, if ye be followers of that which is good? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But and if ye suffer for righteousness'' sake, happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are ye
    - type: text
      text: ': and be not afraid of their terror, neither be troubled; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'but sanctify the Lord God in your hearts: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' ready always to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: give
    - type: text
      text: ' an answer to every man that asketh you a reason of the hope that is in you with meekness and fear: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'having a good conscience; that, whereas they speak evil of you, as of evildoers, they may be ashamed that falsely accuse your good conversation in Christ. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' better, if the will of God be so, that ye suffer for well doing, than for evil doing. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For Christ also hath once suffered for sins, the just for the unjust, that he might bring us to God, being put to death in the flesh, but quickened by the Spirit: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'by which also he went and preached unto the spirits in prison; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'while they behold your chaste conversation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: coupled
    - type: text
      text: ' with fear. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'which sometime were disobedient, when once the longsuffering of God waited in the days of Noah, while the ark was a preparing, wherein few, that is, eight souls were saved by water. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The like figure whereunto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' baptism doth also now save us (not the putting away of the filth of the flesh, but the answer of a good conscience toward God,) by the resurrection of Jesus Christ: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: who is gone into heaven, and is on the right hand of God; angels and authorities and powers being made subject unto him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Whose adorning let it not be that outward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: adorning
    - type: text
      text: ' of plaiting the hair, and of wearing of gold, or of putting on of apparel; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let it be
    - type: text
      text: ' the hidden man of the heart, in that which is not corruptible, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even the ornament
    - type: text
      text: ' of a meek and quiet spirit, which is in the sight of God of great price. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For after this manner in the old time the holy women also, who trusted in God, adorned themselves, being in subjection unto their own husbands: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'even as Sara obeyed Abraham, calling him lord: whose daughters ye are, as long as ye do well, and are not afraid with any amazement.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Likewise, ye husbands, dwell with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' according to knowledge, giving honour unto the wife, as unto the weaker vessel, and as being heirs together of the grace of life; that your prayers be not hindered.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Finally, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be ye
    - type: text
      text: ' all of one mind, having compassion one of another, love as brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' pitiful, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' courteous: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'not rendering evil for evil, or railing for railing: but contrariwise blessing; knowing that ye are thereunto called, that ye should inherit a blessing. '
