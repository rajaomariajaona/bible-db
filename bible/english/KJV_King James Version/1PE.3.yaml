document_id: 1PE.3,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Likewise, ye wives, '
  - type: text
    content: be
  - type: text
    content: ' in subjection to your own husbands; that, if any obey not the word, they also may without the word be won by the conversation of the wives; '
  '10':
  - type: text
    content: For
  - type: text
    content: He that will love life,
  - type: text
    content: And see good days,
  - type: text
    content: Let him refrain his tongue from evil,
  - type: text
    content: 'And his lips that they speak no guile:'
  '11':
  - type: text
    content: Let him eschew evil, and do good;
  - type: text
    content: Let him seek peace, and ensue it.
  '12':
  - type: text
    content: 'For the eyes of the Lord '
  - type: text
    content: are
  - type: text
    content: ' over the righteous,'
  - type: text
    content: 'And his ears '
  - type: text
    content: are open
  - type: text
    content: ' unto their prayers:'
  - type: text
    content: 'But the face of the Lord '
  - type: text
    content: is
  - type: text
    content: ' against them that do evil.'
  '13':
  - type: text
    content: 'And who '
  - type: text
    content: is
  - type: text
    content: ' he that will harm you, if ye be followers of that which is good? '
  '14':
  - type: text
    content: 'But and if ye suffer for righteousness'' sake, happy '
  - type: text
    content: are ye
  - type: text
    content: ': and be not afraid of their terror, neither be troubled; '
  '15':
  - type: text
    content: 'but sanctify the Lord God in your hearts: and '
  - type: text
    content: be
  - type: text
    content: ' ready always to '
  - type: text
    content: give
  - type: text
    content: ' an answer to every man that asketh you a reason of the hope that is in you with meekness and fear: '
  '16':
  - type: text
    content: 'having a good conscience; that, whereas they speak evil of you, as of evildoers, they may be ashamed that falsely accuse your good conversation in Christ. '
  '17':
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' better, if the will of God be so, that ye suffer for well doing, than for evil doing. '
  '18':
  - type: text
    content: 'For Christ also hath once suffered for sins, the just for the unjust, that he might bring us to God, being put to death in the flesh, but quickened by the Spirit: '
  '19':
  - type: text
    content: 'by which also he went and preached unto the spirits in prison; '
  '2':
  - type: text
    content: 'while they behold your chaste conversation '
  - type: text
    content: coupled
  - type: text
    content: ' with fear. '
  '20':
  - type: text
    content: 'which sometime were disobedient, when once the longsuffering of God waited in the days of Noah, while the ark was a preparing, wherein few, that is, eight souls were saved by water. '
  '21':
  - type: text
    content: 'The like figure whereunto '
  - type: text
    content: even
  - type: text
    content: ' baptism doth also now save us (not the putting away of the filth of the flesh, but the answer of a good conscience toward God,) by the resurrection of Jesus Christ: '
  '22':
  - type: text
    content: who is gone into heaven, and is on the right hand of God; angels and authorities and powers being made subject unto him.
  '3':
  - type: text
    content: 'Whose adorning let it not be that outward '
  - type: text
    content: adorning
  - type: text
    content: ' of plaiting the hair, and of wearing of gold, or of putting on of apparel; '
  '4':
  - type: text
    content: 'but '
  - type: text
    content: let it be
  - type: text
    content: ' the hidden man of the heart, in that which is not corruptible, '
  - type: text
    content: even the ornament
  - type: text
    content: ' of a meek and quiet spirit, which is in the sight of God of great price. '
  '5':
  - type: text
    content: 'For after this manner in the old time the holy women also, who trusted in God, adorned themselves, being in subjection unto their own husbands: '
  '6':
  - type: text
    content: 'even as Sara obeyed Abraham, calling him lord: whose daughters ye are, as long as ye do well, and are not afraid with any amazement.'
  '7':
  - type: text
    content: 'Likewise, ye husbands, dwell with '
  - type: text
    content: them
  - type: text
    content: ' according to knowledge, giving honour unto the wife, as unto the weaker vessel, and as being heirs together of the grace of life; that your prayers be not hindered.'
  '8':
  - type: text
    content: 'Finally, '
  - type: text
    content: be ye
  - type: text
    content: ' all of one mind, having compassion one of another, love as brethren, '
  - type: text
    content: be
  - type: text
    content: ' pitiful, '
  - type: text
    content: be
  - type: text
    content: ' courteous: '
  '9':
  - type: text
    content: 'not rendering evil for evil, or railing for railing: but contrariwise blessing; knowing that ye are thereunto called, that ye should inherit a blessing. '
