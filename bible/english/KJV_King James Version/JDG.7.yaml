document_id: JDG.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Victories
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Jerubbaal, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Gideon, and all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, rose up early, and pitched beside the well of Harod: so that the host of the Midianites were on the north side of them, by the hill of Moreh, in the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Gideon, The people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' too many for me to give the Midianites into their hands, lest Israel vaunt themselves against me, saying, Mine own hand hath saved me. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now therefore go to, proclaim in the ears of the people, saying, Whosoever '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' fearful and afraid, let him return and depart early from mount Gilead. And there returned of the people twenty and two thousand; and there remained ten thousand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Gideon, The people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: too
  - type: text
    text: ' many; bring them down unto the water, and I will try them for thee there: and it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' of whom I say unto thee, This shall go with thee, the same shall go with thee; and of whomsoever I say unto thee, This shall not go with thee, the same shall not go. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So he brought down the people unto the water: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Gideon, Every one that lappeth of the water with his tongue, as a dog lappeth, him shalt thou set by himself; likewise every one that boweth down upon his knees to drink. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the number of them that lapped, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: putting
  - type: text
    text: ' their hand to their mouth, were three hundred men: but all the rest of the people bowed down upon their knees to drink water. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Gideon, By the three hundred men that lapped will I save you, and deliver the Midianites into thine hand: and let all the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' people go every man unto his place. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the people took victuals in their hand, and their trumpets: and he sent all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the rest of
  - type: text
    text: ' Israel every man unto his tent, and retained those three hundred men: and the host of Midian was beneath him in the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it came to pass the same night, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Arise, get thee down unto the host; for I have delivered it into thine hand. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But if thou fear to go down, go thou with Phurah thy servant down to the host: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and thou shalt hear what they say; and afterward shall thine hands be strengthened to go down unto the host. Then went he down with Phurah his servant unto the outside of the armed men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the host. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the Midianites and the Amalekites and all the children of the east lay along in the valley like grasshoppers for multitude; and their camels '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' without number, as the sand by the sea side for multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when Gideon was come, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a man that told a dream unto his fellow, and said, Behold, I dreamed a dream, and, lo, a cake of barley bread tumbled into the host of Midian, and came unto a tent, and smote it that it fell, and overturned it, that the tent lay along. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And his fellow answered and said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' nothing else save the sword of Gideon the son of Joash, a man of Israel: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' into his hand hath God delivered Midian, and all the host.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', when Gideon heard the telling of the dream, and the interpretation thereof, that he worshipped, and returned into the host of Israel, and said, Arise; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath delivered into your hand the host of Midian. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he divided the three hundred men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into
  - type: text
    text: ' three companies, and he put a trumpet in every man''s hand, with empty pitchers, and lamps within the pitchers. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said unto them, Look on me, and do likewise: and, behold, when I come to the outside of the camp, it shall be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', as I do, so shall ye do. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When I blow with a trumpet, I and all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with me, then blow ye the trumpets also on every side of all the camp, and say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: The sword
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and of Gideon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Gideon, and the hundred men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, came unto the outside of the camp in the beginning of the middle watch; and they had but newly set the watch: and they blew the trumpets, and brake the pitchers that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the three companies blew the trumpets, and brake the pitchers, and held the lamps in their left hands, and the trumpets in their right hands to blow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'withal:'
  - type: text
    text: ' and they cried, The sword of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and of Gideon. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they stood every man in his place round about the camp: and all the host ran, and cried, and fled. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the three hundred blew the trumpets, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' set every man''s sword against his fellow, even throughout all the host: and the host fled to Beth-shittah in Zererath, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to the border of Abel-meholah, unto Tabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And the men of Israel gathered themselves together out of Naphtali, and out of Asher, and out of all Manasseh, and pursued after the Midianites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Gideon sent messengers throughout all mount Ephraim, saying, Come down against the Midianites, and take before them the waters unto Beth-barah and Jordan. Then all the men of Ephraim gathered themselves together, and took the waters unto Beth-barah and Jordan. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And they took two princes of the Midianites, Oreb and Zeeb; and they slew Oreb upon the rock Oreb, and Zeeb they slew at the winepress of Zeeb, and pursued Midian, and brought the heads of Oreb and Zeeb to Gideon on the other side Jordan.
