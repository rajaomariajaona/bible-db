document_id: ACT.18
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Corinth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things Paul departed from Athens, and came to Corinth; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and found a certain Jew named Aquila, born in Pontus, lately come from Italy, with his wife Priscilla; (because that Claudius had commanded all Jews to depart from Rome:) and came unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And because he was of the same craft, he abode with them, and wrought: for by their occupation they were tentmakers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And he reasoned in the synagogue every sabbath, and persuaded the Jews and the Greeks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when Silas and Timotheus were come from Macedonia, Paul was pressed in the spirit, and testified to the Jews '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Jesus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when they opposed themselves, and blasphemed, he shook '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' raiment, and said unto them, Your blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' upon your own heads; I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' clean: from henceforth I will go unto the Gentiles. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he departed thence, and entered into a certain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man's
  - type: text
    text: ' house, named Justus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' that worshipped God, whose house joined hard to the synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Crispus, the chief ruler of the synagogue, believed on the Lord with all his house; and many of the Corinthians hearing believed, and were baptized. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then spake the Lord to Paul in the night by a vision, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Be not afraid, but speak, and hold not thy peace:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for I am with thee, and no man shall set on thee to hurt thee: for I have much people in this city.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he continued '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' a year and six months, teaching the word of God among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when Gallio was the deputy of Achaia, the Jews made insurrection with one accord against Paul, and brought him to the judgment seat, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' persuadeth men to worship God contrary to the law. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when Paul was now about to open '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mouth, Gallio said unto the Jews, If it were a matter of wrong or wicked lewdness, O '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye
  - type: text
    text: ' Jews, reason would that I should bear with you: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but if it be a question of words and names, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' your law, look ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to it
  - type: text
    text: '; for I will be no judge of such '
  - type: usfm
    marker: add
    children:
    - type: text
      text: matters
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he drave them from the judgment seat. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then all the Greeks took Sosthenes, the chief ruler of the synagogue, and beat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' before the judgment seat. And Gallio cared for none of those things. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Paul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after this
  - type: text
    text: ' tarried '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' yet a good while, and then took his leave of the brethren, and sailed thence into Syria, and with him Priscilla and Aquila; having shorn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' head in Cenchrea: for he had a vow.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ephesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he came to Ephesus, and left them there: but he himself entered into the synagogue, and reasoned with the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When they desired '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to tarry longer time with them, he consented not; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but bade them farewell, saying, I must by all means keep this feast that cometh in Jerusalem: but I will return again unto you, if God will. And he sailed from Ephesus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And when he had landed at Cæsarea, and gone up, and saluted the church, he went down to Antioch.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Third Missionary Journey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And after he had spent some time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ', he departed, and went over '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the country of Galatia and Phrygia in order, strengthening all the disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And a certain Jew named Apollos, born at Alexandria, an eloquent man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty in the scriptures, came to Ephesus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'This man was instructed in the way of the Lord; and being fervent in the spirit, he spake and taught diligently the things of the Lord, knowing only the baptism of John. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he began to speak boldly in the synagogue: whom when Aquila and Priscilla had heard, they took him unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and expounded unto him the way of God more perfectly. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when he was disposed to pass into Achaia, the brethren wrote, exhorting the disciples to receive him: who, when he was come, helped them much which had believed through grace: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'for he mightily convinced the Jews, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and that
  - type: text
    text: ' publickly, shewing by the scriptures that Jesus was Christ.'
