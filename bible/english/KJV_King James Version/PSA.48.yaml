document_id: PSA.48
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Song '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Psalm for the sons of Korah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and greatly to be praised'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the city of our God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the mountain of his holiness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Beautiful for situation, the joy of the whole earth,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' mount Zion, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on
  - type: text
    text: ' the sides of the north,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The city of the great King. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: God is known in her palaces for a refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For, lo, the kings were assembled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They passed by together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it, and
  - type: text
    text: ' so they marvelled;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They were troubled, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hasted away.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fear took hold upon them there,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' pain, as of a woman in travail.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Thou breakest the ships of Tarshish
- type: usfm
  marker: q2
  children:
  - type: text
    text: With an east wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'As we have heard, so have we seen in the city of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, in the city of our God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'God will establish it for ever. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We have thought of thy lovingkindness, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the midst of thy temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'According to thy name, O God, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy praise unto the ends of the earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy right hand is full of righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let mount Zion rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the daughters of Judah be glad, because of thy judgments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Walk about Zion, and go round about her:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell the towers thereof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mark ye well her bulwarks, consider her palaces;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That ye may tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to the generation following.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For this God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our God for ever and ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He will be our guide '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto death.'
