    content: 'A Song '
  - type: text
    content: and
  - type: text
    content: ' Psalm for the sons of Korah.'
  - type: text
    content: 'Great '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', and greatly to be praised'
  - type: text
    content: 'In the city of our God, '
  - type: text
    content: in
  - type: text
    content: ' the mountain of his holiness.'
  '10':
  - type: text
    content: 'According to thy name, O God, so '
  - type: text
    content: is
  - type: text
    content: ' thy praise unto the ends of the earth:'
  - type: text
    content: Thy right hand is full of righteousness.
  '11':
  - type: text
    content: Let mount Zion rejoice,
  - type: text
    content: Let the daughters of Judah be glad, because of thy judgments.
  '12':
  - type: text
    content: 'Walk about Zion, and go round about her:'
  - type: text
    content: Tell the towers thereof.
  '13':
  - type: text
    content: Mark ye well her bulwarks, consider her palaces;
  - type: text
    content: 'That ye may tell '
  - type: text
    content: it
  - type: text
    content: ' to the generation following.'
  '14':
  - type: text
    content: 'For this God '
  - type: text
    content: is
  - type: text
    content: ' our God for ever and ever:'
  - type: text
    content: 'He will be our guide '
  - type: text
    content: even
  - type: text
    content: ' unto death.'
  '2':
  - type: text
    content: Beautiful for situation, the joy of the whole earth,
  - type: text
    content: Is
  - type: text
    content: ' mount Zion, '
  - type: text
    content: on
  - type: text
    content: ' the sides of the north,'
  - type: text
    content: 'The city of the great King. '
  '3':
  - type: text
    content: God is known in her palaces for a refuge.
  '4':
  - type: text
    content: For, lo, the kings were assembled,
  - type: text
    content: They passed by together.
  '5':
  - type: text
    content: 'They saw '
  - type: text
    content: it, and
  - type: text
    content: ' so they marvelled;'
  - type: text
    content: 'They were troubled, '
  - type: text
    content: and
  - type: text
    content: ' hasted away.'
  '6':
  - type: text
    content: Fear took hold upon them there,
  - type: text
    content: And
  - type: text
    content: ' pain, as of a woman in travail.'
  '7':
  - type: text
    content: Thou breakest the ships of Tarshish
  - type: text
    content: With an east wind.
  '8':
  - type: text
    content: 'As we have heard, so have we seen in the city of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, in the city of our God:'
  - type: text
    content: 'God will establish it for ever. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: We have thought of thy lovingkindness, O God,
  - type: text
    content: In the midst of thy temple.
