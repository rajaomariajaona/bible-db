document_id: EXO.39
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And of the blue, and purple, and scarlet, they made cloths of service, to do service in the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', and made the holy garments for Aaron; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Ephod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he made the ephod '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' gold, blue, and purple, and scarlet, and fine twined linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they did beat the gold into thin plates, and cut '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it into
  - type: text
    text: ' wires, to work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the blue, and in the purple, and in the scarlet, and in the fine linen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' cunning work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They made shoulderpieces for it, to couple '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' together: by the two edges was it coupled together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the curious girdle of his ephod, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of the same, according to the work thereof; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' gold, blue, and purple, and scarlet, and fine twined linen; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they wrought onyx stones inclosed in ouches of gold, graven, as signets are graven, with the names of the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he put them on the shoulders of the ephod, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that they should be
  - type: text
    text: ' stones for a memorial to the children of Israel; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he made the breastplate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' cunning work, like the work of the ephod; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' gold, blue, and purple, and scarlet, and fine twined linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It was foursquare; they made the breastplate double: a span '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the length thereof, and a span the breadth thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' doubled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they set in it four rows of stones: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the first
  - type: text
    text: ' row '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a sardius, a topaz, and a carbuncle: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the first row. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the second row, an emerald, a sapphire, and a diamond. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the third row, a ligure, an agate, and an amethyst. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the fourth row, a beryl, an onyx, and a jasper: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' inclosed in ouches of gold in their inclosings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the stones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' according to the names of the children of Israel, twelve, according to their names, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like
  - type: text
    text: ' the engravings of a signet, every one with his name, according to the twelve tribes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they made upon the breastplate chains at the ends, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' wreathen work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they made two ouches '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' gold, and two gold rings; and put the two rings in the two ends of the breastplate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they put the two wreathen chains of gold in the two rings on the ends of the breastplate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the two ends of the two wreathen chains they fastened in the two ouches, and put them on the shoulderpieces of the ephod, before it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And they made two rings of gold, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on the two ends of the breastplate, upon the border of it, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' on the side of the ephod inward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they made two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' golden rings, and put them on the two sides of the ephod underneath, toward the forepart of it, over against the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' coupling thereof, above the curious girdle of the ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they did bind the breastplate by his rings unto the rings of the ephod with a lace of blue, that it might be above the curious girdle of the ephod, and that the breastplate might not be loosed from the ephod; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he made the robe of the ephod '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' woven work, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' an hole in the midst of the robe, as the hole of an habergeon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a band round about the hole, that it should not rend. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they made upon the hems of the robe pomegranates '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, and purple, and scarlet, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' twined '
  - type: usfm
    marker: add
    children:
    - type: text
      text: linen
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they made bells '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold, and put the bells between the pomegranates upon the hem of the robe, round about between the pomegranates; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'a bell and a pomegranate, a bell and a pomegranate, round about the hem of the robe to minister '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: '; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they made coats '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine linen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' woven work for Aaron, and for his sons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and a mitre '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine linen, and goodly bonnets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine linen, and linen breeches '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine twined linen, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and a girdle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine twined linen, and blue, and purple, and scarlet, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' needlework; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And they made the plate of the holy crown '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold, and wrote upon it a writing, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like to
  - type: text
    text: ' the engravings of a signet, HOLINESS TO THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And they tied unto it a lace of blue, to fasten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on high upon the mitre; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Tabernacle is erected
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Thus was all the work of the tabernacle of the tent of the congregation finished: and the children of Israel did according to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses, so did they.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they brought the tabernacle unto Moses, the tent, and all his furniture, his taches, his boards, his bars, and his pillars, and his sockets, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and the covering of rams'' skins dyed red, and the covering of badgers'' skins, and the vail of the covering, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the ark of the testimony, and the staves thereof, and the mercy seat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the table, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all the vessels thereof, and the shewbread, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'the pure candlestick, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' the lamps thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even with
  - type: text
    text: ' the lamps to be set in order, and all the vessels thereof, and the oil for light, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and the golden altar, and the anointing oil, and the sweet incense, and the hanging for the tabernacle door, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'the brasen altar, and his grate of brass, his staves, and all his vessels, the laver and his foot, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'the hangings of the court, his pillars, and his sockets, and the hanging for the court gate, his cords, and his pins, and all the vessels of the service of the tabernacle, for the tent of the congregation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the cloths of service to do service in the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', and the holy garments for Aaron the priest, and his sons'' garments, to minister in the priest''s office. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'According to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses, so the children of Israel made all the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And Moses did look upon all the work, and, behold, they had done it as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had commanded, even so had they done it: and Moses blessed them.'
