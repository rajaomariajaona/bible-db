document_id: AMO.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Women of Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear this word, ye kine of Bashan, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the mountain of Samaria, which oppress the poor, which crush the needy, which say to their masters, Bring, and let us drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' hath sworn by his holiness, that, lo, the days shall come upon you, that he will take you away with hooks, and your posterity with fishhooks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And ye shall go out at the breaches, every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cow at that which is
  - type: text
    text: ' before her; and ye shall cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' into the palace, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Come to Beth-el, and transgress; at Gilgal multiply transgression; and bring your sacrifices every morning, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' your tithes after three years: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and offer a sacrifice of thanksgiving with leaven, and proclaim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' publish the free offerings: for this liketh you, O ye children of Israel, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I also have given you cleanness of teeth in all your cities, and want of bread in all your places: yet have ye not returned unto me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And also I have withholden the rain from you, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' yet three months to the harvest: and I caused it to rain upon one city, and caused it not to rain upon another city: one piece was rained upon, and the piece whereupon it rained not withered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' three cities wandered unto one city, to drink water; but they were not satisfied: yet have ye not returned unto me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I have smitten you with blasting and mildew: when your gardens and your vineyards and your fig trees and your olive trees increased, the palmerworm devoured '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' yet have ye not returned unto me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have sent among you the pestilence after the manner of Egypt: your young men have I slain with the sword, and have taken away your horses; and I have made the stink of your camps to come up unto your nostrils: yet have ye not returned unto me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I have overthrown '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of you, as God overthrew Sodom and Gomorrah, and ye were as a firebrand plucked out of the burning: yet have ye not returned unto me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore thus will I do unto thee, O Israel: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' because I will do this unto thee, prepare to meet thy God, O Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For, lo, he that formeth the mountains, and createth the wind, and declareth unto man what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his thought, that maketh the morning darkness, and treadeth upon the high places of the earth, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', The God of hosts, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name.'
