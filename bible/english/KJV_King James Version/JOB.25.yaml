segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Bildad's Speech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then answered Bildad the Shuhite, and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dominion and fear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He maketh peace in his high places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Is there any number of his armies?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And upon whom doth not his light arise?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How then can man be justified with God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or how can he be clean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' born of a woman?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Behold even to the moon, and it shineth not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, the stars are not pure in his sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'How much less man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' a worm?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the son of man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' a worm?'
