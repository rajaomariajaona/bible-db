document_id: JOB.25,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Bildad's Speech
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then answered Bildad the Shuhite, and said,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dominion and fear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He maketh peace in his high places.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there any number of his armies?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And upon whom doth not his light arise?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How then can man be justified with God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or how can he be clean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' born of a woman?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold even to the moon, and it shineth not;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, the stars are not pure in his sight.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How much less man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' a worm?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the son of man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' a worm?'
