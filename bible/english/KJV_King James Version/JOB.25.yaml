verses:
  '1':
  - type: heading
    content: Bildad's Speech
  - type: text
    content: Then answered Bildad the Shuhite, and said,
  '2':
  - type: text
    content: 'Dominion and fear '
  - type: text
    content: are
  - type: text
    content: ' with him,'
  - type: text
    content: He maketh peace in his high places.
  '3':
  - type: text
    content: Is there any number of his armies?
  - type: text
    content: And upon whom doth not his light arise?
  '4':
  - type: text
    content: How then can man be justified with God?
  - type: text
    content: 'Or how can he be clean '
  - type: text
    content: that is
  - type: text
    content: ' born of a woman?'
  '5':
  - type: text
    content: Behold even to the moon, and it shineth not;
  - type: text
    content: Yea, the stars are not pure in his sight.
  '6':
  - type: text
    content: 'How much less man, '
  - type: text
    content: that is
  - type: text
    content: ' a worm?'
  - type: text
    content: 'And the son of man, '
  - type: text
    content: which is
  - type: text
    content: ' a worm?'
