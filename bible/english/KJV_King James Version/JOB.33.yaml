document_id: JOB.33,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherefore, Job, I pray thee, hear my speeches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hearken to all my words.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, he findeth occasions against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He counteth me for his enemy,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He putteth my feet in the stocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He marketh all my paths.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' this thou art not just: I will answer thee,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God is greater than man.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why dost thou strive against him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he giveth not account of any of his matters.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God speaketh once,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea twice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet man
    - type: text
      text: ' perceiveth it not.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a dream, in a vision of the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When deep sleep falleth upon men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In slumberings upon the bed;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he openeth the ears of men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sealeth their instruction,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That he may withdraw man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from his
    - type: text
      text: ' purpose,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hide pride from man.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keepeth back his soul from the pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his life from perishing by the sword.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is chastened also with pain upon his bed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the multitude of his bones with strong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'pain:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, now I have opened my mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My tongue hath spoken in my mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that his life abhorreth bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his soul dainty meat.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His flesh is consumed away, that it cannot be seen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his bones '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' were not seen stick out.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, his soul draweth near unto the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his life to the destroyers.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If there be a messenger with him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: An interpreter, one among a thousand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To shew unto man his uprightness:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he is gracious unto him, and saith,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Deliver him from going down to the pit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have found a ransom.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His flesh shall be fresher than a child''s:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall return to the days of his youth:'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall pray unto God, and he will be favourable unto him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he shall see his face with joy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he will render unto man his righteousness.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He looketh upon men, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if any
    - type: text
      text: ' say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have sinned, and perverted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it profited me not;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will deliver his soul from going into the pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his life shall see the light.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lo, all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' worketh God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oftentimes with man,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My words '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be of
    - type: text
      text: ' the uprightness of my heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my lips shall utter knowledge clearly.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To bring back his soul from the pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To be enlightened with the light of the living.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mark well, O Job, hearken unto me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hold thy peace, and I will speak.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If thou hast any thing to say, answer me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Speak, for I desire to justify thee.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If not, hearken unto me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hold thy peace, and I shall teach thee wisdom.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Spirit of God hath made me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the breath of the Almighty hath given me life.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou canst answer me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy words
    - type: text
      text: ' in order before me, stand up.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' according to thy wish in God''s stead:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I also am formed out of the clay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, my terror shall not make thee afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither shall my hand be heavy upon thee.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely thou hast spoken in mine hearing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I have heard the voice of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' words, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ','
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am clean without transgression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' innocent; neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' iniquity in me.'
