document_id: JOB.16,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Job's Reply
  - type: text
    content: Then Job answered and said,
  '10':
  - type: text
    content: They have gaped upon me with their mouth;
  - type: text
    content: They have smitten me upon the cheek reproachfully;
  - type: text
    content: They have gathered themselves together against me.
  '11':
  - type: text
    content: God hath delivered me to the ungodly,
  - type: text
    content: And turned me over into the hands of the wicked.
  '12':
  - type: text
    content: 'I was at ease, but he hath broken me asunder:'
  - type: text
    content: 'He hath also taken '
  - type: text
    content: me
  - type: text
    content: ' by my neck, and shaken me to pieces,'
  - type: text
    content: And set me up for his mark.
  '13':
  - type: text
    content: His archers compass me round about,
  - type: text
    content: He cleaveth my reins asunder, and doth not spare;
  - type: text
    content: He poureth out my gall upon the ground.
  '14':
  - type: text
    content: He breaketh me with breach upon breach,
  - type: text
    content: He runneth upon me like a giant.
  '15':
  - type: text
    content: I have sewed sackcloth upon my skin,
  - type: text
    content: And defiled my horn in the dust.
  '16':
  - type: text
    content: My face is foul with weeping,
  - type: text
    content: 'And on my eyelids '
  - type: text
    content: is
  - type: text
    content: ' the shadow of death;'
  '17':
  - type: text
    content: 'Not for '
  - type: text
    content: any
  - type: text
    content: ' injustice in mine hands:'
  - type: text
    content: 'Also my prayer '
  - type: text
    content: is
  - type: text
    content: ' pure.'
  '18':
  - type: text
    content: O earth, cover not thou my blood,
  - type: text
    content: And let my cry have no place.
  '19':
  - type: text
    content: 'Also now, behold, my witness '
  - type: text
    content: is
  - type: text
    content: ' in heaven,'
  - type: text
    content: 'And my record '
  - type: text
    content: is
  - type: text
    content: ' on high.'
  '2':
  - type: text
    content: 'I have heard many such things:'
  - type: text
    content: 'Miserable comforters '
  - type: text
    content: are
  - type: text
    content: ' ye all.'
  '20':
  - type: text
    content: 'My friends scorn me:'
  - type: text
    content: but
  - type: text
    content: ' mine eye poureth out '
  - type: text
    content: tears
  - type: text
    content: ' unto God.'
  '21':
  - type: text
    content: O that one might plead for a man with God,
  - type: text
    content: 'As a man '
  - type: text
    content: pleadeth
  - type: text
    content: ' for his neighbour!'
  '22':
  - type: text
    content: When a few years are come,
  - type: text
    content: 'Then I shall go the way '
  - type: text
    content: whence
  - type: text
    content: ' I shall not return.'
  '3':
  - type: text
    content: Shall vain words have an end?
  - type: text
    content: Or what emboldeneth thee that thou answerest?
  '4':
  - type: text
    content: 'I also could speak as ye '
  - type: text
    content: 'do:'
  - type: text
    content: If your soul were in my soul's stead,
  - type: text
    content: I could heap up words against you,
  - type: text
    content: And shake mine head at you.
  '5':
  - type: text
    content: ' '
  - type: text
    content: But
  - type: text
    content: ' I would strengthen you with my mouth,'
  - type: text
    content: 'And the moving of my lips should asswage '
  - type: text
    content: your grief
  - type: text
    content: .
  '6':
  - type: text
    content: 'Though I speak, my grief is not asswaged:'
  - type: text
    content: 'And '
  - type: text
    content: though
  - type: text
    content: ' I forbear, what am I eased?'
  '7':
  - type: text
    content: 'But now he hath made me weary:'
  - type: text
    content: Thou hast made desolate all my company.
  '8':
  - type: text
    content: 'And thou hast filled me with wrinkles, '
  - type: text
    content: which
  - type: text
    content: ' is a witness '
  - type: text
    content: 'against me:'
  - type: text
    content: And my leanness rising up in me beareth witness to my face.
  '9':
  - type: text
    content: 'He teareth '
  - type: text
    content: me
  - type: text
    content: ' in his wrath, who hateth me:'
  - type: text
    content: He gnasheth upon me with his teeth;
  - type: text
    content: Mine enemy sharpeneth his eyes upon me.
