document_id: JOB.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Reply
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They have gaped upon me with their mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have smitten me upon the cheek reproachfully;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have gathered themselves together against me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God hath delivered me to the ungodly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And turned me over into the hands of the wicked.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I was at ease, but he hath broken me asunder:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He hath also taken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' by my neck, and shaken me to pieces,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And set me up for his mark.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: His archers compass me round about,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He cleaveth my reins asunder, and doth not spare;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He poureth out my gall upon the ground.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He breaketh me with breach upon breach,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He runneth upon me like a giant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I have sewed sackcloth upon my skin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And defiled my horn in the dust.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: My face is foul with weeping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And on my eyelids '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the shadow of death;'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Not for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' injustice in mine hands:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Also my prayer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' pure.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: O earth, cover not thou my blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let my cry have no place.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Also now, behold, my witness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in heaven,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my record '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on high.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I have heard many such things:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Miserable comforters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ye all.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'My friends scorn me:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' mine eye poureth out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tears
    - type: text
      text: ' unto God.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: O that one might plead for a man with God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pleadeth
    - type: text
      text: ' for his neighbour!'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: When a few years are come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then I shall go the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whence
    - type: text
      text: ' I shall not return.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Shall vain words have an end?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or what emboldeneth thee that thou answerest?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I also could speak as ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'do:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If your soul were in my soul's stead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I could heap up words against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shake mine head at you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' I would strengthen you with my mouth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the moving of my lips should asswage '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your grief
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Though I speak, my grief is not asswaged:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: though
    - type: text
      text: ' I forbear, what am I eased?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But now he hath made me weary:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast made desolate all my company.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And thou hast filled me with wrinkles, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' is a witness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'against me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my leanness rising up in me beareth witness to my face.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He teareth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' in his wrath, who hateth me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He gnasheth upon me with his teeth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mine enemy sharpeneth his eyes upon me.
