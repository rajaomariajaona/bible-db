document_id: ACT.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Conversion of Cornelius
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a certain man in Cæsarea called Cornelius, a centurion of the band called the Italian '
  - type: usfm
    marker: add
    children:
    - type: text
      text: band
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: add
    children:
    - type: text
      text: a
  - type: text
    text: ' devout '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', and one that feared God with all his house, which gave much alms to the people, and prayed to God alway. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He saw in a vision evidently about the ninth hour of the day an angel of God coming in to him, and saying unto him, Cornelius. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when he looked on him, he was afraid, and said, What is it, Lord? And he said unto him, Thy prayers and thine alms are come up for a memorial before God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And now send men to Joppa, and call for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' Simon, whose surname is Peter: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'he lodgeth with one Simon a tanner, whose house is by the sea side: he shall tell thee what thou oughtest to do. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when the angel which spake unto Cornelius was departed, he called two of his household servants, and a devout soldier of them that waited on him continually; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and when he had declared all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' things unto them, he sent them to Joppa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On the morrow, as they went on their journey, and drew nigh unto the city, Peter went up upon the housetop to pray about the sixth hour: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and he became very hungry, and would have eaten: but while they made ready, he fell into a trance, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and saw heaven opened, and a certain vessel descending unto him, as it had been a great sheet knit at the four corners, and let down to the earth: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'wherein were all manner of fourfooted beasts of the earth, and wild beasts, and creeping things, and fowls of the air. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And there came a voice to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rise, Peter; kill, and eat.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Peter said, Not so, Lord; for I have never eaten any thing that is common or unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the voice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: spake
  - type: text
    text: ' unto him again the second time, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'What God hath cleansed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' call not thou common.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This was done thrice: and the vessel was received up again into heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now while Peter doubted in himself what this vision which he had seen should mean, behold, the men which were sent from Cornelius had made enquiry for Simon''s house, and stood before the gate, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and called, and asked whether Simon, which was surnamed Peter, were lodged there. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'While Peter thought on the vision, the Spirit said unto him, Behold, three men seek thee. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Arise therefore, and get thee down, and go with them, doubting nothing: for I have sent them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Peter went down to the men which were sent unto him from Cornelius; and said, Behold, I am he whom ye seek: what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the cause wherefore ye are come? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And they said, Cornelius the centurion, a just man, and one that feareth God, and of good report among all the nation of the Jews, was warned from God by an holy angel to send for thee into his house, and to hear words of thee. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then called he them in, and lodged '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: . And on the morrow Peter went away with them, and certain brethren from Joppa accompanied him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the morrow after they entered into Cæsarea. And Cornelius waited for them, and had called together his kinsmen and near friends. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And as Peter was coming in, Cornelius met him, and fell down at his feet, and worshipped '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Peter took him up, saying, Stand up; I myself also am a man. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And as he talked with him, he went in, and found many that were come together. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he said unto them, Ye know how that it is an unlawful thing for a man that is a Jew to keep company, or come unto one of another nation; but God hath shewed me that I should not call any man common or unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Therefore came I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto you
  - type: text
    text: ' without gainsaying, as soon as I was sent for: I ask therefore for what intent ye have sent for me? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Cornelius said, Four days ago I was fasting until this hour; and at the ninth hour I prayed in my house, and, behold, a man stood before me in bright clothing, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and said, Cornelius, thy prayer is heard, and thine alms are had in remembrance in the sight of God. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Send therefore to Joppa, and call hither Simon, whose surname is Peter; he is lodged in the house of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' Simon a tanner by the sea side: who, when he cometh, shall speak unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Immediately therefore I sent to thee; and thou hast well done that thou art come. Now therefore are we all here present before God, to hear all things that are commanded thee of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then Peter opened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mouth, and said, Of a truth I perceive that God is no respecter of persons: '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'but in every nation he that feareth him, and worketh righteousness, is accepted with him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The word which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' sent unto the children of Israel, preaching peace by Jesus Christ: (he is Lord of all:) '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'that word, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', ye know, which was published throughout all Judæa, and began from Galilee, after the baptism which John preached; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'how God anointed Jesus of Nazareth with the Holy Ghost and with power: who went about doing good, and healing all that were oppressed of the devil; for God was with him. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And we are witnesses of all things which he did both in the land of the Jews, and in Jerusalem; whom they slew and hanged on a tree: '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'him God raised up the third day, and shewed him openly; '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'not to all the people, but unto witnesses chosen before of God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to us, who did eat and drink with him after he rose from the dead. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And he commanded us to preach unto the people, and to testify that it is he which was ordained of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' the Judge of quick and dead. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'To him give all the prophets witness, that through his name whosoever believeth in him shall receive remission of sins. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'While Peter yet spake these words, the Holy Ghost fell on all them which heard the word. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And they of the circumcision which believed were astonished, as many as came with Peter, because that on the Gentiles also was poured out the gift of the Holy Ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'For they heard them speak with tongues, and magnify God. Then answered Peter, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Can any man forbid water, that these should not be baptized, which have received the Holy Ghost as well as we? '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: And he commanded them to be baptized in the name of the Lord. Then prayed they him to tarry certain days.
