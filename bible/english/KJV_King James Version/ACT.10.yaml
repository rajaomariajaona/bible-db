document_id: ACT.10,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Conversion of Cornelius
  - type: text
    content: 'There was a certain man in Cæsarea called Cornelius, a centurion of the band called the Italian '
  - type: text
    content: band
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'and he became very hungry, and would have eaten: but while they made ready, he fell into a trance, '
  '11':
  - type: text
    content: 'and saw heaven opened, and a certain vessel descending unto him, as it had been a great sheet knit at the four corners, and let down to the earth: '
  '12':
  - type: text
    content: 'wherein were all manner of fourfooted beasts of the earth, and wild beasts, and creeping things, and fowls of the air. '
  '13':
  - type: text
    content: 'And there came a voice to him, '
  - type: text
    content: Rise, Peter; kill, and eat.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But Peter said, Not so, Lord; for I have never eaten any thing that is common or unclean. '
  '15':
  - type: text
    content: 'And the voice '
  - type: text
    content: spake
  - type: text
    content: ' unto him again the second time, '
  - type: text
    content: 'What God hath cleansed, '
  - type: text
    content: that
  - type: text
    content: ' call not thou common.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'This was done thrice: and the vessel was received up again into heaven.'
  '17':
  - type: text
    content: 'Now while Peter doubted in himself what this vision which he had seen should mean, behold, the men which were sent from Cornelius had made enquiry for Simon''s house, and stood before the gate, '
  '18':
  - type: text
    content: 'and called, and asked whether Simon, which was surnamed Peter, were lodged there. '
  '19':
  - type: text
    content: 'While Peter thought on the vision, the Spirit said unto him, Behold, three men seek thee. '
  '2':
  - type: text
    content: a
  - type: text
    content: ' devout '
  - type: text
    content: man
  - type: text
    content: ', and one that feared God with all his house, which gave much alms to the people, and prayed to God alway. '
  '20':
  - type: text
    content: 'Arise therefore, and get thee down, and go with them, doubting nothing: for I have sent them. '
  '21':
  - type: text
    content: 'Then Peter went down to the men which were sent unto him from Cornelius; and said, Behold, I am he whom ye seek: what '
  - type: text
    content: is
  - type: text
    content: ' the cause wherefore ye are come? '
  '22':
  - type: text
    content: 'And they said, Cornelius the centurion, a just man, and one that feareth God, and of good report among all the nation of the Jews, was warned from God by an holy angel to send for thee into his house, and to hear words of thee. '
  '23':
  - type: text
    content: 'Then called he them in, and lodged '
  - type: text
    content: them
  - type: text
    content: . And on the morrow Peter went away with them, and certain brethren from Joppa accompanied him.
  '24':
  - type: text
    content: 'And the morrow after they entered into Cæsarea. And Cornelius waited for them, and had called together his kinsmen and near friends. '
  '25':
  - type: text
    content: 'And as Peter was coming in, Cornelius met him, and fell down at his feet, and worshipped '
  - type: text
    content: him
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'But Peter took him up, saying, Stand up; I myself also am a man. '
  '27':
  - type: text
    content: 'And as he talked with him, he went in, and found many that were come together. '
  '28':
  - type: text
    content: 'And he said unto them, Ye know how that it is an unlawful thing for a man that is a Jew to keep company, or come unto one of another nation; but God hath shewed me that I should not call any man common or unclean. '
  '29':
  - type: text
    content: 'Therefore came I '
  - type: text
    content: unto you
  - type: text
    content: ' without gainsaying, as soon as I was sent for: I ask therefore for what intent ye have sent for me? '
  '3':
  - type: text
    content: 'He saw in a vision evidently about the ninth hour of the day an angel of God coming in to him, and saying unto him, Cornelius. '
  '30':
  - type: text
    content: 'And Cornelius said, Four days ago I was fasting until this hour; and at the ninth hour I prayed in my house, and, behold, a man stood before me in bright clothing, '
  '31':
  - type: text
    content: 'and said, Cornelius, thy prayer is heard, and thine alms are had in remembrance in the sight of God. '
  '32':
  - type: text
    content: 'Send therefore to Joppa, and call hither Simon, whose surname is Peter; he is lodged in the house of '
  - type: text
    content: one
  - type: text
    content: ' Simon a tanner by the sea side: who, when he cometh, shall speak unto thee. '
  '33':
  - type: text
    content: Immediately therefore I sent to thee; and thou hast well done that thou art come. Now therefore are we all here present before God, to hear all things that are commanded thee of God.
  '34':
  - type: text
    content: 'Then Peter opened '
  - type: text
    content: his
  - type: text
    content: ' mouth, and said, Of a truth I perceive that God is no respecter of persons: '
  '35':
  - type: text
    content: 'but in every nation he that feareth him, and worketh righteousness, is accepted with him. '
  '36':
  - type: text
    content: 'The word which '
  - type: text
    content: God
  - type: text
    content: ' sent unto the children of Israel, preaching peace by Jesus Christ: (he is Lord of all:) '
  '37':
  - type: text
    content: 'that word, '
  - type: text
    content: I say
  - type: text
    content: ', ye know, which was published throughout all Judæa, and began from Galilee, after the baptism which John preached; '
  '38':
  - type: text
    content: 'how God anointed Jesus of Nazareth with the Holy Ghost and with power: who went about doing good, and healing all that were oppressed of the devil; for God was with him. '
  '39':
  - type: text
    content: 'And we are witnesses of all things which he did both in the land of the Jews, and in Jerusalem; whom they slew and hanged on a tree: '
  '4':
  - type: text
    content: 'And when he looked on him, he was afraid, and said, What is it, Lord? And he said unto him, Thy prayers and thine alms are come up for a memorial before God. '
  '40':
  - type: text
    content: 'him God raised up the third day, and shewed him openly; '
  '41':
  - type: text
    content: 'not to all the people, but unto witnesses chosen before of God, '
  - type: text
    content: even
  - type: text
    content: ' to us, who did eat and drink with him after he rose from the dead. '
  '42':
  - type: text
    content: 'And he commanded us to preach unto the people, and to testify that it is he which was ordained of God '
  - type: text
    content: to be
  - type: text
    content: ' the Judge of quick and dead. '
  '43':
  - type: text
    content: 'To him give all the prophets witness, that through his name whosoever believeth in him shall receive remission of sins. '
  '44':
  - type: text
    content: 'While Peter yet spake these words, the Holy Ghost fell on all them which heard the word. '
  '45':
  - type: text
    content: 'And they of the circumcision which believed were astonished, as many as came with Peter, because that on the Gentiles also was poured out the gift of the Holy Ghost. '
  '46':
  - type: text
    content: 'For they heard them speak with tongues, and magnify God. Then answered Peter, '
  '47':
  - type: text
    content: 'Can any man forbid water, that these should not be baptized, which have received the Holy Ghost as well as we? '
  '48':
  - type: text
    content: And he commanded them to be baptized in the name of the Lord. Then prayed they him to tarry certain days.
  '5':
  - type: text
    content: 'And now send men to Joppa, and call for '
  - type: text
    content: one
  - type: text
    content: ' Simon, whose surname is Peter: '
  '6':
  - type: text
    content: 'he lodgeth with one Simon a tanner, whose house is by the sea side: he shall tell thee what thou oughtest to do. '
  '7':
  - type: text
    content: 'And when the angel which spake unto Cornelius was departed, he called two of his household servants, and a devout soldier of them that waited on him continually; '
  '8':
  - type: text
    content: 'and when he had declared all '
  - type: text
    content: these
  - type: text
    content: ' things unto them, he sent them to Joppa.'
  '9':
  - type: text
    content: 'On the morrow, as they went on their journey, and drew nigh unto the city, Peter went up upon the housetop to pray about the sixth hour: '
