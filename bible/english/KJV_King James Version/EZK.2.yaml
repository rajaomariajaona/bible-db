document_id: EZK.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Call
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And he said unto me, Son of man, stand upon thy feet, and I will speak unto thee. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and he spread it before me; and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' written within and without: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' written therein lamentations, and mourning, and woe.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the spirit entered into me when he spake unto me, and set me upon my feet, that I heard him that spake unto me. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he said unto me, Son of man, I send thee to the children of Israel, to a rebellious nation that hath rebelled against me: they and their fathers have transgressed against me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto this very day. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' impudent children and stiffhearted. I do send thee unto them; and thou shalt say unto them, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they, whether they will hear, or whether they will forbear, (for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a rebellious house,) yet shall know that there hath been a prophet among them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And thou, son of man, be not afraid of them, neither be afraid of their words, though briers and thorns '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with thee, and thou dost dwell among scorpions: be not afraid of their words, nor be dismayed at their looks, though they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a rebellious house. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And thou shalt speak my words unto them, whether they will hear, or whether they will forbear: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' most rebellious.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But thou, son of man, hear what I say unto thee; Be not thou rebellious like that rebellious house: open thy mouth, and eat that I give thee.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And when I looked, behold, an hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' sent unto me; and, lo, a roll of a book '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' therein; '
