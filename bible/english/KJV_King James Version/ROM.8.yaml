document_id: ROM.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Spirit of God Within You
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' therefore now no condemnation to them which are in Christ Jesus, who walk not after the flesh, but after the Spirit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in you, the body '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' dead because of sin; but the Spirit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' life because of righteousness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the Spirit of him that raised up Jesus from the dead dwell in you, he that raised up Christ from the dead shall also quicken your mortal bodies by his Spirit that dwelleth in you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, brethren, we are debtors, not to the flesh, to live after the flesh. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if ye live after the flesh, ye shall die: but if ye through the Spirit do mortify the deeds of the body, ye shall live.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sons of God
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as many as are led by the Spirit of God, they are the sons of God. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye have not received the spirit of bondage again to fear; but ye have received the Spirit of adoption, whereby we cry, Abba, Father. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit itself beareth witness with our spirit, that we are the children of God: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if children, then heirs; heirs of God, and joint-heirs with Christ; if so be that we suffer with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', that we may be also glorified together.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Glory to be Revealed
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I reckon that the sufferings of this present time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not worthy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be compared
    - type: text
      text: ' with the glory which shall be revealed in us. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the earnest expectation of the creature waiteth for the manifestation of the sons of God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the law of the Spirit of life in Christ Jesus hath made me free from the law of sin and death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the creature was made subject to vanity, not willingly, but by reason of him who hath subjected '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the same
    - type: text
      text: ' in hope, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because the creature itself also shall be delivered from the bondage of corruption into the glorious liberty of the children of God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we know that the whole creation groaneth and travaileth in pain together until now. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And not only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ', but ourselves also, which have the firstfruits of the Spirit, even we ourselves groan within ourselves, waiting for the adoption, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to wit
    - type: text
      text: ', the redemption of our body. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we are saved by hope: but hope that is seen is not hope: for what a man seeth, why doth he yet hope for? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if we hope for that we see not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' do we with patience wait for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise the Spirit also helpeth our infirmities: for we know not what we should pray for as we ought: but the Spirit itself maketh intercession for us with groanings which cannot be uttered. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he that searcheth the hearts knoweth what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the mind of the Spirit, because he maketh intercession for the saints according to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the will of
    - type: text
      text: ' God. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we know that all things work together for good to them that love God, to them who are the called according to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' purpose. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whom he did foreknow, he also did predestinate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' conformed to the image of his Son, that he might be the firstborn among many brethren. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For what the law could not do, in that it was weak through the flesh, God sending his own Son in the likeness of sinful flesh, and for sin, condemned sin in the flesh: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover whom he did predestinate, them he also called: and whom he called, them he also justified: and whom he justified, them he also glorified.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: More than Conquerors
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What shall we then say to these things? If God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' for us, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: can be
    - type: text
      text: ' against us? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that spared not his own Son, but delivered him up for us all, how shall he not with him also freely give us all things? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who shall lay any thing to the charge of God''s elect? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' God that justifieth. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that condemneth? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' Christ that died, yea rather, that is risen again, who is even at the right hand of God, who also maketh intercession for us. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who shall separate us from the love of Christ? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' tribulation, or distress, or persecution, or famine, or nakedness, or peril, or sword? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As it is written,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thy sake we are killed all the day long;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are accounted as sheep for the slaughter.
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nay, in all these things we are more than conquerors through him that loved us. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For I am persuaded, that neither death, nor life, nor angels, nor principalities, nor powers, nor things present, nor things to come, '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: nor height, nor depth, nor any other creature, shall be able to separate us from the love of God, which is in Christ Jesus our Lord.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the righteousness of the law might be fulfilled in us, who walk not after the flesh, but after the Spirit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they that are after the flesh do mind the things of the flesh; but they that are after the Spirit the things of the Spirit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For to be carnally minded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' death; but to be spiritually minded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' life and peace. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because the carnal mind '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' enmity against God: for it is not subject to the law of God, neither indeed can be. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then they that are in the flesh cannot please God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But ye are not in the flesh, but in the Spirit, if so be that the Spirit of God dwell in you. Now if any man have not the Spirit of Christ, he is none of his. '
