document_id: ROM.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Spirit of God Within You
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' therefore now no condemnation to them which are in Christ Jesus, who walk not after the flesh, but after the Spirit. '
  '10':
  - type: text
    content: 'And if Christ '
  - type: text
    content: be
  - type: text
    content: ' in you, the body '
  - type: text
    content: is
  - type: text
    content: ' dead because of sin; but the Spirit '
  - type: text
    content: is
  - type: text
    content: ' life because of righteousness. '
  '11':
  - type: text
    content: 'But if the Spirit of him that raised up Jesus from the dead dwell in you, he that raised up Christ from the dead shall also quicken your mortal bodies by his Spirit that dwelleth in you. '
  '12':
  - type: text
    content: 'Therefore, brethren, we are debtors, not to the flesh, to live after the flesh. '
  '13':
  - type: text
    content: 'For if ye live after the flesh, ye shall die: but if ye through the Spirit do mortify the deeds of the body, ye shall live.'
  - type: heading
    content: Sons of God
  '14':
  - type: text
    content: 'For as many as are led by the Spirit of God, they are the sons of God. '
  '15':
  - type: text
    content: 'For ye have not received the spirit of bondage again to fear; but ye have received the Spirit of adoption, whereby we cry, Abba, Father. '
  '16':
  - type: text
    content: 'The Spirit itself beareth witness with our spirit, that we are the children of God: '
  '17':
  - type: text
    content: 'and if children, then heirs; heirs of God, and joint-heirs with Christ; if so be that we suffer with '
  - type: text
    content: him
  - type: text
    content: ', that we may be also glorified together.'
  - type: heading
    content: A Glory to be Revealed
  '18':
  - type: text
    content: 'For I reckon that the sufferings of this present time '
  - type: text
    content: are
  - type: text
    content: ' not worthy '
  - type: text
    content: to be compared
  - type: text
    content: ' with the glory which shall be revealed in us. '
  '19':
  - type: text
    content: 'For the earnest expectation of the creature waiteth for the manifestation of the sons of God. '
  '2':
  - type: text
    content: 'For the law of the Spirit of life in Christ Jesus hath made me free from the law of sin and death. '
  '20':
  - type: text
    content: 'For the creature was made subject to vanity, not willingly, but by reason of him who hath subjected '
  - type: text
    content: the same
  - type: text
    content: ' in hope, '
  '21':
  - type: text
    content: 'because the creature itself also shall be delivered from the bondage of corruption into the glorious liberty of the children of God. '
  '22':
  - type: text
    content: 'For we know that the whole creation groaneth and travaileth in pain together until now. '
  '23':
  - type: text
    content: 'And not only '
  - type: text
    content: they
  - type: text
    content: ', but ourselves also, which have the firstfruits of the Spirit, even we ourselves groan within ourselves, waiting for the adoption, '
  - type: text
    content: to wit
  - type: text
    content: ', the redemption of our body. '
  '24':
  - type: text
    content: 'For we are saved by hope: but hope that is seen is not hope: for what a man seeth, why doth he yet hope for? '
  '25':
  - type: text
    content: 'But if we hope for that we see not, '
  - type: text
    content: then
  - type: text
    content: ' do we with patience wait for '
  - type: text
    content: it
  - type: text
    content: .
  '26':
  - type: text
    content: 'Likewise the Spirit also helpeth our infirmities: for we know not what we should pray for as we ought: but the Spirit itself maketh intercession for us with groanings which cannot be uttered. '
  '27':
  - type: text
    content: 'And he that searcheth the hearts knoweth what '
  - type: text
    content: is
  - type: text
    content: ' the mind of the Spirit, because he maketh intercession for the saints according to '
  - type: text
    content: the will of
  - type: text
    content: ' God. '
  '28':
  - type: text
    content: 'And we know that all things work together for good to them that love God, to them who are the called according to '
  - type: text
    content: his
  - type: text
    content: ' purpose. '
  '29':
  - type: text
    content: 'For whom he did foreknow, he also did predestinate '
  - type: text
    content: to be
  - type: text
    content: ' conformed to the image of his Son, that he might be the firstborn among many brethren. '
  '3':
  - type: text
    content: 'For what the law could not do, in that it was weak through the flesh, God sending his own Son in the likeness of sinful flesh, and for sin, condemned sin in the flesh: '
  '30':
  - type: text
    content: 'Moreover whom he did predestinate, them he also called: and whom he called, them he also justified: and whom he justified, them he also glorified.'
  - type: heading
    content: More than Conquerors
  '31':
  - type: text
    content: 'What shall we then say to these things? If God '
  - type: text
    content: be
  - type: text
    content: ' for us, who '
  - type: text
    content: can be
  - type: text
    content: ' against us? '
  '32':
  - type: text
    content: 'He that spared not his own Son, but delivered him up for us all, how shall he not with him also freely give us all things? '
  '33':
  - type: text
    content: 'Who shall lay any thing to the charge of God''s elect? '
  - type: text
    content: It is
  - type: text
    content: ' God that justifieth. '
  '34':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' he that condemneth? '
  - type: text
    content: It is
  - type: text
    content: ' Christ that died, yea rather, that is risen again, who is even at the right hand of God, who also maketh intercession for us. '
  '35':
  - type: text
    content: 'Who shall separate us from the love of Christ? '
  - type: text
    content: shall
  - type: text
    content: ' tribulation, or distress, or persecution, or famine, or nakedness, or peril, or sword? '
  '36':
  - type: text
    content: As it is written,
  - type: text
    content: For thy sake we are killed all the day long;
  - type: text
    content: We are accounted as sheep for the slaughter.
  '37':
  - type: text
    content: 'Nay, in all these things we are more than conquerors through him that loved us. '
  '38':
  - type: text
    content: 'For I am persuaded, that neither death, nor life, nor angels, nor principalities, nor powers, nor things present, nor things to come, '
  '39':
  - type: text
    content: nor height, nor depth, nor any other creature, shall be able to separate us from the love of God, which is in Christ Jesus our Lord.
  '4':
  - type: text
    content: 'that the righteousness of the law might be fulfilled in us, who walk not after the flesh, but after the Spirit. '
  '5':
  - type: text
    content: 'For they that are after the flesh do mind the things of the flesh; but they that are after the Spirit the things of the Spirit. '
  '6':
  - type: text
    content: 'For to be carnally minded '
  - type: text
    content: is
  - type: text
    content: ' death; but to be spiritually minded '
  - type: text
    content: is
  - type: text
    content: ' life and peace. '
  '7':
  - type: text
    content: 'Because the carnal mind '
  - type: text
    content: is
  - type: text
    content: ' enmity against God: for it is not subject to the law of God, neither indeed can be. '
  '8':
  - type: text
    content: 'So then they that are in the flesh cannot please God. '
  '9':
  - type: text
    content: 'But ye are not in the flesh, but in the Spirit, if so be that the Spirit of God dwell in you. Now if any man have not the Spirit of Christ, he is none of his. '
