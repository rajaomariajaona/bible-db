document_id: 2CH.17
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jehoshaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jehoshaphat his son reigned in his stead, and strengthened himself against Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he placed forces in all the fenced cities of Judah, and set garrisons in the land of Judah, and in the cities of Ephraim, which Asa his father had taken. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was with Jehoshaphat, because he walked in the first ways of his father David, and sought not unto Baalim; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but sought to the '
  - type: usfm
    marker: add
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: text
    text: ' God of his father, and walked in his commandments, and not after the doings of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stablished the kingdom in his hand; and all Judah brought to Jehoshaphat presents; and he had riches and honour in abundance. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And his heart was lifted up in the ways of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': moreover he took away the high places and groves out of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Also in the third year of his reign he sent to his princes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to Ben-hail, and to Obadiah, and to Zechariah, and to Nethaneel, and to Michaiah, to teach in the cities of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And with them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he sent
  - type: text
    text: ' Levites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Shemaiah, and Nethaniah, and Zebadiah, and Asahel, and Shemiramoth, and Jehonathan, and Adonijah, and Tobijah, and Tob-adonijah, Levites; and with them Elishama and Jehoram, priests. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they taught in Judah, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' the book of the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with them, and went about throughout all the cities of Judah, and taught the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' fell upon all the kingdoms of the lands that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' round about Judah, so that they made no war against Jehoshaphat. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the Philistines brought Jehoshaphat presents, and tribute silver; and the Arabians brought him flocks, seven thousand and seven hundred rams, and seven thousand and seven hundred he goats.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jehoshaphat waxed great exceedingly; and he built in Judah castles, and cities of store. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he had much business in the cities of Judah: and the men of war, mighty men of valour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the numbers of them according to the house of their fathers: Of Judah, the captains of thousands; Adnah the chief, and with him mighty men of valour three hundred thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And next to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jehohanan the captain, and with him two hundred and fourscore thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And next him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Amasiah the son of Zichri, who willingly offered himself unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and with him two hundred thousand mighty men of valour. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And of Benjamin; Eliada a mighty man of valour, and with him armed men with bow and shield two hundred thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And next him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jehozabad, and with him an hundred and fourscore thousand ready prepared for the war. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These waited on the king, beside '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those
  - type: text
    text: ' whom the king put in the fenced cities throughout all Judah.'
