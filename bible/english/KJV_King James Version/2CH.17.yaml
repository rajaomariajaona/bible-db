document_id: 2CH.17,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat
  - type: text
    content: 'And Jehoshaphat his son reigned in his stead, and strengthened himself against Israel. '
  '10':
  - type: text
    content: 'And the fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' fell upon all the kingdoms of the lands that '
  - type: text
    content: were
  - type: text
    content: ' round about Judah, so that they made no war against Jehoshaphat. '
  '11':
  - type: text
    content: 'Also '
  - type: text
    content: some
  - type: text
    content: ' of the Philistines brought Jehoshaphat presents, and tribute silver; and the Arabians brought him flocks, seven thousand and seven hundred rams, and seven thousand and seven hundred he goats.'
  '12':
  - type: text
    content: 'And Jehoshaphat waxed great exceedingly; and he built in Judah castles, and cities of store. '
  '13':
  - type: text
    content: 'And he had much business in the cities of Judah: and the men of war, mighty men of valour, '
  - type: text
    content: were
  - type: text
    content: ' in Jerusalem. '
  '14':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the numbers of them according to the house of their fathers: Of Judah, the captains of thousands; Adnah the chief, and with him mighty men of valour three hundred thousand. '
  '15':
  - type: text
    content: 'And next to him '
  - type: text
    content: was
  - type: text
    content: ' Jehohanan the captain, and with him two hundred and fourscore thousand. '
  '16':
  - type: text
    content: 'And next him '
  - type: text
    content: was
  - type: text
    content: ' Amasiah the son of Zichri, who willingly offered himself unto the '
  - type: text
    content: LORD
  - type: text
    content: '; and with him two hundred thousand mighty men of valour. '
  '17':
  - type: text
    content: 'And of Benjamin; Eliada a mighty man of valour, and with him armed men with bow and shield two hundred thousand. '
  '18':
  - type: text
    content: 'And next him '
  - type: text
    content: was
  - type: text
    content: ' Jehozabad, and with him an hundred and fourscore thousand ready prepared for the war. '
  '19':
  - type: text
    content: 'These waited on the king, beside '
  - type: text
    content: those
  - type: text
    content: ' whom the king put in the fenced cities throughout all Judah.'
  '2':
  - type: text
    content: 'And he placed forces in all the fenced cities of Judah, and set garrisons in the land of Judah, and in the cities of Ephraim, which Asa his father had taken. '
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' was with Jehoshaphat, because he walked in the first ways of his father David, and sought not unto Baalim; '
  '4':
  - type: text
    content: 'but sought to the '
  - type: text
    content: LORD
  - type: text
    content: ' God of his father, and walked in his commandments, and not after the doings of Israel. '
  '5':
  - type: text
    content: 'Therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' stablished the kingdom in his hand; and all Judah brought to Jehoshaphat presents; and he had riches and honour in abundance. '
  '6':
  - type: text
    content: 'And his heart was lifted up in the ways of the '
  - type: text
    content: LORD
  - type: text
    content: ': moreover he took away the high places and groves out of Judah.'
  '7':
  - type: text
    content: 'Also in the third year of his reign he sent to his princes, '
  - type: text
    content: even
  - type: text
    content: ' to Ben-hail, and to Obadiah, and to Zechariah, and to Nethaneel, and to Michaiah, to teach in the cities of Judah. '
  '8':
  - type: text
    content: 'And with them '
  - type: text
    content: he sent
  - type: text
    content: ' Levites, '
  - type: text
    content: even
  - type: text
    content: ' Shemaiah, and Nethaniah, and Zebadiah, and Asahel, and Shemiramoth, and Jehonathan, and Adonijah, and Tobijah, and Tob-adonijah, Levites; and with them Elishama and Jehoram, priests. '
  '9':
  - type: text
    content: 'And they taught in Judah, and '
  - type: text
    content: had
  - type: text
    content: ' the book of the law of the '
  - type: text
    content: LORD
  - type: text
    content: ' with them, and went about throughout all the cities of Judah, and taught the people.'
