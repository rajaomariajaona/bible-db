document_id: JER.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Parable of the Figs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shewed me, and, behold, two baskets of figs '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' set before the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', after that Nebuchadrezzar king of Babylon had carried away captive Jeconiah the son of Jehoiakim king of Judah, and the princes of Judah, with the carpenters and smiths, from Jerusalem, and had brought them to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One basket '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' very good figs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' like the figs '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' first ripe: and the other basket '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' very naughty figs, which could not be eaten, they were so bad. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then said the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto me, What seest thou, Jeremiah? And I said, Figs; the good figs, very good; and the evil, very evil, that cannot be eaten, they are so evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Again the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of Israel; Like these good figs, so will I acknowledge them that are carried away captive of Judah, whom I have sent out of this place into the land of the Chaldeans for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' good. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For I will set mine eyes upon them for good, and I will bring them again to this land: and I will build them, and not pull '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' down; and I will plant them, and not pluck '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' up. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I will give them an heart to know me, that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and they shall be my people, and I will be their God: for they shall return unto me with their whole heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And as the evil figs, which cannot be eaten, they are so evil; surely thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', So will I give Zedekiah the king of Judah, and his princes, and the residue of Jerusalem, that remain in this land, and them that dwell in the land of Egypt: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and I will deliver them to be removed into all the kingdoms of the earth for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hurt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a reproach and a proverb, a taunt and a curse, in all places whither I shall drive them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And I will send the sword, the famine, and the pestilence, among them, till they be consumed from off the land that I gave unto them and to their fathers.
