verses:
  '1':
  - type: heading
    content: Parable of the Figs
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shewed me, and, behold, two baskets of figs '
  - type: text
    content: were
  - type: text
    content: ' set before the temple of the '
  - type: text
    content: LORD
  - type: text
    content: ', after that Nebuchadrezzar king of Babylon had carried away captive Jeconiah the son of Jehoiakim king of Judah, and the princes of Judah, with the carpenters and smiths, from Jerusalem, and had brought them to Babylon. '
  '10':
  - type: text
    content: And I will send the sword, the famine, and the pestilence, among them, till they be consumed from off the land that I gave unto them and to their fathers.
  '2':
  - type: text
    content: 'One basket '
  - type: text
    content: had
  - type: text
    content: ' very good figs, '
  - type: text
    content: even
  - type: text
    content: ' like the figs '
  - type: text
    content: that are
  - type: text
    content: ' first ripe: and the other basket '
  - type: text
    content: had
  - type: text
    content: ' very naughty figs, which could not be eaten, they were so bad. '
  '3':
  - type: text
    content: 'Then said the '
  - type: text
    content: LORD
  - type: text
    content: ' unto me, What seest thou, Jeremiah? And I said, Figs; the good figs, very good; and the evil, very evil, that cannot be eaten, they are so evil.'
  '4':
  - type: text
    content: 'Again the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '5':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel; Like these good figs, so will I acknowledge them that are carried away captive of Judah, whom I have sent out of this place into the land of the Chaldeans for '
  - type: text
    content: their
  - type: text
    content: ' good. '
  '6':
  - type: text
    content: 'For I will set mine eyes upon them for good, and I will bring them again to this land: and I will build them, and not pull '
  - type: text
    content: them
  - type: text
    content: ' down; and I will plant them, and not pluck '
  - type: text
    content: them
  - type: text
    content: ' up. '
  '7':
  - type: text
    content: 'And I will give them an heart to know me, that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ': and they shall be my people, and I will be their God: for they shall return unto me with their whole heart.'
  '8':
  - type: text
    content: 'And as the evil figs, which cannot be eaten, they are so evil; surely thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', So will I give Zedekiah the king of Judah, and his princes, and the residue of Jerusalem, that remain in this land, and them that dwell in the land of Egypt: '
  '9':
  - type: text
    content: 'and I will deliver them to be removed into all the kingdoms of the earth for '
  - type: text
    content: their
  - type: text
    content: ' hurt, '
  - type: text
    content: to be
  - type: text
    content: ' a reproach and a proverb, a taunt and a curse, in all places whither I shall drive them. '
