document_id: NEH.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Nehemiah's Reforms
  - type: text
    content: 'On that day they read in the book of Moses in the audience of the people; and therein was found written, that the Ammonite and the Moabite should not come into the congregation of God for ever; '
  '10':
  - type: text
    content: 'And I perceived that the portions of the Levites had not been given '
  - type: text
    content: 'them:'
  - type: text
    content: ' for the Levites and the singers, that did the work, were fled every one to his field. '
  '11':
  - type: text
    content: 'Then contended I with the rulers, and said, Why is the house of God forsaken? And I gathered them together, and set them in their place. '
  '12':
  - type: text
    content: 'Then brought all Judah the tithe of the corn and the new wine and the oil unto the treasuries. '
  '13':
  - type: text
    content: 'And I made treasurers over the treasuries, Shelemiah the priest, and Zadok the scribe, and of the Levites, Pedaiah: and next to them '
  - type: text
    content: was
  - type: text
    content: ' Hanan the son of Zaccur, the son of Mattaniah: for they were counted faithful, and their office '
  - type: text
    content: was
  - type: text
    content: ' to distribute unto their brethren. '
  '14':
  - type: text
    content: Remember me, O my God, concerning this, and wipe not out my good deeds that I have done for the house of my God, and for the offices thereof.
  - type: heading
    content: Keeping the Sabbath
  '15':
  - type: text
    content: 'In those days saw I in Judah '
  - type: text
    content: some
  - type: text
    content: ' treading wine presses on the sabbath, and bringing in sheaves, and lading asses; as also wine, grapes, and figs, and all '
  - type: text
    content: manner of
  - type: text
    content: ' burdens, which they brought into Jerusalem on the sabbath day: and I testified '
  - type: text
    content: against them
  - type: text
    content: ' in the day wherein they sold victuals. '
  '16':
  - type: text
    content: 'There dwelt men of Tyre also therein, which brought fish, and all manner of ware, and sold on the sabbath unto the children of Judah, and in Jerusalem. '
  '17':
  - type: text
    content: 'Then I contended with the nobles of Judah, and said unto them, What evil thing '
  - type: text
    content: is
  - type: text
    content: ' this that ye do, and profane the sabbath day? '
  '18':
  - type: text
    content: Did not your fathers thus, and did not our God bring all this evil upon us, and upon this city? yet ye bring more wrath upon Israel by profaning the sabbath.
  '19':
  - type: text
    content: 'And it came to pass, that when the gates of Jerusalem began to be dark before the sabbath, I commanded that the gates should be shut, and charged that they should not be opened till after the sabbath: and '
  - type: text
    content: some
  - type: text
    content: ' of my servants set I at the gates, '
  - type: text
    content: that
  - type: text
    content: ' there should no burden be brought in on the sabbath day. '
  '2':
  - type: text
    content: 'because they met not the children of Israel with bread and with water, but hired Balaam against them, that he should curse them: howbeit our God turned the curse into a blessing. '
  '20':
  - type: text
    content: 'So the merchants and sellers of all kind of ware lodged without Jerusalem once or twice. '
  '21':
  - type: text
    content: 'Then I testified against them, and said unto them, Why lodge ye about the wall? if ye do '
  - type: text
    content: so
  - type: text
    content: ' again, I will lay hands on you. From that time forth came they no '
  - type: text
    content: more
  - type: text
    content: ' on the sabbath. '
  '22':
  - type: text
    content: 'And I commanded the Levites that they should cleanse themselves, and '
  - type: text
    content: that
  - type: text
    content: ' they should come '
  - type: text
    content: and
  - type: text
    content: ' keep the gates, to sanctify the sabbath day. Remember me, O my God, '
  - type: text
    content: concerning
  - type: text
    content: ' this also, and spare me according to the greatness of thy mercy.'
  '23':
  - type: text
    content: 'In those days also saw I Jews '
  - type: text
    content: that
  - type: text
    content: ' had married wives of Ashdod, of Ammon, '
  - type: text
    content: and
  - type: text
    content: ' of Moab: '
  '24':
  - type: text
    content: 'and their children spake half in the speech of Ashdod, and could not speak in the Jews'' language, but according to the language of each people. '
  '25':
  - type: text
    content: 'And I contended with them, and cursed them, and smote certain of them, and plucked off their hair, and made them swear by God, '
  - type: text
    content: saying
  - type: text
    content: ', Ye shall not give your daughters unto their sons, nor take their daughters unto your sons, or for yourselves. '
  '26':
  - type: text
    content: 'Did not Solomon king of Israel sin by these things? yet among many nations was there no king like him, who was beloved of his God, and God made him king over all Israel: nevertheless even him did outlandish women cause to sin. '
  '27':
  - type: text
    content: Shall we then hearken unto you to do all this great evil, to transgress against our God in marrying strange wives?
  '28':
  - type: text
    content: 'And '
  - type: text
    content: one
  - type: text
    content: ' of the sons of Joiada, the son of Eliashib the high priest, '
  - type: text
    content: was
  - type: text
    content: ' son in law to Sanballat the Horonite: therefore I chased him from me. '
  '29':
  - type: text
    content: Remember them, O my God, because they have defiled the priesthood, and the covenant of the priesthood, and of the Levites.
  '3':
  - type: text
    content: Now it came to pass, when they had heard the law, that they separated from Israel all the mixed multitude.
  '30':
  - type: text
    content: 'Thus cleansed I them from all strangers, and appointed the wards of the priests and the Levites, every one in his business; '
  '31':
  - type: text
    content: and for the wood offering, at times appointed, and for the firstfruits. Remember me, O my God, for good.
  '4':
  - type: text
    content: 'And before this, Eliashib the priest, having the oversight of the chamber of the house of our God, '
  - type: text
    content: was
  - type: text
    content: ' allied unto Tobiah: '
  '5':
  - type: text
    content: 'and he had prepared for him a great chamber, where aforetime they laid the meat offerings, the frankincense, and the vessels, and the tithes of the corn, the new wine, and the oil, which was commanded '
  - type: text
    content: to be given
  - type: text
    content: ' to the Levites, and the singers, and the porters; and the offerings of the priests. '
  '6':
  - type: text
    content: 'But in all this '
  - type: text
    content: time
  - type: text
    content: ' was not I at Jerusalem: for in the two and thirtieth year of Artaxerxes king of Babylon came I unto the king, and after certain days obtained I leave of the king: '
  '7':
  - type: text
    content: 'and I came to Jerusalem, and understood of the evil that Eliashib did for Tobiah, in preparing him a chamber in the courts of the house of God. '
  '8':
  - type: text
    content: 'And it grieved me sore: therefore I cast forth all the household stuff of Tobiah out of the chamber. '
  '9':
  - type: text
    content: 'Then I commanded, and they cleansed the chambers: and thither brought I again the vessels of the house of God, with the meat offering and the frankincense.'
