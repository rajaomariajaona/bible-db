document_id: NEH.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Nehemiah's Reforms
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On that day they read in the book of Moses in the audience of the people; and therein was found written, that the Ammonite and the Moabite should not come into the congregation of God for ever; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'because they met not the children of Israel with bread and with water, but hired Balaam against them, that he should curse them: howbeit our God turned the curse into a blessing. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Now it came to pass, when they had heard the law, that they separated from Israel all the mixed multitude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And before this, Eliashib the priest, having the oversight of the chamber of the house of our God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' allied unto Tobiah: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and he had prepared for him a great chamber, where aforetime they laid the meat offerings, the frankincense, and the vessels, and the tithes of the corn, the new wine, and the oil, which was commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be given
  - type: text
    text: ' to the Levites, and the singers, and the porters; and the offerings of the priests. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But in all this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: time
  - type: text
    text: ' was not I at Jerusalem: for in the two and thirtieth year of Artaxerxes king of Babylon came I unto the king, and after certain days obtained I leave of the king: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and I came to Jerusalem, and understood of the evil that Eliashib did for Tobiah, in preparing him a chamber in the courts of the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it grieved me sore: therefore I cast forth all the household stuff of Tobiah out of the chamber. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I commanded, and they cleansed the chambers: and thither brought I again the vessels of the house of God, with the meat offering and the frankincense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I perceived that the portions of the Levites had not been given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' for the Levites and the singers, that did the work, were fled every one to his field. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then contended I with the rulers, and said, Why is the house of God forsaken? And I gathered them together, and set them in their place. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then brought all Judah the tithe of the corn and the new wine and the oil unto the treasuries. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I made treasurers over the treasuries, Shelemiah the priest, and Zadok the scribe, and of the Levites, Pedaiah: and next to them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Hanan the son of Zaccur, the son of Mattaniah: for they were counted faithful, and their office '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' to distribute unto their brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Remember me, O my God, concerning this, and wipe not out my good deeds that I have done for the house of my God, and for the offices thereof.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Keeping the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In those days saw I in Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' treading wine presses on the sabbath, and bringing in sheaves, and lading asses; as also wine, grapes, and figs, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: manner of
  - type: text
    text: ' burdens, which they brought into Jerusalem on the sabbath day: and I testified '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against them
  - type: text
    text: ' in the day wherein they sold victuals. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'There dwelt men of Tyre also therein, which brought fish, and all manner of ware, and sold on the sabbath unto the children of Judah, and in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then I contended with the nobles of Judah, and said unto them, What evil thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that ye do, and profane the sabbath day? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Did not your fathers thus, and did not our God bring all this evil upon us, and upon this city? yet ye bring more wrath upon Israel by profaning the sabbath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it came to pass, that when the gates of Jerusalem began to be dark before the sabbath, I commanded that the gates should be shut, and charged that they should not be opened till after the sabbath: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of my servants set I at the gates, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' there should no burden be brought in on the sabbath day. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So the merchants and sellers of all kind of ware lodged without Jerusalem once or twice. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I testified against them, and said unto them, Why lodge ye about the wall? if ye do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' again, I will lay hands on you. From that time forth came they no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' on the sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And I commanded the Levites that they should cleanse themselves, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they should come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' keep the gates, to sanctify the sabbath day. Remember me, O my God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' this also, and spare me according to the greatness of thy mercy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In those days also saw I Jews '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' had married wives of Ashdod, of Ammon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of Moab: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and their children spake half in the speech of Ashdod, and could not speak in the Jews'' language, but according to the language of each people. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And I contended with them, and cursed them, and smote certain of them, and plucked off their hair, and made them swear by God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Ye shall not give your daughters unto their sons, nor take their daughters unto your sons, or for yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Did not Solomon king of Israel sin by these things? yet among many nations was there no king like him, who was beloved of his God, and God made him king over all Israel: nevertheless even him did outlandish women cause to sin. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Shall we then hearken unto you to do all this great evil, to transgress against our God in marrying strange wives?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of the sons of Joiada, the son of Eliashib the high priest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' son in law to Sanballat the Horonite: therefore I chased him from me. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Remember them, O my God, because they have defiled the priesthood, and the covenant of the priesthood, and of the Levites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Thus cleansed I them from all strangers, and appointed the wards of the priests and the Levites, every one in his business; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: and for the wood offering, at times appointed, and for the firstfruits. Remember me, O my God, for good.
