document_id: PSA.78,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: Maschil of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give ear, O my people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' my law:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Incline your ears to the words of my mouth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They kept not the covenant of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And refused to walk in his law;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And forgat his works,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his wonders that he had shewed them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marvellous things did he in the sight of their fathers, in the land of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: In
    - type: text
      text: ' the field of Zoan.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He divided the sea, and caused them to pass through;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he made the waters to stand as an heap.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the daytime also he led them with a cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the night with a light of fire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He clave the rocks in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' drink as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: out of
    - type: text
      text: ' the great depths.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought streams also out of the rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And caused waters to run down like rivers.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they sinned yet more against him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By provoking the most High in the wilderness.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they tempted God in their heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By asking meat for their lust.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, they spake against God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They said, Can God furnish a table in the wilderness?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will open my mouth in a parable:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will utter dark sayings of old:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, he smote the rock, that the waters gushed out, and the streams overflowed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can he give bread also? Can he provide flesh for his people?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', and was wroth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So a fire was kindled against Jacob, and anger also came up against Israel;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they believed not in God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And trusted not in his salvation:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though he had commanded the clouds from above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And opened the doors of heaven,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And had rained down manna upon them to eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And had given them of the corn of heaven.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Man did eat angels'' food:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He sent them meat to the full.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He caused an east wind to blow in the heaven:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by his power he brought in the south wind.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rained flesh also upon them as dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And feathered fowls like as the sand of the sea:'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' fall in the midst of their camp,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Round about their habitations.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So they did eat, and were well filled: For he gave them their own desire;'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which we have heard and known,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And our fathers have told us.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were not estranged from their lust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But while their meat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' yet in their mouths,'
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wrath of God came upon them, and slew the fattest of them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And smote down the chosen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Israel.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all this they sinned still,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And believed not for his wondrous works.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore their days did he consume in vanity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their years in trouble.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When he slew them, then they sought him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they returned and enquired early after God.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they remembered that God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' their rock,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the high God their redeemer.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless they did flatter him with their mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they lied unto him with their tongues.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their heart was not right with him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither were they stedfast in his covenant.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' full of compassion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Forgave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' iniquity, and destroyed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, many a time turned he his anger away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And did not stir up all his wrath.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he remembered that they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were but
    - type: text
      text: ' flesh;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A wind that passeth away, and cometh not again.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We will not hide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' from their children, shewing to the generation to come,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The praises of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and his strength, and his wonderful works that he hath done.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How oft did they provoke him in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' grieve him in the desert!'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, they turned back and tempted God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And limited the Holy One of Israel.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They remembered not his hand,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Nor
    - type: text
      text: ' the day when he delivered them from the enemy.'
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How he had wrought his signs in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his wonders in the field of Zoan:'
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And had turned their rivers into blood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their floods, that they could not drink.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent divers sorts of flies among them, which devoured them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And frogs, which destroyed them.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave also their increase unto the caterpiller,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their labour unto the locust.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He destroyed their vines with hail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their sycomore trees with frost.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave up their cattle also to the hail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their flocks to hot thunderbolts.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He cast upon them the fierceness of his anger, wrath, and indignation, and trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'By sending evil angels '
    - type: usfm
      marker: add
      children:
      - type: text
        text: among them
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he established a testimony in Jacob, and appointed a law in Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which he commanded our fathers, that they should make them known to their children:'
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made a way to his anger; He spared not their soul from death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But gave their life over to the pestilence;
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And smote all the firstborn in Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The chief of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' strength in the tabernacles of Ham:'
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But made his own people to go forth like sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And guided them in the wilderness like a flock.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he led them on safely, so that they feared not:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the sea overwhelmed their enemies.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he brought them to the border of his sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even to
    - type: text
      text: ' this mountain, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' his right hand had purchased.'
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He cast out the heathen also before them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And divided them an inheritance by line, and made the tribes of Israel to dwell in their tents.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they tempted and provoked the most high God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And kept not his testimonies:'
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But turned back, and dealt unfaithfully like their fathers:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were turned aside like a deceitful bow.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they provoked him to anger with their high places,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And moved him to jealousy with their graven images.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When God heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', he was wroth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And greatly abhorred Israel:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That the generation to come might know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' should be born;'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' should arise'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And declare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to their children:'
  '60':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that he forsook the tabernacle of Shiloh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The tent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' he placed among men;'
  '61':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And delivered his strength into captivity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his glory into the enemy's hand.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave his people over also unto the sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And was wroth with his inheritance.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fire consumed their young men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their maidens were not given to marriage.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their priests fell by the sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their widows made no lamentation.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the Lord awaked as one out of sleep,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' like a mighty man that shouteth by reason of wine.'
  '66':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he smote his enemies in the hinder parts:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He put them to a perpetual reproach.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moreover he refused the tabernacle of Joseph,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And chose not the tribe of Ephraim:'
  '68':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But chose the tribe of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The mount Zion which he loved.
  '69':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he built his sanctuary like high '
    - type: usfm
      marker: add
      children:
      - type: text
        text: palaces
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the earth which he hath established for ever.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they might set their hope in God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And not forget the works of God, but keep his commandments:'
  '70':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He chose David also his servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And took him from the sheepfolds:'
  '71':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From following the ewes great with young he brought him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To feed Jacob his people, and Israel his inheritance.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he fed them according to the integrity of his heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And guided them by the skilfulness of his hands.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And might not be as their fathers, a stubborn and rebellious generation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A generation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' set not their heart aright, and whose spirit was not stedfast with God.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The children of Ephraim, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' armed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' carrying bows,'
  - type: usfm
    marker: q2
    children:
