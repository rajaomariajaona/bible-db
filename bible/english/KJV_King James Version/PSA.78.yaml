document_id: PSA.78
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: Maschil of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Give ear, O my people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' my law:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Incline your ears to the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I will open my mouth in a parable:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will utter dark sayings of old:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Which we have heard and known,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And our fathers have told us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We will not hide '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' from their children, shewing to the generation to come,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The praises of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and his strength, and his wonderful works that he hath done.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For he established a testimony in Jacob, and appointed a law in Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Which he commanded our fathers, that they should make them known to their children:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'That the generation to come might know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' the children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' should be born;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Who
  - type: text
    text: ' should arise'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And declare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to their children:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That they might set their hope in God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And not forget the works of God, but keep his commandments:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And might not be as their fathers, a stubborn and rebellious generation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A generation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' set not their heart aright, and whose spirit was not stedfast with God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The children of Ephraim, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' armed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' carrying bows,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Turned back in the day of battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They kept not the covenant of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And refused to walk in his law;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And forgat his works,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his wonders that he had shewed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Marvellous things did he in the sight of their fathers, in the land of Egypt,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: In
  - type: text
    text: ' the field of Zoan.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He divided the sea, and caused them to pass through;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he made the waters to stand as an heap.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: In the daytime also he led them with a cloud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the night with a light of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He clave the rocks in the wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' drink as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: out of
  - type: text
    text: ' the great depths.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He brought streams also out of the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And caused waters to run down like rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And they sinned yet more against him
- type: usfm
  marker: q2
  children:
  - type: text
    text: By provoking the most High in the wilderness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And they tempted God in their heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: By asking meat for their lust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Yea, they spake against God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They said, Can God furnish a table in the wilderness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Behold, he smote the rock, that the waters gushed out, and the streams overflowed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can he give bread also? Can he provide flesh for his people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', and was wroth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: So a fire was kindled against Jacob, and anger also came up against Israel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Because they believed not in God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And trusted not in his salvation:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Though he had commanded the clouds from above,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And opened the doors of heaven,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And had rained down manna upon them to eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And had given them of the corn of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Man did eat angels'' food:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sent them meat to the full.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He caused an east wind to blow in the heaven:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by his power he brought in the south wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He rained flesh also upon them as dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And feathered fowls like as the sand of the sea:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' fall in the midst of their camp,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Round about their habitations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So they did eat, and were well filled: For he gave them their own desire;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They were not estranged from their lust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But while their meat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' yet in their mouths,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The wrath of God came upon them, and slew the fattest of them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And smote down the chosen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For all this they sinned still,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And believed not for his wondrous works.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Therefore their days did he consume in vanity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their years in trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When he slew them, then they sought him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they returned and enquired early after God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And they remembered that God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' their rock,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the high God their redeemer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nevertheless they did flatter him with their mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they lied unto him with their tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: For their heart was not right with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither were they stedfast in his covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But he, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' full of compassion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Forgave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' iniquity, and destroyed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yea, many a time turned he his anger away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And did not stir up all his wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'For he remembered that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were but
  - type: text
    text: ' flesh;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A wind that passeth away, and cometh not again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: How oft did they provoke him in the wilderness,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' grieve him in the desert!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Yea, they turned back and tempted God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And limited the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: They remembered not his hand,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Nor
  - type: text
    text: ' the day when he delivered them from the enemy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: How he had wrought his signs in Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his wonders in the field of Zoan:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And had turned their rivers into blood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their floods, that they could not drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: He sent divers sorts of flies among them, which devoured them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And frogs, which destroyed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: He gave also their increase unto the caterpiller,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their labour unto the locust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: He destroyed their vines with hail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their sycomore trees with frost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: He gave up their cattle also to the hail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their flocks to hot thunderbolts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: He cast upon them the fierceness of his anger, wrath, and indignation, and trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'By sending evil angels '
  - type: usfm
    marker: add
    children:
    - type: text
      text: among them
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: He made a way to his anger; He spared not their soul from death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But gave their life over to the pestilence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: And smote all the firstborn in Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The chief of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' strength in the tabernacles of Ham:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: But made his own people to go forth like sheep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And guided them in the wilderness like a flock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And he led them on safely, so that they feared not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the sea overwhelmed their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: And he brought them to the border of his sanctuary,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even to
  - type: text
    text: ' this mountain, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' his right hand had purchased.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: He cast out the heathen also before them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And divided them an inheritance by line, and made the tribes of Israel to dwell in their tents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Yet they tempted and provoked the most high God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And kept not his testimonies:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'But turned back, and dealt unfaithfully like their fathers:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They were turned aside like a deceitful bow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: For they provoked him to anger with their high places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And moved him to jealousy with their graven images.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'When God heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', he was wroth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And greatly abhorred Israel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: So that he forsook the tabernacle of Shiloh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The tent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' he placed among men;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: And delivered his strength into captivity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his glory into the enemy's hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: He gave his people over also unto the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And was wroth with his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: The fire consumed their young men;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their maidens were not given to marriage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Their priests fell by the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their widows made no lamentation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Then the Lord awaked as one out of sleep,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' like a mighty man that shouteth by reason of wine.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'And he smote his enemies in the hinder parts:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He put them to a perpetual reproach.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Moreover he refused the tabernacle of Joseph,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And chose not the tribe of Ephraim:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: But chose the tribe of Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The mount Zion which he loved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'And he built his sanctuary like high '
  - type: usfm
    marker: add
    children:
    - type: text
      text: palaces
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like the earth which he hath established for ever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: He chose David also his servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And took him from the sheepfolds:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: From following the ewes great with young he brought him
- type: usfm
  marker: q2
  children:
  - type: text
    text: To feed Jacob his people, and Israel his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: So he fed them according to the integrity of his heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And guided them by the skilfulness of his hands.
