document_id: PSA.78,1
type_code: eng
verses:
  '1':
  - type: text
    content: Maschil of Asaph.
  - type: text
    content: 'Give ear, O my people, '
  - type: text
    content: to
  - type: text
    content: ' my law:'
  - type: text
    content: Incline your ears to the words of my mouth.
  '10':
  - type: text
    content: They kept not the covenant of God,
  - type: text
    content: And refused to walk in his law;
  '11':
  - type: text
    content: And forgat his works,
  - type: text
    content: And his wonders that he had shewed them.
  '12':
  - type: text
    content: Marvellous things did he in the sight of their fathers, in the land of Egypt,
  - type: text
    content: In
  - type: text
    content: ' the field of Zoan.'
  '13':
  - type: text
    content: He divided the sea, and caused them to pass through;
  - type: text
    content: And he made the waters to stand as an heap.
  '14':
  - type: text
    content: In the daytime also he led them with a cloud,
  - type: text
    content: And all the night with a light of fire.
  '15':
  - type: text
    content: He clave the rocks in the wilderness,
  - type: text
    content: 'And gave '
  - type: text
    content: them
  - type: text
    content: ' drink as '
  - type: text
    content: out of
  - type: text
    content: ' the great depths.'
  '16':
  - type: text
    content: He brought streams also out of the rock,
  - type: text
    content: And caused waters to run down like rivers.
  '17':
  - type: text
    content: And they sinned yet more against him
  - type: text
    content: By provoking the most High in the wilderness.
  '18':
  - type: text
    content: And they tempted God in their heart
  - type: text
    content: By asking meat for their lust.
  '19':
  - type: text
    content: Yea, they spake against God;
  - type: text
    content: They said, Can God furnish a table in the wilderness?
  '2':
  - type: text
    content: 'I will open my mouth in a parable:'
  - type: text
    content: 'I will utter dark sayings of old:'
  '20':
  - type: text
    content: Behold, he smote the rock, that the waters gushed out, and the streams overflowed;
  - type: text
    content: Can he give bread also? Can he provide flesh for his people?
  '21':
  - type: text
    content: 'Therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' heard '
  - type: text
    content: this
  - type: text
    content: ', and was wroth:'
  - type: text
    content: So a fire was kindled against Jacob, and anger also came up against Israel;
  '22':
  - type: text
    content: Because they believed not in God,
  - type: text
    content: 'And trusted not in his salvation:'
  '23':
  - type: text
    content: Though he had commanded the clouds from above,
  - type: text
    content: And opened the doors of heaven,
  '24':
  - type: text
    content: And had rained down manna upon them to eat,
  - type: text
    content: And had given them of the corn of heaven.
  '25':
  - type: text
    content: 'Man did eat angels'' food:'
  - type: text
    content: He sent them meat to the full.
  '26':
  - type: text
    content: 'He caused an east wind to blow in the heaven:'
  - type: text
    content: And by his power he brought in the south wind.
  '27':
  - type: text
    content: He rained flesh also upon them as dust,
  - type: text
    content: 'And feathered fowls like as the sand of the sea:'
  '28':
  - type: text
    content: 'And he let '
  - type: text
    content: it
  - type: text
    content: ' fall in the midst of their camp,'
  - type: text
    content: Round about their habitations.
  '29':
  - type: text
    content: 'So they did eat, and were well filled: For he gave them their own desire;'
  '3':
  - type: text
    content: Which we have heard and known,
  - type: text
    content: And our fathers have told us.
  '30':
  - type: text
    content: They were not estranged from their lust.
  - type: text
    content: 'But while their meat '
  - type: text
    content: was
  - type: text
    content: ' yet in their mouths,'
  '31':
  - type: text
    content: The wrath of God came upon them, and slew the fattest of them,
  - type: text
    content: 'And smote down the chosen '
  - type: text
    content: men
  - type: text
    content: ' of Israel.'
  '32':
  - type: text
    content: For all this they sinned still,
  - type: text
    content: And believed not for his wondrous works.
  '33':
  - type: text
    content: Therefore their days did he consume in vanity,
  - type: text
    content: And their years in trouble.
  '34':
  - type: text
    content: 'When he slew them, then they sought him:'
  - type: text
    content: And they returned and enquired early after God.
  '35':
  - type: text
    content: 'And they remembered that God '
  - type: text
    content: was
  - type: text
    content: ' their rock,'
  - type: text
    content: And the high God their redeemer.
  '36':
  - type: text
    content: Nevertheless they did flatter him with their mouth,
  - type: text
    content: And they lied unto him with their tongues.
  '37':
  - type: text
    content: For their heart was not right with him,
  - type: text
    content: Neither were they stedfast in his covenant.
  '38':
  - type: text
    content: 'But he, '
  - type: text
    content: being
  - type: text
    content: ' full of compassion,'
  - type: text
    content: 'Forgave '
  - type: text
    content: their
  - type: text
    content: ' iniquity, and destroyed '
  - type: text
    content: them
  - type: text
    content: ' not:'
  - type: text
    content: Yea, many a time turned he his anger away,
  - type: text
    content: And did not stir up all his wrath.
  '39':
  - type: text
    content: 'For he remembered that they '
  - type: text
    content: were but
  - type: text
    content: ' flesh;'
  - type: text
    content: A wind that passeth away, and cometh not again.
  '4':
  - type: text
    content: 'We will not hide '
  - type: text
    content: them
  - type: text
    content: ' from their children, shewing to the generation to come,'
  - type: text
    content: 'The praises of the '
  - type: text
    content: LORD
  - type: text
    content: ', and his strength, and his wonderful works that he hath done.'
  '40':
  - type: text
    content: How oft did they provoke him in the wilderness,
  - type: text
    content: And
  - type: text
    content: ' grieve him in the desert!'
  '41':
  - type: text
    content: Yea, they turned back and tempted God,
  - type: text
    content: And limited the Holy One of Israel.
  '42':
  - type: text
    content: They remembered not his hand,
  - type: text
    content: Nor
  - type: text
    content: ' the day when he delivered them from the enemy.'
  '43':
  - type: text
    content: How he had wrought his signs in Egypt,
  - type: text
    content: 'And his wonders in the field of Zoan:'
  '44':
  - type: text
    content: And had turned their rivers into blood;
  - type: text
    content: And their floods, that they could not drink.
  '45':
  - type: text
    content: He sent divers sorts of flies among them, which devoured them;
  - type: text
    content: And frogs, which destroyed them.
  '46':
  - type: text
    content: He gave also their increase unto the caterpiller,
  - type: text
    content: And their labour unto the locust.
  '47':
  - type: text
    content: He destroyed their vines with hail,
  - type: text
    content: And their sycomore trees with frost.
  '48':
  - type: text
    content: He gave up their cattle also to the hail,
  - type: text
    content: And their flocks to hot thunderbolts.
  '49':
  - type: text
    content: He cast upon them the fierceness of his anger, wrath, and indignation, and trouble,
  - type: text
    content: 'By sending evil angels '
  - type: text
    content: among them
  - type: text
    content: .
  '5':
  - type: text
    content: For he established a testimony in Jacob, and appointed a law in Israel,
  - type: text
    content: 'Which he commanded our fathers, that they should make them known to their children:'
  '50':
  - type: text
    content: He made a way to his anger; He spared not their soul from death,
  - type: text
    content: But gave their life over to the pestilence;
  '51':
  - type: text
    content: And smote all the firstborn in Egypt;
  - type: text
    content: 'The chief of '
  - type: text
    content: their
  - type: text
    content: ' strength in the tabernacles of Ham:'
  '52':
  - type: text
    content: But made his own people to go forth like sheep,
  - type: text
    content: And guided them in the wilderness like a flock.
  '53':
  - type: text
    content: 'And he led them on safely, so that they feared not:'
  - type: text
    content: But the sea overwhelmed their enemies.
  '54':
  - type: text
    content: And he brought them to the border of his sanctuary,
  - type: text
    content: Even to
  - type: text
    content: ' this mountain, '
  - type: text
    content: which
  - type: text
    content: ' his right hand had purchased.'
  '55':
  - type: text
    content: He cast out the heathen also before them,
  - type: text
    content: And divided them an inheritance by line, and made the tribes of Israel to dwell in their tents.
  '56':
  - type: text
    content: Yet they tempted and provoked the most high God,
  - type: text
    content: 'And kept not his testimonies:'
  '57':
  - type: text
    content: 'But turned back, and dealt unfaithfully like their fathers:'
  - type: text
    content: They were turned aside like a deceitful bow.
  '58':
  - type: text
    content: For they provoked him to anger with their high places,
  - type: text
    content: And moved him to jealousy with their graven images.
  '59':
  - type: text
    content: 'When God heard '
  - type: text
    content: this
  - type: text
    content: ', he was wroth,'
  - type: text
    content: 'And greatly abhorred Israel:'
  '6':
  - type: text
    content: 'That the generation to come might know '
  - type: text
    content: them
  - type: text
    content: ','
  - type: text
    content: Even
  - type: text
    content: ' the children '
  - type: text
    content: which
  - type: text
    content: ' should be born;'
  - type: text
    content: Who
  - type: text
    content: ' should arise'
  - type: text
    content: 'And declare '
  - type: text
    content: them
  - type: text
    content: ' to their children:'
  '60':
  - type: text
    content: So that he forsook the tabernacle of Shiloh,
  - type: text
    content: 'The tent '
  - type: text
    content: which
  - type: text
    content: ' he placed among men;'
  '61':
  - type: text
    content: And delivered his strength into captivity,
  - type: text
    content: And his glory into the enemy's hand.
  '62':
  - type: text
    content: He gave his people over also unto the sword;
  - type: text
    content: And was wroth with his inheritance.
  '63':
  - type: text
    content: The fire consumed their young men;
  - type: text
    content: And their maidens were not given to marriage.
  '64':
  - type: text
    content: Their priests fell by the sword;
  - type: text
    content: And their widows made no lamentation.
  '65':
  - type: text
    content: Then the Lord awaked as one out of sleep,
  - type: text
    content: And
  - type: text
    content: ' like a mighty man that shouteth by reason of wine.'
  '66':
  - type: text
    content: 'And he smote his enemies in the hinder parts:'
  - type: text
    content: He put them to a perpetual reproach.
  '67':
  - type: text
    content: Moreover he refused the tabernacle of Joseph,
  - type: text
    content: 'And chose not the tribe of Ephraim:'
  '68':
  - type: text
    content: But chose the tribe of Judah,
  - type: text
    content: The mount Zion which he loved.
  '69':
  - type: text
    content: 'And he built his sanctuary like high '
  - type: text
    content: palaces
  - type: text
    content: ','
  - type: text
    content: Like the earth which he hath established for ever.
  '7':
  - type: text
    content: That they might set their hope in God,
  - type: text
    content: 'And not forget the works of God, but keep his commandments:'
  '70':
  - type: text
    content: He chose David also his servant,
  - type: text
    content: 'And took him from the sheepfolds:'
  '71':
  - type: text
    content: From following the ewes great with young he brought him
  - type: text
    content: To feed Jacob his people, and Israel his inheritance.
  '72':
  - type: text
    content: So he fed them according to the integrity of his heart;
  - type: text
    content: And guided them by the skilfulness of his hands.
  '8':
  - type: text
    content: And might not be as their fathers, a stubborn and rebellious generation;
  - type: text
    content: 'A generation '
  - type: text
    content: that
  - type: text
    content: ' set not their heart aright, and whose spirit was not stedfast with God.'
  '9':
  - type: text
    content: 'The children of Ephraim, '
  - type: text
    content: being
  - type: text
    content: ' armed, '
  - type: text
    content: and
  - type: text
    content: ' carrying bows,'
  - type: text
    content: Turned back in the day of battle.
