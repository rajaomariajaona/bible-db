document_id: 2KI.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahab had seventy sons in Samaria. And Jehu wrote letters, and sent to Samaria, unto the rulers of Jezreel, to the elders, and to them that brought up Ahab''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: children
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Know now that there shall fall unto the earth nothing of the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake concerning the house of Ahab: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which he spake by his servant Elijah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jehu slew all that remained of the house of Ahab in Jezreel, and all his great men, and his kinsfolks, and his priests, until he left him none remaining.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he arose and departed, and came to Samaria. '
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' as he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at the shearing house in the way, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehu met with the brethren of Ahaziah king of Judah, and said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ye? And they answered, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the brethren of Ahaziah; and we go down to salute the children of the king and the children of the queen. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Take them alive. And they took them alive, and slew them at the pit of the shearing house, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' two and forty men; neither left he any of them.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was departed thence, he lighted on Jehonadab the son of Rechab '
    - type: usfm
      marker: add
      children:
      - type: text
        text: coming
    - type: text
      text: ' to meet him: and he saluted him, and said to him, Is thine heart right, as my heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thy heart? And Jehonadab answered, It is. If it be, give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' thine hand. And he gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' his hand; and he took him up to him into the chariot. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Come with me, and see my zeal for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. So they made him ride in his chariot. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he came to Samaria, he slew all that remained unto Ahab in Samaria, till he had destroyed him, according to the saying of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he spake to Elijah.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehu gathered all the people together, and said unto them, Ahab served Baal a little; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' Jehu shall serve him much. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore call unto me all the prophets of Baal, all his servants, and all his priests; let none be wanting: for I have a great sacrifice '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to do
    - type: text
      text: ' to Baal; whosoever shall be wanting, he shall not live. But Jehu did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in subtilty, to the intent that he might destroy the worshippers of Baal. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as soon as this letter cometh to you, seeing your master''s sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with you, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there are
    - type: text
      text: ' with you chariots and horses, a fenced city also, and armour; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehu said, Proclaim a solemn assembly for Baal. And they proclaimed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehu sent through all Israel: and all the worshippers of Baal came, so that there was not a man left that came not. And they came into the house of Baal; and the house of Baal was full from one end to another. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto him that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over the vestry, Bring forth vestments for all the worshippers of Baal. And he brought them forth vestments. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehu went, and Jehonadab the son of Rechab, into the house of Baal, and said unto the worshippers of Baal, Search, and look that there be here with you none of the servants of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', but the worshippers of Baal only. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they went in to offer sacrifices and burnt offerings, Jehu appointed fourscore men without, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' any of the men whom I have brought into your hands escape, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that letteth him go
    - type: text
      text: ', his life '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' for the life of him.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as soon as he had made an end of offering the burnt offering, that Jehu said to the guard and to the captains, Go in, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' slay them; let none come forth. And they smote them with the edge of the sword; and the guard and the captains cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out, and went to the city of the house of Baal. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought forth the images out of the house of Baal, and burned them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brake down the image of Baal, and brake down the house of Baal, and made it a draught house unto this day. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus Jehu destroyed Baal out of Israel.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the sins of Jeroboam the son of Nebat, who made Israel to sin, Jehu departed not from after them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to wit
    - type: text
      text: ', the golden calves that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Beth-el, and that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Dan. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'look even out the best and meetest of your master''s sons, and set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' on his father''s throne, and fight for your master''s house. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Jehu, Because thou hast done well in executing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' right in mine eyes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hast done unto the house of Ahab according to all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in mine heart, thy children of the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: generation
    - type: text
      text: ' shall sit on the throne of Israel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehu took no heed to walk in the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel with all his heart: for he departed not from the sins of Jeroboam, which made Israel to sin.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' began to cut Israel short: and Hazael smote them in all the coasts of Israel; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Jordan eastward, all the land of Gilead, the Gadites, and the Reubenites, and the Manassites, from Aroer, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the river Arnon, even Gilead and Bashan. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Jehu, and all that he did, and all his might, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehu slept with his fathers: and they buried him in Samaria. And Jehoahaz his son reigned in his stead. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the time that Jehu reigned over Israel in Samaria '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and eight years.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they were exceedingly afraid, and said, Behold, two kings stood not before him: how then shall we stand? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over the house, and he that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over the city, the elders also, and the bringers up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the children
    - type: text
      text: ', sent to Jehu, saying, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy servants, and will do all that thou shalt bid us; we will not make any king: do thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' good in thine eyes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he wrote a letter the second time to them, saying, If ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' mine, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' ye will hearken unto my voice, take ye the heads of the men your master''s sons, and come to me to Jezreel by to morrow this time. Now the king''s sons, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' seventy persons, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with the great men of the city, which brought them up. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when the letter came to them, that they took the king''s sons, and slew seventy persons, and put their heads in baskets, and sent him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to Jezreel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there came a messenger, and told him, saying, They have brought the heads of the king''s sons. And he said, Lay ye them in two heaps at the entering in of the gate until the morning. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the morning, that he went out, and stood, and said to all the people, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' righteous: behold, I conspired against my master, and slew him: but who slew all these? '
