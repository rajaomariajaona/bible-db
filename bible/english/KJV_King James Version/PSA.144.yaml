document_id: PSA.144,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my strength,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which teacheth my hands to war, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my fingers to fight:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is he
    - type: text
      text: ' that giveth salvation unto kings:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who delivereth David his servant from the hurtful sword.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rid me, and deliver me from the hand of strange children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whose mouth speaketh vanity, and their right hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a right hand of falsehood:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That our sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may be
    - type: text
      text: ' as plants grown up in their youth;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' our daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may be
    - type: text
      text: ' as corner stones, polished '
    - type: usfm
      marker: add
      children:
      - type: text
        text: after
    - type: text
      text: ' the similitude of a palace:'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' our garners '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may be
    - type: text
      text: ' full, affording all manner of store:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' our sheep may bring forth thousands and ten thousands in our streets:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' our oxen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may be
    - type: text
      text: ' strong to labour;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That there be
    - type: text
      text: ' no breaking in, nor going out; That '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' no complaining in our streets.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' people, that is in such a case:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yea
    - type: text
      text: ', happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' people, whose God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My goodness, and my fortress; My high tower, and my deliverer; My shield, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he
    - type: text
      text: ' in whom I trust;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who subdueth my people under me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' man, that thou takest knowledge of him!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Or
    - type: text
      text: ' the son of man, that thou makest account of him!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Man is like to vanity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as a shadow that passeth away.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bow thy heavens, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and come down:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Touch the mountains, and they shall smoke.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cast forth lightning, and scatter them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shoot out thine arrows, and destroy them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send thine hand from above;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rid me, and deliver me out of great waters, from the hand of strange children;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose mouth speaketh vanity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their right hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a right hand of falsehood.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing a new song unto thee, O God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Upon a psaltery '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' an instrument of ten strings will I sing praises unto thee.'
