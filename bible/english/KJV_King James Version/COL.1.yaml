verses:
  '1':
  - type: text
    content: 'Paul, an apostle of Jesus Christ by the will of God, and Timotheus '
  - type: text
    content: our
  - type: text
    content: ' brother, '
  '10':
  - type: text
    content: 'that ye might walk worthy of the Lord unto all pleasing, being fruitful in every good work, and increasing in the knowledge of God; '
  '11':
  - type: text
    content: 'strengthened with all might, according to his glorious power, unto all patience and longsuffering with joyfulness; '
  '12':
  - type: text
    content: 'giving thanks unto the Father, which hath made us meet to be partakers of the inheritance of the saints in light: '
  '13':
  - type: text
    content: 'who hath delivered us from the power of darkness, and hath translated '
  - type: text
    content: us
  - type: text
    content: ' into the kingdom of his dear Son: '
  '14':
  - type: text
    content: 'in whom we have redemption through his blood, '
  - type: text
    content: even
  - type: text
    content: ' the forgiveness of sins:'
  - type: heading
    content: The Supremacy of Christ
  '15':
  - type: text
    content: 'Who is the image of the invisible God, the firstborn of every creature: '
  '16':
  - type: text
    content: 'for by him were all things created, that are in heaven, and that are in earth, visible and invisible, whether '
  - type: text
    content: they be
  - type: text
    content: ' thrones, or dominions, or principalities, or powers: all things were created by him, and for him: '
  '17':
  - type: text
    content: 'and he is before all things, and by him all things consist. '
  '18':
  - type: text
    content: 'And he is the head of the body, the church: who is the beginning, the firstborn from the dead; that in all things he might have the preeminence. '
  '19':
  - type: text
    content: 'For it pleased '
  - type: text
    content: the Father
  - type: text
    content: ' that in him should all fulness dwell; '
  '2':
  - type: text
    content: 'to the saints and faithful brethren in Christ which are at Colosse: Grace '
  - type: text
    content: be
  - type: text
    content: ' unto you, and peace, from God our Father and the Lord Jesus Christ.'
  '20':
  - type: text
    content: 'and, having made peace through the blood of his cross, by him to reconcile all things unto himself; by him, '
  - type: text
    content: I say
  - type: text
    content: ', whether '
  - type: text
    content: they be
  - type: text
    content: ' things in earth, or things in heaven.'
  '21':
  - type: text
    content: 'And you, that were sometime alienated and enemies in '
  - type: text
    content: your
  - type: text
    content: ' mind by wicked works, yet now hath he reconciled '
  '22':
  - type: text
    content: 'in the body of his flesh through death, to present you holy and unblameable and unreproveable in his sight: '
  '23':
  - type: text
    content: 'if ye continue in the faith grounded and settled, and '
  - type: text
    content: be
  - type: text
    content: ' not moved away from the hope of the gospel, which ye have heard, '
  - type: text
    content: and
  - type: text
    content: ' which was preached to every creature which is under heaven; whereof I Paul am made a minister; '
  '24':
  - type: text
    content: 'who now rejoice in my sufferings for you, and fill up that which is behind of the afflictions of Christ in my flesh for his body''s sake, which is the church: '
  '25':
  - type: text
    content: 'whereof I am made a minister, according to the dispensation of God which is given to me for you, to fulfil the word of God; '
  '26':
  - type: text
    content: even
  - type: text
    content: ' the mystery which hath been hid from ages and from generations, but now is made manifest to his saints: '
  '27':
  - type: text
    content: 'to whom God would make known what '
  - type: text
    content: is
  - type: text
    content: ' the riches of the glory of this mystery among the Gentiles; which is Christ in you, the hope of glory: '
  '28':
  - type: text
    content: 'whom we preach, warning every man, and teaching every man in all wisdom; that we may present every man perfect in Christ Jesus: '
  '29':
  - type: text
    content: whereunto I also labour, striving according to his working, which worketh in me mightily.
  '3':
  - type: text
    content: 'We give thanks to God and the Father of our Lord Jesus Christ, praying always for you, '
  '4':
  - type: text
    content: 'since we heard of your faith in Christ Jesus, and of the love '
  - type: text
    content: which ye have
  - type: text
    content: ' to all the saints, '
  '5':
  - type: text
    content: 'for the hope which is laid up for you in heaven, whereof ye heard before in the word of the truth of the gospel; '
  '6':
  - type: text
    content: 'which is come unto you, as '
  - type: text
    content: it is
  - type: text
    content: ' in all the world; and bringeth forth fruit, as '
  - type: text
    content: it doth
  - type: text
    content: ' also in you, since the day ye heard '
  - type: text
    content: of it
  - type: text
    content: ', and knew the grace of God in truth: '
  '7':
  - type: text
    content: 'as ye also learned of Epaphras our dear fellowservant, who is for you a faithful minister of Christ; '
  '8':
  - type: text
    content: who also declared unto us your love in the Spirit.
  '9':
  - type: text
    content: 'For this cause we also, since the day we heard '
  - type: text
    content: it
  - type: text
    content: ', do not cease to pray for you, and to desire that ye might be filled with the knowledge of his will in all wisdom and spiritual understanding; '
