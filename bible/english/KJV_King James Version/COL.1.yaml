document_id: COL.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, an apostle of Jesus Christ by the will of God, and Timotheus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' brother, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'to the saints and faithful brethren in Christ which are at Colosse: Grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto you, and peace, from God our Father and the Lord Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'We give thanks to God and the Father of our Lord Jesus Christ, praying always for you, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'since we heard of your faith in Christ Jesus, and of the love '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which ye have
  - type: text
    text: ' to all the saints, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'for the hope which is laid up for you in heaven, whereof ye heard before in the word of the truth of the gospel; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'which is come unto you, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' in all the world; and bringeth forth fruit, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it doth
  - type: text
    text: ' also in you, since the day ye heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', and knew the grace of God in truth: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'as ye also learned of Epaphras our dear fellowservant, who is for you a faithful minister of Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: who also declared unto us your love in the Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For this cause we also, since the day we heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', do not cease to pray for you, and to desire that ye might be filled with the knowledge of his will in all wisdom and spiritual understanding; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that ye might walk worthy of the Lord unto all pleasing, being fruitful in every good work, and increasing in the knowledge of God; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'strengthened with all might, according to his glorious power, unto all patience and longsuffering with joyfulness; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'giving thanks unto the Father, which hath made us meet to be partakers of the inheritance of the saints in light: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'who hath delivered us from the power of darkness, and hath translated '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' into the kingdom of his dear Son: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'in whom we have redemption through his blood, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the forgiveness of sins:'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Supremacy of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Who is the image of the invisible God, the firstborn of every creature: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'for by him were all things created, that are in heaven, and that are in earth, visible and invisible, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' thrones, or dominions, or principalities, or powers: all things were created by him, and for him: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and he is before all things, and by him all things consist. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he is the head of the body, the church: who is the beginning, the firstborn from the dead; that in all things he might have the preeminence. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For it pleased '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the Father
  - type: text
    text: ' that in him should all fulness dwell; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and, having made peace through the blood of his cross, by him to reconcile all things unto himself; by him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' things in earth, or things in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And you, that were sometime alienated and enemies in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' mind by wicked works, yet now hath he reconciled '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'in the body of his flesh through death, to present you holy and unblameable and unreproveable in his sight: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'if ye continue in the faith grounded and settled, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' not moved away from the hope of the gospel, which ye have heard, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' which was preached to every creature which is under heaven; whereof I Paul am made a minister; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'who now rejoice in my sufferings for you, and fill up that which is behind of the afflictions of Christ in my flesh for his body''s sake, which is the church: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'whereof I am made a minister, according to the dispensation of God which is given to me for you, to fulfil the word of God; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the mystery which hath been hid from ages and from generations, but now is made manifest to his saints: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'to whom God would make known what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the riches of the glory of this mystery among the Gentiles; which is Christ in you, the hope of glory: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'whom we preach, warning every man, and teaching every man in all wisdom; that we may present every man perfect in Christ Jesus: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: whereunto I also labour, striving according to his working, which worketh in me mightily.
