document_id: NUM.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Aaron and Moses in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake with Moses in mount Sinai. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt appoint Aaron and his sons, and they shall wait on their priest''s office: and the stranger that cometh nigh shall be put to death.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I, behold, I have taken the Levites from among the children of Israel instead of all the firstborn that openeth the matrix among the children of Israel: therefore the Levites shall be mine; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because all the firstborn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' mine; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' on the day that I smote all the firstborn in the land of Egypt I hallowed unto me all the firstborn in Israel, both man and beast: mine shall they be: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses in the wilderness of Sinai, saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Number the children of Levi after the house of their fathers, by their families: every male from a month old and upward shalt thou number them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses numbered them according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', as he was commanded. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these were the sons of Levi by their names; Gershon, and Kohath, and Merari. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the sons of Gershon by their families; Libni, and Shimei. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Kohath by their families; Amram, and Izehar, Hebron, and Uzziel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the sons of Aaron; Nadab the firstborn, and Abihu, Eleazar, and Ithamar. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Merari by their families; Mahli, and Mushi. These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the families of the Levites according to the house of their fathers.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Gershon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the family of the Libnites, and the family of the Shimites: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the families of the Gershonites. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those that were numbered of them, according to the number of all the males, from a month old and upward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' those that were numbered of them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' seven thousand and five hundred. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The families of the Gershonites shall pitch behind the tabernacle westward. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the chief of the house of the father of the Gershonites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' Eliasaph the son of Lael. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the charge of the sons of Gershon in the tabernacle of the congregation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the tabernacle, and the tent, the covering thereof, and the hanging for the door of the tabernacle of the congregation, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the hangings of the court, and the curtain for the door of the court, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the tabernacle, and by the altar round about, and the cords of it for all the service thereof.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of Kohath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the family of the Amramites, and the family of the Izeharites, and the family of the Hebronites, and the family of the Uzzielites: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the families of the Kohathites. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the number of all the males, from a month old and upward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' eight thousand and six hundred, keeping the charge of the sanctuary. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The families of the sons of Kohath shall pitch on the side of the tabernacle southward. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the sons of Aaron, the priests which were anointed, whom he consecrated to minister in the priest''s office. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the chief of the house of the father of the families of the Kohathites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' Elizaphan the son of Uzziel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their charge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the ark, and the table, and the candlestick, and the altars, and the vessels of the sanctuary wherewith they minister, and the hanging, and all the service thereof. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Eleazar the son of Aaron the priest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' chief over the chief of the Levites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and have
    - type: text
      text: ' the oversight of them that keep the charge of the sanctuary.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Merari '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the family of the Mahlites, and the family of the Mushites: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the families of Merari. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those that were numbered of them, according to the number of all the males, from a month old and upward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' six thousand and two hundred. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the chief of the house of the father of the families of Merari '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Zuriel the son of Abihail: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' shall pitch on the side of the tabernacle northward. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: under
    - type: text
      text: ' the custody and charge of the sons of Merari '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the boards of the tabernacle, and the bars thereof, and the pillars thereof, and the sockets thereof, and all the vessels thereof, and all that serveth thereto, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the pillars of the court round about, and their sockets, and their pins, and their cords.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But those that encamp before the tabernacle toward the east, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' before the tabernacle of the congregation eastward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' Moses, and Aaron and his sons, keeping the charge of the sanctuary for the charge of the children of Israel; and the stranger that cometh nigh shall be put to death. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All that were numbered of the Levites, which Moses and Aaron numbered at the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', throughout their families, all the males from a month old and upward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty and two thousand.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Nadab and Abihu died before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', when they offered strange fire before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in the wilderness of Sinai, and they had no children: and Eleazar and Ithamar ministered in the priest''s office in the sight of Aaron their father.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Number all the firstborn of the males of the children of Israel from a month old and upward, and take the number of their names. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt take the Levites for me (I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ') instead of all the firstborn among the children of Israel; and the cattle of the Levites instead of all the firstlings among the cattle of the children of Israel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses numbered, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded him, all the firstborn among the children of Israel. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all the firstborn males by the number of names, from a month old and upward, of those that were numbered of them, were twenty and two thousand two hundred and threescore and thirteen.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take the Levites instead of all the firstborn among the children of Israel, and the cattle of the Levites instead of their cattle; and the Levites shall be mine: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for those that are to be redeemed of the two hundred and threescore and thirteen of the firstborn of the children of Israel, which are more than the Levites; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shalt even take five shekels apiece by the poll, after the shekel of the sanctuary shalt thou take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'them:'
    - type: text
      text: ' (the shekel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' twenty gerahs:) '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and thou shalt give the money, wherewith the odd number of them is to be redeemed, unto Aaron and to his sons. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses took the redemption money of them that were over and above them that were redeemed by the Levites: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of the firstborn of the children of Israel took he the money; a thousand three hundred and threescore and five '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ', after the shekel of the sanctuary: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Moses gave the money of them that were redeemed unto Aaron and to his sons, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring the tribe of Levi near, and present them before Aaron the priest, that they may minister unto him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall keep his charge, and the charge of the whole congregation before the tabernacle of the congregation, to do the service of the tabernacle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall keep all the instruments of the tabernacle of the congregation, and the charge of the children of Israel, to do the service of the tabernacle. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt give the Levites unto Aaron and to his sons: they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wholly given unto him out of the children of Israel. '
