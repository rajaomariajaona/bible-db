      - type: text
        text: so
    - type: text
      text: ' it was, when Israel had sown, that the Midianites came up, and the Amalekites, and the children of the east, even they came up against them; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men of the city said unto Joash, Bring out thy son, that he may die: because he hath cast down the altar of Baal, and because he hath cut down the grove that '
    - type: usfm
