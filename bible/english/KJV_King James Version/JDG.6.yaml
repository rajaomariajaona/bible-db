    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, I brought you up from Egypt, and brought you forth out of the house of bondage; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I delivered you out of the hand of the Egyptians, and out of the hand of all that oppressed you, and drave them out from before you, and gave you their land; '
