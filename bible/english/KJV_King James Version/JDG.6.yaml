  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And there came an angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and sat under an oak which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Ophrah, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' unto Joash the Abi-ezrite: and his son Gideon threshed wheat by the winepress, to hide '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' from the Midianites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared unto him, and said unto him, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with thee, thou mighty man of valour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Gideon said unto him, Oh my Lord, if the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be with us, why then is all this befallen us? and where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' all his miracles which our fathers told us of, saying, Did not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bring us up from Egypt? but now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath forsaken us, and delivered us into the hands of the Midianites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' looked upon him, and said, Go in this thy might, and thou shalt save Israel from the hand of the Midianites: have not I sent thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said unto him, Oh my Lord, wherewith shall I save Israel? behold, my family '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' poor in Manasseh, and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the least in my father''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Surely I will be with thee, and thou shalt smite the Midianites as one man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said unto him, If now I have found grace in thy sight, then shew me a sign that thou talkest with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Depart not hence, I pray thee, until I come unto thee, and bring forth my present, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' before thee. And he said, I will tarry until thou come again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Gideon went in, and made ready a kid, and unleavened cakes of an ephah of flour: the flesh he put in a basket, and he put the broth in a pot, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out unto him under the oak, and presented '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the angel of God said unto him, Take the flesh and the unleavened cakes, and lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon this rock, and pour out the broth. And he did so. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' put forth the end of the staff that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in his hand, and touched the flesh and the unleavened cakes; and there rose up fire out of the rock, and consumed the flesh and the unleavened cakes. Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' departed out of his sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when Gideon perceived that he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Gideon said, Alas, O Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '! for because I have seen an angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' face to face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto thee; fear not: thou shalt not die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Gideon built an altar there unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and called it Jehovah-shalom: unto this day it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' yet in Ophrah of the Abi-ezrites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it came to pass the same night, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Take thy father''s young bullock, even the second bullock of seven years old, and throw down the altar of Baal that thy father hath, and cut down the grove that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and build an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God upon the top of this rock, in the ordered place, and take the second bullock, and offer a burnt sacrifice with the wood of the grove which thou shalt cut down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Gideon took ten men of his servants, and did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had said unto him: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' it was, because he feared his father''s household, and the men of the city, that he could not do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' by day, that he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' by night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And when the men of the city arose early in the morning, behold, the altar of Baal was cast down, and the grove was cut down that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by it, and the second bullock was offered upon the altar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was
  - type: text
    text: ' built. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And they said one to another, Who hath done this thing? And when they enquired and asked, they said, Gideon the son of Joash hath done this thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then the men of the city said unto Joash, Bring out thy son, that he may die: because he hath cast down the altar of Baal, and because he hath cut down the grove that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Joash said unto all that stood against him, Will ye plead for Baal? will ye save him? he that will plead for him, let him be put to death whilst '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is yet
  - type: text
    text: ' morning: if he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a god, let him plead for himself, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' hath cast down his altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Therefore on that day he called him Jerubbaal, saying, Let Baal plead against him, because he hath thrown down his altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then all the Midianites and the Amalekites and the children of the east were gathered together, and went over, and pitched in the valley of Jezreel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came upon Gideon, and he blew a trumpet; and Abi-ezer was gathered after him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And he sent messengers throughout all Manasseh; who also was gathered after him: and he sent messengers unto Asher, and unto Zebulun, and unto Naphtali; and they came up to meet them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Gideon said unto God, If thou wilt save Israel by mine hand, as thou hast said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Behold, I will put a fleece of wool in the floor; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' if the dew be on the fleece only, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' dry upon all the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: beside
  - type: text
    text: ', then shall I know that thou wilt save Israel by mine hand, as thou hast said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And it was so: for he rose up early on the morrow, and thrust the fleece together, and wringed the dew out of the fleece, a bowl full of water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And Gideon said unto God, Let not thine anger be hot against me, and I will speak but this once: let me prove, I pray thee, but this once with the fleece; let it now be dry only upon the fleece, and upon all the ground let there be dew. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And God did so that night: for it was dry upon the fleece only, and there was dew on all the ground.'
