  - type: text
    text: 'And the hand of Midian prevailed against Israel: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' because of the Midianites the children of Israel made them the dens which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
