    children:
    - type: text
      text: 'And it came to pass, when the children of Israel cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' because of the Midianites, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
