  '1':
  - type: heading
    content: The Trial of the High Priest
  - type: text
    content: 'And he shewed me Joshua the high priest standing before the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ', and Satan standing at his right hand to resist him. '
  '10':
  - type: text
    content: 'In that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, shall ye call every man his neighbour under the vine and under the fig tree.'
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Satan, The '
  - type: text
    content: LORD
  - type: text
    content: ' rebuke thee, O Satan; even the '
  - type: text
    content: LORD
  - type: text
    content: ' that hath chosen Jerusalem rebuke thee: '
  - type: text
    content: is
  - type: text
    content: ' not this a brand plucked out of the fire? '
  '3':
  - type: text
    content: 'Now Joshua was clothed with filthy garments, and stood before the angel. '
  '4':
  - type: text
    content: 'And he answered and spake unto those that stood before him, saying, Take away the filthy garments from him. And unto him he said, Behold, I have caused thine iniquity to pass from thee, and I will clothe thee with change of raiment. '
  '5':
  - type: text
    content: 'And I said, Let them set a fair mitre upon his head. So they set a fair mitre upon his head, and clothed him with garments. And the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' stood by.'
  '6':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' protested unto Joshua, saying, '
  '7':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; If thou wilt walk in my ways, and if thou wilt keep my charge, then thou shalt also judge my house, and shalt also keep my courts, and I will give thee places to walk among these that stand by. '
  '8':
  - type: text
    content: 'Hear now, O Joshua the high priest, thou, and thy fellows that sit before thee: for they '
  - type: text
    content: are
  - type: text
    content: ' men wondered at: for, behold, I will bring forth my servant the BRANCH. '
  '9':
  - type: text
    content: 'For behold the stone that I have laid before Joshua; upon one stone '
  - type: text
    content: shall be
  - type: text
    content: ' seven eyes: behold, I will engrave the graving thereof, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and I will remove the iniquity of that land in one day. '
