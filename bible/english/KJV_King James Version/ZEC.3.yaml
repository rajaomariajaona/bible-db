document_id: ZEC.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Trial of the High Priest
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shewed me Joshua the high priest standing before the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and Satan standing at his right hand to resist him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, shall ye call every man his neighbour under the vine and under the fig tree.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' rebuke thee, O Satan; even the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that hath chosen Jerusalem rebuke thee: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not this a brand plucked out of the fire? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joshua was clothed with filthy garments, and stood before the angel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered and spake unto those that stood before him, saying, Take away the filthy garments from him. And unto him he said, Behold, I have caused thine iniquity to pass from thee, and I will clothe thee with change of raiment. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I said, Let them set a fair mitre upon his head. So they set a fair mitre upon his head, and clothed him with garments. And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' stood by.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' protested unto Joshua, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; If thou wilt walk in my ways, and if thou wilt keep my charge, then thou shalt also judge my house, and shalt also keep my courts, and I will give thee places to walk among these that stand by. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear now, O Joshua the high priest, thou, and thy fellows that sit before thee: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' men wondered at: for, behold, I will bring forth my servant the BRANCH. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For behold the stone that I have laid before Joshua; upon one stone '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' seven eyes: behold, I will engrave the graving thereof, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and I will remove the iniquity of that land in one day. '
