document_id: HAB.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A prayer of Habakkuk the prophet upon Shigionoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I have heard thy speech, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' was afraid:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', revive thy work in the midst of the years,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the midst of the years make known;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In wrath remember mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: God came from Teman,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the Holy One from mount Paran. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His glory covered the heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the earth was full of his praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' brightness was as the light;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He had horns '
  - type: usfm
    marker: add
    children:
    - type: text
      text: coming
  - type: text
    text: ' out of his hand:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the hiding of his power.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Before him went the pestilence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And burning coals went forth at his feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He stood, and measured the earth:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He beheld, and drove asunder the nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the everlasting mountains were scattered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The perpetual hills did bow:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His ways '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' everlasting.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I saw the tents of Cushan in affliction:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the curtains of the land of Midian did tremble.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Was the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' displeased against the rivers?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Was
  - type: text
    text: ' thine anger against the rivers?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Was
  - type: text
    text: ' thy wrath against the sea,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That thou didst ride upon thine horses
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' thy chariots of salvation?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Thy bow was made quite naked,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: According
  - type: text
    text: ' to the oaths of the tribes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even thy
  - type: text
    text: ' word. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou didst cleave the earth with rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The mountains saw thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they trembled:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The overflowing of the water passed by:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The deep uttered his voice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' lifted up his hands on high.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The sun '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' moon stood still in their habitation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the light of thine arrows they went,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' at the shining of thy glittering spear.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thou didst march through the land in indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou didst thresh the heathen in anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Thou wentest forth for the salvation of thy people,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' for salvation with thine anointed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou woundedst the head out of the house of the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'By discovering the foundation unto the neck. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou didst strike through with his staves the head of his villages:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They came out as a whirlwind to scatter me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their rejoicing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' as to devour the poor secretly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Thou didst walk through the sea with thine horses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Through
  - type: text
    text: ' the heap of great waters.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When I heard, my belly trembled;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My lips quivered at the voice:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rottenness entered into my bones, and I trembled in myself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That I might rest in the day of trouble:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he cometh up unto the people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will invade them with his troops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Although the fig tree shall not blossom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' fruit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in the vines;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The labour of the olive shall fail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the fields shall yield no meat;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The flock shall be cut off from the fold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' no herd in the stalls:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yet I will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will joy in the God of my salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he will make my feet like hinds'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: feet
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he will make me to walk upon mine high places.
- type: usfm
  marker: p
  children:
  - type: text
    text: To the chief singer on my stringed instruments.
