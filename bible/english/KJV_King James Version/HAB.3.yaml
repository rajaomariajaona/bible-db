document_id: HAB.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His Prayer
  - type: text
    content: A prayer of Habakkuk the prophet upon Shigionoth.
  '10':
  - type: text
    content: 'The mountains saw thee, '
  - type: text
    content: and
  - type: text
    content: ' they trembled:'
  - type: text
    content: 'The overflowing of the water passed by:'
  - type: text
    content: The deep uttered his voice,
  - type: text
    content: And
  - type: text
    content: ' lifted up his hands on high.'
  '11':
  - type: text
    content: 'The sun '
  - type: text
    content: and
  - type: text
    content: ' moon stood still in their habitation:'
  - type: text
    content: At the light of thine arrows they went,
  - type: text
    content: And
  - type: text
    content: ' at the shining of thy glittering spear.'
  '12':
  - type: text
    content: Thou didst march through the land in indignation,
  - type: text
    content: Thou didst thresh the heathen in anger.
  '13':
  - type: text
    content: Thou wentest forth for the salvation of thy people,
  - type: text
    content: Even
  - type: text
    content: ' for salvation with thine anointed;'
  - type: text
    content: Thou woundedst the head out of the house of the wicked,
  - type: text
    content: 'By discovering the foundation unto the neck. '
  - type: text
    content: Selah.
  '14':
  - type: text
    content: 'Thou didst strike through with his staves the head of his villages:'
  - type: text
    content: 'They came out as a whirlwind to scatter me:'
  - type: text
    content: 'Their rejoicing '
  - type: text
    content: was
  - type: text
    content: ' as to devour the poor secretly.'
  '15':
  - type: text
    content: Thou didst walk through the sea with thine horses,
  - type: text
    content: Through
  - type: text
    content: ' the heap of great waters.'
  '16':
  - type: text
    content: When I heard, my belly trembled;
  - type: text
    content: 'My lips quivered at the voice:'
  - type: text
    content: Rottenness entered into my bones, and I trembled in myself,
  - type: text
    content: 'That I might rest in the day of trouble:'
  - type: text
    content: When he cometh up unto the people,
  - type: text
    content: He will invade them with his troops.
  '17':
  - type: text
    content: Although the fig tree shall not blossom,
  - type: text
    content: 'Neither '
  - type: text
    content: shall
  - type: text
    content: ' fruit '
  - type: text
    content: be
  - type: text
    content: ' in the vines;'
  - type: text
    content: The labour of the olive shall fail,
  - type: text
    content: And the fields shall yield no meat;
  - type: text
    content: The flock shall be cut off from the fold,
  - type: text
    content: 'And '
  - type: text
    content: there shall be
  - type: text
    content: ' no herd in the stalls:'
  '18':
  - type: text
    content: 'Yet I will rejoice in the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: I will joy in the God of my salvation.
  '19':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' God '
  - type: text
    content: is
  - type: text
    content: ' my strength,'
  - type: text
    content: 'And he will make my feet like hinds'' '
  - type: text
    content: feet
  - type: text
    content: ','
  - type: text
    content: And he will make me to walk upon mine high places.
  - type: text
    content: To the chief singer on my stringed instruments.
  '2':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', I have heard thy speech, '
  - type: text
    content: and
  - type: text
    content: ' was afraid:'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', revive thy work in the midst of the years,'
  - type: text
    content: In the midst of the years make known;
  - type: text
    content: In wrath remember mercy.
  '3':
  - type: text
    content: God came from Teman,
  - type: text
    content: 'And the Holy One from mount Paran. '
  - type: text
    content: Selah.
  - type: text
    content: His glory covered the heavens,
  - type: text
    content: And the earth was full of his praise.
  '4':
  - type: text
    content: 'And '
  - type: text
    content: his
  - type: text
    content: ' brightness was as the light;'
  - type: text
    content: 'He had horns '
  - type: text
    content: coming
  - type: text
    content: ' out of his hand:'
  - type: text
    content: 'And there '
  - type: text
    content: was
  - type: text
    content: ' the hiding of his power.'
  '5':
  - type: text
    content: Before him went the pestilence,
  - type: text
    content: And burning coals went forth at his feet.
  '6':
  - type: text
    content: 'He stood, and measured the earth:'
  - type: text
    content: He beheld, and drove asunder the nations;
  - type: text
    content: And the everlasting mountains were scattered,
  - type: text
    content: 'The perpetual hills did bow:'
  - type: text
    content: 'His ways '
  - type: text
    content: are
  - type: text
    content: ' everlasting.'
  '7':
  - type: text
    content: 'I saw the tents of Cushan in affliction:'
  - type: text
    content: And
  - type: text
    content: ' the curtains of the land of Midian did tremble.'
  '8':
  - type: text
    content: 'Was the '
  - type: text
    content: LORD
  - type: text
    content: ' displeased against the rivers?'
  - type: text
    content: Was
  - type: text
    content: ' thine anger against the rivers?'
  - type: text
    content: Was
  - type: text
    content: ' thy wrath against the sea,'
  - type: text
    content: That thou didst ride upon thine horses
  - type: text
    content: And
  - type: text
    content: ' thy chariots of salvation?'
  '9':
  - type: text
    content: Thy bow was made quite naked,
  - type: text
    content: According
  - type: text
    content: ' to the oaths of the tribes, '
  - type: text
    content: even thy
  - type: text
    content: ' word. '
  - type: text
    content: Selah.
  - type: text
    content: Thou didst cleave the earth with rivers.
