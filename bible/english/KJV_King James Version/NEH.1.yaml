document_id: NEH.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The words of Nehemiah the son of Hachaliah. And it came to pass in the month Chisleu, in the twentieth year, as I was in Shushan the palace, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy servants and thy people, whom thou hast redeemed by thy great power, and by thy strong hand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'O Lord, I beseech thee, let now thine ear be attentive to the prayer of thy servant, and to the prayer of thy servants, who desire to fear thy name: and prosper, I pray thee, thy servant this day, and grant him mercy in the sight of this man. For I was the king''s cupbearer.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'that Hanani, one of my brethren, came, he and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' men of Judah; and I asked them concerning the Jews that had escaped, which were left of the captivity, and concerning Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they said unto me, The remnant that are left of the captivity there in the province '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in great affliction and reproach: the wall of Jerusalem also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' broken down, and the gates thereof are burned with fire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And it came to pass, when I heard these words, that I sat down and wept, and mourned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' days, and fasted, and prayed before the God of heaven, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and said, I beseech thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of heaven, the great and terrible God, that keepeth covenant and mercy for them that love him and observe his commandments: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'let thine ear now be attentive, and thine eyes open, that thou mayest hear the prayer of thy servant, which I pray before thee now, day and night, for the children of Israel thy servants, and confess the sins of the children of Israel, which we have sinned against thee: both I and my father''s house have sinned. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'We have dealt very corruptly against thee, and have not kept the commandments, nor the statutes, nor the judgments, which thou commandedst thy servant Moses. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Remember, I beseech thee, the word that thou commandedst thy servant Moses, saying, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' ye transgress, I will scatter you abroad among the nations: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' ye turn unto me, and keep my commandments, and do them; though there were of you cast out unto the uttermost part of the heaven, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' will I gather them from thence, and will bring them unto the place that I have chosen to set my name there. '
