document_id: NEH.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The words of Nehemiah the son of Hachaliah. And it came to pass in the month Chisleu, in the twentieth year, as I was in Shushan the palace, '
  '10':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' thy servants and thy people, whom thou hast redeemed by thy great power, and by thy strong hand. '
  '11':
  - type: text
    content: 'O Lord, I beseech thee, let now thine ear be attentive to the prayer of thy servant, and to the prayer of thy servants, who desire to fear thy name: and prosper, I pray thee, thy servant this day, and grant him mercy in the sight of this man. For I was the king''s cupbearer.'
  '2':
  - type: text
    content: 'that Hanani, one of my brethren, came, he and '
  - type: text
    content: certain
  - type: text
    content: ' men of Judah; and I asked them concerning the Jews that had escaped, which were left of the captivity, and concerning Jerusalem. '
  '3':
  - type: text
    content: 'And they said unto me, The remnant that are left of the captivity there in the province '
  - type: text
    content: are
  - type: text
    content: ' in great affliction and reproach: the wall of Jerusalem also '
  - type: text
    content: is
  - type: text
    content: ' broken down, and the gates thereof are burned with fire.'
  '4':
  - type: text
    content: 'And it came to pass, when I heard these words, that I sat down and wept, and mourned '
  - type: text
    content: certain
  - type: text
    content: ' days, and fasted, and prayed before the God of heaven, '
  '5':
  - type: text
    content: 'and said, I beseech thee, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of heaven, the great and terrible God, that keepeth covenant and mercy for them that love him and observe his commandments: '
  '6':
  - type: text
    content: 'let thine ear now be attentive, and thine eyes open, that thou mayest hear the prayer of thy servant, which I pray before thee now, day and night, for the children of Israel thy servants, and confess the sins of the children of Israel, which we have sinned against thee: both I and my father''s house have sinned. '
  '7':
  - type: text
    content: 'We have dealt very corruptly against thee, and have not kept the commandments, nor the statutes, nor the judgments, which thou commandedst thy servant Moses. '
  '8':
  - type: text
    content: 'Remember, I beseech thee, the word that thou commandedst thy servant Moses, saying, '
  - type: text
    content: If
  - type: text
    content: ' ye transgress, I will scatter you abroad among the nations: '
  '9':
  - type: text
    content: 'but '
  - type: text
    content: if
  - type: text
    content: ' ye turn unto me, and keep my commandments, and do them; though there were of you cast out unto the uttermost part of the heaven, '
  - type: text
    content: yet
  - type: text
    content: ' will I gather them from thence, and will bring them unto the place that I have chosen to set my name there. '
