verses:
  '1':
  - type: heading
    content: Zerubbabel's Company
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the children of the province that went up out of the captivity, of those which had been carried away, whom Nebuchadnezzar the king of Babylon had carried away unto Babylon, and came again unto Jerusalem and Judah, every one unto his city; '
  '10':
  - type: text
    content: 'The children of Bani, six hundred forty and two. '
  '11':
  - type: text
    content: 'The children of Bebai, six hundred twenty and three. '
  '12':
  - type: text
    content: 'The children of Azgad, a thousand two hundred twenty and two. '
  '13':
  - type: text
    content: 'The children of Adonikam, six hundred sixty and six. '
  '14':
  - type: text
    content: 'The children of Bigvai, two thousand fifty and six. '
  '15':
  - type: text
    content: 'The children of Adin, four hundred fifty and four. '
  '16':
  - type: text
    content: 'The children of Ater of Hezekiah, ninety and eight. '
  '17':
  - type: text
    content: 'The children of Bezai, three hundred twenty and three. '
  '18':
  - type: text
    content: 'The children of Jorah, an hundred and twelve. '
  '19':
  - type: text
    content: 'The children of Hashum, two hundred twenty and three. '
  '2':
  - type: text
    content: 'which came with Zerubbabel: Jeshua, Nehemiah, Seraiah, Reelaiah, Mordecai, Bilshan, Mizpar, Bigvai, Rehum, Baanah.'
  - type: text
    content: 'The number of the men of the people of Israel: '
  '20':
  - type: text
    content: 'The children of Gibbar, ninety and five. '
  '21':
  - type: text
    content: 'The children of Beth-lehem, an hundred twenty and three. '
  '22':
  - type: text
    content: 'The men of Netophah, fifty and six. '
  '23':
  - type: text
    content: 'The men of Anathoth, an hundred twenty and eight. '
  '24':
  - type: text
    content: 'The children of Azmaveth, forty and two. '
  '25':
  - type: text
    content: 'The children of Kirjath-arim, Chephirah, and Beeroth, seven hundred and forty and three. '
  '26':
  - type: text
    content: 'The children of Ramah and Gaba, six hundred twenty and one. '
  '27':
  - type: text
    content: 'The men of Michmas, an hundred twenty and two. '
  '28':
  - type: text
    content: 'The men of Beth-el and Ai, two hundred twenty and three. '
  '29':
  - type: text
    content: 'The children of Nebo, fifty and two. '
  '3':
  - type: text
    content: 'the children of Parosh, two thousand an hundred seventy and two. '
  '30':
  - type: text
    content: 'The children of Magbish, an hundred fifty and six. '
  '31':
  - type: text
    content: 'The children of the other Elam, a thousand two hundred fifty and four. '
  '32':
  - type: text
    content: 'The children of Harim, three hundred and twenty. '
  '33':
  - type: text
    content: 'The children of Lod, Hadid, and Ono, seven hundred twenty and five. '
  '34':
  - type: text
    content: 'The children of Jericho, three hundred forty and five. '
  '35':
  - type: text
    content: The children of Senaah, three thousand and six hundred and thirty.
  '36':
  - type: text
    content: 'The priests: the children of Jedaiah, of the house of Jeshua, nine hundred seventy and three. '
  '37':
  - type: text
    content: 'The children of Immer, a thousand fifty and two. '
  '38':
  - type: text
    content: 'The children of Pashur, a thousand two hundred forty and seven. '
  '39':
  - type: text
    content: The children of Harim, a thousand and seventeen.
  '4':
  - type: text
    content: 'The children of Shephatiah, three hundred seventy and two. '
  '40':
  - type: text
    content: 'The Levites: the children of Jeshua and Kadmiel, of the children of Hodaviah, seventy and four. '
  '41':
  - type: text
    content: 'The singers: the children of Asaph, an hundred twenty and eight. '
  '42':
  - type: text
    content: 'The children of the porters: the children of Shallum, the children of Ater, the children of Talmon, the children of Akkub, the children of Hatita, the children of Shobai, '
  - type: text
    content: in
  - type: text
    content: ' all an hundred thirty and nine.'
  '43':
  - type: text
    content: 'The Nethinims: the children of Ziha, the children of Hasupha, the children of Tabbaoth, '
  '44':
  - type: text
    content: 'the children of Keros, the children of Siaha, the children of Padon, '
  '45':
  - type: text
    content: 'the children of Lebanah, the children of Hagabah, the children of Akkub, '
  '46':
  - type: text
    content: 'the children of Hagab, the children of Shalmai, the children of Hanan, '
  '47':
  - type: text
    content: 'the children of Giddel, the children of Gahar, the children of Reaiah, '
  '48':
  - type: text
    content: 'the children of Rezin, the children of Nekoda, the children of Gazzam, '
  '49':
  - type: text
    content: 'the children of Uzza, the children of Paseah, the children of Besai, '
  '5':
  - type: text
    content: 'The children of Arah, seven hundred seventy and five. '
  '50':
  - type: text
    content: 'the children of Asnah, the children of Mehunim, the children of Nephusim, '
  '51':
  - type: text
    content: 'the children of Bakbuk, the children of Hakupha, the children of Harhur, '
  '52':
  - type: text
    content: 'the children of Bazluth, the children of Mehida, the children of Harsha, '
  '53':
  - type: text
    content: 'the children of Barkos, the children of Sisera, the children of Thamah, '
  '54':
  - type: text
    content: the children of Neziah, the children of Hatipha.
  '55':
  - type: text
    content: 'The children of Solomon''s servants: the children of Sotai, the children of Sophereth, the children of Peruda, '
  '56':
  - type: text
    content: 'the children of Jaalah, the children of Darkon, the children of Giddel, '
  '57':
  - type: text
    content: 'the children of Shephatiah, the children of Hattil, the children of Pochereth of Zebaim, the children of Ami. '
  '58':
  - type: text
    content: 'All the Nethinims, and the children of Solomon''s servants, '
  - type: text
    content: were
  - type: text
    content: ' three hundred ninety and two.'
  '59':
  - type: text
    content: 'And these '
  - type: text
    content: were
  - type: text
    content: ' they which went up from Tel-melah, Tel-harsa, Cherub, Addan, '
  - type: text
    content: and
  - type: text
    content: ' Immer: but they could not shew their father''s house, and their seed, whether they '
  - type: text
    content: were
  - type: text
    content: ' of Israel: '
  '6':
  - type: text
    content: 'The children of Pahath-moab, of the children of Jeshua '
  - type: text
    content: and
  - type: text
    content: ' Joab, two thousand eight hundred and twelve. '
  '60':
  - type: text
    content: 'the children of Delaiah, the children of Tobiah, the children of Nekoda, six hundred fifty and two. '
  '61':
  - type: text
    content: 'And of the children of the priests: the children of Habaiah, the children of Koz, the children of Barzillai; which took a wife of the daughters of Barzillai the Gileadite, and was called after their name: '
  '62':
  - type: text
    content: 'these sought their register '
  - type: text
    content: among
  - type: text
    content: ' those that were reckoned by genealogy, but they were not found: therefore were they, as polluted, put from the priesthood. '
  '63':
  - type: text
    content: And the Tirshatha said unto them, that they should not eat of the most holy things, till there stood up a priest with Urim and with Thummim.
  '64':
  - type: text
    content: 'The whole congregation together '
  - type: text
    content: was
  - type: text
    content: ' forty and two thousand three hundred '
  - type: text
    content: and
  - type: text
    content: ' threescore, '
  '65':
  - type: text
    content: 'beside their servants and their maids, of whom '
  - type: text
    content: there were
  - type: text
    content: ' seven thousand three hundred thirty and seven: and '
  - type: text
    content: there were
  - type: text
    content: ' among them two hundred singing men and singing women. '
  '66':
  - type: text
    content: 'Their horses '
  - type: text
    content: were
  - type: text
    content: ' seven hundred thirty and six; their mules, two hundred forty and five; '
  '67':
  - type: text
    content: 'their camels, four hundred thirty and five; '
  - type: text
    content: their
  - type: text
    content: ' asses, six thousand seven hundred and twenty.'
  '68':
  - type: text
    content: 'And '
  - type: text
    content: some
  - type: text
    content: ' of the chief of the fathers, when they came to the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem, offered freely for the house of God to set it up in his place: '
  '69':
  - type: text
    content: they gave after their ability unto the treasure of the work threescore and one thousand drams of gold, and five thousand pound of silver, and one hundred priests' garments.
  '7':
  - type: text
    content: 'The children of Elam, a thousand two hundred fifty and four. '
  '70':
  - type: text
    content: 'So the priests, and the Levites, and '
  - type: text
    content: some
  - type: text
    content: ' of the people, and the singers, and the porters, and the Nethinims, dwelt in their cities, and all Israel in their cities.'
  '8':
  - type: text
    content: 'The children of Zattu, nine hundred forty and five. '
  '9':
  - type: text
    content: 'The children of Zaccai, seven hundred and threescore. '
