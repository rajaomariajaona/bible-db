  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'the children of Keros, the children of Siaha, the children of Padon, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'the children of Lebanah, the children of Hagabah, the children of Akkub, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'the children of Hagab, the children of Shalmai, the children of Hanan, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'the children of Giddel, the children of Gahar, the children of Reaiah, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'the children of Rezin, the children of Nekoda, the children of Gazzam, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'the children of Uzza, the children of Paseah, the children of Besai, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'the children of Asnah, the children of Mehunim, the children of Nephusim, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'the children of Bakbuk, the children of Hakupha, the children of Harhur, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'the children of Bazluth, the children of Mehida, the children of Harsha, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'the children of Barkos, the children of Sisera, the children of Thamah, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: the children of Neziah, the children of Hatipha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'The children of Solomon''s servants: the children of Sotai, the children of Sophereth, the children of Peruda, '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'the children of Jaalah, the children of Darkon, the children of Giddel, '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'the children of Shephatiah, the children of Hattil, the children of Pochereth of Zebaim, the children of Ami. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'All the Nethinims, and the children of Solomon''s servants, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' three hundred ninety and two.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' they which went up from Tel-melah, Tel-harsa, Cherub, Addan, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Immer: but they could not shew their father''s house, and their seed, whether they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'the children of Delaiah, the children of Tobiah, the children of Nekoda, six hundred fifty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And of the children of the priests: the children of Habaiah, the children of Koz, the children of Barzillai; which took a wife of the daughters of Barzillai the Gileadite, and was called after their name: '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'these sought their register '
  - type: usfm
    marker: add
    children:
    - type: text
      text: among
  - type: text
    text: ' those that were reckoned by genealogy, but they were not found: therefore were they, as polluted, put from the priesthood. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: And the Tirshatha said unto them, that they should not eat of the most holy things, till there stood up a priest with Urim and with Thummim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'The whole congregation together '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' forty and two thousand three hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' threescore, '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'beside their servants and their maids, of whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' seven thousand three hundred thirty and seven: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' among them two hundred singing men and singing women. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Their horses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' seven hundred thirty and six; their mules, two hundred forty and five; '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'their camels, four hundred thirty and five; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' asses, six thousand seven hundred and twenty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the chief of the fathers, when they came to the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' at Jerusalem, offered freely for the house of God to set it up in his place: '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: they gave after their ability unto the treasure of the work threescore and one thousand drams of gold, and five thousand pound of silver, and one hundred priests' garments.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'So the priests, and the Levites, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the people, and the singers, and the porters, and the Nethinims, dwelt in their cities, and all Israel in their cities.'
