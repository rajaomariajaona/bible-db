verses:
  '1':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the judgments which thou shalt set before them.'
  '10':
  - type: text
    content: 'If he take him another '
  - type: text
    content: wife
  - type: text
    content: '; her food, her raiment, and her duty of marriage, shall he not diminish. '
  '11':
  - type: text
    content: And if he do not these three unto her, then shall she go out free without money.
  '12':
  - type: text
    content: 'He that smiteth a man, so that he die, shall be surely put to death. '
  '13':
  - type: text
    content: 'And if a man lie not in wait, but God deliver '
  - type: text
    content: him
  - type: text
    content: ' into his hand; then I will appoint thee a place whither he shall flee. '
  '14':
  - type: text
    content: But if a man come presumptuously upon his neighbour, to slay him with guile; thou shalt take him from mine altar, that he may die.
  '15':
  - type: text
    content: And he that smiteth his father, or his mother, shall be surely put to death.
  '16':
  - type: text
    content: And he that stealeth a man, and selleth him, or if he be found in his hand, he shall surely be put to death.
  '17':
  - type: text
    content: And he that curseth his father, or his mother, shall surely be put to death.
  '18':
  - type: text
    content: 'And if men strive together, and one smite another with a stone, or with '
  - type: text
    content: his
  - type: text
    content: ' fist, and he die not, but keepeth '
  - type: text
    content: his
  - type: text
    content: ' bed: '
  '19':
  - type: text
    content: 'if he rise again, and walk abroad upon his staff, then shall he that smote '
  - type: text
    content: him
  - type: text
    content: ' be quit: only he shall pay '
  - type: text
    content: for
  - type: text
    content: ' the loss of his time, and shall cause '
  - type: text
    content: him
  - type: text
    content: ' to be thoroughly healed.'
  '2':
  - type: text
    content: 'If thou buy an Hebrew servant, six years he shall serve: and in the seventh he shall go out free for nothing. '
  '20':
  - type: text
    content: 'And if a man smite his servant, or his maid, with a rod, and he die under his hand; he shall be surely punished. '
  '21':
  - type: text
    content: 'Notwithstanding, if he continue a day or two, he shall not be punished: for he '
  - type: text
    content: is
  - type: text
    content: ' his money.'
  '22':
  - type: text
    content: 'If men strive, and hurt a woman with child, so that her fruit depart '
  - type: text
    content: from her
  - type: text
    content: ', and yet no mischief follow: he shall be surely punished, according as the woman''s husband will lay upon him; and he shall pay as the judges '
  - type: text
    content: determine
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'And if '
  - type: text
    content: any
  - type: text
    content: ' mischief follow, then thou shalt give life for life, '
  '24':
  - type: text
    content: 'eye for eye, tooth for tooth, hand for hand, foot for foot, '
  '25':
  - type: text
    content: burning for burning, wound for wound, stripe for stripe.
  '26':
  - type: text
    content: 'And if a man smite the eye of his servant, or the eye of his maid, that it perish; he shall let him go free for his eye''s sake. '
  '27':
  - type: text
    content: And if he smite out his manservant's tooth, or his maidservant's tooth; he shall let him go free for his tooth's sake.
  '28':
  - type: text
    content: 'If an ox gore a man or a woman, that they die: then the ox shall be surely stoned, and his flesh shall not be eaten; but the owner of the ox '
  - type: text
    content: shall be
  - type: text
    content: ' quit. '
  '29':
  - type: text
    content: 'But if the ox were wont to push with his horn in time past, and it hath been testified to his owner, and he hath not kept him in, but that he hath killed a man or a woman; the ox shall be stoned, and his owner also shall be put to death. '
  '3':
  - type: text
    content: 'If he came in by himself, he shall go out by himself: if he were married, then his wife shall go out with him. '
  '30':
  - type: text
    content: 'If there be laid on him a sum of money, then he shall give for the ransom of his life whatsoever is laid upon him. '
  '31':
  - type: text
    content: 'Whether he have gored a son, or have gored a daughter, according to this judgment shall it be done unto him. '
  '32':
  - type: text
    content: If the ox shall push a manservant or a maidservant; he shall give unto their master thirty shekels of silver, and the ox shall be stoned.
  '33':
  - type: text
    content: 'And if a man shall open a pit, or if a man shall dig a pit, and not cover it, and an ox or an ass fall therein; '
  '34':
  - type: text
    content: 'the owner of the pit shall make '
  - type: text
    content: it
  - type: text
    content: ' good, '
  - type: text
    content: and
  - type: text
    content: ' give money unto the owner of them; and the dead '
  - type: text
    content: beast
  - type: text
    content: ' shall be his.'
  '35':
  - type: text
    content: 'And if one man''s ox hurt another''s, that he die; then they shall sell the live ox, and divide the money of it; and the dead '
  - type: text
    content: ox
  - type: text
    content: ' also they shall divide. '
  '36':
  - type: text
    content: Or if it be known that the ox hath used to push in time past, and his owner hath not kept him in; he shall surely pay ox for ox; and the dead shall be his own.
  '4':
  - type: text
    content: 'If his master have given him a wife, and she have born him sons or daughters; the wife and her children shall be her master''s, and he shall go out by himself. '
  '5':
  - type: text
    content: 'And if the servant shall plainly say, I love my master, my wife, and my children; I will not go out free: '
  '6':
  - type: text
    content: then his master shall bring him unto the judges; he shall also bring him to the door, or unto the door post; and his master shall bore his ear through with an aul; and he shall serve him for ever.
  '7':
  - type: text
    content: 'And if a man sell his daughter to be a maidservant, she shall not go out as the menservants do. '
  '8':
  - type: text
    content: 'If she please not her master, who hath betrothed her to himself, then shall he let her be redeemed: to sell her unto a strange nation he shall have no power, seeing he hath dealt deceitfully with her. '
  '9':
  - type: text
    content: 'And if he have betrothed her unto his son, he shall deal with her after the manner of daughters. '
