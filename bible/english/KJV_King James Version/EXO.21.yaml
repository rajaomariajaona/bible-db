document_id: EXO.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the judgments which thou shalt set before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If thou buy an Hebrew servant, six years he shall serve: and in the seventh he shall go out free for nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If he came in by himself, he shall go out by himself: if he were married, then his wife shall go out with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If his master have given him a wife, and she have born him sons or daughters; the wife and her children shall be her master''s, and he shall go out by himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And if the servant shall plainly say, I love my master, my wife, and my children; I will not go out free: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: then his master shall bring him unto the judges; he shall also bring him to the door, or unto the door post; and his master shall bore his ear through with an aul; and he shall serve him for ever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And if a man sell his daughter to be a maidservant, she shall not go out as the menservants do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If she please not her master, who hath betrothed her to himself, then shall he let her be redeemed: to sell her unto a strange nation he shall have no power, seeing he hath dealt deceitfully with her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And if he have betrothed her unto his son, he shall deal with her after the manner of daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If he take him another '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wife
  - type: text
    text: '; her food, her raiment, and her duty of marriage, shall he not diminish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And if he do not these three unto her, then shall she go out free without money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He that smiteth a man, so that he die, shall be surely put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And if a man lie not in wait, but God deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' into his hand; then I will appoint thee a place whither he shall flee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But if a man come presumptuously upon his neighbour, to slay him with guile; thou shalt take him from mine altar, that he may die.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And he that smiteth his father, or his mother, shall be surely put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he that stealeth a man, and selleth him, or if he be found in his hand, he shall surely be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And he that curseth his father, or his mother, shall surely be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And if men strive together, and one smite another with a stone, or with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' fist, and he die not, but keepeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' bed: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'if he rise again, and walk abroad upon his staff, then shall he that smote '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' be quit: only he shall pay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the loss of his time, and shall cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to be thoroughly healed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And if a man smite his servant, or his maid, with a rod, and he die under his hand; he shall be surely punished. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Notwithstanding, if he continue a day or two, he shall not be punished: for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'If men strive, and hurt a woman with child, so that her fruit depart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from her
  - type: text
    text: ', and yet no mischief follow: he shall be surely punished, according as the woman''s husband will lay upon him; and he shall pay as the judges '
  - type: usfm
    marker: add
    children:
    - type: text
      text: determine
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' mischief follow, then thou shalt give life for life, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'eye for eye, tooth for tooth, hand for hand, foot for foot, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: burning for burning, wound for wound, stripe for stripe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And if a man smite the eye of his servant, or the eye of his maid, that it perish; he shall let him go free for his eye''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And if he smite out his manservant's tooth, or his maidservant's tooth; he shall let him go free for his tooth's sake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'If an ox gore a man or a woman, that they die: then the ox shall be surely stoned, and his flesh shall not be eaten; but the owner of the ox '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' quit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But if the ox were wont to push with his horn in time past, and it hath been testified to his owner, and he hath not kept him in, but that he hath killed a man or a woman; the ox shall be stoned, and his owner also shall be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'If there be laid on him a sum of money, then he shall give for the ransom of his life whatsoever is laid upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Whether he have gored a son, or have gored a daughter, according to this judgment shall it be done unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: If the ox shall push a manservant or a maidservant; he shall give unto their master thirty shekels of silver, and the ox shall be stoned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And if a man shall open a pit, or if a man shall dig a pit, and not cover it, and an ox or an ass fall therein; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'the owner of the pit shall make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' good, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' give money unto the owner of them; and the dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: beast
  - type: text
    text: ' shall be his.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And if one man''s ox hurt another''s, that he die; then they shall sell the live ox, and divide the money of it; and the dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ox
  - type: text
    text: ' also they shall divide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Or if it be known that the ox hath used to push in time past, and his owner hath not kept him in; he shall surely pay ox for ox; and the dead shall be his own.
