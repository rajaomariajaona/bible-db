document_id: ZEC.11,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Their Glory is Spoiled
  - type: text
    content: 'Open thy doors, O Lebanon, that the fire may devour thy cedars. '
  '10':
  - type: text
    content: 'And I took my staff, '
  - type: text
    content: even
  - type: text
    content: ' Beauty, and cut it asunder, that I might break my covenant which I had made with all the people. '
  '11':
  - type: text
    content: 'And it was broken in that day: and so the poor of the flock that waited upon me knew that it '
  - type: text
    content: was
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And I said unto them, If ye think good, give '
  - type: text
    content: me
  - type: text
    content: ' my price; and if not, forbear. So they weighed for my price thirty '
  - type: text
    content: pieces
  - type: text
    content: ' of silver. '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Cast it unto the potter: a goodly price that I was prised at of them. And I took the thirty '
  - type: text
    content: pieces
  - type: text
    content: ' of silver, and cast them to the potter in the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Then I cut asunder mine other staff, '
  - type: text
    content: even
  - type: text
    content: ' Bands, that I might break the brotherhood between Judah and Israel.'
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Take unto thee yet the instruments of a foolish shepherd. '
  '16':
  - type: text
    content: 'For, lo, I will raise up a shepherd in the land, '
  - type: text
    content: which
  - type: text
    content: ' shall not visit those that be cut off, neither shall seek the young one, nor heal that that is broken, nor feed that that standeth still: but he shall eat the flesh of the fat, and tear their claws in pieces. '
  '17':
  - type: text
    content: 'Woe to the idol shepherd that leaveth the flock! the sword '
  - type: text
    content: shall be
  - type: text
    content: ' upon his arm, and upon his right eye: his arm shall be clean dried up, and his right eye shall be utterly darkened.'
  '2':
  - type: text
    content: 'Howl, fir tree; for the cedar is fallen; because the mighty are spoiled: howl, O ye oaks of Bashan; for the forest of the vintage is come down. '
  '3':
  - type: text
    content: There is
  - type: text
    content: ' a voice of the howling of the shepherds; for their glory is spoiled: a voice of the roaring of young lions; for the pride of Jordan is spoiled.'
  '4':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' my God; Feed the flock of the slaughter; '
  '5':
  - type: text
    content: 'whose possessors slay them, and hold themselves not guilty: and they that sell them say, Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '; for I am rich: and their own shepherds pity them not. '
  '6':
  - type: text
    content: 'For I will no more pity the inhabitants of the land, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': but, lo, I will deliver the men every one into his neighbour''s hand, and into the hand of his king: and they shall smite the land, and out of their hand I will not deliver '
  - type: text
    content: them
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And I will feed the flock of slaughter, '
  - type: text
    content: even
  - type: text
    content: ' you, O poor of the flock. And I took unto me two staves; the one I called Beauty, and the other I called Bands; and I fed the flock. '
  '8':
  - type: text
    content: 'Three shepherds also I cut off in one month; and my soul lothed them, and their soul also abhorred me. '
  '9':
  - type: text
    content: 'Then said I, I will not feed you: that that dieth, let it die; and that that is to be cut off, let it be cut off; and let the rest eat every one the flesh of another.'
