  '16':
  - type: text
    content: 'And it came to pass, as we went to prayer, a certain damsel possessed with a spirit of divination met us, which brought her masters much gain by soothsaying: '
  '17':
  - type: text
    content: 'The same followed Paul and us, and cried, saying, These men are the servants of the most high God, which shew unto us the way of salvation. '
  '18':
  - type: text
    content: And this did she many days. But Paul, being grieved, turned and said to the spirit, I command thee in the name of Jesus Christ to come out of her. And he came out the same hour.
  '19':
  - type: text
    content: 'And when her masters saw that the hope of their gains was gone, they caught Paul and Silas, and drew '
  - type: text
    content: them
  - type: text
    content: ' into the marketplace unto the rulers, '
  '2':
  - type: text
    content: 'which was well reported of by the brethren that were at Lystra and Iconium. '
  '20':
  - type: text
    content: 'and brought them to the magistrates, saying, These men, being Jews, do exceedingly trouble our city, '
  '21':
  - type: text
    content: 'and teach customs, which are not lawful for us to receive, neither to observe, being Romans. '
  '22':
  - type: text
    content: 'And the multitude rose up together against them: and the magistrates rent off their clothes, and commanded to beat '
  - type: text
