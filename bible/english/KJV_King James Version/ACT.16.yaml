document_id: ACT.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then came he to Derbe and Lystra: and, behold, a certain disciple was there, named Timotheus, the son of a certain woman, which was a Jewess, and believed; but his father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a Greek: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And after he had seen the vision, immediately we endeavoured to go into Macedonia, assuredly gathering that the Lord had called us for to preach the gospel unto them.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Philippi
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore loosing from Troas, we came with a straight course to Samothracia, and the next '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' to Neapolis; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and from thence to Philippi, which is the chief city of that part of Macedonia, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' a colony: and we were in that city abiding certain days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And on the sabbath we went out of the city by a river side, where prayer was wont to be made; and we sat down, and spake unto the women which resorted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thither
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And a certain woman named Lydia, a seller of purple, of the city of Thyatira, which worshipped God, heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ': whose heart the Lord opened, that she attended unto the things which were spoken of Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And when she was baptized, and her household, she besought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', saying, If ye have judged me to be faithful to the Lord, come into my house, and abide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: . And she constrained us.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And it came to pass, as we went to prayer, a certain damsel possessed with a spirit of divination met us, which brought her masters much gain by soothsaying: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The same followed Paul and us, and cried, saying, These men are the servants of the most high God, which shew unto us the way of salvation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And this did she many days. But Paul, being grieved, turned and said to the spirit, I command thee in the name of Jesus Christ to come out of her. And he came out the same hour.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when her masters saw that the hope of their gains was gone, they caught Paul and Silas, and drew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' into the marketplace unto the rulers, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'which was well reported of by the brethren that were at Lystra and Iconium. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and brought them to the magistrates, saying, These men, being Jews, do exceedingly trouble our city, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and teach customs, which are not lawful for us to receive, neither to observe, being Romans. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the multitude rose up together against them: and the magistrates rent off their clothes, and commanded to beat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And when they had laid many stripes upon them, they cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' into prison, charging the jailor to keep them safely: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: who, having received such a charge, thrust them into the inner prison, and made their feet fast in the stocks.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And at midnight Paul and Silas prayed, and sang praises unto God: and the prisoners heard them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And suddenly there was a great earthquake, so that the foundations of the prison were shaken: and immediately all the doors were opened, and every one''s bands were loosed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the keeper of the prison awaking out of his sleep, and seeing the prison doors open, he drew out his sword, and would have killed himself, supposing that the prisoners had been fled. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But Paul cried with a loud voice, saying, Do thyself no harm: for we are all here. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then he called for a light, and sprang in, and came trembling, and fell down before Paul and Silas, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Him would Paul have to go forth with him; and took and circumcised him because of the Jews which were in those quarters: for they knew all that his father was a Greek. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and brought them out, and said, Sirs, what must I do to be saved? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And they said, Believe on the Lord Jesus Christ, and thou shalt be saved, and thy house. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And they spake unto him the word of the Lord, and to all that were in his house. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And he took them the same hour of the night, and washed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' stripes; and was baptized, he and all his, straightway. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And when he had brought them into his house, he set meat before them, and rejoiced, believing in God with all his house.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And when it was day, the magistrates sent the serjeants, saying, Let those men go. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And the keeper of the prison told this saying to Paul, The magistrates have sent to let you go: now therefore depart, and go in peace. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'But Paul said unto them, They have beaten us openly uncondemned, being Romans, and have cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' into prison; and now do they thrust us out privily? nay verily; but let them come themselves and fetch us out. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And the serjeants told these words unto the magistrates: and they feared, when they heard that they were Romans. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And they came and besought them, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out, and desired '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to depart out of the city.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And as they went through the cities, they delivered them the decrees for to keep, that were ordained of the apostles and elders which were at Jerusalem. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And they went out of the prison, and entered into '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the house of
    - type: text
      text: ' Lydia: and when they had seen the brethren, they comforted them, and departed.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And so were the churches established in the faith, and increased in number daily.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now when they had gone throughout Phrygia and the region of Galatia, and were forbidden of the Holy Ghost to preach the word in Asia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'after they were come to Mysia, they assayed to go into Bithynia: but the Spirit suffered them not. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And they passing by Mysia came down to Troas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And a vision appeared to Paul in the night; There stood a man of Macedonia, and prayed him, saying, Come over into Macedonia, and help us. '
