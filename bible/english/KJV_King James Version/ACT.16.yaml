  '24':
  - type: text
    content: who, having received such a charge, thrust them into the inner prison, and made their feet fast in the stocks.
  '25':
  - type: text
    content: 'And at midnight Paul and Silas prayed, and sang praises unto God: and the prisoners heard them. '
  '26':
  - type: text
    content: 'And suddenly there was a great earthquake, so that the foundations of the prison were shaken: and immediately all the doors were opened, and every one''s bands were loosed. '
  '27':
  - type: text
    content: 'And the keeper of the prison awaking out of his sleep, and seeing the prison doors open, he drew out his sword, and would have killed himself, supposing that the prisoners had been fled. '
  '28':
  - type: text
    content: 'But Paul cried with a loud voice, saying, Do thyself no harm: for we are all here. '
  '29':
  - type: text
    content: 'Then he called for a light, and sprang in, and came trembling, and fell down before Paul and Silas, '
  '3':
  - type: text
    content: 'Him would Paul have to go forth with him; and took and circumcised him because of the Jews which were in those quarters: for they knew all that his father was a Greek. '
  '30':
  - type: text
    content: 'and brought them out, and said, Sirs, what must I do to be saved? '
  '31':
  - type: text
    content: 'And they said, Believe on the Lord Jesus Christ, and thou shalt be saved, and thy house. '
  '32':
  - type: text
    content: 'And they spake unto him the word of the Lord, and to all that were in his house. '
  '33':
  - type: text
    content: 'And he took them the same hour of the night, and washed '
  - type: text
    content: their
  - type: text
    content: ' stripes; and was baptized, he and all his, straightway. '
  '34':
  - type: text
    content: And when he had brought them into his house, he set meat before them, and rejoiced, believing in God with all his house.
  '35':
  - type: text
    content: 'And when it was day, the magistrates sent the serjeants, saying, Let those men go. '
  '36':
  - type: text
    content: 'And the keeper of the prison told this saying to Paul, The magistrates have sent to let you go: now therefore depart, and go in peace. '
  '37':
  - type: text
    content: 'But Paul said unto them, They have beaten us openly uncondemned, being Romans, and have cast '
  - type: text
    content: us
  - type: text
    content: ' into prison; and now do they thrust us out privily? nay verily; but let them come themselves and fetch us out. '
  '38':
  - type: text
    content: 'And the serjeants told these words unto the magistrates: and they feared, when they heard that they were Romans. '
  '39':
  - type: text
    content: 'And they came and besought them, and brought '
  - type: text
    content: them
  - type: text
    content: ' out, and desired '
  - type: text
    content: them
  - type: text
    content: ' to depart out of the city.'
  '4':
  - type: text
    content: 'And as they went through the cities, they delivered them the decrees for to keep, that were ordained of the apostles and elders which were at Jerusalem. '
  '40':
  - type: text
    content: 'And they went out of the prison, and entered into '
  - type: text
