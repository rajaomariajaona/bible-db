  '5':
  - type: text
    content: And so were the churches established in the faith, and increased in number daily.
  '6':
  - type: text
    content: 'Now when they had gone throughout Phrygia and the region of Galatia, and were forbidden of the Holy Ghost to preach the word in Asia, '
  '7':
  - type: text
    content: 'after they were come to Mysia, they assayed to go into Bithynia: but the Spirit suffered them not. '
  '8':
  - type: text
    content: 'And they passing by Mysia came down to Troas. '
  '9':
  - type: text
    content: 'And a vision appeared to Paul in the night; There stood a man of Macedonia, and prayed him, saying, Come over into Macedonia, and help us. '
