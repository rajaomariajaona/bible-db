verses:
  '1':
  - type: heading
    content: God and Israel
  - type: text
    content: 'Hear this word that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken against you, O children of Israel, against the whole family which I brought up from the land of Egypt, saying, '
  '10':
  - type: text
    content: 'For they know not to do right, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', who store up violence and robbery in their palaces. '
  '11':
  - type: text
    content: 'Therefore thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; An adversary '
  - type: text
    content: there shall be
  - type: text
    content: ' even round about the land; and he shall bring down thy strength from thee, and thy palaces shall be spoiled. '
  '12':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; As the shepherd taketh out of the mouth of the lion two legs, or a piece of an ear; so shall the children of Israel be taken out that dwell in Samaria in the corner of a bed, and in Damascus '
  - type: text
    content: in
  - type: text
    content: ' a couch.'
  '13':
  - type: text
    content: 'Hear ye, and testify in the house of Jacob, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', the God of hosts, '
  '14':
  - type: text
    content: 'that in the day that I shall visit the transgressions of Israel upon him I will also visit the altars of Beth-el: and the horns of the altar shall be cut off, and fall to the ground. '
  '15':
  - type: text
    content: 'And I will smite the winter house with the summer house; and the houses of ivory shall perish, and the great houses shall have an end, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'You only have I known of all the families of the earth: therefore I will punish you for all your iniquities.'
  '3':
  - type: text
    content: 'Can two walk together, except they be agreed? '
  '4':
  - type: text
    content: Will a lion roar in the forest, when he hath no prey? will a young lion cry out of his den, if he have taken nothing?
  '5':
  - type: text
    content: 'Can a bird fall in a snare upon the earth, where no gin '
  - type: text
    content: is
  - type: text
    content: ' for him? shall '
  - type: text
    content: one
  - type: text
    content: ' take up a snare from the earth, and have taken nothing at all? '
  '6':
  - type: text
    content: 'Shall a trumpet be blown in the city, and the people not be afraid? shall there be evil in a city, and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath not done '
  - type: text
    content: it?
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Surely the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' will do nothing, but he revealeth his secret unto his servants the prophets. '
  '8':
  - type: text
    content: 'The lion hath roared, who will not fear? the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' hath spoken, who can but prophesy?'
  '9':
  - type: text
    content: 'Publish in the palaces at Ashdod, and in the palaces in the land of Egypt, and say, Assemble yourselves upon the mountains of Samaria, and behold the great tumults in the midst thereof, and the oppressed in the midst thereof. '
