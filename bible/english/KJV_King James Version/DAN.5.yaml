document_id: DAN.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Belshazzar's Feast
  - type: text
    content: 'Belshazzar the king made a great feast to a thousand of his lords, and drank wine before the thousand. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Now
  - type: text
    content: ' the queen by reason of the words of the king and his lords came into the banquet house: '
  - type: text
    content: and
  - type: text
    content: ' the queen spake and said, O king, live for ever: let not thy thoughts trouble thee, nor let thy countenance be changed: '
  '11':
  - type: text
    content: 'there is a man in thy kingdom, in whom '
  - type: text
    content: is
  - type: text
    content: ' the spirit of the holy gods; and in the days of thy father light and understanding and wisdom, like the wisdom of the gods, was found in him; whom the king Nebuchadnezzar thy father, the king, '
  - type: text
    content: I say
  - type: text
    content: ', thy father, made master of the magicians, astrologers, Chaldeans, '
  - type: text
    content: and
  - type: text
    content: ' soothsayers; '
  '12':
  - type: text
    content: 'forasmuch as an excellent spirit, and knowledge, and understanding, interpreting of dreams, and shewing of hard sentences, and dissolving of doubts, were found in the same Daniel, whom the king named Belteshazzar: now let Daniel be called, and he will shew the interpretation.'
  '13':
  - type: text
    content: 'Then was Daniel brought in before the king. '
  - type: text
    content: And
  - type: text
    content: ' the king spake and said unto Daniel, '
  - type: text
    content: Art
  - type: text
    content: ' thou that Daniel, which '
  - type: text
    content: art
  - type: text
    content: ' of the children of the captivity of Judah, whom the king my father brought out of Jewry? '
  '14':
  - type: text
    content: 'I have even heard of thee, that the spirit of the gods '
  - type: text
    content: is
  - type: text
    content: ' in thee, and '
  - type: text
    content: that
  - type: text
    content: ' light and understanding and excellent wisdom is found in thee. '
  '15':
  - type: text
    content: 'And now the wise '
  - type: text
    content: men
  - type: text
    content: ', the astrologers, have been brought in before me, that they should read this writing, and make known unto me the interpretation thereof: but they could not shew the interpretation of the thing: '
  '16':
  - type: text
    content: 'and I have heard of thee, that thou canst make interpretations, and dissolve doubts: now if thou canst read the writing, and make known to me the interpretation thereof, thou shalt be clothed with scarlet, and '
  - type: text
    content: have
  - type: text
    content: ' a chain of gold about thy neck, and shalt be the third ruler in the kingdom.'
  '17':
  - type: text
    content: 'Then Daniel answered and said before the king, Let thy gifts be to thyself, and give thy rewards to another; yet I will read the writing unto the king, and make known to him the interpretation. '
  '18':
  - type: text
    content: 'O thou king, the most high God gave Nebuchadnezzar thy father a kingdom, and majesty, and glory, and honour: '
  '19':
  - type: text
    content: 'and for the majesty that he gave him, all people, nations, and languages, trembled and feared before him: whom he would he slew; and whom he would he kept alive; and whom he would he set up; and whom he would he put down.'
  '2':
  - type: text
    content: 'Belshazzar, whiles he tasted the wine, commanded to bring the golden and silver vessels which his father Nebuchadnezzar had taken out of the temple which '
  - type: text
    content: was
  - type: text
    content: ' in Jerusalem; that the king, and his princes, his wives, and his concubines, might drink therein. '
  '20':
  - type: text
    content: 'But when his heart was lifted up, and his mind hardened in pride, he was deposed from his kingly throne, and they took his glory from him: '
  '21':
  - type: text
    content: 'and he was driven from the sons of men; and his heart was made like the beasts, and his dwelling '
  - type: text
    content: was
  - type: text
    content: ' with the wild asses: they fed him with grass like oxen, and his body was wet with the dew of heaven; till he knew that the most high God ruled in the kingdom of men, and '
  - type: text
    content: that
  - type: text
    content: ' he appointeth over it whomsoever he will. '
  '22':
  - type: text
    content: 'And thou his son, O Belshazzar, hast not humbled thine heart, though thou knewest all this; '
  '23':
  - type: text
    content: 'but hast lifted up thyself against the Lord of heaven; and they have brought the vessels of his house before thee, and thou, and thy lords, thy wives, and thy concubines, have drunk wine in them; and thou hast praised the gods of silver, and gold, of brass, iron, wood, and stone, which see not, nor hear, nor know: and the God in whose hand thy breath '
  - type: text
    content: is
  - type: text
    content: ', and whose '
  - type: text
    content: are
  - type: text
    content: ' all thy ways, hast thou not glorified: '
  '24':
  - type: text
    content: then was the part of the hand sent from him; and this writing was written.
  - type: heading
    content: The Writing on the Wall
  '25':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the writing that was written, MENE, MENE, TEKEL, UPHARSIN. '
  '26':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the interpretation of the thing: MENE; God hath numbered thy kingdom, and finished it. '
  '27':
  - type: text
    content: 'TEKEL; Thou art weighed in the balances, and art found wanting. '
  '28':
  - type: text
    content: 'PERES; Thy kingdom is divided, and given to the Medes and Persians. '
  '29':
  - type: text
    content: 'Then commanded Belshazzar, and they clothed Daniel with scarlet, and '
  - type: text
    content: put
  - type: text
    content: ' a chain of gold about his neck, and made a proclamation concerning him, that he should be the third ruler in the kingdom.'
  '3':
  - type: text
    content: 'Then they brought the golden vessels that were taken out of the temple of the house of God which '
  - type: text
    content: was
  - type: text
    content: ' at Jerusalem; and the king, and his princes, his wives, and his concubines, drank in them. '
  '30':
  - type: text
    content: 'In that night was Belshazzar the king of the Chaldeans slain. '
  '31':
  - type: text
    content: 'And Darius the Median took the kingdom, '
  - type: text
    content: being
  - type: text
    content: ' about threescore and two years old.'
  '4':
  - type: text
    content: They drank wine, and praised the gods of gold, and of silver, of brass, of iron, of wood, and of stone.
  '5':
  - type: text
    content: 'In the same hour came forth fingers of a man''s hand, and wrote over against the candlestick upon the plaister of the wall of the king''s palace: and the king saw the part of the hand that wrote. '
  '6':
  - type: text
    content: 'Then the king''s countenance was changed, and his thoughts troubled him, so that the joints of his loins were loosed, and his knees smote one against another. '
  '7':
  - type: text
    content: 'The king cried aloud to bring in the astrologers, the Chaldeans, and the soothsayers. '
  - type: text
    content: And
  - type: text
    content: ' the king spake, and said to the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon, Whosoever shall read this writing, and shew me the interpretation thereof, shall be clothed with scarlet, and '
  - type: text
    content: have
  - type: text
    content: ' a chain of gold about his neck, and shall be the third ruler in the kingdom.'
  '8':
  - type: text
    content: 'Then came in all the king''s wise '
  - type: text
    content: 'men:'
  - type: text
    content: ' but they could not read the writing, nor make known to the king the interpretation thereof. '
  '9':
  - type: text
    content: Then was king Belshazzar greatly troubled, and his countenance was changed in him, and his lords were astonied.
