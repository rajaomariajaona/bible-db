document_id: DAN.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Belshazzar's Feast
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Belshazzar the king made a great feast to a thousand of his lords, and drank wine before the thousand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Belshazzar, whiles he tasted the wine, commanded to bring the golden and silver vessels which his father Nebuchadnezzar had taken out of the temple which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Jerusalem; that the king, and his princes, his wives, and his concubines, might drink therein. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then they brought the golden vessels that were taken out of the temple of the house of God which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' at Jerusalem; and the king, and his princes, his wives, and his concubines, drank in them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They drank wine, and praised the gods of gold, and of silver, of brass, of iron, of wood, and of stone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In the same hour came forth fingers of a man''s hand, and wrote over against the candlestick upon the plaister of the wall of the king''s palace: and the king saw the part of the hand that wrote. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the king''s countenance was changed, and his thoughts troubled him, so that the joints of his loins were loosed, and his knees smote one against another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The king cried aloud to bring in the astrologers, the Chaldeans, and the soothsayers. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the king spake, and said to the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' of Babylon, Whosoever shall read this writing, and shew me the interpretation thereof, shall be clothed with scarlet, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have
  - type: text
    text: ' a chain of gold about his neck, and shall be the third ruler in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then came in all the king''s wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'men:'
  - type: text
    text: ' but they could not read the writing, nor make known to the king the interpretation thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then was king Belshazzar greatly troubled, and his countenance was changed in him, and his lords were astonied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Now
  - type: text
    text: ' the queen by reason of the words of the king and his lords came into the banquet house: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the queen spake and said, O king, live for ever: let not thy thoughts trouble thee, nor let thy countenance be changed: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'there is a man in thy kingdom, in whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the spirit of the holy gods; and in the days of thy father light and understanding and wisdom, like the wisdom of the gods, was found in him; whom the king Nebuchadnezzar thy father, the king, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', thy father, made master of the magicians, astrologers, Chaldeans, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' soothsayers; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'forasmuch as an excellent spirit, and knowledge, and understanding, interpreting of dreams, and shewing of hard sentences, and dissolving of doubts, were found in the same Daniel, whom the king named Belteshazzar: now let Daniel be called, and he will shew the interpretation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then was Daniel brought in before the king. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the king spake and said unto Daniel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou that Daniel, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' of the children of the captivity of Judah, whom the king my father brought out of Jewry? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have even heard of thee, that the spirit of the gods '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thee, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' light and understanding and excellent wisdom is found in thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And now the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', the astrologers, have been brought in before me, that they should read this writing, and make known unto me the interpretation thereof: but they could not shew the interpretation of the thing: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and I have heard of thee, that thou canst make interpretations, and dissolve doubts: now if thou canst read the writing, and make known to me the interpretation thereof, thou shalt be clothed with scarlet, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have
  - type: text
    text: ' a chain of gold about thy neck, and shalt be the third ruler in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Daniel answered and said before the king, Let thy gifts be to thyself, and give thy rewards to another; yet I will read the writing unto the king, and make known to him the interpretation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'O thou king, the most high God gave Nebuchadnezzar thy father a kingdom, and majesty, and glory, and honour: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and for the majesty that he gave him, all people, nations, and languages, trembled and feared before him: whom he would he slew; and whom he would he kept alive; and whom he would he set up; and whom he would he put down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But when his heart was lifted up, and his mind hardened in pride, he was deposed from his kingly throne, and they took his glory from him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and he was driven from the sons of men; and his heart was made like the beasts, and his dwelling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with the wild asses: they fed him with grass like oxen, and his body was wet with the dew of heaven; till he knew that the most high God ruled in the kingdom of men, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he appointeth over it whomsoever he will. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And thou his son, O Belshazzar, hast not humbled thine heart, though thou knewest all this; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'but hast lifted up thyself against the Lord of heaven; and they have brought the vessels of his house before thee, and thou, and thy lords, thy wives, and thy concubines, have drunk wine in them; and thou hast praised the gods of silver, and gold, of brass, iron, wood, and stone, which see not, nor hear, nor know: and the God in whose hand thy breath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', and whose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all thy ways, hast thou not glorified: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: then was the part of the hand sent from him; and this writing was written.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Writing on the Wall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the writing that was written, MENE, MENE, TEKEL, UPHARSIN. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the interpretation of the thing: MENE; God hath numbered thy kingdom, and finished it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'TEKEL; Thou art weighed in the balances, and art found wanting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'PERES; Thy kingdom is divided, and given to the Medes and Persians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then commanded Belshazzar, and they clothed Daniel with scarlet, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: put
  - type: text
    text: ' a chain of gold about his neck, and made a proclamation concerning him, that he should be the third ruler in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'In that night was Belshazzar the king of the Chaldeans slain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Darius the Median took the kingdom, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' about threescore and two years old.'
