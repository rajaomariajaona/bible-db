document_id: 1KI.11
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But king Solomon loved many strange women, together with the daughter of Pharaoh, women of the Moabites, Ammonites, Edomites, Zidonians, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Hittites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'of the nations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto the children of Israel, Ye shall not go in to them, neither shall they come in unto you: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' surely they will turn away your heart after their gods: Solomon clave unto these in love. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he had seven hundred wives, princesses, and three hundred concubines: and his wives turned away his heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For it came to pass, when Solomon was old, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' his wives turned away his heart after other gods: and his heart was not perfect with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the heart of David his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For Solomon went after Ashtoreth the goddess of the Zidonians, and after Milcom the abomination of the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Solomon did evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and went not fully after the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' David his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then did Solomon build an high place for Chemosh, the abomination of Moab, in the hill that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Jerusalem, and for Molech, the abomination of the children of Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And likewise did he for all his strange wives, which burnt incense and sacrificed unto their gods.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was angry with Solomon, because his heart was turned from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, which had appeared unto him twice, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and had commanded him concerning this thing, that he should not go after other gods: but he kept not that which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Wherefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Solomon, Forasmuch as this is done of thee, and thou hast not kept my covenant and my statutes, which I have commanded thee, I will surely rend the kingdom from thee, and will give it to thy servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Notwithstanding in thy days I will not do it for David thy father''s sake: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' I will rend it out of the hand of thy son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Howbeit I will not rend away all the kingdom; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' will give one tribe to thy son for David my servant''s sake, and for Jerusalem''s sake which I have chosen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stirred up an adversary unto Solomon, Hadad the Edomite: he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of the king''s seed in Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For it came to pass, when David was in Edom, and Joab the captain of the host was gone up to bury the slain, after he had smitten every male in Edom; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(for six months did Joab remain there with all Israel, until he had cut off every male in Edom:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that Hadad fled, he and certain Edomites of his father''s servants with him, to go into Egypt; Hadad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' yet a little child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they arose out of Midian, and came to Paran: and they took men with them out of Paran, and they came to Egypt, unto Pharaoh king of Egypt; which gave him an house, and appointed him victuals, and gave him land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Hadad found great favour in the sight of Pharaoh, so that he gave him to wife the sister of his own wife, the sister of Tahpenes the queen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the sister of Tahpenes bare him Genubath his son, whom Tahpenes weaned in Pharaoh''s house: and Genubath was in Pharaoh''s household among the sons of Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when Hadad heard in Egypt that David slept with his fathers, and that Joab the captain of the host was dead, Hadad said to Pharaoh, Let me depart, that I may go to mine own country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Pharaoh said unto him, But what hast thou lacked with me, that, behold, thou seekest to go to thine own country? And he answered, Nothing: howbeit let me go in any wise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And God stirred him up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: another
  - type: text
    text: ' adversary, Rezon the son of Eliadah, which fled from his lord Hadadezer king of Zobah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and he gathered men unto him, and became captain over a band, when David slew them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of Zobah:'
  - type: text
    text: ' and they went to Damascus, and dwelt therein, and reigned in Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he was an adversary to Israel all the days of Solomon, beside the mischief that Hadad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'did:'
  - type: text
    text: ' and he abhorred Israel, and reigned over Syria.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jeroboam's Revolt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Jeroboam the son of Nebat, an Ephrathite of Zereda, Solomon''s servant, whose mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Zeruah, a widow woman, even he lifted up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand against the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the cause that he lifted up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand against the king: Solomon built Millo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' repaired the breaches of the city of David his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the man Jeroboam '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a mighty man of valour: and Solomon seeing the young man that he was industrious, he made him ruler over all the charge of the house of Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And it came to pass at that time when Jeroboam went out of Jerusalem, that the prophet Ahijah the Shilonite found him in the way; and he had clad himself with a new garment; and they two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' alone in the field: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and Ahijah caught the new garment that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' on him, and rent it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' twelve pieces: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and he said to Jeroboam, Take thee ten pieces: for thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of Israel, Behold, I will rend the kingdom out of the hand of Solomon, and will give ten tribes to thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '(but he shall have one tribe for my servant David''s sake, and for Jerusalem''s sake, the city which I have chosen out of all the tribes of Israel:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'because that they have forsaken me, and have worshipped Ashtoreth the goddess of the Zidonians, Chemosh the god of the Moabites, and Milcom the god of the children of Ammon, and have not walked in my ways, to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' right in mine eyes, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to keep
  - type: text
    text: ' my statutes and my judgments, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' David his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Howbeit I will not take the whole kingdom out of his hand: but I will make him prince all the days of his life for David my servant''s sake, whom I chose, because he kept my commandments and my statutes: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'but I will take the kingdom out of his son''s hand, and will give it unto thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' ten tribes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And unto his son will I give one tribe, that David my servant may have a light alway before me in Jerusalem, the city which I have chosen me to put my name there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And I will take thee, and thou shalt reign according to all that thy soul desireth, and shalt be king over Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And it shall be, if thou wilt hearken unto all that I command thee, and wilt walk in my ways, and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' right in my sight, to keep my statutes and my commandments, as David my servant did; that I will be with thee, and build thee a sure house, as I built for David, and will give Israel unto thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And I will for this afflict the seed of David, but not for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Solomon sought therefore to kill Jeroboam. And Jeroboam arose, and fled into Egypt, unto Shishak king of Egypt, and was in Egypt until the death of Solomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the rest of the acts of Solomon, and all that he did, and his wisdom, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the acts of Solomon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And the time that Solomon reigned in Jerusalem over all Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' forty years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And Solomon slept with his fathers, and was buried in the city of David his father: and Rehoboam his son reigned in his stead.'
