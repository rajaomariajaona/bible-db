document_id: 2SA.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And there happened to be there a man of Belial, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Sheba, the son of Bichri, a Benjamite: and he blew a trumpet, and said, We have no part in David, neither have we inheritance in the son of Jesse: every man to his tents, O Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So every man of Israel went up from after David, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' followed Sheba the son of Bichri: but the men of Judah clave unto their king, from Jordan even to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David came to his house at Jerusalem; and the king took the ten women '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' concubines, whom he had left to keep the house, and put them in ward, and fed them, but went not in unto them. So they were shut up unto the day of their death, living in widowhood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then said the king to Amasa, Assemble me the men of Judah within three days, and be thou here present. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So Amasa went to assemble '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the men of
  - type: text
    text: ' Judah: but he tarried longer than the set time which he had appointed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And David said to Abishai, Now shall Sheba the son of Bichri do us more harm than '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' Absalom: take thou thy lord''s servants, and pursue after him, lest he get him fenced cities, and escape us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And there went out after him Joab''s men, and the Cherethites, and the Pelethites, and all the mighty men: and they went out of Jerusalem, to pursue after Sheba the son of Bichri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' at the great stone which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Gibeon, Amasa went before them. And Joab''s garment that he had put on was girded unto him, and upon it a girdle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a sword fastened upon his loins in the sheath thereof; and as he went forth it fell out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Joab said to Amasa, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou in health, my brother? And Joab took Amasa by the beard with the right hand to kiss him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Amasa took no heed to the sword that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Joab''s hand: so he smote him therewith in the fifth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: rib
  - type: text
    text: ', and shed out his bowels to the ground, and struck him not again; and he died.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Joab and Abishai his brother pursued after Sheba the son of Bichri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And one of Joab''s men stood by him, and said, He that favoureth Joab, and he that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' for David, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let him go
  - type: text
    text: ' after Joab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Amasa wallowed in blood in the midst of the highway. And when the man saw that all the people stood still, he removed Amasa out of the highway into the field, and cast a cloth upon him, when he saw that every one that came by him stood still. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When he was removed out of the highway, all the people went on after Joab, to pursue after Sheba the son of Bichri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he went through all the tribes of Israel unto Abel, and to Beth-maachah, and all the Berites: and they were gathered together, and went also after him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they came and besieged him in Abel of Beth-maachah, and they cast up a bank against the city, and it stood in the trench: and all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with Joab battered the wall, to throw it down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then cried a wise woman out of the city, Hear, hear; say, I pray you, unto Joab, Come near hither, that I may speak with thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when he was come near unto her, the woman said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou Joab? And he answered, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am he
  - type: text
    text: '. Then she said unto him, Hear the words of thine handmaid. And he answered, I do hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then she spake, saying, They were wont to speak in old time, saying, They shall surely ask '
  - type: usfm
    marker: add
    children:
    - type: text
      text: counsel
  - type: text
    text: ' at Abel: and so they ended '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the matter
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am one of them that are
  - type: text
    text: ' peaceable '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful in Israel: thou seekest to destroy a city and a mother in Israel: why wilt thou swallow up the inheritance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Joab answered and said, Far be it, far be it from me, that I should swallow up or destroy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The matter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not so: but a man of mount Ephraim, Sheba the son of Bichri by name, hath lifted up his hand against the king, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' against David: deliver him only, and I will depart from the city. And the woman said unto Joab, Behold, his head shall be thrown to thee over the wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the woman went unto all the people in her wisdom. And they cut off the head of Sheba the son of Bichri, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out to Joab. And he blew a trumpet, and they retired from the city, every man to his tent. And Joab returned to Jerusalem unto the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now Joab '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over all the host of Israel: and Benaiah the son of Jehoiada '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the Cherethites and over the Pelethites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and Adoram '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the tribute: and Jehoshaphat the son of Ahilud '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' recorder: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and Sheva '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' scribe: and Zadok and Abiathar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the priests: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: and Ira also the Jairite was a chief ruler about David.
