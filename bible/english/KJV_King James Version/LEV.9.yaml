document_id: LEV.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Induction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass on the eighth day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Moses called Aaron and his sons, and the elders of Israel; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'but the fat, and the kidneys, and the caul above the liver of the sin offering, he burnt upon the altar; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the flesh and the hide he burnt with fire without the camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And he slew the burnt offering; and Aaron''s sons presented unto him the blood, which he sprinkled round about upon the altar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they presented the burnt offering unto him, with the pieces thereof, and the head: and he burnt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' upon the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he did wash the inwards and the legs, and burnt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' upon the burnt offering on the altar.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he brought the people''s offering, and took the goat, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the sin offering for the people, and slew it, and offered it for sin, as the first. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he brought the burnt offering, and offered it according to the manner. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he brought the meat offering, and took an handful thereof, and burnt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the altar, beside the burnt sacrifice of the morning. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He slew also the bullock and the ram '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sacrifice of peace offerings, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' for the people: and Aaron''s sons presented unto him the blood, which he sprinkled upon the altar round about, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and the fat of the bullock and of the ram, the rump, and that which covereth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the inwards
    - type: text
      text: ', and the kidneys, and the caul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: above
    - type: text
      text: ' the liver: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and he said unto Aaron, Take thee a young calf for a sin offering, and a ram for a burnt offering, without blemish, and offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and they put the fat upon the breasts, and he burnt the fat upon the altar: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and the breasts and the right shoulder Aaron waved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a wave offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; as Moses commanded.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Aaron lifted up his hand toward the people, and blessed them, and came down from offering of the sin offering, and the burnt offering, and peace offerings. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And Moses and Aaron went into the tabernacle of the congregation, and came out, and blessed the people: and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared unto all the people. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And there came a fire out from before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and consumed upon the altar the burnt offering and the fat: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' when all the people saw, they shouted, and fell on their faces.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And unto the children of Israel thou shalt speak, saying, Take ye a kid of the goats for a sin offering; and a calf and a lamb, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' of the first year, without blemish, for a burnt offering; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'also a bullock and a ram for peace offerings, to sacrifice before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and a meat offering mingled with oil: for to day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will appear unto you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which Moses commanded before the tabernacle of the congregation: and all the congregation drew near and stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Moses said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded that ye should do: and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall appear unto you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Moses said unto Aaron, Go unto the altar, and offer thy sin offering, and thy burnt offering, and make an atonement for thyself, and for the people: and offer the offering of the people, and make an atonement for them; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aaron therefore went unto the altar, and slew the calf of the sin offering, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' for himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the sons of Aaron brought the blood unto him: and he dipped his finger in the blood, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the horns of the altar, and poured out the blood at the bottom of the altar: '
