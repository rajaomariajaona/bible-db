document_id: JHN.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His First Miracle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the third day there was a marriage in Cana of Galilee; and the mother of Jesus was there: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and both Jesus was called, and his disciples, to the marriage. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when they wanted wine, the mother of Jesus saith unto him, They have no wine. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus saith unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woman, what have I to do with thee? mine hour is not yet come.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'His mother saith unto the servants, Whatsoever he saith unto you, do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there were set there six waterpots of stone, after the manner of the purifying of the Jews, containing two or three firkins apiece. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Fill the waterpots with water.
  - type: text
    text: ' And they filled them up to the brim. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Draw out now, and bear unto the governor of the feast.
  - type: text
    text: ' And they bare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the ruler of the feast had tasted the water that was made wine, and knew not whence it was: (but the servants which drew the water knew;) the governor of the feast called the bridegroom, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and saith unto him, Every man at the beginning doth set forth good wine; and when men have well drunk, then that which is worse: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' thou hast kept the good wine until now. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: This beginning of miracles did Jesus in Cana of Galilee, and manifested forth his glory; and his disciples believed on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After this he went down to Capernaum, he, and his mother, and his brethren, and his disciples: and they continued there not many days.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The First Passover
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the Jews'' passover was at hand, and Jesus went up to Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and found in the temple those that sold oxen and sheep and doves, and the changers of money sitting: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and when he had made a scourge of small cords, he drove them all out of the temple, and the sheep, and the oxen; and poured out the changers'' money, and overthrew the tables; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and said unto them that sold doves, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take these things hence; make not my Father's house an house of merchandise.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And his disciples remembered that it was written, The zeal of thine house hath eaten me up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then answered the Jews and said unto him, What sign shewest thou unto us, seeing that thou doest these things? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Destroy this temple, and in three days I will raise it up.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then said the Jews, Forty and six years was this temple in building, and wilt thou rear it up in three days? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But he spake of the temple of his body. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When therefore he was risen from the dead, his disciples remembered that he had said this unto them; and they believed the scripture, and the word which Jesus had said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now when he was in Jerusalem at the passover, in the feast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ', many believed in his name, when they saw the miracles which he did. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But Jesus did not commit himself unto them, because he knew all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and needed not that any should testify of man: for he knew what was in man.'
