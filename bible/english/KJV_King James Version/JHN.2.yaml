verses:
  '1':
  - type: heading
    content: His First Miracle
  - type: text
    content: 'And the third day there was a marriage in Cana of Galilee; and the mother of Jesus was there: '
  '10':
  - type: text
    content: 'and saith unto him, Every man at the beginning doth set forth good wine; and when men have well drunk, then that which is worse: '
  - type: text
    content: but
  - type: text
    content: ' thou hast kept the good wine until now. '
  '11':
  - type: text
    content: This beginning of miracles did Jesus in Cana of Galilee, and manifested forth his glory; and his disciples believed on him.
  '12':
  - type: text
    content: 'After this he went down to Capernaum, he, and his mother, and his brethren, and his disciples: and they continued there not many days.'
  - type: heading
    content: The First Passover
  '13':
  - type: text
    content: 'And the Jews'' passover was at hand, and Jesus went up to Jerusalem, '
  '14':
  - type: text
    content: 'and found in the temple those that sold oxen and sheep and doves, and the changers of money sitting: '
  '15':
  - type: text
    content: 'and when he had made a scourge of small cords, he drove them all out of the temple, and the sheep, and the oxen; and poured out the changers'' money, and overthrew the tables; '
  '16':
  - type: text
    content: 'and said unto them that sold doves, '
  - type: text
    content: Take these things hence; make not my Father's house an house of merchandise.
  - type: text
    content: ' '
  '17':
  - type: text
    content: And his disciples remembered that it was written, The zeal of thine house hath eaten me up.
  '18':
  - type: text
    content: 'Then answered the Jews and said unto him, What sign shewest thou unto us, seeing that thou doest these things? '
  '19':
  - type: text
    content: 'Jesus answered and said unto them, '
  - type: text
    content: Destroy this temple, and in three days I will raise it up.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'and both Jesus was called, and his disciples, to the marriage. '
  '20':
  - type: text
    content: 'Then said the Jews, Forty and six years was this temple in building, and wilt thou rear it up in three days? '
  '21':
  - type: text
    content: 'But he spake of the temple of his body. '
  '22':
  - type: text
    content: When therefore he was risen from the dead, his disciples remembered that he had said this unto them; and they believed the scripture, and the word which Jesus had said.
  '23':
  - type: text
    content: 'Now when he was in Jerusalem at the passover, in the feast '
  - type: text
    content: day
  - type: text
    content: ', many believed in his name, when they saw the miracles which he did. '
  '24':
  - type: text
    content: 'But Jesus did not commit himself unto them, because he knew all '
  - type: text
    content: men
  - type: text
    content: ', '
  '25':
  - type: text
    content: 'and needed not that any should testify of man: for he knew what was in man.'
  '3':
  - type: text
    content: 'And when they wanted wine, the mother of Jesus saith unto him, They have no wine. '
  '4':
  - type: text
    content: 'Jesus saith unto her, '
  - type: text
    content: Woman, what have I to do with thee? mine hour is not yet come.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'His mother saith unto the servants, Whatsoever he saith unto you, do '
  - type: text
    content: it
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And there were set there six waterpots of stone, after the manner of the purifying of the Jews, containing two or three firkins apiece. '
  '7':
  - type: text
    content: 'Jesus saith unto them, '
  - type: text
    content: Fill the waterpots with water.
  - type: text
    content: ' And they filled them up to the brim. '
  '8':
  - type: text
    content: 'And he saith unto them, '
  - type: text
    content: Draw out now, and bear unto the governor of the feast.
  - type: text
    content: ' And they bare '
  - type: text
    content: it
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'When the ruler of the feast had tasted the water that was made wine, and knew not whence it was: (but the servants which drew the water knew;) the governor of the feast called the bridegroom, '
