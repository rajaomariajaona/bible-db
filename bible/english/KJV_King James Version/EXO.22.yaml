document_id: EXO.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: If a man shall steal an ox, or a sheep, and kill it, or sell it; he shall restore five oxen for an ox, and four sheep for a sheep.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If a man deliver unto his neighbour an ass, or an ox, or a sheep, or any beast, to keep; and it die, or be hurt, or driven away, no man seeing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' shall an oath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' be between them both, that he hath not put his hand unto his neighbour''s goods; and the owner of it shall accept '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: ', and he shall not make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' good. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And if it be stolen from him, he shall make restitution unto the owner thereof. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'If it be torn in pieces, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' let him bring it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' witness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he shall not make good that which was torn.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And if a man borrow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' of his neighbour, and it be hurt, or die, the owner thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' not with it, he shall surely make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' good. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' if the owner thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with it, he shall not make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' good: if it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' an hired '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ', it came for his hire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And if a man entice a maid that is not betrothed, and lie with her, he shall surely endow her to be his wife. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: If her father utterly refuse to give her unto him, he shall pay money according to the dowry of virgins.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Thou shalt not suffer a witch to live.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Whosoever lieth with a beast shall surely be put to death.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'If a thief be found breaking up, and be smitten that he die, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall
    - type: text
      text: ' no blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be shed
    - type: text
      text: ' for him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He that sacrificeth unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' god, save unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' only, he shall be utterly destroyed.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Thou shalt neither vex a stranger, nor oppress him: for ye were strangers in the land of Egypt.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ye shall not afflict any widow, or fatherless child. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'If thou afflict them in any wise, and they cry at all unto me, I will surely hear their cry; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: and my wrath shall wax hot, and I will kill you with the sword; and your wives shall be widows, and your children fatherless.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'If thou lend money to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any of
    - type: text
      text: ' my people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' poor by thee, thou shalt not be to him as an usurer, neither shalt thou lay upon him usury. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'If thou at all take thy neighbour''s raiment to pledge, thou shalt deliver it unto him by that the sun goeth down: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his covering only, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his raiment for his skin: wherein shall he sleep? and it shall come to pass, when he crieth unto me, that I will hear; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' gracious.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Thou shalt not revile the gods, nor curse the ruler of thy people.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Thou shalt not delay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to offer
    - type: text
      text: ' the first of thy ripe fruits, and of thy liquors: the firstborn of thy sons shalt thou give unto me. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If the sun be risen upon him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shed
    - type: text
      text: ' for him; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' he should make full restitution; if he have nothing, then he shall be sold for his theft. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Likewise shalt thou do with thine oxen, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' with thy sheep: seven days it shall be with his dam; on the eighth day thou shalt give it me.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And ye shall be holy men unto me: neither shall ye eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' torn of beasts in the field; ye shall cast it to the dogs.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If the theft be certainly found in his hand alive, whether it be ox, or ass, or sheep; he shall restore double.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: If a man shall cause a field or vineyard to be eaten, and shall put in his beast, and shall feed in another man's field; of the best of his own field, and of the best of his own vineyard, shall he make restitution.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'If fire break out, and catch in thorns, so that the stacks of corn, or the standing corn, or the field, be consumed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therewith
    - type: text
      text: ; he that kindled the fire shall surely make restitution.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'If a man shall deliver unto his neighbour money or stuff to keep, and it be stolen out of the man''s house; if the thief be found, let him pay double. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'If the thief be not found, then the master of the house shall be brought unto the judges, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to see
    - type: text
      text: ' whether he have put his hand unto his neighbour''s goods. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For all manner of trespass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it be
    - type: text
      text: ' for ox, for ass, for sheep, for raiment, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' for any manner of lost thing, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' challengeth to be his, the cause of both parties shall come before the judges; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' whom the judges shall condemn, he shall pay double unto his neighbour.'
