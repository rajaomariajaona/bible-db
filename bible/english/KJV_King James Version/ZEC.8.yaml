  '1':
  - type: heading
    content: A City of Truth
  - type: text
    content: 'Again the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts came '
  - type: text
    content: to me
  - type: text
    content: ', saying, '
  '10':
  - type: text
    content: 'For before these days there was no hire for man, nor any hire for beast; neither '
  - type: text
    content: was there any
  - type: text
    content: ' peace to him that went out or came in because of the affliction: for I set all men every one against his neighbour. '
  '11':
  - type: text
    content: 'But now I '
  - type: text
    content: will
  - type: text
    content: ' not '
  - type: text
    content: be
  - type: text
    content: ' unto the residue of this people as in the former days, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '12':
  - type: text
    content: 'For the seed '
  - type: text
    content: shall be
  - type: text
    content: ' prosperous; the vine shall give her fruit, and the ground shall give her increase, and the heavens shall give their dew; and I will cause the remnant of this people to possess all these '
  - type: text
    content: things
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' as ye were a curse among the heathen, O house of Judah, and house of Israel; so will I save you, and ye shall be a blessing: fear not, '
  - type: text
    content: but
  - type: text
    content: ' let your hands be strong.'
  '14':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; As I thought to punish you, when your fathers provoked me to wrath, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and I repented not: '
  '15':
  - type: text
    content: 'so again have I thought in these days to do well unto Jerusalem and to the house of Judah: fear ye not. '
  '16':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the things that ye shall do; Speak ye every man the truth to his neighbour; execute the judgment of truth and peace in your gates: '
  '17':
  - type: text
    content: 'and let none of you imagine evil in your hearts against his neighbour; and love no false oath: for all these '
  - type: text
    content: are things
  - type: text
    content: ' that I hate, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '18':
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts came unto me, saying, '
  '19':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; The fast of the fourth '
  - type: text
    content: month
  - type: text
    content: ', and the fast of the fifth, and the fast of the seventh, and the fast of the tenth, shall be to the house of Judah joy and gladness, and cheerful feasts; therefore love the truth and peace. '
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; I was jealous for Zion with great jealousy, and I was jealous for her with great fury. '
  '20':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; '
  - type: text
    content: It shall
  - type: text
    content: ' yet '
  - type: text
    content: come to pass
  - type: text
    content: ', that there shall come people, and the inhabitants of many cities: '
  '21':
  - type: text
    content: 'and the inhabitants of one '
  - type: text
    content: city
  - type: text
    content: ' shall go to another, saying, Let us go speedily to pray before the '
  - type: text
    content: LORD
  - type: text
    content: ', and to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts: I will go also. '
  '22':
  - type: text
    content: 'Yea, many people and strong nations shall come to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts in Jerusalem, and to pray before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; In those days '
  - type: text
    content: it shall come to pass
  - type: text
    content: ', that ten men shall take hold out of all languages of the nations, even shall take hold of the skirt of him that is a Jew, saying, We will go with you: for we have heard '
  - type: text
    content: that
  - type: text
    content: ' God '
  - type: text
    content: is
  - type: text
    content: ' with you.'
  '3':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; I am returned unto Zion, and will dwell in the midst of Jerusalem: and Jerusalem shall be called a city of truth; and the mountain of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts the holy mountain. '
  '4':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; There shall yet old men and old women dwell in the streets of Jerusalem, and every man with his staff in his hand for very age. '
  '5':
  - type: text
    content: 'And the streets of the city shall be full of boys and girls playing in the streets thereof. '
  '6':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; If it be marvellous in the eyes of the remnant of this people in these days, should it also be marvellous in mine eyes? saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '7':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Behold, I will save my people from the east country, and from the west country; '
  '8':
  - type: text
    content: 'and I will bring them, and they shall dwell in the midst of Jerusalem: and they shall be my people, and I will be their God, in truth and in righteousness.'
  '9':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Let your hands be strong, ye that hear in these days these words by the mouth of the prophets, which '
  - type: text
    content: were
  - type: text
    content: ' in the day '
  - type: text
    content: that
  - type: text
    content: ' the foundation of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts was laid, that the temple might be built. '
