document_id: ZEC.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A City of Truth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts came '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to me
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For before these days there was no hire for man, nor any hire for beast; neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was there any
    - type: text
      text: ' peace to him that went out or came in because of the affliction: for I set all men every one against his neighbour. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto the residue of this people as in the former days, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' prosperous; the vine shall give her fruit, and the ground shall give her increase, and the heavens shall give their dew; and I will cause the remnant of this people to possess all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' as ye were a curse among the heathen, O house of Judah, and house of Israel; so will I save you, and ye shall be a blessing: fear not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' let your hands be strong.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; As I thought to punish you, when your fathers provoked me to wrath, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and I repented not: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so again have I thought in these days to do well unto Jerusalem and to the house of Judah: fear ye not. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the things that ye shall do; Speak ye every man the truth to his neighbour; execute the judgment of truth and peace in your gates: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and let none of you imagine evil in your hearts against his neighbour; and love no false oath: for all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are things
    - type: text
      text: ' that I hate, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts came unto me, saying, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; The fast of the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', and the fast of the fifth, and the fast of the seventh, and the fast of the tenth, shall be to the house of Judah joy and gladness, and cheerful feasts; therefore love the truth and peace. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; I was jealous for Zion with great jealousy, and I was jealous for her with great fury. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It shall
    - type: text
      text: ' yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: come to pass
    - type: text
      text: ', that there shall come people, and the inhabitants of many cities: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the inhabitants of one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city
    - type: text
      text: ' shall go to another, saying, Let us go speedily to pray before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts: I will go also. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, many people and strong nations shall come to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts in Jerusalem, and to pray before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; In those days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall come to pass
    - type: text
      text: ', that ten men shall take hold out of all languages of the nations, even shall take hold of the skirt of him that is a Jew, saying, We will go with you: for we have heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with you.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; I am returned unto Zion, and will dwell in the midst of Jerusalem: and Jerusalem shall be called a city of truth; and the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts the holy mountain. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; There shall yet old men and old women dwell in the streets of Jerusalem, and every man with his staff in his hand for very age. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the streets of the city shall be full of boys and girls playing in the streets thereof. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; If it be marvellous in the eyes of the remnant of this people in these days, should it also be marvellous in mine eyes? saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; Behold, I will save my people from the east country, and from the west country; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will bring them, and they shall dwell in the midst of Jerusalem: and they shall be my people, and I will be their God, in truth and in righteousness.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; Let your hands be strong, ye that hear in these days these words by the mouth of the prophets, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the foundation of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts was laid, that the temple might be built. '
