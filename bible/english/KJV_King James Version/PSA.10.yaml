  - type: heading
    content: פ Pe
  '7':
  - type: text
    content: 'His mouth is full of cursing and deceit and fraud:'
  - type: text
    content: 'Under his tongue '
  - type: text
    content: is
  - type: text
    content: ' mischief and vanity.'
  '8':
  - type: text
    content: 'He sitteth in the lurking places of the villages:'
  - type: heading
    content: ע Ain
  - type: text
    content: 'In the secret places doth he murder the innocent: His eyes are privily set against the poor.'
  '9':
  - type: text
    content: 'He lieth in wait secretly as a lion in his den:'
  - type: text
    content: 'He lieth in wait to catch the poor:'
  - type: heading
    content: (צ Zade)
  - type: text
    content: He doth catch the poor, when he draweth him into his net.
