    children:
    - type: text
      text: '1'
  - type: text
    text: 'Why standest thou afar off, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Why
  - type: text
    text: ' hidest thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself
  - type: text
    text: ' in times of trouble?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The wicked in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' pride doth persecute the poor:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them be taken in the devices that they have imagined.
- type: usfm
  marker: qa
  children:
  - type: text
    text: (מ Mem)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the wicked boasteth of his heart's desire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And blesseth the covetous, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whom
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' abhorreth.'
- type: usfm
  marker: qa
  children:
  - type: text
    text: (נ Nun)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The wicked, through the pride of his countenance, will not seek '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'after God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in all his thoughts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'His ways are always grievous; Thy judgments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' far above out of his sight:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' all his enemies, he puffeth at them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He hath said in his heart, I shall not be moved:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I shall
  - type: text
    text: ' never '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in adversity.'
- type: usfm
  marker: qa
  children:
  - type: text
    text: (ס Samek)
  marker-yv: yv-h
- type: usfm
  marker: qa
  children:
  - type: text
    text: פ Pe
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'His mouth is full of cursing and deceit and fraud:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Under his tongue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mischief and vanity.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He sitteth in the lurking places of the villages:'
- type: usfm
  marker: qa
  children:
  - type: text
    text: ע Ain
  marker-yv: yv-h
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the secret places doth he murder the innocent: His eyes are privily set against the poor.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He lieth in wait secretly as a lion in his den:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He lieth in wait to catch the poor:'
- type: usfm
  marker: qa
  children:
  - type: text
    text: (צ Zade)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: He doth catch the poor, when he draweth him into his net.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He croucheth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' humbleth himself,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That the poor may fall by his strong ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He hath said in his heart, God hath forgotten:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hideth his face; he will never see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: qa
  children:
  - type: text
    text: ק Qoph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Arise, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; O God, lift up thine hand:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Forget not the humble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Wherefore doth the wicked contemn God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hath said in his heart, Thou wilt not require '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: qa
  children:
  - type: text
    text: ר Resh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou hast seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; for thou beholdest mischief and spite, to requite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with thy hand:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The poor committeth himself unto thee; Thou art the helper of the fatherless.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ש Shin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Break thou the arm of the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'man:'
  - type: text
    text: ' seek out his wickedness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: till
  - type: text
    text: ' thou find none.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' King for ever and ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The heathen are perished out of his land.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ת Taw
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou hast heard the desire of the humble:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou wilt prepare their heart, thou wilt cause thine ear to hear:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: To judge the fatherless and the oppressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That the man of the earth may no more oppress.
