  '4':
  - type: text
    content: 'The wicked, through the pride of his countenance, will not seek '
  - type: text
    content: 'after God:'
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' not in all his thoughts.'
  '5':
  - type: text
    content: 'His ways are always grievous; Thy judgments '
  - type: text
    content: are
  - type: text
    content: ' far above out of his sight:'
  - type: text
