verses:
  '1':
  - type: heading
    content: Inheritance of Daughters
  - type: text
    content: 'Then came the daughters of Zelophehad, the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, of the families of Manasseh the son of Joseph: and these '
  - type: text
    content: are
  - type: text
    content: ' the names of his daughters; Mahlah, Noah, and Hoglah, and Milcah, and Tirzah. '
  '10':
  - type: text
    content: 'And if he have no brethren, then ye shall give his inheritance unto his father''s brethren. '
  '11':
  - type: text
    content: 'And if his father have no brethren, then ye shall give his inheritance unto his kinsman that is next to him of his family, and he shall possess it: and it shall be unto the children of Israel a statute of judgment, as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: Moses and Joshua
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Get thee up into this mount Abarim, and see the land which I have given unto the children of Israel. '
  '13':
  - type: text
    content: 'And when thou hast seen it, thou also shalt be gathered unto thy people, as Aaron thy brother was gathered. '
  '14':
  - type: text
    content: 'For ye rebelled against my commandment in the desert of Zin, in the strife of the congregation, to sanctify me at the water before their eyes: that '
  - type: text
    content: is
  - type: text
    content: ' the water of Meribah in Kadesh in the wilderness of Zin.'
  '15':
  - type: text
    content: 'And Moses spake unto the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '16':
  - type: text
    content: 'Let the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of the spirits of all flesh, set a man over the congregation, '
  '17':
  - type: text
    content: 'which may go out before them, and which may go in before them, and which may lead them out, and which may bring them in; that the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: ' be not as sheep which have no shepherd. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Take thee Joshua the son of Nun, a man in whom '
  - type: text
    content: is
  - type: text
    content: ' the spirit, and lay thine hand upon him; '
  '19':
  - type: text
    content: 'and set him before Eleazar the priest, and before all the congregation; and give him a charge in their sight. '
  '2':
  - type: text
    content: 'And they stood before Moses, and before Eleazar the priest, and before the princes and all the congregation, '
  - type: text
    content: by
  - type: text
    content: ' the door of the tabernacle of the congregation, saying, '
  '20':
  - type: text
    content: 'And thou shalt put '
  - type: text
    content: some
  - type: text
    content: ' of thine honour upon him, that all the congregation of the children of Israel may be obedient. '
  '21':
  - type: text
    content: 'And he shall stand before Eleazar the priest, who shall ask '
  - type: text
    content: counsel
  - type: text
    content: ' for him after the judgment of Urim before the '
  - type: text
    content: LORD
  - type: text
    content: ': at his word shall they go out, and at his word they shall come in, '
  - type: text
    content: both
  - type: text
    content: ' he, and all the children of Israel with him, even all the congregation. '
  '22':
  - type: text
    content: 'And Moses did as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded him: and he took Joshua, and set him before Eleazar the priest, and before all the congregation: '
  '23':
  - type: text
    content: 'and he laid his hands upon him, and gave him a charge, as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded by the hand of Moses.'
  '3':
  - type: text
    content: 'Our father died in the wilderness, and he was not in the company of them that gathered themselves together against the '
  - type: text
    content: LORD
  - type: text
    content: ' in the company of Korah; but died in his own sin, and had no sons. '
  '4':
  - type: text
    content: 'Why should the name of our father be done away from among his family, because he hath no son? Give unto us '
  - type: text
    content: therefore
  - type: text
    content: ' a possession among the brethren of our father. '
  '5':
  - type: text
    content: 'And Moses brought their cause before the '
  - type: text
    content: LORD
  - type: text
    content: .
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '7':
  - type: text
    content: 'The daughters of Zelophehad speak right: thou shalt surely give them a possession of an inheritance among their father''s brethren; and thou shalt cause the inheritance of their father to pass unto them. '
  '8':
  - type: text
    content: 'And thou shalt speak unto the children of Israel, saying, If a man die, and have no son, then ye shall cause his inheritance to pass unto his daughter. '
  '9':
  - type: text
    content: 'And if he have no daughter, then ye shall give his inheritance unto his brethren. '
