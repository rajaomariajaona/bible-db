document_id: PSA.67,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician on Neginoth, A Psalm '
  - type: text
    content: or
  - type: text
    content: ' Song.'
  - type: text
    content: God be merciful unto us, and bless us;
  - type: text
    content: And
  - type: text
    content: ' cause his face to shine upon us; '
  - type: text
    content: Selah.
  '2':
  - type: text
    content: That thy way may be known upon earth,
  - type: text
    content: Thy saving health among all nations.
  '3':
  - type: text
    content: Let the people praise thee, O God;
  - type: text
    content: Let all the people praise thee.
  '4':
  - type: text
    content: 'O let the nations be glad and sing for joy:'
  - type: text
    content: 'For thou shalt judge the people righteously, and govern the nations upon earth. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: Let the people praise thee, O God;
  - type: text
    content: Let all the people praise thee.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' shall the earth yield her increase;'
  - type: text
    content: And
  - type: text
    content: ' God, '
  - type: text
    content: even
  - type: text
    content: ' our own God, shall bless us.'
  '7':
  - type: text
    content: God shall bless us;
  - type: text
    content: And all the ends of the earth shall fear him.
