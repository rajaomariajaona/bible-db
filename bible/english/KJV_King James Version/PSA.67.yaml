segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician on Neginoth, A Psalm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' Song.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God be merciful unto us, and bless us;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' cause his face to shine upon us; '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: That thy way may be known upon earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy saving health among all nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let the people praise thee, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all the people praise thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'O let the nations be glad and sing for joy:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For thou shalt judge the people righteously, and govern the nations upon earth. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the people praise thee, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all the people praise thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' shall the earth yield her increase;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' our own God, shall bless us.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God shall bless us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the ends of the earth shall fear him.
