document_id: 2CO.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Proof of Our Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Do we begin again to commend ourselves? or need we, as some '
  - type: usfm
    marker: add
    children:
    - type: text
      text: others
  - type: text
    text: ', epistles of commendation to you, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: letters
  - type: text
    text: ' of commendation from you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ye are our epistle written in our hearts, known and read of all men: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: add
    children:
    - type: text
      text: forasmuch as ye are
  - type: text
    text: ' manifestly declared to be the epistle of Christ ministered by us, written not with ink, but with the Spirit of the living God; not in tables of stone, but in fleshy tables of the heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And such trust have we through Christ to God-ward: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'not that we are sufficient of ourselves to think any thing as of ourselves; but our sufficiency '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'who also hath made us able ministers of the new testament; not of the letter, but of the spirit: for the letter killeth, but the spirit giveth life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But if the ministration of death, written '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' engraven in stones, was glorious, so that the children of Israel could not stedfastly behold the face of Moses for the glory of his countenance; which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: glory
  - type: text
    text: ' was to be done away: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'how shall not the ministration of the spirit be rather glorious? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For if the ministration of condemnation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' glory, much more doth the ministration of righteousness exceed in glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For even that which was made glorious had no glory in this respect, by reason of the glory that excelleth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For if that which is done away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' glorious, much more that which remaineth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' glorious.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Seeing then that we have such hope, we use great plainness of speech: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and not as Moses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' put a vail over his face, that the children of Israel could not stedfastly look to the end of that which is abolished: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but their minds were blinded: for until this day remaineth the same vail untaken away in the reading of the old testament; which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: vail
  - type: text
    text: ' is done away in Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But even unto this day, when Moses is read, the vail is upon their heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nevertheless when it shall turn to the Lord, the vail shall be taken away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now the Lord is that Spirit: and where the Spirit of the Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' liberty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But we all, with open face beholding as in a glass the glory of the Lord, are changed into the same image from glory to glory, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' as by the Spirit of the Lord.'
