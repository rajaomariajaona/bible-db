document_id: 2CO.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Proof of Our Ministry
  - type: text
    content: 'Do we begin again to commend ourselves? or need we, as some '
  - type: text
    content: others
  - type: text
    content: ', epistles of commendation to you, or '
  - type: text
    content: letters
  - type: text
    content: ' of commendation from you? '
  '10':
  - type: text
    content: 'For even that which was made glorious had no glory in this respect, by reason of the glory that excelleth. '
  '11':
  - type: text
    content: 'For if that which is done away '
  - type: text
    content: was
  - type: text
    content: ' glorious, much more that which remaineth '
  - type: text
    content: is
  - type: text
    content: ' glorious.'
  '12':
  - type: text
    content: 'Seeing then that we have such hope, we use great plainness of speech: '
  '13':
  - type: text
    content: 'and not as Moses, '
  - type: text
    content: which
  - type: text
    content: ' put a vail over his face, that the children of Israel could not stedfastly look to the end of that which is abolished: '
  '14':
  - type: text
    content: 'but their minds were blinded: for until this day remaineth the same vail untaken away in the reading of the old testament; which '
  - type: text
    content: vail
  - type: text
    content: ' is done away in Christ. '
  '15':
  - type: text
    content: 'But even unto this day, when Moses is read, the vail is upon their heart. '
  '16':
  - type: text
    content: Nevertheless when it shall turn to the Lord, the vail shall be taken away.
  '17':
  - type: text
    content: 'Now the Lord is that Spirit: and where the Spirit of the Lord '
  - type: text
    content: is
  - type: text
    content: ', there '
  - type: text
    content: is
  - type: text
    content: ' liberty. '
  '18':
  - type: text
    content: 'But we all, with open face beholding as in a glass the glory of the Lord, are changed into the same image from glory to glory, '
  - type: text
    content: even
  - type: text
    content: ' as by the Spirit of the Lord.'
  '2':
  - type: text
    content: 'Ye are our epistle written in our hearts, known and read of all men: '
  '3':
  - type: text
    content: forasmuch as ye are
  - type: text
    content: ' manifestly declared to be the epistle of Christ ministered by us, written not with ink, but with the Spirit of the living God; not in tables of stone, but in fleshy tables of the heart.'
  '4':
  - type: text
    content: 'And such trust have we through Christ to God-ward: '
  '5':
  - type: text
    content: 'not that we are sufficient of ourselves to think any thing as of ourselves; but our sufficiency '
  - type: text
    content: is
  - type: text
    content: ' of God; '
  '6':
  - type: text
    content: 'who also hath made us able ministers of the new testament; not of the letter, but of the spirit: for the letter killeth, but the spirit giveth life.'
  '7':
  - type: text
    content: 'But if the ministration of death, written '
  - type: text
    content: and
  - type: text
    content: ' engraven in stones, was glorious, so that the children of Israel could not stedfastly behold the face of Moses for the glory of his countenance; which '
  - type: text
    content: glory
  - type: text
    content: ' was to be done away: '
  '8':
  - type: text
    content: 'how shall not the ministration of the spirit be rather glorious? '
  '9':
  - type: text
    content: 'For if the ministration of condemnation '
  - type: text
    content: be
  - type: text
    content: ' glory, much more doth the ministration of righteousness exceed in glory. '
