document_id: NEH.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hostility to the Work
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But it came to pass, that when Sanballat heard that we builded the wall, he was wroth, and took great indignation, and mocked the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he spake before his brethren and the army of Samaria, and said, What do these feeble Jews? will they fortify themselves? will they sacrifice? will they make an end in a day? will they revive the stones out of the heaps of the rubbish which are burned? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now Tobiah the Ammonite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by him, and he said, Even that which they build, if a fox go up, he shall even break down their stone wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hear, O our God; for we are despised: and turn their reproach upon their own head, and give them for a prey in the land of captivity: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and cover not their iniquity, and let not their sin be blotted out from before thee: for they have provoked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' to anger before the builders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So built we the wall; and all the wall was joined together unto the half thereof: for the people had a mind to work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But it came to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' when Sanballat, and Tobiah, and the Arabians, and the Ammonites, and the Ashdodites, heard that the walls of Jerusalem were made up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that the breaches began to be stopped, then they were very wroth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and conspired all of them together to come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to fight against Jerusalem, and to hinder it.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Nehemiah's Response
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nevertheless we made our prayer unto our God, and set a watch against them day and night, because of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Judah said, The strength of the bearers of burdens is decayed, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' much rubbish; so that we are not able to build the wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And our adversaries said, They shall not know, neither see, till we come in the midst among them, and slay them, and cause the work to cease. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And it came to pass, that when the Jews which dwelt by them came, they said unto us ten times, From all places whence ye shall return unto us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they will be upon you
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore set I in the lower places behind the wall, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' on the higher places, I even set the people after their families with their swords, their spears, and their bows. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And I looked, and rose up, and said unto the nobles, and to the rulers, and to the rest of the people, Be not ye afraid of them: remember the Lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' great and terrible, and fight for your brethren, your sons, and your daughters, your wives, and your houses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it came to pass, when our enemies heard that it was known unto us, and God had brought their counsel to nought, that we returned all of us to the wall, every one unto his work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it came to pass from that time forth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the half of my servants wrought in the work, and the other half of them held both the spears, the shields, and the bows, and the habergeons; and the rulers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' behind all the house of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They which builded on the wall, and they that bare burdens, with those that laded, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every one
  - type: text
    text: ' with one of his hands wrought in the work, and with the other '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hand
  - type: text
    text: ' held a weapon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For the builders, every one had his sword girded by his side, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' builded. And he that sounded the trumpet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I said unto the nobles, and to the rulers, and to the rest of the people, The work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great and large, and we are separated upon the wall, one far from another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In what place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' ye hear the sound of the trumpet, resort ye thither unto us: our God shall fight for us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So we laboured in the work: and half of them held the spears from the rising of the morning till the stars appeared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Likewise at the same time said I unto the people, Let every one with his servant lodge within Jerusalem, that in the night they may be a guard to us, and labour on the day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So neither I, nor my brethren, nor my servants, nor the men of the guard which followed me, none of us put off our clothes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saving that
  - type: text
    text: ' every one put them off for washing.'
