document_id: 1CH.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Israel; Reuben, Simeon, Levi, and Judah, Issachar, and Zebulun, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dan, Joseph, and Benjamin, Naphtali, Gad, and Asher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Judah; Er, and Onan, and Shelah: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' three were born unto him of the daughter of Shua the Canaanitess. And Er, the firstborn of Judah, was evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and he slew him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Tamar his daughter in law bare him Pharez and Zerah. All the sons of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' five.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The sons of Pharez; Hezron, and Hamul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the sons of Zerah; Zimri, and Ethan, and Heman, and Calcol, and Dara: five of them in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the sons of Carmi; Achar, the troubler of Israel, who transgressed in the thing accursed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the sons of Ethan; Azariah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons also of Hezron, that were born unto him; Jerahmeel, and Ram, and Chelubai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Ram begat Amminadab; and Amminadab begat Nahshon, prince of the children of Judah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and Nahshon begat Salma, and Salma begat Boaz, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and Boaz begat Obed, and Obed begat Jesse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and Jesse begat his firstborn Eliab, and Abinadab the second, and Shimma the third, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nethaneel the fourth, Raddai the fifth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ozem the sixth, David the seventh: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'whose sisters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Zeruiah, and Abigail. And the sons of Zeruiah; Abishai, and Joab, and Asahel, three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Abigail bare Amasa: and the father of Amasa '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jether the Ishmeelite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Caleb the son of Hezron begat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: children
  - type: text
    text: ' of Azubah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' wife, and of Jerioth: her sons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these; Jesher, and Shobab, and Ardon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when Azubah was dead, Caleb took unto him Ephrath, which bare him Hur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And Hur begat Uri, and Uri begat Bezaleel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And afterward Hezron went in to the daughter of Machir the father of Gilead, whom he married when he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' threescore years old; and she bare him Segub. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Segub begat Jair, who had three and twenty cities in the land of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he took Geshur, and Aram, with the towns of Jair, from them, with Kenath, and the towns thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' threescore cities. All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonged to
  - type: text
    text: ' the sons of Machir the father of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And after that Hezron was dead in Caleb-ephratah, then Abiah Hezron's wife bare him Ashur the father of Tekoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the sons of Jerahmeel the firstborn of Hezron were, Ram the firstborn, and Bunah, and Oren, and Ozem, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Ahijah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jerahmeel had also another wife, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Atarah; she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the mother of Onam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the sons of Ram the firstborn of Jerahmeel were, Maaz, and Jamin, and Eker. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the sons of Onam were, Shammai, and Jada. And the sons of Shammai; Nadab, and Abishur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the name of the wife of Abishur '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Abihail, and she bare him Ahban, and Molid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the sons of Nadab; Seled, and Appaim: but Seled died without children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the sons of Appaim; Ishi. And the sons of Ishi; Sheshan. And the children of Sheshan; Ahlai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the sons of Jada the brother of Shammai; Jether, and Jonathan: and Jether died without children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the sons of Jonathan; Peleth, and Zaza. These were the sons of Jerahmeel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now Sheshan had no sons, but daughters. And Sheshan had a servant, an Egyptian, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jarha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And Sheshan gave his daughter to Jarha his servant to wife; and she bare him Attai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Attai begat Nathan, and Nathan begat Zabad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and Zabad begat Ephlal, and Ephlal begat Obed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and Obed begat Jehu, and Jehu begat Azariah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'and Azariah begat Helez, and Helez begat Eleasah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and Eleasah begat Sisamai, and Sisamai begat Shallum, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: and Shallum begat Jekamiah, and Jekamiah begat Elishama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Now the sons of Caleb the brother of Jerahmeel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Mesha his firstborn, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the father of Ziph; and the sons of Mareshah the father of Hebron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And the sons of Hebron; Korah, and Tappuah, and Rekem, and Shema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And Shema begat Raham, the father of Jorkoam: and Rekem begat Shammai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And the son of Shammai '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Maon: and Maon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the father of Beth-zur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And Ephah, Caleb''s concubine, bare Haran, and Moza, and Gazez: and Haran begat Gazez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And the sons of Jahdai; Regem, and Jotham, and Gesham, and Pelet, and Ephah, and Shaaph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Maachah, Caleb''s concubine, bare Sheber, and Tirhanah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'She bare also Shaaph the father of Madmannah, Sheva the father of Machbenah, and the father of Gibea: and the daughter of Caleb '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Achsa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'These were the sons of Caleb the son of Hur, the firstborn of Ephratah; Shobal the father of Kirjath-jearim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Salma the father of Beth-lehem, Hareph the father of Beth-gader. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And Shobal the father of Kirjath-jearim had sons; Haroeh, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' half of the Manahethites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And the families of Kirjath-jearim; the Ithrites, and the Puhites, and the Shumathites, and the Mishraites; of them came the Zareathites, and the Eshtaulites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'The sons of Salma; Beth-lehem, and the Netophathites, Ataroth, the house of Joab, and half of the Manahethites, the Zorites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And the families of the scribes which dwelt at Jabez; the Tirathites, the Shimeathites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Suchathites. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the Kenites that came of Hemath, the father of the house of Rechab.'
