document_id: 1CH.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sons of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Israel; Reuben, Simeon, Levi, and Judah, Issachar, and Zebulun, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ram begat Amminadab; and Amminadab begat Nahshon, prince of the children of Judah; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Nahshon begat Salma, and Salma begat Boaz, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Boaz begat Obed, and Obed begat Jesse, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jesse begat his firstborn Eliab, and Abinadab the second, and Shimma the third, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nethaneel the fourth, Raddai the fifth, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ozem the sixth, David the seventh: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whose sisters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' Zeruiah, and Abigail. And the sons of Zeruiah; Abishai, and Joab, and Asahel, three. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abigail bare Amasa: and the father of Amasa '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jether the Ishmeelite.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Caleb the son of Hezron begat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: children
    - type: text
      text: ' of Azubah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wife, and of Jerioth: her sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these; Jesher, and Shobab, and Ardon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Azubah was dead, Caleb took unto him Ephrath, which bare him Hur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dan, Joseph, and Benjamin, Naphtali, Gad, and Asher.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Hur begat Uri, and Uri begat Bezaleel.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And afterward Hezron went in to the daughter of Machir the father of Gilead, whom he married when he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' threescore years old; and she bare him Segub. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Segub begat Jair, who had three and twenty cities in the land of Gilead. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took Geshur, and Aram, with the towns of Jair, from them, with Kenath, and the towns thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' threescore cities. All these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belonged to
    - type: text
      text: ' the sons of Machir the father of Gilead. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after that Hezron was dead in Caleb-ephratah, then Abiah Hezron's wife bare him Ashur the father of Tekoa.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Jerahmeel the firstborn of Hezron were, Ram the firstborn, and Bunah, and Oren, and Ozem, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Ahijah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jerahmeel had also another wife, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Atarah; she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the mother of Onam. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Ram the firstborn of Jerahmeel were, Maaz, and Jamin, and Eker. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Onam were, Shammai, and Jada. And the sons of Shammai; Nadab, and Abishur. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the name of the wife of Abishur '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Abihail, and she bare him Ahban, and Molid. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Judah; Er, and Onan, and Shelah: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' three were born unto him of the daughter of Shua the Canaanitess. And Er, the firstborn of Judah, was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and he slew him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Nadab; Seled, and Appaim: but Seled died without children. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Appaim; Ishi. And the sons of Ishi; Sheshan. And the children of Sheshan; Ahlai. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Jada the brother of Shammai; Jether, and Jonathan: and Jether died without children. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Jonathan; Peleth, and Zaza. These were the sons of Jerahmeel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Sheshan had no sons, but daughters. And Sheshan had a servant, an Egyptian, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jarha. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Sheshan gave his daughter to Jarha his servant to wife; and she bare him Attai. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Attai begat Nathan, and Nathan begat Zabad, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Zabad begat Ephlal, and Ephlal begat Obed, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Obed begat Jehu, and Jehu begat Azariah, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Azariah begat Helez, and Helez begat Eleasah, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Tamar his daughter in law bare him Pharez and Zerah. All the sons of Judah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' five.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Eleasah begat Sisamai, and Sisamai begat Shallum, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Shallum begat Jekamiah, and Jekamiah begat Elishama.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the sons of Caleb the brother of Jerahmeel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ', Mesha his firstborn, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the father of Ziph; and the sons of Mareshah the father of Hebron. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Hebron; Korah, and Tappuah, and Rekem, and Shema. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shema begat Raham, the father of Jorkoam: and Rekem begat Shammai. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the son of Shammai '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Maon: and Maon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the father of Beth-zur. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ephah, Caleb''s concubine, bare Haran, and Moza, and Gazez: and Haran begat Gazez. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Jahdai; Regem, and Jotham, and Gesham, and Pelet, and Ephah, and Shaaph. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maachah, Caleb''s concubine, bare Sheber, and Tirhanah. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She bare also Shaaph the father of Madmannah, Sheva the father of Machbenah, and the father of Gibea: and the daughter of Caleb '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Achsa.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Pharez; Hezron, and Hamul. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the sons of Caleb the son of Hur, the firstborn of Ephratah; Shobal the father of Kirjath-jearim, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salma the father of Beth-lehem, Hareph the father of Beth-gader. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shobal the father of Kirjath-jearim had sons; Haroeh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' half of the Manahethites. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the families of Kirjath-jearim; the Ithrites, and the Puhites, and the Shumathites, and the Mishraites; of them came the Zareathites, and the Eshtaulites. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Salma; Beth-lehem, and the Netophathites, Ataroth, the house of Joab, and half of the Manahethites, the Zorites. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the families of the scribes which dwelt at Jabez; the Tirathites, the Shimeathites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Suchathites. These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the Kenites that came of Hemath, the father of the house of Rechab.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Zerah; Zimri, and Ethan, and Heman, and Calcol, and Dara: five of them in all. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Carmi; Achar, the troubler of Israel, who transgressed in the thing accursed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the sons of Ethan; Azariah.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons also of Hezron, that were born unto him; Jerahmeel, and Ram, and Chelubai. '
