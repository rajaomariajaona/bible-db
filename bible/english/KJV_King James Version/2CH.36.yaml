verses:
  '1':
  - type: heading
    content: Under Egypt
  - type: text
    content: 'Then the people of the land took Jehoahaz the son of Josiah, and made him king in his father''s stead in Jerusalem. '
  '10':
  - type: text
    content: 'And when the year was expired, king Nebuchadnezzar sent, and brought him to Babylon, with the goodly vessels of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and made Zedekiah his brother king over Judah and Jerusalem.'
  '11':
  - type: text
    content: 'Zedekiah '
  - type: text
    content: was
  - type: text
    content: ' one and twenty years old when he began to reign, and reigned eleven years in Jerusalem. '
  '12':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, '
  - type: text
    content: and
  - type: text
    content: ' humbled not himself before Jeremiah the prophet '
  - type: text
    content: speaking
  - type: text
    content: ' from the mouth of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And he also rebelled against king Nebuchadnezzar, who had made him swear by God: but he stiffened his neck, and hardened his heart from turning unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '14':
  - type: text
    content: 'Moreover all the chief of the priests, and the people, transgressed very much after all the abominations of the heathen; and polluted the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' which he had hallowed in Jerusalem. '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers sent to them by his messengers, rising up betimes, and sending; because he had compassion on his people, and on his dwelling place: '
  '16':
  - type: text
    content: 'but they mocked the messengers of God, and despised his words, and misused his prophets, until the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' arose against his people, till '
  - type: text
    content: there was
  - type: text
    content: ' no remedy.'
  - type: heading
    content: The Captivity
  '17':
  - type: text
    content: 'Therefore he brought upon them the king of the Chaldees, who slew their young men with the sword in the house of their sanctuary, and had no compassion upon young man or maiden, old man, or him that stooped for age: he gave '
  - type: text
    content: them
  - type: text
    content: ' all into his hand. '
  '18':
  - type: text
    content: 'And all the vessels of the house of God, great and small, and the treasures of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the treasures of the king, and of his princes; all '
  - type: text
    content: these
  - type: text
    content: ' he brought to Babylon. '
  '19':
  - type: text
    content: 'And they burnt the house of God, and brake down the wall of Jerusalem, and burnt all the palaces thereof with fire, and destroyed all the goodly vessels thereof. '
  '2':
  - type: text
    content: 'Jehoahaz '
  - type: text
    content: was
  - type: text
    content: ' twenty and three years old when he began to reign, and he reigned three months in Jerusalem. '
  '20':
  - type: text
    content: 'And them that had escaped from the sword carried he away to Babylon; where they were servants to him and his sons until the reign of the kingdom of Persia: '
  '21':
  - type: text
    content: 'to fulfil the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' by the mouth of Jeremiah, until the land had enjoyed her sabbaths: '
  - type: text
    content: for
  - type: text
    content: ' as long as she lay desolate she kept sabbath, to fulfil threescore and ten years.'
  - type: heading
    content: The Return
  '22':
  - type: text
    content: 'Now in the first year of Cyrus king of Persia, that the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: spoken
  - type: text
    content: ' by the mouth of Jeremiah might be accomplished, the '
  - type: text
    content: LORD
  - type: text
    content: ' stirred up the spirit of Cyrus king of Persia, that he made a proclamation throughout all his kingdom, and '
  - type: text
    content: put it
  - type: text
    content: ' also in writing, saying, '
  '23':
  - type: text
    content: 'Thus saith Cyrus king of Persia, All the kingdoms of the earth hath the '
  - type: text
    content: LORD
  - type: text
    content: ' God of heaven given me; and he hath charged me to build him an house in Jerusalem, which '
  - type: text
    content: is
  - type: text
    content: ' in Judah. Who '
  - type: text
    content: is there
  - type: text
    content: ' among you of all his people? The '
  - type: text
    content: LORD
  - type: text
    content: ' his God '
  - type: text
    content: be
  - type: text
    content: ' with him, and let him go up.'
  '3':
  - type: text
    content: 'And the king of Egypt put him down at Jerusalem, and condemned the land in an hundred talents of silver and a talent of gold. '
  '4':
  - type: text
    content: And the king of Egypt made Eliakim his brother king over Judah and Jerusalem, and turned his name to Jehoiakim. And Necho took Jehoahaz his brother, and carried him to Egypt.
  - type: heading
    content: Attacked by Babylon
  '5':
  - type: text
    content: 'Jehoiakim '
  - type: text
    content: was
  - type: text
    content: ' twenty and five years old when he began to reign, and he reigned eleven years in Jerusalem: and he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God. '
  '6':
  - type: text
    content: 'Against him came up Nebuchadnezzar king of Babylon, and bound him in fetters, to carry him to Babylon. '
  '7':
  - type: text
    content: 'Nebuchadnezzar also carried of the vessels of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' to Babylon, and put them in his temple at Babylon. '
  '8':
  - type: text
    content: 'Now the rest of the acts of Jehoiakim, and his abominations which he did, and that which was found in him, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Israel and Judah: and Jehoiachin his son reigned in his stead.'
  '9':
  - type: text
    content: 'Jehoiachin '
  - type: text
    content: was
  - type: text
    content: ' eight years old when he began to reign, and he reigned three months and ten days in Jerusalem: and he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
