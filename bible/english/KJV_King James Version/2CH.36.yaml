document_id: 2CH.36,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Under Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of the land took Jehoahaz the son of Josiah, and made him king in his father''s stead in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the year was expired, king Nebuchadnezzar sent, and brought him to Babylon, with the goodly vessels of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and made Zedekiah his brother king over Judah and Jerusalem.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zedekiah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' one and twenty years old when he began to reign, and reigned eleven years in Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' humbled not himself before Jeremiah the prophet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: speaking
    - type: text
      text: ' from the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he also rebelled against king Nebuchadnezzar, who had made him swear by God: but he stiffened his neck, and hardened his heart from turning unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover all the chief of the priests, and the people, transgressed very much after all the abominations of the heathen; and polluted the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' which he had hallowed in Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of their fathers sent to them by his messengers, rising up betimes, and sending; because he had compassion on his people, and on his dwelling place: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but they mocked the messengers of God, and despised his words, and misused his prophets, until the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' arose against his people, till '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no remedy.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Captivity
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore he brought upon them the king of the Chaldees, who slew their young men with the sword in the house of their sanctuary, and had no compassion upon young man or maiden, old man, or him that stooped for age: he gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' all into his hand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the vessels of the house of God, great and small, and the treasures of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the treasures of the king, and of his princes; all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' he brought to Babylon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they burnt the house of God, and brake down the wall of Jerusalem, and burnt all the palaces thereof with fire, and destroyed all the goodly vessels thereof. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoahaz '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and three years old when he began to reign, and he reigned three months in Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And them that had escaped from the sword carried he away to Babylon; where they were servants to him and his sons until the reign of the kingdom of Persia: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to fulfil the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by the mouth of Jeremiah, until the land had enjoyed her sabbaths: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' as long as she lay desolate she kept sabbath, to fulfil threescore and ten years.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Return
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the first year of Cyrus king of Persia, that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: spoken
    - type: text
      text: ' by the mouth of Jeremiah might be accomplished, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' stirred up the spirit of Cyrus king of Persia, that he made a proclamation throughout all his kingdom, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: put it
    - type: text
      text: ' also in writing, saying, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith Cyrus king of Persia, All the kingdoms of the earth hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of heaven given me; and he hath charged me to build him an house in Jerusalem, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Judah. Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' among you of all his people? The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with him, and let him go up.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Egypt put him down at Jerusalem, and condemned the land in an hundred talents of silver and a talent of gold. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king of Egypt made Eliakim his brother king over Judah and Jerusalem, and turned his name to Jehoiakim. And Necho took Jehoahaz his brother, and carried him to Egypt.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Attacked by Babylon
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiakim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and five years old when he began to reign, and he reigned eleven years in Jerusalem: and he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Against him came up Nebuchadnezzar king of Babylon, and bound him in fetters, to carry him to Babylon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuchadnezzar also carried of the vessels of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to Babylon, and put them in his temple at Babylon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Jehoiakim, and his abominations which he did, and that which was found in him, behold, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the kings of Israel and Judah: and Jehoiachin his son reigned in his stead.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiachin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' eight years old when he began to reign, and he reigned three months and ten days in Jerusalem: and he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
