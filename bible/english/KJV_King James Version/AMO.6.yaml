document_id: AMO.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rulers at Ease
  - type: text
    content: 'Woe to them '
  - type: text
    content: that are
  - type: text
    content: ' at ease in Zion, and trust in the mountain of Samaria, '
  - type: text
    content: which are
  - type: text
    content: ' named chief of the nations, to whom the house of Israel came! '
  '10':
  - type: text
    content: 'And a man''s uncle shall take him up, and he that burneth him, to bring out the bones out of the house, and shall say unto him that '
  - type: text
    content: is
  - type: text
    content: ' by the sides of the house, '
  - type: text
    content: Is there
  - type: text
    content: ' yet '
  - type: text
    content: any
  - type: text
    content: ' with thee? and he shall say, No. Then shall he say, Hold thy tongue: for we may not make mention of the name of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'For, behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' commandeth, and he will smite the great house with breaches, and the little house with clefts.'
  '12':
  - type: text
    content: 'Shall horses run upon the rock? will '
  - type: text
    content: one
  - type: text
    content: ' plow '
  - type: text
    content: there
  - type: text
    content: ' with oxen? for ye have turned judgment into gall, and the fruit of righteousness into hemlock: '
  '13':
  - type: text
    content: 'ye which rejoice in a thing of nought, which say, Have we not taken to us horns by our own strength? '
  '14':
  - type: text
    content: 'But, behold, I will raise up against you a nation, O house of Israel, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' the God of hosts; and they shall afflict you from the entering in of Hemath unto the river of the wilderness.'
  '2':
  - type: text
    content: 'Pass ye unto Calneh, and see; and from thence go ye to Hamath the great: then go down to Gath of the Philistines: '
  - type: text
    content: be they
  - type: text
    content: ' better than these kingdoms? or their border greater than your border? '
  '3':
  - type: text
    content: 'Ye that put far away the evil day, and cause the seat of violence to come near; '
  '4':
  - type: text
    content: 'that lie upon beds of ivory, and stretch themselves upon their couches, and eat the lambs out of the flock, and the calves out of the midst of the stall; '
  '5':
  - type: text
    content: 'that chant to the sound of the viol, '
  - type: text
    content: and
  - type: text
    content: ' invent to themselves instruments of musick, like David; '
  '6':
  - type: text
    content: 'that drink wine in bowls, and anoint themselves with the chief ointments: but they are not grieved for the affliction of Joseph.'
  '7':
  - type: text
    content: 'Therefore now shall they go captive with the first that go captive, and the banquet of them that stretched themselves shall be removed. '
  '8':
  - type: text
    content: 'The Lord '
  - type: text
    content: GOD
  - type: text
    content: ' hath sworn by himself, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' the God of hosts, I abhor the excellency of Jacob, and hate his palaces: therefore will I deliver up the city with all that is therein. '
  '9':
  - type: text
    content: 'And it shall come to pass, if there remain ten men in one house, that they shall die. '
