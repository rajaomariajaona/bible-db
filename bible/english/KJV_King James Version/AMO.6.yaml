document_id: AMO.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Rulers at Ease
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe to them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' at ease in Zion, and trust in the mountain of Samaria, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which are
    - type: text
      text: ' named chief of the nations, to whom the house of Israel came! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And a man''s uncle shall take him up, and he that burneth him, to bring out the bones out of the house, and shall say unto him that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the sides of the house, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' with thee? and he shall say, No. Then shall he say, Hold thy tongue: for we may not make mention of the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For, behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commandeth, and he will smite the great house with breaches, and the little house with clefts.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Shall horses run upon the rock? will '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' plow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: ' with oxen? for ye have turned judgment into gall, and the fruit of righteousness into hemlock: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ye which rejoice in a thing of nought, which say, Have we not taken to us horns by our own strength? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But, behold, I will raise up against you a nation, O house of Israel, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the God of hosts; and they shall afflict you from the entering in of Hemath unto the river of the wilderness.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Pass ye unto Calneh, and see; and from thence go ye to Hamath the great: then go down to Gath of the Philistines: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be they
    - type: text
      text: ' better than these kingdoms? or their border greater than your border? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ye that put far away the evil day, and cause the seat of violence to come near; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'that lie upon beds of ivory, and stretch themselves upon their couches, and eat the lambs out of the flock, and the calves out of the midst of the stall; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'that chant to the sound of the viol, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' invent to themselves instruments of musick, like David; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'that drink wine in bowls, and anoint themselves with the chief ointments: but they are not grieved for the affliction of Joseph.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore now shall they go captive with the first that go captive, and the banquet of them that stretched themselves shall be removed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' hath sworn by himself, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the God of hosts, I abhor the excellency of Jacob, and hate his palaces: therefore will I deliver up the city with all that is therein. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And it shall come to pass, if there remain ten men in one house, that they shall die. '
