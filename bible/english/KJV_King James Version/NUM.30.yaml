document_id: NUM.30
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vows
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Moses spake unto the heads of the tribes concerning the children of Israel, saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the thing which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If a man vow a vow unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', or swear an oath to bind his soul with a bond; he shall not break his word, he shall do according to all that proceedeth out of his mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If a woman also vow a vow unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and bind '
  - type: usfm
    marker: add
    children:
    - type: text
      text: herself
  - type: text
    text: ' by a bond, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' in her father''s house in her youth; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and her father hear her vow, and her bond wherewith she hath bound her soul, and her father shall hold his peace at her: then all her vows shall stand, and every bond wherewith she hath bound her soul shall stand. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if her father disallow her in the day that he heareth; not any of her vows, or of her bonds wherewith she hath bound her soul, shall stand: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall forgive her, because her father disallowed her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And if she had at all an husband, when she vowed, or uttered ought out of her lips, wherewith she bound her soul; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and her husband heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and held his peace at her in the day that he heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' then her vows shall stand, and her bonds wherewith she bound her soul shall stand. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if her husband disallowed her on the day that he heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; then he shall make her vow which she vowed, and that which she uttered with her lips, wherewith she bound her soul, of none effect: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall forgive her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But every vow of a widow, and of her that is divorced, wherewith they have bound their souls, shall stand against her. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And if she vowed in her husband''s house, or bound her soul by a bond with an oath; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and her husband heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and held his peace at her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' disallowed her not: then all her vows shall stand, and every bond wherewith she bound her soul shall stand. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But if her husband hath utterly made them void on the day he heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them; then
  - type: text
    text: ' whatsoever proceeded out of her lips concerning her vows, or concerning the bond of her soul, shall not stand: her husband hath made them void; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall forgive her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Every vow, and every binding oath to afflict the soul, her husband may establish it, or her husband may make it void. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But if her husband altogether hold his peace at her from day to day; then he establisheth all her vows, or all her bonds, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon her: he confirmeth them, because he held his peace at her in the day that he heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if he shall any ways make them void after that he hath heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '; then he shall bear her iniquity. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the statutes, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses, between a man and his wife, between the father and his daughter, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being yet
  - type: text
    text: ' in her youth in her father''s house.'
