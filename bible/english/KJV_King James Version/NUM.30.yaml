document_id: NUM.30,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Vows
  - type: text
    content: 'And Moses spake unto the heads of the tribes concerning the children of Israel, saying, This '
  - type: text
    content: is
  - type: text
    content: ' the thing which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath commanded. '
  '10':
  - type: text
    content: 'And if she vowed in her husband''s house, or bound her soul by a bond with an oath; '
  '11':
  - type: text
    content: 'and her husband heard '
  - type: text
    content: it
  - type: text
    content: ', and held his peace at her, '
  - type: text
    content: and
  - type: text
    content: ' disallowed her not: then all her vows shall stand, and every bond wherewith she bound her soul shall stand. '
  '12':
  - type: text
    content: 'But if her husband hath utterly made them void on the day he heard '
  - type: text
    content: them; then
  - type: text
    content: ' whatsoever proceeded out of her lips concerning her vows, or concerning the bond of her soul, shall not stand: her husband hath made them void; and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall forgive her.'
  '13':
  - type: text
    content: 'Every vow, and every binding oath to afflict the soul, her husband may establish it, or her husband may make it void. '
  '14':
  - type: text
    content: 'But if her husband altogether hold his peace at her from day to day; then he establisheth all her vows, or all her bonds, which '
  - type: text
    content: are
  - type: text
    content: ' upon her: he confirmeth them, because he held his peace at her in the day that he heard '
  - type: text
    content: them
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'But if he shall any ways make them void after that he hath heard '
  - type: text
    content: them
  - type: text
    content: '; then he shall bear her iniquity. '
  '16':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the statutes, which the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses, between a man and his wife, between the father and his daughter, '
  - type: text
    content: being yet
  - type: text
    content: ' in her youth in her father''s house.'
  '2':
  - type: text
    content: 'If a man vow a vow unto the '
  - type: text
    content: LORD
  - type: text
    content: ', or swear an oath to bind his soul with a bond; he shall not break his word, he shall do according to all that proceedeth out of his mouth. '
  '3':
  - type: text
    content: 'If a woman also vow a vow unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and bind '
  - type: text
    content: herself
  - type: text
    content: ' by a bond, '
  - type: text
    content: being
  - type: text
    content: ' in her father''s house in her youth; '
  '4':
  - type: text
    content: 'and her father hear her vow, and her bond wherewith she hath bound her soul, and her father shall hold his peace at her: then all her vows shall stand, and every bond wherewith she hath bound her soul shall stand. '
  '5':
  - type: text
    content: 'But if her father disallow her in the day that he heareth; not any of her vows, or of her bonds wherewith she hath bound her soul, shall stand: and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall forgive her, because her father disallowed her.'
  '6':
  - type: text
    content: 'And if she had at all an husband, when she vowed, or uttered ought out of her lips, wherewith she bound her soul; '
  '7':
  - type: text
    content: 'and her husband heard '
  - type: text
    content: it
  - type: text
    content: ', and held his peace at her in the day that he heard '
  - type: text
    content: 'it:'
  - type: text
    content: ' then her vows shall stand, and her bonds wherewith she bound her soul shall stand. '
  '8':
  - type: text
    content: 'But if her husband disallowed her on the day that he heard '
  - type: text
    content: it
  - type: text
    content: '; then he shall make her vow which she vowed, and that which she uttered with her lips, wherewith she bound her soul, of none effect: and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall forgive her.'
  '9':
  - type: text
    content: 'But every vow of a widow, and of her that is divorced, wherewith they have bound their souls, shall stand against her. '
