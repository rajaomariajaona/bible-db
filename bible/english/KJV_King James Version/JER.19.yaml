document_id: JER.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Broken Pottery
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Go and get a potter''s earthen bottle, and '
  - type: text
    content: take
  - type: text
    content: ' of the ancients of the people, and of the ancients of the priests; '
  '10':
  - type: text
    content: 'Then shalt thou break the bottle in the sight of the men that go with thee, '
  '11':
  - type: text
    content: 'and shalt say unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Even so will I break this people and this city, as '
  - type: text
    content: one
  - type: text
    content: ' breaketh a potter''s vessel, that cannot be made whole again: and they shall bury '
  - type: text
    content: them
  - type: text
    content: ' in Tophet, till '
  - type: text
    content: there be
  - type: text
    content: ' no place to bury. '
  '12':
  - type: text
    content: 'Thus will I do unto this place, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and to the inhabitants thereof, and '
  - type: text
    content: even
  - type: text
    content: ' make this city as Tophet: '
  '13':
  - type: text
    content: and the houses of Jerusalem, and the houses of the kings of Judah, shall be defiled as the place of Tophet, because of all the houses upon whose roofs they have burned incense unto all the host of heaven, and have poured out drink offerings unto other gods.
  '14':
  - type: text
    content: 'Then came Jeremiah from Tophet, whither the '
  - type: text
    content: LORD
  - type: text
    content: ' had sent him to prophesy; and he stood in the court of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house; and said to all the people, '
  '15':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Behold, I will bring upon this city and upon all her towns all the evil that I have pronounced against it, because they have hardened their necks, that they might not hear my words.'
  '2':
  - type: text
    content: 'and go forth unto the valley of the son of Hinnom, which '
  - type: text
    content: is
  - type: text
    content: ' by the entry of the east gate, and proclaim there the words that I shall tell thee, '
  '3':
  - type: text
    content: 'and say, Hear ye the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', O kings of Judah, and inhabitants of Jerusalem; Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Behold, I will bring evil upon this place, the which whosoever heareth, his ears shall tingle. '
  '4':
  - type: text
    content: 'Because they have forsaken me, and have estranged this place, and have burned incense in it unto other gods, whom neither they nor their fathers have known, nor the kings of Judah, and have filled this place with the blood of innocents; '
  '5':
  - type: text
    content: 'they have built also the high places of Baal, to burn their sons with fire '
  - type: text
    content: for
  - type: text
    content: ' burnt offerings unto Baal, which I commanded not, nor spake '
  - type: text
    content: it
  - type: text
    content: ', neither came '
  - type: text
    content: it
  - type: text
    content: ' into my mind: '
  '6':
  - type: text
    content: 'therefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that this place shall no more be called Tophet, nor The valley of the son of Hinnom, but The valley of slaughter. '
  '7':
  - type: text
    content: 'And I will make void the counsel of Judah and Jerusalem in this place; and I will cause them to fall by the sword before their enemies, and by the hands of them that seek their lives: and their carcases will I give to be meat for the fowls of the heaven, and for the beasts of the earth. '
  '8':
  - type: text
    content: 'And I will make this city desolate, and an hissing; every one that passeth thereby shall be astonished and hiss because of all the plagues thereof. '
  '9':
  - type: text
    content: And I will cause them to eat the flesh of their sons and the flesh of their daughters, and they shall eat every one the flesh of his friend in the siege and straitness, wherewith their enemies, and they that seek their lives, shall straiten them.
