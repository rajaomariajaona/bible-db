verses:
  '1':
  - type: heading
    content: The Ark of the Lord
  - type: text
    content: 'Again, David gathered together all the chosen '
  - type: text
    content: men
  - type: text
    content: ' of Israel, thirty thousand. '
  '10':
  - type: text
    content: 'So David would not remove the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto him into the city of David: but David carried it aside into the house of Obed-edom the Gittite. '
  '11':
  - type: text
    content: 'And the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' continued in the house of Obed-edom the Gittite three months: and the '
  - type: text
    content: LORD
  - type: text
    content: ' blessed Obed-edom, and all his household.'
  '12':
  - type: text
    content: 'And it was told king David, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath blessed the house of Obed-edom, and all that '
  - type: text
    content: pertaineth
  - type: text
    content: ' unto him, because of the ark of God. So David went and brought up the ark of God from the house of Obed-edom into the city of David with gladness. '
  '13':
  - type: text
    content: 'And it was '
  - type: text
    content: so
  - type: text
    content: ', that when they that bare the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' had gone six paces, he sacrificed oxen and fatlings. '
  '14':
  - type: text
    content: 'And David danced before the '
  - type: text
    content: LORD
  - type: text
    content: ' with all '
  - type: text
    content: his
  - type: text
    content: ' might; and David '
  - type: text
    content: was
  - type: text
    content: ' girded with a linen ephod. '
  '15':
  - type: text
    content: 'So David and all the house of Israel brought up the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' with shouting, and with the sound of the trumpet.'
  '16':
  - type: text
    content: 'And as the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' came into the city of David, Michal Saul''s daughter looked through a window, and saw king David leaping and dancing before the '
  - type: text
    content: LORD
  - type: text
    content: '; and she despised him in her heart. '
  '17':
  - type: text
    content: 'And they brought in the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ', and set it in his place, in the midst of the tabernacle that David had pitched for it: and David offered burnt offerings and peace offerings before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'And as soon as David had made an end of offering burnt offerings and peace offerings, he blessed the people in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '19':
  - type: text
    content: 'And he dealt among all the people, '
  - type: text
    content: even
  - type: text
    content: ' among the whole multitude of Israel, as well to the women as men, to every one a cake of bread, and a good piece '
  - type: text
    content: of flesh
  - type: text
    content: ', and a flagon '
  - type: text
    content: of wine
  - type: text
    content: . So all the people departed every one to his house.
  '2':
  - type: text
    content: 'And David arose, and went with all the people that '
  - type: text
    content: were
  - type: text
    content: ' with him from Baale of Judah, to bring up from thence the ark of God, whose name is called by the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts that dwelleth '
  - type: text
    content: between
  - type: text
    content: ' the cherubims. '
  '20':
  - type: text
    content: 'Then David returned to bless his household. And Michal the daughter of Saul came out to meet David, and said, How glorious was the king of Israel to day, who uncovered himself to day in the eyes of the handmaids of his servants, as one of the vain fellows shamelessly uncovereth himself! '
  '21':
  - type: text
    content: 'And David said unto Michal, '
  - type: text
    content: It was
  - type: text
    content: ' before the '
  - type: text
    content: LORD
  - type: text
    content: ', which chose me before thy father, and before all his house, to appoint me ruler over the people of the '
  - type: text
    content: LORD
  - type: text
    content: ', over Israel: therefore will I play before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And I will yet be more vile than thus, and will be base in mine own sight: and of the maidservants which thou hast spoken of, of them shall I be had in honour. '
  '23':
  - type: text
    content: Therefore Michal the daughter of Saul had no child unto the day of her death.
  '3':
  - type: text
    content: 'And they set the ark of God upon a new cart, and brought it out of the house of Abinadab that '
  - type: text
    content: was
  - type: text
    content: ' in Gibeah: and Uzzah and Ahio, the sons of Abinadab, drave the new cart. '
  '4':
  - type: text
    content: 'And they brought it out of the house of Abinadab which '
  - type: text
    content: was
  - type: text
    content: ' at Gibeah, accompanying the ark of God: and Ahio went before the ark. '
  '5':
  - type: text
    content: 'And David and all the house of Israel played before the '
  - type: text
    content: LORD
  - type: text
    content: ' on all manner of '
  - type: text
    content: instruments made of
  - type: text
    content: ' fir wood, even on harps, and on psalteries, and on timbrels, and on cornets, and on cymbals.'
  '6':
  - type: text
    content: 'And when they came to Nachon''s threshingfloor, Uzzah put forth '
  - type: text
    content: his hand
  - type: text
    content: ' to the ark of God, and took hold of it; for the oxen shook '
  - type: text
    content: it
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was kindled against Uzzah; and God smote him there for '
  - type: text
    content: his
  - type: text
    content: ' error; and there he died by the ark of God. '
  '8':
  - type: text
    content: 'And David was displeased, because the '
  - type: text
    content: LORD
  - type: text
    content: ' had made a breach upon Uzzah: and he called the name of the place Perez-uzzah to this day. '
  '9':
  - type: text
    content: 'And David was afraid of the '
  - type: text
    content: LORD
  - type: text
    content: ' that day, and said, How shall the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' come to me? '
