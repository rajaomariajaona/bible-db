document_id: 2SA.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Ark of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again, David gathered together all the chosen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Israel, thirty thousand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So David would not remove the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto him into the city of David: but David carried it aside into the house of Obed-edom the Gittite. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' continued in the house of Obed-edom the Gittite three months: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' blessed Obed-edom, and all his household.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And it was told king David, saying, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath blessed the house of Obed-edom, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pertaineth
    - type: text
      text: ' unto him, because of the ark of God. So David went and brought up the ark of God from the house of Obed-edom into the city of David with gladness. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', that when they that bare the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had gone six paces, he sacrificed oxen and fatlings. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And David danced before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' might; and David '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' girded with a linen ephod. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So David and all the house of Israel brought up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with shouting, and with the sound of the trumpet.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And as the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came into the city of David, Michal Saul''s daughter looked through a window, and saw king David leaping and dancing before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and she despised him in her heart. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they brought in the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and set it in his place, in the midst of the tabernacle that David had pitched for it: and David offered burnt offerings and peace offerings before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And as soon as David had made an end of offering burnt offerings and peace offerings, he blessed the people in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he dealt among all the people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' among the whole multitude of Israel, as well to the women as men, to every one a cake of bread, and a good piece '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of flesh
    - type: text
      text: ', and a flagon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of wine
    - type: text
      text: . So all the people departed every one to his house.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And David arose, and went with all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him from Baale of Judah, to bring up from thence the ark of God, whose name is called by the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts that dwelleth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: between
    - type: text
      text: ' the cherubims. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then David returned to bless his household. And Michal the daughter of Saul came out to meet David, and said, How glorious was the king of Israel to day, who uncovered himself to day in the eyes of the handmaids of his servants, as one of the vain fellows shamelessly uncovereth himself! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And David said unto Michal, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It was
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which chose me before thy father, and before all his house, to appoint me ruler over the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', over Israel: therefore will I play before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And I will yet be more vile than thus, and will be base in mine own sight: and of the maidservants which thou hast spoken of, of them shall I be had in honour. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Therefore Michal the daughter of Saul had no child unto the day of her death.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they set the ark of God upon a new cart, and brought it out of the house of Abinadab that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Gibeah: and Uzzah and Ahio, the sons of Abinadab, drave the new cart. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And they brought it out of the house of Abinadab which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at Gibeah, accompanying the ark of God: and Ahio went before the ark. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And David and all the house of Israel played before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' on all manner of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: instruments made of
    - type: text
      text: ' fir wood, even on harps, and on psalteries, and on timbrels, and on cornets, and on cymbals.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And when they came to Nachon''s threshingfloor, Uzzah put forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his hand
    - type: text
      text: ' to the ark of God, and took hold of it; for the oxen shook '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was kindled against Uzzah; and God smote him there for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' error; and there he died by the ark of God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And David was displeased, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had made a breach upon Uzzah: and he called the name of the place Perez-uzzah to this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And David was afraid of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that day, and said, How shall the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' come to me? '
