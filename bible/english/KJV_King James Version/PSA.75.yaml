  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' Song of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Unto thee, O God, do we give thanks,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Unto thee
  - type: text
    text: ' do we give thanks:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thy name is near'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy wondrous works declare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When I shall receive the congregation
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will judge uprightly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The earth and all the inhabitants thereof are dissolved:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I bear up the pillars of it. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I said unto the fools, Deal not foolishly:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And to the wicked, Lift not up the horn:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lift not up your horn on high:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Speak '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' with a stiff neck.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For promotion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cometh
  - type: text
    text: ' neither from the east, nor from the west,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor from the south.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the judge:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He putteth down one, and setteth up another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For in the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a cup, and the wine is red;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It is full of mixture; and he poureth out of the same:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the dregs thereof,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All the wicked of the earth shall wring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But I will declare for ever; I will sing praises to the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: All the horns of the wicked also will I cut off;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' the horns of the righteous shall be exalted.'
