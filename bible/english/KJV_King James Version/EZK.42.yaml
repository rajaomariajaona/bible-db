document_id: EZK.42
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then he brought me forth into the utter court, the way toward the north: and he brought me into the chamber that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over against the separate place, and which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before the building toward the north. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Before the length of an hundred cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the north door, and the breadth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Over against the twenty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cubits
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' for the inner court, and over against the pavement which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' for the utter court, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' gallery against gallery in three '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stories
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And before the chambers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a walk of ten cubits breadth inward, a way of one cubit; and their doors toward the north. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the upper chambers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' shorter: for the galleries were higher than these, than the lower, and than the middlemost of the building. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in three '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stories
  - type: text
    text: ', but had not pillars as the pillars of the courts: therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the building
  - type: text
    text: ' was straitened more than the lowest and the middlemost from the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the wall that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' without over against the chambers, toward the utter court on the forepart of the chambers, the length thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the length of the chambers that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the utter court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits: and, lo, before the temple '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an hundred cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And from under these chambers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the entry on the east side, as one goeth into them from the utter court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The chambers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the thickness of the wall of the court toward the east, over against the separate place, and over against the building. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the way before them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like the appearance of the chambers which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' toward the north, as long as they, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as broad as they: and all their goings out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' both according to their fashions, and according to their doors. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And according to the doors of the chambers that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' toward the south '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a door in the head of the way, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the way directly before the wall toward the east, as one entereth into them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then said he unto me, The north chambers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the south chambers, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' before the separate place, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' holy chambers, where the priests that approach unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall eat the most holy things: there shall they lay the most holy things, and the meat offering, and the sin offering, and the trespass offering; for the place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the priests enter therein, then shall they not go out of the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' into the utter court, but there they shall lay their garments wherein they minister; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' holy; and shall put on other garments, and shall approach to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those things
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' for the people.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Whole Enclosure
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now when he had made an end of measuring the inner house, he brought me forth toward the gate whose prospect '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' toward the east, and measured it round about. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He measured the east side with the measuring reed, five hundred reeds, with the measuring reed round about. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He measured the north side, five hundred reeds, with the measuring reed round about. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He measured the south side, five hundred reeds, with the measuring reed. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He turned about to the west side, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' measured five hundred reeds with the measuring reed. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He measured it by the four sides: it had a wall round about, five hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: reeds
  - type: text
    text: ' long, and five hundred broad, to make a separation between the sanctuary and the profane place.'
