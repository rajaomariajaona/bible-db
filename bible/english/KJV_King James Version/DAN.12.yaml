document_id: DAN.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at that time shall Michael stand up, the great prince which standeth for the children of thy people: and there shall be a time of trouble, such as never was since there was a nation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to that same time: and at that time thy people shall be delivered, every one that shall be found written in the book. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many shall be purified, and made white, and tried; but the wicked shall do wickedly: and none of the wicked shall understand; but the wise shall understand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the daily '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' shall be taken away, and the abomination that maketh desolate set up, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' a thousand two hundred and ninety days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that waiteth, and cometh to the thousand three hundred and five and thirty days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But go thou thy way till the end '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'be:'
    - type: text
      text: ' for thou shalt rest, and stand in thy lot at the end of the days.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many of them that sleep in the dust of the earth shall awake, some to everlasting life, and some to shame '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' everlasting contempt. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they that be wise shall shine as the brightness of the firmament; and they that turn many to righteousness as the stars for ever and ever. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thou, O Daniel, shut up the words, and seal the book, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the time of the end: many shall run to and fro, and knowledge shall be increased.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I Daniel looked, and, behold, there stood other two, the one on this side of the bank of the river, and the other on that side of the bank of the river. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' said to the man clothed in linen, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon the waters of the river, How long '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall it be
    - type: text
      text: ' to the end of these wonders? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard the man clothed in linen, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon the waters of the river, when he held up his right hand and his left hand unto heaven, and sware by him that liveth for ever that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' for a time, times, and an half; and when he shall have accomplished to scatter the power of the holy people, all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' shall be finished. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard, but I understood not: then said I, O my Lord, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the end of these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Go thy way, Daniel: for the words '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' closed up and sealed till the time of the end. '
