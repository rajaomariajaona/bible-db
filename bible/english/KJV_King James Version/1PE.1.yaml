document_id: 1PE.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Peter, an apostle of Jesus Christ, to the strangers scattered throughout Pontus, Galatia, Cappadocia, Asia, and Bithynia, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Of which salvation the prophets have enquired and searched diligently, who prophesied of the grace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that should come
    - type: text
      text: ' unto you: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'searching what, or what manner of time the Spirit of Christ which was in them did signify, when it testified beforehand the sufferings of Christ, and the glory that should follow. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Unto whom it was revealed, that not unto themselves, but unto us they did minister the things, which are now reported unto you by them that have preached the gospel unto you with the Holy Ghost sent down from heaven; which things the angels desire to look into.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Wherefore gird up the loins of your mind, be sober, and hope to the end for the grace that is to be brought unto you at the revelation of Jesus Christ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'as obedient children, not fashioning yourselves according to the former lusts in your ignorance: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'but as he which hath called you is holy, so be ye holy in all manner of conversation; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'because it is written, Be ye holy; for I am holy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And if ye call on the Father, who without respect of persons judgeth according to every man''s work, pass the time of your sojourning '
    - type: usfm
      marker: add
      children:
      - type: text
        text: here
    - type: text
      text: ' in fear: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'forasmuch as ye know that ye were not redeemed with corruptible things, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' silver and gold, from your vain conversation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: received
    - type: text
      text: ' by tradition from your fathers; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'but with the precious blood of Christ, as of a lamb without blemish and without spot: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'elect according to the foreknowledge of God the Father, through sanctification of the Spirit, unto obedience and sprinkling of the blood of Jesus Christ: Grace unto you, and peace, be multiplied.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'who verily was foreordained before the foundation of the world, but was manifest in these last times for you, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: who by him do believe in God, that raised him up from the dead, and gave him glory; that your faith and hope might be in God.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Seeing ye have purified your souls in obeying the truth through the Spirit unto unfeigned love of the brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: see that ye
    - type: text
      text: ' love one another with a pure heart fervently: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'being born again, not of corruptible seed, but of incorruptible, by the word of God, which liveth and abideth for ever. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: For
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as grass,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the glory of man as the flower of grass.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The grass withereth, and the flower thereof falleth away:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But the word of the Lord endureth for ever.
  - type: usfm
    marker: m
    children:
    - type: text
      text: And this is the word which by the gospel is preached unto you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the God and Father of our Lord Jesus Christ, which according to his abundant mercy hath begotten us again unto a lively hope by the resurrection of Jesus Christ from the dead, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'to an inheritance incorruptible, and undefiled, and that fadeth not away, reserved in heaven for you, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'who are kept by the power of God through faith unto salvation ready to be revealed in the last time. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Wherein ye greatly rejoice, though now for a season, if need be, ye are in heaviness through manifold temptations: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'that the trial of your faith, being much more precious than of gold that perisheth, though it be tried with fire, might be found unto praise and honour and glory at the appearing of Jesus Christ: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'whom having not seen, ye love; in whom, though now ye see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' not, yet believing, ye rejoice with joy unspeakable and full of glory: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'receiving the end of your faith, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the salvation of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' souls.'
