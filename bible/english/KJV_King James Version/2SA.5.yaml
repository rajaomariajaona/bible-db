document_id: 2SA.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: King over all Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came all the tribes of Israel to David unto Hebron, and spake, saying, Behold, we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy bone and thy flesh. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David went on, and grew great, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with him.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hiram king of Tyre sent messengers to David, and cedar trees, and carpenters, and masons: and they built David an house. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David perceived that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had established him king over Israel, and that he had exalted his kingdom for his people Israel''s sake.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' more concubines and wives out of Jerusalem, after he was come from Hebron: and there were yet sons and daughters born to David. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the names of those that were born unto him in Jerusalem; Shammua, and Shobab, and Nathan, and Solomon, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibhar also, and Elishua, and Nepheg, and Japhia, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Elishama, and Eliada, and Eliphalet.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Philistines heard that they had anointed David king over Israel, all the Philistines came up to seek David; and David heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: ', and went down to the hold. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines also came and spread themselves in the valley of Rephaim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David enquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Shall I go up to the Philistines? wilt thou deliver them into mine hand? And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto David, Go up: for I will doubtless deliver the Philistines into thine hand. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also in time past, when Saul was king over us, thou wast he that leddest out and broughtest in Israel: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to thee, Thou shalt feed my people Israel, and thou shalt be a captain over Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David came to Baal-perazim, and David smote them there, and said, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath broken forth upon mine enemies before me, as the breach of waters. Therefore he called the name of that place Baal-perazim. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there they left their images, and David and his men burned them.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Philistines came up yet again, and spread themselves in the valley of Rephaim. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when David enquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', he said, Thou shalt not go up; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' fetch a compass behind them, and come upon them over against the mulberry trees. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And let it be, when thou hearest the sound of a going in the tops of the mulberry trees, that then thou shalt bestir thyself: for then shall the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' go out before thee, to smite the host of the Philistines. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David did so, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded him; and smote the Philistines from Geba until thou come to Gazer.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the elders of Israel came to the king to Hebron; and king David made a league with them in Hebron before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and they anointed David king over Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty years old when he began to reign, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he reigned forty years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Hebron he reigned over Judah seven years and six months: and in Jerusalem he reigned thirty and three years over all Israel and Judah.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Capture of Jerusalem
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king and his men went to Jerusalem unto the Jebusites, the inhabitants of the land: which spake unto David, saying, Except thou take away the blind and the lame, thou shalt not come in hither: thinking, David cannot come in hither. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless David took the strong hold of Zion: the same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the city of David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said on that day, Whosoever getteth up to the gutter, and smiteth the Jebusites, and the lame and the blind, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' hated of David''s soul, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he shall be chief and captain
    - type: text
      text: '. Wherefore they said, The blind and the lame shall not come into the house. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David dwelt in the fort, and called it the city of David. And David built round about from Millo and inward. '
