  '13':
  - type: text
    content: 'And David took '
  - type: text
    content: him
  - type: text
    content: ' more concubines and wives out of Jerusalem, after he was come from Hebron: and there were yet sons and daughters born to David. '
  '14':
  - type: text
    content: 'And these '
  - type: text
    content: be
  - type: text
    content: ' the names of those that were born unto him in Jerusalem; Shammua, and Shobab, and Nathan, and Solomon, '
  '15':
  - type: text
    content: 'Ibhar also, and Elishua, and Nepheg, and Japhia, '
  '16':
  - type: text
    content: and Elishama, and Eliada, and Eliphalet.
  '17':
  - type: text
    content: 'But when the Philistines heard that they had anointed David king over Israel, all the Philistines came up to seek David; and David heard '
  - type: text
    content: of it
  - type: text
    content: ', and went down to the hold. '
  '18':
  - type: text
    content: 'The Philistines also came and spread themselves in the valley of Rephaim. '
  '19':
  - type: text
    content: 'And David enquired of the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, Shall I go up to the Philistines? wilt thou deliver them into mine hand? And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto David, Go up: for I will doubtless deliver the Philistines into thine hand. '
  '2':
  - type: text
    content: 'Also in time past, when Saul was king over us, thou wast he that leddest out and broughtest in Israel: and the '
  - type: text
    content: LORD
  - type: text
    content: ' said to thee, Thou shalt feed my people Israel, and thou shalt be a captain over Israel. '
  '20':
  - type: text
    content: 'And David came to Baal-perazim, and David smote them there, and said, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath broken forth upon mine enemies before me, as the breach of waters. Therefore he called the name of that place Baal-perazim. '
  '21':
  - type: text
    content: And there they left their images, and David and his men burned them.
  '22':
  - type: text
    content: 'And the Philistines came up yet again, and spread themselves in the valley of Rephaim. '
  '23':
  - type: text
    content: 'And when David enquired of the '
  - type: text
    content: LORD
  - type: text
    content: ', he said, Thou shalt not go up; '
  - type: text
    content: but
  - type: text
    content: ' fetch a compass behind them, and come upon them over against the mulberry trees. '
  '24':
  - type: text
    content: 'And let it be, when thou hearest the sound of a going in the tops of the mulberry trees, that then thou shalt bestir thyself: for then shall the '
  - type: text
    content: LORD
  - type: text
    content: ' go out before thee, to smite the host of the Philistines. '
  '25':
  - type: text
    content: 'And David did so, as the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded him; and smote the Philistines from Geba until thou come to Gazer.'
  '3':
  - type: text
    content: 'So all the elders of Israel came to the king to Hebron; and king David made a league with them in Hebron before the '
  - type: text
    content: LORD
  - type: text
    content: ': and they anointed David king over Israel.'
  '4':
  - type: text
    content: 'David '
  - type: text
    content: was
  - type: text
    content: ' thirty years old when he began to reign, '
  - type: text
    content: and
  - type: text
    content: ' he reigned forty years. '
  '5':
  - type: text
    content: 'In Hebron he reigned over Judah seven years and six months: and in Jerusalem he reigned thirty and three years over all Israel and Judah.'
  - type: heading
    content: Capture of Jerusalem
  '6':
  - type: text
    content: 'And the king and his men went to Jerusalem unto the Jebusites, the inhabitants of the land: which spake unto David, saying, Except thou take away the blind and the lame, thou shalt not come in hither: thinking, David cannot come in hither. '
  '7':
  - type: text
    content: 'Nevertheless David took the strong hold of Zion: the same '
  - type: text
    content: is
  - type: text
    content: ' the city of David. '
  '8':
  - type: text
    content: 'And David said on that day, Whosoever getteth up to the gutter, and smiteth the Jebusites, and the lame and the blind, '
  - type: text
    content: that are
  - type: text
    content: ' hated of David''s soul, '
  - type: text
    content: he shall be chief and captain
  - type: text
    content: '. Wherefore they said, The blind and the lame shall not come into the house. '
  '9':
  - type: text
    content: 'So David dwelt in the fort, and called it the city of David. And David built round about from Millo and inward. '
