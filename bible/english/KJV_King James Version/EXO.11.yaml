document_id: EXO.11,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Yet will I bring one plague '
  - type: text
    content: more
  - type: text
    content: ' upon Pharaoh, and upon Egypt; afterwards he will let you go hence: when he shall let '
  - type: text
    content: you
  - type: text
    content: ' go, he shall surely thrust you out hence altogether. '
  '10':
  - type: text
    content: 'And Moses and Aaron did all these wonders before Pharaoh: and the '
  - type: text
    content: LORD
  - type: text
    content: ' hardened Pharaoh''s heart, so that he would not let the children of Israel go out of his land.'
  '2':
  - type: text
    content: 'Speak now in the ears of the people, and let every man borrow of his neighbour, and every woman of her neighbour, jewels of silver, and jewels of gold. '
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' gave the people favour in the sight of the Egyptians. Moreover the man Moses '
  - type: text
    content: was
  - type: text
    content: ' very great in the land of Egypt, in the sight of Pharaoh''s servants, and in the sight of the people.'
  '4':
  - type: text
    content: 'And Moses said, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', About midnight will I go out into the midst of Egypt: '
  '5':
  - type: text
    content: 'and all the firstborn in the land of Egypt shall die, from the firstborn of Pharaoh that sitteth upon his throne, even unto the firstborn of the maidservant that '
  - type: text
    content: is
  - type: text
    content: ' behind the mill; and all the firstborn of beasts. '
  '6':
  - type: text
    content: 'And there shall be a great cry throughout all the land of Egypt, such as there was none like it, nor shall be like it any more. '
  '7':
  - type: text
    content: 'But against any of the children of Israel shall not a dog move his tongue, against man or beast: that ye may know how that the '
  - type: text
    content: LORD
  - type: text
    content: ' doth put a difference between the Egyptians and Israel. '
  '8':
  - type: text
    content: 'And all these thy servants shall come down unto me, and bow down themselves unto me, saying, Get thee out, and all the people that follow thee: and after that I will go out. And he went out from Pharaoh in a great anger.'
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Pharaoh shall not hearken unto you; that my wonders may be multiplied in the land of Egypt. '
