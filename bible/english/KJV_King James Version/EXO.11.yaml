document_id: EXO.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Yet will I bring one plague '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' upon Pharaoh, and upon Egypt; afterwards he will let you go hence: when he shall let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' go, he shall surely thrust you out hence altogether. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak now in the ears of the people, and let every man borrow of his neighbour, and every woman of her neighbour, jewels of silver, and jewels of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave the people favour in the sight of the Egyptians. Moreover the man Moses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' very great in the land of Egypt, in the sight of Pharaoh''s servants, and in the sight of the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Moses said, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', About midnight will I go out into the midst of Egypt: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and all the firstborn in the land of Egypt shall die, from the firstborn of Pharaoh that sitteth upon his throne, even unto the firstborn of the maidservant that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' behind the mill; and all the firstborn of beasts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there shall be a great cry throughout all the land of Egypt, such as there was none like it, nor shall be like it any more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But against any of the children of Israel shall not a dog move his tongue, against man or beast: that ye may know how that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' doth put a difference between the Egyptians and Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And all these thy servants shall come down unto me, and bow down themselves unto me, saying, Get thee out, and all the people that follow thee: and after that I will go out. And he went out from Pharaoh in a great anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Pharaoh shall not hearken unto you; that my wonders may be multiplied in the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Moses and Aaron did all these wonders before Pharaoh: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hardened Pharaoh''s heart, so that he would not let the children of Israel go out of his land.'
