document_id: GEN.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God calls Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had said unto Abram, Get thee out of thy country, and from thy kindred, and from thy father''s house, unto a land that I will shew thee: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and I will make of thee a great nation, and I will bless thee, and make thy name great; and thou shalt be a blessing: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and I will bless them that bless thee, and curse him that curseth thee: and in thee shall all families of the earth be blessed. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Abram departed, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had spoken unto him; and Lot went with him: and Abram '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' seventy and five years old when he departed out of Haran. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And Abram took Sarai his wife, and Lot his brother's son, and all their substance that they had gathered, and the souls that they had gotten in Haran; and they went forth to go into the land of Canaan; and into the land of Canaan they came.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Abram passed through the land unto the place of Sichem, unto the plain of Moreh. And the Canaanite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' then in the land. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared unto Abram, and said, Unto thy seed will I give this land: and there builded he an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who appeared unto him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he removed from thence unto a mountain on the east of Beth-el, and pitched his tent, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: having
  - type: text
    text: ' Beth-el on the west, and Hai on the east: and there he builded an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and called upon the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And Abram journeyed, going on still toward the south.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And there was a famine in the land: and Abram went down into Egypt to sojourn there; for the famine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' grievous in the land. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass, when he was come near to enter into Egypt, that he said unto Sarai his wife, Behold now, I know that thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a fair woman to look upon: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'therefore it shall come to pass, when the Egyptians shall see thee, that they shall say, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his wife: and they will kill me, but they will save thee alive. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Say, I pray thee, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my sister: that it may be well with me for thy sake; and my soul shall live because of thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it came to pass, that, when Abram was come into Egypt, the Egyptians beheld the woman that she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' very fair. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The princes also of Pharaoh saw her, and commended her before Pharaoh: and the woman was taken into Pharaoh''s house. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he entreated Abram well for her sake: and he had sheep, and oxen, and he asses, and menservants, and maidservants, and she asses, and camels. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' plagued Pharaoh and his house with great plagues because of Sarai Abram''s wife. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Pharaoh called Abram, and said, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou hast done unto me? why didst thou not tell me that she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' thy wife? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Why saidst thou, She '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my sister? so I might have taken her to me to wife: now therefore behold thy wife, take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ', and go thy way. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Pharaoh commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' men concerning him: and they sent him away, and his wife, and all that he had.'
