document_id: EXO.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Request to Pharaoh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And afterward Moses and Aaron went in, and told Pharaoh, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, Let my people go, that they may hold a feast unto me in the wilderness. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the taskmasters of the people went out, and their officers, and they spake to the people, saying, Thus saith Pharaoh, I will not give you straw. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Go ye, get you straw where ye can find it: yet not ought of your work shall be diminished. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the people were scattered abroad throughout all the land of Egypt to gather stubble instead of straw. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the taskmasters hasted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', saying, Fulfil your works, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' daily tasks, as when there was straw. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the officers of the children of Israel, which Pharaoh''s taskmasters had set over them, were beaten, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' demanded, Wherefore have ye not fulfilled your task in making brick both yesterday and to day, as heretofore?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the officers of the children of Israel came and cried unto Pharaoh, saying, Wherefore dealest thou thus with thy servants? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'There is no straw given unto thy servants, and they say to us, Make brick: and, behold, thy servants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' beaten; but the fault '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thine own people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But he said, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' idle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye are
    - type: text
      text: ' idle: therefore ye say, Let us go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' do sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Go therefore now, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' work; for there shall no straw be given you, yet shall ye deliver the tale of bricks. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the officers of the children of Israel did see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: case
    - type: text
      text: ', after it was said, Ye shall not minish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' from your bricks of your daily task.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Pharaoh said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that I should obey his voice to let Israel go? I know not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', neither will I let Israel go. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And they met Moses and Aaron, who stood in the way, as they came forth from Pharaoh: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and they said unto them, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' look upon you, and judge; because ye have made our savour to be abhorred in the eyes of Pharaoh, and in the eyes of his servants, to put a sword in their hand to slay us. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Moses returned unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, Lord, wherefore hast thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' evil entreated this people? why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast sent me? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: For since I came to Pharaoh to speak in thy name, he hath done evil to this people; neither hast thou delivered thy people at all.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they said, The God of the Hebrews hath met with us: let us go, we pray thee, three days'' journey into the desert, and sacrifice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God; lest he fall upon us with pestilence, or with the sword. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the king of Egypt said unto them, Wherefore do ye, Moses and Aaron, let the people from their works? get you unto your burdens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And Pharaoh said, Behold, the people of the land now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' many, and ye make them rest from their burdens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Pharaoh commanded the same day the taskmasters of the people, and their officers, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ye shall no more give the people straw to make brick, as heretofore: let them go and gather straw for themselves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the tale of the bricks, which they did make heretofore, ye shall lay upon them; ye shall not diminish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' thereof: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' idle; therefore they cry, saying, Let us go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' sacrifice to our God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Let there more work be laid upon the men, that they may labour therein; and let them not regard vain words.
