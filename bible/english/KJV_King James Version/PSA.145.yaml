verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'David''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Psalm
    - type: text
      text: ' of praise.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: א Aleph
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I will extol thee, my God, O King;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will bless thy name for ever and ever.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ב Bet
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All thy works shall praise thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy saints shall bless thee.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: כ Kaph
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They shall speak of the glory of thy kingdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And talk of thy power;
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ל Lamed
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: To make known to the sons of men his mighty acts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the glorious majesty of his kingdom.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: מ Mem
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Thy kingdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an everlasting kingdom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And thy dominion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' throughout all generations.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ס Samek
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' upholdeth all that fall,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And raiseth up all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those that be
    - type: text
      text: ' bowed down.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ע Ain
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The eyes of all wait upon thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou givest them their meat in due season.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: פ Pe
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Thou openest thine hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And satisfiest the desire of every living thing.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: צ Zade
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' righteous in all his ways,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And holy in all his works.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ק Qoph
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' nigh unto all them that call upon him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To all that call upon him in truth.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ר Resh
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He will fulfil the desire of them that fear him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He also will hear their cry, and will save them.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ש Shin
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Every day will I bless thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will praise thy name for ever and ever.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ג Gimel
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' preserveth all them that love him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But all the wicked will he destroy.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ת Taw
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'My mouth shall speak the praise of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let all flesh bless his holy name for ever and ever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and greatly to be praised;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his greatness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unsearchable.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ד Dalet
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: One generation shall praise thy works to another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall declare thy mighty acts.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ה He
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I will speak of the glorious honour of thy majesty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of thy wondrous works.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ו Waw
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall speak of the might of thy terrible acts:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will declare thy greatness.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ז Zain
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They shall abundantly utter the memory of thy great goodness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall sing of thy righteousness.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ח Het
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' gracious, and full of compassion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Slow to anger, and of great mercy.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ט Tet
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good to all:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his tender mercies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' over all his works.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: י Yod
    marker-yv: yv-h
