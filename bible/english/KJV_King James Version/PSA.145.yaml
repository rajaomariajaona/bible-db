document_id: PSA.145,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'David''s '
  - type: text
    content: Psalm
  - type: text
    content: ' of praise.'
  - type: heading
    content: א Aleph
  - type: text
    content: I will extol thee, my God, O King;
  - type: text
    content: And I will bless thy name for ever and ever.
  - type: heading
    content: ב Bet
  '10':
  - type: text
    content: 'All thy works shall praise thee, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And thy saints shall bless thee.
  - type: heading
    content: כ Kaph
  '11':
  - type: text
    content: They shall speak of the glory of thy kingdom,
  - type: text
    content: And talk of thy power;
  - type: heading
    content: ל Lamed
  '12':
  - type: text
    content: To make known to the sons of men his mighty acts,
  - type: text
    content: And the glorious majesty of his kingdom.
  - type: heading
    content: מ Mem
  '13':
  - type: text
    content: 'Thy kingdom '
  - type: text
    content: is
  - type: text
    content: ' an everlasting kingdom,'
  - type: text
    content: 'And thy dominion '
  - type: text
    content: endureth
  - type: text
    content: ' throughout all generations.'
  - type: heading
    content: ס Samek
  '14':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' upholdeth all that fall,'
  - type: text
    content: 'And raiseth up all '
  - type: text
    content: those that be
  - type: text
    content: ' bowed down.'
  - type: heading
    content: ע Ain
  '15':
  - type: text
    content: The eyes of all wait upon thee;
  - type: text
    content: And thou givest them their meat in due season.
  - type: heading
    content: פ Pe
  '16':
  - type: text
    content: Thou openest thine hand,
  - type: text
    content: And satisfiest the desire of every living thing.
  - type: heading
    content: צ Zade
  '17':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' righteous in all his ways,'
  - type: text
    content: And holy in all his works.
  - type: heading
    content: ק Qoph
  '18':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' nigh unto all them that call upon him,'
  - type: text
    content: To all that call upon him in truth.
  - type: heading
    content: ר Resh
  '19':
  - type: text
    content: 'He will fulfil the desire of them that fear him:'
  - type: text
    content: He also will hear their cry, and will save them.
  - type: heading
    content: ש Shin
  '2':
  - type: text
    content: Every day will I bless thee;
  - type: text
    content: And I will praise thy name for ever and ever.
  - type: heading
    content: ג Gimel
  '20':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' preserveth all them that love him:'
  - type: text
    content: But all the wicked will he destroy.
  - type: heading
    content: ת Taw
  '21':
  - type: text
    content: 'My mouth shall speak the praise of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: And let all flesh bless his holy name for ever and ever.
  '3':
  - type: text
    content: 'Great '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', and greatly to be praised;'
  - type: text
    content: 'And his greatness '
  - type: text
    content: is
  - type: text
    content: ' unsearchable.'
  - type: heading
    content: ד Dalet
  '4':
  - type: text
    content: One generation shall praise thy works to another,
  - type: text
    content: And shall declare thy mighty acts.
  - type: heading
    content: ה He
  '5':
  - type: text
    content: I will speak of the glorious honour of thy majesty,
  - type: text
    content: And of thy wondrous works.
  - type: heading
    content: ו Waw
  '6':
  - type: text
    content: 'And '
  - type: text
    content: men
  - type: text
    content: ' shall speak of the might of thy terrible acts:'
  - type: text
    content: And I will declare thy greatness.
  - type: heading
    content: ז Zain
  '7':
  - type: text
    content: They shall abundantly utter the memory of thy great goodness,
  - type: text
    content: And shall sing of thy righteousness.
  - type: heading
    content: ח Het
  '8':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' gracious, and full of compassion;'
  - type: text
    content: Slow to anger, and of great mercy.
  - type: heading
    content: ט Tet
  '9':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good to all:'
  - type: text
    content: 'And his tender mercies '
  - type: text
    content: are
  - type: text
    content: ' over all his works.'
  - type: heading
    content: י Yod
