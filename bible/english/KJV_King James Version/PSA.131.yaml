document_id: PSA.131,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of degrees of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', my heart is not haughty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor mine eyes lofty:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither do I exercise myself in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Great matters, or in things too high for me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely I have behaved and quieted myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As a child that is weaned of his mother: My soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' even as a weaned child.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let Israel hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From henceforth and for ever.
