  '1':
  - type: text
    content: 'And the men of Kirjath-jearim came, and fetched up the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ', and brought it into the house of Abinadab in the hill, and sanctified Eleazar his son to keep the ark of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'And as Samuel was offering up the burnt offering, the Philistines drew near to battle against Israel: but the '
  - type: text
    content: LORD
  - type: text
    content: ' thundered with a great thunder on that day upon the Philistines, and discomfited them; and they were smitten before Israel. '
  '11':
  - type: text
    content: 'And the men of Israel went out of Mizpeh, and pursued the Philistines, and smote them, until '
  - type: text
    content: they came
  - type: text
    content: ' under Beth-car.'
  '12':
  - type: text
    content: 'Then Samuel took a stone, and set '
  - type: text
    content: it
  - type: text
    content: ' between Mizpeh and Shen, and called the name of it Eben-ezer, saying, Hitherto hath the '
  - type: text
    content: LORD
  - type: text
    content: ' helped us. '
  '13':
  - type: text
    content: 'So the Philistines were subdued, and they came no more into the coast of Israel: and the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' was against the Philistines all the days of Samuel. '
  '14':
  - type: text
    content: And the cities which the Philistines had taken from Israel were restored to Israel, from Ekron even unto Gath; and the coasts thereof did Israel deliver out of the hands of the Philistines. And there was peace between Israel and the Amorites.
  '15':
  - type: text
    content: 'And Samuel judged Israel all the days of his life. '
  '16':
  - type: text
    content: 'And he went from year to year in circuit to Beth-el, and Gilgal, and Mizpeh, and judged Israel in all those places. '
  '17':
  - type: text
    content: 'And his return '
  - type: text
    content: was
  - type: text
    content: ' to Ramah; for there '
  - type: text
    content: was
  - type: text
    content: ' his house; and there he judged Israel; and there he built an altar unto the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'And it came to pass, while the ark abode in Kirjath-jearim, that the time was long; for it was twenty years: and all the house of Israel lamented after the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Samuel Rules Israel
  '3':
  - type: text
    content: 'And Samuel spake unto all the house of Israel, saying, If ye do return unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with all your hearts, '
  - type: text
    content: then
  - type: text
    content: ' put away the strange gods and Ashtaroth from among you, and prepare your hearts unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and serve him only: and he will deliver you out of the hand of the Philistines. '
  '4':
  - type: text
    content: 'Then the children of Israel did put away Baalim and Ashtaroth, and served the '
  - type: text
    content: LORD
  - type: text
    content: ' only.'
  '5':
  - type: text
    content: 'And Samuel said, Gather all Israel to Mizpeh, and I will pray for you unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And they gathered together to Mizpeh, and drew water, and poured '
  - type: text
    content: it
  - type: text
    content: ' out before the '
  - type: text
    content: LORD
  - type: text
    content: ', and fasted on that day, and said there, We have sinned against the '
  - type: text
    content: LORD
  - type: text
    content: '. And Samuel judged the children of Israel in Mizpeh. '
  '7':
  - type: text
    content: 'And when the Philistines heard that the children of Israel were gathered together to Mizpeh, the lords of the Philistines went up against Israel. And when the children of Israel heard '
  - type: text
    content: it
  - type: text
    content: ', they were afraid of the Philistines. '
  '8':
  - type: text
    content: 'And the children of Israel said to Samuel, Cease not to cry unto the '
  - type: text
    content: LORD
  - type: text
    content: ' our God for us, that he will save us out of the hand of the Philistines. '
  '9':
  - type: text
    content: 'And Samuel took a sucking lamb, and offered '
  - type: text
    content: it for
  - type: text
    content: ' a burnt offering wholly unto the '
  - type: text
    content: LORD
  - type: text
    content: ': and Samuel cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ' for Israel; and the '
  - type: text
    content: LORD
  - type: text
    content: ' heard him. '
