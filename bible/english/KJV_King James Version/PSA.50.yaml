verses:
  '1':
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: 'The mighty God, '
  - type: text
    content: even
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', hath spoken,'
  - type: text
    content: And called the earth from the rising of the sun unto the going down thereof.
  '10':
  - type: text
    content: 'For every beast of the forest '
  - type: text
    content: is
  - type: text
    content: ' mine,'
  - type: text
    content: And
  - type: text
    content: ' the cattle upon a thousand hills.'
  '11':
  - type: text
    content: 'I know all the fowls of the mountains:'
  - type: text
    content: 'And the wild beasts of the field '
  - type: text
    content: are
  - type: text
    content: ' mine.'
  '12':
  - type: text
    content: 'If I were hungry, I would not tell thee:'
  - type: text
    content: 'For the world '
  - type: text
    content: is
  - type: text
    content: ' mine, and the fulness thereof.'
  '13':
  - type: text
    content: Will I eat the flesh of bulls,
  - type: text
    content: Or drink the blood of goats?
  '14':
  - type: text
    content: Offer unto God thanksgiving;
  - type: text
    content: 'And pay thy vows unto the most High:'
  '15':
  - type: text
    content: 'And call upon me in the day of trouble:'
  - type: text
    content: I will deliver thee, and thou shalt glorify me.
  '16':
  - type: text
    content: But unto the wicked God saith,
  - type: text
    content: 'What hast thou to do to declare my statutes, or '
  - type: text
    content: that
  - type: text
    content: ' thou shouldest take my covenant in thy mouth?'
  '17':
  - type: text
    content: Seeing thou hatest instruction,
  - type: text
    content: And castest my words behind thee.
  '18':
  - type: text
    content: When thou sawest a thief, then thou consentedst with him,
  - type: text
    content: And hast been partaker with adulterers.
  '19':
  - type: text
    content: Thou givest thy mouth to evil,
  - type: text
    content: And thy tongue frameth deceit.
  '2':
  - type: text
    content: Out of Zion, the perfection of beauty,
  - type: text
    content: God hath shined.
  '20':
  - type: text
    content: 'Thou sittest '
  - type: text
    content: and
  - type: text
    content: ' speakest against thy brother;'
  - type: text
    content: Thou slanderest thine own mother's son.
  '21':
  - type: text
    content: 'These '
  - type: text
    content: things
  - type: text
    content: ' hast thou done, and I kept silence;'
  - type: text
    content: 'Thou thoughtest that I was altogether '
  - type: text
    content: such an one
  - type: text
    content: ' as thyself:'
  - type: text
    content: But
  - type: text
    content: ' I will reprove thee, and set '
  - type: text
    content: them
  - type: text
    content: ' in order before thine eyes.'
  '22':
  - type: text
    content: Now consider this, ye that forget God,
  - type: text
    content: 'Lest I tear '
  - type: text
    content: you
  - type: text
    content: ' in pieces, and '
  - type: text
    content: there be
  - type: text
    content: ' none to deliver.'
  '23':
  - type: text
    content: 'Whoso offereth praise glorifieth me:'
  - type: text
    content: 'And to him that ordereth '
  - type: text
    content: his
  - type: text
    content: ' conversation '
  - type: text
    content: aright
  - type: text
    content: ' will I shew the salvation of God.'
  '3':
  - type: text
    content: 'Our God shall come, and shall not keep silence:'
  - type: text
    content: A fire shall devour before him, and it shall be very tempestuous round about him.
  '4':
  - type: text
    content: He shall call to the heavens from above,
  - type: text
    content: And to the earth, that he may judge his people.
  '5':
  - type: text
    content: Gather my saints together unto me;
  - type: text
    content: Those that have made a covenant with me by sacrifice.
  '6':
  - type: text
    content: 'And the heavens shall declare his righteousness:'
  - type: text
    content: 'For God '
  - type: text
    content: is
  - type: text
    content: ' judge himself. '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: Hear, O my people, and I will speak;
  - type: text
    content: 'O Israel, and I will testify against thee: I '
  - type: text
    content: am
  - type: text
    content: ' God, '
  - type: text
    content: even
  - type: text
    content: ' thy God.'
  '8':
  - type: text
    content: I will not reprove thee for thy sacrifices
  - type: text
    content: 'Or thy burnt offerings, '
  - type: text
    content: to have been
  - type: text
    content: ' continually before me.'
  '9':
  - type: text
    content: I will take no bullock out of thy house,
  - type: text
    content: Nor
  - type: text
    content: ' he goats out of thy folds.'
