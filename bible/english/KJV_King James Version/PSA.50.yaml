document_id: PSA.50,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The mighty God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hath spoken,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And called the earth from the rising of the sun unto the going down thereof.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For every beast of the forest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the cattle upon a thousand hills.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I know all the fowls of the mountains:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the wild beasts of the field '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' mine.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If I were hungry, I would not tell thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the world '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine, and the fulness thereof.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Will I eat the flesh of bulls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or drink the blood of goats?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Offer unto God thanksgiving;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And pay thy vows unto the most High:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And call upon me in the day of trouble:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will deliver thee, and thou shalt glorify me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But unto the wicked God saith,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'What hast thou to do to declare my statutes, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou shouldest take my covenant in thy mouth?'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Seeing thou hatest instruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And castest my words behind thee.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When thou sawest a thief, then thou consentedst with him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hast been partaker with adulterers.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Thou givest thy mouth to evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy tongue frameth deceit.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Out of Zion, the perfection of beauty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God hath shined.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Thou sittest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' speakest against thy brother;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou slanderest thine own mother's son.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' hast thou done, and I kept silence;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou thoughtest that I was altogether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such an one
    - type: text
      text: ' as thyself:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' I will reprove thee, and set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in order before thine eyes.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Now consider this, ye that forget God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lest I tear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' in pieces, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' none to deliver.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Whoso offereth praise glorifieth me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And to him that ordereth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' conversation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: aright
    - type: text
      text: ' will I shew the salvation of God.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Our God shall come, and shall not keep silence:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A fire shall devour before him, and it shall be very tempestuous round about him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He shall call to the heavens from above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to the earth, that he may judge his people.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Gather my saints together unto me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those that have made a covenant with me by sacrifice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the heavens shall declare his righteousness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' judge himself. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hear, O my people, and I will speak;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O Israel, and I will testify against thee: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' thy God.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will not reprove thee for thy sacrifices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or thy burnt offerings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to have been
    - type: text
      text: ' continually before me.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will take no bullock out of thy house,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Nor
    - type: text
      text: ' he goats out of thy folds.'
