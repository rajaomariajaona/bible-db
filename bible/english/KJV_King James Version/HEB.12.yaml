verses:
  '1':
  - type: heading
    content: Run with Patience
  - type: text
    content: 'Wherefore seeing we also are compassed about with so great a cloud of witnesses, let us lay aside every weight, and the sin which doth so easily beset '
  - type: text
    content: us
  - type: text
    content: ', and let us run with patience the race that is set before us, '
  '10':
  - type: text
    content: 'For they verily for a few days chastened '
  - type: text
    content: us
  - type: text
    content: ' after their own pleasure; but he for '
  - type: text
    content: our
  - type: text
    content: ' profit, that '
  - type: text
    content: we
  - type: text
    content: ' might be partakers of his holiness. '
  '11':
  - type: text
    content: 'Now no chastening for the present seemeth to be joyous, but grievous: nevertheless afterward it yieldeth the peaceable fruit of righteousness unto them which are exercised thereby. '
  '12':
  - type: text
    content: 'Wherefore lift up the hands which hang down, and the feeble knees; '
  '13':
  - type: text
    content: and make straight paths for your feet, lest that which is lame be turned out of the way; but let it rather be healed.
  '14':
  - type: text
    content: 'Follow peace with all '
  - type: text
    content: men
  - type: text
    content: ', and holiness, without which no man shall see the Lord: '
  '15':
  - type: text
    content: 'looking diligently lest any man fail of the grace of God; lest any root of bitterness springing up trouble '
  - type: text
    content: you
  - type: text
    content: ', and thereby many be defiled; '
  '16':
  - type: text
    content: 'lest there '
  - type: text
    content: be
  - type: text
    content: ' any fornicator, or profane person, as Esau, who for one morsel of meat sold his birthright. '
  '17':
  - type: text
    content: 'For ye know how that afterward, when he would have inherited the blessing, he was rejected: for he found no place of repentance, though he sought it carefully with tears.'
  '18':
  - type: text
    content: 'For ye are not come unto the mount that might be touched, and that burned with fire, nor unto blackness, and darkness, and tempest, '
  '19':
  - type: text
    content: 'and the sound of a trumpet, and the voice of words; which '
  - type: text
    content: voice
  - type: text
    content: ' they that heard intreated that the word should not be spoken to them any more: '
  '2':
  - type: text
    content: 'looking unto Jesus the author and finisher of '
  - type: text
    content: our
  - type: text
    content: ' faith; who for the joy that was set before him endured the cross, despising the shame, and is set down at the right hand of the throne of God. '
  '20':
  - type: text
    content: '(for they could not endure that which was commanded, And if so much as a beast touch the mountain, it shall be stoned, or thrust through with a dart: '
  '21':
  - type: text
    content: 'and so terrible was the sight, '
  - type: text
    content: that
  - type: text
    content: ' Moses said, I exceedingly fear and quake:) '
  '22':
  - type: text
    content: 'but ye are come unto mount Sion, and unto the city of the living God, the heavenly Jerusalem, and to an innumerable company of angels, '
  '23':
  - type: text
    content: 'to the general assembly and church of the firstborn, which are written in heaven, and to God the Judge of all, and to the spirits of just men made perfect, '
  '24':
  - type: text
    content: 'and to Jesus the mediator of the new covenant, and to the blood of sprinkling, that speaketh better things than '
  - type: text
    content: that of
  - type: text
    content: ' Abel. '
  '25':
  - type: text
    content: 'See that ye refuse not him that speaketh. For if they escaped not who refused him that spake on earth, much more '
  - type: text
    content: shall not
  - type: text
    content: ' we '
  - type: text
    content: escape
  - type: text
    content: ', if we turn away from him that '
  - type: text
    content: speaketh
  - type: text
    content: ' from heaven: '
  '26':
  - type: text
    content: 'whose voice then shook the earth: but now he hath promised, saying, Yet once more I shake not the earth only, but also heaven. '
  '27':
  - type: text
    content: 'And this '
  - type: text
    content: word
  - type: text
    content: ', Yet once more, signifieth the removing of those things that are shaken, as of things that are made, that those things which cannot be shaken may remain. '
  '28':
  - type: text
    content: 'Wherefore we receiving a kingdom which cannot be moved, let us have grace, whereby we may serve God acceptably with reverence and godly fear: '
  '29':
  - type: text
    content: 'for our God '
  - type: text
    content: is
  - type: text
    content: ' a consuming fire.'
  '3':
  - type: text
    content: 'For consider him that endured such contradiction of sinners against himself, lest ye be wearied and faint in your minds. '
  '4':
  - type: text
    content: 'Ye have not yet resisted unto blood, striving against sin. '
  '5':
  - type: text
    content: And ye have forgotten the exhortation which speaketh unto you as unto children,
  - type: text
    content: My son, despise not thou the chastening of the Lord,
  - type: text
    content: 'Nor faint when thou art rebuked of him:'
  '6':
  - type: text
    content: For whom the Lord loveth he chasteneth,
  - type: text
    content: And scourgeth every son whom he receiveth.
  '7':
  - type: text
    content: 'If ye endure chastening, God dealeth with you as with sons; for what son is he whom the father chasteneth not? '
  '8':
  - type: text
    content: 'But if ye be without chastisement, whereof all are partakers, then are ye bastards, and not sons. '
  '9':
  - type: text
    content: 'Furthermore we have had fathers of our flesh which corrected '
  - type: text
    content: us
  - type: text
    content: ', and we gave '
  - type: text
    content: them
  - type: text
    content: ' reverence: shall we not much rather be in subjection unto the Father of spirits, and live? '
