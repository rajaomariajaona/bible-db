document_id: HEB.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Run with Patience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore seeing we also are compassed about with so great a cloud of witnesses, let us lay aside every weight, and the sin which doth so easily beset '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', and let us run with patience the race that is set before us, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For they verily for a few days chastened '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' after their own pleasure; but he for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' profit, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: we
    - type: text
      text: ' might be partakers of his holiness. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now no chastening for the present seemeth to be joyous, but grievous: nevertheless afterward it yieldeth the peaceable fruit of righteousness unto them which are exercised thereby. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Wherefore lift up the hands which hang down, and the feeble knees; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and make straight paths for your feet, lest that which is lame be turned out of the way; but let it rather be healed.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Follow peace with all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', and holiness, without which no man shall see the Lord: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'looking diligently lest any man fail of the grace of God; lest any root of bitterness springing up trouble '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ', and thereby many be defiled; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lest there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' any fornicator, or profane person, as Esau, who for one morsel of meat sold his birthright. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye know how that afterward, when he would have inherited the blessing, he was rejected: for he found no place of repentance, though he sought it carefully with tears.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye are not come unto the mount that might be touched, and that burned with fire, nor unto blackness, and darkness, and tempest, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the sound of a trumpet, and the voice of words; which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: voice
    - type: text
      text: ' they that heard intreated that the word should not be spoken to them any more: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'looking unto Jesus the author and finisher of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' faith; who for the joy that was set before him endured the cross, despising the shame, and is set down at the right hand of the throne of God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(for they could not endure that which was commanded, And if so much as a beast touch the mountain, it shall be stoned, or thrust through with a dart: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and so terrible was the sight, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Moses said, I exceedingly fear and quake:) '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but ye are come unto mount Sion, and unto the city of the living God, the heavenly Jerusalem, and to an innumerable company of angels, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to the general assembly and church of the firstborn, which are written in heaven, and to God the Judge of all, and to the spirits of just men made perfect, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to Jesus the mediator of the new covenant, and to the blood of sprinkling, that speaketh better things than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that of
    - type: text
      text: ' Abel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See that ye refuse not him that speaketh. For if they escaped not who refused him that spake on earth, much more '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall not
    - type: text
      text: ' we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: escape
    - type: text
      text: ', if we turn away from him that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: speaketh
    - type: text
      text: ' from heaven: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whose voice then shook the earth: but now he hath promised, saying, Yet once more I shake not the earth only, but also heaven. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: word
    - type: text
      text: ', Yet once more, signifieth the removing of those things that are shaken, as of things that are made, that those things which cannot be shaken may remain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore we receiving a kingdom which cannot be moved, let us have grace, whereby we may serve God acceptably with reverence and godly fear: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for our God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a consuming fire.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For consider him that endured such contradiction of sinners against himself, lest ye be wearied and faint in your minds. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye have not yet resisted unto blood, striving against sin. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And ye have forgotten the exhortation which speaketh unto you as unto children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, despise not thou the chastening of the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor faint when thou art rebuked of him:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For whom the Lord loveth he chasteneth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And scourgeth every son whom he receiveth.
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If ye endure chastening, God dealeth with you as with sons; for what son is he whom the father chasteneth not? '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But if ye be without chastisement, whereof all are partakers, then are ye bastards, and not sons. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Furthermore we have had fathers of our flesh which corrected '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', and we gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' reverence: shall we not much rather be in subjection unto the Father of spirits, and live? '
