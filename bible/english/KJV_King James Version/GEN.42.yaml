document_id: GEN.42
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Brethren's Visits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Jacob saw that there was corn in Egypt, Jacob said unto his sons, Why do ye look one upon another? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said, Behold, I have heard that there is corn in Egypt: get you down thither, and buy for us from thence; that we may live, and not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Joseph''s ten brethren went down to buy corn in Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Benjamin, Joseph''s brother, Jacob sent not with his brethren; for he said, Lest peradventure mischief befall him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the sons of Israel came to buy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: corn
  - type: text
    text: ' among those that came: for the famine was in the land of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Joseph '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the governor over the land, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' that sold to all the people of the land: and Joseph''s brethren came, and bowed down themselves before him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' their faces to the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Joseph saw his brethren, and he knew them, but made himself strange unto them, and spake roughly unto them; and he said unto them, Whence come ye? And they said, From the land of Canaan to buy food. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Joseph knew his brethren, but they knew not him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Joseph remembered the dreams which he dreamed of them, and said unto them, Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' spies; to see the nakedness of the land ye are come. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they said unto him, Nay, my lord, but to buy food are thy servants come. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all one man''s sons; we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' true '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', thy servants are no spies. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said unto them, Nay, but to see the nakedness of the land ye are come. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they said, Thy servants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' twelve brethren, the sons of one man in the land of Canaan; and, behold, the youngest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this day with our father, and one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Joseph said unto them, That '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' that I spake unto you, saying, Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' spies: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'hereby ye shall be proved: By the life of Pharaoh ye shall not go forth hence, except your youngest brother come hither. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Send one of you, and let him fetch your brother, and ye shall be kept in prison, that your words may be proved, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be any
  - type: text
    text: ' truth in you: or else by the life of Pharaoh surely ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' spies. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And he put them all together into ward three days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Joseph said unto them the third day, This do, and live; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' I fear God: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'if ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' true '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', let one of your brethren be bound in the house of your prison: go ye, carry corn for the famine of your houses: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but bring your youngest brother unto me; so shall your words be verified, and ye shall not die. And they did so. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they said one to another, We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' verily guilty concerning our brother, in that we saw the anguish of his soul, when he besought us, and we would not hear; therefore is this distress come upon us. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Reuben answered them, saying, Spake I not unto you, saying, Do not sin against the child; and ye would not hear? therefore, behold, also his blood is required. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they knew not that Joseph understood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '; for he spake unto them by an interpreter. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he turned himself about from them, and wept; and returned to them again, and communed with them, and took from them Simeon, and bound him before their eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Joseph commanded to fill their sacks with corn, and to restore every man''s money into his sack, and to give them provision for the way: and thus did he unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they laded their asses with the corn, and departed thence. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And as one of them opened his sack to give his ass provender in the inn, he espied his money; for, behold, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in his sack''s mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he said unto his brethren, My money is restored; and, lo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' even in my sack: and their heart failed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and they were afraid, saying one to another, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' God hath done unto us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And they came unto Jacob their father unto the land of Canaan, and told him all that befell unto them; saying, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is
  - type: text
    text: ' the lord of the land, spake roughly to us, and took us for spies of the country. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And we said unto him, We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' true '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '; we are no spies: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' twelve brethren, sons of our father; one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not, and the youngest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this day with our father in the land of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the man, the lord of the country, said unto us, Hereby shall I know that ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' true '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '; leave one of your brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here
  - type: text
    text: ' with me, and take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: food for
  - type: text
    text: ' the famine of your households, and be gone: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and bring your youngest brother unto me: then shall I know that ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' no spies, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' true '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'men: so'
  - type: text
    text: ' will I deliver you your brother, and ye shall traffick in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And it came to pass as they emptied their sacks, that, behold, every man''s bundle of money '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in his sack: and when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' they and their father saw the bundles of money, they were afraid. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Jacob their father said unto them, Me have ye bereaved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of my children:'
  - type: text
    text: ' Joseph '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not, and Simeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not, and ye will take Benjamin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'away:'
  - type: text
    text: ' all these things are against me. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Reuben spake unto his father, saying, Slay my two sons, if I bring him not to thee: deliver him into my hand, and I will bring him to thee again. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he said, My son shall not go down with you; for his brother is dead, and he is left alone: if mischief befall him by the way in the which ye go, then shall ye bring down my gray hairs with sorrow to the grave.'
