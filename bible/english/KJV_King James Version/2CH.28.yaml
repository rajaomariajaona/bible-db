  - type: text
    content: LORD
  - type: text
    content: ', like David his father: '
  '10':
  - type: text
    content: 'And now ye purpose to keep under the children of Judah and Jerusalem for bondmen and bondwomen unto you: '
  - type: text
    content: but are there
  - type: text
    content: ' not with you, even with you, sins against the '
  - type: text
    content: LORD
  - type: text
    content: ' your God? '
  '11':
  - type: text
    content: 'Now hear me therefore, and deliver the captives again, which ye have taken captive of your brethren: for the fierce wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' upon you. '
  '12':
  - type: text
    content: 'Then certain of the heads of the children of Ephraim, Azariah the son of Johanan, Berechiah the son of Meshillemoth, and Jehizkiah the son of Shallum, and Amasa the son of Hadlai, stood up against them that came from the war, '
  '13':
  - type: text
    content: 'and said unto them, Ye shall not bring in the captives hither: for whereas we have offended against the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: already
  - type: text
    content: ', ye intend to add '
  - type: text
    content: more
  - type: text
    content: ' to our sins and to our trespass: for our trespass is great, and '
  - type: text
    content: there is
  - type: text
    content: ' fierce wrath against Israel. '
  '14':
  - type: text
    content: 'So the armed men left the captives and the spoil before the princes and all the congregation. '
  '15':
  - type: text
    content: 'And the men which were expressed by name rose up, and took the captives, and with the spoil clothed all that were naked among them, and arrayed them, and shod them, and gave them to eat and to drink, and anointed them, and carried all the feeble of them upon asses, and brought them to Jericho, the city of palm trees, to their brethren: then they returned to Samaria.'
  '16':
  - type: text
    content: 'At that time did king Ahaz send unto the kings of Assyria to help him. '
  '17':
  - type: text
    content: 'For again the Edomites had come and smitten Judah, and carried away captives. '
  '18':
  - type: text
    content: 'The Philistines also had invaded the cities of the low country, and of the south of Judah, and had taken Beth-shemesh, and Ajalon, and Gederoth, and Shocho with the villages thereof, and Timnah with the villages thereof, Gimzo also and the villages thereof: and they dwelt there. '
  '19':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' brought Judah low because of Ahaz king of Israel; for he made Judah naked, and transgressed sore against the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'for he walked in the ways of the kings of Israel, and made also molten images for Baalim. '
  '20':
  - type: text
    content: 'And Tilgath-pilneser king of Assyria came unto him, and distressed him, but strengthened him not. '
  '21':
  - type: text
    content: 'For Ahaz took away a portion '
  - type: text
    content: out
  - type: text
    content: ' of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and '
  - type: text
    content: out
  - type: text
    content: ' of the house of the king, and of the princes, and gave '
  - type: text
    content: it
  - type: text
    content: ' unto the king of Assyria: but he helped him not.'
  '22':
  - type: text
    content: 'And in the time of his distress did he trespass yet more against the '
  - type: text
    content: LORD
  - type: text
    content: ': this '
  - type: text
    content: is that
  - type: text
    content: ' king Ahaz. '
  '23':
  - type: text
    content: 'For he sacrificed unto the gods of Damascus, which smote him: and he said, Because the gods of the kings of Syria help them, '
  - type: text
    content: therefore
  - type: text
    content: ' will I sacrifice to them, that they may help me. But they were the ruin of him, and of all Israel. '
  '24':
  - type: text
    content: 'And Ahaz gathered together the vessels of the house of God, and cut in pieces the vessels of the house of God, and shut up the doors of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and he made him altars in every corner of Jerusalem. '
  '25':
  - type: text
    content: 'And in every several city of Judah he made high places to burn incense unto other gods, and provoked to anger the '
  - type: text
    content: LORD
  - type: text
    content: ' God of his fathers.'
  '26':
  - type: text
    content: 'Now the rest of his acts and of all his ways, first and last, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Judah and Israel. '
  '27':
  - type: text
    content: 'And Ahaz slept with his fathers, and they buried him in the city, '
  - type: text
    content: even
  - type: text
    content: ' in Jerusalem: but they brought him not into the sepulchres of the kings of Israel: and Hezekiah his son reigned in his stead.'
  '3':
  - type: text
    content: 'Moreover he burnt incense in the valley of the son of Hinnom, and burnt his children in the fire, after the abominations of the heathen whom the '
  - type: text
    content: LORD
  - type: text
    content: ' had cast out before the children of Israel. '
  '4':
  - type: text
    content: He sacrificed also and burnt incense in the high places, and on the hills, and under every green tree.
  '5':
  - type: text
    content: 'Wherefore the '
  - type: text
    content: LORD
  - type: text
    content: ' his God delivered him into the hand of the king of Syria; and they smote him, and carried away a great multitude of them captives, and brought '
  - type: text
    content: them
  - type: text
    content: ' to Damascus. And he was also delivered into the hand of the king of Israel, who smote him with a great slaughter. '
  '6':
  - type: text
    content: 'For Pekah the son of Remaliah slew in Judah an hundred and twenty thousand in one day, '
  - type: text
    content: which were
  - type: text
    content: ' all valiant men; because they had forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers. '
  '7':
  - type: text
    content: 'And Zichri, a mighty man of Ephraim, slew Maaseiah the king''s son, and Azrikam the governor of the house, and Elkanah '
  - type: text
    content: that was
  - type: text
    content: ' next to the king.'
  '8':
  - type: text
    content: 'And the children of Israel carried away captive of their brethren two hundred thousand, women, sons, and daughters, and took also away much spoil from them, and brought the spoil to Samaria. '
  '9':
  - type: text
    content: 'But a prophet of the '
  - type: text
    content: LORD
  - type: text
    content: ' was there, whose name '
  - type: text
    content: was
  - type: text
    content: ' Oded: and he went out before the host that came to Samaria, and said unto them, Behold, because the '
  - type: text
    content: LORD
  - type: text
    content: ' God of your fathers was wroth with Judah, he hath delivered them into your hand, and ye have slain them in a rage '
  - type: text
    content: that
  - type: text
    content: ' reacheth up unto heaven. '
