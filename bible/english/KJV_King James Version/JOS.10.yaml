document_id: JOS.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Memorable Day
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass, when Adoni-zedec king of Jerusalem had heard how Joshua had taken Ai, and had utterly destroyed it; as he had done to Jericho and her king, so he had done to Ai and her king; and how the inhabitants of Gibeon had made peace with Israel, and were among them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that they feared greatly, because Gibeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a great city, as one of the royal cities, and because it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' greater than Ai, and all the men thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' mighty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Wherefore Adoni-zedec king of Jerusalem sent unto Hoham king of Hebron, and unto Piram king of Jarmuth, and unto Japhia king of Lachish, and unto Debir king of Eglon, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Come up unto me, and help me, that we may smite Gibeon: for it hath made peace with Joshua and with the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Therefore the five kings of the Amorites, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, the king of Eglon, gathered themselves together, and went up, they and all their hosts, and encamped before Gibeon, and made war against it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the men of Gibeon sent unto Joshua to the camp to Gilgal, saying, Slack not thy hand from thy servants; come up to us quickly, and save us, and help us: for all the kings of the Amorites that dwell in the mountains are gathered together against us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joshua ascended from Gilgal, he, and all the people of war with him, and all the mighty men of valour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Joshua, Fear them not: for I have delivered them into thine hand; there shall not a man of them stand before thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joshua therefore came unto them suddenly, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' went up from Gilgal all night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' discomfited them before Israel, and slew them with a great slaughter at Gibeon, and chased them along the way that goeth up to Beth-horon, and smote them to Azekah, and unto Makkedah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass, as they fled from before Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' were in the going down to Beth-horon, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' cast down great stones from heaven upon them unto Azekah, and they died: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' more which died with hailstones than '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' whom the children of Israel slew with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then spake Joshua to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the day when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered up the Amorites before the children of Israel, and he said in the sight of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sun, stand thou still upon Gibeon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thou, Moon, in the valley of Ajalon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And the sun stood still, and the moon stayed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until the people had avenged themselves upon their enemies.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not this written in the book of Jasher? So the sun stood still in the midst of heaven, and hasted not to go down about a whole day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And there was no day like that before it or after it, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hearkened unto the voice of a man: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' fought for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And Joshua returned, and all Israel with him, unto the camp to Gilgal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But these five kings fled, and hid themselves in a cave at Makkedah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it was told Joshua, saying, The five kings are found hid in a cave at Makkedah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Joshua said, Roll great stones upon the mouth of the cave, and set men by it for to keep them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and stay ye not, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' pursue after your enemies, and smite the hindmost of them; suffer them not to enter into their cities: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath delivered them into your hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And it came to pass, when Joshua and the children of Israel had made an end of slaying them with a very great slaughter, till they were consumed, that the rest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' remained of them entered into fenced cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And all the people returned to the camp to Joshua at Makkedah in peace: none moved his tongue against any of the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then said Joshua, Open the mouth of the cave, and bring out those five kings unto me out of the cave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they did so, and brought forth those five kings unto him out of the cave, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the king of Eglon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it came to pass, when they brought out those kings unto Joshua, that Joshua called for all the men of Israel, and said unto the captains of the men of war which went with him, Come near, put your feet upon the necks of these kings. And they came near, and put their feet upon the necks of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Joshua said unto them, Fear not, nor be dismayed, be strong and of good courage: for thus shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' do to all your enemies against whom ye fight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And afterward Joshua smote them, and slew them, and hanged them on five trees: and they were hanging upon the trees until the evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And it came to pass at the time of the going down of the sun, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Joshua commanded, and they took them down off the trees, and cast them into the cave wherein they had been hid, and laid great stones in the cave''s mouth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which remain
  - type: text
    text: ' until this very day.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Completing the Conquest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And that day Joshua took Makkedah, and smote it with the edge of the sword, and the king thereof he utterly destroyed, them, and all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein; he let none remain: and he did to the king of Makkedah as he did unto the king of Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Joshua passed from Makkedah, and all Israel with him, unto Libnah, and fought against Libnah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered it also, and the king thereof, into the hand of Israel; and he smote it with the edge of the sword, and all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein; he let none remain in it; but did unto the king thereof as he did unto the king of Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Joshua passed from Libnah, and all Israel with him, unto Lachish, and encamped against it, and fought against it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered Lachish into the hand of Israel, which took it on the second day, and smote it with the edge of the sword, and all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein, according to all that he had done to Libnah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then Horam king of Gezer came up to help Lachish; and Joshua smote him and his people, until he had left him none remaining.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And from Lachish Joshua passed unto Eglon, and all Israel with him; and they encamped against it, and fought against it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and they took it on that day, and smote it with the edge of the sword, and all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein he utterly destroyed that day, according to all that he had done to Lachish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Joshua went up from Eglon, and all Israel with him, unto Hebron; and they fought against it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and they took it, and smote it with the edge of the sword, and the king thereof, and all the cities thereof, and all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein; he left none remaining, according to all that he had done to Eglon; but destroyed it utterly, and all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Joshua returned, and all Israel with him, to Debir; and fought against it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'and he took it, and the king thereof, and all the cities thereof; and they smote them with the edge of the sword, and utterly destroyed all the souls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' therein; he left none remaining: as he had done to Hebron, so he did to Debir, and to the king thereof; as he had done also to Libnah, and to her king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So Joshua smote all the country of the hills, and of the south, and of the vale, and of the springs, and all their kings: he left none remaining, but utterly destroyed all that breathed, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And Joshua smote them from Kadesh-barnea even unto Gaza, and all the country of Goshen, even unto Gibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And all these kings and their land did Joshua take at one time, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel fought for Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And Joshua returned, and all Israel with him, unto the camp to Gilgal.
