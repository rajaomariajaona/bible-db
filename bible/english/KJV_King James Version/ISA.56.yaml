  '1':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Keep ye judgment, and do justice: for my salvation '
  - type: text
    content: is
  - type: text
    content: ' near to come, and my righteousness to be revealed. '
  '10':
  - type: text
    content: 'His watchmen '
  - type: text
    content: are
  - type: text
    content: ' blind: they are all ignorant, they '
  - type: text
    content: are
  - type: text
    content: ' all dumb dogs, they cannot bark; sleeping, lying down, loving to slumber. '
  '11':
  - type: text
    content: 'Yea, '
  - type: text
    content: they are
  - type: text
    content: ' greedy dogs '
  - type: text
    content: which
  - type: text
    content: ' can never have enough, and they '
  - type: text
    content: are
  - type: text
    content: ' shepherds '
  - type: text
    content: that
  - type: text
    content: ' cannot understand: they all look to their own way, every one for his gain, from his quarter. '
  '12':
  - type: text
    content: 'Come ye, '
  - type: text
    content: say they
  - type: text
    content: ', I will fetch wine, and we will fill ourselves with strong drink; and to morrow shall be as this day, '
  - type: text
    content: and
  - type: text
    content: ' much more abundant.'
  '2':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man '
  - type: text
    content: that
  - type: text
    content: ' doeth this, and the son of man '
  - type: text
    content: that
  - type: text
    content: ' layeth hold on it; that keepeth the sabbath from polluting it, and keepeth his hand from doing any evil.'
  '3':
  - type: text
    content: 'Neither let the son of the stranger, that hath joined himself to the '
  - type: text
    content: LORD
  - type: text
    content: ', speak, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath utterly separated me from his people: neither let the eunuch say, Behold, I '
  - type: text
    content: am
  - type: text
    content: ' a dry tree. '
  '4':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' unto the eunuchs that keep my sabbaths, and choose '
  - type: text
    content: the things
  - type: text
    content: ' that please me, and take hold of my covenant; '
  '5':
  - type: text
    content: 'even unto them will I give in mine house and within my walls a place and a name better than of sons and of daughters: I will give them an everlasting name, that shall not be cut off.'
  '6':
  - type: text
    content: 'Also the sons of the stranger, that join themselves to the '
  - type: text
    content: LORD
  - type: text
    content: ', to serve him, and to love the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', to be his servants, every one that keepeth the sabbath from polluting it, and taketh hold of my covenant; '
  '7':
  - type: text
    content: 'even them will I bring to my holy mountain, and make them joyful in my house of prayer: their burnt offerings and their sacrifices '
  - type: text
    content: shall be
  - type: text
    content: ' accepted upon mine altar; for mine house shall be called an house of prayer for all people. '
  '8':
  - type: text
    content: 'The Lord '
  - type: text
    content: GOD
  - type: text
    content: ' which gathereth the outcasts of Israel saith, Yet will I gather '
  - type: text
    content: others
  - type: text
    content: ' to him, beside those that are gathered unto him. '
  '9':
  - type: text
    content: 'All ye beasts of the field, come to devour, '
  - type: text
    content: yea
  - type: text
    content: ', all ye beasts in the forest. '
