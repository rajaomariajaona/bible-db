document_id: ISA.56
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Keep ye judgment, and do justice: for my salvation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near to come, and my righteousness to be revealed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' doeth this, and the son of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' layeth hold on it; that keepeth the sabbath from polluting it, and keepeth his hand from doing any evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Neither let the son of the stranger, that hath joined himself to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', speak, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath utterly separated me from his people: neither let the eunuch say, Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a dry tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto the eunuchs that keep my sabbaths, and choose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the things
  - type: text
    text: ' that please me, and take hold of my covenant; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'even unto them will I give in mine house and within my walls a place and a name better than of sons and of daughters: I will give them an everlasting name, that shall not be cut off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Also the sons of the stranger, that join themselves to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to serve him, and to love the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to be his servants, every one that keepeth the sabbath from polluting it, and taketh hold of my covenant; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'even them will I bring to my holy mountain, and make them joyful in my house of prayer: their burnt offerings and their sacrifices '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' accepted upon mine altar; for mine house shall be called an house of prayer for all people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' which gathereth the outcasts of Israel saith, Yet will I gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: others
  - type: text
    text: ' to him, beside those that are gathered unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All ye beasts of the field, come to devour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yea
  - type: text
    text: ', all ye beasts in the forest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'His watchmen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' blind: they are all ignorant, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all dumb dogs, they cannot bark; sleeping, lying down, loving to slumber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' greedy dogs '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' can never have enough, and they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' shepherds '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' cannot understand: they all look to their own way, every one for his gain, from his quarter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Come ye, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: say they
  - type: text
    text: ', I will fetch wine, and we will fill ourselves with strong drink; and to morrow shall be as this day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' much more abundant.'
