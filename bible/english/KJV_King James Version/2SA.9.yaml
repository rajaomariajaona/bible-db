      children:
      - type: text
        text: is
    - type: text
      text: ' in the house of Machir, the son of Ammiel, in Lo-debar. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then king David sent, and fetched him out of the house of Machir, the son of Ammiel, from Lo-debar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Mephibosheth, the son of Jonathan, the son of Saul, was come unto David, he fell on his face, and did reverence. And David said, Mephibosheth. And he answered, Behold thy servant! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said unto him, Fear not: for I will surely shew thee kindness for Jonathan thy father''s sake, and will restore thee all the land of Saul thy father; and thou shalt eat bread at my table continually. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he bowed himself, and said, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy servant, that thou shouldest look upon such a dead dog as I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king called to Ziba, Saul''s servant, and said unto him, I have given unto thy master''s son all that pertained to Saul and to all his house. '
