  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said, Is there yet any that is left of the house of Saul, that I may shew him kindness for Jonathan''s sake? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou therefore, and thy sons, and thy servants, shall till the land for him, and thou shalt bring in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the fruits
    - type: text
      text: ', that thy master''s son may have food to eat: but Mephibosheth thy master''s son shall eat bread alway at my table. Now Ziba had fifteen sons and twenty servants. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Ziba unto the king, According to all that my lord the king hath commanded his servant, so shall thy servant do. As for Mephibosheth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: said the king
    - type: text
      text: ', he shall eat at my table, as one of the king''s sons. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mephibosheth had a young son, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Micha. And all that dwelt in the house of Ziba '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' servants unto Mephibosheth. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Mephibosheth dwelt in Jerusalem: for he did eat continually at the king''s table; and was lame on both his feet.'
