document_id: ISA.32,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Behold, a king shall reign in righteousness, and princes shall rule in judgment. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Many days and years shall ye be troubled, ye careless women: for the vintage shall fail, the gathering shall not come. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tremble, ye women that are at ease; be troubled, ye careless ones: strip you, and make you bare, and gird '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sackcloth
    - type: text
      text: ' upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' loins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They shall lament for the teats, for the pleasant fields, for the fruitful vine. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Upon the land of my people shall come up thorns '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' briers; yea, upon all the houses of joy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the joyous city: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'because the palaces shall be forsaken; the multitude of the city shall be left; the forts and towers shall be for dens for ever, a joy of wild asses, a pasture of flocks; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: until the spirit be poured upon us from on high, and the wilderness be a fruitful field, and the fruitful field be counted for a forest.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then judgment shall dwell in the wilderness, and righteousness remain in the fruitful field. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the work of righteousness shall be peace; and the effect of righteousness quietness and assurance for ever. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And my people shall dwell in a peaceable habitation, and in sure dwellings, and in quiet resting places; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'when it shall hail, coming down on the forest; and the city shall be low in a low place. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And a man shall be as an hiding place from the wind, and a covert from the tempest; as rivers of water in a dry place, as the shadow of a great rock in a weary land. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ye that sow beside all waters, that send forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thither
    - type: text
      text: ' the feet of the ox and the ass.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the eyes of them that see shall not be dim, and the ears of them that hear shall hearken. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The heart also of the rash shall understand knowledge, and the tongue of the stammerers shall be ready to speak plainly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The vile person shall be no more called liberal, nor the churl said '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' bountiful. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the vile person will speak villany, and his heart will work iniquity, to practise hypocrisy, and to utter error against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to make empty the soul of the hungry, and he will cause the drink of the thirsty to fail. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The instruments also of the churl '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' evil: he deviseth wicked devices to destroy the poor with lying words, even when the needy speaketh right. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But the liberal deviseth liberal things; and by liberal things shall he stand.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Women of Jerusalem
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rise up, ye women that are at ease; hear my voice, ye careless daughters; give ear unto my speech. '
