document_id: ISA.32,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Behold, a king shall reign in righteousness, and princes shall rule in judgment. '
  '10':
  - type: text
    content: 'Many days and years shall ye be troubled, ye careless women: for the vintage shall fail, the gathering shall not come. '
  '11':
  - type: text
    content: 'Tremble, ye women that are at ease; be troubled, ye careless ones: strip you, and make you bare, and gird '
  - type: text
    content: sackcloth
  - type: text
    content: ' upon '
  - type: text
    content: your
  - type: text
    content: ' loins. '
  '12':
  - type: text
    content: 'They shall lament for the teats, for the pleasant fields, for the fruitful vine. '
  '13':
  - type: text
    content: 'Upon the land of my people shall come up thorns '
  - type: text
    content: and
  - type: text
    content: ' briers; yea, upon all the houses of joy '
  - type: text
    content: in
  - type: text
    content: ' the joyous city: '
  '14':
  - type: text
    content: 'because the palaces shall be forsaken; the multitude of the city shall be left; the forts and towers shall be for dens for ever, a joy of wild asses, a pasture of flocks; '
  '15':
  - type: text
    content: until the spirit be poured upon us from on high, and the wilderness be a fruitful field, and the fruitful field be counted for a forest.
  '16':
  - type: text
    content: 'Then judgment shall dwell in the wilderness, and righteousness remain in the fruitful field. '
  '17':
  - type: text
    content: 'And the work of righteousness shall be peace; and the effect of righteousness quietness and assurance for ever. '
  '18':
  - type: text
    content: 'And my people shall dwell in a peaceable habitation, and in sure dwellings, and in quiet resting places; '
  '19':
  - type: text
    content: 'when it shall hail, coming down on the forest; and the city shall be low in a low place. '
  '2':
  - type: text
    content: 'And a man shall be as an hiding place from the wind, and a covert from the tempest; as rivers of water in a dry place, as the shadow of a great rock in a weary land. '
  '20':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' ye that sow beside all waters, that send forth '
  - type: text
    content: thither
  - type: text
    content: ' the feet of the ox and the ass.'
  '3':
  - type: text
    content: 'And the eyes of them that see shall not be dim, and the ears of them that hear shall hearken. '
  '4':
  - type: text
    content: 'The heart also of the rash shall understand knowledge, and the tongue of the stammerers shall be ready to speak plainly. '
  '5':
  - type: text
    content: 'The vile person shall be no more called liberal, nor the churl said '
  - type: text
    content: to be
  - type: text
    content: ' bountiful. '
  '6':
  - type: text
    content: 'For the vile person will speak villany, and his heart will work iniquity, to practise hypocrisy, and to utter error against the '
  - type: text
    content: LORD
  - type: text
    content: ', to make empty the soul of the hungry, and he will cause the drink of the thirsty to fail. '
  '7':
  - type: text
    content: 'The instruments also of the churl '
  - type: text
    content: are
  - type: text
    content: ' evil: he deviseth wicked devices to destroy the poor with lying words, even when the needy speaketh right. '
  '8':
  - type: text
    content: But the liberal deviseth liberal things; and by liberal things shall he stand.
  - type: heading
    content: Women of Jerusalem
  '9':
  - type: text
    content: 'Rise up, ye women that are at ease; hear my voice, ye careless daughters; give ear unto my speech. '
