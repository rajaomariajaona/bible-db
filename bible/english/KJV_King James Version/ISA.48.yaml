  '17':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', thy Redeemer, the Holy One of Israel; I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God which teacheth thee to profit, which leadeth thee by the way '
  - type: text
    content: that
  - type: text
    content: ' thou shouldest go. '
  '18':
  - type: text
    content: 'O that thou hadst hearkened to my commandments! then had thy peace been as a river, and thy righteousness as the waves of the sea: '
  '19':
  - type: text
    content: thy seed also had been as the sand, and the offspring of thy bowels like the gravel thereof; his name should not have been cut off nor destroyed from before me.
  '2':
  - type: text
    content: 'For they call themselves of the holy city, and stay themselves upon the God of Israel; The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' his name. '
  '20':
  - type: text
    content: 'Go ye forth of Babylon, flee ye from the Chaldeans, with a voice of singing declare ye, tell this, utter it '
  - type: text
    content: even
  - type: text
    content: ' to the end of the earth; say ye, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath redeemed his servant Jacob. '
  '21':
  - type: text
    content: 'And they thirsted not '
  - type: text
    content: when
  - type: text
    content: ' he led them through the deserts: he caused the waters to flow out of the rock for them: he clave the rock also, and the waters gushed out. '
  '22':
  - type: text
    content: There is
  - type: text
    content: ' no peace, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', unto the wicked.'
  '3':
  - type: text
    content: 'I have declared the former things from the beginning; and they went forth out of my mouth, and I shewed them; I did '
  - type: text
    content: them
  - type: text
    content: ' suddenly, and they came to pass. '
  '4':
  - type: text
    content: 'Because I knew that thou '
  - type: text
    content: art
  - type: text
    content: ' obstinate, and thy neck '
  - type: text
    content: is
  - type: text
    content: ' an iron sinew, and thy brow brass; '
  '5':
  - type: text
    content: 'I have even from the beginning declared '
  - type: text
    content: it
  - type: text
    content: ' to thee; before it came to pass I shewed '
  - type: text
    content: it
  - type: text
    content: ' thee: lest thou shouldest say, Mine idol hath done them, and my graven image, and my molten image, hath commanded them. '
  '6':
  - type: text
    content: 'Thou hast heard, see all this; and will not ye declare '
  - type: text
    content: it?
  - type: text
    content: ' I have shewed thee new things from this time, even hidden things, and thou didst not know them. '
  '7':
  - type: text
    content: 'They are created now, and not from the beginning; even before the day when thou heardest them not; lest thou shouldest say, Behold, I knew them. '
  '8':
  - type: text
    content: 'Yea, thou heardest not; yea, thou knewest not; yea, from that time '
  - type: text
    content: that
  - type: text
    content: ' thine ear was not opened: for I knew that thou wouldest deal very treacherously, and wast called a transgressor from the womb. '
  '9':
  - type: text
    content: 'For my name''s sake will I defer mine anger, and for my praise will I refrain for thee, that I cut thee not off. '
