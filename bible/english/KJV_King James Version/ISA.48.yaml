    content: Israel's Obstinacy
  - type: text
    content: 'Hear ye this, O house of Jacob, which are called by the name of Israel, and are come forth out of the waters of Judah, which swear by the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', and make mention of the God of Israel, '
  - type: text
    content: but
  - type: text
    content: ' not in truth, nor in righteousness. '
  '10':
  - type: text
    content: 'Behold, I have refined thee, but not with silver; I have chosen thee in the furnace of affliction. '
  '11':
  - type: text
    content: 'For mine own sake, '
  - type: text
    content: even
  - type: text
