  - type: text
    content: ' I, have spoken; yea, I have called him: I have brought him, and he shall make his way prosperous. '
  '16':
  - type: text
    content: 'Come ye near unto me, hear ye this; I have not spoken in secret from the beginning; from the time that it was, there '
  - type: text
    content: am
  - type: text
    content: ' I: and now the Lord '
  - type: text
    content: GOD
  - type: text
