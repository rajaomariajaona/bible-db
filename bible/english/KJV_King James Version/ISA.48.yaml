document_id: ISA.48
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Israel's Obstinacy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear ye this, O house of Jacob, which are called by the name of Israel, and are come forth out of the waters of Judah, which swear by the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and make mention of the God of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' not in truth, nor in righteousness. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For they call themselves of the holy city, and stay themselves upon the God of Israel; The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I have declared the former things from the beginning; and they went forth out of my mouth, and I shewed them; I did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' suddenly, and they came to pass. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Because I knew that thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' obstinate, and thy neck '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an iron sinew, and thy brow brass; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I have even from the beginning declared '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to thee; before it came to pass I shewed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' thee: lest thou shouldest say, Mine idol hath done them, and my graven image, and my molten image, hath commanded them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thou hast heard, see all this; and will not ye declare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
  - type: text
    text: ' I have shewed thee new things from this time, even hidden things, and thou didst not know them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They are created now, and not from the beginning; even before the day when thou heardest them not; lest thou shouldest say, Behold, I knew them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yea, thou heardest not; yea, thou knewest not; yea, from that time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thine ear was not opened: for I knew that thou wouldest deal very treacherously, and wast called a transgressor from the womb. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For my name''s sake will I defer mine anger, and for my praise will I refrain for thee, that I cut thee not off. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Behold, I have refined thee, but not with silver; I have chosen thee in the furnace of affliction. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For mine own sake, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' for mine own sake, will I do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' for how should '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my name
  - type: text
    text: ' be polluted? and I will not give my glory unto another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hearken unto me, O Jacob and Israel, my called; I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he; I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the first, I also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the last. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mine hand also hath laid the foundation of the earth, and my right hand hath spanned the heavens: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' I call unto them, they stand up together. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'All ye, assemble yourselves, and hear; which among them hath declared these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things?
  - type: text
    text: ' The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath loved him: he will do his pleasure on Babylon, and his arm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be on
  - type: text
    text: ' the Chaldeans. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, have spoken; yea, I have called him: I have brought him, and he shall make his way prosperous. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Come ye near unto me, hear ye this; I have not spoken in secret from the beginning; from the time that it was, there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I: and now the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', and his Spirit, hath sent me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thy Redeemer, the Holy One of Israel; I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God which teacheth thee to profit, which leadeth thee by the way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou shouldest go. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'O that thou hadst hearkened to my commandments! then had thy peace been as a river, and thy righteousness as the waves of the sea: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: thy seed also had been as the sand, and the offspring of thy bowels like the gravel thereof; his name should not have been cut off nor destroyed from before me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Go ye forth of Babylon, flee ye from the Chaldeans, with a voice of singing declare ye, tell this, utter it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the end of the earth; say ye, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath redeemed his servant Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they thirsted not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' he led them through the deserts: he caused the waters to flow out of the rock for them: he clave the rock also, and the waters gushed out. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no peace, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', unto the wicked.'
