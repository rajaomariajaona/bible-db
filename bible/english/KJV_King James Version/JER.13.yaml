verses:
  '1':
  - type: heading
    content: Parable of the Girdle
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' unto me, Go and get thee a linen girdle, and put it upon thy loins, and put it not in water. '
  '10':
  - type: text
    content: 'This evil people, which refuse to hear my words, which walk in the imagination of their heart, and walk after other gods, to serve them, and to worship them, shall even be as this girdle, which is good for nothing. '
  '11':
  - type: text
    content: 'For as the girdle cleaveth to the loins of a man, so have I caused to cleave unto me the whole house of Israel and the whole house of Judah, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; that they might be unto me for a people, and for a name, and for a praise, and for a glory: but they would not hear.'
  - type: heading
    content: Coming Disaster
  '12':
  - type: text
    content: 'Therefore thou shalt speak unto them this word; Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, Every bottle shall be filled with wine: and they shall say unto thee, Do we not certainly know that every bottle shall be filled with wine? '
  '13':
  - type: text
    content: 'Then shalt thou say unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Behold, I will fill all the inhabitants of this land, even the kings that sit upon David''s throne, and the priests, and the prophets, and all the inhabitants of Jerusalem, with drunkenness. '
  '14':
  - type: text
    content: 'And I will dash them one against another, even the fathers and the sons together, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': I will not pity, nor spare, nor have mercy, but destroy them.'
  '15':
  - type: text
    content: 'Hear ye, and give ear; be not proud: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken. '
  '16':
  - type: text
    content: 'Give glory to the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, before he cause darkness, and before your feet stumble upon the dark mountains, and, while ye look for light, he turn it into the shadow of death, '
  - type: text
    content: and
  - type: text
    content: ' make '
  - type: text
    content: it
  - type: text
    content: ' gross darkness. '
  '17':
  - type: text
    content: 'But if ye will not hear it, my soul shall weep in secret places for '
  - type: text
    content: your
  - type: text
    content: ' pride; and mine eye shall weep sore, and run down with tears, because the '
  - type: text
    content: LORD
  - type: text
    content: '''s flock is carried away captive.'
  '18':
  - type: text
    content: 'Say unto the king and to the queen, Humble yourselves, sit down: for your principalities shall come down, '
  - type: text
    content: even
  - type: text
    content: ' the crown of your glory. '
  '19':
  - type: text
    content: 'The cities of the south shall be shut up, and none shall open '
  - type: text
    content: 'them:'
  - type: text
    content: ' Judah shall be carried away captive all of it, it shall be wholly carried away captive.'
  - type: heading
    content: The Leopard's Spots
  '2':
  - type: text
    content: 'So I got a girdle according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', and put '
  - type: text
    content: it
  - type: text
    content: ' on my loins. '
  '20':
  - type: text
    content: 'Lift up your eyes, and behold them that come from the north: where '
  - type: text
    content: is
  - type: text
    content: ' the flock '
  - type: text
    content: that
  - type: text
    content: ' was given thee, thy beautiful flock? '
  '21':
  - type: text
    content: 'What wilt thou say when he shall punish thee? for thou hast taught them '
  - type: text
    content: to be
  - type: text
    content: ' captains, '
  - type: text
    content: and
  - type: text
    content: ' as chief over thee: shall not sorrows take thee, as a woman in travail? '
  '22':
  - type: text
    content: 'And if thou say in thine heart, Wherefore come these things upon me? For the greatness of thine iniquity are thy skirts discovered, '
  - type: text
    content: and
  - type: text
    content: ' thy heels made bare. '
  '23':
  - type: text
    content: 'Can the Ethiopian change his skin, or the leopard his spots? '
  - type: text
    content: then
  - type: text
    content: ' may ye also do good, that are accustomed to do evil. '
  '24':
  - type: text
    content: 'Therefore will I scatter them as the stubble that passeth away by the wind of the wilderness. '
  '25':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' thy lot, the portion of thy measures from me, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; because thou hast forgotten me, and trusted in falsehood. '
  '26':
  - type: text
    content: 'Therefore will I discover thy skirts upon thy face, that thy shame may appear. '
  '27':
  - type: text
    content: 'I have seen thine adulteries, and thy neighings, the lewdness of thy whoredom, '
  - type: text
    content: and
  - type: text
    content: ' thine abominations on the hills in the fields. Woe unto thee, O Jerusalem! wilt thou not be made clean? when '
  - type: text
    content: shall it
  - type: text
    content: ' once '
  - type: text
    content: be?
  '3':
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me the second time, saying, '
  '4':
  - type: text
    content: 'Take the girdle that thou hast got, which '
  - type: text
    content: is
  - type: text
    content: ' upon thy loins, and arise, go to Euphrates, and hide it there in a hole of the rock. '
  '5':
  - type: text
    content: 'So I went, and hid it by Euphrates, as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded me. '
  '6':
  - type: text
    content: 'And it came to pass after many days, that the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Arise, go to Euphrates, and take the girdle from thence, which I commanded thee to hide there. '
  '7':
  - type: text
    content: 'Then I went to Euphrates, and digged, and took the girdle from the place where I had hid it: and, behold, the girdle was marred, it was profitable for nothing.'
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '9':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', After this manner will I mar the pride of Judah, and the great pride of Jerusalem. '
