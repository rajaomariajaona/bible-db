document_id: JER.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Parable of the Girdle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto me, Go and get thee a linen girdle, and put it upon thy loins, and put it not in water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So I got a girdle according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on my loins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me the second time, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Take the girdle that thou hast got, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon thy loins, and arise, go to Euphrates, and hide it there in a hole of the rock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So I went, and hid it by Euphrates, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it came to pass after many days, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, Arise, go to Euphrates, and take the girdle from thence, which I commanded thee to hide there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then I went to Euphrates, and digged, and took the girdle from the place where I had hid it: and, behold, the girdle was marred, it was profitable for nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', After this manner will I mar the pride of Judah, and the great pride of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This evil people, which refuse to hear my words, which walk in the imagination of their heart, and walk after other gods, to serve them, and to worship them, shall even be as this girdle, which is good for nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For as the girdle cleaveth to the loins of a man, so have I caused to cleave unto me the whole house of Israel and the whole house of Judah, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; that they might be unto me for a people, and for a name, and for a praise, and for a glory: but they would not hear.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Coming Disaster
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore thou shalt speak unto them this word; Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, Every bottle shall be filled with wine: and they shall say unto thee, Do we not certainly know that every bottle shall be filled with wine? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then shalt thou say unto them, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Behold, I will fill all the inhabitants of this land, even the kings that sit upon David''s throne, and the priests, and the prophets, and all the inhabitants of Jerusalem, with drunkenness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And I will dash them one against another, even the fathers and the sons together, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': I will not pity, nor spare, nor have mercy, but destroy them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hear ye, and give ear; be not proud: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Give glory to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, before he cause darkness, and before your feet stumble upon the dark mountains, and, while ye look for light, he turn it into the shadow of death, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' gross darkness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if ye will not hear it, my soul shall weep in secret places for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' pride; and mine eye shall weep sore, and run down with tears, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s flock is carried away captive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Say unto the king and to the queen, Humble yourselves, sit down: for your principalities shall come down, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the crown of your glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The cities of the south shall be shut up, and none shall open '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' Judah shall be carried away captive all of it, it shall be wholly carried away captive.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Leopard's Spots
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lift up your eyes, and behold them that come from the north: where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the flock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' was given thee, thy beautiful flock? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'What wilt thou say when he shall punish thee? for thou hast taught them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' captains, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as chief over thee: shall not sorrows take thee, as a woman in travail? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And if thou say in thine heart, Wherefore come these things upon me? For the greatness of thine iniquity are thy skirts discovered, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thy heels made bare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Can the Ethiopian change his skin, or the leopard his spots? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' may ye also do good, that are accustomed to do evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore will I scatter them as the stubble that passeth away by the wind of the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy lot, the portion of thy measures from me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; because thou hast forgotten me, and trusted in falsehood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Therefore will I discover thy skirts upon thy face, that thy shame may appear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'I have seen thine adulteries, and thy neighings, the lewdness of thy whoredom, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thine abominations on the hills in the fields. Woe unto thee, O Jerusalem! wilt thou not be made clean? when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall it
  - type: text
    text: ' once '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be?
