document_id: ISA.46
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Gods of Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bel boweth down, Nebo stoopeth, their idols were upon the beasts, and upon the cattle: your carriages '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' heavy loaden; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' a burden to the weary '
  - type: usfm
    marker: add
    children:
    - type: text
      text: beast
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They stoop, they bow down together; they could not deliver the burden, but themselves are gone into captivity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hearken unto me, O house of Jacob, and all the remnant of the house of Israel, which are borne '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by me
  - type: text
    text: ' from the belly, which are carried from the womb: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' old age I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to hoar hairs will I carry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'you:'
  - type: text
    text: ' I have made, and I will bear; even I will carry, and will deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'To whom will ye liken me, and make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' equal, and compare me, that we may be like? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They lavish gold out of the bag, and weigh silver in the balance, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hire a goldsmith; and he maketh it a god: they fall down, yea, they worship. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They bear him upon the shoulder, they carry him, and set him in his place, and he standeth; from his place shall he not remove: yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' shall cry unto him, yet can he not answer, nor save him out of his trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Remember this, and shew yourselves men: bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' again to mind, O ye transgressors. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Remember the former things of old: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' God, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none else; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I am
  - type: text
    text: ' God, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none like me, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'declaring the end from the beginning, and from ancient times '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the things
  - type: text
    text: ' that are not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' done, saying, My counsel shall stand, and I will do all my pleasure: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'calling a ravenous bird from the east, the man that executeth my counsel from a far country: yea, I have spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', I will also bring it to pass; I have purposed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', I will also do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hearken unto me, ye stouthearted, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' far from righteousness: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I bring near my righteousness; it shall not be far off, and my salvation shall not tarry: and I will place salvation in Zion for Israel my glory.'
