  - type: text
    content: and
  - type: text
    content: ' praise is comely.'
  '10':
  - type: text
    content: 'He delighteth not in the strength of the horse:'
  - type: text
    content: He taketh not pleasure in the legs of a man.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' taketh pleasure in them that fear him,'
  - type: text
    content: In those that hope in his mercy.
  '12':
  - type: text
    content: 'Praise the '
  - type: text
    content: LORD
  - type: text
    content: ', O Jerusalem;'
  - type: text
    content: Praise thy God, O Zion.
  '13':
  - type: text
    content: For he hath strengthened the bars of thy gates;
  - type: text
    content: He hath blessed thy children within thee.
  '14':
  - type: text
    content: 'He maketh peace '
  - type: text
    content: in
  - type: text
    content: ' thy borders,'
  - type: text
    content: And
  - type: text
    content: ' filleth thee with the finest of the wheat.'
  '15':
  - type: text
    content: 'He sendeth forth his commandment '
  - type: text
    content: upon
  - type: text
    content: ' earth:'
  - type: text
    content: His word runneth very swiftly.
  '16':
  - type: text
    content: 'He giveth snow like wool:'
  - type: text
    content: He scattereth the hoarfrost like ashes.
  '17':
  - type: text
    content: 'He casteth forth his ice like morsels:'
  - type: text
    content: Who can stand before his cold?
  '18':
  - type: text
    content: 'He sendeth out his word, and melteth them:'
  - type: text
    content: 'He causeth his wind to blow, '
  - type: text
    content: and
  - type: text
    content: ' the waters flow.'
  '19':
  - type: text
    content: He sheweth his word unto Jacob,
  - type: text
    content: His statutes and his judgments unto Israel.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' doth build up Jerusalem:'
  - type: text
    content: He gathereth together the outcasts of Israel.
  '20':
  - type: text
    content: 'He hath not dealt so with any nation:'
  - type: text
    content: 'And '
  - type: text
    content: as for his
  - type: text
    content: ' judgments, they have not known them.'
  - type: text
    content: 'Praise ye the '
  - type: text
    content: LORD
  - type: text
    content: .
  '3':
  - type: text
    content: He healeth the broken in heart,
  - type: text
    content: And bindeth up their wounds.
  '4':
  - type: text
    content: He telleth the number of the stars;
  - type: text
    content: 'He calleth them all by '
  - type: text
    content: their
  - type: text
    content: ' names.'
  '5':
  - type: text
    content: 'Great '
  - type: text
    content: is
  - type: text
    content: ' our Lord, and of great power:'
  - type: text
    content: 'His understanding '
  - type: text
    content: is
  - type: text
    content: ' infinite.'
  '6':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' lifteth up the meek:'
  - type: text
    content: He casteth the wicked down to the ground.
  '7':
  - type: text
    content: 'Sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with thanksgiving;'
  - type: text
    content: 'Sing praise upon the harp unto our God:'
  '8':
  - type: text
    content: Who covereth the heaven with clouds, who prepareth rain for the earth,
  - type: text
    content: Who maketh grass to grow upon the mountains.
  '9':
  - type: text
    content: He giveth to the beast his food,
  - type: text
