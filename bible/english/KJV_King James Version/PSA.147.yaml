    - type: text
      text: '1'
  - type: text
    text: 'Praise ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' good to sing praises unto our God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' pleasant; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' praise is comely.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' doth build up Jerusalem:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He gathereth together the outcasts of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He healeth the broken in heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bindeth up their wounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He telleth the number of the stars;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He calleth them all by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' names.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our Lord, and of great power:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His understanding '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' infinite.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' lifteth up the meek:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He casteth the wicked down to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sing unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with thanksgiving;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Sing praise upon the harp unto our God:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who covereth the heaven with clouds, who prepareth rain for the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who maketh grass to grow upon the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He giveth to the beast his food,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' to the young ravens which cry.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He delighteth not in the strength of the horse:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He taketh not pleasure in the legs of a man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' taketh pleasure in them that fear him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In those that hope in his mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O Jerusalem;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Praise thy God, O Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For he hath strengthened the bars of thy gates;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath blessed thy children within thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He maketh peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' thy borders,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' filleth thee with the finest of the wheat.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He sendeth forth his commandment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His word runneth very swiftly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He giveth snow like wool:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He scattereth the hoarfrost like ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He casteth forth his ice like morsels:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can stand before his cold?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He sendeth out his word, and melteth them:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He causeth his wind to blow, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the waters flow.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He sheweth his word unto Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: His statutes and his judgments unto Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He hath not dealt so with any nation:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for his
  - type: text
    text: ' judgments, they have not known them.'
- type: usfm
  marker: qr
  children:
  - type: text
    text: 'Praise ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
