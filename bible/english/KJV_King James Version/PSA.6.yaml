document_id: PSA.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician on Neginoth upon Sheminith, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', rebuke me not in thine anger,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither chasten me in thy hot displeasure.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all mine enemies be ashamed and sore vexed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them return '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' be ashamed suddenly.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy upon me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' weak:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', heal me; for my bones are vexed.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My soul is also sore vexed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', how long?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Return, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', deliver my soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh save me for thy mercies' sake.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For in death '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no remembrance of thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the grave who shall give thee thanks?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am weary with my groaning; all the night make I my bed to swim;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I water my couch with my tears.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine eye is consumed because of grief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It waxeth old because of all mine enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depart from me, all ye workers of iniquity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath heard the voice of my weeping.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath heard my supplication;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will receive my prayer.'
