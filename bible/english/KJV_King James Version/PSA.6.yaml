document_id: PSA.6,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician on Neginoth upon Sheminith, A Psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', rebuke me not in thine anger,'
  - type: text
    content: Neither chasten me in thy hot displeasure.
  '10':
  - type: text
    content: 'Let all mine enemies be ashamed and sore vexed:'
  - type: text
    content: 'Let them return '
  - type: text
    content: and
  - type: text
    content: ' be ashamed suddenly.'
  '2':
  - type: text
    content: 'Have mercy upon me, O '
  - type: text
    content: LORD
  - type: text
    content: '; for I '
  - type: text
    content: am
  - type: text
    content: ' weak:'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', heal me; for my bones are vexed.'
  '3':
  - type: text
    content: 'My soul is also sore vexed:'
  - type: text
    content: 'But thou, O '
  - type: text
    content: LORD
  - type: text
    content: ', how long?'
  '4':
  - type: text
    content: 'Return, O '
  - type: text
    content: LORD
  - type: text
    content: ', deliver my soul:'
  - type: text
    content: Oh save me for thy mercies' sake.
  '5':
  - type: text
    content: 'For in death '
  - type: text
    content: there is
  - type: text
    content: ' no remembrance of thee:'
  - type: text
    content: In the grave who shall give thee thanks?
  '6':
  - type: text
    content: I am weary with my groaning; all the night make I my bed to swim;
  - type: text
    content: I water my couch with my tears.
  '7':
  - type: text
    content: Mine eye is consumed because of grief;
  - type: text
    content: It waxeth old because of all mine enemies.
  '8':
  - type: text
    content: Depart from me, all ye workers of iniquity;
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath heard the voice of my weeping.'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath heard my supplication;'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will receive my prayer.'
