document_id: PSA.59,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, Al-taschith, Michtam of David; when Saul sent, and they watched the house to kill him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Deliver me from mine enemies, O my God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Defend me from them that rise up against me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The God of my mercy shall prevent me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God shall let me see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my desire
    - type: text
      text: ' upon mine enemies.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Slay them not, lest my people forget:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Scatter them by thy power; and bring them down, O Lord our shield.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' the sin of their mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the words of their lips let them even be taken in their pride:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And for cursing and lying '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' they speak.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Consume '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in wrath, consume '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', that they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'be:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And let them know that God ruleth in Jacob unto the ends of the earth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And at evening let them return;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' let them make a noise like a dog, and go round about the city.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Let them wander up and down for meat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And grudge if they be not satisfied.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But I will sing of thy power; Yea, I will sing aloud of thy mercy in the morning:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou hast been my defence and refuge in the day of my trouble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Unto thee, O my strength, will I sing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my defence, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the God of my mercy.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Deliver me from the workers of iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And save me from bloody men.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For, lo, they lie in wait for my soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The mighty are gathered against me; Not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' my transgression, nor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' my sin, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They run and prepare themselves without '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' fault.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Awake to help me, and behold.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thou therefore, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of hosts, the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Awake to visit all the heathen: Be not merciful to any wicked transgressors. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They return at evening:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They make a noise like a dog, and go round about the city.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Behold, they belch out with their mouth: Swords '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in their lips:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For who, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: say they
    - type: text
      text: ', doth hear?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', shalt laugh at them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt have all the heathen in derision.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Because of
    - type: text
      text: ' his strength will I wait upon thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my defence.'
