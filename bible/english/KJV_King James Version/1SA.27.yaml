document_id: 1SA.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And David said in his heart, I shall now perish one day by the hand of Saul: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' nothing better for me than that I should speedily escape into the land of the Philistines; and Saul shall despair of me, to seek me any more in any coast of Israel: so shall I escape out of his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David arose, and he passed over with the six hundred men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him unto Achish, the son of Maoch, king of Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David dwelt with Achish at Gath, he and his men, every man with his household, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' David with his two wives, Ahinoam the Jezreelitess, and Abigail the Carmelitess, Nabal''s wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it was told Saul that David was fled to Gath: and he sought no more again for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David said unto Achish, If I have now found grace in thine eyes, let them give me a place in some town in the country, that I may dwell there: for why should thy servant dwell in the royal city with thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Achish gave him Ziklag that day: wherefore Ziklag pertaineth unto the kings of Judah unto this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the time that David dwelt in the country of the Philistines was a full year and four months.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And David and his men went up, and invaded the Geshurites, and the Gezrites, and the Amalekites: for those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nations were
  - type: text
    text: ' of old the inhabitants of the land, as thou goest to Shur, even unto the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And David smote the land, and left neither man nor woman alive, and took away the sheep, and the oxen, and the asses, and the camels, and the apparel, and returned, and came to Achish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Achish said, Whither have ye made a road to day? And David said, Against the south of Judah, and against the south of the Jerahmeelites, and against the south of the Kenites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And David saved neither man nor woman alive, to bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tidings
  - type: text
    text: ' to Gath, saying, Lest they should tell on us, saying, So did David, and so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' his manner all the while he dwelleth in the country of the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And Achish believed David, saying, He hath made his people Israel utterly to abhor him; therefore he shall be my servant for ever.
