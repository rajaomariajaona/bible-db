document_id: 1SA.27,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And David said in his heart, I shall now perish one day by the hand of Saul: '
  - type: text
    content: there is
  - type: text
    content: ' nothing better for me than that I should speedily escape into the land of the Philistines; and Saul shall despair of me, to seek me any more in any coast of Israel: so shall I escape out of his hand. '
  '10':
  - type: text
    content: 'And Achish said, Whither have ye made a road to day? And David said, Against the south of Judah, and against the south of the Jerahmeelites, and against the south of the Kenites. '
  '11':
  - type: text
    content: 'And David saved neither man nor woman alive, to bring '
  - type: text
    content: tidings
  - type: text
    content: ' to Gath, saying, Lest they should tell on us, saying, So did David, and so '
  - type: text
    content: will be
  - type: text
    content: ' his manner all the while he dwelleth in the country of the Philistines. '
  '12':
  - type: text
    content: And Achish believed David, saying, He hath made his people Israel utterly to abhor him; therefore he shall be my servant for ever.
  '2':
  - type: text
    content: 'And David arose, and he passed over with the six hundred men that '
  - type: text
    content: were
  - type: text
    content: ' with him unto Achish, the son of Maoch, king of Gath. '
  '3':
  - type: text
    content: 'And David dwelt with Achish at Gath, he and his men, every man with his household, '
  - type: text
    content: even
  - type: text
    content: ' David with his two wives, Ahinoam the Jezreelitess, and Abigail the Carmelitess, Nabal''s wife. '
  '4':
  - type: text
    content: 'And it was told Saul that David was fled to Gath: and he sought no more again for him.'
  '5':
  - type: text
    content: 'And David said unto Achish, If I have now found grace in thine eyes, let them give me a place in some town in the country, that I may dwell there: for why should thy servant dwell in the royal city with thee? '
  '6':
  - type: text
    content: 'Then Achish gave him Ziklag that day: wherefore Ziklag pertaineth unto the kings of Judah unto this day. '
  '7':
  - type: text
    content: And the time that David dwelt in the country of the Philistines was a full year and four months.
  '8':
  - type: text
    content: 'And David and his men went up, and invaded the Geshurites, and the Gezrites, and the Amalekites: for those '
  - type: text
    content: nations were
  - type: text
    content: ' of old the inhabitants of the land, as thou goest to Shur, even unto the land of Egypt. '
  '9':
  - type: text
    content: 'And David smote the land, and left neither man nor woman alive, and took away the sheep, and the oxen, and the asses, and the camels, and the apparel, and returned, and came to Achish. '
