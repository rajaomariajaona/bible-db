document_id: ISA.51
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hearken to me, ye that follow after righteousness, ye that seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': look unto the rock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whence
  - type: text
    text: ' ye are hewn, and to the hole of the pit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whence
  - type: text
    text: ' ye are digged. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Look unto Abraham your father, and unto Sarah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' bare you: for I called him alone, and blessed him, and increased him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall comfort Zion: he will comfort all her waste places; and he will make her wilderness like Eden, and her desert like the garden of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ; joy and gladness shall be found therein, thanksgiving, and the voice of melody.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hearken unto me, my people; and give ear unto me, O my nation: for a law shall proceed from me, and I will make my judgment to rest for a light of the people. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near; my salvation is gone forth, and mine arms shall judge the people; the isles shall wait upon me, and on mine arm shall they trust. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lift up your eyes to the heavens, and look upon the earth beneath: for the heavens shall vanish away like smoke, and the earth shall wax old like a garment, and they that dwell therein shall die in like manner: but my salvation shall be for ever, and my righteousness shall not be abolished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hearken unto me, ye that know righteousness, the people in whose heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my law; fear ye not the reproach of men, neither be ye afraid of their revilings. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the moth shall eat them up like a garment, and the worm shall eat them like wool: but my righteousness shall be for ever, and my salvation from generation to generation.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Arm of the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Awake, awake, put on strength, O arm of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; awake, as in the ancient days, in the generations of old. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou not it that hath cut Rahab, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' wounded the dragon? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou not it which hath dried the sea, the waters of the great deep; that hath made the depths of the sea a way for the ransomed to pass over? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore the redeemed of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall return, and come with singing unto Zion; and everlasting joy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon their head: they shall obtain gladness and joy; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrow and mourning shall flee away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' he that comforteth you: who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou, that thou shouldest be afraid of a man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall die, and of the son of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' shall be made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' grass; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and forgettest the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy maker, that hath stretched forth the heavens, and laid the foundations of the earth; and hast feared continually every day because of the fury of the oppressor, as if he were ready to destroy? and where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the fury of the oppressor? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The captive exile hasteneth that he may be loosed, and that he should not die in the pit, nor that his bread should fail. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, that divided the sea, whose waves roared: The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And I have put my words in thy mouth, and I have covered thee in the shadow of mine hand, that I may plant the heavens, and lay the foundations of the earth, and say unto Zion, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Awake, awake, stand up, O Jerusalem, which hast drunk at the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the cup of his fury; thou hast drunken the dregs of the cup of trembling, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' wrung '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' none to guide her among all the sons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whom
  - type: text
    text: ' she hath brought forth; neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there any
  - type: text
    text: ' that taketh her by the hand of all the sons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' she hath brought up. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' are come unto thee; who shall be sorry for thee? desolation, and destruction, and the famine, and the sword: by whom shall I comfort thee? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thy sons have fainted, they lie at the head of all the streets, as a wild bull in a net: they are full of the fury of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the rebuke of thy God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore hear now this, thou afflicted, and drunken, but not with wine: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'thus saith thy Lord the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and thy God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' pleadeth the cause of his people, Behold, I have taken out of thine hand the cup of trembling, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the dregs of the cup of my fury; thou shalt no more drink it again: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'but I will put it into the hand of them that afflict thee; which have said to thy soul, Bow down, that we may go over: and thou hast laid thy body as the ground, and as the street, to them that went over.'
