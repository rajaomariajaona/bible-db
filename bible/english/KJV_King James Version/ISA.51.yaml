document_id: ISA.51,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hearken to me, ye that follow after righteousness, ye that seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': look unto the rock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whence
    - type: text
      text: ' ye are hewn, and to the hole of the pit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whence
    - type: text
      text: ' ye are digged. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou not it which hath dried the sea, the waters of the great deep; that hath made the depths of the sea a way for the ransomed to pass over? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the redeemed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall return, and come with singing unto Zion; and everlasting joy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' upon their head: they shall obtain gladness and joy; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrow and mourning shall flee away.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' I, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' he that comforteth you: who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, that thou shouldest be afraid of a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall die, and of the son of man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' shall be made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' grass; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and forgettest the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy maker, that hath stretched forth the heavens, and laid the foundations of the earth; and hast feared continually every day because of the fury of the oppressor, as if he were ready to destroy? and where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the fury of the oppressor? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The captive exile hasteneth that he may be loosed, and that he should not die in the pit, nor that his bread should fail. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, that divided the sea, whose waves roared: The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I have put my words in thy mouth, and I have covered thee in the shadow of mine hand, that I may plant the heavens, and lay the foundations of the earth, and say unto Zion, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my people.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Awake, awake, stand up, O Jerusalem, which hast drunk at the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the cup of his fury; thou hast drunken the dregs of the cup of trembling, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' wrung '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' none to guide her among all the sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
    - type: text
      text: ' she hath brought forth; neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there any
    - type: text
      text: ' that taketh her by the hand of all the sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' she hath brought up. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' are come unto thee; who shall be sorry for thee? desolation, and destruction, and the famine, and the sword: by whom shall I comfort thee? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look unto Abraham your father, and unto Sarah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' bare you: for I called him alone, and blessed him, and increased him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy sons have fainted, they lie at the head of all the streets, as a wild bull in a net: they are full of the fury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the rebuke of thy God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore hear now this, thou afflicted, and drunken, but not with wine: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thus saith thy Lord the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and thy God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' pleadeth the cause of his people, Behold, I have taken out of thine hand the cup of trembling, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the dregs of the cup of my fury; thou shalt no more drink it again: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I will put it into the hand of them that afflict thee; which have said to thy soul, Bow down, that we may go over: and thou hast laid thy body as the ground, and as the street, to them that went over.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall comfort Zion: he will comfort all her waste places; and he will make her wilderness like Eden, and her desert like the garden of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; joy and gladness shall be found therein, thanksgiving, and the voice of melody.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hearken unto me, my people; and give ear unto me, O my nation: for a law shall proceed from me, and I will make my judgment to rest for a light of the people. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' near; my salvation is gone forth, and mine arms shall judge the people; the isles shall wait upon me, and on mine arm shall they trust. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lift up your eyes to the heavens, and look upon the earth beneath: for the heavens shall vanish away like smoke, and the earth shall wax old like a garment, and they that dwell therein shall die in like manner: but my salvation shall be for ever, and my righteousness shall not be abolished.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hearken unto me, ye that know righteousness, the people in whose heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my law; fear ye not the reproach of men, neither be ye afraid of their revilings. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the moth shall eat them up like a garment, and the worm shall eat them like wool: but my righteousness shall be for ever, and my salvation from generation to generation.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Arm of the Lord
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Awake, awake, put on strength, O arm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; awake, as in the ancient days, in the generations of old. '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou not it that hath cut Rahab, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' wounded the dragon? '
