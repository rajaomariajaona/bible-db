document_id: GEN.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Sarai Abram''s wife bare him no children: and she had an handmaid, an Egyptian, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Hagar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Sarai said unto Abram, Behold now, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath restrained me from bearing: I pray thee, go in unto my maid; it may be that I may obtain children by her. And Abram hearkened to the voice of Sarai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And Sarai Abram's wife took Hagar her maid the Egyptian, after Abram had dwelt ten years in the land of Canaan, and gave her to her husband Abram to be his wife.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he went in unto Hagar, and she conceived: and when she saw that she had conceived, her mistress was despised in her eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Sarai said unto Abram, My wrong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' upon thee: I have given my maid into thy bosom; and when she saw that she had conceived, I was despised in her eyes: the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' judge between me and thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Abram said unto Sarai, Behold, thy maid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thy hand; do to her as it pleaseth thee. And when Sarai dealt hardly with her, she fled from her face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' found her by a fountain of water in the wilderness, by the fountain in the way to Shur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he said, Hagar, Sarai''s maid, whence camest thou? and whither wilt thou go? And she said, I flee from the face of my mistress Sarai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto her, Return to thy mistress, and submit thyself under her hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto her, I will multiply thy seed exceedingly, that it shall not be numbered for multitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto her, Behold, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' with child, and shalt bear a son, and shalt call his name Ishmael; because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath heard thy affliction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he will be a wild man; his hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' against every man, and every man''s hand against him; and he shall dwell in the presence of all his brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And she called the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that spake unto her, Thou God seest me: for she said, Have I also here looked after him that seeth me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Wherefore the well was called Beer-lahai-roi; behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' between Kadesh and Bered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Hagar bare Abram a son: and Abram called his son''s name, which Hagar bare, Ishmael. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Abram '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fourscore and six years old, when Hagar bare Ishmael to Abram.'
