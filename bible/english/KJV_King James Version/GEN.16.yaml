  '2':
  - type: text
    content: 'And Sarai said unto Abram, Behold now, the '
  - type: text
    content: LORD
  - type: text
    content: ' hath restrained me from bearing: I pray thee, go in unto my maid; it may be that I may obtain children by her. And Abram hearkened to the voice of Sarai. '
  '3':
  - type: text
    content: And Sarai Abram's wife took Hagar her maid the Egyptian, after Abram had dwelt ten years in the land of Canaan, and gave her to her husband Abram to be his wife.
  '4':
  - type: text
    content: 'And he went in unto Hagar, and she conceived: and when she saw that she had conceived, her mistress was despised in her eyes. '
  '5':
  - type: text
    content: 'And Sarai said unto Abram, My wrong '
  - type: text
