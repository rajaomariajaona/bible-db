document_id: PSA.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man that walketh not in the counsel of the ungodly, nor standeth in the way of sinners,'
  - type: text
    content: Nor sitteth in the seat of the scornful.
  '2':
  - type: text
    content: 'But his delight '
  - type: text
    content: is
  - type: text
    content: ' in the law of the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And in his law doth he meditate day and night.
  '3':
  - type: text
    content: And he shall be like a tree planted by the rivers of water,
  - type: text
    content: That bringeth forth his fruit in his season;
  - type: text
    content: His leaf also shall not wither;
  - type: text
    content: And whatsoever he doeth shall prosper.
  '4':
  - type: text
    content: 'The ungodly '
  - type: text
    content: are
  - type: text
    content: ' not so:'
  - type: text
    content: 'But '
  - type: text
    content: are
  - type: text
    content: ' like the chaff which the wind driveth away.'
  '5':
  - type: text
    content: Therefore the ungodly shall not stand in the judgment,
  - type: text
    content: Nor sinners in the congregation of the righteous.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' knoweth the way of the righteous:'
  - type: text
    content: But the way of the ungodly shall perish.
