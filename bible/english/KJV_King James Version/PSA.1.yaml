document_id: PSA.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man that walketh not in the counsel of the ungodly, nor standeth in the way of sinners,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor sitteth in the seat of the scornful.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But his delight '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in his law doth he meditate day and night.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And he shall be like a tree planted by the rivers of water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That bringeth forth his fruit in his season;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His leaf also shall not wither;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And whatsoever he doeth shall prosper.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The ungodly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not so:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' like the chaff which the wind driveth away.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Therefore the ungodly shall not stand in the judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor sinners in the congregation of the righteous.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' knoweth the way of the righteous:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the way of the ungodly shall perish.
