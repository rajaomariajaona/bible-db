document_id: DEU.31,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses went and spake these words unto all Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses commanded them, saying, At the end of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' seven years, in the solemnity of the year of release, in the feast of tabernacles, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when all Israel is come to appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God in the place which he shall choose, thou shalt read this law before all Israel in their hearing. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gather the people together, men, and women, and children, and thy stranger that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' within thy gates, that they may hear, and that they may learn, and fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, and observe to do all the words of this law: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' their children, which have not known '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any thing
    - type: text
      text: ', may hear, and learn to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, as long as ye live in the land whither ye go over Jordan to possess it.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Behold, thy days approach that thou must die: call Joshua, and present yourselves in the tabernacle of the congregation, that I may give him a charge. And Moses and Joshua went, and presented themselves in the tabernacle of the congregation. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared in the tabernacle in a pillar of a cloud: and the pillar of the cloud stood over the door of the tabernacle. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Behold, thou shalt sleep with thy fathers; and this people will rise up, and go a whoring after the gods of the strangers of the land, whither they go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' among them, and will forsake me, and break my covenant which I have made with them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then my anger shall be kindled against them in that day, and I will forsake them, and I will hide my face from them, and they shall be devoured, and many evils and troubles shall befall them; so that they will say in that day, Are not these evils come upon us, because our God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not among us? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will surely hide my face in that day for all the evils which they shall have wrought, in that they are turned unto other gods. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore write ye this song for you, and teach it the children of Israel: put it in their mouths, that this song may be a witness for me against the children of Israel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' an hundred and twenty years old this day; I can no more go out and come in: also the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath said unto me, Thou shalt not go over this Jordan. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when I shall have brought them into the land which I sware unto their fathers, that floweth with milk and honey; and they shall have eaten and filled themselves, and waxen fat; then will they turn unto other gods, and serve them, and provoke me, and break my covenant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, when many evils and troubles are befallen them, that this song shall testify against them as a witness; for it shall not be forgotten out of the mouths of their seed: for I know their imagination which they go about, even now, before I have brought them into the land which I sware. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses therefore wrote this song the same day, and taught it the children of Israel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he gave Joshua the son of Nun a charge, and said, Be strong and of a good courage: for thou shalt bring the children of Israel into the land which I sware unto them: and I will be with thee.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Written Word
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Moses had made an end of writing the words of this law in a book, until they were finished, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that Moses commanded the Levites, which bare the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take this book of the law, and put it in the side of the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, that it may be there for a witness against thee. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know thy rebellion, and thy stiff neck: behold, while I am yet alive with you this day, ye have been rebellious against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; and how much more after my death?
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gather unto me all the elders of your tribes, and your officers, that I may speak these words in their ears, and call heaven and earth to record against them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know that after my death ye will utterly corrupt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ', and turn aside from the way which I have commanded you; and evil will befall you in the latter days; because ye will do evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to provoke him to anger through the work of your hands.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, he will go over before thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he will destroy these nations from before thee, and thou shalt possess them: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Joshua, he shall go over before thee, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath said. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Moses spake in the ears of all the congregation of Israel the words of this song, until they were ended.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall do unto them as he did to Sihon and to Og, kings of the Amorites, and unto the land of them, whom he destroyed. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall give them up before your face, that ye may do unto them according unto all the commandments which I have commanded you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong and of a good courage, fear not, nor be afraid of them: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' that doth go with thee; he will not fail thee, nor forsake thee.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses called unto Joshua, and said unto him in the sight of all Israel, Be strong and of a good courage: for thou must go with this people unto the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn unto their fathers to give them; and thou shalt cause them to inherit it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' that doth go before thee; he will be with thee, he will not fail thee, neither forsake thee: fear not, neither be dismayed.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses wrote this law, and delivered it unto the priests the sons of Levi, which bare the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and unto all the elders of Israel. '
