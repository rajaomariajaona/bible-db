document_id: 2CH.25
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Amaziah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amaziah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' twenty and five years old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' he began to reign, and he reigned twenty and nine years in Jerusalem. And his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jehoaddan of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', but not with a perfect heart. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now it came to pass, when the kingdom was established to him, that he slew his servants that had killed the king his father. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But he slew not their children, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' written in the law in the book of Moses, where the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded, saying, The fathers shall not die for the children, neither shall the children die for the fathers, but every man shall die for his own sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moreover Amaziah gathered Judah together, and made them captains over thousands, and captains over hundreds, according to the houses of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' fathers, throughout all Judah and Benjamin: and he numbered them from twenty years old and above, and found them three hundred thousand choice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men, able
  - type: text
    text: ' to go forth to war, that could handle spear and shield. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He hired also an hundred thousand mighty men of valour out of Israel for an hundred talents of silver. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But there came a man of God to him, saying, O king, let not the army of Israel go with thee; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not with Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit, with
  - type: text
    text: ' all the children of Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if thou wilt go, do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', be strong for the battle: God shall make thee fall before the enemy: for God hath power to help, and to cast down. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Amaziah said to the man of God, But what shall we do for the hundred talents which I have given to the army of Israel? And the man of God answered, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' is able to give thee much more than this. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Amaziah separated them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit
  - type: text
    text: ', the army that was come to him out of Ephraim, to go home again: wherefore their anger was greatly kindled against Judah, and they returned home in great anger. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Amaziah strengthened himself, and led forth his people, and went to the valley of salt, and smote of the children of Seir ten thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' ten thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: left
  - type: text
    text: ' alive did the children of Judah carry away captive, and brought them unto the top of the rock, and cast them down from the top of the rock, that they all were broken in pieces. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the soldiers of the army which Amaziah sent back, that they should not go with him to battle, fell upon the cities of Judah, from Samaria even unto Beth-horon, and smote three thousand of them, and took much spoil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now it came to pass, after that Amaziah was come from the slaughter of the Edomites, that he brought the gods of the children of Seir, and set them up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' his gods, and bowed down himself before them, and burned incense unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Wherefore the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was kindled against Amaziah, and he sent unto him a prophet, which said unto him, Why hast thou sought after the gods of the people, which could not deliver their own people out of thine hand? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it came to pass, as he talked with him, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the king
  - type: text
    text: ' said unto him, Art thou made of the king''s counsel? forbear; why shouldest thou be smitten? Then the prophet forbare, and said, I know that God hath determined to destroy thee, because thou hast done this, and hast not hearkened unto my counsel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Amaziah king of Judah took advice, and sent to Joash, the son of Jehoahaz, the son of Jehu, king of Israel, saying, Come, let us see one another in the face. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Joash king of Israel sent to Amaziah king of Judah, saying, The thistle that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Lebanon sent to the cedar that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Lebanon, saying, Give thy daughter to my son to wife: and there passed by a wild beast that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Lebanon, and trode down the thistle. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Thou sayest, Lo, thou hast smitten the Edomites; and thine heart lifteth thee up to boast: abide now at home; why shouldest thou meddle to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thine
  - type: text
    text: ' hurt, that thou shouldest fall, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' thou, and Judah with thee?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Amaziah would not hear; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: came
  - type: text
    text: ' of God, that he might deliver them into the hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of their enemies
  - type: text
    text: ', because they sought after the gods of Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So Joash the king of Israel went up; and they saw one another in the face, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' he and Amaziah king of Judah, at Beth-shemesh, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belongeth
  - type: text
    text: ' to Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Judah was put to the worse before Israel, and they fled every man to his tent. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Joash the king of Israel took Amaziah king of Judah, the son of Joash, the son of Jehoahaz, at Beth-shemesh, and brought him to Jerusalem, and brake down the wall of Jerusalem from the gate of Ephraim to the corner gate, four hundred cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he took
  - type: text
    text: ' all the gold and the silver, and all the vessels that were found in the house of God with Obed-edom, and the treasures of the king''s house, the hostages also, and returned to Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Amaziah the son of Joash king of Judah lived after the death of Joash son of Jehoahaz king of Israel fifteen years. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now the rest of the acts of Amaziah, first and last, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the kings of Judah and Israel? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now after the time that Amaziah did turn away from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' they made a conspiracy against him in Jerusalem; and he fled to Lachish: but they sent to Lachish after him, and slew him there. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And they brought him upon horses, and buried him with his fathers in the city of Judah.
