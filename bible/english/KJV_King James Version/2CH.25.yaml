    content: Amaziah
  - type: text
    content: 'Amaziah '
  - type: text
    content: was
  - type: text
    content: ' twenty and five years old '
  - type: text
    content: when
  - type: text
    content: ' he began to reign, and he reigned twenty and nine years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Jehoaddan of Jerusalem. '
  '10':
  - type: text
    content: 'Then Amaziah separated them, '
  - type: text
    content: to wit
  - type: text
    content: ', the army that was come to him out of Ephraim, to go home again: wherefore their anger was greatly kindled against Judah, and they returned home in great anger. '
  '11':
  - type: text
    content: 'And Amaziah strengthened himself, and led forth his people, and went to the valley of salt, and smote of the children of Seir ten thousand. '
  '12':
  - type: text
    content: 'And '
  - type: text
    content: other
  - type: text
    content: ' ten thousand '
  - type: text
    content: left
  - type: text
    content: ' alive did the children of Judah carry away captive, and brought them unto the top of the rock, and cast them down from the top of the rock, that they all were broken in pieces. '
  '13':
  - type: text
    content: But the soldiers of the army which Amaziah sent back, that they should not go with him to battle, fell upon the cities of Judah, from Samaria even unto Beth-horon, and smote three thousand of them, and took much spoil.
  '14':
  - type: text
    content: 'Now it came to pass, after that Amaziah was come from the slaughter of the Edomites, that he brought the gods of the children of Seir, and set them up '
  - type: text
    content: to be
  - type: text
    content: ' his gods, and bowed down himself before them, and burned incense unto them. '
  '15':
  - type: text
    content: 'Wherefore the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was kindled against Amaziah, and he sent unto him a prophet, which said unto him, Why hast thou sought after the gods of the people, which could not deliver their own people out of thine hand? '
  '16':
  - type: text
    content: 'And it came to pass, as he talked with him, that '
  - type: text
    content: the king
  - type: text
    content: ' said unto him, Art thou made of the king''s counsel? forbear; why shouldest thou be smitten? Then the prophet forbare, and said, I know that God hath determined to destroy thee, because thou hast done this, and hast not hearkened unto my counsel.'
  '17':
  - type: text
    content: 'Then Amaziah king of Judah took advice, and sent to Joash, the son of Jehoahaz, the son of Jehu, king of Israel, saying, Come, let us see one another in the face. '
  '18':
  - type: text
    content: 'And Joash king of Israel sent to Amaziah king of Judah, saying, The thistle that '
  - type: text
    content: was
  - type: text
    content: ' in Lebanon sent to the cedar that '
  - type: text
    content: was
  - type: text
    content: ' in Lebanon, saying, Give thy daughter to my son to wife: and there passed by a wild beast that '
  - type: text
    content: was
  - type: text
    content: ' in Lebanon, and trode down the thistle. '
  '19':
  - type: text
    content: 'Thou sayest, Lo, thou hast smitten the Edomites; and thine heart lifteth thee up to boast: abide now at home; why shouldest thou meddle to '
  - type: text
    content: thine
  - type: text
    content: ' hurt, that thou shouldest fall, '
  - type: text
    content: even
  - type: text
    content: ' thou, and Judah with thee?'
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', but not with a perfect heart. '
  '20':
  - type: text
    content: 'But Amaziah would not hear; for it '
  - type: text
    content: came
  - type: text
    content: ' of God, that he might deliver them into the hand '
  - type: text
    content: of their enemies
  - type: text
    content: ', because they sought after the gods of Edom. '
  '21':
  - type: text
    content: 'So Joash the king of Israel went up; and they saw one another in the face, '
  - type: text
    content: both
  - type: text
    content: ' he and Amaziah king of Judah, at Beth-shemesh, which '
  - type: text
    content: belongeth
  - type: text
    content: ' to Judah. '
  '22':
  - type: text
    content: 'And Judah was put to the worse before Israel, and they fled every man to his tent. '
  '23':
  - type: text
    content: 'And Joash the king of Israel took Amaziah king of Judah, the son of Joash, the son of Jehoahaz, at Beth-shemesh, and brought him to Jerusalem, and brake down the wall of Jerusalem from the gate of Ephraim to the corner gate, four hundred cubits. '
  '24':
  - type: text
    content: 'And '
  - type: text
    content: he took
  - type: text
    content: ' all the gold and the silver, and all the vessels that were found in the house of God with Obed-edom, and the treasures of the king''s house, the hostages also, and returned to Samaria.'
  '25':
  - type: text
    content: 'And Amaziah the son of Joash king of Judah lived after the death of Joash son of Jehoahaz king of Israel fifteen years. '
  '26':
  - type: text
    content: 'Now the rest of the acts of Amaziah, first and last, behold, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the kings of Judah and Israel? '
  '27':
  - type: text
    content: 'Now after the time that Amaziah did turn away from following the '
  - type: text
    content: LORD
  - type: text
    content: ' they made a conspiracy against him in Jerusalem; and he fled to Lachish: but they sent to Lachish after him, and slew him there. '
  '28':
  - type: text
    content: And they brought him upon horses, and buried him with his fathers in the city of Judah.
  '3':
  - type: text
    content: 'Now it came to pass, when the kingdom was established to him, that he slew his servants that had killed the king his father. '
  '4':
  - type: text
    content: 'But he slew not their children, but '
  - type: text
    content: did
  - type: text
    content: ' as '
  - type: text
    content: it is
  - type: text
    content: ' written in the law in the book of Moses, where the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded, saying, The fathers shall not die for the children, neither shall the children die for the fathers, but every man shall die for his own sin.'
  '5':
  - type: text
    content: 'Moreover Amaziah gathered Judah together, and made them captains over thousands, and captains over hundreds, according to the houses of '
  - type: text
    content: their
  - type: text
    content: ' fathers, throughout all Judah and Benjamin: and he numbered them from twenty years old and above, and found them three hundred thousand choice '
  - type: text
    content: men, able
  - type: text
    content: ' to go forth to war, that could handle spear and shield. '
  '6':
  - type: text
    content: 'He hired also an hundred thousand mighty men of valour out of Israel for an hundred talents of silver. '
  '7':
  - type: text
    content: 'But there came a man of God to him, saying, O king, let not the army of Israel go with thee; for the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not with Israel, '
  - type: text
    content: to wit, with
  - type: text
    content: ' all the children of Ephraim. '
  '8':
  - type: text
    content: 'But if thou wilt go, do '
  - type: text
    content: it
  - type: text
    content: ', be strong for the battle: God shall make thee fall before the enemy: for God hath power to help, and to cast down. '
  '9':
  - type: text
    content: 'And Amaziah said to the man of God, But what shall we do for the hundred talents which I have given to the army of Israel? And the man of God answered, The '
  - type: text
    content: LORD
  - type: text
    content: ' is able to give thee much more than this. '
