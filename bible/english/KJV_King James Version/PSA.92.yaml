document_id: PSA.92,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'A Psalm '
  - type: text
    content: or
  - type: text
    content: ' Song for the sabbath day.'
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' a good thing to give thanks unto the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'And to sing praises unto thy name, O most High:'
  '10':
  - type: text
    content: 'But my horn shalt thou exalt like '
  - type: text
    content: the horn of
  - type: text
    content: ' an unicorn:'
  - type: text
    content: I shall be anointed with fresh oil.
  '11':
  - type: text
    content: 'Mine eye also shall see '
  - type: text
    content: my desire
  - type: text
    content: ' on mine enemies,'
  - type: text
    content: And
  - type: text
    content: ' mine ears shall hear '
  - type: text
    content: my desire
  - type: text
    content: ' of the wicked that rise up against me.'
  '12':
  - type: text
    content: 'The righteous shall flourish like the palm tree:'
  - type: text
    content: He shall grow like a cedar in Lebanon.
  '13':
  - type: text
    content: 'Those that be planted in the house of the '
  - type: text
    content: LORD
  - type: text
    content: Shall flourish in the courts of our God.
  '14':
  - type: text
    content: They shall still bring forth fruit in old age;
  - type: text
    content: They shall be fat and flourishing;
  '15':
  - type: text
    content: 'To shew that the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' upright: '
  - type: text
    content: He is
  - type: text
    content: ' my rock,'
  - type: text
    content: 'And '
  - type: text
    content: there is
  - type: text
    content: ' no unrighteousness in him.'
  '2':
  - type: text
    content: To shew forth thy lovingkindness in the morning,
  - type: text
    content: And thy faithfulness every night,
  '3':
  - type: text
    content: Upon an instrument of ten strings, and upon the psaltery;
  - type: text
    content: Upon the harp with a solemn sound.
  '4':
  - type: text
    content: 'For thou, '
  - type: text
    content: LORD
  - type: text
    content: ', hast made me glad through thy work:'
  - type: text
    content: I will triumph in the works of thy hands.
  '5':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', how great are thy works!'
  - type: text
    content: And
  - type: text
    content: ' thy thoughts are very deep.'
  '6':
  - type: text
    content: A brutish man knoweth not;
  - type: text
    content: Neither doth a fool understand this.
  '7':
  - type: text
    content: When the wicked spring as the grass,
  - type: text
    content: And when all the workers of iniquity do flourish;
  - type: text
    content: It is
  - type: text
    content: ' that they shall be destroyed for ever:'
  '8':
  - type: text
    content: 'But thou, '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: art most
  - type: text
    content: ' high for evermore.'
  '9':
  - type: text
    content: 'For, lo, thine enemies, O '
  - type: text
    content: LORD
  - type: text
    content: ', for, lo, thine enemies shall perish;'
  - type: text
    content: All the workers of iniquity shall be scattered.
