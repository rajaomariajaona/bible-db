document_id: PSA.92
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Psalm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' Song for the sabbath day.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' a good thing to give thanks unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And to sing praises unto thy name, O most High:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: To shew forth thy lovingkindness in the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy faithfulness every night,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Upon an instrument of ten strings, and upon the psaltery;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Upon the harp with a solemn sound.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thou, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', hast made me glad through thy work:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will triumph in the works of thy hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', how great are thy works!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' thy thoughts are very deep.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A brutish man knoweth not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither doth a fool understand this.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When the wicked spring as the grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And when all the workers of iniquity do flourish;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' that they shall be destroyed for ever:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But thou, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art most
  - type: text
    text: ' high for evermore.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For, lo, thine enemies, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for, lo, thine enemies shall perish;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the workers of iniquity shall be scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But my horn shalt thou exalt like '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the horn of
  - type: text
    text: ' an unicorn:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I shall be anointed with fresh oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mine eye also shall see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my desire
  - type: text
    text: ' on mine enemies,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' mine ears shall hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my desire
  - type: text
    text: ' of the wicked that rise up against me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The righteous shall flourish like the palm tree:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall grow like a cedar in Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Those that be planted in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall flourish in the courts of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They shall still bring forth fruit in old age;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall be fat and flourishing;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'To shew that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upright: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' my rock,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no unrighteousness in him.'
