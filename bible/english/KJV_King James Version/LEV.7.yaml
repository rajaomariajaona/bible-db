  '11':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the law of the sacrifice of peace offerings, which he shall offer unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'If he offer it for a thanksgiving, then he shall offer with the sacrifice of thanksgiving unleavened cakes mingled with oil, and unleavened wafers anointed with oil, and cakes mingled with oil, of fine flour, fried. '
  '13':
  - type: text
    content: 'Besides the cakes, he shall offer '
  - type: text
    content: for
  - type: text
    content: ' his offering leavened bread with the sacrifice of thanksgiving of his peace offerings. '
  '14':
  - type: text
    content: 'And of it he shall offer one out of the whole oblation '
  - type: text
    content: for
  - type: text
    content: ' an heave offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: and
  - type: text
    content: ' it shall be the priest''s that sprinkleth the blood of the peace offerings. '
  '15':
  - type: text
    content: And the flesh of the sacrifice of his peace offerings for thanksgiving shall be eaten the same day that it is offered; he shall not leave any of it until the morning.
  '16':
  - type: text
    content: 'But if the sacrifice of his offering '
  - type: text
    content: be
  - type: text
    content: ' a vow, or a voluntary offering, it shall be eaten the same day that he offereth his sacrifice: and on the morrow also the remainder of it shall be eaten: '
  '17':
  - type: text
    content: 'but the remainder of the flesh of the sacrifice on the third day shall be burnt with fire. '
  '18':
  - type: text
    content: 'And if '
  - type: text
    content: any
  - type: text
    content: ' of the flesh of the sacrifice of his peace offerings be eaten at all on the third day, it shall not be accepted, neither shall it be imputed unto him that offereth it: it shall be an abomination, and the soul that eateth of it shall bear his iniquity.'
  '19':
  - type: text
    content: 'And the flesh that toucheth any unclean '
  - type: text
    content: thing
  - type: text
    content: ' shall not be eaten; it shall be burnt with fire: and as for the flesh, all that be clean shall eat thereof. '
  '2':
  - type: text
    content: 'In the place where they kill the burnt offering shall they kill the trespass offering: and the blood thereof shall he sprinkle round about upon the altar. '
  '20':
  - type: text
    content: 'But the soul that eateth '
  - type: text
    content: of
  - type: text
    content: ' the flesh of the sacrifice of peace offerings, that '
  - type: text
    content: pertain
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
