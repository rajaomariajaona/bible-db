  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses in mount Sinai, in the day that he commanded the children of Israel to offer their oblations unto the '
  - type: text
    content: LORD
  - type: text
    content: ', in the wilderness of Sinai.'
  '4':
  - type: text
