  '21':
  - type: text
    content: 'Moreover the soul that shall touch any unclean '
  - type: text
    content: thing, as
  - type: text
    content: ' the uncleanness of man, or '
  - type: text
    content: any
  - type: text
    content: ' unclean beast, or any abominable unclean '
  - type: text
    content: thing
  - type: text
