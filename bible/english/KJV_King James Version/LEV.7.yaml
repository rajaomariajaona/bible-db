  - type: text
    content: pertain
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ', even that soul shall be cut off from his people.'
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '23':
  - type: text
    content: 'Speak unto the children of Israel, saying, Ye shall eat no manner of fat, of ox, or of sheep, or of goat. '
  '24':
  - type: text
    content: 'And the fat of the beast that dieth of itself, and the fat of that which is torn with beasts, may be used in any other use: but ye shall in no wise eat of it. '
  '25':
  - type: text
    content: 'For whosoever eateth the fat of the beast, of which men offer an offering made by fire unto the '
  - type: text
    content: LORD
  - type: text
    content: ', even the soul that eateth '
  - type: text
    content: it
  - type: text
    content: ' shall be cut off from his people. '
  '26':
  - type: text
    content: 'Moreover ye shall eat no manner of blood, '
  - type: text
    content: whether it be
  - type: text
    content: ' of fowl or of beast, in any of your dwellings. '
  '27':
  - type: text
    content: 'Whatsoever soul '
  - type: text
    content: it be
  - type: text
    content: ' that eateth any manner of blood, even that soul shall be cut off from his people.'
  '28':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '29':
