  - type: text
    content: LORD
  - type: text
    content: ' shall bring his oblation unto the '
  - type: text
    content: LORD
  - type: text
    content: ' of the sacrifice of his peace offerings. '
  '3':
  - type: text
    content: 'And he shall offer of it all the fat thereof; the rump, and the fat that covereth the inwards, '
  '30':
  - type: text
    content: 'His own hands shall bring the offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire, the fat with the breast, it shall he bring, that the breast may be waved '
  - type: text
    content: for
  - type: text
    content: ' a wave offering before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And the priest shall burn the fat upon the altar: but the breast shall be Aaron''s and his sons''. '
  '32':
  - type: text
    content: 'And the right shoulder shall ye give unto the priest '
  - type: text
    content: for
  - type: text
    content: ' an heave offering of the sacrifices of your peace offerings. '
  '33':
  - type: text
    content: 'He among the sons of Aaron, that offereth the blood of the peace offerings, and the fat, shall have the right shoulder for '
  - type: text
    content: his
  - type: text
    content: ' part. '
  '34':
  - type: text
    content: For the wave breast and the heave shoulder have I taken of the children of Israel from off the sacrifices of their peace offerings, and have given them unto Aaron the priest and unto his sons by a statute for ever from among the children of Israel.
  '35':
  - type: text
    content: 'This '
  - type: text
