document_id: LEV.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Likewise this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of the trespass offering: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And every meat offering, mingled with oil, and dry, shall all the sons of Aaron have, one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as much
    - type: text
      text: ' as another.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Peace Offerings
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of the sacrifice of peace offerings, which he shall offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If he offer it for a thanksgiving, then he shall offer with the sacrifice of thanksgiving unleavened cakes mingled with oil, and unleavened wafers anointed with oil, and cakes mingled with oil, of fine flour, fried. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Besides the cakes, he shall offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his offering leavened bread with the sacrifice of thanksgiving of his peace offerings. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And of it he shall offer one out of the whole oblation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an heave offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' it shall be the priest''s that sprinkleth the blood of the peace offerings. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And the flesh of the sacrifice of his peace offerings for thanksgiving shall be eaten the same day that it is offered; he shall not leave any of it until the morning.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But if the sacrifice of his offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a vow, or a voluntary offering, it shall be eaten the same day that he offereth his sacrifice: and on the morrow also the remainder of it shall be eaten: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'but the remainder of the flesh of the sacrifice on the third day shall be burnt with fire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' of the flesh of the sacrifice of his peace offerings be eaten at all on the third day, it shall not be accepted, neither shall it be imputed unto him that offereth it: it shall be an abomination, and the soul that eateth of it shall bear his iniquity.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the flesh that toucheth any unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' shall not be eaten; it shall be burnt with fire: and as for the flesh, all that be clean shall eat thereof. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In the place where they kill the burnt offering shall they kill the trespass offering: and the blood thereof shall he sprinkle round about upon the altar. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But the soul that eateth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the flesh of the sacrifice of peace offerings, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pertain
    - type: text
      text: ' unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', having his uncleanness upon him, even that soul shall be cut off from his people. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moreover the soul that shall touch any unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing, as
    - type: text
      text: ' the uncleanness of man, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' unclean beast, or any abominable unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ', and eat of the flesh of the sacrifice of peace offerings, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pertain
    - type: text
      text: ' unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', even that soul shall be cut off from his people.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Speak unto the children of Israel, saying, Ye shall eat no manner of fat, of ox, or of sheep, or of goat. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the fat of the beast that dieth of itself, and the fat of that which is torn with beasts, may be used in any other use: but ye shall in no wise eat of it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For whosoever eateth the fat of the beast, of which men offer an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', even the soul that eateth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' shall be cut off from his people. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Moreover ye shall eat no manner of blood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it be
    - type: text
      text: ' of fowl or of beast, in any of your dwellings. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Whatsoever soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' that eateth any manner of blood, even that soul shall be cut off from his people.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Speak unto the children of Israel, saying, He that offereth the sacrifice of his peace offerings unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall bring his oblation unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of the sacrifice of his peace offerings. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he shall offer of it all the fat thereof; the rump, and the fat that covereth the inwards, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'His own hands shall bring the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire, the fat with the breast, it shall he bring, that the breast may be waved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a wave offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the priest shall burn the fat upon the altar: but the breast shall be Aaron''s and his sons''. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And the right shoulder shall ye give unto the priest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an heave offering of the sacrifices of your peace offerings. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He among the sons of Aaron, that offereth the blood of the peace offerings, and the fat, shall have the right shoulder for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' part. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: For the wave breast and the heave shoulder have I taken of the children of Israel from off the sacrifices of their peace offerings, and have given them unto Aaron the priest and unto his sons by a statute for ever from among the children of Israel.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is the portion
    - type: text
      text: ' of the anointing of Aaron, and of the anointing of his sons, out of the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire, in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' he presented them to minister unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the priest''s office; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded to be given them of the children of Israel, in the day that he anointed them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' a statute for ever throughout their generations.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of the burnt offering, of the meat offering, and of the sin offering, and of the trespass offering, and of the consecrations, and of the sacrifice of the peace offerings; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses in mount Sinai, in the day that he commanded the children of Israel to offer their oblations unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in the wilderness of Sinai.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and the two kidneys, and the fat that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on them, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the flanks, and the caul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' above the liver, with the kidneys, it shall he take away: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and the priest shall burn them upon the altar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a trespass offering. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Every male among the priests shall eat thereof: it shall be eaten in the holy place: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'As the sin offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the trespass offering: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' one law for them: the priest that maketh atonement therewith shall have '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the priest that offereth any man''s burnt offering, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the priest shall have to himself the skin of the burnt offering which he hath offered. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And all the meat offering that is baken in the oven, and all that is dressed in the fryingpan, and in the pan, shall be the priest''s that offereth it. '
