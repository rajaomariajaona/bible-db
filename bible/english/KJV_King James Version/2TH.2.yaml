document_id: 2TH.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now we beseech you, brethren, by the coming of our Lord Jesus Christ, and '
  - type: text
    content: by
  - type: text
    content: ' our gathering together unto him, '
  '10':
  - type: text
    content: 'and with all deceivableness of unrighteousness in them that perish; because they received not the love of the truth, that they might be saved. '
  '11':
  - type: text
    content: 'And for this cause God shall send them strong delusion, that they should believe a lie: '
  '12':
  - type: text
    content: that they all might be damned who believed not the truth, but had pleasure in unrighteousness.
  '13':
  - type: text
    content: 'But we are bound to give thanks alway to God for you, brethren beloved of the Lord, because God hath from the beginning chosen you to salvation through sanctification of the Spirit and belief of the truth: '
  '14':
  - type: text
    content: 'whereunto he called you by our gospel, to the obtaining of the glory of our Lord Jesus Christ. '
  '15':
  - type: text
    content: 'Therefore, brethren, stand fast, and hold the traditions which ye have been taught, whether by word, or our epistle. '
  '16':
  - type: text
    content: 'Now our Lord Jesus Christ himself, and God, even our Father, which hath loved us, and hath given '
  - type: text
    content: us
  - type: text
    content: ' everlasting consolation and good hope through grace, '
  '17':
  - type: text
    content: comfort your hearts, and stablish you in every good word and work.
  '2':
  - type: text
    content: 'that ye be not soon shaken in mind, or be troubled, neither by spirit, nor by word, nor by letter as from us, as that the day of Christ is at hand. '
  '3':
  - type: text
    content: 'Let no man deceive you by any means: for '
  - type: text
    content: that day shall not come
  - type: text
    content: ', except there come a falling away first, and that man of sin be revealed, the son of perdition; '
  '4':
  - type: text
    content: 'who opposeth and exalteth himself above all that is called God, or that is worshipped; so that he as God sitteth in the temple of God, shewing himself that he is God. '
  '5':
  - type: text
    content: 'Remember ye not, that, when I was yet with you, I told you these things? '
  '6':
  - type: text
    content: 'And now ye know what withholdeth that he might be revealed in his time. '
  '7':
  - type: text
    content: 'For the mystery of iniquity doth already work: only he who now letteth '
  - type: text
    content: will let
  - type: text
    content: ', until he be taken out of the way. '
  '8':
  - type: text
    content: 'And then shall that Wicked be revealed, whom the Lord shall consume with the spirit of his mouth, and shall destroy with the brightness of his coming: '
  '9':
  - type: text
    content: even him
  - type: text
    content: ', whose coming is after the working of Satan with all power and signs and lying wonders, '
