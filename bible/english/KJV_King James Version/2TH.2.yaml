document_id: 2TH.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now we beseech you, brethren, by the coming of our Lord Jesus Christ, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' our gathering together unto him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that ye be not soon shaken in mind, or be troubled, neither by spirit, nor by word, nor by letter as from us, as that the day of Christ is at hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Let no man deceive you by any means: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that day shall not come
  - type: text
    text: ', except there come a falling away first, and that man of sin be revealed, the son of perdition; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who opposeth and exalteth himself above all that is called God, or that is worshipped; so that he as God sitteth in the temple of God, shewing himself that he is God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Remember ye not, that, when I was yet with you, I told you these things? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And now ye know what withholdeth that he might be revealed in his time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the mystery of iniquity doth already work: only he who now letteth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will let
  - type: text
    text: ', until he be taken out of the way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And then shall that Wicked be revealed, whom the Lord shall consume with the spirit of his mouth, and shall destroy with the brightness of his coming: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: add
    children:
    - type: text
      text: even him
  - type: text
    text: ', whose coming is after the working of Satan with all power and signs and lying wonders, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and with all deceivableness of unrighteousness in them that perish; because they received not the love of the truth, that they might be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And for this cause God shall send them strong delusion, that they should believe a lie: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: that they all might be damned who believed not the truth, but had pleasure in unrighteousness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But we are bound to give thanks alway to God for you, brethren beloved of the Lord, because God hath from the beginning chosen you to salvation through sanctification of the Spirit and belief of the truth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'whereunto he called you by our gospel, to the obtaining of the glory of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore, brethren, stand fast, and hold the traditions which ye have been taught, whether by word, or our epistle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now our Lord Jesus Christ himself, and God, even our Father, which hath loved us, and hath given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' everlasting consolation and good hope through grace, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: comfort your hearts, and stablish you in every good word and work.
