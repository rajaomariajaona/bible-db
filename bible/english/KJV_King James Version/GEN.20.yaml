verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Abraham and Abimelech
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abraham journeyed from thence toward the south country, and dwelled between Kadesh and Shur, and sojourned in Gerar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abimelech said unto Abraham, What sawest thou, that thou hast done this thing? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abraham said, Because I thought, Surely the fear of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not in this place; and they will slay me for my wife''s sake. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And yet indeed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: she is
    - type: text
      text: ' my sister; she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the daughter of my father, but not the daughter of my mother; and she became my wife. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when God caused me to wander from my father''s house, that I said unto her, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy kindness which thou shalt shew unto me; at every place whither we shall come, say of me, He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my brother. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abimelech took sheep, and oxen, and menservants, and womenservants, and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' unto Abraham, and restored him Sarah his wife. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abimelech said, Behold, my land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before thee: dwell where it pleaseth thee. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And unto Sarah he said, Behold, I have given thy brother a thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver: behold, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to thee a covering of the eyes, unto all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with thee, and with all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'other:'
    - type: text
      text: ' thus she was reproved.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abraham prayed unto God: and God healed Abimelech, and his wife, and his maidservants; and they bare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: children
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had fast closed up all the wombs of the house of Abimelech, because of Sarah Abraham''s wife.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abraham said of Sarah his wife, She '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my sister: and Abimelech king of Gerar sent, and took Sarah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God came to Abimelech in a dream by night, and said to him, Behold, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art but
    - type: text
      text: ' a dead man, for the woman which thou hast taken; for she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a man''s wife. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abimelech had not come near her: and he said, Lord, wilt thou slay also a righteous nation? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Said he not unto me, She '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my sister? and she, even she herself said, He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my brother: in the integrity of my heart and innocency of my hands have I done this. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said unto him in a dream, Yea, I know that thou didst this in the integrity of thy heart; for I also withheld thee from sinning against me: therefore suffered I thee not to touch her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore restore the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wife; for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a prophet, and he shall pray for thee, and thou shalt live: and if thou restore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' not, know thou that thou shalt surely die, thou, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thine.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Abimelech rose early in the morning, and called all his servants, and told all these things in their ears: and the men were sore afraid. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abimelech called Abraham, and said unto him, What hast thou done unto us? and what have I offended thee, that thou hast brought on me and on my kingdom a great sin? thou hast done deeds unto me that ought not to be done. '
