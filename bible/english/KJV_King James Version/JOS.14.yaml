  - type: text
    text: In the West
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are the countries
  - type: text
    text: ' which the children of Israel inherited in the land of Canaan, which Eleazar the priest, and Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel, distributed for inheritance to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'By lot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' their inheritance, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded by the hand of Moses, for the nine tribes, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the half tribe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Moses had given the inheritance of two tribes and an half tribe on the other side Jordan: but unto the Levites he gave none inheritance among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the children of Joseph were two tribes, Manasseh and Ephraim: therefore they gave no part unto the Levites in the land, save cities to dwell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ', with their suburbs for their cattle and for their substance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses, so the children of Israel did, and they divided the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the children of Judah came unto Joshua in Gilgal: and Caleb the son of Jephunneh the Kenezite said unto him, Thou knowest the thing that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses the man of God concerning me and thee in Kadesh-barnea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Forty years old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' I when Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sent me from Kadesh-barnea to espy out the land; and I brought him word again as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' in mine heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nevertheless my brethren that went up with me made the heart of the people melt: but I wholly followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Moses sware on that day, saying, Surely the land whereon thy feet have trodden shall be thine inheritance, and thy children''s for ever, because thou hast wholly followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And now, behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath kept me alive, as he said, these forty and five years, even since the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake this word unto Moses, while '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the children of
  - type: text
    text: ' Israel wandered in the wilderness: and now, lo, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' this day fourscore and five years old. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'As yet I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am as
  - type: text
    text: ' strong this day as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I was
  - type: text
    text: ' in the day that Moses sent me: as my strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' then, even so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength now, for war, both to go out, and to come in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now therefore give me this mountain, whereof the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake in that day; for thou heardest in that day how the Anakims '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' there, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' fenced: if so be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' with me, then I shall be able to drive them out, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Joshua blessed him, and gave unto Caleb the son of Jephunneh Hebron for an inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hebron therefore became the inheritance of Caleb the son of Jephunneh the Kenezite unto this day, because that he wholly followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the name of Hebron before '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Kirjath-arba; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which Arba was
  - type: text
    text: ' a great man among the Anakims. And the land had rest from war.'
