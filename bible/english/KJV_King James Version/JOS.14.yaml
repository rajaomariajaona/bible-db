verses:
  '1':
  - type: heading
    content: In the West
  - type: text
    content: 'And these '
  - type: text
    content: are the countries
  - type: text
    content: ' which the children of Israel inherited in the land of Canaan, which Eleazar the priest, and Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel, distributed for inheritance to them. '
  '10':
  - type: text
    content: 'And now, behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' hath kept me alive, as he said, these forty and five years, even since the '
  - type: text
    content: LORD
  - type: text
    content: ' spake this word unto Moses, while '
  - type: text
    content: the children of
  - type: text
    content: ' Israel wandered in the wilderness: and now, lo, I '
  - type: text
    content: am
  - type: text
    content: ' this day fourscore and five years old. '
  '11':
  - type: text
    content: 'As yet I '
  - type: text
    content: am as
  - type: text
    content: ' strong this day as '
  - type: text
    content: I was
  - type: text
    content: ' in the day that Moses sent me: as my strength '
  - type: text
    content: was
  - type: text
    content: ' then, even so '
  - type: text
    content: is
  - type: text
    content: ' my strength now, for war, both to go out, and to come in. '
  '12':
  - type: text
    content: 'Now therefore give me this mountain, whereof the '
  - type: text
    content: LORD
  - type: text
    content: ' spake in that day; for thou heardest in that day how the Anakims '
  - type: text
    content: were
  - type: text
    content: ' there, and '
  - type: text
    content: that
  - type: text
    content: ' the cities '
  - type: text
    content: were
  - type: text
    content: ' great '
  - type: text
    content: and
  - type: text
    content: ' fenced: if so be the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: will be
  - type: text
    content: ' with me, then I shall be able to drive them out, as the '
  - type: text
    content: LORD
  - type: text
    content: ' said.'
  '13':
  - type: text
    content: 'And Joshua blessed him, and gave unto Caleb the son of Jephunneh Hebron for an inheritance. '
  '14':
  - type: text
    content: 'Hebron therefore became the inheritance of Caleb the son of Jephunneh the Kenezite unto this day, because that he wholly followed the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '15':
  - type: text
    content: 'And the name of Hebron before '
  - type: text
    content: was
  - type: text
    content: ' Kirjath-arba; '
  - type: text
    content: which Arba was
  - type: text
    content: ' a great man among the Anakims. And the land had rest from war.'
  '2':
  - type: text
    content: 'By lot '
  - type: text
    content: was
  - type: text
    content: ' their inheritance, as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded by the hand of Moses, for the nine tribes, and '
  - type: text
    content: for
  - type: text
    content: ' the half tribe. '
  '3':
  - type: text
    content: 'For Moses had given the inheritance of two tribes and an half tribe on the other side Jordan: but unto the Levites he gave none inheritance among them. '
  '4':
  - type: text
    content: 'For the children of Joseph were two tribes, Manasseh and Ephraim: therefore they gave no part unto the Levites in the land, save cities to dwell '
  - type: text
    content: in
  - type: text
    content: ', with their suburbs for their cattle and for their substance. '
  '5':
  - type: text
    content: 'As the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses, so the children of Israel did, and they divided the land.'
  '6':
  - type: text
    content: 'Then the children of Judah came unto Joshua in Gilgal: and Caleb the son of Jephunneh the Kenezite said unto him, Thou knowest the thing that the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses the man of God concerning me and thee in Kadesh-barnea. '
  '7':
  - type: text
    content: 'Forty years old '
  - type: text
    content: was
  - type: text
    content: ' I when Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' sent me from Kadesh-barnea to espy out the land; and I brought him word again as '
  - type: text
    content: it was
  - type: text
    content: ' in mine heart. '
  '8':
  - type: text
    content: 'Nevertheless my brethren that went up with me made the heart of the people melt: but I wholly followed the '
  - type: text
    content: LORD
  - type: text
    content: ' my God. '
  '9':
  - type: text
    content: 'And Moses sware on that day, saying, Surely the land whereon thy feet have trodden shall be thine inheritance, and thy children''s for ever, because thou hast wholly followed the '
  - type: text
    content: LORD
  - type: text
    content: ' my God. '
