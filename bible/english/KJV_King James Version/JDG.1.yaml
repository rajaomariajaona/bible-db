document_id: JDG.1,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Tribal Conquests
  - type: text
    content: 'Now after the death of Joshua it came to pass, that the children of Israel asked the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, Who shall go up for us against the Canaanites first, to fight against them? '
  '10':
  - type: text
    content: 'And Judah went against the Canaanites that dwelt in Hebron: (now the name of Hebron before '
  - type: text
    content: was
  - type: text
    content: ' Kirjath-arba:) and they slew Sheshai, and Ahiman, and Talmai.'
  '11':
  - type: text
    content: 'And from thence he went against the inhabitants of Debir: and the name of Debir before '
  - type: text
    content: was
  - type: text
    content: ' Kirjath-sepher: '
  '12':
  - type: text
    content: 'and Caleb said, He that smiteth Kirjath-sepher, and taketh it, to him will I give Achsah my daughter to wife. '
  '13':
  - type: text
    content: 'And Othniel the son of Kenaz, Caleb''s younger brother, took it: and he gave him Achsah his daughter to wife. '
  '14':
  - type: text
    content: 'And it came to pass, when she came '
  - type: text
    content: to him
  - type: text
    content: ', that she moved him to ask of her father a field: and she lighted from off '
  - type: text
    content: her
  - type: text
    content: ' ass; and Caleb said unto her, What wilt thou? '
  '15':
  - type: text
    content: 'And she said unto him, Give me a blessing: for thou hast given me a south land; give me also springs of water. And Caleb gave her the upper springs and the nether springs.'
  '16':
  - type: text
    content: 'And the children of the Kenite, Moses'' father in law, went up out of the city of palm trees with the children of Judah into the wilderness of Judah, which '
  - type: text
    content: lieth
  - type: text
    content: ' in the south of Arad; and they went and dwelt among the people. '
  '17':
  - type: text
    content: 'And Judah went with Simeon his brother, and they slew the Canaanites that inhabited Zephath, and utterly destroyed it. And the name of the city was called Hormah. '
  '18':
  - type: text
    content: 'Also Judah took Gaza with the coast thereof, and Askelon with the coast thereof, and Ekron with the coast thereof. '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' was with Judah; and he drave out '
  - type: text
    content: the inhabitants of
  - type: text
    content: ' the mountain; but could not drive out the inhabitants of the valley, because they had chariots of iron. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, Judah shall go up: behold, I have delivered the land into his hand. '
  '20':
  - type: text
    content: 'And they gave Hebron unto Caleb, as Moses said: and he expelled thence the three sons of Anak. '
  '21':
  - type: text
    content: And the children of Benjamin did not drive out the Jebusites that inhabited Jerusalem; but the Jebusites dwell with the children of Benjamin in Jerusalem unto this day.
  '22':
  - type: text
    content: 'And the house of Joseph, they also went up against Beth-el: and the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' with them. '
  '23':
  - type: text
    content: 'And the house of Joseph sent to descry Beth-el. (Now the name of the city before '
  - type: text
    content: was
  - type: text
    content: ' Luz.) '
  '24':
  - type: text
    content: 'And the spies saw a man come forth out of the city, and they said unto him, Shew us, we pray thee, the entrance into the city, and we will shew thee mercy. '
  '25':
  - type: text
    content: 'And when he shewed them the entrance into the city, they smote the city with the edge of the sword; but they let go the man and all his family. '
  '26':
  - type: text
    content: 'And the man went into the land of the Hittites, and built a city, and called the name thereof Luz: which '
  - type: text
    content: is
  - type: text
    content: ' the name thereof unto this day.'
  '27':
  - type: text
    content: 'Neither did Manasseh drive out '
  - type: text
    content: the inhabitants of
  - type: text
    content: ' Beth-shean and her towns, nor Taanach and her towns, nor the inhabitants of Dor and her towns, nor the inhabitants of Ibleam and her towns, nor the inhabitants of Megiddo and her towns: but the Canaanites would dwell in that land. '
  '28':
  - type: text
    content: And it came to pass, when Israel was strong, that they put the Canaanites to tribute, and did not utterly drive them out.
  '29':
  - type: text
    content: Neither did Ephraim drive out the Canaanites that dwelt in Gezer; but the Canaanites dwelt in Gezer among them.
  '3':
  - type: text
    content: 'And Judah said unto Simeon his brother, Come up with me into my lot, that we may fight against the Canaanites; and I likewise will go with thee into thy lot. So Simeon went with him. '
  '30':
  - type: text
    content: Neither did Zebulun drive out the inhabitants of Kitron, nor the inhabitants of Nahalol; but the Canaanites dwelt among them, and became tributaries.
  '31':
  - type: text
    content: 'Neither did Asher drive out the inhabitants of Accho, nor the inhabitants of Zidon, nor of Ahlab, nor of Achzib, nor of Helbah, nor of Aphik, nor of Rehob: '
  '32':
  - type: text
    content: 'but the Asherites dwelt among the Canaanites, the inhabitants of the land: for they did not drive them out.'
  '33':
  - type: text
    content: 'Neither did Naphtali drive out the inhabitants of Beth-shemesh, nor the inhabitants of Beth-anath; but he dwelt among the Canaanites, the inhabitants of the land: nevertheless the inhabitants of Beth-shemesh and of Beth-anath became tributaries unto them.'
  '34':
  - type: text
    content: 'And the Amorites forced the children of Dan into the mountain: for they would not suffer them to come down to the valley: '
  '35':
  - type: text
    content: 'but the Amorites would dwell in mount Heres in Aijalon, and in Shaalbim: yet the hand of the house of Joseph prevailed, so that they became tributaries. '
  '36':
  - type: text
    content: 'And the coast of the Amorites '
  - type: text
    content: was
  - type: text
    content: ' from the going up to Akrabbim, from the rock, and upward.'
  '4':
  - type: text
    content: 'And Judah went up; and the '
  - type: text
    content: LORD
  - type: text
    content: ' delivered the Canaanites and the Perizzites into their hand: and they slew of them in Bezek ten thousand men. '
  '5':
  - type: text
    content: 'And they found Adoni-bezek in Bezek: and they fought against him, and they slew the Canaanites and the Perizzites. '
  '6':
  - type: text
    content: 'But Adoni-bezek fled; and they pursued after him, and caught him, and cut off his thumbs and his great toes. '
  '7':
  - type: text
    content: 'And Adoni-bezek said, Threescore and ten kings, having their thumbs and their great toes cut off, gathered '
  - type: text
    content: their meat
  - type: text
    content: ' under my table: as I have done, so God hath requited me. And they brought him to Jerusalem, and there he died.'
  '8':
  - type: text
    content: 'Now the children of Judah had fought against Jerusalem, and had taken it, and smitten it with the edge of the sword, and set the city on fire. '
  '9':
  - type: text
    content: 'And afterward the children of Judah went down to fight against the Canaanites, that dwelt in the mountain, and in the south, and in the valley. '
