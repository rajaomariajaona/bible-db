    content: The Country of the Gadarenes
  - type: text
    content: 'And they came over unto the other side of the sea, into the country of the Gadarenes. '
  '10':
  - type: text
    content: And he besought him much that he would not send them away out of the country.
  '11':
  - type: text
    content: 'Now there was there nigh unto the mountains a great herd of swine feeding. '
  '12':
  - type: text
    content: 'And all the devils besought him, saying, Send us into the swine, that we may enter into them. '
  '13':
  - type: text
    content: 'And forthwith Jesus gave them leave. And the unclean spirits went out, and entered into the swine: and the herd ran violently down a steep place into the sea, (they were about two thousand;) and were choked in the sea. '
  '14':
  - type: text
    content: 'And they that fed the swine fled, and told '
  - type: text
    content: it
  - type: text
    content: ' in the city, and in the country. And they went out to see what it was that was done. '
  '15':
  - type: text
    content: 'And they come to Jesus, and see him that was possessed with the devil, and had the legion, sitting, and clothed, and in his right mind: and they were afraid. '
  '16':
  - type: text
    content: 'And they that saw '
  - type: text
    content: it
  - type: text
    content: ' told them how it befell to him that was possessed with the devil, and '
  - type: text
    content: also
  - type: text
    content: ' concerning the swine. '
  '17':
  - type: text
    content: And they began to pray him to depart out of their coasts.
  '18':
  - type: text
    content: 'And when he was come into the ship, he that had been possessed with the devil prayed him that he might be with him. '
  '19':
  - type: text
    content: 'Howbeit Jesus suffered him not, but saith unto him, '
  - type: text
    content: Go home to thy friends, and tell them how great things the Lord hath done for thee, and hath had compassion on thee.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And when he was come out of the ship, immediately there met him out of the tombs a man with an unclean spirit, '
  '20':
  - type: text
    content: 'And he departed, and began to publish in Decapolis how great things Jesus had done for him: and all '
  - type: text
    content: men
  - type: text
    content: ' did marvel.'
  - type: heading
    content: The Daughter of Jairus
  '21':
  - type: text
    content: 'And when Jesus was passed over again by ship unto the other side, much people gathered unto him: and he was nigh unto the sea. '
  '22':
  - type: text
    content: 'And, behold, there cometh one of the rulers of the synagogue, Jairus by name; and when he saw him, he fell at his feet, '
  '23':
  - type: text
    content: 'and besought him greatly, saying, My little daughter lieth at the point of death: '
  - type: text
    content: I pray thee
  - type: text
    content: ', come and lay thy hands on her, that she may be healed; and she shall live. '
  '24':
  - type: text
    content: 'And '
  - type: text
    content: Jesus
  - type: text
    content: ' went with him; and much people followed him, and thronged him.'
  '25':
  - type: text
    content: 'And a certain woman, which had an issue of blood twelve years, '
  '26':
  - type: text
    content: 'and had suffered many things of many physicians, and had spent all that she had, and was nothing bettered, but rather grew worse, '
  '27':
  - type: text
    content: 'when she had heard of Jesus, came in the press behind, and touched his garment. '
  '28':
  - type: text
    content: 'For she said, If I may touch but his clothes, I shall be whole. '
  '29':
  - type: text
    content: 'And straightway the fountain of her blood was dried up; and she felt in '
  - type: text
    content: her
  - type: text
    content: ' body that she was healed of that plague. '
  '3':
  - type: text
    content: 'who had '
  - type: text
    content: his
  - type: text
    content: ' dwelling among the tombs; and no man could bind him, no, not with chains: '
  '30':
  - type: text
    content: 'And Jesus, immediately knowing in himself that virtue had gone out of him, turned him about in the press, and said, '
  - type: text
    content: Who touched my clothes?
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And his disciples said unto him, Thou seest the multitude thronging thee, and sayest thou, Who touched me? '
  '32':
  - type: text
    content: 'And he looked round about to see her that had done this thing. '
  '33':
  - type: text
    content: 'But the woman fearing and trembling, knowing what was done in her, came and fell down before him, and told him all the truth. '
  '34':
  - type: text
    content: 'And he said unto her, '
  - type: text
    content: Daughter, thy faith hath made thee whole; go in peace, and be whole of thy plague.
  '35':
  - type: text
    content: 'While he yet spake, there came from the ruler of the synagogue''s '
  - type: text
    content: house certain
  - type: text
