document_id: MRK.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Country of the Gadarenes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And they came over unto the other side of the sea, into the country of the Gadarenes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when he was come out of the ship, immediately there met him out of the tombs a man with an unclean spirit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'who had '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' dwelling among the tombs; and no man could bind him, no, not with chains: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'because that he had been often bound with fetters and chains, and the chains had been plucked asunder by him, and the fetters broken in pieces: neither could any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' tame him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And always, night and day, he was in the mountains, and in the tombs, crying, and cutting himself with stones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But when he saw Jesus afar off, he ran and worshipped him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and cried with a loud voice, and said, What have I to do with thee, Jesus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' Son of the most high God? I adjure thee by God, that thou torment me not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Come out of the man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' unclean spirit.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy name?'
  - type: text
    text: ' And he answered, saying, My name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Legion: for we are many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And he besought him much that he would not send them away out of the country.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now there was there nigh unto the mountains a great herd of swine feeding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And all the devils besought him, saying, Send us into the swine, that we may enter into them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And forthwith Jesus gave them leave. And the unclean spirits went out, and entered into the swine: and the herd ran violently down a steep place into the sea, (they were about two thousand;) and were choked in the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they that fed the swine fled, and told '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the city, and in the country. And they went out to see what it was that was done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they come to Jesus, and see him that was possessed with the devil, and had the legion, sitting, and clothed, and in his right mind: and they were afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they that saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' told them how it befell to him that was possessed with the devil, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' concerning the swine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And they began to pray him to depart out of their coasts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when he was come into the ship, he that had been possessed with the devil prayed him that he might be with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Howbeit Jesus suffered him not, but saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go home to thy friends, and tell them how great things the Lord hath done for thee, and hath had compassion on thee.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he departed, and began to publish in Decapolis how great things Jesus had done for him: and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' did marvel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Daughter of Jairus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when Jesus was passed over again by ship unto the other side, much people gathered unto him: and he was nigh unto the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And, behold, there cometh one of the rulers of the synagogue, Jairus by name; and when he saw him, he fell at his feet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and besought him greatly, saying, My little daughter lieth at the point of death: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I pray thee
  - type: text
    text: ', come and lay thy hands on her, that she may be healed; and she shall live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' went with him; and much people followed him, and thronged him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And a certain woman, which had an issue of blood twelve years, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and had suffered many things of many physicians, and had spent all that she had, and was nothing bettered, but rather grew worse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'when she had heard of Jesus, came in the press behind, and touched his garment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For she said, If I may touch but his clothes, I shall be whole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And straightway the fountain of her blood was dried up; and she felt in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' body that she was healed of that plague. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Jesus, immediately knowing in himself that virtue had gone out of him, turned him about in the press, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who touched my clothes?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And his disciples said unto him, Thou seest the multitude thronging thee, and sayest thou, Who touched me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he looked round about to see her that had done this thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But the woman fearing and trembling, knowing what was done in her, came and fell down before him, and told him all the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he said unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Daughter, thy faith hath made thee whole; go in peace, and be whole of thy plague.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'While he yet spake, there came from the ruler of the synagogue''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: house certain
  - type: text
    text: ' which said, Thy daughter is dead: why troublest thou the Master any further? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'As soon as Jesus heard the word that was spoken, he saith unto the ruler of the synagogue, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Be not afraid, only believe.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And he suffered no man to follow him, save Peter, and James, and John the brother of James. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he cometh to the house of the ruler of the synagogue, and seeth the tumult, and them that wept and wailed greatly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And when he was come in, he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why make ye this ado, and weep? the damsel is not dead, but sleepeth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And they laughed him to scorn. But when he had put them all out, he taketh the father and the mother of the damsel, and them that were with him, and entereth in where the damsel was lying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And he took the damsel by the hand, and said unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Talitha cumi;
  - type: text
    text: ' which is, being interpreted, Damsel, I say unto thee, arise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And straightway the damsel arose, and walked; for she was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the age
  - type: text
    text: ' of twelve years. And they were astonished with a great astonishment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And he charged them straitly that no man should know it; and commanded that something should be given her to eat.
