  '36':
  - type: text
    content: 'As soon as Jesus heard the word that was spoken, he saith unto the ruler of the synagogue, '
  - type: text
    content: Be not afraid, only believe.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And he suffered no man to follow him, save Peter, and James, and John the brother of James. '
  '38':
  - type: text
    content: 'And he cometh to the house of the ruler of the synagogue, and seeth the tumult, and them that wept and wailed greatly. '
  '39':
  - type: text
    content: 'And when he was come in, he saith unto them, '
  - type: text
    content: Why make ye this ado, and weep? the damsel is not dead, but sleepeth.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'because that he had been often bound with fetters and chains, and the chains had been plucked asunder by him, and the fetters broken in pieces: neither could any '
  - type: text
    content: man
  - type: text
    content: ' tame him. '
  '40':
  - type: text
    content: 'And they laughed him to scorn. But when he had put them all out, he taketh the father and the mother of the damsel, and them that were with him, and entereth in where the damsel was lying. '
  '41':
  - type: text
    content: 'And he took the damsel by the hand, and said unto her, '
  - type: text
    content: Talitha cumi;
  - type: text
    content: ' which is, being interpreted, Damsel, I say unto thee, arise. '
  '42':
  - type: text
    content: 'And straightway the damsel arose, and walked; for she was '
  - type: text
