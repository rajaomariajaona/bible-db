  '43':
  - type: text
    content: And he charged them straitly that no man should know it; and commanded that something should be given her to eat.
  '5':
  - type: text
    content: 'And always, night and day, he was in the mountains, and in the tombs, crying, and cutting himself with stones. '
  '6':
  - type: text
    content: 'But when he saw Jesus afar off, he ran and worshipped him, '
  '7':
  - type: text
    content: 'and cried with a loud voice, and said, What have I to do with thee, Jesus, '
  - type: text
    content: thou
  - type: text
    content: ' Son of the most high God? I adjure thee by God, that thou torment me not. '
  '8':
