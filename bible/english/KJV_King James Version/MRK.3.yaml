document_id: MRK.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Sabbath Day
  - type: text
    content: 'And he entered again into the synagogue; and there was a man there which had a withered hand. '
  '10':
  - type: text
    content: 'For he had healed many; insomuch that they pressed upon him for to touch him, as many as had plagues. '
  '11':
  - type: text
    content: 'And unclean spirits, when they saw him, fell down before him, and cried, saying, Thou art the Son of God. '
  '12':
  - type: text
    content: And he straitly charged them that they should not make him known.
  - type: heading
    content: His Twelve Apostles
  '13':
  - type: text
    content: 'And he goeth up into a mountain, and calleth '
  - type: text
    content: unto him
  - type: text
    content: ' whom he would: and they came unto him. '
  '14':
  - type: text
    content: 'And he ordained twelve, that they should be with him, and that he might send them forth to preach, '
  '15':
  - type: text
    content: 'and to have power to heal sicknesses, and to cast out devils: '
  '16':
  - type: text
    content: 'and Simon he surnamed Peter; '
  '17':
  - type: text
    content: 'and James the '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee, and John the brother of James; and he surnamed them Boanerges, which is, The sons of thunder: '
  '18':
  - type: text
    content: 'and Andrew, and Philip, and Bartholomew, and Matthew, and Thomas, and James the '
  - type: text
    content: son
  - type: text
    content: ' of Alphæus, and Thaddæus, and Simon the Canaanite, '
  '19':
  - type: text
    content: 'and Judas Iscariot, which also betrayed him: and they went into an house.'
  '2':
  - type: text
    content: 'And they watched him, whether he would heal him on the sabbath day; that they might accuse him. '
  '20':
  - type: text
    content: 'And the multitude cometh together again, so that they could not so much as eat bread. '
  '21':
  - type: text
    content: 'And when his friends heard '
  - type: text
    content: of it
  - type: text
    content: ', they went out to lay hold on him: for they said, He is beside himself.'
  '22':
  - type: text
    content: 'And the scribes which came down from Jerusalem said, He hath Beelzebub, and by the prince of the devils casteth he out devils. '
  '23':
  - type: text
    content: 'And he called them '
  - type: text
    content: unto him
  - type: text
    content: ', and said unto them in parables, '
  - type: text
    content: How can Satan cast out Satan?
  - type: text
    content: ' '
  '24':
  - type: text
    content: And if a kingdom be divided against itself, that kingdom cannot stand.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And if a house be divided against itself, that house cannot stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan rise up against himself, and be divided, he cannot stand, but hath an end.
  - type: text
    content: ' '
  '27':
  - type: text
    content: No man can enter into a strong man's house, and spoil his goods, except he will first bind the strong man; and then he will spoil his house.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Verily I say unto you, All sins shall be forgiven unto the sons of men, and blasphemies wherewith soever they shall blaspheme:'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'but he that shall blaspheme against the Holy Ghost hath never forgiveness, but is in danger of eternal damnation:'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And he saith unto the man which had the withered hand, '
  - type: text
    content: Stand forth.
  - type: text
    content: ' '
  '30':
  - type: text
    content: because they said, He hath an unclean spirit.
  - type: heading
    content: His Mother and Brethren
  '31':
  - type: text
    content: 'There came then his brethren and his mother, and, standing without, sent unto him, calling him. '
  '32':
  - type: text
    content: 'And the multitude sat about him, and they said unto him, Behold, thy mother and thy brethren without seek for thee. '
  '33':
  - type: text
    content: 'And he answered them, saying, '
  - type: text
    content: Who is my mother, or my brethren?
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And he looked round about on them which sat about him, and said, '
  - type: text
    content: Behold my mother and my brethren!
  - type: text
    content: ' '
  '35':
  - type: text
    content: For whosoever shall do the will of God, the same is my brother, and my sister, and mother.
  '4':
  - type: text
    content: 'And he saith unto them, '
  - type: text
    content: Is it lawful to do good on the sabbath days, or to do evil? to save life, or to kill?
  - type: text
    content: ' But they held their peace. '
  '5':
  - type: text
    content: 'And when he had looked round about on them with anger, being grieved for the hardness of their hearts, he saith unto the man, '
  - type: text
    content: Stretch forth thine hand.
  - type: text
    content: ' And he stretched '
  - type: text
    content: it
  - type: text
    content: ' out: and his hand was restored whole as the other. '
  '6':
  - type: text
    content: And the Pharisees went forth, and straightway took counsel with the Herodians against him, how they might destroy him.
  '7':
  - type: text
    content: 'But Jesus withdrew himself with his disciples to the sea: and a great multitude from Galilee followed him, and from Judæa, '
  '8':
  - type: text
    content: 'and from Jerusalem, and from Idumæa, and '
  - type: text
    content: from
  - type: text
    content: ' beyond Jordan; and they about Tyre and Sidon, a great multitude, when they had heard what great things he did, came unto him. '
  '9':
  - type: text
    content: 'And he spake to his disciples, that a small ship should wait on him because of the multitude, lest they should throng him. '
