document_id: MRK.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Sabbath Day
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he entered again into the synagogue; and there was a man there which had a withered hand. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And they watched him, whether he would heal him on the sabbath day; that they might accuse him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he saith unto the man which had the withered hand, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Stand forth.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Is it lawful to do good on the sabbath days, or to do evil? to save life, or to kill?
  - type: text
    text: ' But they held their peace. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when he had looked round about on them with anger, being grieved for the hardness of their hearts, he saith unto the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Stretch forth thine hand.
  - type: text
    text: ' And he stretched '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out: and his hand was restored whole as the other. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the Pharisees went forth, and straightway took counsel with the Herodians against him, how they might destroy him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But Jesus withdrew himself with his disciples to the sea: and a great multitude from Galilee followed him, and from Judæa, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and from Jerusalem, and from Idumæa, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' beyond Jordan; and they about Tyre and Sidon, a great multitude, when they had heard what great things he did, came unto him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he spake to his disciples, that a small ship should wait on him because of the multitude, lest they should throng him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For he had healed many; insomuch that they pressed upon him for to touch him, as many as had plagues. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And unclean spirits, when they saw him, fell down before him, and cried, saying, Thou art the Son of God. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And he straitly charged them that they should not make him known.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Twelve Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he goeth up into a mountain, and calleth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' whom he would: and they came unto him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he ordained twelve, that they should be with him, and that he might send them forth to preach, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and to have power to heal sicknesses, and to cast out devils: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Simon he surnamed Peter; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and James the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' of Zebedee, and John the brother of James; and he surnamed them Boanerges, which is, The sons of thunder: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and Andrew, and Philip, and Bartholomew, and Matthew, and Thomas, and James the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' of Alphæus, and Thaddæus, and Simon the Canaanite, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and Judas Iscariot, which also betrayed him: and they went into an house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the multitude cometh together again, so that they could not so much as eat bread. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when his friends heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', they went out to lay hold on him: for they said, He is beside himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the scribes which came down from Jerusalem said, He hath Beelzebub, and by the prince of the devils casteth he out devils. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he called them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', and said unto them in parables, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How can Satan cast out Satan?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if a kingdom be divided against itself, that kingdom cannot stand.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if a house be divided against itself, that house cannot stand.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if Satan rise up against himself, and be divided, he cannot stand, but hath an end.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No man can enter into a strong man's house, and spoil his goods, except he will first bind the strong man; and then he will spoil his house.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Verily I say unto you, All sins shall be forgiven unto the sons of men, and blasphemies wherewith soever they shall blaspheme:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'but he that shall blaspheme against the Holy Ghost hath never forgiveness, but is in danger of eternal damnation:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: because they said, He hath an unclean spirit.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Mother and Brethren
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'There came then his brethren and his mother, and, standing without, sent unto him, calling him. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the multitude sat about him, and they said unto him, Behold, thy mother and thy brethren without seek for thee. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he answered them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who is my mother, or my brethren?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he looked round about on them which sat about him, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Behold my mother and my brethren!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whosoever shall do the will of God, the same is my brother, and my sister, and mother.
