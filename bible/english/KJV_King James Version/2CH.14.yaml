verses:
  '1':
  - type: heading
    content: Asa
  - type: text
    content: 'So Abijah slept with his fathers, and they buried him in the city of David: and Asa his son reigned in his stead. In his days the land was quiet ten years. '
  '10':
  - type: text
    content: 'Then Asa went out against him, and they set the battle in array in the valley of Zephathah at Mareshah. '
  '11':
  - type: text
    content: 'And Asa cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, and said, '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: it is
  - type: text
    content: ' nothing with thee to help, whether with many, or with them that have no power: help us, O '
  - type: text
    content: LORD
  - type: text
    content: ' our God; for we rest on thee, and in thy name we go against this multitude. O '
  - type: text
    content: LORD
  - type: text
    content: ', thou '
  - type: text
    content: art
  - type: text
    content: ' our God; let not man prevail against thee. '
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: LORD
  - type: text
    content: ' smote the Ethiopians before Asa, and before Judah; and the Ethiopians fled. '
  '13':
  - type: text
    content: 'And Asa and the people that '
  - type: text
    content: were
  - type: text
    content: ' with him pursued them unto Gerar: and the Ethiopians were overthrown, that they could not recover themselves; for they were destroyed before the '
  - type: text
    content: LORD
  - type: text
    content: ', and before his host; and they carried away very much spoil. '
  '14':
  - type: text
    content: 'And they smote all the cities round about Gerar; for the fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' came upon them: and they spoiled all the cities; for there was exceeding much spoil in them. '
  '15':
  - type: text
    content: They smote also the tents of cattle, and carried away sheep and camels in abundance, and returned to Jerusalem.
  '2':
  - type: text
    content: 'And Asa did '
  - type: text
    content: that which was
  - type: text
    content: ' good and right in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God: '
  '3':
  - type: text
    content: 'for he took away the altars of the strange '
  - type: text
    content: gods
  - type: text
    content: ', and the high places, and brake down the images, and cut down the groves: '
  '4':
  - type: text
    content: 'and commanded Judah to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers, and to do the law and the commandment. '
  '5':
  - type: text
    content: 'Also he took away out of all the cities of Judah the high places and the images: and the kingdom was quiet before him. '
  '6':
  - type: text
    content: 'And he built fenced cities in Judah: for the land had rest, and he had no war in those years; because the '
  - type: text
    content: LORD
  - type: text
    content: ' had given him rest. '
  '7':
  - type: text
    content: 'Therefore he said unto Judah, Let us build these cities, and make about '
  - type: text
    content: them
  - type: text
    content: ' walls, and towers, gates, and bars, '
  - type: text
    content: while
  - type: text
    content: ' the land '
  - type: text
    content: is
  - type: text
    content: ' yet before us; because we have sought the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, we have sought '
  - type: text
    content: him
  - type: text
    content: ', and he hath given us rest on every side. So they built and prospered. '
  '8':
  - type: text
    content: 'And Asa had an army '
  - type: text
    content: of men
  - type: text
    content: ' that bare targets and spears, out of Judah three hundred thousand; and out of Benjamin, that bare shields and drew bows, two hundred and fourscore thousand: all these '
  - type: text
    content: were
  - type: text
    content: ' mighty men of valour.'
  '9':
  - type: text
    content: 'And there came out against them Zerah the Ethiopian with an host of a thousand thousand, and three hundred chariots; and came unto Mareshah. '
