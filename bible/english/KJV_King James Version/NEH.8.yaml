document_id: NEH.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Great Assembly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people gathered themselves together as one man into the street that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before the water gate; and they spake unto Ezra the scribe to bring the book of the law of Moses, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded to Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said unto them, Go your way, eat the fat, and drink the sweet, and send portions unto them for whom nothing is prepared: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy unto our Lord: neither be ye sorry; for the joy of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is your strength. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Levites stilled all the people, saying, Hold your peace, for the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy; neither be ye grieved. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all the people went their way to eat, and to drink, and to send portions, and to make great mirth, because they had understood the words that were declared unto them.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the second day were gathered together the chief of the fathers of all the people, the priests, and the Levites, unto Ezra the scribe, even to understand the words of the law. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they found written in the law which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded by Moses, that the children of Israel should dwell in booths in the feast of the seventh month: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that they should publish and proclaim in all their cities, and in Jerusalem, saying, Go forth unto the mount, and fetch olive branches, and pine branches, and myrtle branches, and palm branches, and branches of thick trees, to make booths, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people went forth, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and made themselves booths, every one upon the roof of his house, and in their courts, and in the courts of the house of God, and in the street of the water gate, and in the street of the gate of Ephraim. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the congregation of them that were come again out of the captivity made booths, and sat under the booths: for since the days of Jeshua the son of Nun unto that day had not the children of Israel done so. And there was very great gladness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also day by day, from the first day unto the last day, he read in the book of the law of God. And they kept the feast seven days; and on the eighth day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a solemn assembly, according unto the manner.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ezra the priest brought the law before the congregation both of men and women, and all that could hear with understanding, upon the first day of the seventh month. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he read therein before the street that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before the water gate from the morning until midday, before the men and the women, and those that could understand; and the ears of all the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were attentive
    - type: text
      text: ' unto the book of the law. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ezra the scribe stood upon a pulpit of wood, which they had made for the purpose; and beside him stood Mattithiah, and Shema, and Anaiah, and Urijah, and Hilkiah, and Maaseiah, on his right hand; and on his left hand, Pedaiah, and Mishael, and Malchiah, and Hashum, and Hashbadana, Zechariah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Meshullam. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ezra opened the book in the sight of all the people; (for he was above all the people;) and when he opened it, all the people stood up: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ezra blessed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the great God. And all the people answered, Amen, Amen, with lifting up their hands: and they bowed their heads, and worshipped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' faces to the ground. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also Jeshua, and Bani, and Sherebiah, Jamin, Akkub, Shabbethai, Hodijah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah, and the Levites, caused the people to understand the law: and the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stood
    - type: text
      text: ' in their place. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they read in the book in the law of God distinctly, and gave the sense, and caused '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to understand the reading.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Nehemiah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the Tirshatha, and Ezra the priest the scribe, and the Levites that taught the people, said unto all the people, This day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God; mourn not, nor weep. For all the people wept, when they heard the words of the law. '
