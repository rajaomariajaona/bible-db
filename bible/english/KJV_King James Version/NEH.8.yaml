document_id: NEH.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Great Assembly
  - type: text
    content: 'And all the people gathered themselves together as one man into the street that '
  - type: text
    content: was
  - type: text
    content: ' before the water gate; and they spake unto Ezra the scribe to bring the book of the law of Moses, which the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded to Israel. '
  '10':
  - type: text
    content: 'Then he said unto them, Go your way, eat the fat, and drink the sweet, and send portions unto them for whom nothing is prepared: for '
  - type: text
    content: this
  - type: text
    content: ' day '
  - type: text
    content: is
  - type: text
    content: ' holy unto our Lord: neither be ye sorry; for the joy of the '
  - type: text
    content: LORD
  - type: text
    content: ' is your strength. '
  '11':
  - type: text
    content: 'So the Levites stilled all the people, saying, Hold your peace, for the day '
  - type: text
    content: is
  - type: text
    content: ' holy; neither be ye grieved. '
  '12':
  - type: text
    content: And all the people went their way to eat, and to drink, and to send portions, and to make great mirth, because they had understood the words that were declared unto them.
  '13':
  - type: text
    content: 'And on the second day were gathered together the chief of the fathers of all the people, the priests, and the Levites, unto Ezra the scribe, even to understand the words of the law. '
  '14':
  - type: text
    content: 'And they found written in the law which the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded by Moses, that the children of Israel should dwell in booths in the feast of the seventh month: '
  '15':
  - type: text
    content: 'and that they should publish and proclaim in all their cities, and in Jerusalem, saying, Go forth unto the mount, and fetch olive branches, and pine branches, and myrtle branches, and palm branches, and branches of thick trees, to make booths, as '
  - type: text
    content: it is
  - type: text
    content: ' written.'
  '16':
  - type: text
    content: 'So the people went forth, and brought '
  - type: text
    content: them
  - type: text
    content: ', and made themselves booths, every one upon the roof of his house, and in their courts, and in the courts of the house of God, and in the street of the water gate, and in the street of the gate of Ephraim. '
  '17':
  - type: text
    content: 'And all the congregation of them that were come again out of the captivity made booths, and sat under the booths: for since the days of Jeshua the son of Nun unto that day had not the children of Israel done so. And there was very great gladness. '
  '18':
  - type: text
    content: 'Also day by day, from the first day unto the last day, he read in the book of the law of God. And they kept the feast seven days; and on the eighth day '
  - type: text
    content: was
  - type: text
    content: ' a solemn assembly, according unto the manner.'
  '2':
  - type: text
    content: 'And Ezra the priest brought the law before the congregation both of men and women, and all that could hear with understanding, upon the first day of the seventh month. '
  '3':
  - type: text
    content: 'And he read therein before the street that '
  - type: text
    content: was
  - type: text
    content: ' before the water gate from the morning until midday, before the men and the women, and those that could understand; and the ears of all the people '
  - type: text
    content: were attentive
  - type: text
    content: ' unto the book of the law. '
  '4':
  - type: text
    content: 'And Ezra the scribe stood upon a pulpit of wood, which they had made for the purpose; and beside him stood Mattithiah, and Shema, and Anaiah, and Urijah, and Hilkiah, and Maaseiah, on his right hand; and on his left hand, Pedaiah, and Mishael, and Malchiah, and Hashum, and Hashbadana, Zechariah, '
  - type: text
    content: and
  - type: text
    content: ' Meshullam. '
  '5':
  - type: text
    content: 'And Ezra opened the book in the sight of all the people; (for he was above all the people;) and when he opened it, all the people stood up: '
  '6':
  - type: text
    content: 'and Ezra blessed the '
  - type: text
    content: LORD
  - type: text
    content: ', the great God. And all the people answered, Amen, Amen, with lifting up their hands: and they bowed their heads, and worshipped the '
  - type: text
    content: LORD
  - type: text
    content: ' with '
  - type: text
    content: their
  - type: text
    content: ' faces to the ground. '
  '7':
  - type: text
    content: 'Also Jeshua, and Bani, and Sherebiah, Jamin, Akkub, Shabbethai, Hodijah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah, and the Levites, caused the people to understand the law: and the people '
  - type: text
    content: stood
  - type: text
    content: ' in their place. '
  '8':
  - type: text
    content: 'So they read in the book in the law of God distinctly, and gave the sense, and caused '
  - type: text
    content: them
  - type: text
    content: ' to understand the reading.'
  '9':
  - type: text
    content: 'And Nehemiah, which '
  - type: text
    content: is
  - type: text
    content: ' the Tirshatha, and Ezra the priest the scribe, and the Levites that taught the people, said unto all the people, This day '
  - type: text
    content: is
  - type: text
    content: ' holy unto the '
  - type: text
    content: LORD
  - type: text
    content: ' your God; mourn not, nor weep. For all the people wept, when they heard the words of the law. '
