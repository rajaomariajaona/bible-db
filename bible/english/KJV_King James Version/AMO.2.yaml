    - type: text
      text: '6'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; For three transgressions of Israel, and for four, I will not turn away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the punishment
  - type: text
    text: ' thereof; because they sold the righteous for silver, and the poor for a pair of shoes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'that pant after the dust of the earth on the head of the poor, and turn aside the way of the meek: and a man and his father will go in unto the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: same
  - type: text
    text: ' maid, to profane my holy name: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and they lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' down upon clothes laid to pledge by every altar, and they drink the wine of the condemned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the house of their god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yet destroyed I the Amorite before them, whose height '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like the height of the cedars, and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' strong as the oaks; yet I destroyed his fruit from above, and his roots from beneath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Also I brought you up from the land of Egypt, and led you forty years through the wilderness, to possess the land of the Amorite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I raised up of your sons for prophets, and of your young men for Nazarites. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' not even thus, O ye children of Israel? saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But ye gave the Nazarites wine to drink; and commanded the prophets, saying, Prophesy not.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Behold, I am pressed under you, as a cart is pressed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' full of sheaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore the flight shall perish from the swift, and the strong shall not strengthen his force, neither shall the mighty deliver himself: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'neither shall he stand that handleth the bow; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he that is
  - type: text
    text: ' swift of foot shall not deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'himself:'
  - type: text
    text: ' neither shall he that rideth the horse deliver himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he that is
  - type: text
    text: ' courageous among the mighty shall flee away naked in that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
