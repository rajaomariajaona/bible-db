  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; For three transgressions of Judah, and for four, I will not turn away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the punishment
  - type: text
    text: ' thereof; because they have despised the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and have not kept his commandments, and their lies caused them to err, after the which their fathers have walked: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: but I will send a fire upon Judah, and it shall devour the palaces of Jerusalem.
