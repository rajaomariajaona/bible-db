  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; For three transgressions of Moab, and for four, I will not turn away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the punishment
  - type: text
    text: ' thereof; because he burned the bones of the king of Edom into lime: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'but I will send a fire upon Moab, and it shall devour the palaces of Kirioth: and Moab shall die with tumult, with shouting, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' with the sound of the trumpet: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and I will cut off the judge from the midst thereof, and will slay all the princes thereof with him, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
