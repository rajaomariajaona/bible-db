verses:
  '1':
  - type: heading
    content: Moab
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Moab, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because he burned the bones of the king of Edom into lime: '
  '10':
  - type: text
    content: 'Also I brought you up from the land of Egypt, and led you forty years through the wilderness, to possess the land of the Amorite. '
  '11':
  - type: text
    content: 'And I raised up of your sons for prophets, and of your young men for Nazarites. '
  - type: text
    content: Is it
  - type: text
    content: ' not even thus, O ye children of Israel? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '12':
  - type: text
    content: But ye gave the Nazarites wine to drink; and commanded the prophets, saying, Prophesy not.
  '13':
  - type: text
    content: 'Behold, I am pressed under you, as a cart is pressed '
  - type: text
    content: that is
  - type: text
    content: ' full of sheaves. '
  '14':
  - type: text
    content: 'Therefore the flight shall perish from the swift, and the strong shall not strengthen his force, neither shall the mighty deliver himself: '
  '15':
  - type: text
    content: 'neither shall he stand that handleth the bow; and '
  - type: text
    content: he that is
  - type: text
    content: ' swift of foot shall not deliver '
  - type: text
    content: 'himself:'
  - type: text
    content: ' neither shall he that rideth the horse deliver himself. '
  '16':
  - type: text
    content: 'And '
  - type: text
    content: he that is
  - type: text
    content: ' courageous among the mighty shall flee away naked in that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'but I will send a fire upon Moab, and it shall devour the palaces of Kirioth: and Moab shall die with tumult, with shouting, '
  - type: text
    content: and
  - type: text
    content: ' with the sound of the trumpet: '
  '3':
  - type: text
    content: 'and I will cut off the judge from the midst thereof, and will slay all the princes thereof with him, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Judah
  '4':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Judah, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because they have despised the law of the '
  - type: text
    content: LORD
  - type: text
    content: ', and have not kept his commandments, and their lies caused them to err, after the which their fathers have walked: '
  '5':
  - type: text
    content: but I will send a fire upon Judah, and it shall devour the palaces of Jerusalem.
  - type: heading
    content: Israel
  '6':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Israel, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because they sold the righteous for silver, and the poor for a pair of shoes; '
  '7':
  - type: text
    content: 'that pant after the dust of the earth on the head of the poor, and turn aside the way of the meek: and a man and his father will go in unto the '
  - type: text
    content: same
  - type: text
    content: ' maid, to profane my holy name: '
  '8':
  - type: text
    content: 'and they lay '
  - type: text
    content: themselves
  - type: text
    content: ' down upon clothes laid to pledge by every altar, and they drink the wine of the condemned '
  - type: text
    content: in
  - type: text
    content: ' the house of their god.'
  '9':
  - type: text
    content: 'Yet destroyed I the Amorite before them, whose height '
  - type: text
    content: was
  - type: text
    content: ' like the height of the cedars, and he '
  - type: text
    content: was
  - type: text
    content: ' strong as the oaks; yet I destroyed his fruit from above, and his roots from beneath. '
