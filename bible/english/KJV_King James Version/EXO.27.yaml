document_id: EXO.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt make an altar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood, five cubits long, and five cubits broad; the altar shall be foursquare: and the height thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' three cubits. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the twenty pillars thereof and their twenty sockets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be of
    - type: text
      text: ' brass; the hooks of the pillars and their fillets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be of
    - type: text
      text: ' silver. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And likewise for the north side in length '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' hangings of an hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long, and his twenty pillars and their twenty sockets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass; the hooks of the pillars and their fillets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' silver. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the breadth of the court on the west side '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' hangings of fifty cubits: their pillars ten, and their sockets ten. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the breadth of the court on the east side eastward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' fifty cubits. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hangings of one side '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the gate shall be
    - type: text
      text: ' fifteen cubits: their pillars three, and their sockets three. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the other side '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' hangings fifteen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'cubits:'
    - type: text
      text: ' their pillars three, and their sockets three. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the gate of the court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an hanging of twenty cubits, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' blue, and purple, and scarlet, and fine twined linen, wrought with needlework: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' their pillars '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' four, and their sockets four. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the pillars round about the court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' filleted with silver; their hooks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be of
    - type: text
      text: ' silver, and their sockets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The length of the court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an hundred cubits, and the breadth fifty every where, and the height five cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine twined linen, and their sockets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the vessels of the tabernacle in all the service thereof, and all the pins thereof, and all the pins of the court, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be of
    - type: text
      text: ' brass.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt make the horns of it upon the four corners thereof: his horns shall be of the same: and thou shalt overlay it with brass. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt command the children of Israel, that they bring thee pure oil olive beaten for the light, to cause the lamp to burn always. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the tabernacle of the congregation without the vail, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before the testimony, Aaron and his sons shall order it from evening to morning before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a statute for ever unto their generations on the behalf of the children of Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt make his pans to receive his ashes, and his shovels, and his basons, and his fleshhooks, and his firepans: all the vessels thereof thou shalt make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt make for it a grate of network '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' brass; and upon the net shalt thou make four brasen rings in the four corners thereof. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt put it under the compass of the altar beneath, that the net may be even to the midst of the altar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt make staves for the altar, staves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood, and overlay them with brass. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the staves shall be put into the rings, and the staves shall be upon the two sides of the altar, to bear it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hollow with boards shalt thou make it: as it was shewed thee in the mount, so shall they make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt make the court of the tabernacle: for the south side southward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' hangings for the court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' fine twined linen of an hundred cubits long for one side: '
