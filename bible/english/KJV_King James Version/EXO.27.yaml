document_id: EXO.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And thou shalt make an altar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood, five cubits long, and five cubits broad; the altar shall be foursquare: and the height thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' three cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And thou shalt make the horns of it upon the four corners thereof: his horns shall be of the same: and thou shalt overlay it with brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And thou shalt make his pans to receive his ashes, and his shovels, and his basons, and his fleshhooks, and his firepans: all the vessels thereof thou shalt make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And thou shalt make for it a grate of network '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass; and upon the net shalt thou make four brasen rings in the four corners thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And thou shalt put it under the compass of the altar beneath, that the net may be even to the midst of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And thou shalt make staves for the altar, staves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood, and overlay them with brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the staves shall be put into the rings, and the staves shall be upon the two sides of the altar, to bear it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hollow with boards shalt thou make it: as it was shewed thee in the mount, so shall they make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And thou shalt make the court of the tabernacle: for the south side southward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' hangings for the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine twined linen of an hundred cubits long for one side: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the twenty pillars thereof and their twenty sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' brass; the hooks of the pillars and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And likewise for the north side in length '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' hangings of an hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cubits
  - type: text
    text: ' long, and his twenty pillars and their twenty sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass; the hooks of the pillars and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the breadth of the court on the west side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' hangings of fifty cubits: their pillars ten, and their sockets ten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the breadth of the court on the east side eastward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' fifty cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The hangings of one side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the gate shall be
  - type: text
    text: ' fifteen cubits: their pillars three, and their sockets three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And on the other side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' hangings fifteen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'cubits:'
  - type: text
    text: ' their pillars three, and their sockets three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And for the gate of the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' an hanging of twenty cubits, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, and purple, and scarlet, and fine twined linen, wrought with needlework: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' their pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' four, and their sockets four. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All the pillars round about the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' filleted with silver; their hooks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' silver, and their sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The length of the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' an hundred cubits, and the breadth fifty every where, and the height five cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine twined linen, and their sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'All the vessels of the tabernacle in all the service thereof, and all the pins thereof, and all the pins of the court, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' brass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And thou shalt command the children of Israel, that they bring thee pure oil olive beaten for the light, to cause the lamp to burn always. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In the tabernacle of the congregation without the vail, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before the testimony, Aaron and his sons shall order it from evening to morning before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it shall be
  - type: text
    text: ' a statute for ever unto their generations on the behalf of the children of Israel.'
