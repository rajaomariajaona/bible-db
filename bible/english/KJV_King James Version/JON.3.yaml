document_id: JON.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prophet's Obedience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto Jonah the second time, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God saw their works, that they turned from their evil way; and God repented of the evil, that he had said that he would do unto them; and he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arise, go unto Nineveh, that great city, and preach unto it the preaching that I bid thee. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jonah arose, and went unto Nineveh, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Now Nineveh was an exceeding great city of three days'' journey. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jonah began to enter into the city a day's journey, and he cried, and said, Yet forty days, and Nineveh shall be overthrown.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people of Nineveh believed God, and proclaimed a fast, and put on sackcloth, from the greatest of them even to the least of them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For word came unto the king of Nineveh, and he arose from his throne, and he laid his robe from him, and covered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' with sackcloth, and sat in ashes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he caused '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to be proclaimed and published through Nineveh by the decree of the king and his nobles, saying, Let neither man nor beast, herd nor flock, taste any thing: let them not feed, nor drink water: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but let man and beast be covered with sackcloth, and cry mightily unto God: yea, let them turn every one from his evil way, and from the violence that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in their hands. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who can tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' God will turn and repent, and turn away from his fierce anger, that we perish not?'
