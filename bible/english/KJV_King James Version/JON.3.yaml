    content: The Prophet's Obedience
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto Jonah the second time, saying, '
  '10':
  - type: text
    content: 'And God saw their works, that they turned from their evil way; and God repented of the evil, that he had said that he would do unto them; and he did '
  - type: text
    content: it
  - type: text
    content: ' not.'
  '2':
  - type: text
    content: 'Arise, go unto Nineveh, that great city, and preach unto it the preaching that I bid thee. '
  '3':
  - type: text
    content: 'So Jonah arose, and went unto Nineveh, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. Now Nineveh was an exceeding great city of three days'' journey. '
  '4':
  - type: text
    content: And Jonah began to enter into the city a day's journey, and he cried, and said, Yet forty days, and Nineveh shall be overthrown.
  '5':
  - type: text
    content: 'So the people of Nineveh believed God, and proclaimed a fast, and put on sackcloth, from the greatest of them even to the least of them. '
  '6':
  - type: text
    content: 'For word came unto the king of Nineveh, and he arose from his throne, and he laid his robe from him, and covered '
  - type: text
    content: him
  - type: text
    content: ' with sackcloth, and sat in ashes. '
  '7':
  - type: text
    content: 'And he caused '
  - type: text
    content: it
  - type: text
    content: ' to be proclaimed and published through Nineveh by the decree of the king and his nobles, saying, Let neither man nor beast, herd nor flock, taste any thing: let them not feed, nor drink water: '
  '8':
  - type: text
    content: 'but let man and beast be covered with sackcloth, and cry mightily unto God: yea, let them turn every one from his evil way, and from the violence that '
  - type: text
    content: is
  - type: text
    content: ' in their hands. '
  '9':
  - type: text
    content: 'Who can tell '
  - type: text
    content: if
  - type: text
    content: ' God will turn and repent, and turn away from his fierce anger, that we perish not?'
