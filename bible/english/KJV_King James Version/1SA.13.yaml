document_id: 1SA.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saul's Disobedience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Saul reigned one year; and when he had reigned two years over Israel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And it came to pass, that as soon as he had made an end of offering the burnt offering, behold, Samuel came; and Saul went out to meet him, that he might salute him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Samuel said, What hast thou done? And Saul said, Because I saw that the people were scattered from me, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou camest not within the days appointed, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the Philistines gathered themselves together at Michmash; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'therefore said I, The Philistines will come down now upon me to Gilgal, and I have not made supplication unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': I forced myself therefore, and offered a burnt offering. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Samuel said to Saul, Thou hast done foolishly: thou hast not kept the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which he commanded thee: for now would the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have established thy kingdom upon Israel for ever. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But now thy kingdom shall not continue: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sought him a man after his own heart, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' captain over his people, because thou hast not kept '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded thee.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Samuel arose, and gat him up from Gilgal unto Gibeah of Benjamin. And Saul numbered the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' present with him, about six hundred men. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Saul, and Jonathan his son, and the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' present with them, abode in Gibeah of Benjamin: but the Philistines encamped in Michmash. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the spoilers came out of the camp of the Philistines in three companies: one company turned unto the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that leadeth to
    - type: text
      text: ' Ophrah, unto the land of Shual: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and another company turned the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' Beth-horon: and another company turned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the way of the border that looketh to the valley of Zeboim toward the wilderness.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now there was no smith found throughout all the land of Israel: for the Philistines said, Lest the Hebrews make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' swords or spears: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Saul chose him three thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Israel; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whereof
    - type: text
      text: ' two thousand were with Saul in Michmash and in mount Beth-el, and a thousand were with Jonathan in Gibeah of Benjamin: and the rest of the people he sent every man to his tent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'but all the Israelites went down to the Philistines, to sharpen every man his share, and his coulter, and his axe, and his mattock. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Yet they had a file for the mattocks, and for the coulters, and for the forks, and for the axes, and to sharpen the goads. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So it came to pass in the day of battle, that there was neither sword nor spear found in the hand of any of the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with Saul and Jonathan: but with Saul and with Jonathan his son was there found. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And the garrison of the Philistines went out to the passage of Michmash.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Jonathan smote the garrison of the Philistines that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Geba, and the Philistines heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: '. And Saul blew the trumpet throughout all the land, saying, Let the Hebrews hear. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And all Israel heard say '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Saul had smitten a garrison of the Philistines, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Israel also was had in abomination with the Philistines. And the people were called together after Saul to Gilgal.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the Philistines gathered themselves together to fight with Israel, thirty thousand chariots, and six thousand horsemen, and people as the sand which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the sea shore in multitude: and they came up, and pitched in Michmash, eastward from Beth-aven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When the men of Israel saw that they were in a strait, (for the people were distressed,) then the people did hide themselves in caves, and in thickets, and in rocks, and in high places, and in pits. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some of
    - type: text
      text: ' the Hebrews went over Jordan to the land of Gad and Gilead. As for Saul, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' yet in Gilgal, and all the people followed him trembling.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he tarried seven days, according to the set time that Samuel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'had appointed:'
    - type: text
      text: ' but Samuel came not to Gilgal; and the people were scattered from him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Saul said, Bring hither a burnt offering to me, and peace offerings. And he offered the burnt offering. '
