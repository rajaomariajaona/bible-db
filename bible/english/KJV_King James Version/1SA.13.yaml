  '1':
  - type: heading
    content: Saul's Disobedience
  - type: text
    content: 'Saul reigned one year; and when he had reigned two years over Israel, '
  '10':
  - type: text
    content: 'And it came to pass, that as soon as he had made an end of offering the burnt offering, behold, Samuel came; and Saul went out to meet him, that he might salute him. '
  '11':
  - type: text
    content: 'And Samuel said, What hast thou done? And Saul said, Because I saw that the people were scattered from me, and '
  - type: text
    content: that
  - type: text
    content: ' thou camest not within the days appointed, and '
  - type: text
    content: that
  - type: text
    content: ' the Philistines gathered themselves together at Michmash; '
  '12':
  - type: text
    content: 'therefore said I, The Philistines will come down now upon me to Gilgal, and I have not made supplication unto the '
  - type: text
    content: LORD
  - type: text
    content: ': I forced myself therefore, and offered a burnt offering. '
  '13':
  - type: text
    content: 'And Samuel said to Saul, Thou hast done foolishly: thou hast not kept the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, which he commanded thee: for now would the '
  - type: text
    content: LORD
  - type: text
    content: ' have established thy kingdom upon Israel for ever. '
  '14':
  - type: text
    content: 'But now thy kingdom shall not continue: the '
  - type: text
    content: LORD
  - type: text
    content: ' hath sought him a man after his own heart, and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath commanded him '
  - type: text
    content: to be
  - type: text
    content: ' captain over his people, because thou hast not kept '
  - type: text
    content: that
  - type: text
    content: ' which the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded thee.'
  '15':
  - type: text
    content: 'And Samuel arose, and gat him up from Gilgal unto Gibeah of Benjamin. And Saul numbered the people '
  - type: text
    content: that were
  - type: text
    content: ' present with him, about six hundred men. '
  '16':
  - type: text
    content: 'And Saul, and Jonathan his son, and the people '
  - type: text
    content: that were
  - type: text
    content: ' present with them, abode in Gibeah of Benjamin: but the Philistines encamped in Michmash. '
  '17':
  - type: text
    content: 'And the spoilers came out of the camp of the Philistines in three companies: one company turned unto the way '
  - type: text
    content: that leadeth to
  - type: text
    content: ' Ophrah, unto the land of Shual: '
  '18':
  - type: text
    content: 'and another company turned the way '
  - type: text
    content: to
  - type: text
    content: ' Beth-horon: and another company turned '
  - type: text
    content: to
  - type: text
    content: ' the way of the border that looketh to the valley of Zeboim toward the wilderness.'
  '19':
  - type: text
    content: 'Now there was no smith found throughout all the land of Israel: for the Philistines said, Lest the Hebrews make '
  - type: text
    content: them
  - type: text
    content: ' swords or spears: '
  '2':
  - type: text
    content: 'Saul chose him three thousand '
  - type: text
    content: men
  - type: text
    content: ' of Israel; '
  - type: text
    content: whereof
  - type: text
    content: ' two thousand were with Saul in Michmash and in mount Beth-el, and a thousand were with Jonathan in Gibeah of Benjamin: and the rest of the people he sent every man to his tent. '
  '20':
  - type: text
    content: 'but all the Israelites went down to the Philistines, to sharpen every man his share, and his coulter, and his axe, and his mattock. '
  '21':
  - type: text
    content: 'Yet they had a file for the mattocks, and for the coulters, and for the forks, and for the axes, and to sharpen the goads. '
  '22':
  - type: text
    content: 'So it came to pass in the day of battle, that there was neither sword nor spear found in the hand of any of the people that '
  - type: text
    content: were
  - type: text
    content: ' with Saul and Jonathan: but with Saul and with Jonathan his son was there found. '
  '23':
  - type: text
    content: And the garrison of the Philistines went out to the passage of Michmash.
  '3':
  - type: text
    content: 'And Jonathan smote the garrison of the Philistines that '
  - type: text
    content: was
  - type: text
    content: ' in Geba, and the Philistines heard '
  - type: text
    content: of it
  - type: text
    content: '. And Saul blew the trumpet throughout all the land, saying, Let the Hebrews hear. '
  '4':
  - type: text
    content: 'And all Israel heard say '
  - type: text
    content: that
  - type: text
    content: ' Saul had smitten a garrison of the Philistines, and '
  - type: text
    content: that
  - type: text
    content: ' Israel also was had in abomination with the Philistines. And the people were called together after Saul to Gilgal.'
  '5':
  - type: text
    content: 'And the Philistines gathered themselves together to fight with Israel, thirty thousand chariots, and six thousand horsemen, and people as the sand which '
  - type: text
    content: is
  - type: text
    content: ' on the sea shore in multitude: and they came up, and pitched in Michmash, eastward from Beth-aven. '
  '6':
  - type: text
    content: 'When the men of Israel saw that they were in a strait, (for the people were distressed,) then the people did hide themselves in caves, and in thickets, and in rocks, and in high places, and in pits. '
  '7':
  - type: text
    content: 'And '
  - type: text
    content: some of
  - type: text
    content: ' the Hebrews went over Jordan to the land of Gad and Gilead. As for Saul, he '
  - type: text
    content: was
  - type: text
    content: ' yet in Gilgal, and all the people followed him trembling.'
  '8':
  - type: text
    content: 'And he tarried seven days, according to the set time that Samuel '
  - type: text
    content: 'had appointed:'
  - type: text
    content: ' but Samuel came not to Gilgal; and the people were scattered from him. '
  '9':
  - type: text
    content: 'And Saul said, Bring hither a burnt offering to me, and peace offerings. And he offered the burnt offering. '
