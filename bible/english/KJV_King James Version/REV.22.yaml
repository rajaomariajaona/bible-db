document_id: REV.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And he shewed me a pure river of water of life, clear as crystal, proceeding out of the throne of God and of the Lamb. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he saith unto me, Seal not the sayings of the prophecy of this book: for the time is at hand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He that is unjust, let him be unjust still: and he which is filthy, let him be filthy still: and he that is righteous, let him be righteous still: and he that is holy, let him be holy still. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And, behold, I come quickly; and my reward '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' with me, to give every man according as his work shall be.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am Alpha and Omega, the beginning and the end, the first and the last.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that do his commandments, that they may have right to the tree of life, and may enter in through the gates into the city. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For without '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' dogs, and sorcerers, and whoremongers, and murderers, and idolaters, and whosoever loveth and maketh a lie.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I Jesus have sent mine angel to testify unto you these things in the churches. I am the root and the offspring of David, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: and
      - type: text
        text: ' the bright and morning star.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And the Spirit and the bride say, Come. And let him that heareth say, Come. And let him that is athirst come. And whosoever will, let him take the water of life freely.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For I testify unto every man that heareth the words of the prophecy of this book, If any man shall add unto these things, God shall add unto him the plagues that are written in this book: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and if any man shall take away from the words of the book of this prophecy, God shall take away his part out of the book of life, and out of the holy city, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the things which are written in this book.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In the midst of the street of it, and on either side of the river, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was there
    - type: text
      text: ' the tree of life, which bare twelve '
    - type: usfm
      marker: add
      children:
      - type: text
        text: manner of
    - type: text
      text: ' fruits, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' yielded her fruit every month: and the leaves of the tree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' for the healing of the nations. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He which testifieth these things saith, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Surely I come quickly.
    - type: text
      text: ' Amen. Even so, come, Lord Jesus.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The grace of our Lord Jesus Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you all. Amen.'
  - type: usfm
    marker: iex
    children:
    - type: text
      text: THE END
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And there shall be no more curse: but the throne of God and of the Lamb shall be in it; and his servants shall serve him: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and they shall see his face; and his name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' in their foreheads. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And there shall be no night there; and they need no candle, neither light of the sun; for the Lord God giveth them light: and they shall reign for ever and ever.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Words of this Book
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he said unto me, These sayings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' faithful and true: and the Lord God of the holy prophets sent his angel to shew unto his servants the things which must shortly be done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Behold, I come quickly: blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that keepeth the sayings of the prophecy of this book.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And I John saw these things, and heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. And when I had heard and seen, I fell down to worship before the feet of the angel which shewed me these things. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then saith he unto me, See '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou do it
    - type: text
      text: ' not: for I am thy fellowservant, and of thy brethren the prophets, and of them which keep the sayings of this book: worship God.'
