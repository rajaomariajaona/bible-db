document_id: ISA.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, doth take away from Jerusalem and from Judah the stay and the staff, the whole stay of bread, and the whole stay of water, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Say ye to the righteous, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' well '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'with him:'
    - type: text
      text: ' for they shall eat the fruit of their doings. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe unto the wicked! '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' ill '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'with him:'
    - type: text
      text: ' for the reward of his hands shall be given him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' my people, children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' their oppressors, and women rule over them. O my people, they which lead thee cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' to err, and destroy the way of thy paths. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' standeth up to plead, and standeth to judge the people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will enter into judgment with the ancients of his people, and the princes thereof: for ye have eaten up the vineyard; the spoil of the poor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in your houses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What mean ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye beat my people to pieces, and grind the faces of the poor? saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' of hosts.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Daughters of Zion
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saith, Because the daughters of Zion are haughty, and walk with stretched forth necks and wanton eyes, walking and mincing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' they go, and making a tinkling with their feet: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore the Lord will smite with a scab the crown of the head of the daughters of Zion, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will discover their secret parts. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day the Lord will take away the bravery of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' tinkling ornaments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: about their feet
    - type: text
      text: ', and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' cauls, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' round tires like the moon, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the chains, and the bracelets, and the mufflers, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the mighty man, and the man of war, the judge, and the prophet, and the prudent, and the ancient, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the bonnets, and the ornaments of the legs, and the headbands, and the tablets, and the earrings, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the rings, and nose jewels, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the changeable suits of apparel, and the mantles, and the wimples, and the crisping pins, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the glasses, and the fine linen, and the hoods, and the vails. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' instead of sweet smell there shall be stink; and instead of a girdle a rent; and instead of well set hair baldness; and instead of a stomacher a girding of sackcloth; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' burning instead of beauty. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy men shall fall by the sword, and thy mighty in the war. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her gates shall lament and mourn; and she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' desolate shall sit upon the ground.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the captain of fifty, and the honourable man, and the counsellor, and the cunning artificer, and the eloquent orator. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will give children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' their princes, and babes shall rule over them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people shall be oppressed, every one by another, and every one by his neighbour: the child shall behave himself proudly against the ancient, and the base against the honourable. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When a man shall take hold of his brother of the house of his father, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Thou hast clothing, be thou our ruler, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let
    - type: text
      text: ' this ruin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' under thy hand: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in that day shall he swear, saying, I will not be an healer; for in my house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' neither bread nor clothing: make me not a ruler of the people.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Jerusalem is ruined, and Judah is fallen: because their tongue and their doings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to provoke the eyes of his glory. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The shew of their countenance doth witness against them; and they declare their sin as Sodom, they hide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not. Woe unto their soul! for they have rewarded evil unto themselves. '
