document_id: EXO.40,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle Erected
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'You shall also anoint '
  - type: note
    content: ch. 30:28
  - type: text
    content: 'the altar of burnt offering and all its utensils, and consecrate the altar, '
  - type: note
    content: ch. 29:37
  - type: text
    content: 'so that the altar may become most holy. '
  '11':
  - type: text
    content: 'You shall also anoint the basin and its stand, and consecrate it. '
  '12':
  - type: note
    content: See Lev. 8:1-13
  - type: text
    content: 'Then you shall bring Aaron and his sons to the entrance of the tent of meeting and shall wash them with water '
  '13':
  - type: text
    content: 'and put on Aaron the holy garments. And you shall anoint him and consecrate him, that he may serve me as priest. '
  '14':
  - type: text
    content: 'You shall bring his sons also and put coats on them, '
  '15':
  - type: note
    content: ch. 28:41; 29:7
  - type: text
    content: 'and anoint them, as you anointed their father, that they may serve me as priests. And their anointing shall admit them to a '
  - type: note
    content: Num. 25:13
  - type: text
    content: perpetual priesthood throughout their generations.”
  '16':
  - type: text
    content: 'This Moses did; according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, so he did. '
  '17':
  - type: text
    content: 'In the first month in the second year, on the first day of the month, '
  - type: note
    content: ver. 2; Num. 7:1
  - type: text
    content: 'the tabernacle was erected. '
  '18':
  - type: text
    content: 'Moses erected the tabernacle. He laid its bases, and set up its frames, and put in its poles, and raised up its pillars. '
  '19':
  - type: text
    content: 'And he spread the tent over the tabernacle and put the covering of the tent over it, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '2':
  - type: text
    content: '“On the '
  - type: note
    content: '[ch. 12:2; 13:4]'
  - type: text
    content: 'first day of the first month you shall '
  - type: note
    content: ver. 17; ch. 26:30
  - type: text
    content: 'erect the tabernacle of the tent of meeting. '
  '20':
  - type: text
    content: 'He '
  - type: note
    content: ch. 25:16; See ch. 16:34
  - type: text
    content: 'took the testimony and put it into the ark, and put the poles on the ark and set the mercy seat above on the ark. '
  '21':
  - type: text
    content: 'And he brought the ark into the tabernacle and '
  - type: note
    content: ver. 3; See ch. 35:12
  - type: text
    content: 'set up the veil of the screen, and screened '
  - type: note
    content: ver. 3, 20
  - type: text
    content: 'the ark of the testimony, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '22':
  - type: note
    content: ver. 4; ch. 26:35
  - type: text
    content: 'He put the table in the tent of meeting, on the north side of the tabernacle, outside the veil, '
  '23':
  - type: text
    content: 'and arranged the bread on it before the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '24':
  - type: note
    content: ch. 26:35
  - type: text
    content: 'He put the lampstand in the tent of meeting, opposite the table on the south side of the tabernacle, '
  '25':
  - type: note
    content: ver. 4; ch. 25:37
  - type: text
    content: 'and set up the lamps before the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '26':
  - type: note
    content: ver. 5; ch. 30:6, 7
  - type: text
    content: 'He put the golden altar in the tent of meeting before the veil, '
  '27':
  - type: text
    content: 'and burned fragrant incense on it, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '28':
  - type: note
    content: ver. 5; ch. 26:36
  - type: text
    content: 'He put in place the screen for the door of the tabernacle. '
  '29':
  - type: note
    content: ver. 6
  - type: text
    content: 'And he set the altar of burnt offering at the entrance of the tabernacle of the tent of meeting, and offered on it the burnt offering and the '
  - type: note
    content: ch. 29:41; 30:9
  - type: text
    content: 'grain offering, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '3':
  - type: text
    content: 'And you shall put in it the ark of the testimony, and you shall '
  - type: note
    content: ver. 21; [ch. 35:12]
  - type: text
    content: 'screen the ark with the veil. '
  '30':
  - type: note
    content: ver. 7
  - type: text
    content: 'He set the basin between the tent of meeting and the altar, and put water in it for washing, '
  '31':
  - type: text
    content: 'with which Moses and '
  - type: note
    content: ch. 30:19, 20
  - type: text
    content: 'Aaron and his sons '
  - type: note
    content: ch. 30:21
  - type: text
    content: 'washed their hands and their feet. '
  '32':
  - type: text
    content: 'When they went into the tent of meeting, and when they approached the altar, they washed, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '33':
  - type: note
    content: ver. 8; ch. 27:9, 16
  - type: text
    content: 'And he erected the court around the tabernacle and the altar, and set up the screen of the gate of the court. So '
  - type: note
    content: '[Heb. 3:2, 5]'
  - type: text
    content: Moses finished the work.
  - type: heading
    content: The Glory of the Lord
  '34':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 13:21
  - type: text
    content: 'the cloud covered the tent of meeting, and '
  - type: note
    content: ch. 29:43; Lev. 16:2; Num. 9:15; [1 Kgs. 8:10, 11; 2 Chr. 5:13, 14; 7:2; Isa. 6:4; Hag. 2:7, 9; Rev. 15:8]
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the tabernacle. '
  '35':
  - type: text
    content: 'And Moses was not able to enter the tent of meeting because the cloud settled on it, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the tabernacle. '
  '36':
  - type: text
    content: 'Throughout all their journeys, '
  - type: note
    content: Num. 9:17; 10:11; [Neh. 9:19]
  - type: text
    content: 'whenever the cloud was taken up from over the tabernacle, the people of Israel would set out. '
  '37':
  - type: text
    content: 'But '
  - type: note
    content: See Num. 9:19-22
  - type: text
    content: 'if the cloud was not taken up, then they did not set out till the day that it was taken up. '
  '38':
  - type: text
    content: 'For the cloud of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on the tabernacle by day, and fire was in it by night, in the sight of all the house of Israel throughout all their journeys.'
  '4':
  - type: text
    content: 'And '
  - type: note
    content: ver. 22; ch. 26:35
  - type: text
    content: 'you shall bring in the table and arrange it, and '
  - type: note
    content: ver. 24, 25
  - type: text
    content: 'you shall bring in the lampstand and set up its lamps. '
  '5':
  - type: note
    content: ver. 26; [ch. 39:38]
  - type: text
    content: 'And you shall put the golden altar for incense before the ark of the testimony, and set up the screen for the door of the tabernacle. '
  '6':
  - type: note
    content: ver. 29
  - type: text
    content: 'You shall set the altar of burnt offering before the door of the tabernacle of the tent of meeting, '
  '7':
  - type: note
    content: ver. 30; ch. 30:18
  - type: text
    content: 'and place the basin between the tent of meeting and the altar, and put water in it. '
  '8':
  - type: text
    content: And you shall set up the court all around, and hang up the screen for the gate of the court.
  '9':
  - type: text
    content: '“Then you shall take the '
  - type: note
    content: ch. 30:26
  - type: text
    content: 'anointing oil and anoint the tabernacle and all that is in it, and consecrate it and all its furniture, so that it may become holy. '
