    - type: text
      text: ' was in the country of the Philistines seven months. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men did so, and took two milk cows and yoked them to the cart and shut up their calves at home. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they put the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the cart and the box with the golden mice and the images of their tumors. '
  '12':
