document_id: 1SA.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Returned to Israel
  - type: text
    content: 'The ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' was in the country of the Philistines seven months. '
  '10':
  - type: text
    content: 'The men did so, and took two milk cows and yoked them to the cart and shut up their calves at home. '
  '11':
  - type: text
    content: 'And they put the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' on the cart and the box with the golden mice and the images of their tumors. '
  '12':
  - type: text
    content: 'And the cows went straight in the direction of '
  - type: note
    content: Josh. 21:16
  - type: text
    content: 'Beth-shemesh along '
  - type: note
    content: Num. 20:19
  - type: text
    content: 'one highway, lowing as they went. They turned neither to the right nor to the left, and the lords of the Philistines went after them as far as the border of '
  - type: note
    content: Josh. 21:16
  - type: text
    content: 'Beth-shemesh. '
  '13':
  - type: text
    content: 'Now the people of '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Beth-shemesh were reaping their wheat harvest in the valley. And when they lifted up their eyes and saw the ark, they rejoiced to see it. '
  '14':
  - type: text
    content: 'The cart came into the field of Joshua of Beth-shemesh and stopped there. '
  - type: note
    content: ver. 18
  - type: text
    content: 'A great stone was there. And they split up the wood of the cart and offered the cows as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And the Levites took down the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the box that was beside it, in which were the golden figures, and set them upon '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'the great stone. And the men of '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Beth-shemesh offered burnt offerings and sacrificed sacrifices on that day to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And when '
  - type: note
    content: See ver. 4
  - type: text
    content: the five lords of the Philistines saw it, they returned that day to Ekron.
  '17':
  - type: text
    content: 'These are the golden tumors that the Philistines returned as a '
  - type: note
    content: ver. 3, 8
  - type: text
    content: 'guilt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ': one for Ashdod, one for Gaza, one for Ashkelon, one for Gath, one for Ekron, '
  '18':
  - type: text
    content: 'and the golden mice, according to the number of all the cities of the Philistines belonging to the five lords, '
  - type: note
    content: '[Deut. 3:5]'
  - type: text
    content: 'both fortified cities and unwalled villages. '
  - type: note
    content: ver. 14, 15
  - type: text
    content: 'The great stone beside which they set down the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a witness to this day in the field of Joshua of Beth-shemesh.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 19:21; Num. 4:15, 20; 2 Sam. 6:7 ]'
  - type: text
    content: 'And he struck some of the men of Beth-shemesh, because they looked upon the ark of the '
  - type: text
    content: Lord
  - type: text
    content: . He struck seventy men of them,
  - type: note
    content: Most Hebrew manuscripts struck of the people seventy men, fifty thousand men
  - type: text
    content: ' and the people mourned because the '
  - type: text
    content: Lord
  - type: text
    content: ' had struck the people with a great blow. '
  '2':
  - type: text
    content: 'And the Philistines called for the priests and '
  - type: note
    content: Deut. 18:10; [Gen. 41:8; Ex. 7:11; Dan. 2:2; 5:7]
  - type: text
    content: 'the diviners and said, “What shall we do with the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '? Tell us with what we shall send it to its place.” '
  '20':
  - type: text
    content: 'Then the men of Beth-shemesh said, '
  - type: note
    content: '[2 Sam. 6:9]'
  - type: text
    content: '“Who is able to stand before the '
  - type: text
    content: Lord
  - type: text
    content: ', this holy God? And to whom shall he go up away from us?” '
  '21':
  - type: text
    content: 'So they sent messengers to the inhabitants of '
  - type: note
    content: 1 Chr. 13:5, 6; [Josh. 9:17; 18:14]
  - type: text
    content: 'Kiriath-jearim, saying, “The Philistines have returned the ark of the '
  - type: text
    content: Lord
  - type: text
    content: . Come down and take it up to you.”
  '3':
  - type: text
    content: 'They said, “If you send away the ark of the God of Israel, do not send it empty, but by all means return him '
  - type: note
    content: '[Lev. 5:15, 16]'
  - type: text
    content: 'a guilt offering. Then you will be healed, and it will be known to you why '
  - type: note
    content: ver. 9
  - type: text
    content: 'his hand does not turn away from you.” '
  '4':
  - type: text
    content: 'And they said, “What is the guilt offering that we shall return to him?” They answered, “Five golden '
  - type: note
    content: ch. 5:6, 9, 12
  - type: text
    content: 'tumors and five golden mice, '
  - type: note
    content: ver. 17, 18; Josh. 13:3; Judg. 3:3
  - type: text
    content: 'according to the number of the lords of the Philistines, for the same plague was on all of you and on your lords. '
  '5':
  - type: text
    content: 'So you must make images of your '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'tumors and images of your mice that ravage the land, '
  - type: note
    content: '[Josh. 7:19]'
  - type: text
    content: 'and give glory to the God of Israel. Perhaps '
  - type: note
    content: '[ch. 5:6, 9, 11]'
  - type: text
    content: 'he will lighten his hand from off you '
  - type: note
    content: ch. 5:3, 4, 7
  - type: text
    content: 'and your gods and your land. '
  '6':
  - type: text
    content: 'Why should you harden your hearts as '
  - type: note
    content: '[Ex. 14:17]'
  - type: text
    content: 'the Egyptians and '
  - type: note
    content: Ex. 8:15, 32; [Ex. 7:13; 9:7, 35; 10:1]
  - type: text
    content: 'Pharaoh hardened their hearts? After he had dealt severely with them, '
  - type: note
    content: Ex. 12:31
  - type: text
    content: 'did they not send the people away, and they departed? '
  '7':
  - type: text
    content: 'Now then, take and prepare '
  - type: note
    content: '[2 Sam. 6:3]'
  - type: text
    content: 'a new cart and two milk cows '
  - type: note
    content: '[Num. 19:2]'
  - type: text
    content: 'on which there has never come a yoke, and yoke the cows to the cart, but take their calves home, away from them. '
  '8':
  - type: text
    content: 'And take the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and place it on the cart and put in a box at its side '
  - type: note
    content: ver. 4, 5
  - type: text
    content: 'the figures of gold, which you are returning to him as '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'a guilt offering. Then send it off and let it go its way '
  '9':
  - type: text
    content: 'and watch. If it goes up on the way to its own land, to '
  - type: note
    content: Josh. 15:10
  - type: text
    content: 'Beth-shemesh, then it is he who has done us this great harm, but if not, then we shall know that it is not '
  - type: note
    content: ver. 3
  - type: text
    content: his hand that struck us; it happened to us by coincidence.”
