        - type: text
          text: '18'
      marker-yv: yv-n
    - type: text
      text: 'A great stone was there. And they split up the wood of the cart and offered the cows as a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
