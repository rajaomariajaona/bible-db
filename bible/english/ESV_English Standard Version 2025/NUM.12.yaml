document_id: NUM.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Miriam and Aaron Oppose Moses
  - type: text
    content: 'Miriam and Aaron spoke against Moses because of the Cushite woman whom he had married, for he had married a Cushite woman. '
  '10':
  - type: text
    content: 'When the cloud removed from over the tent, behold, '
  - type: note
    content: Deut. 24:9
  - type: text
    content: 'Miriam was '
  - type: note
    content: See Lev. 13:10
  - type: text
    content: leprous,
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' like snow. And Aaron turned toward Miriam, and behold, she was leprous. '
  '11':
  - type: text
    content: 'And Aaron said to Moses, “Oh, my lord, '
  - type: note
    content: '[2 Sam. 19:19; 24:10; Prov. 30:32]'
  - type: text
    content: do not punish us
  - type: note
    content: Hebrew do not lay sin upon us
  - type: text
    content: ' because we have done foolishly and have sinned. '
  '12':
  - type: text
    content: 'Let her not be as one dead, whose flesh is half eaten away when he comes out of his mother’s womb.” '
  '13':
  - type: text
    content: 'And Moses cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O God, please heal her—please.” '
  '14':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “If her father had but '
  - type: note
    content: Deut. 25:9; Job 30:10
  - type: text
    content: 'spit in her face, should she not be shamed seven days? Let her be '
  - type: note
    content: See Lev. 13:46
  - type: text
    content: 'shut outside the camp seven days, and after that she may be brought in again.” '
  '15':
  - type: text
    content: 'So Miriam '
  - type: note
    content: '[2 Kgs. 15:5; 2 Chr. 26:20, 21; Luke 17:12]'
  - type: text
    content: 'was shut outside the camp seven days, and the people did not set out on the march till Miriam was brought in again. '
  '16':
  - type: text
    content: 'After that the people set out from '
  - type: note
    content: ch. 11:35; [ch. 33:18]
  - type: text
    content: 'Hazeroth, and camped in '
  - type: note
    content: See ch. 10:12
  - type: text
    content: the wilderness of Paran.
  '2':
  - type: text
    content: 'And they said, “Has the '
  - type: text
    content: Lord
  - type: text
    content: ' indeed spoken only through Moses? '
  - type: note
    content: Mic. 6:4
  - type: text
    content: 'Has he not spoken through us also?” And '
  - type: note
    content: ch. 11:1; 2 Kgs. 19:4; Isa. 37:4; Ezek. 35:12, 13; [Mal. 3:16]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' heard it. '
  '3':
  - type: text
    content: 'Now the man Moses was very meek, more than all people who were on the face of the earth. '
  '4':
  - type: text
    content: 'And suddenly the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and to Aaron and Miriam, “Come out, you three, to the tent of meeting.” And the three of them came out. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ch. 11:25; 16:19
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' came down in a pillar of cloud and stood at the entrance of the tent and called Aaron and Miriam, and they both came forward. '
  '6':
  - type: text
    content: 'And he said, “Hear my words: If there is a prophet among you, I the '
  - type: text
    content: Lord
  - type: text
    content: ' make myself known to him '
  - type: note
    content: Gen. 46:2; Ezek. 1:1; Dan. 8:2; 10:8, 16; Luke 1:11, 22; Acts 10:11; 22:17, 18
  - type: text
    content: 'in a vision; I speak with him '
  - type: note
    content: Gen. 20:6; 31:10, 11; 1 Kgs. 3:5; Job 33:15; Matt. 1:20; 27:19
  - type: text
    content: 'in a dream. '
  '7':
  - type: text
    content: 'Not so with '
  - type: note
    content: Ps. 105:26
  - type: text
    content: 'my servant Moses. '
  - type: note
    content: Heb. 3:2, 5
  - type: text
    content: 'He is faithful in all my house. '
  '8':
  - type: text
    content: 'With him I speak '
  - type: note
    content: ch. 7:89; [Ex. 33:11; Deut. 34:10; 1 Cor. 13:12]
  - type: text
    content: 'mouth to mouth, clearly, and not in '
  - type: note
    content: Ps. 49:4; 78:2; Prov. 1:6
  - type: text
    content: 'riddles, and he beholds '
  - type: note
    content: '[Ex. 33:20, 23]'
  - type: text
    content: 'the form of the '
  - type: text
    content: Lord
  - type: text
    content: '. Why then were you not afraid to speak against my servant Moses?” '
  '9':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against them, and he departed.'
