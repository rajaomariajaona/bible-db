document_id: EXO.38,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Making the Altar of Burnt Offering
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-7, see ch. 27:1-8
  - type: text
    content: He made the altar of burnt offering of acacia wood. Five cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' was its length, and five cubits its breadth. It was square, and three cubits was its height. '
  '10':
  - type: text
    content: 'their twenty pillars and their twenty bases were of bronze, but the hooks of the pillars and their fillets were of silver. '
  '11':
  - type: text
    content: 'And for the north side there were hangings of a hundred cubits; their twenty pillars and their twenty bases were of bronze, but the hooks of the pillars and their fillets were of silver. '
  '12':
  - type: text
    content: 'And for the west side were hangings of fifty cubits, their ten pillars, and their ten bases; the hooks of the pillars and their fillets were of silver. '
  '13':
  - type: text
    content: 'And for the front to the east, fifty cubits. '
  '14':
  - type: text
    content: 'The hangings for one side of the gate were fifteen cubits, with their three pillars and three bases. '
  '15':
  - type: text
    content: 'And so for the other side. On both sides of the gate of the court were hangings of fifteen cubits, with their three pillars and their three bases. '
  '16':
  - type: text
    content: 'All the hangings around the court were of fine twined linen. '
  '17':
  - type: text
    content: 'And the bases for the pillars were of bronze, but the hooks of the pillars and their fillets were of silver. The overlaying of their capitals was also of silver, and all the pillars of the court were filleted with silver. '
  '18':
  - type: text
    content: 'And the screen for the gate of the court was embroidered with needlework in blue and purple and scarlet yarns and fine twined linen. It was twenty cubits long and five cubits high in its breadth, corresponding to the hangings of the court. '
  '19':
  - type: text
    content: 'And their pillars were four in number. Their four bases were of bronze, their hooks of silver, and the overlaying of their capitals and their fillets of silver. '
  '2':
  - type: text
    content: 'He made horns for it on its four corners. Its horns were of one piece with it, and he overlaid it with bronze. '
  '20':
  - type: text
    content: And all the pegs for the tabernacle and for the court all around were of bronze.
  - type: heading
    content: Materials for the Tabernacle
  '21':
  - type: text
    content: 'These are the records of the tabernacle, '
  - type: note
    content: Num. 1:50, 53; 9:15; 10:11; 17:7, 8; 18:2; 2 Chr. 24:6; Acts 7:44; [ch. 16:34]
  - type: text
    content: 'the tabernacle of the testimony, as they were recorded at the commandment of Moses, the responsibility of the Levites '
  - type: note
    content: ch. 6:23; 28:1; Num. 4:28, 33
  - type: text
    content: 'under the direction of Ithamar the son of Aaron the priest. '
  '22':
  - type: note
    content: ch. 31:2, 6
  - type: text
    content: 'Bezalel the son of Uri, son of Hur, of the tribe of Judah, made all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses; '
  '23':
  - type: text
    content: 'and with him was '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: Oholiab the son of Ahisamach, of the tribe of Dan, an engraver and designer and embroiderer in blue and purple and scarlet yarns and fine twined linen.
  '24':
  - type: text
    content: All the gold that was used for the work, in all the construction of the sanctuary, the gold from the offering, was twenty-nine talents and 730 shekels,
  - type: note
    content: A talent was about 75 pounds or 34 kilograms; a shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' by '
  - type: note
    content: See ch. 30:13
  - type: text
    content: 'the shekel of the sanctuary. '
  '25':
  - type: text
    content: 'The silver from those of the congregation who were recorded was a hundred talents and 1,775 shekels, by the shekel of the sanctuary: '
  '26':
  - type: text
    content: 'a '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: beka
  - type: note
    content: A beka was about 1/5 ounce or 5.5 grams
  - type: text
    content: ' a head (that is, half a shekel, by the shekel of the sanctuary), for everyone who was listed in the records, from twenty years old and upward, for '
  - type: note
    content: Num. 1:46
  - type: text
    content: '603,550 men. '
  '27':
  - type: text
    content: 'The hundred talents of silver were for casting the '
  - type: note
    content: ch. 26:19, 21, 25, 32
  - type: text
    content: 'bases of the sanctuary and the bases of the veil; a hundred bases for the hundred talents, a talent a base. '
  '28':
  - type: text
    content: 'And of the 1,775 shekels he made hooks for the pillars and overlaid their capitals and made fillets for them. '
  '29':
  - type: text
    content: 'The bronze that was offered was seventy talents and 2,400 shekels; '
  '3':
  - type: text
    content: 'And he made all the utensils of the altar, the pots, the shovels, the basins, the forks, and the fire pans. He made all its utensils of bronze. '
  '30':
  - type: text
    content: 'with it he made the '
  - type: note
    content: ch. 26:37
  - type: text
    content: 'bases for the entrance of the tent of meeting, '
  - type: note
    content: ch. 27:2-4
  - type: text
    content: 'the bronze altar and the bronze grating for it and all the utensils of the altar, '
  '31':
  - type: text
    content: 'the '
  - type: note
    content: ch. 27:10-12
  - type: text
    content: 'bases around the court, and the '
  - type: note
    content: ch. 27:16, 17
  - type: text
    content: 'bases of the gate of the court, all the '
  - type: note
    content: ch. 27:19
  - type: text
    content: pegs of the tabernacle, and all the pegs around the court.
  '4':
  - type: text
    content: 'And he made for the altar a grating, a network of bronze, under its ledge, extending halfway down. '
  '5':
  - type: text
    content: 'He cast four rings on the four corners of the bronze grating as holders for the poles. '
  '6':
  - type: text
    content: 'He made the poles of acacia wood and overlaid them with bronze. '
  '7':
  - type: text
    content: And he put the poles through the rings on the sides of the altar to carry it with them. He made it hollow, with boards.
  - type: heading
    content: Making the Bronze Basin
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 30:18
  - type: text
    content: 'He made the basin of bronze and its stand of bronze, from the mirrors of the '
  - type: note
    content: 1 Sam. 2:22; [Num. 4:23; 8:24]
  - type: text
    content: ministering women who ministered in the entrance of the tent of meeting.
  - type: heading
    content: Making the Court
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-20, see ch. 27:9-19
  - type: text
    content: 'And he made the court. For the south side the hangings of the court were of fine twined linen, a hundred cubits; '
