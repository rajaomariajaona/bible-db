document_id: NUM.4,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Kohathites, Gershonites, and Merarites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall put it with all its utensils in a covering of goatskin and put it on the carrying frame. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And over '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 30:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'the golden altar they shall spread a cloth of blue and cover it with a covering of goatskin, and shall put in its poles. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall take all '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 9:28
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the vessels of the service that are used in the sanctuary and put them in a cloth of blue and cover them with a covering of goatskin and put them on the carrying frame. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall take away the ashes from the altar and spread a purple cloth over it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall put on it all the utensils of the altar, which are used for the service there, the fire pans, the forks, the shovels, and the basins, all the utensils of the altar; and they shall spread on it a covering of goatskin, and shall put in its poles. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Aaron and his sons have finished covering the sanctuary and all the furnishings of the sanctuary, as the camp sets out, after that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 31:9
      marker-yv: yv-n
    - type: text
      text: 'the sons of Kohath shall come to carry these, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 6:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 13:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: but they must not touch the holy things, lest they die. These are the things of the tent of meeting that the sons of Kohath are to carry.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And Eleazar the son of Aaron the priest shall have charge of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 24:2
      marker-yv: yv-n
    - type: text
      text: 'the oil for the light, the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:11
      marker-yv: yv-n
    - type: text
      text: 'fragrant incense, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 29:40
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '41'
      marker-yv: yv-n
    - type: text
      text: 'the regular grain offering, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 31:11
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 30:23-33
      marker-yv: yv-n
    - type: text
      text: the anointing oil, with the oversight of the whole tabernacle and all that is in it, of the sanctuary and its vessels.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Let not the tribe of the clans of the Kohathites be destroyed from among the Levites, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but deal thus with them, that they may live and not die when they come near to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'the most holy things: Aaron and his sons shall go in and appoint them each to his task and to his burden, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take a census of the sons of Kohath from among the sons of Levi, by their clans and their fathers’ houses, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 19:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 6:19
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: but they shall not go in to look on the holy things even for a moment, lest they die.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take a census of the sons of Gershon also, by their fathers’ houses and by their clans. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'From thirty years old up to fifty years old, you shall list them, all who can '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:24
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 38:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 2:22
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'come to do duty, to do service in the tent of meeting. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the service of the clans of the Gershonites, in serving and bearing burdens: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:25
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'they shall carry '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 26:1-6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:8-13
      marker-yv: yv-n
    - type: text
      text: 'the curtains of the tabernacle and the tent of meeting with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 36:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'its covering and the covering of goatskin that is on top of it and the screen for the entrance of the tent of meeting '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the hangings of the court and the screen for the entrance of the gate of the court that is around the tabernacle and the altar, and their cords and all the equipment for their service. And they shall do all that needs to be done with regard to them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the service of the sons of the Gershonites shall be at the command of Aaron and his sons, in all that they are to carry and in all that they have to do. And you shall assign to their charge all that they are to carry. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the service of the clans of the sons of the Gershonites in the tent of meeting, and their guard duty is to be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      marker-yv: yv-n
    - type: text
      text: under the direction of Ithamar the son of Aaron the priest.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As for the sons of Merari, you shall list them by their clans and their fathers’ houses. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23, 30, 35, 39, 43, 47
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 23:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'from thirty years old up to fifty years old, all who can come on duty, to do the work in the tent of meeting. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'From thirty years old up to fifty years old, you shall list them, everyone who can come on duty, to do the service of the tent of meeting. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:36
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      marker-yv: yv-n
    - type: text
      text: 'this is what they are charged to carry, as the whole of their service in the tent of meeting: the frames of the tabernacle, with its bars, pillars, and bases, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the pillars around the court with their bases, pegs, and cords, with all their equipment and all their accessories. And you shall '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 38:21
      marker-yv: yv-n
    - type: text
      text: 'list by name the objects that they are required to carry. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the service of the clans of the sons of Merari, the whole of their service in the tent of meeting, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      marker-yv: yv-n
    - type: text
      text: under the direction of Ithamar the son of Aaron the priest.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron and the chiefs of the congregation listed the sons of the Kohathites, by their clans and their fathers’ houses, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'from thirty years old up to fifty years old, everyone who could come on duty, for service in the tent of meeting; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and those listed by clans were 2,750. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'This was the list of the clans of the Kohathites, all who served in the tent of meeting, whom Moses and Aaron listed according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by Moses.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those listed of the sons of Gershon, by their clans and their fathers’ houses, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'from thirty years old up to fifty years old, everyone who could come on duty for service in the tent of meeting— '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the service of the sons of Kohath in the tent of meeting: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'the most holy things. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'those listed by their clans and their fathers’ houses were 2,630. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: 'This was the list of the clans of the sons of Gershon, all who served in the tent of meeting, whom Moses and Aaron listed according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those listed of the clans of the sons of Merari, by their clans and their fathers’ houses, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'from thirty years old up to fifty years old, everyone who could come on duty, for service in the tent of meeting— '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'those listed by clans were 3,200. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      marker-yv: yv-n
    - type: text
      text: 'This was the list of the clans of the sons of Merari, whom Moses and Aaron listed according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by Moses.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All those who were listed of the Levites, whom Moses and Aaron and the chiefs of Israel listed, by their clans and their fathers’ houses, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'from thirty years old up to fifty years old, everyone who could come to do the service of ministry and the service of bearing burdens in the tent of meeting, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'those listed were 8,580. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'According to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' through Moses they were listed, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15, 24, 31
      marker-yv: yv-n
    - type: text
      text: 'each one with his task of serving or carrying. Thus they were listed by him, '
    - type: usfm
      marker: x
