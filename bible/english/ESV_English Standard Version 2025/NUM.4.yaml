document_id: NUM.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Kohathites, Gershonites, and Merarites
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: 'And they shall put it with all its utensils in a covering of goatskin and put it on the carrying frame. '
  '11':
  - type: text
    content: 'And over '
  - type: note
    content: Ex. 30:1, 3
  - type: text
    content: 'the golden altar they shall spread a cloth of blue and cover it with a covering of goatskin, and shall put in its poles. '
  '12':
  - type: text
    content: 'And they shall take all '
  - type: note
    content: '[1 Chr. 9:28, 29]'
  - type: text
    content: 'the vessels of the service that are used in the sanctuary and put them in a cloth of blue and cover them with a covering of goatskin and put them on the carrying frame. '
  '13':
  - type: text
    content: 'And they shall take away the ashes from the altar and spread a purple cloth over it. '
  '14':
  - type: text
    content: 'And they shall put on it all the utensils of the altar, which are used for the service there, the fire pans, the forks, the shovels, and the basins, all the utensils of the altar; and they shall spread on it a covering of goatskin, and shall put in its poles. '
  '15':
  - type: text
    content: 'And when Aaron and his sons have finished covering the sanctuary and all the furnishings of the sanctuary, as the camp sets out, after that '
  - type: note
    content: ch. 7:9; 10:21; Deut. 31:9
  - type: text
    content: 'the sons of Kohath shall come to carry these, '
  - type: note
    content: 2 Sam. 6:6, 7; 1 Chr. 13:9, 10
  - type: text
    content: but they must not touch the holy things, lest they die. These are the things of the tent of meeting that the sons of Kohath are to carry.
  '16':
  - type: text
    content: '“And Eleazar the son of Aaron the priest shall have charge of '
  - type: note
    content: Ex. 25:6; 27:20; Lev. 24:2
  - type: text
    content: 'the oil for the light, the '
  - type: note
    content: Ex. 25:6; 31:11
  - type: text
    content: 'fragrant incense, '
  - type: note
    content: Ex. 29:40, 41
  - type: text
    content: 'the regular grain offering, and '
  - type: note
    content: Ex. 31:11; See Ex. 30:23-33
  - type: text
    content: the anointing oil, with the oversight of the whole tabernacle and all that is in it, of the sanctuary and its vessels.”
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '18':
  - type: text
    content: '“Let not the tribe of the clans of the Kohathites be destroyed from among the Levites, '
  '19':
  - type: text
    content: 'but deal thus with them, that they may live and not die when they come near to '
  - type: note
    content: ver. 4
  - type: text
    content: 'the most holy things: Aaron and his sons shall go in and appoint them each to his task and to his burden, '
  '2':
  - type: text
    content: '“Take a census of the sons of Kohath from among the sons of Levi, by their clans and their fathers’ houses, '
  '20':
  - type: note
    content: '[Ex. 19:21; 1 Sam. 6:19]'
  - type: text
    content: but they shall not go in to look on the holy things even for a moment, lest they die.”
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '22':
  - type: text
    content: '“Take a census of the sons of Gershon also, by their fathers’ houses and by their clans. '
  '23':
  - type: note
    content: ver. 3
  - type: text
    content: 'From thirty years old up to fifty years old, you shall list them, all who can '
  - type: note
    content: ch. 8:24; [Ex. 38:8; 1 Sam. 2:22]
  - type: text
    content: 'come to do duty, to do service in the tent of meeting. '
  '24':
  - type: text
    content: 'This is the service of the clans of the Gershonites, in serving and bearing burdens: '
  '25':
  - type: note
    content: '[ch. 3:25, 26]'
  - type: text
    content: 'they shall carry '
  - type: note
    content: See Ex. 26:1-6; 36:8-13
  - type: text
    content: 'the curtains of the tabernacle and the tent of meeting with '
  - type: note
    content: Ex. 36:14, 19
  - type: text
    content: 'its covering and the covering of goatskin that is on top of it and the screen for the entrance of the tent of meeting '
  '26':
  - type: text
    content: 'and the hangings of the court and the screen for the entrance of the gate of the court that is around the tabernacle and the altar, and their cords and all the equipment for their service. And they shall do all that needs to be done with regard to them. '
  '27':
  - type: text
    content: 'All the service of the sons of the Gershonites shall be at the command of Aaron and his sons, in all that they are to carry and in all that they have to do. And you shall assign to their charge all that they are to carry. '
  '28':
  - type: text
    content: 'This is the service of the clans of the sons of the Gershonites in the tent of meeting, and their guard duty is to be '
  - type: note
    content: ver. 33
  - type: text
    content: under the direction of Ithamar the son of Aaron the priest.
  '29':
  - type: text
    content: '“As for the sons of Merari, you shall list them by their clans and their fathers’ houses. '
  '3':
  - type: note
    content: ver. 23, 30, 35, 39, 43, 47; [ch. 8:24; 1 Chr. 23:3, 24, 27]
  - type: text
    content: 'from thirty years old up to fifty years old, all who can come on duty, to do the work in the tent of meeting. '
  '30':
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'From thirty years old up to fifty years old, you shall list them, everyone who can come on duty, to do the service of the tent of meeting. '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: ch. 3:36, 37
  - type: text
    content: 'this is what they are charged to carry, as the whole of their service in the tent of meeting: the frames of the tabernacle, with its bars, pillars, and bases, '
  '32':
  - type: text
    content: 'and the pillars around the court with their bases, pegs, and cords, with all their equipment and all their accessories. And you shall '
  - type: note
    content: Ex. 38:21
  - type: text
    content: 'list by name the objects that they are required to carry. '
  '33':
  - type: text
    content: 'This is the service of the clans of the sons of Merari, the whole of their service in the tent of meeting, '
  - type: note
    content: ver. 28
  - type: text
    content: under the direction of Ithamar the son of Aaron the priest.”
  '34':
  - type: text
    content: 'And Moses and Aaron and the chiefs of the congregation listed the sons of the Kohathites, by their clans and their fathers’ houses, '
  '35':
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'from thirty years old up to fifty years old, everyone who could come on duty, for service in the tent of meeting; '
  '36':
  - type: text
    content: 'and those listed by clans were 2,750. '
  '37':
  - type: note
    content: ver. 2
  - type: text
    content: 'This was the list of the clans of the Kohathites, all who served in the tent of meeting, whom Moses and Aaron listed according to the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ' by Moses.'
  '38':
  - type: text
    content: 'Those listed of the sons of Gershon, by their clans and their fathers’ houses, '
  '39':
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'from thirty years old up to fifty years old, everyone who could come on duty for service in the tent of meeting— '
  '4':
  - type: text
    content: 'This is the service of the sons of Kohath in the tent of meeting: '
  - type: note
    content: ver. 19
  - type: text
    content: 'the most holy things. '
  '40':
  - type: text
    content: 'those listed by their clans and their fathers’ houses were 2,630. '
  '41':
  - type: note
    content: ver. 22
  - type: text
    content: 'This was the list of the clans of the sons of Gershon, all who served in the tent of meeting, whom Moses and Aaron listed according to the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '42':
  - type: text
    content: 'Those listed of the clans of the sons of Merari, by their clans and their fathers’ houses, '
  '43':
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'from thirty years old up to fifty years old, everyone who could come on duty, for service in the tent of meeting— '
  '44':
  - type: text
    content: 'those listed by clans were 3,200. '
  '45':
  - type: note
    content: ver. 29
  - type: text
    content: 'This was the list of the clans of the sons of Merari, whom Moses and Aaron listed according to the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ' by Moses.'
  '46':
  - type: text
    content: 'All those who were listed of the Levites, whom Moses and Aaron and the chiefs of Israel listed, by their clans and their fathers’ houses, '
  '47':
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'from thirty years old up to fifty years old, everyone who could come to do the service of ministry and the service of bearing burdens in the tent of meeting, '
  '48':
  - type: text
    content: 'those listed were 8,580. '
  '49':
  - type: text
    content: 'According to the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ' through Moses they were listed, '
  - type: note
    content: ver. 15, 24, 31
  - type: text
    content: 'each one with his task of serving or carrying. Thus they were listed by him, '
  - type: note
    content: ver. 1, 21, 29
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '5':
  - type: text
    content: 'When the camp is to set out, Aaron and his sons shall go in and take down '
  - type: note
    content: See Ex. 26:31
  - type: text
    content: 'the veil of the screen and cover '
  - type: note
    content: Ex. 25:10, 16
  - type: text
    content: 'the ark of the testimony with it. '
  '6':
  - type: text
    content: Then they shall put on it a covering of goatskin
  - type: note
    content: The meaning of the Hebrew word is uncertain; compare Exodus 25:5
  - type: text
    content: ' and spread on top of that a cloth all of blue, and shall put in its '
  - type: note
    content: Ex. 25:13
  - type: text
    content: 'poles. '
  '7':
  - type: text
    content: 'And over the '
  - type: note
    content: Ex. 25:23, 29, 30; 37:16; Lev. 24:6, 8
  - type: text
    content: 'table of the bread of the Presence they shall spread a cloth of blue and put on it the plates, the dishes for incense, the bowls, and the flagons for the drink offering; '
  - type: note
    content: 2 Chr. 2:4
  - type: text
    content: 'the regular showbread also shall be on it. '
  '8':
  - type: text
    content: 'Then they shall spread over them a cloth of scarlet and cover the same with a covering of goatskin, and shall '
  - type: note
    content: '[Ex. 25:15, 28]'
  - type: text
    content: 'put in its poles. '
  '9':
  - type: text
    content: 'And they shall take a cloth of blue and cover '
  - type: note
    content: See Ex. 25:31-39
  - type: text
    content: 'the lampstand for the light, with its lamps, its tongs, its trays, and all the vessels for oil with which it is supplied. '
