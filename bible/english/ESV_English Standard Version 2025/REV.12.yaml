document_id: REV.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Woman and the Dragon
  - type: text
    content: 'And a great sign appeared in heaven: a woman '
  - type: note
    content: '[Ps. 104:2]'
  - type: text
    content: 'clothed with '
  - type: note
    content: '[Song 6:10]'
  - type: text
    content: 'the sun, with '
  - type: note
    content: '[Song 6:10]'
  - type: text
    content: 'the moon under her feet, and on her head a crown of twelve stars. '
  '10':
  - type: text
    content: 'And I heard a loud voice in heaven, saying, “Now '
  - type: note
    content: ch. 7:10; 19:1
  - type: text
    content: the salvation and the power and the kingdom of our God and the authority of his Christ have come, for the accuser of our brothers
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' has been thrown down, '
  - type: note
    content: Job 1:9; 2:5; Zech. 3:1
  - type: text
    content: 'who accuses them day and night before our God. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ch. 15:2; [Rom. 16:20]; See John 16:33
  - type: text
    content: 'they have conquered him by the blood of the Lamb and by the word of their testimony, for '
  - type: note
    content: Luke 14:26; John 12:25
  - type: text
    content: 'they loved not their lives '
  - type: note
    content: ch. 2:10
  - type: text
    content: 'even unto death. '
  '12':
  - type: text
    content: 'Therefore, '
  - type: note
    content: ch. 18:20; Ps. 96:11; Isa. 44:23; 49:13
  - type: text
    content: 'rejoice, O heavens and you who dwell in them! But '
  - type: note
    content: ch. 8:13
  - type: text
    content: 'woe to you, O earth and sea, for the devil has come down to you in great wrath, because '
  - type: note
    content: '[Matt. 8:29]; See ch. 10:6'
  - type: text
    content: he knows that his time is short!”
  '13':
  - type: text
    content: 'And when the dragon saw that he had been thrown down to the earth, he pursued '
  - type: note
    content: ver. 5
  - type: text
    content: 'the woman who had given birth to the male child. '
  '14':
  - type: text
    content: 'But the woman was given the two '
  - type: note
    content: See Ex. 19:4
  - type: text
    content: 'wings of the great eagle so that she might fly from the serpent '
  - type: note
    content: ver. 6
  - type: text
    content: 'into the wilderness, to the place where she is to be nourished '
  - type: note
    content: Dan. 7:25; 12:7; See ver. 6
  - type: text
    content: 'for a time, and times, and half a time. '
  '15':
  - type: text
    content: 'The serpent poured water '
  - type: note
    content: '[Isa. 59:19]'
  - type: text
    content: 'like a river out of his mouth after the woman, to sweep her away with a flood. '
  '16':
  - type: text
    content: 'But the earth came to the help of the woman, and the earth opened its mouth and swallowed the river that the dragon had poured from his mouth. '
  '17':
  - type: text
    content: 'Then the dragon became furious with the woman and went off '
  - type: note
    content: ch. 11:7; 13:7
  - type: text
    content: 'to make war on the rest of '
  - type: note
    content: Gen. 3:15
  - type: text
    content: 'her offspring, '
  - type: note
    content: ch. 14:12; See 1 John 2:3
  - type: text
    content: 'on those who keep the commandments of God and hold to '
  - type: note
    content: ch. 1:2; 6:9; 19:10
  - type: text
    content: the testimony of Jesus. And he stood
  - type: note
    content: Some manuscripts And I stood, connecting the sentence with 13:1
  - type: text
    content: ' on the sand of the sea.'
  '2':
  - type: text
    content: 'She was pregnant and '
  - type: note
    content: '[Isa. 66:7-10; Mic. 4:10]'
  - type: text
    content: 'was crying out in birth pains and the agony of giving birth. '
  '3':
  - type: text
    content: 'And another sign appeared in heaven: behold, a great '
  - type: note
    content: '[ch. 17:3; Isa. 27:1]'
  - type: text
    content: 'red dragon, '
  - type: note
    content: ch. 13:1; 17:9, 12
  - type: text
    content: 'with seven heads and '
  - type: note
    content: Dan. 7:7
  - type: text
    content: 'ten horns, and on his heads '
  - type: note
    content: '[ch. 19:12]'
  - type: text
    content: 'seven diadems. '
  '4':
  - type: text
    content: 'His tail swept down '
  - type: note
    content: See ch. 8:7
  - type: text
    content: 'a third of the stars of heaven and '
  - type: note
    content: Dan. 8:10
  - type: text
    content: 'cast them to the earth. And the dragon stood before the woman who was about to give birth, so that when she bore her child '
  - type: note
    content: '[Matt. 2:16]'
  - type: text
    content: 'he might devour it. '
  '5':
  - type: text
    content: 'She gave birth to a male child, '
  - type: note
    content: Matt. 2:6; See ch. 2:27
  - type: text
    content: one who is to rule
  - type: note
    content: Greek shepherd
  - type: text
    content: ' all the nations with a rod of iron, but her child was '
  - type: note
    content: See 2 Cor. 12:2
  - type: text
    content: 'caught up to God and to his throne, '
  '6':
  - type: text
    content: 'and the woman fled into the wilderness, where she has a place prepared by God, in which she is to be nourished for '
  - type: note
    content: ch. 11:2; 13:5
  - type: text
    content: 1,260 days.
  - type: heading
    content: Satan Thrown Down to Earth
  '7':
  - type: text
    content: 'Now war arose in heaven, '
  - type: note
    content: See Jude 9
  - type: text
    content: 'Michael and '
  - type: note
    content: See Matt. 25:41
  - type: text
    content: 'his angels fighting against the dragon. And the dragon and his angels fought back, '
  '8':
  - type: text
    content: 'but he was defeated, and there was no longer any place for them in heaven. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: Luke 10:18; John 12:31
  - type: text
    content: 'the great dragon was thrown down, '
  - type: note
    content: ch. 20:2; Gen. 3:1
  - type: text
    content: 'that ancient serpent, who is called the devil and Satan, '
  - type: note
    content: ch. 20:3, 10; [ch. 13:14; John 8:44]
  - type: text
    content: the deceiver of the whole world—
  - type: note
    content: See ch. 9:1
  - type: text
    content: 'he was thrown down to the earth, and his angels were thrown down with him. '
