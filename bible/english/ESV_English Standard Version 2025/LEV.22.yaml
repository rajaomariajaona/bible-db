document_id: LEV.22,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:9; [ 1 Sam. 21:6; Matt. 12:4; Mark 2:26; Luke 6:4 ]
  - type: text
    content: '“A lay person shall not eat of a holy thing; no foreign guest of the priest or hired worker shall eat of a holy thing, '
  '11':
  - type: text
    content: but if a priest buys a slave
  - type: note
    content: Or servant; twice in this verse
  - type: text
    content: ' as his property for money, the slave'
  - type: note
    content: Hebrew he
  - type: text
    content: ' may eat of it, and '
  - type: note
    content: Num. 18:11, 13
  - type: text
    content: 'anyone born in his house may eat of his food. '
  '12':
  - type: text
    content: 'If a priest’s daughter marries a layman, she shall not eat of the contribution of the holy things. '
  '13':
  - type: text
    content: 'But if a priest’s daughter is widowed or divorced and has no child and '
  - type: note
    content: '[Gen. 38:11; Ruth 1:8]'
  - type: text
    content: 'returns to her father’s house, '
  - type: note
    content: ch. 10:14; Num. 18:11, 19
  - type: text
    content: 'as in her youth, she may eat of her father’s food; yet no lay person shall eat of it. '
  '14':
  - type: note
    content: ch. 4:2; 5:15, 16, 18
  - type: text
    content: 'And if anyone eats of a holy thing unintentionally, he shall add '
  - type: note
    content: ch. 27:13, 15, 19
  - type: text
    content: 'the fifth of its value to it and give the holy thing to the priest. '
  '15':
  - type: text
    content: 'They '
  - type: note
    content: ch. 19:8; Num. 18:32
  - type: text
    content: 'shall not profane the holy things of the people of Israel, which they contribute to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '16':
  - type: text
    content: 'and so cause them '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'to bear iniquity and guilt, by eating their holy things: '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies them.”'
  - type: heading
    content: Acceptable Offerings
  '17':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '18':
  - type: text
    content: '“Speak to Aaron and his sons and all the people of Israel and say to them, '
  - type: note
    content: ch. 1:2, 3, 10; Num. 15:14
  - type: text
    content: 'When any one of the house of Israel or of the sojourners in Israel presents a burnt offering as his offering, for any of their vows or freewill offerings that they offer to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '19':
  - type: text
    content: 'if it is to be accepted for you it shall be a '
  - type: note
    content: ch. 1:3, 10
  - type: text
    content: 'male without blemish, of the bulls or the sheep or the goats. '
  '2':
  - type: text
    content: '“Speak to Aaron and his sons so that they '
  - type: note
    content: '[Num. 6:3]'
  - type: text
    content: 'abstain from the holy things of the people of Israel, which they '
  - type: note
    content: ver. 3; Ex. 28:38; Deut. 15:19
  - type: text
    content: 'dedicate to me, so that they do not '
  - type: note
    content: '[Num. 18:32]; See ch. 18:21'
  - type: text
    content: 'profane my holy name: I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: note
    content: Deut. 15:21; 17:1; Mal. 1:8, 14; [Heb. 9:14; 1 Pet. 1:19]
  - type: text
    content: 'You shall not offer anything that has a blemish, for it will not be acceptable for you. '
  '21':
  - type: text
    content: 'And when anyone '
  - type: note
    content: ch. 3:1, 6
  - type: text
    content: 'offers a sacrifice of peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 7:16; Num. 15:3, 8; Deut. 23:21, 23; Ps. 61:8; 65:1; Eccles. 5:4, 5
  - type: text
    content: 'to fulfill a vow or as a freewill offering from the herd or from the flock, to be accepted it must be perfect; there shall be no blemish in it. '
  '22':
  - type: text
    content: 'Animals '
  - type: note
    content: ver. 20; ch. 21:18; Mal. 1:8
  - type: text
    content: 'blind or disabled or mutilated or having a discharge or '
  - type: note
    content: ch. 21:20
  - type: text
    content: 'an itch or scabs you shall not offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' or give them to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a food '
  - type: note
    content: ch. 1:9, 13; 3:3, 5
  - type: text
    content: 'offering on the altar. '
  '23':
  - type: text
    content: 'You may present a bull or a lamb that has a part '
  - type: note
    content: ch. 21:18
  - type: text
    content: 'too long or too short for a freewill offering, but for a vow offering it cannot be accepted. '
  '24':
  - type: text
    content: 'Any animal that has its testicles bruised or crushed or torn or cut you shall not offer to the '
  - type: text
    content: Lord
  - type: text
    content: '; you shall not do it within your land, '
  '25':
  - type: text
    content: 'neither shall you offer as '
  - type: note
    content: See ch. 3:11
  - type: text
    content: 'the bread of your God any such animals gotten from a foreigner. Since there is a '
  - type: note
    content: Mal. 1:14
  - type: text
    content: blemish in them, because of their mutilation, they will not be accepted for you.”
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '27':
  - type: note
    content: Ex. 22:30
  - type: text
    content: '“When an ox or sheep or goat is born, it shall remain seven days with its mother, and from the eighth day on it shall be acceptable as a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'But you shall not kill an ox or a sheep '
  - type: note
    content: '[Deut. 22:6]'
  - type: text
    content: 'and her young in one day. '
  '29':
  - type: text
    content: 'And when you sacrifice a '
  - type: note
    content: ch. 7:12; Ps. 107:22; 116:17; Amos 4:5
  - type: text
    content: 'sacrifice of thanksgiving to the '
  - type: text
    content: Lord
  - type: text
    content: ', you shall sacrifice it so that you may be accepted. '
  '3':
  - type: text
    content: 'Say to them, ‘If any one of all your offspring throughout your generations approaches the holy things that the people of Israel dedicate to the '
  - type: text
    content: Lord
  - type: text
    content: ', while '
  - type: note
    content: ch. 7:20
  - type: text
    content: 'he has an uncleanness, that person shall be cut off from my presence: I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'It shall be eaten on the same day; '
  - type: note
    content: ch. 7:15
  - type: text
    content: 'you shall leave none of it until morning: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:37; Num. 15:40; Deut. 4:40
  - type: text
    content: '“So you shall keep my commandments and do them: I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: note
    content: See ch. 18:21
  - type: text
    content: 'And you shall not profane my holy name, that '
  - type: note
    content: ch. 10:3
  - type: text
    content: 'I may be sanctified among the people of Israel. '
  - type: note
    content: See ch. 20:8
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies you, '
  '33':
  - type: text
    content: 'who brought you out of the land of Egypt '
  - type: note
    content: See Ex. 6:7
  - type: text
    content: 'to be your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'None of the offspring of Aaron who has a leprous disease or a '
  - type: note
    content: ch. 15:2
  - type: text
    content: 'discharge may eat of the holy things '
  - type: note
    content: ch. 14:2; 15:13
  - type: text
    content: 'until he is clean. '
  - type: note
    content: Num. 19:11
  - type: text
    content: 'Whoever touches anything that is unclean through contact with the dead or '
  - type: note
    content: ch. 15:16
  - type: text
    content: 'a man who has had an emission of semen, '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: ch. 11:24, 43, 44
  - type: text
    content: 'whoever touches a swarming thing by which he may be made unclean or '
  - type: note
    content: ch. 15:7, 19
  - type: text
    content: 'a person from whom he may take uncleanness, whatever his uncleanness may be— '
  '6':
  - type: text
    content: 'the person who touches such a thing shall be unclean until the evening and shall not eat of the holy things unless he has '
  - type: note
    content: '[Heb. 10:22]; See ch. 15:5-11'
  - type: text
    content: 'bathed his body in water. '
  '7':
  - type: text
    content: 'When the sun goes down he shall be clean, and afterward he may eat of the holy things, because '
  - type: note
    content: ch. 21:22; [Num. 18:11, 13]; See ch. 3:11
  - type: text
    content: 'they are his food. '
  '8':
  - type: note
    content: See ch. 7:24
  - type: text
    content: 'He shall not eat what dies of itself or is torn by beasts, and so make himself unclean by it: I am the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '9':
  - type: text
    content: 'They shall therefore keep my charge, '
  - type: note
    content: '[Ex. 28:43]; See ch. 19:17'
  - type: text
    content: 'lest they bear sin for it and die thereby when they profane it: '
  - type: note
    content: ch. 21:8, 15, 23
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies them.'
