document_id: GEN.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Rescues Lot
  - type: text
    content: 'In the days of Amraphel king of '
  - type: note
    content: ch. 10:10; 11:2
  - type: text
    content: 'Shinar, Arioch king of Ellasar, Chedorlaomer king of '
  - type: note
    content: ch. 10:22; Isa. 11:11; Acts 2:9
  - type: text
    content: 'Elam, and Tidal king of Goiim, '
  '10':
  - type: text
    content: 'Now the Valley of Siddim was full of '
  - type: note
    content: ch. 11:3; Ex. 2:3
  - type: text
    content: 'bitumen pits, and as the kings of Sodom and Gomorrah fled, some fell into them, and the rest fled '
  - type: note
    content: ch. 19:17, 30
  - type: text
    content: 'to the hill country. '
  '11':
  - type: text
    content: 'So the enemy took '
  - type: note
    content: ver. 16, 21
  - type: text
    content: 'all the possessions of Sodom and Gomorrah, and all their provisions, and went their way. '
  '12':
  - type: text
    content: 'They also took Lot, '
  - type: note
    content: ch. 12:5
  - type: text
    content: 'the son of Abram’s brother, '
  - type: note
    content: ch. 13:12
  - type: text
    content: who was dwelling in Sodom, and his possessions, and went their way.
  '13':
  - type: text
    content: 'Then one who had escaped came and told Abram the Hebrew, '
  - type: note
    content: ch. 13:18
  - type: text
    content: 'who was living by the '
  - type: note
    content: ch. 12:6
  - type: text
    content: oaks
  - type: note
    content: Or terebinths
  - type: text
    content: ' of Mamre the Amorite, brother of Eshcol and of Aner. These were allies of Abram. '
  '14':
  - type: text
    content: 'When Abram heard that his kinsman had been taken captive, he led forth his trained men, '
  - type: note
    content: ch. 15:3; 17:12, 13, 23, 27; Eccles. 2:7
  - type: text
    content: 'born in his house, 318 of them, and went in pursuit as far as '
  - type: note
    content: Judg. 18:29
  - type: text
    content: 'Dan. '
  '15':
  - type: text
    content: 'And he divided his forces against them by night, he and his servants, and defeated them and pursued them to Hobah, north of Damascus. '
  '16':
  - type: text
    content: 'Then he brought back all the possessions, and also brought back his kinsman Lot '
  - type: note
    content: ver. 11, 12
  - type: text
    content: with his possessions, and the women and the people.
  - type: heading
    content: Abram Blessed by Melchizedek
  '17':
  - type: text
    content: 'After his return from the defeat of Chedorlaomer and the kings who were with him, the king of Sodom went out to meet him at the Valley of Shaveh (that is, the '
  - type: note
    content: 2 Sam. 18:18
  - type: text
    content: 'King’s Valley). '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Heb. 7:1
  - type: text
    content: 'Melchizedek king of Salem brought out bread and wine. (He was '
  - type: note
    content: Ps. 110:4; Heb. 5:6, 10; 7:1, 11, 17
  - type: text
    content: 'priest of '
  - type: note
    content: Ps. 57:2; Acts 16:17
  - type: text
    content: 'God Most High.) '
  '19':
  - type: text
    content: And he blessed him and said,
  - type: note
    content: Heb. 7:6, 7
  - type: text
    content: “Blessed be Abram by God Most High,
  - type: note
    content: Matt. 11:25
  - type: text
    content: Possessor
  - type: note
    content: Or Creator; also verse 22
  - type: text
    content: ' of heaven and earth;'
  '2':
  - type: text
    content: 'these kings made war with '
  - type: note
    content: ver. 8; ch. 13:10; 19:22
  - type: text
    content: 'Bera king of Sodom, Birsha king of Gomorrah, Shinab king of '
  - type: note
    content: Deut. 29:23
  - type: text
    content: 'Admah, Shemeber king of '
  - type: note
    content: Deut. 29:23
  - type: text
    content: 'Zeboiim, and the king of Bela (that is, Zoar). '
  '20':
  - type: text
    content: and blessed be God Most High,
  - type: text
    content: who has delivered your enemies into your hand!”
  - type: text
    content: 'And Abram gave him '
  - type: note
    content: Heb. 7:4; [ch. 28:22]
  - type: text
    content: 'a tenth of everything. '
  '21':
  - type: text
    content: 'And the king of Sodom said to Abram, “Give me the persons, but take the goods for yourself.” '
  '22':
  - type: text
    content: 'But Abram said to the king of Sodom, '
  - type: note
    content: Ex. 6:8; Num. 14:30; Deut. 32:40; Ezek. 20:5, 6, 15, 23, 28; Dan. 12:7; Rev. 10:5, 6
  - type: text
    content: “I have lifted my hand
  - type: note
    content: Or I have taken a solemn oath
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: ', God Most High, Possessor of heaven and earth, '
  '23':
  - type: text
    content: 'that '
  - type: note
    content: '[Esth. 9:15, 16]'
  - type: text
    content: 'I would not take a thread or a sandal strap or anything that is yours, lest you should say, ‘I have made Abram rich.’ '
  '24':
  - type: text
    content: 'I will take nothing but what the young men have eaten, and the share of the men who went with me. Let '
  - type: note
    content: ver. 13
  - type: text
    content: Aner, Eshcol, and Mamre take their share.”
  '3':
  - type: text
    content: And all these joined forces in the Valley of Siddim (
  - type: note
    content: Num. 34:12; Deut. 3:17; Josh. 3:16
  - type: text
    content: 'that is, the Salt Sea). '
  '4':
  - type: text
    content: 'Twelve years they had served Chedorlaomer, but in the thirteenth year they rebelled. '
  '5':
  - type: text
    content: 'In the fourteenth year Chedorlaomer and the kings who were with him came and defeated the '
  - type: note
    content: ch. 15:20; Deut. 2:11; 3:11
  - type: text
    content: 'Rephaim in '
  - type: note
    content: Deut. 1:4
  - type: text
    content: 'Ashteroth-karnaim, the '
  - type: note
    content: '[Deut. 2:20]'
  - type: text
    content: 'Zuzim in Ham, the '
  - type: note
    content: Deut. 2:10, 11
  - type: text
    content: 'Emim in Shaveh-kiriathaim, '
  '6':
  - type: text
    content: 'and the '
  - type: note
    content: Deut. 2:12, 22
  - type: text
    content: 'Horites in their hill country of Seir as far as '
  - type: note
    content: '[ch. 21:21; Num. 12:16; 13:3]'
  - type: text
    content: 'El-paran on the border of the wilderness. '
  '7':
  - type: text
    content: 'Then they turned back and came to En-mishpat (that is, '
  - type: note
    content: ch. 16:14; 20:1; Num. 13:26
  - type: text
    content: 'Kadesh) and defeated all the country of the Amalekites, and also the Amorites who were dwelling '
  - type: note
    content: 2 Chr. 20:2
  - type: text
    content: in Hazazon-tamar.
  '8':
  - type: text
    content: 'Then the king of Sodom, the king of Gomorrah, the king of Admah, the king of Zeboiim, and the king of Bela (that is, Zoar) went out, and they joined battle in the Valley of Siddim '
  '9':
  - type: text
    content: 'with Chedorlaomer king of Elam, Tidal king of Goiim, Amraphel king of Shinar, and Arioch king of Ellasar, four kings against five. '
