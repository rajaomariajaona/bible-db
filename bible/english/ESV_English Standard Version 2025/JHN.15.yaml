document_id: JHN.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: I Am the True Vine
  - type: text
    content: ' '
  - type: text
    content: '“I am the '
  - type: note
    content: '[ Jer. 2:21 ]'
  - type: text
    content: 'true vine, and my Father is '
  - type: note
    content: '[ 1 Cor. 3:9 ]'
  - type: text
    content: the vinedresser.
  - type: text
    content: ' '
  '10':
  - type: note
    content: '[ch. 14:15, 23]'
  - type: text
    content: 'If you keep my commandments, you will abide in my love, just as '
  - type: note
    content: ch. 8:55; 17:4; Phil. 2:8
  - type: text
    content: 'I have kept '
  - type: note
    content: See ch. 10:18
  - type: text
    content: my Father’s commandments and abide in his love.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'These things I have spoken to you, '
  - type: note
    content: '[2 Cor. 2:3]'
  - type: text
    content: 'that my joy may be in you, and that '
  - type: note
    content: ch. 3:29; 16:24; 17:13; 1 John 1:4; 2 John 12
  - type: text
    content: your joy may be full.
  '12':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:34
  - type: text
    content: “This is my commandment, that you love one another as I have loved you.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Rom. 5:7, 8; Eph. 5:2
  - type: text
    content: 'Greater love has no one than this, '
  - type: note
    content: See ch. 10:11
  - type: text
    content: that someone lay down his life for his friends.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'You are '
  - type: note
    content: Luke 12:4
  - type: text
    content: 'my friends '
  - type: note
    content: '[ver. 10; Matt. 12:50]'
  - type: text
    content: if you do what I command you.
  - type: text
    content: ' '
  '15':
  - type: note
    content: '[ver. 20]'
  - type: text
    content: No longer do I call you servants,
  - type: note
    content: Or bondservants, or slaves (for the contextual rendering of the Greek word doulos, see Preface); likewise for servant later in this verse and in verse 20
  - type: text
    content: ' '
  - type: text
    content: 'for the servant '
  - type: note
    content: '[ch. 13:7, 12]'
  - type: text
    content: 'does not know what his master is doing; but I have called you friends, for '
  - type: note
    content: ch. 3:32; 8:26, 40; [ch. 16:13]
  - type: text
    content: 'all that I have heard from my Father '
  - type: note
    content: ch. 17:26; [Gen. 18:17; 1 Cor. 2:16; 13:9, 10]
  - type: text
    content: I have made known to you.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'You did not choose me, but '
  - type: note
    content: See ch. 13:18
  - type: text
    content: 'I chose you and appointed you that you should go and '
  - type: note
    content: '[2 John 8]'
  - type: text
    content: 'bear fruit and that your fruit should abide, so that '
  - type: note
    content: '[ver. 7]; See ch. 14:13'
  - type: text
    content: whatever you ask the Father in my name, he may give it to you.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'These things I command you, '
  - type: note
    content: ver. 12
  - type: text
    content: so that you will love one another.
  - type: heading
    content: The Hatred of the World
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:7; 1 John 3:13; [ver. 23, 24 ]
  - type: text
    content: “If the world hates you, know that it has hated me before it hated you.
  - type: text
    content: ' '
  '19':
  - type: note
    content: '[1 John 4:5]'
  - type: text
    content: 'If you were of the world, the world would love you as its own; but because '
  - type: note
    content: ch. 17:14, 16; [Luke 6:26; Gal. 1:4; James 4:4]
  - type: text
    content: you are not of the world, but I chose you out of the world, therefore the world hates you.
  - type: text
    content: ' '
  '2':
  - type: note
    content: ver. 6; Matt. 3:10; 7:19; [Rom. 11:17; 2 Pet. 1:8]
  - type: text
    content: 'Every branch in me that does not bear fruit '
  - type: note
    content: '[Matt. 15:13; Rom. 11:22]'
  - type: text
    content: 'he takes away, and every branch that does bear fruit he prunes, '
  - type: note
    content: '[Matt. 13:12]'
  - type: text
    content: that it may bear more fruit.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Remember the word that I said to you: '
  - type: note
    content: ch. 13:16; Matt. 10:24; [ver. 15]
  - type: text
    content: '‘A servant is not greater than his master.’ If they persecuted me, '
  - type: note
    content: ch. 16:33; 1 Cor. 4:12; 2 Cor. 4:9; 1 Thess. 2:15; 2 Tim. 3:12
  - type: text
    content: 'they will also persecute you. '
  - type: note
    content: '[Ezek. 3:7]; See ch. 8:51'
  - type: text
    content: If they kept my word, they will also keep yours.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'But '
  - type: note
    content: ch. 16:3
  - type: text
    content: 'all these things they will do to you '
  - type: note
    content: Matt. 10:22; 24:9; Rev. 2:3; [Acts 5:41; 1 Pet. 4:14, 16]
  - type: text
    content: 'on account of my name, '
  - type: note
    content: See Acts 3:17
  - type: text
    content: because they do not know him who sent me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'If I had not come and spoken to them, '
  - type: note
    content: '[Matt. 11:22, 24; Luke 12:47, 48]; See ch. 9:41'
  - type: text
    content: they would not have been guilty of sin,
  - type: note
    content: Greek they would not have sin; also verse 24
  - type: text
    content: ' '
  - type: text
    content: but now they have no excuse for their sin.
  - type: text
    content: ' '
  '23':
  - type: note
    content: See ch. 5:23
  - type: text
    content: Whoever hates me hates my Father also.
  - type: text
    content: ' '
  '24':
  - type: note
    content: ch. 3:2; 7:31; 9:32; Matt. 9:33; [ch. 10:32, 37]
  - type: text
    content: 'If I had not done among them the works that no one else did, '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'they would not be guilty of sin, but now they have '
  - type: note
    content: See ch. 14:9
  - type: text
    content: seen and hated both me and my Father.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 10:34; 12:38
  - type: text
    content: 'the word that is written in their Law must be fulfilled: '
  - type: note
    content: Cited from Ps. 35:19 or 69:4
  - type: text
    content: ‘They hated me without a cause.’
  '26':
  - type: text
    content: ' '
  - type: text
    content: '“But '
  - type: note
    content: See ch. 14:16, 17, 26
  - type: text
    content: 'when the Helper comes, whom I will send to you from the Father, the Spirit of truth, who proceeds from the Father, '
  - type: note
    content: 1 Cor. 12:3; 1 John 5:7
  - type: text
    content: he will bear witness about me.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: ch. 19:35; 21:24; 1 John 1:2; 4:14; [3 John 12]; See Luke 24:48
  - type: text
    content: 'you also will bear witness, '
  - type: note
    content: See Acts 4:20
  - type: text
    content: 'because you have been with me '
  - type: note
    content: '[Luke 1:2; Acts 1:21, 22; 1 John 2:7]'
  - type: text
    content: from the beginning.
  '3':
  - type: text
    content: 'Already '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'you are clean '
  - type: note
    content: ch. 17:17; [ver. 7; Eph. 5:26]
  - type: text
    content: because of the word that I have spoken to you.
  - type: text
    content: ' '
  '4':
  - type: note
    content: ver. 5-7; 1 John 2:6; [Phil. 1:11; Col. 1:23]; See ch. 6:56
  - type: text
    content: 'Abide '
  - type: note
    content: See ch. 3:15
  - type: text
    content: in me, and I in you. As the branch cannot bear fruit by itself, unless it abides in the vine, neither can you, unless you abide in me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'I am the vine; '
  - type: note
    content: Rom. 6:5
  - type: text
    content: 'you are the branches. Whoever abides in me and I in him, he it is that '
  - type: note
    content: ver. 16; Col. 1:6, 10
  - type: text
    content: bears much fruit, for apart from me you can do nothing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'If anyone does not abide in me, '
  - type: note
    content: See ver. 2
  - type: text
    content: 'he is thrown away like a branch and withers; '
  - type: note
    content: Matt. 13:40-42; [Ezek. 15:4]
  - type: text
    content: and the branches are gathered, thrown into the fire, and burned.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'If '
  - type: note
    content: See ch. 8:31
  - type: text
    content: 'you abide in me, and my words abide in you, '
  - type: note
    content: See ch. 14:13
  - type: text
    content: ask whatever you wish, and it will be done for you.
  - type: text
    content: ' '
  '8':
  - type: note
    content: Isa. 61:3; Matt. 5:16; 2 Cor. 9:13; Phil. 1:11
  - type: text
    content: 'By this my Father is glorified, that you '
  - type: note
    content: ver. 5
  - type: text
    content: bear much fruit and so prove to be my disciples.
  - type: text
    content: ' '
  '9':
  - type: note
    content: See ch. 5:20
  - type: text
    content: 'As the Father has loved me, '
  - type: note
    content: See ch. 13:34
  - type: text
    content: so have I loved you. Abide in my love.
  - type: text
    content: ' '
