          text: '21'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: then hear from heaven and forgive the sin of your people Israel and bring them again to the land that you gave to them and to their fathers.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
