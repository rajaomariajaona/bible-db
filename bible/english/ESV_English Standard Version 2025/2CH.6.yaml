      - type: text
        text: 12:13
      metadata:
        usfm: 2CH.12.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 78:68
      metadata:
        usfm: PSA.78.68
    marker-yv: yv-n
  - type: text
    text: 'but I have chosen Jerusalem that my name may be there, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 28:4
      metadata:
        usfm: 1CH.28.4
