      metadata:
        usfm: 2CH.6.21
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: then hear from heaven and forgive the sin of your people Israel and bring them again to the land that you gave to them and to their fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
