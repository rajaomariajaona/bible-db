    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eccles. 7:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 3:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 1:8
      marker-yv: yv-n
    - type: text
      text: 'for there is no one who does not sin—and you are angry with them and give them to an enemy, so that they are carried away captive to a land far or near, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet if they turn their heart in the land to which they have been carried captive, and repent and plead with you in the land of their captivity, saying, ‘We have sinned and have acted perversely and wickedly,’ '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if they repent with all their heart and with all their soul in the land of their captivity to which they were carried captive, and pray toward their land, which you gave to their fathers, the city that you have chosen and the house that I have built for your name, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then hear from heaven your dwelling place their prayer and their pleas, and maintain their cause and forgive your people who have sinned against you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Blessed be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who with his hand has fulfilled what he promised with his mouth to David my father, saying, '
