  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If your people go out to battle against their enemies, by whatever way you shall send them, and they pray to you toward this city that you have chosen and the house that I have built for your name, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
