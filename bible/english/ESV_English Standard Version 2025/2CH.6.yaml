      marker-yv: yv-n
    - type: text
      text: '“If there is famine in the land, if there is pestilence or blight or mildew or locust or caterpillar, if their enemies besiege them in the land at their gates, whatever plague, whatever sickness there is, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whatever prayer, whatever plea is made by any man or by all your people Israel, each knowing his own affliction and his own sorrow and stretching out his hands toward this house, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king turned around and blessed all the assembly of Israel, while all the assembly of Israel stood. '
