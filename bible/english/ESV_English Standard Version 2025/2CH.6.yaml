          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:9
      marker-yv: yv-n
    - type: text
      text: 'keeping covenant and showing steadfast love to your servants who walk before you with all their heart, '
  '15':
  - type: usfm
