  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet have regard to the prayer of your servant and to his plea, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, listening to the cry and to the prayer that your servant prays before you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: 2CH.6.40
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
