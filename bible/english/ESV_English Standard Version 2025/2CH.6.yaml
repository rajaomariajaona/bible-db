document_id: 2CH.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Blesses the People
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-39, see 1 Kgs. 8:12-50; [ Ex. 20:21; Heb. 12:18 ]
  - type: text
    content: 'Then Solomon said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has said that he would dwell in thick darkness. '
  '10':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' has fulfilled his promise that he made. For I have risen in the place of David my father and sit on the throne of Israel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' promised, and I have built the house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '11':
  - type: text
    content: 'And there I have set the ark, '
  - type: note
    content: '[ch. 5:10]'
  - type: text
    content: 'in which is the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he made with the people of Israel.”'
  - type: heading
    content: Solomon’s Prayer of Dedication
  '12':
  - type: text
    content: 'Then Solomon stood before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of all the assembly of Israel and spread out his hands. '
  '13':
  - type: note
    content: '[2 Kgs. 11:14; 23:3]'
  - type: text
    content: Solomon had made a bronze platform five cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' long, five cubits wide, and three cubits high, and had set it in the court, and he stood on it. '
  - type: note
    content: '[1 Kgs. 8:54]'
  - type: text
    content: 'Then he knelt on his knees in the presence of all the assembly of Israel, and spread out his hands toward heaven, '
  '14':
  - type: text
    content: 'and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, '
  - type: note
    content: See Ex. 15:11
  - type: text
    content: 'there is no God like you, in heaven or on earth, '
  - type: note
    content: See Deut. 7:9
  - type: text
    content: 'keeping covenant and showing steadfast love to your servants who walk before you with all their heart, '
  '15':
  - type: note
    content: 1 Chr. 22:9, 10
  - type: text
    content: 'who have kept with your servant David my father what you declared to him. You spoke with your mouth, and with your hand have fulfilled it this day. '
  '16':
  - type: text
    content: 'Now therefore, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, keep for your servant David my father what you have promised him, saying, '
  - type: note
    content: ch. 7:18; See 1 Kgs. 2:4
  - type: text
    content: '‘You shall not lack a man to sit before me on the throne of Israel, '
  - type: note
    content: Ps. 132:12
  - type: text
    content: 'if only your sons pay close attention to their way, to walk in my law as you have walked before me.’ '
  '17':
  - type: text
    content: 'Now therefore, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, let your word be confirmed, which you have spoken to your servant David.'
  '18':
  - type: text
    content: '“But will God indeed dwell with man on the earth? Behold, '
  - type: note
    content: See ch. 2:6
  - type: text
    content: 'heaven and the highest heaven cannot contain you, how much less this house that I have built! '
  '19':
  - type: text
    content: 'Yet have regard to the prayer of your servant and to his plea, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, listening to the cry and to the prayer that your servant prays before you, '
  '2':
  - type: text
    content: 'But I have built you '
  - type: note
    content: '[Ps. 135:21]'
  - type: text
    content: 'an exalted house, a place for you to dwell in forever.” '
  '20':
  - type: note
    content: '[ver. 40]'
  - type: text
    content: 'that your eyes may be open day and night toward this house, the place where you have promised to set your name, that you may listen to the prayer that your servant offers toward this place. '
  '21':
  - type: text
    content: 'And listen to the pleas of your servant and of your people Israel, when they pray toward this place. And listen from heaven your dwelling place, '
  - type: note
    content: '[Dan. 9:19]'
  - type: text
    content: and when you hear, forgive.
  '22':
  - type: text
    content: '“If a man sins against his neighbor and is made to take an oath and comes and swears his oath before your altar in this house, '
  '23':
  - type: text
    content: then hear from heaven and act and judge your servants, repaying the guilty by bringing his conduct on his own head, and vindicating the righteous by rewarding him according to his righteousness.
  '24':
  - type: text
    content: '“If your people Israel are defeated before the enemy because they have sinned against you, and they turn again and acknowledge your name and pray and plead with you in this house, '
  '25':
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: then hear from heaven and forgive the sin of your people Israel and bring them again to the land that you gave to them and to their fathers.
  '26':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:13; [ 1 Kgs. 17:1 ]
  - type: text
    content: “When heaven is shut up and there is no rain because they have sinned against you, if they pray toward this place and acknowledge your name and turn from their sin, when you afflict
  - type: note
    content: Septuagint, Vulgate; Hebrew answer
  - type: text
    content: ' them, '
  '27':
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: then hear in heaven and forgive the sin of your servants, your people Israel, when you teach them the good way
  - type: note
    content: Septuagint, Syriac, Vulgate (compare 1 Kings 8:36); Hebrew toward the good way
  - type: text
    content: ' in which they should walk, and grant rain upon your land, which you have given to your people as an inheritance.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 20:9 ]'
  - type: text
    content: '“If there is famine in the land, if there is pestilence or blight or mildew or locust or caterpillar, if their enemies besiege them in the land at their gates, whatever plague, whatever sickness there is, '
  '29':
  - type: text
    content: 'whatever prayer, whatever plea is made by any man or by all your people Israel, each knowing his own affliction and his own sorrow and stretching out his hands toward this house, '
  '3':
  - type: text
    content: 'Then the king turned around and blessed all the assembly of Israel, while all the assembly of Israel stood. '
  '30':
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'then hear from heaven your dwelling place and forgive and render to each whose heart you know, according to all his ways, '
  - type: note
    content: See 1 Sam. 16:7
  - type: text
    content: 'for you, you only, know the hearts of the children of mankind, '
  '31':
  - type: text
    content: that they may fear you and walk in your ways all the days that they live in the land that you gave to our fathers.
  '32':
  - type: text
    content: '“Likewise, when a foreigner, who is not of your people Israel, comes from a far country for the sake of your great name and your mighty hand and your outstretched arm, when he comes and prays toward this house, '
  '33':
  - type: text
    content: 'hear from heaven your dwelling place and do according to all for which the foreigner calls to you, in order that all the peoples of the earth may know your name and fear you, as do your people Israel, and that they may know that this house '
  - type: note
    content: ch. 7:14; [James 2:7]
  - type: text
    content: that I have built is called by your name.
  '34':
  - type: text
    content: '“If your people go out to battle against their enemies, by whatever way you shall send them, and they pray to you toward this city that you have chosen and the house that I have built for your name, '
  '35':
  - type: text
    content: then hear from heaven their prayer and their plea, and maintain their cause.
  '36':
  - type: text
    content: “If they sin against you—
  - type: note
    content: Eccles. 7:20; James 3:2; 1 John 1:8
  - type: text
    content: 'for there is no one who does not sin—and you are angry with them and give them to an enemy, so that they are carried away captive to a land far or near, '
  '37':
  - type: text
    content: 'yet if they turn their heart in the land to which they have been carried captive, and repent and plead with you in the land of their captivity, saying, ‘We have sinned and have acted perversely and wickedly,’ '
  '38':
  - type: text
    content: 'if they repent with all their heart and with all their soul in the land of their captivity to which they were carried captive, and pray toward their land, which you gave to their fathers, the city that you have chosen and the house that I have built for your name, '
  '39':
  - type: text
    content: 'then hear from heaven your dwelling place their prayer and their pleas, and maintain their cause and forgive your people who have sinned against you. '
  '4':
  - type: text
    content: 'And he said, “Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who with his hand has fulfilled what he promised with his mouth to David my father, saying, '
  '40':
  - type: text
    content: 'Now, O my God, '
  - type: note
    content: Neh. 1:6, 11; [ver. 20; ch. 7:15]
  - type: text
    content: 'let your eyes be open '
  - type: note
    content: Ps. 130:2
  - type: text
    content: and your ears attentive to the prayer of this place.
  '41':
  - type: text
    content: '“And now arise, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, and go to your '
  - type: note
    content: Ps. 132:8, 9; [1 Chr. 28:2]
  - type: text
    content: resting place,
  - type: text
    content: you and the ark of your might.
  - type: text
    content: 'Let your priests, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, be '
  - type: note
    content: '[Isa. 61:10]'
  - type: text
    content: clothed with salvation,
  - type: text
    content: 'and let your saints '
  - type: note
    content: '[ch. 7:10; Neh. 9:25]'
  - type: text
    content: rejoice in your goodness.
  '42':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God, '
  - type: note
    content: Ps. 132:10
  - type: text
    content: do not turn away the face of your anointed one!
  - type: note
    content: '[ Ps. 132:1 ]'
  - type: text
    content: Remember your steadfast love for David your servant.”
  '5':
  - type: text
    content: '‘Since the day that I brought my people out of the land of Egypt, I chose no city out of all the tribes of Israel in which to build a house, that my name might be there, and I chose no man as prince over my people Israel; '
  '6':
  - type: note
    content: ch. 12:13; Ps. 78:68
  - type: text
    content: 'but I have chosen Jerusalem that my name may be there, '
  - type: note
    content: 1 Chr. 28:4; See 1 Sam. 16:11-13
  - type: text
    content: 'and I have chosen David to be over my people Israel.’ '
  '7':
  - type: note
    content: 2 Sam. 7:2; 1 Chr. 17:1; 28:2
  - type: text
    content: 'Now it was in the heart of David my father to build a house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '8':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to David my father, ‘Whereas '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'it was in your heart to build a house for my name, you did well that it was in your heart. '
  '9':
  - type: text
    content: 'Nevertheless, it is not you who shall build the house, but your son who shall be born to you shall build the house for my name.’ '
