    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: 1CH.22.10
    marker-yv: yv-n
  - type: text
    text: 'who have kept with your servant David my father what you declared to him. You spoke with your mouth, and with your hand have fulfilled it this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now therefore, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', God of Israel, keep for your servant David my father what you have promised him, saying, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
