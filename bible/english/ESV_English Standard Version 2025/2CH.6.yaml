          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'that your eyes may be open day and night toward this house, the place where you have promised to set your name, that you may listen to the prayer that your servant offers toward this place. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And listen to the pleas of your servant and of your people Israel, when they pray toward this place. And listen from heaven your dwelling place, '
