      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'who have kept with your servant David my father what you declared to him. You spoke with your mouth, and with your hand have fulfilled it this day. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, keep for your servant David my father what you have promised him, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:18
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:4
      marker-yv: yv-n
    - type: text
      text: '‘You shall not lack a man to sit before me on the throne of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 132:12
      marker-yv: yv-n
    - type: text
      text: 'if only your sons pay close attention to their way, to walk in my law as you have walked before me.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, let your word be confirmed, which you have spoken to your servant David.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But will God indeed dwell with man on the earth? Behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:6
      marker-yv: yv-n
    - type: text
      text: 'heaven and the highest heaven cannot contain you, how much less this house that I have built! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet have regard to the prayer of your servant and to his plea, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, listening to the cry and to the prayer that your servant prays before you, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I have built you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 135:21
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'an exalted house, a place for you to dwell in forever.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
