      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: 'it was in your heart to build a house for my name, you did well that it was in your heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nevertheless, it is not you who shall build the house, but your son who shall be born to you shall build the house for my name.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has fulfilled his promise that he made. For I have risen in the place of David my father and sit on the throne of Israel, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' promised, and I have built the house for the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
