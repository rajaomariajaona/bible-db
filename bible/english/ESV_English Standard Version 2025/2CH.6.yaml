        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'Then he knelt on his knees in the presence of all the assembly of Israel, and spread out his hands toward heaven, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and said, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', God of Israel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 15:11
      metadata:
        usfm: EXO.15.11
    marker-yv: yv-n
  - type: text
    text: 'there is no God like you, in heaven or on earth, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 7:9
      metadata:
        usfm: DEU.7.9
    marker-yv: yv-n
  - type: text
    text: 'keeping covenant and showing steadfast love to your servants who walk before you with all their heart, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
