      marker-yv: yv-n
    - type: text
      text: 'Then he knelt on his knees in the presence of all the assembly of Israel, and spread out his hands toward heaven, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
