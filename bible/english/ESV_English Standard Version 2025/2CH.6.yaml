        - type: text
          text: 1 Sam. 16:7
      marker-yv: yv-n
    - type: text
      text: 'for you, you only, know the hearts of the children of mankind, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that they may fear you and walk in your ways all the days that they live in the land that you gave to our fathers.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Likewise, when a foreigner, who is not of your people Israel, comes from a far country for the sake of your great name and your mighty hand and your outstretched arm, when he comes and prays toward this house, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hear from heaven your dwelling place and do according to all for which the foreigner calls to you, in order that all the peoples of the earth may know your name and fear you, as do your people Israel, and that they may know that this house '
    - type: usfm
