    marker-yv: yv-n
  - type: text
    text: 'Now it was in the heart of David my father to build a house for the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to David my father, ‘Whereas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
