document_id: DAN.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel and the Lions’ Den
  - type: text
    content: 'It pleased Darius to set over the kingdom '
  - type: note
    content: '[Esth. 1:1]'
  - type: text
    content: '120 '
  - type: note
    content: See ch. 3:2
  - type: text
    content: 'satraps, to be throughout the whole kingdom; '
  '10':
  - type: text
    content: 'When Daniel knew that the document had been signed, he went to his house where '
  - type: note
    content: '[Ps. 137:5]'
  - type: text
    content: 'he had windows in his upper chamber open '
  - type: note
    content: '[Ps. 28:2; 138:2]; See 1 Kgs. 8:48'
  - type: text
    content: 'toward Jerusalem. He got down on his knees '
  - type: note
    content: Ps. 55:17
  - type: text
    content: 'three times a day and prayed and '
  - type: note
    content: '[ch. 2:23]'
  - type: text
    content: 'gave thanks before his God, as he had done previously. '
  '11':
  - type: text
    content: 'Then these men came by agreement and found Daniel making petition and plea before his God. '
  '12':
  - type: text
    content: 'Then they '
  - type: note
    content: ch. 3:8
  - type: text
    content: 'came near and said before the king, concerning the injunction, “O king! Did you not sign '
  - type: note
    content: ver. 7, 8, 9
  - type: text
    content: 'an injunction, that anyone who makes petition to any god or man within thirty days except to you, O king, shall be cast into the den of lions?” The king answered and said, “The thing stands fast, according to the law of '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the Medes and Persians, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'which cannot be revoked.” '
  '13':
  - type: text
    content: 'Then they answered and said before the king, '
  - type: note
    content: ch. 1:6
  - type: text
    content: '“Daniel, who is one '
  - type: note
    content: See ch. 2:25
  - type: text
    content: 'of the exiles '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'from Judah, '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'pays no attention to you, O king, or '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'the injunction you have signed, but makes his petition '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: three times a day.”
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: '[Matt. 14:9; Mark 6:26]'
  - type: text
    content: 'the king, when he heard these words, '
  - type: note
    content: '[Matt. 14:9; Mark 6:26]'
  - type: text
    content: 'was much distressed and set his mind to deliver Daniel. And he labored till the sun went down to rescue him. '
  '15':
  - type: text
    content: 'Then these men came by agreement to the king and said to the king, “Know, O king, that it is a law of the Medes and Persians that no '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: injunction or ordinance that the king establishes can be changed.”
  '16':
  - type: text
    content: Then the king commanded, and Daniel was brought and cast into the den of lions. The king declared
  - type: note
    content: Aramaic answered and said; also verse 20
  - type: text
    content: ' to Daniel, “May '
  - type: note
    content: '[Acts 27:23]'
  - type: text
    content: 'your God, whom you serve continually, deliver you!” '
  '17':
  - type: note
    content: '[Lam. 3:53]'
  - type: text
    content: 'And a stone was brought and laid on the mouth of the den, '
  - type: note
    content: Matt. 27:66; Rev. 20:3
  - type: text
    content: 'and the king sealed it '
  - type: note
    content: '[Esth. 3:12]'
  - type: text
    content: 'with his own signet and with the signet of his '
  - type: note
    content: ch. 4:36; 5:1
  - type: text
    content: 'lords, that nothing might be changed concerning Daniel. '
  '18':
  - type: text
    content: 'Then the king went to his palace and spent the night fasting; '
  - type: note
    content: '[Prov. 25:20]'
  - type: text
    content: 'no diversions were brought to him, and '
  - type: note
    content: Esth. 6:1; [ch. 2:1]
  - type: text
    content: sleep fled from him.
  '19':
  - type: text
    content: 'Then, at break of day, the king arose and went in haste to the den of lions. '
  '2':
  - type: text
    content: 'and over them '
  - type: note
    content: '[ch. 5:7, 16, 29]'
  - type: text
    content: 'three high officials, of whom Daniel was one, to whom these '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'satraps should give account, so that the king might suffer no loss. '
  '20':
  - type: text
    content: 'As he came near to the den where Daniel was, he cried out in a tone of anguish. The king declared to Daniel, “O Daniel, servant of '
  - type: note
    content: ver. 26
  - type: text
    content: 'the living God, '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'has your God, whom you serve continually, '
  - type: note
    content: '[ch. 3:15]'
  - type: text
    content: 'been able to deliver you from the lions?” '
  '21':
  - type: text
    content: 'Then Daniel said to the king, '
  - type: note
    content: See ch. 2:4
  - type: text
    content: '“O king, live forever! '
  '22':
  - type: text
    content: 'My God '
  - type: note
    content: ch. 3:28
  - type: text
    content: 'sent his angel '
  - type: note
    content: Heb. 11:33; [Ps. 22:21; 2 Tim. 4:17]
  - type: text
    content: 'and shut the lions’ mouths, and they have not harmed me, because I was found blameless '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'before him; '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'and also before you, O king, I have done no harm.” '
  '23':
  - type: text
    content: 'Then the king was exceedingly glad, and commanded that Daniel be taken up out of the den. So Daniel was taken up out of the den, and '
  - type: note
    content: '[ch. 3:25]'
  - type: text
    content: 'no kind of harm was found on him, because he had trusted in his God. '
  '24':
  - type: text
    content: 'And the king commanded, and '
  - type: note
    content: '[Deut. 19:19]'
  - type: text
    content: those men who had maliciously accused Daniel were brought and cast into the den of lions—they, their children, and their wives. And before they reached the bottom of the den, the lions overpowered them and broke all their bones in pieces.
  '25':
  - type: text
    content: 'Then King Darius wrote to all '
  - type: note
    content: See ch. 3:4
  - type: text
    content: 'the peoples, nations, and languages '
  - type: note
    content: ch. 4:1
  - type: text
    content: 'that dwell in all the earth: '
  - type: note
    content: See ch. 4:1
  - type: text
    content: '“Peace be multiplied to you. '
  '26':
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'I make a decree, that in all my royal dominion '
  - type: note
    content: '[ch. 5:19; Ps. 99:1; Eccles. 12:13]'
  - type: text
    content: people are to tremble and fear before the God of Daniel,
  - type: text
    content: 'for '
  - type: note
    content: ver. 20
  - type: text
    content: 'he is '
  - type: note
    content: See ch. 4:34
  - type: text
    content: the living God,
  - type: text
    content: enduring forever;
  - type: text
    content: his kingdom shall never be destroyed,
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'and his dominion shall be '
  - type: note
    content: ch. 7:26
  - type: text
    content: to the end.
  '27':
  - type: text
    content: He delivers and rescues;
  - type: text
    content: 'he works '
  - type: note
    content: ch. 4:2
  - type: text
    content: signs and wonders
  - type: text
    content: in heaven and on earth,
  - type: text
    content: 'he who has '
  - type: note
    content: '[ch. 3:28, 29]'
  - type: text
    content: saved Daniel
  - type: text
    content: from the power of the lions.”
  '28':
  - type: text
    content: 'So this Daniel prospered during the reign of Darius and '
  - type: note
    content: '[ch. 1:21]'
  - type: text
    content: 'the reign of '
  - type: note
    content: 2 Chr. 36:22, 23; Ezra 1:2; 4:3, 5; 6:3, 14; Isa. 44:28; 45:1; [ch. 1:21; 10:1]
  - type: text
    content: Cyrus the Persian.
  '3':
  - type: text
    content: 'Then this Daniel became '
  - type: note
    content: '[Esth. 3:1]'
  - type: text
    content: 'distinguished above all '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the other high officials and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'satraps, because '
  - type: note
    content: ch. 5:12
  - type: text
    content: 'an excellent spirit was in him. And the king planned '
  - type: note
    content: '[Gen. 41:40; Esth. 10:3]'
  - type: text
    content: 'to set him over the whole kingdom. '
  '4':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the high officials and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the satraps '
  - type: note
    content: '[Eccles. 4:4]'
  - type: text
    content: 'sought to find a ground for complaint against Daniel with regard to the kingdom, '
  - type: note
    content: '[Ezek. 14:14, 20]'
  - type: text
    content: 'but they could find no ground for complaint or any fault, because he was faithful, '
  - type: note
    content: '[Ezek. 14:14, 20]'
  - type: text
    content: 'and no error or fault was found in him. '
  '5':
  - type: text
    content: Then these men said, “We shall not find any ground for complaint against this Daniel unless we find it in connection with the law of his God.”
  '6':
  - type: text
    content: 'Then these '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'high officials and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: satraps came by agreement
  - type: note
    content: Or came thronging; also verses 11, 15
  - type: text
    content: ' to the king and said to him, “O '
  - type: note
    content: ver. 21; See ch. 2:4
  - type: text
    content: 'King Darius, live forever! '
  '7':
  - type: text
    content: 'All the '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'high officials of the kingdom, the prefects and the satraps, the '
  - type: note
    content: ch. 3:24; 4:36
  - type: text
    content: 'counselors and the governors are agreed that the king should establish an ordinance and enforce an '
  - type: note
    content: ver. 12, 13, 15
  - type: text
    content: 'injunction, that whoever makes petition to any god or man for thirty days, except to you, O king, shall be cast into the den of lions. '
  '8':
  - type: text
    content: 'Now, O king, establish '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the injunction and sign the document, so that it cannot be changed, according to '
  - type: note
    content: ver. 12, 15; Esth. 1:19
  - type: text
    content: 'the law of '
  - type: note
    content: '[ch. 8:20]'
  - type: text
    content: 'the Medes and the Persians, '
  - type: note
    content: '[ver. 15; Esth. 8:8]'
  - type: text
    content: 'which cannot be revoked.” '
  '9':
  - type: text
    content: 'Therefore King Darius signed the document and '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: injunction.
