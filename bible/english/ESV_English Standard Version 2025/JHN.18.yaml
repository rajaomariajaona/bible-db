document_id: JHN.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Betrayal and Arrest of Jesus
  - type: text
    content: 'When Jesus had spoken these words, '
  - type: note
    content: Matt. 26:30, 36; Mark 14:26, 32; Luke 22:39
  - type: text
    content: 'he went out with his disciples across '
  - type: note
    content: See 2 Sam. 15:23
  - type: text
    content: 'the brook Kidron, where there was a garden, which he and his disciples entered. '
  '10':
  - type: text
    content: 'Then Simon Peter, '
  - type: note
    content: '[Luke 22:38]'
  - type: text
    content: having a sword, drew it and struck the high priest’s servant
  - type: note
    content: Or bondservant; twice in this verse
  - type: text
    content: ' and cut off his right ear. (The servant’s name was Malchus.) '
  '11':
  - type: text
    content: 'So Jesus said to Peter, '
  - type: text
    content: '“Put your sword into its sheath; '
  - type: note
    content: Matt. 20:22; 26:39, 42; [Isa. 51:22]
  - type: text
    content: shall I not drink the cup that the Father has given me?”
  - type: heading
    content: Jesus Faces Annas and Caiaphas
  '12':
  - type: text
    content: So the band of soldiers and their captain and the officers of the Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verses 14, 31, 36, 38
  - type: text
    content: ' arrested Jesus and bound him. '
  '13':
  - type: text
    content: 'First they '
  - type: note
    content: '[Matt. 26:57]'
  - type: text
    content: 'led him to '
  - type: note
    content: ver. 24; Luke 3:2; Acts 4:6
  - type: text
    content: 'Annas, for he was the father-in-law of '
  - type: note
    content: ver. 24, 28; See Matt. 26:3
  - type: text
    content: 'Caiaphas, who was high priest that year. '
  '14':
  - type: text
    content: 'It was Caiaphas who had advised the Jews '
  - type: note
    content: ch. 11:50
  - type: text
    content: that it would be expedient that one man should die for the people.
  - type: heading
    content: Peter Denies Jesus
  '15':
  - type: text
    content: ' '
  - type: note
    content: Matt. 26:58; Mark 14:54; Luke 22:54
  - type: text
    content: 'Simon Peter followed Jesus, and so did another disciple. Since that disciple was known to the high priest, he entered with Jesus into the courtyard of the high priest, '
  '16':
  - type: note
    content: For ver. 16-18, see Matt. 26:69, 70; Mark 14:66-68; Luke 22:55-57
  - type: text
    content: 'but Peter stood outside at the door. So the other disciple, who was known to the high priest, went out and spoke to the servant girl who kept watch at the door, and brought Peter in. '
  '17':
  - type: note
    content: Acts 12:13
  - type: text
    content: 'The servant girl at the door said to Peter, “You also are not one of this man’s disciples, are you?” He said, “I am not.” '
  '18':
  - type: text
    content: Now the servants
  - type: note
    content: Or bondservants; also verse 26
  - type: text
    content: ' and officers had made a charcoal fire, because it was cold, and they were standing and warming themselves. '
  - type: note
    content: ver. 25; Mark 14:54
  - type: text
    content: Peter also was with them, standing and warming himself.
  - type: heading
    content: The High Priest Questions Jesus
  '19':
  - type: text
    content: ' '
  - type: note
    content: For ver. 19-24, [ Matt. 26:59-68; Mark 14:55-65; Luke 22:63-71 ]
  - type: text
    content: 'The high priest then questioned Jesus about his disciples and his teaching. '
  '2':
  - type: text
    content: 'Now Judas, who betrayed him, also knew '
  - type: note
    content: Luke 22:40
  - type: text
    content: 'the place, for '
  - type: note
    content: '[Luke 21:37; 22:39]'
  - type: text
    content: 'Jesus often met there with his disciples. '
  '20':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“I have spoken '
  - type: note
    content: ch. 7:26; [Matt. 26:55]
  - type: text
    content: 'openly '
  - type: note
    content: '[ch. 8:26]'
  - type: text
    content: 'to the world. I have always taught in synagogues and in the temple, where all Jews come together. '
  - type: note
    content: Isa. 45:19; 48:16; [ch. 7:4]
  - type: text
    content: I have said nothing in secret.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Why do you ask me? Ask those who have heard me what I said to them; they know what I said.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'When he had said these things, one of the officers standing by struck Jesus with his hand, saying, '
  - type: note
    content: '[Acts 23:4]'
  - type: text
    content: '“Is that how you answer the high priest?” '
  '23':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “If what I said is wrong, bear witness about the wrong; but if what I said is right, why do you strike me?”
  - type: text
    content: ' '
  '24':
  - type: note
    content: ver. 13
  - type: text
    content: 'Annas then sent him bound to '
  - type: note
    content: ver. 13
  - type: text
    content: Caiaphas the high priest.
  - type: heading
    content: Peter Denies Jesus Again
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-27, see Matt. 26:71-75; Mark 14:69-72; Luke 22:58-62
  - type: text
    content: 'Now Simon Peter was standing and warming himself. So they said to him, “You also are not one of his disciples, are you?” He denied it and said, “I am not.” '
  '26':
  - type: text
    content: 'One of the servants of the high priest, a relative of '
  - type: note
    content: ver. 10
  - type: text
    content: 'the man whose ear Peter had cut off, asked, “Did I not see you '
  - type: note
    content: ver. 1
  - type: text
    content: 'in the garden with him?” '
  '27':
  - type: text
    content: 'Peter again denied it, and '
  - type: note
    content: ch. 13:38
  - type: text
    content: at once a rooster crowed.
  - type: heading
    content: Jesus Before Pilate
  '28':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:2; Mark 15:1; Luke 23:1
  - type: text
    content: 'Then they led Jesus '
  - type: note
    content: ver. 24
  - type: text
    content: 'from the house of Caiaphas to '
  - type: note
    content: ver. 33; ch. 19:9; See Matt. 27:27
  - type: text
    content: the governor’s headquarters.
  - type: note
    content: Greek the praetorium
  - type: text
    content: ' It was early morning. They themselves did not enter the governor’s headquarters, '
  - type: note
    content: Acts 10:28; 11:3; [ch. 11:55]
  - type: text
    content: 'so that they would not be defiled, '
  - type: note
    content: '[ch. 19:14]'
  - type: text
    content: 'but could eat the Passover. '
  '29':
  - type: note
    content: For ver. 29-38, see Matt. 27:11-14; Mark 15:2-5; Luke 23:2, 3
  - type: text
    content: 'So Pilate went outside to them and said, “What accusation do you bring against this man?” '
  '3':
  - type: note
    content: For ver. 3-11, see Matt. 26:47-56; Mark 14:43-50; Luke 22:47-53
  - type: text
    content: 'So Judas, having procured a band of soldiers and some officers from the chief priests and the Pharisees, went there with lanterns and torches and weapons. '
  '30':
  - type: text
    content: 'They answered him, “If this man were not doing evil, we would not have delivered him over to you.” '
  '31':
  - type: text
    content: 'Pilate said to them, '
  - type: note
    content: '[ch. 19:6]'
  - type: text
    content: '“Take him yourselves and judge him by your own law.” The Jews said to him, “It is not lawful for us to put anyone to death.” '
  '32':
  - type: note
    content: '[ch. 13:18]'
  - type: text
    content: 'This was to fulfill the word that Jesus had spoken '
  - type: note
    content: ch. 12:32, 33; Matt. 20:19; 26:2; Mark 10:33; Luke 18:32
  - type: text
    content: to show by what kind of death he was going to die.
  - type: heading
    content: My Kingdom Is Not of This World
  '33':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'So Pilate entered his headquarters again and called Jesus and said to him, '
  - type: note
    content: '[ch. 19:12]'
  - type: text
    content: '“Are you the King of the Jews?” '
  '34':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Do you say this of your own accord, or did others say it to you about me?”
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Pilate answered, “Am I a Jew? Your own nation and the chief priests have delivered you over to me. What have you done?” '
  '36':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: '[ch. 6:15; Dan. 2:44; 7:14, 27; Luke 17:21]'
  - type: text
    content: '“My kingdom '
  - type: note
    content: ch. 8:23; [ch. 15:19; 17:14, 16; 1 John 2:16; 4:5]
  - type: text
    content: 'is not of this world. If my kingdom were of this world, '
  - type: note
    content: '[Matt. 26:53]'
  - type: text
    content: 'my servants would have been fighting, that '
  - type: note
    content: ch. 19:16
  - type: text
    content: I might not be delivered over to the Jews. But my kingdom is not from the world.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Then Pilate said to him, “So you are a king?” Jesus answered, '
  - type: note
    content: See Luke 22:70
  - type: text
    content: '“You say that I am a king. '
  - type: note
    content: '[ch. 12:27; Rom. 14:9]'
  - type: text
    content: 'For this purpose I was born and for this purpose '
  - type: note
    content: ch. 16:28
  - type: text
    content: I have come into the world—
  - type: note
    content: ch. 3:11, 32; 5:31; 8:13, 14, 18
  - type: text
    content: 'to bear witness to the truth. '
  - type: note
    content: 1 John 4:6; [ch. 8:47]
  - type: text
    content: 'Everyone who is '
  - type: note
    content: 1 John 2:21; 3:19
  - type: text
    content: 'of the truth '
  - type: note
    content: ch. 10:16, 27
  - type: text
    content: listens to my voice.”
  - type: text
    content: ' '
  '38':
  - type: text
    content: Pilate said to him, “What is truth?”
  - type: text
    content: 'After he had said this, '
  - type: note
    content: ch. 19:4
  - type: text
    content: 'he went back outside to the Jews and told them, '
  - type: note
    content: ch. 19:4, 6; See Luke 23:4
  - type: text
    content: '“I find no guilt in him. '
  '39':
  - type: note
    content: For ver. 39, 40, see Matt. 27:15-18, 20-23; Mark 15:6-14; Luke 23:18-23
  - type: text
    content: 'But you have a custom that I should release one man for you at the Passover. So do you want me to release to you the King of the Jews?” '
  '4':
  - type: text
    content: 'Then Jesus, '
  - type: note
    content: ch. 13:1
  - type: text
    content: 'knowing all that would happen to him, came forward and said to them, '
  - type: note
    content: ver. 7; ch. 1:38; 20:15
  - type: text
    content: “Whom do you seek?”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'They cried out again, '
  - type: note
    content: Acts 3:14
  - type: text
    content: “Not this man, but Barabbas!” Now Barabbas was a robber.
  - type: note
    content: Or an insurrectionist
  '5':
  - type: text
    content: 'They answered him, “Jesus of Nazareth.” Jesus said to them, '
  - type: text
    content: “I am he.”
  - type: note
    content: Greek I am; also verses 6, 8
  - type: text
    content: ' Judas, who betrayed him, was standing with them. '
  '6':
  - type: note
    content: '[ch. 10:18; Matt. 26:53; Rev. 1:17]'
  - type: text
    content: When Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' said to them, '
  - type: text
    content: “I am he,”
  - type: text
    content: ' they drew back and fell to the ground. '
  '7':
  - type: text
    content: 'So he asked them again, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: “Whom do you seek?”
  - type: text
    content: ' And they said, “Jesus of Nazareth.” '
  '8':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I told you that I am he. So, if you seek me, let these men go.”
  - type: text
    content: ' '
  '9':
  - type: note
    content: ch. 17:12
  - type: text
    content: 'This was to fulfill the word that he had spoken: '
  - type: text
    content: “Of those whom you gave me I have lost not one.”
  - type: text
    content: ' '
