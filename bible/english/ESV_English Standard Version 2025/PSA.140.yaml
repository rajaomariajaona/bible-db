document_id: PSA.140,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Deliver Me, O Lord, from Evil Men
  - type: text
    content: To the choirmaster. A Psalm of David.
  - type: text
    content: ' '
  - type: note
    content: Ps. 71:4; 119:153, 170
  - type: text
    content: 'Deliver me, O '
  - type: text
    content: Lord
  - type: text
    content: ', from evil men;'
  - type: text
    content: 'preserve me from '
  - type: note
    content: Ps. 18:48; Prov. 3:31
  - type: text
    content: violent men,
  '10':
  - type: text
    content: 'Let '
  - type: note
    content: '[Ps. 11:6; 18:13]'
  - type: text
    content: burning coals fall upon them!
  - type: text
    content: Let them be cast into fire,
  - type: text
    content: into miry pits, no more to rise!
  '11':
  - type: text
    content: Let not the slanderer be established in the land;
  - type: text
    content: let evil hunt down the violent man speedily!
  '12':
  - type: text
    content: 'I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: Ps. 9:4
  - type: text
    content: maintain the cause of the afflicted,
  - type: text
    content: 'and '
  - type: note
    content: 1 Kgs. 8:45, 49, 59
  - type: text
    content: will execute justice for the needy.
  '13':
  - type: text
    content: 'Surely '
  - type: note
    content: '[Ps. 64:10]'
  - type: text
    content: the righteous shall give thanks to your name;
  - type: note
    content: '[ Ps. 11:7 ]'
  - type: text
    content: the upright shall dwell in your presence.
  '2':
  - type: text
    content: who plan evil things in their heart
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 56:6
  - type: text
    content: stir up wars continually.
  '3':
  - type: text
    content: 'They make '
  - type: note
    content: '[Ps. 52:2]'
  - type: text
    content: 'their tongue sharp as '
  - type: note
    content: Ps. 58:4
  - type: text
    content: a serpent’s,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 10:7
  - type: text
    content: 'under their lips is the '
  - type: note
    content: Cited Rom. 3:13
  - type: text
    content: 'venom of asps. '
  - type: text
    content: Selah
  '4':
  - type: text
    content: 'Guard me, O '
  - type: text
    content: Lord
  - type: text
    content: ', from the hands of the wicked;'
  - type: text
    content: 'preserve me from '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: violent men,
  - type: text
    content: who have planned to trip up my feet.
  '5':
  - type: text
    content: 'The arrogant have '
  - type: note
    content: Ps. 35:7; 141:9; 142:3; Jer. 18:22
  - type: text
    content: hidden a trap for me,
  - type: text
    content: 'and with cords they have spread '
  - type: note
    content: Job 18:8-10
  - type: text
    content: a net;
  - type: note
    content: Or they have spread cords as a net
  - type: text
    content: 'beside the way they have set '
  - type: note
    content: Ps. 64:5
  - type: text
    content: 'snares for me. '
  - type: text
    content: Selah
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 142:5
  - type: text
    content: 'I say to the '
  - type: text
    content: Lord
  - type: text
    content: ', You are my God;'
  - type: text
    content: 'give ear to '
  - type: note
    content: Ps. 28:2; 31:22; 130:2
  - type: text
    content: 'the voice of my pleas for mercy, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '7':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', my Lord, '
  - type: note
    content: Ps. 28:8
  - type: text
    content: the strength of my salvation,
  - type: text
    content: you have covered my head in the day of battle.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 35:25 ]'
  - type: text
    content: 'Grant not, O '
  - type: text
    content: Lord
  - type: text
    content: ', the desires of the wicked;'
  - type: text
    content: do not further their
  - type: note
    content: Hebrew his
  - type: text
    content: ' evil plot, or '
  - type: note
    content: Isa. 14:21
  - type: text
    content: 'they will be exalted! '
  - type: text
    content: Selah
  '9':
  - type: text
    content: As for the head of those who surround me,
  - type: text
    content: 'let '
  - type: note
    content: '[Prov. 12:13; 18:7]; See Ps. 7:16'
  - type: text
    content: the mischief of their lips overwhelm them!
