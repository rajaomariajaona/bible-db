document_id: 1SA.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Flees to the Philistines
  - type: text
    content: 'Then David said in his heart, “Now I shall perish one day by the hand of Saul. There is nothing better for me than that I should escape to the land of the Philistines. Then Saul will despair of seeking me any longer within the borders of Israel, and I shall escape out of his hand.” '
  '10':
  - type: text
    content: 'When Achish asked, “Where have you '
  - type: note
    content: '[ch. 23:27]'
  - type: text
    content: 'made a raid today?” David would say, “Against the Negeb of Judah,” or, “Against the Negeb of '
  - type: note
    content: ch. 30:29
  - type: text
    content: 'the Jerahmeelites,” or, “Against the Negeb of '
  - type: note
    content: See Judg. 1:16
  - type: text
    content: 'the Kenites.” '
  '11':
  - type: text
    content: 'And David would leave neither man nor woman alive to bring news to Gath, thinking, “lest they should tell about us and say, ‘So David has done.’” Such was his custom all the while he lived in the country of the Philistines. '
  '12':
  - type: text
    content: And Achish trusted David, thinking, “He has made himself an utter stench to his people Israel; therefore he shall always be my servant.”
  '2':
  - type: text
    content: 'So David arose and went over, he and '
  - type: note
    content: ch. 23:13; [2 Sam. 15:18]
  - type: text
    content: 'the six hundred men who were with him, '
  - type: note
    content: ch. 21:10; [1 Kgs. 2:39]
  - type: text
    content: 'to Achish the son of Maoch, king of Gath. '
  '3':
  - type: text
    content: 'And David lived with Achish at Gath, he and his men, every man with his household, and David with '
  - type: note
    content: See ch. 25:43
  - type: text
    content: 'his two wives, Ahinoam of Jezreel, and Abigail of Carmel, Nabal’s widow. '
  '4':
  - type: text
    content: And when it was told Saul that David had fled to Gath, he no longer sought him.
  '5':
  - type: text
    content: 'Then David said to Achish, “If '
  - type: note
    content: See Gen. 33:15
  - type: text
    content: 'I have found favor in your eyes, let a place be given me in one of the country towns, that I may dwell there. For why should your servant dwell in the royal city with you?” '
  '6':
  - type: text
    content: 'So that day Achish gave him '
  - type: note
    content: Josh. 15:31
  - type: text
    content: 'Ziklag. Therefore Ziklag has belonged to the kings of Judah to this day. '
  '7':
  - type: note
    content: '[ch. 29:3]'
  - type: text
    content: And the number of the days that David lived in the country of the Philistines was a year and four months.
  '8':
  - type: text
    content: 'Now David '
  - type: note
    content: See 1 Chr. 12
  - type: text
    content: 'and his men went up and made raids against '
  - type: note
    content: Josh. 13:2
  - type: text
    content: 'the Geshurites, '
  - type: note
    content: '[Josh. 16:10; Judg. 1:29]'
  - type: text
    content: 'the Girzites, and '
  - type: note
    content: '[ch. 15:7, 8]'
  - type: text
    content: 'the Amalekites, for these were the inhabitants of the land from of old, '
  - type: note
    content: See ch. 15:7
  - type: text
    content: 'as far as Shur, to the land of Egypt. '
  '9':
  - type: text
    content: 'And David would strike the land and would leave neither man nor woman alive, but would take away the sheep, the oxen, the donkeys, the camels, and the garments, and come back to Achish. '
