      marker-yv: yv-n
    - type: text
      text: 'Ashkelon and struck down thirty men of the town and took their spoil and gave the garments to those who had told the riddle. In hot anger he went back to his father’s house. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he came up and told his father and mother, “I saw one of the daughters of the Philistines at Timnah. '
    - type: usfm
