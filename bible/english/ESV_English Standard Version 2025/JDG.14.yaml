      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“You only hate me; you do not love me. You have put a riddle to my people, and you have not told me what it is.” And he said to her, “Behold, I have not told my father nor my mother, and shall I tell you?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She wept before him the seven days that their feast lasted, and on the seventh day he told her, because '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
