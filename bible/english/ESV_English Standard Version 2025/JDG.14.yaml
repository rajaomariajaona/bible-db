      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'she pressed him hard. Then she told the riddle to her people. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the men of the city said to him on the seventh day before the sun went down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What is sweeter than honey?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is stronger than a lion?”
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he said to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you had not plowed with my heifer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you would not have found out my riddle.”
