      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Then the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rushed upon him, and although he had nothing in his hand, he tore the lion in pieces as one tears a young goat. But he did not tell his father or his mother what he had done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he went down and talked with the woman, and she was right in Samson’s eyes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After some days he returned to take her. And he turned aside to see the carcass of the lion, and behold, there was a swarm of bees in the body of the lion, and honey. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He scraped it out into his hands and went on, eating as he went. And he came to his father and mother and gave some to them, and they ate. But he did not tell them that he had scraped the honey from the carcass of the lion.
