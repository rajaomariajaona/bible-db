      marker-yv: yv-n
    - type: text
      text: 'lest we burn you and your father’s house with fire. Have you invited us here to impoverish us?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson’s wife wept over him and said, '
    - type: usfm
      marker: x
      children:
