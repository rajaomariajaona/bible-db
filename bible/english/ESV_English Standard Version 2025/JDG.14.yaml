      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Now get her for me as my wife.” '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And Samson’s wife was given to '
    - type: usfm
      marker: x
      children:
      - type: usfm
