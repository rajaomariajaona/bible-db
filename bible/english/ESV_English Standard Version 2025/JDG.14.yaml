document_id: JDG.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson’s Marriage
  - type: text
    content: ' '
  - type: note
    content: Heb. 11:32
  - type: text
    content: 'Samson went down to '
  - type: note
    content: Gen. 38:12, 13; Josh. 15:10; 19:43
  - type: text
    content: 'Timnah, and at Timnah he saw one of the daughters of the Philistines. '
  '10':
  - type: text
    content: 'His father went down to the woman, and Samson prepared a feast there, for so the young men used to do. '
  '11':
  - type: text
    content: 'As soon as the people saw him, they brought thirty companions to be with him. '
  '12':
  - type: text
    content: 'And Samson said to them, '
  - type: note
    content: Ezek. 17:2; [1 Kgs. 10:1; Ps. 78:2; Prov. 1:6]
  - type: text
    content: '“Let me now put a riddle to you. If you can tell me what it is, within '
  - type: note
    content: Gen. 29:27
  - type: text
    content: 'the seven days of the feast, and find it out, then I will give you thirty linen garments and thirty '
  - type: note
    content: Gen. 45:22; 2 Kgs. 5:5, 22, 23
  - type: text
    content: 'changes of clothes, '
  '13':
  - type: text
    content: 'but if you cannot tell me what it is, then you shall give me thirty linen garments and thirty changes of clothes.” And they said to him, “Put your riddle, that we may hear it.” '
  '14':
  - type: text
    content: And he said to them,
  - type: text
    content: “Out of the eater came something to eat.
  - type: text
    content: Out of the strong came something sweet.”
  - type: text
    content: And in three days they could not solve the riddle.
  '15':
  - type: text
    content: On the fourth
  - type: note
    content: Septuagint, Syriac; Hebrew seventh
  - type: text
    content: ' day they said to Samson’s wife, '
  - type: note
    content: ch. 16:5
  - type: text
    content: '“Entice your husband to tell us what the riddle is, '
  - type: note
    content: ch. 15:6
  - type: text
    content: 'lest we burn you and your father’s house with fire. Have you invited us here to impoverish us?” '
  '16':
  - type: text
    content: 'And Samson’s wife wept over him and said, '
  - type: note
    content: '[ch. 16:15]'
  - type: text
    content: '“You only hate me; you do not love me. You have put a riddle to my people, and you have not told me what it is.” And he said to her, “Behold, I have not told my father nor my mother, and shall I tell you?” '
  '17':
  - type: text
    content: 'She wept before him the seven days that their feast lasted, and on the seventh day he told her, because '
  - type: note
    content: '[ch. 16:16]'
  - type: text
    content: 'she pressed him hard. Then she told the riddle to her people. '
  '18':
  - type: text
    content: And the men of the city said to him on the seventh day before the sun went down,
  - type: text
    content: “What is sweeter than honey?
  - type: text
    content: What is stronger than a lion?”
  - type: text
    content: And he said to them,
  - type: text
    content: “If you had not plowed with my heifer,
  - type: text
    content: you would not have found out my riddle.”
  '19':
  - type: text
    content: ' '
  - type: note
    content: See ver. 6
  - type: text
    content: 'And the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' rushed upon him, and he went down to '
  - type: note
    content: ch. 1:18
  - type: text
    content: 'Ashkelon and struck down thirty men of the town and took their spoil and gave the garments to those who had told the riddle. In hot anger he went back to his father’s house. '
  '2':
  - type: text
    content: 'Then he came up and told his father and mother, “I saw one of the daughters of the Philistines at Timnah. '
  - type: note
    content: '[Gen. 34:4]'
  - type: text
    content: 'Now get her for me as my wife.” '
  '20':
  - type: text
    content: 'And Samson’s wife was given to '
  - type: note
    content: ch. 15:2, 6
  - type: text
    content: 'his companion, '
  - type: note
    content: John 3:29
  - type: text
    content: who had been his best man.
  '3':
  - type: text
    content: 'But his father and mother said to him, “Is there not a woman among the daughters '
  - type: note
    content: '[Gen. 24:3, 4; 28:1, 2]'
  - type: text
    content: 'of your relatives, or among all our people, that you must go to take a wife from the '
  - type: note
    content: ch. 15:18; 1 Sam. 14:6; 17:26, 36; 31:4; 2 Sam. 1:20
  - type: text
    content: uncircumcised Philistines?” But Samson said to his father, “Get her for me, for she is right in my eyes.”
  '4':
  - type: text
    content: 'His father and mother did not know that it was '
  - type: note
    content: Josh. 11:20
  - type: text
    content: 'from the '
  - type: text
    content: Lord
  - type: text
    content: ', for he was seeking an opportunity against the Philistines. '
  - type: note
    content: ch. 13:1; 15:11
  - type: text
    content: At that time the Philistines ruled over Israel.
  '5':
  - type: text
    content: 'Then Samson went down with his father and mother to Timnah, and they came to the vineyards of Timnah. And behold, a young lion came toward him roaring. '
  '6':
  - type: note
    content: ver. 19; ch. 15:14; 1 Sam. 11:6; [ch. 3:10]
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' rushed upon him, and although he had nothing in his hand, he tore the lion in pieces as one tears a young goat. But he did not tell his father or his mother what he had done. '
  '7':
  - type: text
    content: Then he went down and talked with the woman, and she was right in Samson’s eyes.
  '8':
  - type: text
    content: 'After some days he returned to take her. And he turned aside to see the carcass of the lion, and behold, there was a swarm of bees in the body of the lion, and honey. '
  '9':
  - type: text
    content: He scraped it out into his hands and went on, eating as he went. And he came to his father and mother and gave some to them, and they ate. But he did not tell them that he had scraped the honey from the carcass of the lion.
