document_id: MAT.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Cleanses a Leper
  - type: text
    content: 'When he came down from the mountain, '
  - type: note
    content: ch. 4:25
  - type: text
    content: 'great crowds followed him. '
  '10':
  - type: text
    content: 'When Jesus heard this, '
  - type: note
    content: '[Mark 6:6]'
  - type: text
    content: 'he marveled and said to those who followed him, '
  - type: text
    content: '“Truly, I tell you, with '
  - type: note
    content: See ch. 9:2
  - type: text
    content: no one in Israel
  - type: note
    content: Some manuscripts not even in Israel
  - type: text
    content: ' '
  - type: text
    content: have I found such faith.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'I tell you, '
  - type: note
    content: Luke 13:29; Eph. 3:6; [Isa. 59:19; Mal. 1:11]
  - type: text
    content: many will come from east and west and recline at table with Abraham, Isaac, and Jacob in the kingdom of heaven,
  - type: text
    content: ' '
  '12':
  - type: note
    content: Luke 13:28; [ch. 19:30; 21:41]
  - type: text
    content: 'while the sons of the kingdom '
  - type: note
    content: ch. 22:13; 25:30
  - type: text
    content: 'will be thrown into the outer darkness. In that place '
  - type: note
    content: ch. 13:42, 50; 22:13; 24:51; 25:30; Luke 13:28
  - type: text
    content: there will be weeping and gnashing of teeth.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And to the centurion Jesus said, '
  - type: text
    content: '“Go; let it be done for you '
  - type: note
    content: ch. 9:29
  - type: text
    content: as you have believed.”
  - type: text
    content: ' '
  - type: note
    content: John 4:53; [ch. 9:22]
  - type: text
    content: And the servant was healed at that very moment.
  - type: heading
    content: Jesus Heals Many
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-16, see Mark 1:29-34; Luke 4:38-41
  - type: text
    content: 'And when Jesus entered Peter’s house, he saw '
  - type: note
    content: 1 Cor. 9:5
  - type: text
    content: 'his mother-in-law lying sick with a fever. '
  '15':
  - type: text
    content: 'He '
  - type: note
    content: '[ch. 9:25]'
  - type: text
    content: 'touched her hand, and the fever left her, and she rose and began to serve him. '
  '16':
  - type: text
    content: 'That evening they brought to him many who were '
  - type: note
    content: ver. 28, 33; See ch. 4:24
  - type: text
    content: 'oppressed by demons, and he cast out the spirits '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'with a word and healed all who were sick. '
  '17':
  - type: note
    content: See ch. 1:22
  - type: text
    content: 'This was to fulfill what was spoken by the prophet Isaiah: '
  - type: note
    content: Cited from Isa. 53:4
  - type: text
    content: “He took our illnesses and bore our diseases.”
  - type: heading
    content: The Cost of Following Jesus
  '18':
  - type: text
    content: 'Now '
  - type: note
    content: '[ch. 14:22; John 6:15-17]'
  - type: text
    content: 'when Jesus saw a crowd around him, '
  - type: note
    content: Mark 4:35; Luke 8:22
  - type: text
    content: 'he gave orders to go over to the other side. '
  '19':
  - type: note
    content: For ver. 19-22, see Luke 9:57-60
  - type: text
    content: 'And a scribe came up and said to him, “Teacher, I will follow you wherever you go.” '
  '2':
  - type: note
    content: For ver. 2-4, see Mark 1:40-44; Luke 5:12-14
  - type: text
    content: And behold, a leper
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' came to him and '
  - type: note
    content: '[ch. 18:26; Acts 10:25]'
  - type: text
    content: 'knelt before him, saying, “Lord, if you will, you can make me clean.” '
  '20':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: “Foxes have holes, and birds of the air have nests, but the Son of Man has nowhere to lay his head.”
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Another of the disciples said to him, “Lord, let me first go and bury my father.” '
  '22':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Follow me, and leave '
  - type: note
    content: '[John 5:25]'
  - type: text
    content: the dead to bury their own dead.”
  - type: heading
    content: Jesus Calms a Storm
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-27, see Mark 4:36-41; Luke 8:22-25; [ John 6:16-21 ]
  - type: text
    content: 'And when he got into the boat, his disciples followed him. '
  '24':
  - type: text
    content: 'And behold, there arose a great storm on the sea, so that the boat was being swamped by the waves; but '
  - type: note
    content: '[John 4:6, 7]'
  - type: text
    content: 'he was asleep. '
  '25':
  - type: text
    content: 'And they went and woke him, saying, '
  - type: note
    content: '[ch. 14:30]'
  - type: text
    content: '“Save us, Lord; we are perishing.” '
  '26':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Why are you '
  - type: note
    content: John 14:27
  - type: text
    content: 'afraid, '
  - type: note
    content: See ch. 6:30
  - type: text
    content: O you of little faith?”
  - type: text
    content: ' Then he rose and '
  - type: note
    content: Ps. 104:6, 7; [Luke 4:39]
  - type: text
    content: 'rebuked the winds and the sea, and '
  - type: note
    content: Job 38:11; Ps. 65:7; [ch. 14:32]
  - type: text
    content: 'there was a great calm. '
  '27':
  - type: text
    content: 'And the men '
  - type: note
    content: '[Mark 1:27]'
  - type: text
    content: 'marveled, saying, “What sort of man is this, that even '
  - type: note
    content: '[Luke 5:9]'
  - type: text
    content: winds and sea obey him?”
  - type: heading
    content: Jesus Heals Two Men with Demons
  '28':
  - type: text
    content: ' '
  - type: note
    content: For ch. 8:28–9:1, see Mark 5:1-21; Luke 8:26-40
  - type: text
    content: And when he came to the other side, to the country of the Gadarenes,
  - type: note
    content: Some manuscripts Gergesenes; some Gerasenes
  - type: text
    content: ' two '
  - type: note
    content: ver. 16; [Rev. 18:2]
  - type: text
    content: demon-possessed
  - type: note
    content: Greek daimonizomai (demonized); also verse 33; elsewhere rendered oppressed by demons
  - type: text
    content: ' men met him, coming out of the tombs, so fierce that no one could pass that way. '
  '29':
  - type: text
    content: 'And behold, they '
  - type: note
    content: Mark 1:23, 24, 26; Luke 4:34; Acts 8:7
  - type: text
    content: 'cried out, “What have you to do with us, '
  - type: note
    content: '[ch. 4:3, 6]; See ch. 14:33'
  - type: text
    content: 'O Son of God? Have you come here to torment us '
  - type: note
    content: '[Rev. 12:12]'
  - type: text
    content: 'before the time?” '
  '3':
  - type: text
    content: And Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' stretched out his hand and touched him, saying, '
  - type: text
    content: “I will; be clean.”
  - type: text
    content: ' And immediately his leprosy was cleansed. '
  '30':
  - type: text
    content: 'Now a herd of many pigs was feeding at some distance from them. '
  '31':
  - type: text
    content: 'And the demons begged him, saying, “If you cast us out, send us away into the herd of pigs.” '
  '32':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Go.”
  - type: text
    content: ' So they came out and went into the pigs, and behold, the whole herd rushed down the steep bank into the sea and drowned in the waters. '
  '33':
  - type: text
    content: 'The herdsmen fled, and going into the city they told everything, especially what had happened to the '
  - type: note
    content: ver. 16
  - type: text
    content: 'demon-possessed men. '
  '34':
  - type: text
    content: 'And behold, all the city came out to meet Jesus, and when they saw him, '
  - type: note
    content: '[1 Kgs. 17:18; Luke 5:8; Acts 16:39]'
  - type: text
    content: they begged him to leave their region.
  '4':
  - type: text
    content: 'And Jesus said to him, '
  - type: note
    content: ch. 9:30; 17:9; Mark 1:34; 5:43; 7:36; 8:26; See ch. 12:16
  - type: text
    content: '“See that you say nothing to anyone, but go, '
  - type: note
    content: Luke 17:14
  - type: text
    content: 'show yourself to the priest and '
  - type: note
    content: Lev. 14:2-32
  - type: text
    content: 'offer the gift that Moses commanded, '
  - type: note
    content: ch. 10:18; 24:14; Mark 6:11; Luke 9:5; James 5:3
  - type: text
    content: for a proof to them.”
  - type: heading
    content: The Faith of a Centurion
  '5':
  - type: text
    content: ' '
  - type: note
    content: For ver. 5-13, see Luke 7:1-10
  - type: text
    content: 'When he had entered Capernaum, a centurion came forward to him, appealing to him, '
  '6':
  - type: text
    content: '“Lord, my servant is lying paralyzed at home, suffering terribly.” '
  '7':
  - type: text
    content: 'And he said to him, '
  - type: text
    content: “I will come and heal him.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But the centurion replied, “Lord, I am not worthy to have you come under my roof, but '
  - type: note
    content: Ps. 107:20; [ver. 16]
  - type: text
    content: 'only say the word, and my servant will be healed. '
  '9':
  - type: text
    content: For I too am a man under authority, with soldiers under me. And I say to one, ‘Go,’ and he goes, and to another, ‘Come,’ and he comes, and to my servant,
  - type: note
    content: Or bondservant
  - type: text
    content: ' ‘Do this,’ and he does it.” '
