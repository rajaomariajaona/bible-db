document_id: JOS.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Defeated at Ai
  - type: text
    content: 'But the people of Israel broke faith in regard to the devoted things, for '
  - type: note
    content: ch. 22:20; [1 Chr. 2:6, 7]
  - type: text
    content: 'Achan the son of Carmi, son of Zabdi, son of Zerah, of the tribe of Judah, took some of the devoted things. And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned against the people of Israel.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Get up! Why have you fallen on your face? '
  '11':
  - type: text
    content: 'Israel has sinned; they have '
  - type: note
    content: ver. 15
  - type: text
    content: 'transgressed my covenant that I commanded them; they have taken some of the '
  - type: note
    content: ch. 6:17, 18
  - type: text
    content: 'devoted things; they have stolen and lied and put them among their own belongings. '
  '12':
  - type: note
    content: Num. 14:45; Judg. 2:14
  - type: text
    content: 'Therefore the people of Israel cannot stand before their enemies. They '
  - type: note
    content: ver. 8
  - type: text
    content: 'turn their backs before their enemies, because they have become '
  - type: note
    content: ch. 6:18
  - type: text
    content: devoted for destruction.
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  - type: text
    content: ' I will be with you no more, unless you destroy '
  - type: note
    content: ver. 11
  - type: text
    content: 'the devoted things from among you. '
  '13':
  - type: text
    content: 'Get up! Consecrate the people and say, '
  - type: note
    content: ch. 3:5
  - type: text
    content: '‘Consecrate yourselves for tomorrow; for thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, “There are devoted things in your midst, O Israel. You cannot stand before your enemies until you take away the devoted things from among you.” '
  '14':
  - type: text
    content: 'In the morning therefore you shall be brought near '
  - type: note
    content: 1 Sam. 10:19
  - type: text
    content: 'by your tribes. And the tribe that the '
  - type: text
    content: Lord
  - type: text
    content: ' takes by lot shall come near by clans. And the clan that the '
  - type: text
    content: Lord
  - type: text
    content: ' takes shall come near by households. And the household that the '
  - type: text
    content: Lord
  - type: text
    content: ' takes shall come near man by man. '
  '15':
  - type: note
    content: 1 Sam. 14:38, 39
  - type: text
    content: 'And he who is taken with the devoted things shall be burned with fire, he and all that he has, because he has '
  - type: note
    content: ver. 11
  - type: text
    content: 'transgressed the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', and because he has done '
  - type: note
    content: Gen. 34:7; Judg. 20:6
  - type: text
    content: an outrageous thing in Israel.’”
  '16':
  - type: text
    content: 'So Joshua rose early in the morning and brought Israel near tribe by tribe, and the tribe of Judah was taken. '
  '17':
  - type: text
    content: 'And he brought near the clans of Judah, and the clan of the '
  - type: note
    content: Num. 26:20
  - type: text
    content: 'Zerahites was taken. And he brought near the clan of the Zerahites man by man, and Zabdi was taken. '
  '18':
  - type: text
    content: 'And he brought near his household man by man, and Achan the son of Carmi, son of Zabdi, son of Zerah, of the tribe of Judah, was taken. '
  '19':
  - type: text
    content: 'Then Joshua said to Achan, “My son, '
  - type: note
    content: 1 Sam. 6:5; Jer. 13:16; Mal. 2:2; John 9:24
  - type: text
    content: 'give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel and '
  - type: note
    content: Num. 5:6, 7; 2 Chr. 30:22; Ezra 10:11; Dan. 9:4
  - type: text
    content: give praise
  - type: note
    content: Or and make confession
  - type: text
    content: ' to him. And '
  - type: note
    content: 1 Sam. 14:43
  - type: text
    content: 'tell me now what you have done; do not hide it from me.” '
  '2':
  - type: text
    content: 'Joshua sent men from Jericho to Ai, which is near '
  - type: note
    content: ch. 18:12; 1 Sam. 13:5; 14:23; Hos. 4:15; 5:8; 10:5
  - type: text
    content: 'Beth-aven, east of Bethel, and said to them, “Go up and spy out the land.” And the men went up and spied out Ai. '
  '20':
  - type: text
    content: 'And Achan answered Joshua, “Truly '
  - type: note
    content: 2 Sam. 12:13
  - type: text
    content: 'I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel, and this is what I did: '
  '21':
  - type: text
    content: when I saw among the spoil a beautiful cloak from Shinar, and 200 shekels of silver, and a bar of gold weighing 50 shekels,
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' then I coveted them and took them. And see, they are hidden in the earth inside my tent, with the silver underneath.”'
  '22':
  - type: text
    content: 'So Joshua sent messengers, and they ran to the tent; and behold, it was hidden in his tent with the silver underneath. '
  '23':
  - type: text
    content: 'And they took them out of the tent and brought them to Joshua and to all the people of Israel. And they laid them down before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'And Joshua and all Israel with him took Achan the son of Zerah, and the silver and the cloak and the bar of gold, and his sons and daughters and his oxen and donkeys and sheep and his tent and all that he had. And they brought them up to the '
  - type: note
    content: ver. 26; ch. 15:7; Isa. 65:10; Hos. 2:15
  - type: text
    content: 'Valley of Achor. '
  '25':
  - type: text
    content: 'And Joshua said, “Why did you '
  - type: note
    content: ch. 6:18; 1 Chr. 2:7
  - type: text
    content: 'bring trouble on us? The '
  - type: text
    content: Lord
  - type: text
    content: ' brings trouble on you today.” And all Israel '
  - type: note
    content: Lev. 20:2; 24:14
  - type: text
    content: 'stoned him with stones. '
  - type: note
    content: ch. 22:20
  - type: text
    content: 'They burned them with fire and stoned them with stones. '
  '26':
  - type: text
    content: 'And they raised over him '
  - type: note
    content: ch. 8:29; 2 Sam. 18:17; [Lam. 3:53]
  - type: text
    content: 'a great heap of stones that remains to this day. Then '
  - type: note
    content: Deut. 13:17
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' turned from his burning anger. Therefore, to this day the name of that place is called the Valley of Achor.'
  - type: note
    content: Achor means trouble
  '3':
  - type: text
    content: 'And they returned to Joshua and said to him, “Do not have all the people go up, but let about two or three thousand men go up and attack Ai. Do not make the whole people toil up there, for they are few.” '
  '4':
  - type: text
    content: 'So about three thousand men went up there from the people. And '
  - type: note
    content: Lev. 26:17; Deut. 28:25
  - type: text
    content: 'they fled before the men of Ai, '
  '5':
  - type: text
    content: 'and the men of Ai killed about thirty-six of their men and chased them before the gate as far as Shebarim and struck them at the descent. And the hearts of the people '
  - type: note
    content: ch. 2:9, 11
  - type: text
    content: melted and became as water.
  '6':
  - type: text
    content: 'Then Joshua '
  - type: note
    content: Gen. 37:29, 34; Num. 14:6; 2 Sam. 1:11; 13:31
  - type: text
    content: 'tore his clothes and '
  - type: note
    content: Num. 14:5
  - type: text
    content: 'fell to the earth on his face before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' until the evening, he and the elders of Israel. And they put '
  - type: note
    content: 1 Sam. 4:12
  - type: text
    content: 'dust on their heads. '
  '7':
  - type: text
    content: 'And Joshua said, “Alas, O Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: Ex. 5:22; 2 Kgs. 3:10
  - type: text
    content: 'why have you brought this people over the Jordan at all, to give us into the hands of the Amorites, to destroy us? Would that we had been content to dwell beyond the Jordan! '
  '8':
  - type: text
    content: 'O Lord, what can I say, when Israel has turned their backs before their enemies! '
  '9':
  - type: text
    content: 'For the Canaanites and all the inhabitants of the land will hear of it and will surround us and '
  - type: note
    content: Ps. 83:4
  - type: text
    content: cut off our name from the earth. And what will you do for your great name?”
  - type: heading
    content: The Sin of Achan
