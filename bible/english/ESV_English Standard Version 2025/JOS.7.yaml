  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took them out of the tent and brought them to Joshua and to all the people of Israel. And they laid them down before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua and all Israel with him took Achan the son of Zerah, and the silver and the cloak and the bar of gold, and his sons and daughters and his oxen and donkeys and sheep and his tent and all that he had. And they brought them up to the '
