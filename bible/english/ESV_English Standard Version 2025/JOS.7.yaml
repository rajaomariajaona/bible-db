        marker: ref
        children:
        - type: text
          text: Ex. 5:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 3:10
      marker-yv: yv-n
    - type: text
      text: 'why have you brought this people over the Jordan at all, to give us into the hands of the Amorites, to destroy us? Would that we had been content to dwell beyond the Jordan! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O Lord, what can I say, when Israel has turned their backs before their enemies! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Canaanites and all the inhabitants of the land will hear of it and will surround us and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 83:4
      marker-yv: yv-n
