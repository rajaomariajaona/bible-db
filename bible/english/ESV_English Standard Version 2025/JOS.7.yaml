        - type: text
          text: Num. 26:20
      marker-yv: yv-n
    - type: text
      text: 'Zerahites was taken. And he brought near the clan of the Zerahites man by man, and Zabdi was taken. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought near his household man by man, and Achan the son of Carmi, son of Zabdi, son of Zerah, of the tribe of Judah, was taken. '
  '19':
