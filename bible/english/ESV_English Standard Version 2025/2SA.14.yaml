document_id: 2SA.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Absalom Returns to Jerusalem
  - type: text
    content: 'Now Joab the son of Zeruiah knew '
  - type: note
    content: ch. 13:39
  - type: text
    content: 'that the king’s heart went out to Absalom. '
  '10':
  - type: text
    content: 'The king said, “If anyone says anything to you, bring him to me, and he shall never touch you again.” '
  '11':
  - type: text
    content: 'Then she said, “Please let the king invoke the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, that '
  - type: note
    content: Num. 35:19, 21; Deut. 19:12
  - type: text
    content: 'the avenger of blood kill no more, and my son be not destroyed.” He said, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: 1 Sam. 14:45; Acts 27:34
  - type: text
    content: not one hair of your son shall fall to the ground.”
  '12':
  - type: text
    content: 'Then the woman said, “Please let your servant speak a word to my lord the king.” He said, “Speak.” '
  '13':
  - type: text
    content: 'And the woman said, “Why then have you planned such a thing against '
  - type: note
    content: Judg. 20:2
  - type: text
    content: 'the people of God? For in giving this decision the king convicts himself, inasmuch as the king does not bring '
  - type: note
    content: '[ch. 13:37, 38]'
  - type: text
    content: 'his banished one home again. '
  '14':
  - type: text
    content: 'We must all die; we are '
  - type: note
    content: '[1 Sam. 7:6]'
  - type: text
    content: 'like water spilled on the ground, which cannot be gathered up again. But God will not take away life, and he devises means '
  - type: note
    content: Num. 35:15, 25, 28
  - type: text
    content: 'so that the banished one will not remain an outcast. '
  '15':
  - type: text
    content: 'Now I have come to say this to my lord the king because the people have made me afraid, and your servant thought, ‘I will speak to the king; it may be that the king will perform the request of his servant. '
  '16':
  - type: text
    content: 'For the king will hear and deliver his servant from the hand of the man who would destroy me and my son together from '
  - type: note
    content: See 1 Sam. 26:19
  - type: text
    content: 'the heritage of God.’ '
  '17':
  - type: text
    content: 'And your servant thought, ‘The word of my lord the king will set me at rest,’ for my lord the king is '
  - type: note
    content: ch. 19:27; 1 Sam. 29:9
  - type: text
    content: 'like the angel of God to discern good and evil. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God be with you!”'
  '18':
  - type: text
    content: 'Then the king answered the woman, “Do not hide from me anything I ask you.” And the woman said, “Let my lord the king speak.” '
  '19':
  - type: text
    content: 'The king said, “Is the hand of Joab with you in all this?” The woman answered and said, '
  - type: note
    content: 1 Sam. 1:26
  - type: text
    content: '“As surely as you live, my lord the king, one cannot turn to the right hand or to the left from anything that my lord the king has said. It was your servant Joab who commanded me; '
  - type: note
    content: ver. 3
  - type: text
    content: 'it was he who put all these words in the mouth of your servant. '
  '2':
  - type: text
    content: 'And Joab sent to '
  - type: note
    content: 2 Chr. 11:6; 20:20; Amos 1:1
  - type: text
    content: 'Tekoa and brought from there a wise woman and said to her, “Pretend to be a mourner and put on mourning garments. '
  - type: note
    content: '[ch. 12:20; Ruth 3:3]'
  - type: text
    content: 'Do not anoint yourself with oil, but behave like a woman who has been mourning many days for the dead. '
  '20':
  - type: text
    content: 'In order to change the course of things your servant Joab did this. But my lord has wisdom like the wisdom of '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: the angel of God to know all things that are on the earth.”
  '21':
  - type: text
    content: 'Then the king said to Joab, “Behold now, I grant this; go, bring back the young man Absalom.” '
  '22':
  - type: text
    content: 'And Joab fell on his face to the ground and paid homage '
  - type: note
    content: 1 Kgs. 8:66
  - type: text
    content: 'and blessed the king. And Joab said, “Today your servant knows that I have found favor in your sight, my lord the king, in that the king has granted the request of his servant.” '
  '23':
  - type: text
    content: 'So Joab arose and went to '
  - type: note
    content: ch. 13:38
  - type: text
    content: 'Geshur and brought Absalom to Jerusalem. '
  '24':
  - type: text
    content: And the king said, “Let him dwell apart in his own house; he is not to come into my presence.” So Absalom lived apart in his own house and did not come into the king’s presence.
  '25':
  - type: text
    content: 'Now in all Israel there was no one so much to be praised for his handsome appearance as Absalom. '
  - type: note
    content: Deut. 28:35; Job 2:7; Isa. 1:6
  - type: text
    content: 'From the sole of his foot to the crown of his head there was no blemish in him. '
  '26':
  - type: text
    content: 'And when he cut the hair of his head (for at the end of every year he used to cut it; when it was heavy on him, he '
  - type: note
    content: Ezek. 44:20
  - type: text
    content: cut it), he weighed the hair of his head, two hundred shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' by the king’s weight. '
  '27':
  - type: text
    content: 'There were born '
  - type: note
    content: '[ch. 18:18]'
  - type: text
    content: to Absalom three sons, and one daughter whose name was Tamar. She was a beautiful woman.
  '28':
  - type: text
    content: 'So Absalom lived two full years in Jerusalem, without coming into the king’s presence. '
  '29':
  - type: text
    content: 'Then Absalom sent for Joab, to send him to the king, but Joab would not come to him. And he sent a second time, but Joab would not come. '
  '3':
  - type: text
    content: 'Go to the king and speak thus to him.” So Joab '
  - type: note
    content: ver. 19; [Ex. 4:15]
  - type: text
    content: put the words in her mouth.
  '30':
  - type: text
    content: Then he said to his servants, “See, Joab’s field is next to mine, and he has barley there; go and set it on fire.” So Absalom’s servants set the field on fire.
  - type: note
    content: Septuagint, Dead Sea Scroll add So Joab’s servants came to him with their clothes torn, and they said to him, “The servants of Absalom have set your field on fire.”
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Then Joab arose and went to Absalom at his house and said to him, “Why have your servants set my field on fire?” '
  '32':
  - type: text
    content: 'Absalom answered Joab, “Behold, I sent word to you, ‘Come here, that I may send you to the king, to ask, “Why have I come from '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'Geshur? It would be better for me to be there still.” Now therefore let me go into the presence of the king, '
  - type: note
    content: 1 Sam. 20:8
  - type: text
    content: 'and if there is guilt in me, let him put me to death.’” '
  '33':
  - type: text
    content: Then Joab went to the king and told him, and he summoned Absalom. So he came to the king and bowed himself on his face to the ground before the king, and the king kissed Absalom.
  '4':
  - type: text
    content: 'When the woman of Tekoa came to the king, '
  - type: note
    content: ch. 1:2
  - type: text
    content: 'she fell on her face to the ground and paid homage and said, '
  - type: note
    content: 2 Kgs. 6:26
  - type: text
    content: '“Save me, O king.” '
  '5':
  - type: text
    content: 'And the king said to her, “What is your trouble?” She answered, '
  - type: note
    content: See ch. 12:1
  - type: text
    content: '“Alas, I am a widow; my husband is dead. '
  '6':
  - type: text
    content: 'And your servant had two sons, and they quarreled with one another in the field. There was no one to separate them, and one struck the other and killed him. '
  '7':
  - type: text
    content: 'And now the whole clan has risen against your servant, and they say, ‘Give up the man who struck his brother, that we may put him to death for the life of his brother whom he killed.’ And so they would '
  - type: note
    content: '[Matt. 21:38; Mark 12:7; Luke 20:14]'
  - type: text
    content: 'destroy the heir also. Thus they would quench my coal that is left and leave to my husband neither name nor '
  - type: note
    content: '[Gen. 45:7]'
  - type: text
    content: remnant on the face of the earth.”
  '8':
  - type: text
    content: 'Then the king said to the woman, “Go to your house, and I will give orders concerning you.” '
  '9':
  - type: text
    content: 'And the woman of Tekoa said to the king, '
  - type: note
    content: 1 Sam. 25:24
  - type: text
    content: '“On me be the guilt, my lord the king, and on my father’s house; let the king and his throne be guiltless.” '
