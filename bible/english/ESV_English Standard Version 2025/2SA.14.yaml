          text: Mark 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 20:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'destroy the heir also. Thus they would quench my coal that is left and leave to my husband neither name nor '
    - type: usfm
