    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Absalom answered Joab, “Behold, I sent word to you, ‘Come here, that I may send you to the king, to ask, “Why have I come from '
