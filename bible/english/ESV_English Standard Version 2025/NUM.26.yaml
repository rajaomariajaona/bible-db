document_id: NUM.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Census of the New Generation
  - type: text
    content: ' '
  - type: note
    content: ch. 25:9
  - type: text
    content: 'After the plague, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and to Eleazar the son of Aaron, the priest, '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: See ch. 16:31-35
  - type: text
    content: 'the earth opened its mouth and swallowed them up together with Korah, when that company died, when the fire devoured 250 men, and '
  - type: note
    content: ch. 16:38; [1 Cor. 10:6; 2 Pet. 2:6]
  - type: text
    content: 'they became a warning. '
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 6:24; 1 Chr. 6:22; [ch. 16:32]
  - type: text
    content: the sons of Korah did not die.
  '12':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:10; Ex. 6:15; 1 Chr. 4:24
  - type: text
    content: 'Simeon according to their clans: of Nemuel, the clan of the Nemuelites; of Jamin, the clan of the Jaminites; of Jachin, the clan of the Jachinites; '
  '13':
  - type: text
    content: 'of Zerah, the clan of the Zerahites; of Shaul, the clan of the Shaulites. '
  '14':
  - type: text
    content: 'These are the clans of the Simeonites, '
  - type: note
    content: '[ch. 1:23]'
  - type: text
    content: 22,200.
  '15':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:16
  - type: text
    content: 'Gad according to their clans: of Zephon, the clan of the Zephonites; of Haggi, the clan of the Haggites; of Shuni, the clan of the Shunites; '
  '16':
  - type: text
    content: 'of Ozni, the clan of the Oznites; of Eri, the clan of the Erites; '
  '17':
  - type: text
    content: 'of Arod, the clan of the Arodites; of Areli, the clan of the Arelites. '
  '18':
  - type: text
    content: 'These are the clans of the sons of Gad as they were listed, '
  - type: note
    content: '[ch. 1:25]'
  - type: text
    content: 40,500.
  '19':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:12; 1 Chr. 2:3-5; See Gen. 38:3-10
  - type: text
    content: 'Judah were Er and Onan; and Er and Onan died in the land of Canaan. '
  '2':
  - type: note
    content: ch. 1:2, 3; Ex. 30:12; 38:25, 26
  - type: text
    content: '“Take a census of all the congregation of the people of Israel, from twenty years old and upward, by their fathers’ houses, all in Israel who are able to go to war.” '
  '20':
  - type: text
    content: 'And the sons of Judah according to their clans were: of Shelah, the clan of the Shelanites; of Perez, the clan of the Perezites; of Zerah, the clan of the Zerahites. '
  '21':
  - type: text
    content: 'And the sons of Perez were: of Hezron, the clan of the Hezronites; of Hamul, the clan of the Hamulites. '
  '22':
  - type: text
    content: 'These are the clans of Judah as they were listed, '
  - type: note
    content: '[ch. 1:27]'
  - type: text
    content: 76,500.
  '23':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:13; 1 Chr. 7:1
  - type: text
    content: 'Issachar according to their clans: of Tola, the clan of the Tolaites; of Puvah, the clan of the Punites; '
  '24':
  - type: text
    content: 'of Jashub, the clan of the Jashubites; of Shimron, the clan of the Shimronites. '
  '25':
  - type: text
    content: 'These are the clans of Issachar as they were listed, '
  - type: note
    content: '[ch. 1:29]'
  - type: text
    content: 64,300.
  '26':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:14
  - type: text
    content: 'Zebulun, according to their clans: of Sered, the clan of the Seredites; of Elon, the clan of the Elonites; of Jahleel, the clan of the Jahleelites. '
  '27':
  - type: text
    content: 'These are the clans of the Zebulunites as they were listed, '
  - type: note
    content: '[ch. 1:31]'
  - type: text
    content: 60,500.
  '28':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:20
  - type: text
    content: 'Joseph according to their clans: Manasseh and Ephraim. '
  '29':
  - type: note
    content: For ver. 29-37, see 1 Chr. 7:14-20
  - type: text
    content: 'The sons of Manasseh: of '
  - type: note
    content: Josh. 17:1
  - type: text
    content: 'Machir, the clan of the Machirites; and Machir was the father of Gilead; '
  - type: note
    content: ch. 36:1
  - type: text
    content: 'of Gilead, the clan of the Gileadites. '
  '3':
  - type: text
    content: 'And Moses and Eleazar the priest spoke with them '
  - type: note
    content: ver. 63; See ch. 22:1
  - type: text
    content: 'in the plains of Moab by the Jordan at Jericho, saying, '
  '30':
  - type: text
    content: 'These are the sons of Gilead: of Iezer, the clan of the Iezerites; of Helek, the clan of the Helekites; '
  '31':
  - type: text
    content: 'and of Asriel, the clan of the Asrielites; and of Shechem, the clan of the Shechemites; '
  '32':
  - type: text
    content: 'and of Shemida, the clan of the Shemidaites; and of Hepher, the clan of the Hepherites. '
  '33':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 27:1; 36:11; Josh. 17:3
  - type: text
    content: 'Zelophehad the son of Hepher had no sons, but daughters. And the names of the daughters of Zelophehad were Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '34':
  - type: text
    content: 'These are the clans of Manasseh, and those listed were '
  - type: note
    content: '[ch. 1:35]'
  - type: text
    content: 52,700.
  '35':
  - type: text
    content: 'These are the sons of Ephraim according to their clans: of Shuthelah, the clan of the Shuthelahites; of Becher, the clan of the Becherites; of Tahan, the clan of the Tahanites. '
  '36':
  - type: text
    content: 'And these are the sons of Shuthelah: of Eran, the clan of the Eranites. '
  '37':
  - type: text
    content: 'These are the clans of the sons of Ephraim as they were listed, '
  - type: note
    content: '[ch. 1:33]'
  - type: text
    content: 32,500. These are the sons of Joseph according to their clans.
  '38':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:21; 1 Chr. 7:6; See 1 Chr. 8:1-5
  - type: text
    content: 'Benjamin according to their clans: of Bela, the clan of the Belaites; of Ashbel, the clan of the Ashbelites; of Ahiram, the clan of the Ahiramites; '
  '39':
  - type: text
    content: 'of Shephupham, the clan of the Shuphamites; of Hupham, the clan of the Huphamites. '
  '4':
  - type: text
    content: “Take a census of the people,
  - type: note
    content: Take a census of the people is implied (compare verse 2)
  - type: text
    content: ' from twenty years old and upward,” as the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'commanded Moses. The people of Israel who came out of the land of Egypt were:'
  '40':
  - type: text
    content: 'And the sons of Bela were Ard and Naaman: of Ard, the clan of the Ardites; of Naaman, the clan of the Naamites. '
  '41':
  - type: text
    content: 'These are the sons of Benjamin according to their clans, and those listed were '
  - type: note
    content: '[ch. 1:37]'
  - type: text
    content: 45,600.
  '42':
  - type: text
    content: 'These are the sons of '
  - type: note
    content: Gen. 46:23
  - type: text
    content: 'Dan according to their clans: of Shuham, the clan of the Shuhamites. These are the clans of Dan according to their clans. '
  '43':
  - type: text
    content: 'All the clans of the Shuhamites, as they were listed, were '
  - type: note
    content: '[ch. 1:39]'
  - type: text
    content: 64,400.
  '44':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:17; 1 Chr. 7:30, 31
  - type: text
    content: 'Asher according to their clans: of Imnah, the clan of the Imnites; of Ishvi, the clan of the Ishvites; of Beriah, the clan of the Beriites. '
  '45':
  - type: text
    content: 'Of the sons of Beriah: of Heber, the clan of the Heberites; of Malchiel, the clan of the Malchielites. '
  '46':
  - type: text
    content: 'And the name of the daughter of Asher was Serah. '
  '47':
  - type: text
    content: 'These are the clans of the sons of Asher as they were listed, '
  - type: note
    content: '[ch. 1:41]'
  - type: text
    content: 53,400.
  '48':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 46:24; 1 Chr. 7:13
  - type: text
    content: 'Naphtali according to their clans: of Jahzeel, the clan of the Jahzeelites; of Guni, the clan of the Gunites; '
  '49':
  - type: text
    content: 'of Jezer, the clan of the Jezerites; of Shillem, the clan of the Shillemites. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: Gen. 46:8, 9; Ex. 6:14; 1 Chr. 5:1-3
  - type: text
    content: 'Reuben, the firstborn of Israel; the sons of Reuben: of Hanoch, the clan of the Hanochites; of Pallu, the clan of the Palluites; '
  '50':
  - type: text
    content: 'These are the clans of Naphtali according to their clans, and those listed were '
  - type: note
    content: '[ch. 1:43]'
  - type: text
    content: 45,400.
  '51':
  - type: text
    content: 'This was the list of the people of Israel, '
  - type: note
    content: '[ch. 1:46]'
  - type: text
    content: 601,730.
  '52':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '53':
  - type: note
    content: Josh. 11:23; 14:1, 2; Ps. 105:44
  - type: text
    content: '“Among these the land shall be divided for inheritance according to the number of names. '
  '54':
  - type: note
    content: ch. 33:54; 35:8
  - type: text
    content: 'To a large tribe you shall give a large inheritance, and to a small tribe you shall give a small inheritance; every tribe shall be given its inheritance in proportion to its list. '
  '55':
  - type: text
    content: 'But the land shall be '
  - type: note
    content: ch. 33:54; 34:13; Josh. 11:23; 14:2
  - type: text
    content: 'divided by lot. According to the names of the tribes of their fathers they shall inherit. '
  '56':
  - type: text
    content: Their inheritance shall be divided according to lot between the larger and the smaller.”
  '57':
  - type: text
    content: ' '
  - type: note
    content: Gen. 46:11; See Ex. 6:16-19; 1 Chr. 6:1, 16-30
  - type: text
    content: 'This was the list of the Levites according to their clans: of Gershon, the clan of the Gershonites; of Kohath, the clan of the Kohathites; of Merari, the clan of the Merarites. '
  '58':
  - type: text
    content: 'These are the clans of Levi: the clan of the Libnites, the clan of the Hebronites, the clan of the Mahlites, the clan of the Mushites, the clan of the Korahites. And Kohath was the father of Amram. '
  '59':
  - type: text
    content: 'The name of Amram’s wife was '
  - type: note
    content: Ex. 2:1, 2, 4; 6:20
  - type: text
    content: 'Jochebed the daughter of Levi, who was born to Levi in Egypt. And she bore to Amram Aaron and Moses and Miriam their sister. '
  '6':
  - type: text
    content: 'of Hezron, the clan of the Hezronites; of Carmi, the clan of the Carmites. '
  '60':
  - type: note
    content: ch. 3:2; 1 Chr. 24:1
  - type: text
    content: 'And to Aaron were born Nadab, Abihu, Eleazar, and Ithamar. '
  '61':
  - type: note
    content: ch. 3:4; Lev. 10:1, 2; 1 Chr. 24:2
  - type: text
    content: 'But Nadab and Abihu died when they offered unauthorized fire before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '62':
  - type: text
    content: 'And those listed were '
  - type: note
    content: '[ch. 3:39]'
  - type: text
    content: '23,000, every male from a month old and upward. For '
  - type: note
    content: ch. 1:49
  - type: text
    content: 'they were not listed among the people of Israel, because '
  - type: note
    content: See ch. 18:20
  - type: text
    content: there was no inheritance given to them among the people of Israel.
  '63':
  - type: text
    content: 'These were those listed by Moses and Eleazar the priest, who listed the people of Israel '
  - type: note
    content: ver. 3; See ch. 22:1
  - type: text
    content: 'in the plains of Moab by the Jordan at Jericho. '
  '64':
  - type: note
    content: '[ch. 1:44; Deut. 2:14, 15]'
  - type: text
    content: 'But among these there was not one of those listed by Moses and Aaron the priest, who had listed the people of Israel in the wilderness of Sinai. '
  '65':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had said of them, '
  - type: note
    content: ch. 14:28, 29; 1 Cor. 10:5
  - type: text
    content: '“They shall die in the wilderness.” Not one of them was left, '
  - type: note
    content: See ch. 13:6
  - type: text
    content: except Caleb the son of Jephunneh and Joshua the son of Nun.
  '7':
  - type: text
    content: 'These are the clans of the Reubenites, and those listed were '
  - type: note
    content: '[ch. 1:21]'
  - type: text
    content: '43,730. '
  '8':
  - type: text
    content: 'And the sons of Pallu: Eliab. '
  '9':
  - type: text
    content: 'The sons of Eliab: Nemuel, Dathan, and Abiram. These are the Dathan and Abiram, '
  - type: note
    content: ch. 1:16; 16:2
  - type: text
    content: 'chosen from the congregation, who contended against Moses and Aaron in the company of Korah, when they contended against the '
  - type: text
    content: Lord
  - type: text
    content: ' '
