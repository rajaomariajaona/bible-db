document_id: GEN.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Sent to Laban
  - type: text
    content: 'Then Isaac called Jacob '
  - type: note
    content: ver. 6
  - type: text
    content: 'and blessed him and directed him, '
  - type: note
    content: '[See ch. 27:46 above]'
  - type: text
    content: '“You must not take a wife from the Canaanite women. '
  '10':
  - type: text
    content: 'Jacob left '
  - type: note
    content: ch. 21:31; 26:33
  - type: text
    content: 'Beersheba and went toward '
  - type: note
    content: '[Acts 7:2]'
  - type: text
    content: 'Haran. '
  '11':
  - type: text
    content: 'And he came to a certain place and stayed there that night, because the sun had set. Taking one of the stones of the place, he put it under his head and lay down in that place to sleep. '
  '12':
  - type: text
    content: 'And he '
  - type: note
    content: '[Num. 12:6; Job 33:15, 16]'
  - type: text
    content: dreamed, and behold, there was a ladder
  - type: note
    content: Or a flight of steps
  - type: text
    content: ' set up on the earth, and the top of it reached to heaven. And behold, '
  - type: note
    content: '[John 1:51]'
  - type: text
    content: 'the angels of God were ascending and descending on it! '
  '13':
  - type: text
    content: 'And behold, '
  - type: note
    content: '[ch. 35:1; 48:3]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' stood above it'
  - type: note
    content: Or beside him
  - type: text
    content: ' and said, '
  - type: note
    content: ch. 26:24
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Abraham your father and the God of Isaac. '
  - type: note
    content: ch. 35:12; See ch. 13:14-16
  - type: text
    content: 'The land on which you lie I will give to you and to your offspring. '
  '14':
  - type: text
    content: 'Your offspring shall be like '
  - type: note
    content: See ch. 13:16
  - type: text
    content: 'the dust of the earth, and you shall spread abroad to the west and to the east and to the north and to the south, and in you and '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'your offspring shall all the families of the earth be blessed. '
  '15':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 26:24; 31:3
  - type: text
    content: 'I am with you and will keep you wherever you go, and '
  - type: note
    content: ch. 35:6
  - type: text
    content: 'will bring you back to this land. For I will '
  - type: note
    content: 1 Kgs. 8:57
  - type: text
    content: 'not leave you until I have done what I have promised you.” '
  '16':
  - type: text
    content: 'Then Jacob awoke from his sleep and said, “Surely the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: Ex. 3:5; Josh. 5:15
  - type: text
    content: 'in this place, and I did not know it.” '
  '17':
  - type: text
    content: And he was afraid and said, “How awesome is this place! This is none other than the house of God, and this is the gate of heaven.”
  '18':
  - type: text
    content: 'So early in the morning Jacob took the stone that he had put under his head and set it up '
  - type: note
    content: ch. 31:13, 45; 35:14; [1 Sam. 7:12; 2 Sam. 18:18]
  - type: text
    content: 'for a pillar '
  - type: note
    content: '[Lev. 8:10, 11; Num. 7:1]'
  - type: text
    content: 'and poured oil on the top of it. '
  '19':
  - type: text
    content: 'He called the name of that place '
  - type: note
    content: ch. 35:7; Judg. 1:23, 26
  - type: text
    content: Bethel,
  - type: note
    content: Bethel means the house of God
  - type: text
    content: ' but the name of the city was Luz at the first. '
  '2':
  - type: note
    content: Hos. 12:12
  - type: text
    content: 'Arise, go to Paddan-aram to the house of '
  - type: note
    content: ch. 22:23
  - type: text
    content: 'Bethuel your mother’s father, and take as your wife from there one of the daughters of Laban your mother’s brother. '
  '20':
  - type: text
    content: 'Then Jacob '
  - type: note
    content: ch. 31:13
  - type: text
    content: 'made a vow, saying, “If God will be with me and will keep me in this way that I go, and will give me bread to eat and clothing to wear, '
  '21':
  - type: note
    content: '[Judg. 11:31; 2 Sam. 15:7-9]'
  - type: text
    content: 'so that I come again to my father’s house in peace, '
  - type: note
    content: Deut. 26:17
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be my God, '
  '22':
  - type: text
    content: 'and this stone, which I have set up for a pillar, '
  - type: note
    content: ch. 35:7, 14
  - type: text
    content: 'shall be God’s house. And '
  - type: note
    content: ch. 14:20; Lev. 27:30-33
  - type: text
    content: of all that you give me I will give a full tenth to you.”
  '3':
  - type: note
    content: See ch. 17:1
  - type: text
    content: God Almighty
  - type: note
    content: Hebrew El Shaddai
  - type: text
    content: ' bless you and make you fruitful and multiply you, that you may become a company of peoples. '
  '4':
  - type: text
    content: 'May he give '
  - type: note
    content: See ch. 12:2, 3
  - type: text
    content: 'the blessing of Abraham to you and to your offspring with you, that you may take possession of '
  - type: note
    content: ch. 17:8; 36:7; 37:1
  - type: text
    content: 'the land of your sojournings that God gave to Abraham!” '
  '5':
  - type: text
    content: Thus Isaac sent Jacob away. And he went to Paddan-aram, to Laban, the son of Bethuel the Aramean, the brother of Rebekah, Jacob’s and Esau’s mother.
  - type: heading
    content: Esau Marries an Ishmaelite
  '6':
  - type: text
    content: 'Now Esau saw that Isaac had blessed Jacob and sent him away to Paddan-aram to take a wife from there, and that as he blessed him he directed him, “You must not take a wife from the Canaanite women,” '
  '7':
  - type: text
    content: 'and that Jacob had obeyed his father and his mother and gone to Paddan-aram. '
  '8':
  - type: text
    content: 'So when Esau saw '
  - type: note
    content: ch. 24:3; 26:35
  - type: text
    content: 'that the Canaanite women did not please Isaac his father, '
  '9':
  - type: text
    content: 'Esau went to Ishmael and took as his wife, besides the wives he had, '
  - type: note
    content: '[ch. 36:3]'
  - type: text
    content: 'Mahalath the daughter of Ishmael, Abraham’s son, the sister of '
  - type: note
    content: ch. 25:13; 36:3
  - type: text
    content: Nebaioth.
  - type: heading
    content: Jacob’s Dream
