document_id: 2KI.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see 2 Chr. 33:1-9
  - type: text
    content: 'Manasseh was twelve years old when he began to reign, and he reigned fifty-five years in Jerusalem. His mother’s name was Hephzibah. '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said by his servants the prophets, '
  '11':
  - type: note
    content: ver. 2; ch. 23:26; 24:3, 4; Jer. 15:4
  - type: text
    content: '“Because Manasseh king of Judah has committed these abominations and has done things '
  - type: note
    content: 1 Kgs. 21:26
  - type: text
    content: 'more evil than all that the Amorites did, who were before him, '
  - type: note
    content: ver. 16
  - type: text
    content: 'and has made Judah also to sin '
  - type: note
    content: ver. 21
  - type: text
    content: 'with his idols, '
  '12':
  - type: text
    content: 'therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Behold, I am bringing upon Jerusalem and Judah such disaster'
  - type: note
    content: Or evil
  - type: text
    content: ' that the ears of everyone who hears of it '
  - type: note
    content: 1 Sam. 3:11; Jer. 19:3
  - type: text
    content: 'will tingle. '
  '13':
  - type: note
    content: Isa. 34:11; [Isa. 28:17; Lam. 2:8; Amos 7:7, 8]
  - type: text
    content: 'And I will stretch over Jerusalem the measuring line of Samaria, and the plumb line of the house of Ahab, and I will wipe Jerusalem as one wipes a dish, wiping it and turning it upside down. '
  '14':
  - type: text
    content: 'And I will forsake the remnant of my heritage and give them into the hand of their enemies, and they shall become a prey and a spoil to all their enemies, '
  '15':
  - type: text
    content: because they have done what is evil in my sight and have provoked me to anger, since the day their fathers came out of Egypt, even to this day.”
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:4
  - type: text
    content: 'Moreover, Manasseh shed very much innocent blood, till he had filled Jerusalem from one end to another, besides the sin '
  - type: note
    content: ver. 11
  - type: text
    content: 'that he made Judah to sin so that they did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: See 2 Chr. 33:11-19
  - type: text
    content: 'Now the rest of the acts of Manasseh and all that he did, and the sin that he committed, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '18':
  - type: note
    content: For ver. 18-24, see 2 Chr. 33:20-25
  - type: text
    content: 'And Manasseh slept with his fathers and was buried in the garden of his house, '
  - type: note
    content: ver. 26
  - type: text
    content: in the garden of Uzza, and Amon his son reigned in his place.
  - type: heading
    content: Amon Reigns in Judah
  '19':
  - type: text
    content: 'Amon was twenty-two years old when he began to reign, and he reigned two years in Jerusalem. His mother’s name was Meshullemeth the daughter of Haruz of Jotbah. '
  '2':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 16:3]'
  - type: text
    content: 'according to the despicable practices of the nations whom the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before the people of Israel. '
  '20':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ver. 2-6, 11
  - type: text
    content: 'as Manasseh his father had done. '
  '21':
  - type: text
    content: 'He walked in all the way in which his father walked and served '
  - type: note
    content: ver. 11
  - type: text
    content: 'the idols that his father served and worshiped them. '
  '22':
  - type: note
    content: ch. 22:17; [1 Kgs. 11:33]
  - type: text
    content: 'He abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his fathers, and did not walk in the way of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'And the servants of Amon conspired against him and put the king to death in his house. '
  '24':
  - type: text
    content: 'But the people of the land struck down all those who had conspired against King Amon, and the people of the land made Josiah his son king in his place. '
  '25':
  - type: text
    content: 'Now the rest of the acts of Amon that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '26':
  - type: text
    content: 'And he was buried in his tomb '
  - type: note
    content: ver. 18
  - type: text
    content: in the garden of Uzza, and Josiah his son reigned in his place.
  '3':
  - type: text
    content: 'For he rebuilt the high places '
  - type: note
    content: ch. 18:4
  - type: text
    content: 'that Hezekiah his father had destroyed, and he erected altars for Baal and made '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: 'an Asherah, '
  - type: note
    content: 1 Kgs. 16:32, 33
  - type: text
    content: 'as Ahab king of Israel had done, '
  - type: note
    content: ch. 17:16; 23:5; [Deut. 4:19]
  - type: text
    content: 'and worshiped all the host of heaven and served them. '
  '4':
  - type: note
    content: Jer. 7:30; 32:34
  - type: text
    content: 'And he built altars in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', of which the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, '
  - type: note
    content: ver. 7; ch. 23:27; 2 Sam. 7:13; 1 Kgs. 8:29; 9:3; [Deut. 12:11]
  - type: text
    content: '“In Jerusalem will I put my name.” '
  '5':
  - type: text
    content: 'And he built altars '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'for all the host of heaven in '
  - type: note
    content: ch. 23:12; 1 Kgs. 6:36; 7:12
  - type: text
    content: 'the two courts of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: note
    content: See Lev. 18:21
  - type: text
    content: And he burned his son as an offering
  - type: note
    content: Hebrew made his son pass through the fire
  - type: text
    content: ' and '
  - type: note
    content: See Lev. 19:26
  - type: text
    content: 'used fortune-telling and '
  - type: note
    content: ch. 17:17
  - type: text
    content: 'omens and dealt '
  - type: note
    content: ch. 23:24; See Lev. 19:31
  - type: text
    content: 'with mediums and with necromancers. He did much evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', provoking him to anger. '
  '7':
  - type: text
    content: 'And the carved image of '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Asherah that he had made he set in the house of which the '
  - type: text
    content: Lord
  - type: text
    content: ' said to David and to Solomon his son, “In this house, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put my name forever. '
  '8':
  - type: note
    content: '[2 Sam. 7:19]'
  - type: text
    content: 'And I will not cause the feet of Israel to wander anymore out of the land that I gave to their fathers, if only they will be careful to do according to all that I have commanded them, and according to all the Law that my servant Moses commanded them.” '
  '9':
  - type: text
    content: 'But they did not listen, and Manasseh led them astray to do more evil than the nations had done whom the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed before the people of Israel.'
  - type: heading
    content: Manasseh’s Idolatry Denounced
