document_id: 2CO.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Light of the Gospel
  - type: text
    content: 'Therefore, having '
  - type: note
    content: See ch. 3:6
  - type: text
    content: 'this ministry '
  - type: note
    content: 1 Cor. 7:25; 1 Tim. 1:13
  - type: text
    content: by the mercy of God,
  - type: note
    content: Greek having this ministry as we have received mercy
  - type: text
    content: ' we do not lose heart. '
  '10':
  - type: note
    content: ch. 6:9; 1 Cor. 4:9; 15:31; [ch. 1:5, 9; Rom. 6:5; 8:36]
  - type: text
    content: 'always carrying in the body the death of Jesus, '
  - type: note
    content: 2 Tim. 2:11; [Rom. 5:10; 6:8]
  - type: text
    content: 'so that the life of Jesus also may be manifested in our bodies. '
  '11':
  - type: text
    content: 'For we who live are always being given over to death for Jesus’ sake, so that the life of Jesus also may be manifested in our mortal flesh. '
  '12':
  - type: text
    content: 'So '
  - type: note
    content: '[ch. 13:9]'
  - type: text
    content: death is at work in us, but life in you.
  '13':
  - type: text
    content: 'Since we have '
  - type: note
    content: 1 Cor. 12:9; 2 Pet. 1:1
  - type: text
    content: 'the same spirit of faith according to what has been written, '
  - type: note
    content: Cited from Ps. 116:10
  - type: text
    content: '“I believed, and so I spoke,” we also believe, and so we also speak, '
  '14':
  - type: text
    content: 'knowing that '
  - type: note
    content: 1 Thess. 4:14; See Acts 2:24
  - type: text
    content: 'he who raised the Lord Jesus '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'will raise us also with Jesus and '
  - type: note
    content: '[Jude 24]'
  - type: text
    content: 'bring us with you into his presence. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 1:6]; See Rom. 8:28'
  - type: text
    content: 'it is all for your sake, so that as '
  - type: note
    content: '[ch. 1:11; 9:11, 12]'
  - type: text
    content: 'grace extends to more and more people it may increase thanksgiving, '
  - type: note
    content: ch. 8:19
  - type: text
    content: to the glory of God.
  '16':
  - type: text
    content: 'So we do not lose heart. '
  - type: note
    content: See Acts 20:24
  - type: text
    content: Though our outer self
  - type: note
    content: Greek man
  - type: text
    content: ' is wasting away, '
  - type: note
    content: See Rom. 7:22
  - type: text
    content: 'our inner self '
  - type: note
    content: '[Isa. 40:30, 31]; See Rom. 12:2'
  - type: text
    content: 'is being renewed day by day. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 8:18; 1 Pet. 1:6; 5:10; [Ps. 30:5; Isa. 54:7]
  - type: text
    content: 'this light momentary affliction is preparing for us an eternal weight of glory beyond all comparison, '
  '18':
  - type: note
    content: ch. 5:7; Rom. 8:24; Heb. 11:1, 13
  - type: text
    content: as we look not to the things that are seen but to the things that are unseen. For the things that are seen are transient, but the things that are unseen are eternal.
  '2':
  - type: text
    content: 'But we have renounced '
  - type: note
    content: See Rom. 6:21
  - type: text
    content: disgraceful, underhanded ways. We refuse to practice
  - type: note
    content: Greek to walk in
  - type: text
    content: ' cunning or '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'to tamper with God’s word, but '
  - type: note
    content: ch. 6:7; 7:14
  - type: text
    content: 'by the open statement of the truth '
  - type: note
    content: ch. 5:11, 12
  - type: text
    content: 'we would commend ourselves to everyone’s conscience in the sight of God. '
  '3':
  - type: text
    content: 'And even '
  - type: note
    content: '[ch. 3:14]'
  - type: text
    content: 'if our gospel is veiled, '
  - type: note
    content: '[Matt. 13:15]'
  - type: text
    content: 'it is veiled to '
  - type: note
    content: ch. 2:15; 1 Cor. 1:18; 2 Thess. 2:10
  - type: text
    content: 'those who are perishing. '
  '4':
  - type: text
    content: 'In their case '
  - type: note
    content: See John 12:31
  - type: text
    content: 'the god of this world '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'has blinded the minds of the unbelievers, to keep them from seeing '
  - type: note
    content: ver. 6; See Acts 26:18
  - type: text
    content: 'the light of '
  - type: note
    content: See ch. 3:18
  - type: text
    content: 'the gospel of the glory of Christ, '
  - type: note
    content: Col. 1:15; [Phil. 2:6; Heb. 1:3]
  - type: text
    content: 'who is the image of God. '
  '5':
  - type: text
    content: 'For what '
  - type: note
    content: '[1 Thess. 2:6]'
  - type: text
    content: 'we proclaim is not ourselves, but Jesus Christ as Lord, with '
  - type: note
    content: 1 Cor. 9:19; See ch. 1:24
  - type: text
    content: ourselves as your servants
  - type: note
    content: Or slaves (for the contextual rendering of the Greek word doulos, see Preface)
  - type: text
    content: ' for Jesus’ sake. '
  '6':
  - type: text
    content: 'For God, who said, '
  - type: note
    content: Gen. 1:3
  - type: text
    content: '“Let light shine out of darkness,” '
  - type: note
    content: 2 Pet. 1:19
  - type: text
    content: 'has shone in our hearts to give '
  - type: note
    content: ver. 4
  - type: text
    content: the light of the knowledge of the glory of God in the face of Jesus Christ.
  - type: heading
    content: Treasure in Jars of Clay
  '7':
  - type: text
    content: 'But we have this treasure in '
  - type: note
    content: 2 Tim. 2:20; [ch. 5:1; Job 10:9; 13:12; Lam. 4:2; 1 Thess. 4:4; 1 Pet. 3:7]
  - type: text
    content: 'jars of clay, '
  - type: note
    content: 1 Cor. 2:5; [Judg. 7:2]
  - type: text
    content: 'to show that the surpassing power belongs to God and not to us. '
  '8':
  - type: text
    content: 'We are '
  - type: note
    content: ch. 7:5; [Ps. 129:2]
  - type: text
    content: 'afflicted in every way, but not crushed; perplexed, but not driven to despair; '
  '9':
  - type: text
    content: 'persecuted, but '
  - type: note
    content: Heb. 13:5; [Deut. 4:31]
  - type: text
    content: 'not forsaken; '
  - type: note
    content: Ps. 37:24; Prov. 24:16; Mic. 7:8
  - type: text
    content: 'struck down, but not destroyed; '
