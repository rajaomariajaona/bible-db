document_id: LUK.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plot to Kill Jesus
  - type: text
    content: ' '
  - type: note
    content: For ver. 1, 2, see Matt. 26:2-5; Mark 14:1, 2
  - type: text
    content: 'Now the Feast of Unleavened Bread drew near, which is called '
  - type: note
    content: See John 6:4
  - type: text
    content: 'the Passover. '
  '10':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Behold, when you have entered the city, a man carrying a jar of water will meet you. Follow him into the house that he enters
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'and tell the master of the house, '
  - type: note
    content: See John 11:28
  - type: text
    content: '‘The Teacher says to you, Where is '
  - type: note
    content: ch. 2:7 (Gk.)
  - type: text
    content: the guest room, where I may eat the Passover with my disciples?’
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And he will show you '
  - type: note
    content: '[Acts 1:13]'
  - type: text
    content: a large upper room furnished; prepare it there.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And they went and found it '
  - type: note
    content: ch. 19:32
  - type: text
    content: just as he had told them, and they prepared the Passover.
  - type: heading
    content: Institution of the Lord’s Supper
  '14':
  - type: text
    content: ' '
  - type: note
    content: Matt. 26:20; Mark 14:17
  - type: text
    content: 'And when the hour came, he reclined at table, and the apostles with him. '
  '15':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “I have earnestly desired to eat this Passover with you before I suffer.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For I tell you I will not eat it
  - type: note
    content: Some manuscripts never eat it again
  - type: text
    content: ' '
  - type: note
    content: '[ver. 30; ch. 14:15; Rev. 19:9]'
  - type: text
    content: until it is fulfilled in the kingdom of God.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And he took a cup, and '
  - type: note
    content: See Matt. 15:36
  - type: text
    content: 'when he had given thanks he said, '
  - type: text
    content: “Take this, and divide it among yourselves.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Matt. 26:29; Mark 14:25
  - type: text
    content: 'For I tell you that from now on I will not drink of the fruit of the vine '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: until the kingdom of God comes.”
  - type: text
    content: ' '
  '19':
  - type: note
    content: For ver. 19, 20, see Matt. 26:26-28; Mark 14:22-24; 1 Cor. 11:23-25
  - type: text
    content: 'And he took bread, and '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'when he had given thanks, he broke it and gave it to them, saying, '
  - type: note
    content: 1 Cor. 10:16; [John 6:53]
  - type: text
    content: “This is my body, which is given for you. Do this in remembrance of me.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And the chief priests and the scribes '
  - type: note
    content: John 11:53; See Matt. 21:46
  - type: text
    content: were seeking how to put him to death, for they feared the people.
  - type: heading
    content: Judas to Betray Jesus
  '20':
  - type: text
    content: 'And likewise the cup after they had eaten, saying, '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: '“This cup that is poured out for you is '
  - type: note
    content: See 2 Cor. 3:6
  - type: text
    content: 'the new '
  - type: note
    content: Ex. 24:8; [Zech. 9:11; Heb. 13:20]
  - type: text
    content: covenant in my blood.
  - type: note
    content: Some manuscripts omit, in whole or in part, verses 19b-20 (which is given . . . in my blood)
  - type: text
    content: ' '
  '21':
  - type: note
    content: For ver. 21-23, see Matt. 26:21-24; Mark 14:18-21; [John 13:21-26]
  - type: text
    content: 'But behold, the hand of him who betrays me is '
  - type: note
    content: '[Ps. 41:9; John 13:18]'
  - type: text
    content: with me on the table.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'For the Son of Man goes '
  - type: note
    content: Acts 2:23
  - type: text
    content: as it has been determined, but woe to that man by whom he is betrayed!”
  - type: text
    content: ' '
  '23':
  - type: text
    content: And they began to question one another, which of them it could be who was going to do this.
  - type: heading
    content: Who Is the Greatest?
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:46; Mark 9:34
  - type: text
    content: 'A dispute also arose among them, as to which of them was to be regarded as the greatest. '
  '25':
  - type: note
    content: For ver. 25-27, [Matt. 18:1-4; 20:25-28; Mark 10:42-45]
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“The kings of the Gentiles '
  - type: note
    content: 1 Pet. 5:3
  - type: text
    content: exercise lordship over them, and those in authority over them are called benefactors.
  - type: text
    content: ' '
  '26':
  - type: note
    content: ch. 9:48; [Matt. 23:11]
  - type: text
    content: 'But not so with you. Rather, let '
  - type: note
    content: '[See ver. 25above]'
  - type: text
    content: the greatest among you become as the youngest, and the leader as one who serves.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'For who is the greater, '
  - type: note
    content: '[ch. 12:37]'
  - type: text
    content: 'one who reclines at table or one who serves? Is it not the one who reclines at table? But '
  - type: note
    content: See Matt. 20:28
  - type: text
    content: I am among you as the one who serves.
  '28':
  - type: text
    content: ' '
  - type: text
    content: '“You are those who have stayed with me '
  - type: note
    content: '[See Heb. 2:18; 4:15 ]'
  - type: text
    content: in my trials,
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'and '
  - type: note
    content: 2 Tim. 2:12; [John 17:18]; See Matt. 25:34; 28:18; Acts 14:22; Rev. 1:6
  - type: text
    content: I assign to you, as my Father assigned to me, a kingdom,
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: note
    content: For ver. 3-6, see Matt. 26:14-16; Mark 14:10, 11; [ John 13:2, 27, 30 ]
  - type: text
    content: 'Then '
  - type: note
    content: '[Acts 5:3]'
  - type: text
    content: 'Satan entered into '
  - type: note
    content: ch. 6:16; Matt. 27:3; Acts 1:16; [John 6:71; 12:4]
  - type: text
    content: 'Judas called Iscariot, who was of the number of the twelve. '
  '30':
  - type: note
    content: '[ver. 16; ch. 13:29; 14:15; Matt. 8:11]'
  - type: text
    content: 'that you may eat and drink at my table in my kingdom and '
  - type: note
    content: See Matt. 19:28
  - type: text
    content: 'sit on thrones judging '
  - type: note
    content: Acts 26:7; James 1:1; Rev. 21:12
  - type: text
    content: the twelve tribes of Israel.
  - type: heading
    content: Jesus Foretells Peter’s Denial
  '31':
  - type: text
    content: ' '
  - type: text
    content: '“Simon, Simon, behold, '
  - type: note
    content: Job 1:6-12; 2:1-6; [ 2 Cor. 2:11; 1 Pet. 5:8 ]; See 1 Cor. 5:5
  - type: text
    content: Satan demanded to have you,
  - type: text
    content: ' '
  - type: note
    content: The Greek word for you (twice in this verse) is plural; in verse 32, all four instances are singular
  - type: note
    content: Amos 9:9; [John 16:32]
  - type: text
    content: that he might sift you like wheat,
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'but '
  - type: note
    content: John 17:9, 11, 15
  - type: text
    content: 'I have prayed for you that your faith may not fail. And when you have turned again, '
  - type: note
    content: '[Ps. 51:13; John 21:15-17]'
  - type: text
    content: strengthen your brothers.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: Peter
  - type: note
    content: Greek He
  - type: text
    content: ' said to him, “Lord, I am ready to go with you both '
  - type: note
    content: '[Acts 12:4]'
  - type: text
    content: 'to prison and '
  - type: note
    content: '[John 21:19]'
  - type: text
    content: 'to death.” '
  '34':
  - type: note
    content: '[Matt. 26:33-35; Mark 14:29-31; John 13:37, 38]'
  - type: text
    content: Jesus
  - type: note
    content: Greek He
  - type: text
    content: ' said, '
  - type: text
    content: “I tell you, Peter, the rooster will not crow this day, until you deny three times that you know me.”
  - type: heading
    content: Scripture Must Be Fulfilled in Jesus
  '35':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: ch. 9:3; 10:4; Matt. 10:9, 10; Mark 6:8
  - type: text
    content: “When I sent you out with no moneybag or knapsack or sandals, did you lack anything?”
  - type: text
    content: ' They said, “Nothing.” '
  '36':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “But now let the one who has a moneybag take it, and likewise a knapsack. And let the one who has no sword sell his cloak and buy one.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For I tell you that '
  - type: note
    content: '[Acts 1:16]; See ch. 13:33; Matt. 1:22'
  - type: text
    content: 'this Scripture must be fulfilled in me: '
  - type: note
    content: Cited from Isa. 53:12
  - type: text
    content: '‘And he was numbered with the transgressors.’ For '
  - type: note
    content: '[John 17:4; 19:30]'
  - type: text
    content: what is written about me has its fulfillment.”
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And they said, “Look, Lord, here are two '
  - type: note
    content: '[ver. 49]'
  - type: text
    content: 'swords.” And he said to them, '
  - type: note
    content: '[Deut. 3:26; Mark 14:41]'
  - type: text
    content: “It is enough.”
  - type: heading
    content: Jesus Prays on the Mount of Olives
  '39':
  - type: text
    content: ' '
  - type: note
    content: Matt. 26:30; Mark 14:26; [ John 18:1 ]
  - type: text
    content: 'And he came out and went, '
  - type: note
    content: ch. 21:37; John 18:2
  - type: text
    content: 'as was his custom, to '
  - type: note
    content: See Matt. 21:1
  - type: text
    content: 'the Mount of Olives, and the disciples followed him. '
  '4':
  - type: text
    content: 'He went away and conferred with the chief priests and '
  - type: note
    content: Acts 4:1; 5:24, 26
  - type: text
    content: 'officers how he might betray him to them. '
  '40':
  - type: note
    content: For ver. 40-46, see Matt. 26:36-46; Mark 14:32-42
  - type: text
    content: 'And when he came to '
  - type: note
    content: John 18:2
  - type: text
    content: 'the place, he said to them, '
  - type: note
    content: 1 Pet. 4:7
  - type: text
    content: '“Pray that you may not '
  - type: note
    content: Matt. 6:13
  - type: text
    content: enter into temptation.”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'And he withdrew from them about a stone’s throw, and '
  - type: note
    content: See Acts 7:60
  - type: text
    content: 'knelt down and prayed, '
  '42':
  - type: text
    content: 'saying, '
  - type: note
    content: Heb. 5:7
  - type: text
    content: '“Father, if you are willing, remove '
  - type: note
    content: See Matt. 20:22
  - type: text
    content: 'this cup from me. '
  - type: note
    content: See Matt. 6:10
  - type: text
    content: Nevertheless, not my will, but yours, be done.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And there appeared to him '
  - type: note
    content: Matt. 4:11; [Heb. 1:14]
  - type: text
    content: 'an angel from heaven, strengthening him. '
  '44':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 42 above]'
  - type: text
    content: being in agony he prayed more earnestly; and his sweat became like great drops of blood falling down to the ground.
  - type: note
    content: Some manuscripts omit verses 43 and 44
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And when he rose from prayer, he came to the disciples and found them sleeping for sorrow, '
  '46':
  - type: text
    content: 'and he said to them, '
  - type: text
    content: '“Why are you sleeping? Rise and '
  - type: note
    content: ver. 40
  - type: text
    content: pray that you may not enter into temptation.”
  - type: heading
    content: Betrayal and Arrest of Jesus
  '47':
  - type: text
    content: ' '
  - type: note
    content: For ver. 47-53, see Matt. 26:47-56; Mark 14:43-50; John 18:3-11
  - type: text
    content: 'While he was still speaking, there came a crowd, and the man called '
  - type: note
    content: ver. 3
  - type: text
    content: 'Judas, one of the twelve, was leading them. He drew near to Jesus to kiss him, '
  '48':
  - type: text
    content: 'but Jesus said to him, '
  - type: text
    content: “Judas, would you betray the Son of Man with a kiss?”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And when those who were around him saw what would follow, they said, “Lord, shall we strike '
  - type: note
    content: ver. 38
  - type: text
    content: 'with the sword?” '
  '5':
  - type: text
    content: 'And they were glad, and agreed to give him money. '
  '50':
  - type: text
    content: And one of them struck the servant
  - type: note
    content: Or bondservant
  - type: text
    content: ' of the high priest and cut off his right ear. '
  '51':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “No more of this!”
  - type: text
    content: ' And he touched his ear and healed him. '
  '52':
  - type: text
    content: 'Then Jesus said to the chief priests and '
  - type: note
    content: See ver. 4
  - type: text
    content: 'officers of the temple and elders, who had come out against him, '
  - type: text
    content: “Have you come out as against a robber, with swords and clubs?
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'When '
  - type: note
    content: '[John 8:2]; [ch. 2:46; John 18:20]'
  - type: text
    content: 'I was with you day after day in the temple, you did not lay hands on me. But this is '
  - type: note
    content: '[Mark 14:35, 41; John 12:27; 16:4]'
  - type: text
    content: 'your hour, and '
  - type: note
    content: Eph. 6:12; [Acts 26:18]
  - type: text
    content: the power of darkness.”
  - type: heading
    content: Peter Denies Jesus
  '54':
  - type: text
    content: ' '
  - type: note
    content: Matt. 26:57; Mark 14:53
  - type: text
    content: 'Then they seized him and led him away, bringing him into the high priest’s house, '
  - type: note
    content: Matt. 26:58; Mark 14:54; John 18:15
  - type: text
    content: 'and Peter was following at a distance. '
  '55':
  - type: note
    content: For ver. 55-62, see Matt. 26:69-75; Mark 14:66-72; John 18:16-18, 25-27
  - type: text
    content: 'And when they had kindled a fire in the middle of '
  - type: note
    content: See Matt. 26:3
  - type: text
    content: 'the courtyard and sat down together, Peter sat down among them. '
  '56':
  - type: text
    content: 'Then a servant girl, seeing him as he sat in the light and looking closely at him, said, “This man also was with him.” '
  '57':
  - type: text
    content: 'But he denied it, saying, “Woman, I do not know him.” '
  '58':
  - type: text
    content: 'And a little later someone else saw him and said, “You also are one of them.” But Peter said, “Man, I am not.” '
  '59':
  - type: text
    content: 'And after an interval of about an hour still another '
  - type: note
    content: Acts 12:15
  - type: text
    content: 'insisted, saying, “Certainly this man also was with him, for he too is a Galilean.” '
  '6':
  - type: text
    content: 'So he consented and sought an opportunity to '
  - type: note
    content: See Matt. 20:18, 19
  - type: text
    content: betray him to them in the absence of a crowd.
  - type: heading
    content: The Passover with the Disciples
  '60':
  - type: text
    content: 'But Peter said, “Man, I do not know what you are talking about.” And immediately, while he was still speaking, the rooster crowed. '
  '61':
  - type: text
    content: 'And the Lord turned and '
  - type: note
    content: See Mark 10:21
  - type: text
    content: 'looked at Peter. And Peter remembered the saying of the Lord, how he had said to him, '
  - type: note
    content: ver. 34
  - type: text
    content: '“Before the rooster crows today, you will '
  - type: note
    content: '[Acts 3:13, 14]'
  - type: text
    content: deny me three times.”
  - type: text
    content: ' '
  '62':
  - type: text
    content: And he went out and wept bitterly.
  - type: heading
    content: Jesus Is Mocked
  '63':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 26:67, 68; Mark 14:65; John 18:22, 23 ]'
  - type: text
    content: 'Now the men who were holding Jesus in custody were mocking him as they beat him. '
  '64':
  - type: note
    content: '[See ver. 63 above]'
  - type: text
    content: 'They also blindfolded him and kept asking him, '
  - type: note
    content: '[ch. 7:39]'
  - type: text
    content: '“Prophesy! '
  - type: note
    content: '[ch. 7:39]'
  - type: text
    content: 'Who is it that struck you?” '
  '65':
  - type: text
    content: 'And they said many other things against him, '
  - type: note
    content: See Matt. 27:39
  - type: text
    content: blaspheming him.
  - type: heading
    content: Jesus Before the Council
  '66':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:1; Mark 15:1; John 18:28
  - type: text
    content: 'When day came, '
  - type: note
    content: Acts 22:5 (Gk.)
  - type: text
    content: 'the assembly of the elders of the people gathered together, both chief priests and scribes. And they led him away to their '
  - type: note
    content: See Matt. 5:22
  - type: text
    content: 'council, and they '
  - type: note
    content: For ver. 67-71, [Matt. 26:63-66; Mark 14:61-64; John 18:19-21]
  - type: text
    content: 'said, '
  '67':
  - type: note
    content: John 10:24, 25
  - type: text
    content: '“If you are '
  - type: note
    content: See Matt. 1:17
  - type: text
    content: 'the Christ, tell us.” But he said to them, '
  - type: text
    content: “If I tell you, you will not believe,
  - type: text
    content: ' '
  '68':
  - type: text
    content: and if I ask you, you will not answer.
  - type: text
    content: ' '
  '69':
  - type: text
    content: 'But from now on the Son of Man shall be seated '
  - type: note
    content: Mark 16:19; Acts 7:56; Heb. 1:3
  - type: text
    content: at the right hand of the power of God.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: ' '
  - type: note
    content: For ver. 7-14, see Matt. 26:17-19; Mark 14:12-16
  - type: text
    content: 'Then came '
  - type: note
    content: Ex. 12:18; 1 Cor. 5:7
  - type: text
    content: 'the day of Unleavened Bread, on which the Passover lamb had to be sacrificed. '
  '70':
  - type: text
    content: 'So they all said, “Are you '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God, then?” And he said to them, '
  - type: note
    content: ch. 23:3; Matt. 27:11; Mark 15:2; [Matt. 26:25]
  - type: text
    content: “You say that I am.”
  - type: text
    content: ' '
  '71':
  - type: text
    content: Then they said, “What further testimony do we need? We have heard it ourselves from his own lips.”
  '8':
  - type: text
    content: So Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' sent Peter and John, saying, '
  - type: text
    content: “Go and prepare the Passover for us, that we may eat it.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'They said to him, “Where will you have us prepare it?” '
