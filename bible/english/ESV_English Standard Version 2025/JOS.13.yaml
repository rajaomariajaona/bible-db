document_id: JOS.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Land Still to Be Conquered
  - type: text
    content: 'Now Joshua '
  - type: note
    content: ch. 14:10; 23:1
  - type: text
    content: 'was old and advanced in years, and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “You are old and advanced in years, and there remains yet very much land '
  - type: note
    content: Deut. 31:3
  - type: text
    content: 'to possess. '
  '10':
  - type: note
    content: Num. 21:24, 25
  - type: text
    content: 'and all the cities of Sihon king of the Amorites, who reigned in Heshbon, as far as the boundary of the Ammonites; '
  '11':
  - type: text
    content: 'and Gilead, and the '
  - type: note
    content: Deut. 3:14
  - type: text
    content: 'region of the Geshurites and Maacathites, and all Mount Hermon, and '
  - type: note
    content: Deut. 3:14
  - type: text
    content: 'all Bashan to Salecah; '
  '12':
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'all the kingdom of Og in Bashan, who reigned in Ashtaroth and in Edrei (he alone was left of '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'the remnant of the Rephaim); '
  - type: note
    content: Num. 21:24, 35
  - type: text
    content: 'these Moses had struck and driven out. '
  '13':
  - type: note
    content: ver. 11
  - type: text
    content: Yet the people of Israel did not drive out the Geshurites or the Maacathites, but Geshur and Maacath dwell in the midst of Israel to this day.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:3, 4; See Num. 18:20-32
  - type: text
    content: 'To the tribe of Levi alone Moses gave no inheritance. The offerings by fire to the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel are their inheritance, as he said to him.'
  '15':
  - type: text
    content: 'And Moses gave an inheritance to the tribe of the people of Reuben according to their clans. '
  '16':
  - type: text
    content: 'So their territory was from Aroer, '
  - type: note
    content: ver. 9
  - type: text
    content: 'which is on the edge of the Valley of the Arnon, and the city that is in the middle of the valley, and all the tableland by '
  - type: note
    content: '[Num. 21:30]'
  - type: text
    content: 'Medeba; '
  '17':
  - type: text
    content: 'with Heshbon, and all its cities that are in the tableland; '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'Dibon, and Bamoth-baal, and Beth-baal-meon, '
  '18':
  - type: note
    content: Num. 21:23
  - type: text
    content: 'and Jahaz, and Kedemoth, and Mephaath, '
  '19':
  - type: text
    content: 'and '
  - type: note
    content: Num. 32:37, 38
  - type: text
    content: 'Kiriathaim, and '
  - type: note
    content: Num. 32:37, 38
  - type: text
    content: 'Sibmah, and Zereth-shahar on the hill of the valley, '
  '2':
  - type: note
    content: Judg. 3:1
  - type: text
    content: 'This is the land that yet remains: all the '
  - type: note
    content: Joel 3:4
  - type: text
    content: 'regions of the Philistines, and all those of the Geshurites '
  '20':
  - type: text
    content: 'and '
  - type: note
    content: Deut. 4:46
  - type: text
    content: 'Beth-peor, and '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'the slopes of Pisgah, and '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'Beth-jeshimoth, '
  '21':
  - type: text
    content: 'that is, '
  - type: note
    content: Deut. 3:10
  - type: text
    content: 'all the cities of the tableland, and all the kingdom of Sihon king of the Amorites, who reigned in Heshbon, '
  - type: note
    content: Num. 21:24
  - type: text
    content: 'whom Moses defeated with '
  - type: note
    content: Num. 31:8
  - type: text
    content: 'the leaders of Midian, Evi and Rekem and Zur and Hur and Reba, the princes of Sihon, who lived in the land. '
  '22':
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'Balaam also, the son of Beor, the one who practiced divination, was killed with the sword by the people of Israel among the rest of their slain. '
  '23':
  - type: text
    content: And the border of the people of Reuben was the Jordan as a boundary. This was the inheritance of the people of Reuben, according to their clans with their cities and villages.
  '24':
  - type: text
    content: 'Moses gave an inheritance also to the tribe of Gad, to the people of Gad, according to their clans. '
  '25':
  - type: note
    content: Num. 32:34-36
  - type: text
    content: 'Their territory was Jazer, and all the cities of Gilead, and half the land of the Ammonites, to Aroer, which is east of '
  - type: note
    content: '[Deut. 3:11; 2 Sam. 11:1; 12:26]'
  - type: text
    content: 'Rabbah, '
  '26':
  - type: text
    content: 'and from Heshbon to Ramath-mizpeh and Betonim, and from '
  - type: note
    content: Gen. 32:2; 2 Sam. 2:8, 12; 17:24
  - type: text
    content: Mahanaim to the territory of Debir,
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew Lidebir
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and in the valley Beth-haram, Beth-nimrah, '
  - type: note
    content: Gen. 33:17
  - type: text
    content: 'Succoth, and Zaphon, the rest of the kingdom of Sihon king of Heshbon, having the Jordan as a boundary, to the lower end of the Sea of '
  - type: note
    content: See ch. 11:2
  - type: text
    content: 'Chinnereth, eastward beyond the Jordan. '
  '28':
  - type: text
    content: This is the inheritance of the people of Gad according to their clans, with their cities and villages.
  '29':
  - type: text
    content: 'And Moses gave an inheritance to the half-tribe of Manasseh. It was allotted to the half-tribe of the people of Manasseh according to their clans. '
  '3':
  - type: text
    content: '(from the '
  - type: note
    content: 1 Chr. 13:5; Jer. 2:18
  - type: text
    content: 'Shihor, which is east of Egypt, northward to the boundary of Ekron, it is counted as Canaanite; '
  - type: note
    content: Judg. 3:3
  - type: text
    content: 'there are five rulers of the Philistines, those of Gaza, Ashdod, Ashkelon, Gath, and Ekron), and those of '
  - type: note
    content: Deut. 2:23
  - type: text
    content: 'the Avvim, '
  '30':
  - type: text
    content: 'Their region extended from '
  - type: note
    content: See ver. 26
  - type: text
    content: 'Mahanaim, through all Bashan, the whole kingdom of Og king of Bashan, and all '
  - type: note
    content: Num. 32:41; 1 Chr. 2:23; [Deut. 3:14]
  - type: text
    content: 'the towns of Jair, which are in Bashan, sixty cities, '
  '31':
  - type: text
    content: 'and half Gilead, and '
  - type: note
    content: ch. 12:4
  - type: text
    content: 'Ashtaroth, and Edrei, the cities of the kingdom of Og in Bashan. These were allotted to the people of '
  - type: note
    content: ch. 17:1; Num. 32:39, 40
  - type: text
    content: Machir the son of Manasseh for the half of the people of Machir according to their clans.
  '32':
  - type: text
    content: 'These are the inheritances that Moses distributed '
  - type: note
    content: Num. 22:1
  - type: text
    content: 'in the plains of Moab, beyond the Jordan east of Jericho. '
  '33':
  - type: note
    content: ver. 14; ch. 18:7; Num. 18:20
  - type: text
    content: 'But to the tribe of Levi Moses gave no inheritance; the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel is their inheritance, '
  - type: note
    content: ver. 14; ch. 18:7; Num. 18:20
  - type: text
    content: just as he said to them.
  '4':
  - type: text
    content: 'in the south, all the land of the Canaanites, and Mearah that belongs to the Sidonians, to Aphek, to the boundary of '
  - type: note
    content: See Judg. 1:34-36
  - type: text
    content: 'the Amorites, '
  '5':
  - type: text
    content: 'and the land of the '
  - type: note
    content: 1 Kgs. 5:18; Ps. 83:7; Ezek. 27:9
  - type: text
    content: 'Gebalites, and all Lebanon, toward the sunrise, from '
  - type: note
    content: ch. 11:17; 12:7
  - type: text
    content: 'Baal-gad below Mount Hermon to '
  - type: note
    content: Num. 34:8
  - type: text
    content: 'Lebo-hamath, '
  '6':
  - type: text
    content: 'all the inhabitants of the hill country from Lebanon to '
  - type: note
    content: ch. 11:8
  - type: text
    content: 'Misrephoth-maim, even all the Sidonians. I myself will drive '
  - type: note
    content: '[ch. 23:13; Judg. 2:21-23]'
  - type: text
    content: 'them out from before the people of Israel. Only '
  - type: note
    content: ch. 23:4
  - type: text
    content: 'allot the land to Israel '
  - type: note
    content: ch. 23:4; Num. 34:2
  - type: text
    content: 'for an inheritance, as I have commanded you. '
  '7':
  - type: text
    content: 'Now therefore '
  - type: note
    content: ch. 14:1, 2
  - type: text
    content: divide this land for an inheritance to the nine tribes and half the tribe of Manasseh.”
  - type: heading
    content: The Inheritance East of the Jordan
  '8':
  - type: text
    content: With the other half of the tribe of Manasseh
  - type: note
    content: Hebrew With it
  - type: text
    content: ' the Reubenites and the Gadites received their inheritance, '
  - type: note
    content: ch. 12:6; See Num. 32:33
  - type: text
    content: 'which Moses gave them, beyond the Jordan eastward, as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them: '
  '9':
  - type: note
    content: Deut. 2:36
  - type: text
    content: 'from Aroer, which is on the edge of the Valley of the Arnon, and the city that is in the middle of the valley, and '
  - type: note
    content: ver. 16; [Num. 21:30]
  - type: text
    content: 'all the tableland of Medeba as far as Dibon; '
