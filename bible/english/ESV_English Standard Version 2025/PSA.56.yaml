  - type: text
    content: tramples on me;
  - type: text
    content: all day long an attacker oppresses me;
  '10':
  - type: text
    content: In God, whose word I praise,
  - type: text
    content: 'in the '
  - type: text
    content: Lord
  - type: text
    content: ', whose word I praise,'
  '11':
  - type: text
    content: 'in God I trust; '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: I shall not be afraid.
  - type: text
    content: What can man do to me?
  '12':
  - type: text
    content: 'I must perform my '
  - type: note
    content: See Ps. 50:14
  - type: text
    content: vows to you, O God;
  - type: text
    content: 'I will '
  - type: note
    content: See Ps. 50:14
  - type: text
    content: render thank offerings to you.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps. 49:15; 116:8
  - type: text
    content: For you have delivered my soul from death,
  - type: text
    content: yes, my feet from falling,
  - type: note
    content: Ps. 116:9
  - type: text
    content: that I may walk before God
  - type: note
    content: '[ Ps. 49:19 ]'
  - type: text
    content: in the light of life.
  '2':
  - type: text
    content: my enemies trample on me all day long,
  - type: text
    content: for many attack me proudly.
  '3':
  - type: text
    content: When I am afraid,
  - type: text
    content: 'I '
  - type: note
    content: See Ps. 11:1
  - type: text
    content: put my trust in you.
  '4':
  - type: text
    content: In God, whose word I praise,
  - type: text
    content: 'in God I trust; '
  - type: note
    content: Ps. 27:1; 118:6; Isa. 51:12; Heb. 13:6
  - type: text
    content: I shall not be afraid.
  - type: text
    content: What can flesh do to me?
  '5':
  - type: text
    content: All day long they injure my cause;
  - type: note
    content: Or they twist my words
  - type: text
    content: all their thoughts are against me for evil.
  '6':
  - type: text
    content: 'They '
  - type: note
    content: Ps. 59:3; 140:2; Isa. 54:15
  - type: text
    content: 'stir up strife, they '
  - type: note
    content: Ps. 10:8
  - type: text
    content: lurk;
  - type: text
    content: 'they '
  - type: note
    content: Ps. 71:10
  - type: text
    content: watch my steps,
  - type: text
    content: as they have waited for my life.
  '7':
  - type: text
    content: For their crime will they escape?
  - type: note
    content: Ps. 7:6; 59:5
  - type: text
    content: 'In wrath '
  - type: note
    content: See Ps. 55:23
  - type: text
    content: cast down the peoples, O God!
  '8':
  - type: text
    content: You have kept count of my tossings;
  - type: note
    content: Or wanderings
  - type: note
    content: '[ Ps. 39:12; 2 Kgs. 20:5 ]'
  - type: text
    content: put my tears in your bottle.
  - type: note
    content: '[ Mal. 3:16 ]'
  - type: text
    content: Are they not in your book?
  '9':
  - type: text
    content: Then my enemies will turn back
  - type: note
    content: Ps. 102:2
  - type: text
    content: in the day when I call.
  - type: text
    content: This I know, that
  - type: note
    content: Or because
  - type: text
    content: ' '
  - type: note
    content: Ps. 118:6; [Rom. 8:31]
  - type: text
    content: God is for me.
