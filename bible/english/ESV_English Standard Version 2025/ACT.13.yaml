document_id: ACT.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Barnabas and Saul Sent Off
  - type: text
    content: 'Now there were in the church at Antioch '
  - type: note
    content: ch. 11:27; 15:32; 19:6; 21:9, 10; Rom. 12:6, 7; See 1 Cor. 12:28, 29
  - type: text
    content: 'prophets and '
  - type: note
    content: ch. 11:27; 15:32; 19:6; 21:9, 10; Rom. 12:6, 7; See 1 Cor. 12:28, 29
  - type: text
    content: 'teachers, '
  - type: note
    content: ch. 11:22-26
  - type: text
    content: Barnabas, Simeon who was called Niger,
  - type: note
    content: Niger is a Latin word meaning black, or dark
  - type: text
    content: ' Lucius of Cyrene, Manaen a lifelong friend of '
  - type: note
    content: See Luke 3:1
  - type: text
    content: 'Herod the tetrarch, and Saul. '
  '10':
  - type: text
    content: 'and said, “You '
  - type: note
    content: See Matt. 13:38
  - type: text
    content: 'son of the devil, you enemy of all righteousness, full of all deceit and '
  - type: note
    content: '[ch. 18:14]'
  - type: text
    content: 'villainy, will you not stop '
  - type: note
    content: Mic. 3:9
  - type: text
    content: 'making crooked '
  - type: note
    content: Hos. 14:9; 2 Pet. 2:15; [ch. 18:25, 26]
  - type: text
    content: 'the straight paths of the Lord? '
  '11':
  - type: text
    content: 'And now, behold, '
  - type: note
    content: ch. 11:21; Ex. 9:3; 1 Sam. 5:6, 7, 11; Ps. 32:4; [Heb. 10:31; 1 Pet. 5:6]
  - type: text
    content: 'the hand of the Lord is upon you, and you will be blind and unable to see the sun for a time.” Immediately mist and darkness fell upon him, and he went about seeking '
  - type: note
    content: '[ch. 9:8; 22:11]'
  - type: text
    content: 'people to lead him by the hand. '
  '12':
  - type: text
    content: 'Then the proconsul believed, when he saw what had occurred, for he was astonished at '
  - type: note
    content: '[ver. 49; ch. 15:35]'
  - type: text
    content: the teaching of the Lord.
  - type: heading
    content: Paul and Barnabas at Antioch in Pisidia
  '13':
  - type: text
    content: 'Now Paul and his companions set sail from Paphos and came to Perga in Pamphylia. And '
  - type: note
    content: ver. 5
  - type: text
    content: 'John left them and returned '
  - type: note
    content: ch. 12:12
  - type: text
    content: 'to Jerusalem, '
  '14':
  - type: text
    content: 'but they went on from Perga and came to Antioch in Pisidia. And '
  - type: note
    content: ver. 42, 44; ch. 16:13; 17:2; 18:4
  - type: text
    content: 'on the Sabbath day '
  - type: note
    content: See ver. 5
  - type: text
    content: 'they went into the synagogue and sat down. '
  '15':
  - type: text
    content: 'After '
  - type: note
    content: ch. 15:21
  - type: text
    content: 'the reading from '
  - type: note
    content: See Luke 16:16
  - type: text
    content: 'the Law and the Prophets, '
  - type: note
    content: See Mark 5:22
  - type: text
    content: 'the rulers of the synagogue sent a message to them, saying, “Brothers, if you have any '
  - type: note
    content: Heb. 13:22
  - type: text
    content: 'word of encouragement for the people, say it.” '
  '16':
  - type: text
    content: 'So Paul stood up, and '
  - type: note
    content: See ch. 12:17
  - type: text
    content: 'motioning with his hand said:'
  - type: text
    content: '“Men of Israel and '
  - type: note
    content: ver. 26; ch. 10:2, 22
  - type: text
    content: 'you who fear God, listen. '
  '17':
  - type: note
    content: See Matt. 15:31
  - type: text
    content: 'The God of this people Israel '
  - type: note
    content: Deut. 7:6-8
  - type: text
    content: 'chose our fathers and '
  - type: note
    content: Num. 24:7
  - type: text
    content: 'made the people great '
  - type: note
    content: ch. 7:17; Ex. 1:1, 7, 12; Ps. 105:23, 24
  - type: text
    content: 'during their stay in the land of Egypt, and '
  - type: note
    content: Ex. 6:6; 13:14, 16
  - type: text
    content: 'with uplifted arm he led them out of it. '
  '18':
  - type: text
    content: 'And for about '
  - type: note
    content: See ch. 7:36
  - type: text
    content: 'forty years '
  - type: note
    content: '[Deut. 9:5-24]'
  - type: text
    content: he put up with
  - type: note
    content: Some manuscripts he carried (compare Deuteronomy 1:31)
  - type: text
    content: ' them in the wilderness. '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 7:45
  - type: text
    content: 'after destroying '
  - type: note
    content: Deut. 7:1
  - type: text
    content: 'seven nations in the land of Canaan, '
  - type: note
    content: Josh. 14:1, 2; 19:51; Ps. 78:55; 136:21, 22
  - type: text
    content: 'he gave them their land as an inheritance. '
  '2':
  - type: text
    content: 'While they were worshiping the Lord and fasting, '
  - type: note
    content: '[ch. 20:28]; See ch. 8:29'
  - type: text
    content: 'the Holy Spirit said, '
  - type: note
    content: Rom. 1:1; Gal. 1:15
  - type: text
    content: '“Set apart for me Barnabas and Saul '
  - type: note
    content: See ch. 9:15
  - type: text
    content: 'for the work to which I have called them.” '
  '20':
  - type: text
    content: 'All this took about 450 years. And after that '
  - type: note
    content: Judg. 2:16; 3:9
  - type: text
    content: 'he gave them judges until '
  - type: note
    content: See ch. 3:24
  - type: text
    content: 'Samuel the prophet. '
  '21':
  - type: text
    content: 'Then '
  - type: note
    content: 1 Sam. 8:5; 10:1
  - type: text
    content: 'they asked for a king, and God gave them Saul '
  - type: note
    content: 1 Sam. 9:1, 2
  - type: text
    content: 'the son of Kish, a man of the tribe of Benjamin, for forty years. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 15:23, 26, 28; 16:1; [Hos. 13:11]
  - type: text
    content: 'when he had removed him, '
  - type: note
    content: 1 Sam. 16:13; 2 Sam. 2:4; 5:3
  - type: text
    content: 'he raised up David to be their king, of whom he testified and said, '
  - type: note
    content: Cited from Ps. 89:20
  - type: text
    content: '‘I have found in David the son of Jesse '
  - type: note
    content: ch. 7:46; Cited from 1 Sam. 13:14
  - type: text
    content: 'a man after my heart, '
  - type: note
    content: ver. 36
  - type: text
    content: 'who will do all my will.’ '
  '23':
  - type: note
    content: See Matt. 1:1
  - type: text
    content: 'Of this man’s offspring God has brought to Israel '
  - type: note
    content: See Luke 2:11
  - type: text
    content: 'a Savior, Jesus, '
  - type: note
    content: Ps. 132:11; [ver. 32, 33]
  - type: text
    content: 'as he promised. '
  '24':
  - type: text
    content: 'Before his coming, '
  - type: note
    content: ch. 1:22; Matt. 3:1
  - type: text
    content: 'John had proclaimed '
  - type: note
    content: ch. 19:4; Mark 1:4; Luke 3:3; [ch. 2:38; Matt. 3:11]
  - type: text
    content: 'a baptism of repentance to all the people of Israel. '
  '25':
  - type: text
    content: 'And as John was finishing his course, '
  - type: note
    content: John 1:20, 27; [Matt. 3:11; Mark 1:7; Luke 3:16]
  - type: text
    content: he said, ‘What do you suppose that I am? I am not he. No, but behold, after me one is coming, the sandals of whose feet I am not worthy to untie.’
  '26':
  - type: text
    content: '“Brothers, sons of the family of Abraham, and those among you '
  - type: note
    content: ver. 16
  - type: text
    content: 'who fear God, to us has been sent '
  - type: note
    content: ch. 10:36; [Eph. 1:13]
  - type: text
    content: 'the message of '
  - type: note
    content: '[ch. 5:20]; See ch. 4:12'
  - type: text
    content: 'this salvation. '
  '27':
  - type: text
    content: 'For those who live in Jerusalem and their rulers, because '
  - type: note
    content: '[2 Cor. 3:14, 15]; See ch. 3:17'
  - type: text
    content: 'they did not recognize him nor understand '
  - type: note
    content: ver. 15; [ch. 15:21]
  - type: text
    content: 'the utterances of the prophets, which are read every Sabbath, '
  - type: note
    content: See Luke 24:20, 26, 27, 44
  - type: text
    content: 'fulfilled them by condemning him. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: '[Mark 14:55; Luke 23:22]'
  - type: text
    content: 'though they found in him no guilt worthy of death, '
  - type: note
    content: ch. 2:23; 3:14, 15; Luke 23:23
  - type: text
    content: 'they asked Pilate to have him executed. '
  '29':
  - type: text
    content: 'And when '
  - type: note
    content: Luke 18:31; 24:44; John 19:28, 30, 36, 37
  - type: text
    content: 'they had carried out all that was written of him, '
  - type: note
    content: Matt. 27:59, 60; Mark 15:46; Luke 23:53; John 19:38, 41, 42
  - type: text
    content: 'they took him down from '
  - type: note
    content: See ch. 5:30
  - type: text
    content: 'the tree and laid him in a tomb. '
  '3':
  - type: text
    content: 'Then after fasting and '
  - type: note
    content: See ch. 6:6
  - type: text
    content: 'praying they laid their hands on them and '
  - type: note
    content: ch. 14:26
  - type: text
    content: sent them off.
  - type: heading
    content: Barnabas and Saul on Cyprus
  '30':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'God raised him from the dead, '
  '31':
  - type: text
    content: 'and for many days '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'he appeared to those '
  - type: note
    content: Mark 15:41
  - type: text
    content: 'who had come up with him '
  - type: note
    content: ch. 1:11; 2:7
  - type: text
    content: 'from Galilee to Jerusalem, '
  - type: note
    content: See Luke 24:48
  - type: text
    content: 'who are now '
  - type: note
    content: See ch. 1:8
  - type: text
    content: 'his witnesses to the people. '
  '32':
  - type: text
    content: 'And we bring you the good news '
  - type: note
    content: ch. 26:6; Rom. 4:13; 15:8; Gal. 3:16; [Rom. 9:4]
  - type: text
    content: 'that what God promised to the fathers, '
  '33':
  - type: note
    content: '[ver. 23; Luke 1:69-73]'
  - type: text
    content: this he has fulfilled to us their children by raising Jesus, as also it is written in the second Psalm,
  - type: note
    content: Heb. 1:5; 5:5; Cited from Ps. 2:7
  - type: text
    content: “‘You are my Son,
  - type: text
    content: today I have begotten you.’
  '34':
  - type: text
    content: 'And as for the fact that he raised him from the dead, '
  - type: note
    content: Rom. 6:9; [Heb. 9:25-28]
  - type: note
    content: ver. 35-37
  - type: text
    content: no more to return to corruption, he has spoken in this way,
  - type: text
    content: '“‘I will give you '
  - type: note
    content: Cited from Isa. 55:3
  - type: text
    content: the holy and sure blessings of David.’
  '35':
  - type: text
    content: Therefore he says also in another psalm,
  - type: note
    content: ch. 2:27; Cited from Ps. 16:10
  - type: text
    content: “‘You will not let your Holy One see corruption.’
  '36':
  - type: text
    content: 'For David, after he had '
  - type: note
    content: ver. 22; ch. 20:27
  - type: text
    content: 'served the purpose of God in his own generation, '
  - type: note
    content: 2 Sam. 7:12; 1 Kgs. 2:10; [ch. 2:29]
  - type: text
    content: 'fell asleep and '
  - type: note
    content: Judg. 2:10
  - type: text
    content: 'was laid with his fathers and saw corruption, '
  '37':
  - type: text
    content: 'but he whom '
  - type: note
    content: ver. 30
  - type: text
    content: 'God raised up did not see corruption. '
  '38':
  - type: text
    content: 'Let it be known to you therefore, brothers, '
  - type: note
    content: Luke 24:47; 1 John 2:12
  - type: text
    content: 'that through this man '
  - type: note
    content: ch. 5:31
  - type: text
    content: 'forgiveness of sins is proclaimed to you, '
  '39':
  - type: text
    content: 'and by him '
  - type: note
    content: Rom. 3:28; See ch. 10:43
  - type: text
    content: everyone who believes is freed
  - type: note
    content: Or justified; twice in this verse
  - type: text
    content: ' from everything '
  - type: note
    content: Rom. 2:13; 3:20; 8:3; Gal. 2:16; 3:11; Eph. 2:9; 2 Tim. 1:9; Titus 3:5; [Heb. 7:19]
  - type: text
    content: 'from which you could not be freed by the law of Moses. '
  '4':
  - type: text
    content: 'So, being sent out '
  - type: note
    content: ver. 2; [ch. 16:6, 7]
  - type: text
    content: 'by the Holy Spirit, they went down to Seleucia, and from there they sailed to Cyprus. '
  '40':
  - type: text
    content: 'Beware, therefore, lest what is said in the Prophets should come about:'
  '41':
  - type: text
    content: ' '
  - type: note
    content: Cited from Hab. 1:5; [ Isa. 29:14 ]
  - type: text
    content: “‘Look, you scoffers,
  - type: text
    content: be astounded and perish;
  - type: text
    content: for I am doing a work in your days,
  - type: text
    content: a work that you will not believe, even if one tells it to you.’”
  '42':
  - type: text
    content: 'As they went out, the people begged that these things might be told them the next Sabbath. '
  '43':
  - type: text
    content: 'And after the meeting of the synagogue broke up, many Jews and '
  - type: note
    content: ver. 50; ch. 17:4, 17; [ch. 16:14]
  - type: text
    content: 'devout '
  - type: note
    content: ch. 2:11; 6:5; Matt. 23:15
  - type: text
    content: 'converts to Judaism followed Paul and Barnabas, who, as they spoke with them, urged them '
  - type: note
    content: '[Jude 21]'
  - type: text
    content: 'to continue in '
  - type: note
    content: Jude 4; See ch. 11:23
  - type: text
    content: the grace of God.
  '44':
  - type: text
    content: 'The next Sabbath almost the whole city gathered to hear the word of the Lord. '
  '45':
  - type: note
    content: '[ch. 19:9]'
  - type: text
    content: 'But '
  - type: note
    content: '[1 Thess. 2:16]'
  - type: text
    content: when the Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verse 50
  - type: text
    content: ' saw the crowds, they were filled with '
  - type: note
    content: See ch. 5:17
  - type: text
    content: 'jealousy and began to contradict what was spoken by Paul, '
  - type: note
    content: ch. 18:6; 26:11; 1 Tim. 1:20
  - type: text
    content: 'reviling him. '
  '46':
  - type: text
    content: 'And Paul and Barnabas spoke out boldly, saying, “It was necessary that the word of God '
  - type: note
    content: ver. 5, 14; See ch. 3:26
  - type: text
    content: 'be spoken first to you. '
  - type: note
    content: See Matt. 21:43
  - type: text
    content: 'Since you thrust it aside and judge yourselves '
  - type: note
    content: See Matt. 22:8
  - type: text
    content: 'unworthy of eternal life, behold, we '
  - type: note
    content: ch. 18:6; 22:21; 26:17, 18, 20; 28:28; See ch. 9:15
  - type: text
    content: 'are turning to the Gentiles. '
  '47':
  - type: note
    content: '[ch. 11:18]'
  - type: text
    content: For so the Lord has commanded us, saying,
  - type: note
    content: Cited from Isa. 49:6; [ Isa. 45:22 ]
  - type: text
    content: '“‘I have made you '
  - type: note
    content: Isa. 42:6; Luke 2:32
  - type: text
    content: a light for the Gentiles,
  - type: text
    content: 'that you may '
  - type: note
    content: '[ver. 26; ch. 1:8]'
  - type: text
    content: bring salvation to the ends of the earth.’”
  '48':
  - type: text
    content: 'And when the Gentiles heard this, they began rejoicing and '
  - type: note
    content: '[2 Thess. 1:12]'
  - type: text
    content: 'glorifying the word of the Lord, and as many as were appointed to eternal life believed. '
  '49':
  - type: text
    content: 'And the word of the Lord was spreading throughout the whole region. '
  '5':
  - type: text
    content: 'When they arrived at Salamis, they proclaimed the word of God '
  - type: note
    content: ver. 14; ch. 9:20; 14:1; 17:1, 2, 10, 17; 18:4, 19; 19:8; [ver. 46]; See Mark 6:2
  - type: text
    content: 'in the synagogues of the Jews. And they had '
  - type: note
    content: See ch. 12:12
  - type: text
    content: 'John to '
  - type: note
    content: '[ch. 19:22]'
  - type: text
    content: 'assist them. '
  '50':
  - type: note
    content: '[ch. 14:2, 19; 17:5, 13; 18:12; 20:3, 19; 21:27]'
  - type: text
    content: 'But the Jews incited the devout '
  - type: note
    content: ch. 17:12
  - type: text
    content: 'women of high standing and the leading men of the city, '
  - type: note
    content: 2 Tim. 3:11
  - type: text
    content: 'stirred up persecution against Paul and Barnabas, and '
  - type: note
    content: 1 Thess. 2:15
  - type: text
    content: 'drove them out of their district. '
  '51':
  - type: text
    content: 'But they '
  - type: note
    content: Matt. 10:14; Mark 6:11; Luke 9:5; [ch. 18:6]
  - type: text
    content: 'shook off the dust from their feet against them and went to Iconium. '
  '52':
  - type: text
    content: 'And the disciples were filled '
  - type: note
    content: '[1 Thess. 1:6]; See Matt. 5:12; John 16:22'
  - type: text
    content: 'with joy and '
  - type: note
    content: See ch. 2:4
  - type: text
    content: with the Holy Spirit.
  '6':
  - type: text
    content: 'When they had gone through the whole island as far as Paphos, they came upon a certain '
  - type: note
    content: ch. 8:9, 11
  - type: text
    content: 'magician, '
  - type: note
    content: See Matt. 7:15
  - type: text
    content: 'a Jewish false prophet named Bar-Jesus. '
  '7':
  - type: text
    content: 'He was with '
  - type: note
    content: ver. 8, 12; ch. 18:12; 19:38
  - type: text
    content: 'the proconsul, Sergius Paulus, a man of intelligence, who summoned Barnabas and Saul and sought to hear the word of God. '
  '8':
  - type: text
    content: 'But Elymas the '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'magician (for that is the meaning of his name) '
  - type: note
    content: '[Ex. 7:11; 2 Tim. 3:8]'
  - type: text
    content: 'opposed them, seeking to turn '
  - type: note
    content: ver. 7, 12
  - type: text
    content: 'the proconsul away from the faith. '
  '9':
  - type: text
    content: 'But Saul, who was also called Paul, '
  - type: note
    content: ch. 4:8
  - type: text
    content: 'filled with the Holy Spirit, looked intently at him '
