document_id: JER.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Famine, Sword, and Death
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“And when you tell this people all these words, and they say to you, '
  - type: note
    content: See ch. 5:19
  - type: text
    content: '‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' pronounced all this great evil against us? What is our iniquity? What is the sin that we have committed against the '
  - type: text
    content: Lord
  - type: text
    content: ' our God?’ '
  '11':
  - type: text
    content: 'then you shall say to them: '
  - type: note
    content: ch. 5:19; 22:9; [Deut. 29:25, 26; 2 Kgs. 22:17; 2 Chr. 34:25]
  - type: text
    content: '‘Because your fathers have forsaken me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'have gone after other gods and have served and worshiped them, and have forsaken me and have not kept my law, '
  '12':
  - type: text
    content: 'and because '
  - type: note
    content: ch. 7:26
  - type: text
    content: 'you have done worse than your fathers, for behold, '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'every one of you follows his stubborn, evil will, refusing to listen to me. '
  '13':
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 10:18; 22:26; Isa. 22:17, 18; See Deut. 4:26-28; 28:64, 65
  - type: text
    content: 'I will hurl you out of this land into '
  - type: note
    content: See ch. 15:14
  - type: text
    content: 'a land that neither you nor your fathers have known, '
  - type: note
    content: Deut. 28:36, 64
  - type: text
    content: and there you shall serve other gods day and night, for I will show you no favor.’
  - type: heading
    content: The Lord Will Restore Israel
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14, 15, see ch. 23:7, 8
  - type: text
    content: '“Therefore, behold, the days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when it shall no longer be said, '
  - type: note
    content: ch. 4:2
  - type: text
    content: '‘As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives who brought up the people of Israel out of the land of Egypt,’ '
  '15':
  - type: text
    content: 'but '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: '‘As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives who brought up the people of Israel '
  - type: note
    content: '[Isa. 43:5, 6]; See ch. 3:18'
  - type: text
    content: 'out of the north country and out of all the countries where he had driven them.’ For '
  - type: note
    content: ch. 24:6; 30:3; 32:37
  - type: text
    content: I will bring them back to their own land that I gave to their fathers.
  '16':
  - type: text
    content: '“Behold, '
  - type: note
    content: '[Ezek. 12:13; Amos 4:2; Hab. 1:15]'
  - type: text
    content: 'I am sending for many fishers, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and they shall catch them. And afterward I will send for many hunters, and they shall hunt them from every mountain and every hill, and out '
  - type: note
    content: ch. 13:4
  - type: text
    content: 'of the clefts of the rocks. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: ch. 32:19; 2 Chr. 16:9; Job 34:21; Prov. 5:21
  - type: text
    content: 'my eyes are on all their ways. '
  - type: note
    content: '[Ps. 51:9; 90:8]'
  - type: text
    content: 'They are not hidden from me, '
  - type: note
    content: '[Ps. 51:9; 90:8]'
  - type: text
    content: 'nor is their iniquity concealed from my eyes. '
  '18':
  - type: text
    content: 'But first '
  - type: note
    content: ch. 17:18; Isa. 40:2
  - type: text
    content: 'I will doubly repay their iniquity and their sin, because they have polluted my land with the carcasses of their detestable idols, and '
  - type: note
    content: '[Isa. 65:4]; See Ezek. 43:7-9'
  - type: text
    content: have filled my inheritance with their abominations.”
  '19':
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 22:33; Ps. 28:7; 31:3, 4; Isa. 25:4
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', my strength and my stronghold,'
  - type: note
    content: ch. 17:17
  - type: text
    content: my refuge in the day of trouble,
  - type: note
    content: '[ Isa. 9:2; 49:6, 22, 23 ]'
  - type: text
    content: to you shall the nations come
  - type: text
    content: 'from the ends of the earth and say:'
  - type: text
    content: “Our fathers have inherited nothing but lies,
  - type: note
    content: See ch. 18:15
  - type: text
    content: worthless things in which there is no profit.
  '2':
  - type: text
    content: '“You shall not take a wife, nor shall you have sons or daughters in this place. '
  '20':
  - type: text
    content: 'Can man make for himself '
  - type: note
    content: '[1 Cor. 8:4]; See ch. 2:11'
  - type: text
    content: gods?
  - type: text
    content: Such are not gods!”
  '21':
  - type: text
    content: '“Therefore, behold, I will make them know, this once I will make them know my power and my might, and they shall know that '
  - type: note
    content: See ch. 33:2
  - type: text
    content: 'my name is the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the sons and daughters who are born in this place, and concerning the mothers who bore them and the fathers who fathered them in this land: '
  '4':
  - type: note
    content: See ch. 15:2
  - type: text
    content: 'They shall die of deadly diseases. '
  - type: note
    content: ch. 22:18, 19; 25:33
  - type: text
    content: 'They shall not be lamented, nor shall they be buried. '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'They shall be as dung on the surface of the ground. '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'They shall perish by the sword and by famine, '
  - type: note
    content: See ch. 7:33
  - type: text
    content: and their dead bodies shall be food for the birds of the air and for the beasts of the earth.
  '5':
  - type: text
    content: '“For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See Ezek. 24:16-23
  - type: text
    content: 'Do not enter the house of mourning, or go to lament or grieve for them, for I have taken away my peace from this people, my steadfast love and mercy, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Both great and small shall die in this land. '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'They shall not be buried, and no one shall lament for them or '
  - type: note
    content: Lev. 19:28; Deut. 14:1
  - type: text
    content: 'cut himself '
  - type: note
    content: Job 1:20; [Isa. 3:24]
  - type: text
    content: 'or make himself bald for them. '
  '7':
  - type: text
    content: 'No one shall '
  - type: note
    content: Isa. 58:7; Ezek. 24:17; [Deut. 26:14; Hos. 9:4]
  - type: text
    content: 'break bread for the mourner, to comfort him for the dead, nor shall anyone give him the cup of consolation to drink for his father or his mother. '
  '8':
  - type: text
    content: 'You shall not go into the house of feasting to sit with them, to eat and drink. '
  '9':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: See ch. 7:34
  - type: text
    content: Behold, I will silence in this place, before your eyes and in your days, the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride.
