      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'sixteen years old when he began to reign, and he reigned fifty-two years in Jerusalem. His mother’s name was Jecoliah of Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Menahem exacted the money from Israel, that is, from all the wealthy men, fifty shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'shekel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 2/5 ounce or 11 grams
      marker-yv: yv-n
    - type: text
      text: ' of silver from every man, to give to the king of Assyria. So the king of Assyria turned back and did not stay there in the land. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the deeds of Menahem and all that he did, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Menahem slept with his fathers, and Pekahiah his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pekahiah Reigns in Israel
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fiftieth year of Azariah king of Judah, Pekahiah the son of Menahem began to reign over Israel in Samaria, and he reigned two years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He did not turn away from the sins of Jeroboam the son of Nebat, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'which he made Israel to sin. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pekah the son of Remaliah, his captain, conspired against him with fifty men of the people of Gilead, and struck him down in Samaria, in the citadel of the king’s house with Argob and Arieh; he put him to death and reigned in his place. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of the deeds of Pekahiah and all that he did, behold, they are written in the Book of the Chronicles of the Kings of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pekah Reigns in Israel
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
