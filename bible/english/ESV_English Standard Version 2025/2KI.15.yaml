document_id: 2KI.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Azariah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:17 ]'
  - type: text
    content: 'In the twenty-seventh year of Jeroboam king of Israel, '
  - type: note
    content: '[ver. 13, 30, 32, 34; 2 Chr. 26:1]'
  - type: text
    content: 'Azariah the son of Amaziah, king of Judah, began to reign. '
  '10':
  - type: text
    content: 'Shallum the son of Jabesh conspired against him and '
  - type: note
    content: '[Amos 7:9]'
  - type: text
    content: 'struck him down at Ibleam and put him to death and reigned in his place. '
  '11':
  - type: text
    content: 'Now the rest of the deeds of Zechariah, behold, they are written in the Book of the Chronicles of the Kings of Israel. '
  '12':
  - type: text
    content: '(This was '
  - type: note
    content: ch. 10:30
  - type: text
    content: 'the promise of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he gave to Jehu, “Your sons shall sit on the throne of Israel to the fourth generation.” And so it came to pass.)'
  - type: heading
    content: Shallum Reigns in Israel
  '13':
  - type: text
    content: 'Shallum the son of Jabesh began to reign in the thirty-ninth year of '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: Uzziah
  - type: note
    content: Another name for Azariah
  - type: text
    content: ' king of Judah, and he reigned one month in '
  - type: note
    content: 1 Kgs. 16:24
  - type: text
    content: 'Samaria. '
  '14':
  - type: text
    content: 'Then Menahem the son of Gadi came up from '
  - type: note
    content: 1 Kgs. 14:17
  - type: text
    content: 'Tirzah and came to Samaria, and he struck down Shallum the son of Jabesh in Samaria and put him to death and reigned in his place. '
  '15':
  - type: text
    content: 'Now the rest of the deeds of Shallum, and the conspiracy that he made, behold, they are written in the Book of the Chronicles of the Kings of Israel. '
  '16':
  - type: text
    content: 'At that time Menahem sacked Tiphsah and all who were in it and its territory from Tirzah on, because they did not open it to him. Therefore he sacked it, '
  - type: note
    content: See ch. 8:12
  - type: text
    content: and he ripped open all the women in it who were pregnant.
  - type: heading
    content: Menahem Reigns in Israel
  '17':
  - type: text
    content: 'In the thirty-ninth year of Azariah king of Judah, Menahem the son of Gadi began to reign over Israel, and he reigned ten years in Samaria. '
  '18':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not depart all his days from all the sins of Jeroboam the son of Nebat, which he made Israel to sin. '
  '19':
  - type: note
    content: 1 Chr. 5:26
  - type: text
    content: Pul
  - type: note
    content: Another name for Tiglath-pileser III (compare verse 29)
  - type: text
    content: ' the king of Assyria came against the land, and Menahem gave '
  - type: note
    content: 1 Chr. 5:26
  - type: text
    content: Pul a thousand talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver, that he might help him '
  - type: note
    content: '[ch. 14:5]'
  - type: text
    content: 'to confirm his hold on the royal power. '
  '2':
  - type: text
    content: 'He was '
  - type: note
    content: 2 Chr. 26:3, 4
  - type: text
    content: 'sixteen years old when he began to reign, and he reigned fifty-two years in Jerusalem. His mother’s name was Jecoliah of Jerusalem. '
  '20':
  - type: text
    content: Menahem exacted the money from Israel, that is, from all the wealthy men, fifty shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver from every man, to give to the king of Assyria. So the king of Assyria turned back and did not stay there in the land. '
  '21':
  - type: text
    content: 'Now the rest of the deeds of Menahem and all that he did, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '22':
  - type: text
    content: And Menahem slept with his fathers, and Pekahiah his son reigned in his place.
  - type: heading
    content: Pekahiah Reigns in Israel
  '23':
  - type: text
    content: 'In the fiftieth year of Azariah king of Judah, Pekahiah the son of Menahem began to reign over Israel in Samaria, and he reigned two years. '
  '24':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not turn away from the sins of Jeroboam the son of Nebat, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'which he made Israel to sin. '
  '25':
  - type: text
    content: 'And Pekah the son of Remaliah, his captain, conspired against him with fifty men of the people of Gilead, and struck him down in Samaria, in the citadel of the king’s house with Argob and Arieh; he put him to death and reigned in his place. '
  '26':
  - type: text
    content: Now the rest of the deeds of Pekahiah and all that he did, behold, they are written in the Book of the Chronicles of the Kings of Israel.
  - type: heading
    content: Pekah Reigns in Israel
  '27':
  - type: text
    content: 'In the fifty-second year of Azariah king of Judah, Pekah the son of Remaliah began to reign over Israel in Samaria, and he reigned twenty years. '
  '28':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not depart from the sins of Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: which he made Israel to sin.
  '29':
  - type: text
    content: 'In the days of Pekah king of Israel, '
  - type: note
    content: ch. 16:7; [1 Chr. 5:6, 26; 2 Chr. 28:20]
  - type: text
    content: 'Tiglath-pileser king of Assyria came and captured '
  - type: note
    content: 1 Kgs. 15:20
  - type: text
    content: 'Ijon, '
  - type: note
    content: 2 Sam. 20:14, 15
  - type: text
    content: 'Abel-beth-maacah, Janoah, '
  - type: note
    content: Josh. 19:37
  - type: text
    content: 'Kedesh, '
  - type: note
    content: Josh. 11:1; Judg. 4:2; 1 Kgs. 9:15
  - type: text
    content: 'Hazor, Gilead, and '
  - type: note
    content: Isa. 9:1
  - type: text
    content: 'Galilee, all the land of Naphtali, and he carried the people captive to Assyria. '
  '3':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to all that his father Amaziah had done. '
  '30':
  - type: text
    content: 'Then Hoshea the son of Elah made a conspiracy against Pekah the son of Remaliah and struck him down and put him to death and reigned in his place, '
  - type: note
    content: '[ch. 17:1]'
  - type: text
    content: 'in the twentieth year of Jotham the son of Uzziah. '
  '31':
  - type: text
    content: Now the rest of the acts of Pekah and all that he did, behold, they are written in the Book of the Chronicles of the Kings of Israel.
  - type: heading
    content: Jotham Reigns in Judah
  '32':
  - type: text
    content: 'In the second year of Pekah the son of Remaliah, king of Israel, Jotham the son of Uzziah, king of Judah, began to reign. '
  '33':
  - type: text
    content: 'He was '
  - type: note
    content: For ver. 33, 34, see 2 Chr. 27:1, 2
  - type: text
    content: 'twenty-five years old when he began to reign, and he reigned sixteen years in Jerusalem. His mother’s name was Jerusha the daughter of Zadok. '
  '34':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 3; [2 Chr. 27:6]
  - type: text
    content: 'according to all that his father Uzziah had done. '
  '35':
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'Nevertheless, the high places were not removed. The people still sacrificed and made offerings on the high places. He built '
  - type: note
    content: 2 Chr. 23:20; 27:3
  - type: text
    content: 'the upper gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Now the rest of the acts of Jotham and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '37':
  - type: text
    content: 'In those days the '
  - type: text
    content: Lord
  - type: text
    content: ' began to send '
  - type: note
    content: ch. 16:5; Isa. 7:1
  - type: text
    content: 'Rezin the king of Syria and '
  - type: note
    content: ch. 16:5; Isa. 7:1
  - type: text
    content: 'Pekah the son of Remaliah against Judah. '
  '38':
  - type: text
    content: Jotham slept with his fathers and was buried with his fathers in the city of David his father, and Ahaz his son reigned in his place.
  '4':
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'Nevertheless, the high places were not taken away. The people still sacrificed and made offerings on the high places. '
  '5':
  - type: note
    content: For ver. 5-7, see 2 Chr. 26:21-23
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' touched the king, so that he was a leper'
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' to the day of his death, '
  - type: note
    content: See Lev. 13:46
  - type: text
    content: and he lived in a separate house.
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' And Jotham the king’s son was over the household, governing the people of the land. '
  '6':
  - type: text
    content: 'Now the rest of the acts of Azariah, and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '7':
  - type: text
    content: 'And Azariah slept with his fathers, and they buried him with his fathers '
  - type: note
    content: '[2 Chr. 26:23]'
  - type: text
    content: in the city of David, and Jotham his son reigned in his place.
  - type: heading
    content: Zechariah Reigns in Israel
  '8':
  - type: text
    content: 'In the thirty-eighth year of Azariah king of Judah, Zechariah the son of Jeroboam reigned over Israel in Samaria six months. '
  '9':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', as his fathers had done. He did not depart from the sins of Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: 'which he made Israel to sin. '
