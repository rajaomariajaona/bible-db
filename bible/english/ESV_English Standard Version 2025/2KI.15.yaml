        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Azariah the son of Amaziah, king of Judah, began to reign. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum the son of Jabesh conspired against him and '
