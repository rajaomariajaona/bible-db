  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Menahem the son of Gadi came up from '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 14:17
      marker-yv: yv-n
    - type: text
      text: 'Tirzah and came to Samaria, and he struck down Shallum the son of Jabesh in Samaria and put him to death and reigned in his place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the deeds of Shallum, and the conspiracy that he made, behold, they are written in the Book of the Chronicles of the Kings of Israel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Menahem sacked Tiphsah and all who were in it and its territory from Tirzah on, because they did not open it to him. Therefore he sacked it, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:12
      marker-yv: yv-n
    - type: text
      text: and he ripped open all the women in it who were pregnant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menahem Reigns in Israel
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the thirty-ninth year of Azariah king of Judah, Menahem the son of Gadi began to reign over Israel, and he reigned ten years in Samaria. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He did not depart all his days from all the sins of Jeroboam the son of Nebat, which he made Israel to sin. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 5:26
      marker-yv: yv-n
    - type: text
      text: Pul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Another name for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tiglath-pileser III '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (compare verse 29)
      marker-yv: yv-n
    - type: text
      text: ' the king of Assyria came against the land, and Menahem gave '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 5:26
      marker-yv: yv-n
    - type: text
      text: Pul a thousand talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 75 pounds or 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver, that he might help him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'to confirm his hold on the royal power. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 26:3
      - type: text
