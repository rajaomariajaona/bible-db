      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:3
      marker-yv: yv-n
    - type: text
      text: 'the upper gate of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
