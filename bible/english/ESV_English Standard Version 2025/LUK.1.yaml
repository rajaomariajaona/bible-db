  - type: heading
    content: The Birth of John the Baptist
  '57':
  - type: text
    content: 'Now the time came for Elizabeth to give birth, and she bore a son. '
  '58':
  - type: text
    content: 'And her neighbors and relatives heard that the Lord '
  - type: note
    content: Gen. 19:19
  - type: text
    content: 'had shown great mercy to her, and they rejoiced with her. '
  '59':
  - type: text
    content: 'And '
  - type: note
    content: ch. 2:21; Gen. 17:12; Lev. 12:3; Phil. 3:5
  - type: text
    content: 'on the eighth day they came to circumcise the child. And they would have called him Zechariah after his father, '
  '6':
  - type: text
    content: 'And they were both '
  - type: note
    content: ch. 2:25
  - type: text
    content: 'righteous before God, walking '
  - type: note
