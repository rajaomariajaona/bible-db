  - type: note
    content: John 6:69
  - type: text
    content: holy—
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God. '
  '36':
  - type: text
    content: 'And behold, your relative Elizabeth in her old age has also conceived a son, and this is the sixth month with her '
  - type: note
    content: ver. 7
  - type: text
    content: 'who was called barren. '
  '37':
  - type: text
    content: 'For '
  - type: note
    content: Cited from Gen. 18:14 (Gk.); See Matt. 19:26
  - type: text
    content: 'nothing will be impossible with God.” '
  '38':
  - type: text
    content: And Mary said, “Behold, I am the servant
  - type: note
    content: Greek bondservant; also verse 48
  - type: text
    content: ' of the Lord; let it be to me according to your word.” And '
  - type: note
    content: '[Judg. 6:21; Acts 12:10]'
  - type: text
    content: the angel departed from her.
  - type: heading
    content: Mary Visits Elizabeth
  '39':
  - type: text
    content: 'In those days Mary arose and went with haste into '
  - type: note
    content: ver. 65; Josh. 20:7; 21:11
  - type: text
    content: 'the hill country, to a town in Judah, '
  '4':
  - type: text
    content: 'that you may have '
  - type: note
    content: Acts 2:36 (Gk.); [2 Pet. 1:16, 19]
  - type: text
    content: 'certainty concerning the things '
  - type: note
    content: Acts 18:25; Rom. 2:18; 1 Cor. 14:19; Gal. 6:6 (Gk.)
  - type: text
    content: you have been taught.
  - type: heading
    content: Birth of John the Baptist Foretold
  '40':
  - type: text
    content: 'and she entered the house of Zechariah and greeted Elizabeth. '
  '41':
  - type: text
    content: 'And when Elizabeth heard the greeting of Mary, the baby leaped in her womb. And Elizabeth '
  - type: note
    content: ver. 15, 67
  - type: text
    content: 'was filled with the Holy Spirit, '
  '42':
  - type: text
    content: 'and she exclaimed with a loud cry, '
  - type: note
    content: '[Judg. 5:24]'
  - type: text
    content: '“Blessed are you among women, and '
  - type: note
    content: '[Deut. 28:4]'
  - type: text
    content: 'blessed is '
  - type: note
    content: Ps. 127:3
  - type: text
    content: 'the fruit of your womb! '
  '43':
  - type: text
    content: 'And why is this granted to me that the mother of '
  - type: note
    content: ch. 20:42; John 20:28; [ch. 2:11]
  - type: text
    content: 'my Lord should come to me? '
  '44':
  - type: text
    content: 'For behold, when the sound of your greeting came to my ears, the baby in my womb leaped for joy. '
  '45':
  - type: text
    content: 'And '
  - type: note
    content: John 20:29; [ver. 20]
  - type: text
    content: blessed is she who believed that there would be
  - type: note
    content: Or believed, for there will be
  - type: text
    content: ' a fulfillment of what was spoken to her from the Lord.”'
  - type: heading
    content: 'Mary’s Song of Praise: The Magnificat'
  '46':
  - type: text
    content: And Mary said,
  - type: note
    content: For ver. 46-53, [ 1 Sam. 2:1-10 ]
  - type: text
    content: '“My '
  - type: note
    content: 1 Thess. 5:23
  - type: text
    content: 'soul '
  - type: note
    content: Ps. 34:2, 3; 69:30; Acts 10:46; 19:17
  - type: text
