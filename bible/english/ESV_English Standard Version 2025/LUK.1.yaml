document_id: LUK.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Dedication to Theophilus
  - type: text
    content: 'Inasmuch as many have undertaken to compile a narrative of the things that '
  - type: note
    content: 2 Tim. 4:5, 17 (Gk.); [Acts 3:18]
  - type: text
    content: 'have been accomplished among us, '
  '10':
  - type: text
    content: 'And the whole multitude of the people '
  - type: note
    content: Ps. 141:2; [Rev. 5:8; 8:3, 4]
  - type: text
    content: 'were praying '
  - type: note
    content: '[Lev. 16:17]'
  - type: text
    content: 'outside at the hour of incense. '
  '11':
  - type: text
    content: 'And there appeared to him an angel of the Lord standing on the right side of '
  - type: note
    content: Ex. 30:1-10; 40:26, 27
  - type: text
    content: 'the altar of incense. '
  '12':
  - type: text
    content: 'And Zechariah was troubled when he saw him, and '
  - type: note
    content: Acts 19:17
  - type: text
    content: 'fear fell upon him. '
  '13':
  - type: text
    content: 'But the angel said to him, “Do not be afraid, Zechariah, for '
  - type: note
    content: '[Acts 10:4, 31]'
  - type: text
    content: 'your prayer has been heard, and your wife Elizabeth will bear you a son, and '
  - type: note
    content: ver. 60, 63
  - type: text
    content: 'you shall call his name John. '
  '14':
  - type: text
    content: 'And you will have joy and gladness, and many will '
  - type: note
    content: '[ver. 58]'
  - type: text
    content: 'rejoice at his birth, '
  '15':
  - type: text
    content: 'for he will be '
  - type: note
    content: ch. 7:28; Matt. 11:11
  - type: text
    content: 'great before the Lord. And '
  - type: note
    content: ch. 7:33; Num. 6:3; Judg. 13:4, 7, 14; Matt. 11:18
  - type: text
    content: 'he must not drink wine or strong '
  - type: note
    content: '[Acts 2:15, 17; Eph. 5:18]'
  - type: text
    content: 'drink, and '
  - type: note
    content: '[Acts 2:15, 17; Eph. 5:18]'
  - type: text
    content: 'he will be '
  - type: note
    content: ver. 41, 67; See Acts 2:4
  - type: text
    content: 'filled with the Holy Spirit, '
  - type: note
    content: Isa. 49:1, 5; Jer. 1:5; Gal. 1:15
  - type: text
    content: 'even from his mother’s womb. '
  '16':
  - type: text
    content: 'And he will turn many of the children of Israel to the Lord their God, '
  '17':
  - type: text
    content: 'and '
  - type: note
    content: ver. 76; John 3:28
  - type: text
    content: 'he will go before him '
  - type: note
    content: See Matt. 11:14
  - type: text
    content: 'in the spirit and power of Elijah, '
  - type: note
    content: Cited from Mal. 4:6
  - type: text
    content: 'to turn the hearts of the fathers to the children, and '
  - type: note
    content: Rom. 10:21
  - type: text
    content: 'the disobedient to the wisdom of the just, '
  - type: note
    content: ch. 7:27; Mal. 3:1; Matt. 11:10; Mark 1:2
  - type: text
    content: to make ready for the Lord a people prepared.”
  '18':
  - type: text
    content: 'And Zechariah said to the angel, '
  - type: note
    content: Gen. 15:8; [Gen. 17:17]
  - type: text
    content: '“How shall I know this? For I am an old man, and my wife is advanced in years.” '
  '19':
  - type: text
    content: 'And the angel answered him, “I am '
  - type: note
    content: ver. 26; Dan. 8:16; 9:21
  - type: text
    content: 'Gabriel. '
  - type: note
    content: Rev. 8:2; [1 Kgs. 17:1; Job 1:6; Isa. 63:9; Matt. 18:10]
  - type: text
    content: 'I stand in the presence of God, and I was sent to speak to you and to bring you this good news. '
  '2':
  - type: note
    content: '[Heb. 2:3]'
  - type: text
    content: 'just as those who '
  - type: note
    content: John 15:27; 16:4; [Mark 1:1; Acts 11:15]
  - type: text
    content: 'from the beginning were '
  - type: note
    content: 2 Pet. 1:16; 1 John 1:1, 3; [Acts 4:20; 1 Pet. 5:1]
  - type: text
    content: 'eyewitnesses and '
  - type: note
    content: Acts 26:16; 1 Cor. 4:1
  - type: text
    content: 'ministers of '
  - type: note
    content: See Mark 4:14
  - type: text
    content: 'the word '
  - type: note
    content: 1 Cor. 11:2, 23
  - type: text
    content: 'have delivered them to us, '
  '20':
  - type: text
    content: 'And behold, '
  - type: note
    content: '[Ezek. 3:26; 24:27]'
  - type: text
    content: 'you will be silent and unable to speak until the day that these things take place, because you did not believe my words, which will be fulfilled in their time.” '
  '21':
  - type: text
    content: 'And the people were waiting for Zechariah, and they were wondering at his delay in '
  - type: note
    content: See ver. 9
  - type: text
    content: 'the temple. '
  '22':
  - type: text
    content: 'And when he came out, he was unable to speak to them, and they realized that he had seen a vision in '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'the temple. And '
  - type: note
    content: ver. 62
  - type: text
    content: 'he kept making signs to them and remained mute. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 23:8; [ver. 8; 2 Kgs. 11:5; 1 Chr. 9:25]
  - type: text
    content: 'when his time of '
  - type: note
    content: Heb. 10:11
  - type: text
    content: service was ended, he went to his home.
  '24':
  - type: text
    content: 'After these days his wife Elizabeth conceived, and for five months she kept herself hidden, saying, '
  '25':
  - type: text
    content: '“Thus the Lord has done for me in the days when he looked on me, '
  - type: note
    content: '[Gen. 30:23; 1 Sam. 1:6; Ps. 113:9; Isa. 4:1]'
  - type: text
    content: to take away my reproach among people.”
  - type: heading
    content: Birth of Jesus Foretold
  '26':
  - type: text
    content: 'In the sixth month the angel '
  - type: note
    content: ver. 19
  - type: text
    content: 'Gabriel was sent from God to a city of Galilee named '
  - type: note
    content: See Matt. 2:23
  - type: text
    content: 'Nazareth, '
  '27':
  - type: note
    content: Matt. 1:16, 18
  - type: text
    content: to a virgin betrothed
  - type: note
    content: That is, legally pledged to be married
  - type: text
    content: ' to a man whose name was Joseph, '
  - type: note
    content: ch. 2:4; Matt. 1:20
  - type: text
    content: 'of the house of David. And the virgin’s name was Mary. '
  '28':
  - type: text
    content: 'And he came to her and said, “Greetings, '
  - type: note
    content: '[Ps. 45:2; Dan. 9:23]'
  - type: text
    content: 'O favored one, '
  - type: note
    content: Judg. 6:12
  - type: text
    content: the Lord is with you!”
  - type: note
    content: Some manuscripts add Blessed are you among women!
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'But '
  - type: note
    content: See ver. 12
  - type: text
    content: 'she was greatly troubled at the saying, and tried to discern what sort of greeting this might be. '
  '3':
  - type: text
    content: 'it seemed good to me also, having followed all things closely for some time past, to write '
  - type: note
    content: Acts 11:4
  - type: text
    content: 'an orderly account for you, '
  - type: note
    content: Acts 23:26; 24:3; 26:25
  - type: text
    content: 'most excellent '
  - type: note
    content: Acts 1:1
  - type: text
    content: 'Theophilus, '
  '30':
  - type: text
    content: 'And the angel said to her, “Do not be afraid, Mary, for '
  - type: note
    content: Acts 7:46
  - type: text
    content: 'you have found favor with God. '
  '31':
  - type: text
    content: 'And behold, '
  - type: note
    content: Isa. 7:14
  - type: text
    content: 'you will conceive in your womb and bear a son, and '
  - type: note
    content: ch. 2:21; Matt. 1:21, 25
  - type: text
    content: 'you shall call his name Jesus. '
  '32':
  - type: text
    content: 'He will be great and will be called the Son of '
  - type: note
    content: ver. 76; ch. 6:35; Acts 7:48; See Mark 5:7
  - type: text
    content: 'the Most High. And the Lord God '
  - type: note
    content: ver. 69; 2 Sam. 7:11-13, 16; Ps. 89:4; 132:11; Isa. 9:6, 7; 16:5; Acts 2:30; [Rev. 3:7]
  - type: text
    content: 'will give to him the throne of '
  - type: note
    content: See Matt. 1:1
  - type: text
    content: 'his father David, '
  '33':
  - type: text
    content: 'and he will reign over the house of Jacob '
  - type: note
    content: Dan. 2:44; 7:14, 18, 27; Heb. 1:8; Rev. 11:15; [John 12:34]
  - type: text
    content: forever, and of his kingdom there will be no end.”
  '34':
  - type: text
    content: And Mary said to the angel, “How will this be, since I am a virgin?”
  - type: note
    content: Greek since I do not know a man
  '35':
  - type: text
    content: 'And the angel answered her, '
  - type: note
    content: Matt. 1:18, 20
  - type: text
    content: '“The Holy Spirit will come upon you, and the power of '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: the Most High will overshadow you; therefore the child to be born
  - type: note
    content: Some manuscripts add of you
  - type: text
