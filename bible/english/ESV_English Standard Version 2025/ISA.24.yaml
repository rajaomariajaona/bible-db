document_id: ISA.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on the Whole Earth
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 13:9
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will empty the earth'
  - type: note
    content: Or land; also throughout this chapter
  - type: text
    content: ' and make it desolate,'
  - type: text
    content: and he will twist its surface and scatter its inhabitants.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 34:11 ]'
  - type: text
    content: The wasted city is broken down;
  - type: note
    content: ch. 23:1
  - type: text
    content: every house is shut up so that none can enter.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 7; Ps. 144:14; Joel 1:5 ]'
  - type: text
    content: There is an outcry in the streets for lack of wine;
  - type: note
    content: '[ Joel 1:12 ]'
  - type: text
    content: all joy has grown dark;
  - type: text
    content: the gladness of the earth is banished.
  '12':
  - type: text
    content: Desolation is left in the city;
  - type: text
    content: the gates are battered into ruins.
  '13':
  - type: text
    content: For thus it shall be in the midst of the earth
  - type: text
    content: among the nations,
  - type: note
    content: ch. 17:6; [ Mic. 7:1 ]
  - type: text
    content: as when an olive tree is beaten,
  - type: text
    content: as at the gleaning when the grape harvest is done.
  '14':
  - type: text
    content: They lift up their voices, they sing for joy;
  - type: text
    content: 'over the majesty of the '
  - type: text
    content: Lord
  - type: text
    content: ' they shout from the west.'
  - type: note
    content: Hebrew from the sea
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 45:6 ]'
  - type: text
    content: Therefore in the east
  - type: note
    content: Hebrew in the realm of light, or with the fires
  - type: text
    content: ' give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'in the coastlands of the sea, give glory to the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 14 ]'
  - type: text
    content: From the ends of the earth we hear songs of praise,
  - type: text
    content: 'of glory to '
  - type: note
    content: '[ch. 26:2; 60:21]'
  - type: text
    content: the Righteous One.
  - type: text
    content: But I say, “I waste away,
  - type: text
    content: I waste away. Woe is me!
  - type: text
    content: 'For '
  - type: note
    content: ch. 21:2; 33:1
  - type: text
    content: the traitors have betrayed,
  - type: text
    content: with betrayal the traitors have betrayed.”
  '17':
  - type: text
    content: ' '
  - type: note
    content: Jer. 48:43, 44; [ Job 20:24; Amos 5:19 ]
  - type: text
    content: Terror and the pit and the snare
  - type: note
    content: The Hebrew words for terror, pit, and snare sound alike
  - type: text
    content: are upon you, O inhabitant of the earth!
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: He who flees at the sound of the terror
  - type: text
    content: shall fall into the pit,
  - type: text
    content: and he who climbs out of the pit
  - type: text
    content: shall be caught in the snare.
  - type: text
    content: 'For '
  - type: note
    content: See Gen. 7:11
  - type: text
    content: the windows of heaven are opened,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 18:7
  - type: text
    content: the foundations of the earth tremble.
  '19':
  - type: text
    content: The earth is utterly broken,
  - type: text
    content: the earth is split apart,
  - type: text
    content: the earth is violently shaken.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Hos. 4:9; [ Lam. 4:16 ]; See ch. 3:1-3
  - type: text
    content: And it shall be, as with the people, so with the priest;
  - type: text
    content: as with the slave, so with his master;
  - type: text
    content: as with the maid, so with her mistress;
  - type: note
    content: '[ Ezek. 7:12, 13 ]'
  - type: text
    content: as with the buyer, so with the seller;
  - type: text
    content: as with the lender, so with the borrower;
  - type: note
    content: '[ Jer. 15:10 ]'
  - type: text
    content: as with the creditor, so with the debtor.
  '20':
  - type: text
    content: 'The earth '
  - type: note
    content: '[ch. 19:14; 29:9]'
  - type: text
    content: staggers like a drunken man;
  - type: text
    content: it sways like a hut;
  - type: note
    content: '[ver. 5, 6 ]'
  - type: text
    content: its transgression lies heavy upon it,
  - type: text
    content: and it falls, and will not rise again.
  '21':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will punish'
  - type: text
    content: the host of heaven, in heaven,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 76:12; [ch. 10:12; 31:8]
  - type: text
    content: the kings of the earth, on the earth.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mic. 4:11, 12
  - type: text
    content: They will be gathered together
  - type: text
    content: as prisoners in a pit;
  - type: text
    content: they will be shut up in a prison,
  - type: text
    content: 'and after many days '
  - type: note
    content: ch. 29:6
  - type: text
    content: they will be punished.
  '23':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:10
  - type: text
    content: Then the moon will be confounded
  - type: text
    content: and the sun ashamed,
  - type: text
    content: 'for '
  - type: note
    content: Ps. 99:1, 2; Mic. 4:7
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts reigns'
  - type: text
    content: on Mount Zion and in Jerusalem,
  - type: text
    content: and his glory will be before his elders.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ver. 1, 6
  - type: text
    content: The earth shall be utterly empty and utterly plundered;
  - type: note
    content: See ch. 1:20
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken this word.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:8; Hos. 4:3 ]'
  - type: text
    content: The earth mourns and withers;
  - type: text
    content: the world languishes and withers;
  - type: text
    content: the highest people of the earth languish.
  '5':
  - type: text
    content: 'The earth lies '
  - type: note
    content: Num. 35:33
  - type: text
    content: defiled
  - type: text
    content: under its inhabitants;
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 2:6, 8]'
  - type: text
    content: they have transgressed the laws,
  - type: text
    content: violated the statutes,
  - type: text
    content: broken the everlasting covenant.
  '6':
  - type: text
    content: 'Therefore '
  - type: note
    content: Zech. 5:3, 4
  - type: text
    content: a curse devours the earth,
  - type: text
    content: 'and its inhabitants '
  - type: note
    content: '[Ps. 5:10]'
  - type: text
    content: suffer for their guilt;
  - type: text
    content: therefore the inhabitants of the earth are scorched,
  - type: text
    content: and few men are left.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Joel 1:10, 12 ]'
  - type: text
    content: The wine mourns,
  - type: text
    content: the vine languishes,
  - type: text
    content: all the merry-hearted sigh.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Jer. 7:34; Hos. 2:11; [ Amos 8:10 ]
  - type: text
    content: The mirth of the tambourines is stilled,
  - type: text
    content: the noise of the jubilant has ceased,
  - type: text
    content: the mirth of the lyre is stilled.
  '9':
  - type: text
    content: 'No more do they drink wine '
  - type: note
    content: '[Amos 6:5, 6]'
  - type: text
    content: with singing;
  - type: text
    content: strong drink is bitter to those who drink it.
