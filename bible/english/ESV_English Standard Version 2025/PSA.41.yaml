  - type: text
    content: heal me,
  - type: note
    content: Hebrew my soul
  - type: text
    content: ' for I have sinned against you!”'
  '5':
  - type: text
    content: My enemies say of me in malice,
  - type: text
    content: “When will he die, and his name perish?”
  '6':
  - type: text
    content: 'And when one comes to see me, '
  - type: note
    content: Ps. 12:2; 144:8
  - type: text
    content: he utters empty words,
  - type: text
    content: while his heart gathers iniquity;
  - type: text
    content: when he goes out, he tells it abroad.
  '7':
  - type: text
    content: All who hate me whisper together about me;
  - type: text
    content: they imagine the worst for me.
  - type: note
    content: Or they devise evil against me
  '8':
  - type: text
    content: They say, “A deadly thing is poured out
  - type: note
    content: Or has fastened
  - type: text
    content: ' on him;'
  - type: text
    content: he will not rise again from where he lies.”
  '9':
  - type: text
    content: 'Even my '
  - type: note
    content: Ps. 55:12, 13, 20; Job 19:13, 14, 19; Jer. 9:4; 20:10; Mic. 7:5; [2 Sam. 15:12]
  - type: text
    content: close friend in whom I trusted,
  - type: text
    content: 'who '
  - type: note
