  - type: note
    content: Hebrew you turn all his bed
  '4':
  - type: text
    content: 'As for me, I said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 4:1
  - type: text
    content: be gracious to me;
  - type: note
