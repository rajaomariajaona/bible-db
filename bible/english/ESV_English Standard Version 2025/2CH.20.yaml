document_id: 2CH.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat’s Prayer
  - type: text
    content: 'After this '
  - type: note
    content: 2 Kgs. 1:1; 3:4, 7
  - type: text
    content: the Moabites and Ammonites, and with them some of the Meunites,
  - type: note
    content: Compare 26:7; Hebrew Ammonites
  - type: text
    content: ' came against Jehoshaphat for battle. '
  '10':
  - type: text
    content: 'And now behold, the men of '
  - type: note
    content: ver. 1, 22, 23
  - type: text
    content: 'Ammon and Moab and '
  - type: note
    content: ch. 25:11, 14; Gen. 32:3; 36:8
  - type: text
    content: 'Mount Seir, whom '
  - type: note
    content: Deut. 2:4, 5, 9, 19
  - type: text
    content: 'you would not let Israel invade when they came from the land of Egypt, '
  - type: note
    content: Num. 20:21
  - type: text
    content: 'and whom they avoided and did not destroy— '
  '11':
  - type: text
    content: 'behold, they reward us '
  - type: note
    content: Ps. 83:6, 7, 12
  - type: text
    content: 'by coming to drive us out of your possession, which you have given us to inherit. '
  '12':
  - type: text
    content: 'O our God, will you not '
  - type: note
    content: '[1 Sam. 3:13]'
  - type: text
    content: 'execute judgment on them? For we are powerless against this great horde that is coming against us. We do not know what to do, but '
  - type: note
    content: Ps. 25:15; 123:1, 2; 141:8
  - type: text
    content: our eyes are on you.”
  '13':
  - type: text
    content: 'Meanwhile all Judah stood before the '
  - type: text
    content: Lord
  - type: text
    content: ', with their little ones, their wives, and their children. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 15:1
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came'
  - type: note
    content: Or was
  - type: text
    content: ' upon Jahaziel the son of Zechariah, son of Benaiah, son of Jeiel, son of Mattaniah, a Levite of the sons of Asaph, in the midst of the assembly. '
  '15':
  - type: text
    content: 'And he said, “Listen, all Judah and inhabitants of Jerusalem and King Jehoshaphat: Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' to you, '
  - type: note
    content: ch. 32:7; [Deut. 1:29, 30; 31:6, 8]
  - type: text
    content: '‘Do not be afraid and do not be dismayed at this great horde, '
  - type: note
    content: 1 Sam. 17:47
  - type: text
    content: 'for the battle is not yours but God’s. '
  '16':
  - type: text
    content: 'Tomorrow go down against them. Behold, they will come up by the ascent of Ziz. You will find them at the end of '
  - type: note
    content: Num. 13:23
  - type: text
    content: 'the valley, east of the wilderness of Jeruel. '
  '17':
  - type: note
    content: '[Ex. 14:13, 14]'
  - type: text
    content: 'You will not need to fight in this battle. Stand firm, hold your position, and see the salvation of the '
  - type: text
    content: Lord
  - type: text
    content: ' on your behalf, O Judah and Jerusalem.’ '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'Do not be afraid and do not be dismayed. Tomorrow go out against them, '
  - type: note
    content: ch. 15:2; 32:8; [Num. 14:9]
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will be with you.”'
  '18':
  - type: text
    content: 'Then Jehoshaphat '
  - type: note
    content: ch. 29:29, 30; Ex. 4:31; Neh. 8:6
  - type: text
    content: 'bowed his head with his face to the ground, and all Judah and the inhabitants of Jerusalem fell down before the '
  - type: text
    content: Lord
  - type: text
    content: ', worshiping the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And the Levites, of the '
  - type: note
    content: Ex. 6:16, 18
  - type: text
    content: 'Kohathites and the '
  - type: note
    content: See 1 Chr. 9:19
  - type: text
    content: 'Korahites, stood up to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with a very loud voice.'
  '2':
  - type: text
    content: Some men came and told Jehoshaphat, “A great multitude is coming against you from Edom,
  - type: note
    content: One Hebrew manuscript; most Hebrew manuscripts Aram (Syria)
  - type: text
    content: ' from beyond the sea; and, behold, they are in '
  - type: note
    content: Gen. 14:7
  - type: text
    content: 'Hazazon-tamar” (that is, '
  - type: note
    content: See 1 Sam. 23:29
  - type: text
    content: 'Engedi). '
  '20':
  - type: text
    content: 'And they rose early in the morning and went out into '
  - type: note
    content: '[2 Sam. 14:2]'
  - type: text
    content: 'the wilderness of Tekoa. And when they went out, Jehoshaphat stood and said, “Hear me, Judah and inhabitants of Jerusalem! '
  - type: note
    content: Isa. 7:9
  - type: text
    content: 'Believe in the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and you will be established; believe his prophets, and you will succeed.” '
  '21':
  - type: text
    content: 'And when he had taken counsel with the people, he appointed those who were to sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' and praise him '
  - type: note
    content: See 1 Chr. 16:29
  - type: text
    content: in holy attire, as they went before the army, and say,
  - type: note
    content: See 1 Chr. 16:34
  - type: text
    content: '“Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for his steadfast love endures forever.”
  '22':
  - type: text
    content: 'And when they began to sing and praise, the '
  - type: text
    content: Lord
  - type: text
    content: ' set '
  - type: note
    content: '[ch. 13:13]'
  - type: text
    content: 'an ambush against the men of '
  - type: note
    content: ver. 10
  - type: text
    content: 'Ammon, Moab, and Mount Seir, who had come against Judah, so that they were routed. '
  '23':
  - type: text
    content: 'For the men of Ammon and Moab rose against the inhabitants of Mount Seir, devoting them to destruction, and when they had made an end of the inhabitants of Seir, '
  - type: note
    content: '[Judg. 7:22; 1 Sam. 14:20]'
  - type: text
    content: they all helped to destroy one another.
  - type: heading
    content: The Lord Delivers Judah
  '24':
  - type: text
    content: When Judah came to the watchtower of the wilderness, they looked toward the horde, and behold, there
  - type: note
    content: Hebrew they
  - type: text
    content: ' were dead bodies lying on the ground; none had escaped. '
  '25':
  - type: text
    content: 'When Jehoshaphat and his people came to take their spoil, they found among them, in great numbers, goods, clothing, and precious things, which they took for themselves until they could carry no more. They were three days in taking the spoil, it was so much. '
  '26':
  - type: text
    content: On the fourth day they assembled in the Valley of Beracah,
  - type: note
    content: Beracah means blessing
  - type: text
    content: ' for there they blessed the '
  - type: text
    content: Lord
  - type: text
    content: '. Therefore the name of that place has been called the Valley of Beracah to this day. '
  '27':
  - type: text
    content: 'Then they returned, every man of Judah and Jerusalem, and Jehoshaphat at their head, returning to Jerusalem with joy, '
  - type: note
    content: Neh. 12:43
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' had made them rejoice over their enemies. '
  '28':
  - type: text
    content: 'They came to Jerusalem with harps and lyres and trumpets, to the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: note
    content: ch. 14:14; 17:10
  - type: text
    content: 'And the fear of God came on all the kingdoms of the countries when they heard that the '
  - type: text
    content: Lord
  - type: text
    content: ' had fought against the enemies of Israel. '
  '3':
  - type: text
    content: 'Then Jehoshaphat was afraid and set his face '
  - type: note
    content: ch. 19:3; [1 Chr. 22:19]
  - type: text
    content: 'to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Ezra 8:21; Jer. 36:9; Jonah 3:5; [Joel 1:14; 2:15]
  - type: text
    content: 'proclaimed a fast throughout all Judah. '
  '30':
  - type: text
    content: 'So the realm of Jehoshaphat was quiet, '
  - type: note
    content: '[ch. 14:6, 7; 15:15]'
  - type: text
    content: for his God gave him rest all around.
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-33, see 1 Kgs. 22:41-43
  - type: text
    content: 'Thus Jehoshaphat reigned over Judah. He was thirty-five years old when he began to reign, and he reigned twenty-five years in Jerusalem. His mother’s name was Azubah the daughter of Shilhi. '
  '32':
  - type: text
    content: 'He walked in the way of Asa his father and did not turn aside from it, doing what was right in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: note
    content: '[ch. 17:6]'
  - type: text
    content: 'The high places, however, were not taken away; '
  - type: note
    content: ch. 12:14
  - type: text
    content: the people had not yet set their hearts upon the God of their fathers.
  '34':
  - type: text
    content: 'Now the rest of the acts of Jehoshaphat, from first to last, are written in the chronicles of '
  - type: note
    content: ch. 19:2
  - type: text
    content: 'Jehu the son of Hanani, '
  - type: note
    content: 1 Kgs. 16:1, 7
  - type: text
    content: which are recorded in the Book of the Kings of Israel.
  - type: heading
    content: The End of Jehoshaphat’s Reign
  '35':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 22:48, 49
  - type: text
    content: 'After this Jehoshaphat king of Judah joined with Ahaziah king of Israel, who acted wickedly. '
  '36':
  - type: text
    content: 'He joined him in building ships to go to '
  - type: note
    content: ch. 9:21
  - type: text
    content: 'Tarshish, and they built the ships in Ezion-geber. '
  '37':
  - type: text
    content: 'Then Eliezer the son of Dodavahu of Mareshah prophesied against Jehoshaphat, saying, '
  - type: note
    content: '[ch. 19:2]'
  - type: text
    content: '“Because you have joined with Ahaziah, the '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy what you have made.” And the ships were wrecked and were not able to go to Tarshish.'
  '4':
  - type: text
    content: 'And Judah assembled to seek help from the '
  - type: text
    content: Lord
  - type: text
    content: '; from all the cities of Judah they came to seek the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'And Jehoshaphat stood in the assembly of Judah and Jerusalem, in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', before the new court, '
  '6':
  - type: text
    content: 'and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of our fathers, are you not '
  - type: note
    content: See Deut. 4:39
  - type: text
    content: 'God in heaven? You '
  - type: note
    content: '[Dan. 4:17, 25, 32]'
  - type: text
    content: 'rule over all the kingdoms of the nations. '
  - type: note
    content: 1 Chr. 29:12
  - type: text
    content: 'In your hand are power and might, so that none is able to withstand you. '
  '7':
  - type: text
    content: 'Did you not, our God, '
  - type: note
    content: Ps. 44:2
  - type: text
    content: 'drive out the inhabitants of this land before your people Israel, and give it forever to the descendants of '
  - type: note
    content: Isa. 41:8; James 2:23
  - type: text
    content: 'Abraham your friend? '
  '8':
  - type: text
    content: 'And they have lived in it and have built for you in it a sanctuary for your name, saying, '
  '9':
  - type: note
    content: ch. 6:28-30; 1 Kgs. 8:33, 37; [Ezek. 14:21]
  - type: text
    content: ‘If disaster comes upon us, the sword, judgment,
  - type: note
    content: Or the sword of judgment
  - type: text
    content: ' or pestilence, or famine, '
  - type: note
    content: '[Ezra 10:1]'
  - type: text
    content: we will stand before this house and before you—
  - type: note
    content: ch. 6:20
  - type: text
    content: 'for your name is in this house—and cry out to you in our affliction, and you will hear and save.’ '
