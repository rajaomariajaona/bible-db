document_id: 2SA.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rebellion of Sheba
  - type: text
    content: 'Now there happened to be there '
  - type: note
    content: See Deut. 13:13
  - type: text
    content: a worthless man, whose name was Sheba, the son of Bichri, a Benjaminite. And he blew the trumpet and said,
  - type: note
    content: '[ch. 19:43 ]'
  - type: text
    content: “We have no portion in David,
  - type: text
    content: and we have no inheritance in the son of Jesse;
  - type: note
    content: ver. 22 ; 1 Kgs. 12:16; 2 Chr. 10:16
  - type: text
    content: every man to his tents, O Israel!”
  '10':
  - type: text
    content: 'But Amasa did not observe the sword that was in Joab’s hand. '
  - type: note
    content: 1 Kgs. 2:5
  - type: text
    content: 'So Joab struck him with it '
  - type: note
    content: See ch. 2:23
  - type: text
    content: in the stomach and spilled his entrails to the ground without striking a second blow, and he died.
  - type: text
    content: 'Then Joab and Abishai his brother pursued Sheba the son of Bichri. '
  '11':
  - type: text
    content: 'And one of Joab’s young men took his stand by Amasa and said, “Whoever favors Joab, and whoever is for David, let him follow Joab.” '
  '12':
  - type: text
    content: 'And Amasa lay wallowing in his blood in the highway. And anyone who came by, seeing him, stopped. And when the man saw that all the people stopped, he carried Amasa out of the highway into the field and threw a garment over him. '
  '13':
  - type: text
    content: When he was taken out of the highway, all the people went on after Joab to pursue Sheba the son of Bichri.
  '14':
  - type: text
    content: 'And Sheba passed through all the tribes of Israel to '
  - type: note
    content: '[2 Kgs. 15:29]'
  - type: text
    content: 'Abel of '
  - type: note
    content: '[2 Kgs. 15:29]'
  - type: text
    content: Beth-maacah,
  - type: note
    content: Compare 20:15; Hebrew and Beth-maacah
  - type: text
    content: ' and all '
  - type: note
    content: Num. 21:16
  - type: text
    content: the Bichrites
  - type: note
    content: Hebrew Berites
  - type: text
    content: ' assembled and followed him in. '
  '15':
  - type: text
    content: 'And all the men who were with Joab came and besieged him in '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'Abel of Beth-maacah. '
  - type: note
    content: 2 Kgs. 19:32; Isa. 37:33; Jer. 6:6; Ezek. 4:2; 26:8
  - type: text
    content: 'They cast up a mound against the city, and it stood against the rampart, and they were battering the wall to throw it down. '
  '16':
  - type: text
    content: 'Then a wise woman called from the city, “Listen! Listen! Tell Joab, ‘Come here, that I may speak to you.’” '
  '17':
  - type: text
    content: 'And he came near her, and the woman said, “Are you Joab?” He answered, “I am.” Then she said to him, “Listen to the words of your servant.” And he answered, “I am listening.” '
  '18':
  - type: text
    content: 'Then she said, “They used to say in former times, ‘Let them but ask counsel at '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'Abel,’ and so they settled a matter. '
  '19':
  - type: text
    content: 'I am one of those who are peaceable and faithful in Israel. You seek to destroy a city that is a mother in Israel. Why will you '
  - type: note
    content: ch. 17:16
  - type: text
    content: 'swallow up '
  - type: note
    content: See 1 Sam. 26:19
  - type: text
    content: 'the heritage of the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '2':
  - type: text
    content: So all the men of Israel withdrew from David and followed Sheba the son of Bichri. But the men of Judah followed their king steadfastly from the Jordan to Jerusalem.
  '20':
  - type: text
    content: 'Joab answered, “Far be it from me, far be it, that I should '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'swallow up or destroy! '
  '21':
  - type: text
    content: 'That is not true. But a man of '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, called Sheba the son of Bichri, has lifted up his hand against King David. Give up him alone, and I will withdraw from the city.” And the woman said to Joab, “Behold, his head shall be thrown to you over the wall.” '
  '22':
  - type: text
    content: 'Then the woman went to all the people '
  - type: note
    content: ver. 16; [Eccles. 9:14, 15]
  - type: text
    content: 'in her wisdom. And they cut off the head of Sheba the son of Bichri and threw it out to Joab. So he blew the trumpet, and they dispersed from the city, '
  - type: note
    content: See 1 Sam. 4:10
  - type: text
    content: every man to his home. And Joab returned to Jerusalem to the king.
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-26, see ch. 8:16-18; 1 Kgs. 4:3-6
  - type: text
    content: 'Now Joab was in command of all the army of Israel; and Benaiah the son of Jehoiada was in command of the Cherethites and the Pelethites; '
  '24':
  - type: text
    content: 'and '
  - type: note
    content: '[1 Kgs. 12:18]'
  - type: text
    content: 'Adoram was in charge of the forced labor; and Jehoshaphat the son of Ahilud was the recorder; '
  '25':
  - type: text
    content: 'and Sheva was secretary; and '
  - type: note
    content: ch. 15:24; 19:11
  - type: text
    content: 'Zadok and Abiathar were priests; '
  '26':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 23:38]'
  - type: text
    content: Ira the Jairite was also David’s priest.
  '3':
  - type: text
    content: 'And David came to his house at Jerusalem. And the king took '
  - type: note
    content: ch. 15:16; 16:21, 22
  - type: text
    content: the ten concubines whom he had left to care for the house and put them in a house under guard and provided for them, but did not go in to them. So they were shut up until the day of their death, living as if in widowhood.
  '4':
  - type: text
    content: 'Then the king said to '
  - type: note
    content: ch. 17:25; 19:13
  - type: text
    content: 'Amasa, “Call the men of Judah together to me within three days, and be here yourself.” '
  '5':
  - type: text
    content: 'So Amasa went to summon Judah, but he delayed beyond the set time that had been appointed him. '
  '6':
  - type: text
    content: 'And David said to Abishai, “Now Sheba the son of Bichri will do us more harm than Absalom. Take '
  - type: note
    content: ch. 11:11; 1 Kgs. 1:33
  - type: text
    content: your lord’s servants and pursue him, lest he get himself to fortified cities and escape from us.”
  - type: note
    content: Hebrew and snatch away our eyes
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And there went out after him Joab’s men and the '
  - type: note
    content: ver. 23; See ch. 8:18
  - type: text
    content: 'Cherethites and the Pelethites, and all the mighty men. They went out from Jerusalem to pursue Sheba the son of Bichri. '
  '8':
  - type: text
    content: 'When they were at the great stone that is in Gibeon, Amasa came to meet them. Now Joab was wearing a soldier’s garment, and over it was a belt with a sword in its sheath fastened on his thigh, and as he went forward it fell out. '
  '9':
  - type: text
    content: 'And Joab said to Amasa, “Is it well with you, my brother?” And Joab took Amasa by the beard with his right hand '
  - type: note
    content: '[Matt. 26:49; Mark 14:45; Luke 22:47]'
  - type: text
    content: 'to kiss him. '
