document_id: EZK.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of the Wrath of the Lord
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: '“Behold, the day! Behold, it comes! '
  - type: note
    content: ver. 7
  - type: text
    content: 'Your doom has come; '
  - type: note
    content: '[Isa. 10:5; 14:5]'
  - type: text
    content: 'the rod has blossomed; pride has budded. '
  '11':
  - type: note
    content: '[ver. 23]'
  - type: text
    content: 'Violence has grown up into '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'a rod of wickedness. '
  - type: note
    content: '[ch. 17:13]'
  - type: text
    content: None of them shall remain, nor their abundance, nor their wealth; neither shall there be preeminence among them.
  - type: note
    content: The meaning of this last Hebrew sentence is uncertain
  - type: text
    content: ' '
  '12':
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'The time has come; the day has arrived. Let not '
  - type: note
    content: '[Isa. 24:2; 1 Cor. 7:29, 30]'
  - type: text
    content: 'the buyer rejoice, nor '
  - type: note
    content: '[Isa. 24:2; 1 Cor. 7:29, 30]'
  - type: text
    content: 'the seller mourn, '
  - type: note
    content: ver. 14
  - type: text
    content: for wrath is upon all their multitude.
  - type: note
    content: Or abundance; also verses 13, 14
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Lev. 25:13, 14
  - type: text
    content: 'the seller shall not return to what he has sold, while they live. '
  - type: note
    content: See ch. 9:8-10
  - type: text
    content: For the vision concerns all their multitude; it shall not turn back; and because of his iniquity, none can maintain his life.
  - type: note
    content: The meaning of this last Hebrew sentence is uncertain
  '14':
  - type: text
    content: '“They have blown the trumpet and made everything ready, but none goes to battle, '
  - type: note
    content: ver. 12
  - type: text
    content: 'for my wrath is upon all their multitude. '
  '15':
  - type: note
    content: '[ch. 6:12; Lam. 1:20]'
  - type: text
    content: 'The sword is without; pestilence and famine are within. '
  - type: note
    content: Jer. 14:18
  - type: text
    content: 'He who is in the field dies by the sword, '
  - type: note
    content: Jer. 14:18
  - type: text
    content: 'and him who is in the city famine and pestilence devour. '
  '16':
  - type: note
    content: ch. 6:8
  - type: text
    content: 'And if any survivors escape, they will be on the mountains, like '
  - type: note
    content: '[Isa. 38:14]'
  - type: text
    content: 'doves of the valleys, all of them moaning, each one over his iniquity. '
  '17':
  - type: note
    content: ch. 21:7; Isa. 13:7; Jer. 6:24
  - type: text
    content: 'All hands are feeble, and all knees turn to water. '
  '18':
  - type: note
    content: Isa. 15:2, 3; Lam. 2:10
  - type: text
    content: 'They put on sackcloth, and '
  - type: note
    content: Ps. 55:5
  - type: text
    content: 'horror covers them. Shame is on all faces, and '
  - type: note
    content: See Isa. 3:24
  - type: text
    content: 'baldness on all their heads. '
  '19':
  - type: text
    content: 'They cast their silver into the streets, and their gold is like an unclean thing. '
  - type: note
    content: Prov. 11:4; Zeph. 1:18
  - type: text
    content: 'Their silver and gold are not able to deliver them in the day of the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: '. They cannot satisfy their hunger or fill their stomachs with it. '
  - type: note
    content: '[1 Tim. 6:10]'
  - type: text
    content: 'For it was '
  - type: note
    content: ch. 14:3, 4, 7; 44:12
  - type: text
    content: 'the stumbling block of their iniquity. '
  '2':
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'O son of man, thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' to the land of Israel: '
  - type: note
    content: Lam. 4:18; [Isa. 10:23]
  - type: text
    content: An end! The end has come upon the four corners of the land.
  - type: note
    content: Or earth
  - type: text
    content: ' '
  '20':
  - type: note
    content: '[Isa. 64:11]'
  - type: text
    content: 'His beautiful ornament they used for pride, and '
  - type: note
    content: '[ch. 16:17]; See ch. 8:5-16'
  - type: text
    content: 'they made their abominable images and their detestable things of it. Therefore '
  - type: note
    content: '[ch. 9:7; 24:21; 25:3]'
  - type: text
    content: 'I make it an unclean thing to them. '
  '21':
  - type: text
    content: 'And I will give it into the hands of '
  - type: note
    content: See ch. 28:7
  - type: text
    content: 'foreigners for prey, '
  - type: note
    content: '[ver. 24; ch. 23:46]'
  - type: text
    content: 'and to the wicked of the earth for spoil, and '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'they shall profane it. '
  '22':
  - type: text
    content: 'I will turn my face from them, and '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: they shall profane my treasured
  - type: note
    content: Or secret
  - type: text
    content: ' place. Robbers shall enter '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: and profane it.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 27:2 ]'
  - type: text
    content: “Forge a chain!
  - type: note
    content: Probably refers to an instrument of captivity
  - type: text
    content: ' '
  - type: note
    content: ch. 8:17; 9:9; 11:6; 22:3, 4; Jer. 6:7
  - type: text
    content: 'For the land is full of bloody crimes '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'and the city is full of violence. '
  '24':
  - type: text
    content: 'I will bring '
  - type: note
    content: '[ver. 21; Hab. 1:6, 13]'
  - type: text
    content: 'the worst of the nations to take possession of their houses. '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'I will put an end to the pride of the strong, '
  - type: note
    content: See ver. 20
  - type: text
    content: and their holy places
  - type: note
    content: By revocalization (compare Septuagint); Hebrew and those who sanctify them
  - type: text
    content: ' shall be profaned. '
  '25':
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'When anguish comes, '
  - type: note
    content: '[Jer. 6:14; 8:15; 1 Thess. 5:3]'
  - type: text
    content: 'they will seek peace, but there shall be none. '
  '26':
  - type: note
    content: '[Jer. 4:20]'
  - type: text
    content: 'Disaster comes upon disaster; '
  - type: note
    content: See Job 1:16-19
  - type: text
    content: 'rumor follows rumor. '
  - type: note
    content: '[ch. 20:1, 3; Ps. 74:9]'
  - type: text
    content: 'They seek a vision from the prophet, while '
  - type: note
    content: '[Mal. 2:7]'
  - type: text
    content: the law
  - type: note
    content: Or instruction
  - type: text
    content: ' perishes from the priest and '
  - type: note
    content: '[1 Kgs. 12:6]'
  - type: text
    content: 'counsel from the elders. '
  '27':
  - type: text
    content: 'The king mourns, the prince is wrapped in despair, and the hands of the people of the land are paralyzed by terror. According to their way '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'I will do to them, and according to their judgments I will judge them, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and they shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Now '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the end is upon you, and '
  - type: note
    content: See ver. 8
  - type: text
    content: 'I will send my anger upon you; '
  - type: note
    content: See ch. 18:30
  - type: text
    content: 'I will judge you according to your ways, and I will punish you for all your abominations. '
  '4':
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'And my eye will not spare you, nor will I have pity, but '
  - type: note
    content: ch. 9:10; 11:21; 16:43; 22:31
  - type: text
    content: 'I will punish you for your ways, while your abominations are in your midst. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Disaster '
  - type: note
    content: '[ch. 5:9]'
  - type: text
    content: after disaster!
  - type: note
    content: Some Hebrew manuscripts (compare Syriac, Targum); most Hebrew manuscripts Disaster! A unique disaster!
  - type: text
    content: ' Behold, it comes. '
  '6':
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'An end has come; the end has come; it has awakened against you. Behold, it comes. '
  '7':
  - type: note
    content: ver. 10
  - type: text
    content: Your doom
  - type: note
    content: The meaning of the Hebrew word is uncertain; also verse 10
  - type: text
    content: ' has come to you, O inhabitant of the land. '
  - type: note
    content: Zeph. 1:14, 15; [ch. 12:23]
  - type: text
    content: 'The time has come; the day is near, a day of tumult, and not '
  - type: note
    content: '[Jer. 25:30]'
  - type: text
    content: 'of joyful shouting on the mountains. '
  '8':
  - type: text
    content: 'Now I will soon '
  - type: note
    content: ch. 9:8; 14:19; 20:8, 13, 21, 33, 34; 22:22; 36:18
  - type: text
    content: 'pour out my wrath upon you, and '
  - type: note
    content: See ch. 5:13
  - type: text
    content: 'spend my anger against you, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'and judge you according to your ways, and I will punish you for all your abominations. '
  '9':
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'And my eye will not spare, nor will I have pity. I will punish you according to your ways, while your abominations are in your midst. '
  - type: note
    content: '[ch. 6:7]'
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who strikes.'
