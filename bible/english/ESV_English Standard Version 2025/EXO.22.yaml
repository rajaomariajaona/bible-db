document_id: EXO.22,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ch 21:37 in Hebrew
  - type: text
    content: '“If a man steals an ox or a sheep, and kills it or sells it, he shall repay five oxen for an ox, and '
  - type: note
    content: 2 Sam. 12:6; [Prov. 6:31; Luke 19:8]
  - type: text
    content: 'four sheep for a sheep. '
  '10':
  - type: text
    content: '“If a man gives to his neighbor a donkey or an ox or a sheep or any beast to keep safe, and it dies or is injured or is driven away, without anyone seeing it, '
  '11':
  - type: note
    content: Heb. 6:16
  - type: text
    content: 'an oath by the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be between them both to see whether or not he has put his hand to his neighbor’s property. The owner shall accept the oath, and he shall not make restitution. '
  '12':
  - type: text
    content: 'But if '
  - type: note
    content: Gen. 31:39
  - type: text
    content: 'it is stolen from him, he shall make restitution to its owner. '
  '13':
  - type: text
    content: If it is torn by beasts, let him bring it as evidence. He shall not make restitution for what has been torn.
  '14':
  - type: text
    content: '“If a man borrows anything of his neighbor, and it is injured or dies, the owner not being with it, he shall make full restitution. '
  '15':
  - type: text
    content: If the owner was with it, he shall not make restitution; if it was hired, it came for its hiring fee.
  - type: note
    content: Or it is reckoned in (Hebrew comes into) its hiring fee
  - type: heading
    content: Laws for a Just Community
  '16':
  - type: text
    content: ' '
  - type: note
    content: Deut. 22:28, 29
  - type: text
    content: “If a man seduces a virgin
  - type: note
    content: Or a girl of marriageable age; also verse 17
  - type: text
    content: ' who is not betrothed and lies with her, he shall give the bride-price'
  - type: note
    content: Or engagement present; also verse 17
  - type: text
    content: ' for her and make her his wife. '
  '17':
  - type: text
    content: 'If her father utterly refuses to give her to him, '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'he shall pay money equal to the '
  - type: note
    content: Gen. 34:12; 1 Sam. 18:25
  - type: text
    content: bride-price for virgins.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:26, 31; 20:27; Deut. 18:10, 11; 1 Sam. 28:3, 9
  - type: text
    content: “You shall not permit a sorceress to live.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Lev. 18:23; 20:15; Deut. 27:21
  - type: text
    content: “Whoever lies with an animal shall be put to death.
  '2':
  - type: note
    content: Ch 22:1 in Hebrew
  - type: text
    content: ' If a thief is found '
  - type: note
    content: Matt. 24:43
  - type: text
    content: 'breaking in and is struck so that he dies, there shall be no bloodguilt for him, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Num. 25:2, 7, 8; Josh. 23:16 ]; See Deut. 13:1-15; 17:2-5'
  - type: text
    content: '“Whoever sacrifices to any god, other than the '
  - type: text
    content: Lord
  - type: text
    content: ' alone, shall be devoted to destruction.'
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:9; Lev. 19:33; Deut. 10:18, 19; Jer. 7:6; Zech. 7:10; Mal. 3:5
  - type: text
    content: '“You shall not wrong a sojourner or oppress him, for you were sojourners in the land of Egypt. '
  '22':
  - type: note
    content: Deut. 24:17; 27:19; Ps. 94:6; Isa. 1:17, 23; 10:2; Ezek. 22:7; Zech. 7:10; James 1:27
  - type: text
    content: 'You shall not mistreat any widow or fatherless child. '
  '23':
  - type: text
    content: 'If you do mistreat them, and they '
  - type: note
    content: Job 34:28; Luke 18:7
  - type: text
    content: 'cry out to me, I will surely '
  - type: note
    content: Ps. 18:6; 145:19; [James 5:4]
  - type: text
    content: 'hear their cry, '
  '24':
  - type: text
    content: 'and my wrath will burn, and I will kill you with the sword, and '
  - type: note
    content: Ps. 109:9; Lam. 5:3
  - type: text
    content: your wives shall become widows and your children fatherless.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Lev. 25:35-37; Deut. 23:19, 20; Neh. 5:7; Ps. 15:5; Prov. 28:8; Ezek. 18:8, 13, 17; 22:12
  - type: text
    content: '“If you lend money to any of my people with you who is poor, you shall not be like a moneylender to him, and you shall not exact interest from him. '
  '26':
  - type: note
    content: Deut. 24:13, 17; Prov. 20:16; Ezek. 18:7, 16; Amos 2:8; [Prov. 22:27]
  - type: text
    content: 'If ever you take your neighbor’s cloak in pledge, you shall return it to him before the sun goes down, '
  '27':
  - type: text
    content: 'for that is his only covering, and it is his cloak for his body; in what else shall he sleep? And if he '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'cries to me, I will hear, for I am '
  - type: note
    content: ch. 34:6; 2 Chr. 30:9; Neh. 9:17
  - type: text
    content: compassionate.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Cited Acts 23:5; [ 2 Sam. 19:21; Eccles. 10:20; Jude 8 ]
  - type: text
    content: '“You shall not revile God, nor '
  - type: note
    content: Cited Acts 23:5; [2 Sam. 19:21; Eccles. 10:20; Jude 8]
  - type: text
    content: curse a ruler of your people.
  '29':
  - type: text
    content: '“You shall not delay to offer from the fullness of your harvest and from the outflow of your presses. '
  - type: note
    content: See ch. 13:2
  - type: text
    content: 'The firstborn of your sons you shall give to me. '
  '3':
  - type: text
    content: but if the sun has risen on him, there shall be bloodguilt for him. He
  - type: note
    content: That is, the thief
  - type: text
    content: ' shall surely pay. If he has nothing, then '
  - type: note
    content: '[ch. 21:2]'
  - type: text
    content: 'he shall be sold for his theft. '
  '30':
  - type: note
    content: Deut. 15:19
  - type: text
    content: 'You shall do the same with your oxen and with your sheep: '
  - type: note
    content: Lev. 22:27
  - type: text
    content: seven days it shall be with its mother; on the eighth day you shall give it to me.
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:6; Lev. 11:44, 45
  - type: text
    content: '“You shall be consecrated to me. Therefore '
  - type: note
    content: Lev. 22:8; Ezek. 4:14; 44:31
  - type: text
    content: 'you shall not eat any flesh that is torn by beasts in the field; '
  - type: note
    content: '[Matt. 7:6]'
  - type: text
    content: you shall throw it to the dogs.
  '4':
  - type: text
    content: 'If the stolen beast '
  - type: note
    content: ch. 21:16
  - type: text
    content: 'is found alive in his possession, whether it is an ox or a donkey or a sheep, '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: he shall pay double.
  '5':
  - type: text
    content: “If a man causes a field or vineyard to be grazed over, or lets his beast loose and it feeds in another man’s field, he shall make restitution from the best in his own field and in his own vineyard.
  '6':
  - type: text
    content: “If fire breaks out and catches in thorns so that the stacked grain or the standing grain or the field is consumed, he who started the fire shall make full restitution.
  '7':
  - type: text
    content: '“If a man gives to his neighbor money or goods to keep safe, and it is stolen from the man’s house, then, if the thief is found, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'he shall pay double. '
  '8':
  - type: text
    content: 'If the thief is not found, the owner of the house shall come near to God to show whether or not he has put his hand to his neighbor’s property. '
  '9':
  - type: text
    content: For every breach of trust, whether it is for an ox, for a donkey, for a sheep, for a cloak, or for any kind of lost thing, of which one says, ‘This is it,’ the case of both parties shall come before God. The one whom God condemns shall pay double to his neighbor.
