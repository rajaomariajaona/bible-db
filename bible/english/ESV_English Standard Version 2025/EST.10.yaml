document_id: EST.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Greatness of Mordecai
  - type: text
    content: 'King Ahasuerus imposed tax on the land and on '
  - type: note
    content: Isa. 11:11; 24:15
  - type: text
    content: 'the coastlands of the sea. '
  '2':
  - type: text
    content: 'And all the acts of his power and might, and the full account of the high honor of Mordecai, '
  - type: note
    content: ch. 8:15; 9:4
  - type: text
    content: 'to which the king advanced him, are they not written in '
  - type: note
    content: ch. 2:23; 6:1
  - type: text
    content: 'the Book of the Chronicles of the kings of Media and Persia? '
  '3':
  - type: text
    content: 'For Mordecai the Jew was '
  - type: note
    content: 2 Chr. 28:7; [Gen. 41:40]
  - type: text
    content: 'second in rank to King Ahasuerus, and he was great among the Jews and popular with the multitude of his brothers, for he '
  - type: note
    content: '[Neh. 2:10; Ps. 122:8, 9]'
  - type: text
    content: sought the welfare of his people and spoke peace to all his people.
