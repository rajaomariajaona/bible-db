document_id: 1CO.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Collection for the Saints
  - type: text
    content: Now concerning
  - type: note
    content: The expression Now concerning introduces a reply to a question in the Corinthians’ letter; see 7:1; also verse 12
  - type: text
    content: ' '
  - type: note
    content: See Acts 24:17
  - type: text
    content: 'the collection for the saints: as I directed the churches of Galatia, so you also are to do. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:17; [ 2 Cor. 1:1 ]
  - type: text
    content: 'When Timothy comes, see that you put him at ease among you, for '
  - type: note
    content: Rom. 16:21; 1 Thess. 3:2; [Phil. 2:20, 22]
  - type: text
    content: 'he is doing '
  - type: note
    content: See ch. 15:58
  - type: text
    content: 'the work of the Lord, as I am. '
  '11':
  - type: text
    content: 'So '
  - type: note
    content: 1 Tim. 4:12; [Titus 2:15]
  - type: text
    content: 'let no one despise him. '
  - type: note
    content: ver. 6
  - type: text
    content: 'Help him on his way '
  - type: note
    content: Acts 15:33
  - type: text
    content: in peace, that he may return to me, for I am expecting him with the brothers.
  - type: heading
    content: Final Instructions
  '12':
  - type: text
    content: 'Now concerning '
  - type: note
    content: See Acts 18:24
  - type: text
    content: our brother Apollos, I strongly urged him to visit you with the other brothers, but it was not at all his will
  - type: note
    content: Or God’s will for him
  - type: text
    content: ' to come now. He will come when he has opportunity.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 24:42
  - type: text
    content: 'Be watchful, '
  - type: note
    content: Gal. 5:1; Phil. 1:27; 4:1; 1 Thess. 3:8; 2 Thess. 2:15; See ch. 15:1
  - type: text
    content: 'stand firm in the faith, '
  - type: note
    content: 1 Sam. 4:9; 2 Sam. 10:12; Isa. 46:8
  - type: text
    content: 'act like men, '
  - type: note
    content: Eph. 3:16; [Eph. 6:10; Col. 1:11]
  - type: text
    content: 'be strong. '
  '14':
  - type: note
    content: ch. 14:1
  - type: text
    content: Let all that you do be done in love.
  '15':
  - type: text
    content: Now I urge you, brothers
  - type: note
    content: Or brothers and sisters; also verse 20
  - type: text
    content: '—you know that '
  - type: note
    content: ch. 1:16
  - type: text
    content: the household
  - type: note
    content: Greek house
  - type: text
    content: ' of Stephanas were '
  - type: note
    content: '[Rom. 16:5]'
  - type: text
    content: the first converts
  - type: note
    content: Greek the firstfruits
  - type: text
    content: ' in Achaia, and that they have devoted themselves '
  - type: note
    content: See Rom. 15:31
  - type: text
    content: 'to the service of the saints— '
  '16':
  - type: note
    content: 1 Thess. 5:12; Heb. 13:17
  - type: text
    content: 'be subject to such as these, and to every fellow worker and laborer. '
  '17':
  - type: text
    content: 'I rejoice at the coming of Stephanas and Fortunatus and Achaicus, because they have made up for '
  - type: note
    content: Phil. 2:30; [2 Cor. 11:9; Philem. 13]
  - type: text
    content: 'your absence, '
  '18':
  - type: text
    content: 'for they '
  - type: note
    content: 2 Cor. 7:13; [Rom. 15:32; Philem. 7, 20]
  - type: text
    content: 'refreshed my spirit as well as yours. '
  - type: note
    content: Phil. 2:29; 1 Thess. 5:12
  - type: text
    content: Give recognition to such people.
  - type: heading
    content: Greetings
  '19':
  - type: text
    content: 'The churches of Asia send you greetings. '
  - type: note
    content: See Acts 18:2
  - type: text
    content: 'Aquila and Prisca, together with '
  - type: note
    content: See Rom. 16:5
  - type: text
    content: 'the church in their house, send you hearty greetings in the Lord. '
  '2':
  - type: text
    content: 'On '
  - type: note
    content: Acts 20:7; [Rev. 1:10]
  - type: text
    content: 'the first day of every week, each of you is to put something aside and store it up, '
  - type: note
    content: 2 Cor. 8:3, 11
  - type: text
    content: 'as he may prosper, '
  - type: note
    content: 2 Cor. 9:3
  - type: text
    content: 'so that there will be no collecting when I come. '
  '20':
  - type: text
    content: 'All the brothers send you greetings. '
  - type: note
    content: See Rom. 16:16
  - type: text
    content: Greet one another with a holy kiss.
  '21':
  - type: text
    content: 'I, Paul, write '
  - type: note
    content: Col. 4:18; 2 Thess. 3:17; [Rom. 16:22; Gal. 6:11; Philem. 19]
  - type: text
    content: 'this greeting with my own hand. '
  '22':
  - type: text
    content: 'If anyone has no love for the Lord, let him be '
  - type: note
    content: See Rom. 9:3
  - type: text
    content: accursed. Our Lord, come!
  - type: note
    content: Greek Maranatha (a transliteration of Aramaic)
  - type: text
    content: ' '
  '23':
  - type: note
    content: Rom. 16:20
  - type: text
    content: 'The grace of the Lord Jesus be with you. '
  '24':
  - type: text
    content: My love be with you all in Christ Jesus. Amen.
  '3':
  - type: text
    content: 'And when I arrive, I will send '
  - type: note
    content: '[2 Cor. 8:18, 19]'
  - type: text
    content: 'those whom you accredit by letter to carry your gift to Jerusalem. '
  '4':
  - type: text
    content: If it seems advisable that I should go also, they will accompany me.
  - type: heading
    content: Plans for Travel
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:19
  - type: text
    content: 'I will visit you after passing through '
  - type: note
    content: See Acts 16:9
  - type: text
    content: 'Macedonia, for '
  - type: note
    content: Acts 19:21
  - type: text
    content: 'I intend to pass through Macedonia, '
  '6':
  - type: text
    content: 'and perhaps I will stay with you or even spend the winter, so that you may '
  - type: note
    content: ver. 11; See Acts 15:3
  - type: text
    content: 'help me on my journey, wherever I go. '
  '7':
  - type: text
    content: 'For I do not want to see you now '
  - type: note
    content: '[2 Cor. 1:15, 16]'
  - type: text
    content: 'just in passing. I hope to spend some time with you, '
  - type: note
    content: ch. 4:19; Acts 18:21; James 4:15
  - type: text
    content: 'if the Lord permits. '
  '8':
  - type: text
    content: 'But I will stay in Ephesus until '
  - type: note
    content: See Acts 2:1
  - type: text
    content: 'Pentecost, '
  '9':
  - type: text
    content: 'for '
  - type: note
    content: See Acts 14:27
  - type: text
    content: 'a wide door for effective work has opened to me, and '
  - type: note
    content: Acts 19:9
  - type: text
    content: there are many adversaries.
