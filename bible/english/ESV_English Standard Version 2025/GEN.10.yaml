        - type: text
          text: Ezek. 38:1-6
      marker-yv: yv-n
    - type: text
      text: 'The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the sons of Ham, by their clans, their languages, their lands, and their nations.
