document_id: GEN.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nations Descended from Noah
  - type: text
    content: These are the generations of the sons of Noah, Shem, Ham, and Japheth. Sons were born to them after the flood.
  '10':
  - type: text
    content: 'The beginning of his kingdom was '
  - type: note
    content: ch. 11:9
  - type: text
    content: 'Babel, Erech, Accad, and Calneh, in '
  - type: note
    content: ch. 11:2
  - type: text
    content: 'the land of Shinar. '
  '11':
  - type: text
    content: 'From that land he went into Assyria and built Nineveh, Rehoboth-Ir, Calah, and '
  '12':
  - type: text
    content: 'Resen between Nineveh and Calah; that is the great city. '
  '13':
  - type: note
    content: For ver. 13-18, see 1 Chr. 1:11-16
  - type: text
    content: 'Egypt fathered Ludim, Anamim, Lehabim, Naphtuhim, '
  '14':
  - type: text
    content: Pathrusim, Casluhim (from whom
  - type: note
    content: Or from where
  - type: text
    content: ' the Philistines came), and '
  - type: note
    content: Deut. 2:23; Jer. 47:4; Amos 9:7
  - type: text
    content: Caphtorim.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 15:18-21 ]'
  - type: text
    content: 'Canaan fathered Sidon his firstborn and Heth, '
  '16':
  - type: text
    content: 'and the Jebusites, the Amorites, the Girgashites, '
  '17':
  - type: text
    content: 'the Hivites, the Arkites, the Sinites, '
  '18':
  - type: text
    content: 'the Arvadites, the Zemarites, and the Hamathites. Afterward the clans of the Canaanites dispersed. '
  '19':
  - type: text
    content: 'And the territory of the Canaanites extended from Sidon in the direction of Gerar as far as Gaza, and in the direction of Sodom, Gomorrah, Admah, and Zeboiim, as far as Lasha. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-5, see 1 Chr. 1:5-7; Ezek. 38:1-6
  - type: text
    content: 'The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  '20':
  - type: text
    content: These are the sons of Ham, by their clans, their languages, their lands, and their nations.
  '21':
  - type: text
    content: To Shem also, the father of all the children of Eber, the elder brother of Japheth,
  - type: note
    content: Or the brother of Japheth the elder
  - type: text
    content: ' children were born. '
  '22':
  - type: text
    content: 'The '
  - type: note
    content: For ver. 22-29, see 1 Chr. 1:17-25
  - type: text
    content: 'sons of Shem: Elam, Asshur, Arpachshad, Lud, and Aram. '
  '23':
  - type: text
    content: 'The sons of Aram: Uz, Hul, Gether, and Mash. '
  '24':
  - type: text
    content: 'Arpachshad fathered '
  - type: note
    content: ch. 11:12; Luke 3:35, 36
  - type: text
    content: 'Shelah; and Shelah fathered Eber. '
  '25':
  - type: note
    content: 1 Chr. 1:19
  - type: text
    content: 'To Eber were born two sons: the name of the one was Peleg,'
  - type: note
    content: Peleg means division
  - type: text
    content: ' for in his days the earth was divided, and his brother’s name was Joktan. '
  '26':
  - type: text
    content: 'Joktan fathered Almodad, Sheleph, Hazarmaveth, Jerah, '
  '27':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '28':
  - type: text
    content: 'Obal, Abimael, Sheba, '
  '29':
  - type: note
    content: 1 Kgs. 9:28; 10:11
  - type: text
    content: 'Ophir, Havilah, and Jobab; all these were the sons of Joktan. '
  '3':
  - type: text
    content: 'The sons of Gomer: Ashkenaz, Riphath, and Togarmah. '
  '30':
  - type: text
    content: 'The territory in which they lived extended from Mesha in the direction of Sephar to the hill country of the east. '
  '31':
  - type: text
    content: These are the sons of Shem, by their clans, their languages, their lands, and their nations.
  '32':
  - type: text
    content: 'These are the clans of the sons of Noah, according to their genealogies, in their nations, '
  - type: note
    content: ver. 1; ch. 9:19
  - type: text
    content: and from these the nations spread abroad on the earth after the flood.
  '4':
  - type: text
    content: 'The sons of Javan: Elishah, '
  - type: note
    content: Ps. 72:10; Ezek. 38:13
  - type: text
    content: 'Tarshish, '
  - type: note
    content: Num. 24:24; Isa. 23:1, 12; Dan. 11:30
  - type: text
    content: 'Kittim, and Dodanim. '
  '5':
  - type: text
    content: 'From these '
  - type: note
    content: Isa. 11:11; Jer. 2:10; 25:22; Ezek. 27:6; Zeph. 2:11
  - type: text
    content: the coastland peoples spread in their lands, each with his own language, by their clans, in their nations.
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-8, see 1 Chr. 1:8-10
  - type: text
    content: 'The sons of Ham: Cush, Egypt, Put, and Canaan. '
  '7':
  - type: text
    content: 'The sons of Cush: Seba, Havilah, Sabtah, Raamah, and Sabteca. The sons of Raamah: Sheba and Dedan. '
  '8':
  - type: text
    content: Cush fathered Nimrod; he was the first on earth to be a mighty man.
  - type: note
    content: Or he began to be a mighty man on the earth
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'He was a mighty hunter before the '
  - type: text
    content: Lord
  - type: text
    content: '. Therefore it is said, “Like Nimrod a mighty hunter before the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
