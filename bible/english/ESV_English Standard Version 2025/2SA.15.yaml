document_id: 2SA.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Absalom’s Conspiracy
  - type: text
    content: 'After this Absalom '
  - type: note
    content: 1 Kgs. 1:5
  - type: text
    content: 'got himself a chariot and horses, and fifty men to run before him. '
  '10':
  - type: text
    content: 'But Absalom sent secret messengers throughout all the tribes of Israel, saying, “As soon as you hear the sound of the trumpet, then say, ‘Absalom is king at Hebron!’” '
  '11':
  - type: text
    content: 'With Absalom went two hundred men from Jerusalem '
  - type: note
    content: '[1 Sam. 9:13; 16:3, 5]'
  - type: text
    content: 'who were invited guests, and they went in their innocence and knew nothing. '
  '12':
  - type: text
    content: And while Absalom was offering the sacrifices, he sent for
  - type: note
    content: Or sent
  - type: text
    content: ' '
  - type: note
    content: ver. 31; ch. 16:20; 17:1, 14, 23
  - type: text
    content: 'Ahithophel the Gilonite, '
  - type: note
    content: 1 Chr. 27:33; [Ps. 41:9; 55:12-14]
  - type: text
    content: 'David’s counselor, from his city '
  - type: note
    content: Josh. 15:51
  - type: text
    content: 'Giloh. And the conspiracy grew strong, and the people with Absalom '
  - type: note
    content: Ps. 3:1
  - type: text
    content: kept increasing.
  - type: heading
    content: David Flees Jerusalem
  '13':
  - type: text
    content: 'And a messenger came to David, saying, '
  - type: note
    content: Judg. 9:3
  - type: text
    content: '“The hearts of the men of Israel have gone after Absalom.” '
  '14':
  - type: text
    content: 'Then David said to all his servants who were with him at Jerusalem, “Arise, and let us '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'flee, or else there will be no escape for us from Absalom. Go quickly, lest he overtake us quickly and bring down ruin on us and strike the city with the edge of the sword.” '
  '15':
  - type: text
    content: 'And the king’s servants said to the king, “Behold, your servants are ready to do whatever my lord the king decides.” '
  '16':
  - type: text
    content: 'So the king went out, and all his household after him. And the king left '
  - type: note
    content: ch. 16:21, 22; 20:3
  - type: text
    content: 'ten concubines to keep the house. '
  '17':
  - type: text
    content: And the king went out, and all the people after him. And they halted at the last house.
  '18':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 8:18
  - type: text
    content: 'all his servants passed by him, and all the Cherethites, and all the Pelethites, and all the six hundred Gittites who had followed him from '
  - type: note
    content: 1 Sam. 27:2
  - type: text
    content: 'Gath, passed on before the king. '
  '19':
  - type: text
    content: 'Then the king said to '
  - type: note
    content: ch. 18:2
  - type: text
    content: 'Ittai the Gittite, “Why do you also go with us? Go back and stay with the king, for you are a foreigner and also an exile from your home. '
  '2':
  - type: text
    content: 'And Absalom used to rise early and stand beside '
  - type: note
    content: See Ruth 4:1
  - type: text
    content: 'the way of the gate. And when any man had a dispute to come before the king for judgment, Absalom would call to him and say, “From what city are you?” And when he said, “Your servant is of such and such a tribe in Israel,” '
  '20':
  - type: text
    content: 'You came only yesterday, and shall I today make you wander about with us, since I go '
  - type: note
    content: '[1 Sam. 23:13]'
  - type: text
    content: 'I know not where? Go back and take your brothers with you, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' show'
  - type: note
    content: Septuagint; Hebrew lacks may the Lord show
  - type: text
    content: ' steadfast love and faithfulness to you.” '
  '21':
  - type: text
    content: 'But Ittai answered the king, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, and as my lord the king lives, '
  - type: note
    content: '[Ruth 1:16, 17]'
  - type: text
    content: 'wherever my lord the king shall be, whether for death or for life, there also will your servant be.” '
  '22':
  - type: text
    content: 'And David said to Ittai, “Go then, pass on.” So Ittai the Gittite passed on with all his men and all the little ones who were with him. '
  '23':
  - type: text
    content: 'And all the land wept aloud as all the people passed by, and the king crossed '
  - type: note
    content: 1 Kgs. 2:37; 15:13; 2 Kgs. 23:4, 6, 12
  - type: text
    content: 'the brook '
  - type: note
    content: '[John 18:1]'
  - type: text
    content: 'Kidron, and all the people passed on toward '
  - type: note
    content: ch. 16:2; 17:16, 29
  - type: text
    content: the wilderness.
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Num. 4:15
  - type: text
    content: 'Abiathar came up, and behold, '
  - type: note
    content: 1 Sam. 22:20
  - type: text
    content: 'Zadok came also with all the Levites, '
  - type: note
    content: ch. 8:17; 20:25
  - type: text
    content: 'bearing the ark of the covenant of God. And they set down the ark of God until the people had all passed out of the city. '
  '25':
  - type: text
    content: 'Then the king said to Zadok, “Carry the ark of God back into the city. If I find favor in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', he will '
  - type: note
    content: Ps. 43:3
  - type: text
    content: 'bring me back and let me see both it and his '
  - type: note
    content: Ex. 15:13; Jer. 25:30
  - type: text
    content: 'dwelling place. '
  '26':
  - type: text
    content: 'But if he says, ‘I have no '
  - type: note
    content: ch. 22:20; Num. 14:8; 1 Kgs. 10:9; 2 Chr. 9:8; Ps. 18:19; 22:8; Isa. 62:4
  - type: text
    content: 'pleasure in you,’ behold, here I am, '
  - type: note
    content: 1 Sam. 3:18
  - type: text
    content: 'let him do to me what seems good to him.” '
  '27':
  - type: text
    content: 'The king also said to Zadok the priest, “Are you not a '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: seer? Go back
  - type: note
    content: Septuagint The king also said to Zadok the priest, “Look, go back
  - type: text
    content: ' to the city in peace, with '
  - type: note
    content: ch. 17:17
  - type: text
    content: 'your two sons, Ahimaaz your son, and Jonathan the son of Abiathar. '
  '28':
  - type: text
    content: 'See, I will wait at '
  - type: note
    content: ch. 17:16
  - type: text
    content: 'the fords of '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'the wilderness until word comes from you to inform me.” '
  '29':
  - type: text
    content: So Zadok and Abiathar carried the ark of God back to Jerusalem, and they remained there.
  '3':
  - type: text
    content: 'Absalom would say to him, “See, your claims are good and right, but there is no man designated by the king to hear you.” '
  '30':
  - type: text
    content: 'But David went up the ascent of the Mount of Olives, weeping as he went, '
  - type: note
    content: Isa. 20:2-4
  - type: text
    content: 'barefoot and '
  - type: note
    content: ch. 19:4; Esth. 6:12; Jer. 14:3, 4
  - type: text
    content: 'with his head covered. And all the people who were with him covered their heads, and they went up, '
  - type: note
    content: Ps. 126:6
  - type: text
    content: 'weeping as they went. '
  '31':
  - type: text
    content: 'And it was told David, “Ahithophel is among the conspirators with Absalom.” And David said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', please '
  - type: note
    content: ch. 16:23; 17:14, 23
  - type: text
    content: turn the counsel of Ahithophel into foolishness.”
  '32':
  - type: text
    content: 'While David was coming to the summit, where God was worshiped, behold, Hushai '
  - type: note
    content: Josh. 16:2
  - type: text
    content: 'the Archite came to meet him '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'with his coat torn and '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'dirt on his head. '
  '33':
  - type: text
    content: 'David said to him, “If you go on with me, you will be '
  - type: note
    content: ch. 19:35
  - type: text
    content: 'a burden to me. '
  '34':
  - type: text
    content: 'But if you return to the city and say to Absalom, '
  - type: note
    content: ch. 16:19
  - type: text
    content: '‘I will be your servant, O king; as I have been your father’s servant in time past, so now I will be your servant,’ then you will defeat for me the counsel of Ahithophel. '
  '35':
  - type: text
    content: 'Are not Zadok and Abiathar the priests with you there? So whatever you hear from the king’s house, '
  - type: note
    content: ch. 17:15, 16
  - type: text
    content: 'tell it to Zadok and Abiathar the priests. '
  '36':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 17:17
  - type: text
    content: 'their two sons are with them there, Ahimaaz, Zadok’s son, and Jonathan, Abiathar’s son, '
  - type: note
    content: ch. 17:17
  - type: text
    content: 'and by them you shall send to me everything you hear.” '
  '37':
  - type: text
    content: 'So Hushai, '
  - type: note
    content: ch. 16:16; 1 Chr. 27:33
  - type: text
    content: 'David’s friend, came into the city, '
  - type: note
    content: ch. 16:15
  - type: text
    content: just as Absalom was entering Jerusalem.
  '4':
  - type: text
    content: 'Then Absalom would say, '
  - type: note
    content: Judg. 9:29
  - type: text
    content: '“Oh that I were judge in the land! Then every man with a dispute or cause might come to me, and I would give him justice.” '
  '5':
  - type: text
    content: 'And whenever a man came near to pay homage to him, he would put out his hand and take hold of him and kiss him. '
  '6':
  - type: text
    content: Thus Absalom did to all of Israel who came to the king for judgment. So Absalom stole the hearts of the men of Israel.
  '7':
  - type: text
    content: And at the end of four
  - type: note
    content: Septuagint, Syriac; Hebrew forty
  - type: text
    content: ' years Absalom said to the king, “Please let me go and pay my vow, which I have vowed to the '
  - type: text
    content: Lord
  - type: text
    content: ', in Hebron. '
  '8':
  - type: text
    content: 'For your servant '
  - type: note
    content: Gen. 28:20, 21; 1 Sam. 1:11
  - type: text
    content: 'vowed a vow '
  - type: note
    content: ch. 13:38
  - type: text
    content: 'while I lived at Geshur in Aram, saying, ‘If the '
  - type: text
    content: Lord
  - type: text
    content: ' will indeed bring me back to Jerusalem, then I will offer worship to'
  - type: note
    content: Or will serve
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: '.’” '
  '9':
  - type: text
    content: 'The king said to him, '
  - type: note
    content: 1 Sam. 1:17
  - type: text
    content: '“Go in peace.” So he arose and went to Hebron. '
