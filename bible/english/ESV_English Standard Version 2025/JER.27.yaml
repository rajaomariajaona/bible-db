document_id: JER.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Yoke of Nebuchadnezzar
  - type: text
    content: In the beginning of the reign of Zedekiah
  - type: note
    content: Or Jehoiakim
  - type: text
    content: ' the son of Josiah, king of Judah, this word came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'For it is a lie that they are prophesying to you, with the result that you will be removed far from your land, and I will drive you out, and you will perish. '
  '11':
  - type: note
    content: '[ver. 2, 8]'
  - type: text
    content: 'But any nation that will bring its neck under the yoke of the king of Babylon and serve him, I will leave on its own land, to work it and dwell there, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”’”
  '12':
  - type: text
    content: 'To '
  - type: note
    content: ch. 28:1; [ver. 1]
  - type: text
    content: 'Zedekiah king of Judah I spoke in like manner: '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: '“Bring your necks under the yoke of the king of Babylon, and '
  - type: note
    content: ver. 17; [ch. 38:17]
  - type: text
    content: 'serve him and his people and live. '
  '13':
  - type: note
    content: Ezek. 18:31
  - type: text
    content: 'Why will you and your people die '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'by the sword, by famine, and by pestilence, '
  - type: note
    content: ver. 8
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken concerning any nation that will not serve the king of Babylon? '
  '14':
  - type: note
    content: '[ch. 14:14]'
  - type: text
    content: 'Do not listen to the words of the prophets who are saying to you, ‘You shall not serve the king of Babylon,’ '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'for it is a lie that they are prophesying to you. '
  '15':
  - type: text
    content: 'I have not sent them, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', but '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: they are prophesying falsely in my name, with the result that I will drive you out and you will perish, you and the prophets who are prophesying to you.”
  '16':
  - type: text
    content: 'Then I spoke to the priests and to all this people, saying, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'Do not listen to the words of your prophets who are prophesying to you, saying, '
  - type: note
    content: ch. 28:3; 2 Kgs. 24:13; 2 Chr. 36:7, 10, 18
  - type: text
    content: '‘Behold, the vessels of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house will now shortly be brought back from Babylon,’ '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'for it is a lie that they are prophesying to you. '
  '17':
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'Do not listen to them; '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'serve the king of Babylon and live. Why should this city '
  - type: note
    content: See ch. 7:34
  - type: text
    content: 'become a desolation? '
  '18':
  - type: text
    content: 'If they are prophets, and if the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is with them, then '
  - type: note
    content: '[Isa. 59:16]'
  - type: text
    content: 'let them intercede with the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: Dan. 1:2
  - type: text
    content: 'that the vessels that are left in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', in the house of the king of Judah, and in Jerusalem may not go to Babylon. '
  '19':
  - type: note
    content: '[2 Kgs. 25:13]'
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts concerning the pillars, the sea, the stands, and the rest of the vessels that are left in this city, '
  '2':
  - type: text
    content: 'Thus the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: '
  - type: note
    content: '[1 Kgs. 22:11; Ezek. 7:23]'
  - type: text
    content: '“Make yourself straps and '
  - type: note
    content: ch. 28:10, 12, 13; See Lev. 26:13
  - type: text
    content: 'yoke-bars, and put them on your neck. '
  '20':
  - type: text
    content: 'which Nebuchadnezzar king of Babylon did not take away, '
  - type: note
    content: 2 Kgs. 24:14, 15; Matt. 1:11, 12; See ch. 24:1
  - type: text
    content: 'when he took into exile from Jerusalem to Babylon Jeconiah the son of Jehoiakim, king of Judah, and all the nobles of Judah and Jerusalem— '
  '21':
  - type: text
    content: 'thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'concerning the vessels that are left in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', in the house of the king of Judah, and in Jerusalem: '
  '22':
  - type: note
    content: ch. 52:17, 20, 21; 2 Kgs. 25:13; 2 Chr. 36:18
  - type: text
    content: 'They shall be carried to Babylon '
  - type: note
    content: ch. 32:5
  - type: text
    content: 'and remain there '
  - type: note
    content: ch. 29:10; 2 Chr. 36:22; Ezra 1:1
  - type: text
    content: 'until the day when I visit them, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Ezra 1:7, 8; 5:14; 7:19
  - type: text
    content: 'Then I will bring them back '
  - type: note
    content: ch. 52:17, 20, 21; 2 Kgs. 25:13; 2 Chr. 36:18
  - type: text
    content: and restore them to this place.”
  '3':
  - type: text
    content: Send word
  - type: note
    content: Hebrew Send them
  - type: text
    content: ' to the king of '
  - type: note
    content: ch. 25:21, 22
  - type: text
    content: 'Edom, the king of '
  - type: note
    content: ch. 25:21, 22
  - type: text
    content: 'Moab, the king of the sons of '
  - type: note
    content: ch. 25:21, 22
  - type: text
    content: 'Ammon, the king of '
  - type: note
    content: ch. 25:21, 22
  - type: text
    content: 'Tyre, and the king of Sidon by the hand of the envoys who have come to Jerusalem to Zedekiah king of Judah. '
  '4':
  - type: text
    content: 'Give them this charge for their masters: ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: This is what you shall say to your masters: '
  '5':
  - type: text
    content: '“It is I who '
  - type: note
    content: See ch. 21:5
  - type: text
    content: 'by my great power and my outstretched arm '
  - type: note
    content: Ps. 115:15; Isa. 45:12
  - type: text
    content: 'have made the earth, with the men and animals that are on the earth, '
  - type: note
    content: Ps. 115:16; Dan. 4:17, 25, 32
  - type: text
    content: 'and I give it to whomever it seems right to me. '
  '6':
  - type: note
    content: '[Ezek. 30:21, 25]'
  - type: text
    content: 'Now I have given all these lands into the hand of Nebuchadnezzar, the king of Babylon, '
  - type: note
    content: See ch. 25:9
  - type: text
    content: 'my servant, '
  - type: note
    content: ch. 28:14; Dan. 2:38
  - type: text
    content: 'and I have given him also the beasts of the field to serve him. '
  '7':
  - type: note
    content: '[Dan. 2:37, 38]'
  - type: text
    content: 'All the nations shall serve him and '
  - type: note
    content: ch. 52:31
  - type: text
    content: 'his son and '
  - type: note
    content: Dan. 5:1, 30
  - type: text
    content: 'his grandson, '
  - type: note
    content: See ch. 25:12
  - type: text
    content: 'until the time of his own land comes. '
  - type: note
    content: See ch. 25:14
  - type: text
    content: Then many nations and great kings shall make him their slave.
  '8':
  - type: text
    content: '“‘“But if any nation or kingdom will not serve this Nebuchadnezzar king of Babylon, '
  - type: note
    content: ver. 11, 12; [ch. 30:8]
  - type: text
    content: 'and put its neck under the yoke of the king of Babylon, I will punish that nation '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'with the sword, with famine, and with pestilence, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', until I have consumed it by his hand. '
  '9':
  - type: text
    content: 'So '
  - type: note
    content: '[ch. 14:14]'
  - type: text
    content: 'do not listen to your '
  - type: note
    content: '[ch. 29:8]'
  - type: text
    content: 'prophets, your diviners, your dreamers, your '
  - type: note
    content: '[Deut. 18:10; Isa. 2:6]'
  - type: text
    content: 'fortune-tellers, or your sorcerers, who are saying to you, ‘You shall not serve the king of Babylon.’ '
