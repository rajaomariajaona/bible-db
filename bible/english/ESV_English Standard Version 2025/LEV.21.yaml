document_id: LEV.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Holiness and the Priests
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Speak to the priests, the sons of Aaron, and say to them, '
  - type: note
    content: Ezek. 44:25
  - type: text
    content: 'No one shall make himself unclean for the dead among his people, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:12; 16:32; Ex. 29:29, 30; Num. 35:25
  - type: text
    content: '“The priest who is chief among his brothers, on whose head the anointing oil is poured and who has been consecrated to wear the garments, '
  - type: note
    content: ch. 10:6
  - type: text
    content: 'shall not let the hair of his head hang loose nor tear his clothes. '
  '11':
  - type: text
    content: 'He shall not '
  - type: note
    content: Num. 19:14; [ver. 1, 2]
  - type: text
    content: 'go in to any dead bodies nor make himself unclean, even for his father or for his mother. '
  '12':
  - type: note
    content: ch. 10:7
  - type: text
    content: 'He shall not go out of the sanctuary, lest he '
  - type: note
    content: ver. 23
  - type: text
    content: 'profane the sanctuary of his God, for the '
  - type: note
    content: '[ch. 8:9, 12, 30]'
  - type: text
    content: 'consecration of the anointing oil of his God is on him: I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: And he shall take a wife in her virginity.
  - type: note
    content: Or a young wife
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'A widow, '
  - type: note
    content: ver. 7; Ezek. 44:22
  - type: text
    content: or a divorced woman, or a woman who has been defiled, or a prostitute, these he shall not marry. But he shall take as his wife a virgin
  - type: note
    content: Hebrew young woman
  - type: text
    content: ' of his own people, '
  '15':
  - type: text
    content: 'that he may not profane his offspring among his people, for '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies him.”'
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '17':
  - type: text
    content: '“Speak to Aaron, saying, None of your offspring throughout their generations who has a blemish may '
  - type: note
    content: ch. 10:3; [Num. 16:5; Ps. 65:4]
  - type: text
    content: 'approach to offer the bread of his God. '
  '18':
  - type: text
    content: 'For no one who has a blemish shall draw near, a man '
  - type: note
    content: ch. 22:22
  - type: text
    content: 'blind or lame, or one who has a mutilated face '
  - type: note
    content: '[ch. 22:23]'
  - type: text
    content: 'or a limb too long, '
  '19':
  - type: text
    content: 'or a man who has an injured foot or an injured hand, '
  '2':
  - type: text
    content: 'except for his closest relatives, his mother, his father, his son, his daughter, his brother, '
  '20':
  - type: text
    content: 'or a hunchback or a dwarf or a man with a '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'defect in his sight or an itching disease or scabs or '
  - type: note
    content: '[Deut. 23:1]'
  - type: text
    content: 'crushed testicles. '
  '21':
  - type: text
    content: 'No man of the offspring of Aaron the priest who has a blemish shall come near to '
  - type: note
    content: ver. 6
  - type: text
    content: 'offer the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings; since he has a blemish, he shall not come near to offer the bread of his God. '
  '22':
  - type: text
    content: 'He may eat the bread of his God, both of '
  - type: note
    content: ch. 2:3, 10; 6:17, 25; 7:1; 10:12, 17; 14:13; 24:9; Num. 18:9
  - type: text
    content: 'the most holy and of the '
  - type: note
    content: ch. 22:10, 12
  - type: text
    content: 'holy things, '
  '23':
  - type: text
    content: 'but he shall not go through the veil or approach the altar, because he has a blemish, that he may not '
  - type: note
    content: ver. 12
  - type: text
    content: profane my sanctuaries,
  - type: note
    content: Or my holy precincts
  - type: text
    content: ' '
  - type: note
    content: ch. 22:9, 16
  - type: text
    content: 'for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies them.” '
  '24':
  - type: text
    content: So Moses spoke to Aaron and to his sons and to all the people of Israel.
  '3':
  - type: text
    content: 'or his virgin sister (who is near to him because she has had no husband; for her he may make himself unclean). '
  '4':
  - type: text
    content: 'He shall not make himself unclean as a husband among his people and so profane himself. '
  '5':
  - type: note
    content: Ezek. 44:20; [ch. 19:27, 28; Deut. 14:1]
  - type: text
    content: 'They shall not make bald patches on their heads, nor shave off the edges of their beards, nor make any cuts on their body. '
  '6':
  - type: text
    content: 'They shall be holy to their God and '
  - type: note
    content: See ch. 18:21
  - type: text
    content: 'not profane the name of their God. For they offer the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings, '
  - type: note
    content: See ch. 3:11
  - type: text
    content: 'the bread of their God; therefore they shall be holy. '
  '7':
  - type: note
    content: ver. 13, 14; Ezek. 44:22
  - type: text
    content: 'They shall not marry a prostitute or a woman who has been defiled, neither shall they marry a woman '
  - type: note
    content: See Deut. 24:1-4
  - type: text
    content: 'divorced from her husband, for the priest is holy to his God. '
  '8':
  - type: text
    content: 'You shall sanctify him, for he offers the bread of your God. He shall be holy to you, for '
  - type: note
    content: ch. 22:9, 16
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', who sanctify you, '
  - type: note
    content: See ch. 11:44
  - type: text
    content: 'am holy. '
  '9':
  - type: text
    content: 'And the daughter of any priest, if she profanes herself by whoring, profanes her father; '
  - type: note
    content: '[Gen. 38:24]'
  - type: text
    content: she shall be burned with fire.
