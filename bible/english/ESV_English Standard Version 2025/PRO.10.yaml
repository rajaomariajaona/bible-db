document_id: PRO.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Proverbs of Solomon
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:1
  - type: text
    content: The proverbs of Solomon.
  - type: note
    content: See ch. 29:3
  - type: text
    content: A wise son makes a glad father,
  - type: note
    content: ch. 17:25; 29:15
  - type: text
    content: but a foolish son is a sorrow to his mother.
  '10':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 6:13
  - type: text
    content: winks the eye causes trouble,
  - type: text
    content: and a babbling fool will come to ruin.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:30
  - type: text
    content: 'The mouth of the righteous is '
  - type: note
    content: ch. 13:14; Ps. 36:9
  - type: text
    content: a fountain of life,
  - type: text
    content: 'but the mouth of the wicked '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: conceals violence.
  '12':
  - type: text
    content: Hatred stirs up strife,
  - type: text
    content: 'but '
  - type: note
    content: 1 Pet. 4:8; [James 5:20]
  - type: text
    content: love covers all offenses.
  '13':
  - type: text
    content: On the lips of him who has understanding, wisdom is found,
  - type: text
    content: 'but '
  - type: note
    content: ch. 19:29; 26:3
  - type: text
    content: 'a rod is for the back of him who '
  - type: note
    content: See ch. 6:32
  - type: text
    content: lacks sense.
  '14':
  - type: text
    content: 'The wise '
  - type: note
    content: '[ver. 8; ch. 12:23]'
  - type: text
    content: lay up knowledge,
  - type: text
    content: 'but '
  - type: note
    content: ch. 18:7
  - type: text
    content: the mouth of a fool brings ruin near.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:11; [ Ps. 52:7; Mark 10:24, 25 ]
  - type: text
    content: A rich man’s wealth is his strong city;
  - type: text
    content: the poverty of the poor is their ruin.
  '16':
  - type: text
    content: 'The wage of the righteous leads '
  - type: note
    content: ch. 11:19; 19:23
  - type: text
    content: to life,
  - type: text
    content: the gain of the wicked to sin.
  '17':
  - type: text
    content: 'Whoever heeds instruction is on '
  - type: note
    content: '[ch. 6:23]'
  - type: text
    content: the path to life,
  - type: text
    content: but he who rejects reproof leads others astray.
  '18':
  - type: text
    content: The one who conceals hatred has lying lips,
  - type: text
    content: and whoever utters slander is a fool.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 12:36, 37 ]'
  - type: text
    content: When words are many, transgression is not lacking,
  - type: note
    content: ch. 17:27; [ James 3:2 ]
  - type: text
    content: but whoever restrains his lips is prudent.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 21:6; Ezek. 7:19; Luke 12:19, 20 ]'
  - type: text
    content: Treasures gained by wickedness do not profit,
  - type: note
    content: ch. 11:4, 6
  - type: text
    content: but righteousness delivers from death.
  '20':
  - type: text
    content: 'The tongue of the righteous is '
  - type: note
    content: ch. 8:19; 16:16
  - type: text
    content: choice silver;
  - type: text
    content: the heart of the wicked is of little worth.
  '21':
  - type: text
    content: The lips of the righteous feed many,
  - type: text
    content: 'but fools die for '
  - type: note
    content: '[Hos. 4:6]'
  - type: text
    content: lack of sense.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 24:35; 26:12; Deut. 8:18 ]'
  - type: text
    content: 'The blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' makes rich,'
  - type: text
    content: and he adds no sorrow with it.
  - type: note
    content: Or and toil adds nothing to it
  '23':
  - type: text
    content: 'Doing wrong is '
  - type: note
    content: ch. 2:14; 15:21
  - type: text
    content: like a joke to a fool,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 8:30]'
  - type: text
    content: wisdom is pleasure to a man of understanding.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Isa. 66:4; Heb. 10:27; [ Job 15:21 ]
  - type: text
    content: 'What the wicked dreads '
  - type: note
    content: Job 3:25
  - type: text
    content: will come upon him,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 145:19; Matt. 5:6; 1 John 5:14, 15
  - type: text
    content: the desire of the righteous will be granted.
  '25':
  - type: text
    content: 'When '
  - type: note
    content: '[Job 21:18; Ps. 58:9]; See Matt. 7:26, 27'
  - type: text
    content: the tempest passes, the wicked is no more,
  - type: text
    content: 'but '
  - type: note
    content: ch. 12:3; Ps. 15:5; [Matt. 7:24, 25]
  - type: text
    content: the righteous is established forever.
  '26':
  - type: text
    content: Like vinegar to the teeth and smoke to the eyes,
  - type: text
    content: so is the sluggard to those who send him.
  '27':
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:2
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' prolongs life,'
  - type: note
    content: See Job 15:32, 33
  - type: text
    content: but the years of the wicked will be short.
  '28':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 21:28 ]'
  - type: text
    content: The hope of the righteous brings joy,
  - type: note
    content: See Job 8:13
  - type: text
    content: but the expectation of the wicked will perish.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 25:12; Matt. 22:16; Acts 9:2 ]'
  - type: text
    content: 'The way of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a stronghold to the blameless,'
  - type: text
    content: but destruction to evildoers.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps. 34:9, 10; 37:25; [ Matt. 6:33 ]
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' does not let the righteous go hungry,'
  - type: note
    content: '[ Ps. 112:10; James 4:3 ]'
  - type: text
    content: but he thwarts the craving of the wicked.
  '30':
  - type: text
    content: ' '
  - type: note
    content: ver. 25 ; Ps. 37:22, 29; 125:1
  - type: text
    content: The righteous will never be removed,
  - type: text
    content: 'but '
  - type: note
    content: ch. 2:21, 22
  - type: text
    content: the wicked will not dwell in the land.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:30
  - type: text
    content: The mouth of the righteous brings forth wisdom,
  - type: text
    content: but the perverse tongue will be cut off.
  '32':
  - type: text
    content: 'The lips of the righteous '
  - type: note
    content: '[Eccles. 10:12]'
  - type: text
    content: know what is acceptable,
  - type: text
    content: 'but the mouth of the wicked, '
  - type: note
    content: ch. 2:12
  - type: text
    content: what is perverse.
  '4':
  - type: text
    content: 'A slack hand '
  - type: note
    content: '[ch. 6:11; 12:24; 13:4]'
  - type: text
    content: causes poverty,
  - type: note
    content: ch. 21:5
  - type: text
    content: but the hand of the diligent makes rich.
  '5':
  - type: text
    content: 'He who '
  - type: note
    content: '[ch. 6:8]'
  - type: text
    content: gathers in summer is a prudent son,
  - type: text
    content: 'but he who sleeps in harvest is '
  - type: note
    content: ch. 17:2; 19:26
  - type: text
    content: a son who brings shame.
  '6':
  - type: text
    content: Blessings are on the head of the righteous,
  - type: text
    content: 'but '
  - type: note
    content: ver. 32
  - type: text
    content: the mouth of the wicked conceals violence.
  - type: note
    content: Or but violence covers the mouth of the wicked; also verse 11
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 112:6
  - type: text
    content: The memory of the righteous is a blessing,
  - type: text
    content: 'but '
  - type: note
    content: '[Ps. 9:5]'
  - type: text
    content: the name of the wicked will rot.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 7:24, 25 ]'
  - type: text
    content: The wise of heart will receive commandments,
  - type: text
    content: but a babbling fool will come to ruin.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:23; 28:18; Ps. 23:4; Isa. 33:15, 16
  - type: text
    content: Whoever walks in integrity walks securely,
  - type: text
    content: 'but he who makes his ways crooked '
  - type: note
    content: '[Matt. 10:26; 1 Tim. 5:25]'
  - type: text
    content: will be found out.
