document_id: NUM.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws About Sacrifices
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'And you shall offer for the drink offering half a hin of wine, as a food offering, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: See ch. 28
  - type: text
    content: '“Thus it shall be done for each bull or ram, or for each lamb or young goat. '
  '12':
  - type: text
    content: 'As many as you offer, so shall you do with each one, as many as there are. '
  '13':
  - type: text
    content: 'Every native Israelite shall do these things in this way, in offering a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'And if a stranger is sojourning with you, or anyone is living permanently among you, and he wishes to offer a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ', he shall do as you do. '
  '15':
  - type: text
    content: 'For the assembly, '
  - type: note
    content: ver. 29, 30; ch. 9:14; Ex. 12:49
  - type: text
    content: 'there shall be one statute for you and for the stranger who sojourns with you, a statute forever throughout your generations. You and the sojourner shall be alike before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: One law and one rule shall be for you and for the stranger who sojourns with you.”
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '18':
  - type: note
    content: ver. 2
  - type: text
    content: '“Speak to the people of Israel and say to them, When you come into the land to which I bring you '
  '19':
  - type: text
    content: 'and when you eat of '
  - type: note
    content: '[Josh. 5:11, 12]'
  - type: text
    content: 'the bread of the land, you shall present a contribution to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: ver. 18; Lev. 23:10; Deut. 26:1
  - type: text
    content: 'When you come into the land you are to inhabit, which I am giving you, '
  '20':
  - type: note
    content: Deut. 26:2, 10; Neh. 10:37; Ezek. 44:30
  - type: text
    content: 'Of the first of your dough you shall present a loaf as a contribution; like a '
  - type: note
    content: Lev. 2:14; See Lev. 23:10-17
  - type: text
    content: 'contribution from the threshing floor, so shall you present it. '
  '21':
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'Some of the first of your dough you shall give to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a contribution throughout your generations.'
  - type: heading
    content: Laws About Unintentional Sins
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 4:2 ]'
  - type: text
    content: “But if you sin unintentionally,
  - type: note
    content: Or by mistake; also verses 24, 27, 28, 29
  - type: text
    content: ' and do not observe all these commandments that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken to Moses, '
  '23':
  - type: text
    content: 'all that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded you by Moses, from the day that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave commandment, and onward throughout your generations, '
  '24':
  - type: text
    content: 'then if it was done unintentionally '
  - type: note
    content: '[Lev. 4:13]'
  - type: text
    content: 'without the knowledge of the congregation, all the congregation shall offer one bull from the herd for a burnt offering, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 8-10
  - type: text
    content: 'with its grain offering and its drink offering, according to the rule, and '
  - type: note
    content: ch. 28:15; Lev. 4:23
  - type: text
    content: 'one male goat for a sin offering. '
  '25':
  - type: note
    content: Lev. 4:20
  - type: text
    content: 'And the priest shall make atonement for all the congregation of the people of Israel, and they shall be forgiven, because it was a mistake, and they have brought their offering, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', and their sin offering before the '
  - type: text
    content: Lord
  - type: text
    content: ' for their mistake. '
  '26':
  - type: text
    content: And all the congregation of the people of Israel shall be forgiven, and the stranger who sojourns among them, because the whole population was involved in the mistake.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Lev. 4:27, 28
  - type: text
    content: '“If one person sins unintentionally, he shall offer a female goat a year old for a sin offering. '
  '28':
  - type: note
    content: Lev. 4:35
  - type: text
    content: 'And the priest shall make atonement before the '
  - type: text
    content: Lord
  - type: text
    content: ' for the person who makes a mistake, when he sins unintentionally, to make atonement for him, and he shall be forgiven. '
  '29':
  - type: note
    content: See ver. 15
  - type: text
    content: 'You shall have one law for him who does anything unintentionally, for him who is native among the people of Israel and for the stranger who sojourns among them. '
  '3':
  - type: text
    content: 'and '
  - type: note
    content: Lev. 1:2, 3
  - type: text
    content: 'you offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' from the herd or from the flock a food offering'
  - type: note
    content: Or an offering by fire; so throughout Numbers
  - type: text
    content: ' or a burnt offering or a sacrifice, '
  - type: note
    content: Lev. 22:21; 27:2
  - type: text
    content: 'to fulfill a vow or as a freewill offering or '
  - type: note
    content: ch. 28:19, 27; Lev. 23:8, 12, 36; Deut. 16:10
  - type: text
    content: 'at your appointed feasts, to make a '
  - type: note
    content: Ex. 29:18; Lev. 4:31; See Gen. 8:21
  - type: text
    content: 'pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '30':
  - type: note
    content: '[Deut. 17:12; Ps. 19:13; Heb. 10:26]'
  - type: text
    content: 'But the person who does anything with a high hand, whether he is native or a sojourner, reviles the '
  - type: text
    content: Lord
  - type: text
    content: ', and that person shall be cut off from among his people. '
  '31':
  - type: text
    content: 'Because he has '
  - type: note
    content: 2 Sam. 12:9; 2 Chr. 36:16; Prov. 13:13
  - type: text
    content: 'despised the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and has broken his commandment, that person shall be utterly cut off; his iniquity shall be on him.”'
  - type: heading
    content: A Sabbathbreaker Executed
  '32':
  - type: text
    content: 'While the people of Israel were in the wilderness, they found a man '
  - type: note
    content: Ex. 35:3; See Ex. 20:8, 9
  - type: text
    content: 'gathering sticks on the Sabbath day. '
  '33':
  - type: text
    content: 'And those who found him gathering sticks brought him to Moses and Aaron and to all the congregation. '
  '34':
  - type: note
    content: Lev. 24:12
  - type: text
    content: 'They put him in custody, because it had not been made clear what should be done to him. '
  '35':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Ex. 31:14, 15
  - type: text
    content: '“The man shall be put to death; all the congregation shall '
  - type: note
    content: Lev. 24:14-16; Josh. 7:25; 1 Kgs. 21:13; Acts 7:58
  - type: text
    content: 'stone him with stones outside the camp.” '
  '36':
  - type: text
    content: 'And all the congregation brought him outside the camp and stoned him to death with stones, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: Tassels on Garments
  '37':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '38':
  - type: text
    content: '“Speak to the people of Israel, and tell them to '
  - type: note
    content: Deut. 22:12; [Matt. 23:5]
  - type: text
    content: 'make tassels on the corners of their garments throughout their generations, and to put a cord of blue on the tassel of each corner. '
  '39':
  - type: text
    content: 'And it shall be a tassel for you to look at and remember all the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ', to do them, '
  - type: note
    content: '[Job 31:7; Eccles. 11:9; Ezek. 6:9]'
  - type: text
    content: not to follow
  - type: note
    content: Hebrew to spy out
  - type: text
    content: ' after your own heart and your own eyes, which you are inclined '
  - type: note
    content: Ps. 73:27; 106:39; [Ezek. 6:9]
  - type: text
    content: 'to whore after. '
  '4':
  - type: text
    content: 'then '
  - type: note
    content: Lev. 2:1; 6:14
  - type: text
    content: 'he who brings his offering shall offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 29:40; Lev. 23:13
  - type: text
    content: a grain offering of a tenth of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of fine flour, '
  - type: note
    content: ch. 28:5; Lev. 14:10
  - type: text
    content: mixed with a quarter of a hin
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' of oil; '
  '40':
  - type: text
    content: 'So you shall remember and do all my commandments, and be '
  - type: note
    content: See Lev. 11:44
  - type: text
    content: 'holy to your God. '
  '41':
  - type: note
    content: Lev. 22:33; See Lev. 20:8
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt to be your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '5':
  - type: text
    content: 'and you shall offer with the burnt offering, or for the sacrifice, a quarter of a hin of '
  - type: note
    content: ch. 28:7, 14
  - type: text
    content: 'wine for the drink offering for each lamb. '
  '6':
  - type: note
    content: ch. 28:12, 14
  - type: text
    content: 'Or for a ram, you shall offer for a grain offering two tenths of an ephah of fine flour mixed with a third of a hin of oil. '
  '7':
  - type: text
    content: 'And for the drink offering you shall offer a third of a hin of wine, a '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'And when you offer a bull as a burnt offering or sacrifice, to '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'fulfill a vow or for '
  - type: note
    content: Lev. 7:11
  - type: text
    content: 'peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'then one shall offer '
  - type: note
    content: ch. 28:12, 14; See Lev. 6:14-17
  - type: text
    content: 'with the bull a grain offering of three tenths of an ephah of fine flour, mixed with half a hin of oil. '
