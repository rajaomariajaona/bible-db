document_id: 1SA.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Chosen to Be King
  - type: text
    content: 'There was a man of Benjamin whose name was '
  - type: note
    content: ch. 14:51; 1 Chr. 8:33; 9:39
  - type: text
    content: 'Kish, the son of Abiel, son of Zeror, son of Becorath, son of Aphiah, a Benjaminite, a man of wealth. '
  '10':
  - type: text
    content: And Saul said to his servant, “Well said; come, let us go.” So they went to the city where the man of God was.
  '11':
  - type: text
    content: 'As they went up the hill to the city, '
  - type: note
    content: Gen. 24:11
  - type: text
    content: 'they met young women coming out to draw water and said to them, “Is the seer here?” '
  '12':
  - type: text
    content: 'They answered, “He is; behold, he is just ahead of you. Hurry. He has come just now to the city, because the people '
  - type: note
    content: ch. 16:2; 20:29; Gen. 31:54
  - type: text
    content: 'have a sacrifice today on '
  - type: note
    content: ch. 10:5; 1 Kgs. 3:2-4
  - type: text
    content: 'the high place. '
  '13':
  - type: text
    content: 'As soon as you enter the city you will find him, before he goes up to the high place to eat. For the people will not eat till he comes, since he must bless the sacrifice; afterward those who are invited will eat. Now go up, for you will meet him immediately.” '
  '14':
  - type: text
    content: So they went up to the city. As they were entering the city, they saw Samuel coming out toward them on his way up to the high place.
  '15':
  - type: text
    content: 'Now the day before Saul came, '
  - type: note
    content: ch. 15:1; [Acts 13:21]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' had '
  - type: note
    content: Ruth 4:4
  - type: text
    content: 'revealed to Samuel: '
  '16':
  - type: text
    content: '“Tomorrow about this time I will send to you a man from the land of Benjamin, '
  - type: note
    content: ch. 10:1
  - type: text
    content: and you shall anoint him to be prince
  - type: note
    content: Or leader
  - type: text
    content: ' over my people Israel. He shall save my people from the hand of the Philistines. '
  - type: note
    content: Ex. 2:25; 3:7, 9
  - type: text
    content: For I have seen
  - type: note
    content: Septuagint adds the affliction of
  - type: text
    content: ' my people, because their cry has come to me.” '
  '17':
  - type: text
    content: 'When Samuel saw Saul, the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, '
  - type: note
    content: '[ch. 16:12]'
  - type: text
    content: '“Here is the man of whom I spoke to you! He it is who shall restrain my people.” '
  '18':
  - type: text
    content: 'Then Saul approached Samuel in the gate and said, “Tell me where is the house of the seer?” '
  '19':
  - type: text
    content: 'Samuel answered Saul, “I am the seer. Go up before me to the high place, for today you shall eat with me, and in the morning I will let you go and will tell you all that is on your mind. '
  '2':
  - type: text
    content: 'And he had a son whose name was Saul, '
  - type: note
    content: '[ch. 8:16]'
  - type: text
    content: 'a handsome young man. There was not a man among the people of Israel more handsome than he. '
  - type: note
    content: ch. 10:23
  - type: text
    content: From his shoulders upward he was taller than any of the people.
  '20':
  - type: note
    content: ver. 3
  - type: text
    content: 'As for your donkeys that were lost three days ago, do not set your mind on them, for they have been found. And for whom is all that is desirable in Israel? Is it not for you and for all your father’s house?” '
  '21':
  - type: text
    content: 'Saul answered, “Am I not a Benjaminite, '
  - type: note
    content: '[Judg. 20:46; 21:6; Ps. 68:27]'
  - type: text
    content: 'from the least of the tribes of Israel? '
  - type: note
    content: ch. 15:17; [Judg. 6:15]
  - type: text
    content: And is not my clan the humblest of all the clans of the tribe of Benjamin? Why then have you spoken to me in this way?”
  '22':
  - type: text
    content: 'Then Samuel took Saul and his young man and brought them into the hall and gave them a place at the head of those who had been invited, who were about thirty persons. '
  '23':
  - type: text
    content: 'And Samuel said to the cook, “Bring the portion I gave you, of which I said to you, ‘Put it aside.’” '
  '24':
  - type: text
    content: 'So the cook took up '
  - type: note
    content: Ex. 29:22, 27; Lev. 7:32, 33; [Ezek. 24:4]
  - type: text
    content: the leg and what was on it and set them before Saul. And Samuel said, “See, what was kept is set before you. Eat, because it was kept for you until the hour appointed, that you might eat with the guests.”
  - type: note
    content: Hebrew appointed, saying, ‘I have invited the people’
  - type: text
    content: 'So Saul ate with Samuel that day. '
  '25':
  - type: text
    content: 'And when they came down from the high place into the city, a bed was spread for Saul '
  - type: note
    content: '[Deut. 22:8; 2 Sam. 11:2; 16:22; Neh. 8:16; Matt. 24:17; Acts 10:9]'
  - type: text
    content: on the roof, and he lay down to sleep.
  - type: note
    content: Septuagint; Hebrew city, he spoke with Saul on the roof
  - type: text
    content: ' '
  '26':
  - type: text
    content: Then at the break of dawn
  - type: note
    content: Septuagint; Hebrew And they arose early, and at the break of dawn
  - type: text
    content: ' Samuel called to Saul on the roof, “Up, that I may send you on your way.” So Saul arose, and both he and Samuel went out into the street.'
  '27':
  - type: text
    content: As they were going down to the outskirts of the city, Samuel said to Saul, “Tell the servant to pass on before us, and when he has passed on, stop here yourself for a while, that I may make known to you the word of God.”
  '3':
  - type: text
    content: 'Now the donkeys of Kish, Saul’s father, were lost. So Kish said to Saul his son, “Take one of the young men with you, and arise, go and look for the donkeys.” '
  '4':
  - type: text
    content: 'And he passed through '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim and passed through the land of '
  - type: note
    content: 2 Kgs. 4:42
  - type: text
    content: Shalishah, but they did not find them. And they passed through the land of Shaalim, but they were not there. Then they passed through the land of Benjamin, but did not find them.
  '5':
  - type: text
    content: When they came to the land of Zuph, Saul said to his servant
  - type: note
    content: Hebrew young man; also verses 7, 8, 10, 27
  - type: text
    content: ' who was with him, “Come, let us go back, '
  - type: note
    content: ch. 10:2
  - type: text
    content: 'lest my father cease to care about the donkeys and become anxious about us.” '
  '6':
  - type: text
    content: 'But he said to him, “Behold, there is '
  - type: note
    content: Deut. 33:1; Judg. 13:6; 1 Kgs. 13:1
  - type: text
    content: 'a man of God in this city, and he is a man who is held in honor; '
  - type: note
    content: ch. 3:19
  - type: text
    content: 'all that he says comes true. So now let us go there. Perhaps he can tell us the way we should go.” '
  '7':
  - type: text
    content: 'Then Saul said to his servant, “But if we go, '
  - type: note
    content: '[1 Kgs. 14:3; 2 Kgs. 4:42; 8:8]'
  - type: text
    content: 'what can we bring the man? For the bread in our sacks is gone, and there is no present to bring to the man of God. What do we have?” '
  '8':
  - type: text
    content: The servant answered Saul again, “Here, I have with me a quarter of a shekel
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver, and I will give it to the man of God to tell us our way.” '
  '9':
  - type: text
    content: '(Formerly in Israel, when a man '
  - type: note
    content: Gen. 25:22
  - type: text
    content: 'went to inquire of God, he said, “Come, let us go to the seer,” for today’s “prophet” was formerly called a seer.) '
