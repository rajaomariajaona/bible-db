  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Moses sent to call Dathan and Abiram the sons of Eliab, and they said, “We will not come up. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Is it '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'a small thing that you have brought us up out of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 3:8
      marker-yv: yv-n
    - type: text
      text: 'a land flowing with milk and honey, to kill us in the wilderness, that you must also '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 2:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      marker-yv: yv-n
    - type: text
      text: 'make yourself a prince over us? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Moreover, you have not brought us into a land flowing with milk and honey, nor given us inheritance of fields and vineyards. Will you put out the eyes of these men? We will not come up.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Moses was very angry and said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 4:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Do not respect their offering. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 12:3
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 20:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 7:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: I have not taken one donkey from them, and I have not harmed one of them.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Moses said to Korah, “Be present, you and all your company, '
