      marker-yv: yv-n
    - type: text
      text: 'fell on their faces and said, “O God, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 12:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eccles. 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 57:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 12:1
      marker-yv: yv-n
    - type: text
      text: 'the God of the spirits of all flesh, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
