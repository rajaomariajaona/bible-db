      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 18:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Depart, please, from the tents of these wicked men, and touch nothing of theirs, lest you be swept away with all their sins.” '
  '27':
  - type: usfm
