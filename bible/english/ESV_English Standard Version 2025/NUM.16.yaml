document_id: NUM.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Korah’s Rebellion
  - type: text
    content: 'Now '
  - type: note
    content: ch. 27:3; Ex. 6:16, 18, 21; Jude 11
  - type: text
    content: 'Korah the son of Izhar, son of Kohath, son of Levi, and '
  - type: note
    content: ch. 26:9
  - type: text
    content: 'Dathan and Abiram the sons of Eliab, and On the son of Peleth, sons of Reuben, took men. '
  '10':
  - type: text
    content: 'and that he has brought you near him, and all your brothers the sons of Levi with you? And would you seek the priesthood also? '
  '11':
  - type: text
    content: 'Therefore it is against the '
  - type: text
    content: Lord
  - type: text
    content: ' that you and all your company have gathered together. What is '
  - type: note
    content: Ex. 16:8; [1 Cor. 3:5]
  - type: text
    content: Aaron that you grumble against him?”
  '12':
  - type: text
    content: 'And Moses sent to call Dathan and Abiram the sons of Eliab, and they said, “We will not come up. '
  '13':
  - type: text
    content: 'Is it '
  - type: note
    content: ver. 9
  - type: text
    content: 'a small thing that you have brought us up out of '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'a land flowing with milk and honey, to kill us in the wilderness, that you must also '
  - type: note
    content: Ex. 2:14; Acts 7:27, 35
  - type: text
    content: 'make yourself a prince over us? '
  '14':
  - type: text
    content: 'Moreover, you have not brought us into a land flowing with milk and honey, nor given us inheritance of fields and vineyards. Will you put out the eyes of these men? We will not come up.” '
  '15':
  - type: text
    content: 'And Moses was very angry and said to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Gen. 4:4, 5]'
  - type: text
    content: '“Do not respect their offering. '
  - type: note
    content: 1 Sam. 12:3; [Acts 20:33; 2 Cor. 7:2]
  - type: text
    content: I have not taken one donkey from them, and I have not harmed one of them.”
  '16':
  - type: text
    content: 'And Moses said to Korah, “Be present, you and all your company, '
  - type: note
    content: Ex. 16:9; 1 Sam. 12:3, 7
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', you and they, and Aaron, tomorrow. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: ver. 6, 7
  - type: text
    content: 'let every one of you take his censer and put incense on it, and every one of you bring before the '
  - type: text
    content: Lord
  - type: text
    content: ' his censer, '
  - type: note
    content: ver. 35
  - type: text
    content: '250 censers; you also, and Aaron, each his censer.” '
  '18':
  - type: text
    content: 'So every man took his censer and put fire in them and laid incense on them and stood at the entrance of the tent of meeting with Moses and Aaron. '
  '19':
  - type: text
    content: 'Then Korah assembled all the congregation against them at the entrance of the tent of meeting. '
  - type: note
    content: See Lev. 9:23
  - type: text
    content: 'And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to all the congregation.'
  '2':
  - type: text
    content: 'And they rose up before Moses, with a number of the people of Israel, 250 chiefs of the congregation, chosen from the assembly, well-known men. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and to Aaron, saying, '
  '21':
  - type: note
    content: ver. 45; [Gen. 19:17, 22; Jer. 51:6; Rev. 18:4]
  - type: text
    content: '“Separate yourselves from among this congregation, that I may consume them '
  - type: note
    content: Ex. 33:5; Ps. 73:19
  - type: text
    content: 'in a moment.” '
  '22':
  - type: text
    content: 'And they '
  - type: note
    content: ver. 45; ch. 14:5; 20:6
  - type: text
    content: 'fell on their faces and said, “O God, '
  - type: note
    content: ch. 27:16; Job 12:10; Eccles. 12:7; Isa. 57:16; Zech. 12:1
  - type: text
    content: 'the God of the spirits of all flesh, '
  - type: note
    content: '[Gen. 18:23-25; 2 Sam. 24:17]'
  - type: text
    content: 'shall one man sin, and will you be angry with all the congregation?” '
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: “Say to the congregation, Get away from the dwelling of Korah, Dathan, and Abiram.”
  '25':
  - type: text
    content: 'Then Moses rose and went to Dathan and Abiram, and the elders of Israel followed him. '
  '26':
  - type: text
    content: 'And he spoke to the congregation, saying, '
  - type: note
    content: '[Gen. 19:12-14; Isa. 52:11; 2 Cor. 6:17; Rev. 18:4]'
  - type: text
    content: '“Depart, please, from the tents of these wicked men, and touch nothing of theirs, lest you be swept away with all their sins.” '
  '27':
  - type: text
    content: 'So they got away from the dwelling of Korah, Dathan, and Abiram. And Dathan and Abiram came out and stood '
  - type: note
    content: '[Ex. 33:8]'
  - type: text
    content: 'at the door of their tents, together with their wives, their sons, and their little ones. '
  '28':
  - type: text
    content: 'And Moses said, “Hereby you shall know that the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to do all these works, and that it has not been '
  - type: note
    content: '[Jer. 23:16; Ezek. 13:2, 17]'
  - type: text
    content: 'of my own accord. '
  '29':
  - type: text
    content: 'If these men die as all men die, or if they are visited by the fate of all mankind, '
  - type: note
    content: '[1 Kgs. 22:28]'
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' has not sent me. '
  '3':
  - type: note
    content: Ps. 106:16-18
  - type: text
    content: 'They assembled themselves together against Moses and against Aaron and said to them, '
  - type: note
    content: ver. 7
  - type: text
    content: '“You have gone too far! For '
  - type: note
    content: See Ex. 19:6
  - type: text
    content: 'all in the congregation are holy, every one of them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' is among them. Why then do you exalt yourselves above the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '30':
  - type: text
    content: 'But if the '
  - type: text
    content: Lord
  - type: text
    content: ' creates something new, and '
  - type: note
    content: '[Gen. 4:11]'
  - type: text
    content: 'the ground opens its mouth and swallows them up with all that belongs to them, and they '
  - type: note
    content: ver. 33; Ps. 55:15
  - type: text
    content: 'go down alive into Sheol, then you shall know that these men have despised the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:10; 27:3; Deut. 11:6; Ps. 106:17
  - type: text
    content: 'And as soon as he had finished speaking all these words, the ground under them split apart. '
  '32':
  - type: text
    content: 'And the earth opened its mouth and swallowed them up, with their households and '
  - type: note
    content: '[ch. 26:11; 1 Chr. 6:22, 27]'
  - type: text
    content: 'all the people who belonged to Korah and all their goods. '
  '33':
  - type: text
    content: 'So they and all that belonged to them went down alive into Sheol, and the earth closed over them, and '
  - type: note
    content: Jude 11
  - type: text
    content: 'they perished from the midst of the assembly. '
  '34':
  - type: text
    content: 'And all Israel who were around them fled at their cry, for they said, “Lest the earth swallow us up!” '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 11:1]; Lev. 10:2; Ps. 106:18'
  - type: text
    content: 'fire came out from the '
  - type: text
    content: Lord
  - type: text
    content: ' and consumed '
  - type: note
    content: ver. 17
  - type: text
    content: the 250 men offering the incense.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Ch 17:1 in Hebrew
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '37':
  - type: text
    content: '“Tell Eleazar the son of Aaron the priest to take up the censers out of the blaze. Then scatter the fire far and wide, for they have become holy. '
  '38':
  - type: text
    content: 'As for the censers of '
  - type: note
    content: Prov. 20:2; Hab. 2:10; [1 Kgs. 2:23]
  - type: text
    content: 'these men who have sinned at the cost of their lives, let them be made into hammered plates as a covering for the altar, for they offered them before the '
  - type: text
    content: Lord
  - type: text
    content: ', and they became holy. '
  - type: note
    content: ch. 17:10; 26:10
  - type: text
    content: 'Thus they shall be a sign to the people of Israel.” '
  '39':
  - type: text
    content: 'So Eleazar the priest took the bronze censers, which those who were burned had offered, and they were hammered out as a covering for the altar, '
  '4':
  - type: text
    content: 'When Moses heard it, '
  - type: note
    content: ch. 14:5; 20:6
  - type: text
    content: 'he fell on his face, '
  '40':
  - type: text
    content: 'to be a reminder to the people of Israel, so '
  - type: note
    content: ch. 3:10; 2 Chr. 26:18
  - type: text
    content: 'that no outsider, who is not of the descendants of Aaron, should draw near to burn incense before the '
  - type: text
    content: Lord
  - type: text
    content: ', lest he become like Korah and his company—as the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him through Moses.'
  '41':
  - type: text
    content: 'But on the next day all the congregation of the people of Israel '
  - type: note
    content: See ch. 14:2
  - type: text
    content: 'grumbled against Moses and against Aaron, saying, “You have killed the people of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '42':
  - type: text
    content: 'And when the congregation had assembled against Moses and against Aaron, they turned toward the tent of meeting. And behold, '
  - type: note
    content: Ex. 40:34
  - type: text
    content: 'the cloud covered it, and '
  - type: note
    content: ver. 19; See Lev. 9:23
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared. '
  '43':
  - type: text
    content: 'And Moses and Aaron came to the front of the tent of meeting, '
  '44':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '45':
  - type: note
    content: ver. 21, 24
  - type: text
    content: '“Get away from the midst of this congregation, that I may consume them in a moment.” '
  - type: note
    content: ver. 22
  - type: text
    content: 'And they fell on their faces. '
  '46':
  - type: text
    content: 'And Moses said to Aaron, “Take your censer, and put fire on it from off the altar and lay incense on it and carry it quickly to the congregation and make atonement for them, for '
  - type: note
    content: ch. 8:19; 11:33; Lev. 10:6; 1 Chr. 27:24
  - type: text
    content: 'wrath has gone out from the '
  - type: text
    content: Lord
  - type: text
    content: '; the plague has begun.” '
  '47':
  - type: text
    content: 'So Aaron took it as Moses said and ran into the midst of the assembly. And behold, the plague had already begun among the people. And he put on the incense and made atonement for the people. '
  '48':
  - type: text
    content: 'And he stood between the dead and the living, and '
  - type: note
    content: ver. 50; ch. 25:8; 2 Sam. 24:25; Ps. 106:30
  - type: text
    content: 'the plague was stopped. '
  '49':
  - type: text
    content: 'Now those who died in the plague were 14,700, '
  - type: note
    content: ch. 27:3
  - type: text
    content: 'besides those who died in the affair of Korah. '
  '5':
  - type: text
    content: 'and he said to Korah and all his company, “In the morning the '
  - type: text
    content: Lord
  - type: text
    content: ' will show '
  - type: note
    content: '[2 Tim. 2:19]'
  - type: text
    content: who is his,
  - type: note
    content: Septuagint The Lord knows those who are his
  - type: text
    content: ' and who is '
  - type: note
    content: ver. 3
  - type: text
    content: 'holy, and will bring him near to him. The one '
  - type: note
    content: ch. 17:5; 1 Sam. 2:28; Ps. 105:26; [Ex. 28:1]
  - type: text
    content: 'whom he chooses he will '
  - type: note
    content: ch. 3:10; Lev. 10:3; Ps. 65:4; Ezek. 40:46; 44:15, 16
  - type: text
    content: 'bring near to him. '
  '50':
  - type: text
    content: And Aaron returned to Moses at the entrance of the tent of meeting, when the plague was stopped.
  '6':
  - type: text
    content: 'Do this: take '
  - type: note
    content: Lev. 10:1
  - type: text
    content: 'censers, Korah and all his company; '
  '7':
  - type: text
    content: 'put fire in them and put incense on them before the '
  - type: text
    content: Lord
  - type: text
    content: ' tomorrow, and the man whom the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses shall be the holy one. '
  - type: note
    content: ver. 3
  - type: text
    content: 'You have gone too far, sons of Levi!” '
  '8':
  - type: text
    content: 'And Moses said to Korah, “Hear now, you sons of Levi: '
  '9':
  - type: text
    content: 'is it '
  - type: note
    content: ver. 13; 1 Sam. 18:23; Isa. 7:13; [Ezek. 16:20]
  - type: text
    content: 'too small a thing for you that the God of Israel has '
  - type: note
    content: ch. 8:14; Deut. 10:8
  - type: text
    content: 'separated you from the congregation of Israel, to bring you near to himself, to do service in the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to stand before the congregation to minister to them, '
