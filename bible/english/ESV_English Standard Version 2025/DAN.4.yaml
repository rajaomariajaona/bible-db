document_id: DAN.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar Praises God
  - type: text
    content: ' '
  - type: note
    content: Ch 3:31 in Aramaic
  - type: text
    content: 'King Nebuchadnezzar to all '
  - type: note
    content: See ch. 3:4
  - type: text
    content: 'peoples, nations, and languages, '
  - type: note
    content: ch. 6:25
  - type: text
    content: 'that dwell in all the earth: '
  - type: note
    content: 1 Pet. 1:2; 2 Pet. 1:2
  - type: text
    content: 'Peace be multiplied to you! '
  '10':
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'The visions of my head as I lay in bed were these: I saw, and '
  - type: note
    content: '[Ezek. 31:3]'
  - type: text
    content: 'behold, a tree in the midst of the earth, and its height was great. '
  '11':
  - type: note
    content: '[Ps. 37:35]'
  - type: text
    content: 'The tree grew and became strong, and its top reached to heaven, and it was visible to the end of the whole earth. '
  '12':
  - type: note
    content: Ezek. 31:7
  - type: text
    content: 'Its leaves were beautiful and its fruit abundant, and in it was food for all. '
  - type: note
    content: Ezek. 31:6
  - type: text
    content: 'The beasts of the field found shade under it, and '
  - type: note
    content: Ezek. 31:6
  - type: text
    content: the birds of the heavens lived in its branches, and all flesh was fed from it.
  '13':
  - type: text
    content: '“I saw in '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the visions of my head as I lay in bed, and behold, '
  - type: note
    content: ver. 23
  - type: text
    content: 'a watcher, '
  - type: note
    content: '[Deut. 33:2; Zech. 14:5; Jude 14]'
  - type: text
    content: 'a holy one, came down from heaven. '
  '14':
  - type: text
    content: 'He '
  - type: note
    content: See ch. 3:4
  - type: text
    content: 'proclaimed aloud and said thus: '
  - type: note
    content: ver. 23; [Matt. 3:10; Luke 3:9]
  - type: text
    content: '‘Chop down the tree and '
  - type: note
    content: '[Ezek. 31:12]'
  - type: text
    content: 'lop off its branches, '
  - type: note
    content: '[Ezek. 31:12]'
  - type: text
    content: 'strip off its leaves and scatter its fruit. '
  - type: note
    content: '[Ezek. 31:12]'
  - type: text
    content: 'Let the beasts flee from under it and the birds from its branches. '
  '15':
  - type: text
    content: 'But leave the stump of its roots in the earth, bound with a band of iron and bronze, amid the tender grass of the field. Let him be wet with the dew of heaven. Let his portion be with the beasts in the grass of the earth. '
  '16':
  - type: text
    content: 'Let his mind be changed from a man’s, and let a beast’s mind be given to him; '
  - type: note
    content: '[ver. 23, 25]'
  - type: text
    content: 'and let seven periods of time '
  - type: note
    content: '[1 Chr. 29:30]'
  - type: text
    content: 'pass over him. '
  '17':
  - type: text
    content: 'The sentence is by the decree of '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'the watchers, the decision by the word of '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'the holy ones, to the end that the living may know that the Most High '
  - type: note
    content: ver. 25, 32; ch. 5:21
  - type: text
    content: 'rules the kingdom of men '
  - type: note
    content: Jer. 27:5
  - type: text
    content: 'and gives it to whom he will and '
  - type: note
    content: See 1 Sam. 2:8
  - type: text
    content: 'sets over it the lowliest of men.’ '
  '18':
  - type: text
    content: 'This dream I, King Nebuchadnezzar, saw. And you, O '
  - type: note
    content: See ch. 1:7
  - type: text
    content: 'Belteshazzar, tell me the interpretation, because '
  - type: note
    content: '[ver. 7; ch. 5:8, 15; Gen. 41:8]'
  - type: text
    content: 'all the wise men of my kingdom are not able to make known to me the interpretation, but you are able, for '
  - type: note
    content: See ver. 8
  - type: text
    content: the spirit of the holy gods is in you.”
  - type: heading
    content: Daniel Interprets the Second Dream
  '19':
  - type: text
    content: 'Then Daniel, whose name was '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Belteshazzar, was '
  - type: note
    content: ch. 3:24
  - type: text
    content: 'dismayed for a while, and '
  - type: note
    content: ch. 5:6
  - type: text
    content: 'his thoughts alarmed him. The king answered and said, “Belteshazzar, let not the dream or the interpretation alarm you.” Belteshazzar answered and said, “My lord, '
  - type: note
    content: '[1 Sam. 25:26; 2 Sam. 18:32]'
  - type: text
    content: 'may the dream be for those who hate you '
  - type: note
    content: '[1 Sam. 25:26; 2 Sam. 18:32]'
  - type: text
    content: 'and its interpretation for your enemies! '
  '2':
  - type: text
    content: 'It has seemed good to me to show the '
  - type: note
    content: ch. 6:27; [John 4:48]
  - type: text
    content: 'signs and wonders that the '
  - type: note
    content: ch. 3:26
  - type: text
    content: Most High God has done for me.
  '20':
  - type: note
    content: '[ver. 10, 11]'
  - type: text
    content: 'The tree you saw, which grew and became strong, so that its top reached to heaven, and it was visible to the end of the whole earth, '
  '21':
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'whose leaves were beautiful and its fruit abundant, and in which was food for all, under which beasts of the field found shade, and in whose branches the birds of the heavens lived— '
  '22':
  - type: note
    content: '[Ezek. 31:3]'
  - type: text
    content: 'it is you, O king, who have grown and become strong. '
  - type: note
    content: See Jer. 27:6-8
  - type: text
    content: 'Your greatness has grown and reaches to heaven, '
  - type: note
    content: See Jer. 27:6-8
  - type: text
    content: 'and your dominion to the ends of the earth. '
  '23':
  - type: text
    content: 'And because the king saw '
  - type: note
    content: ver. 13
  - type: text
    content: 'a watcher, a holy one, coming down from heaven and saying, '
  - type: note
    content: ver. 14, 15
  - type: text
    content: '‘Chop down the tree and destroy it, but leave the stump of its roots in the earth, bound with a band of iron and bronze, in the tender grass of the field, and let him be wet with the dew of heaven, and let his portion be with the beasts of the field, till '
  - type: note
    content: ver. 16
  - type: text
    content: 'seven periods of time pass over him,’ '
  '24':
  - type: text
    content: 'this is the interpretation, O king: It is a decree of the Most High, which has come upon my lord the king, '
  '25':
  - type: note
    content: ver. 32, 33; [ch. 5:21]
  - type: text
    content: 'that you shall be driven from among men, and your dwelling shall be with the beasts of the field. You shall be made '
  - type: note
    content: '[Ps. 106:20]'
  - type: text
    content: 'to eat grass like an ox, and you shall be wet with the dew of heaven, and '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'seven periods of time shall pass over you, till '
  - type: note
    content: ver. 17, 32
  - type: text
    content: 'you know that the Most High rules the kingdom of men and gives it to whom he will. '
  '26':
  - type: text
    content: 'And as it was commanded '
  - type: note
    content: ver. 15, 23
  - type: text
    content: 'to leave the stump of the roots of the tree, your kingdom shall be confirmed for you from the time that you know that Heaven rules. '
  '27':
  - type: text
    content: 'Therefore, O king, let my counsel be acceptable to you: break off your sins by '
  - type: note
    content: Matt. 6:1
  - type: text
    content: 'practicing righteousness, '
  - type: note
    content: Prov. 16:6; [Matt. 25:35, 36; Luke 11:41]
  - type: text
    content: 'and your iniquities by showing mercy to the oppressed, '
  - type: note
    content: '[Jer. 18:8; Jonah 3:10; Acts 8:22; 2 Tim. 2:25]'
  - type: text
    content: that there may perhaps be a lengthening of your prosperity.”
  - type: heading
    content: Nebuchadnezzar’s Humiliation
  '28':
  - type: text
    content: 'All this came upon King Nebuchadnezzar. '
  '29':
  - type: text
    content: 'At the end of twelve months he was walking on the roof of the royal palace of Babylon, '
  '3':
  - type: text
    content: 'How great are '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: his signs,
  - type: text
    content: 'how mighty his '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: wonders!
  - type: note
    content: See ch. 2:44
  - type: text
    content: His kingdom is an everlasting kingdom,
  - type: note
    content: See ch. 2:44
  - type: text
    content: and his dominion endures from generation to generation.
  - type: heading
    content: Nebuchadnezzar’s Second Dream
  '30':
  - type: text
    content: 'and the king answered and said, '
  - type: note
    content: '[ch. 5:20]'
  - type: text
    content: '“Is not this great Babylon, which I have built by '
  - type: note
    content: '[ver. 36; ch. 2:37]'
  - type: text
    content: 'my mighty power as a royal residence and for '
  - type: note
    content: '[ver. 36; ch. 2:37]'
  - type: text
    content: 'the glory of my majesty?” '
  '31':
  - type: note
    content: '[ch. 5:5; Luke 12:20]'
  - type: text
    content: 'While the words were still in the king’s mouth, there fell a voice from heaven, “O King Nebuchadnezzar, to you it is spoken: The kingdom has departed from you, '
  '32':
  - type: note
    content: ver. 17, 25; ch. 5:21
  - type: text
    content: 'and you shall be driven from among men, and your dwelling shall be with the beasts of the field. And you shall be made to eat grass like an ox, and seven periods of time shall pass over you, '
  - type: note
    content: ver. 17, 25; ch. 5:21
  - type: text
    content: 'until you know that the Most High rules the kingdom of men and gives it to whom he will.” '
  '33':
  - type: text
    content: 'Immediately the word was fulfilled against Nebuchadnezzar. '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: He was driven from among men and ate grass like an ox, and his body was wet with the dew of heaven till his hair grew as long as eagles’ feathers, and his nails were like birds’ claws.
  - type: heading
    content: Nebuchadnezzar Restored
  '34':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 26 ]'
  - type: text
    content: 'At the end of the days I, Nebuchadnezzar, lifted my eyes to heaven, and '
  - type: note
    content: ver. 36
  - type: text
    content: 'my reason returned to me, and I blessed the Most High, and praised and honored '
  - type: note
    content: ch. 6:26; 12:7; Rev. 4:10
  - type: text
    content: him who lives forever,
  - type: note
    content: '[ Ps. 10:16 ]; See ch. 2:44'
  - type: text
    content: for his dominion is an everlasting dominion,
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 10:16]; See ch. 2:44'
  - type: text
    content: his kingdom endures from generation to generation;
  '35':
  - type: text
    content: ' '
  - type: note
    content: Isa. 40:17
  - type: text
    content: all the inhabitants of the earth are accounted as nothing,
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 115:3; Heb. 1:13, 14]'
  - type: text
    content: he does according to his will among the host of heaven
  - type: text
    content: and among the inhabitants of the earth;
  - type: note
    content: '[ Isa. 14:27 ]'
  - type: text
    content: and none can stay his hand
  - type: text
    content: 'or '
  - type: note
    content: Job 9:12; [Isa. 45:9; Rom. 9:20]
  - type: text
    content: say to him, “What have you done?”
  '36':
  - type: text
    content: 'At the same time '
  - type: note
    content: ver. 34
  - type: text
    content: 'my reason returned to me, and for '
  - type: note
    content: '[ver. 30; ch. 5:18]'
  - type: text
    content: 'the glory of my kingdom, '
  - type: note
    content: '[ver. 30; ch. 5:18]'
  - type: text
    content: 'my majesty and splendor returned to me. '
  - type: note
    content: ch. 3:24; 6:7
  - type: text
    content: 'My counselors and '
  - type: note
    content: ch. 5:1; 6:17
  - type: text
    content: 'my lords sought me, and I was established in my kingdom, and still more greatness was '
  - type: note
    content: '[Job 42:12; Matt. 6:33]'
  - type: text
    content: 'added to me. '
  '37':
  - type: text
    content: 'Now I, Nebuchadnezzar, '
  - type: note
    content: ver. 34
  - type: text
    content: 'praise and extol and honor the '
  - type: note
    content: '[ch. 5:23]'
  - type: text
    content: 'King of heaven, '
  - type: note
    content: '[Deut. 32:4; Ps. 33:4; Rev. 15:3]'
  - type: text
    content: 'for all his works are right and his ways are just; and '
  - type: note
    content: '[ch. 5:20; Prov. 20:23]'
  - type: text
    content: those who walk in pride he is able to humble.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ch 4:1 in Aramaic
  - type: text
    content: 'I, Nebuchadnezzar, was at ease in my house and prospering in my palace. '
  '5':
  - type: text
    content: 'I saw a dream that made me afraid. As I lay in bed the fancies and '
  - type: note
    content: ch. 2:28; 7:15
  - type: text
    content: 'the visions of my head alarmed me. '
  '6':
  - type: text
    content: 'So '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'I made a decree that '
  - type: note
    content: ch. 2:12
  - type: text
    content: 'all the wise men of Babylon should be brought before me, that they might make known to me the interpretation of the dream. '
  '7':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 2:2
  - type: text
    content: 'the magicians, the enchanters, the Chaldeans, and the astrologers came in, and I told them the dream, but '
  - type: note
    content: '[ver. 18; ch. 2:27; 5:8, 15]'
  - type: text
    content: 'they could not make known to me its interpretation. '
  '8':
  - type: text
    content: 'At last Daniel came in before me—he who was named '
  - type: note
    content: See ch. 1:7
  - type: text
    content: 'Belteshazzar after the name of my god, and in whom is '
  - type: note
    content: ver. 18; ch. 2:11; 5:11; Gen. 41:38; [Isa. 63:14]
  - type: text
    content: the spirit of the holy gods
  - type: note
    content: Or Spirit of the holy God; also verses 9, 18
  - type: text
    content: '—and I told him the dream, saying, '
  '9':
  - type: text
    content: '“O Belteshazzar, '
  - type: note
    content: ch. 5:11; [ch. 2:48]
  - type: text
    content: 'chief of the magicians, because I know that '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the spirit of the holy gods is in you and that no '
  - type: note
    content: ch. 2:18
  - type: text
    content: 'mystery is too difficult for you, tell me '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the visions of my dream that I saw and their interpretation. '
