document_id: GEN.9,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And God blessed Noah and his sons and said to them, '
  - type: note
    content: ch. 1:22, 28; 8:17
  - type: text
    content: '“Be fruitful and multiply and fill the earth. '
  '10':
  - type: text
    content: 'and with every living creature that is with you, the birds, the livestock, and every beast of the earth with you, as many as came out of the ark; it is for every beast of the earth. '
  '11':
  - type: note
    content: Isa. 54:9, 10
  - type: text
    content: 'I establish my covenant with you, that never again shall all flesh be cut off by the waters of the flood, and never again shall there be a flood to destroy the earth.” '
  '12':
  - type: text
    content: 'And God said, '
  - type: note
    content: ch. 17:11
  - type: text
    content: '“This is the sign of the covenant that I make between me and you and every living creature that is with you, for all future generations: '
  '13':
  - type: text
    content: 'I have set '
  - type: note
    content: Ezek. 1:28; [Rev. 4:3; 10:1]
  - type: text
    content: 'my bow in the cloud, and it shall be a sign of the covenant between me and the earth. '
  '14':
  - type: text
    content: 'When I bring clouds over the earth and the bow is seen in the clouds, '
  '15':
  - type: note
    content: '[Lev. 26:42, 45; 1 Kgs. 8:23; Ezek. 16:60]'
  - type: text
    content: 'I will remember my covenant that is between me and you and every living creature of all flesh. And the waters shall never again become a flood to destroy all flesh. '
  '16':
  - type: text
    content: 'When the bow is in the clouds, I will see it and remember '
  - type: note
    content: ch. 17:7, 13, 19
  - type: text
    content: 'the everlasting covenant between God and every living creature of all flesh that is on the earth.” '
  '17':
  - type: text
    content: God said to Noah, “This is the sign of the covenant that I have established between me and all flesh that is on the earth.”
  - type: heading
    content: Noah’s Descendants
  '18':
  - type: text
    content: 'The sons of Noah who went forth from the ark were '
  - type: note
    content: ch. 5:32; 10:1
  - type: text
    content: 'Shem, Ham, and Japheth. (Ham was the father of Canaan.) '
  '19':
  - type: text
    content: 'These three were the sons of Noah, and '
  - type: note
    content: ch. 10:32
  - type: text
    content: from these the people of the whole earth were dispersed.
  - type: note
    content: Or from these the whole earth was populated
  '2':
  - type: note
    content: '[Ps. 8:6-8; James 3:7]'
  - type: text
    content: 'The fear of you and the dread of you shall be upon every beast of the earth and upon every bird of the heavens, upon everything that creeps on the ground and all the fish of the sea. Into your hand they are delivered. '
  '20':
  - type: text
    content: Noah began to be a man of the soil, and he planted a vineyard.
  - type: note
    content: Or Noah, a man of the soil, was the first to plant a vineyard
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'He drank of the wine and became drunk and lay uncovered in his tent. '
  '22':
  - type: text
    content: 'And Ham, the father of Canaan, saw the nakedness of his father and told his two brothers outside. '
  '23':
  - type: text
    content: 'Then Shem and Japheth took a garment, laid it on both their shoulders, and walked backward and covered the nakedness of their father. Their faces were turned backward, and they did not see their father’s nakedness. '
  '24':
  - type: text
    content: 'When Noah awoke from his wine '
  - type: note
    content: '[Hab. 2:15]'
  - type: text
    content: 'and knew what his youngest son had done to him, '
  '25':
  - type: text
    content: he said,
  - type: note
    content: Deut. 27:16
  - type: text
    content: “Cursed be Canaan;
  - type: note
    content: Josh. 9:23; Judg. 1:28; 1 Kgs. 9:20, 21
  - type: text
    content: a servant of servants shall he be to his brothers.”
  '26':
  - type: text
    content: He also said,
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Shem;'
  - type: text
    content: and let Canaan be his servant.
  '27':
  - type: text
    content: May God enlarge Japheth,
  - type: note
    content: Japheth sounds like the Hebrew for enlarge
  - type: text
    content: and let him dwell in the tents of Shem,
  - type: text
    content: and let Canaan be his servant.”
  '28':
  - type: text
    content: 'After the flood Noah lived 350 years. '
  '29':
  - type: text
    content: All the days of Noah were 950 years, and he died.
  '3':
  - type: note
    content: Deut. 12:15; 1 Tim. 4:3, 4
  - type: text
    content: 'Every moving thing that lives shall be food for you. And '
  - type: note
    content: ch. 1:29
  - type: text
    content: 'as I gave you the green plants, I give you everything. '
  '4':
  - type: text
    content: 'But you shall not eat flesh with its '
  - type: note
    content: Lev. 17:10, 11, 14; Deut. 12:16, 23; 1 Sam. 14:33; Acts 15:20, 29
  - type: text
    content: 'life, that is, its blood. '
  '5':
  - type: text
    content: 'And for your lifeblood I will require a reckoning: '
  - type: note
    content: Ex. 21:28
  - type: text
    content: 'from every beast I will require it and '
  - type: note
    content: ch. 4:10, 11
  - type: text
    content: from man. From his fellow man I will require a reckoning for the life of man.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ex. 21:12, 14; Lev. 24:17; Num. 35:31, 33; [ Matt. 26:52; Rev. 13:10 ]
  - type: text
    content: “Whoever sheds the blood of man,
  - type: text
    content: by man shall his blood be shed,
  - type: note
    content: ch. 1:27; 5:1; James 3:9
  - type: text
    content: for God made man in his own image.
  '7':
  - type: text
    content: And you,
  - type: note
    content: In Hebrew you is plural
  - type: text
    content: ' be fruitful and multiply, increase greatly on the earth and multiply in it.”'
  '8':
  - type: text
    content: 'Then God said to Noah and to his sons with him, '
  '9':
  - type: text
    content: '“Behold, '
  - type: note
    content: ch. 6:18; 8:20-22
  - type: text
    content: 'I establish my covenant with you and your offspring after you, '
