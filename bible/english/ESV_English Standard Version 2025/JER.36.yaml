document_id: JER.36,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoiakim Burns Jeremiah’s Scroll
  - type: text
    content: 'In the '
  - type: note
    content: ch. 25:1; 45:1; [ver. 9]
  - type: text
    content: 'fourth year of Jehoiakim the son of Josiah, king of Judah, this word came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'Then, in the hearing of all the people, Baruch read the words of Jeremiah from the scroll, in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', in '
  - type: note
    content: '[ch. 35:2]'
  - type: text
    content: 'the chamber of Gemariah the son of Shaphan the secretary, which was in the upper court, at the entry of the New Gate of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house.
  '11':
  - type: text
    content: 'When Micaiah the son of Gemariah, son of '
  - type: note
    content: ch. 26:24; 40:5; 2 Chr. 34:8, 15, 18
  - type: text
    content: 'Shaphan, heard all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' from the scroll, '
  '12':
  - type: text
    content: 'he went down to the king’s house, into the secretary’s chamber, and '
  - type: note
    content: ch. 26:10
  - type: text
    content: 'all the officials were sitting there: '
  - type: note
    content: ver. 20; ch. 41:1; 2 Kgs. 25:25
  - type: text
    content: 'Elishama the secretary, '
  - type: note
    content: ver. 25
  - type: text
    content: 'Delaiah the son of Shemaiah, '
  - type: note
    content: ver. 25
  - type: text
    content: 'Elnathan '
  - type: note
    content: ch. 26:22
  - type: text
    content: 'the son of Achbor, '
  - type: note
    content: ver. 25
  - type: text
    content: 'Gemariah the son of '
  - type: note
    content: ch. 26:22
  - type: text
    content: 'Shaphan, Zedekiah the son of Hananiah, and all the officials. '
  '13':
  - type: text
    content: 'And Micaiah told them all the words that he had heard, when Baruch read the scroll in the hearing of the people. '
  '14':
  - type: text
    content: 'Then all the officials sent Jehudi the son of Nethaniah, son of '
  - type: note
    content: ver. 26; ch. 37:3, 13; 38:1
  - type: text
    content: 'Shelemiah, son of Cushi, to say to Baruch, “Take in your hand the scroll that you read in the hearing of the people, and come.” So Baruch the son of Neriah took the scroll in his hand and came to them. '
  '15':
  - type: text
    content: 'And they said to him, “Sit down and read it.” So Baruch read it to them. '
  '16':
  - type: text
    content: 'When they heard all the words, they turned one to another in fear. And they said to Baruch, '
  - type: note
    content: ver. 20
  - type: text
    content: '“We must report all these words to the king.” '
  '17':
  - type: text
    content: 'Then they asked Baruch, “Tell us, please, how did you write all these words? Was it at his dictation?” '
  '18':
  - type: text
    content: 'Baruch answered them, “He dictated all these words to me, '
  - type: note
    content: ver. 32; [Rom. 16:22]
  - type: text
    content: 'while I wrote them with ink on the scroll.” '
  '19':
  - type: text
    content: Then the officials said to Baruch, “Go and hide, you and Jeremiah, and let no one know where you are.”
  '2':
  - type: text
    content: '“Take '
  - type: note
    content: Ezra 6:2; Ps. 40:7; Ezek. 2:9; Zech. 5:1, 2
  - type: text
    content: 'a scroll and '
  - type: note
    content: ch. 30:2; [ch. 51:60]
  - type: text
    content: 'write on it all the words that I have spoken to you against Israel and '
  - type: note
    content: ch. 25:2
  - type: text
    content: 'Judah '
  - type: note
    content: See ch. 25:15-26; 46–51
  - type: text
    content: 'and all the nations, '
  - type: note
    content: ch. 1:2; 25:3
  - type: text
    content: 'from the day I spoke to you, from the days of Josiah until today. '
  '20':
  - type: text
    content: 'So they went into the court to the king, having put the scroll in '
  - type: note
    content: ver. 12
  - type: text
    content: 'the chamber of Elishama the secretary, and they reported all the words to the king. '
  '21':
  - type: text
    content: 'Then the king sent Jehudi to get the scroll, and he took it from the chamber of Elishama the secretary. And Jehudi read it to the king and all the officials who stood beside the king. '
  '22':
  - type: text
    content: 'It was '
  - type: note
    content: ver. 9; [John 10:22]
  - type: text
    content: 'the ninth month, and the king was sitting in '
  - type: note
    content: Amos 3:15
  - type: text
    content: 'the winter house, and there was a fire burning in the fire pot before him. '
  '23':
  - type: text
    content: 'As Jehudi read three or four columns, the king would cut them off with a knife and throw them into the fire in the fire pot, until the entire scroll was consumed in the fire that was in the fire pot. '
  '24':
  - type: text
    content: 'Yet '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'neither the king nor any of his servants who heard all these words was afraid, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'nor did they tear their garments. '
  '25':
  - type: text
    content: 'Even when '
  - type: note
    content: ver. 12
  - type: text
    content: 'Elnathan and Delaiah and Gemariah '
  - type: note
    content: '[Isa. 59:16]'
  - type: text
    content: 'urged the king not to burn the scroll, he would not listen to them. '
  '26':
  - type: text
    content: 'And the king commanded Jerahmeel the '
  - type: note
    content: '[1 Kgs. 22:26; Zeph. 1:8]'
  - type: text
    content: 'king’s son and Seraiah the son of Azriel and '
  - type: note
    content: ver. 14
  - type: text
    content: 'Shelemiah the son of Abdeel to seize '
  - type: note
    content: See ch. 45:1-3
  - type: text
    content: 'Baruch the secretary and Jeremiah the prophet, but the '
  - type: text
    content: Lord
  - type: text
    content: ' hid them.'
  '27':
  - type: text
    content: 'Now after the king had burned the scroll with the words that Baruch wrote at Jeremiah’s dictation, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '28':
  - type: text
    content: '“Take another scroll and write on it all the former words that were in the first scroll, which Jehoiakim the king of Judah has burned. '
  '29':
  - type: text
    content: 'And concerning Jehoiakim king of Judah you shall say, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', You have burned this scroll, saying, '
  - type: note
    content: See ch. 26:9
  - type: text
    content: '“Why have you written in it that the king of Babylon will certainly come and destroy this land, and will cut off from it man and beast?” '
  '3':
  - type: note
    content: ch. 26:3; Ezek. 12:3; Zeph. 2:3; [Amos 5:15]
  - type: text
    content: 'It may be that the house of Judah will hear all the disaster that I intend to do to them, '
  - type: note
    content: '[ch. 18:8]'
  - type: text
    content: 'so that every one may turn from his evil way, and '
  - type: note
    content: See ch. 31:34
  - type: text
    content: that I may forgive their iniquity and their sin.”
  '30':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Jehoiakim king of Judah: '
  - type: note
    content: '[ch. 22:30]'
  - type: text
    content: 'He shall have none '
  - type: note
    content: '[ch. 22:2, 4]'
  - type: text
    content: 'to sit on the throne of David, '
  - type: note
    content: '[ch. 22:19]'
  - type: text
    content: 'and his dead body shall be cast out to the heat by day and the frost by night. '
  '31':
  - type: note
    content: '[ch. 1:16]'
  - type: text
    content: And I will punish him and his offspring and his servants for their iniquity. I will bring upon them and upon the inhabitants of Jerusalem and upon the people of Judah all the disaster that I have pronounced against them, but they would not hear.’”
  '32':
  - type: text
    content: 'Then Jeremiah took another scroll and gave it to '
  - type: note
    content: See ver. 4
  - type: text
    content: 'Baruch the scribe, the son of Neriah, who '
  - type: note
    content: ver. 18
  - type: text
    content: wrote on it at the dictation of Jeremiah all the words of the scroll that Jehoiakim king of Judah had burned in the fire. And many similar words were added to them.
  '4':
  - type: text
    content: 'Then Jeremiah called '
  - type: note
    content: See ch. 32:12
  - type: text
    content: 'Baruch the son of Neriah, and '
  - type: note
    content: See ch. 32:12
  - type: text
    content: 'Baruch wrote on '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'a scroll at the dictation of Jeremiah all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he had spoken to him. '
  '5':
  - type: text
    content: 'And Jeremiah ordered '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'Baruch, saying, '
  - type: note
    content: ch. 32:2; 33:1; 39:15
  - type: text
    content: '“I am banned from going to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'so you are to go, and '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'on a day of fasting in the hearing of all the people in the '
  - type: text
    content: Lord
  - type: text
    content: '’s house you shall read the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' from the scroll that you have written at my dictation. You shall read them also in the hearing of all the men of Judah who come out of their cities. '
  '7':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'It may be that their plea for mercy will come before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'and that every one will turn from his evil way, for great is the anger and wrath that the '
  - type: text
    content: Lord
  - type: text
    content: ' has pronounced against this people.” '
  '8':
  - type: text
    content: 'And Baruch the son of Neriah did all that Jeremiah the prophet ordered him about reading from the scroll the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the '
  - type: text
    content: Lord
  - type: text
    content: ’s house.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 1 ]'
  - type: text
    content: 'In the fifth year of Jehoiakim the son of Josiah, king of Judah, '
  - type: note
    content: ver. 22
  - type: text
    content: 'in the ninth month, all the people in Jerusalem and all the people who came from the cities of Judah to Jerusalem '
  - type: note
    content: '[2 Chr. 20:3]'
  - type: text
    content: 'proclaimed a fast before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
