    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was told Joab, “Behold, the king is weeping and mourning for Absalom.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Absalom, whom we anointed over us, is dead in battle. Now therefore why do you say nothing about bringing the king back?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And King David sent this message to '
    - type: usfm
