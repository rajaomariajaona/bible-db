      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'as one man, so that they sent word to the king, “Return, both you and all your servants.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king came back to the Jordan, and Judah came to Gilgal to meet the king and to bring the king over the Jordan.
  - type: usfm
