        children:
        - type: text
          text: 16:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:8
      marker-yv: yv-n
    - type: text
      text: 'Shimei the son of Gera, the Benjaminite, from Bahurim, hurried to come down with the men of Judah to meet King David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And with him were a thousand men from Benjamin. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:1-4
      marker-yv: yv-n
    - type: text
      text: 'Ziba the servant of the house of Saul, with his fifteen sons and his twenty servants, rushed down to the Jordan before the king, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they crossed the ford to bring over the king’s household and to do his pleasure. And Shimei the son of Gera fell down before the king, as he was about to cross the Jordan, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to the king, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
