        - type: text
          text: 15:29
      marker-yv: yv-n
    - type: text
      text: 'Zadok and Abiathar the priests: “Say to the elders of Judah, ‘Why should you be the last to bring the king back to his house, when the word of all Israel has come to the king?'
    - type: usfm
      marker: f
      children:
