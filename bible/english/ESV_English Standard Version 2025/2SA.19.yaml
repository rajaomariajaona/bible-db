document_id: 2SA.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joab Rebukes David
  - type: text
    content: 'It was told Joab, “Behold, the king is weeping and mourning for Absalom.” '
  '10':
  - type: text
    content: But Absalom, whom we anointed over us, is dead in battle. Now therefore why do you say nothing about bringing the king back?”
  '11':
  - type: text
    content: 'And King David sent this message to '
  - type: note
    content: ch. 15:29
  - type: text
    content: 'Zadok and Abiathar the priests: “Say to the elders of Judah, ‘Why should you be the last to bring the king back to his house, when the word of all Israel has come to the king?'
  - type: note
    content: Septuagint; Hebrew to the king, to his house
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'You are my brothers; '
  - type: note
    content: ch. 5:1; [Gen. 29:14]
  - type: text
    content: 'you are my bone and my flesh. Why then should you be the last to bring back the king?’ '
  '13':
  - type: text
    content: 'And say to Amasa, '
  - type: note
    content: ch. 17:25
  - type: text
    content: '‘Are you not my bone and my flesh? '
  - type: note
    content: See Ruth 1:17
  - type: text
    content: 'God do so to me and more also, if you are not '
  - type: note
    content: ch. 8:16
  - type: text
    content: 'commander of my army from now on in place of Joab.’” '
  '14':
  - type: text
    content: 'And he swayed the heart of all the men of Judah '
  - type: note
    content: '[Judg. 20:1]'
  - type: text
    content: 'as one man, so that they sent word to the king, “Return, both you and all your servants.” '
  '15':
  - type: text
    content: So the king came back to the Jordan, and Judah came to Gilgal to meet the king and to bring the king over the Jordan.
  - type: heading
    content: David Pardons His Enemies
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ch. 16:5; 1 Kgs. 2:8
  - type: text
    content: 'Shimei the son of Gera, the Benjaminite, from Bahurim, hurried to come down with the men of Judah to meet King David. '
  '17':
  - type: text
    content: 'And with him were a thousand men from Benjamin. And '
  - type: note
    content: ch. 9:2, 10; See ch. 16:1-4
  - type: text
    content: 'Ziba the servant of the house of Saul, with his fifteen sons and his twenty servants, rushed down to the Jordan before the king, '
  '18':
  - type: text
    content: 'and they crossed the ford to bring over the king’s household and to do his pleasure. And Shimei the son of Gera fell down before the king, as he was about to cross the Jordan, '
  '19':
  - type: text
    content: 'and said to the king, '
  - type: note
    content: '[1 Sam. 22:15]'
  - type: text
    content: '“Let not my lord hold me guilty or remember how your servant '
  - type: note
    content: See ch. 16:5-13
  - type: text
    content: 'did wrong on the day my lord the king left Jerusalem. Do not let the king take it to heart. '
  '2':
  - type: text
    content: 'So the victory that day was turned into mourning for all the people, for the people heard that day, “The king is grieving for his son.” '
  '20':
  - type: text
    content: 'For your servant knows that I have sinned. Therefore, behold, I have come this day, the first '
  - type: note
    content: '[ch. 16:5]'
  - type: text
    content: 'of all the house of Joseph to come down to meet my lord the king.” '
  '21':
  - type: text
    content: 'Abishai the son of Zeruiah answered, “Shall not Shimei be put to death for this, because '
  - type: note
    content: '[Ex. 22:28]'
  - type: text
    content: 'he cursed the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed?” '
  '22':
  - type: text
    content: 'But David said, '
  - type: note
    content: ch. 16:10
  - type: text
    content: '“What have I to do with you, you sons of Zeruiah, that you should this day be as an adversary to me? '
  - type: note
    content: '[1 Sam. 11:13]'
  - type: text
    content: 'Shall anyone be put to death in Israel this day? For do I not know that I am this day king over Israel?” '
  '23':
  - type: note
    content: '[1 Kgs. 2:8, 9, 37, 46]'
  - type: text
    content: And the king said to Shimei, “You shall not die.” And the king gave him his oath.
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 9:6
  - type: text
    content: 'Mephibosheth the son of Saul came down to meet the king. He had neither taken care of his feet nor trimmed his beard nor washed his clothes, from the day the king departed until the day he came back in safety. '
  '25':
  - type: text
    content: 'And when he came to Jerusalem to meet the king, the king said to him, '
  - type: note
    content: '[ch. 16:17]'
  - type: text
    content: '“Why did you not go with me, Mephibosheth?” '
  '26':
  - type: text
    content: He answered, “My lord, O king, my servant deceived me, for your servant said to him, ‘I will saddle a donkey for myself,
  - type: note
    content: Septuagint, Syriac, Vulgate Saddle a donkey for me
  - type: text
    content: ' that I may ride on it and go with the king.’ For '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'your servant is lame. '
  '27':
  - type: note
    content: ch. 16:3
  - type: text
    content: 'He has slandered your servant to my lord the king. But my lord the king is '
  - type: note
    content: ch. 14:17, 20; 1 Sam. 29:9
  - type: text
    content: 'like the angel of God; do therefore what seems good to you. '
  '28':
  - type: text
    content: 'For all my father’s house were but men doomed to death before my lord the king, but '
  - type: note
    content: ch. 9:7, 10, 13
  - type: text
    content: 'you set your servant among those who eat at your table. What further right have I, then, to cry to the king?” '
  '29':
  - type: text
    content: 'And the king said to him, “Why speak any more of your affairs? I have decided: you and Ziba shall divide the land.” '
  '3':
  - type: text
    content: 'And the people stole into the city that day as people steal in who are ashamed when they flee in battle. '
  '30':
  - type: text
    content: And Mephibosheth said to the king, “Oh, let him take it all, since my lord the king has come safely home.”
  '31':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Kgs. 2:7
  - type: text
    content: 'Barzillai the Gileadite had come down from Rogelim, and he went on with the king to the Jordan, to escort him over the Jordan. '
  '32':
  - type: text
    content: 'Barzillai was a very aged man, eighty years old. '
  - type: note
    content: ch. 17:27-29
  - type: text
    content: 'He had provided the king with food while he stayed at Mahanaim, for he was a very wealthy man. '
  '33':
  - type: text
    content: 'And the king said to Barzillai, “Come over with me, and I will provide for you with me in Jerusalem.” '
  '34':
  - type: text
    content: 'But Barzillai said to the king, '
  - type: note
    content: Gen. 47:8
  - type: text
    content: '“How many years have I still to live, that I should go up with the king to Jerusalem? '
  '35':
  - type: text
    content: 'I am this day '
  - type: note
    content: '[Ps. 90:10]'
  - type: text
    content: 'eighty years old. Can I discern what is pleasant and what is not? Can your servant taste what he eats or what he drinks? Can I still listen to the voice of singing men and singing women? Why then should your servant be '
  - type: note
    content: ch. 15:33
  - type: text
    content: 'an added burden to my lord the king? '
  '36':
  - type: text
    content: 'Your servant will go a little way over the Jordan with the king. Why should the king repay me with such a reward? '
  '37':
  - type: text
    content: 'Please let your servant return, that I may die in my own city near the grave of my father and my mother. But here is your servant '
  - type: note
    content: 1 Kgs. 2:7; Jer. 41:17
  - type: text
    content: 'Chimham. Let him go over with my lord the king, and do for him whatever seems good to you.” '
  '38':
  - type: text
    content: 'And the king answered, “Chimham shall go over with me, and I will do for him whatever seems good to you, and all that you desire of me I will do for you.” '
  '39':
  - type: text
    content: 'Then all the people went over the Jordan, and the king went over. And '
  - type: note
    content: See ch. 14:33
  - type: text
    content: 'the king kissed Barzillai and blessed him, and he returned to his own home. '
  '4':
  - type: text
    content: 'The king '
  - type: note
    content: ch. 15:30
  - type: text
    content: 'covered his face, and the king cried with a loud voice, '
  - type: note
    content: ch. 18:33
  - type: text
    content: '“O my son Absalom, O Absalom, my son, my son!” '
  '40':
  - type: text
    content: The king went on to Gilgal, and Chimham went on with him. All the people of Judah, and also half the people of Israel, brought the king on his way.
  '41':
  - type: text
    content: 'Then all the men of Israel came to the king and said to the king, “Why have our brothers the men of Judah stolen you away and '
  - type: note
    content: ver. 15
  - type: text
    content: 'brought the king and his household over the Jordan, and all David’s men with him?” '
  '42':
  - type: text
    content: 'All the men of Judah answered the men of Israel, “Because the king is '
  - type: note
    content: ver. 12
  - type: text
    content: 'our close relative. Why then are you angry over this matter? Have we eaten at all at the king’s expense? Or has he given us any gift?” '
  '43':
  - type: text
    content: 'And the men of Israel answered the men of Judah, “We have '
  - type: note
    content: '[1 Kgs. 11:30, 31]'
  - type: text
    content: 'ten shares in the king, and in David also we have more than you. Why then did you despise us? Were we not the first to speak of bringing back our king?” '
  - type: note
    content: Isa. 9:21; 11:13
  - type: text
    content: But the words of the men of Judah were fiercer than the words of the men of Israel.
  '5':
  - type: text
    content: 'Then Joab came into the house to the king and said, “You have today covered with shame the faces of all your servants, who have this day saved your life and the lives of your sons and your daughters and the lives of your wives and your concubines, '
  '6':
  - type: text
    content: 'because you love those who hate you and hate those who love you. For you have made it clear today that commanders and servants are nothing to you, for today I know that if Absalom were alive and all of us were dead today, then you would be pleased. '
  '7':
  - type: text
    content: 'Now therefore arise, go out and speak '
  - type: note
    content: Gen. 34:3 (Heb.)
  - type: text
    content: 'kindly to your servants, for I swear by the '
  - type: text
    content: Lord
  - type: text
    content: ', if you do not go, not a man will stay with you this night, and this will be worse for you than all the evil that has come upon you from your youth until now.” '
  '8':
  - type: text
    content: 'Then the king arose and took his '
  - type: note
    content: ch. 18:4, 24, 33; See Ruth 4:1
  - type: text
    content: seat in the gate. And the people were all told, “Behold, the king is sitting in the gate.” And all the people came before the king.
  - type: heading
    content: David Returns to Jerusalem
  - type: text
    content: 'Now Israel had '
  - type: note
    content: See ch. 18:17
  - type: text
    content: 'fled every man to his own home. '
  '9':
  - type: text
    content: 'And all the people were arguing throughout all the tribes of Israel, saying, '
  - type: note
    content: See ch. 8:1-14
  - type: text
    content: '“The king delivered us from the hand of our enemies and '
  - type: note
    content: ch. 5:20; 8:1
  - type: text
    content: 'saved us from the hand of the Philistines, and now '
  - type: note
    content: ch. 15:14
  - type: text
    content: 'he has fled out of the land from Absalom. '
