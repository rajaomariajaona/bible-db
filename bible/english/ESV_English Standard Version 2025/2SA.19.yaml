        children:
        - type: text
          text: 1 Sam. 22:15
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Let not my lord hold me guilty or remember how your servant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:5-13
      marker-yv: yv-n
    - type: text
      text: 'did wrong on the day my lord the king left Jerusalem. Do not let the king take it to heart. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the victory that day was turned into mourning for all the people, for the people heard that day, “The king is grieving for his son.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For your servant knows that I have sinned. Therefore, behold, I have come this day, the first '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'of all the house of Joseph to come down to meet my lord the king.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishai the son of Zeruiah answered, “Shall not Shimei be put to death for this, because '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 22:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he cursed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:10
      marker-yv: yv-n
    - type: text
      text: '“What have I to do with you, you sons of Zeruiah, that you should this day be as an adversary to me? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 11:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Shall anyone be put to death in Israel this day? For do I not know that I am this day king over Israel?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '46'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: And the king said to Shimei, “You shall not die.” And the king gave him his oath.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      marker-yv: yv-n
    - type: text
      text: 'Mephibosheth the son of Saul came down to meet the king. He had neither taken care of his feet nor trimmed his beard nor washed his clothes, from the day the king departed until the day he came back in safety. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he came to Jerusalem to meet the king, the king said to him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Why did you not go with me, Mephibosheth?” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “My lord, O king, my servant deceived me, for your servant said to him, ‘I will saddle a donkey for myself,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Syriac, Vulgate '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Saddle a donkey for me
      marker-yv: yv-n
    - type: text
      text: ' that I may ride on it and go with the king.’ For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:3
      marker-yv: yv-n
    - type: text
      text: 'your servant is lame. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:3
      marker-yv: yv-n
    - type: text
      text: 'He has slandered your servant to my lord the king. But my lord the king is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 29:9
      marker-yv: yv-n
    - type: text
      text: 'like the angel of God; do therefore what seems good to you. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all my father’s house were but men doomed to death before my lord the king, but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      marker-yv: yv-n
    - type: text
      text: 'you set your servant among those who eat at your table. What further right have I, then, to cry to the king?” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said to him, “Why speak any more of your affairs? I have decided: you and Ziba shall divide the land.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people stole into the city that day as people steal in who are ashamed when they flee in battle. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Mephibosheth said to the king, “Oh, let him take it all, since my lord the king has come safely home.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:7
      marker-yv: yv-n
    - type: text
      text: 'Barzillai the Gileadite had come down from Rogelim, and he went on with the king to the Jordan, to escort him over the Jordan. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barzillai was a very aged man, eighty years old. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:27-29
      marker-yv: yv-n
    - type: text
      text: 'He had provided the king with food while he stayed at Mahanaim, for he was a very wealthy man. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said to Barzillai, “Come over with me, and I will provide for you with me in Jerusalem.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Barzillai said to the king, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 47:8
      marker-yv: yv-n
    - type: text
      text: '“How many years have I still to live, that I should go up with the king to Jerusalem? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am this day '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 90:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'eighty years old. Can I discern what is pleasant and what is not? Can your servant taste what he eats or what he drinks? Can I still listen to the voice of singing men and singing women? Why then should your servant be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:33
      marker-yv: yv-n
    - type: text
      text: 'an added burden to my lord the king? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your servant will go a little way over the Jordan with the king. Why should the king repay me with such a reward? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please let your servant return, that I may die in my own city near the grave of my father and my mother. But here is your servant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 41:17
      marker-yv: yv-n
    - type: text
      text: 'Chimham. Let him go over with my lord the king, and do for him whatever seems good to you.” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king answered, “Chimham shall go over with me, and I will do for him whatever seems good to you, and all that you desire of me I will do for you.” '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the people went over the Jordan, and the king went over. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:33
      marker-yv: yv-n
    - type: text
      text: 'the king kissed Barzillai and blessed him, and he returned to his own home. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:30
      marker-yv: yv-n
    - type: text
      text: 'covered his face, and the king cried with a loud voice, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:33
      marker-yv: yv-n
    - type: text
      text: '“O my son Absalom, O Absalom, my son, my son!” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king went on to Gilgal, and Chimham went on with him. All the people of Judah, and also half the people of Israel, brought the king on his way.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the men of Israel came to the king and said to the king, “Why have our brothers the men of Judah stolen you away and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'brought the king and his household over the Jordan, and all David’s men with him?” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the men of Judah answered the men of Israel, “Because the king is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'our close relative. Why then are you angry over this matter? Have we eaten at all at the king’s expense? Or has he given us any gift?” '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Israel answered the men of Judah, “We have '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 11:30
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
