document_id: 1KI.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Turns from the Lord
  - type: text
    content: 'Now '
  - type: note
    content: Neh. 13:26; [Deut. 17:17]
  - type: text
    content: 'King Solomon loved many foreign women, along with the daughter of Pharaoh: Moabite, Ammonite, Edomite, Sidonian, and Hittite women, '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: ch. 6:12; 9:6
  - type: text
    content: 'had commanded him concerning this thing, that he should not go after other gods. But he did not keep what the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. '
  '11':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Solomon, “Since this has been your practice and you have not kept my covenant and my statutes that I have commanded you, '
  - type: note
    content: ver. 31; [ch. 12:15, 16]
  - type: text
    content: 'I will surely tear the kingdom from you and will give it to your servant. '
  '12':
  - type: text
    content: 'Yet for the sake of David your father I will not do it in your days, but I will tear it out of the hand of your son. '
  '13':
  - type: text
    content: 'However, '
  - type: note
    content: '[2 Sam. 7:15; Ps. 89:33]'
  - type: text
    content: 'I will not tear away all the kingdom, but '
  - type: note
    content: ver. 32, 36; [ch. 12:20]
  - type: text
    content: 'I will give one tribe to your son, for the sake of David my servant and for the sake of Jerusalem '
  - type: note
    content: Deut. 12:5, 11
  - type: text
    content: that I have chosen.”
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up an adversary against Solomon, Hadad the Edomite. He was of the royal house in Edom. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: 2 Sam. 8:14; 1 Chr. 18:12, 13
  - type: text
    content: 'when David was in Edom, and Joab the commander of the army went up to bury the slain, he struck down every male in Edom '
  '16':
  - type: text
    content: '(for Joab and all Israel remained there six months, until he had cut off every male in Edom). '
  '17':
  - type: text
    content: 'But Hadad fled to Egypt, together with certain Edomites of his father’s servants, Hadad still being a little child. '
  '18':
  - type: text
    content: 'They set out from Midian and came to '
  - type: note
    content: Num. 10:12; Deut. 33:2
  - type: text
    content: 'Paran and took men with them from Paran and came to Egypt, to Pharaoh king of Egypt, who gave him a house and assigned him an allowance of food and gave him land. '
  '19':
  - type: text
    content: 'And Hadad found great favor in the sight of Pharaoh, so that he gave him in marriage the sister of his own wife, the sister of Tahpenes the queen. '
  '2':
  - type: text
    content: 'from the nations concerning which the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to the people of Israel, '
  - type: note
    content: See Ex. 34:16
  - type: text
    content: '“You shall not enter into marriage with them, neither shall they with you, for surely they will turn away your heart after their gods.” Solomon clung to these in love. '
  '20':
  - type: text
    content: 'And the sister of Tahpenes bore him Genubath his son, whom Tahpenes weaned in Pharaoh’s house. And Genubath was in Pharaoh’s house among the sons of Pharaoh. '
  '21':
  - type: text
    content: 'But when Hadad heard in Egypt '
  - type: note
    content: ch. 2:10
  - type: text
    content: 'that David slept with his fathers and that Joab the commander of the army was dead, Hadad said to Pharaoh, “Let me depart, that I may go to my own country.” '
  '22':
  - type: text
    content: But Pharaoh said to him, “What have you lacked with me that you are now seeking to go to your own country?” And he said to him, “Only let me depart.”
  '23':
  - type: text
    content: 'God also raised up as an adversary to him, Rezon the son of Eliada, who had fled from his master '
  - type: note
    content: '[2 Sam. 10:16]'
  - type: text
    content: 'Hadadezer king of Zobah. '
  '24':
  - type: text
    content: 'And he gathered men about him and became leader of a marauding band, '
  - type: note
    content: 2 Sam. 8:3; 10:8, 18
  - type: text
    content: 'after the killing by David. And they went to Damascus and lived there and made him king in Damascus. '
  '25':
  - type: text
    content: He was an adversary of Israel all the days of Solomon, doing harm as Hadad did. And he loathed Israel and reigned over Syria.
  '26':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:2; 2 Chr. 13:6
  - type: text
    content: 'Jeroboam the son of Nebat, '
  - type: note
    content: 1 Sam. 1:1
  - type: text
    content: 'an Ephraimite of Zeredah, a servant of Solomon, whose mother’s name was Zeruah, a widow, also '
  - type: note
    content: 2 Sam. 20:21
  - type: text
    content: 'lifted up his hand against the king. '
  '27':
  - type: text
    content: 'And this was the reason why he lifted up his hand against the king. '
  - type: note
    content: ch. 9:24; [2 Sam. 5:9]
  - type: text
    content: 'Solomon built the Millo, and closed up the breach of the city of David his father. '
  '28':
  - type: text
    content: 'The man Jeroboam was very able, and when Solomon saw that the young man was industrious he gave him charge over all the forced labor of the house of Joseph. '
  '29':
  - type: text
    content: 'And at that time, when Jeroboam went out of Jerusalem, the prophet '
  - type: note
    content: ch. 12:15; 14:2; 15:29; 2 Chr. 9:29
  - type: text
    content: 'Ahijah the Shilonite found him on the road. Now Ahijah had dressed himself in a new garment, and the two of them were alone in the open country. '
  '3':
  - type: text
    content: 'He had 700 wives, who were princesses, and 300 concubines. And his wives turned away his heart. '
  '30':
  - type: text
    content: 'Then Ahijah laid hold of the new garment that was on him, '
  - type: note
    content: '[1 Sam. 15:27]'
  - type: text
    content: 'and tore it into twelve pieces. '
  '31':
  - type: text
    content: 'And he said to Jeroboam, “Take for yourself ten pieces, for thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, ‘Behold, '
  - type: note
    content: ver. 11-13
  - type: text
    content: 'I am about to tear the kingdom from the hand of Solomon and will give you ten tribes '
  '32':
  - type: text
    content: '(but '
  - type: note
    content: ver. 13; ch. 12:21
  - type: text
    content: 'he shall have one tribe, for the sake of my servant David and for the sake of Jerusalem, '
  - type: note
    content: ch. 14:21; See Deut. 12:5
  - type: text
    content: 'the city that I have chosen out of all the tribes of Israel), '
  '33':
  - type: text
    content: because they have
  - type: note
    content: Septuagint, Syriac, Vulgate he has; twice in this verse
  - type: text
    content: ' forsaken me '
  - type: note
    content: ver. 5, 7
  - type: text
    content: 'and worshiped Ashtoreth the goddess of the Sidonians, Chemosh the god of Moab, and Milcom the god of the Ammonites, and they have not walked in my ways, doing what is right in my sight and keeping my statutes and my rules, as David his father did. '
  '34':
  - type: text
    content: 'Nevertheless, I will not take the whole kingdom out of his hand, but I will make him ruler all the days of his life, for the sake of David my servant whom I chose, who kept my commandments and my statutes. '
  '35':
  - type: note
    content: ver. 12; ch. 12:16, 17
  - type: text
    content: 'But I will take the kingdom out of his son’s hand and will give it to you, ten tribes. '
  '36':
  - type: text
    content: 'Yet to his son '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'I will give one tribe, that David my servant may always have '
  - type: note
    content: ch. 15:4; 2 Sam. 21:17; 2 Kgs. 8:19; 2 Chr. 21:7
  - type: text
    content: 'a lamp before me in Jerusalem, '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'the city where I have chosen to put my name. '
  '37':
  - type: text
    content: 'And I will take you, and you shall reign over all that your soul desires, and you shall be king over Israel. '
  '38':
  - type: text
    content: 'And if you will listen to all that I command you, and will walk in my ways, and do what is right in my eyes by keeping my statutes and my commandments, as David my servant did, '
  - type: note
    content: Josh. 1:5
  - type: text
    content: 'I will be with you and '
  - type: note
    content: 1 Sam. 2:35; 2 Sam. 7:11, 27
  - type: text
    content: 'will build you a sure house, as I built for David, and I will give Israel to you. '
  '39':
  - type: text
    content: 'And I will afflict the offspring of David because of this, but not forever.’” '
  '4':
  - type: text
    content: 'For when Solomon was old his wives turned away his heart after other gods, and '
  - type: note
    content: '[ch. 8:61]'
  - type: text
    content: 'his heart was not wholly true to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'as was the heart of David his father. '
  '40':
  - type: text
    content: 'Solomon sought therefore to kill Jeroboam. But Jeroboam arose and fled into Egypt, to '
  - type: note
    content: ch. 14:25; 2 Chr. 12:2, 5, 7, 9
  - type: text
    content: Shishak king of Egypt, and was in Egypt until the death of Solomon.
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-43, see 2 Chr. 9:29-31
  - type: text
    content: 'Now the rest of the acts of Solomon, and all that he did, and his wisdom, are they not written in the Book of the Acts of Solomon? '
  '42':
  - type: text
    content: 'And the time that Solomon reigned in Jerusalem over all Israel was forty years. '
  '43':
  - type: text
    content: 'And Solomon '
  - type: note
    content: ch. 2:10; 14:20
  - type: text
    content: 'slept with his fathers and was buried in the city of David his father. And '
  - type: note
    content: Matt. 1:7
  - type: text
    content: Rehoboam his son reigned in his place.
  '5':
  - type: text
    content: 'For Solomon went after '
  - type: note
    content: ver. 33; Judg. 2:13; 2 Kgs. 23:13
  - type: text
    content: 'Ashtoreth the goddess of the Sidonians, and after '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'Milcom the abomination of the Ammonites. '
  '6':
  - type: text
    content: 'So Solomon did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not wholly follow the '
  - type: text
    content: Lord
  - type: text
    content: ', as David his father had done. '
  '7':
  - type: text
    content: 'Then Solomon built a high place for '
  - type: note
    content: Num. 21:29; 2 Kgs. 23:13
  - type: text
    content: 'Chemosh the abomination of Moab, and for '
  - type: note
    content: Lev. 18:21; 20:2-4; 2 Kgs. 23:10; Acts 7:43; [ver. 5]
  - type: text
    content: 'Molech the abomination of the Ammonites, on the mountain east of Jerusalem. '
  '8':
  - type: text
    content: And so he did for all his foreign wives, who made offerings and sacrificed to their gods.
  - type: heading
    content: The Lord Raises Adversaries
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with Solomon, because '
  - type: note
    content: ver. 2, 4
  - type: text
    content: 'his heart had turned away from the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: ch. 3:5; 9:2
  - type: text
    content: 'who had appeared to him twice '
