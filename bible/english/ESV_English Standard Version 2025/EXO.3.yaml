document_id: EXO.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Burning Bush
  - type: text
    content: 'Now Moses was keeping the flock of his father-in-law, Jethro, the priest of Midian, and he led his flock to the west side of the wilderness and came to Horeb, the '
  - type: note
    content: ch. 4:27; 18:5; 24:13; Num. 10:33; 1 Kgs. 19:8
  - type: text
    content: 'mountain of God. '
  '10':
  - type: note
    content: '[Ps. 105:26; Mic. 6:4]'
  - type: text
    content: 'Come, I will send you to Pharaoh that you may bring my people, the children of Israel, out of Egypt.” '
  '11':
  - type: text
    content: 'But Moses said to God, '
  - type: note
    content: ch. 6:12; [1 Sam. 18:18; Isa. 6:5, 8; Jer. 1:6]
  - type: text
    content: '“Who am I that I should go to Pharaoh and bring the children of Israel out of Egypt?” '
  '12':
  - type: text
    content: 'He said, '
  - type: note
    content: ch. 4:12, 15; Deut. 31:8, 23; Josh. 1:5
  - type: text
    content: '“But I will be with you, and this shall be the sign for you, that I have sent you: when you have brought the people out of Egypt, '
  - type: note
    content: See ch. 19
  - type: text
    content: you shall serve God on this mountain.”
  '13':
  - type: text
    content: 'Then Moses said to God, “If I come to the people of Israel and say to them, ‘The God of your fathers has sent me to you,’ and they ask me, ‘What is his name?’ what shall I say to them?” '
  '14':
  - type: text
    content: 'God said to Moses, “I '
  - type: heading
    content: am who
  - type: text
    content: ' I '
  - type: heading
    content: am
  - type: text
    content: .”
  - type: note
    content: Or I am what I am, or I will be what I will be
  - type: text
    content: 'And he said, “Say this to the people of Israel: '
  - type: note
    content: ch. 6:3; Ps. 68:4; John 8:58; Heb. 13:8; Rev. 1:4; 4:8
  - type: text
    content: '‘I '
  - type: heading
    content: am
  - type: text
    content: ' has sent me to you.’” '
  '15':
  - type: text
    content: 'God also said to Moses, “Say this to the people of Israel: ‘The '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: The word Lord, when spelled with capital letters, stands for the divine name, YHWH, which is here connected with the verb hayah, “to be” in verse 14
  - type: text
    content: ' the '
  - type: note
    content: ver. 6
  - type: text
    content: 'God of your fathers, the God of Abraham, the God of Isaac, and the God of Jacob, has sent me to you.’ This is '
  - type: note
    content: Hos. 12:5; [Ps. 135:13]
  - type: text
    content: 'my name forever, and thus I am to be remembered throughout all generations. '
  '16':
  - type: text
    content: 'Go and '
  - type: note
    content: ch. 4:29
  - type: text
    content: 'gather the elders of Israel together and say to them, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, the God of Abraham, of Isaac, and of Jacob, has appeared to me, saying, '
  - type: note
    content: ch. 4:31; Gen. 50:24; [Luke 1:68]
  - type: text
    content: '“I have observed you and what has been done to you in Egypt, '
  '17':
  - type: text
    content: 'and I promise that '
  - type: note
    content: ver. 8
  - type: text
    content: 'I will bring you up out of the affliction of Egypt to the land of the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites, a land '
  - type: note
    content: ver. 8
  - type: text
    content: 'flowing with milk and honey.”’ '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:31
  - type: text
    content: 'they will listen to your voice, and you and the elders of Israel '
  - type: note
    content: ch. 5:1
  - type: text
    content: 'shall go to the king of Egypt and say to him, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, has '
  - type: note
    content: Num. 23:3, 4, 15, 16
  - type: text
    content: 'met with us; and now, please let us go a three days’ journey into the wilderness, that we may sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.’ '
  '19':
  - type: text
    content: 'But I know that the king of Egypt '
  - type: note
    content: ch. 5:2; 7:4
  - type: text
    content: 'will not let you go unless compelled '
  - type: note
    content: ch. 6:1; 13:3
  - type: text
    content: by a mighty hand.
  - type: note
    content: Septuagint, Vulgate; Hebrew go, not by a mighty hand
  - type: text
    content: ' '
  '2':
  - type: note
    content: For ver. 2-10, see Acts 7:30-35
  - type: text
    content: 'And '
  - type: note
    content: Isa. 63:9
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him in a flame of fire out of the midst of a bush. He looked, and behold, the bush was burning, yet it was not consumed. '
  '20':
  - type: text
    content: 'So '
  - type: note
    content: Deut. 6:22; Neh. 9:10; Jer. 32:20; Acts 7:36; See ch. 7–12
  - type: text
    content: 'I will stretch out my hand and strike Egypt with '
  - type: note
    content: ch. 4:21
  - type: text
    content: 'all the wonders that I will do in it; '
  - type: note
    content: ch. 12:31
  - type: text
    content: 'after that he will let you go. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ch. 11:2, 3; 12:35, 36; [Gen. 15:14]
  - type: text
    content: 'I will give this people favor in the sight of the Egyptians; and when you go, you shall not go empty, '
  '22':
  - type: text
    content: 'but each woman shall ask of her neighbor, and any woman who lives in her house, for '
  - type: note
    content: '[ch. 33:6]'
  - type: text
    content: 'silver and gold jewelry, and for clothing. You shall put them on your sons and on your daughters. So '
  - type: note
    content: '[Ezek. 39:10]'
  - type: text
    content: you shall plunder the Egyptians.”
  '3':
  - type: text
    content: 'And Moses said, “I will turn aside to see this great sight, why the bush is not burned.” '
  '4':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that he turned aside to see, '
  - type: note
    content: ch. 19:3
  - type: text
    content: 'God called to him '
  - type: note
    content: Deut. 33:16
  - type: text
    content: 'out of the bush, “Moses, Moses!” And he said, “Here I am.” '
  '5':
  - type: text
    content: 'Then he said, “Do not come near; '
  - type: note
    content: Josh. 5:15; [ch. 19:12; Eccles. 5:1]
  - type: text
    content: 'take your sandals off your feet, for the place on which you are standing is holy ground.” '
  '6':
  - type: text
    content: 'And he said, '
  - type: note
    content: ch. 4:5; Gen. 28:13; 1 Kgs. 18:36; Cited Matt. 22:32; Mark 12:26; [Luke 20:37]
  - type: text
    content: '“I am the God of your father, the God of Abraham, the God of Isaac, and the God of Jacob.” And Moses hid his face, for '
  - type: note
    content: '[1 Kgs. 19:13; Isa. 6:1, 2, 5]'
  - type: text
    content: he was afraid to look at God.
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: ch. 2:23-25; Neh. 9:9; Ps. 106:44
  - type: text
    content: '“I have surely seen the affliction of my people who are in Egypt and have heard their cry because of their '
  - type: note
    content: ch. 5:13, 14
  - type: text
    content: 'taskmasters. I know their sufferings, '
  '8':
  - type: text
    content: 'and '
  - type: note
    content: Gen. 11:5, 7; 18:21
  - type: text
    content: 'I have come down to deliver them out of the hand of the Egyptians and '
  - type: note
    content: ch. 6:6; 12:51; [Gen. 50:24]
  - type: text
    content: 'to bring them up out of that land to a '
  - type: note
    content: Deut. 1:25; 8:7, 8, 9
  - type: text
    content: 'good and broad land, a land '
  - type: note
    content: ch. 13:5; 33:3; Lev. 20:24; Num. 13:27; Deut. 26:9, 15; Jer. 11:5; 32:22; Ezek. 20:6
  - type: text
    content: 'flowing with milk and honey, to the place of '
  - type: note
    content: Gen. 15:18-21
  - type: text
    content: 'the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites. '
  '9':
  - type: text
    content: 'And now, behold, '
  - type: note
    content: ch. 2:23
  - type: text
    content: 'the cry of the people of Israel has come to me, and I have also seen the '
  - type: note
    content: ch. 1:11-14, 22
  - type: text
    content: 'oppression with which the Egyptians oppress them. '
