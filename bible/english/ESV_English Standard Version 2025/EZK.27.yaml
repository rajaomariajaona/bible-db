type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament for Tyre
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 38:5
  - type: text
    content: '“Persia and '
  - type: note
    content: ch. 30:5; [Isa. 66:19; Jer. 46:9]
  - type: text
    content: 'Lud and '
  - type: note
    content: ch. 38:5
  - type: text
    content: 'Put were in your army as your men of war. '
  - type: note
    content: '[2 Sam. 8:7; Song 4:4]'
  - type: text
    content: 'They hung the shield and helmet in you; they gave you splendor. '
  '11':
  - type: text
    content: 'Men of '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'Arvad and Helech were on your walls all around, and men of Gamad were in your towers. They hung their shields on your walls all around; they made '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: perfect your beauty.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ver. 25 ; ch. 38:13; See 1 Kgs. 10:22
  - type: text
    content: '“Tarshish did '
  - type: note
    content: ver. 16, 18, 21
  - type: text
    content: 'business with you because of your great wealth of every kind; silver, iron, tin, and lead they exchanged for your '
  - type: note
    content: ver. 14, 16, 19, 22
  - type: text
    content: 'wares. '
  '13':
  - type: note
    content: Gen. 10:2
  - type: text
    content: 'Javan, '
  - type: note
    content: ch. 32:26; 38:2; 39:1
  - type: text
    content: 'Tubal, and '
  - type: note
    content: ch. 32:26; 38:2; 39:1
  - type: text
    content: 'Meshech traded with you; they exchanged human beings and vessels of bronze for your merchandise. '
  '14':
  - type: text
    content: 'From '
  - type: note
    content: ch. 38:6; Gen. 10:3
  - type: text
    content: 'Beth-togarmah they exchanged horses, war horses, and mules '
  - type: note
    content: ver. 12
  - type: text
    content: 'for your wares. '
  '15':
  - type: text
    content: 'The men of '
  - type: note
    content: Gen. 10:7; See ch. 25:13
  - type: text
    content: Dedan
  - type: note
    content: Hebrew; Septuagint Rhodes
  - type: text
    content: ' traded with you. Many coastlands were your own special markets; they brought you in payment ivory tusks and ebony. '
  '16':
  - type: text
    content: 'Syria '
  - type: note
    content: ver. 12
  - type: text
    content: 'did business with you because of your abundant goods; they exchanged for your wares '
  - type: note
    content: ch. 28:13
  - type: text
    content: 'emeralds, '
  - type: note
    content: ch. 28:13
  - type: text
    content: 'purple, '
  - type: note
    content: ver. 7
  - type: text
    content: 'embroidered work, '
  - type: note
    content: 1 Chr. 15:27; Job 28:18
  - type: text
    content: 'fine linen, coral, and '
  - type: note
    content: Isa. 54:12
  - type: text
    content: 'ruby. '
  '17':
  - type: text
    content: 'Judah and the land of Israel traded with you; they exchanged for your merchandise '
  - type: note
    content: See 1 Kgs. 5:9, 11
  - type: text
    content: 'wheat of '
  - type: note
    content: Judg. 11:33
  - type: text
    content: Minnith, meal,
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' honey, oil, and '
  - type: note
    content: See Gen. 37:25
  - type: text
    content: 'balm. '
  '18':
  - type: note
    content: Isa. 7:8; [ver. 16]
  - type: text
    content: 'Damascus did business with you for your abundant goods, because of your great wealth of every kind; wine of Helbon and '
  - type: note
    content: Rev. 1:14
  - type: text
    content: 'wool of Sahar '
  '19':
  - type: text
    content: and casks of wine
  - type: note
    content: Probable reading; Hebrew wool of Sahar 19and Dan and Javan
  - type: text
    content: ' from Uzal they exchanged for your wares; wrought iron, '
  - type: note
    content: Ex. 30:24
  - type: text
    content: 'cassia, and '
  - type: note
    content: '[Ex. 30:23]'
  - type: text
    content: 'calamus were bartered for your merchandise. '
  '2':
  - type: text
    content: '“Now you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, '
  - type: note
    content: See ch. 19:1
  - type: text
    content: 'raise a lamentation over Tyre, '
  '20':
  - type: text
    content: 'Dedan traded with you in saddlecloths for riding. '
  '21':
  - type: text
    content: 'Arabia and all the princes of '
  - type: note
    content: Isa. 60:7
  - type: text
    content: 'Kedar were your favored dealers '
  - type: note
    content: Isa. 60:7
  - type: text
    content: 'in lambs, rams, and goats; in these they did business with you. '
  '22':
  - type: text
    content: 'The traders of '
  - type: note
    content: ch. 38:13; Gen. 10:7
  - type: text
    content: 'Sheba and '
  - type: note
    content: ch. 38:13; Gen. 10:7
  - type: text
    content: 'Raamah traded with you; they exchanged '
  - type: note
    content: ver. 12
  - type: text
    content: 'for your wares '
  - type: note
    content: Ex. 30:23
  - type: text
    content: 'the best of all kinds of spices and all precious stones and gold. '
  '23':
  - type: note
    content: 2 Kgs. 19:12
  - type: text
    content: 'Haran, Canneh, '
  - type: note
    content: 2 Kgs. 19:12
  - type: text
    content: 'Eden, traders of Sheba, '
  - type: note
    content: Gen. 10:22
  - type: text
    content: 'Asshur, and Chilmad traded with you. '
  '24':
  - type: text
    content: 'In your market these traded with you in choice garments, in clothes of '
  - type: note
    content: ver. 7
  - type: text
    content: 'blue and '
  - type: note
    content: ver. 7
  - type: text
    content: 'embroidered work, and in carpets of colored material, bound with cords and made secure. '
  '25':
  - type: note
    content: Ps. 48:7; Isa. 2:16; 23:14
  - type: text
    content: 'The ships of '
  - type: note
    content: See ver. 12
  - type: text
    content: 'Tarshish traveled for you with your merchandise. So you were filled and heavily laden '
  - type: note
    content: ver. 4
  - type: text
    content: in the heart of the seas.
  '26':
  - type: text
    content: “Your rowers have brought you out
  - type: text
    content: into the high seas.
  - type: note
    content: See Jer. 18:17
  - type: text
    content: The east wind has wrecked you
  - type: text
    content: in the heart of the seas.
  '27':
  - type: text
    content: Your riches, your wares, your merchandise,
  - type: text
    content: 'your mariners and '
  - type: note
    content: ver. 8
  - type: text
    content: your pilots,
  - type: note
    content: ver. 9
  - type: text
    content: your caulkers, your dealers in merchandise,
  - type: text
    content: and all your men of war who are in you,
  - type: text
    content: with all your crew
  - type: text
    content: that is in your midst,
  - type: text
    content: sink into the heart of the seas
  - type: note
    content: '[ch. 26:18; 32:10 ]'
  - type: text
    content: on the day of your fall.
  '28':
  - type: text
    content: At the sound of the cry of your pilots
  - type: note
    content: '[ch. 45:2; 48:15, 17 ]'
  - type: text
    content: the countryside shakes,
  '29':
  - type: text
    content: and down from their ships
  - type: note
    content: '[ Rev. 18:17, 18 ]'
  - type: text
    content: come all who handle the oar.
  - type: text
    content: The mariners and all the pilots of the sea
  - type: text
    content: stand on the land
  '3':
  - type: text
    content: 'and say to Tyre, who dwells at '
  - type: note
    content: '[Isa. 23:1]'
  - type: text
    content: 'the entrances to the sea, '
  - type: note
    content: '[Isa. 23:3]'
  - type: text
    content: 'merchant of the peoples to many coastlands, thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “O Tyre, you have said,
  - type: text
    content: '‘I am '
  - type: note
    content: ch. 28:12
  - type: text
    content: perfect in beauty.’
  '30':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: and shout aloud over you
  - type: text
    content: and cry out bitterly.
  - type: note
    content: Lam. 2:10; Rev. 18:19
  - type: text
    content: They cast dust on their heads
  - type: note
    content: See Jer. 6:26
  - type: text
    content: and wallow in ashes;
  '31':
  - type: text
    content: 'they '
  - type: note
    content: See Isa. 3:24
  - type: text
    content: make themselves bald for you
  - type: text
    content: and put sackcloth on their waist,
  - type: text
    content: and they weep over you in bitterness of soul,
  - type: text
    content: with bitter mourning.
  '32':
  - type: text
    content: 'In their wailing they '
  - type: note
    content: See ch. 19:1
  - type: text
    content: raise a lamentation for you
  - type: text
    content: 'and lament over you:'
  - type: note
    content: '[ Rev. 18:18 ]'
  - type: text
    content: ‘Who is like Tyre,
  - type: text
    content: like one destroyed in the midst of the sea?
  '33':
  - type: text
    content: When your wares came from the seas,
  - type: note
    content: '[ Rev. 18:15, 19 ]'
  - type: text
    content: you satisfied many peoples;
  - type: text
    content: with your abundant wealth and merchandise
  - type: note
    content: '[ Rev. 18:15, 19 ]'
  - type: text
    content: you enriched the kings of the earth.
  '34':
  - type: text
    content: 'Now '
  - type: note
    content: '[ch. 26:19]'
  - type: text
    content: you are wrecked by the seas,
  - type: text
    content: in the depths of the waters;
  - type: text
    content: your merchandise and all your crew in your midst
  - type: text
    content: have sunk with you.
  '35':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:15, 16
  - type: text
    content: All the inhabitants of the coastlands
  - type: text
    content: are appalled at you,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 32:10]'
  - type: text
    content: the hair of their kings bristles with horror;
  - type: text
    content: their faces are convulsed.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Rev. 18:11
  - type: text
    content: 'The merchants among the peoples '
  - type: note
    content: See Jer. 18:16
  - type: text
    content: hiss at you;
  - type: note
    content: ch. 26:21; 28:19
  - type: text
    content: you have come to a dreadful end
  - type: text
    content: and shall be no more forever.’”
  '4':
  - type: text
    content: 'Your borders are '
  - type: note
    content: ver. 25, 27
  - type: text
    content: in the heart of the seas;
  - type: text
    content: your builders made perfect your beauty.
  '5':
  - type: text
    content: They made all your planks
  - type: text
    content: 'of fir trees from '
  - type: note
    content: Deut. 3:9
  - type: text
    content: Senir;
  - type: text
    content: 'they took '
  - type: note
    content: Judg. 9:15
  - type: text
    content: a cedar from Lebanon
  - type: text
    content: to make a mast for you.
  '6':
  - type: text
    content: 'Of '
  - type: note
    content: See Isa. 2:13
  - type: text
    content: oaks of Bashan
  - type: text
    content: they made your oars;
  - type: text
    content: they made your deck of pines
  - type: text
    content: 'from '
  - type: note
    content: See Gen. 10:4
  - type: text
    content: the coasts of Cyprus,
  - type: text
    content: inlaid with ivory.
  '7':
  - type: text
    content: ' '
  - type: note
    content: See ch. 16:10
  - type: text
    content: Of fine embroidered linen from Egypt
  - type: text
    content: was your sail,
  - type: text
    content: serving as your banner;
  - type: text
    content: 'blue and purple from '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: the coasts of Elishah
  - type: text
    content: was your awning.
  '8':
  - type: text
    content: 'The inhabitants of Sidon and '
  - type: note
    content: Gen. 10:18
  - type: text
    content: Arvad
  - type: text
    content: were your rowers;
  - type: text
    content: your skilled men, O Tyre, were in you;
  - type: text
    content: 'they were '
  - type: note
    content: ver. 27, 29
  - type: text
    content: your pilots.
  '9':
  - type: text
    content: 'The elders of '
  - type: note
    content: 1 Kgs. 5:18; Ps. 83:7
  - type: text
    content: Gebal and her skilled men were in you,
  - type: note
    content: ver. 27
  - type: text
    content: caulking your seams;
  - type: text
    content: all the ships of the sea with their mariners were in you
  - type: text
    content: to barter for your wares.
