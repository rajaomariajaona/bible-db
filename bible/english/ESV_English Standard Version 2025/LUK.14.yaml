document_id: LUK.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Healing of a Man on the Sabbath
  - type: text
    content: 'One Sabbath, '
  - type: note
    content: ch. 7:36; 11:37
  - type: text
    content: 'when he went to dine at the house of a ruler of the Pharisees, they were '
  - type: note
    content: ch. 20:20; Mark 3:2
  - type: text
    content: 'watching him carefully. '
  '10':
  - type: text
    content: 'But when you are invited, go and sit in the lowest place, '
  - type: note
    content: Prov. 25:6, 7
  - type: text
    content: so that when your host comes he may say to you, ‘Friend, move up higher.’ Then you will be honored in the presence of all who sit at table with you.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: ch. 18:14; [Prov. 29:23; Ezek. 21:26; Matt. 18:4; James 4:6, 10; 1 Pet. 5:5, 6]
  - type: text
    content: everyone who exalts himself will be humbled, and he who humbles himself will be exalted.”
  - type: heading
    content: The Parable of the Great Banquet
  '12':
  - type: text
    content: 'He said also to the man who had invited him, '
  - type: text
    content: '“When you give '
  - type: note
    content: John 21:12 (Gk.)
  - type: text
    content: a dinner or a banquet, do not invite your friends or your brothers
  - type: note
    content: Or your brothers and sisters
  - type: text
    content: ' '
  - type: text
    content: 'or your relatives or rich neighbors, '
  - type: note
    content: '[ch. 6:34]'
  - type: text
    content: lest they also invite you in return and you be repaid.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But when you give a feast, '
  - type: note
    content: '[Neh. 8:10, 12; Esth. 9:22]'
  - type: text
    content: 'invite '
  - type: note
    content: ver. 21
  - type: text
    content: the poor, the crippled, the lame, the blind,
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'and you will be blessed, because they cannot repay you. For you will be repaid '
  - type: note
    content: 1 Cor. 15:23; 1 Thess. 4:16; [John 11:24; Rev. 20:4, 5]
  - type: text
    content: 'at '
  - type: note
    content: Acts 24:15
  - type: text
    content: the resurrection of the just.”
  '15':
  - type: text
    content: 'When one of those who reclined at table with him heard these things, he said to him, '
  - type: note
    content: Rev. 19:9
  - type: text
    content: '“Blessed is everyone who will '
  - type: note
    content: '[ch. 13:29; 22:16, 30]'
  - type: text
    content: 'eat bread in the kingdom of God!” '
  '16':
  - type: text
    content: 'But he said to him, '
  - type: note
    content: For ver. 16-24, [Matt. 22:2-14]
  - type: text
    content: '“A man once '
  - type: note
    content: '[Isa. 25:6]'
  - type: text
    content: gave a great banquet and invited many.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And at the time for the banquet he '
  - type: note
    content: '[Esth. 6:14; Prov. 9:3, 5]'
  - type: text
    content: sent his servant
  - type: note
    content: Or bondservant; also verses 21 (twice), 22, 23
  - type: text
    content: ' '
  - type: text
    content: to say to those who had been invited, ‘Come, for everything is now ready.’
  - type: text
    content: ' '
  '18':
  - type: text
    content: But they all alike began to make excuses. The first said to him, ‘I have bought a field, and I must go out and see it. Please have me excused.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: And another said, ‘I have bought five yoke of oxen, and I go to examine them. Please have me excused.’
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And behold, there was a man before him who had dropsy. '
  '20':
  - type: text
    content: 'And another said, '
  - type: note
    content: Deut. 24:5
  - type: text
    content: ‘I have married a wife, and therefore I cannot come.’
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'So the servant came and reported these things to his master. Then the master of the house became angry and said to his servant, ‘Go out quickly to the streets and lanes of the city, and bring in '
  - type: note
    content: ver. 13
  - type: text
    content: the poor and crippled and blind and lame.’
  - type: text
    content: ' '
  '22':
  - type: text
    content: And the servant said, ‘Sir, what you commanded has been done, and still there is room.’
  - type: text
    content: ' '
  '23':
  - type: text
    content: And the master said to the servant, ‘Go out to the highways and hedges and compel people to come in, that my house may be filled.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For I tell you,
  - type: note
    content: The Greek word for you here is plural
  - type: text
    content: ' '
  - type: note
    content: Matt. 21:43; Acts 13:46
  - type: text
    content: none of those men who were invited shall taste my banquet.’”
  - type: heading
    content: The Cost of Discipleship
  '25':
  - type: text
    content: 'Now great crowds accompanied him, and he turned and said to them, '
  '26':
  - type: note
    content: ver. 33; Matt. 10:37; [Deut. 33:9]
  - type: text
    content: '“If anyone comes to me and '
  - type: note
    content: ch. 16:13
  - type: text
    content: 'does not hate his own father and mother and wife and children and brothers and sisters, '
  - type: note
    content: John 12:25; Acts 20:24; Rev. 12:11
  - type: text
    content: yes, and even his own life, he cannot be my disciple.
  - type: text
    content: ' '
  '27':
  - type: note
    content: ch. 9:23; Matt. 10:38; 16:24; Mark 8:34
  - type: text
    content: 'Whoever does not '
  - type: note
    content: John 19:17
  - type: text
    content: bear his own cross and come after me cannot be my disciple.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'For which of you, desiring to build a tower, does not '
  - type: note
    content: '[Prov. 24:27]'
  - type: text
    content: first sit down and count the cost, whether he has enough to complete it?
  - type: text
    content: ' '
  '29':
  - type: text
    content: Otherwise, when he has laid a foundation and is not able to finish, all who see it begin to mock him,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Jesus responded to '
  - type: note
    content: See ch. 7:30
  - type: text
    content: 'the lawyers and Pharisees, saying, '
  - type: note
    content: ch. 13:14; Matt. 12:10
  - type: text
    content: “Is it lawful to heal on the Sabbath, or not?”
  - type: text
    content: ' '
  '30':
  - type: text
    content: saying, ‘This man began to build and was not able to finish.’
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Or what king, going out to encounter another king in war, will not '
  - type: note
    content: ver. 28
  - type: text
    content: sit down first and deliberate whether he is able with ten thousand to meet him who comes against him with twenty thousand?
  - type: text
    content: ' '
  '32':
  - type: text
    content: And if not, while the other is yet a great way off, he sends a delegation and asks for terms of peace.
  - type: text
    content: ' '
  '33':
  - type: note
    content: '[Phil. 3:7]'
  - type: text
    content: 'So therefore, any one of you who '
  - type: note
    content: '[ver. 26; ch. 18:28]'
  - type: text
    content: does not renounce all that he has cannot be my disciple.
  - type: heading
    content: Salt Without Taste Is Worthless
  '34':
  - type: text
    content: ' '
  - type: note
    content: Mark 9:50
  - type: text
    content: '“Salt is good, '
  - type: note
    content: Matt. 5:13
  - type: text
    content: but if salt has lost its taste, how shall its saltiness be restored?
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'It is of no use either for the soil or for the manure pile. It is thrown away. '
  - type: note
    content: See Matt. 11:15
  - type: text
    content: He who has ears to hear, let him hear.”
  '4':
  - type: text
    content: 'But they remained silent. Then he took him and healed him and sent him away. '
  '5':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: ch. 13:15; [Deut. 22:4; Matt. 12:11]
  - type: text
    content: “Which of you, having a son
  - type: note
    content: Some manuscripts a donkey
  - type: text
    content: ' '
  - type: text
    content: or an ox that has fallen into a well on a Sabbath day, will not immediately pull him out?”
  - type: text
    content: ' '
  '6':
  - type: note
    content: '[Matt. 22:46]'
  - type: text
    content: And they could not reply to these things.
  - type: heading
    content: The Parable of the Wedding Feast
  '7':
  - type: text
    content: 'Now he told a parable to those who were invited, when he noticed '
  - type: note
    content: See ch. 11:43
  - type: text
    content: 'how they chose the places of honor, saying to them, '
  '8':
  - type: text
    content: “When you are invited by someone to a wedding feast, do not sit down in a place of honor, lest someone more distinguished than you be invited by him,
  - type: text
    content: ' '
  '9':
  - type: text
    content: and he who invited you both will come and say to you, ‘Give your place to this person,’ and then you will begin with shame to take the lowest place.
  - type: text
    content: ' '
