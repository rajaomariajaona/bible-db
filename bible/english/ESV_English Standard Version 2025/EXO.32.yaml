document_id: EXO.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Golden Calf
  - type: text
    content: 'When the people saw that Moses '
  - type: note
    content: ch. 24:18; Deut. 9:9
  - type: text
    content: 'delayed to come down from the mountain, the people gathered themselves together to Aaron and said to him, '
  - type: note
    content: ver. 23; Cited Acts 7:40
  - type: text
    content: '“Up, make us gods who shall '
  - type: note
    content: ch. 13:21
  - type: text
    content: 'go before us. As for this Moses, the man who brought us up out of the land of Egypt, we do not know what has become of him.” '
  '10':
  - type: text
    content: 'Now therefore '
  - type: note
    content: Deut. 9:14
  - type: text
    content: 'let me alone, that '
  - type: note
    content: ch. 22:24
  - type: text
    content: 'my wrath may burn hot against them and '
  - type: note
    content: ch. 33:3
  - type: text
    content: 'I may consume them, in order that '
  - type: note
    content: Num. 14:12
  - type: text
    content: I may make a great nation of you.”
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Deut. 9:18, 26-29; Ps. 106:23; [Ps. 74:1, 2]
  - type: text
    content: 'Moses implored the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', why does your wrath burn hot against your people, whom you have brought out of the land of Egypt with great power and with a mighty hand? '
  '12':
  - type: note
    content: '[Deut. 32:27]; See Num. 14:13-16'
  - type: text
    content: 'Why should the Egyptians say, ‘With evil intent did he bring them out, to kill them in the mountains and to consume them from the face of the earth’? Turn from your burning anger and '
  - type: note
    content: See ver. 14
  - type: text
    content: 'relent from this disaster against your people. '
  '13':
  - type: text
    content: 'Remember Abraham, Isaac, and Israel, your servants, to whom you '
  - type: note
    content: Gen. 22:16; Heb. 6:13
  - type: text
    content: 'swore by your own self, and said to them, '
  - type: note
    content: Gen. 12:7; 13:15; 15:7, 18; 26:4; 28:13; 35:11, 12; 48:16
  - type: text
    content: '‘I will multiply your offspring as the stars of heaven, and all this land that I have promised I will give to your offspring, and they shall inherit it forever.’” '
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 106:45; [1 Chr. 21:15; Jer. 18:8; 26:13, 15, 19; Amos 7:3, 6; Jonah 3:10; 4:2]
  - type: text
    content: relented from the disaster that he had spoken of bringing on his people.
  '15':
  - type: text
    content: 'Then '
  - type: note
    content: Deut. 9:15
  - type: text
    content: 'Moses turned and went down from the mountain with the '
  - type: note
    content: ch. 34:29
  - type: text
    content: 'two tablets of the testimony in his hand, tablets that were written on both sides; on the front and on the back they were written. '
  '16':
  - type: note
    content: ch. 31:18
  - type: text
    content: 'The tablets were the work of God, and the writing was the writing of God, engraved on the tablets. '
  '17':
  - type: text
    content: 'When '
  - type: note
    content: ch. 17:9, 10; 24:13; 33:11
  - type: text
    content: 'Joshua heard the noise of the people as they shouted, he said to Moses, “There is a noise of war in the camp.” '
  '18':
  - type: text
    content: 'But he said, “It is not the sound of '
  - type: note
    content: Jer. 51:14
  - type: text
    content: 'shouting for victory, or the sound of the cry of defeat, but the sound of singing that I hear.” '
  '19':
  - type: text
    content: 'And as soon as he came near the camp and '
  - type: note
    content: Deut. 9:16, 17, 21
  - type: text
    content: 'saw the calf and the dancing, Moses’ anger burned hot, and he threw the tablets out of his hands and broke them at the foot of the mountain. '
  '2':
  - type: text
    content: 'So Aaron said to them, “Take off the '
  - type: note
    content: '[ch. 12:35, 36]; See Judg. 8:24-27'
  - type: text
    content: 'rings of gold that are in the ears of your wives, your sons, and your daughters, and bring them to me.” '
  '20':
  - type: text
    content: He took the calf that they had made and burned it with fire and ground it to powder and scattered it on the water and made the people of Israel drink it.
  '21':
  - type: text
    content: 'And Moses said to Aaron, '
  - type: note
    content: '[Gen. 20:9]'
  - type: text
    content: '“What did this people do to you that you have brought such a great sin upon them?” '
  '22':
  - type: text
    content: 'And Aaron said, “Let not the anger of my lord burn hot. '
  - type: note
    content: '[ch. 14:11; 15:24; 16:2, 20; 17:2, 4; 1 Sam. 15:24]'
  - type: text
    content: 'You know the people, that they are set on evil. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: ver. 1
  - type: text
    content: 'they said to me, ‘Make us gods who shall go before us. As for this Moses, the man who brought us up out of the land of Egypt, we do not know what has become of him.’ '
  '24':
  - type: text
    content: 'So '
  - type: note
    content: ver. 2-4
  - type: text
    content: I said to them, ‘Let any who have gold take it off.’ So they gave it to me, and I threw it into the fire, and out came this calf.”
  '25':
  - type: text
    content: 'And when Moses saw that the people had broken loose (for Aaron had let them break loose, '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'to the derision of their enemies), '
  '26':
  - type: text
    content: 'then Moses stood in the gate of the camp and said, “Who is on the '
  - type: text
    content: Lord
  - type: text
    content: '’s side? Come to me.” And all the sons of Levi gathered around him. '
  '27':
  - type: text
    content: 'And he said to them, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel, ‘Put your sword on your side each of you, and go to and fro from gate to gate throughout the camp, and each of you '
  - type: note
    content: '[Num. 25:5; Deut. 33:9]'
  - type: text
    content: 'kill his brother and his companion and his neighbor.’” '
  '28':
  - type: text
    content: 'And the sons of Levi did according to the word of Moses. And that day about three thousand men of the people fell. '
  '29':
  - type: text
    content: 'And Moses said, “Today you have been '
  - type: note
    content: '[Zech. 13:3; Matt. 10:37; Luke 14:26]; See Num. 25:11-13; Deut. 13:6-10'
  - type: text
    content: 'ordained for the service of the '
  - type: text
    content: Lord
  - type: text
    content: ', each one at the cost of his son and of his brother, so that he might bestow a blessing upon you this day.”'
  '3':
  - type: text
    content: 'So all the people took off the rings of gold that were in their ears and brought them to Aaron. '
  '30':
  - type: text
    content: 'The next day Moses said to the people, '
  - type: note
    content: See ver. 21; [1 Sam. 12:20]
  - type: text
    content: '“You have sinned a great sin. And now I will go up to the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: 2 Sam. 16:12; Amos 5:15
  - type: text
    content: 'perhaps I can make atonement for your sin.” '
  '31':
  - type: text
    content: 'So Moses returned to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “Alas, '
  - type: note
    content: '[See ver. 30 above]'
  - type: text
    content: 'this people has sinned a great sin. They have '
  - type: note
    content: ch. 20:23
  - type: text
    content: 'made for themselves gods of gold. '
  '32':
  - type: text
    content: 'But now, if '
  - type: note
    content: '[Num. 14:19]'
  - type: text
    content: 'you will forgive their sin—but if not, please '
  - type: note
    content: '[Rom. 9:3]'
  - type: text
    content: 'blot me out of '
  - type: note
    content: Ps. 56:8; 69:28; 139:16; Dan. 12:1; Phil. 4:3
  - type: text
    content: 'your book that you have written.” '
  '33':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Ezek. 18:4, 20
  - type: text
    content: '“Whoever has sinned against me, I will blot out of my book. '
  '34':
  - type: note
    content: ch. 33:12
  - type: text
    content: 'But now go, lead the people to the place about which I have spoken to you; '
  - type: note
    content: See ch. 14:19
  - type: text
    content: behold, my angel shall go before you. Nevertheless, in the day when I visit, I will visit their sin upon them.”
  '35':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a plague on the people, because they made the calf, the one that Aaron made.'
  '4':
  - type: note
    content: Deut. 9:16; Neh. 9:18; Ps. 106:19; Acts 7:41; [Judg. 17:3, 4]
  - type: text
    content: And he received the gold from their hand and fashioned it with a graving tool and made a golden
  - type: note
    content: Hebrew cast metal; also verse 8
  - type: text
    content: ' calf. And they said, '
  - type: note
    content: 1 Kgs. 12:28
  - type: text
    content: '“These are your gods, O Israel, who brought you up out of the land of Egypt!” '
  '5':
  - type: text
    content: 'When Aaron saw this, he built an altar before it. And Aaron '
  - type: note
    content: '[2 Kgs. 10:20]'
  - type: text
    content: 'made a proclamation and said, “Tomorrow shall be a feast to the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '6':
  - type: text
    content: 'And they rose up early the next day and offered burnt offerings and brought peace offerings. And '
  - type: note
    content: Cited 1 Cor. 10:7
  - type: text
    content: 'the people sat down to eat and drink and rose up '
  - type: note
    content: Gen. 26:8; [Judg. 21:21]
  - type: text
    content: to play.
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Deut. 9:12
  - type: text
    content: '“Go down, for your people, whom you brought up out of the land of Egypt, have '
  - type: note
    content: Judg. 2:19; [Hos. 9:9]
  - type: text
    content: 'corrupted themselves. '
  '8':
  - type: text
    content: 'They have turned aside quickly out of the way that '
  - type: note
    content: ch. 20:3, 4, 23; Deut. 9:16
  - type: text
    content: 'I commanded them. They have made for themselves a golden calf and have worshiped it and sacrificed to it and said, ‘These are your gods, O Israel, who brought you up out of the land of Egypt!’” '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “I have seen this people, and behold, '
  - type: note
    content: ch. 33:3, 5; 34:9; Deut. 9:6, 13; 31:27; 2 Chr. 30:8; Acts 7:51; [Isa. 48:4]
  - type: text
    content: 'it is a stiff-necked people. '
