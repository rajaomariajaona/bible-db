document_id: 1CH.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Divisions of the Gatekeepers
  - type: text
    content: 'As for the divisions of the gatekeepers: of the Korahites, Meshelemiah the son of Kore, of the sons of Asaph. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ch. 16:38
  - type: text
    content: 'Hosah, of the sons of Merari, had sons: Shimri the chief (for though he was not the firstborn, his father made him chief), '
  '11':
  - type: text
    content: 'Hilkiah the second, Tebaliah the third, Zechariah the fourth: all the sons and brothers of Hosah were thirteen.'
  '12':
  - type: text
    content: 'These divisions of the gatekeepers, corresponding to their chief men, had duties, just as their brothers did, ministering in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And they cast lots by fathers’ houses, '
  - type: note
    content: ch. 25:8
  - type: text
    content: 'small and great alike, for their gates. '
  '14':
  - type: text
    content: 'The lot for the east fell to Shelemiah. They cast lots also for his son Zechariah, a shrewd counselor, and his lot came out for the north. '
  '15':
  - type: text
    content: 'Obed-edom’s came out for the south, and to his sons was allotted '
  - type: note
    content: Neh. 12:25; [2 Chr. 25:24]
  - type: text
    content: 'the gatehouse. '
  '16':
  - type: text
    content: 'For Shuppim and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'Hosah it came out for the west, at the gate of Shallecheth on the road that goes up. Watch corresponded to watch. '
  '17':
  - type: text
    content: On the east there were six each day,
  - type: note
    content: Septuagint; Hebrew six Levites
  - type: text
    content: ' on the north four each day, on the south four each day, as well as two and two at the gatehouse. '
  '18':
  - type: text
    content: 'And for the '
  - type: note
    content: 2 Kgs. 23:11
  - type: text
    content: colonnade
  - type: note
    content: Or court; Hebrew parbar (meaning uncertain); twice in this verse
  - type: text
    content: ' on the west there were four at the road and two at the colonnade. '
  '19':
  - type: text
    content: These were the divisions of the gatekeepers among the Korahites and the sons of Merari.
  - type: heading
    content: Treasurers and Other Officials
  '2':
  - type: text
    content: 'And Meshelemiah had sons: '
  - type: note
    content: ch. 9:21
  - type: text
    content: 'Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  '20':
  - type: text
    content: 'And of the Levites, Ahijah had charge of '
  - type: note
    content: ver. 22, 24, 26; ch. 28:12; Ezra 2:69; Neh. 10:38
  - type: text
    content: 'the treasuries of the house of God and the treasuries of the dedicated gifts. '
  '21':
  - type: text
    content: 'The sons of Ladan, the sons of the Gershonites belonging to Ladan, the heads of the fathers’ houses belonging to Ladan the Gershonite: '
  - type: note
    content: '[ch. 29:8]'
  - type: text
    content: Jehieli.
  - type: note
    content: The Hebrew of verse 21 is uncertain
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 23:8 ]'
  - type: text
    content: 'The sons of Jehieli, Zetham, and Joel his brother, were in charge of the treasuries of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: note
    content: ch. 23:12
  - type: text
    content: 'Of the Amramites, the Izharites, the Hebronites, and the Uzzielites— '
  '24':
  - type: text
    content: 'and '
  - type: note
    content: ch. 23:16; [ch. 24:20]
  - type: text
    content: 'Shebuel the son of Gershom, son of Moses, was chief officer in charge of the treasuries. '
  '25':
  - type: text
    content: 'His brothers: from '
  - type: note
    content: '[ch. 23:17]'
  - type: text
    content: 'Eliezer were his son Rehabiah, and his son '
  - type: note
    content: '[ch. 24:21]'
  - type: text
    content: 'Jeshaiah, and his son Joram, and his son Zichri, and his son '
  - type: note
    content: '[ch. 23:18]'
  - type: text
    content: 'Shelomoth. '
  '26':
  - type: text
    content: 'This Shelomoth and his brothers were in charge of all the treasuries of the dedicated gifts that David the king and the heads of the fathers’ houses and the officers of the thousands and the hundreds and the commanders of the army '
  - type: note
    content: 2 Sam. 8:11
  - type: text
    content: 'had dedicated. '
  '27':
  - type: text
    content: 'From spoil won in battles they dedicated gifts for the maintenance of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Also all that '
  - type: note
    content: ch. 29:29; See 1 Sam. 9:9
  - type: text
    content: 'Samuel the seer and Saul the son of Kish and Abner the son of Ner and Joab the son of Zeruiah had dedicated—all dedicated gifts were in the care of '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: Shelomoth
  - type: note
    content: Hebrew Shelomith
  - type: text
    content: ' and his brothers.'
  '29':
  - type: text
    content: 'Of the Izharites, Chenaniah and his sons were appointed to '
  - type: note
    content: Neh. 11:16
  - type: text
    content: 'external duties for Israel, '
  - type: note
    content: ch. 23:4; See Deut. 16:18
  - type: text
    content: 'as officers and judges. '
  '3':
  - type: text
    content: 'Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh. '
  '30':
  - type: text
    content: 'Of the Hebronites, '
  - type: note
    content: ch. 27:17
  - type: text
    content: 'Hashabiah and his brothers, 1,700 men of ability, had the oversight of Israel westward of the Jordan for all the work of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the service of the king. '
  '31':
  - type: text
    content: 'Of the Hebronites, '
  - type: note
    content: ch. 24:23; [ch. 23:19]
  - type: text
    content: 'Jerijah was chief of the Hebronites of whatever genealogy or fathers’ houses. (In the fortieth year of David’s reign search was made and men of great ability among them were found at '
  - type: note
    content: ch. 6:81; Num. 21:32; Josh. 21:39
  - type: text
    content: 'Jazer in Gilead.) '
  '32':
  - type: text
    content: 'King David appointed him and his brothers, 2,700 men of ability, heads of fathers’ houses, to have the oversight of the Reubenites, the Gadites and the half-tribe of the Manassites for everything pertaining to God and for '
  - type: note
    content: 2 Chr. 19:11
  - type: text
    content: the affairs of the king.
  '4':
  - type: text
    content: 'And '
  - type: note
    content: ch. 15:18, 24; 16:38
  - type: text
    content: 'Obed-edom had sons: Shemaiah the firstborn, Jehozabad the second, Joah the third, Sachar the fourth, Nethanel the fifth, '
  '5':
  - type: text
    content: 'Ammiel the sixth, Issachar the seventh, Peullethai the eighth, '
  - type: note
    content: ch. 13:14; 2 Sam. 6:11
  - type: text
    content: 'for God blessed him. '
  '6':
  - type: text
    content: 'Also to his son Shemaiah were sons born who were rulers in their fathers’ houses, for they were men of great ability. '
  '7':
  - type: text
    content: 'The sons of Shemaiah: Othni, Rephael, Obed and Elzabad, whose brothers were able men, Elihu and Semachiah. '
  '8':
  - type: text
    content: 'All these were of the sons of Obed-edom with their sons and brothers, able men qualified for the service; sixty-two of Obed-edom. '
  '9':
  - type: text
    content: 'And Meshelemiah had sons and brothers, able men, eighteen. '
