document_id: 1SA.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David at the Cave of Adullam
  - type: text
    content: 'David departed from there and escaped to '
  - type: note
    content: See Ps. 57; 142
  - type: text
    content: 'the cave of '
  - type: note
    content: 2 Sam. 23:13; 1 Chr. 11:15
  - type: text
    content: 'Adullam. And when his brothers and all his father’s house heard it, they went down there to him. '
  '10':
  - type: note
    content: ch. 23:2, 4; 30:8; 2 Sam. 5:19, 23; [Num. 27:21]
  - type: text
    content: 'and he inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ' for him and '
  - type: note
    content: ch. 21:6, 9
  - type: text
    content: gave him provisions and gave him the sword of Goliath the Philistine.”
  '11':
  - type: text
    content: 'Then the king sent to summon Ahimelech the priest, the son of Ahitub, and all his father’s house, the priests who were at Nob, and all of them came to the king. '
  '12':
  - type: text
    content: 'And Saul said, “Hear now, son of Ahitub.” And he answered, “Here I am, my lord.” '
  '13':
  - type: text
    content: 'And Saul said to him, “Why have you conspired against me, you and the son of Jesse, in that you have given him bread and a sword and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'have inquired of God for him, so that he has risen against me, '
  - type: note
    content: ver. 8
  - type: text
    content: 'to lie in wait, as at this day?” '
  '14':
  - type: text
    content: Then Ahimelech answered the king, “And who among all your servants is so faithful as David, who is the king’s son-in-law, and captain over
  - type: note
    content: Septuagint, Targum; Hebrew and has turned aside to
  - type: text
    content: ' your bodyguard, and honored in your house? '
  '15':
  - type: text
    content: 'Is today the first time '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'that I have inquired of God for him? No! Let not the king impute anything to his servant or to all the house of my father, for your servant has known nothing of all this, '
  - type: note
    content: ch. 25:36
  - type: text
    content: 'much or little.” '
  '16':
  - type: text
    content: 'And the king said, “You shall surely die, Ahimelech, you and all your father’s house.” '
  '17':
  - type: text
    content: 'And the king said to '
  - type: note
    content: '[2 Kgs. 10:25; 11:4, 6; 2 Chr. 12:10]'
  - type: text
    content: 'the guard who stood about him, “Turn and kill the priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', because their hand also is with David, and they knew that he fled and did not disclose it to me.” But the servants of the king would not put out their hand to strike the priests of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Then the king said to Doeg, “You turn and strike the priests.” And Doeg the Edomite turned and struck down the priests, '
  - type: note
    content: '[ch. 2:31]'
  - type: text
    content: 'and he killed on that day eighty-five persons who wore the linen ephod. '
  '19':
  - type: text
    content: 'And Nob, the city of the priests, he put to the sword; '
  - type: note
    content: '[ch. 15:3]'
  - type: text
    content: both man and woman, child and infant, ox, donkey and sheep, he put to the sword.
  '2':
  - type: note
    content: '[Judg. 9:4; 11:3]'
  - type: text
    content: And everyone who was in distress, and everyone who was in debt, and everyone who was bitter in soul,
  - type: note
    content: Or discontented
  - type: text
    content: ' gathered to him. And he became commander over them. And there were with him '
  - type: note
    content: '[ch. 23:13; 25:13]'
  - type: text
    content: about four hundred men.
  '20':
  - type: text
    content: 'But one of the sons of Ahimelech the son of Ahitub, named '
  - type: note
    content: ch. 23:6, 9
  - type: text
    content: 'Abiathar, escaped and fled after David. '
  '21':
  - type: text
    content: 'And Abiathar told David that Saul had killed the priests of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And David said to Abiathar, “I knew on that day, '
  - type: note
    content: ch. 21:7
  - type: text
    content: 'when Doeg the Edomite was there, that he would surely tell Saul. I have occasioned the death of all the persons of your father’s house. '
  '23':
  - type: note
    content: '[1 Kgs. 2:26]'
  - type: text
    content: Stay with me; do not be afraid, for he who seeks my life seeks your life. With me you shall be in safekeeping.”
  '3':
  - type: text
    content: And David went from there to Mizpeh of Moab. And he said to the king of Moab, “Please let my father and my mother stay
  - type: note
    content: Syriac, Vulgate; Hebrew go out
  - type: text
    content: ' with you, till I know what God will do for me.” '
  '4':
  - type: text
    content: 'And he left them with the king of Moab, and they stayed with him all the time that David was in the stronghold. '
  '5':
  - type: text
    content: 'Then the prophet '
  - type: note
    content: 2 Sam. 24:11, 18, 19; 1 Chr. 21:9, 11, 13, 18, 19; 29:29; 2 Chr. 29:25
  - type: text
    content: Gad said to David, “Do not remain in the stronghold; depart, and go into the land of Judah.” So David departed and went into the forest of Hereth.
  - type: heading
    content: Saul Kills the Priests at Nob
  '6':
  - type: text
    content: 'Now Saul heard that David was discovered, and the men who were with him. Saul was sitting at Gibeah under '
  - type: note
    content: '[ch. 31:13; Gen. 21:33]'
  - type: text
    content: 'the tamarisk tree on the height with his spear in his hand, and all his servants were standing about him. '
  '7':
  - type: text
    content: 'And Saul said to his servants who stood about him, “Hear now, people of Benjamin; will the son of Jesse '
  - type: note
    content: '[ch. 8:14]'
  - type: text
    content: 'give every one of you fields and vineyards, will he make you all commanders of thousands and commanders of hundreds, '
  '8':
  - type: text
    content: 'that all of you have conspired against me? No one discloses to me '
  - type: note
    content: ch. 18:3
  - type: text
    content: 'when my son makes a covenant with the son of Jesse. None of you '
  - type: note
    content: '[ch. 23:21]'
  - type: text
    content: 'is sorry for me or discloses to me that my son has stirred up my servant against me, '
  - type: note
    content: ver. 13
  - type: text
    content: 'to lie in wait, as at this day.” '
  '9':
  - type: text
    content: 'Then answered '
  - type: note
    content: ch. 21:7; See Ps. 52
  - type: text
    content: 'Doeg the Edomite, who stood by the servants of Saul, “I saw the son of Jesse '
  - type: note
    content: ch. 21:1
  - type: text
    content: 'coming to Nob, to '
  - type: note
    content: '[ch. 14:3]'
  - type: text
    content: 'Ahimelech the son of Ahitub, '
