document_id: EZK.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel Is Israel’s Watchman
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, say to the house of Israel, Thus have you said: ‘Surely our transgressions and our sins are upon us, and '
  - type: note
    content: See ch. 4:17
  - type: text
    content: 'we rot away because of them. '
  - type: note
    content: '[ch. 37:11; Isa. 49:14]'
  - type: text
    content: 'How then can we live?’ '
  '11':
  - type: text
    content: 'Say to them, '
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: See ch. 18:23
  - type: text
    content: 'I have no pleasure in the death of the wicked, but that the wicked turn from his way and live; '
  - type: note
    content: ch. 18:31
  - type: text
    content: 'turn back, turn back from your evil ways, '
  - type: note
    content: ch. 18:31
  - type: text
    content: for why will you die, O house of Israel?
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '“And you, son of man, say to '
  - type: note
    content: See ver. 2
  - type: text
    content: 'your people, '
  - type: note
    content: '[ver. 18]; See ch. 18:24'
  - type: text
    content: 'The righteousness of the righteous shall not deliver him when he transgresses, '
  - type: note
    content: '[2 Chr. 7:14]'
  - type: text
    content: 'and as for the wickedness of the wicked, he shall not fall by it when he turns from his wickedness, '
  - type: note
    content: '[ver. 18]; See ch. 18:24'
  - type: text
    content: and the righteous shall not be able to live by his righteousness
  - type: note
    content: Hebrew by it
  - type: text
    content: ' when he sins. '
  '13':
  - type: text
    content: 'Though I say to the righteous that he shall surely live, yet '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'if he trusts in his righteousness and does injustice, none of his righteous deeds shall be remembered, but in his injustice that he has done he shall die. '
  '14':
  - type: text
    content: 'Again, '
  - type: note
    content: ch. 3:18
  - type: text
    content: 'though I say to the wicked, '
  - type: note
    content: '[Gen. 2:17]'
  - type: text
    content: '‘You shall surely die,’ yet '
  - type: note
    content: See ch. 18:27
  - type: text
    content: 'if he turns from his sin and does what is just and right, '
  '15':
  - type: text
    content: 'if the wicked '
  - type: note
    content: ch. 18:7
  - type: text
    content: 'restores the pledge, '
  - type: note
    content: Lev. 6:2, 4, 5; [Luke 19:8]
  - type: text
    content: 'gives back what he has taken by robbery, and walks '
  - type: note
    content: See ch. 20:11
  - type: text
    content: 'in the statutes of life, not doing injustice, he shall surely live; he shall not die. '
  '16':
  - type: note
    content: ch. 18:22
  - type: text
    content: None of the sins that he has committed shall be remembered against him. He has done what is just and right; he shall surely live.
  '17':
  - type: text
    content: '“Yet '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'your people say, '
  - type: note
    content: ch. 18:25, 29
  - type: text
    content: '‘The way of the Lord is not just,’ when it is their own way that is not just. '
  '18':
  - type: note
    content: '[ver. 12, 13; See ch. 18:26]'
  - type: text
    content: 'When the righteous turns from his righteousness and does injustice, he shall die for it. '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: ch. 18:27; [ver. 11, 12]
  - type: text
    content: 'when the wicked turns from his wickedness and does what is just and right, he shall live by this. '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, speak to '
  - type: note
    content: ver. 12, 17, 30; ch. 3:11; 37:18
  - type: text
    content: 'your people and say to them, If '
  - type: note
    content: See ch. 14:17
  - type: text
    content: 'I bring the sword upon a land, and the people of the land take a man from among them, and make him their '
  - type: note
    content: '[Mic. 7:4]'
  - type: text
    content: 'watchman, '
  '20':
  - type: text
    content: 'Yet you say, ‘The way of the Lord is not just.’ O house of Israel, '
  - type: note
    content: See ch. 18:30
  - type: text
    content: I will judge each of you according to his ways.”
  - type: heading
    content: Jerusalem Struck Down
  '21':
  - type: text
    content: 'In the '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'twelfth year '
  - type: note
    content: ch. 40:1; See ch. 1:2
  - type: text
    content: 'of our exile, in the tenth month, on the fifth day of the month, '
  - type: note
    content: ch. 24:26
  - type: text
    content: 'a fugitive from Jerusalem came to me and said, '
  - type: note
    content: ch. 40:1; [ch. 26:2]; See 2 Kgs. 25:2-11
  - type: text
    content: '“The city has been struck down.” '
  '22':
  - type: note
    content: ch. 24:26, 27
  - type: text
    content: 'Now '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' had been upon me the evening before the fugitive came; and he had opened my mouth by the time the man came to me in the morning, so my mouth was opened, and I was no longer mute.'
  '23':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '24':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, the inhabitants of these '
  - type: note
    content: '[ch. 36:4]'
  - type: text
    content: 'waste places in the land of Israel keep saying, '
  - type: note
    content: Isa. 51:2; [Acts 7:5]
  - type: text
    content: '‘Abraham was only one man, yet he got possession of the land; but '
  - type: note
    content: '[Matt. 3:9; Luke 3:8]'
  - type: text
    content: 'we are many; the land is surely given us to possess.’ '
  '25':
  - type: text
    content: 'Therefore say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[Gen. 9:4; Lev. 3:17]'
  - type: text
    content: 'You eat flesh with the blood and '
  - type: note
    content: ch. 18:6
  - type: text
    content: 'lift up your eyes to your idols and '
  - type: note
    content: See ch. 22:3
  - type: text
    content: 'shed blood; shall you then possess the land? '
  '26':
  - type: note
    content: '[Gen. 27:40]'
  - type: text
    content: 'You rely on the sword, '
  - type: note
    content: ch. 22:11
  - type: text
    content: 'you commit abominations, and '
  - type: note
    content: ch. 22:11
  - type: text
    content: 'each of you defiles his neighbor’s wife; shall you then possess the land? '
  '27':
  - type: text
    content: 'Say this to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'As I live, surely those who are in '
  - type: note
    content: '[ch. 36:4]'
  - type: text
    content: 'the waste places shall fall by '
  - type: note
    content: '[ch. 14:21]'
  - type: text
    content: 'the sword, and whoever is in the open field I will give to '
  - type: note
    content: '[ch. 14:21]'
  - type: text
    content: 'the beasts to be devoured, and those who are in '
  - type: note
    content: '[1 Sam. 23:29]'
  - type: text
    content: 'strongholds and in caves shall die by '
  - type: note
    content: '[ch. 14:21]'
  - type: text
    content: 'pestilence. '
  '28':
  - type: note
    content: '[ch. 35:3, 9; Jer. 44:2, 6, 22]'
  - type: text
    content: 'And I will make the land a desolation and a waste, and '
  - type: note
    content: '[ch. 7:24; 30:6]'
  - type: text
    content: 'her proud might shall come to an end, and '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'the mountains of Israel shall be so desolate that none will pass through. '
  '29':
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I have made the land a desolation and a waste because of all their abominations that they have committed.'
  '3':
  - type: text
    content: 'and if he sees the sword coming upon the land and '
  - type: note
    content: '[Amos 3:6]'
  - type: text
    content: 'blows the trumpet and warns the people, '
  '30':
  - type: text
    content: '“As for you, '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'son of man, '
  - type: note
    content: See ver. 2
  - type: text
    content: 'your people who talk together about you by the walls and at the doors of the houses say to one another, each to his brother, ‘Come, and hear what the word is that comes from the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '31':
  - type: note
    content: See ch. 8:1
  - type: text
    content: 'And they come to you as people come, and they sit before you as my people, and they hear what you say but they will not do it; for '
  - type: note
    content: Ps. 78:36, 37; Isa. 29:13; Jer. 12:2; 1 John 3:18
  - type: text
    content: 'with lustful talk in their mouths they act; their heart is set on their gain. '
  '32':
  - type: text
    content: 'And behold, you are to them like one who sings lustful songs with a beautiful voice and '
  - type: note
    content: '[1 Sam. 16:17]'
  - type: text
    content: plays
  - type: note
    content: Hebrew like the singing of lustful songs with a beautiful voice and one who plays
  - type: text
    content: ' well on an instrument, for '
  - type: note
    content: '[Matt. 7:26; Luke 6:49]'
  - type: text
    content: 'they hear what you say, but they will not do it. '
  '33':
  - type: note
    content: '[ver. 29]'
  - type: text
    content: When this comes—and come it will!—
  - type: note
    content: ch. 2:5
  - type: text
    content: then they will know that a prophet has been among them.”
  '4':
  - type: text
    content: 'then if anyone who hears the sound of the trumpet does not take warning, and the sword comes and takes him away, '
  - type: note
    content: ch. 18:13; See ch. 3:18
  - type: text
    content: 'his blood shall be upon his own head. '
  '5':
  - type: note
    content: '[ch. 3:19]'
  - type: text
    content: 'He heard the sound of the trumpet and did not take warning; his blood shall be upon himself. But if he had taken warning, he would have saved his life. '
  '6':
  - type: note
    content: '[ch. 3:18]'
  - type: text
    content: 'But if the watchman sees the sword coming and does not blow the trumpet, so that the people are not warned, and the sword comes and takes any one of them, '
  - type: note
    content: '[ch. 3:18]'
  - type: text
    content: that person is taken away in his iniquity, but his blood I will require at the watchman’s hand.
  '7':
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:17
  - type: text
    content: '“So you, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'son of man, I have made a watchman for the house of Israel. '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'Whenever you hear a word from my mouth, you shall give them warning from me. '
  '8':
  - type: note
    content: ver. 6
  - type: text
    content: 'If I say to the wicked, O wicked one, you shall surely die, '
  - type: note
    content: ver. 6
  - type: text
    content: 'and you do not speak to warn the wicked to turn from his way, '
  - type: note
    content: ver. 6
  - type: text
    content: 'that wicked person shall die in his iniquity, but his blood I will require at your hand. '
  '9':
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'But if you warn the wicked to turn from his way, and he does not turn from his way, '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'that person shall die in his iniquity, '
  - type: note
    content: ch. 3:19; [1 Tim. 4:16]
  - type: text
    content: but you will have delivered your soul.
  - type: heading
    content: Why Will You Die, Israel?
