document_id: EZK.37,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Valley of Dry Bones
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'The hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon me, and '
  - type: note
    content: See ch. 3:12
  - type: text
    content: 'he brought me out in the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' and set me down in the middle of the valley;'
  - type: note
    content: Or plain; also verse 2
  - type: text
    content: ' it was full of bones. '
  '10':
  - type: text
    content: 'So I prophesied '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'as he commanded me, and '
  - type: note
    content: Rev. 11:11
  - type: text
    content: the breath came into them, and they lived and stood on their feet, an exceedingly great army.
  '11':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: '“Son of man, these bones are the whole house of Israel. Behold, they say, ‘Our bones are dried up, and '
  - type: note
    content: '[ch. 33:10; Isa. 49:14]'
  - type: text
    content: 'our hope is lost; '
  - type: note
    content: Lam. 3:54
  - type: text
    content: 'we are indeed cut off.’ '
  '12':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'prophesy, and say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Behold, '
  - type: note
    content: '[Isa. 26:19; Hos. 13:14]'
  - type: text
    content: 'I will open your graves and raise you from your graves, O my people. And '
  - type: note
    content: ver. 21, 25; ch. 36:24
  - type: text
    content: 'I will bring you into the land of Israel. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I open your graves, and raise you from your graves, O my people. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: ch. 36:27
  - type: text
    content: 'I will put my Spirit within you, and you shall live, and I will place you in your own land. Then you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'I have spoken, and I will do it, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: I Will Be Their God; They Shall Be My People
  '15':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '16':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[Num. 17:2]'
  - type: text
    content: take a stick
  - type: note
    content: Or one piece of wood; also verses 17, 19, 20
  - type: text
    content: ' and write on it, ‘For '
  - type: note
    content: '[Zech. 10:6]'
  - type: text
    content: 'Judah, and '
  - type: note
    content: 2 Chr. 11:12, 13, 16; 15:9; 30:11, 18
  - type: text
    content: 'the people of Israel associated with him’; then take another stick and write on it, ‘For '
  - type: note
    content: '[Zech. 10:6]'
  - type: text
    content: 'Joseph (the stick of '
  - type: note
    content: Gen. 48:13, 14, 19; [Hos. 5:3, 5]
  - type: text
    content: 'Ephraim) and all the house of Israel associated with him.’ '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 37:22, 24]'
  - type: text
    content: 'join them one to another into one stick, that '
  - type: note
    content: '[Isa. 11:13]'
  - type: text
    content: 'they may become '
  - type: note
    content: '[ch. 35:10]'
  - type: text
    content: 'one in your hand. '
  '18':
  - type: text
    content: 'And when '
  - type: note
    content: See ch. 33:2
  - type: text
    content: 'your people say to you, '
  - type: note
    content: See ch. 12:9
  - type: text
    content: '‘Will you not tell us what you mean by these?’ '
  '19':
  - type: text
    content: 'say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Behold, I am about to take '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'the stick of Joseph (that is in the hand of Ephraim) and the tribes of Israel associated with him. And I will join with it the '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: stick of Judah,
  - type: note
    content: Hebrew And I will place them on it, the stick of Judah
  - type: text
    content: ' and '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'make them one stick, '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'that they may be one in my hand. '
  '2':
  - type: text
    content: 'And he led me around among them, and behold, there were very many on the surface of the valley, and behold, they were very dry. '
  '20':
  - type: text
    content: 'When the sticks on which you write are in your hand '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'before their eyes, '
  '21':
  - type: text
    content: 'then say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Behold, '
  - type: note
    content: ver. 25; ch. 36:24; See ch. 11:17
  - type: text
    content: 'I will take the people of Israel from the nations among which they have gone, and will gather them from all around, and '
  - type: note
    content: ver. 25; ch. 36:24; See ch. 11:17
  - type: text
    content: 'bring them to their own land. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 17; Jer. 50:4]'
  - type: text
    content: 'I will make them one nation in the land, on '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'the mountains of Israel. And '
  - type: note
    content: '[ver. 24, 25; ch. 34:24]'
  - type: text
    content: 'one king shall be king over them all, and they shall be no longer '
  - type: note
    content: '[ch. 35:10]'
  - type: text
    content: 'two nations, and no longer divided into two kingdoms. '
  '23':
  - type: note
    content: '[ch. 36:25]'
  - type: text
    content: 'They shall not '
  - type: note
    content: ch. 14:11
  - type: text
    content: 'defile themselves anymore '
  - type: note
    content: ch. 36:25
  - type: text
    content: 'with their idols and their detestable things, or with any of their transgressions. But '
  - type: note
    content: ch. 36:29
  - type: text
    content: I will save them from all the backslidings
  - type: note
    content: Many Hebrew manuscripts; other Hebrew manuscripts dwellings
  - type: text
    content: ' in which they have sinned, and will cleanse them; and '
  - type: note
    content: ch. 34:24, 30; 2 Cor. 6:16; Rev. 21:3; See Ex. 29:45; Lev. 26:12
  - type: text
    content: they shall be my people, and I will be their God.
  '24':
  - type: text
    content: '“My servant '
  - type: note
    content: See ch. 34:23
  - type: text
    content: 'David '
  - type: note
    content: See Jer. 23:5
  - type: text
    content: 'shall be king over them, and they shall all have '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: 'one shepherd. '
  - type: note
    content: ch. 36:27
  - type: text
    content: 'They shall walk in my rules and be careful to obey my statutes. '
  '25':
  - type: note
    content: ch. 28:25
  - type: text
    content: 'They shall dwell in the land that I gave to my servant Jacob, where your fathers lived. They and their children and their children’s children shall dwell there '
  - type: note
    content: Isa. 60:21; Joel 3:20; Amos 9:15
  - type: text
    content: 'forever, and David my servant shall be their prince '
  - type: note
    content: '[John 12:34]'
  - type: text
    content: 'forever. '
  '26':
  - type: note
    content: ch. 34:25
  - type: text
    content: 'I will make a covenant of peace with them. It shall be '
  - type: note
    content: See Isa. 55:3
  - type: text
    content: an everlasting covenant with them. And I will set them in their land
  - type: note
    content: Hebrew lacks in their land
  - type: text
    content: ' and '
  - type: note
    content: See ch. 36:10
  - type: text
    content: 'multiply them, and will '
  - type: note
    content: ver. 28; ch. 43:7; See ch. 11:16
  - type: text
    content: 'set my sanctuary in their midst forevermore. '
  '27':
  - type: note
    content: Lev. 26:11; Rev. 21:3
  - type: text
    content: 'My dwelling place shall be with them, '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'and I will be their God, and they shall be my people. '
  '28':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 36:23
  - type: text
    content: 'the nations will know that '
  - type: note
    content: See ch. 20:12
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies Israel, when '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: my sanctuary is in their midst forevermore.”
  '3':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[1 Cor. 15:35]'
  - type: text
    content: 'can these bones live?” And '
  - type: note
    content: '[Deut. 32:39; John 5:21]'
  - type: text
    content: 'I answered, “O Lord '
  - type: text
    content: God
  - type: text
    content: ', you know.” '
  '4':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: '[ch. 6:2]'
  - type: text
    content: '“Prophesy over these bones, and say to them, '
  - type: note
    content: '[John 5:28]'
  - type: text
    content: 'O dry bones, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' to these bones: Behold, I will cause '
  - type: note
    content: '[Gen. 2:7]'
  - type: text
    content: breath
  - type: note
    content: Or spirit; also verses 6, 8, 9, 10
  - type: text
    content: ' to enter you, and you shall live. '
  '6':
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'And I will lay sinews upon you, and will cause flesh to come upon you, and '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'cover you with skin, and put breath in you, and you shall live, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '7':
  - type: text
    content: 'So I prophesied '
  - type: note
    content: ch. 12:7; 24:18
  - type: text
    content: 'as I was commanded. And as I prophesied, there was a sound, and behold, '
  - type: note
    content: '[1 Kgs. 19:11]'
  - type: text
    content: a rattling,
  - type: note
    content: Or an earthquake (compare 3:12, 13)
  - type: text
    content: ' and the bones came together, bone to its bone. '
  '8':
  - type: text
    content: 'And I looked, and behold, there were sinews on them, and flesh had come upon them, and skin had covered them. But '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'there was no breath in them. '
  '9':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: '“Prophesy to the breath; prophesy, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'son of man, and say to the breath, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Come from '
  - type: note
    content: Dan. 7:2; 11:4; Rev. 7:1
  - type: text
    content: 'the four winds, O breath, and breathe on these slain, that they may live.” '
