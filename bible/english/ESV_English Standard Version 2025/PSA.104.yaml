    content: 'and you '
  - type: note
    content: '[Rev. 21:5]'
  - type: text
    content: renew the face of the ground.
  '31':
  - type: text
    content: 'May the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 72:17
  - type: text
    content: endure forever;
  - type: text
    content: 'may the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Gen. 1:31; Prov. 8:31]'
  - type: text
    content: rejoice in his works,
  '32':
  - type: text
