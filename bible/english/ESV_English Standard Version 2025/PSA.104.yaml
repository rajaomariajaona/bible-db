    content: Job 37:8
  - type: text
    content: dens.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 3:19 ]'
  - type: text
    content: Man goes out to his work
  - type: text
    content: and to his labor until the evening.
  '24':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', how manifold are your works!'
  - type: text
    content: 'In '
  - type: note
    content: Prov. 3:19
  - type: text
    content: wisdom have you made them all;
  - type: text
    content: the earth is full of your creatures.
  '25':
  - type: text
    content: Here is the sea, great and wide,
  - type: note
    content: Ps. 69:34
  - type: text
    content: which teems with creatures innumerable,
  - type: text
    content: living things both small and great.
  '26':
  - type: text
    content: There go the ships,
  - type: text
    content: 'and '
  - type: note
    content: See Job 41:1
  - type: text
    content: 'Leviathan, which you formed to '
  - type: note
    content: '[Job 40:20]'
  - type: text
    content: play in it.
  - type: note
    content: Or you formed to play with
  '27':
  - type: text
    content: 'These '
  - type: note
    content: Ps. 145:15
  - type: text
    content: all look to you,
  - type: text
    content: 'to '
  - type: note
    content: '[ver. 14]; See Job 36:31'
  - type: text
    content: give them their food in due season.
  '28':
  - type: text
    content: When you give it to them, they gather it up;
  - type: text
    content: 'when you '
  - type: note
    content: Ps. 145:16
  - type: text
    content: open your hand, they are filled with good things.
  '29':
  - type: text
    content: 'When you '
  - type: note
    content: Ps. 30:7; [Deut. 31:17]
  - type: text
    content: 'hide your face, they are '
  - type: note
    content: Job 23:15
  - type: text
    content: dismayed;
  - type: text
    content: 'when you '
  - type: note
    content: See Job 34:14
  - type: text
    content: take away their breath, they die
  - type: text
    content: 'and '
  - type: note
    content: See Job 10:9
  - type: text
    content: return to their dust.
  '3':
  - type: text
    content: 'He '
  - type: note
    content: Amos 9:6
  - type: text
    content: 'lays the beams of his '
  - type: note
    content: ver. 13
  - type: text
    content: chambers on the waters;
  - type: text
    content: 'he makes '
  - type: note
    content: Isa. 19:1
  - type: text
    content: the clouds his chariot;
  - type: text
    content: 'he rides on '
  - type: note
    content: Ps. 18:10; 2 Sam. 22:11
  - type: text
    content: the wings of the wind;
  '30':
  - type: text
    content: 'When you '
  - type: note
    content: See Job 33:4
  - type: text
    content: send forth your Spirit,
  - type: note
    content: Or breath
  - type: text
    content: ' they are created,'
