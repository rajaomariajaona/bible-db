  - type: text
    content: 'the sound of your thunder they '
  - type: note
    content: Ps. 48:5
  - type: text
    content: took to flight.
  '8':
  - type: text
    content: The mountains rose, the valleys sank down
  - type: text
    content: 'to the place that you '
  - type: note
    content: '[Job 38:8, 10, 11]'
  - type: text
    content: appointed for them.
  '9':
  - type: text
    content: 'You set '
  - type: note
