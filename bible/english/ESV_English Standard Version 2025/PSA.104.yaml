    content: See Ps. 63:4
  - type: text
    content: as long as I live;
  - type: text
    content: I will sing praise to my God while I have being.
  '34':
  - type: text
    content: 'May my '
  - type: note
    content: Job 15:4
  - type: text
    content: meditation be pleasing to him,
  - type: text
    content: 'for I rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
