  '1':
  - type: heading
    content: O Lord My God, You Are Very Great
  - type: text
    content: ' '
  - type: note
    content: Ps. 103:1, 2, 22
  - type: text
    content: 'Bless the '
  - type: text
    content: Lord
  - type: text
    content: ', O my soul!'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, you are '
  - type: note
    content: See 2 Sam. 7:22
  - type: text
    content: very great!
  - type: note
    content: Ps. 93:1; Job 40:10; [ Job 37:22 ]
  - type: text
    content: You are clothed with splendor and majesty,
  '10':
  - type: text
    content: You make springs gush forth in the valleys;
  - type: text
    content: they flow between the hills;
  '11':
  - type: text
    content: 'they '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: give drink to every beast of the field;
  - type: text
    content: the wild donkeys quench their thirst.
  '12':
  - type: text
    content: Beside them the birds of the heavens dwell;
  - type: text
    content: they sing among the branches.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ver. 3
  - type: text
    content: 'From your lofty abode you '
  - type: note
    content: '[Ps. 65:9; 147:8; Deut. 11:11; Job 5:10; Jer. 10:13; 14:22]'
  - type: text
    content: water the mountains;
  - type: text
    content: the earth is satisfied with the fruit of your work.
  '14':
  - type: text
    content: 'You cause '
  - type: note
    content: Ps. 147:8, 9
  - type: text
    content: the grass to grow for the livestock
  - type: text
    content: 'and '
  - type: note
    content: Gen. 1:11, 29, 30; 3:18; 9:3
  - type: text
    content: plants for man to cultivate,
  - type: text
    content: 'that he may bring forth '
  - type: note
    content: Job 28:5; [Ps. 136:25; 147:9]
  - type: text
    content: food from the earth
  '15':
  - type: text
    content: 'and '
  - type: note
    content: Judg. 9:13; Eccles. 10:19; [Prov. 31:6, 7]
  - type: text
    content: wine to gladden the heart of man,
  - type: note
    content: '[ Ps. 23:5; Judg. 9:9 ]'
  - type: text
    content: oil to make his face shine
  - type: text
    content: 'and bread to '
  - type: note
    content: '[Gen. 18:5]'
  - type: text
    content: strengthen man’s heart.
  '16':
  - type: text
    content: 'The trees of the '
  - type: text
    content: Lord
  - type: text
    content: ' are watered abundantly,'
