  - type: text
    content: 'the cedars of Lebanon '
  - type: note
    content: '[Num. 24:6]'
  - type: text
    content: that he planted.
  '17':
  - type: text
    content: In them the birds build their nests;
  - type: text
    content: the stork has her home in the fir trees.
  '18':
  - type: text
    content: 'The high mountains are for '
  - type: note
    content: See Job 39:1
  - type: text
    content: the wild goats;
  - type: text
    content: 'the rocks are a refuge for '
  - type: note
    content: Lev. 11:5; Prov. 30:26
  - type: text
    content: the rock badgers.
  '19':
  - type: text
    content: 'He made the moon to mark the '
  - type: note
    content: Gen. 1:14; Lev. 23:4
  - type: text
    content: seasons;
  - type: note
    content: Or the appointed times (compare Genesis 1:14)
  - type: text
    content: the sun knows its time for setting.
  '2':
  - type: text
    content: covering yourself with light as with a garment,
  - type: note
    content: See Job 9:8
  - type: text
    content: 'stretching out the heavens '
  - type: note
    content: Isa. 40:22
  - type: text
    content: like a tent.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Isa. 45:7
  - type: text
    content: You make darkness, and it is night,
  - type: text
    content: when all the beasts of the forest creep about.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Job 38:39
  - type: text
    content: The young lions roar for their prey,
  - type: text
    content: seeking their food from God.
  '22':
  - type: text
    content: When the sun rises, they steal away
  - type: text
    content: 'and lie down in their '
