document_id: 2KI.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah Reassures Hezekiah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-37, see 2 Chr. 32:20-22; Isa. 37:1-38
  - type: text
    content: 'As soon as King Hezekiah heard it, '
  - type: note
    content: '[See ch. 18:37 above]'
  - type: text
    content: 'he tore his clothes and '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: 'covered himself with sackcloth and went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: '“Thus shall you speak to Hezekiah king of Judah: ‘Do not let your God '
  - type: note
    content: ch. 18:5
  - type: text
    content: 'in whom you trust deceive you by promising that '
  - type: note
    content: ch. 18:30
  - type: text
    content: 'Jerusalem will not be given into the hand of the king of Assyria. '
  '11':
  - type: text
    content: 'Behold, you have heard what the kings of Assyria have done to all lands, devoting them to destruction. And shall you be delivered? '
  '12':
  - type: note
    content: ch. 18:33
  - type: text
    content: 'Have the gods of the nations delivered them, the nations that my fathers destroyed, '
  - type: note
    content: ch. 17:6
  - type: text
    content: 'Gozan, '
  - type: note
    content: Gen. 11:31; Ezek. 27:23
  - type: text
    content: 'Haran, Rezeph, and the people of '
  - type: note
    content: Ezek. 27:23; Amos 1:5
  - type: text
    content: 'Eden who were in Telassar? '
  '13':
  - type: note
    content: ch. 18:34
  - type: text
    content: Where is the king of Hamath, the king of Arpad, the king of the city of Sepharvaim, the king of Hena, or the king of Ivvah?’”
  - type: heading
    content: Hezekiah’s Prayer
  '14':
  - type: text
    content: 'Hezekiah received '
  - type: note
    content: '[2 Chr. 32:17]'
  - type: text
    content: 'the letter from the hand of the messengers and read it; and Hezekiah went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and spread it before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And Hezekiah prayed before the '
  - type: text
    content: Lord
  - type: text
    content: ' and said: “O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: See Ex. 25:22
  - type: text
    content: 'enthroned above the cherubim, '
  - type: note
    content: 1 Kgs. 18:39; Neh. 9:6; Ps. 86:10; Isa. 37:16, 20; 44:6; Jer. 10:10, 12
  - type: text
    content: 'you are the God, you alone, of all the kingdoms of the earth; you have made the heavens and the earth. '
  '16':
  - type: note
    content: Ps. 31:2; 71:2; Dan. 9:18
  - type: text
    content: 'Incline your ear, O '
  - type: text
    content: Lord
  - type: text
    content: ', and hear; '
  - type: note
    content: 2 Chr. 6:40; Dan. 9:18
  - type: text
    content: 'open your eyes, O '
  - type: text
    content: Lord
  - type: text
    content: ', and see; and hear the words of Sennacherib, which he has sent '
  - type: note
    content: ver. 4
  - type: text
    content: 'to mock the living God. '
  '17':
  - type: text
    content: 'Truly, O '
  - type: text
    content: Lord
  - type: text
    content: ', the kings of Assyria have laid waste the nations and their lands '
  '18':
  - type: text
    content: 'and have cast their gods into the fire, for they were not gods, '
  - type: note
    content: 2 Chr. 32:19; Ps. 115:4
  - type: text
    content: 'but the work of men’s hands, wood and stone. Therefore they were destroyed. '
  '19':
  - type: text
    content: 'So now, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, save us, please, from his hand, '
  - type: note
    content: Josh. 4:24; Ps. 83:18
  - type: text
    content: 'that all the kingdoms of the earth may know that '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are God alone.”'
  - type: heading
    content: Isaiah Prophesies Sennacherib’s Fall
  '2':
  - type: text
    content: 'And he sent Eliakim, who was over the household, and Shebna the secretary, and the senior priests, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'covered with sackcloth, to the prophet Isaiah the son of Amoz. '
  '20':
  - type: text
    content: 'Then Isaiah the son of Amoz sent to Hezekiah, saying, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Your prayer to me about Sennacherib king of Assyria '
  - type: note
    content: '[ch. 20:5]'
  - type: text
    content: 'I have heard. '
  '21':
  - type: text
    content: 'This is the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken concerning him:'
  - type: text
    content: “She despises you, she scorns you—
  - type: note
    content: Lam. 2:13
  - type: text
    content: the virgin daughter of Zion;
  - type: text
    content: 'she '
  - type: note
    content: Job 16:4; Ps. 22:7; 109:25; Lam. 2:15
  - type: text
    content: wags her head behind you—
  - type: text
    content: the daughter of Jerusalem.
  '22':
  - type: text
    content: '“Whom have you '
  - type: note
    content: ver. 4
  - type: text
    content: 'mocked and '
  - type: note
    content: ver. 6
  - type: text
    content: reviled?
  - type: text
    content: Against whom have you raised your voice
  - type: text
    content: and lifted your eyes to the heights?
  - type: text
    content: 'Against '
  - type: note
    content: Ps. 71:22; Isa. 5:24; 60:9; Jer. 51:5
  - type: text
    content: the Holy One of Israel!
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:17
  - type: text
    content: By your messengers you have mocked the Lord,
  - type: text
    content: 'and you have said, '
  - type: note
    content: Ps. 20:7
  - type: text
    content: ‘With my many chariots
  - type: text
    content: I have gone up the heights of the mountains,
  - type: text
    content: 'to the far recesses of '
  - type: note
    content: See Judg. 9:15
  - type: text
    content: Lebanon;
  - type: text
    content: I felled its tallest cedars,
  - type: text
    content: its choicest cypresses;
  - type: text
    content: I entered its farthest lodging place,
  - type: text
    content: 'its most '
  - type: note
    content: 2 Chr. 26:10; [Isa. 10:18]
  - type: text
    content: fruitful forest.
  '24':
  - type: text
    content: I dug wells
  - type: text
    content: and drank foreign waters,
  - type: text
    content: and I dried up with the sole of my foot
  - type: text
    content: 'all the streams '
  - type: note
    content: Isa. 19:6
  - type: text
    content: of Egypt.’
  '25':
  - type: text
    content: “Have you not heard
  - type: text
    content: 'that '
  - type: note
    content: '[Isa. 45:7]'
  - type: text
    content: I determined it long ago?
  - type: text
    content: I planned from days of old
  - type: text
    content: 'what '
  - type: note
    content: '[Isa. 10:5]'
  - type: text
    content: now I bring to pass,
  - type: text
    content: that you should turn fortified cities
  - type: text
    content: into heaps of ruins,
  '26':
  - type: text
    content: while their inhabitants, shorn of strength,
  - type: text
    content: are dismayed and confounded,
  - type: text
    content: 'and have become '
  - type: note
    content: Ps. 129:6
  - type: text
    content: like plants of the field
  - type: text
    content: and like tender grass,
  - type: text
    content: like grass on the housetops,
  - type: text
    content: blighted before it is grown.
  '27':
  - type: text
    content: “But I know your sitting down
  - type: note
    content: '[ 1 Sam. 29:6 ]'
  - type: text
    content: and your going out and coming in,
  - type: text
    content: and your raging against me.
  '28':
  - type: text
    content: Because you have raged against me
  - type: text
    content: and your complacency has come into my ears,
  - type: text
    content: 'I will '
  - type: note
    content: Ezek. 29:4; 38:4; [Job 41:2; Isa. 30:28; Amos 4:2]
  - type: text
    content: put my hook in your nose
  - type: text
    content: and my bit in your mouth,
  - type: text
    content: 'and '
  - type: note
    content: ver. 33, 36
  - type: text
    content: I will turn you back on the way
  - type: text
    content: by which you came.
  '29':
  - type: text
    content: '“And this shall be '
  - type: note
    content: ch. 20:8, 9; 1 Sam. 2:34; Isa. 7:11, 14
  - type: text
    content: 'the sign for you: this year eat what grows of itself, and in the second year what springs of the same. Then in the third year sow and reap and plant vineyards, and eat their fruit. '
  '3':
  - type: text
    content: 'They said to him, “Thus says Hezekiah, This day is a day of distress, of rebuke, and of disgrace; children have come to the point of birth, and there is no strength to bring them forth. '
  '30':
  - type: note
    content: '[2 Chr. 32:22, 23]'
  - type: text
    content: 'And the surviving remnant of the house of Judah shall again take root downward and bear fruit upward. '
  '31':
  - type: text
    content: 'For out of Jerusalem shall go a remnant, and out of Mount Zion '
  - type: note
    content: '[Isa. 10:20]'
  - type: text
    content: 'a band of survivors. '
  - type: note
    content: Isa. 9:7
  - type: text
    content: 'The zeal of the '
  - type: text
    content: Lord
  - type: text
    content: ' will do this.'
  '32':
  - type: text
    content: '“Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the king of Assyria: He shall not come into this city or shoot an arrow there, or come before it with a shield or '
  - type: note
    content: 2 Sam. 20:15
  - type: text
    content: 'cast up a siege mound against it. '
  '33':
  - type: note
    content: ver. 28
  - type: text
    content: 'By the way that he came, by the same he shall return, and he shall not come into this city, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '34':
  - type: note
    content: ch. 20:6; [Isa. 31:5]
  - type: text
    content: 'For I will defend this city to save it, for my own sake '
  - type: note
    content: 1 Kgs. 11:13
  - type: text
    content: and for the sake of my servant David.”
  '35':
  - type: text
    content: 'And that night '
  - type: note
    content: '[Ex. 12:23; 2 Sam. 24:16]'
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went out and struck down 185,000 in the camp of the Assyrians. And when people arose early in the morning, behold, these were all dead bodies. '
  '36':
  - type: text
    content: 'Then Sennacherib king of Assyria departed and went home and lived at '
  - type: note
    content: Gen. 10:11; Jonah 1:2
  - type: text
    content: 'Nineveh. '
  '37':
  - type: text
    content: 'And as he was worshiping in the house of Nisroch his god, '
  - type: note
    content: '[ch. 17:31]'
  - type: text
    content: Adrammelech and Sharezer, his sons, struck him down with the sword and escaped into the land of Ararat. And Esarhaddon his son reigned in his place.
  '4':
  - type: note
    content: '[2 Sam. 16:12]'
  - type: text
    content: 'It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God heard all the words of the Rabshakeh, whom his master the king of Assyria has sent '
  - type: note
    content: ver. 16
  - type: text
    content: 'to mock the living God, and will rebuke the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has heard; therefore lift up your prayer for '
  - type: note
    content: '[Isa. 1:9]'
  - type: text
    content: 'the remnant that is left.” '
  '5':
  - type: text
    content: 'When the servants of King Hezekiah came to Isaiah, '
  '6':
  - type: text
    content: 'Isaiah said to them, “Say to your master, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Do not be afraid because of the words that you have heard, with which '
  - type: note
    content: ch. 18:17
  - type: text
    content: 'the servants of the king of Assyria have '
  - type: note
    content: See ch. 18:22-25, 30-35
  - type: text
    content: 'reviled me. '
  '7':
  - type: text
    content: 'Behold, I will put a spirit in him, so that '
  - type: note
    content: ver. 9
  - type: text
    content: 'he shall hear a rumor and return to his own land, and I will make him '
  - type: note
    content: ver. 37
  - type: text
    content: fall by the sword in his own land.’”
  - type: heading
    content: Sennacherib Defies the Lord
  '8':
  - type: text
    content: 'The Rabshakeh returned, and found the king of Assyria fighting against '
  - type: note
    content: Josh. 10:29
  - type: text
    content: 'Libnah, for he heard that the king had left '
  - type: note
    content: ch. 18:14; Josh. 10:31
  - type: text
    content: 'Lachish. '
  '9':
  - type: note
    content: '[1 Sam. 23:27]'
  - type: text
    content: 'Now the king heard concerning Tirhakah king of Cush, “Behold, he has set out to fight against you.” So he sent messengers again to Hezekiah, saying, '
