document_id: ACT.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Timothy Joins Paul and Silas
  - type: text
    content: Paul
  - type: note
    content: Greek He
  - type: text
    content: ' came also to Derbe and to Lystra. A disciple was there, named '
  - type: note
    content: ch. 17:14; 18:5; 19:22; 20:4; Rom. 16:21; 1 Cor. 4:17; Phil. 2:19; Col. 1:1; 1 Thess. 3:2; 2 Thess. 1:1; 1 Tim. 1:2, 18; 2 Tim. 1:2
  - type: text
    content: 'Timothy, '
  - type: note
    content: 2 Tim. 1:5; 3:15
  - type: text
    content: 'the son of a Jewish woman who was a believer, but his father was a Greek. '
  '10':
  - type: text
    content: And when Paul
  - type: note
    content: Greek he
  - type: text
    content: ' had seen the vision, immediately '
  - type: note
    content: ver. 11-17; ch. 20:5-8, 13-15; 21:1-18; 27:1–28:16
  - type: text
    content: we sought to go on into Macedonia, concluding that God had called us to preach the gospel to them.
  - type: heading
    content: The Conversion of Lydia
  '11':
  - type: text
    content: 'So, setting sail from Troas, we '
  - type: note
    content: ch. 21:1
  - type: text
    content: 'made a direct voyage to Samothrace, and the following day to Neapolis, '
  '12':
  - type: text
    content: 'and from there to '
  - type: note
    content: Phil. 1:1; 1 Thess. 2:2
  - type: text
    content: Philippi, which is a leading city of the
  - type: note
    content: Or that
  - type: text
    content: ' district of Macedonia and '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'a Roman colony. We remained in this city some days. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 13:14
  - type: text
    content: 'on the Sabbath day we went outside the gate '
  - type: note
    content: '[Ezra 8:15, 21; Ps. 137:1]'
  - type: text
    content: 'to the riverside, where we supposed there was a place of prayer, and we '
  - type: note
    content: Matt. 5:1
  - type: text
    content: 'sat down and spoke to the women who had come together. '
  '14':
  - type: text
    content: 'One who heard us was a woman named Lydia, from the city of Thyatira, a seller of purple goods, '
  - type: note
    content: ch. 18:7
  - type: text
    content: 'who was a worshiper of God. The Lord '
  - type: note
    content: See Luke 24:45
  - type: text
    content: 'opened her heart to pay attention to what was said by Paul. '
  '15':
  - type: text
    content: 'And after she was baptized, '
  - type: note
    content: See ch. 11:14
  - type: text
    content: 'and her household as well, she urged us, saying, “If you have judged me to be faithful to the Lord, come to my house and stay.” And she '
  - type: note
    content: Gen. 19:3; Luke 24:29
  - type: text
    content: prevailed upon us.
  - type: heading
    content: Paul and Silas in Prison
  '16':
  - type: text
    content: 'As we were going to '
  - type: note
    content: ver. 13
  - type: text
    content: 'the place of prayer, we were met by a slave girl who had '
  - type: note
    content: Luke 13:11
  - type: text
    content: 'a spirit of '
  - type: note
    content: See Lev. 19:31
  - type: text
    content: 'divination and '
  - type: note
    content: ver. 19
  - type: text
    content: 'brought her owners much gain by fortune-telling. '
  '17':
  - type: text
    content: 'She followed Paul and us, '
  - type: note
    content: See James 2:19
  - type: text
    content: 'crying out, “These men are '
  - type: note
    content: Dan. 3:26
  - type: text
    content: 'servants of '
  - type: note
    content: See Mark 5:7
  - type: text
    content: 'the Most High God, who proclaim to you '
  - type: note
    content: '[ch. 9:2; Matt. 7:14]'
  - type: text
    content: 'the way of salvation.” '
  '18':
  - type: text
    content: 'And this she kept doing for many days. Paul, having become greatly annoyed, turned and said to the spirit, '
  - type: note
    content: '[Mark 1:25, 34]'
  - type: text
    content: '“I command you '
  - type: note
    content: See Mark 9:38
  - type: text
    content: 'in the name of Jesus Christ to come out of her.” And '
  - type: note
    content: '[Matt. 17:18]'
  - type: text
    content: it came out that very hour.
  '19':
  - type: text
    content: 'But '
  - type: note
    content: ver. 16; [ch. 19:25, 26]
  - type: text
    content: 'when her owners saw that their hope of gain was gone, they seized Paul and Silas and '
  - type: note
    content: ch. 17:6-8; 21:30; James 2:6; [ch. 8:3; 18:12; Matt. 10:18]
  - type: text
    content: 'dragged them into the marketplace before the rulers. '
  '2':
  - type: text
    content: 'He was well spoken of by '
  - type: note
    content: See John 21:23
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters; also verse 40
  - type: text
    content: ' at Lystra and Iconium. '
  '20':
  - type: text
    content: 'And when they had brought them to the magistrates, they said, “These men are Jews, and they are disturbing our city. '
  '21':
  - type: text
    content: 'They '
  - type: note
    content: '[Esth. 3:8]'
  - type: text
    content: 'advocate customs that are not lawful for us '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'as Romans to accept or practice.” '
  '22':
  - type: text
    content: 'The crowd joined in attacking them, and the magistrates tore the garments off them and gave orders '
  - type: note
    content: 2 Cor. 6:5; 11:23-25; 1 Thess. 2:2
  - type: text
    content: 'to beat them with rods. '
  '23':
  - type: text
    content: 'And when they had inflicted many blows upon them, they threw them into prison, ordering the jailer to keep them safely. '
  '24':
  - type: text
    content: 'Having received this order, he put them into the inner '
  - type: note
    content: See Luke 21:12
  - type: text
    content: 'prison and fastened their feet in '
  - type: note
    content: Job 13:27; 33:11; Jer. 20:2, 3; 29:26
  - type: text
    content: the stocks.
  - type: heading
    content: The Philippian Jailer Converted
  '25':
  - type: text
    content: ' '
  - type: note
    content: Job 35:10; Ps. 42:8; 77:6; 119:62
  - type: text
    content: 'About midnight Paul and Silas were praying and singing hymns to God, and the prisoners were listening to them, '
  '26':
  - type: text
    content: 'and suddenly '
  - type: note
    content: See ch. 4:31
  - type: text
    content: 'there was a great earthquake, so that the foundations of the prison were shaken. And immediately '
  - type: note
    content: ch. 5:19; 12:10
  - type: text
    content: 'all the doors were opened, and '
  - type: note
    content: ch. 12:7
  - type: text
    content: 'everyone’s bonds were unfastened. '
  '27':
  - type: text
    content: 'When the jailer woke and saw that the prison doors were open, he drew his sword and '
  - type: note
    content: '[ch. 12:19; 27:42; 1 Kgs. 20:39]'
  - type: text
    content: 'was about to kill himself, supposing that the prisoners had escaped. '
  '28':
  - type: text
    content: 'But Paul cried with a loud voice, “Do not harm yourself, for we are all here.” '
  '29':
  - type: text
    content: And the jailer
  - type: note
    content: Greek he
  - type: text
    content: ' called for lights and rushed in, and trembling with fear he '
  - type: note
    content: ch. 10:25
  - type: text
    content: 'fell down before Paul and Silas. '
  '3':
  - type: text
    content: 'Paul wanted Timothy to accompany him, and he '
  - type: note
    content: '[Gal. 2:3]'
  - type: text
    content: 'took him and circumcised him because of the Jews who were in those places, for they all knew that his father was a Greek. '
  '30':
  - type: text
    content: 'Then he brought them out and said, “Sirs, '
  - type: note
    content: ch. 2:37; 22:10; Luke 3:10, 12, 14; [John 6:28, 29]
  - type: text
    content: 'what must I do to be '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'saved?” '
  '31':
  - type: text
    content: 'And they said, '
  - type: note
    content: See Mark 16:16
  - type: text
    content: '“Believe in the Lord Jesus, and you will be saved, you '
  - type: note
    content: See ch. 11:14
  - type: text
    content: 'and your household.” '
  '32':
  - type: text
    content: 'And they spoke the word of the Lord to him and to all who were in his house. '
  '33':
  - type: text
    content: 'And he took them '
  - type: note
    content: ver. 25
  - type: text
    content: 'the same hour of the night and washed their wounds; and he '
  - type: note
    content: See ch. 8:12
  - type: text
    content: 'was baptized at once, he and all his family. '
  '34':
  - type: text
    content: 'Then he brought them up into his house and set food before them. And he '
  - type: note
    content: Ps. 9:14; 13:5; Isa. 25:9; Luke 1:47; 1 Pet. 1:6, 8; [ch. 2:46]
  - type: text
    content: rejoiced along with his entire household that he had believed in God.
  '35':
  - type: text
    content: 'But when it was day, the magistrates sent the police, saying, “Let those men go.” '
  '36':
  - type: text
    content: 'And the jailer reported these words to Paul, saying, “The magistrates have sent to let you go. Therefore come out now and go in peace.” '
  '37':
  - type: text
    content: 'But Paul said to them, “They have beaten us publicly, '
  - type: note
    content: ch. 22:25, 29
  - type: text
    content: 'uncondemned, men who are Roman citizens, and have thrown us into prison; and do they now throw us out secretly? No! Let them come themselves and take us out.” '
  '38':
  - type: text
    content: 'The police reported these words to the magistrates, and '
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: 'they were afraid when they heard that they were Roman citizens. '
  '39':
  - type: text
    content: 'So they came and apologized to them. And they took them out and '
  - type: note
    content: '[Matt. 8:34]'
  - type: text
    content: 'asked them to leave the city. '
  '4':
  - type: text
    content: 'As they went on their way through the cities, they delivered to them for observance '
  - type: note
    content: ch. 17:7
  - type: text
    content: 'the decisions '
  - type: note
    content: ch. 15:28, 29
  - type: text
    content: 'that had been reached by '
  - type: note
    content: See ch. 15:2
  - type: text
    content: 'the apostles and elders who were in Jerusalem. '
  '40':
  - type: text
    content: 'So they went out of the prison and visited '
  - type: note
    content: ver. 14
  - type: text
    content: 'Lydia. And when they had seen '
  - type: note
    content: See John 21:23
  - type: text
    content: the brothers, they encouraged them and departed.
  '5':
  - type: note
    content: '[ch. 9:31]'
  - type: text
    content: 'So the churches were strengthened in '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'the faith, and they increased in numbers '
  - type: note
    content: ch. 2:47
  - type: text
    content: daily.
  - type: heading
    content: The Macedonian Call
  '6':
  - type: text
    content: 'And '
  - type: note
    content: ch. 18:23; [Gal. 4:13]
  - type: text
    content: 'they went through the region of Phrygia and Galatia, having been forbidden by the Holy Spirit to speak the word in Asia. '
  '7':
  - type: text
    content: 'And when they had come up to Mysia, they attempted to go into Bithynia, but '
  - type: note
    content: Rom. 8:9; Gal. 4:6; Phil. 1:19; 1 Pet. 1:11; [ver. 6; ch. 8:29]
  - type: text
    content: 'the Spirit of Jesus did not allow them. '
  '8':
  - type: text
    content: 'So, passing by Mysia, they went down '
  - type: note
    content: ch. 20:5, 6; 2 Cor. 2:12; 2 Tim. 4:13
  - type: text
    content: 'to Troas. '
  '9':
  - type: text
    content: 'And a vision appeared to Paul in the night: a man of Macedonia was standing there, urging him and saying, “Come over to Macedonia and help us.” '
