  '1':
  - type: heading
    content: By Grace Through Faith
  - type: text
    content: ' '
  - type: note
    content: Col. 2:13; [ Col. 1:21 ]
  - type: text
    content: 'And you were '
  - type: note
    content: ver. 5; [ch. 4:18]; See Luke 15:24
  - type: text
    content: 'dead in the trespasses and sins '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Deut. 32:6, 15; Ps. 100:3
  - type: text
    content: 'we are his workmanship, '
  - type: note
    content: '[ch. 3:9; 4:24; Col. 3:10]'
  - type: text
    content: 'created in Christ Jesus '
  - type: note
    content: ch. 4:24
  - type: text
    content: 'for good works, '
  - type: note
    content: '[ch. 1:4]'
  - type: text
    content: 'which God prepared beforehand, '
  - type: note
    content: Col. 1:10
  - type: text
    content: that we should walk in them.
  - type: heading
    content: One in Christ
  '11':
  - type: text
    content: 'Therefore remember that at one time you Gentiles in the flesh, called “the uncircumcision” by what is called '
  - type: note
    content: Rom. 2:26, 28; [Col. 2:11, 13]
  - type: text
    content: 'the circumcision, which is made in the flesh by hands— '
  '12':
  - type: text
    content: 'remember '
  - type: note
    content: 1 Cor. 12:2; [ch. 5:8; Col. 3:7]
  - type: text
    content: 'that you were at that time separated from Christ, '
  - type: note
    content: ch. 4:18; Col. 1:21; [Ezek. 14:5; Gal. 2:15; 4:8]
  - type: text
    content: 'alienated from the commonwealth of Israel and strangers to '
  - type: note
    content: See Rom. 9:4
  - type: text
    content: 'the covenants of promise, '
  - type: note
    content: 1 Thess. 4:13; See ch. 1:18
  - type: text
    content: 'having no hope and without God in the world. '
  '13':
  - type: text
    content: 'But now in Christ Jesus you who once were '
  - type: note
    content: ver. 17; Acts 2:39
  - type: text
    content: 'far off have been brought near '
  - type: note
    content: '[Col. 1:20]; See Rom. 3:25'
  - type: text
    content: 'by the blood of Christ. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 72:7; Mic. 5:5; Zech. 9:10; [Col. 3:15]; See Luke 2:14
  - type: text
    content: 'he himself is our peace, '
  - type: note
    content: See Gal. 3:28
  - type: text
    content: 'who has made us both one and has broken down '
  - type: note
    content: Col. 1:21, 22; [Rom. 7:4]
  - type: text
    content: 'in his flesh the dividing wall of hostility '
  '15':
  - type: text
    content: 'by abolishing the law of commandments expressed in '
  - type: note
    content: Col. 2:14, 20
  - type: text
    content: 'ordinances, that he might create in himself one '
  - type: note
    content: See Rom. 6:4
  - type: text
    content: 'new man in place of the two, so making peace, '
  '16':
  - type: text
    content: 'and might '
  - type: note
    content: Col. 1:20-22; [1 Cor. 12:13]
  - type: text
    content: 'reconcile us both to God in one body through the cross, thereby killing the hostility. '
  '17':
  - type: text
    content: 'And he came and '
  - type: note
    content: Isa. 57:19
  - type: text
    content: 'preached peace to you who were '
  - type: note
    content: ver. 13
  - type: text
    content: 'far off and peace to those who were '
  - type: note
    content: Deut. 4:7; Ps. 148:14
  - type: text
    content: 'near. '
  '18':
  - type: text
    content: 'For '
  - type: note
    content: '[John 14:6]'
  - type: text
    content: 'through him we both have '
  - type: note
    content: ch. 3:12; [John 10:7, 9]; See Rom. 5:2
  - type: text
    content: 'access in '
  - type: note
    content: ch. 4:4; 1 Cor. 12:13; [John 4:23]
  - type: text
    content: 'one Spirit to the Father. '
  '19':
  - type: text
    content: 'So then you are no longer '
  - type: note
    content: ver. 12; [Heb. 11:13; 13:14]
  - type: text
    content: strangers and aliens,
  - type: note
    content: Or sojourners
  - type: text
    content: ' but you are '
  - type: note
    content: Phil. 3:20; [Heb. 12:22, 23]
  - type: text
    content: 'fellow citizens with the saints and '
  - type: note
    content: See Gal. 6:10
  - type: text
    content: 'members of the household of God, '
  '2':
  - type: note
    content: ch. 4:17, 22; 5:8; Col. 3:7; See Rom. 11:30; 1 Cor. 6:11
  - type: text
    content: in which you once walked, following the course
  - type: note
    content: Or age
  - type: text
    content: ' of this world, following '
  - type: note
    content: '[ch. 6:12; Rev. 9:11]; See John 12:31'
  - type: text
    content: 'the prince of the power of the air, the spirit that is now at work in '
  - type: note
    content: ch. 5:6; [1 Pet. 1:14]
  - type: text
    content: 'the sons of disobedience— '
  '20':
  - type: note
    content: '[Jer. 12:16]; See 1 Cor. 3:9'
  - type: text
    content: 'built on the foundation of the '
  - type: note
    content: Matt. 16:18; Rev. 21:14
  - type: text
    content: 'apostles and prophets, '
  - type: note
    content: '[1 Cor. 3:11]'
  - type: text
    content: 'Christ Jesus himself being '
  - type: note
    content: Ps. 118:22; Isa. 28:16
  - type: text
    content: 'the cornerstone, '
  '21':
  - type: note
    content: ch. 4:15, 16
  - type: text
    content: 'in whom the whole structure, being joined together, grows into '
  - type: note
    content: See 1 Cor. 3:16, 17
  - type: text
    content: 'a holy temple in the Lord. '
  '22':
  - type: text
    content: 'In him '
  - type: note
    content: 1 Pet. 2:5
  - type: text
    content: 'you also are being built together '
  - type: note
    content: '[ch. 3:17; 2 Cor. 6:16; 1 Tim. 3:15]'
  - type: text
    content: into a dwelling place for God by
  - type: note
    content: Or in
  - type: text
    content: ' the Spirit.'
  '3':
  - type: text
    content: 'among whom we all once lived in '
  - type: note
    content: Gal. 5:16
  - type: text
    content: 'the passions of our flesh, carrying out the desires of the flesh and the mind, and '
  - type: note
    content: See Ps. 51:5; Rom. 5:12
  - type: text
    content: 'were by nature '
  - type: note
    content: '[2 Pet. 2:14]'
  - type: text
    content: children of wrath, like the rest of mankind.
  - type: note
    content: Greek like the rest
  - type: text
    content: ' '
  '4':
  - type: text
    content: But
  - type: note
    content: Or And
  - type: text
    content: ' God, being '
  - type: note
    content: ver. 7; Titus 3:5; See Rom. 2:4
  - type: text
    content: 'rich in mercy, '
  - type: note
    content: See John 3:16
  - type: text
    content: 'because of the great love with which he loved us, '
  '5':
  - type: text
    content: 'even '
  - type: note
    content: ver. 1; [Rom. 5:6, 8, 10]
  - type: text
    content: 'when we were dead in our trespasses, '
  - type: note
    content: Col. 2:12, 13; [John 14:19; Rev. 20:4]
  - type: text
    content: made us alive together with Christ—
  - type: note
    content: ver. 8; See Acts 15:11
  - type: text
    content: 'by grace you have been saved— '
  '6':
  - type: text
    content: 'and raised us up with him and '
  - type: note
    content: See ch. 1:20
  - type: text
    content: 'seated us with him in the heavenly places in Christ Jesus, '
  '7':
  - type: text
    content: 'so that in the coming ages he might show the immeasurable '
  - type: note
    content: ver. 4
  - type: text
    content: 'riches of his grace in '
  - type: note
    content: Titus 3:4
  - type: text
    content: 'kindness toward us in Christ Jesus. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: ver. 5
  - type: text
    content: 'by grace you have been saved '
  - type: note
    content: 1 Pet. 1:5; [Rom. 4:16]
  - type: text
    content: 'through faith. And this is '
  - type: note
    content: '[2 Cor. 3:5]'
  - type: text
    content: 'not your own doing; '
  - type: note
    content: '[John 4:10; Heb. 6:4]'
  - type: text
    content: 'it is the gift of God, '
  '9':
  - type: note
    content: 2 Tim. 1:9; Titus 3:5; See Rom. 3:20, 28
  - type: text
    content: 'not a result of works, '
  - type: note
    content: 1 Cor. 1:29; [Judg. 7:2]
  - type: text
    content: 'so that no one may boast. '
