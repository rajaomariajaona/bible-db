document_id: 2KI.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaz Reigns in Judah
  - type: text
    content: 'In the seventeenth year of Pekah the son of Remaliah, Ahaz the son of Jotham, king of Judah, began to reign. '
  '10':
  - type: text
    content: 'When King Ahaz went to Damascus to meet '
  - type: note
    content: See ch. 15:29
  - type: text
    content: 'Tiglath-pileser king of Assyria, he saw the altar that was at Damascus. And King Ahaz sent to '
  - type: note
    content: Isa. 8:2
  - type: text
    content: 'Uriah the priest a model of the altar, and its pattern, exact in all its details. '
  '11':
  - type: text
    content: 'And Uriah the priest built the altar; in accordance with all that King Ahaz had sent from Damascus, so Uriah the priest made it, before King Ahaz arrived from Damascus. '
  '12':
  - type: text
    content: 'And when the king came from Damascus, the king viewed the altar. '
  - type: note
    content: See 2 Chr. 26:16-19
  - type: text
    content: 'Then the king drew near to the altar and went up on it '
  '13':
  - type: text
    content: 'and burned his burnt offering and his grain offering and poured his drink offering and threw the blood of his peace offerings on the altar. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 4:1
  - type: text
    content: 'the bronze altar that was before the '
  - type: text
    content: Lord
  - type: text
    content: ' he removed '
  - type: note
    content: '[Ex. 40:6, 29]'
  - type: text
    content: 'from the front of the house, from the place between '
  - type: note
    content: ver. 11
  - type: text
    content: 'his altar and the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and put it on the north side of '
  - type: note
    content: ver. 11
  - type: text
    content: 'his altar. '
  '15':
  - type: text
    content: 'And King Ahaz commanded Uriah the priest, saying, “On the great altar burn '
  - type: note
    content: Ex. 29:39-41
  - type: text
    content: 'the morning burnt offering and the evening grain offering and the king’s burnt offering and his grain offering, with the burnt offering of all the people of the land, and their grain offering and their drink offering. And throw on it all the blood of the burnt offering and all the blood of the sacrifice, but '
  - type: note
    content: ver. 14
  - type: text
    content: 'the bronze altar shall be for me to inquire by.” '
  '16':
  - type: text
    content: Uriah the priest did all this, as King Ahaz commanded.
  '17':
  - type: text
    content: 'And King Ahaz cut off the frames of the stands and removed the basin from them, and he took down '
  - type: note
    content: 1 Kgs. 7:23, 25
  - type: text
    content: the sea
  - type: note
    content: Compare 1 Kings 7:23
  - type: text
    content: ' from off the bronze oxen that were under it and put it on a stone pedestal. '
  '18':
  - type: text
    content: 'And the covered way for the Sabbath that had been built inside the house and the outer entrance for the king he caused to go around the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', because of the king of Assyria. '
  '19':
  - type: text
    content: 'Now the rest of the acts of Ahaz that he did, are they not written '
  - type: note
    content: '[2 Chr. 28:26]'
  - type: text
    content: 'in the Book of the Chronicles of the Kings of Judah? '
  '2':
  - type: text
    content: 'Ahaz was '
  - type: note
    content: For ver. 2-4, see 2 Chr. 28:1-4
  - type: text
    content: 'twenty years old when he began to reign, and he reigned sixteen years in Jerusalem. And he did not do what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, as his father David had done, '
  '20':
  - type: text
    content: 'And Ahaz slept with his fathers and '
  - type: note
    content: '[2 Chr. 28:27]'
  - type: text
    content: was buried with his fathers in the city of David, and Hezekiah his son reigned in his place.
  '3':
  - type: text
    content: 'but he walked in the way of the kings of Israel. '
  - type: note
    content: '[Ps. 106:37, 38]; See Lev. 18:21'
  - type: text
    content: He even burned his son as an offering,
  - type: note
    content: Or made his son pass through the fire
  - type: text
    content: ' '
  - type: note
    content: ch. 21:2; [Deut. 12:31; 18:9]
  - type: text
    content: 'according to the despicable practices of the nations whom the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before the people of Israel. '
  '4':
  - type: note
    content: '[ch. 14:4]'
  - type: text
    content: 'And he sacrificed and made offerings '
  - type: note
    content: Deut. 12:2; 1 Kgs. 14:23
  - type: text
    content: on the high places and on the hills and under every green tree.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:37
  - type: text
    content: 'Then Rezin king of Syria and '
  - type: note
    content: ch. 15:37
  - type: text
    content: 'Pekah the son of Remaliah, king of Israel, came up to wage war on Jerusalem, and they besieged Ahaz '
  - type: note
    content: '[2 Chr. 28:5, 6]'
  - type: text
    content: 'but could not conquer him. '
  '6':
  - type: text
    content: 'At that time Rezin the king of Syria recovered '
  - type: note
    content: See ch. 14:22
  - type: text
    content: 'Elath for Syria and drove the men of Judah from '
  - type: note
    content: See ch. 14:22
  - type: text
    content: 'Elath, and the Edomites came to Elath, where they dwell to this day. '
  '7':
  - type: note
    content: See 2 Chr. 28:16
  - type: text
    content: 'So Ahaz sent messengers to '
  - type: note
    content: See ch. 15:29
  - type: text
    content: 'Tiglath-pileser king of Assyria, saying, “I am your servant and your son. Come up and rescue me from the hand of the king of Syria and from the hand of the king of Israel, who are attacking me.” '
  '8':
  - type: text
    content: 'Ahaz also '
  - type: note
    content: See ch. 12:18
  - type: text
    content: 'took the silver and gold that was found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the treasures of the king’s house and sent a present to the king of Assyria. '
  '9':
  - type: note
    content: '[2 Chr. 28:21]'
  - type: text
    content: 'And the king of Assyria listened to him. The king of Assyria marched up against Damascus '
  - type: note
    content: '[Amos 1:5]'
  - type: text
    content: 'and took it, carrying its people captive to '
  - type: note
    content: Isa. 22:6; Amos 1:5; 9:7
  - type: text
    content: Kir, and he killed Rezin.
