document_id: PRO.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Words of King Lemuel
  - type: text
    content: 'The words of King Lemuel. An oracle that his mother taught him:'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Verses 10–31 are an acrostic poem, each verse beginning with the successive letters of the Hebrew alphabet
  - type: note
    content: ch. 12:4; Ruth 3:11; [ch. 18:22; 19:14]
  - type: text
    content: An excellent wife who can find?
  - type: text
    content: 'She is far more precious than '
  - type: note
    content: Job 28:18
  - type: text
    content: jewels.
  '11':
  - type: text
    content: The heart of her husband trusts in her,
  - type: text
    content: and he will have no lack of gain.
  '12':
  - type: text
    content: She does him good, and not harm,
  - type: text
    content: all the days of her life.
  '13':
  - type: text
    content: 'She '
  - type: note
    content: '[ver. 21, 22, 24]'
  - type: text
    content: seeks wool and flax,
  - type: text
    content: and works with willing hands.
  '14':
  - type: text
    content: She is like the ships of the merchant;
  - type: text
    content: she brings her food from afar.
  '15':
  - type: text
    content: 'She '
  - type: note
    content: '[ch. 20:13]'
  - type: text
    content: rises while it is yet night
  - type: text
    content: 'and '
  - type: note
    content: Luke 12:42; [Ps. 111:5]
  - type: text
    content: provides food for her household
  - type: text
    content: and portions for her maidens.
  '16':
  - type: text
    content: She considers a field and buys it;
  - type: text
    content: with the fruit of her hands she plants a vineyard.
  '17':
  - type: text
    content: 'She '
  - type: note
    content: '[ver. 25]'
  - type: text
    content: dresses herself
  - type: note
    content: Hebrew She girds her loins
  - type: text
    content: ' with strength'
  - type: text
    content: and makes her arms strong.
  '18':
  - type: text
    content: She perceives that her merchandise is profitable.
  - type: text
    content: Her lamp does not go out at night.
  '19':
  - type: text
    content: She puts her hands to the distaff,
  - type: text
    content: and her hands hold the spindle.
  '2':
  - type: text
    content: What are you doing, my son?
  - type: note
    content: Hebrew What, my son?
  - type: text
    content: ' What are you doing, '
  - type: note
    content: Isa. 49:15
  - type: text
    content: son of my womb?
  - type: text
    content: 'What are you doing, '
  - type: note
    content: '[1 Sam. 1:27]'
  - type: text
    content: son of my vows?
  '20':
  - type: text
    content: 'She '
  - type: note
    content: '[Rom. 12:13; Eph. 4:28]'
  - type: text
    content: 'opens her hand to '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: the poor
  - type: text
    content: 'and reaches out her hands to '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: the needy.
  '21':
  - type: text
    content: She is not afraid of snow for her household,
  - type: text
    content: 'for all her household are clothed in '
  - type: note
    content: 2 Sam. 1:24
  - type: text
    content: scarlet.
  - type: note
    content: Or in double thickness
  '22':
  - type: text
    content: 'She makes '
  - type: note
    content: ch. 7:16
  - type: text
    content: bed coverings for herself;
  - type: text
    content: 'her clothing is '
  - type: note
    content: Gen. 41:42; Rev. 19:8, 14
  - type: text
    content: 'fine linen and '
  - type: note
    content: Judg. 8:26
  - type: text
    content: purple.
  '23':
  - type: text
    content: 'Her husband is known in '
  - type: note
    content: See Ruth 4:1, 2
  - type: text
    content: the gates
  - type: text
    content: when he sits among the elders of the land.
  '24':
  - type: text
    content: 'She makes '
  - type: note
    content: Judg. 14:12; Isa. 3:23
  - type: text
    content: linen garments and sells them;
  - type: text
    content: she delivers sashes to the merchant.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 17 ]'
  - type: text
    content: Strength and dignity are her clothing,
  - type: text
    content: and she laughs at the time to come.
  '26':
  - type: text
    content: She opens her mouth with wisdom,
  - type: text
    content: and the teaching of kindness is on her tongue.
  '27':
  - type: text
    content: She looks well to the ways of her household
  - type: text
    content: and does not eat the bread of idleness.
  '28':
  - type: text
    content: Her children rise up and call her blessed;
  - type: text
    content: 'her husband also, and he praises her:'
  '29':
  - type: text
    content: '“Many '
  - type: note
    content: Song 6:9
  - type: text
    content: 'women have done '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: excellently,
  - type: text
    content: but you surpass them all.”
  '3':
  - type: text
    content: 'Do '
  - type: note
    content: '[ch. 5:9]'
  - type: text
    content: not give your strength to women,
  - type: text
    content: 'your ways to those '
  - type: note
    content: '[ch. 7:26; Deut. 17:17; 1 Kgs. 11:1; Neh. 13:26]'
  - type: text
    content: who destroy kings.
  '30':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:16 ]'
  - type: text
    content: Charm is deceitful, and beauty is vain,
  - type: text
    content: 'but a woman who fears the '
  - type: text
    content: Lord
  - type: text
    content: ' is to be praised.'
  '31':
  - type: text
    content: Give her of the fruit of her hands,
  - type: text
    content: and let her works praise her in the gates.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Eccles. 10:17; [ 1 Kgs. 16:9; 20:16 ]
  - type: text
    content: It is not for kings, O Lemuel,
  - type: text
    content: 'it is not for kings '
  - type: note
    content: '[Hos. 4:11]'
  - type: text
    content: to drink wine,
  - type: text
    content: 'or for rulers to take '
  - type: note
    content: ch. 20:1
  - type: text
    content: strong drink,
  '5':
  - type: text
    content: lest they drink and forget what has been decreed
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 5:22, 23]'
  - type: text
    content: pervert the rights of all the afflicted.
  '6':
  - type: text
    content: 'Give strong drink to the one who '
  - type: note
    content: Job 29:13
  - type: text
    content: is perishing,
  - type: text
    content: 'and wine to '
  - type: note
    content: Job 3:20
  - type: text
    content: those in bitter distress;
  - type: note
    content: Hebrew those bitter in soul
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 104:15 ]'
  - type: text
    content: let them drink and forget their poverty
  - type: text
    content: and remember their misery no more.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Job 29:12, 15, 16; [ Isa. 1:17 ]
  - type: text
    content: Open your mouth for the mute,
  - type: text
    content: for the rights of all who are destitute.
  - type: note
    content: Hebrew are sons of passing away
  '9':
  - type: text
    content: 'Open your mouth, '
  - type: note
    content: Lev. 19:15; Deut. 1:16
  - type: text
    content: judge righteously,
  - type: note
    content: Jer. 22:16; [ Isa. 1:17 ]
  - type: text
    content: 'defend the rights of '
  - type: note
    content: ver. 20; Ps. 40:17; 86:1
  - type: text
    content: the poor and needy.
  - type: heading
    content: The Woman Who Fears the Lord
