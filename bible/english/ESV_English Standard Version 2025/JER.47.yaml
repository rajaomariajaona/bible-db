verses:
  '1':
  - type: heading
    content: Judgment on the Philistines
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Jeremiah the prophet '
  - type: note
    content: ch. 25:20; Ezek. 25:15, 16; Zeph. 2:5
  - type: text
    content: 'concerning the Philistines, before Pharaoh struck down '
  - type: note
    content: Amos 1:6, 7; Zeph. 2:4
  - type: text
    content: Gaza.
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: '[ch. 46:7, 8; Isa. 8:7 ]'
  - type: text
    content: 'Behold, waters are rising '
  - type: note
    content: See ch. 1:13
  - type: text
    content: out of the north,
  - type: note
    content: '[ch. 46:7, 8; Isa. 8:7 ]'
  - type: text
    content: and shall become an overflowing torrent;
  - type: text
    content: 'they shall overflow '
  - type: note
    content: '[ch. 8:16]'
  - type: text
    content: the land and all that fills it,
  - type: text
    content: the city and those who dwell in it.
  - type: text
    content: Men shall cry out,
  - type: text
    content: and every inhabitant of the land shall wail.
  '3':
  - type: text
    content: At the noise of the stamping of the hoofs of his stallions,
  - type: note
    content: Nah. 3:2
  - type: text
    content: at the rushing of his chariots, at the rumbling of their wheels,
  - type: text
    content: 'the fathers '
  - type: note
    content: ch. 46:5
  - type: text
    content: look not back to their children,
  - type: text
    content: so feeble are their hands,
  '4':
  - type: text
    content: because of the day that is coming to destroy
  - type: text
    content: 'all '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: the Philistines,
  - type: text
    content: 'to cut off from '
  - type: note
    content: Isa. 23:1, 2; Joel 3:4; See ch. 25:22
  - type: text
    content: Tyre and Sidon
  - type: text
    content: every helper that remains.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is destroying the Philistines,'
  - type: note
    content: Amos 1:8
  - type: text
    content: 'the remnant of the coastland of '
  - type: note
    content: Gen. 10:14; Amos 9:7
  - type: text
    content: Caphtor.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 48:37; Isa. 3:24 ]'
  - type: text
    content: Baldness has come upon Gaza;
  - type: note
    content: ch. 25:20; [ Judg. 1:18 ]
  - type: text
    content: Ashkelon has perished.
  - type: text
    content: O remnant of their valley,
  - type: note
    content: '[ch. 48:37 ]'
  - type: text
    content: how long will you gash yourselves?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:41; See Ezek. 21:3-5
  - type: text
    content: 'Ah, sword of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: How long till you are quiet?
  - type: text
    content: Put yourself into your scabbard;
  - type: text
    content: rest and be still!
  '7':
  - type: text
    content: How can it
  - type: note
    content: Septuagint, Vulgate; Hebrew you
  - type: text
    content: ' be quiet'
  - type: note
    content: '[ Ezek. 14:17 ]'
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' has given it a charge?'
  - type: text
    content: 'Against '
  - type: note
    content: ch. 25:20; [Judg. 1:18]
  - type: text
    content: Ashkelon and against the seashore
  - type: note
    content: Mic. 6:9
  - type: text
    content: he has appointed it.”
