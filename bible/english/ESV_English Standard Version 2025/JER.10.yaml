document_id: JER.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Idols and the Living God
  - type: text
    content: 'Hear the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks to you, O house of Israel. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:4; Ps. 31:5
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is the true God;'
  - type: note
    content: Ps. 42:2
  - type: text
    content: he is the living God and the everlasting King.
  - type: text
    content: At his wrath the earth quakes,
  - type: text
    content: and the nations cannot endure his indignation.
  '11':
  - type: text
    content: 'Thus shall you say to them: '
  - type: note
    content: '[Ps. 96:5]'
  - type: text
    content: '“The gods who did not make the heavens and the earth '
  - type: note
    content: ver. 15; Isa. 2:18; Zech. 13:2
  - type: text
    content: shall perish from the earth and from under the heavens.”
  - type: note
    content: This verse is in Aramaic
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-16, see ch. 51:15-19
  - type: text
    content: 'It is he who '
  - type: note
    content: Gen. 1:1, 6, 9; Ps. 104:5; Prov. 3:19
  - type: text
    content: made the earth by his power,
  - type: note
    content: Gen. 1:1, 6, 9; Ps. 104:5; Prov. 3:19
  - type: text
    content: who established the world by his wisdom,
  - type: text
    content: 'and '
  - type: note
    content: Job 9:8
  - type: text
    content: by his understanding stretched out the heavens.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 38:34; Ps. 104:6, 7 ]'
  - type: text
    content: When he utters his voice, there is a tumult of waters in the heavens,
  - type: note
    content: Ps. 135:7
  - type: text
    content: and he makes the mist rise from the ends of the earth.
  - type: note
    content: Ps. 135:7
  - type: text
    content: 'He makes lightning '
  - type: note
    content: ch. 14:22; Job 5:10
  - type: text
    content: for the rain,
  - type: note
    content: Ps. 135:7
  - type: text
    content: 'and he brings forth the wind '
  - type: note
    content: Job 38:22
  - type: text
    content: from his storehouses.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ver. 8 ; Prov. 30:2; [Rom. 1:22]
  - type: text
    content: Every man is stupid and without knowledge;
  - type: note
    content: See Isa. 42:17
  - type: text
    content: every goldsmith is put to shame by his idols,
  - type: text
    content: for his images are false,
  - type: note
    content: Ps. 135:17; Hab. 2:19
  - type: text
    content: and there is no breath in them.
  '15':
  - type: text
    content: They are worthless, a work of delusion;
  - type: text
    content: at the time of their punishment they shall perish.
  '16':
  - type: text
    content: 'Not like these is he who is '
  - type: note
    content: Ps. 16:5
  - type: text
    content: the portion of Jacob,
  - type: text
    content: for he is the one who formed all things,
  - type: note
    content: Deut. 32:9
  - type: text
    content: and Israel is the tribe of his inheritance;
  - type: note
    content: ch. 31:35; 32:18; 50:34
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is his name.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 6:1; Ezek. 12:3 ]'
  - type: text
    content: Gather up your bundle from the ground,
  - type: text
    content: O you who dwell under siege!
  '18':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: 1 Sam. 25:29
  - type: text
    content: “Behold, I am slinging out the inhabitants of the land
  - type: text
    content: at this time,
  - type: note
    content: Deut. 28:20
  - type: text
    content: and I will bring distress on them,
  - type: text
    content: that they may feel it.”
  '19':
  - type: text
    content: Woe is me because of my hurt!
  - type: note
    content: ch. 14:17; 30:12
  - type: text
    content: My wound is grievous.
  - type: text
    content: But I said, “Truly this is an affliction,
  - type: text
    content: and I must bear it.”
  '2':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “Learn not the way of the nations,
  - type: text
    content: nor be dismayed at the signs of the heavens
  - type: text
    content: because the nations are dismayed at them,
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:20; [ Isa. 54:2 ]
  - type: text
    content: My tent is destroyed,
  - type: text
    content: and all my cords are broken;
  - type: text
    content: my children have gone from me,
  - type: note
    content: ch. 31:15
  - type: text
    content: and they are not;
  - type: text
    content: there is no one to spread my tent again
  - type: text
    content: 'and '
  - type: note
    content: ch. 4:20; [Isa. 54:2]
  - type: text
    content: to set up my curtains.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:1; Ezek. 34:2
  - type: text
    content: 'For the shepherds '
  - type: note
    content: ver. 8
  - type: text
    content: are stupid
  - type: text
    content: 'and do not inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: therefore they have not prospered,
  - type: note
    content: Ezek. 34:5, 6
  - type: text
    content: and all their flock is scattered.
  '22':
  - type: text
    content: A voice, a rumor! Behold, it comes!—
  - type: note
    content: See ch. 1:13
  - type: text
    content: a great commotion out of the north country
  - type: text
    content: 'to make '
  - type: note
    content: See ch. 9:11
  - type: text
    content: the cities of Judah a desolation,
  - type: note
    content: See ch. 9:11
  - type: text
    content: a lair of jackals.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Prov. 16:1; 20:24; Dan. 5:23
  - type: text
    content: 'I know, O '
  - type: text
    content: Lord
  - type: text
    content: ', that the way of man is not in himself,'
  - type: text
    content: that it is not in man who walks to direct his steps.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 30:11; 46:28; Ps. 6:1; 38:1
  - type: text
    content: 'Correct me, O '
  - type: text
    content: Lord
  - type: text
    content: ', but in justice;'
  - type: text
    content: not in your anger, lest you bring me to nothing.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps. 79:6, 7
  - type: text
    content: Pour out your wrath on the nations that know you not,
  - type: text
    content: and on the peoples that call not on your name,
  - type: note
    content: ch. 8:16; 30:16; Ps. 14:4
  - type: text
    content: for they have devoured Jacob;
  - type: text
    content: they have devoured him and consumed him,
  - type: text
    content: and have laid waste his habitation.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Isa. 44:9
  - type: text
    content: for the customs of the peoples are vanity.
  - type: note
    content: Or vapor, or mist
  - type: note
    content: Isa. 40:20; 45:20
  - type: text
    content: A tree from the forest is cut down
  - type: text
    content: and worked with an axe by the hands of a craftsman.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Isa. 40:19
  - type: text
    content: They decorate it with silver and gold;
  - type: note
    content: Isa. 41:7
  - type: text
    content: they fasten it with hammer and nails
  - type: text
    content: so that it cannot move.
  '5':
  - type: text
    content: Their idols
  - type: note
    content: Hebrew They
  - type: text
    content: ' are like scarecrows in a cucumber field,'
  - type: text
    content: 'and '
  - type: note
    content: Ps. 115:5; 135:16; Hab. 2:18, 19; 1 Cor. 12:2
  - type: text
    content: they cannot speak;
  - type: note
    content: Ps. 115:7; Isa. 46:7
  - type: text
    content: they have to be carried,
  - type: text
    content: for they cannot walk.
  - type: text
    content: Do not be afraid of them,
  - type: note
    content: Isa. 41:23
  - type: text
    content: for they cannot do evil,
  - type: text
    content: neither is it in them to do good.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 49:19; Ex. 15:11; Ps. 86:8, 10
  - type: text
    content: 'There is none like you, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: you are great, and your name is great in might.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:22; Rev. 15:4
  - type: text
    content: Who would not fear you, O King of the nations?
  - type: text
    content: For this is your due;
  - type: text
    content: for among all the wise ones of the nations
  - type: text
    content: and in all their kingdoms
  - type: text
    content: there is none like you.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 41:29; Hab. 2:18; Zech. 10:2 ]'
  - type: text
    content: 'They are both '
  - type: note
    content: ver. 21
  - type: text
    content: stupid and foolish;
  - type: text
    content: the instruction of idols is but wood!
  '9':
  - type: text
    content: ' '
  - type: note
    content: Isa. 40:19
  - type: text
    content: 'Beaten silver is brought from '
  - type: note
    content: Gen. 10:4; See 1 Kgs. 10:22
  - type: text
    content: Tarshish,
  - type: text
    content: 'and gold from '
  - type: note
    content: Dan. 10:5
  - type: text
    content: Uphaz.
  - type: note
    content: Isa. 40:19
  - type: text
    content: They are the work of the craftsman and of the hands of the goldsmith;
  - type: text
    content: their clothing is violet and purple;
  - type: note
    content: Ps. 115:4
  - type: text
    content: they are all the work of skilled men.
