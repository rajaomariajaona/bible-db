document_id: JOS.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jericho
  - type: text
    content: 'Now Jericho was shut up inside and outside because of the people of Israel. None went out, and none came in. '
  '10':
  - type: text
    content: 'But Joshua commanded the people, “You shall not shout or make your voice heard, neither shall any word go out of your mouth, until the day I tell you to shout. Then you shall shout.” '
  '11':
  - type: text
    content: 'So he caused the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' to circle the city, going about it once. And they came into the camp and spent the night in the camp.'
  '12':
  - type: text
    content: 'Then Joshua rose early in the morning, and '
  - type: note
    content: See ch. 3:6
  - type: text
    content: 'the priests took up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And the seven priests bearing the seven trumpets of rams’ horns before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' walked on, and they blew the trumpets continually. And the armed men were walking before them, and the rear guard was walking after the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', while the trumpets blew continually. '
  '14':
  - type: text
    content: And the second day they marched around the city once, and returned into the camp. So they did for six days.
  '15':
  - type: text
    content: 'On the seventh day they rose early, at the dawn of day, and marched around the city in the same manner seven times. It was only on that day that they marched around the city seven times. '
  '16':
  - type: text
    content: 'And at the seventh time, when the priests had blown the trumpets, Joshua said to the people, “Shout, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you the city. '
  '17':
  - type: text
    content: 'And the city and all that is within it shall be '
  - type: note
    content: Lev. 27:28; Deut. 20:17
  - type: text
    content: 'devoted to the '
  - type: text
    content: Lord
  - type: text
    content: ' for destruction.'
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction); also verses 18, 21
  - type: text
    content: ' Only Rahab the prostitute and all who are with her in her house shall live, because she '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'hid the messengers whom we sent. '
  '18':
  - type: text
    content: 'But you, keep yourselves from the things devoted to destruction, lest when you have devoted them you take any of the devoted things and make the camp of Israel '
  - type: note
    content: '[ch. 7:12]'
  - type: text
    content: 'a thing for destruction and '
  - type: note
    content: ch. 7:25; 1 Chr. 2:7
  - type: text
    content: 'bring trouble upon it. '
  '19':
  - type: text
    content: 'But all silver and gold, and every vessel of bronze and iron, are holy to the '
  - type: text
    content: Lord
  - type: text
    content: '; they shall go into the treasury of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “See, '
  - type: note
    content: ch. 2:9, 24; Deut. 7:24; Neh. 9:24; [ch. 8:1]
  - type: text
    content: 'I have given Jericho into your hand, with its king and mighty men of valor. '
  '20':
  - type: text
    content: 'So the people shouted, and the trumpets were blown. As soon as the people heard the sound of the trumpet, the people shouted a great shout, and '
  - type: note
    content: ver. 5; Heb. 11:30
  - type: text
    content: 'the wall fell down flat, so that the people went up into the city, every man straight before him, and they captured the city. '
  '21':
  - type: text
    content: 'Then they '
  - type: note
    content: '[Deut. 7:2]'
  - type: text
    content: devoted all in the city to destruction, both men and women, young and old, oxen, sheep, and donkeys, with the edge of the sword.
  '22':
  - type: text
    content: 'But to the two men who had spied out the land, Joshua said, “Go into the prostitute’s house and bring out from there the woman and all who belong to her, '
  - type: note
    content: ch. 2:14; Heb. 11:31
  - type: text
    content: 'as you swore to her.” '
  '23':
  - type: text
    content: 'So the young men who had been spies went in and brought out Rahab and '
  - type: note
    content: ch. 2:13
  - type: text
    content: 'her father and mother and brothers and all who belonged to her. And they brought all her relatives and put them outside the camp of Israel. '
  '24':
  - type: text
    content: 'And they burned the city with fire, and everything in it. '
  - type: note
    content: ver. 19
  - type: text
    content: 'Only the silver and gold, and the vessels of bronze and of iron, they put into the treasury of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'But Rahab the prostitute and her father’s household and all who belonged to her, Joshua saved alive. And '
  - type: note
    content: '[Matt. 1:5]'
  - type: text
    content: she has lived in Israel to this day, because she hid the messengers whom Joshua sent to spy out Jericho.
  '26':
  - type: text
    content: 'Joshua laid an oath on them at that time, saying, '
  - type: note
    content: '[1 Kgs. 16:34]'
  - type: text
    content: '“Cursed before the '
  - type: text
    content: Lord
  - type: text
    content: ' be the man who rises up and rebuilds this city, Jericho.'
  - type: text
    content: “At the cost of his firstborn
  - type: text
    content: shall he lay its foundation,
  - type: text
    content: and at the cost of his youngest son
  - type: text
    content: shall he set up its gates.”
  '27':
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joshua, and '
  - type: note
    content: ch. 9:9
  - type: text
    content: his fame was in all the land.
  '3':
  - type: text
    content: 'You shall march around the city, all the men of war going around the city once. Thus shall you do for six days. '
  '4':
  - type: text
    content: 'Seven priests shall bear seven '
  - type: note
    content: Judg. 7:16, 22
  - type: text
    content: 'trumpets of '
  - type: note
    content: ver. 5, 6, 8, 13
  - type: text
    content: 'rams’ horns before the ark. On the seventh day you shall march around the city seven times, and '
  - type: note
    content: Num. 10:8
  - type: text
    content: 'the priests shall blow the trumpets. '
  '5':
  - type: text
    content: And when they make a long blast with the ram’s horn, when you hear the sound of the trumpet, then all the people shall shout with a great shout, and the wall of the city will fall down flat,
  - type: note
    content: Hebrew under itself; also verse 20
  - type: text
    content: ' and the people shall go up, everyone straight before him.” '
  '6':
  - type: text
    content: 'So Joshua the son of Nun called the priests and said to them, “Take up the ark of the covenant and let seven priests bear seven trumpets of rams’ horns before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '7':
  - type: text
    content: 'And he said to the people, “Go forward. March around the city and let '
  - type: note
    content: ch. 4:12, 13
  - type: text
    content: 'the armed men pass on before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '8':
  - type: text
    content: 'And just as Joshua had commanded the people, the seven priests bearing the seven trumpets of rams’ horns before the '
  - type: text
    content: Lord
  - type: text
    content: ' went forward, blowing the trumpets, with the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' following them. '
  '9':
  - type: text
    content: 'The armed men were walking before the priests who were blowing the trumpets, and the '
  - type: note
    content: ver. 13; Num. 10:25; Isa. 52:12; 58:8
  - type: text
    content: 'rear guard was walking after the ark, while the trumpets blew continually. '
