        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'I have given Jericho into your hand, with its king and mighty men of valor. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people shouted, and the trumpets were blown. As soon as the people heard the sound of the trumpet, the people shouted a great shout, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:30
      marker-yv: yv-n
    - type: text
      text: 'the wall fell down flat, so that the people went up into the city, every man straight before him, and they captured the city. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: devoted all in the city to destruction, both men and women, young and old, oxen, sheep, and donkeys, with the edge of the sword.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But to the two men who had spied out the land, Joshua said, “Go into the prostitute’s house and bring out from there the woman and all who belong to her, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:31
      marker-yv: yv-n
    - type: text
      text: 'as you swore to her.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the young men who had been spies went in and brought out Rahab and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:13
      marker-yv: yv-n
    - type: text
      text: 'her father and mother and brothers and all who belonged to her. And they brought all her relatives and put them outside the camp of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they burned the city with fire, and everything in it. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'Only the silver and gold, and the vessels of bronze and of iron, they put into the treasury of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Rahab the prostitute and her father’s household and all who belonged to her, Joshua saved alive. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: she has lived in Israel to this day, because she hid the messengers whom Joshua sent to spy out Jericho.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua laid an oath on them at that time, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 16:34
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Cursed before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be the man who rises up and rebuilds this city, Jericho.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At the cost of his firstborn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shall he lay its foundation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and at the cost of his youngest son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shall he set up its gates.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:5
      marker-yv: yv-n
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joshua, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
