  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they make a long blast with the ram’s horn, when you hear the sound of the trumpet, then all the people shall shout with a great shout, and the wall of the city will fall down flat,
    - type: usfm
