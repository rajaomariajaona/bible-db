verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jericho
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jericho was shut up inside and outside because of the people of Israel. None went out, and none came in. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joshua commanded the people, “You shall not shout or make your voice heard, neither shall any word go out of your mouth, until the day I tell you to shout. Then you shall shout.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he caused the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to circle the city, going about it once. And they came into the camp and spent the night in the camp.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua rose early in the morning, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:6
      marker-yv: yv-n
    - type: text
      text: 'the priests took up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the seven priests bearing the seven trumpets of rams’ horns before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' walked on, and they blew the trumpets continually. And the armed men were walking before them, and the rear guard was walking after the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', while the trumpets blew continually. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the second day they marched around the city once, and returned into the camp. So they did for six days.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day they rose early, at the dawn of day, and marched around the city in the same manner seven times. It was only on that day that they marched around the city seven times. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at the seventh time, when the priests had blown the trumpets, Joshua said to the people, “Shout, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you the city. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the city and all that is within it shall be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 27:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 20:17
      marker-yv: yv-n
    - type: text
      text: 'devoted to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for destruction.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, set apart (devoted) as an offering to the Lord (for destruction); also verses 18, 21
      marker-yv: yv-n
    - type: text
      text: ' Only Rahab the prostitute and all who are with her in her house shall live, because she '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:4
      marker-yv: yv-n
    - type: text
      text: 'hid the messengers whom we sent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you, keep yourselves from the things devoted to destruction, lest when you have devoted them you take any of the devoted things and make the camp of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'a thing for destruction and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 2:7
      marker-yv: yv-n
    - type: text
      text: 'bring trouble upon it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But all silver and gold, and every vessel of bronze and iron, are holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; they shall go into the treasury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “See, '
    - type: usfm
