document_id: 2CH.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Worships at Gibeon
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 2:46
  - type: text
    content: 'Solomon the son of David established himself in his kingdom, '
  - type: note
    content: 1 Chr. 29:25
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was with him and made him exceedingly great.'
  '10':
  - type: text
    content: 'Give me now wisdom and knowledge to '
  - type: note
    content: '[Num. 27:17; Deut. 31:2]'
  - type: text
    content: 'go out and come in before this people, for who can govern this people of yours, which is so great?” '
  '11':
  - type: text
    content: 'God answered Solomon, “Because this was in your heart, and you have not asked for '
  - type: note
    content: Eccles. 5:19; 6:2
  - type: text
    content: 'possessions, wealth, honor, or the life of those who hate you, and have not even asked for long life, but have asked for wisdom and knowledge for yourself that you may govern my people over whom I have made you king, '
  '12':
  - type: text
    content: 'wisdom and knowledge are granted to you. I will also give you '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'riches, possessions, and honor, '
  - type: note
    content: ch. 9:22; [1 Chr. 29:25]
  - type: text
    content: 'such as none of the kings had who were before you, and none after you shall have the like.” '
  '13':
  - type: text
    content: So Solomon came from
  - type: note
    content: Septuagint, Vulgate; Hebrew to
  - type: text
    content: ' the '
  - type: note
    content: See 1 Kgs. 3:4
  - type: text
    content: 'high place at Gibeon, from before '
  - type: note
    content: ver. 3
  - type: text
    content: the tent of meeting, to Jerusalem. And he reigned over Israel.
  - type: heading
    content: Solomon Given Wealth
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-17, see ch. 9:25-28; 1 Kgs. 10:26-29
  - type: text
    content: 'Solomon gathered together chariots and horsemen. '
  - type: note
    content: '[1 Kgs. 4:26]'
  - type: text
    content: 'He had 1,400 chariots and 12,000 horsemen, whom he stationed '
  - type: note
    content: '[1 Kgs. 9:19]'
  - type: text
    content: 'in the chariot cities and with the king in Jerusalem. '
  '15':
  - type: text
    content: 'And the king made silver and gold as common in Jerusalem as stone, and he made cedar as plentiful as the sycamore of the Shephelah. '
  '16':
  - type: text
    content: 'And Solomon’s import of horses was from Egypt and Kue, and the king’s traders would buy them from Kue for a price. '
  '17':
  - type: text
    content: They imported a chariot from Egypt for 600 shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver, and a horse for 150. Likewise through them these were exported to all the kings of the Hittites and the kings of Syria.'
  '2':
  - type: text
    content: 'Solomon spoke to all Israel, to the '
  - type: note
    content: 1 Chr. 27:1
  - type: text
    content: 'commanders of thousands and of hundreds, to the judges, and to all the leaders in all Israel, the heads of fathers’ houses. '
  '3':
  - type: text
    content: 'And Solomon, and all the assembly with him, went to '
  - type: note
    content: See 1 Kgs. 3:4
  - type: text
    content: 'the high place that was at Gibeon, '
  - type: note
    content: 1 Chr. 16:39; 21:29
  - type: text
    content: 'for '
  - type: note
    content: Ex. 29:10; Lev. 10:7; Num. 14:10
  - type: text
    content: 'the tent of meeting of God, which Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had made in the wilderness, was there. '
  '4':
  - type: note
    content: See 2 Sam. 6:2-17; 1 Chr. 15:25–16:1
  - type: text
    content: '(But David had brought up the ark of God from Kiriath-jearim to the place that David had prepared for it, for he had pitched a tent for it in Jerusalem.) '
  '5':
  - type: text
    content: 'Moreover, '
  - type: note
    content: Ex. 27:1, 2; 38:1, 2
  - type: text
    content: 'the bronze altar that '
  - type: note
    content: Ex. 31:2
  - type: text
    content: 'Bezalel the son of Uri, son of Hur, had made, was there before the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: '. And Solomon and the assembly '
  - type: note
    content: '[1 Chr. 13:3]'
  - type: text
    content: sought it
  - type: note
    content: Or him
  - type: text
    content: ' out. '
  '6':
  - type: text
    content: 'And Solomon went up there to the bronze altar before the '
  - type: text
    content: Lord
  - type: text
    content: ', which was at the tent of meeting, '
  - type: note
    content: 1 Kgs. 3:4
  - type: text
    content: and offered a thousand burnt offerings on it.
  - type: heading
    content: Solomon Prays for Wisdom
  '7':
  - type: text
    content: ' '
  - type: note
    content: For ver. 7-12, see 1 Kgs. 3:5-14
  - type: text
    content: 'In that night God appeared to Solomon, and said to him, “Ask what I shall give you.” '
  '8':
  - type: text
    content: 'And Solomon said to God, “You have shown great and steadfast love to David my father, '
  - type: note
    content: 1 Chr. 28:5
  - type: text
    content: 'and have made me king in his place. '
  '9':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God, '
  - type: note
    content: ch. 6:17; 1 Kgs. 8:26
  - type: text
    content: 'let your word to David my father be now fulfilled, for you have made me king over a people as numerous '
  - type: note
    content: Gen. 13:16
  - type: text
    content: 'as the dust of the earth. '
