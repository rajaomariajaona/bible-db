document_id: 2CH.1,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Worships at Gibeon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:46
      marker-yv: yv-n
    - type: text
      text: 'Solomon the son of David established himself in his kingdom, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 29:25
      marker-yv: yv-n
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God was with him and made him exceedingly great.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give me now wisdom and knowledge to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 27:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 31:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'go out and come in before this people, for who can govern this people of yours, which is so great?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God answered Solomon, “Because this was in your heart, and you have not asked for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eccles. 5:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:2
      marker-yv: yv-n
    - type: text
      text: 'possessions, wealth, honor, or the life of those who hate you, and have not even asked for long life, but have asked for wisdom and knowledge for yourself that you may govern my people over whom I have made you king, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'wisdom and knowledge are granted to you. I will also give you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'riches, possessions, and honor, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 29:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'such as none of the kings had who were before you, and none after you shall have the like.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Solomon came from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Vulgate; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: to
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 3:4
      marker-yv: yv-n
    - type: text
      text: 'high place at Gibeon, from before '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: the tent of meeting, to Jerusalem. And he reigned over Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Given Wealth
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 14-17, see ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:25-28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 10:26-29
      marker-yv: yv-n
    - type: text
      text: 'Solomon gathered together chariots and horsemen. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 4:26
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'He had 1,400 chariots and 12,000 horsemen, whom he stationed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 9:19
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in the chariot cities and with the king in Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king made silver and gold as common in Jerusalem as stone, and he made cedar as plentiful as the sycamore of the Shephelah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon’s import of horses was from Egypt and Kue, and the king’s traders would buy them from Kue for a price. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They imported a chariot from Egypt for 600 shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'shekel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 2/5 ounce or 11 grams
      marker-yv: yv-n
    - type: text
      text: ' of silver, and a horse for 150. Likewise through them these were exported to all the kings of the Hittites and the kings of Syria.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon spoke to all Israel, to the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 27:1
      marker-yv: yv-n
    - type: text
      text: 'commanders of thousands and of hundreds, to the judges, and to all the leaders in all Israel, the heads of fathers’ houses. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon, and all the assembly with him, went to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 3:4
      marker-yv: yv-n
    - type: text
      text: 'the high place that was at Gibeon, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 16:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:29
      marker-yv: yv-n
    - type: text
      text: 'for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 29:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 10:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:10
      marker-yv: yv-n
    - type: text
      text: 'the tent of meeting of God, which Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had made in the wilderness, was there. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 6:2-17
      - type: text
        text: ; 1 Chr. 15:25–16:1
      marker-yv: yv-n
    - type: text
      text: '(But David had brought up the ark of God from Kiriath-jearim to the place that David had prepared for it, for he had pitched a tent for it in Jerusalem.) '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 27:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'the bronze altar that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 31:2
      marker-yv: yv-n
    - type: text
      text: 'Bezalel the son of Uri, son of Hur, had made, was there before the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And Solomon and the assembly '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 13:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: sought it
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: him
      marker-yv: yv-n
    - type: text
      text: ' out. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon went up there to the bronze altar before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which was at the tent of meeting, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 3:4
      marker-yv: yv-n
    - type: text
      text: and offered a thousand burnt offerings on it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Prays for Wisdom
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 7-12, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 3:5-14
      marker-yv: yv-n
    - type: text
      text: 'In that night God appeared to Solomon, and said to him, “Ask what I shall give you.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon said to God, “You have shown great and steadfast love to David my father, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 28:5
      marker-yv: yv-n
    - type: text
      text: 'and have made me king in his place. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:26
      marker-yv: yv-n
    - type: text
      text: 'let your word to David my father be now fulfilled, for you have made me king over a people as numerous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 13:16
      marker-yv: yv-n
    - type: text
      text: 'as the dust of the earth. '
