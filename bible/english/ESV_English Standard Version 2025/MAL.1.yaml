document_id: MAL.1,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'The oracle of the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Israel by Malachi.'
  - type: note
    content: Malachi means my messenger
  - type: heading
    content: The Lord’s Love for Israel
  '10':
  - type: note
    content: '[Isa. 1:13]'
  - type: text
    content: 'Oh that there were one among you who would shut the doors, that you might not kindle fire on my altar in vain! I have no pleasure in you, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: '[Isa. 1:11; Jer. 6:20; Amos 5:21]'
  - type: text
    content: 'and I will not accept an offering from your hand. '
  '11':
  - type: text
    content: 'For from the rising of the sun to its setting my name '
  - type: note
    content: '[Isa. 2:2; 56:7; 60:3; 66:19]'
  - type: text
    content: will be
  - type: note
    content: Or is (three times in verse 11; also verse 14)
  - type: text
    content: ' great among the nations, and in every place incense will be offered to my name, and a pure offering. For my name '
  - type: note
    content: '[Isa. 2:2; 56:7; 60:3; 66:19]'
  - type: text
    content: 'will be great among the nations, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '12':
  - type: text
    content: 'But you profane it when you say that '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'the Lord’s table is polluted, and its fruit, that is, its food, may be despised. '
  '13':
  - type: text
    content: 'But you say, '
  - type: note
    content: Isa. 43:23; [ch. 3:14; Mic. 6:3]
  - type: text
    content: '‘What a weariness this is,’ and you snort at it, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  - type: note
    content: '[ver. 8; Lev. 22:20]'
  - type: text
    content: 'You bring what has been taken by violence or is lame or sick, and this you bring as your offering! Shall I accept that from your hand? says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Cursed be the cheat who has '
  - type: note
    content: See Ex. 12:5
  - type: text
    content: 'a male in his flock, and '
  - type: note
    content: '[Lev. 22:21]'
  - type: text
    content: 'vows it, and yet sacrifices to the Lord what is blemished. For '
  - type: note
    content: See Zech. 14:9
  - type: text
    content: 'I am a great King, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and my name '
  - type: note
    content: Ps. 47:2; 76:12
  - type: text
    content: will be feared among the nations.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Deut. 7:8; Jer. 31:3
  - type: text
    content: '“I have loved you,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[ch. 2:14, 17; 3:7, 8, 13]'
  - type: text
    content: 'But you say, “How have you loved us?” “Is not Esau '
  - type: note
    content: '[Amos 1:11; Obad. 10]'
  - type: text
    content: 'Jacob’s brother?” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. “Yet '
  - type: note
    content: Cited Rom. 9:13
  - type: text
    content: 'I have loved Jacob '
  '3':
  - type: text
    content: 'but Esau I have hated. '
  - type: note
    content: Isa. 34:13; Jer. 49:10, 18; Ezek. 35:3, 4; Joel 3:19
  - type: text
    content: 'I have laid waste his hill country and left his heritage to jackals of the desert.” '
  '4':
  - type: text
    content: 'If Edom says, “We are shattered but we will rebuild the ruins,” the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts says, “They may build, but I will tear down, and they will be called ‘the wicked country,’ and ‘the people with whom the '
  - type: text
    content: Lord
  - type: text
    content: ' is angry forever.’” '
  '5':
  - type: note
    content: Ps. 91:8
  - type: text
    content: 'Your own eyes shall see this, and you shall say, “Great is the '
  - type: text
    content: Lord
  - type: text
    content: ' beyond the border of Israel!”'
  - type: heading
    content: The Priests’ Polluted Offerings
  '6':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 20:12
  - type: text
    content: '“A son honors his father, and a servant his master. If then I am '
  - type: note
    content: Ex. 4:22; Hos. 11:1
  - type: text
    content: 'a father, where is my honor? And if I am '
  - type: note
    content: '[Luke 6:46]'
  - type: text
    content: 'a master, where is my fear? says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts to you, O priests, who despise my name. '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'But you say, ‘How have we despised your name?’ '
  '7':
  - type: note
    content: '[ver. 8; ch. 2:12; 3:3]'
  - type: text
    content: 'By offering polluted food upon my altar. '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'But you say, ‘How have we polluted you?’ By saying that '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: '’s table may be despised. '
  '8':
  - type: note
    content: '[ver. 13]; See Lev. 22:22'
  - type: text
    content: 'When you offer blind animals in sacrifice, is that not evil? And when you offer those that are lame or sick, is that not evil? Present that to your governor; will he accept you or show you favor? says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '9':
  - type: text
    content: 'And now '
  - type: note
    content: See Zech. 7:2
  - type: text
    content: 'entreat the favor of God, that he may be gracious to us. With such a gift from your hand, '
  - type: note
    content: See Deut. 10:17
  - type: text
    content: 'will he show favor to any of you? says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
