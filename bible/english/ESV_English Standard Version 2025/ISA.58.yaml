document_id: ISA.58,59
type_code: eng
verses:
  '1':
  - type: heading
    content: True and False Fasting
  - type: text
    content: “Cry aloud; do not hold back;
  - type: note
    content: Lev. 25:9; [ Joel 2:1 ]
  - type: text
    content: lift up your voice like a trumpet;
  - type: note
    content: Mic. 3:8
  - type: text
    content: declare to my people their transgression,
  - type: text
    content: to the house of Jacob their sins.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ver. 7, 8
  - type: text
    content: if you pour yourself out for the hungry
  - type: text
    content: and satisfy the desire of the afflicted,
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: then shall your light rise in the darkness
  - type: text
    content: and your gloom be as the noonday.
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will guide you continually'
  - type: text
    content: and satisfy your desire in scorched places
  - type: text
    content: and make your bones strong;
  - type: text
    content: 'and you shall be '
  - type: note
    content: Jer. 31:12
  - type: text
    content: like a watered garden,
  - type: text
    content: like a spring of water,
  - type: text
    content: whose waters do not fail.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 61:4; 65:21; [ Ezra 6:14; Neh. 4:6 ]
  - type: text
    content: And your ancient ruins shall be rebuilt;
  - type: text
    content: you shall raise up the foundations of many generations;
  - type: text
    content: you shall be called the repairer of the breach,
  - type: text
    content: the restorer of streets to dwell in.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 56:2; See Neh. 13:15-21
  - type: text
    content: “If you turn back your foot from the Sabbath,
  - type: text
    content: from doing your pleasure
  - type: note
    content: Or business
  - type: text
    content: ' on my holy day,'
  - type: text
    content: and call the Sabbath a delight
  - type: text
    content: 'and the holy day of the '
  - type: text
    content: Lord
  - type: text
    content: ' honorable;'
  - type: text
    content: if you honor it, not going your own ways,
  - type: text
    content: 'or seeking '
  - type: note
    content: ver. 3
  - type: text
    content: your own pleasure,
  - type: note
    content: Or pursuing your own business
  - type: text
    content: ' or talking idly;'
  - type: note
    content: Hebrew or speaking a word
  '14':
  - type: text
    content: 'then you shall take delight in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Deut. 32:13
  - type: text
    content: and I will make you ride on the heights of the earth;
  - type: note
    content: Or of the land
  - type: note
    content: Jer. 50:19
  - type: text
    content: I will feed you with the heritage of Jacob your father,
  - type: note
    content: ch. 1:20
  - type: text
    content: 'for the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.”'
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:11; 29:13; Zech. 7:5, 6 ]'
  - type: text
    content: Yet they seek me daily
  - type: text
    content: and delight to know my ways,
  - type: text
    content: as if they were a nation that did righteousness
  - type: text
    content: and did not forsake the judgment of their God;
  - type: text
    content: they ask of me righteous judgments;
  - type: text
    content: they delight to draw near to God.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Mal. 3:14 ]'
  - type: text
    content: ‘Why have we fasted, and you see it not?
  - type: text
    content: Why have we humbled ourselves, and you take no knowledge of it?’
  - type: text
    content: Behold, in the day of your fast you seek your own pleasure,
  - type: note
    content: Or pursue your own business
  - type: note
    content: '[ch. 60:17 ]; See Neh. 5:1-8'
  - type: text
    content: and oppress all your workers.
  '4':
  - type: text
    content: Behold, you fast only to quarrel and to fight
  - type: text
    content: and to hit with a wicked fist.
  - type: text
    content: Fasting like yours this day
  - type: text
    content: will not make your voice to be heard on high.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Zech. 7:5
  - type: text
    content: Is such the fast that I choose,
  - type: note
    content: Lev. 16:29
  - type: text
    content: a day for a person to humble himself?
  - type: text
    content: Is it to bow down his head like a reed,
  - type: text
    content: and to spread sackcloth and ashes under him?
  - type: text
    content: Will you call this a fast,
  - type: text
    content: 'and a day acceptable to the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '6':
  - type: text
    content: '“Is not this the fast that I choose:'
  - type: note
    content: See Neh. 5:10-12
  - type: text
    content: to loose the bonds of wickedness,
  - type: text
    content: 'to undo the straps '
  - type: note
    content: ver. 9
  - type: text
    content: of the yoke,
  - type: text
    content: to let the oppressed
  - type: note
    content: Or bruised
  - type: text
    content: ' go free,'
  - type: text
    content: and to break every yoke?
  '7':
  - type: text
    content: 'Is it not '
  - type: note
    content: ver. 10; Ezek. 18:7; [Matt. 25:35]
  - type: text
    content: to share your bread with the hungry
  - type: text
    content: and bring the homeless poor into your house;
  - type: text
    content: when you see the naked, to cover him,
  - type: note
    content: Neh. 5:5
  - type: text
    content: and not to hide yourself from your own flesh?
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 11:17 ]'
  - type: text
    content: Then shall your light break forth like the dawn,
  - type: note
    content: Jer. 30:17
  - type: text
    content: and your healing shall spring up speedily;
  - type: note
    content: Ps. 85:13
  - type: text
    content: your righteousness shall go before you;
  - type: note
    content: '[ch. 52:12 ]'
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be your rear guard.'
  '9':
  - type: text
    content: 'Then you shall call, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer;'
  - type: text
    content: you shall cry, and he will say, ‘Here I am.’
  - type: text
    content: 'If you take away '
  - type: note
    content: ver. 6
  - type: text
    content: the yoke from your midst,
  - type: note
    content: Prov. 6:13
  - type: text
    content: the pointing of the finger, and speaking wickedness,
