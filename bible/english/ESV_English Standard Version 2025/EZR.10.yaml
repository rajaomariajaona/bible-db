      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 25:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'until the fierce wrath of our God over this matter is turned away from us.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Jonathan the son of Asahel and Jahzeiah the son of Tikvah opposed this, and '
    - type: usfm
