      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Syriac; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: And there were selected Ezra . . .
      marker-yv: yv-n
    - type: text
      text: ' heads of fathers’ houses, according to their fathers’ houses, each of them designated by name. On the first day of the tenth month they sat down to examine the matter; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and by the first day of the first month they had come to the end of all the men who had married foreign women.
  - type: usfm
    marker: s1
    children:
