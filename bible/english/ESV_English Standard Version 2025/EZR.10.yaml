document_id: EZR.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Confess Their Sin
  - type: text
    content: ' '
  - type: note
    content: Neh. 1:4, 5
  - type: text
    content: 'While Ezra prayed and '
  - type: note
    content: Neh. 1:6; Dan. 9:20
  - type: text
    content: 'made confession, weeping and '
  - type: note
    content: Deut. 9:18
  - type: text
    content: 'casting himself down '
  - type: note
    content: '[2 Chr. 20:9]'
  - type: text
    content: 'before the house of God, a very great assembly of men, women, and children, gathered to him out of Israel, for the people wept bitterly. '
  '10':
  - type: text
    content: 'And Ezra the priest stood up and said to them, “You have broken faith and married foreign women, and so increased the guilt of Israel. '
  '11':
  - type: text
    content: 'Now then '
  - type: note
    content: '[Josh. 7:19]'
  - type: text
    content: 'make confession to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers and do his will. '
  - type: note
    content: ver. 3
  - type: text
    content: 'Separate yourselves from the peoples of the land and from the foreign wives.” '
  '12':
  - type: text
    content: 'Then all the assembly answered with a loud voice, “It is so; we must do as you have said. '
  '13':
  - type: text
    content: 'But the people are many, and it is a time of heavy rain; we cannot stand in the open. Nor is this a task for one day or for two, for we have greatly transgressed in this matter. '
  '14':
  - type: text
    content: 'Let our officials stand for the whole assembly. Let all in our cities who have taken foreign wives come '
  - type: note
    content: Neh. 13:31
  - type: text
    content: 'at appointed times, and with them the elders and judges of every city, '
  - type: note
    content: 2 Chr. 29:10; 30:8; [Num. 25:4]
  - type: text
    content: 'until the fierce wrath of our God over this matter is turned away from us.” '
  '15':
  - type: text
    content: 'Only Jonathan the son of Asahel and Jahzeiah the son of Tikvah opposed this, and '
  - type: note
    content: ch. 8:16
  - type: text
    content: 'Meshullam and '
  - type: note
    content: Neh. 11:16
  - type: text
    content: Shabbethai the Levite supported them.
  '16':
  - type: text
    content: Then the returned exiles did so. Ezra the priest selected men,
  - type: note
    content: Syriac; Hebrew And there were selected Ezra . . .
  - type: text
    content: ' heads of fathers’ houses, according to their fathers’ houses, each of them designated by name. On the first day of the tenth month they sat down to examine the matter; '
  '17':
  - type: text
    content: and by the first day of the first month they had come to the end of all the men who had married foreign women.
  - type: heading
    content: Those Guilty of Intermarriage
  '18':
  - type: text
    content: 'Now there were found some of the sons of the priests who had married foreign women: Maaseiah, Eliezer, Jarib, and Gedaliah, some of the sons of '
  - type: note
    content: ch. 3:2
  - type: text
    content: 'Jeshua the son of Jozadak and his brothers. '
  '19':
  - type: text
    content: 'They '
  - type: note
    content: See 2 Kgs. 10:15
  - type: text
    content: 'pledged themselves to put away their wives, and their guilt offering was '
  - type: note
    content: Lev. 6:6
  - type: text
    content: a ram of the flock for their guilt.
  - type: note
    content: Or as their reparation
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Shecaniah the son of Jehiel, of the sons of Elam, addressed Ezra: '
  - type: note
    content: See ch. 9:2
  - type: text
    content: '“We have broken faith with our God and have married foreign women from the peoples of the land, but even now there is hope for Israel in spite of this. '
  '20':
  - type: note
    content: For ver. 20-43, see ch. 2:3-42
  - type: text
    content: 'Of the sons of Immer: Hanani and Zebadiah. '
  '21':
  - type: note
    content: '[ver. 31]'
  - type: text
    content: 'Of the sons of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah. '
  '22':
  - type: text
    content: 'Of the sons of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad, and Elasah.'
  '23':
  - type: text
    content: 'Of the Levites: Jozabad, Shimei, Kelaiah (that is, Kelita), Pethahiah, Judah, and Eliezer. '
  '24':
  - type: text
    content: 'Of the singers: Eliashib. Of the gatekeepers: Shallum, Telem, and Uri.'
  '25':
  - type: text
    content: 'And of Israel: of the sons of Parosh: Ramiah, Izziah, Malchijah, Mijamin, Eleazar, Hashabiah,'
  - type: note
    content: Septuagint; Hebrew Malchijah
  - type: text
    content: ' and Benaiah. '
  '26':
  - type: text
    content: 'Of the sons of Elam: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth, and Elijah. '
  '27':
  - type: text
    content: 'Of the sons of Zattu: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad, and Aziza. '
  '28':
  - type: text
    content: 'Of the sons of Bebai were Jehohanan, Hananiah, Zabbai, and Athlai. '
  '29':
  - type: text
    content: 'Of the sons of Bani were Meshullam, Malluch, Adaiah, Jashub, Sheal, and Jeremoth. '
  '3':
  - type: text
    content: 'Therefore '
  - type: note
    content: 2 Chr. 34:31
  - type: text
    content: 'let us make a covenant with our God to put away all these wives and '
  - type: note
    content: '[ver. 44]'
  - type: text
    content: their children, according to the counsel of my lord
  - type: note
    content: Or of the Lord
  - type: text
    content: ' and of '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'those who tremble at the commandment of our God, and let it be done '
  - type: note
    content: Deut. 7:2, 3
  - type: text
    content: 'according to the Law. '
  '30':
  - type: text
    content: 'Of the sons of Pahath-moab: Adna, Chelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui, and Manasseh. '
  '31':
  - type: text
    content: 'Of the '
  - type: note
    content: ver. 21
  - type: text
    content: 'sons of Harim: Eliezer, Isshijah, Malchijah, Shemaiah, Shimeon, '
  '32':
  - type: text
    content: 'Benjamin, Malluch, and Shemariah. '
  '33':
  - type: text
    content: 'Of the sons of Hashum: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh, and Shimei. '
  '34':
  - type: text
    content: 'Of the sons of '
  - type: note
    content: '[ver. 29]'
  - type: text
    content: 'Bani: Maadai, Amram, Uel, '
  '35':
  - type: text
    content: 'Benaiah, Bedeiah, Cheluhi, '
  '36':
  - type: text
    content: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: text
    content: 'Mattaniah, Mattenai, Jaasu. '
  '38':
  - type: text
    content: 'Of the sons of Binnui:'
  - type: note
    content: Septuagint; Hebrew Bani, Binnui
  - type: text
    content: ' Shimei, '
  '39':
  - type: text
    content: 'Shelemiah, Nathan, Adaiah, '
  '4':
  - type: text
    content: 'Arise, for it is your task, and we are with you; '
  - type: note
    content: 1 Chr. 28:10; [2 Chr. 19:11]
  - type: text
    content: 'be strong and do it.” '
  '40':
  - type: text
    content: 'Machnadebai, Shashai, Sharai, '
  '41':
  - type: text
    content: 'Azarel, Shelemiah, Shemariah, '
  '42':
  - type: text
    content: 'Shallum, Amariah, and Joseph. '
  '43':
  - type: text
    content: 'Of the sons of Nebo: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, Joel, and Benaiah. '
  '44':
  - type: text
    content: 'All these had married foreign women, and some of the women '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: had even borne children.
  - type: note
    content: Or and they put them away with their children
  '5':
  - type: text
    content: 'Then Ezra arose and made the leading priests and Levites and all Israel '
  - type: note
    content: Neh. 5:12; 13:25
  - type: text
    content: take an oath that they would do as had been said. So they took the oath.
  '6':
  - type: text
    content: 'Then Ezra withdrew '
  - type: note
    content: ver. 1
  - type: text
    content: 'from before the house of God and went to the '
  - type: note
    content: ch. 8:29
  - type: text
    content: 'chamber of '
  - type: note
    content: Neh. 12:22, 23
  - type: text
    content: 'Jehohanan the son of '
  - type: note
    content: Neh. 3:1
  - type: text
    content: Eliashib, where he spent the night,
  - type: note
    content: Probable reading; Hebrew where he went
  - type: text
    content: ' neither '
  - type: note
    content: Deut. 9:18
  - type: text
    content: 'eating bread nor drinking water, for he was mourning over the faithlessness of the exiles. '
  '7':
  - type: text
    content: 'And a proclamation was made throughout Judah and Jerusalem to all the returned exiles that they should assemble at Jerusalem, '
  '8':
  - type: text
    content: and that if anyone did not come within three days, by order of the officials and the elders all his property should be forfeited, and he himself banned from the congregation of the exiles.
  '9':
  - type: text
    content: 'Then all the men of Judah and Benjamin assembled at Jerusalem within the three days. It was the ninth month, on the twentieth day of the month. And all the people sat in the open square before the house of God, trembling because of this matter and because of the '
  - type: note
    content: '[1 Sam. 12:18]'
  - type: text
    content: 'heavy rain. '
