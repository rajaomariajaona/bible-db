        children:
        - type: text
          text: 9:2
      marker-yv: yv-n
    - type: text
      text: '“We have broken faith with our God and have married foreign women from the peoples of the land, but even now there is hope for Israel in spite of this. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
