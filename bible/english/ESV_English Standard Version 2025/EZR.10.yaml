      marker-yv: yv-n
    - type: text
      text: 'Meshullam and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 11:16
      marker-yv: yv-n
    - type: text
      text: Shabbethai the Levite supported them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the returned exiles did so. Ezra the priest selected men,
    - type: usfm
