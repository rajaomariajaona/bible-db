        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'make confession to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers and do his will. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'Separate yourselves from the peoples of the land and from the foreign wives.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the assembly answered with a loud voice, “It is so; we must do as you have said. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people are many, and it is a time of heavy rain; we cannot stand in the open. Nor is this a task for one day or for two, for we have greatly transgressed in this matter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let our officials stand for the whole assembly. Let all in our cities who have taken foreign wives come '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 13:31
      marker-yv: yv-n
    - type: text
      text: 'at appointed times, and with them the elders and judges of every city, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 29:10
      - type: text
        text: '; '
