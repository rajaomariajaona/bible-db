document_id: 1TH.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Ministry to the Thessalonians
  - type: text
    content: For you yourselves know, brothers,
  - type: note
    content: Or brothers and sisters; also verses 9, 14, 17
  - type: text
    content: ' that our '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'coming to you '
  - type: note
    content: '[2 Thess. 1:10]'
  - type: text
    content: 'was not in vain. '
  '10':
  - type: text
    content: 'You are witnesses, and '
  - type: note
    content: ver. 5
  - type: text
    content: 'God also, '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'how holy and righteous and blameless was our conduct toward you believers. '
  '11':
  - type: text
    content: 'For you know how, '
  - type: note
    content: '[ver. 7]; See 1 Cor. 4:14'
  - type: text
    content: 'like a father with his children, '
  '12':
  - type: text
    content: 'we exhorted each one of you and encouraged you and '
  - type: note
    content: Eph. 4:17
  - type: text
    content: 'charged '
  - type: note
    content: See Eph. 4:1
  - type: text
    content: 'you to walk in a manner worthy of God, '
  - type: note
    content: ch. 5:24; 2 Thess. 2:14; 1 Pet. 5:10; See Rom. 8:28
  - type: text
    content: who calls you into his own kingdom and glory.
  '13':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 1:2, 3
  - type: text
    content: we also thank God constantly
  - type: note
    content: Or without ceasing
  - type: text
    content: ' for this, that when you received '
  - type: note
    content: '[Rom. 10:17]'
  - type: text
    content: 'the word of God, which you heard from us, you accepted it '
  - type: note
    content: '[Gal. 4:14]; See Matt. 10:20'
  - type: text
    content: not as the word of men
  - type: note
    content: The Greek word anthropoi can refer to both men and women
  - type: text
    content: ' but as what it really is, the word of God, '
  - type: note
    content: Heb. 4:12
  - type: text
    content: 'which is at work in you believers. '
  '14':
  - type: text
    content: 'For you, brothers, '
  - type: note
    content: See ch. 1:6
  - type: text
    content: 'became imitators of '
  - type: note
    content: See 1 Cor. 7:17
  - type: text
    content: 'the churches of God in Christ Jesus that are in Judea. For '
  - type: note
    content: ch. 3:4; Acts 17:5; 2 Thess. 1:4, 5
  - type: text
    content: 'you suffered the same things from your own countrymen '
  - type: note
    content: '[Heb. 10:33, 34]'
  - type: text
    content: as they did from the Jews,
  - type: note
    content: The Greek word Ioudaioi can refer to Jewish religious leaders, and others under their influence, who opposed the Christian faith in that time
  - type: text
    content: ' '
  '15':
  - type: note
    content: See Luke 24:20
  - type: text
    content: 'who killed both the Lord Jesus and '
  - type: note
    content: Jer. 2:30; Matt. 23:29-34; See Matt. 5:12
  - type: text
    content: 'the prophets, and drove us out, and displease God and '
  - type: note
    content: '[Esth. 3:8]'
  - type: text
    content: 'oppose all mankind '
  '16':
  - type: note
    content: Acts 13:45, 50; 14:2, 19; 17:5, 13; 18:12; 22:21, 22
  - type: text
    content: 'by hindering us from speaking to the Gentiles that they might be saved—so as always '
  - type: note
    content: See Gen. 15:16
  - type: text
    content: 'to fill up the measure of their sins. But '
  - type: note
    content: See ch. 1:10
  - type: text
    content: wrath has come upon them at last!
  - type: note
    content: Or completely, or forever
  - type: heading
    content: Paul’s Longing to See Them Again
  '17':
  - type: text
    content: 'But since we were torn away from you, brothers, for a short time, '
  - type: note
    content: 1 Cor. 5:3; Col. 2:5
  - type: text
    content: 'in person not in heart, we endeavored the more eagerly and with great desire '
  - type: note
    content: ch. 3:10
  - type: text
    content: 'to see you face to face, '
  '18':
  - type: text
    content: 'because we wanted to come to you—I, Paul, again and again—but Satan '
  - type: note
    content: Rom. 15:22; [Rom. 1:13]
  - type: text
    content: 'hindered us. '
  '19':
  - type: text
    content: 'For what is our hope or '
  - type: note
    content: See Phil. 4:1
  - type: text
    content: 'joy or crown of boasting '
  - type: note
    content: 1 Cor. 15:31; [2 Thess. 1:4]; See 2 Cor. 1:14
  - type: text
    content: 'before our Lord Jesus at his '
  - type: note
    content: ch. 3:13; 4:15; 5:23; Matt. 24:3; 1 Cor. 15:23; 2 Thess. 2:1, 8; James 5:7, 8; 2 Pet. 1:16; 3:4, 12; 1 John 2:28
  - type: text
    content: 'coming? Is it not you? '
  '2':
  - type: text
    content: 'But though we had already suffered and been shamefully treated '
  - type: note
    content: Acts 16:22-24
  - type: text
    content: 'at Philippi, as you know, '
  - type: note
    content: See Acts 4:13
  - type: text
    content: 'we had boldness in our God '
  - type: note
    content: Acts 17:2-9
  - type: text
    content: 'to declare to you the gospel of God in the midst of much '
  - type: note
    content: Phil. 1:30
  - type: text
    content: 'conflict. '
  '20':
  - type: text
    content: For you are our glory and joy.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: '[2 Cor. 2:17]'
  - type: text
    content: 'our appeal does not spring from '
  - type: note
    content: 2 Thess. 2:11
  - type: text
    content: 'error or '
  - type: note
    content: ch. 4:7
  - type: text
    content: 'impurity or '
  - type: note
    content: 2 Cor. 4:2
  - type: text
    content: 'any attempt to deceive, '
  '4':
  - type: text
    content: 'but just as we have been approved by God '
  - type: note
    content: See Gal. 2:7
  - type: text
    content: 'to be entrusted with the gospel, so we speak, not '
  - type: note
    content: See Gal. 1:10
  - type: text
    content: 'to please man, but to please God '
  - type: note
    content: Ps. 17:3; See Rom. 8:27
  - type: text
    content: 'who tests our hearts. '
  '5':
  - type: note
    content: See Acts 20:33
  - type: text
    content: For we never came with words of flattery,
  - type: note
    content: Or with a flattering speech
  - type: text
    content: ' as you know, nor with a pretext for greed—'
  - type: note
    content: ver. 10; See Rom. 1:9
  - type: text
    content: 'God is witness. '
  '6':
  - type: note
    content: '[2 Cor. 4:5]; See John 5:41'
  - type: text
    content: 'Nor did we seek glory from people, whether from you or from others, '
  - type: note
    content: 1 Cor. 9:4; 2 Thess. 3:9; [Philem. 8, 9]
  - type: text
    content: 'though we could have made '
  - type: note
    content: '[ver. 9; 2 Cor. 11:9]'
  - type: text
    content: 'demands as '
  - type: note
    content: See 1 Cor. 9:1
  - type: text
    content: 'apostles of Christ. '
  '7':
  - type: text
    content: 'But we were '
  - type: note
    content: 2 Tim. 2:24; [1 Cor. 14:20]
  - type: text
    content: gentle
  - type: note
    content: Some manuscripts infants
  - type: text
    content: ' among you, '
  - type: note
    content: '[ver. 11; Isa. 49:23; 60:16]'
  - type: text
    content: 'like a nursing mother taking care of her own children. '
  '8':
  - type: text
    content: 'So, being affectionately desirous of you, we were ready to share with you not only the gospel of God '
  - type: note
    content: See 2 Cor. 12:15
  - type: text
    content: but also our own selves, because you had become very dear to us.
  '9':
  - type: text
    content: 'For you remember, brothers, '
  - type: note
    content: 2 Thess. 3:8; [Phil. 4:16]
  - type: text
    content: 'our labor and toil: we '
  - type: note
    content: See Acts 18:3
  - type: text
    content: 'worked night and day, that we might not be a burden to any of you, while we proclaimed to you the gospel of God. '
