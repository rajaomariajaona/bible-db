document_id: 2CO.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Heavenly Dwelling
  - type: text
    content: 'For we know that if '
  - type: note
    content: 2 Pet. 1:13, 14
  - type: text
    content: 'the tent that is '
  - type: note
    content: See ch. 4:7
  - type: text
    content: 'our earthly home is destroyed, we have a building from God, '
  - type: note
    content: Mark 14:58
  - type: text
    content: 'a house not made with hands, eternal in the heavens. '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 25:31, 32; [Rom. 14:10]; See Acts 10:42
  - type: text
    content: 'we must all appear before the judgment seat of Christ, '
  - type: note
    content: See Ps. 62:12
  - type: text
    content: so that each one may receive what is due for what he has done in the body, whether good or evil.
  - type: heading
    content: The Ministry of Reconciliation
  '11':
  - type: text
    content: 'Therefore, knowing '
  - type: note
    content: '[Job 31:23; Acts 9:31; Heb. 10:31; Jude 23]'
  - type: text
    content: 'the fear of the Lord, we persuade others. But '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'what we are is known to God, and I hope it is known also to your conscience. '
  '12':
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'We are not commending ourselves to you again but '
  - type: note
    content: '[ch. 1:14]'
  - type: text
    content: 'giving you cause to boast about us, so that you may be able to answer those who boast about outward appearance and not about what is in the heart. '
  '13':
  - type: text
    content: 'For if we '
  - type: note
    content: ch. 11:1, 16, 17; 12:6, 11
  - type: text
    content: 'are beside ourselves, it is for God; if we are in our right mind, it is for you. '
  '14':
  - type: text
    content: 'For the love of Christ '
  - type: note
    content: Acts 18:5
  - type: text
    content: 'controls us, because we have concluded this: that '
  - type: note
    content: Rom. 5:15
  - type: text
    content: 'one has died for all, therefore all have died; '
  '15':
  - type: text
    content: 'and he died for all, '
  - type: note
    content: '[Rom. 6:11, 12]; See Rom. 14:7'
  - type: text
    content: 'that those who live might no longer live for themselves but '
  - type: note
    content: '[ch. 12:10]'
  - type: text
    content: for him who for their sake died and was raised.
  '16':
  - type: text
    content: 'From now on, therefore, '
  - type: note
    content: '[Gal. 2:6; Phil. 3:7, 8; Col. 2:11; 1 Tim. 5:21]'
  - type: text
    content: 'we regard no one according to the flesh. Even though we once regarded Christ according to the flesh, we regard him thus no longer. '
  '17':
  - type: text
    content: 'Therefore, if anyone is '
  - type: note
    content: ch. 12:2; Rom. 16:7; Gal. 1:22
  - type: text
    content: 'in Christ, he is '
  - type: note
    content: '[John 3:3]; See Rom. 6:4'
  - type: text
    content: a new creation.
  - type: note
    content: Or creature
  - type: text
    content: ' '
  - type: note
    content: Isa. 43:18, 19; Rev. 21:5; [Isa. 65:17; Eph. 2:15; 4:24; Heb. 8:13]
  - type: text
    content: 'The old has passed away; behold, the new has come. '
  '18':
  - type: text
    content: 'All this is from God, '
  - type: note
    content: Col. 1:20; See Rom. 5:10; 1 John 2:2
  - type: text
    content: 'who through Christ reconciled us to himself and gave us '
  - type: note
    content: Rom. 5:11
  - type: text
    content: 'the ministry of reconciliation; '
  '19':
  - type: text
    content: that is, in Christ God was reconciling
  - type: note
    content: Or God was in Christ, reconciling
  - type: text
    content: ' the world to himself, '
  - type: note
    content: Ps. 32:2; Rom. 4:8
  - type: text
    content: 'not counting their trespasses against them, and entrusting to us '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'the message of reconciliation. '
  '2':
  - type: text
    content: 'For in this tent '
  - type: note
    content: Rom. 8:23
  - type: text
    content: 'we groan, longing to '
  - type: note
    content: '[1 Cor. 15:53, 54]'
  - type: text
    content: 'put on our heavenly dwelling, '
  '20':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Eph. 6:20; [Mal. 2:7; Gal. 4:14]
  - type: text
    content: 'we are ambassadors for Christ, '
  - type: note
    content: ch. 6:1
  - type: text
    content: 'God making his appeal through us. We implore you on behalf of Christ, be reconciled to God. '
  '21':
  - type: note
    content: Rom. 8:3; Gal. 3:13; See Rom. 4:25
  - type: text
    content: 'For our sake he made him to be sin '
  - type: note
    content: See 1 Pet. 2:22
  - type: text
    content: 'who knew no sin, so that in him we might become '
  - type: note
    content: See Rom. 1:17; 1 Cor. 1:30
  - type: text
    content: the righteousness of God.
  '3':
  - type: text
    content: if indeed by putting it on
  - type: note
    content: Some manuscripts putting it off
  - type: text
    content: ' we may not be found naked. '
  '4':
  - type: text
    content: 'For while we are still in this tent, we groan, being burdened—not that we would be unclothed, but that we would be further clothed, so that what is mortal '
  - type: note
    content: 1 Cor. 15:54
  - type: text
    content: 'may be swallowed up by life. '
  '5':
  - type: text
    content: 'He who has prepared us for this very thing is God, '
  - type: note
    content: '[Rom. 8:23]; See ch. 1:22'
  - type: text
    content: who has given us the Spirit as a guarantee.
  - type: note
    content: Or down payment
  '6':
  - type: text
    content: 'So we are always of good courage. We know that '
  - type: note
    content: '[Heb. 11:13, 14]'
  - type: text
    content: 'while we are at home in the body we are away from the Lord, '
  '7':
  - type: text
    content: 'for '
  - type: note
    content: '[John 20:29]; See ch. 4:18'
  - type: text
    content: 'we walk by faith, not '
  - type: note
    content: 1 Cor. 13:12
  - type: text
    content: 'by sight. '
  '8':
  - type: text
    content: 'Yes, we are of good courage, and we '
  - type: note
    content: '[Phil. 1:23]'
  - type: text
    content: 'would rather be away from the body and at home with the Lord. '
  '9':
  - type: text
    content: 'So whether we are at home or away, we make it our aim to '
  - type: note
    content: '[Col. 1:10; 1 Thess. 4:1]'
  - type: text
    content: 'please him. '
