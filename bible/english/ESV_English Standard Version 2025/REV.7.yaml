document_id: REV.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The 144,000 of Israel Sealed
  - type: text
    content: 'After this I saw four angels standing at the four corners of the earth, holding back '
  - type: note
    content: Jer. 49:36; Dan. 7:2
  - type: text
    content: 'the four winds of the earth, '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'that no wind might blow on earth or sea or against any tree. '
  '10':
  - type: text
    content: 'and crying out with a loud voice, '
  - type: note
    content: ch. 12:10; 19:1; See Ps. 3:8
  - type: text
    content: '“Salvation belongs to our God who sits on the throne, and to the Lamb!” '
  '11':
  - type: text
    content: 'And all the angels were standing around the throne and around the elders and '
  - type: note
    content: ch. 4:6
  - type: text
    content: 'the four living creatures, and they '
  - type: note
    content: See ch. 4:10
  - type: text
    content: 'fell on their faces before the throne and worshiped God, '
  '12':
  - type: note
    content: ch. 5:14; 19:4; [1 Chr. 29:10, 11]
  - type: text
    content: saying, “Amen! Blessing and glory and wisdom and thanksgiving and honor and power and might be to our God forever and ever! Amen.”
  '13':
  - type: text
    content: 'Then one of the elders addressed me, saying, “Who are these, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'clothed in white robes, and from where have they come?” '
  '14':
  - type: text
    content: 'I said to him, “Sir, you know.” And he said to me, “These are the ones coming out of '
  - type: note
    content: See Matt. 24:21
  - type: text
    content: 'the great tribulation. '
  - type: note
    content: ch. 22:14; [Isa. 1:18; Zech. 3:3-5]
  - type: text
    content: 'They have washed their robes and '
  - type: note
    content: '[Dan. 12:10; 1 John 1:7]'
  - type: text
    content: 'made them white '
  - type: note
    content: ch. 1:5
  - type: text
    content: in the blood of the Lamb.
  '15':
  - type: text
    content: “Therefore they are before the throne of God,
  - type: text
    content: 'and '
  - type: note
    content: ch. 22:3
  - type: text
    content: serve him day and night in his temple;
  - type: text
    content: 'and he who sits on the throne '
  - type: note
    content: ch. 21:3; [Isa. 4:5, 6]
  - type: text
    content: will shelter them with his presence.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Isa. 49:10
  - type: text
    content: They shall hunger no more, neither thirst anymore;
  - type: note
    content: Ps. 121:6
  - type: text
    content: the sun shall not strike them,
  - type: text
    content: nor any scorching heat.
  '17':
  - type: text
    content: 'For the Lamb in the midst of the throne '
  - type: note
    content: Ps. 23:1, 2; [Matt. 2:6]; See John 10:11
  - type: text
    content: will be their shepherd,
  - type: text
    content: 'and he will guide them to springs of '
  - type: note
    content: ch. 22:1; [Ps. 36:8, 9; John 4:14]
  - type: text
    content: living water,
  - type: text
    content: 'and '
  - type: note
    content: ch. 21:4; Isa. 25:8
  - type: text
    content: God will wipe away every tear from their eyes.”
  '2':
  - type: text
    content: 'Then I saw another angel ascending '
  - type: note
    content: ch. 16:12
  - type: text
    content: 'from the rising of the sun, with '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'the seal of the living God, and he called with a loud voice to the four angels who had been given power to harm earth and sea, '
  '3':
  - type: text
    content: 'saying, '
  - type: note
    content: ch. 6:6; 9:4
  - type: text
    content: '“Do not harm the earth or the sea or the trees, until we have sealed the servants of our God '
  - type: note
    content: ch. 14:1; 22:4; Ezek. 9:4; [ch. 13:16; Ezek. 3:8, 9]
  - type: text
    content: 'on their foreheads.” '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: ch. 9:16
  - type: text
    content: 'I heard the number of the sealed, 144,000, sealed from every tribe of the sons of Israel:'
  '5':
  - type: text
    content: 12,000 from the tribe of Judah were sealed,
  - type: text
    content: 12,000 from the tribe of Reuben,
  - type: text
    content: 12,000 from the tribe of Gad,
  '6':
  - type: text
    content: 12,000 from the tribe of Asher,
  - type: text
    content: 12,000 from the tribe of Naphtali,
  - type: text
    content: 12,000 from the tribe of Manasseh,
  '7':
  - type: text
    content: 12,000 from the tribe of Simeon,
  - type: text
    content: 12,000 from the tribe of Levi,
  - type: text
    content: 12,000 from the tribe of Issachar,
  '8':
  - type: text
    content: 12,000 from the tribe of Zebulun,
  - type: text
    content: 12,000 from the tribe of Joseph,
  - type: text
    content: 12,000 from the tribe of Benjamin were sealed.
  - type: heading
    content: A Great Multitude from Every Nation
  '9':
  - type: text
    content: 'After this I looked, and behold, '
  - type: note
    content: '[Rom. 11:25]'
  - type: text
    content: 'a great multitude that no one could number, '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'from every nation, from all tribes and peoples and languages, standing before the throne and before the Lamb, '
  - type: note
    content: ver. 14; See ch. 3:4
  - type: text
    content: 'clothed in white robes, with '
  - type: note
    content: '[Lev. 23:40; John 12:13]'
  - type: text
    content: 'palm branches in their hands, '
