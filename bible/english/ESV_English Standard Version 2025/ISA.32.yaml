document_id: ISA.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A King Will Reign in Righteousness
  - type: text
    content: 'Behold, '
  - type: note
    content: Ps. 72:1, 2, 4; Jer. 23:5; See ch. 11:1-4
  - type: text
    content: a king will reign in righteousness,
  - type: text
    content: and princes will rule in justice.
  '10':
  - type: text
    content: In little more than a year
  - type: text
    content: you will shudder, you complacent women;
  - type: text
    content: for the grape harvest fails,
  - type: text
    content: the fruit harvest will not come.
  '11':
  - type: text
    content: 'Tremble, you women '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: who are at ease,
  - type: text
    content: shudder, you complacent ones;
  - type: note
    content: '[ch. 47:2, 3 ]'
  - type: text
    content: strip, and make yourselves bare,
  - type: note
    content: See Gen. 37:34
  - type: text
    content: and tie sackcloth around your waist.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 24:7 ]'
  - type: text
    content: Beat your breasts for the pleasant fields,
  - type: text
    content: for the fruitful vine,
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:23; 34:13; Hos. 9:6
  - type: text
    content: for the soil of my people
  - type: text
    content: growing up in thorns and briers,
  - type: note
    content: '[ch. 24:11, 12 ]'
  - type: text
    content: yes, for all the joyous houses
  - type: text
    content: in the exultant city.
  '14':
  - type: text
    content: For the palace is forsaken,
  - type: text
    content: the populous city deserted;
  - type: text
    content: the hill and the watchtower
  - type: text
    content: will become dens forever,
  - type: note
    content: Jer. 2:24
  - type: text
    content: a joy of wild donkeys,
  - type: text
    content: a pasture of flocks;
  '15':
  - type: text
    content: 'until '
  - type: note
    content: '[ch. 11:2; Joel 2:28]'
  - type: text
    content: the Spirit is poured upon us from on high,
  - type: text
    content: 'and '
  - type: note
    content: ch. 35:1, 2; [ch. 29:17]
  - type: text
    content: the wilderness becomes a fruitful field,
  - type: text
    content: and the fruitful field is deemed a forest.
  '16':
  - type: text
    content: Then justice will dwell in the wilderness,
  - type: text
    content: and righteousness abide in the fruitful field.
  '17':
  - type: text
    content: ' '
  - type: note
    content: James 3:18; [ch. 1:27; Ps. 72:3; 119:165 ]
  - type: text
    content: And the effect of righteousness will be peace,
  - type: text
    content: and the result of righteousness, quietness and trust
  - type: note
    content: Or security
  - type: text
    content: ' forever.'
  '18':
  - type: text
    content: My people will abide in a peaceful habitation,
  - type: text
    content: in secure dwellings, and in quiet resting places.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:2, 17
  - type: text
    content: And it will hail when the forest falls down,
  - type: note
    content: ch. 26:5
  - type: text
    content: and the city will be utterly laid low.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:6; 25:4
  - type: text
    content: Each will be like a hiding place from the wind,
  - type: text
    content: a shelter from the storm,
  - type: note
    content: ch. 33:21
  - type: text
    content: like streams of water in a dry place,
  - type: text
    content: like the shade of a great rock in a weary land.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Eccles. 11:1; [ch. 30:23 ]
  - type: text
    content: Happy are you who sow beside all waters,
  - type: text
    content: who let the feet of the ox and the donkey range free.
  '3':
  - type: text
    content: ' '
  - type: note
    content: See ch. 29:18
  - type: text
    content: Then the eyes of those who see will not be closed,
  - type: text
    content: and the ears of those who hear will give attention.
  '4':
  - type: text
    content: The heart of the hasty will understand and know,
  - type: note
    content: ch. 35:6
  - type: text
    content: and the tongue of the stammerers will hasten to speak distinctly.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 5:20 ]'
  - type: text
    content: The fool will no more be called noble,
  - type: text
    content: nor the scoundrel said to be honorable.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: 1 Sam. 24:13
  - type: text
    content: the fool speaks folly,
  - type: text
    content: and his heart is busy with iniquity,
  - type: text
    content: to practice ungodliness,
  - type: text
    content: 'to utter error concerning the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 3:14, 15 ]'
  - type: text
    content: to leave the craving of the hungry unsatisfied,
  - type: text
    content: and to deprive the thirsty of drink.
  '7':
  - type: text
    content: As for the scoundrel—
  - type: note
    content: Mic. 2:1, 2
  - type: text
    content: his devices are evil;
  - type: text
    content: he plans wicked schemes
  - type: text
    content: to ruin the poor with lying words,
  - type: text
    content: even when the plea of the needy is right.
  '8':
  - type: text
    content: But he who is noble plans noble things,
  - type: text
    content: and on noble things he stands.
  - type: heading
    content: Complacent Women Warned of Disaster
  '9':
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:16–4:1
  - type: text
    content: 'Rise up, you women '
  - type: note
    content: Amos 6:1
  - type: text
    content: who are at ease, hear my voice;
  - type: text
    content: you complacent daughters, give ear to my speech.
