document_id: 1SA.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul and the Medium of En-dor
  - type: text
    content: 'In those days '
  - type: note
    content: '[ch. 29:1]'
  - type: text
    content: 'the Philistines gathered their forces for war, to fight against Israel. And Achish said to David, “Understand that you and your men are to go out with me in the army.” '
  '10':
  - type: text
    content: 'But Saul swore to her by the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, no punishment shall come upon you for this thing.” '
  '11':
  - type: text
    content: 'Then the woman said, “Whom shall I bring up for you?” He said, “Bring up Samuel for me.” '
  '12':
  - type: text
    content: 'When the woman saw Samuel, she cried out with a loud voice. And the woman said to Saul, “Why have you deceived me? You are Saul.” '
  '13':
  - type: text
    content: 'The king said to her, “Do not be afraid. What do you see?” And the woman said to Saul, “I see a god coming up out of the earth.” '
  '14':
  - type: text
    content: 'He said to her, “What is his appearance?” And she said, “An old man is coming up, and he is wrapped '
  - type: note
    content: ch. 15:27
  - type: text
    content: in a robe.” And Saul knew that it was Samuel, and he bowed with his face to the ground and paid homage.
  '15':
  - type: text
    content: 'Then Samuel said to Saul, “Why have you disturbed me by bringing me up?” Saul answered, “I am in great distress, for the Philistines are warring against me, and '
  - type: note
    content: ch. 16:14; 18:12
  - type: text
    content: 'God has turned away from me and '
  - type: note
    content: ver. 6
  - type: text
    content: 'answers me no more, either by prophets or by dreams. Therefore I have summoned you to tell me what I shall do.” '
  '16':
  - type: text
    content: 'And Samuel said, “Why then do you ask me, since the '
  - type: text
    content: Lord
  - type: text
    content: ' has turned from you and become your enemy? '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has done to you as he spoke by me, for '
  - type: note
    content: ch. 15:28
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has torn the kingdom out of your hand and given it to your neighbor, David. '
  '18':
  - type: note
    content: ch. 15:9
  - type: text
    content: 'Because you did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not carry out his fierce wrath against Amalek, therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this thing to you this day. '
  '19':
  - type: text
    content: 'Moreover, the '
  - type: text
    content: Lord
  - type: text
    content: ' will give Israel also with you into the hand of the Philistines, and tomorrow you '
  - type: note
    content: ch. 31:2
  - type: text
    content: 'and your sons shall be with me. The '
  - type: text
    content: Lord
  - type: text
    content: ' will give the army of Israel also into the hand of the Philistines.”'
  '2':
  - type: text
    content: David said to Achish, “Very well, you shall know what your servant can do.” And Achish said to David, “Very well, I will make you my bodyguard for life.”
  '20':
  - type: text
    content: 'Then Saul fell at once full length on the ground, filled with fear because of the words of Samuel. And there was no strength in him, for he had eaten nothing all day and all night. '
  '21':
  - type: text
    content: 'And the woman came to Saul, and when she saw that he was terrified, she said to him, “Behold, your servant has obeyed you. '
  - type: note
    content: See Judg. 12:3
  - type: text
    content: 'I have taken my life in my hand and have listened to what you have said to me. '
  '22':
  - type: text
    content: 'Now therefore, you also obey your servant. Let me set a morsel of bread before you; and eat, that you may have strength when you go on your way.” '
  '23':
  - type: text
    content: 'He refused and said, “I will not eat.” But his servants, together with the woman, urged him, and he listened to their words. So he arose from the earth and sat on the bed. '
  '24':
  - type: text
    content: 'Now the woman had a fattened calf in the house, and she quickly killed it, and she took flour and kneaded it and baked unleavened bread of it, '
  '25':
  - type: text
    content: and she put it before Saul and his servants, and they ate. Then they rose and went away that night.
  '3':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 25:1
  - type: text
    content: 'Samuel had died, and all Israel had mourned for him and buried him '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'in Ramah, his own city. And Saul had put '
  - type: note
    content: '[Ex. 22:18; Lev. 19:31; 20:27; Deut. 18:10, 11]'
  - type: text
    content: 'the mediums and the necromancers out of the land. '
  '4':
  - type: text
    content: 'The Philistines assembled and came and encamped '
  - type: note
    content: Josh. 19:18
  - type: text
    content: 'at Shunem. And Saul gathered all Israel, and they encamped '
  - type: note
    content: ch. 31:1
  - type: text
    content: 'at Gilboa. '
  '5':
  - type: text
    content: 'When Saul saw the army of the Philistines, he was afraid, and his heart trembled greatly. '
  '6':
  - type: text
    content: 'And when Saul inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 15; ch. 14:37
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' did not answer him, either '
  - type: note
    content: Num. 12:6
  - type: text
    content: 'by dreams, or '
  - type: note
    content: '[Ex. 28:30; Num. 27:21; Deut. 33:8]'
  - type: text
    content: 'by Urim, or by prophets. '
  '7':
  - type: text
    content: 'Then Saul said to his servants, '
  - type: note
    content: '[1 Chr. 10:13]'
  - type: text
    content: '“Seek out for me a woman who is a medium, that I may go to her and inquire of her.” And his servants said to him, “Behold, there is a medium at '
  - type: note
    content: Josh. 17:11; Ps. 83:10
  - type: text
    content: En-dor.”
  '8':
  - type: text
    content: 'So Saul '
  - type: note
    content: 1 Kgs. 20:38; 22:30; 2 Chr. 18:29; 35:22
  - type: text
    content: 'disguised himself and put on other garments and went, he and two men with him. And they came to the woman by night. And he said, '
  - type: note
    content: '[Deut. 18:10]'
  - type: text
    content: '“Divine for me by a spirit and bring up for me whomever I shall name to you.” '
  '9':
  - type: text
    content: 'The woman said to him, “Surely you know what Saul has done, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'how he has cut off the mediums and the necromancers from the land. Why then are you laying a trap for my life to bring about my death?” '
