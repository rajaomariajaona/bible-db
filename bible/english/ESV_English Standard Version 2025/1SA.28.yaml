  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Samuel said, “Why then do you ask me, since the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has turned from you and become your enemy? '
  - type: usfm
    marker: vlbl
