      children:
      - type: text
        text: 15:9
      metadata:
        usfm: 1SA.15.9
    marker-yv: yv-n
  - type: text
    text: 'Because you did not obey the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and did not carry out his fierce wrath against Amalek, therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done this thing to you this day. '
  - type: usfm
    marker: vlbl
    children:
