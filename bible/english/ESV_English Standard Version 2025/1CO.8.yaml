document_id: 1CO.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Food Offered to Idols
  - type: text
    content: Now concerning
  - type: note
    content: The expression Now concerning introduces a reply to a question in the Corinthians’ letter; see 7:1
  - type: text
    content: ' '
  - type: note
    content: ver. 4, 7, 10; See Acts 15:29
  - type: text
    content: 'food offered to idols: we know that '
  - type: note
    content: See Rom. 15:14
  - type: text
    content: '“all of us possess knowledge.” This “knowledge” '
  - type: note
    content: Rom. 14:3
  - type: text
    content: 'puffs up, '
  - type: note
    content: ch. 13:4-13
  - type: text
    content: 'but love builds up. '
  '10':
  - type: text
    content: For if anyone sees you who have knowledge eating
  - type: note
    content: Greek reclining at table
  - type: text
    content: ' in an idol’s temple, will he not be encouraged,'
  - type: note
    content: Or fortified; Greek built up
  - type: text
    content: ' if his conscience is weak, to eat food offered to idols? '
  '11':
  - type: text
    content: 'And so by your knowledge this weak person is '
  - type: note
    content: Rom. 14:15, 20
  - type: text
    content: 'destroyed, the brother for whom Christ died. '
  '12':
  - type: text
    content: Thus, sinning against your brothers
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' and '
  - type: note
    content: '[Zech. 2:8; Matt. 18:6]'
  - type: text
    content: 'wounding their conscience when it is weak, '
  - type: note
    content: '[Matt. 25:45]'
  - type: text
    content: 'you sin against Christ. '
  '13':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Rom. 14:13, 21; [2 Cor. 6:3; 11:29]
  - type: text
    content: if food makes my brother stumble, I will never eat meat, lest I make my brother stumble.
  '2':
  - type: note
    content: Gal. 6:3; [ch. 3:18]
  - type: text
    content: 'If anyone imagines that he knows something, '
  - type: note
    content: '[ch. 13:8, 9, 12; 1 Tim. 6:3, 4]'
  - type: text
    content: 'he does not yet know as he ought to know. '
  '3':
  - type: text
    content: 'But if anyone loves God, '
  - type: note
    content: Gal. 4:9; [Ex. 33:12, 17; Jer. 1:5; Nah. 1:7; 2 Tim. 2:19]
  - type: text
    content: he is known by God.
  - type: note
    content: Greek him
  '4':
  - type: text
    content: 'Therefore, as to the eating of food offered to idols, we know that '
  - type: note
    content: ch. 10:19; Isa. 41:24; [Acts 14:15]
  - type: text
    content: '“an idol has no real existence,” and that '
  - type: note
    content: ver. 6; See Deut. 4:35, 39
  - type: text
    content: '“there is no God but one.” '
  '5':
  - type: text
    content: 'For although there may be '
  - type: note
    content: 2 Thess. 2:4
  - type: text
    content: 'so-called gods in heaven or on earth—as indeed there are many “gods” and many “lords”— '
  '6':
  - type: text
    content: 'yet '
  - type: note
    content: ver. 4; Mal. 2:10; Eph. 4:6
  - type: text
    content: 'for us there is one God, the Father, '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: 'from whom are all things and for whom we exist, and '
  - type: note
    content: Eph. 4:5; [ch. 1:2; 1 Tim. 2:5]; See John 13:13
  - type: text
    content: 'one Lord, Jesus Christ, through whom are all things and '
  - type: note
    content: John 1:3; Col. 1:16
  - type: text
    content: through whom we exist.
  '7':
  - type: text
    content: 'However, not all possess this knowledge. But some, '
  - type: note
    content: '[Rom. 14:14, 22, 23]'
  - type: text
    content: 'through former association with idols, eat food as really offered to an idol, and '
  - type: note
    content: ch. 10:25, 28, 29
  - type: text
    content: 'their conscience, being weak, is defiled. '
  '8':
  - type: note
    content: Rom. 14:17
  - type: text
    content: 'Food will not commend us to God. We are no worse off if we do not eat, and no better off if we do. '
  '9':
  - type: text
    content: 'But take care '
  - type: note
    content: '[ch. 10:23; Rom. 14:21; Gal. 5:13]'
  - type: text
    content: 'that this right of yours does not somehow become a stumbling block '
  - type: note
    content: Rom. 14:1, 2
  - type: text
    content: 'to the weak. '
