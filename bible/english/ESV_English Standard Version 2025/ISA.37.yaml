document_id: ISA.37,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Seeks Isaiah’s Help
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-38, see 2 Kgs. 19
  - type: text
    content: 'As soon as King Hezekiah heard it, he tore his clothes and covered himself with sackcloth and went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: '“Thus shall you speak to Hezekiah king of Judah: '
  - type: note
    content: '[ch. 36:14]'
  - type: text
    content: '‘Do not let your God in whom you trust deceive you by promising that Jerusalem will not be given into the hand of the king of Assyria. '
  '11':
  - type: text
    content: 'Behold, you have heard what the kings of Assyria have done to all lands, devoting them to destruction. And shall you be delivered? '
  '12':
  - type: note
    content: ch. 36:18, 19
  - type: text
    content: 'Have the gods of the nations delivered them, the nations that my fathers destroyed, '
  - type: note
    content: 2 Kgs. 17:6
  - type: text
    content: 'Gozan, '
  - type: note
    content: Gen. 11:31, 32
  - type: text
    content: 'Haran, Rezeph, and the people of Eden who were in Telassar? '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: Where is the king of Hamath, the king of Arpad, the king of the city of Sepharvaim, the king of Hena, or the king of Ivvah?’”
  - type: heading
    content: Hezekiah’s Prayer for Deliverance
  '14':
  - type: text
    content: 'Hezekiah received the letter from the hand of the messengers, and read it; and Hezekiah went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and spread it before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And Hezekiah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '16':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, God of Israel, '
  - type: note
    content: Ex. 25:22; Ezek. 10:1
  - type: text
    content: 'enthroned above the cherubim, you are the God, you alone, of all the kingdoms of the earth; '
  - type: note
    content: Acts 4:24; [Jer. 10:11]
  - type: text
    content: 'you have made the heavens and the earth. '
  '17':
  - type: note
    content: '[2 Chr. 6:40]'
  - type: text
    content: 'Incline your ear, O '
  - type: text
    content: Lord
  - type: text
    content: ', and hear; open your eyes, O '
  - type: text
    content: Lord
  - type: text
    content: ', and see; and hear '
  - type: note
    content: 2 Chr. 32:19
  - type: text
    content: 'all the words of Sennacherib, which he has sent to mock the living God. '
  '18':
  - type: text
    content: 'Truly, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 10:13, 14]'
  - type: text
    content: 'the kings of Assyria have laid waste all the nations and their lands, '
  '19':
  - type: text
    content: 'and have cast their gods into the fire. For they were no gods, but the work of men’s hands, wood and stone. Therefore they were destroyed. '
  '2':
  - type: text
    content: 'And he sent Eliakim, who was over the household, and Shebna the secretary, and the senior priests, covered with sackcloth, to the prophet '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'Isaiah the son of Amoz. '
  '20':
  - type: text
    content: 'So now, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, save us from his hand, that all the kingdoms of the earth may know that you alone are the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Sennacherib’s Fall
  '21':
  - type: text
    content: 'Then Isaiah the son of Amoz sent to Hezekiah, saying, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Because you have prayed to me concerning Sennacherib king of Assyria, '
  '22':
  - type: text
    content: 'this is the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken concerning him:'
  - type: text
    content: “‘She despises you, she scorns you—
  - type: note
    content: '[ Mic. 4:13 ]; See ch. 1:8'
  - type: text
    content: the virgin daughter of Zion;
  - type: text
    content: she wags her head behind you—
  - type: text
    content: the daughter of Jerusalem.
  '23':
  - type: text
    content: “‘Whom have you mocked and reviled?
  - type: text
    content: Against whom have you raised your voice
  - type: text
    content: and lifted your eyes to the heights?
  - type: text
    content: 'Against '
  - type: note
    content: ch. 10:17
  - type: text
    content: the Holy One of Israel!
  '24':
  - type: text
    content: By your servants you have mocked the Lord,
  - type: text
    content: 'and you have said, '
  - type: note
    content: '[ch. 8:7, 8]'
  - type: text
    content: With my many chariots
  - type: text
    content: I have gone up the heights of the mountains,
  - type: text
    content: to the far recesses of Lebanon,
  - type: note
    content: '[ch. 14:8 ]'
  - type: text
    content: to cut down its tallest cedars,
  - type: text
    content: its choicest cypresses,
  - type: text
    content: to come to its remotest height,
  - type: text
    content: its most fruitful forest.
  '25':
  - type: text
    content: I dug wells
  - type: text
    content: and drank waters,
  - type: text
    content: to dry up with the sole of my foot
  - type: text
    content: 'all '
  - type: note
    content: '[ch. 19:6]'
  - type: text
    content: 'the streams '
  - type: note
    content: '[ch. 20:4]'
  - type: text
    content: of Egypt.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:5, 15; 25:1, 2 ]'
  - type: text
    content: “‘Have you not heard
  - type: text
    content: that I determined it long ago?
  - type: text
    content: I planned from days of old
  - type: text
    content: what now I bring to pass,
  - type: text
    content: that you should make fortified cities
  - type: text
    content: crash into heaps of ruins,
  '27':
  - type: text
    content: while their inhabitants, shorn of strength,
  - type: text
    content: are dismayed and confounded,
  - type: text
    content: and have become like plants of the field
  - type: text
    content: and like tender grass,
  - type: text
    content: like grass on the housetops,
  - type: text
    content: blighted
  - type: note
    content: Some Hebrew manuscripts and 2 Kings 19:26; most Hebrew manuscripts a field
  - type: text
    content: ' before it is grown.'
  '28':
  - type: text
    content: “‘I know your sitting down
  - type: text
    content: and your going out and coming in,
  - type: text
    content: and your raging against me.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:12 ]'
  - type: text
    content: Because you have raged against me
  - type: text
    content: and your complacency has come to my ears,
  - type: text
    content: I will put my hook in your nose
  - type: text
    content: and my bit in your mouth,
  - type: text
    content: 'and '
  - type: note
    content: ver. 34
  - type: text
    content: I will turn you back on the way
  - type: text
    content: by which you came.’
  '3':
  - type: text
    content: 'They said to him, “Thus says Hezekiah, ‘This day is a '
  - type: note
    content: '[ch. 22:5]'
  - type: text
    content: 'day of distress, of rebuke, and of disgrace; '
  - type: note
    content: '[ch. 13:8; Hos. 13:13]'
  - type: text
    content: 'children have come to the point of birth, and there is no strength to bring them forth. '
  '30':
  - type: text
    content: '“And this shall be the sign for you: this year you shall eat what grows of itself, and in the second year what springs from that. Then in the third year sow and reap, and plant vineyards, and eat their fruit. '
  '31':
  - type: text
    content: 'And the surviving remnant of the house of Judah '
  - type: note
    content: ch. 27:6
  - type: text
    content: 'shall again take root downward and bear fruit upward. '
  '32':
  - type: note
    content: '[ch. 14:32]'
  - type: text
    content: 'For out of Jerusalem shall go a remnant, and out of Mount Zion a band of survivors. '
  - type: note
    content: See ch. 9:7
  - type: text
    content: 'The zeal of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts will do this.'
  '33':
  - type: text
    content: '“Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the king of Assyria: He shall not come into this city or shoot an arrow there or come before it with a shield or '
  - type: note
    content: '[Hab. 1:10; Luke 19:43]'
  - type: text
    content: 'cast up a siege mound against it. '
  '34':
  - type: text
    content: 'By the way that he came, by the same he shall return, and he shall not come into this city, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '35':
  - type: note
    content: ch. 31:5; 38:6
  - type: text
    content: 'For I will defend this city to save it, for my own sake and for '
  - type: note
    content: '[ch. 29:1]'
  - type: text
    content: the sake of my servant David.”
  '36':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:14; 30:31; 31:8; [ch. 10:33; 14:25; 29:5 ]
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went out and struck down 185,000 in the camp of the Assyrians. And when people arose early in the morning, behold, these were all dead bodies. '
  '37':
  - type: text
    content: 'Then Sennacherib king of Assyria departed and returned home and lived at '
  - type: note
    content: Gen. 10:11; Jonah 1:2; 3:3; 4:11
  - type: text
    content: 'Nineveh. '
  '38':
  - type: text
    content: 'And as he was worshiping in the house of Nisroch his god, Adrammelech and Sharezer, his sons, struck him down with the sword. And after they escaped into the land of '
  - type: note
    content: Gen. 8:4
  - type: text
    content: 'Ararat, '
  - type: note
    content: Ezra 4:2
  - type: text
    content: Esarhaddon his son reigned in his place.
  '4':
  - type: note
    content: '[ver. 28, 29]'
  - type: text
    content: 'It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will hear the words of the Rabshakeh, whom his master the king of Assyria has sent to mock the living God, and will rebuke the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has heard; therefore lift up your prayer for '
  - type: note
    content: ch. 1:9
  - type: text
    content: the remnant that is left.’”
  '5':
  - type: text
    content: 'When the servants of King Hezekiah came to Isaiah, '
  '6':
  - type: text
    content: 'Isaiah said to them, “Say to your master, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Do not be afraid because of the words that you have heard, with which the young men of the king of Assyria have reviled me. '
  '7':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[ch. 19:14]'
  - type: text
    content: 'I will put a spirit in him, so that '
  - type: note
    content: ver. 9
  - type: text
    content: 'he shall hear a rumor and return to his own land, and '
  - type: note
    content: ver. 38
  - type: text
    content: I will make him fall by the sword in his own land.’”
  '8':
  - type: text
    content: 'The Rabshakeh returned, and found the king of Assyria fighting against '
  - type: note
    content: Josh. 10:31
  - type: text
    content: 'Libnah, for he had heard that the king had left '
  - type: note
    content: Josh. 10:31
  - type: text
    content: 'Lachish. '
  '9':
  - type: text
    content: 'Now the king heard concerning Tirhakah king of '
  - type: note
    content: ch. 18:1, 2; 20:5
  - type: text
    content: Cush,
  - type: note
    content: Probably Nubia
  - type: text
    content: ' “He has set out to fight against you.” And when he heard it, he sent messengers to Hezekiah, saying, '
