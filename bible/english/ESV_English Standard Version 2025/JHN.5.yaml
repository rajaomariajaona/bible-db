document_id: JHN.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Healing at the Pool on the Sabbath
  - type: text
    content: 'After this there was a '
  - type: note
    content: See ch. 6:4
  - type: text
    content: feast of the Jews, and Jesus went up to Jerusalem.
  '10':
  - type: text
    content: So the Jews
  - type: note
    content: The Greek word Ioudaioi refers specifically here to Jewish religious leaders, and others under their influence, who opposed Jesus in that time; also verses 15, 16, 18
  - type: text
    content: ' said to the man who had been healed, “It is the Sabbath, and '
  - type: note
    content: Ex. 20:10; Neh. 13:19; Jer. 17:21, 22; [ch. 7:23; 9:16; Matt. 12:2; Mark 2:24; 3:4; Luke 6:2; 13:14]
  - type: text
    content: 'it is not lawful for you to take up your bed.” '
  '11':
  - type: text
    content: 'But he answered them, “The man who healed me, that man said to me, '
  - type: text
    content: ‘Take up your bed, and walk.’
  - type: text
    content: '” '
  '12':
  - type: text
    content: 'They asked him, “Who is the man who said to you, ‘Take up your bed and walk’?” '
  '13':
  - type: text
    content: 'Now the man who had been healed did not know who it was, for '
  - type: note
    content: '[ch. 6:15]'
  - type: text
    content: 'Jesus had withdrawn, as there was a crowd in the place. '
  '14':
  - type: text
    content: 'Afterward Jesus found him in the temple and said to him, '
  - type: text
    content: '“See, you are well! '
  - type: note
    content: '[ch. 8:11]'
  - type: text
    content: 'Sin no more, '
  - type: note
    content: '[Ezra 9:14]'
  - type: text
    content: that nothing worse may happen to you.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'The man went away and told the Jews that it was Jesus who had healed him. '
  '16':
  - type: text
    content: 'And this was why the Jews '
  - type: note
    content: ch. 15:20; [Acts 9:4, 5]
  - type: text
    content: 'were persecuting Jesus, '
  - type: note
    content: ch. 7:23; 9:16
  - type: text
    content: 'because he was doing these things on the Sabbath. '
  '17':
  - type: text
    content: 'But Jesus answered them, '
  - type: text
    content: “My Father is working until now, and I am working.”
  - type: heading
    content: Jesus Is Equal with God
  '18':
  - type: text
    content: 'This was why the Jews '
  - type: note
    content: See ch. 7:1
  - type: text
    content: 'were seeking all the more to kill him, '
  - type: note
    content: See ch. 10:33
  - type: text
    content: 'because not only was he '
  - type: note
    content: ver. 16
  - type: text
    content: 'breaking the Sabbath, but he was even calling God '
  - type: note
    content: '[Rom. 8:32]'
  - type: text
    content: 'his own Father, '
  - type: note
    content: Phil. 2:6
  - type: text
    content: making himself equal with God.
  - type: heading
    content: The Authority of the Son
  '19':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: See ver. 30
  - type: text
    content: 'the Son '
  - type: note
    content: '[ch. 16:13]'
  - type: text
    content: can do nothing of his own accord, but only what he sees the Father doing. For whatever the Father
  - type: note
    content: Greek he
  - type: text
    content: ' '
  - type: text
    content: does, that the Son does likewise.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now there is in Jerusalem by '
  - type: note
    content: Neh. 3:1, 32; 12:39
  - type: text
    content: the Sheep Gate a pool, in Aramaic
  - type: note
    content: Or Hebrew
  - type: text
    content: ' called Bethesda,'
  - type: note
    content: Some manuscripts Bethsaida
  - type: text
    content: ' which has five roofed colonnades. '
  '20':
  - type: text
    content: 'For '
  - type: note
    content: ch. 3:35; 10:17; 15:9, 10; 17:23-26; [Matt. 3:17]
  - type: text
    content: 'the Father loves the Son and shows him all that he himself is doing. And '
  - type: note
    content: '[ch. 14:12]'
  - type: text
    content: 'greater works than these will he show him, so that '
  - type: note
    content: ch. 7:21
  - type: text
    content: you may marvel.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'For as the Father '
  - type: note
    content: '[Deut. 32:39; 2 Cor. 1:9]'
  - type: text
    content: 'raises the dead and '
  - type: note
    content: Rom. 4:17; 8:11
  - type: text
    content: 'gives them life, so '
  - type: note
    content: '[ch. 6:33; 11:25]; See 1 Cor. 15:45'
  - type: text
    content: 'also the Son gives life '
  - type: note
    content: '[Rom. 9:18]'
  - type: text
    content: to whom he will.
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[Acts 17:31]'
  - type: text
    content: 'For the Father judges no one, but '
  - type: note
    content: ver. 27; ch. 9:39; Acts 10:42; [ch. 3:17]; See ch. 17:2
  - type: text
    content: has given all judgment to the Son,
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'that all may honor the Son, just as they '
  - type: note
    content: ch. 8:49
  - type: text
    content: 'honor the Father. '
  - type: note
    content: Luke 10:16; [ch. 15:23; 1 John 2:23]
  - type: text
    content: Whoever does not honor the Son does not honor the Father who sent him.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: '[ch. 8:51]'
  - type: text
    content: 'whoever hears my word and '
  - type: note
    content: ch. 20:31; 1 John 5:9-13; [ch. 3:15, 36; 12:44]
  - type: text
    content: 'believes him who sent me has eternal life. He '
  - type: note
    content: ch. 3:18; [ver. 29]
  - type: text
    content: 'does not come into judgment, but '
  - type: note
    content: 1 John 3:14
  - type: text
    content: has passed from death to life.
  '25':
  - type: text
    content: ' '
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: See ch. 4:21, 23
  - type: text
    content: 'an hour is coming, and is now here, when '
  - type: note
    content: See Eph. 2:1, 5
  - type: text
    content: 'the dead will hear '
  - type: note
    content: '[ch. 11:43 ]'
  - type: text
    content: 'the voice of the Son of God, and those who hear '
  - type: note
    content: See Eph. 2:1, 5
  - type: text
    content: will live.
  - type: text
    content: ' '
  '26':
  - type: note
    content: '[ch. 6:57]'
  - type: text
    content: 'For as the Father has life in himself, '
  - type: note
    content: See ch. 1:4; 17:2
  - type: text
    content: so he has granted the Son also to have life in himself.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he '
  - type: note
    content: ver. 22
  - type: text
    content: has given him authority to execute judgment, because he is the Son of Man.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Do not marvel at this, for '
  - type: note
    content: '[See ver. 25above]'
  - type: text
    content: 'an hour is coming when '
  - type: note
    content: ch. 11:24; 1 Cor. 15:52; [ch. 11:44, 45]
  - type: text
    content: all who are in the tombs will hear his voice
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'and come out, '
  - type: note
    content: See Dan. 12:2
  - type: text
    content: those who have done good to the resurrection of life, and those who have done evil to the resurrection of judgment.
  - type: heading
    content: Witnesses to Jesus
  '3':
  - type: text
    content: 'In these lay a multitude of invalids—blind, lame, and '
  - type: note
    content: Matt. 12:10
  - type: text
    content: paralyzed.
  - type: note
    content: 'Some manuscripts insert, wholly or in part, waiting for the moving of the water; 4for an angel of the Lord went down at certain seasons into the pool, and stirred the water: whoever stepped in first after the stirring of the water was healed of whatever disease he had'
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: note
    content: ver. 19 ; ch. 8:28; 14:10
  - type: text
    content: '“I can do nothing on my own. As I hear, I judge, and '
  - type: note
    content: ch. 8:16
  - type: text
    content: 'my judgment is just, because '
  - type: note
    content: ch. 4:34; 6:38; [ch. 7:18; Rom. 15:3 ]
  - type: text
    content: 'I seek not my own will '
  - type: note
    content: See Matt. 26:39
  - type: text
    content: but the will of him who sent me.
  - type: text
    content: ' '
  '31':
  - type: note
    content: '[ch. 8:13, 14, 18, 54; 18:21]'
  - type: text
    content: If I alone bear witness about myself, my testimony is not true.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'There is '
  - type: note
    content: ver. 37
  - type: text
    content: 'another who bears witness about me, and '
  - type: note
    content: ch. 7:28, 29
  - type: text
    content: I know that the testimony that he bears about me is true.
  - type: text
    content: ' '
  '33':
  - type: note
    content: See ch. 1:7, 19
  - type: text
    content: You sent to John, and he has borne witness to the truth.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Not that '
  - type: note
    content: 1 John 5:9
  - type: text
    content: the testimony that I receive is from man, but I say these things so that you may be saved.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'He was a burning and '
  - type: note
    content: 2 Pet. 1:19
  - type: text
    content: 'shining lamp, and '
  - type: note
    content: '[Matt. 13:20; 21:26]'
  - type: text
    content: you were willing to rejoice for a while in his light.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'But '
  - type: note
    content: '[See ver. 34above]'
  - type: text
    content: 'the testimony that I have is greater than that of John. For '
  - type: note
    content: ch. 10:25, 38; 14:11; 15:24; [ch. 2:23; Matt. 11:4]
  - type: text
    content: 'the works that the Father has given me '
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'to accomplish, the very works that I am doing, '
  - type: note
    content: '[ch. 3:2]'
  - type: text
    content: 'bear witness about me that '
  - type: note
    content: See ch. 3:17
  - type: text
    content: the Father has sent me.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And the Father who sent me '
  - type: note
    content: ch. 8:18; [Matt. 3:17]
  - type: text
    content: 'has himself borne witness about me. His voice you have never heard, '
  - type: note
    content: See ch. 1:18
  - type: text
    content: his form you have never seen,
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'and '
  - type: note
    content: '[1 John 2:14; 4:13, 14; 5:10]'
  - type: text
    content: you do not have his word abiding in you, for you do not believe the one whom he has sent.
  - type: text
    content: ' '
  '39':
  - type: note
    content: '[Acts 17:11; 2 Tim. 3:15]'
  - type: text
    content: 'You search the Scriptures because you think that in them you have eternal life; and '
  - type: note
    content: See Luke 24:27
  - type: text
    content: it is they that bear witness about me,
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'yet '
  - type: note
    content: ver. 43; ch. 3:19; 7:17; [Matt. 23:37; Luke 13:34]
  - type: text
    content: you refuse to come to me that you may have life.
  - type: text
    content: ' '
  '41':
  - type: note
    content: ver. 34; [Matt. 6:1, 2; 1 Thess. 2:6]
  - type: text
    content: I do not receive glory from people.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 2:24, 25
  - type: text
    content: 'I know that you do not have '
  - type: note
    content: Luke 11:42; See Jude 21
  - type: text
    content: the love of God within you.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'I have come '
  - type: note
    content: ch. 10:25; 12:13; 17:12
  - type: text
    content: 'in my Father’s name, and '
  - type: note
    content: ch. 1:11; 3:11, 32
  - type: text
    content: 'you do not receive me. '
  - type: note
    content: '[Matt. 24:5]'
  - type: text
    content: If another comes in his own name, you will receive him.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'How can you believe, when you receive glory from one another and '
  - type: note
    content: Rom. 2:29
  - type: text
    content: 'do not seek the glory that comes from '
  - type: note
    content: ch. 17:3
  - type: text
    content: the only God?
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Do not think that I will accuse you to the Father. There is one who accuses you: Moses, '
  - type: note
    content: '[ch. 9:28, 29; Rom. 2:17]'
  - type: text
    content: on whom you have set your hope.
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'For if you believed Moses, you would believe me; for '
  - type: note
    content: ver. 47; Num. 21:9; Deut. 18:15; Luke 24:27; [ch. 12:41]
  - type: text
    content: he wrote of me.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'But '
  - type: note
    content: '[Luke 16:31]'
  - type: text
    content: if you do not believe his writings, how will you believe my words?”
  '5':
  - type: text
    content: 'One man was there who had been an invalid for thirty-eight years. '
  '6':
  - type: text
    content: 'When Jesus saw him lying there and knew that he had already been there a long time, he said to him, '
  - type: text
    content: “Do you want to be healed?”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'The sick man answered him, “Sir, I have no one to put me into the pool when the water is stirred up, and while I am going another steps down before me.” '
  '8':
  - type: text
    content: 'Jesus said to him, '
  - type: note
    content: Matt. 9:6, 7; Mark 2:9, 11, 12; Luke 5:24, 25
  - type: text
    content: “Get up, take up your bed, and walk.”
  - type: text
    content: ' '
  '9':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: And at once the man was healed, and he took up his bed and walked.
  - type: note
    content: ch. 9:14
  - type: text
    content: 'Now that day was the Sabbath. '
