document_id: 1CO.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning Against Idolatry
  - type: text
    content: For I do not want you to be unaware, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' that our fathers were all under '
  - type: note
    content: See Ex. 13:21
  - type: text
    content: 'the cloud, and all '
  - type: note
    content: See Ex. 14:22
  - type: text
    content: 'passed through the sea, '
  '10':
  - type: text
    content: 'nor grumble, '
  - type: note
    content: See Num. 14:2
  - type: text
    content: 'as some of them did and '
  - type: note
    content: Num. 14:29-37
  - type: text
    content: 'were destroyed by '
  - type: note
    content: Ex. 12:23; 2 Sam. 24:16; 1 Chr. 21:15; Ps. 78:49
  - type: text
    content: 'the Destroyer. '
  '11':
  - type: text
    content: 'Now these things happened to them as an example, but '
  - type: note
    content: See Rom. 4:23
  - type: text
    content: 'they were written down for our instruction, '
  - type: note
    content: See Rom. 13:11
  - type: text
    content: 'on whom the end of the ages has come. '
  '12':
  - type: text
    content: 'Therefore '
  - type: note
    content: Rom. 11:20; [2 Pet. 3:17]
  - type: text
    content: 'let anyone who thinks that he stands take heed lest he fall. '
  '13':
  - type: text
    content: 'No temptation has overtaken you that is not common to man. '
  - type: note
    content: See ch. 1:9
  - type: text
    content: 'God is faithful, and '
  - type: note
    content: '[Dan. 3:17]; See 2 Pet. 2:9'
  - type: text
    content: he will not let you be tempted beyond your ability, but with the temptation he will also provide the way of escape, that you may be able to endure it.
  '14':
  - type: text
    content: 'Therefore, my beloved, '
  - type: note
    content: ver. 7
  - type: text
    content: 'flee from idolatry. '
  '15':
  - type: text
    content: 'I speak '
  - type: note
    content: '[ch. 8:1]'
  - type: text
    content: 'as to sensible people; judge for yourselves what I say. '
  '16':
  - type: note
    content: ch. 11:25; Matt. 26:27, 28
  - type: text
    content: 'The cup of blessing that we bless, is it not a participation in the blood of Christ? '
  - type: note
    content: ch. 11:23, 24; Matt. 26:26; See Acts 2:42; 20:7
  - type: text
    content: 'The bread that we break, is it not a participation in the body of Christ? '
  '17':
  - type: text
    content: 'Because there is one bread, we who are many are '
  - type: note
    content: ch. 12:12, 13, 20; Rom. 12:5; Eph. 4:4, 16; Col. 3:15
  - type: text
    content: 'one body, for we all partake of the one bread. '
  '18':
  - type: text
    content: 'Consider '
  - type: note
    content: Rom. 1:3; 4:1; 9:5; 2 Cor. 11:18
  - type: text
    content: 'the people of Israel:'
  - type: note
    content: Greek Consider Israel according to the flesh
  - type: text
    content: ' '
  - type: note
    content: Lev. 3:3; 7:15; [Heb. 13:10]
  - type: text
    content: 'are not those who eat the sacrifices participants in the altar? '
  '19':
  - type: text
    content: 'What do I imply then? That food offered to idols is anything, or that '
  - type: note
    content: See ch. 8:4
  - type: text
    content: 'an idol is anything? '
  '2':
  - type: text
    content: 'and all were baptized into Moses in the cloud and in the sea, '
  '20':
  - type: text
    content: 'No, I imply that what pagans sacrifice '
  - type: note
    content: Deut. 32:17
  - type: text
    content: 'they offer to demons and not to God. I do not want you to be participants with demons. '
  '21':
  - type: note
    content: '[2 Cor. 6:15, 16]'
  - type: text
    content: 'You cannot drink the cup of the Lord and '
  - type: note
    content: '[Deut. 32:38]'
  - type: text
    content: 'the cup of demons. You cannot partake of the table of the Lord and '
  - type: note
    content: '[Isa. 65:11]'
  - type: text
    content: 'the table of demons. '
  '22':
  - type: note
    content: Deut. 32:21
  - type: text
    content: 'Shall we provoke the Lord to jealousy? '
  - type: note
    content: Eccles. 6:10; Ezek. 22:14
  - type: text
    content: Are we stronger than he?
  - type: heading
    content: Do All to the Glory of God
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:12; See ch. 8:9
  - type: text
    content: '“All things are lawful,” but not all things are helpful. “All things are lawful,” but not all things build up. '
  '24':
  - type: note
    content: ver. 33; ch. 13:5; Phil. 2:21; [ch. 9:23; 2 Cor. 12:14]; See Rom. 15:1
  - type: text
    content: 'Let no one seek his own good, but the good of his neighbor. '
  '25':
  - type: note
    content: ch. 8:7
  - type: text
    content: 'Eat whatever is sold in the meat market without raising any question on the ground of conscience. '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: Cited from Ps. 24:1; [Ex. 9:29; 19:5; Deut. 10:14; Job 41:11; Ps. 50:12]
  - type: text
    content: '“the earth is the Lord’s, and the fullness thereof.” '
  '27':
  - type: text
    content: 'If one of the unbelievers invites you to dinner and you are disposed to go, '
  - type: note
    content: Luke 10:8
  - type: text
    content: 'eat whatever is set before you without raising any question on the ground of conscience. '
  '28':
  - type: text
    content: 'But if someone says to you, “This has been offered in sacrifice,” then do not eat it, for the sake of the one who informed you, and for the sake of conscience— '
  '29':
  - type: text
    content: 'I do not mean '
  - type: note
    content: '[ch. 8:9-12]'
  - type: text
    content: 'your conscience, but his. For '
  - type: note
    content: '[ch. 9:19; Rom. 14:16]'
  - type: text
    content: 'why should my liberty be determined by someone else’s conscience? '
  '3':
  - type: text
    content: 'and '
  - type: note
    content: Ex. 16:15, 35; Deut. 8:3; Neh. 9:15, 20; Ps. 78:24
  - type: text
    content: 'all ate the same '
  - type: note
    content: Ps. 78:25; 105:40; John 6:31
  - type: text
    content: 'spiritual food, '
  '30':
  - type: text
    content: 'If I partake with thankfulness, why am I denounced because of that '
  - type: note
    content: Rom. 14:6; 1 Tim. 4:3, 4
  - type: text
    content: for which I give thanks?
  '31':
  - type: text
    content: 'So, whether you eat or drink, or '
  - type: note
    content: Col. 3:17; 1 Pet. 4:11
  - type: text
    content: 'whatever you do, do all to the glory of God. '
  '32':
  - type: note
    content: ch. 8:13; Rom. 14:13; 2 Cor. 6:3
  - type: text
    content: 'Give no offense to Jews or to Greeks or to '
  - type: note
    content: '[ch. 11:16]; See Acts 20:28'
  - type: text
    content: 'the church of God, '
  '33':
  - type: text
    content: 'just as '
  - type: note
    content: ch. 9:22; [Gal. 1:10]
  - type: text
    content: 'I try to please everyone in everything I do, '
  - type: note
    content: See ver. 24
  - type: text
    content: not seeking my own advantage, but that of many, that they may be saved.
  '4':
  - type: text
    content: 'and '
  - type: note
    content: See Ex. 17:6
  - type: text
    content: 'all drank the same spiritual drink. For they drank from the spiritual Rock that followed them, and the Rock was Christ. '
  '5':
  - type: text
    content: 'Nevertheless, with most of them God was not pleased, for '
  - type: note
    content: Num. 14:29, 37; 26:64, 65; Ps. 106:26; Heb. 3:17; Jude 5
  - type: text
    content: they were overthrown
  - type: note
    content: Or were laid low
  - type: text
    content: ' in the wilderness.'
  '6':
  - type: text
    content: 'Now these things took place as examples for us, that we might not desire evil as '
  - type: note
    content: Num. 11:4, 33, 34; Ps. 78:18; 106:14
  - type: text
    content: 'they did. '
  '7':
  - type: note
    content: ver. 14
  - type: text
    content: 'Do not be idolaters '
  - type: note
    content: Ex. 32:4
  - type: text
    content: 'as some of them were; as it is written, '
  - type: note
    content: Cited from Ex. 32:6
  - type: text
    content: '“The people sat down to eat and drink and rose up to play.” '
  '8':
  - type: note
    content: See ch. 6:18; Acts 15:20
  - type: text
    content: 'We must not indulge in sexual immorality '
  - type: note
    content: Num. 25:1
  - type: text
    content: 'as some of them did, and '
  - type: note
    content: '[Num. 25:9; Ps. 106:29]'
  - type: text
    content: 'twenty-three thousand fell in a single day. '
  '9':
  - type: text
    content: We must not put Christ
  - type: note
    content: Some manuscripts the Lord
  - type: text
    content: ' to the test, '
  - type: note
    content: Num. 21:5; [Ex. 17:2, 7]; See Ps. 78:18
  - type: text
    content: 'as some of them did and '
  - type: note
    content: See Num. 21:6
  - type: text
    content: 'were destroyed by serpents, '
