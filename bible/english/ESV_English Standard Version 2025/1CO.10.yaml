      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
