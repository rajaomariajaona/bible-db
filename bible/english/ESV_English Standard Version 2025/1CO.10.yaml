        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 26:26
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:42
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:7
      marker-yv: yv-n
    - type: text
      text: 'The bread that we break, is it not a participation in the body of Christ? '
  '17':
  - type: usfm
