      marker-yv: yv-n
    - type: text
      text: 'God is faithful, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 3:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See 2 Pet. 2:9'
      marker-yv: yv-n
    - type: text
