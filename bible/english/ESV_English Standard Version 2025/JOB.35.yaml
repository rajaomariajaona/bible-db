  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 22:12 ]'
  - type: text
    content: Look at the heavens, and see;
  - type: text
    content: and behold the clouds, which are higher than you.
  '6':
  - type: text
    content: 'If you have sinned, '
  - type: note
    content: Prov. 8:36; Jer. 7:19
  - type: text
    content: what do you accomplish against him?
  - type: text
    content: And if your transgressions are multiplied, what do you do to him?
