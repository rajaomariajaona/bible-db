  - type: text
    content: ' '
  - type: note
    content: ch. 22:2, 3; Prov. 9:12; Luke 17:10; [ch. 41:11; Rom. 11:35 ]
  - type: text
    content: If you are righteous, what do you give to him?
  - type: text
    content: Or what does he receive from your hand?
  '8':
  - type: text
    content: Your wickedness concerns a man like yourself,
  - type: text
    content: 'and your righteousness '
  - type: note
    content: ch. 25:6
  - type: text
    content: a son of man.
