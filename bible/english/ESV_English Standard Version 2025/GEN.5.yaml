      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 3:36-38
      marker-yv: yv-n
    - type: text
      text: 'The days of Adam after he fathered Seth were 800 years; and he had other sons and daughters. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thus all the days that Adam lived were 930 years, '
    - type: usfm
