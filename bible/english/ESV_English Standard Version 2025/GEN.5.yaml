      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pleased God
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 24
      marker-yv: yv-n
    - type: text
      text: ' after he fathered Methuselah 300 years and had other sons and daughters. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Thus all the days of Enoch were 365 years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Enoch '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
