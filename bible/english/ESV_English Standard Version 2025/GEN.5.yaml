document_id: GEN.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Adam’s Descendants to Noah
  - type: text
    content: 'This is the book of the generations of Adam. When God created man, '
  - type: note
    content: See ch. 1:26, 27
  - type: text
    content: 'he made him in the likeness of God. '
  '10':
  - type: text
    content: 'Enosh lived after he fathered Kenan 815 years and had other sons and daughters. '
  '11':
  - type: text
    content: Thus all the days of Enosh were 905 years, and he died.
  '12':
  - type: text
    content: 'When Kenan had lived 70 years, he fathered Mahalalel. '
  '13':
  - type: text
    content: 'Kenan lived after he fathered Mahalalel 840 years and had other sons and daughters. '
  '14':
  - type: text
    content: Thus all the days of Kenan were 910 years, and he died.
  '15':
  - type: text
    content: 'When Mahalalel had lived 65 years, he fathered Jared. '
  '16':
  - type: text
    content: 'Mahalalel lived after he fathered Jared 830 years and had other sons and daughters. '
  '17':
  - type: text
    content: Thus all the days of Mahalalel were 895 years, and he died.
  '18':
  - type: text
    content: 'When Jared had lived 162 years, he fathered '
  - type: note
    content: Jude 14
  - type: text
    content: 'Enoch. '
  '19':
  - type: text
    content: 'Jared lived after he fathered Enoch 800 years and had other sons and daughters. '
  '2':
  - type: text
    content: Male and female he created them, and he blessed them and named them Man
  - type: note
    content: Hebrew adam
  - type: text
    content: ' when they were created. '
  '20':
  - type: text
    content: Thus all the days of Jared were 962 years, and he died.
  '21':
  - type: text
    content: 'When Enoch had lived 65 years, he fathered Methuselah. '
  '22':
  - type: text
    content: 'Enoch '
  - type: note
    content: ver. 24; ch. 6:9; [Mic. 6:8; Mal. 2:6]
  - type: text
    content: walked with God
  - type: note
    content: Septuagint pleased God; also verse 24
  - type: text
    content: ' after he fathered Methuselah 300 years and had other sons and daughters. '
  '23':
  - type: text
    content: 'Thus all the days of Enoch were 365 years. '
  '24':
  - type: text
    content: 'Enoch '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: walked with God, and he was not,
  - type: note
    content: Septuagint was not found
  - type: text
    content: ' '
  - type: note
    content: Heb. 11:5; [2 Kgs. 2:11]
  - type: text
    content: for God took him.
  '25':
  - type: text
    content: 'When Methuselah had lived 187 years, he fathered Lamech. '
  '26':
  - type: text
    content: 'Methuselah lived after he fathered Lamech 782 years and had other sons and daughters. '
  '27':
  - type: text
    content: Thus all the days of Methuselah were 969 years, and he died.
  '28':
  - type: text
    content: 'When Lamech had lived 182 years, he fathered a son '
  '29':
  - type: text
    content: 'and called his name Noah, saying, “Out of the ground '
  - type: note
    content: ch. 3:17
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' has cursed, this one shall bring us relief'
  - type: note
    content: Noah sounds like the Hebrew for rest
  - type: text
    content: ' from our work and from the painful toil of our hands.” '
  '3':
  - type: text
    content: 'When Adam had lived 130 years, he fathered a son in his own likeness, after his image, and '
  - type: note
    content: ch. 4:25
  - type: text
    content: 'named him Seth. '
  '30':
  - type: text
    content: 'Lamech lived after he fathered Noah 595 years and had other sons and daughters. '
  '31':
  - type: text
    content: Thus all the days of Lamech were 777 years, and he died.
  '32':
  - type: text
    content: 'After Noah was 500 years old, Noah fathered '
  - type: note
    content: ch. 6:10
  - type: text
    content: 'Shem, Ham, and '
  - type: note
    content: ch. 10:21
  - type: text
    content: Japheth.
  '4':
  - type: note
    content: For ver. 4-32, see 1 Chr. 1:1-4; Luke 3:36-38
  - type: text
    content: 'The days of Adam after he fathered Seth were 800 years; and he had other sons and daughters. '
  '5':
  - type: text
    content: 'Thus all the days that Adam lived were 930 years, '
  - type: note
    content: ch. 3:19
  - type: text
    content: and he died.
  '6':
  - type: text
    content: 'When Seth had lived 105 years, '
  - type: note
    content: ch. 4:26
  - type: text
    content: 'he fathered Enosh. '
  '7':
  - type: text
    content: 'Seth lived after he fathered Enosh 807 years and had other sons and daughters. '
  '8':
  - type: text
    content: Thus all the days of Seth were 912 years, and he died.
  '9':
  - type: text
    content: 'When Enosh had lived 90 years, he fathered Kenan. '
