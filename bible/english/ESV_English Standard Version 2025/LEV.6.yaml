document_id: LEV.6,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ch 5:20 in Hebrew
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ch. 16:4; Ezek. 44:18; See Ex. 28:39-43
  - type: text
    content: 'the priest shall put on his linen garment and put his linen undergarment on his body, and he shall take up the ashes to which the fire has reduced the burnt offering on the altar and put them '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'beside the altar. '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 16:23; Ezek. 42:14; 44:19
  - type: text
    content: 'he shall take off his garments and put on other garments and carry the ashes '
  - type: note
    content: See ch. 4:12
  - type: text
    content: 'outside the camp to a clean place. '
  '12':
  - type: text
    content: 'The fire on the altar shall be kept burning on it; it shall not go out. The priest shall burn wood on it every morning, and he shall arrange the burnt offering on it and shall burn on it '
  - type: note
    content: ch. 3:3, 9, 14
  - type: text
    content: 'the fat of the peace offerings. '
  '13':
  - type: text
    content: Fire shall be kept burning on the altar continually; it shall not go out.
  '14':
  - type: text
    content: '“And this is the law of '
  - type: note
    content: ch. 2:1; Num. 15:4
  - type: text
    content: 'the grain offering. The sons of Aaron shall offer it before the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the altar. '
  '15':
  - type: text
    content: 'And one shall take from it a handful of the fine flour of the grain offering and its oil and all the frankincense that is on the grain offering and burn this as its '
  - type: note
    content: ch. 2:2, 9
  - type: text
    content: 'memorial portion on the altar, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ch. 2:3, 10; Ezek. 44:29; [1 Cor. 9:13]
  - type: text
    content: 'the rest of it Aaron and his sons shall eat. It shall be eaten unleavened '
  - type: note
    content: ver. 26; ch. 10:12, 13
  - type: text
    content: 'in a holy place. In the court of the tent of meeting they shall eat it. '
  '17':
  - type: note
    content: ch. 2:11
  - type: text
    content: 'It shall not be baked with leaven. '
  - type: note
    content: Num. 18:9
  - type: text
    content: 'I have given it as their portion of my food offerings. '
  - type: note
    content: ver. 25, 29; ch. 2:3; 7:1
  - type: text
    content: 'It is a thing most holy, like the sin offering and the guilt offering. '
  '18':
  - type: text
    content: 'Every male among the children of Aaron may eat of it, as decreed forever throughout your generations, from the '
  - type: text
    content: Lord
  - type: text
    content: ’s food offerings. Whatever touches them shall become holy.”
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '2':
  - type: text
    content: '“If anyone sins and '
  - type: note
    content: Num. 5:6
  - type: text
    content: 'commits a breach of faith against the '
  - type: text
    content: Lord
  - type: text
    content: ' by '
  - type: note
    content: ch. 19:11
  - type: text
    content: 'deceiving his neighbor in '
  - type: note
    content: Ex. 22:7, 10
  - type: text
    content: 'a matter of deposit or security, or through robbery, or '
  - type: note
    content: ch. 19:13; Mic. 2:2
  - type: text
    content: 'if he has oppressed his neighbor '
  '20':
  - type: note
    content: Ex. 29:1, 2
  - type: text
    content: '“This is the offering that Aaron and his sons shall offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the day when he is anointed: a '
  - type: note
    content: ch. 5:11; Ex. 16:36
  - type: text
    content: tenth of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of fine flour as a regular grain offering, half of it in the morning and half in the evening. '
  '21':
  - type: text
    content: 'It shall be made with oil '
  - type: note
    content: ch. 2:5; 7:9
  - type: text
    content: 'on a griddle. You shall bring it '
  - type: note
    content: ch. 7:12
  - type: text
    content: well mixed, in baked
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' pieces like a grain offering, and offer it for a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'The priest from among Aaron’s sons, who is anointed to succeed him, shall offer it to the '
  - type: text
    content: Lord
  - type: text
    content: ' as decreed forever. '
  - type: note
    content: Ex. 29:25
  - type: text
    content: 'The whole of it shall be burned. '
  '23':
  - type: text
    content: Every grain offering of a priest shall be wholly burned. It shall not be eaten.”
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '25':
  - type: text
    content: '“Speak to Aaron and his sons, saying, '
  - type: note
    content: See ch. 4
  - type: text
    content: 'This is the law of the sin offering. '
  - type: note
    content: ch. 1:3, 5, 11; 4:24, 29, 33; [ch. 7:2]
  - type: text
    content: 'In the place where the burnt offering is killed shall the sin offering be killed before the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: ver. 17, 29
  - type: text
    content: 'it is most holy. '
  '26':
  - type: note
    content: ch. 10:17, 18; Num. 18:9, 19; Ezek. 44:27-29
  - type: text
    content: 'The priest who offers it for sin shall eat it. '
  - type: note
    content: ver. 16
  - type: text
    content: 'In a holy place it shall be eaten, in the court of the tent of meeting. '
  '27':
  - type: text
    content: 'Whatever touches its flesh shall be holy, and when any of its blood is splashed on a garment, you shall wash that on which it was splashed in a holy place. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: ch. 11:32, 33; 15:12
  - type: text
    content: 'the earthenware vessel in which it is boiled '
  - type: note
    content: '[ch. 11:33; 15:12]'
  - type: text
    content: 'shall be broken. But if it is boiled in a bronze vessel, that shall be scoured and rinsed in water. '
  '29':
  - type: text
    content: 'Every male among the priests may eat of it; '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'it is most holy. '
  '3':
  - type: text
    content: 'or '
  - type: note
    content: Ex. 23:4; Deut. 22:1-3
  - type: text
    content: 'has found something lost and lied about it, '
  - type: note
    content: ch. 19:12; Ex. 22:11
  - type: text
    content: 'swearing falsely—in any of all the things that people do and sin thereby— '
  '30':
  - type: note
    content: ch. 4:7, 11, 12, 18, 21; 16:27; Heb. 13:11; [ver. 26, 29; ch. 10:18]
  - type: text
    content: But no sin offering shall be eaten from which any blood is brought into the tent of meeting to make atonement in the Holy Place; it shall be burned up with fire.
  '4':
  - type: text
    content: 'if he has sinned and has realized his guilt and will restore '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'what he took by robbery or what he got by oppression or the deposit that was committed to him or the lost thing that he found '
  '5':
  - type: text
    content: 'or anything about which he has sworn falsely, he shall '
  - type: note
    content: Num. 5:7; [ch. 5:16; 2 Sam. 12:6; Luke 19:8]
  - type: text
    content: 'restore it in full and shall add a fifth to it, and give it to him to whom it belongs on the day he realizes his guilt. '
  '6':
  - type: text
    content: 'And he shall bring to the priest as his compensation to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 5:15, 18
  - type: text
    content: 'a ram without blemish out of the flock, or its equivalent, for a guilt offering. '
  '7':
  - type: note
    content: See ch. 4:26
  - type: text
    content: 'And the priest shall make atonement for him before the '
  - type: text
    content: Lord
  - type: text
    content: ', and he shall be forgiven for any of the things that one may do and thereby become guilty.”'
  - type: heading
    content: The Priests and the Offerings
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ch 6:1 in Hebrew
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '9':
  - type: text
    content: '“Command Aaron and his sons, saying, This is the law of the burnt offering. The burnt offering shall be on the hearth on the altar all night until the morning, and the fire of the altar shall be kept burning on it. '
