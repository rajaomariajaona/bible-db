document_id: ACT.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Promise of the Holy Spirit
  - type: text
    content: 'In the first book, O '
  - type: note
    content: Luke 1:3
  - type: text
    content: 'Theophilus, I have dealt with all that Jesus began '
  - type: note
    content: Luke 24:19
  - type: text
    content: 'to do and teach, '
  '10':
  - type: text
    content: 'And while they were gazing into heaven as he went, behold, '
  - type: note
    content: '[Luke 24:4]'
  - type: text
    content: 'two '
  - type: note
    content: Josh. 5:13; Dan. 9:21; 10:5; 12:6, 7; Zech. 1:8-11
  - type: text
    content: 'men stood by them in '
  - type: note
    content: Matt. 28:3; Mark 16:5; John 20:12
  - type: text
    content: 'white robes, '
  '11':
  - type: text
    content: 'and said, '
  - type: note
    content: ch. 2:7; 13:31
  - type: text
    content: '“Men of Galilee, why do you stand looking into heaven? This Jesus, who was taken up from you into heaven, '
  - type: note
    content: '[Phil. 3:20; 1 Thess. 1:10]; See Matt. 16:27'
  - type: text
    content: 'will '
  - type: note
    content: 2 Thess. 1:10
  - type: text
    content: come in the same way as you saw him go into heaven.”
  - type: heading
    content: Matthias Chosen to Replace Judas
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: Luke 24:50, 52
  - type: text
    content: 'they returned to Jerusalem from the mount called Olivet, which is near Jerusalem, a Sabbath day’s journey away. '
  '13':
  - type: text
    content: 'And when they had entered, they went up to '
  - type: note
    content: ch. 9:37, 39; 20:8
  - type: text
    content: 'the upper room, where they were staying, '
  - type: note
    content: See Matt. 10:2-4; Mark 3:16-19; Luke 6:14-16
  - type: text
    content: 'Peter and John and James and Andrew, Philip and Thomas, Bartholomew and Matthew, James the son of Alphaeus and Simon '
  - type: note
    content: '[ch. 21:20]'
  - type: text
    content: 'the Zealot and Judas the son of James. '
  '14':
  - type: text
    content: 'All these '
  - type: note
    content: ch. 2:46; 4:24; 5:12; 15:25; Rom. 15:6
  - type: text
    content: 'with one accord '
  - type: note
    content: ch. 2:42; 6:4; Rom. 12:12; Col. 4:2; [Eph. 6:18]
  - type: text
    content: 'were devoting themselves to prayer, together with '
  - type: note
    content: Luke 8:2, 3
  - type: text
    content: 'the women and Mary the mother of Jesus, and '
  - type: note
    content: See Matt. 12:46
  - type: text
    content: his brothers.
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verse 15
  '15':
  - type: text
    content: 'In those days Peter stood up among '
  - type: note
    content: See John 21:23
  - type: text
    content: 'the brothers (the company of persons was in all about 120) and said, '
  '16':
  - type: text
    content: '“Brothers, '
  - type: note
    content: Luke 24:44; [Luke 22:37]
  - type: text
    content: 'the Scripture had to be fulfilled, which the Holy Spirit spoke beforehand by the mouth of David concerning Judas, '
  - type: note
    content: Matt. 26:47; Mark 14:43; Luke 22:47; John 18:3
  - type: text
    content: 'who became a guide to those who arrested Jesus. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: John 6:71; 13:21
  - type: text
    content: 'he was numbered among us and was allotted his share in '
  - type: note
    content: ver. 25; ch. 20:24; 21:19; Rom. 11:13; 2 Cor. 4:1
  - type: text
    content: 'this ministry.” '
  '18':
  - type: text
    content: '(Now this man '
  - type: note
    content: '[Matt. 27:5-8]'
  - type: text
    content: 'acquired a field with '
  - type: note
    content: '[Matt. 26:14-16]'
  - type: text
    content: the reward of his wickedness, and falling headlong
  - type: note
    content: Or swelling up
  - type: text
    content: ' he burst open in the middle and all his bowels gushed out. '
  '19':
  - type: text
    content: 'And it became known to all the inhabitants of Jerusalem, so that the field was called '
  - type: note
    content: '[ch. 21:40]'
  - type: text
    content: 'in their own language Akeldama, that is, Field of Blood.) '
  '2':
  - type: text
    content: 'until the day when '
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'he was taken up, after he '
  - type: note
    content: '[ch. 10:42; Matt. 28:19, 20; Mark 16:15; Luke 24:47; John 20:21]'
  - type: text
    content: 'had given commands '
  - type: note
    content: '[ch. 10:38; Luke 4:1, 18; John 20:22]'
  - type: text
    content: 'through the Holy Spirit to the apostles whom he had chosen. '
  '20':
  - type: text
    content: “For it is written in the Book of Psalms,
  - type: note
    content: Cited from Ps. 69:25
  - type: text
    content: “‘May his camp become desolate,
  - type: text
    content: and let there be no one to dwell in it’;
  - type: text
    content: and
  - type: note
    content: Cited from Ps. 109:8
  - type: text
    content: “‘Let another take his office.’
  '21':
  - type: text
    content: 'So one of the men who have accompanied us during '
  - type: note
    content: '[John 15:27]'
  - type: text
    content: 'all the time that the Lord Jesus '
  - type: note
    content: Num. 27:17; Deut. 31:2; 1 Sam. 18:13
  - type: text
    content: 'went in and out among us, '
  '22':
  - type: note
    content: ch. 13:24; Mark 1:1-4
  - type: text
    content: 'beginning from the baptism of John until the day when '
  - type: note
    content: ver. 2, 9
  - type: text
    content: 'he was taken up from us—one of these men must become with us '
  - type: note
    content: ch. 4:33; [ver. 8; 1 Pet. 1:3]; See Luke 24:48
  - type: text
    content: 'a witness to his resurrection.” '
  '23':
  - type: text
    content: 'And they put forward two, Joseph called '
  - type: note
    content: '[ch. 15:22]'
  - type: text
    content: 'Barsabbas, who was also called '
  - type: note
    content: '[ch. 18:7; Col. 4:11]'
  - type: text
    content: 'Justus, and '
  - type: note
    content: ver. 26
  - type: text
    content: 'Matthias. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 6:6; 13:3
  - type: text
    content: 'they prayed and said, “You, Lord, '
  - type: note
    content: See 1 Sam. 16:7; Rom. 8:27
  - type: text
    content: 'who know the hearts of all, show which one of these two you have chosen '
  '25':
  - type: text
    content: 'to take the place in '
  - type: note
    content: See ver. 17
  - type: text
    content: 'this ministry and '
  - type: note
    content: Rom. 1:5; 1 Cor. 9:2; Gal. 2:8
  - type: text
    content: 'apostleship from which Judas turned aside to go to his own place.” '
  '26':
  - type: text
    content: And they cast lots for them, and the lot fell on Matthias, and he was numbered with the eleven apostles.
  '3':
  - type: note
    content: ch. 10:40, 41; 13:31; Matt. 28:17; Mark 16:14; Luke 24:34, 36-51; John 20:19-29; 21; 1 Cor. 15:5-7
  - type: text
    content: He presented himself alive to them after his suffering by many proofs, appearing to them during forty days and speaking about the kingdom of God.
  '4':
  - type: text
    content: And while staying
  - type: note
    content: Or eating
  - type: text
    content: ' with them '
  - type: note
    content: Luke 24:49
  - type: text
    content: 'he ordered them not to depart from Jerusalem, but to wait for the promise of the Father, which, he said, '
  - type: text
    content: “you heard from me;
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'for '
  - type: note
    content: ch. 11:16; See Matt. 3:11
  - type: text
    content: 'John baptized with water, '
  - type: note
    content: ch. 11:16; See Matt. 3:11
  - type: text
    content: 'but you will be baptized '
  - type: note
    content: ch. 2:1-4
  - type: text
    content: with
  - type: note
    content: Or in
  - type: text
    content: ' '
  - type: text
    content: the Holy Spirit not many days from now.”
  - type: heading
    content: The Ascension
  '6':
  - type: text
    content: 'So when they had come together, they asked him, “Lord, '
  - type: note
    content: See Luke 17:20
  - type: text
    content: 'will you at this time '
  - type: note
    content: '[Mic. 4:8; Matt. 17:11; Mark 9:12; Luke 19:11]'
  - type: text
    content: 'restore the kingdom to Israel?” '
  '7':
  - type: text
    content: 'He said to them, '
  - type: note
    content: '[Matt. 24:36; Mark 13:32]'
  - type: text
    content: '“It is not for you to know '
  - type: note
    content: Dan. 2:21; 1 Thess. 5:1
  - type: text
    content: times or seasons that the Father has fixed by his own authority.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But you will receive '
  - type: note
    content: ch. 4:33; Luke 24:49; 1 Thess. 1:5; [ch. 10:38; Luke 4:14]
  - type: text
    content: 'power '
  - type: note
    content: ver. 5
  - type: text
    content: 'when the Holy Spirit has come upon you, and '
  - type: note
    content: '[ver. 22]; See Luke 24:48'
  - type: text
    content: 'you will be '
  - type: note
    content: '[Isa. 43:12]'
  - type: text
    content: 'my witnesses in Jerusalem and in all Judea and '
  - type: note
    content: ch. 8:1, 14; [Matt. 10:5]
  - type: text
    content: 'Samaria, and '
  - type: note
    content: ch. 13:47; [Mark 16:15; Col. 1:23]
  - type: text
    content: to the end of the earth.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And when he had said these things, as they were looking on, '
  - type: note
    content: ver. 2
  - type: text
    content: 'he was lifted up, and '
  - type: note
    content: See 1 Thess. 4:17
  - type: text
    content: 'a cloud took him out of their sight. '
