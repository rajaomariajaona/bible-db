document_id: EZK.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy Against the Shepherds of Israel
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'Behold, I am against the shepherds, and '
  - type: note
    content: '[Heb. 13:17]; See ch. 3:18'
  - type: text
    content: 'I will require my sheep at their hand and '
  - type: note
    content: '[Zech. 11:8]'
  - type: text
    content: 'put a stop to their feeding the sheep. '
  - type: note
    content: '[ver. 2, 8]'
  - type: text
    content: 'No longer shall the shepherds feed themselves. '
  - type: note
    content: '[ch. 13:21]'
  - type: text
    content: I will rescue my sheep from their mouths, that they may not be food for them.
  - type: heading
    content: The Lord God Will Seek Them Out
  '11':
  - type: text
    content: '“For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[Luke 19:10; John 10:11]'
  - type: text
    content: 'Behold, I, I '
  - type: note
    content: '[Mic. 4:6, 7]'
  - type: text
    content: 'myself will search for my sheep and will seek them out. '
  '12':
  - type: text
    content: 'As a shepherd seeks out his flock when he is among his sheep that have been scattered, so will I seek out my sheep, and I will rescue them from all places where they have been scattered on '
  - type: note
    content: ch. 30:3
  - type: text
    content: 'a day of clouds and '
  - type: note
    content: Joel 2:2; Zeph. 1:15
  - type: text
    content: 'thick darkness. '
  '13':
  - type: text
    content: 'And I will bring them out from the peoples '
  - type: note
    content: See ch. 11:17
  - type: text
    content: 'and gather them from the countries, and will bring them into their own land. And I will feed them on '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'the mountains of Israel, by the ravines, and in all the inhabited places of the country. '
  '14':
  - type: note
    content: Ps. 23:2; [John 10:9]
  - type: text
    content: 'I will feed them with good pasture, and on the mountain heights of Israel shall be their grazing land. '
  - type: note
    content: '[Isa. 32:18; Jer. 33:12]'
  - type: text
    content: 'There they shall lie down in good grazing land, and on rich pasture they shall feed on the mountains of Israel. '
  '15':
  - type: note
    content: '[ver. 23; Isa. 40:11]'
  - type: text
    content: 'I myself will be the shepherd of my sheep, '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'and I myself will make them lie down, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '16':
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'I will seek the lost, '
  - type: note
    content: Mic. 4:6
  - type: text
    content: 'and I will bring back the strayed, and I will bind up the injured, and I will strengthen the weak, and '
  - type: note
    content: '[ver. 20; Isa. 10:16; Amos 4:1]'
  - type: text
    content: the fat and the strong I will destroy.
  - type: note
    content: Septuagint, Syriac, Vulgate I will watch over
  - type: text
    content: ' I will feed them in justice.'
  '17':
  - type: text
    content: '“As for you, my flock, thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ver. 20, 22; [ch. 20:38; Matt. 25:32, 33]
  - type: text
    content: 'Behold, I judge between sheep and sheep, between rams and '
  - type: note
    content: Zech. 10:3
  - type: text
    content: 'male goats. '
  '18':
  - type: text
    content: 'Is it not enough for you to feed on the good pasture, that you must tread down with your feet the rest of your pasture; and to drink of '
  - type: note
    content: '[ch. 32:14]'
  - type: text
    content: 'clear water, that you must muddy the rest of the water with your feet? '
  '19':
  - type: text
    content: And must my sheep eat what you have trodden with your feet, and drink what you have muddied with your feet?
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, prophesy against the shepherds of Israel; prophesy, and say to them, even to the shepherds, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See Jer. 23:1
  - type: text
    content: 'Ah, shepherds of Israel '
  - type: note
    content: '[ver. 8, 10; Jude 12]'
  - type: text
    content: 'who have been feeding yourselves! '
  - type: note
    content: '[2 Cor. 12:14]'
  - type: text
    content: 'Should not shepherds feed the sheep? '
  '20':
  - type: text
    content: '“Therefore, thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' to them: Behold, I, I myself will judge between the fat sheep and the lean sheep. '
  '21':
  - type: text
    content: 'Because you push with side and shoulder, and '
  - type: note
    content: Deut. 33:17; Dan. 8:4
  - type: text
    content: 'thrust at all the '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'weak with your horns, till you have scattered them abroad, '
  '22':
  - type: text
    content: I will rescue
  - type: note
    content: Or save
  - type: text
    content: ' my flock; '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'they shall no longer be a prey. And I will judge between sheep and sheep. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: ch. 37:22, 24; Jer. 23:4, 5; Mic. 5:4; 7:14; [ver. 15; John 10:11, 16]
  - type: text
    content: 'I will set up over them one shepherd, '
  - type: note
    content: ch. 37:24, 25; [2 Sam. 5:2; Ps. 78:71, 72]
  - type: text
    content: 'my servant David, and he shall feed them: he shall feed them and be their shepherd. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 37:27; Ex. 29:45; Lev. 26:12
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will be their God, and my servant David shall be prince among them. '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ; I have spoken.
  - type: heading
    content: The Lord’s Covenant of Peace
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 37:26; See Isa. 54:10
  - type: text
    content: '“I will make with them a covenant of peace and '
  - type: note
    content: Lev. 26:6; Hos. 2:18; [Isa. 35:9]; See Isa. 11:6-9
  - type: text
    content: 'banish wild beasts from the land, '
  - type: note
    content: ch. 38:8, 14; 39:26
  - type: text
    content: 'so that they may dwell securely in the wilderness and sleep in the woods. '
  '26':
  - type: text
    content: 'And I will make them and the places all around my hill '
  - type: note
    content: Gen. 12:2; Isa. 19:24; Zech. 8:13
  - type: text
    content: 'a blessing, and '
  - type: note
    content: Lev. 26:4; [ch. 22:24]
  - type: text
    content: 'I will send down the showers in their season; they shall be '
  - type: note
    content: Mal. 3:10
  - type: text
    content: 'showers of blessing. '
  '27':
  - type: note
    content: ch. 36:30; Lev. 26:4
  - type: text
    content: 'And the trees of the field shall yield their fruit, and the earth shall yield its increase, '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'and they shall be secure in their land. And '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'they shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when '
  - type: note
    content: Jer. 30:8
  - type: text
    content: 'I break the bars of their yoke, and '
  - type: note
    content: Jer. 30:8
  - type: text
    content: 'deliver them from the hand of those who enslaved them. '
  '28':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'They shall no more be a prey to the nations, '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'nor shall the beasts of the land devour them. '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'They shall dwell securely, and none shall make them afraid. '
  '29':
  - type: text
    content: 'And I will provide for them '
  - type: note
    content: Isa. 60:21; 61:3
  - type: text
    content: 'a renowned place for planting so that '
  - type: note
    content: ch. 36:29
  - type: text
    content: 'they shall no more be consumed with hunger in the land, and no longer '
  - type: note
    content: See ch. 32:24
  - type: text
    content: 'suffer the reproach of the nations. '
  '3':
  - type: note
    content: Zech. 11:16
  - type: text
    content: 'You eat the fat, you clothe yourselves with the wool, '
  - type: note
    content: Zech. 11:4, 5; [Mic. 3:2, 3]
  - type: text
    content: 'you slaughter the fat ones, but you do not feed the sheep. '
  '30':
  - type: text
    content: 'And they shall know that '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God with them, and that they, the house of Israel, are my people, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And you are my sheep, '
  - type: note
    content: Ps. 74:1; 100:3; John 10:16
  - type: text
    content: 'human sheep of my pasture, and I am your God, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '4':
  - type: note
    content: '[ver. 16, 21]'
  - type: text
    content: 'The weak you have not strengthened, the sick you have not healed, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the injured you have not bound up, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the strayed you have not brought back, '
  - type: note
    content: '[Matt. 18:12; Luke 15:4]'
  - type: text
    content: 'the lost you have not sought, and with force and '
  - type: note
    content: Ex. 1:13, 14; [1 Pet. 5:3]
  - type: text
    content: 'harshness you have ruled them. '
  '5':
  - type: note
    content: 1 Kgs. 22:17; Matt. 9:36
  - type: text
    content: 'So they were scattered, because there was no shepherd, and '
  - type: note
    content: '[Jer. 50:7, 17]'
  - type: text
    content: 'they became food for all the wild beasts. My sheep were scattered; '
  '6':
  - type: text
    content: 'they wandered over all the mountains and on every high hill. My sheep were scattered over all the face of the earth, '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: with none to search or seek for them.
  '7':
  - type: text
    content: '“Therefore, you shepherds, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '8':
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', surely because '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: 'my sheep have become a prey, and my sheep have become food for all the wild beasts, since there was no shepherd, and because my shepherds have not searched for my sheep, but the shepherds have fed themselves, and have not fed my sheep, '
  '9':
  - type: text
    content: 'therefore, you shepherds, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
