document_id: 2CH.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Repairs the Temple
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-14, see 2 Kgs. 11:21–12:15
  - type: text
    content: Joash
  - type: note
    content: Spelled Jehoash in 2 Kings 12:1
  - type: text
    content: ' was seven years old when he began to reign, and he reigned forty years in Jerusalem. His mother’s name was Zibiah of Beersheba. '
  '10':
  - type: text
    content: And all the princes and all the people rejoiced and brought their tax and dropped it into the chest until they had finished.
  - type: note
    content: Or until it was full
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And whenever the chest was brought to the king’s officers by the Levites, when they saw that there was much money in it, the king’s secretary and the officer of the chief priest would come and empty the chest and take it and return it to its place. Thus they did day after day, and collected money in abundance. '
  '12':
  - type: text
    content: 'And the king and Jehoiada gave it to those who had charge of the work of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and they hired masons and carpenters to restore the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and also workers in iron and bronze to repair the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'So those who were engaged in the work labored, and the repairing went forward in their hands, and they restored the house of God to its proper condition and strengthened it. '
  '14':
  - type: text
    content: 'And when they had finished, they brought the rest of the money before the king and Jehoiada, and with it '
  - type: note
    content: '[2 Kgs. 12:13]'
  - type: text
    content: 'were made utensils for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', both for the service and for the burnt offerings, and dishes for incense and vessels of gold and silver. And they offered burnt offerings in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly all the days of Jehoiada.'
  '15':
  - type: text
    content: 'But Jehoiada grew old and full of days, and died. He was 130 years old at his death. '
  '16':
  - type: text
    content: And they buried him in the city of David among the kings, because he had done good in Israel, and toward God and his house.
  '17':
  - type: text
    content: 'Now after the death of Jehoiada the princes of Judah came and paid homage to the king. Then the king listened to them. '
  '18':
  - type: text
    content: 'And they abandoned the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, and served '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: 'the Asherim and the idols. And '
  - type: note
    content: ch. 19:2, 10; 28:11, 13; 29:8; 32:25
  - type: text
    content: 'wrath came upon Judah and Jerusalem for this guilt of theirs. '
  '19':
  - type: note
    content: Jer. 25:4; [Matt. 23:34; Luke 11:49]; See ch. 36:15
  - type: text
    content: 'Yet he sent prophets among them to bring them back to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Neh. 13:15, 21
  - type: text
    content: These testified against them, but they would not pay attention.
  - type: heading
    content: Joash’s Treachery
  '2':
  - type: note
    content: '[ch. 26:5]'
  - type: text
    content: 'And Joash did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' all the days of Jehoiada the priest. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:1; 20:14
  - type: text
    content: 'Then the Spirit of God clothed Zechariah '
  - type: note
    content: '[Matt. 23:35]'
  - type: text
    content: 'the son of Jehoiada the priest, and he stood above the people, and said to them, “Thus says God, '
  - type: note
    content: '[Num. 14:41]'
  - type: text
    content: '‘Why do you break the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ', so that you cannot prosper? '
  - type: note
    content: ch. 15:2
  - type: text
    content: 'Because you have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', he has forsaken you.’” '
  '21':
  - type: text
    content: 'But '
  - type: note
    content: '[Neh. 9:26]'
  - type: text
    content: 'they conspired against him, '
  - type: note
    content: Matt. 23:35; Luke 11:51
  - type: text
    content: 'and by command of the king they stoned him with stones in the court of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Thus Joash the king did not remember the kindness that Jehoiada, Zechariah’s father, had shown him, but killed his son. And when he was dying, he said, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' see '
  - type: note
    content: '[Gen. 9:5]'
  - type: text
    content: and avenge!”
  - type: note
    content: Or and require it
  - type: heading
    content: Joash Assassinated
  '23':
  - type: text
    content: 'At the end of the year '
  - type: note
    content: '[2 Kgs. 12:17, 18]'
  - type: text
    content: 'the army of the Syrians came up against Joash. They came to Judah and Jerusalem and destroyed all the princes of the people from among the people and sent all their spoil to the king of Damascus. '
  '24':
  - type: text
    content: 'Though the army of the Syrians had come with few men, '
  - type: note
    content: Isa. 30:17; [Lev. 26:8, 36, 37]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered into their hand a very great army, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: because Judah
  - type: note
    content: Hebrew they
  - type: text
    content: ' had forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers. Thus they '
  - type: note
    content: '[ch. 22:8]'
  - type: text
    content: executed judgment on Joash.
  '25':
  - type: text
    content: 'When they had departed from him, leaving him '
  - type: note
    content: '[Deut. 28:35]'
  - type: text
    content: 'severely wounded, '
  - type: note
    content: For ver. 25-27, see 2 Kgs. 12:20, 21
  - type: text
    content: 'his servants conspired against him because of the blood of '
  - type: note
    content: '[ver. 21, 22]'
  - type: text
    content: the son
  - type: note
    content: Septuagint, Vulgate; Hebrew sons
  - type: text
    content: ' of Jehoiada the priest, and killed him on his bed. So he died, and they buried him in the city of David, '
  - type: note
    content: '[ch. 21:20; 28:27]'
  - type: text
    content: 'but they did not bury him in the tombs of the kings. '
  '26':
  - type: text
    content: 'Those who conspired against him were Zabad the son of Shimeath the Ammonite, and Jehozabad the son of Shimrith the Moabite. '
  '27':
  - type: text
    content: 'Accounts of his sons and of the many oracles against him and of '
  - type: note
    content: ver. 12
  - type: text
    content: the rebuilding
  - type: note
    content: Hebrew founding
  - type: text
    content: ' of the house of God are written in the '
  - type: note
    content: ch. 13:22
  - type: text
    content: Story
  - type: note
    content: Or Exposition
  - type: text
    content: ' of the Book of the Kings. And Amaziah his son reigned in his place.'
  '3':
  - type: text
    content: Jehoiada got for him two wives, and he had sons and daughters.
  '4':
  - type: text
    content: 'After this Joash '
  - type: note
    content: '[1 Chr. 22:7]'
  - type: text
    content: 'decided to '
  - type: note
    content: ver. 12
  - type: text
    content: 'restore the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And he gathered the priests and the Levites and said to them, “Go out to the cities of '
  - type: note
    content: See ch. 21:2
  - type: text
    content: 'Judah and gather from all Israel money to repair the house of your God from year to year, and see that you act quickly.” But the Levites did not act quickly. '
  '6':
  - type: text
    content: 'So the king summoned Jehoiada the chief and said to him, “Why have you not required the Levites to bring in from Judah and Jerusalem '
  - type: note
    content: See Ex. 30:12-16
  - type: text
    content: 'the tax levied by Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the congregation of Israel for '
  - type: note
    content: See Num. 17:7, 8
  - type: text
    content: 'the tent of testimony?” '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 21:17]'
  - type: text
    content: 'the sons of Athaliah, that wicked woman, had broken into the house of God, and had also used all '
  - type: note
    content: '[1 Kgs. 15:15]'
  - type: text
    content: 'the dedicated things of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' for the Baals.'
  '8':
  - type: text
    content: 'So the king commanded, and they made a chest and set it outside the gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: '[Ezra 1:1]'
  - type: text
    content: 'proclamation was made throughout Judah and Jerusalem to bring in for the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the tax that Moses the servant of God laid on Israel in the wilderness. '
