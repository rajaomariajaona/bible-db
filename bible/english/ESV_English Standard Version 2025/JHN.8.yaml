document_id: JHN.8,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'but Jesus went to the Mount of Olives. '
  '10':
  - type: text
    content: 'Jesus stood up and said to her, '
  - type: text
    content: “Woman, where are they? Has no one condemned you?”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'She said, “No one, Lord.” And Jesus said, '
  - type: note
    content: ver. 15; [ch. 3:17; Luke 12:14]
  - type: text
    content: '“Neither do I condemn you; go, and from now on '
  - type: note
    content: ch. 5:14
  - type: text
    content: sin no more.”
  - type: text
    content: ']]'
  - type: heading
    content: I Am the Light of the World
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:37, 38
  - type: text
    content: 'Again Jesus spoke to them, saying, '
  - type: note
    content: '[Ps. 36:9; Isa. 42:6; 49:6; Mal. 4:2]; See ch. 1:4, 9'
  - type: text
    content: '“I am the light of the world. Whoever '
  - type: note
    content: ch. 12:26; 21:19
  - type: text
    content: 'follows me will not '
  - type: note
    content: See ch. 12:35
  - type: text
    content: walk in darkness, but will have the light of life.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'So the Pharisees said to him, '
  - type: note
    content: ch. 5:31
  - type: text
    content: '“You are bearing witness about yourself; your testimony is not true.” '
  '14':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Even if I do bear witness about myself, '
  - type: note
    content: '[Rev. 3:14]'
  - type: text
    content: 'my testimony is true, for I know '
  - type: note
    content: ch. 13:3; 16:28
  - type: text
    content: 'where I came from and '
  - type: note
    content: ver. 21; ch. 7:33
  - type: text
    content: 'where I am going, but '
  - type: note
    content: '[ch. 7:28; 9:29]'
  - type: text
    content: you do not know where I come from or where I am going.
  - type: text
    content: ' '
  '15':
  - type: note
    content: ch. 7:24; 1 Sam. 16:7; [Job 10:4]
  - type: text
    content: 'You judge according to the flesh; '
  - type: note
    content: ch. 12:47; [ver. 11]
  - type: text
    content: I judge no one.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Yet even if I do judge, '
  - type: note
    content: ch. 5:30
  - type: text
    content: 'my judgment is true, for '
  - type: note
    content: ver. 29; ch. 16:32
  - type: text
    content: it is not I alone who judge, but I and the Father
  - type: note
    content: Some manuscripts he
  - type: text
    content: ' '
  - type: text
    content: who sent me.
  - type: text
    content: ' '
  '17':
  - type: note
    content: See Num. 35:30
  - type: text
    content: In your Law it is written that the testimony of two people is true.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I am the one who bears witness about myself, and '
  - type: note
    content: ch. 5:37
  - type: text
    content: the Father who sent me bears witness about me.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'They said to him therefore, “Where is your Father?” Jesus answered, '
  - type: note
    content: ver. 55; ch. 16:3
  - type: text
    content: '“You know neither me nor my Father. '
  - type: note
    content: ch. 14:7
  - type: text
    content: If you knew me, you would know my Father also.”
  - type: text
    content: ' '
  '2':
  - type: note
    content: '[Luke 21:38]'
  - type: text
    content: 'Early in the morning he came again to the temple. All the people came to him, and '
  - type: note
    content: Matt. 5:1; Luke 4:20
  - type: text
    content: 'he sat down and taught them. '
  '20':
  - type: text
    content: 'These words he spoke in '
  - type: note
    content: See Matt. 27:6
  - type: text
    content: 'the treasury, as he taught in the temple; but '
  - type: note
    content: ch. 7:30
  - type: text
    content: 'no one arrested him, because '
  - type: note
    content: ch. 7:8
  - type: text
    content: his hour had not yet come.
  '21':
  - type: text
    content: 'So he said to them again, '
  - type: note
    content: ch. 14:28; [ch. 14:2, 3; 16:7]
  - type: text
    content: '“I am going away, and '
  - type: note
    content: See ch. 7:34
  - type: text
    content: 'you will seek me, and '
  - type: note
    content: ver. 24; Ezek. 3:18; 33:8
  - type: text
    content: you will die in your sin. Where I am going, you cannot come.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'So the Jews said, '
  - type: note
    content: '[ch. 7:35]'
  - type: text
    content: '“Will he kill himself, since he says, '
  - type: text
    content: ‘Where I am going, you cannot come’
  - type: text
    content: '?” '
  '23':
  - type: text
    content: 'He said to them, '
  - type: note
    content: '[ver. 44; ch. 3:31]'
  - type: text
    content: '“You are from below; I am from above. '
  - type: note
    content: 1 John 4:5
  - type: text
    content: 'You are of this world; '
  - type: note
    content: ch. 17:14, 16
  - type: text
    content: I am not of this world.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'I told you that you '
  - type: note
    content: ver. 21
  - type: text
    content: 'would die in your sins, for '
  - type: note
    content: ch. 16:9
  - type: text
    content: 'unless you believe that '
  - type: note
    content: Mark 13:6; Luke 21:8
  - type: text
    content: I am he you will die in your sins.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'So they said to him, '
  - type: note
    content: '[ch. 1:19]'
  - type: text
    content: '“Who are you?” Jesus said to them, '
  - type: text
    content: “Just what I have been telling you from the beginning.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'I have much to say about you and much to judge, but '
  - type: note
    content: ch. 3:33; 7:28; Rom. 3:4
  - type: text
    content: 'he who sent me is true, and I declare '
  - type: note
    content: '[ch. 18:20]'
  - type: text
    content: 'to the world '
  - type: note
    content: ver. 40; ch. 15:15; [ch. 3:32; Rev. 1:1]
  - type: text
    content: what I have heard from him.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'They did not understand that '
  - type: note
    content: ver. 18, 26
  - type: text
    content: 'he had been speaking to them about the Father. '
  '28':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: '“When you have '
  - type: note
    content: ch. 3:14; 12:32, 34
  - type: text
    content: 'lifted up the Son of Man, '
  - type: note
    content: '[ch. 16:8-11]'
  - type: text
    content: 'then you will know that '
  - type: note
    content: See ver. 24
  - type: text
    content: 'I am he, and that '
  - type: note
    content: See ch. 5:30
  - type: text
    content: 'I do nothing on my own authority, but '
  - type: note
    content: See ch. 7:16
  - type: text
    content: speak just as the Father taught me.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: ver. 16; ch. 16:32; Acts 10:38; See ch. 10:38
  - type: text
    content: 'he who sent me is with me. '
  - type: note
    content: ver. 16; ch. 16:32; Acts 10:38; See ch. 10:38
  - type: text
    content: 'He has not left me alone, for '
  - type: note
    content: ch. 4:34; 5:30; 6:38; [1 John 3:22]
  - type: text
    content: I always do the things that are pleasing to him.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'The scribes and the Pharisees brought a woman who had been caught in adultery, and placing her in the midst '
  '30':
  - type: text
    content: 'As he was saying these things, '
  - type: note
    content: See ch. 7:31
  - type: text
    content: many believed in him.
  - type: heading
    content: The Truth Will Set You Free
  '31':
  - type: text
    content: 'So Jesus said to the Jews who had believed him, '
  - type: note
    content: ch. 15:7, 8; 2 John 9
  - type: text
    content: “If you abide in my word, you are truly my disciples,
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'and you will '
  - type: note
    content: 2 John 1
  - type: text
    content: 'know the truth, and the truth '
  - type: note
    content: ver. 36; Rom. 6:18, 22; 8:2; 1 Cor. 7:22; 2 Cor. 3:17; Gal. 5:1, 13; James 1:25; 2:12; 1 Pet. 2:16
  - type: text
    content: will set you free.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'They answered him, '
  - type: note
    content: ver. 37, 39; Matt. 3:9; [Luke 19:9; Rom. 9:7]
  - type: text
    content: “We are offspring of Abraham and have never been enslaved to anyone. How is it that you say, ‘You will become free’?”
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: Rom. 6:16-20; Titus 3:3; 2 Pet. 2:19
  - type: text
    content: everyone who practices sin is a slave
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; also verse 35
  - type: text
    content: ' '
  - type: text
    content: to sin.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Gen. 21:10; Gal. 4:30
  - type: text
    content: 'The slave does not remain in the house forever; '
  - type: note
    content: Luke 15:31
  - type: text
    content: the son remains forever.
  - type: text
    content: ' '
  '36':
  - type: text
    content: So if the Son sets you free, you will be free indeed.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'I know that you are offspring of Abraham; yet '
  - type: note
    content: ver. 40; See ch. 7:1
  - type: text
    content: you seek to kill me because my word finds no place in you.
  - type: text
    content: ' '
  '38':
  - type: note
    content: ch. 3:32; 5:19; 6:46
  - type: text
    content: 'I speak of what I have seen with my Father, and you do what you have heard '
  - type: note
    content: ver. 41, 44
  - type: text
    content: from your father.”
  - type: heading
    content: You Are of Your Father the Devil
  '39':
  - type: text
    content: 'They answered him, '
  - type: note
    content: ver. 33, 56
  - type: text
    content: '“Abraham is our father.” Jesus said to them, '
  - type: note
    content: '[Gal. 3:7, 9]'
  - type: text
    content: “If you were Abraham’s children, you would be doing the works Abraham did,
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'they said to him, “Teacher, this woman has been caught in the act of adultery. '
  '40':
  - type: text
    content: 'but now '
  - type: note
    content: ver. 37
  - type: text
    content: 'you seek to kill me, a man who has told you the truth '
  - type: note
    content: ver. 26
  - type: text
    content: that I heard from God. This is not what Abraham did.
  - type: text
    content: ' '
  '41':
  - type: text
    content: You are doing the works your father did.”
  - type: text
    content: ' They said to him, '
  - type: note
    content: '[Hos. 2:4]'
  - type: text
    content: '“We were not born of sexual immorality. We have '
  - type: note
    content: Deut. 32:6; Isa. 63:16; 64:8; [ver. 47]
  - type: text
    content: 'one Father—even God.” '
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: '[1 John 5:1]'
  - type: text
    content: '“If God were your Father, you would love me, for '
  - type: note
    content: 1 John 5:20; [Heb. 10:9]
  - type: text
    content: 'I came from God and '
  - type: note
    content: ch. 16:28; 17:8
  - type: text
    content: 'I am here. '
  - type: note
    content: ch. 7:28
  - type: text
    content: 'I came not of my own accord, but '
  - type: note
    content: See ch. 3:17
  - type: text
    content: he sent me.
  - type: text
    content: ' '
  '43':
  - type: note
    content: ch. 7:17
  - type: text
    content: 'Why do you not understand what I say? It is because you cannot '
  - type: note
    content: Jer. 6:10; [1 Cor. 2:14]
  - type: text
    content: bear to hear my word.
  - type: text
    content: ' '
  '44':
  - type: note
    content: 1 John 3:8, 12; [ver. 23]; See Matt. 13:38
  - type: text
    content: 'You are of your father the devil, and your will is to do your father’s desires. '
  - type: note
    content: Gen. 4:8, 9; 1 John 3:12, 15; [Rom. 5:12]
  - type: text
    content: 'He was a murderer from the beginning, and '
  - type: note
    content: '[1 John 2:4]'
  - type: text
    content: 'does not stand in the truth, because there is no truth in him. '
  - type: note
    content: Gen. 3:4; 2 Cor. 11:3; Rev. 12:9
  - type: text
    content: When he lies, he speaks out of his own character, for he is a liar and the father of lies.
  - type: text
    content: ' '
  '45':
  - type: text
    content: But because I tell the truth, you do not believe me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Which one of you convicts me of sin? If I tell the truth, why do you not believe me?
  - type: text
    content: ' '
  '47':
  - type: note
    content: '[ch. 18:37; 1 John 4:6]'
  - type: text
    content: 'Whoever is of God hears the words of God. '
  - type: note
    content: '[ch. 10:26]'
  - type: text
    content: 'The reason why you do not hear them is that '
  - type: note
    content: '[ver. 41]'
  - type: text
    content: you are not of God.”
  - type: heading
    content: Before Abraham Was, I Am
  '48':
  - type: text
    content: 'The Jews answered him, “Are we not right in saying that you are a Samaritan and '
  - type: note
    content: See ch. 7:20
  - type: text
    content: 'have a demon?” '
  '49':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I do not have a demon, but '
  - type: note
    content: ch. 5:23; [ch. 7:18]
  - type: text
    content: I honor my Father, and you dishonor me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: Lev. 20:10; Deut. 22:22
  - type: text
    content: 'in the Law, Moses commanded us '
  - type: note
    content: Deut. 22:24; Ezek. 16:38, 40
  - type: text
    content: 'to stone such women. So what do you say?” '
  '50':
  - type: text
    content: 'Yet '
  - type: note
    content: ver. 54; ch. 5:41
  - type: text
    content: I do not seek my own glory; there is One who seeks it, and he is the judge.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Truly, truly, '
  - type: note
    content: ch. 5:24; 11:26
  - type: text
    content: 'I say to you, if anyone keeps my word, he will never '
  - type: note
    content: See Luke 2:26
  - type: text
    content: see death.”
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'The Jews said to him, “Now we know that you have a demon! '
  - type: note
    content: '[Zech. 1:5]'
  - type: text
    content: 'Abraham died, as did the prophets, yet '
  - type: note
    content: ver. 51
  - type: text
    content: 'you say, '
  - type: text
    content: '‘If anyone keeps my word, he will never '
  - type: note
    content: Matt. 16:28; Heb. 2:9
  - type: text
    content: taste death.’
  - type: text
    content: ' '
  '53':
  - type: note
    content: '[ch. 4:12]'
  - type: text
    content: 'Are you greater than our father Abraham, who died? And the prophets died! Who do you make yourself out to be?” '
  '54':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: ver. 50
  - type: text
    content: '“If I glorify myself, my glory is nothing. '
  - type: note
    content: ch. 13:32; 17:1; Acts 3:13; Heb. 5:5; 2 Pet. 1:17
  - type: text
    content: 'It is my Father who glorifies me, '
  - type: note
    content: ver. 41
  - type: text
    content: of whom you say, ‘He is our God.’
  - type: note
    content: Some manuscripts your God
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'But '
  - type: note
    content: ver. 19; ch. 7:28
  - type: text
    content: 'you have not known him. '
  - type: note
    content: ch. 7:29; See Matt. 11:27
  - type: text
    content: 'I know him. If I were to say that I do not know him, I would be '
  - type: note
    content: 1 John 1:6
  - type: text
    content: 'a liar '
  - type: note
    content: ver. 44
  - type: text
    content: like you, but I do know him and I keep his word.
  - type: text
    content: ' '
  '56':
  - type: note
    content: ver. 39
  - type: text
    content: 'Your father Abraham '
  - type: note
    content: See Matt. 13:17
  - type: text
    content: 'rejoiced '
  - type: note
    content: Luke 17:22
  - type: text
    content: 'that he would see my day. '
  - type: note
    content: '[Heb. 11:13]'
  - type: text
    content: He saw it and was glad.”
  - type: text
    content: ' '
  '57':
  - type: text
    content: So the Jews said to him, “You are not yet fifty years old, and have you seen Abraham?”
  - type: note
    content: Some manuscripts has Abraham seen you?
  - type: text
    content: ' '
  '58':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Truly, truly, I say to you, before Abraham was, '
  - type: note
    content: See Ex. 3:14
  - type: text
    content: I am.”
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'So '
  - type: note
    content: ch. 10:31
  - type: text
    content: they picked up stones to throw at him, but Jesus hid himself and went out of the temple.
  '6':
  - type: text
    content: 'This they said '
  - type: note
    content: Matt. 16:1; 19:3; 22:18, 35; Mark 8:11; 10:2; 12:15; Luke 10:25; 11:16
  - type: text
    content: 'to test him, '
  - type: note
    content: See Luke 11:54
  - type: text
    content: 'that they might have some charge to bring against him. Jesus bent down and wrote with his finger on the ground. '
  '7':
  - type: text
    content: 'And as they continued to ask him, he stood up and said to them, '
  - type: note
    content: Rom. 2:1, 22
  - type: text
    content: '“Let him who is without sin among you '
  - type: note
    content: Deut. 17:7
  - type: text
    content: be the first to throw a stone at her.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And once more he bent down and wrote on the ground. '
  '9':
  - type: text
    content: 'But when they heard it, they went away one by one, beginning with the older ones, and Jesus was left alone with the woman standing before him. '
