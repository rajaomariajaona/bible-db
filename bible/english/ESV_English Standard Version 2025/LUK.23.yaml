document_id: LUK.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Before Pilate
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:2; Mark 15:1; John 18:28
  - type: text
    content: 'Then the whole company of them arose and brought him before Pilate. '
  '10':
  - type: text
    content: 'The chief priests and the scribes stood by, vehemently accusing him. '
  '11':
  - type: text
    content: 'And Herod with his soldiers '
  - type: note
    content: Mark 9:12; Acts 4:11
  - type: text
    content: 'treated him with contempt and '
  - type: note
    content: ch. 18:32
  - type: text
    content: 'mocked him. Then, '
  - type: note
    content: '[Matt. 27:28; Mark 15:17]'
  - type: text
    content: 'arraying him in splendid clothing, he sent him back to Pilate. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: Acts 4:27; [Ps. 2:2]
  - type: text
    content: Herod and Pilate became friends with each other that very day, for before this they had been at enmity with each other.
  '13':
  - type: text
    content: 'Pilate then called together the chief priests and '
  - type: note
    content: See ch. 24:20
  - type: text
    content: 'the rulers and the people, '
  '14':
  - type: text
    content: 'and said to them, “You brought me this man '
  - type: note
    content: ver. 2
  - type: text
    content: 'as one who was misleading the people. And '
  - type: note
    content: Acts 3:13
  - type: text
    content: 'after examining him before you, behold, I '
  - type: note
    content: ver. 4
  - type: text
    content: 'did not find this man guilty of any of your charges against him. '
  '15':
  - type: text
    content: 'Neither did Herod, for '
  - type: note
    content: ver. 11
  - type: text
    content: 'he sent him back to us. Look, nothing deserving death has been done by him. '
  '16':
  - type: note
    content: ver. 22; John 19:1; [Acts 5:40]
  - type: text
    content: I will therefore punish and release him.”
  - type: note
    content: 'Here, or after verse 19, some manuscripts add verse 17: Now he was obliged to release one man to them at the festival'
  - type: heading
    content: Pilate Delivers Jesus to Be Crucified
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-25, see Matt. 27:15-26; Mark 15:6-15; John 18:39, 40; 19:16
  - type: text
    content: 'But they all cried out together, '
  - type: note
    content: '[Acts 21:36; 22:22]'
  - type: text
    content: '“Away with this man, and release to us Barabbas”— '
  '19':
  - type: text
    content: 'a man who had been thrown into prison for an insurrection started in the city and '
  - type: note
    content: Acts 3:14
  - type: text
    content: 'for murder. '
  '2':
  - type: text
    content: 'And they began to accuse him, saying, “We found this man '
  - type: note
    content: ver. 14; [Acts 17:6, 7; 24:5]
  - type: text
    content: 'misleading our nation and '
  - type: note
    content: '[ch. 20:25]'
  - type: text
    content: 'forbidding us to give tribute to '
  - type: note
    content: ch. 2:1; 3:1
  - type: text
    content: 'Caesar, and saying that he himself is Christ, '
  - type: note
    content: John 18:33, 36, 37; 19:12; [Acts 17:7]
  - type: text
    content: 'a king.” '
  '20':
  - type: text
    content: 'Pilate addressed them once more, desiring to release Jesus, '
  '21':
  - type: text
    content: 'but they kept shouting, “Crucify, crucify him!” '
  '22':
  - type: text
    content: 'A third time he said to them, “Why? '
  - type: note
    content: '[ver. 41; John 8:46]'
  - type: text
    content: 'What evil has he done? '
  - type: note
    content: ver. 14, 15
  - type: text
    content: 'I have found in him no guilt deserving death. '
  - type: note
    content: ver. 16
  - type: text
    content: 'I will therefore punish and release him.” '
  '23':
  - type: text
    content: 'But they were urgent, demanding with loud cries that he should be crucified. And their voices prevailed. '
  '24':
  - type: text
    content: 'So Pilate decided that their demand should be granted. '
  '25':
  - type: text
    content: 'He released the man who had been thrown into prison '
  - type: note
    content: ver. 19
  - type: text
    content: 'for insurrection and murder, for whom they asked, '
  - type: note
    content: John 19:16
  - type: text
    content: but he delivered Jesus over to their will.
  - type: heading
    content: The Crucifixion
  '26':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:32; Mark 15:21; [ John 19:17 ]
  - type: text
    content: 'And as they led him away, they seized one Simon of Cyrene, who was coming in from the country, and laid on him the cross, to carry it behind Jesus. '
  '27':
  - type: text
    content: 'And there followed him a great multitude of the people and of women who were '
  - type: note
    content: ch. 8:52; Matt. 11:17
  - type: text
    content: 'mourning and lamenting for him. '
  '28':
  - type: text
    content: 'But turning to them Jesus said, '
  - type: text
    content: “Daughters of Jerusalem, do not weep for me, but weep for yourselves and for your children.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'For behold, '
  - type: note
    content: See ch. 17:22
  - type: text
    content: 'the days are coming when they will say, '
  - type: note
    content: ch. 21:23; Matt. 24:19; Mark 13:17
  - type: text
    content: ‘Blessed are the barren and the wombs that never bore and the breasts that never nursed!’
  - type: text
    content: ' '
  '3':
  - type: note
    content: Matt. 27:11; Mark 15:2
  - type: text
    content: 'And Pilate asked him, '
  - type: note
    content: ver. 37, 38; Matt. 2:2; John 18:39; 19:3
  - type: text
    content: '“Are you the King of the Jews?” And he answered him, '
  - type: note
    content: See ch. 22:70
  - type: text
    content: “You have said so.”
  - type: text
    content: ' '
  '30':
  - type: note
    content: Hos. 10:8; Rev. 6:16; [Isa. 2:19]
  - type: text
    content: Then they will begin to say to the mountains, ‘Fall on us,’ and to the hills, ‘Cover us.’
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'For '
  - type: note
    content: '[Prov. 11:31; 1 Pet. 4:17]'
  - type: text
    content: 'if they do these things when '
  - type: note
    content: Ezek. 20:47
  - type: text
    content: 'the wood is green, what will happen '
  - type: note
    content: Ezek. 20:47
  - type: text
    content: when it is dry?”
  '32':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:38; Mark 15:27; John 19:18; [ Matt. 20:21 ]
  - type: text
    content: 'Two others, who were criminals, were led away to be put to death with him. '
  '33':
  - type: note
    content: Matt. 27:33; Mark 15:22; John 19:17
  - type: text
    content: 'And when they came to the place that is called The Skull, there they crucified him, and the criminals, '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'one on his right and one on his left. '
  '34':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: '“Father, '
  - type: note
    content: Isa. 53:12; See Matt. 5:44
  - type: text
    content: 'forgive them, '
  - type: note
    content: '[Mark 10:38]; See Acts 3:17'
  - type: text
    content: for they know not what they do.”
  - type: note
    content: Some manuscripts omit the sentence And Jesus . . . what they do
  - type: text
    content: ' And they cast lots '
  - type: note
    content: Ps. 22:18; Matt. 27:35; Mark 15:24; John 19:23
  - type: text
    content: 'to divide his garments. '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:7, 17
  - type: text
    content: 'the people stood by, watching, '
  - type: note
    content: Matt. 27:41, 42; Mark 15:31, 32
  - type: text
    content: 'but '
  - type: note
    content: See ch. 24:20
  - type: text
    content: 'the rulers '
  - type: note
    content: ch. 16:14
  - type: text
    content: 'scoffed at him, saying, '
  - type: note
    content: '[ch. 4:23]'
  - type: text
    content: '“He saved others; '
  - type: note
    content: '[Matt. 26:53, 54; John 10:18]'
  - type: text
    content: 'let him save himself, '
  - type: note
    content: '[ch. 4:3, 9]'
  - type: text
    content: 'if he is '
  - type: note
    content: See ch. 9:20; Matt. 1:17
  - type: text
    content: 'the Christ of God, '
  - type: note
    content: ch. 9:35; Isa. 42:1; [Matt. 12:18; 1 Pet. 2:4]
  - type: text
    content: 'his Chosen One!” '
  '36':
  - type: text
    content: 'The soldiers also mocked him, coming up and '
  - type: note
    content: '[Ps. 69:21; Matt. 27:48; Mark 15:36; John 19:29]'
  - type: text
    content: 'offering him sour wine '
  '37':
  - type: text
    content: 'and saying, '
  - type: note
    content: ver. 35
  - type: text
    content: '“If you are '
  - type: note
    content: See ver. 3
  - type: text
    content: 'the King of the Jews, save yourself!” '
  '38':
  - type: note
    content: Matt. 27:37; Mark 15:26; John 19:19; [John 19:21, 22]
  - type: text
    content: There was also an inscription over him,
  - type: note
    content: Some manuscripts add in letters of Greek and Latin and Hebrew
  - type: text
    content: ' “This is '
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: the King of the Jews.”
  '39':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 27:44; Mark 15:32 ]'
  - type: text
    content: 'One of the criminals who were hanged '
  - type: note
    content: See Matt. 27:39
  - type: text
    content: railed at him,
  - type: note
    content: Or blasphemed him
  - type: text
    content: ' saying, “Are you not '
  - type: note
    content: ver. 35, 37
  - type: text
    content: 'the Christ? Save yourself and us!” '
  '4':
  - type: text
    content: 'Then Pilate said to the chief priests and the crowds, '
  - type: note
    content: ver. 14, 22; John 18:38; 19:4, 6; [Matt. 27:24; 1 Pet. 2:22]
  - type: text
    content: '“I find no guilt in this man.” '
  '40':
  - type: text
    content: 'But the other rebuked him, saying, “Do you not fear God, since you are under the same sentence of condemnation? '
  '41':
  - type: text
    content: 'And we indeed justly, for we are receiving the due reward of our deeds; but this man has done nothing wrong.” '
  '42':
  - type: text
    content: 'And he said, “Jesus, remember me '
  - type: note
    content: '[Matt. 16:28]'
  - type: text
    content: 'when you come into your kingdom.” '
  '43':
  - type: text
    content: 'And he said to him, '
  - type: text
    content: '“Truly, I say to you, today you will be with me in '
  - type: note
    content: 2 Cor. 12:3; Rev. 2:7
  - type: text
    content: paradise.”
  - type: heading
    content: The Death of Jesus
  '44':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:45; Mark 15:33; [ John 19:14 ]
  - type: text
    content: It was now about the sixth hour,
  - type: note
    content: That is, noon
  - type: text
    content: ' and there was darkness over the whole land until the ninth hour,'
  - type: note
    content: That is, 3 p.m.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'while the sun’s light failed. And '
  - type: note
    content: Ex. 26:31-33; 2 Chr. 3:14
  - type: text
    content: 'the curtain of the temple was torn in two. '
  '46':
  - type: text
    content: 'Then Jesus, '
  - type: note
    content: '[Matt. 27:50; Mark 15:37; John 19:30]'
  - type: text
    content: 'calling out with a loud voice, said, '
  - type: text
    content: '“Father, '
  - type: note
    content: Cited from Ps. 31:5; [Acts 7:59]
  - type: text
    content: 'into your hands I '
  - type: note
    content: 1 Pet. 4:19
  - type: text
    content: commit my spirit!”
  - type: text
    content: ' And having said this '
  - type: note
    content: '[John 10:18]'
  - type: text
    content: 'he breathed his last. '
  '47':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 27:54; Mark 15:39
  - type: text
    content: 'when the centurion saw what had taken place, '
  - type: note
    content: See ch. 7:16
  - type: text
    content: 'he praised God, saying, “Certainly this man was innocent!” '
  '48':
  - type: text
    content: 'And all the crowds that had assembled for this spectacle, when they saw what had taken place, returned home '
  - type: note
    content: ch. 18:13
  - type: text
    content: 'beating their breasts. '
  '49':
  - type: text
    content: 'And all '
  - type: note
    content: Ps. 88:8
  - type: text
    content: 'his acquaintances and '
  - type: note
    content: ver. 55; John 19:25; See ch. 8:2
  - type: text
    content: 'the women who had followed him from Galilee '
  - type: note
    content: Ps. 38:11
  - type: text
    content: stood at a distance watching these things.
  - type: heading
    content: Jesus Is Buried
  '5':
  - type: text
    content: 'But they were urgent, saying, “He stirs up the people, teaching throughout all Judea, '
  - type: note
    content: ch. 4:14; Matt. 4:12, 23; Mark 1:14; John 1:43; 2:11
  - type: text
    content: from Galilee even to this place.”
  - type: heading
    content: Jesus Before Herod
  '50':
  - type: text
    content: ' '
  - type: note
    content: For ver. 50-56, see Matt. 27:57-61; Mark 15:42-47; John 19:38-42
  - type: text
    content: 'Now there was a man named Joseph, from the Jewish town of Arimathea. He was a member of the council, a good and righteous man, '
  '51':
  - type: text
    content: 'who had not consented to their decision and action; and he '
  - type: note
    content: ch. 2:25, 38
  - type: text
    content: 'was looking for the kingdom of God. '
  '52':
  - type: text
    content: 'This man went to Pilate and asked for the body of Jesus. '
  '53':
  - type: text
    content: 'Then he took it down and wrapped it in a linen shroud and '
  - type: note
    content: '[Isa. 53:9]'
  - type: text
    content: 'laid him in a tomb cut in stone, '
  - type: note
    content: '[Mark 11:2]'
  - type: text
    content: 'where no one had ever yet been laid. '
  '54':
  - type: text
    content: 'It was the day of '
  - type: note
    content: See Matt. 27:62
  - type: text
    content: Preparation, and the Sabbath was beginning.
  - type: note
    content: Greek was dawning
  - type: text
    content: ' '
  '55':
  - type: note
    content: Matt. 28:1
  - type: text
    content: 'The women '
  - type: note
    content: ver. 49
  - type: text
    content: 'who had come with him from Galilee followed and saw the tomb and how his body was laid. '
  '56':
  - type: text
    content: 'Then they returned and '
  - type: note
    content: ch. 24:1; Mark 16:1; [John 19:39]
  - type: text
    content: prepared spices and ointments.
  - type: text
    content: 'On the Sabbath they rested '
  - type: note
    content: Ex. 20:10; Deut. 5:14
  - type: text
    content: according to the commandment.
  '6':
  - type: text
    content: 'When Pilate heard this, he asked whether the man was a Galilean. '
  '7':
  - type: text
    content: 'And when he learned that he belonged to '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'Herod’s jurisdiction, he sent him over to Herod, who was himself in Jerusalem at that time. '
  '8':
  - type: text
    content: 'When Herod saw Jesus, he was very glad, '
  - type: note
    content: ch. 9:9
  - type: text
    content: 'for he had long desired to see him, '
  - type: note
    content: Matt. 14:1; Mark 6:14
  - type: text
    content: 'because he had heard about him, and he was hoping '
  - type: note
    content: See Matt. 12:38
  - type: text
    content: 'to see some sign done by him. '
  '9':
  - type: text
    content: 'So he questioned him at some length, but he made no answer. '
