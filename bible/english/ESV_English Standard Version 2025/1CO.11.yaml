document_id: 1CO.11,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:16
  - type: text
    content: Be imitators of me, as I am of Christ.
  - type: heading
    content: Head Coverings
  '10':
  - type: text
    content: That is why a wife ought to have a symbol of authority on her head, because of the angels.
  - type: note
    content: Or messengers, that is, people sent to observe and report
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: Gal. 3:28
  - type: text
    content: 'in the Lord woman is not independent of man nor man of woman; '
  '12':
  - type: text
    content: 'for as woman was made from man, so man is now born of woman. And '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: 'all things are from God. '
  '13':
  - type: text
    content: 'Judge for yourselves: is it proper for a wife to pray to God with her head uncovered? '
  '14':
  - type: text
    content: 'Does not nature itself teach you that if a man wears long hair it is a disgrace for him, '
  '15':
  - type: text
    content: 'but if a woman has long hair, it is her glory? For her hair is given to her for a covering. '
  '16':
  - type: note
    content: 1 Tim. 6:3, 4
  - type: text
    content: 'If anyone is inclined to be contentious, we have no such practice, nor do '
  - type: note
    content: 2 Thess. 1:4; [1 Thess. 2:14]; See ch. 7:17; 10:32
  - type: text
    content: the churches of God.
  - type: heading
    content: The Lord’s Supper
  '17':
  - type: text
    content: 'But in the following instructions I do not commend you, because when you come together it is not for the better but for the worse. '
  '18':
  - type: text
    content: 'For, in the first place, when you come together as a church, '
  - type: note
    content: ch. 1:10-12; [ch. 3:3]
  - type: text
    content: I hear that there are divisions among you. And I believe it in part,
  - type: note
    content: Or I believe a certain report
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'for '
  - type: note
    content: '[Matt. 18:7; Luke 17:1; Acts 20:30; 1 Tim. 4:1; 2 Pet. 2:1]'
  - type: text
    content: 'there must be factions among you in order '
  - type: note
    content: 1 John 2:19; [Deut. 13:3]
  - type: text
    content: 'that those who are genuine among you may be recognized. '
  '2':
  - type: text
    content: 'Now I commend you '
  - type: note
    content: '[ch. 4:17; 1 Thess. 3:6]'
  - type: text
    content: 'because you remember me in everything and '
  - type: note
    content: 2 Thess. 2:15; 3:6
  - type: text
    content: 'maintain the traditions '
  - type: note
    content: '[1 Thess. 4:1, 2]'
  - type: text
    content: 'even as I delivered them to you. '
  '20':
  - type: text
    content: 'When you come together, it is not the Lord’s supper that you eat. '
  '21':
  - type: text
    content: 'For in eating, each one goes ahead with his own meal. One goes hungry, '
  - type: note
    content: '[2 Pet. 2:13; Jude 12]'
  - type: text
    content: 'another gets drunk. '
  '22':
  - type: text
    content: 'What! Do you not have houses to eat and drink in? Or do you despise '
  - type: note
    content: See Acts 20:28
  - type: text
    content: 'the church of God and '
  - type: note
    content: '[Prov. 17:5; James 2:6]'
  - type: text
    content: humiliate those who have nothing? What shall I say to you? Shall I commend you in this? No, I will not.
  '23':
  - type: text
    content: 'For '
  - type: note
    content: ch. 15:3; Gal. 1:12
  - type: text
    content: 'I received from the Lord what I also delivered to you, that '
  - type: note
    content: For ver. 23-25, see Matt. 26:26-28; Mark 14:22-24; Luke 22:19, 20
  - type: text
    content: 'the Lord Jesus on the night when he was betrayed took bread, '
  '24':
  - type: text
    content: 'and when he had given thanks, he broke it, and said, '
  - type: text
    content: “This is my body, which is for
  - type: note
    content: Some manuscripts broken for
  - type: text
    content: ' '
  - type: text
    content: you. Do this in remembrance of me.”
  - type: note
    content: Or as my memorial; also verse 25
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'In the same way also he took the cup, after supper, saying, '
  - type: text
    content: “This cup is the new covenant in my blood. Do this, as often as you drink it, in remembrance of me.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'For as often as you eat this bread and drink the cup, you proclaim the Lord’s death '
  - type: note
    content: See John 21:22
  - type: text
    content: until he comes.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ Num. 9:10, 13 ]'
  - type: text
    content: 'Whoever, therefore, eats the bread or drinks the cup of the Lord '
  - type: note
    content: '[John 13:27]'
  - type: text
    content: 'in an unworthy manner will be guilty concerning '
  - type: note
    content: John 6:51, 53-56
  - type: text
    content: 'the body and blood of the Lord. '
  '28':
  - type: note
    content: '[2 Cor. 13:5; Gal. 6:4]'
  - type: text
    content: 'Let a person examine himself, then, and so eat of the bread and drink of the cup. '
  '29':
  - type: text
    content: 'For anyone who eats and drinks without discerning the body eats and drinks judgment on himself. '
  '3':
  - type: text
    content: 'But I want you to understand that '
  - type: note
    content: Eph. 1:22; 4:15; 5:23; Col. 1:18
  - type: text
    content: 'the head of every man is Christ, '
  - type: note
    content: See Gen. 3:16
  - type: text
    content: the head of a wife
  - type: note
    content: Greek gunē. This term may refer to a woman or a wife, depending on the context
  - type: text
    content: ' is her husband,'
  - type: note
    content: Greek anēr. This term may refer to a man or a husband, depending on the context
  - type: text
    content: ' and '
  - type: note
    content: '[ch. 3:23]'
  - type: text
    content: 'the head of Christ is God. '
  '30':
  - type: text
    content: 'That is why many of you are weak and ill, and some '
  - type: note
    content: See Matt. 27:52
  - type: text
    content: have died.
  - type: note
    content: Greek have fallen asleep (as in 15:6, 20)
  - type: text
    content: ' '
  '31':
  - type: note
    content: See 1 John 1:9
  - type: text
    content: But if we judged
  - type: note
    content: Or discerned
  - type: text
    content: ' ourselves truly, we would not be judged. '
  '32':
  - type: text
    content: 'But when we are judged by the Lord, '
  - type: note
    content: See Prov. 3:11
  - type: text
    content: we are disciplined
  - type: note
    content: Or when we are judged we are being disciplined by the Lord
  - type: text
    content: ' so that we may not be '
  - type: note
    content: Rom. 5:16
  - type: text
    content: condemned along with the world.
  '33':
  - type: text
    content: So then, my brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' when you come together to eat, wait for'
  - type: note
    content: Or share with
  - type: text
    content: ' one another— '
  '34':
  - type: note
    content: ver. 21
  - type: text
    content: 'if anyone is hungry, '
  - type: note
    content: ver. 22
  - type: text
    content: 'let him eat at home—so that when you come together it will not be for judgment. About the other things '
  - type: note
    content: ch. 7:17; Titus 1:5
  - type: text
    content: 'I will give directions '
  - type: note
    content: See ch. 4:19
  - type: text
    content: when I come.
  '4':
  - type: text
    content: 'Every man who prays or prophesies with his head covered dishonors his head, '
  '5':
  - type: text
    content: but every wife
  - type: note
    content: In verses 5–13, the Greek word gunē is translated wife in verses that deal with wearing a veil, a sign of being married in first-century culture
  - type: text
    content: ' who prays or '
  - type: note
    content: Luke 2:36; Acts 21:9; [ch. 14:34]
  - type: text
    content: 'prophesies '
  - type: note
    content: '[Num. 5:18]'
  - type: text
    content: 'with her head uncovered dishonors her head, since it is the same '
  - type: note
    content: Deut. 21:12
  - type: text
    content: 'as if her head were shaven. '
  '6':
  - type: text
    content: 'For if a wife will not cover her head, then she should cut her hair short. But since it is disgraceful for a wife to cut off her hair or shave her head, let her cover her head. '
  '7':
  - type: text
    content: 'For a man ought not to cover his head, since '
  - type: note
    content: See Gen. 1:26
  - type: text
    content: 'he is the image and glory of God, but '
  - type: note
    content: '[Prov. 12:4]'
  - type: text
    content: 'woman is the glory of man. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: Gen. 2:21-23; [1 Tim. 2:13]
  - type: text
    content: 'man was not made from woman, but woman from man. '
  '9':
  - type: text
    content: 'Neither was man created for woman, but '
  - type: note
    content: Gen. 2:18
  - type: text
    content: 'woman for man. '
