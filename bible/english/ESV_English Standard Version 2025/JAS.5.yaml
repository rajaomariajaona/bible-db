  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prayer of Faith
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is anyone among you suffering? Let him pray. Is anyone cheerful? Let him '
