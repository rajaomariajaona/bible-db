document_id: JAS.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning to the Rich
  - type: text
    content: 'Come now, '
  - type: note
    content: Luke 6:24; [Prov. 11:28; Amos 6:1; 1 Tim. 6:9]
  - type: text
    content: 'you rich, weep and howl for the '
  - type: note
    content: Rom. 3:16
  - type: text
    content: 'miseries that are coming upon you. '
  '10':
  - type: text
    content: 'As an example of suffering and patience, brothers, take '
  - type: note
    content: Matt. 5:12; 23:34; Acts 7:52; Heb. 11:32-38
  - type: text
    content: 'the prophets who spoke in the name of the Lord. '
  '11':
  - type: text
    content: 'Behold, we consider those blessed who remained steadfast. You have heard of '
  - type: note
    content: Job 1:21, 22; 2:10
  - type: text
    content: 'the steadfastness of Job, and you have seen '
  - type: note
    content: Job 42:10, 12
  - type: text
    content: 'the purpose of the Lord, how '
  - type: note
    content: See Ex. 34:6
  - type: text
    content: the Lord is compassionate and merciful.
  '12':
  - type: text
    content: 'But above all, my brothers, '
  - type: note
    content: Matt. 5:34
  - type: text
    content: do not swear, either by heaven or by earth or by any other oath, but let your “yes” be yes and your “no” be no, so that you may not fall under condemnation.
  - type: heading
    content: The Prayer of Faith
  '13':
  - type: text
    content: 'Is anyone among you suffering? Let him pray. Is anyone cheerful? Let him '
  - type: note
    content: '[Col. 3:16]'
  - type: text
    content: 'sing praise. '
  '14':
  - type: text
    content: 'Is anyone among you sick? Let him call for the elders of the church, and let them pray over him, '
  - type: note
    content: Mark 6:13; [Mark 16:18]
  - type: text
    content: 'anointing him with oil in the name of the Lord. '
  '15':
  - type: text
    content: 'And the prayer of faith will save the one who is sick, and the Lord will raise him up. And '
  - type: note
    content: Isa. 33:24; Matt. 9:2; Mark 2:5; Luke 5:20
  - type: text
    content: 'if he has committed sins, he will be forgiven. '
  '16':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Acts 19:18
  - type: text
    content: 'confess your sins to one another and pray for one another, '
  - type: note
    content: Heb. 12:13
  - type: text
    content: 'that you may be healed. '
  - type: note
    content: Gen. 18:23-32; 20:17; Num. 11:2; 1 Kgs. 13:6; 17:22; 2 Kgs. 4:33; 19:15-20; 20:2-5; Job 42:8; Prov. 15:29
  - type: text
    content: The prayer of a righteous person has great power as it is working.
  - type: note
    content: Or The effective prayer of a righteous person has great power
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Elijah was a man '
  - type: note
    content: Acts 14:15
  - type: text
    content: 'with a nature like ours, and '
  - type: note
    content: 1 Kgs. 17:1; 18:1
  - type: text
    content: 'he prayed fervently that it might not rain, and for '
  - type: note
    content: Luke 4:25
  - type: text
    content: 'three years and six months it did not rain on the earth. '
  '18':
  - type: note
    content: 1 Kgs. 18:42, 45
  - type: text
    content: Then he prayed again, and heaven gave rain, and the earth bore its fruit.
  '19':
  - type: text
    content: 'My brothers, '
  - type: note
    content: '[Matt. 18:15; Gal. 6:1]'
  - type: text
    content: 'if anyone among you wanders from the truth and someone '
  - type: note
    content: Ps. 51:13; Dan. 12:3; Mal. 2:6; [Luke 1:16]
  - type: text
    content: 'brings him back, '
  '2':
  - type: note
    content: Job 13:28; Isa. 50:9; Matt. 6:19, 20
  - type: text
    content: 'Your riches have rotted and '
  - type: note
    content: Job 13:28; Isa. 50:9; Matt. 6:19, 20
  - type: text
    content: 'your garments are moth-eaten. '
  '20':
  - type: text
    content: 'let him know that whoever brings back a sinner from his wandering '
  - type: note
    content: See Rom. 11:14
  - type: text
    content: 'will save his soul from death and '
  - type: note
    content: 1 Pet. 4:8; [Neh. 4:5; Ps. 32:1; 85:2; Prov. 10:12]
  - type: text
    content: will cover a multitude of sins.
  '3':
  - type: text
    content: 'Your gold and silver have corroded, and their corrosion will be evidence against you and will eat your flesh like fire. '
  - type: note
    content: Matt. 6:19; Luke 12:21; Rom. 2:5
  - type: text
    content: 'You have laid up treasure '
  - type: note
    content: '[ver. 8, 9]'
  - type: text
    content: 'in the last days. '
  '4':
  - type: text
    content: 'Behold, '
  - type: note
    content: Job 24:10; See Lev. 19:13
  - type: text
    content: 'the wages of the laborers who mowed your fields, which you kept back by fraud, are crying out against you, and '
  - type: note
    content: Deut. 24:15
  - type: text
    content: 'the cries of the harvesters have reached the ears of '
  - type: note
    content: Rom. 9:29
  - type: text
    content: 'the Lord of hosts. '
  '5':
  - type: note
    content: '[Job 21:13; Luke 16:19; 2 Pet. 2:13]'
  - type: text
    content: 'You have lived on the earth in luxury and '
  - type: note
    content: 1 Tim. 5:6
  - type: text
    content: 'in self-indulgence. You have fattened your hearts in '
  - type: note
    content: Jer. 12:3
  - type: text
    content: 'a day of slaughter. '
  '6':
  - type: text
    content: 'You have condemned and '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'murdered '
  - type: note
    content: '[Acts 3:14]'
  - type: text
    content: the righteous person. He does not resist you.
  - type: heading
    content: Patience in Suffering
  '7':
  - type: text
    content: Be patient, therefore, brothers,
  - type: note
    content: Or brothers and sisters; also verses 9, 10, 12, 19
  - type: text
    content: ' until the coming of the Lord. See how the farmer waits for the precious fruit of the earth, being patient about it, until it receives '
  - type: note
    content: See Deut. 11:14
  - type: text
    content: 'the early and the late rains. '
  '8':
  - type: text
    content: 'You also, be patient. '
  - type: note
    content: 1 Thess. 3:13
  - type: text
    content: 'Establish your hearts, for the coming of the Lord '
  - type: note
    content: 1 Pet. 4:7; [Rom. 13:11, 12; Phil. 4:5; Heb. 10:25, 37]
  - type: text
    content: 'is at hand. '
  '9':
  - type: text
    content: 'Do not grumble against one another, brothers, '
  - type: note
    content: Matt. 7:1
  - type: text
    content: 'so that you may not be judged; behold, '
  - type: note
    content: '[1 Pet. 4:5; Rev. 22:12]'
  - type: text
    content: 'the Judge is standing '
  - type: note
    content: Matt. 24:33; Mark 13:29; [1 Cor. 4:5]
  - type: text
    content: 'at the door. '
