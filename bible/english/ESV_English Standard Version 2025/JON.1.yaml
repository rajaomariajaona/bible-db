document_id: JON.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Flees the Presence of the Lord
  - type: text
    content: 'Now the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to '
  - type: note
    content: 2 Kgs. 14:25
  - type: text
    content: 'Jonah the son of Amittai, saying, '
  '10':
  - type: text
    content: 'Then the men were exceedingly afraid and said to him, “What is this that you have done!” For the men knew that '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'he was fleeing from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', because he had told them.'
  '11':
  - type: text
    content: 'Then they said to him, “What shall we do to you, that the sea may quiet down for us?” For the sea grew more and more tempestuous. '
  '12':
  - type: text
    content: 'He said to them, “Pick me up and hurl me into the sea; then the sea will quiet down for you, '
  - type: note
    content: '[Josh. 7:20]'
  - type: text
    content: 'for I know it is because of me that this great tempest has come upon you.” '
  '13':
  - type: text
    content: Nevertheless, the men rowed hard
  - type: note
    content: Hebrew the men dug in [their oars]
  - type: text
    content: ' to get back to dry land, but they could not, for the sea grew more and more tempestuous against them. '
  '14':
  - type: text
    content: 'Therefore they called out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O '
  - type: text
    content: Lord
  - type: text
    content: ', let us not perish for this man’s life, and '
  - type: note
    content: Deut. 21:8
  - type: text
    content: 'lay not on us innocent blood, '
  - type: note
    content: '[Ps. 115:3]'
  - type: text
    content: 'for you, O '
  - type: text
    content: Lord
  - type: text
    content: ', have done as it pleased you.” '
  '15':
  - type: text
    content: 'So they picked up Jonah and hurled him into the sea, '
  - type: note
    content: Ps. 65:7; Luke 8:24
  - type: text
    content: 'and the sea ceased from its raging. '
  '16':
  - type: text
    content: 'Then the men feared the '
  - type: text
    content: Lord
  - type: text
    content: ' exceedingly, '
  - type: note
    content: '[Gen. 8:20; 31:54]'
  - type: text
    content: 'and they offered a sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:9
  - type: text
    content: and made vows.
  - type: heading
    content: A Great Fish Swallows Jonah
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ch 2:1 in Hebrew
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' appointed'
  - type: note
    content: Or had appointed
  - type: text
    content: ' a great fish to swallow up Jonah. '
  - type: note
    content: Matt. 12:40; 16:4; [Luke 11:30]
  - type: text
    content: And Jonah was in the belly of the fish three days and three nights.
  '2':
  - type: text
    content: '“Arise, go to '
  - type: note
    content: Gen. 10:11, 12; 2 Kgs. 19:36; Nah. 1:1; Zeph. 2:13; Matt. 12:41; Luke 11:30, 32
  - type: text
    content: 'Nineveh, that '
  - type: note
    content: ch. 3:3; 4:11
  - type: text
    content: 'great city, and call out against it, '
  - type: note
    content: Rev. 18:5
  - type: text
    content: for their evil
  - type: note
    content: The same Hebrew word can mean evil or disaster, depending on the context; so throughout Jonah
  - type: text
    content: ' has come up before me.” '
  '3':
  - type: text
    content: 'But Jonah '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'rose to flee to '
  - type: note
    content: See 1 Kgs. 10:22
  - type: text
    content: 'Tarshish from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: '. He went down to '
  - type: note
    content: See Josh. 19:46
  - type: text
    content: 'Joppa and found a ship going to '
  - type: note
    content: See 1 Kgs. 10:22
  - type: text
    content: 'Tarshish. So he paid the fare and went down into it, to go with them to '
  - type: note
    content: See 1 Kgs. 10:22
  - type: text
    content: 'Tarshish, '
  - type: note
    content: Gen. 4:16; [Ps. 139:9, 10]
  - type: text
    content: 'away from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'But '
  - type: note
    content: '[Ps. 107:25]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' hurled a great wind upon the sea, and there was a mighty tempest on the sea, so that the ship threatened '
  - type: note
    content: 1 Kgs. 22:48; Ps. 48:7
  - type: text
    content: 'to break up. '
  '5':
  - type: text
    content: 'Then the mariners were afraid, and '
  - type: note
    content: '[Ps. 107:28]'
  - type: text
    content: 'each cried out to his god. And '
  - type: note
    content: '[Acts 27:18, 19, 38]'
  - type: text
    content: 'they hurled the cargo that was in the ship into the sea to lighten it for them. But Jonah had gone down into the inner part of the ship and had lain down and was fast asleep. '
  '6':
  - type: text
    content: 'So the captain came and said to him, “What do you mean, you sleeper? Arise, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'call out to your god! '
  - type: note
    content: '[ch. 3:9]'
  - type: text
    content: Perhaps the god will give a thought to us, that we may not perish.”
  - type: heading
    content: Jonah Is Thrown into the Sea
  '7':
  - type: text
    content: 'And they said to one another, “Come, let us '
  - type: note
    content: '[Judg. 20:9]'
  - type: text
    content: 'cast lots, that we may know on whose account this evil has come upon us.” So they cast lots, and the lot fell on Jonah. '
  '8':
  - type: text
    content: 'Then they said to him, “Tell us on whose account this evil has come upon us. What is your occupation? And where do you come from? What is your country? And of what people are you?” '
  '9':
  - type: text
    content: 'And he said to them, “I am a Hebrew, and I fear '
  - type: note
    content: Rev. 11:13
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, '
  - type: note
    content: Ps. 146:6
  - type: text
    content: 'who made the sea and the dry land.” '
