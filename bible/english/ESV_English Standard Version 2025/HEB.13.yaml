document_id: HEB.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sacrifices Pleasing to God
  - type: text
    content: 'Let '
  - type: note
    content: Rom. 12:10; 1 Thess. 4:9; 1 Pet. 1:22; 2 Pet. 1:7; [1 Pet. 2:17; 3:8; 1 John 3:10; 4:7, 20, 21]
  - type: text
    content: 'brotherly love continue. '
  '10':
  - type: text
    content: 'We have an altar '
  - type: note
    content: '[1 Cor. 9:13; 10:18]'
  - type: text
    content: from which those who serve the tent
  - type: note
    content: Or tabernacle
  - type: text
    content: ' have no right to eat. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: See Ex. 29:14
  - type: text
    content: 'the bodies of those animals whose blood is brought into the holy places by the high priest as a sacrifice for sin are burned '
  - type: note
    content: ver. 13
  - type: text
    content: 'outside the camp. '
  '12':
  - type: text
    content: 'So Jesus also '
  - type: note
    content: ch. 9:12
  - type: text
    content: 'suffered '
  - type: note
    content: Matt. 21:39; 27:32; John 19:17, 20; [Acts 7:58]
  - type: text
    content: 'outside the gate in order to sanctify the people '
  - type: note
    content: '[Rev. 14:20]'
  - type: text
    content: 'through his own blood. '
  '13':
  - type: text
    content: 'Therefore let us go to him outside the camp and bear '
  - type: note
    content: ch. 11:26; 1 Pet. 4:14
  - type: text
    content: 'the reproach he endured. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 11:10, 16; 12:28; Mic. 2:10]; See Eph. 2:19'
  - type: text
    content: 'here we have no lasting city, but we seek the city that is to come. '
  '15':
  - type: note
    content: Eph. 5:20
  - type: text
    content: 'Through him then let us continually offer up '
  - type: note
    content: Lev. 7:12; Ps. 107:22; 116:17
  - type: text
    content: 'a sacrifice of praise to God, that is, '
  - type: note
    content: Isa. 57:19; Hos. 14:2; [Ps. 119:108]
  - type: text
    content: 'the fruit of lips that acknowledge his name. '
  '16':
  - type: text
    content: 'Do not neglect to do good and '
  - type: note
    content: See Rom. 12:13
  - type: text
    content: 'to share what you have, for such '
  - type: note
    content: Mic. 6:7, 8; Phil. 4:18
  - type: text
    content: sacrifices are pleasing to God.
  '17':
  - type: text
    content: 'Obey '
  - type: note
    content: ver. 7, 24
  - type: text
    content: 'your leaders and submit to them, '
  - type: note
    content: See Ezek. 3:17
  - type: text
    content: 'for they are keeping watch over your souls, as those who will have to '
  - type: note
    content: Jer. 13:20; Ezek. 34:10
  - type: text
    content: 'give an account. '
  - type: note
    content: '[Acts 20:24, 31]'
  - type: text
    content: Let them do this with joy and not with groaning, for that would be of no advantage to you.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 1 Thess. 5:25; 2 Thess. 3:1
  - type: text
    content: 'Pray for us, for we are sure that we have a clear conscience, desiring to act honorably in all things. '
  '19':
  - type: text
    content: 'I urge you the more earnestly to do this in order '
  - type: note
    content: '[Philem. 22]'
  - type: text
    content: that I may be restored to you the sooner.
  - type: heading
    content: Benediction
  '2':
  - type: note
    content: See Matt. 25:35; 1 Pet. 4:9
  - type: text
    content: 'Do not neglect to show hospitality to strangers, for thereby '
  - type: note
    content: Gen. 18:3; 19:2
  - type: text
    content: 'some have entertained angels unawares. '
  '20':
  - type: text
    content: 'Now '
  - type: note
    content: See Rom. 15:33
  - type: text
    content: 'may the God of peace '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'who brought again from the dead our Lord Jesus, '
  - type: note
    content: Isa. 63:11; See John 10:11
  - type: text
    content: 'the great shepherd of the sheep, by '
  - type: note
    content: ch. 10:29; Zech. 9:11; [Isa. 54:10]
  - type: text
    content: 'the blood of the eternal covenant, '
  '21':
  - type: note
    content: 2 Thess. 2:17; 1 Pet. 5:10
  - type: text
    content: 'equip you with everything good that you may do his will, '
  - type: note
    content: ch. 10:36; [Phil. 2:13]
  - type: text
    content: working in us
  - type: note
    content: Some manuscripts you
  - type: text
    content: ' that which is pleasing in his sight, through Jesus Christ, '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: to whom be glory forever and ever. Amen.
  - type: heading
    content: Final Greetings
  '22':
  - type: text
    content: I appeal to you, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' bear with my word of exhortation, for '
  - type: note
    content: '[1 Pet. 5:12]'
  - type: text
    content: 'I have written to you briefly. '
  '23':
  - type: text
    content: 'You should know that '
  - type: note
    content: See 1 Thess. 3:2
  - type: text
    content: 'our brother Timothy has been released, with whom I shall see you if he comes soon. '
  '24':
  - type: text
    content: 'Greet all '
  - type: note
    content: ver. 7, 17
  - type: text
    content: 'your leaders and all the saints. Those who come from Italy send you greetings. '
  '25':
  - type: note
    content: See Col. 4:18
  - type: text
    content: Grace be with all of you.
  '3':
  - type: note
    content: ch. 10:34; Matt. 25:36
  - type: text
    content: 'Remember those who are in prison, as though in prison with them, and those who are mistreated, since you also are in the body. '
  '4':
  - type: note
    content: 1 Cor. 7:38; [1 Tim. 4:3]
  - type: text
    content: 'Let marriage be held in honor among all, and let the marriage bed be undefiled, for God will judge '
  - type: note
    content: See 1 Cor. 6:9
  - type: text
    content: 'the sexually immoral and adulterous. '
  '5':
  - type: text
    content: 'Keep your life '
  - type: note
    content: 1 Tim. 3:3
  - type: text
    content: 'free from love of money, and '
  - type: note
    content: 1 Tim. 6:7, 8; [Phil. 4:11]; See Matt. 6:25
  - type: text
    content: 'be content with what you have, for he has said, '
  - type: note
    content: Cited from Josh. 1:5; [Ps. 37:25; 2 Cor. 4:9]
  - type: text
    content: '“I will never leave you nor forsake you.” '
  '6':
  - type: text
    content: So we can confidently say,
  - type: note
    content: Cited from Ps. 118:6; [ Ps. 27:1 ]
  - type: text
    content: “The Lord is my helper;
  - type: note
    content: Ps. 56:4, 11
  - type: text
    content: I will not fear;
  - type: text
    content: what can man do to me?”
  '7':
  - type: text
    content: 'Remember '
  - type: note
    content: ver. 17, 24
  - type: text
    content: 'your leaders, those who spoke to you the word of God. Consider the outcome of their way of life, and '
  - type: note
    content: '[ch. 6:12]'
  - type: text
    content: 'imitate their faith. '
  '8':
  - type: text
    content: 'Jesus Christ is '
  - type: note
    content: ch. 1:12; John 8:58; Rev. 1:4, 8; [2 Cor. 1:19]
  - type: text
    content: 'the same yesterday and today and forever. '
  '9':
  - type: text
    content: 'Do not be '
  - type: note
    content: Jude 12; See Eph. 4:14
  - type: text
    content: 'led away by diverse and strange teachings, for it is good for the heart to be strengthened by grace, '
  - type: note
    content: See Col. 2:16
  - type: text
    content: 'not by foods, which have not benefited those devoted to them. '
