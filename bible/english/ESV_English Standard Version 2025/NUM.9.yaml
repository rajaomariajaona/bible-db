      - type: text
        text: 1:1
      metadata:
        usfm: NUM.1.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'in the first month of the second year after they had come out of the land of Egypt, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Let the people of Israel keep the Passover at its appointed time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lev. 23:5
      metadata:
        usfm: LEV.23.5
    marker-yv: yv-n
  - type: text
    text: 'On the fourteenth day of this month, at twilight, you shall keep it at its appointed time; according to all its statutes and all its rules you shall keep it.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Moses told the people of Israel that they should keep the Passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they kept the Passover in the first month, on the fourteenth day of the month, at twilight, in the wilderness of Sinai; according to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses, so the people of Israel did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there were certain men who were '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:2
      metadata:
        usfm: NUM.5.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:11
      metadata:
        usfm: NUM.19.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: NUM.19.16
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 18:28
      metadata:
        usfm: JHN.18.28
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'unclean through touching a dead body, so that they could not keep the Passover on that day, and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:2
      metadata:
        usfm: NUM.27.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 18:15
      metadata:
        usfm: EXO.18.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: EXO.18.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: EXO.18.26
    marker-yv: yv-n
  - type: text
    text: 'they came before Moses and Aaron on that day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And those men said to him, “We are unclean through touching a dead body. Why are we kept from bringing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: NUM.9.13
    marker-yv: yv-n
  - type: text
    text: 'offering at its appointed time among the people of Israel?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Moses said to them, “Wait, that '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:5
      metadata:
        usfm: NUM.27.5
    marker-yv: yv-n
  - type: text
    text: 'I may hear what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will command concerning you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Speak to the people of Israel, saying, If any one of you or of your descendants is unclean through touching a dead body, or is on a long journey, he shall still keep the Passover to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:6
      metadata:
        usfm: EXO.12.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 30:2-15
      metadata:
        usfm: 2CH.30.2+2CH.30.3+2CH.30.4+2CH.30.5+2CH.30.6+2CH.30.7+2CH.30.8+2CH.30.9+2CH.30.10+2CH.30.11+2CH.30.12+2CH.30.13+2CH.30.14+2CH.30.15
    marker-yv: yv-n
  - type: text
    text: 'In the second month on the fourteenth day at twilight they shall keep it. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:8
      metadata:
        usfm: EXO.12.8
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 16:3
      metadata:
        usfm: DEU.16.3
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'They shall eat it with unleavened bread and bitter herbs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:10
      metadata:
        usfm: EXO.12.10
    marker-yv: yv-n
  - type: text
    text: 'They shall leave none of it until the morning, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:46
      metadata:
        usfm: EXO.12.46
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'Cited '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 19:36
      metadata:
        usfm: JHN.19.36
    marker-yv: yv-n
  - type: text
    text: 'nor break any of its bones; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:43
      metadata:
        usfm: EXO.12.43
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '49'
      metadata:
        usfm: EXO.12.49
    marker-yv: yv-n
  - type: text
    text: 'according to all the statute for the Passover they shall keep it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But if anyone who is clean and is not on a journey fails to keep the Passover, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:15
      metadata:
        usfm: EXO.12.15
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 17:14
      metadata:
        usfm: GEN.17.14
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'that person shall be cut off from his people because he did not bring the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: NUM.9.7
    marker-yv: yv-n
  - type: text
    text: 'offering at its appointed time; that man shall bear his sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if a stranger sojourns among you and would keep the Passover to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', according to the statute of the Passover and according to its rule, so shall he do. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 12:48
      metadata:
        usfm: EXO.12.48
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '49'
      metadata:
        usfm: EXO.12.49
    marker-yv: yv-n
  - type: text
    text: You shall have one statute, both for the sojourner and for the native.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cloud Covering the Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 40:17
      metadata:
        usfm: EXO.40.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: EXO.40.34
    marker-yv: yv-n
  - type: text
    text: 'On the day that the tabernacle was set up, the cloud covered the tabernacle, the tent of the testimony. And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 13:21
      metadata:
        usfm: EXO.13.21
    marker-yv: yv-n
  - type: text
    text: 'at evening it was over the tabernacle like the appearance of fire until morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So it was always: the cloud covered it by day'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint, Syriac, Vulgate; Hebrew lacks '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: by day
    marker-yv: yv-n
  - type: text
    text: ' and the appearance of fire by night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And whenever the cloud '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:11
      metadata:
        usfm: NUM.10.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.10.33
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: NUM.10.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 40:36
      metadata:
        usfm: EXO.40.36
    marker-yv: yv-n
  - type: text
    text: 'lifted from over the tent, after that the people of Israel set out, and in the place where the cloud settled down, there the people of Israel camped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'At the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' the people of Israel set out, and at the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' they camped. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 10:1
      metadata:
        usfm: 1CO.10.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'As long as the cloud rested over the tabernacle, they remained in camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Even when the cloud continued over the tabernacle many days, the people of Israel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:53
      metadata:
        usfm: NUM.1.53
    marker-yv: yv-n
  - type: text
    text: 'kept the charge of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and did not set out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sometimes the cloud was a few days over the tabernacle, and according to the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' they remained in camp; then according to the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' they set out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And sometimes the cloud remained from evening until morning. And when the cloud lifted in the morning, they set out, or if it continued for a day and a night, when the cloud lifted they set out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Whether it was two days, or a month, or a longer time, that the cloud continued over the tabernacle, abiding there, the people of Israel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 40:36
      metadata:
        usfm: EXO.40.36
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: EXO.40.37
    marker-yv: yv-n
  - type: text
    text: 'remained in camp and did not set out, but when it lifted they set out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'At the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' they camped, and at the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' they set out. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[See ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: NUM.19
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: 'They kept the charge of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', at the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by Moses.'
