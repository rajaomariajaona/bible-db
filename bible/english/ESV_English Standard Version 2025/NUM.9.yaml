document_id: NUM.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Passover Celebrated
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the wilderness of Sinai, '
  - type: note
    content: '[ch. 1:1]'
  - type: text
    content: 'in the first month of the second year after they had come out of the land of Egypt, saying, '
  '10':
  - type: text
    content: '“Speak to the people of Israel, saying, If any one of you or of your descendants is unclean through touching a dead body, or is on a long journey, he shall still keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: note
    content: See Ex. 12:6; 2 Chr. 30:2-15
  - type: text
    content: 'In the second month on the fourteenth day at twilight they shall keep it. '
  - type: note
    content: Ex. 12:8; [Deut. 16:3]
  - type: text
    content: 'They shall eat it with unleavened bread and bitter herbs. '
  '12':
  - type: note
    content: Ex. 12:10
  - type: text
    content: 'They shall leave none of it until the morning, '
  - type: note
    content: Ex. 12:46; Cited John 19:36
  - type: text
    content: 'nor break any of its bones; '
  - type: note
    content: Ex. 12:43, 49
  - type: text
    content: 'according to all the statute for the Passover they shall keep it. '
  '13':
  - type: text
    content: 'But if anyone who is clean and is not on a journey fails to keep the Passover, '
  - type: note
    content: Ex. 12:15; [Gen. 17:14]
  - type: text
    content: 'that person shall be cut off from his people because he did not bring the '
  - type: text
    content: Lord
  - type: text
    content: '’s '
  - type: note
    content: ver. 7
  - type: text
    content: 'offering at its appointed time; that man shall bear his sin. '
  '14':
  - type: text
    content: 'And if a stranger sojourns among you and would keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', according to the statute of the Passover and according to its rule, so shall he do. '
  - type: note
    content: Ex. 12:48, 49
  - type: text
    content: You shall have one statute, both for the sojourner and for the native.”
  - type: heading
    content: The Cloud Covering the Tabernacle
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex. 40:17, 34
  - type: text
    content: 'On the day that the tabernacle was set up, the cloud covered the tabernacle, the tent of the testimony. And '
  - type: note
    content: See Ex. 13:21
  - type: text
    content: 'at evening it was over the tabernacle like the appearance of fire until morning. '
  '16':
  - type: text
    content: 'So it was always: the cloud covered it by day'
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew lacks by day
  - type: text
    content: ' and the appearance of fire by night. '
  '17':
  - type: text
    content: 'And whenever the cloud '
  - type: note
    content: ch. 10:11, 33, 34; Ex. 40:36
  - type: text
    content: 'lifted from over the tent, after that the people of Israel set out, and in the place where the cloud settled down, there the people of Israel camped. '
  '18':
  - type: text
    content: 'At the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' the people of Israel set out, and at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' they camped. '
  - type: note
    content: '[1 Cor. 10:1]'
  - type: text
    content: 'As long as the cloud rested over the tabernacle, they remained in camp. '
  '19':
  - type: text
    content: 'Even when the cloud continued over the tabernacle many days, the people of Israel '
  - type: note
    content: See ch. 1:53
  - type: text
    content: 'kept the charge of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not set out. '
  '2':
  - type: text
    content: '“Let the people of Israel keep the Passover at its appointed time. '
  '20':
  - type: text
    content: 'Sometimes the cloud was a few days over the tabernacle, and according to the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' they remained in camp; then according to the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' they set out. '
  '21':
  - type: text
    content: 'And sometimes the cloud remained from evening until morning. And when the cloud lifted in the morning, they set out, or if it continued for a day and a night, when the cloud lifted they set out. '
  '22':
  - type: text
    content: 'Whether it was two days, or a month, or a longer time, that the cloud continued over the tabernacle, abiding there, the people of Israel '
  - type: note
    content: Ex. 40:36, 37
  - type: text
    content: 'remained in camp and did not set out, but when it lifted they set out. '
  '23':
  - type: text
    content: 'At the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' they camped, and at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' they set out. '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'They kept the charge of the '
  - type: text
    content: Lord
  - type: text
    content: ', at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' by Moses.'
  '3':
  - type: note
    content: See Lev. 23:5
  - type: text
    content: 'On the fourteenth day of this month, at twilight, you shall keep it at its appointed time; according to all its statutes and all its rules you shall keep it.” '
  '4':
  - type: text
    content: 'So Moses told the people of Israel that they should keep the Passover. '
  '5':
  - type: text
    content: 'And they kept the Passover in the first month, on the fourteenth day of the month, at twilight, in the wilderness of Sinai; according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, so the people of Israel did. '
  '6':
  - type: text
    content: 'And there were certain men who were '
  - type: note
    content: ch. 5:2; 19:11, 16; [John 18:28]
  - type: text
    content: 'unclean through touching a dead body, so that they could not keep the Passover on that day, and '
  - type: note
    content: ch. 27:2; Ex. 18:15, 19, 26
  - type: text
    content: 'they came before Moses and Aaron on that day. '
  '7':
  - type: text
    content: 'And those men said to him, “We are unclean through touching a dead body. Why are we kept from bringing the '
  - type: text
    content: Lord
  - type: text
    content: '’s '
  - type: note
    content: ver. 13
  - type: text
    content: 'offering at its appointed time among the people of Israel?” '
  '8':
  - type: text
    content: 'And Moses said to them, “Wait, that '
  - type: note
    content: ch. 27:5
  - type: text
    content: 'I may hear what the '
  - type: text
    content: Lord
  - type: text
    content: ' will command concerning you.”'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
