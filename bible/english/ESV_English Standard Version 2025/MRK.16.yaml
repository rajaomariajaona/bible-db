document_id: MRK.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-8, see Matt. 28:1-8; Luke 24:1-10; John 20:1
  - type: note
    content: '[ch. 1:32 ]'
  - type: text
    content: 'When the Sabbath was past, '
  - type: note
    content: ch. 15:40
  - type: text
    content: 'Mary Magdalene, '
  - type: note
    content: ch. 15:40
  - type: text
    content: 'Mary the mother of James, and '
  - type: note
    content: '[See ch. 15:40 above]'
  - type: text
    content: 'Salome '
  - type: note
    content: Luke 23:56; [John 19:39, 40]
  - type: text
    content: 'bought spices, so that they might go and anoint him. '
  '10':
  - type: note
    content: John 20:18; [Matt. 28:10; Luke 24:10]
  - type: text
    content: 'She went and told those who had been with him, '
  - type: note
    content: John 16:20
  - type: text
    content: 'as they '
  - type: note
    content: Luke 6:25
  - type: text
    content: 'mourned and wept. '
  '11':
  - type: text
    content: 'But when they heard that he was alive and had been seen by her, they '
  - type: note
    content: Luke 24:11; [ver. 16]
  - type: text
    content: would not believe it.
  - type: heading
    content: Jesus Appears to Two Disciples
  '12':
  - type: text
    content: ' '
  - type: note
    content: Luke 24:13-31
  - type: text
    content: 'After these things '
  - type: note
    content: ver. 14; [John 21:1, 14]
  - type: text
    content: 'he appeared in '
  - type: note
    content: Luke 9:29 (Gk.)
  - type: text
    content: 'another form to two of them, as they were walking into the country. '
  '13':
  - type: note
    content: Luke 24:33-35
  - type: text
    content: And they went back and told the rest, but they did not believe them.
  - type: heading
    content: The Great Commission
  '14':
  - type: text
    content: 'Afterward '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'he appeared '
  - type: note
    content: Luke 24:36; 1 Cor. 15:5
  - type: text
    content: 'to the eleven themselves as they were reclining at table, and he rebuked them for their '
  - type: note
    content: '[Luke 24:41]'
  - type: text
    content: 'unbelief and '
  - type: note
    content: See ch. 10:5
  - type: text
    content: 'hardness of heart, because '
  - type: note
    content: ver. 11, 13
  - type: text
    content: 'they had not believed those who saw him after he had risen. '
  '15':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: Matt. 28:19
  - type: text
    content: '“Go into all the world and '
  - type: note
    content: Col. 1:23; [ch. 13:10; Acts 1:8; Rom. 10:18]
  - type: text
    content: 'proclaim the gospel to '
  - type: note
    content: Rom. 8:22
  - type: text
    content: the whole creation.
  - type: text
    content: ' '
  '16':
  - type: note
    content: '[John 3:18]'
  - type: text
    content: 'Whoever believes and is '
  - type: note
    content: John 3:5
  - type: text
    content: 'baptized '
  - type: note
    content: Acts 16:31; Rom. 10:9; 1 Pet. 3:21
  - type: text
    content: 'will be saved, but '
  - type: note
    content: ver. 11; Luke 24:11, 41; Acts 28:24; 1 Pet. 2:7; [2 Thess. 2:12]
  - type: text
    content: 'whoever '
  - type: note
    content: '[John 3:18]'
  - type: text
    content: does not believe will be condemned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 11:23]'
  - type: text
    content: 'these signs will accompany those who believe: '
  - type: note
    content: Acts 5:16; 8:7; 16:18; 19:12; See ch. 9:38
  - type: text
    content: 'in my name they will cast out demons; '
  - type: note
    content: Acts 2:4; 10:46; 19:6; 1 Cor. 12:10, 28, 30; 13:1; 14:2, 4
  - type: text
    content: they will speak in new tongues;
  - type: text
    content: ' '
  '18':
  - type: note
    content: Luke 10:19; Acts 28:3-5
  - type: text
    content: 'they will pick up serpents with their hands; and if they drink any deadly poison, it will not hurt them; '
  - type: note
    content: See ch. 5:23
  - type: text
    content: 'they will lay their hands '
  - type: note
    content: Acts 5:15, 16; 8:7; 9:12, 17; 28:8; James 5:14, 15; [John 14:12]
  - type: text
    content: on the sick, and they will recover.”
  '19':
  - type: text
    content: 'So then the Lord Jesus, '
  - type: note
    content: Acts 1:3
  - type: text
    content: 'after he had spoken to them, '
  - type: note
    content: Luke 9:51; 24:51; John 6:62; Acts 1:2; 1 Tim. 3:16; [John 20:17; Eph. 4:8-10; Heb. 4:14]
  - type: text
    content: 'was taken up into heaven and '
  - type: note
    content: Acts 7:55, 56; Rom. 8:34; Eph. 1:20; Col. 3:1; Heb. 1:3; 8:1; 10:12; 12:2; 1 Pet. 3:22; Rev. 3:21; See Matt. 22:44; Acts 2:33
  - type: text
    content: 'sat down at the right hand of God. '
  '2':
  - type: text
    content: 'And very early on the first day of the week, when the sun had risen, they went to the tomb. '
  '20':
  - type: text
    content: 'And they went out and preached everywhere, while '
  - type: note
    content: Heb. 2:3, 4; See 1 Cor. 3:9
  - type: text
    content: 'the Lord worked with them and confirmed '
  - type: note
    content: See ch. 4:14
  - type: text
    content: 'the message '
  - type: note
    content: See Acts 5:12
  - type: text
    content: by accompanying signs.]]
  '3':
  - type: text
    content: 'And they were saying to one another, “Who will roll away '
  - type: note
    content: ch. 15:46
  - type: text
    content: 'the stone for us from the entrance of the tomb?” '
  '4':
  - type: text
    content: And looking up, they saw that the stone had been rolled back—
  - type: note
    content: Matt. 27:60
  - type: text
    content: 'it was very large. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: '[John 20:11, 12]'
  - type: text
    content: 'entering the tomb, they saw a young man sitting on the right side, '
  - type: note
    content: '[ch. 9:3; Dan. 7:9; John 20:12; Acts 1:10]'
  - type: text
    content: 'dressed in '
  - type: note
    content: Rev. 6:11; 7:9
  - type: text
    content: 'a white robe, and '
  - type: note
    content: ch. 9:15 (Gk.)
  - type: text
    content: 'they were alarmed. '
  '6':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: '“Do not be alarmed. You seek Jesus of Nazareth, who was crucified. He has risen; he is not here. See the place where they laid him. '
  '7':
  - type: text
    content: 'But go, tell his disciples and Peter that '
  - type: note
    content: ch. 14:28
  - type: text
    content: 'he is going before you to Galilee. There you will see him, '
  - type: note
    content: ch. 14:28
  - type: text
    content: 'just as he told you.” '
  '8':
  - type: text
    content: And they went out and fled from the tomb, for trembling and astonishment had seized them, and they said nothing to anyone, for they were afraid.
  - type: text
    content: '[Some of the earliest manuscripts do not include 16:9–20.]'
  - type: note
    content: 'Some manuscripts end the book with 16:8; others include verses 9–20 immediately after verse 8. At least one manuscript inserts additional material after verse 14; some manuscripts include after verse 8 the following: But they reported briefly to Peter and those with him all that they had been told. And after this, Jesus himself sent out by means of them, from east to west, the sacred and imperishable proclamation of eternal salvation. These manuscripts then continue with verses 9–20'
  - type: heading
    content: Jesus Appears to Mary Magdalene
  - type: text
    content: '[['
  '9':
  - type: text
    content: 'Now when he rose early on the first day of the week, '
  - type: note
    content: John 20:14; [Matt. 28:9]
  - type: text
    content: 'he appeared first to '
  - type: note
    content: Luke 8:2
  - type: text
    content: 'Mary Magdalene, '
  - type: note
    content: Luke 8:2
  - type: text
    content: 'from whom he had cast out seven demons. '
