document_id: DEU.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Defeat of King Og
  - type: text
    content: '“Then we turned and went up the way to Bashan. And '
  - type: note
    content: ch. 29:7; Num. 21:33, 35
  - type: text
    content: 'Og the king of Bashan came out against us, he and all his people, to battle at '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'Edrei. '
  '10':
  - type: text
    content: 'all the cities of the '
  - type: note
    content: ch. 4:43; Josh. 13:9, 16, 17, 21; Jer. 48:8, 21
  - type: text
    content: 'tableland and all Gilead and all Bashan, as far as '
  - type: note
    content: Josh. 12:5; 13:11; 1 Chr. 5:11
  - type: text
    content: 'Salecah and Edrei, cities of the kingdom of Og in Bashan. '
  '11':
  - type: text
    content: '(For '
  - type: note
    content: ch. 2:11, 20
  - type: text
    content: 'only Og the king of Bashan was left of the remnant of '
  - type: note
    content: See Gen. 14:5
  - type: text
    content: 'the Rephaim. Behold, his bed was a bed of iron. Is it not in '
  - type: note
    content: 2 Sam. 11:1; 12:26; Jer. 49:2; Ezek. 21:20; 25:5; Amos 1:14
  - type: text
    content: Rabbah of the Ammonites? Nine cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' was its length, and four cubits its breadth, according to the '
  - type: note
    content: '[Rev. 21:17]'
  - type: text
    content: common cubit.
  - type: note
    content: Hebrew cubit of a man
  - type: text
    content: )
  '12':
  - type: text
    content: '“When we took possession of this land at that time, I gave to the Reubenites and the Gadites the territory beginning '
  - type: note
    content: See ch. 2:36
  - type: text
    content: 'at Aroer, which is on the edge of the Valley of the Arnon, and half the hill country of Gilead with '
  - type: note
    content: See Num. 32:32-38; Josh. 13:8-13
  - type: text
    content: 'its cities. '
  '13':
  - type: note
    content: See Num. 32:39-42; Josh. 13:29-31
  - type: text
    content: 'The rest of Gilead, and all Bashan, the kingdom of Og, that is, '
  - type: note
    content: 1 Kgs. 4:13
  - type: text
    content: 'all the region of Argob, I gave to the half-tribe of Manasseh. (All that portion of Bashan is called the land of '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'Rephaim. '
  '14':
  - type: note
    content: Num. 32:41; [1 Chr. 2:22, 23]
  - type: text
    content: 'Jair the Manassite took all the region of Argob, that is, Bashan, as far as the border of '
  - type: note
    content: Josh. 12:5; 13:11, 13; 2 Sam. 3:3; 10:6; 13:37, 38
  - type: text
    content: 'the Geshurites and the Maacathites, and called the villages '
  - type: note
    content: Num. 32:41
  - type: text
    content: 'after his own name, Havvoth-jair, as it is to this day.) '
  '15':
  - type: text
    content: 'To Machir '
  - type: note
    content: Num. 32:39
  - type: text
    content: 'I gave Gilead, '
  '16':
  - type: text
    content: 'and to the Reubenites '
  - type: note
    content: '[2 Sam. 24:5]'
  - type: text
    content: 'and the Gadites I gave the territory from Gilead as far as the Valley of the Arnon, with the middle of the valley as a border, as far over as the river Jabbok, '
  - type: note
    content: Num. 21:24; Josh. 12:2
  - type: text
    content: 'the border of the Ammonites; '
  '17':
  - type: text
    content: 'the Arabah also, with the Jordan as the border, from '
  - type: note
    content: See Num. 34:11
  - type: text
    content: 'Chinnereth as far as '
  - type: note
    content: ch. 4:49; Josh. 3:16; 12:3; 2 Kgs. 14:25
  - type: text
    content: 'the Sea of the Arabah, '
  - type: note
    content: See Gen. 14:3
  - type: text
    content: 'the Salt Sea, under '
  - type: note
    content: '[Num. 21:15]'
  - type: text
    content: the slopes of Pisgah on the east.
  '18':
  - type: text
    content: '“And I commanded you at that time, saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you this land to possess. '
  - type: note
    content: Num. 32:20, 21; Josh. 1:14; 4:12
  - type: text
    content: 'All your men of valor shall cross over armed before your brothers, the people of Israel. '
  '19':
  - type: text
    content: 'Only your wives, your little ones, and your livestock '
  - type: note
    content: Num. 32:1, 4
  - type: text
    content: '(I know that you have much livestock) shall remain in the cities that I have given you, '
  '2':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Do not fear him, for I have given him and all his people and his land into your hand. And you shall do to him as you did to '
  - type: note
    content: See Num. 21:23-26, 34
  - type: text
    content: 'Sihon the king of the Amorites, who lived at Heshbon.’ '
  '20':
  - type: note
    content: Josh. 22:4
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' gives rest to your brothers, as to you, and they also occupy the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives them beyond the Jordan. Then each of you may return to his possession which I have given you.’ '
  '21':
  - type: text
    content: 'And I commanded '
  - type: note
    content: '[Num. 27:18]'
  - type: text
    content: 'Joshua at that time, ‘Your eyes have seen all that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has done to these two kings. So will the '
  - type: text
    content: Lord
  - type: text
    content: ' do to all the kingdoms into which you are crossing. '
  '22':
  - type: text
    content: 'You shall not fear them, for it is '
  - type: note
    content: See Ex. 14:14
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God who fights for you.’'
  - type: heading
    content: Moses Forbidden to Enter the Land
  '23':
  - type: text
    content: '“And I pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ' at that time, saying, '
  '24':
  - type: text
    content: '‘O Lord '
  - type: text
    content: God
  - type: text
    content: ', you have only begun to show your servant '
  - type: note
    content: ch. 5:24; 11:2; 32:3; 1 Chr. 29:11
  - type: text
    content: 'your greatness and your mighty hand. For '
  - type: note
    content: See Ex. 15:11
  - type: text
    content: 'what god is there in heaven or on earth who can do such works and mighty acts as yours? '
  '25':
  - type: text
    content: 'Please let me go over and see '
  - type: note
    content: ch. 4:22; Ex. 3:8
  - type: text
    content: 'the good land beyond the Jordan, that good hill country and '
  - type: note
    content: '[Josh. 1:4]'
  - type: text
    content: 'Lebanon.’ '
  '26':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 1:37
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with me because of you and would not listen to me. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: '[2 Cor. 12:9]'
  - type: text
    content: '‘Enough from you; do not speak to me of this matter again. '
  '27':
  - type: note
    content: Num. 27:12, 13
  - type: text
    content: 'Go up to the top of Pisgah and lift up your eyes westward and northward and southward and eastward, and look at it with your eyes, for you shall not go over this Jordan. '
  '28':
  - type: text
    content: 'But '
  - type: note
    content: ch. 1:38; 31:3, 7; Num. 27:23
  - type: text
    content: 'charge Joshua, and encourage and strengthen him, for he shall go over at the head of this people, and he shall put them in possession of the land that you shall see.’ '
  '29':
  - type: text
    content: 'So we remained in '
  - type: note
    content: ch. 4:46; 34:6
  - type: text
    content: the valley opposite Beth-peor.
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' our God gave into our hand Og also, the king of Bashan, and all his people, '
  - type: note
    content: Num. 21:35
  - type: text
    content: 'and we struck him down until he had no survivor left. '
  '4':
  - type: text
    content: 'And we took all his cities at that time—there was not a city that we did not take from them—sixty cities, '
  - type: note
    content: 1 Kgs. 4:13
  - type: text
    content: 'the whole region of Argob, the kingdom of Og in Bashan. '
  '5':
  - type: text
    content: 'All these were cities fortified with high walls, gates, and bars, besides very many unwalled villages. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 7:2; Ps. 135:10-12
  - type: text
    content: we devoted them to destruction,
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction); twice in this verse
  - type: text
    content: ' as we did to Sihon the king of Heshbon, devoting to destruction every '
  - type: note
    content: ch. 2:34
  - type: text
    content: 'city, men, women, and children. '
  '7':
  - type: text
    content: 'But all the livestock and the spoil of the cities we took as our plunder. '
  '8':
  - type: text
    content: 'So we took the land at that time out of the hand of the two kings of the Amorites who were beyond the Jordan, from the Valley of the Arnon to Mount Hermon '
  '9':
  - type: text
    content: '(the Sidonians call '
  - type: note
    content: ch. 4:48; Josh. 11:3, 17; 12:5
  - type: text
    content: 'Hermon '
  - type: note
    content: Ps. 29:6; [ch. 4:48]
  - type: text
    content: 'Sirion, while the Amorites call it '
  - type: note
    content: 1 Chr. 5:23; Song 4:8; Ezek. 27:5
  - type: text
    content: 'Senir), '
