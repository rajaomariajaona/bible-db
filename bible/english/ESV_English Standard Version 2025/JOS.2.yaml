  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now then, please swear to me by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that, as I have dealt kindly with you, you also will deal kindly with my father’s house, and '
    - type: usfm
