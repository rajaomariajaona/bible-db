  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you will save alive my father and mother, my brothers and sisters, and all who belong to them, and deliver our lives from death.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men said to her, “Our life for yours even to death! If you do not tell this business of ours, then when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives us the land '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 1:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      marker-yv: yv-n
    - type: text
      text: we will deal kindly and faithfully with you.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 19:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 9:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:33
      marker-yv: yv-n
    - type: text
      text: 'let them down by a rope through the window, for her house was built into the city wall, so that she lived in the wall. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she said
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: had said
      marker-yv: yv-n
    - type: text
      text: ' to them, “Go into the hills, or the pursuers will encounter you, and hide there three days until the pursuers have returned. Then afterward you may go your way.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men said to her, “We will be guiltless with respect to this oath of yours that you have made us swear. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'Behold, when we come into the land, you shall tie this scarlet cord in the window through which you let us down, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
