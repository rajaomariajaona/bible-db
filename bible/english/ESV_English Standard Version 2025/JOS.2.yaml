          text: 21:44
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 23:31
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given all the land into our hands. And also, all the inhabitants of the land '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: melt away because of us.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Jericho sent to Rahab, saying, “Bring out the men who have come to you, who entered your house, for they have come to search out all the land.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the woman had taken the two men and hidden them. And she said, “True, the men came to me, but I did not know where they were from. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the gate was about to be closed at dark, the men went out. I do not know where the men went. Pursue them quickly, for you will overtake them.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But she had brought them up to the roof and hid them with the stalks of flax that she had laid in order on the roof. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the men pursued after them on the way to the Jordan '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 3:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:24
      marker-yv: yv-n
    - type: text
      text: as far as the fords. And the gate was shut as soon as the pursuers had gone out.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Before the men
    - type: usfm
