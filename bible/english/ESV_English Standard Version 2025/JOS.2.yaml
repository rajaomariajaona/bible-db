      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:23
      marker-yv: yv-n
    - type: text
      text: 'and you shall gather into your house your father and mother, your brothers, and all your father’s household. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then if anyone goes out of the doors of your house into the street, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 27:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'his blood shall be on his own head, and we shall be guiltless. But if a hand is laid on anyone who is with you in the house, his blood shall be on our head. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told to the king of Jericho, “Behold, men of Israel have come here tonight to search out the land.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      marker-yv: yv-n
    - type: text
      text: 'tell this business of ours, then we shall be guiltless with respect to your oath that you have made us swear.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she said, “According to your words, so be it.” Then she sent them away, and they departed. And she tied the scarlet cord in the window.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed and went into the hills and remained there three days until the pursuers returned, and the pursuers searched all along the way and found nothing. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the two men returned. They came down from the hills and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
