document_id: JOS.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rahab Hides the Spies
  - type: text
    content: 'And Joshua the son of Nun '
  - type: note
    content: Num. 25:1
  - type: text
    content: sent
  - type: note
    content: Or had sent
  - type: text
    content: ' two men secretly from Shittim as spies, saying, “Go, view the land, especially Jericho.” And they went and came into the house of '
  - type: note
    content: Heb. 11:31; James 2:25
  - type: text
    content: 'a prostitute whose name was '
  - type: note
    content: Matt. 1:5
  - type: text
    content: 'Rahab and lodged there. '
  '10':
  - type: text
    content: 'For we have heard how the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 4:23; Ex. 14:21
  - type: text
    content: 'dried up the water of the Red Sea before you when you came out of Egypt, and '
  - type: note
    content: See Num. 21:23-26, 33-35
  - type: text
    content: 'what you did to the two kings of the Amorites who were beyond the Jordan, to '
  - type: note
    content: Ps. 135:11; 136:19, 20
  - type: text
    content: Sihon and Og, whom you devoted to destruction.
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 15:14, 15
  - type: text
    content: 'as soon as we heard it, '
  - type: note
    content: ver. 9; ch. 5:1; 7:5; [2 Sam. 17:10; Ps. 22:14; Isa. 13:7; Ezek. 21:7]
  - type: text
    content: 'our hearts melted, and there was no spirit left in any man because of you, for '
  - type: note
    content: Deut. 4:39
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, he is God in the heavens above and on the earth beneath. '
  '12':
  - type: text
    content: 'Now then, please swear to me by the '
  - type: text
    content: Lord
  - type: text
    content: ' that, as I have dealt kindly with you, you also will deal kindly with my father’s house, and '
  - type: note
    content: ver. 18
  - type: text
    content: 'give me a sure sign '
  '13':
  - type: text
    content: 'that you will save alive my father and mother, my brothers and sisters, and all who belong to them, and deliver our lives from death.” '
  '14':
  - type: text
    content: 'And the men said to her, “Our life for yours even to death! If you do not tell this business of ours, then when the '
  - type: text
    content: Lord
  - type: text
    content: ' gives us the land '
  - type: note
    content: Judg. 1:24, 25
  - type: text
    content: we will deal kindly and faithfully with you.”
  '15':
  - type: text
    content: 'Then she '
  - type: note
    content: 1 Sam. 19:12; Acts 9:25; 2 Cor. 11:33
  - type: text
    content: 'let them down by a rope through the window, for her house was built into the city wall, so that she lived in the wall. '
  '16':
  - type: text
    content: And she said
  - type: note
    content: Or had said
  - type: text
    content: ' to them, “Go into the hills, or the pursuers will encounter you, and hide there three days until the pursuers have returned. Then afterward you may go your way.” '
  '17':
  - type: text
    content: 'The men said to her, “We will be guiltless with respect to this oath of yours that you have made us swear. '
  '18':
  - type: note
    content: ver. 12
  - type: text
    content: 'Behold, when we come into the land, you shall tie this scarlet cord in the window through which you let us down, '
  - type: note
    content: ver. 12; ch. 6:23
  - type: text
    content: 'and you shall gather into your house your father and mother, your brothers, and all your father’s household. '
  '19':
  - type: text
    content: 'Then if anyone goes out of the doors of your house into the street, '
  - type: note
    content: '[Matt. 27:25]'
  - type: text
    content: 'his blood shall be on his own head, and we shall be guiltless. But if a hand is laid on anyone who is with you in the house, his blood shall be on our head. '
  '2':
  - type: text
    content: 'And it was told to the king of Jericho, “Behold, men of Israel have come here tonight to search out the land.” '
  '20':
  - type: text
    content: 'But if you '
  - type: note
    content: ver. 14
  - type: text
    content: 'tell this business of ours, then we shall be guiltless with respect to your oath that you have made us swear.” '
  '21':
  - type: text
    content: And she said, “According to your words, so be it.” Then she sent them away, and they departed. And she tied the scarlet cord in the window.
  '22':
  - type: text
    content: 'They departed and went into the hills and remained there three days until the pursuers returned, and the pursuers searched all along the way and found nothing. '
  '23':
  - type: text
    content: 'Then the two men returned. They came down from the hills and '
  - type: note
    content: ver. 7
  - type: text
    content: 'passed over and came to Joshua the son of Nun, and they told him all that had happened to them. '
  '24':
  - type: text
    content: 'And they said to Joshua, “Truly '
  - type: note
    content: ch. 21:44; Ex. 23:31
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has given all the land into our hands. And also, all the inhabitants of the land '
  - type: note
    content: ver. 9
  - type: text
    content: melt away because of us.”
  '3':
  - type: text
    content: 'Then the king of Jericho sent to Rahab, saying, “Bring out the men who have come to you, who entered your house, for they have come to search out all the land.” '
  '4':
  - type: text
    content: 'But the woman had taken the two men and hidden them. And she said, “True, the men came to me, but I did not know where they were from. '
  '5':
  - type: text
    content: 'And when the gate was about to be closed at dark, the men went out. I do not know where the men went. Pursue them quickly, for you will overtake them.” '
  '6':
  - type: text
    content: 'But she had brought them up to the roof and hid them with the stalks of flax that she had laid in order on the roof. '
  '7':
  - type: text
    content: 'So the men pursued after them on the way to the Jordan '
  - type: note
    content: Judg. 3:28; 7:24
  - type: text
    content: as far as the fords. And the gate was shut as soon as the pursuers had gone out.
  '8':
  - type: text
    content: Before the men
  - type: note
    content: Hebrew they
  - type: text
    content: ' lay down, she came up to them on the roof '
  '9':
  - type: text
    content: 'and said to the men, “I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you the land, '
  - type: note
    content: Ex. 15:16; 23:27
  - type: text
    content: 'and that the fear of you has fallen upon us, and that all the inhabitants of the land '
  - type: note
    content: ver. 11, 24; Ex. 15:15
  - type: text
    content: 'melt away before you. '
