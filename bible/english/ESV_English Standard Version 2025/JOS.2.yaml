        children:
        - type: text
          text: '7'
      marker-yv: yv-n
    - type: text
      text: 'passed over and came to Joshua the son of Nun, and they told him all that had happened to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to Joshua, “Truly '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
