      marker-yv: yv-n
    - type: text
      text: ' lay down, she came up to them on the roof '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to the men, “I know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you the land, '
    - type: usfm
