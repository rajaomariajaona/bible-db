document_id: MAT.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Seven Woes to the Scribes and Pharisees
  - type: text
    content: 'Then Jesus '
  - type: note
    content: For ver. 1, 2, 5-7, see Mark 12:38, 39; Luke 20:45, 46; [Luke 11:43]
  - type: text
    content: 'said to the crowds and to his disciples, '
  '10':
  - type: text
    content: 'Neither be called instructors, for you have one instructor, '
  - type: note
    content: See ch. 1:17
  - type: text
    content: the Christ.
  - type: text
    content: ' '
  '11':
  - type: note
    content: ch. 20:26
  - type: text
    content: The greatest among you shall be your servant.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Luke 14:11; 18:14; [ch. 18:4; Prov. 29:23; Ezek. 21:26; James 4:6, 10; 1 Pet. 5:5, 6]
  - type: text
    content: Whoever exalts himself will be humbled, and whoever humbles himself will be exalted.
  '13':
  - type: text
    content: ' '
  - type: text
    content: '“But woe '
  - type: note
    content: Luke 11:52
  - type: text
    content: 'to you, scribes and Pharisees, hypocrites! For you '
  - type: note
    content: '[ch. 16:19 ]'
  - type: text
    content: 'shut the kingdom of heaven in people’s faces. For you '
  - type: note
    content: '[ch. 5:20; 21:31; Luke 7:30 ]'
  - type: text
    content: neither enter yourselves nor allow those who would enter to go in.
  - type: text
    content: ' '
  - type: note
    content: 'Some manuscripts add here (or after verse 12) verse 14: Woe to you, scribes and Pharisees, hypocrites! For you devour widows’ houses and for a pretense you make long prayers; therefore you will receive the greater condemnation'
  '15':
  - type: text
    content: 'Woe to you, scribes and Pharisees, hypocrites! For you travel across sea and land to make a single '
  - type: note
    content: Acts 2:10; 6:5; 13:43
  - type: text
    content: 'proselyte, and when he becomes a proselyte, you make him twice as much a '
  - type: note
    content: '[John 17:12; 2 Thess. 2:3]'
  - type: text
    content: 'child of '
  - type: note
    content: See ch. 5:29
  - type: text
    content: hell
  - type: note
    content: Greek Gehenna; also verse 33
  - type: text
    content: ' '
  - type: text
    content: as yourselves.
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“Woe to '
  - type: note
    content: See ch. 15:14
  - type: text
    content: 'you, '
  - type: note
    content: ver. 17, 19, 26 ; John 9:39-41; Rom. 2:19; 2 Pet. 1:9; Rev. 3:17
  - type: text
    content: 'blind guides, who say, '
  - type: note
    content: '[ch. 5:33-35 ]'
  - type: text
    content: ‘If anyone swears by the temple, it is nothing, but if anyone swears by the gold of the temple, he is bound by his oath.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'You blind fools! For which is greater, the gold or '
  - type: note
    content: Ex. 30:29
  - type: text
    content: the temple that has made the gold sacred?
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And you say, ‘If anyone swears by the altar, it is nothing, but if anyone swears by '
  - type: note
    content: ch. 5:23
  - type: text
    content: the gift that is on the altar, he is bound by his oath.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'You blind men! For which is greater, the gift or '
  - type: note
    content: Ex. 29:37
  - type: text
    content: the altar that makes the gift sacred?
  - type: text
    content: ' '
  '2':
  - type: note
    content: '[Ezra 7:6, 10, 25; Neh. 8:4]'
  - type: text
    content: '“The scribes and the Pharisees '
  - type: note
    content: '[Deut. 17:10, 11; John 9:28, 29]'
  - type: text
    content: sit on Moses’ seat,
  - type: text
    content: ' '
  '20':
  - type: text
    content: So whoever swears by the altar swears by it and by everything on it.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And whoever swears by the temple swears by it and by '
  - type: note
    content: 1 Kgs. 8:13; 2 Chr. 6:2; Ps. 26:8; 132:14
  - type: text
    content: him who dwells in it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And whoever swears by '
  - type: note
    content: '[ch. 21:25]'
  - type: text
    content: 'heaven swears by '
  - type: note
    content: See ch. 5:34
  - type: text
    content: 'the throne of God and by '
  - type: note
    content: See Rev. 4:2
  - type: text
    content: him who sits upon it.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Luke 11:42
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! For '
  - type: note
    content: Deut. 14:22; [ Luke 18:12 ]
  - type: text
    content: 'you tithe mint and dill and '
  - type: note
    content: Isa. 28:25, 27
  - type: text
    content: 'cumin, and have neglected the weightier matters of the law: '
  - type: note
    content: Ps. 33:5; Jer. 5:1; Mic. 6:8; Zech. 7:9
  - type: text
    content: 'justice and mercy and faithfulness. '
  - type: note
    content: '[ 1 Sam. 15:22 ]'
  - type: text
    content: These you ought to have done, without neglecting the others.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'You blind guides, straining out a gnat and swallowing '
  - type: note
    content: ch. 19:24
  - type: text
    content: a camel!
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-28, [ch. 15:11-20 ]
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! For '
  - type: note
    content: Luke 11:39, 40
  - type: text
    content: 'you clean the outside of '
  - type: note
    content: Mark 7:4
  - type: text
    content: 'the cup and the plate, but inside they are full of '
  - type: note
    content: Luke 16:14; 20:47
  - type: text
    content: greed and self-indulgence.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'You blind Pharisee! First clean the inside of '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: the cup and the plate, that the outside also may be clean.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Luke 11:44
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! For you are like '
  - type: note
    content: '[ Acts 23:3 ]'
  - type: text
    content: 'whitewashed tombs, which outwardly appear beautiful, but within are full of dead people’s bones and '
  - type: note
    content: Eph. 5:3; [ Num. 19:16; 2 Kgs. 23:16 ]
  - type: text
    content: all uncleanness.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'So you also '
  - type: note
    content: ver. 5
  - type: text
    content: 'outwardly appear righteous to others, but within you are full of '
  - type: note
    content: Luke 12:1
  - type: text
    content: hypocrisy and lawlessness.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Luke 11:47, 48
  - type: text
    content: “Woe to you, scribes and Pharisees, hypocrites! For you build the tombs of the prophets and decorate the monuments of the righteous,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'so do and observe whatever they tell you, '
  - type: note
    content: '[ch. 5:20; 15:3-13]'
  - type: text
    content: 'but not the works they do. '
  - type: note
    content: Rom. 2:17-23
  - type: text
    content: For they preach, but do not practice.
  - type: text
    content: ' '
  '30':
  - type: text
    content: saying, ‘If we had lived in the days of our fathers, we would not have taken part with them in shedding the blood of the prophets.’
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Thus you witness against yourselves that you are '
  - type: note
    content: Acts 7:51, 52
  - type: text
    content: sons of those who murdered the prophets.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Gen. 15:16; Dan. 8:23; 1 Thess. 2:15, 16
  - type: text
    content: Fill up, then, the measure of your fathers.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'You serpents, '
  - type: note
    content: ch. 3:7; 12:34
  - type: text
    content: 'you brood of vipers, how are you to escape being sentenced to '
  - type: note
    content: ver. 15
  - type: text
    content: hell?
  - type: text
    content: ' '
  '34':
  - type: note
    content: For ver. 34-36, [Luke 11:49-51]
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 10:16
  - type: text
    content: 'I send you '
  - type: note
    content: See Acts 13:1; 1 Cor. 12:28
  - type: text
    content: 'prophets and wise men and '
  - type: note
    content: ch. 13:52
  - type: text
    content: 'scribes, '
  - type: note
    content: See ch. 21:35
  - type: text
    content: 'some of whom you will kill and crucify, and '
  - type: note
    content: See ch. 21:35
  - type: text
    content: 'some you will '
  - type: note
    content: ch. 10:17; Mark 13:9; Luke 21:12; Acts 22:19; 26:11; [Luke 12:11]
  - type: text
    content: 'flog in your synagogues and '
  - type: note
    content: ch. 10:23
  - type: text
    content: persecute from town to town,
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'so that on you may come all '
  - type: note
    content: Rev. 18:24
  - type: text
    content: 'the righteous blood shed on earth, from the blood of righteous '
  - type: note
    content: Gen. 4:4, 8; Heb. 11:4; 1 John 3:12
  - type: text
    content: 'Abel to the blood of '
  - type: note
    content: '[Zech. 1:1]'
  - type: text
    content: Zechariah the son of Barachiah,
  - type: note
    content: Some manuscripts omit the son of Barachiah
  - type: text
    content: ' '
  - type: text
    content: 'whom you murdered between '
  - type: note
    content: See Luke 1:9
  - type: text
    content: 'the sanctuary and '
  - type: note
    content: Ex. 40:6; 2 Kgs. 16:14; Ezek. 40:47
  - type: text
    content: the altar.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Truly, I say to you, '
  - type: note
    content: '[ch. 10:23; 16:28; 24:34]'
  - type: text
    content: all these things will come upon this generation.
  - type: heading
    content: Lament over Jerusalem
  '37':
  - type: text
    content: ' '
  - type: note
    content: For ver. 37-39, see Luke 13:34, 35; [ Luke 19:41-44 ]
  - type: text
    content: '“O Jerusalem, Jerusalem, the city that '
  - type: note
    content: See ch. 21:35
  - type: text
    content: 'kills the prophets and stones those who are sent to it! How often would I have '
  - type: note
    content: '[ Ps. 147:2; Prov. 1:24 ]'
  - type: text
    content: 'gathered '
  - type: note
    content: Luke 23:28
  - type: text
    content: 'your children together '
  - type: note
    content: '[ Deut. 32:11, 12 ]'
  - type: text
    content: 'as a hen gathers her brood '
  - type: note
    content: Ruth 2:12
  - type: text
    content: 'under her wings, and '
  - type: note
    content: John 5:40
  - type: text
    content: you were not willing!
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'See, '
  - type: note
    content: '[Isa. 64:11; Jer. 12:7; 22:5]'
  - type: text
    content: your house is left to you desolate.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'For I tell you, you will not see me again, until you say, '
  - type: note
    content: ch. 21:9; Cited from Ps. 118:26
  - type: text
    content: ‘Blessed is he who comes in the name of the Lord.’”
  '4':
  - type: note
    content: Luke 11:46; [ch. 11:28-30; Acts 15:10]
  - type: text
    content: They tie up heavy burdens, hard to bear,
  - type: note
    content: Some manuscripts omit hard to bear
  - type: text
    content: ' '
  - type: text
    content: and lay them on people’s shoulders, but they themselves are not willing to move them with their finger.
  - type: text
    content: ' '
  '5':
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'They do all their deeds '
  - type: note
    content: ch. 6:1, 16; [John 5:44]
  - type: text
    content: 'to be seen by others. For they make '
  - type: note
    content: Ex. 13:9; Deut. 6:8; 11:18
  - type: text
    content: 'their phylacteries broad and '
  - type: note
    content: See ch. 9:20
  - type: text
    content: their fringes long,
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'and they '
  - type: note
    content: Luke 14:7, 8
  - type: text
    content: 'love the place of honor at feasts and '
  - type: note
    content: Luke 11:43
  - type: text
    content: the best seats in the synagogues
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'greetings in '
  - type: note
    content: ch. 11:16; 20:3
  - type: text
    content: 'the marketplaces and being called '
  - type: note
    content: See John 1:38
  - type: text
    content: rabbi
  - type: note
    content: Rabbi means my teacher, or my master; also verse 8
  - type: text
    content: ' '
  - type: text
    content: by others.
  - type: text
    content: ' '
  '8':
  - type: note
    content: James 3:1
  - type: text
    content: 'But you are not to be called rabbi, for you have one teacher, and you are '
  - type: note
    content: Luke 22:32; John 21:23; See Philem. 16
  - type: text
    content: all brothers.
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' '
  '9':
  - type: note
    content: '[1 Cor. 1:12; 3:4]'
  - type: text
    content: 'And call no man your father on earth, for '
  - type: note
    content: ch. 6:9; Mal. 1:6; See ch. 7:11
  - type: text
    content: you have one Father, who is in heaven.
  - type: text
    content: ' '
