document_id: 2CH.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1, 2, see 2 Kgs. 18:1-3
  - type: text
    content: Hezekiah began to reign when he was twenty-five years old, and he reigned twenty-nine years in Jerusalem. His mother’s name was Abijah
  - type: note
    content: Spelled Abi in 2 Kings 18:2
  - type: text
    content: ' the daughter of '
  - type: note
    content: '[ch. 26:5]'
  - type: text
    content: 'Zechariah. '
  '10':
  - type: text
    content: 'Now '
  - type: note
    content: See 1 Chr. 22:7
  - type: text
    content: 'it is in my heart '
  - type: note
    content: See ch. 15:12
  - type: text
    content: 'to make a covenant with the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, in order that his fierce anger may turn away from us. '
  '11':
  - type: text
    content: 'My sons, do not now be negligent, '
  - type: note
    content: Num. 3:6; 8:14; 18:2, 6
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen you to stand in his presence, to minister to him and to be his ministers and make offerings to him.”'
  '12':
  - type: text
    content: 'Then the Levites arose, '
  - type: note
    content: ch. 31:13
  - type: text
    content: 'Mahath the son of Amasai, and Joel the son of Azariah, of the sons of '
  - type: note
    content: Num. 3:17
  - type: text
    content: 'the Kohathites; and of the sons of '
  - type: note
    content: Num. 3:17
  - type: text
    content: 'Merari, Kish the son of Abdi, and Azariah the son of Jehallelel; and of the '
  - type: note
    content: Num. 3:17
  - type: text
    content: 'Gershonites, Joah the son of Zimmah, and Eden the son of Joah; '
  '13':
  - type: text
    content: 'and of the sons of '
  - type: note
    content: 1 Chr. 15:8
  - type: text
    content: 'Elizaphan, Shimri and Jeuel; and of the sons of '
  - type: note
    content: 1 Chr. 6:39
  - type: text
    content: 'Asaph, Zechariah and Mattaniah; '
  '14':
  - type: text
    content: 'and of the sons of '
  - type: note
    content: 1 Chr. 6:33
  - type: text
    content: 'Heman, Jehuel and Shimei; and of the sons of '
  - type: note
    content: 1 Chr. 9:16
  - type: text
    content: 'Jeduthun, Shemaiah and Uzziel. '
  '15':
  - type: text
    content: 'They gathered their brothers and '
  - type: note
    content: See ver. 5
  - type: text
    content: 'consecrated themselves and went in as the king had commanded, '
  - type: note
    content: ch. 30:12
  - type: text
    content: 'by the words of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Neh. 13:9]'
  - type: text
    content: 'to cleanse the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'The priests went into the inner part of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' to cleanse it, and they brought out all the uncleanness that they found in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' into the court of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And the Levites took it and carried it out to '
  - type: note
    content: See 2 Sam. 15:23
  - type: text
    content: 'the brook Kidron. '
  '17':
  - type: text
    content: 'They began to consecrate '
  - type: note
    content: ver. 3
  - type: text
    content: 'on the first day of the first month, and on the eighth day of the month they came to the vestibule of the '
  - type: text
    content: Lord
  - type: text
    content: '. Then for eight days they consecrated the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and on the sixteenth day of the first month they finished. '
  '18':
  - type: text
    content: 'Then they went in to Hezekiah the king and said, “We have cleansed all the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the altar of burnt offering and all its utensils, and the table for the showbread and all its utensils. '
  '19':
  - type: text
    content: 'All the utensils '
  - type: note
    content: '[ch. 28:24]'
  - type: text
    content: 'that King Ahaz discarded in his reign when he was faithless, we have made ready and consecrated, and behold, they are before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Hezekiah Restores Temple Worship
  '2':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to all that David his father had done.'
  - type: heading
    content: Hezekiah Cleanses the Temple
  '20':
  - type: text
    content: 'Then Hezekiah the king rose early and gathered the officials of the city and went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And they brought seven bulls, seven rams, seven lambs, and seven male goats '
  - type: note
    content: '[Lev. 4:14]'
  - type: text
    content: 'for a sin offering for the kingdom and for the sanctuary and for Judah. And he commanded the priests, the sons of Aaron, to offer them on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'So they slaughtered the bulls, and the priests received the blood '
  - type: note
    content: Lev. 8:15, 19, 24; Heb. 9:21; [ch. 35:11]
  - type: text
    content: 'and threw it against the altar. And they slaughtered the rams, and their blood was thrown against the altar. And they slaughtered the lambs, and their blood was thrown against the altar. '
  '23':
  - type: text
    content: 'Then the goats for the sin offering were brought to the king and the assembly, '
  - type: note
    content: Lev. 4:15
  - type: text
    content: 'and they laid their hands on them, '
  '24':
  - type: text
    content: 'and the priests slaughtered them and made a sin offering with their blood on the altar, '
  - type: note
    content: Lev. 4:26
  - type: text
    content: to make atonement for all Israel. For the king commanded that the burnt offering and the sin offering should be made for all Israel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 16:4; 25:6; [ 1 Chr. 15:16 ]
  - type: text
    content: 'And he stationed the Levites in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' with cymbals, harps, and lyres, '
  - type: note
    content: ch. 8:14; 1 Chr. 23:5; 25:1
  - type: text
    content: 'according to the commandment of David and of Gad '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'the king’s seer and of '
  - type: note
    content: 2 Sam. 12:1
  - type: text
    content: 'Nathan the prophet, for the commandment was from the '
  - type: text
    content: Lord
  - type: text
    content: ' through his prophets. '
  '26':
  - type: text
    content: 'The Levites stood with '
  - type: note
    content: 1 Chr. 23:5; [Amos 6:5]
  - type: text
    content: 'the instruments of David, '
  - type: note
    content: See 1 Chr. 15:24
  - type: text
    content: 'and the priests with the trumpets. '
  '27':
  - type: text
    content: 'Then Hezekiah commanded that the burnt offering be offered on the altar. And when the burnt offering began, '
  - type: note
    content: '[ch. 23:18]'
  - type: text
    content: 'the song to the '
  - type: text
    content: Lord
  - type: text
    content: ' began also, and the trumpets, accompanied by the instruments of David king of Israel. '
  '28':
  - type: text
    content: 'The whole assembly worshiped, and the singers sang, and the trumpeters sounded. All this continued until the burnt offering was finished. '
  '29':
  - type: text
    content: 'When the offering was finished, '
  - type: note
    content: '[ch. 20:18]'
  - type: text
    content: 'the king and all who were present with him bowed themselves and worshiped. '
  '3':
  - type: text
    content: 'In the first year of his reign, in the first month, he '
  - type: note
    content: '[ver. 7; ch. 28:24]'
  - type: text
    content: 'opened the doors of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and repaired them. '
  '30':
  - type: text
    content: 'And Hezekiah the king and the officials commanded the Levites to sing praises to the '
  - type: text
    content: Lord
  - type: text
    content: ' with the words of David and of Asaph the seer. And they sang praises with gladness, and they bowed down and worshiped.'
  '31':
  - type: text
    content: 'Then Hezekiah said, '
  - type: note
    content: ch. 13:9; [Ex. 28:41]
  - type: text
    content: “You have now consecrated yourselves to
  - type: note
    content: Hebrew filled your hand for
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: '. Come near; bring sacrifices and thank offerings to the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” And the assembly brought sacrifices and thank offerings, and all who were '
  - type: note
    content: Ex. 35:5, 22
  - type: text
    content: 'of a willing heart brought burnt offerings. '
  '32':
  - type: text
    content: 'The number of the burnt offerings that the assembly brought was 70 bulls, 100 rams, and 200 lambs; all these were for a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'And the consecrated offerings were 600 bulls and 3,000 sheep. '
  '34':
  - type: text
    content: 'But the priests were too few and could not flay all the burnt offerings, so until other priests had consecrated themselves, '
  - type: note
    content: '[ch. 35:11]'
  - type: text
    content: their brothers the Levites helped them, until the work was finished—
  - type: note
    content: '[ch. 30:3]'
  - type: text
    content: 'for the Levites were more upright in heart than the priests in consecrating themselves. '
  '35':
  - type: text
    content: 'Besides the great number of burnt offerings, there was '
  - type: note
    content: Lev. 3:1, 16
  - type: text
    content: 'the fat of the peace offerings, and there were '
  - type: note
    content: Num. 15:5, 7, 10
  - type: text
    content: 'the drink offerings for the burnt offerings. Thus the service of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was restored. '
  '36':
  - type: text
    content: And Hezekiah and all the people rejoiced because God had provided for the people, for the thing came about suddenly.
  '4':
  - type: text
    content: 'He brought in the priests and the Levites and assembled them in the square on the east '
  '5':
  - type: text
    content: 'and said to them, “Hear me, Levites! Now '
  - type: note
    content: ver. 15, 34; ch. 35:6; 1 Chr. 15:12; Ezra 6:20
  - type: text
    content: 'consecrate yourselves, and consecrate the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, and carry out the filth'
  - type: note
    content: Hebrew impurity
  - type: text
    content: ' from the Holy Place. '
  '6':
  - type: text
    content: 'For our fathers have been unfaithful and have done what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. They have forsaken him and '
  - type: note
    content: Jer. 2:27; Ezek. 8:16
  - type: text
    content: 'have turned away their faces from the habitation of the '
  - type: text
    content: Lord
  - type: text
    content: ' and turned their backs. '
  '7':
  - type: text
    content: 'They also '
  - type: note
    content: ch. 28:24
  - type: text
    content: 'shut the doors of the vestibule and put out the lamps and have not burned incense or offered burnt offerings in the Holy Place to the God of Israel. '
  '8':
  - type: text
    content: 'Therefore '
  - type: note
    content: See ch. 24:18
  - type: text
    content: 'the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' came on Judah and Jerusalem, and he has made them '
  - type: note
    content: Deut. 28:25
  - type: text
    content: 'an object of horror, of astonishment, '
  - type: note
    content: Jer. 19:8; 25:9, 18; 29:18; Mic. 6:16
  - type: text
    content: 'and of hissing, as you see with your own eyes. '
  '9':
  - type: text
    content: 'For behold, '
  - type: note
    content: ch. 28:5, 6, 8, 17
  - type: text
    content: 'our fathers have fallen by the sword, and our sons and our daughters and our wives are in captivity for this. '
