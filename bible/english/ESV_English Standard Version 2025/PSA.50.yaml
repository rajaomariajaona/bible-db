document_id: PSA.50,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Himself Is Judge
  - type: text
    content: 'A Psalm of '
  - type: note
    content: 1 Chr. 6:39; 15:17; 16:5, 7; 25:2; 2 Chr. 29:30
  - type: text
    content: Asaph.
  - type: text
    content: ' '
  - type: note
    content: Josh. 22:22
  - type: text
    content: 'The Mighty One, God the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: speaks and summons the earth
  - type: note
    content: Ps. 113:3
  - type: text
    content: from the rising of the sun to its setting.
  '10':
  - type: text
    content: For every beast of the forest is mine,
  - type: text
    content: the cattle on a thousand hills.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 10:29 ]'
  - type: text
    content: I know all the birds of the hills,
  - type: text
    content: and all that moves in the field is mine.
  '12':
  - type: text
    content: “If I were hungry, I would not tell you,
  - type: note
    content: See Ps. 24:1
  - type: text
    content: for the world and its fullness are mine.
  '13':
  - type: text
    content: Do I eat the flesh of bulls
  - type: text
    content: or drink the blood of goats?
  '14':
  - type: text
    content: ' '
  - type: note
    content: ver. 23 ; Ps. 27:6; 69:30; 107:22; Heb. 13:15; [Hos. 14:2; Rom. 12:1]
  - type: text
    content: Offer to God a sacrifice of thanksgiving,
  - type: note
    content: Or Make thanksgiving your sacrifice to God
  - type: text
    content: 'and '
  - type: note
    content: Ps. 22:25; 61:8; 65:1; 76:11; 116:14, 18; Num. 30:2; Deut. 23:21; Job 22:27; Eccles. 5:4, 5
  - type: text
    content: perform your vows to the Most High,
  '15':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 81:7; Zech. 13:9; [Ps. 107:6]
  - type: text
    content: call upon me in the day of trouble;
  - type: text
    content: 'I will '
  - type: note
    content: Ps. 91:15
  - type: text
    content: 'deliver you, and you shall '
  - type: note
    content: ver. 23; Ps. 22:23
  - type: text
    content: glorify me.”
  '16':
  - type: text
    content: 'But to the wicked God says:'
  - type: text
    content: “What right have you to recite my statutes
  - type: text
    content: or take my covenant on your lips?
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Rom. 2:21, 22 ]'
  - type: text
    content: For you hate discipline,
  - type: note
    content: 1 Kgs. 14:9; Neh. 9:26
  - type: text
    content: and you cast my words behind you.
  '18':
  - type: text
    content: 'If you see a thief, '
  - type: note
    content: Rom. 1:32
  - type: text
    content: you are pleased with him,
  - type: note
    content: '[ 1 Tim. 5:22 ]'
  - type: text
    content: and you keep company with adulterers.
  '19':
  - type: text
    content: “You give your mouth free rein for evil,
  - type: note
    content: '[ Ps. 52:2 ]'
  - type: text
    content: and your tongue frames deceit.
  '2':
  - type: text
    content: 'Out of Zion, '
  - type: note
    content: '[Lam. 2:15]; See Ps. 48:2'
  - type: text
    content: the perfection of beauty,
  - type: note
    content: Ps. 80:1; 94:1; Deut. 33:2
  - type: text
    content: God shines forth.
  '20':
  - type: text
    content: You sit and speak against your brother;
  - type: text
    content: you slander your own mother’s son.
  '21':
  - type: text
    content: 'These things you have done, and I '
  - type: note
    content: Eccles. 8:11; Isa. 57:11
  - type: text
    content: have been silent;
  - type: text
    content: you thought that I
  - type: note
    content: Or that the I am
  - type: text
    content: was one like yourself.
  - type: text
    content: 'But now I '
  - type: note
    content: Ps. 90:8; 2 Kgs. 19:4
  - type: text
    content: 'rebuke you and '
  - type: note
    content: Job 13:18; 23:4
  - type: text
    content: lay the charge before you.
  '22':
  - type: text
    content: '“Mark this, then, you who '
  - type: note
    content: See Ps. 9:17
  - type: text
    content: forget God,
  - type: text
    content: 'lest I tear you apart, and there be '
  - type: note
    content: Ps. 7:2
  - type: text
    content: none to deliver!
  '23':
  - type: text
    content: 'The one who '
  - type: note
    content: ver. 14, 15
  - type: text
    content: offers thanksgiving as his sacrifice glorifies me;
  - type: text
    content: 'to one who '
  - type: note
    content: '[Gal. 6:16]'
  - type: text
    content: orders his way rightly
  - type: text
    content: 'I will show the '
  - type: note
    content: Ps. 91:16
  - type: text
    content: salvation of God!”
  '3':
  - type: text
    content: 'Our God comes; he '
  - type: note
    content: '[Ex. 19:16]'
  - type: text
    content: does not keep silence;
  - type: note
    content: Or May our God come, and not keep silence
  - type: text
    content: 'before him is a devouring '
  - type: note
    content: Ps. 21:9; 97:3; Lev. 10:2; Num. 16:35; Dan. 7:10
  - type: text
    content: fire,
  - type: text
    content: around him a mighty tempest.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Deut. 4:26; 31:28; 32:1; Isa. 1:2; Mic. 6:1, 2
  - type: text
    content: He calls to the heavens above
  - type: text
    content: 'and to the earth, that he may judge his people:'
  '5':
  - type: text
    content: “Gather to me my faithful ones,
  - type: text
    content: 'who made '
  - type: note
    content: Ex. 24:7, 8; See Gen. 15:9-18
  - type: text
    content: a covenant with me by sacrifice!”
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 89:5; 97:6; [ Rev. 16:5, 7; 19:2 ]
  - type: text
    content: The heavens declare his righteousness,
  - type: text
    content: 'for '
  - type: note
    content: Ps. 58:11; 75:7
  - type: text
    content: 'God himself is judge! '
  - type: text
    content: Selah
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 81:8; [ Ps. 49:1 ]
  - type: text
    content: “Hear, O my people, and I will speak;
  - type: text
    content: O Israel, I will testify against you.
  - type: note
    content: Ex. 20:2
  - type: text
    content: I am God, your God.
  '8':
  - type: text
    content: 'Not for your sacrifices '
  - type: note
    content: See Ps. 40:6
  - type: text
    content: do I rebuke you;
  - type: text
    content: your burnt offerings are continually before me.
  '9':
  - type: text
    content: I will not accept a bull from your house
  - type: text
    content: or goats from your folds.
