    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they said to him, “We have come down to bind you, that we may give you into the hands of the Philistines.” And Samson said to them, “Swear to me that you will not attack me yourselves.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
