document_id: JDG.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson Defeats the Philistines
  - type: text
    content: 'After some days, at the time of wheat harvest, Samson went to visit his wife with '
  - type: note
    content: '[Gen. 38:17]'
  - type: text
    content: 'a young goat. And he said, “I will go in to my wife in the chamber.” But her father would not allow him to go in. '
  '10':
  - type: text
    content: 'And the men of Judah said, “Why have you come up against us?” They said, “We have come up to bind Samson, to do to him as he did to us.” '
  '11':
  - type: text
    content: 'Then 3,000 men of Judah went down to the cleft of the rock of Etam, and said to Samson, “Do you not know that '
  - type: note
    content: ch. 13:1; 14:4
  - type: text
    content: 'the Philistines are rulers over us? What then is this that you have done to us?” And he said to them, “As they did to me, so have I done to them.” '
  '12':
  - type: text
    content: 'And they said to him, “We have come down to bind you, that we may give you into the hands of the Philistines.” And Samson said to them, “Swear to me that you will not attack me yourselves.” '
  '13':
  - type: text
    content: 'They said to him, “No; we will only bind you and give you into their hands. We will surely not kill you.” So they bound him with two '
  - type: note
    content: ch. 16:11, 12
  - type: text
    content: new ropes and brought him up from the rock.
  '14':
  - type: text
    content: 'When he came to Lehi, the Philistines came shouting to meet him. '
  - type: note
    content: ch. 14:6, 19; 1 Sam. 11:6; [ch. 3:10]
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' rushed upon him, and the ropes that were on his arms became as flax that has caught fire, and his bonds melted off his hands. '
  '15':
  - type: text
    content: 'And he found a fresh jawbone of a donkey, and put out his hand and took it, '
  - type: note
    content: Josh. 23:10; [ch. 3:31; Lev. 26:8]
  - type: text
    content: 'and with it he struck 1,000 men. '
  '16':
  - type: text
    content: And Samson said,
  - type: text
    content: “With the jawbone of a donkey,
  - type: text
    content: heaps upon heaps,
  - type: text
    content: with the jawbone of a donkey
  - type: text
    content: have I struck down a thousand men.”
  '17':
  - type: text
    content: 'As soon as he had finished speaking, he threw away the jawbone out of his hand. And that place '
  - type: note
    content: ver. 9, 14
  - type: text
    content: was called Ramath-lehi.
  - type: note
    content: Ramath-lehi means the hill of the jawbone
  '18':
  - type: text
    content: 'And he was very thirsty, and he called upon the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, '
  - type: note
    content: '[Ps. 3:7]'
  - type: text
    content: '“You have granted this great salvation by the hand of your servant, and shall I now die of thirst and fall into the hands of the uncircumcised?” '
  '19':
  - type: text
    content: 'And God split open the hollow place that is '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'at Lehi, and water came out from it. And when he drank, '
  - type: note
    content: Gen. 45:27
  - type: text
    content: his spirit returned, and he revived. Therefore the name of it was called En-hakkore;
  - type: note
    content: En-hakkore means the spring of him who called
  - type: text
    content: ' it is at Lehi to this day. '
  '2':
  - type: text
    content: 'And her father said, “I really thought that you utterly hated her, '
  - type: note
    content: ver. 6; ch. 14:20
  - type: text
    content: 'so I gave her to your companion. Is not her younger sister more beautiful than she? Please take her instead.” '
  '20':
  - type: text
    content: 'And he judged Israel '
  - type: note
    content: ch. 13:1
  - type: text
    content: in the days of the Philistines twenty years.
  '3':
  - type: text
    content: 'And Samson said to them, “This time I shall be innocent in regard to the Philistines, when I do them harm.” '
  '4':
  - type: text
    content: 'So Samson went and caught 300 foxes and took torches. And he turned them tail to tail and put a torch between each pair of tails. '
  '5':
  - type: text
    content: 'And when he had set fire to the torches, he let the foxes go into the standing grain of the Philistines and set fire to the stacked grain and the standing grain, as well as the olive orchards. '
  '6':
  - type: text
    content: 'Then the Philistines said, “Who has done this?” And they said, “Samson, the son-in-law of the Timnite, because he has taken his wife '
  - type: note
    content: ver. 2
  - type: text
    content: 'and given her to his companion.” And the Philistines came up and '
  - type: note
    content: ch. 14:15
  - type: text
    content: 'burned her and her father with fire. '
  '7':
  - type: text
    content: 'And Samson said to them, “If this is what you do, I swear I will be avenged on you, and after that I will quit.” '
  '8':
  - type: text
    content: 'And he struck them hip and thigh with a great blow, and he went down and stayed in the '
  - type: note
    content: ver. 11; Isa. 2:21; 57:5
  - type: text
    content: cleft of the rock of Etam.
  '9':
  - type: text
    content: 'Then the Philistines came up and encamped in Judah and '
  - type: note
    content: 2 Sam. 5:18, 22
  - type: text
    content: 'made a raid on '
  - type: note
    content: ver. 14, 17, 19
  - type: text
    content: 'Lehi. '
