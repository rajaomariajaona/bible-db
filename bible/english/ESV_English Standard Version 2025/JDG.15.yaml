document_id: JDG.15,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson Defeats the Philistines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After some days, at the time of wheat harvest, Samson went to visit his wife with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 38:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'a young goat. And he said, “I will go in to my wife in the chamber.” But her father would not allow him to go in. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Judah said, “Why have you come up against us?” They said, “We have come up to bind Samson, to do to him as he did to us.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then 3,000 men of Judah went down to the cleft of the rock of Etam, and said to Samson, “Do you not know that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:4
      marker-yv: yv-n
    - type: text
      text: 'the Philistines are rulers over us? What then is this that you have done to us?” And he said to them, “As they did to me, so have I done to them.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to him, “We have come down to bind you, that we may give you into the hands of the Philistines.” And Samson said to them, “Swear to me that you will not attack me yourselves.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to him, “No; we will only bind you and give you into their hands. We will surely not kill you.” So they bound him with two '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: new ropes and brought him up from the rock.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he came to Lehi, the Philistines came shouting to meet him. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 11:6
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Then the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rushed upon him, and the ropes that were on his arms became as flax that has caught fire, and his bonds melted off his hands. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he found a fresh jawbone of a donkey, and put out his hand and took it, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 23:10
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: text
        text: '3:31; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 26:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and with it he struck 1,000 men. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Samson said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “With the jawbone of a donkey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heaps upon heaps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the jawbone of a donkey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have I struck down a thousand men.”
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As soon as he had finished speaking, he threw away the jawbone out of his hand. And that place '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9, 14
      marker-yv: yv-n
    - type: text
      text: was called Ramath-lehi.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramath-lehi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the hill of the jawbone
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he was very thirsty, and he called upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 3:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“You have granted this great salvation by the hand of your servant, and shall I now die of thirst and fall into the hands of the uncircumcised?” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God split open the hollow place that is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'at Lehi, and water came out from it. And when he drank, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 45:27
      marker-yv: yv-n
    - type: text
      text: his spirit returned, and he revived. Therefore the name of it was called En-hakkore;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'En-hakkore '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the spring of him who called
      marker-yv: yv-n
    - type: text
      text: ' it is at Lehi to this day. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her father said, “I really thought that you utterly hated her, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:20
      marker-yv: yv-n
    - type: text
      text: 'so I gave her to your companion. Is not her younger sister more beautiful than she? Please take her instead.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he judged Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:1
      marker-yv: yv-n
    - type: text
      text: in the days of the Philistines twenty years.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said to them, “This time I shall be innocent in regard to the Philistines, when I do them harm.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samson went and caught 300 foxes and took torches. And he turned them tail to tail and put a torch between each pair of tails. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had set fire to the torches, he let the foxes go into the standing grain of the Philistines and set fire to the stacked grain and the standing grain, as well as the olive orchards. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines said, “Who has done this?” And they said, “Samson, the son-in-law of the Timnite, because he has taken his wife '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'and given her to his companion.” And the Philistines came up and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:15
      marker-yv: yv-n
    - type: text
      text: 'burned her and her father with fire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said to them, “If this is what you do, I swear I will be avenged on you, and after that I will quit.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he struck them hip and thigh with a great blow, and he went down and stayed in the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 2:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 57:5
      marker-yv: yv-n
    - type: text
      text: cleft of the rock of Etam.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines came up and encamped in Judah and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 5:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: 'made a raid on '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14, 17, 19
      marker-yv: yv-n
    - type: text
      text: 'Lehi. '
