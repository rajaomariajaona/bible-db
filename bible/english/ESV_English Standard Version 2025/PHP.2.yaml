document_id: PHP.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ’s Example of Humility
  - type: text
    content: 'So if there is any encouragement in Christ, any comfort from '
  - type: note
    content: '[Rom. 15:30; 2 Thess. 2:16]'
  - type: text
    content: 'love, any '
  - type: note
    content: 2 Cor. 13:14
  - type: text
    content: 'participation in the Spirit, any '
  - type: note
    content: Col. 3:12
  - type: text
    content: 'affection and sympathy, '
  '10':
  - type: text
    content: 'so that at the name of Jesus '
  - type: note
    content: Isa. 45:23; Rom. 14:11
  - type: text
    content: 'every knee should bow, '
  - type: note
    content: '[Rev. 5:3, 13]; See Eph. 1:10'
  - type: text
    content: 'in heaven and on earth and under the earth, '
  '11':
  - type: text
    content: 'and '
  - type: note
    content: '[Rom. 10:9; 1 Cor. 12:3]'
  - type: text
    content: 'every tongue confess that Jesus Christ is '
  - type: note
    content: '[Rom. 14:9]; See John 13:13'
  - type: text
    content: Lord, to the glory of God the Father.
  - type: heading
    content: Lights in the World
  '12':
  - type: text
    content: 'Therefore, my beloved, '
  - type: note
    content: '[ch. 1:5; 4:15]'
  - type: text
    content: 'as you have always '
  - type: note
    content: Heb. 5:9; [2 Cor. 10:5; 1 Pet. 1:2]
  - type: text
    content: 'obeyed, so now, not only as in my presence but much more in my absence, work out your own salvation with fear and trembling, '
  '13':
  - type: text
    content: 'for '
  - type: note
    content: 1 Cor. 12:6; [Heb. 13:21]; See 1 Cor. 15:10
  - type: text
    content: 'it is God who works in you, both to will and to work for '
  - type: note
    content: '[1 Tim. 2:4]'
  - type: text
    content: his good pleasure.
  '14':
  - type: text
    content: 'Do all things '
  - type: note
    content: 1 Pet. 4:9
  - type: text
    content: 'without grumbling or '
  - type: note
    content: 1 Tim. 2:8
  - type: text
    content: 'disputing, '
  '15':
  - type: text
    content: 'that you may be blameless and innocent, '
  - type: note
    content: '[Matt. 5:45; Eph. 5:1]'
  - type: text
    content: 'children of God '
  - type: note
    content: Jude 24
  - type: text
    content: 'without blemish '
  - type: note
    content: 1 Pet. 2:12
  - type: text
    content: 'in the midst of '
  - type: note
    content: See Deut. 32:5
  - type: text
    content: 'a crooked and twisted generation, among whom you shine '
  - type: note
    content: Matt. 5:14, 16; [Titus 2:10]
  - type: text
    content: 'as lights in the world, '
  '16':
  - type: text
    content: 'holding fast to '
  - type: note
    content: '[Acts 5:20]'
  - type: text
    content: 'the word of life, so that in '
  - type: note
    content: See 1 Cor. 1:8
  - type: text
    content: 'the day of Christ '
  - type: note
    content: See 2 Cor. 1:14
  - type: text
    content: 'I may be proud that '
  - type: note
    content: Gal. 2:2; 1 Thess. 3:5; [Gal. 4:11]
  - type: text
    content: 'I did not run in vain or labor in vain. '
  '17':
  - type: text
    content: 'Even if I am to be '
  - type: note
    content: '[1 John 3:16]; See 2 Cor. 12:15'
  - type: text
    content: 'poured out as a drink offering upon '
  - type: note
    content: '[Rom. 15:16]'
  - type: text
    content: 'the sacrificial offering of your faith, I am glad and rejoice with you all. '
  '18':
  - type: text
    content: Likewise you also should be glad and rejoice with me.
  - type: heading
    content: Timothy and Epaphroditus
  '19':
  - type: text
    content: 'I hope in the Lord Jesus '
  - type: note
    content: '[1 Cor. 4:17; 1 Thess. 3:2]'
  - type: text
    content: 'to send Timothy to you soon, so that I too may be cheered by news of you. '
  '2':
  - type: note
    content: John 3:29; 15:11
  - type: text
    content: 'complete my joy by being '
  - type: note
    content: See Rom. 12:16
  - type: text
    content: 'of the same mind, having the same love, being in full accord and of one mind. '
  '20':
  - type: text
    content: 'For I have no one '
  - type: note
    content: '[1 Cor. 16:10]'
  - type: text
    content: 'like him, who will be genuinely concerned for your welfare. '
  '21':
  - type: text
    content: 'For they all '
  - type: note
    content: '[2 Tim. 3:2]; See 1 Cor. 10:24'
  - type: text
    content: 'seek their own interests, not those of Jesus Christ. '
  '22':
  - type: text
    content: But you know Timothy’s
  - type: note
    content: Greek his
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 2:9
  - type: text
    content: 'proven worth, how '
  - type: note
    content: 1 Cor. 4:17; 1 Tim. 1:2; 2 Tim. 1:2
  - type: text
    content: as a son
  - type: note
    content: Greek child
  - type: text
    content: ' with a father '
  - type: note
    content: '[2 Tim. 3:10]'
  - type: text
    content: 'he has served with me in the gospel. '
  '23':
  - type: text
    content: 'I hope therefore to send him just as soon as I see how it will go with me, '
  '24':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 1:25; Philem. 22]'
  - type: text
    content: I trust in the Lord that shortly I myself will come also.
  '25':
  - type: text
    content: 'I have thought it necessary to send to you '
  - type: note
    content: ch. 4:18
  - type: text
    content: 'Epaphroditus my brother and fellow worker and '
  - type: note
    content: Philem. 2
  - type: text
    content: 'fellow soldier, and your messenger and '
  - type: note
    content: '[ch. 4:18]'
  - type: text
    content: 'minister to my need, '
  '26':
  - type: text
    content: 'for he has been longing for you all and has been distressed because you heard that he was ill. '
  '27':
  - type: text
    content: 'Indeed he was ill, near to death. But God had mercy on him, and not only on him but on me also, lest I should have sorrow upon sorrow. '
  '28':
  - type: text
    content: 'I am the more eager to send him, therefore, that you may rejoice at seeing him again, and that I may be less anxious. '
  '29':
  - type: text
    content: 'So '
  - type: note
    content: Rom. 16:2
  - type: text
    content: 'receive him in the Lord with all joy, and '
  - type: note
    content: 1 Cor. 16:18; 1 Thess. 5:12, 13; 1 Tim. 5:17
  - type: text
    content: 'honor such men, '
  '3':
  - type: text
    content: 'Do nothing from '
  - type: note
    content: ch. 1:17
  - type: text
    content: 'selfish ambition or '
  - type: note
    content: Gal. 5:26
  - type: text
    content: 'conceit, but in '
  - type: note
    content: '[Eph. 5:21]; See Rom. 12:10; Eph. 4:2'
  - type: text
    content: 'humility count others more significant than yourselves. '
  '30':
  - type: text
    content: for he nearly died
  - type: note
    content: Or he drew near to the point of death; compare verse 8
  - type: text
    content: ' '
  - type: note
    content: '[Acts 20:24]'
  - type: text
    content: 'for the work of Christ, risking his life '
  - type: note
    content: '[ch. 4:10]; See 1 Cor. 16:17'
  - type: text
    content: to complete what was lacking in your service to me.
  '4':
  - type: text
    content: 'Let each of you '
  - type: note
    content: See Rom. 15:2
  - type: text
    content: 'look not only to his own interests, but also to the interests of others. '
  '5':
  - type: note
    content: Rom. 15:3; See Matt. 11:29
  - type: text
    content: Have this mind among yourselves, which is yours in Christ Jesus,
  - type: note
    content: Or which was also in Christ Jesus
  - type: text
    content: ' '
  '6':
  - type: note
    content: See John 1:1
  - type: text
    content: 'who, though he was in '
  - type: note
    content: See 2 Cor. 4:4
  - type: text
    content: 'the form of God, did not count equality with God '
  - type: note
    content: John 5:18; 10:33; [John 14:28]
  - type: text
    content: a thing to be grasped,
  - type: note
    content: Or a thing to be held on to for advantage
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'but '
  - type: note
    content: 2 Cor. 8:9; 13:4; See Mark 9:12
  - type: text
    content: 'emptied himself, by taking the form of a '
  - type: note
    content: See Isa. 42:1; Matt. 20:28
  - type: text
    content: servant,
  - type: note
    content: Or slave (for the contextual rendering of the Greek word doulos, see Preface)
  - type: text
    content: ' '
  - type: note
    content: Rom. 8:3; Gal. 4:4; See John 1:14
  - type: text
    content: 'being born in the likeness of men. '
  '8':
  - type: text
    content: 'And being found in human form, he humbled himself by '
  - type: note
    content: Heb. 5:8; [Matt. 26:39; John 10:18; Rom. 5:19]
  - type: text
    content: 'becoming obedient to the point of death, '
  - type: note
    content: Heb. 12:2
  - type: text
    content: 'even death on a cross. '
  '9':
  - type: note
    content: John 10:17; [Isa. 52:13; 53:12; Heb. 2:9]
  - type: text
    content: 'Therefore '
  - type: note
    content: See Matt. 28:18
  - type: text
    content: 'God has '
  - type: note
    content: Acts 2:33
  - type: text
    content: 'highly exalted him and bestowed on him '
  - type: note
    content: Eph. 1:21; Heb. 1:4; [Acts 5:41]
  - type: text
    content: 'the name that is above every name, '
