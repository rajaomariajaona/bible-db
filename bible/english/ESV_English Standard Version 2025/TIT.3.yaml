document_id: TIT.3,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be Ready for Every Good Work
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remind them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 13:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 2:13
      marker-yv: yv-n
    - type: text
      text: 'to be submissive to rulers and authorities, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:21
      marker-yv: yv-n
    - type: text
      text: 'to be obedient, to be ready for every good work, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for a person who stirs up division, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 18:15
      marker-yv: yv-n
    - type: text
      text: 'after warning him once and then twice, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 John 10
      marker-yv: yv-n
    - type: text
      text: 'have nothing more to do with him, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: knowing that such a person is warped and sinful; he is self-condemned.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Final Instructions and Greetings
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I send Artemas or '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:12
      marker-yv: yv-n
    - type: text
      text: 'Tychicus to you, do your best to come to me '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'at Nicopolis, for I have decided to spend the winter there. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do your best to speed Zenas the lawyer and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:24
      marker-yv: yv-n
    - type: text
      text: 'Apollos on their way; see that they lack nothing. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And let our people learn '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'to devote themselves to good works, so as to help cases of urgent need, and not '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pet. 1:8
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 1:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 1:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: be unfruitful.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All who are with me send greetings to you. Greet those who love us in the faith.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:18
      marker-yv: yv-n
    - type: text
      text: Grace be with you all.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:31
      marker-yv: yv-n
    - type: text
      text: 'to speak evil of no one, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 3:3
      marker-yv: yv-n
    - type: text
      text: 'to avoid quarreling, to be gentle, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:25
      marker-yv: yv-n
    - type: text
      text: 'to show perfect courtesy toward all people. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 6:11
      marker-yv: yv-n
    - type: text
      text: 'we ourselves were once foolish, disobedient, led astray, slaves to various passions and pleasures, passing our days in malice and envy, hated by others and hating one another. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 2:4
      marker-yv: yv-n
    - type: text
      text: 'the goodness and loving kindness of God our Savior appeared, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he saved us, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 3:27
      marker-yv: yv-n
    - type: text
      text: 'not because of works done by us in righteousness, but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 1:3
      marker-yv: yv-n
    - type: text
      text: 'according to his own mercy, by '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 6:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 3:21
      marker-yv: yv-n
    - type: text
      text: 'the washing of regeneration and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 12:2
      marker-yv: yv-n
    - type: text
      text: 'renewal of the Holy Spirit, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whom he '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:45
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 5:5
      marker-yv: yv-n
    - type: text
      text: 'poured out on us richly through Jesus Christ our Savior, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:11
      marker-yv: yv-n
    - type: text
      text: 'being justified by his grace we might become '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:17
      marker-yv: yv-n
    - type: text
      text: 'heirs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:2
      marker-yv: yv-n
    - type: text
      text: 'according to the hope of eternal life. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The saying is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 1:15
      marker-yv: yv-n
    - type: text
      text: 'trustworthy, and I want you to insist on these things, so that those who have believed in God may be careful '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:14
      marker-yv: yv-n
    - type: text
      text: 'to devote themselves to good works. These things are excellent and profitable for people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:16
      marker-yv: yv-n
    - type: text
      text: 'avoid foolish '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 6:4
      marker-yv: yv-n
    - type: text
      text: 'controversies, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 1:4
      marker-yv: yv-n
    - type: text
      text: 'genealogies, dissensions, and quarrels about the law, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:14
      marker-yv: yv-n
    - type: text
      text: 'they are unprofitable and worthless. '
