document_id: TIT.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Be Ready for Every Good Work
  - type: text
    content: 'Remind them '
  - type: note
    content: Rom. 13:1; 1 Pet. 2:13
  - type: text
    content: 'to be submissive to rulers and authorities, '
  - type: note
    content: See 2 Tim. 2:21
  - type: text
    content: 'to be obedient, to be ready for every good work, '
  '10':
  - type: text
    content: 'As for a person who stirs up division, '
  - type: note
    content: See Matt. 18:15
  - type: text
    content: 'after warning him once and then twice, '
  - type: note
    content: See 2 John 10
  - type: text
    content: 'have nothing more to do with him, '
  '11':
  - type: text
    content: knowing that such a person is warped and sinful; he is self-condemned.
  - type: heading
    content: Final Instructions and Greetings
  '12':
  - type: text
    content: 'When I send Artemas or '
  - type: note
    content: See 2 Tim. 4:12
  - type: text
    content: 'Tychicus to you, do your best to come to me '
  - type: note
    content: '[2 Tim. 4:10]'
  - type: text
    content: 'at Nicopolis, for I have decided to spend the winter there. '
  '13':
  - type: text
    content: 'Do your best to speed Zenas the lawyer and '
  - type: note
    content: See Acts 18:24
  - type: text
    content: 'Apollos on their way; see that they lack nothing. '
  '14':
  - type: text
    content: 'And let our people learn '
  - type: note
    content: ver. 8
  - type: text
    content: 'to devote themselves to good works, so as to help cases of urgent need, and not '
  - type: note
    content: 2 Pet. 1:8; [Phil. 1:11; 4:17; Col. 1:10]
  - type: text
    content: be unfruitful.
  '15':
  - type: text
    content: All who are with me send greetings to you. Greet those who love us in the faith.
  - type: note
    content: See Col. 4:18
  - type: text
    content: Grace be with you all.
  '2':
  - type: note
    content: Eph. 4:31
  - type: text
    content: 'to speak evil of no one, '
  - type: note
    content: 1 Tim. 3:3
  - type: text
    content: 'to avoid quarreling, to be gentle, and '
  - type: note
    content: See 2 Tim. 2:25
  - type: text
    content: 'to show perfect courtesy toward all people. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: See 1 Cor. 6:11
  - type: text
    content: 'we ourselves were once foolish, disobedient, led astray, slaves to various passions and pleasures, passing our days in malice and envy, hated by others and hating one another. '
  '4':
  - type: text
    content: 'But when '
  - type: note
    content: See Rom. 2:4
  - type: text
    content: 'the goodness and loving kindness of God our Savior appeared, '
  '5':
  - type: text
    content: 'he saved us, '
  - type: note
    content: See Rom. 3:27
  - type: text
    content: 'not because of works done by us in righteousness, but '
  - type: note
    content: Eph. 2:4; 1 Pet. 1:3
  - type: text
    content: 'according to his own mercy, by '
  - type: note
    content: See John 3:5; 1 Cor. 6:11; 1 Pet. 3:21
  - type: text
    content: 'the washing of regeneration and '
  - type: note
    content: See Rom. 12:2
  - type: text
    content: 'renewal of the Holy Spirit, '
  '6':
  - type: text
    content: 'whom he '
  - type: note
    content: Joel 2:28; Acts 2:33; 10:45; Rom. 5:5
  - type: text
    content: 'poured out on us richly through Jesus Christ our Savior, '
  '7':
  - type: text
    content: 'so that '
  - type: note
    content: ch. 2:11
  - type: text
    content: 'being justified by his grace we might become '
  - type: note
    content: Rom. 8:17
  - type: text
    content: 'heirs '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'according to the hope of eternal life. '
  '8':
  - type: text
    content: 'The saying is '
  - type: note
    content: See 1 Tim. 1:15
  - type: text
    content: 'trustworthy, and I want you to insist on these things, so that those who have believed in God may be careful '
  - type: note
    content: ver. 14; ch. 2:14
  - type: text
    content: 'to devote themselves to good works. These things are excellent and profitable for people. '
  '9':
  - type: text
    content: 'But '
  - type: note
    content: 2 Tim. 2:16
  - type: text
    content: 'avoid foolish '
  - type: note
    content: See 1 Tim. 6:4
  - type: text
    content: 'controversies, '
  - type: note
    content: 1 Tim. 1:4
  - type: text
    content: 'genealogies, dissensions, and quarrels about the law, for '
  - type: note
    content: 2 Tim. 2:14
  - type: text
    content: 'they are unprofitable and worthless. '
