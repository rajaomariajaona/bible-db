document_id: DEU.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Provision for Priests and Levites
  - type: text
    content: '“The Levitical priests, all the tribe of Levi, '
  - type: note
    content: See Num. 18:20
  - type: text
    content: 'shall have no portion or inheritance with Israel. They '
  - type: note
    content: Num. 18:8, 9; Josh. 13:14; 1 Sam. 2:28; [1 Cor. 9:13]
  - type: text
    content: 'shall eat the '
  - type: text
    content: Lord
  - type: text
    content: ’s food offerings
  - type: note
    content: Or the offerings by fire to the Lord
  - type: text
    content: as their
  - type: note
    content: Hebrew his
  - type: text
    content: ' inheritance. '
  '10':
  - type: text
    content: 'There shall not be found among you anyone '
  - type: note
    content: See Lev. 18:21
  - type: text
    content: who burns his son or his daughter as an offering,
  - type: note
    content: Hebrew makes his son or his daughter pass through the fire
  - type: text
    content: ' anyone who '
  - type: note
    content: 2 Kgs. 17:17
  - type: text
    content: 'practices divination or '
  - type: note
    content: See Lev. 19:26
  - type: text
    content: 'tells fortunes or interprets omens, or '
  - type: note
    content: '[Ex. 22:18]'
  - type: text
    content: 'a sorcerer '
  '11':
  - type: text
    content: 'or a charmer or '
  - type: note
    content: See Lev. 19:31
  - type: text
    content: 'a medium or a necromancer or '
  - type: note
    content: '[1 Sam. 28:7]'
  - type: text
    content: 'one who inquires of the dead, '
  '12':
  - type: note
    content: ch. 22:5; 25:16
  - type: text
    content: 'for whoever does these things is an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: '. And '
  - type: note
    content: See ch. 9:4
  - type: text
    content: 'because of these abominations the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is driving them out before you. '
  '13':
  - type: text
    content: 'You shall be blameless before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '14':
  - type: text
    content: 'for these nations, which you are about to dispossess, listen to fortune-tellers and to diviners. But as for you, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has not allowed you to do this.'
  - type: heading
    content: A New Prophet like Moses
  '15':
  - type: text
    content: ' '
  - type: note
    content: John 1:21, 25, 45; Cited Acts 3:22; 7:37
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will raise up for you a prophet like me from among you, from your brothers—it is to him you shall listen— '
  '16':
  - type: text
    content: 'just as you desired of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at Horeb '
  - type: note
    content: See ch. 9:10
  - type: text
    content: 'on the day of the assembly, when you said, '
  - type: note
    content: See Ex. 20:19
  - type: text
    content: '‘Let me not hear again the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God or see this great fire any more, lest I die.’ '
  '17':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: ch. 5:28
  - type: text
    content: '‘They are right in what they have spoken. '
  '18':
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'I will raise up for them a prophet like you from among their brothers. '
  - type: note
    content: Jer. 1:9; 5:14; [John 17:8]
  - type: text
    content: 'And I will put my words in his mouth, and '
  - type: note
    content: '[John 4:25; 8:28; 12:49, 50]'
  - type: text
    content: 'he shall speak to them all that I command him. '
  '19':
  - type: note
    content: '[Acts 3:23]'
  - type: text
    content: 'And whoever will '
  - type: note
    content: Jer. 29:19; 35:13
  - type: text
    content: 'not listen to my words that he shall speak in my name, I myself will require it of him. '
  '2':
  - type: text
    content: 'They shall have no inheritance among their brothers; the '
  - type: text
    content: Lord
  - type: text
    content: ' is their inheritance, as he promised them. '
  '20':
  - type: note
    content: See ch. 13:5
  - type: text
    content: But the prophet who presumes to speak a word in my name that I have not commanded him to speak, or
  - type: note
    content: Or and
  - type: text
    content: ' who speaks in the name of other gods, that same prophet shall die.’ '
  '21':
  - type: text
    content: 'And if you say in your heart, ‘How may we know the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken?’— '
  '22':
  - type: note
    content: '[ch. 13:1-3; Jer. 28:9]'
  - type: text
    content: 'when a prophet speaks in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', if the word does not come to pass or come true, that is a word that the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken; '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: the prophet has spoken it presumptuously. You need not be afraid of him.
  '3':
  - type: text
    content: 'And this shall be the priests’ due from the people, from those offering a sacrifice, whether an ox or a sheep: '
  - type: note
    content: See Lev. 7:30-34
  - type: text
    content: 'they shall give to the priest the shoulder and the two cheeks and the stomach. '
  '4':
  - type: note
    content: Num. 18:12; 2 Chr. 31:5
  - type: text
    content: 'The firstfruits of your grain, of your wine and of your oil, and the first fleece of your sheep, you shall give him. '
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen him out of all your tribes '
  - type: note
    content: ch. 17:12
  - type: text
    content: 'to stand and minister in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', him and his sons for all time.'
  '6':
  - type: text
    content: '“And if a Levite comes from any of your towns out of all Israel, '
  - type: note
    content: Num. 35:2, 3; Judg. 17:7; 19:1
  - type: text
    content: where he lives—and he may come when he desires
  - type: note
    content: Or lives—if he comes enthusiastically
  - type: text
    content: —
  - type: note
    content: See ch. 12:5
  - type: text
    content: 'to the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose, '
  '7':
  - type: text
    content: 'and ministers in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, '
  - type: note
    content: '[1 Chr. 23:6; 2 Chr. 31:2]'
  - type: text
    content: 'like all his fellow Levites who stand to minister there before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'then he may have equal '
  - type: note
    content: 2 Chr. 31:4; Neh. 12:44, 47; 13:10
  - type: text
    content: portions to eat, besides what he receives from the sale of his patrimony.
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: heading
    content: Abominable Practices
  '9':
  - type: text
    content: '“When you come into the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, '
  - type: note
    content: ch. 12:29-31; See Lev. 18:26-30
  - type: text
    content: 'you shall not learn to follow the abominable practices of those nations. '
