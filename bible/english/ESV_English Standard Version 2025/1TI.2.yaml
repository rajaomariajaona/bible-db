document_id: 1TI.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Pray for All People
  - type: text
    content: 'First of all, then, I urge that supplications, prayers, intercessions, and thanksgivings be made for all people, '
  '10':
  - type: note
    content: '[1 Pet. 3:4]'
  - type: text
    content: 'but with what is proper for women who profess godliness—with good works. '
  '11':
  - type: text
    content: 'Let a woman learn quietly '
  - type: note
    content: Titus 2:5
  - type: text
    content: 'with all submissiveness. '
  '12':
  - type: note
    content: '[1 Cor. 14:34]'
  - type: text
    content: 'I do not permit a woman to teach or to exercise authority over a man; rather, she is to remain quiet. '
  '13':
  - type: note
    content: Gen. 1:27; 2:8
  - type: text
    content: 'For Adam was formed first, '
  - type: note
    content: Gen. 2:18, 22
  - type: text
    content: 'then Eve; '
  '14':
  - type: text
    content: 'and Adam was not deceived, but '
  - type: note
    content: Gen. 3:6, 13
  - type: text
    content: 'the woman was deceived and became a transgressor. '
  '15':
  - type: text
    content: 'Yet she will be saved through '
  - type: note
    content: '[Gal. 4:4]'
  - type: text
    content: 'childbearing—if they continue in '
  - type: note
    content: ch. 1:14
  - type: text
    content: faith and love and holiness, with self-control.
  '2':
  - type: note
    content: Ezra 6:10
  - type: text
    content: 'for kings and all who are in high positions, that we may lead a peaceful and quiet life, godly and '
  - type: note
    content: ch. 3:4
  - type: text
    content: 'dignified in every way. '
  '3':
  - type: text
    content: 'This is good, and '
  - type: note
    content: ch. 5:4
  - type: text
    content: 'it is pleasing in the sight of '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'God our Savior, '
  '4':
  - type: text
    content: 'who desires '
  - type: note
    content: ch. 4:10; Ezek. 18:23, 32
  - type: text
    content: 'all people to be saved and '
  - type: note
    content: 2 Tim. 3:7
  - type: text
    content: 'to come to '
  - type: note
    content: 2 Tim. 2:25; Titus 1:1; Heb. 10:26
  - type: text
    content: 'the knowledge of the truth. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: See Gal. 3:20
  - type: text
    content: there is one God, and there is one mediator between God and men, the man
  - type: note
    content: men and man render the same Greek word that is translated people in verses 1 and 4
  - type: text
    content: ' Christ Jesus, '
  '6':
  - type: note
    content: See Matt. 20:28
  - type: text
    content: 'who gave himself as a ransom for all, which is '
  - type: note
    content: See 1 Cor. 1:6
  - type: text
    content: 'the testimony given '
  - type: note
    content: ch. 6:15; Titus 1:3; [Gal. 4:4]
  - type: text
    content: 'at the proper time. '
  '7':
  - type: note
    content: ch. 1:11; Eph. 3:7, 8; 2 Tim. 1:11
  - type: text
    content: For this I was appointed a preacher and an apostle (
  - type: note
    content: See Rom. 9:1
  - type: text
    content: 'I am telling the truth, I am not lying), '
  - type: note
    content: See Acts 9:15
  - type: text
    content: a teacher of the Gentiles in faith and truth.
  '8':
  - type: text
    content: 'I desire then that '
  - type: note
    content: '[John 4:21]'
  - type: text
    content: 'in every place the men should pray, '
  - type: note
    content: Ps. 63:4; 119:48; [Isa. 1:15]
  - type: text
    content: 'lifting '
  - type: note
    content: Job 17:9; Ps. 24:4
  - type: text
    content: 'holy hands without anger or quarreling; '
  '9':
  - type: text
    content: 'likewise also '
  - type: note
    content: 1 Pet. 3:3; [Isa. 3:18-23]
  - type: text
    content: 'that women should adorn themselves in respectable apparel, with modesty and self-control, not with braided hair and gold or pearls or costly attire, '
