document_id: 1TI.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: See 2 Cor. 1:1
  - type: text
    content: 'an apostle of Christ Jesus '
  - type: note
    content: Titus 1:3; [Rom. 16:26]
  - type: text
    content: 'by command of '
  - type: note
    content: See Luke 1:47
  - type: text
    content: 'God our Savior and of Christ Jesus '
  - type: note
    content: Col. 1:27
  - type: text
    content: our hope,
  '10':
  - type: text
    content: the sexually immoral, men who practice homosexuality, enslavers,
  - type: note
    content: That is, those who take someone captive in order to sell him into slavery
  - type: text
    content: ' liars, perjurers, and whatever else is contrary to '
  - type: note
    content: 2 Tim. 4:3; [ch. 6:3; 2 Tim. 1:13; Titus 1:13; 2:2]
  - type: text
    content: sound
  - type: note
    content: Or healthy
  - type: text
    content: ' doctrine, '
  '11':
  - type: text
    content: 'in accordance with '
  - type: note
    content: '[2 Cor. 4:4]'
  - type: text
    content: 'the gospel of the glory of '
  - type: note
    content: ch. 6:15
  - type: text
    content: 'the blessed God '
  - type: note
    content: Titus 1:3; See Rom. 2:16; Gal. 2:7
  - type: text
    content: with which I have been entrusted.
  - type: heading
    content: Christ Jesus Came to Save Sinners
  '12':
  - type: text
    content: 'I thank him '
  - type: note
    content: Acts 9:22; Phil. 4:13
  - type: text
    content: 'who has given me strength, Christ Jesus our Lord, because he judged me faithful, '
  - type: note
    content: See 2 Cor. 3:6
  - type: text
    content: 'appointing me to his service, '
  '13':
  - type: text
    content: 'though formerly I was a blasphemer, '
  - type: note
    content: See Acts 8:3
  - type: text
    content: 'persecutor, and insolent opponent. But '
  - type: note
    content: 1 Cor. 7:25; 2 Cor. 4:1
  - type: text
    content: 'I received mercy '
  - type: note
    content: See Acts 3:17
  - type: text
    content: 'because I had acted ignorantly in unbelief, '
  '14':
  - type: text
    content: 'and '
  - type: note
    content: Rom. 5:20
  - type: text
    content: 'the grace of our Lord overflowed for me with the '
  - type: note
    content: '[Luke 7:47, 50]; See 1 Thess. 1:3'
  - type: text
    content: 'faith and love that are in Christ Jesus. '
  '15':
  - type: text
    content: 'The saying is '
  - type: note
    content: ch. 3:1; 4:9; 2 Tim. 2:11; Titus 3:8; [Rev. 22:6]
  - type: text
    content: 'trustworthy and deserving of full acceptance, that Christ Jesus '
  - type: note
    content: Matt. 9:13; See John 3:17; Rom. 4:25
  - type: text
    content: 'came into the world to save sinners, '
  - type: note
    content: '[1 Cor. 15:9]'
  - type: text
    content: 'of whom I am the foremost. '
  '16':
  - type: text
    content: 'But I received mercy for this reason, that in me, as the foremost, Jesus Christ might display his perfect patience as an example to those who were to believe in him for eternal life. '
  '17':
  - type: text
    content: 'To '
  - type: note
    content: '[Ps. 10:16; Rev. 4:9, 10]'
  - type: text
    content: 'the King of the ages, '
  - type: note
    content: ch. 6:15, 16; Rom. 1:23
  - type: text
    content: 'immortal, '
  - type: note
    content: John 1:18; Col. 1:15; Heb. 11:27; 1 John 4:12
  - type: text
    content: 'invisible, '
  - type: note
    content: Jude 25
  - type: text
    content: 'the only God, '
  - type: note
    content: 1 Chr. 29:11
  - type: text
    content: be honor and glory forever and ever.
  - type: note
    content: Greek to the ages of ages
  - type: text
    content: ' Amen.'
  '18':
  - type: text
    content: 'This charge '
  - type: note
    content: 2 Tim. 2:2
  - type: text
    content: 'I entrust to you, Timothy, my child, in accordance with '
  - type: note
    content: ch. 4:14
  - type: text
    content: 'the prophecies previously made about you, that by them you may '
  - type: note
    content: 1 Cor. 9:7; 2 Cor. 10:4; 2 Tim. 2:3, 4; [ch. 6:12]
  - type: text
    content: 'wage the good warfare, '
  '19':
  - type: note
    content: '[ch. 3:9]'
  - type: text
    content: 'holding faith and a good conscience. By rejecting this, some have '
  - type: note
    content: '[ch. 6:9]'
  - type: text
    content: 'made shipwreck of their faith, '
  '2':
  - type: text
    content: 'To Timothy, '
  - type: note
    content: Titus 1:4
  - type: text
    content: 'my true child in the faith:'
  - type: note
    content: 2 Tim. 1:2; 2 John 3; [ Jude 2 ]
  - type: text
    content: Grace, mercy, and peace from God the Father and Christ Jesus our Lord.
  - type: heading
    content: Warning Against False Teachers
  '20':
  - type: text
    content: 'among whom are '
  - type: note
    content: 2 Tim. 2:17
  - type: text
    content: 'Hymenaeus and '
  - type: note
    content: 2 Tim. 4:14
  - type: text
    content: 'Alexander, whom I '
  - type: note
    content: See 1 Cor. 5:5
  - type: text
    content: 'have handed over to Satan that they may learn not to '
  - type: note
    content: Acts 13:45
  - type: text
    content: blaspheme.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Titus 1:5 ]'
  - type: text
    content: 'As I urged you when I was going to Macedonia, remain at Ephesus so that you may charge certain persons not '
  - type: note
    content: ch. 6:3; [Gal. 1:6, 7]
  - type: text
    content: 'to teach any different doctrine, '
  '4':
  - type: text
    content: 'nor '
  - type: note
    content: ch. 4:7; 2 Tim. 4:4; Titus 1:14; 2 Pet. 1:16
  - type: text
    content: 'to devote themselves to myths and endless '
  - type: note
    content: Titus 3:9
  - type: text
    content: 'genealogies, which promote '
  - type: note
    content: ch. 6:4
  - type: text
    content: speculations rather than the stewardship
  - type: note
    content: Or good order
  - type: text
    content: ' from God that is by faith. '
  '5':
  - type: text
    content: 'The aim of our charge is love '
  - type: note
    content: 2 Tim. 2:22
  - type: text
    content: 'that issues from a pure heart and '
  - type: note
    content: 1 Pet. 3:16, 21
  - type: text
    content: 'a good conscience and '
  - type: note
    content: Rom. 12:9; 2 Tim. 1:5
  - type: text
    content: 'a sincere faith. '
  '6':
  - type: text
    content: 'Certain persons, by '
  - type: note
    content: ch. 6:21
  - type: text
    content: 'swerving from these, have wandered away into '
  - type: note
    content: Titus 1:10
  - type: text
    content: 'vain discussion, '
  '7':
  - type: text
    content: 'desiring to be teachers of the law, '
  - type: note
    content: '[ch. 6:4; Col. 2:18]'
  - type: text
    content: without understanding either what they are saying or the things about which they make confident assertions.
  '8':
  - type: text
    content: 'Now we know that '
  - type: note
    content: Rom. 7:16
  - type: text
    content: 'the law is good, if one uses it lawfully, '
  '9':
  - type: text
    content: 'understanding this, that the '
  - type: note
    content: Gal. 5:23
  - type: text
    content: 'law is not laid down for the just but for the lawless and disobedient, for the ungodly and sinners, for the unholy and profane, for those who strike their fathers and mothers, for murderers, '
