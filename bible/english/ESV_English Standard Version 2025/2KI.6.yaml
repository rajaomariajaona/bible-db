  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Elisha said to them, “This is not the way, and this is not the city. Follow me, and I will bring you to the man whom you seek.” And he led them to Samaria.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us go to the Jordan and each of us get there a log, and let us make a place for us to dwell there.” And he answered, “Go.” '
  '20':
