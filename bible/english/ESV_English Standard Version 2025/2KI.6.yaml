      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'murderer has sent to take off my head? Look, when the messenger comes, shut the door and hold the door fast against him. Is not the sound of his master’s feet behind him?” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And while he was still speaking with them, the messenger came down to him and said, “This trouble is from the '
    - type: usfm
      marker: nd
      children:
      - type: text
