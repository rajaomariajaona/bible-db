      marker-yv: yv-n
    - type: text
      text: “May God do so to me and more also, if the head of Elisha the son of Shaphat remains on his shoulders today.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha was sitting in his house, '
    - type: usfm
