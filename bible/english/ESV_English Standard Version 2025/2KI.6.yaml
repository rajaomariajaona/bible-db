      marker-yv: yv-n
    - type: text
      text: 'and the elders were sitting with him. Now the king had dispatched a man from his presence, but before the messenger arrived Elisha said to the elders, “Do you see how this '
    - type: usfm
      marker: x
      children:
      - type: usfm
