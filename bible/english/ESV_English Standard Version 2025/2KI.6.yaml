      marker-yv: yv-n
    - type: text
      text: 'the sons of the prophets said to Elisha, “See, the place where we dwell under your charge is too small for us. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king of Israel sent to the place about which the man of God told him. Thus he used to warn him, so that he saved himself there more than once or twice.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the mind of the king of Syria was greatly troubled because of this thing, and he called his servants and said to them, “Will you not show me who of us is for the king of Israel?” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one of his servants said, “None, my lord, O king; but Elisha, the prophet who is in Israel, tells the king of Israel the words that you speak in your bedroom.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Go and see where he is, that I may send and seize him.” It was told him, “Behold, he is in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 37:17
      marker-yv: yv-n
    - type: text
      text: 'Dothan.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he sent there horses and chariots and a great army, and they came by night and surrounded the city.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the servant of the man of God rose early in the morning and went out, behold, an army with horses and chariots was all around the city. And the servant said, “Alas, my master! What shall we do?” '
  '16':
