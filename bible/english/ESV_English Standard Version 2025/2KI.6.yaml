        - type: text
          text: Judg. 17:10
      marker-yv: yv-n
    - type: text
      text: '“My father, shall I strike them down? Shall I strike them down?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered, “You shall not strike them down. Would you strike down those whom you have taken captive '
    - type: usfm
