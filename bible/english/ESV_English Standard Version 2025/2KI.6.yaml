document_id: 2KI.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Axe Head Recovered
  - type: text
    content: 'Now '
  - type: note
    content: See ch. 2:3
  - type: text
    content: 'the sons of the prophets said to Elisha, “See, the place where we dwell under your charge is too small for us. '
  '10':
  - type: text
    content: And the king of Israel sent to the place about which the man of God told him. Thus he used to warn him, so that he saved himself there more than once or twice.
  '11':
  - type: text
    content: 'And the mind of the king of Syria was greatly troubled because of this thing, and he called his servants and said to them, “Will you not show me who of us is for the king of Israel?” '
  '12':
  - type: text
    content: 'And one of his servants said, “None, my lord, O king; but Elisha, the prophet who is in Israel, tells the king of Israel the words that you speak in your bedroom.” '
  '13':
  - type: text
    content: 'And he said, “Go and see where he is, that I may send and seize him.” It was told him, “Behold, he is in '
  - type: note
    content: Gen. 37:17
  - type: text
    content: 'Dothan.” '
  '14':
  - type: text
    content: So he sent there horses and chariots and a great army, and they came by night and surrounded the city.
  '15':
  - type: text
    content: 'When the servant of the man of God rose early in the morning and went out, behold, an army with horses and chariots was all around the city. And the servant said, “Alas, my master! What shall we do?” '
  '16':
  - type: text
    content: 'He said, “Do not be afraid, '
  - type: note
    content: 2 Chr. 32:7; [Ps. 55:18; Rom. 8:31]
  - type: text
    content: 'for those who are with us are more than those who are with them.” '
  '17':
  - type: text
    content: 'Then Elisha prayed and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', please '
  - type: note
    content: ver. 20
  - type: text
    content: 'open his eyes that he may see.” So the '
  - type: text
    content: Lord
  - type: text
    content: ' opened the eyes of the young man, and he saw, and behold, the mountain was full of '
  - type: note
    content: ch. 2:11; [Ps. 34:7; 68:17]; See Zech. 1:8-10; 6:1-7
  - type: text
    content: 'horses and chariots of fire all around Elisha. '
  '18':
  - type: text
    content: 'And when the Syrians came down against him, Elisha prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “Please strike this people with blindness.” '
  - type: note
    content: '[Gen. 19:11]'
  - type: text
    content: 'So he struck them with blindness in accordance with the prayer of Elisha. '
  '19':
  - type: text
    content: And Elisha said to them, “This is not the way, and this is not the city. Follow me, and I will bring you to the man whom you seek.” And he led them to Samaria.
  '2':
  - type: text
    content: 'Let us go to the Jordan and each of us get there a log, and let us make a place for us to dwell there.” And he answered, “Go.” '
  '20':
  - type: text
    content: 'As soon as they entered Samaria, Elisha said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'open the eyes of these men, that they may see.” So the '
  - type: text
    content: Lord
  - type: text
    content: ' opened their eyes and they saw, and behold, they were in the midst of Samaria. '
  '21':
  - type: text
    content: 'As soon as the king of Israel saw them, he said to Elisha, '
  - type: note
    content: ch. 5:13; 8:9; Judg. 17:10
  - type: text
    content: '“My father, shall I strike them down? Shall I strike them down?” '
  '22':
  - type: text
    content: 'He answered, “You shall not strike them down. Would you strike down those whom you have taken captive '
  - type: note
    content: Gen. 48:22
  - type: text
    content: 'with your sword and with your bow? '
  - type: note
    content: Rom. 12:20
  - type: text
    content: 'Set bread and water before them, that they may eat and drink and go to their master.” '
  '23':
  - type: text
    content: 'So he prepared for them a great feast, and when they had eaten and drunk, he sent them away, and they went to their master. And the Syrians did not come again '
  - type: note
    content: ver. 8, 9; ch. 5:2; 24:2
  - type: text
    content: on raids into the land of Israel.
  - type: heading
    content: Ben-hadad’s Siege of Samaria
  '24':
  - type: text
    content: 'Afterward '
  - type: note
    content: 1 Kgs. 20:1
  - type: text
    content: 'Ben-hadad king of Syria mustered his entire army and went up and besieged Samaria. '
  '25':
  - type: text
    content: And there was a great famine in Samaria, as they besieged it, until a donkey’s head was sold for eighty shekels of silver, and the fourth part of a kab
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams; a kab was about 1 quart or 1 liter
  - type: text
    content: ' of dove’s dung for five shekels of silver. '
  '26':
  - type: text
    content: 'Now as the king of Israel was passing by on the wall, a woman cried out to him, saying, “Help, my lord, O king!” '
  '27':
  - type: text
    content: 'And he said, “If the '
  - type: text
    content: Lord
  - type: text
    content: ' will not help you, how shall I help you? From the threshing floor, or from the winepress?” '
  '28':
  - type: text
    content: 'And the king asked her, “What is your trouble?” She answered, “This woman said to me, ‘Give your son, that we may eat him today, and we will eat my son tomorrow.’ '
  '29':
  - type: note
    content: '[Lev. 26:29; Deut. 28:53, 57; Ezek. 5:10]'
  - type: text
    content: 'So we boiled my son and ate him. And on the next day I said to her, ‘Give your son, that we may eat him.’ But she has hidden her son.” '
  '3':
  - type: text
    content: 'Then one of them said, “Be pleased to go with your servants.” And he answered, “I will go.” '
  '30':
  - type: text
    content: 'When the king heard the words of the woman, '
  - type: note
    content: 1 Kgs. 21:27
  - type: text
    content: 'he tore his clothes—now he was passing by on the wall—and the people looked, and behold, '
  - type: note
    content: 1 Kgs. 21:27
  - type: text
    content: 'he had sackcloth beneath on his body— '
  '31':
  - type: text
    content: 'and he said, '
  - type: note
    content: '[1 Kgs. 19:2]; See Ruth 1:17'
  - type: text
    content: “May God do so to me and more also, if the head of Elisha the son of Shaphat remains on his shoulders today.”
  '32':
  - type: text
    content: 'Elisha was sitting in his house, '
  - type: note
    content: Ezek. 8:1; 14:1; 20:1
  - type: text
    content: 'and the elders were sitting with him. Now the king had dispatched a man from his presence, but before the messenger arrived Elisha said to the elders, “Do you see how this '
  - type: note
    content: '[1 Kgs. 18:4; 21:13]'
  - type: text
    content: 'murderer has sent to take off my head? Look, when the messenger comes, shut the door and hold the door fast against him. Is not the sound of his master’s feet behind him?” '
  '33':
  - type: text
    content: 'And while he was still speaking with them, the messenger came down to him and said, “This trouble is from the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  - type: note
    content: '[Job 2:9]'
  - type: text
    content: 'Why should I wait for the '
  - type: text
    content: Lord
  - type: text
    content: ' any longer?”'
  '4':
  - type: text
    content: 'So he went with them. And when they came to the Jordan, they cut down trees. '
  '5':
  - type: text
    content: 'But as one was felling a log, his axe head fell into the water, and he cried out, “Alas, my master! It was borrowed.” '
  '6':
  - type: text
    content: 'Then the man of God said, “Where did it fall?” When he showed him the place, '
  - type: note
    content: '[ch. 2:21]'
  - type: text
    content: 'he cut off a stick and threw it in there and made the iron float. '
  '7':
  - type: text
    content: And he said, “Take it up.” So he reached out his hand and took it.
  - type: heading
    content: Horses and Chariots of Fire
  '8':
  - type: text
    content: 'Once when the king of Syria was warring against Israel, he took counsel with his servants, saying, “At such and such a place shall be my camp.” '
  '9':
  - type: text
    content: 'But the man of God sent word to the king of Israel, “Beware that you do not pass this place, for the Syrians are going down there.” '
