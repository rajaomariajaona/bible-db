      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 5:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'So we boiled my son and ate him. And on the next day I said to her, ‘Give your son, that we may eat him.’ But she has hidden her son.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of them said, “Be pleased to go with your servants.” And he answered, “I will go.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king heard the words of the woman, '
    - type: usfm
