      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Why should I wait for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' any longer?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went with them. And when they came to the Jordan, they cut down trees. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as one was felling a log, his axe head fell into the water, and he cried out, “Alas, my master! It was borrowed.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the man of God said, “Where did it fall?” When he showed him the place, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:21
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he cut off a stick and threw it in there and made the iron float. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said, “Take it up.” So he reached out his hand and took it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Horses and Chariots of Fire
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once when the king of Syria was warring against Israel, he took counsel with his servants, saying, “At such and such a place shall be my camp.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the man of God sent word to the king of Israel, “Beware that you do not pass this place, for the Syrians are going down there.” '
