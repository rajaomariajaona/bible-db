      marker-yv: yv-n
    - type: text
      text: on raids into the land of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ben-hadad’s Siege of Samaria
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward '
    - type: usfm
      marker: x
