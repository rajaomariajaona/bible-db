      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 21:27
      marker-yv: yv-n
    - type: text
      text: 'he tore his clothes—now he was passing by on the wall—and the people looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 21:27
      marker-yv: yv-n
    - type: text
      text: 'he had sackcloth beneath on his body— '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
