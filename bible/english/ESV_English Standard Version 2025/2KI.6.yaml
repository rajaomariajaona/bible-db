    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' opened their eyes and they saw, and behold, they were in the midst of Samaria. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as the king of Israel saw them, he said to Elisha, '
    - type: usfm
