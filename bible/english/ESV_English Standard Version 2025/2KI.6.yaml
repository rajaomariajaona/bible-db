      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 20:1
      marker-yv: yv-n
    - type: text
      text: 'Ben-hadad king of Syria mustered his entire army and went up and besieged Samaria. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there was a great famine in Samaria, as they besieged it, until a donkey’s head was sold for eighty shekels of silver, and the fourth part of a kab
    - type: usfm
      marker: f
      children:
