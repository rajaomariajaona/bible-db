        children:
        - type: text
          text: Rom. 12:20
      marker-yv: yv-n
    - type: text
      text: 'Set bread and water before them, that they may eat and drink and go to their master.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he prepared for them a great feast, and when they had eaten and drunk, he sent them away, and they went to their master. And the Syrians did not come again '
    - type: usfm
      marker: x
      children:
      - type: usfm
