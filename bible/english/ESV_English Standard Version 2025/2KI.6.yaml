  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as the king of Israel was passing by on the wall, a woman cried out to him, saying, “Help, my lord, O king!” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not help you, how shall I help you? From the threshing floor, or from the winepress?” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king asked her, “What is your trouble?” She answered, “This woman said to me, ‘Give your son, that we may eat him today, and we will eat my son tomorrow.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
