  - type: text
    text: 'the sons of the prophets said to Elisha, “See, the place where we dwell under your charge is too small for us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let us go to the Jordan and each of us get there a log, and let us make a place for us to dwell there.” And he answered, “Go.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then one of them said, “Be pleased to go with your servants.” And he answered, “I will go.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So he went with them. And when they came to the Jordan, they cut down trees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But as one was felling a log, his axe head fell into the water, and he cried out, “Alas, my master! It was borrowed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
