document_id: DAN.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Vision of the Four Beasts
  - type: text
    content: 'In the first year of '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'Belshazzar king of Babylon, '
  - type: note
    content: '[ch. 1:17]'
  - type: text
    content: 'Daniel saw a dream and '
  - type: note
    content: ver. 15; ch. 2:28; 4:5
  - type: text
    content: 'visions of his head as he lay in his bed. Then he wrote down the dream and told the sum of the matter. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 21:9 ]'
  - type: text
    content: A stream of fire issued
  - type: text
    content: and came out from before him;
  - type: note
    content: Ps. 68:17; Heb. 12:22; Rev. 5:11
  - type: text
    content: 'a thousand thousands '
  - type: note
    content: Ps. 103:21
  - type: text
    content: served him,
  - type: note
    content: Ps. 68:17; Heb. 12:22; Rev. 5:11
  - type: text
    content: 'and ten thousand times ten thousand '
  - type: note
    content: '[Zech. 3:4]'
  - type: text
    content: stood before him;
  - type: text
    content: 'the '
  - type: note
    content: ver. 22, 26; Rev. 11:18; 20:4
  - type: text
    content: court sat in judgment,
  - type: text
    content: 'and '
  - type: note
    content: Rev. 20:12
  - type: text
    content: the books were opened.
  '11':
  - type: text
    content: '“I looked then because of the sound of '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the great words that the horn was speaking. And as I looked, '
  - type: note
    content: Rev. 19:20; [Rev. 20:10]
  - type: text
    content: 'the beast was killed, and its body destroyed '
  - type: note
    content: Rev. 19:20; [Rev. 20:10]
  - type: text
    content: 'and given over to be burned with fire. '
  '12':
  - type: text
    content: 'As for the rest of the beasts, '
  - type: note
    content: '[ver. 14, 26]'
  - type: text
    content: their dominion was taken away, but their lives were prolonged for a season and a time.
  - type: heading
    content: The Son of Man Is Given Dominion
  '13':
  - type: text
    content: “I saw in the night visions,
  - type: text
    content: 'and '
  - type: note
    content: Matt. 26:64; Mark 14:62; Rev. 1:7; 14:14
  - type: text
    content: behold, with the clouds of heaven
  - type: text
    content: there came one like a son of man,
  - type: text
    content: 'and he came to the '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: Ancient of Days
  - type: text
    content: and was presented before him.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps. 110:1, 2; Isa. 9:6, 7; Rev. 11:15
  - type: text
    content: And to him was given dominion
  - type: text
    content: and glory and a kingdom,
  - type: text
    content: 'that all '
  - type: note
    content: See ch. 3:4
  - type: text
    content: peoples, nations, and languages
  - type: text
    content: should serve him;
  - type: note
    content: See ch. 2:44
  - type: text
    content: his dominion is an everlasting dominion,
  - type: text
    content: which shall not pass away,
  - type: text
    content: and his kingdom one
  - type: text
    content: that shall not be destroyed.
  - type: heading
    content: Daniel’s Vision Interpreted
  '15':
  - type: text
    content: “As for me, Daniel, my spirit within me
  - type: note
    content: Aramaic within its sheath
  - type: text
    content: ' was anxious, and '
  - type: note
    content: See ver. 1
  - type: text
    content: 'the visions of my head alarmed me. '
  '16':
  - type: text
    content: 'I approached one of those who stood there and asked him the truth concerning all this. So he told me and made known to me the interpretation of the things. '
  '17':
  - type: note
    content: '[ver. 3]'
  - type: text
    content: '‘These four great beasts are four kings who shall arise out of the earth. '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: ver. 22, 27; Matt. 25:34; [1 Cor. 6:2; Rev. 2:26; 20:4]
  - type: text
    content: the saints of the Most High shall receive the kingdom and possess the kingdom forever, forever and ever.’
  '19':
  - type: text
    content: '“Then I desired to know the truth about '
  - type: note
    content: ver. 7
  - type: text
    content: 'the fourth beast, which was different from all the rest, exceedingly terrifying, with its teeth of iron and claws of bronze, and which devoured and broke in pieces and stamped what was left with its feet, '
  '2':
  - type: text
    content: Daniel declared,
  - type: note
    content: Aramaic answered and said
  - type: text
    content: ' “I saw in my vision by night, and behold, '
  - type: note
    content: ch. 8:8; 11:4; [Ezek. 37:9; Zech. 2:6; Rev. 7:1]
  - type: text
    content: 'the four winds of heaven were stirring up the great sea. '
  '20':
  - type: note
    content: ver. 8
  - type: text
    content: 'and about the ten horns that were on its head, and the other horn that came up and before which three of them fell, the horn that had eyes and a mouth that spoke great things, and that seemed greater than its companions. '
  '21':
  - type: text
    content: 'As I looked, this horn '
  - type: note
    content: '[ch. 8:24]'
  - type: text
    content: 'made war with the saints and prevailed over them, '
  '22':
  - type: text
    content: 'until the '
  - type: note
    content: ver. 9, 13
  - type: text
    content: 'Ancient of Days came, and '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'judgment was given for the saints of the Most High, and the time came when '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: the saints possessed the kingdom.
  '23':
  - type: text
    content: '“Thus he said: ‘As for '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: the fourth beast,
  - type: text
    content: there shall be a fourth kingdom on earth,
  - type: text
    content: which shall be different from all the kingdoms,
  - type: text
    content: and it shall devour the whole earth,
  - type: text
    content: and trample it down, and break it to pieces.
  '24':
  - type: text
    content: As for the ten horns,
  - type: text
    content: out of this kingdom ten kings shall arise,
  - type: text
    content: and another shall arise after them;
  - type: text
    content: he shall be different from the former ones,
  - type: text
    content: and shall put down three kings.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:36 ]'
  - type: text
    content: He shall speak words against the Most High,
  - type: text
    content: and shall wear out the saints of the Most High,
  - type: text
    content: 'and shall think to '
  - type: note
    content: ch. 2:9, 21
  - type: text
    content: change the times and the law;
  - type: text
    content: and they shall be given into his hand
  - type: text
    content: 'for '
  - type: note
    content: ch. 12:7; Rev. 12:14
  - type: text
    content: a time, times, and half a time.
  '26':
  - type: text
    content: ' '
  - type: note
    content: See ver. 10
  - type: text
    content: But the court shall sit in judgment,
  - type: text
    content: 'and '
  - type: note
    content: '[ver. 12, 14]'
  - type: text
    content: his dominion shall be taken away,
  - type: text
    content: 'to be consumed and destroyed '
  - type: note
    content: ch. 6:26
  - type: text
    content: to the end.
  '27':
  - type: text
    content: ' '
  - type: note
    content: See ver. 18
  - type: text
    content: And the kingdom and the dominion
  - type: text
    content: and the greatness of the kingdoms under the whole heaven
  - type: text
    content: 'shall be given to the people of '
  - type: note
    content: See ver. 18
  - type: text
    content: the saints of the Most High;
  - type: note
    content: See ch. 2:44
  - type: text
    content: his kingdom shall be an everlasting kingdom,
  - type: text
    content: and all dominions shall serve and obey him.’
  - type: note
    content: Or their kingdom shall be an everlasting kingdom, and all dominions shall serve and obey them
  '28':
  - type: text
    content: '“Here is the end of the matter. '
  - type: note
    content: ver. 15; [ch. 8:27; 10:8, 16; Jer. 23:9]
  - type: text
    content: 'As for me, Daniel, my '
  - type: note
    content: ch. 4:5, 19; 5:6
  - type: text
    content: 'thoughts greatly alarmed me, '
  - type: note
    content: '[ch. 5:6, 10]'
  - type: text
    content: 'and my color changed, but '
  - type: note
    content: '[Luke 2:19, 51]'
  - type: text
    content: I kept the matter in my heart.”
  '3':
  - type: text
    content: 'And four great beasts '
  - type: note
    content: '[Rev. 13:1]'
  - type: text
    content: 'came up out of the sea, different from one another. '
  '4':
  - type: text
    content: 'The first was like a lion and had eagles’ wings. Then as I looked its wings were plucked off, and it was lifted up from the ground and made to stand on two feet like a man, and the mind of a man was given to it. '
  '5':
  - type: text
    content: 'And behold, '
  - type: note
    content: '[ch. 2:39]'
  - type: text
    content: 'another beast, a second one, like a bear. It was raised up on one side. It had three ribs in its mouth between its teeth; and it was told, ‘Arise, devour much flesh.’ '
  '6':
  - type: text
    content: 'After this I looked, and behold, another, like a '
  - type: note
    content: '[Hab. 1:8; Rev. 13:2]'
  - type: text
    content: 'leopard, with four wings of a bird on its back. And the beast had four heads, and '
  - type: note
    content: '[ch. 11:5]'
  - type: text
    content: 'dominion was given to it. '
  '7':
  - type: text
    content: 'After this I saw in the night visions, and behold, a fourth beast, '
  - type: note
    content: ver. 19, 23
  - type: text
    content: 'terrifying and dreadful and exceedingly strong. It had great iron teeth; '
  - type: note
    content: ver. 19, 23
  - type: text
    content: 'it devoured and broke in pieces '
  - type: note
    content: ver. 19, 23
  - type: text
    content: 'and stamped what was left with its feet. It was different from all the beasts that were before it, and '
  - type: note
    content: ver. 20; [Rev. 12:3; 13:1; 17:12]
  - type: text
    content: 'it had ten horns. '
  '8':
  - type: text
    content: 'I considered the horns, and behold, '
  - type: note
    content: '[ver. 20, 21, 24; ch. 8:9]'
  - type: text
    content: 'there came up among them another horn, a little one, '
  - type: note
    content: '[ver. 20, 21, 24; ch. 8:9]'
  - type: text
    content: 'before which three of the first horns were plucked up by the roots. And behold, in this horn were eyes like the eyes of a man, and '
  - type: note
    content: ver. 20; [Rev. 13:5, 6]
  - type: text
    content: a mouth speaking great things.
  - type: heading
    content: The Ancient of Days Reigns
  '9':
  - type: text
    content: “As I looked,
  - type: note
    content: Rev. 20:4; [ Matt. 19:28 ]; See 1 Kgs. 22:19
  - type: text
    content: thrones were placed,
  - type: text
    content: 'and the '
  - type: note
    content: ver. 22; [Ps. 90:2]
  - type: text
    content: Ancient of Days took his seat;
  - type: note
    content: Matt. 28:3
  - type: text
    content: his clothing was white as snow,
  - type: text
    content: 'and '
  - type: note
    content: Rev. 1:14
  - type: text
    content: the hair of his head like pure wool;
  - type: text
    content: his throne was fiery flames;
  - type: note
    content: '[ Ezek. 1:16; 10:2 ]'
  - type: text
    content: its wheels were burning fire.
