document_id: NUM.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daily Offerings
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'this is '
  - type: note
    content: '[Ezek. 46:4, 5]'
  - type: text
    content: the burnt offering of every Sabbath, besides the regular burnt offering and its drink offering.
  - type: heading
    content: Monthly Offerings
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:10; 1 Sam. 20:5; 1 Chr. 23:31; 2 Chr. 2:4; Ezra 3:5; Isa. 1:13, 14; Ezek. 45:17; 46:6; Hos. 2:11; Col. 2:16
  - type: text
    content: '“At the beginnings of your months, you shall offer a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ': two bulls from the herd, one ram, seven male lambs a year old without blemish; '
  '12':
  - type: text
    content: 'also '
  - type: note
    content: For ver. 12-14, see ch. 15:4-12
  - type: text
    content: 'three tenths of an ephah of fine flour for a grain offering, mixed with oil, for each bull, and two tenths of fine flour for a grain offering, mixed with oil, for the one ram; '
  '13':
  - type: text
    content: 'and a tenth of fine flour mixed with oil as a grain offering for every lamb; for a burnt offering with a pleasing aroma, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Their drink offerings shall be half a hin of wine for a bull, a third of a hin for a ram, and a quarter of a hin for a lamb. This is the burnt offering of each month throughout the months of the year. '
  '15':
  - type: text
    content: 'Also '
  - type: note
    content: ver. 22, 30; ch. 15:24; 29:11, 16, 19, 25
  - type: text
    content: 'one male goat for a sin offering to the '
  - type: text
    content: Lord
  - type: text
    content: ; it shall be offered besides the regular burnt offering and its drink offering.
  - type: heading
    content: Passover Offerings
  '16':
  - type: text
    content: ' '
  - type: note
    content: Deut. 16:1; Ezek. 45:21; See Ex. 12:6
  - type: text
    content: '“On the fourteenth day of the first month is the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover, '
  '17':
  - type: note
    content: Lev. 23:6; [Ex. 12:18]
  - type: text
    content: 'and on the fifteenth day of this month is a feast. Seven days shall unleavened bread be eaten. '
  '18':
  - type: note
    content: Ex. 12:16; Lev. 23:7
  - type: text
    content: 'On the first day there shall be a holy convocation. You shall not do any ordinary work, '
  '19':
  - type: text
    content: 'but offer a food offering, a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ': two bulls from the herd, one ram, and seven male lambs a year old; '
  - type: note
    content: ver. 31; ch. 29:8, 13; Lev. 22:20; Deut. 15:21; 17:1
  - type: text
    content: 'see that they are without blemish; '
  '2':
  - type: text
    content: '“Command the people of Israel and say to them, ‘My offering, '
  - type: note
    content: See Lev. 3:11
  - type: text
    content: 'my food for my food offerings, my '
  - type: note
    content: See Gen. 8:21
  - type: text
    content: 'pleasing aroma, you shall be careful to offer to me at its appointed time.’ '
  '20':
  - type: text
    content: 'also their grain offering of fine flour mixed with oil; three tenths of an ephah shall you offer for a bull, and two tenths for a ram; '
  '21':
  - type: text
    content: 'a tenth shall you offer for each of the seven lambs; '
  '22':
  - type: text
    content: 'also '
  - type: note
    content: ver. 15, 30; ch. 29:22, 28, 31, 34, 38
  - type: text
    content: 'one male goat for a sin offering, to make atonement for you. '
  '23':
  - type: text
    content: 'You shall offer these besides the burnt offering of the morning, which is for a regular burnt offering. '
  '24':
  - type: text
    content: 'In the same way you shall offer daily, for seven days, the food of a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. It shall be offered besides the regular burnt offering and its drink offering. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 12:16; 13:6; Lev. 23:8
  - type: text
    content: on the seventh day you shall have a holy convocation. You shall not do any ordinary work.
  - type: heading
    content: Offerings for the Feast of Weeks
  '26':
  - type: text
    content: '“On '
  - type: note
    content: Ex. 23:16; 34:22; Lev. 23:10, 15; Deut. 16:10; [Acts 2:1]
  - type: text
    content: 'the day of the firstfruits, when you offer a grain offering of new grain to the '
  - type: text
    content: Lord
  - type: text
    content: ' at your Feast of Weeks, you shall have a holy convocation. You shall not do any ordinary work, '
  '27':
  - type: text
    content: 'but offer a burnt offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: '[Lev. 23:18, 19]'
  - type: text
    content: 'two bulls from the herd, one ram, seven male lambs a year old; '
  '28':
  - type: text
    content: 'also their grain offering of fine flour mixed with oil, three tenths of an ephah for each bull, two tenths for one ram, '
  '29':
  - type: text
    content: 'a tenth for each of the seven lambs; '
  '3':
  - type: note
    content: For ver. 3-8, see Ex. 29:38-42
  - type: text
    content: 'And you shall say to them, This is the food offering that you shall offer to the '
  - type: text
    content: Lord
  - type: text
    content: ': two male lambs a year old without blemish, day by day, as a regular offering. '
  '30':
  - type: text
    content: 'with '
  - type: note
    content: ver. 15, 22
  - type: text
    content: 'one male goat, to make atonement for you. '
  '31':
  - type: text
    content: 'Besides the regular burnt offering and its grain offering, you shall offer them and their drink offering. '
  - type: note
    content: ver. 19
  - type: text
    content: See that they are without blemish.
  '4':
  - type: text
    content: 'The one lamb you shall offer in the morning, and the other lamb you shall offer at twilight; '
  '5':
  - type: text
    content: 'also '
  - type: note
    content: ch. 15:4; Ex. 16:36
  - type: text
    content: a tenth of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of fine flour for '
  - type: note
    content: Lev. 2:1
  - type: text
    content: 'a grain offering, mixed '
  - type: note
    content: Ex. 29:40
  - type: text
    content: with a quarter of a hin
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' of beaten oil. '
  '6':
  - type: text
    content: 'It is a '
  - type: note
    content: Ex. 29:42; [Amos 5:25]
  - type: text
    content: 'regular burnt offering, which was ordained at Mount Sinai for a pleasing aroma, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Its drink offering shall be a quarter of a hin for each lamb. In the Holy Place you shall pour out a drink offering of strong drink to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'The other lamb you shall offer at twilight. Like the grain offering of the morning, and like its drink offering, you shall offer it as a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Sabbath Offerings
  '9':
  - type: text
    content: '“On the Sabbath day, two male lambs a year old without blemish, and two tenths of an ephah of fine flour for a grain offering, mixed with oil, and its drink offering: '
