document_id: 1KI.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Instructions to Solomon
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 47:29 ]'
  - type: text
    content: 'When David’s time to die drew near, he commanded Solomon his son, saying, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:21; Acts 2:29; 13:36
  - type: text
    content: 'Then David slept with his fathers and was buried in '
  - type: note
    content: ch. 3:1; 9:24
  - type: text
    content: 'the city of David. '
  '11':
  - type: text
    content: 'And the time that David reigned over Israel was '
  - type: note
    content: 2 Sam. 5:4, 5; 1 Chr. 29:26, 27
  - type: text
    content: 'forty years. He reigned seven years in Hebron and thirty-three years in Jerusalem. '
  '12':
  - type: note
    content: 1 Chr. 29:23; 2 Chr. 1:1
  - type: text
    content: So Solomon sat on the throne of David his father, and his kingdom was firmly established.
  - type: heading
    content: Solomon’s Reign Established
  '13':
  - type: text
    content: 'Then Adonijah the son of Haggith came to Bathsheba the mother of Solomon. And she said, '
  - type: note
    content: 1 Sam. 16:4
  - type: text
    content: '“Do you come peacefully?” He said, “Peacefully.” '
  '14':
  - type: text
    content: 'Then he said, “I have something to say to you.” She said, “Speak.” '
  '15':
  - type: text
    content: 'He said, “You know that '
  - type: note
    content: '[ch. 1:5, 25]'
  - type: text
    content: 'the kingdom was mine, and that all Israel fully expected me to reign. However, the kingdom has turned about and become my brother’s, '
  - type: note
    content: 1 Chr. 22:9, 10; 28:5-7
  - type: text
    content: 'for it was his from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And now I have one request to make of you; do not refuse me.” She said to him, “Speak.” '
  '17':
  - type: text
    content: 'And he said, “Please ask King Solomon—he will not refuse you—to give me '
  - type: note
    content: ch. 1:3, 4
  - type: text
    content: 'Abishag the Shunammite as my wife.” '
  '18':
  - type: text
    content: Bathsheba said, “Very well; I will speak for you to the king.”
  '19':
  - type: text
    content: 'So Bathsheba went to King Solomon to speak to him on behalf of Adonijah. And the king rose to meet her and bowed down to her. Then he sat on his throne and had a seat brought for the king’s mother, '
  - type: note
    content: '[Ps. 45:9]'
  - type: text
    content: 'and she sat on his right. '
  '2':
  - type: note
    content: Josh. 23:14
  - type: text
    content: '“I am about to go the way of all the earth. '
  - type: note
    content: See Josh. 1:6, 7
  - type: text
    content: 'Be strong, and show yourself a man, '
  '20':
  - type: text
    content: 'Then she said, “I have one small request to make of you; do not refuse me.” And the king said to her, “Make your request, my mother, for I will not refuse you.” '
  '21':
  - type: text
    content: 'She said, “Let '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'Abishag the Shunammite be given to Adonijah your brother as his wife.” '
  '22':
  - type: text
    content: 'King Solomon answered his mother, “And why do you ask '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'Abishag the Shunammite for Adonijah? Ask for him the kingdom also, '
  - type: note
    content: ch. 1:6; 1 Chr. 3:2, 5
  - type: text
    content: 'for he is my older brother, and on his side '
  - type: note
    content: ch. 1:7
  - type: text
    content: are Abiathar
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew and for him and for Abiathar
  - type: text
    content: ' the priest and Joab the son of Zeruiah.” '
  '23':
  - type: text
    content: 'Then King Solomon swore by the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, '
  - type: note
    content: See Ruth 1:17
  - type: text
    content: '“God do so to me and more also if this word does not cost Adonijah his life! '
  '24':
  - type: text
    content: 'Now therefore '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who has established me and placed me on the throne of David my father, and who has made me a house, '
  - type: note
    content: 2 Sam. 7:11, 13; 1 Chr. 22:10
  - type: text
    content: 'as he promised, Adonijah shall be put to death today.” '
  '25':
  - type: text
    content: 'So King Solomon sent '
  - type: note
    content: 2 Sam. 8:18
  - type: text
    content: Benaiah the son of Jehoiada, and he struck him down, and he died.
  '26':
  - type: text
    content: 'And to Abiathar the priest the king said, “Go to '
  - type: note
    content: Josh. 21:18
  - type: text
    content: 'Anathoth, to your estate, for you deserve death. But I will not at this time put you to death, '
  - type: note
    content: 1 Sam. 23:6; 2 Sam. 15:24, 29
  - type: text
    content: 'because you carried the ark of the Lord '
  - type: text
    content: God
  - type: text
    content: ' before David my father, '
  - type: note
    content: See 1 Sam. 22:20-23
  - type: text
    content: 'and because you shared in all my father’s affliction.” '
  '27':
  - type: note
    content: '[ver. 35]'
  - type: text
    content: 'So Solomon expelled Abiathar from being priest to the '
  - type: text
    content: Lord
  - type: text
    content: ', thus fulfilling '
  - type: note
    content: See 1 Sam. 2:27-36
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he had spoken concerning the house of Eli in Shiloh.'
  '28':
  - type: text
    content: 'When the news came to Joab—for Joab '
  - type: note
    content: ch. 1:7
  - type: text
    content: 'had supported Adonijah although '
  - type: note
    content: 2 Sam. 17:25; 18:2
  - type: text
    content: 'he had not supported Absalom—Joab fled to the tent of the '
  - type: text
    content: Lord
  - type: text
    content: ' and caught hold of the '
  - type: note
    content: ch. 1:50
  - type: text
    content: 'horns of the altar. '
  '29':
  - type: text
    content: 'And when it was told King Solomon, “Joab has fled to the tent of the '
  - type: text
    content: Lord
  - type: text
    content: ', and behold, he is beside the altar,” Solomon sent Benaiah the son of Jehoiada, saying, “Go, strike him down.” '
  '3':
  - type: text
    content: 'and keep the charge of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, walking in his ways and keeping his statutes, his commandments, his rules, and his testimonies, as it is written in the Law of Moses, '
  - type: note
    content: Deut. 29:9; 1 Chr. 22:12, 13
  - type: text
    content: 'that you may prosper in all that you do and wherever you turn, '
  '30':
  - type: text
    content: 'So Benaiah came to the tent of the '
  - type: text
    content: Lord
  - type: text
    content: ' and said to him, “The king commands, ‘Come out.’” But he said, “No, I will die here.” Then Benaiah brought the king word again, saying, “Thus said Joab, and thus he answered me.” '
  '31':
  - type: text
    content: 'The king replied to him, '
  - type: note
    content: '[Ex. 21:14]'
  - type: text
    content: '“Do as he has said, strike him down and bury him, '
  - type: note
    content: Num. 35:33; Deut. 19:13; 21:8, 9
  - type: text
    content: 'and thus take away from me and from my father’s house the guilt for the blood that Joab shed without cause. '
  '32':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: See Judg. 9:24
  - type: text
    content: 'bring back his bloody deeds on his own head, because, without the knowledge of my father David, he attacked and killed with the sword two men '
  - type: note
    content: 2 Chr. 21:13
  - type: text
    content: 'more righteous and better than himself, '
  - type: note
    content: ver. 5; 2 Sam. 3:27
  - type: text
    content: 'Abner the son of Ner, commander of the army of Israel, and '
  - type: note
    content: 2 Sam. 20:9, 10
  - type: text
    content: 'Amasa the son of Jether, commander of the army of Judah. '
  '33':
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'So shall their blood come back on the head of Joab and on the head of his descendants forever. But for David and for his descendants and for his house and for his throne there shall be peace from the '
  - type: text
    content: Lord
  - type: text
    content: ' forevermore.” '
  '34':
  - type: text
    content: 'Then Benaiah the son of Jehoiada went up and struck him down and put him to death. And he was buried in his own house in the wilderness. '
  '35':
  - type: note
    content: ch. 4:4
  - type: text
    content: 'The king put Benaiah the son of Jehoiada over the army in place of Joab, and the king put '
  - type: note
    content: 1 Chr. 29:22
  - type: text
    content: 'Zadok the priest '
  - type: note
    content: ver. 27
  - type: text
    content: in the place of Abiathar.
  '36':
  - type: text
    content: 'Then the king sent and summoned '
  - type: note
    content: ver. 8
  - type: text
    content: 'Shimei and said to him, “Build yourself a house in Jerusalem and dwell there, and do not go out from there to any place whatever. '
  '37':
  - type: text
    content: 'For on the day you go out and cross '
  - type: note
    content: 2 Sam. 15:23
  - type: text
    content: 'the brook Kidron, know for certain that you shall die. '
  - type: note
    content: See 2 Sam. 1:16
  - type: text
    content: 'Your blood shall be on your own head.” '
  '38':
  - type: text
    content: And Shimei said to the king, “What you say is good; as my lord the king has said, so will your servant do.” So Shimei lived in Jerusalem many days.
  '39':
  - type: text
    content: 'But it happened at the end of three years that two of Shimei’s servants ran away to '
  - type: note
    content: '[1 Sam. 27:2]'
  - type: text
    content: 'Achish, son of Maacah, king of Gath. And when it was told Shimei, “Behold, your servants are in Gath,” '
  '4':
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' may '
  - type: note
    content: 2 Sam. 7:25
  - type: text
    content: 'establish his word that he spoke concerning me, saying, '
  - type: note
    content: Ps. 132:12
  - type: text
    content: '‘If your sons pay close attention to their way, '
  - type: note
    content: '[ch. 3:6; 9:4; 2 Kgs. 20:3]'
  - type: text
    content: 'to walk before me in faithfulness with all their heart and with all their soul, '
  - type: note
    content: ch. 8:25; 9:5; 2 Sam. 7:12, 13
  - type: text
    content: you shall not lack
  - type: note
    content: Hebrew there shall not be cut off for you
  - type: text
    content: ' a man on the throne of Israel.’'
  '40':
  - type: text
    content: 'Shimei arose and saddled a donkey and went to Gath to Achish to seek his servants. Shimei went and brought his servants from Gath. '
  '41':
  - type: text
    content: 'And when Solomon was told that Shimei had gone from Jerusalem to Gath and returned, '
  '42':
  - type: text
    content: 'the king sent and summoned Shimei and said to him, “Did I not make you swear by the '
  - type: text
    content: Lord
  - type: text
    content: ' and solemnly warn you, saying, ‘Know for certain that on the day you go out and go to any place whatever, you shall die’? And you said to me, ‘What you say is good; I will obey.’ '
  '43':
  - type: text
    content: 'Why then have you not kept your oath to the '
  - type: text
    content: Lord
  - type: text
    content: ' and the commandment with which I commanded you?” '
  '44':
  - type: text
    content: 'The king also said to Shimei, “You know in your own heart '
  - type: note
    content: See 2 Sam. 16:5-14
  - type: text
    content: 'all the harm that you did to David my father. So the '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: See 1 Sam. 25:39
  - type: text
    content: 'bring back your harm on your own head. '
  '45':
  - type: text
    content: 'But King Solomon shall be blessed, '
  - type: note
    content: '[Prov. 25:5]'
  - type: text
    content: 'and the throne of David shall be established before the '
  - type: text
    content: Lord
  - type: text
    content: ' forever.” '
  '46':
  - type: text
    content: Then the king commanded Benaiah the son of Jehoiada, and he went out and struck him down, and he died.
  - type: note
    content: ver. 12 ; [2 Chr. 1:1]
  - type: text
    content: So the kingdom was established in the hand of Solomon.
  '5':
  - type: text
    content: '“Moreover, you also know what Joab the son of Zeruiah '
  - type: note
    content: 2 Sam. 18:5, 12, 14; [2 Sam. 3:39]
  - type: text
    content: 'did to me, how he dealt with the two commanders of the armies of Israel, '
  - type: note
    content: ver. 32; 2 Sam. 3:27
  - type: text
    content: 'Abner the son of Ner, '
  - type: note
    content: 2 Sam. 20:10
  - type: text
    content: and Amasa the son of Jether, whom he killed, avenging
  - type: note
    content: Septuagint; Hebrew placing
  - type: text
    content: ' in time of peace for blood that had been shed in war, and putting the blood of war'
  - type: note
    content: Septuagint innocent blood
  - type: text
    content: ' on the belt around his'
  - type: note
    content: Septuagint my; twice in this verse
  - type: text
    content: ' waist and on the sandals on his feet. '
  '6':
  - type: text
    content: 'Act therefore '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'according to your wisdom, but do not let his gray head go down to Sheol in peace. '
  '7':
  - type: text
    content: 'But deal loyally with the sons of '
  - type: note
    content: See 2 Sam. 19:31-38
  - type: text
    content: 'Barzillai the Gileadite, and let them be '
  - type: note
    content: 2 Sam. 9:7, 10
  - type: text
    content: 'among those who eat at your table, '
  - type: note
    content: 2 Sam. 17:27-29
  - type: text
    content: for with such loyalty
  - type: note
    content: Or steadfast love
  - type: text
    content: ' they met me when I fled from Absalom your brother. '
  '8':
  - type: text
    content: 'And there is also with you '
  - type: note
    content: 2 Sam. 16:5
  - type: text
    content: 'Shimei the son of Gera, the Benjaminite from Bahurim, who cursed me with a grievous curse on the day '
  - type: note
    content: 2 Sam. 17:24
  - type: text
    content: 'when I went to Mahanaim. '
  - type: note
    content: 2 Sam. 19:18
  - type: text
    content: 'But when he came down to meet me at the Jordan, I swore to him by the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘I will not put you to death with the sword.’ '
  '9':
  - type: text
    content: 'Now therefore do not hold him guiltless, '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'for you are a wise man. You will know what you ought to do to him, and you shall '
  - type: note
    content: '[Gen. 42:38; 44:31]'
  - type: text
    content: bring his gray head down with blood to Sheol.”
  - type: heading
    content: The Death of David
