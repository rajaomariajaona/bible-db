  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Bathsheba went to King Solomon to speak to him on behalf of Adonijah. And the king rose to meet her and bowed down to her. Then he sat on his throne and had a seat brought for the king’s mother, '
