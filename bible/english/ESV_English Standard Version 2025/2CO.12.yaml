document_id: 2CO.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Visions and His Thorn
  - type: text
    content: 'I must go on boasting. Though there is nothing to be gained by it, I will go on to visions and '
  - type: note
    content: Gal. 1:12; 2:2; Eph. 3:3
  - type: text
    content: 'revelations of the Lord. '
  '10':
  - type: note
    content: '[ch. 5:15]; See Matt. 5:11, 12'
  - type: text
    content: 'For the sake of Christ, then, '
  - type: note
    content: Rom. 5:3
  - type: text
    content: 'I am content with weaknesses, insults, hardships, persecutions, and calamities. For '
  - type: note
    content: '[ch. 13:4]'
  - type: text
    content: when I am weak, then I am strong.
  - type: heading
    content: Concern for the Corinthian Church
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 6 ]'
  - type: text
    content: 'I have been a fool! You forced me to it, for I ought to have been commended by you. For I was '
  - type: note
    content: See ch. 11:5; 1 Cor. 15:10
  - type: text
    content: 'not at all inferior to these super-apostles, '
  - type: note
    content: See 1 Cor. 3:7; 15:9
  - type: text
    content: 'even though I am nothing. '
  '12':
  - type: note
    content: See Rom. 15:19; 1 Cor. 9:1
  - type: text
    content: 'The signs of a true apostle were performed among you '
  - type: note
    content: ch. 6:4
  - type: text
    content: 'with utmost patience, with signs and wonders and mighty works. '
  '13':
  - type: text
    content: 'For in what were you less favored than the rest of the churches, except that '
  - type: note
    content: 1 Cor. 9:12; See Acts 20:33
  - type: text
    content: I myself did not burden you? Forgive me this wrong!
  '14':
  - type: text
    content: 'Here '
  - type: note
    content: ch. 13:1; [ch. 1:15; 13:2]
  - type: text
    content: 'for the third time I am ready to come to you. And I will not be a burden, for '
  - type: note
    content: 1 Cor. 10:24, 33
  - type: text
    content: 'I seek not what is yours but you. For '
  - type: note
    content: 1 Cor. 4:14, 15
  - type: text
    content: 'children are not obligated to save up for their parents, but '
  - type: note
    content: '[Prov. 19:14; Ezek. 34:2]'
  - type: text
    content: 'parents for their children. '
  '15':
  - type: note
    content: '[ch. 1:6; Phil. 2:17; Col. 1:24; 1 Thess. 2:8; 2 Tim. 2:10]'
  - type: text
    content: 'I will most gladly spend and be spent for your souls. If '
  - type: note
    content: See ch. 6:11
  - type: text
    content: 'I love you more, am I to be loved less? '
  '16':
  - type: text
    content: 'But granting that '
  - type: note
    content: ch. 11:9
  - type: text
    content: 'I myself did not burden you, I was crafty, you say, and got the better of you by deceit. '
  '17':
  - type: text
    content: 'Did I take advantage of you '
  - type: note
    content: '[ch. 9:5]'
  - type: text
    content: 'through any of those whom I sent to you? '
  '18':
  - type: note
    content: ch. 8:6
  - type: text
    content: 'I urged Titus to go, and sent '
  - type: note
    content: ch. 8:18
  - type: text
    content: the brother with him. Did Titus take advantage of you? Did we not act in the same spirit? Did we not take the same steps?
  '19':
  - type: text
    content: 'Have you been thinking all along that we have been defending ourselves to you? It is '
  - type: note
    content: See Rom. 1:9; 9:1
  - type: text
    content: 'in the sight of God that we have been speaking in Christ, and '
  - type: note
    content: See 1 Cor. 14:26
  - type: text
    content: 'all for your upbuilding, beloved. '
  '2':
  - type: text
    content: 'I know a man '
  - type: note
    content: See ch. 5:17
  - type: text
    content: 'in Christ who fourteen years ago was '
  - type: note
    content: ver. 3; 1 Thess. 4:17; Rev. 12:5; [Ezek. 8:3; Acts 8:39]
  - type: text
    content: 'caught up to '
  - type: note
    content: See Ps. 148:4
  - type: text
    content: 'the third heaven—whether in the body or out of the body I do not know, '
  - type: note
    content: ch. 11:11
  - type: text
    content: 'God knows. '
  '20':
  - type: text
    content: 'For I fear that perhaps '
  - type: note
    content: '[ch. 2:1-4]; See 1 Cor. 4:21'
  - type: text
    content: 'when I come I may find you not as I wish, and that you may find me not as you wish—that perhaps there may be quarreling, jealousy, anger, hostility, slander, gossip, conceit, and disorder. '
  '21':
  - type: text
    content: 'I fear that when I come again my God may humble me before you, and I may have to mourn over many of those '
  - type: note
    content: ch. 13:2; [Rev. 2:21]
  - type: text
    content: 'who sinned earlier and have not repented of the impurity, '
  - type: note
    content: 1 Cor. 5:1; See 1 Cor. 6:18
  - type: text
    content: sexual immorality, and sensuality that they have practiced.
  '3':
  - type: text
    content: 'And I know that this man was caught up into '
  - type: note
    content: Luke 23:43; Rev. 2:7; [Gen. 2:8]
  - type: text
    content: 'paradise—whether in the body or out of the body I do not know, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'God knows— '
  '4':
  - type: text
    content: 'and he heard things that cannot be told, which man may not utter. '
  '5':
  - type: text
    content: 'On behalf of this man I will boast, but on my own behalf I will not boast, '
  - type: note
    content: See 1 Cor. 2:3
  - type: text
    content: 'except of my weaknesses— '
  '6':
  - type: text
    content: 'though if I should wish to boast, '
  - type: note
    content: ch. 5:13; 11:16, 17; [ver. 11]
  - type: text
    content: 'I would not be a fool, for I would be speaking the truth; but I refrain from it, so that no one may think more of me than he sees in me or hears from me. '
  '7':
  - type: text
    content: 'So '
  - type: note
    content: '[ch. 10:10]'
  - type: text
    content: to keep me from becoming conceited because of the surpassing greatness of the revelations,
  - type: note
    content: Or hears from me, even because of the surpassing greatness of the revelations. So to keep me from becoming conceited
  - type: text
    content: ' '
  - type: note
    content: '[Num. 33:55; Ezek. 28:24]'
  - type: text
    content: 'a thorn was given me in the flesh, '
  - type: note
    content: '[Luke 13:16]; See 1 Cor. 5:5'
  - type: text
    content: 'a messenger of Satan to harass me, to keep me from becoming conceited. '
  '8':
  - type: note
    content: '[Matt. 26:44]'
  - type: text
    content: 'Three times I pleaded with the Lord about this, that it should leave me. '
  '9':
  - type: text
    content: 'But he said to me, '
  - type: note
    content: Isa. 43:2
  - type: text
    content: '“My grace is sufficient for you, for '
  - type: note
    content: Isa. 40:29-31; [Phil. 4:13]
  - type: text
    content: my power is made perfect in weakness.”
  - type: text
    content: ' Therefore I will boast all the more gladly of my weaknesses, so that '
  - type: note
    content: See 1 Cor. 2:5
  - type: text
    content: 'the power of Christ may rest upon me. '
