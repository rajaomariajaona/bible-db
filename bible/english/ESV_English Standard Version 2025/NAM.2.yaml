    content: The Destruction of Nineveh
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 51:20 ]'
  - type: text
    content: The scatterer has come up against you.
  - type: note
    content: '[ Jer. 51:12 ]'
  - type: text
    content: Man the ramparts;
  - type: text
    content: watch the road;
  - type: text
    content: dress for battle;
  - type: note
    content: Hebrew gird your loins
  - type: text
    content: collect all your strength.
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Zeph. 2:13-15
  - type: text
    content: Desolate! Desolation and ruin!
  - type: note
    content: Ps. 22:14; Isa. 13:7
  - type: text
    content: 'Hearts melt and '
  - type: note
    content: Dan. 5:6
  - type: text
    content: knees tremble;
  - type: note
    content: Isa. 21:3
  - type: text
    content: anguish is in all loins;
  - type: note
    content: Joel 2:6
  - type: text
    content: all faces grow pale!
  '11':
  - type: text
    content: Where is the lions’ den,
  - type: text
    content: 'the feeding place of '
  - type: note
    content: Isa. 5:29; Jer. 2:15
  - type: text
    content: the young lions,
  - type: text
    content: where the lion and lioness went,
  - type: text
    content: 'where his cubs were, with '
  - type: note
    content: See Isa. 17:2
  - type: text
    content: none to disturb?
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 19:3 ]'
  - type: text
    content: The lion tore enough for his cubs
  - type: text
    content: 'and '
  - type: note
    content: '[ver. 9; ch. 3:1]'
  - type: text
    content: strangled prey for his lionesses;
  - type: text
    content: he filled his caves with prey
  - type: text
    content: and his dens with torn flesh.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:5; [ Zeph. 2:5 ]; See Ezek. 13:8
  - type: text
    content: 'Behold, I am against you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and '
  - type: note
    content: '[Ps. 46:9]'
  - type: text
    content: I will burn your
  - type: note
    content: Hebrew her
  - type: text
    content: ' chariots in smoke, and the sword shall devour your young lions. I will cut off your prey from the earth, and '
  - type: note
    content: '[2 Kgs. 19:9, 23]'
  - type: text
    content: the voice of your messengers shall no longer be heard.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: '[Isa. 37:31]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is restoring the majesty of Jacob'
  - type: text
    content: as the majesty of Israel,
  - type: text
    content: for plunderers have plundered them
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 80:8-13; Isa. 5:1-7
  - type: text
    content: ruined their branches.
  '3':
  - type: text
    content: The shield of his mighty men is red;
  - type: note
    content: '[ Ezek. 23:14, 15 ]'
  - type: text
    content: his soldiers are clothed in scarlet.
  - type: text
    content: The chariots come with flashing metal
  - type: text
    content: on the day he musters them;
  - type: text
    content: the cypress spears are brandished.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:2 ]'
  - type: text
    content: The chariots race madly through the streets;
  - type: text
    content: they rush to and fro through the squares;
  - type: text
    content: they gleam like torches;
  - type: text
    content: they dart like lightning.
  '5':
  - type: text
    content: 'He remembers '
  - type: note
    content: ch. 3:18
  - type: text
    content: his officers;
  - type: note
    content: Jer. 46:12
  - type: text
    content: they stumble as they go,
  - type: text
    content: they hasten to the wall;
  - type: text
    content: the siege tower
  - type: note
    content: Or the mantelet
  - type: text
    content: ' is set up.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 45:1 ]'
  - type: text
    content: The river gates are opened;
  - type: text
    content: 'the palace '
  - type: note
    content: '[Isa. 14:31]'
