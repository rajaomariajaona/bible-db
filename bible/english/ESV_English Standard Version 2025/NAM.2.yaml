    content: melts away;
  '7':
  - type: text
    content: its mistress
  - type: note
    content: The meaning of the Hebrew word rendered its mistress is uncertain
  - type: text
    content: ' is '
  - type: note
    content: '[Isa. 22:8]'
  - type: text
    content: stripped;
  - type: note
    content: Or exiled
  - type: text
    content: ' she is carried off,'
  - type: text
    content: 'her slave girls '
  - type: note
    content: Isa. 38:14
  - type: text
    content: lamenting,
  - type: text
    content: moaning like doves
  - type: text
    content: and beating their breasts.
  '8':
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:1
  - type: text
    content: Nineveh is like a pool
  - type: text
    content: whose waters run away.
  - type: note
    content: Compare Septuagint; the meaning of the Hebrew is uncertain
  - type: text
    content: “Halt! Halt!” they cry,
  - type: text
    content: 'but '
  - type: note
    content: Jer. 46:5
  - type: text
    content: none turns back.
  '9':
  - type: text
    content: Plunder the silver,
  - type: text
    content: plunder the gold!
  - type: text
    content: There is no end of the treasure
  - type: text
    content: or of the wealth of all precious things.
