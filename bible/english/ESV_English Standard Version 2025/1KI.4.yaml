document_id: 1KI.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Officials
  - type: text
    content: 'King Solomon was king over all Israel, '
  '10':
  - type: text
    content: 'Ben-hesed, in Arubboth (to him belonged Socoh and all the land of Hepher); '
  '11':
  - type: text
    content: 'Ben-abinadab, in all '
  - type: note
    content: Josh. 11:2
  - type: text
    content: 'Naphath-dor (he had Taphath the daughter of Solomon as his wife); '
  '12':
  - type: text
    content: 'Baana the son of Ahilud, in '
  - type: note
    content: '[Josh. 17:11]'
  - type: text
    content: 'Taanach, Megiddo, and all '
  - type: note
    content: '[Josh. 17:11]'
  - type: text
    content: 'Beth-shean that is beside Zarethan below Jezreel, and from Beth-shean to Abel-meholah, as far as the other side of Jokmeam; '
  '13':
  - type: text
    content: 'Ben-geber, '
  - type: note
    content: '[ch. 22:3]'
  - type: text
    content: 'in Ramoth-gilead (he had '
  - type: note
    content: Num. 32:41
  - type: text
    content: 'the villages of Jair the son of Manasseh, which are in Gilead, and he had '
  - type: note
    content: Deut. 3:4
  - type: text
    content: 'the region of Argob, which is in Bashan, sixty great cities with walls and bronze bars); '
  '14':
  - type: text
    content: 'Ahinadab the son of Iddo, in Mahanaim; '
  '15':
  - type: text
    content: 'Ahimaaz, in Naphtali (he had taken Basemath the daughter of Solomon as his wife); '
  '16':
  - type: text
    content: 'Baana the son of Hushai, in Asher and Bealoth; '
  '17':
  - type: text
    content: 'Jehoshaphat the son of Paruah, in Issachar; '
  '18':
  - type: note
    content: ch. 1:8
  - type: text
    content: 'Shimei the son of Ela, in Benjamin; '
  '19':
  - type: text
    content: 'Geber the son of Uri, in the land of Gilead, '
  - type: note
    content: Deut. 3:8-10
  - type: text
    content: the country of Sihon king of the Amorites and of Og king of Bashan. And there was one governor who was over the land.
  - type: heading
    content: Solomon’s Wealth and Wisdom
  '2':
  - type: text
    content: 'and these were his high officials: Azariah the son of Zadok was '
  - type: note
    content: 1 Chr. 6:10
  - type: text
    content: 'the priest; '
  '20':
  - type: text
    content: 'Judah and Israel were as many '
  - type: note
    content: Gen. 22:17; [ch. 3:8; 2 Chr. 1:9]
  - type: text
    content: 'as the sand by the sea. They ate and drank and were happy. '
  '21':
  - type: note
    content: Ch 5:1 in Hebrew
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 9:26
  - type: text
    content: 'Solomon ruled over all the kingdoms from the '
  - type: note
    content: Gen. 15:18; Ex. 23:31; Josh. 1:4; Ps. 72:8
  - type: text
    content: Euphrates
  - type: note
    content: Hebrew the River
  - type: text
    content: ' to the land of the Philistines and to the border of Egypt. '
  - type: note
    content: Ps. 68:29; 72:10, 11
  - type: text
    content: They brought tribute and served Solomon all the days of his life.
  '22':
  - type: text
    content: Solomon’s provision for one day was thirty cors
  - type: note
    content: A cor was about 6 bushels or 220 liters
  - type: text
    content: ' of fine flour and sixty cors of meal, '
  '23':
  - type: text
    content: 'ten fat oxen, and twenty pasture-fed cattle, a hundred sheep, besides deer, gazelles, roebucks, and fattened fowl. '
  '24':
  - type: text
    content: For he had dominion over all the region west of the Euphrates
  - type: note
    content: Hebrew the River; twice in this verse
  - type: text
    content: ' from Tiphsah to '
  - type: note
    content: Gen. 10:19
  - type: text
    content: 'Gaza, over all the kings west of the Euphrates. '
  - type: note
    content: 1 Chr. 22:9
  - type: text
    content: 'And he had peace on all sides around him. '
  '25':
  - type: text
    content: 'And Judah and Israel '
  - type: note
    content: Jer. 23:6; 32:37; Ezek. 28:26
  - type: text
    content: 'lived in safety, '
  - type: note
    content: See 2 Sam. 3:10
  - type: text
    content: 'from Dan even to Beersheba, '
  - type: note
    content: Mic. 4:4; Zech. 3:10; [2 Kgs. 18:31; Isa. 36:16]
  - type: text
    content: 'every man under his vine and under his fig tree, all the days of Solomon. '
  '26':
  - type: note
    content: '[ch. 10:26; 2 Chr. 1:14; 9:25]'
  - type: text
    content: Solomon also had 40,000
  - type: note
    content: Hebrew; one Hebrew manuscript (see 2 Chronicles 9:25 and Septuagint of 1 Kings 10:26) 4,000
  - type: text
    content: ' stalls of horses for his chariots, and 12,000 horsemen. '
  '27':
  - type: text
    content: 'And those officers supplied provisions for King Solomon, and for all who came to King Solomon’s table, each one in his month. They let nothing be lacking. '
  '28':
  - type: text
    content: 'Barley also and straw for the horses and '
  - type: note
    content: Esth. 8:10, 14; Mic. 1:13
  - type: text
    content: swift steeds they brought to the place where it was required, each according to his duty.
  '29':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'And God gave Solomon wisdom and understanding beyond measure, and breadth of mind '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'like the sand on the seashore, '
  '3':
  - type: text
    content: 'Elihoreph and Ahijah the sons of Shisha were secretaries; '
  - type: note
    content: 2 Sam. 8:16; 20:24
  - type: text
    content: 'Jehoshaphat the son of Ahilud was recorder; '
  '30':
  - type: text
    content: 'so that Solomon’s wisdom surpassed the wisdom of all '
  - type: note
    content: Judg. 6:3
  - type: text
    content: 'the people of the east '
  - type: note
    content: Acts 7:22; [Isa. 19:11]
  - type: text
    content: 'and all the wisdom of Egypt. '
  '31':
  - type: text
    content: 'For he was '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'wiser than all other men, wiser than Ethan the Ezrahite, and Heman, Calcol, and Darda, the sons of Mahol, and his fame was in all the surrounding nations. '
  '32':
  - type: note
    content: Prov. 1:1; Eccles. 12:9
  - type: text
    content: 'He also spoke 3,000 proverbs, '
  - type: note
    content: Song 1:1
  - type: text
    content: 'and his songs were 1,005. '
  '33':
  - type: text
    content: 'He spoke of trees, from the cedar that is in Lebanon to the hyssop that grows out of the wall. He spoke also of beasts, and of birds, and of reptiles, and of fish. '
  '34':
  - type: text
    content: 'And people of all nations came to hear the wisdom of Solomon, and from '
  - type: note
    content: 2 Chr. 9:23; [ch. 10:1]
  - type: text
    content: all the kings of the earth, who had heard of his wisdom.
  '4':
  - type: note
    content: ch. 2:35
  - type: text
    content: 'Benaiah the son of Jehoiada was in command of the army; '
  - type: note
    content: 2 Sam. 20:25; [ch. 2:27, 35]
  - type: text
    content: 'Zadok and Abiathar were priests; '
  '5':
  - type: text
    content: 'Azariah the son of Nathan was over '
  - type: note
    content: ver. 7
  - type: text
    content: 'the officers; Zabud the son of Nathan was priest and '
  - type: note
    content: '[2 Sam. 15:37; 16:16; 1 Chr. 27:33]'
  - type: text
    content: 'king’s friend; '
  '6':
  - type: text
    content: 'Ahishar was in charge of the palace; and '
  - type: note
    content: ch. 5:14; [ch. 12:18; 2 Sam. 20:24; 2 Chr. 10:18]
  - type: text
    content: 'Adoniram the son of Abda was in charge of '
  - type: note
    content: '[ch. 9:15]'
  - type: text
    content: the forced labor.
  '7':
  - type: text
    content: 'Solomon had twelve officers over all Israel, who provided food for the king and his household. Each man had to make provision for one month in the year. '
  '8':
  - type: text
    content: 'These were their names: Ben-hur, in '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim; '
  '9':
  - type: text
    content: 'Ben-deker, in Makaz, Shaalbim, Beth-shemesh, and Elonbeth-hanan; '
