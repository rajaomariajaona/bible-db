document_id: 2CH.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat Allies with Ahab
  - type: text
    content: 'Now Jehoshaphat '
  - type: note
    content: ch. 17:5
  - type: text
    content: 'had great riches and honor, '
  - type: note
    content: ch. 21:6; 2 Kgs. 8:18
  - type: text
    content: 'and he made a marriage alliance with Ahab. '
  '10':
  - type: text
    content: 'And Zedekiah the son of Chenaanah made for himself horns of iron and said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘With these you shall push the Syrians until they are destroyed.’” '
  '11':
  - type: text
    content: 'And all the prophets prophesied so and said, “Go up to Ramoth-gilead and triumph. The '
  - type: text
    content: Lord
  - type: text
    content: ' will give it into the hand of the king.”'
  '12':
  - type: text
    content: 'And the messenger who went to summon Micaiah said to him, “Behold, the words of the prophets with one accord are favorable to the king. Let your word be like the word of one of them, and speak favorably.” '
  '13':
  - type: text
    content: 'But Micaiah said, '
  - type: note
    content: 1 Kgs. 17:1
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: Num. 22:18; 24:13
  - type: text
    content: 'what my God says, that I will speak.” '
  '14':
  - type: text
    content: 'And when he had come to the king, the king said to him, “Micaiah, shall we go to Ramoth-gilead to battle, or shall I refrain?” And he answered, “Go up and triumph; they will be given into your hand.” '
  '15':
  - type: text
    content: 'But the king said to him, “How many times shall I make you swear that you speak to me nothing but the truth in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '16':
  - type: text
    content: 'And he said, “I saw all Israel scattered on the mountains, '
  - type: note
    content: Num. 27:17; Matt. 9:36
  - type: text
    content: 'as sheep that have no shepherd. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘These have no master; let each return to his home in peace.’” '
  '17':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, “Did I not tell you that he would not prophesy good concerning me, but evil?” '
  '18':
  - type: text
    content: 'And Micaiah said, “Therefore hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See 1 Kgs. 22:19
  - type: text
    content: 'I saw the '
  - type: text
    content: Lord
  - type: text
    content: ' sitting on his throne, and all the host of heaven standing on his right hand and on his left. '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Who will entice Ahab the king of Israel, that he may go up and fall at Ramoth-gilead?’ And one said one thing, and another said another. '
  '2':
  - type: note
    content: For ver. 2-34, see 1 Kgs. 22:2-35
  - type: text
    content: 'After some years he went down to Ahab in Samaria. And Ahab killed an abundance of sheep and oxen for him and for the people who were with him, and induced him to go up against Ramoth-gilead. '
  '20':
  - type: text
    content: 'Then a spirit came forward and stood before the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘I will entice him.’ And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, ‘By what means?’ '
  '21':
  - type: text
    content: 'And he said, ‘I will go out, and will be '
  - type: note
    content: See 1 Kgs. 22:22
  - type: text
    content: 'a lying spirit in the mouth of all his prophets.’ And he said, ‘You are to entice him, and you shall succeed; go out and do so.’ '
  '22':
  - type: text
    content: 'Now therefore behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' has put a lying spirit in the mouth of these your prophets. The '
  - type: text
    content: Lord
  - type: text
    content: ' has declared disaster concerning you.”'
  '23':
  - type: text
    content: 'Then Zedekiah the son of Chenaanah came near '
  - type: note
    content: See 1 Kgs. 22:24
  - type: text
    content: 'and struck Micaiah on the cheek and said, “Which way did the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' go from me to speak to you?” '
  '24':
  - type: text
    content: 'And Micaiah said, “Behold, you shall see on that day when you go into an inner chamber to hide yourself.” '
  '25':
  - type: text
    content: 'And the king of Israel said, “Seize Micaiah and take him back to Amon '
  - type: note
    content: ch. 34:8
  - type: text
    content: 'the governor of the city and to Joash the king’s son, '
  '26':
  - type: text
    content: 'and say, ‘Thus says the king, '
  - type: note
    content: See ch. 16:10
  - type: text
    content: 'Put this fellow in prison and feed him with meager rations of bread and water until I return in peace.’” '
  '27':
  - type: text
    content: 'And Micaiah said, “If you return in peace, the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken by me.” And he said, '
  - type: note
    content: Mic. 1:2
  - type: text
    content: “Hear, all you peoples!”
  - type: heading
    content: The Defeat and Death of Ahab
  '28':
  - type: text
    content: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  '29':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, “I will disguise myself and go into battle, but you wear your robes.” And the king of Israel disguised himself, and they went into battle. '
  '3':
  - type: text
    content: Ahab king of Israel said to Jehoshaphat king of Judah, “Will you go with me to Ramoth-gilead?” He answered him, “I am as you are, my people as your people. We will be with you in the war.”
  '30':
  - type: text
    content: 'Now the king of Syria had commanded the captains of his chariots, “Fight with neither small nor great, but only with the king of Israel.” '
  '31':
  - type: text
    content: 'As soon as the captains of the chariots saw Jehoshaphat, they said, “It is the king of Israel.” So they turned to fight against him. And Jehoshaphat cried out, and the '
  - type: text
    content: Lord
  - type: text
    content: ' helped him; God drew them away from him. '
  '32':
  - type: text
    content: 'For as soon as the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him. '
  '33':
  - type: text
    content: But a certain man drew his bow at random
  - type: note
    content: Hebrew in his innocence
  - type: text
    content: ' and struck the king of Israel between the scale armor and the breastplate. Therefore he said to the driver of his chariot, “Turn around and carry me out of the battle, for I am wounded.” '
  '34':
  - type: text
    content: And the battle continued that day, and the king of Israel was propped up in his chariot facing the Syrians until evening. Then at sunset he died.
  '4':
  - type: text
    content: 'And Jehoshaphat said to the king of Israel, “Inquire first for the word of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '5':
  - type: text
    content: 'Then the king of Israel gathered the prophets together, four hundred men, and said to them, “Shall we go to battle against Ramoth-gilead, or shall I refrain?” And they said, “Go up, for God will give it into the hand of the king.” '
  '6':
  - type: text
    content: 'But Jehoshaphat said, “Is there not here another prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' of whom we may inquire?” '
  '7':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, “There is yet one man by whom we may inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', Micaiah the son of Imlah; but I hate him, for he never prophesies good concerning me, but always evil.” And Jehoshaphat said, “Let not the king say so.” '
  '8':
  - type: text
    content: 'Then the king of Israel summoned an officer and said, “Bring quickly Micaiah the son of Imlah.” '
  '9':
  - type: text
    content: 'Now the king of Israel and Jehoshaphat the king of Judah were sitting on their thrones, arrayed in their robes. And they were sitting at the threshing floor '
  - type: note
    content: See Ruth 4:1
  - type: text
    content: 'at the entrance of the gate of Samaria, and all the prophets were prophesying before them. '
