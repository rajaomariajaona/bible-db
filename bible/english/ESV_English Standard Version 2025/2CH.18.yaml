document_id: 2CH.18,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Allies with Ahab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Jehoshaphat '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      marker-yv: yv-n
    - type: text
      text: 'had great riches and honor, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 8:18
      marker-yv: yv-n
    - type: text
      text: 'and he made a marriage alliance with Ahab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Zedekiah the son of Chenaanah made for himself horns of iron and said, “Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘With these you shall push the Syrians until they are destroyed.’” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And all the prophets prophesied so and said, “Go up to Ramoth-gilead and triumph. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give it into the hand of the king.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the messenger who went to summon Micaiah said to him, “Behold, the words of the prophets with one accord are favorable to the king. Let your word be like the word of one of them, and speak favorably.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But Micaiah said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 17:1
      marker-yv: yv-n
    - type: text
      text: '“As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 22:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:13
      marker-yv: yv-n
    - type: text
      text: 'what my God says, that I will speak.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when he had come to the king, the king said to him, “Micaiah, shall we go to Ramoth-gilead to battle, or shall I refrain?” And he answered, “Go up and triumph; they will be given into your hand.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But the king said to him, “How many times shall I make you swear that you speak to me nothing but the truth in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he said, “I saw all Israel scattered on the mountains, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 27:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 9:36
      marker-yv: yv-n
    - type: text
      text: 'as sheep that have no shepherd. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘These have no master; let each return to his home in peace.’” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the king of Israel said to Jehoshaphat, “Did I not tell you that he would not prophesy good concerning me, but evil?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Micaiah said, “Therefore hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:19
      marker-yv: yv-n
    - type: text
      text: 'I saw the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sitting on his throne, and all the host of heaven standing on his right hand and on his left. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘Who will entice Ahab the king of Israel, that he may go up and fall at Ramoth-gilead?’ And one said one thing, and another said another. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 2-34, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:2-35
      marker-yv: yv-n
    - type: text
      text: 'After some years he went down to Ahab in Samaria. And Ahab killed an abundance of sheep and oxen for him and for the people who were with him, and induced him to go up against Ramoth-gilead. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then a spirit came forward and stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, ‘I will entice him.’ And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, ‘By what means?’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And he said, ‘I will go out, and will be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:22
      marker-yv: yv-n
    - type: text
      text: 'a lying spirit in the mouth of all his prophets.’ And he said, ‘You are to entice him, and you shall succeed; go out and do so.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Now therefore behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has put a lying spirit in the mouth of these your prophets. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has declared disaster concerning you.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then Zedekiah the son of Chenaanah came near '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:24
      marker-yv: yv-n
    - type: text
      text: 'and struck Micaiah on the cheek and said, “Which way did the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' go from me to speak to you?” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And Micaiah said, “Behold, you shall see on that day when you go into an inner chamber to hide yourself.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the king of Israel said, “Seize Micaiah and take him back to Amon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:8
      marker-yv: yv-n
    - type: text
      text: 'the governor of the city and to Joash the king’s son, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and say, ‘Thus says the king, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:10
      marker-yv: yv-n
    - type: text
      text: 'Put this fellow in prison and feed him with meager rations of bread and water until I return in peace.’” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And Micaiah said, “If you return in peace, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken by me.” And he said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 1:2
      marker-yv: yv-n
    - type: text
      text: “Hear, all you peoples!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Defeat and Death of Ahab
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And the king of Israel said to Jehoshaphat, “I will disguise myself and go into battle, but you wear your robes.” And the king of Israel disguised himself, and they went into battle. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ahab king of Israel said to Jehoshaphat king of Judah, “Will you go with me to Ramoth-gilead?” He answered him, “I am as you are, my people as your people. We will be with you in the war.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Now the king of Syria had commanded the captains of his chariots, “Fight with neither small nor great, but only with the king of Israel.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'As soon as the captains of the chariots saw Jehoshaphat, they said, “It is the king of Israel.” So they turned to fight against him. And Jehoshaphat cried out, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helped him; God drew them away from him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'For as soon as the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: But a certain man drew his bow at random
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: in his innocence
      marker-yv: yv-n
    - type: text
      text: ' and struck the king of Israel between the scale armor and the breastplate. Therefore he said to the driver of his chariot, “Turn around and carry me out of the battle, for I am wounded.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And the battle continued that day, and the king of Israel was propped up in his chariot facing the Syrians until evening. Then at sunset he died.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Jehoshaphat said to the king of Israel, “Inquire first for the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the king of Israel gathered the prophets together, four hundred men, and said to them, “Shall we go to battle against Ramoth-gilead, or shall I refrain?” And they said, “Go up, for God will give it into the hand of the king.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But Jehoshaphat said, “Is there not here another prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of whom we may inquire?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the king of Israel said to Jehoshaphat, “There is yet one man by whom we may inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', Micaiah the son of Imlah; but I hate him, for he never prophesies good concerning me, but always evil.” And Jehoshaphat said, “Let not the king say so.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the king of Israel summoned an officer and said, “Bring quickly Micaiah the son of Imlah.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now the king of Israel and Jehoshaphat the king of Judah were sitting on their thrones, arrayed in their robes. And they were sitting at the threshing floor '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ruth 4:1
      marker-yv: yv-n
    - type: text
      text: 'at the entrance of the gate of Samaria, and all the prophets were prophesying before them. '
