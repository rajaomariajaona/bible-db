document_id: EXO.23,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 19:11; Ps. 15:3; 101:5 ]'
  - type: text
    content: '“You shall not spread a false report. You shall not join hands with a wicked man to be a '
  - type: note
    content: Deut. 19:16-18; Ps. 35:11; [1 Kgs. 21:10, 13; Matt. 26:59-61; Acts 6:11, 13]
  - type: text
    content: 'malicious witness. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Lev. 25:3, 4
  - type: text
    content: '“For six years you shall sow your land and gather in its yield, '
  '11':
  - type: text
    content: but the seventh year you shall let it rest and lie fallow, that the poor of your people may eat; and what they leave the beasts of the field may eat. You shall do likewise with your vineyard, and with your olive orchard.
  '12':
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:9
  - type: text
    content: “Six days you shall do your work, but on the seventh day you shall rest; that your ox and your donkey may have rest, and the son of your servant woman, and the alien, may be refreshed.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Deut. 4:9; Josh. 22:5; 23:7; Hos. 2:17; Zech. 13:2
  - type: text
    content: “Pay attention to all that I have said to you, and make no mention of the names of other gods, nor let it be heard on your lips.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ver. 17 ; ch. 34:23; Deut. 16:16
  - type: text
    content: '“Three times in the year you shall keep a feast to me. '
  '15':
  - type: note
    content: See ch. 12:15
  - type: text
    content: 'You shall keep the Feast of Unleavened Bread. As I commanded you, you shall eat unleavened bread for seven days at the appointed time in the month of '
  - type: note
    content: ch. 13:4
  - type: text
    content: 'Abib, for in it you came out of Egypt. '
  - type: note
    content: ch. 34:20; Deut. 16:16
  - type: text
    content: 'None shall appear before me empty-handed. '
  '16':
  - type: text
    content: 'You shall keep '
  - type: note
    content: ch. 34:22; See Lev. 23:9-21
  - type: text
    content: 'the Feast of Harvest, of the firstfruits of your labor, of what you sow in the field. You shall keep the '
  - type: note
    content: Deut. 16:13; See Lev. 23:34-44
  - type: text
    content: 'Feast of Ingathering at the end of the year, when you gather in from the field the fruit of your labor. '
  '17':
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'Three times in the year shall all your males appear before the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:8; 34:25; Lev. 2:11
  - type: text
    content: “You shall not offer the blood of my sacrifice with anything leavened, or let the fat of my feast remain until the morning.
  '19':
  - type: text
    content: '“The best of the '
  - type: note
    content: ch. 34:26; Lev. 2:12; 23:10, 17; Num. 18:12, 13; Deut. 26:2, 10; Neh. 10:35; Ezek. 44:30
  - type: text
    content: 'firstfruits of your ground you shall bring into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: note
    content: ch. 34:26; Deut. 14:21
  - type: text
    content: “You shall not boil a young goat in its mother’s milk.
  - type: heading
    content: Conquest of Canaan Promised
  '2':
  - type: text
    content: 'You shall not fall in with the many to do evil, nor shall you bear witness in a lawsuit, siding with the many, so as to pervert justice, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:19; 33:2, 14; Josh. 5:13, 14; 6:2; Isa. 63:9
  - type: text
    content: '“Behold, I send an angel before you to guard you on the way and to bring you to the place that I have prepared. '
  '21':
  - type: text
    content: 'Pay careful attention to him and obey his voice; '
  - type: note
    content: Ps. 78:40, 56
  - type: text
    content: 'do not rebel against him, '
  - type: note
    content: '[ch. 32:34; 34:7; Num. 14:35; Josh. 24:19]'
  - type: text
    content: for he will not pardon your transgression, for my name is in him.
  '22':
  - type: text
    content: '“But if you carefully obey his voice and do all that I say, then '
  - type: note
    content: Gen. 12:3; Deut. 30:7; Jer. 30:20
  - type: text
    content: I will be an enemy to your enemies and an adversary to your adversaries.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: '“When my angel goes before you and brings you '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'to the Amorites and the Hittites and the Perizzites and the Canaanites, the Hivites and the Jebusites, and I blot them out, '
  '24':
  - type: text
    content: 'you shall '
  - type: note
    content: ch. 20:5
  - type: text
    content: 'not bow down to their gods nor serve them, '
  - type: note
    content: Lev. 18:3; Deut. 12:30, 31
  - type: text
    content: 'nor do as they do, but '
  - type: note
    content: ch. 34:13; Num. 33:52; Deut. 7:5, 25; 12:3
  - type: text
    content: 'you shall utterly overthrow them and break their '
  - type: note
    content: See Deut. 16:22
  - type: text
    content: 'pillars in pieces. '
  '25':
  - type: text
    content: 'You '
  - type: note
    content: Deut. 6:13; 10:12, 20; 11:13; 13:4; Josh. 22:5; Matt. 4:10
  - type: text
    content: 'shall serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and '
  - type: note
    content: Deut. 7:13; 28:5, 8
  - type: text
    content: he
  - type: note
    content: Septuagint, Vulgate I
  - type: text
    content: ' will bless your bread and your water, and '
  - type: note
    content: ch. 15:26; Deut. 7:15
  - type: text
    content: 'I will take sickness away from among you. '
  '26':
  - type: note
    content: Deut. 7:14
  - type: text
    content: 'None shall miscarry or be barren in your land; I will fulfill the '
  - type: note
    content: '[Job 5:26; Ps. 55:23]'
  - type: text
    content: 'number of your days. '
  '27':
  - type: text
    content: 'I will send '
  - type: note
    content: Deut. 2:25; Josh. 2:9
  - type: text
    content: 'my terror before you and will throw into '
  - type: note
    content: Deut. 7:23
  - type: text
    content: 'confusion all the people against whom you shall come, and I will make all your enemies turn their backs to you. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 7:20; Josh. 24:12
  - type: text
    content: I will send hornets
  - type: note
    content: Or the hornet
  - type: text
    content: ' before you, which shall drive out the Hivites, the Canaanites, and the Hittites from before you. '
  '29':
  - type: note
    content: Deut. 7:22
  - type: text
    content: 'I will not drive them out from before you in one year, lest the land become desolate and the wild beasts multiply against you. '
  '3':
  - type: note
    content: Lev. 19:15; [Deut. 1:17]
  - type: text
    content: nor shall you be partial to a poor man in his lawsuit.
  '30':
  - type: text
    content: 'Little by little I will drive them out from before you, until you have increased and possess the land. '
  '31':
  - type: note
    content: Gen. 15:18; Num. 34:3; Deut. 11:24; Josh. 1:4; [1 Kgs. 4:21, 24; Ps. 72:8]
  - type: text
    content: And I will set your border from the Red Sea to the Sea of the Philistines, and from the wilderness to the Euphrates,
  - type: note
    content: Hebrew the River
  - type: text
    content: ' for '
  - type: note
    content: Josh. 21:44; Judg. 1:4; 11:21
  - type: text
    content: 'I will give the inhabitants of the land into your hand, and you shall drive them out before you. '
  '32':
  - type: note
    content: ch. 34:12, 15; Deut. 7:2
  - type: text
    content: 'You shall make no covenant with them and their gods. '
  '33':
  - type: text
    content: 'They shall not dwell in your land, lest they make you sin against me; for if you serve their gods, '
  - type: note
    content: ch. 34:12; Deut. 7:16; Josh. 23:13; Judg. 2:3; Ps. 106:36
  - type: text
    content: it will surely be a snare to you.”
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 22:1, 4; Prov. 25:21; Matt. 5:44; Rom. 12:20; 1 Thess. 5:15 ]'
  - type: text
    content: '“If you meet your enemy’s ox or his donkey going astray, you shall bring it back to him. '
  '5':
  - type: text
    content: If you see the donkey of one who hates you lying down under its burden, you shall refrain from leaving him with it; you shall rescue it with him.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Deut. 27:19; Eccles. 5:8; Isa. 10:1, 2; Jer. 5:28, 29; Mal. 3:5
  - type: text
    content: '“You shall not pervert the justice due to your poor in his lawsuit. '
  '7':
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Keep far from a false charge, and '
  - type: note
    content: Deut. 27:25; [Prov. 17:26]
  - type: text
    content: 'do not kill the innocent and righteous, for '
  - type: note
    content: ch. 34:7
  - type: text
    content: 'I will not acquit the wicked. '
  '8':
  - type: note
    content: Deut. 16:19; [1 Sam. 8:3; 2 Chr. 19:7; Ps. 26:10; Prov. 17:23; Isa. 1:23; 5:23; 33:15]
  - type: text
    content: And you shall take no bribe, for a bribe blinds the clear-sighted and subverts the cause of those who are in the right.
  '9':
  - type: text
    content: ' '
  - type: note
    content: See ch. 22:21
  - type: text
    content: “You shall not oppress a sojourner. You know the heart of a sojourner, for you were sojourners in the land of Egypt.
  - type: heading
    content: Laws About the Sabbath and Festivals
