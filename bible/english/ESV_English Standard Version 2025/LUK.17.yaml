  - type: note
    content: ch. 21:8; Matt. 24:23; Mark 13:21; [ver. 21]
  - type: text
    content: And they will say to you, ‘Look, there!’ or ‘Look, here!’ Do not go out or follow them.
  - type: text
    content: ' '
