  '11':
  - type: text
    content: ' '
  - type: note
    content: See ch. 9:51
  - type: text
    content: 'On the way to Jerusalem '
  - type: note
    content: '[John 4:3, 4]; See Matt. 19:1'
  - type: text
    content: 'he was passing along between Samaria and Galilee. '
  '12':
  - type: text
    content: And as he entered a village, he was met by ten lepers,
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' '
  - type: note
    content: See Lev. 13:45, 46
  - type: text
    content: 'who stood at a distance '
  '13':
  - type: text
    content: 'and lifted up their voices, saying, “Jesus, Master, have mercy on us.” '
  '14':
  - type: text
    content: 'When he saw them he said to them, '
  - type: text
    content: '“Go and '
  - type: note
    content: ch. 5:14; Lev. 13:2–14:32; Matt. 8:4
  - type: text
    content: show yourselves to the priests.”
  - type: text
    content: ' And as they went they were cleansed. '
  '15':
  - type: text
    content: 'Then one of them, when he saw that he was healed, turned back, '
  - type: note
    content: See ch. 13:13
  - type: text
    content: 'praising God with a loud voice; '
