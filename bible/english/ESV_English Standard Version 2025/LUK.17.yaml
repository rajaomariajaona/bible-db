  - type: text
    content: made you well.”
  - type: note
    content: Or has saved you
  - type: heading
    content: The Coming of the Kingdom
  '2':
  - type: note
    content: Matt. 18:6; Mark 9:42
  - type: text
    content: It would be better for him if a millstone were hung around his neck and he were cast into the sea than that he should cause one of these little ones to sin.
  - type: note
    content: Greek stumble
  - type: text
    content: ' '
