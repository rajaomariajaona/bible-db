document_id: EZR.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebuilding the Altar
  - type: text
    content: ' '
  - type: note
    content: Neh. 7:73; 8:1
  - type: text
    content: 'When the seventh month came, and the children of Israel were in the towns, the people gathered as one man to Jerusalem. '
  '10':
  - type: text
    content: 'And when the builders laid the foundation of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the priests in their vestments came forward with trumpets, and the Levites, the sons of Asaph, with cymbals, to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Chr. 6:31; 16:4-6; 25:1, 2
  - type: text
    content: 'according to the directions of David king of Israel. '
  '11':
  - type: text
    content: 'And they sang responsively, praising and giving thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: See 1 Chr. 16:34, 41
  - type: text
    content: “For he is good,
  - type: text
    content: for his steadfast love endures forever toward Israel.”
  - type: text
    content: 'And all the people shouted with a great shout when they praised the '
  - type: text
    content: Lord
  - type: text
    content: ', because the foundation of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was laid. '
  '12':
  - type: text
    content: 'But many of the priests and Levites and heads of fathers’ houses, '
  - type: note
    content: Hag. 2:3
  - type: text
    content: 'old men who had seen the first house, wept with a loud voice when they saw the foundation of this house being laid, though many shouted aloud for joy, '
  '13':
  - type: text
    content: so that the people could not distinguish the sound of the joyful shout from the sound of the people’s weeping, for the people shouted with a great shout, and the sound was heard far away.
  '2':
  - type: text
    content: 'Then arose Jeshua the son of Jozadak, with his fellow priests, and '
  - type: note
    content: Matt. 1:12; Luke 3:27
  - type: text
    content: 'Zerubbabel the son of '
  - type: note
    content: 1 Chr. 3:17; Matt. 1:12; Luke 3:27
  - type: text
    content: 'Shealtiel with his kinsmen, and they built the altar of the God of Israel, to offer burnt offerings on it, '
  - type: note
    content: Deut. 12:5, 6
  - type: text
    content: 'as it is written in the Law of Moses the '
  - type: note
    content: See Deut. 33:1
  - type: text
    content: 'man of God. '
  '3':
  - type: text
    content: 'They set the altar in its place, '
  - type: note
    content: '[ch. 4:4]'
  - type: text
    content: 'for fear was on them because of the peoples of the lands, and '
  - type: note
    content: Ex. 29:38; Num. 28:3, 4
  - type: text
    content: 'they offered burnt offerings on it to the '
  - type: text
    content: Lord
  - type: text
    content: ', burnt offerings morning and evening. '
  '4':
  - type: note
    content: Zech. 14:16; See Neh. 8:14-17
  - type: text
    content: 'And they kept the Feast of Booths, '
  - type: note
    content: Ex. 23:16; Lev. 23:34
  - type: text
    content: 'as it is written, '
  - type: note
    content: See Num. 29:12-38
  - type: text
    content: 'and offered the daily burnt offerings by number according to the rule, as each day required, '
  '5':
  - type: text
    content: 'and after that the regular burnt '
  - type: note
    content: See Num. 28:11-15
  - type: text
    content: 'offerings, the offerings at the new moon '
  - type: note
    content: Num. 29:39
  - type: text
    content: 'and at all the appointed feasts of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the offerings of everyone who made a freewill offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'From the first day of the seventh month they began to offer burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. But the foundation of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was not yet laid. '
  '7':
  - type: text
    content: 'So they gave money to the masons and the carpenters, '
  - type: note
    content: 1 Kgs. 5:6, 9; 2 Chr. 2:10
  - type: text
    content: 'and food, drink, and oil to the Sidonians and the Tyrians '
  - type: note
    content: 2 Chr. 2:16
  - type: text
    content: 'to bring cedar trees from Lebanon to the sea, to Joppa, '
  - type: note
    content: ch. 1:3, 4; 6:3
  - type: text
    content: according to the grant that they had from Cyrus king of Persia.
  - type: heading
    content: Rebuilding the Temple
  '8':
  - type: text
    content: 'Now in the second year after their coming to the house of God at Jerusalem, in the second month, '
  - type: note
    content: ch. 2:2; 4:3
  - type: text
    content: 'Zerubbabel the son of Shealtiel and '
  - type: note
    content: ch. 2:2; 4:3
  - type: text
    content: 'Jeshua the son of Jozadak made a beginning, together with the rest of their kinsmen, the priests and the Levites and all who had come to Jerusalem from the captivity. They '
  - type: note
    content: 1 Chr. 23:24
  - type: text
    content: 'appointed the Levites, from twenty years old and upward, to '
  - type: note
    content: 1 Chr. 23:4
  - type: text
    content: 'supervise the work of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'Jeshua with his sons and his brothers, and Kadmiel and his sons, the sons of Judah, together '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'supervised the workmen in the house of God, along with the '
  - type: note
    content: Neh. 10:9, 10
  - type: text
    content: sons of Henadad and the Levites, their sons and brothers.
