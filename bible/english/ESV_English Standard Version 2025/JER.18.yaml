document_id: JER.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Potter and the Clay
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'and if it does evil in my sight, not listening to my voice, then I will relent of the good that I had intended to do to it. '
  '11':
  - type: text
    content: 'Now, therefore, say to the men of Judah and the inhabitants of Jerusalem: ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Behold, I am shaping disaster against you and devising a plan against you. '
  - type: note
    content: ch. 35:15; 2 Kgs. 17:13; Jonah 3:8
  - type: text
    content: 'Return, every one from his evil way, and '
  - type: note
    content: ch. 7:3; 25:5; 35:15
  - type: text
    content: amend your ways and your deeds.’
  '12':
  - type: text
    content: '“But they say, '
  - type: note
    content: ch. 2:25
  - type: text
    content: '‘That is in vain! We will follow our own plans, and will every one act according to '
  - type: note
    content: See ch. 3:17
  - type: text
    content: the stubbornness of his evil heart.’
  '13':
  - type: text
    content: '“Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: ch. 2:10, 11
  - type: text
    content: Ask among the nations,
  - type: text
    content: Who has heard the like of this?
  - type: text
    content: The virgin Israel
  - type: text
    content: 'has done '
  - type: note
    content: ch. 5:30
  - type: text
    content: a very horrible thing.
  '14':
  - type: text
    content: Does the snow of Lebanon leave
  - type: text
    content: the crags of Sirion?
  - type: note
    content: Hebrew of the field
  - type: text
    content: Do the mountain waters run dry,
  - type: note
    content: Hebrew Are foreign waters plucked up
  - type: text
    content: the cold flowing streams?
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:13, 32; 17:13
  - type: text
    content: But my people have forgotten me;
  - type: text
    content: 'they make offerings to '
  - type: note
    content: ch. 2:5; 10:15; 16:19
  - type: text
    content: false gods;
  - type: text
    content: they made them stumble in their ways,
  - type: note
    content: ch. 6:16
  - type: text
    content: in the ancient roads,
  - type: text
    content: and to walk into side roads,
  - type: note
    content: '[ Isa. 57:14 ]'
  - type: text
    content: not the highway,
  '16':
  - type: text
    content: 'making their land '
  - type: note
    content: ch. 19:8; 25:9, 11, 18; 49:13, 17; 50:13; 51:37; 2 Chr. 29:8
  - type: text
    content: a horror,
  - type: text
    content: 'a thing '
  - type: note
    content: ch. 19:8; 25:9, 11, 18; 49:13, 17; 50:13; 51:37; 2 Chr. 29:8
  - type: text
    content: to be hissed at forever.
  - type: note
    content: ch. 50:13; Lam. 2:15
  - type: text
    content: Everyone who passes by it is horrified
  - type: note
    content: Job 16:4; Ps. 22:7; Matt. 27:39
  - type: text
    content: and shakes his head.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Gen. 41:6, 23, 27; Ex. 10:13; Job 27:21; Ps. 48:7; Ezek. 27:26; Hos. 13:15; Jonah 4:8
  - type: text
    content: 'Like the east wind '
  - type: note
    content: ch. 13:24
  - type: text
    content: I will scatter them
  - type: text
    content: before the enemy.
  - type: note
    content: '[ch. 2:27 ]'
  - type: text
    content: I will show them my back, not my face,
  - type: text
    content: in the day of their calamity.”
  '18':
  - type: text
    content: 'Then they said, '
  - type: note
    content: ch. 11:19
  - type: text
    content: '“Come, let us make plots against Jeremiah, '
  - type: note
    content: '[ch. 2:8; 5:13, 31; 6:13]'
  - type: text
    content: 'for the law shall not perish from the priest, nor counsel from the wise, nor the word from the prophet. '
  - type: note
    content: ch. 9:3, 8; Job 5:21; [Ps. 31:20]
  - type: text
    content: Come, let us strike him with the tongue, and let us not pay attention to any of his words.”
  '19':
  - type: text
    content: 'Hear me, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and '
  - type: note
    content: Ps. 35:1; Isa. 49:25
  - type: text
    content: listen to the voice of my adversaries.
  '2':
  - type: text
    content: '“Arise, and go down to '
  - type: note
    content: ch. 19:1; 1 Chr. 4:23; [Zech. 11:13]
  - type: text
    content: the potter’s house, and there I will let you hear
  - type: note
    content: Or will cause you to hear
  - type: text
    content: ' my words.” '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps. 35:12
  - type: text
    content: Should good be repaid with evil?
  - type: text
    content: 'Yet '
  - type: note
    content: Ps. 35:7; 57:6; 119:85
  - type: text
    content: they have dug a pit for my life.
  - type: note
    content: '[ Neh. 13:14 ]'
  - type: text
    content: Remember how I stood before you
  - type: text
    content: to speak good for them,
  - type: text
    content: to turn away your wrath from them.
  '21':
  - type: text
    content: 'Therefore '
  - type: note
    content: Ps. 109:10
  - type: text
    content: deliver up their children to famine;
  - type: text
    content: give them over to the power of the sword;
  - type: text
    content: 'let their wives become childless '
  - type: note
    content: Ps. 109:9
  - type: text
    content: and widowed.
  - type: text
    content: May their men meet death by pestilence,
  - type: text
    content: their youths be struck down by the sword in battle.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 20:16 ]'
  - type: text
    content: May a cry be heard from their houses,
  - type: text
    content: when you bring the plunderer suddenly upon them!
  - type: text
    content: 'For '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: they have dug a pit to take me
  - type: note
    content: Ps. 140:5
  - type: text
    content: and laid snares for my feet.
  '23':
  - type: text
    content: 'Yet '
  - type: note
    content: '[Ps. 35:22]'
  - type: text
    content: 'you, O '
  - type: text
    content: Lord
  - type: text
    content: ', know'
  - type: text
    content: all their plotting to kill me.
  - type: note
    content: Neh. 4:5
  - type: text
    content: Forgive not their iniquity,
  - type: text
    content: nor blot out their sin from your sight.
  - type: text
    content: Let them be overthrown before you;
  - type: text
    content: deal with them in the time of your anger.
  '3':
  - type: text
    content: 'So I went down to '
  - type: note
    content: ch. 19:1; 1 Chr. 4:23; [Zech. 11:13]
  - type: text
    content: 'the potter’s house, and there he was working at his wheel. '
  '4':
  - type: text
    content: 'And the vessel he was making of clay was '
  - type: note
    content: ch. 13:7
  - type: text
    content: 'spoiled in the potter’s hand, and '
  - type: note
    content: '[Rom. 9:21]'
  - type: text
    content: he reworked it into another vessel, as it seemed good to the potter to do.
  '5':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '6':
  - type: text
    content: '“O house of Israel, '
  - type: note
    content: Isa. 45:9; See Rom. 9:20-24
  - type: text
    content: 'can I not do with you as this potter has done? declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Job 10:9; Isa. 64:8
  - type: text
    content: 'Behold, like the clay in the potter’s hand, so are you in my hand, O house of Israel. '
  '7':
  - type: text
    content: 'If at any time I declare concerning a nation or a kingdom, that I will '
  - type: note
    content: ch. 1:10; 42:10
  - type: text
    content: 'pluck up and break down and destroy it, '
  '8':
  - type: text
    content: 'and if that nation, concerning which I have spoken, '
  - type: note
    content: Ezek. 18:21
  - type: text
    content: 'turns from its evil, '
  - type: note
    content: ch. 26:3, 13, 19; Judg. 2:18; Jonah 3:10
  - type: text
    content: 'I will relent of the disaster that I intended to do to it. '
  '9':
  - type: text
    content: 'And if at any time I declare concerning a nation or a kingdom that I will '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'build and plant it, '
