document_id: PSA.72,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Give the King Your Justice
  - type: text
    content: 'Of '
  - type: note
    content: Ps. 127, title
  - type: text
    content: Solomon.
  - type: text
    content: 'Give the king your '
  - type: note
    content: '[1 Chr. 22:12]'
  - type: text
    content: justice, O God,
  - type: text
    content: and your righteousness to the royal son!
  '10':
  - type: text
    content: 'May the kings of '
  - type: note
    content: 1 Kgs. 10:22
  - type: text
    content: 'Tarshish and of '
  - type: note
    content: Isa. 42:10, 12; 51:5; 60:9
  - type: text
    content: the coastlands
  - type: text
    content: 'render him '
  - type: note
    content: See Ps. 68:29; 1 Sam. 10:27
  - type: text
    content: tribute;
  - type: text
    content: 'may the kings of '
  - type: note
    content: See 1 Kgs. 10:1
  - type: text
    content: 'Sheba and '
  - type: note
    content: Gen. 10:7; Isa. 43:3; 45:14
  - type: text
    content: Seba
  - type: text
    content: bring gifts!
  '11':
  - type: text
    content: 'May all kings '
  - type: note
    content: Isa. 49:7, 23
  - type: text
    content: fall down before him,
  - type: text
    content: all nations serve him!
  '12':
  - type: text
    content: 'For he delivers '
  - type: note
    content: See Job 29:12-17
  - type: text
    content: the needy when he calls,
  - type: text
    content: the poor and him who has no helper.
  '13':
  - type: text
    content: He has pity on the weak and the needy,
  - type: text
    content: and saves the lives of the needy.
  '14':
  - type: text
    content: From oppression and violence he redeems their life,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 116:15; 2 Kgs. 1:13
  - type: text
    content: precious is their blood in his sight.
  '15':
  - type: text
    content: Long may he live;
  - type: text
    content: 'may '
  - type: note
    content: 1 Kgs. 10:10
  - type: text
    content: gold of Sheba be given to him!
  - type: text
    content: 'May prayer be made '
  - type: note
    content: Deut. 9:20
  - type: text
    content: for him continually,
  - type: text
    content: and blessings invoked for him all the day!
  '16':
  - type: text
    content: May there be abundance of grain in the land;
  - type: text
    content: on the tops of the mountains may it wave;
  - type: text
    content: may its fruit be like Lebanon;
  - type: text
    content: 'and may people '
  - type: note
    content: Ps. 92:7
  - type: text
    content: blossom in the cities
  - type: text
    content: 'like the '
  - type: note
    content: Job 5:25
  - type: text
    content: grass of the field!
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 104:31; [ Ps. 89:36 ]
  - type: text
    content: May his name endure forever,
  - type: text
    content: his fame continue as long as the sun!
  - type: note
    content: Gen. 12:3; 18:18; 22:18; 26:4
  - type: text
    content: May people be blessed in him,
  - type: note
    content: Luke 1:48
  - type: text
    content: all nations call him blessed!
  '18':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 41:13
  - type: text
    content: 'Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: 'who alone does '
  - type: note
    content: Ps. 77:14; 86:10; 136:4; Ex. 15:11; See Job 5:9
  - type: text
    content: wondrous things.
  '19':
  - type: text
    content: 'Blessed be his '
  - type: note
    content: Neh. 9:5
  - type: text
    content: glorious name forever;
  - type: text
    content: 'may '
  - type: note
    content: Num. 14:21
  - type: text
    content: the whole earth be filled with his glory!
  - type: note
    content: Ps. 41:13
  - type: text
    content: Amen and Amen!
  '2':
  - type: text
    content: 'May he '
  - type: note
    content: Isa. 9:7; 11:2-4; 32:1; See Ps. 122:5
  - type: text
    content: judge your people with righteousness,
  - type: text
    content: and your poor with justice!
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps. 17, title; 55:1; 86, title
  - type: text
    content: 'The prayers of '
  - type: note
    content: 2 Sam. 23:1
  - type: text
    content: David, the son of Jesse, are ended.
  '3':
  - type: text
    content: 'Let the mountains bear '
  - type: note
    content: '[Ps. 85:10; Isa. 32:17; 52:7]'
  - type: text
    content: prosperity for the people,
  - type: text
    content: and the hills, in righteousness!
  '4':
  - type: text
    content: May he defend the cause of the poor of the people,
  - type: text
    content: give deliverance to the children of the needy,
  - type: text
    content: and crush the oppressor!
  '5':
  - type: text
    content: May they fear you
  - type: note
    content: Septuagint He shall endure
  - type: text
    content: ' while '
  - type: note
    content: ver. 7, 17; Ps. 89:36, 37; Jer. 31:35, 36; [Jer. 33:20, 25]
  - type: text
    content: the sun endures,
  - type: text
    content: 'and as long as the moon, '
  - type: note
    content: Ps. 89:4; [Luke 1:33]
  - type: text
    content: throughout all generations!
  '6':
  - type: text
    content: 'May he be like '
  - type: note
    content: 2 Sam. 23:4; Hos. 6:3
  - type: text
    content: 'rain that falls on '
  - type: note
    content: Amos 7:1
  - type: text
    content: the mown grass,
  - type: text
    content: 'like '
  - type: note
    content: Deut. 32:2; [Ps. 65:10; Job 5:10]
  - type: text
    content: showers that water the earth!
  '7':
  - type: text
    content: 'In his days may '
  - type: note
    content: See Ps. 92:12
  - type: text
    content: the righteous flourish,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 2:4; [Eph. 2:14]
  - type: text
    content: peace abound, till the moon be no more!
  '8':
  - type: text
    content: 'May he have dominion from '
  - type: note
    content: Ex. 23:31; 1 Kgs. 4:21, 24; Zech. 9:10; [Ps. 80:11; 89:25]
  - type: text
    content: sea to sea,
  - type: text
    content: 'and from '
  - type: note
    content: Ex. 23:31; 1 Kgs. 4:21, 24; Zech. 9:10; [Ps. 80:11; 89:25]
  - type: text
    content: the River
  - type: note
    content: That is, the Euphrates
  - type: text
    content: ' to the '
  - type: note
    content: See Ps. 2:8
  - type: text
    content: ends of the earth!
  '9':
  - type: text
    content: 'May desert tribes '
  - type: note
    content: Ps. 22:29
  - type: text
    content: bow down before him,
  - type: text
    content: 'and his enemies '
  - type: note
    content: Isa. 49:23; Mic. 7:17
  - type: text
    content: lick the dust!
