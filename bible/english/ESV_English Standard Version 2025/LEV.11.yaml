    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But anything in the seas or the rivers that does not have fins and scales, of the swarming creatures in the waters and of the living creatures that are in the waters, is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:21
      marker-yv: yv-n
    - type: text
      text: 'detestable to you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'You shall regard them as detestable; you shall not eat any of their flesh, and you shall detest their carcasses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Everything in the waters that does not have fins and scales is detestable to you.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
