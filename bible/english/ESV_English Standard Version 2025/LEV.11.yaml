document_id: LEV.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Clean and Unclean Animals
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying to them, '
  '10':
  - type: text
    content: 'But anything in the seas or the rivers that does not have fins and scales, of the swarming creatures in the waters and of the living creatures that are in the waters, is '
  - type: note
    content: ch. 7:21
  - type: text
    content: 'detestable to you. '
  '11':
  - type: text
    content: 'You shall regard them as detestable; you shall not eat any of their flesh, and you shall detest their carcasses. '
  '12':
  - type: text
    content: Everything in the waters that does not have fins and scales is detestable to you.
  '13':
  - type: text
    content: “And these you shall detest among the birds;
  - type: note
    content: Or things that fly; compare Genesis 1:20
  - type: text
    content: ' they shall not be eaten; they are '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'detestable: '
  - type: note
    content: Job 39:26, 30
  - type: text
    content: the eagle,
  - type: note
    content: The identity of many of these birds is uncertain
  - type: text
    content: ' the bearded vulture, the black vulture, '
  '14':
  - type: text
    content: 'the kite, '
  - type: note
    content: Job 28:7
  - type: text
    content: 'the falcon of any kind, '
  '15':
  - type: text
    content: 'every raven of any kind, '
  '16':
  - type: text
    content: 'the ostrich, the nighthawk, the sea gull, the '
  - type: note
    content: Job 39:26
  - type: text
    content: 'hawk of any kind, '
  '17':
  - type: text
    content: 'the '
  - type: note
    content: Ps. 102:6
  - type: text
    content: 'little owl, the cormorant, the '
  - type: note
    content: Isa. 34:11
  - type: text
    content: 'short-eared owl, '
  '18':
  - type: text
    content: 'the barn owl, the '
  - type: note
    content: Ps. 102:6; Isa. 34:11; Zeph. 2:14
  - type: text
    content: 'tawny owl, the carrion vulture, '
  '19':
  - type: text
    content: 'the stork, the heron of any kind, the hoopoe, and '
  - type: note
    content: Isa. 2:20
  - type: text
    content: the bat.
  '2':
  - type: text
    content: '“Speak to the people of Israel, saying, '
  - type: note
    content: For ver. 1-47, see Deut. 14:3-20; [Matt. 15:11; Mark 7:15, 18; Acts 10:12-15; 11:6-9; Rom. 14:14; 1 Cor. 8:8; Col. 2:16, 21; Heb. 9:10]
  - type: text
    content: 'These are the living things that you may eat among all the animals that are on the earth. '
  '20':
  - type: text
    content: '“All winged insects that go on all fours are detestable to you. '
  '21':
  - type: text
    content: 'Yet among the winged insects that go on all fours you may eat those that have jointed legs above their feet, with which to hop on the ground. '
  '22':
  - type: text
    content: 'Of them you may eat: '
  - type: note
    content: Ex. 10:4; Joel 1:4; [Matt. 3:4; Mark 1:6]
  - type: text
    content: 'the locust of any kind, the bald locust of any kind, the cricket of any kind, and the grasshopper of any kind. '
  '23':
  - type: text
    content: But all other winged insects that have four feet are detestable to you.
  '24':
  - type: text
    content: '“And by these you shall become unclean. Whoever touches their carcass shall be unclean until the evening, '
  '25':
  - type: text
    content: 'and whoever carries any part of their carcass '
  - type: note
    content: ch. 13:6, 34; 14:8, 9, 47; 15:5; 16:26, 28; 17:15; Num. 19:10; 31:24
  - type: text
    content: 'shall wash his clothes and be unclean until the evening. '
  '26':
  - type: text
    content: 'Every animal that parts the hoof but is not cloven-footed or does not chew the cud is unclean to you. Everyone who touches them shall be unclean. '
  '27':
  - type: text
    content: 'And all that walk on their paws, among the animals that go on all fours, are unclean to you. Whoever touches their carcass shall be unclean until the evening, '
  '28':
  - type: text
    content: 'and he who carries their carcass '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: shall wash his clothes and be unclean until the evening; they are unclean to you.
  '29':
  - type: text
    content: '“And these are unclean to you among the swarming things that swarm on the ground: the mole rat, '
  - type: note
    content: Isa. 66:17
  - type: text
    content: 'the mouse, the great lizard of any kind, '
  '3':
  - type: text
    content: 'Whatever parts the hoof and is cloven-footed and chews the cud, among the animals, you may eat. '
  '30':
  - type: text
    content: 'the gecko, the monitor lizard, the lizard, the sand lizard, and the chameleon. '
  '31':
  - type: text
    content: 'These are unclean to you among all that swarm. Whoever touches them when they are dead shall be unclean until the evening. '
  '32':
  - type: text
    content: 'And anything on which any of them falls when they are dead shall be unclean, whether it is an article of wood or a garment or a skin or a sack, any article that is used for any purpose. '
  - type: note
    content: ch. 15:12
  - type: text
    content: 'It must be put into water, and it shall be unclean until the evening; then it shall be clean. '
  '33':
  - type: text
    content: 'And if any of them falls into any earthenware vessel, all that is in it shall be unclean, and you '
  - type: note
    content: ch. 6:28; 15:12
  - type: text
    content: 'shall break it. '
  '34':
  - type: text
    content: 'Any food in it that could be eaten, on which water comes, shall be unclean. And all drink that could be drunk from every such vessel shall be unclean. '
  '35':
  - type: text
    content: 'And everything on which any part of their carcass falls shall be unclean. Whether oven or stove, it shall be broken in pieces. They are unclean and shall remain unclean for you. '
  '36':
  - type: text
    content: 'Nevertheless, a spring or a cistern holding water shall be clean, but whoever touches a carcass in them shall be unclean. '
  '37':
  - type: text
    content: 'And if any part of their carcass falls upon any seed grain that is to be sown, it is clean, '
  '38':
  - type: text
    content: but if water is put on the seed and any part of their carcass falls on it, it is unclean to you.
  '39':
  - type: text
    content: '“And if any animal which you may eat dies, whoever touches its carcass shall be unclean until the evening, '
  '4':
  - type: text
    content: 'Nevertheless, among those that chew the cud or part the hoof, you shall not eat these: The camel, because it chews the cud but does not part the hoof, is unclean to you. '
  '40':
  - type: text
    content: 'and '
  - type: note
    content: ch. 17:15; 22:8; Deut. 14:21; Ezek. 4:14; 44:31
  - type: text
    content: whoever eats of its carcass shall wash his clothes and be unclean until the evening. And whoever carries the carcass shall wash his clothes and be unclean until the evening.
  '41':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 29 ]'
  - type: text
    content: '“Every swarming thing that swarms on the ground is detestable; it shall not be eaten. '
  '42':
  - type: text
    content: 'Whatever goes on its belly, and whatever goes on all fours, or whatever has many feet, any swarming thing that swarms on the ground, you shall not eat, for they are detestable. '
  '43':
  - type: note
    content: ch. 20:25
  - type: text
    content: 'You shall not make yourselves detestable with any swarming thing that swarms, and you shall not defile yourselves with them, and become unclean through them. '
  '44':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Consecrate yourselves therefore, and '
  - type: note
    content: ch. 19:2; 20:7, 26; 21:8; Ex. 19:6; Cited 1 Pet. 1:16; [1 Thess. 4:7]
  - type: text
    content: 'be holy, for I am holy. '
  - type: note
    content: '[See ver. 43above]'
  - type: text
    content: 'You shall not defile yourselves with any swarming thing that crawls on the ground. '
  '45':
  - type: note
    content: Ex. 6:7
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who brought you up out of the land of Egypt to be your God. '
  - type: note
    content: '[See ver. 44above]'
  - type: text
    content: You shall therefore be holy, for I am holy.”
  '46':
  - type: text
    content: 'This is the law about beast and bird and every living creature that moves through the waters and every creature that swarms on the ground, '
  '47':
  - type: note
    content: ch. 10:10; 20:25
  - type: text
    content: to make a distinction between the unclean and the clean and between the living creature that may be eaten and the living creature that may not be eaten.
  '5':
  - type: text
    content: 'And the '
  - type: note
    content: Ps. 104:18; Prov. 30:26
  - type: text
    content: 'rock badger, because it chews the cud but does not part the hoof, is unclean to you. '
  '6':
  - type: text
    content: 'And the hare, because it chews the cud but does not part the hoof, is unclean to you. '
  '7':
  - type: text
    content: 'And the pig, because it parts the hoof and is cloven-footed but does not chew the cud, '
  - type: note
    content: '[Isa. 65:4; 66:3, 17]'
  - type: text
    content: 'is unclean to you. '
  '8':
  - type: text
    content: You shall not eat any of their flesh, and you shall not touch their carcasses; they are unclean to you.
  '9':
  - type: text
    content: '“These you may eat, of all that are in the waters. Everything in the waters that has fins and scales, whether in the seas or in the rivers, you may eat. '
