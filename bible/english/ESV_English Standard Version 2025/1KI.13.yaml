document_id: 1KI.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Man of God Confronts Jeroboam
  - type: text
    content: 'And behold, '
  - type: note
    content: 2 Kgs. 23:17
  - type: text
    content: 'a man of God came out of Judah by the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Bethel. Jeroboam was standing by the altar '
  - type: note
    content: ch. 12:33
  - type: text
    content: 'to make offerings. '
  '10':
  - type: text
    content: So he went another way and did not return by the way that he came to Bethel.
  - type: heading
    content: The Prophet’s Disobedience
  '11':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 25; [2 Kgs. 23:18]
  - type: text
    content: an old prophet lived in Bethel. And his sons
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew son
  - type: text
    content: ' came and told him all that the man of God had done that day in Bethel. They also told to their father the words that he had spoken to the king. '
  '12':
  - type: text
    content: 'And their father said to them, “Which way did he go?” And his sons showed him the way that the man of God who came from Judah had gone. '
  '13':
  - type: text
    content: 'And he said to his sons, “Saddle the donkey for me.” So they saddled the donkey for him and he mounted it. '
  '14':
  - type: text
    content: 'And he went after the man of God and found him sitting under an oak. And he said to him, “Are you the man of God who came from Judah?” And he said, “I am.” '
  '15':
  - type: text
    content: 'Then he said to him, “Come home with me and eat bread.” '
  '16':
  - type: text
    content: 'And he said, '
  - type: note
    content: ver. 8, 9
  - type: text
    content: '“I may not return with you, or go in with you, neither will I eat bread nor drink water with you in this place, '
  '17':
  - type: text
    content: 'for it was said to me '
  - type: note
    content: ch. 20:35; 1 Thess. 4:15
  - type: text
    content: 'by the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘You shall neither eat bread nor drink water there, nor return by the way that you came.’” '
  '18':
  - type: text
    content: 'And he said to him, “I also am a prophet as you are, and an angel spoke to me by the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘Bring him back with you into your house that he may eat bread and drink water.’” But he lied to him. '
  '19':
  - type: text
    content: So he went back with him and ate bread in his house and drank water.
  '2':
  - type: note
    content: ver. 32
  - type: text
    content: 'And the man cried against the altar by the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “O altar, altar, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': ‘Behold, a son shall be born to the house of David, '
  - type: note
    content: 2 Kgs. 23:15, 16
  - type: text
    content: 'Josiah by name, and he shall sacrifice on you the priests of the high places who make offerings on you, and human bones shall be burned on you.’” '
  '20':
  - type: text
    content: 'And as they sat at the table, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet who had brought him back. '
  '21':
  - type: text
    content: 'And he cried to the man of God who came from Judah, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘Because you have disobeyed the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and have not kept the command that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you, '
  '22':
  - type: text
    content: 'but have come back and have eaten bread and drunk water in the place of which he said to you, “Eat no bread and drink no water,” your body shall not come to the tomb of your fathers.’” '
  '23':
  - type: text
    content: 'And after he had eaten bread and drunk, he saddled the donkey for the prophet whom he had brought back. '
  '24':
  - type: text
    content: 'And as he went away '
  - type: note
    content: ch. 20:36
  - type: text
    content: 'a lion met him on the road and killed him. And his body was thrown in the road, and the donkey stood beside it; the lion also stood beside the body. '
  '25':
  - type: text
    content: 'And behold, men passed by and saw the body thrown in the road and the lion standing by the body. And they came and told it in the city where '
  - type: note
    content: ver. 11
  - type: text
    content: the old prophet lived.
  '26':
  - type: text
    content: 'And when the prophet who had brought him back from the way heard of it, he said, “It is the man of God who disobeyed the word of the '
  - type: text
    content: Lord
  - type: text
    content: '; therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' has given him to the lion, which has torn him and killed him, according to the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to him.” '
  '27':
  - type: text
    content: 'And he said to his sons, “Saddle the donkey for me.” And they saddled it. '
  '28':
  - type: text
    content: 'And he went and found his body thrown in the road, and the donkey and the lion standing beside the body. The lion had not eaten the body or torn the donkey. '
  '29':
  - type: text
    content: And the prophet took up the body of the man of God and laid it on the donkey and brought it back to the city
  - type: note
    content: Septuagint; Hebrew he came to the city of the old prophet
  - type: text
    content: ' to mourn and to bury him. '
  '3':
  - type: text
    content: 'And he gave '
  - type: note
    content: See Judg. 6:17
  - type: text
    content: 'a sign the same day, saying, “This is the sign that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken: ‘Behold, the altar shall be torn down, and the ashes that are on it shall be poured out.’” '
  '30':
  - type: text
    content: 'And he laid the body in his own grave. And they mourned over him, saying, '
  - type: note
    content: '[Jer. 22:18]'
  - type: text
    content: '“Alas, my brother!” '
  '31':
  - type: text
    content: 'And after he had buried him, he said to his sons, “When I die, bury me in the grave in which the man of God is buried; '
  - type: note
    content: '[2 Kgs. 23:17, 18]'
  - type: text
    content: 'lay my bones beside his bones. '
  '32':
  - type: note
    content: ver. 2; See 2 Kgs. 23:16-19
  - type: text
    content: 'For the saying that he called out by the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' against the altar in Bethel and against '
  - type: note
    content: ch. 12:31
  - type: text
    content: 'all the houses of the high places that are in the cities of '
  - type: note
    content: '[ch. 16:24]'
  - type: text
    content: Samaria shall surely come to pass.”
  '33':
  - type: text
    content: 'After this thing Jeroboam did not turn from his evil way, but made priests for the high places again from among all the people. Any who would, he ordained to be priests of the high places. '
  '34':
  - type: note
    content: ch. 12:30; 2 Kgs. 17:21
  - type: text
    content: 'And this thing became sin to the house of Jeroboam, '
  - type: note
    content: ch. 14:10; [ch. 15:29, 30]
  - type: text
    content: so as to cut it off and to destroy it from the face of the earth.
  '4':
  - type: text
    content: 'And when the king heard the saying of the man of God, which he cried against the altar at Bethel, Jeroboam stretched out his hand from the altar, saying, “Seize him.” And his hand, which he stretched out against him, dried up, so that he could not draw it back to himself. '
  '5':
  - type: text
    content: 'The altar also was torn down, and the ashes poured out from the altar, according to the sign that the man of God had given by the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And the king said to the man of God, '
  - type: note
    content: Ex. 8:8; 9:28; 10:17; Num. 21:7; Acts 8:24
  - type: text
    content: '“Entreat now the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and pray for me, that my hand may be restored to me.” And the man of God entreated the '
  - type: text
    content: Lord
  - type: text
    content: ', and the king’s hand was restored to him and became as it was before. '
  '7':
  - type: text
    content: 'And the king said to the man of God, “Come home with me, and refresh yourself, and '
  - type: note
    content: '[1 Sam. 9:7; 2 Kgs. 5:15]'
  - type: text
    content: 'I will give you a reward.” '
  '8':
  - type: text
    content: 'And the man of God said to the king, '
  - type: note
    content: Num. 22:18; 24:13
  - type: text
    content: '“If you give me half your house, '
  - type: note
    content: ver. 16, 17
  - type: text
    content: 'I will not go in with you. And I will not eat bread or drink water in this place, '
  '9':
  - type: text
    content: 'for so was it commanded me by the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘You shall neither eat bread nor drink water nor return by the way that you came.’” '
