document_id: ACT.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Goes to Jerusalem
  - type: text
    content: 'And when '
  - type: note
    content: See ch. 16:10
  - type: text
    content: 'we had parted from them and set sail, we '
  - type: note
    content: ch. 16:11
  - type: text
    content: came by a straight course to Cos, and the next day to Rhodes, and from there to Patara.
  - type: note
    content: Some manuscripts add and Myra
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'While we were staying for many days, a prophet named '
  - type: note
    content: ch. 11:28
  - type: text
    content: 'Agabus came down from Judea. '
  '11':
  - type: text
    content: 'And coming to us, he '
  - type: note
    content: '[1 Sam. 15:27, 28; 1 Kgs. 11:30; Isa. 20:3; Jer. 13:1-11; 27:2]'
  - type: text
    content: 'took Paul’s belt and bound his own feet and hands and said, '
  - type: note
    content: See ch. 20:23
  - type: text
    content: '“Thus says the Holy Spirit, '
  - type: note
    content: '[ver. 33]; See ch. 9:16'
  - type: text
    content: ‘This is how the Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time
  - type: text
    content: ' at Jerusalem will bind the man who owns this belt and '
  - type: note
    content: '[ver. 31-33; Matt. 20:19]'
  - type: text
    content: 'deliver him into the hands of the Gentiles.’” '
  '12':
  - type: text
    content: 'When we heard this, we and the people there '
  - type: note
    content: '[Matt. 16:21-23]'
  - type: text
    content: 'urged him not to go up to Jerusalem. '
  '13':
  - type: text
    content: 'Then Paul answered, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: '“What are you doing, weeping and breaking my heart? For '
  - type: note
    content: ch. 20:24; Rom. 8:36; 2 Cor. 4:16; 12:10; Phil. 2:17; [ch. 15:26]
  - type: text
    content: 'I am ready not only to be imprisoned but even to die in Jerusalem '
  - type: note
    content: See ch. 5:41
  - type: text
    content: 'for the name of the Lord Jesus.” '
  '14':
  - type: text
    content: 'And since he would not be persuaded, '
  - type: note
    content: '[Ruth 1:18]'
  - type: text
    content: 'we ceased and said, '
  - type: note
    content: See Matt. 6:10
  - type: text
    content: “Let the will of the Lord be done.”
  '15':
  - type: text
    content: 'After these days we got ready and went up to Jerusalem. '
  '16':
  - type: text
    content: And some of the disciples from Caesarea went with us, bringing us to the house of Mnason of Cyprus, an early disciple, with whom we should lodge.
  - type: heading
    content: Paul Visits James
  '17':
  - type: text
    content: 'When we had come to Jerusalem, '
  - type: note
    content: ver. 7; [ch. 15:4]
  - type: text
    content: 'the brothers received us gladly. '
  '18':
  - type: text
    content: 'On the following day Paul went in with us to '
  - type: note
    content: See ch. 12:17
  - type: text
    content: 'James, and all '
  - type: note
    content: See ch. 11:30
  - type: text
    content: 'the elders were present. '
  '19':
  - type: text
    content: 'After greeting them, '
  - type: note
    content: See ch. 14:27
  - type: text
    content: 'he related one by one '
  - type: note
    content: '[Rom. 15:18, 19]'
  - type: text
    content: 'the things that God had done among the Gentiles through his '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'ministry. '
  '2':
  - type: text
    content: 'And having found a ship crossing to Phoenicia, we went aboard and set sail. '
  '20':
  - type: text
    content: 'And when they heard it, they '
  - type: note
    content: ch. 11:18
  - type: text
    content: 'glorified God. And they said to him, “You see, brother, how many thousands there are among the Jews of those who have believed. They are all '
  - type: note
    content: ch. 22:3; Rom. 10:2; Gal. 1:14
  - type: text
    content: 'zealous for the law, '
  '21':
  - type: text
    content: 'and they have been told about you that you teach all '
  - type: note
    content: '[James 1:1]'
  - type: text
    content: 'the Jews who are among the Gentiles to forsake Moses, '
  - type: note
    content: ver. 28
  - type: text
    content: 'telling them '
  - type: note
    content: '[Rom. 2:28, 29; 1 Cor. 7:19]'
  - type: text
    content: 'not to circumcise their children or '
  - type: note
    content: '[Mark 7:5; Gal. 2:14]'
  - type: text
    content: 'walk according to '
  - type: note
    content: ch. 6:14; 15:1
  - type: text
    content: 'our customs. '
  '22':
  - type: text
    content: 'What then is to be done? They will certainly hear that you have come. '
  '23':
  - type: text
    content: 'Do therefore what we tell you. We have four men '
  - type: note
    content: '[ch. 18:18]'
  - type: text
    content: 'who are under a vow; '
  '24':
  - type: text
    content: 'take these men and '
  - type: note
    content: ver. 26; ch. 24:18; [John 11:55]
  - type: text
    content: 'purify yourself along with them and pay their expenses, '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'so that they may shave their heads. Thus all will know that there is nothing in what they have been told about you, but that you yourself also live in observance of the law. '
  '25':
  - type: text
    content: 'But as for the Gentiles who have believed, '
  - type: note
    content: See ch. 15:19, 20, 29
  - type: text
    content: we have sent a letter with our judgment that they should abstain from what has been sacrificed to idols, and from blood, and from what has been strangled,
  - type: note
    content: Some manuscripts omit and from what has been strangled
  - type: text
    content: ' and from sexual immorality.” '
  '26':
  - type: text
    content: 'Then Paul took the men, and the next day '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'he purified himself along with them and '
  - type: note
    content: '[Num. 6:13]'
  - type: text
    content: 'went into the temple, giving notice when the days of purification would be fulfilled and '
  - type: note
    content: '[Num. 6:9-12]'
  - type: text
    content: the offering presented for each one of them.
  - type: heading
    content: Paul Arrested in the Temple
  '27':
  - type: text
    content: 'When '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'the seven days were almost completed, '
  - type: note
    content: See ch. 13:50
  - type: text
    content: 'the Jews from Asia, '
  - type: note
    content: ch. 24:18; 26:21
  - type: text
    content: 'seeing him in the temple, stirred up the whole crowd and laid hands on him, '
  '28':
  - type: text
    content: 'crying out, “Men of Israel, help! This is the man who '
  - type: note
    content: ver. 21
  - type: text
    content: 'is teaching everyone everywhere against the people and '
  - type: note
    content: See ch. 6:13
  - type: text
    content: 'the law and '
  - type: note
    content: See ch. 6:13
  - type: text
    content: 'this place. Moreover, he even brought Greeks into the temple and '
  - type: note
    content: ch. 24:6
  - type: text
    content: 'has defiled '
  - type: note
    content: See ch. 6:13
  - type: text
    content: 'this holy place.” '
  '29':
  - type: text
    content: 'For they had previously seen '
  - type: note
    content: ch. 20:4
  - type: text
    content: 'Trophimus the Ephesian with him in the city, and they supposed that Paul had brought him into the temple. '
  '3':
  - type: text
    content: 'When we had come in sight of Cyprus, leaving it on the left we sailed to Syria and landed at Tyre, for there the ship was to unload its cargo. '
  '30':
  - type: text
    content: 'Then all the city was stirred up, and the people ran together. They seized Paul and '
  - type: note
    content: ch. 26:21; [2 Kgs. 11:15]
  - type: text
    content: 'dragged him out of the temple, and at once the gates were shut. '
  '31':
  - type: note
    content: '[See ver. 30 above]'
  - type: text
    content: 'And as they were seeking to kill him, word came to the tribune of '
  - type: note
    content: See ch. 10:1
  - type: text
    content: 'the cohort that all Jerusalem was in confusion. '
  '32':
  - type: note
    content: '[ch. 23:27]'
  - type: text
    content: 'He at once took soldiers and centurions and ran down to them. And when they saw the tribune and the soldiers, they stopped beating Paul. '
  '33':
  - type: text
    content: 'Then the tribune came up and arrested him and ordered him '
  - type: note
    content: ch. 20:23; [ver. 11]
  - type: text
    content: 'to be bound '
  - type: note
    content: ch. 12:6; [ch. 22:29; 26:29; 28:20; Eph. 6:20; 2 Tim. 1:16]
  - type: text
    content: 'with two chains. He inquired who he was and what he had done. '
  '34':
  - type: note
    content: ch. 19:32
  - type: text
    content: 'Some in the crowd were shouting one thing, some another. And as he could not learn the facts because of the uproar, he ordered him to be brought into '
  - type: note
    content: ch. 22:24; 23:10
  - type: text
    content: 'the barracks. '
  '35':
  - type: text
    content: 'And when he came to the steps, he was actually carried by the soldiers because of the violence of the crowd, '
  '36':
  - type: text
    content: 'for the mob of the people followed, crying out, '
  - type: note
    content: ch. 22:22; [Luke 23:18; John 19:15]
  - type: text
    content: “Away with him!”
  - type: heading
    content: Paul Speaks to the People
  '37':
  - type: text
    content: 'As Paul was about to be brought into the barracks, he said to the tribune, “May I say something to you?” And he said, “Do you know Greek? '
  '38':
  - type: text
    content: 'Are you not '
  - type: note
    content: '[ch. 5:36]'
  - type: text
    content: 'the Egyptian, then, who recently stirred up a revolt and led the four thousand men of the Assassins out '
  - type: note
    content: Matt. 24:26
  - type: text
    content: 'into the wilderness?” '
  '39':
  - type: text
    content: 'Paul replied, '
  - type: note
    content: ch. 9:11; 22:3
  - type: text
    content: '“I am a Jew, from Tarsus in Cilicia, a citizen of no obscure city. I beg you, permit me to speak to the people.” '
  '4':
  - type: text
    content: 'And having sought out the disciples, we stayed there for seven days. And '
  - type: note
    content: ver. 11; ch. 20:23
  - type: text
    content: 'through the Spirit they were telling Paul not to go on to Jerusalem. '
  '40':
  - type: text
    content: 'And when he had given him permission, Paul, standing on the steps, '
  - type: note
    content: See ch. 12:17
  - type: text
    content: 'motioned with his hand to the people. And when there was a great hush, he addressed them in '
  - type: note
    content: ch. 22:2; 26:14
  - type: text
    content: the Hebrew language,
  - type: note
    content: Or the Hebrew dialect (probably Aramaic)
  - type: text
    content: ' saying:'
  '5':
  - type: text
    content: 'When our days there were ended, we departed and went on our journey, and they all, with wives and children, '
  - type: note
    content: ch. 20:38
  - type: text
    content: 'accompanied us until we were outside the city. And '
  - type: note
    content: ch. 20:36
  - type: text
    content: 'kneeling down on the beach, we prayed '
  '6':
  - type: text
    content: and said farewell to one another. Then we went on board the ship, and they returned home.
  '7':
  - type: text
    content: 'When we had finished the voyage from Tyre, we arrived at Ptolemais, and we greeted '
  - type: note
    content: See John 21:23
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters; also verse 17
  - type: text
    content: ' and stayed with them for one day. '
  '8':
  - type: text
    content: 'On the next day we departed and came to Caesarea, and we entered the house of '
  - type: note
    content: ch. 6:5; 8:5
  - type: text
    content: 'Philip '
  - type: note
    content: Eph. 4:11; 2 Tim. 4:5
  - type: text
    content: 'the evangelist, who was one of the seven, and stayed with him. '
  '9':
  - type: text
    content: 'He had four unmarried daughters, '
  - type: note
    content: ch. 2:17, 18; Luke 2:36; 1 Cor. 11:5; See ch. 13:1
  - type: text
    content: 'who prophesied. '
