document_id: DEU.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Love and Serve the Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 6:5
  - type: text
    content: '“You shall therefore love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and '
  - type: note
    content: '[Ezek. 44:16]; See Lev. 8:35'
  - type: text
    content: 'keep his charge, his statutes, his rules, and his commandments always. '
  '10':
  - type: text
    content: For the land that you are entering to take possession of it is not like the land of Egypt, from which you have come, where you sowed your seed and irrigated it,
  - type: note
    content: Hebrew watered it with your feet
  - type: text
    content: ' like a garden of vegetables. '
  '11':
  - type: note
    content: ch. 8:7
  - type: text
    content: 'But the land that you are going over to possess is a land of hills and valleys, which drinks water by the rain from heaven, '
  '12':
  - type: text
    content: 'a land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God cares for. '
  - type: note
    content: '[1 Kgs. 9:3; Jer. 24:6]'
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God are always upon it, from the beginning of the year to the end of the year.'
  '13':
  - type: text
    content: '“And if you will indeed obey my commandments that I command you today, '
  - type: note
    content: See ch. 6:5
  - type: text
    content: 'to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and to serve him with all your heart and with all your soul, '
  '14':
  - type: note
    content: ch. 28:12; Lev. 26:4
  - type: text
    content: he
  - type: note
    content: Samaritan, Septuagint, Vulgate; Hebrew I; also verse 15
  - type: text
    content: ' will give the rain for your land in its season, '
  - type: note
    content: '[Job 29:23; Jer. 5:24; Hos. 6:3; Joel 2:23; James 5:7]'
  - type: text
    content: 'the early rain and the later rain, that you may gather in your grain and your wine and your oil. '
  '15':
  - type: note
    content: Ps. 104:14
  - type: text
    content: 'And he will give grass in your fields for your livestock, and '
  - type: note
    content: ch. 6:11; [Joel 2:19]
  - type: text
    content: 'you shall eat and be full. '
  '16':
  - type: text
    content: 'Take care '
  - type: note
    content: '[Job 31:27]'
  - type: text
    content: 'lest your heart be deceived, and you turn aside and '
  - type: note
    content: ver. 28; See ch. 6:14
  - type: text
    content: 'serve other gods and worship them; '
  '17':
  - type: text
    content: 'then '
  - type: note
    content: ch. 6:15
  - type: text
    content: 'the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be kindled against you, and he '
  - type: note
    content: 1 Kgs. 8:35; 2 Chr. 6:26; 7:13; [ch. 28:23, 24; Lev. 26:19, 20; Amos 4:7; Zech. 14:17; Rev. 11:6]
  - type: text
    content: 'will shut up the heavens, so that there will be no rain, and the land will yield no fruit, and '
  - type: note
    content: ch. 4:26; 30:18; Josh. 23:15, 16
  - type: text
    content: 'you will perish quickly off the good land that the '
  - type: text
    content: Lord
  - type: text
    content: ' is giving you.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: See ch. 6:6
  - type: text
    content: '“You shall therefore lay up these words of mine in your heart and in your soul, and '
  - type: note
    content: See ch. 6:8
  - type: text
    content: 'you shall bind them as a sign on your hand, and they shall be as frontlets between your eyes. '
  '19':
  - type: text
    content: 'You shall teach them to your children, talking of them when you are sitting in your house, and when you are walking by the way, and when you lie down, and when you rise. '
  '2':
  - type: text
    content: 'And consider today (since I am not speaking to '
  - type: note
    content: ch. 31:13
  - type: text
    content: your children who have not known or seen it), consider the discipline
  - type: note
    content: Or instruction
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: ch. 3:24; 5:24
  - type: text
    content: 'his greatness, '
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'his mighty hand and his outstretched arm, '
  '20':
  - type: note
    content: ch. 6:9
  - type: text
    content: 'You shall write them on the doorposts of your house and on your gates, '
  '21':
  - type: note
    content: See ch. 4:40
  - type: text
    content: 'that your days and the days of your children may be multiplied in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to your fathers to give them, '
  - type: note
    content: Ps. 89:29
  - type: text
    content: 'as long as the heavens are above the earth. '
  '22':
  - type: text
    content: 'For if '
  - type: note
    content: ch. 6:17
  - type: text
    content: 'you will be careful to do all this commandment that I command you to do, loving the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, walking in all his ways, and '
  - type: note
    content: See ch. 10:20
  - type: text
    content: 'holding fast to him, '
  '23':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:38
  - type: text
    content: 'will drive out all these nations before you, and you will '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'dispossess nations greater and mightier than you. '
  '24':
  - type: note
    content: Josh. 1:3; [Josh. 14:9]
  - type: text
    content: 'Every place on which the sole of your foot treads shall be yours. Your territory shall be '
  - type: note
    content: See Ex. 23:31
  - type: text
    content: from the wilderness to
  - type: note
    content: Hebrew and
  - type: text
    content: ' the Lebanon, and from the River, the river Euphrates, to the western sea. '
  '25':
  - type: note
    content: See ch. 7:24
  - type: text
    content: 'No one shall be able to stand against you. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will lay '
  - type: note
    content: ch. 2:25
  - type: text
    content: 'the fear of you and the dread of you on all the land that you shall tread, '
  - type: note
    content: Ex. 23:27
  - type: text
    content: as he promised you.
  '26':
  - type: text
    content: ' '
  - type: note
    content: ch. 30:1, 15, 19
  - type: text
    content: '“See, I am setting before you today a blessing and a curse: '
  '27':
  - type: note
    content: See ch. 28:2-14
  - type: text
    content: 'the blessing, if you obey the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, which I command you today, '
  '28':
  - type: text
    content: 'and '
  - type: note
    content: See ch. 28:15-45
  - type: text
    content: 'the curse, if you do not obey the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, but turn aside from the way that I am commanding you today, '
  - type: note
    content: See ch. 6:14
  - type: text
    content: 'to go after other gods that you have not known. '
  '29':
  - type: text
    content: 'And when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land that you are entering to take possession of it, you shall set '
  - type: note
    content: ch. 27:12, 13; Josh. 8:33
  - type: text
    content: 'the blessing on Mount Gerizim and the curse on Mount Ebal. '
  '3':
  - type: note
    content: ch. 6:22; 7:19
  - type: text
    content: 'his signs and his deeds that he did in Egypt to Pharaoh the king of Egypt and to all his land, '
  '30':
  - type: text
    content: 'Are they not beyond the Jordan, west of the road, toward the going down of the sun, in the land of the Canaanites who live in the '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'Arabah, opposite Gilgal, beside '
  - type: note
    content: Judg. 7:1
  - type: text
    content: the oak
  - type: note
    content: Septuagint, Syriac; see Genesis 12:6. Hebrew oaks, or terebinths
  - type: text
    content: ' of Moreh? '
  '31':
  - type: text
    content: 'For you are '
  - type: note
    content: ch. 9:1; 12:10; Josh. 1:11
  - type: text
    content: 'to cross over the Jordan to go in to take possession of the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. And when you possess it and live in it, '
  '32':
  - type: text
    content: 'you shall be careful '
  - type: note
    content: ch. 5:32; 12:32
  - type: text
    content: to do all the statutes and the rules that I am setting before you today.
  '4':
  - type: text
    content: 'and what he did to the army of Egypt, to their horses and to their chariots, '
  - type: note
    content: Ex. 14:27, 28; 15:9, 10; Ps. 106:11
  - type: text
    content: 'how he made the water of the Red Sea flow over them as they pursued after you, and how the '
  - type: text
    content: Lord
  - type: text
    content: ' has destroyed them to this day, '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 78:14-40
  - type: text
    content: 'what he did to you in the wilderness, until you came to this place, '
  '6':
  - type: text
    content: 'and '
  - type: note
    content: Num. 16:1, 31; 27:3; Ps. 106:17
  - type: text
    content: 'what he did to Dathan and Abiram the sons of Eliab, son of Reuben, how the earth opened its mouth and swallowed them up, with their households, their tents, and every living thing that followed them, in the midst of all Israel. '
  '7':
  - type: text
    content: 'For your eyes have seen '
  - type: note
    content: Judg. 2:7
  - type: text
    content: 'all the great work of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he did.'
  '8':
  - type: text
    content: '“You shall therefore keep the whole commandment that I command you today, that you may '
  - type: note
    content: ch. 31:6, 7; Josh. 1:6, 7, 9, 18
  - type: text
    content: 'be strong, and go in and take possession of the land that you are going over to possess, '
  '9':
  - type: text
    content: 'and '
  - type: note
    content: See ch. 4:40
  - type: text
    content: 'that you may live long in the land '
  - type: note
    content: See Gen. 50:24
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to your fathers to give to them and to their offspring, '
  - type: note
    content: Ex. 3:8
  - type: text
    content: 'a land flowing with milk and honey. '
