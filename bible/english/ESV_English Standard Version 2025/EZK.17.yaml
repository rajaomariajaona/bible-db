document_id: EZK.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of Two Eagles and a Vine
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'Behold, it is planted; will it thrive? '
  - type: note
    content: ch. 19:12; [Hos. 13:15]
  - type: text
    content: Will it not utterly wither when the east wind strikes it—wither away on the bed where it sprouted?”
  '11':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '12':
  - type: text
    content: '“Say now to '
  - type: note
    content: See ch. 2:3-5
  - type: text
    content: 'the rebellious house, '
  - type: note
    content: See ch. 12:9-11
  - type: text
    content: 'Do you not know what these things mean? Tell them, behold, '
  - type: note
    content: 2 Kgs. 24:11, 12
  - type: text
    content: 'the king of Babylon came to Jerusalem, and took her king and her princes and brought them to him to Babylon. '
  '13':
  - type: note
    content: 2 Kgs. 24:17
  - type: text
    content: And he took one of the royal offspring
  - type: note
    content: Hebrew seed
  - type: text
    content: ' '
  - type: note
    content: ver. 15, 16, 18; 2 Chr. 36:13
  - type: text
    content: 'and made a covenant with him, '
  - type: note
    content: '[ch. 21:23]'
  - type: text
    content: putting him under oath (
  - type: note
    content: 2 Kgs. 24:14, 15
  - type: text
    content: 'the chief men of the land he had taken away), '
  '14':
  - type: text
    content: 'that the kingdom might be humble and not lift itself up, and keep his covenant that it might stand. '
  '15':
  - type: note
    content: '[ver. 7; ch. 23:27; 2 Kgs. 24:20; 2 Chr. 36:13; Jer. 37:5-7]'
  - type: text
    content: 'But he rebelled against him by sending his ambassadors '
  - type: note
    content: Deut. 17:16; [Isa. 31:1, 3]; 36:6, 9
  - type: text
    content: 'to Egypt, that they might give him horses and a large army. '
  - type: note
    content: '[ver. 9, 10]'
  - type: text
    content: 'Will he thrive? Can one escape who does such things? Can he '
  - type: note
    content: ch. 16:59; [ver. 13]
  - type: text
    content: break the covenant and yet escape?
  '16':
  - type: text
    content: ' '
  - type: note
    content: See ch. 16:48
  - type: text
    content: '“As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', surely '
  - type: note
    content: '[ch. 12:13]'
  - type: text
    content: 'in the place where the king dwells '
  - type: note
    content: ver. 13
  - type: text
    content: 'who made him king, whose oath he despised, and whose covenant with him he broke, in Babylon he shall die. '
  '17':
  - type: note
    content: ver. 15; See Jer. 37:5-8
  - type: text
    content: 'Pharaoh with his mighty army and great company will not help him in war, '
  - type: note
    content: See ch. 4:2
  - type: text
    content: 'when mounds are cast up and siege walls built to cut off many lives. '
  '18':
  - type: text
    content: 'He despised the oath in breaking the covenant, and behold, he gave his hand and did all these things; he shall not escape. '
  '19':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': As I live, surely it is my oath that he despised, and my covenant that he broke. I will return it upon his head. '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[ch. 20:49; 24:3]'
  - type: text
    content: 'propound a riddle, and speak a parable to the house of Israel; '
  '20':
  - type: note
    content: See ch. 12:13
  - type: text
    content: 'I will spread my net over him, and he shall be taken in my snare, and I will bring him to Babylon '
  - type: note
    content: '[ch. 20:35; 38:22]'
  - type: text
    content: 'and enter into judgment with him there '
  - type: note
    content: See ch. 14:13
  - type: text
    content: 'for the treachery he has committed against me. '
  '21':
  - type: text
    content: And all the pick
  - type: note
    content: Some Hebrew manuscripts, Syriac, Targum; most Hebrew manuscripts all the fugitives
  - type: text
    content: ' of his troops shall fall by the sword, '
  - type: note
    content: See ch. 5:10
  - type: text
    content: 'and the survivors shall be scattered to every wind, and you shall know that '
  - type: note
    content: ch. 21:17, 32; 26:5, 14; 28:10; 30:12; 34:24; 39:5; [ver. 24]
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ; I have spoken.”
  '22':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ver. 3
  - type: text
    content: '“I myself will take a sprig from the lofty top of the cedar and will set it out. '
  - type: note
    content: ver. 4
  - type: text
    content: 'I will break off from the topmost of its young twigs a tender one, and '
  - type: note
    content: '[Ps. 2:6]'
  - type: text
    content: 'I myself will plant it on a high and lofty mountain. '
  '23':
  - type: note
    content: ch. 20:40; 34:14
  - type: text
    content: 'On the mountain height of Israel will I plant it, that it may bear branches and produce fruit and become a noble cedar. '
  - type: note
    content: ch. 31:6; Dan. 4:12; Matt. 13:32
  - type: text
    content: 'And under it will dwell every kind of bird; in the shade of its branches birds of every sort will nest. '
  '24':
  - type: text
    content: 'And all the trees of the field shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: '[ch. 21:26, 27]'
  - type: text
    content: 'I bring low the high tree, and make high the low tree, dry up '
  - type: note
    content: ch. 20:47; [Luke 23:31]
  - type: text
    content: 'the green tree, and make '
  - type: note
    content: ch. 20:47; [Luke 23:31]
  - type: text
    content: 'the dry tree flourish. '
  - type: note
    content: ch. 22:14; 24:14; 36:36; 37:14
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ; I have spoken, and I will do it.”
  '3':
  - type: text
    content: 'say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: Jer. 48:40
  - type: text
    content: 'A great eagle '
  - type: note
    content: ver. 7
  - type: text
    content: 'with great wings and long pinions, '
  - type: note
    content: ver. 7
  - type: text
    content: 'rich in plumage of many colors, came '
  - type: note
    content: '[Jer. 22:23]'
  - type: text
    content: 'to Lebanon '
  - type: note
    content: ver. 22; ch. 31:3, 4, 10
  - type: text
    content: 'and took the top of the cedar. '
  '4':
  - type: text
    content: 'He broke off the topmost of its young twigs and carried it to a land of trade and set it in a city of merchants. '
  '5':
  - type: text
    content: 'Then he took of the seed of the land '
  - type: note
    content: See Deut. 8:7-10
  - type: text
    content: and planted it in fertile soil.
  - type: note
    content: Hebrew in a field of seed
  - type: text
    content: ' He placed it beside abundant waters. '
  - type: note
    content: '[Isa. 44:4]'
  - type: text
    content: 'He set it like a willow twig, '
  '6':
  - type: text
    content: 'and it sprouted and became a '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'low '
  - type: note
    content: ch. 15:6
  - type: text
    content: spreading vine, and its branches turned toward him, and its roots remained where it stood. So it became a vine and produced branches and put out boughs.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 15 ]'
  - type: text
    content: '“And there was another great eagle with great wings and much plumage, '
  - type: note
    content: '[ver. 15]'
  - type: text
    content: 'and behold, this vine bent its roots toward him and shot forth its branches toward him from '
  - type: note
    content: '[ch. 31:4]'
  - type: text
    content: 'the bed where it was planted, that he might water it. '
  '8':
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: It had been planted on good soil by abundant waters, that it might produce branches and bear fruit and become a noble vine.
  '9':
  - type: text
    content: '“Say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Will it thrive? Will he not pull up its roots and cut off its fruit, so that it withers, so that all its fresh sprouting leaves wither? It will not take a strong arm or many people to pull it from its roots. '
