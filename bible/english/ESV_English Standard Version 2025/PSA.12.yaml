  - type: heading
    content: The Faithful Have Vanished
  - type: text
    content: 'To the choirmaster: according to The Sheminith.'
  - type: note
    content: Probably a musical or liturgical term
  - type: text
    content: ' A Psalm of David.'
  - type: text
    content: 'Save, O '
  - type: text
    content: Lord
  - type: text
    content: ', for '
  - type: note
    content: Isa. 57:1; Mic. 7:2
  - type: text
    content: the godly one is gone;
  - type: text
    content: for the faithful have vanished from among the children of man.
  '2':
  - type: text
    content: 'Everyone '
  - type: note
    content: Ps. 41:6; 144:8
  - type: text
    content: utters lies to his neighbor;
  - type: text
    content: 'with '
  - type: note
    content: Ps. 5:9; Jer. 9:8; Rom. 16:18
  - type: text
    content: 'flattering lips and '
  - type: note
    content: 1 Chr. 12:33; James 1:8
  - type: text
    content: a double heart they speak.
  '3':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' cut off all '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: flattering lips,
  - type: text
    content: 'the tongue that makes '
  - type: note
    content: Dan. 7:8; Rev. 13:5; [Ps. 17:10]
  - type: text
    content: great boasts,
  '4':
  - type: text
    content: those who say, “With our tongue we will prevail,
  - type: text
    content: our lips are with us; who is master over us?”
  '5':
  - type: text
    content: '“Because '
  - type: note
    content: Ps. 9:12
  - type: text
    content: the poor are plundered, because the needy groan,
  - type: note
    content: Isa. 33:10; [ Ps. 82:8 ]
  - type: text
    content: 'I will now arise,” says the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: '“I will place him in the '
  - type: note
    content: See Ps. 55:18
  - type: text
    content: safety for which he longs.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 18:30; 119:140; Prov. 30:5; [ Ps. 19:8 ]
  - type: text
    content: 'The words of the '
  - type: text
    content: Lord
  - type: text
    content: ' are pure words,'
  - type: text
    content: like silver refined in a furnace on the ground,
  - type: text
    content: purified seven times.
  '7':
  - type: text
    content: 'You, O '
  - type: text
    content: Lord
  - type: text
    content: ', will keep them;'
  - type: text
    content: you will guard us
  - type: note
    content: Or guard him
  - type: text
    content: ' from this generation forever.'
  '8':
  - type: text
    content: On every side the wicked prowl,
  - type: text
    content: as vileness is exalted among the children of man.
