          text: ']; See John 9:41'
      marker-yv: yv-n
    - type: text
      text: So whoever knows the right thing to do and fails to do it, for him it is sin.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You desire and do not have, so you murder. You covet and cannot obtain, so you fight and quarrel. You do not have, because you do not ask. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You ask and do not receive, because you ask '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 5:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'wrongly, to spend it on your passions. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
