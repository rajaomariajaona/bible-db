        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:21
      marker-yv: yv-n
    - type: text
      text: '“If the Lord wills, we will live and do this or that.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is, you boast in your arrogance. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 5:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'All such boasting is evil. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
