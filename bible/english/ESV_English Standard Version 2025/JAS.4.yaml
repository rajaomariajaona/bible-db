      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'you are a mist that appears for a little time and then vanishes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead you ought to say, '
    - type: usfm
      marker: x
      children:
