      marker-yv: yv-n
    - type: text
      text: '“Today or tomorrow we will go into such and such a town and spend a year there and trade and make a profit”— '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet you do not know what tomorrow will bring. What is your life? For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
