document_id: JAS.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning Against Worldliness
  - type: text
    content: What causes quarrels and what causes fights among you? Is it not this, that your passions
  - type: note
    content: Greek pleasures; also verse 3
  - type: text
    content: ' are '
  - type: note
    content: Rom. 7:23; 1 Pet. 2:11
  - type: text
    content: at war within you?
  - type: note
    content: Greek in your members
  - type: text
    content: ' '
  '10':
  - type: note
    content: ver. 6; Isa. 57:15; [Luke 1:52]; See Matt. 23:12
  - type: text
    content: Humble yourselves before the Lord, and he will exalt you.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 12:20; 1 Pet. 2:1; [ch. 5:9 ]
  - type: text
    content: Do not speak evil against one another, brothers.
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' The one who speaks against a brother or '
  - type: note
    content: See Matt. 7:1
  - type: text
    content: 'judges his brother, speaks evil against the law and judges the law. But if you judge the law, you are not a doer of the law but a judge. '
  '12':
  - type: text
    content: 'There is only '
  - type: note
    content: Isa. 33:22
  - type: text
    content: 'one lawgiver and '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'judge, he who is able to save and '
  - type: note
    content: Matt. 10:28
  - type: text
    content: 'to destroy. But '
  - type: note
    content: Rom. 14:4
  - type: text
    content: who are you to judge your neighbor?
  - type: heading
    content: Boasting About Tomorrow
  '13':
  - type: text
    content: 'Come now, you who say, '
  - type: note
    content: Prov. 27:1; Luke 12:18-20
  - type: text
    content: '“Today or tomorrow we will go into such and such a town and spend a year there and trade and make a profit”— '
  '14':
  - type: text
    content: 'yet you do not know what tomorrow will bring. What is your life? For '
  - type: note
    content: Ps. 102:3; [Job 7:7]
  - type: text
    content: 'you are a mist that appears for a little time and then vanishes. '
  '15':
  - type: text
    content: 'Instead you ought to say, '
  - type: note
    content: See Acts 18:21
  - type: text
    content: '“If the Lord wills, we will live and do this or that.” '
  '16':
  - type: text
    content: 'As it is, you boast in your arrogance. '
  - type: note
    content: '[1 Cor. 5:6]'
  - type: text
    content: 'All such boasting is evil. '
  '17':
  - type: note
    content: '[Luke 12:47, 48; 2 Pet. 2:21]; See John 9:41'
  - type: text
    content: So whoever knows the right thing to do and fails to do it, for him it is sin.
  '2':
  - type: text
    content: 'You desire and do not have, so you murder. You covet and cannot obtain, so you fight and quarrel. You do not have, because you do not ask. '
  '3':
  - type: text
    content: 'You ask and do not receive, because you ask '
  - type: note
    content: '[1 John 5:14]'
  - type: text
    content: 'wrongly, to spend it on your passions. '
  '4':
  - type: note
    content: Isa. 54:5; Jer. 2:2
  - type: text
    content: You adulterous people!
  - type: note
    content: Or You adulteresses!
  - type: text
    content: ' Do you not know that friendship with the world is enmity with God? '
  - type: note
    content: John 15:19; 1 John 2:15; [Matt. 6:24]
  - type: text
    content: 'Therefore whoever wishes to be a friend of the world makes himself an enemy of God. '
  '5':
  - type: text
    content: 'Or do you suppose it is to no purpose that the Scripture says, “He yearns jealously over the spirit '
  - type: note
    content: 1 Cor. 6:19; 2 Cor. 6:16
  - type: text
    content: 'that he has made to dwell in us”? '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: Isa. 54:7, 8; See Matt. 13:12
  - type: text
    content: 'he gives more grace. Therefore it says, '
  - type: note
    content: 1 Pet. 5:5; Cited from Prov. 3:34 (Gk.)
  - type: text
    content: '“God opposes the proud but '
  - type: note
    content: Isa. 54:7, 8; See Matt. 13:12
  - type: text
    content: 'gives grace to the humble.” '
  '7':
  - type: text
    content: 'Submit yourselves therefore to God. '
  - type: note
    content: 1 Pet. 5:8, 9; [Eph. 4:27; 6:11]
  - type: text
    content: 'Resist the devil, and he will flee from you. '
  '8':
  - type: note
    content: 2 Chr. 15:2; Lam. 3:57; Zech. 1:3; Mal. 3:7; [Luke 15:20]
  - type: text
    content: 'Draw near to God, and he will draw near to you. '
  - type: note
    content: Isa. 1:16
  - type: text
    content: 'Cleanse your hands, you sinners, and '
  - type: note
    content: Jer. 4:14
  - type: text
    content: 'purify your hearts, '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'you double-minded. '
  '9':
  - type: note
    content: '[Matt. 5:4]'
  - type: text
    content: 'Be wretched and mourn and weep. Let your laughter be turned to mourning and your joy to gloom. '
