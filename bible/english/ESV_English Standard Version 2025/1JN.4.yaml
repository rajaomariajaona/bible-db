document_id: 1JN.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Test the Spirits
  - type: text
    content: 'Beloved, '
  - type: note
    content: Jer. 29:8
  - type: text
    content: 'do not believe every spirit, but '
  - type: note
    content: 1 Thess. 5:21; [1 Cor. 12:10; 14:29; Rev. 2:2]
  - type: text
    content: 'test the spirits to see whether they are from God, for '
  - type: note
    content: See ch. 2:18
  - type: text
    content: 'many '
  - type: note
    content: 2 Pet. 2:1
  - type: text
    content: 'false prophets '
  - type: note
    content: 2 John 7
  - type: text
    content: 'have gone out into the world. '
  '10':
  - type: text
    content: 'In this is love, '
  - type: note
    content: Rom. 5:8, 10
  - type: text
    content: 'not that we have loved God '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'but that he loved us and sent his Son to be '
  - type: note
    content: See ch. 2:2
  - type: text
    content: 'the propitiation for our sins. '
  '11':
  - type: text
    content: 'Beloved, if God so loved us, we also ought to love one another. '
  '12':
  - type: note
    content: ver. 20; John 1:18; 1 Tim. 6:16
  - type: text
    content: 'No one has ever seen God; if we love one another, God abides in us and '
  - type: note
    content: ch. 2:5
  - type: text
    content: his love is perfected in us.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:24
  - type: text
    content: 'By this we know that we abide in him and he in us, because he has given us of his Spirit. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: ch. 1:1, 2
  - type: text
    content: 'we have seen and testify that '
  - type: note
    content: See John 3:17
  - type: text
    content: 'the Father has sent his Son to be the Savior of '
  - type: note
    content: See ch. 2:2
  - type: text
    content: 'the world. '
  '15':
  - type: note
    content: ch. 5:5; [Rom. 10:9]; See Matt. 14:33
  - type: text
    content: 'Whoever confesses that Jesus is the Son of God, God abides in him, and he in God. '
  '16':
  - type: text
    content: 'So '
  - type: note
    content: John 6:69
  - type: text
    content: 'we have come to know and to believe the love that God has for us. '
  - type: note
    content: See ver. 8
  - type: text
    content: 'God is love, and '
  - type: note
    content: ver. 12; ch. 3:24
  - type: text
    content: 'whoever abides in love abides in God, and God abides in him. '
  '17':
  - type: text
    content: 'By this '
  - type: note
    content: '[ch. 2:5]'
  - type: text
    content: 'is love perfected with us, so that '
  - type: note
    content: ch. 2:28; 3:21
  - type: text
    content: 'we may have confidence for the day of judgment, because '
  - type: note
    content: '[ch. 3:1]'
  - type: text
    content: 'as he is so also are we in this world. '
  '18':
  - type: text
    content: 'There is no fear in love, but '
  - type: note
    content: '[John 3:18; Rom. 8:15]'
  - type: text
    content: 'perfect love casts out fear. For fear has to do with punishment, and whoever fears has not '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'been perfected in love. '
  '19':
  - type: note
    content: ver. 10
  - type: text
    content: 'We love because he first loved us. '
  '2':
  - type: text
    content: 'By this you know the Spirit of God: '
  - type: note
    content: '[1 Cor. 12:3]'
  - type: text
    content: 'every spirit that confesses that '
  - type: note
    content: 2 John 7
  - type: text
    content: 'Jesus Christ has come in the flesh is from God, '
  '20':
  - type: note
    content: ch. 2:4; 3:17
  - type: text
    content: 'If anyone says, “I love God,” and '
  - type: note
    content: ch. 2:9, 11
  - type: text
    content: hates his brother, he is a liar; for he who does not love his brother whom he has seen cannot
  - type: note
    content: Some manuscripts how can he
  - type: text
    content: ' love God '
  - type: note
    content: ver. 12; [1 Pet. 1:8]
  - type: text
    content: 'whom he has not seen. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: Gal. 6:2
  - type: text
    content: 'this commandment we have from him: '
  - type: note
    content: ver. 7; ch. 3:11
  - type: text
    content: whoever loves God must also love his brother.
  '3':
  - type: text
    content: 'and every spirit '
  - type: note
    content: ch. 2:22; 2 John 7
  - type: text
    content: 'that does not confess Jesus is not from God. This is the spirit of the antichrist, which you heard was coming and '
  - type: note
    content: ch. 2:18; [2 Thess. 2:3-7]
  - type: text
    content: 'now is in the world already. '
  '4':
  - type: text
    content: 'Little children, you are from God and have overcome them, for '
  - type: note
    content: See Rom. 8:31
  - type: text
    content: 'he who is in you is greater than '
  - type: note
    content: '[1 Cor. 2:12]; See John 12:31'
  - type: text
    content: 'he who is in the world. '
  '5':
  - type: note
    content: John 3:31; 8:23
  - type: text
    content: 'They are from the world; therefore they speak from the world, and '
  - type: note
    content: John 15:19
  - type: text
    content: 'the world listens to them. '
  '6':
  - type: text
    content: 'We are from God. '
  - type: note
    content: '[John 8:47; 10:16; 18:37; 1 Cor. 14:37]'
  - type: text
    content: 'Whoever knows God listens to us; whoever is not from God does not listen to us. By this we know '
  - type: note
    content: John 14:17; 15:26; 16:13
  - type: text
    content: 'the Spirit of truth and '
  - type: note
    content: '[1 Cor. 2:12; 1 Tim. 4:1]'
  - type: text
    content: the spirit of error.
  - type: heading
    content: God Is Love
  '7':
  - type: text
    content: 'Beloved, '
  - type: note
    content: ch. 3:11
  - type: text
    content: 'let us love one another, for love is from God, and '
  - type: note
    content: ch. 2:29
  - type: text
    content: 'whoever loves has been born of God and knows God. '
  '8':
  - type: note
    content: ch. 3:10
  - type: text
    content: 'Anyone who does not love does not know God, because '
  - type: note
    content: ver. 16; 2 Cor. 13:11; [ch. 1:5; John 4:24]
  - type: text
    content: 'God is love. '
  '9':
  - type: text
    content: 'In this the love of God was made manifest among us, that '
  - type: note
    content: See John 3:16
  - type: text
    content: 'God sent his only Son into the world, so that we might live through him. '
