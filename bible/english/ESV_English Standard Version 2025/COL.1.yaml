document_id: COL.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: See 2 Cor. 1:1
  - type: text
    content: 'an apostle of Christ Jesus '
  - type: note
    content: See 1 Cor. 1:1
  - type: text
    content: 'by the will of God, and Timothy '
  - type: note
    content: See 1 Thess. 3:2
  - type: text
    content: our brother,
  '10':
  - type: text
    content: 'so as '
  - type: note
    content: '[Ps. 1:1, 3]; See Eph. 4:1'
  - type: text
    content: 'to walk in a manner worthy of the Lord, '
  - type: note
    content: '[2 Cor. 5:9; Eph. 5:10; 1 Thess. 4:1]'
  - type: text
    content: 'fully pleasing to him: '
  - type: note
    content: ver. 6
  - type: text
    content: 'bearing fruit in every good work and increasing in the knowledge of God; '
  '11':
  - type: note
    content: See Eph. 3:16
  - type: text
    content: 'being strengthened with all power, according to his glorious might, for '
  - type: note
    content: Eph. 4:2
  - type: text
    content: 'all endurance and patience '
  - type: note
    content: See Matt. 5:12
  - type: text
    content: 'with joy; '
  '12':
  - type: note
    content: ch. 3:15; Eph. 5:20
  - type: text
    content: giving thanks
  - type: note
    content: Or patience, with joy giving thanks
  - type: text
    content: ' to the Father, who has qualified you'
  - type: note
    content: Some manuscripts us
  - type: text
    content: ' to share in '
  - type: note
    content: See Acts 26:18
  - type: text
    content: 'the inheritance of the saints in light. '
  '13':
  - type: text
    content: 'He '
  - type: note
    content: 1 Thess. 1:10
  - type: text
    content: 'has delivered us from '
  - type: note
    content: Luke 22:53; Eph. 6:12
  - type: text
    content: 'the domain of darkness and transferred us to '
  - type: note
    content: 2 Pet. 1:11
  - type: text
    content: 'the kingdom of '
  - type: note
    content: '[Eph. 1:6]'
  - type: text
    content: 'his beloved Son, '
  '14':
  - type: note
    content: See Eph. 1:7
  - type: text
    content: in whom we have redemption, the forgiveness of sins.
  - type: heading
    content: The Preeminence of Christ
  '15':
  - type: text
    content: ' '
  - type: note
    content: See 2 Cor. 4:4
  - type: text
    content: 'He is the image of '
  - type: note
    content: See 1 Tim. 1:17
  - type: text
    content: 'the invisible God, '
  - type: note
    content: '[Ps. 89:27]; See Rom. 8:29'
  - type: text
    content: 'the firstborn of all creation. '
  '16':
  - type: text
    content: For by
  - type: note
    content: That is, by means of; or in
  - type: text
    content: ' him all things were created, '
  - type: note
    content: Eph. 1:10
  - type: text
    content: 'in heaven and on earth, visible and invisible, whether '
  - type: note
    content: '[Ezek. 10:1]'
  - type: text
    content: 'thrones or '
  - type: note
    content: Eph. 1:21
  - type: text
    content: 'dominions or rulers or authorities—all things were created '
  - type: note
    content: Rom. 11:36; 1 Cor. 8:6
  - type: text
    content: 'through him and for him. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: '[John 8:58]; See John 1:1'
  - type: text
    content: 'he is before all things, and in him all things '
  - type: note
    content: '[Heb. 1:3]'
  - type: text
    content: 'hold together. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: See Eph. 1:22, 23
  - type: text
    content: 'he is the head of the body, the church. He is '
  - type: note
    content: Rev. 3:14
  - type: text
    content: 'the beginning, '
  - type: note
    content: Acts 26:23; 1 Cor. 15:20; Rev. 1:5
  - type: text
    content: 'the firstborn from the dead, that in everything he might be preeminent. '
  '19':
  - type: text
    content: 'For '
  - type: note
    content: ch. 2:9
  - type: text
    content: 'in him all the '
  - type: note
    content: See John 1:16
  - type: text
    content: 'fullness of God was pleased to dwell, '
  '2':
  - type: text
    content: 'To the '
  - type: note
    content: Eph. 1:1; See Phil. 1:1
  - type: text
    content: saints and faithful brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' in Christ at Colossae:'
  - type: note
    content: Rom. 1:7
  - type: text
    content: Grace to you and peace from God our Father.
  - type: heading
    content: Thanksgiving and Prayer
  '20':
  - type: text
    content: 'and '
  - type: note
    content: See 2 Cor. 5:18; Eph. 1:10
  - type: text
    content: 'through him to reconcile to himself all things, whether on earth or in heaven, '
  - type: note
    content: See Eph. 2:14
  - type: text
    content: 'making peace '
  - type: note
    content: '[Eph. 2:13]'
  - type: text
    content: by the blood of his cross.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See Eph. 2:1, 2, 12
  - type: text
    content: 'And you, who once were alienated and hostile in mind, '
  - type: note
    content: '[Titus 1:16]'
  - type: text
    content: 'doing evil deeds, '
  '22':
  - type: text
    content: 'he has now reconciled '
  - type: note
    content: '[Rom. 7:4]'
  - type: text
    content: 'in his body of flesh by his death, '
  - type: note
    content: Jude 24; See Eph. 1:4; 5:27
  - type: text
    content: 'in order to present you holy and blameless and '
  - type: note
    content: 1 Cor. 1:8
  - type: text
    content: 'above reproach before him, '
  '23':
  - type: note
    content: See John 15:4
  - type: text
    content: 'if indeed you continue in the faith, '
  - type: note
    content: ch. 2:7; Eph. 3:17
  - type: text
    content: 'stable and steadfast, not shifting from '
  - type: note
    content: ver. 5, 6
  - type: text
    content: 'the hope of the gospel that you heard, which has been proclaimed '
  - type: note
    content: Mark 16:15; [Acts 2:5]
  - type: text
    content: in all creation
  - type: note
    content: Or to every creature
  - type: text
    content: ' under heaven, '
  - type: note
    content: See 2 Cor. 3:6
  - type: text
    content: and of which I, Paul, became a minister.
  - type: heading
    content: Paul’s Ministry to the Church
  '24':
  - type: text
    content: 'Now '
  - type: note
    content: See 2 Cor. 7:4
  - type: text
    content: 'I rejoice in my sufferings for your sake, and in my flesh '
  - type: note
    content: '[2 Tim. 1:8; 2:10]'
  - type: text
    content: 'I am filling up '
  - type: note
    content: See 2 Cor. 1:5
  - type: text
    content: 'what is lacking in Christ’s afflictions '
  - type: note
    content: '[Eph. 4:12]'
  - type: text
    content: 'for the sake of his body, that is, the church, '
  '25':
  - type: note
    content: ver. 23
  - type: text
    content: 'of which I became a minister according to '
  - type: note
    content: See Eph. 3:2
  - type: text
    content: 'the stewardship from God that was given to me for you, to make the word of God fully known, '
  '26':
  - type: note
    content: Eph. 3:9; See Rom. 16:25, 26
  - type: text
    content: 'the mystery hidden for ages and generations but now revealed to his saints. '
  '27':
  - type: note
    content: '[ch. 2:2]'
  - type: text
    content: 'To them God chose to make known how great among the Gentiles are '
  - type: note
    content: Eph. 1:18; 3:16
  - type: text
    content: 'the riches of the glory of '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'this mystery, which is Christ in you, '
  - type: note
    content: 1 Tim. 1:1
  - type: text
    content: 'the hope of glory. '
  '28':
  - type: text
    content: 'Him we proclaim, warning everyone and teaching everyone with all wisdom, that '
  - type: note
    content: See ver. 22, 23
  - type: text
    content: 'we may present everyone '
  - type: note
    content: See Matt. 5:48
  - type: text
    content: 'mature in Christ. '
  '29':
  - type: text
    content: 'For this '
  - type: note
    content: 1 Cor. 15:10; 1 Tim. 4:10
  - type: text
    content: 'I toil, '
  - type: note
    content: ch. 4:12; [ch. 2:1]
  - type: text
    content: 'struggling '
  - type: note
    content: See Eph. 1:19
  - type: text
    content: with all his energy that he powerfully works within me.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Eph. 1:15, 16; Philem. 4
  - type: text
    content: 'We always thank God, the Father of our Lord Jesus Christ, when we pray for you, '
  '4':
  - type: text
    content: 'since we heard of '
  - type: note
    content: See 1 Thess. 1:3
  - type: text
    content: 'your faith in Christ Jesus and of '
  - type: note
    content: See 1 Thess. 1:3
  - type: text
    content: 'the love that you have for all the saints, '
  '5':
  - type: text
    content: 'because of '
  - type: note
    content: ver. 23; See Acts 23:6; Titus 1:2; Heb. 3:6
  - type: text
    content: 'the hope '
  - type: note
    content: 2 Tim. 4:8; 1 Pet. 1:4
  - type: text
    content: 'laid up for you in heaven. Of this you have heard before in '
  - type: note
    content: See Eph. 1:13
  - type: text
    content: 'the word of the truth, the gospel, '
  '6':
  - type: text
    content: 'which has come to you, as indeed '
  - type: note
    content: '[ver. 23; Ps. 98:3]; See Matt. 24:14'
  - type: text
    content: 'in the whole world it is '
  - type: note
    content: John 15:5, 16; [Phil. 1:11]
  - type: text
    content: 'bearing fruit and increasing—as it also does among you, since the day you '
  - type: note
    content: '[Rom. 16:26; Eph. 4:21]'
  - type: text
    content: 'heard it and understood '
  - type: note
    content: See Acts 11:23
  - type: text
    content: 'the grace of God in truth, '
  '7':
  - type: text
    content: 'just as you learned it from '
  - type: note
    content: ch. 4:12; Philem. 23
  - type: text
    content: 'Epaphras our beloved '
  - type: note
    content: ch. 4:7
  - type: text
    content: fellow servant.
  - type: note
    content: For the contextual rendering of the Greek word sundoulos, see Preface
  - type: text
    content: ' He is '
  - type: note
    content: ch. 4:7
  - type: text
    content: a faithful minister of Christ on your
  - type: note
    content: Some manuscripts our
  - type: text
    content: ' behalf '
  '8':
  - type: text
    content: 'and has made known to us your '
  - type: note
    content: '[Rom. 15:30]'
  - type: text
    content: love in the Spirit.
  '9':
  - type: text
    content: 'And so, '
  - type: note
    content: ver. 4
  - type: text
    content: 'from the day we heard, '
  - type: note
    content: 2 Thess. 1:11
  - type: text
    content: 'we have not ceased to pray for you, asking that '
  - type: note
    content: '[Eph. 1:17]'
  - type: text
    content: 'you may be filled with the knowledge of his will in all '
  - type: note
    content: ch. 4:5; Eph. 1:8; [1 Cor. 12:8]
  - type: text
    content: 'spiritual wisdom and understanding, '
