document_id: JER.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Threatened with Death
  - type: text
    content: ' '
  - type: note
    content: ch. 27:1
  - type: text
    content: 'In the beginning of the reign of '
  - type: note
    content: 2 Kgs. 23:36; 2 Chr. 36:5
  - type: text
    content: 'Jehoiakim the son of Josiah, king of Judah, this word came from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'When '
  - type: note
    content: ch. 36:12
  - type: text
    content: 'the officials of Judah heard these things, they came up from the king’s house to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and took their seat in the '
  - type: note
    content: ch. 36:10
  - type: text
    content: 'entry of the New Gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the priests and the prophets said to the officials and to all the people, '
  - type: note
    content: ch. 38:4; [ver. 16]
  - type: text
    content: “This man deserves the sentence of death, because he has prophesied against this city, as you have heard with your own ears.”
  '12':
  - type: text
    content: 'Then Jeremiah spoke to all the officials and all the people, saying, “The '
  - type: text
    content: Lord
  - type: text
    content: ' sent me to prophesy against this house and this city all the words you have heard. '
  '13':
  - type: text
    content: 'Now therefore '
  - type: note
    content: See ch. 7:3
  - type: text
    content: 'mend your ways and your deeds, '
  - type: note
    content: Deut. 30:2
  - type: text
    content: 'and obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will relent of the disaster that he has pronounced against you. '
  '14':
  - type: note
    content: Josh. 9:25
  - type: text
    content: 'But as for me, behold, I am in your hands. Do with me as seems good and right to you. '
  '15':
  - type: text
    content: 'Only know for certain that if you put me to death, '
  - type: note
    content: '[Matt. 27:24]'
  - type: text
    content: 'you will bring innocent blood upon yourselves and upon this city and its inhabitants, for in truth the '
  - type: text
    content: Lord
  - type: text
    content: ' sent me to you to speak all these words in your ears.”'
  - type: heading
    content: Jeremiah Spared from Death
  '16':
  - type: text
    content: ' '
  - type: note
    content: ver. 8
  - type: text
    content: 'Then the officials and all the people said to the priests and the prophets, '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: '“This man does not deserve the sentence of death, for he has spoken to us in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.” '
  '17':
  - type: note
    content: '[Acts 5:34]'
  - type: text
    content: 'And certain of '
  - type: note
    content: See ch. 19:1
  - type: text
    content: 'the elders of the land arose and spoke to all the assembled people, saying, '
  '18':
  - type: text
    content: '“Micah of Moresheth prophesied in the days of Hezekiah king of Judah, and said to all the people of Judah: ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: note
    content: Mic. 3:12
  - type: text
    content: “‘Zion shall be plowed as a field;
  - type: text
    content: Jerusalem shall become a heap of ruins,
  - type: text
    content: and the mountain of the house a wooded height.’
  '19':
  - type: text
    content: 'Did Hezekiah king of Judah and all Judah put him to death? '
  - type: note
    content: '[2 Chr. 32:26]'
  - type: text
    content: 'Did he not fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and entreat the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 32:14; 2 Sam. 24:16; [1 Kgs. 13:6]
  - type: text
    content: 'and did not the '
  - type: text
    content: Lord
  - type: text
    content: ' relent of the disaster that he had pronounced against them? '
  - type: note
    content: '[Acts 5:39]'
  - type: text
    content: But we are about to bring great disaster upon ourselves.”
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 19:14
  - type: text
    content: 'Stand in the court of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house, and speak to all the cities of Judah that come to worship in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Ezek. 3:10]'
  - type: text
    content: 'all the words that I command you to speak to them; '
  - type: note
    content: Deut. 4:2; 12:32; [Acts 20:27]
  - type: text
    content: 'do not hold back a word. '
  '20':
  - type: text
    content: 'There was another man who prophesied in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', Uriah the son of Shemaiah from '
  - type: note
    content: Josh. 9:17; 1 Sam. 6:21; 7:1, 2; 1 Chr. 13:5, 6
  - type: text
    content: 'Kiriath-jearim. He prophesied against this city and against this land in words like those of Jeremiah. '
  '21':
  - type: text
    content: 'And when '
  - type: note
    content: ver. 1; ch. 27:1
  - type: text
    content: 'King Jehoiakim, with all his warriors and all the officials, heard his words, the king sought to put him to death. But when Uriah heard of it, he was afraid and fled and escaped to Egypt. '
  '22':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'King Jehoiakim sent to Egypt certain men, '
  - type: note
    content: ch. 36:12, 25
  - type: text
    content: 'Elnathan the son of '
  - type: note
    content: 2 Kgs. 22:12, 14
  - type: text
    content: 'Achbor and others with him, '
  '23':
  - type: text
    content: 'and they took Uriah from Egypt and brought him to King Jehoiakim, '
  - type: note
    content: '[ch. 22:17; Neh. 9:26; Matt. 21:35; 23:37]'
  - type: text
    content: who struck him down with the sword and dumped his dead body into the burial place of the common people.
  '24':
  - type: text
    content: 'But the hand of '
  - type: note
    content: 2 Kgs. 22:12
  - type: text
    content: Ahikam the son of Shaphan was with Jeremiah so that he was not given over to the people to be put to death.
  '3':
  - type: note
    content: ch. 36:3
  - type: text
    content: 'It may be they will listen, and every one turn from his evil way, '
  - type: note
    content: ver. 13, 19; See ch. 18:8
  - type: text
    content: 'that I may relent of the disaster that I intend to do to them '
  - type: note
    content: ch. 4:4
  - type: text
    content: 'because of their evil deeds. '
  '4':
  - type: text
    content: 'You shall say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Lev. 26:14; Deut. 28:15
  - type: text
    content: 'If you will not listen to me, to walk in my law that I have set before you, '
  '5':
  - type: note
    content: See ch. 25:3, 4
  - type: text
    content: 'and to listen to the words of my servants the prophets whom I send to you '
  - type: note
    content: See ch. 25:3, 4
  - type: text
    content: 'urgently, '
  - type: note
    content: See ch. 25:3, 4
  - type: text
    content: 'though you have not listened, '
  '6':
  - type: text
    content: 'then I will make this house '
  - type: note
    content: See ch. 7:12
  - type: text
    content: 'like Shiloh, and I will make this city '
  - type: note
    content: See ch. 24:9
  - type: text
    content: a curse for all the nations of the earth.’”
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:33
  - type: text
    content: 'The priests and the prophets and all the people heard Jeremiah speaking these words in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'And when Jeremiah had finished speaking all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him to speak to all the people, then '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the priests and the prophets and all the people laid hold of him, saying, “You shall die! '
  '9':
  - type: text
    content: 'Why have you prophesied in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘This house shall be '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'like Shiloh, and this city shall be desolate, '
  - type: note
    content: See ch. 4:7
  - type: text
    content: 'without inhabitant’?” And all the people gathered around Jeremiah in the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
