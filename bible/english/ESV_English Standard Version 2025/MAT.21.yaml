document_id: MAT.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumphal Entry
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see Mark 11:1-10; Luke 19:29-38; John 12:12-15
  - type: text
    content: 'Now when they drew near to Jerusalem and came to Bethphage, to '
  - type: note
    content: ch. 24:3; 26:30; Zech. 14:4; [John 8:1]; [Acts 1:12]
  - type: text
    content: 'the Mount of Olives, then Jesus '
  - type: note
    content: '[Mark 14:13]'
  - type: text
    content: 'sent two disciples, '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Mark 11:11
  - type: text
    content: 'when he entered Jerusalem, the whole city was stirred up, saying, “Who is this?” '
  '11':
  - type: text
    content: 'And the crowds said, “This is '
  - type: note
    content: ver. 46; Luke 7:16; 13:33; 24:19; John 4:19; 6:14; 7:40; 9:17; [Mark 6:15; Luke 9:8, 19; John 1:21]
  - type: text
    content: 'the prophet Jesus, '
  - type: note
    content: See ch. 2:23
  - type: text
    content: from Nazareth of Galilee.”
  - type: heading
    content: Jesus Cleanses the Temple
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-16, see Mark 11:15-18; Luke 19:45-47; [ John 2:14-16 ]
  - type: text
    content: And Jesus entered the temple
  - type: note
    content: Some manuscripts add of God
  - type: text
    content: ' and drove out all who sold and bought in the temple, and he overturned the tables of '
  - type: note
    content: '[Ex. 30:13]'
  - type: text
    content: 'the money-changers and the seats of those who sold '
  - type: note
    content: Lev. 1:14; 5:7; 12:8; Luke 2:24
  - type: text
    content: 'pigeons. '
  '13':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“It is written, '
  - type: note
    content: Cited from Isa. 56:7
  - type: text
    content: '‘My house shall be called a house of prayer,’ but '
  - type: note
    content: Jer. 7:11
  - type: text
    content: you make it a den of robbers.”
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:5; 15:31
  - type: text
    content: 'And the blind and the lame came to him in the temple, and he healed them. '
  '15':
  - type: note
    content: '[Luke 19:39, 40]'
  - type: text
    content: 'But when the chief priests and the scribes saw the wonderful things that he did, and the children crying out in the temple, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: '“Hosanna to the Son of David!” they were indignant, '
  '16':
  - type: text
    content: 'and they said to him, “Do you hear what these are saying?” And Jesus said to them, '
  - type: text
    content: '“Yes; '
  - type: note
    content: ver. 42; ch. 12:3, 5; 19:4; 22:31
  - type: text
    content: have you never read,
  - type: note
    content: Cited from Ps. 8:2 (Gk.)
  - type: text
    content: '“‘Out of the mouth of '
  - type: note
    content: ch. 11:25
  - type: text
    content: infants and nursing babies
  - type: text
    content: you have prepared praise’?”
  '17':
  - type: text
    content: 'And '
  - type: note
    content: ch. 16:4
  - type: text
    content: 'leaving them, he '
  - type: note
    content: Mark 11:19; [Luke 21:37]
  - type: text
    content: 'went out of the city to '
  - type: note
    content: Mark 11:1; Luke 19:29; 24:50; John 11:18
  - type: text
    content: Bethany and lodged there.
  - type: heading
    content: Jesus Curses the Fig Tree
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-22, see Mark 11:12-14, 20-24
  - type: text
    content: 'In the morning, as he was returning to the city, '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'he became hungry. '
  '19':
  - type: note
    content: '[Luke 13:6-9]'
  - type: text
    content: 'And seeing a fig tree by the wayside, he went to it and found nothing on it but only leaves. And he said to it, '
  - type: text
    content: “May no fruit ever come from you again!”
  - type: text
    content: ' And the fig tree withered at once.'
  '2':
  - type: text
    content: 'saying to them, '
  - type: text
    content: “Go into the village in front of you, and immediately you will find a donkey tied, and a colt with her. Untie them and bring them to me.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'When the disciples saw it, they marveled, saying, “How did the fig tree wither at once?” '
  '21':
  - type: text
    content: 'And Jesus answered them, '
  - type: note
    content: ch. 17:20
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: '[John 14:12]'
  - type: text
    content: 'if you have faith and '
  - type: note
    content: Acts 10:20; Rom. 4:20; 14:23; James 1:6
  - type: text
    content: 'do not doubt, you will not only do what has been done to the fig tree, but even if you say to this mountain, '
  - type: note
    content: '[Ps. 46:2; 1 Cor. 13:2; Rev. 8:8]'
  - type: text
    content: ‘Be taken up and thrown into the sea,’ it will happen.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'whatever you ask in prayer, you will receive, '
  - type: note
    content: See ch. 7:7
  - type: text
    content: if you have faith.”
  - type: heading
    content: The Authority of Jesus Challenged
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-27, see Mark 11:27-33; Luke 20:1-8
  - type: text
    content: 'And when he entered the temple, the chief priests and the elders of the people came up to him '
  - type: note
    content: See ch. 26:55
  - type: text
    content: 'as he was teaching, and said, '
  - type: note
    content: '[Ex. 2:14; John 1:25; Acts 4:7]'
  - type: text
    content: '“By what authority are you doing these things, and who gave you this authority?” '
  '24':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “I also will ask you one question, and if you tell me the answer, then I also will tell you by what authority I do these things.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'The baptism of John, '
  - type: note
    content: '[ch. 13:54]'
  - type: text
    content: 'from where did it come? '
  - type: note
    content: Luke 15:18, 21; John 3:27
  - type: text
    content: From heaven or from man?”
  - type: text
    content: ' And they discussed it among themselves, saying, “If we say, ‘From heaven,’ he will say to us, '
  - type: note
    content: ver. 32; Luke 7:30
  - type: text
    content: '‘Why then did you not believe him?’ '
  '26':
  - type: text
    content: 'But if we say, ‘From man,’ '
  - type: note
    content: ver. 46; ch. 14:5
  - type: text
    content: 'we are afraid of the crowd, for they all hold that John was '
  - type: note
    content: '[John 5:35]; See ch. 11:9'
  - type: text
    content: 'a prophet.” '
  '27':
  - type: text
    content: 'So they answered Jesus, “We do not know.” And he said to them, '
  - type: text
    content: “Neither will I tell you by what authority I do these things.
  - type: heading
    content: The Parable of the Two Sons
  '28':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:25; 18:12
  - type: text
    content: '“What do you think? A man had two sons. And he went to the first and said, ‘Son, go and work in '
  - type: note
    content: ver. 33 ; ch. 20:1
  - type: text
    content: the vineyard today.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And he answered, ‘I will not,’ but afterward he '
  - type: note
    content: ver. 32; ch. 27:3; Heb. 7:21
  - type: text
    content: changed his mind and went.
  - type: text
    content: ' '
  '3':
  - type: text
    content: If anyone says anything to you, you shall say, ‘The Lord needs them,’ and he will send them at once.”
  - type: text
    content: ' '
  '30':
  - type: text
    content: And he went to the other son and said the same. And he answered, ‘I will, sir,’ but did not go.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Which of the two did the will of his father?”
  - type: text
    content: ' They said, “The first.” Jesus said to them, '
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: Luke 7:29
  - type: text
    content: 'the tax collectors and '
  - type: note
    content: Luke 7:37-50
  - type: text
    content: 'the prostitutes go into '
  - type: note
    content: See ch. 12:28
  - type: text
    content: the kingdom of God before you.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For John came to you '
  - type: note
    content: '[ch. 3:8-12, 15; Prov. 8:20; 2 Pet. 2:21]'
  - type: text
    content: 'in the way of righteousness, and '
  - type: note
    content: ver. 25; ch. 11:18
  - type: text
    content: 'you did not believe him, but '
  - type: note
    content: Luke 3:12, 13
  - type: text
    content: 'the tax collectors and the prostitutes believed him. And even when you saw it, you did not afterward '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: change your minds and believe him.
  - type: heading
    content: The Parable of the Tenants
  '33':
  - type: text
    content: ' '
  - type: note
    content: For ver. 33-46, see Mark 12:1-12; Luke 20:9-19
  - type: text
    content: '“Hear another parable. There was a master of a house who planted '
  - type: note
    content: ver. 28 ; Ps. 80:8; Isa. 5:1
  - type: text
    content: 'a vineyard '
  - type: note
    content: Isa. 5:2
  - type: text
    content: 'and put a fence around it and dug a winepress in it and built a tower and '
  - type: note
    content: Song 8:11, 12
  - type: text
    content: 'leased it to tenants, and '
  - type: note
    content: ch. 25:14, 15; [ Mark 13:34 ]
  - type: text
    content: went into another country.
  - type: text
    content: ' '
  '34':
  - type: text
    content: When the season for fruit drew near, he sent his servants
  - type: note
    content: Or bondservants; also verses 35, 36
  - type: text
    content: ' '
  - type: text
    content: 'to the tenants '
  - type: note
    content: '[See ver. 33 above]'
  - type: text
    content: to get his fruit.
  - type: text
    content: ' '
  '35':
  - type: note
    content: ch. 5:12; 22:6; 23:34, 37; [2 Chr. 24:19; 36:15, 16; Neh. 9:26; Jer. 37:15; 38:6; Acts 7:52; 2 Cor. 11:24-26; 1 Thess. 2:15; Heb. 11:36, 37]
  - type: text
    content: 'And the tenants took his servants and beat one, killed another, and '
  - type: note
    content: '[2 Chr. 24:21; John 10:31-33; Acts 7:59]'
  - type: text
    content: stoned another.
  - type: text
    content: ' '
  '36':
  - type: note
    content: ch. 22:4
  - type: text
    content: Again he sent other servants, more than the first. And they did the same to them.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Finally he sent his son to them, saying, ‘They will respect my son.’
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'But when the tenants saw the son, they said to themselves, '
  - type: note
    content: Heb. 1:2; [John 1:11; Rom. 8:17]
  - type: text
    content: '‘This is the heir. Come, '
  - type: note
    content: '[1 Kgs. 21:19]'
  - type: text
    content: let us kill him and have his inheritance.’
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And they took him and '
  - type: note
    content: Heb. 13:12
  - type: text
    content: threw him out of the vineyard and killed him.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'This took place '
  - type: note
    content: See ch. 1:22
  - type: text
    content: to fulfill what was spoken by the prophet, saying,
  '40':
  - type: note
    content: '[ch. 24:50; 25:19]'
  - type: text
    content: When therefore the owner of the vineyard comes, what will he do to those tenants?”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'They said to him, '
  - type: note
    content: Luke 19:27
  - type: text
    content: '“He will put those wretches to a miserable death and '
  - type: note
    content: ver. 43; Acts 13:46; 18:6; 28:28; [ch. 8:11, 12]
  - type: text
    content: let out the vineyard to other tenants who will give him the fruits in their seasons.”
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: ver. 16
  - type: text
    content: '“Have you never read in the Scriptures:'
  - type: note
    content: Acts 4:11; 1 Pet. 2:7; Cited from Ps. 118:22, 23
  - type: text
    content: “‘The stone that the builders rejected
  - type: text
    content: has become the cornerstone;
  - type: note
    content: Greek the head of the corner
  - type: text
    content: this was the Lord’s doing,
  - type: text
    content: and it is marvelous in our eyes’?
  '43':
  - type: text
    content: ' '
  - type: text
    content: 'Therefore I tell you, the kingdom of God '
  - type: note
    content: '[ Luke 14:24 ]'
  - type: text
    content: 'will be taken away from you and given to a people '
  - type: note
    content: '[ch. 3:10; Isa. 5:4, 7 ]'
  - type: text
    content: producing its fruits.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And '
  - type: note
    content: Isa. 8:14, 15; Rom. 9:32, 33; 1 Pet. 2:8
  - type: text
    content: 'the one who falls on this stone will be broken to pieces; and '
  - type: note
    content: Dan. 2:34, 35, 44, 45
  - type: text
    content: when it falls on anyone, it will crush him.”
  - type: note
    content: Some manuscripts omit verse 44
  '45':
  - type: text
    content: 'When the chief priests and the Pharisees heard his parables, they perceived that he was speaking about them. '
  '46':
  - type: text
    content: 'And '
  - type: note
    content: Mark 11:18; Luke 19:47, 48; John 7:25, 30, 44; [ch. 26:4]
  - type: text
    content: 'although they were seeking to arrest him, '
  - type: note
    content: ver. 26
  - type: text
    content: 'they feared the crowds, because they held him to be '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: a prophet.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cited from Zech. 9:9; [ Isa. 62:11 ]
  - type: text
    content: “Say to the daughter of Zion,
  - type: text
    content: ‘Behold, your king is coming to you,
  - type: note
    content: ch. 11:29
  - type: text
    content: humble, and mounted on a donkey,
  - type: text
    content: on a colt,
  - type: note
    content: Or donkey, and on a colt
  - type: text
    content: ' the foal of a beast of burden.’”'
  '6':
  - type: text
    content: 'The disciples went and did as Jesus had directed them. '
  '7':
  - type: text
    content: 'They brought the donkey and the colt and put on them their cloaks, and he sat on them. '
  '8':
  - type: text
    content: 'Most of the crowd '
  - type: note
    content: 2 Kgs. 9:13
  - type: text
    content: 'spread their cloaks on the road, and others cut branches from the trees and spread them on the road. '
  '9':
  - type: text
    content: 'And the crowds that went before him and that followed him were shouting, '
  - type: note
    content: '[Rev. 7:10]; See Ps. 118:25 (Heb.)'
  - type: text
    content: '“Hosanna to '
  - type: note
    content: ch. 20:30
  - type: text
    content: 'the Son of David! '
  - type: note
    content: ch. 23:39; Cited from Ps. 118:26
  - type: text
    content: 'Blessed is he who comes in the name of the Lord! Hosanna '
  - type: note
    content: Luke 2:14; [Ps. 148:1]
  - type: text
    content: 'in the highest!” '
