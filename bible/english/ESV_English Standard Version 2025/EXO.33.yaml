document_id: EXO.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Command to Leave Sinai
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Depart; go up from here, you '
  - type: note
    content: ch. 32:7
  - type: text
    content: 'and the people whom you have brought up out of the land of Egypt, to the land of which I swore to Abraham, Isaac, and Jacob, saying, ‘To '
  - type: note
    content: ch. 32:13; See Gen. 12:7
  - type: text
    content: 'your offspring I will give it.’ '
  '10':
  - type: text
    content: 'And when all the people saw the pillar of cloud standing at the entrance of the tent, all the people would rise up and worship, each at his tent door. '
  '11':
  - type: text
    content: 'Thus '
  - type: note
    content: Num. 12:8; Deut. 34:10; See Gen. 32:30
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' used to speak to Moses face to face, as a man speaks to his friend. When Moses turned again into the camp, his '
  - type: note
    content: ch. 17:9, 10; 24:13; 32:17
  - type: text
    content: assistant Joshua the son of Nun, a young man, would not depart from the tent.
  - type: heading
    content: Moses’ Intercession
  '12':
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “See, '
  - type: note
    content: ch. 32:34
  - type: text
    content: 'you say to me, ‘Bring up this people,’ but you have not let me know whom you will send with me. Yet you have said, '
  - type: note
    content: ver. 17
  - type: text
    content: '‘I know you by name, and you have also found favor in my sight.’ '
  '13':
  - type: text
    content: 'Now therefore, if I have found favor in your sight, please '
  - type: note
    content: Ps. 25:4; [Ps. 103:7]
  - type: text
    content: 'show me now your ways, that I may know you in order to find favor in your sight. Consider too that this nation is '
  - type: note
    content: Deut. 9:29; [Joel 2:17]
  - type: text
    content: 'your people.” '
  '14':
  - type: text
    content: 'And he said, '
  - type: note
    content: Josh. 1:5; Isa. 63:9; See ch. 40:34-38
  - type: text
    content: '“My presence will go with you, and '
  - type: note
    content: Deut. 3:20; Josh. 21:44; 22:4; 23:1; [Ps. 95:11]
  - type: text
    content: 'I will give you rest.” '
  '15':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: '[ver. 1-3]'
  - type: text
    content: '“If your presence will not go with me, do not bring us up from here. '
  '16':
  - type: text
    content: 'For how shall it be known that I have found favor in your sight, I and your people? '
  - type: note
    content: Num. 14:14
  - type: text
    content: 'Is it not in your going with us, '
  - type: note
    content: ch. 19:5, 6; 1 Kgs. 8:53
  - type: text
    content: so that we are distinct, I and your people, from every other people on the face of the earth?”
  '17':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “This very thing that you have spoken I will do, '
  - type: note
    content: ver. 12, 13
  - type: text
    content: 'for you have found favor in my sight, and I know you by name.” '
  '18':
  - type: text
    content: 'Moses said, “Please '
  - type: note
    content: '[ver. 20; 1 Tim. 6:16]'
  - type: text
    content: 'show me your glory.” '
  '19':
  - type: text
    content: 'And he said, '
  - type: note
    content: Ps. 31:19; Jer. 31:14; [ch. 34:5-7]
  - type: text
    content: '“I will make all my goodness pass before you and will proclaim before you my name ‘The '
  - type: text
    content: Lord
  - type: text
    content: '.’ And '
  - type: note
    content: Cited Rom. 9:15
  - type: text
    content: 'I will be gracious to whom I will be gracious, and will show mercy on whom I will show mercy. '
  '2':
  - type: text
    content: 'I will send an '
  - type: note
    content: See ch. 14:19
  - type: text
    content: 'angel before you, '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'and I will drive out the Canaanites, the Amorites, the Hittites, the Perizzites, the Hivites, and the Jebusites. '
  '20':
  - type: text
    content: 'But,” he said, “you cannot see my face, for '
  - type: note
    content: Gen. 32:30; Deut. 5:24; Judg. 6:22, 23; 13:22; Isa. 6:5; Rev. 1:17; [ch. 24:10, 11]
  - type: text
    content: 'man shall not see me and live.” '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Behold, there is a place by me where you shall stand on the rock, '
  '22':
  - type: text
    content: 'and while my glory passes by I will put you in a '
  - type: note
    content: Isa. 2:21
  - type: text
    content: 'cleft of the rock, and I will '
  - type: note
    content: Ps. 91:1, 4
  - type: text
    content: 'cover you with my hand until I have passed by. '
  '23':
  - type: text
    content: 'Then I will take away my hand, and you shall see my back, but my face shall '
  - type: note
    content: ver. 20; John 1:18; 1 Tim. 6:16; 1 John 4:12
  - type: text
    content: not be seen.”
  '3':
  - type: note
    content: See ch. 3:8
  - type: text
    content: 'Go up to a land flowing with milk and honey; '
  - type: note
    content: '[ver. 15-17]'
  - type: text
    content: 'but I will not go up among you, '
  - type: note
    content: ch. 32:10; Num. 16:21, 45
  - type: text
    content: 'lest I consume you on the way, for you are a '
  - type: note
    content: See ch. 32:9
  - type: text
    content: stiff-necked people.”
  '4':
  - type: text
    content: 'When the people heard this disastrous word, they '
  - type: note
    content: Num. 14:39
  - type: text
    content: 'mourned, and '
  - type: note
    content: '[Ezek. 24:17, 23; 26:16]'
  - type: text
    content: 'no one put on his ornaments. '
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses, “Say to the people of Israel, ‘You are a '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'stiff-necked people; if for a single moment I should go up among you, I would '
  - type: note
    content: ch. 32:12
  - type: text
    content: 'consume you. So now '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'take off your ornaments, that I may know what to do with you.’” '
  '6':
  - type: text
    content: Therefore the people of Israel stripped themselves of their ornaments, from Mount Horeb onward.
  - type: heading
    content: The Tent of Meeting
  '7':
  - type: text
    content: 'Now Moses used to take the tent and pitch it outside the camp, far off from the camp, and '
  - type: note
    content: ch. 29:42, 43
  - type: text
    content: 'he called it the tent of meeting. And everyone who '
  - type: note
    content: Deut. 4:29; 2 Sam. 21:1; 1 Chr. 16:10, 11; Ps. 40:16
  - type: text
    content: 'sought the '
  - type: text
    content: Lord
  - type: text
    content: ' would go out to the tent of meeting, which was outside the camp. '
  '8':
  - type: text
    content: 'Whenever Moses went out to the tent, all the people would rise up, and '
  - type: note
    content: '[Num. 16:27]'
  - type: text
    content: 'each would stand at his tent door, and watch Moses until he had gone into the tent. '
  '9':
  - type: text
    content: 'When Moses entered the tent, the '
  - type: note
    content: See ch. 13:21
  - type: text
    content: 'pillar of cloud would descend and stand at the entrance of the tent, and the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew he
  - type: text
    content: ' would speak with Moses. '
