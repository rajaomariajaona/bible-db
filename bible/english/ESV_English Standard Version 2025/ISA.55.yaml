document_id: ISA.55,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Compassion of the Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 44:3; John 7:37; [ Matt. 5:6 ]
  - type: text
    content: “Come, everyone who thirsts,
  - type: text
    content: come to the waters;
  - type: text
    content: and he who has no money,
  - type: note
    content: Prov. 9:5
  - type: text
    content: come, buy and eat!
  - type: text
    content: Come, buy wine and milk
  - type: text
    content: without money and without price.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 148:8 ]'
  - type: text
    content: “For as the rain and the snow come down from heaven
  - type: text
    content: and do not return there but water the earth,
  - type: text
    content: making it bring forth and sprout,
  - type: note
    content: '[ 2 Cor. 9:10 ]'
  - type: text
    content: giving seed to the sower and bread to the eater,
  '11':
  - type: text
    content: so shall my word be that goes out from my mouth;
  - type: text
    content: it shall not return to me empty,
  - type: text
    content: 'but '
  - type: note
    content: ch. 40:8
  - type: text
    content: it shall accomplish that which I purpose,
  - type: text
    content: and shall succeed in the thing for which I sent it.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:10; [ch. 48:20, 21; 52:12 ]
  - type: text
    content: “For you shall go out in joy
  - type: text
    content: and be led forth in peace;
  - type: note
    content: ch. 44:23; Ps. 98:8
  - type: text
    content: the mountains and the hills before you
  - type: text
    content: shall break forth into singing,
  - type: text
    content: and all the trees of the field shall clap their hands.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:1, 2; 41:19
  - type: text
    content: Instead of the thorn shall come up the cypress;
  - type: text
    content: instead of the brier shall come up the myrtle;
  - type: text
    content: 'and it shall make a name for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: an everlasting sign that shall not be cut off.”
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ John 6:27 ]'
  - type: text
    content: Why do you spend your money for that which is not bread,
  - type: text
    content: and your labor for that which does not satisfy?
  - type: text
    content: Listen diligently to me, and eat what is good,
  - type: text
    content: and delight yourselves in rich food.
  '3':
  - type: text
    content: Incline your ear, and come to me;
  - type: note
    content: Prov. 4:4
  - type: text
    content: hear, that your soul may live;
  - type: note
    content: ch. 61:8; Jer. 32:40; Ezek. 37:26; [ch. 54:8; 59:21 ]
  - type: text
    content: and I will make with you an everlasting covenant,
  - type: note
    content: Ps. 89:33-35; [ Acts 13:34 ]
  - type: text
    content: 'my steadfast, sure love for '
  - type: note
    content: Jer. 30:9
  - type: text
    content: David.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps. 18:43
  - type: text
    content: Behold, I made him a witness to the peoples,
  - type: note
    content: Dan. 9:25; Mic. 5:2; Acts 5:31; Rev. 17:14; 19:16; [ch. 9:6, 7 ]
  - type: text
    content: a leader and commander for the peoples.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: Behold, you shall call a nation that you do not know,
  - type: text
    content: 'and '
  - type: note
    content: Zech. 8:22, 23
  - type: text
    content: a nation that did not know you shall run to you,
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and of the Holy One of Israel,'
  - type: note
    content: '[ch. 44:23; Acts 3:13 ]'
  - type: text
    content: for he has glorified you.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 32:6; Amos 5:4
  - type: text
    content: '“Seek the '
  - type: text
    content: Lord
  - type: text
    content: ' while he may be found;'
  - type: text
    content: call upon him while he is near;
  '7':
  - type: text
    content: let the wicked forsake his way,
  - type: text
    content: and the unrighteous man his thoughts;
  - type: text
    content: 'let him return to the '
  - type: text
    content: Lord
  - type: text
    content: ', that he may have compassion on him,'
  - type: text
    content: and to our God, for he will abundantly pardon.
  '8':
  - type: text
    content: For my thoughts are not your thoughts,
  - type: text
    content: 'neither are your ways my ways, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 103:11
  - type: text
    content: For as the heavens are higher than the earth,
  - type: text
    content: so are my ways higher than your ways
  - type: text
    content: and my thoughts than your thoughts.
