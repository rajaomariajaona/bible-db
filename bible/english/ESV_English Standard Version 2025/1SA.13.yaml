document_id: 1SA.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Fights the Philistines
  - type: text
    content: Saul lived for one year and then became king, and when he had reigned for two years over Israel,
  - type: note
    content: Hebrew Saul was one year old when he became king, and he reigned two years over Israel; some Greek manuscripts give Saul’s age when he began to reign as thirty years
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'As soon as he had finished offering the burnt offering, behold, Samuel came. And Saul went out to meet him and greet him. '
  '11':
  - type: text
    content: 'Samuel said, “What have you done?” And Saul said, “When I saw that the people were scattering from me, and that you did not come within the days appointed, and that the Philistines had mustered at Michmash, '
  '12':
  - type: text
    content: 'I said, ‘Now the Philistines will come down against me at Gilgal, and I have not sought the favor of the '
  - type: text
    content: Lord
  - type: text
    content: '.’ So I forced myself, and offered the burnt offering.” '
  '13':
  - type: text
    content: 'And Samuel said to Saul, '
  - type: note
    content: 2 Sam. 24:10; 1 Chr. 21:8; 2 Chr. 16:9
  - type: text
    content: '“You have done foolishly. '
  - type: note
    content: ch. 15:11
  - type: text
    content: 'You have not kept the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, with which he commanded you. For then the '
  - type: text
    content: Lord
  - type: text
    content: ' would have established your kingdom over Israel forever. '
  '14':
  - type: text
    content: 'But now '
  - type: note
    content: ch. 15:28
  - type: text
    content: 'your kingdom shall not continue. The '
  - type: text
    content: Lord
  - type: text
    content: ' has sought out a man '
  - type: note
    content: Cited Acts 13:22
  - type: text
    content: 'after his own heart, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded him to be prince'
  - type: note
    content: Or leader
  - type: text
    content: ' over his people, because you have not kept what the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded you.” '
  '15':
  - type: text
    content: And Samuel arose and went up from Gilgal. The rest of the people went up after Saul to meet the army; they went up from Gilgal
  - type: note
    content: Septuagint; Hebrew lacks The rest of the people . . . from Gilgal
  - type: text
    content: ' to '
  - type: note
    content: ver. 2
  - type: text
    content: Gibeah of Benjamin.
  - type: text
    content: 'And Saul numbered the people who were present with him, '
  - type: note
    content: ch. 14:2
  - type: text
    content: 'about six hundred men. '
  '16':
  - type: text
    content: 'And Saul and Jonathan his son and the people who were present with them stayed in '
  - type: note
    content: ver. 3; ch. 14:5
  - type: text
    content: 'Geba of Benjamin, but the Philistines encamped in Michmash. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: ch. 14:15
  - type: text
    content: 'raiders came out of the camp of the Philistines in three companies. One company turned toward Ophrah, to the land of Shual; '
  '18':
  - type: text
    content: 'another company turned toward '
  - type: note
    content: See Josh. 10:10
  - type: text
    content: 'Beth-horon; and another company turned toward the border that looks down on the Valley of '
  - type: note
    content: Neh. 11:34
  - type: text
    content: Zeboim toward the wilderness.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 24:14 ]'
  - type: text
    content: 'Now there was no blacksmith to be found throughout all the land of Israel, for the Philistines said, “Lest the Hebrews make themselves swords or spears.” '
  '2':
  - type: text
    content: 'Saul chose three thousand men of Israel. Two thousand were with Saul in '
  - type: note
    content: ver. 5, 11, 16, 23; ch. 14:31
  - type: text
    content: 'Michmash and the hill country of Bethel, and a thousand were with Jonathan in '
  - type: note
    content: ver. 15; ch. 10:26
  - type: text
    content: 'Gibeah of Benjamin. The rest of the people he sent home, every man to his tent. '
  '20':
  - type: text
    content: But every one of the Israelites went down to the Philistines to sharpen his plowshare, his mattock, his axe, or his sickle,
  - type: note
    content: Septuagint; Hebrew plowshare
  - type: text
    content: ' '
  '21':
  - type: text
    content: and the charge was two-thirds of a shekel
  - type: note
    content: Hebrew was a pim
  - type: text
    content: ' for the plowshares and for the mattocks, and a third of a shekel'
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' for sharpening the axes and for setting the goads.'
  - type: note
    content: The meaning of the Hebrew verse is uncertain
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'So on the day of the battle '
  - type: note
    content: '[Judg. 5:8]'
  - type: text
    content: 'there was neither sword nor spear found in the hand of any of the people with Saul and Jonathan, but Saul and Jonathan his son had them. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: ch. 14:1, 4, 6, 11; 2 Sam. 23:14
  - type: text
    content: 'the garrison of the Philistines went out to the '
  - type: note
    content: ch. 14:4, 5; Isa. 10:28, 29
  - type: text
    content: 'pass of '
  - type: note
    content: Isa. 10:28
  - type: text
    content: Michmash.
  '3':
  - type: text
    content: 'Jonathan defeated '
  - type: note
    content: ch. 10:5
  - type: text
    content: 'the garrison of the Philistines that was '
  - type: note
    content: ver. 16; ch. 14:5
  - type: text
    content: 'at Geba, and the Philistines heard of it. And Saul '
  - type: note
    content: '[Judg. 3:27]'
  - type: text
    content: 'blew the trumpet throughout all the land, saying, “Let the Hebrews hear.” '
  '4':
  - type: text
    content: And all Israel heard it said that Saul had defeated the garrison of the Philistines, and also that Israel had become a stench to the Philistines. And the people were called out to join Saul at Gilgal.
  '5':
  - type: text
    content: 'And the Philistines mustered to fight with Israel, thirty thousand chariots and six thousand horsemen and troops '
  - type: note
    content: Josh. 11:4
  - type: text
    content: 'like the sand on the seashore in multitude. They came up and encamped in Michmash, to the east of '
  - type: note
    content: ch. 14:23
  - type: text
    content: 'Beth-aven. '
  '6':
  - type: text
    content: 'When the men of Israel saw that they were in trouble (for the people were hard pressed), the people hid themselves '
  - type: note
    content: Judg. 6:2; Heb. 11:38
  - type: text
    content: 'in caves and in holes and in rocks and in tombs and in cisterns, '
  '7':
  - type: text
    content: and some Hebrews crossed the fords of the Jordan to the land of Gad and Gilead. Saul was still at Gilgal, and all the people followed him trembling.
  - type: heading
    content: Saul’s Unlawful Sacrifice
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:8
  - type: text
    content: 'He waited seven days, the time appointed by Samuel. But Samuel did not come to Gilgal, and the people were scattering from him. '
  '9':
  - type: text
    content: 'So Saul said, “Bring the burnt offering here to me, and the peace offerings.” And he offered the burnt offering. '
