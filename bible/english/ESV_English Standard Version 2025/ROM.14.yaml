document_id: ROM.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Not Pass Judgment on One Another
  - type: text
    content: 'As for '
  - type: note
    content: ch. 15:1; 1 Cor. 8:9-11; 9:22
  - type: text
    content: 'the one who is weak in faith, welcome him, but not to quarrel over opinions. '
  '10':
  - type: text
    content: 'Why do you pass judgment on your brother? Or you, why do you despise your brother? For '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'we will all stand before '
  - type: note
    content: 2 Cor. 5:10
  - type: text
    content: 'the judgment seat of God; '
  '11':
  - type: text
    content: for it is written,
  - type: note
    content: Phil. 2:10, 11; Cited from Isa. 45:23
  - type: text
    content: “As I live, says the Lord, every knee shall bow to me,
  - type: text
    content: and every tongue shall confess
  - type: note
    content: Or shall give praise
  - type: text
    content: ' to God.”'
  '12':
  - type: text
    content: 'So then '
  - type: note
    content: Matt. 12:36; 16:27; 1 Pet. 4:5; [Gal. 6:5]
  - type: text
    content: each of us will give an account of himself to God.
  - type: heading
    content: Do Not Cause Another to Stumble
  '13':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 7:1
  - type: text
    content: 'Therefore let us not pass judgment on one another any longer, but rather decide '
  - type: note
    content: '[1 Cor. 8:13]'
  - type: text
    content: 'never to put a stumbling block or hindrance in the way of a brother. '
  '14':
  - type: text
    content: 'I know and am persuaded in the Lord Jesus '
  - type: note
    content: ver. 2, 20; See Acts 10:15
  - type: text
    content: 'that nothing is unclean in itself, '
  - type: note
    content: '[1 Cor. 8:7, 10]'
  - type: text
    content: 'but it is unclean for anyone who thinks it unclean. '
  '15':
  - type: text
    content: 'For if your brother is grieved by what you eat, '
  - type: note
    content: Eph. 5:2
  - type: text
    content: 'you are no longer walking in love. '
  - type: note
    content: 1 Cor. 8:11; [ver. 20]
  - type: text
    content: 'By what you eat, do not destroy the one for whom Christ died. '
  '16':
  - type: note
    content: '[ch. 12:17; 1 Cor. 10:29, 30]'
  - type: text
    content: 'So do not let what you regard as good be spoken of as evil. '
  '17':
  - type: note
    content: 1 Cor. 8:8
  - type: text
    content: 'For the kingdom of God is not a matter of eating and drinking but '
  - type: note
    content: '[1 Cor. 6:9]'
  - type: text
    content: 'of righteousness and '
  - type: note
    content: Gal. 5:22; [ch. 15:13]
  - type: text
    content: 'peace and joy in the Holy Spirit. '
  '18':
  - type: text
    content: 'Whoever thus serves Christ is '
  - type: note
    content: '[2 Cor. 8:21]'
  - type: text
    content: 'acceptable to God and approved by men. '
  '19':
  - type: text
    content: 'So then let us '
  - type: note
    content: Ps. 34:14; 1 Cor. 7:15; 2 Tim. 2:22
  - type: text
    content: 'pursue what makes for peace and for '
  - type: note
    content: ch. 15:2; 1 Cor. 14:12
  - type: text
    content: mutual upbuilding.
  '2':
  - type: note
    content: ver. 14
  - type: text
    content: 'One person believes he may eat anything, while the weak person eats only vegetables. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: ver. 15
  - type: text
    content: 'Do not, for the sake of food, destroy the work of God. '
  - type: note
    content: Titus 1:15; See ver. 14
  - type: text
    content: 'Everything is indeed clean, but '
  - type: note
    content: 1 Cor. 8:9-12
  - type: text
    content: 'it is wrong for anyone to make another stumble by what he eats. '
  '21':
  - type: note
    content: 1 Cor. 8:13
  - type: text
    content: It is good not to eat meat or drink wine or do anything that causes your brother to stumble.
  - type: note
    content: Some manuscripts add or be hindered or be weakened
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'The faith that you have, keep between yourself and God. '
  - type: note
    content: 1 John 3:21
  - type: text
    content: 'Blessed is the one who has no reason to pass judgment on himself for what he approves. '
  '23':
  - type: text
    content: But whoever has doubts is condemned if he eats, because the eating is not from faith. For whatever does not proceed from faith is sin.
  - type: note
    content: Some manuscripts insert here 16:25–27
  '3':
  - type: text
    content: 'Let not the one who eats despise the one who abstains, and '
  - type: note
    content: Col. 2:16
  - type: text
    content: 'let not the one who abstains pass judgment on the one who eats, for God has welcomed him. '
  '4':
  - type: note
    content: James 4:12
  - type: text
    content: Who are you to pass judgment on the servant of another? It is before his own master
  - type: note
    content: Or lord
  - type: text
    content: ' that he stands or falls. And he will be upheld, for the Lord is able to make him stand.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Gal. 4:10; [ Zech. 7:5, 6 ]
  - type: text
    content: 'One person esteems one day as better than another, while another esteems all days alike. '
  - type: note
    content: ver. 23
  - type: text
    content: 'Each one should be fully convinced in his own mind. '
  '6':
  - type: text
    content: 'The one who observes the day, observes it in honor of the Lord. The one who eats, eats in honor of the Lord, since '
  - type: note
    content: 1 Cor. 10:30, 31; 1 Tim. 4:3, 4; See Matt. 15:36
  - type: text
    content: 'he gives thanks to God, while the one who abstains, abstains in honor of the Lord and gives thanks to God. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 2 Cor. 5:15; Gal. 2:20; 1 Pet. 4:2; [1 Cor. 6:19; 1 Thess. 5:10]
  - type: text
    content: 'none of us lives to himself, and none of us dies to himself. '
  '8':
  - type: text
    content: 'For if we live, we live to the Lord, and if we die, we die to the Lord. So then, '
  - type: note
    content: Phil. 1:20
  - type: text
    content: 'whether we live or whether we die, we are the Lord’s. '
  '9':
  - type: text
    content: 'For to this end Christ '
  - type: note
    content: Rev. 1:18; 2:8
  - type: text
    content: 'died and lived again, that he might be Lord both '
  - type: note
    content: See Acts 10:42; Rev. 20:12
  - type: text
    content: of the dead and of the living.
