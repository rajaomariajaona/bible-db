document_id: JER.38,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Cast into the Cistern
  - type: text
    content: 'Now Shephatiah the son of Mattan, Gedaliah the son of Pashhur, '
  - type: note
    content: '[ch. 37:3]'
  - type: text
    content: 'Jucal the son of Shelemiah, and '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'Pashhur the son of Malchiah heard the words that Jeremiah was saying to all the people: '
  '10':
  - type: text
    content: 'Then the king commanded '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Ebed-melech the Ethiopian, “Take thirty men with you from here, and lift Jeremiah the prophet out of the cistern before he dies.” '
  '11':
  - type: text
    content: 'So '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Ebed-melech took the men with him and went to the house of the king, to a wardrobe in the storehouse, and took from there old rags and worn-out clothes, which he let down to Jeremiah in the cistern '
  - type: note
    content: ver. 6
  - type: text
    content: 'by ropes. '
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Ebed-melech the Ethiopian said to Jeremiah, “Put the rags and clothes between your armpits and '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'the ropes.” Jeremiah did so. '
  '13':
  - type: text
    content: 'Then they drew Jeremiah up with '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'ropes and lifted him out of the cistern. And Jeremiah remained in the '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: court of the guard.
  - type: heading
    content: Jeremiah Warns Zedekiah Again
  '14':
  - type: text
    content: 'King Zedekiah sent for Jeremiah the prophet and received him at the third entrance of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. The king said to Jeremiah, “I will ask you a question; hide nothing from me.” '
  '15':
  - type: text
    content: 'Jeremiah said to Zedekiah, “If I tell you, will you not surely put me to death? And if I give you counsel, you will not listen to me.” '
  '16':
  - type: text
    content: 'Then King Zedekiah swore '
  - type: note
    content: ch. 37:17
  - type: text
    content: 'secretly to Jeremiah, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: '[Isa. 57:16]'
  - type: text
    content: 'who made our souls, I will not put you to death or deliver you into the hand of '
  - type: note
    content: See ver. 1-9
  - type: text
    content: these men who seek your life.”
  '17':
  - type: text
    content: 'Then Jeremiah said to Zedekiah, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts, the God of Israel: '
  - type: note
    content: ver. 2, 21; [ch. 27:12, 13; 2 Kgs. 24:12]
  - type: text
    content: 'If you will surrender to '
  - type: note
    content: ch. 39:3
  - type: text
    content: 'the officials of the king of Babylon, '
  - type: note
    content: '[ch. 34:4, 5]'
  - type: text
    content: 'then your life shall be spared, and this city shall not be burned with fire, and you and your house shall live. '
  '18':
  - type: text
    content: 'But if you do not surrender to '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the officials of the king of Babylon, '
  - type: note
    content: See ch. 21:10
  - type: text
    content: 'then this city shall be given into the hand of the Chaldeans, '
  - type: note
    content: See ch. 21:10
  - type: text
    content: 'and they shall burn it with fire, and you shall not escape from their hand.” '
  '19':
  - type: text
    content: 'King Zedekiah said to Jeremiah, “I am afraid of the Judeans '
  - type: note
    content: See ch. 37:13
  - type: text
    content: 'who have deserted to the Chaldeans, lest I be handed over to them and they deal cruelly with me.” '
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 21:9; [ver. 17, 18]
  - type: text
    content: 'He who stays in this city shall die by the sword, by famine, and by pestilence, '
  - type: note
    content: ch. 21:9; [ver. 17, 18]
  - type: text
    content: 'but he who goes out to the Chaldeans shall live. He shall have his life as a prize of war, and live. '
  '20':
  - type: text
    content: 'Jeremiah said, “You shall not be given to them. Obey now the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' in what I say to you, '
  - type: note
    content: ch. 40:9
  - type: text
    content: 'and it shall be well with you, and your life shall be spared. '
  '21':
  - type: text
    content: 'But if you refuse to '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'surrender, this is the vision which the '
  - type: text
    content: Lord
  - type: text
    content: ' has shown to me: '
  '22':
  - type: text
    content: Behold, all the women left in the house of the king of Judah were being led out to the officials of the king of Babylon and were saying,
  - type: note
    content: See ch. 20:10
  - type: text
    content: “‘Your trusted friends have deceived you
  - type: text
    content: and prevailed against you;
  - type: text
    content: now that your feet are sunk in the mud,
  - type: text
    content: they turn away from you.’
  '23':
  - type: text
    content: 'All your wives and '
  - type: note
    content: ch. 39:6; 41:10; 43:6
  - type: text
    content: your sons shall be led out to the Chaldeans, and you yourself shall not escape from their hand, but shall be seized by the king of Babylon, and this city shall be burned with fire.”
  '24':
  - type: text
    content: 'Then Zedekiah said to Jeremiah, “Let no one know of these words, and you shall not die. '
  '25':
  - type: text
    content: 'If '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'the officials hear that I have spoken with you and come to you and say to you, ‘Tell us what you said to the king and what the king said to you; hide nothing from us and we will not put you to death,’ '
  '26':
  - type: text
    content: 'then you shall say to them, '
  - type: note
    content: '[ch. 37:20]'
  - type: text
    content: '‘I made a humble plea to the king that he would not send me back to the house of Jonathan to die there.’” '
  '27':
  - type: text
    content: 'Then all the officials came to Jeremiah and asked him, and he answered them as the king had instructed him. So they stopped speaking with him, for the conversation had not been overheard. '
  '28':
  - type: text
    content: 'And Jeremiah remained '
  - type: note
    content: See ch. 32:2
  - type: text
    content: in the court of the guard until the day that Jerusalem was taken.
  '3':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See ch. 32:3
  - type: text
    content: 'This city shall surely be given into the hand of the army of the king of Babylon and be taken.” '
  '4':
  - type: text
    content: 'Then the officials said to the king, '
  - type: note
    content: ch. 26:11
  - type: text
    content: '“Let this man be put to death, '
  - type: note
    content: See ch. 6:24
  - type: text
    content: 'for he is weakening the hands of the soldiers who are left in this city, and the hands of all the people, by speaking such words to them. For this man is not seeking '
  - type: note
    content: '[ch. 33:9]'
  - type: text
    content: 'the welfare of this people, but their harm.” '
  '5':
  - type: text
    content: 'King Zedekiah said, “Behold, he is in your hands, '
  - type: note
    content: See ver. 24-28
  - type: text
    content: 'for the king can do nothing against you.” '
  '6':
  - type: text
    content: 'So they took Jeremiah '
  - type: note
    content: ch. 37:16
  - type: text
    content: 'and cast him into the cistern of Malchiah, the king’s son, which was in '
  - type: note
    content: See ch. 32:2
  - type: text
    content: 'the court of the guard, letting Jeremiah down '
  - type: note
    content: ver. 11, 13
  - type: text
    content: 'by ropes. '
  - type: note
    content: '[Gen. 37:24; Zech. 9:11]'
  - type: text
    content: 'And there was no water in the cistern, but only mud, and '
  - type: note
    content: '[Ps. 69:14]'
  - type: text
    content: Jeremiah sank in the mud.
  - type: heading
    content: Jeremiah Rescued from the Cistern
  '7':
  - type: text
    content: 'When '
  - type: note
    content: ch. 39:16
  - type: text
    content: 'Ebed-melech '
  - type: note
    content: '[Acts 8:27]'
  - type: text
    content: 'the Ethiopian, '
  - type: note
    content: ch. 29:2; Isa. 56:3, 4
  - type: text
    content: 'a eunuch who was in the king’s house, heard that they had put Jeremiah into the cistern—the king was sitting '
  - type: note
    content: See ch. 37:13
  - type: text
    content: 'in the Benjamin Gate— '
  '8':
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Ebed-melech went from the king’s house and said to the king, '
  '9':
  - type: text
    content: '“My lord the king, these men have done evil in all that they did to Jeremiah the prophet by casting him into the cistern, and he will die there of '
  - type: note
    content: ch. 11:22; [ch. 14:16, 18; 19:9]
  - type: text
    content: 'hunger, '
  - type: note
    content: '[ch. 37:21]'
  - type: text
    content: 'for there is no bread left in the city.” '
