document_id: EZK.43,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Glory of the Lord Fills the Temple
  - type: text
    content: 'Then he led me to '
  - type: note
    content: ver. 4; ch. 10:19; 11:1; 40:6; 42:15; 44:1
  - type: text
    content: 'the gate, the gate facing east. '
  '10':
  - type: text
    content: '“As for you, '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'son of man, '
  - type: note
    content: ch. 40:4
  - type: text
    content: 'describe to the house of Israel the temple, that they may be ashamed of their iniquities; and they shall measure the plan. '
  '11':
  - type: text
    content: 'And if they are ashamed of all that they have done, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'make known to them the design of the temple, its arrangement, '
  - type: note
    content: '[ch. 44:5]'
  - type: text
    content: 'its exits and its entrances, that is, its whole design; and make known to them as well all its statutes and its whole design and all its laws, and write it down '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'in their sight, so that they may observe all its laws and all its statutes and carry them out. '
  '12':
  - type: text
    content: 'This is the law of the temple: the whole territory on the top of '
  - type: note
    content: '[ch. 40:2]'
  - type: text
    content: 'the mountain '
  - type: note
    content: See ch. 42:15-20
  - type: text
    content: all around shall be most holy. Behold, this is the law of the temple.
  - type: heading
    content: The Altar
  '13':
  - type: text
    content: '“These are the measurements of '
  - type: note
    content: '[ch. 40:47; 47:1]; See Ex. 27:1-8'
  - type: text
    content: 'the altar by cubits (the cubit being '
  - type: note
    content: ch. 40:5; [ch. 41:8]
  - type: text
    content: 'a cubit and a handbreadth):'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters; a handbreadth was about 3 inches or 7.5 centimeters
  - type: text
    content: ' its base shall be one cubit high'
  - type: note
    content: Or its gutter shall be one cubit deep
  - type: text
    content: ' and one cubit broad, with a rim of one span'
  - type: note
    content: A span was about 9 inches or 22 centimeters
  - type: text
    content: ' around its edge. And this shall be the height of the altar: '
  '14':
  - type: text
    content: 'from the base on the ground to the lower ledge, two cubits, with a breadth of one cubit; and from the smaller ledge to the larger ledge, four cubits, with a breadth of one cubit; '
  '15':
  - type: text
    content: 'and the altar hearth, four cubits; and from the altar hearth projecting upward, '
  - type: note
    content: See Ex. 27:2
  - type: text
    content: 'four horns. '
  '16':
  - type: text
    content: 'The altar hearth shall be '
  - type: note
    content: '[ch. 40:47; Ex. 27:1]'
  - type: text
    content: 'square, twelve cubits long by twelve broad. '
  '17':
  - type: text
    content: 'The ledge also shall be square, fourteen cubits long by fourteen broad, with a rim around it half a cubit broad, and its base one cubit all around. '
  - type: note
    content: '[Ex. 20:26]'
  - type: text
    content: The steps of the altar shall face east.”
  '18':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': These are the ordinances for the altar: On the day when it is erected for offering burnt offerings upon it and '
  - type: note
    content: See Lev. 1:5
  - type: text
    content: 'for throwing blood against it, '
  '19':
  - type: text
    content: 'you shall give to '
  - type: note
    content: ch. 44:15; Deut. 17:9; 18:1; 24:8; 27:9
  - type: text
    content: 'the Levitical priests '
  - type: note
    content: See ch. 40:46
  - type: text
    content: 'of the family of Zadok, who draw near to me to minister to me, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: ch. 45:18; Ex. 29:1, 10
  - type: text
    content: 'a bull from the herd for a sin offering. '
  '2':
  - type: text
    content: 'And behold, '
  - type: note
    content: ch. 10:18, 19; 11:23; [Rev. 21:11]
  - type: text
    content: 'the glory of the God of Israel was coming from the east. And '
  - type: note
    content: ch. 1:24; [Rev. 1:15]
  - type: text
    content: 'the sound of his coming was like the sound of many waters, and '
  - type: note
    content: '[ch. 10:4; Rev. 18:1]'
  - type: text
    content: 'the earth shone with his glory. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: ch. 45:19; Ex. 29:12; Lev. 8:15
  - type: text
    content: 'you shall take some of its blood and put it on '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'the four horns of the altar and on the four corners of the ledge and upon '
  - type: note
    content: '[ver. 13, 17]'
  - type: text
    content: 'the rim all around. '
  - type: note
    content: Ex. 29:36; [ch. 45:18]
  - type: text
    content: 'Thus you shall purify the altar and make atonement for it. '
  '21':
  - type: text
    content: 'You shall also take the bull of the sin offering, and '
  - type: note
    content: Ex. 29:14
  - type: text
    content: 'it shall be burned in the appointed place belonging to the temple, outside the sacred area. '
  '22':
  - type: text
    content: 'And on the second day you shall offer a male goat without blemish for a sin offering; and the altar shall be purified, as it was purified with the bull. '
  '23':
  - type: text
    content: 'When you have finished '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'purifying it, you shall offer a bull from the herd without blemish and '
  - type: note
    content: '[Ex. 29:1]'
  - type: text
    content: 'a ram from the flock without blemish. '
  '24':
  - type: text
    content: 'You shall present them before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the priests '
  - type: note
    content: Lev. 2:13
  - type: text
    content: 'shall sprinkle salt on them and offer them up as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: note
    content: Ex. 29:35, 36; Lev. 8:33, 35
  - type: text
    content: 'For seven days you shall provide daily a male goat for a sin offering; also, a bull from the herd and a ram from the flock, without blemish, shall be provided. '
  '26':
  - type: text
    content: Seven days shall they make atonement for the altar and cleanse it, and so consecrate it.
  - type: note
    content: Hebrew fill its hand
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And when they have completed these days, then '
  - type: note
    content: Lev. 9:1
  - type: text
    content: 'from the eighth day onward the priests shall offer on the altar your burnt offerings and your '
  - type: note
    content: See Lev. 3:1
  - type: text
    content: 'peace offerings, and '
  - type: note
    content: See ch. 20:40
  - type: text
    content: 'I will accept you, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '3':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'the vision I saw was just like the vision that I had seen '
  - type: note
    content: '[ch. 9:1, 2, 5]'
  - type: text
    content: when he
  - type: note
    content: Some Hebrew manuscripts and Vulgate; most Hebrew manuscripts when I
  - type: text
    content: ' came to destroy the city, and just like '
  - type: note
    content: See ch. 1:4-28
  - type: text
    content: 'the vision that I had seen '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'by the Chebar canal. And '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'I fell on my face. '
  '4':
  - type: text
    content: 'As '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 44:2]'
  - type: text
    content: 'entered the temple by the gate facing east, '
  '5':
  - type: note
    content: See ch. 3:12
  - type: text
    content: 'the Spirit lifted me up and brought me into '
  - type: note
    content: See ch. 8:16
  - type: text
    content: 'the inner court; and behold, '
  - type: note
    content: ch. 10:4; 44:4; 1 Kgs. 8:10, 11; [Isa. 6:1]
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the temple.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: See ch. 40:3
  - type: text
    content: 'While the man was standing beside me, '
  - type: note
    content: '[Ex. 25:22]'
  - type: text
    content: 'I heard one speaking to me out of the temple, '
  '7':
  - type: text
    content: 'and he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, this is '
  - type: note
    content: '[Ps. 99:1]'
  - type: text
    content: 'the place of my throne and '
  - type: note
    content: '[1 Chr. 28:2; Isa. 60:13]'
  - type: text
    content: 'the place of the soles of my feet, '
  - type: note
    content: See ch. 37:26, 28
  - type: text
    content: 'where I will dwell in the midst of the people of Israel forever. And the house of Israel shall no more '
  - type: note
    content: '[ver. 8]; See ch. 20:39'
  - type: text
    content: defile my holy name, neither they, nor their kings, by their whoring and by the dead bodies
  - type: note
    content: Or the monuments; also verse 9
  - type: text
    content: ' of their kings at their high places,'
  - type: note
    content: Or at their deaths
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'by setting their threshold by my threshold and their doorposts beside my doorposts, with '
  - type: note
    content: '[ch. 42:20]'
  - type: text
    content: 'only a wall between me and them. They have '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'defiled my holy name by their abominations that they have committed, so I have consumed them in my anger. '
  '9':
  - type: text
    content: 'Now let them put away their whoring and the dead bodies of their kings far from me, '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: and I will dwell in their midst forever.
