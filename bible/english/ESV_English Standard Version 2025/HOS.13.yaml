document_id: HOS.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Relentless Judgment on Israel
  - type: text
    content: When Ephraim spoke, there was trembling;
  - type: note
    content: '[ Amos 6:13 ]'
  - type: text
    content: he was exalted in Israel,
  - type: text
    content: 'but he incurred guilt '
  - type: note
    content: See ch. 11:2
  - type: text
    content: through Baal and died.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:4; 10:3 ]'
  - type: text
    content: Where now is your king, to save you in all your cities?
  - type: text
    content: Where are all your rulers—
  - type: text
    content: 'those of whom '
  - type: note
    content: 1 Sam. 8:5, 19
  - type: text
    content: you said,
  - type: text
    content: “Give me a king and princes”?
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Sam. 8:22 ]'
  - type: text
    content: I gave you a king in my anger,
  - type: text
    content: 'and '
  - type: note
    content: '[1 Sam. 15:23]'
  - type: text
    content: I took him away in my wrath.
  '12':
  - type: text
    content: 'The iniquity of Ephraim is '
  - type: note
    content: Job 14:17
  - type: text
    content: bound up;
  - type: text
    content: 'his sin is '
  - type: note
    content: Job 14:17
  - type: text
    content: kept in store.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Isa. 13:8; 1 Thess. 5:3
  - type: text
    content: The pangs of childbirth come for him,
  - type: text
    content: but he is an unwise son,
  - type: text
    content: for at the right time he does not present himself
  - type: note
    content: '[ 2 Kgs. 19:3 ]'
  - type: text
    content: at the opening of the womb.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Isa. 25:8; 26:19; Ezek. 37:12
  - type: text
    content: I shall ransom them from the power of Sheol;
  - type: note
    content: Isa. 25:8; 26:19; Ezek. 37:12
  - type: text
    content: I shall redeem them from Death.
  - type: note
    content: Or Shall I ransom them from the power of Sheol? Shall I redeem them from Death?
  - type: note
    content: '[ 1 Cor. 15:55 ]'
  - type: text
    content: 'O '
  - type: note
    content: '[Ezek. 14:21]'
  - type: text
    content: Death, where are your plagues?
  - type: note
    content: '[ 1 Cor. 15:55 ]'
  - type: text
    content: 'O '
  - type: note
    content: '[Ezek. 14:21]'
  - type: text
    content: Sheol, where is your sting?
  - type: note
    content: '[ Ezek. 9:10 ]'
  - type: text
    content: Compassion is hidden from my eyes.
  '15':
  - type: text
    content: 'Though '
  - type: note
    content: '[Gen. 41:52]'
  - type: text
    content: he may flourish among his brothers,
  - type: note
    content: '[ Ezek. 19:12; Jonah 4:8; Hab. 1:9 ]'
  - type: text
    content: 'the east wind, the wind of the '
  - type: text
    content: Lord
  - type: text
    content: ', shall come,'
  - type: text
    content: rising from the wilderness,
  - type: note
    content: '[ Ezek. 17:10 ]'
  - type: text
    content: and his fountain shall dry up;
  - type: text
    content: his spring shall be parched;
  - type: text
    content: 'it shall strip '
  - type: note
    content: '[ch. 12:8]'
  - type: text
    content: his treasury
  - type: text
    content: of every precious thing.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ch 14:1 in Hebrew
  - type: text
    content: 'Samaria '
  - type: note
    content: '[Hab. 1:11]'
  - type: text
    content: shall bear her guilt,
  - type: text
    content: 'because '
  - type: note
    content: 2 Kgs. 18:12
  - type: text
    content: she has rebelled against her God;
  - type: text
    content: they shall fall by the sword;
  - type: note
    content: '[ch. 9:12; 10:14 ]'
  - type: text
    content: their little ones shall be dashed in pieces,
  - type: text
    content: 'and their '
  - type: note
    content: '[2 Kgs. 8:12; 15:16; Amos 1:13]'
  - type: text
    content: pregnant women ripped open.
  '2':
  - type: text
    content: And now they sin more and more,
  - type: text
    content: 'and '
  - type: note
    content: ch. 2:8
  - type: text
    content: make for themselves metal images,
  - type: text
    content: idols skillfully made of their silver,
  - type: note
    content: '[ Ps. 115:4; Isa. 40:19, 20 ]'
  - type: text
    content: all of them the work of craftsmen.
  - type: text
    content: It is said of them,
  - type: text
    content: '“Those who offer human sacrifice '
  - type: note
    content: '[1 Kgs. 19:18; Job 31:26, 27]'
  - type: text
    content: kiss calves!”
  '3':
  - type: text
    content: 'Therefore they shall be '
  - type: note
    content: ch. 6:4
  - type: text
    content: like the morning mist
  - type: text
    content: 'or '
  - type: note
    content: ch. 6:4
  - type: text
    content: like the dew that goes early away,
  - type: note
    content: See Ps. 1:4
  - type: text
    content: like the chaff that swirls from the threshing floor
  - type: text
    content: 'or '
  - type: note
    content: See Ps. 68:2
  - type: text
    content: like smoke from a window.
  '4':
  - type: text
    content: 'But '
  - type: note
    content: ch. 12:9
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: from the land of Egypt;
  - type: note
    content: See Ex. 20:3
  - type: text
    content: you know no God but me,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 43:11; 45:21
  - type: text
    content: besides me there is no savior.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Deut. 2:7; Amos 3:2
  - type: text
    content: It was I who knew you in the wilderness,
  - type: text
    content: in the land of drought;
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 4:7 ]'
  - type: text
    content: but when they had grazed,
  - type: note
    content: Hebrew according to their pasture
  - type: text
    content: ' they became full,'
  - type: note
    content: Deut. 8:12, 14; [ Deut. 32:15 ]
  - type: text
    content: they were filled, and their heart was lifted up;
  - type: note
    content: Deut. 8:12, 14; [ Deut. 32:15 ]
  - type: text
    content: therefore they forgot me.
  '7':
  - type: text
    content: 'So '
  - type: note
    content: ch. 5:14
  - type: text
    content: I am to them like a lion;
  - type: note
    content: Jer. 5:6
  - type: text
    content: like a leopard I will lurk beside the way.
  '8':
  - type: text
    content: 'I will fall upon them '
  - type: note
    content: 2 Sam. 17:8; Prov. 17:12
  - type: text
    content: like a bear robbed of her cubs;
  - type: text
    content: I will tear open their breast,
  - type: text
    content: and there I will devour them like a lion,
  - type: note
    content: '[ch. 2:12 ]'
  - type: text
    content: as a wild beast would rip them open.
  '9':
  - type: text
    content: He destroys
  - type: note
    content: Or I will destroy
  - type: text
    content: ' you, O Israel,'
  - type: text
    content: 'for you are against me, against '
  - type: note
    content: '[Deut. 33:26]'
  - type: text
    content: your helper.
