document_id: GEN.43,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Brothers Return to Egypt
  - type: text
    content: 'Now the famine was '
  - type: note
    content: ch. 41:54, 57
  - type: text
    content: 'severe in the land. '
  '10':
  - type: text
    content: If we had not delayed, we would now have returned twice.”
  '11':
  - type: text
    content: 'Then their father Israel said to them, “If it must be so, then do this: take some of the choice fruits of the land in your bags, and carry a present down to the man, a little '
  - type: note
    content: See ch. 37:25
  - type: text
    content: 'balm and a little honey, gum, myrrh, pistachio nuts, and almonds. '
  '12':
  - type: text
    content: 'Take double the money with you. Carry back with you the money '
  - type: note
    content: ch. 42:25, 27, 35
  - type: text
    content: 'that was returned in the mouth of your sacks. Perhaps it was an oversight. '
  '13':
  - type: text
    content: 'Take also your brother, and arise, go again to the man. '
  '14':
  - type: text
    content: 'May '
  - type: note
    content: See ch. 17:1
  - type: text
    content: God Almighty
  - type: note
    content: Hebrew El Shaddai
  - type: text
    content: ' '
  - type: note
    content: '[Neh. 1:11]'
  - type: text
    content: 'grant you mercy before the man, and may he send back your other brother and Benjamin. And as for me, '
  - type: note
    content: ch. 42:36
  - type: text
    content: if I am bereaved of my children, I am bereaved.”
  '15':
  - type: text
    content: So the men took this present, and they took double the money with them, and Benjamin. They arose and went down to Egypt and stood before Joseph.
  '16':
  - type: text
    content: 'When Joseph saw Benjamin with them, he said to the '
  - type: note
    content: ver. 19; ch. 44:1, 4; [ch. 24:2; 39:4]
  - type: text
    content: 'steward of his house, “Bring the men into the house, and slaughter an animal and make ready, for the men are to dine with me at noon.” '
  '17':
  - type: text
    content: 'The man did as Joseph told him and brought the men to Joseph’s house. '
  '18':
  - type: text
    content: 'And the men were afraid because they were brought to Joseph’s house, and they said, “It is because of the money, which was replaced in our sacks the first time, that we are brought in, so that he may assault us and fall upon us to make us servants and seize our donkeys.” '
  '19':
  - type: text
    content: 'So they went up to the steward of Joseph’s house and spoke with him at the door of the house, '
  '2':
  - type: text
    content: 'And when they had eaten the grain that they had brought from Egypt, their father said to them, “Go again, buy us a little food.” '
  '20':
  - type: text
    content: 'and said, '
  - type: note
    content: ch. 44:18
  - type: text
    content: '“Oh, my lord, '
  - type: note
    content: ch. 42:3, 10
  - type: text
    content: 'we came down the first time to buy food. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ch. 42:27
  - type: text
    content: 'when we came to the lodging place we opened our sacks, and there was each man’s money in the mouth of his sack, our money in full weight. So we have brought it again with us, '
  '22':
  - type: text
    content: 'and we have brought other money down with us to buy food. We do not know who put our money in our sacks.” '
  '23':
  - type: text
    content: 'He replied, “Peace to you, do not be afraid. Your God and the God of your father has put treasure in your sacks for you. I received your money.” Then he brought Simeon out to them. '
  '24':
  - type: text
    content: 'And when the man had brought the men into Joseph’s house and '
  - type: note
    content: See ch. 18:4
  - type: text
    content: 'given them water, and they had washed their feet, and when he had given their donkeys fodder, '
  '25':
  - type: text
    content: 'they prepared '
  - type: note
    content: ver. 11
  - type: text
    content: the present for Joseph’s coming at noon, for they heard that they should eat bread there.
  '26':
  - type: text
    content: 'When Joseph came home, they brought into the house to him the present that they had with them and '
  - type: note
    content: ch. 42:6; See ch. 37:5-11
  - type: text
    content: 'bowed down to him to the ground. '
  '27':
  - type: text
    content: 'And he inquired about their welfare and said, “Is your father well, the old man '
  - type: note
    content: ch. 42:11, 13
  - type: text
    content: 'of whom you spoke? Is he still alive?” '
  '28':
  - type: text
    content: 'They said, “Your servant our father is well; he is still alive.” And they '
  - type: note
    content: ver. 26
  - type: text
    content: 'bowed their heads and prostrated themselves. '
  '29':
  - type: text
    content: 'And he lifted up his eyes and saw his brother Benjamin, '
  - type: note
    content: ch. 35:18
  - type: text
    content: 'his mother’s son, and said, “Is this your youngest brother, '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: 'of whom you spoke to me? God be gracious to you, my son!” '
  '3':
  - type: text
    content: 'But Judah said to him, “The man solemnly warned us, saying, ‘You shall not see my face unless your '
  - type: note
    content: ch. 42:20; 44:23
  - type: text
    content: 'brother is with you.’ '
  '30':
  - type: text
    content: 'Then Joseph hurried out, for '
  - type: note
    content: 1 Kgs. 3:26; [Jer. 31:20]
  - type: text
    content: 'his compassion grew warm for his brother, and he sought a place to weep. And he entered his chamber and '
  - type: note
    content: ch. 42:24
  - type: text
    content: 'wept there. '
  '31':
  - type: text
    content: 'Then he washed his face and came out. And '
  - type: note
    content: ch. 45:1
  - type: text
    content: 'controlling himself he said, “Serve the food.” '
  '32':
  - type: text
    content: 'They served him by himself, and them by themselves, and the Egyptians who ate with him by themselves, because the Egyptians could not eat with the Hebrews, for that is '
  - type: note
    content: ch. 46:34; Ex. 8:26
  - type: text
    content: 'an abomination to the Egyptians. '
  '33':
  - type: text
    content: 'And they sat before him, the firstborn according to his birthright and the youngest according to his youth. And the men looked at one another in amazement. '
  '34':
  - type: note
    content: '[2 Sam. 11:8]'
  - type: text
    content: 'Portions were taken to them from Joseph’s table, but Benjamin’s portion was '
  - type: note
    content: '[ch. 45:22]'
  - type: text
    content: five times as much as any of theirs. And they drank and were merry
  - type: note
    content: Hebrew and became intoxicated
  - type: text
    content: ' with him.'
  '4':
  - type: text
    content: 'If you will send our brother with us, we will go down and buy you food. '
  '5':
  - type: text
    content: 'But if you will not send him, we will not go down, for the man said to us, ‘You shall not see my face, unless your brother is with you.’” '
  '6':
  - type: text
    content: 'Israel said, “Why did you treat me so badly as to tell the man that you had another brother?” '
  '7':
  - type: text
    content: 'They replied, “The man questioned us carefully about ourselves and our kindred, saying, ‘Is your father still alive? Do you have another brother?’ What we told him was in answer to these questions. Could we in any way know that he would say, ‘Bring your brother down’?” '
  '8':
  - type: text
    content: 'And Judah said to Israel his father, “Send the boy with me, and we will arise and go, that we may '
  - type: note
    content: ch. 42:2
  - type: text
    content: 'live and not die, both we and you and also our little ones. '
  '9':
  - type: text
    content: 'I will be a pledge of his safety. From my hand you shall require him. '
  - type: note
    content: ch. 42:37; 44:32
  - type: text
    content: 'If I do not bring him back to you and set him before you, then let me bear the blame forever. '
