        children:
        - type: text
          text: 42:27
      marker-yv: yv-n
    - type: text
      text: 'when we came to the lodging place we opened our sacks, and there was each man’s money in the mouth of his sack, our money in full weight. So we have brought it again with us, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
