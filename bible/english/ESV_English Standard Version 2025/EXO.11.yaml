document_id: EXO.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Final Plague Threatened
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Yet '
  - type: note
    content: '[ch. 4:23]'
  - type: text
    content: 'one plague more I will bring upon Pharaoh and upon Egypt. Afterward he will let you go from here. '
  - type: note
    content: ch. 12:31, 33, 39
  - type: text
    content: 'When he lets you go, he will drive you away completely. '
  '10':
  - type: text
    content: 'Moses and Aaron did all these wonders before Pharaoh, and the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:21
  - type: text
    content: hardened Pharaoh’s heart, and he did not let the people of Israel go out of his land.
  '2':
  - type: text
    content: 'Speak now in the hearing of the people, that '
  - type: note
    content: ch. 3:22; 12:35
  - type: text
    content: 'they ask, every man of his neighbor and every woman of her neighbor, for silver and gold jewelry.” '
  '3':
  - type: note
    content: ch. 3:21; 12:36
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the people favor in the sight of the Egyptians. Moreover, the man Moses was very great in the land of Egypt, in the sight of Pharaoh’s servants and in the sight of the people.'
  '4':
  - type: text
    content: 'So Moses said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 12:29; [Job 34:20; Amos 4:10]
  - type: text
    content: '‘About midnight I will go out in the midst of Egypt, '
  '5':
  - type: text
    content: 'and every firstborn in the land of Egypt shall die, from the firstborn of Pharaoh who sits on his throne, even to the firstborn of the slave girl who is '
  - type: note
    content: Matt. 24:41; Luke 17:35
  - type: text
    content: 'behind the handmill, and all the firstborn of the cattle. '
  '6':
  - type: note
    content: ch. 12:30; [Amos 5:16, 17]
  - type: text
    content: 'There shall be a great cry throughout all the land of Egypt, such as there has never been, nor ever will be again. '
  '7':
  - type: text
    content: 'But not a dog shall growl '
  - type: note
    content: '[ch. 8:22; 9:4]'
  - type: text
    content: 'against any of the people of Israel, either man or beast, that you may know that the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'makes a distinction between Egypt and Israel.’ '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:33
  - type: text
    content: 'all these your servants shall come down to me and bow down to me, saying, ‘Get out, you and all the people who follow you.’ And after that I will go out.” And he went out from Pharaoh in hot anger. '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ch. 3:19; 7:4; 10:1
  - type: text
    content: '“Pharaoh will not listen to you, that '
  - type: note
    content: ch. 7:3
  - type: text
    content: my wonders may be multiplied in the land of Egypt.”
