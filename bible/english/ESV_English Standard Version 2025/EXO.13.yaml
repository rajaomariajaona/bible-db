document_id: EXO.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Consecration of the Firstborn
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: note
    content: '[ch. 12:14, 17, 24, 43]'
  - type: text
    content: You shall therefore keep this statute at its appointed time from year to year.
  '11':
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' brings you into the land of the Canaanites, '
  - type: note
    content: ver. 5
  - type: text
    content: 'as he swore to you and your fathers, and shall give it to you, '
  '12':
  - type: note
    content: ver. 2
  - type: text
    content: 'you shall set apart to the '
  - type: text
    content: Lord
  - type: text
    content: ' all that first opens the womb. All the firstborn of your animals that are males shall be the '
  - type: text
    content: Lord
  - type: text
    content: '’s. '
  '13':
  - type: note
    content: ch. 34:20
  - type: text
    content: 'Every firstborn of a donkey you shall redeem with a lamb, or if you will not redeem it you shall break its neck. Every '
  - type: note
    content: Num. 3:46, 47; 18:15, 16
  - type: text
    content: 'firstborn of man among your sons you shall redeem. '
  '14':
  - type: note
    content: See ch. 12:26
  - type: text
    content: 'And when in time to come your son asks you, ‘What does this mean?’ you shall say to him, '
  - type: note
    content: ver. 3, 16
  - type: text
    content: '‘By a strong hand the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt, from the house of '
  - type: note
    content: ver. 3
  - type: text
    content: 'slavery. '
  '15':
  - type: text
    content: 'For when Pharaoh stubbornly refused to let us go, the '
  - type: note
    content: ch. 12:29
  - type: text
    content: Lord
  - type: text
    content: ' killed all the firstborn in the land of Egypt, both the firstborn of man and the firstborn of animals. Therefore I sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' all the males that first open the womb, but '
  - type: note
    content: ver. 13
  - type: text
    content: 'all the firstborn of my sons I redeem.’ '
  '16':
  - type: note
    content: ver. 9
  - type: text
    content: 'It shall be as a mark on your hand or frontlets between your eyes, for '
  - type: note
    content: ver. 14
  - type: text
    content: 'by a strong hand the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt.”'
  - type: heading
    content: Pillars of Cloud and Fire
  '17':
  - type: text
    content: 'When Pharaoh let the people go, God did '
  - type: note
    content: '[Ps. 107:7]'
  - type: text
    content: 'not lead them by way of the land of the Philistines, although that was near. For God said, “Lest the people '
  - type: note
    content: ch. 14:11, 12; [Neh. 9:17]; See Num. 14:1-4
  - type: text
    content: 'change their minds when they see war and return to Egypt.” '
  '18':
  - type: text
    content: 'But God '
  - type: note
    content: ch. 14:2; [Deut. 32:10]; See Num. 33:6-49
  - type: text
    content: 'led the people around by the way of the wilderness toward the Red Sea. And the people of Israel went up out of the land of Egypt equipped for battle. '
  '19':
  - type: text
    content: Moses took the bones of Joseph with him, for Joseph
  - type: note
    content: Samaritan, Septuagint; Hebrew he
  - type: text
    content: ' had made the sons of Israel solemnly swear, saying, '
  - type: note
    content: Gen. 50:25; Josh. 24:32; Heb. 11:22; [Acts 7:16]
  - type: text
    content: '“God will surely visit you, and you shall carry up my bones with you from here.” '
  '2':
  - type: note
    content: ver. 12, 13, 15; ch. 22:29, 30; 34:19; Lev. 27:26; Num. 3:13; 8:16, 17; 18:15; Deut. 15:19; Cited Luke 2:23
  - type: text
    content: “Consecrate to me all the firstborn. Whatever is the first to open the womb among the people of Israel, both of man and of beast, is mine.”
  - type: heading
    content: The Feast of Unleavened Bread
  '20':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:37; Num. 33:6
  - type: text
    content: 'they moved on from Succoth and encamped at Etham, on the edge of the wilderness. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ch. 14:19, 24; 40:38; Num. 10:34; 14:14; Deut. 1:33; Neh. 9:12, 19; Ps. 78:14; 99:7; 105:39; 1 Cor. 10:1; [Isa. 4:5]; See Num. 9:15-23
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' went before them by day in a pillar of cloud to lead them along the way, and by night in a pillar of fire to give them light, that they might travel by day and by night. '
  '22':
  - type: text
    content: The pillar of cloud by day and the pillar of fire by night did not depart from before the people.
  '3':
  - type: text
    content: 'Then Moses said to the people, '
  - type: note
    content: ch. 12:42; Deut. 16:3
  - type: text
    content: '“Remember this day in which you came out from Egypt, out of the house of slavery, '
  - type: note
    content: ch. 3:19; 6:1
  - type: text
    content: 'for by a strong hand the '
  - type: text
    content: Lord
  - type: text
    content: ' brought you out from this place. '
  - type: note
    content: See ch. 12:8
  - type: text
    content: 'No leavened bread shall be eaten. '
  '4':
  - type: text
    content: 'Today, in the month of '
  - type: note
    content: ch. 23:15; 34:18; Deut. 16:1
  - type: text
    content: 'Abib, you are going out. '
  '5':
  - type: text
    content: 'And when the '
  - type: text
    content: Lord
  - type: text
    content: ' brings you into '
  - type: note
    content: ch. 3:8; 23:23; 33:2; 34:11; Josh. 12:8; 24:11
  - type: text
    content: 'the land of the Canaanites, the Hittites, the Amorites, the Hivites, and the Jebusites, which '
  - type: note
    content: ch. 6:8
  - type: text
    content: 'he swore to your fathers to give you, a land '
  - type: note
    content: See ch. 3:8
  - type: text
    content: 'flowing with milk and honey, '
  - type: note
    content: ch. 12:25, 26
  - type: text
    content: 'you shall keep this service in this month. '
  '6':
  - type: note
    content: ch. 12:15, 16
  - type: text
    content: 'Seven days you shall eat unleavened bread, and on the seventh day there shall be a feast to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Unleavened bread shall be eaten for seven days; no leavened bread shall be seen with you, and no leaven shall be seen with you in all your territory. '
  '8':
  - type: note
    content: See ch. 12:26
  - type: text
    content: 'You shall tell your son on that day, ‘It is because of what the '
  - type: text
    content: Lord
  - type: text
    content: ' did for me when I came out of Egypt.’ '
  '9':
  - type: text
    content: 'And it shall '
  - type: note
    content: Deut. 6:8; 11:18; [Num. 15:39; Matt. 23:5]
  - type: text
    content: 'be to you as a sign on your hand and as '
  - type: note
    content: ch. 12:14, 24
  - type: text
    content: 'a memorial '
  - type: note
    content: Deut. 6:8; 11:18; [Num. 15:39; Matt. 23:5]
  - type: text
    content: 'between your eyes, that the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' may be in your mouth. For with a strong hand the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought you out of Egypt. '
