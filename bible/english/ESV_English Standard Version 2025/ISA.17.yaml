document_id: ISA.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: An Oracle Concerning Damascus
  - type: text
    content: 'An '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'oracle concerning '
  - type: note
    content: ch. 7:8; Zech. 9:1; See Jer. 49:23-27; Amos 1:3-5
  - type: text
    content: Damascus.
  - type: text
    content: Behold, Damascus will cease to be a city
  - type: text
    content: and will become a heap of ruins.
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 106:21
  - type: text
    content: you have forgotten the God of your salvation
  - type: text
    content: 'and have not remembered the '
  - type: note
    content: ch. 26:4; [Deut. 32:4, 18, 31]
  - type: text
    content: Rock of your refuge;
  - type: text
    content: therefore, though you plant pleasant plants
  - type: text
    content: and sow the vine-branch of a stranger,
  '11':
  - type: text
    content: though you make them grow
  - type: note
    content: Or though you carefully fence them
  - type: text
    content: ' on the day that you plant them,'
  - type: text
    content: and make them blossom in the morning that you sow,
  - type: text
    content: yet the harvest will flee away
  - type: note
    content: Or will be a heap
  - type: text
    content: in a day of grief and incurable pain.
  '12':
  - type: text
    content: 'Ah, '
  - type: note
    content: See ch. 22:5-7
  - type: text
    content: the thunder of many peoples;
  - type: text
    content: they thunder like the thundering of the sea!
  - type: text
    content: Ah, the roar of nations;
  - type: text
    content: they roar like the roaring of mighty waters!
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 33:3 ]'
  - type: text
    content: The nations roar like the roaring of many waters,
  - type: note
    content: Ps. 9:5; [ Joel 3:2 ]
  - type: text
    content: but he will rebuke them, and they will flee far away,
  - type: text
    content: 'chased '
  - type: note
    content: See Ps. 1:4
  - type: text
    content: like chaff on the mountains before the wind
  - type: text
    content: 'and '
  - type: note
    content: Ps. 83:13
  - type: text
    content: whirling dust before the storm.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 30:5 ]'
  - type: text
    content: At evening time, behold, terror!
  - type: text
    content: Before morning, they are no more!
  - type: text
    content: This is the portion of those who loot us,
  - type: text
    content: and the lot of those who plunder us.
  '2':
  - type: text
    content: 'The cities of '
  - type: note
    content: Deut. 2:36; Josh. 13:25
  - type: text
    content: Aroer are deserted;
  - type: text
    content: they will be for flocks,
  - type: text
    content: 'which will lie down, and '
  - type: note
    content: Mic. 4:4
  - type: text
    content: none will make them afraid.
  '3':
  - type: text
    content: 'The fortress will disappear from '
  - type: note
    content: ch. 7:16; 8:4
  - type: text
    content: Ephraim,
  - type: text
    content: 'and the kingdom from '
  - type: note
    content: ch. 7:16; 8:4
  - type: text
    content: Damascus;
  - type: text
    content: and the remnant of Syria will be
  - type: text
    content: 'like '
  - type: note
    content: '[1 Sam. 4:21]'
  - type: text
    content: the glory of the children of Israel,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  '4':
  - type: text
    content: 'And in that day '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: the glory of Jacob will be brought low,
  - type: text
    content: 'and '
  - type: note
    content: ch. 10:16
  - type: text
    content: the fat of his flesh will grow lean.
  '5':
  - type: text
    content: 'And it shall be '
  - type: note
    content: '[ch. 24:1]'
  - type: text
    content: as when the reaper gathers standing grain
  - type: text
    content: and his arm harvests the ears,
  - type: text
    content: and as when one gleans the ears of grain
  - type: text
    content: 'in '
  - type: note
    content: See 2 Sam. 5:18
  - type: text
    content: the Valley of Rephaim.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:13
  - type: text
    content: Gleanings will be left in it,
  - type: text
    content: as when an olive tree is beaten—
  - type: text
    content: two or three berries
  - type: text
    content: in the top of the highest bough,
  - type: text
    content: four or five
  - type: text
    content: on the branches of a fruit tree,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Hos. 8:14 ]'
  - type: text
    content: 'In that day man will look to his Maker, and his eyes will look on the Holy One of Israel. '
  '8':
  - type: note
    content: ch. 27:9; Mic. 5:13, 14
  - type: text
    content: 'He will not look to the altars, the work of his hands, and he will not look on what his own fingers have made, either the '
  - type: note
    content: Ex. 34:13; See Deut. 16:21
  - type: text
    content: Asherim or the altars of incense.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 27:10 ]'
  - type: text
    content: In that day their strong cities will be like the deserted places of the wooded heights and the hilltops, which they deserted because of the children of Israel, and there will be desolation.
