document_id: GEN.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sarah’s Death and Burial
  - type: text
    content: 'Sarah lived 127 years; these were the years of the life of Sarah. '
  '10':
  - type: text
    content: 'Now Ephron was sitting among the Hittites, and Ephron the Hittite answered Abraham in the hearing of the Hittites, of all who '
  - type: note
    content: ch. 34:20, 24; Ruth 4:1
  - type: text
    content: 'went in at the gate of his city, '
  '11':
  - type: text
    content: '“No, my lord, hear me: I give you the field, and I give you the cave that is in it. In the sight of the sons of my people I give it to you. Bury your dead.” '
  '12':
  - type: text
    content: 'Then Abraham bowed down before the people of the land. '
  '13':
  - type: text
    content: 'And he said to Ephron in the hearing of the people of the land, “But if you will, hear me: I give the price of the field. Accept it from me, that I may bury my dead there.” '
  '14':
  - type: text
    content: 'Ephron answered Abraham, '
  '15':
  - type: text
    content: '“My lord, listen to me: a piece of land worth four hundred '
  - type: note
    content: Ex. 30:13; Ezek. 45:12
  - type: text
    content: shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver, what is that between you and me? Bury your dead.” '
  '16':
  - type: text
    content: 'Abraham listened to Ephron, and Abraham '
  - type: note
    content: 1 Chr. 21:25; Jer. 32:9; Zech. 11:12
  - type: text
    content: weighed out for Ephron the silver that he had named in the hearing of the Hittites, four hundred shekels of silver, according to the weights current among the merchants.
  '17':
  - type: text
    content: 'So '
  - type: note
    content: ch. 25:9; 49:29-32; 50:13
  - type: text
    content: 'the field of Ephron in Machpelah, which was to the east of Mamre, the field with the cave that was in it and all the trees that were in the field, throughout its whole area, was made over '
  '18':
  - type: text
    content: 'to Abraham as a possession in the presence of the Hittites, before all who went in at the gate of his city. '
  '19':
  - type: text
    content: 'After this, Abraham buried Sarah his wife in the cave of the field of Machpelah east of Mamre (that is, Hebron) in the land of Canaan. '
  '2':
  - type: text
    content: 'And Sarah died at '
  - type: note
    content: ch. 35:27; Josh. 14:15; Judg. 1:10
  - type: text
    content: 'Kiriath-arba (that is, '
  - type: note
    content: ver. 19
  - type: text
    content: 'Hebron) in the land of Canaan, and Abraham went in to mourn for Sarah and to weep for her. '
  '20':
  - type: text
    content: 'The field and the cave that is in it '
  - type: note
    content: '[Ruth 4:7-10; Jer. 32:10-14]'
  - type: text
    content: were made over to Abraham as property for a burying place by the Hittites.
  '3':
  - type: text
    content: And Abraham rose up from before his dead and said to the Hittites,
  - type: note
    content: Hebrew sons of Heth; also verses 5, 7, 10, 16, 18, 20
  - type: text
    content: ' '
  '4':
  - type: note
    content: ch. 17:8; 1 Chr. 29:15; Ps. 105:12; Heb. 11:9, 13
  - type: text
    content: '“I am a sojourner and foreigner among you; '
  - type: note
    content: Acts 7:5
  - type: text
    content: 'give me property among you for a burying place, that I may bury my dead out of my sight.” '
  '5':
  - type: text
    content: 'The Hittites answered Abraham, '
  '6':
  - type: text
    content: “Hear us, my lord; you are a prince of God
  - type: note
    content: Or a mighty prince
  - type: text
    content: ' among us. Bury your dead in the choicest of our tombs. None of us will withhold from you his tomb to hinder you from burying your dead.” '
  '7':
  - type: text
    content: 'Abraham rose and bowed to the Hittites, the people of the land. '
  '8':
  - type: text
    content: 'And he said to them, “If you are willing that I should bury my dead out of my sight, hear me and entreat for me Ephron the son of Zohar, '
  '9':
  - type: text
    content: that he may give me the cave of Machpelah, which he owns; it is at the end of his field. For the full price let him give it to me in your presence as property for a burying place.”
