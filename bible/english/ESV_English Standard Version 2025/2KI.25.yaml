        marker: ref
        children:
        - type: text
          text: 26:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'And they built siegeworks all around it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the army of the Chaldeans, who were with the captain of the guard, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 1:3
      marker-yv: yv-n
    - type: text
      text: 'broke down the walls around Jerusalem. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 36:20
      marker-yv: yv-n
    - type: text
      text: 'And the rest of the people who were left in the city and the deserters who had deserted to the king of Babylon, together with the rest of the multitude, Nebuzaradan the captain of the guard carried into exile. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the captain of the guard left '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
