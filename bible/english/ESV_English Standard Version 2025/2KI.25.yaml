        - type: text
          text: 2 Chr. 3:15
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: The height of the one pillar was eighteen cubits,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 18 inches or 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' and on it was a capital of bronze. The height of the capital was three cubits. A latticework and pomegranates, all of bronze, were all around the capital. And the second pillar had the same, with the latticework.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 18-21, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:24-27
      marker-yv: yv-n
    - type: text
      text: 'And the captain of the guard took '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 7:1
      marker-yv: yv-n
    - type: text
      text: 'Seraiah the chief priest and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 21:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:3
      marker-yv: yv-n
    - type: text
      text: 'Zephaniah the second priest and the three keepers of the threshold; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from the city he took an officer who had been in command of the men of war, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esth. 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'five men of the king’s council who were found in the city; and the secretary of the commander of the army, who mustered the people of the land; and sixty men of the people of the land, who were found in the city. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the city was besieged till the eleventh year of King Zedekiah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Nebuzaradan the captain of the guard took them and brought them to the king of Babylon at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:33
      marker-yv: yv-n
    - type: text
      text: 'Riblah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Babylon struck them down and put them to death at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Riblah in the land of Hamath. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 26:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 28:64
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: So Judah was taken into exile out of its land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gedaliah Made Governor of Judah
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And over the people who remained in the land of Judah, whom Nebuchadnezzar king of Babylon had left, he appointed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 39:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:5
      marker-yv: yv-n
    - type: text
      text: 'Gedaliah the son of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:12
      marker-yv: yv-n
    - type: text
      text: 'Ahikam, son of Shaphan, governor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: For ver. 23, 24, see
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 40:7-9
      marker-yv: yv-n
    - type: text
      text: 'Now when all the captains and their men heard that the king of Babylon had appointed Gedaliah governor, they came with their men to Gedaliah at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 18:26
      marker-yv: yv-n
    - type: text
      text: 'Mizpah, namely, Ishmael the son of Nethaniah, and Johanan the son of Kareah, and Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of the Maacathite. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gedaliah swore to them and their men, saying, “Do not be afraid because of the Chaldean officials. Live in the land and serve the king of Babylon, and it shall be well with you.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 41:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'But in the seventh month, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 40:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'Ishmael the son of Nethaniah, son of Elishama, of the royal family, came with ten men and struck down Gedaliah and put him to death along with the Jews and the Chaldeans who were with him at Mizpah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 43:4-7
      marker-yv: yv-n
    - type: text
      text: Then all the people, both small and great, and the captains of the forces arose and went to Egypt, for they were afraid of the Chaldeans.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoiachin Released from Prison
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 27-30, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:31-34
      marker-yv: yv-n
    - type: text
      text: 'And in the thirty-seventh year of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'the exile of Jehoiachin king of Judah, in the twelfth month, on the twenty-seventh day of the month, Evil-merodach king of Babylon, in the year that he began to reign, graciously '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 40:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      marker-yv: yv-n
    - type: text
      text: freed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: reign, lifted up the head of
      marker-yv: yv-n
    - type: text
      text: ' Jehoiachin king of Judah from prison. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spoke kindly to him and gave him a seat above the seats of the kings who were with him in Babylon. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jehoiachin put off his prison garments. And every day of his life '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 9:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      marker-yv: yv-n
    - type: text
      text: 'he dined regularly at the king’s table, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the ninth day of the fourth month '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lam. 4:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the famine was so severe in the city that there was no food for the people of the land. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and for his allowance, a regular allowance was given him by the king, according to his daily needs, as long as he lived.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a breach was made in the city, and all the men of war fled by night by the way of the gate between the two walls, by '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 3:15
      marker-yv: yv-n
    - type: text
      text: 'the king’s garden, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:2
      marker-yv: yv-n
    - type: text
      text: 'the Chaldeans were around the city. And they went in the direction of the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 1:1
      marker-yv: yv-n
    - type: text
      text: 'Arabah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the army of the Chaldeans pursued the king and overtook him in the plains of Jericho, and all his army was scattered from him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they captured the king '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 32:4
      marker-yv: yv-n
    - type: text
      text: 'and brought him up to the king of Babylon at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:33
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Riblah, and they passed sentence on him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They slaughtered the sons of Zedekiah before his eyes, '
    - type: usfm
