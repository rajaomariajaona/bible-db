document_id: 2KI.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Fall and Captivity of Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-7, see 2 Chr. 36:17-20; Jer. 39:1-7; 52:4-11
  - type: text
    content: 'And in the ninth year of his reign, in the tenth month, on the tenth day of the month, '
  - type: note
    content: Jer. 34:1, 2; 39:1, 2; Ezek. 24:2
  - type: text
    content: 'Nebuchadnezzar king of Babylon came with all his army against Jerusalem and laid siege to it. '
  - type: note
    content: '[Ezek. 21:22; 26:8]'
  - type: text
    content: 'And they built siegeworks all around it. '
  '10':
  - type: text
    content: 'And all the army of the Chaldeans, who were with the captain of the guard, '
  - type: note
    content: Neh. 1:3
  - type: text
    content: 'broke down the walls around Jerusalem. '
  '11':
  - type: note
    content: 2 Chr. 36:20
  - type: text
    content: 'And the rest of the people who were left in the city and the deserters who had deserted to the king of Babylon, together with the rest of the multitude, Nebuzaradan the captain of the guard carried into exile. '
  '12':
  - type: text
    content: 'But the captain of the guard left '
  - type: note
    content: ch. 24:14; Jer. 40:7
  - type: text
    content: some of the poorest of the land to be vinedressers and plowmen.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 27:19, 22 ]; For ver. 13-17, see 2 Chr. 36:18-20; Jer. 52:17-23'
  - type: text
    content: 'And the pillars '
  - type: note
    content: 1 Kgs. 7:15
  - type: text
    content: 'of bronze that were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: 1 Kgs. 7:27
  - type: text
    content: 'the stands and '
  - type: note
    content: 1 Kgs. 7:23
  - type: text
    content: 'the bronze sea that were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the Chaldeans broke in pieces and carried the bronze to Babylon. '
  '14':
  - type: note
    content: Ex. 27:3; 1 Kgs. 7:45, 50
  - type: text
    content: 'And they took away the pots and the shovels and the snuffers and the dishes for incense and all the vessels of bronze used in the temple service, '
  '15':
  - type: text
    content: 'the fire pans also and the bowls. What was of gold the captain of the guard took away as gold, and what was of silver, as silver. '
  '16':
  - type: text
    content: 'As for the two pillars, the one sea, and the stands that Solomon had made for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kgs. 7:47
  - type: text
    content: 'the bronze of all these vessels was beyond weight. '
  '17':
  - type: note
    content: '[1 Kgs. 7:15-18; 2 Chr. 3:15]'
  - type: text
    content: The height of the one pillar was eighteen cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and on it was a capital of bronze. The height of the capital was three cubits. A latticework and pomegranates, all of bronze, were all around the capital. And the second pillar had the same, with the latticework.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-21, see Jer. 52:24-27
  - type: text
    content: 'And the captain of the guard took '
  - type: note
    content: 1 Chr. 6:14; Ezra 7:1
  - type: text
    content: 'Seraiah the chief priest and '
  - type: note
    content: Jer. 21:1; 29:25; 37:3
  - type: text
    content: 'Zephaniah the second priest and the three keepers of the threshold; '
  '19':
  - type: text
    content: 'and from the city he took an officer who had been in command of the men of war, and '
  - type: note
    content: Esth. 1:14; [Jer. 52:25]
  - type: text
    content: 'five men of the king’s council who were found in the city; and the secretary of the commander of the army, who mustered the people of the land; and sixty men of the people of the land, who were found in the city. '
  '2':
  - type: text
    content: 'So the city was besieged till the eleventh year of King Zedekiah. '
  '20':
  - type: text
    content: 'And Nebuzaradan the captain of the guard took them and brought them to the king of Babylon at '
  - type: note
    content: ch. 23:33
  - type: text
    content: 'Riblah. '
  '21':
  - type: text
    content: 'And the king of Babylon struck them down and put them to death at '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'Riblah in the land of Hamath. '
  - type: note
    content: '[ch. 23:27; Lev. 26:33; Deut. 28:64]'
  - type: text
    content: So Judah was taken into exile out of its land.
  - type: heading
    content: Gedaliah Made Governor of Judah
  '22':
  - type: text
    content: 'And over the people who remained in the land of Judah, whom Nebuchadnezzar king of Babylon had left, he appointed '
  - type: note
    content: Jer. 39:14; 40:5
  - type: text
    content: 'Gedaliah the son of '
  - type: note
    content: ch. 22:12
  - type: text
    content: 'Ahikam, son of Shaphan, governor. '
  '23':
  - type: note
    content: For ver. 23, 24, seeJer. 40:7-9
  - type: text
    content: 'Now when all the captains and their men heard that the king of Babylon had appointed Gedaliah governor, they came with their men to Gedaliah at '
  - type: note
    content: Josh. 18:26
  - type: text
    content: 'Mizpah, namely, Ishmael the son of Nethaniah, and Johanan the son of Kareah, and Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of the Maacathite. '
  '24':
  - type: text
    content: 'And Gedaliah swore to them and their men, saying, “Do not be afraid because of the Chaldean officials. Live in the land and serve the king of Babylon, and it shall be well with you.” '
  '25':
  - type: note
    content: Jer. 41:1, 2
  - type: text
    content: 'But in the seventh month, '
  - type: note
    content: Jer. 40:14, 15
  - type: text
    content: 'Ishmael the son of Nethaniah, son of Elishama, of the royal family, came with ten men and struck down Gedaliah and put him to death along with the Jews and the Chaldeans who were with him at Mizpah. '
  '26':
  - type: note
    content: See Jer. 43:4-7
  - type: text
    content: Then all the people, both small and great, and the captains of the forces arose and went to Egypt, for they were afraid of the Chaldeans.
  - type: heading
    content: Jehoiachin Released from Prison
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27-30, see Jer. 52:31-34
  - type: text
    content: 'And in the thirty-seventh year of '
  - type: note
    content: ch. 24:12, 15
  - type: text
    content: 'the exile of Jehoiachin king of Judah, in the twelfth month, on the twenty-seventh day of the month, Evil-merodach king of Babylon, in the year that he began to reign, graciously '
  - type: note
    content: Gen. 40:13, 20
  - type: text
    content: freed
  - type: note
    content: Hebrew reign, lifted up the head of
  - type: text
    content: ' Jehoiachin king of Judah from prison. '
  '28':
  - type: text
    content: 'And he spoke kindly to him and gave him a seat above the seats of the kings who were with him in Babylon. '
  '29':
  - type: text
    content: 'So Jehoiachin put off his prison garments. And every day of his life '
  - type: note
    content: 2 Sam. 9:7, 13
  - type: text
    content: 'he dined regularly at the king’s table, '
  '3':
  - type: text
    content: 'On the ninth day of the fourth month '
  - type: note
    content: '[Lam. 4:9, 10]'
  - type: text
    content: 'the famine was so severe in the city that there was no food for the people of the land. '
  '30':
  - type: text
    content: and for his allowance, a regular allowance was given him by the king, according to his daily needs, as long as he lived.
  '4':
  - type: text
    content: 'Then a breach was made in the city, and all the men of war fled by night by the way of the gate between the two walls, by '
  - type: note
    content: Neh. 3:15
  - type: text
    content: 'the king’s garden, and '
  - type: note
    content: See ch. 24:2
  - type: text
    content: 'the Chaldeans were around the city. And they went in the direction of the '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'Arabah. '
  '5':
  - type: text
    content: 'But the army of the Chaldeans pursued the king and overtook him in the plains of Jericho, and all his army was scattered from him. '
  '6':
  - type: text
    content: 'Then they captured the king '
  - type: note
    content: Jer. 32:4
  - type: text
    content: 'and brought him up to the king of Babylon at '
  - type: note
    content: '[ch. 23:33]'
  - type: text
    content: 'Riblah, and they passed sentence on him. '
  '7':
  - type: text
    content: 'They slaughtered the sons of Zedekiah before his eyes, '
  - type: note
    content: '[Ezek. 12:13]'
  - type: text
    content: and put out the eyes of Zedekiah and bound him in chains and took him to Babylon.
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-12, see Jer. 39:8-12; 52:12-16
  - type: text
    content: 'In the fifth month, on '
  - type: note
    content: '[Jer. 52:12]'
  - type: text
    content: 'the seventh day of the month—that was the nineteenth year of King Nebuchadnezzar, king of Babylon—Nebuzaradan, the captain of the bodyguard, a servant of the king of Babylon, came to Jerusalem. '
  '9':
  - type: note
    content: 2 Chr. 36:19; Ps. 79:1
  - type: text
    content: 'And he burned the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Hos. 8:14; Amos 2:5]'
  - type: text
    content: 'and the king’s house and all the houses of Jerusalem; every great house he burned down. '
