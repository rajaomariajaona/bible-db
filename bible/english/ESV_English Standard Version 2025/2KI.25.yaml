        - type: text
          text: Ezek. 24:2
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar king of Babylon came with all his army against Jerusalem and laid siege to it. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
