      - type: text
        text: Lord
    - type: text
      text: ', the Chaldeans broke in pieces and carried the bronze to Babylon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
