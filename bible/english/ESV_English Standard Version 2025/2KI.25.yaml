        - type: text
          text: '50'
      marker-yv: yv-n
    - type: text
      text: 'And they took away the pots and the shovels and the snuffers and the dishes for incense and all the vessels of bronze used in the temple service, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fire pans also and the bowls. What was of gold the captain of the guard took away as gold, and what was of silver, as silver. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the two pillars, the one sea, and the stands that Solomon had made for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:47
      marker-yv: yv-n
    - type: text
      text: 'the bronze of all these vessels was beyond weight. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:15-18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
