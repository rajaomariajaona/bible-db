document_id: JER.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ruined Loincloth
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' to me, “Go and buy a linen loincloth and '
  - type: note
    content: Ex. 28:39; Lev. 16:4; [Acts 21:11]
  - type: text
    content: 'put it around your waist, and do not dip it in water.” '
  '10':
  - type: text
    content: 'This evil people, who refuse to hear my words, '
  - type: note
    content: '[ch. 3:17; 16:11, 12]'
  - type: text
    content: 'who stubbornly follow their own heart and have gone after other gods to serve them and worship them, shall be like this loincloth, which is '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'good for nothing. '
  '11':
  - type: text
    content: 'For as the loincloth clings to the waist of a man, so I made the whole house of Israel and the whole house of Judah cling to me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ex. 19:5]'
  - type: text
    content: 'that they might be for me a people, '
  - type: note
    content: ch. 33:9; Isa. 55:13; Zeph. 3:20
  - type: text
    content: a name, a praise, and a glory, but they would not listen.
  - type: heading
    content: The Jars Filled with Wine
  '12':
  - type: text
    content: '“You shall speak to them this word: ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, “Every jar shall be filled with wine.”’ And they will say to you, ‘Do we not indeed know that '
  - type: note
    content: ch. 48:12
  - type: text
    content: 'every jar will be filled with wine?’ '
  '13':
  - type: text
    content: 'Then you shall say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Ezek. 23:33
  - type: text
    content: 'Behold, I will fill with drunkenness all the inhabitants of this land: '
  - type: note
    content: ch. 17:20; 19:3; 22:2
  - type: text
    content: 'the kings who sit on David’s throne, '
  - type: note
    content: '[ch. 18:18]'
  - type: text
    content: 'the priests, the prophets, and all the inhabitants of Jerusalem. '
  '14':
  - type: text
    content: 'And I will '
  - type: note
    content: Ps. 2:9; [ch. 19:10, 11]
  - type: text
    content: 'dash them one against another, fathers and sons together, declares the '
  - type: text
    content: Lord
  - type: text
    content: . I will not pity or spare or have compassion, that I should not destroy them.’”
  - type: heading
    content: Exile Threatened
  '15':
  - type: text
    content: Hear and give ear; be not proud,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 7:19 ]'
  - type: text
    content: 'Give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: note
    content: Isa. 5:30; 8:22; Amos 5:8; 8:9; [ John 11:10 ]
  - type: text
    content: before he brings darkness,
  - type: text
    content: before your feet stumble
  - type: text
    content: on the twilight mountains,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 5:30; 8:22; Amos 5:8; 8:9; [John 11:10]
  - type: text
    content: while you look for light
  - type: text
    content: he turns it into gloom
  - type: text
    content: 'and makes it '
  - type: note
    content: Isa. 60:2
  - type: text
    content: deep darkness.
  '17':
  - type: text
    content: But if you will not listen,
  - type: note
    content: ch. 9:1, 18; 14:17; Lam. 1:2, 16; 2:18; 3:49
  - type: text
    content: my soul will weep in secret for your pride;
  - type: text
    content: my eyes will weep bitterly and run down with tears,
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ’s flock has been taken captive.
  '18':
  - type: text
    content: 'Say to '
  - type: note
    content: ch. 22:26; 2 Kgs. 24:12
  - type: text
    content: 'the king and '
  - type: note
    content: ch. 22:26; 2 Kgs. 24:12
  - type: text
    content: 'the queen mother:'
  - type: text
    content: “Take a lowly seat,
  - type: text
    content: 'for '
  - type: note
    content: Prov. 4:9; Isa. 28:5; 62:3; Lam. 5:16
  - type: text
    content: your beautiful crown
  - type: text
    content: has come down from your head.”
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 6:1 ]'
  - type: text
    content: The cities of the Negeb are shut up,
  - type: text
    content: with none to open them;
  - type: text
    content: all Judah is taken into exile,
  - type: text
    content: wholly taken into exile.
  '2':
  - type: text
    content: 'So I bought a loincloth according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', and put it around my waist. '
  '20':
  - type: text
    content: '“Lift up your eyes '
  - type: note
    content: ch. 1:13, 14; 6:22
  - type: text
    content: and see
  - type: text
    content: those who come from the north.
  - type: text
    content: Where is the flock that was given you,
  - type: text
    content: your beautiful flock?
  '21':
  - type: text
    content: What will you say when they set as head over you
  - type: text
    content: those whom you yourself have taught to be friends to you?
  - type: note
    content: See Isa. 13:8
  - type: text
    content: Will not pangs take hold of you
  - type: text
    content: like those of a woman in labor?
  '22':
  - type: text
    content: And if you say in your heart,
  - type: note
    content: See ch. 5:19
  - type: text
    content: ‘Why have these things come upon me?’
  - type: text
    content: it is for the greatness of your iniquity
  - type: text
    content: 'that '
  - type: note
    content: ver. 26; Isa. 3:17; Lam. 1:8; Nah. 3:5; [Hos. 2:10]
  - type: text
    content: your skirts are lifted up
  - type: text
    content: and you suffer violence.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 19:26 ]'
  - type: text
    content: Can the Ethiopian change his skin
  - type: text
    content: 'or '
  - type: note
    content: '[Matt. 19:26]'
  - type: text
    content: the leopard his spots?
  - type: text
    content: Then also you can do good
  - type: text
    content: who are accustomed to do evil.
  '24':
  - type: text
    content: I will scatter you
  - type: note
    content: Hebrew them
  - type: text
    content: ' '
  - type: note
    content: Ps. 1:4; 83:13
  - type: text
    content: like chaff
  - type: text
    content: driven by the wind from the desert.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Job 20:29; Ps. 11:6
  - type: text
    content: This is your lot,
  - type: text
    content: 'the portion I have measured out to you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'because '
  - type: note
    content: ch. 2:32
  - type: text
    content: you have forgotten me
  - type: text
    content: and trusted in lies.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: I myself will lift up your skirts over your face,
  - type: text
    content: and your shame will be seen.
  '27':
  - type: text
    content: 'I have seen '
  - type: note
    content: ch. 6:15
  - type: text
    content: your abominations,
  - type: text
    content: 'your adulteries and '
  - type: note
    content: ch. 5:8
  - type: text
    content: neighings, your lewd whorings,
  - type: note
    content: See ch. 2:20
  - type: text
    content: on the hills in the field.
  - type: text
    content: Woe to you, O Jerusalem!
  - type: text
    content: 'How long will it be '
  - type: note
    content: Isa. 1:16; [Ezek. 24:13]
  - type: text
    content: before you are made clean?”
  '3':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me a second time, '
  '4':
  - type: text
    content: '“Take the loincloth that you have bought, which is around your waist, and arise, '
  - type: note
    content: '[ch. 51:59, 63]'
  - type: text
    content: 'go to the Euphrates and hide it there in '
  - type: note
    content: Isa. 7:19
  - type: text
    content: 'a cleft of the rock.” '
  '5':
  - type: text
    content: 'So I went and hid it by the Euphrates, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded me. '
  '6':
  - type: text
    content: 'And after many days the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Arise, go to the Euphrates, and take from there '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the loincloth that I commanded you to hide there.” '
  '7':
  - type: text
    content: 'Then I went to the Euphrates, and dug, and I took '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the loincloth from the place where I had hidden it. And behold, the loincloth was '
  - type: note
    content: ch. 18:4
  - type: text
    content: 'spoiled; it was '
  - type: note
    content: '[Ezek. 15:4, 5]'
  - type: text
    content: good for nothing.
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '9':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: '[Ps. 137:1]'
  - type: text
    content: 'Even so will I spoil the pride of Judah and the great '
  - type: note
    content: Lev. 26:19
  - type: text
    content: 'pride of Jerusalem. '
