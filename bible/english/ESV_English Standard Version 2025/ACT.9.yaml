document_id: ACT.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Conversion of Saul
  - type: text
    content: 'But Saul, '
  - type: note
    content: ver. 13, 21; See ch. 8:3
  - type: text
    content: 'still '
  - type: note
    content: '[Ps. 27:12]'
  - type: text
    content: 'breathing threats and murder against the disciples of the Lord, went to '
  - type: note
    content: ch. 22:5; 26:10
  - type: text
    content: 'the high priest '
  '10':
  - type: text
    content: 'Now there was a disciple at Damascus named '
  - type: note
    content: ch. 22:12
  - type: text
    content: 'Ananias. The Lord said to him in a vision, '
  - type: text
    content: “Ananias.”
  - type: text
    content: ' And he said, '
  - type: note
    content: Gen. 22:1; Isa. 6:8
  - type: text
    content: '“Here I am, Lord.” '
  '11':
  - type: text
    content: 'And the Lord said to him, '
  - type: text
    content: '“Rise and go to the street called Straight, and at the house of Judas look for a man '
  - type: note
    content: ch. 21:39; 22:3
  - type: text
    content: of Tarsus named Saul, for behold, he is praying,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'and he has seen in a vision a man named Ananias come in and '
  - type: note
    content: ver. 17; See Mark 5:23
  - type: text
    content: lay his hands on him so that he might regain his sight.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But Ananias answered, “Lord, I have heard from many about this man, '
  - type: note
    content: ver. 1, 2
  - type: text
    content: 'how much evil he has done to '
  - type: note
    content: 1 Thess. 3:13; 2 Thess. 1:10
  - type: text
    content: 'your '
  - type: note
    content: Rom. 15:25, 26, 31
  - type: text
    content: 'saints at Jerusalem. '
  '14':
  - type: text
    content: 'And here he has authority from '
  - type: note
    content: ver. 21
  - type: text
    content: 'the chief priests to bind all who '
  - type: note
    content: ch. 22:16; Rom. 10:13; 1 Cor. 1:2; [ch. 7:59; 2 Tim. 2:22]
  - type: text
    content: 'call on your name.” '
  '15':
  - type: text
    content: 'But the Lord said to him, '
  - type: text
    content: '“Go, for '
  - type: note
    content: '[ch. 13:2; Rom. 1:1; Gal. 1:15; Eph. 3:7]'
  - type: text
    content: 'he is a chosen instrument of mine to carry my name '
  - type: note
    content: Rom. 1:5 (Gk.); 11:13; 15:16; Gal. 1:16; 2:2, 7-9; Eph. 3:7, 8; 1 Tim. 2:7; 2 Tim. 4:17
  - type: text
    content: 'before the Gentiles and '
  - type: note
    content: ch. 25:22, 23; 26:1, 32; 2 Tim. 4:16
  - type: text
    content: kings and the children of Israel.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: ch. 20:23; 21:4, 11; 1 Thess. 3:3
  - type: text
    content: 'I will show him how much '
  - type: note
    content: ver. 6; [ch. 14:22; 2 Cor. 6:4, 5; 11:23-28]
  - type: text
    content: 'he must suffer '
  - type: note
    content: See ch. 5:41
  - type: text
    content: for the sake of my name.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So '
  - type: note
    content: ch. 22:12-14
  - type: text
    content: 'Ananias departed and entered the house. And '
  - type: note
    content: ver. 12
  - type: text
    content: 'laying his hands on him he said, “Brother Saul, the Lord Jesus who appeared to you on the road by which you came has sent me so that you may regain your sight and '
  - type: note
    content: See ch. 2:4
  - type: text
    content: 'be filled with the Holy Spirit.” '
  '18':
  - type: text
    content: 'And immediately something like scales fell from his eyes, and '
  - type: note
    content: ch. 22:13
  - type: text
    content: 'he regained his sight. Then '
  - type: note
    content: ch. 22:16
  - type: text
    content: 'he rose and was baptized; '
  '19':
  - type: text
    content: 'and '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: taking food, he was strengthened.
  - type: heading
    content: Saul Proclaims Jesus in Synagogues
  - type: text
    content: 'For '
  - type: note
    content: ch. 26:20
  - type: text
    content: 'some days he was with the disciples at Damascus. '
  '2':
  - type: text
    content: 'and asked him for letters '
  - type: note
    content: ch. 22:19; [Luke 12:11; 21:12]
  - type: text
    content: 'to the synagogues at Damascus, so that if he found any belonging to '
  - type: note
    content: ch. 19:9, 23; 24:14, 22; [ch. 16:17; 18:25, 26; 22:4; Isa. 30:21; 35:8; Amos 8:14]
  - type: text
    content: 'the Way, men or women, he might bring them bound to Jerusalem. '
  '20':
  - type: text
    content: 'And immediately he proclaimed Jesus in the synagogues, saying, '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: '“He is the Son of God.” '
  '21':
  - type: text
    content: 'And all who heard him were amazed and said, “Is not this the man who '
  - type: note
    content: ver. 13, 14
  - type: text
    content: 'made havoc '
  - type: note
    content: Gal. 1:13, 23
  - type: text
    content: 'in Jerusalem of those who called upon this name? And has he not come here for this purpose, to bring them bound before the chief priests?” '
  '22':
  - type: text
    content: 'But Saul '
  - type: note
    content: See 1 Tim. 1:12
  - type: text
    content: 'increased all the more in strength, and '
  - type: note
    content: ch. 18:28
  - type: text
    content: 'confounded the Jews who lived in Damascus by proving '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: that Jesus was the Christ.
  - type: heading
    content: Saul Escapes from Damascus
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ Gal. 1:17, 18 ]'
  - type: text
    content: When many days had passed, the Jews
  - type: note
    content: The Greek word Ioudaioi refers specifically here to Jewish religious leaders, and others under their influence, who opposed the Christian faith in that time
  - type: text
    content: ' plotted to kill him, '
  '24':
  - type: text
    content: 'but their '
  - type: note
    content: ch. 20:3, 19; 23:30; [ch. 23:12; 25:3]
  - type: text
    content: 'plot became known to Saul. '
  - type: note
    content: 2 Cor. 11:32
  - type: text
    content: 'They were watching the gates day and night in order to kill him, '
  '25':
  - type: text
    content: 'but his disciples took him by night and '
  - type: note
    content: 2 Cor. 11:33; [Josh. 2:15; 1 Sam. 19:12]
  - type: text
    content: let him down through an opening in the wall,
  - type: note
    content: Greek through the wall
  - type: text
    content: ' lowering him in a basket.'
  - type: heading
    content: Saul in Jerusalem
  '26':
  - type: text
    content: 'And '
  - type: note
    content: ch. 22:17-20; 26:20
  - type: text
    content: 'when he had come to Jerusalem, he attempted to join the disciples. And they were all afraid of him, for they did not believe that he was a disciple. '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: ch. 4:36
  - type: text
    content: 'Barnabas took him and '
  - type: note
    content: '[Gal. 1:18, 19]'
  - type: text
    content: 'brought him to the apostles and declared to them '
  - type: note
    content: ver. 3-6
  - type: text
    content: 'how on the road he had seen the Lord, who spoke to him, and '
  - type: note
    content: ver. 19, 20, 22
  - type: text
    content: 'how at Damascus he had '
  - type: note
    content: See ch. 4:29
  - type: text
    content: 'preached boldly in the name of Jesus. '
  '28':
  - type: text
    content: 'So he went '
  - type: note
    content: ch. 1:21
  - type: text
    content: 'in and out among them at Jerusalem, preaching boldly in the name of the Lord. '
  '29':
  - type: text
    content: 'And he spoke and disputed against '
  - type: note
    content: See ch. 6:1
  - type: text
    content: the Hellenists.
  - type: note
    content: That is, Greek-speaking Jews
  - type: text
    content: ' But '
  - type: note
    content: '[ch. 22:18]'
  - type: text
    content: 'they were seeking to kill him. '
  '3':
  - type: note
    content: For ver. 3-8, see ch. 22:6-11; 26:12-18; [1 Cor. 15:8]
  - type: text
    content: 'Now as he went on his way, he approached Damascus, and suddenly a light from heaven shone around him. '
  '30':
  - type: text
    content: 'And when '
  - type: note
    content: See John 21:23
  - type: text
    content: 'the brothers learned this, they brought him down to Caesarea and sent him off '
  - type: note
    content: '[ch. 11:25; Gal. 1:21]'
  - type: text
    content: to Tarsus.
  '31':
  - type: text
    content: 'So '
  - type: note
    content: '[ch. 8:1; 16:5]'
  - type: text
    content: 'the church throughout all Judea and Galilee and Samaria had peace and was being built up. And '
  - type: note
    content: '[Neh. 5:9]'
  - type: text
    content: 'walking in the fear of the Lord and in the comfort of the Holy Spirit, '
  - type: note
    content: ver. 35, 42
  - type: text
    content: it multiplied.
  - type: heading
    content: The Healing of Aeneas
  '32':
  - type: text
    content: 'Now '
  - type: note
    content: '[ch. 8:25]'
  - type: text
    content: 'as Peter went here and there among them all, he came down also to the saints who lived at Lydda. '
  '33':
  - type: text
    content: 'There he found a man named Aeneas, bedridden for eight years, who was paralyzed. '
  '34':
  - type: text
    content: 'And Peter said to him, “Aeneas, '
  - type: note
    content: '[ch. 3:6]'
  - type: text
    content: 'Jesus Christ heals you; rise and make your bed.” And immediately he rose. '
  '35':
  - type: note
    content: '[ver. 31, 42]'
  - type: text
    content: 'And all the residents of Lydda and '
  - type: note
    content: 1 Chr. 5:16; 27:29; Song 2:1
  - type: text
    content: 'Sharon saw him, and '
  - type: note
    content: ch. 11:21; 2 Cor. 3:16
  - type: text
    content: they turned to the Lord.
  - type: heading
    content: Dorcas Restored to Life
  '36':
  - type: text
    content: 'Now there was in '
  - type: note
    content: See Josh. 19:46
  - type: text
    content: Joppa a disciple named Tabitha, which, translated, means Dorcas.
  - type: note
    content: The Aramaic name Tabitha and the Greek name Dorcas both mean gazelle
  - type: text
    content: ' She was full of '
  - type: note
    content: 1 Tim. 2:10
  - type: text
    content: 'good works and acts of charity. '
  '37':
  - type: text
    content: 'In those days she became ill and died, and when they had washed her, they laid her in '
  - type: note
    content: ver. 39; ch. 1:13; 20:8
  - type: text
    content: 'an upper room. '
  '38':
  - type: text
    content: 'Since Lydda was near Joppa, the disciples, hearing that Peter was there, sent two men to him, urging him, '
  - type: note
    content: Num. 22:16 (Heb.; Gk.)
  - type: text
    content: '“Please come to us without delay.” '
  '39':
  - type: text
    content: 'So Peter rose and went with them. And when he arrived, they took him to '
  - type: note
    content: ver. 37
  - type: text
    content: the upper room. All the widows stood beside him weeping and showing tunics
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' and other garments that Dorcas made while she was with them. '
  '4':
  - type: text
    content: 'And falling to the ground, he heard a voice saying to him, '
  - type: text
    content: '“Saul, Saul, why are you persecuting '
  - type: note
    content: '[Isa. 63:9; Zech. 2:8]'
  - type: text
    content: me?”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'But Peter '
  - type: note
    content: Matt. 9:25
  - type: text
    content: 'put them all outside, and '
  - type: note
    content: See ch. 7:60
  - type: text
    content: 'knelt down and prayed; and turning to the body '
  - type: note
    content: '[Mark 5:41; John 11:43]'
  - type: text
    content: 'he said, “Tabitha, arise.” And she opened her eyes, and when she saw Peter she sat up. '
  '41':
  - type: text
    content: 'And he gave her his hand and raised her up. Then, calling the saints and widows, he presented her alive. '
  '42':
  - type: text
    content: 'And it became known throughout all Joppa, and '
  - type: note
    content: '[John 11:45; 12:11]'
  - type: text
    content: 'many believed in the Lord. '
  '43':
  - type: text
    content: 'And he stayed in Joppa for many days '
  - type: note
    content: ch. 10:6
  - type: text
    content: with one Simon, a tanner.
  '5':
  - type: text
    content: 'And he said, “Who are you, Lord?” And he said, '
  - type: text
    content: '“I am Jesus, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: whom you are persecuting.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: '[Ezek. 3:22; Gal. 1:1]'
  - type: text
    content: 'rise and enter the city, and you will be told '
  - type: note
    content: ver. 16; [1 Cor. 9:16]
  - type: text
    content: what you are to do.”
  - type: text
    content: ' '
  '7':
  - type: note
    content: '[Dan. 10:7]'
  - type: text
    content: 'The men who were traveling with him stood speechless, '
  - type: note
    content: '[ch. 22:9 with John 12:29]'
  - type: text
    content: 'hearing the voice but seeing no one. '
  '8':
  - type: text
    content: 'Saul rose from the ground, and although his eyes were opened, '
  - type: note
    content: '[ch. 22:11]'
  - type: text
    content: 'he saw nothing. So they led him by the hand and brought him into Damascus. '
  '9':
  - type: text
    content: And for three days he was without sight, and neither ate nor drank.
