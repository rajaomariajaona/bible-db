document_id: DEU.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Atonement for Unsolved Murders
  - type: text
    content: '“If in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess someone is found slain, lying in the open country, and it is not known who killed him, '
  '10':
  - type: text
    content: '“When you go out to war against your enemies, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives them into your hand and you take them captive, '
  '11':
  - type: text
    content: 'and you see among the captives a beautiful woman, and you desire to take her to be your wife, '
  '12':
  - type: text
    content: 'and you bring her home to your house, she shall shave her head and pare her nails. '
  '13':
  - type: text
    content: 'And she shall take off the clothes in which she was captured and shall remain in your house and '
  - type: note
    content: '[Ps. 45:10]'
  - type: text
    content: 'lament her father and her mother a full month. After that you may go in to her and be her husband, and she shall be your wife. '
  '14':
  - type: text
    content: 'But if you no longer delight in her, you shall '
  - type: note
    content: '[Jer. 34:16]'
  - type: text
    content: 'let her go where she wants. But you shall not sell her for money, nor shall you '
  - type: note
    content: ch. 24:7
  - type: text
    content: treat her as a slave, since you have humiliated her.
  - type: heading
    content: Inheritance Rights of the Firstborn
  '15':
  - type: text
    content: '“If a man has two wives, '
  - type: note
    content: '[Gen. 29:30, 33; 1 Sam. 1:4, 5]'
  - type: text
    content: the one loved and the other unloved, and both the loved and the unloved have borne him children, and if the firstborn son belongs to the unloved,
  - type: note
    content: Or hated; also verses 16, 17
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'then on the day when '
  - type: note
    content: 1 Chr. 5:1, 2; [1 Chr. 26:10; 2 Chr. 11:19, 20, 22]
  - type: text
    content: 'he assigns his possessions as an inheritance to his sons, he may not treat the son of the loved as the firstborn in preference to the son of the unloved, who is the firstborn, '
  '17':
  - type: text
    content: 'but he shall acknowledge the firstborn, the son of the unloved, by giving him a double portion of all that he has, for he is '
  - type: note
    content: Gen. 49:3
  - type: text
    content: 'the firstfruits of his strength. '
  - type: note
    content: Gen. 25:31, 33; 27:36
  - type: text
    content: The right of the firstborn is his.
  - type: heading
    content: A Rebellious Son
  '18':
  - type: text
    content: '“If a man has a stubborn and rebellious son who will not obey the voice of his father or the voice of his mother, and, though they discipline him, will not listen to them, '
  '19':
  - type: text
    content: 'then his father and his mother shall take hold of him and bring him out to the elders of his city at the gate of the place where he lives, '
  '2':
  - type: text
    content: 'then your elders and your judges shall come out, and they shall measure the distance to the surrounding cities. '
  '20':
  - type: text
    content: 'and they shall say to the elders of his city, ‘This our son is stubborn and rebellious; he will not obey our voice; he is a glutton and a drunkard.’ '
  '21':
  - type: note
    content: ch. 13:10; See Josh. 7:25
  - type: text
    content: 'Then all the men of the city shall stone him to death with stones. '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'So you shall purge the evil from your midst, '
  - type: note
    content: ch. 13:11; 17:13; 19:20
  - type: text
    content: and all Israel shall hear, and fear.
  - type: heading
    content: A Man Hanged on a Tree Is Cursed
  '22':
  - type: text
    content: '“And if a man has committed a crime punishable by death and he is put to death, and you hang him on a tree, '
  '23':
  - type: note
    content: '[Josh. 8:29; 10:26, 27; John 19:31]'
  - type: text
    content: 'his body shall not remain all night on the tree, but you shall bury him the same day, for '
  - type: note
    content: Cited Gal. 3:13
  - type: text
    content: 'a hanged man is cursed by God. '
  - type: note
    content: Num. 35:34
  - type: text
    content: 'You shall not defile your land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance.'
  '3':
  - type: text
    content: 'And the elders of the city that is nearest to the slain man shall take a heifer '
  - type: note
    content: '[Num. 19:2]'
  - type: text
    content: 'that has never been worked and that has not pulled in a yoke. '
  '4':
  - type: text
    content: 'And the elders of that city shall bring the heifer down to a valley with running water, which is neither plowed nor sown, and shall break the heifer’s neck there in the valley. '
  '5':
  - type: text
    content: 'Then the priests, the sons of Levi, shall come forward, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen '
  - type: note
    content: See ch. 10:8
  - type: text
    content: 'them to minister to him and to bless in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ch. 17:8, 9; 19:17
  - type: text
    content: 'by their word every dispute and every assault shall be settled. '
  '6':
  - type: text
    content: 'And all the elders of that city nearest to the slain man '
  - type: note
    content: '[Ps. 26:6; 73:13; Matt. 27:24]'
  - type: text
    content: 'shall wash their hands over the heifer whose neck was broken in the valley, '
  '7':
  - type: text
    content: 'and they shall testify, ‘Our hands did not shed this blood, nor did our eyes see it shed. '
  '8':
  - type: text
    content: 'Accept atonement, O '
  - type: text
    content: Lord
  - type: text
    content: ', for your people Israel, whom you have redeemed, and '
  - type: note
    content: '[Jonah 1:14]'
  - type: text
    content: 'do not set the guilt of innocent blood in the midst of your people Israel, so that their blood guilt be atoned for.’ '
  '9':
  - type: text
    content: 'So '
  - type: note
    content: ch. 19:13
  - type: text
    content: 'you shall purge the guilt of innocent blood from your midst, when you do what is right in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Marrying Female Captives
