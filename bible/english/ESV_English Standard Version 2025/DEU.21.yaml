    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'let her go where she wants. But you shall not sell her for money, nor shall you '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
