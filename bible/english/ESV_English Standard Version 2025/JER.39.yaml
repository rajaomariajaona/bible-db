document_id: JER.39,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-10, see ch. 52:4-16; 2 Kgs. 25:1-12
  - type: text
    content: 'In the ninth year of Zedekiah king of Judah, in the tenth month, Nebuchadnezzar king of Babylon and all his army came against Jerusalem and besieged it. '
  '10':
  - type: text
    content: 'Nebuzaradan, the captain of the guard, '
  - type: note
    content: ch. 40:7; 2 Kgs. 25:12
  - type: text
    content: left in the land of Judah some of the poor people who owned nothing, and gave them vineyards and fields at the same time.
  - type: heading
    content: The Lord Delivers Jeremiah
  '11':
  - type: text
    content: 'Nebuchadnezzar king of Babylon gave command concerning Jeremiah through Nebuzaradan, the captain of the guard, saying, '
  '12':
  - type: note
    content: ch. 40:4
  - type: text
    content: '“Take him, look after him well, and do him no harm, but deal with him as he tells you.” '
  '13':
  - type: text
    content: 'So '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'Nebuzaradan the captain of the guard, Nebushazban the Rab-saris, Nergal-sar-ezer the Rab-mag, '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'and all the chief officers of the king of Babylon '
  '14':
  - type: text
    content: 'sent and took Jeremiah from '
  - type: note
    content: ch. 38:28; See ch. 32:2
  - type: text
    content: 'the court of the guard. They entrusted him to '
  - type: note
    content: ch. 43:6; See ch. 40:5-9, 11-16; 41:1-4, 6; 2 Kgs. 25:22-25
  - type: text
    content: 'Gedaliah the son of '
  - type: note
    content: 2 Kgs. 22:12
  - type: text
    content: 'Ahikam, son of '
  - type: note
    content: 2 Kgs. 22:3
  - type: text
    content: 'Shaphan, that he should take him home. So '
  - type: note
    content: ch. 37:12
  - type: text
    content: he lived among the people.
  '15':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah '
  - type: note
    content: ch. 36:5; 38:13
  - type: text
    content: 'while he was shut up in the court of the guard: '
  '16':
  - type: text
    content: '“Go, and say to '
  - type: note
    content: See ch. 38:7
  - type: text
    content: 'Ebed-melech the Ethiopian, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: Dan. 9:12
  - type: text
    content: 'Behold, I will fulfill my words against this city for harm and '
  - type: note
    content: ch. 21:10; [ch. 14:11]
  - type: text
    content: 'not for good, and they shall be accomplished before you on that day. '
  '17':
  - type: text
    content: 'But I will deliver you on that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and you shall not be given into the hand of the men '
  - type: note
    content: ch. 22:25
  - type: text
    content: 'of whom you are afraid. '
  '18':
  - type: text
    content: 'For I will surely save you, and you shall not fall by the sword, but you shall have your '
  - type: note
    content: ch. 21:9; 45:5
  - type: text
    content: 'life as a prize of war, '
  - type: note
    content: Ps. 25:2; 37:40
  - type: text
    content: 'because you have put your trust in me, declares the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  '2':
  - type: text
    content: 'In the eleventh year of Zedekiah, in the fourth month, on the ninth day of the month, a breach was made in the city. '
  '3':
  - type: text
    content: 'Then all '
  - type: note
    content: ch. 38:17, 18, 22
  - type: text
    content: 'the officials of the king of Babylon came '
  - type: note
    content: '[ch. 1:15]'
  - type: text
    content: 'and sat in the middle gate: Nergal-sar-ezer of Samgar, Nebu-sar-sekim '
  - type: note
    content: ver. 13; 2 Kgs. 18:17
  - type: text
    content: 'the Rab-saris, Nergal-sar-ezer the Rab-mag, with all the rest of the officers of the king of Babylon. '
  '4':
  - type: text
    content: 'When Zedekiah king of Judah and all the soldiers saw them, they fled, going out of the city at night by way of the king’s garden through the gate between the two walls; and they went toward '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'the Arabah. '
  '5':
  - type: text
    content: 'But the army of the Chaldeans pursued them and overtook Zedekiah in '
  - type: note
    content: Josh. 5:10
  - type: text
    content: 'the plains of Jericho. And when they had taken him, they brought him up to Nebuchadnezzar king of Babylon, at '
  - type: note
    content: See 2 Kgs. 23:33
  - type: text
    content: 'Riblah, in the land of Hamath; '
  - type: note
    content: '[Ezek. 17:15]'
  - type: text
    content: 'and he passed sentence on him. '
  '6':
  - type: text
    content: 'The king of Babylon '
  - type: note
    content: ch. 52:10
  - type: text
    content: 'slaughtered the sons of Zedekiah at '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Riblah before his eyes, and the king of Babylon '
  - type: note
    content: ch. 52:10
  - type: text
    content: 'slaughtered all the nobles of Judah. '
  '7':
  - type: note
    content: '[ch. 32:4; Ezek. 12:13]'
  - type: text
    content: 'He put out the eyes of Zedekiah and bound him in chains to take him to Babylon. '
  '8':
  - type: note
    content: See ch. 21:10
  - type: text
    content: 'The Chaldeans burned the king’s house and the house of the people, '
  - type: note
    content: Neh. 1:3; [Ps. 80:12; Isa. 5:5]
  - type: text
    content: 'and broke down the walls of Jerusalem. '
  '9':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 40:1; 52:12; 2 Kgs. 25:8
  - type: text
    content: 'Nebuzaradan, the '
  - type: note
    content: Gen. 37:36
  - type: text
    content: 'captain of the guard, carried into exile to Babylon the rest of the people who were left in the city, '
  - type: note
    content: See ch. 37:13
  - type: text
    content: 'those who had deserted to him, and the people who remained. '
