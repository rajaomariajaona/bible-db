document_id: JOS.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Crosses the Jordan
  - type: text
    content: 'Then Joshua rose early in the morning and they set out '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'from Shittim. And they came to the Jordan, he and all the people of Israel, and lodged there before they passed over. '
  '10':
  - type: text
    content: 'And Joshua said, “Here is how you shall know that '
  - type: note
    content: Deut. 5:26; 1 Sam. 17:26
  - type: text
    content: 'the living God is among you and that he will without fail '
  - type: note
    content: Ex. 33:2; Deut. 7:1; Ps. 44:2; [Ex. 13:5]
  - type: text
    content: 'drive out from before you the Canaanites, the Hittites, the Hivites, the Perizzites, the Girgashites, the Amorites, and the Jebusites. '
  '11':
  - type: text
    content: 'Behold, the ark of the covenant of '
  - type: note
    content: Mic. 4:13; Zech. 4:14; 6:5
  - type: text
    content: the Lord of all the earth
  - type: note
    content: Hebrew the ark of the covenant, the Lord of all the earth
  - type: text
    content: ' '
  - type: note
    content: '[Deut. 9:3]'
  - type: text
    content: 'is passing over before you into the Jordan. '
  '12':
  - type: text
    content: 'Now therefore '
  - type: note
    content: ch. 4:2, 4
  - type: text
    content: 'take twelve men from the tribes of Israel, '
  - type: note
    content: '[Num. 13:2]'
  - type: text
    content: 'from each tribe a man. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: ver. 15, 16
  - type: text
    content: 'when the soles of the feet of the priests bearing the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'the Lord of all the earth, shall rest in the waters of the Jordan, the waters of the Jordan shall be cut off from flowing, and the waters coming down from above shall '
  - type: note
    content: Ps. 114:3; [Ex. 15:8; Ps. 78:13]
  - type: text
    content: stand in one heap.”
  '14':
  - type: text
    content: 'So when the people set out from their tents to pass over the Jordan with the priests bearing '
  - type: note
    content: Acts 7:44, 45
  - type: text
    content: 'the ark of the covenant before the people, '
  '15':
  - type: text
    content: 'and as soon as those bearing the ark had come as far as the Jordan, and '
  - type: note
    content: ver. 13
  - type: text
    content: 'the feet of the priests bearing the ark were dipped in the brink of the water (now '
  - type: note
    content: 1 Chr. 12:15; Jer. 12:5; 49:19; 50:44
  - type: text
    content: 'the Jordan overflows all its banks '
  - type: note
    content: '[ch. 4:18; 5:10, 12]'
  - type: text
    content: 'throughout the time of harvest), '
  '16':
  - type: text
    content: 'the waters coming down from above stood and rose up in a heap very far away, at Adam, the city that is beside '
  - type: note
    content: 1 Kgs. 4:12; 7:46
  - type: text
    content: 'Zarethan, and those flowing down toward the Sea of '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'the Arabah, '
  - type: note
    content: Gen. 14:3; Num. 34:3
  - type: text
    content: 'the Salt Sea, were completely cut off. And the people passed over opposite Jericho. '
  '17':
  - type: text
    content: 'Now the priests bearing the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood firmly on dry ground in the midst of the Jordan, '
  - type: note
    content: ch. 4:22; [Ex. 14:29]
  - type: text
    content: and all Israel was passing over on dry ground until all the nation finished passing over the Jordan.
  '2':
  - type: note
    content: ch. 1:10, 11
  - type: text
    content: 'At the end of three days the officers went through the camp '
  '3':
  - type: text
    content: 'and commanded the people, “As soon as you see the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God being carried by '
  - type: note
    content: ver. 8; Deut. 31:9, 25
  - type: text
    content: 'the Levitical priests, then you shall set out from your place and follow it. '
  '4':
  - type: note
    content: '[Ex. 19:12]'
  - type: text
    content: Yet there shall be a distance between you and it, about 2,000 cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' in length. Do not come near it, in order that you may know the way you shall go, for you have not passed this way before.” '
  '5':
  - type: text
    content: 'Then Joshua said to the people, '
  - type: note
    content: ch. 7:13; Ex. 19:10, 14, 15; Lev. 20:7; Num. 11:18; 1 Sam. 16:5; Joel 2:16
  - type: text
    content: '“Consecrate yourselves, for tomorrow the '
  - type: text
    content: Lord
  - type: text
    content: ' will do wonders among you.” '
  '6':
  - type: text
    content: 'And Joshua said to the priests, '
  - type: note
    content: Num. 4:15
  - type: text
    content: “Take up the ark of the covenant and pass on before the people.” So they took up the ark of the covenant and went before the people.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Today I will begin to '
  - type: note
    content: ch. 4:14; 1 Chr. 29:25; 2 Chr. 1:1
  - type: text
    content: 'exalt you in the sight of all Israel, that they may know that, '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'as I was with Moses, so I will be with you. '
  '8':
  - type: text
    content: 'And as for you, command '
  - type: note
    content: ver. 3
  - type: text
    content: 'the priests who bear the ark of the covenant, ‘When you come to the brink of the waters of the Jordan, '
  - type: note
    content: ver. 17
  - type: text
    content: 'you shall stand still in the Jordan.’” '
  '9':
  - type: text
    content: 'And Joshua said to the people of Israel, “Come here and listen to the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” '
