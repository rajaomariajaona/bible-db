document_id: PRO.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Beginning of Knowledge
  - type: text
    content: ' '
  - type: note
    content: ch. 10:1; 25:1; 1 Kgs. 4:32; Eccles. 12:9
  - type: text
    content: 'The proverbs of Solomon, son of David, king of Israel:'
  '10':
  - type: text
    content: 'My son, if sinners '
  - type: note
    content: ch. 16:29
  - type: text
    content: entice you,
  - type: text
    content: do not consent.
  '11':
  - type: text
    content: 'If they say, “Come with us, '
  - type: note
    content: ver. 18; ch. 12:6; Jer. 5:26
  - type: text
    content: let us lie in wait for blood;
  - type: note
    content: ver. 18 ; Ps. 10:8; 64:5
  - type: text
    content: let us ambush the innocent without reason;
  '12':
  - type: text
    content: 'like Sheol let us '
  - type: note
    content: Ps. 124:3; [Num. 16:32, 33]
  - type: text
    content: swallow them alive,
  - type: text
    content: 'and whole, like '
  - type: note
    content: Ps. 28:1
  - type: text
    content: those who go down to the pit;
  '13':
  - type: text
    content: we shall find all precious goods,
  - type: text
    content: we shall fill our houses with plunder;
  '14':
  - type: text
    content: throw in your lot among us;
  - type: text
    content: we will all have one purse”—
  '15':
  - type: text
    content: 'my son, '
  - type: note
    content: ch. 4:14; 24:1; Ps. 1:1
  - type: text
    content: do not walk in the way with them;
  - type: note
    content: '[ Ps. 119:101 ]'
  - type: text
    content: hold back your foot from their paths,
  '16':
  - type: text
    content: 'for '
  - type: note
    content: ch. 6:18; Isa. 59:7; [Rom. 3:15]
  - type: text
    content: their feet run to evil,
  - type: text
    content: and they make haste to shed blood.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 40:24 ]'
  - type: text
    content: For in vain is a net spread
  - type: text
    content: in the sight of any bird,
  '18':
  - type: text
    content: 'but these men '
  - type: note
    content: ver. 11
  - type: text
    content: lie in wait for their own blood;
  - type: text
    content: 'they '
  - type: note
    content: ver. 11
  - type: text
    content: set an ambush for their own lives.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 8:13 ]'
  - type: text
    content: 'Such are the ways of everyone who is '
  - type: note
    content: ch. 15:27
  - type: text
    content: greedy for unjust gain;
  - type: note
    content: '[ 1 Tim. 6:10 ]'
  - type: text
    content: it takes away the life of its possessors.
  - type: heading
    content: The Call of Wisdom
  '2':
  - type: text
    content: To know wisdom and instruction,
  - type: text
    content: to understand words of insight,
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:1; 9:3; [ John 7:37 ]
  - type: text
    content: Wisdom cries aloud in the street,
  - type: text
    content: in the markets she raises her voice;
  '21':
  - type: text
    content: at the head of the noisy streets she cries out;
  - type: text
    content: 'at '
  - type: note
    content: ch. 8:3
  - type: text
    content: 'the entrance of the city gates she speaks:'
  '22':
  - type: text
    content: '“How long, O '
  - type: note
    content: See ver. 4
  - type: text
    content: simple ones, will you love being simple?
  - type: text
    content: 'How long will '
  - type: note
    content: See Ps. 1:1
  - type: text
    content: scoffers delight in their scoffing
  - type: text
    content: 'and fools '
  - type: note
    content: ver. 29; ch. 5:12; [Job 21:14]
  - type: text
    content: hate knowledge?
  '23':
  - type: text
    content: If you turn at my reproof,
  - type: note
    content: Or Will you turn away at my reproof?
  - type: text
    content: 'behold, I will '
  - type: note
    content: Joel 2:28; Acts 2:17
  - type: text
    content: pour out my spirit to you;
  - type: text
    content: I will make my words known to you.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Isa. 65:12; 66:4; Jer. 7:13
  - type: text
    content: 'Because I have called and '
  - type: note
    content: Zech. 7:11
  - type: text
    content: you refused to listen,
  - type: text
    content: 'have '
  - type: note
    content: Rom. 10:21
  - type: text
    content: stretched out my hand and no one has heeded,
  '25':
  - type: text
    content: 'because you have '
  - type: note
    content: See Ps. 107:11
  - type: text
    content: ignored all my counsel
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 81:11; Luke 7:30]'
  - type: text
    content: would have none of my reproof,
  '26':
  - type: text
    content: 'I also '
  - type: note
    content: See Ps. 2:4
  - type: text
    content: will laugh at your calamity;
  - type: text
    content: 'I will mock when '
  - type: note
    content: ch. 10:24; Jer. 48:43; 49:5
  - type: text
    content: terror strikes you,
  '27':
  - type: text
    content: 'when terror strikes you like '
  - type: note
    content: '[Zeph. 1:15]'
  - type: text
    content: a storm
  - type: text
    content: and your calamity comes like a whirlwind,
  - type: text
    content: when distress and anguish come upon you.
  '28':
  - type: text
    content: ' '
  - type: note
    content: See 1 Sam. 8:18; Job 27:9
  - type: text
    content: Then they will call upon me, but I will not answer;
  - type: text
    content: they will seek me diligently but will not find me.
  '29':
  - type: text
    content: 'Because they '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: hated knowledge
  - type: text
    content: 'and '
  - type: note
    content: '[Job 21:14]'
  - type: text
    content: 'did not choose the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '3':
  - type: text
    content: to receive instruction in wise dealing,
  - type: text
    content: 'in '
  - type: note
    content: ch. 2:9
  - type: text
    content: righteousness, justice, and equity;
  '30':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: would have none of my counsel
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: despised all my reproof,
  '31':
  - type: text
    content: 'therefore they shall eat '
  - type: note
    content: Jer. 6:19
  - type: text
    content: the fruit of their way,
  - type: text
    content: 'and have '
  - type: note
    content: ch. 14:14; Isa. 3:11; [Job 4:8]
  - type: text
    content: their fill of their own devices.
  '32':
  - type: text
    content: 'For the simple are killed by '
  - type: note
    content: Jer. 2:19
  - type: text
    content: their turning away,
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 73:18, 19]'
  - type: text
    content: the complacency of fools destroys them;
  '33':
  - type: text
    content: 'but '
  - type: note
    content: '[Ps. 25:12, 13]'
  - type: text
    content: whoever listens to me will dwell secure
  - type: text
    content: 'and will be '
  - type: note
    content: Ps. 112:7, 8
  - type: text
    content: at ease, without dread of disaster.”
  '4':
  - type: text
    content: 'to give prudence to '
  - type: note
    content: ch. 8:5; 14:15, 18
  - type: text
    content: the simple,
  - type: text
    content: 'knowledge and '
  - type: note
    content: ch. 2:11; 3:21
  - type: text
    content: discretion to the youth—
  '5':
  - type: text
    content: 'Let the wise hear and '
  - type: note
    content: ch. 9:9
  - type: text
    content: increase in learning,
  - type: text
    content: and the one who understands obtain guidance,
  '6':
  - type: text
    content: to understand a proverb and a saying,
  - type: note
    content: ch. 22:17
  - type: text
    content: 'the words of the wise and their '
  - type: note
    content: Judg. 14:12; Ps. 78:2
  - type: text
    content: riddles.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:10; [ch. 15:33 ]; See Job 28:28
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the beginning of knowledge;'
  - type: text
    content: fools despise wisdom and instruction.
  - type: heading
    content: The Enticement of Sinners
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:20; [ Ps. 34:11; Eph. 6:1, 2 ]
  - type: text
    content: Hear, my son, your father’s instruction,
  - type: text
    content: and forsake not your mother’s teaching,
  '9':
  - type: text
    content: 'for they are '
  - type: note
    content: ch. 4:9; [ch. 3:22]
  - type: text
    content: a graceful garland for your head
  - type: text
    content: 'and '
  - type: note
    content: '[Gen. 41:42; Dan. 5:29]'
  - type: text
    content: pendants for your neck.
