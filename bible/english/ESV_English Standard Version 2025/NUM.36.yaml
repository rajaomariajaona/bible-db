    - type: text
      text: Lord
  - type: text
    text: ' commanded through Moses to the people of Israel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
