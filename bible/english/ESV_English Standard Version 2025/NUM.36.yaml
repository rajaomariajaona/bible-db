      marker: ref
      children:
      - type: text
        text: 1 Chr. 23:22
      metadata:
        usfm: 1CH.23.22
    marker-yv: yv-n
  - type: text
    text: 'every daughter who possesses an inheritance in any tribe of the people of Israel shall be wife to one of the clan of the tribe of her father, so that every one of the people of Israel may possess the inheritance of his fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So no inheritance shall be transferred from one tribe to another, for each of the tribes of the people of Israel shall hold on to its own inheritance.’”
