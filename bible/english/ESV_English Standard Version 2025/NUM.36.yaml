document_id: NUM.36,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Marriage of Female Heirs
  - type: text
    content: 'The heads of the fathers’ houses of the clan of the '
  - type: note
    content: ch. 26:29
  - type: text
    content: 'people of Gilead the son of Machir, son of Manasseh, from the clans of the people of Joseph, came near and spoke before Moses and before the chiefs, the heads of the fathers’ houses of the people of Israel. '
  '10':
  - type: text
    content: 'The daughters of Zelophehad did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, '
  '11':
  - type: note
    content: ch. 27:1; Josh. 17:3
  - type: text
    content: 'for Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to sons of their father’s brothers. '
  '12':
  - type: text
    content: They were married into the clans of the people of Manasseh the son of Joseph, and their inheritance remained in the tribe of their father’s clan.
  '13':
  - type: text
    content: 'These are the commandments and the rules that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded through Moses to the people of Israel '
  - type: note
    content: See ch. 22:1
  - type: text
    content: in the plains of Moab by the Jordan at Jericho.
  '2':
  - type: text
    content: 'They said, '
  - type: note
    content: ch. 26:55; 33:54
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded my lord to give the land for inheritance by lot to the people of Israel, and '
  - type: note
    content: ch. 27:1, 7; Josh. 17:3, 4
  - type: text
    content: 'my lord was commanded by the '
  - type: text
    content: Lord
  - type: text
    content: ' to give the inheritance of Zelophehad our brother to his daughters. '
  '3':
  - type: text
    content: 'But if they are married to any of the sons of the other tribes of the people of Israel, then their inheritance will be taken from the inheritance of our fathers and added to the inheritance of the tribe into which they marry. So it will be taken away from the lot of our inheritance. '
  '4':
  - type: text
    content: 'And when '
  - type: note
    content: Lev. 25:10
  - type: text
    content: the jubilee of the people of Israel comes, then their inheritance will be added to the inheritance of the tribe into which they marry, and their inheritance will be taken from the inheritance of the tribe of our fathers.”
  '5':
  - type: text
    content: 'And Moses commanded the people of Israel according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “The tribe of the people of Joseph '
  - type: note
    content: '[ch. 27:7]'
  - type: text
    content: 'is right. '
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' commands concerning the daughters of Zelophehad: ‘Let them marry whom they think best, '
  - type: note
    content: ver. 12
  - type: text
    content: 'only they shall marry within the clan of the tribe of their father. '
  '7':
  - type: text
    content: 'The inheritance of the people of Israel shall not be transferred from one tribe to another, for every one of the people of Israel '
  - type: note
    content: '[1 Kgs. 21:3]'
  - type: text
    content: 'shall hold on to the inheritance of the tribe of his fathers. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: 1 Chr. 23:22
  - type: text
    content: 'every daughter who possesses an inheritance in any tribe of the people of Israel shall be wife to one of the clan of the tribe of her father, so that every one of the people of Israel may possess the inheritance of his fathers. '
  '9':
  - type: text
    content: So no inheritance shall be transferred from one tribe to another, for each of the tribes of the people of Israel shall hold on to its own inheritance.’”
