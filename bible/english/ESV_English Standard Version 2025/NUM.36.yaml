      metadata:
        usfm: LEV.25.10
    marker-yv: yv-n
  - type: text
    text: the jubilee of the people of Israel comes, then their inheritance will be added to the inheritance of the tribe into which they marry, and their inheritance will be taken from the inheritance of the tribe of our fathers.”
- type: usfm
