    children:
    - type: text
      text: The Philistines Reject David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:1
      marker-yv: yv-n
    - type: text
      text: 'Now the Philistines had gathered all their forces at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 12:18
      marker-yv: yv-n
    - type: text
      text: 'Aphek. And the Israelites were encamped by '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 7:1
      marker-yv: yv-n
    - type: text
      text: 'the spring that is in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 17:16
      marker-yv: yv-n
    - type: text
      text: 'Jezreel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now then rise early in the morning '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 12:19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'with the servants of your lord who came with you, and start early in the morning, and depart as soon as you have light.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David set out with his men early in the morning to return to the land of the Philistines. But the Philistines went up to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 17:16
      marker-yv: yv-n
    - type: text
      text: Jezreel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'the lords of the Philistines were passing on by hundreds and by thousands, and David and his men were passing on in the rear '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'with Achish, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the commanders of the Philistines said, “What are these Hebrews doing here?” And Achish said to the commanders of the Philistines, “Is this not David, the servant of Saul, king of Israel, who has been with me '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'now for days and years, and since he deserted to me '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 6:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'I have found no fault in him to this day.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'the commanders of the Philistines were angry with him. And the commanders of the Philistines said to him, “Send the man back, that he may return '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:1
      marker-yv: yv-n
    - type: text
      text: 'to the place to which you have assigned him. He shall not go down with us to battle, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:21
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'lest in the battle he become an adversary to us. For how could this fellow reconcile himself to his lord? Would it not be with the heads of the men here? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Is not this David, of whom they sing to one another in dances,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:11
      marker-yv: yv-n
    - type: text
      text: ‘Saul has struck down his thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and David his ten thousands’?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Achish called David and said to him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:3
      marker-yv: yv-n
    - type: text
      text: '“As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, you have been honest, and to me it seems right that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 3:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 19:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 121:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 37:28
      marker-yv: yv-n
    - type: text
      text: 'you should march out and in with me in the campaign. For I have found nothing wrong in you from the day of your coming to me to this day. Nevertheless, the lords do not approve of you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So go back now; and go peaceably, that you may not displease the lords of the Philistines.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Achish, “But what have I done? What have you found in your servant from the day I entered your service until now, that I may not go and fight against the enemies of my lord the king?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Achish answered David and said, “I know that you are as blameless in my sight '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 14:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:27
      marker-yv: yv-n
    - type: text
      text: 'as an angel of God. Nevertheless, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'the commanders of the Philistines have said, ‘He shall not go up with us to the battle.’ '
