document_id: 1SA.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Philistines Reject David
  - type: text
    content: ' '
  - type: note
    content: ch. 28:1
  - type: text
    content: 'Now the Philistines had gathered all their forces at '
  - type: note
    content: ch. 4:1; Josh. 12:18
  - type: text
    content: 'Aphek. And the Israelites were encamped by '
  - type: note
    content: Judg. 7:1
  - type: text
    content: 'the spring that is in '
  - type: note
    content: Josh. 17:16
  - type: text
    content: 'Jezreel. '
  '10':
  - type: text
    content: 'Now then rise early in the morning '
  - type: note
    content: '[1 Chr. 12:19, 22]'
  - type: text
    content: 'with the servants of your lord who came with you, and start early in the morning, and depart as soon as you have light.” '
  '11':
  - type: text
    content: 'So David set out with his men early in the morning to return to the land of the Philistines. But the Philistines went up to '
  - type: note
    content: Josh. 17:16
  - type: text
    content: Jezreel.
  '2':
  - type: text
    content: 'As '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'the lords of the Philistines were passing on by hundreds and by thousands, and David and his men were passing on in the rear '
  - type: note
    content: ch. 28:1, 2
  - type: text
    content: 'with Achish, '
  '3':
  - type: text
    content: 'the commanders of the Philistines said, “What are these Hebrews doing here?” And Achish said to the commanders of the Philistines, “Is this not David, the servant of Saul, king of Israel, who has been with me '
  - type: note
    content: '[ch. 27:7]'
  - type: text
    content: 'now for days and years, and since he deserted to me '
  - type: note
    content: '[Dan. 6:5]'
  - type: text
    content: 'I have found no fault in him to this day.” '
  '4':
  - type: text
    content: 'But '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the commanders of the Philistines were angry with him. And the commanders of the Philistines said to him, “Send the man back, that he may return '
  - type: note
    content: ch. 27:6; 30:1
  - type: text
    content: 'to the place to which you have assigned him. He shall not go down with us to battle, '
  - type: note
    content: '[ch. 14:21]'
  - type: text
    content: 'lest in the battle he become an adversary to us. For how could this fellow reconcile himself to his lord? Would it not be with the heads of the men here? '
  '5':
  - type: text
    content: Is not this David, of whom they sing to one another in dances,
  - type: note
    content: ch. 18:7; 21:11
  - type: text
    content: ‘Saul has struck down his thousands,
  - type: text
    content: and David his ten thousands’?”
  '6':
  - type: text
    content: 'Then Achish called David and said to him, '
  - type: note
    content: See ch. 20:3
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, you have been honest, and to me it seems right that '
  - type: note
    content: 2 Sam. 3:25; 2 Kgs. 19:27; Ps. 121:8; Isa. 37:28
  - type: text
    content: 'you should march out and in with me in the campaign. For I have found nothing wrong in you from the day of your coming to me to this day. Nevertheless, the lords do not approve of you. '
  '7':
  - type: text
    content: 'So go back now; and go peaceably, that you may not displease the lords of the Philistines.” '
  '8':
  - type: text
    content: 'And David said to Achish, “But what have I done? What have you found in your servant from the day I entered your service until now, that I may not go and fight against the enemies of my lord the king?” '
  '9':
  - type: text
    content: 'And Achish answered David and said, “I know that you are as blameless in my sight '
  - type: note
    content: 2 Sam. 14:17, 20; 19:27
  - type: text
    content: 'as an angel of God. Nevertheless, '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'the commanders of the Philistines have said, ‘He shall not go up with us to the battle.’ '
