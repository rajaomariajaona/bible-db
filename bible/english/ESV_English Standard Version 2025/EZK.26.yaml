document_id: EZK.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy Against Tyre
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the eleventh year, on the first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'His horses will be so many that their dust will cover you. Your walls will shake at the noise of the horsemen and wagons and chariots, when he enters your gates as men enter a city that has been breached. '
  '11':
  - type: text
    content: 'With the hoofs of his horses he will trample all your streets. He will kill your people with the sword, and your mighty pillars will fall to the ground. '
  '12':
  - type: text
    content: 'They will plunder '
  - type: note
    content: See ch. 27:12-24
  - type: text
    content: 'your riches and loot '
  - type: note
    content: See ch. 27:12-24
  - type: text
    content: 'your merchandise. They will break down your walls and destroy your pleasant houses. Your stones and timber and '
  - type: note
    content: ver. 4
  - type: text
    content: 'soil they will cast into the midst of the waters. '
  '13':
  - type: note
    content: '[Isa. 24:8; Jer. 7:34; 16:9]'
  - type: text
    content: 'And I will stop the music of your songs, and '
  - type: note
    content: '[Isa. 5:12; 23:16]'
  - type: text
    content: 'the sound of your lyres shall be heard no more. '
  '14':
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'I will make you a bare rock. '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'You shall be a place for the spreading of nets. You shall never be rebuilt, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'for I am the '
  - type: text
    content: Lord
  - type: text
    content: '; I have spoken, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' to Tyre: Will not '
  - type: note
    content: ch. 27:35
  - type: text
    content: 'the coastlands shake at the sound of your fall, '
  - type: note
    content: Jer. 51:52
  - type: text
    content: 'when the wounded groan, when slaughter is made in your midst? '
  '16':
  - type: text
    content: 'Then all '
  - type: note
    content: '[Isa. 23:8]'
  - type: text
    content: 'the princes of the sea will step down from their thrones and '
  - type: note
    content: '[Jonah 3:6]'
  - type: text
    content: 'remove their robes and strip off their embroidered garments. They will clothe themselves with trembling; '
  - type: note
    content: Isa. 3:26
  - type: text
    content: 'they will sit on the ground and '
  - type: note
    content: ch. 32:10
  - type: text
    content: 'tremble every moment and '
  - type: note
    content: ch. 27:35
  - type: text
    content: 'be appalled at you. '
  '17':
  - type: text
    content: 'And they will '
  - type: note
    content: ch. 19:1; 27:2, 32; [Rev. 18:9]
  - type: text
    content: raise a lamentation over you and say to you,
  - type: text
    content: “‘How you have perished,
  - type: text
    content: you who were inhabited from the seas,
  - type: text
    content: O city renowned,
  - type: note
    content: '[ Isa. 23:4 ]'
  - type: text
    content: who was mighty on the sea;
  - type: text
    content: 'she and her inhabitants '
  - type: note
    content: See ch. 32:23
  - type: text
    content: imposed their terror
  - type: text
    content: on all her inhabitants!
  '18':
  - type: text
    content: Now the coastlands tremble
  - type: text
    content: on the day of your fall,
  - type: text
    content: and the coastlands that are on the sea
  - type: text
    content: are dismayed at your passing.’
  '19':
  - type: text
    content: '“For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': When I make you a city laid waste, like the cities that are not inhabited, '
  - type: note
    content: '[ver. 3; ch. 27:34]'
  - type: text
    content: 'when I bring up the deep over you, and the great waters cover you, '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, because '
  - type: note
    content: See Isa. 23:1-18
  - type: text
    content: 'Tyre said concerning Jerusalem, '
  - type: note
    content: ch. 25:3; 36:2
  - type: text
    content: '‘Aha, the gate of the peoples is broken; it has swung open to me. I shall be replenished, now that she is laid waste,’ '
  '20':
  - type: text
    content: 'then '
  - type: note
    content: '[ch. 31:14, 16; 32:18, 24]'
  - type: text
    content: 'I will make you go down with those who go down to the pit, to the people of old, and I will make you to dwell in the world below, among ruins from of old, '
  - type: note
    content: '[ch. 31:14, 16; 32:18, 24]'
  - type: text
    content: 'with those who go down to the pit, so that you will not be inhabited; but I will set beauty '
  - type: note
    content: ch. 32:23, 27, 32; Ps. 27:13
  - type: text
    content: 'in the land of the living. '
  '21':
  - type: text
    content: 'I will bring you '
  - type: note
    content: ch. 27:36; 28:19
  - type: text
    content: 'to a dreadful end, and you shall be no more. '
  - type: note
    content: '[Ps. 37:36]'
  - type: text
    content: 'Though you be sought for, you will never be found again, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '3':
  - type: text
    content: 'therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'Behold, I am against you, O Tyre, and will bring up '
  - type: note
    content: '[ch. 32:3; Jer. 34:1]'
  - type: text
    content: 'many nations against you, '
  - type: note
    content: '[Lam. 2:13]'
  - type: text
    content: 'as the sea brings up its waves. '
  '4':
  - type: text
    content: 'They shall destroy the walls of Tyre and break down her towers, and I will scrape her soil from her and '
  - type: note
    content: ch. 24:7
  - type: text
    content: 'make her a bare rock. '
  '5':
  - type: text
    content: 'She '
  - type: note
    content: ch. 47:10
  - type: text
    content: 'shall be in the midst of the sea a place for the spreading of nets, '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'for I have spoken, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. And she shall become plunder for the nations, '
  '6':
  - type: text
    content: 'and her daughters on the mainland shall be killed by the sword. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: '“For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ch. 29:18]'
  - type: text
    content: 'Behold, I will bring against Tyre '
  - type: note
    content: See Jer. 1:14
  - type: text
    content: from the north Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar; so throughout Ezekiel
  - type: text
    content: ' king of Babylon, '
  - type: note
    content: Ezra 7:12; Dan. 2:37; [Hos. 8:10]
  - type: text
    content: 'king of kings, with horses and chariots, and with horsemen and a host of many soldiers. '
  '8':
  - type: text
    content: 'He will kill with the sword '
  - type: note
    content: ver. 6
  - type: text
    content: 'your daughters on the mainland. '
  - type: note
    content: See ch. 4:2
  - type: text
    content: 'He will set up a siege wall against you and throw up a mound against you, and raise '
  - type: note
    content: '[2 Kgs. 19:32]'
  - type: text
    content: 'a roof of shields against you. '
  '9':
  - type: note
    content: ch. 4:2; 21:22
  - type: text
    content: 'He will direct the shock of his battering rams against your walls, and with his axes he will break down your towers. '
