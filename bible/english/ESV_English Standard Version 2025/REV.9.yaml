document_id: REV.9,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the fifth angel blew his trumpet, and '
  - type: note
    content: ch. 8:10; [ch. 12:9; Luke 10:18]
  - type: text
    content: 'I saw a star fallen from heaven to earth, and he was given '
  - type: note
    content: See ch. 1:18
  - type: text
    content: 'the key to the shaft of '
  - type: note
    content: ver. 2, 11; ch. 11:7; 17:8; 20:1, 3; Luke 8:31; Rom. 10:7
  - type: text
    content: the bottomless pit.
  - type: note
    content: Greek the abyss; also verses 2, 11
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'They have tails and stings like scorpions, and their power to hurt people '
  - type: note
    content: ver. 5
  - type: text
    content: 'for five months is in their tails. '
  '11':
  - type: text
    content: 'They have '
  - type: note
    content: '[Job 18:14; Prov. 30:27; Eph. 2:2]'
  - type: text
    content: 'as king over them the angel of the bottomless pit. His name in Hebrew is '
  - type: note
    content: See Job 26:6
  - type: text
    content: Abaddon, and in Greek he is called Apollyon.
  - type: note
    content: Abaddon means destruction; Apollyon means destroyer
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:13; 11:14 ]'
  - type: text
    content: The first woe has passed; behold, two woes are still to come.
  '13':
  - type: text
    content: 'Then the sixth angel blew his trumpet, and I heard a voice from '
  - type: note
    content: Ex. 30:3
  - type: text
    content: 'the four horns of the golden altar before God, '
  '14':
  - type: text
    content: 'saying to the sixth angel who had the trumpet, “Release '
  - type: note
    content: '[ch. 7:1]'
  - type: text
    content: 'the four angels who are bound at '
  - type: note
    content: ch. 16:12
  - type: text
    content: 'the great river Euphrates.” '
  '15':
  - type: text
    content: 'So the four angels, who had been prepared for the hour, the day, the month, and the year, were released '
  - type: note
    content: See ch. 8:7
  - type: text
    content: 'to kill a third of mankind. '
  '16':
  - type: text
    content: 'The number of '
  - type: note
    content: Ezek. 38:4
  - type: text
    content: 'mounted troops was '
  - type: note
    content: '[Ps. 68:17; Dan. 7:10]'
  - type: text
    content: 'twice ten thousand times ten thousand; '
  - type: note
    content: ch. 7:4
  - type: text
    content: 'I heard their number. '
  '17':
  - type: text
    content: 'And this is how I saw the horses in my vision and those who rode them: they wore breastplates the color of fire and of sapphire'
  - type: note
    content: Greek hyacinth
  - type: text
    content: ' and of sulfur, and the heads of the horses were '
  - type: note
    content: '[1 Chr. 12:8; Isa. 5:28, 29]'
  - type: text
    content: 'like lions’ heads, and fire and smoke and sulfur came out of their mouths. '
  '18':
  - type: text
    content: 'By these three plagues a third of mankind was killed, by the fire and smoke and sulfur coming out of their mouths. '
  '19':
  - type: text
    content: For the power of the horses is in their mouths and in their tails, for their tails are like serpents with heads, and by means of them they wound.
  '2':
  - type: text
    content: 'He opened the shaft of the bottomless pit, and from the shaft '
  - type: note
    content: '[Gen. 19:28; Isa. 34:10]'
  - type: text
    content: 'rose smoke like the smoke of a great furnace, and '
  - type: note
    content: '[Joel 2:10]'
  - type: text
    content: 'the sun and the air were darkened with the smoke from the shaft. '
  '20':
  - type: text
    content: 'The rest of mankind, who were not killed by these plagues, '
  - type: note
    content: See ch. 2:21
  - type: text
    content: 'did not repent of '
  - type: note
    content: Deut. 31:29; Jer. 1:16; 25:14
  - type: text
    content: 'the works of their hands nor give up worshiping '
  - type: note
    content: See 1 Cor. 10:20
  - type: text
    content: 'demons '
  - type: note
    content: Ps. 115:4-7; 135:15-17; Dan. 5:23
  - type: text
    content: 'and idols of gold and silver and bronze and stone and wood, which cannot see or hear or walk, '
  '21':
  - type: text
    content: 'nor did they repent of their murders or their '
  - type: note
    content: ch. 21:8; 22:15; Gal. 5:20
  - type: text
    content: sorceries or their sexual immorality or their thefts.
  '3':
  - type: text
    content: 'Then from the smoke came '
  - type: note
    content: See Ex. 10:4
  - type: text
    content: 'locusts on the earth, and they were given power like the power of scorpions of the earth. '
  '4':
  - type: text
    content: 'They were told '
  - type: note
    content: ch. 6:6; 7:3
  - type: text
    content: 'not to harm '
  - type: note
    content: ch. 8:7
  - type: text
    content: 'the grass of the earth or any green plant or any tree, but only those people who do not have '
  - type: note
    content: See ch. 7:2, 3
  - type: text
    content: 'the seal of God on their foreheads. '
  '5':
  - type: text
    content: 'They were allowed to torment them '
  - type: note
    content: ver. 10
  - type: text
    content: 'for five months, but not to kill them, and their torment was like the torment of a scorpion when it stings someone. '
  '6':
  - type: text
    content: 'And in those days '
  - type: note
    content: Job 3:21; 7:15, 16; Jer. 8:3
  - type: text
    content: people will seek death and will not find it. They will long to die, but death will flee from them.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Joel 2:4
  - type: text
    content: 'In appearance the locusts were like horses prepared for battle: '
  - type: note
    content: '[Nah. 3:17]'
  - type: text
    content: 'on their heads were what looked like crowns of gold; their faces were '
  - type: note
    content: Dan. 7:8
  - type: text
    content: 'like human faces, '
  '8':
  - type: text
    content: 'their hair like women’s hair, and '
  - type: note
    content: Joel 1:6
  - type: text
    content: 'their teeth like lions’ teeth; '
  '9':
  - type: text
    content: 'they had breastplates like breastplates of iron, and the noise of their wings was '
  - type: note
    content: Joel 2:5
  - type: text
    content: 'like the noise of many chariots with '
  - type: note
    content: Jer. 8:6; [Job 39:21-25]
  - type: text
    content: 'horses rushing into battle. '
