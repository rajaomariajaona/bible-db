document_id: LUK.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Lord of the Sabbath
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-5, see Matt. 12:1-8; Mark 2:23-28
  - type: text
    content: On a Sabbath,
  - type: note
    content: Some manuscripts On the second first Sabbath (that is, on the second Sabbath after the first)
  - type: text
    content: ' while he was going through the grainfields, his disciples '
  - type: note
    content: Deut. 23:25
  - type: text
    content: 'plucked and ate some heads of grain, rubbing them in their hands. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Mark 3:34; 5:32; 10:23; [Mark 10:21]
  - type: text
    content: 'after looking around at them all he said to him, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' And '
  - type: note
    content: '[1 Kgs. 13:4]'
  - type: text
    content: 'he did so, and his hand was restored. '
  '11':
  - type: text
    content: 'But they were filled with '
  - type: note
    content: 2 Tim. 3:9 (Gk.)
  - type: text
    content: fury and discussed with one another what they might do to Jesus.
  - type: heading
    content: The Twelve Apostles
  '12':
  - type: text
    content: 'In these days '
  - type: note
    content: See Matt. 14:23
  - type: text
    content: 'he went out to the mountain to pray, and all night he continued in prayer to God. '
  '13':
  - type: text
    content: 'And when day came, '
  - type: note
    content: ch. 9:1; Matt. 10:1; Mark 3:13; 6:7
  - type: text
    content: 'he called his disciples '
  - type: note
    content: For ver. 13-16, see Matt. 10:2-4; Mark 3:16-19; Acts 1:13
  - type: text
    content: 'and '
  - type: note
    content: See John 13:18
  - type: text
    content: 'chose from them twelve, whom he named '
  - type: note
    content: See Mark 6:30
  - type: text
    content: 'apostles: '
  '14':
  - type: text
    content: 'Simon, '
  - type: note
    content: Matt. 16:18; John 1:42
  - type: text
    content: 'whom he named Peter, and '
  - type: note
    content: Matt. 4:18, 21
  - type: text
    content: 'Andrew his brother, and '
  - type: note
    content: Matt. 4:18, 21
  - type: text
    content: 'James and John, and Philip, and Bartholomew, '
  '15':
  - type: text
    content: 'and '
  - type: note
    content: Matt. 9:9
  - type: text
    content: 'Matthew, and Thomas, and James the son of Alphaeus, and Simon who was called '
  - type: note
    content: '[Acts 21:20]'
  - type: text
    content: 'the Zealot, '
  '16':
  - type: text
    content: 'and '
  - type: note
    content: John 14:22
  - type: text
    content: Judas the son of James, and Judas Iscariot, who became a traitor.
  - type: heading
    content: Jesus Ministers to a Great Multitude
  '17':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 12; Matt. 5:1]'
  - type: text
    content: 'he came down with them and stood on a level place, with '
  - type: note
    content: Matt. 4:25; Mark 3:7, 8
  - type: text
    content: 'a great crowd of his disciples and a great multitude of people from all Judea and Jerusalem and the seacoast of '
  - type: note
    content: See Matt. 11:21
  - type: text
    content: 'Tyre and Sidon, '
  '18':
  - type: text
    content: 'who came to hear him and to be healed of their diseases. '
  - type: note
    content: Matt. 4:24
  - type: text
    content: 'And those who were troubled with unclean spirits were cured. '
  '19':
  - type: text
    content: 'And all the crowd '
  - type: note
    content: Matt. 14:36; Mark 3:10; [Acts 5:15]
  - type: text
    content: 'sought to touch him, for '
  - type: note
    content: See ch. 8:46
  - type: text
    content: power came out from him and healed them all.
  - type: heading
    content: The Beatitudes
  '2':
  - type: text
    content: 'But some of the Pharisees said, '
  - type: note
    content: '[Matt. 9:11]'
  - type: text
    content: '“Why are you doing '
  - type: note
    content: '[Ex. 20:9-11]'
  - type: text
    content: 'what is not lawful to do on the Sabbath?” '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: John 6:5
  - type: text
    content: 'he lifted up his eyes on his disciples, '
  - type: note
    content: For ver. 20-23, [Matt. 5:3-12]
  - type: text
    content: 'and said:'
  - type: text
    content: '“Blessed are you who are poor, for '
  - type: note
    content: '[ch. 12:32 ]'
  - type: text
    content: yours is the kingdom of God.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:53 ]'
  - type: text
    content: “Blessed are you who are hungry now, for you shall be satisfied.
  - type: note
    content: Isa. 25:8; 57:18; See Matt. 5:4
  - type: text
    content: “Blessed are you who weep now, for you shall laugh.
  '22':
  - type: text
    content: ' '
  - type: text
    content: '“Blessed are you when '
  - type: note
    content: See Matt. 10:22
  - type: text
    content: 'people hate you and when they '
  - type: note
    content: '[ John 9:22; 12:42; 16:2 ]'
  - type: text
    content: 'exclude you and revile you and '
  - type: note
    content: Heb. 11:26; 1 Pet. 4:14
  - type: text
    content: 'spurn your name as evil, '
  - type: note
    content: John 15:21
  - type: text
    content: on account of the Son of Man!
  - type: text
    content: ' '
  '23':
  - type: note
    content: See Matt. 5:12
  - type: text
    content: 'Rejoice in that day, and leap for joy, for behold, your reward is great in heaven; for '
  - type: note
    content: See Matt. 21:35
  - type: text
    content: so their fathers did to the prophets.
  - type: heading
    content: Jesus Pronounces Woes
  '24':
  - type: text
    content: ' '
  - type: note
    content: Amos 6:1; James 5:1; [ch. 12:21 ]
  - type: text
    content: '“But woe to you who are rich, '
  - type: note
    content: '[ch. 16:25 ]'
  - type: text
    content: 'for you '
  - type: note
    content: Matt. 6:2
  - type: text
    content: have received your consolation.
  '25':
  - type: text
    content: ' '
  - type: text
    content: '“Woe to you who are full now, for '
  - type: note
    content: Isa. 65:13
  - type: text
    content: you shall be hungry.
  - type: text
    content: '“Woe to '
  - type: note
    content: Isa. 65:14; [ Prov. 14:13; James 4:9 ]
  - type: text
    content: 'you who laugh now, '
  - type: note
    content: Isa. 65:14; [ Prov. 14:13; James 4:9 ]
  - type: text
    content: for you shall mourn and weep.
  '26':
  - type: text
    content: ' '
  - type: text
    content: '“Woe to you, '
  - type: note
    content: '[ John 15:19; 17:14; James 4:4; 1 John 4:5 ]'
  - type: text
    content: 'when all people speak well of you, for '
  - type: note
    content: Jer. 5:31; [ Isa. 30:10; Mic. 2:11 ]
  - type: text
    content: 'so their fathers did to '
  - type: note
    content: See Matt. 7:15
  - type: text
    content: the false prophets.
  - type: heading
    content: Love Your Enemies
  '27':
  - type: text
    content: ' '
  - type: text
    content: '“But I say to you who hear, '
  - type: note
    content: See Matt. 5:44
  - type: text
    content: 'Love your enemies, '
  - type: note
    content: Prov. 25:21, 22; Rom. 12:20, 21
  - type: text
    content: do good to those who hate you,
  - type: text
    content: ' '
  '28':
  - type: note
    content: 1 Pet. 3:9
  - type: text
    content: 'bless those who curse you, '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: pray for those who abuse you.
  - type: text
    content: ' '
  '29':
  - type: note
    content: For ver. 29, 30, see Matt. 5:39-42; [Rom. 12:17]
  - type: text
    content: 'To one who '
  - type: note
    content: Isa. 50:6; Lam. 3:30; Matt. 26:67
  - type: text
    content: strikes you on the cheek, offer the other also, and from one who takes away your cloak do not withhold your tunic
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' '
  - type: text
    content: either.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Jesus answered them, '
  - type: note
    content: See Matt. 21:16
  - type: text
    content: '“Have you not read '
  - type: note
    content: 1 Sam. 21:1-6
  - type: text
    content: 'what David did when he was hungry, he and those who were with him:'
  - type: text
    content: ' '
  '30':
  - type: note
    content: Ps. 37:21; Prov. 21:26
  - type: text
    content: Give to everyone who begs from you, and from one who takes away your goods do not demand them back.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 7:12
  - type: text
    content: as you wish that others would do to you, do so to them.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Matt. 5:46
  - type: text
    content: “If you love those who love you, what benefit is that to you? For even sinners love those who love them.
  - type: text
    content: ' '
  '33':
  - type: text
    content: And if you do good to those who do good to you, what benefit is that to you? For even sinners do the same.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 14:12-14; Prov. 19:17; Matt. 5:42]'
  - type: text
    content: 'if you '
  - type: note
    content: Ps. 37:26
  - type: text
    content: lend to those from whom you expect to receive, what credit is that to you? Even sinners lend to sinners, to get back the same amount.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'But '
  - type: note
    content: ver. 27
  - type: text
    content: 'love your enemies, and do good, and lend, expecting nothing in return, and your reward will be great, and '
  - type: note
    content: Matt. 5:45
  - type: text
    content: 'you will be sons of '
  - type: note
    content: ch. 1:32; See Mark 5:7
  - type: text
    content: 'the Most High, for '
  - type: note
    content: '[James 1:5]'
  - type: text
    content: he is kind to the ungrateful and the evil.
  - type: text
    content: ' '
  '36':
  - type: note
    content: '[Matt. 5:7, 48; Eph. 5:1, 2; James 3:17]'
  - type: text
    content: 'Be merciful, even as '
  - type: note
    content: James 5:11
  - type: text
    content: your Father is merciful.
  - type: heading
    content: Judging Others
  '37':
  - type: text
    content: ' '
  - type: note
    content: For ver. 37, 38, 41, 42, see Matt. 7:1-5; [ Rom. 14:13; 1 Cor. 4:5; James 5:9 ]
  - type: note
    content: '[ Matt. 6:14; 18:23-35 ]'
  - type: text
    content: '“Judge not, and you will not be judged; condemn not, and you will not be condemned; '
  - type: note
    content: '[ Matt. 6:14; 18:23-35 ]'
  - type: text
    content: forgive, and you will be forgiven;
  - type: text
    content: ' '
  '38':
  - type: note
    content: 2 Cor. 9:6-8
  - type: text
    content: 'give, and it will be given to you. Good measure, pressed down, shaken together, running over, will be put '
  - type: note
    content: Ps. 79:12; Isa. 65:6, 7
  - type: text
    content: 'into your lap. For '
  - type: note
    content: Mark 4:24; [Judg. 1:7]
  - type: text
    content: with the measure you use it will be measured back to you.”
  '39':
  - type: text
    content: 'He also told them a parable: '
  - type: note
    content: Matt. 15:14
  - type: text
    content: “Can a blind man lead a blind man? Will they not both fall into a pit?
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'how he entered the house of God and took and ate '
  - type: note
    content: Ex. 25:30; Lev. 24:5-9
  - type: text
    content: 'the bread of the Presence, '
  - type: note
    content: Ex. 25:30; Lev. 24:5-9
  - type: text
    content: which is not lawful for any but the priests to eat, and also gave it to those with him?”
  - type: text
    content: ' '
  '40':
  - type: note
    content: See Matt. 10:24
  - type: text
    content: 'A disciple is not above his teacher, but everyone when he is '
  - type: note
    content: 2 Cor. 13:11; Heb. 13:21; 1 Pet. 5:10; [1 Cor. 1:10; 2 Tim. 3:17]
  - type: text
    content: fully trained will be like his teacher.
  - type: text
    content: ' '
  '41':
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: 'Why do you see the speck that is in your brother’s eye, but '
  - type: note
    content: '[John 8:7-9]'
  - type: text
    content: do not notice the log that is in your own eye?
  - type: text
    content: ' '
  '42':
  - type: text
    content: How can you say to your brother, ‘Brother, let me take out the speck that is in your eye,’ when you yourself do not see the log that is in your own eye? You hypocrite, first take the log out of your own eye, and then you will see clearly to take out the speck that is in your brother’s eye.
  - type: heading
    content: A Tree and Its Fruit
  '43':
  - type: text
    content: ' '
  - type: text
    content: '“For '
  - type: note
    content: For ver. 43, 44, see Matt. 7:16, 20
  - type: text
    content: no good tree bears bad fruit, nor again does a bad tree bear good fruit,
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'for '
  - type: note
    content: Matt. 12:33
  - type: text
    content: each tree is known by its own fruit. For figs are not gathered from thornbushes, nor are grapes picked from a bramble bush.
  - type: text
    content: ' '
  '45':
  - type: note
    content: Matt. 12:35; 15:18, 19; [Matt. 13:52; Eph. 4:29]
  - type: text
    content: 'The good person out of the good treasure of his heart produces good, and the evil person out of his evil treasure produces '
  - type: note
    content: '[Matt. 5:37]'
  - type: text
    content: 'evil, '
  - type: note
    content: Matt. 12:34
  - type: text
    content: for out of the abundance of the heart his mouth speaks.
  - type: heading
    content: Build Your House on the Rock
  '46':
  - type: text
    content: ' '
  - type: note
    content: '[ Mal. 1:6 ]; See Matt. 7:21'
  - type: text
    content: '“Why '
  - type: note
    content: John 13:13
  - type: text
    content: do you call me ‘Lord, Lord,’ and not do what I tell you?
  - type: text
    content: ' '
  '47':
  - type: note
    content: For ver. 47-49, see Matt. 7:24-27
  - type: text
    content: 'Everyone who comes to me and hears my words and does them, I will show you what he is like:'
  - type: text
    content: ' '
  '48':
  - type: text
    content: he is like a man building a house, who dug deep and laid the foundation on the rock. And when a flood arose, the stream broke against that house and could not shake it, because it had been well built.
  - type: note
    content: Some manuscripts founded upon the rock
  - type: text
    content: ' '
  '49':
  - type: note
    content: '[Ezek. 13:10-16]'
  - type: text
    content: 'But the one who hears and does not do them is like a man who built a house on the ground without a foundation. When the stream broke against it, immediately it fell, and '
  - type: note
    content: Amos 6:11
  - type: text
    content: the ruin of that house was great.”
  '5':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[ch. 5:24]'
  - type: text
    content: “The Son of Man is lord of the Sabbath.”
  - type: heading
    content: A Man with a Withered Hand
  '6':
  - type: text
    content: 'On another Sabbath, '
  - type: note
    content: For ver. 6-11, see Matt. 12:9-14; Mark 3:1-6
  - type: text
    content: 'he entered the synagogue '
  - type: note
    content: See Mark 6:2
  - type: text
    content: 'and was teaching, and a man was there whose right hand was withered. '
  '7':
  - type: text
    content: 'And the scribes and the Pharisees '
  - type: note
    content: ch. 14:1; 20:20; [ch. 11:54]
  - type: text
    content: 'watched him, to see whether he would heal on the Sabbath, '
  - type: note
    content: '[John 8:6]'
  - type: text
    content: 'so that they might find a reason to accuse him. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: See Matt. 9:4
  - type: text
    content: 'he knew their thoughts, and he said to the man with the withered hand, '
  - type: text
    content: “Come and stand here.”
  - type: text
    content: ' And he rose and stood there. '
  '9':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“I ask you, '
  - type: note
    content: ch. 14:3
  - type: text
    content: is it lawful on the Sabbath to do good or to do harm, to save life or to destroy it?”
  - type: text
    content: ' '
