document_id: REV.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Heaven and the New Earth
  - type: text
    content: 'Then I saw '
  - type: note
    content: Isa. 65:17; 66:22; 2 Pet. 3:13
  - type: text
    content: 'a new heaven and a new earth, for '
  - type: note
    content: ch. 20:11
  - type: text
    content: 'the first heaven and the first earth had passed away, and the sea was no more. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ch. 17:3; [Ezek. 43:5]
  - type: text
    content: 'he carried me away in the Spirit to '
  - type: note
    content: Ps. 87:1; Ezek. 40:2
  - type: text
    content: 'a great, high mountain, and showed me the holy city Jerusalem coming down out of heaven from God, '
  '11':
  - type: note
    content: ver. 23; [ch. 22:5; Ps. 84:11; Ezek. 43:2, 4]
  - type: text
    content: 'having the glory of God, '
  - type: note
    content: '[Matt. 5:14; Phil. 2:15]'
  - type: text
    content: 'its radiance '
  - type: note
    content: ch. 4:3, 6
  - type: text
    content: 'like a most rare jewel, like a jasper, clear as crystal. '
  '12':
  - type: text
    content: 'It had a great, high wall, '
  - type: note
    content: Ezek. 48:31-34
  - type: text
    content: 'with twelve gates, and at the gates twelve angels, and on the gates the names of the twelve tribes of the sons of Israel were inscribed— '
  '13':
  - type: text
    content: 'on the east three gates, on the north three gates, on the south three gates, and on the west three gates. '
  '14':
  - type: text
    content: 'And the wall of the city had twelve '
  - type: note
    content: Heb. 11:10; [1 Cor. 3:11]
  - type: text
    content: 'foundations, and '
  - type: note
    content: Matt. 16:18; Eph. 2:20
  - type: text
    content: on them were the twelve names of the twelve apostles of the Lamb.
  '15':
  - type: text
    content: 'And the one who spoke with me '
  - type: note
    content: See ch. 11:1
  - type: text
    content: 'had a measuring rod of gold to measure the city and its gates and walls. '
  '16':
  - type: text
    content: The city lies foursquare, its length the same as its width. And he measured the city with his rod, 12,000 stadia.
  - type: note
    content: About 1,380 miles; a stadion was about 607 feet or 185 meters
  - type: text
    content: ' Its length and width and height are equal. '
  '17':
  - type: text
    content: He also measured its wall, 144 cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' by '
  - type: note
    content: Deut. 3:11; [ch. 13:18]
  - type: text
    content: 'human measurement, which is also '
  - type: note
    content: ver. 9
  - type: text
    content: 'an angel’s measurement. '
  '18':
  - type: text
    content: 'The wall was built of '
  - type: note
    content: ver. 11
  - type: text
    content: 'jasper, while the city was pure gold, like '
  - type: note
    content: ver. 11
  - type: text
    content: 'clear glass. '
  '19':
  - type: note
    content: '[Isa. 54:11, 12]'
  - type: text
    content: 'The foundations of the wall of the city were adorned with every kind of jewel. The first was jasper, the second sapphire, the third agate, the fourth emerald, '
  '2':
  - type: text
    content: 'And I saw '
  - type: note
    content: ch. 11:2; 22:19; Isa. 52:1
  - type: text
    content: 'the holy city, '
  - type: note
    content: See ch. 3:12
  - type: text
    content: 'new Jerusalem, '
  - type: note
    content: '[Heb. 11:10]'
  - type: text
    content: 'coming down out of heaven from God, '
  - type: note
    content: ch. 19:7; [John 14:3]
  - type: text
    content: 'prepared '
  - type: note
    content: Isa. 61:10
  - type: text
    content: 'as a bride adorned for her husband. '
  '20':
  - type: text
    content: 'the fifth onyx, the sixth carnelian, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth chrysoprase, the eleventh jacinth, the twelfth amethyst. '
  '21':
  - type: text
    content: 'And the twelve gates were twelve pearls, each of the gates made of a single pearl, and '
  - type: note
    content: ch. 22:2
  - type: text
    content: the street of the city was pure gold, like transparent glass.
  '22':
  - type: text
    content: 'And '
  - type: note
    content: '[John 4:23]'
  - type: text
    content: 'I saw no temple in the city, for its temple is the Lord God the Almighty and the Lamb. '
  '23':
  - type: text
    content: 'And the city '
  - type: note
    content: ch. 22:5; Isa. 60:19, 20; [ver. 25]
  - type: text
    content: 'has no need of sun or moon to shine on it, for '
  - type: note
    content: ver. 11
  - type: text
    content: 'the glory of God gives it light, and its lamp is the Lamb. '
  '24':
  - type: text
    content: 'By its light '
  - type: note
    content: Isa. 60:3; [ch. 22:2]
  - type: text
    content: 'will the nations walk, and the kings of the earth '
  - type: note
    content: ver. 26; [Isa. 60:5, 16]
  - type: text
    content: 'will bring their glory into it, '
  '25':
  - type: text
    content: 'and '
  - type: note
    content: Isa. 60:11
  - type: text
    content: 'its gates will never be shut by day—and '
  - type: note
    content: See ver. 23
  - type: text
    content: 'there will be no night there. '
  '26':
  - type: text
    content: 'They will bring into it the glory and the honor of the nations. '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 22:14, 15; Isa. 35:8; 52:1; Ezek. 44:9; Joel 3:17; Zech. 14:21]'
  - type: text
    content: 'nothing unclean will ever enter it, nor anyone who does what is detestable or false, but only those who are written in the Lamb’s '
  - type: note
    content: See ch. 3:5
  - type: text
    content: book of life.
  '3':
  - type: text
    content: 'And I heard a loud voice from the throne saying, “Behold, '
  - type: note
    content: See Lev. 26:11, 12
  - type: text
    content: the dwelling place
  - type: note
    content: Or tabernacle
  - type: text
    content: ' of God is with man. He will '
  - type: note
    content: '[ch. 7:15]'
  - type: text
    content: dwell with them, and they will be his people,
  - type: note
    content: Some manuscripts peoples
  - type: text
    content: ' and God himself will be with them as their God.'
  - type: note
    content: Some manuscripts omit as their God
  - type: text
    content: ' '
  '4':
  - type: note
    content: See ch. 7:17
  - type: text
    content: 'He will wipe away every tear from their eyes, and '
  - type: note
    content: '[ch. 20:14; 1 Cor. 15:26]'
  - type: text
    content: 'death shall be no more, '
  - type: note
    content: Isa. 35:10; 51:11; 65:19
  - type: text
    content: neither shall there be mourning, nor crying, nor pain anymore, for the former things have passed away.”
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:2, 9; 5:1; 20:11
  - type: text
    content: 'he who was seated on the throne said, “Behold, I '
  - type: note
    content: See 2 Cor. 5:17
  - type: text
    content: 'am making all things new.” Also he said, “Write this down, for '
  - type: note
    content: ch. 22:6; [ch. 3:14; 19:11; 1 Tim. 1:15]
  - type: text
    content: 'these words are trustworthy and true.” '
  '6':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 10:6
  - type: text
    content: '“It is done! '
  - type: note
    content: ch. 1:8; 22:13
  - type: text
    content: 'I am the Alpha and the Omega, the beginning and the end. '
  - type: note
    content: ch. 22:17; See John 4:10; 7:37
  - type: text
    content: 'To the thirsty I will give from the spring of the water of life without payment. '
  '7':
  - type: note
    content: ch. 2:7
  - type: text
    content: 'The one who conquers will have this heritage, and '
  - type: note
    content: ver. 3
  - type: text
    content: 'I will be his God and '
  - type: note
    content: See 2 Cor. 6:18
  - type: text
    content: 'he will be my son. '
  '8':
  - type: note
    content: ch. 22:15; 1 Cor. 6:9, 10; Gal. 5:19-21; Eph. 5:5; 1 Tim. 1:9; Heb. 12:14
  - type: text
    content: 'But as for the cowardly, the faithless, the detestable, as for murderers, the sexually immoral, sorcerers, idolaters, and all liars, '
  - type: note
    content: Luke 12:46
  - type: text
    content: 'their portion will be in '
  - type: note
    content: ch. 19:20
  - type: text
    content: 'the lake that burns with fire and sulfur, which is '
  - type: note
    content: ch. 2:11; 20:6, 14
  - type: text
    content: the second death.”
  - type: heading
    content: The New Jerusalem
  '9':
  - type: text
    content: 'Then came '
  - type: note
    content: ch. 17:1
  - type: text
    content: 'one of the seven angels who had the seven bowls full of '
  - type: note
    content: ch. 15:1
  - type: text
    content: 'the seven last plagues and spoke to me, saying, “Come, I will show you '
  - type: note
    content: ver. 2
  - type: text
    content: 'the Bride, the wife of the Lamb.” '
