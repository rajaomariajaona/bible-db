document_id: GEN.38,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah and Tamar
  - type: text
    content: 'It happened at that time that Judah went down from his brothers and '
  - type: note
    content: ver. 16; ch. 19:3; 2 Kgs. 4:8
  - type: text
    content: 'turned aside to a certain '
  - type: note
    content: 1 Sam. 22:1; 2 Sam. 23:13; 1 Chr. 11:15; Mic. 1:15
  - type: text
    content: 'Adullamite, whose name was Hirah. '
  '10':
  - type: text
    content: 'And what he did was wicked in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he put him to death also. '
  '11':
  - type: text
    content: 'Then Judah said to Tamar his daughter-in-law, '
  - type: note
    content: '[Ruth 1:12, 13]'
  - type: text
    content: '“Remain a widow in your father’s house, till Shelah my son grows up”—for he feared that he would die, like his brothers. So Tamar went and remained '
  - type: note
    content: Lev. 22:13
  - type: text
    content: in her father’s house.
  '12':
  - type: text
    content: 'In the course of time the wife of Judah, Shua’s daughter, died. When Judah '
  - type: note
    content: ch. 24:67; 37:35; 2 Sam. 13:39
  - type: text
    content: 'was comforted, he went up to '
  - type: note
    content: Judg. 14:1
  - type: text
    content: 'Timnah to his sheepshearers, he and his friend Hirah the Adullamite. '
  '13':
  - type: text
    content: 'And when Tamar was told, “Your father-in-law is going up to Timnah to shear his sheep,” '
  '14':
  - type: text
    content: 'she took off her widow’s garments '
  - type: note
    content: '[ver. 19; ch. 24:65]'
  - type: text
    content: 'and covered herself with a veil, wrapping herself up, and sat at the entrance to '
  - type: note
    content: ver. 21
  - type: text
    content: 'Enaim, which is on the road to Timnah. For she saw that Shelah was grown up, '
  - type: note
    content: ver. 26
  - type: text
    content: 'and she had not been given to him in marriage. '
  '15':
  - type: text
    content: 'When Judah saw her, he thought she was a prostitute, for she had covered her face. '
  '16':
  - type: text
    content: 'He turned to her at the roadside and said, “Come, let me come in to you,” for he did not know that she was his daughter-in-law. She said, “What will you give me, that you may come in to me?” '
  '17':
  - type: text
    content: 'He answered, “I will send you a young goat from the flock.” And she said, “If you give me a pledge, until you send it—” '
  '18':
  - type: text
    content: 'He said, “What pledge shall I give you?” She replied, '
  - type: note
    content: ver. 25
  - type: text
    content: '“Your signet and your cord and your staff that is in your hand.” So he gave them to her and went in to her, and she conceived by him. '
  '19':
  - type: text
    content: 'Then she arose and went away, and taking off '
  - type: note
    content: ver. 14
  - type: text
    content: her veil she put on the garments of her widowhood.
  '2':
  - type: text
    content: 'There Judah saw the daughter of a certain Canaanite whose name was '
  - type: note
    content: '[1 Chr. 2:3]'
  - type: text
    content: 'Shua. He took her and went in to her, '
  '20':
  - type: text
    content: 'When Judah sent the young goat by his friend the Adullamite to take back the pledge from the woman’s hand, he did not find her. '
  '21':
  - type: text
    content: And he asked the men of the place, “Where is the cult prostitute
  - type: note
    content: Hebrew sacred woman; a woman who served a pagan deity by prostitution; also verse 22
  - type: text
    content: ' who was at '
  - type: note
    content: ver. 14
  - type: text
    content: 'Enaim at the roadside?” And they said, “No cult prostitute has been here.” '
  '22':
  - type: text
    content: 'So he returned to Judah and said, “I have not found her. Also, the men of the place said, ‘No cult prostitute has been here.’” '
  '23':
  - type: text
    content: And Judah replied, “Let her keep the things as her own, or we shall be laughed at. You see, I sent this young goat, and you did not find her.”
  '24':
  - type: text
    content: 'About three months later Judah was told, “Tamar your daughter-in-law '
  - type: note
    content: Judg. 19:2
  - type: text
    content: has been immoral.
  - type: note
    content: Or has committed prostitution
  - type: text
    content: ' Moreover, she is pregnant by immorality.”'
  - type: note
    content: Or by prostitution
  - type: text
    content: ' And Judah said, “Bring her out, and '
  - type: note
    content: Lev. 21:9; [Deut. 22:21; John 8:5]
  - type: text
    content: 'let her be burned.” '
  '25':
  - type: text
    content: 'As she was being brought out, she sent word to her father-in-law, “By the man to whom these belong, I am pregnant.” And she said, “Please identify whose these are, '
  - type: note
    content: ver. 18
  - type: text
    content: 'the signet and the cord and the staff.” '
  '26':
  - type: text
    content: 'Then Judah identified them and said, '
  - type: note
    content: 1 Sam. 24:17
  - type: text
    content: '“She is more righteous than I, since '
  - type: note
    content: ver. 14
  - type: text
    content: I did not give her to my son Shelah.” And he did not know her again.
  '27':
  - type: text
    content: 'When the time of her labor came, there were twins in her womb. '
  '28':
  - type: text
    content: 'And when she was in labor, one put out a hand, and the midwife took and tied a scarlet thread on his hand, saying, “This one came out first.” '
  '29':
  - type: text
    content: 'But as he drew back his hand, behold, his brother came out. And she said, “What a breach you have made for yourself!” Therefore his name was called '
  - type: note
    content: ch. 46:12; Num. 26:20; 1 Chr. 2:4; Matt. 1:3
  - type: text
    content: Perez.
  - type: note
    content: Perez means a breach
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and she conceived and bore a son, and he called his name '
  - type: note
    content: ch. 46:12; Num. 26:19, 20
  - type: text
    content: 'Er. '
  '30':
  - type: text
    content: 'Afterward his brother came out with the scarlet thread on his hand, and his name was called '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: Zerah.
  '4':
  - type: text
    content: 'She conceived again and bore a son, and she called his name '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Onan. '
  '5':
  - type: text
    content: 'Yet again she bore a son, and she called his name '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: Shelah. Judah
  - type: note
    content: Hebrew He
  - type: text
    content: ' was in Chezib when she bore him.'
  '6':
  - type: text
    content: 'And Judah took a wife for Er his firstborn, and her name was Tamar. '
  '7':
  - type: text
    content: 'But Er, Judah’s firstborn, '
  - type: note
    content: 1 Chr. 2:3
  - type: text
    content: 'was wicked in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' put him to death. '
  '8':
  - type: text
    content: 'Then Judah said to Onan, “Go in to '
  - type: note
    content: Matt. 22:24; Mark 12:19; Luke 20:28
  - type: text
    content: 'your brother’s wife and '
  - type: note
    content: See Deut. 25:5-10
  - type: text
    content: 'perform the duty of a brother-in-law to her, and raise up offspring for your brother.” '
  '9':
  - type: text
    content: 'But Onan knew that the offspring would not be his. So whenever he went in to his brother’s wife he would waste the semen on the ground, so as not to give offspring to his brother. '
