document_id: REV.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Thousand Years
  - type: text
    content: 'Then I saw an angel coming down from heaven, '
  - type: note
    content: See ch. 1:18
  - type: text
    content: 'holding in his hand the key to '
  - type: note
    content: See ch. 9:1
  - type: text
    content: the bottomless pit
  - type: note
    content: Greek the abyss; also verse 3
  - type: text
    content: ' and a great chain. '
  '10':
  - type: text
    content: 'and the devil '
  - type: note
    content: ver. 3, 8
  - type: text
    content: 'who had deceived them was '
  - type: note
    content: See ch. 19:20
  - type: text
    content: 'thrown into the lake of fire and sulfur where '
  - type: note
    content: See ch. 16:13
  - type: text
    content: the beast and the false prophet were, and they will be tormented day and night forever and ever.
  - type: heading
    content: Judgment Before the Great White Throne
  '11':
  - type: text
    content: 'Then I saw a great white throne and him who was seated on it. From his presence '
  - type: note
    content: See Ps. 102:26
  - type: text
    content: 'earth and sky fled away, and '
  - type: note
    content: ch. 12:8; Dan. 2:35
  - type: text
    content: 'no place was found for them. '
  '12':
  - type: text
    content: 'And I saw the dead, great and small, standing before the throne, and '
  - type: note
    content: Dan. 7:10
  - type: text
    content: 'books were opened. Then another book was opened, which is '
  - type: note
    content: See ch. 3:5
  - type: text
    content: 'the book of life. And '
  - type: note
    content: Rom. 14:10; 2 Cor. 5:10; See ch. 11:18
  - type: text
    content: 'the dead were judged by what was written in the books, '
  - type: note
    content: See Matt. 16:27
  - type: text
    content: 'according to what they had done. '
  '13':
  - type: text
    content: 'And the sea gave up the dead who were in it, '
  - type: note
    content: ch. 6:8
  - type: text
    content: 'Death and Hades gave up the dead who were in them, and they were judged, each one of them, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'according to what they had done. '
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'Death and Hades '
  - type: note
    content: '[ch. 21:4; Luke 20:36; 1 Cor. 15:26]'
  - type: text
    content: 'were thrown into the lake of fire. This is '
  - type: note
    content: ver. 6
  - type: text
    content: 'the second death, the lake of fire. '
  '15':
  - type: text
    content: 'And if anyone’s name was not found written in the book of life, '
  - type: note
    content: Matt. 13:42, 50
  - type: text
    content: he was thrown into the lake of fire.
  '2':
  - type: text
    content: 'And he seized '
  - type: note
    content: See ch. 12:9
  - type: text
    content: 'the dragon, that ancient serpent, who is the devil and Satan, and '
  - type: note
    content: '[2 Pet. 2:4; Jude 6]'
  - type: text
    content: 'bound him for a thousand years, '
  '3':
  - type: text
    content: 'and threw him into '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the pit, and shut it and '
  - type: note
    content: Dan. 6:17; [Matt. 27:66]
  - type: text
    content: 'sealed it over him, so that '
  - type: note
    content: ver. 8, 10
  - type: text
    content: he might not deceive the nations any longer, until the thousand years were ended. After that he must be released for a little while.
  '4':
  - type: text
    content: 'Then I saw '
  - type: note
    content: Dan. 7:9; Matt. 19:28
  - type: text
    content: 'thrones, and '
  - type: note
    content: ch. 3:21; Dan. 7:22
  - type: text
    content: 'seated on them were those to whom the authority to judge was committed. Also I saw '
  - type: note
    content: ch. 6:9
  - type: text
    content: 'the souls of those who had been beheaded for the testimony of Jesus and for the word of God, and those '
  - type: note
    content: ch. 13:12, 14-16
  - type: text
    content: 'who had not worshiped the beast or its image and had not received its mark on their foreheads or their hands. '
  - type: note
    content: '[John 14:19; 2 Tim. 2:11]'
  - type: text
    content: 'They came to life and '
  - type: note
    content: ver. 6; ch. 5:10; 22:5; Dan. 7:18; Matt. 20:21, 27; 2 Tim. 2:12; [Ps. 45:16]
  - type: text
    content: 'reigned with Christ for a thousand years. '
  '5':
  - type: text
    content: 'The rest of the dead did not come to life until the thousand years were ended. This is the first resurrection. '
  '6':
  - type: note
    content: ch. 14:13
  - type: text
    content: 'Blessed and holy is the one who shares in the first resurrection! Over such '
  - type: note
    content: ver. 14; ch. 2:11; 21:8
  - type: text
    content: 'the second death has no power, but they will be '
  - type: note
    content: See ch. 1:6
  - type: text
    content: 'priests of God and of Christ, and they '
  - type: note
    content: ver. 4
  - type: text
    content: will reign with him for a thousand years.
  - type: heading
    content: The Defeat of Satan
  '7':
  - type: text
    content: 'And when the thousand years are ended, '
  - type: note
    content: ver. 2
  - type: text
    content: 'Satan will be released from his prison '
  '8':
  - type: text
    content: 'and will come out '
  - type: note
    content: ver. 3, 10
  - type: text
    content: 'to deceive the nations that are at the four corners of the earth, '
  - type: note
    content: Ezek. 38:2; 39:1
  - type: text
    content: 'Gog and Magog, '
  - type: note
    content: See ch. 16:14
  - type: text
    content: 'to gather them for battle; their number is like the sand of the sea. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: '[Isa. 8:8; Ezek. 38:9, 16; Hab. 1:6]'
  - type: text
    content: 'they marched up over the broad plain of the earth and surrounded '
  - type: note
    content: Heb. 13:11, 13
  - type: text
    content: 'the camp of the saints and '
  - type: note
    content: '[Ps. 132:13]'
  - type: text
    content: 'the beloved city, but '
  - type: note
    content: See ch. 13:13
  - type: text
    content: fire came down from heaven
  - type: note
    content: Some manuscripts from God, out of heaven, or out of heaven from God
  - type: text
    content: ' and consumed them, '
