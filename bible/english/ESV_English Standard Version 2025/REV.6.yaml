document_id: REV.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seven Seals
  - type: text
    content: 'Now I watched when the Lamb opened one of '
  - type: note
    content: ch. 5:1, 5-7
  - type: text
    content: 'the seven seals, and I heard '
  - type: note
    content: ch. 4:7
  - type: text
    content: 'one of the four living creatures say '
  - type: note
    content: ch. 14:2; 19:6
  - type: text
    content: 'with a voice like thunder, '
  - type: note
    content: ch. 22:20
  - type: text
    content: '“Come!” '
  '10':
  - type: text
    content: 'They cried out with a loud voice, “O Sovereign Lord, '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'holy and true, '
  - type: note
    content: '[Ps. 94:3; Zech. 1:12]'
  - type: text
    content: 'how long '
  - type: note
    content: ch. 11:18; 19:2
  - type: text
    content: 'before you will judge and '
  - type: note
    content: Ps. 79:10; 119:84; Luke 18:7, 8
  - type: text
    content: 'avenge our blood on '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'those who dwell on the earth?” '
  '11':
  - type: text
    content: 'Then they were each given '
  - type: note
    content: ch. 3:4; 7:9
  - type: text
    content: 'a white robe and '
  - type: note
    content: ch. 14:13
  - type: text
    content: 'told to rest a little longer, '
  - type: note
    content: '[Heb. 11:40]'
  - type: text
    content: until the number of their fellow servants and their brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' '
  - type: note
    content: '[Gen. 15:16]'
  - type: text
    content: should be complete, who were to be killed as they themselves had been.
  '12':
  - type: text
    content: 'When he opened the sixth seal, I looked, and behold, '
  - type: note
    content: ch. 11:13; 16:18; [Heb. 12:26]
  - type: text
    content: 'there was a great earthquake, and '
  - type: note
    content: See Matt. 24:29
  - type: text
    content: 'the sun became black as '
  - type: note
    content: Isa. 50:3
  - type: text
    content: 'sackcloth, the full moon became like blood, '
  '13':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 8:10; 9:1]'
  - type: text
    content: 'the stars of the sky fell to the earth '
  - type: note
    content: Isa. 34:4
  - type: text
    content: 'as the fig tree sheds its winter fruit when shaken by a gale. '
  '14':
  - type: note
    content: '[ch. 20:11; 21:1]'
  - type: text
    content: 'The sky vanished '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'like a scroll that is being rolled up, and '
  - type: note
    content: ch. 16:20; [Isa. 54:10; Jer. 4:24; Ezek. 38:20; Nah. 1:5]
  - type: text
    content: 'every mountain and island was removed from its place. '
  '15':
  - type: text
    content: Then the kings of the earth and the great ones and the generals and the rich and the powerful, and everyone, slave
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' and free, '
  - type: note
    content: Isa. 2:19, 21
  - type: text
    content: 'hid themselves in the caves and among the rocks of the mountains, '
  '16':
  - type: note
    content: Hos. 10:8; Luke 23:30
  - type: text
    content: 'calling to the mountains and rocks, “Fall on us and hide us from the face of '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'him who is seated on the throne, and from the wrath of the Lamb, '
  '17':
  - type: text
    content: 'for '
  - type: note
    content: Jer. 30:7; Joel 2:11, 31
  - type: text
    content: 'the great day of their wrath has come, and '
  - type: note
    content: Ezra 9:15; Ps. 76:7; Mal. 3:2; Luke 21:36
  - type: text
    content: who can stand?”
  '2':
  - type: text
    content: 'And I looked, and behold, '
  - type: note
    content: Zech. 6:3; [ch. 19:11, 19, 21]
  - type: text
    content: 'a white horse! And '
  - type: note
    content: '[Ps. 45:4, 5; Hab. 3:8, 9; Zech. 9:13, 14]'
  - type: text
    content: 'its rider had a bow, and '
  - type: note
    content: ch. 14:14; [Zech. 6:11]
  - type: text
    content: 'a crown was given to him, and he came out '
  - type: note
    content: See ch. 3:21
  - type: text
    content: conquering, and to conquer.
  '3':
  - type: text
    content: 'When he opened the second seal, I heard '
  - type: note
    content: ch. 4:7
  - type: text
    content: 'the second living creature say, “Come!” '
  '4':
  - type: text
    content: 'And out came another horse, '
  - type: note
    content: Zech. 1:8; 6:2
  - type: text
    content: 'bright red. Its rider was permitted '
  - type: note
    content: '[Matt. 10:34; 24:6, 7]'
  - type: text
    content: to take peace from the earth, so that people should slay one another, and he was given a great sword.
  '5':
  - type: text
    content: 'When he opened the third seal, I heard the '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'third living creature say, “Come!” And I looked, and behold, '
  - type: note
    content: Zech. 6:2
  - type: text
    content: 'a black horse! And its rider had a pair of scales in his hand. '
  '6':
  - type: text
    content: 'And I heard what seemed to be a voice in the midst of the four living creatures, saying, '
  - type: note
    content: '[Ezek. 4:10, 11; 5:10, 16]'
  - type: text
    content: “A quart
  - type: note
    content: Greek choinix, a dry measure equal to about a quart
  - type: text
    content: ' of wheat for a denarius,'
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' and three quarts of barley for a denarius, and '
  - type: note
    content: ch. 7:3; 9:4
  - type: text
    content: do not harm the oil and wine!”
  '7':
  - type: text
    content: 'When he opened the fourth seal, I heard the voice of '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the fourth living creature say, “Come!” '
  '8':
  - type: text
    content: 'And I looked, and behold, '
  - type: note
    content: '[Zech. 6:3]'
  - type: text
    content: 'a pale horse! And its rider’s name was Death, and Hades followed him. And they were given authority over a fourth of the earth, to kill '
  - type: note
    content: Ezek. 14:21
  - type: text
    content: 'with sword and with famine and with pestilence and '
  - type: note
    content: Lev. 26:22; Deut. 32:24
  - type: text
    content: by wild beasts of the earth.
  '9':
  - type: text
    content: 'When he opened the fifth seal, I saw under '
  - type: note
    content: ch. 14:18; 16:7
  - type: text
    content: 'the altar '
  - type: note
    content: ch. 20:4
  - type: text
    content: 'the souls of those who had been slain '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'for the word of God and for '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'the witness they had borne. '
