document_id: JOS.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Inheritance West of the Jordan
  - type: text
    content: 'These are the inheritances that the people of Israel received in the land of Canaan, which '
  - type: note
    content: ch. 17:4; 21:1; Num. 34:17, 18
  - type: text
    content: 'Eleazar the priest and Joshua the son of Nun and the heads of the fathers’ houses of the tribes of the people of Israel gave them to inherit. '
  '10':
  - type: text
    content: 'And now, behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' has kept me alive, '
  - type: note
    content: Num. 14:30
  - type: text
    content: 'just as he said, these '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'forty-five years since the time that the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke this word to Moses, while Israel walked in the wilderness. And now, behold, I am this day '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'eighty-five years old. '
  '11':
  - type: note
    content: '[Deut. 34:7]'
  - type: text
    content: 'I am still as strong today as I was in the day that Moses sent me; my strength now is as my strength was then, for war and '
  - type: note
    content: Deut. 31:2
  - type: text
    content: 'for going and coming. '
  '12':
  - type: text
    content: 'So now give me this hill country of which the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke on that day, for you heard on that day how the '
  - type: note
    content: Num. 13:28, 33
  - type: text
    content: 'Anakim were there, with great fortified cities. It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' will be with me, and I shall drive them out just as the '
  - type: text
    content: Lord
  - type: text
    content: ' said.”'
  '13':
  - type: text
    content: 'Then Joshua '
  - type: note
    content: ch. 22:6
  - type: text
    content: 'blessed him, and he gave '
  - type: note
    content: ch. 10:36, 37; 15:13, 14; 21:11, 12; Judg. 1:20; 1 Chr. 6:55, 56
  - type: text
    content: 'Hebron to Caleb the son of Jephunneh for an inheritance. '
  '14':
  - type: text
    content: 'Therefore Hebron became the inheritance of Caleb the son of Jephunneh the Kenizzite to this day, '
  - type: note
    content: ver. 8, 9
  - type: text
    content: 'because he wholly followed the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '15':
  - type: note
    content: ver. 13; Gen. 23:2; 35:27; Judg. 1:10; See ch. 10:36
  - type: text
    content: Now the name of Hebron formerly was Kiriath-arba.
  - type: note
    content: Kiriath-arba means the city of Arba
  - type: text
    content: ' (Arba'
  - type: note
    content: Hebrew He
  - type: text
    content: ' was the greatest man among the Anakim.) '
  - type: note
    content: See ch. 11:23
  - type: text
    content: And the land had rest from war.
  '2':
  - type: text
    content: 'Their inheritance was '
  - type: note
    content: Num. 26:56; 33:54; 34:13
  - type: text
    content: 'by lot, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded by the hand of Moses for the nine and one-half tribes. '
  '3':
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'For Moses had given an inheritance to the two and one-half tribes beyond the Jordan, '
  - type: note
    content: See ch. 13:33
  - type: text
    content: 'but to the Levites he gave no inheritance among them. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: Gen. 48:5; 1 Chr. 5:1, 2
  - type: text
    content: 'the people of Joseph were two tribes, Manasseh and Ephraim. And no portion was given to the Levites in the land, but only cities to dwell in, with their pasturelands for their livestock and their substance. '
  '5':
  - type: text
    content: 'The people of Israel did '
  - type: note
    content: ch. 21:2; Num. 35:1, 2
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses; they allotted the land.'
  - type: heading
    content: Caleb’s Request and Inheritance
  '6':
  - type: text
    content: 'Then the people of Judah came to Joshua at Gilgal. And Caleb the son of Jephunneh the '
  - type: note
    content: ver. 13, 14; Num. 32:12; [ch. 15:17]
  - type: text
    content: 'Kenizzite said to him, “You know '
  - type: note
    content: Num. 14:24, 30; Deut. 1:36, 38
  - type: text
    content: 'what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses the man of God in Kadesh-barnea concerning you and me. '
  '7':
  - type: text
    content: 'I was forty years old when Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Num. 13:6, 16, 30; 14:6-9
  - type: text
    content: 'sent me from Kadesh-barnea to spy out the land, and I brought him word again as it was in my heart. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: Deut. 1:28; See Num. 13:31-33
  - type: text
    content: 'my brothers who went up with me made the heart of the people melt; yet I wholly followed the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. '
  '9':
  - type: text
    content: 'And Moses swore on that day, saying, '
  - type: note
    content: Num. 14:24; Deut. 1:36
  - type: text
    content: '‘Surely the land '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'on which your foot has trodden shall be an inheritance for you and your children forever, because you have wholly followed the '
  - type: text
    content: Lord
  - type: text
    content: ' my God.’ '
