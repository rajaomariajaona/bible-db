      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 1:36
      marker-yv: yv-n
    - type: text
      text: '‘Surely the land '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:3
      marker-yv: yv-n
    - type: text
      text: 'on which your foot has trodden shall be an inheritance for you and your children forever, because you have wholly followed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God.’ '
