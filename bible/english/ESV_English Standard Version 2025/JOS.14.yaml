        children:
        - type: text
          text: Deut. 1:28
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 13:31-33
      marker-yv: yv-n
    - type: text
      text: 'my brothers who went up with me made the heart of the people melt; yet I wholly followed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Moses swore on that day, saying, '
    - type: usfm
