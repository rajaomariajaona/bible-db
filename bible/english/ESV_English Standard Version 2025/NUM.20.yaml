document_id: NUM.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Miriam
  - type: text
    content: 'And the people of Israel, the whole congregation, came '
  - type: note
    content: See ch. 13:21
  - type: text
    content: 'into the wilderness of Zin in the first month, and the people stayed in Kadesh. And '
  - type: note
    content: ch. 12:1; 26:59; Ex. 15:20
  - type: text
    content: Miriam died there and was buried there.
  - type: heading
    content: The Waters of Meribah
  '10':
  - type: text
    content: 'Then Moses and Aaron gathered the assembly together before the rock, and he said to them, '
  - type: note
    content: Ps. 106:32, 33
  - type: text
    content: '“Hear now, you rebels: shall we bring water for you out of this rock?” '
  '11':
  - type: text
    content: 'And Moses lifted up his hand and struck the rock with his staff twice, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'and water came out abundantly, and the congregation drank, and their livestock. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “Because '
  - type: note
    content: ch. 27:14; Deut. 1:37; 3:26; 32:51
  - type: text
    content: 'you did not believe in me, '
  - type: note
    content: Ezek. 20:41; 36:23; 38:16
  - type: text
    content: 'to uphold me as holy in the eyes of the people of Israel, therefore you shall not bring this assembly into the land that I have given them.” '
  '13':
  - type: note
    content: ch. 27:14; Ex. 17:7; Deut. 32:51; 33:8; Ps. 81:7; 95:8; 106:32
  - type: text
    content: These are the waters of Meribah,
  - type: note
    content: Meribah means quarreling
  - type: text
    content: ' where the people of Israel quarreled with the '
  - type: text
    content: Lord
  - type: text
    content: ', and through them he showed himself holy.'
  - type: heading
    content: Edom Refuses Passage
  '14':
  - type: text
    content: ' '
  - type: note
    content: Judg. 11:16, 17
  - type: text
    content: 'Moses sent messengers from Kadesh to '
  - type: note
    content: See Gen. 36:31-39
  - type: text
    content: 'the king of Edom: “Thus says '
  - type: note
    content: Deut. 2:4, 8; 23:7; Obad. 10, 12
  - type: text
    content: 'your brother Israel: You know all the hardship that we have met: '
  '15':
  - type: note
    content: Gen. 46:6; Acts 7:15
  - type: text
    content: 'how our fathers went down to Egypt, '
  - type: note
    content: See Ex. 12:40
  - type: text
    content: 'and we lived in Egypt a long time. '
  - type: note
    content: Ex. 1:11; Deut. 26:6
  - type: text
    content: 'And the Egyptians dealt harshly with us and our fathers. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 2:23; 3:7
  - type: text
    content: 'when we cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', he heard our voice and '
  - type: note
    content: Ex. 3:2; 14:19; 23:20; 33:2
  - type: text
    content: 'sent an angel and brought us out of Egypt. And here we are in Kadesh, a city on the edge of your territory. '
  '17':
  - type: note
    content: '[ch. 21:22; Deut. 2:27]'
  - type: text
    content: 'Please let us pass through your land. We will not pass through field or vineyard, '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'or drink water from a well. We will go along the King’s Highway. We will not turn aside to the right hand or to the left until we have passed through your territory.” '
  '18':
  - type: text
    content: 'But Edom said to him, “You shall not pass through, lest I come out with the sword against you.” '
  '19':
  - type: text
    content: 'And the people of Israel said to him, “We will go up by the highway, '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'and if we drink of your water, I and my livestock, '
  - type: note
    content: Deut. 2:6, 28
  - type: text
    content: 'then I will pay for it. Let me only pass through on foot, nothing more.” '
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 17:1 ]'
  - type: text
    content: 'Now there was no water for the congregation. '
  - type: note
    content: ch. 16:19, 42
  - type: text
    content: 'And they assembled themselves together against Moses and against Aaron. '
  '20':
  - type: text
    content: 'But he said, '
  - type: note
    content: '[Judg. 11:17; Amos 1:11]'
  - type: text
    content: '“You shall not pass through.” And Edom came out against them with a large army and with a strong force. '
  '21':
  - type: text
    content: 'Thus Edom '
  - type: note
    content: '[Deut. 2:29]'
  - type: text
    content: 'refused to give Israel passage through his territory, so Israel '
  - type: note
    content: '[ch. 21:4; Deut. 2:8; Judg. 11:18]'
  - type: text
    content: turned away from him.
  - type: heading
    content: The Death of Aaron
  '22':
  - type: text
    content: 'And they journeyed from '
  - type: note
    content: ch. 33:37
  - type: text
    content: 'Kadesh, and the people of Israel, the whole congregation, came to '
  - type: note
    content: ch. 21:4; 33:37
  - type: text
    content: 'Mount Hor. '
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron at Mount Hor, on the border of the land of Edom, '
  '24':
  - type: note
    content: ch. 27:13; Deut. 32:50; [ch. 31:2; Gen. 25:8]
  - type: text
    content: '“Let Aaron be gathered to his people, for he shall not enter the land that I have given to the people of Israel, because '
  - type: note
    content: ver. 12
  - type: text
    content: 'you rebelled against my command at the waters of Meribah. '
  '25':
  - type: text
    content: 'Take Aaron and Eleazar his son and bring them up to Mount Hor. '
  '26':
  - type: text
    content: 'And strip Aaron of his garments and put them on Eleazar his son. And Aaron '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'shall be gathered to his people and shall die there.” '
  '27':
  - type: text
    content: 'Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. And they went up Mount Hor in the sight of all the congregation. '
  '28':
  - type: note
    content: Ex. 29:29, 30
  - type: text
    content: 'And Moses stripped Aaron of his garments and put them on Eleazar his son. And Aaron died there '
  - type: note
    content: ch. 33:38; Deut. 32:50; [Deut. 10:6]
  - type: text
    content: 'on the top of the mountain. Then Moses and Eleazar came down from the mountain. '
  '29':
  - type: text
    content: 'And when all the congregation saw that Aaron had perished, '
  - type: note
    content: Deut. 34:8
  - type: text
    content: all the house of Israel wept for Aaron thirty days.
  '3':
  - type: text
    content: 'And the people '
  - type: note
    content: ch. 14:2; [Ex. 17:2]
  - type: text
    content: 'quarreled with Moses and said, “Would that we had perished '
  - type: note
    content: ch. 11:1, 33; 14:37; 16:32, 33, 35, 49
  - type: text
    content: 'when our brothers perished before the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '4':
  - type: text
    content: 'Why have you brought the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: ' into this wilderness, that we should die here, both we and our cattle? '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: '[Ex. 17:3]'
  - type: text
    content: 'why have you made us come up out of Egypt to bring us to this evil place? It is no place for grain or figs or vines or pomegranates, and there is no water to drink.” '
  '6':
  - type: text
    content: 'Then Moses and Aaron went from the presence of the assembly to the entrance of the tent of meeting and '
  - type: note
    content: ch. 14:5; 16:4, 22, 45
  - type: text
    content: 'fell on their faces. '
  - type: note
    content: See Lev. 9:23
  - type: text
    content: 'And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to them, '
  '7':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '8':
  - type: note
    content: '[Ex. 17:5]'
  - type: text
    content: '“Take the staff, and assemble the congregation, you and Aaron your brother, and tell the rock before their eyes to yield its water. So '
  - type: note
    content: See Ex. 17:6
  - type: text
    content: 'you shall bring water out of the rock for them and give drink to the congregation and their cattle.” '
  '9':
  - type: text
    content: 'And Moses took the staff '
  - type: note
    content: ch. 17:10
  - type: text
    content: 'from before the '
  - type: text
    content: Lord
  - type: text
    content: ', as he commanded him.'
  - type: heading
    content: Moses Strikes the Rock
