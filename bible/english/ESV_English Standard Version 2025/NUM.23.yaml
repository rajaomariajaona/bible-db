document_id: NUM.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Balaam’s First Oracle
  - type: text
    content: 'And Balaam said to Balak, '
  - type: note
    content: ver. 29
  - type: text
    content: '“Build for me here seven altars, and prepare for me here seven bulls and seven rams.” '
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Gen. 13:16
  - type: text
    content: Who can count the dust of Jacob
  - type: text
    content: or number the fourth part
  - type: note
    content: Or dust clouds
  - type: text
    content: ' of Israel?'
  - type: text
    content: 'Let me die '
  - type: note
    content: Ps. 37:37; 116:15; Rev. 14:13
  - type: text
    content: the death of the upright,
  - type: text
    content: and let my end be like his!”
  '11':
  - type: text
    content: 'And Balak said to Balaam, “What have you done to me? '
  - type: note
    content: ch. 22:11; 24:10; Deut. 23:5; Neh. 13:2
  - type: text
    content: 'I took you to curse my enemies, and behold, you have done nothing but bless them.” '
  '12':
  - type: text
    content: 'And he answered and said, '
  - type: note
    content: See ver. 5
  - type: text
    content: '“Must I not take care to speak what the '
  - type: text
    content: Lord
  - type: text
    content: ' puts in my mouth?”'
  - type: heading
    content: Balaam’s Second Oracle
  '13':
  - type: text
    content: 'And Balak said to him, “Please come with me to another place, from which you may see them. You shall see only a fraction of them and shall not see them all. Then curse them for me from there.” '
  '14':
  - type: text
    content: 'And he took him to the field of Zophim, to the top of Pisgah, '
  - type: note
    content: ver. 1, 2
  - type: text
    content: 'and built seven altars and offered a bull and a ram on each altar. '
  '15':
  - type: text
    content: 'Balaam said to Balak, '
  - type: note
    content: ver. 3
  - type: text
    content: '“Stand here beside your burnt offering, while I meet the '
  - type: text
    content: Lord
  - type: text
    content: ' over there.” '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' met Balaam and '
  - type: note
    content: ver. 5, 12
  - type: text
    content: 'put a word in his mouth and said, “Return to Balak, and thus shall you speak.” '
  '17':
  - type: text
    content: 'And he came to him, and behold, he was standing beside his burnt offering, and the princes of Moab with him. And Balak said to him, “What has the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken?” '
  '18':
  - type: text
    content: And Balaam took up his discourse and said,
  - type: text
    content: “Rise, Balak, and hear;
  - type: text
    content: 'give ear to me, O son of Zippor:'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 15:29; Mal. 3:6; Rom. 11:29; Titus 1:2; Heb. 6:18; James 1:17
  - type: text
    content: God is not man, that he should lie,
  - type: text
    content: or a son of man, that he should change his mind.
  - type: text
    content: Has he said, and will he not do it?
  - type: text
    content: Or has he spoken, and will he not fulfill it?
  '2':
  - type: text
    content: 'Balak did as Balaam had said. And Balak and Balaam '
  - type: note
    content: ver. 14, 30
  - type: text
    content: 'offered on each altar a bull and a ram. '
  '20':
  - type: text
    content: 'Behold, I received a command to bless:'
  - type: note
    content: ch. 22:12; Gen. 12:2; 22:17
  - type: text
    content: 'he has blessed, and '
  - type: note
    content: ch. 22:18
  - type: text
    content: I cannot revoke it.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 50:20 ]'
  - type: text
    content: He has not beheld misfortune in Jacob,
  - type: text
    content: nor has he seen trouble in Israel.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' their God is with them,'
  - type: text
    content: and the shout of a king is among them.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:8
  - type: text
    content: God brings them out of Egypt
  - type: text
    content: 'and is for them like '
  - type: note
    content: Deut. 33:17; Job 39:9-12; Ps. 22:21; 92:10
  - type: text
    content: the horns of the wild ox.
  '23':
  - type: text
    content: For there is no enchantment against Jacob,
  - type: text
    content: 'no '
  - type: note
    content: ch. 22:7
  - type: text
    content: divination against Israel;
  - type: text
    content: now it shall be said of Jacob and Israel,
  - type: note
    content: Ps. 44:1
  - type: text
    content: ‘What has God wrought!’
  '24':
  - type: text
    content: 'Behold, a people! '
  - type: note
    content: Gen. 49:9
  - type: text
    content: As a lioness it rises up
  - type: text
    content: and as a lion it lifts itself;
  - type: note
    content: Gen. 49:27
  - type: text
    content: it does not lie down until it has devoured the prey
  - type: text
    content: and drunk the blood of the slain.”
  '25':
  - type: text
    content: 'And Balak said to Balaam, “Do not curse them at all, and do not bless them at all.” '
  '26':
  - type: text
    content: 'But Balaam answered Balak, “Did I not tell you, '
  - type: note
    content: See ch. 22:18
  - type: text
    content: '‘All that the '
  - type: text
    content: Lord
  - type: text
    content: ' says, that I must do’?” '
  '27':
  - type: text
    content: 'And Balak said to Balaam, '
  - type: note
    content: ver. 13
  - type: text
    content: '“Come now, I will take you to another place. Perhaps it will please God that you may curse them for me from there.” '
  '28':
  - type: text
    content: 'So Balak took Balaam to the top of '
  - type: note
    content: ch. 25:18; 31:16; Josh. 22:17; Ps. 106:28, 29; Hos. 9:10; [ch. 25:3, 5]
  - type: text
    content: 'Peor, which overlooks '
  - type: note
    content: See ch. 21:20
  - type: text
    content: the desert.
  - type: note
    content: Or Jeshimon
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And Balaam said to Balak, '
  - type: note
    content: ver. 1
  - type: text
    content: '“Build for me here seven altars and prepare for me here seven bulls and seven rams.” '
  '3':
  - type: text
    content: 'And Balaam said to Balak, '
  - type: note
    content: ver. 15
  - type: text
    content: '“Stand beside your burnt offering, and I will go. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will come '
  - type: note
    content: '[ch. 24:1]'
  - type: text
    content: 'to meet me, and whatever he shows me I will tell you.” And he went to a bare height, '
  '30':
  - type: note
    content: ver. 2
  - type: text
    content: And Balak did as Balaam had said, and offered a bull and a ram on each altar.
  '4':
  - type: note
    content: ver. 16
  - type: text
    content: 'and God met Balaam. And Balaam said to him, “I have arranged the seven altars and I have offered on each altar a bull and a ram.” '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 12, 16; ch. 22:38; Deut. 18:18; Isa. 51:16; 59:21; Jer. 1:9
  - type: text
    content: 'put a word in Balaam’s mouth and said, “Return to Balak, and thus you shall speak.” '
  '6':
  - type: text
    content: 'And he returned to him, and behold, he and all the princes of Moab were standing beside his burnt offering. '
  '7':
  - type: text
    content: 'And Balaam '
  - type: note
    content: ver. 18; ch. 24:3, 15, 20, 21, 23; Job 27:1; 29:1; Ps. 49:4; 78:2; Isa. 14:4; Mic. 2:4; [ch. 21:27]
  - type: text
    content: took up his discourse and said,
  - type: text
    content: '“From '
  - type: note
    content: '[ch. 22:5]'
  - type: text
    content: Aram Balak has brought me,
  - type: text
    content: 'the king of Moab '
  - type: note
    content: '[Gen. 29:1]'
  - type: text
    content: 'from the eastern mountains:'
  - type: text
    content: '‘Come, '
  - type: note
    content: ch. 22:6
  - type: text
    content: curse Jacob for me,
  - type: text
    content: and come, denounce Israel!’
  '8':
  - type: text
    content: How can I curse whom God has not cursed?
  - type: text
    content: 'How can I denounce whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has not denounced?'
  '9':
  - type: text
    content: 'For from the top of the crags '
  - type: note
    content: '[ch. 24:17]'
  - type: text
    content: I see him,
  - type: text
    content: from the hills I behold him;
  - type: text
    content: 'behold, '
  - type: note
    content: Deut. 32:28
  - type: text
    content: a people dwelling alone,
  - type: text
    content: 'and '
  - type: note
    content: Ex. 33:16; [Ezra 9:2; Esth. 3:8; Eph. 2:14]
  - type: text
    content: not counting itself among the nations!
