document_id: ISA.57,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Futile Idolatry
  - type: text
    content: The righteous man perishes,
  - type: text
    content: and no one lays it to heart;
  - type: note
    content: Ps. 12:1
  - type: text
    content: devout men are taken away,
  - type: text
    content: while no one understands.
  - type: text
    content: For the righteous man is taken away from calamity;
  '10':
  - type: text
    content: You were wearied with the length of your way,
  - type: note
    content: Jer. 2:25; 18:12
  - type: text
    content: but you did not say, “It is hopeless”;
  - type: text
    content: you found new life for your strength,
  - type: text
    content: and so you were not faint.
  - type: note
    content: Hebrew and so you were not sick
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 51:12, 13 ]'
  - type: text
    content: Whom did you dread and fear,
  - type: note
    content: Ps. 78:10, 36
  - type: text
    content: so that you lied,
  - type: text
    content: and did not remember me,
  - type: text
    content: did not lay it to heart?
  - type: note
    content: Ps. 50:21
  - type: text
    content: Have I not held my peace, even for a long time,
  - type: text
    content: and you do not fear me?
  '12':
  - type: text
    content: I will declare your righteousness and your deeds,
  - type: text
    content: but they will not profit you.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Jer. 11:12
  - type: text
    content: When you cry out, let your collection of idols deliver you!
  - type: text
    content: The wind will carry them all off,
  - type: text
    content: a breath will take them away.
  - type: note
    content: Ps. 37:9
  - type: text
    content: But he who takes refuge in me shall possess the land
  - type: text
    content: 'and shall inherit '
  - type: note
    content: ch. 11:9; 56:7; 65:11, 25
  - type: text
    content: my holy mountain.
  - type: heading
    content: Comfort for the Contrite
  '14':
  - type: text
    content: And it shall be said,
  - type: note
    content: ch. 62:10; [ch. 40:3 ]
  - type: text
    content: “Build up, build up, prepare the way,
  - type: text
    content: remove every obstruction from my people’s way.”
  '15':
  - type: text
    content: 'For thus says '
  - type: note
    content: '[Mic. 6:6]'
  - type: text
    content: the One who is high and lifted up,
  - type: text
    content: 'who inhabits eternity, whose name is '
  - type: note
    content: Luke 1:49
  - type: text
    content: 'Holy:'
  - type: note
    content: Ps. 113:6
  - type: text
    content: “I dwell in the high and holy place,
  - type: text
    content: 'and also '
  - type: note
    content: Ps. 34:18; 138:6
  - type: text
    content: with him who is of a contrite and lowly spirit,
  - type: note
    content: '[ch. 42:3 ]'
  - type: text
    content: to revive the spirit of the lowly,
  - type: text
    content: and to revive the heart of the contrite.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Gen. 6:3; Ps. 103:9
  - type: text
    content: For I will not contend forever,
  - type: text
    content: nor will I always be angry;
  - type: text
    content: for the spirit would grow faint before me,
  - type: text
    content: and the breath of life that I made.
  '17':
  - type: text
    content: 'Because of the iniquity of his '
  - type: note
    content: ch. 56:11; Jer. 6:13
  - type: text
    content: unjust gain I was angry,
  - type: text
    content: I struck him; I hid my face and was angry,
  - type: text
    content: but he went on backsliding in the way of his own heart.
  '18':
  - type: text
    content: 'I have seen his ways, '
  - type: note
    content: Jer. 3:22
  - type: text
    content: but I will heal him;
  - type: text
    content: 'I will lead him '
  - type: note
    content: ch. 61:3
  - type: text
    content: and restore comfort to him and his mourners,
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 50:4
  - type: text
    content: 'creating '
  - type: note
    content: Heb. 13:15
  - type: text
    content: the fruit of the lips.
  - type: note
    content: '[ Eph. 2:17 ]'
  - type: text
    content: 'Peace, peace, '
  - type: note
    content: Acts 2:39
  - type: text
    content: 'to the far and to the near,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: “and I will heal him.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 2:29 ]'
  - type: text
    content: he enters into peace;
  - type: text
    content: 'they rest '
  - type: note
    content: 2 Chr. 16:14; Ezek. 32:25
  - type: text
    content: in their beds
  - type: text
    content: who walk in their uprightness.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Jude 13
  - type: text
    content: But the wicked are like the tossing sea;
  - type: text
    content: for it cannot be quiet,
  - type: text
    content: and its waters toss up mire and dirt.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 48:22
  - type: text
    content: There is no peace,” says my God, “for the wicked.”
  '3':
  - type: text
    content: But you, draw near,
  - type: text
    content: sons of the sorceress,
  - type: note
    content: '[ John 8:41, 42 ]'
  - type: text
    content: offspring of the adulterer and the loose woman.
  '4':
  - type: text
    content: Whom are you mocking?
  - type: text
    content: 'Against whom '
  - type: note
    content: '[Ps. 35:21]'
  - type: text
    content: do you open your mouth wide
  - type: text
    content: and stick out your tongue?
  - type: text
    content: 'Are you not children of '
  - type: note
    content: ch. 46:8, 9
  - type: text
    content: transgression,
  - type: note
    content: '[ch. 1:4 ]'
  - type: text
    content: the offspring of deceit,
  '5':
  - type: text
    content: 'you who burn with lust among '
  - type: note
    content: ch. 1:29; 2 Kgs. 16:4
  - type: text
    content: the oaks,
  - type: note
    content: Or among the terebinths
  - type: text
    content: under every green tree,
  - type: note
    content: Ezek. 16:20, 21
  - type: text
    content: who slaughter your children in the valleys,
  - type: text
    content: under the clefts of the rocks?
  '6':
  - type: text
    content: 'Among the smooth stones of '
  - type: note
    content: '[2 Kgs. 23:10]'
  - type: text
    content: the valley is your portion;
  - type: text
    content: they, they, are your lot;
  - type: text
    content: to them you have poured out a drink offering,
  - type: text
    content: you have brought a grain offering.
  - type: text
    content: Shall I relent for these things?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 14:23; Ezek. 16:16, 24
  - type: text
    content: On a high and lofty mountain
  - type: text
    content: you have set your bed,
  - type: text
    content: and there you went up to offer sacrifice.
  '8':
  - type: text
    content: Behind the door and the doorpost
  - type: text
    content: you have set up your memorial;
  - type: text
    content: 'for, deserting me, '
  - type: note
    content: Ezek. 16:25; [Hos. 1:2]
  - type: text
    content: you have uncovered your bed,
  - type: text
    content: you have gone up to it,
  - type: note
    content: '[ Ezek. 23:17 ]'
  - type: text
    content: you have made it wide;
  - type: text
    content: and you have made a covenant for yourself with them,
  - type: text
    content: you have loved their bed,
  - type: text
    content: you have looked on nakedness.
  - type: note
    content: Or on a monument (see 56:5); Hebrew on a hand
  '9':
  - type: text
    content: You journeyed to the king with oil
  - type: text
    content: and multiplied your perfumes;
  - type: note
    content: Ezek. 16:26, 28, 29
  - type: text
    content: you sent your envoys far off,
  - type: text
    content: and sent down even to Sheol.
