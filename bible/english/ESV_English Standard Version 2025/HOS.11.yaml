verses:
  '1':
  - type: heading
    content: The Lord’s Love for Israel
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:15 ]'
  - type: text
    content: 'When Israel was a child, '
  - type: note
    content: Deut. 7:8; [ch. 14:4]
  - type: text
    content: I loved him,
  - type: text
    content: 'and out of Egypt I '
  - type: note
    content: Cited Matt. 2:15
  - type: text
    content: 'called '
  - type: note
    content: Ex. 4:22; [Mal. 1:6]
  - type: text
    content: my son.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:5 ]'
  - type: text
    content: 'They shall go after the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: Isa. 31:4; Jer. 25:30; Joel 3:16; Amos 1:2
  - type: text
    content: he will roar like a lion;
  - type: text
    content: when he roars,
  - type: text
    content: 'his children shall come trembling '
  - type: note
    content: Isa. 11:11; Zech. 8:7
  - type: text
    content: from the west;
  '11':
  - type: text
    content: 'they shall come trembling like birds '
  - type: note
    content: See ch. 8:13
  - type: text
    content: from Egypt,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 60:8
  - type: text
    content: 'like doves '
  - type: note
    content: Zech. 10:6, 10; [ch. 9:3]
  - type: text
    content: from the land of Assyria,
  - type: text
    content: 'and I will return them to their homes, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ch 12:1 in Hebrew
  - type: text
    content: 'Ephraim '
  - type: note
    content: '[ch. 7:13]'
  - type: text
    content: has surrounded me with lies,
  - type: text
    content: and the house of Israel with deceit,
  - type: text
    content: but Judah still walks with God
  - type: text
    content: and is faithful to the Holy One.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 7 ]'
  - type: text
    content: The more they were called,
  - type: text
    content: the more they went away;
  - type: note
    content: '[ch. 2:13; 13:1, 2 ]'
  - type: text
    content: they kept sacrificing to the Baals
  - type: text
    content: and burning offerings to idols.
  '3':
  - type: text
    content: 'Yet it was '
  - type: note
    content: '[ch. 7:15; Deut. 1:31]'
  - type: text
    content: I who taught Ephraim to walk;
  - type: text
    content: I took them up by their arms,
  - type: text
    content: 'but they did not know that '
  - type: note
    content: Ex. 15:26
  - type: text
    content: I healed them.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jer. 31:3; [ John 6:44; 12:32 ]
  - type: text
    content: I led them with cords of kindness,
  - type: note
    content: Or humaneness; Hebrew man
  - type: text
    content: with the bands of love,
  - type: text
    content: 'and '
  - type: note
    content: Lev. 26:13
  - type: text
    content: I became to them as one who eases the yoke on their jaws,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 78:24-29
  - type: text
    content: I bent down to them and fed them.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:13 ]'
  - type: text
    content: They shall not
  - type: note
    content: Or surely
  - type: text
    content: ' return to the land of Egypt,'
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 10:3]'
  - type: text
    content: Assyria shall be their king,
  - type: note
    content: '[ 2 Kgs. 17:13, 14 ]'
  - type: text
    content: 'because '
  - type: note
    content: '[ch. 4:16; 7:16]'
  - type: text
    content: they have refused to return to me.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:14 ]'
  - type: text
    content: The sword shall rage against their cities,
  - type: text
    content: consume the bars of their gates,
  - type: text
    content: 'and devour them '
  - type: note
    content: ch. 10:6
  - type: text
    content: because of their own counsels.
  '7':
  - type: text
    content: 'My people are bent '
  - type: note
    content: ch. 14:4
  - type: text
    content: on turning away from me,
  - type: text
    content: 'and though '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: they call out to the Most High,
  - type: text
    content: he shall not raise them up at all.
  '8':
  - type: text
    content: How can I give you up, O Ephraim?
  - type: text
    content: How can I hand you over, O Israel?
  - type: note
    content: '[ Gen. 19:24, 25; Jer. 49:18; 50:40; Amos 4:11; Jude 7 ]'
  - type: text
    content: 'How can I make you '
  - type: note
    content: Gen. 14:8; Deut. 29:23
  - type: text
    content: like Admah?
  - type: text
    content: 'How can I treat you '
  - type: note
    content: Gen. 14:8; Deut. 29:23
  - type: text
    content: like Zeboiim?
  - type: note
    content: '[ Deut. 32:36 ]'
  - type: text
    content: My heart recoils within me;
  - type: text
    content: my compassion grows warm and tender.
  '9':
  - type: text
    content: I will not execute my burning anger;
  - type: text
    content: I will not again destroy Ephraim;
  - type: note
    content: See Num. 23:19
  - type: text
    content: for I am God and not a man,
  - type: note
    content: See Isa. 12:6
  - type: text
    content: the Holy One in your midst,
  - type: text
    content: and I will not come in wrath.
  - type: note
    content: Or into the city
