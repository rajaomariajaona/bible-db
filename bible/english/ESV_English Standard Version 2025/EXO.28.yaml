      marker-yv: yv-n
    - type: text
      text: ' topaz, and carbuncle shall be the first row; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the second row an emerald, a sapphire, and a diamond; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the third row a jacinth, an agate, and an amethyst; '
