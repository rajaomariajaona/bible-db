      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12, 30
      marker-yv: yv-n
    - type: text
      text: 'So Aaron shall bear the names of the sons of Israel in the breastpiece of judgment on his heart, when he goes into the Holy Place, to bring them to regular '
    - type: usfm
