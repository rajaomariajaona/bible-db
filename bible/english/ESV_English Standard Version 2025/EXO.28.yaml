document_id: EXO.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Priests’ Garments
  - type: text
    content: '“Then bring near to you '
  - type: note
    content: Num. 18:7; Heb. 5:4
  - type: text
    content: 'Aaron your brother, and his sons with him, from among the people of Israel, to serve me as priests—Aaron and Aaron’s sons, '
  - type: note
    content: See ch. 6:23
  - type: text
    content: 'Nadab and Abihu, Eleazar and Ithamar. '
  '10':
  - type: text
    content: 'six of their names on the one stone, and the names of the remaining six on the other stone, in the order of their birth. '
  '11':
  - type: text
    content: 'As a jeweler engraves signets, so shall you engrave the two stones with the names of the sons of Israel. You shall enclose them in settings of gold filigree. '
  '12':
  - type: text
    content: 'And you shall set the two stones on the shoulder pieces of the ephod, as stones of remembrance for the sons of Israel. And '
  - type: note
    content: ver. 29, 30
  - type: text
    content: 'Aaron shall bear their names before the '
  - type: text
    content: Lord
  - type: text
    content: ' on his two shoulders '
  - type: note
    content: '[Num. 16:40; Josh. 4:7; Zech. 6:14]'
  - type: text
    content: 'for remembrance. '
  '13':
  - type: text
    content: 'You shall make settings of gold filigree, '
  '14':
  - type: text
    content: and two chains of pure gold, twisted like cords; and you shall attach the corded chains to the settings.
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15-28, see ch. 39:8-21
  - type: text
    content: '“You shall make a breastpiece of judgment, in skilled work. In the style of the ephod you shall make it—of gold, blue and purple and scarlet yarns, and fine twined linen shall you make it. '
  '16':
  - type: text
    content: It shall be square and doubled, a span
  - type: note
    content: A span was about 9 inches or 22 centimeters
  - type: text
    content: ' its length and a span its breadth. '
  '17':
  - type: note
    content: '[Ezek. 28:13; Rev. 21:19, 20]'
  - type: text
    content: You shall set in it four rows of stones. A row of sardius,
  - type: note
    content: The identity of some of these stones is uncertain
  - type: text
    content: ' topaz, and carbuncle shall be the first row; '
  '18':
  - type: text
    content: 'and the second row an emerald, a sapphire, and a diamond; '
  '19':
  - type: text
    content: 'and the third row a jacinth, an agate, and an amethyst; '
  '2':
  - type: note
    content: ver. 40; ch. 29:29; 31:10; 39:1, 2; Lev. 8:7, 30; Num. 20:26, 28; See ch. 29:5-9
  - type: text
    content: 'And you shall make holy garments for Aaron your brother, for glory and for beauty. '
  '20':
  - type: text
    content: 'and the fourth row a beryl, an onyx, and a jasper. They shall be set in gold filigree. '
  '21':
  - type: text
    content: 'There shall be twelve stones with their names according to the names of the sons of Israel. They shall be like signets, each engraved with its name, for the twelve tribes. '
  '22':
  - type: text
    content: 'You shall make for the breastpiece twisted chains like cords, of pure gold. '
  '23':
  - type: text
    content: 'And you shall make for the breastpiece two rings of gold, and put the two rings on the two edges of the breastpiece. '
  '24':
  - type: text
    content: 'And you shall put the two cords of gold in the two rings at the edges of the breastpiece. '
  '25':
  - type: text
    content: 'The two ends of the two cords you shall attach to the two settings of filigree, and so attach it in front to the shoulder pieces of the ephod. '
  '26':
  - type: text
    content: 'You shall make two rings of gold, and put them at the two ends of the breastpiece, on its inside edge next to the ephod. '
  '27':
  - type: text
    content: 'And you shall make two rings of gold, and attach them in front to the lower part of the two shoulder pieces of the ephod, at its seam above the '
  - type: note
    content: ver. 8
  - type: text
    content: 'skillfully woven band of the ephod. '
  '28':
  - type: text
    content: 'And they shall bind the breastpiece by its rings to the rings of the ephod with a lace of blue, so that it may lie on the skillfully woven band of the ephod, so that the breastpiece shall not come loose from the ephod. '
  '29':
  - type: note
    content: ver. 12, 30
  - type: text
    content: 'So Aaron shall bear the names of the sons of Israel in the breastpiece of judgment on his heart, when he goes into the Holy Place, to bring them to regular '
  - type: note
    content: See ver. 12
  - type: text
    content: 'remembrance before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'You shall speak to all the '
  - type: note
    content: ch. 31:6; 35:10, 25; 36:1
  - type: text
    content: 'skillful, whom I have filled with a spirit of skill, that they make Aaron’s garments to consecrate him for my priesthood. '
  '30':
  - type: text
    content: 'And in the breastpiece of judgment '
  - type: note
    content: Lev. 8:8; Num. 27:21; Deut. 33:8; 1 Sam. 28:6; Ezra 2:63; Neh. 7:65; [1 Sam. 23:9; 30:7, 8]
  - type: text
    content: 'you shall put the Urim and the Thummim, and they shall be on Aaron’s heart, when he goes in before the '
  - type: text
    content: Lord
  - type: text
    content: '. Thus Aaron shall bear the judgment of the people of Israel on his heart before the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-37, see ch. 39:22-31
  - type: text
    content: '“You shall make the robe of the ephod all of blue. '
  '32':
  - type: text
    content: It shall have an opening for the head in the middle of it, with a woven binding around the opening, like the opening in a garment,
  - type: note
    content: The meaning of the Hebrew word is uncertain; possibly coat of mail
  - type: text
    content: ' so that it may not tear. '
  '33':
  - type: text
    content: 'On its hem you shall make pomegranates of blue and purple and scarlet yarns, around its hem, with bells of gold between them, '
  '34':
  - type: text
    content: 'a golden bell and a pomegranate, a golden bell and a pomegranate, around the hem of the robe. '
  '35':
  - type: text
    content: 'And it shall be on Aaron when he ministers, and its sound shall be heard when he goes into the Holy Place before the '
  - type: text
    content: Lord
  - type: text
    content: ', and when he comes out, so that he does not die.'
  '36':
  - type: text
    content: '“You shall make '
  - type: note
    content: Lev. 8:9
  - type: text
    content: 'a plate of pure gold and engrave on it, like the engraving of a signet, '
  - type: note
    content: Zech. 14:20
  - type: text
    content: '‘Holy to the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '37':
  - type: text
    content: 'And you shall fasten it on the turban by a cord of blue. It shall be on the front of the turban. '
  '38':
  - type: text
    content: 'It shall be on Aaron’s forehead, and Aaron shall '
  - type: note
    content: Lev. 10:17; Num. 18:1; [Isa. 53:11; Ezek. 4:4-6; John 1:29; Heb. 9:28; 1 Pet. 2:24]
  - type: text
    content: 'bear any guilt from the holy things that the people of Israel consecrate as their holy gifts. It shall regularly be on his forehead, that they may be accepted before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '39':
  - type: text
    content: “You shall weave the coat in checker work of fine linen, and you shall make a turban of fine linen, and you shall make a sash embroidered with needlework.
  '4':
  - type: text
    content: 'These are the garments that they shall make: a '
  - type: note
    content: ver. 15
  - type: text
    content: 'breastpiece, an '
  - type: note
    content: ver. 6
  - type: text
    content: 'ephod, '
  - type: note
    content: ver. 31
  - type: text
    content: 'a robe, '
  - type: note
    content: ver. 39; [Lev. 8:7]
  - type: text
    content: 'a coat of checker work, '
  - type: note
    content: ver. 39; [Lev. 8:7]
  - type: text
    content: 'a turban, and '
  - type: note
    content: ver. 39; [Lev. 8:7]
  - type: text
    content: 'a sash. They shall make holy garments for Aaron your brother and his sons to serve me as priests. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: ch. 39:27-29, 41; [ Ezek. 44:17, 18 ]
  - type: text
    content: '“For Aaron’s sons you shall make coats and sashes and caps. You shall make them '
  - type: note
    content: ver. 2
  - type: text
    content: 'for glory and beauty. '
  '41':
  - type: text
    content: 'And you shall put them on Aaron your brother, and on his sons with him, and shall '
  - type: note
    content: ch. 29:7; 30:30; 40:13, 15; Lev. 10:7
  - type: text
    content: 'anoint them and ordain them and '
  - type: note
    content: ch. 29:9; Heb. 7:28; [Lev. 21:10]
  - type: text
    content: 'consecrate them, that they may serve me as priests. '
  '42':
  - type: text
    content: 'You shall make for them '
  - type: note
    content: Lev. 6:10; 16:4; [Ezek. 44:18]
  - type: text
    content: 'linen undergarments to cover their naked flesh. They shall reach from the hips to the thighs; '
  '43':
  - type: text
    content: 'and they shall be on Aaron and on his sons when they go into the tent of meeting or when they come near the altar to minister in the Holy Place, lest they '
  - type: note
    content: Lev. 5:1, 17; 20:19
  - type: text
    content: 'bear guilt and die. '
  - type: note
    content: ch. 27:21
  - type: text
    content: This shall be a statute forever for him and for his offspring after him.
  '5':
  - type: text
    content: 'They shall receive '
  - type: note
    content: ch. 25:3
  - type: text
    content: gold, blue and purple and scarlet yarns, and fine twined linen.
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-12, see ch. 39:2-7
  - type: text
    content: '“And they shall make the ephod of gold, of blue and purple and scarlet yarns, and of fine twined linen, skillfully worked. '
  '7':
  - type: text
    content: 'It shall have two shoulder pieces attached to its two edges, so that it may be joined together. '
  '8':
  - type: text
    content: 'And the '
  - type: note
    content: ver. 27, 28; ch. 29:5; 39:5; Lev. 8:7
  - type: text
    content: 'skillfully woven band on it shall be made like it and be of one piece with it, of gold, blue and purple and scarlet yarns, and fine twined linen. '
  '9':
  - type: text
    content: 'You shall take two onyx stones, and engrave on them the names of the sons of Israel, '
