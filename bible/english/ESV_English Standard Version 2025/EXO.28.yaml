      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: You shall set in it four rows of stones. A row of sardius,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
