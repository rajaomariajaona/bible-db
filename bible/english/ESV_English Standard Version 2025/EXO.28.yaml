      marker-yv: yv-n
    - type: text
      text: 'Nadab and Abihu, Eleazar and Ithamar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'six of their names on the one stone, and the names of the remaining six on the other stone, in the order of their birth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As a jeweler engraves signets, so shall you engrave the two stones with the names of the sons of Israel. You shall enclose them in settings of gold filigree. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall set the two stones on the shoulder pieces of the ephod, as stones of remembrance for the sons of Israel. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29, 30
      marker-yv: yv-n
    - type: text
      text: 'Aaron shall bear their names before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on his two shoulders '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
