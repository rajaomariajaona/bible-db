      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'for remembrance. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make settings of gold filigree, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and two chains of pure gold, twisted like cords; and you shall attach the corded chains to the settings.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 15-28, see ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:8-21
      marker-yv: yv-n
    - type: text
      text: '“You shall make a breastpiece of judgment, in skilled work. In the style of the ephod you shall make it—of gold, blue and purple and scarlet yarns, and fine twined linen shall you make it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It shall be square and doubled, a span
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'span '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 9 inches or 22 centimeters
      marker-yv: yv-n
    - type: text
      text: ' its length and a span its breadth. '
