    - type: text
      text: 'And you shall make holy garments for Aaron your brother, for glory and for beauty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the fourth row a beryl, an onyx, and a jasper. They shall be set in gold filigree. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall be twelve stones with their names according to the names of the sons of Israel. They shall be like signets, each engraved with its name, for the twelve tribes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make for the breastpiece twisted chains like cords, of pure gold. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make for the breastpiece two rings of gold, and put the two rings on the two edges of the breastpiece. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall put the two cords of gold in the two rings at the edges of the breastpiece. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two ends of the two cords you shall attach to the two settings of filigree, and so attach it in front to the shoulder pieces of the ephod. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make two rings of gold, and put them at the two ends of the breastpiece, on its inside edge next to the ephod. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make two rings of gold, and attach them in front to the lower part of the two shoulder pieces of the ephod, at its seam above the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'skillfully woven band of the ephod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall bind the breastpiece by its rings to the rings of the ephod with a lace of blue, so that it may lie on the skillfully woven band of the ephod, so that the breastpiece shall not come loose from the ephod. '
  '29':
  - type: usfm
