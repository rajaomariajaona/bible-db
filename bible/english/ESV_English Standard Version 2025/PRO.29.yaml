document_id: PRO.29,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Sam. 2:25 ]; See ch. 1:24-27'
  - type: text
    content: He who is often reproved, yet stiffens his neck,
  - type: text
    content: 'will suddenly be '
  - type: note
    content: '[Isa. 30:14; Jer. 19:11]'
  - type: text
    content: 'broken '
  - type: note
    content: ch. 6:15
  - type: text
    content: beyond healing.
  '10':
  - type: text
    content: 'Bloodthirsty men '
  - type: note
    content: '[Gen. 4:5, 8; 1 John 3:12]'
  - type: text
    content: hate one who is blameless
  - type: text
    content: and seek the life of the upright.
  - type: note
    content: Or but the upright seek his soul
  '11':
  - type: text
    content: A fool gives full vent to his spirit,
  - type: text
    content: but a wise man quietly holds it back.
  '12':
  - type: text
    content: If a ruler listens to falsehood,
  - type: text
    content: all his officials will be wicked.
  '13':
  - type: text
    content: 'The poor man and the oppressor '
  - type: note
    content: '[ch. 22:2]'
  - type: text
    content: meet together;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 13:3; See Job 25:3
  - type: text
    content: gives light to the eyes of both.
  '14':
  - type: text
    content: 'If a king '
  - type: note
    content: '[Ps. 72:4]'
  - type: text
    content: faithfully judges the poor,
  - type: text
    content: 'his throne will '
  - type: note
    content: '[ver. 4]; See ch. 16:12'
  - type: text
    content: be established forever.
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ver. 17
  - type: text
    content: The rod and reproof give wisdom,
  - type: text
    content: 'but a child left to himself '
  - type: note
    content: ch. 10:1; 17:25
  - type: text
    content: brings shame to his mother.
  '16':
  - type: text
    content: When the wicked increase, transgression increases,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 37:34, 36; 58:10; 91:8; 92:11
  - type: text
    content: the righteous will look upon their downfall.
  '17':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:24
  - type: text
    content: Discipline your son, and he will give you rest;
  - type: text
    content: he will give delight to your heart.
  '18':
  - type: text
    content: 'Where '
  - type: note
    content: 1 Sam. 3:1; [2 Chr. 15:3; Ps. 74:9; Amos 8:11, 12]
  - type: text
    content: 'there is no prophetic vision the people '
  - type: note
    content: Ex. 32:25
  - type: text
    content: cast off restraint,
  - type: note
    content: Or the people are discouraged
  - type: text
    content: 'but blessed is he who '
  - type: note
    content: Luke 11:28; John 13:17; James 1:25
  - type: text
    content: keeps the law.
  '19':
  - type: text
    content: By mere words a servant is not disciplined,
  - type: text
    content: for though he understands, he will not respond.
  '2':
  - type: text
    content: 'When '
  - type: note
    content: ch. 11:10; 28:12, 28; [Esth. 8:15]
  - type: text
    content: the righteous increase, the people rejoice,
  - type: text
    content: 'but when '
  - type: note
    content: '[Esth. 3:15]'
  - type: text
    content: the wicked rule, the people groan.
  '20':
  - type: text
    content: Do you see a man who is hasty in his words?
  - type: note
    content: ch. 26:12
  - type: text
    content: There is more hope for a fool than for him.
  '21':
  - type: text
    content: Whoever pampers his servant from childhood
  - type: text
    content: will in the end find him his heir.
  - type: note
    content: The meaning of the Hebrew word rendered his heir is uncertain
  '22':
  - type: text
    content: ' '
  - type: note
    content: See ch. 15:18
  - type: text
    content: A man of wrath stirs up strife,
  - type: text
    content: and one given to anger causes much transgression.
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:19; 2 Sam. 22:28; Matt. 23:12; James 4:6; See ch. 11:2
  - type: text
    content: One’s pride will bring him low,
  - type: note
    content: ch. 15:33; 18:12
  - type: text
    content: but he who is lowly in spirit will obtain honor.
  '24':
  - type: text
    content: 'The partner of a thief '
  - type: note
    content: See ch. 8:36
  - type: text
    content: hates his own life;
  - type: note
    content: See Lev. 5:1
  - type: text
    content: he hears the curse, but discloses nothing.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Luke 12:4; [ Gen. 12:12, 13; 20:2, 11; 26:7; John 12:42, 43 ]
  - type: text
    content: The fear of man lays a snare,
  - type: text
    content: 'but whoever trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ' is safe.'
  '26':
  - type: text
    content: 'Many '
  - type: note
    content: ch. 19:6
  - type: text
    content: seek the face of a ruler,
  - type: text
    content: 'but it is from the '
  - type: text
    content: Lord
  - type: text
    content: ' that a man '
  - type: note
    content: Isa. 49:4; 1 Cor. 4:4, 5
  - type: text
    content: gets justice.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Cor. 6:14 ]'
  - type: text
    content: An unjust man is an abomination to the righteous,
  - type: text
    content: but one whose way is straight is an abomination to the wicked.
  '3':
  - type: text
    content: 'He who '
  - type: note
    content: '[ch. 10:1; 15:20; 27:11; 28:7]'
  - type: text
    content: loves wisdom makes his father glad,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 5:9, 10; 6:26]'
  - type: text
    content: 'a companion of prostitutes '
  - type: note
    content: Luke 15:13, 30
  - type: text
    content: squanders his wealth.
  '4':
  - type: text
    content: 'By justice a king '
  - type: note
    content: '[ver. 14; 2 Chr. 9:8]'
  - type: text
    content: builds up the land,
  - type: text
    content: but he who exacts gifts
  - type: note
    content: Or who taxes heavily
  - type: text
    content: ' tears it down.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:23
  - type: text
    content: A man who flatters his neighbor
  - type: text
    content: 'spreads '
  - type: note
    content: '[Ps. 9:15]'
  - type: text
    content: a net for his feet.
  '6':
  - type: text
    content: 'An evil man is '
  - type: note
    content: '[Eccles. 9:12]'
  - type: text
    content: ensnared in his transgression,
  - type: text
    content: 'but a righteous man '
  - type: note
    content: '[Ex. 15:1, 21; Ps. 35:27]'
  - type: text
    content: sings and rejoices.
  '7':
  - type: text
    content: 'A righteous man '
  - type: note
    content: Job 29:16; Ps. 41:1
  - type: text
    content: knows the rights of the poor;
  - type: text
    content: 'a wicked man does not '
  - type: note
    content: '[ch. 28:27]'
  - type: text
    content: understand such knowledge.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:11 ]'
  - type: text
    content: Scoffers set a city aflame,
  - type: text
    content: but the wise turn away wrath.
  '9':
  - type: text
    content: If a wise man has an argument with a fool,
  - type: text
    content: 'the fool only rages and laughs, and there is '
  - type: note
    content: '[Eccles. 4:6]'
  - type: text
    content: no quiet.
