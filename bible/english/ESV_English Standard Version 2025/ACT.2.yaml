document_id: ACT.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming of the Holy Spirit
  - type: text
    content: 'When '
  - type: note
    content: ch. 20:16; 1 Cor. 16:8; [Lev. 23:15]
  - type: text
    content: 'the day of Pentecost arrived, they were all together in one place. '
  '10':
  - type: text
    content: 'Phrygia and Pamphylia, Egypt and the parts of Libya belonging to Cyrene, and visitors from Rome, '
  '11':
  - type: text
    content: 'both Jews and '
  - type: note
    content: ch. 6:5; 13:43; Matt. 23:15
  - type: text
    content: 'proselytes, Cretans and Arabians—we hear them telling in our own tongues the mighty works of God.” '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ver. 7
  - type: text
    content: 'all were amazed and perplexed, saying to one another, “What does this mean?” '
  '13':
  - type: text
    content: 'But others '
  - type: note
    content: '[ch. 17:32; 1 Cor. 14:23]'
  - type: text
    content: mocking said, “They are filled with new wine.”
  - type: heading
    content: Peter’s Sermon at Pentecost
  '14':
  - type: text
    content: 'But Peter, standing with the eleven, lifted up his voice and addressed them: “Men of Judea and all who dwell in Jerusalem, let this be known to you, and give ear to my words. '
  '15':
  - type: text
    content: 'For these people are not drunk, as you suppose, '
  - type: note
    content: '[1 Thess. 5:7]'
  - type: text
    content: since it is only the third hour of the day.
  - type: note
    content: That is, 9 a.m.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But this is what was uttered through the prophet Joel:'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cited from Joel 2:28-32
  - type: text
    content: “‘And in the last days it shall be, God declares,
  - type: note
    content: ver. 18, 33 ; Isa. 32:15; 44:3; Ezek. 36:27; See Rom. 5:5
  - type: text
    content: 'that I will pour out my Spirit '
  - type: note
    content: '[ch. 10:45; Titus 3:6]'
  - type: text
    content: on all flesh,
  - type: text
    content: 'and your sons and '
  - type: note
    content: ch. 21:9
  - type: text
    content: your daughters shall prophesy,
  - type: text
    content: and your young men shall see visions,
  - type: text
    content: and your old men shall dream dreams;
  '18':
  - type: text
    content: even on my male servants and female servants
  - type: text
    content: 'in those days I will pour out my Spirit, and '
  - type: note
    content: ch. 11:28; 21:10; 1 Cor. 12:10
  - type: text
    content: they shall prophesy.
  '19':
  - type: text
    content: And I will show wonders in the heavens above
  - type: text
    content: and signs on the earth below,
  - type: text
    content: blood, and fire, and vapor of smoke;
  '2':
  - type: text
    content: 'And suddenly there came from heaven a sound like '
  - type: note
    content: '[1 Kgs. 19:11; Job 38:1; Ezek. 1:4]'
  - type: text
    content: 'a mighty rushing wind, and '
  - type: note
    content: '[ch. 4:31; 16:26]'
  - type: text
    content: 'it filled the entire house where they were sitting. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 24:29
  - type: text
    content: the sun shall be turned to darkness
  - type: text
    content: and the moon to blood,
  - type: text
    content: 'before '
  - type: note
    content: '[1 Thess. 5:2; Rev. 16:14]'
  - type: text
    content: the day of the Lord comes, the great and magnificent day.
  '21':
  - type: text
    content: 'And it shall come to pass that '
  - type: note
    content: Rom. 10:13; [ch. 16:31]
  - type: text
    content: everyone who calls upon the name of the Lord shall be saved.’
  '22':
  - type: text
    content: '“Men of Israel, hear these words: Jesus of Nazareth, '
  - type: note
    content: See John 3:2
  - type: text
    content: 'a man attested to you by God '
  - type: note
    content: ch. 10:38; Luke 24:19
  - type: text
    content: 'with '
  - type: note
    content: 2 Cor. 12:12; 2 Thess. 2:9; Heb. 2:4
  - type: text
    content: 'mighty works and wonders and signs that '
  - type: note
    content: '[Matt. 12:28]'
  - type: text
    content: 'God did through him in your midst, as you yourselves know— '
  '23':
  - type: text
    content: this Jesus,
  - type: note
    content: Greek this one
  - type: text
    content: ' '
  - type: note
    content: Matt. 26:24; [ch. 3:13; Matt. 20:19]; See Luke 24:20
  - type: text
    content: 'delivered up according to '
  - type: note
    content: Luke 22:22; [ch. 3:18; 4:28; 13:27]
  - type: text
    content: 'the definite plan and '
  - type: note
    content: 1 Pet. 1:2; [1 Pet. 1:20; Rev. 13:8]
  - type: text
    content: 'foreknowledge of God, '
  - type: note
    content: See ch. 5:30
  - type: text
    content: 'you crucified and killed by the hands of lawless men. '
  '24':
  - type: note
    content: ver. 32; ch. 3:15; 4:10; 10:40; 13:30, 33, 34, 37; 17:31; Rom. 4:24; 6:4; 8:11; 10:9; 1 Cor. 6:14; 15:15; 2 Cor. 4:14; Gal. 1:1; Eph. 1:20; Col. 2:12; 1 Thess. 1:10; Heb. 13:20; 1 Pet. 1:21; [Eph. 2:5]
  - type: text
    content: 'God raised him up, loosing the pangs of death, because '
  - type: note
    content: '[Luke 24:5; John 10:18; 2 Tim. 1:10; Heb. 2:14; Rev. 1:17, 18]'
  - type: text
    content: 'it was not possible for him to be held by it. '
  '25':
  - type: text
    content: For David says concerning him,
  - type: note
    content: Cited from Ps. 16:8-11
  - type: text
    content: “‘I saw the Lord always before me,
  - type: text
    content: for he is at my right hand that I may not be shaken;
  '26':
  - type: text
    content: therefore my heart was glad, and my tongue rejoiced;
  - type: text
    content: 'my flesh also will dwell '
  - type: note
    content: Rom. 4:18
  - type: text
    content: in hope.
  '27':
  - type: text
    content: 'For you will not abandon my soul to '
  - type: note
    content: ver. 31; See Matt. 11:23
  - type: text
    content: Hades,
  - type: note
    content: ch. 13:35
  - type: text
    content: 'or let your '
  - type: note
    content: See Heb. 7:26
  - type: text
    content: 'Holy One '
  - type: note
    content: '[Luke 2:26]'
  - type: text
    content: see corruption.
  '28':
  - type: text
    content: You have made known to me the paths of life;
  - type: text
    content: you will make me full of gladness with your presence.’
  '29':
  - type: text
    content: '“Brothers, I may say to you with confidence about '
  - type: note
    content: ch. 7:8, 9; Heb. 7:4
  - type: text
    content: 'the patriarch David '
  - type: note
    content: '[ch. 13:36]'
  - type: text
    content: 'that he both died and '
  - type: note
    content: 1 Kgs. 2:10
  - type: text
    content: 'was buried, and '
  - type: note
    content: Neh. 3:16
  - type: text
    content: 'his tomb is with us to this day. '
  '3':
  - type: text
    content: 'And divided tongues '
  - type: note
    content: Matt. 3:11
  - type: text
    content: as of fire appeared to them and rested
  - type: note
    content: Or And tongues as of fire appeared to them, distributed among them, and rested
  - type: text
    content: ' on each one of them. '
  '30':
  - type: note
    content: '[2 Sam. 23:2; Matt. 22:43; Heb. 11:32]'
  - type: text
    content: 'Being therefore a prophet, and knowing that '
  - type: note
    content: See Luke 1:32
  - type: text
    content: 'God had sworn with an oath to him that he would set one of his descendants on his throne, '
  '31':
  - type: text
    content: 'he foresaw and spoke about the resurrection of the Christ, that '
  - type: note
    content: ver. 27
  - type: text
    content: 'he was not abandoned to Hades, nor did his flesh see corruption. '
  '32':
  - type: text
    content: 'This Jesus '
  - type: note
    content: ver. 24
  - type: text
    content: 'God raised up, '
  - type: note
    content: ch. 1:22; 4:33
  - type: text
    content: 'and of that we all are witnesses. '
  '33':
  - type: note
    content: ch. 5:31; Eph. 1:20; Phil. 2:9; Heb. 2:9; 1 Pet. 3:22
  - type: text
    content: 'Being therefore '
  - type: note
    content: Ex. 15:6; Ps. 98:1
  - type: text
    content: 'exalted at the right hand of God, and having received from '
  - type: note
    content: ch. 1:4; [John 16:7]
  - type: text
    content: 'the Father '
  - type: note
    content: Gal. 3:14
  - type: text
    content: 'the promise of the Holy Spirit, '
  - type: note
    content: ver. 17
  - type: text
    content: 'he has poured out this that you yourselves are seeing and hearing. '
  '34':
  - type: text
    content: 'For '
  - type: note
    content: '[John 3:13]'
  - type: text
    content: David did not ascend into the heavens, but he himself says,
  - type: note
    content: Cited from Ps. 110:1
  - type: text
    content: “‘The Lord said to my Lord,
  - type: text
    content: “Sit at my right hand,
  '35':
  - type: text
    content: until I make your enemies your footstool.”’
  '36':
  - type: text
    content: 'Let all the house of Israel therefore know for certain that '
  - type: note
    content: See Matt. 28:18
  - type: text
    content: 'God has made him '
  - type: note
    content: Rom. 14:9; 2 Cor. 4:5
  - type: text
    content: 'both Lord and Christ, this Jesus '
  - type: note
    content: ver. 23
  - type: text
    content: whom you crucified.”
  '37':
  - type: text
    content: 'Now when '
  - type: note
    content: '[ch. 5:33; 7:54]'
  - type: text
    content: 'they heard this they were cut to the heart, and said to Peter and the rest of the apostles, “Brothers, '
  - type: note
    content: ch. 16:30; Luke 3:10
  - type: text
    content: 'what shall we do?” '
  '38':
  - type: text
    content: 'And Peter said to them, '
  - type: note
    content: ch. 3:19; 20:21; 26:18, 20; Luke 24:47
  - type: text
    content: '“Repent and '
  - type: note
    content: ch. 22:16; [ch. 8:12]; See Mark 16:16
  - type: text
    content: 'be baptized every one of you '
  - type: note
    content: ch. 10:48; See ch. 8:16
  - type: text
    content: 'in the name of Jesus Christ '
  - type: note
    content: See Mark 1:4
  - type: text
    content: 'for the forgiveness of your sins, and you will receive '
  - type: note
    content: ch. 10:45; [ch. 8:15, 20; 11:17]; See John 7:39
  - type: text
    content: 'the gift of the Holy Spirit. '
  '39':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 9:4
  - type: text
    content: 'the promise is for you and '
  - type: note
    content: ch. 3:25; Isa. 54:13; [Isa. 44:3]
  - type: text
    content: 'for your children and for all '
  - type: note
    content: ch. 22:21; Isa. 57:19; Eph. 2:13, 17
  - type: text
    content: 'who are far off, everyone '
  - type: note
    content: Joel 2:32; Rom. 8:30
  - type: text
    content: 'whom the Lord our God calls to himself.” '
  '4':
  - type: text
    content: 'And they were all '
  - type: note
    content: ch. 4:31; 13:52
  - type: text
    content: 'filled with the Holy Spirit and began '
  - type: note
    content: See Mark 16:17
  - type: text
    content: 'to speak in other tongues '
  - type: note
    content: '[1 Cor. 12:10, 11]'
  - type: text
    content: as the Spirit gave them utterance.
  '40':
  - type: text
    content: 'And with many other words he bore witness and continued to exhort them, saying, '
  - type: note
    content: '[ver. 21, 47]'
  - type: text
    content: '“Save yourselves from this '
  - type: note
    content: Deut. 32:5; Matt. 17:17; Phil. 2:15
  - type: text
    content: 'crooked generation.” '
  '41':
  - type: text
    content: 'So those who received his word were baptized, and '
  - type: note
    content: ver. 47
  - type: text
    content: there were added that day about three thousand souls.
  - type: heading
    content: The Fellowship of the Believers
  '42':
  - type: text
    content: 'And '
  - type: note
    content: '[Heb. 10:25]; See ch. 1:14'
  - type: text
    content: 'they devoted themselves to the apostles’ '
  - type: note
    content: See 1 Cor. 14:6
  - type: text
    content: 'teaching and the '
  - type: note
    content: Gal. 2:9; Phil. 1:5; 1 John 1:3
  - type: text
    content: 'fellowship, to '
  - type: note
    content: Luke 24:35; [ver. 46]; See ch. 20:7
  - type: text
    content: 'the breaking of bread and the prayers. '
  '43':
  - type: text
    content: And awe
  - type: note
    content: Or fear
  - type: text
    content: ' came upon every soul, and '
  - type: note
    content: See Mark 16:20
  - type: text
    content: 'many wonders and signs were being done through the apostles. '
  '44':
  - type: text
    content: 'And all who believed were together and '
  - type: note
    content: ch. 4:32, 34, 35; [Matt. 19:21]
  - type: text
    content: 'had all things in common. '
  '45':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 44 above]'
  - type: text
    content: 'they were selling their possessions and belongings and distributing the proceeds to all, as any had need. '
  '46':
  - type: text
    content: 'And day by day, '
  - type: note
    content: ch. 3:1; 5:21, 42; Luke 24:53
  - type: text
    content: 'attending the temple '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'together and '
  - type: note
    content: '[ver. 42]'
  - type: text
    content: 'breaking bread in their homes, they received their food '
  - type: note
    content: '[ch. 16:34]; See John 16:22'
  - type: text
    content: 'with glad and generous hearts, '
  '47':
  - type: text
    content: 'praising God and '
  - type: note
    content: ch. 5:13
  - type: text
    content: 'having favor with all the people. And the Lord '
  - type: note
    content: ver. 41; ch. 5:14; 11:24
  - type: text
    content: 'added to their number '
  - type: note
    content: ch. 16:5
  - type: text
    content: 'day by day those who '
  - type: note
    content: 1 Cor. 1:18; [ver. 21, 40; ch. 16:31]
  - type: text
    content: were being saved.
  '5':
  - type: text
    content: 'Now there were dwelling in Jerusalem Jews, devout men from every nation under heaven. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: ver. 2
  - type: text
    content: 'at this sound the multitude came together, and they were bewildered, because each one was hearing them speak in his own language. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ver. 12
  - type: text
    content: 'they were amazed and astonished, saying, “Are not all these who are speaking '
  - type: note
    content: ch. 1:11; [Matt. 26:73]
  - type: text
    content: 'Galileans? '
  '8':
  - type: text
    content: 'And how is it that we hear, each of us in his own native language? '
  '9':
  - type: text
    content: 'Parthians and '
  - type: note
    content: 2 Kgs. 17:6
  - type: text
    content: 'Medes and '
  - type: note
    content: Gen. 14:1, 9; Isa. 11:11; Dan. 8:2
  - type: text
    content: 'Elamites and residents of Mesopotamia, Judea and Cappadocia, Pontus and Asia, '
