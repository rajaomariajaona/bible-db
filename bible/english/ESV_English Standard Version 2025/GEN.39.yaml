    children:
    - type: text
      text: Joseph and Potiphar’s Wife
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph had been brought down to Egypt, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:36
      marker-yv: yv-n
    - type: text
      text: 'Potiphar, an officer of Pharaoh, the captain of the guard, an Egyptian, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:28
      marker-yv: yv-n
    - type: text
      text: 'had bought him from the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:25
      marker-yv: yv-n
    - type: text
      text: 'Ishmaelites who had brought him down there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as she spoke to Joseph day after day, he '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 1:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: would not listen to her, to lie beside her or to be with her.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one day, when he went into the house to do his work and none of the men of the house was there in the house, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 7:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'she caught him by his garment, saying, “Lie with me.” But he left his garment in her hand and fled and got out of the house. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as soon as she saw that he had left his garment in her hand and had fled out of the house, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'she called to the men of her household and said to them, “See, he has brought among us a Hebrew to laugh at us. He came in to me to lie with me, and I cried out with a loud voice. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as soon as he heard that I lifted up my voice and cried out, he left his garment beside me and fled and got out of the house.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she laid up his garment by her until his master came home, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and she told him the same story, saying, “The Hebrew servant, whom you have brought among us, came in to me to laugh at me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But as soon as I lifted up my voice and cried, he left his garment beside me and fled out of the house.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as his master heard the words that his wife spoke to him, “This is the way your servant treated me,” his anger was kindled. '
