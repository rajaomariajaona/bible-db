        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joseph, and he became a successful man, and he was in the house of his Egyptian master. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph’s master took him and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 105:18
      marker-yv: yv-n
    - type: text
      text: 'put him into the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'prison, the place where the king’s prisoners were confined, and he was there in prison. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joseph and showed him steadfast love '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 3:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:36
      marker-yv: yv-n
    - type: text
      text: 'and gave him favor in the sight of the keeper of the prison. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the keeper of the prison '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:4
      marker-yv: yv-n
    - type: text
      text: 'put Joseph in charge of all the prisoners who were in the prison. Whatever was done there, he was the one who did it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The keeper of the prison paid no attention to anything that was in Joseph’s charge, because '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2, 3
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him. And whatever he did, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made it succeed.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His master saw that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him and that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 26:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 1:3
      marker-yv: yv-n
    - type: text
      text: 'caused all that he did to succeed in his hands. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:10
      marker-yv: yv-n
    - type: text
      text: 'found favor in his sight and attended him, and he made him overseer of his house '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'and put him in charge of all that he had. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the time that he made him overseer in his house and over all that he had, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed the Egyptian’s house '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:27
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'for Joseph’s sake; the blessing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was on all that he had, in house and field. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he left all that he had in Joseph’s charge, and because of him he had no concern about anything but the food he ate.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 16:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'handsome in form and appearance. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after a time his master’s wife cast her eyes on Joseph and said, “Lie with me.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he refused and said to his master’s wife, “Behold, because of me my master has no concern about anything in the house, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'he has put everything that he has in my charge. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is not greater in this house than I am, nor has he kept back anything from me except you, because you are his wife. How then can I do this great wickedness and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 12:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 51:4
      marker-yv: yv-n
    - type: text
      text: 'sin against God?” '
