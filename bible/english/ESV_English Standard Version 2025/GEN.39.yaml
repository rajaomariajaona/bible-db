document_id: GEN.39,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph and Potiphar’s Wife
  - type: text
    content: 'Now Joseph had been brought down to Egypt, and '
  - type: note
    content: ch. 37:36
  - type: text
    content: 'Potiphar, an officer of Pharaoh, the captain of the guard, an Egyptian, '
  - type: note
    content: ch. 37:28
  - type: text
    content: 'had bought him from the '
  - type: note
    content: ch. 37:25
  - type: text
    content: 'Ishmaelites who had brought him down there. '
  '10':
  - type: text
    content: 'And as she spoke to Joseph day after day, he '
  - type: note
    content: '[Prov. 1:10]'
  - type: text
    content: would not listen to her, to lie beside her or to be with her.
  '11':
  - type: text
    content: 'But one day, when he went into the house to do his work and none of the men of the house was there in the house, '
  '12':
  - type: note
    content: '[Prov. 7:13, 18]'
  - type: text
    content: 'she caught him by his garment, saying, “Lie with me.” But he left his garment in her hand and fled and got out of the house. '
  '13':
  - type: text
    content: 'And as soon as she saw that he had left his garment in her hand and had fled out of the house, '
  '14':
  - type: text
    content: 'she called to the men of her household and said to them, “See, he has brought among us a Hebrew to laugh at us. He came in to me to lie with me, and I cried out with a loud voice. '
  '15':
  - type: text
    content: 'And as soon as he heard that I lifted up my voice and cried out, he left his garment beside me and fled and got out of the house.” '
  '16':
  - type: text
    content: 'Then she laid up his garment by her until his master came home, '
  '17':
  - type: text
    content: 'and she told him the same story, saying, “The Hebrew servant, whom you have brought among us, came in to me to laugh at me. '
  '18':
  - type: text
    content: But as soon as I lifted up my voice and cried, he left his garment beside me and fled out of the house.”
  '19':
  - type: text
    content: 'As soon as his master heard the words that his wife spoke to him, “This is the way your servant treated me,” his anger was kindled. '
  '2':
  - type: note
    content: ver. 21; Acts 7:9; [ch. 21:22; 26:24, 28; 28:15; 1 Sam. 16:18; 18:14, 28]
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph, and he became a successful man, and he was in the house of his Egyptian master. '
  '20':
  - type: text
    content: 'And Joseph’s master took him and '
  - type: note
    content: Ps. 105:18
  - type: text
    content: 'put him into the '
  - type: note
    content: ch. 40:3, 5; [ch. 40:15; 41:14]
  - type: text
    content: 'prison, the place where the king’s prisoners were confined, and he was there in prison. '
  '21':
  - type: text
    content: 'But '
  - type: note
    content: ver. 2; Acts 7:9, 10
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph and showed him steadfast love '
  - type: note
    content: Ex. 3:21; 11:3; 12:36
  - type: text
    content: 'and gave him favor in the sight of the keeper of the prison. '
  '22':
  - type: text
    content: 'And the keeper of the prison '
  - type: note
    content: ch. 40:4
  - type: text
    content: 'put Joseph in charge of all the prisoners who were in the prison. Whatever was done there, he was the one who did it. '
  '23':
  - type: text
    content: 'The keeper of the prison paid no attention to anything that was in Joseph’s charge, because '
  - type: note
    content: ver. 2, 3
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him. And whatever he did, the '
  - type: text
    content: Lord
  - type: text
    content: ' made it succeed.'
  '3':
  - type: text
    content: 'His master saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him and that the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 26:5; Ps. 1:3
  - type: text
    content: 'caused all that he did to succeed in his hands. '
  '4':
  - type: text
    content: 'So Joseph '
  - type: note
    content: ver. 21; ch. 19:19; 33:10
  - type: text
    content: 'found favor in his sight and attended him, and he made him overseer of his house '
  - type: note
    content: ver. 8
  - type: text
    content: 'and put him in charge of all that he had. '
  '5':
  - type: text
    content: 'From the time that he made him overseer in his house and over all that he had, the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the Egyptian’s house '
  - type: note
    content: '[ch. 30:27]'
  - type: text
    content: 'for Joseph’s sake; the blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on all that he had, in house and field. '
  '6':
  - type: text
    content: So he left all that he had in Joseph’s charge, and because of him he had no concern about anything but the food he ate.
  - type: text
    content: 'Now Joseph was '
  - type: note
    content: '[ch. 29:17; 1 Sam. 16:12]'
  - type: text
    content: 'handsome in form and appearance. '
  '7':
  - type: text
    content: 'And after a time his master’s wife cast her eyes on Joseph and said, “Lie with me.” '
  '8':
  - type: text
    content: 'But he refused and said to his master’s wife, “Behold, because of me my master has no concern about anything in the house, and '
  - type: note
    content: ver. 4
  - type: text
    content: 'he has put everything that he has in my charge. '
  '9':
  - type: text
    content: 'He is not greater in this house than I am, nor has he kept back anything from me except you, because you are his wife. How then can I do this great wickedness and '
  - type: note
    content: 2 Sam. 12:13; Ps. 51:4
  - type: text
    content: 'sin against God?” '
