  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joseph said to them, “It is as I said to you. You are spies. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this you shall be tested: by the life of Pharaoh, you shall not go from this place unless your youngest brother comes here. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send one of you, and let him bring your brother, while you remain confined, that your words may be tested, whether there is truth in you. Or else, by the life of Pharaoh, surely you are spies.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he put them all together in custody for three days.
