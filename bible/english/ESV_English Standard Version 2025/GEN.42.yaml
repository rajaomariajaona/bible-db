      text: He said to his brothers, “My money has been put back; here it is in the mouth of my sack!” At this their hearts failed them, and they turned trembling to one another, saying, “What is this that God has done to us?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to Jacob their father in the land of Canaan, they told him all that had happened to them, saying, '
  '3':
  - type: usfm
    marker: p
    children:
