document_id: GEN.42,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Brothers Go to Egypt
  - type: text
    content: 'When '
  - type: note
    content: Acts 7:12
  - type: text
    content: 'Jacob learned that there was grain for sale in Egypt, he said to his sons, “Why do you look at one another?” '
  '10':
  - type: text
    content: 'They said to him, “No, my lord, your servants have come to buy food. '
  '11':
  - type: text
    content: We are all sons of one man. We are honest men. Your servants have never been spies.”
  '12':
  - type: text
    content: 'He said to them, “No, it is the nakedness of the land that you have come to see.” '
  '13':
  - type: text
    content: 'And they said, “We, your servants, are twelve brothers, the sons of one man in the land of Canaan, and behold, the youngest is this day with our father, and one '
  - type: note
    content: ver. 32; See ch. 37:30
  - type: text
    content: 'is no more.” '
  '14':
  - type: text
    content: 'But Joseph said to them, “It is as I said to you. You are spies. '
  '15':
  - type: text
    content: 'By this you shall be tested: by the life of Pharaoh, you shall not go from this place unless your youngest brother comes here. '
  '16':
  - type: text
    content: 'Send one of you, and let him bring your brother, while you remain confined, that your words may be tested, whether there is truth in you. Or else, by the life of Pharaoh, surely you are spies.” '
  '17':
  - type: text
    content: And he put them all together in custody for three days.
  '18':
  - type: text
    content: 'On the third day Joseph said to them, “Do this and you will live, '
  - type: note
    content: Lev. 25:43; Neh. 5:15
  - type: text
    content: 'for I fear God: '
  '19':
  - type: text
    content: 'if you are honest men, let one of your brothers remain confined where you are in custody, and let the rest go and carry '
  - type: note
    content: ver. 33
  - type: text
    content: 'grain for the famine of your households, '
  '2':
  - type: text
    content: 'And he said, “Behold, I have heard that there is grain for sale in Egypt. Go down and buy grain for us there, that we may '
  - type: note
    content: ch. 43:8
  - type: text
    content: 'live and not die.” '
  '20':
  - type: text
    content: 'and '
  - type: note
    content: ver. 34; ch. 43:5; 44:23
  - type: text
    content: 'bring your youngest brother to me. So your words will be verified, and you shall not die.” And they did so. '
  '21':
  - type: text
    content: 'Then they said to one another, '
  - type: note
    content: '[Job 36:8, 9]; See ch. 37:23-28'
  - type: text
    content: '“In truth we are guilty concerning our brother, in that we saw the distress of his soul, when he begged us and we did not listen. That is why this distress has come upon us.” '
  '22':
  - type: text
    content: 'And Reuben answered them, '
  - type: note
    content: ch. 37:21
  - type: text
    content: '“Did I not tell you not to sin against the boy? But you did not listen. So now '
  - type: note
    content: ch. 9:5; 2 Chr. 24:22; [1 Kgs. 2:32; Ps. 9:12; Luke 11:50, 51]
  - type: text
    content: 'there comes a reckoning for his blood.” '
  '23':
  - type: text
    content: 'They did not know that Joseph understood them, for there was an interpreter between them. '
  '24':
  - type: text
    content: 'Then he turned away from them and '
  - type: note
    content: ch. 43:30
  - type: text
    content: 'wept. And he returned to them and spoke to them. And he took Simeon from them and bound him before their eyes. '
  '25':
  - type: note
    content: ch. 44:1
  - type: text
    content: And Joseph gave orders to fill their bags with grain, and to replace every man’s money in his sack, and to give them provisions for the journey. This was done for them.
  '26':
  - type: text
    content: 'Then they loaded their donkeys with their grain and departed. '
  '27':
  - type: text
    content: 'And as '
  - type: note
    content: ver. 35; ch. 43:21
  - type: text
    content: 'one of them opened his sack to give his donkey fodder at '
  - type: note
    content: Ex. 4:24; Jer. 9:2
  - type: text
    content: 'the lodging place, he saw his money in the mouth of his sack. '
  '28':
  - type: text
    content: He said to his brothers, “My money has been put back; here it is in the mouth of my sack!” At this their hearts failed them, and they turned trembling to one another, saying, “What is this that God has done to us?”
  '29':
  - type: text
    content: 'When they came to Jacob their father in the land of Canaan, they told him all that had happened to them, saying, '
  '3':
  - type: text
    content: 'So ten of Joseph’s brothers went down to buy grain in Egypt. '
  '30':
  - type: text
    content: '“The man, the lord of the land, '
  - type: note
    content: ver. 7, 9
  - type: text
    content: 'spoke roughly to us and took us to be spies of the land. '
  '31':
  - type: text
    content: 'But we said to him, ‘We are honest men; we have never been spies. '
  '32':
  - type: text
    content: 'We are twelve brothers, sons of our father. One '
  - type: note
    content: ver. 13
  - type: text
    content: 'is no more, and the youngest is this day with our father in the land of Canaan.’ '
  '33':
  - type: text
    content: 'Then the man, the lord of the land, said to us, '
  - type: note
    content: ver. 15, 19, 20
  - type: text
    content: '‘By this I shall know that you are honest men: leave one of your brothers with me, and take '
  - type: note
    content: ver. 19
  - type: text
    content: 'grain for the famine of your households, and go your way. '
  '34':
  - type: text
    content: 'Bring your youngest brother to me. Then I shall know that you are not spies but honest men, and I will deliver your brother to you, and you shall '
  - type: note
    content: ch. 34:10, 21
  - type: text
    content: trade in the land.’”
  '35':
  - type: text
    content: ' '
  - type: note
    content: ver. 27 ; ch. 43:21
  - type: text
    content: 'As they emptied their sacks, behold, every man’s bundle of money was in his sack. And when they and their father saw their bundles of money, they were afraid. '
  '36':
  - type: text
    content: 'And Jacob their father said to them, “You have '
  - type: note
    content: ch. 43:14
  - type: text
    content: 'bereaved me of my children: Joseph is no more, and Simeon is no more, and now you would take Benjamin. All this has come against me.” '
  '37':
  - type: text
    content: 'Then Reuben said to his father, “Kill '
  - type: note
    content: '[ch. 46:9]'
  - type: text
    content: 'my two sons if I do not bring him back to you. Put him in my hands, and I will bring him back to you.” '
  '38':
  - type: text
    content: 'But he said, “My son shall not go down with you, for '
  - type: note
    content: ver. 13, 32, 36; ch. 37:33; 44:28
  - type: text
    content: 'his brother is dead, and he is the only one left. '
  - type: note
    content: ver. 4; ch. 44:29
  - type: text
    content: 'If harm should happen to him on the journey that you are to make, '
  - type: note
    content: ch. 37:35; 44:31
  - type: text
    content: you would bring down my gray hairs with sorrow to Sheol.”
  '4':
  - type: text
    content: 'But Jacob did not send Benjamin, '
  - type: note
    content: ch. 35:18
  - type: text
    content: 'Joseph’s brother, with his brothers, for '
  - type: note
    content: ver. 38
  - type: text
    content: 'he feared that harm might happen to him. '
  '5':
  - type: text
    content: Thus the sons of Israel came to buy among the others who came, for the famine was in the land of Canaan.
  '6':
  - type: text
    content: 'Now Joseph was governor '
  - type: note
    content: ch. 41:41
  - type: text
    content: 'over the land. He was the one who sold to all the people of the land. And Joseph’s brothers came and '
  - type: note
    content: ch. 37:7, 9, 10
  - type: text
    content: 'bowed themselves before him with their faces to the ground. '
  '7':
  - type: text
    content: 'Joseph saw his brothers and recognized them, but he treated them like strangers and '
  - type: note
    content: ver. 30
  - type: text
    content: 'spoke roughly to them. “Where do you come from?” he said. They said, “From the land of Canaan, to buy food.” '
  '8':
  - type: text
    content: 'And Joseph recognized his brothers, but they did not recognize him. '
  '9':
  - type: text
    content: 'And Joseph '
  - type: note
    content: ch. 37:5, 9
  - type: text
    content: 'remembered the dreams that he had dreamed of them. '
  - type: note
    content: ver. 7, 30
  - type: text
    content: 'And he said to them, “You are spies; you have come to see the nakedness of the land.” '
