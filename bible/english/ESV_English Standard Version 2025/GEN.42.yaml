        - type: text
          text: Acts 7:12
      marker-yv: yv-n
    - type: text
      text: 'Jacob learned that there was grain for sale in Egypt, he said to his sons, “Why do you look at one another?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to him, “No, my lord, your servants have come to buy food. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We are all sons of one man. We are honest men. Your servants have never been spies.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “No, it is the nakedness of the land that you have come to see.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, “We, your servants, are twelve brothers, the sons of one man in the land of Canaan, and behold, the youngest is this day with our father, and one '
