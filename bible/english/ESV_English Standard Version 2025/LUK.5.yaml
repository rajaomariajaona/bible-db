document_id: LUK.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Calls the First Disciples
  - type: text
    content: 'On one occasion, while the crowd was pressing in on him to hear the word of God, he was standing by '
  - type: note
    content: Num. 34:11; Deut. 3:17; Josh. 12:3; John 6:1; [Matt. 14:34]
  - type: text
    content: 'the lake of Gennesaret, '
  '10':
  - type: text
    content: 'and so also were James and John, sons of Zebedee, who were partners with Simon. And Jesus said to Simon, '
  - type: text
    content: “Do not be afraid; from now on you will be catching men.”
  - type: note
    content: The Greek word anthropoi refers here to both men and women
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And when they had brought their boats to land, '
  - type: note
    content: ch. 18:28; Matt. 19:27; [ver. 28]
  - type: text
    content: they left everything and followed him.
  - type: heading
    content: Jesus Cleanses a Leper
  '12':
  - type: text
    content: 'While he was in one of the cities, '
  - type: note
    content: For ver. 12-14, see Matt. 8:2-4; Mark 1:40-44
  - type: text
    content: there came a man full of leprosy.
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' And when he saw Jesus, he '
  - type: note
    content: See ch. 17:16
  - type: text
    content: 'fell on his face and begged him, “Lord, '
  - type: note
    content: '[Matt. 9:28; Mark 9:22, 23]'
  - type: text
    content: 'if you will, you can make me clean.” '
  '13':
  - type: text
    content: And Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' stretched out his hand and touched him, saying, '
  - type: text
    content: “I will; be clean.”
  - type: text
    content: ' And immediately the leprosy left him. '
  '14':
  - type: text
    content: 'And he charged him '
  - type: note
    content: Matt. 9:30; 17:9; Mark 1:34; 5:43; 7:36; 8:26; See Matt. 12:16
  - type: text
    content: 'to tell no one, but '
  - type: text
    content: '“go and show '
  - type: note
    content: ch. 17:14
  - type: text
    content: 'yourself to the priest, and '
  - type: note
    content: Lev. 14:2-32
  - type: text
    content: 'make an offering for your cleansing, as Moses commanded, '
  - type: note
    content: ch. 9:5; Mark 6:11; James 5:3
  - type: text
    content: for a proof to them.”
  - type: text
    content: ' '
  '15':
  - type: note
    content: '[Mark 1:45]'
  - type: text
    content: 'But now even more the report about him went abroad, and great crowds gathered to hear him and to be healed of their infirmities. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: Mark 1:35; See Matt. 14:23
  - type: text
    content: 'he would withdraw to desolate places and '
  - type: note
    content: Mark 1:35; See Matt. 14:23
  - type: text
    content: pray.
  - type: heading
    content: Jesus Heals a Paralytic
  '17':
  - type: text
    content: 'On one of those days, as he was teaching, Pharisees and '
  - type: note
    content: ch. 2:46; Acts 5:34; 1 Tim. 1:7 (Gk.); [Matt. 22:35]
  - type: text
    content: 'teachers of the law were sitting there, who had come from every village of Galilee and Judea and from Jerusalem. And '
  - type: note
    content: See ch. 8:46
  - type: text
    content: the power of the Lord was with him to heal.
  - type: note
    content: Some manuscripts was present to heal them
  - type: text
    content: ' '
  '18':
  - type: note
    content: For ver. 18-26, see Matt. 9:2-8; Mark 2:3-12
  - type: text
    content: 'And behold, some men were bringing '
  - type: note
    content: Mark 6:55
  - type: text
    content: 'on a bed a man who was paralyzed, and they were seeking to bring him in and lay him before Jesus, '
  '19':
  - type: text
    content: 'but finding no way to bring him in, because of the crowd, they went up on '
  - type: note
    content: Deut. 22:8; 1 Sam. 9:25; Neh. 8:16; Matt. 10:27; 24:17; Acts 10:9
  - type: text
    content: 'the roof and let him down with his bed '
  - type: note
    content: '[Mark 2:4]'
  - type: text
    content: 'through the tiles into the midst before Jesus. '
  '2':
  - type: note
    content: For ver. 2-11, [Matt. 4:18-22; Mark 1:16-20; John 1:40-42]
  - type: text
    content: 'and he saw two boats by the lake, but the fishermen had gone out of them and were '
  - type: note
    content: '[Mark 1:19]'
  - type: text
    content: 'washing their nets. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: ch. 7:9, 50; 17:19; 18:42; Matt. 8:10, 13; 9:22, 29; 15:28; Mark 10:52; Acts 3:16; 14:9; James 5:15
  - type: text
    content: 'when he saw their faith, he said, '
  - type: text
    content: '“Man, '
  - type: note
    content: ch. 7:48; [John 5:14]
  - type: text
    content: your sins are forgiven you.”
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the scribes and the Pharisees began to question, saying, “Who is this who speaks '
  - type: note
    content: Matt. 26:65; John 10:36
  - type: text
    content: 'blasphemies? '
  - type: note
    content: Ps. 32:5; Isa. 43:25
  - type: text
    content: 'Who can forgive sins but God alone?” '
  '22':
  - type: text
    content: 'When Jesus '
  - type: note
    content: See John 2:25
  - type: text
    content: 'perceived their thoughts, he answered them, '
  - type: text
    content: “Why do you question in your hearts?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Which is easier, to say, ‘Your sins are forgiven you,’ or to say, ‘Rise and walk’?
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'But that you may know that '
  - type: note
    content: '[ch. 6:5]'
  - type: text
    content: the Son of Man has authority on earth to forgive sins”
  - type: text
    content: —he said to the man who was paralyzed—
  - type: text
    content: “I say to you, rise, pick up your bed and go home.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And immediately he rose up before them and picked up what he had been lying on and went home, '
  - type: note
    content: See ch. 7:16
  - type: text
    content: 'glorifying God. '
  '26':
  - type: text
    content: 'And amazement seized them all, and they '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'glorified God and were filled '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: with awe, saying, “We have seen extraordinary things today.”
  - type: heading
    content: Jesus Calls Levi
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27-38, see Matt. 9:9-17; Mark 2:14-22
  - type: text
    content: 'After this he went out and saw '
  - type: note
    content: Matt. 11:19; See Matt. 5:46
  - type: text
    content: 'a tax collector named '
  - type: note
    content: '[Matt. 9:9]'
  - type: text
    content: 'Levi, sitting at the tax booth. And he said to him, '
  - type: text
    content: “Follow me.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: leaving everything, he rose and followed him.
  '29':
  - type: text
    content: 'And Levi made him a great feast in his house, and there was a large company '
  - type: note
    content: '[ch. 15:1, 2]'
  - type: text
    content: 'of tax collectors and others reclining at table with them. '
  '3':
  - type: text
    content: 'Getting into one of the boats, which was Simon’s, he asked him to put out a little from the land. And '
  - type: note
    content: '[Matt. 5:1]'
  - type: text
    content: 'he sat down and taught the people from the boat. '
  '30':
  - type: text
    content: 'And the Pharisees and '
  - type: note
    content: Acts 4:5; 23:9
  - type: text
    content: 'their scribes grumbled at his disciples, saying, '
  - type: note
    content: ch. 15:2; Matt. 11:19
  - type: text
    content: '“Why do you eat and drink with tax collectors and sinners?” '
  '31':
  - type: text
    content: 'And Jesus answered them, '
  - type: text
    content: “Those who are well have no need of a physician, but those who are sick.
  - type: text
    content: ' '
  '32':
  - type: note
    content: '[ch. 15:7; John 9:39]'
  - type: text
    content: 'I have not come to call the righteous '
  - type: note
    content: 1 Tim. 1:15
  - type: text
    content: 'but sinners '
  - type: note
    content: ch. 13:3, 5; 15:10; 24:47; Matt. 4:17; 11:20; Mark 1:15; Acts 5:31
  - type: text
    content: to repentance.”
  - type: heading
    content: A Question About Fasting
  '33':
  - type: text
    content: 'And they said to him, '
  - type: note
    content: ch. 11:1; Matt. 11:2; 14:12; John 1:35; 3:25; 4:1; [Acts 18:25; 19:3]
  - type: text
    content: '“The disciples of John '
  - type: note
    content: ch. 2:37
  - type: text
    content: 'fast often and '
  - type: note
    content: ch. 2:37
  - type: text
    content: 'offer prayers, '
  - type: note
    content: ch. 18:12
  - type: text
    content: 'and so do the disciples of the Pharisees, but yours eat and drink.” '
  '34':
  - type: text
    content: 'And Jesus said to them, '
  - type: note
    content: John 3:29
  - type: text
    content: “Can you make wedding guests fast while the bridegroom is with them?
  - type: text
    content: ' '
  '35':
  - type: note
    content: See ch. 17:22
  - type: text
    content: 'The days will come when the bridegroom is taken away from them, and '
  - type: note
    content: '[John 16:20]'
  - type: text
    content: then they will fast in those days.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'He also told them a parable: '
  - type: text
    content: “No one tears a piece from a new garment and puts it on an old garment. If he does, he will tear the new, and the piece from the new will not match the old.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And no one puts new wine into old '
  - type: note
    content: Josh. 9:4
  - type: text
    content: wineskins. If he does, the new wine will burst the skins and it will be spilled, and the skins will be destroyed.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But new wine must be put into fresh wineskins.
  - type: text
    content: ' '
  '39':
  - type: text
    content: And no one after drinking old wine desires new, for he says, ‘The old is good.’”
  - type: note
    content: Some manuscripts better
  '4':
  - type: text
    content: 'And when he had finished speaking, he said to Simon, '
  - type: note
    content: '[John 21:6]'
  - type: text
    content: “Put out into the deep and let down your nets for a catch.”
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And Simon answered, “Master, '
  - type: note
    content: '[John 21:3]'
  - type: text
    content: 'we toiled all night and took nothing! But at your word I will let down the nets.” '
  '6':
  - type: text
    content: 'And when they had done this, '
  - type: note
    content: '[John 21:11]'
  - type: text
    content: 'they enclosed a large number of fish, and '
  - type: note
    content: '[John 21:11]'
  - type: text
    content: 'their nets were breaking. '
  '7':
  - type: text
    content: 'They signaled to their partners in the other boat to come and help them. '
  - type: note
    content: See John 21:4-8
  - type: text
    content: 'And they came and filled both the boats, so that they began to sink. '
  '8':
  - type: text
    content: 'But when Simon Peter saw it, he fell down at Jesus’ knees, saying, '
  - type: note
    content: See Matt. 8:34
  - type: text
    content: '“Depart from me, for '
  - type: note
    content: Isa. 6:5
  - type: text
    content: 'I am a sinful man, O Lord.” '
  '9':
  - type: text
    content: 'For he and all who were with him were astonished at the catch of fish that they had taken, '
