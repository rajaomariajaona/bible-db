    content: ', ‘Because you have said these words, “The burden of the '
  - type: text
    content: Lord
  - type: text
    content: ',” when I sent to you, saying, “You shall not say, ‘The burden of the '
  - type: text
    content: Lord
  - type: text
    content: ',’” '
  '39':
