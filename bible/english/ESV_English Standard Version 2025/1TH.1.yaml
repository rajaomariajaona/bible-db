document_id: 1TH.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: Acts 15:22; 2 Cor. 1:19; 2 Thess. 1:1; 1 Pet. 5:12
  - type: text
    content: Silvanus, and Timothy,
  - type: text
    content: 'To the church of the '
  - type: note
    content: See Acts 17:1
  - type: text
    content: 'Thessalonians in God the Father and the Lord Jesus Christ:'
  - type: note
    content: Rom. 1:7
  - type: text
    content: Grace to you and peace.
  - type: heading
    content: The Thessalonians’ Faith and Example
  '10':
  - type: text
    content: 'and '
  - type: note
    content: See 1 Cor. 1:7
  - type: text
    content: 'to wait for his Son '
  - type: note
    content: ch. 4:16; [2 Thess. 1:10]; See Acts 1:11
  - type: text
    content: 'from heaven, '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'whom he raised from the dead, Jesus '
  - type: note
    content: Col. 1:13
  - type: text
    content: 'who delivers us from '
  - type: note
    content: ch. 2:16; 5:9; Matt. 3:7; Rom. 5:9
  - type: text
    content: the wrath to come.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:13; See Rom. 1:8; Eph. 5:20
  - type: text
    content: We give thanks to God always for all of you, constantly
  - type: note
    content: Or without ceasing
  - type: text
    content: ' '
  - type: note
    content: Rom. 1:9; 2 Tim. 1:3
  - type: text
    content: 'mentioning you in our prayers, '
  '3':
  - type: text
    content: 'remembering before '
  - type: note
    content: See Gal. 1:4
  - type: text
    content: 'our God and Father '
  - type: note
    content: 2 Thess. 1:11; [John 6:29; Gal. 5:6; Heb. 6:10; James 2:22]
  - type: text
    content: 'your work of faith and labor of '
  - type: note
    content: 2 Thess. 1:3, 4; [Col. 1:4; 1 Tim. 1:14; Rev. 2:19]
  - type: text
    content: 'love and '
  - type: note
    content: Rom. 8:25; 15:4
  - type: text
    content: 'steadfastness of hope in our Lord Jesus Christ. '
  '4':
  - type: text
    content: 'For we know, '
  - type: note
    content: 2 Thess. 2:13
  - type: text
    content: brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' loved by God, '
  - type: note
    content: 2 Pet. 1:10
  - type: text
    content: 'that he has chosen you, '
  '5':
  - type: text
    content: 'because '
  - type: note
    content: 2 Thess. 2:14
  - type: text
    content: 'our gospel came to you not only in word, but also in power and '
  - type: note
    content: 2 Cor. 6:6; See 1 Cor. 2:4
  - type: text
    content: 'in the Holy Spirit and with full '
  - type: note
    content: Col. 2:2; [Heb. 2:3]
  - type: text
    content: 'conviction. You know '
  - type: note
    content: '[ch. 2:10; Acts 20:18; 2 Thess. 3:7]'
  - type: text
    content: 'what kind of men we proved to be among you for your sake. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 2:14; 2 Thess. 3:7, 9]; See 1 Cor. 4:16'
  - type: text
    content: 'you became imitators of us '
  - type: note
    content: 1 Cor. 11:1
  - type: text
    content: 'and of the Lord, for '
  - type: note
    content: Acts 17:5-10
  - type: text
    content: 'you received the word in much affliction, '
  - type: note
    content: See Matt. 5:12
  - type: text
    content: 'with the '
  - type: note
    content: Acts 13:52; Gal. 5:22
  - type: text
    content: 'joy of the Holy Spirit, '
  '7':
  - type: text
    content: 'so that you became an example to all the believers in Macedonia and in Achaia. '
  '8':
  - type: text
    content: 'For not only has the word of the Lord '
  - type: note
    content: '[Rom. 10:18; 2 Thess. 3:1]'
  - type: text
    content: 'sounded forth from you in Macedonia and Achaia, but your faith in God has gone forth '
  - type: note
    content: '[Rom. 1:8; 16:19; 2 Thess. 1:4]'
  - type: text
    content: 'everywhere, so that we need not say anything. '
  '9':
  - type: text
    content: 'For they themselves report concerning us the kind of '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'reception we had among you, and how '
  - type: note
    content: See Acts 14:15
  - type: text
    content: 'you turned to God '
  - type: note
    content: 1 Cor. 12:2; [Gal. 4:8]
  - type: text
    content: 'from idols to serve the living and '
  - type: note
    content: See John 17:3
  - type: text
    content: 'true God, '
