  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone whom you forgive, I also forgive. Indeed, what I have forgiven, if I have forgiven anything, has been for your sake in the presence of Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that we would not be outwitted by Satan; for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 5:8
      marker-yv: yv-n
    - type: text
      text: we are not ignorant of his designs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Triumph in Christ
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 16:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:6
      marker-yv: yv-n
    - type: text
      text: 'I came to Troas to preach the gospel of Christ, even though '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 14:27
      marker-yv: yv-n
    - type: text
      text: 'a door was opened for me in the Lord, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'my spirit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:5
      marker-yv: yv-n
    - type: text
      text: was not at rest because I did not find my brother Titus there. So I took leave of them and went on to Macedonia.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:16
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:15
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Rom. 6:17'
      marker-yv: yv-n
    - type: text
      text: 'thanks be to God, who in Christ always '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:15
      - type: text
        text: ' (Gk.)'
      marker-yv: yv-n
    - type: text
      text: 'leads us in triumphal procession, and through us spreads '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 4:18
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song 1:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the fragrance of the knowledge of him everywhere. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we are the aroma of Christ to God among '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1:18
      marker-yv: yv-n
    - type: text
      text: 'those who are being saved and among '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:3
      marker-yv: yv-n
    - type: text
      text: 'those who are perishing, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
