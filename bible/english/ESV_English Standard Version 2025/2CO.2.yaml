document_id: 2CO.2,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'For I made up my mind '
  - type: note
    content: ch. 1:23; [ch. 12:20, 21; 13:10]
  - type: text
    content: 'not to make another painful visit to you. '
  '10':
  - type: text
    content: 'Anyone whom you forgive, I also forgive. Indeed, what I have forgiven, if I have forgiven anything, has been for your sake in the presence of Christ, '
  '11':
  - type: text
    content: 'so that we would not be outwitted by Satan; for '
  - type: note
    content: See 1 Pet. 5:8
  - type: text
    content: we are not ignorant of his designs.
  - type: heading
    content: Triumph in Christ
  '12':
  - type: text
    content: 'When '
  - type: note
    content: Acts 16:8; 20:6
  - type: text
    content: 'I came to Troas to preach the gospel of Christ, even though '
  - type: note
    content: See Acts 14:27
  - type: text
    content: 'a door was opened for me in the Lord, '
  '13':
  - type: text
    content: 'my spirit '
  - type: note
    content: ch. 7:5
  - type: text
    content: was not at rest because I did not find my brother Titus there. So I took leave of them and went on to Macedonia.
  '14':
  - type: text
    content: 'But '
  - type: note
    content: ch. 8:16; [ch. 9:15]; See Rom. 6:17
  - type: text
    content: 'thanks be to God, who in Christ always '
  - type: note
    content: Col. 2:15 (Gk.)
  - type: text
    content: 'leads us in triumphal procession, and through us spreads '
  - type: note
    content: Eph. 5:2; Phil. 4:18; [Song 1:3]
  - type: text
    content: 'the fragrance of the knowledge of him everywhere. '
  '15':
  - type: text
    content: 'For we are the aroma of Christ to God among '
  - type: note
    content: See 1 Cor. 1:18
  - type: text
    content: 'those who are being saved and among '
  - type: note
    content: ch. 4:3
  - type: text
    content: 'those who are perishing, '
  '16':
  - type: note
    content: '[Luke 2:34; John 9:39; 1 Pet. 2:7, 8]'
  - type: text
    content: 'to one a fragrance from death to death, '
  - type: note
    content: '[Luke 2:34; John 9:39; 1 Pet. 2:7, 8]'
  - type: text
    content: 'to the other a fragrance from life to life. '
  - type: note
    content: ch. 3:5, 6
  - type: text
    content: 'Who is sufficient for these things? '
  '17':
  - type: text
    content: For we are not, like so many, peddlers of God’s word, but as men of sincerity, as commissioned by God, in the sight of God we speak in Christ.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 7:8]'
  - type: text
    content: 'if I cause you pain, who is there to make me glad but the one whom I have pained? '
  '3':
  - type: text
    content: 'And I wrote as I did, so that when I came I might not suffer pain from those who should have made me rejoice, '
  - type: note
    content: ch. 8:22; Gal. 5:10; 2 Thess. 3:4; [ch. 7:16]
  - type: text
    content: 'for I felt sure of all of you, that my joy would be the joy of you all. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: ch. 7:8, 12; See Acts 20:19
  - type: text
    content: I wrote to you out of much affliction and anguish of heart and with many tears, not to cause you pain but to let you know the abundant love that I have for you.
  - type: heading
    content: Forgive the Sinner
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: '[1 Cor. 5:1, 2]'
  - type: text
    content: 'if anyone has caused pain, '
  - type: note
    content: '[Gal. 4:12]'
  - type: text
    content: 'he has caused it not to me, but '
  - type: note
    content: ch. 1:14
  - type: text
    content: 'in some measure—not to put it too severely—to all of you. '
  '6':
  - type: text
    content: 'For such a one, '
  - type: note
    content: 1 Cor. 5:4, 5; [ch. 7:11]
  - type: text
    content: 'this punishment by the majority is enough, '
  '7':
  - type: text
    content: 'so '
  - type: note
    content: Gal. 6:1; [Eph. 4:32]
  - type: text
    content: 'you should rather turn to forgive and comfort him, or he may be overwhelmed by excessive sorrow. '
  '8':
  - type: text
    content: 'So I beg you to reaffirm your love for him. '
  '9':
  - type: text
    content: 'For this is why I wrote, that I might '
  - type: note
    content: Phil. 2:22
  - type: text
    content: 'test you and know '
  - type: note
    content: ch. 7:15; 10:6
  - type: text
    content: 'whether you are obedient in everything. '
