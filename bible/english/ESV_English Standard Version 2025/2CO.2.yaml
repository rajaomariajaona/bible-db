      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he has caused it not to me, but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:14
      marker-yv: yv-n
    - type: text
      text: 'in some measure—not to put it too severely—to all of you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For such a one, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 5:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'this punishment by the majority is enough, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 6:1
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:32
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'you should rather turn to forgive and comfort him, or he may be overwhelmed by excessive sorrow. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I beg you to reaffirm your love for him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is why I wrote, that I might '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:22
      marker-yv: yv-n
    - type: text
      text: 'test you and know '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:6
      marker-yv: yv-n
    - type: text
