document_id: ISA.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: You Keep Him in Perfect Peace
  - type: text
    content: 'In that day '
  - type: note
    content: '[ch. 27:2]'
  - type: text
    content: 'this song will be sung in the land of Judah:'
  - type: text
    content: “We have a strong city;
  - type: text
    content: 'he sets up '
  - type: note
    content: '[ch. 60:18]'
  - type: text
    content: salvation
  - type: text
    content: as walls and bulwarks.
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 73:3-11
  - type: text
    content: If favor is shown to the wicked,
  - type: text
    content: he does not learn righteousness;
  - type: text
    content: in the land of uprightness he deals corruptly
  - type: text
    content: 'and does not see the majesty of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Mic. 5:9]'
  - type: text
    content: your hand is lifted up,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 5:12]'
  - type: text
    content: they do not see it.
  - type: text
    content: Let them see your zeal for your people, and be ashamed.
  - type: text
    content: 'Let '
  - type: note
    content: Ps. 21:9; [ch. 33:14]
  - type: text
    content: the fire for your adversaries consume them.
  '12':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you will ordain '
  - type: note
    content: ch. 9:7; Mic. 5:5
  - type: text
    content: peace for us,
  - type: text
    content: for you have indeed done for us all our works.
  '13':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: note
    content: '[ch. 2:8; 2 Kgs. 16:3, 4 ]'
  - type: text
    content: other lords besides you have ruled over us,
  - type: note
    content: '[ch. 2:20; Ps. 20:7 ]; See 2 Kgs. 18:4-6'
  - type: text
    content: but your name alone we bring to remembrance.
  '14':
  - type: text
    content: They are dead, they will not live;
  - type: text
    content: they are shades, they will not arise;
  - type: text
    content: to that end you have visited them with destruction
  - type: text
    content: and wiped out all remembrance of them.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'But you have increased the nation, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you have increased the nation; you are glorified;
  - type: note
    content: '[ch. 54:2, 3 ]'
  - type: text
    content: you have enlarged all the borders of the land.
  '16':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Hos. 5:15; See ch. 37:1-4
  - type: text
    content: in distress they sought you;
  - type: text
    content: they poured out a whispered prayer
  - type: text
    content: when your discipline was upon them.
  '17':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:8
  - type: text
    content: Like a pregnant woman
  - type: text
    content: who writhes and cries out in her pangs
  - type: text
    content: when she is near to giving birth,
  - type: text
    content: 'so were we because of you, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: we were pregnant, we writhed,
  - type: text
    content: but we have given birth to wind.
  - type: text
    content: We have accomplished no deliverance in the earth,
  - type: text
    content: and the inhabitants of the world have not fallen.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 37:12; Dan. 12:2; Hos. 13:14 ]'
  - type: text
    content: Your dead shall live; their bodies shall rise.
  - type: text
    content: You who dwell in the dust, awake and sing for joy!
  - type: text
    content: 'For '
  - type: note
    content: '[Hos. 14:5]'
  - type: text
    content: your dew is a dew of light,
  - type: text
    content: and the earth will give birth to the dead.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps. 118:19, 20
  - type: text
    content: Open the gates,
  - type: text
    content: that the righteous nation that keeps faith may enter in.
  '20':
  - type: text
    content: Come, my people, enter your chambers,
  - type: text
    content: and shut your doors behind you;
  - type: text
    content: 'hide yourselves '
  - type: note
    content: ch. 10:25
  - type: text
    content: for a little while
  - type: text
    content: until the fury has passed by.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mic. 1:3
  - type: text
    content: 'For behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming out from his place'
  - type: text
    content: 'to punish the inhabitants of '
  - type: note
    content: '[ch. 24:5]'
  - type: text
    content: the earth for their iniquity,
  - type: text
    content: and the earth will disclose the blood shed on it,
  - type: text
    content: and will no more cover its slain.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 30:15 ]'
  - type: text
    content: You keep him in perfect peace
  - type: text
    content: whose mind is stayed on you,
  - type: text
    content: because he trusts in you.
  '4':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' forever,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is an everlasting rock.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 25:12
  - type: text
    content: For he has humbled
  - type: text
    content: the inhabitants of the height,
  - type: text
    content: the lofty city.
  - type: text
    content: He lays it low, lays it low to the ground,
  - type: text
    content: casts it to the dust.
  '6':
  - type: text
    content: The foot tramples it,
  - type: text
    content: 'the feet of '
  - type: note
    content: '[ch. 25:4]'
  - type: text
    content: the poor,
  - type: text
    content: 'the steps of '
  - type: note
    content: '[ch. 25:4]'
  - type: text
    content: the needy.”
  '7':
  - type: text
    content: The path of the righteous is level;
  - type: note
    content: 1 Sam. 2:9; Ps. 37:23
  - type: text
    content: you make level the way of the righteous.
  '8':
  - type: text
    content: In the path of your judgments,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', we wait for you;'
  - type: note
    content: Ex. 3:15
  - type: text
    content: 'your name and '
  - type: note
    content: Ex. 3:15
  - type: text
    content: remembrance
  - type: text
    content: are the desire of our soul.
  '9':
  - type: text
    content: My soul yearns for you in the night;
  - type: text
    content: my spirit within me earnestly seeks you.
  - type: note
    content: ver. 16 ; [2 Chr. 33:12]
  - type: text
    content: For when your judgments are in the earth,
  - type: text
    content: the inhabitants of the world learn righteousness.
