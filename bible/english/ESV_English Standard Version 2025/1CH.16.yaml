document_id: 1CH.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Placed in a Tent
  - type: text
    content: 'And they brought in the ark of God and set it inside '
  - type: note
    content: ch. 15:1
  - type: text
    content: 'the tent that David had pitched for it, and they offered burnt offerings and peace offerings before God. '
  '10':
  - type: text
    content: Glory in his holy name;
  - type: text
    content: 'let the hearts of those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' rejoice!'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 24:6; 27:8
  - type: text
    content: 'Seek the '
  - type: text
    content: Lord
  - type: text
    content: ' and his strength;'
  - type: text
    content: seek his presence continually!
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 77:11; 143:5 ]'
  - type: text
    content: Remember the wondrous works that he has done,
  - type: note
    content: Ps. 78:43
  - type: text
    content: his miracles and the judgments he uttered,
  '13':
  - type: text
    content: O offspring of Israel his servant,
  - type: text
    content: children of Jacob, his chosen ones!
  '14':
  - type: text
    content: 'He is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God;'
  - type: note
    content: Isa. 26:9
  - type: text
    content: his judgments are in all the earth.
  '15':
  - type: text
    content: Remember his covenant forever,
  - type: text
    content: the word that he commanded, for a thousand generations,
  '16':
  - type: text
    content: 'the covenant '
  - type: note
    content: Gen. 17:2; 22:16; 26:3; 28:13; [Luke 1:73]
  - type: text
    content: that he made with Abraham,
  - type: text
    content: his sworn promise to Isaac,
  '17':
  - type: text
    content: 'which '
  - type: note
    content: Gen. 35:11, 12
  - type: text
    content: he confirmed to Jacob as a statute,
  - type: text
    content: to Israel as an everlasting covenant,
  '18':
  - type: text
    content: 'saying, '
  - type: note
    content: Gen. 13:15; 15:18-21
  - type: text
    content: “To you I will give the land of Canaan,
  - type: text
    content: as your portion for an inheritance.”
  '19':
  - type: text
    content: 'When you were '
  - type: note
    content: Deut. 7:7; 26:5
  - type: text
    content: few in number,
  - type: text
    content: 'of little account, and '
  - type: note
    content: Heb. 11:9
  - type: text
    content: sojourners in it,
  '2':
  - type: text
    content: 'And when David had finished offering the burnt offerings and the peace offerings, he blessed the people in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '20':
  - type: text
    content: wandering from nation to nation,
  - type: text
    content: from one kingdom to another people,
  '21':
  - type: text
    content: he allowed no one to oppress them;
  - type: text
    content: 'he '
  - type: note
    content: '[Gen. 12:17; 20:3]'
  - type: text
    content: rebuked kings on their account,
  '22':
  - type: text
    content: saying, “Touch not my anointed ones,
  - type: text
    content: 'do my '
  - type: note
    content: '[Gen. 20:7]'
  - type: text
    content: prophets no harm!”
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-33, see Ps. 96:1-13
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth!'
  - type: text
    content: Tell of his salvation from day to day.
  '24':
  - type: text
    content: Declare his glory among the nations,
  - type: text
    content: his marvelous works among all the peoples!
  '25':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 145:3
  - type: text
    content: 'great is the '
  - type: text
    content: Lord
  - type: text
    content: ', and greatly to be praised,'
  - type: text
    content: 'and he is to be feared '
  - type: note
    content: '[Ps. 95:3]'
  - type: text
    content: above all gods.
  '26':
  - type: text
    content: For all the gods of the peoples are worthless idols,
  - type: note
    content: '[ Ps. 115:15; Isa. 42:5; 44:24; Jer. 10:11, 12 ]'
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens.'
  '27':
  - type: text
    content: Splendor and majesty are before him;
  - type: text
    content: strength and joy are in his place.
  '28':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ', O families of the peoples,'
  - type: note
    content: '[ Ps. 29:1 ]'
  - type: text
    content: 'ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' glory and strength!'
  '29':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' the glory due his name;'
  - type: text
    content: bring an offering and come before him!
  - type: note
    content: '[ Ps. 110:3 ]'
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in the splendor of holiness;'
  - type: note
    content: Or in holy attire
  '3':
  - type: text
    content: and distributed to all Israel, both men and women, to each a loaf of bread, a portion of meat,
  - type: note
    content: Compare Septuagint, Syriac, Vulgate; the meaning of the Hebrew is uncertain
  - type: text
    content: ' and a cake of raisins.'
  '30':
  - type: text
    content: tremble before him, all the earth;
  - type: text
    content: yes, the world is established; it shall never be moved.
  '31':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 49:13 ]'
  - type: text
    content: Let the heavens be glad, and let the earth rejoice,
  - type: text
    content: 'and let them say among the nations, '
  - type: note
    content: Ps. 93:1; 97:1; 99:1; [Isa. 52:7; Rev. 11:15, 17; 19:6]
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns!”'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Ps. 98:7
  - type: text
    content: Let the sea roar, and all that fills it;
  - type: text
    content: let the field exult, and everything in it!
  '33':
  - type: text
    content: Then shall the trees of the forest sing for joy
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he comes to judge the earth.'
  '34':
  - type: text
    content: 'Oh give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good;'
  - type: text
    content: for his steadfast love endures forever!
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35, 36, see Ps. 106:47, 48
  - type: text
    content: 'Say also:'
  - type: text
    content: “Save us, O God of our salvation,
  - type: text
    content: and gather and deliver us from among the nations,
  - type: text
    content: that we may give thanks to your holy name
  - type: text
    content: and glory in your praise.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Ps. 41:13; [ 1 Kgs. 8:15 ]
  - type: text
    content: 'Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: from everlasting to everlasting!”
  - type: note
    content: '[ Deut. 27:15; Ps. 106:48 ]'
  - type: text
    content: 'Then all the people said, “Amen!” and praised the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Worship Before the Ark
  '37':
  - type: text
    content: 'So David left Asaph and his brothers there '
  - type: note
    content: ver. 4, 5
  - type: text
    content: 'before the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister regularly before the ark '
  - type: note
    content: 2 Chr. 31:16
  - type: text
    content: 'as each day required, '
  '38':
  - type: text
    content: 'and also '
  - type: note
    content: ch. 26:4
  - type: text
    content: Obed-edom and his
  - type: note
    content: Hebrew their
  - type: text
    content: ' sixty-eight brothers, while '
  - type: note
    content: ch. 26:4
  - type: text
    content: 'Obed-edom, the son of Jeduthun, and '
  - type: note
    content: ch. 26:10, 16
  - type: text
    content: 'Hosah were to be gatekeepers. '
  '39':
  - type: text
    content: 'And he left '
  - type: note
    content: ch. 15:11
  - type: text
    content: 'Zadok the priest and his brothers the priests before the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See 1 Kgs. 3:4
  - type: text
    content: 'in the high place that was at Gibeon '
  '4':
  - type: text
    content: 'Then he appointed some of the Levites as ministers before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', to invoke, to thank, and to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '40':
  - type: text
    content: 'to offer burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 27:1
  - type: text
    content: 'on the altar of burnt offering '
  - type: note
    content: See Ex. 29:38-41; Num. 28:3-8
  - type: text
    content: 'regularly morning and evening, to do all that is written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he commanded Israel. '
  '41':
  - type: text
    content: 'With them were '
  - type: note
    content: See ch. 6:33
  - type: text
    content: 'Heman and Jeduthun '
  - type: note
    content: '[ch. 25:1, 3, 6]'
  - type: text
    content: 'and the rest of those chosen and '
  - type: note
    content: Num. 1:17
  - type: text
    content: 'expressly named to give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Chr. 5:13; 7:3, 6; 20:21; Ezra 3:11; Jer. 33:11; See ver. 34
  - type: text
    content: 'for his steadfast love endures forever. '
  '42':
  - type: text
    content: 'Heman and Jeduthun had trumpets and cymbals for the music and instruments '
  - type: note
    content: '[ch. 25:7; 2 Chr. 29:27]'
  - type: text
    content: for sacred song. The sons of Jeduthun were appointed to the gate.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 6:19, 20
  - type: text
    content: Then all the people departed each to his house, and David went home to bless his household.
  '5':
  - type: note
    content: ch. 6:39
  - type: text
    content: 'Asaph was the chief, and second to him were Zechariah, Jeiel, Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel, who were to play harps and lyres; Asaph was to sound the cymbals, '
  '6':
  - type: text
    content: 'and Benaiah and Jahaziel the priests were to blow trumpets regularly before the ark of the covenant of God. '
  '7':
  - type: text
    content: 'Then on that day '
  - type: note
    content: '[2 Sam. 22:1; 23:1]'
  - type: text
    content: 'David first appointed that thanksgiving be sung to the '
  - type: text
    content: Lord
  - type: text
    content: ' by Asaph and his brothers.'
  - type: heading
    content: David’s Song of Thanks
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-22, see Ps. 105:1-15
  - type: text
    content: 'Oh give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: Isa. 12:4
  - type: text
    content: call upon his name;
  - type: note
    content: '[ Ps. 145:11, 12 ]'
  - type: text
    content: make known his deeds among the peoples!
  '9':
  - type: text
    content: Sing to him, sing praises to him;
  - type: text
    content: tell of all his wondrous works!
