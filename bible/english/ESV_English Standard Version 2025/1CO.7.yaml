document_id: 1CO.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Principles for Marriage
  - type: text
    content: 'Now concerning the matters about which you wrote: '
  - type: note
    content: ver. 8, 26
  - type: text
    content: '“It is good for a man not to have sexual relations with a woman.” '
  '10':
  - type: text
    content: 'To the married '
  - type: note
    content: See ver. 6
  - type: text
    content: 'I give this charge (not I, but the Lord): '
  - type: note
    content: Mal. 2:16; See Matt. 5:32
  - type: text
    content: 'the wife should not separate from her husband '
  '11':
  - type: text
    content: '(but if she does, '
  - type: note
    content: Mark 10:12
  - type: text
    content: 'she should remain unmarried or else be reconciled to her husband), and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: the husband should not divorce his wife.
  '12':
  - type: text
    content: 'To the rest I say (I, not the Lord) that if any brother has a wife who is an unbeliever, and she consents to live with him, he should not divorce her. '
  '13':
  - type: text
    content: 'If any woman has a husband who is an unbeliever, and he consents to live with her, she should not divorce him. '
  '14':
  - type: text
    content: 'For the unbelieving husband is made holy because of his wife, and the unbelieving wife is made holy because of her husband. '
  - type: note
    content: Ezra 9:2; Mal. 2:15
  - type: text
    content: 'Otherwise your children would be unclean, but as it is, they are holy. '
  '15':
  - type: text
    content: But if the unbelieving partner separates, let it be so. In such cases the brother or sister is not enslaved. God has called you
  - type: note
    content: Some manuscripts us
  - type: text
    content: ' '
  - type: note
    content: Col. 3:15; See Rom. 14:19
  - type: text
    content: 'to peace. '
  '16':
  - type: text
    content: 'For how do you know, wife, '
  - type: note
    content: 1 Pet. 3:1; See Rom. 11:14
  - type: text
    content: whether you will save your husband? Or how do you know, husband, whether you will save your wife?
  - type: heading
    content: Live as You Are Called
  '17':
  - type: text
    content: Only let each person lead the life
  - type: note
    content: Or each person walk in the way
  - type: text
    content: ' '
  - type: note
    content: See Rom. 12:3
  - type: text
    content: 'that the Lord has assigned to him, and to which God has called him. '
  - type: note
    content: ch. 4:17
  - type: text
    content: 'This is my rule in '
  - type: note
    content: 2 Cor. 8:18; 11:28
  - type: text
    content: 'all the churches. '
  '18':
  - type: text
    content: 'Was anyone at the time of his call already circumcised? Let him not seek to remove the marks of circumcision. Was anyone at the time of his call uncircumcised? '
  - type: note
    content: Acts 15:1, 5, 19, 24, 28; Gal. 5:2
  - type: text
    content: 'Let him not seek circumcision. '
  '19':
  - type: note
    content: Gal. 3:28; 5:6; 6:15; Col. 3:11
  - type: text
    content: 'For neither circumcision counts for anything nor uncircumcision, but '
  - type: note
    content: See 1 John 2:3
  - type: text
    content: 'keeping the commandments of God. '
  '2':
  - type: text
    content: 'But because of the temptation to sexual immorality, each man should have his own wife and each woman her own husband. '
  '20':
  - type: note
    content: ver. 24
  - type: text
    content: 'Each one should remain in the condition in which he was called. '
  '21':
  - type: text
    content: Were you a bondservant
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; also verses 22 (twice), 23
  - type: text
    content: ' when called? Do not be concerned about it. (But if you can gain your freedom, avail yourself of the opportunity.) '
  '22':
  - type: text
    content: 'For he who was called in the Lord as a bondservant is '
  - type: note
    content: '[Col. 3:24; Philem. 16]; See John 8:36'
  - type: text
    content: 'a freedman of the Lord. Likewise he who was free when called is '
  - type: note
    content: '[ch. 9:21; 1 Pet. 2:16]'
  - type: text
    content: 'a bondservant of Christ. '
  '23':
  - type: note
    content: See ch. 6:20
  - type: text
    content: 'You were bought with a price; '
  - type: note
    content: Lev. 25:42, 55
  - type: text
    content: 'do not become bondservants of men. '
  '24':
  - type: text
    content: So, brothers,
  - type: note
    content: Or brothers and sisters; also verse 29
  - type: text
    content: ' '
  - type: note
    content: ver. 20
  - type: text
    content: in whatever condition each was called, there let him remain with God.
  - type: heading
    content: The Unmarried and the Widowed
  '25':
  - type: text
    content: Now concerning
  - type: note
    content: The expression Now concerning introduces a reply to a question in the Corinthians’ letter; see 7:1
  - type: text
    content: ' the betrothed,'
  - type: note
    content: Greek virgins
  - type: text
    content: ' '
  - type: note
    content: See ver. 6
  - type: text
    content: 'I have no command from the Lord, but I give my judgment as '
  - type: note
    content: 2 Cor. 4:1; 1 Tim. 1:13, 16
  - type: text
    content: 'one who by the Lord’s mercy is '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'trustworthy. '
  '26':
  - type: text
    content: I think that in view of the present
  - type: note
    content: Or impending
  - type: text
    content: ' distress '
  - type: note
    content: ver. 1, 8
  - type: text
    content: 'it is good for a person to remain as he is. '
  '27':
  - type: text
    content: 'Are you bound to a wife? Do not seek to be free. Are you free from a wife? Do not seek a wife. '
  '28':
  - type: text
    content: But if you do marry, you have not sinned, and if a betrothed woman
  - type: note
    content: Greek virgin; also verse 34
  - type: text
    content: ' marries, she has not sinned. Yet those who marry will have worldly troubles, and I would spare you that. '
  '29':
  - type: text
    content: 'This is what I mean, brothers: '
  - type: note
    content: See Rom. 13:11
  - type: text
    content: 'the appointed time has grown very short. From now on, let those who have wives live as though they had none, '
  '3':
  - type: note
    content: Ex. 21:10
  - type: text
    content: 'The husband should give to his wife her conjugal rights, and likewise the wife to her husband. '
  '30':
  - type: text
    content: 'and those who mourn as though they were not mourning, and those who rejoice as though they were not rejoicing, and those who buy '
  - type: note
    content: 2 Cor. 6:10
  - type: text
    content: 'as though they had no goods, '
  '31':
  - type: text
    content: 'and those who deal with the world as though they had no dealings with it. For '
  - type: note
    content: Ps. 39:6; James 1:10; 1 Pet. 1:24; 4:7; 1 John 2:17
  - type: text
    content: the present form of this world is passing away.
  '32':
  - type: text
    content: 'I want you to be '
  - type: note
    content: See Matt. 6:25; Luke 10:41
  - type: text
    content: 'free from anxieties. '
  - type: note
    content: '[1 Tim. 5:5]'
  - type: text
    content: 'The unmarried man is anxious about the things of the Lord, how to please the Lord. '
  '33':
  - type: text
    content: 'But the married man is anxious about worldly things, how to please his wife, '
  '34':
  - type: text
    content: 'and his interests are divided. And the unmarried or betrothed woman is anxious about the things of the Lord, how to be holy in body and spirit. But the married woman is anxious about worldly things, how to please her husband. '
  '35':
  - type: text
    content: 'I say this for your own benefit, '
  - type: note
    content: '[Prov. 22:25]'
  - type: text
    content: not to lay any restraint upon you, but to promote good order and to secure your undivided devotion to the Lord.
  '36':
  - type: text
    content: If anyone thinks that he is not behaving properly toward his betrothed,
  - type: note
    content: Greek virgin; also verses 37, 38
  - type: text
    content: ' if his'
  - type: note
    content: Or her
  - type: text
    content: ' passions are strong, and it has to be, let him do as he wishes: let them marry—it is no sin. '
  '37':
  - type: text
    content: 'But whoever is firmly established in his heart, being under no necessity but having his desire under control, and has determined this in his heart, to keep her as his betrothed, he will do well. '
  '38':
  - type: text
    content: 'So then he who marries his betrothed '
  - type: note
    content: Heb. 13:4
  - type: text
    content: does well, and he who refrains from marriage will do even better.
  '39':
  - type: text
    content: ' '
  - type: note
    content: Rom. 7:2
  - type: text
    content: 'A wife is bound to her husband as long as he lives. But if her husband dies, she is free to be married to whom she wishes, only '
  - type: note
    content: '[2 Cor. 6:14]'
  - type: text
    content: 'in the Lord. '
  '4':
  - type: text
    content: 'For the wife does not have authority over her own body, but the husband does. Likewise the husband does not have authority over his own body, but the wife does. '
  '40':
  - type: text
    content: 'Yet '
  - type: note
    content: See ver. 6
  - type: text
    content: 'in my judgment she is happier if she remains as she is. And I think '
  - type: note
    content: '[Acts 15:28]'
  - type: text
    content: that I too have the Spirit of God.
  '5':
  - type: note
    content: '[Ex. 19:15; 1 Sam. 21:4; Eccles. 3:5; Zech. 12:12-14]'
  - type: text
    content: 'Do not deprive one another, except perhaps by agreement for a limited time, that you may devote yourselves to prayer; but then come together again, '
  - type: note
    content: 1 Thess. 3:5
  - type: text
    content: so that Satan may not tempt you because of your lack of self-control.
  '6':
  - type: text
    content: 'Now as a concession, '
  - type: note
    content: ver. 12, 25; 2 Cor. 8:8; [ver. 10, 40]
  - type: text
    content: not a command, I say this.
  - type: note
    content: 'Or I say this:'
  - type: text
    content: ' '
  '7':
  - type: note
    content: '[Acts 26:29]'
  - type: text
    content: 'I wish that all were '
  - type: note
    content: ver. 8; [ch. 9:5]
  - type: text
    content: 'as I myself am. But '
  - type: note
    content: ch. 12:4, 11; 1 Pet. 4:10; [Rom. 12:6]
  - type: text
    content: 'each has his own gift from God, '
  - type: note
    content: Matt. 19:11, 12
  - type: text
    content: one of one kind and one of another.
  '8':
  - type: text
    content: 'To the unmarried and the widows I say that '
  - type: note
    content: ver. 1, 26
  - type: text
    content: 'it is good for them to remain single, '
  - type: note
    content: ver. 7
  - type: text
    content: 'as I am. '
  '9':
  - type: text
    content: 'But if they cannot exercise self-control, '
  - type: note
    content: '[1 Tim. 5:14]'
  - type: text
    content: they should marry. For it is better to marry than to burn with passion.
