  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, I was left alone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from where have these come?’”
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
