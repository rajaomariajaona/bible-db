verses:
  '1':
  - type: heading
    content: The Servant of the Lord
  - type: text
    content: 'Listen to me, '
  - type: note
    content: See ch. 11:11
  - type: text
    content: O coastlands,
  - type: text
    content: 'and give attention, you peoples '
  - type: note
    content: ch. 33:13
  - type: text
    content: from afar.
  - type: note
    content: See ch. 44:2
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called me from the womb,'
  - type: text
    content: from the body of my mother he named my name.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cited Rev. 7:16
  - type: text
    content: they shall not hunger or thirst,
  - type: text
    content: neither scorching wind nor sun shall strike them,
  - type: text
    content: 'for he who has pity on them '
  - type: note
    content: Rev. 7:17; See ch. 40:11
  - type: text
    content: will lead them,
  - type: text
    content: and by springs of water will guide them.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 40:4 ]'
  - type: text
    content: And I will make all my mountains a road,
  - type: text
    content: and my highways shall be raised up.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 43:5, 6
  - type: text
    content: Behold, these shall come from afar,
  - type: text
    content: 'and behold, '
  - type: note
    content: '[Ps. 107:3]'
  - type: text
    content: these from the north and from the west,
  - type: note
    content: Hebrew from the sea
  - type: text
    content: and these from the land of Syene.”
  - type: note
    content: Dead Sea Scroll; Masoretic Text Sinim
  '13':
  - type: text
    content: ' '
  - type: note
    content: See ch. 44:23
  - type: text
    content: Sing for joy, O heavens, and exult, O earth;
  - type: text
    content: break forth, O mountains, into singing!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 40:1
  - type: text
    content: has comforted his people
  - type: text
    content: and will have compassion on his afflicted.
  '14':
  - type: text
    content: 'But Zion said, '
  - type: note
    content: '[ch. 40:27; 54:6; 62:4]'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken me;'
  - type: text
    content: my Lord has forgotten me.”
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 43:1; Ps. 27:10 ]'
  - type: text
    content: “Can a woman forget her nursing child,
  - type: text
    content: that she should have no compassion on the son of her womb?
  - type: text
    content: Even these may forget,
  - type: text
    content: yet I will not forget you.
  '16':
  - type: text
    content: 'Behold, '
  - type: note
    content: Song 8:6; Rev. 13:16
  - type: text
    content: I have engraved you on the palms of my hands;
  - type: text
    content: your walls are continually before me.
  '17':
  - type: text
    content: Your builders make haste;
  - type: note
    content: Dead Sea Scroll; Masoretic Text Your children make haste
  - type: note
    content: See Zech. 1:18-21
  - type: text
    content: your destroyers and those who laid you waste go out from you.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 60:4
  - type: text
    content: Lift up your eyes around and see;
  - type: text
    content: they all gather, they come to you.
  - type: note
    content: Num. 14:21; See Ezek. 5:11
  - type: text
    content: 'As I live, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ Jer. 43:12 ]'
  - type: text
    content: you shall put them all on as an ornament;
  - type: text
    content: you shall bind them on as a bride does.
  '19':
  - type: text
    content: “Surely your waste and your desolate places
  - type: text
    content: and your devastated land—
  - type: note
    content: '[ Zech. 10:10 ]'
  - type: text
    content: surely now you will be too narrow for your inhabitants,
  - type: text
    content: and those who swallowed you up will be far away.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:4; Hos. 6:5; [ Heb. 4:12; Rev. 1:16 ]
  - type: text
    content: He made my mouth like a sharp sword;
  - type: note
    content: ch. 51:16
  - type: text
    content: in the shadow of his hand he hid me;
  - type: text
    content: he made me a polished arrow;
  - type: text
    content: in his quiver he hid me away.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 54:1
  - type: text
    content: The children of your bereavement
  - type: text
    content: 'will yet say in your ears:'
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: ‘The place is too narrow for me;
  - type: text
    content: make room for me to dwell in.’
  '21':
  - type: text
    content: 'Then you will say in your heart:'
  - type: text
    content: ‘Who has borne me these?
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: I was bereaved and barren,
  - type: text
    content: exiled and put away,
  - type: text
    content: but who has brought up these?
  - type: text
    content: Behold, I was left alone;
  - type: text
    content: from where have these come?’”
  '22':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “Behold, I will lift up my hand to the nations,
  - type: note
    content: ch. 11:12
  - type: text
    content: and raise my signal to the peoples;
  - type: note
    content: ch. 14:2
  - type: text
    content: and they shall bring your sons in their arms,
  - type: note
    content: Hebrew in their bosom
  - type: text
    content: and your daughters shall be carried on their shoulders.
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 60:3, 16
  - type: text
    content: Kings shall be your foster fathers,
  - type: text
    content: and their queens your nursing mothers.
  - type: note
    content: ch. 60:14
  - type: text
    content: With their faces to the ground they shall bow down to you,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 72:9; [Mic. 7:17]
  - type: text
    content: lick the dust of your feet.
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: '[ch. 40:31 ]'
  - type: text
    content: 'those who wait for me '
  - type: note
    content: Ps. 25:3; Joel 2:27
  - type: text
    content: shall not be put to shame.”
  '24':
  - type: text
    content: Can the prey be taken from the mighty,
  - type: text
    content: or the captives of a tyrant
  - type: note
    content: Dead Sea Scroll, Syriac, Vulgate (see also verse 25); Masoretic Text of a righteous man
  - type: text
    content: ' be rescued?'
  '25':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: '[ Matt. 12:29; Luke 11:21, 22 ]'
  - type: text
    content: “Even the captives of the mighty shall be taken,
  - type: text
    content: and the prey of the tyrant be rescued,
  - type: text
    content: for I will contend with those who contend with you,
  - type: text
    content: and I will save your children.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:20; Zech. 11:9 ]'
  - type: text
    content: I will make your oppressors eat their own flesh,
  - type: text
    content: 'and they shall be drunk '
  - type: note
    content: '[Rev. 14:20; 16:6]'
  - type: text
    content: with their own blood as with wine.
  - type: text
    content: Then all flesh shall know
  - type: text
    content: 'that '
  - type: note
    content: ch. 43:3; See Ex. 20:2
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your Savior,'
  - type: text
    content: and your Redeemer, the Mighty One of Jacob.”
  '3':
  - type: text
    content: And he said to me, “You are my servant,
  - type: text
    content: 'Israel, '
  - type: note
    content: ch. 44:23
  - type: text
    content: in whom I will be glorified.”
  - type: note
    content: Or I will display my beauty
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 65:23 ]; See ch. 50:6-8; 53:10-12'
  - type: text
    content: But I said, “I have labored in vain;
  - type: text
    content: I have spent my strength for nothing and vanity;
  - type: text
    content: 'yet surely my right is with the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and my recompense with my God.”
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 50:4 ]'
  - type: text
    content: 'And now the '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: 'he '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: who formed me from the womb to be his servant,
  - type: text
    content: to bring Jacob back to him;
  - type: text
    content: and that Israel might be gathered to him—
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 52:13]'
  - type: text
    content: 'I am honored in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and my God has become my strength—
  '6':
  - type: text
    content: 'he says:'
  - type: text
    content: “It is too light a thing that you should be my servant
  - type: text
    content: to raise up the tribes of Jacob
  - type: text
    content: and to bring back the preserved of Israel;
  - type: note
    content: Cited Acts 13:47
  - type: text
    content: 'I will make you '
  - type: note
    content: ch. 42:6
  - type: text
    content: as a light for the nations,
  - type: text
    content: 'that '
  - type: note
    content: '[Ps. 98:3]'
  - type: text
    content: my salvation may reach to the end of the earth.”
  '7':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: ch. 48:17
  - type: text
    content: the Redeemer of Israel and his Holy One,
  - type: note
    content: ver. 1 ; ch. 53:3; [ch. 50:6, 7]
  - type: text
    content: to one deeply despised, abhorred by the nation,
  - type: text
    content: 'the servant of rulers:'
  - type: note
    content: ver. 23
  - type: text
    content: “Kings shall see and arise;
  - type: text
    content: princes, and they shall prostrate themselves;
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: ', who is faithful,'
  - type: text
    content: the Holy One of Israel, who has chosen you.”
  - type: heading
    content: The Restoration of Israel
  '8':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: Cited 2 Cor. 6:2
  - type: text
    content: '“In a '
  - type: note
    content: Ps. 69:13
  - type: text
    content: time of favor I have answered you;
  - type: text
    content: in a day of salvation I have helped you;
  - type: text
    content: 'I will keep you '
  - type: note
    content: ch. 42:6
  - type: text
    content: and give you
  - type: text
    content: as a covenant to the people,
  - type: text
    content: to establish the land,
  - type: note
    content: ch. 61:4
  - type: text
    content: to apportion the desolate heritages,
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 42:7
  - type: text
    content: saying to the prisoners, ‘Come out,’
  - type: text
    content: to those who are in darkness, ‘Appear.’
  - type: note
    content: '[ch. 41:18 ]'
  - type: text
    content: They shall feed along the ways;
  - type: text
    content: on all bare heights shall be their pasture;
