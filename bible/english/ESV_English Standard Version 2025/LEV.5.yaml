document_id: LEV.5,59
type_code: eng
verses:
  '1':
  - type: text
    content: '“If anyone sins in that he hears a public '
  - type: note
    content: 1 Kgs. 8:31; Prov. 29:24; [1 Sam. 14:24, 26; Matt. 26:63]
  - type: text
    content: 'adjuration to testify, and though he is a witness, whether he has seen or come to know the matter, yet does not speak, he shall '
  - type: note
    content: ver. 17; ch. 7:18; 10:17; 17:16; 19:8; 20:17, 19; Num. 5:31; [Num. 9:13]
  - type: text
    content: 'bear his iniquity; '
  '10':
  - type: text
    content: 'Then he shall offer the second for a burnt offering according to the rule. '
  - type: note
    content: See ch. 4:20, 26, 31, 35
  - type: text
    content: And the priest shall make atonement for him for the sin that he has committed, and he shall be forgiven.
  '11':
  - type: text
    content: '“But if he cannot afford two turtledoves or two pigeons, then he shall bring as his offering for the sin that he has committed a '
  - type: note
    content: Num. 5:15
  - type: text
    content: tenth of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of fine flour for a sin offering. He '
  - type: note
    content: Num. 5:15
  - type: text
    content: 'shall put no oil on it and shall put no frankincense on it, for it is a sin offering. '
  '12':
  - type: text
    content: 'And he shall bring it to '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'the priest, and the priest shall take a handful of it as its memorial portion and '
  - type: note
    content: ch. 4:35
  - type: text
    content: 'burn this on the altar, on the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings; it is a sin offering. '
  '13':
  - type: text
    content: 'Thus '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: the priest shall make atonement for him for the sin which he has committed in any one of these things, and he shall be forgiven. And the remainder
  - type: note
    content: Septuagint; Hebrew it
  - type: text
    content: ' shall be for the priest, as in the grain offering.”'
  - type: heading
    content: Laws for Guilt Offerings
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '15':
  - type: note
    content: ch. 22:14; [Ezra 10:2]
  - type: text
    content: '“If anyone commits a breach of faith and sins unintentionally in any of the holy things of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ezra 10:19]'
  - type: text
    content: 'he shall bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' as his compensation, a ram without blemish out of the flock, valued'
  - type: note
    content: Or flock, or its equivalent
  - type: text
    content: ' in silver shekels,'
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' according to the '
  - type: note
    content: See Ex. 30:13
  - type: text
    content: 'shekel of the sanctuary, for a guilt offering. '
  '16':
  - type: text
    content: 'He shall also make restitution for what he has done amiss in the holy thing and '
  - type: note
    content: ch. 6:5; 22:14; 27:13, 15, 27, 31; Num. 5:7
  - type: text
    content: 'shall add a fifth to it and give it to the priest. '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: And the priest shall make atonement for him with the ram of the guilt offering, and he shall be forgiven.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:2
  - type: text
    content: '“If anyone sins, doing any of the things that by the '
  - type: text
    content: Lord
  - type: text
    content: '’s commandments ought not to be done, '
  - type: note
    content: Num. 15:29; [Luke 12:48]
  - type: text
    content: 'though he did not know it, then realizes his guilt, he shall bear his iniquity. '
  '18':
  - type: note
    content: ver. 15
  - type: text
    content: 'He shall bring to the priest a ram without blemish out of the flock, or its equivalent, for a guilt offering, and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the priest shall make atonement for him for the mistake that he made unintentionally, and he shall be forgiven. '
  '19':
  - type: text
    content: It is a guilt offering; he has indeed incurred guilt before
  - type: note
    content: Or he has paid full compensation to
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'or '
  - type: note
    content: ch. 11:24, 28, 31, 39; Num. 19:11, 13, 16
  - type: text
    content: 'if anyone touches an unclean thing, whether a carcass of an unclean wild animal or a carcass of unclean livestock or a carcass of unclean swarming things, and it is hidden from him and he has become unclean, and he realizes his guilt; '
  '3':
  - type: text
    content: 'or if he touches '
  - type: note
    content: See ch. 12; ch. 13; ch. 15
  - type: text
    content: 'human uncleanness, of whatever sort the uncleanness may be with which one becomes unclean, and it is hidden from him, when he comes to know it, and realizes his guilt; '
  '4':
  - type: text
    content: 'or if anyone utters with his lips a '
  - type: note
    content: '[Judg. 11:30, 31; 1 Sam. 14:24; 25:22; Mark 6:23; Acts 23:12]'
  - type: text
    content: 'rash oath to do evil or to do good, any sort of rash oath that people '
  - type: note
    content: Eccles. 5:2
  - type: text
    content: 'swear, and it is hidden from him, when he comes to know it, and he realizes his guilt in any of these; '
  '5':
  - type: text
    content: 'when he realizes his guilt in any of these and '
  - type: note
    content: ch. 16:21; 26:40; Num. 5:7; Ezra 10:1; [Josh. 7:19]
  - type: text
    content: 'confesses the sin he has committed, '
  '6':
  - type: text
    content: 'he shall bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' as his compensation'
  - type: note
    content: Hebrew his guilt penalty; so throughout Leviticus
  - type: text
    content: ' for the sin that he has committed, a female from the flock, a lamb or a goat, for a sin offering. And the priest shall make atonement for him for his sin.'
  '7':
  - type: text
    content: '“But '
  - type: note
    content: ch. 12:8; 14:21
  - type: text
    content: 'if he cannot afford a lamb, then he shall bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' as his compensation for the sin that he has committed two '
  - type: note
    content: See ch. 1:14
  - type: text
    content: turtledoves or two pigeons,
  - type: note
    content: Septuagint two young pigeons; also verse 11
  - type: text
    content: ' one for a sin offering and the other for a burnt offering. '
  '8':
  - type: text
    content: 'He shall bring them to the priest, who shall offer first the one for the sin offering. He shall '
  - type: note
    content: ch. 1:15, 17
  - type: text
    content: 'wring its head from its neck '
  - type: note
    content: ch. 1:15, 17
  - type: text
    content: 'but shall not sever it completely, '
  '9':
  - type: text
    content: 'and he shall sprinkle some of the blood of the sin offering on the side of the altar, while '
  - type: note
    content: ch. 1:15
  - type: text
    content: 'the rest of the blood shall be drained out '
  - type: note
    content: ch. 4:7, 18, 30, 34
  - type: text
    content: 'at the base of the altar; it is a sin offering. '
