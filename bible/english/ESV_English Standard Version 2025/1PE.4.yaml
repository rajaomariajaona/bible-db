document_id: 1PE.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Stewards of God’s Grace
  - type: text
    content: 'Since therefore '
  - type: note
    content: ch. 3:18
  - type: text
    content: Christ suffered in the flesh,
  - type: note
    content: Some manuscripts add for us; some for you
  - type: text
    content: ' '
  - type: note
    content: '[Eph. 6:13]'
  - type: text
    content: 'arm yourselves with the same way of thinking, for '
  - type: note
    content: Rom. 6:2, 7; Gal. 5:24; Col. 3:3, 5
  - type: text
    content: 'whoever has suffered in the flesh '
  - type: note
    content: '[2 Pet. 2:14]'
  - type: text
    content: 'has ceased from sin, '
  '10':
  - type: note
    content: Rom. 12:6, 7; 1 Cor. 4:7; [Matt. 25:15]
  - type: text
    content: 'As each has received a gift, use it to serve one another, '
  - type: note
    content: Luke 12:42; 1 Cor. 4:1, 2; Titus 1:7
  - type: text
    content: 'as good stewards of God’s varied grace: '
  '11':
  - type: text
    content: 'whoever speaks, as one who speaks '
  - type: note
    content: Acts 7:38; Rom. 3:2; Heb. 5:12
  - type: text
    content: 'oracles of God; whoever serves, as one who serves '
  - type: note
    content: Rom. 12:3
  - type: text
    content: 'by the strength that God supplies—in order that in everything '
  - type: note
    content: 1 Cor. 10:31
  - type: text
    content: 'God may be glorified through Jesus Christ. '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: 'To him belong glory and '
  - type: note
    content: ch. 5:11; Jude 25; Rev. 1:6; 5:13
  - type: text
    content: dominion forever and ever. Amen.
  - type: heading
    content: Suffering as a Christian
  '12':
  - type: text
    content: 'Beloved, do not be surprised at '
  - type: note
    content: ch. 1:7
  - type: text
    content: 'the fiery trial when it comes upon you to test you, as though something strange were happening to you. '
  '13':
  - type: text
    content: 'But rejoice '
  - type: note
    content: Phil. 3:10, 11; See Acts 5:41
  - type: text
    content: 'insofar as you share Christ’s sufferings, that you may also rejoice and be glad '
  - type: note
    content: '[ch. 1:5-7; 5:1; Rom. 8:17, 18; Jude 24]'
  - type: text
    content: 'when his glory is revealed. '
  '14':
  - type: note
    content: Ps. 89:51; Matt. 5:11
  - type: text
    content: 'If you are insulted '
  - type: note
    content: John 15:21; [Heb. 11:26]
  - type: text
    content: for the name of Christ, you are blessed, because the Spirit of glory
  - type: note
    content: Some manuscripts insert and of power
  - type: text
    content: ' and of God rests upon you. '
  '15':
  - type: text
    content: 'But '
  - type: note
    content: ch. 2:19, 20; 3:14, 17
  - type: text
    content: 'let none of you suffer as a murderer or a thief or an evildoer or '
  - type: note
    content: 1 Thess. 4:11; 2 Thess. 3:11; 1 Tim. 5:13
  - type: text
    content: 'as a meddler. '
  '16':
  - type: text
    content: 'Yet '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'if anyone suffers as a '
  - type: note
    content: See Acts 26:28
  - type: text
    content: 'Christian, let him not be ashamed, but let him glorify God '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'in that name. '
  '17':
  - type: text
    content: 'For it is time for judgment '
  - type: note
    content: Jer. 25:29; Ezek. 9:6; Amos 3:2; Rom. 2:9
  - type: text
    content: 'to begin at the household of God; and '
  - type: note
    content: '[Luke 23:31]'
  - type: text
    content: 'if it begins with us, what will be the outcome for those who '
  - type: note
    content: '[2 Thess. 1:8]'
  - type: text
    content: 'do not obey the gospel of God? '
  '18':
  - type: text
    content: And
  - type: note
    content: Prov. 11:31
  - type: text
    content: “If the righteous is scarcely saved,
  - type: text
    content: what will become of the ungodly and the sinner?”
  - type: note
    content: Greek where will the ungodly and sinner appear?
  '19':
  - type: text
    content: 'Therefore let those who suffer according to God’s will '
  - type: note
    content: Ps. 31:5; Luke 23:46; [Ps. 10:14; 2 Tim. 1:12]
  - type: text
    content: entrust their souls to a faithful Creator while doing good.
  '2':
  - type: note
    content: Rom. 6:14; 14:7; 2 Cor. 5:15
  - type: text
    content: 'so as to live for '
  - type: note
    content: ch. 1:14
  - type: text
    content: 'the rest of the time in the flesh '
  - type: note
    content: Titus 2:12; 1 John 2:16
  - type: text
    content: 'no longer for human passions but '
  - type: note
    content: Rom. 6:11
  - type: text
    content: 'for the will of God. '
  '3':
  - type: text
    content: 'For the time that is past '
  - type: note
    content: Ezek. 44:6; 45:9; Acts 17:30
  - type: text
    content: 'suffices '
  - type: note
    content: Eph. 4:17-19; 1 Thess. 4:5; [1 Cor. 12:2]
  - type: text
    content: 'for doing what the Gentiles want to do, living in sensuality, passions, drunkenness, orgies, drinking parties, and lawless idolatry. '
  '4':
  - type: text
    content: 'With respect to this they are surprised when you do not join them in the same flood of '
  - type: note
    content: See Eph. 5:18
  - type: text
    content: 'debauchery, and '
  - type: note
    content: ch. 2:12; 3:16
  - type: text
    content: 'they malign you; '
  '5':
  - type: text
    content: 'but they will give account to him who is ready '
  - type: note
    content: '[James 5:9]; See Acts 10:42'
  - type: text
    content: 'to judge the living and the dead. '
  '6':
  - type: text
    content: 'For this is why '
  - type: note
    content: ch. 3:19
  - type: text
    content: the gospel was preached even to those who are dead, that though judged in the flesh the way people are, they might live in the spirit the way God does.
  '7':
  - type: text
    content: ' '
  - type: note
    content: See James 5:8
  - type: text
    content: 'The end of all things is at hand; therefore '
  - type: note
    content: See ch. 1:13
  - type: text
    content: 'be self-controlled and sober-minded '
  - type: note
    content: Matt. 26:41; Luke 21:36
  - type: text
    content: 'for the sake of your prayers. '
  '8':
  - type: text
    content: 'Above all, keep loving one another earnestly, since '
  - type: note
    content: '[1 Cor. 13:5, 6]; See James 5:20'
  - type: text
    content: 'love covers a multitude of sins. '
  '9':
  - type: note
    content: Heb. 13:2; [1 Tim. 3:2; Titus 1:8]
  - type: text
    content: 'Show hospitality to one another without grumbling. '
