document_id: ISA.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to Those Who Go Down to Egypt
  - type: text
    content: Woe
  - type: note
    content: Or Ah,
  - type: text
    content: ' to '
  - type: note
    content: ch. 30:2; 36:6
  - type: text
    content: those who go down to Egypt for help
  - type: text
    content: and rely on horses,
  - type: text
    content: 'who '
  - type: note
    content: Ps. 20:7; [ch. 30:16; 36:9]
  - type: text
    content: trust in chariots because they are many
  - type: text
    content: and in horsemen because they are very strong,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 22:11]'
  - type: text
    content: do not look to the Holy One of Israel
  - type: text
    content: 'or consult the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'And '
  - type: note
    content: '[Ps. 94:8-10]'
  - type: text
    content: yet he is wise and brings disaster;
  - type: note
    content: '[ Num. 23:19 ]'
  - type: text
    content: he does not call back his words,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 22:14]'
  - type: text
    content: will arise against the house of the evildoers
  - type: text
    content: 'and against the helpers of '
  - type: note
    content: Ps. 94:4
  - type: text
    content: those who work iniquity.
  '3':
  - type: text
    content: The Egyptians are man, and not God,
  - type: text
    content: 'and their horses '
  - type: note
    content: Jer. 17:5
  - type: text
    content: are flesh, and not spirit.
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' stretches out his hand,'
  - type: text
    content: the helper will stumble, and he who is helped will fall,
  - type: text
    content: and they will all perish together.
  '4':
  - type: text
    content: 'For thus the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me,'
  - type: note
    content: Hos. 11:10; Amos 1:2; 3:8
  - type: text
    content: “As a lion or a young lion growls over his prey,
  - type: text
    content: and when a band of shepherds is called out against him
  - type: text
    content: he is not terrified by their shouting
  - type: text
    content: or daunted at their noise,
  - type: note
    content: '[ch. 42:13 ]'
  - type: text
    content: 'so the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts will come down'
  - type: text
    content: to fight
  - type: note
    content: The Hebrew words for hosts and to fight sound alike
  - type: text
    content: ' on Mount Zion and on its hill.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:11; [ Ps. 91:4 ]
  - type: text
    content: 'Like birds hovering, so the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: will protect Jerusalem;
  - type: text
    content: he will protect and deliver it;
  - type: text
    content: he will spare and rescue it.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 30:15 ]'
  - type: text
    content: Turn to him from whom people
  - type: note
    content: Hebrew they
  - type: text
    content: ' have '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'deeply revolted, O children of Israel. '
  '7':
  - type: text
    content: 'For in that day '
  - type: note
    content: ch. 2:20; 30:22
  - type: text
    content: everyone shall cast away his idols of silver and his idols of gold, which your hands have sinfully made for you.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 37:36
  - type: text
    content: “And the Assyrian shall fall by a sword, not of man;
  - type: text
    content: and a sword, not of man, shall devour him;
  - type: text
    content: and he shall flee from the sword,
  - type: text
    content: 'and his young men shall be '
  - type: note
    content: '[Gen. 49:15; Prov. 12:24]'
  - type: text
    content: put to forced labor.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:31; See ch. 30:29
  - type: text
    content: His rock shall pass away in terror,
  - type: text
    content: and his officers desert the standard in panic,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ', whose '
  - type: note
    content: ch. 30:33
  - type: text
    content: fire is in Zion,
  - type: text
    content: 'and whose '
  - type: note
    content: Ps. 21:9; Mal. 4:1
  - type: text
    content: furnace is in Jerusalem.
