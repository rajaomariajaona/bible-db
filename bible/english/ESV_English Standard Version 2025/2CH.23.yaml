      children:
      - type: text
        text: '19'
      metadata:
        usfm: DEU.17.19
    marker-yv: yv-n
  - type: text
    text: 'the testimony. And they proclaimed him king, and Jehoiada and his sons anointed him, and they said, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
