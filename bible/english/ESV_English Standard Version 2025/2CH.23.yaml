      marker: fr
      children:
      - type: text
        text: '23:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: they made a passage for her
    marker-yv: yv-n
