document_id: 2CH.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Made King
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-21, see 2 Kgs. 11:4-20
  - type: text
    content: 'But in the seventh year Jehoiada took courage and entered into a covenant with the commanders of hundreds, Azariah the son of Jeroham, Ishmael the son of Jehohanan, Azariah the son of Obed, Maaseiah the son of Adaiah, and Elishaphat the son of Zichri. '
  '10':
  - type: text
    content: 'And he set all the people as a guard for the king, every man with his weapon in his hand, from the south side of the house to the north side of the house, around the altar and the house. '
  '11':
  - type: text
    content: 'Then they brought out the king’s son and put the crown on him and gave him '
  - type: note
    content: Deut. 17:18, 19
  - type: text
    content: 'the testimony. And they proclaimed him king, and Jehoiada and his sons anointed him, and they said, '
  - type: note
    content: See 1 Sam. 10:24
  - type: text
    content: “Long live the king.”
  - type: heading
    content: Athaliah Executed
  '12':
  - type: text
    content: 'When Athaliah heard the noise of the people running and praising the king, she went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the people. '
  '13':
  - type: text
    content: 'And when she looked, there was the king standing by his pillar at the entrance, and the captains and the trumpeters beside the king, and all the people of the land rejoicing and blowing trumpets, and the singers with their musical instruments leading in the celebration. And Athaliah tore her clothes and cried, “Treason! Treason!” '
  '14':
  - type: text
    content: 'Then Jehoiada the priest brought out the captains who were set over the army, saying to them, “Bring her out between the ranks, and anyone who follows her is to be put to death with the sword.” For the priest said, “Do not put her to death in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '15':
  - type: text
    content: So they laid hands on her,
  - type: note
    content: Or they made a passage for her
  - type: text
    content: ' and she went into the entrance of '
  - type: note
    content: Neh. 3:28; Jer. 31:40; [2 Kgs. 11:16]
  - type: text
    content: the horse gate of the king’s house, and they put her to death there.
  - type: heading
    content: Jehoiada’s Reforms
  '16':
  - type: text
    content: 'And Jehoiada made a covenant between himself and all the people and the king that they should be the '
  - type: text
    content: Lord
  - type: text
    content: '’s people. '
  '17':
  - type: text
    content: 'Then all the people went to the house of Baal and tore it down; his altars and his images they broke in pieces, '
  - type: note
    content: Deut. 13:9
  - type: text
    content: 'and they killed Mattan the priest of Baal before the altars. '
  '18':
  - type: text
    content: 'And Jehoiada posted watchmen for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' under the direction of '
  - type: note
    content: ch. 5:5; 30:27
  - type: text
    content: 'the Levitical priests and the Levites '
  - type: note
    content: 1 Chr. 23:6, 30, 31; 24:1
  - type: text
    content: 'whom David had organized to be in charge of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', to offer burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 28:2
  - type: text
    content: 'as it is written in the Law of Moses, with rejoicing and with singing, '
  - type: note
    content: '[1 Chr. 25:2]'
  - type: text
    content: 'according to the order of David. '
  '19':
  - type: text
    content: 'He stationed '
  - type: note
    content: See 1 Chr. 26:1-19
  - type: text
    content: 'the gatekeepers at the gates of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' so that no one should enter who was in any way unclean. '
  '2':
  - type: text
    content: 'And they went about through '
  - type: note
    content: See ch. 21:2
  - type: text
    content: 'Judah and gathered the Levites from all the cities of Judah, and the heads of fathers’ houses of Israel, and they came to Jerusalem. '
  '20':
  - type: text
    content: 'And he took the captains, the nobles, the governors of the people, and all the people of the land, and they brought the king down from the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', marching '
  - type: note
    content: '[2 Kgs. 11:19; 15:35]'
  - type: text
    content: 'through the upper gate to the king’s house. And they set the king on the royal throne. '
  '21':
  - type: text
    content: So all the people of the land rejoiced, and the city was quiet after Athaliah had been put to death with the sword.
  '3':
  - type: text
    content: And all the assembly made a covenant with the king in the house of God. And Jehoiada
  - type: note
    content: Hebrew he
  - type: text
    content: ' said to them, “Behold, the king’s son! Let him reign, '
  - type: note
    content: See ch. 6:16
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke concerning the sons of David. '
  '4':
  - type: text
    content: 'This is the thing that you shall do: '
  - type: note
    content: '[1 Chr. 9:25; 24:4]'
  - type: text
    content: 'of you priests and Levites who come off duty on the Sabbath, one third shall be gatekeepers, '
  '5':
  - type: text
    content: 'and one third shall be at the king’s house and one third at the Gate of the Foundation. And all the people shall be in the courts of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Let no one enter the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' except the priests '
  - type: note
    content: See 1 Chr. 23:27-29
  - type: text
    content: 'and ministering Levites. They may enter, for they are holy, but all the people shall keep the charge of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: The Levites shall surround the king, each with his weapons in his hand. And whoever enters the house shall be put to death. Be with the king when he comes in and when he goes out.”
  '8':
  - type: text
    content: 'The Levites and all Judah did according to all that Jehoiada the priest commanded, and they each brought his men, who were to go off duty on the Sabbath, with those who were to come on duty on the Sabbath, for Jehoiada the priest did not dismiss '
  - type: note
    content: See 1 Chr. 24
  - type: text
    content: 'the divisions. '
  '9':
  - type: text
    content: 'And Jehoiada the priest gave to the captains the spears and the large and small shields that had been King David’s, which were in the house of God. '
