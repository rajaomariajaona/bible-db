document_id: 1CH.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: From Adam to Abraham
  - type: text
    content: ' '
  - type: note
    content: Many names in these genealogies are spelled differently in other biblical books
  - type: note
    content: Gen. 4:25, 26; 5:3, 6
  - type: text
    content: 'Adam, Seth, Enosh; '
  '10':
  - type: text
    content: Cush fathered Nimrod. He was the first on earth to be a mighty man.
  - type: note
    content: Or He began to be a mighty man on the earth
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-16, see Gen. 10:10-18
  - type: text
    content: 'Egypt fathered Ludim, Anamim, Lehabim, Naphtuhim, '
  '12':
  - type: text
    content: Pathrusim, Casluhim (from whom the Philistines came), and Caphtorim.
  '13':
  - type: text
    content: 'Canaan fathered Sidon his firstborn and Heth, '
  '14':
  - type: text
    content: 'and the Jebusites, the Amorites, the Girgashites, '
  '15':
  - type: text
    content: 'the Hivites, the Arkites, the Sinites, '
  '16':
  - type: text
    content: the Arvadites, the Zemarites, and the Hamathites.
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-23, see Gen. 10:22-29
  - type: text
    content: 'The sons of Shem: Elam, Asshur, Arpachshad, Lud, and Aram. And the sons of Aram:'
  - type: note
    content: Septuagint; Hebrew lacks And the sons of Aram
  - type: text
    content: ' Uz, Hul, Gether, and Meshech. '
  '18':
  - type: text
    content: 'Arpachshad fathered Shelah, and Shelah fathered Eber. '
  '19':
  - type: text
    content: 'To Eber were born two sons: the name of the one was Peleg'
  - type: note
    content: Peleg means division
  - type: text
    content: ' (for in his days the earth was divided), and his brother’s name was Joktan. '
  '2':
  - type: note
    content: For ver. 2-4, see Gen. 5:9-32
  - type: text
    content: 'Kenan, Mahalalel, Jared; '
  '20':
  - type: text
    content: 'Joktan fathered Almodad, Sheleph, Hazarmaveth, Jerah, '
  '21':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '22':
  - type: text
    content: Obal,
  - type: note
    content: Septuagint, Syriac (compare Genesis 10:28); Hebrew Ebal
  - type: text
    content: ' Abimael, Sheba, '
  '23':
  - type: text
    content: Ophir, Havilah, and Jobab; all these were the sons of Joktan.
  '24':
  - type: text
    content: ' '
  - type: note
    content: For ver. 24, 27, see Gen. 11:10-26; Luke 3:34-36
  - type: text
    content: 'Shem, Arpachshad, Shelah; '
  '25':
  - type: text
    content: 'Eber, Peleg, Reu; '
  '26':
  - type: text
    content: 'Serug, Nahor, Terah; '
  '27':
  - type: text
    content: Abram, that is, Abraham.
  - type: heading
    content: From Abraham to Jacob
  '28':
  - type: text
    content: 'The sons of Abraham: '
  - type: note
    content: Gen. 21:2, 3
  - type: text
    content: 'Isaac and '
  - type: note
    content: Gen. 16:11, 15
  - type: text
    content: 'Ishmael. '
  '29':
  - type: note
    content: For ver. 29-31, see Gen. 25:13-16
  - type: text
    content: 'These are their genealogies: the firstborn of Ishmael, Nebaioth, and Kedar, Adbeel, Mibsam, '
  '3':
  - type: text
    content: 'Enoch, Methuselah, Lamech; '
  '30':
  - type: text
    content: 'Mishma, Dumah, Massa, Hadad, Tema, '
  '31':
  - type: text
    content: 'Jetur, Naphish, and Kedemah. These are the sons of Ishmael. '
  '32':
  - type: note
    content: For ver. 32, 33, see Gen. 25:1-4
  - type: text
    content: 'The sons of Keturah, Abraham’s concubine: she bore Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. The sons of Jokshan: Sheba and Dedan. '
  '33':
  - type: text
    content: 'The sons of Midian: Ephah, Epher, Hanoch, Abida, and Eldaah. All these were the descendants of Keturah.'
  '34':
  - type: text
    content: 'Abraham fathered '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'Isaac. The sons of Isaac: '
  - type: note
    content: Gen. 25:25, 26
  - type: text
    content: 'Esau and '
  - type: note
    content: Gen. 32:28
  - type: text
    content: 'Israel. '
  '35':
  - type: note
    content: For ver. 35-37, see Gen. 36:4, 5, 9-13
  - type: text
    content: 'The sons of Esau: Eliphaz, Reuel, Jeush, Jalam, and Korah. '
  '36':
  - type: text
    content: 'The sons of Eliphaz: Teman, Omar, Zepho, Gatam, Kenaz, and of Timna,'
  - type: note
    content: Septuagint (compare Genesis 36:12); Hebrew lacks and of
  - type: text
    content: ' Amalek. '
  '37':
  - type: text
    content: 'The sons of Reuel: Nahath, Zerah, Shammah, and Mizzah.'
  '38':
  - type: text
    content: ' '
  - type: note
    content: For ver. 38-42, see Gen. 36:20-28
  - type: text
    content: 'The sons of Seir: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan. '
  '39':
  - type: text
    content: 'The sons of Lotan: Hori and Hemam;'
  - type: note
    content: Septuagint (compare Genesis 36:22); Hebrew Homam
  - type: text
    content: ' and Lotan’s sister was Timna. '
  '4':
  - type: text
    content: 'Noah, '
  - type: note
    content: Gen. 6:10; 9:18
  - type: text
    content: Shem, Ham, and Japheth.
  '40':
  - type: text
    content: 'The sons of Shobal: Alvan,'
  - type: note
    content: Septuagint (compare Genesis 36:23); Hebrew Alian
  - type: text
    content: ' Manahath, Ebal, Shepho,'
  - type: note
    content: Septuagint (compare Genesis 36:23); Hebrew Shephi
  - type: text
    content: ' and Onam. The sons of Zibeon: Aiah and Anah. '
  '41':
  - type: text
    content: The son
  - type: note
    content: Hebrew sons
  - type: text
    content: ' of Anah: Dishon. The sons of Dishon: Hemdan,'
  - type: note
    content: Septuagint (compare Genesis 36:26); Hebrew Hamran
  - type: text
    content: ' Eshban, Ithran, and Cheran. '
  '42':
  - type: text
    content: 'The sons of Ezer: Bilhan, Zaavan, and Akan.'
  - type: note
    content: Septuagint (compare Genesis 36:27); Hebrew Jaakan
  - type: text
    content: ' The sons of Dishan: Uz and Aran.'
  '43':
  - type: text
    content: ' '
  - type: note
    content: For ver. 43-54, see Gen. 36:31-43
  - type: text
    content: 'These are the kings who reigned in the land of Edom before any king reigned over the people of Israel: Bela the son of Beor, the name of his city being Dinhabah. '
  '44':
  - type: text
    content: 'Bela died, and Jobab the son of Zerah of '
  - type: note
    content: Isa. 34:6; 63:1
  - type: text
    content: 'Bozrah reigned in his place. '
  '45':
  - type: text
    content: 'Jobab died, and Husham of the land of the '
  - type: note
    content: Gen. 36:11; Job 2:11; Jer. 49:7, 20; Ezek. 25:13
  - type: text
    content: 'Temanites reigned in his place. '
  '46':
  - type: text
    content: 'Husham died, and Hadad the son of Bedad, who defeated Midian in the country of Moab, reigned in his place, the name of his city being Avith. '
  '47':
  - type: text
    content: 'Hadad died, and Samlah of Masrekah reigned in his place. '
  '48':
  - type: text
    content: Samlah died, and Shaul of Rehoboth on the Euphrates
  - type: note
    content: Hebrew the River
  - type: text
    content: ' reigned in his place. '
  '49':
  - type: text
    content: 'Shaul died, and Baal-hanan, the son of Achbor, reigned in his place. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: For ver. 5-7, see Gen. 10:2-4
  - type: text
    content: 'The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  '50':
  - type: text
    content: 'Baal-hanan died, and Hadad reigned in his place, the name of his city being Pai; and his wife’s name was Mehetabel, the daughter of Matred, the daughter of Mezahab. '
  '51':
  - type: text
    content: And Hadad died.
  - type: text
    content: 'The chiefs of Edom were: chiefs Timna, Alvah, Jetheth, '
  '52':
  - type: text
    content: 'Oholibamah, Elah, Pinon, '
  '53':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '54':
  - type: text
    content: Magdiel, and Iram; these are the chiefs of Edom.
  '6':
  - type: text
    content: 'The sons of Gomer: Ashkenaz, Riphath,'
  - type: note
    content: Septuagint; Hebrew Diphath
  - type: text
    content: ' and Togarmah. '
  '7':
  - type: text
    content: 'The sons of Javan: Elishah, Tarshish, Kittim, and Rodanim.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-10, see Gen. 10:6-8
  - type: text
    content: 'The sons of Ham: Cush, Egypt, Put, and Canaan. '
  '9':
  - type: text
    content: 'The sons of Cush: Seba, Havilah, Sabta, Raamah, and Sabteca. The sons of Raamah: Sheba and Dedan. '
