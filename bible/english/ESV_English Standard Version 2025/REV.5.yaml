document_id: REV.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Scroll and the Lamb
  - type: text
    content: 'Then I saw in the right hand of him who was seated on the throne '
  - type: note
    content: Ezek. 2:9, 10
  - type: text
    content: 'a scroll written within and on the back, '
  - type: note
    content: Isa. 29:11; Dan. 12:4
  - type: text
    content: 'sealed with seven seals. '
  '10':
  - type: text
    content: 'and you have made them '
  - type: note
    content: See ch. 1:6
  - type: text
    content: a kingdom and priests to our God,
  - type: text
    content: and they shall reign on the earth.”
  '11':
  - type: text
    content: 'Then I looked, and I heard around the throne and the living creatures and the elders the voice of many angels, numbering '
  - type: note
    content: Dan. 7:10; [Heb. 12:22]
  - type: text
    content: 'myriads of myriads and thousands of thousands, '
  '12':
  - type: text
    content: saying with a loud voice,
  - type: note
    content: ch. 4:11
  - type: text
    content: “Worthy is the Lamb who was slain,
  - type: text
    content: to receive power and wealth and wisdom and might
  - type: text
    content: and honor and glory and blessing!”
  '13':
  - type: text
    content: 'And I heard '
  - type: note
    content: Ps. 145:21; 150:6
  - type: text
    content: every creature in heaven and on earth and under the earth and in the sea, and all that is in them, saying,
  - type: text
    content: “To him who sits on the throne and to the Lamb
  - type: text
    content: be blessing and honor and glory and might forever and ever!”
  '14':
  - type: text
    content: 'And the four living creatures '
  - type: note
    content: ch. 7:12; 19:4
  - type: text
    content: 'said, “Amen!” and the elders '
  - type: note
    content: ver. 8; See ch. 4:10
  - type: text
    content: fell down and worshiped.
  '2':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 10:1; 18:21]'
  - type: text
    content: 'I saw a mighty angel proclaiming with a loud voice, “Who is worthy to open the scroll and break its seals?” '
  '3':
  - type: text
    content: 'And no one in heaven or on earth or under the earth was able to open the scroll or to look into it, '
  '4':
  - type: text
    content: 'and I began to weep loudly because no one was found worthy to open the scroll or to look into it. '
  '5':
  - type: text
    content: 'And one of the elders said to me, “Weep no more; behold, '
  - type: note
    content: Gen. 49:9
  - type: text
    content: 'the Lion '
  - type: note
    content: Heb. 7:14
  - type: text
    content: 'of the tribe of Judah, '
  - type: note
    content: ch. 22:16; Isa. 11:1, 10; Rom. 15:12
  - type: text
    content: the Root of David, has conquered, so that he can open the scroll and its seven seals.”
  '6':
  - type: text
    content: 'And between the throne and the four living creatures and among the elders I saw '
  - type: note
    content: ver. 9, 12; ch. 13:8; Isa. 53:7; John 1:29, 36; 1 Pet. 1:19
  - type: text
    content: 'a Lamb standing, as though it had been slain, with seven horns and with '
  - type: note
    content: Zech. 3:9; 4:10
  - type: text
    content: 'seven eyes, which are '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'the seven spirits of God sent out into all the earth. '
  '7':
  - type: text
    content: 'And he went and took the scroll from the right hand of him who was seated on the throne. '
  '8':
  - type: text
    content: 'And when he had taken the scroll, the four living creatures and the twenty-four elders '
  - type: note
    content: See ch. 4:10
  - type: text
    content: 'fell down before the Lamb, '
  - type: note
    content: ch. 14:2; 15:2
  - type: text
    content: 'each holding a harp, and '
  - type: note
    content: '[ch. 15:7]'
  - type: text
    content: 'golden bowls full of incense, '
  - type: note
    content: ch. 8:3, 4; Ps. 141:2
  - type: text
    content: 'which are the prayers of the saints. '
  '9':
  - type: text
    content: 'And they sang '
  - type: note
    content: ch. 14:3; See Ps. 33:3
  - type: text
    content: a new song, saying,
  - type: text
    content: “Worthy are you to take the scroll
  - type: text
    content: and to open its seals,
  - type: text
    content: 'for '
  - type: note
    content: ver. 6
  - type: text
    content: 'you were slain, and by your blood '
  - type: note
    content: ch. 14:3, 4; See 2 Pet. 2:1
  - type: text
    content: you ransomed people for God
  - type: text
    content: 'from '
  - type: note
    content: ch. 7:9; 11:9; 14:6; See Dan. 3:4
  - type: text
    content: every tribe and language and people and nation,
