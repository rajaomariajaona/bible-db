      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:22
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'myriads of myriads and thousands of thousands, '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
