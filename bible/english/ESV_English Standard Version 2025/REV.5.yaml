        children:
        - type: text
          text: 1:6
      marker-yv: yv-n
    - type: text
      text: a kingdom and priests to our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they shall reign on the earth.”
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I looked, and I heard around the throne and the living creatures and the elders the voice of many angels, numbering '
    - type: usfm
