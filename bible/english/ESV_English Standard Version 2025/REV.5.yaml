  - type: usfm
    marker: q1
    children:
    - type: text
      text: and honor and glory and blessing!”
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And I heard '
    - type: usfm
