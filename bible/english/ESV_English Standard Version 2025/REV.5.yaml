    children:
    - type: text
      text: The Scroll and the Lamb
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I saw in the right hand of him who was seated on the throne '
    - type: usfm
