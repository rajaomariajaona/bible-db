      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 49:9
      marker-yv: yv-n
    - type: text
      text: 'the Lion '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 7:14
      marker-yv: yv-n
    - type: text
      text: 'of the tribe of Judah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 15:12
      marker-yv: yv-n
    - type: text
      text: the Root of David, has conquered, so that he can open the scroll and its seven seals.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
