  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:11
      marker-yv: yv-n
    - type: text
      text: “Worthy is the Lamb who was slain,
  - type: usfm
    marker: q1
    children:
    - type: text
