document_id: ACT.23,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And looking intently at the council, Paul said, “Brothers, '
  - type: note
    content: 2 Cor. 1:12; 2 Tim. 1:3; [ch. 24:16; Job 27:5, 6; 1 Cor. 4:4; 2 Cor. 4:2; 5:11; Heb. 13:18]
  - type: text
    content: 'I have lived my life before God in all good conscience up to this day.” '
  '10':
  - type: text
    content: 'And when the dissension became violent, the tribune, afraid that Paul would be torn to pieces by them, commanded the soldiers to go down and take him away from among them by force and bring him into '
  - type: note
    content: ver. 16, 32; ch. 21:34; 22:24
  - type: text
    content: the barracks.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:9; 27:23
  - type: text
    content: 'The following night '
  - type: note
    content: 1 Sam. 3:10
  - type: text
    content: 'the Lord stood by him and said, '
  - type: note
    content: '[2 Tim. 4:17]'
  - type: text
    content: '“Take courage, for '
  - type: note
    content: '[ch. 19:21]'
  - type: text
    content: 'as you have testified to the facts about me in Jerusalem, so you must '
  - type: note
    content: ch. 22:15
  - type: text
    content: testify also in Rome.”
  - type: heading
    content: A Plot to Kill Paul
  '12':
  - type: text
    content: 'When it was day, '
  - type: note
    content: ver. 30
  - type: text
    content: 'the Jews made a plot and '
  - type: note
    content: ver. 14, 21
  - type: text
    content: 'bound themselves by an oath neither to eat nor drink till they had killed Paul. '
  '13':
  - type: text
    content: 'There were more than forty who made this conspiracy. '
  '14':
  - type: text
    content: 'They went to the chief priests and elders and said, “We have strictly bound ourselves by an oath to taste no food till we have killed Paul. '
  '15':
  - type: text
    content: Now therefore you, along with the council, give notice to the tribune to bring him down to you, as though you were going to determine his case more exactly. And we are ready to kill him before he comes near.”
  '16':
  - type: text
    content: 'Now the son of Paul’s sister heard of their ambush, so he went and entered '
  - type: note
    content: ver. 10, 32
  - type: text
    content: 'the barracks and told Paul. '
  '17':
  - type: text
    content: 'Paul called one of the centurions and said, “Take this young man to the tribune, for he has something to tell him.” '
  '18':
  - type: text
    content: 'So he took him and brought him to the tribune and said, “Paul '
  - type: note
    content: See Eph. 3:1
  - type: text
    content: 'the prisoner called me and asked me to bring this young man to you, as he has something to say to you.” '
  '19':
  - type: text
    content: 'The tribune took him by the hand, and going aside asked him privately, “What is it that you have to tell me?” '
  '2':
  - type: text
    content: 'And the high priest '
  - type: note
    content: ch. 24:1
  - type: text
    content: 'Ananias commanded those who stood by him '
  - type: note
    content: 1 Kgs. 22:24; Lam. 3:30; Mic. 5:1; 2 Cor. 11:20
  - type: text
    content: 'to strike him on the mouth. '
  '20':
  - type: text
    content: 'And he said, '
  - type: note
    content: ver. 14, 15
  - type: text
    content: '“The Jews have agreed to ask you to bring Paul down to the council tomorrow, as though they were going to inquire somewhat more closely about him. '
  '21':
  - type: text
    content: 'But do not be persuaded by them, for more than forty of their men are lying in ambush for him, who '
  - type: note
    content: ver. 12, 14
  - type: text
    content: 'have bound themselves by an oath neither to eat nor drink till they have killed him. And now they are ready, waiting for your consent.” '
  '22':
  - type: text
    content: So the tribune dismissed the young man, charging him, “Tell no one that you have informed me of these things.”
  - type: heading
    content: Paul Sent to Felix the Governor
  '23':
  - type: text
    content: Then he called two of the centurions and said, “Get ready two hundred soldiers, with seventy horsemen and two hundred spearmen to go as far as Caesarea at the third hour of the night.
  - type: note
    content: That is, 9 p.m.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Also provide mounts for Paul to ride and bring him safely to '
  - type: note
    content: ver. 26; ch. 24:2; 25:14
  - type: text
    content: 'Felix '
  - type: note
    content: ver. 33; ch. 24:1, 10; 26:30; See Luke 20:20
  - type: text
    content: 'the governor.” '
  '25':
  - type: text
    content: 'And he wrote a letter to this effect:'
  '26':
  - type: text
    content: '“Claudius Lysias, to '
  - type: note
    content: ch. 24:1
  - type: text
    content: 'his Excellency the governor Felix, '
  - type: note
    content: See ch. 15:23
  - type: text
    content: 'greetings. '
  '27':
  - type: note
    content: ch. 21:27
  - type: text
    content: 'This man was seized by the Jews and '
  - type: note
    content: '[ch. 21:32, 33]'
  - type: text
    content: 'was about to be killed by them '
  - type: note
    content: '[ch. 21:32, 33]'
  - type: text
    content: 'when I came upon them with the soldiers and rescued him, '
  - type: note
    content: '[ch. 22:25-29]'
  - type: text
    content: 'having learned that he was a Roman citizen. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: ch. 22:30
  - type: text
    content: 'desiring to know the charge for which they were accusing him, I brought him down to their council. '
  '29':
  - type: text
    content: 'I found that he was being accused '
  - type: note
    content: ch. 18:15; 25:19
  - type: text
    content: 'about questions of their law, but '
  - type: note
    content: ch. 25:25; 26:31; 28:18; [ver. 9]
  - type: text
    content: 'charged with nothing deserving death or imprisonment. '
  '3':
  - type: text
    content: 'Then Paul said to him, “God is going to strike you, you '
  - type: note
    content: '[Matt. 23:27]'
  - type: text
    content: 'whitewashed '
  - type: note
    content: '[Isa. 30:13; Ezek. 13:10-14]'
  - type: text
    content: 'wall! Are you sitting to judge me according to the law, and yet '
  - type: note
    content: Deut. 25:1, 2; See John 7:51
  - type: text
    content: 'contrary to the law you '
  - type: note
    content: Deut. 25:1, 2; See John 7:51
  - type: text
    content: 'order me to be struck?” '
  '30':
  - type: note
    content: ver. 20
  - type: text
    content: 'And when it was disclosed to me '
  - type: note
    content: ver. 12; See ch. 9:24
  - type: text
    content: 'that there would be a plot against the man, I sent him to you at once, '
  - type: note
    content: ver. 35; [ch. 24:19; 25:16]
  - type: text
    content: ordering his accusers also to state before you what they have against him.”
  '31':
  - type: text
    content: 'So the soldiers, according to their instructions, took Paul and brought him by night to Antipatris. '
  '32':
  - type: text
    content: 'And on the next day they returned to '
  - type: note
    content: ver. 10, 16
  - type: text
    content: 'the barracks, letting the horsemen go on with him. '
  '33':
  - type: text
    content: 'When they had come to Caesarea and delivered the letter to the governor, they presented Paul also before him. '
  '34':
  - type: text
    content: 'On reading the letter, he asked what '
  - type: note
    content: ch. 25:1
  - type: text
    content: 'province he was from. And when he learned '
  - type: note
    content: ch. 21:39
  - type: text
    content: 'that he was from Cilicia, '
  '35':
  - type: text
    content: 'he said, “I will give you a hearing '
  - type: note
    content: ver. 30
  - type: text
    content: 'when your accusers arrive.” And he commanded him to be guarded in Herod’s '
  - type: note
    content: See Matt. 27:27
  - type: text
    content: praetorium.
  '4':
  - type: text
    content: 'Those who stood by said, “Would you revile '
  - type: note
    content: '[1 Sam. 2:28; Ps. 106:16]'
  - type: text
    content: 'God’s high priest?” '
  '5':
  - type: text
    content: 'And Paul said, '
  - type: note
    content: '[ch. 24:1]'
  - type: text
    content: '“I did not know, brothers, that he was the high priest, for it is written, '
  - type: note
    content: Cited from Ex. 22:28
  - type: text
    content: ‘You shall not speak evil of a ruler of your people.’”
  '6':
  - type: text
    content: 'Now when Paul perceived that one part were '
  - type: note
    content: See Matt. 22:23
  - type: text
    content: 'Sadducees and the other Pharisees, he cried out in the council, “Brothers, '
  - type: note
    content: ch. 26:5; Phil. 3:5
  - type: text
    content: 'I am a Pharisee, a son of Pharisees. It is '
  - type: note
    content: ch. 24:15, 21; 26:6-8; 28:20
  - type: text
    content: 'with respect to the '
  - type: note
    content: '[ch. 2:26, 27]; See Col. 1:5'
  - type: text
    content: 'hope and the resurrection of the dead that I am on trial.” '
  '7':
  - type: text
    content: 'And when he had said this, a dissension arose between the Pharisees and the Sadducees, and the assembly was divided. '
  '8':
  - type: text
    content: 'For the Sadducees '
  - type: note
    content: Luke 20:27; [1 Cor. 15:12]
  - type: text
    content: 'say that there is no resurrection, nor angel, nor spirit, but the Pharisees acknowledge them all. '
  '9':
  - type: text
    content: 'Then a great clamor arose, and some of '
  - type: note
    content: ch. 4:5; Mark 2:16; Luke 5:30
  - type: text
    content: 'the scribes of the Pharisees’ party stood up and contended sharply, '
  - type: note
    content: '[ver. 29]'
  - type: text
    content: '“We find nothing wrong in this man. What '
  - type: note
    content: '[ch. 22:7, 17, 18; John 12:29]'
  - type: text
    content: 'if a spirit or an angel spoke to him?” '
