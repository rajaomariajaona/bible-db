document_id: EXO.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Water from the Rock
  - type: text
    content: ' '
  - type: note
    content: ch. 16:1; Num. 33:12, 14
  - type: text
    content: 'All the congregation of the people of Israel moved on from the wilderness of Sin by stages, according to the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ', and camped at Rephidim, but there was no water for the people to drink. '
  '10':
  - type: text
    content: 'So '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Joshua did as Moses told him, and fought with Amalek, while Moses, Aaron, and '
  - type: note
    content: ch. 24:14; 31:2
  - type: text
    content: 'Hur went up to the top of the hill. '
  '11':
  - type: text
    content: 'Whenever Moses '
  - type: note
    content: '[1 Tim. 2:8]'
  - type: text
    content: 'held up his hand, Israel prevailed, and whenever he lowered his hand, Amalek prevailed. '
  '12':
  - type: text
    content: 'But Moses’ hands grew weary, so they took a stone and put it under him, and he sat on it, while Aaron and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'Hur held up his hands, one on one side, and the other on the other side. So his hands were steady until the going down of the sun. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: Joshua overwhelmed Amalek and his people with the sword.
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Write this as a memorial in a book and recite it in the ears of '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Joshua, that '
  - type: note
    content: Num. 24:20; Deut. 25:19; 1 Sam. 15:3, 7; 30:1, 17; 2 Sam. 8:12
  - type: text
    content: 'I will utterly blot out the memory of Amalek from under heaven.” '
  '15':
  - type: text
    content: 'And Moses '
  - type: note
    content: '[Judg. 6:24]'
  - type: text
    content: 'built an altar and called the name of it, The '
  - type: text
    content: Lord
  - type: text
    content: ' Is My Banner, '
  '16':
  - type: text
    content: saying, “A hand upon the throne
  - type: note
    content: A slight change would yield upon the banner
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will have war with Amalek from generation to generation.”'
  '2':
  - type: note
    content: Num. 20:3, 4
  - type: text
    content: 'Therefore the people quarreled with Moses and said, “Give us water to drink.” And Moses said to them, “Why do you quarrel with me? Why do you '
  - type: note
    content: Deut. 6:16; Ps. 78:18, 41; 95:8, 9; Isa. 7:12; Matt. 4:7; 1 Cor. 10:9; Heb. 3:8, 9
  - type: text
    content: 'test the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '3':
  - type: text
    content: 'But the people thirsted there for water, and '
  - type: note
    content: ch. 15:24; 16:2
  - type: text
    content: 'the people grumbled against Moses and said, “Why did you bring us up out of Egypt, to kill us and our children and our livestock with thirst?” '
  '4':
  - type: text
    content: 'So Moses cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', “What shall I do with this people? They are almost ready '
  - type: note
    content: Num. 14:10; 1 Sam. 30:6; 2 Chr. 24:21; Matt. 23:37; Luke 13:34; John 8:59; 10:31-33; 11:8; Acts 7:58; 14:5, 19; 2 Cor. 11:25; Heb. 11:37; [Josh. 9:25; 1 Kgs. 21:13]
  - type: text
    content: 'to stone me.” '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Pass on before the people, taking with you some of the elders of Israel, and take in your hand the staff with '
  - type: note
    content: ch. 7:20
  - type: text
    content: 'which you struck the Nile, and go. '
  '6':
  - type: note
    content: Num. 20:8-11; Deut. 8:15; Neh. 9:15; Ps. 78:15, 16, 20; 105:41; 114:8; Isa. 43:20; 48:21; 1 Cor. 10:4
  - type: text
    content: 'Behold, I will stand before you there on the rock at Horeb, and you shall strike the rock, and water shall come out of it, and the people will drink.” And Moses did so, in the sight of the elders of Israel. '
  '7':
  - type: text
    content: 'And he called the name of the place '
  - type: note
    content: Ps. 95:8
  - type: text
    content: Massah
  - type: note
    content: Massah means testing
  - type: text
    content: ' and '
  - type: note
    content: Num. 20:13; Ps. 81:7; 95:8
  - type: text
    content: Meribah,
  - type: note
    content: Meribah means quarreling
  - type: text
    content: ' because of the quarreling of the people of Israel, and because they tested the '
  - type: text
    content: Lord
  - type: text
    content: ' by saying, “Is the '
  - type: text
    content: Lord
  - type: text
    content: ' among us or not?”'
  - type: heading
    content: Israel Defeats Amalek
  '8':
  - type: text
    content: ' '
  - type: note
    content: Deut. 25:17; 1 Sam. 15:2
  - type: text
    content: 'Then Amalek came and fought with Israel at Rephidim. '
  '9':
  - type: text
    content: 'So Moses said to '
  - type: note
    content: ch. 24:13; 32:17; 33:11
  - type: text
    content: 'Joshua, “Choose for us men, and go out and fight with Amalek. Tomorrow I will stand on the top of the hill with '
  - type: note
    content: ch. 4:20
  - type: text
    content: 'the staff of God in my hand.” '
