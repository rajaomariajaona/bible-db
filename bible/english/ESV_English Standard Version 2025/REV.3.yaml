document_id: REV.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Church in Sardis
  - type: text
    content: ' '
  - type: text
    content: '“And to the angel of the church in Sardis write: ‘The words of him '
  - type: note
    content: See ch. 1:4, 16
  - type: text
    content: who has the seven spirits of God and the seven stars.
  - type: text
    content: '“‘I know your works. You have the reputation '
  - type: note
    content: 1 Tim. 5:6
  - type: text
    content: 'of being alive, '
  - type: note
    content: See Luke 15:24
  - type: text
    content: but you are dead.
  - type: text
    content: ' '
  '10':
  - type: note
    content: ch. 1:9; 2 Pet. 2:9
  - type: text
    content: 'Because you have kept my word about patient endurance, I will keep you from the hour of trial that is coming on the whole world, to try '
  - type: note
    content: ch. 6:10; 8:13; 11:10; 13:8, 14; 17:8
  - type: text
    content: those who dwell on the earth.
  - type: text
    content: ' '
  '11':
  - type: note
    content: ch. 22:7, 12, 20
  - type: text
    content: 'I am coming soon. '
  - type: note
    content: ch. 2:25
  - type: text
    content: 'Hold fast what you have, so that no one may seize '
  - type: note
    content: ch. 2:10
  - type: text
    content: your crown.
  - type: text
    content: ' '
  '12':
  - type: note
    content: See ch. 2:7
  - type: text
    content: 'The one who conquers, I will make him '
  - type: note
    content: 1 Kgs. 7:21; 2 Chr. 3:17; Jer. 1:18; Gal. 2:9; [Ps. 23:6; 27:4]
  - type: text
    content: 'a pillar in the temple of my God. Never shall he go out of it, and I will write on him '
  - type: note
    content: ch. 14:1; 22:4
  - type: text
    content: 'the name of my God, and '
  - type: note
    content: ch. 21:2; Ezek. 48:35; [Gal. 4:26; Heb. 12:22]
  - type: text
    content: 'the name of the city of my God, '
  - type: note
    content: ch. 21:2; Ezek. 48:35; [Gal. 4:26; Heb. 12:22]
  - type: text
    content: 'the new Jerusalem, '
  - type: note
    content: ch. 21:10
  - type: text
    content: 'which comes down from my God out of heaven, and my own '
  - type: note
    content: ch. 2:17
  - type: text
    content: new name.
  - type: text
    content: ' '
  '13':
  - type: note
    content: '[See ch. 2:7 above]'
  - type: text
    content: He who has an ear, let him hear what the Spirit says to the churches.’
  - type: heading
    content: To the Church in Laodicea
  '14':
  - type: text
    content: ' '
  - type: text
    content: '“And to the angel of the church in Laodicea write: ‘The words of the '
  - type: note
    content: 2 Cor. 1:20
  - type: text
    content: 'Amen, '
  - type: note
    content: ver. 7 ; ch. 1:5; 19:11; 22:6
  - type: text
    content: 'the faithful and true witness, '
  - type: note
    content: Col. 1:15, 18; [ch. 21:6; 22:13; Prov. 8:22 ]
  - type: text
    content: the beginning of God’s creation.
  '15':
  - type: text
    content: ' '
  - type: text
    content: '“‘I know your works: you are neither cold nor hot. '
  - type: note
    content: '[ 2 Pet. 2:21 ]'
  - type: text
    content: Would that you were either cold or hot!
  - type: text
    content: ' '
  '16':
  - type: text
    content: So, because you are lukewarm, and neither hot nor cold, I will spit you out of my mouth.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Hos. 12:8; Zech. 11:5; 1 Cor. 4:8
  - type: text
    content: 'For you say, “I am rich, I have prospered, and I need nothing,” not realizing that you are wretched, pitiable, poor, '
  - type: note
    content: John 9:39-41; Eph. 1:18
  - type: text
    content: blind, and naked.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I counsel you '
  - type: note
    content: Isa. 55:1; Matt. 13:44; 25:9; [Prov. 8:19]
  - type: text
    content: 'to buy from me gold refined by fire, so that you may be rich, and '
  - type: note
    content: '[ch. 19:8]; See ver. 4'
  - type: text
    content: 'white garments so that you may clothe yourself and '
  - type: note
    content: ch. 16:15
  - type: text
    content: 'the shame of your nakedness may not be seen, and salve to anoint your eyes, '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: so that you may see.
  - type: text
    content: ' '
  '19':
  - type: note
    content: See Heb. 12:6
  - type: text
    content: Those whom I love, I reprove and discipline, so be zealous and repent.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Wake up, and strengthen what remains and is about to die, for I have not found your works '
  - type: note
    content: Acts 14:26
  - type: text
    content: complete in the sight of my God.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Behold, I stand at the door and '
  - type: note
    content: '[Song 5:2]'
  - type: text
    content: 'knock. '
  - type: note
    content: Luke 12:36
  - type: text
    content: 'If anyone hears my voice and opens the door, '
  - type: note
    content: John 14:23; [Luke 24:29, 30]
  - type: text
    content: I will come in to him and eat with him, and he with me.
  - type: text
    content: ' '
  '21':
  - type: note
    content: See ch. 2:7
  - type: text
    content: 'The one who conquers, '
  - type: note
    content: ch. 20:4; [ch. 2:26; John 12:26; 2 Tim. 2:12]; See Matt. 19:28
  - type: text
    content: 'I will grant him to sit with me on my throne, as '
  - type: note
    content: ch. 5:5; 6:2; 17:14; John 16:33
  - type: text
    content: I also conquered and sat down with my Father on his throne.
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[See ch. 2:7 above]'
  - type: text
    content: He who has an ear, let him hear what the Spirit says to the churches.’”
  '3':
  - type: note
    content: '[2 Tim. 1:13]'
  - type: text
    content: 'Remember, then, what you received and heard. Keep it, and repent. If you will not wake up, '
  - type: note
    content: ch. 2:5
  - type: text
    content: 'I will come '
  - type: note
    content: ch. 16:15; Matt. 24:43; 1 Thess. 5:2, 4; 2 Pet. 3:10
  - type: text
    content: like a thief, and you will not know at what hour I will come against you.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Yet you have still a few names in Sardis, people who have not '
  - type: note
    content: Jude 23
  - type: text
    content: 'soiled their garments, and they will walk with me '
  - type: note
    content: ch. 6:11; 7:9; [Eccles. 9:8]
  - type: text
    content: 'in white, for they are '
  - type: note
    content: '[Luke 20:35]'
  - type: text
    content: worthy.
  - type: text
    content: ' '
  '5':
  - type: note
    content: See ch. 2:7
  - type: text
    content: 'The one who conquers will be clothed thus in white garments, and I will never '
  - type: note
    content: See Ex. 32:32
  - type: text
    content: 'blot his name out of '
  - type: note
    content: ch. 13:8; 17:8; 20:12, 15; 21:27; Phil. 4:3
  - type: text
    content: 'the book of life. '
  - type: note
    content: Matt. 10:32; Luke 12:8
  - type: text
    content: I will confess his name before my Father and before his angels.
  - type: text
    content: ' '
  '6':
  - type: note
    content: '[See ch. 2:7 above]'
  - type: text
    content: He who has an ear, let him hear what the Spirit says to the churches.’
  - type: heading
    content: To the Church in Philadelphia
  '7':
  - type: text
    content: ' '
  - type: text
    content: '“And to the angel of the church in Philadelphia write: ‘The words of '
  - type: note
    content: ch. 6:10
  - type: text
    content: 'the holy one, '
  - type: note
    content: ver. 14 ; ch. 19:11; 1 John 5:20
  - type: text
    content: 'the true one, '
  - type: note
    content: Isa. 22:22; [ Luke 1:32 ]
  - type: text
    content: 'who has the key of David, '
  - type: note
    content: Job 12:14; [ Matt. 16:19 ]
  - type: text
    content: who opens and no one will shut, who shuts and no one opens.
  '8':
  - type: text
    content: ' '
  - type: text
    content: '“‘I know your works. Behold, I have set before you '
  - type: note
    content: Acts 14:27; 1 Cor. 16:9; 2 Cor. 2:12; Col. 4:3
  - type: text
    content: an open door, which no one is able to shut. I know that you have but little power, and yet you have kept my word and have not denied my name.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Behold, I will make those of '
  - type: note
    content: ch. 2:9
  - type: text
    content: 'the synagogue of Satan who say that they are Jews and are not, but lie—behold, '
  - type: note
    content: '[Isa. 45:14; 49:23; 60:14]'
  - type: text
    content: 'I will make them come and bow down before your feet, and they will learn that '
  - type: note
    content: Isa. 43:4
  - type: text
    content: I have loved you.
  - type: text
    content: ' '
