document_id: 2CH.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah Keeps the Passover
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 23:21-23
  - type: text
    content: 'Josiah kept a Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem. And they slaughtered the Passover lamb '
  - type: note
    content: Ex. 12:6; Ezra 6:19
  - type: text
    content: 'on the fourteenth day of the first month. '
  '10':
  - type: text
    content: 'When the service had been prepared for, the priests '
  - type: note
    content: ch. 30:16
  - type: text
    content: 'stood in their place, '
  - type: note
    content: Ezra 6:18
  - type: text
    content: 'and the Levites in their divisions according to the king’s command. '
  '11':
  - type: note
    content: ch. 30:15; Ezra 6:20
  - type: text
    content: 'And they slaughtered the Passover lamb, and the priests '
  - type: note
    content: See ch. 29:22
  - type: text
    content: 'threw the blood that they received from them '
  - type: note
    content: '[ch. 29:34]'
  - type: text
    content: 'while the Levites flayed the sacrifices. '
  '12':
  - type: text
    content: 'And they set aside the burnt offerings that they might distribute them according to the groupings of the fathers’ houses of the lay people, to offer to the '
  - type: text
    content: Lord
  - type: text
    content: ', as it is written in the Book of Moses. And so they did with the bulls. '
  '13':
  - type: note
    content: Ex. 12:8, 9; Deut. 16:7
  - type: text
    content: 'And they roasted the Passover lamb with fire according to the rule; and they '
  - type: note
    content: '[1 Sam. 2:13-15]'
  - type: text
    content: 'boiled the holy offerings in pots, in cauldrons, and in pans, and carried them quickly to all the lay people. '
  '14':
  - type: text
    content: 'And afterward they prepared for themselves and for the priests, because the priests, the sons of Aaron, were offering the burnt offerings and the fat parts until night; so the Levites prepared for themselves and for the priests, the sons of Aaron. '
  '15':
  - type: text
    content: 'The singers, the sons of Asaph, were in their place '
  - type: note
    content: See 1 Chr. 25
  - type: text
    content: 'according to the command of David, and Asaph, and Heman, and Jeduthun the king’s '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'seer; '
  - type: note
    content: See 1 Chr. 9:17-29; 26:1-19
  - type: text
    content: and the gatekeepers were at each gate. They did not need to depart from their service, for their brothers the Levites prepared for them.
  '16':
  - type: text
    content: 'So all the service of the '
  - type: text
    content: Lord
  - type: text
    content: ' was prepared that day, to keep the Passover and to offer burnt offerings on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to the command of King Josiah. '
  '17':
  - type: text
    content: 'And the people of Israel who were present kept the Passover at that time, '
  - type: note
    content: See ch. 30:21
  - type: text
    content: 'and the Feast of Unleavened Bread seven days. '
  '18':
  - type: note
    content: 2 Kgs. 23:22, 23
  - type: text
    content: 'No Passover like it had been kept in Israel since the days of Samuel the prophet. None of the kings of Israel had kept such a Passover as was kept by Josiah, and the priests and the Levites, and all Judah and Israel who were present, and the inhabitants of Jerusalem. '
  '19':
  - type: text
    content: In the eighteenth year of the reign of Josiah this Passover was kept.
  - type: heading
    content: Josiah Killed in Battle
  '2':
  - type: text
    content: 'He appointed the priests to their offices '
  - type: note
    content: ch. 29:11
  - type: text
    content: 'and encouraged them in the service of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 23:29, 30
  - type: text
    content: 'After all this, when Josiah had prepared the temple, Neco king of Egypt went up to fight at '
  - type: note
    content: '[Jer. 46:2]'
  - type: text
    content: 'Carchemish on the Euphrates, and Josiah went out to meet him. '
  '21':
  - type: text
    content: 'But he sent envoys to him, saying, “What have we to do with each other, king of Judah? I am not coming against you this day, but against the house with which I am at war. And God has commanded me to hurry. Cease opposing God, who is with me, lest he destroy you.” '
  '22':
  - type: text
    content: 'Nevertheless, Josiah did not turn away from him, but '
  - type: note
    content: '[1 Kgs. 22:30]'
  - type: text
    content: 'disguised himself in order to fight with him. He did not listen to the words of Neco from the mouth of God, but came to fight in the plain of '
  - type: note
    content: Judg. 5:19
  - type: text
    content: 'Megiddo. '
  '23':
  - type: text
    content: 'And the archers shot King Josiah. And the king said to his servants, '
  - type: note
    content: '[1 Kgs. 22:34]'
  - type: text
    content: '“Take me away, for I am badly wounded.” '
  '24':
  - type: text
    content: 'So his servants took him out of the chariot and carried him in his second chariot and brought him to Jerusalem. And he died and was buried in the tombs of his fathers. '
  - type: note
    content: '[Zech. 12:11]'
  - type: text
    content: 'All Judah and Jerusalem mourned for Josiah. '
  '25':
  - type: note
    content: Lam. 4:20; [2 Sam. 1:17]
  - type: text
    content: 'Jeremiah also uttered a lament for Josiah; and all '
  - type: note
    content: 2 Sam. 19:35; Ezra 2:65; Neh. 7:67; [Matt. 9:23]
  - type: text
    content: 'the singing men and singing women have spoken of Josiah in their laments to this day. They made these a rule in Israel; behold, they are written in the Laments. '
  '26':
  - type: text
    content: 'Now the rest of the acts of Josiah, and his good deeds according to what is written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '27':
  - type: text
    content: and his acts, first and last, behold, they are written in the Book of the Kings of Israel and Judah.
  '3':
  - type: text
    content: 'And he said to the Levites '
  - type: note
    content: ch. 17:9; Neh. 8:7, 9; [ch. 15:3; 30:22; Lev. 10:11; Deut. 33:10; Ezra 7:10; Mal. 2:7]
  - type: text
    content: 'who taught all Israel and who were holy to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Put the holy ark in the house that Solomon the son of David, king of Israel, built. You need not carry it on your shoulders. Now serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and his people Israel. '
  '4':
  - type: text
    content: 'Prepare yourselves '
  - type: note
    content: 1 Chr. 9:9
  - type: text
    content: 'according to your fathers’ houses by your divisions, '
  - type: note
    content: See 1 Chr. 23–26
  - type: text
    content: 'as prescribed in the writing of David king of Israel '
  - type: note
    content: ch. 8:14
  - type: text
    content: 'and the document of Solomon his son. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 134:1
  - type: text
    content: 'stand in the Holy Place '
  - type: note
    content: '[Ezra 6:18]'
  - type: text
    content: 'according to the groupings of the fathers’ houses of your brothers the lay people, and according to the division of the Levites by fathers’ household. '
  '6':
  - type: text
    content: 'And slaughter the Passover lamb, and '
  - type: note
    content: See ch. 29:5
  - type: text
    content: 'consecrate yourselves, and prepare for your brothers, to do according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' by'
  - type: note
    content: Hebrew by the hand of
  - type: text
    content: ' Moses.”'
  '7':
  - type: text
    content: 'Then Josiah contributed to the lay people, as Passover offerings for all who were present, lambs and young goats from the flock to the number of 30,000, and 3,000 bulls; '
  - type: note
    content: '[ch. 31:3]'
  - type: text
    content: 'these were from the king’s possessions. '
  '8':
  - type: text
    content: 'And his officials contributed willingly to the people, to the priests, and to the Levites. '
  - type: note
    content: ch. 34:9, 14
  - type: text
    content: 'Hilkiah, Zechariah, and Jehiel, the chief officers of the house of God, gave to the priests for the Passover offerings 2,600 Passover lambs and 300 bulls. '
  '9':
  - type: text
    content: Conaniah also, and Shemaiah and Nethanel his brothers, and Hashabiah and Jeiel and Jozabad, the chiefs of the Levites, gave to the Levites for the Passover offerings 5,000 lambs and young goats and 500 bulls.
