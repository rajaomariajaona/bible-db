document_id: 2CH.35,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah Keeps the Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:21-23
      marker-yv: yv-n
    - type: text
      text: 'Josiah kept a Passover to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Jerusalem. And they slaughtered the Passover lamb '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 6:19
      marker-yv: yv-n
    - type: text
      text: 'on the fourteenth day of the first month. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the service had been prepared for, the priests '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:16
      marker-yv: yv-n
    - type: text
      text: 'stood in their place, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 6:18
      marker-yv: yv-n
    - type: text
      text: 'and the Levites in their divisions according to the king’s command. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 6:20
      marker-yv: yv-n
    - type: text
      text: 'And they slaughtered the Passover lamb, and the priests '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:22
      marker-yv: yv-n
    - type: text
      text: 'threw the blood that they received from them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:34
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'while the Levites flayed the sacrifices. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they set aside the burnt offerings that they might distribute them according to the groupings of the fathers’ houses of the lay people, to offer to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as it is written in the Book of Moses. And so they did with the bulls. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 16:7
      marker-yv: yv-n
    - type: text
      text: 'And they roasted the Passover lamb with fire according to the rule; and they '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 2:13-15
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'boiled the holy offerings in pots, in cauldrons, and in pans, and carried them quickly to all the lay people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And afterward they prepared for themselves and for the priests, because the priests, the sons of Aaron, were offering the burnt offerings and the fat parts until night; so the Levites prepared for themselves and for the priests, the sons of Aaron. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The singers, the sons of Asaph, were in their place '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 25
      marker-yv: yv-n
    - type: text
      text: 'according to the command of David, and Asaph, and Heman, and Jeduthun the king’s '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 9:9
      marker-yv: yv-n
    - type: text
      text: 'seer; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 9:17-29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:1-19
      marker-yv: yv-n
    - type: text
      text: and the gatekeepers were at each gate. They did not need to depart from their service, for their brothers the Levites prepared for them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the service of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was prepared that day, to keep the Passover and to offer burnt offerings on the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to the command of King Josiah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel who were present kept the Passover at that time, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:21
      marker-yv: yv-n
    - type: text
      text: 'and the Feast of Unleavened Bread seven days. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      marker-yv: yv-n
    - type: text
      text: 'No Passover like it had been kept in Israel since the days of Samuel the prophet. None of the kings of Israel had kept such a Passover as was kept by Josiah, and the priests and the Levites, and all Judah and Israel who were present, and the inhabitants of Jerusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the eighteenth year of the reign of Josiah this Passover was kept.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah Killed in Battle
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He appointed the priests to their offices '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:11
      marker-yv: yv-n
    - type: text
      text: 'and encouraged them in the service of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:29
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      marker-yv: yv-n
    - type: text
      text: 'After all this, when Josiah had prepared the temple, Neco king of Egypt went up to fight at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 46:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Carchemish on the Euphrates, and Josiah went out to meet him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he sent envoys to him, saying, “What have we to do with each other, king of Judah? I am not coming against you this day, but against the house with which I am at war. And God has commanded me to hurry. Cease opposing God, who is with me, lest he destroy you.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless, Josiah did not turn away from him, but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:30
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'disguised himself in order to fight with him. He did not listen to the words of Neco from the mouth of God, but came to fight in the plain of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 5:19
      marker-yv: yv-n
    - type: text
      text: 'Megiddo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the archers shot King Josiah. And the king said to his servants, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:34
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Take me away, for I am badly wounded.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So his servants took him out of the chariot and carried him in his second chariot and brought him to Jerusalem. And he died and was buried in the tombs of his fathers. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 12:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'All Judah and Jerusalem mourned for Josiah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lam. 4:20
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 1:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Jeremiah also uttered a lament for Josiah; and all '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 19:35
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 2:65
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 7:67
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 9:23
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the singing men and singing women have spoken of Josiah in their laments to this day. They made these a rule in Israel; behold, they are written in the Laments. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Josiah, and his good deeds according to what is written in the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and his acts, first and last, behold, they are written in the Book of the Kings of Israel and Judah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to the Levites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 8:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: text
        text: '15:3; 30:22; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 10:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 33:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 7:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 2:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'who taught all Israel and who were holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Put the holy ark in the house that Solomon the son of David, king of Israel, built. You need not carry it on your shoulders. Now serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and his people Israel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prepare yourselves '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 9:9
      marker-yv: yv-n
    - type: text
      text: 'according to your fathers’ houses by your divisions, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: text
        text: 1 Chr. 23–26
      marker-yv: yv-n
    - type: text
      text: 'as prescribed in the writing of David king of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:14
      marker-yv: yv-n
    - type: text
      text: 'and the document of Solomon his son. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 134:1
      marker-yv: yv-n
    - type: text
      text: 'stand in the Holy Place '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 6:18
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'according to the groupings of the fathers’ houses of your brothers the lay people, and according to the division of the Levites by fathers’ household. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And slaughter the Passover lamb, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:5
      marker-yv: yv-n
    - type: text
      text: 'consecrate yourselves, and prepare for your brothers, to do according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: by the hand of
      marker-yv: yv-n
    - type: text
      text: ' Moses.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Josiah contributed to the lay people, as Passover offerings for all who were present, lambs and young goats from the flock to the number of 30,000, and 3,000 bulls; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'these were from the king’s possessions. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his officials contributed willingly to the people, to the priests, and to the Levites. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      marker-yv: yv-n
    - type: text
      text: 'Hilkiah, Zechariah, and Jehiel, the chief officers of the house of God, gave to the priests for the Passover offerings 2,600 Passover lambs and 300 bulls. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Conaniah also, and Shemaiah and Nethanel his brothers, and Hashabiah and Jeiel and Jozabad, the chiefs of the Levites, gave to the Levites for the Passover offerings 5,000 lambs and young goats and 500 bulls.
