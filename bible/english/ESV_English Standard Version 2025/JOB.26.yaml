document_id: JOB.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job Replies: God’s Majesty Is Unsearchable'
  - type: text
    content: 'Then Job answered and said:'
  '10':
  - type: text
    content: 'He has inscribed '
  - type: note
    content: Prov. 8:29; [ch. 38:8-11; Ps. 33:7; Jer. 5:22]
  - type: text
    content: a circle on the face of the waters
  - type: text
    content: at the boundary between light and darkness.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:6; Ps. 75:3
  - type: text
    content: The pillars of heaven tremble
  - type: text
    content: 'and are astounded at his '
  - type: note
    content: Ps. 104:7
  - type: text
    content: rebuke.
  '12':
  - type: text
    content: 'By his power he '
  - type: note
    content: Isa. 51:15; Jer. 31:35
  - type: text
    content: stilled the sea;
  - type: text
    content: 'by his understanding he shattered '
  - type: note
    content: See ch. 9:13
  - type: text
    content: Rahab.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 33:6 ]'
  - type: text
    content: By his wind the heavens were made fair;
  - type: text
    content: 'his hand pierced '
  - type: note
    content: Isa. 27:1
  - type: text
    content: the fleeing serpent.
  '14':
  - type: text
    content: 'Behold, these are but the outskirts of his '
  - type: note
    content: ch. 40:19
  - type: text
    content: ways,
  - type: text
    content: 'and how small '
  - type: note
    content: ch. 4:12
  - type: text
    content: a whisper do we hear of him!
  - type: text
    content: But the thunder of his power who can understand?”
  '2':
  - type: text
    content: '“How you have '
  - type: note
    content: Isa. 40:29
  - type: text
    content: helped him who has no power!
  - type: text
    content: 'How you have saved '
  - type: note
    content: Gen. 49:24; Hos. 7:15
  - type: text
    content: the arm that has no strength!
  '3':
  - type: text
    content: 'How you have '
  - type: note
    content: Ps. 73:24; James 1:5
  - type: text
    content: counseled him who has no wisdom,
  - type: text
    content: and plentifully declared sound knowledge!
  '4':
  - type: text
    content: With whose help have you uttered words,
  - type: text
    content: 'and whose breath '
  - type: note
    content: Gen. 2:7
  - type: text
    content: has come out from you?
  '5':
  - type: text
    content: 'The '
  - type: note
    content: Ps. 88:10
  - type: text
    content: dead tremble
  - type: text
    content: under the waters and their inhabitants.
  '6':
  - type: text
    content: 'Sheol is '
  - type: note
    content: Ps. 139:8; Prov. 15:11
  - type: text
    content: naked before God,
  - type: note
    content: Hebrew him
  - type: text
    content: 'and '
  - type: note
    content: Rev. 9:11
  - type: text
    content: Abaddon has no covering.
  '7':
  - type: text
    content: 'He '
  - type: note
    content: See ch. 9:8
  - type: text
    content: 'stretches out the north over '
  - type: note
    content: '[Gen. 1:2]'
  - type: text
    content: the void
  - type: text
    content: and hangs the earth on nothing.
  '8':
  - type: text
    content: 'He '
  - type: note
    content: Prov. 30:4
  - type: text
    content: binds up the waters in his thick clouds,
  - type: text
    content: and the cloud is not split open under them.
  '9':
  - type: text
    content: He covers the face of the full moon
  - type: note
    content: Or his throne
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 36:29]'
  - type: text
    content: spreads over it his cloud.
