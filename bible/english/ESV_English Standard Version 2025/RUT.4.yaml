document_id: RUT.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Boaz Redeems Ruth
  - type: text
    content: 'Now Boaz had gone up to '
  - type: note
    content: 2 Sam. 15:2; 18:4, 24, 33; 19:8; Ps. 127:5
  - type: text
    content: 'the gate and sat down there. And behold, '
  - type: note
    content: ch. 2:20
  - type: text
    content: 'the redeemer, of whom Boaz had spoken, came by. So Boaz said, “Turn aside, friend; sit down here.” And he turned aside and sat down. '
  '10':
  - type: text
    content: 'Also Ruth the Moabite, the widow of Mahlon, I have bought to be my wife, '
  - type: note
    content: ver. 5
  - type: text
    content: 'to perpetuate the name of the dead in his inheritance, that the name of the dead may not be cut off from among his brothers and from the gate of his native place. You are witnesses this day.” '
  '11':
  - type: text
    content: 'Then all the people who were '
  - type: note
    content: See ver. 1
  - type: text
    content: 'at the gate and the elders said, “We are witnesses. May the '
  - type: text
    content: Lord
  - type: text
    content: ' make the woman, who is coming into your house, like Rachel and Leah, '
  - type: note
    content: See Gen. 29:31–30:24; 35:16-18
  - type: text
    content: 'who together '
  - type: note
    content: Deut. 25:9
  - type: text
    content: 'built up the house of Israel. May you act worthily in '
  - type: note
    content: Gen. 35:16, 19
  - type: text
    content: 'Ephrathah and '
  - type: note
    content: ver. 14
  - type: text
    content: 'be renowned in Bethlehem, '
  '12':
  - type: text
    content: 'and may your house be like the house of Perez, '
  - type: note
    content: Gen. 38:29; 1 Chr. 2:4; Matt. 1:3
  - type: text
    content: 'whom Tamar bore to Judah, because '
  - type: note
    content: 1 Sam. 2:20
  - type: text
    content: 'of the offspring that the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you by this young woman.”'
  - type: heading
    content: Ruth and Boaz Marry
  '13':
  - type: text
    content: 'So Boaz took Ruth, and she became his wife. And he went in to her, '
  - type: note
    content: Gen. 29:31; 33:5
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave her conception, and she bore a son. '
  '14':
  - type: note
    content: '[Luke 1:58]'
  - type: text
    content: 'Then the women said to Naomi, “Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', who has not left you this day without '
  - type: note
    content: ch. 2:20
  - type: text
    content: 'a redeemer, and may his name '
  - type: note
    content: ver. 11
  - type: text
    content: 'be renowned in Israel! '
  '15':
  - type: text
    content: 'He shall be to you a restorer of life and a nourisher of your old age, for your daughter-in-law who loves you, '
  - type: note
    content: 1 Sam. 1:8
  - type: text
    content: 'who is more to you than seven sons, has given birth to him.” '
  '16':
  - type: text
    content: 'Then Naomi took the child and laid him on her lap and became his nurse. '
  '17':
  - type: note
    content: Luke 1:59
  - type: text
    content: And the women of the neighborhood gave him a name, saying, “A son has been born to Naomi.” They named him Obed. He was the father of Jesse, the father of David.
  - type: heading
    content: The Genealogy of David
  '18':
  - type: text
    content: 'Now these are the generations of Perez: '
  - type: note
    content: For ver. 18-22, see 1 Chr. 2:4-15; Matt. 1:3-6
  - type: text
    content: 'Perez fathered Hezron, '
  '19':
  - type: text
    content: 'Hezron fathered Ram, Ram fathered Amminadab, '
  '2':
  - type: text
    content: 'And he took ten men '
  - type: note
    content: 1 Kgs. 21:8; Prov. 31:23
  - type: text
    content: 'of the elders of the city and said, “Sit down here.” So they sat down. '
  '20':
  - type: note
    content: Num. 1:7; [Ex. 6:23]
  - type: text
    content: 'Amminadab fathered Nahshon, Nahshon fathered Salmon, '
  '21':
  - type: text
    content: 'Salmon fathered Boaz, Boaz fathered Obed, '
  '22':
  - type: text
    content: Obed fathered Jesse, and Jesse fathered David.
  '3':
  - type: text
    content: 'Then he said to the redeemer, “Naomi, who has come back from the country of Moab, is selling the parcel of land that belonged to our relative Elimelech. '
  '4':
  - type: text
    content: 'So I thought I would tell you of it and say, '
  - type: note
    content: Lev. 25:25; [Jer. 32:7, 8]
  - type: text
    content: ‘Buy it in the presence of those sitting here and in the presence of the elders of my people.’ If you will redeem it, redeem it. But if you
  - type: note
    content: Hebrew he
  - type: text
    content: ' will not, tell me, that I may know, for there is no one besides you to redeem it, and I come after you.” And he said, “I will redeem it.” '
  '5':
  - type: text
    content: Then Boaz said, “The day you buy the field from the hand of Naomi, you also acquire Ruth
  - type: note
    content: Masoretic Text you also buy it from Ruth
  - type: text
    content: ' the Moabite, the widow of the dead, in order '
  - type: note
    content: ver. 10; ch. 3:13; Deut. 25:5, 6
  - type: text
    content: 'to perpetuate the name of the dead in his inheritance.” '
  '6':
  - type: note
    content: ch. 3:12, 13
  - type: text
    content: Then the redeemer said, “I cannot redeem it for myself, lest I impair my own inheritance. Take my right of redemption yourself, for I cannot redeem it.”
  '7':
  - type: text
    content: ' '
  - type: note
    content: See Deut. 25:7-10
  - type: text
    content: 'Now this was the custom in former times in Israel concerning redeeming and exchanging: to confirm a transaction, the one drew off his sandal and gave it to the other, and this was the manner of attesting in Israel. '
  '8':
  - type: text
    content: 'So when the redeemer said to Boaz, “Buy it for yourself,” he drew off his sandal. '
  '9':
  - type: text
    content: 'Then Boaz said to the elders and all the people, “You are witnesses this day that I have bought from the hand of Naomi all that belonged to Elimelech and all that belonged to '
  - type: note
    content: ch. 1:2, 4, 5
  - type: text
    content: 'Chilion and to Mahlon. '
