document_id: GEN.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Rescues Lot
  - type: text
    content: 'The '
  - type: note
    content: ch. 18:22
  - type: text
    content: 'two angels came to Sodom in the evening, and Lot was sitting in the gate of Sodom. When Lot saw them, he rose to meet them and bowed himself with his face to the earth '
  '10':
  - type: text
    content: 'But the men reached out their hands and brought Lot into the house with them and shut the door. '
  '11':
  - type: text
    content: 'And they struck with '
  - type: note
    content: '[2 Kgs. 6:18; Acts 13:11]'
  - type: text
    content: blindness the men who were at the entrance of the house, both small and great, so that they wore themselves out groping for the door.
  '12':
  - type: text
    content: 'Then the men said to Lot, “Have you anyone else here? Sons-in-law, sons, daughters, or anyone you have in the city, '
  - type: note
    content: 2 Pet. 2:7, 9; [Rev. 18:4, 5]
  - type: text
    content: 'bring them out of the place. '
  '13':
  - type: text
    content: 'For we are about to destroy this place, '
  - type: note
    content: ch. 18:20
  - type: text
    content: 'because the outcry against its people has become great before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent us to destroy it.” '
  '14':
  - type: text
    content: 'So Lot went out and said to his sons-in-law, who were to marry his daughters, '
  - type: note
    content: Num. 16:21, 26, 45; Jer. 51:6
  - type: text
    content: '“Up! Get out of this place, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to destroy the city.” But he seemed to his sons-in-law to be jesting.'
  '15':
  - type: text
    content: 'As morning dawned, the angels urged Lot, saying, “Up! Take your wife and your two daughters who are here, lest you be swept away in the punishment of the city.” '
  '16':
  - type: text
    content: 'But he lingered. So the men seized him and his wife and his two daughters by the hand, '
  - type: note
    content: '[Ps. 34:22]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' being merciful to him, and they brought him out and set him outside the city. '
  '17':
  - type: text
    content: 'And as they brought them out, one said, “Escape for your life. '
  - type: note
    content: ver. 26; [Matt. 24:16-18]
  - type: text
    content: 'Do not look back or stop anywhere in the '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'valley. Escape to the hills, lest you be swept away.” '
  '18':
  - type: text
    content: 'And Lot said to them, “Oh, no, my lords. '
  '19':
  - type: text
    content: 'Behold, your servant has found favor in your sight, and you have shown me great kindness in saving my life. But I cannot escape to the hills, lest the disaster overtake me and I die. '
  '2':
  - type: text
    content: 'and said, “My lords, '
  - type: note
    content: Heb. 13:2; [Judg. 4:18]
  - type: text
    content: 'please turn aside to your servant’s house and spend the night '
  - type: note
    content: See ch. 18:4
  - type: text
    content: 'and wash your feet. Then you may rise up early and go on your way.” They said, '
  - type: note
    content: '[Luke 24:28]'
  - type: text
    content: '“No; we will spend the night in the town square.” '
  '20':
  - type: text
    content: 'Behold, this city is near enough to flee to, and it is a little one. Let me escape there—is it not a little one?—and my life will be saved!” '
  '21':
  - type: text
    content: 'He said to him, “Behold, I grant you this favor also, that I will not overthrow the city of which you have spoken. '
  '22':
  - type: text
    content: 'Escape there quickly, for I can do nothing till you arrive there.” Therefore the name of the city was called '
  - type: note
    content: ch. 14:2
  - type: text
    content: Zoar.
  - type: note
    content: Zoar means little
  - type: heading
    content: God Destroys Sodom
  '23':
  - type: text
    content: 'The sun had risen on the earth when Lot came to Zoar. '
  '24':
  - type: text
    content: 'Then '
  - type: note
    content: Deut. 29:23; Jer. 20:16; 50:40; Lam. 4:6; Amos 4:11; Zeph. 2:9; Luke 17:29; 2 Pet. 2:6
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' rained on Sodom and Gomorrah sulfur and fire from the '
  - type: text
    content: Lord
  - type: text
    content: ' out of heaven. '
  '25':
  - type: text
    content: 'And he overthrew those cities, and all the valley, and all the inhabitants of the cities, and what grew on the ground. '
  '26':
  - type: text
    content: 'But Lot’s wife, behind him, looked back, and she became '
  - type: note
    content: Luke 17:32
  - type: text
    content: a pillar of salt.
  '27':
  - type: text
    content: 'And Abraham went early in the morning to the place where he had '
  - type: note
    content: ch. 18:22
  - type: text
    content: 'stood before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: And he looked down toward Sodom and Gomorrah and toward all the land of the valley, and he looked and, behold, the smoke of the land went up like the smoke of a furnace.
  '29':
  - type: text
    content: 'So it was that, when God destroyed the cities of the valley, God '
  - type: note
    content: See ch. 8:1
  - type: text
    content: remembered Abraham and sent Lot out of the midst of the overthrow when he overthrew the cities in which Lot had lived.
  - type: heading
    content: Lot and His Daughters
  '3':
  - type: text
    content: But he pressed them strongly; so they turned aside to him and entered his house. And he made them a feast and baked unleavened bread, and they ate.
  '30':
  - type: text
    content: 'Now Lot went up out of Zoar and '
  - type: note
    content: ver. 17, 19
  - type: text
    content: 'lived in the hills with his two daughters, for he was afraid to live in Zoar. So he lived in a cave with his two daughters. '
  '31':
  - type: text
    content: 'And the firstborn said to the younger, “Our father is old, and there is not a man on earth to come in to us after the manner of all the earth. '
  '32':
  - type: text
    content: 'Come, let us make our father drink wine, and we will lie with him, that we may preserve offspring from our father.” '
  '33':
  - type: text
    content: So they made their father drink wine that night. And the firstborn went in and lay with her father. He did not know when she lay down or when she arose.
  '34':
  - type: text
    content: 'The next day, the firstborn said to the younger, “Behold, I lay last night with my father. Let us make him drink wine tonight also. Then you go in and lie with him, that we may preserve offspring from our father.” '
  '35':
  - type: text
    content: 'So they made their father drink wine that night also. And the younger arose and lay with him, and he did not know when she lay down or when she arose. '
  '36':
  - type: text
    content: 'Thus both the daughters of Lot became pregnant by their father. '
  '37':
  - type: text
    content: The firstborn bore a son and called his name Moab.
  - type: note
    content: Moab sounds like the Hebrew for from father
  - type: text
    content: ' '
  - type: note
    content: Deut. 2:9
  - type: text
    content: 'He is the father of the Moabites to this day. '
  '38':
  - type: text
    content: The younger also bore a son and called his name Ben-ammi.
  - type: note
    content: Ben-ammi means son of my people
  - type: text
    content: ' '
  - type: note
    content: Deut. 2:19
  - type: text
    content: He is the father of the Ammonites to this day.
  '4':
  - type: text
    content: 'But before they lay down, the men of the city, the men of Sodom, both young and old, all the people to the last man, surrounded the house. '
  '5':
  - type: note
    content: Isa. 3:9; [ch. 13:13]
  - type: text
    content: 'And they called to Lot, “Where are the men who came to you tonight? '
  - type: note
    content: Judg. 19:22
  - type: text
    content: 'Bring them out to us, that we '
  - type: note
    content: Rom. 1:24, 27; Jude 7
  - type: text
    content: 'may know them.” '
  '6':
  - type: text
    content: 'Lot went out to the men at the entrance, shut the door after him, '
  '7':
  - type: text
    content: 'and said, “I beg you, my brothers, do not act so wickedly. '
  '8':
  - type: note
    content: '[Judg. 19:24]'
  - type: text
    content: 'Behold, I have two daughters who have not known any man. Let me bring them out to you, and do to them as you please. Only do nothing to these men, for they have come under the shelter of my roof.” '
  '9':
  - type: text
    content: 'But they said, “Stand back!” And they said, “This fellow '
  - type: note
    content: ch. 13:12
  - type: text
    content: 'came to sojourn, and '
  - type: note
    content: Ex. 2:14
  - type: text
    content: 'he has become the judge! Now we will deal worse with you than with them.” Then they pressed hard against the man Lot, and drew near to break the door down. '
