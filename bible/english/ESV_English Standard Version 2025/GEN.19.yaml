  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the firstborn said to the younger, “Our father is old, and there is not a man on earth to come in to us after the manner of all the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Come, let us make our father drink wine, and we will lie with him, that we may preserve offspring from our father.” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So they made their father drink wine that night. And the firstborn went in and lay with her father. He did not know when she lay down or when she arose.
