    - type: text
      text: '34'
  - type: text
    text: 'The next day, the firstborn said to the younger, “Behold, I lay last night with my father. Let us make him drink wine tonight also. Then you go in and lie with him, that we may preserve offspring from our father.” '
  - type: usfm
    marker: v
    metadata:
