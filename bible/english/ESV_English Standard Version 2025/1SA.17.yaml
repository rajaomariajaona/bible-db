document_id: 1SA.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Goliath
  - type: text
    content: 'Now the Philistines '
  - type: note
    content: ch. 13:5
  - type: text
    content: 'gathered their armies for battle. And they were gathered at '
  - type: note
    content: Josh. 15:35
  - type: text
    content: 'Socoh, which belongs to Judah, and encamped between Socoh and '
  - type: note
    content: Josh. 10:10; Neh. 11:30
  - type: text
    content: 'Azekah, in '
  - type: note
    content: '[1 Chr. 11:13]'
  - type: text
    content: 'Ephes-dammim. '
  '10':
  - type: text
    content: 'And the Philistine said, '
  - type: note
    content: ver. 25, 26, 36, 45; [2 Sam. 21:21]
  - type: text
    content: '“I defy the ranks of Israel this day. Give me a man, that we may fight together.” '
  '11':
  - type: text
    content: When Saul and all Israel heard these words of the Philistine, they were dismayed and greatly afraid.
  '12':
  - type: text
    content: 'Now David was '
  - type: note
    content: ver. 58; ch. 16:1, 18; Ruth 4:22
  - type: text
    content: 'the son of an '
  - type: note
    content: Gen. 35:19
  - type: text
    content: 'Ephrathite of Bethlehem in Judah, '
  - type: note
    content: ver. 58; ch. 16:1, 18
  - type: text
    content: 'named Jesse, '
  - type: note
    content: ch. 16:10, 11; [1 Chr. 2:13-15]
  - type: text
    content: who had eight sons. In the days of Saul the man was already old and advanced in years.
  - type: note
    content: Septuagint, Syriac; Hebrew advanced among men
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'The three oldest sons of Jesse had followed Saul to the battle. And '
  - type: note
    content: ch. 16:6, 8, 9; [1 Chr. 2:13]
  - type: text
    content: 'the names of his three sons who went to the battle were Eliab the firstborn, and next to him Abinadab, and the third Shammah. '
  '14':
  - type: note
    content: ch. 16:11
  - type: text
    content: 'David was the youngest. The three eldest followed Saul, '
  '15':
  - type: text
    content: 'but David went back and forth from Saul '
  - type: note
    content: ch. 16:19
  - type: text
    content: 'to feed his father’s sheep at Bethlehem. '
  '16':
  - type: text
    content: For forty days the Philistine came forward and took his stand, morning and evening.
  '17':
  - type: text
    content: And Jesse said to David his son, “Take for your brothers an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of this parched grain, and these ten loaves, and carry them quickly to the camp to your brothers. '
  '18':
  - type: note
    content: '[ch. 16:20]'
  - type: text
    content: 'Also take these ten cheeses to the commander of their thousand. '
  - type: note
    content: '[Gen. 37:14]'
  - type: text
    content: See if your brothers are well, and bring some token from them.”
  '19':
  - type: text
    content: 'Now Saul and they and all the men of Israel were in the Valley of Elah, fighting with the Philistines. '
  '2':
  - type: text
    content: 'And Saul and the men of Israel were gathered, and encamped in '
  - type: note
    content: ver. 19; ch. 21:9
  - type: text
    content: 'the Valley of Elah, and drew up in line of battle against the Philistines. '
  '20':
  - type: text
    content: 'And David rose early in the morning and left the sheep with a keeper and took the provisions and went, as Jesse had commanded him. And he came to '
  - type: note
    content: ch. 26:5, 7
  - type: text
    content: 'the encampment as the host was going out to the battle line, shouting the war cry. '
  '21':
  - type: text
    content: 'And Israel and the Philistines drew up for battle, army against army. '
  '22':
  - type: text
    content: 'And David left the '
  - type: note
    content: '[Isa. 10:28; Acts 21:15]'
  - type: text
    content: 'things in charge of the keeper of the '
  - type: note
    content: '[Isa. 10:28; Acts 21:15]'
  - type: text
    content: 'baggage and ran to the ranks and went and greeted his brothers. '
  '23':
  - type: text
    content: 'As he talked with them, behold, '
  - type: note
    content: ver. 4
  - type: text
    content: 'the champion, the Philistine of Gath, Goliath by name, came up out of the ranks of the Philistines and spoke '
  - type: note
    content: ver. 8
  - type: text
    content: the same words as before. And David heard him.
  '24':
  - type: text
    content: 'All the men of Israel, when they saw the man, fled from him and were much afraid. '
  '25':
  - type: text
    content: 'And the men of Israel said, “Have you seen this man who has come up? Surely he has come up to '
  - type: note
    content: ver. 10, 36, 45
  - type: text
    content: 'defy Israel. And the king will enrich the man who kills him with great riches '
  - type: note
    content: '[Josh. 15:16]'
  - type: text
    content: 'and will give him his daughter and make his father’s house free in Israel.” '
  '26':
  - type: text
    content: 'And David said to the men who stood by him, “What shall be done for the man who kills this Philistine and takes away '
  - type: note
    content: ch. 11:2
  - type: text
    content: 'the reproach from Israel? For who is this '
  - type: note
    content: See Judg. 14:3
  - type: text
    content: 'uncircumcised Philistine, that he should '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'defy the armies of '
  - type: note
    content: Deut. 5:26; Josh. 3:10
  - type: text
    content: 'the living God?” '
  '27':
  - type: text
    content: 'And the people answered him in the same way, '
  - type: note
    content: ver. 25
  - type: text
    content: “So shall it be done to the man who kills him.”
  '28':
  - type: text
    content: 'Now Eliab his eldest brother heard when he spoke to the men. And Eliab’s anger was kindled against David, and he said, “Why have you come down? And with whom have you left those few sheep in the wilderness? I know your presumption and the evil of your heart, for you have come down to see the battle.” '
  '29':
  - type: text
    content: 'And David said, “What have I done now? Was it not but a word?” '
  '3':
  - type: text
    content: 'And the Philistines stood on the mountain on the one side, and Israel stood on the mountain on the other side, with a valley between them. '
  '30':
  - type: text
    content: 'And he turned away from him toward another, and spoke '
  - type: note
    content: ver. 26, 27
  - type: text
    content: in the same way, and the people answered him again as before.
  '31':
  - type: text
    content: 'When the words that David spoke were heard, they repeated them before Saul, and he sent for him. '
  '32':
  - type: text
    content: 'And David said to Saul, '
  - type: note
    content: '[Deut. 20:3]'
  - type: text
    content: '“Let no man’s heart fail because of him. '
  - type: note
    content: '[ch. 16:18]'
  - type: text
    content: 'Your servant will go and fight with this Philistine.” '
  '33':
  - type: text
    content: 'And Saul said to David, “You are not able to go against this Philistine to fight with him, for you are but a youth, and he has been a man of war from his youth.” '
  '34':
  - type: text
    content: 'But David said to Saul, “Your servant used to keep sheep for his father. And when there came a lion, or a bear, and took a lamb from the flock, '
  '35':
  - type: text
    content: 'I went after him and struck him and delivered it out of his mouth. And if he arose against me, I caught him by his beard and struck him and killed him. '
  '36':
  - type: text
    content: 'Your servant has struck down both lions and bears, and this uncircumcised Philistine shall be like one of them, '
  - type: note
    content: ver. 10, 26
  - type: text
    content: 'for he has defied the armies of the living God.” '
  '37':
  - type: text
    content: 'And David said, '
  - type: note
    content: '[2 Tim. 4:17]'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' who delivered me from the paw of the lion and from the paw of the bear will deliver me from the hand of this Philistine.” And Saul said to David, “Go, '
  - type: note
    content: '[ch. 20:13; 1 Chr. 22:11, 16]'
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you!”'
  '38':
  - type: text
    content: 'Then Saul clothed David with his armor. He put a helmet of bronze on his head and clothed him with a coat of mail, '
  '39':
  - type: text
    content: 'and David strapped his sword over his armor. And he tried in vain to go, for he had not tested them. Then David said to Saul, “I cannot go with these, for I have not tested them.” So David put them off. '
  '4':
  - type: text
    content: 'And there came out from the camp of the Philistines a champion named '
  - type: note
    content: '[2 Sam. 21:19; 1 Chr. 20:4]'
  - type: text
    content: 'Goliath of '
  - type: note
    content: ch. 21:10; Josh. 11:22; 13:3
  - type: text
    content: Gath, whose height was six
  - type: note
    content: Hebrew; Septuagint, Dead Sea Scroll and Josephus four
  - type: text
    content: ' cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and a span. '
  '40':
  - type: text
    content: Then he took his staff in his hand and chose five smooth stones from the brook and put them in his shepherd’s pouch. His sling was in his hand, and he approached the Philistine.
  '41':
  - type: text
    content: 'And the Philistine moved forward and came near to David, '
  - type: note
    content: ver. 7
  - type: text
    content: 'with his shield-bearer in front of him. '
  '42':
  - type: text
    content: 'And when the Philistine looked and saw David, he disdained him, for he was but a youth, '
  - type: note
    content: ch. 16:12
  - type: text
    content: 'ruddy and handsome in appearance. '
  '43':
  - type: text
    content: 'And the Philistine said to David, “Am I '
  - type: note
    content: ch. 24:14; 2 Sam. 3:8; 9:8; 16:9; 2 Kgs. 8:13
  - type: text
    content: 'a dog, that you come to me with sticks?” And the Philistine cursed David by his gods. '
  '44':
  - type: text
    content: 'The Philistine said to David, “Come to me, and I will give your flesh '
  - type: note
    content: ver. 46
  - type: text
    content: 'to the birds of the air and to the beasts of the field.” '
  '45':
  - type: text
    content: 'Then David said to the Philistine, “You come to me with a sword and with a spear and with '
  - type: note
    content: ver. 6
  - type: text
    content: 'a javelin, but I come to you in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of the armies of Israel, '
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'whom you have defied. '
  '46':
  - type: text
    content: 'This day the '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver you into my hand, and I will strike you down and cut off your head. '
  - type: note
    content: Deut. 28:26
  - type: text
    content: 'And I will give the dead bodies of the host of the Philistines this day '
  - type: note
    content: ver. 44
  - type: text
    content: 'to the birds of the air and to the wild beasts of the earth, '
  - type: note
    content: 1 Kgs. 18:36; [Josh. 4:24]
  - type: text
    content: 'that all the earth may know that there is a God in Israel, '
  '47':
  - type: text
    content: 'and that all this assembly may know that '
  - type: note
    content: Hos. 1:7; [Ps. 44:6, 7; Zech. 4:6]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' saves not with sword and spear. '
  - type: note
    content: 2 Chr. 20:15
  - type: text
    content: 'For the battle is the '
  - type: text
    content: Lord
  - type: text
    content: ’s, and he will give you into our hand.”
  '48':
  - type: text
    content: 'When the Philistine arose and came and drew near to meet David, David ran quickly toward the battle line to meet the Philistine. '
  '49':
  - type: text
    content: And David put his hand in his bag and took out a stone and slung it and struck the Philistine on his forehead. The stone sank into his forehead, and he fell on his face to the ground.
  '5':
  - type: text
    content: He had a helmet of bronze on his head, and he was armed with a coat of mail, and the weight of the coat was five thousand shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of bronze. '
  '50':
  - type: text
    content: 'So David prevailed over the Philistine with a sling and with a stone, and struck the Philistine and killed him. There was no sword in the hand of David. '
  '51':
  - type: text
    content: 'Then David ran and stood over the Philistine '
  - type: note
    content: ch. 21:9; [2 Sam. 23:21]
  - type: text
    content: 'and took his sword and drew it out of its sheath and killed him and cut off his head with it. When the Philistines saw that their champion was dead, '
  - type: note
    content: '[Heb. 11:34]'
  - type: text
    content: 'they fled. '
  '52':
  - type: text
    content: And the men of Israel and Judah rose with a shout and pursued the Philistines as far as Gath
  - type: note
    content: Septuagint; Hebrew Gai
  - type: text
    content: ' and the gates of '
  - type: note
    content: Josh. 15:11
  - type: text
    content: 'Ekron, so that the wounded Philistines fell on the way from '
  - type: note
    content: Josh. 15:36
  - type: text
    content: 'Shaaraim as far as '
  - type: note
    content: See ver. 4
  - type: text
    content: 'Gath and Ekron. '
  '53':
  - type: text
    content: 'And the people of Israel came back from chasing the Philistines, and they plundered their camp. '
  '54':
  - type: text
    content: 'And David took '
  - type: note
    content: ver. 57
  - type: text
    content: 'the head of the Philistine '
  - type: note
    content: '[2 Sam. 5:6, 7]'
  - type: text
    content: and brought it to Jerusalem, but he put his armor in his tent.
  '55':
  - type: text
    content: 'As soon as Saul saw David go out against the Philistine, he said to Abner, '
  - type: note
    content: 2 Sam. 2:8
  - type: text
    content: 'the commander of the army, “Abner, '
  - type: note
    content: '[ch. 16:21, 22]'
  - type: text
    content: 'whose son is this youth?” And Abner said, '
  - type: note
    content: See ch. 1:26
  - type: text
    content: '“As your soul lives, O king, I do not know.” '
  '56':
  - type: text
    content: 'And the king said, “Inquire whose son the boy is.” '
  '57':
  - type: text
    content: 'And as soon as David returned from the striking down of the Philistine, Abner took him, and brought him before Saul '
  - type: note
    content: ver. 54
  - type: text
    content: 'with the head of the Philistine in his hand. '
  '58':
  - type: text
    content: 'And Saul said to him, “Whose son are you, young man?” And David answered, '
  - type: note
    content: ver. 12
  - type: text
    content: “I am the son of your servant Jesse the Bethlehemite.”
  '6':
  - type: text
    content: 'And he had bronze armor on his legs, and a '
  - type: note
    content: ver. 45
  - type: text
    content: 'javelin of bronze slung between his shoulders. '
  '7':
  - type: text
    content: 'The shaft of his spear was like a weaver’s beam, and his spear’s head weighed six hundred shekels of iron. '
  - type: note
    content: ver. 41
  - type: text
    content: 'And his shield-bearer went before him. '
  '8':
  - type: text
    content: 'He stood and shouted to the ranks of Israel, “Why have you come out to draw up for battle? Am I not a Philistine, and '
  - type: note
    content: ch. 8:17
  - type: text
    content: 'are you not servants of Saul? Choose a man for yourselves, and let him come down to me. '
  '9':
  - type: text
    content: 'If he is able to fight with me and kill me, then we will be your servants. But if I prevail against him and kill him, then you shall be our servants '
  - type: note
    content: '[ch. 11:1]'
  - type: text
    content: 'and serve us.” '
