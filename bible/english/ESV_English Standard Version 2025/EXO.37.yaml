document_id: EXO.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Making the Ark
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 1-9, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:10-20
      metadata:
        usfm: EXO.25.10+EXO.25.11+EXO.25.12+EXO.25.13+EXO.25.14+EXO.25.15+EXO.25.16+EXO.25.17+EXO.25.18+EXO.25.19+EXO.25.20
    marker-yv: yv-n
  - type: text
    text: Bezalel made the ark of acacia wood. Two cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cubit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was about 18 inches or 45 centimeters
    marker-yv: yv-n
  - type: text
    text: ' and a half was its length, a cubit and a half its breadth, and a cubit and a half its height. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he overlaid it with pure gold inside and outside, and made a molding of gold around it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he cast for it four rings of gold for its '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:12
      metadata:
        usfm: EXO.25.12
    marker-yv: yv-n
  - type: text
    text: 'four feet, two rings on its one side and two rings on its other side. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he made poles of acacia wood and overlaid them with gold '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and put the poles into the rings on the sides of the ark to carry the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he made a mercy seat of pure gold. Two cubits and a half was its length, and a cubit and a half its breadth. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he made two cherubim of gold. He made them of hammered work on the two ends of the mercy seat, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'one cherub on the one end, and one cherub on the other end. Of one piece with the mercy seat he made the cherubim on its two ends. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The cherubim spread out their wings above, overshadowing the mercy seat with their wings, with their faces one to another; toward the mercy seat were the faces of the cherubim.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Making the Table
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 10-16, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:23-29
      metadata:
        usfm: EXO.25.23+EXO.25.24+EXO.25.25+EXO.25.26+EXO.25.27+EXO.25.28+EXO.25.29
    marker-yv: yv-n
  - type: text
    text: 'He also made the table of acacia wood. Two cubits was its length, a cubit its breadth, and a cubit and a half its height. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he overlaid it with pure gold, and made a molding of gold around it. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And he made a rim around it a handbreadth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'handbreadth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was about 3 inches or 7.5 centimeters
    marker-yv: yv-n
  - type: text
    text: ' wide, and made a molding of gold around the rim. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He cast for it four rings of gold and fastened the rings to the four corners at its four legs. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Close to the frame were the rings, as holders for the poles to carry the table. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He made the poles of acacia wood to carry the table, and overlaid them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he made the vessels of pure gold that were to be on the table, its plates and dishes for incense, and its bowls and flagons with which to pour drink offerings.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Making the Lampstand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 17-24, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:31-39
      metadata:
        usfm: EXO.25.31+EXO.25.32+EXO.25.33+EXO.25.34+EXO.25.35+EXO.25.36+EXO.25.37+EXO.25.38+EXO.25.39
    marker-yv: yv-n
  - type: text
    text: 'He also made the lampstand of pure gold. He made the lampstand of hammered work. Its base, its stem, its cups, its calyxes, and its flowers were of one piece with it. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And there were six branches going out of its sides, three branches of the lampstand out of one side of it and three branches of the lampstand out of the other side of it; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'three cups made like almond blossoms, each with calyx and flower, on one branch, and three cups made like almond blossoms, each with calyx and flower, on the other branch—so for the six branches going out of the lampstand. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And on the lampstand itself were four cups made like almond blossoms, with their calyxes and flowers, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and a calyx of one piece with it under each pair of the six branches going out of it. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Their calyxes and their branches were of one piece with it. The whole of it was a single piece of hammered work of pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he made its seven lamps and its tongs and its trays of pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He made it and all its utensils out of a talent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'talent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was about 75 pounds or 34 kilograms
    marker-yv: yv-n
  - type: text
    text: ' of pure gold.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Making the Altar of Incense
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 25-28, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:1-5
      metadata:
        usfm: EXO.30.1+EXO.30.2+EXO.30.3+EXO.30.4+EXO.30.5
    marker-yv: yv-n
  - type: text
    text: 'He made the altar of incense of acacia wood. Its length was a cubit, and its breadth was a cubit. It was square, and two cubits was its height. Its horns were of one piece with it. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He overlaid it with pure gold, its top and around its sides and its horns. And he made a molding of gold around it, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and made two rings of gold on it under its molding, on two opposite sides of it, as holders for the poles with which to carry it. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And he made the poles of acacia wood and overlaid them with gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:23
      metadata:
        usfm: EXO.30.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: EXO.30.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: EXO.30.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: EXO.30.35
    marker-yv: yv-n
  - type: text
    text: 'He made the holy anointing oil also, and the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:7
      metadata:
        usfm: EXO.30.7
    marker-yv: yv-n
  - type: text
    text: pure fragrant incense, blended as by the perfumer.
