document_id: EXO.37,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Making the Ark
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see ch. 25:10-20
  - type: text
    content: Bezalel made the ark of acacia wood. Two cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and a half was its length, a cubit and a half its breadth, and a cubit and a half its height. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10-16, see ch. 25:23-29
  - type: text
    content: 'He also made the table of acacia wood. Two cubits was its length, a cubit its breadth, and a cubit and a half its height. '
  '11':
  - type: text
    content: 'And he overlaid it with pure gold, and made a molding of gold around it. '
  '12':
  - type: text
    content: And he made a rim around it a handbreadth
  - type: note
    content: A handbreadth was about 3 inches or 7.5 centimeters
  - type: text
    content: ' wide, and made a molding of gold around the rim. '
  '13':
  - type: text
    content: 'He cast for it four rings of gold and fastened the rings to the four corners at its four legs. '
  '14':
  - type: text
    content: 'Close to the frame were the rings, as holders for the poles to carry the table. '
  '15':
  - type: text
    content: 'He made the poles of acacia wood to carry the table, and overlaid them with gold. '
  '16':
  - type: text
    content: And he made the vessels of pure gold that were to be on the table, its plates and dishes for incense, and its bowls and flagons with which to pour drink offerings.
  - type: heading
    content: Making the Lampstand
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-24, see ch. 25:31-39
  - type: text
    content: 'He also made the lampstand of pure gold. He made the lampstand of hammered work. Its base, its stem, its cups, its calyxes, and its flowers were of one piece with it. '
  '18':
  - type: text
    content: 'And there were six branches going out of its sides, three branches of the lampstand out of one side of it and three branches of the lampstand out of the other side of it; '
  '19':
  - type: text
    content: 'three cups made like almond blossoms, each with calyx and flower, on one branch, and three cups made like almond blossoms, each with calyx and flower, on the other branch—so for the six branches going out of the lampstand. '
  '2':
  - type: text
    content: 'And he overlaid it with pure gold inside and outside, and made a molding of gold around it. '
  '20':
  - type: text
    content: 'And on the lampstand itself were four cups made like almond blossoms, with their calyxes and flowers, '
  '21':
  - type: text
    content: 'and a calyx of one piece with it under each pair of the six branches going out of it. '
  '22':
  - type: text
    content: 'Their calyxes and their branches were of one piece with it. The whole of it was a single piece of hammered work of pure gold. '
  '23':
  - type: text
    content: 'And he made its seven lamps and its tongs and its trays of pure gold. '
  '24':
  - type: text
    content: He made it and all its utensils out of a talent
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of pure gold.'
  - type: heading
    content: Making the Altar of Incense
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-28, see ch. 30:1-5
  - type: text
    content: 'He made the altar of incense of acacia wood. Its length was a cubit, and its breadth was a cubit. It was square, and two cubits was its height. Its horns were of one piece with it. '
  '26':
  - type: text
    content: 'He overlaid it with pure gold, its top and around its sides and its horns. And he made a molding of gold around it, '
  '27':
  - type: text
    content: 'and made two rings of gold on it under its molding, on two opposite sides of it, as holders for the poles with which to carry it. '
  '28':
  - type: text
    content: And he made the poles of acacia wood and overlaid them with gold.
  '29':
  - type: text
    content: ' '
  - type: note
    content: ch. 30:23, 24, 34, 35
  - type: text
    content: 'He made the holy anointing oil also, and the '
  - type: note
    content: ch. 30:7
  - type: text
    content: pure fragrant incense, blended as by the perfumer.
  '3':
  - type: text
    content: 'And he cast for it four rings of gold for its '
  - type: note
    content: ch. 25:12
  - type: text
    content: 'four feet, two rings on its one side and two rings on its other side. '
  '4':
  - type: text
    content: 'And he made poles of acacia wood and overlaid them with gold '
  '5':
  - type: text
    content: 'and put the poles into the rings on the sides of the ark to carry the ark. '
  '6':
  - type: text
    content: 'And he made a mercy seat of pure gold. Two cubits and a half was its length, and a cubit and a half its breadth. '
  '7':
  - type: text
    content: 'And he made two cherubim of gold. He made them of hammered work on the two ends of the mercy seat, '
  '8':
  - type: text
    content: 'one cherub on the one end, and one cherub on the other end. Of one piece with the mercy seat he made the cherubim on its two ends. '
  '9':
  - type: text
    content: The cherubim spread out their wings above, overshadowing the mercy seat with their wings, with their faces one to another; toward the mercy seat were the faces of the cherubim.
  - type: heading
    content: Making the Table
