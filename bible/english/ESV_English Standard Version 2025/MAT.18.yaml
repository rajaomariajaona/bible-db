document_id: MAT.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Who Is the Greatest?
  - type: text
    content: ' '
  - type: note
    content: ch. 17:24; For ver. 1-5, see Mark 9:33-37; Luke 9:46-48; [ch. 20:20-28 ]
  - type: text
    content: 'At that time the disciples came to Jesus, saying, “Who is the greatest in the kingdom of heaven?” '
  '10':
  - type: text
    content: ' '
  - type: text
    content: '“See that you do not despise '
  - type: note
    content: '[ch. 6:29; 25:40, 45; Luke 15:7, 10 ]'
  - type: text
    content: 'one of these little ones. For I tell you that in heaven '
  - type: note
    content: Acts 12:15; [ Ps. 34:7; 91:11; Heb. 1:14 ]
  - type: text
    content: 'their angels always '
  - type: note
    content: Luke 1:19; Rev. 8:2; [ Esth. 1:14 ]
  - type: text
    content: see the face of my Father who is in heaven.
  - type: text
    content: ' '
  - type: note
    content: 'Some manuscripts add verse 11: For the Son of Man came to save the lost'
  '12':
  - type: note
    content: ch. 17:25; 21:28
  - type: text
    content: 'What do you think? '
  - type: note
    content: For ver. 12-14, [Luke 15:4-7]
  - type: text
    content: If a man has a hundred sheep, and one of them has gone astray, does he not leave the ninety-nine on the mountains and go in search of the one that went astray?
  - type: text
    content: ' '
  '13':
  - type: text
    content: And if he finds it, truly, I say to you, he rejoices over it more than over the ninety-nine that never went astray.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'So '
  - type: note
    content: John 6:39; 10:28; [John 17:12]
  - type: text
    content: it is not the will of my
  - type: note
    content: Some manuscripts your
  - type: text
    content: ' '
  - type: text
    content: Father who is in heaven that one of these little ones should perish.
  - type: heading
    content: If Your Brother Sins Against You
  '15':
  - type: text
    content: ' '
  - type: note
    content: Luke 17:3
  - type: text
    content: '“If your brother sins against you, '
  - type: note
    content: 2 Thess. 3:15; [ Titus 3:10; James 5:19 ]; See Lev. 19:17
  - type: text
    content: 'go and tell him his fault, between you and him alone. If he listens to you, you have '
  - type: note
    content: 1 Cor. 9:19-22; 1 Pet. 3:1
  - type: text
    content: gained your brother.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But if he does not listen, take one or two others along with you, that every charge may be established '
  - type: note
    content: Deut. 19:15; 2 Cor. 13:1; [Num. 35:30; John 8:17; 1 Tim. 5:19; Heb. 10:28]
  - type: text
    content: by the evidence of two or three witnesses.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'If he refuses to listen to them, '
  - type: note
    content: '[1 Cor. 5:4, 5; 6:1-6]'
  - type: text
    content: 'tell it to the church. And if he refuses to listen even to the church, '
  - type: note
    content: '[Rom. 16:17; 1 Cor. 5:9-13; 2 Thess. 3:6, 14; 2 John 10]'
  - type: text
    content: 'let him be to you as '
  - type: note
    content: ch. 5:46, 47
  - type: text
    content: 'a Gentile and '
  - type: note
    content: ch. 5:46, 47
  - type: text
    content: a tax collector.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Truly, I say to you, '
  - type: note
    content: '[ch. 16:19; John 20:23]'
  - type: text
    content: whatever you bind on earth shall be bound in heaven, and whatever you loose on earth shall be loosed
  - type: note
    content: Or shall have been bound . . . shall have been loosed
  - type: text
    content: ' '
  - type: text
    content: in heaven.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Again I say to you, if two of you '
  - type: note
    content: '[Acts 12:5, 12; Philem. 22]'
  - type: text
    content: 'agree on earth about anything they ask, '
  - type: note
    content: See ch. 7:7
  - type: text
    content: it will be done for them by my Father in heaven.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And calling to him a child, he put him in the midst of them '
  '20':
  - type: text
    content: 'For where two or three are '
  - type: note
    content: '[Acts 4:30, 31; 1 Cor. 5:4]'
  - type: text
    content: 'gathered in my name, '
  - type: note
    content: '[ch. 28:20; John 12:26; 20:20, 26]'
  - type: text
    content: there am I among them.”
  - type: heading
    content: The Parable of the Unforgiving Servant
  '21':
  - type: text
    content: 'Then Peter came up and said to him, “Lord, how often '
  - type: note
    content: ver. 15
  - type: text
    content: 'will my brother sin against me, and I forgive him? '
  - type: note
    content: Luke 17:3, 4; [Col. 3:13]
  - type: text
    content: 'As many as seven times?” '
  '22':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “I do not say to you seven times, but seventy-seven times.
  - type: note
    content: Or seventy times seven
  '23':
  - type: text
    content: ' '
  - type: text
    content: '“Therefore the kingdom of heaven may be compared to a king who wished '
  - type: note
    content: ch. 25:19
  - type: text
    content: to settle accounts with his servants.
  - type: text
    content: ' '
  - type: note
    content: Or bondservants ; also verses 28, 31
  '24':
  - type: text
    content: 'When he began to settle, one was brought to him who owed him '
  - type: note
    content: Esth. 3:9
  - type: text
    content: 'ten thousand '
  - type: note
    content: ch. 25:15
  - type: text
    content: talents.
  - type: note
    content: A talent was a monetary unit worth about twenty years’ wages for a laborer
  - type: text
    content: ' '
  '25':
  - type: note
    content: '[Luke 7:42]'
  - type: text
    content: 'And since he could not pay, his master ordered him '
  - type: note
    content: Ex. 21:2; Lev. 25:39
  - type: text
    content: 'to be sold, with his wife and '
  - type: note
    content: 2 Kgs. 4:1; Neh. 5:5
  - type: text
    content: children and all that he had, and payment to be made.
  - type: text
    content: ' '
  '26':
  - type: text
    content: So the servant
  - type: note
    content: Or bondservant; also verses 27, 28, 29, 32, 33
  - type: text
    content: ' '
  - type: note
    content: Acts 10:25; See ch. 8:2
  - type: text
    content: fell on his knees, imploring him, ‘Have patience with me, and I will pay you everything.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And out of pity for him, the master of that servant released him and '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: forgave him the debt.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But when that same servant went out, he found one of his fellow servants who owed him a hundred '
  - type: note
    content: ch. 20:2; 22:19; Mark 6:37; 14:5; Luke 7:41; 10:35; John 6:7
  - type: text
    content: denarii,
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' '
  - type: text
    content: and seizing him, he began to choke him, saying, ‘Pay what you owe.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: So his fellow servant fell down and pleaded with him, ‘Have patience with me, and I will pay you.’
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and said, '
  - type: text
    content: '“Truly, I say to you, unless you '
  - type: note
    content: See Luke 22:32
  - type: text
    content: 'turn and '
  - type: note
    content: ch. 19:14; Mark 10:15; Luke 18:17; [Ps. 131:2; 1 Cor. 14:20; 1 Pet. 2:2]
  - type: text
    content: 'become like children, you '
  - type: note
    content: '[ch. 5:19, 20]'
  - type: text
    content: will never enter the kingdom of heaven.
  - type: text
    content: ' '
  '30':
  - type: text
    content: He refused and went and put him in prison until he should pay the debt.
  - type: text
    content: ' '
  '31':
  - type: text
    content: When his fellow servants saw what had taken place, they were greatly distressed, and they went and reported to their master all that had taken place.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Then his master summoned him and said to him, ‘You wicked servant! I forgave you all that debt because you pleaded with me.
  - type: text
    content: ' '
  '33':
  - type: note
    content: '[ch. 6:12; Eph. 4:32; Col. 3:13; 1 John 4:11]'
  - type: text
    content: And should not you have had mercy on your fellow servant, as I had mercy on you?’
  - type: text
    content: ' '
  '34':
  - type: note
    content: See James 2:13
  - type: text
    content: And in anger his master delivered him to the jailers,
  - type: note
    content: Greek torturers
  - type: text
    content: ' '
  - type: note
    content: ver. 30; [ch. 5:25, 26]
  - type: text
    content: until he should pay all his debt.
  - type: text
    content: ' '
  '35':
  - type: note
    content: ch. 6:15; [Prov. 21:13]
  - type: text
    content: So also my heavenly Father will do to every one of you, if you do not forgive your brother
  - type: text
    content: ' '
  - type: note
    content: 1 Pet. 1:22; [Rom. 6:17]
  - type: text
    content: from your heart.”
  '4':
  - type: note
    content: ch. 20:27; 23:11, 12
  - type: text
    content: 'Whoever humbles himself like this child is the '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: greatest in the kingdom of heaven.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:40, 42 ]'
  - type: text
    content: “Whoever receives one such child in my name receives me,
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'but '
  - type: note
    content: Mark 9:42
  - type: text
    content: 'whoever causes one of these '
  - type: note
    content: Luke 17:2; [1 Cor. 8:12]
  - type: text
    content: little ones who believe in me to sin,
  - type: note
    content: Greek causes . . . to stumble; also verses 8, 9
  - type: text
    content: ' '
  - type: text
    content: it would be better for him to have a great millstone fastened around his neck and to be drowned in the depth of the sea.
  - type: heading
    content: Temptations to Sin
  '7':
  - type: text
    content: ' '
  - type: text
    content: '“Woe to the world for '
  - type: note
    content: See ch. 13:41
  - type: text
    content: temptations to sin!
  - type: text
    content: ' '
  - type: note
    content: Greek stumbling blocks
  - type: note
    content: Luke 17:1; See 1 Cor. 11:19
  - type: text
    content: 'For it is necessary that temptations come, '
  - type: note
    content: ch. 26:24
  - type: text
    content: but woe to the one by whom the temptation comes!
  - type: text
    content: ' '
  '8':
  - type: note
    content: ch. 5:29, 30; Mark 9:43-48
  - type: text
    content: 'And if your hand or your foot causes you to sin, cut it off and throw it away. It is better for you to enter life crippled or lame than with two hands or two feet to be thrown into '
  - type: note
    content: See ch. 25:41
  - type: text
    content: the eternal fire.
  - type: text
    content: ' '
  '9':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'And if your eye causes you to sin, tear it out and throw it away. It is better for you to enter life with one eye than with two eyes to be thrown into the '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: hell
  - type: note
    content: Greek Gehenna
  - type: text
    content: ' '
  - type: text
    content: of fire.
  - type: heading
    content: The Parable of the Lost Sheep
