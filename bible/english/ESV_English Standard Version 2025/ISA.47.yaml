document_id: ISA.47,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Humiliation of Babylon
  - type: text
    content: ' '
  - type: note
    content: '[ch. 43:14 ]'
  - type: text
    content: Come down and sit in the dust,
  - type: text
    content: 'O virgin '
  - type: note
    content: Ps. 137:8
  - type: text
    content: daughter of Babylon;
  - type: note
    content: ch. 3:26
  - type: text
    content: sit on the ground without a throne,
  - type: text
    content: 'O daughter of '
  - type: note
    content: ch. 23:13; 48:14
  - type: text
    content: the Chaldeans!
  - type: note
    content: '[ver. 5; ch. 13:19 ]'
  - type: text
    content: For you shall no more be called
  - type: text
    content: tender and delicate.
  '10':
  - type: text
    content: You felt secure in your wickedness;
  - type: text
    content: you said, “No one sees me”;
  - type: text
    content: your wisdom and your knowledge led you astray,
  - type: text
    content: and you said in your heart,
  - type: note
    content: '[ch. 45:6, 18; Jer. 50:29 ]'
  - type: text
    content: “I am, and there is no one besides me.”
  '11':
  - type: text
    content: But evil shall come upon you,
  - type: text
    content: which you will not know how to charm away;
  - type: text
    content: disaster shall fall upon you,
  - type: text
    content: for which you will not be able to atone;
  - type: note
    content: '[ Ps. 35:8; Jer. 51:41 ]'
  - type: text
    content: and ruin shall come upon you suddenly,
  - type: text
    content: of which you know nothing.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 9 ]'
  - type: text
    content: Stand fast in your enchantments
  - type: text
    content: and your many sorceries,
  - type: text
    content: with which you have labored from your youth;
  - type: text
    content: perhaps you may be able to succeed;
  - type: text
    content: perhaps you may inspire terror.
  '13':
  - type: text
    content: You are wearied with your many counsels;
  - type: text
    content: let them stand forth and save you,
  - type: note
    content: '[ch. 44:25; Dan. 2:2, 10 ]'
  - type: text
    content: those who divide the heavens,
  - type: text
    content: who gaze at the stars,
  - type: text
    content: who at the new moons make known
  - type: text
    content: what shall come upon you.
  '14':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 41:2; Nah. 1:10; Mal. 4:1
  - type: text
    content: they are like stubble;
  - type: note
    content: See ch. 10:17
  - type: text
    content: the fire consumes them;
  - type: text
    content: they cannot deliver themselves
  - type: text
    content: from the power of the flame.
  - type: text
    content: No coal for warming oneself is this,
  - type: text
    content: no fire to sit before!
  '15':
  - type: text
    content: Such to you are those with whom you have labored,
  - type: text
    content: who have done business with you from your youth;
  - type: text
    content: they wander about, each in his own direction;
  - type: text
    content: there is no one to save you.
  '2':
  - type: text
    content: 'Take the millstones and '
  - type: note
    content: Judg. 16:21; [Matt. 24:41]
  - type: text
    content: grind flour,
  - type: note
    content: '[ch. 20:4 ]'
  - type: text
    content: put off your veil,
  - type: text
    content: strip off your robe, uncover your legs,
  - type: text
    content: pass through the rivers.
  '3':
  - type: text
    content: Your nakedness shall be uncovered,
  - type: text
    content: and your disgrace shall be seen.
  - type: text
    content: I will take vengeance,
  - type: text
    content: and I will spare no one.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See ch. 43:14
  - type: text
    content: 'Our Redeemer—the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is his name—'
  - type: text
    content: is the Holy One of Israel.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 8:14 ]'
  - type: text
    content: Sit in silence, and go into darkness,
  - type: text
    content: 'O daughter of '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: the Chaldeans;
  - type: text
    content: for you shall no more be called
  - type: note
    content: '[ver. 1 ]'
  - type: text
    content: the mistress of kingdoms.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Zech. 1:15 ]'
  - type: text
    content: I was angry with my people;
  - type: text
    content: I profaned my heritage;
  - type: text
    content: I gave them into your hand;
  - type: note
    content: '[ch. 14:17; 51:23 ]'
  - type: text
    content: you showed them no mercy;
  - type: text
    content: on the aged you made your yoke exceedingly heavy.
  '7':
  - type: text
    content: 'You said, “I shall be '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: mistress forever,”
  - type: text
    content: so that you did not lay these things to heart
  - type: text
    content: or remember their end.
  '8':
  - type: text
    content: 'Now therefore hear this, '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: you lover of pleasures,
  - type: note
    content: Zeph. 2:15
  - type: text
    content: who sit securely,
  - type: text
    content: who say in your heart,
  - type: note
    content: '[ch. 45:6, 18; Jer. 50:29 ]'
  - type: text
    content: “I am, and there is no one besides me;
  - type: note
    content: Lam. 1:1; [ Rev. 18:7 ]
  - type: text
    content: I shall not sit as a widow
  - type: text
    content: 'or know the loss of children”:'
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 51:19 ]'
  - type: text
    content: These two things shall come to you
  - type: text
    content: 'in a moment, '
  - type: note
    content: '[Jer. 50:31]'
  - type: text
    content: in one day;
  - type: text
    content: the loss of children and widowhood
  - type: text
    content: shall come upon you in full measure,
  - type: note
    content: '[ver. 12, 13; Nah. 3:4 ]'
  - type: text
    content: in spite of your many sorceries
  - type: text
    content: and the great power of your enchantments.
