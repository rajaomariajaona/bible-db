document_id: EST.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Saves the Jews
  - type: text
    content: 'On that day King Ahasuerus gave to Queen Esther the house of Haman, '
  - type: note
    content: '[See ch. 7:6 above]'
  - type: text
    content: 'the enemy of the Jews. And Mordecai came before the king, for Esther had told '
  - type: note
    content: '[ch. 2:7, 15]'
  - type: text
    content: 'what he was to her. '
  '10':
  - type: note
    content: ch. 3:12, 13
  - type: text
    content: 'And he wrote in the name of King Ahasuerus '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'and sealed it with the king’s signet ring. Then he sent the letters by mounted couriers riding on '
  - type: note
    content: 1 Kgs. 4:28
  - type: text
    content: 'swift horses that were used in the king’s service, bred from the royal stud, '
  '11':
  - type: text
    content: 'saying that the king allowed the Jews who were in every city '
  - type: note
    content: ch. 9:2, 15, 16, 18
  - type: text
    content: 'to gather and defend their lives, '
  - type: note
    content: ch. 3:13; 7:4
  - type: text
    content: 'to destroy, to kill, and to annihilate any armed force of any people or province that might attack them, children and women included, '
  - type: note
    content: '[ch. 9:10, 15, 16]'
  - type: text
    content: 'and to plunder their goods, '
  '12':
  - type: note
    content: ch. 3:13; 9:1
  - type: text
    content: 'on one day throughout all the provinces of King Ahasuerus, on the thirteenth day of the twelfth month, which is the month of Adar. '
  '13':
  - type: note
    content: ch. 3:14; 4:8
  - type: text
    content: 'A copy of what was written was to be issued as a decree in every province, being publicly displayed to all peoples, and the Jews were to be ready on that day to take vengeance on their enemies. '
  '14':
  - type: text
    content: 'So the couriers, mounted on their '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: swift horses that were used in the king’s service, rode out hurriedly, urged by the king’s command. And the decree was issued in Susa the citadel.
  '15':
  - type: text
    content: 'Then Mordecai went out from the presence of the king '
  - type: note
    content: '[Gen. 41:42; Dan. 5:29]'
  - type: text
    content: in royal robes of blue and white, with a great golden crown
  - type: note
    content: Or headdress
  - type: text
    content: ' and '
  - type: note
    content: '[1 Chr. 15:27]'
  - type: text
    content: 'a robe of fine linen and purple, '
  - type: note
    content: '[ch. 3:15]'
  - type: text
    content: 'and the city of Susa shouted and rejoiced. '
  '16':
  - type: text
    content: 'The Jews had '
  - type: note
    content: '[Ps. 97:11]'
  - type: text
    content: 'light and gladness and joy and honor. '
  '17':
  - type: text
    content: 'And in every province and in every city, wherever the king’s command and his edict reached, there was gladness and joy among the Jews, a feast and '
  - type: note
    content: ch. 9:19, 22; 1 Sam. 25:8
  - type: text
    content: 'a holiday. '
  - type: note
    content: ch. 9:27
  - type: text
    content: 'And many from the peoples of the country declared themselves Jews, '
  - type: note
    content: ch. 9:2
  - type: text
    content: for fear of the Jews had fallen on them.
  '2':
  - type: note
    content: ch. 3:10
  - type: text
    content: And the king took off his signet ring, which he had taken from Haman, and gave it to Mordecai. And Esther set Mordecai over the house of Haman.
  '3':
  - type: text
    content: 'Then Esther spoke again to the king. She fell at his feet and wept and pleaded with him to avert the evil plan of Haman '
  - type: note
    content: ch. 3:1; 9:24
  - type: text
    content: 'the Agagite and the plot that he had devised against the Jews. '
  '4':
  - type: note
    content: ch. 4:11; 5:2
  - type: text
    content: 'When the king held out the golden scepter to Esther, Esther rose and stood before the king. '
  '5':
  - type: text
    content: 'And she said, “If it please the king, '
  - type: note
    content: ch. 5:8; 7:3
  - type: text
    content: 'and if I have found favor in his sight, and if the thing seems right before the king, and I am pleasing in his eyes, let an order be written to revoke '
  - type: note
    content: '[ch. 3:13]'
  - type: text
    content: 'the letters devised by Haman '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the Agagite, the son of Hammedatha, which he wrote to destroy the Jews who are in all the provinces of the king. '
  '6':
  - type: text
    content: 'For how can I bear '
  - type: note
    content: '[ch. 7:4]'
  - type: text
    content: 'to see the calamity that is coming to my people? Or how can I bear to see the destruction of my kindred?” '
  '7':
  - type: text
    content: 'Then King Ahasuerus said to Queen Esther and to Mordecai the Jew, “Behold, '
  - type: note
    content: ver. 1
  - type: text
    content: I have given Esther the house of Haman, and they have hanged him on the gallows,
  - type: note
    content: Or wooden beam (see note on 2:23)
  - type: text
    content: ' because he intended to lay hands on the Jews. '
  '8':
  - type: text
    content: 'But you may write as you please with regard to the Jews, in the name of the king, '
  - type: note
    content: ver. 10; ch. 3:12
  - type: text
    content: 'and seal it with the king’s ring, for an edict written in the name of the king and sealed with the king’s ring '
  - type: note
    content: '[ch. 1:19; Dan. 6:8, 12, 15]'
  - type: text
    content: cannot be revoked.”
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'The king’s scribes were summoned at that time, in the third month, which is the month of Sivan, on the twenty-third day. And an edict was written, according to all that Mordecai commanded concerning the Jews, to '
  - type: note
    content: See Ezra 8:36
  - type: text
    content: 'the satraps and the governors and the officials of the provinces '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'from India to Ethiopia, '
  - type: note
    content: ch. 1:1
  - type: text
    content: '127 provinces, '
  - type: note
    content: ch. 1:22; 3:12
  - type: text
    content: 'to each province in its own script and to each people in its own language, and also to the Jews in their script and their language. '
