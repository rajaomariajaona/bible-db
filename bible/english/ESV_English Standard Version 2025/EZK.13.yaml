document_id: EZK.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: False Prophets Condemned
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'Precisely because they have misled my people, '
  - type: note
    content: ver. 16; Jer. 6:14; Mic. 3:5
  - type: text
    content: 'saying, ‘Peace,’ when there is no peace, and because, when the people build a wall, '
  - type: note
    content: ch. 22:28
  - type: text
    content: these prophets smear it with whitewash,
  - type: note
    content: Or plaster; also verses 11, 14, 15
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'say to those who smear it with whitewash that it shall fall! '
  - type: note
    content: ch. 38:22; Isa. 28:2, 17; [Isa. 30:13]
  - type: text
    content: 'There will be a deluge of rain, and you, O great hailstones, will fall, and a stormy wind break out. '
  '12':
  - type: text
    content: 'And when the wall falls, will it not be said to you, ‘Where is the coating with which you smeared it?’ '
  '13':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'I will make a stormy wind break out in my wrath, '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'and there shall be a deluge of rain in my anger, and great hailstones in wrath to make a full end. '
  '14':
  - type: text
    content: 'And I will break down the wall that you have smeared with whitewash, and bring it down to the ground, so that its foundation will be laid bare. When it falls, you shall perish in the midst of it, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Thus will I spend my wrath upon the wall and upon those who have smeared it with whitewash, and I will say to you, The wall is no more, nor those who smeared it, '
  '16':
  - type: text
    content: 'the prophets of Israel who prophesied concerning Jerusalem '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'and saw visions of peace for her, when there was no peace, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '17':
  - type: text
    content: '“And you, son of man, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'set your face against '
  - type: note
    content: '[Ex. 15:20; Judg. 4:4; 2 Kgs. 22:14]'
  - type: text
    content: 'the daughters of your people, '
  - type: note
    content: ver. 2
  - type: text
    content: 'who prophesy out of their own hearts. Prophesy against them '
  '18':
  - type: text
    content: 'and say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Woe to the women '
  - type: note
    content: ver. 20
  - type: text
    content: 'who sew magic bands upon all wrists, and '
  - type: note
    content: ver. 21
  - type: text
    content: 'make veils for the heads of persons of every stature, in '
  - type: note
    content: ver. 20
  - type: text
    content: 'the hunt for souls! Will you hunt down souls belonging to my people and keep your own souls alive? '
  '19':
  - type: text
    content: 'You have profaned me among my people '
  - type: note
    content: '[Mic. 3:5]'
  - type: text
    content: 'for handfuls of barley '
  - type: note
    content: '[Prov. 28:21]'
  - type: text
    content: and for pieces of bread, putting to death souls who should not die and keeping alive souls who should not live, by your lying to my people, who listen to lies.
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, prophesy against the prophets of Israel, who are prophesying, and say to those '
  - type: note
    content: ver. 17; Jer. 23:16, 26
  - type: text
    content: 'who prophesy from their own hearts: ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '!’ '
  '20':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Behold, '
  - type: note
    content: See ver. 8
  - type: text
    content: 'I am against '
  - type: note
    content: ver. 18
  - type: text
    content: 'your magic bands with which you hunt the souls like birds, and I will tear them from your arms, and I will let the souls whom you hunt go free, the souls like birds. '
  '21':
  - type: text
    content: 'Your veils also I will tear off and '
  - type: note
    content: '[ch. 34:10]'
  - type: text
    content: 'deliver my people out of your hand, and they shall be no more in your hand as prey, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: note
    content: '[Jer. 14:14]; See Jer. 28:15'
  - type: text
    content: 'Because you have disheartened the righteous falsely, although I have not grieved him, and '
  - type: note
    content: Jer. 23:14
  - type: text
    content: 'you have encouraged the wicked, that '
  - type: note
    content: See ch. 18:21
  - type: text
    content: 'he should not turn from his evil way to save his life, '
  '23':
  - type: note
    content: See ver. 6, 7, 9
  - type: text
    content: 'therefore you shall no more see false visions nor practice divination. I will deliver my people out of your hand. And you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ', Woe to the foolish prophets who follow their own spirit, and have seen nothing! '
  '4':
  - type: text
    content: 'Your prophets have been like jackals among ruins, O Israel. '
  '5':
  - type: note
    content: ch. 22:30; Ps. 106:23; [Ps. 80:12; Isa. 5:5; 58:12]
  - type: text
    content: 'You have not gone up into the breaches, or built up a wall for the house of Israel, that it might stand in battle in the day of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: note
    content: ver. 23; ch. 12:24; 21:29; 22:28; Jer. 5:31
  - type: text
    content: 'They have seen false visions and lying divinations. They say, ‘Declares the '
  - type: text
    content: Lord
  - type: text
    content: ',’ '
  - type: note
    content: See Jer. 14:14
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' has not sent them, and yet they expect him to fulfill their word. '
  '7':
  - type: text
    content: 'Have you not seen a false vision and uttered a lying divination, '
  - type: note
    content: Jer. 23:21
  - type: text
    content: 'whenever you have said, ‘Declares the '
  - type: text
    content: Lord
  - type: text
    content: ',’ although I have not spoken?”'
  '8':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': “Because you have uttered falsehood and seen lying visions, therefore behold, '
  - type: note
    content: ch. 5:8; 21:3; 26:3; 28:22; 29:3; 30:22; 34:10; 35:3; 38:3; Jer. 21:13
  - type: text
    content: 'I am against you, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'My hand will be against the prophets who see false visions and who give lying divinations. They shall not be in the council of my people, '
  - type: note
    content: '[Ezra 2:59, 62; Neh. 7:5; Ps. 69:28; 87:6]'
  - type: text
    content: 'nor be enrolled in the register of the house of Israel, '
  - type: note
    content: ch. 20:38
  - type: text
    content: 'nor shall they enter the land of Israel. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'And you shall know that I am the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
