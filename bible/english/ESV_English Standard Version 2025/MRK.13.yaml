document_id: MRK.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Foretells Destruction of the Temple
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-37, see Matt. 24:1-51; Luke 21:5-36
  - type: text
    content: 'And as he came out of the temple, one of his disciples said to him, “Look, Teacher, what wonderful stones and what wonderful buildings!” '
  '10':
  - type: text
    content: 'And the gospel must first be proclaimed '
  - type: note
    content: Matt. 28:19; Rom. 10:18; Col. 1:6, 23; [ch. 14:9]
  - type: text
    content: to all nations.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And when they bring you to trial and deliver you over, '
  - type: note
    content: See Matt. 6:25
  - type: text
    content: 'do not be anxious beforehand what you are to say, but say '
  - type: note
    content: Deut. 18:18; [Num. 23:5]; See Ex. 4:12
  - type: text
    content: 'whatever is given you in that hour, '
  - type: note
    content: Acts 4:8; 6:10; 13:9; 1 Cor. 15:10; 2 Cor. 13:3; [1 Thess. 2:13; Heb. 1:1]
  - type: text
    content: for it is not you who speak, but the Holy Spirit.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Matt. 10:35, 36
  - type: text
    content: And brother will deliver brother over to death, and the father his child, and children will rise against parents and have them put to death.
  - type: text
    content: ' '
  '13':
  - type: note
    content: John 15:18-21; [Luke 6:22]
  - type: text
    content: 'And you will be hated by all for my name’s sake. '
  - type: note
    content: '[Dan. 12:12, 13; James 5:11; Rev. 2:10]; See Heb. 3:6'
  - type: text
    content: But the one who endures to the end will be saved.
  - type: heading
    content: The Abomination of Desolation
  '14':
  - type: text
    content: ' '
  - type: text
    content: '“But when you see '
  - type: note
    content: Dan. 9:27; 11:31; 12:11
  - type: text
    content: the abomination of desolation standing where he ought not to be (
  - type: text
    content: ' '
  - type: note
    content: '[ Dan. 9:23, 25; Rev. 1:3 ]'
  - type: text
    content: let the reader understand), then let those who are in Judea flee to the mountains.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Luke 17:31
  - type: text
    content: 'Let the one who is on '
  - type: note
    content: See Luke 5:19
  - type: text
    content: the housetop not go down, nor enter his house, to take anything out,
  - type: text
    content: ' '
  '16':
  - type: text
    content: and let the one who is in the field not turn back to take his cloak.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: Luke 23:29
  - type: text
    content: alas for women who are pregnant and for those who are nursing infants in those days!
  - type: text
    content: ' '
  '18':
  - type: text
    content: Pray that it may not happen in winter.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'For in those days there will be '
  - type: note
    content: Rev. 16:18
  - type: text
    content: 'such '
  - type: note
    content: ver. 24; Dan. 12:1; [Rev. 7:14]
  - type: text
    content: 'tribulation as has not been '
  - type: note
    content: See ch. 10:6; [Deut. 4:32]
  - type: text
    content: 'from the beginning of the creation that '
  - type: note
    content: Gen. 1:1
  - type: text
    content: God created until now, and never will be.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Do you see these great buildings? '
  - type: note
    content: Luke 19:44
  - type: text
    content: There will not be left here one stone upon another that will not be thrown down.”
  - type: heading
    content: Signs of the End of the Age
  '20':
  - type: text
    content: 'And if the Lord had not cut short the days, no human being would be saved. But for '
  - type: note
    content: ver. 22, 27; Isa. 65:8, 9; Luke 18:7; [Matt. 22:14]
  - type: text
    content: 'the sake of the elect, whom '
  - type: note
    content: John 13:18; 15:19; Eph. 1:4
  - type: text
    content: he chose, he shortened the days.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: Luke 17:23; [ver. 6]
  - type: text
    content: then if anyone says to you, ‘Look, here is the Christ!’ or ‘Look, there he is!’ do not believe it.
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[1 John 2:18]'
  - type: text
    content: 'For false christs and false prophets will arise and '
  - type: note
    content: Deut. 13:1-3; 2 Thess. 2:9-11; Rev. 13:13, 14; 16:14; 19:20; [Acts 8:9]
  - type: text
    content: 'perform signs and wonders, '
  - type: note
    content: ver. 6
  - type: text
    content: 'to lead astray, if possible, '
  - type: note
    content: ver. 20, 27
  - type: text
    content: the elect.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But '
  - type: note
    content: ver. 5
  - type: text
    content: 'be on guard; '
  - type: note
    content: John 13:19; 14:29; [2 Pet. 3:17]
  - type: text
    content: I have told you all things beforehand.
  - type: heading
    content: The Coming of the Son of Man
  '24':
  - type: text
    content: ' '
  - type: text
    content: '“But in those days, after '
  - type: note
    content: ver. 19
  - type: text
    content: 'that tribulation, '
  - type: note
    content: Isa. 13:10; 24:23; Ezek. 32:7; Joel 2:10, 31; 3:15; Acts 2:20; [ Amos 5:20; 8:9; Zeph. 1:15; Rev. 6:12; 8:12 ]
  - type: text
    content: the sun will be darkened, and the moon will not give its light,
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'and '
  - type: note
    content: Rev. 6:13; [Isa. 14:12; 34:4]
  - type: text
    content: the stars will be falling from heaven, and the powers in the heavens will be shaken.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And then they will see '
  - type: note
    content: See Dan. 7:13
  - type: text
    content: 'the Son of Man coming in clouds '
  - type: note
    content: ch. 9:1; Matt. 26:64; [Matt. 25:31]
  - type: text
    content: with great power and glory.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And then '
  - type: note
    content: Matt. 13:41
  - type: text
    content: 'he will send out the angels and '
  - type: note
    content: '[Matt. 23:37; 2 Thess. 2:1]'
  - type: text
    content: 'gather '
  - type: note
    content: ver. 20, 22
  - type: text
    content: 'his elect from '
  - type: note
    content: Dan. 7:2; Zech. 2:6; Rev. 7:1
  - type: text
    content: 'the four winds, from '
  - type: note
    content: '[Acts 1:8]'
  - type: text
    content: 'the ends of the earth '
  - type: note
    content: Deut. 4:32; 30:4
  - type: text
    content: to the ends of heaven.
  - type: heading
    content: The Lesson of the Fig Tree
  '28':
  - type: text
    content: ' '
  - type: text
    content: '“From the fig tree learn its lesson: as soon as its branch becomes tender and puts out its leaves, you know that summer is near.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'So also, when you see these things taking place, you know that he is near, '
  - type: note
    content: '[James 5:9; Rev. 3:20]'
  - type: text
    content: at the very gates.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And as he sat on '
  - type: note
    content: See Matt. 21:1
  - type: text
    content: 'the Mount of Olives opposite the temple, '
  - type: note
    content: Matt. 17:1
  - type: text
    content: 'Peter and James and John and '
  - type: note
    content: ch. 1:16, 29
  - type: text
    content: 'Andrew asked him '
  - type: note
    content: '[ch. 4:34]'
  - type: text
    content: 'privately, '
  '30':
  - type: note
    content: See ch. 9:1
  - type: text
    content: Truly, I say to you, this generation will not pass away until all these things take place.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Ps. 102:26; Isa. 51:6; 2 Pet. 3:10; [Matt. 5:18; Heb. 12:27]
  - type: text
    content: 'Heaven and earth will pass away, but '
  - type: note
    content: Ps. 119:89; Isa. 40:8; 1 Pet. 1:23, 25
  - type: text
    content: my words will not pass away.
  - type: heading
    content: No One Knows That Day or Hour
  '32':
  - type: text
    content: ' '
  - type: text
    content: '“But concerning that day or that hour, '
  - type: note
    content: Matt. 25:13; 1 Thess. 5:1, 2
  - type: text
    content: 'no one knows, not even the angels in heaven, '
  - type: note
    content: '[ Phil. 2:6, 7 ]'
  - type: text
    content: 'nor the Son, '
  - type: note
    content: '[ Zech. 14:7; Acts 1:7 ]'
  - type: text
    content: but only the Father.
  - type: text
    content: ' '
  '33':
  - type: note
    content: ver. 5
  - type: text
    content: 'Be on guard, '
  - type: note
    content: Eph. 6:18; Heb. 13:17; [ch. 14:38]
  - type: text
    content: keep awake.
  - type: note
    content: Some manuscripts add and pray
  - type: text
    content: ' '
  - type: text
    content: For you do not know when the time will come.
  - type: text
    content: ' '
  '34':
  - type: note
    content: '[Matt. 25:14]'
  - type: text
    content: 'It is like a man '
  - type: note
    content: '[ch. 12:1; Matt. 21:33]'
  - type: text
    content: going on a journey, when he leaves home and puts his servants
  - type: note
    content: Or bondservants
  - type: text
    content: ' '
  - type: text
    content: 'in charge, '
  - type: note
    content: '[Rom. 12:6-8]'
  - type: text
    content: 'each with his work, and commands '
  - type: note
    content: Ezek. 44:11; John 10:3; [Luke 12:36]
  - type: text
    content: the doorkeeper to stay awake.
  - type: text
    content: ' '
  '35':
  - type: note
    content: ch. 14:34-38; Matt. 25:13; 26:41; Luke 12:37; 21:36; Acts 20:31; 1 Cor. 16:13; 1 Thess. 5:6; 1 Pet. 5:8
  - type: text
    content: 'Therefore stay awake—for you do not know when the master of the house will come, '
  - type: note
    content: ch. 1:32; Luke 12:38
  - type: text
    content: 'in the evening, or '
  - type: note
    content: ch. 1:32; Luke 12:38
  - type: text
    content: 'at midnight, or '
  - type: note
    content: ch. 14:30, 68, 72
  - type: text
    content: when the rooster crows,
  - type: note
    content: That is, the third watch of the night, between midnight and 3 a.m.
  - type: text
    content: ' '
  - type: text
    content: 'or '
  - type: note
    content: '[ch. 6:48; Ex. 14:24]'
  - type: text
    content: in the morning—
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'lest '
  - type: note
    content: '[1 Thess. 5:1-6]'
  - type: text
    content: 'he come suddenly and '
  - type: note
    content: ch. 14:40
  - type: text
    content: find you asleep.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And what I say to you I say to all: '
  - type: note
    content: '[See ver. 35 above]'
  - type: text
    content: Stay awake.”
  '4':
  - type: text
    content: '“Tell us, '
  - type: note
    content: '[Acts 1:6, 7]'
  - type: text
    content: 'when will these things be, and what will be the sign when all these things are about to be accomplished?” '
  '5':
  - type: text
    content: 'And Jesus began to say to them, '
  - type: note
    content: ver. 9, 23, 33; Jer. 29:8; Eph. 5:6; Col. 2:8; 1 Thess. 2:3; 1 John 3:7
  - type: text
    content: “See that no one leads you astray.
  - type: text
    content: ' '
  '6':
  - type: note
    content: ver. 22; Jer. 14:14; 1 John 2:18
  - type: text
    content: 'Many will come in my name, saying, '
  - type: note
    content: See John 8:24
  - type: text
    content: ‘I am he!’ and they will lead many astray.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And when you hear of wars and rumors of wars, '
  - type: note
    content: 2 Thess. 2:2
  - type: text
    content: 'do not be alarmed. This '
  - type: note
    content: Rev. 1:1
  - type: text
    content: must take place, but the end is not yet.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: 2 Chr. 15:6; [Rev. 6:4]
  - type: text
    content: 'nation will rise against nation, and '
  - type: note
    content: Isa. 19:2
  - type: text
    content: 'kingdom against kingdom. There will be '
  - type: note
    content: Rev. 6:12
  - type: text
    content: 'earthquakes in various places; there will be '
  - type: note
    content: Acts 11:28; Rev. 6:8
  - type: text
    content: famines. These are but the beginning of the birth pains.
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9, 11-13, [ Matt. 10:17-22; Luke 12:11, 12 ]
  - type: text
    content: '“But '
  - type: note
    content: ver. 5 ; 2 John 8
  - type: text
    content: 'be on your guard. For they will deliver you over to councils, and you will be beaten '
  - type: note
    content: See Matt. 23:34
  - type: text
    content: 'in synagogues, and you will stand before '
  - type: note
    content: Acts 17:6; 18:12; 24:1; 25:6
  - type: text
    content: 'governors and '
  - type: note
    content: '[ Acts 27:24 ]'
  - type: text
    content: 'kings for my sake, '
  - type: note
    content: See Matt. 8:4
  - type: text
    content: to bear witness before them.
  - type: text
    content: ' '
