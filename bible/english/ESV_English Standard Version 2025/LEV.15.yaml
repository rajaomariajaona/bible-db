    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And every garment and every skin on which the semen comes shall be washed with water and be unclean until the evening. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'If a man lies with a woman and has an emission of semen, both of them shall bathe themselves in water and '
    - type: usfm
