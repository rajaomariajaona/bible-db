      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4-10
      marker-yv: yv-n
    - type: text
      text: 'And everything on which she lies during her menstrual impurity shall be unclean. Everything also on which she sits shall be unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And whoever touches her bed shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And whoever touches anything on which she sits shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
