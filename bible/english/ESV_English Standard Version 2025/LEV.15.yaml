document_id: LEV.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws About Bodily Discharges
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: 'And whoever touches anything that was under him shall be unclean until the evening. And whoever carries such things shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '11':
  - type: text
    content: 'Anyone whom the one with the discharge touches without having rinsed his hands in water shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '12':
  - type: text
    content: 'And an '
  - type: note
    content: ch. 6:28; 11:32, 33
  - type: text
    content: earthenware vessel that the one with the discharge touches shall be broken, and every vessel of wood shall be rinsed in water.
  '13':
  - type: text
    content: '“And when the one with a discharge is cleansed of his discharge, then '
  - type: note
    content: ver. 28; [ch. 14:8]
  - type: text
    content: 'he shall count for himself seven days for his cleansing, and wash his clothes. And he shall bathe his body in fresh water and shall be clean. '
  '14':
  - type: text
    content: 'And on the eighth day he shall take two '
  - type: note
    content: See ch. 12:8
  - type: text
    content: 'turtledoves or two pigeons and come before the '
  - type: text
    content: Lord
  - type: text
    content: ' to the entrance of the tent of meeting and give them to the priest. '
  '15':
  - type: text
    content: 'And the priest shall use them, '
  - type: note
    content: ch. 14:30, 31
  - type: text
    content: 'one for a sin offering and the other for a burnt offering. '
  - type: note
    content: ver. 30; See ch. 4:26
  - type: text
    content: 'And the priest shall make atonement for him before the '
  - type: text
    content: Lord
  - type: text
    content: ' for his discharge.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 22:4; Deut. 23:10
  - type: text
    content: '“If a man has an emission of semen, he shall bathe his whole body in water and be unclean until the evening. '
  '17':
  - type: text
    content: 'And every garment and every skin on which the semen comes shall be washed with water and be unclean until the evening. '
  '18':
  - type: text
    content: 'If a man lies with a woman and has an emission of semen, both of them shall bathe themselves in water and '
  - type: note
    content: '[1 Sam. 21:4]'
  - type: text
    content: be unclean until the evening.
  '19':
  - type: text
    content: '“When a woman has a discharge, and the discharge in her body is blood, she shall be in her menstrual impurity for seven days, and whoever touches her shall be unclean until the evening. '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: ch. 22:4; Num. 5:2; 2 Sam. 3:29
  - type: text
    content: When any man has a discharge from his body,
  - type: note
    content: Hebrew flesh; also verse 3
  - type: text
    content: ' his discharge is unclean. '
  '20':
  - type: note
    content: See ver. 4-10
  - type: text
    content: 'And everything on which she lies during her menstrual impurity shall be unclean. Everything also on which she sits shall be unclean. '
  '21':
  - type: text
    content: 'And whoever touches her bed shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '22':
  - type: text
    content: 'And whoever touches anything on which she sits shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '23':
  - type: text
    content: 'Whether it is the bed or anything on which she sits, when he touches it he shall be unclean until the evening. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 18:19; [ch. 20:18]
  - type: text
    content: if any man lies with her and her menstrual impurity comes upon him, he shall be unclean seven days, and every bed on which he lies shall be unclean.
  '25':
  - type: text
    content: '“If '
  - type: note
    content: Matt. 9:20; Mark 5:25; Luke 8:43
  - type: text
    content: 'a woman has a discharge of blood for many days, not at the time of her menstrual impurity, or if she has a discharge beyond the time of her impurity, all the days of the discharge she shall continue in uncleanness. As in the days of her impurity, she shall be unclean. '
  '26':
  - type: text
    content: 'Every bed on which she lies, all the days of her discharge, shall be to her as the bed of her impurity. And everything on which she sits shall be unclean, as in the uncleanness of her menstrual impurity. '
  '27':
  - type: text
    content: 'And whoever touches these things shall be unclean, and shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '28':
  - type: text
    content: 'But '
  - type: note
    content: For ver. 28-30, see ver. 13-15
  - type: text
    content: 'if she is cleansed of her discharge, she shall count for herself seven days, and after that she shall be clean. '
  '29':
  - type: text
    content: 'And on the eighth day she shall take two '
  - type: note
    content: See ch. 12:8
  - type: text
    content: 'turtledoves or two pigeons and bring them to the priest, to the entrance of the tent of meeting. '
  '3':
  - type: text
    content: 'And this is the law of his uncleanness for a discharge: whether his body runs with his discharge, or his body is blocked up by his discharge, it is his uncleanness. '
  '30':
  - type: text
    content: 'And the priest shall use one for a sin offering and the other for a burnt offering. And the priest shall make atonement for her before the '
  - type: text
    content: Lord
  - type: text
    content: ' for her unclean discharge.'
  '31':
  - type: text
    content: '“Thus you shall keep the people of Israel separate from their uncleanness, lest they die in their uncleanness by '
  - type: note
    content: Num. 5:3; 19:13, 20; Ezek. 5:11; 23:38
  - type: text
    content: defiling my tabernacle that is in their midst.”
  '32':
  - type: text
    content: 'This is the law '
  - type: note
    content: ver. 2
  - type: text
    content: 'for him who has a discharge and '
  - type: note
    content: ver. 16
  - type: text
    content: 'for him who has an emission of semen, becoming unclean thereby; '
  '33':
  - type: note
    content: ver. 19
  - type: text
    content: 'also for her who is unwell with her menstrual impurity, that is, for anyone, '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'male or '
  - type: note
    content: ver. 25
  - type: text
    content: 'female, who has a discharge, and for the '
  - type: note
    content: ver. 24
  - type: text
    content: man who lies with a woman who is unclean.
  '4':
  - type: text
    content: 'Every bed on which the one with the discharge lies shall be unclean, and everything on which he sits shall be unclean. '
  '5':
  - type: text
    content: 'And anyone who touches his bed '
  - type: note
    content: See ch. 11:25
  - type: text
    content: 'shall wash his clothes and '
  - type: note
    content: ch. 16:26; 17:15
  - type: text
    content: 'bathe himself in water and be unclean until the evening. '
  '6':
  - type: text
    content: 'And whoever sits on anything on which the one with the discharge has sat shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '7':
  - type: text
    content: 'And whoever touches the body of the one with the discharge shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '8':
  - type: text
    content: 'And if the one with the discharge spits on someone who is clean, then he shall wash his clothes and bathe himself in water and be unclean until the evening. '
  '9':
  - type: text
    content: 'And any saddle on which the one with the discharge rides shall be unclean. '
