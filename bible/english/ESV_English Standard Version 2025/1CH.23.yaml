document_id: 1CH.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Organizes the Levites
  - type: text
    content: ' '
  - type: note
    content: ch. 29:28
  - type: text
    content: 'When David was old and full of days, '
  - type: note
    content: '[ch. 28:5; 29:22, 28]; See 1 Kgs. 1:33-39'
  - type: text
    content: he made Solomon his son king over Israel.
  '10':
  - type: text
    content: 'And the sons of Shimei: Jahath, Zina, and Jeush and Beriah. These four were the sons of Shimei. '
  '11':
  - type: text
    content: Jahath was the chief, and Zizah the second; but Jeush and Beriah did not have many sons, therefore they became counted as a single father’s house.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:18; 26:23; Ex. 6:18; Num. 3:19
  - type: text
    content: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel, four. '
  '13':
  - type: note
    content: Ex. 6:20
  - type: text
    content: 'The sons of Amram: Aaron and Moses. '
  - type: note
    content: Ex. 28:1; [Heb. 5:4]
  - type: text
    content: 'Aaron was set apart to dedicate the most holy things, that he and his sons forever should '
  - type: note
    content: Ex. 30:7; Num. 16:40; 1 Sam. 2:28
  - type: text
    content: 'make offerings before the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Deut. 21:5
  - type: text
    content: 'minister to him and '
  - type: note
    content: Num. 6:23
  - type: text
    content: 'pronounce blessings in his name forever. '
  '14':
  - type: text
    content: 'But the sons of Moses the '
  - type: note
    content: '[ch. 26:23-25]'
  - type: text
    content: 'man of God were named among the '
  - type: note
    content: Deut. 33:1
  - type: text
    content: 'tribe of Levi. '
  '15':
  - type: text
    content: 'The '
  - type: note
    content: Ex. 2:22; 18:3, 4
  - type: text
    content: 'sons of Moses: Gershom and Eliezer. '
  '16':
  - type: text
    content: 'The sons of Gershom: '
  - type: note
    content: ch. 26:24
  - type: text
    content: 'Shebuel the chief. '
  '17':
  - type: text
    content: 'The sons of Eliezer: Rehabiah the chief. Eliezer had no other sons, but the sons of Rehabiah were very many. '
  '18':
  - type: text
    content: 'The sons of Izhar: Shelomith the chief. '
  '19':
  - type: text
    content: 'The '
  - type: note
    content: ch. 24:23; [ch. 26:31]
  - type: text
    content: 'sons of Hebron: Jeriah the chief, Amariah the second, Jahaziel the third, and Jekameam the fourth. '
  '2':
  - type: text
    content: David
  - type: note
    content: Hebrew He
  - type: text
    content: ' assembled all the leaders of Israel and the priests and the Levites. '
  '20':
  - type: note
    content: ch. 24:24, 25
  - type: text
    content: 'The sons of Uzziel: Micah the chief and Isshiah the second.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:19, 29; 24:26; Ex. 6:19; [ Num. 26:58 ]
  - type: text
    content: 'The sons of Merari: Mahli and Mushi. The sons of Mahli: Eleazar and '
  - type: note
    content: ch. 24:29
  - type: text
    content: 'Kish. '
  '22':
  - type: text
    content: 'Eleazar died '
  - type: note
    content: ch. 24:28
  - type: text
    content: 'having no sons, but only daughters; their '
  - type: note
    content: '[Num. 36:6, 8]'
  - type: text
    content: 'kinsmen, the sons of Kish, married them. '
  '23':
  - type: note
    content: ch. 24:30
  - type: text
    content: 'The sons of Mushi: Mahli, Eder, and Jeremoth, three.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ Num. 10:17, 21 ]'
  - type: text
    content: 'These were the sons of Levi by their fathers’ houses, the heads of fathers’ houses '
  - type: note
    content: ver. 3
  - type: text
    content: 'as they were listed according to the number of the names of the individuals from '
  - type: note
    content: 2 Chr. 31:17; Ezra 3:8; [ver. 3; Num. 4:3; 8:24]
  - type: text
    content: 'twenty years old and upward who were to do the work for the service of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'For David said, “The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: See ch. 22:18
  - type: text
    content: 'has given rest to his people, and he dwells in Jerusalem forever. '
  '26':
  - type: text
    content: 'And so the Levites no longer need '
  - type: note
    content: See Num. 4:5-15
  - type: text
    content: 'to carry the tabernacle or any of the things for its service.” '
  '27':
  - type: text
    content: 'For by the last words of David the sons of Levi were numbered from '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'twenty years old and upward. '
  '28':
  - type: text
    content: 'For their duty was to assist the sons of Aaron for the service of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', having the care of the courts and the chambers, the cleansing of all that is holy, and any work for the service of the house of God. '
  '29':
  - type: text
    content: 'Their duty was also to assist with the '
  - type: note
    content: See Lev. 24:5-8
  - type: text
    content: 'showbread, the '
  - type: note
    content: ch. 9:29; Lev. 6:20, 21
  - type: text
    content: 'flour for the grain offering, the wafers of unleavened bread, the '
  - type: note
    content: ch. 9:31
  - type: text
    content: 'baked offering, the '
  - type: note
    content: Lev. 6:21; 7:12
  - type: text
    content: 'offering mixed with oil, and all '
  - type: note
    content: '[Lev. 19:35]'
  - type: text
    content: 'measures of quantity or size. '
  '3':
  - type: text
    content: 'The Levites, '
  - type: note
    content: Num. 4:3, 47
  - type: text
    content: 'thirty years old and upward, were numbered, and '
  - type: note
    content: ver. 24; Num. 1:2
  - type: text
    content: 'the total was '
  - type: note
    content: '[Num. 4:47, 48]'
  - type: text
    content: '38,000 men. '
  '30':
  - type: text
    content: 'And they were to stand every morning, thanking and praising the '
  - type: text
    content: Lord
  - type: text
    content: ', and likewise at evening, '
  '31':
  - type: text
    content: 'and whenever burnt offerings were offered to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Isa. 1:13
  - type: text
    content: 'on Sabbaths, '
  - type: note
    content: See Num. 28:11
  - type: text
    content: 'new moons, and feast days, '
  - type: note
    content: See Lev. 23:2, 4
  - type: text
    content: 'according to the number required of them, regularly before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Thus '
  - type: note
    content: Num. 1:53
  - type: text
    content: 'they were to keep charge of the tent of meeting and the sanctuary, and to attend the sons of Aaron, their brothers, for the '
  - type: note
    content: See Num. 3:6-9
  - type: text
    content: 'service of the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: “Twenty-four thousand of these,” David said,
  - type: note
    content: Hebrew lacks David said
  - type: text
    content: ' '
  - type: note
    content: '[2 Chr. 2:2, 18; 34:12; Ezra 3:8, 9]'
  - type: text
    content: '“shall have charge of the work in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', 6,000 shall be '
  - type: note
    content: ch. 26:29; [Deut. 16:18; 2 Chr. 19:8]
  - type: text
    content: 'officers and judges, '
  '5':
  - type: text
    content: '4,000 gatekeepers, and 4,000 shall offer praises to the '
  - type: text
    content: Lord
  - type: text
    content: ' with the instruments '
  - type: note
    content: 2 Chr. 29:25, 26; Neh. 12:36; Amos 6:5
  - type: text
    content: 'that I have made for praise.” '
  '6':
  - type: note
    content: '[2 Chr. 8:14; 23:18; 35:4; Ezra 6:18]'
  - type: text
    content: 'And David organized them in divisions '
  - type: note
    content: ch. 6:1, 16; Ex. 6:16; Num. 26:57
  - type: text
    content: 'corresponding to the sons of Levi: Gershon, Kohath, and Merari.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:21
  - type: text
    content: The sons of Gershon
  - type: note
    content: Vulgate (compare Septuagint, Syriac); Hebrew to the Gershonite
  - type: text
    content: ' were Ladan and Shimei. '
  '8':
  - type: text
    content: 'The sons of Ladan: '
  - type: note
    content: ch. 15:18; 29:8; [ch. 26:21]
  - type: text
    content: 'Jehiel the chief, and Zetham, and Joel, three. '
  '9':
  - type: text
    content: 'The sons of Shimei: Shelomoth, Haziel, and Haran, three. These were the heads of the fathers’ houses of Ladan. '
