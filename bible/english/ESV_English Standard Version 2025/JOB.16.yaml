  - type: text
    content: in the dust.
  '16':
  - type: text
    content: My face is red with weeping,
  - type: text
    content: 'and on my eyelids is '
  - type: note
    content: See ch. 3:5
  - type: text
    content: deep darkness,
  '17':
  - type: text
    content: 'although there is no '
  - type: note
