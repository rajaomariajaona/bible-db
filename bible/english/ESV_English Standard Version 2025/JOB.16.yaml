    content: struck me insolently on the cheek;
  - type: text
    content: 'they '
  - type: note
    content: Ps. 35:15
  - type: text
    content: mass themselves together against me.
  '11':
  - type: text
    content: God gives me up to the ungodly
  - type: text
    content: and casts me into the hands of the wicked.
  '12':
  - type: text
    content: I was at ease, and he broke me apart;
  - type: text
    content: he seized me by the neck and dashed me to pieces;
  - type: text
