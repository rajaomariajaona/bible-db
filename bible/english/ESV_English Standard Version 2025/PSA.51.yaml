document_id: PSA.51,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Create in Me a Clean Heart, O God
  - type: text
    content: 'To the choirmaster. A Psalm of David, when '
  - type: note
    content: 2 Sam. 12:1
  - type: text
    content: Nathan the prophet went to him, after he had gone in to Bathsheba.
  - type: text
    content: ' '
  - type: note
    content: See Ps. 4:1
  - type: text
    content: Have mercy on me,
  - type: note
    content: Or Be gracious to me
  - type: text
    content: ' O God,'
  - type: text
    content: according to your steadfast love;
  - type: text
    content: 'according to your '
  - type: note
    content: See Ps. 106:45
  - type: text
    content: abundant mercy
  - type: note
    content: ver. 9 ; Isa. 43:25; 44:22; Acts 3:19; Col. 2:14
  - type: text
    content: blot out my transgressions.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 10:9; Jer. 24:7; Ezek. 11:19; 36:26; Eph. 4:23, 24
  - type: text
    content: 'Create in me a '
  - type: note
    content: Ps. 24:4; Matt. 5:8; Acts 15:9
  - type: text
    content: clean heart, O God,
  - type: text
    content: 'and '
  - type: note
    content: Lam. 5:21
  - type: text
    content: renew a right
  - type: note
    content: Or steadfast
  - type: text
    content: ' spirit within me.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 102:10; 2 Kgs. 13:23; 17:20; 24:20; Jer. 7:15
  - type: text
    content: Cast me not away from your presence,
  - type: text
    content: 'and take not '
  - type: note
    content: Rom. 8:9; Eph. 4:30
  - type: text
    content: your Holy Spirit from me.
  '12':
  - type: text
    content: Restore to me the joy of your salvation,
  - type: text
    content: and uphold me with a willing spirit.
  '13':
  - type: text
    content: Then I will teach transgressors your ways,
  - type: text
    content: 'and sinners will '
  - type: note
    content: '[Luke 22:32]'
  - type: text
    content: return to you.
  '14':
  - type: text
    content: 'Deliver me from '
  - type: note
    content: 2 Sam. 11:17; 12:9
  - type: text
    content: bloodguiltiness, O God,
  - type: text
    content: 'O '
  - type: note
    content: Ps. 24:5
  - type: text
    content: God of my salvation,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 35:28; 71:8, 15, 24
  - type: text
    content: 'my tongue will sing aloud of your '
  - type: note
    content: '[1 John 1:9]'
  - type: text
    content: righteousness.
  '15':
  - type: text
    content: O Lord, open my lips,
  - type: text
    content: and my mouth will declare your praise.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 40:6
  - type: text
    content: For you will not delight in sacrifice, or I would give it;
  - type: text
    content: you will not be pleased with a burnt offering.
  '17':
  - type: text
    content: 'The sacrifices of God are '
  - type: note
    content: See Ps. 34:18
  - type: text
    content: a broken spirit;
  - type: text
    content: a broken and contrite heart, O God, you will not despise.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 69:35; 122:6 ]'
  - type: text
    content: Do good to Zion in your good pleasure;
  - type: note
    content: Ps. 147:2
  - type: text
    content: build up the walls of Jerusalem;
  '19':
  - type: text
    content: 'then will you delight in '
  - type: note
    content: Ps. 4:5; [Mal. 3:3]
  - type: text
    content: right sacrifices,
  - type: text
    content: 'in burnt offerings and '
  - type: note
    content: Deut. 33:10
  - type: text
    content: whole burnt offerings;
  - type: text
    content: then bulls will be offered on your altar.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ver. 7 ; Isa. 1:16; Jer. 4:14; Mal. 3:3; Acts 22:16
  - type: text
    content: Wash me thoroughly from my iniquity,
  - type: text
    content: 'and '
  - type: note
    content: Heb. 9:14; 1 John 1:7, 9; [Lev. 13:6]
  - type: text
    content: cleanse me from my sin!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps. 32:5; [ Prov. 28:13 ]
  - type: text
    content: For I know my transgressions,
  - type: text
    content: and my sin is ever before me.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Gen. 20:6; 39:9; 2 Sam. 12:13; [ 1 Cor. 8:12 ]
  - type: text
    content: Against you, you only, have I sinned
  - type: text
    content: 'and done what is evil '
  - type: note
    content: Luke 15:18, 21
  - type: text
    content: in your sight,
  - type: note
    content: Cited Rom. 3:4
  - type: text
    content: so that you may be justified in your words
  - type: text
    content: and blameless in your judgment.
  '5':
  - type: text
    content: 'Behold, '
  - type: note
    content: Rom. 5:12, 19; Eph. 2:3; See Job 14:4; 15:14
  - type: text
    content: I was brought forth in iniquity,
  - type: text
    content: and in sin did my mother conceive me.
  '6':
  - type: text
    content: 'Behold, you delight in truth in '
  - type: note
    content: Job 38:36
  - type: text
    content: the inward being,
  - type: text
    content: and you teach me wisdom in the secret heart.
  '7':
  - type: text
    content: 'Purge me '
  - type: note
    content: Ex. 12:22; Lev. 14:4; Num. 19:18; Heb. 9:19
  - type: text
    content: with hyssop, and I shall be clean;
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'wash me, and I shall be '
  - type: note
    content: Isa. 1:18
  - type: text
    content: whiter than snow.
  '8':
  - type: text
    content: Let me hear joy and gladness;
  - type: note
    content: Ps. 35:10
  - type: text
    content: 'let the bones '
  - type: note
    content: Ps. 44:19; Isa. 38:13
  - type: text
    content: that you have broken rejoice.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Jer. 16:17
  - type: text
    content: Hide your face from my sins,
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: blot out all my iniquities.
