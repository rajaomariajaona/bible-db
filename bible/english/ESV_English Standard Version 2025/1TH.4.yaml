document_id: 1TH.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Life Pleasing to God
  - type: text
    content: Finally, then, brothers,
  - type: note
    content: Or brothers and sisters; also verses 10, 13
  - type: text
    content: ' we ask and urge you in the Lord Jesus, that as you '
  - type: note
    content: Phil. 4:9; Col. 2:6
  - type: text
    content: 'received from us '
  - type: note
    content: See Eph. 4:1
  - type: text
    content: 'how you ought to walk and '
  - type: note
    content: See Col. 1:10
  - type: text
    content: 'to please God, just as you are doing, that you '
  - type: note
    content: See ch. 3:12
  - type: text
    content: 'do so more and more. '
  '10':
  - type: text
    content: 'for that indeed is what '
  - type: note
    content: ch. 1:7
  - type: text
    content: 'you are doing to all the brothers throughout Macedonia. But we urge you, brothers, to '
  - type: note
    content: See ch. 3:12
  - type: text
    content: 'do this more and more, '
  '11':
  - type: text
    content: 'and to aspire '
  - type: note
    content: Prov. 17:14; 20:3; 25:8; 2 Thess. 3:12
  - type: text
    content: 'to live quietly, and '
  - type: note
    content: 2 Thess. 3:11; 1 Pet. 4:15
  - type: text
    content: 'to mind your own affairs, and '
  - type: note
    content: '[Acts 18:3]; See Eph. 4:28'
  - type: text
    content: 'to work with your hands, as we instructed you, '
  '12':
  - type: text
    content: 'so that you may '
  - type: note
    content: Rom. 13:13; [Col. 4:5]
  - type: text
    content: 'walk properly before '
  - type: note
    content: See Mark 4:11
  - type: text
    content: outsiders and be dependent on no one.
  - type: heading
    content: The Coming of the Lord
  '13':
  - type: text
    content: 'But we do not want you to be uninformed, brothers, about those who are asleep, '
  - type: note
    content: '[Lev. 19:28; Deut. 14:1; 2 Sam. 12:20-23; Mark 5:39]'
  - type: text
    content: 'that you may not grieve as others do '
  - type: note
    content: Eph. 2:12
  - type: text
    content: 'who have no hope. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 15:13; [2 Cor. 4:14; Rev. 1:18]
  - type: text
    content: 'since we believe that Jesus died and rose again, even so, through Jesus, God will bring with him '
  - type: note
    content: 1 Cor. 15:18
  - type: text
    content: 'those who have fallen asleep. '
  '15':
  - type: text
    content: 'For this we declare to you '
  - type: note
    content: See 1 Kgs. 13:17
  - type: text
    content: by a word from the Lord,
  - type: note
    content: Or by the word of the Lord
  - type: text
    content: ' that '
  - type: note
    content: 1 Cor. 15:51
  - type: text
    content: 'we who are alive, who are left until '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'the coming of the Lord, will not precede those who have fallen asleep. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: See Matt. 16:27
  - type: text
    content: 'the Lord himself will descend '
  - type: note
    content: 2 Thess. 1:7
  - type: text
    content: 'from heaven '
  - type: note
    content: '[Joel 2:11]'
  - type: text
    content: 'with a cry of command, with the voice of '
  - type: note
    content: Jude 9
  - type: text
    content: 'an archangel, and '
  - type: note
    content: Matt. 24:31; 1 Cor. 15:52
  - type: text
    content: 'with the sound of the trumpet of God. And '
  - type: note
    content: 1 Cor. 15:23; [2 Thess. 2:1; Rev. 14:13]
  - type: text
    content: 'the dead in Christ will rise first. '
  '17':
  - type: text
    content: 'Then we who are alive, who are left, will be '
  - type: note
    content: See 2 Cor. 12:2
  - type: text
    content: 'caught up together with them '
  - type: note
    content: '[Dan. 7:13; Acts 1:9; Rev. 11:12]'
  - type: text
    content: 'in the clouds to meet the Lord in the air, and so '
  - type: note
    content: See John 12:26
  - type: text
    content: 'we will always be with the Lord. '
  '18':
  - type: text
    content: Therefore encourage one another with these words.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: '[1 Cor. 11:2]'
  - type: text
    content: 'you know what instructions we gave you through the Lord Jesus. '
  '3':
  - type: text
    content: 'For this is the will of God, '
  - type: note
    content: Rom. 6:19, 22; 1 Cor. 1:30; 2 Thess. 2:13; 1 Tim. 2:15; Heb. 12:14; 1 Pet. 1:2
  - type: text
    content: 'your sanctification:'
  - type: note
    content: Or your holiness
  - type: text
    content: ' '
  - type: note
    content: See 1 Cor. 6:18
  - type: text
    content: 'that you abstain from sexual immorality; '
  '4':
  - type: text
    content: 'that each one of you know how to control his own '
  - type: note
    content: 1 Pet. 3:7; [2 Cor. 4:7]
  - type: text
    content: body
  - type: note
    content: Or how to take a wife for himself; Greek how to possess his own vessel
  - type: text
    content: ' in holiness and '
  - type: note
    content: '[Rom. 1:24]'
  - type: text
    content: 'honor, '
  '5':
  - type: text
    content: 'not in '
  - type: note
    content: See Rom. 1:26
  - type: text
    content: 'the passion of lust '
  - type: note
    content: Eph. 4:17
  - type: text
    content: 'like the Gentiles '
  - type: note
    content: Ps. 79:6; Jer. 9:3; 10:25; See Gal. 4:8
  - type: text
    content: 'who do not know God; '
  '6':
  - type: text
    content: 'that no one transgress and '
  - type: note
    content: 1 Cor. 6:8
  - type: text
    content: 'wrong his brother in this matter, because the Lord is '
  - type: note
    content: Rom. 13:4; [Rom. 12:19; Heb. 13:4]
  - type: text
    content: 'an avenger in all these things, as we told you beforehand and solemnly warned you. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: ver. 3; See 1 Pet. 1:15
  - type: text
    content: 'God has not called us for '
  - type: note
    content: ch. 2:3
  - type: text
    content: 'impurity, but in holiness. '
  '8':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[ch. 2:13]; See Luke 10:16'
  - type: text
    content: 'whoever disregards this, disregards not man but God, '
  - type: note
    content: 1 John 3:24; 4:13
  - type: text
    content: who gives his Holy Spirit to you.
  '9':
  - type: text
    content: 'Now concerning '
  - type: note
    content: See Heb. 13:1
  - type: text
    content: 'brotherly love '
  - type: note
    content: ch. 5:1
  - type: text
    content: 'you have no need for anyone to write to you, for you yourselves have been '
  - type: note
    content: John 6:45; [1 John 2:27]
  - type: text
    content: 'taught by God '
  - type: note
    content: See John 13:34
  - type: text
    content: 'to love one another, '
