document_id: GEN.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Promise to Isaac
  - type: text
    content: 'Now there was a famine in the land, besides '
  - type: note
    content: ch. 12:10
  - type: text
    content: 'the former famine that was in the days of Abraham. And Isaac went to Gerar to '
  - type: note
    content: ch. 20:2
  - type: text
    content: 'Abimelech king of the '
  - type: note
    content: ch. 21:34
  - type: text
    content: 'Philistines. '
  '10':
  - type: text
    content: 'Abimelech said, “What is this you have done to us? One of the people might easily have lain with your wife, and '
  - type: note
    content: ch. 20:9
  - type: text
    content: 'you would have brought guilt upon us.” '
  '11':
  - type: text
    content: So Abimelech warned all the people, saying, “Whoever touches this man or his wife shall surely be put to death.”
  '12':
  - type: text
    content: 'And Isaac sowed in that land and reaped in the same year a hundredfold. The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 3; ch. 24:1, 35
  - type: text
    content: 'blessed him, '
  '13':
  - type: text
    content: 'and the man became rich, and gained more and more until he became very wealthy. '
  '14':
  - type: text
    content: 'He had possessions of flocks and herds and many servants, so that the Philistines '
  - type: note
    content: '[Eccles. 4:4]'
  - type: text
    content: 'envied him. '
  '15':
  - type: text
    content: '(Now the Philistines had stopped and filled with earth all the wells '
  - type: note
    content: ch. 21:30
  - type: text
    content: 'that his father’s servants had dug in the days of Abraham his father.) '
  '16':
  - type: text
    content: And Abimelech said to Isaac, “Go away from us, for you are much mightier than we.”
  '17':
  - type: text
    content: 'So Isaac departed from there and encamped in the Valley of Gerar and settled there. '
  '18':
  - type: text
    content: 'And Isaac dug again the wells of water that had been dug in the days of Abraham his father, which the Philistines had stopped after the death of Abraham. And '
  - type: note
    content: ch. 21:31
  - type: text
    content: 'he gave them the names that his father had given them. '
  '19':
  - type: text
    content: 'But when Isaac’s servants dug in the valley and found there a well of spring water, '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him and said, “Do not go down to Egypt; dwell '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'in the land of which I shall tell you. '
  '20':
  - type: text
    content: 'the herdsmen of Gerar '
  - type: note
    content: ch. 21:25
  - type: text
    content: quarreled with Isaac’s herdsmen, saying, “The water is ours.” So he called the name of the well Esek,
  - type: note
    content: Esek means contention
  - type: text
    content: ' because they contended with him. '
  '21':
  - type: text
    content: Then they dug another well, and they quarreled over that also, so he called its name Sitnah.
  - type: note
    content: Sitnah means enmity
  - type: text
    content: ' '
  '22':
  - type: text
    content: And he moved from there and dug another well, and they did not quarrel over it. So he called its name Rehoboth,
  - type: note
    content: Rehoboth means broad places, or room
  - type: text
    content: ' saying, “For now the '
  - type: text
    content: Lord
  - type: text
    content: ' has made room for us, and we shall be fruitful in the land.”'
  '23':
  - type: text
    content: 'From there he went up to Beersheba. '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him the same night and said, '
  - type: note
    content: ch. 17:7; 24:12; 28:13; Ex. 3:6
  - type: text
    content: '“I am the God of Abraham your father. '
  - type: note
    content: ch. 15:1; See Ps. 27:1-3
  - type: text
    content: 'Fear not, for '
  - type: note
    content: ch. 28:15; 31:3; [ch. 21:22, 23]
  - type: text
    content: 'I am with you and will bless you and multiply your offspring for my servant Abraham’s sake.” '
  '25':
  - type: text
    content: 'So he '
  - type: note
    content: ch. 12:7; 13:18
  - type: text
    content: 'built an altar there and called upon the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' and pitched his tent there. And there Isaac’s servants dug a well.'
  '26':
  - type: text
    content: 'When Abimelech went to him from Gerar with Ahuzzath his adviser and '
  - type: note
    content: ch. 21:22
  - type: text
    content: 'Phicol the commander of his army, '
  '27':
  - type: text
    content: 'Isaac said to them, “Why have you come to me, seeing that you hate me and '
  - type: note
    content: ver. 16
  - type: text
    content: 'have sent me away from you?” '
  '28':
  - type: text
    content: 'They said, “We see plainly that the '
  - type: text
    content: Lord
  - type: text
    content: ' has been with you. So we said, let there be a sworn pact between us, between you and us, and let us make a covenant with you, '
  '29':
  - type: text
    content: 'that you will do us no harm, just as we have not touched you and have done to you nothing but good and have sent you away in peace. '
  - type: note
    content: ch. 24:31
  - type: text
    content: 'You are now the blessed of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: note
    content: ch. 20:1; Heb. 11:9
  - type: text
    content: 'Sojourn in this land, and '
  - type: note
    content: ch. 28:15
  - type: text
    content: 'I will be with you and will bless you, for '
  - type: note
    content: See ch. 13:15
  - type: text
    content: 'to you and to your offspring I will give all these lands, and I will establish '
  - type: note
    content: '[Mic. 7:20]; See ch. 22:16-18'
  - type: text
    content: 'the oath that I swore to Abraham your father. '
  '30':
  - type: text
    content: 'So he made them a feast, and they ate and drank. '
  '31':
  - type: text
    content: 'In the morning they rose early and '
  - type: note
    content: ch. 21:31
  - type: text
    content: 'exchanged oaths. And Isaac sent them on their way, and they departed from him in peace. '
  '32':
  - type: text
    content: 'That same day Isaac’s servants came and told him about the well that they had dug and said to him, “We have found water.” '
  '33':
  - type: text
    content: He called it Shibah;
  - type: note
    content: Shibah sounds like the Hebrew for oath
  - type: text
    content: ' therefore the name of the city is '
  - type: note
    content: ch. 21:31; 22:19
  - type: text
    content: Beersheba to this day.
  '34':
  - type: text
    content: 'When Esau was forty years old, he took '
  - type: note
    content: '[ch. 28:9; 36:2, 3]'
  - type: text
    content: 'Judith the daughter of Beeri the Hittite to be his wife, and Basemath the daughter of Elon the Hittite, '
  '35':
  - type: text
    content: 'and '
  - type: note
    content: ch. 27:46
  - type: text
    content: they made life bitter
  - type: note
    content: Hebrew they were bitterness of spirit
  - type: text
    content: ' for Isaac and Rebekah.'
  '4':
  - type: note
    content: Cited Ex. 32:13; See ch. 15:5
  - type: text
    content: 'I will multiply your offspring as the stars of heaven and will give to your offspring all these lands. And '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'in your offspring all the nations of the earth shall be blessed, '
  '5':
  - type: text
    content: 'because '
  - type: note
    content: ch. 22:18
  - type: text
    content: Abraham obeyed my voice and kept my charge, my commandments, my statutes, and my laws.”
  - type: heading
    content: Isaac and Abimelech
  '6':
  - type: text
    content: 'So Isaac settled in Gerar. '
  '7':
  - type: text
    content: 'When the men of the place asked him about his wife, '
  - type: note
    content: ch. 12:13; 20:2, 13
  - type: text
    content: 'he said, “She is my sister,” for '
  - type: note
    content: '[Prov. 29:25]'
  - type: text
    content: 'he feared to say, “My wife,” thinking, “lest the men of the place should kill me because of Rebekah,” because '
  - type: note
    content: ch. 24:16
  - type: text
    content: 'she was attractive in appearance. '
  '8':
  - type: text
    content: When he had been there a long time, Abimelech king of the Philistines looked out of a window and saw Isaac laughing with
  - type: note
    content: Hebrew may suggest an intimate relationship
  - type: text
    content: ' Rebekah his wife. '
  '9':
  - type: text
    content: 'So Abimelech called Isaac and said, “Behold, she is your wife. How then could you say, ‘She is my sister’?” Isaac said to him, “Because I thought, ‘Lest I die because of her.’” '
