document_id: PSA.108,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: With God We Shall Do Valiantly
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-5, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 57:7-11
      marker-yv: yv-n
    - type: text
      text: My heart is steadfast, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing and make melody with all my being!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: with my glory
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will bring me to the fortified city?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will lead me to Edom?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you not rejected us, O God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You do not go out, O God, with our armies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh grant us help against the foe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for vain is the salvation of man!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With God we shall do valiantly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is he who will tread down our foes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awake, O harp and lyre!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will awake the dawn!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will give thanks to you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', among the peoples;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing praises to you among the nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For your steadfast love is great '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 113:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: above the heavens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your faithfulness reaches to the clouds.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be exalted, O God, above the heavens!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let your glory be over all the earth!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 6-13, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 60:5-12
      marker-yv: yv-n
    - type: text
      text: That your beloved ones may be delivered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give salvation by your right hand and answer me!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God has promised in his holiness:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sanctuary
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “With exultation I will divide up Shechem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and portion out the Valley of Succoth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gilead is mine; Manasseh is mine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ephraim is my helmet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah my scepter.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab is my washbasin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: upon Edom I cast my shoe;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 60:8
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: over Philistia I shout in triumph.”
