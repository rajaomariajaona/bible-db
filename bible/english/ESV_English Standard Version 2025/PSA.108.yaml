document_id: PSA.108,59
type_code: eng
verses:
  '1':
  - type: heading
    content: With God We Shall Do Valiantly
  - type: text
    content: A Song. A Psalm of David.
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-5, see Ps. 57:7-11
  - type: text
    content: My heart is steadfast, O God!
  - type: text
    content: I will sing and make melody with all my being!
  - type: note
    content: Hebrew with my glory
  '10':
  - type: text
    content: Who will bring me to the fortified city?
  - type: text
    content: Who will lead me to Edom?
  '11':
  - type: text
    content: Have you not rejected us, O God?
  - type: text
    content: You do not go out, O God, with our armies.
  '12':
  - type: text
    content: Oh grant us help against the foe,
  - type: text
    content: for vain is the salvation of man!
  '13':
  - type: text
    content: With God we shall do valiantly;
  - type: text
    content: it is he who will tread down our foes.
  '2':
  - type: text
    content: Awake, O harp and lyre!
  - type: text
    content: I will awake the dawn!
  '3':
  - type: text
    content: 'I will give thanks to you, O '
  - type: text
    content: Lord
  - type: text
    content: ', among the peoples;'
  - type: text
    content: I will sing praises to you among the nations.
  '4':
  - type: text
    content: 'For your steadfast love is great '
  - type: note
    content: '[Ps. 113:4]'
  - type: text
    content: above the heavens;
  - type: text
    content: your faithfulness reaches to the clouds.
  '5':
  - type: text
    content: Be exalted, O God, above the heavens!
  - type: text
    content: Let your glory be over all the earth!
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-13, see Ps. 60:5-12
  - type: text
    content: That your beloved ones may be delivered,
  - type: text
    content: give salvation by your right hand and answer me!
  '7':
  - type: text
    content: 'God has promised in his holiness:'
  - type: note
    content: Or sanctuary
  - type: text
    content: “With exultation I will divide up Shechem
  - type: text
    content: and portion out the Valley of Succoth.
  '8':
  - type: text
    content: Gilead is mine; Manasseh is mine;
  - type: text
    content: Ephraim is my helmet,
  - type: text
    content: Judah my scepter.
  '9':
  - type: text
    content: Moab is my washbasin;
  - type: text
    content: upon Edom I cast my shoe;
  - type: note
    content: '[ Ps. 60:8 ]'
  - type: text
    content: over Philistia I shout in triumph.”
