      metadata:
        usfm: PSA.57.7+PSA.57.8+PSA.57.9+PSA.57.10+PSA.57.11
    marker-yv: yv-n
  - type: text
    text: My heart is steadfast, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing and make melody with all my being!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '108:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: with my glory
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Awake, O harp and lyre!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will awake the dawn!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I will give thanks to you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', among the peoples;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing praises to you among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For your steadfast love is great '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 113:4
      metadata:
        usfm: PSA.113.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: above the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness reaches to the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Be exalted, O God, above the heavens!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let your glory be over all the earth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 6-13, see '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 60:5-12
      metadata:
        usfm: PSA.60.5+PSA.60.6+PSA.60.7+PSA.60.8+PSA.60.9+PSA.60.10+PSA.60.11+PSA.60.12
    marker-yv: yv-n
  - type: text
    text: That your beloved ones may be delivered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give salvation by your right hand and answer me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God has promised in his holiness:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '108:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sanctuary
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: “With exultation I will divide up Shechem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and portion out the Valley of Succoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Gilead is mine; Manasseh is mine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim is my helmet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah my scepter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moab is my washbasin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: upon Edom I cast my shoe;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: text
      text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 60:8
      metadata:
        usfm: PSA.60.8
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: over Philistia I shout in triumph.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who will bring me to the fortified city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will lead me to Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Have you not rejected us, O God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: You do not go out, O God, with our armies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Oh grant us help against the foe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for vain is the salvation of man!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With God we shall do valiantly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is he who will tread down our foes.
