      - type: text
        text: 1 Kgs. 12:1-20
      metadata:
        usfm: 1KI.12.1+1KI.12.2+1KI.12.3+1KI.12.4+1KI.12.5+1KI.12.6+1KI.12.7+1KI.12.8+1KI.12.9+1KI.12.10+1KI.12.11+1KI.12.12+1KI.12.13+1KI.12.14+1KI.12.15+1KI.12.16+1KI.12.17+1KI.12.18+1KI.12.19+1KI.12.20
    marker-yv: yv-n
  - type: text
    text: 'Rehoboam went to Shechem, for all Israel had come to Shechem to make him king. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And as soon as Jeroboam the son of Nebat heard of it (for he was in Egypt, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 11:40
      metadata:
        usfm: 1KI.11.40
    marker-yv: yv-n
  - type: text
    text: 'where he had fled from King Solomon), then Jeroboam returned from Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they sent and called him. And Jeroboam and all Israel came and said to Rehoboam, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 5:15
      metadata:
        usfm: 1KI.5.15
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '“Your father made our yoke heavy. Now therefore lighten the hard service of your father and his heavy yoke on us, and we will serve you.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He said to them, “Come to me again in three days.” So the people went away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then King Rehoboam took counsel with the old men,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the elders
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also verses 8, 13
    marker-yv: yv-n
  - type: text
    text: ' who had stood before Solomon his father while he was yet alive, saying, “How do you advise me to answer this people?” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they said to him, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 12:7
      metadata:
        usfm: 1KI.12.7
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '“If you will be good to this people and please them and speak good words to them, then they will be your servants forever.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But he abandoned the counsel that the old men gave him, and took counsel with the young men who had grown up with him and stood before him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he said to them, “What do you advise that we answer this people who have said to me, ‘Lighten the yoke that your father put on us’?” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the young men who had grown up with him said to him, “Thus shall you speak to the people who said to you, ‘Your father made our yoke heavy, but you lighten it for us’; thus shall you say to them, ‘My little finger is thicker than my father’s thighs. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And now, whereas my father laid on you a heavy yoke, I will add to your yoke. My father disciplined you with whips, but I will discipline you with scorpions.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So Jeroboam and all the people came to Rehoboam the third day, as the king said, “Come to me again the third day.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the king answered them harshly; and forsaking the counsel of the old men, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'King Rehoboam spoke to them according to the counsel of the young men, saying, “My father made your yoke heavy, but I will add to it. My father disciplined you with whips, but I will discipline you with scorpions.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the king did not listen to the people, for it was a turn of affairs brought about by God that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' might fulfill his word, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 11:29-39
      metadata:
        usfm: 1KI.11.29+1KI.11.30+1KI.11.31+1KI.11.32+1KI.11.33+1KI.11.34+1KI.11.35+1KI.11.36+1KI.11.37+1KI.11.38+1KI.11.39
    marker-yv: yv-n
  - type: text
    text: which he spoke by Ahijah the Shilonite to Jeroboam the son of Nebat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And when all Israel saw that the king did not listen to them, the people answered the king, “What portion have we in David? We have no inheritance in the son of Jesse. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 20:1
      metadata:
        usfm: 2SA.20.1
    marker-yv: yv-n
  - type: text
    text: 'Each of you to your tents, O Israel! Look now to your own house, David.” So all Israel went to their tents. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But Rehoboam reigned over the people of Israel who lived in the cities of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then King Rehoboam sent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 4:6
      metadata:
        usfm: 1KI.4.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:14
      metadata:
        usfm: 1KI.5.14
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: Hadoram,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Spelled '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Adoram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: in 1 Kings 12:18
    marker-yv: yv-n
  - type: text
    text: ' who was taskmaster over the forced labor, and the people of Israel stoned him to death with stones. And King Rehoboam quickly mounted his chariot to flee to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So Israel has been in rebellion against the house of David to this day.
