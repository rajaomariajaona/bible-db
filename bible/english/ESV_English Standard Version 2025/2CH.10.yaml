document_id: 2CH.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Revolt Against Rehoboam
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-19, see 1 Kgs. 12:1-20
  - type: text
    content: 'Rehoboam went to Shechem, for all Israel had come to Shechem to make him king. '
  '10':
  - type: text
    content: 'And the young men who had grown up with him said to him, “Thus shall you speak to the people who said to you, ‘Your father made our yoke heavy, but you lighten it for us’; thus shall you say to them, ‘My little finger is thicker than my father’s thighs. '
  '11':
  - type: text
    content: And now, whereas my father laid on you a heavy yoke, I will add to your yoke. My father disciplined you with whips, but I will discipline you with scorpions.’”
  '12':
  - type: text
    content: 'So Jeroboam and all the people came to Rehoboam the third day, as the king said, “Come to me again the third day.” '
  '13':
  - type: text
    content: 'And the king answered them harshly; and forsaking the counsel of the old men, '
  '14':
  - type: text
    content: 'King Rehoboam spoke to them according to the counsel of the young men, saying, “My father made your yoke heavy, but I will add to it. My father disciplined you with whips, but I will discipline you with scorpions.” '
  '15':
  - type: text
    content: 'So the king did not listen to the people, for it was a turn of affairs brought about by God that the '
  - type: text
    content: Lord
  - type: text
    content: ' might fulfill his word, '
  - type: note
    content: See 1 Kgs. 11:29-39
  - type: text
    content: which he spoke by Ahijah the Shilonite to Jeroboam the son of Nebat.
  '16':
  - type: text
    content: 'And when all Israel saw that the king did not listen to them, the people answered the king, “What portion have we in David? We have no inheritance in the son of Jesse. '
  - type: note
    content: See 2 Sam. 20:1
  - type: text
    content: 'Each of you to your tents, O Israel! Look now to your own house, David.” So all Israel went to their tents. '
  '17':
  - type: text
    content: 'But Rehoboam reigned over the people of Israel who lived in the cities of Judah. '
  '18':
  - type: text
    content: 'Then King Rehoboam sent '
  - type: note
    content: '[1 Kgs. 4:6; 5:14]'
  - type: text
    content: Hadoram,
  - type: note
    content: Spelled Adoram in 1 Kings 12:18
  - type: text
    content: ' who was taskmaster over the forced labor, and the people of Israel stoned him to death with stones. And King Rehoboam quickly mounted his chariot to flee to Jerusalem. '
  '19':
  - type: text
    content: So Israel has been in rebellion against the house of David to this day.
  '2':
  - type: text
    content: 'And as soon as Jeroboam the son of Nebat heard of it (for he was in Egypt, '
  - type: note
    content: 1 Kgs. 11:40
  - type: text
    content: 'where he had fled from King Solomon), then Jeroboam returned from Egypt. '
  '3':
  - type: text
    content: 'And they sent and called him. And Jeroboam and all Israel came and said to Rehoboam, '
  '4':
  - type: note
    content: '[1 Kgs. 5:15]'
  - type: text
    content: '“Your father made our yoke heavy. Now therefore lighten the hard service of your father and his heavy yoke on us, and we will serve you.” '
  '5':
  - type: text
    content: He said to them, “Come to me again in three days.” So the people went away.
  '6':
  - type: text
    content: Then King Rehoboam took counsel with the old men,
  - type: note
    content: Or the elders; also verses 8, 13
  - type: text
    content: ' who had stood before Solomon his father while he was yet alive, saying, “How do you advise me to answer this people?” '
  '7':
  - type: text
    content: 'And they said to him, '
  - type: note
    content: '[1 Kgs. 12:7]'
  - type: text
    content: '“If you will be good to this people and please them and speak good words to them, then they will be your servants forever.” '
  '8':
  - type: text
    content: 'But he abandoned the counsel that the old men gave him, and took counsel with the young men who had grown up with him and stood before him. '
  '9':
  - type: text
    content: 'And he said to them, “What do you advise that we answer this people who have said to me, ‘Lighten the yoke that your father put on us’?” '
