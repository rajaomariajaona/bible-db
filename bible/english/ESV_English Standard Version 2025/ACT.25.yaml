document_id: ACT.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Appeals to Caesar
  - type: text
    content: 'Now three days after Festus had arrived in '
  - type: note
    content: ch. 23:34
  - type: text
    content: 'the province, he went up to Jerusalem from Caesarea. '
  '10':
  - type: text
    content: 'But Paul said, “I am standing before Caesar’s '
  - type: note
    content: ver. 6, 17
  - type: text
    content: 'tribunal, where I ought to be tried. To the Jews I have done no wrong, as you yourself know very well. '
  '11':
  - type: text
    content: 'If then I am a wrongdoer and have committed anything for which I deserve to die, I do not seek to escape death. But if there is nothing to their charges against me, no one can give me up to them. '
  - type: note
    content: ch. 26:32; 28:19
  - type: text
    content: 'I appeal to Caesar.” '
  '12':
  - type: text
    content: Then Festus, when he had conferred with his council, answered, “To Caesar you have appealed; to Caesar you shall go.”
  - type: heading
    content: Paul Before Agrippa and Bernice
  '13':
  - type: text
    content: 'Now when some days had passed, Agrippa the king and Bernice arrived at Caesarea and greeted Festus. '
  '14':
  - type: text
    content: 'And as they stayed there many days, Festus laid Paul’s case before the king, saying, '
  - type: note
    content: ch. 24:27
  - type: text
    content: '“There is a man left prisoner by Felix, '
  '15':
  - type: text
    content: 'and when I was at Jerusalem, the chief priests and the elders of the Jews laid out their case '
  - type: note
    content: ver. 2, 3
  - type: text
    content: 'against him, asking for a sentence of condemnation against him. '
  '16':
  - type: note
    content: ver. 4, 5
  - type: text
    content: 'I answered them that it was not the custom of the Romans to give up anyone '
  - type: note
    content: '[John 7:51]; See ch. 23:30'
  - type: text
    content: 'before the accused met the accusers face to face and had opportunity to make his defense concerning the charge laid against him. '
  '17':
  - type: note
    content: ver. 7, 24
  - type: text
    content: 'So when they came together here, I made no delay, but on the next day took my seat on '
  - type: note
    content: ver. 6, 10
  - type: text
    content: 'the tribunal and ordered the man to be brought. '
  '18':
  - type: text
    content: 'When the accusers stood up, they brought no charge in his case of such evils as I supposed. '
  '19':
  - type: text
    content: 'Rather they '
  - type: note
    content: ch. 18:15; 23:29
  - type: text
    content: 'had certain points of dispute with him about their own religion and about '
  - type: note
    content: '[ch. 17:18]'
  - type: text
    content: 'a certain Jesus, who was dead, but whom Paul asserted to be alive. '
  '2':
  - type: text
    content: 'And the chief priests and the principal men of the Jews '
  - type: note
    content: ver. 15
  - type: text
    content: 'laid out their case against Paul, and they urged him, '
  '20':
  - type: text
    content: 'Being at a loss how to investigate these questions, I '
  - type: note
    content: ver. 9
  - type: text
    content: 'asked whether he wanted to go to Jerusalem and be tried there regarding them. '
  '21':
  - type: text
    content: 'But '
  - type: note
    content: See ver. 11
  - type: text
    content: 'when Paul had appealed to be kept in custody for the decision of '
  - type: note
    content: ver. 25
  - type: text
    content: 'the emperor, I ordered him to be held until I could send him to Caesar.” '
  '22':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 9:15
  - type: text
    content: Agrippa said to Festus, “I would like to hear the man myself.” “Tomorrow,” said he, “you will hear him.”
  '23':
  - type: text
    content: 'So on the next day '
  - type: note
    content: ver. 13; ch. 26:30
  - type: text
    content: 'Agrippa and Bernice came with great pomp, and they entered the audience hall with the military tribunes and the prominent men of the city. Then, at the command of Festus, Paul was brought in. '
  '24':
  - type: text
    content: 'And Festus said, “King Agrippa and all who are present with us, you see this man about whom '
  - type: note
    content: ver. 2, 7
  - type: text
    content: 'the whole Jewish people petitioned me, both in Jerusalem and here, '
  - type: note
    content: ch. 22:22
  - type: text
    content: 'shouting that he ought not to live any longer. '
  '25':
  - type: text
    content: 'But I found that '
  - type: note
    content: See ch. 23:29
  - type: text
    content: 'he had done nothing deserving death. And '
  - type: note
    content: ver. 11, 12
  - type: text
    content: 'as he himself appealed to '
  - type: note
    content: ver. 21
  - type: text
    content: 'the emperor, I decided to go ahead and send him. '
  '26':
  - type: text
    content: 'But I have nothing definite to write to my lord about him. Therefore I have brought him before you all, and especially before you, King Agrippa, so that, after we have examined him, I may have something to write. '
  '27':
  - type: text
    content: For it seems to me unreasonable, in sending a prisoner, not to indicate the charges against him.”
  '3':
  - type: text
    content: asking as a favor against Paul
  - type: note
    content: Greek him
  - type: text
    content: ' that he summon him to Jerusalem—because '
  - type: note
    content: See ch. 9:24
  - type: text
    content: 'they were planning an ambush to kill him on the way. '
  '4':
  - type: text
    content: 'Festus replied that Paul was being kept at Caesarea and that he himself intended to go there shortly. '
  '5':
  - type: text
    content: “So,” said he, “let the men of authority among you go down with me, and if there is anything wrong about the man, let them bring charges against him.”
  '6':
  - type: text
    content: 'After he stayed among them not more than eight or ten days, he went down to Caesarea. And the next day he took his seat on '
  - type: note
    content: ver. 10, 17; See Matt. 27:19
  - type: text
    content: 'the tribunal and ordered Paul to be brought. '
  '7':
  - type: text
    content: 'When he had arrived, the Jews who had come down from Jerusalem stood around him, bringing many and serious charges against him '
  - type: note
    content: ch. 24:13
  - type: text
    content: 'that they could not prove. '
  '8':
  - type: text
    content: 'Paul argued in his defense, “Neither '
  - type: note
    content: '[ch. 24:12; 28:17]; See ch. 6:13'
  - type: text
    content: 'against '
  - type: note
    content: John 7:19; 19:7
  - type: text
    content: 'the law of the Jews, nor against the temple, nor '
  - type: note
    content: John 19:12
  - type: text
    content: 'against Caesar have I committed any offense.” '
  '9':
  - type: text
    content: 'But Festus, '
  - type: note
    content: ch. 24:27
  - type: text
    content: 'wishing to do the Jews a favor, said to Paul, “Do you wish to go up to Jerusalem and there be tried on these charges before me?” '
