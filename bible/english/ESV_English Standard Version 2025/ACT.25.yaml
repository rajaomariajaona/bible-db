        usfm: ACT.28.17
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:13
      metadata:
        usfm: ACT.6.13
    marker-yv: yv-n
  - type: text
    text: 'against '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 7:19
      metadata:
        usfm: JHN.7.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:7
      metadata:
        usfm: JHN.19.7
    marker-yv: yv-n
  - type: text
    text: 'the law of the Jews, nor against the temple, nor '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 19:12
      metadata:
        usfm: JHN.19.12
    marker-yv: yv-n
  - type: text
    text: 'against Caesar have I committed any offense.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Festus, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:27
      metadata:
        usfm: ACT.24.27
    marker-yv: yv-n
  - type: text
    text: 'wishing to do the Jews a favor, said to Paul, “Do you wish to go up to Jerusalem and there be tried on these charges before me?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Paul said, “I am standing before Caesar’s '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6, 17
      metadata:
        usfm: ACT.25.6
    marker-yv: yv-n
  - type: text
    text: 'tribunal, where I ought to be tried. To the Jews I have done no wrong, as you yourself know very well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If then I am a wrongdoer and have committed anything for which I deserve to die, I do not seek to escape death. But if there is nothing to their charges against me, no one can give me up to them. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:32
      metadata:
        usfm: ACT.26.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:19
      metadata:
        usfm: ACT.28.19
    marker-yv: yv-n
  - type: text
    text: 'I appeal to Caesar.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Festus, when he had conferred with his council, answered, “To Caesar you have appealed; to Caesar you shall go.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Before Agrippa and Bernice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now when some days had passed, Agrippa the king and Bernice arrived at Caesarea and greeted Festus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And as they stayed there many days, Festus laid Paul’s case before the king, saying, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:27
      metadata:
        usfm: ACT.24.27
    marker-yv: yv-n
  - type: text
    text: '“There is a man left prisoner by Felix, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and when I was at Jerusalem, the chief priests and the elders of the Jews laid out their case '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2, 3
      metadata:
        usfm: ACT.25.2
    marker-yv: yv-n
  - type: text
    text: 'against him, asking for a sentence of condemnation against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4, 5
      metadata:
        usfm: ACT.25.4
    marker-yv: yv-n
  - type: text
    text: 'I answered them that it was not the custom of the Romans to give up anyone '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 7:51
      metadata:
        usfm: JHN.7.51
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: text
      text: 23:30
    marker-yv: yv-n
  - type: text
    text: 'before the accused met the accusers face to face and had opportunity to make his defense concerning the charge laid against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7, 24
      metadata:
        usfm: ACT.25.7
    marker-yv: yv-n
  - type: text
    text: 'So when they came together here, I made no delay, but on the next day took my seat on '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6, 10
      metadata:
        usfm: ACT.25.6
    marker-yv: yv-n
  - type: text
    text: 'the tribunal and ordered the man to be brought. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When the accusers stood up, they brought no charge in his case of such evils as I supposed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rather they '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:15
      metadata:
        usfm: ACT.18.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:29
      metadata:
        usfm: ACT.23.29
    marker-yv: yv-n
  - type: text
    text: 'had certain points of dispute with him about their own religion and about '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:18
      metadata:
        usfm: ACT.17.18
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'a certain Jesus, who was dead, but whom Paul asserted to be alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Being at a loss how to investigate these questions, I '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: ACT.25.9
    marker-yv: yv-n
  - type: text
    text: 'asked whether he wanted to go to Jerusalem and be tried there regarding them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: ACT.11
    marker-yv: yv-n
  - type: text
    text: 'when Paul had appealed to be kept in custody for the decision of '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: ACT.25.25
    marker-yv: yv-n
  - type: text
    text: 'the emperor, I ordered him to be held until I could send him to Caesar.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:15
      metadata:
        usfm: ACT.9.15
    marker-yv: yv-n
  - type: text
    text: Agrippa said to Festus, “I would like to hear the man myself.” “Tomorrow,” said he, “you will hear him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So on the next day '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: ACT.25.13
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:30
      metadata:
        usfm: ACT.26.30
    marker-yv: yv-n
  - type: text
    text: 'Agrippa and Bernice came with great pomp, and they entered the audience hall with the military tribunes and the prominent men of the city. Then, at the command of Festus, Paul was brought in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Festus said, “King Agrippa and all who are present with us, you see this man about whom '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2, 7
      metadata:
        usfm: ACT.25.2
    marker-yv: yv-n
  - type: text
    text: 'the whole Jewish people petitioned me, both in Jerusalem and here, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:22
      metadata:
        usfm: ACT.22.22
    marker-yv: yv-n
  - type: text
    text: 'shouting that he ought not to live any longer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But I found that '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:29
      metadata:
        usfm: ACT.23.29
    marker-yv: yv-n
  - type: text
    text: 'he had done nothing deserving death. And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11, 12
      metadata:
        usfm: ACT.25.11
    marker-yv: yv-n
  - type: text
    text: 'as he himself appealed to '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: ACT.25.21
    marker-yv: yv-n
  - type: text
    text: 'the emperor, I decided to go ahead and send him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But I have nothing definite to write to my lord about him. Therefore I have brought him before you all, and especially before you, King Agrippa, so that, after we have examined him, I may have something to write. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For it seems to me unreasonable, in sending a prisoner, not to indicate the charges against him.”
