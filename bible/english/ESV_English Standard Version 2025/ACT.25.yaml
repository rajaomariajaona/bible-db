      children:
      - type: text
        text: Matt. 27:19
      metadata:
        usfm: MAT.27.19
    marker-yv: yv-n
  - type: text
    text: 'the tribunal and ordered Paul to be brought. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When he had arrived, the Jews who had come down from Jerusalem stood around him, bringing many and serious charges against him '
