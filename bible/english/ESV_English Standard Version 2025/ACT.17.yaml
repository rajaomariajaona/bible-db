document_id: ACT.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and Silas in Thessalonica
  - type: text
    content: 'Now when they had passed through Amphipolis and Apollonia, they came to '
  - type: note
    content: ch. 20:4; Phil. 4:16; 1 Thess. 1:1
  - type: text
    content: 'Thessalonica, where there was a synagogue of the Jews. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ver. 14 ; See John 21:23
  - type: text
    content: The brothers
  - type: note
    content: Or brothers and sisters; also verse 14
  - type: text
    content: ' immediately sent Paul and Silas away by night to Berea, and when they arrived they '
  - type: note
    content: ver. 2
  - type: text
    content: 'went into the Jewish synagogue. '
  '11':
  - type: text
    content: 'Now these Jews were more noble than those in Thessalonica; they received the word with all eagerness, '
  - type: note
    content: '[Isa. 34:16; John 5:39]'
  - type: text
    content: 'examining the Scriptures daily to see if these things were so. '
  '12':
  - type: note
    content: ver. 4
  - type: text
    content: 'Many of them therefore believed, with not a few Greek '
  - type: note
    content: ch. 13:50
  - type: text
    content: 'women of high standing as well as men. '
  '13':
  - type: text
    content: 'But when the Jews from Thessalonica learned that the word of God was proclaimed by Paul at Berea also, they came there too, '
  - type: note
    content: ver. 8
  - type: text
    content: 'agitating and stirring up the crowds. '
  '14':
  - type: text
    content: 'Then the brothers '
  - type: note
    content: ver. 10; See Matt. 10:23
  - type: text
    content: 'immediately sent Paul off on his way to the sea, but Silas and '
  - type: note
    content: See ch. 16:1
  - type: text
    content: 'Timothy remained there. '
  '15':
  - type: note
    content: '[ch. 15:3]'
  - type: text
    content: 'Those who conducted Paul brought him as far as '
  - type: note
    content: ch. 18:1; 1 Thess. 3:1
  - type: text
    content: 'Athens, and after receiving a command '
  - type: note
    content: ch. 18:5
  - type: text
    content: for Silas and Timothy to come to him as soon as possible, they departed.
  - type: heading
    content: Paul in Athens
  '16':
  - type: text
    content: 'Now while Paul was waiting for them at Athens, his spirit was '
  - type: note
    content: '[2 Pet. 2:8]'
  - type: text
    content: 'provoked within him as he saw that the city was '
  - type: note
    content: '[Isa. 2:8]'
  - type: text
    content: 'full of idols. '
  '17':
  - type: text
    content: 'So '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'he reasoned in the synagogue with the Jews and the devout persons, and in the marketplace every day with those who happened to be there. '
  '18':
  - type: text
    content: 'Some of the Epicurean and Stoic philosophers also conversed with him. And some said, '
  - type: note
    content: '[1 Cor. 4:10]'
  - type: text
    content: '“What does this babbler wish to say?” Others said, “He seems to be a preacher of foreign divinities”—because '
  - type: note
    content: See ch. 5:42
  - type: text
    content: 'he was preaching '
  - type: note
    content: ver. 31, 32; ch. 4:2; [1 Cor. 15:12]
  - type: text
    content: 'Jesus and the resurrection. '
  '19':
  - type: text
    content: 'And they took him and brought him to '
  - type: note
    content: ver. 22; [ver. 34]
  - type: text
    content: 'the Areopagus, saying, “May we know what this '
  - type: note
    content: Mark 1:27; [John 7:16; Heb. 13:9]
  - type: text
    content: 'new teaching is that you are presenting? '
  '2':
  - type: text
    content: 'And Paul went in, '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'as was his custom, and on three Sabbath days he reasoned with them '
  - type: note
    content: See ch. 8:35
  - type: text
    content: 'from the Scriptures, '
  '20':
  - type: text
    content: 'For you bring some '
  - type: note
    content: 1 Pet. 4:4, 12; [Hos. 8:12]
  - type: text
    content: 'strange things to our ears. We wish to know therefore what these things mean.” '
  '21':
  - type: text
    content: Now all the Athenians and the foreigners who lived there would spend their time in nothing except telling or hearing something new.
  - type: heading
    content: Paul Addresses the Areopagus
  '22':
  - type: text
    content: 'So Paul, standing in the midst of the Areopagus, said: “Men of Athens, I perceive that in every way you are very religious. '
  '23':
  - type: text
    content: 'For as I passed along and observed the objects of your worship, I found also an altar with this inscription: '
  - type: note
    content: '[John 4:22; 1 Cor. 15:34]'
  - type: text
    content: '‘To the unknown god.’ '
  - type: note
    content: '[John 4:22; 1 Cor. 15:34]'
  - type: text
    content: 'What therefore you worship '
  - type: note
    content: '[ver. 30]'
  - type: text
    content: 'as unknown, this I proclaim to you. '
  '24':
  - type: note
    content: Isa. 42:5; See ch. 14:15
  - type: text
    content: 'The God who made the world and everything in it, being '
  - type: note
    content: Matt. 11:25; [Deut. 10:14; Ps. 115:16]
  - type: text
    content: 'Lord of heaven and earth, '
  - type: note
    content: See ch. 7:48
  - type: text
    content: does not live in temples made by man,
  - type: note
    content: Greek made by hands
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'nor is he served by human hands, '
  - type: note
    content: Ps. 50:8-12; [1 Chr. 29:14, 16; Job 22:2]
  - type: text
    content: 'as though he needed anything, since he himself '
  - type: note
    content: 1 Tim. 6:17; James 1:5, 17
  - type: text
    content: 'gives to all mankind '
  - type: note
    content: Gen. 2:7; 7:22; Job 33:4; [Job 27:3; Eccles. 12:7; Zech. 12:1]; See ver. 28
  - type: text
    content: 'life and breath and everything. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: '[Gen. 3:20; Mal. 2:10]'
  - type: text
    content: 'he made from one man every nation of mankind to live '
  - type: note
    content: Gen. 11:8; Luke 21:35
  - type: text
    content: 'on all the face of the earth, '
  - type: note
    content: '[Job 12:23; 14:5]'
  - type: text
    content: 'having determined allotted periods and '
  - type: note
    content: Deut. 32:8; [Ps. 74:17]
  - type: text
    content: 'the boundaries of their dwelling place, '
  '27':
  - type: note
    content: '[ch. 15:17]'
  - type: text
    content: 'that they should seek God, '
  - type: note
    content: '[Job 23:3, 8, 9]'
  - type: text
    content: 'and perhaps feel their way toward him and find him. '
  - type: note
    content: '[Deut. 4:7; Ps. 145:18; Jer. 23:23, 24]; See ch. 14:17'
  - type: text
    content: 'Yet he is actually not far from each one of us, '
  '28':
  - type: text
    content: for
  - type: note
    content: Job 12:10; Dan. 5:23; [ Heb. 2:11 ]
  - type: text
    content: “‘In him we live and move and have our being’;
  - type: note
    content: Probably from Epimenides of Crete
  - type: text
    content: 'as even some of '
  - type: note
    content: '[Titus 1:12]'
  - type: text
    content: your own poets have said,
  - type: text
    content: “‘For we are indeed his offspring.’
  - type: note
    content: From Aratus’s poem “Phainomena”
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 3:38; Heb. 12:9 ]'
  - type: text
    content: 'Being then God’s offspring, '
  - type: note
    content: Isa. 40:18, 19, 25; 46:5; [Rom. 1:23]
  - type: text
    content: 'we ought not to think that the divine being is like gold or silver or stone, an image formed by the art and imagination of man. '
  '3':
  - type: note
    content: Luke 24:26, 32
  - type: text
    content: 'explaining and proving that it was necessary for '
  - type: note
    content: See ch. 3:18
  - type: text
    content: 'the Christ to suffer and '
  - type: note
    content: See John 20:9
  - type: text
    content: 'to rise from the dead, and saying, “This Jesus, whom I proclaim to you, is the Christ.” '
  '30':
  - type: note
    content: Eph. 4:18; 1 Pet. 1:14; [ver. 23]
  - type: text
    content: 'The times of ignorance '
  - type: note
    content: '[Rom. 3:25]; See ch. 14:16'
  - type: text
    content: 'God overlooked, but '
  - type: note
    content: '[Mark 1:15; Titus 2:11, 12; 1 Pet. 4:3]'
  - type: text
    content: 'now he '
  - type: note
    content: Mark 6:12
  - type: text
    content: 'commands all people everywhere to repent, '
  '31':
  - type: text
    content: 'because he has fixed '
  - type: note
    content: Matt. 12:36; Rom. 2:16; 1 Cor. 3:13; 2 Pet. 2:9; 1 John 4:17; [Isa. 2:12]
  - type: text
    content: 'a day on which '
  - type: note
    content: 2 Tim. 4:8; See ch. 10:42
  - type: text
    content: 'he will judge the world '
  - type: note
    content: Ps. 9:8; 96:13; 98:9; 1 Pet. 2:23; [Rom. 3:6]
  - type: text
    content: 'in righteousness by a man whom he has appointed; and '
  - type: note
    content: '[John 16:10, 11; Rom. 1:4]'
  - type: text
    content: 'of this he has given assurance to all '
  - type: note
    content: See ch. 2:24
  - type: text
    content: by raising him from the dead.”
  '32':
  - type: text
    content: 'Now when they heard of '
  - type: note
    content: Heb. 6:2; See ver. 18
  - type: text
    content: 'the resurrection of the dead, '
  - type: note
    content: '[ch. 2:13; 26:8]'
  - type: text
    content: 'some mocked. But others said, '
  - type: note
    content: ch. 24:25
  - type: text
    content: '“We will hear you again about this.” '
  '33':
  - type: text
    content: 'So Paul went out from their midst. '
  '34':
  - type: text
    content: 'But some men joined him and believed, among whom also were Dionysius '
  - type: note
    content: ver. 19, 22
  - type: text
    content: the Areopagite and a woman named Damaris and others with them.
  '4':
  - type: text
    content: 'And '
  - type: note
    content: '[1 Thess. 2:1, 2]; See ch. 14:4'
  - type: text
    content: 'some of them were persuaded and joined Paul and Silas, as did '
  - type: note
    content: ver. 12
  - type: text
    content: 'a great many of the devout '
  - type: note
    content: See John 7:35
  - type: text
    content: 'Greeks and not a few of the leading women. '
  '5':
  - type: note
    content: 1 Thess. 2:14-16; See ch. 13:50
  - type: text
    content: But the Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verse 13
  - type: text
    content: ' '
  - type: note
    content: See ch. 5:17
  - type: text
    content: 'were jealous, and taking '
  - type: note
    content: '[Judg. 9:4; 11:3; 2 Chr. 13:7]'
  - type: text
    content: 'some wicked men of the rabble, they formed a mob, set the city in an uproar, and attacked the house of Jason, seeking to bring them out to the crowd. '
  '6':
  - type: text
    content: 'And when they could not find them, '
  - type: note
    content: ch. 16:19-21
  - type: text
    content: 'they dragged Jason and some of the brothers before the city authorities, shouting, “These men who have turned the world upside down have come here also, '
  '7':
  - type: text
    content: 'and Jason has received them, and they are all acting against '
  - type: note
    content: ch. 16:4; Luke 2:1
  - type: text
    content: 'the decrees of Caesar, saying that there is '
  - type: note
    content: See Luke 23:2
  - type: text
    content: 'another king, Jesus.” '
  '8':
  - type: text
    content: 'And the people and the city authorities were disturbed when they heard these things. '
  '9':
  - type: text
    content: And when they had taken money as security from Jason and the rest, they let them go.
  - type: heading
    content: Paul and Silas in Berea
