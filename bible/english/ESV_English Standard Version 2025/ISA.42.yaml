document_id: ISA.42,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Chosen Servant
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 12:18-20
  - type: text
    content: 'Behold '
  - type: note
    content: ch. 41:8; 43:10; 52:13; 53:11; [ver. 19; Ezek. 34:24; Zech. 3:8; Acts 3:26; 4:27; Phil. 2:7]
  - type: text
    content: my servant, whom I uphold,
  - type: text
    content: 'my chosen, '
  - type: note
    content: Matt. 3:17
  - type: text
    content: in whom my soul delights;
  - type: note
    content: ch. 11:2; 61:1
  - type: text
    content: I have put my Spirit upon him;
  - type: note
    content: '[ch. 2:4 ]'
  - type: text
    content: he will bring forth justice to the nations.
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 33:3
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a new song,'
  - type: text
    content: his praise from the end of the earth,
  - type: note
    content: Ps. 107:23
  - type: text
    content: you who go down to the sea, and all that fills it,
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: the coastlands and their inhabitants.
  '11':
  - type: text
    content: Let the desert and its cities lift up their voice,
  - type: text
    content: 'the villages that '
  - type: note
    content: See ch. 21:16
  - type: text
    content: Kedar inhabits;
  - type: text
    content: 'let the habitants of '
  - type: note
    content: ch. 16:1
  - type: text
    content: Sela sing for joy,
  - type: text
    content: let them shout from the top of the mountains.
  '12':
  - type: text
    content: 'Let them give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and declare his praise in '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: the coastlands.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 40:10
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' goes out like a mighty man,'
  - type: text
    content: 'like a man of war '
  - type: note
    content: '[ch. 9:7; 59:17]'
  - type: text
    content: he stirs up his zeal;
  - type: text
    content: 'he cries out, '
  - type: note
    content: Ps. 78:65
  - type: text
    content: he shouts aloud,
  - type: text
    content: he shows himself mighty against his foes.
  '14':
  - type: text
    content: For a long time I have held my peace;
  - type: text
    content: I have kept still and restrained myself;
  - type: text
    content: 'now I will cry out '
  - type: note
    content: See ch. 13:8
  - type: text
    content: like a woman in labor;
  - type: text
    content: I will gasp and pant.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 50:2
  - type: text
    content: I will lay waste mountains and hills,
  - type: text
    content: and dry up all their vegetation;
  - type: text
    content: I will turn the rivers into islands,
  - type: note
    content: Or into coastlands
  - type: text
    content: and dry up the pools.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:5, 8
  - type: text
    content: And I will lead the blind
  - type: text
    content: in a way that they do not know,
  - type: text
    content: in paths that they have not known
  - type: text
    content: I will guide them.
  - type: text
    content: I will turn the darkness before them into light,
  - type: note
    content: ch. 40:4
  - type: text
    content: the rough places into level ground.
  - type: text
    content: These are the things I do,
  - type: text
    content: and I do not forsake them.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:29; 44:11; 45:16; Ps. 97:7
  - type: text
    content: They are turned back and utterly put to shame,
  - type: text
    content: who trust in carved idols,
  - type: text
    content: who say to metal images,
  - type: text
    content: “You are our gods.”
  - type: heading
    content: Israel’s Failure to Hear and See
  '18':
  - type: text
    content: Hear, you deaf,
  - type: text
    content: and look, you blind, that you may see!
  '19':
  - type: text
    content: Who is blind but my servant,
  - type: text
    content: or deaf as my messenger whom I send?
  - type: text
    content: Who is blind as my dedicated one,
  - type: note
    content: Or as the one at peace with me
  - type: text
    content: 'or blind as the servant of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '2':
  - type: text
    content: He will not cry aloud or lift up his voice,
  - type: text
    content: or make it heard in the street;
  '20':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 2:21-23
  - type: text
    content: He sees many things, but does not observe them;
  - type: note
    content: '[ Jer. 6:10 ]'
  - type: text
    content: his ears are open, but he does not hear.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was pleased, for his righteousness’ sake,'
  - type: text
    content: to magnify his law and make it glorious.
  '22':
  - type: text
    content: But this is a people plundered and looted;
  - type: text
    content: they are all of them trapped in holes
  - type: note
    content: ch. 14:17
  - type: text
    content: and hidden in prisons;
  - type: text
    content: they have become plunder with none to rescue,
  - type: text
    content: spoil with none to say, “Restore!”
  '23':
  - type: text
    content: Who among you will give ear to this,
  - type: text
    content: will attend and listen for the time to come?
  '24':
  - type: text
    content: Who gave up Jacob to the looter,
  - type: text
    content: and Israel to the plunderers?
  - type: text
    content: 'Was it not the '
  - type: text
    content: Lord
  - type: text
    content: ', against whom we have sinned,'
  - type: text
    content: in whose ways they would not walk,
  - type: text
    content: and whose law they would not obey?
  '25':
  - type: text
    content: So he poured on him the heat of his anger
  - type: text
    content: and the might of battle;
  - type: text
    content: 'it set him on fire all around, '
  - type: note
    content: '[ch. 47:11; Hos. 7:9]'
  - type: text
    content: but he did not understand;
  - type: text
    content: 'it burned him up, '
  - type: note
    content: ch. 57:1, 11
  - type: text
    content: but he did not take it to heart.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 57:15 ]'
  - type: text
    content: a bruised reed he will not break,
  - type: text
    content: and a faintly burning wick he will not quench;
  - type: note
    content: Ps. 9:8
  - type: text
    content: he will faithfully bring forth justice.
  '4':
  - type: text
    content: He will not grow faint or be discouraged
  - type: note
    content: Or bruised
  - type: text
    content: till he has established justice in the earth;
  - type: text
    content: 'and '
  - type: note
    content: ch. 60:9; Gen. 10:5; [ch. 2:3; Matt. 12:21]
  - type: text
    content: the coastlands wait for his law.
  '5':
  - type: text
    content: 'Thus says God, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'who created the heavens '
  - type: note
    content: ch. 44:24; 45:12
  - type: text
    content: and stretched them out,
  - type: text
    content: who spread out the earth and what comes from it,
  - type: note
    content: Acts 17:25
  - type: text
    content: who gives breath to the people on it
  - type: text
    content: 'and spirit to those who walk in it:'
  '6':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: ch. 41:9
  - type: text
    content: I have called you
  - type: note
    content: The Hebrew for you is singular; four times in this verse
  - type: text
    content: ' in righteousness;'
  - type: text
    content: I will take you by the hand and keep you;
  - type: text
    content: 'I will give you '
  - type: note
    content: ch. 49:6, 8
  - type: text
    content: as a covenant for the people,
  - type: note
    content: Luke 2:32
  - type: text
    content: a light for the nations,
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:5; 49:9; 61:1; Heb. 2:14, 15
  - type: text
    content: to open the eyes that are blind,
  - type: text
    content: to bring out the prisoners from the dungeon,
  - type: note
    content: Luke 1:79
  - type: text
    content: from the prison those who sit in darkness.
  '8':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ; that is my name;
  - type: note
    content: ch. 48:11
  - type: text
    content: my glory I give to no other,
  - type: text
    content: nor my praise to carved idols.
  '9':
  - type: text
    content: Behold, the former things have come to pass,
  - type: note
    content: '[ch. 43:19 ]'
  - type: text
    content: and new things I now declare;
  - type: text
    content: before they spring forth
  - type: text
    content: I tell you of them.”
  - type: heading
    content: Sing to the Lord a New Song
