document_id: 2CO.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Defends His Ministry
  - type: text
    content: ' '
  - type: note
    content: See Rom. 12:1
  - type: text
    content: 'I, Paul, myself entreat you, by the '
  - type: note
    content: Zech. 9:9; Matt. 11:29; Phil. 2:7, 8
  - type: text
    content: 'meekness and gentleness of Christ—I who am humble when face to face with you, but bold toward you when I am away!— '
  '10':
  - type: text
    content: 'For they say, “His letters are weighty and strong, but '
  - type: note
    content: ch. 11:21; [ch. 12:7]
  - type: text
    content: 'his bodily presence is weak, and '
  - type: note
    content: See 1 Cor. 1:17
  - type: text
    content: 'his speech of no account.” '
  '11':
  - type: text
    content: 'Let such a person understand that what we say by letter when absent, we do when present. '
  '12':
  - type: text
    content: 'Not that we dare to classify or '
  - type: note
    content: 1 Cor. 2:13
  - type: text
    content: 'compare ourselves with some of those who '
  - type: note
    content: ver. 18; ch. 3:1; 12:6; [Prov. 27:2]
  - type: text
    content: 'are commending themselves. But when they measure themselves by one another and compare themselves with one another, they are '
  - type: note
    content: '[Prov. 26:12]'
  - type: text
    content: without understanding.
  '13':
  - type: text
    content: 'But we will not boast '
  - type: note
    content: ver. 15
  - type: text
    content: 'beyond limits, but will '
  - type: note
    content: See Rom. 12:3
  - type: text
    content: 'boast only with regard to the area of influence God assigned to us, '
  - type: note
    content: '[Rom. 15:20]'
  - type: text
    content: 'to reach even to you. '
  '14':
  - type: text
    content: 'For we are not overextending ourselves, as though we did not reach you. '
  - type: note
    content: 1 Cor. 3:5; 4:15; 9:1
  - type: text
    content: 'For we were the first to come all the way to you with the gospel of Christ. '
  '15':
  - type: text
    content: 'We do not boast beyond limit in the labors of others. But our hope is that '
  - type: note
    content: 2 Thess. 1:3
  - type: text
    content: 'as your faith increases, our area of influence among you may be '
  - type: note
    content: '[Acts 5:13]'
  - type: text
    content: 'greatly enlarged, '
  '16':
  - type: text
    content: 'so that we may preach the gospel in lands beyond you, without boasting of work already done in another’s area of influence. '
  '17':
  - type: text
    content: '“Let '
  - type: note
    content: 1 Cor. 1:31; [Jer. 9:23, 24]
  - type: text
    content: 'the one who boasts, boast in the Lord.” '
  '18':
  - type: text
    content: 'For it is '
  - type: note
    content: See ver. 12
  - type: text
    content: 'not the one who commends himself who is approved, but the one '
  - type: note
    content: Rom. 2:29; 1 Cor. 4:5
  - type: text
    content: whom the Lord commends.
  '2':
  - type: text
    content: 'I beg of you '
  - type: note
    content: ch. 13:2, 10; 1 Cor. 4:18, 21
  - type: text
    content: 'that when I am present I may not have to show '
  - type: note
    content: ver. 6
  - type: text
    content: 'boldness with such confidence as I count on showing against some who suspect us of walking according to the flesh. '
  '3':
  - type: text
    content: 'For though we walk in the flesh, we are not waging war according to the flesh. '
  '4':
  - type: text
    content: 'For the '
  - type: note
    content: ch. 6:7; [Eph. 6:11; 1 Thess. 5:8]
  - type: text
    content: 'weapons of '
  - type: note
    content: See 1 Cor. 9:7
  - type: text
    content: 'our warfare are not of the flesh but have '
  - type: note
    content: ch. 13:3, 4; See 1 Cor. 2:5
  - type: text
    content: 'divine power '
  - type: note
    content: Jer. 1:10
  - type: text
    content: 'to destroy strongholds. '
  '5':
  - type: text
    content: 'We destroy arguments and '
  - type: note
    content: '[Isa. 2:11, 12]'
  - type: text
    content: 'every lofty opinion raised against the knowledge of God, and take every thought captive to '
  - type: note
    content: ch. 9:13; [Rom. 5:19]
  - type: text
    content: 'obey Christ, '
  '6':
  - type: note
    content: See ver. 2
  - type: text
    content: 'being ready to punish every disobedience, '
  - type: note
    content: ch. 2:9; 7:15
  - type: text
    content: when your obedience is complete.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 5:12; John 7:24 ]'
  - type: text
    content: 'Look at what is before your eyes. '
  - type: note
    content: '[1 Cor. 1:12; 14:37; 1 John 4:6]'
  - type: text
    content: 'If anyone is confident that he is Christ’s, let him remind himself that just as '
  - type: note
    content: 1 Cor. 3:23
  - type: text
    content: 'he is Christ’s, '
  - type: note
    content: '[ch. 11:23; 1 Cor. 9:1; Gal. 1:12]'
  - type: text
    content: 'so also are we. '
  '8':
  - type: text
    content: 'For even if I boast a little too much of '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'our authority, which the Lord gave for building you up and not for destroying you, I will not be ashamed. '
  '9':
  - type: text
    content: 'I do not want to appear to be frightening you with my letters. '
