document_id: 2TI.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Godlessness in the Last Days
  - type: text
    content: 'But understand this, that '
  - type: note
    content: See 1 Tim. 4:1
  - type: text
    content: 'in the last days there will come times of difficulty. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Phil. 2:22 ]'
  - type: text
    content: 'You, however, have followed my teaching, my conduct, my aim in life, my faith, my patience, my love, my steadfastness, '
  '11':
  - type: text
    content: 'my persecutions and sufferings that happened to me '
  - type: note
    content: Acts 13:14, 45, 50
  - type: text
    content: 'at Antioch, '
  - type: note
    content: Acts 14:1, 2, 5
  - type: text
    content: 'at Iconium, and '
  - type: note
    content: Acts 14:6, 19
  - type: text
    content: 'at Lystra—which persecutions I endured; yet '
  - type: note
    content: Ps. 34:19
  - type: text
    content: 'from them all '
  - type: note
    content: ch. 4:17; [2 Cor. 1:10]
  - type: text
    content: 'the Lord rescued me. '
  '12':
  - type: text
    content: 'Indeed, all who desire to '
  - type: note
    content: Titus 2:12
  - type: text
    content: 'live a godly life in Christ Jesus '
  - type: note
    content: See Acts 14:22
  - type: text
    content: 'will be persecuted, '
  '13':
  - type: text
    content: 'while '
  - type: note
    content: '[Rev. 22:11]'
  - type: text
    content: 'evil people and impostors will go on from bad to worse, deceiving and '
  - type: note
    content: Titus 3:3
  - type: text
    content: 'being deceived. '
  '14':
  - type: text
    content: 'But as for you, '
  - type: note
    content: '[1 Tim. 4:6]'
  - type: text
    content: continue in what you have learned and have firmly believed, knowing from whom
  - type: note
    content: The Greek for whom is plural
  - type: text
    content: ' you learned it '
  '15':
  - type: text
    content: 'and how '
  - type: note
    content: '[Eph. 6:4]; See ch. 1:5'
  - type: text
    content: 'from childhood you have been acquainted with '
  - type: note
    content: '[John 5:39]'
  - type: text
    content: 'the sacred writings, '
  - type: note
    content: Ps. 119:99
  - type: text
    content: 'which are able to make you wise for salvation through faith in Christ Jesus. '
  '16':
  - type: note
    content: Rom. 15:4; 2 Pet. 1:20, 21
  - type: text
    content: 'All Scripture is breathed out by God and profitable for teaching, for reproof, for correction, and for training in righteousness, '
  '17':
  - type: text
    content: 'that '
  - type: note
    content: See 1 Tim. 6:11
  - type: text
    content: the man of God
  - type: note
    content: That is, a messenger of God (the phrase echoes a common Old Testament expression)
  - type: text
    content: ' may be complete, '
  - type: note
    content: '[Luke 6:40]'
  - type: text
    content: 'equipped '
  - type: note
    content: See ch. 2:21
  - type: text
    content: for every good work.
  '2':
  - type: text
    content: 'For people will be '
  - type: note
    content: '[Phil. 2:21]'
  - type: text
    content: 'lovers of self, '
  - type: note
    content: Luke 16:14; [1 Tim. 6:10]
  - type: text
    content: 'lovers of money, '
  - type: note
    content: Rom. 1:30
  - type: text
    content: 'proud, '
  - type: note
    content: Rom. 1:30
  - type: text
    content: 'arrogant, abusive, '
  - type: note
    content: Rom. 1:30
  - type: text
    content: 'disobedient to their parents, ungrateful, unholy, '
  '3':
  - type: note
    content: Rom. 1:31
  - type: text
    content: 'heartless, unappeasable, slanderous, without self-control, brutal, '
  - type: note
    content: '[Titus 1:8]'
  - type: text
    content: 'not loving good, '
  '4':
  - type: text
    content: 'treacherous, reckless, '
  - type: note
    content: 1 Tim. 3:6; 6:4
  - type: text
    content: 'swollen with conceit, '
  - type: note
    content: Phil. 3:19
  - type: text
    content: 'lovers of pleasure rather than lovers of God, '
  '5':
  - type: text
    content: 'having the appearance of godliness, but '
  - type: note
    content: See 1 Tim. 5:8
  - type: text
    content: 'denying its power. '
  - type: note
    content: 1 Tim. 6:20; [Titus 1:14]
  - type: text
    content: 'Avoid such people. '
  '6':
  - type: text
    content: 'For among them are '
  - type: note
    content: '[Titus 1:11]'
  - type: text
    content: 'those who creep into households and capture weak women, burdened with sins and led astray by various passions, '
  '7':
  - type: text
    content: 'always learning and never able to '
  - type: note
    content: 1 Tim. 2:4
  - type: text
    content: 'arrive at a knowledge of the truth. '
  '8':
  - type: text
    content: 'Just as '
  - type: note
    content: Ex. 7:11
  - type: text
    content: 'Jannes and Jambres '
  - type: note
    content: '[Acts 13:8]'
  - type: text
    content: 'opposed Moses, so these men also oppose the truth, '
  - type: note
    content: See 1 Tim. 6:5
  - type: text
    content: 'men corrupted in mind and '
  - type: note
    content: Titus 1:16
  - type: text
    content: 'disqualified regarding the faith. '
  '9':
  - type: text
    content: 'But they will not get very far, for their folly will be plain to all, '
  - type: note
    content: Ex. 7:12; 8:18; 9:11
  - type: text
    content: as was that of those two men.
  - type: heading
    content: All Scripture Is Breathed Out by God
