        marker: fr
        children:
        - type: text
          text: '17:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soul
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 22
      marker-yv: yv-n
    - type: text
      text: ' come into him again.” '
  '22':
  - type: usfm
