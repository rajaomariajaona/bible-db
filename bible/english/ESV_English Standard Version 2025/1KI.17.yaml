          text: Acts 20:10
      marker-yv: yv-n
    - type: text
      text: 'Then he stretched himself upon the child three times and cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
