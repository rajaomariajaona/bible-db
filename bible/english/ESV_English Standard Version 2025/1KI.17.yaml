document_id: 1KI.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Predicts a Drought
  - type: text
    content: 'Now Elijah the Tishbite, of '
  - type: note
    content: '[Judg. 12:4]'
  - type: text
    content: Tishbe
  - type: note
    content: Septuagint; Hebrew of the settlers
  - type: text
    content: ' in Gilead, said to Ahab, '
  - type: note
    content: ch. 18:10, 15; 22:14; 2 Kgs. 3:14; 5:16; See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, lives, '
  - type: note
    content: ch. 18:15; [Deut. 10:8]
  - type: text
    content: 'before whom I stand, '
  - type: note
    content: Luke 4:25; James 5:17; [ch. 18:1]
  - type: text
    content: 'there shall be neither dew nor rain these years, except by my word.” '
  '10':
  - type: text
    content: 'So he arose and went to '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Zarephath. And when he came to the gate of the city, behold, a widow was there '
  - type: note
    content: Num. 15:32, 33
  - type: text
    content: 'gathering sticks. And he called to her and said, “Bring me a little water in a vessel, that I may drink.” '
  '11':
  - type: text
    content: 'And as she was going to bring it, he called to her and said, “Bring me a morsel of bread in your hand.” '
  '12':
  - type: text
    content: 'And she said, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' your God lives, I have nothing baked, only a handful of flour in a jar and a little oil in a jug. And now I am gathering a couple of sticks that I may go in and prepare it for myself and my son, that we may eat it and die.” '
  '13':
  - type: text
    content: 'And Elijah said to her, “Do not fear; go and do as you have said. But first make me a little cake of it and bring it to me, and afterward make something for yourself and your son. '
  '14':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, ‘The jar of flour shall not be spent, and the jug of oil shall not be empty, until the day that the '
  - type: text
    content: Lord
  - type: text
    content: ' sends rain upon the earth.’” '
  '15':
  - type: text
    content: 'And she went and did as Elijah said. And she and he and her household ate for many days. '
  '16':
  - type: text
    content: 'The jar of flour was not spent, neither did the jug of oil become empty, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he spoke by Elijah.'
  - type: heading
    content: Elijah Raises the Widow’s Son
  '17':
  - type: text
    content: 'After this the son of the woman, the mistress of the house, became ill. And his illness was so severe that there was no breath left in him. '
  '18':
  - type: text
    content: 'And she said to Elijah, '
  - type: note
    content: '[Luke 4:34; 5:8]'
  - type: text
    content: '“What have you against me, O '
  - type: note
    content: See Deut. 33:1
  - type: text
    content: 'man of God? You have come to me to bring my sin to remembrance and to cause the death of my son!” '
  '19':
  - type: text
    content: 'And he said to her, “Give me your son.” And he took him from her arms and carried him up into the upper chamber where he lodged, and laid him on his own bed. '
  '2':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: '
  '20':
  - type: text
    content: 'And he cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, have you brought calamity even upon the widow with whom I sojourn, by killing her son?” '
  '21':
  - type: note
    content: 2 Kgs. 4:34, 35; Acts 20:10
  - type: text
    content: 'Then he stretched himself upon the child three times and cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, let this child’s life'
  - type: note
    content: Or soul; also verse 22
  - type: text
    content: ' come into him again.” '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to the voice of Elijah. And the life of the child came into him again, and '
  - type: note
    content: '[Heb. 11:35]'
  - type: text
    content: 'he revived. '
  '23':
  - type: text
    content: 'And Elijah took the child and brought him down from the upper chamber into the house and delivered him to his mother. And Elijah said, “See, your son lives.” '
  '24':
  - type: text
    content: 'And the woman said to Elijah, '
  - type: note
    content: '[John 3:2]'
  - type: text
    content: '“Now I know that you are a man of God, and that the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' in your mouth is truth.”'
  '3':
  - type: text
    content: '“Depart from here and turn eastward and hide yourself by the brook Cherith, which is east of the Jordan. '
  '4':
  - type: text
    content: 'You shall drink from the brook, and I have commanded the ravens to feed you there.” '
  '5':
  - type: text
    content: 'So he went and did according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. He went and lived by the brook Cherith that is east of the Jordan. '
  '6':
  - type: text
    content: 'And the ravens brought him bread and meat in the morning, and bread and meat in the evening, and he drank from the brook. '
  '7':
  - type: text
    content: And after a while the brook dried up, because there was no rain in the land.
  - type: heading
    content: The Widow of Zarephath
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him, '
  '9':
  - type: text
    content: '“Arise, go to '
  - type: note
    content: Obad. 20; Luke 4:26
  - type: text
    content: 'Zarephath, which belongs to Sidon, and dwell there. Behold, I have commanded a widow there to feed you.” '
