    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Arise, go to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Obad. 20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
