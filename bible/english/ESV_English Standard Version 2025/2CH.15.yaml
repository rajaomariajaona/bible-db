  - type: text
    text: The Spirit of God came
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: was
    marker-yv: yv-n
  - type: text
    text: ' upon Azariah the son of Oded, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he went out to meet Asa and said to him, “Hear me, Asa, and all Judah and Benjamin: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:17
      metadata:
        usfm: 2CH.20.17
    marker-yv: yv-n
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is with you while you are with him. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 55:6
      metadata:
        usfm: ISA.55.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 29:13
      metadata:
        usfm: JER.29.13
    marker-yv: yv-n
  - type: text
    text: 'If you seek him, he will be found by you, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:5
      metadata:
        usfm: 2CH.12.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:20
      metadata:
        usfm: 2CH.24.20
    marker-yv: yv-n
  - type: text
    text: 'but if you forsake him, he will forsake you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 3:4
      metadata:
        usfm: HOS.3.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'For a long time Israel was without the true God, and without a teaching priest and without law, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 4:30
      metadata:
        usfm: DEU.4.30
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: DEU.4.31
    marker-yv: yv-n
  - type: text
    text: 'but when in their distress they turned to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, and sought him, he was found by them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In those times there was no peace '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 5:6
      metadata:
        usfm: JDG.5.6
    marker-yv: yv-n
  - type: text
    text: 'to him who went out or to him who came in, for great disturbances afflicted all the inhabitants of the lands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They were broken in pieces. Nation was crushed by nation and city by city, for God troubled them with every sort of distress. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 1:6
      metadata:
        usfm: JOS.1.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: JOS.1.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: JOS.1.9
    marker-yv: yv-n
  - type: text
    text: 'But you, take courage! Do not let your hands be weak, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:1
      metadata:
        usfm: GEN.15.1
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 62:12
      metadata:
        usfm: PSA.62.12
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: for your work shall be rewarded.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'As soon as Asa heard these words, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1'
      metadata:
        usfm: 2CH.15.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the prophecy of Azariah the son of Oded, he took courage and put away the detestable idols from all the land of Judah and Benjamin and from '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:2
      metadata:
        usfm: 2CH.17.2
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:19
      metadata:
        usfm: 2CH.13.19
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the cities that he had taken in '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 24:33
      metadata:
        usfm: JOS.24.33
    marker-yv: yv-n
  - type: text
    text: 'the hill country of Ephraim, and he repaired the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:12
      metadata:
        usfm: 2CH.8.12
    marker-yv: yv-n
  - type: text
    text: 'that was in front of the vestibule of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'the vestibule of the '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Lord
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he gathered all Judah and Benjamin, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:16
      metadata:
        usfm: 2CH.11.16
    marker-yv: yv-n
  - type: text
    text: 'and those from Ephraim, Manasseh, and Simeon who were residing with them, for great numbers had deserted to him from Israel when they saw that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God was with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They were gathered at Jerusalem in the third month of the fifteenth year of the reign of Asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They sacrificed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on that day '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:13-15
      metadata:
        usfm: 2CH.14.13+2CH.14.14+2CH.14.15
    marker-yv: yv-n
  - type: text
    text: 'from the spoil that they had brought 700 oxen and 7,000 sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:10
      metadata:
        usfm: 2CH.29.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:31
      metadata:
        usfm: 2CH.34.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Kgs. 23:3
      metadata:
        usfm: 2KI.23.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Neh. 10:29
      metadata:
        usfm: NEH.10.29
    marker-yv: yv-n
  - type: text
    text: 'And they entered into a covenant to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their fathers, with all their heart and with all their soul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'but that whoever would not seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 13:6-9
      metadata:
        usfm: DEU.13.6+DEU.13.7+DEU.13.8+DEU.13.9
    marker-yv: yv-n
  - type: text
    text: 'should be put to death, whether young or old, man or woman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They swore an oath to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with a loud voice and with shouting and with trumpets and with horns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And all Judah rejoiced over the oath, for they had sworn with all their heart and had sought him with their whole desire, and he was found by them, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:7
      metadata:
        usfm: 2CH.14.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:30
      metadata:
        usfm: 2CH.20.30
    marker-yv: yv-n
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them rest all around.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 16-18, see '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 15:13-15
      metadata:
        usfm: 1KI.15.13+1KI.15.14+1KI.15.15
    marker-yv: yv-n
  - type: text
    text: 'Even Maacah, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 15:2
      metadata:
        usfm: 1KI.15.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: 1KI.15.10
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'his mother, King Asa removed from being queen mother because she had made a detestable image '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 34:13
      metadata:
        usfm: EXO.34.13
    marker-yv: yv-n
  - type: text
    text: 'for Asherah. Asa cut down her image, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:14
      metadata:
        usfm: 2CH.30.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Kgs. 23:6
      metadata:
        usfm: 2KI.23.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 2KI.23.15
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'crushed it, and burned it at the brook Kidron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:3
      metadata:
        usfm: 2CH.14.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: 2CH.14.5
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'But the high places were not taken out of Israel. Nevertheless, the heart of Asa was wholly true all his days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he brought into the house of God the sacred gifts of his father and his own sacred gifts, silver, and gold, and vessels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And there was no more war until the thirty-fifth year of the reign of Asa.
