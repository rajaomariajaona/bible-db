document_id: 2CH.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa’s Religious Reforms
  - type: text
    content: ' '
  - type: note
    content: ch. 20:14; 24:20; Num. 24:2; Judg. 3:10; [ver. 8 ]
  - type: text
    content: The Spirit of God came
  - type: note
    content: Or was
  - type: text
    content: ' upon Azariah the son of Oded, '
  '10':
  - type: text
    content: 'They were gathered at Jerusalem in the third month of the fifteenth year of the reign of Asa. '
  '11':
  - type: text
    content: 'They sacrificed to the '
  - type: text
    content: Lord
  - type: text
    content: ' on that day '
  - type: note
    content: See ch. 14:13-15
  - type: text
    content: 'from the spoil that they had brought 700 oxen and 7,000 sheep. '
  '12':
  - type: note
    content: ch. 29:10; 34:31; 2 Kgs. 23:3; Neh. 10:29
  - type: text
    content: 'And they entered into a covenant to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, with all their heart and with all their soul, '
  '13':
  - type: text
    content: 'but that whoever would not seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: See Deut. 13:6-9
  - type: text
    content: 'should be put to death, whether young or old, man or woman. '
  '14':
  - type: text
    content: 'They swore an oath to the '
  - type: text
    content: Lord
  - type: text
    content: ' with a loud voice and with shouting and with trumpets and with horns. '
  '15':
  - type: text
    content: 'And all Judah rejoiced over the oath, for they had sworn with all their heart and had sought him with their whole desire, and he was found by them, '
  - type: note
    content: ch. 14:7; 20:30
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest all around.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: For ver. 16-18, see 1 Kgs. 15:13-15
  - type: text
    content: 'Even Maacah, '
  - type: note
    content: '[1 Kgs. 15:2, 10]'
  - type: text
    content: 'his mother, King Asa removed from being queen mother because she had made a detestable image '
  - type: note
    content: Ex. 34:13
  - type: text
    content: 'for Asherah. Asa cut down her image, '
  - type: note
    content: '[ch. 30:14; 2 Kgs. 23:6, 15]'
  - type: text
    content: 'crushed it, and burned it at the brook Kidron. '
  '17':
  - type: note
    content: '[ch. 14:3, 5]'
  - type: text
    content: 'But the high places were not taken out of Israel. Nevertheless, the heart of Asa was wholly true all his days. '
  '18':
  - type: text
    content: 'And he brought into the house of God the sacred gifts of his father and his own sacred gifts, silver, and gold, and vessels. '
  '19':
  - type: text
    content: And there was no more war until the thirty-fifth year of the reign of Asa.
  '2':
  - type: text
    content: 'and he went out to meet Asa and said to him, “Hear me, Asa, and all Judah and Benjamin: '
  - type: note
    content: ch. 20:17
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is with you while you are with him. '
  - type: note
    content: 1 Chr. 28:9; Isa. 55:6; Jer. 29:13
  - type: text
    content: 'If you seek him, he will be found by you, '
  - type: note
    content: ch. 12:5; 24:20
  - type: text
    content: 'but if you forsake him, he will forsake you. '
  '3':
  - type: note
    content: '[Hos. 3:4]'
  - type: text
    content: 'For a long time Israel was without the true God, and without a teaching priest and without law, '
  '4':
  - type: note
    content: Deut. 4:30, 31
  - type: text
    content: 'but when in their distress they turned to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and sought him, he was found by them. '
  '5':
  - type: text
    content: 'In those times there was no peace '
  - type: note
    content: Judg. 5:6
  - type: text
    content: 'to him who went out or to him who came in, for great disturbances afflicted all the inhabitants of the lands. '
  '6':
  - type: text
    content: 'They were broken in pieces. Nation was crushed by nation and city by city, for God troubled them with every sort of distress. '
  '7':
  - type: note
    content: Josh. 1:6, 7, 9
  - type: text
    content: 'But you, take courage! Do not let your hands be weak, '
  - type: note
    content: Gen. 15:1; [Ps. 62:12]
  - type: text
    content: for your work shall be rewarded.”
  '8':
  - type: text
    content: 'As soon as Asa heard these words, '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'the prophecy of Azariah the son of Oded, he took courage and put away the detestable idols from all the land of Judah and Benjamin and from '
  - type: note
    content: ch. 17:2; [ch. 13:19]
  - type: text
    content: 'the cities that he had taken in '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, and he repaired the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 8:12
  - type: text
    content: 'that was in front of the vestibule of the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew the vestibule of the Lord
  '9':
  - type: text
    content: 'And he gathered all Judah and Benjamin, '
  - type: note
    content: ch. 11:16
  - type: text
    content: 'and those from Ephraim, Manasseh, and Simeon who were residing with them, for great numbers had deserted to him from Israel when they saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was with him. '
