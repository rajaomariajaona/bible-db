document_id: EZK.45,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Holy District
  - type: text
    content: '“When '
  - type: note
    content: '[ch. 48:29]; See ch. 47:21, 22'
  - type: text
    content: 'you allot the land as an inheritance, '
  - type: note
    content: See ch. 48:8-10
  - type: text
    content: 'you shall set apart for the '
  - type: text
    content: Lord
  - type: text
    content: ' a portion of the land as a holy district, 25,000 cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters; a long cubit (see 40:5) was about 21 inches or 53 centimeters
  - type: text
    content: ' long and 20,000'
  - type: note
    content: Septuagint; Hebrew 10,000
  - type: text
    content: ' cubits broad. It shall be holy throughout its whole extent. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 19:35, 36
  - type: text
    content: “You shall have just balances, a just ephah, and a just bath.
  - type: note
    content: An ephah was about 3/5 of a bushel or 22 liters; a bath was about 6 gallons or 22 liters
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The ephah and the bath shall be '
  - type: note
    content: '[Deut. 25:14, 15]'
  - type: text
    content: 'of the same measure, '
  - type: note
    content: '[Isa. 5:10]'
  - type: text
    content: the bath containing one tenth of a homer,
  - type: note
    content: A homer was about 6 bushels or 220 liters
  - type: text
    content: ' and the ephah one tenth of a homer; the homer shall be the standard measure. '
  '12':
  - type: note
    content: See Ex. 30:13
  - type: text
    content: The shekel shall be twenty gerahs;
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams; a gerah was about 1/50 ounce or 0.6 gram
  - type: text
    content: ' twenty shekels plus twenty-five shekels plus fifteen shekels shall be your mina.'
  - type: note
    content: A mina was about 1 1/4 pounds or 0.6 kilogram
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 44:30
  - type: text
    content: '“This is the offering that you shall make: one sixth of an ephah from each homer of wheat, and one sixth of an ephah from each homer of barley, '
  '14':
  - type: text
    content: and as the fixed portion of oil, measured in baths, one tenth of a bath from each cor
  - type: note
    content: A cor was about 6 bushels or 220 liters
  - type: text
    content: ' (the cor, like the homer, contains '
  - type: note
    content: ver. 11
  - type: text
    content: ten baths).
  - type: note
    content: See Vulgate; Hebrew (ten baths are a homer, for ten baths are a homer)
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And one sheep from every flock of two hundred, from the watering places of Israel for grain offering, burnt offering, and peace offerings, '
  - type: note
    content: See Lev. 1:4
  - type: text
    content: 'to make atonement for them, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'All the people of the land shall be obliged to give this offering to the prince in Israel. '
  '17':
  - type: note
    content: '[2 Chr. 30:24; 35:7]; See ch. 46:4-7'
  - type: text
    content: 'It shall be the prince’s duty to furnish the burnt offerings, grain offerings, and drink offerings, at the feasts, the new moons, and the Sabbaths, all the appointed feasts of the house of Israel: he shall provide the sin offerings, grain offerings, burnt offerings, and peace offerings, to make atonement on behalf of the house of Israel.'
  '18':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': In the first month, '
  - type: note
    content: '[ch. 46:1, 3, 6]'
  - type: text
    content: 'on the first day of the month, you shall take a bull from the herd without blemish, and '
  - type: note
    content: Lev. 16:16; [ch. 43:20, 22, 23]
  - type: text
    content: 'purify the sanctuary. '
  '19':
  - type: note
    content: See ch. 43:20
  - type: text
    content: 'The priest shall take some of the blood of the sin offering and put it '
  - type: note
    content: '[Ex. 12:7]'
  - type: text
    content: 'on the doorposts of the temple, the four corners of the ledge of the altar, and the posts of the gate of the inner court. '
  '2':
  - type: note
    content: See ch. 42:16-20
  - type: text
    content: 'Of this a square plot of 500 by 500 cubits shall be for the sanctuary, with fifty cubits for '
  - type: note
    content: '[ch. 27:28; 48:15, 17]; See Lev. 25:34'
  - type: text
    content: 'an open space around it. '
  '20':
  - type: text
    content: You shall do the same on the seventh day of the month for anyone who has sinned through error or ignorance; so you shall make atonement for the temple.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 23:5
  - type: text
    content: '“In the first month, on the fourteenth day of the month, you shall celebrate the Feast of the Passover, and for seven days unleavened bread shall be eaten. '
  '22':
  - type: text
    content: 'On that day the prince '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'shall provide for himself and all the people of the land a young bull for a sin offering. '
  '23':
  - type: text
    content: 'And on '
  - type: note
    content: Lev. 23:8
  - type: text
    content: 'the seven days of the festival he shall provide as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' seven young bulls and seven rams without blemish, on each of the seven days; and '
  - type: note
    content: Num. 28:15
  - type: text
    content: 'a male goat daily for a sin offering. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 46:5, 7
  - type: text
    content: 'he shall provide as '
  - type: note
    content: See Lev. 2:1
  - type: text
    content: a grain offering an ephah for each bull, an ephah for each ram, and a hin
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' of oil to each ephah. '
  '25':
  - type: note
    content: See Lev. 23:34
  - type: text
    content: 'In the seventh month, on the fifteenth day of the month and for the seven days of the feast, '
  - type: note
    content: See ver. 22-24
  - type: text
    content: he shall make the same provision for sin offerings, burnt offerings, and grain offerings, and for the oil.
  '3':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'from this measured district you shall measure off a section 25,000 cubits long and 10,000 broad, '
  - type: note
    content: ch. 48:10
  - type: text
    content: 'in which shall be the sanctuary, '
  - type: note
    content: See ch. 41:4
  - type: text
    content: 'the Most Holy Place. '
  '4':
  - type: note
    content: '[ch. 48:11, 12]'
  - type: text
    content: 'It shall be the holy portion of the land. It shall be for the priests, who minister in the sanctuary and approach the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister to him, and it shall be a place for their houses and a holy place for the sanctuary. '
  '5':
  - type: note
    content: ch. 48:13
  - type: text
    content: Another section, 25,000 cubits long and 10,000 cubits broad, shall be for the Levites who minister at the temple, as their possession for cities to live in.
  - type: note
    content: Septuagint; Hebrew as their possession, twenty chambers
  '6':
  - type: text
    content: '“Alongside the portion set apart as the holy district '
  - type: note
    content: ch. 48:15
  - type: text
    content: 'you shall assign for the property of the city an area 5,000 cubits broad and 25,000 cubits long. '
  - type: note
    content: '[ch. 48:18, 19]'
  - type: text
    content: It shall belong to the whole house of Israel.
  - type: heading
    content: The Portion for the Prince
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 48:21
  - type: text
    content: '“And to '
  - type: note
    content: See ch. 44:3
  - type: text
    content: 'the prince shall belong the land on both sides of the holy district and the property of the city, alongside the holy district and the property of the city, on the west and on the east, corresponding in length to one of the tribal portions, and extending from the western to the eastern boundary '
  '8':
  - type: text
    content: 'of the land. It is to be his property in Israel. And '
  - type: note
    content: '[ch. 22:27; 46:18]'
  - type: text
    content: 'my princes shall no more oppress my people, but '
  - type: note
    content: ch. 47:13, 21; See ch. 48:1-7, 23-28
  - type: text
    content: they shall let the house of Israel have the land according to their tribes.
  '9':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 44:6
  - type: text
    content: 'Enough, O princes of Israel! Put away violence and oppression, and execute justice and righteousness. Cease '
  - type: note
    content: '[ch. 46:18]'
  - type: text
    content: 'your evictions of my people, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
