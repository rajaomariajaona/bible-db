    - type: text
      text: '10'
  - type: text
    text: 'And David inquired of God, “Shall I go up against the Philistines? Will you give them into my hand?” And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to him, “Go up, and I will give them into your hand.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And he went up to Baal-perazim, and David struck them down there. And David said, “God has broken through
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:11 '
    - type: usfm
