document_id: 1CH.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Wives and Children
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-16, see 2 Sam. 5:11-25
  - type: text
    content: 'And Hiram king of Tyre sent messengers to David, and cedar trees, also masons and carpenters to build a house for him. '
  '10':
  - type: text
    content: 'And David inquired of God, “Shall I go up against the Philistines? Will you give them into my hand?” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go up, and I will give them into your hand.” '
  '11':
  - type: text
    content: And he went up to Baal-perazim, and David struck them down there. And David said, “God has broken through
  - type: note
    content: Baal-perazim means Lord of breaking through
  - type: text
    content: ' my enemies by my hand, like a bursting flood.” Therefore the name of that place is called Baal-perazim. '
  '12':
  - type: text
    content: And they left their gods there, and David gave command, and they were burned.
  '13':
  - type: text
    content: 'And the Philistines yet again '
  - type: note
    content: ver. 9
  - type: text
    content: 'made a raid in the valley. '
  '14':
  - type: text
    content: 'And when David again inquired of God, '
  - type: note
    content: ver. 16
  - type: text
    content: 'God said to him, “You shall not go up after them; go around and come against them opposite the balsam trees. '
  '15':
  - type: text
    content: 'And when you hear the sound of marching in the tops of the balsam trees, then go out to battle, for God has gone out before you to strike down the army of the Philistines.” '
  '16':
  - type: text
    content: 'And David did as God commanded him, and they struck down the Philistine army from Gibeon to Gezer. '
  '17':
  - type: text
    content: 'And the fame of David went out into all lands, and the '
  - type: text
    content: Lord
  - type: text
    content: ' brought the '
  - type: note
    content: '[Deut. 2:25]'
  - type: text
    content: fear of him upon all nations.
  '2':
  - type: text
    content: 'And David knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' had established him as king over Israel, and that his kingdom was highly exalted for the sake of his people Israel.'
  '3':
  - type: text
    content: 'And David took more wives in Jerusalem, and David fathered more sons and daughters. '
  '4':
  - type: note
    content: For ver. 4-7, see ch. 3:5-8
  - type: text
    content: 'These are the names of the children born to him in Jerusalem: '
  - type: note
    content: '[ch. 3:5]'
  - type: text
    content: 'Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: text
    content: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: text
    content: 'Elishama, '
  - type: note
    content: '[ch. 3:8]'
  - type: text
    content: 'Beeliada and '
  - type: note
    content: 2 Sam. 5:16
  - type: text
    content: Eliphelet.
  - type: heading
    content: Philistines Defeated
  '8':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over all Israel, all the Philistines went up to search for David. But David heard of it and went out against them. '
  '9':
  - type: text
    content: 'Now the Philistines had come and '
  - type: note
    content: ver. 13
  - type: text
    content: 'made a raid in the '
  - type: note
    content: ch. 11:15
  - type: text
    content: 'Valley of Rephaim. '
