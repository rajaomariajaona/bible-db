    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lord of breaking through
    marker-yv: yv-n
  - type: text
    text: ' my enemies by my hand, like a bursting flood.” Therefore the name of that place is called Baal-perazim. '
  - type: usfm
