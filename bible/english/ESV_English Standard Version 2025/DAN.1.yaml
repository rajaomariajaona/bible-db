document_id: DAN.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel Taken to Babylon
  - type: text
    content: 'In the third year of '
  - type: note
    content: 2 Kgs. 24:1, 2; 2 Chr. 36:6
  - type: text
    content: 'the reign of Jehoiakim king of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged it. '
  '10':
  - type: text
    content: 'and the chief of the eunuchs said to Daniel, “I fear my lord the king, who assigned your food and your drink; for why should he see that you were in worse condition than the youths who are of your own age? So you would endanger my head with the king.” '
  '11':
  - type: text
    content: 'Then Daniel said to the steward whom the chief of the eunuchs had assigned over Daniel, Hananiah, Mishael, and Azariah, '
  '12':
  - type: text
    content: '“Test your servants for '
  - type: note
    content: '[Rev. 2:10]'
  - type: text
    content: 'ten days; let us be given vegetables to eat and water to drink. '
  '13':
  - type: text
    content: 'Then let our appearance and the appearance of the youths who eat '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the king’s food be observed by you, and deal with your servants according to what you see.” '
  '14':
  - type: text
    content: 'So he listened to them in this matter, and tested them for ten days. '
  '15':
  - type: text
    content: 'At the end of ten days it was seen that they were better in appearance and fatter in flesh than all the youths who ate '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the king’s food. '
  '16':
  - type: note
    content: ver. 11
  - type: text
    content: 'So the steward took away their food and the wine they were to drink, and gave them '
  - type: note
    content: ver. 12
  - type: text
    content: vegetables.
  '17':
  - type: text
    content: 'As for these four youths, '
  - type: note
    content: '[ch. 2:20, 23; Job 32:8; James 1:5]'
  - type: text
    content: 'God gave them learning and '
  - type: note
    content: ver. 4
  - type: text
    content: 'skill in all literature and wisdom, and Daniel had '
  - type: note
    content: ch. 5:12; [ch. 9:23; 10:1, 11, 12]
  - type: text
    content: 'understanding in all visions and dreams. '
  '18':
  - type: text
    content: 'At the end of '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'the time, when the king had commanded that they should be brought in, the chief of the eunuchs brought them in before Nebuchadnezzar. '
  '19':
  - type: text
    content: 'And the king spoke with them, and among all of them none was found like Daniel, Hananiah, Mishael, and Azariah. Therefore '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'they stood before the king. '
  '2':
  - type: text
    content: 'And the Lord gave Jehoiakim king of Judah into his hand, with some of '
  - type: note
    content: ch. 5:2; 2 Kgs. 24:13; 2 Chr. 36:7, 10; [Jer. 27:18]
  - type: text
    content: 'the vessels of the house of God. And he brought them to '
  - type: note
    content: Gen. 11:2; Zech. 5:11
  - type: text
    content: 'the land of Shinar, to the house of his god, '
  - type: note
    content: 2 Chr. 36:7; Ezra 5:14
  - type: text
    content: 'and placed the vessels in the treasury of his god. '
  '20':
  - type: text
    content: 'And in every matter of wisdom and understanding about which the king inquired of them, he found them ten times better than all '
  - type: note
    content: '[ch. 2:27; Gen. 41:8, 24; Ex. 7:11, 22; 8:7, 18, 19; 9:11]'
  - type: text
    content: 'the magicians and '
  - type: note
    content: ch. 2:2, 10, 27; 4:7; 5:7, 11, 15
  - type: text
    content: 'enchanters that were in all his kingdom. '
  '21':
  - type: text
    content: 'And Daniel '
  - type: note
    content: '[ch. 6:28; 10:1]'
  - type: text
    content: 'was there until the first year of '
  - type: note
    content: See ch. 6:28
  - type: text
    content: King Cyrus.
  '3':
  - type: text
    content: 'Then the king commanded Ashpenaz, '
  - type: note
    content: '[2 Kgs. 20:18; Isa. 39:7]'
  - type: text
    content: his chief eunuch, to bring some of the people of Israel, both of the royal family
  - type: note
    content: Hebrew of the seed of the kingdom
  - type: text
    content: ' and of '
  - type: note
    content: Esth. 1:3
  - type: text
    content: 'the nobility, '
  '4':
  - type: text
    content: 'youths without '
  - type: note
    content: '[Lev. 24:19, 20; 2 Sam. 14:25]'
  - type: text
    content: 'blemish, of good appearance and '
  - type: note
    content: '[ver. 17; ch. 9:22]'
  - type: text
    content: 'skillful in all wisdom, endowed with knowledge, understanding learning, and competent to stand in the king’s palace, and to '
  - type: note
    content: '[Isa. 47:10]'
  - type: text
    content: 'teach them the literature and language of the '
  - type: note
    content: ch. 2:2, 4, 5, 10; 3:8; 4:7; 5:7, 11
  - type: text
    content: 'Chaldeans. '
  '5':
  - type: text
    content: 'The king assigned them a daily portion of '
  - type: note
    content: ch. 11:26
  - type: text
    content: 'the food that the king ate, and of '
  - type: note
    content: ver. 8, 16
  - type: text
    content: 'the wine that he drank. They were to be educated for '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: 'three years, and at the end of that time they were to '
  - type: note
    content: '[ch. 2:2; 1 Kgs. 10:8]; See Gen. 41:46'
  - type: text
    content: 'stand before the king. '
  '6':
  - type: text
    content: 'Among these were '
  - type: note
    content: Ezek. 14:14, 20; Matt. 24:15
  - type: text
    content: 'Daniel, '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'Hananiah, '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'Mishael, and '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'Azariah of the tribe of Judah. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the chief of the eunuchs '
  - type: note
    content: '[2 Kgs. 23:34; 24:17]'
  - type: text
    content: 'gave them names: '
  - type: note
    content: ch. 2:26; 4:8, 9, 18, 19; 5:12; 10:1
  - type: text
    content: Daniel he called Belteshazzar, Hananiah he called Shadrach, Mishael he called Meshach, and Azariah he called Abednego.
  - type: heading
    content: Daniel’s Faithfulness
  '8':
  - type: text
    content: 'But Daniel '
  - type: note
    content: 2 Cor. 9:7
  - type: text
    content: 'resolved that he would not '
  - type: note
    content: '[Lev. 3:17; Ezek. 4:13; Hos. 9:3]'
  - type: text
    content: 'defile himself with '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the king’s food, or with '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the wine that he drank. Therefore he asked the chief of the eunuchs to allow him not to '
  - type: note
    content: '[Lev. 3:17; Ezek. 4:13; Hos. 9:3]'
  - type: text
    content: 'defile himself. '
  '9':
  - type: note
    content: '[Gen. 39:21; Ps. 106:46; Prov. 16:7]'
  - type: text
    content: 'And God gave Daniel favor and compassion in the sight of the chief of the eunuchs, '
