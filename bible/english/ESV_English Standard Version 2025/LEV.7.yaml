document_id: LEV.7,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: See ch. 5:1–6:7
  - type: text
    content: '“This is the law of the '
  - type: note
    content: ver. 37
  - type: text
    content: 'guilt offering. '
  - type: note
    content: ch. 6:17, 25
  - type: text
    content: 'It is most holy. '
  '10':
  - type: text
    content: And every grain offering, mixed with oil or dry, shall be shared equally among all the sons of Aaron.
  '11':
  - type: text
    content: '“And this is the law of the sacrifice of peace offerings that one may offer to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'If he offers it for a thanksgiving, then he shall offer with the thanksgiving sacrifice '
  - type: note
    content: ch. 2:4; Num. 6:15
  - type: text
    content: 'unleavened loaves mixed with oil, unleavened wafers smeared with oil, and loaves of fine flour '
  - type: note
    content: ch. 6:21
  - type: text
    content: 'well mixed with oil. '
  '13':
  - type: note
    content: Amos 4:5
  - type: text
    content: 'With the sacrifice of his peace offerings for thanksgiving he shall bring his offering with loaves of leavened bread. '
  '14':
  - type: text
    content: 'And from it he shall offer one loaf from each offering, as a '
  - type: note
    content: Ex. 29:27, 28
  - type: text
    content: 'gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Num. 18:8, 11, 19
  - type: text
    content: 'It shall belong to the priest who throws the blood of the peace offerings. '
  '15':
  - type: text
    content: 'And the flesh of the sacrifice of his peace offerings '
  - type: note
    content: ch. 22:29, 30
  - type: text
    content: 'for thanksgiving shall be eaten on the day of his offering. He shall not leave any of it until the morning. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: ch. 19:6-8; 22:21
  - type: text
    content: 'if the sacrifice of his offering is a vow offering or a freewill offering, it shall be eaten on the day that he offers his sacrifice, and on the next day what remains of it shall be eaten. '
  '17':
  - type: text
    content: 'But what remains of the flesh of the sacrifice on the third day shall be burned up with fire. '
  '18':
  - type: text
    content: 'If any of the flesh of the sacrifice of his peace offering is eaten on the third day, he who offers it shall not be accepted, neither shall it be credited to him. It is '
  - type: note
    content: ch. 19:7
  - type: text
    content: tainted, and he who eats of it shall bear his iniquity.
  '19':
  - type: text
    content: '“Flesh that touches any unclean thing shall not be eaten. It shall be burned up with fire. All who are clean may eat flesh, '
  '2':
  - type: note
    content: ch. 6:25
  - type: text
    content: 'In the place where they kill the burnt offering they shall kill the guilt offering, and its blood shall be thrown against the sides of the altar. '
  '20':
  - type: text
    content: 'but the person who eats of the flesh of the sacrifice of the '
  - type: text
    content: Lord
  - type: text
    content: '’s peace offerings '
  - type: note
    content: ch. 15:3; 22:3
  - type: text
    content: 'while an uncleanness is on him, that person shall be cut off from his people. '
  '21':
  - type: text
    content: 'And if anyone touches an unclean thing, whether '
  - type: note
    content: See ch. 12; ch. 13; ch. 15
  - type: text
    content: 'human uncleanness or an '
  - type: note
    content: See ch. 11:24-28
  - type: text
    content: 'unclean beast or any '
  - type: note
    content: See ch. 11:10-23
  - type: text
    content: 'unclean detestable creature, and then eats some flesh from the sacrifice of the '
  - type: text
    content: Lord
  - type: text
    content: ’s peace offerings, that person shall be cut off from his people.”
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '23':
  - type: text
    content: '“Speak to the people of Israel, saying, '
  - type: note
    content: ch. 3:16, 17
  - type: text
    content: 'You shall eat no fat, of ox or sheep or goat. '
  '24':
  - type: text
    content: 'The fat of an animal '
  - type: note
    content: ch. 17:15; 22:8; Ex. 22:31; Deut. 14:21; Ezek. 4:14; 44:31
  - type: text
    content: 'that dies of itself and the fat of one that is torn by beasts may be put to any other use, but on no account shall you eat it. '
  '25':
  - type: text
    content: 'For every person who eats of the fat of an animal of which a food offering may be made to the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be cut off from his people. '
  '26':
  - type: text
    content: 'Moreover, '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'you shall eat no blood whatever, whether of fowl or of animal, in any of your dwelling places. '
  '27':
  - type: text
    content: Whoever eats any blood, that person shall be cut off from his people.”
  '28':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '29':
  - type: text
    content: '“Speak to the people of Israel, saying, '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'Whoever offers the sacrifice of his peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' shall bring his offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' from the sacrifice of his peace offerings. '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: ch. 3:3, 4, 9, 10, 14-16; 4:8, 9; Ex. 29:13, 22
  - type: text
    content: 'all its fat shall be offered, the fat tail, the fat that covers the entrails, '
  '30':
  - type: note
    content: ch. 3:3, 4, 9, 14
  - type: text
    content: 'His own hands shall bring the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings. He shall bring the fat with '
  - type: note
    content: See Ex. 29:24
  - type: text
    content: 'the breast, that the breast may be waved as a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: note
    content: ch. 3:5, 11, 16
  - type: text
    content: 'The priest shall burn the fat on the altar, but '
  - type: note
    content: '[ch. 9:21; Num. 6:20]'
  - type: text
    content: 'the breast shall be for Aaron and his sons. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 31above]'
  - type: text
    content: 'the right thigh you shall give to the priest as a contribution from the sacrifice of your peace offerings. '
  '33':
  - type: text
    content: 'Whoever among the sons of Aaron offers the blood of the peace offerings and the fat shall have the right thigh for a portion. '
  '34':
  - type: text
    content: 'For the breast that is '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'waved and the thigh that is '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'contributed I have taken from the people of Israel, out of the sacrifices of their peace offerings, and '
  - type: note
    content: Ex. 29:28; Num. 18:18, 19
  - type: text
    content: 'have given them to Aaron the priest and to his sons, as a perpetual due from the people of Israel. '
  '35':
  - type: text
    content: 'This is the portion of Aaron and of his sons from the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings, from the day they were presented to serve as priests of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded this to be given them by the people of Israel, '
  - type: note
    content: ch. 8:12, 30; Ex. 40:13-15
  - type: text
    content: from the day that he anointed them. It is a perpetual due throughout their generations.”
  '37':
  - type: text
    content: 'This is the law '
  - type: note
    content: ch. 6:9, 14, 25
  - type: text
    content: 'of the burnt offering, of the grain offering, of the sin offering, '
  - type: note
    content: ver. 1
  - type: text
    content: 'of the guilt offering, '
  - type: note
    content: ch. 6:20; Ex. 29:1
  - type: text
    content: 'of the ordination offering, and '
  - type: note
    content: ver. 11
  - type: text
    content: 'of the peace offering, '
  '38':
  - type: text
    content: 'which the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses on Mount Sinai, on the day that he commanded the people of Israel '
  - type: note
    content: ch. 1:2
  - type: text
    content: 'to bring their offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', in the wilderness of Sinai.'
  '4':
  - type: text
    content: 'the two kidneys with the fat that is on them at the loins, and the long lobe of the liver that he shall remove '
  - type: note
    content: ch. 3:4
  - type: text
    content: 'with the kidneys. '
  '5':
  - type: text
    content: 'The priest shall burn them on the altar as a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '; it is a guilt offering. '
  '6':
  - type: note
    content: ch. 6:18, 29
  - type: text
    content: 'Every male among the priests may eat of it. It shall be eaten in a holy place. '
  - type: note
    content: ver. 1
  - type: text
    content: 'It is most holy. '
  '7':
  - type: text
    content: 'The '
  - type: note
    content: ch. 6:25, 26; 14:13
  - type: text
    content: 'guilt offering is just like the sin offering; there is one law for them. The priest who makes atonement with it shall have it. '
  '8':
  - type: text
    content: 'And the priest who offers any man’s burnt offering shall have for himself the skin of the burnt offering that he has offered. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: ch. 2:3, 10; Num. 18:9; Ezek. 44:29
  - type: text
    content: 'every grain offering baked '
  - type: note
    content: ch. 2:7
  - type: text
    content: 'in the oven and all that is prepared '
  - type: note
    content: ch. 2:5; 6:21
  - type: text
    content: 'on a pan or a griddle shall belong to the priest who offers it. '
