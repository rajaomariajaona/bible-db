document_id: 1TI.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Some Will Depart from the Faith
  - type: text
    content: 'Now '
  - type: note
    content: See John 14:17
  - type: text
    content: 'the Spirit expressly says that '
  - type: note
    content: '[2 Thess. 2:3-9; 2 Tim. 3:1]; See 1 Cor. 11:19'
  - type: text
    content: 'in later times some will depart from the faith by devoting themselves to '
  - type: note
    content: 1 John 4:6 (Gk.); See Matt. 7:15
  - type: text
    content: 'deceitful spirits and teachings of demons, '
  '10':
  - type: text
    content: For to this end we toil and strive,
  - type: note
    content: Some manuscripts and suffer reproach
  - type: text
    content: ' because we have our hope set on the living God, '
  - type: note
    content: See ch. 2:4; John 4:42
  - type: text
    content: who is the Savior of all people, especially of those who believe.
  '11':
  - type: text
    content: 'Command and teach '
  - type: note
    content: ch. 5:7; 6:2
  - type: text
    content: 'these things. '
  '12':
  - type: note
    content: 1 Cor. 16:11; [2 Tim. 2:22; Titus 2:15]
  - type: text
    content: 'Let no one despise you for your youth, but set the believers '
  - type: note
    content: Titus 2:7; 1 Pet. 5:3
  - type: text
    content: 'an example in speech, in conduct, in love, in faith, in purity. '
  '13':
  - type: text
    content: 'Until I come, devote yourself to the public reading of Scripture, to exhortation, to teaching. '
  '14':
  - type: note
    content: See 1 Thess. 5:19
  - type: text
    content: 'Do not neglect the gift you have, which was given you '
  - type: note
    content: ch. 1:18
  - type: text
    content: 'by prophecy when the council of elders '
  - type: note
    content: See Acts 6:6
  - type: text
    content: 'laid their hands on you. '
  '15':
  - type: text
    content: Practice these things, immerse yourself in them,
  - type: note
    content: Greek be in them
  - type: text
    content: ' so that '
  - type: note
    content: Phil. 1:12
  - type: text
    content: 'all may see your progress. '
  '16':
  - type: note
    content: '[Acts 20:28]'
  - type: text
    content: 'Keep a close watch on yourself and on the teaching. Persist in this, for by so doing you will save '
  - type: note
    content: Ezek. 33:9
  - type: text
    content: 'both yourself and '
  - type: note
    content: See Rom. 11:14
  - type: text
    content: your hearers.
  '2':
  - type: text
    content: 'through the insincerity of '
  - type: note
    content: '[1 Thess. 2:3; 2 Thess. 2:11]'
  - type: text
    content: 'liars whose consciences are seared, '
  '3':
  - type: note
    content: '[Dan. 11:37; Heb. 13:4]'
  - type: text
    content: 'who forbid marriage and '
  - type: note
    content: See Col. 2:16
  - type: text
    content: 'require abstinence from foods '
  - type: note
    content: Gen. 1:29; 9:3
  - type: text
    content: 'that God created '
  - type: note
    content: See Rom. 14:6
  - type: text
    content: 'to be received with thanksgiving by those who believe and know the truth. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: Gen. 1:31
  - type: text
    content: 'everything created by God is good, and '
  - type: note
    content: See Acts 10:15
  - type: text
    content: 'nothing is to be rejected if it is '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'received with thanksgiving, '
  '5':
  - type: text
    content: 'for it is made holy '
  - type: note
    content: Gen. 1:25, 31
  - type: text
    content: by the word of God and prayer.
  - type: heading
    content: A Good Servant of Christ Jesus
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Tim. 3:14, 15 ]'
  - type: text
    content: If you put these things before the brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' you will be a good servant of Christ Jesus, being trained in the words of the faith and of the good doctrine that you have '
  - type: note
    content: 2 Tim. 3:10
  - type: text
    content: 'followed. '
  '7':
  - type: text
    content: 'Have nothing to do with irreverent, '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'silly myths. Rather '
  - type: note
    content: Heb. 5:14
  - type: text
    content: 'train yourself for godliness; '
  '8':
  - type: text
    content: 'for while '
  - type: note
    content: '[Col. 2:23]'
  - type: text
    content: 'bodily training is of some value, godliness '
  - type: note
    content: '[ch. 6:6]'
  - type: text
    content: 'is of value in every way, as '
  - type: note
    content: Ps. 37:4, 9, 11; 84:11; 112:2; 145:19; Prov. 19:23; 22:4; Matt. 6:33; Mark 10:30; 1 Pet. 3:9
  - type: text
    content: 'it holds promise for the present life and also for the life to come. '
  '9':
  - type: text
    content: 'The saying is '
  - type: note
    content: See ch. 1:15
  - type: text
    content: 'trustworthy and deserving of full acceptance. '
