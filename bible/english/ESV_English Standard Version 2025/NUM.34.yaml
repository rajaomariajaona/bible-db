document_id: NUM.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Boundaries of the Land
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“You shall draw a line for your eastern border from Hazar-enan to Shepham. '
  '11':
  - type: text
    content: 'And the border shall go down from Shepham to '
  - type: note
    content: 2 Kgs. 23:33; Jer. 39:5
  - type: text
    content: 'Riblah on the east side of Ain. And the border shall go down and reach to the shoulder of '
  - type: note
    content: Deut. 3:17; Josh. 11:2; 12:3; 19:35; Matt. 4:18; Luke 5:1
  - type: text
    content: 'the Sea of Chinnereth on the east. '
  '12':
  - type: text
    content: 'And the border shall go down to the Jordan, and its limit shall be at '
  - type: note
    content: ver. 3
  - type: text
    content: the Salt Sea. This shall be your land as defined by its borders all around.”
  '13':
  - type: text
    content: 'Moses commanded the people of Israel, saying, '
  - type: note
    content: ver. 2; Josh. 14:1, 2
  - type: text
    content: '“This is the land that you shall inherit by lot, which the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded to give to the nine tribes and to the half-tribe. '
  '14':
  - type: note
    content: ch. 32:33; Josh. 14:3
  - type: text
    content: 'For the tribe of the people of Reuben by fathers’ houses and the tribe of the people of Gad by their fathers’ houses have received their inheritance, and also the half-tribe of Manasseh. '
  '15':
  - type: text
    content: The two tribes and the half-tribe have received their inheritance beyond the Jordan east of Jericho, toward the sunrise.”
  - type: heading
    content: List of Tribal Chiefs
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '17':
  - type: text
    content: '“These are the names of the men who shall divide the land to you for inheritance: '
  - type: note
    content: Josh. 14:1; 19:51
  - type: text
    content: 'Eleazar the priest and Joshua the son of Nun. '
  '18':
  - type: text
    content: 'You shall take one '
  - type: note
    content: ch. 1:4, 16
  - type: text
    content: 'chief from every tribe to divide the land for inheritance. '
  '19':
  - type: text
    content: 'These are the names of the men: Of the tribe of Judah, Caleb the son of Jephunneh. '
  '2':
  - type: text
    content: '“Command the people of Israel, and say to them, When you enter '
  - type: note
    content: Gen. 17:8; Ex. 3:8; Ps. 105:11
  - type: text
    content: 'the land of Canaan '
  - type: note
    content: ver. 13
  - type: text
    content: '(this is the land that shall fall to you for an inheritance, the land of Canaan as defined by its borders), '
  '20':
  - type: text
    content: 'Of the tribe of the people of Simeon, Shemuel the son of Ammihud. '
  '21':
  - type: text
    content: 'Of the tribe of Benjamin, Elidad the son of Chislon. '
  '22':
  - type: text
    content: 'Of the tribe of the people of Dan a chief, Bukki the son of Jogli. '
  '23':
  - type: text
    content: 'Of the people of Joseph: of the tribe of the people of Manasseh a chief, Hanniel the son of Ephod. '
  '24':
  - type: text
    content: 'And of the tribe of the people of Ephraim a chief, Kemuel the son of Shiphtan. '
  '25':
  - type: text
    content: 'Of the tribe of the people of Zebulun a chief, Elizaphan the son of Parnach. '
  '26':
  - type: text
    content: 'Of the tribe of the people of Issachar a chief, Paltiel the son of Azzan. '
  '27':
  - type: text
    content: 'And of the tribe of the people of Asher a chief, Ahihud the son of Shelomi. '
  '28':
  - type: text
    content: 'Of the tribe of the people of Naphtali a chief, Pedahel the son of Ammihud.” '
  '29':
  - type: text
    content: 'These are the men whom the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded to divide the inheritance for the people of Israel in the land of Canaan.'
  '3':
  - type: note
    content: Josh. 15:1; See Gen. 15:18-21; Ezek. 47:13-21
  - type: text
    content: 'your south side shall be from the wilderness of Zin alongside Edom, and your southern border shall run from the end of '
  - type: note
    content: ver. 12; Gen. 14:3; Josh. 15:2
  - type: text
    content: 'the Salt Sea on the east. '
  '4':
  - type: text
    content: 'And your border shall turn south of '
  - type: note
    content: Josh. 15:3
  - type: text
    content: 'the ascent of Akrabbim, and cross to Zin, and its limit shall be south of Kadesh-barnea. Then it shall go on to '
  - type: note
    content: Josh. 15:3
  - type: text
    content: 'Hazar-addar, and pass along to Azmon. '
  '5':
  - type: text
    content: 'And the border shall turn '
  - type: note
    content: Josh. 15:4
  - type: text
    content: 'from Azmon to '
  - type: note
    content: Gen. 15:18; Josh. 15:4, 47; 1 Kgs. 8:65; 2 Kgs. 24:7; 1 Chr. 13:5; 2 Chr. 7:8; Isa. 27:12
  - type: text
    content: the Brook of Egypt, and its limit shall be at the sea.
  '6':
  - type: text
    content: “For the western border, you shall have the Great Sea and its
  - type: note
    content: Syriac; Hebrew lacks its
  - type: text
    content: ' coast. This shall be your western border.'
  '7':
  - type: text
    content: '“This shall be your northern border: from the Great Sea you shall draw a line to '
  - type: note
    content: ch. 33:37
  - type: text
    content: 'Mount Hor. '
  '8':
  - type: text
    content: 'From Mount Hor you shall draw a line '
  - type: note
    content: ch. 13:21; 2 Kgs. 14:25; Ezek. 48:1
  - type: text
    content: 'to Lebo-hamath, and the limit of the border shall be at '
  - type: note
    content: Ezek. 47:15
  - type: text
    content: 'Zedad. '
  '9':
  - type: text
    content: 'Then the border shall extend to Ziphron, and its limit shall be at '
  - type: note
    content: Ezek. 47:17
  - type: text
    content: Hazar-enan. This shall be your northern border.
