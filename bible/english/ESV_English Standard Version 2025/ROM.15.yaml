document_id: ROM.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Example of Christ
  - type: text
    content: ' '
  - type: note
    content: '[ Gal. 6:1 ]'
  - type: text
    content: 'We who are strong '
  - type: note
    content: 1 Thess. 5:14; See ch. 14:1
  - type: text
    content: 'have an obligation to bear with the failings of the weak, and not to please ourselves. '
  '10':
  - type: text
    content: And again it says,
  - type: note
    content: Cited from Deut. 32:43
  - type: text
    content: “Rejoice, O Gentiles, with his people.”
  '11':
  - type: text
    content: And again,
  - type: note
    content: Cited from Ps. 117:1
  - type: text
    content: “Praise the Lord, all you Gentiles,
  - type: text
    content: and let all the peoples extol him.”
  '12':
  - type: text
    content: And again Isaiah says,
  - type: note
    content: Cited from Isa. 11:10
  - type: note
    content: Isa. 11:1; [ Rev. 5:5; 22:16 ]
  - type: text
    content: “The root of Jesse will come,
  - type: text
    content: even he who arises to rule the Gentiles;
  - type: note
    content: Matt. 12:21
  - type: text
    content: in him will the Gentiles hope.”
  '13':
  - type: text
    content: 'May the God of hope fill you with all '
  - type: note
    content: '[ch. 5:1, 2; 14:17]'
  - type: text
    content: joy and peace in believing, so that by the power of the Holy Spirit you may abound in hope.
  - type: heading
    content: Paul the Minister to the Gentiles
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Pet. 1:12; 3:1; 1 John 2:21 ]'
  - type: text
    content: I myself am satisfied about you, my brothers,
  - type: note
    content: Or brothers and sisters; also verse 30
  - type: text
    content: ' that you yourselves are full of goodness, filled with '
  - type: note
    content: 1 Cor. 1:5; 13:2; [1 Cor. 8:1, 7, 10; 12:8]
  - type: text
    content: 'all knowledge and able to instruct one another. '
  '15':
  - type: text
    content: 'But on some points I have written to you very boldly by way of reminder, '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'because of the grace given me by God '
  '16':
  - type: text
    content: 'to be '
  - type: note
    content: See ch. 11:13
  - type: text
    content: 'a minister of Christ Jesus to the Gentiles '
  - type: note
    content: '[Mal. 1:11]'
  - type: text
    content: 'in the priestly service of the gospel of God, so that '
  - type: note
    content: Isa. 66:20; [Phil. 2:17]
  - type: text
    content: 'the offering of the Gentiles may be acceptable, sanctified by the Holy Spirit. '
  '17':
  - type: text
    content: 'In Christ Jesus, then, I have '
  - type: note
    content: Phil. 3:3
  - type: text
    content: 'reason to be proud of '
  - type: note
    content: Heb. 2:17; 5:1
  - type: text
    content: 'my work for God. '
  '18':
  - type: text
    content: 'For I will not venture to speak of anything except '
  - type: note
    content: Acts 15:12; 21:19; Gal. 2:8
  - type: text
    content: 'what Christ has accomplished through me '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'to bring the Gentiles to obedience—by word and deed, '
  '19':
  - type: note
    content: 2 Cor. 12:12; [Acts 19:11]
  - type: text
    content: 'by the power of signs and wonders, by the power of the Spirit of God—so that '
  - type: note
    content: Acts 22:17-21
  - type: text
    content: 'from Jerusalem and all the way around '
  - type: note
    content: '[Acts 20:1, 2]'
  - type: text
    content: 'to Illyricum I have fulfilled the ministry of the gospel of Christ; '
  '2':
  - type: note
    content: 1 Cor. 10:33; [1 Cor. 9:19, 22; 10:24; Phil. 2:4]
  - type: text
    content: 'Let each of us please his neighbor for his good, to build him up. '
  '20':
  - type: text
    content: 'and thus I make it my ambition to preach the gospel, not where Christ has already been named, '
  - type: note
    content: '[2 Cor. 10:13, 15, 16]'
  - type: text
    content: 'lest I build on someone else’s foundation, '
  '21':
  - type: text
    content: but as it is written,
  - type: note
    content: Cited from Isa. 52:15
  - type: text
    content: “Those who have never been told of him will see,
  - type: text
    content: and those who have never heard will understand.”
  - type: heading
    content: Paul’s Plan to Visit Rome
  '22':
  - type: text
    content: 'This is the reason why '
  - type: note
    content: ch. 1:13; [1 Thess. 2:18]
  - type: text
    content: 'I have so often been hindered from coming to you. '
  '23':
  - type: text
    content: 'But now, since I no longer have any room for work in these regions, and '
  - type: note
    content: ver. 29, 32; ch. 1:10, 11; Acts 19:21
  - type: text
    content: 'since I have longed for many years to come to you, '
  '24':
  - type: text
    content: 'I hope to see you in passing as I go '
  - type: note
    content: ver. 28
  - type: text
    content: 'to Spain, and '
  - type: note
    content: See Acts 15:3
  - type: text
    content: 'to be helped on my journey there by you, once I have enjoyed your company for a while. '
  '25':
  - type: text
    content: 'At present, however, '
  - type: note
    content: Acts 19:21; 20:22; 21:15; 24:17; [ver. 31]
  - type: text
    content: 'I am going to Jerusalem bringing aid to the saints. '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 16:1-4; 2 Cor. 8:1; 9:2, 13
  - type: text
    content: 'Macedonia and Achaia have been pleased to make some contribution for the poor among the saints at Jerusalem. '
  '27':
  - type: text
    content: 'For they were pleased to do it, and indeed '
  - type: note
    content: 1 Cor. 9:11; [Gal. 6:6]
  - type: text
    content: 'they owe it to them. For if the Gentiles have come to share in their spiritual blessings, they ought also to be of service to them in material blessings. '
  '28':
  - type: text
    content: When therefore I have completed this and have delivered to them what has been collected,
  - type: note
    content: Greek sealed to them this fruit
  - type: text
    content: ' I will leave '
  - type: note
    content: ver. 24
  - type: text
    content: 'for Spain by way of you. '
  '29':
  - type: text
    content: I know that when I come to you I will come in the fullness of the blessing
  - type: note
    content: Some manuscripts insert of the gospel
  - type: text
    content: ' of Christ.'
  '3':
  - type: text
    content: 'For '
  - type: note
    content: Phil. 2:5, 8; [John 5:30; 6:38]
  - type: text
    content: 'Christ did not please himself, but as it is written, '
  - type: note
    content: Cited from Ps. 69:9
  - type: text
    content: '“The reproaches of those who reproached you fell on me.” '
  '30':
  - type: text
    content: 'I appeal to you, brothers, by our Lord Jesus Christ and by '
  - type: note
    content: '[Phil. 2:1; Col. 1:8]'
  - type: text
    content: 'the love of the Spirit, '
  - type: note
    content: Col. 4:12; [2 Cor. 1:11; Col. 2:1, 2; Heb. 13:18]
  - type: text
    content: 'to strive together with me in your prayers to God on my behalf, '
  '31':
  - type: note
    content: 2 Thess. 3:2; [2 Tim. 3:11; 4:17]
  - type: text
    content: 'that I may be delivered from the unbelievers in Judea, and that '
  - type: note
    content: 2 Cor. 8:4
  - type: text
    content: 'my service for Jerusalem may be acceptable to the saints, '
  '32':
  - type: text
    content: 'so that by God’s will I may come to you with joy and '
  - type: note
    content: '[1 Cor. 16:18; 2 Cor. 7:13; Philem. 7, 20]'
  - type: text
    content: 'be refreshed in your company. '
  '33':
  - type: text
    content: 'May '
  - type: note
    content: ch. 16:20; 2 Cor. 13:11; Phil. 4:9; 1 Thess. 5:23; Heb. 13:20; [1 Cor. 14:33; 2 Thess. 3:16]
  - type: text
    content: the God of peace be with you all. Amen.
  '4':
  - type: text
    content: 'For '
  - type: note
    content: ch. 4:23
  - type: text
    content: 'whatever was written in former days was written for our '
  - type: note
    content: 2 Tim. 3:16
  - type: text
    content: 'instruction, that through endurance and through '
  - type: note
    content: Ps. 119:50
  - type: text
    content: 'the encouragement of the Scriptures we might have hope. '
  '5':
  - type: text
    content: 'May the God of endurance and encouragement grant you '
  - type: note
    content: See ch. 12:16
  - type: text
    content: 'to live in such harmony with one another, in accord with Christ Jesus, '
  '6':
  - type: text
    content: 'that together you may with one voice glorify '
  - type: note
    content: 2 Cor. 1:3; Eph. 1:3; 1 Pet. 1:3; [John 20:17; Eph. 1:17; Rev. 1:6]
  - type: text
    content: 'the God and Father of our Lord Jesus Christ. '
  '7':
  - type: text
    content: Therefore welcome one another as Christ has welcomed you, for the glory of God.
  - type: heading
    content: Christ the Hope of Jews and Gentiles
  '8':
  - type: text
    content: 'For I tell you that Christ '
  - type: note
    content: Matt. 15:24; John 1:11; [Heb. 3:1]; See Acts 3:26
  - type: text
    content: 'became a servant to the circumcised to show God’s truthfulness, in order '
  - type: note
    content: '[ch. 4:16; 2 Cor. 1:20]'
  - type: text
    content: 'to confirm the promises given to the patriarchs, '
  '9':
  - type: text
    content: 'and in order '
  - type: note
    content: See ch. 3:29
  - type: text
    content: that the Gentiles might glorify God for his mercy. As it is written,
  - type: note
    content: Cited from 2 Sam. 22:50; Ps. 18:49
  - type: text
    content: “Therefore I will praise you among the Gentiles,
  - type: text
    content: and sing to your name.”
