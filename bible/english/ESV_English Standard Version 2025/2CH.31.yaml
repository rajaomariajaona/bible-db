document_id: 2CH.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Organizes the Priests
  - type: text
    content: 'Now when all this was finished, all Israel who were present went out to the cities of Judah and '
  - type: note
    content: 2 Kgs. 18:4
  - type: text
    content: 'broke in pieces the '
  - type: note
    content: See Deut. 16:22
  - type: text
    content: 'pillars and cut down '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: the Asherim and broke down the high places and the altars throughout all Judah and Benjamin, and in Ephraim and Manasseh, until they had destroyed them all. Then all the people of Israel returned to their cities, every man to his possession.
  '10':
  - type: text
    content: 'Azariah the chief priest, who was '
  - type: note
    content: 1 Chr. 6:8
  - type: text
    content: 'of the house of Zadok, answered him, “Since they began to bring the contributions into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', we have eaten and had enough and have plenty left, '
  - type: note
    content: '[Mal. 3:10]'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed his people, so that we have this large amount left.”'
  '11':
  - type: text
    content: 'Then Hezekiah commanded them to prepare '
  - type: note
    content: 1 Chr. 9:26, 33; [2 Kgs. 23:11; Neh. 10:39]
  - type: text
    content: 'chambers in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and they prepared them. '
  '12':
  - type: text
    content: 'And they faithfully brought in the contributions, the tithes, and the dedicated things. The chief officer '
  - type: note
    content: '[ch. 35:9; Neh. 13:13]'
  - type: text
    content: 'in charge of them was Conaniah the Levite, with '
  - type: note
    content: '[ch. 29:12, 14]'
  - type: text
    content: 'Shimei his brother as second, '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'while Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismachiah, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Mahath, and Benaiah were overseers assisting Conaniah and Shimei his brother, by the appointment of Hezekiah the king and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'Azariah the chief officer of the house of God. '
  '14':
  - type: text
    content: 'And Kore the son of Imnah the Levite, keeper of the east gate, was over the freewill offerings to God, to apportion the contribution reserved for the '
  - type: text
    content: Lord
  - type: text
    content: ' and the most holy offerings. '
  '15':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah were faithfully assisting him in '
  - type: note
    content: See Josh. 21:9-19
  - type: text
    content: 'the cities of the priests, to distribute the portions to their brothers, old and young alike, by divisions, '
  '16':
  - type: text
    content: 'except those enrolled by genealogy, males from three years old and upward—all who entered the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 8:59; Ezra 3:4; Neh. 11:23; 12:47
  - type: text
    content: 'as the duty of each day required—for their service according to their offices, by their divisions. '
  '17':
  - type: text
    content: 'The enrollment of the priests was according to their fathers’ houses; that of the Levites '
  - type: note
    content: 1 Chr. 23:24, 27
  - type: text
    content: 'from twenty years old and upward was according to their offices, by their divisions. '
  '18':
  - type: text
    content: 'They were enrolled with all their little children, their wives, their sons, and their daughters, the whole assembly, for they were faithful in keeping themselves holy. '
  '19':
  - type: text
    content: 'And for the sons of Aaron, the priests, who were in the fields of common land belonging to their cities, there were men in the several cities who were '
  - type: note
    content: '[ch. 28:15; Num. 1:17]; See ver. 12-15'
  - type: text
    content: designated by name to distribute portions to every male among the priests and to everyone among the Levites who was enrolled.
  '2':
  - type: text
    content: 'And Hezekiah appointed '
  - type: note
    content: 1 Chr. 23:6; 24:1
  - type: text
    content: 'the divisions of the priests and of the Levites, division by division, each according to his service, the priests and the Levites, '
  - type: note
    content: 1 Chr. 23:30, 31
  - type: text
    content: 'for burnt offerings and peace offerings, to minister in the gates of the camp of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to give thanks and praise. '
  '20':
  - type: text
    content: 'Thus Hezekiah did throughout all Judah, '
  - type: note
    content: 2 Kgs. 18:3; 20:3
  - type: text
    content: 'and he did what was good and right and faithful before the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '21':
  - type: text
    content: And every work that he undertook in the service of the house of God and in accordance with the law and the commandments, seeking his God, he did with all his heart, and prospered.
  '3':
  - type: note
    content: '[ch. 35:7]'
  - type: text
    content: 'The contribution of the king from his own possessions was for the burnt offerings: the burnt offerings of morning and evening, and the burnt offerings for the Sabbaths, the new moons, and the appointed feasts, '
  - type: note
    content: See Num. 28:3–29:40
  - type: text
    content: 'as it is written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'And he commanded the people who lived in Jerusalem to give '
  - type: note
    content: '[Neh. 13:10]; See Num. 18:8-24'
  - type: text
    content: 'the portion due to the priests and the Levites, that they might give themselves to the Law of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'As soon as the command was spread abroad, the people of Israel gave in abundance the firstfruits of grain, wine, oil, honey, and of all the produce of the field. And they brought in abundantly '
  - type: note
    content: Neh. 13:12
  - type: text
    content: 'the tithe of everything. '
  '6':
  - type: text
    content: 'And the people of Israel and Judah who lived in the cities of Judah also brought in the tithe of cattle and sheep, and '
  - type: note
    content: Lev. 27:30; Deut. 14:28
  - type: text
    content: 'the tithe of the dedicated things that had been dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and laid them in heaps. '
  '7':
  - type: text
    content: 'In the third month they began to pile up the heaps, and finished them in the seventh month. '
  '8':
  - type: text
    content: 'When Hezekiah and the princes came and saw the heaps, they blessed the '
  - type: text
    content: Lord
  - type: text
    content: ' and his people Israel. '
  '9':
  - type: text
    content: 'And Hezekiah questioned the priests and the Levites about the heaps. '
