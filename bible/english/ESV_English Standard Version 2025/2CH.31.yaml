document_id: 2CH.31,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah Organizes the Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when all this was finished, all Israel who were present went out to the cities of Judah and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 18:4
      marker-yv: yv-n
    - type: text
      text: 'broke in pieces the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 16:22
      marker-yv: yv-n
    - type: text
      text: 'pillars and cut down '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 16:21
      marker-yv: yv-n
    - type: text
      text: the Asherim and broke down the high places and the altars throughout all Judah and Benjamin, and in Ephraim and Manasseh, until they had destroyed them all. Then all the people of Israel returned to their cities, every man to his possession.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azariah the chief priest, who was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:8
      marker-yv: yv-n
    - type: text
      text: 'of the house of Zadok, answered him, “Since they began to bring the contributions into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', we have eaten and had enough and have plenty left, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 3:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed his people, so that we have this large amount left.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hezekiah commanded them to prepare '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 9:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 10:39
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'chambers in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and they prepared them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they faithfully brought in the contributions, the tithes, and the dedicated things. The chief officer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 13:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in charge of them was Conaniah the Levite, with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Shimei his brother as second, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'while Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismachiah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Mahath, and Benaiah were overseers assisting Conaniah and Shimei his brother, by the appointment of Hezekiah the king and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Azariah the chief officer of the house of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Kore the son of Imnah the Levite, keeper of the east gate, was over the freewill offerings to God, to apportion the contribution reserved for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the most holy offerings. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah were faithfully assisting him in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 21:9-19
      marker-yv: yv-n
    - type: text
      text: 'the cities of the priests, to distribute the portions to their brothers, old and young alike, by divisions, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'except those enrolled by genealogy, males from three years old and upward—all who entered the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:59
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 3:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 11:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:47
      marker-yv: yv-n
    - type: text
      text: 'as the duty of each day required—for their service according to their offices, by their divisions. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The enrollment of the priests was according to their fathers’ houses; that of the Levites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 23:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      marker-yv: yv-n
    - type: text
      text: 'from twenty years old and upward was according to their offices, by their divisions. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were enrolled with all their little children, their wives, their sons, and their daughters, the whole assembly, for they were faithful in keeping themselves holy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the sons of Aaron, the priests, who were in the fields of common land belonging to their cities, there were men in the several cities who were '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See ver. 12-15'
      marker-yv: yv-n
    - type: text
      text: designated by name to distribute portions to every male among the priests and to everyone among the Levites who was enrolled.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah appointed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 23:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:1
      marker-yv: yv-n
    - type: text
      text: 'the divisions of the priests and of the Levites, division by division, each according to his service, the priests and the Levites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 23:30
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      marker-yv: yv-n
    - type: text
      text: 'for burnt offerings and peace offerings, to minister in the gates of the camp of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to give thanks and praise. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Hezekiah did throughout all Judah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 18:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:3
      marker-yv: yv-n
    - type: text
      text: 'and he did what was good and right and faithful before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And every work that he undertook in the service of the house of God and in accordance with the law and the commandments, seeking his God, he did with all his heart, and prospered.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'The contribution of the king from his own possessions was for the burnt offerings: the burnt offerings of morning and evening, and the burnt offerings for the Sabbaths, the new moons, and the appointed feasts, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: text
        text: Num. 28:3–29:40
      marker-yv: yv-n
    - type: text
      text: 'as it is written in the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he commanded the people who lived in Jerusalem to give '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 13:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Num. 18:8-24'
      marker-yv: yv-n
    - type: text
      text: 'the portion due to the priests and the Levites, that they might give themselves to the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as the command was spread abroad, the people of Israel gave in abundance the firstfruits of grain, wine, oil, honey, and of all the produce of the field. And they brought in abundantly '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 13:12
      marker-yv: yv-n
    - type: text
      text: 'the tithe of everything. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel and Judah who lived in the cities of Judah also brought in the tithe of cattle and sheep, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 27:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 14:28
      marker-yv: yv-n
    - type: text
      text: 'the tithe of the dedicated things that had been dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God, and laid them in heaps. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the third month they began to pile up the heaps, and finished them in the seventh month. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Hezekiah and the princes came and saw the heaps, they blessed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and his people Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah questioned the priests and the Levites about the heaps. '
