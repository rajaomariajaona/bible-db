document_id: LEV.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamps
  - type: text
    content: ' '
  - type: note
    content: Ex. 27:20, 21
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'Now an Israelite woman’s son, whose father was an Egyptian, went out among the people of Israel. And the Israelite woman’s son and a man of Israel fought in the camp, '
  '11':
  - type: text
    content: 'and the Israelite woman’s son '
  - type: note
    content: See ver. 16
  - type: text
    content: 'blasphemed the '
  - type: note
    content: '[Ex. 3:14, 15; Phil. 2:9]'
  - type: text
    content: 'Name, and cursed. Then they '
  - type: note
    content: Ex. 18:22, 26
  - type: text
    content: 'brought him to Moses. His mother’s name was Shelomith, the daughter of Dibri, of the tribe of Dan. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: '[Num. 15:34]'
  - type: text
    content: 'they put him in custody, '
  - type: note
    content: '[Ex. 18:15, 16; Num. 27:5; 36:5, 6]'
  - type: text
    content: 'till the will of the '
  - type: text
    content: Lord
  - type: text
    content: ' should be clear to them.'
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '14':
  - type: note
    content: '[ver. 23]'
  - type: text
    content: '“Bring out of the camp the one who cursed, and let all who heard him '
  - type: note
    content: '[Deut. 13:9; 17:7]'
  - type: text
    content: 'lay their hands on his head, and let all the congregation stone him. '
  '15':
  - type: text
    content: 'And speak to the people of Israel, saying, Whoever curses his God shall '
  - type: note
    content: ch. 5:1; 20:17, 20; 22:9; Num. 9:13; [Ex. 20:7]
  - type: text
    content: 'bear his sin. '
  '16':
  - type: text
    content: 'Whoever '
  - type: note
    content: ver. 11; 1 Kgs. 21:10, 13; Matt. 26:65, 66; Mark 14:63, 64; John 10:33
  - type: text
    content: 'blasphemes the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' shall surely be put to death. All the congregation shall stone him. The sojourner as well as the native, when he blasphemes the Name, shall be put to death.'
  - type: heading
    content: An Eye for an Eye
  '17':
  - type: text
    content: ' '
  - type: note
    content: Gen. 9:5, 6; Ex. 21:12; Num. 35:31; Deut. 19:11, 12
  - type: text
    content: '“Whoever takes a human life shall surely be put to death. '
  '18':
  - type: note
    content: Ex. 21:33, 34
  - type: text
    content: 'Whoever takes an animal’s life shall make it good, life for life. '
  '19':
  - type: text
    content: 'If anyone injures his neighbor, '
  - type: note
    content: Ex. 21:23-25; Deut. 19:21; Matt. 5:38; 7:2
  - type: text
    content: 'as he has done it shall be done to him, '
  '2':
  - type: text
    content: '“Command the people of Israel to bring you pure oil from beaten olives for the lamp, that a light may be kept burning regularly. '
  '20':
  - type: text
    content: 'fracture for fracture, eye for eye, tooth for tooth; whatever injury he has given a person shall be given to him. '
  '21':
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Whoever kills an animal shall make it good, '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'and whoever kills a person shall be put to death. '
  '22':
  - type: text
    content: 'You shall have the '
  - type: note
    content: ch. 19:34; Ex. 12:49; Num. 15:16
  - type: text
    content: 'same rule for the sojourner and for the native, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” '
  '23':
  - type: text
    content: 'So Moses spoke to the people of Israel, and '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'they brought out of the camp the one who had cursed and stoned him with stones. Thus the people of Israel did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'Outside the veil of the testimony, in the tent of meeting, Aaron shall arrange it from evening to morning before the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly. It shall be a statute forever throughout your generations. '
  '4':
  - type: text
    content: 'He shall arrange the lamps on the '
  - type: note
    content: Ex. 31:8; 39:37
  - type: text
    content: lampstand of pure gold
  - type: note
    content: Hebrew the pure lampstand
  - type: text
    content: ' before the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly.'
  - type: heading
    content: Bread for the Tabernacle
  '5':
  - type: text
    content: '“You shall take fine flour and bake twelve '
  - type: note
    content: Ex. 25:30
  - type: text
    content: loaves from it; two tenths of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' shall be in each loaf. '
  '6':
  - type: text
    content: 'And you shall set them in two piles, six in a pile, '
  - type: note
    content: Ex. 25:23, 24; 1 Kgs. 7:48; 2 Chr. 4:19; 13:11; Heb. 9:2
  - type: text
    content: on the table of pure gold
  - type: note
    content: Hebrew the pure table
  - type: text
    content: ' before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And you shall put pure frankincense on each pile, that it may go with the bread as a memorial portion as a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: note
    content: 1 Chr. 9:32; [Num. 4:7; 2 Chr. 2:4]
  - type: text
    content: 'Every Sabbath day Aaron shall arrange it before the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly; it is from the people of Israel as a covenant forever. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 21:6; Matt. 12:4; Mark 2:26; Luke 6:4
  - type: text
    content: 'it shall be for Aaron and his sons, and '
  - type: note
    content: '[ch. 6:16; 8:31; 21:22; Ex. 29:33]'
  - type: text
    content: 'they shall eat it in a holy place, since it is for him a most holy portion out of the '
  - type: text
    content: Lord
  - type: text
    content: ’s food offerings, a perpetual due.”
  - type: heading
    content: Punishment for Blasphemy
