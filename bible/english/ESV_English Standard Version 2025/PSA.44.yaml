document_id: PSA.44,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Come to Our Help
  - type: text
    content: 'To the choirmaster. '
  - type: note
    content: Ps. 42, title
  - type: text
    content: A Maskil
  - type: note
    content: Probably a musical or liturgical term
  - type: text
    content: ' of the Sons of Korah.'
  - type: text
    content: O God, we have heard with our ears,
  - type: note
    content: Ps. 78:3; Ex. 10:2; 12:26, 27; 13:8, 14, 15; Judg. 6:13; See Deut. 6:20-23
  - type: text
    content: our fathers have told us,
  - type: text
    content: what deeds you performed in their days,
  - type: note
    content: See Ps. 77:5
  - type: text
    content: 'in the days of old:'
  '10':
  - type: text
    content: 'You have made us '
  - type: note
    content: Lev. 26:17; Deut. 28:25; Josh. 7:8, 12
  - type: text
    content: turn back from the foe,
  - type: text
    content: and those who hate us have gotten spoil.
  '11':
  - type: text
    content: 'You have made us like '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: sheep for slaughter
  - type: text
    content: 'and have '
  - type: note
    content: Ps. 106:27; Lev. 26:33; Deut. 4:27; 28:64; Isa. 52:3; Ezek. 20:23; [John 7:35; 1 Pet. 1:1]
  - type: text
    content: scattered us among the nations.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 32:30; Judg. 2:14; 3:8; Jer. 15:13 ]'
  - type: text
    content: You have sold your people for a trifle,
  - type: text
    content: demanding no high price for them.
  '13':
  - type: text
    content: 'You have made us '
  - type: note
    content: Ps. 39:8; 79:4; 89:41; 119:22; [Neh. 2:17]
  - type: text
    content: the taunt of our neighbors,
  - type: text
    content: 'the derision and '
  - type: note
    content: '[Ps. 80:6]'
  - type: text
    content: scorn of those around us.
  '14':
  - type: text
    content: 'You have made us '
  - type: note
    content: Jer. 24:9; See Job 17:6
  - type: text
    content: a byword among the nations,
  - type: note
    content: See Job 16:4
  - type: text
    content: a laughingstock
  - type: note
    content: Hebrew a shaking of the head
  - type: text
    content: ' among the peoples.'
  '15':
  - type: text
    content: All day long my disgrace is before me,
  - type: text
    content: 'and '
  - type: note
    content: 2 Chr. 32:21
  - type: text
    content: shame has covered my face
  '16':
  - type: text
    content: at the sound of the taunter and reviler,
  - type: text
    content: 'at the sight of '
  - type: note
    content: Ps. 8:2
  - type: text
    content: the enemy and the avenger.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Dan. 9:13
  - type: text
    content: All this has come upon us,
  - type: text
    content: though we have not forgotten you,
  - type: text
    content: and we have not been false to your covenant.
  '18':
  - type: text
    content: Our heart has not turned back,
  - type: text
    content: 'nor have our '
  - type: note
    content: Ps. 37:31
  - type: text
    content: 'steps '
  - type: note
    content: Ps. 119:51, 157; Job 23:11
  - type: text
    content: departed from your way;
  '19':
  - type: text
    content: 'yet you have '
  - type: note
    content: Ps. 51:8
  - type: text
    content: 'broken us in the place of '
  - type: note
    content: See Job 30:29
  - type: text
    content: jackals
  - type: text
    content: 'and covered us with '
  - type: note
    content: See Job 3:5
  - type: text
    content: the shadow of death.
  '2':
  - type: text
    content: 'you with your own hand '
  - type: note
    content: Ps. 78:55; 80:8; Josh. 3:10
  - type: text
    content: drove out the nations,
  - type: text
    content: 'but '
  - type: note
    content: Ex. 15:17; 2 Sam. 7:10
  - type: text
    content: them you planted;
  - type: text
    content: you afflicted the peoples,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 80:9-11; [Jer. 17:8]
  - type: text
    content: them you set free;
  '20':
  - type: text
    content: If we had forgotten the name of our God
  - type: text
    content: 'or '
  - type: note
    content: Ps. 68:31; Job 11:13
  - type: text
    content: 'spread out our hands to '
  - type: note
    content: See Ps. 81:9
  - type: text
    content: a foreign god,
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps. 139:1; Jer. 17:10
  - type: text
    content: would not God discover this?
  - type: note
    content: '[ John 2:25; Heb. 4:13 ]'
  - type: text
    content: For he knows the secrets of the heart.
  '22':
  - type: text
    content: 'Yet '
  - type: note
    content: ver. 11; Cited Rom. 8:36
  - type: text
    content: for your sake we are killed all the day long;
  - type: text
    content: we are regarded as sheep to be slaughtered.
  '23':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 35:23
  - type: text
    content: Awake! Why are you sleeping, O Lord?
  - type: text
    content: 'Rouse yourself! '
  - type: note
    content: ver. 9
  - type: text
    content: Do not reject us forever!
  '24':
  - type: text
    content: 'Why '
  - type: note
    content: See Job 13:24
  - type: text
    content: do you hide your face?
  - type: text
    content: Why do you forget our affliction and oppression?
  '25':
  - type: text
    content: 'For our '
  - type: note
    content: Ps. 119:25
  - type: text
    content: soul is bowed down to the dust;
  - type: text
    content: our belly clings to the ground.
  '26':
  - type: text
    content: 'Rise up; '
  - type: note
    content: Ps. 63:7
  - type: text
    content: come to our help!
  - type: note
    content: See Ps. 25:22
  - type: text
    content: Redeem us for the sake of your steadfast love!
  '3':
  - type: text
    content: 'for not '
  - type: note
    content: Josh. 24:12; Hos. 1:7
  - type: text
    content: by their own sword did they win the land,
  - type: text
    content: nor did their own arm save them,
  - type: text
    content: but your right hand and your arm,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 4:6
  - type: text
    content: the light of your face,
  - type: note
    content: Deut. 4:37; 7:7, 8; 10:15
  - type: text
    content: for you delighted in them.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps. 74:12
  - type: text
    content: You are my King, O God;
  - type: note
    content: See Ps. 42:8
  - type: text
    content: ordain salvation for Jacob!
  '5':
  - type: text
    content: 'Through you we '
  - type: note
    content: '[Deut. 33:17; Dan. 8:4]'
  - type: text
    content: push down our foes;
  - type: text
    content: 'through your name we '
  - type: note
    content: Ps. 60:12
  - type: text
    content: tread down those who rise up against us.
  '6':
  - type: text
    content: 'For not in '
  - type: note
    content: '[Ps. 33:16; 1 Sam. 17:47]'
  - type: text
    content: my bow do I trust,
  - type: text
    content: nor can my sword save me.
  '7':
  - type: text
    content: But you have saved us from our foes
  - type: text
    content: 'and have '
  - type: note
    content: See Ps. 35:4
  - type: text
    content: put to shame those who hate us.
  '8':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 34:2
  - type: text
    content: In God we have boasted continually,
  - type: text
    content: 'and we will give thanks to your name forever. '
  - type: text
    content: Selah
  '9':
  - type: text
    content: 'But you have '
  - type: note
    content: ver. 23; Ps. 43:2; 60:1, 10; 74:1; 108:11; See Ps. 89:38-45
  - type: text
    content: rejected us and disgraced us
  - type: text
    content: 'and '
  - type: note
    content: '[Judg. 4:14; 2 Sam. 5:24]'
  - type: text
    content: have not gone out with our armies.
