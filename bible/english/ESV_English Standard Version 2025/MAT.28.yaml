document_id: MAT.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-8, see Mark 16:1-8; Luke 24:1-10; John 20:1
  - type: text
    content: 'Now after the Sabbath, toward the dawn of the first day of the week, Mary Magdalene and '
  - type: note
    content: ch. 27:56, 61
  - type: text
    content: 'the other Mary went to see the tomb. '
  '10':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“Do not be afraid; '
  - type: note
    content: See John 20:18
  - type: text
    content: 'go and tell '
  - type: note
    content: John 20:17; [Ps. 22:22; Rom. 8:29; Heb. 2:11, 12, 17]
  - type: text
    content: my brothers to go to Galilee, and there they will see me.”
  - type: heading
    content: The Report of the Guard
  '11':
  - type: text
    content: 'While they were going, behold, some of '
  - type: note
    content: ch. 27:65, 66
  - type: text
    content: 'the guard went into the city and told the chief priests all that had taken place. '
  '12':
  - type: text
    content: 'And when they had assembled with the elders and taken counsel, they gave a sufficient sum of money to the soldiers '
  '13':
  - type: text
    content: 'and said, “Tell people, '
  - type: note
    content: '[ch. 27:64]'
  - type: text
    content: '‘His disciples came by night and stole him away while we were asleep.’ '
  '14':
  - type: text
    content: 'And if this comes to '
  - type: note
    content: ch. 27:2
  - type: text
    content: 'the governor’s ears, we will '
  - type: note
    content: See Acts 12:20 (Gk.)
  - type: text
    content: 'satisfy him and keep you out of trouble.” '
  '15':
  - type: text
    content: 'So they took the money and did as they were directed. And this story has been spread among the Jews '
  - type: note
    content: ch. 27:8
  - type: text
    content: to this day.
  - type: heading
    content: The Great Commission
  '16':
  - type: text
    content: 'Now the eleven disciples '
  - type: note
    content: ver. 7
  - type: text
    content: 'went to Galilee, to the mountain to which Jesus had directed them. '
  '17':
  - type: text
    content: 'And when they saw him they '
  - type: note
    content: ver. 9
  - type: text
    content: 'worshiped him, but some doubted. '
  '18':
  - type: text
    content: 'And Jesus came and said to them, '
  - type: note
    content: ch. 11:27; Dan. 7:13, 14; John 3:35; 13:3; 17:2; Acts 2:36; Rom. 14:9; 1 Cor. 15:27; Eph. 1:10, 20-22; Phil. 2:9, 10; Col. 2:10; Heb. 1:2; 2:8; 1 Pet. 3:22; [ch. 9:6; John 5:27]
  - type: text
    content: '“All authority '
  - type: note
    content: '[ch. 6:10; Luke 2:14]'
  - type: text
    content: in heaven and on earth has been given to me.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mark 16:15, 16
  - type: text
    content: 'Go therefore and '
  - type: note
    content: ch. 13:52
  - type: text
    content: 'make disciples of '
  - type: note
    content: Luke 24:47; [ch. 24:14; Mark 11:17; Rom. 1:5]
  - type: text
    content: 'all nations, '
  - type: note
    content: Mark 16:15, 16
  - type: text
    content: 'baptizing them '
  - type: note
    content: See Acts 8:16
  - type: text
    content: in
  - type: note
    content: Or into
  - type: text
    content: ' '
  - type: note
    content: '[2 Cor. 13:14]'
  - type: text
    content: the name of the Father and of the Son and of the Holy Spirit,
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And behold, there was a great earthquake, for '
  - type: note
    content: '[John 20:12]'
  - type: text
    content: 'an angel of the Lord descended from heaven and came and rolled back the stone and sat on it. '
  '20':
  - type: text
    content: 'teaching them '
  - type: note
    content: John 14:15
  - type: text
    content: 'to observe all that '
  - type: note
    content: '[Acts 1:2]'
  - type: text
    content: 'I have commanded you. And behold, '
  - type: note
    content: '[ch. 1:23; 18:20; John 12:26; 14:3; 17:24; Acts 18:10]'
  - type: text
    content: 'I am with you always, to '
  - type: note
    content: See ch. 13:39
  - type: text
    content: the end of the age.”
  '3':
  - type: note
    content: Dan. 10:6
  - type: text
    content: 'His appearance was like lightning, and '
  - type: note
    content: '[Dan. 7:9; Mark 9:3; John 20:12; Acts 1:10]'
  - type: text
    content: 'his clothing white as snow. '
  '4':
  - type: text
    content: 'And for fear of him the guards trembled and '
  - type: note
    content: '[Rev. 1:17]'
  - type: text
    content: 'became like dead men. '
  '5':
  - type: text
    content: 'But the angel said to the women, “Do not be afraid, for I know that you seek Jesus who was crucified. '
  '6':
  - type: text
    content: 'He is not here, for he has risen, '
  - type: note
    content: ch. 27:63
  - type: text
    content: as he said. Come, see the place where he
  - type: note
    content: Some manuscripts the Lord
  - type: text
    content: ' lay. '
  '7':
  - type: text
    content: 'Then go quickly and tell his disciples that he has risen from the dead, and behold, '
  - type: note
    content: ver. 10, 16; ch. 26:32
  - type: text
    content: 'he is going before you to Galilee; there you will see him. See, I have told you.” '
  '8':
  - type: text
    content: 'So they departed quickly from the tomb '
  - type: note
    content: '[Ps. 2:11]'
  - type: text
    content: 'with fear and great joy, and ran to tell his disciples. '
  '9':
  - type: text
    content: 'And behold, Jesus '
  - type: note
    content: '[Mark 16:9; John 20:14]'
  - type: text
    content: 'met them and said, '
  - type: text
    content: “Greetings!”
  - type: text
    content: ' And they came up and '
  - type: note
    content: 2 Kgs. 4:27
  - type: text
    content: 'took hold of his feet and '
  - type: note
    content: ver. 17; Luke 24:52
  - type: text
    content: 'worshiped him. '
