document_id: GEN.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Marries Leah and Rachel
  - type: text
    content: 'Then Jacob went on his journey and came to '
  - type: note
    content: Num. 23:7; Judg. 6:3
  - type: text
    content: 'the land of the people of the east. '
  '10':
  - type: text
    content: 'Now as soon as Jacob saw Rachel the daughter of Laban his mother’s brother, and the sheep of Laban his mother’s brother, Jacob came near and rolled the stone from the well’s mouth and watered the flock of Laban his mother’s brother. '
  '11':
  - type: text
    content: 'Then Jacob kissed Rachel and wept aloud. '
  '12':
  - type: text
    content: 'And Jacob told Rachel that he was '
  - type: note
    content: ch. 13:8; 14:14, 16
  - type: text
    content: 'her father’s kinsman, and that he was Rebekah’s son, '
  - type: note
    content: '[ch. 24:28, 29]'
  - type: text
    content: and she ran and told her father.
  '13':
  - type: text
    content: 'As soon as Laban heard the news about Jacob, his sister’s son, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'he ran to meet him and embraced him and kissed him and brought him to his house. Jacob told Laban all these things, '
  '14':
  - type: text
    content: 'and Laban said to him, '
  - type: note
    content: ch. 2:23; 37:27; Judg. 9:2; 2 Sam. 5:1; 19:12, 13; 1 Chr. 11:1
  - type: text
    content: “Surely you are my bone and my flesh!” And he stayed with him a month.
  '15':
  - type: text
    content: 'Then Laban said to Jacob, “Because you are my kinsman, should you therefore serve me for nothing? Tell me, what shall your wages be?” '
  '16':
  - type: text
    content: 'Now Laban had two daughters. The name of the older was Leah, and the name of the younger was Rachel. '
  '17':
  - type: text
    content: Leah’s eyes were weak,
  - type: note
    content: Or soft
  - type: text
    content: ' but Rachel was beautiful in form and appearance. '
  '18':
  - type: text
    content: 'Jacob loved Rachel. And he said, '
  - type: note
    content: ch. 30:26; 31:41; [Hos. 12:12]
  - type: text
    content: '“I will serve you seven years for your younger daughter Rachel.” '
  '19':
  - type: text
    content: 'Laban said, “It is better that I give her to you than that I should give her to any other man; stay with me.” '
  '2':
  - type: text
    content: 'As he looked, he saw a well in the field, and behold, three flocks of sheep lying beside it, for out of that well the flocks were watered. The stone on the well’s mouth was large, '
  '20':
  - type: text
    content: 'So Jacob '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: served seven years for Rachel, and they seemed to him but a few days because of the love he had for her.
  '21':
  - type: text
    content: 'Then Jacob said to Laban, “Give me my wife that I may go in to her, for my time is completed.” '
  '22':
  - type: text
    content: 'So Laban gathered together all the people of the place and '
  - type: note
    content: Judg. 14:10; [John 2:1, 2]
  - type: text
    content: 'made a feast. '
  '23':
  - type: text
    content: 'But in the evening he took his daughter Leah and brought her to Jacob, and he went in to her. '
  '24':
  - type: text
    content: (Laban gave
  - type: note
    content: Or had given; also verse 29
  - type: text
    content: ' '
  - type: note
    content: See ch. 30:9-12
  - type: text
    content: 'his female servant Zilpah to his daughter Leah to be her servant.) '
  '25':
  - type: text
    content: 'And in the morning, behold, it was Leah! And Jacob said to Laban, “What is this you have done to me? Did I not serve with you for Rachel? Why then have you deceived me?” '
  '26':
  - type: text
    content: 'Laban said, “It is not so done in our country, to give the younger before the firstborn. '
  '27':
  - type: note
    content: '[Judg. 14:12]'
  - type: text
    content: 'Complete the week of this one, and we will give you the other also in return for serving me another seven years.” '
  '28':
  - type: text
    content: 'Jacob did so, and completed her week. Then Laban gave him his daughter Rachel to be his wife. '
  '29':
  - type: text
    content: '(Laban gave '
  - type: note
    content: See ch. 30:3-7
  - type: text
    content: 'his female servant Bilhah to his daughter Rachel to be her servant.) '
  '3':
  - type: text
    content: and when all the flocks were gathered there, the shepherds would roll the stone from the mouth of the well and water the sheep, and put the stone back in its place over the mouth of the well.
  '30':
  - type: text
    content: 'So Jacob went in to Rachel also, and he loved Rachel more than Leah, and served Laban '
  - type: note
    content: ver. 20; ch. 31:41
  - type: text
    content: for another seven years.
  - type: heading
    content: Jacob’s Children
  '31':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that Leah was '
  - type: note
    content: Deut. 21:15
  - type: text
    content: 'hated, '
  - type: note
    content: '[ch. 30:22]'
  - type: text
    content: 'he opened her womb, but Rachel was barren. '
  '32':
  - type: text
    content: And Leah conceived and bore a son, and she called his name Reuben,
  - type: note
    content: Reuben means See, a son
  - type: text
    content: ' for she said, “Because the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 31:42; Ex. 3:7; 4:31; Deut. 26:7
  - type: text
    content: 'has looked upon my affliction; for now my husband will love me.” '
  '33':
  - type: text
    content: 'She conceived again and bore a son, and said, “Because the '
  - type: text
    content: Lord
  - type: text
    content: ' has heard that I am hated, he has given me this son also.” And she called his name Simeon.'
  - type: note
    content: Simeon sounds like the Hebrew for heard
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Again she conceived and bore a son, and said, “Now this time my husband will be '
  - type: note
    content: '[Num. 18:2, 4]'
  - type: text
    content: attached to me, because I have borne him three sons.” Therefore his name was called Levi.
  - type: note
    content: Levi sounds like the Hebrew for attached
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And she conceived again and bore a son, and said, “This time I will praise the '
  - type: text
    content: Lord
  - type: text
    content: '.” Therefore she called his name '
  - type: note
    content: Matt. 1:2; [ch. 49:8]
  - type: text
    content: Judah.
  - type: note
    content: Judah sounds like the Hebrew for praise
  - type: text
    content: ' Then she ceased bearing.'
  '4':
  - type: text
    content: 'Jacob said to them, “My brothers, where do you come from?” They said, '
  - type: note
    content: ch. 27:43
  - type: text
    content: '“We are from Haran.” '
  '5':
  - type: text
    content: 'He said to them, “Do you know Laban the son of Nahor?” They said, “We know him.” '
  '6':
  - type: text
    content: 'He said to them, “Is it well with him?” They said, “It is well; and see, Rachel his daughter is coming with the sheep!” '
  '7':
  - type: text
    content: 'He said, “Behold, it is still high day; it is not time for the livestock to be gathered together. Water the sheep and go, pasture them.” '
  '8':
  - type: text
    content: But they said, “We cannot until all the flocks are gathered together and the stone is rolled from the mouth of the well; then we water the sheep.”
  '9':
  - type: text
    content: 'While he was still speaking with them, '
  - type: note
    content: Ex. 2:16, 17
  - type: text
    content: 'Rachel came with her father’s sheep, for she was a shepherdess. '
