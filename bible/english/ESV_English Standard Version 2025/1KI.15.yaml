document_id: 1KI.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijam Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 13:1, 2
  - type: text
    content: 'Now in the eighteenth year of King Jeroboam the son of Nebat, Abijam began to reign over Judah. '
  '10':
  - type: text
    content: 'and he reigned forty-one years in Jerusalem. His mother’s name was Maacah the daughter of Abishalom. '
  '11':
  - type: note
    content: 2 Chr. 14:2
  - type: text
    content: 'And Asa did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', as David his father had done. '
  '12':
  - type: text
    content: 'He put away the '
  - type: note
    content: See ch. 14:24
  - type: text
    content: 'male cult prostitutes out of the land and removed '
  - type: note
    content: '[2 Chr. 15:8]'
  - type: text
    content: 'all the idols that his fathers had made. '
  '13':
  - type: note
    content: For ver. 13-15, see 2 Chr. 15:16-18
  - type: text
    content: 'He also removed Maacah his mother from being queen mother because she had made an abominable image for Asherah. And Asa cut down her image and '
  - type: note
    content: '[Ex. 32:20]'
  - type: text
    content: 'burned it at the brook Kidron. '
  '14':
  - type: note
    content: ch. 22:43; [2 Kgs. 12:3; 14:4]
  - type: text
    content: 'But the high places were not taken away. Nevertheless, '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'the heart of Asa was wholly true to the '
  - type: text
    content: Lord
  - type: text
    content: ' all his days. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 7:51]'
  - type: text
    content: 'he brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' the sacred gifts of his father and his own sacred gifts, silver, and gold, and vessels.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: ver. 32
  - type: text
    content: 'And there was war between Asa and Baasha king of Israel all their days. '
  '17':
  - type: note
    content: For ver. 17-22, see 2 Chr. 16:1-6
  - type: text
    content: 'Baasha king of Israel went up against Judah and '
  - type: note
    content: ver. 21, 22
  - type: text
    content: 'built Ramah, '
  - type: note
    content: '[ch. 12:27]'
  - type: text
    content: 'that he might permit no one to go out or come in to Asa king of Judah. '
  '18':
  - type: text
    content: 'Then Asa took all the silver and the gold '
  - type: note
    content: ch. 14:26
  - type: text
    content: 'that were left in the treasures of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the treasures of the king’s house and gave them into the hands of his servants. '
  - type: note
    content: '[2 Kgs. 12:18]'
  - type: text
    content: 'And King Asa sent them to Ben-hadad the son of Tabrimmon, the son of Hezion, king of Syria, '
  - type: note
    content: ch. 11:24
  - type: text
    content: 'who lived in Damascus, saying, '
  '19':
  - type: text
    content: '“Let there be '
  - type: note
    content: '[2 Chr. 16:7]'
  - type: text
    content: a covenant
  - type: note
    content: Or treaty; twice in this verse
  - type: text
    content: ' between me and you, as there was between my father and your father. Behold, I am sending to you a present of silver and gold. Go, break your covenant with Baasha king of Israel, that he may withdraw from me.” '
  '2':
  - type: text
    content: 'He reigned for three years in Jerusalem. His mother’s name was Maacah the daughter of Abishalom. '
  '20':
  - type: text
    content: 'And Ben-hadad listened to King Asa and sent the commanders of his armies against the cities of Israel and conquered '
  - type: note
    content: 2 Kgs. 15:29
  - type: text
    content: 'Ijon, '
  - type: note
    content: Judg. 18:29
  - type: text
    content: 'Dan, '
  - type: note
    content: 2 Sam. 20:14; 2 Kgs. 15:29
  - type: text
    content: 'Abel-beth-maacah, and all '
  - type: note
    content: See Josh. 11:2
  - type: text
    content: 'Chinneroth, with all the land of Naphtali. '
  '21':
  - type: text
    content: 'And when Baasha heard of it, '
  - type: note
    content: ver. 17
  - type: text
    content: 'he stopped building Ramah, and he lived in '
  - type: note
    content: ch. 14:17; 16:6, 9
  - type: text
    content: 'Tirzah. '
  '22':
  - type: text
    content: 'Then King Asa made a proclamation to all Judah, none was exempt, and they carried away the stones of Ramah and its timber, with which Baasha had been building, and with them King Asa built '
  - type: note
    content: Josh. 21:17
  - type: text
    content: 'Geba of Benjamin and '
  - type: note
    content: Josh. 18:26
  - type: text
    content: 'Mizpah. '
  '23':
  - type: note
    content: For ver. 23, 24, see 2 Chr. 16:11-14
  - type: text
    content: 'Now the rest of all the acts of Asa, all his might, and all that he did, and the cities that he built, are they not written in the Book of the Chronicles of the Kings of Judah? But in his old age he was diseased in his feet. '
  '24':
  - type: text
    content: 'And Asa slept with his fathers and was buried with his fathers in the city of David his father, and '
  - type: note
    content: 2 Chr. 17:1; [Matt. 1:8]
  - type: text
    content: Jehoshaphat his son reigned in his place.
  - type: heading
    content: Nadab Reigns in Israel
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:20
  - type: text
    content: 'Nadab the son of Jeroboam began to reign over Israel in the second year of Asa king of Judah, and he reigned over Israel two years. '
  '26':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'and walked in the way of his father, and in his sin '
  - type: note
    content: ver. 30; ch. 12:30; 14:16
  - type: text
    content: which he made Israel to sin.
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:14
  - type: text
    content: 'Baasha the son of Ahijah, of the house of Issachar, conspired against him. And Baasha struck him down at '
  - type: note
    content: ch. 16:15; Josh. 19:44; 21:23
  - type: text
    content: 'Gibbethon, which belonged to the Philistines, for Nadab and all Israel were laying siege to Gibbethon. '
  '28':
  - type: text
    content: 'So Baasha killed him in the third year of Asa king of Judah and reigned in his place. '
  '29':
  - type: text
    content: 'And as soon as he was king, he killed all the house of Jeroboam. He left to the house of Jeroboam not one that breathed, until he had destroyed it, '
  - type: note
    content: ch. 14:10, 14
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he spoke by his servant Ahijah the Shilonite. '
  '3':
  - type: text
    content: 'And he walked in all the sins that his father did before him, and '
  - type: note
    content: ch. 11:4; [ver. 14; ch. 8:61]
  - type: text
    content: 'his heart was not wholly true to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, as the heart of David his father. '
  '30':
  - type: text
    content: 'It was for the sins of Jeroboam that he sinned and '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'that he made Israel to sin, and because of the anger to which he provoked the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '31':
  - type: text
    content: 'Now the rest of the acts of Nadab and all that he did, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '32':
  - type: note
    content: ver. 16
  - type: text
    content: And there was war between Asa and Baasha king of Israel all their days.
  - type: heading
    content: Baasha Reigns in Israel
  '33':
  - type: text
    content: 'In the third year of Asa king of Judah, Baasha the son of Ahijah began to reign over all Israel at Tirzah, and he reigned twenty-four years. '
  '34':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ver. 26]'
  - type: text
    content: and walked in the way of Jeroboam and in his sin which he made Israel to sin.
  '4':
  - type: text
    content: 'Nevertheless, for David’s sake the '
  - type: text
    content: Lord
  - type: text
    content: ' his God gave him '
  - type: note
    content: See ch. 11:36
  - type: text
    content: 'a lamp in Jerusalem, setting up his son after him, and establishing Jerusalem, '
  '5':
  - type: text
    content: 'because '
  - type: note
    content: ch. 9:4; 14:8
  - type: text
    content: 'David did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not turn aside from anything that he commanded him all the days of his life, '
  - type: note
    content: 2 Sam. 11:4, 15; 12:9
  - type: text
    content: 'except in the matter of Uriah the Hittite. '
  '6':
  - type: note
    content: ch. 14:30
  - type: text
    content: 'Now there was war between Rehoboam and Jeroboam all the days of his life. '
  '7':
  - type: note
    content: '[2 Chr. 13:22]'
  - type: text
    content: 'The rest of the acts of Abijam and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  - type: note
    content: See 2 Chr. 13:2-20
  - type: text
    content: 'And there was war between Abijam and Jeroboam. '
  '8':
  - type: note
    content: 2 Chr. 14:1
  - type: text
    content: And Abijam slept with his fathers, and they buried him in the city of David. And Asa his son reigned in his place.
  - type: heading
    content: Asa Reigns in Judah
  '9':
  - type: text
    content: 'In the twentieth year of Jeroboam king of Israel, Asa began to reign over Judah, '
