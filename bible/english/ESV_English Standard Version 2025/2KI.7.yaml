    - type: text
      text: '3'
  - type: text
    text: Now there were four men who were lepers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leprosy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was a term for several skin diseases; see Leviticus 13
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
