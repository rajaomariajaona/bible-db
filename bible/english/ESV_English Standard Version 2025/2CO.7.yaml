document_id: 2CO.7,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Since we have these promises, beloved, '
  - type: note
    content: 1 Pet. 2:11; 1 John 3:3
  - type: text
    content: let us cleanse ourselves from every defilement of body
  - type: note
    content: Greek flesh
  - type: text
    content: ' and spirit, bringing holiness to completion in the fear of God.'
  - type: heading
    content: Paul’s Joy
  '10':
  - type: text
    content: 'For '
  - type: note
    content: '[2 Sam. 12:13; Acts 11:18]'
  - type: text
    content: 'godly grief produces a repentance that leads to salvation without regret, whereas '
  - type: note
    content: '[Prov. 17:22]'
  - type: text
    content: 'worldly grief produces death. '
  '11':
  - type: text
    content: 'For see what earnestness this godly grief has produced in you, but also what eagerness to clear yourselves, what indignation, what fear, what longing, '
  - type: note
    content: '[ch. 2:6]'
  - type: text
    content: 'what zeal, what punishment! At every point you have proved yourselves innocent in the matter. '
  '12':
  - type: text
    content: 'So although I wrote to you, it was not for the sake of the one '
  - type: note
    content: '[1 Cor. 5:1, 2]'
  - type: text
    content: 'who did the wrong, nor for the sake of the one who suffered the wrong, but in order that your earnestness for us might be revealed to you in the sight of God. '
  '13':
  - type: text
    content: 'Therefore '
  - type: note
    content: ver. 6
  - type: text
    content: we are comforted.
  - type: text
    content: 'And besides our own comfort, we rejoiced still more at the joy of Titus, because his spirit '
  - type: note
    content: See Rom. 15:32
  - type: text
    content: 'has been refreshed by you all. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: ch. 8:24; 9:2; 10:8; [2 Thess. 1:4]
  - type: text
    content: 'whatever boasts I made to him about you, I was not put to shame. But just as everything we said to you '
  - type: note
    content: ch. 4:2; 6:7
  - type: text
    content: 'was true, so also our boasting before Titus has proved true. '
  '15':
  - type: text
    content: 'And his affection for you is even greater, as he remembers '
  - type: note
    content: ch. 2:9; 10:6
  - type: text
    content: 'the obedience of you all, how you received him with fear and trembling. '
  '16':
  - type: text
    content: 'I rejoice, because I have complete '
  - type: note
    content: See ch. 2:3
  - type: text
    content: confidence in you.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:12, 13
  - type: text
    content: Make room in your hearts
  - type: note
    content: Greek lacks in your hearts
  - type: text
    content: ' for us. '
  - type: note
    content: Acts 20:33; [ch. 11:20]
  - type: text
    content: 'We have wronged no one, we have corrupted no one, we have taken advantage of no one. '
  '3':
  - type: text
    content: 'I do not say this to condemn you, for I said before that '
  - type: note
    content: '[ch. 6:11-13]'
  - type: text
    content: 'you are in our hearts, to die together and to live together. '
  '4':
  - type: text
    content: 'I am acting with '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'great boldness toward you; '
  - type: note
    content: ch. 1:12; 8:24; 9:2
  - type: text
    content: 'I have great pride in you; '
  - type: note
    content: ch. 1:4; Phil. 2:17; Col. 1:24; [ch. 6:10]
  - type: text
    content: I am filled with comfort. In all our affliction, I am overflowing with joy.
  '5':
  - type: text
    content: 'For even '
  - type: note
    content: ch. 2:13
  - type: text
    content: when we came into Macedonia, our bodies had no rest, but we were afflicted at every turn—
  - type: note
    content: '[Deut. 32:25; Lam. 1:20]'
  - type: text
    content: 'fighting without and fear within. '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: ch. 1:4
  - type: text
    content: 'God, who comforts the downcast, '
  - type: note
    content: ver. 13; [1 Thess. 3:6, 7]
  - type: text
    content: 'comforted us by the coming of Titus, '
  '7':
  - type: text
    content: 'and not only by his coming but also by the comfort with which he was comforted by you, as he told us of your longing, your mourning, your zeal for me, so that I rejoiced still more. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 2:2]'
  - type: text
    content: 'even if I made you grieve with my letter, I do not regret it—though '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'I did regret it, for I see that that letter grieved you, though only for a while. '
  '9':
  - type: text
    content: 'As it is, I rejoice, not because you were grieved, but '
  - type: note
    content: Ps. 38:18; [1 Cor. 5:2]
  - type: text
    content: because you were grieved into repenting. For you felt a godly grief, so that you suffered no loss through us.
