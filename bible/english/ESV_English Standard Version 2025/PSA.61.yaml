    content: Lead Me to the Rock
  - type: text
    content: 'To the choirmaster: with '
  - type: note
    content: Ps. 4, title
  - type: text
    content: stringed instruments. Of David.
  - type: text
    content: Hear my cry, O God,
  - type: note
    content: Ps. 55:1, 2
  - type: text
    content: listen to my prayer;
  '2':
  - type: text
    content: from the end of the earth I call to you
  - type: text
    content: 'when my heart is '
  - type: note
    content: Ps. 77:3
  - type: text
    content: faint.
  - type: text
    content: 'Lead me to '
  - type: note
    content: '[Ps. 18:2]'
  - type: text
    content: the rock
  - type: text
    content: that is higher than I,
  '3':
  - type: text
    content: 'for you have been '
  - type: note
    content: See Ps. 14:6
  - type: text
    content: my refuge,
  - type: text
    content: 'a strong '
  - type: note
    content: Prov. 18:10
  - type: text
    content: tower against the enemy.
  '4':
  - type: text
    content: 'Let me '
  - type: note
    content: See Ps. 15:1; 27:4
  - type: text
    content: dwell in your tent forever!
  - type: text
    content: 'Let me take refuge under '
  - type: note
    content: See Ps. 17:8
  - type: text
    content: 'the shelter of your wings! '
  - type: text
    content: Selah
  '5':
  - type: text
    content: For you, O God, have heard my vows;
  - type: text
    content: you have given me the heritage of those who fear your name.
  '6':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 21:4
  - type: text
    content: 'Prolong '
  - type: note
    content: Ps. 63:11
  - type: text
    content: the life of the king;
  - type: text
    content: may his years endure to all generations!
  '7':
  - type: text
    content: May he be enthroned forever before God;
  - type: text
    content: 'appoint '
  - type: note
    content: See Ps. 40:11
  - type: text
    content: steadfast love and faithfulness to watch over him!
  '8':
  - type: text
    content: So will I ever sing praises to your name,
  - type: text
    content: 'as I '
  - type: note
    content: See Ps. 50:14
  - type: text
