document_id: 2SA.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ish-bosheth Murdered
  - type: text
    content: 'When Ish-bosheth, Saul’s son, heard that Abner had died at Hebron, '
  - type: note
    content: Ezra 4:4; Isa. 13:7; Jer. 6:24
  - type: text
    content: 'his courage failed, and all Israel was dismayed. '
  '10':
  - type: note
    content: See ch. 1:4-10
  - type: text
    content: 'when one told me, ‘Behold, Saul is dead,’ and thought he was bringing good news, '
  - type: note
    content: ch. 1:15
  - type: text
    content: 'I seized him and killed him at Ziklag, which was the reward I gave him for his news. '
  '11':
  - type: text
    content: 'How much more, when wicked men have killed a righteous man in his own house on his bed, shall I not now '
  - type: note
    content: '[Gen. 9:5, 6]'
  - type: text
    content: 'require his blood at your hand and destroy you from the earth?” '
  '12':
  - type: text
    content: 'And David commanded his young men, and they killed them and cut off their hands and feet and hanged them beside the pool at Hebron. But they took the head of Ish-bosheth and buried it '
  - type: note
    content: ch. 3:32
  - type: text
    content: in the tomb of Abner at Hebron.
  '2':
  - type: text
    content: Now Saul’s son had two men who were captains of raiding bands; the name of the one was Baanah, and the name of the other Rechab, sons of Rimmon a man of Benjamin from Beeroth (
  - type: note
    content: Josh. 18:25
  - type: text
    content: 'for Beeroth also is counted part of Benjamin; '
  '3':
  - type: note
    content: '[1 Sam. 31:7]'
  - type: text
    content: 'the Beerothites fled '
  - type: note
    content: Neh. 11:33
  - type: text
    content: to Gittaim and have been sojourners there to this day).
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:3, 6
  - type: text
    content: 'Jonathan, the son of Saul, had a son who was crippled in his feet. He was five years old when the news about Saul and Jonathan '
  - type: note
    content: 1 Sam. 29:1, 11
  - type: text
    content: came from Jezreel, and his nurse took him up and fled, and as she fled in her haste, he fell and became lame. And his name was Mephibosheth.
  '5':
  - type: text
    content: 'Now the sons of Rimmon the Beerothite, Rechab and Baanah, set out, and about the heat of the day they came to the house of Ish-bosheth as he was taking his noonday rest. '
  '6':
  - type: text
    content: 'And they came into the midst of the house as if to get wheat, and they stabbed him '
  - type: note
    content: See ch. 2:23
  - type: text
    content: in the stomach. Then Rechab and Baanah his brother escaped.
  - type: note
    content: Septuagint And behold, the doorkeeper of the house had been cleaning wheat, but she grew drowsy and slept. So Rechab and Baanah his brother slipped in
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'When they came into the house, as he lay on his bed in his bedroom, they struck him and put him to death and beheaded him. They took his head and went by the way of '
  - type: note
    content: ch. 2:29; See Deut. 1:1
  - type: text
    content: 'the Arabah all night, '
  '8':
  - type: text
    content: 'and brought the head of Ish-bosheth to David at Hebron. And they said to the king, “Here is the head of Ish-bosheth, the son of Saul, your enemy, '
  - type: note
    content: 1 Sam. 19:10, 11; 23:15
  - type: text
    content: 'who sought your life. The '
  - type: text
    content: Lord
  - type: text
    content: ' has avenged my lord the king this day on Saul and on his offspring.” '
  '9':
  - type: text
    content: 'But David answered Rechab and Baanah his brother, the sons of Rimmon the Beerothite, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: 1 Kgs. 1:29
  - type: text
    content: 'who has redeemed my life out of every adversity, '
