document_id: EPH.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Walk in Love
  - type: text
    content: ' '
  - type: note
    content: '[ch. 4:32; Matt. 5:7, 48; Luke 6:36 ]'
  - type: text
    content: 'Therefore be imitators of God, as beloved children. '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: 1 Thess. 2:4; 5:21
  - type: text
    content: 'try to discern what is pleasing to the Lord. '
  '11':
  - type: note
    content: See 1 Cor. 5:9
  - type: text
    content: 'Take no part in the '
  - type: note
    content: Rom. 6:21
  - type: text
    content: 'unfruitful '
  - type: note
    content: Rom. 13:12
  - type: text
    content: 'works of darkness, but instead '
  - type: note
    content: Lev. 19:17; 1 Tim. 5:20
  - type: text
    content: 'expose them. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'it is shameful even to speak of the things that they do in secret. '
  '13':
  - type: text
    content: 'But when '
  - type: note
    content: John 3:20, 21; [ver. 9]
  - type: text
    content: 'anything is exposed by the light, it becomes visible, '
  '14':
  - type: text
    content: for anything that becomes visible is light. Therefore it says,
  - type: note
    content: '[ Isa. 51:17; 52:1; 60:1; Mal. 4:2 ]; See Rom. 13:11'
  - type: text
    content: “Awake, O sleeper,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 26:19
  - type: text
    content: arise from the dead,
  - type: text
    content: 'and '
  - type: note
    content: Luke 1:78, 79
  - type: text
    content: Christ will shine on you.”
  '15':
  - type: text
    content: ' '
  - type: note
    content: Col. 4:5; [ Prov. 15:21 ]
  - type: text
    content: 'Look carefully then how you walk, not as unwise but as wise, '
  '16':
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'making the best use of the time, because '
  - type: note
    content: ch. 6:13; Eccles. 12:1; Amos 5:13; Gal. 1:4
  - type: text
    content: 'the days are evil. '
  '17':
  - type: text
    content: 'Therefore do not be foolish, but understand what '
  - type: note
    content: Rom. 12:2; 1 Thess. 4:3; 5:18
  - type: text
    content: 'the will of the Lord is. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Prov. 20:1; 23:20, 31; 1 Cor. 5:11
  - type: text
    content: 'do not get drunk with wine, for that is '
  - type: note
    content: Titus 1:6; 1 Pet. 4:4
  - type: text
    content: 'debauchery, but '
  - type: note
    content: '[Luke 1:15]'
  - type: text
    content: 'be filled with the Spirit, '
  '19':
  - type: text
    content: 'addressing one another in '
  - type: note
    content: Acts 16:25; 1 Cor. 14:26; Col. 3:16; James 5:13
  - type: text
    content: 'psalms and hymns and spiritual songs, singing and making melody to the Lord with your heart, '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Rom. 14:15; [Col. 3:14]; See John 13:34
  - type: text
    content: 'walk in love, '
  - type: note
    content: See Rom. 8:37
  - type: text
    content: 'as Christ loved us and '
  - type: note
    content: See Rom. 4:25
  - type: text
    content: 'gave himself up for us, a '
  - type: note
    content: See Gen. 8:21
  - type: text
    content: 'fragrant '
  - type: note
    content: Heb. 7:27; 9:14; 10:10, 12
  - type: text
    content: offering and sacrifice to God.
  '20':
  - type: note
    content: Col. 3:17; 1 Thess. 1:2; 2 Thess. 1:3
  - type: text
    content: 'giving thanks always and for everything to God the Father '
  - type: note
    content: Heb. 13:15; [John 14:13]
  - type: text
    content: 'in the name of our Lord Jesus Christ, '
  '21':
  - type: note
    content: '[Phil. 2:3]'
  - type: text
    content: submitting to one another out of reverence for Christ.
  - type: heading
    content: Wives and Husbands
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ch. 5:22–6:9, see Col. 3:18–4:1
  - type: text
    content: 'Wives, '
  - type: note
    content: See Gen. 3:16
  - type: text
    content: 'submit to your own husbands, '
  - type: note
    content: '[ch. 6:5]'
  - type: text
    content: 'as to the Lord. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 11:3
  - type: text
    content: 'the husband is the head of the wife even as '
  - type: note
    content: See ch. 1:22, 23
  - type: text
    content: 'Christ is the head of the church, his body, and is '
  - type: note
    content: '[1 Cor. 6:13]'
  - type: text
    content: 'himself its Savior. '
  '24':
  - type: text
    content: 'Now as the church submits to Christ, so also wives should submit '
  - type: note
    content: '[Col. 3:20, 22; Titus 2:9]'
  - type: text
    content: in everything to their husbands.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ver. 28, 33 ; [1 Pet. 3:7]
  - type: text
    content: 'Husbands, love your wives, as Christ loved the church and '
  - type: note
    content: ver. 2
  - type: text
    content: 'gave himself up for her, '
  '26':
  - type: text
    content: 'that he might sanctify her, having cleansed her by '
  - type: note
    content: Titus 3:5; [Rev. 7:14]
  - type: text
    content: 'the washing of water '
  - type: note
    content: ch. 6:17; Heb. 6:5; See John 15:3
  - type: text
    content: 'with the word, '
  '27':
  - type: text
    content: 'so '
  - type: note
    content: 2 Cor. 11:2; See ch. 1:4
  - type: text
    content: 'that he might present the church to himself in splendor, '
  - type: note
    content: Song 4:7
  - type: text
    content: without spot or wrinkle or any such thing, that she might be holy and without blemish.
  - type: note
    content: Or holy and blameless
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'In the same way '
  - type: note
    content: ver. 25, 33
  - type: text
    content: 'husbands should love their wives as their own bodies. He who loves his wife loves himself. '
  '29':
  - type: text
    content: 'For no one ever hated his own flesh, but nourishes and cherishes it, just as Christ does the church, '
  '3':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 6:18; See Gal. 5:19
  - type: text
    content: 'sexual immorality and all impurity or covetousness '
  - type: note
    content: '[ver. 12; Ps. 16:4]'
  - type: text
    content: 'must not even be named among you, as is proper among saints. '
  '30':
  - type: text
    content: 'because '
  - type: note
    content: '[Gen. 2:23]; See 1 Cor. 6:15'
  - type: text
    content: 'we are members of his body. '
  '31':
  - type: note
    content: Matt. 19:5; Mark 10:7, 8; Cited from Gen. 2:24
  - type: text
    content: '“Therefore a man shall leave his father and mother and hold fast to his wife, and '
  - type: note
    content: 1 Cor. 6:16
  - type: text
    content: 'the two shall become one flesh.” '
  '32':
  - type: text
    content: 'This mystery is profound, and I am saying that it refers to Christ and the church. '
  '33':
  - type: text
    content: 'However, '
  - type: note
    content: ver. 25, 28
  - type: text
    content: 'let each one of you love his wife as himself, and let the wife see that she '
  - type: note
    content: 1 Pet. 3:2, 6
  - type: text
    content: respects her husband.
  '4':
  - type: text
    content: 'Let there be '
  - type: note
    content: ch. 4:29; [Eccles. 10:13]
  - type: text
    content: 'no filthiness nor foolish talk nor crude joking, '
  - type: note
    content: '[Rom. 1:28]'
  - type: text
    content: 'which are out of place, but instead '
  - type: note
    content: ver. 20
  - type: text
    content: 'let there be thanksgiving. '
  '5':
  - type: text
    content: 'For you may be sure of this, that '
  - type: note
    content: See 1 Cor. 6:9
  - type: text
    content: everyone who is sexually immoral or impure, or who is covetous (
  - type: note
    content: Col. 3:5
  - type: text
    content: 'that is, an idolater), has no inheritance in the kingdom of Christ and God. '
  '6':
  - type: note
    content: See Matt. 24:4
  - type: text
    content: 'Let no one '
  - type: note
    content: Col. 2:8
  - type: text
    content: 'deceive you with empty words, for because of these things '
  - type: note
    content: Rom. 1:18; Col. 3:6
  - type: text
    content: 'the wrath of God comes upon '
  - type: note
    content: ch. 2:2; [1 Pet. 1:14]
  - type: text
    content: 'the sons of disobedience. '
  '7':
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 3:6
  - type: text
    content: 'do not become partners with them; '
  '8':
  - type: text
    content: 'for '
  - type: note
    content: See ch. 2:1, 2
  - type: text
    content: 'at one time you were '
  - type: note
    content: See Acts 26:18
  - type: text
    content: 'darkness, but now you are light in the Lord. '
  - type: note
    content: Isa. 2:5; See Luke 16:8; John 12:35, 36
  - type: text
    content: 'Walk as children of light '
  '9':
  - type: text
    content: '(for '
  - type: note
    content: '[Gal. 5:22]; See Rom. 7:4'
  - type: text
    content: 'the fruit of light is found in all that is good and right and true), '
