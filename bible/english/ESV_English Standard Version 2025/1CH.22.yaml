document_id: 1CH.22,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then David said, '
  - type: note
    content: ch. 21:18, 19, 26, 28; 2 Chr. 3:1; [Deut. 12:5]
  - type: text
    content: '“Here shall be the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' God and here the altar of burnt offering for Israel.”'
  - type: heading
    content: David Prepares for Temple Building
  '10':
  - type: note
    content: See 2 Sam. 7:13
  - type: text
    content: 'He shall build a house for my name. '
  - type: note
    content: ch. 28:6; 2 Sam. 7:14; Heb. 1:5
  - type: text
    content: He shall be my son, and I will be his father, and I will establish his royal throne in Israel forever.’
  '11':
  - type: text
    content: '“Now, my son, '
  - type: note
    content: ver. 16; [1 Sam. 20:13]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you, so that you may succeed in building the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as he has spoken concerning you. '
  '12':
  - type: note
    content: '[1 Kgs. 3:9, 12; Ps. 72:1]'
  - type: text
    content: 'Only, may the '
  - type: text
    content: Lord
  - type: text
    content: ' grant you discretion and understanding, that when he gives you charge over Israel you may keep the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '13':
  - type: note
    content: ch. 28:7
  - type: text
    content: 'Then you will prosper if you are careful to observe the statutes and the rules that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses for Israel. '
  - type: note
    content: ch. 28:20; [Deut. 31:6, 7; Josh. 1:6, 7, 9]
  - type: text
    content: 'Be strong and courageous. Fear not; do not be dismayed. '
  '14':
  - type: text
    content: 'With great pains I have provided for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 29:4]'
  - type: text
    content: 100,000 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold, a million talents of silver, and '
  - type: note
    content: ver. 3
  - type: text
    content: 'bronze and iron beyond weighing, for there is so much of it; timber and stone, too, I have provided. To these you must add. '
  '15':
  - type: text
    content: 'You have an abundance of workmen: stonecutters, masons, carpenters, and all kinds of craftsmen without number, skilled in working '
  '16':
  - type: text
    content: 'gold, silver, bronze, and iron. Arise and work! '
  - type: note
    content: ver. 11
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' be with you!”'
  '17':
  - type: text
    content: 'David also commanded '
  - type: note
    content: See ch. 28:1-6
  - type: text
    content: 'all the leaders of Israel to help Solomon his son, saying, '
  '18':
  - type: text
    content: '“Is not the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with you? And '
  - type: note
    content: ch. 23:25; [Deut. 12:10; Josh. 21:44; 23:1; 2 Sam. 7:1]; See ver. 9
  - type: text
    content: has he not given you peace
  - type: note
    content: Or rest (see 22:9)
  - type: text
    content: ' on every side? For he has delivered the inhabitants of the land into my hand, and the land is subdued before the '
  - type: text
    content: Lord
  - type: text
    content: ' and his people. '
  '19':
  - type: text
    content: 'Now '
  - type: note
    content: '[2 Chr. 20:3]'
  - type: text
    content: 'set your mind and heart to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Arise and build the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: ' God, '
  - type: note
    content: 1 Kgs. 8:6, 21; 2 Chr. 5:7; 6:11
  - type: text
    content: 'so that the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the holy vessels of God may be brought into a house built '
  - type: note
    content: ver. 7; 1 Kgs. 5:3
  - type: text
    content: 'for the name of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'David commanded to gather together the '
  - type: note
    content: '[1 Kgs. 9:20, 21; 2 Chr. 2:17]'
  - type: text
    content: 'resident aliens who were in the land of Israel, and he '
  - type: note
    content: '[1 Kgs. 5:17]'
  - type: text
    content: 'set stonecutters to prepare dressed stones for building the house of God. '
  '3':
  - type: text
    content: 'David also provided great quantities of iron for nails for the doors of the gates and for clamps, '
  - type: note
    content: ver. 14; 1 Kgs. 7:47
  - type: text
    content: 'as well as bronze in quantities beyond weighing, '
  '4':
  - type: text
    content: 'and cedar timbers without number, '
  - type: note
    content: '[1 Kgs. 5:6]'
  - type: text
    content: 'for the Sidonians and Tyrians brought great quantities of cedar to David. '
  '5':
  - type: text
    content: 'For David said, '
  - type: note
    content: ch. 29:1; [1 Kgs. 3:7; Prov. 4:3]
  - type: text
    content: '“Solomon my son is young and inexperienced, and the house that is to be built for the '
  - type: text
    content: Lord
  - type: text
    content: ' must be exceedingly magnificent, of fame and glory throughout all lands. I will therefore make preparation for it.” So David provided materials in great quantity before his death.'
  - type: heading
    content: Solomon Charged to Build the Temple
  '6':
  - type: text
    content: 'Then he called for Solomon his son and charged him to build a house for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '7':
  - type: text
    content: 'David said to Solomon, “My son, '
  - type: note
    content: ch. 17:1, 2; 28:2; 2 Sam. 7:2, 3; 1 Kgs. 8:17; See Ps. 132:1-5
  - type: text
    content: 'I had it in my heart to build a house to the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. '
  '8':
  - type: text
    content: 'But the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me, saying, '
  - type: note
    content: ch. 28:3; [1 Kgs. 5:3]
  - type: text
    content: '‘You have shed much blood and have waged great wars. You shall not build a house to my name, because you have shed so much blood before me on the earth. '
  '9':
  - type: text
    content: 'Behold, a son shall be born to you who shall be a man of rest. '
  - type: note
    content: 1 Kgs. 5:4; [ver. 18; 1 Kgs. 4:25]
  - type: text
    content: 'I will give him rest from all his surrounding enemies. '
  - type: note
    content: 2 Sam. 12:24
  - type: text
    content: 'For his name shall be Solomon, and I will give peace and quiet to Israel in his days. '
