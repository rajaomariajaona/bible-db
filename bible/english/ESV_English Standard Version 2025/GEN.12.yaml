document_id: GEN.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Call of Abram
  - type: text
    content: 'Now '
  - type: note
    content: Acts 7:3; Heb. 11:8
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' said'
  - type: note
    content: Or had said
  - type: text
    content: ' to Abram, “Go from your country'
  - type: note
    content: Or land
  - type: text
    content: ' and your kindred and your father’s house to the land that I will show you. '
  '10':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 26:1; 43:1
  - type: text
    content: 'there was a famine in the land. So Abram went down to Egypt to sojourn there, for the famine was severe in the land. '
  '11':
  - type: text
    content: 'When he was about to enter Egypt, he said to Sarai his wife, “I know that you are a woman beautiful in appearance, '
  '12':
  - type: text
    content: 'and when the Egyptians see you, they will say, ‘This is his wife.’ Then they '
  - type: note
    content: See ch. 20:1-18; 26:6-11
  - type: text
    content: 'will kill me, but they will let you live. '
  '13':
  - type: text
    content: 'Say you are my sister, that it may go well with me because of you, and that my life may be spared for your sake.” '
  '14':
  - type: text
    content: 'When Abram entered Egypt, the Egyptians saw that the woman was very beautiful. '
  '15':
  - type: text
    content: 'And when the princes of Pharaoh saw her, they praised her to Pharaoh. And the woman was taken into Pharaoh’s house. '
  '16':
  - type: text
    content: And for her sake he dealt well with Abram; and he had sheep, oxen, male donkeys, male servants, female servants, female donkeys, and camels.
  '17':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 16:21; Ps. 105:14
  - type: text
    content: 'afflicted Pharaoh and his house with great plagues because of Sarai, Abram’s wife. '
  '18':
  - type: text
    content: 'So Pharaoh called Abram and said, “What is this you have done to me? Why did you not tell me that she was your wife? '
  '19':
  - type: text
    content: 'Why did you say, ‘She is my sister,’ so that I took her for my wife? Now then, here is your wife; take her, and go.” '
  '2':
  - type: note
    content: ch. 17:6; 18:18; [Gal. 3:14]
  - type: text
    content: 'And I will make of you a great nation, and I will bless you and make your name great, so that you will be a blessing. '
  '20':
  - type: text
    content: And Pharaoh gave men orders concerning him, and they sent him away with his wife and all that he had.
  '3':
  - type: note
    content: ch. 27:29; Num. 24:9
  - type: text
    content: 'I will bless those who bless you, and him who dishonors you I will curse, and '
  - type: note
    content: ch. 18:18; 22:18; 26:4; 28:14; Jer. 4:2; Acts 3:25; Gal. 3:16; Cited Gal. 3:8
  - type: text
    content: in you all the families of the earth shall be blessed.”
  - type: note
    content: Or by you all the families of the earth shall bless themselves
  '4':
  - type: text
    content: 'So Abram went, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had told him, and Lot went with him. Abram was seventy-five years old when he departed from '
  - type: note
    content: ch. 11:31
  - type: text
    content: 'Haran. '
  '5':
  - type: text
    content: 'And Abram took Sarai his wife, and Lot his brother’s son, and all their possessions that they had gathered, and the people that they had acquired in Haran, and they set out to go to the land of Canaan. When they came to the land of Canaan, '
  '6':
  - type: text
    content: 'Abram '
  - type: note
    content: '[Heb. 11:9]'
  - type: text
    content: 'passed through the land to the place at Shechem, to '
  - type: note
    content: ch. 13:18
  - type: text
    content: the oak
  - type: note
    content: Or terebinth
  - type: text
    content: ' of '
  - type: note
    content: Deut. 11:30; Judg. 7:1
  - type: text
    content: 'Moreh. At that time '
  - type: note
    content: ch. 13:7
  - type: text
    content: 'the Canaanites were in the land. '
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Abram and said, '
  - type: note
    content: ch. 13:15; 17:8; Ex. 33:1; Ps. 105:9-12; [Num. 32:11]; Gal. 3:16
  - type: text
    content: '“To your offspring I will give this land.” So he built there an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', who had appeared to him. '
  '8':
  - type: text
    content: 'From there he moved to the hill country on the east of '
  - type: note
    content: ch. 28:19
  - type: text
    content: 'Bethel and pitched his tent, with Bethel on the west and Ai on the east. And there he built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' and called upon the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: And Abram journeyed on, still going toward the Negeb.
  - type: heading
    content: Abram and Sarai in Egypt
