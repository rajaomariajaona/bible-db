  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he was about to enter Egypt, he said to Sarai his wife, “I know that you are a woman beautiful in appearance, '
  '12':
  - type: usfm
    marker: p
    children:
