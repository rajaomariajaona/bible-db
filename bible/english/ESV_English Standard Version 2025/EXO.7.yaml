document_id: EXO.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses and Aaron Before Pharaoh
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “See, I have made you like '
  - type: note
    content: ch. 4:16
  - type: text
    content: 'God to Pharaoh, and your brother Aaron shall be your '
  - type: note
    content: Gen. 20:7; [1 Sam. 9:9]
  - type: text
    content: 'prophet. '
  '10':
  - type: text
    content: 'So Moses and Aaron went to Pharaoh and did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. Aaron cast down his staff before Pharaoh and his servants, and it became a serpent. '
  '11':
  - type: text
    content: 'Then Pharaoh summoned the wise men and the sorcerers, and they, the '
  - type: note
    content: Gen. 41:8
  - type: text
    content: 'magicians of Egypt, also '
  - type: note
    content: ver. 12, 22; ch. 8:7, 18; 9:11; 2 Tim. 3:8
  - type: text
    content: 'did the same by their secret arts. '
  '12':
  - type: text
    content: 'For each man cast down his staff, and they became serpents. But Aaron’s staff swallowed up their staffs. '
  '13':
  - type: text
    content: 'Still '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Pharaoh’s heart was hardened, and he would not listen to them, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  - type: heading
    content: 'The First Plague: Water Turned to Blood'
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Pharaoh’s heart is hardened; he refuses to let the people go. '
  '15':
  - type: note
    content: ch. 8:20; 9:13
  - type: text
    content: 'Go to Pharaoh in the morning, as he is going out to the water, and stand on the bank of the Nile to meet him. Take in your hand '
  - type: note
    content: ch. 4:2, 17; 17:5
  - type: text
    content: 'the staff that turned into a '
  - type: note
    content: ch. 4:3
  - type: text
    content: 'serpent. '
  '16':
  - type: text
    content: 'And you shall say to him, ‘The '
  - type: note
    content: ch. 3:18; 5:3; 9:1, 13
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, sent me to you, saying, “Let my people go, '
  - type: note
    content: ch. 3:12, 18; 5:1, 3
  - type: text
    content: 'that they may serve me in the wilderness.” But so far, you have not obeyed. '
  '17':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', “By this '
  - type: note
    content: ver. 5
  - type: text
    content: 'you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ': behold, with the staff that is in my hand I will strike the water that is in the Nile, and '
  - type: note
    content: ch. 4:9; [Rev. 16:4]
  - type: text
    content: 'it shall turn into blood. '
  '18':
  - type: text
    content: 'The fish in the Nile shall die, and the Nile will stink, and the Egyptians will '
  - type: note
    content: ver. 21, 24
  - type: text
    content: 'grow weary of drinking water from the Nile.”’” '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Say to Aaron, ‘Take your staff and '
  - type: note
    content: ch. 8:5, 6, 16, 17; 9:22; 10:12, 21; 14:16, 21, 26
  - type: text
    content: stretch out your hand over the waters of Egypt, over their rivers, their canals, and their ponds, and all their pools of water, so that they may become blood, and there shall be blood throughout all the land of Egypt, even in vessels of wood and in vessels of stone.’”
  '2':
  - type: note
    content: '[ch. 4:15; 6:29]'
  - type: text
    content: 'You shall speak all that I command you, and your brother Aaron shall tell Pharaoh to let the people of Israel go out of his land. '
  '20':
  - type: text
    content: 'Moses and Aaron did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. In the sight of Pharaoh and in the sight of his servants he '
  - type: note
    content: ch. 17:9
  - type: text
    content: 'lifted up the staff and struck the water in the Nile, and all the '
  - type: note
    content: Ps. 78:44; 105:29
  - type: text
    content: 'water in the Nile turned into blood. '
  '21':
  - type: text
    content: 'And the fish in the Nile died, and the Nile stank, so that the Egyptians '
  - type: note
    content: ver. 18, 24
  - type: text
    content: 'could not drink water from the Nile. There was blood throughout all the land of Egypt. '
  '22':
  - type: text
    content: 'But '
  - type: note
    content: ver. 11
  - type: text
    content: 'the magicians of Egypt did the same by their secret arts. So '
  - type: note
    content: ver. 13
  - type: text
    content: 'Pharaoh’s heart remained hardened, and he would not listen to them, as '
  - type: note
    content: ver. 3, 4
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' had said. '
  '23':
  - type: text
    content: 'Pharaoh turned and went into his house, and he did not take even this to heart. '
  '24':
  - type: text
    content: And all the Egyptians dug along the Nile for water to drink, for they could not drink the water of the Nile.
  '25':
  - type: text
    content: 'Seven full days passed after the '
  - type: text
    content: Lord
  - type: text
    content: ' had struck the Nile.'
  '3':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 4:21
  - type: text
    content: 'I will harden Pharaoh’s heart, and though I '
  - type: note
    content: ch. 11:9; Ps. 135:9; See Ps. 78:43-51; 105:26-36
  - type: text
    content: 'multiply my signs and wonders in the land of Egypt, '
  '4':
  - type: text
    content: 'Pharaoh will not listen to you. Then I will lay my hand on Egypt and bring my hosts, my people the children of Israel, out of the land of Egypt by great acts of judgment. '
  '5':
  - type: text
    content: 'The Egyptians '
  - type: note
    content: ver. 17; ch. 8:10, 22; 14:4, 18
  - type: text
    content: 'shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I stretch out my hand against Egypt and bring out the people of Israel from among them.” '
  '6':
  - type: text
    content: 'Moses and Aaron did so; they did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded them. '
  '7':
  - type: text
    content: 'Now Moses was '
  - type: note
    content: '[Deut. 29:5; 31:2; 34:7; Acts 7:23, 30]'
  - type: text
    content: eighty years old, and Aaron eighty-three years old, when they spoke to Pharaoh.
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '9':
  - type: text
    content: '“When Pharaoh says to you, '
  - type: note
    content: '[Isa. 7:11; John 2:18; 4:48; 6:30]'
  - type: text
    content: '‘Prove yourselves by working a miracle,’ then you shall say to Aaron, ‘Take your staff and cast it down before Pharaoh, that it may become a serpent.’” '
