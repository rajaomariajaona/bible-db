document_id: 2SA.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Victories
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-18, see 1 Chr. 18:1-17; Ps. 60
  - type: text
    content: 'After this David defeated the Philistines and subdued them, and David took '
  - type: note
    content: '[1 Chr. 18:1]'
  - type: text
    content: Metheg-ammah out of the hand of the Philistines.
  '10':
  - type: text
    content: 'Toi sent his son Joram to King David, to ask about his health and to bless him because he had fought against Hadadezer and defeated him, for Hadadezer had often been at war with Toi. And Joram brought with him articles of silver, of gold, and of bronze. '
  '11':
  - type: note
    content: 1 Kgs. 7:51; 1 Chr. 26:26
  - type: text
    content: 'These also King David dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ', together with the silver and gold that he dedicated from all the nations he subdued, '
  '12':
  - type: text
    content: 'from Edom, '
  - type: note
    content: ver. 2
  - type: text
    content: 'Moab, '
  - type: note
    content: ch. 10:14; 12:30
  - type: text
    content: 'the Ammonites, '
  - type: note
    content: See ch. 5:17-25
  - type: text
    content: 'the Philistines, '
  - type: note
    content: 1 Sam. 30:20
  - type: text
    content: 'Amalek, and from the spoil of Hadadezer the son of Rehob, king of '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: Zobah.
  '13':
  - type: text
    content: 'And David made a name for himself when he returned from striking down 18,000 Edomites in '
  - type: note
    content: 2 Kgs. 14:7; [Josh. 15:62]
  - type: text
    content: 'the Valley of Salt. '
  '14':
  - type: text
    content: 'Then he put garrisons in Edom; throughout all Edom he put garrisons, '
  - type: note
    content: Gen. 25:23; 27:29, 37, 40; Num. 24:18
  - type: text
    content: 'and all the Edomites became David’s servants. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave victory to David wherever he went.'
  - type: heading
    content: David’s Officials
  '15':
  - type: text
    content: 'So David reigned over all Israel. And David administered justice and equity to all his people. '
  '16':
  - type: note
    content: For ver. 16-18, see ch. 20:23-26
  - type: text
    content: 'Joab the son of Zeruiah was over the army, and '
  - type: note
    content: 1 Kgs. 4:3
  - type: text
    content: 'Jehoshaphat the son of Ahilud was recorder, '
  '17':
  - type: text
    content: 'and '
  - type: note
    content: 1 Chr. 24:3, 6
  - type: text
    content: 'Zadok the son of Ahitub and Ahimelech the son of Abiathar were priests, and '
  - type: note
    content: '[1 Chr. 18:16]'
  - type: text
    content: 'Seraiah was secretary, '
  '18':
  - type: text
    content: 'and '
  - type: note
    content: 1 Kgs. 4:4; [ch. 23:20-23]
  - type: text
    content: Benaiah the son of Jehoiada was over
  - type: note
    content: Compare 20:23, 1 Chronicles 18:17, Syriac, Targum, Vulgate; Hebrew lacks was over
  - type: text
    content: ' the '
  - type: note
    content: ch. 15:18; 20:7; 1 Sam. 30:14; 1 Kgs. 1:38
  - type: text
    content: Cherethites and the Pelethites, and David’s sons were priests.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Num. 24:17
  - type: text
    content: 'And he defeated Moab and he measured them with a line, making them lie down on the ground. Two lines he measured to be put to death, and one full line to be spared. And the Moabites '
  - type: note
    content: ver. 6, 14; [Ps. 60:8]
  - type: text
    content: 'became servants to David and '
  - type: note
    content: '[1 Sam. 10:27; 2 Kgs. 17:3; Ps. 72:10]'
  - type: text
    content: brought tribute.
  '3':
  - type: text
    content: 'David also defeated '
  - type: note
    content: '[ch. 10:16, 19; 1 Chr. 18:3]'
  - type: text
    content: 'Hadadezer the son of Rehob, king of '
  - type: note
    content: ch. 10:6; 1 Sam. 14:47; 1 Kgs. 11:23
  - type: text
    content: 'Zobah, as he went to restore his power at the river Euphrates. '
  '4':
  - type: note
    content: '[1 Chr. 18:4]'
  - type: text
    content: 'And David took from him 1,700 horsemen, and 20,000 foot soldiers. And David '
  - type: note
    content: See Josh. 11:6
  - type: text
    content: 'hamstrung all the chariot horses but left enough for 100 chariots. '
  '5':
  - type: note
    content: '[1 Kgs. 11:23-25]'
  - type: text
    content: 'And when the '
  - type: note
    content: See Josh. 11:6
  - type: text
    content: 'Syrians of Damascus came to help '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Hadadezer king of '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Zobah, David struck down 22,000 men of the Syrians. '
  '6':
  - type: text
    content: 'Then David put garrisons in Aram of Damascus, and the Syrians '
  - type: note
    content: ver. 2, 14
  - type: text
    content: 'became servants to David and brought tribute. '
  - type: note
    content: ver. 14
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave victory to David wherever he went. '
  '7':
  - type: text
    content: 'And David took '
  - type: note
    content: '[2 Kgs. 11:10; 2 Chr. 23:9; Song 4:4]'
  - type: text
    content: 'the shields of gold that were carried by the servants of Hadadezer and brought them to Jerusalem. '
  '8':
  - type: text
    content: And from Betah and from Berothai, cities of Hadadezer, King David took very much bronze.
  '9':
  - type: text
    content: 'When Toi king of '
  - type: note
    content: 1 Kgs. 8:65; 2 Kgs. 18:34
  - type: text
    content: 'Hamath heard that David had defeated the whole army of Hadadezer, '
