document_id: PHP.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Paul and Timothy, servants
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' of Christ Jesus,'
  - type: text
    content: 'To all the '
  - type: note
    content: 2 Cor. 1:1; Col. 1:2
  - type: text
    content: 'saints in Christ Jesus who are at Philippi, with the '
  - type: note
    content: See Acts 20:28
  - type: text
    content: overseers
  - type: note
    content: Or bishops; Greek episkopoi
  - type: text
    content: ' and '
  - type: note
    content: 1 Tim. 3:8, 12
  - type: text
    content: 'deacons:'
  - type: note
    content: Or servants, or ministers; Greek diakonoi
  '10':
  - type: text
    content: 'so that you may approve what is excellent, '
  - type: note
    content: Acts 24:16; 1 Thess. 3:13; 5:23
  - type: text
    content: 'and so be pure and blameless '
  - type: note
    content: ver. 6
  - type: text
    content: 'for the day of Christ, '
  '11':
  - type: text
    content: 'filled '
  - type: note
    content: '[Col. 1:6, 10]; See James 3:18'
  - type: text
    content: 'with the fruit of righteousness that comes '
  - type: note
    content: '[John 15:4, 5]'
  - type: text
    content: 'through Jesus Christ, '
  - type: note
    content: See Eph. 1:12, 14
  - type: text
    content: to the glory and praise of God.
  - type: heading
    content: The Advance of the Gospel
  '12':
  - type: text
    content: I want you to know, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verse 14
  - type: text
    content: ' that what has happened to me has really '
  - type: note
    content: ver. 25; 1 Tim. 4:15
  - type: text
    content: 'served to advance the gospel, '
  '13':
  - type: text
    content: so that it has become known throughout the whole imperial guard
  - type: note
    content: Greek in the whole praetorium
  - type: text
    content: ' and '
  - type: note
    content: '[Acts 28:30, 31; 2 Tim. 2:9]'
  - type: text
    content: 'to all the rest that '
  - type: note
    content: '[Luke 21:13]; See ver. 7'
  - type: text
    content: 'my imprisonment is for Christ. '
  '14':
  - type: text
    content: 'And most of the brothers, having become confident in the Lord by my imprisonment, are much more bold '
  - type: note
    content: '[Acts 4:31]'
  - type: text
    content: to speak the word
  - type: note
    content: Some manuscripts add of God
  - type: text
    content: ' without fear.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: See 2 Cor. 11:13
  - type: text
    content: 'Some indeed preach Christ from envy and rivalry, but others from good will. '
  '16':
  - type: text
    content: 'The latter do it out of love, '
  - type: note
    content: '[1 Cor. 9:17]'
  - type: text
    content: 'knowing that I am put here for '
  - type: note
    content: ver. 7
  - type: text
    content: 'the defense of the gospel. '
  '17':
  - type: text
    content: 'The former proclaim Christ '
  - type: note
    content: ch. 2:3; See James 3:14
  - type: text
    content: 'out of selfish ambition, not sincerely but thinking to afflict me in my imprisonment. '
  '18':
  - type: text
    content: What then? Only that in every way, whether in pretense or in truth, Christ is proclaimed, and in that I rejoice.
  - type: heading
    content: To Live Is Christ
  - type: text
    content: 'Yes, and I will rejoice, '
  '19':
  - type: text
    content: 'for I know that '
  - type: note
    content: See 2 Cor. 1:11
  - type: text
    content: 'through your prayers and '
  - type: note
    content: Gal. 3:5
  - type: text
    content: 'the help of '
  - type: note
    content: See Acts 16:7
  - type: text
    content: 'the Spirit of Jesus Christ this will turn out for my deliverance, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Rom. 1:7; 1 Cor. 1:3
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Thanksgiving and Prayer
  '20':
  - type: text
    content: 'as it is my eager expectation and hope '
  - type: note
    content: Rom. 5:5; [Joel 2:27; 2 Tim. 2:15]
  - type: text
    content: 'that I will not be at all ashamed, but that with full '
  - type: note
    content: See Acts 4:13
  - type: text
    content: 'courage now as always Christ '
  - type: note
    content: '[1 Cor. 6:20]'
  - type: text
    content: 'will be honored in my body, '
  - type: note
    content: Rom. 14:8
  - type: text
    content: 'whether by life or by death. '
  '21':
  - type: text
    content: 'For to me '
  - type: note
    content: '[Gal. 2:20]'
  - type: text
    content: 'to live is Christ, and to die is gain. '
  '22':
  - type: text
    content: 'If I am to live in the flesh, that means fruitful labor for me. Yet which I shall choose I cannot tell. '
  '23':
  - type: note
    content: '[2 Cor. 5:8]'
  - type: text
    content: 'I am hard pressed between the two. My desire is '
  - type: note
    content: 2 Tim. 4:6
  - type: text
    content: 'to depart and '
  - type: note
    content: See John 12:26
  - type: text
    content: 'be with Christ, for that is far better. '
  '24':
  - type: text
    content: 'But to remain in the flesh is more necessary on your account. '
  '25':
  - type: note
    content: '[ch. 2:24]'
  - type: text
    content: 'Convinced of this, '
  - type: note
    content: '[Acts 20:25]'
  - type: text
    content: 'I know that I will remain and continue with you all, for your '
  - type: note
    content: ver. 12
  - type: text
    content: 'progress and '
  - type: note
    content: Rom. 15:13
  - type: text
    content: 'joy in the faith, '
  '26':
  - type: text
    content: 'so that in me '
  - type: note
    content: See 2 Cor. 1:14
  - type: text
    content: you may have ample cause to glory in Christ Jesus, because of my coming to you again.
  '27':
  - type: text
    content: 'Only '
  - type: note
    content: '[ch. 3:20]'
  - type: text
    content: 'let your manner of life be '
  - type: note
    content: See Eph. 4:1
  - type: text
    content: worthy
  - type: note
    content: Greek Only behave as citizens worthy
  - type: text
    content: ' of the gospel of Christ, so that whether I come and see you or am absent, I may hear of you '
  - type: note
    content: See 1 Cor. 16:13
  - type: text
    content: 'that you are standing firm in one spirit, with '
  - type: note
    content: '[ch. 2:2; 1 Cor. 1:10]'
  - type: text
    content: 'one mind '
  - type: note
    content: Jude 3
  - type: text
    content: 'striving side by side for the faith of the gospel, '
  '28':
  - type: text
    content: 'and not frightened in anything by your opponents. This is '
  - type: note
    content: '[2 Thess. 1:5]'
  - type: text
    content: 'a clear sign to them of their destruction, but '
  - type: note
    content: See Acts 14:22
  - type: text
    content: 'of your salvation, and that from God. '
  '29':
  - type: text
    content: 'For '
  - type: note
    content: See Matt. 5:12
  - type: text
    content: 'it has been granted to you that for the sake of Christ you should not only believe in him but also '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'suffer for his sake, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 1:8
  - type: text
    content: 'I thank my God '
  - type: note
    content: Rom. 1:9; Eph. 1:16; 2 Tim. 1:3
  - type: text
    content: 'in all my remembrance of you, '
  '30':
  - type: text
    content: 'engaged in the same '
  - type: note
    content: Col. 1:29; 2:1; 1 Tim. 6:12; 2 Tim. 4:7; [Heb. 10:32]
  - type: text
    content: 'conflict that '
  - type: note
    content: Acts 16:19-40; 1 Thess. 2:2
  - type: text
    content: you saw I had and now hear that I still have.
  '4':
  - type: text
    content: 'always in every prayer of mine for you all making my prayer with joy, '
  '5':
  - type: note
    content: '[ch. 2:12; 4:15; Acts 16:12-40]'
  - type: text
    content: 'because of your partnership in the gospel from the first day until now. '
  '6':
  - type: text
    content: 'And I am sure of this, that he who began '
  - type: note
    content: '[1 Thess. 1:3]'
  - type: text
    content: 'a good work in you '
  - type: note
    content: Ps. 57:2 (Heb.); 138:8; [1 Thess. 5:24]
  - type: text
    content: 'will bring it to completion at '
  - type: note
    content: See 1 Cor. 1:8
  - type: text
    content: 'the day of Jesus Christ. '
  '7':
  - type: text
    content: 'It is right for me to feel this way about you all, because I hold you '
  - type: note
    content: 2 Cor. 7:3
  - type: text
    content: 'in my heart, for you are all '
  - type: note
    content: '[ch. 4:14]'
  - type: text
    content: partakers with me of grace,
  - type: note
    content: Or you all have fellowship with me in grace
  - type: text
    content: ' both '
  - type: note
    content: Acts 20:23; 26:29; Col. 4:18; 2 Tim. 2:9; Philem. 10, 13; See Eph. 3:1
  - type: text
    content: 'in my imprisonment and in '
  - type: note
    content: ver. 16
  - type: text
    content: 'the defense and confirmation of the gospel. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: See Rom. 1:9; 9:1
  - type: text
    content: 'God is my witness, '
  - type: note
    content: '[ch. 4:1; Rom. 1:11; 15:23; 1 Thess. 3:6; 2 Tim. 1:4]'
  - type: text
    content: 'how I yearn for you all with the affection of Christ Jesus. '
  '9':
  - type: text
    content: 'And it is my prayer that '
  - type: note
    content: 1 Thess. 3:12; 2 Thess. 1:3
  - type: text
    content: 'your love may abound more and more, '
  - type: note
    content: Col. 1:9; 3:10; Philem. 6
  - type: text
    content: 'with knowledge and all discernment, '
