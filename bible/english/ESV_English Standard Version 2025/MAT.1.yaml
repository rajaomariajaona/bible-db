document_id: MAT.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Genealogy of Jesus Christ
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 3:23-38 ]'
  - type: text
    content: 'The book of the genealogy of Jesus Christ, '
  - type: note
    content: 2 Sam. 7:12-16; Ps. 132:11; Isa. 11:1; Jer. 23:5; Luke 1:32, 69; John 7:42; Acts 2:30; 13:23; Rom. 1:3; 2 Tim. 2:8; Rev. 22:16
  - type: text
    content: 'the son of David, '
  - type: note
    content: Gen. 22:18; Gal. 3:16
  - type: text
    content: the son of Abraham.
  '10':
  - type: text
    content: and Hezekiah the father of Manasseh, and Manasseh the father of Amos,
  - type: note
    content: Amos is probably an alternate spelling of Amon; some manuscripts Amon; twice in this verse
  - type: text
    content: ' and Amos the father of Josiah, '
  '11':
  - type: text
    content: 'and '
  - type: note
    content: 1 Chr. 3:15, 16
  - type: text
    content: 'Josiah the father of '
  - type: note
    content: Esth. 2:6; Jer. 24:1; 27:20
  - type: text
    content: Jechoniah and his brothers, at the time of the deportation to Babylon.
  '12':
  - type: text
    content: 'And after the deportation to Babylon: '
  - type: note
    content: 1 Chr. 3:17-19
  - type: text
    content: 'Jechoniah was the father of '
  - type: note
    content: Luke 3:27
  - type: text
    content: Shealtiel,
  - type: note
    content: Greek Salathiel; twice in this verse
  - type: text
    content: ' and '
  - type: note
    content: Ezra 3:2
  - type: text
    content: 'Shealtiel the father of Zerubbabel, '
  '13':
  - type: text
    content: 'and Zerubbabel the father of Abiud, and Abiud the father of Eliakim, and Eliakim the father of Azor, '
  '14':
  - type: text
    content: 'and Azor the father of Zadok, and Zadok the father of Achim, and Achim the father of Eliud, '
  '15':
  - type: text
    content: 'and Eliud the father of Eleazar, and Eleazar the father of Matthan, and Matthan the father of Jacob, '
  '16':
  - type: text
    content: 'and Jacob the father of '
  - type: note
    content: Luke 3:23
  - type: text
    content: Joseph the husband of Mary, of whom Jesus was born, who is called Christ.
  '17':
  - type: text
    content: 'So all the generations from Abraham to David were fourteen generations, and from David to the deportation to Babylon fourteen generations, and from the deportation to Babylon to '
  - type: note
    content: ch. 2:4; 11:2; 16:16; 22:42; 23:10; Mark 8:29; Luke 3:15; [John 1:41; 4:25]
  - type: text
    content: the Christ fourteen generations.
  - type: heading
    content: The Birth of Jesus Christ
  '18':
  - type: text
    content: 'Now the birth of '
  - type: note
    content: ver. 1; Mark 1:1; John 1:17; 17:3; [ver. 16]
  - type: text
    content: Jesus Christ
  - type: note
    content: Some manuscripts of the Christ
  - type: text
    content: ' took place in this way. '
  - type: note
    content: Luke 1:27
  - type: text
    content: When his mother Mary had been betrothed
  - type: note
    content: That is, legally pledged to be married
  - type: text
    content: ' to Joseph, before they came together she was found to be with child '
  - type: note
    content: Luke 1:35
  - type: text
    content: 'from the Holy Spirit. '
  '19':
  - type: text
    content: 'And her husband Joseph, being a just man and unwilling '
  - type: note
    content: '[Deut. 24:1]'
  - type: text
    content: 'to put her to shame, resolved to divorce her quietly. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Gen. 21:3
  - type: text
    content: 'Abraham was the father of Isaac, and '
  - type: note
    content: Gen. 25:26
  - type: text
    content: 'Isaac the father of Jacob, and '
  - type: note
    content: Gen. 29:35
  - type: text
    content: 'Jacob the father of Judah and his brothers, '
  '20':
  - type: text
    content: 'But as he considered these things, behold, '
  - type: note
    content: ch. 2:13, 19; [ch. 2:12, 22]
  - type: text
    content: 'an angel of the Lord appeared to him in a dream, saying, “Joseph, son of David, do not fear to take Mary as your wife, for that which is conceived in her is from the Holy Spirit. '
  '21':
  - type: text
    content: 'She will bear a son, and '
  - type: note
    content: ver. 25; Luke 1:31; 2:21
  - type: text
    content: 'you shall call his name Jesus, '
  - type: note
    content: Luke 2:11; Acts 4:12; 5:31; 13:23, 38; [Acts 3:26]
  - type: text
    content: 'for he will save his people from their sins.” '
  '22':
  - type: note
    content: ch. 21:4; 26:56; John 19:36
  - type: text
    content: 'All this took place '
  - type: note
    content: ch. 2:15, 23; 4:14; Mark 14:49
  - type: text
    content: 'to fulfill what the Lord had spoken by the prophet:'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cited from Isa. 7:14
  - type: text
    content: “Behold, the virgin shall conceive and bear a son,
  - type: text
    content: 'and they shall call his name '
  - type: note
    content: Isa. 8:8, 10
  - type: text
    content: Immanuel”
  - type: text
    content: '(which means, God '
  - type: note
    content: See ch. 28:20
  - type: text
    content: 'with us). '
  '24':
  - type: text
    content: 'When Joseph woke from sleep, he did as the angel of the Lord commanded him: he took his wife, '
  '25':
  - type: text
    content: 'but knew her not until she had given birth to a son. And '
  - type: note
    content: ver. 21
  - type: text
    content: he called his name Jesus.
  '3':
  - type: text
    content: 'and '
  - type: note
    content: '[Ruth 4:18-22; 1 Chr. 2:1-15]'
  - type: text
    content: Judah the father of Perez and Zerah by Tamar, and Perez the father of Hezron, and Hezron the father of Ram,
  - type: note
    content: Greek Aram; also verse 4
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'and Ram the father of Amminadab, and Amminadab the father of Nahshon, and Nahshon the father of Salmon, '
  '5':
  - type: text
    content: 'and Salmon the father of Boaz by '
  - type: note
    content: Josh. 6:25
  - type: text
    content: 'Rahab, and Boaz the father of Obed by Ruth, and Obed the father of Jesse, '
  '6':
  - type: text
    content: 'and '
  - type: note
    content: 1 Sam. 16:1; 17:12
  - type: text
    content: Jesse the father of David the king.
  - type: text
    content: 'And '
  - type: note
    content: 2 Sam. 12:24
  - type: text
    content: 'David was the father of Solomon by '
  - type: note
    content: 2 Sam. 12:10
  - type: text
    content: 'the wife of Uriah, '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: For ver. 7-10, see 1 Chr. 3:10-14
  - type: text
    content: Solomon the father of Rehoboam, and Rehoboam the father of Abijah, and Abijah the father of Asaph,
  - type: note
    content: Asaph is probably an alternate spelling of Asa; some manuscripts Asa; also verse 8
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'and Asaph the father of Jehoshaphat, and Jehoshaphat the father of Joram, '
  - type: note
    content: '[2 Kgs. 15:1; 1 Chr. 3:11, 12]'
  - type: text
    content: 'and Joram the father of Uzziah, '
  '9':
  - type: text
    content: 'and Uzziah the father of Jotham, and Jotham the father of Ahaz, and Ahaz the father of Hezekiah, '
