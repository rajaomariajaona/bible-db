document_id: GEN.37,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Dreams
  - type: text
    content: 'Jacob lived in '
  - type: note
    content: See ch. 36:7
  - type: text
    content: the land of his father’s sojournings, in the land of Canaan.
  '10':
  - type: text
    content: 'But when he told it to his father and to his brothers, his father rebuked him and said to him, “What is this dream that you have dreamed? Shall I and '
  - type: note
    content: '[ch. 35:18]'
  - type: text
    content: 'your mother and your brothers indeed come '
  - type: note
    content: ver. 7, 9
  - type: text
    content: 'to bow ourselves to the ground before you?” '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Acts 7:9
  - type: text
    content: 'his brothers were jealous of him, '
  - type: note
    content: '[Luke 2:19, 51]'
  - type: text
    content: but his father kept the saying in mind.
  - type: heading
    content: Joseph Sold by His Brothers
  '12':
  - type: text
    content: 'Now his brothers went to pasture their father’s flock near '
  - type: note
    content: See ch. 33:18
  - type: text
    content: 'Shechem. '
  '13':
  - type: text
    content: 'And Israel said to Joseph, “Are not your brothers pasturing the flock at Shechem? Come, I will send you to them.” And he said to him, “Here I am.” '
  '14':
  - type: text
    content: 'So he said to him, “Go now, see if it is well with your brothers and with the flock, and bring me word.” So he sent him from the Valley of '
  - type: note
    content: ch. 13:18; 35:27
  - type: text
    content: 'Hebron, and he came to Shechem. '
  '15':
  - type: text
    content: 'And a man found him wandering in the fields. And the man asked him, “What are you seeking?” '
  '16':
  - type: text
    content: '“I am seeking my brothers,” he said. “Tell me, please, where they are pasturing the flock.” '
  '17':
  - type: text
    content: 'And the man said, “They have gone away, for I heard them say, ‘Let us go to '
  - type: note
    content: 2 Kgs. 6:13
  - type: text
    content: 'Dothan.’” So Joseph went after his brothers and found them at '
  - type: note
    content: 2 Kgs. 6:13
  - type: text
    content: Dothan.
  '18':
  - type: text
    content: 'They saw him from afar, and before he came near to them '
  - type: note
    content: '[Ps. 37:12, 32]'
  - type: text
    content: 'they conspired against him to kill him. '
  '19':
  - type: text
    content: 'They said to one another, “Here comes this dreamer. '
  '2':
  - type: text
    content: These are the generations of Jacob.
  - type: text
    content: 'Joseph, being seventeen years old, was pasturing the flock with his brothers. He was a boy with the sons of Bilhah and Zilpah, his father’s wives. And Joseph brought '
  - type: note
    content: '[1 Sam. 2:23, 24]'
  - type: text
    content: 'a bad report of them to their father. '
  '20':
  - type: text
    content: 'Come now, '
  - type: note
    content: ver. 26
  - type: text
    content: let us kill him and throw him into one of the pits.
  - type: note
    content: Or cisterns; also verses 22, 24
  - type: text
    content: ' Then we will say that a fierce animal has devoured him, and we will see what will become of his dreams.” '
  '21':
  - type: text
    content: 'But when '
  - type: note
    content: ch. 42:22
  - type: text
    content: 'Reuben heard it, he rescued him out of their hands, saying, “Let us not take his life.” '
  '22':
  - type: text
    content: And Reuben said to them, “Shed no blood; throw him into this pit here in the wilderness, but do not lay a hand on him”—
  - type: note
    content: ver. 29, 30
  - type: text
    content: 'that he might rescue him out of their hand to restore him to his father. '
  '23':
  - type: text
    content: 'So when Joseph came to his brothers, they stripped him of his robe, '
  - type: note
    content: ver. 3
  - type: text
    content: 'the robe of many colors that he wore. '
  '24':
  - type: text
    content: 'And they took him and '
  - type: note
    content: '[Jer. 38:6; Lam. 3:53]'
  - type: text
    content: threw him into a pit. The pit was empty; there was no water in it.
  '25':
  - type: text
    content: 'Then they sat down to eat. And looking up they saw a '
  - type: note
    content: Job 6:19; Isa. 21:13
  - type: text
    content: 'caravan of '
  - type: note
    content: '[ver. 28, 36; ch. 39:1]'
  - type: text
    content: 'Ishmaelites coming from Gilead, with their camels bearing '
  - type: note
    content: ch. 43:11; Jer. 8:22; 46:11
  - type: text
    content: 'gum, balm, and myrrh, on their way to carry it down to Egypt. '
  '26':
  - type: text
    content: 'Then Judah said to his brothers, “What profit is it '
  - type: note
    content: ver. 20
  - type: text
    content: 'if we kill our brother and conceal his blood? '
  '27':
  - type: text
    content: 'Come, let us sell him to the Ishmaelites, and '
  - type: note
    content: '[1 Sam. 18:17]'
  - type: text
    content: 'let not our hand be upon him, for he is our brother, our own flesh.” And his brothers listened to him. '
  '28':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 36; Judg. 8:22, 24
  - type: text
    content: 'Midianite traders passed by. And they drew Joseph up and lifted him out of the pit, and '
  - type: note
    content: ch. 45:4; Ps. 105:17; Acts 7:9
  - type: text
    content: sold him to the Ishmaelites for twenty shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver. They took Joseph to Egypt.'
  '29':
  - type: text
    content: 'When Reuben returned to the pit and saw that Joseph was not in the pit, he '
  - type: note
    content: ch. 44:13; Num. 14:6; 2 Sam. 1:11; 3:31; Job 1:20
  - type: text
    content: 'tore his clothes '
  '3':
  - type: text
    content: 'Now Israel loved Joseph more than any other of his sons, because he was '
  - type: note
    content: ch. 44:20
  - type: text
    content: 'the son of his old age. And he made him '
  - type: note
    content: ver. 23, 32
  - type: text
    content: a robe of many colors.
  - type: note
    content: See Septuagint, Vulgate; or (with Syriac) a robe with long sleeves. The meaning of the Hebrew is uncertain; also verses 23, 32
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'and returned to his brothers and said, “The boy '
  - type: note
    content: ch. 42:13, 32, 36; 44:31; Jer. 31:15; Lam. 5:7
  - type: text
    content: 'is gone, and I, where shall I go?” '
  '31':
  - type: text
    content: 'Then they took '
  - type: note
    content: ver. 23
  - type: text
    content: 'Joseph’s robe and slaughtered a goat and dipped the robe in the blood. '
  '32':
  - type: text
    content: 'And they sent the robe of many colors and brought it to their father and said, “This we have found; please identify whether it is your son’s robe or not.” '
  '33':
  - type: text
    content: 'And he identified it and said, “It is my son’s robe. '
  - type: note
    content: ver. 20; ch. 44:28
  - type: text
    content: 'A fierce animal has devoured him. Joseph is without doubt torn to pieces.” '
  '34':
  - type: text
    content: 'Then Jacob tore his garments and put sackcloth on his loins and mourned for his son many days. '
  '35':
  - type: text
    content: 'All his sons and all his daughters '
  - type: note
    content: '[2 Sam. 12:17]'
  - type: text
    content: 'rose up to comfort him, but he refused to be comforted and said, “No, '
  - type: note
    content: ch. 42:38; 44:29, 31
  - type: text
    content: 'I shall go down to Sheol to my son, mourning.” Thus his father wept for him. '
  '36':
  - type: text
    content: 'Meanwhile '
  - type: note
    content: ver. 28; [ver. 25; ch. 39:1]
  - type: text
    content: 'the Midianites had sold him in Egypt to Potiphar, an officer of Pharaoh, '
  - type: note
    content: ch. 40:3, 4; 41:10, 12
  - type: text
    content: the captain of the guard.
  '4':
  - type: text
    content: But when his brothers saw that their father loved him more than all his brothers, they hated him and could not speak peacefully to him.
  '5':
  - type: text
    content: 'Now Joseph had a dream, and when he told it to his brothers they hated him even more. '
  '6':
  - type: text
    content: 'He said to them, “Hear this dream that I have dreamed: '
  '7':
  - type: text
    content: 'Behold, we were binding sheaves in the field, and behold, '
  - type: note
    content: ch. 42:6, 9
  - type: text
    content: 'my sheaf arose and stood upright. And behold, your sheaves gathered around it and '
  - type: note
    content: ch. 43:26; 44:14
  - type: text
    content: 'bowed down to my sheaf.” '
  '8':
  - type: text
    content: His brothers said to him, “Are you indeed to reign over us? Or are you indeed to rule over us?” So they hated him even more for his dreams and for his words.
  '9':
  - type: text
    content: 'Then he dreamed another dream and told it to his brothers and said, “Behold, I have dreamed another dream. Behold, the sun, the moon, and eleven stars were bowing down to me.” '
