document_id: NUM.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Unclean People
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'Each one shall keep his holy donations: whatever anyone gives to the priest shall be his.”'
  - type: heading
    content: A Test for Adultery
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '12':
  - type: text
    content: '“Speak to the people of Israel, If any man’s wife goes astray and breaks faith with him, '
  '13':
  - type: text
    content: 'if a man '
  - type: note
    content: Lev. 18:20
  - type: text
    content: 'lies with her sexually, and it is hidden from the eyes of her husband, and she is undetected though she has defiled herself, and there is no witness against her, '
  - type: note
    content: John 8:4
  - type: text
    content: 'since she was not taken in the act, '
  '14':
  - type: text
    content: 'and if the spirit of jealousy comes over him and he is jealous of his wife who has defiled herself, or if the spirit of jealousy comes over him and he is jealous of his wife, though she has not defiled herself, '
  '15':
  - type: text
    content: then the man shall bring his wife to the priest and bring the offering required of her, a tenth of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of barley flour. '
  - type: note
    content: '[Lev. 2:1, 15; 5:11]'
  - type: text
    content: 'He shall pour no oil on it and put no frankincense on it, for it is a grain offering of jealousy, a grain offering of remembrance, '
  - type: note
    content: 1 Kgs. 17:18; Ezek. 29:16
  - type: text
    content: bringing iniquity to remembrance.
  '16':
  - type: text
    content: '“And the priest shall bring her near and set her before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'And the priest shall take holy water in an earthenware vessel and take some of the dust that is on the floor of the tabernacle and put it into the water. '
  '18':
  - type: text
    content: 'And the priest shall set the woman before the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: '[1 Cor. 11:5-7]'
  - type: text
    content: 'unbind the hair of the woman’s head and place in her hands the grain offering of remembrance, which is the grain offering of jealousy. And in his hand the priest shall have the water of bitterness that brings the curse. '
  '19':
  - type: text
    content: 'Then the priest shall make her take an oath, saying, ‘If no man has lain with you, and if you have not turned aside to uncleanness while you were under your husband’s authority, be free from this water of bitterness that brings the curse. '
  '2':
  - type: text
    content: '“Command the people of Israel that they '
  - type: note
    content: ch. 12:14; Lev. 13:46
  - type: text
    content: put out of the camp everyone who is leprous
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' or has '
  - type: note
    content: Lev. 15:2
  - type: text
    content: 'a discharge and everyone who is '
  - type: note
    content: ch. 9:6, 10; 19:11, 13; 31:19; Lev. 21:1; [Hag. 2:13]
  - type: text
    content: 'unclean through contact with the dead. '
  '20':
  - type: text
    content: 'But if you have gone astray, though you are under your husband’s authority, and if you have defiled yourself, and some man other than your husband has lain with you, '
  '21':
  - type: text
    content: 'then’ (let the priest make the woman take the oath of the curse, and say to the woman) '
  - type: note
    content: '[Jer. 29:22]'
  - type: text
    content: '‘the '
  - type: text
    content: Lord
  - type: text
    content: ' make you a curse and an oath among your people, when the '
  - type: text
    content: Lord
  - type: text
    content: ' makes your thigh fall away and your body swell. '
  '22':
  - type: text
    content: 'May this water that brings the curse '
  - type: note
    content: Ps. 109:18
  - type: text
    content: 'pass into your bowels and make your womb swell and your thigh fall away.’ And the woman shall say, '
  - type: note
    content: See Deut. 27:15-26
  - type: text
    content: ‘Amen, Amen.’
  '23':
  - type: text
    content: '“Then the priest shall write these curses in a book and wash them off into the water of bitterness. '
  '24':
  - type: text
    content: 'And he shall make the woman drink the water of bitterness that brings the curse, and the water that brings the curse shall enter into her and cause bitter pain. '
  '25':
  - type: text
    content: 'And the priest shall take the grain offering of jealousy out of the woman’s hand '
  - type: note
    content: '[Lev. 8:27]'
  - type: text
    content: 'and shall wave the grain offering before the '
  - type: text
    content: Lord
  - type: text
    content: ' and bring it to the altar. '
  '26':
  - type: text
    content: 'And the priest '
  - type: note
    content: Lev. 2:2, 9; 5:12
  - type: text
    content: 'shall take a handful of the grain offering, as its memorial portion, and burn it on the altar, and afterward shall make the woman drink the water. '
  '27':
  - type: text
    content: 'And when he has made her drink the water, then, if she has defiled herself and has broken faith with her husband, the water that brings the curse shall enter into her and cause bitter pain, and her womb shall swell, and her thigh shall fall away, and the woman '
  - type: note
    content: Deut. 28:37; Jer. 24:9; 29:18, 22; 42:18; 44:12; Zech. 8:13
  - type: text
    content: 'shall become a curse among her people. '
  '28':
  - type: text
    content: But if the woman has not defiled herself and is clean, then she shall be free and shall conceive children.
  '29':
  - type: text
    content: '“This is the law in cases of jealousy, when a wife, '
  - type: note
    content: ver. 19, 20
  - type: text
    content: 'though under her husband’s authority, goes astray and defiles herself, '
  '3':
  - type: text
    content: 'You shall put out both male and female, putting them outside the camp, that they may not defile their camp, '
  - type: note
    content: See Lev. 26:11, 12
  - type: text
    content: 'in the midst of which I dwell.” '
  '30':
  - type: text
    content: 'or when the spirit of jealousy comes over a man and he is jealous of his wife. Then he shall set the woman before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the priest shall carry out for her all this law. '
  '31':
  - type: text
    content: 'The man shall be free from iniquity, but the woman '
  - type: note
    content: Lev. 20:17, 19, 20
  - type: text
    content: shall bear her iniquity.”
  '4':
  - type: text
    content: 'And the people of Israel did so, and put them outside the camp; as the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, so the people of Israel did.'
  - type: heading
    content: Confession and Restitution
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '6':
  - type: text
    content: '“Speak to the people of Israel, '
  - type: note
    content: Lev. 6:2, 3
  - type: text
    content: 'When a man or woman commits any of the sins that people commit by breaking faith with the '
  - type: text
    content: Lord
  - type: text
    content: ', and that person realizes his guilt, '
  '7':
  - type: note
    content: Lev. 5:5; 26:40; [Josh. 7:19]
  - type: text
    content: he shall confess his sin that he has committed.
  - type: note
    content: Hebrew they shall confess their sin that they have committed
  - type: text
    content: ' '
  - type: note
    content: Lev. 6:5
  - type: text
    content: 'And he shall make full restitution for his wrong, adding a fifth to it and giving it to him to whom he did the wrong. '
  '8':
  - type: text
    content: 'But if the man has no next of kin to whom restitution may be made for the wrong, the restitution for wrong shall go to the '
  - type: text
    content: Lord
  - type: text
    content: ' for the priest, in addition to '
  - type: note
    content: Lev. 6:6, 7
  - type: text
    content: 'the ram of atonement with which atonement is made for him. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: ch. 18:19; Ex. 29:28; Lev. 6:17, 18; 7:6, 7, 9, 10, 14; Deut. 18:3, 4
  - type: text
    content: 'every contribution, all the holy donations of the people of Israel, which they bring to the priest, shall be his. '
