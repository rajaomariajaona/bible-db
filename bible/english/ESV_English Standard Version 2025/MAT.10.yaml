document_id: MAT.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Twelve Apostles
  - type: text
    content: ' '
  - type: note
    content: Mark 3:13-15; 6:7-13; Luke 6:13; 9:1, 2
  - type: text
    content: 'And he called to him his twelve disciples and gave them authority over unclean spirits, to cast them out, and to heal every disease and every affliction. '
  '10':
  - type: text
    content: no bag for your journey, or two tunics
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' '
  - type: text
    content: 'or sandals or a staff, for '
  - type: note
    content: 1 Tim. 5:18; [1 Cor. 9:4, 7-14]
  - type: text
    content: the laborer deserves his food.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And whatever town or village you enter, find out who is worthy in it and stay there until you depart.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'As you enter the house, '
  - type: note
    content: '[1 Sam. 25:6; 1 Chr. 12:18]'
  - type: text
    content: greet it.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And if the house is '
  - type: note
    content: '[ch. 8:8; Acts 16:15]'
  - type: text
    content: 'worthy, let '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'your peace come upon it, but if it is not worthy, let '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: your peace return to you.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And if anyone will not receive you or listen to your words, '
  - type: note
    content: Acts 13:51; [Neh. 5:13; Acts 18:6]
  - type: text
    content: shake off the dust from your feet when you leave that house or town.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Truly, I say to you, '
  - type: note
    content: ch. 11:24
  - type: text
    content: 'it will be more bearable on the day of judgment for '
  - type: note
    content: Gen. 18:20; 19:28; 2 Pet. 2:6
  - type: text
    content: the land of Sodom and Gomorrah than for that town.
  - type: heading
    content: Persecution Will Come
  '16':
  - type: text
    content: ' '
  - type: note
    content: Luke 10:3; [ John 17:18 ]
  - type: text
    content: '“Behold, I am sending you out as sheep in the midst of wolves, so be '
  - type: note
    content: Gen. 3:1
  - type: text
    content: 'wise as serpents and '
  - type: note
    content: Rom. 16:19 (Gk.); Phil. 2:15; [ 1 Cor. 14:20 ]
  - type: text
    content: innocent as doves.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Beware of men, for '
  - type: note
    content: See Mark 13:9, 11; Luke 12:11, 12
  - type: text
    content: 'they will deliver you over to courts and flog you '
  - type: note
    content: See ch. 23:34
  - type: text
    content: in their synagogues,
  - type: text
    content: ' '
  '18':
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'and you will be dragged before governors and kings for my sake, '
  - type: note
    content: See ch. 8:4
  - type: text
    content: to bear witness before them and the Gentiles.
  - type: text
    content: ' '
  '19':
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'When '
  - type: note
    content: For ver. 19-22, [Mark 13:11-13; Luke 21:12-19; 2 Tim. 4:16, 17]
  - type: text
    content: 'they deliver you over, '
  - type: note
    content: See ch. 6:25
  - type: text
    content: 'do not be anxious how you are to speak or what you are to say, for '
  - type: note
    content: Deut. 18:18; [Num. 23:5]; See Ex. 4:12
  - type: text
    content: what you are to say will be given to you in that hour.
  - type: text
    content: ' '
  '2':
  - type: note
    content: For ver. 2-4, see Mark 3:16-19; Luke 6:14-16; Acts 1:13
  - type: text
    content: 'The names of the twelve apostles are these: first, Simon, '
  - type: note
    content: ch. 16:18; John 1:42
  - type: text
    content: 'who is called Peter, and '
  - type: note
    content: ch. 4:18, 21
  - type: text
    content: 'Andrew his brother; '
  - type: note
    content: ch. 4:18, 21
  - type: text
    content: 'James the son of Zebedee, and John his brother; '
  '20':
  - type: note
    content: Luke 12:12; Acts 4:8; 6:10; 13:9; 1 Cor. 15:10; 2 Cor. 13:3; [ver. 40; 1 Thess. 2:13; Heb. 1:1]
  - type: text
    content: 'For it is not you who speak, but '
  - type: note
    content: '[John 15:26]'
  - type: text
    content: the Spirit of your Father speaking through you.
  - type: text
    content: ' '
  '21':
  - type: note
    content: ver. 35, 36
  - type: text
    content: Brother will deliver brother over to death, and the father his child, and children will rise against parents and have them put to death,
  - type: text
    content: ' '
  '22':
  - type: note
    content: ch. 24:9; John 15:18-21
  - type: text
    content: 'and you will be hated by all for my name’s sake. '
  - type: note
    content: ch. 24:13; Mark 13:13; [Dan. 12:12, 13; James 5:11; Rev. 2:10]; See Heb. 3:6
  - type: text
    content: But the one who endures to the end will be saved.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'When they '
  - type: note
    content: ch. 23:34
  - type: text
    content: 'persecute you in one town, '
  - type: note
    content: '[ch. 12:15; Acts 8:1; 9:25, 30; 14:6; 17:10, 14]'
  - type: text
    content: 'flee to the next, for truly, I say to you, you will not have gone through all the towns of Israel '
  - type: note
    content: ch. 16:28
  - type: text
    content: before the Son of Man comes.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Luke 6:40; John 13:16; 15:20; [ Heb. 12:3 ]
  - type: text
    content: “A disciple is not above his teacher, nor a servant
  - type: text
    content: ' '
  - type: note
    content: Or bondservant ; also verse 25
  - type: text
    content: above his master.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'It is enough for the disciple to be like his teacher, and the servant like his master. '
  - type: note
    content: ch. 9:34; 12:24; Mark 3:22; Luke 11:15; See John 7:20
  - type: text
    content: If they have called the master of the house Beelzebul, how much more will they malign
  - type: note
    content: Greek lacks will they malign
  - type: text
    content: ' '
  - type: text
    content: those of his household.
  - type: heading
    content: Have No Fear
  '26':
  - type: text
    content: ' '
  - type: text
    content: '“So have no fear of them, '
  - type: note
    content: Mark 4:22; Luke 8:17; [ 1 Tim. 5:25 ]; For ver. 26-33, see Luke 12:2-9
  - type: text
    content: for nothing is covered that will not be revealed, or hidden that will not be known.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'What I tell you in the dark, say in the light, and what you hear whispered, proclaim on '
  - type: note
    content: See Luke 5:19
  - type: text
    content: the housetops.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: Isa. 8:12, 13; 51:12, 13; Jer. 1:8; 1 Pet. 3:14
  - type: text
    content: 'do not fear those who kill the body but cannot kill the soul. Rather fear him '
  - type: note
    content: James 4:12
  - type: text
    content: who can destroy both soul and body in hell.
  - type: note
    content: Greek Gehenna
  - type: text
    content: ' '
  '29':
  - type: text
    content: Are not two sparrows sold for a penny?
  - type: note
    content: Greek assarion, Roman copper coin worth about 1/16 of a denarius (which was a day’s wage for a laborer)
  - type: text
    content: ' '
  - type: text
    content: And not one of them will fall to the ground apart from your Father.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Philip and Bartholomew; Thomas and '
  - type: note
    content: ch. 9:9
  - type: text
    content: Matthew the tax collector; James the son of Alphaeus, and Thaddaeus;
  - type: note
    content: Some manuscripts Lebbaeus, or Lebbaeus called Thaddaeus
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'But '
  - type: note
    content: See 1 Sam. 14:45
  - type: text
    content: even the hairs of your head are all numbered.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Fear not, therefore; '
  - type: note
    content: ch. 6:26; 12:12
  - type: text
    content: you are of more value than many sparrows.
  - type: text
    content: ' '
  '32':
  - type: note
    content: '[Rom. 10:9, 10; Heb. 10:35; Rev. 3:5]'
  - type: text
    content: So everyone who acknowledges me before men, I also will acknowledge before my Father who is in heaven,
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'but '
  - type: note
    content: 2 Tim. 2:12; 2 Pet. 2:1; 1 John 2:23; [Mark 8:38]
  - type: text
    content: 'whoever denies me before men, '
  - type: note
    content: ch. 7:23; 25:12; Luke 13:25
  - type: text
    content: I also will deny before my Father who is in heaven.
  - type: heading
    content: Not Peace, but a Sword
  '34':
  - type: text
    content: ' '
  - type: note
    content: See Luke 12:51-53
  - type: text
    content: '“Do not think that I have come to bring peace to the earth. '
  - type: note
    content: '[ Rev. 6:4 ]'
  - type: text
    content: I have not come to bring peace, but a sword.
  - type: text
    content: ' '
  '35':
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'For I have come '
  - type: note
    content: ver. 21; [Mic. 7:6]
  - type: text
    content: to set a man against his father, and a daughter against her mother, and a daughter-in-law against her mother-in-law.
  - type: text
    content: ' '
  '36':
  - type: note
    content: Cited from Mic. 7:6; [Ps. 41:9; 55:12, 13; John 13:18]
  - type: text
    content: And a person’s enemies will be those of his own household.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Luke 14:26
  - type: text
    content: Whoever loves father or mother more than me is not worthy of me, and whoever loves son or daughter more than me is not worthy of me.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And '
  - type: note
    content: ch. 16:24; Mark 8:34; Luke 9:23; 14:27
  - type: text
    content: 'whoever does not take his cross and '
  - type: note
    content: ch. 9:9; John 8:12; 12:26; 21:19
  - type: text
    content: follow me is not worthy of me.
  - type: text
    content: ' '
  '39':
  - type: note
    content: ch. 16:25; Mark 8:35; Luke 9:24; 17:33; John 12:25
  - type: text
    content: Whoever finds his life will lose it, and whoever loses his life for my sake will find it.
  - type: heading
    content: Rewards
  '4':
  - type: text
    content: Simon the Zealot,
  - type: note
    content: Greek kananaios, meaning zealot
  - type: text
    content: ' and Judas Iscariot, who betrayed him.'
  - type: heading
    content: Jesus Sends Out the Twelve Apostles
  '40':
  - type: text
    content: ' '
  - type: note
    content: Luke 10:16; John 13:20; Gal. 4:14; [ver. 20; ch. 18:5; 25:40 ]
  - type: text
    content: '“Whoever receives you receives me, and '
  - type: note
    content: Mark 9:37; Luke 9:48; [ John 12:44, 45 ]
  - type: text
    content: whoever receives me receives him who sent me.
  - type: text
    content: ' '
  '41':
  - type: note
    content: 1 Kgs. 17:10-15; 18:4; 2 Kgs. 4:8; [3 John 5-8]
  - type: text
    content: The one who receives a prophet because he is a prophet will receive a prophet’s reward, and the one who receives a righteous person because he is a righteous person will receive a righteous person’s reward.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And '
  - type: note
    content: ch. 25:35, 40; Mark 9:41; Heb. 6:10
  - type: text
    content: 'whoever gives one of '
  - type: note
    content: ch. 18:10
  - type: text
    content: these little ones even a cup of cold water because he is a disciple, truly, I say to you, he will by no means lose his reward.”
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'These twelve Jesus sent out, instructing them, '
  - type: text
    content: '“Go nowhere among the Gentiles and enter no town of '
  - type: note
    content: 2 Kgs. 17:24; Ezra 4:10; Luke 9:52; 10:33; 17:16; John 4:9, 39, 40; 8:48; Acts 8:25; [Acts 1:8]
  - type: text
    content: the Samaritans,
  - type: text
    content: ' '
  '6':
  - type: note
    content: ch. 15:24; [Acts 3:25, 26; 13:46]
  - type: text
    content: 'but go rather to '
  - type: note
    content: Ps. 119:176; Isa. 53:6; Jer. 50:6; [ch. 9:36; 18:12]
  - type: text
    content: 'the lost sheep of '
  - type: note
    content: Acts 2:36; 7:42; Heb. 8:8, 10
  - type: text
    content: the house of Israel.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And proclaim as you go, saying, '
  - type: note
    content: ch. 3:2; 4:17; Luke 10:9
  - type: text
    content: ‘The kingdom of heaven is at hand.’
  - type: note
    content: Or The kingdom of heaven has come near
  - type: text
    content: ' '
  '8':
  - type: note
    content: '[ch. 11:5]'
  - type: text
    content: Heal the sick, raise the dead, cleanse lepers,
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' '
  - type: text
    content: 'cast out demons. '
  - type: note
    content: '[Isa. 55:1; Acts 3:6; 20:33, 35]'
  - type: text
    content: You received without paying; give without pay.
  - type: text
    content: ' '
  '9':
  - type: note
    content: For ver. 9-15, see Mark 6:8-11; Luke 9:3-5; [Luke 10:4-12; 22:35]
  - type: text
    content: Acquire no gold or silver or copper for your belts,
  - type: text
    content: ' '
