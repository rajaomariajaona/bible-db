document_id: 2KI.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Amaziah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-6, see 2 Chr. 25:1-4
  - type: text
    content: 'In the '
  - type: note
    content: '[ch. 13:10]'
  - type: text
    content: 'second year of Joash the son of Joahaz, king of Israel, '
  - type: note
    content: ch. 12:21
  - type: text
    content: 'Amaziah the son of Joash, king of Judah, began to reign. '
  '10':
  - type: text
    content: 'You have indeed '
  - type: note
    content: ver. 7
  - type: text
    content: 'struck down Edom, '
  - type: note
    content: Deut. 8:14; 2 Chr. 26:16; 32:25; Ezek. 28:2, 5, 17
  - type: text
    content: and your heart has lifted you up. Be content with your glory, and stay at home, for why should you provoke trouble so that you fall, you and Judah with you?”
  '11':
  - type: text
    content: 'But Amaziah would not listen. So Jehoash king of Israel went up, and he and Amaziah king of Judah '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'faced one another in battle at '
  - type: note
    content: Josh. 15:10
  - type: text
    content: 'Beth-shemesh, which belongs to Judah. '
  '12':
  - type: text
    content: 'And Judah was defeated by Israel, '
  - type: note
    content: See 1 Sam. 4:10
  - type: text
    content: 'and every man fled to his home. '
  '13':
  - type: text
    content: And Jehoash king of Israel captured Amaziah king of Judah, the son of Jehoash, son of Ahaziah, at Beth-shemesh, and came to Jerusalem and broke down the wall of Jerusalem for four hundred cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' from '
  - type: note
    content: Neh. 8:16; 12:39
  - type: text
    content: 'the Ephraim Gate to '
  - type: note
    content: 2 Chr. 25:23; 26:9; Jer. 31:38; Zech. 14:10
  - type: text
    content: 'the Corner Gate. '
  '14':
  - type: text
    content: 'And he seized '
  - type: note
    content: ch. 12:18; 1 Kgs. 7:51
  - type: text
    content: 'all the gold and silver, and all the vessels that were found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the treasuries of the king’s house, also hostages, and he returned to Samaria.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:12, 13
  - type: text
    content: 'Now the rest of the acts of Jehoash that he did, and his might, and how he fought with Amaziah king of Judah, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '16':
  - type: text
    content: And Jehoash slept with his fathers and was buried in Samaria with the kings of Israel, and Jeroboam his son reigned in his place.
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-22, see 2 Chr. 25:25–26:2
  - type: text
    content: 'Amaziah the son of Joash, king of Judah, lived fifteen years after the death of Jehoash son of Jehoahaz, king of Israel. '
  '18':
  - type: text
    content: 'Now the rest of the deeds of Amaziah, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '19':
  - type: text
    content: 'And they made a conspiracy against him in Jerusalem, and he fled to '
  - type: note
    content: See Josh. 10:3
  - type: text
    content: 'Lachish. But they sent after him to Lachish and put him to death there. '
  '2':
  - type: text
    content: 'He was twenty-five years old when he began to reign, and he reigned twenty-nine years in Jerusalem. His mother’s name was Jehoaddin of Jerusalem. '
  '20':
  - type: text
    content: 'And they brought him on horses; and he was buried in Jerusalem with his fathers in the city of David. '
  '21':
  - type: text
    content: 'And all the people of Judah took Azariah, who was sixteen years old, and made him king instead of his father Amaziah. '
  '22':
  - type: text
    content: 'He built '
  - type: note
    content: ch. 16:6; Deut. 2:8; [2 Chr. 8:17; 26:2]
  - type: text
    content: Elath and restored it to Judah, after the king slept with his fathers.
  - type: heading
    content: Jeroboam II Reigns in Israel
  '23':
  - type: text
    content: 'In the fifteenth year of Amaziah the son of Joash, king of Judah, Jeroboam the son of Joash, king of Israel, began to reign in Samaria, and he reigned forty-one years. '
  '24':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not depart from all the sins of Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: 'which he made Israel to sin. '
  '25':
  - type: note
    content: '[ch. 10:32; 13:25]'
  - type: text
    content: 'He restored the border of Israel '
  - type: note
    content: See 1 Kgs. 8:65
  - type: text
    content: 'from Lebo-hamath as far as the Sea of '
  - type: note
    content: See Deut. 3:17
  - type: text
    content: 'the Arabah, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, which he spoke by his servant '
  - type: note
    content: Jonah 1:1; [Matt. 12:39, 40]
  - type: text
    content: 'Jonah the son of Amittai, the prophet, who was from '
  - type: note
    content: Josh. 19:13
  - type: text
    content: 'Gath-hepher. '
  '26':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 3:7; [ch. 13:4]
  - type: text
    content: 'saw that the affliction of Israel was very bitter, '
  - type: note
    content: See Deut. 32:36
  - type: text
    content: 'for there was none left, bond or free, and there was none to help Israel. '
  '27':
  - type: note
    content: '[ch. 13:5, 23]'
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' had not said that he would blot out the name of Israel from under heaven, so he saved them by the hand of Jeroboam the son of Joash.'
  '28':
  - type: text
    content: 'Now the rest of the acts of Jeroboam and all that he did, and his might, how he fought, and how he restored '
  - type: note
    content: '[2 Sam. 8:6; 1 Kgs. 11:24; 1 Chr. 18:5, 6]'
  - type: text
    content: 'Damascus and '
  - type: note
    content: 2 Chr. 8:3
  - type: text
    content: 'Hamath to Judah in Israel, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '29':
  - type: text
    content: And Jeroboam slept with his fathers, the kings of Israel, and Zechariah his son reigned in his place.
  '3':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', yet not like David his father. He did in all things as Joash his father had done. '
  '4':
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'But the high places were not removed; '
  - type: note
    content: '[ch. 16:4]'
  - type: text
    content: 'the people still sacrificed and made offerings on the high places. '
  '5':
  - type: text
    content: 'And as soon as the royal power was '
  - type: note
    content: '[ch. 15:19]'
  - type: text
    content: 'firmly in his hand, he struck down his servants '
  - type: note
    content: ch. 12:20
  - type: text
    content: 'who had struck down the king his father. '
  '6':
  - type: text
    content: 'But he did not put to death the children of the murderers, according to what is written in the Book of the Law of Moses, where the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded, '
  - type: note
    content: Deut. 24:16; [Jer. 31:30; Ezek. 18:4, 20]
  - type: text
    content: “Fathers shall not be put to death because of their children, nor shall children be put to death because of their fathers. But each one shall die for his own sin.”
  '7':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 25:11
  - type: text
    content: 'He struck down ten thousand Edomites in '
  - type: note
    content: 2 Sam. 8:13; 1 Chr. 18:12; See Ps. 60
  - type: text
    content: 'the Valley of Salt and took '
  - type: note
    content: Isa. 16:1
  - type: text
    content: 'Sela by storm, and called it '
  - type: note
    content: '[Josh. 15:38]'
  - type: text
    content: Joktheel, which is its name to this day.
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-14, see 2 Chr. 25:17-24
  - type: text
    content: Then Amaziah sent messengers to Jehoash
  - type: note
    content: Jehoash is an alternate spelling of Joash (son of Jehoahaz) as in 13:9, 12–14; also verses 9, 11–16
  - type: text
    content: ' the son of Jehoahaz, son of Jehu, king of Israel, saying, “Come, '
  - type: note
    content: '[ch. 23:29]'
  - type: text
    content: 'let us look one another in the face.” '
  '9':
  - type: text
    content: 'And Jehoash king of Israel sent word to Amaziah king of Judah, '
  - type: note
    content: '[Judg. 9:8-15]'
  - type: text
    content: '“A thistle on Lebanon sent to a cedar on Lebanon, saying, ‘Give your daughter to my son for a wife,’ and a wild beast of Lebanon passed by and trampled down the thistle. '
