document_id: 2CO.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Collection for Christians in Jerusalem
  - type: text
    content: 'Now '
  - type: note
    content: '[1 Thess. 4:9]'
  - type: text
    content: 'it is superfluous for me to write to you about '
  - type: note
    content: See Rom. 15:25
  - type: text
    content: 'the ministry for the saints, '
  '10':
  - type: text
    content: 'He who supplies '
  - type: note
    content: Isa. 55:10
  - type: text
    content: 'seed to the sower and bread for food will supply and multiply your seed for sowing and '
  - type: note
    content: '[Hos. 10:12]'
  - type: text
    content: 'increase the harvest of your righteousness. '
  '11':
  - type: note
    content: 1 Cor. 1:5
  - type: text
    content: 'You will be enriched in every way to be generous in every way, which '
  - type: note
    content: '[ch. 1:11]'
  - type: text
    content: 'through us will produce thanksgiving to God. '
  '12':
  - type: text
    content: 'For the ministry of this service is not only supplying '
  - type: note
    content: ch. 8:14
  - type: text
    content: 'the needs of the saints but is also overflowing in many thanksgivings to God. '
  '13':
  - type: text
    content: 'By their approval of this service, '
  - type: note
    content: See Matt. 5:16; 1 Pet. 2:12
  - type: text
    content: they
  - type: note
    content: Or you
  - type: text
    content: ' will glorify God because of your submission that comes from your '
  - type: note
    content: 1 Tim. 6:12, 13; Heb. 3:1; 4:14; 10:23
  - type: text
    content: 'confession of the gospel of Christ, and the generosity of your contribution for them and for all others, '
  '14':
  - type: text
    content: 'while they long for you and pray for you, because of the surpassing grace of God upon you. '
  '15':
  - type: note
    content: '[John 3:16; Eph. 2:8]; See ch. 2:14'
  - type: text
    content: Thanks be to God for his inexpressible gift!
  '2':
  - type: text
    content: 'for I know your readiness, '
  - type: note
    content: ch. 8:24
  - type: text
    content: 'of which I boast about you to the people of Macedonia, saying that Achaia has been ready '
  - type: note
    content: ch. 8:10
  - type: text
    content: 'since last year. And your zeal has stirred up most of them. '
  '3':
  - type: text
    content: 'But '
  - type: note
    content: ch. 8:6, 17, 18, 22
  - type: text
    content: I am sending
  - type: note
    content: Or I have sent
  - type: text
    content: ' the brothers so that our boasting about you may not prove empty in this matter, so that you may be ready, '
  - type: note
    content: 1 Cor. 16:2
  - type: text
    content: 'as I said you would be. '
  '4':
  - type: text
    content: 'Otherwise, if some Macedonians '
  - type: note
    content: '[Acts 20:4]'
  - type: text
    content: 'come with me and find that you are not ready, we would be humiliated—to say nothing of you—for being so confident. '
  '5':
  - type: text
    content: 'So I thought it necessary to urge the brothers to go on ahead to you and arrange in advance for the '
  - type: note
    content: Gen. 33:11; Judg. 1:15; 1 Sam. 25:27
  - type: text
    content: gift
  - type: note
    content: Greek blessing; twice in this verse
  - type: text
    content: ' you have promised, so that it may be ready '
  - type: note
    content: '[Phil. 4:17]'
  - type: text
    content: 'as a willing gift, '
  - type: note
    content: '[ch. 12:17, 18]'
  - type: text
    content: not as an exaction.
  - type: note
    content: Or a gift expecting something in return; Greek greed
  - type: heading
    content: The Cheerful Giver
  '6':
  - type: text
    content: 'The point is this: '
  - type: note
    content: Prov. 11:24, 25; 22:9; Gal. 6:7, 9; [Mal. 3:10; Luke 6:38]
  - type: text
    content: whoever sows sparingly will also reap sparingly, and whoever sows bountifully
  - type: note
    content: Greek with blessings; twice in this verse
  - type: text
    content: ' will also reap bountifully. '
  '7':
  - type: text
    content: 'Each one must give as he has decided in his heart, '
  - type: note
    content: Deut. 15:10; See ch. 8:12
  - type: text
    content: 'not reluctantly or under compulsion, for '
  - type: note
    content: See Ex. 25:2
  - type: text
    content: 'God loves a cheerful giver. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Phil. 4:19; [Eph. 3:2]
  - type: text
    content: God is able to make all grace abound to you, so that having all sufficiency
  - type: note
    content: Or all contentment
  - type: text
    content: ' in all things at all times, you may abound in every good work. '
  '9':
  - type: text
    content: As it is written,
  - type: note
    content: Cited from Ps. 112:9
  - type: text
    content: “He has distributed freely, he has given to the poor;
  - type: text
    content: his righteousness endures forever.”
