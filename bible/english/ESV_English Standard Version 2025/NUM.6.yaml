document_id: NUM.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Nazirite Vow
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: Lev. 5:7; 14:22; 15:14, 29
  - type: text
    content: 'On the eighth day he shall bring two turtledoves or two pigeons to the priest to the entrance of the tent of meeting, '
  '11':
  - type: text
    content: 'and the priest shall offer one for a sin offering and the other for a burnt offering, and make atonement for him, because he sinned by reason of the dead body. And he shall consecrate his head that same day '
  '12':
  - type: text
    content: 'and separate himself to the '
  - type: text
    content: Lord
  - type: text
    content: ' for the days of his separation and bring a male lamb a year old '
  - type: note
    content: Lev. 5:6
  - type: text
    content: for a guilt offering. But the previous period shall be void, because his separation was defiled.
  '13':
  - type: text
    content: '“And this is the law for the Nazirite, '
  - type: note
    content: Acts 21:26
  - type: text
    content: 'when the time of his separation has been completed: he shall be brought to the entrance of the tent of meeting, '
  '14':
  - type: text
    content: 'and he shall bring his gift to the '
  - type: text
    content: Lord
  - type: text
    content: ', one male lamb a year old without blemish for a burnt offering, and one ewe lamb a year old without blemish '
  - type: note
    content: Lev. 4:32
  - type: text
    content: 'as a sin offering, and one ram without blemish '
  - type: note
    content: Lev. 3:6
  - type: text
    content: 'as a peace offering, '
  '15':
  - type: text
    content: 'and a basket of unleavened bread, '
  - type: note
    content: Ex. 29:2; Lev. 2:4
  - type: text
    content: 'loaves of fine flour mixed with oil, and unleavened wafers smeared with oil, and their '
  - type: note
    content: See Ex. 29:41
  - type: text
    content: 'grain offering and their '
  - type: note
    content: ch. 15:5, 7, 10
  - type: text
    content: 'drink offerings. '
  '16':
  - type: text
    content: 'And the priest shall bring them before the '
  - type: text
    content: Lord
  - type: text
    content: ' and offer '
  - type: note
    content: ver. 14
  - type: text
    content: 'his sin offering and his burnt offering, '
  '17':
  - type: text
    content: 'and he shall offer the ram as a sacrifice of peace offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', with the basket of unleavened bread. The priest shall offer also its grain offering and its drink offering. '
  '18':
  - type: text
    content: 'And the Nazirite '
  - type: note
    content: Acts 18:18; 21:24
  - type: text
    content: 'shall shave his consecrated head at the entrance of the tent of meeting and shall take the hair from his consecrated head and put it on the fire that is under the sacrifice of the peace offering. '
  '19':
  - type: text
    content: 'And the priest shall take the '
  - type: note
    content: 1 Sam. 2:15
  - type: text
    content: 'shoulder of the ram, when it is boiled, and one unleavened loaf out of the basket and one unleavened wafer, and '
  - type: note
    content: Ex. 29:23, 24
  - type: text
    content: 'shall put them on the hands of the Nazirite, after he has shaved the hair of his consecration, '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, When either a man or a woman makes a special vow, the vow of '
  - type: note
    content: Judg. 13:5; [Acts 21:23]
  - type: text
    content: a Nazirite,
  - type: note
    content: Nazirite means one separated, or one consecrated
  - type: text
    content: ' '
  - type: note
    content: '[Rom. 1:1]'
  - type: text
    content: 'to separate himself to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'and the priest shall wave them for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[ch. 5:25; Ex. 29:27, 28]'
  - type: text
    content: They are a holy portion for the priest, together with the breast that is waved and the thigh that is contributed. And after that the Nazirite may drink wine.
  '21':
  - type: text
    content: '“This is the law of the Nazirite. But if he vows an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' above his Nazirite vow, as he can afford, in exact accordance with the vow that he takes, then he shall do in addition to the law of the Nazirite.”'
  - type: heading
    content: Aaron’s Blessing
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '23':
  - type: text
    content: '“Speak to Aaron and his sons, saying, Thus '
  - type: note
    content: Lev. 9:22; Deut. 21:5; 1 Chr. 23:13
  - type: text
    content: 'you shall bless the people of Israel: you shall say to them,'
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 134:3
  - type: text
    content: 'bless you and '
  - type: note
    content: See Ps. 121:3-8
  - type: text
    content: keep you;
  '25':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:16; 67:1; 80:3, 7, 19; 119:135; [Dan. 9:17]
  - type: text
    content: make his face to shine upon you and be gracious to you;
  '26':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 4:6
  - type: text
    content: lift up his countenance
  - type: note
    content: Or face
  - type: text
    content: ' upon you and give you peace.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Deut. 28:10; 2 Chr. 7:14; Dan. 9:18, 19
  - type: text
    content: “So shall they put my name upon the people of Israel, and I will bless them.”
  '3':
  - type: text
    content: 'he '
  - type: note
    content: Amos 2:12; Luke 1:15
  - type: text
    content: 'shall separate himself from wine and strong drink. He shall drink no vinegar made from wine or strong drink and shall not drink any juice of grapes or eat grapes, fresh or dried. '
  '4':
  - type: text
    content: All the days of his separation
  - type: note
    content: Or Naziriteship
  - type: text
    content: ' he shall eat nothing that is produced by the grapevine, not even the seeds or the skins.'
  '5':
  - type: text
    content: '“All the days of his vow of separation, no '
  - type: note
    content: Judg. 13:5; 16:17; 1 Sam. 1:11
  - type: text
    content: 'razor shall touch his head. Until the time is completed for which he separates himself to the '
  - type: text
    content: Lord
  - type: text
    content: ', he shall be holy. '
  - type: note
    content: Ezek. 44:20; [1 Cor. 11:14]
  - type: text
    content: He shall let the locks of hair of his head grow long.
  '6':
  - type: text
    content: '“All the days that he separates himself to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 19:11, 16; Lev. 21:11
  - type: text
    content: 'he shall not go near a dead body. '
  '7':
  - type: note
    content: Lev. 21:1, 2, 11
  - type: text
    content: 'Not even for his father or for his mother, for brother or sister, if they die, shall he make himself unclean, because his separation to God is on his head. '
  '8':
  - type: text
    content: 'All the days of his separation he is holy to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“And if any man dies very suddenly beside him and he defiles his consecrated head, then '
  - type: note
    content: Acts 18:18; 21:24
  - type: text
    content: 'he shall shave his head on the day of his cleansing; on the seventh day he shall shave it. '
