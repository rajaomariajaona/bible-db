document_id: JHN.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Feeds the Five Thousand
  - type: text
    content: 'After this '
  - type: note
    content: For ver. 1-13, see Matt. 14:13-21; Mark 6:32-44; Luke 9:10-17
  - type: text
    content: 'Jesus went away to the other side of '
  - type: note
    content: See Matt. 4:18
  - type: text
    content: 'the Sea of Galilee, which is '
  - type: note
    content: ch. 21:1
  - type: text
    content: 'the Sea of Tiberias. '
  '10':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Have the people sit down.”
  - type: text
    content: ' '
  - type: note
    content: '[Mark 6:39]'
  - type: text
    content: 'Now there was much grass in the place. So the men sat down, about five thousand in number. '
  '11':
  - type: text
    content: 'Jesus then took the loaves, and '
  - type: note
    content: ver. 23; See Matt. 15:36
  - type: text
    content: 'when he had given thanks, he distributed them to those who were seated. So also the fish, as much as they wanted. '
  '12':
  - type: text
    content: 'And when they had eaten their fill, he told his disciples, '
  - type: text
    content: “Gather up the leftover fragments, that nothing may be lost.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'So they gathered them up and filled twelve baskets with fragments from the five barley loaves left by those who had eaten. '
  '14':
  - type: text
    content: 'When the people saw the sign that he had done, they said, '
  - type: note
    content: See ch. 4:19
  - type: text
    content: '“This is indeed '
  - type: note
    content: ch. 1:21; 7:40; See Matt. 21:11
  - type: text
    content: 'the Prophet '
  - type: note
    content: ch. 11:27; See Matt. 11:3
  - type: text
    content: who is to come into the world!”
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:12-15 ]'
  - type: text
    content: 'Perceiving then that they were about to come and take him by force to make him king, Jesus '
  - type: note
    content: For ver. 15-21, see Matt. 14:22-33; Mark 6:45-51; [Matt. 8:18]
  - type: text
    content: 'withdrew again to '
  - type: note
    content: ver. 3
  - type: text
    content: the mountain by himself.
  - type: heading
    content: Jesus Walks on Water
  '16':
  - type: text
    content: 'When evening came, his disciples went down to the sea, '
  '17':
  - type: text
    content: 'got into a boat, and started across the sea to Capernaum. It was now dark, and Jesus had not yet come to them. '
  '18':
  - type: text
    content: 'The sea became rough because a strong wind was blowing. '
  '19':
  - type: text
    content: When they had rowed about three or four miles,
  - type: note
    content: Greek twenty-five or thirty stadia; a stadion was about 607 feet or 185 meters
  - type: text
    content: ' they saw Jesus walking on the sea and coming near the boat, and they were frightened. '
  '2':
  - type: text
    content: 'And a large crowd was following him, because they saw the signs that he was doing on the sick. '
  '20':
  - type: note
    content: '[Luke 24:38, 39]'
  - type: text
    content: 'But he said to them, '
  - type: text
    content: “It is I; do not be afraid.”
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then they were glad to take him into the boat, and immediately the boat was at the land to which they were going.
  - type: heading
    content: I Am the Bread of Life
  '22':
  - type: text
    content: 'On the next day the crowd that remained on the other side of the sea saw that there had been only '
  - type: note
    content: ch. 21:8
  - type: text
    content: 'one boat there, and that Jesus had not entered the boat with his disciples, but that his disciples had gone away alone. '
  '23':
  - type: text
    content: 'Other boats from Tiberias came near the place where they had eaten the bread after the Lord '
  - type: note
    content: ver. 11
  - type: text
    content: 'had given thanks. '
  '24':
  - type: note
    content: For ver. 24, 25, [Matt. 14:34-36; Mark 6:53-56]
  - type: text
    content: 'So when the crowd saw that Jesus was not there, nor his disciples, they themselves got into the boats and '
  - type: note
    content: ver. 17, 59
  - type: text
    content: went to Capernaum, seeking Jesus.
  '25':
  - type: text
    content: 'When they found him on the other side of the sea, they said to him, '
  - type: note
    content: See ch. 1:38
  - type: text
    content: '“Rabbi, when did you come here?” '
  '26':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: ver. 24
  - type: text
    content: 'you are seeking me, not because you saw '
  - type: note
    content: ver. 2
  - type: text
    content: signs, but because you ate your fill of the loaves.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Isa. 55:2
  - type: text
    content: 'Do not work for the food that perishes, but for '
  - type: note
    content: '[ver. 35, 50, 51, 54, 58]'
  - type: text
    content: 'the food that endures to eternal life, which '
  - type: note
    content: See Dan. 7:13
  - type: text
    content: 'the Son of Man will give to you. For on '
  - type: note
    content: '[ch. 5:36, 37; 10:36]'
  - type: text
    content: 'him God the Father has '
  - type: note
    content: '[Ezek. 9:4; Rom. 4:11; 1 Cor. 9:2; 2 Tim. 2:19]; See ch. 3:33'
  - type: text
    content: set his seal.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Then they said to him, “What must we do, to be doing '
  - type: note
    content: 1 Cor. 15:58; Rev. 2:26
  - type: text
    content: 'the works of God?” '
  '29':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“This is the work of God, '
  - type: note
    content: 1 John 3:23
  - type: text
    content: 'that you believe in him whom '
  - type: note
    content: See ch. 3:17
  - type: text
    content: he has sent.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus went up on '
  - type: note
    content: ver. 15
  - type: text
    content: 'the mountain, and there he sat down with his disciples. '
  '30':
  - type: text
    content: 'So they said to him, '
  - type: note
    content: See Matt. 12:38
  - type: text
    content: '“Then what sign do you do, that we may see and believe you? What work do you perform? '
  '31':
  - type: note
    content: ver. 49, 58; Ex. 16:15; Num. 11:7-9
  - type: text
    content: 'Our fathers ate the manna in the wilderness; as it is written, '
  - type: note
    content: Cited from Neh. 9:15; [Ps. 78:24, 25; 105:40; 1 Cor. 10:3]
  - type: text
    content: '‘He gave them bread from heaven to eat.’” '
  '32':
  - type: text
    content: 'Jesus then said to them, '
  - type: text
    content: “Truly, truly, I say to you, it was not Moses who gave you the bread from heaven, but my Father gives you the true bread from heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'For the bread of God is '
  - type: note
    content: ver. 50
  - type: text
    content: he who comes down from heaven and gives life to the world.”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'They said to him, '
  - type: note
    content: See ch. 4:15, 33
  - type: text
    content: “Sir, give us this bread always.”
  '35':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: ver. 41, 48, 51; [ver. 58]
  - type: text
    content: '“I am the bread of life; '
  - type: note
    content: ch. 4:14; 7:37; [ch. 5:40; Matt. 11:28; Rev. 7:16]
  - type: text
    content: whoever comes to me shall not hunger, and whoever believes in me shall never thirst.
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I said to you that you have seen me and yet do not believe.
  - type: text
    content: ' '
  '37':
  - type: note
    content: ver. 39; ch. 17:2
  - type: text
    content: 'All that '
  - type: note
    content: ch. 10:29; 17:6, 9, 24
  - type: text
    content: 'the Father gives me will come to me, and '
  - type: note
    content: ch. 10:28; 17:12
  - type: text
    content: whoever comes to me I will never cast out.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 3:13
  - type: text
    content: 'I have come down from heaven, not to do '
  - type: note
    content: See ch. 5:30
  - type: text
    content: 'my own will but '
  - type: note
    content: See ch. 5:30
  - type: text
    content: 'the will of him '
  - type: note
    content: See ch. 4:34
  - type: text
    content: who sent me.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And '
  - type: note
    content: ch. 10:28, 29; Matt. 18:14
  - type: text
    content: 'this is the will of him who sent me, '
  - type: note
    content: ch. 17:12; 18:9
  - type: text
    content: 'that I should lose nothing of '
  - type: note
    content: ver. 37
  - type: text
    content: 'all that he has given me, but '
  - type: note
    content: ver. 40, 44, 54; [ch. 11:25; 1 Cor. 6:14]
  - type: text
    content: raise it up on the last day.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 2:13; 11:55; See Ex. 12
  - type: text
    content: 'the Passover, the '
  - type: note
    content: ch. 5:1; 7:2
  - type: text
    content: 'feast of the Jews, was at hand. '
  '40':
  - type: text
    content: 'For this is the will of my Father, that everyone who '
  - type: note
    content: ch. 12:45; 14:17, 19
  - type: text
    content: 'looks on the Son and '
  - type: note
    content: ver. 47; ch. 3:15, 16
  - type: text
    content: 'believes in him '
  - type: note
    content: ver. 27, 54; ch. 4:14
  - type: text
    content: should have eternal life, and I will raise him up on the last day.”
  '41':
  - type: text
    content: 'So the Jews grumbled about him, because he said, '
  - type: note
    content: ver. 33, 35, 38
  - type: text
    content: “I am the bread that came down from heaven.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'They said, '
  - type: note
    content: See Matt. 13:55
  - type: text
    content: '“Is not this Jesus, '
  - type: note
    content: See ch. 1:45
  - type: text
    content: 'the son of Joseph, whose father and mother '
  - type: note
    content: ch. 7:27, 28
  - type: text
    content: 'we know? How does he now say, '
  - type: text
    content: ‘I have come down from heaven’
  - type: text
    content: '?” '
  '43':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Do not grumble among yourselves.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'No one can come to me unless the Father who sent me '
  - type: note
    content: ch. 12:32; Jer. 31:3; Hos. 11:4; [ver. 65; ch. 4:23]
  - type: text
    content: 'draws him. And '
  - type: note
    content: ver. 39
  - type: text
    content: I will raise him up on the last day.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'It is written in the Prophets, '
  - type: note
    content: Cited from Isa. 54:13; [Jer. 31:33, 34; Heb. 8:10, 11]
  - type: text
    content: '‘And they will all be '
  - type: note
    content: 1 Cor. 2:13; 1 Thess. 4:9; 1 John 2:20
  - type: text
    content: 'taught by God.’ '
  - type: note
    content: '[ver. 37]'
  - type: text
    content: Everyone who has heard and learned from the Father comes to me—
  - type: text
    content: ' '
  '46':
  - type: note
    content: See ch. 1:18
  - type: text
    content: 'not that anyone has seen the Father except '
  - type: note
    content: See ch. 7:29
  - type: text
    content: 'he who is from God; he '
  - type: note
    content: '[ch. 3:32; 8:38]'
  - type: text
    content: has seen the Father.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: See ch. 3:36
  - type: text
    content: whoever believes has eternal life.
  - type: text
    content: ' '
  '48':
  - type: note
    content: See ver. 35
  - type: text
    content: I am the bread of life.
  - type: text
    content: ' '
  '49':
  - type: note
    content: See ver. 31
  - type: text
    content: 'Your fathers ate the manna in the wilderness, and '
  - type: note
    content: ver. 58
  - type: text
    content: they died.
  - type: text
    content: ' '
  '5':
  - type: note
    content: Luke 6:20
  - type: text
    content: 'Lifting up his eyes, then, and seeing that a large crowd was coming toward him, Jesus said to '
  - type: note
    content: ch. 1:44
  - type: text
    content: 'Philip, '
  - type: text
    content: “Where are we to buy bread, so that these people may eat?”
  - type: text
    content: ' '
  '50':
  - type: note
    content: ver. 33
  - type: text
    content: 'This is the bread that comes down from heaven, so that one may eat of it '
  - type: note
    content: ver. 51, 58
  - type: text
    content: and not die.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'I am the living bread '
  - type: note
    content: ch. 3:13
  - type: text
    content: 'that came down from heaven. If anyone eats of this bread, he will live forever. And the bread that I will give '
  - type: note
    content: ver. 57; Luke 22:19
  - type: text
    content: 'for the life of the world is '
  - type: note
    content: ver. 53-56; [ch. 1:14]
  - type: text
    content: my flesh.”
  '52':
  - type: text
    content: 'The Jews then '
  - type: note
    content: ch. 9:16; 10:19
  - type: text
    content: 'disputed among themselves, saying, '
  - type: note
    content: ver. 60; ch. 3:9
  - type: text
    content: '“How can this man give us his flesh to eat?” '
  '53':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: '“Truly, truly, I say to you, unless you eat the flesh of '
  - type: note
    content: ver. 27
  - type: text
    content: 'the Son of Man and drink his blood, you '
  - type: note
    content: See ch. 20:31
  - type: text
    content: have no life in you.
  - type: text
    content: ' '
  '54':
  - type: text
    content: 'Whoever feeds on my flesh and drinks my blood '
  - type: note
    content: See ver. 40
  - type: text
    content: 'has eternal life, and '
  - type: note
    content: ver. 39
  - type: text
    content: I will raise him up on the last day.
  - type: text
    content: ' '
  '55':
  - type: text
    content: For my flesh is true food, and my blood is true drink.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'Whoever feeds on my flesh and drinks my blood '
  - type: note
    content: ch. 15:4, 5; 1 John 3:24; 4:13, 15, 16
  - type: text
    content: abides in me, and I in him.
  - type: text
    content: ' '
  '57':
  - type: text
    content: 'As '
  - type: note
    content: '[ch. 5:26]; See Matt. 16:16'
  - type: text
    content: 'the living Father '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'sent me, and '
  - type: note
    content: ch. 11:25; Rev. 1:18
  - type: text
    content: I live because of the Father, so whoever feeds on me, he also will live because of me.
  - type: text
    content: ' '
  '58':
  - type: note
    content: ver. 31, 33, 49-51
  - type: text
    content: This is the bread that came down from heaven, not like the bread
  - type: note
    content: Greek lacks the bread
  - type: text
    content: ' '
  - type: text
    content: the fathers ate, and died. Whoever feeds on this bread will live forever.”
  - type: text
    content: ' '
  '59':
  - type: text
    content: Jesus
  - type: note
    content: Greek He
  - type: text
    content: ' said these things in the synagogue, as he taught '
  - type: note
    content: ver. 24
  - type: text
    content: at Capernaum.
  - type: heading
    content: The Words of Eternal Life
  '6':
  - type: text
    content: 'He said this to test him, for he himself knew what he would do. '
  '60':
  - type: text
    content: ' '
  - type: note
    content: ver. 66 ; [ver. 64]
  - type: text
    content: 'When many of his disciples heard it, they said, “This is a hard saying; who can listen to it?” '
  '61':
  - type: text
    content: 'But Jesus, '
  - type: note
    content: '[ch. 2:24, 25]'
  - type: text
    content: 'knowing in himself that his disciples were grumbling about this, said to them, '
  - type: text
    content: “Do you take offense at this?
  - type: text
    content: ' '
  '62':
  - type: text
    content: 'Then what if you were to see '
  - type: note
    content: ver. 27
  - type: text
    content: 'the Son of Man '
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'ascending to '
  - type: note
    content: '[ch. 17:5]; See ch. 3:13'
  - type: text
    content: where he was before?
  - type: text
    content: ' '
  '63':
  - type: note
    content: '[1 Cor. 15:45; 2 Cor. 3:6]'
  - type: text
    content: 'It is the Spirit who gives life; '
  - type: note
    content: ch. 3:6
  - type: text
    content: 'the flesh is no help at all. '
  - type: note
    content: ver. 68
  - type: text
    content: The words that I have spoken to you are spirit and life.
  - type: text
    content: ' '
  '64':
  - type: text
    content: 'But '
  - type: note
    content: ver. 66
  - type: text
    content: there are some of you who do not believe.”
  - type: text
    content: ' (For Jesus '
  - type: note
    content: '[See ver. 61 above]'
  - type: text
    content: 'knew from the beginning who those were who did not believe, and '
  - type: note
    content: ver. 71; ch. 13:11
  - type: text
    content: 'who it was who would betray him.) '
  '65':
  - type: text
    content: 'And he said, '
  - type: text
    content: '“This is why I told you '
  - type: note
    content: ver. 44, 45; ch. 3:27
  - type: text
    content: that no one can come to me unless it is granted him by the Father.”
  '66':
  - type: text
    content: ' '
  - type: note
    content: ver. 60, 64
  - type: text
    content: 'After this many of his disciples turned back and no longer walked with him. '
  '67':
  - type: text
    content: 'So Jesus said to '
  - type: note
    content: ver. 70, 71
  - type: text
    content: 'the twelve, '
  - type: text
    content: “Do you want to go away as well?”
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'Simon Peter answered him, “Lord, to whom shall we go? You have '
  - type: note
    content: Acts 5:20; [ch. 12:50; 17:8]
  - type: text
    content: 'the words of eternal life, '
  '69':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 11:27; 1 John 4:16]'
  - type: text
    content: 'we have believed, and have come to know, that '
  - type: note
    content: See ch. 1:49
  - type: text
    content: 'you are '
  - type: note
    content: See Mark 1:24
  - type: text
    content: 'the Holy One of God.” '
  '7':
  - type: note
    content: '[Mark 6:37]'
  - type: text
    content: Philip answered him, “Two hundred denarii
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' worth of bread would not be enough for each of them to get a little.” '
  '70':
  - type: text
    content: 'Jesus answered them, '
  - type: note
    content: See ch. 13:18
  - type: text
    content: '“Did I not choose you, '
  - type: note
    content: '[See ver. 67 above]'
  - type: text
    content: 'the twelve? And yet one of you is '
  - type: note
    content: ch. 13:2, 27; 17:12
  - type: text
    content: a devil.”
  - type: text
    content: ' '
  '71':
  - type: text
    content: 'He spoke of Judas '
  - type: note
    content: ch. 13:26
  - type: text
    content: 'the son of Simon Iscariot, for '
  - type: note
    content: ver. 64, 67
  - type: text
    content: he, one of the twelve, was going to betray him.
  '8':
  - type: text
    content: 'One of his disciples, '
  - type: note
    content: ch. 1:40, 44
  - type: text
    content: 'Andrew, Simon Peter’s brother, said to him, '
  '9':
  - type: text
    content: '“There is a boy here who has five '
  - type: note
    content: 2 Kgs. 4:42, 43
  - type: text
    content: 'barley loaves and two fish, but '
  - type: note
    content: 2 Kgs. 4:42, 43
  - type: text
    content: 'what are they for so many?” '
