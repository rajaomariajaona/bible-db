document_id: GEN.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Cain and Abel
  - type: text
    content: Now Adam knew Eve his wife, and she conceived and bore Cain, saying, “I have gotten
  - type: note
    content: Cain sounds like the Hebrew for gotten
  - type: text
    content: ' a man with the help of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “What have you done? The voice of your brother’s blood '
  - type: note
    content: Heb. 12:24; [Rev. 6:10]
  - type: text
    content: 'is crying to me from the ground. '
  '11':
  - type: text
    content: 'And now '
  - type: note
    content: Deut. 27:24; [Num. 35:33]
  - type: text
    content: 'you are cursed from the ground, which has opened its mouth to receive your brother’s blood from your hand. '
  '12':
  - type: text
    content: 'When you work the ground, it shall no longer yield to you its strength. You shall be a fugitive and a wanderer on the earth.” '
  '13':
  - type: text
    content: 'Cain said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “My '
  - type: note
    content: ch. 19:15
  - type: text
    content: punishment is greater than I can bear.
  - type: note
    content: Or My guilt is too great to bear
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Behold, '
  - type: note
    content: Job 15:20-24
  - type: text
    content: 'you have driven me today away from the ground, and '
  - type: note
    content: 2 Kgs. 24:20; Ps. 51:11; 143:7; Jer. 52:3
  - type: text
    content: 'from your face I shall be hidden. I shall be a fugitive and a wanderer on the earth, '
  - type: note
    content: ch. 9:6; Num. 35:19
  - type: text
    content: 'and whoever finds me will kill me.” '
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Not so! If anyone kills Cain, vengeance shall be taken on him '
  - type: note
    content: Ps. 79:12
  - type: text
    content: 'sevenfold.” And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Ezek. 9:4, 6; Rev. 14:9, 11]'
  - type: text
    content: 'put a mark on Cain, lest any who found him should attack him. '
  '16':
  - type: text
    content: 'Then Cain went away from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and settled in the land of Nod,'
  - type: note
    content: Nod means wandering
  - type: text
    content: ' east of Eden.'
  '17':
  - type: text
    content: 'Cain knew his wife, and she conceived and bore Enoch. When he built a city, he called the name of the city after the name of his son, Enoch. '
  '18':
  - type: text
    content: 'To Enoch was born Irad, and Irad fathered Mehujael, and Mehujael fathered Methushael, and Methushael fathered Lamech. '
  '19':
  - type: text
    content: 'And Lamech took two wives. The name of the one was Adah, and the name of the other Zillah. '
  '2':
  - type: text
    content: 'And again, she bore his brother Abel. Now Abel was a keeper of sheep, and Cain a worker of the ground. '
  '20':
  - type: text
    content: 'Adah bore Jabal; he was the father of those who dwell in tents and have livestock. '
  '21':
  - type: text
    content: 'His brother’s name was Jubal; he was the father of all those who play the lyre and pipe. '
  '22':
  - type: text
    content: Zillah also bore Tubal-cain; he was the forger of all instruments of bronze and iron. The sister of Tubal-cain was Naamah.
  '23':
  - type: text
    content: 'Lamech said to his wives:'
  - type: text
    content: “Adah and Zillah, hear my voice;
  - type: text
    content: 'you wives of Lamech, listen to what I say:'
  - type: text
    content: I have killed a man for wounding me,
  - type: text
    content: a young man for striking me.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ver. 15
  - type: text
    content: If Cain’s revenge is sevenfold,
  - type: text
    content: then Lamech’s is seventy-sevenfold.”
  '25':
  - type: text
    content: And Adam knew his wife again, and she bore a son and called his name Seth, for she said, “God has appointed
  - type: note
    content: Seth sounds like the Hebrew for he appointed
  - type: text
    content: ' for me another offspring instead of Abel, for Cain killed him.” '
  '26':
  - type: text
    content: 'To '
  - type: note
    content: 1 Chr. 1:1; Luke 3:38
  - type: text
    content: 'Seth also a son was born, and he called his name '
  - type: note
    content: ch. 5:6
  - type: text
    content: 'Enosh. At that time people began '
  - type: note
    content: Ps. 116:17; Zeph. 3:9; Zech. 13:9
  - type: text
    content: 'to call upon the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'In the course of time Cain brought to the '
  - type: text
    content: Lord
  - type: text
    content: ' an offering of '
  - type: note
    content: Lev. 2:12; Num. 18:12
  - type: text
    content: 'the fruit of the ground, '
  '4':
  - type: text
    content: 'and Abel also brought of '
  - type: note
    content: Ex. 13:12; Num. 18:17; Prov. 3:9
  - type: text
    content: 'the firstborn of his flock and of their fat portions. And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Heb. 11:4
  - type: text
    content: 'had regard for Abel and his offering, '
  '5':
  - type: text
    content: 'but '
  - type: note
    content: '[Prov. 21:27]'
  - type: text
    content: 'for Cain and his offering he had no regard. So Cain was very angry, and his face fell. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Cain, “Why are you angry, and why has your face fallen? '
  '7':
  - type: note
    content: Eccles. 8:12, 13; Isa. 3:10, 11; Rom. 2:6-11
  - type: text
    content: If you do well, will you not be accepted?
  - type: note
    content: Hebrew will there not be a lifting up [of your face]?
  - type: text
    content: ' And if you do not do well, sin is crouching at the door. '
  - type: note
    content: ch. 3:16
  - type: text
    content: Its desire is for
  - type: note
    content: Or to, or toward, or against (see 3:16)
  - type: text
    content: ' you, and you must rule over it.”'
  '8':
  - type: text
    content: Cain spoke to Abel his brother.
  - type: note
    content: Hebrew; Samaritan, Septuagint, Syriac, Vulgate add Let us go out to the field
  - type: text
    content: ' And when they were in the field, Cain rose up against his brother Abel and '
  - type: note
    content: Matt. 23:35; Heb. 12:24; 1 John 3:12; Jude 11
  - type: text
    content: 'killed him. '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Cain, “Where is Abel your brother?” He said, '
  - type: note
    content: John 8:44
  - type: text
    content: '“I do not know; am I my brother’s keeper?” '
