document_id: JER.30,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Restoration for Israel and Judah
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 42:11; 46:27, 28; See Isa. 43:5
  - type: text
    content: '“Then fear not, '
  - type: note
    content: Isa. 41:8
  - type: text
    content: 'O Jacob my servant, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: nor be dismayed, O Israel;
  - type: text
    content: 'for behold, '
  - type: note
    content: ch. 42:11; 46:27, 28; See Isa. 43:5
  - type: text
    content: I will save you from far away,
  - type: note
    content: See ch. 3:18
  - type: text
    content: and your offspring from the land of their captivity.
  - type: note
    content: ch. 42:11; 46:27, 28; See Isa. 43:5
  - type: text
    content: Jacob shall return and have quiet and ease,
  - type: text
    content: and none shall make him afraid.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 46:28
  - type: text
    content: For I am with you to save you,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: ch. 46:28
  - type: text
    content: I will make a full end of all the nations
  - type: text
    content: among whom I scattered you,
  - type: text
    content: but of you I will not make a full end.
  - type: note
    content: ch. 46:28
  - type: text
    content: 'I will '
  - type: note
    content: See ch. 10:24
  - type: text
    content: discipline you in just measure,
  - type: text
    content: and I will by no means leave you unpunished.
  '12':
  - type: text
    content: '“For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: See ch. 15:18
  - type: text
    content: Your hurt is incurable,
  - type: note
    content: ch. 10:19; 14:17
  - type: text
    content: and your wound is grievous.
  '13':
  - type: text
    content: There is none to uphold your cause,
  - type: text
    content: no medicine for your wound,
  - type: note
    content: ch. 46:11
  - type: text
    content: no healing for you.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Lam. 1:2; [ch. 4:30 ]
  - type: text
    content: All your lovers have forgotten you;
  - type: text
    content: they care nothing for you;
  - type: text
    content: 'for I have dealt you the blow of '
  - type: note
    content: Job 13:24; 19:11; Isa. 63:10; Lam. 2:4
  - type: text
    content: an enemy,
  - type: text
    content: 'the punishment '
  - type: note
    content: Job 30:21; [ch. 6:23]
  - type: text
    content: of a merciless foe,
  - type: text
    content: because your guilt is great,
  - type: note
    content: ch. 5:6
  - type: text
    content: because your sins are flagrant.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: Why do you cry out over your hurt?
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: Your pain is incurable.
  - type: text
    content: Because your guilt is great,
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: because your sins are flagrant,
  - type: text
    content: I have done these things to you.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 11; ch. 10:25; Isa. 41:11 ]'
  - type: text
    content: Therefore all who devour you shall be devoured,
  - type: text
    content: 'and '
  - type: note
    content: '[Ex. 23:22]'
  - type: text
    content: all your foes, every one of them, shall go into captivity;
  - type: note
    content: '[ Isa. 33:1 ]'
  - type: text
    content: those who plunder you shall be plundered,
  - type: note
    content: ch. 2:14
  - type: text
    content: and all who prey on you I will make a prey.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 33:6
  - type: text
    content: 'For I will restore '
  - type: note
    content: ch. 8:22
  - type: text
    content: health to you,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 6:2; Hos. 6:1
  - type: text
    content: your wounds I will heal,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'because '
  - type: note
    content: '[Mic. 4:6, 7; Zeph. 3:19]'
  - type: text
    content: 'they have called you an outcast:'
  - type: note
    content: '[ Mic. 4:6, 7; Zeph. 3:19 ]'
  - type: text
    content: ‘It is Zion, for whom no one cares!’
  '18':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: 'Behold, '
  - type: note
    content: '[Amos 9:11]; See ver. 3'
  - type: text
    content: I will restore the fortunes of the tents of Jacob
  - type: text
    content: and have compassion on his dwellings;
  - type: text
    content: 'the city shall be rebuilt on '
  - type: note
    content: Deut. 13:16
  - type: text
    content: its mound,
  - type: text
    content: and the palace shall stand where it used to be.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 31:12, 13; 33:11; Isa. 35:10; 51:11
  - type: text
    content: Out of them shall come songs of thanksgiving,
  - type: text
    content: and the voices of those who celebrate.
  - type: note
    content: Ezek. 36:10, 37; Zech. 10:8
  - type: text
    content: I will multiply them, and they shall not be few;
  - type: text
    content: I will make them honored, and they shall not be small.
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: '
  - type: note
    content: ch. 36:2; Hab. 2:2
  - type: text
    content: 'Write in a book all the words that I have spoken to you. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Isa. 1:26
  - type: text
    content: Their children shall be as they were of old,
  - type: text
    content: and their congregation shall be established before me,
  - type: text
    content: and I will punish all who oppress them.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 49:10; Deut. 18:18 ]'
  - type: text
    content: Their prince shall be one of themselves;
  - type: note
    content: '[ Gen. 49:10; Deut. 18:18 ]'
  - type: text
    content: their ruler shall come out from their midst;
  - type: note
    content: Num. 16:5
  - type: text
    content: I will make him draw near, and he shall approach me,
  - type: note
    content: ch. 49:19; [ Heb. 5:4 ]
  - type: text
    content: for who would dare of himself to approach me?
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:7; 31:1; 32:38; See ch. 31:33; Lev. 26:12
  - type: text
    content: And you shall be my people,
  - type: text
    content: and I will be your God.”
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:19, 20
  - type: text
    content: 'Behold '
  - type: note
    content: ch. 25:32
  - type: text
    content: 'the storm of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Wrath has gone forth,
  - type: text
    content: a whirling tempest;
  - type: text
    content: it will burst upon the head of the wicked.
  '24':
  - type: text
    content: ' '
  - type: note
    content: See ch. 12:13
  - type: text
    content: 'The fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will not turn back'
  - type: text
    content: until he has executed and accomplished
  - type: text
    content: the intentions of his mind.
  - type: note
    content: Hos. 3:5
  - type: text
    content: In the latter days you will understand this.
  '3':
  - type: note
    content: Hab. 2:3
  - type: text
    content: 'For behold, days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 18; ch. 29:14; 31:23; 32:44; 33:7, 11, 26; Job 42:10; Lam. 2:14
  - type: text
    content: 'when I will restore '
  - type: note
    content: Ezra 2:1
  - type: text
    content: 'the fortunes of my people, '
  - type: note
    content: Isa. 11:12, 13; Hos. 1:11
  - type: text
    content: 'Israel and Judah, says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 12:15; Ezek. 20:42; See ch. 16:15; 23:3
  - type: text
    content: and I will bring them back to the land that I gave to their fathers, and they shall take possession of it.”
  '4':
  - type: text
    content: 'These are the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke concerning '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Israel and Judah:'
  '5':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: We have heard a cry of panic,
  - type: text
    content: of terror, and no peace.
  '6':
  - type: text
    content: Ask now, and see,
  - type: text
    content: can a man bear a child?
  - type: note
    content: See Isa. 13:8
  - type: text
    content: Why then do I see every man
  - type: text
    content: 'with his hands on his stomach '
  - type: note
    content: See Isa. 13:8
  - type: text
    content: like a woman in labor?
  - type: note
    content: Nah. 2:10; [ Joel 2:6 ]
  - type: text
    content: Why has every face turned pale?
  '7':
  - type: text
    content: 'Alas! '
  - type: note
    content: Joel 2:11; Zeph. 1:14
  - type: text
    content: That day is so great
  - type: note
    content: Dan. 12:1
  - type: text
    content: there is none like it;
  - type: text
    content: it is a time of distress for Jacob;
  - type: text
    content: yet he shall be saved out of it.
  '8':
  - type: text
    content: '“And it shall come to pass in that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, that I will '
  - type: note
    content: ch. 2:20; Nah. 1:13
  - type: text
    content: 'break his '
  - type: note
    content: See ch. 27:2
  - type: text
    content: 'yoke from off your neck, and I will '
  - type: note
    content: ch. 2:20; Nah. 1:13
  - type: text
    content: 'burst your bonds, '
  - type: note
    content: Ezek. 34:27
  - type: text
    content: and foreigners shall no more make a servant of him.
  - type: note
    content: Or serve him
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'But they shall serve the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and '
  - type: note
    content: Isa. 55:3, 4; Ezek. 34:23; 37:24; Hos. 3:5; [Luke 1:69, 70; Acts 13:22, 23]; See ch. 23:5
  - type: text
    content: David their king, whom I will raise up for them.
