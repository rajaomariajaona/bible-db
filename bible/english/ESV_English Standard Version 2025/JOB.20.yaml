document_id: JOB.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Zophar Speaks: The Wicked Will Suffer'
  - type: text
    content: 'Then '
  - type: note
    content: ch. 2:11
  - type: text
    content: 'Zophar the Naamathite answered and said:'
  '10':
  - type: text
    content: His children will seek the favor of the poor,
  - type: text
    content: 'and his hands will '
  - type: note
    content: ver. 18
  - type: text
    content: give back his wealth.
  '11':
  - type: text
    content: 'His bones are full of his '
  - type: note
    content: '[ch. 13:26; Ps. 25:7]'
  - type: text
    content: youthful vigor,
  - type: text
    content: 'but it will lie '
  - type: note
    content: ch. 21:26
  - type: text
    content: down with him in the dust.
  '12':
  - type: text
    content: “Though evil is sweet in his mouth,
  - type: text
    content: 'though he hides it '
  - type: note
    content: Ps. 10:7
  - type: text
    content: under his tongue,
  '13':
  - type: text
    content: though he is loath to let it go
  - type: text
    content: and holds it in his mouth,
  '14':
  - type: text
    content: yet his food is turned in his stomach;
  - type: text
    content: 'it is the venom of '
  - type: note
    content: Deut. 32:33; Ps. 140:3
  - type: text
    content: cobras within him.
  '15':
  - type: text
    content: He swallows down riches and vomits them up again;
  - type: text
    content: God casts them out of his belly.
  '16':
  - type: text
    content: He will suck the poison of cobras;
  - type: note
    content: Isa. 59:5; [ Prov. 23:32 ]
  - type: text
    content: the tongue of a viper will kill him.
  '17':
  - type: text
    content: 'He will not look upon '
  - type: note
    content: '[Ps. 36:8; Jer. 17:6]'
  - type: text
    content: the rivers,
  - type: text
    content: 'the streams flowing with '
  - type: note
    content: '[Deut. 32:13, 14]'
  - type: text
    content: 'honey and '
  - type: note
    content: '[ch. 29:6]'
  - type: text
    content: curds.
  '18':
  - type: text
    content: 'He will '
  - type: note
    content: ver. 10
  - type: text
    content: give back the fruit of his toil
  - type: text
    content: 'and will not '
  - type: note
    content: ver. 15
  - type: text
    content: swallow it down;
  - type: text
    content: from the profit of his trading
  - type: text
    content: he will get no enjoyment.
  '19':
  - type: text
    content: For he has crushed and abandoned the poor;
  - type: text
    content: he has seized a house that he did not build.
  '2':
  - type: text
    content: '“Therefore my '
  - type: note
    content: ch. 4:13
  - type: text
    content: thoughts answer me,
  - type: text
    content: because of my haste within me.
  '20':
  - type: text
    content: '“Because he '
  - type: note
    content: Isa. 59:8
  - type: text
    content: 'knew no '
  - type: note
    content: Prov. 17:1
  - type: text
    content: contentment in his belly,
  - type: note
    content: '[ Eccles. 5:13, 14 ]'
  - type: text
    content: he will not let anything in which he delights escape him.
  '21':
  - type: text
    content: There was nothing left after he had eaten;
  - type: text
    content: therefore his prosperity will not endure.
  '22':
  - type: text
    content: In the fullness of his sufficiency he will be in distress;
  - type: text
    content: the hand of everyone in misery will come against him.
  '23':
  - type: text
    content: To fill his belly to the full,
  - type: text
    content: God
  - type: note
    content: Hebrew he
  - type: text
    content: ' will send his burning anger against him'
  - type: text
    content: 'and rain it upon him '
  - type: note
    content: '[Num. 11:33; Ps. 78:30, 31]'
  - type: text
    content: into his body.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 24:18; Jer. 48:44; Amos 5:19 ]'
  - type: text
    content: He will flee from an iron weapon;
  - type: note
    content: 2 Sam. 22:35
  - type: text
    content: 'a bronze arrow will strike '
  - type: note
    content: Judg. 5:26
  - type: text
    content: him through.
  '25':
  - type: text
    content: 'It '
  - type: note
    content: Judg. 3:22
  - type: text
    content: is drawn forth and comes out of his body;
  - type: note
    content: Deut. 32:41
  - type: text
    content: 'the glittering point comes out of his '
  - type: note
    content: ch. 16:13
  - type: text
    content: gallbladder;
  - type: note
    content: See ch. 18:11
  - type: text
    content: terrors come upon him.
  '26':
  - type: text
    content: Utter darkness is laid up for his treasures;
  - type: note
    content: '[ch. 15:34; Ps. 21:9 ]'
  - type: text
    content: a fire not fanned will devour him;
  - type: text
    content: what is left in his tent will be consumed.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:18, 19 ]'
  - type: text
    content: The heavens will reveal his iniquity,
  - type: text
    content: and the earth will rise up against him.
  '28':
  - type: text
    content: The possessions of his house will be carried away,
  - type: text
    content: dragged off in the day of God’s
  - type: note
    content: Hebrew his
  - type: text
    content: ' wrath.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: ch. 27:13; [ch. 18:21; 31:2, 3 ]
  - type: text
    content: This is the wicked man’s portion from God,
  - type: note
    content: ch. 27:13; [ch. 18:21; 31:2, 3 ]
  - type: text
    content: the heritage decreed for him by God.”
  '3':
  - type: text
    content: I hear censure that insults me,
  - type: text
    content: and out of my understanding a spirit answers me.
  '4':
  - type: text
    content: Do you not know this from of old,
  - type: note
    content: '[ Deut. 4:32 ]'
  - type: text
    content: since man was placed on earth,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:35, 36
  - type: text
    content: that the exulting of the wicked is short,
  - type: text
    content: and the joy of the godless but for a moment?
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 14:13, 14; Obad. 3, 4 ]'
  - type: text
    content: Though his height mount up to the heavens,
  - type: text
    content: and his head reach to the clouds,
  '7':
  - type: text
    content: 'he will perish forever like his own '
  - type: note
    content: Ps. 83:10; Zeph. 1:17; [1 Kgs. 14:10; 2 Kgs. 9:37]
  - type: text
    content: dung;
  - type: text
    content: 'those who have seen him will say, '
  - type: note
    content: ch. 14:10
  - type: text
    content: ‘Where is he?’
  '8':
  - type: text
    content: 'He will fly away like '
  - type: note
    content: Ps. 73:20; 90:5; Isa. 29:7, 8
  - type: text
    content: a dream and not be found;
  - type: text
    content: he will be chased away like a vision of the night.
  '9':
  - type: text
    content: ' '
  - type: note
    content: See ch. 7:8, 10
  - type: text
    content: The eye that saw him will see him no more,
  - type: text
    content: nor will his place any more behold him.
