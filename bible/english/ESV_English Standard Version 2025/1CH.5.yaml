document_id: 1CH.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Reuben
  - type: text
    content: The sons of Reuben the firstborn of Israel (
  - type: note
    content: Gen. 29:32; 49:3
  - type: text
    content: 'for he was the firstborn, but because '
  - type: note
    content: Gen. 35:22; 49:4
  - type: text
    content: 'he defiled his father’s couch, '
  - type: note
    content: See Gen. 48:15-22
  - type: text
    content: 'his birthright was given to the sons of Joseph the son of Israel, so that he could not be enrolled as the oldest son; '
  '10':
  - type: text
    content: 'And in the days of Saul they waged war against the '
  - type: note
    content: ver. 19, 20; ch. 11:38; 27:30
  - type: text
    content: Hagrites, who fell into their hand. And they lived in their tents throughout all the region east of Gilead.
  - type: heading
    content: Descendants of Gad
  '11':
  - type: text
    content: 'The sons of Gad lived over against them in the land of Bashan as far as '
  - type: note
    content: Josh. 12:5; 13:11
  - type: text
    content: 'Salecah: '
  '12':
  - type: text
    content: 'Joel the chief, Shapham the second, Janai, and Shaphat in Bashan. '
  '13':
  - type: text
    content: 'And their kinsmen according to their fathers’ houses: Michael, Meshullam, Sheba, Jorai, Jacan, Zia and Eber, seven. '
  '14':
  - type: text
    content: 'These were the sons of Abihail the son of Huri, son of Jaroah, son of Gilead, son of Michael, son of Jeshishai, son of Jahdo, son of Buz. '
  '15':
  - type: text
    content: 'Ahi the son of Abdiel, son of Guni, was chief in their fathers’ houses, '
  '16':
  - type: text
    content: 'and they lived in Gilead, in Bashan and in its towns, and in all the pasturelands of '
  - type: note
    content: ch. 27:29
  - type: text
    content: 'Sharon to their limits. '
  '17':
  - type: text
    content: 'All of these were recorded in genealogies in the days of '
  - type: note
    content: 2 Kgs. 15:5, 32
  - type: text
    content: 'Jotham king of Judah, and in the days of '
  - type: note
    content: 2 Kgs. 14:16, 28
  - type: text
    content: Jeroboam king of Israel.
  '18':
  - type: text
    content: 'The Reubenites, the Gadites, and the half-tribe of Manasseh had valiant men who carried shield and sword, and drew the bow, '
  - type: note
    content: Num. 1:3
  - type: text
    content: 'expert in war, 44,760, able to go to war. '
  '19':
  - type: text
    content: 'They waged war against the '
  - type: note
    content: See ver. 10
  - type: text
    content: 'Hagrites, '
  - type: note
    content: ch. 1:31; [Gen. 25:15]
  - type: text
    content: 'Jetur, Naphish, and Nodab. '
  '2':
  - type: note
    content: See Gen. 49:8-10
  - type: text
    content: 'though Judah became strong among his brothers and a '
  - type: note
    content: Mic. 5:2; Matt. 2:6
  - type: text
    content: 'chief came from him, yet the birthright belonged to Joseph), '
  '20':
  - type: text
    content: And when they prevailed
  - type: note
    content: Or they were helped to prevail
  - type: text
    content: ' over them, the Hagrites and all who were with them were given into their hands, '
  - type: note
    content: '[2 Chr. 14:11; 18:31]'
  - type: text
    content: 'for they cried out to God in the battle, and he granted their urgent plea '
  - type: note
    content: Ps. 22:4, 5
  - type: text
    content: 'because they trusted in him. '
  '21':
  - type: text
    content: 'They carried off their livestock: 50,000 of their camels, 250,000 sheep, 2,000 donkeys, and 100,000 men alive. '
  '22':
  - type: text
    content: 'For many fell, because the war was of God. And they lived '
  - type: note
    content: ch. 4:41
  - type: text
    content: 'in their place until '
  - type: note
    content: ver. 6; 2 Kgs. 15:29; 17:6
  - type: text
    content: the exile.
  - type: heading
    content: The Half-Tribe of Manasseh
  '23':
  - type: text
    content: 'The members of the half-tribe of Manasseh lived in the land. They were very numerous from Bashan to Baal-hermon, '
  - type: note
    content: Deut. 3:9; Ezek. 27:5
  - type: text
    content: 'Senir, and Mount Hermon. '
  '24':
  - type: text
    content: 'These were the heads of their fathers’ houses: Epher,'
  - type: note
    content: Septuagint, Vulgate; Hebrew and Epher
  - type: text
    content: ' Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel, mighty warriors, famous men, heads of their fathers’ houses. '
  '25':
  - type: text
    content: 'But they broke faith with the God of their fathers, and '
  - type: note
    content: See Ex. 34:15
  - type: text
    content: 'whored '
  - type: note
    content: 2 Kgs. 17:7
  - type: text
    content: 'after the gods of the peoples of the land, whom God had destroyed before them. '
  '26':
  - type: text
    content: 'So the God of Israel stirred up the spirit of '
  - type: note
    content: 2 Kgs. 15:19
  - type: text
    content: 'Pul king of Assyria, the spirit of '
  - type: note
    content: See ver. 6
  - type: text
    content: 'Tiglath-pileser king of Assyria, and he took them into exile, namely, the Reubenites, the Gadites, and the half-tribe of Manasseh, and brought them '
  - type: note
    content: 2 Kgs. 17:6; 18:11
  - type: text
    content: 'to Halah, '
  - type: note
    content: 2 Kgs. 17:6; 18:11
  - type: text
    content: 'Habor, Hara, and '
  - type: note
    content: 2 Kgs. 17:6; 18:11
  - type: text
    content: the river Gozan, to this day.
  '3':
  - type: text
    content: 'the '
  - type: note
    content: Gen. 46:9; Ex. 6:14; Num. 26:5, 6
  - type: text
    content: 'sons of Reuben, the firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi. '
  '4':
  - type: text
    content: 'The sons of Joel: Shemaiah his son, Gog his son, Shimei his son, '
  '5':
  - type: text
    content: 'Micah his son, Reaiah his son, Baal his son, '
  '6':
  - type: text
    content: 'Beerah his son, whom '
  - type: note
    content: 2 Chr. 28:20
  - type: text
    content: Tiglath-pileser
  - type: note
    content: Hebrew Tilgath-pilneser; also verse 26
  - type: text
    content: ' king of Assyria carried away into exile; he was a chief of the Reubenites. '
  '7':
  - type: text
    content: 'And his kinsmen by their clans, '
  - type: note
    content: ver. 17
  - type: text
    content: 'when the genealogy of their generations was recorded: the chief, Jeiel, and Zechariah, '
  '8':
  - type: text
    content: 'and Bela the son of Azaz, son of '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'Shema, son of Joel, who lived in '
  - type: note
    content: Deut. 2:36; Josh. 13:16
  - type: text
    content: 'Aroer, as far as '
  - type: note
    content: Num. 32:3
  - type: text
    content: 'Nebo and '
  - type: note
    content: Num. 32:38
  - type: text
    content: 'Baal-meon. '
  '9':
  - type: text
    content: 'He also lived to the east as far as the entrance of the desert this side of the Euphrates, because their livestock had multiplied '
  - type: note
    content: Josh. 22:9
  - type: text
    content: 'in the land of Gilead. '
