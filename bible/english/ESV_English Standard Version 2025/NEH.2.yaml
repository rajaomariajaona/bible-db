document_id: NEH.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nehemiah Sent to Judah
  - type: text
    content: 'In the month of Nisan, '
  - type: note
    content: ch. 1:1; 5:14
  - type: text
    content: 'in the twentieth year of King '
  - type: note
    content: Ezra 7:1
  - type: text
    content: 'Artaxerxes, when wine was before him, '
  - type: note
    content: '[ch. 1:11]'
  - type: text
    content: 'I took up the wine and gave it to the king. Now I had not been sad in his presence. '
  '10':
  - type: text
    content: 'But when '
  - type: note
    content: ver. 19; ch. 4:1, 7; 6:1, 2, 5, 12, 14; 13:28
  - type: text
    content: 'Sanballat the Horonite and '
  - type: note
    content: ch. 13:4
  - type: text
    content: Tobiah the Ammonite servant heard this, it displeased them greatly that someone had come to seek the welfare of the people of Israel.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ezra 8:32
  - type: text
    content: 'So I went to Jerusalem and was there three days. '
  '12':
  - type: text
    content: 'Then I arose in the night, I and a few men with me. And I told no one what my God had put into my heart to do for Jerusalem. There was no animal with me but the one on which I rode. '
  '13':
  - type: text
    content: 'I went out by night by '
  - type: note
    content: ch. 3:13; 2 Chr. 26:9
  - type: text
    content: 'the Valley Gate to the Dragon Spring and to '
  - type: note
    content: ch. 3:13, 14; 12:31
  - type: text
    content: 'the Dung Gate, and I inspected the walls of Jerusalem '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'that were broken down '
  - type: note
    content: ver. 3, 17
  - type: text
    content: 'and its gates that had been destroyed by fire. '
  '14':
  - type: text
    content: 'Then I went on to '
  - type: note
    content: ch. 3:15; 12:37
  - type: text
    content: 'the Fountain Gate and to '
  - type: note
    content: 2 Kgs. 20:20; [ch. 3:16; 2 Chr. 32:3, 30]
  - type: text
    content: 'the King’s Pool, but there was no room for the animal that was under me to pass. '
  '15':
  - type: text
    content: 'Then I went up in the night '
  - type: note
    content: 2 Sam. 15:23
  - type: text
    content: 'by the valley and inspected the wall, and I turned back and entered by the Valley Gate, and so returned. '
  '16':
  - type: text
    content: And the officials did not know where I had gone or what I was doing, and I had not yet told the Jews, the priests, the nobles, the officials, and the rest who were to do the work.
  '17':
  - type: text
    content: 'Then I said to them, “You see the trouble we are in, '
  - type: note
    content: ver. 3, 13; ch. 1:3
  - type: text
    content: 'how Jerusalem lies in ruins with its gates burned. Come, let us build the wall of Jerusalem, that we may no longer '
  - type: note
    content: ch. 1:3; Ps. 44:13; 79:4; Jer. 24:9; Ezek. 5:14, 15; 22:4
  - type: text
    content: 'suffer derision.” '
  '18':
  - type: text
    content: 'And I told them '
  - type: note
    content: ver. 8
  - type: text
    content: 'of the hand of my God that had been upon me for good, and also of the words that the king had spoken to me. And they said, “Let us rise up and build.” '
  - type: note
    content: '[2 Sam. 2:7]'
  - type: text
    content: 'So they strengthened their hands for the good work. '
  '19':
  - type: text
    content: 'But when Sanballat the Horonite and Tobiah the Ammonite servant and '
  - type: note
    content: '[ch. 6:6]'
  - type: text
    content: 'Geshem the Arab heard of it, '
  - type: note
    content: ch. 4:1; Ps. 44:13
  - type: text
    content: 'they jeered at us and despised us and said, “What is this thing that you are doing? '
  - type: note
    content: ch. 6:6
  - type: text
    content: 'Are you rebelling against the king?” '
  '2':
  - type: text
    content: 'And the king said to me, “Why is your face sad, seeing you are not sick? This is nothing but '
  - type: note
    content: Prov. 15:13
  - type: text
    content: 'sadness of the heart.” Then I was very much afraid. '
  '20':
  - type: text
    content: 'Then I replied to them, '
  - type: note
    content: ver. 4
  - type: text
    content: “The God of heaven will make us prosper, and we his servants will arise and build, but you have no portion or right or claim
  - type: note
    content: Or memorial
  - type: text
    content: ' in Jerusalem.”'
  '3':
  - type: text
    content: 'I said to the king, '
  - type: note
    content: 1 Kgs. 1:31; Dan. 2:4; 5:10; 6:21
  - type: text
    content: '“Let the king live forever! Why should not my face be sad, '
  - type: note
    content: ver. 13, 17; ch. 1:3
  - type: text
    content: 'when the city, the place of my fathers’ graves, lies in ruins, and its gates have been destroyed by fire?” '
  '4':
  - type: text
    content: 'Then the king said to me, “What are you requesting?” So I prayed '
  - type: note
    content: ver. 20; ch. 1:4, 5; Ezra 5:12; Dan. 2:18
  - type: text
    content: 'to the God of heaven. '
  '5':
  - type: text
    content: 'And I said to the king, “If it pleases the king, and if your servant has found favor in your sight, that you send me to Judah, to the city of my fathers’ graves, that I may rebuild it.” '
  '6':
  - type: text
    content: And the king said to me (
  - type: note
    content: '[Ps. 45:9]'
  - type: text
    content: 'the queen sitting beside him), “How long will you be gone, and when will you return?” So it pleased the king to send me '
  - type: note
    content: '[ch. 5:14; 13:6]'
  - type: text
    content: 'when I had given him a time. '
  '7':
  - type: text
    content: 'And I said to the king, “If it pleases the king, let letters be given me '
  - type: note
    content: Ezra 8:36
  - type: text
    content: 'to the governors of the province Beyond the River, that they may let me pass through until I come to Judah, '
  '8':
  - type: text
    content: 'and a letter to Asaph, the keeper of the king’s forest, that he may give me timber to make beams for the gates of '
  - type: note
    content: ch. 7:2
  - type: text
    content: 'the fortress of the temple, and for the wall of the city, and for the house that I shall occupy.” And the king granted me what I asked, '
  - type: note
    content: ver. 18; See Ezra 7:6
  - type: text
    content: for the good hand of my God was upon me.
  - type: heading
    content: Nehemiah Inspects Jerusalem’s Walls
  '9':
  - type: text
    content: 'Then I came to '
  - type: note
    content: Ezra 8:36
  - type: text
    content: 'the governors of the province Beyond the River and gave them the king’s letters. Now the king had sent with me officers of the army and horsemen. '
