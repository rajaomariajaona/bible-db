      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:33
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'sent persistently to them by his messengers, because he had compassion on his people and on his dwelling place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: usfm
