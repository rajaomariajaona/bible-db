document_id: 2CH.36,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Decline
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-4, see 2 Kgs. 23:30-34
  - type: text
    content: 'The people of the land took Jehoahaz the son of Josiah and made him king in his father’s place in Jerusalem. '
  '10':
  - type: text
    content: 'In '
  - type: note
    content: 2 Sam. 11:1
  - type: text
    content: 'the spring of the year King Nebuchadnezzar sent and brought him to Babylon, '
  - type: note
    content: '[ver. 7, 18]'
  - type: text
    content: 'with the precious vessels of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and made his brother '
  - type: note
    content: Jer. 37:1; [2 Kgs. 24:17]
  - type: text
    content: Zedekiah king over Judah and Jerusalem.
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-13, see 2 Kgs. 24:18-20; Jer. 52:1, 2
  - type: text
    content: 'Zedekiah was twenty-one years old when he began to reign, and he reigned eleven years in Jerusalem. '
  '12':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. He did not humble himself before '
  - type: note
    content: See Jer. 21:3-7; 27:12-22; 32:1-5; 37:6-10; 38:17-26
  - type: text
    content: 'Jeremiah the prophet, who spoke from the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: note
    content: Jer. 52:3; Ezek. 17:15, 18
  - type: text
    content: 'He also rebelled against King Nebuchadnezzar, who had made him swear by God. '
  - type: note
    content: See ch. 30:8
  - type: text
    content: 'He stiffened his neck and hardened his heart against turning to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '14':
  - type: text
    content: 'All the officers of the priests and the people likewise were exceedingly unfaithful, following all the abominations of the nations. And they polluted the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he had made holy in Jerusalem.'
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, '
  - type: note
    content: Jer. 7:13, 25; 25:3, 4; 26:5; 29:19; 35:15; 44:4; [Jer. 11:7; 32:33]
  - type: text
    content: 'sent persistently to them by his messengers, because he had compassion on his people and on his dwelling place. '
  '16':
  - type: note
    content: '[Jer. 5:12, 13]'
  - type: text
    content: 'But they kept mocking the messengers of God, '
  - type: note
    content: '[Prov. 1:25, 30]'
  - type: text
    content: 'despising his words and scoffing at his prophets, '
  - type: note
    content: '[Ezra 5:12]'
  - type: text
    content: 'until the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' rose against his people, until there was no remedy.'
  - type: heading
    content: Jerusalem Captured and Burned
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-20, see 2 Kgs. 25:1-7; [ Deut. 28:49; Ezra 9:7 ]
  - type: text
    content: 'Therefore he brought up against them the king of the Chaldeans, who killed their young men with the sword in the house of their sanctuary and had no compassion on young man or virgin, old man or aged. He gave them all into his hand. '
  '18':
  - type: note
    content: 2 Kgs. 25:13-15; [ver. 7, 10]
  - type: text
    content: 'And all the vessels of the house of God, great and small, and the treasures of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the treasures of the king and of his princes, all these he brought to Babylon. '
  '19':
  - type: note
    content: 2 Kgs. 25:9
  - type: text
    content: 'And they burned the house of God and broke down the wall of Jerusalem and burned all its palaces with fire and destroyed all its precious vessels. '
  '2':
  - type: text
    content: 'Jehoahaz was twenty-three years old when he began to reign, and he reigned three months in Jerusalem. '
  '20':
  - type: text
    content: 'He '
  - type: note
    content: 2 Kgs. 25:11
  - type: text
    content: 'took into exile in Babylon those who had escaped from the sword, '
  - type: note
    content: Jer. 27:7
  - type: text
    content: 'and they became servants to him and to his sons until the establishment of the kingdom of Persia, '
  '21':
  - type: text
    content: 'to fulfill the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' by the mouth of Jeremiah, until the land had '
  - type: note
    content: Lev. 26:34, 35, 43; [Dan. 9:2]
  - type: text
    content: 'enjoyed its Sabbaths. All the days that it lay desolate '
  - type: note
    content: '[Lev. 25:4, 5]'
  - type: text
    content: it kept Sabbath, to fulfill seventy years.
  - type: heading
    content: The Proclamation of Cyrus
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22, 23, see Ezra 1:1-3
  - type: text
    content: 'Now in the first year of Cyrus king of Persia, '
  - type: note
    content: Jer. 25:12, 13; 29:10; 33:10, 11, 14
  - type: text
    content: 'that the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' by the mouth of Jeremiah might be fulfilled, '
  - type: note
    content: Isa. 44:28
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' stirred up the spirit of Cyrus king of Persia, so that he made a proclamation throughout all his kingdom and also put it in writing: '
  '23':
  - type: text
    content: '“Thus says Cyrus king of Persia, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth, and he has charged me to build him a house at Jerusalem, which is in Judah. Whoever is among you of all his people, may the '
  - type: text
    content: Lord
  - type: text
    content: ' his God be with him. Let him go up.’”'
  '3':
  - type: text
    content: 'Then the king of Egypt deposed him in Jerusalem and '
  - type: note
    content: Deut. 22:19
  - type: text
    content: laid on the land a tribute of a hundred talents of silver and a talent
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold. '
  '4':
  - type: text
    content: And the king of Egypt made Eliakim his brother king over Judah and Jerusalem, and changed his name to Jehoiakim. But Neco took Jehoahaz his brother and carried him to Egypt.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 23:36, 37
  - type: text
    content: 'Jehoiakim was twenty-five years old when he began to reign, and he reigned eleven years in Jerusalem. He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '6':
  - type: note
    content: 2 Kgs. 24:1
  - type: text
    content: 'Against him came up Nebuchadnezzar king of Babylon '
  - type: note
    content: '[ch. 33:11]'
  - type: text
    content: 'and bound him in chains '
  - type: note
    content: '[2 Kgs. 24:6; Jer. 22:18, 19; 36:30]'
  - type: text
    content: 'to take him to Babylon. '
  '7':
  - type: note
    content: 2 Kgs. 24:13; Ezra 1:7; Dan. 1:1, 2; 5:2; [ver. 10, 18]
  - type: text
    content: 'Nebuchadnezzar also carried part of the vessels of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Babylon and put them in his palace in Babylon. '
  '8':
  - type: note
    content: 2 Kgs. 24:5, 6
  - type: text
    content: Now the rest of the acts of Jehoiakim, and the abominations that he did, and what was found against him, behold, they are written in the Book of the Kings of Israel and Judah. And Jehoiachin his son reigned in his place.
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9, 10, see 2 Kgs. 24:8-17
  - type: text
    content: Jehoiachin was eighteen
  - type: note
    content: Septuagint (compare 2 Kings 24:8); most Hebrew manuscripts eight
  - type: text
    content: ' years old when he became king, and he reigned three months and ten days in Jerusalem. He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
