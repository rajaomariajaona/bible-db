      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      marker-yv: yv-n
    - type: text
      text: 'that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by the mouth of Jeremiah might be fulfilled, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 44:28
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stirred up the spirit of Cyrus king of Persia, so that he made a proclamation throughout all his kingdom and also put it in writing: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Thus says Cyrus king of Persia, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven, has given me all the kingdoms of the earth, and he has charged me to build him a house at Jerusalem, which is in Judah. Whoever is among you of all his people, may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God be with him. Let him go up.’”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the king of Egypt deposed him in Jerusalem and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 22:19
      marker-yv: yv-n
    - type: text
      text: laid on the land a tribute of a hundred talents of silver and a talent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 75 pounds or 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of gold. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And the king of Egypt made Eliakim his brother king over Judah and Jerusalem, and changed his name to Jehoiakim. But Neco took Jehoahaz his brother and carried him to Egypt.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:36
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      marker-yv: yv-n
    - type: text
      text: 'Jehoiakim was twenty-five years old when he began to reign, and he reigned eleven years in Jerusalem. He did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 24:1
      marker-yv: yv-n
    - type: text
      text: 'Against him came up Nebuchadnezzar king of Babylon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and bound him in chains '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 24:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 22:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
