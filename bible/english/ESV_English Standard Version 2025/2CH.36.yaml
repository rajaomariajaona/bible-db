          text: '30'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'despising his words and scoffing at his prophets, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 5:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'until the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rose against his people, until there was no remedy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem Captured and Burned
    marker-yv: yv-h
  '17':
  - type: usfm
