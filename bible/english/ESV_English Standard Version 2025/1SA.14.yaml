document_id: 1SA.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonathan Defeats the Philistines
  - type: text
    content: 'One day Jonathan the son of Saul said to the young man who carried his armor, “Come, let us go over to the Philistine garrison on the other side.” But he did not tell his father. '
  '10':
  - type: text
    content: 'But if they say, ‘Come up to us,’ then we will go up, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them into our hand. And this shall be the sign to us.” '
  '11':
  - type: text
    content: 'So both of them showed themselves to the garrison of the Philistines. And the Philistines said, “Look, Hebrews are coming '
  - type: note
    content: ch. 13:6
  - type: text
    content: 'out of the holes where they have hidden themselves.” '
  '12':
  - type: text
    content: 'And the men of the garrison hailed Jonathan and his armor-bearer and said, “Come up to us, and we will show you a thing.” And Jonathan said to his armor-bearer, “Come up after me, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them into the hand of Israel.” '
  '13':
  - type: text
    content: 'Then Jonathan climbed up on his hands and feet, and his armor-bearer after him. And they fell before Jonathan, and his armor-bearer killed them after him. '
  '14':
  - type: text
    content: And that first strike, which Jonathan and his armor-bearer made, killed about twenty men within as it were half a furrow’s length in an acre
  - type: note
    content: Hebrew a yoke
  - type: text
    content: ' of land. '
  '15':
  - type: text
    content: 'And there was a panic in the camp, in the field, and among all the people. The garrison and even '
  - type: note
    content: ch. 13:17
  - type: text
    content: the raiders trembled, the earth quaked, and it became a very great panic.
  - type: note
    content: Or became a panic from God
  '16':
  - type: text
    content: 'And the watchmen of Saul in Gibeah of Benjamin looked, and behold, the multitude '
  - type: note
    content: Josh. 2:9
  - type: text
    content: was dispersing here and there.
  - type: note
    content: Septuagint; Hebrew they went here and there
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Then Saul said to the people who were with him, “Count and see who has gone from us.” And when they had counted, behold, Jonathan and his armor-bearer were not there. '
  '18':
  - type: text
    content: So Saul said to Ahijah, “Bring the ark of God here.” For the ark of God went at that time with the people
  - type: note
    content: Hebrew; Septuagint “Bring the ephod.” For at that time he wore the ephod before the people
  - type: text
    content: ' of Israel. '
  '19':
  - type: text
    content: 'Now '
  - type: note
    content: Num. 27:21
  - type: text
    content: 'while Saul was talking to the priest, the tumult in the camp of the Philistines increased more and more. So Saul said to the priest, “Withdraw your hand.” '
  '2':
  - type: text
    content: Saul was staying in the outskirts of Gibeah in the pomegranate cave
  - type: note
    content: Or under the pomegranate [tree]
  - type: text
    content: ' at '
  - type: note
    content: '[See ch. 13:23 above]'
  - type: text
    content: 'Migron. The people who were with him were about '
  - type: note
    content: ch. 13:15
  - type: text
    content: 'six hundred men, '
  '20':
  - type: text
    content: 'Then Saul and all the people who were with him rallied and went into the battle. And behold, '
  - type: note
    content: '[Judg. 7:22; 2 Chr. 20:23]'
  - type: text
    content: 'every Philistine’s sword was against his fellow, and there was very great confusion. '
  '21':
  - type: text
    content: 'Now the Hebrews who had been with the Philistines before that time and who had gone up with them into the camp, '
  - type: note
    content: '[ch. 29:4]'
  - type: text
    content: 'even they also turned to be with the Israelites who were with Saul and Jonathan. '
  '22':
  - type: text
    content: 'Likewise, when all the men of Israel '
  - type: note
    content: ver. 11; ch. 13:6
  - type: text
    content: 'who had hidden themselves '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'in the hill country of Ephraim heard that the Philistines were fleeing, they too followed hard after them in the battle. '
  '23':
  - type: note
    content: Ex. 14:30
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' saved Israel that day. And the battle passed beyond '
  - type: note
    content: ch. 13:5
  - type: text
    content: Beth-aven.
  - type: heading
    content: Saul’s Rash Vow
  '24':
  - type: text
    content: 'And the men of Israel had been hard pressed that day, '
  - type: note
    content: '[Josh. 6:26]'
  - type: text
    content: 'so Saul had laid an oath on the people, saying, “Cursed be the man who eats food until it is evening and I am avenged on my enemies.” So none of the people had tasted food. '
  '25':
  - type: text
    content: Now when all the people
  - type: note
    content: Hebrew land
  - type: text
    content: ' came to the forest, behold, there was honey on the ground. '
  '26':
  - type: text
    content: 'And when the people entered the forest, behold, the honey was dropping, but no one put his hand to his mouth, for the people feared the oath. '
  '27':
  - type: text
    content: 'But Jonathan had not heard his father charge the people with the oath, '
  - type: note
    content: ver. 43
  - type: text
    content: 'so he put out the tip of the staff that was in his hand and dipped it in the honeycomb and put his hand to his mouth, and his eyes became bright. '
  '28':
  - type: text
    content: 'Then one of the people said, “Your father strictly charged the people with an oath, saying, ‘Cursed be the man who eats food this day.’” And the people were '
  - type: note
    content: Judg. 8:4, 5
  - type: text
    content: 'faint. '
  '29':
  - type: text
    content: 'Then Jonathan said, “My father has troubled the land. See how my eyes have become bright because I tasted a little of this honey. '
  '3':
  - type: text
    content: 'including '
  - type: note
    content: ch. 22:9, 11, 20
  - type: text
    content: 'Ahijah the son of Ahitub, '
  - type: note
    content: ch. 4:21
  - type: text
    content: 'Ichabod’s brother, son of Phinehas, son of Eli, the priest of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Josh. 18:1
  - type: text
    content: 'in Shiloh, '
  - type: note
    content: ch. 2:28
  - type: text
    content: 'wearing an ephod. And the people did not know that Jonathan had gone. '
  '30':
  - type: text
    content: How much better if the people had eaten freely today of the spoil of their enemies that they found. For now the defeat among the Philistines has not been great.”
  '31':
  - type: text
    content: 'They struck down the Philistines that day from '
  - type: note
    content: ch. 13:2
  - type: text
    content: 'Michmash to '
  - type: note
    content: Josh. 10:12
  - type: text
    content: 'Aijalon. And the people were very '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'faint. '
  '32':
  - type: text
    content: 'The people '
  - type: note
    content: ch. 15:19
  - type: text
    content: 'pounced on the spoil and took sheep and oxen and calves and slaughtered them on the ground. And the people ate them '
  - type: note
    content: '[Lev. 3:17]'
  - type: text
    content: 'with the blood. '
  '33':
  - type: text
    content: 'Then they told Saul, “Behold, the people are sinning against the '
  - type: text
    content: Lord
  - type: text
    content: ' by eating '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: with the blood.” And he said, “You have dealt treacherously; roll a great stone to me here.”
  - type: note
    content: Septuagint; Hebrew this day
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And Saul said, “Disperse yourselves among the people and say to them, ‘Let every man bring his ox or his sheep and slaughter them here and eat, and do not sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' by eating with the blood.’” So every one of the people brought his ox with him that night and they slaughtered them there. '
  '35':
  - type: text
    content: 'And Saul '
  - type: note
    content: '[ch. 7:12, 17]'
  - type: text
    content: 'built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: '; it was the first altar that he built to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: 'Then Saul said, “Let us go down after the Philistines by night and plunder them until the morning light; let us not leave a man of them.” And they said, “Do whatever seems good to you.” But '
  - type: note
    content: ver. 3, 18, 19
  - type: text
    content: 'the priest said, “Let us draw near to God here.” '
  '37':
  - type: text
    content: 'And Saul inquired of God, “Shall I go down after the Philistines? Will you give them into the hand of Israel?” '
  - type: note
    content: ch. 28:6
  - type: text
    content: 'But he did not answer him that day. '
  '38':
  - type: text
    content: 'And Saul said, “Come here, all you leaders of the people, and know and see how this sin has arisen today. '
  '39':
  - type: text
    content: 'For '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives who saves Israel, '
  - type: note
    content: ver. 44
  - type: text
    content: 'though it be in Jonathan my son, he shall surely die.” But there was not a man among all the people who answered him. '
  '4':
  - type: text
    content: 'Within '
  - type: note
    content: ch. 13:23
  - type: text
    content: 'the passes, by which Jonathan sought to go over to the Philistine garrison, there was a rocky crag on the one side and a rocky crag on the other side. The name of the one was Bozez, and the name of the other Seneh. '
  '40':
  - type: text
    content: 'Then he said to all Israel, “You shall be on one side, and I and Jonathan my son will be on the other side.” And the people said to Saul, “Do what seems good to you.” '
  '41':
  - type: text
    content: 'Therefore Saul said, “O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel, why have you not answered your servant this day? If this guilt is in me or in Jonathan my son, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, give Urim. But if this guilt is in your people Israel, give Thummim.”'
  - type: note
    content: Vulgate and Septuagint; Hebrew Therefore Saul said to the Lord, the God of Israel, “Give Thummim.”
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:20, 21; Josh. 7:16-18; Acts 1:24-26]'
  - type: text
    content: 'And Jonathan and Saul were taken, but the people escaped. '
  '42':
  - type: text
    content: 'Then Saul said, '
  - type: note
    content: '[See ver. 41 above]'
  - type: text
    content: “Cast the lot between me and my son Jonathan.” And Jonathan was taken.
  '43':
  - type: text
    content: 'Then Saul said to Jonathan, '
  - type: note
    content: '[Josh. 7:19]'
  - type: text
    content: '“Tell me what you have done.” And Jonathan told him, '
  - type: note
    content: ver. 27
  - type: text
    content: '“I tasted a little honey with the tip of the staff that was in my hand. Here I am; I will die.” '
  '44':
  - type: text
    content: 'And Saul said, '
  - type: note
    content: See Ruth 1:17
  - type: text
    content: '“God do so to me and more also; '
  - type: note
    content: ver. 39
  - type: text
    content: 'you shall surely die, Jonathan.” '
  '45':
  - type: text
    content: 'Then the people said to Saul, “Shall Jonathan die, who has worked this great salvation in Israel? Far from it! '
  - type: note
    content: '[See ver. 39 above]'
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: 2 Sam. 14:11; 1 Kgs. 1:52; Luke 21:18; Acts 27:34; [Matt. 10:30; Luke 12:7]
  - type: text
    content: 'there shall not one hair of his head fall to the ground, for he has worked with God this day.” So the people ransomed Jonathan, so that he did not die. '
  '46':
  - type: text
    content: Then Saul went up from pursuing the Philistines, and the Philistines went to their own place.
  - type: heading
    content: Saul Fights Israel’s Enemies
  '47':
  - type: text
    content: 'When Saul had taken the kingship over Israel, he fought against all his enemies on every side, against Moab, '
  - type: note
    content: ch. 11:11
  - type: text
    content: 'against the Ammonites, against Edom, against the kings of '
  - type: note
    content: 2 Sam. 8:3; 10:6
  - type: text
    content: 'Zobah, and against the Philistines. Wherever he turned he routed them. '
  '48':
  - type: text
    content: 'And he did valiantly '
  - type: note
    content: ch. 15:3, 7
  - type: text
    content: and struck the Amalekites and delivered Israel out of the hands of those who plundered them.
  '49':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 31:2; 2 Sam. 2:8-10; 1 Chr. 8:33; 9:39 ]'
  - type: text
    content: 'Now the sons of Saul were Jonathan, Ishvi, and Malchi-shua. And the names of his two daughters were these: the name of the firstborn was '
  - type: note
    content: ch. 18:17, 19
  - type: text
    content: 'Merab, and the name of the younger Michal. '
  '5':
  - type: text
    content: 'The one crag rose on the north in front of Michmash, and the other on the south in front of '
  - type: note
    content: ch. 13:3, 16
  - type: text
    content: Geba.
  '50':
  - type: text
    content: 'And the name of Saul’s wife was Ahinoam the daughter of Ahimaaz. '
  - type: note
    content: 2 Sam. 2:8
  - type: text
    content: 'And the name of the commander of his army was Abner the son of Ner, '
  - type: note
    content: '[ch. 10:14]'
  - type: text
    content: 'Saul’s uncle. '
  '51':
  - type: note
    content: ch. 9:1
  - type: text
    content: 'Kish was the father of Saul, and Ner the father of Abner was the son of '
  - type: note
    content: ch. 9:1
  - type: text
    content: Abiel.
  '52':
  - type: text
    content: 'There was hard fighting against the Philistines all the days of Saul. And when Saul saw any strong man, or any valiant man, '
  - type: note
    content: ch. 8:11
  - type: text
    content: he attached him to himself.
  '6':
  - type: text
    content: 'Jonathan said to the young man who carried his armor, “Come, let us go over to the garrison of these '
  - type: note
    content: ch. 17:26; Judg. 14:3
  - type: text
    content: 'uncircumcised. It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' will work for us, '
  - type: note
    content: '[Judg. 7:4, 7; 2 Chr. 14:11]'
  - type: text
    content: 'for nothing can hinder the '
  - type: text
    content: Lord
  - type: text
    content: ' from saving by many or by few.” '
  '7':
  - type: text
    content: And his armor-bearer said to him, “Do all that is in your heart. Do as you wish.
  - type: note
    content: Septuagint Do all that your mind inclines to
  - type: text
    content: ' Behold, I am with you heart and soul.” '
  '8':
  - type: text
    content: 'Then Jonathan said, “Behold, we will cross over to the men, and we will show ourselves to them. '
  '9':
  - type: text
    content: 'If they say to us, ‘Wait until we come to you,’ then we will stand still in our place, and we will not go up to them. '
