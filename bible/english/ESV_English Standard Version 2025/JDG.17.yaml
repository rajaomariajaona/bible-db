document_id: JDG.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Micah and the Levite
  - type: text
    content: 'There was a man of '
  - type: note
    content: ver. 8; ch. 18:2; See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, whose name was Micah. '
  '10':
  - type: text
    content: 'And Micah said to him, “Stay with me, and be to me '
  - type: note
    content: ch. 18:19
  - type: text
    content: 'a father and a priest, and I will give you ten pieces of silver a year and a suit of clothes and your living.” And the Levite went in. '
  '11':
  - type: text
    content: 'And the Levite '
  - type: note
    content: '[Ex. 2:21]'
  - type: text
    content: 'was content to dwell with the man, and the young man became to him like one of his sons. '
  '12':
  - type: text
    content: 'And Micah '
  - type: note
    content: ver. 5
  - type: text
    content: 'ordained the Levite, and the young man '
  - type: note
    content: '[ch. 18:30]'
  - type: text
    content: 'became his priest, and was in the house of Micah. '
  '13':
  - type: text
    content: 'Then Micah said, “Now I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' will prosper me, because I have a Levite as priest.”'
  '2':
  - type: text
    content: 'And he said to his mother, “The 1,100 pieces of silver that were taken from you, about which you uttered a curse, and also spoke it in my ears, behold, the silver is with me; I took it.” And his mother said, '
  - type: note
    content: Ruth 3:10; 1 Sam. 15:13
  - type: text
    content: '“Blessed be my son by the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: 'And he restored the 1,100 pieces of silver to his mother. And his mother said, “I dedicate the silver to the '
  - type: text
    content: Lord
  - type: text
    content: ' from my hand for my son, to make '
  - type: note
    content: '[Ex. 20:4]'
  - type: text
    content: 'a carved image and '
  - type: note
    content: '[Lev. 19:4]'
  - type: text
    content: 'a metal image. Now therefore I will restore it to you.” '
  '4':
  - type: text
    content: 'So when he restored the money to his mother, his mother '
  - type: note
    content: '[Isa. 46:6]'
  - type: text
    content: 'took 200 pieces of silver and gave it to the silversmith, who made it into a carved image and a metal image. And it was in the house of Micah. '
  '5':
  - type: text
    content: 'And the man Micah had a shrine, and he made '
  - type: note
    content: ch. 8:27; 18:14, 17; See Ex. 28:6-35
  - type: text
    content: 'an ephod and '
  - type: note
    content: '[Gen. 31:19; Hos. 3:4]'
  - type: text
    content: 'household gods, and '
  - type: note
    content: ver. 12; [1 Kgs. 13:33]
  - type: text
    content: ordained
  - type: note
    content: Hebrew filled the hand of; also verse 12
  - type: text
    content: ' one of his sons, who became his priest. '
  '6':
  - type: note
    content: ch. 18:1; 19:1; 21:25
  - type: text
    content: 'In those days there was no king in Israel. '
  - type: note
    content: '[Deut. 12:8]'
  - type: text
    content: Everyone did what was right in his own eyes.
  '7':
  - type: text
    content: 'Now there was a young man of '
  - type: note
    content: ch. 19:1; Ruth 1:1, 2; Mic. 5:2; Matt. 2:1, 5, 6
  - type: text
    content: 'Bethlehem in Judah, of the family of Judah, who was a Levite, and he sojourned there. '
  '8':
  - type: text
    content: 'And the man departed from the town of Bethlehem in Judah to sojourn where he could find a place. And as he journeyed, he came to '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim to the house of Micah. '
  '9':
  - type: text
    content: 'And Micah said to him, “Where do you come from?” And he said to him, “I am a Levite of Bethlehem in Judah, and I am going to sojourn where I may find a place.” '
