document_id: NEH.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Conspiracy Against Nehemiah
  - type: text
    content: 'Now when '
  - type: note
    content: ch. 2:10, 19; 4:1, 7
  - type: text
    content: 'Sanballat and Tobiah and '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: Geshem the Arab and the rest of our enemies heard that I had built the wall and that there was no breach left in it (
  - type: note
    content: '[ch. 3:1, 3]'
  - type: text
    content: 'although up to that time I had not set up the doors in the gates), '
  '10':
  - type: text
    content: 'Now when I went into the house of Shemaiah the son of Delaiah, son of Mehetabel, who was '
  - type: note
    content: '[Jer. 36:5]'
  - type: text
    content: 'confined to his home, he said, “Let us meet together in the house of God, within the temple. Let us close the doors of the temple, for they are coming to kill you. They are coming to kill you by night.” '
  '11':
  - type: text
    content: But I said, “Should such a man as I run away? And what man such as I could go into the temple and live?
  - type: note
    content: Or would go into the temple to save his life
  - type: text
    content: ' I will not go in.” '
  '12':
  - type: text
    content: 'And I understood and saw that God had not sent him, '
  - type: note
    content: '[Ezek. 13:17, 22]'
  - type: text
    content: 'but he had pronounced the prophecy against me because Tobiah and Sanballat had hired him. '
  '13':
  - type: text
    content: 'For this purpose he was hired, that I should be afraid and act in this way and sin, and so they could give me a bad name in order to taunt me. '
  '14':
  - type: note
    content: ch. 13:29
  - type: text
    content: 'Remember Tobiah and Sanballat, O my God, according to these things that they did, and also '
  - type: note
    content: '[Ezek. 13:17]'
  - type: text
    content: the prophetess Noadiah and the rest of the prophets who wanted to make me afraid.
  - type: heading
    content: The Wall Is Finished
  '15':
  - type: text
    content: 'So the wall was finished on the twenty-fifth day of the month Elul, in fifty-two days. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ch. 2:10; 4:1, 7
  - type: text
    content: 'when all our enemies heard of it, all the nations around us were afraid and fell greatly in their own esteem, '
  - type: note
    content: '[Ps. 126:2]'
  - type: text
    content: 'for they perceived that this work had been accomplished with the help of our God. '
  '17':
  - type: text
    content: 'Moreover, in those days the nobles of Judah sent many letters to Tobiah, and Tobiah’s letters came to them. '
  '18':
  - type: text
    content: 'For many in Judah were bound by oath to him, because he was the son-in-law of Shecaniah the son of '
  - type: note
    content: Ezra 2:5
  - type: text
    content: 'Arah: and his son Jehohanan had taken the daughter of '
  - type: note
    content: Ezra 8:16
  - type: text
    content: 'Meshullam the son of Berechiah as his wife. '
  '19':
  - type: text
    content: Also they spoke of his good deeds in my presence and reported my words to him. And Tobiah sent letters to make me afraid.
  '2':
  - type: text
    content: 'Sanballat and Geshem sent to me, saying, “Come and let us meet together at Hakkephirim in the plain of '
  - type: note
    content: 1 Chr. 8:12
  - type: text
    content: 'Ono.” But they intended to do me harm. '
  '3':
  - type: text
    content: 'And I sent messengers to them, saying, “I am doing a great work and I cannot come down. Why should the work stop while I leave it and come down to you?” '
  '4':
  - type: text
    content: 'And they sent to me four times in this way, and I answered them in the same manner. '
  '5':
  - type: text
    content: 'In the same way Sanballat for the fifth time sent his servant to me with an open letter in his hand. '
  '6':
  - type: text
    content: In it was written, “It is reported among the nations, and Geshem
  - type: note
    content: Hebrew Gashmu
  - type: text
    content: ' also says it, that you and '
  - type: note
    content: ch. 2:19
  - type: text
    content: 'the Jews intend to rebel; that is why you are building the wall. And according to these reports you wish to become their king. '
  '7':
  - type: text
    content: 'And you have also set up prophets to proclaim concerning you in Jerusalem, ‘There is a king in Judah.’ And now the king will hear of these reports. So now come and let us take counsel together.” '
  '8':
  - type: text
    content: 'Then I sent to him, saying, “No such things as you say have been done, for you are inventing them out of your own mind.” '
  '9':
  - type: text
    content: For they all wanted to frighten us, thinking, “Their hands will drop from the work, and it will not be done.” But now, O God,
  - type: note
    content: Hebrew lacks O God
  - type: text
    content: ' strengthen my hands.'
