verses:
  '1':
  - type: heading
    content: Punishment Coming for Israel and Judah
  - type: text
    content: ' '
  - type: note
    content: ch. 4:1; Joel 1:2; Amos 3:1; Mic. 1:2
  - type: text
    content: Hear this, O priests!
  - type: text
    content: Pay attention, O house of Israel!
  - type: text
    content: Give ear, O house of the king!
  - type: text
    content: For the judgment is for you;
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 6:9; 9:8]'
  - type: text
    content: you have been a snare at Mizpah
  - type: text
    content: 'and a net spread upon '
  - type: note
    content: Judg. 4:6
  - type: text
    content: Tabor.
  '10':
  - type: text
    content: The princes of Judah have become
  - type: text
    content: 'like '
  - type: note
    content: Deut. 19:14
  - type: text
    content: those who move the landmark;
  - type: text
    content: upon them I will pour out
  - type: text
    content: my wrath like water.
  '11':
  - type: text
    content: 'Ephraim is '
  - type: note
    content: Deut. 28:33; Amos 4:1
  - type: text
    content: oppressed, crushed in judgment,
  - type: text
    content: because he was determined to go after filth.
  - type: note
    content: Or to follow human precepts
  '12':
  - type: text
    content: 'But I am '
  - type: note
    content: '[Job 13:28]'
  - type: text
    content: like a moth to Ephraim,
  - type: text
    content: 'and '
  - type: note
    content: '[Job 13:28]'
  - type: text
    content: like dry rot to the house of Judah.
  '13':
  - type: text
    content: When Ephraim saw his sickness,
  - type: text
    content: 'and Judah '
  - type: note
    content: '[Isa. 1:5, 6]'
  - type: text
    content: his wound,
  - type: text
    content: 'then Ephraim went '
  - type: note
    content: ch. 7:11; 8:9; 12:1; 2 Kgs. 15:19
  - type: text
    content: to Assyria,
  - type: text
    content: and sent to the great king.
  - type: note
    content: Or to King Jareb
  - type: note
    content: ch. 14:3
  - type: text
    content: But he is not able to cure you
  - type: text
    content: 'or heal '
  - type: note
    content: '[Isa. 1:5, 6]'
  - type: text
    content: your wound.
  '14':
  - type: text
    content: 'For I will be '
  - type: note
    content: ch. 13:7
  - type: text
    content: 'like a lion to '
  - type: note
    content: See ch. 6:4
  - type: text
    content: Ephraim,
  - type: text
    content: 'and like a young lion to the house of '
  - type: note
    content: See ch. 6:4
  - type: text
    content: Judah.
  - type: note
    content: '[ Mic. 5:8 ]'
  - type: text
    content: I, even I, will tear and go away;
  - type: text
    content: I will carry off, and no one shall rescue.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 29:10-12; Ezek. 6:9 ]; See Lev. 26:40-42'
  - type: text
    content: I will return again to my place,
  - type: text
    content: until they acknowledge their guilt and seek my face,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 26:16
  - type: text
    content: in their distress earnestly seek me.
  '2':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 9:15]'
  - type: text
    content: 'the revolters '
  - type: note
    content: '[ch. 9:9; Isa. 29:15]'
  - type: text
    content: have gone deep into slaughter,
  - type: text
    content: 'but '
  - type: note
    content: '[Ps. 50:21]'
  - type: text
    content: I will discipline all of them.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Amos 3:2; 5:12 ]'
  - type: text
    content: I know Ephraim,
  - type: text
    content: and Israel is not hidden from me;
  - type: text
    content: for now, O Ephraim, you have played the whore;
  - type: text
    content: Israel is defiled.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 59:2 ]'
  - type: text
    content: Their deeds do not permit them
  - type: text
    content: to return to their God.
  - type: text
    content: 'For '
  - type: note
    content: ch. 4:12
  - type: text
    content: the spirit of whoredom is within them,
  - type: text
    content: 'and they know not the '
  - type: text
    content: Lord
  - type: text
    content: .
