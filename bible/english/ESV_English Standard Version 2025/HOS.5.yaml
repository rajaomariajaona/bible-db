  - type: text
    content: ' '
  - type: note
    content: ch. 7:10
  - type: text
    content: The pride of Israel testifies to his face;
  - type: note
    content: Or in his presence
  - type: text
    content: 'Israel and '
  - type: note
    content: See ch. 6:4
  - type: text
    content: Ephraim shall stumble in his guilt;
  - type: note
    content: See ch. 6:4
  - type: text
    content: Judah also shall stumble with them.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:6; Isa. 1:11
  - type: text
    content: With their flocks and herds they shall go
  - type: text
    content: 'to seek the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: ch. 6:6; Isa. 1:11
  - type: text
    content: but they will not find him;
  - type: note
    content: ch. 9:12
  - type: text
    content: he has withdrawn from them.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:7
  - type: text
    content: 'They have dealt faithlessly with the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: for they have borne alien children.
  - type: text
    content: Now the new moon shall devour them with their fields.
  '8':
  - type: text
    content: ' '
  - type: note
