document_id: 1CO.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Way of Love
  - type: text
    content: 'If I speak in the tongues of men and of angels, but have not love, I am a noisy gong or a clanging cymbal. '
  '10':
  - type: text
    content: 'but '
  - type: note
    content: '[John 15:15]'
  - type: text
    content: 'when the perfect comes, the partial will pass away. '
  '11':
  - type: text
    content: 'When I was a child, I spoke like a child, I thought like a child, I reasoned like a child. When I became a man, I gave up childish ways. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: James 1:23; [Num. 12:8; Job 36:26; 2 Cor. 3:18; 5:7]
  - type: text
    content: 'now we see in a mirror dimly, but '
  - type: note
    content: 1 John 3:2; See Matt. 5:8
  - type: text
    content: 'then face to face. Now I know in part; then I shall know fully, even as '
  - type: note
    content: See ch. 8:3
  - type: text
    content: I have been fully known.
  '13':
  - type: text
    content: So now faith, hope, and love abide, these three; but the greatest of these is love.
  '2':
  - type: text
    content: 'And if I have '
  - type: note
    content: '[ch. 14:1, 39; Matt. 7:22]; See Acts 2:18'
  - type: text
    content: 'prophetic powers, and understand all mysteries and all knowledge, and if I have all faith, '
  - type: note
    content: Matt. 17:20; Mark 11:23; [Luke 17:6]
  - type: text
    content: 'so as to remove mountains, but have not love, I am nothing. '
  '3':
  - type: note
    content: '[Matt. 6:2]'
  - type: text
    content: 'If I give away all I have, and '
  - type: note
    content: Dan. 3:28
  - type: text
    content: if I deliver up my body to be burned,
  - type: note
    content: Some manuscripts deliver up my body [to death] that I may boast
  - type: text
    content: ' but have not love, I gain nothing.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 10:12; 17:9; 1 Thess. 5:14; 2 Tim. 2:10; 1 Pet. 4:8 ]'
  - type: text
    content: 'Love is patient and '
  - type: note
    content: '[2 Cor. 6:6; Gal. 5:22; Eph. 4:32; Col. 3:12]'
  - type: text
    content: 'kind; love '
  - type: note
    content: Acts 7:9
  - type: text
    content: 'does not envy or boast; it '
  - type: note
    content: See ch. 4:6
  - type: text
    content: 'is not arrogant '
  '5':
  - type: text
    content: 'or rude. It '
  - type: note
    content: See ch. 10:24
  - type: text
    content: 'does not insist on its own way; it '
  - type: note
    content: '[Rom. 4:6; 2 Cor. 5:19]'
  - type: text
    content: is not irritable or resentful;
  - type: note
    content: Greek irritable and does not count up wrongdoing
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'it '
  - type: note
    content: '[Rom. 1:32; 2 Thess. 2:12]'
  - type: text
    content: 'does not rejoice at wrongdoing, but '
  - type: note
    content: '[2 John 4; 3 John 3, 4]'
  - type: text
    content: 'rejoices with the truth. '
  '7':
  - type: note
    content: ch. 9:12
  - type: text
    content: 'Love bears all things, believes all things, hopes all things, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: endures all things.
  '8':
  - type: text
    content: 'Love never ends. As for prophecies, they will pass away; as for tongues, they will cease; as for knowledge, it will pass away. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 8:2]'
  - type: text
    content: 'we know in part and we prophesy in part, '
