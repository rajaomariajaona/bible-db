document_id: DEU.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sabbatical Year
  - type: text
    content: '“At the end of '
  - type: note
    content: ch. 31:10; Neh. 10:31; [ver. 12; Ex. 23:10, 11; Lev. 25:2-4]
  - type: text
    content: 'every seven years you shall grant a release. '
  '10':
  - type: text
    content: 'You shall give to him freely, and '
  - type: note
    content: '[2 Cor. 9:7]'
  - type: text
    content: 'your heart shall not be grudging when you give to him, because '
  - type: note
    content: Prov. 28:27; See ch. 14:29
  - type: text
    content: 'for this the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in all your work and in all that you undertake. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: '[Matt. 26:11; Mark 14:7; John 12:8]'
  - type: text
    content: 'there will never cease to be poor in the land. Therefore I command you, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: ‘You shall open wide your hand to your brother, to the needy and to the poor, in your land.’
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ex. 21:2; Jer. 34:14; [ Lev. 25:39-41 ]
  - type: text
    content: “If your brother, a Hebrew man or a Hebrew woman, is sold
  - type: note
    content: Or sells himself
  - type: text
    content: ' to you, he shall serve you six years, and in the seventh year you shall let him go free from you. '
  '13':
  - type: text
    content: 'And when you let him go free from you, you shall not let him go empty-handed. '
  '14':
  - type: text
    content: 'You shall furnish him liberally out of your flock, out of your threshing floor, and out of your winepress. '
  - type: note
    content: ch. 8:18; 16:17
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you, you shall give to him. '
  '15':
  - type: note
    content: See ch. 5:15
  - type: text
    content: 'You shall remember that you were a slave in the land of Egypt, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God redeemed you; therefore I command you this today. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 21:5, 6
  - type: text
    content: 'if he says to you, ‘I will not go out from you,’ because he loves you and your household, since he is well-off with you, '
  '17':
  - type: text
    content: then you shall take an awl, and put it through his ear into the door, and he shall be your slave
  - type: note
    content: Or servant; the Hebrew term ‘ebed designates a range of social and economic roles (see Preface)
  - type: text
    content: ' forever. And to your female slave'
  - type: note
    content: Or servant
  - type: text
    content: ' you shall do the same. '
  '18':
  - type: text
    content: 'It shall not seem hard to you when you let him go free from you, for at half the cost of a hired worker he has served you six years. So the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in all that you do.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 13:2
  - type: text
    content: '“All the firstborn males that are born of your herd and flock you shall dedicate to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You shall do no work with the firstborn of your herd, nor shear the firstborn of your flock. '
  '2':
  - type: text
    content: 'And this is the manner of the release: every creditor shall release what he has lent to his neighbor. He shall not exact it of his neighbor, his brother, because the '
  - type: text
    content: Lord
  - type: text
    content: '’s release has been proclaimed. '
  '20':
  - type: note
    content: ch. 12:7; 14:23, 26
  - type: text
    content: 'You shall eat it, you and your household, before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God year by year at the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose. '
  '21':
  - type: note
    content: See Lev. 22:20
  - type: text
    content: 'But if it has any blemish, if it is lame or blind or has any serious blemish whatever, you shall not sacrifice it to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '22':
  - type: text
    content: 'You shall eat it within your towns. '
  - type: note
    content: ch. 12:15
  - type: text
    content: 'The unclean and the clean alike may eat it, as though it were a gazelle or a deer. '
  '23':
  - type: note
    content: See Lev. 3:17
  - type: text
    content: Only you shall not eat its blood; you shall pour it out on the ground like water.
  '3':
  - type: note
    content: '[ch. 23:20]'
  - type: text
    content: 'Of a foreigner you may exact it, but whatever of yours is with your brother your hand shall release. '
  '4':
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'But there will be no poor among you; '
  - type: note
    content: ch. 28:8
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will bless you in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance to possess— '
  '5':
  - type: note
    content: ch. 28:1
  - type: text
    content: 'if only you will strictly obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, being careful to do all this commandment that I command you today. '
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you, '
  - type: note
    content: ch. 7:13; Ex. 23:25
  - type: text
    content: 'as he promised you, and '
  - type: note
    content: ch. 28:12, 44
  - type: text
    content: 'you shall lend to many nations, but you shall not borrow, and '
  - type: note
    content: ch. 28:13; 1 Kgs. 4:21, 24; Ezra 4:20; [Prov. 22:7]
  - type: text
    content: you shall rule over many nations, but they shall not rule over you.
  '7':
  - type: text
    content: '“If among you, one of your brothers should become poor, in any of your towns within your land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, '
  - type: note
    content: '[1 John 3:17]'
  - type: text
    content: 'you shall not harden your heart or shut your hand against your poor brother, '
  '8':
  - type: text
    content: 'but '
  - type: note
    content: Lev. 25:35; [Matt. 5:42; Luke 6:34, 35]
  - type: text
    content: 'you shall open your hand to him and lend him sufficient for his need, whatever it may be. '
  '9':
  - type: text
    content: 'Take care lest there be an unworthy thought in your heart and you say, ‘The seventh year, the year of release is near,’ and your '
  - type: note
    content: ch. 28:54, 56; Prov. 23:6; 28:22; Matt. 20:15
  - type: text
    content: eye look grudgingly
  - type: note
    content: Or be evil; also verse 10
  - type: text
    content: ' on your poor brother, and you give him nothing, and he '
  - type: note
    content: ch. 24:15
  - type: text
    content: 'cry to the '
  - type: text
    content: Lord
  - type: text
    content: ' against you, and '
  - type: note
    content: '[Matt. 25:41, 42]'
  - type: text
    content: 'you be guilty of sin. '
