document_id: 2SA.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Ziba
  - type: text
    content: 'When David had passed a little beyond '
  - type: note
    content: ch. 15:30, 32
  - type: text
    content: 'the summit, '
  - type: note
    content: See ch. 9:2-13
  - type: text
    content: 'Ziba the servant of Mephibosheth met him, with a couple of donkeys saddled, bearing two hundred loaves of bread, '
  - type: note
    content: '[1 Sam. 25:18]'
  - type: text
    content: 'a hundred bunches of raisins, a hundred of summer fruits, and a skin of wine. '
  '10':
  - type: text
    content: 'But the king said, '
  - type: note
    content: ch. 19:22
  - type: text
    content: '“What have I to do with you, '
  - type: note
    content: See 1 Sam. 26:6
  - type: text
    content: 'you sons of Zeruiah? If he is cursing because the '
  - type: text
    content: Lord
  - type: text
    content: ' has said to him, ‘Curse David,’ who then shall say, ‘Why have you done so?’” '
  '11':
  - type: text
    content: 'And David said to Abishai and to all his servants, “Behold, '
  - type: note
    content: ch. 12:11
  - type: text
    content: 'my own son seeks my life; how much more now may this Benjaminite! Leave him alone, and let him curse, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has told him to. '
  '12':
  - type: text
    content: 'It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' will look on the wrong done to me,'
  - type: note
    content: Septuagint, Vulgate will look upon my affliction
  - type: text
    content: ' and that the '
  - type: text
    content: Lord
  - type: text
    content: ' will repay me with good for his cursing today.” '
  '13':
  - type: text
    content: 'So David and his men went on the road, while Shimei went along on the hillside opposite him and '
  - type: note
    content: ch. 19:21
  - type: text
    content: 'cursed as he went and threw stones at him and flung dust. '
  '14':
  - type: text
    content: 'And the king, and all the people who were with him, '
  - type: note
    content: ver. 2
  - type: text
    content: arrived weary at the Jordan.
  - type: note
    content: Septuagint; Hebrew lacks at the Jordan
  - type: text
    content: ' And there he refreshed himself.'
  - type: heading
    content: Absalom Enters Jerusalem
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:37
  - type: text
    content: 'Now Absalom and all the people, the men of Israel, came to Jerusalem, and Ahithophel with him. '
  '16':
  - type: text
    content: 'And when Hushai the Archite, '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'David’s friend, came to Absalom, Hushai said to Absalom, '
  - type: note
    content: 1 Sam. 10:24; 1 Kgs. 1:25, 39; 2 Kgs. 11:12
  - type: text
    content: '“Long live the king! Long live the king!” '
  '17':
  - type: text
    content: 'And Absalom said to Hushai, “Is this your loyalty to your friend? '
  - type: note
    content: '[ch. 19:25]'
  - type: text
    content: 'Why did you not go with your friend?” '
  '18':
  - type: text
    content: 'And Hushai said to Absalom, “No, for whom the '
  - type: text
    content: Lord
  - type: text
    content: ' and this people and all the men of Israel have chosen, his I will be, and with him I will remain. '
  '19':
  - type: text
    content: 'And again, '
  - type: note
    content: ch. 15:34
  - type: text
    content: whom should I serve? Should it not be his son? As I have served your father, so I will serve you.”
  '2':
  - type: text
    content: 'And the king said to Ziba, “Why have you brought these?” Ziba answered, '
  - type: note
    content: '[Judg. 5:10; 10:4]'
  - type: text
    content: '“The donkeys are for the king’s household to ride on, the bread and summer fruit for the young men to eat, and the wine for those who '
  - type: note
    content: ver. 14; ch. 17:29
  - type: text
    content: 'faint in the wilderness to drink.” '
  '20':
  - type: text
    content: 'Then Absalom said to Ahithophel, “Give your counsel. What shall we do?” '
  '21':
  - type: text
    content: 'Ahithophel said to Absalom, “Go in to '
  - type: note
    content: ch. 15:16; 20:3
  - type: text
    content: 'your father’s concubines, whom he has left to keep the house, and all Israel will hear that you have made yourself a stench to your father, and '
  - type: note
    content: ch. 2:7; Zech. 8:9, 13
  - type: text
    content: 'the hands of all who are with you will be strengthened.” '
  '22':
  - type: text
    content: 'So they pitched a tent for Absalom '
  - type: note
    content: See 1 Sam. 9:25
  - type: text
    content: 'on the roof. And Absalom went in to his father’s concubines '
  - type: note
    content: ch. 12:11, 12
  - type: text
    content: 'in the sight of all Israel. '
  '23':
  - type: text
    content: 'Now in those days the counsel that Ahithophel gave was as if one consulted the word of God; so was all the counsel of Ahithophel esteemed, '
  - type: note
    content: ch. 15:12
  - type: text
    content: both by David and by Absalom.
  '3':
  - type: text
    content: 'And the king said, “And where is your master’s son?” '
  - type: note
    content: ch. 19:26, 27
  - type: text
    content: 'Ziba said to the king, “Behold, he remains in Jerusalem, for he said, ‘Today the house of Israel will give me back the kingdom of my father.’” '
  '4':
  - type: text
    content: Then the king said to Ziba, “Behold, all that belonged to Mephibosheth is now yours.” And Ziba said, “I pay homage; let me ever find favor in your sight, my lord the king.”
  - type: heading
    content: Shimei Curses David
  '5':
  - type: text
    content: 'When King David came to '
  - type: note
    content: See ch. 3:16
  - type: text
    content: 'Bahurim, there came out a man of the family of the house of Saul, whose name was '
  - type: note
    content: ch. 19:16; See 1 Kgs. 2:8, 36-46
  - type: text
    content: 'Shimei, the son of Gera, and as he came '
  - type: note
    content: ch. 19:21
  - type: text
    content: 'he cursed continually. '
  '6':
  - type: text
    content: 'And he threw stones at David and at all the servants of King David, and all the people and all the mighty men were on his right hand and on his left. '
  '7':
  - type: text
    content: 'And Shimei said as he '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'cursed, “Get out, get out, you man of blood, you worthless man! '
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Judg. 9:24, 56, 57; 1 Kgs. 2:32, 33
  - type: text
    content: 'has avenged on you all '
  - type: note
    content: See ch. 1:16
  - type: text
    content: 'the blood of the house of Saul, in whose place you have reigned, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has given the kingdom into the hand of your son Absalom. See, your evil is on you, for you are a man of blood.”'
  '9':
  - type: text
    content: 'Then Abishai the son of Zeruiah said to the king, “Why should this '
  - type: note
    content: ch. 9:8; 1 Sam. 24:14; [ch. 3:8]
  - type: text
    content: 'dead dog '
  - type: note
    content: '[Ex. 22:28]'
  - type: text
    content: 'curse my lord the king? Let me go over and take off his head.” '
