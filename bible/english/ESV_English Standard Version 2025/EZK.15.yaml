document_id: EZK.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem, a Useless Vine
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, how does '
  - type: note
    content: See ver. 6
  - type: text
    content: 'the wood of the vine surpass any wood, the vine branch that is among the trees of the forest? '
  '3':
  - type: text
    content: 'Is wood taken from it to make anything? Do people take '
  - type: note
    content: '[Isa. 22:23, 24]'
  - type: text
    content: 'a peg from it to hang any vessel on it? '
  '4':
  - type: note
    content: '[John 15:6]'
  - type: text
    content: 'Behold, it is given to the fire for fuel. When the fire has consumed both ends of it, and the middle of it is charred, is it useful for anything? '
  '5':
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'Behold, when it was whole, it was used for nothing. How much less, when the fire has consumed it and it is charred, can it ever be used for anything! '
  '6':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ch. 17:6; Ps. 80:8; Isa. 5:1]; See ch. 19:10-14'
  - type: text
    content: 'Like the wood of the vine among the trees of the forest, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'which I have given to the fire for fuel, so have I given up the inhabitants of Jerusalem. '
  '7':
  - type: note
    content: See ch. 14:8
  - type: text
    content: 'And I will set my face against them. Though '
  - type: note
    content: '[2 Kgs. 25:9]'
  - type: text
    content: 'they escape from the fire, the fire shall yet consume them, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 14:8
  - type: text
    content: 'when I set my face against them. '
  '8':
  - type: note
    content: ch. 6:14
  - type: text
    content: 'And I will make the land desolate, because '
  - type: note
    content: See ch. 14:13
  - type: text
    content: 'they have acted faithlessly, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
