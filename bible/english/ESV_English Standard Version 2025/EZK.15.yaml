document_id: EZK.15,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem, a Useless Vine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:1
      marker-yv: yv-n
    - type: text
      text: '“Son of man, how does '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: 'the wood of the vine surpass any wood, the vine branch that is among the trees of the forest? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is wood taken from it to make anything? Do people take '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 22:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'a peg from it to hang any vessel on it? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 15:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Behold, it is given to the fire for fuel. When the fire has consumed both ends of it, and the middle of it is charred, is it useful for anything? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Behold, when it was whole, it was used for nothing. How much less, when the fire has consumed it and it is charred, can it ever be used for anything! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus says the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 80:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 5:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:10-14
      marker-yv: yv-n
    - type: text
      text: 'Like the wood of the vine among the trees of the forest, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'which I have given to the fire for fuel, so have I given up the inhabitants of Jerusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:8
      marker-yv: yv-n
    - type: text
      text: 'And I will set my face against them. Though '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 25:9
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'they escape from the fire, the fire shall yet consume them, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:7
      marker-yv: yv-n
    - type: text
      text: 'and you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:8
      marker-yv: yv-n
    - type: text
      text: 'when I set my face against them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:14
      marker-yv: yv-n
    - type: text
      text: 'And I will make the land desolate, because '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:13
      marker-yv: yv-n
    - type: text
      text: 'they have acted faithlessly, declares the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
