document_id: LUK.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-10, see Matt. 28:1-8; Mark 16:1-8; John 20:1
  - type: text
    content: 'But on the first day of the week, at early dawn, they went to the tomb, '
  - type: note
    content: ch. 23:56
  - type: text
    content: 'taking the spices they had prepared. '
  '10':
  - type: text
    content: 'Now it was '
  - type: note
    content: Matt. 27:56; Mark 15:40, 41
  - type: text
    content: 'Mary Magdalene and '
  - type: note
    content: ch. 8:3
  - type: text
    content: 'Joanna and Mary the mother of James and the other women with them who told these things to the apostles, '
  '11':
  - type: text
    content: 'but these words seemed to them an idle tale, and '
  - type: note
    content: Mark 16:11; See Mark 16:16
  - type: text
    content: 'they did not believe them. '
  '12':
  - type: text
    content: 'But '
  - type: note
    content: John 20:3-6
  - type: text
    content: 'Peter rose and ran to the tomb; stooping and looking in, he saw '
  - type: note
    content: John 19:40
  - type: text
    content: the linen cloths by themselves; and he went home marveling at what had happened.
  - type: heading
    content: On the Road to Emmaus
  '13':
  - type: text
    content: 'That very day '
  - type: note
    content: Mark 16:12
  - type: text
    content: two of them were going to a village named Emmaus, about seven miles
  - type: note
    content: Greek sixty stadia; a stadion was about 607 feet or 185 meters
  - type: text
    content: ' from Jerusalem, '
  '14':
  - type: text
    content: 'and they were talking with each other about all these things that had happened. '
  '15':
  - type: text
    content: 'While they were talking and discussing together, Jesus himself drew near and went with them. '
  '16':
  - type: note
    content: John 20:14; 21:4; [ver. 31; ch. 9:45; 18:34]
  - type: text
    content: 'But their eyes were kept from recognizing him. '
  '17':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “What is this conversation that you are holding with each other as you walk?”
  - type: text
    content: ' And they stood still, looking sad. '
  '18':
  - type: text
    content: 'Then one of them, named Cleopas, answered him, “Are you the only visitor to Jerusalem who does not know the things that have happened there in these days?” '
  '19':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “What things?”
  - type: text
    content: ' And they said to him, “Concerning Jesus of Nazareth, a man who was '
  - type: note
    content: See Matt. 21:11
  - type: text
    content: 'a prophet '
  - type: note
    content: Acts 2:22; [Acts 7:22]
  - type: text
    content: 'mighty in deed and word before God and all the people, '
  '2':
  - type: text
    content: 'And they found '
  - type: note
    content: Matt. 27:60; Mark 15:46; [John 11]
  - type: text
    content: 'the stone rolled away from the tomb, '
  '20':
  - type: text
    content: 'and '
  - type: note
    content: Acts 2:23; 5:30; 13:27, 28; 1 Thess. 2:15
  - type: text
    content: 'how our chief priests and '
  - type: note
    content: ch. 23:13, 35; John 3:1; 7:26, 48; 12:42; Acts 3:17; 4:5, 8; 13:27; [1 Cor. 2:8]
  - type: text
    content: 'rulers delivered him up to be condemned to death, and crucified him. '
  '21':
  - type: text
    content: 'But we had hoped that he was '
  - type: note
    content: See ch. 1:68; 1 Pet. 1:18
  - type: text
    content: 'the one to redeem Israel. Yes, and besides all this, it is now '
  - type: note
    content: ver. 7
  - type: text
    content: 'the third day since these things happened. '
  '22':
  - type: text
    content: 'Moreover, some women of our company amazed us. '
  - type: note
    content: ver. 1
  - type: text
    content: 'They were at the tomb early in the morning, '
  '23':
  - type: text
    content: 'and '
  - type: note
    content: ver. 3
  - type: text
    content: 'when they did not find his body, they came back saying that '
  - type: note
    content: ver. 4, 5, 9
  - type: text
    content: 'they had even seen a vision of angels, who said that he was alive. '
  '24':
  - type: note
    content: ver. 12; John 20:3
  - type: text
    content: 'Some of those who were with us went to the tomb and found it just as the women had said, but him they did not see.” '
  '25':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “O foolish ones, and slow of heart to believe all that the prophets have spoken!
  - type: text
    content: ' '
  '26':
  - type: note
    content: ver. 7, 44, 46; Heb. 2:10; 12:2; 1 Pet. 1:11; See Acts 3:18
  - type: text
    content: 'Was it not necessary that '
  - type: note
    content: See Matt. 1:17
  - type: text
    content: 'the Christ should suffer these things and enter into '
  - type: note
    content: See ch. 9:26
  - type: text
    content: his glory?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: Acts 8:35
  - type: text
    content: 'beginning with '
  - type: note
    content: Gen. 3:15; 12:3; 22:18; Num. 21:9; 24:17; [John 1:45; 5:46]
  - type: text
    content: 'Moses and '
  - type: note
    content: 2 Sam. 7:12-16; Isa. 7:14; 9:6; 50:6; 52:13–53:12; 61:1; Jer. 23:5, 6; Dan. 7:13, 14; 9:24-27; Mic. 5:2; Zech. 6:12; 9:9; 12:10; 13:7; [Acts 13:27]
  - type: text
    content: all the Prophets, he interpreted to them in all the Scriptures the things concerning himself.
  '28':
  - type: text
    content: 'So they drew near to the village to which they were going. '
  - type: note
    content: '[Mark 6:48]'
  - type: text
    content: 'He acted as if he were going farther, '
  '29':
  - type: text
    content: 'but they urged him strongly, saying, “Stay with us, for it is toward evening and '
  - type: note
    content: ch. 9:12 (Gk.)
  - type: text
    content: 'the day is now far spent.” So he went in to stay with them. '
  '3':
  - type: text
    content: 'but when they went in they did not find the body of the Lord Jesus. '
  '30':
  - type: text
    content: 'When he was at table with them, he took the bread and '
  - type: note
    content: See Matt. 14:19
  - type: text
    content: 'blessed and broke it and gave it to them. '
  '31':
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'And their eyes were opened, and they recognized him. And '
  - type: note
    content: '[ch. 4:30]'
  - type: text
    content: 'he vanished from their sight. '
  '32':
  - type: text
    content: 'They said to each other, '
  - type: note
    content: Ps. 39:3
  - type: text
    content: '“Did not our hearts burn within us while he talked to us on the road, while he '
  - type: note
    content: ver. 45
  - type: text
    content: 'opened to us the Scriptures?” '
  '33':
  - type: text
    content: 'And they rose that same hour and returned to Jerusalem. And they '
  - type: note
    content: Mark 16:13; Acts 17:3
  - type: text
    content: 'found the eleven and '
  - type: note
    content: '[Acts 1:14]'
  - type: text
    content: 'those who were with them gathered together, '
  '34':
  - type: text
    content: 'saying, “The Lord has risen indeed, and '
  - type: note
    content: 1 Cor. 15:5
  - type: text
    content: 'has appeared to Simon!” '
  '35':
  - type: text
    content: 'Then they told what had happened on the road, and '
  - type: note
    content: ver. 30, 31
  - type: text
    content: 'how he was known to them in '
  - type: note
    content: See Acts 2:42
  - type: text
    content: the breaking of the bread.
  - type: heading
    content: Jesus Appears to His Disciples
  '36':
  - type: text
    content: 'As they were talking about these things, '
  - type: note
    content: Mark 16:14; John 20:19
  - type: text
    content: 'Jesus himself stood among them, and said to them, '
  - type: text
    content: “Peace to you!”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But they were '
  - type: note
    content: ch. 21:9
  - type: text
    content: 'startled and '
  - type: note
    content: ver. 5
  - type: text
    content: 'frightened and '
  - type: note
    content: '[Matt. 14:26; Mark 6:49]'
  - type: text
    content: 'thought they saw a spirit. '
  '38':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Why are you troubled, and why do doubts arise in your hearts?
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'See my hands and my feet, that it is I myself. '
  - type: note
    content: 1 John 1:1; [John 20:27]
  - type: text
    content: Touch me, and see. For a spirit does not have flesh and bones as you see that I have.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'While they were perplexed about this, behold, '
  - type: note
    content: John 20:12
  - type: text
    content: 'two '
  - type: note
    content: '[Acts 1:10; 10:30]'
  - type: text
    content: 'men stood by them in dazzling apparel. '
  '40':
  - type: text
    content: 'And when he had said this, '
  - type: note
    content: John 20:20
  - type: text
    content: 'he showed them his hands and his feet. '
  '41':
  - type: text
    content: 'And while they still disbelieved '
  - type: note
    content: Acts 12:14; [Gen. 45:26]
  - type: text
    content: 'for joy and were marveling, '
  - type: note
    content: John 21:5
  - type: text
    content: 'he said to them, '
  - type: text
    content: “Have you anything here to eat?”
  - type: text
    content: ' '
  '42':
  - type: text
    content: They gave him a piece of broiled fish,
  - type: note
    content: Some manuscripts add and some honeycomb
  - type: text
    content: ' '
  '43':
  - type: text
    content: and he took it and ate before them.
  '44':
  - type: text
    content: 'Then he said to them, '
  - type: note
    content: See ver. 6
  - type: text
    content: '“These are my words that I spoke to you while I was still with you, '
  - type: note
    content: See ver. 27
  - type: text
    content: that everything written about me in the Law of Moses and the Prophets and the Psalms must be fulfilled.”
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 32; [Job 33:16; Ps. 119:18; Acts 16:14; 1 John 5:20]
  - type: text
    content: 'he opened their minds to understand the Scriptures, '
  '46':
  - type: text
    content: 'and said to them, '
  - type: text
    content: '“Thus '
  - type: note
    content: See Matt. 26:24
  - type: text
    content: 'it is written, '
  - type: note
    content: See ver. 7, 26
  - type: text
    content: 'that the Christ should suffer and on the third day '
  - type: note
    content: John 20:9
  - type: text
    content: rise from the dead,
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'and that '
  - type: note
    content: Acts 5:31; See Acts 2:38
  - type: text
    content: repentance for
  - type: note
    content: Some manuscripts and
  - type: text
    content: ' '
  - type: text
    content: 'the forgiveness of sins should be proclaimed '
  - type: note
    content: See Acts 4:12
  - type: text
    content: 'in his name '
  - type: note
    content: ch. 2:32; Gen. 12:3; Ps. 22:27; Isa. 2:2; 49:6; Hos. 2:23; Mal. 1:11; Matt. 28:19
  - type: text
    content: 'to all nations, '
  - type: note
    content: Acts 10:37; Gal. 3:8
  - type: text
    content: beginning from Jerusalem.
  - type: text
    content: ' '
  '48':
  - type: note
    content: Acts 1:8, 22; 2:32; 3:15; 5:32; 10:39, 41; 13:31; 1 Pet. 5:1; [John 15:27; 1 Cor. 15:15]
  - type: text
    content: You are witnesses of these things.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And behold, I am sending '
  - type: note
    content: John 14:26; Acts 1:4; [Acts 2:33; Eph. 1:13]; See Acts 2:16, 17
  - type: text
    content: 'the promise of my Father upon you. But stay in the city until you '
  - type: note
    content: Job 29:14; Ps. 132:9
  - type: text
    content: 'are clothed with '
  - type: note
    content: Acts 1:8
  - type: text
    content: 'power '
  - type: note
    content: ch. 1:78; Isa. 32:15
  - type: text
    content: from on high.”
  - type: heading
    content: The Ascension
  '5':
  - type: text
    content: 'And as they were '
  - type: note
    content: ver. 37
  - type: text
    content: 'frightened and bowed their faces to the ground, the men said to them, “Why do you seek the living among the dead? '
  '50':
  - type: text
    content: 'And '
  - type: note
    content: Acts 1:12
  - type: text
    content: 'he led them out as far as '
  - type: note
    content: Matt. 21:17; John 11:18
  - type: text
    content: 'Bethany, and lifting up his hands he blessed them. '
  '51':
  - type: text
    content: 'While he blessed them, '
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'he parted from them and was carried up into heaven. '
  '52':
  - type: text
    content: 'And they '
  - type: note
    content: Matt. 28:9
  - type: text
    content: 'worshiped him and '
  - type: note
    content: '[See ver. 50 above]'
  - type: text
    content: 'returned to Jerusalem '
  - type: note
    content: See John 16:22
  - type: text
    content: 'with great joy, '
  '53':
  - type: text
    content: 'and '
  - type: note
    content: Acts 2:46; 3:1; 5:21, 42
  - type: text
    content: 'were continually in the temple '
  - type: note
    content: ch. 1:64; 2:28
  - type: text
    content: blessing God.
  '6':
  - type: text
    content: 'He is not here, but has risen. Remember how he told you, '
  - type: note
    content: ch. 9:22, 44; Matt. 17:22, 23; Mark 9:30, 31; [ver. 44]
  - type: text
    content: 'while he was still in Galilee, '
  '7':
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'that the Son of Man '
  - type: note
    content: See ch. 13:33
  - type: text
    content: 'must be delivered into the hands of sinful men and '
  - type: note
    content: See Matt. 20:19
  - type: text
    content: 'be crucified and on '
  - type: note
    content: See ch. 9:22
  - type: text
    content: 'the third day rise.” '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: John 2:22; 12:1
  - type: text
    content: 'they remembered his words, '
  '9':
  - type: text
    content: 'and returning from the tomb they '
  - type: note
    content: '[John 20:18]'
  - type: text
    content: 'told all these things to the eleven and to all the rest. '
