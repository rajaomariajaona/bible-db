      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'westward and on to Mareal and touches Dabbesheth, then the brook that is east of '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
