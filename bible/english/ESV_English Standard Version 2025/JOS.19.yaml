  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The seventh lot came out for the tribe of the people of Dan, according to their clans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the territory of its inheritance included Zorah, Eshtaol, Ir-shemesh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 1:35
      metadata:
        usfm: JDG.1.35
    marker-yv: yv-n
  - type: text
    text: 'Shaalabbin, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 1:35
      metadata:
        usfm: JDG.1.35
    marker-yv: yv-n
  - type: text
    text: 'Aijalon, Ithlah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Elon, Timnah, Ekron, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Eltekeh, Gibbethon, Baalath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
