      metadata:
        usfm: JOS.21.34
    marker-yv: yv-n
  - type: text
    text: 'Jokneam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'From Sarid it goes in the other direction eastward toward the sunrise to the boundary of Chisloth-tabor. From there it goes to Daberath, then up to Japhia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'From there it passes along on the east toward the sunrise to Gath-hepher, to Eth-kazin, and going on to Rimmon it bends toward Neah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'then on the north the boundary turns about to Hannathon, and it ends at the Valley of Iphtahel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Kattath, Nahalal, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:1
      metadata:
        usfm: JOS.11.1
    marker-yv: yv-n
  - type: text
    text: 'Shimron, Idalah, and Bethlehem—twelve cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: This is the inheritance of the people of Zebulun, according to their clans—these cities with their villages.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Inheritance for Issachar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The fourth lot came out for Issachar, for the people of Issachar, according to their clans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Their territory included Jezreel, Chesulloth, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Sam. 28:4
      metadata:
        usfm: 1SA.28.4
    marker-yv: yv-n
  - type: text
    text: 'Shunem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hapharaim, Shion, Anaharath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rabbith, Kishion, Ebez, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Remeth, En-gannim, En-haddah, Beth-pazzez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The boundary also touches Tabor, Shahazumah, and Beth-shemesh, and its boundary ends at the Jordan—sixteen cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: This is the inheritance of the tribe of the people of Issachar, according to their clans—the cities with their villages.
- type: usfm
  marker: s1
  children:
  - type: text
