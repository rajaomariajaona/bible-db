      metadata:
        usfm: DEU.33.23
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'westward to Aznoth-tabor and goes from there to Hukkok, touching Zebulun at the south and Asher on the west and Judah on the east at the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
