      children:
      - type: text
        text: 11:1
      metadata:
        usfm: JOS.11.1
    marker-yv: yv-n
  - type: text
    text: 'Hazor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kedesh, Edrei, En-hazor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh—nineteen cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: This is the inheritance of the tribe of the people of Naphtali according to their clans—the cities with their villages.
- type: usfm
  marker: s1
  children:
  - type: text
