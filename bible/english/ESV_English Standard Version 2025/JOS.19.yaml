  - type: text
    text: ' Achzib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ummah, Aphek and Rehob—twenty-two cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: This is the inheritance of the tribe of the people of Asher according to their clans—these cities with their villages.
- type: usfm
  marker: s1
