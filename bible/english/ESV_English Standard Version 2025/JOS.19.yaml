document_id: JOS.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Inheritance for Simeon
  - type: text
    content: 'The second lot came out for Simeon, for the tribe of the people of Simeon, according to their clans, '
  - type: note
    content: ver. 9; [Gen. 49:7]
  - type: text
    content: 'and their inheritance was in the midst of the inheritance of the people of Judah. '
  '10':
  - type: text
    content: 'The third lot came up for the people of Zebulun, according to their clans. And the territory of their inheritance reached as far as Sarid. '
  '11':
  - type: text
    content: 'Then their boundary goes up '
  - type: note
    content: '[ch. 18:14; Gen. 49:13]'
  - type: text
    content: 'westward and on to Mareal and touches Dabbesheth, then the brook that is east of '
  - type: note
    content: ch. 12:22; 21:34
  - type: text
    content: 'Jokneam. '
  '12':
  - type: text
    content: 'From Sarid it goes in the other direction eastward toward the sunrise to the boundary of Chisloth-tabor. From there it goes to Daberath, then up to Japhia. '
  '13':
  - type: text
    content: 'From there it passes along on the east toward the sunrise to Gath-hepher, to Eth-kazin, and going on to Rimmon it bends toward Neah, '
  '14':
  - type: text
    content: 'then on the north the boundary turns about to Hannathon, and it ends at the Valley of Iphtahel; '
  '15':
  - type: text
    content: 'and Kattath, Nahalal, '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'Shimron, Idalah, and Bethlehem—twelve cities with their villages. '
  '16':
  - type: text
    content: This is the inheritance of the people of Zebulun, according to their clans—these cities with their villages.
  - type: heading
    content: The Inheritance for Issachar
  '17':
  - type: text
    content: 'The fourth lot came out for Issachar, for the people of Issachar, according to their clans. '
  '18':
  - type: text
    content: 'Their territory included Jezreel, Chesulloth, '
  - type: note
    content: 1 Sam. 28:4
  - type: text
    content: 'Shunem, '
  '19':
  - type: text
    content: 'Hapharaim, Shion, Anaharath, '
  '2':
  - type: note
    content: For ver. 2-8, see 1 Chr. 4:28-33
  - type: text
    content: 'And they had for their inheritance Beersheba, Sheba, Moladah, '
  '20':
  - type: text
    content: 'Rabbith, Kishion, Ebez, '
  '21':
  - type: text
    content: 'Remeth, En-gannim, En-haddah, Beth-pazzez. '
  '22':
  - type: text
    content: 'The boundary also touches Tabor, Shahazumah, and Beth-shemesh, and its boundary ends at the Jordan—sixteen cities with their villages. '
  '23':
  - type: text
    content: This is the inheritance of the tribe of the people of Issachar, according to their clans—the cities with their villages.
  - type: heading
    content: The Inheritance for Asher
  '24':
  - type: text
    content: 'The fifth lot came out for the tribe of the people of Asher according to their clans. '
  '25':
  - type: text
    content: 'Their territory included Helkath, Hali, Beten, Achshaph, '
  '26':
  - type: text
    content: 'Allammelech, Amad, and Mishal. On the west it touches '
  - type: note
    content: 1 Kgs. 18:19, 20, 42; 2 Kgs. 2:25; 4:25; Song 7:5; Isa. 33:9; Jer. 50:19
  - type: text
    content: 'Carmel and Shihor-libnath, '
  '27':
  - type: text
    content: 'then it turns eastward, it goes to Beth-dagon, and touches Zebulun and the Valley of Iphtahel northward to Beth-emek and Neiel. Then it continues in the north to '
  - type: note
    content: '[1 Kgs. 9:13]'
  - type: text
    content: 'Cabul, '
  '28':
  - type: text
    content: 'Ebron, Rehob, Hammon, Kanah, as far as '
  - type: note
    content: ch. 11:8; [Judg. 1:31]
  - type: text
    content: 'Sidon the Great. '
  '29':
  - type: text
    content: Then the boundary turns to Ramah, reaching to the fortified city of Tyre. Then the boundary turns to Hosah, and it ends at the sea; Mahalab,
  - type: note
    content: Compare Septuagint; Hebrew Mehebel
  - type: text
    content: ' Achzib, '
  '3':
  - type: text
    content: 'Hazar-shual, Balah, Ezem, '
  '30':
  - type: text
    content: 'Ummah, Aphek and Rehob—twenty-two cities with their villages. '
  '31':
  - type: text
    content: This is the inheritance of the tribe of the people of Asher according to their clans—these cities with their villages.
  - type: heading
    content: The Inheritance for Naphtali
  '32':
  - type: text
    content: 'The sixth lot came out for the people of Naphtali, for the people of Naphtali, according to their clans. '
  '33':
  - type: text
    content: 'And their boundary ran from Heleph, from '
  - type: note
    content: '[Judg. 4:11]'
  - type: text
    content: 'the oak in Zaanannim, and Adami-nekeb, and Jabneel, as far as Lakkum, and it ended at the Jordan. '
  '34':
  - type: text
    content: 'Then the boundary turns '
  - type: note
    content: '[Deut. 33:23]'
  - type: text
    content: 'westward to Aznoth-tabor and goes from there to Hukkok, touching Zebulun at the south and Asher on the west and Judah on the east at the Jordan. '
  '35':
  - type: text
    content: 'The fortified cities are Ziddim, Zer, Hammath, Rakkath, '
  - type: note
    content: See ch. 11:2
  - type: text
    content: 'Chinnereth, '
  '36':
  - type: text
    content: 'Adamah, Ramah, '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'Hazor, '
  '37':
  - type: text
    content: 'Kedesh, Edrei, En-hazor, '
  '38':
  - type: text
    content: 'Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh—nineteen cities with their villages. '
  '39':
  - type: text
    content: This is the inheritance of the tribe of the people of Naphtali according to their clans—the cities with their villages.
  - type: heading
    content: The Inheritance for Dan
  '4':
  - type: text
    content: 'Eltolad, Bethul, Hormah, '
  '40':
  - type: text
    content: 'The seventh lot came out for the tribe of the people of Dan, according to their clans. '
  '41':
  - type: text
    content: 'And the territory of its inheritance included Zorah, Eshtaol, Ir-shemesh, '
  '42':
  - type: note
    content: Judg. 1:35
  - type: text
    content: 'Shaalabbin, '
  - type: note
    content: Judg. 1:35
  - type: text
    content: 'Aijalon, Ithlah, '
  '43':
  - type: text
    content: 'Elon, Timnah, Ekron, '
  '44':
  - type: text
    content: 'Eltekeh, Gibbethon, Baalath, '
  '45':
  - type: text
    content: 'Jehud, Bene-berak, Gath-rimmon, '
  '46':
  - type: text
    content: 'and Me-jarkon and Rakkon with the territory over against '
  - type: note
    content: 2 Chr. 2:16; Ezra 3:7
  - type: text
    content: 'Joppa. '
  '47':
  - type: text
    content: 'When '
  - type: note
    content: Judg. 1:34, 35; 18:1
  - type: text
    content: 'the territory of the people of Dan was lost to them, the people of Dan went up and fought against Leshem, and after capturing it and striking it with the sword they took possession of it and settled in it, calling Leshem, Dan, after the name of Dan their ancestor. '
  '48':
  - type: text
    content: This is the inheritance of the tribe of the people of Dan, according to their clans—these cities with their villages.
  - type: heading
    content: The Inheritance for Joshua
  '49':
  - type: text
    content: 'When they had finished distributing the several territories of the land as inheritances, the people of Israel gave an inheritance among them to Joshua the son of Nun. '
  '5':
  - type: text
    content: 'Ziklag, Beth-marcaboth, Hazar-susah, '
  '50':
  - type: text
    content: 'By command of the '
  - type: text
    content: Lord
  - type: text
    content: ' they gave him the city that he asked, '
  - type: note
    content: ch. 24:30; Judg. 2:9
  - type: text
    content: Timnath-serah in the hill country of Ephraim. And he rebuilt the city and settled in it.
  '51':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:1; Num. 34:17
  - type: text
    content: 'These are the inheritances that Eleazar the priest and Joshua the son of Nun and the heads of the fathers’ houses of the tribes of the people of Israel distributed by lot '
  - type: note
    content: See ch. 18:1
  - type: text
    content: 'at Shiloh before the '
  - type: text
    content: Lord
  - type: text
    content: ', at the entrance of the tent of meeting. So they finished dividing the land.'
  '6':
  - type: text
    content: 'Beth-lebaoth, and Sharuhen—thirteen cities with their villages; '
  '7':
  - type: text
    content: 'Ain, Rimmon, Ether, and Ashan—four cities with their villages, '
  '8':
  - type: text
    content: 'together with all the villages around these cities as far as Baalath-beer, Ramah of the Negeb. This was the inheritance of the tribe of the people of Simeon according to their clans. '
  '9':
  - type: note
    content: ver. 1
  - type: text
    content: The inheritance of the people of Simeon formed part of the territory of the people of Judah. Because the portion of the people of Judah was too large for them, the people of Simeon obtained an inheritance in the midst of their inheritance.
  - type: heading
    content: The Inheritance for Zebulun
