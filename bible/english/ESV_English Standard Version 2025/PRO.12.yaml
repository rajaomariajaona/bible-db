document_id: PRO.12,59
type_code: eng
verses:
  '1':
  - type: text
    content: Whoever loves discipline loves knowledge,
  - type: text
    content: 'but he who '
  - type: note
    content: ch. 5:12; 15:10
  - type: text
    content: 'hates reproof is '
  - type: note
    content: Ps. 49:10
  - type: text
    content: stupid.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 25:4 ]'
  - type: text
    content: Whoever is righteous has regard for the life of his beast,
  - type: text
    content: but the mercy of the wicked is cruel.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:19
  - type: text
    content: 'Whoever works his land '
  - type: note
    content: ch. 20:13
  - type: text
    content: will have plenty of bread,
  - type: note
    content: ch. 28:19
  - type: text
    content: 'but he who follows '
  - type: note
    content: Judg. 9:4
  - type: text
    content: worthless pursuits lacks sense.
  '12':
  - type: text
    content: 'Whoever is wicked covets '
  - type: note
    content: '[Ps. 10:9]'
  - type: text
    content: the spoil of evildoers,
  - type: text
    content: but the root of the righteous bears fruit.
  '13':
  - type: text
    content: 'An evil man is ensnared '
  - type: note
    content: ch. 18:7; [Ps. 64:8; Matt. 12:37]
  - type: text
    content: by the transgression of his lips,
  - type: note
    content: Or In the transgression of the lips, there is an evil snare
  - type: note
    content: ch. 21:23
  - type: text
    content: but the righteous escapes from trouble.
  '14':
  - type: text
    content: 'From the fruit of his mouth '
  - type: note
    content: ch. 13:2; 14:14; 18:20
  - type: text
    content: a man is satisfied with good,
  - type: note
    content: ch. 19:17; Isa. 3:10, 11; [ Judg. 9:16, 56 ]
  - type: text
    content: and the work of a man’s hand comes back to him.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:7; 16:2; 21:2; 26:12; [ch. 14:12; 16:25 ]
  - type: text
    content: The way of a fool is right in his own eyes,
  - type: text
    content: but a wise man listens to advice.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:33; 29:11 ]'
  - type: text
    content: The vexation of a fool is known at once,
  - type: text
    content: but the prudent ignores an insult.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:5
  - type: text
    content: Whoever speaks
  - type: note
    content: Hebrew breathes out
  - type: text
    content: ' the truth gives honest evidence,'
  - type: text
    content: 'but '
  - type: note
    content: See ch. 6:19
  - type: text
    content: a false witness utters deceit.
  '18':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 57:4
  - type: text
    content: There is one whose rash words are like sword thrusts,
  - type: text
    content: 'but the tongue of the wise brings '
  - type: note
    content: See ch. 4:22
  - type: text
    content: healing.
  '19':
  - type: text
    content: Truthful lips endure forever,
  - type: text
    content: 'but '
  - type: note
    content: ch. 19:9; [Ps. 52:4, 5]
  - type: text
    content: a lying tongue is but for a moment.
  '2':
  - type: text
    content: 'A good man '
  - type: note
    content: ch. 8:35
  - type: text
    content: 'obtains favor from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but a man of evil devices he condemns.
  '20':
  - type: text
    content: 'Deceit is in the heart of '
  - type: note
    content: ch. 3:29
  - type: text
    content: those who devise evil,
  - type: text
    content: but those who plan peace have joy.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps. 91:10; [ 1 Pet. 3:13; 2 Pet. 2:9 ]
  - type: text
    content: No ill befalls the righteous,
  - type: text
    content: but the wicked are filled with trouble.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Rev. 22:15 ]; See ch. 6:17'
  - type: text
    content: 'Lying lips are '
  - type: note
    content: ch. 11:20
  - type: text
    content: 'an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 11:1 ]'
  - type: text
    content: but those who act faithfully are his delight.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 13:16; 15:2 ]'
  - type: text
    content: A prudent man conceals knowledge,
  - type: note
    content: '[ch. 13:16; 15:2 ]'
  - type: text
    content: but the heart of fools proclaims folly.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:4; 13:4 ]'
  - type: text
    content: The hand of the diligent will rule,
  - type: text
    content: 'while the slothful will be '
  - type: note
    content: '[Gen. 49:15; 1 Kgs. 9:21]'
  - type: text
    content: put to forced labor.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:13; [ch. 17:22 ]
  - type: text
    content: Anxiety in a man’s heart weighs him down,
  - type: text
    content: but a good word makes him glad.
  '26':
  - type: text
    content: One who is righteous is a guide to his neighbor,
  - type: note
    content: Or The righteous chooses his friends carefully
  - type: text
    content: but the way of the wicked leads them astray.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 24 ]'
  - type: text
    content: Whoever is slothful will not roast his game,
  - type: text
    content: but the diligent man will get precious wealth.
  - type: note
    content: Or but diligence is precious wealth
  '28':
  - type: text
    content: ' '
  - type: note
    content: See ch. 10:2
  - type: text
    content: In the path of righteousness is life,
  - type: text
    content: and in its pathway there is no death.
  '3':
  - type: text
    content: No one is established by wickedness,
  - type: text
    content: 'but the root of '
  - type: note
    content: See ch. 10:25
  - type: text
    content: the righteous will never be moved.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See ch. 31:10
  - type: text
    content: 'An excellent wife is '
  - type: note
    content: Song 3:11
  - type: text
    content: the crown of her husband,
  - type: text
    content: 'but she who '
  - type: note
    content: ch. 10:5
  - type: text
    content: 'brings shame is like '
  - type: note
    content: ch. 14:30
  - type: text
    content: rottenness in his bones.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 12:35 ]'
  - type: text
    content: The thoughts of the righteous are just;
  - type: text
    content: the counsels of the wicked are deceitful.
  '6':
  - type: text
    content: 'The words of the wicked '
  - type: note
    content: See ch. 1:11
  - type: text
    content: lie in wait for blood,
  - type: text
    content: 'but '
  - type: note
    content: ch. 14:3
  - type: text
    content: the mouth of the upright delivers them.
  '7':
  - type: text
    content: ' '
  - type: note
    content: See ch. 11:21
  - type: text
    content: 'The wicked are '
  - type: note
    content: Job 34:25
  - type: text
    content: overthrown and are no more,
  - type: note
    content: '[ch. 10:25, 30 ]'
  - type: text
    content: but the house of the righteous will stand.
  '8':
  - type: text
    content: A man is commended according to his good sense,
  - type: text
    content: 'but one of twisted mind is '
  - type: note
    content: '[1 Sam. 20:30]'
  - type: text
    content: despised.
  '9':
  - type: text
    content: Better to be lowly and have a servant
  - type: text
    content: than to play the great man and lack bread.
