document_id: 1CO.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy and Tongues
  - type: text
    content: ' '
  - type: note
    content: ch. 16:14
  - type: text
    content: 'Pursue love, and '
  - type: note
    content: ch. 12:31
  - type: text
    content: 'earnestly desire the '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'spiritual gifts, especially that you may '
  - type: note
    content: See ch. 11:4; 13:2
  - type: text
    content: 'prophesy. '
  '10':
  - type: text
    content: 'There are doubtless many different languages in the world, and none is without meaning, '
  '11':
  - type: text
    content: 'but if I do not know the meaning of the language, I will be '
  - type: note
    content: See Acts 28:2
  - type: text
    content: 'a foreigner to the speaker and the speaker a foreigner to me. '
  '12':
  - type: text
    content: So with yourselves, since you are eager for manifestations of the Spirit, strive to excel in building up the church.
  '13':
  - type: text
    content: 'Therefore, one who speaks in a tongue should pray that he may interpret. '
  '14':
  - type: text
    content: 'For if I pray in a tongue, my spirit prays but my mind is unfruitful. '
  '15':
  - type: text
    content: 'What am I to do? I will pray with my spirit, but I will pray with my mind also; '
  - type: note
    content: '[Eph. 5:19; Col. 3:16; James 5:13]'
  - type: text
    content: 'I will sing praise with my spirit, but I will '
  - type: note
    content: Ps. 47:7
  - type: text
    content: 'sing with my mind also. '
  '16':
  - type: text
    content: Otherwise, if you give thanks with your spirit, how can anyone in the position of an outsider
  - type: note
    content: Or of him that is without gifts
  - type: text
    content: ' say '
  - type: note
    content: 1 Chr. 16:36; Neh. 5:13; 8:6; Ps. 106:48; Jer. 11:5; 28:6; Rev. 5:14; 7:12; 19:4; [2 Cor. 1:20]
  - type: text
    content: '“Amen” to '
  - type: note
    content: ch. 11:24
  - type: text
    content: 'your thanksgiving when he does not know what you are saying? '
  '17':
  - type: text
    content: 'For you may be giving thanks well enough, but the other person is not being built up. '
  '18':
  - type: text
    content: 'I thank God that I speak in tongues more than all of you. '
  '19':
  - type: text
    content: Nevertheless, in church I would rather speak five words with my mind in order to instruct others, than ten thousand words in a tongue.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: ver. 18-23, 27, 28
  - type: text
    content: 'one who speaks in a tongue speaks not to men but to God; for no one understands him, but he utters mysteries in the Spirit. '
  '20':
  - type: text
    content: 'Brothers, '
  - type: note
    content: Eph. 4:14; Heb. 5:12, 13
  - type: text
    content: 'do not be children in your thinking. '
  - type: note
    content: '[Ps. 131:2; Isa. 28:9; Rom. 16:19]; See Matt. 18:3'
  - type: text
    content: 'Be infants in evil, but in your thinking be '
  - type: note
    content: ch. 2:6
  - type: text
    content: 'mature. '
  '21':
  - type: note
    content: See John 10:34
  - type: text
    content: 'In the Law it is written, '
  - type: note
    content: Cited from Isa. 28:11, 12; [Deut. 28:49]
  - type: text
    content: '“By people of strange tongues and by the lips of foreigners will I speak to this people, and even then they will not listen to me, says the Lord.” '
  '22':
  - type: text
    content: Thus tongues are a sign not for believers but for unbelievers, while prophecy is a sign
  - type: note
    content: Greek lacks a sign
  - type: text
    content: ' not for unbelievers but for believers. '
  '23':
  - type: text
    content: 'If, therefore, the whole church comes together and all speak in tongues, and outsiders or unbelievers enter, '
  - type: note
    content: '[Acts 2:13]'
  - type: text
    content: 'will they not say that you are out of your minds? '
  '24':
  - type: text
    content: 'But if all prophesy, and an unbeliever or outsider enters, he is convicted by all, he is called to account by all, '
  '25':
  - type: note
    content: '[Heb. 4:12]'
  - type: text
    content: 'the secrets of his heart are disclosed, and so, '
  - type: note
    content: Luke 17:16
  - type: text
    content: 'falling on his face, he will worship God and '
  - type: note
    content: Isa. 45:14; Zech. 8:23
  - type: text
    content: declare that God is really among you.
  - type: heading
    content: Orderly Worship
  '26':
  - type: text
    content: 'What then, brothers? When you come together, each one has '
  - type: note
    content: Eph. 5:19
  - type: text
    content: 'a hymn, '
  - type: note
    content: See ver. 6
  - type: text
    content: 'a lesson, '
  - type: note
    content: See ver. 6
  - type: text
    content: 'a revelation, '
  - type: note
    content: ver. 18
  - type: text
    content: 'a tongue, or '
  - type: note
    content: ver. 5, 13, 27, 28; ch. 12:10, 30
  - type: text
    content: 'an interpretation. '
  - type: note
    content: 2 Cor. 12:19; 13:10; [ch. 12:7]
  - type: text
    content: 'Let all things be done for building up. '
  '27':
  - type: text
    content: 'If any speak in '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'a tongue, let there be only two or at most three, and each in turn, and let someone interpret. '
  '28':
  - type: text
    content: 'But if there is no one to interpret, let each of them keep silent in church and speak to himself and to God. '
  '29':
  - type: text
    content: 'Let two or three prophets speak, and let the others '
  - type: note
    content: '[ch. 12:10; Job 12:11; 1 John 4:1]'
  - type: text
    content: 'weigh what is said. '
  '3':
  - type: text
    content: 'On the other hand, the one who prophesies speaks to people for their upbuilding and encouragement and consolation. '
  '30':
  - type: text
    content: 'If a revelation is made to another sitting there, '
  - type: note
    content: '[1 Thess. 5:19, 20]'
  - type: text
    content: 'let the first be silent. '
  '31':
  - type: text
    content: 'For you can all prophesy one by one, so that all may learn and all be encouraged, '
  '32':
  - type: text
    content: 'and the spirits of prophets are subject to prophets. '
  '33':
  - type: text
    content: 'For God is not a God of '
  - type: note
    content: '[ver. 40]'
  - type: text
    content: confusion but of peace.
  - type: text
    content: 'As in '
  - type: note
    content: See ch. 7:17
  - type: text
    content: 'all the churches of the saints, '
  '34':
  - type: note
    content: '[1 Tim. 2:11, 12]'
  - type: text
    content: 'the women should keep silent in the churches. For they are not permitted to speak, but '
  - type: note
    content: See 1 Pet. 3:1
  - type: text
    content: 'should be in submission, as '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'the Law also says. '
  '35':
  - type: text
    content: If there is anything they desire to learn, let them ask their husbands at home. For it is shameful for a woman to speak in church.
  '36':
  - type: text
    content: 'Or was it from you that the word of God came? Or are you the only ones it has reached? '
  '37':
  - type: note
    content: '[2 Cor. 10:7; 1 John 4:6]'
  - type: text
    content: 'If anyone thinks that he is a prophet, or spiritual, he should acknowledge that the things I am writing to you are a command of the Lord. '
  '38':
  - type: text
    content: 'If anyone does not recognize this, he is not recognized. '
  '39':
  - type: text
    content: 'So, my brothers, '
  - type: note
    content: ch. 12:31
  - type: text
    content: 'earnestly desire to prophesy, and do not forbid speaking in tongues. '
  '4':
  - type: text
    content: 'The one who speaks in a tongue builds up himself, but the one who prophesies builds up the church. '
  '40':
  - type: note
    content: '[ver. 31, 33]'
  - type: text
    content: 'But all things should be done decently and '
  - type: note
    content: Col. 2:5
  - type: text
    content: in order.
  '5':
  - type: text
    content: 'Now I want you all to speak in tongues, but '
  - type: note
    content: '[Num. 11:29]'
  - type: text
    content: even more to prophesy. The one who prophesies is greater than the one who speaks in tongues, unless someone interprets, so that the church may be built up.
  '6':
  - type: text
    content: Now, brothers,
  - type: note
    content: Or brothers and sisters; also verses 20, 26, 39
  - type: text
    content: ' if I come to you speaking in tongues, how will I benefit you unless I bring you some '
  - type: note
    content: ver. 26; Eph. 1:17
  - type: text
    content: 'revelation or knowledge or prophecy or '
  - type: note
    content: ver. 26; Acts 2:42; Rom. 6:17
  - type: text
    content: 'teaching? '
  '7':
  - type: text
    content: 'If even lifeless instruments, such as the flute or the harp, do not give distinct notes, how will anyone know what is played? '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: '[Num. 10:9; Isa. 58:1; Jer. 4:19; Ezek. 33:3-6; Joel 2:1]'
  - type: text
    content: 'if the bugle gives an indistinct sound, who will get ready for battle? '
  '9':
  - type: text
    content: 'So with yourselves, if with your tongue you utter speech that is not intelligible, how will anyone know what is said? For you will be '
  - type: note
    content: '[ch. 9:26]'
  - type: text
    content: 'speaking into the air. '
