  - type: text
    content: going about with slanders;
  - type: text
    content: 'they are '
  - type: note
    content: Ezek. 22:18, 20
  - type: text
    content: bronze and iron;
  - type: text
    content: all of them act corruptly.
  '29':
  - type: text
    content: 'The '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: bellows blow fiercely;
  - type: text
    content: the lead is consumed by the fire;
  - type: note
    content: '[ Isa. 1:25 ]'
  - type: text
