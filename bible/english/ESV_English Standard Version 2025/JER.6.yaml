    content: ‘We will not pay attention.’
  '18':
  - type: text
    content: Therefore hear, O nations,
  - type: text
    content: and know, O congregation, what will happen to them.
  '19':
  - type: text
    content: Hear, O earth; behold, I am bringing disaster upon this people,
  - type: note
    content: Prov. 1:31
  - type: text
    content: the fruit of their devices,
  - type: text
    content: because they have not paid attention to my words;
  - type: text
    content: and as for my law, they have rejected it.
  '2':
  - type: text
    content: The lovely and delicately bred I will destroy,
  - type: note
    content: See 2 Kgs. 19:21
  - type: text
    content: the daughter of Zion.
  - type: note
    content: Or I have likened the daughter of Zion to the loveliest pasture
  '20':
  - type: text
    content: ' '
  - type: note
    content: Isa. 1:11
  - type: text
    content: 'What use to me is '
  - type: note
    content: Isa. 43:23; 60:6
  - type: text
    content: 'frankincense that comes from '
  - type: note
    content: See 1 Kgs. 10:1
  - type: text
    content: Sheba,
  - type: text
    content: or sweet cane from a distant land?
  - type: note
    content: ch. 7:21, 22; 14:12; Ps. 40:6; Isa. 1:11; Amos 5:21
  - type: text
    content: Your burnt offerings are not acceptable,
  - type: text
    content: nor your sacrifices pleasing to me.
  '21':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: Ezek. 3:20
  - type: text
    content: ‘Behold, I will lay before this people
  - type: text
    content: stumbling blocks against which they shall stumble;
  - type: text
    content: fathers and sons together,
  - type: text
    content: neighbor and friend shall perish.’”
  '22':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: For ver. 22-24, see ch. 50:41-43
  - type: text
    content: '“Behold, a people is coming '
  - type: note
    content: See ch. 1:13
  - type: text
    content: from the north country,
  - type: text
    content: 'a great nation is stirring from '
  - type: note
    content: ch. 25:32; 31:8
  - type: text
    content: the farthest parts of the earth.
  '23':
  - type: text
    content: They lay hold on bow and javelin;
  - type: text
    content: 'they are '
  - type: note
    content: Isa. 13:9, 18
  - type: text
    content: cruel and have no mercy;
  - type: note
    content: Isa. 17:12
  - type: text
    content: the sound of them is like the roaring sea;
  - type: text
    content: they ride on horses,
  - type: text
    content: set in array as a man for battle,
  - type: text
    content: against you, O daughter of Zion!”
  '24':
  - type: text
    content: We have heard the report of it;
  - type: note
    content: ch. 38:4; 49:24; Ezek. 21:7; See 2 Sam. 4:1; Ezek. 7:17
  - type: text
    content: our hands fall helpless;
  - type: text
    content: anguish has taken hold of us,
  - type: note
    content: See Isa. 13:8
  - type: text
    content: pain as of a woman in labor.
  '25':
  - type: text
    content: Go not out into the field,
  - type: text
    content: nor walk on the road,
  - type: text
    content: for the enemy has a sword;
  - type: note
    content: Ps. 31:13; Lam. 2:22; [ Job 18:11 ]
  - type: text
    content: terror is on every side.
  '26':
  - type: text
    content: 'O daughter of my people, '
  - type: note
    content: See ch. 4:8; Esth. 4:1
  - type: text
    content: put on sackcloth,
  - type: text
    content: 'and '
  - type: note
    content: ch. 25:34; Ezek. 27:30; [Lam. 3:16; Mic. 1:10]
  - type: text
    content: roll in ashes;
  - type: note
    content: Amos 8:10; Zech. 12:10
  - type: text
    content: make mourning as for an only son,
  - type: text
    content: most bitter lamentation,
  - type: text
    content: for suddenly the destroyer
  - type: text
    content: will come upon us.
  '27':
  - type: text
    content: '“I have made you '
  - type: note
    content: '[ch. 1:18]'
  - type: text
    content: a tester of metals among my people,
  - type: text
    content: 'that you may know and '
  - type: note
    content: ch. 9:7
  - type: text
    content: test their ways.
