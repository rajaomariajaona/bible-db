  - type: text
    content: they shall pasture, each in his place.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Isa. 1:22; Ezek. 22:19, 20
  - type: text
    content: Rejected silver they are called,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected them.”'
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 22:7; Joel 3:9; [ch. 51:27 ]
  - type: text
    content: “Prepare war against her;
  - type: text
    content: 'arise, and let us attack '
  - type: note
    content: ch. 15:8
  - type: text
    content: at noon!
  - type: text
    content: Woe to us, for the day declines,
  - type: text
    content: for the shadows of evening lengthen!
  '5':
  - type: text
    content: Arise, and let us attack by night
  - type: text
    content: and destroy her palaces!”
  '6':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: note
    content: '[ Deut. 20:20 ]'
  - type: text
    content: “Cut down her trees;
  - type: note
    content: 2 Kgs. 19:32; Isa. 37:33; Ezek. 26:8; Luke 19:43
  - type: text
    content: cast up a siege mound against Jerusalem.
  - type: text
    content: 'This is the city that must be '
  - type: note
    content: Luke 19:44
  - type: text
    content: punished;
  - type: text
    content: there is nothing but oppression within her.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Isa. 57:20
  - type: text
    content: As a well keeps its water fresh,
  - type: text
    content: so she keeps fresh her evil;
  - type: note
    content: Ps. 55:9; Ezek. 7:11, 23
  - type: text
    content: violence and destruction are heard within her;
  - type: text
    content: sickness and wounds are ever before me.
  '8':
  - type: text
    content: Be warned, O Jerusalem,
  - type: note
    content: Ezek. 23:18; [ Hos. 9:12 ]
  - type: text
    content: lest I turn from you in disgust,
  - type: text
    content: 'lest I make you '
  - type: note
    content: See ch. 4:7
  - type: text
    content: a desolation,
  - type: text
    content: an uninhabited land.”
  '9':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: note
    content: '[ Deut. 24:21 ]'
  - type: text
    content: “They shall glean thoroughly as a vine
  - type: text
    content: the remnant of Israel;
  - type: text
    content: like a grape gatherer pass your hand again
  - type: text
    content: over its branches.”
