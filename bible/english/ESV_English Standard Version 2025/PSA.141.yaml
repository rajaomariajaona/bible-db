document_id: PSA.141,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Give Ear to My Voice
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I call upon you; '
  - type: note
    content: Ps. 40:13; 70:5
  - type: text
    content: hasten to me!
  - type: text
    content: Give ear to my voice when I call to you!
  '10':
  - type: text
    content: 'Let the wicked '
  - type: note
    content: '[Ps. 7:15]'
  - type: text
    content: fall into their own nets,
  - type: text
    content: while I pass by safely.
  '2':
  - type: text
    content: 'Let '
  - type: note
    content: Luke 1:10; Rev. 5:8; 8:3, 4
  - type: text
    content: my prayer be counted as incense before you,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 28:2
  - type: text
    content: 'the lifting up of my hands as '
  - type: note
    content: See Ex. 29:41
  - type: text
    content: the evening sacrifice!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps. 34:13
  - type: text
    content: 'Set a guard, O '
  - type: text
    content: Lord
  - type: text
    content: ', over my mouth;'
  - type: note
    content: Mic. 7:5
  - type: text
    content: keep watch over the door of my lips!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps. 119:36
  - type: text
    content: Do not let my heart incline to any evil,
  - type: text
    content: to busy myself with wicked deeds
  - type: text
    content: 'in company with men who '
  - type: note
    content: ver. 9; Ps. 94:4
  - type: text
    content: work iniquity,
  - type: text
    content: 'and '
  - type: note
    content: Prov. 23:6
  - type: text
    content: let me not eat of their delicacies!
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 9:8; 19:25; 25:12; 27:6; Eccles. 7:5 ]'
  - type: text
    content: Let a righteous man strike me—it is a kindness;
  - type: text
    content: let him rebuke me—it is oil for my head;
  - type: text
    content: let my head not refuse it.
  - type: text
    content: 'Yet '
  - type: note
    content: '[Ps. 109:4]'
  - type: text
    content: my prayer is continually against their evil deeds.
  '6':
  - type: text
    content: 'When their judges are '
  - type: note
    content: 2 Chr. 25:12; [Luke 4:29]
  - type: text
    content: thrown over the cliff,
  - type: note
    content: Or When their judges fall into the hands of the Rock
  - type: text
    content: then they shall hear my words, for they are pleasant.
  '7':
  - type: text
    content: As when one plows and breaks up the earth,
  - type: text
    content: 'so shall our bones '
  - type: note
    content: Ps. 53:5; [Ezek. 37:1]
  - type: text
    content: be scattered at the mouth of Sheol.
  - type: note
    content: The meaning of the Hebrew in verses 6, 7 is uncertain
  '8':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 25:15
  - type: text
    content: 'my eyes are toward you, O '
  - type: text
    content: God
  - type: text
    content: ', my Lord;'
  - type: note
    content: See Ps. 11:1
  - type: text
    content: in you I seek refuge; leave me not defenseless!
  - type: note
    content: Hebrew refuge; do not pour out my life!
  '9':
  - type: text
    content: 'Keep me from '
  - type: note
    content: See Ps. 140:5
  - type: text
    content: the trap that they have laid for me
  - type: text
    content: and from the snares of evildoers!
