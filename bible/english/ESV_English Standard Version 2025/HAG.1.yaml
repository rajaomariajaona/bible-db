  - type: heading
    content: The Command to Rebuild the Temple
  - type: text
    content: ' '
  - type: note
    content: ver. 15 ; ch. 2:10; Ezra 4:24; 5:1; Zech. 1:1, 7
  - type: text
    content: 'In the second year of Darius the king, in the sixth month, on the first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came by the hand of Haggai the prophet to '
  - type: note
    content: See 1 Chr. 3:19
  - type: text
    content: 'Zerubbabel the son of '
  - type: note
    content: See 1 Chr. 3:17
  - type: text
    content: 'Shealtiel, governor of Judah, and to '
  - type: note
    content: See Ezra 3:2
  - type: text
    content: 'Joshua the son of '
  - type: note
    content: 1 Chr. 6:15
  - type: text
    content: 'Jehozadak, the high priest: '
  '10':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[Jer. 5:24, 25; Zech. 8:12]; See 1 Kgs. 8:35'
  - type: text
    content: 'the heavens above you have withheld the dew, and the earth has withheld its produce. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kgs. 8:1; [Ps. 105:16]
  - type: text
    content: 'I have called for a drought on the land and the hills, on '
  - type: note
    content: Hos. 2:9
  - type: text
    content: 'the grain, the new wine, the oil, on what the ground brings forth, on man and beast, and '
  - type: note
    content: ch. 2:17; Ps. 128:2
  - type: text
    content: on all their labors.”
  - type: heading
    content: The People Obey the Lord
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ezra 5:2
  - type: text
    content: 'Then '
  - type: note
    content: ver. 1
  - type: text
    content: 'Zerubbabel the son of Shealtiel, and '
  - type: note
    content: ver. 1
  - type: text
    content: 'Joshua the son of Jehozadak, the high priest, with all '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'the remnant of the people, obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and the words of Haggai the prophet, as the '
  - type: text
    content: Lord
  - type: text
    content: ' their God had sent him. And the people feared the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Then Haggai, the messenger of the '
  - type: text
    content: Lord
  - type: text
    content: ', spoke to the people with the '
  - type: text
    content: Lord
  - type: text
    content: '’s message, '
  - type: note
    content: ch. 2:4; [Isa. 43:5]
  - type: text
    content: '“I am with you, declares the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Chr. 36:22; Ezra 1:1]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' stirred up the spirit of '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Zerubbabel the son of Shealtiel, governor of Judah, and the spirit of '
  - type: note
    content: ver. 1
  - type: text
    content: 'Joshua the son of Jehozadak, the high priest, and the spirit of all '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'the remnant of the people. And they came and '
  - type: note
    content: '[ch. 2:4; Ezra 5:8]'
  - type: text
    content: 'worked on the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, their God, '
  '15':
  - type: note
    content: '[ver. 1]'
  - type: text
    content: on the twenty-fourth day of the month, in the sixth month, in the second year of Darius the king.
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: These people say the time has not yet come to rebuild the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came '
  - type: note
    content: Ezra 5:1
  - type: text
    content: 'by the hand of Haggai the prophet, '
  '4':
  - type: note
    content: '[2 Sam. 7:2]; See Ps. 132:3-5'
  - type: text
    content: '“Is it a time for you yourselves to dwell in your paneled houses, while '
  - type: note
    content: Neh. 2:3, 17; Isa. 64:11; Jer. 33:10, 12
  - type: text
    content: 'this house lies in ruins? '
  '5':
  - type: text
    content: 'Now, therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[ch. 2:15, 18]'
  - type: text
    content: 'Consider your ways. '
  '6':
  - type: note
    content: See Mic. 6:15
  - type: text
    content: 'You have sown much, and harvested little. '
  - type: note
    content: Hos. 4:10
  - type: text
    content: 'You eat, but you never have enough; you drink, but you never have your fill. You clothe yourselves, but no one is warm. And he who '
  - type: note
    content: '[Zech. 8:10]'
  - type: text
    content: earns wages does so to put them into a bag with holes.
  '7':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Consider your ways. '
  '8':
  - type: text
    content: 'Go up to the hills and bring wood and build the house, that '
  - type: note
    content: '[Ps. 132:13, 14]'
  - type: text
    content: 'I may take pleasure in it and that '
  - type: note
    content: '[ch. 2:9]'
  - type: text
    content: 'I may be glorified, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'You looked for much, and behold, it came to little. And when you brought it home, '
  - type: note
    content: '[ch. 2:17]'
  - type: text
    content: 'I blew it away. Why? declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. Because of my house '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'that lies in ruins, while each of you busies himself with his own house. '
