document_id: JER.50,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Babylon
  - type: text
    content: 'The word that the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke concerning '
  - type: note
    content: See Isa. 13:1–14:27; 21:1-10
  - type: text
    content: 'Babylon, concerning the land of the Chaldeans, '
  - type: note
    content: '[ch. 51:59, 60]'
  - type: text
    content: 'by Jeremiah the prophet:'
  '10':
  - type: note
    content: '[ch. 25:12]'
  - type: text
    content: 'Chaldea shall be plundered; all who plunder her shall be sated, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ Lam. 4:21 ]'
  - type: text
    content: “Though you rejoice, though you exult,
  - type: text
    content: O plunderers of my heritage,
  - type: text
    content: though you frolic like a heifer in the pasture,
  - type: text
    content: and neigh like stallions,
  '12':
  - type: text
    content: your mother shall be utterly shamed,
  - type: text
    content: and she who bore you shall be disgraced.
  - type: text
    content: Behold, she shall be the last of the nations,
  - type: note
    content: ch. 51:43
  - type: text
    content: a wilderness, a dry land, and a desert.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ver. 39
  - type: text
    content: 'Because of the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' she shall not be inhabited'
  - type: text
    content: but shall be an utter desolation;
  - type: note
    content: See ch. 18:16
  - type: text
    content: everyone who passes by Babylon shall be appalled,
  - type: note
    content: See ch. 18:16
  - type: text
    content: and hiss because of all her wounds.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ver. 9 ; ch. 51:11; Isa. 21:2
  - type: text
    content: Set yourselves in array against Babylon all around,
  - type: note
    content: ver. 29 ; [ch. 51:3]
  - type: text
    content: all you who bend the bow;
  - type: text
    content: shoot at her, spare no arrows,
  - type: note
    content: '[ver. 7 ]'
  - type: text
    content: 'for she has sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 6:16 ]'
  - type: text
    content: Raise a shout against her all around;
  - type: text
    content: she has surrendered;
  - type: text
    content: her bulwarks have fallen;
  - type: note
    content: ch. 51:58
  - type: text
    content: her walls are thrown down.
  - type: text
    content: 'For '
  - type: note
    content: ch. 46:10; 51:6, 11
  - type: text
    content: 'this is the vengeance of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: take vengeance on her;
  - type: note
    content: ver. 29 ; ch. 51:56
  - type: text
    content: do to her as she has done.
  '16':
  - type: text
    content: Cut off from Babylon the sower,
  - type: text
    content: and the one who handles the sickle in time of harvest;
  - type: note
    content: ch. 46:16
  - type: text
    content: because of the sword of the oppressor,
  - type: note
    content: '[ch. 51:9 ]; See Isa. 13:14'
  - type: text
    content: every one shall turn to his own people,
  - type: text
    content: and every one shall flee to his own land.
  '17':
  - type: text
    content: ' '
  - type: note
    content: See ver. 6
  - type: text
    content: '“Israel is a hunted sheep '
  - type: note
    content: ch. 2:15; 4:7; Isa. 5:29
  - type: text
    content: 'driven away by lions. '
  - type: note
    content: 2 Kgs. 17:6; 18:13
  - type: text
    content: 'First the king of Assyria '
  - type: note
    content: ch. 51:34
  - type: text
    content: 'devoured him, and now at last '
  - type: note
    content: 2 Kgs. 24:10, 14; See 2 Kgs. 25:1-11
  - type: text
    content: 'Nebuchadnezzar king of Babylon '
  - type: note
    content: '[ch. 51:34]'
  - type: text
    content: 'has gnawed his bones. '
  '18':
  - type: text
    content: 'Therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Behold, '
  - type: note
    content: Isa. 10:12; 24:21; [Ps. 76:12]
  - type: text
    content: 'I am bringing punishment on the king of Babylon and his land, '
  - type: note
    content: Isa. 14:24, 25
  - type: text
    content: 'as I punished the king of Assyria. '
  '19':
  - type: note
    content: Ezek. 34:13, 14
  - type: text
    content: 'I will restore Israel to his pasture, and '
  - type: note
    content: Ezek. 34:13, 14
  - type: text
    content: 'he shall feed on '
  - type: note
    content: Mic. 7:14
  - type: text
    content: 'Carmel and in '
  - type: note
    content: Mic. 7:14
  - type: text
    content: 'Bashan, and his desire shall be satisfied on the hills of Ephraim and in '
  - type: note
    content: Mic. 7:14
  - type: text
    content: 'Gilead. '
  '2':
  - type: text
    content: “Declare among the nations and proclaim,
  - type: text
    content: set up a banner and proclaim,
  - type: text
    content: 'conceal it not, and say:'
  - type: note
    content: Isa. 21:9
  - type: text
    content: ‘Babylon is taken,
  - type: note
    content: See Isa. 46:1
  - type: text
    content: Bel is put to shame,
  - type: text
    content: Merodach is dismayed.
  - type: note
    content: Isa. 21:9
  - type: text
    content: Her images are put to shame,
  - type: text
    content: her idols are dismayed.’
  '20':
  - type: text
    content: 'In those days and in that time, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Isa. 40:2]'
  - type: text
    content: 'iniquity shall be sought in Israel, and there shall be none, and sin in Judah, and none shall be found, for '
  - type: note
    content: Isa. 33:24; See ch. 31:34
  - type: text
    content: I will pardon those whom I leave as a remnant.
  '21':
  - type: text
    content: “Go up against the land of Merathaim,
  - type: note
    content: Merathaim means double rebellion
  - type: text
    content: and against the inhabitants of Pekod.
  - type: note
    content: Pekod means punishment
  - type: text
    content: 'Kill, '
  - type: note
    content: ver. 26; [ch. 51:3]
  - type: text
    content: and devote them to destruction,
  - type: note
    content: That is, set apart (devote) as an offering to the Lord (for destruction)
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and do all that I have commanded you.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 51:54
  - type: text
    content: The noise of battle is in the land,
  - type: text
    content: and great destruction!
  '23':
  - type: text
    content: ' '
  - type: note
    content: Isa. 14:6
  - type: text
    content: How the hammer of the whole earth
  - type: text
    content: is cut down and broken!
  - type: note
    content: '[ Rev. 18:19, 21 ]'
  - type: text
    content: 'How Babylon '
  - type: note
    content: ver. 3, 13
  - type: text
    content: has become
  - type: text
    content: a horror among the nations!
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 141:9 ]'
  - type: text
    content: I set a snare for you and you were taken, O Babylon,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 51:31; Dan. 5:30]'
  - type: text
    content: you did not know it;
  - type: text
    content: you were found and caught,
  - type: text
    content: 'because you opposed the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has opened his armory'
  - type: text
    content: 'and brought out '
  - type: note
    content: Isa. 13:5
  - type: text
    content: the weapons of his wrath,
  - type: text
    content: 'for the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts has a work to do'
  - type: text
    content: in the land of the Chaldeans.
  '26':
  - type: text
    content: Come against her from every quarter;
  - type: text
    content: open her granaries;
  - type: note
    content: '[ Neh. 4:2 ]'
  - type: text
    content: pile her up like heaps of grain, and devote her to destruction;
  - type: text
    content: let nothing be left of her.
  '27':
  - type: text
    content: 'Kill all '
  - type: note
    content: '[Ps. 22:12; Isa. 34:7, 8]'
  - type: text
    content: her bulls;
  - type: text
    content: let them go down to the slaughter.
  - type: text
    content: Woe to them, for their day has come,
  - type: note
    content: ch. 46:21
  - type: text
    content: the time of their punishment.
  '28':
  - type: text
    content: '“A voice! They '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'flee and escape from the land of Babylon, '
  - type: note
    content: ch. 51:10; Ps. 64:9
  - type: text
    content: 'to declare in Zion the vengeance of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, vengeance for '
  - type: note
    content: '[ch. 51:11; 52:13; Dan. 5:3, 23]'
  - type: text
    content: his temple.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 14; Job 16:13 ]'
  - type: text
    content: '“Summon archers against Babylon, all those who bend the bow. '
  - type: note
    content: '[ver. 14; Job 16:13]'
  - type: text
    content: 'Encamp around her; let no one escape. '
  - type: note
    content: ch. 25:14
  - type: text
    content: 'Repay her according to her deeds; do to her according to all that she has done. For she has '
  - type: note
    content: Isa. 47:10
  - type: text
    content: 'proudly defied the '
  - type: text
    content: Lord
  - type: text
    content: ', the Holy One of Israel. '
  '3':
  - type: text
    content: '“For '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'out of the north a nation has come up against her, '
  - type: note
    content: ver. 13, 23; ch. 51:29
  - type: text
    content: 'which shall make her land a desolation, and none shall dwell in it; '
  - type: note
    content: ch. 51:62; [Ps. 135:8]
  - type: text
    content: both man and beast shall flee away.
  '30':
  - type: note
    content: ch. 49:26
  - type: text
    content: 'Therefore her young men shall fall in her squares, and all her soldiers shall be destroyed on that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: '“Behold, I am against you, O '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: proud one,
  - type: text
    content: 'declares the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts,'
  - type: note
    content: ver. 27 ; ch. 49:8
  - type: text
    content: for your day has come,
  - type: text
    content: the time when I will punish you.
  '32':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: The proud one shall stumble and fall,
  - type: text
    content: with none to raise him up,
  - type: note
    content: See ch. 17:27
  - type: text
    content: and I will kindle a fire in his cities,
  - type: text
    content: and it will devour all that is around him.
  '33':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'The people of Israel are oppressed, and the people of Judah with them. All who took them captive have held them fast; '
  - type: note
    content: '[Isa. 14:17]'
  - type: text
    content: 'they refuse to let them go. '
  '34':
  - type: note
    content: See Isa. 43:14
  - type: text
    content: 'Their Redeemer is strong; '
  - type: note
    content: See ch. 10:16
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is his name. '
  - type: note
    content: ch. 51:36; Isa. 51:22
  - type: text
    content: He will surely plead their cause, that he may give rest to the earth, but unrest to the inhabitants of Babylon.
  '35':
  - type: text
    content: '“A sword against the Chaldeans, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and against the inhabitants of Babylon,
  - type: text
    content: 'and against '
  - type: note
    content: ch. 51:57; Dan. 5:30
  - type: text
    content: 'her officials and her '
  - type: note
    content: Dan. 4:6
  - type: text
    content: wise men!
  '36':
  - type: text
    content: A sword against the diviners,
  - type: text
    content: that they may become fools!
  - type: text
    content: 'A sword against her '
  - type: note
    content: ch. 51:57
  - type: text
    content: warriors,
  - type: text
    content: that they may be destroyed!
  '37':
  - type: text
    content: A sword against her horses and against her chariots,
  - type: text
    content: 'and against all '
  - type: note
    content: See ch. 25:20
  - type: text
    content: the foreign troops in her midst,
  - type: text
    content: 'that '
  - type: note
    content: ch. 51:30
  - type: text
    content: they may become women!
  - type: note
    content: '[ Isa. 45:3 ]'
  - type: text
    content: A sword against all her treasures,
  - type: text
    content: that they may be plundered!
  '38':
  - type: text
    content: ' '
  - type: note
    content: Isa. 44:27; [ch. 51:36 ]
  - type: text
    content: A drought against her waters,
  - type: text
    content: that they may be dried up!
  - type: note
    content: ver. 2 ; ch. 51:47, 52
  - type: text
    content: For it is a land of images,
  - type: text
    content: and they are mad over idols.
  '39':
  - type: text
    content: ' '
  - type: note
    content: Isa. 13:21, 22
  - type: text
    content: “Therefore wild beasts shall dwell with hyenas in Babylon,
  - type: note
    content: Hebrew lacks in Babylon
  - type: text
    content: ' and ostriches shall dwell in her. She shall never again have people, nor be inhabited for all generations. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:18
  - type: text
    content: '“In those days and in that time, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 3:18
  - type: text
    content: 'the people of Israel and the people of Judah shall come together, '
  - type: note
    content: ch. 31:9, 18; Ezra 8:21; Ps. 126:6
  - type: text
    content: 'weeping as they come, and they '
  - type: note
    content: Hos. 3:5
  - type: text
    content: 'shall seek the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '40':
  - type: note
    content: Gen. 19:25; See Isa. 13:19
  - type: text
    content: 'As when God overthrew Sodom and Gomorrah and their neighboring cities, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 51:43
  - type: text
    content: so no man shall dwell there, and no son of man shall sojourn in her.
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-43, see ch. 6:22-24
  - type: text
    content: “Behold, a people comes from the north;
  - type: text
    content: a mighty nation and many kings
  - type: text
    content: are stirring from the farthest parts of the earth.
  '42':
  - type: text
    content: They lay hold of bow and spear;
  - type: text
    content: they are cruel and have no mercy.
  - type: text
    content: The sound of them is like the roaring of the sea;
  - type: text
    content: they ride on horses,
  - type: text
    content: arrayed as a man for battle
  - type: text
    content: against you, O daughter of Babylon!
  '43':
  - type: text
    content: “The king of Babylon heard the report of them,
  - type: text
    content: and his hands fell helpless;
  - type: text
    content: anguish seized him,
  - type: text
    content: pain as of a woman in labor.
  '44':
  - type: text
    content: ' '
  - type: note
    content: For ver. 44-46, see ch. 49:19-21
  - type: text
    content: '“Behold, like a lion coming up from the thicket of the Jordan against a perennial pasture, I will suddenly make them run away from her, and I will appoint over her whomever I choose. For who is like me? Who will summon me? What shepherd '
  - type: note
    content: Job 41:10
  - type: text
    content: 'can stand before me? '
  '45':
  - type: text
    content: 'Therefore hear '
  - type: note
    content: ch. 51:11, 12, 29; Isa. 14:24
  - type: text
    content: 'the plan that the '
  - type: text
    content: Lord
  - type: text
    content: ' has made against Babylon, '
  - type: note
    content: ch. 51:11, 12, 29; Isa. 14:24
  - type: text
    content: 'and the purposes that he has formed against the land of the Chaldeans: '
  - type: note
    content: ch. 49:20
  - type: text
    content: 'Surely the little ones of their flock shall be dragged away; surely their fold shall be appalled at their fate. '
  '46':
  - type: note
    content: See ch. 49:21
  - type: text
    content: At the sound of the capture of Babylon the earth shall tremble, and her cry shall be heard among the nations.”
  '5':
  - type: note
    content: '[ch. 31:21]'
  - type: text
    content: 'They shall ask the way to Zion, with faces turned toward it, '
  - type: note
    content: '[Isa. 2:3]'
  - type: text
    content: 'saying, ‘Come, let us join ourselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' in an '
  - type: note
    content: See ch. 32:40
  - type: text
    content: everlasting covenant that will never be forgotten.’
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 17 ; Isa. 53:6; [Matt. 18:12; Luke 15:4]
  - type: text
    content: '“My people have been lost sheep. '
  - type: note
    content: Zech. 10:2; See Ezek. 34:1-6
  - type: text
    content: 'Their shepherds have led them astray, turning them away on the mountains. From mountain to hill they have gone. They have forgotten their fold. '
  '7':
  - type: text
    content: 'All who found them have devoured them, '
  - type: note
    content: '[ch. 40:2, 3]'
  - type: text
    content: 'and their enemies have said, ‘We are not guilty, for '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'they have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 31:23
  - type: text
    content: 'their habitation of righteousness, the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 14:8
  - type: text
    content: the hope of their fathers.’
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 51:6, 45; See Isa. 48:20
  - type: text
    content: '“Flee from the midst of Babylon, '
  - type: note
    content: ch. 51:6, 45; See Isa. 48:20
  - type: text
    content: 'and go out of the land of the Chaldeans, and be as male goats before the flock. '
  '9':
  - type: text
    content: 'For behold, I am stirring up and bringing against Babylon '
  - type: note
    content: See ch. 25:14
  - type: text
    content: 'a gathering of great nations, from the north country. And they shall array themselves against her. From there she shall be taken. Their arrows are like a skilled warrior who does not return empty-handed. '
