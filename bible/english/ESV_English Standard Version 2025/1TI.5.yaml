document_id: 1TI.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Instructions for the Church
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 19:32 ]'
  - type: text
    content: 'Do not rebuke an older man but encourage him as you would a father, '
  - type: note
    content: Titus 2:6
  - type: text
    content: 'younger men as brothers, '
  '10':
  - type: text
    content: 'and having a reputation for good works: if she has brought up children, has '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'shown hospitality, '
  - type: note
    content: See Gen. 18:4
  - type: text
    content: 'has washed the feet of the saints, has '
  - type: note
    content: ver. 16
  - type: text
    content: 'cared for the afflicted, and has '
  - type: note
    content: '[ch. 6:18]'
  - type: text
    content: 'devoted herself to every good work. '
  '11':
  - type: text
    content: 'But refuse to enroll younger widows, for when '
  - type: note
    content: '[Rev. 18:3, 7, 9]'
  - type: text
    content: 'their passions draw them away from Christ, they desire to marry '
  '12':
  - type: text
    content: 'and so incur condemnation for having abandoned their former faith. '
  '13':
  - type: text
    content: 'Besides that, they learn to be idlers, going about from house to house, and not only idlers, but also '
  - type: note
    content: 3 John 10 (Gk.)
  - type: text
    content: 'gossips and '
  - type: note
    content: 2 Thess. 3:11; 1 Pet. 4:15
  - type: text
    content: 'busybodies, saying what they should not. '
  '14':
  - type: text
    content: 'So I would have '
  - type: note
    content: '[1 Cor. 7:9]'
  - type: text
    content: 'younger widows marry, bear children, '
  - type: note
    content: '[Titus 2:5]'
  - type: text
    content: 'manage their households, and '
  - type: note
    content: ch. 6:1; Titus 2:5, 8
  - type: text
    content: 'give the adversary no occasion for slander. '
  '15':
  - type: note
    content: '[ch. 1:20]'
  - type: text
    content: 'For some have already strayed after Satan. '
  '16':
  - type: text
    content: 'If any believing woman has relatives who are widows, let her care for them. Let the church not be burdened, so that it may care for those '
  - type: note
    content: ver. 3, 5
  - type: text
    content: who are truly widows.
  '17':
  - type: text
    content: 'Let the elders '
  - type: note
    content: Rom. 12:8; 1 Thess. 5:12; [1 Cor. 12:28]
  - type: text
    content: 'who rule well be considered worthy of '
  - type: note
    content: Deut. 21:17
  - type: text
    content: 'double honor, especially those who labor in preaching and teaching. '
  '18':
  - type: text
    content: 'For the Scripture says, '
  - type: note
    content: 1 Cor. 9:9; Cited from Deut. 25:4
  - type: text
    content: '“You shall not muzzle an ox when it treads out the grain,” and, '
  - type: note
    content: Matt. 10:10; Luke 10:7; [Lev. 19:13; Deut. 24:15; 1 Cor. 9:4, 7-14]
  - type: text
    content: “The laborer deserves his wages.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Do not admit a charge against an elder except '
  - type: note
    content: See Deut. 19:15
  - type: text
    content: 'on the evidence of two or three witnesses. '
  '2':
  - type: text
    content: older women as mothers, younger women as sisters, in all purity.
  '20':
  - type: text
    content: 'As for those who persist in sin, '
  - type: note
    content: Titus 1:13; 2:15
  - type: text
    content: 'rebuke them in the presence of all, '
  - type: note
    content: Deut. 13:11
  - type: text
    content: 'so that the rest may stand in fear. '
  '21':
  - type: text
    content: 'In the presence of God and of Christ Jesus and of the elect angels '
  - type: note
    content: ch. 6:13; 2 Tim. 2:14; 4:1
  - type: text
    content: 'I charge you to keep these rules without prejudging, '
  - type: note
    content: See 2 Cor. 5:16
  - type: text
    content: 'doing nothing from partiality. '
  '22':
  - type: note
    content: '[ch. 3:10]'
  - type: text
    content: 'Do not be hasty in the '
  - type: note
    content: See Acts 6:6
  - type: text
    content: 'laying on of hands, nor '
  - type: note
    content: '[2 John 11]'
  - type: text
    content: 'take part in the sins of others; keep yourself pure. '
  '23':
  - type: text
    content: 'No longer drink only water, but '
  - type: note
    content: '[ch. 3:8]'
  - type: text
    content: 'use a little wine '
  - type: note
    content: Ps. 104:15
  - type: text
    content: 'for the sake of your stomach and your frequent ailments. '
  '24':
  - type: text
    content: 'The sins of some people are conspicuous, going before them to judgment, but the sins of others appear later. '
  '25':
  - type: text
    content: 'So also good works are conspicuous, and '
  - type: note
    content: '[Ps. 37:6; Prov. 10:9]'
  - type: text
    content: even those that are not cannot remain hidden.
  '3':
  - type: text
    content: 'Honor widows '
  - type: note
    content: ver. 5, 16
  - type: text
    content: 'who are truly widows. '
  '4':
  - type: text
    content: 'But if a widow has children or grandchildren, let them first learn '
  - type: note
    content: Matt. 15:4-6; Mark 7:10-13; Eph. 6:1, 2; [Gen. 45:9-11]
  - type: text
    content: 'to show godliness to their own household and to make some return to their parents, for '
  - type: note
    content: ch. 2:3
  - type: text
    content: 'this is pleasing in the sight of God. '
  '5':
  - type: text
    content: 'She '
  - type: note
    content: ver. 3, 16
  - type: text
    content: 'who is truly a widow, left all alone, has set her hope on God and '
  - type: note
    content: '[Luke 2:37; 18:1-5]'
  - type: text
    content: 'continues in supplications and prayers night and day, '
  '6':
  - type: text
    content: 'but '
  - type: note
    content: James 5:5; [Ezek. 16:49]
  - type: text
    content: 'she who is self-indulgent is '
  - type: note
    content: Rev. 3:1
  - type: text
    content: 'dead even while she lives. '
  '7':
  - type: note
    content: ch. 4:11; 6:2
  - type: text
    content: 'Command these things as well, so that they may be without reproach. '
  '8':
  - type: text
    content: 'But if anyone does not provide for his relatives, and especially for '
  - type: note
    content: See Gal. 6:10
  - type: text
    content: 'members of his household, he has '
  - type: note
    content: Rev. 2:13; [2 Tim. 3:5; Titus 1:16; 2 Pet. 2:1; Rev. 3:8]
  - type: text
    content: denied the faith and is worse than an unbeliever.
  '9':
  - type: text
    content: 'Let a widow be enrolled if she is not less than sixty years of age, having been '
  - type: note
    content: '[ch. 3:2]'
  - type: text
    content: the wife of one husband,
  - type: note
    content: Or a woman of one man
  - type: text
    content: ' '
