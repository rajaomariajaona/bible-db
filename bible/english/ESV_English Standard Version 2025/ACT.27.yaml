          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'they ran the vessel aground. The bow stuck and remained immovable, and the stern was being broken up by the surf. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
