verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Sails for Rome
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when it was decided '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      marker-yv: yv-n
    - type: text
      text: 'that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:10
      marker-yv: yv-n
    - type: text
      text: 'we should sail for Italy, they delivered Paul and some other prisoners to a centurion of the Augustan '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:1
      marker-yv: yv-n
    - type: text
      text: 'Cohort named Julius. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, “Sirs, I perceive that the voyage will be with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'injury and much loss, not only of the cargo and the ship, but also of our lives.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the centurion paid more attention to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 18:17
      - type: text
        text: ' (Gk.)'
      marker-yv: yv-n
    - type: text
      text: 'the pilot and to the owner of the ship than to what Paul said. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And because the harbor was not suitable to spend the winter in, the majority decided to put out to sea from there, on the chance that somehow they could reach Phoenix, a harbor of Crete, facing both southwest and northwest, and spend the winter there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Storm at Sea
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the south wind blew gently, supposing that they had obtained their purpose, they weighed anchor and sailed along Crete, close to the shore. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But soon a tempestuous wind, called the northeaster, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 4:37
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'struck down from the land. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the ship was caught and could not face the wind, we gave way to it and were driven along. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Running under the lee of a small island called Cauda,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Clauda
      marker-yv: yv-n
    - type: text
      text: ' we managed with difficulty to secure the ship’s boat. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After hoisting it up, they used supports to undergird the ship. Then, fearing that they would '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26, 29
      marker-yv: yv-n
    - type: text
      text: run aground on the Syrtis, they lowered the gear,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the sea-anchor (or possibly the mainsail)
      marker-yv: yv-n
    - type: text
      text: ' and thus they were driven along. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since we were violently storm-tossed, they began the next day '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jonah 1:5
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'to jettison the cargo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the third day they threw the ship’s tackle overboard with their own hands. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And embarking in a ship of Adramyttium, which was about to sail to the ports along the coast of Asia, we put to sea, accompanied by '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:29
      marker-yv: yv-n
    - type: text
      text: 'Aristarchus, a Macedonian from Thessalonica. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When neither sun nor stars appeared for many days, and no small tempest lay on us, all hope of our being saved was at last abandoned.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since they had been without food for a long time, Paul stood up among them and said, “Men, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'you should have listened to me and not have set sail from Crete and incurred this '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'injury and loss. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet now I urge you to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25, 36
      marker-yv: yv-n
    - type: text
      text: 'take heart, for there will be no loss of life among you, but only of the ship. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this very night '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:11
      marker-yv: yv-n
    - type: text
      text: 'there '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:17
      marker-yv: yv-n
    - type: text
      text: 'stood before me '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:26
      marker-yv: yv-n
    - type: text
      text: 'an angel of the God '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 119:94
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 5:23
      marker-yv: yv-n
    - type: text
      text: 'to whom I belong and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 6:16
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:14
      marker-yv: yv-n
    - type: text
      text: 'whom I worship, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he said, ‘Do not be afraid, Paul; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:11
      marker-yv: yv-n
    - type: text
      text: 'you must stand before Caesar. And behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 18:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 14:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'God has granted you all those who sail with you.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So take heart, men, for I have faith in God that it will be exactly as I have been told. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:1
      marker-yv: yv-n
    - type: text
      text: 'we must '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17, 29
      marker-yv: yv-n
    - type: text
      text: run aground on some island.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the fourteenth night had come, as we were being driven across the Adriatic Sea, about midnight the sailors suspected that they were nearing land. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they took a sounding and found twenty fathoms.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'About 120 feet; a fathom (Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: orguia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) was about 6 feet or 2 meters
      marker-yv: yv-n
    - type: text
      text: ' A little farther on they took a sounding again and found fifteen fathoms.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 90 feet (see previous note)
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And fearing that we might '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17, 26
      marker-yv: yv-n
    - type: text
      text: 'run on the rocks, they let down four anchors from the stern and prayed for day to come. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day we put in at Sidon. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
      marker-yv: yv-n
    - type: text
      text: 'Julius '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:2
      marker-yv: yv-n
    - type: text
      text: 'treated Paul kindly and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'gave him leave to go to his friends and be cared for. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as the sailors were seeking to escape from the ship, and had lowered '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'the ship’s boat into the sea under pretense of laying out anchors from the bow, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul said to the centurion and the soldiers, “Unless these men stay in the ship, you cannot be saved.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the soldiers cut away the ropes of the ship’s boat and let it go.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As day was about to dawn, Paul urged them all to take some food, saying, “Today is the fourteenth day that you have continued in suspense and without food, having taken nothing. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore I urge you to take some food. For it will give you strength,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: For it is for your deliverance
      marker-yv: yv-n
    - type: text
      text: ' for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 14:45
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 14:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 1:52
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 21:18
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 10:30
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'not a hair is to perish from the head of any of you.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had said these things, he took bread, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 15:36
      marker-yv: yv-n
    - type: text
      text: 'giving thanks to God in the presence of all he broke it and began to eat. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they all '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: 'were encouraged and ate some food themselves. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (We were in all 276
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: seventy-six
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', or '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: about seventy-six
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:41
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 13:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 3:20
      marker-yv: yv-n
    - type: text
      text: 'persons in the ship.) '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had eaten enough, they lightened the ship, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: throwing out the wheat into the sea.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shipwreck
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when it was day, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'they did not recognize the land, but they noticed a bay with a beach, on which they planned if possible to run the ship ashore. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And putting out to sea from there we sailed under the lee of Cyprus, because the winds were against us. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they cast off the anchors and left them in the sea, at the same time loosening the ropes that tied the rudders. Then hoisting the foresail to the wind they made for the beach. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
