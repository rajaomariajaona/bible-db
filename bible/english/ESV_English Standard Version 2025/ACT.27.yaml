      marker-yv: yv-n
    - type: text
      text: 'wishing to save Paul, kept them from carrying out their plan. He ordered those who could swim to jump overboard first and make for the land, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the rest on planks or on pieces of the ship. And so it was that '
    - type: usfm
