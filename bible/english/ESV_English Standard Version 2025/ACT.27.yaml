document_id: ACT.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Sails for Rome
  - type: text
    content: 'And when it was decided '
  - type: note
    content: ch. 25:12, 25
  - type: text
    content: 'that '
  - type: note
    content: See ch. 16:10
  - type: text
    content: 'we should sail for Italy, they delivered Paul and some other prisoners to a centurion of the Augustan '
  - type: note
    content: See ch. 10:1
  - type: text
    content: 'Cohort named Julius. '
  '10':
  - type: text
    content: 'saying, “Sirs, I perceive that the voyage will be with '
  - type: note
    content: ver. 21
  - type: text
    content: 'injury and much loss, not only of the cargo and the ship, but also of our lives.” '
  '11':
  - type: text
    content: 'But the centurion paid more attention to '
  - type: note
    content: Rev. 18:17 (Gk.)
  - type: text
    content: 'the pilot and to the owner of the ship than to what Paul said. '
  '12':
  - type: text
    content: And because the harbor was not suitable to spend the winter in, the majority decided to put out to sea from there, on the chance that somehow they could reach Phoenix, a harbor of Crete, facing both southwest and northwest, and spend the winter there.
  - type: heading
    content: The Storm at Sea
  '13':
  - type: text
    content: 'Now when the south wind blew gently, supposing that they had obtained their purpose, they weighed anchor and sailed along Crete, close to the shore. '
  '14':
  - type: text
    content: 'But soon a tempestuous wind, called the northeaster, '
  - type: note
    content: '[Mark 4:37]'
  - type: text
    content: 'struck down from the land. '
  '15':
  - type: text
    content: 'And when the ship was caught and could not face the wind, we gave way to it and were driven along. '
  '16':
  - type: text
    content: Running under the lee of a small island called Cauda,
  - type: note
    content: Some manuscripts Clauda
  - type: text
    content: ' we managed with difficulty to secure the ship’s boat. '
  '17':
  - type: text
    content: 'After hoisting it up, they used supports to undergird the ship. Then, fearing that they would '
  - type: note
    content: ver. 26, 29
  - type: text
    content: run aground on the Syrtis, they lowered the gear,
  - type: note
    content: That is, the sea-anchor (or possibly the mainsail)
  - type: text
    content: ' and thus they were driven along. '
  '18':
  - type: text
    content: 'Since we were violently storm-tossed, they began the next day '
  - type: note
    content: Jonah 1:5; [ver. 38]
  - type: text
    content: 'to jettison the cargo. '
  '19':
  - type: text
    content: 'And on the third day they threw the ship’s tackle overboard with their own hands. '
  '2':
  - type: text
    content: 'And embarking in a ship of Adramyttium, which was about to sail to the ports along the coast of Asia, we put to sea, accompanied by '
  - type: note
    content: See ch. 19:29
  - type: text
    content: 'Aristarchus, a Macedonian from Thessalonica. '
  '20':
  - type: text
    content: When neither sun nor stars appeared for many days, and no small tempest lay on us, all hope of our being saved was at last abandoned.
  '21':
  - type: text
    content: 'Since they had been without food for a long time, Paul stood up among them and said, “Men, '
  - type: note
    content: ver. 10
  - type: text
    content: 'you should have listened to me and not have set sail from Crete and incurred this '
  - type: note
    content: ver. 10
  - type: text
    content: 'injury and loss. '
  '22':
  - type: text
    content: 'Yet now I urge you to '
  - type: note
    content: ver. 25, 36
  - type: text
    content: 'take heart, for there will be no loss of life among you, but only of the ship. '
  '23':
  - type: text
    content: 'For this very night '
  - type: note
    content: ch. 18:9; 23:11
  - type: text
    content: 'there '
  - type: note
    content: 2 Tim. 4:17
  - type: text
    content: 'stood before me '
  - type: note
    content: See ch. 8:26
  - type: text
    content: 'an angel of the God '
  - type: note
    content: Ps. 119:94; Dan. 5:23
  - type: text
    content: 'to whom I belong and '
  - type: note
    content: '[Dan. 6:16]; See ch. 24:14'
  - type: text
    content: 'whom I worship, '
  '24':
  - type: text
    content: 'and he said, ‘Do not be afraid, Paul; '
  - type: note
    content: ch. 23:11
  - type: text
    content: 'you must stand before Caesar. And behold, '
  - type: note
    content: '[Gen. 18:26; 19:21, 29; Ezek. 14:14]'
  - type: text
    content: 'God has granted you all those who sail with you.’ '
  '25':
  - type: text
    content: 'So take heart, men, for I have faith in God that it will be exactly as I have been told. '
  '26':
  - type: text
    content: 'But '
  - type: note
    content: ch. 28:1
  - type: text
    content: 'we must '
  - type: note
    content: ver. 17, 29
  - type: text
    content: run aground on some island.”
  '27':
  - type: text
    content: 'When the fourteenth night had come, as we were being driven across the Adriatic Sea, about midnight the sailors suspected that they were nearing land. '
  '28':
  - type: text
    content: So they took a sounding and found twenty fathoms.
  - type: note
    content: About 120 feet; a fathom (Greek orguia) was about 6 feet or 2 meters
  - type: text
    content: ' A little farther on they took a sounding again and found fifteen fathoms.'
  - type: note
    content: About 90 feet (see previous note)
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And fearing that we might '
  - type: note
    content: ver. 17, 26
  - type: text
    content: 'run on the rocks, they let down four anchors from the stern and prayed for day to come. '
  '3':
  - type: text
    content: 'The next day we put in at Sidon. And '
  - type: note
    content: ver. 43
  - type: text
    content: 'Julius '
  - type: note
    content: ch. 28:2
  - type: text
    content: 'treated Paul kindly and '
  - type: note
    content: '[ch. 24:23; 28:16, 30]'
  - type: text
    content: 'gave him leave to go to his friends and be cared for. '
  '30':
  - type: text
    content: 'And as the sailors were seeking to escape from the ship, and had lowered '
  - type: note
    content: ver. 16
  - type: text
    content: 'the ship’s boat into the sea under pretense of laying out anchors from the bow, '
  '31':
  - type: text
    content: 'Paul said to the centurion and the soldiers, “Unless these men stay in the ship, you cannot be saved.” '
  '32':
  - type: text
    content: Then the soldiers cut away the ropes of the ship’s boat and let it go.
  '33':
  - type: text
    content: 'As day was about to dawn, Paul urged them all to take some food, saying, “Today is the fourteenth day that you have continued in suspense and without food, having taken nothing. '
  '34':
  - type: text
    content: Therefore I urge you to take some food. For it will give you strength,
  - type: note
    content: Or For it is for your deliverance
  - type: text
    content: ' for '
  - type: note
    content: 1 Sam. 14:45; 2 Sam. 14:11; 1 Kgs. 1:52; Luke 21:18; [Matt. 10:30]
  - type: text
    content: 'not a hair is to perish from the head of any of you.” '
  '35':
  - type: text
    content: 'And when he had said these things, he took bread, and '
  - type: note
    content: See Matt. 15:36
  - type: text
    content: 'giving thanks to God in the presence of all he broke it and began to eat. '
  '36':
  - type: text
    content: 'Then they all '
  - type: note
    content: ver. 22
  - type: text
    content: 'were encouraged and ate some food themselves. '
  '37':
  - type: text
    content: (We were in all 276
  - type: note
    content: Some manuscripts seventy-six, or about seventy-six
  - type: text
    content: ' '
  - type: note
    content: ch. 2:41; 7:14; Rom. 13:1; 1 Pet. 3:20
  - type: text
    content: 'persons in the ship.) '
  '38':
  - type: text
    content: 'And when they had eaten enough, they lightened the ship, '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: throwing out the wheat into the sea.
  - type: heading
    content: The Shipwreck
  '39':
  - type: text
    content: 'Now when it was day, '
  - type: note
    content: '[ch. 28:1]'
  - type: text
    content: 'they did not recognize the land, but they noticed a bay with a beach, on which they planned if possible to run the ship ashore. '
  '4':
  - type: text
    content: 'And putting out to sea from there we sailed under the lee of Cyprus, because the winds were against us. '
  '40':
  - type: text
    content: 'So they cast off the anchors and left them in the sea, at the same time loosening the ropes that tied the rudders. Then hoisting the foresail to the wind they made for the beach. '
  '41':
  - type: text
    content: But striking a reef,
  - type: note
    content: Or sandbank, or crosscurrent; Greek place between two seas
  - type: text
    content: ' '
  - type: note
    content: '[2 Cor. 11:25]'
  - type: text
    content: 'they ran the vessel aground. The bow stuck and remained immovable, and the stern was being broken up by the surf. '
  '42':
  - type: note
    content: '[ch. 12:19]'
  - type: text
    content: 'The soldiers’ plan was to kill the prisoners, lest any should swim away and escape. '
  '43':
  - type: text
    content: 'But the centurion, '
  - type: note
    content: ver. 3
  - type: text
    content: 'wishing to save Paul, kept them from carrying out their plan. He ordered those who could swim to jump overboard first and make for the land, '
  '44':
  - type: text
    content: 'and the rest on planks or on pieces of the ship. And so it was that '
  - type: note
    content: ver. 22
  - type: text
    content: all were brought safely to land.
  '5':
  - type: text
    content: 'And when we had sailed across the open sea along the coast of Cilicia and Pamphylia, we came to Myra in Lycia. '
  '6':
  - type: text
    content: 'There the centurion found '
  - type: note
    content: ch. 28:11
  - type: text
    content: 'a ship of Alexandria sailing for Italy and put us on board. '
  '7':
  - type: text
    content: 'We sailed slowly for a number of days and arrived with difficulty off Cnidus, and as the wind did not allow us to go farther, we sailed under the lee of Crete off Salmone. '
  '8':
  - type: text
    content: Coasting along it with difficulty, we came to a place called Fair Havens, near which was the city of Lasea.
  '9':
  - type: text
    content: 'Since much time had passed, and the voyage was now dangerous because even '
  - type: note
    content: Lev. 16:29-31; 23:27-29; Num. 29:7
  - type: text
    content: the Fast
  - type: note
    content: That is, the Day of Atonement
  - type: text
    content: ' was already over, Paul advised them, '
