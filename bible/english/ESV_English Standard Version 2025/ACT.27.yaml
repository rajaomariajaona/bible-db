      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'The soldiers’ plan was to kill the prisoners, lest any should swim away and escape. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the centurion, '
    - type: usfm
