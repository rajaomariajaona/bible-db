document_id: 1KI.16,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to '
  - type: note
    content: 2 Chr. 19:2; 20:34
  - type: text
    content: 'Jehu the son of '
  - type: note
    content: 2 Chr. 16:7
  - type: text
    content: 'Hanani against Baasha, saying, '
  '10':
  - type: text
    content: Zimri came in and struck him down and killed him, in the twenty-seventh year of Asa king of Judah, and reigned in his place.
  '11':
  - type: text
    content: 'When he began to reign, as soon as he had seated himself on his throne, he struck down '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'all the house of Baasha. He '
  - type: note
    content: '[1 Sam. 25:22]'
  - type: text
    content: 'did not leave him a single male of his relatives or his friends. '
  '12':
  - type: text
    content: 'Thus Zimri destroyed all the house of Baasha, '
  - type: note
    content: ver. 3
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he spoke against Baasha by '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Jehu the prophet, '
  '13':
  - type: text
    content: 'for all the sins of Baasha and the sins of Elah his son, which they sinned and which they made Israel to sin, '
  - type: note
    content: ver. 26; Deut. 32:21
  - type: text
    content: 'provoking the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel to anger with their idols. '
  '14':
  - type: text
    content: Now the rest of the acts of Elah and all that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  - type: heading
    content: Zimri Reigns in Israel
  '15':
  - type: text
    content: 'In the twenty-seventh year of Asa king of Judah, Zimri reigned seven days in Tirzah. Now the troops were encamped against '
  - type: note
    content: ch. 15:27
  - type: text
    content: 'Gibbethon, which belonged to the Philistines, '
  '16':
  - type: text
    content: 'and the troops who were encamped heard it said, “Zimri has conspired, and he has killed the king.” Therefore all Israel made Omri, the commander of the army, king over Israel that day in the camp. '
  '17':
  - type: text
    content: 'So Omri went up from Gibbethon, and all Israel with him, and they besieged Tirzah. '
  '18':
  - type: text
    content: 'And when Zimri saw that the city was taken, he went into the citadel of the king’s house and burned the king’s house over him with fire and died, '
  '19':
  - type: text
    content: 'because of his sins that he committed, doing evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 15:26, 34]'
  - type: text
    content: 'walking in the way of Jeroboam, and for his sin which he committed, making Israel to sin. '
  '2':
  - type: text
    content: '“Since I '
  - type: note
    content: '[ch. 14:7]'
  - type: text
    content: 'exalted you out of the dust and made you leader over my people Israel, and '
  - type: note
    content: ch. 15:34
  - type: text
    content: 'you have walked in the way of Jeroboam and have made my people Israel to sin, provoking me to anger with their sins, '
  '20':
  - type: text
    content: Now the rest of the acts of Zimri, and the conspiracy that he made, are they not written in the Book of the Chronicles of the Kings of Israel?
  - type: heading
    content: Omri Reigns in Israel
  '21':
  - type: text
    content: 'Then the people of Israel were divided into two parts. Half of the people followed Tibni the son of Ginath, to make him king, and half followed Omri. '
  '22':
  - type: text
    content: 'But the people who followed Omri overcame the people who followed Tibni the son of Ginath. So Tibni died, and Omri became king. '
  '23':
  - type: text
    content: 'In the thirty-first year of Asa king of Judah, Omri began to reign over Israel, and he reigned for twelve years; six years he reigned in Tirzah. '
  '24':
  - type: text
    content: 'He bought the hill of '
  - type: note
    content: '[ch. 13:32]'
  - type: text
    content: Samaria from Shemer for two talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver, and he fortified the hill and called the name of the city that he built '
  - type: note
    content: ver. 28, 29, 32
  - type: text
    content: Samaria, after the name of Shemer, the owner of the hill.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Mic. 6:16
  - type: text
    content: 'Omri did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and did more evil '
  - type: note
    content: ver. 30
  - type: text
    content: 'than all who were before him. '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'he walked in all the way of Jeroboam the son of Nebat, and in the sins that he made Israel to sin, '
  - type: note
    content: ver. 13
  - type: text
    content: 'provoking the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to anger by their idols. '
  '27':
  - type: text
    content: 'Now the rest of the acts of Omri that he did, and the might that he showed, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '28':
  - type: text
    content: And Omri slept with his fathers and was buried in Samaria, and Ahab his son reigned in his place.
  - type: heading
    content: Ahab Reigns in Israel
  '29':
  - type: text
    content: 'In the thirty-eighth year of Asa king of Judah, Ahab the son of Omri began to reign over Israel, and Ahab the son of Omri reigned over Israel in Samaria twenty-two years. '
  '3':
  - type: text
    content: 'behold, I will utterly '
  - type: note
    content: '[ch. 14:10; 21:21]'
  - type: text
    content: 'sweep away '
  - type: note
    content: ver. 11
  - type: text
    content: 'Baasha and his house, and I will make your house '
  - type: note
    content: '[ch. 15:29]'
  - type: text
    content: 'like the house of Jeroboam the son of Nebat. '
  '30':
  - type: text
    content: 'And Ahab the son of Omri did evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 21:25; [ver. 25]
  - type: text
    content: 'more than all who were before him. '
  '31':
  - type: text
    content: 'And as if it had been a light thing for him to walk in the sins of Jeroboam the son of Nebat, '
  - type: note
    content: '[Ex. 34:16; Deut. 7:3]'
  - type: text
    content: 'he took for his wife Jezebel the daughter of Ethbaal king of the '
  - type: note
    content: Judg. 18:7
  - type: text
    content: 'Sidonians, '
  - type: note
    content: ch. 21:25, 26; [2 Kgs. 3:2; 10:18; 17:16]
  - type: text
    content: 'and went and served Baal and worshiped him. '
  '32':
  - type: text
    content: 'He erected an altar for Baal in '
  - type: note
    content: 2 Kgs. 10:21, 26, 27
  - type: text
    content: 'the house of Baal, which he built in Samaria. '
  '33':
  - type: text
    content: 'And Ahab made an '
  - type: note
    content: ch. 18:19; 2 Kgs. 13:6; 17:10; 21:3; 2 Chr. 14:3; [Ex. 34:13; Jer. 17:2]
  - type: text
    content: 'Asherah. Ahab did more to provoke the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to anger '
  - type: note
    content: '[See ver. 30 above]'
  - type: text
    content: 'than all the kings of Israel who were before him. '
  '34':
  - type: note
    content: '[Josh. 6:26]'
  - type: text
    content: 'In his days Hiel of Bethel built '
  - type: note
    content: See 2 Kgs. 2:4, 18-22
  - type: text
    content: 'Jericho. He laid its foundation at the cost of Abiram his firstborn, and set up its gates at the cost of his youngest son Segub, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he spoke by Joshua the son of Nun.'
  '4':
  - type: note
    content: '[ch. 14:11; 21:24]'
  - type: text
    content: Anyone belonging to Baasha who dies in the city the dogs shall eat, and anyone of his who dies in the field the birds of the heavens shall eat.”
  '5':
  - type: text
    content: 'Now the rest of the acts of Baasha and what he did, and his might, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '6':
  - type: text
    content: 'And Baasha slept with his fathers and was buried at '
  - type: note
    content: ch. 14:17; 15:21
  - type: text
    content: 'Tirzah, and Elah his son reigned in his place. '
  '7':
  - type: text
    content: 'Moreover, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came by the prophet '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Jehu the son of Hanani against Baasha and his house, both because of all the evil that he did in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', provoking him to anger with the work of his hands, in being like the house of Jeroboam, and also because '
  - type: note
    content: ch. 15:27, 29; [Hos. 1:4]
  - type: text
    content: he destroyed it.
  - type: heading
    content: Elah Reigns in Israel
  '8':
  - type: text
    content: 'In the twenty-sixth year of Asa king of Judah, Elah the son of Baasha began to reign over Israel in Tirzah, and he reigned two years. '
  '9':
  - type: text
    content: 'But his servant '
  - type: note
    content: 2 Kgs. 9:31
  - type: text
    content: 'Zimri, commander of half his chariots, conspired against him. When he was at Tirzah, drinking himself drunk in the house of Arza, '
  - type: note
    content: '[ch. 18:3]'
  - type: text
    content: 'who was over the household in Tirzah, '
