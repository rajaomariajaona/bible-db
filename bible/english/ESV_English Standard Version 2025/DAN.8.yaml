document_id: DAN.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Vision of the Ram and the Goat
  - type: text
    content: 'In the third year of the reign of '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'King Belshazzar a vision appeared to me, Daniel, '
  - type: note
    content: '[ch. 7:1]'
  - type: text
    content: 'after that which appeared to me '
  - type: note
    content: '[ch. 7:1]'
  - type: text
    content: 'at the first. '
  '10':
  - type: note
    content: '[ch. 11:28]'
  - type: text
    content: 'It grew great, '
  - type: note
    content: Isa. 14:13
  - type: text
    content: 'even to the host of heaven. And some of the host '
  - type: note
    content: Isa. 14:13
  - type: text
    content: and some
  - type: note
    content: Or host, that is, some
  - type: text
    content: ' of '
  - type: note
    content: '[Rev. 12:4]'
  - type: text
    content: 'the stars it threw down to the ground and '
  - type: note
    content: ver. 7
  - type: text
    content: 'trampled on them. '
  '11':
  - type: note
    content: ver. 25; See ch. 11:36
  - type: text
    content: 'It became great, even as great as '
  - type: note
    content: Josh. 5:14
  - type: text
    content: 'the Prince of the host. '
  - type: note
    content: ch. 11:31; 12:11
  - type: text
    content: 'And the regular burnt offering was taken away from him, and the place of his sanctuary was overthrown. '
  '12':
  - type: text
    content: And a host will be given over to it together with the regular burnt offering because of transgression,
  - type: note
    content: Or in an act of rebellion
  - type: text
    content: ' and it will throw truth to the ground, and '
  - type: note
    content: ver. 24; ch. 11:28, 30
  - type: text
    content: 'it will act and prosper. '
  '13':
  - type: text
    content: 'Then I heard '
  - type: note
    content: See ch. 4:13
  - type: text
    content: 'a holy one speaking, and another holy one said to the one who spoke, '
  - type: note
    content: ch. 12:6; [Rev. 6:10]; See ch. 9:21-27
  - type: text
    content: '“For how long is the vision concerning the regular burnt offering, '
  - type: note
    content: See ch. 11:31
  - type: text
    content: 'the transgression that makes desolate, and the giving over of the sanctuary and host to be trampled underfoot?” '
  '14':
  - type: text
    content: And he said to me,
  - type: note
    content: Hebrew; Septuagint, Theodotion, Vulgate to him
  - type: text
    content: ' “For 2,300 '
  - type: note
    content: '[ver. 26]'
  - type: text
    content: evenings and mornings. Then the sanctuary shall be restored to its rightful state.”
  - type: heading
    content: The Interpretation of the Vision
  '15':
  - type: text
    content: 'When I, Daniel, had seen the vision, I '
  - type: note
    content: '[1 Pet. 1:10, 11]'
  - type: text
    content: 'sought to understand it. And behold, there stood before me one having '
  - type: note
    content: ch. 7:13; 10:16, 18; Ezek. 1:26; Rev. 1:13
  - type: text
    content: 'the appearance of a man. '
  '16':
  - type: note
    content: See ch. 12:5-7
  - type: text
    content: 'And I heard a man’s voice '
  - type: note
    content: See ch. 12:5-7
  - type: text
    content: 'between the banks of the '
  - type: note
    content: ver. 2
  - type: text
    content: 'Ulai, and it called, '
  - type: note
    content: ch. 9:21; Luke 1:19, 26
  - type: text
    content: '“Gabriel, make this man understand the vision.” '
  '17':
  - type: text
    content: 'So he came near where I stood. And when he came, '
  - type: note
    content: '[Luke 1:12]'
  - type: text
    content: 'I was frightened '
  - type: note
    content: Ezek. 1:28
  - type: text
    content: 'and fell on my face. But he said to me, “Understand, '
  - type: note
    content: See Ezek. 2:1
  - type: text
    content: 'O son of man, that the vision is for '
  - type: note
    content: '[ver. 19; ch. 11:27, 35, 40; 12:4, 9]'
  - type: text
    content: the time of the end.”
  '18':
  - type: text
    content: 'And when he had spoken to me, '
  - type: note
    content: ch. 10:9; [Luke 9:32]
  - type: text
    content: 'I fell into a deep sleep with my face to the ground. But '
  - type: note
    content: ch. 9:21; 10:10, 18
  - type: text
    content: 'he touched me and made me stand up. '
  '19':
  - type: text
    content: 'He said, “Behold, I will make known to you what shall be at the latter end of '
  - type: note
    content: ch. 11:36
  - type: text
    content: 'the indignation, for it refers to '
  - type: note
    content: '[Ps. 102:13]; See ver. 17'
  - type: text
    content: 'the appointed time of the end. '
  '2':
  - type: text
    content: 'And I saw in the vision; and when I saw, I was in '
  - type: note
    content: See Neh. 1:1
  - type: text
    content: 'Susa the citadel, which is in the province of '
  - type: note
    content: See Isa. 11:11
  - type: text
    content: 'Elam. And '
  - type: note
    content: See Ezek. 1:1
  - type: text
    content: 'I saw in the vision, '
  - type: note
    content: See Ezek. 1:1
  - type: text
    content: 'and I was at the '
  - type: note
    content: ver. 16
  - type: text
    content: 'Ulai canal. '
  '20':
  - type: text
    content: 'As for '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'the ram that you saw with the two horns, these are the kings of '
  - type: note
    content: '[ch. 6:8]'
  - type: text
    content: 'Media and Persia. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: the goat
  - type: note
    content: Or the shaggy goat
  - type: text
    content: ' is the king of Greece. And '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'the great horn between his eyes is '
  - type: note
    content: ch. 10:20; 11:3
  - type: text
    content: 'the first king. '
  '22':
  - type: note
    content: ver. 8
  - type: text
    content: As for the horn that was broken, in place of which four others arose, four kingdoms shall arise from his
  - type: note
    content: Theodotion, Septuagint, Vulgate; Hebrew a
  - type: text
    content: ' nation, '
  - type: note
    content: ver. 24
  - type: text
    content: 'but not with his power. '
  '23':
  - type: text
    content: 'And at the latter end of their kingdom, when the transgressors have reached their limit, a king of bold face, one who understands riddles, shall arise. '
  '24':
  - type: text
    content: His power shall be great—
  - type: note
    content: Rev. 17:17
  - type: text
    content: 'but not by his own power; and he shall cause fearful destruction '
  - type: note
    content: ver. 12; ch. 11:28, 30
  - type: text
    content: 'and shall succeed in what he does, '
  - type: note
    content: '[ch. 7:21]'
  - type: text
    content: 'and destroy mighty men and the people who are the saints. '
  '25':
  - type: note
    content: '[ch. 11:23]'
  - type: text
    content: 'By his cunning he shall make deceit prosper under his hand, and in his own mind '
  - type: note
    content: ver. 11
  - type: text
    content: 'he shall become great. '
  - type: note
    content: '[ch. 11:21, 24]'
  - type: text
    content: 'Without warning he shall destroy many. And he '
  - type: note
    content: ver. 11
  - type: text
    content: 'shall even rise up against the Prince of princes, and he shall be broken—but '
  - type: note
    content: See ch. 2:34
  - type: text
    content: 'by no human hand. '
  '26':
  - type: text
    content: 'The vision of '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'the evenings and the mornings that has been told '
  - type: note
    content: '[ch. 10:1]'
  - type: text
    content: 'is true, but '
  - type: note
    content: '[ch. 12:4, 9]'
  - type: text
    content: 'seal up the vision, '
  - type: note
    content: ch. 10:14
  - type: text
    content: for it refers to many days from now.”
  '27':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 7:28]'
  - type: text
    content: 'I, Daniel, was overcome and lay sick for some days. Then I rose and went about the king’s business, but I was appalled by the vision '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: and did not understand it.
  '3':
  - type: text
    content: 'I raised my eyes and saw, and behold, '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'a ram standing on the bank of the canal. It had two horns, and both horns were high, but one was higher than the other, and the higher one came up last. '
  '4':
  - type: text
    content: 'I saw '
  - type: note
    content: '[Deut. 33:17; Ezek. 34:21]'
  - type: text
    content: 'the ram charging westward and northward and southward. No '
  - type: note
    content: '[ch. 7:17]'
  - type: text
    content: 'beast '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'could stand before him, '
  - type: note
    content: '[ch. 3:15]'
  - type: text
    content: 'and there was no one who could rescue from his power. '
  - type: note
    content: '[ch. 11:3, 16, 36]'
  - type: text
    content: 'He did as he pleased and '
  - type: note
    content: ver. 8
  - type: text
    content: became great.
  '5':
  - type: text
    content: 'As I was considering, behold, a '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'male goat came from the west across the face of the whole earth, without touching the ground. And the goat had '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'a conspicuous horn between his eyes. '
  '6':
  - type: text
    content: 'He came to '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'the ram with the two horns, which I had seen standing on the bank of the canal, '
  - type: note
    content: '[Job 15:26]'
  - type: text
    content: 'and he ran at him in his powerful wrath. '
  '7':
  - type: text
    content: 'I saw him come close to the ram, '
  - type: note
    content: ch. 11:11
  - type: text
    content: 'and he was enraged against him and struck the ram and broke his two horns. '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'And the ram had no power to stand before him, but he '
  - type: note
    content: '[Ps. 7:5]'
  - type: text
    content: 'cast him down to the ground and trampled on him. And there was no one who could rescue the ram from his power. '
  '8':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the goat '
  - type: note
    content: ver. 4
  - type: text
    content: 'became exceedingly great, but when he was strong, the great horn was broken, and instead of it there came up four '
  - type: note
    content: '[ver. 5]; See ch. 7:2, 3'
  - type: text
    content: 'conspicuous horns toward '
  - type: note
    content: '[ver. 5]; See ch. 7:2, 3'
  - type: text
    content: the four winds of heaven.
  '9':
  - type: text
    content: 'Out of one of them came '
  - type: note
    content: ch. 7:8
  - type: text
    content: 'a little horn, which grew exceedingly great toward '
  - type: note
    content: '[ch. 11:25]'
  - type: text
    content: 'the south, toward the east, and toward '
  - type: note
    content: ch. 11:16, 41; [Ps. 48:2; Ezek. 20:6, 15]
  - type: text
    content: 'the glorious land. '
