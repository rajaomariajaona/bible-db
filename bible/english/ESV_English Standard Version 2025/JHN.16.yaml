document_id: JHN.16,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: “I have said all these things to you to keep you from falling away.
  - type: text
    content: ' '
  '10':
  - type: note
    content: '[Acts 17:31]'
  - type: text
    content: 'concerning righteousness, '
  - type: note
    content: ver. 16, 17, 19
  - type: text
    content: because I go to the Father, and you will see me no longer;
  - type: text
    content: ' '
  '11':
  - type: note
    content: See ch. 12:31
  - type: text
    content: 'concerning judgment, because the ruler of this world '
  - type: note
    content: '[Col. 2:15; Heb. 2:14]'
  - type: text
    content: is judged.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “I still have many things to say to you, but you cannot bear them now.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'When '
  - type: note
    content: See ch. 14:17
  - type: text
    content: 'the Spirit of truth comes, '
  - type: note
    content: See ch. 14:26
  - type: text
    content: 'he will '
  - type: note
    content: Acts 8:31; [ch. 1:17; 14:6; Ps. 25:5]
  - type: text
    content: 'guide you into all the truth, for he will not speak on his own authority, but '
  - type: note
    content: '[ch. 15:15]'
  - type: text
    content: whatever he hears he will speak, and he will declare to you the things that are to come.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'He will '
  - type: note
    content: See ch. 7:39
  - type: text
    content: glorify me, for he will take what is mine and declare it to you.
  - type: text
    content: ' '
  '15':
  - type: note
    content: ch. 17:10
  - type: text
    content: 'All that the Father has is mine; '
  - type: note
    content: ver. 14
  - type: text
    content: therefore I said that he will take what is mine and declare it to you.
  - type: heading
    content: Your Sorrow Will Turn into Joy
  '16':
  - type: text
    content: ' '
  - type: note
    content: See ch. 7:33
  - type: text
    content: '“A little while, and you will see me no longer; and '
  - type: note
    content: '[ver. 22 ]'
  - type: text
    content: again a little while, and you will see me.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So '
  - type: note
    content: '[Mark 9:10, 32]'
  - type: text
    content: 'some of his disciples said to one another, “What is this that he says to us, '
  - type: note
    content: ver. 16
  - type: text
    content: ‘A little while, and you will not see me, and again a little while, and you will see me’;
  - type: text
    content: ' and, '
  - type: note
    content: ver. 10
  - type: text
    content: ‘because I am going to the Father’
  - type: text
    content: '?” '
  '18':
  - type: text
    content: 'So they were saying, “What does he mean by '
  - type: text
    content: ‘a little while’
  - type: text
    content: '? '
  - type: note
    content: '[ch. 14:5]'
  - type: text
    content: 'We do not know what he is talking about.” '
  '19':
  - type: note
    content: '[ver. 30]; See ch. 2:24, 25'
  - type: text
    content: 'Jesus knew that they wanted to ask him, so he said to them, '
  - type: text
    content: “Is this what you are asking yourselves, what I meant by saying, ‘A little while and you will not see me, and again a little while and you will see me’?
  - type: text
    content: ' '
  '2':
  - type: note
    content: ch. 9:22; 12:42
  - type: text
    content: 'They will put you out of the synagogues. Indeed, '
  - type: note
    content: See ch. 4:21
  - type: text
    content: 'the hour is coming when '
  - type: note
    content: Acts 8:1; 9:1; 26:9-11
  - type: text
    content: whoever kills you will think he is offering service to God.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: Matt. 9:15; Mark 16:10; Luke 23:27
  - type: text
    content: 'you will weep and lament, but '
  - type: note
    content: '[Rev. 11:10]'
  - type: text
    content: 'the world will rejoice. You will be sorrowful, but '
  - type: note
    content: Jer. 31:13; See Matt. 5:4
  - type: text
    content: your sorrow will turn into joy.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Isa. 26:17; [Ps. 48:6; Isa. 13:8; 1 Thess. 5:3; Rev. 12:2]
  - type: text
    content: When a woman is giving birth, she has sorrow because her hour has come, but when she has delivered the baby, she no longer remembers the anguish, for joy that a human being has been born into the world.
  - type: text
    content: ' '
  '22':
  - type: note
    content: ver. 6; [2 Cor. 6:10]
  - type: text
    content: 'So also you have sorrow now, but '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'I will see you again, and '
  - type: note
    content: Ps. 33:21; Isa. 66:14; Luke 24:52; Acts 2:46; 8:8, 39; 13:52
  - type: text
    content: your hearts will rejoice, and no one will take your joy from you.
  - type: text
    content: ' '
  '23':
  - type: note
    content: ver. 26; ch. 14:20
  - type: text
    content: 'In that day you will '
  - type: note
    content: ver. 19, 30
  - type: text
    content: 'ask nothing of me. Truly, truly, I say to you, '
  - type: note
    content: See ch. 14:13
  - type: text
    content: 'whatever you ask of the Father in my name, '
  - type: note
    content: ch. 15:16; [Eph. 1:3]
  - type: text
    content: he will give it to you.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Until now you have asked nothing in my name. '
  - type: note
    content: See Matt. 7:7
  - type: text
    content: 'Ask, and you will receive, '
  - type: note
    content: See ch. 15:11
  - type: text
    content: that your joy may be full.
  - type: heading
    content: I Have Overcome the World
  '25':
  - type: text
    content: ' '
  - type: text
    content: '“I have said these things to you in figures of speech. '
  - type: note
    content: ver. 2
  - type: text
    content: The hour is coming when I will no longer speak to you in figures of speech but will tell you plainly about the Father.
  - type: text
    content: ' '
  '26':
  - type: text
    content: In that day you will ask in my name, and I do not say to you that I will ask the Father on your behalf;
  - type: text
    content: ' '
  '27':
  - type: note
    content: '[ch. 14:21, 23; 17:23]'
  - type: text
    content: 'for the Father himself loves you, because '
  - type: note
    content: ch. 21:15-17; [1 Cor. 16:22]
  - type: text
    content: 'you have loved me and '
  - type: note
    content: ver. 30; ch. 17:8
  - type: text
    content: have believed that I came from God.
  - type: note
    content: Some manuscripts from the Father
  - type: text
    content: ' '
  '28':
  - type: note
    content: ch. 8:14; 13:3
  - type: text
    content: 'I came from the Father and have come into the world, and now '
  - type: note
    content: See ch. 14:12
  - type: text
    content: I am leaving the world and going to the Father.”
  '29':
  - type: text
    content: 'His disciples said, “Ah, now you are speaking plainly and not '
  - type: note
    content: ver. 25
  - type: text
    content: 'using figurative speech! '
  '3':
  - type: text
    content: 'And they will do these things '
  - type: note
    content: ch. 8:19, 55; 15:21; 17:25
  - type: text
    content: because they have not known the Father, nor me.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Now we know that '
  - type: note
    content: ch. 21:17; See ch. 2:24, 25
  - type: text
    content: 'you know all things and do not need anyone to question you; this is why we believe that '
  - type: note
    content: '[ver. 27, 28; ch. 3:2]'
  - type: text
    content: 'you came from God.” '
  '31':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Do you now believe?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[ch. 4:21, 23]'
  - type: text
    content: 'the hour is coming, indeed it has come, when '
  - type: note
    content: Matt. 26:31; Mark 14:27
  - type: text
    content: 'you will be scattered, each to his own home, and '
  - type: note
    content: '[Isa. 63:5]'
  - type: text
    content: 'will leave me alone. '
  - type: note
    content: See ch. 8:16, 29
  - type: text
    content: Yet I am not alone, for the Father is with me.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'I have said these things to you, that '
  - type: note
    content: See ch. 14:27; Col. 3:15
  - type: text
    content: 'in me you may have peace. '
  - type: note
    content: '[ch. 15:18-21]'
  - type: text
    content: 'In the world you will have '
  - type: note
    content: Rev. 1:9; See Acts 14:22
  - type: text
    content: 'tribulation. But '
  - type: note
    content: ch. 14:1, 27
  - type: text
    content: 'take heart; '
  - type: note
    content: '[Rom. 8:37; 1 John 4:4; 5:4, 5; Rev. 3:21; 12:11]'
  - type: text
    content: I have overcome the world.”
  '4':
  - type: text
    content: 'But '
  - type: note
    content: ch. 13:19; 14:29
  - type: text
    content: 'I have said these things to you, that when '
  - type: note
    content: See Luke 22:53
  - type: text
    content: their hour comes you may remember that I told them to you.
  - type: heading
    content: The Work of the Holy Spirit
  - type: text
    content: '“I did not say these things to you from the beginning, '
  - type: note
    content: '[ Matt. 9:15 ]'
  - type: text
    content: because I was with you.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But now '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'I am going to him who sent me, and '
  - type: note
    content: '[ch. 13:36; 14:5]'
  - type: text
    content: none of you asks me, ‘Where are you going?’
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But because I have said these things to you, '
  - type: note
    content: ver. 22; ch. 14:1
  - type: text
    content: sorrow has filled your heart.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Nevertheless, I tell you the truth: it is to your advantage that I go away, for '
  - type: note
    content: ch. 7:39
  - type: text
    content: 'if I do not go away, '
  - type: note
    content: ch. 15:26; [ch. 14:16]
  - type: text
    content: 'the Helper will not come to you. But '
  - type: note
    content: '[Acts 2:33]'
  - type: text
    content: 'if '
  - type: note
    content: ch. 14:2
  - type: text
    content: 'I go, '
  - type: note
    content: See ch. 14:26
  - type: text
    content: I will send him to you.
  - type: text
    content: ' '
  '8':
  - type: note
    content: '[ch. 8:28]'
  - type: text
    content: 'And when he comes, he will '
  - type: note
    content: '[ch. 8:46]'
  - type: text
    content: 'convict the world concerning sin and righteousness and judgment:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'concerning sin, '
  - type: note
    content: ch. 8:24; [Acts 2:36, 37; 1 Cor. 12:3]
  - type: text
    content: because they do not believe in me;
  - type: text
    content: ' '
