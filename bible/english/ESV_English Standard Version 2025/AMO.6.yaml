document_id: AMO.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to Those at Ease in Zion
  - type: text
    content: ' '
  - type: note
    content: Isa. 32:9; Zeph. 1:12; Luke 6:24; James 5:1
  - type: text
    content: “Woe to those who are at ease in Zion,
  - type: text
    content: 'and to those who feel secure on '
  - type: note
    content: ch. 3:9; 4:1
  - type: text
    content: the mountain of Samaria,
  - type: note
    content: '[ Ezek. 22:6 ]'
  - type: text
    content: 'the notable men of '
  - type: note
    content: See Ex. 19:5
  - type: text
    content: the first of the nations,
  - type: text
    content: to whom the house of Israel comes!
  '10':
  - type: text
    content: 'And when one’s relative, '
  - type: note
    content: See 1 Sam. 31:12
  - type: text
    content: 'the one who anoints him for burial, shall take him up to bring the bones out of the house, and shall say to him who is in the innermost parts of the house, “Is there still anyone with you?” he shall say, “No”; and he shall say, '
  - type: note
    content: '[ch. 5:13; 8:3]'
  - type: text
    content: '“Silence! We must not mention the name of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '11':
  - type: text
    content: 'For behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' commands,'
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 3:15]'
  - type: text
    content: the great house shall be struck down into fragments,
  - type: text
    content: and the little house into bits.
  '12':
  - type: text
    content: Do horses run on rocks?
  - type: text
    content: Does one plow there
  - type: note
    content: Or the sea
  - type: text
    content: ' with oxen?'
  - type: note
    content: '[ch. 5:7 ]'
  - type: text
    content: 'But you have turned justice into '
  - type: note
    content: Deut. 29:18
  - type: text
    content: poison
  - type: note
    content: '[ch. 5:7 ]'
  - type: text
    content: and the fruit of righteousness into wormwood
  - type: note
    content: Or into bitter fruit
  - type: text
    content: —
  '13':
  - type: text
    content: you who rejoice in Lo-debar,
  - type: note
    content: Lo-debar means nothing
  - type: text
    content: 'who say, '
  - type: note
    content: '[1 Kgs. 22:11; Mic. 4:13]'
  - type: text
    content: “Have we not by our own strength
  - type: text
    content: captured Karnaim
  - type: note
    content: Karnaim means horns (a symbol of strength)
  - type: text
    content: ' for ourselves?”'
  '14':
  - type: text
    content: '“For behold, '
  - type: note
    content: '[Jer. 5:15]'
  - type: text
    content: I will raise up against you a nation,
  - type: text
    content: 'O house of Israel,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts;'
  - type: text
    content: '“and they shall oppress you from '
  - type: note
    content: 2 Kgs. 14:25
  - type: text
    content: Lebo-hamath
  - type: text
    content: 'to the Brook of '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: the Arabah.”
  '2':
  - type: text
    content: 'Pass over to '
  - type: note
    content: Gen. 10:10; Isa. 10:9
  - type: text
    content: Calneh, and see,
  - type: text
    content: 'and from there go to '
  - type: note
    content: 1 Kgs. 8:65; 2 Kgs. 18:34; Isa. 10:9
  - type: text
    content: Hamath the great;
  - type: text
    content: 'then go down to '
  - type: note
    content: See 1 Sam. 17:4
  - type: text
    content: Gath of the Philistines.
  - type: note
    content: '[ Nah. 3:8 ]'
  - type: text
    content: Are you better than these kingdoms?
  - type: text
    content: Or is their territory greater than your territory,
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:10; Ezek. 12:27 ]'
  - type: text
    content: O you who put far away the day of disaster
  - type: note
    content: See ch. 3:10
  - type: text
    content: and bring near the seat of violence?
  '4':
  - type: text
    content: '“Woe to those '
  - type: note
    content: '[ch. 3:12]'
  - type: text
    content: 'who lie on '
  - type: note
    content: '[Esth. 1:6]'
  - type: text
    content: beds of ivory
  - type: note
    content: '[ch. 3:12 ]'
  - type: text
    content: and stretch themselves out on their couches,
  - type: text
    content: and eat lambs from the flock
  - type: note
    content: '[ James 5:5 ]'
  - type: text
    content: and calves from the midst of the stall,
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 5:23
  - type: text
    content: who sing idle songs to the sound of the harp
  - type: text
    content: 'and like David '
  - type: note
    content: See ch. 5:23
  - type: text
    content: invent for themselves instruments of music,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 5:12 ]'
  - type: text
    content: who drink wine in bowls
  - type: text
    content: 'and '
  - type: note
    content: '[Dan. 10:3]'
  - type: text
    content: anoint themselves with the finest oils,
  - type: text
    content: but are not grieved over the ruin of Joseph!
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:11, 17
  - type: text
    content: Therefore they shall now be the first of those who go into exile,
  - type: text
    content: and the revelry of those who stretch themselves out shall pass away.”
  '8':
  - type: text
    content: ' '
  - type: note
    content: Jer. 22:5; 51:14
  - type: text
    content: 'The Lord '
  - type: text
    content: God
  - type: text
    content: ' has sworn by himself, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts:'
  - type: text
    content: '“I abhor '
  - type: note
    content: ch. 8:7; [Ps. 47:4]
  - type: text
    content: the pride of Jacob
  - type: text
    content: and hate his strongholds,
  - type: note
    content: '[ Jer. 17:3 ]'
  - type: text
    content: and I will deliver up the city and all that is in it.”
  '9':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 5:3]'
  - type: text
    content: 'if ten men remain in one house, they shall die. '
