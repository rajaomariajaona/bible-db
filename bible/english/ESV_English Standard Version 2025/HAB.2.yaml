document_id: HAB.2,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'I will '
  - type: note
    content: Isa. 21:8
  - type: text
    content: take my stand at my watchpost
  - type: text
    content: and station myself on the tower,
  - type: text
    content: 'and '
  - type: note
    content: Jer. 6:17; Ezek. 33:2
  - type: text
    content: 'look out to see '
  - type: note
    content: Ps. 85:8
  - type: text
    content: what he will say to me,
  - type: text
    content: and what I will answer concerning my complaint.
  - type: heading
    content: The Righteous Shall Live by His Faith
  '10':
  - type: text
    content: You have devised shame for your house
  - type: note
    content: '[ch. 1:17 ]'
  - type: text
    content: by cutting off many peoples;
  - type: text
    content: you have forfeited your life.
  '11':
  - type: text
    content: 'For '
  - type: note
    content: '[Luke 19:40]'
  - type: text
    content: the stone will cry out from the wall,
  - type: text
    content: and the beam from the woodwork respond.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: '“Woe to him '
  - type: note
    content: See Mic. 3:10
  - type: text
    content: who builds a town with blood
  - type: text
    content: and founds a city on iniquity!
  '13':
  - type: text
    content: 'Behold, is it not from the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: 'that '
  - type: note
    content: Jer. 51:58
  - type: text
    content: peoples labor merely for fire,
  - type: text
    content: and nations weary themselves for nothing?
  '14':
  - type: text
    content: ' '
  - type: note
    content: Isa. 11:9
  - type: text
    content: For the earth will be filled
  - type: text
    content: 'with the knowledge of '
  - type: note
    content: Ps. 72:19
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: as the waters cover the sea.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: '“Woe to him '
  - type: note
    content: '[ver. 5; Jer. 51:7]'
  - type: text
    content: who makes his neighbors drink—
  - type: text
    content: you pour out your wrath and make them drunk,
  - type: text
    content: 'in order to gaze '
  - type: note
    content: Lam. 4:21; [Gen. 9:22]
  - type: text
    content: at their nakedness!
  '16':
  - type: text
    content: 'You will have your fill '
  - type: note
    content: Nah. 3:5
  - type: text
    content: of shame instead of glory.
  - type: note
    content: Jer. 25:15, 26
  - type: text
    content: Drink, yourself, and show your uncircumcision!
  - type: note
    content: Jer. 25:15, 26
  - type: text
    content: 'The cup in the '
  - type: text
    content: Lord
  - type: text
    content: ’s right hand
  - type: text
    content: will come around to you,
  - type: text
    content: 'and '
  - type: note
    content: '[Nah. 3:6]'
  - type: text
    content: utter shame will come upon your glory!
  '17':
  - type: text
    content: ' '
  - type: note
    content: ver. 8
  - type: text
    content: 'The violence '
  - type: note
    content: '[Isa. 14:8; Jer. 22:23]'
  - type: text
    content: done to Lebanon will overwhelm you,
  - type: text
    content: as will the destruction of the beasts that terrified them,
  - type: note
    content: ver. 8
  - type: text
    content: for the blood of man and violence to the earth,
  - type: text
    content: to cities and all who dwell in them.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Isa. 44:10
  - type: text
    content: “What profit is an idol
  - type: text
    content: when its maker has shaped it,
  - type: text
    content: 'a metal image, '
  - type: note
    content: Jer. 10:8, 14; Zech. 10:2
  - type: text
    content: a teacher of lies?
  - type: text
    content: For its maker trusts in his own creation
  - type: text
    content: 'when he makes '
  - type: note
    content: Ps. 115:5; 1 Cor. 12:2
  - type: text
    content: speechless idols!
  '19':
  - type: text
    content: ' '
  - type: note
    content: ver. 6, 9, 12, 15
  - type: text
    content: 'Woe to him '
  - type: note
    content: See 1 Kgs. 18:26, 27
  - type: text
    content: who says to a wooden thing, Awake;
  - type: text
    content: to a silent stone, Arise!
  - type: text
    content: Can this teach?
  - type: text
    content: Behold, it is overlaid with gold and silver,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 135:17; Jer. 10:14
  - type: text
    content: there is no breath at all in it.
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' answered me:'
  - type: note
    content: Isa. 8:1; 30:8; [ Rev. 1:19 ]
  - type: text
    content: “Write the vision;
  - type: text
    content: make it plain on tablets,
  - type: text
    content: so he may run who reads it.
  '20':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 11:4; Mic. 1:2
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is in his holy temple;'
  - type: note
    content: '[ Zeph. 1:7; Zech. 2:13 ]'
  - type: text
    content: let all the earth keep silence before him.”
  '3':
  - type: text
    content: 'For still '
  - type: note
    content: '[Dan. 10:14]; See Ezek. 7:5-7'
  - type: text
    content: the vision awaits its appointed time;
  - type: text
    content: it hastens to the end—it will not lie.
  - type: text
    content: 'If it seems slow, '
  - type: note
    content: Zeph. 3:8; See Isa. 8:17
  - type: text
    content: wait for it;
  - type: note
    content: Cited Heb. 10:37; [ 2 Pet. 3:9 ]
  - type: text
    content: it will surely come; it will not delay.
  '4':
  - type: text
    content: “Behold, his soul is puffed up; it is not upright within him,
  - type: text
    content: 'but '
  - type: note
    content: Cited Rom. 1:17; Gal. 3:11; Heb. 10:38; [John 3:36]
  - type: text
    content: the righteous shall live by his faith.
  - type: note
    content: Or faithfulness
  '5':
  - type: text
    content: “Moreover, wine
  - type: note
    content: Masoretic Text; Dead Sea Scroll wealth
  - type: text
    content: ' is '
  - type: note
    content: ch. 1:13; Isa. 21:2
  - type: text
    content: a traitor,
  - type: text
    content: an arrogant man who is never at rest.
  - type: note
    content: The meaning of the Hebrew of these two lines is uncertain
  - type: text
    content: His greed is as wide as Sheol;
  - type: text
    content: 'like death '
  - type: note
    content: '[Prov. 27:20]'
  - type: text
    content: he has never enough.
  - type: note
    content: Jer. 27:7; [ch. 1:6; Dan. 2:37, 38 ]
  - type: text
    content: He gathers for himself all nations
  - type: text
    content: and collects as his own all peoples.”
  - type: heading
    content: Woe to the Chaldeans
  '6':
  - type: text
    content: 'Shall not all these '
  - type: note
    content: Mic. 2:4; See Num. 23:7
  - type: text
    content: take up their taunt against him, with scoffing and riddles for him, and say,
  - type: note
    content: ver. 19 ; Isa. 5:8
  - type: text
    content: '“Woe to him '
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: who heaps up what is not his own—
  - type: text
    content: 'for '
  - type: note
    content: See Zech. 1:12
  - type: text
    content: how long?—
  - type: text
    content: 'and '
  - type: note
    content: '[Ezek. 18:7]'
  - type: text
    content: loads himself with pledges!”
  '7':
  - type: text
    content: ' '
  - type: note
    content: See Isa. 21:5-9
  - type: text
    content: Will not your debtors suddenly arise,
  - type: text
    content: and those awake who will make you tremble?
  - type: text
    content: Then you will be spoil for them.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 33:1 ]'
  - type: text
    content: Because you have plundered many nations,
  - type: text
    content: all the remnant of the peoples shall plunder you,
  - type: note
    content: ver. 17
  - type: text
    content: 'for the blood of man and '
  - type: note
    content: '[Isa. 33:1]'
  - type: text
    content: violence to the earth,
  - type: text
    content: to cities and all who dwell in them.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: “Woe to him who gets evil gain for his house,
  - type: note
    content: '[ Isa. 14:13 ]'
  - type: text
    content: 'to '
  - type: note
    content: Jer. 49:16; [Num. 24:21]
  - type: text
    content: set his nest on high,
  - type: text
    content: to be safe from the reach of harm!
