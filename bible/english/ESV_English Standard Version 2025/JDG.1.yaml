document_id: JDG.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Continuing Conquest of Canaan
  - type: text
    content: 'After the death of Joshua, the people of Israel '
  - type: note
    content: Num. 27:21; 1 Sam. 22:10; 2 Sam. 2:1
  - type: text
    content: 'inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 20:18
  - type: text
    content: '“Who shall go up first for us against the Canaanites, to fight against them?” '
  '10':
  - type: note
    content: For ver. 10-15, see Josh. 15:13-19
  - type: text
    content: 'And Judah went against the Canaanites who lived in Hebron '
  - type: note
    content: Josh. 14:15; 15:13
  - type: text
    content: '(now the name of Hebron was formerly Kiriath-arba), and they defeated '
  - type: note
    content: Num. 13:22; Josh. 15:14
  - type: text
    content: Sheshai and Ahiman and Talmai.
  '11':
  - type: text
    content: 'From there they went against the inhabitants of Debir. The name of Debir was formerly Kiriath-sepher. '
  '12':
  - type: text
    content: 'And Caleb said, “He who attacks Kiriath-sepher and captures it, I will give him Achsah my daughter as wife.” '
  '13':
  - type: text
    content: 'And Othniel the son of Kenaz, '
  - type: note
    content: ch. 3:9
  - type: text
    content: 'Caleb’s younger brother, captured it. And he gave him Achsah his daughter as wife. '
  '14':
  - type: text
    content: 'When she came to him, she urged him to ask her father for a field. And she dismounted from her donkey, and Caleb said to her, “What do you want?” '
  '15':
  - type: text
    content: She said to him, “Give me a blessing. Since you have given me the land of the Negeb, give me also springs of water.” And Caleb gave her the upper springs and the lower springs.
  '16':
  - type: text
    content: 'And the descendants of the '
  - type: note
    content: ch. 4:11, 17; 1 Sam. 15:6
  - type: text
    content: 'Kenite, Moses’ father-in-law, went up with the people of Judah '
  - type: note
    content: Deut. 34:3
  - type: text
    content: 'from the city of palms into the wilderness of Judah, which lies in the Negeb near '
  - type: note
    content: Num. 21:1
  - type: text
    content: 'Arad, '
  - type: note
    content: See Num. 10:29-32
  - type: text
    content: 'and they went and settled with the people. '
  '17':
  - type: note
    content: ver. 3
  - type: text
    content: 'And Judah went with Simeon his brother, and they defeated the Canaanites who inhabited Zephath and devoted it to destruction. So the name of the city was called '
  - type: note
    content: Num. 21:3
  - type: text
    content: Hormah.
  - type: note
    content: Hormah means utter destruction
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Judah also '
  - type: note
    content: '[ch. 3:3; Josh. 11:22]'
  - type: text
    content: 'captured Gaza with its territory, and Ashkelon with its territory, and Ekron with its territory. '
  '19':
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Judah, and he took possession of the '
  - type: note
    content: See ver. 9
  - type: text
    content: 'hill country, but he could not drive out the inhabitants of the plain because they had '
  - type: note
    content: Josh. 17:16, 18
  - type: text
    content: 'chariots of iron. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Judah shall go up; behold, I have given the land into his hand.” '
  '20':
  - type: note
    content: Num. 14:24; Deut. 1:36; Josh. 14:9, 13; 15:13, 14
  - type: text
    content: 'And Hebron was given to Caleb, as Moses had said. And he drove out from it '
  - type: note
    content: ver. 10
  - type: text
    content: 'the three sons of Anak. '
  '21':
  - type: text
    content: 'But the people of Benjamin did not drive out the Jebusites who lived in Jerusalem, '
  - type: note
    content: '[Josh. 15:63]'
  - type: text
    content: so the Jebusites have lived with the people of Benjamin in Jerusalem to this day.
  '22':
  - type: text
    content: 'The house of Joseph also went up against Bethel, '
  - type: note
    content: ver. 19
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' was with them. '
  '23':
  - type: text
    content: And the house of Joseph scouted out Bethel. (
  - type: note
    content: Gen. 28:19; 35:6; 48:3; Josh. 18:13
  - type: text
    content: 'Now the name of the city was formerly Luz.) '
  '24':
  - type: text
    content: 'And the spies saw a man coming out of the city, and they said to him, “Please show us the way into the city, '
  - type: note
    content: Josh. 2:12, 14
  - type: text
    content: 'and we will deal kindly with you.” '
  '25':
  - type: text
    content: 'And he showed them the way into the city. And they struck the city with the edge of the sword, but they let the man and all his family go. '
  '26':
  - type: text
    content: 'And the man went to '
  - type: note
    content: Josh. 1:4
  - type: text
    content: the land of the Hittites and built a city and called its name Luz. That is its name to this day.
  - type: heading
    content: Failure to Complete the Conquest
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27, 28, see Josh. 17:11-13
  - type: text
    content: 'Manasseh did not drive out the inhabitants of Beth-shean and its villages, or Taanach and its villages, or the inhabitants of Dor and its villages, or the inhabitants of Ibleam and its villages, or the inhabitants of Megiddo and its villages, for the Canaanites persisted in dwelling in that land. '
  '28':
  - type: text
    content: When Israel grew strong, they put the Canaanites to forced labor, but did not drive them out completely.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Josh. 16:10; 1 Kgs. 9:16
  - type: text
    content: And Ephraim did not drive out the Canaanites who lived in Gezer, so the Canaanites lived in Gezer among them.
  '3':
  - type: text
    content: 'And Judah said to Simeon his brother, “Come up with me into the territory allotted to me, that we may fight against the Canaanites. '
  - type: note
    content: ver. 17
  - type: text
    content: 'And I likewise will go with you into the territory allotted to you.” So Simeon went with him. '
  '30':
  - type: text
    content: 'Zebulun did not drive out the inhabitants of Kitron, or the inhabitants of '
  - type: note
    content: '[Josh. 19:15; 21:35]'
  - type: text
    content: Nahalol, so the Canaanites lived among them, but became subject to forced labor.
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31, 32, see Josh. 19:24-30
  - type: text
    content: 'Asher did not drive out the inhabitants of Acco, or the inhabitants of Sidon or of Ahlab or of Achzib or of Helbah or of Aphik or of Rehob, '
  '32':
  - type: text
    content: so the Asherites lived among the Canaanites, the inhabitants of the land, for they did not drive them out.
  '33':
  - type: text
    content: 'Naphtali did not drive out the inhabitants of '
  - type: note
    content: For ver. 33, see Josh. 19:32-39
  - type: text
    content: Beth-shemesh, or the inhabitants of Beth-anath, so they lived among the Canaanites, the inhabitants of the land. Nevertheless, the inhabitants of Beth-shemesh and of Beth-anath became subject to forced labor for them.
  '34':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 19:47, 48 ]'
  - type: text
    content: 'The Amorites pressed the people of Dan back into the hill country, for they did not allow them to come down to the plain. '
  '35':
  - type: text
    content: 'The Amorites persisted in dwelling in Mount Heres, '
  - type: note
    content: Josh. 19:42
  - type: text
    content: 'in Aijalon, and in Shaalbim, but the hand of the house of Joseph rested heavily on them, and they became subject to forced labor. '
  '36':
  - type: text
    content: 'And the border of the Amorites ran from '
  - type: note
    content: Num. 34:4; Josh. 15:3
  - type: text
    content: the ascent of Akrabbim, from Sela and upward.
  '4':
  - type: text
    content: 'Then Judah went up and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the Canaanites and the Perizzites into their hand, and they defeated 10,000 of them at Bezek. '
  '5':
  - type: text
    content: 'They found Adoni-bezek at Bezek and fought against him and defeated the Canaanites and the Perizzites. '
  '6':
  - type: text
    content: 'Adoni-bezek fled, but they pursued him and caught him and cut off his thumbs and his big toes. '
  '7':
  - type: text
    content: 'And Adoni-bezek said, “Seventy kings with their thumbs and their big toes cut off '
  - type: note
    content: '[Luke 16:21]'
  - type: text
    content: 'used to pick up scraps under my table. '
  - type: note
    content: '[Lev. 24:19; 1 Sam. 15:33]'
  - type: text
    content: As I have done, so God has repaid me.” And they brought him to Jerusalem, and he died there.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 15:63 ]'
  - type: text
    content: 'And the men of Judah fought against Jerusalem and captured it and struck it with the edge of the sword and set the city on fire. '
  '9':
  - type: text
    content: 'And afterward the men of Judah went down to fight against the Canaanites who lived in '
  - type: note
    content: Josh. 9:1; 11:2, 16; 12:8
  - type: text
    content: 'the hill country, in the Negeb, and in '
  - type: note
    content: Josh. 9:1; 11:2, 16; 12:8
  - type: text
    content: 'the lowland. '
