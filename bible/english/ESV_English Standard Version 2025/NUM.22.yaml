document_id: NUM.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Balak Summons Balaam
  - type: text
    content: 'Then '
  - type: note
    content: ch. 26:3, 63; 31:12; 33:48, 50; 35:1; 36:13
  - type: text
    content: 'the people of Israel set out and camped in the plains of Moab beyond the Jordan at Jericho. '
  '10':
  - type: text
    content: 'And Balaam said to God, “Balak the son of Zippor, king of Moab, has sent to me, saying, '
  '11':
  - type: text
    content: '‘Behold, a people has come out of Egypt, and it covers the face of the earth. Now come, curse them for me. Perhaps I shall be able to fight against them and drive them out.’” '
  '12':
  - type: text
    content: 'God said to Balaam, “You shall not go with them. You shall not curse the people, for '
  - type: note
    content: See ch. 23:20
  - type: text
    content: 'they are blessed.” '
  '13':
  - type: text
    content: 'So Balaam rose in the morning and said to the princes of Balak, “Go to your own land, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has refused to let me go with you.” '
  '14':
  - type: text
    content: So the princes of Moab rose and went to Balak and said, “Balaam refuses to come with us.”
  '15':
  - type: text
    content: 'Once again Balak sent princes, more in number and more honorable than these. '
  '16':
  - type: text
    content: 'And they came to Balaam and said to him, “Thus says Balak the son of Zippor: ‘Let nothing hinder you from coming to me, '
  '17':
  - type: note
    content: ver. 37; ch. 24:11
  - type: text
    content: 'for I will surely do you great honor, and whatever you say to me I will do. '
  - type: note
    content: ver. 11
  - type: text
    content: 'Come, curse this people for me.’” '
  '18':
  - type: text
    content: 'But Balaam answered and said to the servants of Balak, '
  - type: note
    content: ch. 24:13
  - type: text
    content: '“Though Balak were to give me his house full of silver and gold, '
  - type: note
    content: ver. 38; ch. 23:26; [1 Kgs. 22:14; 2 Chr. 18:13]
  - type: text
    content: 'I could not go beyond the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God to do less or more. '
  '19':
  - type: text
    content: 'So you, too, '
  - type: note
    content: ver. 8
  - type: text
    content: 'please stay here tonight, that I may know what more the '
  - type: text
    content: Lord
  - type: text
    content: ' will say to me.” '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Judg. 11:25
  - type: text
    content: 'Balak the son of Zippor saw all that Israel had done to the Amorites. '
  '20':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'And God came to Balaam at night and said to him, “If the men have come to call you, rise, go with them; '
  - type: note
    content: ver. 35; ch. 23:12, 26; 24:13
  - type: text
    content: 'but only do what I tell you.” '
  '21':
  - type: text
    content: So Balaam rose in the morning and saddled his donkey and went with the princes of Moab.
  - type: heading
    content: Balaam’s Donkey and the Angel
  '22':
  - type: text
    content: 'But God’s anger was kindled because he went, '
  - type: note
    content: '[Ex. 4:24; 1 Chr. 21:16]'
  - type: text
    content: 'and the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' took his stand in the way '
  - type: note
    content: ver. 32
  - type: text
    content: 'as his adversary. Now he was riding on the donkey, and his two servants were with him. '
  '23':
  - type: text
    content: 'And the donkey saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing in the road, with a drawn sword in his hand. And the donkey turned aside out of the road and went into the field. And Balaam struck the donkey, to turn her into the road. '
  '24':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood in a narrow path between the vineyards, with a wall on either side. '
  '25':
  - type: text
    content: 'And when the donkey saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', she pushed against the wall and pressed Balaam’s foot against the wall. So he struck her again. '
  '26':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went ahead and stood in a narrow place, where there was no way to turn either to the right or to the left. '
  '27':
  - type: text
    content: 'When the donkey saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', she lay down under Balaam. And Balaam’s anger was kindled, and he struck the donkey with his staff. '
  '28':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 2 Pet. 2:16
  - type: text
    content: 'opened the mouth of the donkey, and she said to Balaam, “What have I done to you, that you have struck me these three times?” '
  '29':
  - type: text
    content: 'And Balaam said to the donkey, “Because you have made a fool of me. I wish I had a sword in my hand, for then I would kill you.” '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 15:15
  - type: text
    content: 'Moab was in great dread of the people, because they were many. Moab was overcome with fear of the people of Israel. '
  '30':
  - type: text
    content: And the donkey said to Balaam, “Am I not your donkey, on which you have ridden all your life long to this day? Is it my habit to treat you this way?” And he said, “No.”
  '31':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Gen. 21:19; 2 Kgs. 6:17; Luke 24:16, 31]'
  - type: text
    content: 'opened the eyes of Balaam, and he saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing in the way, with his drawn sword in his hand. And he bowed down and fell on his face. '
  '32':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Why have you struck your donkey these three times? Behold, I have come out '
  - type: note
    content: ver. 22
  - type: text
    content: to oppose you because your way is perverse
  - type: note
    content: Or reckless
  - type: text
    content: ' before me. '
  '33':
  - type: text
    content: 'The donkey saw me and turned aside before me these three times. If she had not turned aside from me, surely just now I would have killed you and let her live.” '
  '34':
  - type: text
    content: 'Then Balaam said to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[1 Sam. 15:24; 26:21; 2 Sam. 12:13; Job 34:31, 32]'
  - type: text
    content: '“I have sinned, for I did not know that you stood in the road against me. Now therefore, if it is evil in your sight, I will turn back.” '
  '35':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Balaam, “Go with the men, '
  - type: note
    content: ver. 20
  - type: text
    content: but speak only the word that I tell you.” So Balaam went on with the princes of Balak.
  '36':
  - type: text
    content: 'When Balak heard that Balaam had come, he went out to meet him at the city of Moab, '
  - type: note
    content: ch. 21:13
  - type: text
    content: 'on the border formed by the Arnon, at the extremity of the border. '
  '37':
  - type: text
    content: 'And Balak said to Balaam, “Did I not send to you to call you? Why did you not come to me? Am I not able to '
  - type: note
    content: ver. 17; ch. 24:11
  - type: text
    content: 'honor you?” '
  '38':
  - type: text
    content: 'Balaam said to Balak, “Behold, I have come to you! Have I now any power of my own to speak anything? '
  - type: note
    content: ver. 18
  - type: text
    content: 'The word that God puts in my mouth, that must I speak.” '
  '39':
  - type: text
    content: 'Then Balaam went with Balak, and they came to Kiriath-huzoth. '
  '4':
  - type: text
    content: 'And Moab said to '
  - type: note
    content: ch. 31:8; Josh. 13:21
  - type: text
    content: 'the elders of Midian, “This horde will now lick up all that is around us, as the ox licks up the grass of the field.” So Balak the son of Zippor, who was king of Moab at that time, '
  '40':
  - type: text
    content: And Balak sacrificed oxen and sheep, and sent for Balaam and for the princes who were with him.
  '41':
  - type: text
    content: And in the morning Balak took Balaam and brought him up to Bamoth-baal, and from there he saw a fraction of the people.
  '5':
  - type: note
    content: Deut. 23:4; Josh. 24:9; Neh. 13:2; Mic. 6:5; 2 Pet. 2:15; Jude 11; Rev. 2:14
  - type: text
    content: 'sent messengers to Balaam the son of Beor '
  - type: note
    content: Deut. 23:4; [ch. 23:7]
  - type: text
    content: at Pethor, which is near the River
  - type: note
    content: That is, the Euphrates
  - type: text
    content: ' in the land of the people of Amaw,'
  - type: note
    content: Or the people of his kindred
  - type: text
    content: ' to call him, saying, “Behold, a people has come out of Egypt. They cover the face of the earth, and they are dwelling opposite me. '
  '6':
  - type: note
    content: ch. 23:7
  - type: text
    content: Come now, curse this people for me, since they are too mighty for me. Perhaps I shall be able to defeat them and drive them from the land, for I know that he whom you bless is blessed, and he whom you curse is cursed.”
  '7':
  - type: text
    content: 'So the elders of Moab and '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'the elders of Midian departed with '
  - type: note
    content: '[1 Sam. 9:7, 8; Mic. 3:11]'
  - type: text
    content: 'the fees for divination in their hand. And they came to Balaam and gave him Balak’s message. '
  '8':
  - type: text
    content: 'And he said to them, “Lodge here tonight, and I will bring back word to you, as the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks to me.” So the princes of Moab stayed with Balaam. '
  '9':
  - type: note
    content: '[Gen. 20:3; Job 33:15, 16]'
  - type: text
    content: 'And God came to Balaam and said, “Who are these men with you?” '
