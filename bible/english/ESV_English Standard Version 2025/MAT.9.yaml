document_id: MAT.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Paralytic
  - type: text
    content: 'And getting into a boat he crossed over and came to '
  - type: note
    content: ch. 4:13; [Mark 2:1]
  - type: text
    content: 'his own city. '
  '10':
  - type: text
    content: And as Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' reclined at table in the house, behold, many '
  - type: note
    content: ch. 11:19; See ch. 5:46
  - type: text
    content: 'tax collectors and sinners came and were reclining with Jesus and his disciples. '
  '11':
  - type: text
    content: 'And when the Pharisees saw this, they said to his disciples, '
  - type: note
    content: '[Luke 15:2]'
  - type: text
    content: '“Why does your teacher eat with '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'tax collectors and sinners?” '
  '12':
  - type: text
    content: 'But when he heard it, he said, '
  - type: text
    content: “Those who are well have no need of a physician, but those who are sick.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Go and learn '
  - type: note
    content: ch. 12:7
  - type: text
    content: 'what this means: '
  - type: note
    content: Cited from Hos. 6:6; [ch. 23:23; Mark 12:33]
  - type: text
    content: '‘I desire mercy, and not sacrifice.’ For '
  - type: note
    content: '[Luke 15:7; John 9:39]'
  - type: text
    content: 'I came not to call the righteous, '
  - type: note
    content: 1 Tim. 1:15
  - type: text
    content: but sinners.”
  - type: heading
    content: A Question About Fasting
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 11:2; 14:12; Luke 11:1; John 1:35; 3:25; 4:1; [Acts 18:25; 19:3]
  - type: text
    content: 'the disciples of John came to him, saying, '
  - type: note
    content: '[ch. 15:2]'
  - type: text
    content: '“Why do we and '
  - type: note
    content: Luke 18:12
  - type: text
    content: the Pharisees fast,
  - type: note
    content: Some manuscripts add much, or often
  - type: text
    content: ' but your disciples do not fast?” '
  '15':
  - type: text
    content: 'And Jesus said to them, '
  - type: note
    content: John 3:29
  - type: text
    content: '“Can the wedding guests mourn as long as the bridegroom is with them? '
  - type: note
    content: See Luke 17:22
  - type: text
    content: 'The days will come when the bridegroom is taken away from them, and '
  - type: note
    content: '[John 16:20]'
  - type: text
    content: then they will fast.
  - type: text
    content: ' '
  '16':
  - type: text
    content: No one puts a piece of unshrunk cloth on an old garment, for the patch tears away from the garment, and a worse tear is made.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Neither is new wine put into old '
  - type: note
    content: Josh. 9:4
  - type: text
    content: wineskins. If it is, the skins burst and the wine is spilled and the skins are destroyed. But new wine is put into fresh wineskins, and so both are preserved.”
  - type: heading
    content: A Girl Restored to Life and a Woman Healed
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-26, see Mark 5:22-43; Luke 8:41-56
  - type: text
    content: 'While he was saying these things to them, behold, a ruler came in and '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'knelt before him, saying, “My daughter has just died, but come and lay your hand on her, and she will live.” '
  '19':
  - type: text
    content: 'And Jesus rose and followed him, with his disciples. '
  '2':
  - type: note
    content: For ver. 2-8, see Mark 2:3-12; Luke 5:18-26
  - type: text
    content: 'And behold, some people brought to him a paralytic, lying on a bed. And when Jesus '
  - type: note
    content: ver. 22, 29; ch. 8:10, 13; 15:28; Mark 10:52; Luke 7:9, 50; 17:19; 18:42; Acts 3:16; 14:9; James 5:15
  - type: text
    content: 'saw their faith, he said to the paralytic, '
  - type: note
    content: ver. 22
  - type: text
    content: '“Take heart, my son; '
  - type: note
    content: Luke 7:48; [John 5:14]
  - type: text
    content: your sins are forgiven.”
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And behold, a woman '
  - type: note
    content: Lev. 15:25
  - type: text
    content: 'who had suffered from a discharge of blood for twelve years came up behind him and touched '
  - type: note
    content: ch. 14:36; 23:5; [Num. 15:38, 39; Deut. 22:12]
  - type: text
    content: 'the fringe of his garment, '
  '21':
  - type: text
    content: 'for she said to herself, “If I only touch his garment, I will be made well.” '
  '22':
  - type: text
    content: 'Jesus turned, and seeing her he said, '
  - type: note
    content: ver. 2; See Luke 7:50
  - type: text
    content: “Take heart, daughter; your faith has made you well.”
  - type: text
    content: ' '
  - type: note
    content: ch. 15:28; 17:18; [ch. 8:13]
  - type: text
    content: And instantly
  - type: note
    content: Greek from that hour
  - type: text
    content: ' the woman was made well. '
  '23':
  - type: text
    content: 'And when Jesus came to the ruler’s house and saw '
  - type: note
    content: Rev. 18:22
  - type: text
    content: 'the flute players and the crowd making a commotion, '
  '24':
  - type: text
    content: 'he said, '
  - type: text
    content: '“Go away, for '
  - type: note
    content: '[Acts 20:10]'
  - type: text
    content: 'the girl is not dead but '
  - type: note
    content: John 11:4, 11
  - type: text
    content: sleeping.”
  - type: text
    content: ' And they laughed at him. '
  '25':
  - type: text
    content: 'But '
  - type: note
    content: Acts 9:40
  - type: text
    content: 'when the crowd had been put outside, he went in and '
  - type: note
    content: Mark 9:27; Acts 3:7; 9:41
  - type: text
    content: 'took her by the hand, and the girl arose. '
  '26':
  - type: text
    content: And the report of this went through all that district.
  - type: heading
    content: Jesus Heals Two Blind Men
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 20:30-34 ]'
  - type: text
    content: 'And as Jesus passed on from there, two blind men followed him, crying aloud, “Have mercy on us, '
  - type: note
    content: ch. 12:23; 15:22; 20:30, 31; 22:42; See ch. 1:1
  - type: text
    content: 'Son of David.” '
  '28':
  - type: text
    content: 'When he entered the house, the blind men came to him, and Jesus said to them, '
  - type: text
    content: “Do you believe that I am able to do this?”
  - type: text
    content: ' They said to him, “Yes, Lord.” '
  '29':
  - type: note
    content: Mark 8:25; John 9:6
  - type: text
    content: 'Then he touched their eyes, saying, '
  - type: note
    content: See ver. 2
  - type: text
    content: “According to your faith let it be done to you.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And behold, some of the scribes said to themselves, '
  - type: note
    content: ch. 26:65; John 10:36
  - type: text
    content: '“This man is blaspheming.” '
  '30':
  - type: text
    content: 'And their eyes were opened. And Jesus sternly warned them, '
  - type: note
    content: See ch. 8:4
  - type: text
    content: “See that no one knows about it.”
  - type: text
    content: ' '
  '31':
  - type: note
    content: Mark 1:45; 7:36
  - type: text
    content: But they went away and spread his fame through all that district.
  - type: heading
    content: Jesus Heals a Man Unable to Speak
  '32':
  - type: text
    content: 'As they were going away, behold, a '
  - type: note
    content: '[ch. 12:22-24; Luke 11:14, 15]'
  - type: text
    content: 'demon-oppressed man who was mute '
  - type: note
    content: See ch. 4:24
  - type: text
    content: 'was brought to him. '
  '33':
  - type: text
    content: 'And when the demon had been cast out, the mute man spoke. And the crowds '
  - type: note
    content: '[Mark 1:27]'
  - type: text
    content: 'marveled, saying, “Never was anything like this seen in Israel.” '
  '34':
  - type: text
    content: But the Pharisees said, “He casts out demons by the prince of demons.”
  - type: heading
    content: The Harvest Is Plentiful, the Laborers Few
  '35':
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:23, 24
  - type: text
    content: 'And Jesus went throughout all the cities and villages, teaching in their synagogues and proclaiming the gospel of the kingdom and healing every disease and every affliction. '
  '36':
  - type: note
    content: '[ch. 14:14]'
  - type: text
    content: 'When he saw the crowds, '
  - type: note
    content: Mark 6:34
  - type: text
    content: 'he had compassion for them, because they were harassed and helpless, '
  - type: note
    content: Num. 27:17; 1 Kgs. 22:17; Ezek. 34:5
  - type: text
    content: 'like sheep without a shepherd. '
  '37':
  - type: note
    content: Luke 10:2; John 4:35
  - type: text
    content: 'Then he said to his disciples, '
  - type: text
    content: “The harvest is plentiful, but the laborers are few;
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'therefore '
  - type: note
    content: '[2 Thess. 3:1]'
  - type: text
    content: 'pray earnestly to the Lord of the harvest to '
  - type: note
    content: ch. 20:2; [Mark 1:12]
  - type: text
    content: send out laborers into his harvest.”
  '4':
  - type: text
    content: 'But Jesus, '
  - type: note
    content: ch. 12:25; John 2:24, 25
  - type: text
    content: knowing
  - type: note
    content: Some manuscripts perceiving
  - type: text
    content: ' their thoughts, said, '
  - type: text
    content: “Why do you think evil in your hearts?
  - type: text
    content: ' '
  '5':
  - type: text
    content: For which is easier, to say, ‘Your sins are forgiven,’ or to say, ‘Rise and walk’?
  - type: text
    content: ' '
  '6':
  - type: text
    content: But that you may know that the Son of Man has authority on earth to forgive sins”
  - type: text
    content: —he then said to the paralytic—
  - type: text
    content: “Rise, pick up your bed and go home.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And he rose and went home. '
  '8':
  - type: text
    content: 'When the crowds saw it, '
  - type: note
    content: See Luke 7:16
  - type: text
    content: 'they were afraid, and '
  - type: note
    content: See Luke 7:16
  - type: text
    content: 'they glorified God, who had '
  - type: note
    content: ch. 28:18
  - type: text
    content: given such authority to men.
  - type: heading
    content: Jesus Calls Matthew
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-17, see Mark 2:14-22; Luke 5:27-38
  - type: text
    content: 'As Jesus passed on from there, he saw a man called '
  - type: note
    content: ch. 10:3; Mark 3:18; Luke 6:15; Acts 1:13
  - type: text
    content: 'Matthew sitting at the tax booth, and he said to him, '
  - type: text
    content: “Follow me.”
  - type: text
    content: ' And he rose and followed him.'
