document_id: 1CO.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Lawsuits Against Believers
  - type: text
    content: 'When one of you has a grievance against another, does he dare go to law before the unrighteous '
  - type: note
    content: '[Matt. 18:17]'
  - type: text
    content: 'instead of the saints? '
  '10':
  - type: text
    content: 'nor thieves, nor the greedy, nor drunkards, nor revilers, nor swindlers will inherit the kingdom of God. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:2; Eph. 2:2, 3; 4:22; 5:8; Col. 3:7; Titus 3:3
  - type: text
    content: 'such were some of you. But '
  - type: note
    content: Acts 22:16; Heb. 10:22; [Titus 3:5]
  - type: text
    content: 'you were washed, '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'you were sanctified, '
  - type: note
    content: Rom. 8:30
  - type: text
    content: you were justified in the name of the Lord Jesus Christ and by the Spirit of our God.
  - type: heading
    content: Flee Sexual Immorality
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:23
  - type: text
    content: '“All things are lawful for me,” but not all things are helpful. “All things are lawful for me,” but I will not be dominated by anything. '
  '13':
  - type: note
    content: '[Matt. 15:17]'
  - type: text
    content: '“Food is meant for the stomach and the stomach for food”—and God will destroy both one '
  - type: note
    content: Col. 2:22
  - type: text
    content: 'and the other. The body is not meant for sexual immorality, but '
  - type: note
    content: ver. 15, 19
  - type: text
    content: 'for the Lord, and '
  - type: note
    content: '[Eph. 5:23]'
  - type: text
    content: 'the Lord for the body. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'God raised the Lord and '
  - type: note
    content: ch. 15:22, 23; [John 6:39, 40]
  - type: text
    content: 'will also raise us up '
  - type: note
    content: Matt. 22:29; [Eph. 1:19, 20]
  - type: text
    content: 'by his power. '
  '15':
  - type: text
    content: 'Do you not know that '
  - type: note
    content: ver. 13; Eph. 5:30; [ch. 12:27; Rom. 12:5]
  - type: text
    content: 'your bodies are members of Christ? Shall I then take the members of Christ and make them members of a prostitute? Never! '
  '16':
  - type: text
    content: Or do you not know that he who is joined
  - type: note
    content: Or who holds fast (compare Genesis 2:24 and Deuteronomy 10:20); also verse 17
  - type: text
    content: ' to a prostitute becomes one body with her? For, as it is written, '
  - type: note
    content: Matt. 19:5; Mark 10:8; Eph. 5:31; Cited from Gen. 2:24
  - type: text
    content: '“The two will become one flesh.” '
  '17':
  - type: text
    content: 'But he who is joined to the Lord '
  - type: note
    content: Eph. 4:4; [John 17:21-23]
  - type: text
    content: 'becomes one spirit with him. '
  '18':
  - type: note
    content: 2 Cor. 12:21; Eph. 5:3
  - type: text
    content: Flee from sexual immorality. Every other sin
  - type: note
    content: Or Every sin
  - type: text
    content: ' a person commits is outside the body, but the sexually immoral person '
  - type: note
    content: '[Prov. 5:11]'
  - type: text
    content: 'sins against his own body. '
  '19':
  - type: text
    content: 'Or '
  - type: note
    content: '[John 2:21]; See ch. 3:16'
  - type: text
    content: 'do you not know that your body is a temple of the Holy Spirit within you, whom you have from God? '
  - type: note
    content: See Rom. 14:7
  - type: text
    content: 'You are not your own, '
  '2':
  - type: text
    content: 'Or do you not know that '
  - type: note
    content: Dan. 7:22; [Matt. 19:28; Rev. 20:4]
  - type: text
    content: 'the saints will judge the world? And if the world is to be judged by you, are you incompetent to try trivial cases? '
  '20':
  - type: note
    content: ch. 7:23; [Acts 20:28; Heb. 9:12, 14]; See 2 Pet. 2:1
  - type: text
    content: 'for you were bought with a price. '
  - type: note
    content: '[Phil. 1:20]'
  - type: text
    content: So glorify God in your body.
  '3':
  - type: text
    content: 'Do you not know that we are to judge angels? How much more, then, matters pertaining to this life! '
  '4':
  - type: text
    content: 'So if you have such cases, '
  - type: note
    content: '[ch. 5:12]'
  - type: text
    content: 'why do you lay them before those who have no standing in the church? '
  '5':
  - type: note
    content: ch. 15:34; [ch. 4:14]
  - type: text
    content: 'I say this to your shame. Can it be that there is no one among you wise enough to settle a dispute between the brothers, '
  '6':
  - type: text
    content: 'but brother goes to law against brother, and that before unbelievers? '
  '7':
  - type: text
    content: 'To have lawsuits at all with one another is already a defeat for you. '
  - type: note
    content: '[Matt. 5:39, 40]'
  - type: text
    content: 'Why not rather suffer wrong? Why not rather be defrauded? '
  '8':
  - type: text
    content: 'But you yourselves wrong and defraud—even '
  - type: note
    content: 1 Thess. 4:6
  - type: text
    content: your own brothers!
  - type: note
    content: Or brothers and sisters
  '9':
  - type: text
    content: Or do you not know that the unrighteous
  - type: note
    content: Or wrongdoers
  - type: text
    content: ' will not inherit the kingdom of God? Do not be deceived: '
  - type: note
    content: ch. 15:50; Gal. 5:21; Eph. 5:5; 1 Tim. 1:9; Heb. 12:14; 13:4; Rev. 21:8; 22:15
  - type: text
    content: neither the sexually immoral, nor idolaters, nor adulterers, nor men who practice homosexuality,
  - type: note
    content: The two Greek terms translated by this phrase refer to the passive and active partners in consensual homosexual acts
  - type: text
    content: ' '
