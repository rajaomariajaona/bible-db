document_id: NUM.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Spies Sent into Canaan
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'from the tribe of Zebulun, Gaddiel the son of Sodi; '
  '11':
  - type: text
    content: 'from the tribe of Joseph (that is, from the tribe of Manasseh), Gaddi the son of Susi; '
  '12':
  - type: text
    content: 'from the tribe of Dan, Ammiel the son of Gemalli; '
  '13':
  - type: text
    content: 'from the tribe of Asher, Sethur the son of Michael; '
  '14':
  - type: text
    content: 'from the tribe of Naphtali, Nahbi the son of Vophsi; '
  '15':
  - type: text
    content: 'from the tribe of Gad, Geuel the son of Machi. '
  '16':
  - type: text
    content: 'These were the names of the men whom Moses sent to spy out the land. And Moses called '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: Hoshea the son of Nun, Joshua.
  '17':
  - type: text
    content: 'Moses sent them to spy out the land of Canaan and said to them, “Go up into '
  - type: note
    content: ver. 22, 29; ch. 21:1; Josh. 15:19; Judg. 1:15
  - type: text
    content: 'the Negeb and go up into '
  - type: note
    content: ver. 29; Judg. 1:9, 19
  - type: text
    content: 'the hill country, '
  '18':
  - type: text
    content: 'and see what the land is, and whether the people who dwell in it are strong or weak, whether they are few or many, '
  '19':
  - type: text
    content: 'and whether the land that they dwell in is good or bad, and whether the cities that they dwell in are camps or strongholds, '
  '2':
  - type: note
    content: ch. 32:8; See Deut. 1:22-25
  - type: text
    content: '“Send men to spy out the land of Canaan, which I am giving to the people of Israel. From each tribe of their fathers you shall send a man, every one a chief among them.” '
  '20':
  - type: text
    content: 'and whether the land is '
  - type: note
    content: Neh. 9:25, 35; Ezek. 34:14
  - type: text
    content: 'rich or poor, and whether there are trees in it or not. '
  - type: note
    content: Deut. 31:6, 7, 23
  - type: text
    content: Be of good courage and bring some of the fruit of the land.” Now the time was the season of the first ripe grapes.
  '21':
  - type: text
    content: 'So they went up and spied out the land '
  - type: note
    content: ch. 20:1; 33:36; 34:3; Josh. 15:1
  - type: text
    content: 'from the wilderness of Zin to Rehob, '
  - type: note
    content: ch. 34:8
  - type: text
    content: 'near Lebo-hamath. '
  '22':
  - type: text
    content: 'They went up into '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the Negeb and came to '
  - type: note
    content: See Josh. 14:15
  - type: text
    content: 'Hebron. '
  - type: note
    content: Josh. 15:14; Judg. 1:10
  - type: text
    content: 'Ahiman, Sheshai, and Talmai, the '
  - type: note
    content: ver. 33; Deut. 1:28; 2:10; 9:2; Josh. 11:21, 22
  - type: text
    content: descendants of Anak, were there. (
  - type: note
    content: Ps. 78:12, 43; Isa. 19:11, 13; 30:4; Ezek. 30:14
  - type: text
    content: 'Hebron was built seven years before '
  - type: note
    content: Ps. 78:12, 43; Isa. 19:11, 13; 30:4; Ezek. 30:14
  - type: text
    content: 'Zoan in Egypt.) '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: ch. 32:9; Deut. 1:24, 25
  - type: text
    content: 'they came to the Valley of Eshcol and cut down from there a branch with a single cluster of grapes, and they carried it on a pole between two of them; they also brought some pomegranates and figs. '
  '24':
  - type: text
    content: That place was called the Valley of Eshcol,
  - type: note
    content: Eshcol means cluster
  - type: text
    content: ' because of the cluster that the people of Israel cut down from there.'
  - type: heading
    content: Report of the Spies
  '25':
  - type: text
    content: 'At the end of forty days they returned from spying out the land. '
  '26':
  - type: text
    content: 'And they came to Moses and Aaron and to all the congregation of the people of Israel in the wilderness of Paran, at '
  - type: note
    content: ch. 20:1, 16; 32:8; 33:36; Deut. 1:19; Josh. 14:6, 7
  - type: text
    content: 'Kadesh. They brought back word to them and to all the congregation, and showed them the fruit of the land. '
  '27':
  - type: text
    content: 'And they told him, “We came to the land to which you sent us. It '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'flows with milk and honey, '
  - type: note
    content: Deut. 1:25
  - type: text
    content: 'and this is its fruit. '
  '28':
  - type: note
    content: Deut. 1:28; 9:1, 2
  - type: text
    content: 'However, the people who dwell in the land are strong, and the cities are fortified and very large. And besides, we saw the descendants of Anak there. '
  '29':
  - type: note
    content: ch. 14:43; Ex. 17:8
  - type: text
    content: 'The Amalekites dwell in the land of the Negeb. The Hittites, the Jebusites, and the Amorites dwell in the hill country. '
  - type: note
    content: '[ch. 14:25]'
  - type: text
    content: And the Canaanites dwell by the sea, and along the Jordan.”
  '3':
  - type: text
    content: 'So Moses sent them from '
  - type: note
    content: ver. 26; ch. 12:16; 32:8; Deut. 1:19; 9:23
  - type: text
    content: 'the wilderness of Paran, according to the command of the '
  - type: text
    content: Lord
  - type: text
    content: ', all of them men who were heads of the people of Israel. '
  '30':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 14:6, 24]'
  - type: text
    content: 'Caleb quieted the people before Moses and said, “Let us go up at once and occupy it, for we are well able to overcome it.” '
  '31':
  - type: note
    content: ch. 32:9; Deut. 1:28; Josh. 14:8
  - type: text
    content: 'Then the men who had gone up with him said, “We are not able to go up against the people, for they are stronger than we are.” '
  '32':
  - type: text
    content: 'So '
  - type: note
    content: ch. 14:36, 37
  - type: text
    content: 'they brought to the people of Israel a bad report of the land that they had spied out, saying, “The land, through which we have gone to spy it out, is a land that devours its inhabitants, and '
  - type: note
    content: '[Amos 2:9]'
  - type: text
    content: 'all the people that we saw in it are of great height. '
  '33':
  - type: text
    content: 'And there we saw the '
  - type: note
    content: Gen. 6:4
  - type: text
    content: 'Nephilim (the sons of Anak, who come from the '
  - type: note
    content: Gen. 6:4
  - type: text
    content: 'Nephilim), and we seemed to ourselves '
  - type: note
    content: Isa. 40:22
  - type: text
    content: like grasshoppers, and so we seemed to them.”
  '4':
  - type: text
    content: 'And these were their names: From the tribe of Reuben, Shammua the son of Zaccur; '
  '5':
  - type: text
    content: 'from the tribe of Simeon, Shaphat the son of Hori; '
  '6':
  - type: note
    content: ch. 34:19; 1 Chr. 4:15
  - type: text
    content: 'from the tribe of Judah, '
  - type: note
    content: ver. 30; ch. 14:6, 30; 26:65; 32:12; Deut. 1:36; See Josh. 14:6-15; 15:13-18; Judg. 1:12-15
  - type: text
    content: 'Caleb the son of Jephunneh; '
  '7':
  - type: text
    content: 'from the tribe of Issachar, Igal the son of Joseph; '
  '8':
  - type: text
    content: 'from the tribe of Ephraim, '
  - type: note
    content: ver. 16; ch. 11:28; 14:6, 30, 38; Ex. 24:13; Deut. 32:44; [Neh. 8:17]
  - type: text
    content: 'Hoshea the son of Nun; '
  '9':
  - type: text
    content: 'from the tribe of Benjamin, Palti the son of Raphu; '
