document_id: JER.22,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': “Go down to the house of the king of Judah and speak there this word, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Chr. 35:24, 25 ]'
  - type: text
    content: Weep not for him who is dead,
  - type: text
    content: nor grieve for him,
  - type: note
    content: ver. 11
  - type: text
    content: but weep bitterly for him who goes away,
  - type: text
    content: for he shall return no more
  - type: text
    content: to see his native land.
  - type: heading
    content: Message to the Sons of Josiah
  '11':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Shallum the son of Josiah, king of Judah, who reigned instead of Josiah his father, and '
  - type: note
    content: '[2 Kgs. 23:34; 2 Chr. 36:4; Ezek. 19:4]'
  - type: text
    content: 'who went away from this place: “He shall return here no more, '
  '12':
  - type: text
    content: 'but '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: in the place where they have carried him captive, there shall he die, and he shall never see this land again.”
  '13':
  - type: text
    content: ' '
  - type: note
    content: Hab. 2:12; See Isa. 5:18-23
  - type: text
    content: '“Woe to him who builds his house by '
  - type: note
    content: '[Mic. 3:10]'
  - type: text
    content: unrighteousness,
  - type: text
    content: and his upper rooms by injustice,
  - type: note
    content: Lev. 19:13; 25:39, 40; Deut. 24:14, 15; James 5:4
  - type: text
    content: who makes his neighbor serve him for nothing
  - type: text
    content: and does not give him his wages,
  '14':
  - type: text
    content: who says, ‘I will build myself a great house
  - type: text
    content: with spacious upper rooms,’
  - type: text
    content: who cuts out windows for it,
  - type: text
    content: paneling it with cedar
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 23:14
  - type: text
    content: painting it with vermilion.
  '15':
  - type: text
    content: Do you think you are a king
  - type: text
    content: because you compete in cedar?
  - type: text
    content: Did not your father eat and drink
  - type: text
    content: 'and '
  - type: note
    content: '[2 Kgs. 23:25]'
  - type: text
    content: do justice and righteousness?
  - type: note
    content: Ps. 128:2; Eccles. 8:12; Isa. 3:10
  - type: text
    content: Then it was well with him.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Prov. 31:9; [ Isa. 1:17 ]
  - type: text
    content: He judged the cause of the poor and needy;
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: then it was well.
  - type: text
    content: 'Is not this '
  - type: note
    content: '[Judg. 2:10]'
  - type: text
    content: to know me?
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: But you have eyes and heart
  - type: text
    content: only for your dishonest gain,
  - type: note
    content: ver. 3 ; [ch. 26:15]
  - type: text
    content: for shedding innocent blood,
  - type: text
    content: and for practicing oppression and violence.”
  '18':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Jehoiakim the son of Josiah, king of Judah:'
  - type: note
    content: Ps. 78:64; See ch. 16:4-6
  - type: text
    content: “They shall not lament for him, saying,
  - type: note
    content: '[ 1 Kgs. 13:30 ]'
  - type: text
    content: ‘Ah, my brother!’ or ‘Ah, sister!’
  - type: text
    content: They shall not lament for him, saying,
  - type: note
    content: '[ch. 34:5 ]'
  - type: text
    content: ‘Ah, lord!’ or ‘Ah, his majesty!’
  '19':
  - type: text
    content: 'With the burial of a donkey '
  - type: note
    content: ch. 8:2; 36:30; [Isa. 14:19]
  - type: text
    content: he shall be buried,
  - type: text
    content: dragged and dumped beyond the gates of Jerusalem.”
  '2':
  - type: text
    content: 'and say, '
  - type: note
    content: ch. 21:12
  - type: text
    content: '‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', O king of Judah, who sits on the throne of David, you, and your servants, and your people who enter these gates. '
  '20':
  - type: text
    content: “Go up to Lebanon, and cry out,
  - type: text
    content: and lift up your voice in Bashan;
  - type: text
    content: 'cry out from '
  - type: note
    content: Num. 27:12; Deut. 32:49
  - type: text
    content: Abarim,
  - type: text
    content: 'for all '
  - type: note
    content: '[ch. 3:1]'
  - type: text
    content: your lovers are destroyed.
  '21':
  - type: text
    content: I spoke to you in your prosperity,
  - type: text
    content: but you said, ‘I will not listen.’
  - type: note
    content: ch. 3:25
  - type: text
    content: 'This has been your way from '
  - type: note
    content: Ps. 129:1, 2
  - type: text
    content: your youth,
  - type: text
    content: that you have not obeyed my voice.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:1; [ Ezek. 34:10 ]
  - type: text
    content: The wind shall shepherd all your shepherds,
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: your lovers shall go into captivity;
  - type: note
    content: ch. 3:25
  - type: text
    content: then you will be ashamed and confounded
  - type: text
    content: because of all your evil.
  '23':
  - type: text
    content: 'O inhabitant of '
  - type: note
    content: ver. 6
  - type: text
    content: Lebanon,
  - type: text
    content: nested among the cedars,
  - type: text
    content: how you will be pitied when pangs come upon you,
  - type: note
    content: ch. 6:24; See Isa. 13:8
  - type: text
    content: pain as of a woman in labor!”
  '24':
  - type: text
    content: ' '
  - type: note
    content: Isa. 49:18; See Ezek. 5:11
  - type: text
    content: '“As I live, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', though Coniah the son of Jehoiakim, king of Judah, were '
  - type: note
    content: 1 Kgs. 21:8; Song 8:6; Hag. 2:23
  - type: text
    content: 'the signet ring on my right hand, yet I would tear you off '
  '25':
  - type: text
    content: 'and '
  - type: note
    content: ch. 34:20
  - type: text
    content: 'give you '
  - type: note
    content: ch. 39:17; [Deut. 1:17]
  - type: text
    content: 'into the hand of those who seek your life, into the hand of those of whom you are afraid, even into the hand of Nebuchadnezzar king of Babylon and into the hand of the Chaldeans. '
  '26':
  - type: note
    content: 2 Kgs. 24:15; 2 Chr. 36:10
  - type: text
    content: 'I will hurl you and '
  - type: note
    content: '[2 Kgs. 24:8]'
  - type: text
    content: 'the mother who bore you into another country, where you were not born, and there you shall die. '
  '27':
  - type: text
    content: But to the land to which they will long to return, there they shall not return.”
  '28':
  - type: text
    content: 'Is this man '
  - type: note
    content: ver. 24
  - type: text
    content: Coniah a despised, broken pot,
  - type: text
    content: 'a '
  - type: note
    content: '[ch. 48:38; Ps. 31:12; Hos. 8:8]'
  - type: text
    content: vessel no one cares for?
  - type: text
    content: Why are he and his children hurled and cast
  - type: text
    content: 'into a '
  - type: note
    content: See ch. 15:14
  - type: text
    content: land that they do not know?
  '29':
  - type: text
    content: ' '
  - type: note
    content: Isa. 1:2
  - type: text
    content: O land, land, land,
  - type: text
    content: 'hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 7:5, 6; 21:12
  - type: text
    content: 'Do justice and righteousness, and deliver from the hand of the oppressor him who has been robbed. And '
  - type: note
    content: Lev. 19:33
  - type: text
    content: 'do no wrong or violence '
  - type: note
    content: '[Ps. 82:3; Isa. 1:17]'
  - type: text
    content: 'to the resident alien, '
  - type: note
    content: ch. 7:5, 6; 21:12
  - type: text
    content: 'the fatherless, and the widow, nor '
  - type: note
    content: ver. 17; [ch. 26:15]
  - type: text
    content: 'shed innocent blood in this place. '
  '30':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: '“Write this man down as '
  - type: note
    content: '[1 Chr. 3:17; Matt. 1:12]'
  - type: text
    content: childless,
  - type: text
    content: a man who shall not succeed in his days,
  - type: note
    content: ch. 36:30
  - type: text
    content: for none of his offspring shall succeed
  - type: note
    content: ch. 36:30
  - type: text
    content: in sitting on the throne of David
  - type: text
    content: and ruling again in Judah.”
  '4':
  - type: text
    content: 'For if you will indeed obey this word, '
  - type: note
    content: ch. 17:25
  - type: text
    content: 'then there shall enter the gates of this house kings who sit on the throne of David, riding in chariots and on horses, they and their servants and their people. '
  '5':
  - type: text
    content: 'But if you will not obey these words, I '
  - type: note
    content: ch. 49:13; 51:14; Gen. 22:16; Amos 6:8; [Heb. 6:13]
  - type: text
    content: 'swear by myself, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', that '
  - type: note
    content: ch. 7:34; 25:11, 18; 44:6, 22; Isa. 64:10; Ezek. 5:14
  - type: text
    content: 'this house shall become a desolation. '
  '6':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the house of the king of Judah:'
  - type: text
    content: “‘You are like Gilead to me,
  - type: text
    content: 'like the summit of '
  - type: note
    content: ver. 20, 23
  - type: text
    content: Lebanon,
  - type: text
    content: yet surely I will make you a desert,
  - type: note
    content: '[ch. 6:8 ]'
  - type: text
    content: an uninhabited city.
  - type: note
    content: Hebrew cities
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:4
  - type: text
    content: I will prepare destroyers against you,
  - type: text
    content: each with his weapons,
  - type: note
    content: 2 Kgs. 19:23; Isa. 37:24
  - type: text
    content: and they shall cut down your choicest cedars
  - type: text
    content: and cast them into the fire.
  '8':
  - type: text
    content: '“‘And many nations will pass by this city, and every man will say to his neighbor, '
  - type: note
    content: See ch. 5:19
  - type: text
    content: '“Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' dealt thus with this great city?” '
  '9':
  - type: note
    content: Deut. 29:25, 26
  - type: text
    content: 'And they will answer, “Because they have forsaken the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and worshiped other gods and served them.”’”'
