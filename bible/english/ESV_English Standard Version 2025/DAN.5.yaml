document_id: DAN.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Handwriting on the Wall
  - type: text
    content: ' '
  - type: note
    content: ver. 22, 29, 30 ; ch. 7:1; 8:1
  - type: text
    content: 'King Belshazzar '
  - type: note
    content: See Esth. 1:3
  - type: text
    content: 'made a great feast for a thousand of his '
  - type: note
    content: ch. 4:36; 6:17
  - type: text
    content: lords and drank wine in front of the thousand.
  '10':
  - type: text
    content: The queen,
  - type: note
    content: Or queen mother; twice in this verse
  - type: text
    content: ' because of the words of the king and his lords, came into the banqueting hall, and the queen declared, '
  - type: note
    content: See ch. 2:4
  - type: text
    content: '“O king, live forever! Let not your thoughts alarm you '
  - type: note
    content: '[ver. 6, 9]'
  - type: text
    content: 'or your color change. '
  '11':
  - type: text
    content: 'There is a man in your kingdom '
  - type: note
    content: See ch. 4:8
  - type: text
    content: in whom is the spirit of the holy gods.
  - type: note
    content: Or Spirit of the holy God
  - type: text
    content: ' In the days of your father, '
  - type: note
    content: '[ch. 1:20]'
  - type: text
    content: light and understanding and wisdom like the wisdom of the gods were found in him, and King Nebuchadnezzar, your father—your father the king—
  - type: note
    content: ch. 4:9; [ch. 2:48]
  - type: text
    content: 'made him chief of the magicians, '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'enchanters, Chaldeans, and astrologers, '
  '12':
  - type: note
    content: ch. 6:3
  - type: text
    content: 'because an excellent spirit, knowledge, and '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'understanding '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'to interpret dreams, explain riddles, and '
  - type: note
    content: ver. 16
  - type: text
    content: 'solve problems were found in this Daniel, '
  - type: note
    content: See ch. 1:7
  - type: text
    content: whom the king named Belteshazzar. Now let Daniel be called, and he will show the interpretation.”
  - type: heading
    content: Daniel Interprets the Handwriting
  '13':
  - type: text
    content: 'Then Daniel was brought in before the king. The king answered and said to Daniel, “You are that Daniel, one of '
  - type: note
    content: See ch. 2:25
  - type: text
    content: 'the exiles of Judah, whom the king my father brought from Judah. '
  '14':
  - type: text
    content: 'I have heard of you that '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: the spirit of the gods
  - type: note
    content: Or Spirit of God
  - type: text
    content: ' is in you, and that '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'light and understanding and excellent wisdom are found in you. '
  '15':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 7
  - type: text
    content: 'the wise men, the '
  - type: note
    content: '[ch. 2:2; 4:6]'
  - type: text
    content: 'enchanters, have been brought in before me to read this writing and make known to me its interpretation, but '
  - type: note
    content: See ver. 8
  - type: text
    content: 'they could not show the interpretation of the matter. '
  '16':
  - type: note
    content: '[ch. 2:26]'
  - type: text
    content: 'But I have heard that you can give interpretations and '
  - type: note
    content: ver. 12
  - type: text
    content: 'solve problems. '
  - type: note
    content: ver. 7, 29
  - type: text
    content: 'Now if you can read the writing and make known to me its interpretation, '
  - type: note
    content: ver. 7, 29
  - type: text
    content: 'you shall be clothed with purple and have a chain of gold around your neck and '
  - type: note
    content: ver. 7, 29
  - type: text
    content: shall be the third ruler in the kingdom.”
  '17':
  - type: text
    content: 'Then Daniel answered and said before the king, '
  - type: note
    content: '[2 Kgs. 5:16]'
  - type: text
    content: '“Let your gifts be for yourself, and give your rewards to another. Nevertheless, I will read the writing to the king and make known to him the interpretation. '
  '18':
  - type: text
    content: 'O king, the '
  - type: note
    content: ch. 3:26; 4:2
  - type: text
    content: 'Most High God '
  - type: note
    content: '[ch. 2:37; 4:22]'
  - type: text
    content: 'gave '
  - type: note
    content: ver. 2
  - type: text
    content: 'Nebuchadnezzar your father '
  - type: note
    content: '[ch. 4:36]'
  - type: text
    content: 'kingship and greatness and glory and majesty. '
  '19':
  - type: text
    content: 'And because of the greatness that he gave him, '
  - type: note
    content: See ch. 3:4
  - type: text
    content: 'all peoples, nations, and languages '
  - type: note
    content: '[ch. 6:26]'
  - type: text
    content: 'trembled and feared before him. Whom he would, he killed, and whom he would, he kept alive; whom he would, he raised up, and whom he would, he humbled. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Belshazzar, when he tasted the wine, commanded that '
  - type: note
    content: ver. 23; See ch. 1:2
  - type: text
    content: the vessels of gold and of silver that Nebuchadnezzar his father
  - type: note
    content: Or predecessor; also verses 11, 13, 18
  - type: text
    content: ' had taken out of the temple in Jerusalem be brought, that the king and his lords, his wives, and his concubines might drink from them. '
  '20':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 4:30, 31; Ezek. 31:10, 11]'
  - type: text
    content: 'when his heart was lifted up and his spirit was hardened so that he dealt proudly, '
  - type: note
    content: See ch. 2:21
  - type: text
    content: 'he was brought down from his kingly throne, and his glory was taken from him. '
  '21':
  - type: note
    content: '[ch. 4:25, 32]'
  - type: text
    content: 'He was driven from among the children of mankind, and his mind was made like that of a beast, and his dwelling was with the wild donkeys. He was fed grass like an ox, and his body was wet with the dew of heaven, '
  - type: note
    content: '[ch. 4:25, 32]'
  - type: text
    content: 'until he knew that the '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Most High God rules the kingdom of mankind and sets over it whom he will. '
  '22':
  - type: text
    content: And you his son,
  - type: note
    content: Or successor
  - type: text
    content: ' '
  - type: note
    content: See ver. 1
  - type: text
    content: 'Belshazzar, '
  - type: note
    content: '[2 Chr. 33:23]'
  - type: text
    content: 'have not humbled your heart, though you knew all this, '
  '23':
  - type: text
    content: 'but you have lifted up yourself against '
  - type: note
    content: '[ch. 4:37]'
  - type: text
    content: 'the Lord of heaven. And '
  - type: note
    content: ver. 3; See ch. 1:2
  - type: text
    content: 'the vessels of his house have been brought in before you, and you and your lords, your wives, and your concubines have drunk wine from them. '
  - type: note
    content: ver. 4
  - type: text
    content: 'And you have praised the gods of silver and gold, of bronze, iron, wood, and stone, which do not see or hear or know, '
  - type: note
    content: Job 12:10
  - type: text
    content: 'but the God in whose hand is your breath, and '
  - type: note
    content: Jer. 10:23
  - type: text
    content: 'whose are all your ways, '
  - type: note
    content: '[Acts 12:23; Rev. 16:9]'
  - type: text
    content: you have not honored.
  '24':
  - type: text
    content: '“Then from his presence '
  - type: note
    content: ver. 5
  - type: text
    content: 'the hand was sent, and this writing was inscribed. '
  '25':
  - type: text
    content: 'And this is the writing that was inscribed: M'
  - type: heading
    content: ene
  - type: text
    content: ', M'
  - type: heading
    content: ene
  - type: text
    content: ', T'
  - type: heading
    content: ekel
  - type: text
    content: ', and P'
  - type: heading
    content: arsin
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'This is the interpretation of the matter: M'
  - type: heading
    content: ene
  - type: text
    content: ', God has numbered'
  - type: note
    content: Mene sounds like the Aramaic for numbered
  - type: text
    content: ' the days of your kingdom and brought it to an end; '
  '27':
  - type: text
    content: T
  - type: heading
    content: ekel
  - type: text
    content: ', '
  - type: note
    content: Job 31:6; Ps. 62:9
  - type: text
    content: you have been weighed
  - type: note
    content: Tekel sounds like the Aramaic for weighed
  - type: text
    content: ' in the balances and found wanting; '
  '28':
  - type: text
    content: P
  - type: heading
    content: eres
  - type: text
    content: ', your kingdom is divided and given to '
  - type: note
    content: ver. 31; [ch. 9:1; Isa. 13:17; 21:2; Jer. 51:28]
  - type: text
    content: 'the Medes and '
  - type: note
    content: See ch. 6:28
  - type: text
    content: Persians.”
  - type: note
    content: Peres (the singular of Parsin) sounds like the Aramaic for divided and for Persia
  '29':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Belshazzar gave the command, and Daniel '
  - type: note
    content: '[ver. 7, 16]'
  - type: text
    content: was clothed with purple, a chain of gold was put around his neck, and a proclamation was made about him, that he should be the third ruler in the kingdom.
  '3':
  - type: text
    content: 'Then they brought in '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the golden vessels that had been taken out of the temple, the house of God in Jerusalem, and the king and his lords, his wives, and his concubines drank from them. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Jer. 50:24; 51:31, 39, 57
  - type: text
    content: 'That very night '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Belshazzar the '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'Chaldean king was killed. '
  '31':
  - type: note
    content: Ch 6:1 in Aramaic
  - type: text
    content: ' And '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'Darius '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: the Mede received the kingdom, being about sixty-two years old.
  '4':
  - type: text
    content: 'They drank wine and '
  - type: note
    content: ver. 23; [Judg. 16:24]
  - type: text
    content: 'praised the '
  - type: note
    content: ver. 23; [Rev. 9:20]; See Ps. 115:4-7
  - type: text
    content: gods of gold and silver, bronze, iron, wood, and stone.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 4:31 ]'
  - type: text
    content: 'Immediately '
  - type: note
    content: '[Ezek. 8:3]'
  - type: text
    content: 'the fingers of a human hand appeared and wrote on the plaster of the wall of the king’s palace, opposite the lampstand. And the king saw '
  - type: note
    content: ver. 24
  - type: text
    content: 'the hand as it wrote. '
  '6':
  - type: note
    content: '[ver. 10; ch. 7:28]'
  - type: text
    content: 'Then the king’s color changed, '
  - type: note
    content: '[ch. 4:5, 19; 7:28]'
  - type: text
    content: 'and his thoughts alarmed him; '
  - type: note
    content: '[Ps. 69:23; Isa. 45:1]'
  - type: text
    content: 'his limbs gave way, and '
  - type: note
    content: Nah. 2:10
  - type: text
    content: 'his knees knocked together. '
  '7':
  - type: note
    content: '[ch. 2:2; 4:6]'
  - type: text
    content: 'The king called loudly to bring in '
  - type: note
    content: '[ch. 2:2; 4:6]'
  - type: text
    content: 'the enchanters, the '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'Chaldeans, and '
  - type: note
    content: ch. 2:27
  - type: text
    content: the astrologers. The king declared
  - type: note
    content: Aramaic answered and said; also verse 10
  - type: text
    content: ' to the wise men of Babylon, '
  - type: note
    content: ver. 16, 29; [ch. 2:6]
  - type: text
    content: '“Whoever reads this writing, and shows me its interpretation, shall be clothed with purple and have a chain of gold around his neck and '
  - type: note
    content: ver. 16, 29
  - type: text
    content: 'shall be the third ruler in the kingdom.” '
  '8':
  - type: text
    content: 'Then all the king’s wise men came in, but '
  - type: note
    content: ver. 15; ch. 4:7, 18; [ch. 2:27; Gen. 41:8]
  - type: text
    content: 'they could not read the writing or make known to the king the interpretation. '
  '9':
  - type: text
    content: 'Then King Belshazzar was greatly '
  - type: note
    content: '[ch. 2:1]'
  - type: text
    content: 'alarmed, and his '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'color changed, and his '
  - type: note
    content: ver. 1
  - type: text
    content: lords were perplexed.
