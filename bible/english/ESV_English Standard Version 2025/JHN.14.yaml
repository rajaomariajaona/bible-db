document_id: JHN.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: I Am the Way, and the Truth, and the Life
  - type: text
    content: ' '
  - type: note
    content: ver. 14:27; [ch. 16:22, 23; 1 Pet. 3:14 ]
  - type: text
    content: '“Let not your hearts be troubled. '
  - type: note
    content: See ch. 12:44
  - type: text
    content: Believe in God;
  - type: text
    content: ' '
  - type: note
    content: Or You believe in God
  - type: text
    content: believe also in me.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Do you not believe that '
  - type: note
    content: See ch. 10:38
  - type: text
    content: 'I am in the Father and the Father is in me? The words that I say to you '
  - type: note
    content: See ch. 5:19, 20
  - type: text
    content: I do not speak on my own authority, but the Father who dwells in me does his works.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Believe me that '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'I am in the Father and the Father is in me, or else '
  - type: note
    content: See ch. 5:36
  - type: text
    content: believe on account of the works themselves.
  '12':
  - type: text
    content: ' '
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: '[ Matt. 17:20; 21:21; Mark 11:23; 16:17 ]'
  - type: text
    content: 'whoever believes in me will also do the works that I do; and greater works than these will he do, because I '
  - type: note
    content: ver. 14:28; ch. 16:28; [ch. 7:33; 13:1, 3; 16:5, 10, 17; 17:11, 13; 20:17 ]
  - type: text
    content: am going to the Father.
  - type: text
    content: ' '
  '13':
  - type: note
    content: ch. 15:16; 16:23, 24; See Matt. 7:7
  - type: text
    content: 'Whatever you ask in my name, this I will do, that '
  - type: note
    content: See ch. 13:31
  - type: text
    content: the Father may be glorified in the Son.
  - type: text
    content: ' '
  '14':
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: If you ask me
  - type: note
    content: Some manuscripts omit me
  - type: text
    content: ' '
  - type: text
    content: anything in my name, I will do it.
  - type: heading
    content: Jesus Promises the Holy Spirit
  '15':
  - type: text
    content: ' '
  - type: note
    content: ver. 14:21, 23; ch. 15:10; 1 John 5:3; 2 John 6
  - type: text
    content: '“If you love me, you will '
  - type: note
    content: See 1 John 2:3
  - type: text
    content: keep my commandments.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And I will ask the Father, and he will give you another '
  - type: note
    content: ver. 14:26; ch. 15:26; 16:7
  - type: text
    content: Helper,
  - type: note
    content: Or Advocate, or Counselor; also 14:26; 15:26; 16:7
  - type: text
    content: ' '
  - type: text
    content: to be with you forever,
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'even '
  - type: note
    content: ch. 15:26; 16:13; [1 Cor. 2:12-14; 1 John 2:27; 4:6; 5:6]
  - type: text
    content: 'the Spirit of truth, '
  - type: note
    content: 1 Cor. 2:14
  - type: text
    content: 'whom the world cannot receive, because it neither sees him nor knows him. You know him, for he dwells with you and '
  - type: note
    content: Acts 2:4; [1 John 2:27; 2 John 2]; See Rom. 8:9
  - type: text
    content: will be
  - type: note
    content: Some manuscripts and is
  - type: text
    content: ' '
  - type: text
    content: in you.
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“I will not leave you as orphans; '
  - type: note
    content: ver. 14:3, 28
  - type: text
    content: I will come to you.
  - type: text
    content: ' '
  '19':
  - type: note
    content: See ch. 7:33
  - type: text
    content: 'Yet a little while and the world will see me no more, but '
  - type: note
    content: '[ch. 12:45; 16:16]'
  - type: text
    content: 'you will see me. '
  - type: note
    content: '[Rom. 5:10; Eph. 2:5; Rev. 20:4]'
  - type: text
    content: Because I live, you also will live.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'In '
  - type: note
    content: '[ch. 2:16]'
  - type: text
    content: 'my Father’s house are many rooms. If it were not so, would I have told you that '
  - type: note
    content: ch. 16:7; [ch. 8:21, 22; 13:33, 36]
  - type: text
    content: I go to prepare a place for you?
  - type: note
    content: Or In my Father’s house are many rooms; if it were not so, I would have told you; for I go to prepare a place for you
  - type: text
    content: ' '
  '20':
  - type: note
    content: ch. 16:23, 26
  - type: text
    content: 'In that day you will know that '
  - type: note
    content: ver. 10
  - type: text
    content: 'I am in my Father, and '
  - type: note
    content: '[ch. 15:4-7]; See 1 John 2:28'
  - type: text
    content: 'you in me, and '
  - type: note
    content: ch. 17:21, 23, 26
  - type: text
    content: I in you.
  - type: text
    content: ' '
  '21':
  - type: note
    content: '[ch. 7:17; 8:31, 32]'
  - type: text
    content: 'Whoever has my commandments and '
  - type: note
    content: ver. 15; 1 John 2:5
  - type: text
    content: 'keeps them, he it is who loves me. And '
  - type: note
    content: ch. 16:27
  - type: text
    content: 'he who loves me '
  - type: note
    content: '[ch. 12:26]'
  - type: text
    content: 'will be loved by my Father, and I will love him and '
  - type: note
    content: See ch. 7:4
  - type: text
    content: manifest myself to him.”
  - type: text
    content: ' '
  '22':
  - type: note
    content: Luke 6:16; Acts 1:13
  - type: text
    content: 'Judas (not Iscariot) said to him, “Lord, how is it '
  - type: note
    content: '[Acts 10:40, 41]'
  - type: text
    content: 'that you will manifest yourself to us, and not to the world?” '
  '23':
  - type: text
    content: 'Jesus answered him, '
  - type: note
    content: See ver. 14:15, 21
  - type: text
    content: '“If anyone loves me, he will keep my word, and my Father will love him, and '
  - type: note
    content: Rev. 3:20
  - type: text
    content: 'we will come to him and '
  - type: note
    content: '[2 Cor. 6:16; 1 John 2:24]'
  - type: text
    content: make our home with him.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Whoever does not love me does not keep my words. And '
  - type: note
    content: '[ver. 10]; See ch. 7:16'
  - type: text
    content: the word that you hear is not mine but the Father’s who sent me.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “These things I have spoken to you while I am still with you.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But the '
  - type: note
    content: See ver. 16
  - type: text
    content: 'Helper, the Holy Spirit, '
  - type: note
    content: '[Luke 24:49; Acts 2:33, with ch. 15:26; 16:7]'
  - type: text
    content: 'whom the Father will send in my name, '
  - type: note
    content: ch. 16:13; 1 Cor. 2:10; 1 John 2:20, 27
  - type: text
    content: 'he will teach you all things and '
  - type: note
    content: See ch. 2:22
  - type: text
    content: bring to your remembrance all that I have said to you.
  - type: text
    content: ' '
  '27':
  - type: note
    content: ch. 20:19, 21, 26; Luke 24:36
  - type: text
    content: 'Peace I leave with you; '
  - type: note
    content: ch. 16:33; Col. 3:15; [Eph. 2:17; Phil. 4:7]
  - type: text
    content: 'my peace I give to you. Not as the world gives do I give to you. '
  - type: note
    content: ver. 1
  - type: text
    content: 'Let not your hearts be troubled, neither '
  - type: note
    content: 2 Tim. 1:7
  - type: text
    content: let them be afraid.
  - type: text
    content: ' '
  '28':
  - type: note
    content: ver. 2-4
  - type: text
    content: 'You heard me say to you, '
  - type: note
    content: See ch. 8:21
  - type: text
    content: '‘I am going away, and I will come to you.’ If you loved me, you would have rejoiced, because I '
  - type: note
    content: See ver. 12
  - type: text
    content: 'am going to the Father, for '
  - type: note
    content: '[ch. 10:29; Phil. 2:6]'
  - type: text
    content: the Father is greater than I.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:19; 16:4
  - type: text
    content: now I have told you before it takes place, so that when it does take place you may believe.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And if I go and prepare a place for you, I will come again and will take you '
  - type: note
    content: ver. 18, 28; [ch. 21:22, 23]
  - type: text
    content: 'to myself, that '
  - type: note
    content: See ch. 12:26
  - type: text
    content: where I am you may be also.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'I will no longer talk much with you, for '
  - type: note
    content: See ch. 12:31
  - type: text
    content: 'the ruler of this world is coming. '
  - type: note
    content: '[ch. 17:14; 18:36; Heb. 4:15]'
  - type: text
    content: He has no claim on me,
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'but I do '
  - type: note
    content: ch. 12:49, 50; Phil. 2:8; Heb. 5:8
  - type: text
    content: 'as the Father has commanded me, '
  - type: note
    content: ch. 17:21, 23
  - type: text
    content: so that the world may know that I love the Father. Rise, let us go from here.
  '4':
  - type: text
    content: And you know the way to where I am going.”
  - type: note
    content: Some manuscripts Where I am going you know, and the way you know
  - type: text
    content: ' '
  '5':
  - type: note
    content: See ch. 11:16
  - type: text
    content: 'Thomas said to him, “Lord, '
  - type: note
    content: ch. 13:36
  - type: text
    content: 'we do not know where you are going. How can we know the way?” '
  '6':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“I am '
  - type: note
    content: Heb. 9:8; 10:20; [Eph. 2:18]
  - type: text
    content: 'the way, and '
  - type: note
    content: ch. 1:14, 17; [1 John 5:20]
  - type: text
    content: 'the truth, and '
  - type: note
    content: See ch. 11:25
  - type: text
    content: the life. No one comes to the Father except through me.
  - type: text
    content: ' '
  '7':
  - type: note
    content: ch. 8:19
  - type: text
    content: 'If you had known me, you would have '
  - type: note
    content: 1 John 2:13, 14
  - type: text
    content: known my Father also.
  - type: note
    content: Or If you know me, you will know my Father also, or If you have known me, you will know my Father also
  - type: text
    content: ' '
  - type: text
    content: 'From now on you do know him and '
  - type: note
    content: '[ch. 6:46]'
  - type: text
    content: have seen him.”
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:43, 44; 12:21
  - type: text
    content: 'Philip said to him, “Lord, '
  - type: note
    content: '[Ex. 33:18]'
  - type: text
    content: 'show us the Father, and it is enough for us.” '
  '9':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“Have I been with you so long, and you still do not know me, Philip? '
  - type: note
    content: ch. 12:45; [ch. 10:30; 15:24; Col. 1:15; Heb. 1:3]
  - type: text
    content: Whoever has seen me has seen the Father. How can you say, ‘Show us the Father’?
  - type: text
    content: ' '
