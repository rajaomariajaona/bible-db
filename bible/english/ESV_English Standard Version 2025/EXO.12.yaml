document_id: EXO.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Passover
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron in the land of Egypt, '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ch. 23:18; 29:34; 34:25; Deut. 16:4; [Lev. 7:15]
  - type: text
    content: 'you shall let none of it remain until the morning; anything that remains until the morning you shall burn. '
  '11':
  - type: text
    content: 'In this manner you shall eat it: with '
  - type: note
    content: '[Luke 12:35; Eph. 6:14; 1 Pet. 1:13]'
  - type: text
    content: 'your belt fastened, your sandals on your feet, and your staff in your hand. And you shall eat it in haste. '
  - type: note
    content: ver. 27; Lev. 23:5; Deut. 16:5; [1 Cor. 5:7]
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: ver. 23; ch. 11:4, 5
  - type: text
    content: 'I will pass through the land of Egypt that night, and I will strike all the firstborn in the land of Egypt, both man and beast; and on '
  - type: note
    content: Num. 33:4
  - type: text
    content: 'all the gods of Egypt I will execute judgments: '
  - type: note
    content: ch. 6:2; Isa. 43:11
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: note
    content: '[Heb. 11:28]'
  - type: text
    content: The blood shall be a sign for you, on the houses where you are. And when I see the blood, I will pass over you, and no plague will befall you to destroy you, when I strike the land of Egypt.
  '14':
  - type: text
    content: '“This day shall be '
  - type: note
    content: ch. 13:9
  - type: text
    content: 'for you a memorial day, and you shall keep it as a feast to the '
  - type: text
    content: Lord
  - type: text
    content: '; throughout your generations, as a '
  - type: note
    content: ver. 17, 24, 43; ch. 13:10; 2 Kgs. 23:21
  - type: text
    content: 'statute forever, you shall keep it as a feast. '
  '15':
  - type: note
    content: ch. 13:6, 7; 23:15; 34:18, 25; Lev. 23:6; Num. 28:17; Deut. 16:3, 8; [1 Cor. 5:7, 8]
  - type: text
    content: 'Seven days you shall eat unleavened bread. On the first day you shall remove leaven out of your houses, for if anyone eats what is leavened, from the first day until the seventh day, '
  - type: note
    content: '[Gen. 17:14; Num. 9:13]'
  - type: text
    content: 'that person shall be cut off from Israel. '
  '16':
  - type: text
    content: 'On the first day you shall hold a '
  - type: note
    content: Lev. 23:7, 8; Num. 28:18, 25
  - type: text
    content: 'holy assembly, and on the seventh day a holy assembly. No work shall be done on those days. But what everyone needs to eat, that alone may be prepared by you. '
  '17':
  - type: text
    content: 'And you shall observe the Feast of Unleavened Bread, for '
  - type: note
    content: ch. 13:3
  - type: text
    content: 'on this very day I brought your '
  - type: note
    content: ver. 51; ch. 7:4
  - type: text
    content: 'hosts out of the land of Egypt. Therefore you shall observe this day, throughout your generations, as a statute forever. '
  '18':
  - type: note
    content: Lev. 23:5; Num. 28:16
  - type: text
    content: 'In the first month, from the fourteenth day of the month at evening, you shall eat unleavened bread until the twenty-first day of the month at evening. '
  '19':
  - type: note
    content: ver. 15
  - type: text
    content: 'For seven days no leaven is to be found in your houses. If anyone eats what is leavened, '
  - type: note
    content: ver. 15
  - type: text
    content: 'that person will be cut off from the congregation of Israel, '
  - type: note
    content: ver. 48, 49
  - type: text
    content: 'whether he is a sojourner or a native of the land. '
  '2':
  - type: note
    content: ch. 13:4; 23:15; 34:18; Deut. 16:1
  - type: text
    content: '“This month shall be for you the beginning of months. It shall be the first month of the year for you. '
  '20':
  - type: text
    content: You shall eat nothing leavened; in all your dwelling places you shall eat unleavened bread.”
  '21':
  - type: text
    content: 'Then Moses called all the elders of Israel and said to them, “Go and select lambs for yourselves '
  - type: note
    content: ver. 3
  - type: text
    content: 'according to your clans, and kill the Passover lamb. '
  '22':
  - type: text
    content: 'Take a bunch of '
  - type: note
    content: Lev. 14:6; Num. 19:18; Ps. 51:7; Heb. 9:19
  - type: text
    content: 'hyssop and '
  - type: note
    content: Heb. 11:28
  - type: text
    content: 'dip it in the blood that is in the basin, and touch '
  - type: note
    content: ver. 7
  - type: text
    content: 'the lintel and the two doorposts with the blood that is in the basin. '
  - type: note
    content: '[Isa. 26:20]'
  - type: text
    content: 'None of you shall go out of the door of his house until the morning. '
  '23':
  - type: note
    content: ver. 12, 13
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will pass through to strike the Egyptians, and when he sees the blood on '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'the lintel and on the two doorposts, the '
  - type: text
    content: Lord
  - type: text
    content: ' will pass over the door and '
  - type: note
    content: Heb. 11:28; [Ezek. 9:6; Rev. 7:3; 9:4]
  - type: text
    content: 'will not allow the destroyer to enter your houses to strike you. '
  '24':
  - type: text
    content: 'You shall observe this rite as a statute for you and for your sons forever. '
  '25':
  - type: text
    content: 'And when you come to the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you, '
  - type: note
    content: ch. 3:8, 17
  - type: text
    content: 'as he has promised, you shall keep this service. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:8, 14; Deut. 6:20; 32:7; Josh. 4:6, 21; Ps. 78:3-6
  - type: text
    content: 'when your children say to you, ‘What do you mean by this service?’ '
  '27':
  - type: text
    content: 'you shall say, '
  - type: note
    content: ver. 11, 21
  - type: text
    content: '‘It is the sacrifice of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover, for he passed over the houses of the people of Israel in Egypt, when he struck the Egyptians but spared our houses.’” And the people '
  - type: note
    content: ch. 4:31
  - type: text
    content: bowed their heads and worshiped.
  '28':
  - type: text
    content: 'Then the people of Israel went and did so; as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses and Aaron, so they did.'
  - type: heading
    content: 'The Tenth Plague: Death of the Firstborn'
  '29':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:4
  - type: text
    content: 'At midnight the '
  - type: note
    content: Num. 8:17; 33:4; Ps. 78:51; 105:36; 135:8; 136:10
  - type: text
    content: Lord
  - type: text
    content: ' struck down all the firstborn in the land of Egypt, '
  - type: note
    content: ch. 4:23; 11:5
  - type: text
    content: 'from the firstborn of Pharaoh who sat on his throne to the firstborn of the captive who was in the dungeon, and all the firstborn of the livestock. '
  '3':
  - type: text
    content: 'Tell all the congregation of Israel that on the tenth day of this month every man shall take a lamb '
  - type: note
    content: ver. 21
  - type: text
    content: 'according to their fathers’ houses, a lamb for a household. '
  '30':
  - type: text
    content: 'And Pharaoh rose up in the night, he and all his servants and all the Egyptians. And there was '
  - type: note
    content: ch. 11:6; [Amos 5:16, 17]
  - type: text
    content: 'a great cry in Egypt, for there was not a house where someone was not dead. '
  '31':
  - type: text
    content: 'Then he summoned Moses and Aaron by night and said, “Up, go out from among my people, '
  - type: note
    content: '[ch. 10:9-11]'
  - type: text
    content: 'both you and the people of Israel; and go, serve the '
  - type: text
    content: Lord
  - type: text
    content: ', as you have said. '
  '32':
  - type: note
    content: '[ch. 10:24-26]'
  - type: text
    content: Take your flocks and your herds, as you have said, and be gone, and bless me also!”
  - type: heading
    content: The Exodus
  '33':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:1; 11:1, 8; Ps. 105:38
  - type: text
    content: 'The Egyptians were urgent with the people to send them out of the land in haste. For they said, “We shall all be dead.” '
  '34':
  - type: text
    content: 'So the people took their dough before it was leavened, their kneading bowls being bound up in their cloaks on their shoulders. '
  '35':
  - type: text
    content: 'The people of Israel had also done as Moses told them, for they had '
  - type: note
    content: ch. 3:22; 11:2
  - type: text
    content: 'asked the Egyptians for silver and gold jewelry and for clothing. '
  '36':
  - type: note
    content: ch. 3:21; 11:3
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' had given the people favor in the sight of the Egyptians, so that '
  - type: note
    content: Gen. 15:14; Ps. 105:37
  - type: text
    content: they let them have what they asked. Thus they plundered the Egyptians.
  '37':
  - type: text
    content: 'And the '
  - type: note
    content: Num. 33:3, 5
  - type: text
    content: 'people of Israel journeyed from '
  - type: note
    content: Gen. 47:11; [ch. 1:11]
  - type: text
    content: 'Rameses to Succoth, '
  - type: note
    content: '[ch. 38:26; Num. 1:46; 2:32; 11:21; 26:51]'
  - type: text
    content: 'about six hundred thousand men on foot, besides women and children. '
  '38':
  - type: text
    content: 'A '
  - type: note
    content: Lev. 24:10, 11; Num. 11:4; [Neh. 13:3]
  - type: text
    content: 'mixed multitude also went up with them, and very much livestock, both flocks and herds. '
  '39':
  - type: text
    content: 'And they baked unleavened cakes of the dough that they had brought out of Egypt, for it was not leavened, because '
  - type: note
    content: '[See ver. 33 above]'
  - type: text
    content: 'they were thrust out of Egypt and '
  - type: note
    content: '[Deut. 16:3]'
  - type: text
    content: could not wait, nor had they prepared any provisions for themselves.
  '4':
  - type: text
    content: 'And if the household is too small for a lamb, then he and his nearest neighbor shall take according to the number of persons; according to what each can eat you shall make your count for the lamb. '
  '40':
  - type: text
    content: 'The time that the people of Israel lived in Egypt was 430 years. '
  '41':
  - type: text
    content: 'At the end of '
  - type: note
    content: Gal. 3:17; [Gen. 15:13; Acts 7:6]
  - type: text
    content: '430 years, on that very day, all the hosts of the '
  - type: text
    content: Lord
  - type: text
    content: ' went out from the land of Egypt. '
  '42':
  - type: text
    content: 'It was a night of watching by the '
  - type: text
    content: Lord
  - type: text
    content: ', to bring them out of the land of Egypt; so this same night is a '
  - type: note
    content: See Deut. 16:1-6
  - type: text
    content: 'night of watching kept to the '
  - type: text
    content: Lord
  - type: text
    content: ' by all the people of Israel throughout their generations.'
  - type: heading
    content: Institution of the Passover
  '43':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “This is the statute of the Passover: no foreigner shall eat of it, '
  '44':
  - type: text
    content: but every slave
  - type: note
    content: Or servant; the Hebrew term ‘ebed designates a range of social and economic roles (see Preface)
  - type: text
    content: ' that is '
  - type: note
    content: '[Gen. 17:12, 13]'
  - type: text
    content: 'bought for money may eat of it after you have circumcised him. '
  '45':
  - type: note
    content: Lev. 22:10
  - type: text
    content: 'No foreigner or hired worker may eat of it. '
  '46':
  - type: text
    content: 'It shall be eaten in one house; you shall not take any of the flesh outside the house, and '
  - type: note
    content: Num. 9:12; Cited John 19:36
  - type: text
    content: 'you shall not break any of its bones. '
  '47':
  - type: note
    content: ver. 6
  - type: text
    content: 'All the congregation of Israel shall keep it. '
  '48':
  - type: note
    content: Num. 9:14
  - type: text
    content: 'If a stranger shall sojourn with you and would keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', let all his males be circumcised. Then he may come near and keep it; he '
  - type: note
    content: ver. 19
  - type: text
    content: 'shall be as a native of the land. But no uncircumcised person shall eat of it. '
  '49':
  - type: text
    content: 'There shall be '
  - type: note
    content: Num. 9:14; 15:15, 16
  - type: text
    content: 'one law for the native and for the '
  - type: note
    content: '[See ver. 48 above]'
  - type: text
    content: stranger who sojourns among you.”
  '5':
  - type: text
    content: 'Your lamb shall be '
  - type: note
    content: Lev. 22:19-21; Deut. 17:1; Mal. 1:8, 14; Heb. 9:14
  - type: text
    content: 'without blemish, a male a year old. You may take it from the sheep or from the goats, '
  '50':
  - type: text
    content: 'All the people of Israel did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses and Aaron. '
  '51':
  - type: text
    content: 'And on that very day the '
  - type: note
    content: ver. 41; Acts 13:17
  - type: text
    content: Lord
  - type: text
    content: ' brought the people of Israel out of the land of Egypt by their '
  - type: note
    content: ver. 17
  - type: text
    content: hosts.
  '6':
  - type: text
    content: 'and you shall keep it until the '
  - type: note
    content: ver. 18; Lev. 23:5; Num. 9:3; 28:16; Josh. 5:10; Ezra 6:19
  - type: text
    content: fourteenth day of this month, when the whole assembly of the congregation of Israel shall kill their lambs at twilight.
  - type: note
    content: Hebrew between the two evenings
  '7':
  - type: text
    content: '“Then they shall take some of the blood and put it on the '
  - type: note
    content: ver. 22
  - type: text
    content: 'two doorposts and the lintel of the houses in which they eat it. '
  '8':
  - type: text
    content: 'They shall eat the flesh that night, roasted on the fire; with '
  - type: note
    content: ch. 23:18; 34:25; Num. 9:11; Deut. 16:3; 1 Cor. 5:8
  - type: text
    content: 'unleavened bread and bitter herbs they shall eat it. '
  '9':
  - type: text
    content: 'Do not eat any of it raw or boiled in water, but '
  - type: note
    content: Deut. 16:7; 2 Chr. 35:13
  - type: text
    content: 'roasted, its head with its legs and its inner parts. '
