document_id: PSA.98,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Make a Joyful Noise to the Lord
  - type: text
    content: A Psalm.
  - type: text
    content: 'Oh sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Ps. 33:3
  - type: text
    content: a new song,
  - type: text
    content: 'for he has done '
  - type: note
    content: '[Ps. 96:3]; Ps. 72:18'
  - type: text
    content: marvelous things!
  - type: text
    content: 'His '
  - type: note
    content: '[Ex. 15:6; Luke 1:51]; See Job 40:14'
  - type: text
    content: right hand and his holy arm
  - type: text
    content: have worked salvation for him.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has '
  - type: note
    content: Isa. 49:6; 52:10; Luke 2:30, 31; [Isa. 59:16; 63:5]
  - type: text
    content: made known his salvation;
  - type: text
    content: 'he has '
  - type: note
    content: Isa. 62:2; Rom. 3:25, 26
  - type: text
    content: 'revealed his righteousness in '
  - type: note
    content: Ps. 96:2, 3
  - type: text
    content: the sight of the nations.
  '3':
  - type: text
    content: 'He has '
  - type: note
    content: Luke 1:54, 72
  - type: text
    content: 'remembered his '
  - type: note
    content: See Ps. 36:5
  - type: text
    content: steadfast love and faithfulness
  - type: text
    content: to the house of Israel.
  - type: text
    content: 'All '
  - type: note
    content: Ps. 22:27
  - type: text
    content: the ends of the earth have seen
  - type: note
    content: ver. 2
  - type: text
    content: the salvation of our God.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 66:1
  - type: text
    content: 'Make a joyful noise to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth;'
  - type: note
    content: Isa. 44:23
  - type: text
    content: break forth into joyous song and sing praises!
  '5':
  - type: text
    content: 'Sing praises to the '
  - type: text
    content: Lord
  - type: text
    content: ' with the lyre,'
  - type: text
    content: 'with the lyre and the '
  - type: note
    content: Isa. 51:3
  - type: text
    content: sound of melody!
  '6':
  - type: text
    content: 'With '
  - type: note
    content: Num. 10:10; 1 Chr. 15:24
  - type: text
    content: 'trumpets and the sound of '
  - type: note
    content: 2 Chr. 15:14
  - type: text
    content: the horn
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'make a joyful noise before the King, the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 96:11
  - type: text
    content: 'Let the sea roar, and '
  - type: note
    content: Ps. 24:1
  - type: text
    content: all that fills it;
  - type: note
    content: Ps. 24:1
  - type: text
    content: the world and those who dwell in it!
  '8':
  - type: text
    content: 'Let the rivers '
  - type: note
    content: Isa. 55:12; [Ps. 93:3]
  - type: text
    content: clap their hands;
  - type: text
    content: 'let '
  - type: note
    content: Ps. 89:12
  - type: text
    content: the hills sing for joy together
  '9':
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he comes'
  - type: text
    content: 'to '
  - type: note
    content: Ps. 96:13; See Ps. 58:11
  - type: text
    content: judge the earth.
  - type: text
    content: He will judge the world with righteousness,
  - type: text
    content: and the peoples with equity.
