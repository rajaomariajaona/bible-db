document_id: PSA.96,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Worship in the Splendor of Holiness
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-13, see 1 Chr. 16:23-33
  - type: text
    content: 'Oh sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 98:1; See Ps. 33:3
  - type: text
    content: a new song;
  - type: text
    content: 'sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth!'
  '10':
  - type: text
    content: 'Say among the nations, '
  - type: note
    content: See Ps. 93:1
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns!'
  - type: text
    content: Yes, the world is established; it shall never be moved;
  - type: text
    content: 'he will '
  - type: note
    content: ver. 13; See Ps. 9:8; 58:11
  - type: text
    content: judge the peoples with equity.”
  '11':
  - type: text
    content: 'Let '
  - type: note
    content: See Ps. 69:34
  - type: text
    content: 'the heavens be glad, and let '
  - type: note
    content: Ps. 97:1
  - type: text
    content: the earth rejoice;
  - type: text
    content: 'let '
  - type: note
    content: Ps. 98:7
  - type: text
    content: the sea roar, and all that fills it;
  '12':
  - type: text
    content: 'let '
  - type: note
    content: '[Isa. 35:1]'
  - type: text
    content: the field exult, and everything in it!
  - type: text
    content: 'Then shall all '
  - type: note
    content: '[Isa. 55:12]'
  - type: text
    content: the trees of the forest sing for joy
  '13':
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he comes,'
  - type: text
    content: 'for he comes '
  - type: note
    content: See Isa. 11:1-9
  - type: text
    content: to judge the earth.
  - type: text
    content: He will judge the world in righteousness,
  - type: text
    content: and the peoples in his faithfulness.
  '2':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', bless his name;'
  - type: note
    content: '[ Isa. 52:7; 60:6 ]'
  - type: text
    content: tell of his salvation from day to day.
  '3':
  - type: text
    content: Declare his glory among the nations,
  - type: text
    content: his marvelous works among all the peoples!
  '4':
  - type: text
    content: 'For '
  - type: note
    content: See Ps. 48:1
  - type: text
    content: 'great is the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Ps. 18:3
  - type: text
    content: greatly to be praised;
  - type: text
    content: 'he is to be feared above '
  - type: note
    content: See Ps. 95:3
  - type: text
    content: all gods.
  '5':
  - type: text
    content: For all the gods of the peoples are worthless idols,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 115:15; Isa. 42:5; 44:24; Jer. 10:12
  - type: text
    content: made the heavens.
  '6':
  - type: text
    content: Splendor and majesty are before him;
  - type: note
    content: '[ Ps. 78:61 ]'
  - type: text
    content: strength and beauty are in his sanctuary.
  '7':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ', O '
  - type: note
    content: Ps. 22:27
  - type: text
    content: families of the peoples,
  - type: note
    content: See Ps. 29:1
  - type: text
    content: 'ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' glory and strength!'
  '8':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 29:2
  - type: text
    content: the glory due his name;
  - type: text
    content: 'bring '
  - type: note
    content: '[Ps. 45:12]; See Ps. 68:29; 72:10'
  - type: text
    content: 'an offering, and '
  - type: note
    content: Ps. 100:4
  - type: text
    content: come into his courts!
  '9':
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in '
  - type: note
    content: See Ps. 29:2
  - type: text
    content: the splendor of holiness;
  - type: note
    content: Or in holy attire
  - type: note
    content: Ps. 114:7
  - type: text
    content: tremble before him, all the earth!
