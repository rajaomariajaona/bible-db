document_id: JER.40,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Remains in Judah
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 39:14]'
  - type: text
    content: 'after Nebuzaradan the captain of the guard had let him go from '
  - type: note
    content: Josh. 18:25
  - type: text
    content: 'Ramah, when he took him '
  - type: note
    content: '[Ps. 149:8]'
  - type: text
    content: 'bound in chains along with all the captives of Jerusalem and Judah who were being exiled to Babylon. '
  '10':
  - type: text
    content: 'As for me, I will dwell at '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Mizpah, to represent you before the Chaldeans who will come to us. But as for you, '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'gather wine and summer fruits and oil, and store them in your vessels, and dwell in your cities that you have taken.” '
  '11':
  - type: text
    content: 'Likewise, when all the Judeans who were in '
  - type: note
    content: '[Num. 22:1; 2 Sam. 8:2]'
  - type: text
    content: 'Moab and among '
  - type: note
    content: 1 Sam. 11:1; 12:12
  - type: text
    content: 'the Ammonites and in '
  - type: note
    content: Gen. 36:8
  - type: text
    content: 'Edom and in other lands heard that the king of Babylon had left a remnant in Judah and had appointed Gedaliah the son of Ahikam, son of Shaphan, as governor over them, '
  '12':
  - type: note
    content: '[ch. 43:5]'
  - type: text
    content: 'then all the Judeans returned from all the places to which they had been driven and came to the land of Judah, to Gedaliah at Mizpah. And they '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: gathered wine and summer fruits in great abundance.
  '13':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 8, 15, 16; ch. 42:1, 8
  - type: text
    content: 'Johanan the son of Kareah and '
  - type: note
    content: ch. 41:11; 42:1
  - type: text
    content: 'all the leaders of the forces in the open country came to Gedaliah at Mizpah '
  '14':
  - type: text
    content: 'and said to him, “Do you know that Baalis the king of '
  - type: note
    content: '[ch. 41:10]'
  - type: text
    content: 'the Ammonites has sent Ishmael the son of Nethaniah to take your life?” But Gedaliah the son of Ahikam would not believe them. '
  '15':
  - type: text
    content: 'Then Johanan the son of Kareah spoke secretly to Gedaliah at Mizpah, “Please let me go and strike down Ishmael the son of Nethaniah, and no one will know it. Why should he take your life, so that all the Judeans who are gathered about you would be scattered, '
  - type: note
    content: '[ch. 42:2]'
  - type: text
    content: 'and the remnant of Judah would perish?” '
  '16':
  - type: text
    content: But Gedaliah the son of Ahikam said to Johanan the son of Kareah, “You shall not do this thing, for you are speaking falsely of Ishmael.”
  '2':
  - type: text
    content: 'The captain of the guard took Jeremiah and said to him, '
  - type: note
    content: '[Deut. 29:24, 28]'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God pronounced this disaster against this place. '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has brought it about, and has done as he said. '
  - type: note
    content: ch. 44:3, 23; Deut. 29:25; See Dan. 9:10-12
  - type: text
    content: 'Because you sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not obey his voice, this thing has come upon you. '
  '4':
  - type: text
    content: 'Now, behold, I release you today from '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the chains on your hands. '
  - type: note
    content: '[ch. 39:12]'
  - type: text
    content: 'If it seems good to you to come with me to Babylon, come, and I will look after you well, '
  - type: note
    content: '[ch. 39:12]'
  - type: text
    content: 'but if it seems wrong to you to come with me to Babylon, do not come. '
  - type: note
    content: '[Gen. 20:15]'
  - type: text
    content: 'See, the whole land is before you; go wherever you think it good and right to go. '
  '5':
  - type: text
    content: If you remain,
  - type: note
    content: Syriac; the meaning of the Hebrew phrase is uncertain
  - type: text
    content: ' then return to '
  - type: note
    content: See ch. 39:14
  - type: text
    content: 'Gedaliah the son of Ahikam, son of Shaphan, '
  - type: note
    content: ch. 41:2
  - type: text
    content: 'whom the king of Babylon appointed governor of the cities of Judah, and dwell with him among the people. Or go wherever you think it right to go.” So the captain of the guard gave him an allowance of food and a present, and let him go. '
  '6':
  - type: text
    content: 'Then Jeremiah went to '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Gedaliah the son of Ahikam, at '
  - type: note
    content: ch. 41:6; Josh. 18:26
  - type: text
    content: 'Mizpah, and lived with him '
  - type: note
    content: ch. 37:12; 39:14
  - type: text
    content: 'among the people '
  - type: note
    content: ch. 39:10
  - type: text
    content: who were left in the land.
  '7':
  - type: text
    content: ' '
  - type: note
    content: For ver. 7-9, see 2 Kgs. 25:23, 24
  - type: text
    content: 'When all the captains of the forces in the open country and their men heard that '
  - type: note
    content: ver. 5
  - type: text
    content: 'the king of Babylon had appointed Gedaliah the son of Ahikam governor in the land and had committed to him men, women, and children, those of '
  - type: note
    content: ch. 39:10; 2 Kgs. 25:12
  - type: text
    content: 'the poorest of the land who had not been taken into exile to Babylon, '
  '8':
  - type: text
    content: 'they went to Gedaliah at '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: Mizpah—
  - type: note
    content: ver. 14, 15, 16; See ch. 41:1-3
  - type: text
    content: 'Ishmael the son of Nethaniah, '
  - type: note
    content: ver. 13, 15, 16; ch. 42:1, 8
  - type: text
    content: 'Johanan the son of Kareah, Seraiah the son of Tanhumeth, the sons of Ephai the Netophathite, '
  - type: note
    content: ch. 42:1
  - type: text
    content: 'Jezaniah the son of the Maacathite, they and their men. '
  '9':
  - type: text
    content: 'Gedaliah the son of Ahikam, son of Shaphan, swore to them and their men, saying, “Do not be afraid to serve the Chaldeans. Dwell in the land and serve the king of Babylon, '
  - type: note
    content: ch. 38:20
  - type: text
    content: 'and it shall be well with you. '
