  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Johanan the son of Kareah spoke secretly to Gedaliah at Mizpah, “Please let me go and strike down Ishmael the son of Nethaniah, and no one will know it. Why should he take your life, so that all the Judeans who are gathered about you would be scattered, '
