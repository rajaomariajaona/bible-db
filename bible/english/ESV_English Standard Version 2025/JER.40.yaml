        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and the remnant of Judah would perish?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Gedaliah the son of Ahikam said to Johanan the son of Kareah, “You shall not do this thing, for you are speaking falsely of Ishmael.”
