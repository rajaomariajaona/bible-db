document_id: 1CH.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Organizes the Musicians
  - type: text
    content: 'David and the chiefs of the service also set apart for the service the sons of '
  - type: note
    content: See ch. 6:39
  - type: text
    content: 'Asaph, and of '
  - type: note
    content: See ch. 6:33
  - type: text
    content: 'Heman, and of '
  - type: note
    content: ch. 16:41
  - type: text
    content: 'Jeduthun, who '
  - type: note
    content: '[Ex. 15:20; 2 Kgs. 3:15]'
  - type: text
    content: 'prophesied with lyres, with '
  - type: note
    content: ch. 15:16; Neh. 12:27
  - type: text
    content: 'harps, and with cymbals. The list of those who did the work and of their duties was: '
  '10':
  - type: text
    content: 'the third to Zaccur, his sons and his brothers, twelve; '
  '11':
  - type: text
    content: 'the fourth to Izri, his sons and his brothers, twelve; '
  '12':
  - type: text
    content: 'the fifth to Nethaniah, his sons and his brothers, twelve; '
  '13':
  - type: text
    content: 'the sixth to Bukkiah, his sons and his brothers, twelve; '
  '14':
  - type: text
    content: 'the seventh to Jesharelah, his sons and his brothers, twelve; '
  '15':
  - type: text
    content: 'the eighth to Jeshaiah, his sons and his brothers, twelve; '
  '16':
  - type: text
    content: 'the ninth to Mattaniah, his sons and his brothers, twelve; '
  '17':
  - type: text
    content: 'the tenth to Shimei, his sons and his brothers, twelve; '
  '18':
  - type: text
    content: 'the eleventh to Azarel, his sons and his brothers, twelve; '
  '19':
  - type: text
    content: 'the twelfth to Hashabiah, his sons and his brothers, twelve; '
  '2':
  - type: text
    content: 'Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah, sons of Asaph, under the direction of Asaph, who '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'prophesied under the direction of the king. '
  '20':
  - type: text
    content: 'to the thirteenth, Shubael, his sons and his brothers, twelve; '
  '21':
  - type: text
    content: 'to the fourteenth, Mattithiah, his sons and his brothers, twelve; '
  '22':
  - type: text
    content: 'to the fifteenth, to Jeremoth, his sons and his brothers, twelve; '
  '23':
  - type: text
    content: 'to the sixteenth, to Hananiah, his sons and his brothers, twelve; '
  '24':
  - type: text
    content: 'to the seventeenth, to Joshbekashah, his sons and his brothers, twelve; '
  '25':
  - type: text
    content: 'to the eighteenth, to Hanani, his sons and his brothers, twelve; '
  '26':
  - type: text
    content: 'to the nineteenth, to Mallothi, his sons and his brothers, twelve; '
  '27':
  - type: text
    content: 'to the twentieth, to Eliathah, his sons and his brothers, twelve; '
  '28':
  - type: text
    content: 'to the twenty-first, to Hothir, his sons and his brothers, twelve; '
  '29':
  - type: text
    content: 'to the twenty-second, to Giddalti, his sons and his brothers, twelve; '
  '3':
  - type: text
    content: 'Of Jeduthun, the sons of Jeduthun: Gedaliah, Zeri, Jeshaiah, Shimei,'
  - type: note
    content: One Hebrew manuscript, Septuagint; most Hebrew manuscripts lack Shimei
  - type: text
    content: ' Hashabiah, and Mattithiah, six, under the direction of their father Jeduthun, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'who prophesied with the lyre in thanksgiving and praise to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'to the twenty-third, to Mahazioth, his sons and his brothers, twelve; '
  '31':
  - type: text
    content: to the twenty-fourth, to Romamti-ezer, his sons and his brothers, twelve.
  '4':
  - type: text
    content: 'Of Heman, the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel and Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, and Romamti-ezer, Joshbekashah, Mallothi, Hothir, Mahazioth. '
  '5':
  - type: text
    content: 'All these were the sons of Heman '
  - type: note
    content: '[2 Sam. 24:11]'
  - type: text
    content: 'the king’s seer, according to the promise of God to exalt him, for God had given Heman fourteen sons and three daughters. '
  '6':
  - type: text
    content: 'They were all under the direction of their father in the music in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' with cymbals, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'harps, and lyres for the service of the house of God. Asaph, Jeduthun, and Heman were under the order of the king. '
  '7':
  - type: text
    content: 'The number of them along with their brothers, who were trained in singing to the '
  - type: text
    content: Lord
  - type: text
    content: ', all who were skillful, was '
  - type: note
    content: '[ch. 23:5]'
  - type: text
    content: '288. '
  '8':
  - type: text
    content: 'And they cast lots for their duties, '
  - type: note
    content: ch. 26:13
  - type: text
    content: small and great, teacher and pupil alike.
  '9':
  - type: text
    content: 'The first lot fell for Asaph to Joseph; the second to Gedaliah, to him and his brothers and his sons, twelve; '
