document_id: 2SA.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Absalom Killed
  - type: text
    content: 'Then David mustered the men who were with him and set over them commanders of thousands and commanders of hundreds. '
  '10':
  - type: text
    content: 'And a certain man saw it and told Joab, “Behold, I saw Absalom hanging in an oak.” '
  '11':
  - type: text
    content: 'Joab said to the man who told him, “What, you saw him! Why then did you not strike him there to the ground? I would have been glad to give you ten pieces of silver and a belt.” '
  '12':
  - type: text
    content: 'But the man said to Joab, “Even if I felt in my hand the weight of a thousand pieces of silver, I would not reach out my hand against the king’s son, for '
  - type: note
    content: ver. 5
  - type: text
    content: 'in our hearing the king commanded you and Abishai and Ittai, ‘For my sake protect the young man Absalom.’ '
  '13':
  - type: text
    content: On the other hand, if I had dealt treacherously against his life
  - type: note
    content: Or at the risk of my life
  - type: text
    content: ' (and there is nothing hidden from the king), then you yourself would have stood aloof.” '
  '14':
  - type: text
    content: 'Joab said, “I will not waste time like this with you.” And he took three javelins in his hand and thrust them into the heart of Absalom while he was still alive in the oak. '
  '15':
  - type: text
    content: And ten young men, Joab’s armor-bearers, surrounded Absalom and struck him and killed him.
  '16':
  - type: text
    content: 'Then Joab blew the trumpet, and the troops came back from pursuing Israel, for Joab restrained them. '
  '17':
  - type: text
    content: 'And they took Absalom and threw him into a great pit in the forest and raised over him '
  - type: note
    content: Josh. 7:26; 8:29
  - type: text
    content: 'a very great heap of stones. And all Israel '
  - type: note
    content: ch. 19:8; 20:1, 22; 1 Sam. 4:10; 2 Kgs. 8:21
  - type: text
    content: 'fled every one to his own home. '
  '18':
  - type: text
    content: 'Now Absalom in his lifetime had taken and set up for himself '
  - type: note
    content: Gen. 28:18
  - type: text
    content: 'the pillar that is in '
  - type: note
    content: '[Gen. 14:17]'
  - type: text
    content: 'the King’s Valley, for he said, '
  - type: note
    content: ch. 14:27
  - type: text
    content: “I have no son to keep my name in remembrance.” He called the pillar after his own name, and it is called Absalom’s monument
  - type: note
    content: Or Absalom’s hand
  - type: text
    content: ' to this day.'
  - type: heading
    content: David Hears of Absalom’s Death
  '19':
  - type: text
    content: 'Then Ahimaaz the son of Zadok said, '
  - type: note
    content: ch. 15:36
  - type: text
    content: '“Let me run and carry news to the king that '
  - type: note
    content: ver. 31
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has delivered him from the hand of his enemies.” '
  '2':
  - type: text
    content: 'And David sent out the army, one third under the command of Joab, one third under the command of Abishai the son of Zeruiah, Joab’s brother, and one third under the command of '
  - type: note
    content: ch. 15:19
  - type: text
    content: 'Ittai the Gittite. And the king said to the men, “I myself will also go out with you.” '
  '20':
  - type: text
    content: 'And Joab said to him, “You are not to carry news today. You may carry news another day, but today you shall carry no news, because the king’s son is dead.” '
  '21':
  - type: text
    content: 'Then Joab said to the Cushite, “Go, tell the king what you have seen.” The Cushite bowed before Joab, and ran. '
  '22':
  - type: text
    content: 'Then Ahimaaz the son of Zadok said again to Joab, “Come what may, let me also run after the Cushite.” And Joab said, “Why will you run, my son, seeing that you will have no reward for the news?” '
  '23':
  - type: text
    content: '“Come what may,” he said, “I will run.” So he said to him, “Run.” Then Ahimaaz ran by the way of '
  - type: note
    content: '[Deut. 34:3]'
  - type: text
    content: the plain, and outran the Cushite.
  '24':
  - type: text
    content: 'Now David '
  - type: note
    content: ch. 19:8
  - type: text
    content: 'was sitting between the two gates, and '
  - type: note
    content: '[ch. 13:34; 2 Kgs. 9:17]'
  - type: text
    content: 'the watchman went up to the roof of the gate by the wall, and when he lifted up his eyes and looked, he saw a man running alone. '
  '25':
  - type: text
    content: 'The watchman called out and told the king. And the king said, “If he is alone, there is news in his mouth.” And he drew nearer and nearer. '
  '26':
  - type: text
    content: 'The watchman saw another man running. And the watchman called to the gate and said, “See, another man running alone!” The king said, “He also brings news.” '
  '27':
  - type: text
    content: 'The watchman said, “I think the running of the first is '
  - type: note
    content: '[2 Kgs. 9:20]'
  - type: text
    content: 'like the running of Ahimaaz the son of Zadok.” And the king said, '
  - type: note
    content: '[1 Kgs. 1:42]'
  - type: text
    content: “He is a good man and comes with good news.”
  '28':
  - type: text
    content: 'Then Ahimaaz cried out to the king, “All is well.” And he bowed before the king with his face to the earth and said, '
  - type: note
    content: See Gen. 14:20
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has delivered up the men who raised their hand against my lord the king.” '
  '29':
  - type: text
    content: 'And the king said, '
  - type: note
    content: ch. 20:9
  - type: text
    content: '“Is it well with the young man Absalom?” Ahimaaz answered, “When Joab sent the king’s servant, your servant, I saw a great commotion, but I do not know what it was.” '
  '3':
  - type: note
    content: ch. 21:17
  - type: text
    content: 'But the men said, “You shall not go out. For if we flee, they will not care about us. If half of us die, they will not care about us. But you are worth ten thousand of us. Therefore it is better that you send us help from the city.” '
  '30':
  - type: text
    content: And the king said, “Turn aside and stand here.” So he turned aside and stood still.
  - type: heading
    content: David’s Grief
  '31':
  - type: text
    content: 'And behold, the Cushite came, and the Cushite said, “Good news for my lord the king! For '
  - type: note
    content: ver. 19
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has delivered you this day from the hand of all who rose up against you.” '
  '32':
  - type: text
    content: 'The king said to the Cushite, '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: '“Is it well with the young man Absalom?” And the Cushite answered, '
  - type: note
    content: 1 Sam. 25:26
  - type: text
    content: '“May the enemies of my lord the king and all who rise up against you for evil be like that young man.” '
  '33':
  - type: note
    content: Ch 19:1 in Hebrew
  - type: text
    content: ' And the king was deeply moved and went up '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'to the chamber over the gate and wept. And as he went, he said, '
  - type: note
    content: ch. 19:4
  - type: text
    content: “O my son Absalom, my son, my son Absalom! Would I had died instead of you, O Absalom, my son, my son!”
  '4':
  - type: text
    content: 'The king said to them, “Whatever seems best to you I will do.” So the king stood at the side of the gate, while all the army marched out by hundreds and by thousands. '
  '5':
  - type: text
    content: 'And the king ordered Joab and Abishai and Ittai, “Deal gently for my sake with the young man Absalom.” '
  - type: note
    content: ver. 12
  - type: text
    content: And all the people heard when the king gave orders to all the commanders about Absalom.
  '6':
  - type: text
    content: 'So the army went out into the field against Israel, and the battle was fought in the '
  - type: note
    content: ver. 17; [Josh. 17:15, 18]
  - type: text
    content: 'forest of Ephraim. '
  '7':
  - type: text
    content: 'And the men of Israel were defeated there by the servants of David, and the loss there was great on that day, twenty thousand men. '
  '8':
  - type: text
    content: The battle spread over the face of all the country, and the forest devoured more people that day than the sword.
  '9':
  - type: text
    content: And Absalom happened to meet the servants of David. Absalom was riding on his mule, and the mule went under the thick branches of a great oak,
  - type: note
    content: Or terebinth; also verses 10, 14
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:26]'
  - type: text
    content: 'and his head caught fast in the oak, and he was suspended between heaven and earth, while the mule that was under him went on. '
