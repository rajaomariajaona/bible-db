        text: 27:24
      metadata:
        usfm: 1CH.27.24
    marker-yv: yv-n
  - type: text
    text: But he did not include Levi and Benjamin in the numbering, for the king’s command was abhorrent to Joab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But God was displeased with this thing, and he struck Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And David said to God, “I have sinned greatly in that I have done this thing. But now, please '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
