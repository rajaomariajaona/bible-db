    marker-yv: yv-n
  - type: text
    text: ' of gold by weight for the site. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And David built there an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and presented burnt offerings and peace offerings and called on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
