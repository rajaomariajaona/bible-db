  - type: text
    text: 'Satan stood against Israel and incited David to number Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So David said to Joab and the commanders of the army, “Go, number Israel, from Beersheba to Dan, and bring me a report, that I may know their number.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Joab said, “May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' add to his people a hundred times as many as they are! Are they not, my lord the king, all of them my lord’s servants? Why then should my lord require this? Why should it be a cause of guilt for Israel?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the king’s word prevailed against Joab. So Joab departed and went throughout all Israel and came back to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Joab gave the sum of the numbering of the people to David. In all Israel there were '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 24:9
      metadata:
        usfm: 2SA.24.9
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '1,100,000 men who drew the sword, and in Judah '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 24:9
      metadata:
        usfm: 2SA.24.9
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '470,000 who drew the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
