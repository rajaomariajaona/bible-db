document_id: 1CH.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Census Brings Pestilence
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-28, see 2 Sam. 24:1-25
  - type: text
    content: 'Then '
  - type: note
    content: Zech. 3:1, 2; [2 Sam. 24:1]; See Job 1:6-12; 2:1-7
  - type: text
    content: 'Satan stood against Israel and incited David to number Israel. '
  '10':
  - type: text
    content: '“Go and say to David, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Three things I offer you; choose one of them, that I may do it to you.’” '
  '11':
  - type: text
    content: 'So Gad came to David and said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘Choose what you will: '
  '12':
  - type: text
    content: 'either '
  - type: note
    content: '[2 Sam. 24:13]'
  - type: text
    content: 'three years of famine, or three months of devastation by your foes while the sword of your enemies overtakes you, or else three days of the sword of the '
  - type: text
    content: Lord
  - type: text
    content: ', pestilence on the land, with the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' destroying throughout all the territory of Israel.’ Now decide what answer I shall return to him who sent me.” '
  '13':
  - type: text
    content: 'Then David said to Gad, “I am in great distress. Let me fall into the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ', for his mercy is very great, but do not let me fall into the hand of man.”'
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a pestilence on Israel, and 70,000 men of Israel fell. '
  '15':
  - type: text
    content: 'And God sent the angel to Jerusalem to destroy it, but as he was about to destroy it, the '
  - type: text
    content: Lord
  - type: text
    content: ' saw, and he '
  - type: note
    content: See Gen. 6:6
  - type: text
    content: 'relented from the calamity. And he said to the angel who was working destruction, “It is enough; now stay your hand.” And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was standing by the threshing floor of Ornan the Jebusite. '
  '16':
  - type: text
    content: 'And David lifted his eyes and saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing between earth and heaven, and in his hand a drawn sword stretched out over Jerusalem. Then David and the elders, '
  - type: note
    content: 1 Kgs. 20:31; See 2 Sam. 3:31
  - type: text
    content: 'clothed in sackcloth, fell upon their faces. '
  '17':
  - type: text
    content: 'And David said to God, “Was it not I who gave command to number the people? It is I who have sinned and done great evil. But these sheep, what have they done? Please let your hand, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, be against me and against my father’s house. But do not let the plague be on your people.”'
  - type: heading
    content: David Builds an Altar
  '18':
  - type: text
    content: 'Now '
  - type: note
    content: '[2 Chr. 3:1]'
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Gad to say to David that David should go up and raise an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the threshing floor of Ornan the Jebusite. '
  '19':
  - type: text
    content: 'So David went up at Gad’s word, which he had spoken in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'So David said to Joab and the commanders of the army, “Go, number Israel, from Beersheba to Dan, and bring me a report, that I may know their number.” '
  '20':
  - type: text
    content: 'Now Ornan was threshing wheat. He turned and saw the angel, and his four sons who were with him hid themselves. '
  '21':
  - type: text
    content: 'As David came to Ornan, Ornan looked and saw David and went out from the threshing floor and paid homage to David with his face to the ground. '
  '22':
  - type: text
    content: 'And David said to Ornan, “Give me the site of the threshing floor that I may build on it an altar to the '
  - type: text
    content: Lord
  - type: text
    content: '—give it to me at its full price—that the plague may be averted from the people.” '
  '23':
  - type: text
    content: 'Then Ornan said to David, “Take it, and let my lord the king do what seems good to him. See, I give the oxen for burnt offerings and the threshing sledges for the wood and the wheat for a grain offering; I give it all.” '
  '24':
  - type: text
    content: 'But King David said to Ornan, “No, but I will buy them for the full price. I will not take for the '
  - type: text
    content: Lord
  - type: text
    content: ' what is yours, nor offer burnt offerings that cost me nothing.” '
  '25':
  - type: text
    content: 'So David paid Ornan '
  - type: note
    content: '[2 Sam. 24:24]'
  - type: text
    content: 600 shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of gold by weight for the site. '
  '26':
  - type: text
    content: 'And David built there an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' and presented burnt offerings and peace offerings and called on the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew he
  - type: text
    content: ' '
  - type: note
    content: See Lev. 9:24
  - type: text
    content: 'answered him with fire from heaven upon the altar of burnt offering. '
  '27':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded the angel, and he put his sword back into its sheath.'
  '28':
  - type: text
    content: 'At that time, when David saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' had answered him at the threshing floor of Ornan the Jebusite, he sacrificed there. '
  '29':
  - type: text
    content: 'For the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ', which Moses had made in the wilderness, and the altar of burnt offering '
  - type: note
    content: ch. 16:39; 2 Chr. 1:3; [1 Kgs. 3:4]
  - type: text
    content: 'were at that time in the high place at Gibeon, '
  '3':
  - type: text
    content: 'But Joab said, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' add to his people a hundred times as many as they are! Are they not, my lord the king, all of them my lord’s servants? Why then should my lord require this? Why should it be a cause of guilt for Israel?” '
  '30':
  - type: text
    content: 'but David could not go before it to inquire of God, for he was afraid of the sword of the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'But the king’s word prevailed against Joab. So Joab departed and went throughout all Israel and came back to Jerusalem. '
  '5':
  - type: text
    content: 'And Joab gave the sum of the numbering of the people to David. In all Israel there were '
  - type: note
    content: '[2 Sam. 24:9]'
  - type: text
    content: '1,100,000 men who drew the sword, and in Judah '
  - type: note
    content: '[2 Sam. 24:9]'
  - type: text
    content: '470,000 who drew the sword. '
  '6':
  - type: note
    content: ch. 27:24
  - type: text
    content: But he did not include Levi and Benjamin in the numbering, for the king’s command was abhorrent to Joab.
  '7':
  - type: text
    content: 'But God was displeased with this thing, and he struck Israel. '
  '8':
  - type: text
    content: 'And David said to God, “I have sinned greatly in that I have done this thing. But now, please '
  - type: note
    content: '[2 Sam. 12:13]'
  - type: text
    content: 'take away the iniquity of your servant, for I have acted very foolishly.” '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Gad, David’s '
  - type: note
    content: ch. 29:29; See 1 Sam. 9:9
  - type: text
    content: 'seer, saying, '
