document_id: 1SA.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Anointed King
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, '
  - type: note
    content: ch. 15:35
  - type: text
    content: '“How long will you grieve over Saul, since '
  - type: note
    content: ch. 15:23, 26
  - type: text
    content: 'I have rejected him from being king over Israel? '
  - type: note
    content: See ch. 10:1
  - type: text
    content: 'Fill your horn with oil, and go. I will send you to Jesse the Bethlehemite, '
  - type: note
    content: Ps. 78:70; 89:19, 20; Acts 13:22
  - type: text
    content: 'for I have provided for myself a king among his sons.” '
  '10':
  - type: text
    content: 'And Jesse made seven of his sons pass before Samuel. And Samuel said to Jesse, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has not chosen these.” '
  '11':
  - type: text
    content: 'Then Samuel said to Jesse, “Are all your sons here?” And he said, '
  - type: note
    content: ch. 17:13; [2 Sam. 13:3; 1 Chr. 2:13]
  - type: text
    content: “There remains yet the youngest,
  - type: note
    content: Or smallest
  - type: text
    content: ' but behold, he is keeping the sheep.” And Samuel said to Jesse, '
  - type: note
    content: '[2 Sam. 7:8; Ps. 78:70, 71]'
  - type: text
    content: '“Send and get him, for we will not sit down till he comes here.” '
  '12':
  - type: text
    content: 'And he sent and brought him in. Now he was '
  - type: note
    content: ch. 17:42
  - type: text
    content: 'ruddy and had beautiful eyes and was handsome. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: '[ch. 9:17]'
  - type: text
    content: '“Arise, anoint him, for this is he.” '
  '13':
  - type: text
    content: 'Then Samuel took '
  - type: note
    content: ver. 1
  - type: text
    content: 'the horn of oil '
  - type: note
    content: '[ch. 10:1; Ps. 89:20]'
  - type: text
    content: 'and anointed him in the midst of his brothers. '
  - type: note
    content: ch. 10:6, 10; 11:6; See Judg. 3:10
  - type: text
    content: 'And the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' rushed upon David from that day forward. And Samuel rose up and went to Ramah.'
  - type: heading
    content: David in Saul’s Service
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:12; 28:15, 16; [ Judg. 16:20 ]
  - type: text
    content: 'Now the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' departed from Saul, '
  - type: note
    content: ch. 18:10; 19:9; [Judg. 9:23]
  - type: text
    content: 'and a harmful spirit from the '
  - type: text
    content: Lord
  - type: text
    content: ' tormented him. '
  '15':
  - type: text
    content: 'And Saul’s servants said to him, “Behold now, a harmful spirit from God is tormenting you. '
  '16':
  - type: text
    content: 'Let our lord now command your servants '
  - type: note
    content: ver. 21, 22; 1 Kgs. 10:8
  - type: text
    content: 'who are before you to seek out a man who is skillful in playing the lyre, and when the harmful spirit from God is upon you, he will '
  - type: note
    content: ch. 18:10; 19:9; [2 Kgs. 3:15]
  - type: text
    content: 'play it, and you will be well.” '
  '17':
  - type: text
    content: 'So Saul said to his servants, “Provide for me a man who can play well and bring him to me.” '
  '18':
  - type: text
    content: 'One of the young men answered, “Behold, I have seen a son of Jesse the Bethlehemite, who is skillful in playing, '
  - type: note
    content: See ch. 17:32, 34-36
  - type: text
    content: 'a man of valor, a man of war, prudent in speech, and a man of good presence, '
  - type: note
    content: ch. 3:19; 18:12, 14
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' is with him.” '
  '19':
  - type: text
    content: 'Therefore Saul sent messengers to Jesse and said, “Send me David your son, '
  - type: note
    content: ver. 11; ch. 17:15, 34
  - type: text
    content: 'who is with the sheep.” '
  '2':
  - type: text
    content: 'And Samuel said, “How can I go? If Saul hears it, he will kill me.” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Take a heifer with you and say, '
  - type: note
    content: '[ch. 9:12; 20:29]'
  - type: text
    content: '‘I have come to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '20':
  - type: note
    content: '[ch. 17:18]'
  - type: text
    content: 'And Jesse took a donkey laden with bread and a skin of wine and a young goat and sent them by David his son to Saul. '
  '21':
  - type: text
    content: 'And David came to Saul '
  - type: note
    content: See ver. 16
  - type: text
    content: 'and entered his service. And Saul loved him greatly, and he became his armor-bearer. '
  '22':
  - type: text
    content: 'And Saul sent to Jesse, saying, “Let David remain in my service, for he has found favor in my sight.” '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: ver. 14, 16
  - type: text
    content: 'whenever the harmful spirit from God was upon Saul, David took the lyre '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: and played it with his hand. So Saul was refreshed and was well, and the harmful spirit departed from him.
  '3':
  - type: text
    content: 'And invite Jesse to the sacrifice, and I will show you what you shall do. '
  - type: note
    content: ch. 9:16
  - type: text
    content: 'And you shall anoint for me him whom I declare to you.” '
  '4':
  - type: text
    content: 'Samuel did what the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded and came to Bethlehem. The elders of the city '
  - type: note
    content: ch. 21:1
  - type: text
    content: 'came to meet him trembling and said, '
  - type: note
    content: 1 Kgs. 2:13; [2 Kgs. 9:22]
  - type: text
    content: '“Do you come peaceably?” '
  '5':
  - type: text
    content: 'And he said, “Peaceably; I have come to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Josh. 3:5
  - type: text
    content: Consecrate yourselves, and come with me to the sacrifice.” And he consecrated Jesse and his sons and invited them to the sacrifice.
  '6':
  - type: text
    content: 'When they came, he looked on '
  - type: note
    content: ch. 17:13
  - type: text
    content: 'Eliab and thought, “Surely the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed is before him.” '
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, '
  - type: note
    content: Ps. 147:10, 11
  - type: text
    content: '“Do not look on his appearance or on the height of his stature, because I have rejected him. For the '
  - type: text
    content: Lord
  - type: text
    content: ' sees not as man sees: man looks on the outward appearance, '
  - type: note
    content: 1 Kgs. 8:39; 1 Chr. 28:9; Ps. 7:9; Jer. 11:20; 17:10; 20:12; [Acts 1:24]
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' looks on the heart.” '
  '8':
  - type: text
    content: 'Then Jesse called '
  - type: note
    content: ch. 17:13
  - type: text
    content: 'Abinadab and made him pass before Samuel. And he said, “Neither has the '
  - type: text
    content: Lord
  - type: text
    content: ' chosen this one.” '
  '9':
  - type: text
    content: 'Then Jesse made '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'Shammah pass by. And he said, “Neither has the '
  - type: text
    content: Lord
  - type: text
    content: ' chosen this one.” '
