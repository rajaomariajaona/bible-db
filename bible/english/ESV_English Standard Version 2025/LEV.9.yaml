document_id: LEV.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Accepts Aaron’s Offering
  - type: text
    content: ' '
  - type: note
    content: Ezek. 43:27
  - type: text
    content: 'On the eighth day Moses called Aaron and his sons and the elders of Israel, '
  '10':
  - type: note
    content: ch. 8:16
  - type: text
    content: 'But the fat and the kidneys and the long lobe of the liver from the sin offering he burned on the altar, '
  - type: note
    content: ch. 4:8
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '11':
  - type: note
    content: ch. 4:11, 12; 8:17
  - type: text
    content: The flesh and the skin he burned up with fire outside the camp.
  '12':
  - type: text
    content: 'Then he killed the burnt offering, and Aaron’s sons handed him the blood, and he '
  - type: note
    content: ch. 1:5; 8:19
  - type: text
    content: 'threw it against the sides of the altar. '
  '13':
  - type: note
    content: ch. 8:20
  - type: text
    content: 'And they handed the burnt offering to him, piece by piece, and the head, and he burned them on the altar. '
  '14':
  - type: note
    content: ch. 8:21
  - type: text
    content: And he washed the entrails and the legs and burned them with the burnt offering on the altar.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ver. 3, 7 ; Heb. 2:17; 5:3
  - type: text
    content: 'Then he presented the people’s offering and took the goat of the sin offering that was for the people and killed it and '
  - type: note
    content: See ch. 6:26
  - type: text
    content: 'offered it as a sin offering, '
  - type: note
    content: ver. 8
  - type: text
    content: 'like the first one. '
  '16':
  - type: text
    content: 'And he presented the burnt offering and offered it '
  - type: note
    content: ch. 1:3, 10
  - type: text
    content: 'according to the '
  - type: note
    content: ch. 5:10
  - type: text
    content: 'rule. '
  '17':
  - type: text
    content: 'And he presented the '
  - type: note
    content: ver. 4; ch. 2:1, 2
  - type: text
    content: 'grain offering, took a handful of it, and burned it on the altar, '
  - type: note
    content: Ex. 29:38, 39
  - type: text
    content: besides the burnt offering of the morning.
  '18':
  - type: text
    content: 'Then he killed the ox and the ram, '
  - type: note
    content: ch. 3:1, 12, 16
  - type: text
    content: 'the sacrifice of peace offerings for the people. And Aaron’s sons handed him the blood, and he threw it against the sides of the altar. '
  '19':
  - type: text
    content: 'But the fat pieces of the ox and of the ram, the fat tail and that which covers '
  - type: note
    content: ch. 3:3, 9, 14; 4:8; 7:3
  - type: text
    content: 'the entrails and the kidneys and the long lobe of the liver— '
  '2':
  - type: text
    content: 'and he said to Aaron, '
  - type: note
    content: ch. 4:3; 8:14; Ex. 29:1
  - type: text
    content: '“Take for yourself a bull calf for a sin offering and '
  - type: note
    content: ch. 8:18
  - type: text
    content: 'a ram for a burnt offering, both without blemish, and offer them before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'they put the fat pieces on the breasts, '
  - type: note
    content: ch. 3:5, 16
  - type: text
    content: 'and he burned the fat pieces on the altar, '
  '21':
  - type: text
    content: 'but the breasts and the right thigh Aaron waved '
  - type: note
    content: Ex. 29:24, 26; See ch. 7:30-34
  - type: text
    content: 'for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', as Moses commanded.'
  '22':
  - type: text
    content: 'Then Aaron '
  - type: note
    content: '[Luke 24:50]'
  - type: text
    content: 'lifted up his hands toward the people and '
  - type: note
    content: Deut. 21:5; See Num. 6:23-27
  - type: text
    content: 'blessed them, and he came down from offering the sin offering and the burnt offering and the peace offerings. '
  '23':
  - type: text
    content: 'And Moses and Aaron went into the tent of meeting, and when they came out they blessed the people, and '
  - type: note
    content: ver. 4, 6
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to all the people. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: '[Judg. 6:21; 13:19, 20; 1 Kgs. 18:38; 1 Chr. 21:26; 2 Chr. 7:1]'
  - type: text
    content: 'fire came out from before the '
  - type: text
    content: Lord
  - type: text
    content: ' and consumed the burnt offering and the pieces of fat on the altar, and when all the people saw it, '
  - type: note
    content: '[Ezra 3:11]'
  - type: text
    content: 'they shouted and '
  - type: note
    content: '[1 Kgs. 18:39; 2 Chr. 7:3]'
  - type: text
    content: fell on their faces.
  '3':
  - type: text
    content: 'And say to the people of Israel, '
  - type: note
    content: ch. 4:23; [Ezra 6:17]
  - type: text
    content: '‘Take a male goat for a sin offering, and a calf and a lamb, both a year old without blemish, for a burnt offering, '
  '4':
  - type: text
    content: 'and an ox and a ram for peace offerings, to sacrifice before the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ver. 17; ch. 2:4
  - type: text
    content: 'a grain offering mixed with oil, for '
  - type: note
    content: ver. 6, 23; Ex. 29:43
  - type: text
    content: 'today the '
  - type: text
    content: Lord
  - type: text
    content: ' will appear to you.’” '
  '5':
  - type: text
    content: 'And they brought what Moses commanded in front of the tent of meeting, and all the congregation drew near and stood before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And Moses said, “This is the thing that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded you to do, that the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' may appear to you.” '
  '7':
  - type: text
    content: 'Then Moses said to Aaron, “Draw near to the altar and '
  - type: note
    content: ch. 4:3; Heb. 5:1-3; 7:27; 9:7
  - type: text
    content: 'offer your sin offering and your burnt offering and '
  - type: note
    content: ch. 4:16, 20
  - type: text
    content: 'make atonement for yourself and for the people, and bring the offering of the people and make atonement for them, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '8':
  - type: text
    content: 'So Aaron drew near to the altar and killed the calf of the sin offering, which was for himself. '
  '9':
  - type: note
    content: ch. 4:6; 8:15
  - type: text
    content: 'And the sons of Aaron presented the blood to him, and he dipped his finger in the blood and '
  - type: note
    content: See ch. 4:7
  - type: text
    content: 'put it on the horns of the altar and poured out the blood at the base of the altar. '
