document_id: REV.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Two Witnesses
  - type: text
    content: 'Then I was given '
  - type: note
    content: ch. 21:15, 16; Ezek. 40:3; Zech. 2:1
  - type: text
    content: 'a measuring rod like a staff, and I was told, “Rise and measure the temple of God and the altar and those who worship there, '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: '[John 16:20]; See ch. 3:10'
  - type: text
    content: 'those who dwell on the earth will rejoice over them and make merry and '
  - type: note
    content: Neh. 8:10, 12; Esth. 9:19, 22
  - type: text
    content: 'exchange presents, because these two prophets '
  - type: note
    content: '[1 Kgs. 18:17]'
  - type: text
    content: 'had been a torment to those who dwell on the earth. '
  '11':
  - type: text
    content: 'But after the three and a half days '
  - type: note
    content: Gen. 2:7; Ezek. 37:5, 9, 10, 14
  - type: text
    content: 'a breath of life from God entered them, and they stood up on their feet, and great fear fell on those who saw them. '
  '12':
  - type: text
    content: 'Then they heard a loud voice from heaven saying to them, '
  - type: note
    content: ch. 4:1
  - type: text
    content: '“Come up here!” And '
  - type: note
    content: '[ch. 12:5; 2 Kgs. 2:11]'
  - type: text
    content: 'they went up to heaven '
  - type: note
    content: '[Acts 1:9]'
  - type: text
    content: 'in a cloud, and their enemies watched them. '
  '13':
  - type: text
    content: 'And at that hour there was '
  - type: note
    content: ch. 6:12
  - type: text
    content: 'a great earthquake, and '
  - type: note
    content: '[ch. 16:19]'
  - type: text
    content: 'a tenth of the city fell. Seven thousand people were killed in the earthquake, and the rest were terrified and '
  - type: note
    content: ch. 14:7; 16:9; 19:7; Josh. 7:19
  - type: text
    content: 'gave glory to '
  - type: note
    content: 2 Chr. 36:23
  - type: text
    content: the God of heaven.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:13; 9:12 ]'
  - type: text
    content: The second woe has passed; behold, the third woe is soon to come.
  - type: heading
    content: The Seventh Trumpet
  '15':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 10:7
  - type: text
    content: 'the seventh angel blew his trumpet, and '
  - type: note
    content: ch. 16:17; 19:1; [Isa. 27:13]
  - type: text
    content: 'there were loud voices in heaven, saying, '
  - type: note
    content: ch. 12:10
  - type: text
    content: '“The kingdom of the world has become the kingdom of our Lord and of '
  - type: note
    content: Ps. 2:2 (Gk.); Luke 9:20
  - type: text
    content: 'his Christ, and '
  - type: note
    content: See Luke 1:33
  - type: text
    content: 'he shall reign forever and ever.” '
  '16':
  - type: text
    content: 'And the twenty-four elders '
  - type: note
    content: ch. 4:4
  - type: text
    content: 'who sit on their thrones before God '
  - type: note
    content: See ch. 4:10
  - type: text
    content: 'fell on their faces and worshiped God, '
  '17':
  - type: text
    content: saying,
  - type: text
    content: “We give thanks to you, Lord God Almighty,
  - type: note
    content: ch. 16:5; [ch. 1:4, 8; 4:8 ]
  - type: text
    content: who is and who was,
  - type: text
    content: for you have taken your great power
  - type: text
    content: 'and '
  - type: note
    content: ch. 19:6; Ps. 97:1
  - type: text
    content: begun to reign.
  '18':
  - type: text
    content: The nations raged,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 2:5; 110:5
  - type: text
    content: your wrath came,
  - type: text
    content: 'and '
  - type: note
    content: ch. 6:10; 20:12; [Dan. 7:10; 2 Thess. 1:6, 7]
  - type: text
    content: the time for the dead to be judged,
  - type: text
    content: and for rewarding your servants, the prophets and saints,
  - type: text
    content: 'and '
  - type: note
    content: ch. 19:5
  - type: text
    content: those who fear your name,
  - type: text
    content: both small and great,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 13:10]'
  - type: text
    content: for destroying the destroyers of the earth.”
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 15:5
  - type: text
    content: 'God’s temple in heaven was opened, and '
  - type: note
    content: See Heb. 9:4
  - type: text
    content: the ark of his covenant was seen within his temple. There were flashes of lightning, rumblings,
  - type: note
    content: Or voices, or sounds
  - type: text
    content: ' peals of thunder, an earthquake, and '
  - type: note
    content: ch. 16:21
  - type: text
    content: heavy hail.
  '2':
  - type: text
    content: 'but do not measure '
  - type: note
    content: Ezek. 40:17, 20
  - type: text
    content: 'the court outside the temple; leave that out, for '
  - type: note
    content: See Luke 21:24
  - type: text
    content: 'it is given over to the nations, and they will trample the holy city for '
  - type: note
    content: ch. 12:6; 13:5
  - type: text
    content: 'forty-two months. '
  '3':
  - type: text
    content: 'And I will grant authority to my two witnesses, and they will prophesy for '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '1,260 days, '
  - type: note
    content: Isa. 20:2
  - type: text
    content: clothed in sackcloth.”
  '4':
  - type: text
    content: 'These are '
  - type: note
    content: Zech. 4:3, 11, 14; [Ps. 52:8; Jer. 11:16]
  - type: text
    content: 'the two olive trees and the two lampstands that stand before the Lord of the earth. '
  '5':
  - type: text
    content: 'And if anyone would harm them, '
  - type: note
    content: '[2 Kgs. 1:10, 12; Jer. 5:14]'
  - type: text
    content: 'fire pours from their mouth and consumes their foes. If anyone would harm them, '
  - type: note
    content: '[Num. 16:29, 35]'
  - type: text
    content: 'this is how he is doomed to be killed. '
  '6':
  - type: text
    content: 'They have the power '
  - type: note
    content: '[1 Kgs. 17:1; Luke 4:25; James 5:17]'
  - type: text
    content: 'to shut the sky, that no rain may fall during the days of their prophesying, and they have power over the waters to turn them into blood and '
  - type: note
    content: '[Ex. 7–10; 1 Sam. 4:8]'
  - type: text
    content: 'to strike the earth with every kind of plague, as often as they desire. '
  '7':
  - type: text
    content: 'And when they have finished their testimony, '
  - type: note
    content: ch. 17:8; [ch. 13:1]
  - type: text
    content: 'the beast that rises from '
  - type: note
    content: See ch. 9:1
  - type: text
    content: the bottomless pit
  - type: note
    content: Or the abyss
  - type: text
    content: ' '
  - type: note
    content: Dan. 7:21
  - type: text
    content: 'will make war on them and conquer them and kill them, '
  '8':
  - type: text
    content: and their dead bodies will lie in the street of the great city that symbolically
  - type: note
    content: Greek spiritually
  - type: text
    content: ' is called '
  - type: note
    content: Isa. 1:10; 3:9
  - type: text
    content: 'Sodom and '
  - type: note
    content: '[Ezek. 23:3, 8, 19, 27]'
  - type: text
    content: 'Egypt, where their Lord was crucified. '
  '9':
  - type: text
    content: 'For three and a half days some from the peoples and tribes and languages and nations will gaze at their dead bodies and '
  - type: note
    content: Ps. 79:2, 3
  - type: text
    content: 'refuse to let them be placed in a tomb, '
