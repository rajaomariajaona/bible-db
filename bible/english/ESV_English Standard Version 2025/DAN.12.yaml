document_id: DAN.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Time of the End
  - type: text
    content: '“At that time shall arise '
  - type: note
    content: See ch. 10:13
  - type: text
    content: 'Michael, the great prince who has charge of your people. And '
  - type: note
    content: Jer. 30:7; Matt. 24:21; Mark 13:19; [Rev. 16:18]
  - type: text
    content: 'there shall be a time of trouble, such as never has been since there was a nation till that time. But at that time your people shall be delivered, '
  - type: note
    content: Ex. 32:32, 33; [Ezek. 13:9; Luke 10:20; Rev. 20:12]
  - type: text
    content: 'everyone whose name shall be found written in the book. '
  '10':
  - type: note
    content: '[ch. 11:35]'
  - type: text
    content: 'Many shall purify themselves and make themselves white and be refined, but '
  - type: note
    content: '[Rev. 9:20; 22:11]'
  - type: text
    content: 'the wicked shall act wickedly. And none of the wicked shall understand, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'but those who are wise shall understand. '
  '11':
  - type: text
    content: 'And from the time that '
  - type: note
    content: ch. 11:31
  - type: text
    content: 'the regular burnt offering is taken away and '
  - type: note
    content: See ch. 11:31
  - type: text
    content: 'the abomination that makes desolate is set up, there shall be 1,290 days. '
  '12':
  - type: note
    content: '[Matt. 10:22]'
  - type: text
    content: 'Blessed is he who waits and arrives at the 1,335 days. '
  '13':
  - type: note
    content: ver. 9
  - type: text
    content: 'But go your way till the end. '
  - type: note
    content: Isa. 57:2; [Rev. 6:11]
  - type: text
    content: 'And you shall rest and shall stand in your allotted place at '
  - type: note
    content: '[Matt. 13:39]'
  - type: text
    content: the end of the days.”
  '2':
  - type: text
    content: 'And many of those who '
  - type: note
    content: '[Ps. 17:15; John 11:11]'
  - type: text
    content: 'sleep in '
  - type: note
    content: '[Isa. 26:19]; See Ezek. 37:1-10'
  - type: text
    content: 'the dust of the earth shall '
  - type: note
    content: '[Isa. 26:19]; See Ezek. 37:1-10'
  - type: text
    content: 'awake, '
  - type: note
    content: Matt. 25:46; John 5:28, 29; Acts 24:15; Rev. 20:12, 13
  - type: text
    content: 'some to everlasting life, and '
  - type: note
    content: Matt. 25:46; John 5:28, 29; Acts 24:15; Rev. 20:12, 13
  - type: text
    content: 'some to shame and everlasting contempt. '
  '3':
  - type: note
    content: ch. 11:33
  - type: text
    content: 'And those who are wise '
  - type: note
    content: Matt. 13:43
  - type: text
    content: shall shine like the brightness of the sky above;
  - type: note
    content: Hebrew the expanse; compare Genesis 1:6–8
  - type: text
    content: ' and '
  - type: note
    content: '[Mal. 2:6]'
  - type: text
    content: 'those who turn many to righteousness, like the stars forever and ever. '
  '4':
  - type: text
    content: 'But you, Daniel, '
  - type: note
    content: '[ver. 9; ch. 8:26]'
  - type: text
    content: 'shut up the words and '
  - type: note
    content: Isa. 8:16; 29:11; Rev. 5:1; 10:4; 22:10
  - type: text
    content: 'seal the book, until '
  - type: note
    content: '[ver. 13]; See ch. 8:17'
  - type: text
    content: 'the time of the end. '
  - type: note
    content: Amos 8:12
  - type: text
    content: Many shall run to and fro, and knowledge shall increase.”
  '5':
  - type: text
    content: 'Then I, Daniel, looked, and behold, two others stood, one on '
  - type: note
    content: '[ch. 10:4]'
  - type: text
    content: 'this bank of the stream and one on that bank of the stream. '
  '6':
  - type: text
    content: 'And someone said to '
  - type: note
    content: ch. 10:5; Ezek. 9:2
  - type: text
    content: the man clothed in linen, who was above the waters of the stream,
  - type: note
    content: Or who was upstream; also verse 7
  - type: text
    content: ' '
  - type: note
    content: ch. 8:13
  - type: text
    content: '“How long shall it be till the end of these wonders?” '
  '7':
  - type: text
    content: 'And I heard '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the man clothed in linen, who was above the waters of the stream; '
  - type: note
    content: See Gen. 14:22
  - type: text
    content: 'he raised his right hand and his left hand toward heaven and '
  - type: note
    content: '[Rev. 10:6]'
  - type: text
    content: 'swore by him who lives forever that it would be for a '
  - type: note
    content: ch. 7:25
  - type: text
    content: 'time, times, and half a time, and that when the shattering of '
  - type: note
    content: '[ch. 8:24]'
  - type: text
    content: 'the power of '
  - type: note
    content: '[ch. 8:24]'
  - type: text
    content: 'the holy people comes to an end all these things would be finished. '
  '8':
  - type: text
    content: 'I heard, '
  - type: note
    content: '[ch. 8:15]'
  - type: text
    content: 'but I did not understand. Then I said, “O my lord, what shall be the outcome of these things?” '
  '9':
  - type: text
    content: 'He said, '
  - type: note
    content: ver. 13
  - type: text
    content: '“Go your way, Daniel, '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'for the words are shut up and sealed until the time of the end. '
