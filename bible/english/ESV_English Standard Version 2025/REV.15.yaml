document_id: REV.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seven Angels with Seven Plagues
  - type: text
    content: 'Then '
  - type: note
    content: '[ch. 12:1, 3]'
  - type: text
    content: 'I saw another sign in heaven, great and amazing, '
  - type: note
    content: ch. 16:1; 17:1; 21:9
  - type: text
    content: seven angels with seven plagues, which are the last, for with them the wrath of God is finished.
  '2':
  - type: text
    content: 'And I saw '
  - type: note
    content: ch. 4:6; 21:18, 21
  - type: text
    content: 'what appeared to be a sea of glass mingled with fire—and also those '
  - type: note
    content: ch. 12:11
  - type: text
    content: 'who had conquered the beast and its image and '
  - type: note
    content: ch. 13:17
  - type: text
    content: 'the number of its name, standing beside the sea of glass '
  - type: note
    content: ch. 5:8; 14:2
  - type: text
    content: 'with harps of God in their hands. '
  '3':
  - type: text
    content: 'And they sing '
  - type: note
    content: Ex. 15:1; Deut. 31:30
  - type: text
    content: 'the song of Moses, '
  - type: note
    content: See Heb. 3:5
  - type: text
    content: the servant of God, and the song of the Lamb, saying,
  - type: note
    content: Deut. 32:3, 4; [ Job 37:5; Ps. 111:2; 139:14; 145:17 ]
  - type: text
    content: “Great and amazing are your deeds,
  - type: text
    content: O Lord God the Almighty!
  - type: note
    content: ch. 16:7; Hos. 14:9
  - type: text
    content: Just and true are your ways,
  - type: text
    content: O King of the nations!
  - type: note
    content: Some manuscripts the ages
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:7; Mal. 2:2
  - type: text
    content: Who will not fear, O Lord,
  - type: text
    content: and glorify your name?
  - type: text
    content: 'For you alone are '
  - type: note
    content: ch. 16:5; Heb. 7:26
  - type: text
    content: holy.
  - type: note
    content: See Ps. 86:9
  - type: text
    content: All nations will come
  - type: text
    content: and worship you,
  - type: text
    content: for your righteous acts have been revealed.”
  '5':
  - type: text
    content: 'After this I looked, and '
  - type: note
    content: ch. 11:19
  - type: text
    content: 'the sanctuary of '
  - type: note
    content: Ex. 38:21; Num. 1:50; Acts 7:44
  - type: text
    content: the tent
  - type: note
    content: Or tabernacle
  - type: text
    content: ' of witness in heaven was opened, '
  '6':
  - type: text
    content: 'and out of the sanctuary came '
  - type: note
    content: See ver. 1
  - type: text
    content: 'the seven angels with the seven plagues, clothed in pure, bright '
  - type: note
    content: ch. 19:8
  - type: text
    content: 'linen, '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'with golden sashes around their chests. '
  '7':
  - type: text
    content: 'And one of '
  - type: note
    content: ch. 4:6
  - type: text
    content: 'the four living creatures gave to the seven angels seven '
  - type: note
    content: '[ch. 5:8]'
  - type: text
    content: 'golden bowls full of the wrath of God '
  - type: note
    content: ch. 1:18; 4:9; 5:13
  - type: text
    content: 'who lives forever and ever, '
  '8':
  - type: text
    content: 'and '
  - type: note
    content: Ex. 40:34; Isa. 6:4; Hag. 2:7; [1 Kgs. 8:10, 11; 2 Chr. 5:13, 14]
  - type: text
    content: 'the sanctuary was filled with smoke from the glory of God and from his power, and '
  - type: note
    content: Ex. 40:35; 1 Kgs. 8:11
  - type: text
    content: no one could enter the sanctuary until the seven plagues of the seven angels were finished.
