document_id: HAB.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Habakkuk’s Prayer
  - type: text
    content: A prayer of Habakkuk the prophet, according to Shigionoth.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ex. 19:18; See Judg. 5:5
  - type: text
    content: The mountains saw you and writhed;
  - type: text
    content: the raging waters swept on;
  - type: note
    content: Ps. 93:3
  - type: text
    content: the deep gave forth its voice;
  - type: note
    content: '[ Ex. 14:22; 15:8 ]'
  - type: text
    content: it lifted its hands on high.
  '11':
  - type: text
    content: ' '
  - type: note
    content: See Josh. 10:12, 13
  - type: text
    content: The sun and moon stood still in their place
  - type: note
    content: '[ver. 5 ]; See 2 Sam. 22:15'
  - type: text
    content: at the light of your arrows as they sped,
  - type: text
    content: at the flash of your glittering spear.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 10:42 ]'
  - type: text
    content: You marched through the earth in fury;
  - type: note
    content: '[ Mic. 4:12, 13 ]'
  - type: text
    content: you threshed the nations in anger.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: You went out for the salvation of your people,
  - type: text
    content: 'for the salvation of '
  - type: note
    content: 1 Chr. 16:22; Ps. 105:15
  - type: text
    content: your anointed.
  - type: note
    content: Ps. 68:21; 110:6
  - type: text
    content: You crushed the head of the house of the wicked,
  - type: text
    content: laying him bare from thigh to neck.
  - type: note
    content: The meaning of the Hebrew line is uncertain
  - type: text
    content: ' '
  - type: text
    content: Selah
  '14':
  - type: text
    content: You pierced with his own arrows the heads of his warriors,
  - type: text
    content: who came like a whirlwind to scatter me,
  - type: text
    content: rejoicing as if to devour the poor in secret.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 77:19 ]'
  - type: text
    content: You trampled the sea with your horses,
  - type: text
    content: the surging of mighty waters.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ver. 2
  - type: text
    content: 'I hear, and '
  - type: note
    content: Jer. 4:19
  - type: text
    content: my body trembles;
  - type: text
    content: my lips quiver at the sound;
  - type: note
    content: '[ Prov. 12:4 ]'
  - type: text
    content: rottenness enters into my bones;
  - type: text
    content: my legs tremble beneath me.
  - type: text
    content: 'Yet '
  - type: note
    content: '[Ps. 94:13; Isa. 14:3, 4]'
  - type: text
    content: I will quietly wait for the day of trouble
  - type: text
    content: to come upon people who invade us.
  - type: heading
    content: Habakkuk Rejoices in the Lord
  '17':
  - type: text
    content: Though the fig tree should not blossom,
  - type: text
    content: nor fruit be on the vines,
  - type: text
    content: the produce of the olive fail
  - type: text
    content: and the fields yield no food,
  - type: text
    content: the flock be cut off from the fold
  - type: text
    content: and there be no herd in the stalls,
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 13:15 ]'
  - type: text
    content: 'yet I will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: Ps. 9:14; 13:5; 21:1; 35:9; Luke 1:47; See Joel 2:23
  - type: text
    content: I will take joy in the God of my salvation.
  '19':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the Lord, is my strength;'
  - type: note
    content: See 2 Sam. 2:18
  - type: text
    content: he makes my feet like the deer’s;
  - type: text
    content: 'he makes me '
  - type: note
    content: Amos 4:13; Mic. 1:3
  - type: text
    content: 'tread on my '
  - type: note
    content: Deut. 32:13; 33:29
  - type: text
    content: high places.
  - type: note
    content: See Ps. 4
  - type: text
    content: 'To the choirmaster: with '
  - type: note
    content: Isa. 38:20
  - type: text
    content: stringed
  - type: note
    content: Hebrew my stringed
  - type: text
    content: ' instruments.'
  '2':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 16; [Ps. 44:1]
  - type: text
    content: I have heard the report of you,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 90:16
  - type: text
    content: 'your work, O '
  - type: text
    content: Lord
  - type: text
    content: ', do I fear.'
  - type: text
    content: 'In the midst of the years '
  - type: note
    content: Ps. 85:6
  - type: text
    content: revive it;
  - type: text
    content: in the midst of the years make it known;
  - type: note
    content: '[ Ps. 77:9 ]'
  - type: text
    content: in wrath remember mercy.
  '3':
  - type: text
    content: 'God came from '
  - type: note
    content: See 1 Chr. 1:45
  - type: text
    content: Teman,
  - type: note
    content: See Deut. 33:2
  - type: text
    content: 'and the Holy One from Mount Paran. '
  - type: text
    content: Selah
  - type: text
    content: His splendor covered the heavens,
  - type: text
    content: and the earth was full of his praise.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See Ezek. 1:27
  - type: text
    content: His brightness was like the light;
  - type: text
    content: rays flashed from his hand;
  - type: text
    content: and there he veiled his power.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 19:35 ]; See Ex. 12:29, 30; 1 Chr. 21:11-15'
  - type: text
    content: Before him went pestilence,
  - type: text
    content: 'and plague followed '
  - type: note
    content: '[Job 18:11]'
  - type: text
    content: at his heels.
  - type: note
    content: Hebrew feet
  '6':
  - type: text
    content: 'He stood '
  - type: note
    content: '[Ps. 60:6]'
  - type: text
    content: and measured the earth;
  - type: text
    content: he looked and shook the nations;
  - type: text
    content: 'then the '
  - type: note
    content: Gen. 49:26; Deut. 33:15
  - type: text
    content: 'eternal mountains '
  - type: note
    content: Mic. 1:4; Nah. 1:5
  - type: text
    content: were scattered;
  - type: text
    content: the everlasting hills sank low.
  - type: text
    content: 'His were '
  - type: note
    content: '[Isa. 51:9]'
  - type: text
    content: the everlasting ways.
  '7':
  - type: text
    content: 'I saw the tents of '
  - type: note
    content: Judg. 3:8
  - type: text
    content: Cushan in affliction;
  - type: note
    content: See Judg. 8:19-21
  - type: text
    content: the curtains of the land of Midian did tremble.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 114:5 ]'
  - type: text
    content: 'Was your wrath against the rivers, O '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Was your anger against the rivers,
  - type: note
    content: '[ Ps. 114:5 ]'
  - type: text
    content: or your indignation against the sea,
  - type: note
    content: Deut. 33:26, 27; Ps. 18:10; 68:4, 17; 104:3; Isa. 19:1; 66:15
  - type: text
    content: when you rode on your horses,
  - type: note
    content: Deut. 33:26, 27; Ps. 18:10; 68:4, 17; 104:3; Isa. 19:1; 66:15
  - type: text
    content: on your chariot of salvation?
  '9':
  - type: text
    content: You stripped the sheath from your bow,
  - type: text
    content: calling for many arrows.
  - type: note
    content: The meaning of the Hebrew line is uncertain
  - type: text
    content: ' '
  - type: text
    content: Selah
  - type: note
    content: Ps. 78:15, 16
  - type: text
    content: You split the earth with rivers.
