document_id: GEN.18,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him by the '
  - type: note
    content: ch. 13:18; 14:13
  - type: text
    content: oaks
  - type: note
    content: Or terebinths
  - type: text
    content: ' of Mamre, as he sat at the door of his tent in the heat of the day. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will surely return to you '
  - type: note
    content: ver. 14; 2 Kgs. 4:16
  - type: text
    content: 'about this time next year, and '
  - type: note
    content: ch. 17:19, 21; 21:2; Cited Rom. 9:9
  - type: text
    content: 'Sarah your wife shall have a son.” And Sarah was listening at the tent door behind him. '
  '11':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 17:17; Rom. 4:19; Heb. 11:11, 12
  - type: text
    content: 'Abraham and Sarah were old, advanced in years. The way of women had ceased to be with Sarah. '
  '12':
  - type: note
    content: '[ch. 17:17]'
  - type: text
    content: 'So Sarah laughed to herself, saying, '
  - type: note
    content: '[Luke 1:18]'
  - type: text
    content: '“After I am worn out, and '
  - type: note
    content: 1 Pet. 3:6
  - type: text
    content: 'my lord is old, shall I have pleasure?” '
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Abraham, “Why did Sarah laugh and say, ‘Shall I indeed bear a child, now that I am old?’ '
  '14':
  - type: note
    content: Job 42:2; Jer. 32:17, 27; Zech. 8:6; Matt. 19:26; Luke 1:37
  - type: text
    content: Is anything too hard
  - type: note
    content: Or wonderful
  - type: text
    content: ' for the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  - type: note
    content: ver. 10
  - type: text
    content: 'At the appointed time I will return to you, about this time next year, and Sarah shall have a son.” '
  '15':
  - type: text
    content: But Sarah denied it,
  - type: note
    content: Or acted falsely
  - type: text
    content: ' saying, “I did not laugh,” for she was afraid. He said, “No, but you did laugh.”'
  '16':
  - type: text
    content: 'Then the men set out from there, and they looked down toward Sodom. And Abraham went with them to set them on their way. '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: '[Ps. 25:14; Amos 3:7; John 15:15]'
  - type: text
    content: '“Shall I hide from Abraham what I am about to do, '
  '18':
  - type: text
    content: 'seeing that Abraham shall surely become a great and mighty nation, and all the nations of the earth shall be '
  - type: note
    content: ch. 12:3; 22:18; 26:4; Acts 3:25; Gal. 3:8
  - type: text
    content: 'blessed in him? '
  '19':
  - type: text
    content: 'For I have '
  - type: note
    content: '[Amos 3:2]'
  - type: text
    content: chosen
  - type: note
    content: Hebrew known
  - type: text
    content: ' him, that he may command his children and his household after him to keep the way of the '
  - type: text
    content: Lord
  - type: text
    content: ' by doing righteousness and justice, so that the '
  - type: text
    content: Lord
  - type: text
    content: ' may bring to Abraham what he has promised him.” '
  '2':
  - type: text
    content: 'He lifted up his eyes and looked, and behold, three men were standing in front of him. '
  - type: note
    content: ch. 19:1; [Heb. 13:2]
  - type: text
    content: 'When he saw them, he ran from the tent door to meet them and bowed himself to the earth '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Because '
  - type: note
    content: ch. 4:10; 19:13; [Isa. 3:9; Ezek. 16:49, 50; James 5:4]
  - type: text
    content: 'the outcry against Sodom and Gomorrah is great and their sin is very grave, '
  '21':
  - type: note
    content: ch. 11:5, 7; Ex. 3:8
  - type: text
    content: I will go down to see whether they have done altogether
  - type: note
    content: Or they deserve destruction; Hebrew they have made a complete end
  - type: text
    content: ' according to the outcry that has come to me. And if not, '
  - type: note
    content: Josh. 22:22
  - type: text
    content: I will know.”
  - type: heading
    content: Abraham Intercedes for Sodom
  '22':
  - type: text
    content: ' '
  - type: note
    content: ver. 16 ; ch. 19:1
  - type: text
    content: 'So the men turned from there and went toward Sodom, but Abraham '
  - type: note
    content: ver. 1; [Ps. 106:23; Jer. 18:20]
  - type: text
    content: 'still stood before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Then Abraham drew near and said, '
  - type: note
    content: ch. 20:4; Num. 16:22; 2 Sam. 24:17
  - type: text
    content: '“Will you indeed sweep away the righteous with the wicked? '
  '24':
  - type: text
    content: 'Suppose there are fifty righteous within the city. Will you then sweep away the place and not spare it for the fifty righteous who are in it? '
  '25':
  - type: text
    content: 'Far be it from you to do such a thing, to put the righteous to death with the wicked, '
  - type: note
    content: '[Job 8:20]'
  - type: text
    content: 'so that the righteous fare as the wicked! Far be that from you! '
  - type: note
    content: Deut. 32:4; Job 8:3; 34:10; Rom. 3:5, 6
  - type: text
    content: 'Shall not the Judge of all the earth do what is just?” '
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Jer. 5:1; Ezek. 22:30; [Isa. 65:8]
  - type: text
    content: “If I find at Sodom fifty righteous in the city, I will spare the whole place for their sake.”
  '27':
  - type: text
    content: 'Abraham answered and said, '
  - type: note
    content: '[Luke 18:1]'
  - type: text
    content: '“Behold, I have undertaken to speak to the Lord, I who am but dust and ashes. '
  '28':
  - type: text
    content: 'Suppose five of the fifty righteous are lacking. Will you destroy the whole city for lack of five?” And he said, “I will not destroy it if I find forty-five there.” '
  '29':
  - type: text
    content: 'Again he spoke to him and said, “Suppose forty are found there.” He answered, “For the sake of forty I will not do it.” '
  '3':
  - type: text
    content: and said, “O Lord,
  - type: note
    content: Or My lord
  - type: text
    content: ' if I have found favor in your sight, do not pass by your servant. '
  '30':
  - type: text
    content: 'Then he said, “Oh let not the Lord be angry, and I will speak. Suppose thirty are found there.” He answered, “I will not do it, if I find thirty there.” '
  '31':
  - type: text
    content: 'He said, “Behold, I have undertaken to speak to the Lord. Suppose twenty are found there.” He answered, “For the sake of twenty I will not destroy it.” '
  '32':
  - type: text
    content: 'Then he said, '
  - type: note
    content: Judg. 6:39
  - type: text
    content: '“Oh let not the Lord be angry, and I will speak again but this once. Suppose ten are found there.” He answered, “For the sake of ten I will not destroy it.” '
  '33':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' went his way, when he had finished speaking to Abraham, and Abraham returned to his place.'
  '4':
  - type: text
    content: 'Let a '
  - type: note
    content: ch. 19:2; 24:32; 43:24; [Luke 7:44; John 13:14]
  - type: text
    content: 'little water be brought, and wash your feet, and rest yourselves under the tree, '
  '5':
  - type: text
    content: 'while I bring a morsel of bread, that '
  - type: note
    content: Judg. 19:5; [Ps. 104:15]
  - type: text
    content: you may refresh yourselves, and after that you may pass on—
  - type: note
    content: ch. 19:8; 33:10
  - type: text
    content: 'since you have come to your servant.” So they said, “Do as you have said.” '
  '6':
  - type: text
    content: And Abraham went quickly into the tent to Sarah and said, “Quick! Three seahs
  - type: note
    content: A seah was about 7.7 quarts or 7.3 liters
  - type: text
    content: ' of fine flour! Knead it, and make cakes.” '
  '7':
  - type: text
    content: 'And Abraham ran to the herd and took a calf, tender and good, and gave it to a young man, who prepared it quickly. '
  '8':
  - type: text
    content: Then he took curds and milk and the calf that he had prepared, and set it before them. And he stood by them under the tree while they ate.
  '9':
  - type: text
    content: 'They said to him, “Where is Sarah your wife?” And he said, “She is '
  - type: note
    content: ch. 24:67
  - type: text
    content: 'in the tent.” '
