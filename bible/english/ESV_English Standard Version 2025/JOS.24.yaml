document_id: JOS.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant Renewal at Shechem
  - type: text
    content: 'Joshua gathered all the tribes of Israel '
  - type: note
    content: ver. 25, 32
  - type: text
    content: 'to Shechem and '
  - type: note
    content: See ch. 23:2
  - type: text
    content: 'summoned the elders, the heads, the judges, and the officers of Israel. And '
  - type: note
    content: 1 Sam. 10:19
  - type: text
    content: 'they presented themselves before God. '
  '10':
  - type: note
    content: Num. 23:11, 20; 24:1, 10
  - type: text
    content: 'but I would not listen to Balaam. '
  - type: note
    content: Num. 23:11, 20; 24:1, 10
  - type: text
    content: 'Indeed, he blessed you. So I delivered you out of his hand. '
  '11':
  - type: note
    content: ch. 3:14, 17; 4:10-13
  - type: text
    content: 'And you went over the Jordan and came to Jericho, '
  - type: note
    content: ch. 6:1; See ch. 10:1-3; 11:1-3
  - type: text
    content: 'and the leaders of Jericho fought against you, and also '
  - type: note
    content: ch. 6:1; See ch. 10:1-3; 11:1-3
  - type: text
    content: 'the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites. And I gave them into your hand. '
  '12':
  - type: text
    content: 'And I sent '
  - type: note
    content: Ex. 23:28; Deut. 7:20
  - type: text
    content: 'the hornet before you, which drove them out before you, the two kings of the Amorites; it was '
  - type: note
    content: Ps. 44:3
  - type: text
    content: 'not by your sword or by your bow. '
  '13':
  - type: text
    content: 'I gave you a land on which you had not labored '
  - type: note
    content: Deut. 6:10, 11; [ch. 11:13]
  - type: text
    content: and cities that you had not built, and you dwell in them. You eat the fruit of vineyards and olive orchards that you did not plant.’
  - type: heading
    content: Choose Whom You Will Serve
  '14':
  - type: text
    content: ' '
  - type: note
    content: Deut. 10:12; 1 Sam. 12:24
  - type: text
    content: '“Now therefore fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him in sincerity and in faithfulness. '
  - type: note
    content: ver. 2, 23
  - type: text
    content: 'Put away the gods that your fathers served beyond the River and in Egypt, and serve the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: note
    content: 1 Kgs. 18:21; Ezek. 20:39
  - type: text
    content: 'And if it is evil in your eyes to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 22
  - type: text
    content: 'choose this day whom you will serve, whether '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'the gods your fathers served in the region beyond the River, or '
  - type: note
    content: Ex. 23:24, 32, 33; 34:15; Deut. 13:7; 29:18; Judg. 6:10
  - type: text
    content: 'the gods of the Amorites in whose land you dwell. '
  - type: note
    content: Gen. 18:19
  - type: text
    content: 'But as for me and my house, we will serve the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '16':
  - type: text
    content: 'Then the people answered, “Far be it from us that we should forsake the '
  - type: text
    content: Lord
  - type: text
    content: ' to serve other gods, '
  '17':
  - type: text
    content: 'for it is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God who brought us and our fathers up from the land of Egypt, out of the house of slavery, and who did those great signs in our sight and preserved us in all the way that we went, and among all the peoples through whom we passed. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before us all the peoples, the Amorites who lived in the land. Therefore we also will serve the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is our God.”'
  '19':
  - type: text
    content: 'But Joshua said to the people, “You are not able to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is '
  - type: note
    content: Lev. 19:2; 1 Sam. 6:20; Ps. 99:5, 9; Isa. 5:16
  - type: text
    content: 'a holy God. He is '
  - type: note
    content: Ex. 20:5; Nah. 1:2
  - type: text
    content: 'a jealous God; '
  - type: note
    content: Ex. 23:21
  - type: text
    content: 'he will not forgive your transgressions or your sins. '
  '2':
  - type: text
    content: 'And Joshua said to all the people, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, ‘Long ago, '
  - type: note
    content: See Gen. 11:27-32
  - type: text
    content: your fathers lived beyond the Euphrates,
  - type: note
    content: Hebrew the River
  - type: text
    content: ' Terah, the father of Abraham and of Nahor; and '
  - type: note
    content: '[Gen. 31:30; 35:2]'
  - type: text
    content: 'they served other gods. '
  '20':
  - type: note
    content: '[1 Chr. 28:9; 2 Chr. 15:2; Ezra 8:22; Isa. 1:28; 65:11, 12; Jer. 17:13]'
  - type: text
    content: 'If you forsake the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve foreign gods, then '
  - type: note
    content: ch. 23:15; Isa. 63:10; [Acts 7:42]
  - type: text
    content: 'he will turn and do you harm and consume you, after having done you good.” '
  '21':
  - type: text
    content: 'And the people said to Joshua, “No, but we will serve the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '22':
  - type: text
    content: 'Then Joshua said to the people, “You are witnesses against yourselves that '
  - type: note
    content: ver. 15
  - type: text
    content: 'you have chosen the '
  - type: text
    content: Lord
  - type: text
    content: ', to serve him.” And they said, “We are witnesses.” '
  '23':
  - type: text
    content: 'He said, “Then '
  - type: note
    content: ver. 14; Judg. 10:16; 1 Sam. 7:3
  - type: text
    content: 'put away the foreign gods that are among you, and incline your heart to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.” '
  '24':
  - type: text
    content: 'And the people said to Joshua, “The '
  - type: text
    content: Lord
  - type: text
    content: ' our God we will serve, and his voice we will obey.” '
  '25':
  - type: text
    content: 'So Joshua '
  - type: note
    content: 2 Kgs. 11:17; 2 Chr. 23:16; Neh. 9:38
  - type: text
    content: 'made a covenant with the people that day, and put in place '
  - type: note
    content: Ex. 15:25
  - type: text
    content: 'statutes and rules for them at Shechem. '
  '26':
  - type: text
    content: 'And Joshua '
  - type: note
    content: Deut. 31:24
  - type: text
    content: 'wrote these words in the Book of the Law of God. And '
  - type: note
    content: '[ch. 4:3; Gen. 28:18]'
  - type: text
    content: 'he took a large stone and set it up there '
  - type: note
    content: Gen. 35:4; Judg. 9:6
  - type: text
    content: 'under the terebinth that was by the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'And Joshua said to all the people, “Behold, '
  - type: note
    content: ch. 22:27, 28, 34; Gen. 31:48, 52; Deut. 31:19, 21, 26
  - type: text
    content: 'this stone shall be a witness against us, for '
  - type: note
    content: '[Deut. 32:1]'
  - type: text
    content: 'it has heard all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he spoke to us. Therefore it shall be a witness against you, lest you deal falsely with your God.” '
  '28':
  - type: text
    content: 'So Joshua '
  - type: note
    content: Judg. 2:6
  - type: text
    content: sent the people away, every man to his inheritance.
  - type: heading
    content: Joshua’s Death and Burial
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-31, see Judg. 2:7-9
  - type: text
    content: 'After these things Joshua the son of Nun, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died, being 110 years old. '
  '3':
  - type: note
    content: See Gen. 12:1-5; Acts 7:2-4
  - type: text
    content: Then I took your father Abraham from beyond the River
  - type: note
    content: That is, the Euphrates; also verses 14, 15
  - type: text
    content: ' and '
  - type: note
    content: Gen. 12:6
  - type: text
    content: 'led him through all the land of Canaan, and made his offspring many. '
  - type: note
    content: Gen. 21:2, 3
  - type: text
    content: 'I gave him Isaac. '
  '30':
  - type: text
    content: 'And they buried him in his own inheritance at '
  - type: note
    content: '[ch. 19:50]'
  - type: text
    content: Timnath-serah, which is in the hill country of Ephraim, north of the mountain of Gaash.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Judg. 2:7
  - type: text
    content: 'Israel served the '
  - type: text
    content: Lord
  - type: text
    content: ' all the days of Joshua, and all the days of the elders who outlived Joshua '
  - type: note
    content: Deut. 11:2; 31:13
  - type: text
    content: 'and had known all the work that the '
  - type: text
    content: Lord
  - type: text
    content: ' did for Israel.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Gen. 50:25; Ex. 13:19
  - type: text
    content: 'As for the bones of Joseph, which the people of Israel brought up from Egypt, they buried them at Shechem, in the piece of land '
  - type: note
    content: Gen. 33:19
  - type: text
    content: that Jacob bought from the sons of Hamor the father of Shechem for a hundred pieces of money.
  - type: note
    content: Hebrew for a hundred qesitah; a unit of money of uncertain value
  - type: text
    content: ' It became an inheritance of the descendants of Joseph.'
  '33':
  - type: text
    content: 'And Eleazar the son of Aaron died, and they buried him at Gibeah, the town of '
  - type: note
    content: ch. 22:13
  - type: text
    content: 'Phinehas his son, which had been given him in '
  - type: note
    content: ver. 30; ch. 17:15
  - type: text
    content: the hill country of Ephraim.
  '4':
  - type: text
    content: 'And to Isaac I gave '
  - type: note
    content: Gen. 25:24-26
  - type: text
    content: 'Jacob and Esau. '
  - type: note
    content: Gen. 36:8; Deut. 2:5
  - type: text
    content: 'And I gave Esau the hill country of Seir to possess, '
  - type: note
    content: Gen. 46:1, 6; Acts 7:15
  - type: text
    content: 'but Jacob and his children went down to Egypt. '
  '5':
  - type: note
    content: Ex. 3:10; 4:14
  - type: text
    content: 'And I sent Moses and Aaron, '
  - type: note
    content: See Ex. 7–12
  - type: text
    content: 'and I plagued Egypt with what I did in the midst of it, and '
  - type: note
    content: Ex. 12:37, 51
  - type: text
    content: afterward I brought you out.
  '6':
  - type: text
    content: '“‘Then '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'I brought your fathers out of Egypt, and '
  - type: note
    content: Ex. 14:2
  - type: text
    content: 'you came to the sea. '
  - type: note
    content: Ex. 14:9
  - type: text
    content: 'And the Egyptians pursued your fathers with chariots and horsemen to the Red Sea. '
  '7':
  - type: note
    content: Ex. 14:10
  - type: text
    content: 'And when they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 14:20
  - type: text
    content: 'he put darkness between you and the Egyptians '
  - type: note
    content: Ex. 14:27, 28
  - type: text
    content: 'and made the sea come upon them and cover them; '
  - type: note
    content: Deut. 4:34; 29:2
  - type: text
    content: 'and your eyes saw what I did in Egypt. '
  - type: note
    content: See ch. 5:6
  - type: text
    content: 'And you lived in the wilderness a long time. '
  '8':
  - type: text
    content: 'Then I brought you to the land of the Amorites, who lived on the other side of the Jordan. '
  - type: note
    content: See Num. 21:21-35
  - type: text
    content: 'They fought with you, and I gave them into your hand, and you took possession of their land, and I destroyed them before you. '
  '9':
  - type: note
    content: '[Judg. 11:25]'
  - type: text
    content: 'Then Balak the son of Zippor, king of Moab, arose and fought against Israel. '
  - type: note
    content: Num. 22:5; Deut. 23:4
  - type: text
    content: 'And he sent and invited Balaam the son of Beor to curse you, '
