  - type: text
    content: you shall set apart shall be 25,000 cubits square, that is, the holy portion together with the property of the city.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 45:7
  - type: text
    content: '“What remains on both sides of the holy portion and of the property of the city shall belong to the prince. Extending from the 25,000 cubits of the holy portion to the east border, and westward from the 25,000 cubits to the west border, parallel to the tribal portions, it shall belong to the prince. '
  - type: note
    content: ver. 8, 10
  - type: text
    content: 'The holy portion with the sanctuary of the temple shall be in its midst. '
  '22':
  - type: text
    content: It shall be separate from the property of the Levites and the property of the city, which are in the midst of that which belongs to the prince. The portion of the prince shall lie between the territory of Judah and the territory of Benjamin.
  '23':
  - type: text
    content: '“As for the rest of the tribes: from the east side to the west, Benjamin, one portion. '
  '24':
  - type: text
    content: 'Adjoining the territory of Benjamin, from the east side to the west, Simeon, one portion. '
  '25':
  - type: text
    content: 'Adjoining the territory of Simeon, from the east side to the west, Issachar, one portion. '
  '26':
  - type: text
    content: 'Adjoining the territory of Issachar, from the east side to the west, Zebulun, one portion. '
  '27':
  - type: text
    content: 'Adjoining the territory of Zebulun, from the east side to the west, Gad, one portion. '
  '28':
  - type: text
    content: 'And adjoining the territory of Gad to the south, the boundary shall run '
  - type: note
