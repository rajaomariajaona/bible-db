    content: 'And the city shall have open land: on the north 250 cubits, on the south 250, on the east 250, and on the west 250. '
  '18':
  - type: text
    content: 'The remainder of the length alongside the holy portion shall be 10,000 cubits to the east, and 10,000 to the west, and it shall be alongside the holy portion. '
  - type: note
    content: '[ch. 45:6]'
  - type: text
    content: 'Its produce shall be food for the workers of the city. '
  '19':
  - type: text
    content: 'And the workers of the city, from all the tribes of Israel, shall till it. '
  '2':
  - type: text
    content: 'Adjoining the territory of Dan, from the east side to the west, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
