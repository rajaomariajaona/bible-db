document_id: HEB.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Supremacy of God’s Son
  - type: text
    content: 'Long ago, at many times and '
  - type: note
    content: '[Num. 12:6, 8; Joel 2:28]'
  - type: text
    content: 'in many ways, God spoke to our fathers by the prophets, '
  '10':
  - type: text
    content: And,
  - type: note
    content: Cited from Ps. 102:25-27
  - type: text
    content: “You, Lord, laid the foundation of the earth in the beginning,
  - type: text
    content: and the heavens are the work of your hands;
  '11':
  - type: text
    content: they will perish, but you remain;
  - type: text
    content: they will all wear out like a garment,
  '12':
  - type: text
    content: like a robe you will roll them up,
  - type: text
    content: like a garment they will be changed.
  - type: note
    content: Some manuscripts omit like a garment
  - type: text
    content: 'But you are '
  - type: note
    content: ch. 13:8
  - type: text
    content: the same,
  - type: text
    content: and your years will have no end.”
  '13':
  - type: text
    content: And to which of the angels has he ever said,
  - type: note
    content: Cited from Ps. 110:1
  - type: text
    content: “Sit at my right hand
  - type: note
    content: ch. 10:13
  - type: text
    content: until I make your enemies a footstool for your feet”?
  '14':
  - type: text
    content: 'Are they not all ministering spirits '
  - type: note
    content: Gen. 19:16; 28:12; 32:1, 2; Judg. 6:11; 13:3; Ps. 34:7; 91:11; 103:20, 21; Dan. 3:28; 6:22; 10:11; Matt. 18:10
  - type: text
    content: 'sent out to serve for the sake of those who are to '
  - type: note
    content: See Matt. 25:34
  - type: text
    content: inherit salvation?
  '2':
  - type: text
    content: 'but '
  - type: note
    content: 1 Pet. 1:20; [ch. 9:26; Acts 2:17]
  - type: text
    content: 'in these last days '
  - type: note
    content: ch. 2:3
  - type: text
    content: 'he has spoken to us by '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'his Son, whom he appointed '
  - type: note
    content: Ps. 2:8; Matt. 21:38; See Matt. 28:18
  - type: text
    content: 'the heir of all things, '
  - type: note
    content: '[ch. 3:3]; See John 1:3'
  - type: text
    content: 'through whom also he created '
  - type: note
    content: ch. 11:3
  - type: text
    content: 'the world. '
  '3':
  - type: text
    content: 'He is the radiance of the glory of God and '
  - type: note
    content: See 2 Cor. 4:4
  - type: text
    content: 'the exact imprint of his nature, and he upholds the universe by the word of his power. '
  - type: note
    content: See ch. 9:14
  - type: text
    content: 'After making purification for sins, '
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'he sat down '
  - type: note
    content: '[Luke 22:69]'
  - type: text
    content: 'at the right hand of the Majesty on high, '
  '4':
  - type: text
    content: 'having become as much superior to angels as the name '
  - type: note
    content: Eph. 1:21; Phil. 2:9
  - type: text
    content: he has inherited is more excellent than theirs.
  '5':
  - type: text
    content: For to which of the angels did God ever say,
  - type: note
    content: ch. 5:5; Acts 13:33; Cited from Ps. 2:7
  - type: text
    content: “You are my Son,
  - type: text
    content: today I have begotten you”?
  - type: text
    content: Or again,
  - type: note
    content: Cited from 2 Sam. 7:14; [ Ps. 89:26, 27 ]
  - type: text
    content: “I will be to him a father,
  - type: text
    content: and he shall be to me a son”?
  '6':
  - type: text
    content: 'And again, when he brings '
  - type: note
    content: See Rom. 8:29
  - type: text
    content: the firstborn into the world, he says,
  - type: note
    content: Cited from Deut. 32:43 (Gk.); [ Ps. 97:7 ]
  - type: text
    content: “Let all God’s angels worship him.”
  '7':
  - type: text
    content: Of the angels he says,
  - type: note
    content: Cited from Ps. 104:4
  - type: text
    content: “He makes his angels winds,
  - type: text
    content: and his ministers a flame of fire.”
  '8':
  - type: text
    content: But of the Son he says,
  - type: note
    content: Cited from Ps. 45:6, 7
  - type: text
    content: “Your throne, O God, is forever and ever,
  - type: text
    content: the scepter of uprightness is the scepter of your kingdom.
  '9':
  - type: text
    content: You have loved righteousness and hated wickedness;
  - type: text
    content: 'therefore God, your God, '
  - type: note
    content: Isa. 61:1
  - type: text
    content: has anointed you
  - type: text
    content: 'with '
  - type: note
    content: Isa. 61:3
  - type: text
    content: the oil of gladness beyond your companions.”
