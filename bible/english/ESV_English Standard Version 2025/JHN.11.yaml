document_id: JHN.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Lazarus
  - type: text
    content: 'Now a certain man was ill, Lazarus of Bethany, the village of '
  - type: note
    content: See Luke 10:38, 39
  - type: text
    content: 'Mary and her sister Martha. '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: Jer. 13:16
  - type: text
    content: 'if anyone walks in the night, he stumbles, because the light is not '
  - type: note
    content: Jer. 13:16
  - type: text
    content: in him.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'After saying these things, he said to them, '
  - type: text
    content: '“Our friend Lazarus '
  - type: note
    content: See Matt. 27:52
  - type: text
    content: has fallen asleep, but I go to awaken him.”
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'The disciples said to him, “Lord, if he has fallen asleep, he will recover.” '
  '13':
  - type: text
    content: 'Now Jesus had spoken of his death, but they thought that he meant taking rest in sleep. '
  '14':
  - type: text
    content: 'Then Jesus told them plainly, '
  - type: text
    content: “Lazarus has died,
  - type: text
    content: ' '
  '15':
  - type: text
    content: and for your sake I am glad that I was not there, so that you may believe. But let us go to him.”
  - type: text
    content: ' '
  '16':
  - type: note
    content: ch. 14:5; 20:24, 26-28; 21:2; Matt. 10:3; Mark 3:18; Luke 6:15; Acts 1:13
  - type: text
    content: So Thomas, called the Twin,
  - type: note
    content: Greek Didymus
  - type: text
    content: ' said to his fellow disciples, “Let us also go, '
  - type: note
    content: '[ch. 13:37]'
  - type: text
    content: that we may die with him.”
  - type: heading
    content: I Am the Resurrection and the Life
  '17':
  - type: text
    content: 'Now when Jesus came, he found that Lazarus had already been in the tomb '
  - type: note
    content: ver. 39
  - type: text
    content: 'four days. '
  '18':
  - type: text
    content: Bethany was near Jerusalem, about two miles
  - type: note
    content: Greek fifteen stadia; a stadion was about 607 feet or 185 meters
  - type: text
    content: ' off, '
  '19':
  - type: text
    content: 'and many of the Jews had come to Martha and Mary '
  - type: note
    content: ver. 31; Job 2:11
  - type: text
    content: 'to console them concerning their brother. '
  '2':
  - type: note
    content: ch. 12:3
  - type: text
    content: 'It was Mary who anointed the Lord with ointment and wiped his feet with her hair, whose brother Lazarus was ill. '
  '20':
  - type: note
    content: '[Luke 10:38, 39]'
  - type: text
    content: 'So when Martha heard that Jesus was coming, she went and met him, but Mary remained seated in the house. '
  '21':
  - type: text
    content: 'Martha said to '
  - type: note
    content: ver. 32
  - type: text
    content: 'Jesus, “Lord, '
  - type: note
    content: '[ver. 37]'
  - type: text
    content: 'if you had been here, my brother would not have died. '
  '22':
  - type: text
    content: 'But even now I know that whatever you ask from God, '
  - type: note
    content: '[ver. 42; ch. 9:31]'
  - type: text
    content: 'God will give you.” '
  '23':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Your brother will rise again.”
  - type: text
    content: ' '
  '24':
  - type: note
    content: '[ver. 39]'
  - type: text
    content: 'Martha said to him, “I know that he will rise again in '
  - type: note
    content: ch. 5:29; Luke 14:14; See ch. 6:39
  - type: text
    content: 'the resurrection on the last day.” '
  '25':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: '[ch. 5:21; 6:40, 44; 1 Cor. 15:21]'
  - type: text
    content: '“I am the resurrection and '
  - type: note
    content: ch. 14:6; [ch. 6:57; Col. 3:4]; See ch. 1:4
  - type: text
    content: the life.
  - type: note
    content: Some manuscripts omit and the life
  - type: text
    content: ' '
  - type: text
    content: 'Whoever believes in me, '
  - type: note
    content: '[ch. 12:25]'
  - type: text
    content: 'though he die, '
  - type: note
    content: See ch. 3:36
  - type: text
    content: yet shall he live,
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'and everyone who lives and believes in me '
  - type: note
    content: ch. 6:50, 51; 8:51
  - type: text
    content: shall never die. Do you believe this?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'She said to him, “Yes, Lord; '
  - type: note
    content: ch. 6:69; 20:31; 1 John 5:1, 5; [ch. 8:24; 13:19; 1 John 4:16]
  - type: text
    content: 'I believe that '
  - type: note
    content: Matt. 16:16
  - type: text
    content: 'you are the Christ, the Son of God, '
  - type: note
    content: ch. 6:14; See Matt. 11:3
  - type: text
    content: who is coming into the world.”
  - type: heading
    content: Jesus Weeps
  '28':
  - type: text
    content: 'When she had said this, she went and called her sister Mary, saying in private, '
  - type: note
    content: Matt. 26:18; Mark 14:14; Luke 22:11; See ch. 13:13
  - type: text
    content: '“The Teacher is here and is calling for you.” '
  '29':
  - type: text
    content: 'And when she heard it, she rose quickly and went to him. '
  '3':
  - type: text
    content: 'So the sisters sent to him, saying, “Lord, '
  - type: note
    content: ver. 5, 11, 36
  - type: text
    content: 'he whom you love is ill.” '
  '30':
  - type: text
    content: 'Now Jesus had not yet come into the village, but was still in the place where Martha had met him. '
  '31':
  - type: text
    content: 'When the Jews '
  - type: note
    content: ver. 19
  - type: text
    content: 'who were with her in the house, consoling her, saw Mary rise quickly and go out, they followed her, supposing that she was going to the tomb to weep there. '
  '32':
  - type: text
    content: 'Now when Mary came to where Jesus was and saw him, she fell at his feet, saying to him, '
  - type: note
    content: ver. 21
  - type: text
    content: '“Lord, if you had been here, my brother would not have died.” '
  '33':
  - type: text
    content: 'When Jesus saw her weeping, and the Jews who had come with her also weeping, he '
  - type: note
    content: ver. 38; Mark 14:5 (Gk.)
  - type: text
    content: was deeply moved
  - type: note
    content: Or was indignant; also verse 38
  - type: text
    content: ' in his spirit and '
  - type: note
    content: ch. 12:27; 13:21
  - type: text
    content: 'greatly troubled. '
  '34':
  - type: text
    content: 'And he said, '
  - type: text
    content: “Where have you laid him?”
  - type: text
    content: ' They said to him, “Lord, come and see.” '
  '35':
  - type: note
    content: '[Luke 19:41]'
  - type: text
    content: 'Jesus wept. '
  '36':
  - type: text
    content: 'So the Jews said, “See '
  - type: note
    content: ver. 3
  - type: text
    content: 'how he loved him!” '
  '37':
  - type: text
    content: 'But some of them said, “Could not he '
  - type: note
    content: ch. 9:6, 7
  - type: text
    content: 'who opened the eyes of the blind man '
  - type: note
    content: '[ver. 21, 32]'
  - type: text
    content: also have kept this man from dying?”
  - type: heading
    content: Jesus Raises Lazarus
  '38':
  - type: text
    content: 'Then Jesus, '
  - type: note
    content: ver. 33
  - type: text
    content: 'deeply moved again, came to the tomb. It was '
  - type: note
    content: Isa. 22:16
  - type: text
    content: 'a cave, and '
  - type: note
    content: ch. 20:1; Matt. 27:60; Mark 15:46; Luke 24:2
  - type: text
    content: 'a stone lay against it. '
  '39':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Take away the stone.”
  - type: text
    content: ' Martha, the sister of the dead man, said to him, “Lord, by this time there will be an odor, for '
  - type: note
    content: ver. 17
  - type: text
    content: 'he has been dead four days.” '
  '4':
  - type: text
    content: 'But when Jesus heard it he said, '
  - type: note
    content: '[ver. 11; Matt. 9:24]'
  - type: text
    content: '“This illness does not lead to death. It is for '
  - type: note
    content: ver. 40; [ch. 9:3; 13:31]
  - type: text
    content: the glory of God, so that the Son of God may be glorified through it.”
  '40':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: ver. 25, 26
  - type: text
    content: '“Did I not tell you that if you believed you would see '
  - type: note
    content: ver. 4; [Rom. 6:4]
  - type: text
    content: the glory of God?”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'So they took away the stone. And Jesus '
  - type: note
    content: ch. 17:1
  - type: text
    content: 'lifted up his eyes and said, '
  - type: text
    content: “Father, I thank you that you have heard me.
  - type: text
    content: ' '
  '42':
  - type: note
    content: '[ver. 22; Matt. 26:53]'
  - type: text
    content: 'I knew that you always hear me, but I said this '
  - type: note
    content: ch. 12:29, 30
  - type: text
    content: 'on account of the people standing around, '
  - type: note
    content: ch. 17:8, 21; See ch. 3:17
  - type: text
    content: that they may believe that you sent me.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'When he had said these things, he cried out with a loud voice, '
  - type: text
    content: “Lazarus, come out.”
  - type: text
    content: ' '
  '44':
  - type: note
    content: ch. 5:28, 29
  - type: text
    content: 'The man who had died came out, '
  - type: note
    content: ch. 19:40
  - type: text
    content: 'his hands and feet bound with linen strips, and '
  - type: note
    content: '[ch. 20:7]'
  - type: text
    content: 'his face wrapped with a cloth. Jesus said to them, '
  - type: text
    content: “Unbind him, and let him go.”
  - type: heading
    content: The Plot to Kill Jesus
  '45':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:11; [ Acts 9:42 ]
  - type: text
    content: 'Many of the Jews therefore, '
  - type: note
    content: ver. 19
  - type: text
    content: 'who had come with Mary and '
  - type: note
    content: ch. 2:23
  - type: text
    content: 'had seen what he did, believed in him, '
  '46':
  - type: text
    content: 'but some of them went to the Pharisees and told them what Jesus had done. '
  '47':
  - type: text
    content: 'So the chief priests and the Pharisees '
  - type: note
    content: See Matt. 26:3
  - type: text
    content: 'gathered '
  - type: note
    content: See Matt. 5:22
  - type: text
    content: 'the council and said, '
  - type: note
    content: ch. 12:19; [Acts 4:16]
  - type: text
    content: '“What are we to do? For this man performs many signs. '
  '48':
  - type: text
    content: 'If we let him go on like this, everyone will believe in him, and '
  - type: note
    content: '[ch. 6:15; 18:36, 37]'
  - type: text
    content: 'the Romans will come and take away both our '
  - type: note
    content: Acts 21:28
  - type: text
    content: 'place and our nation.” '
  '49':
  - type: text
    content: 'But one of them, '
  - type: note
    content: See Matt. 26:3
  - type: text
    content: 'Caiaphas, '
  - type: note
    content: ver. 51; ch. 18:13
  - type: text
    content: 'who was high priest that year, said to them, “You know nothing at all. '
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 3
  - type: text
    content: 'Jesus loved Martha and her sister and Lazarus. '
  '50':
  - type: text
    content: 'Nor do you understand that '
  - type: note
    content: ch. 18:14
  - type: text
    content: 'it is better for you that one man should die for the people, not that the whole nation should perish.” '
  '51':
  - type: text
    content: 'He did not say this of his own accord, but '
  - type: note
    content: ver. 49
  - type: text
    content: 'being high priest that year '
  - type: note
    content: '[Ex. 28:30; Num. 27:21; 1 Sam. 23:9; 30:7; Ezra 2:63; Neh. 7:65]'
  - type: text
    content: 'he prophesied that Jesus would die for the nation, '
  '52':
  - type: text
    content: 'and '
  - type: note
    content: Isa. 49:6; 1 John 2:2
  - type: text
    content: 'not for the nation only, but also '
  - type: note
    content: See ch. 10:16
  - type: text
    content: 'to gather into one the children of God who are scattered abroad. '
  '53':
  - type: text
    content: 'So from that day on they '
  - type: note
    content: See ch. 7:1
  - type: text
    content: made plans to put him to death.
  '54':
  - type: text
    content: 'Jesus therefore '
  - type: note
    content: ch. 7:1, 4
  - type: text
    content: no longer walked openly among the Jews, but went from there to the region near the wilderness, to a town called Ephraim, and there he stayed with the disciples.
  '55':
  - type: text
    content: 'Now '
  - type: note
    content: See ch. 6:4
  - type: text
    content: 'the Passover of the Jews was at hand, and '
  - type: note
    content: Luke 2:42
  - type: text
    content: 'many went up from the country to Jerusalem before the Passover '
  - type: note
    content: 2 Chr. 30:17, 18; [ch. 18:28; Acts 21:24]
  - type: text
    content: 'to purify themselves. '
  '56':
  - type: note
    content: See ch. 7:11
  - type: text
    content: They were looking for
  - type: note
    content: Greek were seeking for
  - type: text
    content: ' Jesus and saying to one another as they stood in the temple, “What do you think? That he will not come to the feast at all?” '
  '57':
  - type: text
    content: Now the chief priests and the Pharisees had given orders that if anyone knew where he was, he should let them know, so that they might arrest him.
  '6':
  - type: text
    content: So, when he heard that Lazarus
  - type: note
    content: Greek he; also verse 17
  - type: text
    content: ' was ill, '
  - type: note
    content: '[ch. 2:4; 7:6, 8]'
  - type: text
    content: 'he stayed two days longer in the place where he was. '
  '7':
  - type: text
    content: 'Then after this he said to the disciples, '
  - type: note
    content: ch. 10:40
  - type: text
    content: “Let us go to Judea again.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'The disciples said to him, '
  - type: note
    content: See ch. 1:38
  - type: text
    content: '“Rabbi, '
  - type: note
    content: ch. 8:59; 10:31
  - type: text
    content: 'the Jews were just now seeking to stone you, and are you going there again?” '
  '9':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: '[Luke 13:33]'
  - type: text
    content: '“Are there not twelve hours in the day? '
  - type: note
    content: See ch. 9:4; 1 John 2:10
  - type: text
    content: If anyone walks in the day, he does not stumble, because he sees the light of this world.
  - type: text
    content: ' '
