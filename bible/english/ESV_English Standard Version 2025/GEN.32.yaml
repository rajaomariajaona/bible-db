document_id: GEN.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Fears Esau
  - type: text
    content: 'Jacob went on his way, and the angels of God met him. '
  '10':
  - type: note
    content: '[2 Sam. 7:18]'
  - type: text
    content: 'I am not worthy of the least of all the deeds of steadfast love and all the faithfulness that you have shown to your servant, for with only my staff I crossed this Jordan, and now I have become two camps. '
  '11':
  - type: text
    content: 'Please deliver me from the hand of my brother, from the hand of Esau, for '
  - type: note
    content: '[Prov. 18:19]'
  - type: text
    content: 'I fear him, that he may come and attack me, the mothers with the children. '
  '12':
  - type: text
    content: 'But '
  - type: note
    content: ch. 28:13-15
  - type: text
    content: you said, ‘I will surely do you good, and make your offspring as the sand of the sea, which cannot be numbered for multitude.’”
  '13':
  - type: text
    content: 'So he stayed there that night, and from what he had with him he took '
  - type: note
    content: ch. 43:11; [Prov. 17:8; 18:16; 19:6; 21:14]
  - type: text
    content: 'a present for his brother Esau, '
  '14':
  - type: text
    content: 'two hundred female goats and twenty male goats, two hundred ewes and twenty rams, '
  '15':
  - type: text
    content: 'thirty milking camels and their calves, forty cows and ten bulls, twenty female donkeys and ten male donkeys. '
  '16':
  - type: text
    content: 'These he handed over to his servants, every drove by itself, and said to his servants, “Pass on ahead of me and put a space between drove and drove.” '
  '17':
  - type: text
    content: 'He instructed the first, “When Esau my brother meets you and asks you, ‘To whom do you belong? Where are you going? And whose are these ahead of you?’ '
  '18':
  - type: text
    content: 'then you shall say, ‘They belong to your servant Jacob. They are a present sent to my lord Esau. And moreover, he is behind us.’” '
  '19':
  - type: text
    content: 'He likewise instructed the second and the third and all who followed the droves, “You shall say the same thing to Esau when you find him, '
  '2':
  - type: text
    content: 'And when Jacob saw them he said, “This is God’s '
  - type: note
    content: '[Josh. 5:14; Luke 2:13]'
  - type: text
    content: 'camp!” So he called the name of that place '
  - type: note
    content: Josh. 21:38; 2 Sam. 2:8; 17:24, 27; 1 Kgs. 2:8
  - type: text
    content: Mahanaim.
  - type: note
    content: Mahanaim means two camps
  '20':
  - type: text
    content: and you shall say, ‘Moreover, your servant Jacob is behind us.’” For he thought, “I may appease him
  - type: note
    content: Hebrew appease his face
  - type: text
    content: ' with the present that goes ahead of me, and afterward I shall see his face. Perhaps he will accept me.”'
  - type: note
    content: Hebrew he will lift my face
  - type: text
    content: ' '
  '21':
  - type: text
    content: So the present passed on ahead of him, and he himself stayed that night in the camp.
  - type: heading
    content: Jacob Wrestles with God
  '22':
  - type: text
    content: The same night he arose and took his two wives, his two female servants, and his eleven children,
  - type: note
    content: Or sons
  - type: text
    content: ' and crossed the ford of the '
  - type: note
    content: Deut. 2:37; 3:16; Josh. 12:2
  - type: text
    content: 'Jabbok. '
  '23':
  - type: text
    content: 'He took them and sent them across the stream, and everything else that he had. '
  '24':
  - type: text
    content: 'And Jacob was left alone. And '
  - type: note
    content: Hos. 12:3, 4
  - type: text
    content: 'a man wrestled with him until the breaking of the day. '
  '25':
  - type: text
    content: 'When the man saw that he did not prevail against Jacob, he touched his hip socket, and Jacob’s hip was put out of joint as he wrestled with him. '
  '26':
  - type: text
    content: 'Then he said, “Let me go, for the day has broken.” But Jacob said, '
  - type: note
    content: '[Luke 18:1]; See Matt. 15:21-28'
  - type: text
    content: '“I will not let you go unless you bless me.” '
  '27':
  - type: text
    content: 'And he said to him, “What is your name?” And he said, “Jacob.” '
  '28':
  - type: text
    content: 'Then he said, '
  - type: note
    content: ch. 35:10; 2 Kgs. 17:34
  - type: text
    content: “Your name shall no longer be called Jacob, but Israel,
  - type: note
    content: Israel means He strives with God, or God strives
  - type: text
    content: ' for '
  - type: note
    content: Hos. 12:3, 4
  - type: text
    content: 'you have striven with God and '
  - type: note
    content: ch. 33:4
  - type: text
    content: 'with men, and have prevailed.” '
  '29':
  - type: text
    content: 'Then Jacob asked him, “Please tell me your name.” But he said, '
  - type: note
    content: Judg. 13:18
  - type: text
    content: '“Why is it that you ask my name?” And there he blessed him. '
  '3':
  - type: text
    content: And Jacob sent
  - type: note
    content: Or had sent
  - type: text
    content: ' messengers before him to Esau his brother in the land of '
  - type: note
    content: ch. 36:8, 9; Deut. 2:5; Josh. 24:4
  - type: text
    content: 'Seir, the country of Edom, '
  '30':
  - type: text
    content: So Jacob called the name of the place Peniel,
  - type: note
    content: Peniel means the face of God
  - type: text
    content: ' saying, “For '
  - type: note
    content: ch. 16:13; Ex. 24:10, 11; Deut. 5:24; Judg. 6:22; 13:22; [Ex. 33:20; Isa. 6:5]
  - type: text
    content: 'I have seen God face to face, and yet my life has been delivered.” '
  '31':
  - type: text
    content: 'The sun rose upon him as he passed '
  - type: note
    content: Judg. 8:8, 17; 1 Kgs. 12:25
  - type: text
    content: 'Penuel, limping because of his hip. '
  '32':
  - type: text
    content: Therefore to this day the people of Israel do not eat the sinew of the thigh that is on the hip socket, because he touched the socket of Jacob’s hip on the sinew of the thigh.
  '4':
  - type: text
    content: 'instructing them, “Thus you shall say to my lord Esau: Thus says your servant Jacob, ‘I have sojourned with Laban and stayed until now. '
  '5':
  - type: text
    content: 'I have oxen, donkeys, flocks, male servants, and female servants. I have sent to tell my lord, in order that '
  - type: note
    content: ch. 33:8, 15
  - type: text
    content: I may find favor in your sight.’”
  '6':
  - type: text
    content: 'And the messengers returned to Jacob, saying, “We came to your brother Esau, and '
  - type: note
    content: ch. 33:1
  - type: text
    content: 'he is coming to meet you, and there are four hundred men with him.” '
  '7':
  - type: text
    content: 'Then Jacob was '
  - type: note
    content: ch. 35:3
  - type: text
    content: 'greatly afraid and distressed. He divided the people who were with him, and the flocks and herds and camels, into two camps, '
  '8':
  - type: text
    content: thinking, “If Esau comes to the one camp and attacks it, then the camp that is left will escape.”
  '9':
  - type: text
    content: 'And Jacob said, '
  - type: note
    content: ch. 28:13; 31:42, 53
  - type: text
    content: '“O God of my father Abraham and God of my father Isaac, O '
  - type: text
    content: Lord
  - type: text
    content: ' who '
  - type: note
    content: ch. 31:3, 13
  - type: text
    content: 'said to me, ‘Return to your country and to your kindred, that I may do you good,’ '
