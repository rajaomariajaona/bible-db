        children:
        - type: text
          text: 17:51
      marker-yv: yv-n
    - type: text
      text: '“The sword of Goliath the Philistine, whom you struck down in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:2
      marker-yv: yv-n
    - type: text
      text: the Valley of Elah, behold, it is here wrapped in a cloth behind the ephod. If you will take that, take it, for there is none but that here.” And David said, “There is none like that; give it to me.”
