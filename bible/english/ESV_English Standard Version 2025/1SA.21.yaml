document_id: 1SA.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David and the Holy Bread
  - type: text
    content: ' '
  - type: note
    content: Ch 21:2 in Hebrew
  - type: text
    content: 'Then David came to '
  - type: note
    content: ch. 22:9, 11, 19; Neh. 11:32; Isa. 10:32
  - type: text
    content: 'Nob, to '
  - type: note
    content: '[ch. 14:3; Mark 2:26]'
  - type: text
    content: 'Ahimelech the priest. And Ahimelech '
  - type: note
    content: '[ch. 16:4]'
  - type: text
    content: 'came to meet David, trembling, and said to him, “Why are you alone, and no one with you?” '
  '10':
  - type: text
    content: 'And David rose and fled that day from Saul and went to '
  - type: note
    content: See Ps. 34
  - type: text
    content: 'Achish the king of Gath. '
  '11':
  - type: text
    content: 'And the servants of Achish said to him, “Is not this David the king of the land? '
  - type: note
    content: ch. 18:7; 29:5
  - type: text
    content: Did they not sing to one another of him in dances,
  - type: text
    content: ‘Saul has struck down his thousands,
  - type: text
    content: and David his ten thousands’?”
  '12':
  - type: text
    content: 'And David '
  - type: note
    content: '[Luke 2:19]'
  - type: text
    content: 'took these words to heart and was much afraid of Achish the king of Gath. '
  '13':
  - type: text
    content: 'So he changed his behavior before them and pretended to be insane in their hands and made marks on the doors of the gate and let his spittle run down his beard. '
  '14':
  - type: text
    content: 'Then Achish said to his servants, “Behold, you see the man is mad. Why then have you brought him to me? '
  '15':
  - type: text
    content: Do I lack madmen, that you have brought this fellow to behave as a madman in my presence? Shall this fellow come into my house?”
  '2':
  - type: text
    content: 'And David said to Ahimelech the priest, “The king has charged me with a matter and said to me, ‘Let no one know anything of the matter about which I send you, and with which I have charged you.’ I have made an appointment with the young men for such and such a place. '
  '3':
  - type: text
    content: 'Now then, what do you have on hand? Give me five loaves of bread, or whatever is here.” '
  '4':
  - type: text
    content: 'And the priest answered David, “I have no common bread on hand, but there is '
  - type: note
    content: Ex. 25:30; Lev. 24:5; Matt. 12:3, 4; Mark 2:25, 26; Luke 6:3, 4
  - type: text
    content: holy bread—
  - type: note
    content: Ex. 19:15
  - type: text
    content: 'if the young men have kept themselves from women.” '
  '5':
  - type: text
    content: 'And David answered the priest, “Truly women have been kept from us as always when I go on an expedition. The vessels of the young men are holy even when it is an ordinary journey. How much more today will their vessels be holy?” '
  '6':
  - type: text
    content: 'So the priest gave him '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'the holy bread, for there was no bread there but the bread of the Presence, '
  - type: note
    content: Lev. 24:8, 9
  - type: text
    content: 'which is removed from before the '
  - type: text
    content: Lord
  - type: text
    content: ', to be replaced by hot bread on the day it is taken away.'
  '7':
  - type: text
    content: 'Now a certain man of the servants of Saul was there that day, detained before the '
  - type: text
    content: Lord
  - type: text
    content: '. His name was '
  - type: note
    content: ch. 22:9; See Ps. 52
  - type: text
    content: Doeg the Edomite, the chief of Saul’s herdsmen.
  '8':
  - type: text
    content: 'Then David said to Ahimelech, “Then have you not here a spear or a sword at hand? For I have brought neither my sword nor my weapons with me, because the king’s business required haste.” '
  '9':
  - type: text
    content: 'And the priest said, '
  - type: note
    content: ch. 17:51
  - type: text
    content: '“The sword of Goliath the Philistine, whom you struck down in '
  - type: note
    content: ch. 17:2
  - type: text
    content: the Valley of Elah, behold, it is here wrapped in a cloth behind the ephod. If you will take that, take it, for there is none but that here.” And David said, “There is none like that; give it to me.”
  - type: heading
    content: David Flees to Gath
