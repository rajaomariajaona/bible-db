      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: holy bread—
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 19:15
      marker-yv: yv-n
    - type: text
      text: 'if the young men have kept themselves from women.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David answered the priest, “Truly women have been kept from us as always when I go on an expedition. The vessels of the young men are holy even when it is an ordinary journey. How much more today will their vessels be holy?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the priest gave him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
