    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to be replaced by hot bread on the day it is taken away.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now a certain man of the servants of Saul was there that day, detained before the '
    - type: usfm
      marker: nd
      children:
