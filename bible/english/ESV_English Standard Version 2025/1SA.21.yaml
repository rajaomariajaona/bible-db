        - type: text
          text: 29:5
      marker-yv: yv-n
    - type: text
      text: Did they not sing to one another of him in dances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Saul has struck down his thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and David his ten thousands’?”
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And David '
    - type: usfm
      marker: x
      children:
      - type: usfm
