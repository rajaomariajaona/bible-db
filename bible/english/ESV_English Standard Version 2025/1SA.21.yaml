      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'took these words to heart and was much afraid of Achish the king of Gath. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So he changed his behavior before them and pretended to be insane in their hands and made marks on the doors of the gate and let his spittle run down his beard. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Achish said to his servants, “Behold, you see the man is mad. Why then have you brought him to me? '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Do I lack madmen, that you have brought this fellow to behave as a madman in my presence? Shall this fellow come into my house?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Ahimelech the priest, “The king has charged me with a matter and said to me, ‘Let no one know anything of the matter about which I send you, and with which I have charged you.’ I have made an appointment with the young men for such and such a place. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now then, what do you have on hand? Give me five loaves of bread, or whatever is here.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest answered David, “I have no common bread on hand, but there is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 24:5
      - type: text
