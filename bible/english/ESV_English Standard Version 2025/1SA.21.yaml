  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said to Ahimelech, “Then have you not here a spear or a sword at hand? For I have brought neither my sword nor my weapons with me, because the king’s business required haste.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest said, '
    - type: usfm
      marker: x
      children:
