document_id: 1KI.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahab and the False Prophets
  - type: text
    content: 'For three years Syria and Israel continued without war. '
  '10':
  - type: text
    content: 'Now the king of Israel and Jehoshaphat the king of Judah were sitting on their thrones, arrayed in their robes, at the threshing floor '
  - type: note
    content: See Ruth 4:1
  - type: text
    content: 'at the entrance of the gate of Samaria, and all the prophets were prophesying before them. '
  '11':
  - type: text
    content: 'And Zedekiah the son of Chenaanah made for himself '
  - type: note
    content: '[Zech. 1:18, 19]'
  - type: text
    content: 'horns of iron and said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘With these '
  - type: note
    content: '[Deut. 33:17]'
  - type: text
    content: 'you shall push the Syrians until they are destroyed.’” '
  '12':
  - type: text
    content: 'And all the prophets prophesied so and said, “Go up to Ramoth-gilead and triumph; the '
  - type: text
    content: Lord
  - type: text
    content: ' will give it into the hand of the king.”'
  - type: heading
    content: Micaiah Prophesies Against Ahab
  '13':
  - type: text
    content: 'And the messenger who went to summon Micaiah said to him, “Behold, the words of the prophets with one accord are favorable to the king. Let your word be like the word of one of them, and speak favorably.” '
  '14':
  - type: text
    content: 'But Micaiah said, '
  - type: note
    content: See ch. 17:1
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: Num. 22:18; 24:13
  - type: text
    content: 'what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to me, that I will speak.” '
  '15':
  - type: text
    content: 'And when he had come to the king, the king said to him, “Micaiah, shall we go to Ramoth-gilead to battle, or shall we refrain?” And he answered him, “Go up and triumph; the '
  - type: text
    content: Lord
  - type: text
    content: ' will give it into the hand of the king.” '
  '16':
  - type: text
    content: 'But the king said to him, “How many times shall I make you swear that you speak to me nothing but the truth in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '17':
  - type: text
    content: 'And he said, “I saw all Israel scattered on the mountains, '
  - type: note
    content: Num. 27:17; Matt. 9:36
  - type: text
    content: 'as sheep that have no shepherd. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘These have no master; let each return to his home in peace.’” '
  '18':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, '
  - type: note
    content: ver. 8
  - type: text
    content: '“Did I not tell you that he would not prophesy good concerning me, but evil?” '
  '19':
  - type: text
    content: 'And Micaiah said, “Therefore hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Isa. 6:1; Dan. 7:9; Rev. 4:2
  - type: text
    content: 'I saw the '
  - type: text
    content: Lord
  - type: text
    content: ' sitting on his throne, '
  - type: note
    content: '[Deut. 33:2; Job 1:6; 2:1; Ps. 103:21; Dan. 7:10; Heb. 12:22]'
  - type: text
    content: 'and all the host of heaven standing beside him on his right hand and on his left; '
  '2':
  - type: note
    content: For ver. 1-35, see 2 Chr. 18:2-34
  - type: text
    content: 'But in the third year '
  - type: note
    content: ch. 15:24
  - type: text
    content: 'Jehoshaphat the king of Judah came down to the king of Israel. '
  '20':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Who will entice Ahab, that he may go up and fall at Ramoth-gilead?’ And one said one thing, and another said another. '
  '21':
  - type: text
    content: 'Then a spirit came forward and stood before the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘I will entice him.’ '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, ‘By what means?’ And he said, ‘I will go out, and will be '
  - type: note
    content: '[Judg. 9:23; Ezek. 14:9; 2 Thess. 2:11]'
  - type: text
    content: 'a lying spirit in the mouth of all his prophets.’ And he said, ‘You are to entice him, and you shall succeed; go out and do so.’ '
  '23':
  - type: text
    content: 'Now therefore behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' has put a lying spirit in the mouth of all these your prophets; the '
  - type: text
    content: Lord
  - type: text
    content: ' has declared disaster for you.”'
  '24':
  - type: text
    content: 'Then Zedekiah the son of Chenaanah came near '
  - type: note
    content: '[Lam. 3:30; Mic. 5:1; Matt. 5:39; Acts 23:2]'
  - type: text
    content: 'and struck Micaiah on the cheek and said, “How did the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' go from me to speak to you?” '
  '25':
  - type: text
    content: 'And Micaiah said, “Behold, you shall see on that day when you go '
  - type: note
    content: ch. 20:30
  - type: text
    content: 'into an inner chamber to hide yourself.” '
  '26':
  - type: text
    content: 'And the king of Israel said, “Seize Micaiah, and take him back to Amon the governor of the city and to Joash the king’s son, '
  '27':
  - type: text
    content: 'and say, ‘Thus says the king, '
  - type: note
    content: '[2 Chr. 16:10]'
  - type: text
    content: '“Put this fellow in prison and feed him meager rations of bread and water, '
  - type: note
    content: '[Judg. 8:9]'
  - type: text
    content: 'until I come in peace.”’” '
  '28':
  - type: text
    content: 'And Micaiah said, “If you return in peace, '
  - type: note
    content: '[Num. 16:29; Deut. 18:22]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken by me.” And he said, '
  - type: note
    content: Mic. 1:2
  - type: text
    content: “Hear, all you peoples!”
  - type: heading
    content: Ahab Killed in Battle
  '29':
  - type: text
    content: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  '3':
  - type: text
    content: 'And the king of Israel said to his servants, “Do you know that '
  - type: note
    content: Deut. 4:43; Josh. 21:38; 2 Kgs. 8:28; 9:1, 14; 2 Chr. 22:5
  - type: text
    content: 'Ramoth-gilead belongs to us, and we keep quiet and do not take it out of the hand of the king of Syria?” '
  '30':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, '
  - type: note
    content: 2 Chr. 35:22
  - type: text
    content: '“I will disguise myself and go into battle, but you wear your robes.” And the king of Israel disguised himself and went into battle. '
  '31':
  - type: text
    content: 'Now the king of Syria had commanded '
  - type: note
    content: '[ch. 20:1, 16, 24]'
  - type: text
    content: 'the thirty-two captains of his chariots, “Fight with neither small nor great, but only with the king of Israel.” '
  '32':
  - type: text
    content: 'And when the captains of the chariots saw Jehoshaphat, they said, “It is surely the king of Israel.” So they turned to fight against him. And Jehoshaphat cried out. '
  '33':
  - type: text
    content: 'And when the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him. '
  '34':
  - type: text
    content: But a certain man drew his bow at random
  - type: note
    content: Hebrew in his innocence
  - type: text
    content: ' and struck the king of Israel between the scale armor and the breastplate. Therefore he said to the driver of his chariot, “Turn around and carry me out of the battle, '
  - type: note
    content: '[2 Chr. 35:23]'
  - type: text
    content: 'for I am wounded.” '
  '35':
  - type: text
    content: 'And the battle continued that day, and the king was propped up in his chariot facing the Syrians, until at evening he died. And the blood of the wound flowed into the bottom of the chariot. '
  '36':
  - type: text
    content: And about sunset a cry went through the army, “Every man to his city, and every man to his country!”
  '37':
  - type: text
    content: 'So the king died, and was brought to Samaria. And they buried the king in Samaria. '
  '38':
  - type: text
    content: 'And they washed the chariot by the pool of Samaria, and the dogs licked up his blood, and the prostitutes washed themselves in it, '
  - type: note
    content: ch. 21:19
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he had spoken. '
  '39':
  - type: text
    content: 'Now the rest of the acts of Ahab and all that he did, and '
  - type: note
    content: '[Amos 3:15]'
  - type: text
    content: 'the ivory house that he built and all the cities that he built, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '4':
  - type: text
    content: 'And he said to Jehoshaphat, “Will you go with me to battle at Ramoth-gilead?” And Jehoshaphat said to the king of Israel, '
  - type: note
    content: 2 Kgs. 3:7
  - type: text
    content: “I am as you are, my people as your people, my horses as your horses.”
  '40':
  - type: text
    content: So Ahab slept with his fathers, and Ahaziah his son reigned in his place.
  - type: heading
    content: Jehoshaphat Reigns in Judah
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-43, see 2 Chr. 20:31-33
  - type: text
    content: 'Jehoshaphat the son of '
  - type: note
    content: ver. 51
  - type: text
    content: 'Asa began to reign over Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: text
    content: 'Jehoshaphat was thirty-five years old when he began to reign, and he reigned twenty-five years in Jerusalem. His mother’s name was Azubah the daughter of Shilhi. '
  '43':
  - type: note
    content: '[2 Chr. 17:3]'
  - type: text
    content: 'He walked in all the way of Asa his father. He did not turn aside from it, doing what was right in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. Yet '
  - type: note
    content: '[ch. 15:14; 2 Kgs. 12:3]'
  - type: text
    content: 'the high places were not taken away, and the people still sacrificed and made offerings on the high places. '
  '44':
  - type: note
    content: '[2 Chr. 18:1; 20:35, 36]'
  - type: text
    content: Jehoshaphat also made peace with the king of Israel.
  '45':
  - type: text
    content: 'Now the rest of the acts of Jehoshaphat, and his might that he showed, and how he warred, are they not written '
  - type: note
    content: '[2 Chr. 20:34]'
  - type: text
    content: 'in the Book of the Chronicles of the Kings of Judah? '
  '46':
  - type: text
    content: 'And from the land he exterminated the remnant '
  - type: note
    content: ch. 14:24; 15:12
  - type: text
    content: of the male cult prostitutes who remained in the days of his father Asa.
  '47':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Sam. 8:14; 2 Kgs. 3:9; 8:20 ]'
  - type: text
    content: 'There was no king in Edom; a deputy was king. '
  '48':
  - type: text
    content: 'Jehoshaphat made '
  - type: note
    content: See ch. 10:22
  - type: text
    content: 'ships of Tarshish to go to '
  - type: note
    content: See ch. 9:28
  - type: text
    content: 'Ophir for gold, but they did not go, for the ships were wrecked at '
  - type: note
    content: See ch. 9:26
  - type: text
    content: 'Ezion-geber. '
  '49':
  - type: text
    content: 'Then Ahaziah the son of Ahab said to Jehoshaphat, “Let my servants go with your servants in the ships,” but Jehoshaphat was not willing. '
  '5':
  - type: text
    content: 'And Jehoshaphat said to the king of Israel, “Inquire first for the word of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '50':
  - type: note
    content: 2 Chr. 21:1
  - type: text
    content: And Jehoshaphat slept with his fathers and was buried with his fathers in the city of David his father, and Jehoram his son reigned in his place.
  - type: heading
    content: Ahaziah Reigns in Israel
  '51':
  - type: text
    content: 'Ahaziah the son of Ahab '
  - type: note
    content: ver. 40
  - type: text
    content: 'began to reign over Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah, and he reigned two years over Israel. '
  '52':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 15:26]'
  - type: text
    content: 'and walked in the way of his father and in the way of his mother and in the way of Jeroboam the son of Nebat, who made Israel to sin. '
  '53':
  - type: note
    content: ch. 16:30
  - type: text
    content: 'He served Baal and worshiped him and provoked the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to anger '
  - type: note
    content: '[ch. 16:31, 32]'
  - type: text
    content: in every way that his father had done.
  '6':
  - type: text
    content: 'Then the king of Israel '
  - type: note
    content: ch. 18:19
  - type: text
    content: 'gathered the prophets together, about four hundred men, and said to them, “Shall I go to battle against Ramoth-gilead, or shall I refrain?” And they said, “Go up, for the Lord will give it into the hand of the king.” '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: 2 Kgs. 3:11
  - type: text
    content: 'Jehoshaphat said, “Is there not here another prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' of whom we may inquire?” '
  '8':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, “There is yet one man by whom we may inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', Micaiah the son of Imlah, but I hate him, for he never prophesies good concerning me, but evil.” And Jehoshaphat said, “Let not the king say so.” '
  '9':
  - type: text
    content: 'Then the king of Israel summoned an officer and said, “Bring quickly Micaiah the son of Imlah.” '
