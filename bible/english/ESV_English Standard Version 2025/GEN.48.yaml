document_id: GEN.48,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Blesses Ephraim and Manasseh
  - type: text
    content: 'After this, Joseph was told, “Behold, your father is ill.” So he took with him his two sons, Manasseh and Ephraim. '
  '10':
  - type: text
    content: 'Now '
  - type: note
    content: '[ch. 27:1]'
  - type: text
    content: 'the eyes of Israel were dim with age, so that he could not see. So Joseph brought them near him, '
  - type: note
    content: ch. 27:27
  - type: text
    content: 'and he kissed them and embraced them. '
  '11':
  - type: text
    content: 'And Israel said to Joseph, '
  - type: note
    content: '[ch. 37:33; 45:26]'
  - type: text
    content: '“I never expected to see your face; and behold, God has let me see your offspring also.” '
  '12':
  - type: text
    content: 'Then Joseph removed them from his knees, and he bowed himself with his face to the earth. '
  '13':
  - type: text
    content: 'And Joseph took them both, Ephraim in his right hand toward Israel’s left hand, and Manasseh in his left hand toward Israel’s right hand, and brought them near him. '
  '14':
  - type: note
    content: ver. 17
  - type: text
    content: 'And Israel stretched out his right hand and laid it on the head of Ephraim, who was the younger, and his left hand on the head of Manasseh, '
  - type: note
    content: ver. 19
  - type: text
    content: 'crossing his hands (for Manasseh was the firstborn). '
  '15':
  - type: text
    content: And he blessed Joseph and said,
  - type: text
    content: '“The God '
  - type: note
    content: ch. 17:1; 24:40
  - type: text
    content: before whom my fathers Abraham and Isaac walked,
  - type: text
    content: the God who has been my shepherd all my life long to this day,
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:15; 31:11, 13, 24; Ex. 23:20
  - type: text
    content: 'the angel who has '
  - type: note
    content: Isa. 44:22, 23; 49:7; 63:9; [2 Sam. 4:9; Ps. 34:22; 121:7]
  - type: text
    content: redeemed me from all evil, bless the boys;
  - type: text
    content: 'and in them let '
  - type: note
    content: Amos 9:12; Acts 15:17
  - type: text
    content: my name be carried on, and the name of my fathers Abraham and Isaac;
  - type: text
    content: 'and let them '
  - type: note
    content: '[Num. 26:34, 37]'
  - type: text
    content: grow into a multitude
  - type: note
    content: Or let them be like fish for multitude
  - type: text
    content: ' in the midst of the earth.”'
  '17':
  - type: text
    content: 'When Joseph saw that his father '
  - type: note
    content: ver. 14
  - type: text
    content: 'laid his right hand on the head of Ephraim, it displeased him, and he took his father’s hand to move it from Ephraim’s head to Manasseh’s head. '
  '18':
  - type: text
    content: 'And Joseph said to his father, “Not this way, my father; since this one is the firstborn, put your right hand on his head.” '
  '19':
  - type: text
    content: 'But his father refused and said, '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: '“I know, my son, I know. He also shall become a people, and he also shall be great. Nevertheless, '
  - type: note
    content: Num. 1:33, 35; 2:19, 21; Deut. 33:17
  - type: text
    content: his younger brother shall be greater than he, and his offspring shall become a multitude
  - type: note
    content: Hebrew fullness
  - type: text
    content: ' of nations.” '
  '2':
  - type: text
    content: 'And it was told to Jacob, “Your son Joseph has come to you.” Then Israel summoned his strength and sat up in bed. '
  '20':
  - type: text
    content: So he blessed them that day, saying,
  - type: text
    content: “By you Israel will pronounce blessings, saying,
  - type: note
    content: '[ Ruth 4:11, 12 ]'
  - type: text
    content: ‘God make you as Ephraim and as Manasseh.’”
  - type: text
    content: 'Thus he put Ephraim before Manasseh. '
  '21':
  - type: text
    content: 'Then Israel said to Joseph, “Behold, I am about to die, but '
  - type: note
    content: ch. 46:4; 50:24
  - type: text
    content: 'God will be with you and will bring you again to the land of your fathers. '
  '22':
  - type: text
    content: 'Moreover, I have given to '
  - type: note
    content: Josh. 24:32; John 4:5
  - type: text
    content: you rather than to your brothers one mountain slope
  - type: note
    content: Or one portion of the land; Hebrew shekem, which sounds like the town and district called Shechem
  - type: text
    content: ' that I took from the hand of the Amorites with my sword and with my bow.”'
  '3':
  - type: text
    content: 'And Jacob said to Joseph, '
  - type: note
    content: See ch. 17:1
  - type: text
    content: “God Almighty
  - type: note
    content: Hebrew El Shaddai
  - type: text
    content: ' appeared to me at '
  - type: note
    content: ch. 28:13, 19; 35:6, 9
  - type: text
    content: 'Luz in the land of Canaan and blessed me, '
  '4':
  - type: text
    content: 'and said to me, ‘Behold, I will make you fruitful and multiply you, and I will make of you a company of peoples and will give this land to your offspring after you '
  - type: note
    content: ch. 17:8
  - type: text
    content: 'for an everlasting possession.’ '
  '5':
  - type: text
    content: 'And now your '
  - type: note
    content: ch. 41:50-52; 46:20
  - type: text
    content: 'two sons, who were born to you in the land of Egypt before I came to you in Egypt, '
  - type: note
    content: Josh. 13:7; 14:4; 17:17
  - type: text
    content: 'are mine; Ephraim and Manasseh shall be mine, as Reuben and Simeon are. '
  '6':
  - type: text
    content: 'And the children that you fathered after them shall be yours. They shall be called by the name of their brothers in their inheritance. '
  '7':
  - type: text
    content: 'As for me, when I came from Paddan, to my sorrow '
  - type: note
    content: See ch. 35:9-19
  - type: text
    content: Rachel died in the land of Canaan on the way, when there was still some distance
  - type: note
    content: Or about two hours’ distance
  - type: text
    content: ' to go to Ephrath, and I buried her there on the way to Ephrath (that is, Bethlehem).”'
  '8':
  - type: text
    content: 'When Israel saw Joseph’s sons, he said, “Who are these?” '
  '9':
  - type: text
    content: 'Joseph said to his father, '
  - type: note
    content: '[ch. 33:5]'
  - type: text
    content: '“They are my sons, whom God has given me here.” And he said, “Bring them to me, please, that '
  - type: note
    content: ch. 49:25, 26; Heb. 11:21; [ch. 27:4]
  - type: text
    content: 'I may bless them.” '
