document_id: NUM.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Rebel
  - type: text
    content: 'Then all the congregation raised a loud cry, and the people '
  - type: note
    content: ch. 11:4
  - type: text
    content: 'wept that night. '
  '10':
  - type: note
    content: Ex. 17:4
  - type: text
    content: 'Then all the congregation said to stone them with stones. But '
  - type: note
    content: See Lev. 9:23
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared at the tent of meeting to all the people of Israel.'
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “How long will this people '
  - type: note
    content: ver. 23; ch. 16:30
  - type: text
    content: 'despise me? And how long will they not '
  - type: note
    content: Deut. 1:32; 9:23; Ps. 78:22, 32; 106:24; Heb. 3:18; [John 12:37]
  - type: text
    content: 'believe in me, in spite of all the signs that I have done among them? '
  '12':
  - type: text
    content: 'I will strike them with the pestilence and disinherit them, and I '
  - type: note
    content: Ex. 32:10
  - type: text
    content: will make of you a nation greater and mightier than they.”
  - type: heading
    content: Moses Intercedes for the People
  '13':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 32:12; [Deut. 9:28; 32:27; Ps. 106:23; Ezek. 20:9, 14]
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Then the Egyptians will hear of it, for you brought up this people in your might from among them, '
  '14':
  - type: text
    content: 'and they will tell the inhabitants of this land. '
  - type: note
    content: Ex. 15:14; Josh. 2:9, 10; 5:1
  - type: text
    content: 'They have heard that you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are in the midst of this people. For you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are seen face to face, and '
  - type: note
    content: See Ex. 13:21
  - type: text
    content: 'your cloud stands over them and you go before them, in a pillar of cloud by day and in a pillar of fire by night. '
  '15':
  - type: text
    content: 'Now if you kill this people as one man, then the nations who have heard your fame will say, '
  '16':
  - type: text
    content: '‘It is because the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 9:28; [Josh. 7:9]
  - type: text
    content: 'was not able to bring this people into the land that he swore to give to them that he has killed them in the wilderness.’ '
  '17':
  - type: text
    content: 'And now, please let the power of the Lord be great as you have promised, saying, '
  '18':
  - type: note
    content: See Ex. 34:6, 7
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is slow to anger and abounding in steadfast love, forgiving iniquity and transgression, but he will by no means clear the guilty, '
  - type: note
    content: See Ex. 20:5
  - type: text
    content: 'visiting the iniquity of the fathers on the children, to the third and the fourth generation.’ '
  '19':
  - type: text
    content: 'Please '
  - type: note
    content: Ex. 34:9
  - type: text
    content: 'pardon the iniquity of this people, according to the greatness of your steadfast love, just '
  - type: note
    content: Ps. 78:38; 106:45
  - type: text
    content: as you have forgiven this people, from Egypt until now.”
  - type: heading
    content: God Promises Judgment
  '2':
  - type: text
    content: 'And all the people of Israel '
  - type: note
    content: ver. 27, 29, 33; ch. 16:41; Ex. 15:24; 16:2; 17:3; Ps. 106:25; [Josh. 9:18]
  - type: text
    content: 'grumbled against Moses and Aaron. The whole congregation said to them, “Would that we had died in the land of Egypt! Or '
  - type: note
    content: '[ver. 27-29]'
  - type: text
    content: 'would that we had died in this wilderness! '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I have pardoned, '
  - type: note
    content: Ps. 106:23; [James 5:16]; See 1 John 5:14-16
  - type: text
    content: 'according to your word. '
  '21':
  - type: text
    content: 'But truly, as I live, and as all '
  - type: note
    content: Ps. 72:19; Hab. 2:14
  - type: text
    content: 'the earth shall be filled with the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '22':
  - type: note
    content: Deut. 1:35; Ps. 95:11; 106:26; Heb. 3:17, 18
  - type: text
    content: 'none of the men who have seen my glory and my signs that I did in Egypt and in the wilderness, and yet have put me to the test these '
  - type: note
    content: '[Gen. 31:7; Job 19:3]'
  - type: text
    content: 'ten times and have not obeyed my voice, '
  '23':
  - type: note
    content: ch. 32:11; Ezek. 20:15; [ch. 26:64]
  - type: text
    content: 'shall see the land that I swore to give to their fathers. And none of those who despised me shall see it. '
  '24':
  - type: text
    content: 'But my servant '
  - type: note
    content: ver. 6; ch. 13:6
  - type: text
    content: 'Caleb, because he has a different spirit and has '
  - type: note
    content: ch. 32:12; Josh. 14:8, 9
  - type: text
    content: 'followed me fully, I will bring into the land into which he went, and his descendants shall possess it. '
  '25':
  - type: note
    content: ver. 43, 45; See ch. 13:29
  - type: text
    content: 'Now, since the Amalekites and the Canaanites dwell in the valleys, '
  - type: note
    content: Deut. 1:40
  - type: text
    content: turn tomorrow and set out for the wilderness by the way to the Red Sea.”
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and to Aaron, saying, '
  '27':
  - type: text
    content: '“How long shall '
  - type: note
    content: ver. 35
  - type: text
    content: 'this wicked congregation grumble against me? '
  - type: note
    content: Ex. 16:7, 12
  - type: text
    content: 'I have heard the grumblings of the people of Israel, which they grumble against me. '
  '28':
  - type: text
    content: 'Say to them, '
  - type: note
    content: ver. 21, 23; ch. 26:65
  - type: text
    content: '‘As I live, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'what you have said in my hearing I will do to you: '
  '29':
  - type: note
    content: 1 Cor. 10:5; Heb. 3:17
  - type: text
    content: 'your dead bodies shall fall in this wilderness, and '
  - type: note
    content: ch. 1:45; 26:64; Deut. 1:35
  - type: text
    content: 'of all your number, listed in the census '
  - type: note
    content: ch. 1:3; Ex. 30:14
  - type: text
    content: 'from twenty years old and upward, who have grumbled against me, '
  '3':
  - type: text
    content: 'Why is the '
  - type: text
    content: Lord
  - type: text
    content: ' bringing us into this land, to fall by the sword? '
  - type: note
    content: ver. 31
  - type: text
    content: 'Our wives and our little ones will become a prey. Would it not be better for us to go back to Egypt?” '
  '30':
  - type: text
    content: 'not one shall come into the land where I '
  - type: note
    content: See Gen. 14:22
  - type: text
    content: 'swore that I would make you dwell, '
  - type: note
    content: ver. 6, 38; See ch. 13:6
  - type: text
    content: 'except Caleb the son of Jephunneh and Joshua the son of Nun. '
  '31':
  - type: note
    content: ver. 3; Deut. 1:39
  - type: text
    content: 'But your little ones, who you said would become a prey, I will bring in, and they shall know the land that '
  - type: note
    content: Ps. 106:24
  - type: text
    content: 'you have rejected. '
  '32':
  - type: text
    content: 'But as for you, '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'your dead bodies shall fall in this wilderness. '
  '33':
  - type: text
    content: 'And your children '
  - type: note
    content: ch. 32:13; [Ps. 107:40]
  - type: text
    content: 'shall be shepherds in the wilderness '
  - type: note
    content: Ps. 95:10; [Deut. 2:14]
  - type: text
    content: 'forty years and shall '
  - type: note
    content: Ezek. 23:35
  - type: text
    content: 'suffer for your faithlessness, until the last of your dead bodies lies in the wilderness. '
  '34':
  - type: note
    content: ch. 13:25
  - type: text
    content: 'According to the number of the days in which you spied out the land, '
  - type: note
    content: '[Ezek. 4:6]'
  - type: text
    content: 'forty days, a year for each day, you shall bear your iniquity forty years, and you shall know my displeasure.’ '
  '35':
  - type: note
    content: ch. 23:19
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken. Surely this will I do to all '
  - type: note
    content: ver. 27
  - type: text
    content: 'this wicked congregation who are gathered together against me: in this wilderness they shall come to a full end, and there they shall die.”'
  '36':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:32
  - type: text
    content: 'And the men whom Moses sent to spy out the land, who returned and made all the congregation grumble against him by bringing up a bad report about the land— '
  '37':
  - type: text
    content: the men who brought up a bad report of the land—
  - type: note
    content: 1 Cor. 10:10; Heb. 3:17; Jude 5
  - type: text
    content: 'died by plague before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Of those men who went to spy out the land, '
  - type: note
    content: ch. 26:65; See ch. 13:16
  - type: text
    content: only Joshua the son of Nun and Caleb the son of Jephunneh remained alive.
  - type: heading
    content: Israel Defeated in Battle
  '39':
  - type: text
    content: 'When Moses told these words to all the people of Israel, the people '
  - type: note
    content: Ex. 33:4
  - type: text
    content: 'mourned greatly. '
  '4':
  - type: text
    content: 'And they said to one another, '
  - type: note
    content: Neh. 9:17
  - type: text
    content: '“Let us choose a leader and '
  - type: note
    content: '[Deut. 17:16; Acts 7:39]'
  - type: text
    content: go back to Egypt.”
  '40':
  - type: text
    content: 'And they rose early in the morning and went up to the heights of the hill country, saying, '
  - type: note
    content: Deut. 1:41
  - type: text
    content: '“Here we are. We will go up to the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised, for we have sinned.” '
  '41':
  - type: note
    content: '[2 Chr. 24:20]'
  - type: text
    content: 'But Moses said, “Why now are you transgressing the command of the '
  - type: text
    content: Lord
  - type: text
    content: ', when that will not succeed? '
  '42':
  - type: note
    content: Deut. 1:42
  - type: text
    content: 'Do not go up, '
  - type: note
    content: '[Deut. 31:17]'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is not among you, lest you be struck down before your enemies. '
  '43':
  - type: text
    content: 'For there '
  - type: note
    content: ver. 25, 45; See ch. 13:29
  - type: text
    content: 'the Amalekites and the Canaanites are facing you, and you shall fall by the sword. Because you have turned back from following the '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: text
    content: Lord
  - type: text
    content: ' will not be with you.” '
  '44':
  - type: note
    content: Deut. 1:43
  - type: text
    content: 'But they presumed to go up to the heights of the hill country, although neither '
  - type: note
    content: '[1 Sam. 4:3]'
  - type: text
    content: 'the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' nor Moses departed out of the camp. '
  '45':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 43; [Deut. 1:44]
  - type: text
    content: 'the Amalekites and the Canaanites who lived in that hill country came down and defeated them and pursued them, even to '
  - type: note
    content: ch. 21:3; Judg. 1:17
  - type: text
    content: Hormah.
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 16:4, 22; 20:6
  - type: text
    content: 'Moses and Aaron fell on their faces before all the assembly of the congregation of the people of Israel. '
  '6':
  - type: note
    content: ver. 30; ch. 13:6, 8
  - type: text
    content: 'And Joshua the son of Nun and Caleb the son of Jephunneh, who were among those who had spied out the land, tore their clothes '
  '7':
  - type: text
    content: 'and said to all the congregation of the people of Israel, '
  - type: note
    content: ch. 13:27; Deut. 1:25
  - type: text
    content: '“The land, which we passed through to spy it out, is an exceedingly good land. '
  '8':
  - type: text
    content: 'If '
  - type: note
    content: Deut. 10:15; 2 Sam. 22:20; 1 Kgs. 10:9; Ps. 18:19; 22:8; Isa. 62:4
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' delights in us, he will bring us into this land and give it to us, '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'a land that flows with milk and honey. '
  '9':
  - type: text
    content: 'Only '
  - type: note
    content: Josh. 22:16, 18, 19, 29
  - type: text
    content: 'do not rebel against the '
  - type: text
    content: Lord
  - type: text
    content: '. And '
  - type: note
    content: Deut. 7:18; 20:3
  - type: text
    content: 'do not fear the people of the land, for '
  - type: note
    content: ch. 24:8; [Ps. 14:4; 74:14]
  - type: text
    content: 'they are bread for us. Their protection is removed from them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' is with us; do not fear them.” '
