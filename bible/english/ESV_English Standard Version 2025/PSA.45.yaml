document_id: PSA.45,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Your Throne, O God, Is Forever
  - type: text
    content: 'To the choirmaster: according to Lilies. A Maskil'
  - type: note
    content: Probably a musical or liturgical term
  - type: text
    content: ' of '
  - type: note
    content: Ps. 42, title
  - type: text
    content: the Sons of Korah; a love song.
  - type: text
    content: My heart overflows with a pleasing theme;
  - type: text
    content: I address my verses to the king;
  - type: text
    content: 'my tongue is like the pen of '
  - type: note
    content: '[Ezra 7:6]'
  - type: text
    content: a ready scribe.
  '10':
  - type: text
    content: 'Hear, O daughter, and consider, and incline your ear:'
  - type: text
    content: forget your people and your father’s house,
  '11':
  - type: text
    content: and the king will desire your beauty.
  - type: text
    content: 'Since he is your '
  - type: note
    content: Isa. 54:5
  - type: text
    content: 'lord, '
  - type: note
    content: Ps. 95:6
  - type: text
    content: bow to him.
  '12':
  - type: text
    content: The people
  - type: note
    content: Hebrew daughter
  - type: text
    content: ' of Tyre will '
  - type: note
    content: '[Job 11:19]'
  - type: text
    content: 'seek your favor with '
  - type: note
    content: Ps. 96:8
  - type: text
    content: gifts,
  - type: note
    content: Ps. 22:29; 68:29; 72:10; Isa. 49:7
  - type: text
    content: the richest of the people.
  - type: note
    content: Or The daughter of Tyre is here with gifts, the richest of people seek your favor
  '13':
  - type: text
    content: 'All glorious is '
  - type: note
    content: '[Rev. 19:7, 8]'
  - type: text
    content: the princess in her chamber, with robes interwoven with gold.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Judg. 5:30; Ezek. 16:18; 26:16 ]'
  - type: text
    content: 'In many-colored robes '
  - type: note
    content: '[Song 1:4]'
  - type: text
    content: she is led to the king,
  - type: text
    content: with her virgin companions following behind her.
  '15':
  - type: text
    content: With joy and gladness they are led along
  - type: text
    content: as they enter the palace of the king.
  '16':
  - type: text
    content: In place of your fathers shall be your sons;
  - type: text
    content: 'you will make them '
  - type: note
    content: 1 Pet. 2:9; Rev. 1:6; 5:10; 20:6
  - type: text
    content: princes in all the earth.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Mal. 1:11 ]'
  - type: text
    content: I will cause your name to be remembered in all generations;
  - type: text
    content: therefore nations will praise you forever and ever.
  '2':
  - type: text
    content: 'You are '
  - type: note
    content: '[Isa. 33:17]'
  - type: text
    content: the most handsome of the sons of men;
  - type: note
    content: '[ Luke 4:22 ]; See Isa. 61:1-3'
  - type: text
    content: grace is poured upon your lips;
  - type: text
    content: therefore God has blessed you forever.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ex. 32:27
  - type: text
    content: 'Gird your '
  - type: note
    content: '[Isa. 49:2; Heb. 4:12; Rev. 1:16; 19:15]'
  - type: text
    content: 'sword on your thigh, O '
  - type: note
    content: '[Ps. 24:8; Isa. 9:6]'
  - type: text
    content: mighty one,
  - type: text
    content: 'in '
  - type: note
    content: Ps. 21:5; 96:6, 7
  - type: text
    content: your splendor and majesty!
  '4':
  - type: text
    content: 'In your majesty '
  - type: note
    content: '[Rev. 16:2]'
  - type: text
    content: ride out victoriously
  - type: text
    content: for the cause of truth and meekness and righteousness;
  - type: text
    content: 'let your right hand teach you '
  - type: note
    content: See Ps. 65:5
  - type: text
    content: awesome deeds!
  '5':
  - type: text
    content: Your arrows are sharp
  - type: text
    content: in the heart of the king’s enemies;
  - type: text
    content: the peoples fall under you.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 93:2; 110:2; Cited Heb. 1:8, 9
  - type: text
    content: Your throne, O God, is forever and ever.
  - type: text
    content: 'The '
  - type: note
    content: '[Ps. 67:4; 96:10]'
  - type: text
    content: scepter of your kingdom is a scepter of uprightness;
  '7':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 11:7
  - type: text
    content: you have loved righteousness and hated wickedness.
  - type: text
    content: 'Therefore '
  - type: note
    content: Isa. 61:1
  - type: text
    content: 'God, your God, has '
  - type: note
    content: Ps. 2:2; 1 Kgs. 1:39; [Acts 10:38]
  - type: text
    content: anointed you
  - type: text
    content: 'with the oil of '
  - type: note
    content: '[Ps. 21:6]'
  - type: text
    content: 'gladness '
  - type: note
    content: '[1 Kgs. 3:13]'
  - type: text
    content: beyond your companions;
  '8':
  - type: text
    content: 'your robes are all fragrant with '
  - type: note
    content: John 19:39; [Matt. 2:11]
  - type: text
    content: myrrh and aloes and cassia.
  - type: text
    content: 'From ivory palaces '
  - type: note
    content: Ps. 150:4
  - type: text
    content: stringed instruments make you glad;
  '9':
  - type: text
    content: daughters of kings are among your ladies of honor;
  - type: note
    content: '[ 1 Kgs. 2:19; Neh. 2:6 ]'
  - type: text
    content: 'at your right hand stands the queen in '
  - type: note
    content: See Job 28:16
  - type: text
    content: gold of Ophir.
