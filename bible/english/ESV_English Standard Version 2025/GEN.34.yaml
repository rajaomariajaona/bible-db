document_id: GEN.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Defiling of Dinah
  - type: text
    content: 'Now '
  - type: note
    content: ch. 30:21
  - type: text
    content: 'Dinah the daughter of Leah, whom she had borne to Jacob, went out to see the women of the land. '
  '10':
  - type: text
    content: 'You shall dwell with us, and '
  - type: note
    content: ch. 13:9; 20:15
  - type: text
    content: 'the land shall be open to you. Dwell and '
  - type: note
    content: ver. 21; ch. 42:34
  - type: text
    content: 'trade in it, and '
  - type: note
    content: ch. 47:27
  - type: text
    content: 'get property in it.” '
  '11':
  - type: text
    content: 'Shechem also said to her father and to her brothers, '
  - type: note
    content: See ch. 33:15
  - type: text
    content: '“Let me find favor in your eyes, and whatever you say to me I will give. '
  '12':
  - type: text
    content: 'Ask me for as great a '
  - type: note
    content: Ex. 22:16, 17; 1 Sam. 18:25; [Deut. 22:29]
  - type: text
    content: bride-price
  - type: note
    content: Or engagement present
  - type: text
    content: ' and gift as you will, and I will give whatever you say to me. Only give me the young woman to be my wife.”'
  '13':
  - type: text
    content: 'The sons of Jacob answered Shechem and his father Hamor deceitfully, because he had defiled their sister Dinah. '
  '14':
  - type: text
    content: 'They said to them, “We cannot do this thing, to give our sister to one who is uncircumcised, for '
  - type: note
    content: Josh. 5:9
  - type: text
    content: 'that would be a disgrace to us. '
  '15':
  - type: text
    content: 'Only on this condition will we agree with you—that you will become as we are by every male among you being circumcised. '
  '16':
  - type: text
    content: 'Then we will give our daughters to you, and we will take your daughters to ourselves, and we will dwell with you and become one people. '
  '17':
  - type: text
    content: But if you will not listen to us and be circumcised, then we will take our daughter, and we will be gone.”
  '18':
  - type: text
    content: 'Their words pleased Hamor and Hamor’s son Shechem. '
  '19':
  - type: text
    content: 'And the young man did not delay to do the thing, because he delighted in Jacob’s daughter. Now '
  - type: note
    content: '[1 Chr. 4:9]'
  - type: text
    content: 'he was the most honored of all his father’s house. '
  '2':
  - type: text
    content: 'And when Shechem the son of '
  - type: note
    content: Acts 7:16
  - type: text
    content: 'Hamor the Hivite, the prince of the land, saw her, he seized her and lay with her and humiliated her. '
  '20':
  - type: text
    content: 'So Hamor and his son Shechem '
  - type: note
    content: See Ruth 4:1
  - type: text
    content: 'came to the gate of their city and spoke to the men of their city, saying, '
  '21':
  - type: text
    content: '“These men are at peace with us; let them dwell in the land and '
  - type: note
    content: ver. 10; ch. 42:34
  - type: text
    content: 'trade in it, for behold, the land is large enough for them. Let us take their daughters as wives, and let us give them our daughters. '
  '22':
  - type: text
    content: 'Only on this condition will the men agree to dwell with us to become one people—when every male among us is circumcised as they are circumcised. '
  '23':
  - type: text
    content: 'Will not their livestock, their property and all their beasts be ours? Only let us agree with them, and they will dwell with us.” '
  '24':
  - type: text
    content: 'And all who went out of the gate of his city listened to Hamor and his son Shechem, and every male was circumcised, all who '
  - type: note
    content: '[ch. 23:10]'
  - type: text
    content: went out of the gate of his city.
  '25':
  - type: text
    content: 'On the third day, when they were sore, two of the sons of Jacob, '
  - type: note
    content: See ch. 49:5-7
  - type: text
    content: 'Simeon and Levi, '
  - type: note
    content: ch. 29:33, 34; 30:21
  - type: text
    content: 'Dinah’s brothers, took their swords and came against the city while it felt secure and killed all the males. '
  '26':
  - type: text
    content: 'They killed Hamor and his son Shechem with the sword and took Dinah out of Shechem’s house and went away. '
  '27':
  - type: text
    content: 'The sons of Jacob came upon the slain and plundered the city, because they had defiled their sister. '
  '28':
  - type: text
    content: 'They took their flocks and their herds, their donkeys, and whatever was in the city and in the field. '
  '29':
  - type: text
    content: All their wealth, all their little ones and their wives, all that was in the houses, they captured and plundered.
  '3':
  - type: text
    content: 'And his soul was drawn to Dinah the daughter of Jacob. He loved the young woman and spoke tenderly to her. '
  '30':
  - type: text
    content: 'Then Jacob said to Simeon and Levi, '
  - type: note
    content: Josh. 7:25
  - type: text
    content: '“You have brought trouble on me '
  - type: note
    content: Ex. 5:21; 1 Sam. 13:4; 27:12; 2 Sam. 10:6; 16:21; 1 Chr. 19:6(Heb.)
  - type: text
    content: 'by making me stink to the inhabitants of the land, '
  - type: note
    content: ch. 13:7; 15:20, 21
  - type: text
    content: 'the Canaanites and the Perizzites. '
  - type: note
    content: 1 Chr. 16:19; Ps. 105:12
  - type: text
    content: 'My numbers are few, and if they gather themselves against me and attack me, I shall be destroyed, both I and my household.” '
  '31':
  - type: text
    content: But they said, “Should he treat our sister like a prostitute?”
  '4':
  - type: text
    content: 'So Shechem '
  - type: note
    content: '[Judg. 14:2]'
  - type: text
    content: spoke to his father Hamor, saying, “Get me this girl for my wife.”
  '5':
  - type: text
    content: 'Now Jacob heard that he had defiled his daughter Dinah. But his sons were with his livestock in the field, so Jacob held his peace until they came. '
  '6':
  - type: text
    content: 'And Hamor the father of Shechem went out to Jacob to speak with him. '
  '7':
  - type: text
    content: 'The sons of Jacob had come in from the field as soon as they heard of it, and the men were indignant and '
  - type: note
    content: ch. 49:7
  - type: text
    content: 'very angry, because he '
  - type: note
    content: Josh. 7:15; Judg. 20:6
  - type: text
    content: 'had done an outrageous thing in Israel by lying with Jacob’s daughter, '
  - type: note
    content: ver. 31; ch. 20:9; 2 Sam. 13:12
  - type: text
    content: for such a thing must not be done.
  '8':
  - type: text
    content: But Hamor spoke with them, saying, “The soul of my son Shechem longs for your
  - type: note
    content: The Hebrew for your is plural here
  - type: text
    content: ' daughter. Please give her to him to be his wife. '
  '9':
  - type: text
    content: 'Make marriages with us. Give your daughters to us, and take our daughters for yourselves. '
