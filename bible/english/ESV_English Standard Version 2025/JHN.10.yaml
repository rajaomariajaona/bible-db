document_id: JHN.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: I Am the Good Shepherd
  - type: text
    content: ' '
  - type: text
    content: “Truly, truly, I say to you, he who does not enter the sheepfold by the door but climbs in by another way, that man is a thief and a robber.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'The thief comes only to steal and '
  - type: note
    content: '[Jer. 23:1; Ezek. 34:3]'
  - type: text
    content: kill and destroy. I came that they may have life and have it abundantly.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Isa. 40:11; Ezek. 34:12, 23; 37:24; Zech. 13:7; Heb. 13:20; 1 Pet. 2:25; 5:4; [ch. 21:15-17; Ps. 23; Rev. 7:17]
  - type: text
    content: 'I am the good shepherd. The good shepherd '
  - type: note
    content: ver. 15, 17; ch. 15:13; 1 John 3:16; [Matt. 20:28; Mark 10:45]
  - type: text
    content: lays down his life for the sheep.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'He who is '
  - type: note
    content: '[Ezek. 34:2-6]'
  - type: text
    content: 'a hired hand and not a shepherd, who does not own the sheep, sees the wolf coming and '
  - type: note
    content: Zech. 11:17; 13:7
  - type: text
    content: 'leaves the sheep and flees, and the wolf snatches them and '
  - type: note
    content: '[Jer. 23:1-3]'
  - type: text
    content: scatters them.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'He flees because '
  - type: note
    content: '[1 Pet. 5:2]'
  - type: text
    content: 'he is a hired hand and '
  - type: note
    content: Zech. 11:16
  - type: text
    content: cares nothing for the sheep.
  - type: text
    content: ' '
  '14':
  - type: note
    content: See ver. 11
  - type: text
    content: 'I am the good shepherd. '
  - type: note
    content: ver. 27; Nah. 1:7; 2 Tim. 2:19
  - type: text
    content: 'I know my own and '
  - type: note
    content: ver. 4
  - type: text
    content: my own know me,
  - type: text
    content: ' '
  '15':
  - type: note
    content: See Matt. 11:27
  - type: text
    content: 'just as the Father knows me and I know the Father; and '
  - type: note
    content: See ver. 11
  - type: text
    content: I lay down my life for the sheep.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Isa. 56:8
  - type: text
    content: 'I have other sheep that are not of this fold. '
  - type: note
    content: '[Ezek. 34:11-13; Matt. 8:11, 12; Eph. 2:13-18; 1 Pet. 2:25]'
  - type: text
    content: 'I must bring them also, and '
  - type: note
    content: ch. 5:25; 18:37; [Acts 28:28]
  - type: text
    content: 'they will listen to my voice. So there will be '
  - type: note
    content: '[ch. 11:52; 12:32; 17:11, 21, 22]'
  - type: text
    content: 'one flock, '
  - type: note
    content: Ezek. 34:23; 37:24
  - type: text
    content: one shepherd.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Phil. 2:9; See ch. 5:20
  - type: text
    content: 'For this reason the Father loves me, '
  - type: note
    content: Isa. 53:7, 8, 12; Heb. 2:9
  - type: text
    content: 'because '
  - type: note
    content: ver. 11
  - type: text
    content: I lay down my life that I may take it up again.
  - type: text
    content: ' '
  '18':
  - type: note
    content: '[Matt. 26:53]'
  - type: text
    content: 'No one takes it from me, but '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'I lay it down '
  - type: note
    content: '[ch. 5:30]'
  - type: text
    content: 'of my own accord. I have authority to lay it down, and '
  - type: note
    content: ch. 2:19; [Phil. 2:7]
  - type: text
    content: 'I have authority to take it up again. '
  - type: note
    content: ch. 12:49; 14:31; 15:10
  - type: text
    content: This charge I have received from my Father.”
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:43; 9:16
  - type: text
    content: 'There was again a division among the Jews because of these words. '
  '2':
  - type: text
    content: But he who enters by the door is the shepherd of the sheep.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Many of them said, '
  - type: note
    content: See ch. 7:20
  - type: text
    content: '“He has a demon, and '
  - type: note
    content: '[Mark 3:21]'
  - type: text
    content: 'is insane; why listen to him?” '
  '21':
  - type: text
    content: 'Others said, “These are not the words of one who is oppressed by a demon. '
  - type: note
    content: '[Ex. 4:11; Ps. 146:8]; See ch. 9:33'
  - type: text
    content: Can a demon open the eyes of the blind?”
  - type: heading
    content: I and the Father Are One
  '22':
  - type: text
    content: 'At that time the Feast of Dedication took place at Jerusalem. It was winter, '
  '23':
  - type: text
    content: 'and Jesus was walking in the temple, '
  - type: note
    content: Acts 3:11; 5:12
  - type: text
    content: 'in the colonnade of Solomon. '
  '24':
  - type: text
    content: 'So the Jews gathered around him and said to him, “How long will you keep us in suspense? If you are '
  - type: note
    content: ch. 1:41
  - type: text
    content: 'the Christ, '
  - type: note
    content: Matt. 26:63; Luke 22:67
  - type: text
    content: 'tell us plainly.” '
  '25':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“I told you, and you do not believe. '
  - type: note
    content: ver. 38; See ch. 5:36
  - type: text
    content: 'The works that I do '
  - type: note
    content: See ch. 5:43
  - type: text
    content: in my Father’s name bear witness about me,
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 8:47]'
  - type: text
    content: you do not believe because you are not among my sheep.
  - type: text
    content: ' '
  '27':
  - type: note
    content: ver. 14, 16
  - type: text
    content: My sheep hear my voice, and I know them, and they follow me.
  - type: text
    content: ' '
  '28':
  - type: note
    content: '[1 John 2:25; 5:11]'
  - type: text
    content: 'I give them eternal life, and '
  - type: note
    content: ch. 17:12; 18:9
  - type: text
    content: 'they will never perish, and '
  - type: note
    content: ch. 6:37
  - type: text
    content: no one will snatch them out of my hand.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'My Father, '
  - type: note
    content: ch. 6:37; 17:2
  - type: text
    content: who has given them to me,
  - type: note
    content: Some manuscripts What my Father has given to me
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:28]'
  - type: text
    content: 'is greater than all, and no one is able to snatch them out of '
  - type: note
    content: '[Deut. 32:39; Isa. 49:2; 51:16]'
  - type: text
    content: the Father’s hand.
  - type: text
    content: ' '
  '3':
  - type: text
    content: To him the gatekeeper opens. The sheep hear his voice, and he calls his own sheep by name and leads them out.
  - type: text
    content: ' '
  '30':
  - type: note
    content: ch. 17:11, 22; [ch. 5:19; 14:9]
  - type: text
    content: I and the Father are one.”
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:59
  - type: text
    content: 'The Jews picked up stones again to stone him. '
  '32':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “I have shown you many good works from the Father; for which of them are you going to stone me?”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'The Jews answered him, “It is not for a good work that we are going to stone you but '
  - type: note
    content: See Lev. 24:16; Matt. 9:3
  - type: text
    content: 'for blasphemy, because you, being a man, '
  - type: note
    content: ch. 5:18
  - type: text
    content: 'make yourself God.” '
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“Is it not written in '
  - type: note
    content: '[ch. 12:34; 15:25; 1 Cor. 14:21]'
  - type: text
    content: 'your Law, '
  - type: note
    content: Cited from Ps. 82:6
  - type: text
    content: ‘I said, you are gods’?
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'If he called them gods to whom the word of God came—and Scripture cannot be '
  - type: note
    content: '[Matt. 5:17, 19]'
  - type: text
    content: broken—
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'do you say of him whom '
  - type: note
    content: '[ch. 6:27]'
  - type: text
    content: 'the Father consecrated and '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'sent into the world, ‘You are blaspheming,’ because '
  - type: note
    content: ch. 5:17, 18; [ver. 30]
  - type: text
    content: I said, ‘I am the Son of God’?
  - type: text
    content: ' '
  '37':
  - type: note
    content: ch. 15:24
  - type: text
    content: If I am not doing the works of my Father, then do not believe me;
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'but if I do them, '
  - type: note
    content: ver. 25; [ch. 14:11]
  - type: text
    content: 'even though you do not believe me, believe the works, that you may know and understand that '
  - type: note
    content: ch. 14:10, 11, 20; 17:21, 23; [ch. 8:29]
  - type: text
    content: the Father is in me and I am in the Father.”
  - type: text
    content: ' '
  '39':
  - type: note
    content: ch. 7:30, 44
  - type: text
    content: Again they sought to arrest him, but he escaped from their hands.
  '4':
  - type: text
    content: When he has brought out all his own, he goes before them, and the sheep follow him, for they know his voice.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'He went away again across the Jordan to the place '
  - type: note
    content: ch. 1:28
  - type: text
    content: 'where John had been baptizing at first, and there he remained. '
  '41':
  - type: text
    content: 'And many came to him. And they said, “John did no sign, but '
  - type: note
    content: ch. 1:7, 29-34; 3:27-30; 5:33
  - type: text
    content: 'everything that John said about this man was true.” '
  '42':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 7:31
  - type: text
    content: many believed in him there.
  '5':
  - type: note
    content: '[ver. 12, 13]'
  - type: text
    content: A stranger they will not follow, but they will flee from him, for they do not know the voice of strangers.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'This figure of speech Jesus '
  - type: note
    content: ch. 9:40
  - type: text
    content: 'used with them, but they '
  - type: note
    content: See Mark 9:32
  - type: text
    content: did not understand what he was saying to them.
  '7':
  - type: text
    content: 'So Jesus again said to them, '
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: ver. 9; [ch. 14:6; Eph. 2:18]
  - type: text
    content: I am the door of the sheep.
  - type: text
    content: ' '
  '8':
  - type: text
    content: All who came before me are thieves and robbers, but the sheep did not listen to them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'I am the door. If anyone enters by me, '
  - type: note
    content: '[ch. 5:34]'
  - type: text
    content: 'he will be saved and will go in and out and '
  - type: note
    content: Ps. 23:2; Ezek. 34:14
  - type: text
    content: find pasture.
  - type: text
    content: ' '
