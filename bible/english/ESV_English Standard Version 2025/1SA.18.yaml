document_id: 1SA.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Jonathan’s Friendship
  - type: text
    content: 'As soon as he had finished speaking to Saul, the soul of Jonathan was knit to the soul of David, and Jonathan '
  - type: note
    content: ch. 20:17; Deut. 13:6; [ch. 19:2; 2 Sam. 1:26]
  - type: text
    content: 'loved him as his own soul. '
  '10':
  - type: text
    content: 'The next day '
  - type: note
    content: ch. 16:14; [Judg. 9:23]
  - type: text
    content: 'a harmful spirit from God rushed upon Saul, and '
  - type: note
    content: ch. 19:23, 24; [1 Kgs. 18:29; Acts 16:16]
  - type: text
    content: 'he raved within his house while David was '
  - type: note
    content: See ch. 16:16
  - type: text
    content: 'playing the lyre, as he did day by day. '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'Saul had his spear in his hand. '
  '11':
  - type: text
    content: 'And Saul '
  - type: note
    content: ch. 19:10; 20:33
  - type: text
    content: hurled the spear, for he thought, “I will pin David to the wall.” But David evaded him twice.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ver. 15, 29
  - type: text
    content: 'Saul was afraid of David because '
  - type: note
    content: ver. 28; ch. 16:18
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him '
  - type: note
    content: ch. 16:14; 28:15
  - type: text
    content: 'but had departed from Saul. '
  '13':
  - type: text
    content: 'So Saul removed him from his presence and made him a commander of a thousand. '
  - type: note
    content: ver. 16; [Num. 27:17; 2 Sam. 5:2]
  - type: text
    content: 'And he went out and came in before the people. '
  '14':
  - type: text
    content: 'And David '
  - type: note
    content: ver. 5
  - type: text
    content: 'had success in all his undertakings, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him. '
  '15':
  - type: text
    content: 'And when Saul saw that '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'he had great success, he stood in fearful awe of him. '
  '16':
  - type: note
    content: '[ver. 5]'
  - type: text
    content: But all Israel and Judah loved David, for he went out and came in before them.
  - type: heading
    content: David Marries Michal
  '17':
  - type: text
    content: 'Then Saul said to David, “Here is '
  - type: note
    content: ch. 14:49
  - type: text
    content: 'my elder daughter Merab. '
  - type: note
    content: ch. 17:25
  - type: text
    content: 'I will give her to you for a wife. Only be valiant for me '
  - type: note
    content: ch. 25:28
  - type: text
    content: 'and fight the '
  - type: text
    content: Lord
  - type: text
    content: '’s battles.” For Saul thought, “Let not my hand be against him, '
  - type: note
    content: ver. 21, 25
  - type: text
    content: 'but let the hand of the Philistines be against him.” '
  '18':
  - type: text
    content: 'And David said to Saul, '
  - type: note
    content: ver. 23; 2 Sam. 7:18
  - type: text
    content: '“Who am I, and who are my relatives, my father’s clan in Israel, that I should be son-in-law to the king?” '
  '19':
  - type: text
    content: 'But at the time when Merab, Saul’s daughter, should have been given to David, she was given to '
  - type: note
    content: '[2 Sam. 21:8]'
  - type: text
    content: 'Adriel the '
  - type: note
    content: Judg. 7:22
  - type: text
    content: Meholathite for a wife.
  '2':
  - type: text
    content: 'And Saul took him that day '
  - type: note
    content: '[ch. 17:15]'
  - type: text
    content: 'and would not let him return to his father’s house. '
  '20':
  - type: text
    content: 'Now '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'Saul’s daughter Michal '
  - type: note
    content: ver. 28
  - type: text
    content: 'loved David. And they told Saul, and the thing pleased him. '
  '21':
  - type: text
    content: 'Saul thought, “Let me give her to him, that she may '
  - type: note
    content: Ex. 10:7
  - type: text
    content: 'be a snare for him '
  - type: note
    content: ver. 17
  - type: text
    content: and that the hand of the Philistines may be against him.” Therefore Saul said to David a second time,
  - type: note
    content: Hebrew by two
  - type: text
    content: ' '
  - type: note
    content: '[ver. 26]'
  - type: text
    content: '“You shall now be my son-in-law.” '
  '22':
  - type: text
    content: 'And Saul commanded his servants, “Speak to David in private and say, ‘Behold, the king has delight in you, and all his servants love you. Now then become the king’s son-in-law.’” '
  '23':
  - type: text
    content: 'And Saul’s servants spoke those words in the ears of David. And David said, '
  - type: note
    content: '[Num. 16:9]'
  - type: text
    content: '“Does it seem to you a little thing to become the king’s son-in-law, since I am a poor man and have no reputation?” '
  '24':
  - type: text
    content: 'And the servants of Saul told him, “Thus and so did David speak.” '
  '25':
  - type: text
    content: 'Then Saul said, “Thus shall you say to David, ‘The king desires no '
  - type: note
    content: Gen. 34:12; Ex. 22:17
  - type: text
    content: 'bride-price except a hundred foreskins of the Philistines, '
  - type: note
    content: ch. 14:24
  - type: text
    content: 'that he may be avenged of the king’s enemies.’” '
  - type: note
    content: ver. 17, 21
  - type: text
    content: 'Now Saul thought to make David fall by the hand of the Philistines. '
  '26':
  - type: text
    content: 'And when his servants told David these words, it pleased David well to be the king’s son-in-law. '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'Before the time had expired, '
  '27':
  - type: text
    content: 'David arose and went, '
  - type: note
    content: ver. 13
  - type: text
    content: 'along with his men, and killed two hundred of the Philistines. '
  - type: note
    content: 2 Sam. 3:14
  - type: text
    content: 'And David brought their foreskins, which were given in full number to the king, that he might become the king’s son-in-law. And Saul gave him his daughter Michal for a wife. '
  '28':
  - type: text
    content: 'But when Saul saw and knew that '
  - type: note
    content: ver. 12
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was with David, '
  - type: note
    content: ver. 20
  - type: text
    content: 'and that Michal, Saul’s daughter, loved him, '
  '29':
  - type: text
    content: Saul was even more afraid of David. So Saul was David’s enemy continually.
  '3':
  - type: text
    content: 'Then Jonathan made a covenant with David, because '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'he loved him as his own soul. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:8; [ 2 Sam. 11:1 ]
  - type: text
    content: 'Then the commanders of the Philistines came out to battle, and as often as they came out '
  - type: note
    content: ver. 5
  - type: text
    content: David had more success than all the servants of Saul, so that his name was highly esteemed.
  '4':
  - type: text
    content: 'And Jonathan stripped himself of the robe that was on him and gave it to David, and his armor, and even his sword and his bow and his belt. '
  '5':
  - type: text
    content: 'And David went out '
  - type: note
    content: ver. 14, 15, 30
  - type: text
    content: and was successful wherever Saul sent him, so that Saul set him over the men of war. And this was good in the sight of all the people and also in the sight of Saul’s servants.
  - type: heading
    content: Saul’s Jealousy of David
  '6':
  - type: text
    content: 'As they were coming home, when David returned from striking down the Philistine, '
  - type: note
    content: Ex. 15:20; Judg. 11:34
  - type: text
    content: the women came out of all the cities of Israel, singing and dancing, to meet King Saul, with tambourines, with songs of joy, and with musical instruments.
  - type: note
    content: Or triangles, or three-stringed instruments
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And the women '
  - type: note
    content: '[Ex. 15:21]'
  - type: text
    content: sang to one another as they celebrated,
  - type: note
    content: ch. 21:11; 29:5
  - type: text
    content: “Saul has struck down his thousands,
  - type: text
    content: and David his ten thousands.”
  '8':
  - type: text
    content: 'And Saul was very angry, and this saying displeased him. He said, “They have ascribed to David ten thousands, and to me they have ascribed thousands, and what more can he have but '
  - type: note
    content: ch. 15:28
  - type: text
    content: 'the kingdom?” '
  '9':
  - type: text
    content: And Saul eyed David from that day on.
