document_id: MAT.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temptation of Jesus
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-11, see Mark 1:12, 13; Luke 4:1-13
  - type: text
    content: 'Then Jesus was led up by the Spirit into the wilderness '
  - type: note
    content: '[Heb. 2:18; 4:15]'
  - type: text
    content: 'to be tempted by the devil. '
  '10':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: '“Be gone, '
  - type: note
    content: See 1 Chr. 21:1
  - type: text
    content: 'Satan! For '
  - type: note
    content: ver. 4, 7
  - type: text
    content: it is written,
  - type: note
    content: Cited from Deut. 6:13
  - type: text
    content: “‘You shall worship the Lord your God
  - type: text
    content: 'and '
  - type: note
    content: 1 Sam. 7:3
  - type: text
    content: him only shall you serve.’”
  '11':
  - type: text
    content: 'Then the devil left him, and behold, '
  - type: note
    content: ch. 26:53; Luke 22:43
  - type: text
    content: angels came and were ministering to him.
  - type: heading
    content: Jesus Begins His Ministry
  '12':
  - type: text
    content: 'Now when he heard that '
  - type: note
    content: ch. 14:3; Mark 1:14; Luke 3:19, 20; [John 3:24]
  - type: text
    content: 'John had been arrested, '
  - type: note
    content: Luke 4:14
  - type: text
    content: 'he withdrew into Galilee. '
  '13':
  - type: text
    content: 'And leaving '
  - type: note
    content: See ch. 2:23
  - type: text
    content: 'Nazareth he went and lived in '
  - type: note
    content: '[ch. 9:1]'
  - type: text
    content: 'Capernaum by '
  - type: note
    content: John 6:1
  - type: text
    content: 'the sea, in the territory of '
  - type: note
    content: Josh. 19:32-34
  - type: text
    content: 'Zebulun and Naphtali, '
  '14':
  - type: note
    content: See ch. 1:22
  - type: text
    content: 'so that what was spoken by the prophet Isaiah might be fulfilled:'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cited from Isa. 9:1, 2
  - type: text
    content: “The land of Zebulun and the land of Naphtali,
  - type: text
    content: the way of the sea, beyond the Jordan, Galilee of the Gentiles—
  '16':
  - type: text
    content: ' '
  - type: note
    content: Isa. 42:7; Luke 1:79
  - type: text
    content: the people dwelling in darkness
  - type: text
    content: have seen a great light,
  - type: text
    content: 'and for those dwelling in the region and '
  - type: note
    content: Job 3:5; Ps. 23:4; Amos 5:8
  - type: text
    content: shadow of death,
  - type: text
    content: on them a light has dawned.”
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mark 1:14
  - type: text
    content: 'From that time Jesus began to preach, saying, '
  - type: note
    content: ch. 3:2
  - type: text
    content: “Repent, for the kingdom of heaven is at hand.”
  - type: note
    content: Or the kingdom of heaven has come near
  - type: heading
    content: Jesus Calls the First Disciples
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-22, see Mark 1:16-20; [ Luke 5:2-11; John 1:40-42 ]
  - type: text
    content: 'While walking by '
  - type: note
    content: ver. 13
  - type: text
    content: 'the Sea of Galilee, he saw two brothers, Simon (who is called Peter) and Andrew his brother, casting a net into the sea, for they were fishermen. '
  '19':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Follow me, and I will make you '
  - type: note
    content: ch. 13:47
  - type: text
    content: fishers of men.”
  - type: note
    content: The Greek word anthropoi refers here to both men and women
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And after fasting '
  - type: note
    content: '[Deut. 9:9, 18; 1 Kgs. 19:8]'
  - type: text
    content: 'forty days and forty nights, he '
  - type: note
    content: '[John 4:6, 7]'
  - type: text
    content: 'was hungry. '
  '20':
  - type: text
    content: 'Immediately they left their nets and followed him. '
  '21':
  - type: text
    content: 'And going on from there he saw two other brothers, James the son of Zebedee and John his brother, in the boat with Zebedee their father, mending their nets, and he called them. '
  '22':
  - type: text
    content: Immediately they left the boat and their father and followed him.
  - type: heading
    content: Jesus Ministers to Great Crowds
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mark 1:39
  - type: text
    content: 'And he went throughout all Galilee, '
  - type: note
    content: ch. 9:35; 13:54; Mark 1:21; Luke 4:15; John 18:20
  - type: text
    content: 'teaching in their synagogues and '
  - type: note
    content: ch. 24:14; Luke 4:43; [ch. 13:19]
  - type: text
    content: 'proclaiming the gospel of the kingdom and '
  - type: note
    content: ch. 8:16; 14:35, 36; Mark 1:34; 6:55, 56
  - type: text
    content: 'healing every disease and every affliction among the people. '
  '24':
  - type: text
    content: 'So his fame spread throughout all '
  - type: note
    content: Luke 2:2
  - type: text
    content: 'Syria, and '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'they brought him all the sick, those afflicted with various diseases and '
  - type: note
    content: ch. 8:6
  - type: text
    content: 'pains, '
  - type: note
    content: '[John 10:21]'
  - type: text
    content: 'those oppressed by demons, '
  - type: note
    content: ch. 17:15
  - type: text
    content: 'those having seizures, and '
  - type: note
    content: ch. 9:2, 6
  - type: text
    content: 'paralytics, and he healed them. '
  '25':
  - type: note
    content: Mark 3:7, 8; Luke 6:17
  - type: text
    content: 'And great crowds followed him from Galilee and the '
  - type: note
    content: Mark 5:20
  - type: text
    content: Decapolis, and from Jerusalem and Judea, and from beyond the Jordan.
  '3':
  - type: text
    content: 'And '
  - type: note
    content: 1 Thess. 3:5
  - type: text
    content: 'the tempter came and said to him, “If you are '
  - type: note
    content: See ch. 14:33
  - type: text
    content: 'the Son of God, command '
  - type: note
    content: '[ch. 3:9]'
  - type: text
    content: 'these stones to become loaves of bread.” '
  '4':
  - type: text
    content: 'But he answered, '
  - type: note
    content: ver. 7, 10; Eph. 6:17
  - type: text
    content: “It is written,
  - type: note
    content: Cited from Deut. 8:3; [ John 4:34 ]
  - type: text
    content: “‘Man shall not live by bread alone,
  - type: text
    content: but by every word that comes from the mouth of God.’”
  '5':
  - type: text
    content: ' '
  - type: note
    content: Luke 4:9
  - type: text
    content: 'Then the devil took him to '
  - type: note
    content: ch. 27:53; Neh. 11:18; Isa. 48:2; 52:1; Rev. 11:2; [Ps. 46:4; 48:1; Rev. 21:2; 22:19]
  - type: text
    content: 'the holy city and set him on the pinnacle of the temple '
  '6':
  - type: text
    content: and said to him, “If you are the Son of God, throw yourself down, for it is written,
  - type: note
    content: Cited from Ps. 91:11, 12
  - type: text
    content: “‘He will command his angels concerning you,’
  - type: text
    content: and
  - type: text
    content: “‘On their hands they will bear you up,
  - type: text
    content: lest you strike your foot against a stone.’”
  '7':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“Again '
  - type: note
    content: ver. 4, 10
  - type: text
    content: 'it is written, '
  - type: note
    content: Cited from Deut. 6:16
  - type: text
    content: '‘You shall not '
  - type: note
    content: '[Isa. 7:12]'
  - type: text
    content: put the Lord your God to the test.’”
  - type: text
    content: ' '
  '8':
  - type: note
    content: Luke 4:5
  - type: text
    content: 'Again, the devil took him to a very high mountain and showed him all the kingdoms of the world and their glory. '
  '9':
  - type: text
    content: 'And he said to him, “All these I will give you, if you will fall down and worship me.” '
