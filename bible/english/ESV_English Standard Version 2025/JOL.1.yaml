document_id: JOL.1,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Joel, the son of Pethuel:'
  - type: heading
    content: An Invasion of Locusts
  '10':
  - type: text
    content: The fields are destroyed,
  - type: note
    content: See Hos. 4:3
  - type: text
    content: the ground mourns,
  - type: text
    content: 'because '
  - type: note
    content: '[Hos. 2:9]'
  - type: text
    content: the grain is destroyed,
  - type: note
    content: '[ Hos. 2:9 ]'
  - type: text
    content: the wine dries up,
  - type: text
    content: the oil languishes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 14:4 ]'
  - type: text
    content: Be ashamed,
  - type: note
    content: The Hebrew words for dry up and be ashamed in verses 10–12, 17 sound alike
  - type: text
    content: ' O tillers of the soil;'
  - type: text
    content: wail, O vinedressers,
  - type: text
    content: for the wheat and the barley,
  - type: note
    content: ver. 17
  - type: text
    content: because the harvest of the field has perished.
  '12':
  - type: text
    content: The vine dries up;
  - type: note
    content: '[ver. 7 ]'
  - type: text
    content: the fig tree languishes.
  - type: text
    content: Pomegranate, palm, and apple,
  - type: text
    content: all the trees of the field are dried up,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 24:11; Jer. 48:33
  - type: text
    content: gladness dries up
  - type: text
    content: from the children of man.
  - type: heading
    content: A Call to Repentance
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 8; Jer. 4:8 ]'
  - type: text
    content: 'Put on sackcloth and lament, '
  - type: note
    content: '[See ver. 9above]'
  - type: text
    content: O priests;
  - type: note
    content: '[ver. 8; Mic. 1:8 ]'
  - type: text
    content: wail, O ministers of the altar.
  - type: text
    content: 'Go in, '
  - type: note
    content: '[ver. 8; Jer. 4:8]'
  - type: text
    content: pass the night in sackcloth,
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: O ministers of my God!
  - type: note
    content: ver. 9 ; ch. 2:14
  - type: text
    content: Because grain offering and drink offering
  - type: text
    content: are withheld from the house of your God.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:15, 16; See 2 Chr. 20:3
  - type: text
    content: Consecrate a fast;
  - type: note
    content: ch. 2:15, 16; See 2 Chr. 20:3
  - type: text
    content: call a solemn assembly.
  - type: text
    content: 'Gather '
  - type: note
    content: ver. 2
  - type: text
    content: the elders
  - type: text
    content: 'and '
  - type: note
    content: ver. 2
  - type: text
    content: all the inhabitants of the land
  - type: text
    content: 'to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: 'and cry out to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: Alas for the day!
  - type: note
    content: ch. 2:1, 11, 31; 3:14; Isa. 13:6, 9; Jer. 46:10; Ezek. 30:2, 3; Amos 5:18; Obad. 15; Zeph. 1:14, 15; Zech. 14:1; 2 Pet. 3:10
  - type: text
    content: 'For the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near,'
  - type: text
    content: and as destruction from the Almighty
  - type: note
    content: Destruction sounds like the Hebrew for Almighty
  - type: text
    content: ' it comes.'
  '16':
  - type: text
    content: Is not the food cut off
  - type: text
    content: before our eyes,
  - type: note
    content: '[ Deut. 12:6, 7; 16:14, 15 ]'
  - type: text
    content: joy and gladness
  - type: text
    content: from the house of our God?
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Mal. 2:3 ]'
  - type: text
    content: The seed shrivels under the clods;
  - type: note
    content: The meaning of the Hebrew line is uncertain
  - type: text
    content: the storehouses are desolate;
  - type: text
    content: the granaries are torn down
  - type: text
    content: 'because '
  - type: note
    content: ver. 11
  - type: text
    content: the grain has dried up.
  '18':
  - type: text
    content: 'How '
  - type: note
    content: ch. 2:22; [Jer. 12:4; Hos. 4:3]
  - type: text
    content: the beasts groan!
  - type: text
    content: The herds of cattle are perplexed
  - type: text
    content: because there is no pasture for them;
  - type: text
    content: even the flocks of sheep suffer.
  - type: note
    content: Or are made desolate
  '19':
  - type: text
    content: 'To you, '
  - type: note
    content: Ps. 50:15
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I call.'
  - type: note
    content: Jer. 9:10
  - type: text
    content: For fire has devoured
  - type: text
    content: the pastures of the wilderness,
  - type: note
    content: Jer. 9:10
  - type: text
    content: and flame has burned
  - type: text
    content: all the trees of the field.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Hos. 5:1 ]'
  - type: text
    content: 'Hear this, '
  - type: note
    content: ver. 14
  - type: text
    content: you elders;
  - type: text
    content: 'give ear, '
  - type: note
    content: ver. 14
  - type: text
    content: all inhabitants of the land!
  - type: note
    content: '[ch. 2:2 ]'
  - type: text
    content: Has such a thing happened in your days,
  - type: text
    content: or in the days of your fathers?
  '20':
  - type: text
    content: 'Even the beasts of the field '
  - type: note
    content: '[Job 38:41; Ps. 104:21; 145:15]'
  - type: text
    content: pant for you
  - type: text
    content: because the water brooks are dried up,
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: and fire has devoured
  - type: text
    content: the pastures of the wilderness.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 78:4 ]'
  - type: text
    content: Tell your children of it,
  - type: text
    content: and let your children tell their children,
  - type: text
    content: and their children to another generation.
  '4':
  - type: text
    content: 'What '
  - type: note
    content: ch. 2:25; Amos 4:9
  - type: text
    content: the cutting locust left,
  - type: note
    content: '[ Amos 7:1 ]; See Ex. 10:4'
  - type: text
    content: the swarming locust has eaten.
  - type: text
    content: What the swarming locust left,
  - type: note
    content: ch. 2:25; Ps. 105:34; Nah. 3:15
  - type: text
    content: the hopping locust has eaten,
  - type: text
    content: and what the hopping locust left,
  - type: note
    content: ch. 2:25; Ps. 78:46
  - type: text
    content: the destroying locust has eaten.
  '5':
  - type: text
    content: Awake, you drunkards, and weep,
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 24:11]'
  - type: text
    content: wail, all you drinkers of wine,
  - type: text
    content: 'because of '
  - type: note
    content: ch. 3:18; Isa. 49:26; Amos 9:13
  - type: text
    content: the sweet wine,
  - type: text
    content: for it is cut off from your mouth.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: ch. 2:2
  - type: text
    content: a nation has come up against my land,
  - type: note
    content: ch. 2:2
  - type: text
    content: powerful and beyond number;
  - type: note
    content: '[ Rev. 9:7, 8 ]'
  - type: text
    content: its teeth are lions’ teeth,
  - type: text
    content: and it has the fangs of a lioness.
  '7':
  - type: text
    content: It has laid waste my vine
  - type: text
    content: 'and splintered my '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: fig tree;
  - type: text
    content: it has stripped off their bark and thrown it down;
  - type: text
    content: their branches are made white.
  '8':
  - type: text
    content: Lament like a virgin
  - type: note
    content: Or young woman
  - type: text
    content: ' '
  - type: note
    content: '[ver. 13]; See 2 Sam. 3:31'
  - type: text
    content: wearing sackcloth
  - type: text
    content: for the bridegroom of her youth.
