verses:
  '1':
  - type: heading
    content: The Lord Reigns
  - type: text
    content: ' '
  - type: note
    content: Ps. 96:10; See 1 Chr. 16:31
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns; he is '
  - type: note
    content: Ps. 104:1
  - type: text
    content: robed in majesty;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: Isa. 51:9
  - type: text
    content: 'robed; he has '
  - type: note
    content: Ps. 65:6
  - type: text
    content: put on strength as his belt.
  - type: note
    content: Ps. 96:10; [ Ps. 46:5 ]
  - type: text
    content: 'Yes, the world is established; '
  - type: note
    content: See Ps. 125:1
  - type: text
    content: it shall never be moved.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 45:6 ]'
  - type: text
    content: Your throne is established from of old;
  - type: note
    content: Ps. 90:2
  - type: text
    content: you are from everlasting.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 98:7, 8; Hab. 3:10 ]'
  - type: text
    content: 'The floods have lifted up, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the floods have lifted up their voice;
  - type: text
    content: the floods lift up their roaring.
  '4':
  - type: text
    content: Mightier than the thunders of many waters,
  - type: text
    content: mightier than the waves of the sea,
  - type: note
    content: See Ps. 65:6, 7
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 92:8
  - type: text
    content: on high is mighty!
  '5':
  - type: text
    content: 'Your '
  - type: note
    content: '[Ps. 89:28, 37]'
  - type: text
    content: decrees are very trustworthy;
  - type: note
    content: See Ps. 29:2
  - type: text
    content: holiness befits your house,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', forevermore.'
