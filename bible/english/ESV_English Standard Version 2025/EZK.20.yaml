  - type: text
    content: 'that I would scatter them among the nations and disperse them through the countries, '
  '24':
  - type: text
    content: 'because they had not obeyed my rules, but had rejected my statutes and profaned my Sabbaths, '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'and their eyes were set on their fathers’ idols. '
  '25':
  - type: note
    content: Ps. 81:12; Acts 7:42; Rom. 1:24, 28; 2 Thess. 2:11, 12; [ver. 39]
  - type: text
    content: 'Moreover, I gave them statutes that were not good and rules by which they could not have life, '
