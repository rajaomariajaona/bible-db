  - type: text
    content: 'that they might know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: '“Therefore, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, speak to the house of Israel and say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': In this also your fathers blasphemed me, by '
  - type: note
    content: See ch. 14:13
  - type: text
    content: 'dealing treacherously with me. '
  '28':
  - type: text
    content: 'For when I had brought them into the land that '
  - type: note
    content: See ver. 5
  - type: text
    content: 'I swore to give them, then wherever they saw '
  - type: note
    content: '[ch. 6:13]'
  - type: text
    content: 'any high hill or any leafy tree, there they offered their sacrifices and there they presented '
  - type: note
    content: '[ch. 8:17]'
  - type: text
    content: 'the provocation of their offering; there they sent up their pleasing aromas, and there they poured out their drink offerings. '
  '29':
  - type: text
    content: '(I said to them, '
  - type: note
    content: '[ver. 40]'
  - type: text
    content: ‘What is the high place to which you go?’ So its name is called Bamah
  - type: note
    content: Bamah means high place
  - type: text
    content: ' to this day.)'
  '3':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, speak to the elders of Israel, and say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ', Is it to inquire of me that you come? '
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: See ch. 14:3
  - type: text
    content: 'I will not be inquired of by you. '
  '30':
  - type: text
    content: '“Therefore say to the house of Israel, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'Will you defile yourselves after the manner of your fathers and go '
  - type: note
    content: Ps. 106:39
  - type: text
    content: 'whoring after their detestable things? '
  '31':
  - type: text
    content: 'When you present your gifts and '
  - type: note
    content: '[ver. 26]'
  - type: text
    content: offer up your children in fire,
  - type: note
    content: Hebrew and make your children pass through the fire
  - type: text
    content: ' you defile yourselves with all your idols to this day. And '
  - type: note
    content: See ch. 14:3
  - type: text
    content: 'shall I be inquired of by you, O house of Israel? '
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', I will not be inquired of by you.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: See ch. 11:5
  - type: text
    content: '“What is in your mind shall never happen—the thought, '
  - type: note
    content: '[Jer. 44:17]'
  - type: text
    content: '‘Let us be like the nations, like the tribes of the countries, '
  - type: note
    content: Deut. 4:28; 2 Kgs. 19:18; Dan. 5:4, 23; Rev. 9:20
  - type: text
    content: and worship wood and stone.’
  - type: heading
    content: The Lord Will Restore Israel
  '33':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: '“As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: See Jer. 21:5
  - type: text
    content: 'surely with a mighty hand and an outstretched arm and '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'with wrath poured out I will be king over you. '
  '34':
  - type: note
    content: '[Jer. 31:8]'
  - type: text
    content: 'I will bring you out from the peoples and gather you out of the countries where you are scattered, with a mighty hand and an outstretched arm, and with wrath poured out. '
  '35':
  - type: note
    content: '[ver. 10; Hos. 2:14]'
  - type: text
    content: 'And I will bring you into the wilderness of the peoples, '
  - type: note
    content: '[ch. 17:20]'
  - type: text
