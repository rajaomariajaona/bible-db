  - type: text
    content: 'I bring you out from the peoples and gather you out of the countries where you have been scattered. And '
  - type: note
    content: ch. 36:23; 39:27; [ch. 28:22; 38:16, 23; Num. 20:12; Isa. 8:13]
  - type: text
    content: 'I will manifest my holiness among you in the sight of the nations. '
  '42':
