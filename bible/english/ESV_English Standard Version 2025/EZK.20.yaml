  '1':
  - type: heading
    content: Israel’s Continuing Rebellion
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:2; 8:1; 24:1; 26:1; 29:1, 17; 30:20; 31:1; 32:1, 17; 33:21; 40:1 ]'
  - type: text
    content: 'In the seventh year, in the fifth month, on the tenth day of the month, certain of '
  - type: note
    content: See ch. 8:1
  - type: text
    content: 'the elders of Israel came to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 14:1
  - type: text
    content: 'and sat before me. '
  '10':
  - type: note
    content: Ex. 13:18, 20
  - type: text
    content: 'So I led them out of the land of Egypt and brought them into the wilderness. '
  '11':
  - type: note
    content: Deut. 4:8; [Neh. 9:13, 14; Ps. 147:19, 20]
  - type: text
    content: 'I gave them my statutes and made known to them my rules, '
  - type: note
    content: Lev. 18:5; Rom. 10:5; Gal. 3:12; See ch. 18:9
  - type: text
    content: 'by which, if a person does them, he shall live. '
  '12':
  - type: text
    content: 'Moreover, I gave them '
  - type: note
    content: '[ver. 13, 16, 21, 24]; See Ex. 20:8-11; Deut. 5:12-15'
  - type: text
    content: 'my Sabbaths, as a sign between me and them, '
  - type: note
    content: ch. 37:28; [Lev. 21:23]
  - type: text
    content: 'that they might know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies them. '
  '13':
  - type: note
    content: ver. 21
  - type: text
    content: 'But the house of Israel rebelled against me in the wilderness. '
  - type: note
    content: ver. 21, 24
  - type: text
    content: 'They did not walk in my statutes but rejected my rules, by which, if a person does them, he shall live; '
  - type: note
    content: ver. 21, 24; ch. 22:8; 23:38
  - type: text
    content: and my Sabbaths they greatly profaned.
  - type: note
    content: ver. 21
  - type: text
    content: '“Then I said I would pour out my wrath upon them in the wilderness, to make a full end of them. '
  '14':
  - type: text
    content: 'But I acted for the sake of my name, that it should not be profaned in the sight of the nations, '
  - type: note
    content: ver. 9
  - type: text
    content: 'in whose sight I had brought them out. '
  '15':
  - type: text
    content: 'Moreover, '
  - type: note
    content: See ver. 5
  - type: text
    content: 'I swore to them in the wilderness '
  - type: note
    content: Ps. 95:11; See Num. 14:28-30
  - type: text
    content: 'that I would not bring them into the land that I had given them, a land '
  - type: note
    content: ver. 6; See Ex. 3:8
  - type: text
    content: 'flowing with milk and honey, '
  - type: note
    content: ver. 6; See Ex. 3:8
  - type: text
    content: 'the most glorious of all lands, '
  '16':
  - type: text
    content: 'because they rejected my rules and did not walk in my statutes, and profaned my Sabbaths; '
  - type: note
    content: '[ver. 24; Num. 15:39; Ps. 78:37]'
  - type: text
    content: 'for their heart went after their idols. '
  '17':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'my eye spared them, and I did not destroy them or '
  - type: note
    content: '[ch. 11:13]'
  - type: text
    content: make a full end of them in the wilderness.
  '18':
  - type: text
    content: '“And I said to '
  - type: note
    content: ver. 21; [ch. 2:3]
  - type: text
    content: 'their children in the wilderness, ‘Do not walk '
  - type: note
