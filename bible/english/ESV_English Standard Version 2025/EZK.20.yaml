  - type: text
    content: 'in the statutes of your fathers, nor keep their rules, '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'nor defile yourselves with their idols. '
  '19':
  - type: note
    content: ver. 5; See Ex. 20:2
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God; '
  - type: note
    content: Deut. 5:32, 33
  - type: text
    content: 'walk in my statutes, and be careful to obey my rules, '
  '2':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '20':
  - type: text
