  - type: text
    content: '“Then I said I would pour out my wrath upon them and spend my anger against them in the wilderness. '
  '22':
  - type: note
    content: ver. 14
  - type: text
    content: 'But I withheld my hand '
  - type: note
    content: ver. 9, 14, 44
  - type: text
    content: 'and acted for the sake of my name, '
  - type: note
    content: ver. 9
  - type: text
    content: 'that it should not be profaned in the sight of the nations, in whose sight I had brought them out. '
  '23':
  - type: note
    content: ver. 15
  - type: text
    content: 'Moreover, '
  - type: note
    content: See ver. 5
  - type: text
    content: 'I swore to them in the wilderness '
  - type: note
