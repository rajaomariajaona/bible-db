  - type: text
    content: but my holy name you shall no more profane with your gifts and your idols.
  '4':
  - type: note
    content: ch. 22:2; 23:36
  - type: text
    content: 'Will you judge them, son of man, will you judge them? '
  - type: note
    content: ch. 16:2; 22:2
  - type: text
    content: 'Let them know the abominations of their fathers, '
  '40':
  - type: text
    content: ' '
  - type: note
