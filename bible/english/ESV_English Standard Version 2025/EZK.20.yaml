  - type: note
    content: '[Deut. 5:4]'
  - type: text
    content: 'face to face. '
  '36':
  - type: note
    content: See Num. 14:20-23, 28-30
  - type: text
    content: 'As I entered into judgment with your fathers in the wilderness of the land of Egypt, so I will enter into judgment with you, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'I will make you '
  - type: note
    content: Lev. 27:32
  - type: text
    content: 'pass under the rod, and I will bring you into the bond of the covenant. '
  '38':
  - type: note
    content: ch. 34:17, 20, 22; [Matt. 25:32, 33]
  - type: text
    content: 'I will purge out the rebels from among you, and those who transgress against me. '
  - type: note
