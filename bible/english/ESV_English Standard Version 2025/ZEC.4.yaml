document_id: ZEC.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of a Golden Lampstand
  - type: text
    content: 'And '
  - type: note
    content: ch. 1:9, 19
  - type: text
    content: 'the angel who talked with me came again '
  - type: note
    content: Dan. 8:18; 10:9, 10
  - type: text
    content: 'and woke me, like a man who is awakened out of his sleep. '
  '10':
  - type: note
    content: '[Hag. 2:3]'
  - type: text
    content: 'For whoever has despised the day of small things shall rejoice, and shall see '
  - type: note
    content: '[ch. 1:16]'
  - type: text
    content: the plumb line in the hand of Zerubbabel.
  - type: note
    content: ch. 3:9
  - type: text
    content: '“These seven '
  - type: note
    content: ch. 3:9
  - type: text
    content: 'are the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Chr. 16:9; [Prov. 15:3]
  - type: text
    content: 'which range through the whole earth.” '
  '11':
  - type: text
    content: 'Then I said to him, “What are these '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'two olive trees on the right and the left of the lampstand?” '
  '12':
  - type: text
    content: 'And a second time I answered and said to him, “What are these '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: two branches of the olive trees, which are beside the two golden pipes from which the golden oil
  - type: note
    content: Hebrew lacks oil
  - type: text
    content: ' is poured out?” '
  '13':
  - type: text
    content: 'He said to me, '
  - type: note
    content: ver. 5
  - type: text
    content: '“Do you not know what these are?” I said, “No, my lord.” '
  '14':
  - type: text
    content: 'Then he said, '
  - type: note
    content: Rev. 11:4
  - type: text
    content: “These are the two anointed ones
  - type: note
    content: Hebrew two sons of new oil
  - type: text
    content: ' who stand by '
  - type: note
    content: ch. 6:5
  - type: text
    content: the Lord of the whole earth.”
  '2':
  - type: text
    content: 'And he said to me, “What do you see?” I said, “I see, and behold, '
  - type: note
    content: See Ex. 25:31
  - type: text
    content: 'a lampstand all of gold, with a bowl on the top of it, and '
  - type: note
    content: Ex. 25:37; [Rev. 1:12; 4:5]
  - type: text
    content: 'seven lamps on it, with seven lips on each of the lamps that are on the top of it. '
  '3':
  - type: text
    content: 'And there are '
  - type: note
    content: '[ver. 11; Rev. 11:4]'
  - type: text
    content: 'two olive trees by it, one on the right of the bowl and the other on its left.” '
  '4':
  - type: text
    content: 'And I said to '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the angel who talked with me, “What are these, my lord?” '
  '5':
  - type: text
    content: 'Then the angel who talked with me answered and said to me, '
  - type: note
    content: ver. 12
  - type: text
    content: '“Do you not know what these are?” I said, “No, my lord.” '
  '6':
  - type: text
    content: 'Then he said to me, “This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to '
  - type: note
    content: See 1 Chr. 3:19
  - type: text
    content: 'Zerubbabel: '
  - type: note
    content: '[Hos. 1:7]'
  - type: text
    content: 'Not by might, nor by power, but by my Spirit, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '7':
  - type: text
    content: 'Who are you, '
  - type: note
    content: '[Jer. 51:25]'
  - type: text
    content: 'O great mountain? Before '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Zerubbabel '
  - type: note
    content: Isa. 40:4
  - type: text
    content: 'you shall become a plain. And he shall bring forward '
  - type: note
    content: See ch. 3:9
  - type: text
    content: the top stone amid shouts of ‘Grace, grace to it!’”
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me, saying, '
  '9':
  - type: note
    content: '[Ezra 3:10]'
  - type: text
    content: '“The hands of '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Zerubbabel have laid the foundation of this house; his hands shall also '
  - type: note
    content: '[ch. 1:16]'
  - type: text
    content: 'complete it. '
  - type: note
    content: See ch. 2:9
  - type: text
    content: 'Then you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has sent me to you. '
