document_id: 1SA.30,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Wives Are Captured
  - type: text
    content: 'Now when David and his men came to '
  - type: note
    content: ch. 29:4, 11
  - type: text
    content: 'Ziklag on the third day, '
  - type: note
    content: ch. 27:8; [ch. 15:3, 7]
  - type: text
    content: 'the Amalekites had '
  - type: note
    content: ver. 14
  - type: text
    content: 'made a raid against the Negeb and against Ziklag. They had overcome Ziklag and burned it with fire '
  '10':
  - type: text
    content: 'But David pursued, he and four hundred men. '
  - type: note
    content: ver. 21
  - type: text
    content: Two hundred stayed behind, who were too exhausted to cross the brook Besor.
  '11':
  - type: text
    content: 'They found an Egyptian in the open country and brought him to David. And they gave him bread and he ate. They gave him water to drink, '
  '12':
  - type: text
    content: 'and they gave him a piece of a cake of figs and two clusters of raisins. And when he had eaten, '
  - type: note
    content: Judg. 15:19; [ch. 14:27]
  - type: text
    content: 'his spirit revived, for he had not eaten bread or drunk water for three days and three nights. '
  '13':
  - type: text
    content: 'And David said to him, “To whom do you belong? And where are you from?” He said, “I am a young man of Egypt, servant to an Amalekite, and my master left me behind because I fell sick three days ago. '
  '14':
  - type: note
    content: ver. 1
  - type: text
    content: 'We had made a raid against the Negeb of '
  - type: note
    content: 2 Sam. 8:18; 15:18; 20:7, 23; 1 Kgs. 1:38, 44; 1 Chr. 18:17; [Ezek. 25:16; Zeph. 2:5]
  - type: text
    content: 'the Cherethites and against that which belongs to Judah and against the Negeb of Caleb, and we burned Ziklag with fire.” '
  '15':
  - type: text
    content: 'And David said to him, “Will you take me down to this band?” And he said, “Swear to me by God that you will not kill me or deliver me into the hands of my master, and I will take you down to this '
  - type: note
    content: '[ch. 25:3]'
  - type: text
    content: band.”
  - type: heading
    content: David Defeats the Amalekites
  '16':
  - type: text
    content: 'And when he had taken him down, behold, they were spread abroad over all the land, eating and drinking and dancing, because of all the great spoil they had taken from the land of the Philistines and from the land of Judah. '
  '17':
  - type: text
    content: 'And David struck them down from twilight until the evening of the next day, and not a man of them escaped, except four hundred young men, who mounted camels and fled. '
  '18':
  - type: note
    content: ver. 8
  - type: text
    content: 'David recovered all that the Amalekites had taken, and David rescued his two wives. '
  '19':
  - type: text
    content: 'Nothing was missing, whether small or great, sons or daughters, spoil or anything that had been taken. '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'David brought back all. '
  '2':
  - type: text
    content: and taken captive the women and all
  - type: note
    content: Septuagint; Hebrew lacks and all
  - type: text
    content: ' who were in it, both small and great. They killed no one, but carried them off and went their way. '
  '20':
  - type: text
    content: David also captured all the flocks and herds, and the people drove the livestock before him,
  - type: note
    content: The meaning of the Hebrew clause is uncertain
  - type: text
    content: ' and said, “This is David’s spoil.”'
  '21':
  - type: text
    content: 'Then David came to '
  - type: note
    content: ver. 10
  - type: text
    content: 'the two hundred men who had been too exhausted to follow David, and who had been left '
  - type: note
    content: ver. 10
  - type: text
    content: 'at the brook Besor. And they went out to meet David and to meet the people who were with him. And when David came near to the people he greeted them. '
  '22':
  - type: text
    content: 'Then all the wicked and worthless fellows among the men who had gone with David said, “Because they did not go with us, we will not give them any of the spoil that we have recovered, except that each man may lead away his wife and children, and depart.” '
  '23':
  - type: text
    content: 'But David said, “You shall not do so, my brothers, with what the '
  - type: text
    content: Lord
  - type: text
    content: ' has given us. He has preserved us and given into our hand the band that came against us. '
  '24':
  - type: text
    content: 'Who would listen to you in this matter? '
  - type: note
    content: '[Num. 31:27; Josh. 22:8]'
  - type: text
    content: 'For as his share is who goes down into the battle, so shall his share be who stays by the baggage. They shall share alike.” '
  '25':
  - type: text
    content: And he made it a statute and a rule for Israel from that day forward to this day.
  '26':
  - type: text
    content: 'When David came to Ziklag, he sent part of the spoil to his friends, the elders of Judah, saying, “Here is a present for you from the spoil of the enemies of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '27':
  - type: text
    content: 'It was for those in '
  - type: note
    content: Gen. 28:19; See Judg. 1:22-26
  - type: text
    content: 'Bethel, in Ramoth of the Negeb, in '
  - type: note
    content: Josh. 15:48
  - type: text
    content: 'Jattir, '
  '28':
  - type: text
    content: 'in '
  - type: note
    content: Deut. 2:36; Josh. 13:16
  - type: text
    content: 'Aroer, in Siphmoth, in '
  - type: note
    content: Josh. 15:50
  - type: text
    content: 'Eshtemoa, '
  '29':
  - type: text
    content: 'in Racal, in the cities of '
  - type: note
    content: ch. 27:10
  - type: text
    content: 'the Jerahmeelites, in the cities of '
  - type: note
    content: See Judg. 1:16
  - type: text
    content: 'the Kenites, '
  '3':
  - type: text
    content: 'And when David and his men came to the city, they found it burned with fire, and their wives and sons and daughters taken captive. '
  '30':
  - type: text
    content: 'in '
  - type: note
    content: Judg. 1:17
  - type: text
    content: 'Hormah, in Bor-ashan, in Athach, '
  '31':
  - type: text
    content: 'in '
  - type: note
    content: Josh. 14:13-15; Judg. 1:10; 2 Sam. 2:1-4
  - type: text
    content: Hebron, for all the places where David and his men had roamed.
  '4':
  - type: text
    content: 'Then David and the people who were with him raised their voices and wept until they had no more strength to weep. '
  '5':
  - type: text
    content: 'David’s '
  - type: note
    content: See ch. 25:42, 43
  - type: text
    content: 'two wives also had been taken captive, Ahinoam of Jezreel and Abigail the widow of Nabal of Carmel. '
  '6':
  - type: text
    content: 'And David was greatly distressed, for the people spoke '
  - type: note
    content: '[Ex. 17:4; Num. 14:10]'
  - type: text
    content: of stoning him, because all the people were bitter in soul,
  - type: note
    content: Compare 22:2
  - type: text
    content: ' each for his sons and daughters. But David strengthened himself in the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:6, 9
  - type: text
    content: 'And David said to Abiathar the priest, the son of Ahimelech, “Bring me the ephod.” So Abiathar brought the ephod to David. '
  '8':
  - type: note
    content: See ch. 22:10
  - type: text
    content: 'And David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Shall I pursue after this '
  - type: note
    content: '[1 Chr. 12:21]'
  - type: text
    content: 'band? Shall I overtake them?” He answered him, “Pursue, for you shall surely overtake '
  - type: note
    content: ver. 18
  - type: text
    content: 'and shall surely rescue.” '
  '9':
  - type: text
    content: 'So David set out, and '
  - type: note
    content: See ch. 23:13
  - type: text
    content: 'the six hundred men who were with him, and they came to the brook Besor, where those who were left behind stayed. '
