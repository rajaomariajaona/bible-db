document_id: JER.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem Will Fall to Nebuchadnezzar
  - type: text
    content: 'This is the word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ', when King Zedekiah sent to him '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'Pashhur the son of Malchiah and '
  - type: note
    content: ch. 29:25; 37:3; 2 Kgs. 25:18
  - type: text
    content: 'Zephaniah the priest, the son of '
  - type: note
    content: ch. 35:4; 2 Chr. 34:8
  - type: text
    content: 'Maaseiah, saying, '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: ch. 44:11; Lev. 20:3, 5; Ps. 34:16; Ezek. 14:8; [Amos 9:4]
  - type: text
    content: 'I have set my face against this city for harm and '
  - type: note
    content: '[ch. 14:11]'
  - type: text
    content: 'not for good, declares the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ver. 7; ch. 34:2; 37:8, 10; 38:17, 18, 23; 39:8; 52:13; 2 Chr. 36:19
  - type: text
    content: it shall be given into the hand of the king of Babylon, and he shall burn it with fire.’
  - type: heading
    content: Message to the House of David
  '11':
  - type: text
    content: '“And to the house of the king of Judah say, ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '12':
  - type: text
    content: 'O house of David! Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: ch. 22:3; Zech. 7:9; [ch. 22:16 ]
  - type: text
    content: '“‘Execute justice '
  - type: note
    content: Ps. 101:8
  - type: text
    content: in the morning,
  - type: text
    content: and deliver from the hand of the oppressor
  - type: text
    content: him who has been robbed,
  - type: note
    content: ch. 4:4
  - type: text
    content: lest my wrath go forth like fire,
  - type: text
    content: and burn with none to quench it,
  - type: text
    content: because of your evil deeds.’”
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 10 ]; See Ezek. 13:8'
  - type: text
    content: “Behold, I am against you, O inhabitant of the valley,
  - type: text
    content: O rock of the plain,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'you who say, '
  - type: note
    content: '[ch. 49:4]'
  - type: text
    content: ‘Who shall come down against us,
  - type: text
    content: or who shall enter our habitations?’
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:25
  - type: text
    content: 'I will punish you according to '
  - type: note
    content: Prov. 1:31; Isa. 3:10
  - type: text
    content: the fruit of your deeds,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: Ezek. 20:47
  - type: text
    content: I will kindle a fire in her forest,
  - type: note
    content: Ezek. 20:47
  - type: text
    content: and it shall devour all that is around her.”
  '2':
  - type: note
    content: '[ch. 37:7]'
  - type: text
    content: '“Inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ' for us, '
  - type: note
    content: '[2 Kgs. 25:1]'
  - type: text
    content: for Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, an alternate spelling of Nebuchadnezzar (king of Babylon) occurring frequently from Jeremiah 21–52; this latter spelling is used throughout Jeremiah for consistency
  - type: text
    content: ' king of Babylon is making war against us. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will deal with us according to '
  - type: note
    content: Ps. 105:2, 5
  - type: text
    content: all his wonderful deeds and will make him withdraw from us.”
  '3':
  - type: text
    content: 'Then Jeremiah said to them: “Thus you shall say to Zedekiah, '
  '4':
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: '
  - type: note
    content: '[ch. 32:5; 37:10]'
  - type: text
    content: 'Behold, I will turn back the weapons of war that are in your hands and with which you are fighting against the king of Babylon and against the Chaldeans who are besieging you outside the walls. '
  - type: note
    content: '[Isa. 13:4]'
  - type: text
    content: 'And I will bring them together into the midst of this city. '
  '5':
  - type: text
    content: 'I myself will fight against you '
  - type: note
    content: ch. 27:5; 32:17, 21; Ex. 6:6; Deut. 4:34; Ezek. 20:33
  - type: text
    content: 'with outstretched hand and strong arm, '
  - type: note
    content: ch. 32:37; Deut. 29:28
  - type: text
    content: 'in anger and in fury and in great wrath. '
  '6':
  - type: text
    content: 'And I will strike down the inhabitants of this city, both man and beast. They shall die of a great pestilence. '
  '7':
  - type: text
    content: 'Afterward, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 37:17; 39:5; 52:9
  - type: text
    content: 'I will give Zedekiah king of Judah and his servants and the people in this city who survive the pestilence, sword, and famine into the hand of Nebuchadnezzar king of Babylon and into the hand of their enemies, into the hand of those who seek their lives. He shall strike them down with the edge of the sword. '
  - type: note
    content: Deut. 28:50; 2 Chr. 36:17; Ezek. 5:11
  - type: text
    content: He shall not pity them or spare them or have compassion.’
  '8':
  - type: text
    content: '“And to this people you shall say: '
  - type: note
    content: Deut. 30:15, 19
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Behold, '
  - type: note
    content: ch. 38:2
  - type: text
    content: 'I set before you the way of life and the way of death. '
  '9':
  - type: text
    content: 'He who stays in this city shall die '
  - type: note
    content: See ch. 15:2
  - type: text
    content: 'by the sword, by famine, and by pestilence, but he who goes out and '
  - type: note
    content: ch. 37:13, 14
  - type: text
    content: 'surrenders to the Chaldeans who are besieging you shall live '
  - type: note
    content: ch. 39:18; 45:5
  - type: text
    content: 'and shall have his life as a prize of war. '
