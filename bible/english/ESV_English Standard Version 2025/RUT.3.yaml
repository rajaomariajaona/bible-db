document_id: RUT.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ruth and Boaz at the Threshing Floor
  - type: text
    content: 'Then Naomi her mother-in-law said to her, “My daughter, should I not seek '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'rest for you, that it may be well with you? '
  '10':
  - type: text
    content: 'And he said, '
  - type: note
    content: See ch. 2:20
  - type: text
    content: '“May you be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ', my daughter. You have made this last kindness greater than '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'the first in that you have not gone after young men, whether poor or rich. '
  '11':
  - type: text
    content: 'And now, my daughter, do not fear. I will do for you all that you ask, for all my fellow townsmen know that you are '
  - type: note
    content: Prov. 12:4; 31:10
  - type: text
    content: 'a worthy woman. '
  '12':
  - type: text
    content: 'And now it is true that I am '
  - type: note
    content: ch. 4:1
  - type: text
    content: 'a redeemer. Yet there is a redeemer nearer than I. '
  '13':
  - type: text
    content: 'Remain tonight, and in the morning, if he will '
  - type: note
    content: ch. 4:5; [Deut. 25:5]
  - type: text
    content: 'redeem you, good; let him do it. But if he is not willing to redeem you, then, '
  - type: note
    content: Judg. 8:19; 1 Sam. 14:39; 2 Sam. 4:9; 12:5; 2 Kgs. 2:2, 6
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I will redeem you. Lie down until the morning.”'
  '14':
  - type: text
    content: 'So she lay at his feet until the morning, but arose before one could recognize another. And he said, “Let it not be known that the woman came to the threshing floor.” '
  '15':
  - type: text
    content: 'And he said, “Bring the garment you are wearing and hold it out.” So she held it, and he measured out six measures of barley and put it on her. Then she went into the city. '
  '16':
  - type: text
    content: 'And when she came to her mother-in-law, she said, “How did you fare, my daughter?” Then she told her all that the man had done for her, '
  '17':
  - type: text
    content: 'saying, “These six measures of barley he gave to me, for he said to me, ‘You must not go back empty-handed to your mother-in-law.’” '
  '18':
  - type: text
    content: She replied, “Wait, my daughter, until you learn how the matter turns out, for the man will not rest but will settle the matter today.”
  '2':
  - type: text
    content: 'Is not Boaz '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'our relative, '
  - type: note
    content: ch. 2:8
  - type: text
    content: 'with whose young women you were? See, he is winnowing barley tonight at the threshing floor. '
  '3':
  - type: note
    content: 2 Sam. 12:20; 14:2
  - type: text
    content: 'Wash therefore and anoint yourself, and put on your cloak and go down to the threshing floor, but do not make yourself known to the man until he has finished eating and drinking. '
  '4':
  - type: text
    content: 'But when he lies down, observe the place where he lies. Then go and uncover his feet and lie down, and he will tell you what to do.” '
  '5':
  - type: text
    content: And she replied, “All that you say I will do.”
  '6':
  - type: text
    content: 'So she went down to the threshing floor and did just as her mother-in-law had commanded her. '
  '7':
  - type: text
    content: 'And when Boaz had eaten and drunk, and '
  - type: note
    content: See Judg. 19:6
  - type: text
    content: 'his heart was merry, he went to lie down at the end of the heap of grain. Then she came softly and uncovered his feet and lay down. '
  '8':
  - type: text
    content: 'At midnight the man was startled and turned over, and behold, a woman lay at his feet! '
  '9':
  - type: text
    content: 'He said, “Who are you?” And she answered, “I am Ruth, your servant. '
  - type: note
    content: Ezek. 16:8; [Deut. 22:30]
  - type: text
    content: Spread your wings
  - type: note
    content: Compare 2:12; the word for wings can also mean corners of a garment
  - type: text
    content: ' over your servant, for you are '
  - type: note
    content: ch. 2:20
  - type: text
    content: 'a redeemer.” '
