document_id: 1PE.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Wives and Husbands
  - type: text
    content: 'Likewise, wives, '
  - type: note
    content: See Gen. 3:16
  - type: text
    content: 'be subject to your own husbands, so that '
  - type: note
    content: 1 Cor. 7:16
  - type: text
    content: 'even if some do not obey the word, '
  - type: note
    content: Matt. 18:15; 1 Cor. 9:19-22
  - type: text
    content: 'they may be won without a word by the conduct of their wives, '
  '10':
  - type: text
    content: For
  - type: note
    content: Cited from Ps. 34:12-16
  - type: text
    content: “Whoever desires to love life
  - type: text
    content: and see good days,
  - type: text
    content: let him keep his tongue from evil
  - type: text
    content: and his lips from speaking deceit;
  '11':
  - type: text
    content: let him turn away from evil and do good;
  - type: text
    content: let him seek peace and pursue it.
  '12':
  - type: text
    content: For the eyes of the Lord are on the righteous,
  - type: text
    content: and his ears are open to their prayer.
  - type: text
    content: But the face of the Lord is against those who do evil.”
  '13':
  - type: text
    content: 'Now '
  - type: note
    content: '[Prov. 16:7]'
  - type: text
    content: 'who is there to harm you if you are zealous for what is good? '
  '14':
  - type: note
    content: ch. 2:19, 20; 4:14, 16; Matt. 5:10
  - type: text
    content: 'But even if you should suffer for righteousness’ sake, you will be blessed. '
  - type: note
    content: Isa. 8:12, 13; [ver. 6; Matt. 10:28]
  - type: text
    content: 'Have no fear of them, '
  - type: note
    content: John 14:1, 27
  - type: text
    content: 'nor be troubled, '
  '15':
  - type: text
    content: 'but '
  - type: note
    content: '[Isa. 29:23; Matt. 6:9]'
  - type: text
    content: 'in your hearts honor Christ the Lord as holy, '
  - type: note
    content: Col. 4:6; [2 Tim. 2:25]
  - type: text
    content: 'always being prepared to make a defense to anyone who asks you for a reason for the hope that is in you; yet do it with gentleness and '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'respect, '
  '16':
  - type: note
    content: Heb. 13:18
  - type: text
    content: 'having a good conscience, so that, '
  - type: note
    content: ch. 2:12
  - type: text
    content: 'when you are slandered, those who revile your good behavior in Christ may be put to shame. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: ch. 2:20; [ch. 4:15, 16]
  - type: text
    content: it is better to suffer for doing good, if that should be God’s will, than for doing evil.
  '18':
  - type: text
    content: 'For Christ also '
  - type: note
    content: ch. 2:21; 4:1; See Rom. 4:25
  - type: text
    content: suffered
  - type: note
    content: Some manuscripts died
  - type: text
    content: ' '
  - type: note
    content: Heb. 9:26, 28
  - type: text
    content: 'once for sins, the righteous for the unrighteous, '
  - type: note
    content: Rom. 5:2
  - type: text
    content: 'that he might bring us to God, being put to death '
  - type: note
    content: ch. 4:1; Col. 1:22; [2 Cor. 13:4]
  - type: text
    content: 'in the flesh but made alive '
  - type: note
    content: ch. 4:6
  - type: text
    content: 'in the spirit, '
  '19':
  - type: text
    content: in which
  - type: note
    content: Or the Spirit, in whom
  - type: text
    content: ' he went and '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: proclaimed
  - type: note
    content: Or preached
  - type: text
    content: ' to the spirits in prison, '
  '2':
  - type: text
    content: 'when they see your '
  - type: note
    content: Titus 2:5
  - type: text
    content: 'respectful and pure conduct. '
  '20':
  - type: text
    content: because
  - type: note
    content: Or when
  - type: text
    content: ' they formerly did not obey, '
  - type: note
    content: Gen. 6:3, 5, 13, 14
  - type: text
    content: 'when God’s patience waited in the days of Noah, '
  - type: note
    content: Heb. 11:7
  - type: text
    content: 'while the ark was being prepared, in which a few, that is, '
  - type: note
    content: Gen. 7:1, 7, 23; 8:18; 2 Pet. 2:5
  - type: text
    content: 'eight persons, were brought safely through water. '
  '21':
  - type: text
    content: 'Baptism, which corresponds to this, '
  - type: note
    content: Mark 16:16; Acts 16:33; Rom. 6:3-6; Titus 3:5
  - type: text
    content: 'now saves you, not as a removal of dirt from the body but '
  - type: note
    content: '[Rom. 10:10]'
  - type: text
    content: 'as an appeal to God for a good conscience, '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'through the resurrection of Jesus Christ, '
  '22':
  - type: text
    content: 'who has gone into heaven and '
  - type: note
    content: Acts 2:33, 34; Rom. 8:34; Eph. 1:20; Col. 3:1; Heb. 1:3
  - type: text
    content: 'is at the right hand of God, '
  - type: note
    content: Rom. 8:38; 1 Cor. 15:24; Eph. 1:21
  - type: text
    content: with angels, authorities, and powers having been subjected to him.
  '3':
  - type: note
    content: 1 Tim. 2:9; [Isa. 3:18-23]
  - type: text
    content: 'Do not let your adorning be external—the braiding of hair and the putting on of gold jewelry, or the clothing you wear— '
  '4':
  - type: text
    content: 'but let your adorning be '
  - type: note
    content: Rom. 2:29; [Rom. 7:22; 2 Cor. 4:16; Eph. 3:16]
  - type: text
    content: 'the hidden person of the heart with the imperishable beauty of a gentle and quiet spirit, which in God’s sight is very precious. '
  '5':
  - type: text
    content: 'For this is how the holy women who hoped in God used to adorn themselves, by submitting to their own husbands, '
  '6':
  - type: text
    content: 'as Sarah obeyed Abraham, '
  - type: note
    content: Gen. 18:12
  - type: text
    content: 'calling him lord. And you are her children, if you do good and '
  - type: note
    content: Prov. 3:25
  - type: text
    content: do not fear anything that is frightening.
  '7':
  - type: text
    content: 'Likewise, '
  - type: note
    content: Eph. 5:25; Col. 3:19
  - type: text
    content: 'husbands, live with your wives in an understanding way, showing honor to the woman as the weaker '
  - type: note
    content: See 1 Thess. 4:4
  - type: text
    content: vessel, since they are heirs with you
  - type: note
    content: Some manuscripts since you are joint heirs
  - type: text
    content: ' of the grace of life, so that your prayers may not be hindered.'
  - type: heading
    content: Suffering for Righteousness’ Sake
  '8':
  - type: text
    content: 'Finally, all of you, '
  - type: note
    content: See Rom. 12:16
  - type: text
    content: 'have unity of mind, sympathy, '
  - type: note
    content: See Heb. 13:1
  - type: text
    content: 'brotherly love, '
  - type: note
    content: Eph. 4:32
  - type: text
    content: 'a tender heart, and '
  - type: note
    content: See Eph. 4:2
  - type: text
    content: 'a humble mind. '
  '9':
  - type: note
    content: ch. 2:23; See Rom. 12:17
  - type: text
    content: 'Do not repay evil for evil or reviling for reviling, but on the contrary, '
  - type: note
    content: Luke 6:28; Rom. 12:14; 1 Cor. 4:12
  - type: text
    content: 'bless, for '
  - type: note
    content: ch. 2:21
  - type: text
    content: 'to this you were called, that you may obtain a blessing. '
