document_id: 2TH.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: ' '
  - type: note
    content: For ver. 1, 2, see 1 Thess. 1:1
  - type: text
    content: Paul, Silvanus, and Timothy,
  - type: text
    content: 'To the church of the Thessalonians in God our Father and the Lord Jesus Christ:'
  '10':
  - type: note
    content: See 1 Thess. 1:10
  - type: text
    content: 'when he comes on '
  - type: note
    content: See 1 Cor. 3:13
  - type: text
    content: 'that day '
  - type: note
    content: Ps. 89:7 (Gk.); Isa. 49:3; John 17:10
  - type: text
    content: 'to be glorified in his saints, and to be marveled at among all who have believed, because our '
  - type: note
    content: '[1 Cor. 1:6]'
  - type: text
    content: 'testimony to you '
  - type: note
    content: '[1 Thess. 2:1, 13; 1 Tim. 3:16]'
  - type: text
    content: 'was believed. '
  '11':
  - type: text
    content: 'To this end we '
  - type: note
    content: Col. 1:9
  - type: text
    content: 'always pray for you, that our God may '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'make you worthy of his calling and may fulfill every resolve for good and every '
  - type: note
    content: 1 Thess. 1:3
  - type: text
    content: 'work of faith by his power, '
  '12':
  - type: text
    content: 'so that the name of our Lord Jesus '
  - type: note
    content: '[Isa. 66:5; Acts 13:48]'
  - type: text
    content: may be glorified in you, and you in him, according to the grace of our God and the Lord Jesus Christ.
  '2':
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Thanksgiving
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:13; See Eph. 5:20; 1 Thess. 1:2, 3
  - type: text
    content: We ought always to give thanks to God for you, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' as is right, because your faith is growing abundantly, and the love of every one of you for one another is increasing. '
  '4':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[2 Cor. 7:14]; See 1 Thess. 2:19'
  - type: text
    content: 'we ourselves boast about you '
  - type: note
    content: '[1 Thess. 1:8]; See 1 Cor. 7:17'
  - type: text
    content: 'in the churches of God for your steadfastness and faith '
  - type: note
    content: '[Mark 10:30]; See 1 Thess. 2:14'
  - type: text
    content: in all your persecutions and in the afflictions that you are enduring.
  - type: heading
    content: The Judgment at Christ’s Coming
  '5':
  - type: text
    content: 'This is '
  - type: note
    content: '[Phil. 1:28]'
  - type: text
    content: 'evidence of the righteous judgment of God, that you may be '
  - type: note
    content: '[Acts 14:22]; See Luke 20:35'
  - type: text
    content: 'considered worthy of the kingdom of God, for which you are also suffering— '
  '6':
  - type: text
    content: 'since indeed God considers it '
  - type: note
    content: '[Rev. 6:10]'
  - type: text
    content: 'just '
  - type: note
    content: '[Ex. 23:22; Joel 3:4, 7]'
  - type: text
    content: 'to repay with affliction those who afflict you, '
  '7':
  - type: text
    content: 'and to grant '
  - type: note
    content: '[Rev. 6:11; 11:18; 14:13]'
  - type: text
    content: 'relief to you who are afflicted as well as to us, when '
  - type: note
    content: See Luke 17:30
  - type: text
    content: 'the Lord Jesus is revealed from heaven '
  - type: note
    content: See Jude 14
  - type: text
    content: 'with his mighty angels '
  '8':
  - type: note
    content: Isa. 66:15, 16; Matt. 25:41; 1 Cor. 3:13; Heb. 10:27; 12:29; 2 Pet. 3:7; [Mal. 4:1]
  - type: text
    content: 'in flaming fire, inflicting vengeance on those '
  - type: note
    content: See Gal. 4:8
  - type: text
    content: 'who do not know God and on those who '
  - type: note
    content: Rom. 2:8
  - type: text
    content: 'do not obey the gospel of our Lord Jesus. '
  '9':
  - type: text
    content: 'They will suffer the punishment of '
  - type: note
    content: '[Phil. 3:19; 1 Thess. 5:3]'
  - type: text
    content: 'eternal destruction, '
  - type: note
    content: Isa. 2:10, 19, 21; [ch. 2:8]
  - type: text
    content: away from
  - type: note
    content: Or destruction that comes from
  - type: text
    content: ' the presence of the Lord and from the glory of his might, '
