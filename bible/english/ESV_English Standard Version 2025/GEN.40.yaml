        - type: text
          text: '27'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the three branches are three days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In three days Pharaoh will '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 25:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:31
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. 19, 20, 22; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 3:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'lift up your head and restore you to your office, and you shall place Pharaoh’s cup in his hand as formerly, when you were his cupbearer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only remember me, when it is well with you, and please do me the kindness to mention me to Pharaoh, and so get me out of this house. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:28
      marker-yv: yv-n
    - type: text
      text: 'I was indeed stolen out of the land of the Hebrews, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:20
      marker-yv: yv-n
    - type: text
      text: here also I have done nothing that they should put me into the pit.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the chief baker saw that the interpretation was favorable, he said to Joseph, “I also had a dream: there were three cake baskets on my head, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the uppermost basket there were all sorts of baked food for Pharaoh, but the birds were eating it out of the basket on my head.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph answered and said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: '“This is its interpretation: the three baskets are three days. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      marker-yv: yv-n
    - type: text
      text: 'In three days Pharaoh will lift up your head—from you!—and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: hang you on a tree. And the birds will eat the flesh from you.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh was angry with his two officers, the chief cupbearer and the chief baker, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the third day, which was Pharaoh’s '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 14:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 6:21
      marker-yv: yv-n
    - type: text
      text: 'birthday, he made a feast for all his servants and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13, 19
      marker-yv: yv-n
    - type: text
      text: 'lifted up the head of the chief cupbearer and the head of the chief baker among his servants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      marker-yv: yv-n
    - type: text
      text: 'He restored the chief cupbearer to his position, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'he placed the cup in Pharaoh’s hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'hanged the chief baker, as Joseph had interpreted to them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet the chief cupbearer did not remember Joseph, but forgot him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:20
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and he put them in custody in the house of the captain of the guard, in the prison where Joseph was confined. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The captain of the guard appointed Joseph to be with them, and he attended them. They continued for some time in custody.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one night they both dreamed—the cupbearer and the baker of the king of Egypt, who were confined in the prison—each his own dream, and each dream with its own interpretation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joseph came to them in the morning, he saw that they were troubled. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he asked Pharaoh’s officers who were with him in custody in his master’s house, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“Why are your faces downcast today?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:15
      marker-yv: yv-n
    - type: text
      text: '“We have had dreams, and there is no one to interpret them.” And Joseph said to them, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 2:28
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '47'
      marker-yv: yv-n
    - type: text
      text: “Do not interpretations belong to God? Please tell them to me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the chief cupbearer told his dream to Joseph and said to him, “In my dream there was a vine before me, '
