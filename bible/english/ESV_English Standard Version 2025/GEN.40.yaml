    children:
    - type: text
      text: Joseph Interprets Two Prisoners’ Dreams
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time after this, the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 1:11
      marker-yv: yv-n
    - type: text
      text: 'cupbearer of the king of Egypt and his baker committed an offense against their lord the king of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and on the vine there were three branches. As soon as it budded, its blossoms shot forth, and the clusters ripened into grapes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh’s cup was in my hand, and I took the grapes and pressed them into Pharaoh’s cup and placed the cup in Pharaoh’s hand.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph said to him, '
    - type: usfm
      marker: x
