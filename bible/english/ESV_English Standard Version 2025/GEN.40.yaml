document_id: GEN.40,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Interprets Two Prisoners’ Dreams
  - type: text
    content: 'Some time after this, the '
  - type: note
    content: Neh. 1:11
  - type: text
    content: 'cupbearer of the king of Egypt and his baker committed an offense against their lord the king of Egypt. '
  '10':
  - type: text
    content: 'and on the vine there were three branches. As soon as it budded, its blossoms shot forth, and the clusters ripened into grapes. '
  '11':
  - type: text
    content: 'Pharaoh’s cup was in my hand, and I took the grapes and pressed them into Pharaoh’s cup and placed the cup in Pharaoh’s hand.” '
  '12':
  - type: text
    content: 'Then Joseph said to him, '
  - type: note
    content: ver. 18; ch. 41:12; [Dan. 2:36]
  - type: text
    content: '“This is its interpretation: '
  - type: note
    content: '[ch. 41:26, 27]'
  - type: text
    content: 'the three branches are three days. '
  '13':
  - type: text
    content: 'In three days Pharaoh will '
  - type: note
    content: 2 Kgs. 25:27; Jer. 52:31; [ver. 19, 20, 22; Ps. 3:3]
  - type: text
    content: 'lift up your head and restore you to your office, and you shall place Pharaoh’s cup in his hand as formerly, when you were his cupbearer. '
  '14':
  - type: text
    content: 'Only remember me, when it is well with you, and please do me the kindness to mention me to Pharaoh, and so get me out of this house. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: ch. 37:28
  - type: text
    content: 'I was indeed stolen out of the land of the Hebrews, and '
  - type: note
    content: ch. 39:20
  - type: text
    content: here also I have done nothing that they should put me into the pit.”
  '16':
  - type: text
    content: 'When the chief baker saw that the interpretation was favorable, he said to Joseph, “I also had a dream: there were three cake baskets on my head, '
  '17':
  - type: text
    content: 'and in the uppermost basket there were all sorts of baked food for Pharaoh, but the birds were eating it out of the basket on my head.” '
  '18':
  - type: text
    content: 'And Joseph answered and said, '
  - type: note
    content: See ver. 12
  - type: text
    content: '“This is its interpretation: the three baskets are three days. '
  '19':
  - type: note
    content: ver. 13
  - type: text
    content: 'In three days Pharaoh will lift up your head—from you!—and '
  - type: note
    content: ver. 22
  - type: text
    content: hang you on a tree. And the birds will eat the flesh from you.”
  '2':
  - type: text
    content: 'And Pharaoh was angry with his two officers, the chief cupbearer and the chief baker, '
  '20':
  - type: text
    content: 'On the third day, which was Pharaoh’s '
  - type: note
    content: Matt. 14:6; Mark 6:21
  - type: text
    content: 'birthday, he made a feast for all his servants and '
  - type: note
    content: ver. 13, 19
  - type: text
    content: 'lifted up the head of the chief cupbearer and the head of the chief baker among his servants. '
  '21':
  - type: note
    content: ver. 13
  - type: text
    content: 'He restored the chief cupbearer to his position, and '
  - type: note
    content: Neh. 2:1
  - type: text
    content: 'he placed the cup in Pharaoh’s hand. '
  '22':
  - type: text
    content: 'But he '
  - type: note
    content: ver. 19
  - type: text
    content: 'hanged the chief baker, as Joseph had interpreted to them. '
  '23':
  - type: text
    content: Yet the chief cupbearer did not remember Joseph, but forgot him.
  '3':
  - type: note
    content: '[ch. 39:20]'
  - type: text
    content: 'and he put them in custody in the house of the captain of the guard, in the prison where Joseph was confined. '
  '4':
  - type: text
    content: The captain of the guard appointed Joseph to be with them, and he attended them. They continued for some time in custody.
  '5':
  - type: text
    content: 'And one night they both dreamed—the cupbearer and the baker of the king of Egypt, who were confined in the prison—each his own dream, and each dream with its own interpretation. '
  '6':
  - type: text
    content: 'When Joseph came to them in the morning, he saw that they were troubled. '
  '7':
  - type: text
    content: 'So he asked Pharaoh’s officers who were with him in custody in his master’s house, '
  - type: note
    content: '[Neh. 2:2]'
  - type: text
    content: '“Why are your faces downcast today?” '
  '8':
  - type: text
    content: 'They said to him, '
  - type: note
    content: ch. 41:15
  - type: text
    content: '“We have had dreams, and there is no one to interpret them.” And Joseph said to them, '
  - type: note
    content: ch. 41:16; Dan. 2:28, 47
  - type: text
    content: “Do not interpretations belong to God? Please tell them to me.”
  '9':
  - type: text
    content: 'So the chief cupbearer told his dream to Joseph and said to him, “In my dream there was a vine before me, '
