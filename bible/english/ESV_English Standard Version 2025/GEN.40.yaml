        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“This is its interpretation: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
