document_id: MRK.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plot to Kill Jesus
  - type: text
    content: ' '
  - type: note
    content: For ver. 1, 2, see Matt. 26:2-5; Luke 22:1, 2
  - type: text
    content: 'It was now two days before '
  - type: note
    content: See John 6:4
  - type: text
    content: 'the Passover and the Feast of Unleavened Bread. And the chief priests and the scribes '
  - type: note
    content: John 11:53; See Matt. 21:46
  - type: text
    content: 'were seeking how to arrest him by stealth and kill him, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10, 11, see Matt. 26:14-16; Luke 22:3-6; [ John 13:2, 27, 30 ]
  - type: text
    content: 'Then '
  - type: note
    content: ch. 3:19; Matt. 27:3; Acts 1:16; [John 6:71; 12:4]
  - type: text
    content: 'Judas Iscariot, who was one of the twelve, '
  - type: note
    content: ch. 3:19; Matt. 27:3; Acts 1:16; [John 6:71; 12:4]
  - type: text
    content: 'went to the chief priests in order to betray him to them. '
  '11':
  - type: text
    content: 'And when they heard it, they were glad and promised to give him money. And he sought an opportunity to '
  - type: note
    content: See Matt. 20:18, 19
  - type: text
    content: betray him.
  - type: heading
    content: The Passover with the Disciples
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-16, see Matt. 26:17-19; Luke 22:7-13
  - type: text
    content: 'And on '
  - type: note
    content: Ex. 12:18
  - type: text
    content: 'the first day of Unleavened Bread, when they '
  - type: note
    content: 1 Cor. 5:7
  - type: text
    content: 'sacrificed the Passover lamb, his disciples said to him, “Where will you have us go and prepare for you to eat the Passover?” '
  '13':
  - type: text
    content: 'And he sent '
  - type: note
    content: '[ch. 11:1]'
  - type: text
    content: 'two of his disciples and said to them, '
  - type: text
    content: “Go into the city, and a man carrying a jar of water will meet you. Follow him,
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'and wherever he enters, say to the master of the house, '
  - type: note
    content: See John 11:28
  - type: text
    content: '‘The Teacher says, Where is '
  - type: note
    content: Luke 2:7 (Gk.)
  - type: text
    content: my guest room, where I may eat the Passover with my disciples?’
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And he will show you '
  - type: note
    content: '[Acts 1:13]'
  - type: text
    content: a large upper room furnished and ready; there prepare for us.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: And the disciples set out and went to the city and found it just as he had told them, and they prepared the Passover.
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-21, see Matt. 26:20-24; [ Luke 22:14, 21-23; John 13:21-26 ]
  - type: text
    content: 'And when it was evening, he came with the twelve. '
  '18':
  - type: text
    content: 'And as they were reclining at table and eating, '
  - type: note
    content: '[John 6:70, 71]'
  - type: text
    content: 'Jesus said, '
  - type: text
    content: '“Truly, I say to you, one of you will betray me, '
  - type: note
    content: '[Ps. 41:9; John 13:18]'
  - type: text
    content: one who is eating with me.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'They began to be sorrowful and to say to him one after another, “Is it I?” '
  '2':
  - type: text
    content: 'for they said, “Not during the feast, '
  - type: note
    content: Matt. 27:24
  - type: text
    content: lest there be an uproar from the people.”
  - type: heading
    content: Jesus Anointed at Bethany
  '20':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“It is '
  - type: note
    content: ver. 10
  - type: text
    content: 'one of the twelve, '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: one who is dipping bread into the dish with me.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'For the Son of Man goes '
  - type: note
    content: ver. 49; ch. 9:12; Luke 18:31; 24:25, 27, 46; Acts 17:2, 3; 26:22, 23; 1 Cor. 15:3; 1 Pet. 1:10, 11
  - type: text
    content: 'as it is written of him, but '
  - type: note
    content: Matt. 18:7
  - type: text
    content: 'woe to that man by whom the Son of Man is betrayed! '
  - type: note
    content: '[See John 17:12]'
  - type: text
    content: It would have been better for that man if he had not been born.”
  - type: heading
    content: Institution of the Lord’s Supper
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22-25, see Matt. 26:26-29; Luke 22:18-20; 1 Cor. 11:23-25
  - type: text
    content: 'And as they were eating, he took bread, and after '
  - type: note
    content: See Matt. 14:19
  - type: text
    content: 'blessing it broke it and gave it to them, and said, '
  - type: text
    content: '“Take; '
  - type: note
    content: 1 Cor. 10:16; [John 6:53]
  - type: text
    content: this is my body.”
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And he took a cup, and when he had '
  - type: note
    content: See Matt. 15:36
  - type: text
    content: 'given thanks he gave it to them, and they all drank of it. '
  '24':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: '“This is my '
  - type: note
    content: Ex. 24:8; [Zech. 9:11; Heb. 13:20]
  - type: text
    content: blood of the
  - type: note
    content: Some manuscripts insert new
  - type: text
    content: ' '
  - type: text
    content: 'covenant, which is poured out for '
  - type: note
    content: See Matt. 20:28
  - type: text
    content: many.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Truly, I say to you, I will not drink again of the fruit of the vine until that day when I drink it new in the kingdom of God.”
  - type: heading
    content: Jesus Foretells Peter’s Denial
  '26':
  - type: text
    content: ' '
  - type: note
    content: For ver. 26-31, see Matt. 26:30-35
  - type: text
    content: 'And when they had sung a hymn, '
  - type: note
    content: Luke 22:39; John 18:1
  - type: text
    content: 'they went out to '
  - type: note
    content: See Matt. 21:1
  - type: text
    content: 'the Mount of Olives. '
  '27':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“You will all fall away, for it is written, ‘I will '
  - type: note
    content: Cited from Zech. 13:7; [John 16:32]
  - type: text
    content: strike the shepherd, and the sheep will be scattered.’
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But after I am raised up, '
  - type: note
    content: ch. 16:7; Matt. 28:7, 10, 16
  - type: text
    content: I will go before you to Galilee.”
  - type: text
    content: ' '
  '29':
  - type: note
    content: '[Luke 22:31, 33]'
  - type: text
    content: 'Peter said to him, “Even though they all fall away, I will not.” '
  '3':
  - type: text
    content: ' '
  - type: note
    content: For ver. 3-9, see Matt. 26:6-13; John 12:1-8; [ Luke 7:37-39 ]
  - type: text
    content: 'And while he was at '
  - type: note
    content: Matt. 21:17; John 11:18
  - type: text
    content: Bethany in the house of Simon the leper,
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' as he was reclining at table, a woman came with an alabaster flask of ointment of pure nard, very costly, and she broke the flask and poured it over his head. '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: Luke 22:34; John 13:38
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“Truly, I tell you, this very night, before '
  - type: note
    content: ver. 68, 72
  - type: text
    content: the rooster crows twice, you will deny me three times.”
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'But '
  - type: note
    content: John 13:37
  - type: text
    content: he said emphatically, “If I must die with you, I will not deny you.” And they all said the same.
  - type: heading
    content: Jesus Prays in Gethsemane
  '32':
  - type: text
    content: ' '
  - type: note
    content: For ver. 32-42, see Matt. 26:36-46; Luke 22:40-46
  - type: text
    content: 'And they went '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'to a place called Gethsemane. And he said to his disciples, '
  - type: text
    content: “Sit here while I pray.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And he took with him '
  - type: note
    content: ch. 5:37; 9:2
  - type: text
    content: 'Peter and James and John, and began '
  - type: note
    content: '[Matt. 17:23]'
  - type: text
    content: 'to be greatly distressed and troubled. '
  '34':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[Ps. 42:5, 6; John 12:27]'
  - type: text
    content: '“My soul is very sorrowful, even to death. Remain here and '
  - type: note
    content: See Matt. 24:42
  - type: text
    content: watch.”
  - type: note
    content: Or keep awake; also verses 37, 38
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And going a little farther, he fell on the ground '
  - type: note
    content: Heb. 5:7
  - type: text
    content: 'and prayed that, if it were possible, '
  - type: note
    content: ver. 41; John 12:23, 27; 13:1; 17:1; [Luke 22:53; John 16:4]
  - type: text
    content: 'the hour might pass from him. '
  '36':
  - type: text
    content: 'And he said, '
  - type: note
    content: Rom. 8:15; Gal. 4:6
  - type: text
    content: '“Abba, Father, '
  - type: note
    content: See Matt. 19:26
  - type: text
    content: 'all things are possible for you. Remove '
  - type: note
    content: See ch. 10:38
  - type: text
    content: 'this cup from me. '
  - type: note
    content: John 5:30; 6:38; Phil. 2:8
  - type: text
    content: Yet not what I will, but what you will.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And he came and found them sleeping, and he said to Peter, '
  - type: text
    content: “Simon, are you asleep? Could you not watch one hour?
  - type: text
    content: ' '
  '38':
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'Watch and '
  - type: note
    content: 1 Pet. 4:7
  - type: text
    content: 'pray that you may not '
  - type: note
    content: Matt. 6:13
  - type: text
    content: enter into temptation. The spirit indeed is willing, but the flesh is weak.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And again he went away and prayed, '
  - type: note
    content: ver. 36
  - type: text
    content: 'saying the same words. '
  '4':
  - type: text
    content: 'There were some who said to themselves indignantly, “Why was the ointment wasted like that? '
  '40':
  - type: text
    content: 'And again he came and found them sleeping, for '
  - type: note
    content: Luke 9:32
  - type: text
    content: 'their eyes were very heavy, and '
  - type: note
    content: '[ch. 9:6; Luke 9:33]'
  - type: text
    content: 'they did not know what to answer him. '
  '41':
  - type: text
    content: 'And he came the third time and said to them, '
  - type: text
    content: '“Are you still sleeping and taking your rest? '
  - type: note
    content: '[Luke 22:38]'
  - type: text
    content: 'It is enough; '
  - type: note
    content: See ver. 35
  - type: text
    content: 'the hour has come. '
  - type: note
    content: ch. 9:31; 10:33
  - type: text
    content: The Son of Man is betrayed into the hands of sinners.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Rise, let us be going; see, my betrayer is at hand.”
  - type: heading
    content: Betrayal and Arrest of Jesus
  '43':
  - type: text
    content: ' '
  - type: note
    content: For ver. 43-50, see Matt. 26:47-56; Luke 22:47-53; John 18:3-11
  - type: text
    content: 'And immediately, while he was still speaking, '
  - type: note
    content: ver. 10; Acts 1:16
  - type: text
    content: 'Judas came, one of the twelve, and with him a crowd with swords and clubs, from the chief priests and the scribes and the elders. '
  '44':
  - type: text
    content: 'Now the betrayer had given them a sign, saying, “The one I will kiss is the man. Seize him and lead him away under guard.” '
  '45':
  - type: text
    content: 'And when he came, he went up to him at once and said, '
  - type: note
    content: See John 1:38
  - type: text
    content: '“Rabbi!” And he '
  - type: note
    content: Luke 7:38, 45; 15:20; Acts 20:37 (Gk.)
  - type: text
    content: 'kissed him. '
  '46':
  - type: text
    content: 'And they laid hands on him and seized him. '
  '47':
  - type: text
    content: 'But one of those who stood by drew his '
  - type: note
    content: '[Luke 22:38]'
  - type: text
    content: sword and struck the servant
  - type: note
    content: Or bondservant
  - type: text
    content: ' of the high priest and cut off his ear. '
  '48':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “Have you come out as against a robber, with swords and clubs to capture me?
  - type: text
    content: ' '
  '49':
  - type: note
    content: '[John 8:2]; [Luke 2:46; John 18:20]'
  - type: text
    content: 'Day after day I was with you in the temple '
  - type: note
    content: Matt. 21:23; [Matt. 4:23]
  - type: text
    content: 'teaching, and you did not seize me. But '
  - type: note
    content: See ver. 21; Matt. 1:22
  - type: text
    content: let the Scriptures be fulfilled.”
  - type: text
    content: ' '
  '5':
  - type: text
    content: For this ointment could have been sold for more than three hundred denarii
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' and '
  - type: note
    content: '[John 13:29]'
  - type: text
    content: 'given to the poor.” And they '
  - type: note
    content: John 11:33, 38 (Gk.)
  - type: text
    content: 'scolded her. '
  '50':
  - type: note
    content: ver. 27; [Ps. 88:8, 18; John 16:32]
  - type: text
    content: And they all left him and fled.
  - type: heading
    content: A Young Man Flees
  '51':
  - type: text
    content: 'And a young man followed him, with nothing but '
  - type: note
    content: ch. 15:46; Judg. 14:12; Prov. 31:24
  - type: text
    content: 'a linen cloth about his body. And they seized him, '
  '52':
  - type: text
    content: but he left the linen cloth and ran away naked.
  - type: heading
    content: Jesus Before the Council
  '53':
  - type: text
    content: ' '
  - type: note
    content: For ver. 53-65, see Matt. 26:57-68; [ John 18:12, 13, 19-24 ]
  - type: text
    content: 'And '
  - type: note
    content: Luke 22:54, 55
  - type: text
    content: 'they led Jesus to the high priest. And all the chief priests and the elders and the scribes came together. '
  '54':
  - type: note
    content: '[See ver. 53 above]'
  - type: text
    content: 'And '
  - type: note
    content: '[John 18:15]'
  - type: text
    content: 'Peter had followed him at a distance, '
  - type: note
    content: '[ver. 68]'
  - type: text
    content: 'right into '
  - type: note
    content: See Matt. 26:3
  - type: text
    content: 'the courtyard of the high priest. And he was sitting with '
  - type: note
    content: John 7:32; 18:3
  - type: text
    content: 'the guards and '
  - type: note
    content: ver. 67; John 18:18
  - type: text
    content: 'warming himself at the fire. '
  '55':
  - type: text
    content: Now the chief priests and the whole council
  - type: note
    content: Greek Sanhedrin
  - type: text
    content: ' were seeking testimony against Jesus to put him to death, but they found none. '
  '56':
  - type: note
    content: Ps. 27:12; 35:11
  - type: text
    content: 'For many bore false witness against him, but their testimony '
  - type: note
    content: '[Deut. 17:6; 19:15]'
  - type: text
    content: 'did not agree. '
  '57':
  - type: text
    content: 'And some stood up and bore false witness against him, saying, '
  '58':
  - type: note
    content: '[Acts 6:14]'
  - type: text
    content: '“We heard him say, '
  - type: note
    content: ch. 15:29; See John 2:19
  - type: text
    content: '‘I will destroy this temple '
  - type: note
    content: Acts 7:48; 17:24; Heb. 9:11, 24
  - type: text
    content: 'that is made with hands, and in three days I will build another, '
  - type: note
    content: 2 Cor. 5:1
  - type: text
    content: 'not made with hands.’” '
  '59':
  - type: text
    content: 'Yet even about this their testimony did not agree. '
  '6':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Leave her alone. Why do you trouble her? She has done a beautiful thing to me.
  - type: text
    content: ' '
  '60':
  - type: text
    content: And the high priest stood up in the midst and asked Jesus, “Have you no answer to make? What is it that these men testify against you?”
  - type: note
    content: Or Have you no answer to what these men testify against you?
  - type: text
    content: ' '
  '61':
  - type: text
    content: 'But '
  - type: note
    content: ch. 15:4, 5; Isa. 53:7; John 19:9
  - type: text
    content: 'he remained silent and made no answer. '
  - type: note
    content: For ver. 61-63, [Luke 22:67-71]
  - type: text
    content: 'Again the high priest asked him, “Are you '
  - type: note
    content: ch. 8:29; See Matt. 1:17
  - type: text
    content: 'the Christ, the Son of '
  - type: note
    content: '[Rom. 1:25]'
  - type: text
    content: 'the Blessed?” '
  '62':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: '“I am, and '
  - type: note
    content: See Matt. 16:27; 24:30
  - type: text
    content: 'you will see the Son of Man '
  - type: note
    content: Ps. 110:1; Heb. 1:3; [ch. 16:19]
  - type: text
    content: 'seated at the right hand of Power, and '
  - type: note
    content: See Matt. 16:27; 24:30
  - type: text
    content: coming with the clouds of heaven.”
  - type: text
    content: ' '
  '63':
  - type: text
    content: 'And the high priest '
  - type: note
    content: Num. 14:6; Acts 14:14
  - type: text
    content: 'tore his garments and said, “What further witnesses do we need? '
  '64':
  - type: text
    content: 'You have heard '
  - type: note
    content: Matt. 9:3; John 10:36
  - type: text
    content: 'his blasphemy. What is your decision?” And they '
  - type: note
    content: '[Luke 23:50, 51]'
  - type: text
    content: 'all condemned him as '
  - type: note
    content: See Lev. 24:16
  - type: text
    content: 'deserving death. '
  '65':
  - type: note
    content: Luke 22:63, 64
  - type: text
    content: 'And some began '
  - type: note
    content: ch. 10:34; 15:19; Isa. 50:6
  - type: text
    content: 'to spit on him and '
  - type: note
    content: '[Esth. 7:8]'
  - type: text
    content: 'to cover his face and to strike him, saying to him, “Prophesy!” And the guards received him '
  - type: note
    content: Matt. 5:39; [Acts 23:2]
  - type: text
    content: with blows.
  - type: heading
    content: Peter Denies Jesus
  '66':
  - type: text
    content: ' '
  - type: note
    content: For ver. 66-72, see Matt. 26:69-75; Luke 22:55-62; John 18:16-18, 25-27
  - type: text
    content: 'And as Peter was below in the courtyard, one of the servant girls of the high priest came, '
  '67':
  - type: text
    content: 'and seeing Peter '
  - type: note
    content: ver. 54
  - type: text
    content: 'warming himself, she looked at him and said, “You also were with the Nazarene, Jesus.” '
  '68':
  - type: text
    content: But he denied it, saying, “I neither know nor understand what you mean.” And he went out into the gateway
  - type: note
    content: Or forecourt
  - type: text
    content: ' and '
  - type: note
    content: ver. 30, 72
  - type: text
    content: the rooster crowed.
  - type: note
    content: Some manuscripts omit and the rooster crowed
  - type: text
    content: ' '
  '69':
  - type: text
    content: 'And the servant girl saw him and began again to say to the bystanders, “This man is one of them.” '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: Deut. 15:11
  - type: text
    content: 'you always have the poor with you, and whenever '
  - type: note
    content: '[2 Cor. 9:7]'
  - type: text
    content: 'you want, you can do good for them. But '
  - type: note
    content: ch. 2:20; See John 7:33
  - type: text
    content: you will not always have me.
  - type: text
    content: ' '
  '70':
  - type: text
    content: 'But again he denied it. And after a little while the bystanders again said to Peter, “Certainly you are one of them, for you are a Galilean.” '
  '71':
  - type: text
    content: 'But he began to invoke a curse on himself and to swear, “I do not know this man of whom you speak.” '
  '72':
  - type: text
    content: 'And immediately the rooster crowed '
  - type: note
    content: ver. 68
  - type: text
    content: 'a second time. And Peter remembered how Jesus had said to him, '
  - type: note
    content: ver. 30
  - type: text
