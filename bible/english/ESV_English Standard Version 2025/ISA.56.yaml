  - type: note
    content: '[ 2 Tim. 2:19 ]'
  - type: text
    content: I will give them an everlasting name
  - type: text
    content: that shall not be cut off.
  '6':
  - type: text
    content: '“And '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the foreigners who join themselves to the '
  - type: text
