    content: Salvation for Foreigners
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “Keep justice, and do righteousness,
  - type: note
    content: ch. 46:12, 13; 51:5, 6
  - type: text
    content: for soon my salvation will come,
  - type: text
    content: and my righteousness be revealed.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 62:6; Jer. 6:17
  - type: text
    content: His watchmen are blind;
  - type: text
    content: they are all without knowledge;
  - type: text
    content: 'they are all silent '
  - type: note
    content: '[Phil. 3:2]'
  - type: text
    content: dogs;
  - type: text
    content: they cannot bark,
  - type: text
    content: dreaming, lying down,
  - type: text
    content: loving to slumber.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 34:2, 3
  - type: text
    content: The dogs have a mighty appetite;
  - type: text
    content: they never have enough.
  - type: text
    content: 'But '
  - type: note
    content: '[Jer. 23:1]'
  - type: text
    content: they are shepherds who have no understanding;
  - type: text
    content: they have all turned to their own way,
  - type: note
    content: Jer. 6:13
  - type: text
    content: each to his own gain, one and all.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 28:7 ]'
  - type: text
    content: “Come,” they say, “let me get wine;
  - type: text
    content: let us fill ourselves with strong drink;
  - type: note
    content: '[ch. 22:13; Prov. 23:35; Luke 12:19; 1 Cor. 15:32 ]'
  - type: text
    content: and tomorrow will be like this day,
  - type: text
    content: great beyond measure.”
  '2':
  - type: text
    content: Blessed is the man who does this,
  - type: text
    content: and the son of man who holds it fast,
  - type: note
    content: ch. 58:13
  - type: text
    content: who keeps the Sabbath, not profaning it,
  - type: text
    content: and keeps his hand from doing any evil.”
  '3':
  - type: text
    content: 'Let not '
  - type: note
    content: ch. 14:1; [Deut. 23:7, 8]
  - type: text
    content: 'the foreigner who has joined himself to the '
  - type: text
    content: Lord
  - type: text
    content: ' say,'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely separate me from his people”;'
