  - type: text
    content: my house shall be called a house of prayer
  - type: text
    content: for all peoples.”
  '8':
  - type: text
    content: 'The Lord '
  - type: text
    content: God
  - type: text
    content: ','
  - type: note
    content: ch. 11:12
  - type: text
    content: who gathers the outcasts of Israel, declares,
  - type: note
    content: John 10:16; Eph. 1:10; See Eph. 2:11-16
  - type: text
    content: “I will gather yet others to him
  - type: text
    content: besides those already gathered.”
  - type: heading
    content: Israel’s Irresponsible Leaders
  '9':
  - type: text
    content: ' '
  - type: note
    content: Jer. 12:9; Ezek. 34:8
  - type: text
    content: All you beasts of the field, come to devour—
  - type: text
