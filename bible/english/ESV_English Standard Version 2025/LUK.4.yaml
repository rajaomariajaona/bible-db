document_id: LUK.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temptation of Jesus
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-13, see Matt. 4:1-11; Mark 1:12, 13
  - type: text
    content: 'And Jesus, '
  - type: note
    content: ver. 18; ch. 3:22; John 1:33; 3:34; Acts 10:38; [ch. 1:15; Acts 6:5]
  - type: text
    content: 'full of the Holy Spirit, '
  - type: note
    content: ch. 3:3, 21
  - type: text
    content: 'returned from the Jordan and was led '
  - type: note
    content: ver. 14
  - type: text
    content: 'by the Spirit in the wilderness '
  '10':
  - type: text
    content: for it is written,
  - type: note
    content: Cited from Ps. 91:11, 12
  - type: text
    content: “‘He will command his angels concerning you,
  - type: text
    content: to guard you,’
  '11':
  - type: text
    content: and
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: “‘On their hands they will bear you up,
  - type: text
    content: lest you strike your foot against a stone.’”
  '12':
  - type: text
    content: 'And Jesus answered him, '
  - type: text
    content: '“It is said, '
  - type: note
    content: Cited from Deut. 6:16
  - type: text
    content: '‘You shall not '
  - type: note
    content: '[Isa. 7:12]'
  - type: text
    content: put the Lord your God to the test.’”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And when the devil had ended every temptation, he departed from him '
  - type: note
    content: '[ch. 22:53; John 14:30]'
  - type: text
    content: until an opportune time.
  - type: heading
    content: Jesus Begins His Ministry
  '14':
  - type: text
    content: ' '
  - type: note
    content: Matt. 4:12
  - type: text
    content: 'And Jesus returned '
  - type: note
    content: ver. 1; [Acts 1:8]
  - type: text
    content: 'in the power of the Spirit to Galilee, and '
  - type: note
    content: ver. 37
  - type: text
    content: 'a report about him went out through all the surrounding country. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: See Matt. 4:23
  - type: text
    content: he taught in their synagogues, being glorified by all.
  - type: heading
    content: Jesus Rejected at Nazareth
  '16':
  - type: text
    content: ' '
  - type: note
    content: For ver. 16-30, [ Matt. 13:54-58; Mark 6:1-6 ]
  - type: text
    content: 'And he came to '
  - type: note
    content: ch. 2:39, 51
  - type: text
    content: 'Nazareth, where he had been brought up. And '
  - type: note
    content: '[Acts 17:2]'
  - type: text
    content: 'as was his custom, '
  - type: note
    content: ver. 31; See Mark 6:2
  - type: text
    content: 'he went to the synagogue on the Sabbath day, and he stood up '
  - type: note
    content: Acts 13:15, 27; 15:21
  - type: text
    content: 'to read. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: ch. 3:4; [Acts 8:28]
  - type: text
    content: the scroll of the prophet Isaiah was given to him. He unrolled the scroll and found the place where it was written,
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cited from Isa. 61:1, 2
  - type: text
    content: '“The Spirit of the Lord '
  - type: note
    content: ver. 1; [Acts 1:2]
  - type: text
    content: is upon me,
  - type: text
    content: because he has anointed me
  - type: text
    content: to
  - type: text
    content: ' '
  - type: note
    content: Matt. 11:5; [ch. 6:20]
  - type: text
    content: proclaim good news to the poor.
  - type: note
    content: Ps. 146:7, 8
  - type: text
    content: He has sent me to proclaim liberty to the captives
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: '[Isa. 42:7; John 9:39; Acts 26:18]'
  - type: text
    content: recovering of sight to the blind,
  - type: note
    content: Isa. 58:6
  - type: text
    content: to set at liberty those who are oppressed,
  '19':
  - type: text
    content: ' '
  - type: note
    content: Lev. 25:10; [ Isa. 49:8; 2 Cor. 6:2 ]
  - type: text
    content: to proclaim the year of the Lord’s favor.”
  '2':
  - type: text
    content: 'for '
  - type: note
    content: '[Deut. 9:9, 18; 1 Kgs. 19:8]'
  - type: text
    content: 'forty days, '
  - type: note
    content: '[Heb. 2:18; 4:15]'
  - type: text
    content: 'being tempted by the devil. '
  - type: note
    content: '[Deut. 9:9, 18; 1 Kgs. 19:8]'
  - type: text
    content: 'And he ate nothing during those days. And when they were ended, '
  - type: note
    content: '[John 4:6, 7]'
  - type: text
    content: 'he was hungry. '
  '20':
  - type: text
    content: 'And he rolled up the scroll and gave it back to the attendant and '
  - type: note
    content: Matt. 26:55; [John 8:2]; [Matt. 5:1; 13:2]
  - type: text
    content: 'sat down. And the eyes of all in the synagogue were '
  - type: note
    content: Acts 3:4; [ch. 19:48]
  - type: text
    content: 'fixed on him. '
  '21':
  - type: text
    content: 'And he began to say to them, '
  - type: text
    content: '“Today '
  - type: note
    content: Mark 12:10; Acts 8:35
  - type: text
    content: 'this Scripture '
  - type: note
    content: See Matt. 1:22
  - type: text
    content: has been fulfilled in your hearing.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And all spoke well of him and marveled at '
  - type: note
    content: Ps. 45:2
  - type: text
    content: 'the gracious words that were coming from his mouth. And they said, '
  - type: note
    content: '[Matt. 13:55; John 6:42]'
  - type: text
    content: '“Is not this '
  - type: note
    content: ch. 3:23
  - type: text
    content: 'Joseph’s son?” '
  '23':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Doubtless you will quote to me this proverb, '
  - type: note
    content: '[ch. 23:39; Matt. 27:42]'
  - type: text
    content: '‘“Physician, heal yourself.” What we have heard you did '
  - type: note
    content: Matt. 11:23; Mark 2:1-12; John 4:46-53
  - type: text
    content: at Capernaum, do here in your hometown as well.’”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he said, '
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: See Matt. 13:57
  - type: text
    content: no prophet is acceptable in his hometown.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But in truth, I tell you, there were many widows in Israel in the days of Elijah, when '
  - type: note
    content: 1 Kgs. 17:1; 18:1; James 5:17; [Rev. 11:6]
  - type: text
    content: the heavens were shut up three years and six months, and a great famine came over all the land,
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'and Elijah was sent to none of them '
  - type: note
    content: 1 Kgs. 17:9
  - type: text
    content: but only to Zarephath, in the land of Sidon, to a woman who was a widow.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Kgs. 7:3]'
  - type: text
    content: there were many lepers
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' '
  - type: text
    content: 'in Israel in the time of the prophet Elisha, and none of them was cleansed, '
  - type: note
    content: 2 Kgs. 5:1-14
  - type: text
    content: but only Naaman the Syrian.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'When they heard these things, all in the synagogue were filled with wrath. '
  '29':
  - type: text
    content: 'And they rose up and '
  - type: note
    content: '[Num. 15:35; Acts 7:58]'
  - type: text
    content: 'drove him out of the town and brought him to the brow of the hill on which their town was built, so that they could throw him down the cliff. '
  '3':
  - type: text
    content: 'The devil said to him, “If you are '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God, command '
  - type: note
    content: '[ch. 3:8]'
  - type: text
    content: 'this stone to become bread.” '
  '30':
  - type: text
    content: 'But '
  - type: note
    content: John 8:59; 10:39
  - type: text
    content: passing through their midst, he went away.
  - type: heading
    content: Jesus Heals a Man with an Unclean Demon
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-37, see Mark 1:21-28
  - type: text
    content: 'And he '
  - type: note
    content: Matt. 4:13
  - type: text
    content: 'went down to Capernaum, a city of Galilee. And '
  - type: note
    content: ver. 15, 16; See Matt. 4:23
  - type: text
    content: 'he was teaching them '
  - type: note
    content: See Mark 6:2
  - type: text
    content: 'on the Sabbath, '
  '32':
  - type: text
    content: 'and '
  - type: note
    content: ver. 36; See Matt. 7:28, 29
  - type: text
    content: 'they were astonished at his teaching, '
  - type: note
    content: ver. 36; See Matt. 7:28, 29
  - type: text
    content: 'for his word possessed authority. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 31above]'
  - type: text
    content: 'in the synagogue there was a man who had the spirit of an unclean demon, and he cried out with a loud voice, '
  '34':
  - type: text
    content: “Ha!
  - type: note
    content: Or Leave us alone
  - type: text
    content: ' '
  - type: note
    content: See Matt. 8:29
  - type: text
    content: 'What have you to do with us, Jesus of Nazareth? Have you come to destroy us? '
  - type: note
    content: '[Acts 19:15; James 2:19]'
  - type: text
    content: I know who you are—
  - type: note
    content: John 6:69; Acts 3:14; Rev. 3:7; [ch. 1:35; Heb. 7:26; 1 John 2:20]
  - type: text
    content: 'the Holy One of God.” '
  '35':
  - type: text
    content: 'But Jesus '
  - type: note
    content: ver. 41; See Matt. 12:16
  - type: text
    content: 'rebuked him, saying, '
  - type: text
    content: “Be silent and come out of him!”
  - type: text
    content: ' And when the demon had thrown him down in their midst, he came out of him, having done him no harm. '
  '36':
  - type: text
    content: 'And '
  - type: note
    content: ver. 32; [Matt. 8:27]
  - type: text
    content: 'they were all amazed and said to one another, “What is this word? '
  - type: note
    content: ver. 32; [Matt. 8:27]
  - type: text
    content: 'For with authority and power he commands the unclean spirits, and they come out!” '
  '37':
  - type: text
    content: 'And '
  - type: note
    content: ver. 14
  - type: text
    content: reports about him went out into every place in the surrounding region.
  - type: heading
    content: Jesus Heals Many
  '38':
  - type: text
    content: ' '
  - type: note
    content: For ver. 38-41, see Matt. 8:14-16; Mark 1:29-34
  - type: text
    content: 'And he arose and left the synagogue and entered Simon’s house. Now '
  - type: note
    content: 1 Cor. 9:5
  - type: text
    content: 'Simon’s mother-in-law was ill with a high fever, and they appealed to him on her behalf. '
  '39':
  - type: text
    content: 'And he stood over her and '
  - type: note
    content: ch. 8:24; 9:42; Matt. 8:26; 17:18; Mark 4:39; 9:25
  - type: text
    content: rebuked the fever, and it left her, and immediately she rose and began to serve them.
  '4':
  - type: text
    content: 'And Jesus answered him, '
  - type: note
    content: ver. 8, 10; Eph. 6:17
  - type: text
    content: '“It is written, '
  - type: note
    content: Cited from Deut. 8:3; [John 4:34]
  - type: text
    content: ‘Man shall not live by bread alone.’”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Now when the sun was setting, all those who had any who were sick with various diseases brought them to him, and '
  - type: note
    content: See Mark 5:23
  - type: text
    content: 'he laid his hands on every one of them and healed them. '
  '41':
  - type: note
    content: Mark 3:11, 12; [Acts 16:17, 18]
  - type: text
    content: 'And demons also came out of many, '
  - type: note
    content: ver. 33
  - type: text
    content: 'crying, “You are '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God!” But he rebuked them and '
  - type: note
    content: Mark 3:11, 12; [Acts 16:17, 18]
  - type: text
    content: 'would not allow them to speak, because they knew that he was '
  - type: note
    content: See Matt. 1:17
  - type: text
    content: the Christ.
  - type: heading
    content: Jesus Preaches in Synagogues
  '42':
  - type: text
    content: ' '
  - type: note
    content: For ver. 42, 43, see Mark 1:35-38
  - type: text
    content: 'And when it was day, he departed and went '
  - type: note
    content: ch. 5:16
  - type: text
    content: 'into a desolate place. And '
  - type: note
    content: '[Mark 1:36]'
  - type: text
    content: 'the people sought him and came to him, and would have kept him from leaving them, '
  '43':
  - type: text
    content: 'but he said to them, '
  - type: note
    content: See ch. 13:33
  - type: text
    content: '“I must '
  - type: note
    content: ch. 8:1; 16:16; Matt. 4:23; 24:14; Acts 8:12
  - type: text
    content: preach the good news of the kingdom of God to the other towns as well; for I was sent for this purpose.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And he was preaching '
  - type: note
    content: '[Mark 1:39]'
  - type: text
    content: in the synagogues of Judea.
  - type: note
    content: Some manuscripts Galilee
  '5':
  - type: note
    content: Matt. 4:8
  - type: text
    content: 'And the devil took him up and showed him all the kingdoms of the world in a moment of time, '
  '6':
  - type: text
    content: 'and said to him, “To you '
  - type: note
    content: Rev. 13:2
  - type: text
    content: 'I will give all this authority and their glory, '
  - type: note
    content: Rev. 13:2
  - type: text
    content: 'for it has been delivered to me, and I give it to whom I will. '
  '7':
  - type: text
    content: 'If you, then, will worship me, it will all be yours.” '
  '8':
  - type: text
    content: 'And Jesus answered him, '
  - type: note
    content: ver. 4; [ver. 12]
  - type: text
    content: “It is written,
  - type: note
    content: Cited from Deut. 6:13
  - type: text
    content: “‘You shall worship the Lord your God,
  - type: text
    content: 'and '
  - type: note
    content: 1 Sam. 7:3
  - type: text
    content: him only shall you serve.’”
  '9':
  - type: text
    content: ' '
  - type: note
    content: Matt. 4:5
  - type: text
    content: 'And he took him to Jerusalem and set him on the pinnacle of the temple and said to him, “If you are '
  - type: note
    content: ver. 3
  - type: text
    content: 'the Son of God, throw yourself down from here, '
