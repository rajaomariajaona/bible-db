document_id: JOS.5,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The New Generation Circumcised
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'As soon as all the kings of the Amorites who were beyond the Jordan to the west, and all the kings of the Canaanites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 13:29
      marker-yv: yv-n
    - type: text
      text: 'who were by the sea, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 15:14
      marker-yv: yv-n
    - type: text
      text: 'heard that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had dried up the waters of the Jordan for the people of Israel until they had crossed over, their hearts '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:11
      marker-yv: yv-n
    - type: text
      text: 'melted and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 10:5
      marker-yv: yv-n
    - type: text
      text: there was no longer any spirit in them because of the people of Israel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'While the people of Israel were encamped at Gilgal, they kept the Passover '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 9:5
      marker-yv: yv-n
    - type: text
      text: 'on the fourteenth day of the month in the evening on the plains of Jericho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the day after the Passover, on that very day, they ate of the produce of the land, unleavened cakes and parched grain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 16:35
      marker-yv: yv-n
    - type: text
      text: the manna ceased the day after they ate of the produce of the land. And there was no longer manna for the people of Israel, but they ate of the fruit of the land of Canaan that year.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Commander of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Army
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When Joshua was by Jericho, he lifted up his eyes and looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 18:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 1:10
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 23:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'a man was standing before him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 22:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      marker-yv: yv-n
    - type: text
      text: 'with his drawn sword in his hand. And Joshua went to him and said to him, “Are you for us, or for our adversaries?” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he said, “No; but I am the commander of the army of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Now I have come.” And Joshua '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:3
      marker-yv: yv-n
    - type: text
      text: fell on his face to the earth and worshiped
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and paid homage
      marker-yv: yv-n
    - type: text
      text: ' and said to him, “What does my lord say to his servant?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the commander of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s army said to Joshua, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 3:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7:33
      marker-yv: yv-n
    - type: text
      text: “Take off your sandals from your feet, for the place where you are standing is holy.” And Joshua did so.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'At that time the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “Make '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 4:25
      marker-yv: yv-n
    - type: text
      text: 'flint knives and circumcise the sons of Israel a second time.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So Joshua made flint knives and circumcised the sons of Israel at Gibeath-haaraloth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gibeath-haaraloth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the hill of the foreskins
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And this is the reason why Joshua circumcised them: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:64
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '65'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 2:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 106:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 10:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 3:17
      marker-yv: yv-n
    - type: text
      text: 'all the males of the people who came out of Egypt, all the men of war, had died in the wilderness on the way after they had come out of Egypt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Though all the people who came out had been circumcised, yet all the people who were born on the way in the wilderness after they had come out of Egypt had not been circumcised. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the people of Israel walked '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 1:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 95:10
      marker-yv: yv-n
    - type: text
      text: 'forty years in the wilderness, until all the nation, the men of war who came out of Egypt, perished, because they did not obey the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 95:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 3:11
      marker-yv: yv-n
    - type: text
      text: 'swore to them that he would not let them see the land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had sworn to their fathers to give to us, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 3:8
      marker-yv: yv-n
    - type: text
      text: 'a land flowing with milk and honey. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So it was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 1:39
      marker-yv: yv-n
    - type: text
      text: their children, whom he raised up in their place, that Joshua circumcised. For they were uncircumcised, because they had not been circumcised on the way.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'When the circumcising of the whole nation was finished, they remained in their places in the camp until they were healed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “Today I have rolled away the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 34:14
      marker-yv: yv-n
    - type: text
      text: 'reproach of Egypt from you.” And so the name of that place is called '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:19
      marker-yv: yv-n
    - type: text
      text: Gilgal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: to roll
      marker-yv: yv-n
    - type: text
      text: ' to this day.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: First Passover in Canaan
    marker-yv: yv-h
