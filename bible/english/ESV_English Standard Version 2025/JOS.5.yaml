document_id: JOS.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Generation Circumcised
  - type: text
    content: 'As soon as all the kings of the Amorites who were beyond the Jordan to the west, and all the kings of the Canaanites '
  - type: note
    content: Num. 13:29
  - type: text
    content: 'who were by the sea, '
  - type: note
    content: Ex. 15:14
  - type: text
    content: 'heard that the '
  - type: text
    content: Lord
  - type: text
    content: ' had dried up the waters of the Jordan for the people of Israel until they had crossed over, their hearts '
  - type: note
    content: See ch. 2:11
  - type: text
    content: 'melted and '
  - type: note
    content: 1 Kgs. 10:5
  - type: text
    content: there was no longer any spirit in them because of the people of Israel.
  '10':
  - type: text
    content: 'While the people of Israel were encamped at Gilgal, they kept the Passover '
  - type: note
    content: Ex. 12:6; Num. 9:5
  - type: text
    content: 'on the fourteenth day of the month in the evening on the plains of Jericho. '
  '11':
  - type: text
    content: 'And the day after the Passover, on that very day, they ate of the produce of the land, unleavened cakes and parched grain. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 16:35
  - type: text
    content: the manna ceased the day after they ate of the produce of the land. And there was no longer manna for the people of Israel, but they ate of the fruit of the land of Canaan that year.
  - type: heading
    content: The Commander of the Lord’s Army
  '13':
  - type: text
    content: 'When Joshua was by Jericho, he lifted up his eyes and looked, and behold, '
  - type: note
    content: Gen. 18:2; 32:24; Acts 1:10; [Ex. 23:20, 23]
  - type: text
    content: 'a man was standing before him '
  - type: note
    content: Num. 22:23, 31
  - type: text
    content: 'with his drawn sword in his hand. And Joshua went to him and said to him, “Are you for us, or for our adversaries?” '
  '14':
  - type: text
    content: 'And he said, “No; but I am the commander of the army of the '
  - type: text
    content: Lord
  - type: text
    content: '. Now I have come.” And Joshua '
  - type: note
    content: Gen. 17:3
  - type: text
    content: fell on his face to the earth and worshiped
  - type: note
    content: Or and paid homage
  - type: text
    content: ' and said to him, “What does my lord say to his servant?” '
  '15':
  - type: text
    content: 'And the commander of the '
  - type: text
    content: Lord
  - type: text
    content: '’s army said to Joshua, '
  - type: note
    content: Ex. 3:5; Acts 7:33
  - type: text
    content: “Take off your sandals from your feet, for the place where you are standing is holy.” And Joshua did so.
  '2':
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Make '
  - type: note
    content: Ex. 4:25
  - type: text
    content: 'flint knives and circumcise the sons of Israel a second time.” '
  '3':
  - type: text
    content: So Joshua made flint knives and circumcised the sons of Israel at Gibeath-haaraloth.
  - type: note
    content: Gibeath-haaraloth means the hill of the foreskins
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And this is the reason why Joshua circumcised them: '
  - type: note
    content: Num. 14:29; 26:64, 65; Deut. 2:16; Ps. 106:26; 1 Cor. 10:5; Heb. 3:17
  - type: text
    content: 'all the males of the people who came out of Egypt, all the men of war, had died in the wilderness on the way after they had come out of Egypt. '
  '5':
  - type: text
    content: 'Though all the people who came out had been circumcised, yet all the people who were born on the way in the wilderness after they had come out of Egypt had not been circumcised. '
  '6':
  - type: text
    content: 'For the people of Israel walked '
  - type: note
    content: Num. 14:33; Deut. 1:3; 2:7, 14; 8:4; Ps. 95:10
  - type: text
    content: 'forty years in the wilderness, until all the nation, the men of war who came out of Egypt, perished, because they did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: '; the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Num. 14:23; Ps. 95:11; Heb. 3:11
  - type: text
    content: 'swore to them that he would not let them see the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' had sworn to their fathers to give to us, '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'a land flowing with milk and honey. '
  '7':
  - type: text
    content: 'So it was '
  - type: note
    content: Num. 14:31; Deut. 1:39
  - type: text
    content: their children, whom he raised up in their place, that Joshua circumcised. For they were uncircumcised, because they had not been circumcised on the way.
  '8':
  - type: text
    content: 'When the circumcising of the whole nation was finished, they remained in their places in the camp until they were healed. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Today I have rolled away the '
  - type: note
    content: Gen. 34:14
  - type: text
    content: 'reproach of Egypt from you.” And so the name of that place is called '
  - type: note
    content: ch. 4:19
  - type: text
    content: Gilgal
  - type: note
    content: Gilgal sounds like the Hebrew for to roll
  - type: text
    content: ' to this day.'
  - type: heading
    content: First Passover in Canaan
