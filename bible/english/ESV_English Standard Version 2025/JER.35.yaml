    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'therefore thus says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of hosts, the God of Israel: Jonadab the son of Rechab shall never lack a man '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
