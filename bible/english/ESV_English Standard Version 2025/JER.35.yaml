document_id: JER.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Obedience of the Rechabites
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' in the days of '
  - type: note
    content: ch. 25:1
  - type: text
    content: 'Jehoiakim the son of Josiah, king of Judah: '
  '10':
  - type: text
    content: 'but we have lived in tents and have obeyed and done all that Jonadab our father commanded us. '
  '11':
  - type: text
    content: 'But '
  - type: note
    content: ch. 46:2; 2 Kgs. 24:1; [ver. 1]
  - type: text
    content: 'when Nebuchadnezzar king of Babylon came up against the land, we said, ‘Come, and let us go to Jerusalem for fear of '
  - type: note
    content: 2 Kgs. 24:2
  - type: text
    content: 'the army of the Chaldeans and '
  - type: note
    content: 2 Kgs. 24:2
  - type: text
    content: 'the army of the Syrians.’ '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: So we are living in Jerusalem.”
  '12':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '13':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Go and say to the people of Judah and the inhabitants of Jerusalem, '
  - type: note
    content: See ch. 5:3
  - type: text
    content: 'Will you not receive instruction and listen to my words? declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'The command that Jonadab the son of Rechab gave to his sons, to drink no wine, has been kept, and they drink none to this day, for they have obeyed their father’s command. I have spoken to you '
  - type: note
    content: See ch. 25:3
  - type: text
    content: 'persistently, but you have not listened to me. '
  '15':
  - type: text
    content: 'I have sent to you all my servants the prophets, sending them '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'persistently, saying, '
  - type: note
    content: 2 Kgs. 17:13; See ch. 18:11
  - type: text
    content: '‘Turn now every one of you from his evil way, and amend your deeds, and '
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'do not go after other gods to serve them, and then you shall dwell in the land that I gave to you and your fathers.’ '
  - type: note
    content: See ch. 34:14
  - type: text
    content: 'But you did not incline your ear or listen to me. '
  '16':
  - type: text
    content: 'The sons of Jonadab the son of Rechab have kept the command that their father gave them, but this people has not obeyed me. '
  '17':
  - type: text
    content: 'Therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts, the God of Israel: Behold, I am bringing upon Judah and all the inhabitants of Jerusalem all the disaster that I have pronounced against them, '
  - type: note
    content: '[Isa. 50:2]'
  - type: text
    content: 'because I have spoken to them and they have not listened, '
  - type: note
    content: '[Isa. 50:2]'
  - type: text
    content: I have called to them and they have not answered.”
  '18':
  - type: text
    content: 'But to the house of the Rechabites Jeremiah said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Because you have obeyed the command of Jonadab your father and kept all his precepts and done all that he commanded you, '
  '19':
  - type: text
    content: 'therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Jonadab the son of Rechab shall never lack a man '
  - type: note
    content: See ch. 15:1
  - type: text
    content: to stand before me.”
  '2':
  - type: text
    content: '“Go to the house of the '
  - type: note
    content: 1 Chr. 2:55
  - type: text
    content: 'Rechabites and speak with them and bring them to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', into one of '
  - type: note
    content: 1 Kgs. 6:5, 6; 1 Chr. 9:26, 33
  - type: text
    content: 'the chambers; then offer them wine to drink.” '
  '3':
  - type: text
    content: 'So I took Jaazaniah the son of Jeremiah, son of Habazziniah and his brothers and all his sons and the whole house of the Rechabites. '
  '4':
  - type: text
    content: 'I brought them to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' into '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the chamber of the sons of Hanan the son of Igdaliah, '
  - type: note
    content: '[Deut. 33:1]'
  - type: text
    content: 'the man of God, which was near '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the chamber of the officials, above '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the chamber of '
  - type: note
    content: ch. 21:1; 29:25; 37:3
  - type: text
    content: 'Maaseiah the son of Shallum, '
  - type: note
    content: 2 Kgs. 12:9; 25:18
  - type: text
    content: 'keeper of the threshold. '
  '5':
  - type: text
    content: 'Then I set before the Rechabites pitchers full of wine, and cups, and I said to them, “Drink wine.” '
  '6':
  - type: text
    content: 'But they answered, “We will drink no wine, for '
  - type: note
    content: 2 Kgs. 10:15, 23
  - type: text
    content: 'Jonadab the son of Rechab, our father, commanded us, ‘You shall not drink wine, neither you nor your sons forever. '
  '7':
  - type: text
    content: 'You shall not build a house; you shall not sow seed; you shall not plant or have a vineyard; but you shall live in tents all your days, '
  - type: note
    content: '[Ex. 20:12; Eph. 6:2, 3]'
  - type: text
    content: 'that you may live many days in the land where you sojourn.’ '
  '8':
  - type: text
    content: 'We have obeyed the voice of Jonadab the son of Rechab, our father, in all that he commanded us, to drink no wine all our days, ourselves, our wives, our sons, or our daughters, '
  '9':
  - type: text
    content: 'and not to build houses to dwell in. We have no vineyard or field or seed, '
