document_id: GEN.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flood Subsides
  - type: text
    content: 'But God '
  - type: note
    content: ch. 19:29; 30:22; Ex. 2:24; 1 Sam. 1:19
  - type: text
    content: 'remembered Noah and all the beasts and all the livestock that were with him in the ark. And '
  - type: note
    content: Ex. 14:21
  - type: text
    content: 'God made a wind blow over the earth, and the waters subsided. '
  '10':
  - type: text
    content: 'He waited another seven days, and again he sent forth the dove out of the ark. '
  '11':
  - type: text
    content: 'And the dove came back to him in the evening, and behold, in her mouth was a freshly plucked olive leaf. So Noah knew that the waters had subsided from the earth. '
  '12':
  - type: text
    content: Then he waited another seven days and sent forth the dove, and she did not return to him anymore.
  '13':
  - type: text
    content: 'In the six hundred and first year, in the first month, the first day of the month, the waters were dried from off the earth. And Noah removed the covering of the ark and looked, and behold, the face of the ground was dry. '
  '14':
  - type: text
    content: 'In the second month, on the twenty-seventh day of the month, the earth had dried out. '
  '15':
  - type: text
    content: 'Then God said to Noah, '
  '16':
  - type: text
    content: '“Go out from the ark, '
  - type: note
    content: ch. 7:13
  - type: text
    content: 'you and your wife, and your sons and your sons’ wives with you. '
  '17':
  - type: text
    content: 'Bring out with you every living thing that is with you of all flesh—birds and animals and every creeping thing that creeps on the earth—that they may swarm on the earth, and '
  - type: note
    content: ch. 1:22, 28; 9:1
  - type: text
    content: 'be fruitful and multiply on the earth.” '
  '18':
  - type: text
    content: 'So Noah went out, and his sons and his wife and his sons’ wives with him. '
  '19':
  - type: text
    content: Every beast, every creeping thing, and every bird, everything that moves on the earth, went out by families from the ark.
  - type: heading
    content: God’s Covenant with Noah
  '2':
  - type: note
    content: ch. 7:11
  - type: text
    content: 'The fountains of the deep and '
  - type: note
    content: ch. 7:11
  - type: text
    content: 'the windows of the heavens were closed, the rain from the heavens was restrained, '
  '20':
  - type: text
    content: 'Then Noah built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' and took some of every clean animal and some of every clean bird and offered burnt offerings on the altar. '
  '21':
  - type: text
    content: 'And when the '
  - type: text
    content: Lord
  - type: text
    content: ' smelled '
  - type: note
    content: Ex. 29:18, 25, 41; Lev. 1:9, 13, 17; See Ezek. 16:19; 20:41; 2 Cor. 2:15; Eph. 5:2; Phil. 4:18
  - type: text
    content: 'the pleasing aroma, the '
  - type: text
    content: Lord
  - type: text
    content: ' said in his heart, “I will never again '
  - type: note
    content: ch. 3:17; 6:17
  - type: text
    content: curse
  - type: note
    content: Or dishonor
  - type: text
    content: ' the ground because of man, for '
  - type: note
    content: ch. 6:5; Ps. 58:3; Rom. 1:21; [Matt. 15:19]
  - type: text
    content: 'the intention of man’s heart is evil from his youth. '
  - type: note
    content: ch. 9:11, 15; Isa. 54:9
  - type: text
    content: 'Neither will I ever again strike down every living creature as I have done. '
  '22':
  - type: note
    content: Jer. 5:24
  - type: text
    content: 'While the earth remains, seedtime and harvest, cold and heat, summer and winter, '
  - type: note
    content: Jer. 33:20, 25
  - type: text
    content: day and night, shall not cease.”
  '3':
  - type: text
    content: 'and the waters receded from the earth continually. At the end '
  - type: note
    content: ch. 7:24
  - type: text
    content: 'of 150 days the waters had abated, '
  '4':
  - type: text
    content: 'and in the seventh month, on the seventeenth day of the month, the ark came to rest on the mountains of '
  - type: note
    content: 2 Kgs. 19:37; Isa. 37:38; Jer. 51:27
  - type: text
    content: 'Ararat. '
  '5':
  - type: text
    content: And the waters continued to abate until the tenth month; in the tenth month, on the first day of the month, the tops of the mountains were seen.
  '6':
  - type: text
    content: 'At the end of forty days Noah opened the window of the ark that he had made '
  '7':
  - type: text
    content: 'and sent forth a raven. It went to and fro until the waters were dried up from the earth. '
  '8':
  - type: text
    content: 'Then he sent forth a dove from him, to see if the waters had subsided from the face of the ground. '
  '9':
  - type: text
    content: 'But the dove found no place to set her foot, and she returned to him to the ark, for the waters were still on the face of the whole earth. So he put out his hand and took her and brought her into the ark with him. '
