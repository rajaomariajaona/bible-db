document_id: EZK.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy Against Mount Seir
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“Because you said, '
  - type: note
    content: '[ch. 37:22]'
  - type: text
    content: '‘These two nations and these two countries shall be mine, and '
  - type: note
    content: '[ch. 36:2, 3, 5; Ps. 83:6, 12]'
  - type: text
    content: 'we will take possession of them’—although the '
  - type: note
    content: See ch. 48:35
  - type: text
    content: Lord
  - type: text
    content: ' was there— '
  '11':
  - type: text
    content: 'therefore, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'as I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', I will deal with you '
  - type: note
    content: '[ver. 15; Matt. 7:2]'
  - type: text
    content: 'according to the anger and '
  - type: note
    content: '[ver. 15; Matt. 7:2]'
  - type: text
    content: 'envy that you showed because of your hatred against them. And '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'I will make myself known among them, when I judge you. '
  '12':
  - type: text
    content: 'And you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: '[ 2 Kgs. 19:4, 28 ]'
  - type: text
    content: '“I have heard all the revilings that you uttered against the mountains of Israel, saying, ‘They are laid desolate; '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: 'they are given us to devour.’ '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'you magnified yourselves against me '
  - type: note
    content: '[1 Sam. 2:3]'
  - type: text
    content: 'with your mouth, and multiplied your words against me; I heard it. '
  '14':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[Isa. 65:13, 14]'
  - type: text
    content: 'While the whole earth rejoices, I will make you desolate. '
  '15':
  - type: text
    content: 'As you '
  - type: note
    content: ch. 36:5; Ps. 137:7
  - type: text
    content: 'rejoiced over the inheritance of the house of Israel, because it was desolate, so I will deal with you; you shall be desolate, '
  - type: note
    content: ver. 2
  - type: text
    content: 'Mount Seir, and all Edom, all of it. Then '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'set your face '
  - type: note
    content: ch. 25:12; Isa. 21:11, 12; Amos 1:11; Mal. 1:4
  - type: text
    content: 'against '
  - type: note
    content: ch. 25:8; Gen. 32:3
  - type: text
    content: 'Mount Seir, and prophesy against it, '
  '3':
  - type: text
    content: 'and say to it, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'Behold, I am against you, Mount Seir, and '
  - type: note
    content: See ch. 6:14
  - type: text
    content: 'I will stretch out my hand against you, '
  - type: note
    content: '[ch. 33:28]'
  - type: text
    content: 'and I will make you a desolation and a waste. '
  '4':
  - type: note
    content: '[Isa. 17:9; 27:10]'
  - type: text
    content: 'I will lay your cities waste, and you shall become a desolation, and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Because '
  - type: note
    content: '[Ps. 137:7; Amos 1:11]'
  - type: text
    content: 'you cherished perpetual enmity and gave over the people of Israel to the power of the sword '
  - type: note
    content: Obad. 13
  - type: text
    content: 'at the time of their calamity, '
  - type: note
    content: ch. 21:25
  - type: text
    content: 'at the time of their final punishment, '
  '6':
  - type: text
    content: 'therefore, '
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'as I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', I will prepare you for blood, and blood shall pursue you; '
  - type: note
    content: See Gen. 9:6
  - type: text
    content: 'because you did not hate bloodshed, therefore blood shall pursue you. '
  '7':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'I will make Mount Seir a waste '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'and a desolation, and I will cut off from it '
  - type: note
    content: ch. 29:11
  - type: text
    content: 'all who come and go. '
  '8':
  - type: text
    content: 'And I will fill '
  - type: note
    content: '[ch. 31:12]'
  - type: text
    content: 'its mountains with the slain. On your hills and in your valleys and in all '
  - type: note
    content: '[ch. 31:12]'
  - type: text
    content: 'your ravines '
  - type: note
    content: ch. 31:17, 18; 32:20, 21
  - type: text
    content: 'those slain with the sword shall fall. '
  '9':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'I will make you a perpetual desolation, and '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'your cities shall not be inhabited. Then '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
