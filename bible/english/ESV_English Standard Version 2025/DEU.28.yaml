document_id: DEU.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Blessings for Obedience
  - type: text
    content: '“And '
  - type: note
    content: '[Ex. 15:26; 23:22; Lev. 26:3; Isa. 55:2]'
  - type: text
    content: 'if you faithfully obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, being careful to do all his commandments that I command you today, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will set you '
  - type: note
    content: ch. 26:19
  - type: text
    content: 'high above all the nations of the earth. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: '[Isa. 61:9]'
  - type: text
    content: 'all the peoples of the earth shall see that you are '
  - type: note
    content: See Num. 6:27
  - type: text
    content: 'called by the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', and they shall be '
  - type: note
    content: ch. 2:25; 11:25
  - type: text
    content: 'afraid of you. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ch. 30:9
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will make you abound in prosperity, in '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'the fruit of your womb and in the fruit of your livestock and in the fruit of your ground, within the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to your fathers to give you. '
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will open to you his good treasury, the heavens, '
  - type: note
    content: ch. 11:14; Lev. 26:4
  - type: text
    content: 'to give the rain to your land in its season and '
  - type: note
    content: ch. 14:29
  - type: text
    content: 'to bless all the work of your hands. And '
  - type: note
    content: ch. 15:6; [ver. 44; Ps. 37:26]
  - type: text
    content: 'you shall lend to many nations, but you shall not borrow. '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will make you '
  - type: note
    content: Isa. 9:14, 15; 19:15
  - type: text
    content: 'the head and not the tail, and you shall only go up and not down, if you obey the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, which I command you today, being careful to do them, '
  '14':
  - type: note
    content: See ch. 5:32
  - type: text
    content: and if you do not turn aside from any of the words that I command you today, to the right hand or to the left, to go after other gods to serve them.
  - type: heading
    content: Curses for Disobedience
  '15':
  - type: text
    content: '“But '
  - type: note
    content: Lev. 26:14; Lam. 2:17; Dan. 9:11, 13; Mal. 2:2
  - type: text
    content: 'if you will not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God or be careful to do all his commandments and his statutes that I command you today, then all these curses shall come upon you and '
  - type: note
    content: ver. 2
  - type: text
    content: 'overtake you. '
  '16':
  - type: text
    content: 'Cursed shall you be '
  - type: note
    content: '[ver. 3-6]'
  - type: text
    content: 'in the city, and cursed shall you be in the field. '
  '17':
  - type: text
    content: 'Cursed shall be your basket and your kneading bowl. '
  '18':
  - type: text
    content: 'Cursed shall be the fruit of your womb and the fruit of your ground, the increase of your herds and the young of your flock. '
  '19':
  - type: text
    content: Cursed shall you be when you come in, and cursed shall you be when you go out.
  '2':
  - type: text
    content: 'And all these blessings shall come upon you and '
  - type: note
    content: ver. 15; Zech. 1:6
  - type: text
    content: 'overtake you, if you obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '20':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Mal. 2:2
  - type: text
    content: 'will send on you curses, confusion, and '
  - type: note
    content: Ps. 80:16; Isa. 30:17; 51:20; 66:15
  - type: text
    content: 'frustration in all that you undertake to do, '
  - type: note
    content: Josh. 23:16
  - type: text
    content: 'until you are destroyed and perish quickly on account of the evil of your deeds, because you have forsaken me. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will make '
  - type: note
    content: See Lev. 26:25
  - type: text
    content: 'the pestilence stick to you until he has consumed you off the land that you are entering to take possession of it. '
  '22':
  - type: note
    content: Lev. 26:16
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike you with wasting disease and with fever, inflammation and fiery heat, and with drought'
  - type: note
    content: Or sword
  - type: text
    content: ' and with '
  - type: note
    content: 1 Kgs. 8:37; 2 Chr. 6:28; Amos 4:9; Hag. 2:17
  - type: text
    content: 'blight and with mildew. They shall pursue you until you perish. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 26:19
  - type: text
    content: 'the heavens over your head shall be bronze, and the earth under you shall be iron. '
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will make the rain of your land powder. From heaven dust shall come down on you until you are destroyed.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 32:30; Lev. 26:17, 37; Isa. 30:17; [ver. 7 ]
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will cause you to be defeated before your enemies. You shall go out one way against them and flee seven ways before them. And you '
  - type: note
    content: Ezek. 23:46
  - type: text
    content: 'shall be a horror to all the kingdoms of the earth. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: '[1 Sam. 17:44, 46; Ps. 79:2; Jer. 16:4; 19:7; 34:20]'
  - type: text
    content: 'your dead body shall be food for all birds of the air and for the beasts of the earth, and '
  - type: note
    content: Jer. 7:33
  - type: text
    content: 'there shall be no one to frighten them away. '
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike you '
  - type: note
    content: '[ver. 35]'
  - type: text
    content: 'with the boils of Egypt, and with tumors and '
  - type: note
    content: Lev. 21:20; 22:22
  - type: text
    content: 'scabs and itch, of which you cannot be healed. '
  '28':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike you with '
  - type: note
    content: '[ver. 34; Zech. 12:4]'
  - type: text
    content: 'madness and blindness and confusion of mind, '
  '29':
  - type: text
    content: 'and you shall '
  - type: note
    content: Job 5:14; Isa. 59:10
  - type: text
    content: grope at noonday, as the blind grope in darkness, and you shall not prosper in your ways.
  - type: note
    content: Or shall not succeed in finding your ways
  - type: text
    content: ' And you shall be only oppressed and robbed continually, and there shall be no one to help you. '
  '3':
  - type: text
    content: 'Blessed shall you be in the city, and '
  - type: note
    content: '[Gen. 39:5]'
  - type: text
    content: 'blessed shall you be in the field. '
  '30':
  - type: note
    content: ch. 20:5-7; Jer. 8:10
  - type: text
    content: 'You shall betroth a wife, but another man shall ravish her. '
  - type: note
    content: Amos 5:11; Zeph. 1:13
  - type: text
    content: 'You shall build a house, but you shall not dwell in it. '
  - type: note
    content: ch. 20:6; Lev. 19:23-25; [Mic. 6:15]
  - type: text
    content: 'You shall plant a vineyard, but you shall not enjoy its fruit. '
  '31':
  - type: text
    content: 'Your ox shall be slaughtered before your eyes, but you shall not eat any of it. Your donkey shall be seized before your face, but shall not be restored to you. Your sheep shall be given to your enemies, but there shall be no one to help you. '
  '32':
  - type: note
    content: '[2 Chr. 29:9; Joel 3:6]'
  - type: text
    content: 'Your sons and your daughters shall be given to another people, while your eyes look on and fail with longing for them all day long, '
  - type: note
    content: Neh. 5:5
  - type: text
    content: 'but you shall be helpless. '
  '33':
  - type: text
    content: 'A nation that you have not known shall eat up the fruit of your ground and of all your labors, and you shall be only oppressed and crushed continually, '
  '34':
  - type: text
    content: 'so that you are driven mad '
  - type: note
    content: ver. 67
  - type: text
    content: 'by the sights that your eyes see. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike you on the knees and on the legs '
  - type: note
    content: '[ver. 27]'
  - type: text
    content: with grievous boils of which you cannot be healed, from the sole of your foot to the crown of your head.
  '36':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: 2 Kgs. 17:4, 6; 24:12, 14; 25:7, 11; 2 Chr. 33:11; 36:6, 20
  - type: text
    content: 'bring you and your king whom you set over you to a nation that neither you '
  - type: note
    content: Jer. 9:16; 16:13
  - type: text
    content: 'nor your fathers have known. And '
  - type: note
    content: ver. 64; ch. 4:28
  - type: text
    content: 'there you shall serve other gods of wood and stone. '
  '37':
  - type: text
    content: 'And you shall become '
  - type: note
    content: 1 Kgs. 9:7, 8; 2 Chr. 7:20; Jer. 24:9; 25:9; [Ezek. 14:8]
  - type: text
    content: 'a horror, a proverb, and a byword among all the peoples where the '
  - type: text
    content: Lord
  - type: text
    content: ' will lead you away. '
  '38':
  - type: note
    content: Mic. 6:15; Hag. 1:6
  - type: text
    content: 'You shall carry much seed into the field and shall gather in little, for '
  - type: note
    content: Joel 1:4; 2:25
  - type: text
    content: 'the locust shall consume it. '
  '39':
  - type: note
    content: Zeph. 1:13
  - type: text
    content: 'You shall plant vineyards and dress them, but you shall neither drink of the wine nor gather the grapes, for the worm shall eat them. '
  '4':
  - type: text
    content: 'Blessed shall be '
  - type: note
    content: ch. 7:13; 30:9; [Gen. 49:25; Ex. 23:26]
  - type: text
    content: 'the fruit of your womb and the fruit of your ground and the fruit of your cattle, the increase of your herds and the young of your flock. '
  '40':
  - type: text
    content: 'You shall have olive trees throughout all your territory, but you '
  - type: note
    content: Mic. 6:15
  - type: text
    content: 'shall not anoint yourself with the oil, for your olives shall drop off. '
  '41':
  - type: text
    content: 'You shall father sons and daughters, but they shall not be yours, for '
  - type: note
    content: Lam. 1:5
  - type: text
    content: 'they shall go into captivity. '
  '42':
  - type: note
    content: '[See ver. 38 above]'
  - type: text
    content: The cricket
  - type: note
    content: Identity uncertain
  - type: text
    content: ' shall possess all your trees and the fruit of your ground. '
  '43':
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'The sojourner who is among you shall rise higher and higher above you, and you shall come down lower and lower. '
  '44':
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'He shall lend to you, and you shall not lend to him. '
  - type: note
    content: '[See ver. 43 above]'
  - type: text
    content: He shall be the head, and you shall be the tail.
  '45':
  - type: text
    content: ' '
  - type: note
    content: ver. 15
  - type: text
    content: '“All these curses shall come upon you and pursue you and overtake you till you are destroyed, because you did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, to keep his commandments and his statutes that he commanded you. '
  '46':
  - type: text
    content: 'They shall be '
  - type: note
    content: '[Isa. 8:18]'
  - type: text
    content: 'a sign and a wonder against you and your offspring forever. '
  '47':
  - type: note
    content: Neh. 9:35-37
  - type: text
    content: 'Because you did not serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with joyfulness and gladness of heart, because of the abundance of all things, '
  '48':
  - type: text
    content: 'therefore you shall serve your enemies whom the '
  - type: text
    content: Lord
  - type: text
    content: ' will send against you, in hunger and thirst, in nakedness, and lacking everything. And he '
  - type: note
    content: Jer. 28:14
  - type: text
    content: 'will put a yoke of iron on your neck until he has destroyed you. '
  '49':
  - type: note
    content: '[Jer. 5:15-17; 6:22, 23]; See Isa. 5:26-30'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will bring a nation against you from far away, from the end of the earth, '
  - type: note
    content: Jer. 48:40; 49:22; Lam. 4:19; Hos. 8:1; Hab. 1:8; [Ezek. 17:3, 12]
  - type: text
    content: 'swooping down like the eagle, a nation '
  - type: note
    content: Isa. 28:11; 33:19; Jer. 5:15
  - type: text
    content: 'whose language you do not understand, '
  '5':
  - type: text
    content: 'Blessed shall be your basket and your '
  - type: note
    content: ver. 17; [Ex. 8:3; 12:34]
  - type: text
    content: 'kneading bowl. '
  '50':
  - type: text
    content: 'a hard-faced nation '
  - type: note
    content: '[2 Chr. 36:17; Isa. 47:6]'
  - type: text
    content: 'who shall not respect the old or show mercy to the young. '
  '51':
  - type: text
    content: 'It shall '
  - type: note
    content: ver. 33; Jer. 5:17; [Isa. 62:8, 9]
  - type: text
    content: eat the offspring of your cattle and the fruit of your ground, until you are destroyed; it also shall not leave you grain, wine, or oil, the increase of your herds or the young of your flock, until they have caused you to perish.
  '52':
  - type: text
    content: '“They shall '
  - type: note
    content: '[2 Kgs. 17:5; 25:1, 2, 4]'
  - type: text
    content: 'besiege you in all your towns, until your high and fortified walls, in which you trusted, come down throughout all your land. And they shall besiege you in all your towns throughout all your land, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you. '
  '53':
  - type: text
    content: 'And '
  - type: note
    content: ver. 57; Lev. 26:29; Jer. 19:9; Ezek. 5:10; [2 Kgs. 6:28, 29; Lam. 2:20; 4:10]
  - type: text
    content: 'you shall eat the fruit of your womb, the flesh of your sons and daughters, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you, '
  - type: note
    content: ver. 55, 57
  - type: text
    content: 'in the siege and in the distress with which your enemies shall distress you. '
  '54':
  - type: text
    content: 'The man who is the most tender and refined among you will '
  - type: note
    content: See ch. 15:9
  - type: text
    content: 'begrudge food to his brother, to '
  - type: note
    content: ch. 13:6
  - type: text
    content: the wife he embraces,
  - type: note
    content: Hebrew the wife of his bosom
  - type: text
    content: ' and to the last of the children whom he has left, '
  '55':
  - type: text
    content: 'so that he will not give to any of them any of the flesh of his children whom he is eating, because he has nothing else left, '
  - type: note
    content: ver. 53
  - type: text
    content: 'in the siege and in the distress with which your enemy shall distress you in all your towns. '
  '56':
  - type: note
    content: ver. 54; Isa. 47:1
  - type: text
    content: The most tender and refined woman among you, who would not venture to set the sole of her foot on the ground because she is so delicate and tender, will begrudge to the husband she embraces,
  - type: note
    content: Hebrew the husband of her bosom
  - type: text
    content: ' to her son and to her daughter, '
  '57':
  - type: text
    content: 'her afterbirth that comes out from between her feet and her children whom she bears, because lacking everything she will eat them secretly, '
  - type: note
    content: '[See ver. 55 above]'
  - type: text
    content: in the siege and in the distress with which your enemy shall distress you in your towns.
  '58':
  - type: text
    content: '“If you are not careful to do all the words of this law that are written in this book, that you may fear this glorious and awesome name, '
  - type: note
    content: Ex. 6:3
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '59':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring on you and your offspring extraordinary afflictions, afflictions severe and lasting, and sicknesses grievous and lasting. '
  '6':
  - type: text
    content: 'Blessed shall you be '
  - type: note
    content: Ps. 121:8
  - type: text
    content: when you come in, and blessed shall you be when you go out.
  '60':
  - type: text
    content: 'And he will bring upon you again all '
  - type: note
    content: See ch. 7:15
  - type: text
    content: 'the diseases of Egypt, of which you were afraid, and they shall cling to you. '
  '61':
  - type: text
    content: 'Every sickness also and every affliction that is not recorded in the book of this law, the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring upon you, until you are destroyed. '
  '62':
  - type: text
    content: 'Whereas '
  - type: note
    content: ch. 4:27; [2 Kgs. 24:14; Neh. 7:4; Jer. 42:2]
  - type: text
    content: 'you were as numerous '
  - type: note
    content: See ch. 10:22
  - type: text
    content: 'as the stars of heaven, you shall be left few in number, because you did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '63':
  - type: text
    content: 'And as the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 30:9; Jer. 32:41; Zeph. 3:17
  - type: text
    content: 'took delight in doing you good and multiplying you, so the '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: '[Prov. 1:26; Isa. 1:24; Ezek. 5:13]'
  - type: text
    content: take delight in bringing ruin upon you and destroying you. And you shall be plucked off the land that you are entering to take possession of it.
  '64':
  - type: text
    content: '“And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Lev. 26:33
  - type: text
    content: 'will scatter you among all peoples, from one end of the earth to the other, and '
  - type: note
    content: ver. 36
  - type: text
    content: 'there you shall serve other gods '
  - type: note
    content: ch. 4:28
  - type: text
    content: 'of wood and stone, '
  - type: note
    content: ch. 13:6; Jer. 19:4; 44:3
  - type: text
    content: 'which neither you nor your fathers have known. '
  '65':
  - type: text
    content: 'And '
  - type: note
    content: '[Amos 9:4]'
  - type: text
    content: 'among these nations you shall find no respite, and there shall be no resting place for the sole of your foot, but '
  - type: note
    content: '[Lev. 26:36]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you there a trembling heart and failing eyes and '
  - type: note
    content: Lev. 26:16
  - type: text
    content: 'a languishing soul. '
  '66':
  - type: text
    content: 'Your life shall hang in doubt before you. Night and day you shall be in dread and have no assurance of your life. '
  '67':
  - type: note
    content: Job 7:3, 4
  - type: text
    content: 'In the morning you shall say, ‘If only it were evening!’ and at evening you shall say, ‘If only it were morning!’ because of the dread that your heart shall feel, and '
  - type: note
    content: ver. 34
  - type: text
    content: 'the sights that your eyes shall see. '
  '68':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Hos. 8:13; 9:3; [Jer. 43:7]
  - type: text
    content: 'will bring you back in ships to Egypt, a journey that I promised that '
  - type: note
    content: See ch. 17:16
  - type: text
    content: you should never make again; and there you shall offer yourselves for sale to your enemies as male and female slaves, but there will be no buyer.”
  '7':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 23:22, 27; Lev. 26:7, 8; [ver. 25]; See 2 Sam. 22:38-41; Ps. 18:37-40
  - type: text
    content: 'will cause your enemies who rise against you to be defeated before you. They shall come out against you one way and flee before you seven ways. '
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Lev. 25:21; Ps. 133:3
  - type: text
    content: 'will command the blessing on you in your barns and '
  - type: note
    content: See ch. 12:7
  - type: text
    content: 'in all that you undertake. '
  - type: note
    content: ch. 15:4
  - type: text
    content: 'And he will bless you in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. '
  '9':
  - type: note
    content: ch. 7:6; 26:18, 19; 29:13; See Ex. 19:5, 6
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will establish you as a people holy to himself, as he has sworn to you, if you keep the commandments of the '
