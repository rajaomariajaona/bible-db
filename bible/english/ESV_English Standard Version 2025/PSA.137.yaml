document_id: PSA.137,59
type_code: eng
verses:
  '1':
  - type: heading
    content: How Shall We Sing the Lord’s Song?
  - type: text
    content: By the waters of Babylon,
  - type: text
    content: there we sat down and wept,
  - type: text
    content: when we remembered Zion.
  '2':
  - type: text
    content: On the willows
  - type: note
    content: Or poplars
  - type: text
    content: ' there'
  - type: text
    content: we hung up our lyres.
  '3':
  - type: text
    content: For there our captors
  - type: text
    content: required of us songs,
  - type: text
    content: and our tormentors, mirth, saying,
  - type: text
    content: “Sing us one of the songs of Zion!”
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Neh. 2:3 ]'
  - type: text
    content: 'How shall we sing the '
  - type: text
    content: Lord
  - type: text
    content: ’s song
  - type: text
    content: in a foreign land?
  '5':
  - type: text
    content: If I forget you, O Jerusalem,
  - type: note
    content: '[ Ps. 76:5 ]'
  - type: text
    content: let my right hand forget its skill!
  '6':
  - type: text
    content: 'Let my '
  - type: note
    content: Job 29:10; Ezek. 3:26
  - type: text
    content: tongue stick to the roof of my mouth,
  - type: text
    content: if I do not remember you,
  - type: text
    content: if I do not set Jerusalem
  - type: text
    content: above my highest joy!
  '7':
  - type: text
    content: 'Remember, O '
  - type: text
    content: Lord
  - type: text
    content: ', against the '
  - type: note
    content: Isa. 34:5, 6; Lam. 4:21, 22; Ezek. 35:2; [Amos 1:11, 12]; See Jer. 49:7-22; Ezek. 25:12-14; Obad. 8-14
  - type: text
    content: Edomites
  - type: note
    content: See Job 18:20
  - type: text
    content: the day of Jerusalem,
  - type: text
    content: 'how they said, '
  - type: note
    content: Hab. 3:13; Zeph. 2:14
  - type: text
    content: “Lay it bare, lay it bare,
  - type: text
    content: down to its foundations!”
  '8':
  - type: text
    content: 'O daughter of Babylon, '
  - type: note
    content: Isa. 21:9; 47:1-15; Jer. 25:12; 50:1-46; 51:1-64; See Isa. 13:1-22
  - type: text
    content: doomed to be destroyed,
  - type: text
    content: 'blessed shall he be who '
  - type: note
    content: Jer. 51:24, 56; [Ps. 28:4]
  - type: text
    content: repays you
  - type: text
    content: with what you have done to us!
  '9':
  - type: text
    content: Blessed shall he be who takes your little ones
  - type: text
    content: 'and '
  - type: note
    content: 2 Kgs. 8:12; Isa. 13:16; Hos. 10:14; Nah. 3:10
  - type: text
    content: dashes them against the rock!
