document_id: MAT.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Ten Virgins
  - type: text
    content: ' '
  - type: text
    content: '“Then the kingdom of heaven will be like '
  - type: note
    content: Luke 19:13
  - type: text
    content: ten virgins who took their lamps
  - type: text
    content: ' '
  - type: note
    content: Or torches
  - type: text
    content: 'and went to meet '
  - type: note
    content: ch. 9:15; John 3:29; Rev. 19:7; 21:2, 9
  - type: text
    content: the bridegroom.
  - type: note
    content: Some manuscripts add and the bride
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And while they were going to buy, the bridegroom came, and '
  - type: note
    content: ch. 24:44
  - type: text
    content: 'those who were ready went in with him to '
  - type: note
    content: ch. 22:2
  - type: text
    content: 'the marriage feast, and '
  - type: note
    content: For ver. 10-12, [Luke 13:25-27]
  - type: text
    content: the door was shut.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Afterward the other virgins came also, saying, '
  - type: note
    content: '[ch. 7:22, 23]'
  - type: text
    content: ‘Lord, lord, open to us.’
  - type: text
    content: ' '
  '12':
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'But he answered, ‘Truly, I say to you, '
  - type: note
    content: ch. 10:33; [2 Tim. 2:19]
  - type: text
    content: I do not know you.’
  - type: text
    content: ' '
  '13':
  - type: note
    content: ch. 24:42
  - type: text
    content: 'Watch therefore, for you '
  - type: note
    content: '[ch. 24:50]'
  - type: text
    content: know neither the day nor the hour.
  - type: heading
    content: The Parable of the Talents
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-30, [ Luke 19:12-27 ]
  - type: text
    content: '“For '
  - type: note
    content: '[ Mark 13:34 ]'
  - type: text
    content: 'it will be like a man '
  - type: note
    content: ch. 21:33
  - type: text
    content: going on a journey, who called his servants
  - type: text
    content: ' '
  - type: note
    content: Or bondservants ; also verse 19
  - type: text
    content: and entrusted to them his property.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'To one he gave five '
  - type: note
    content: ch. 18:24
  - type: text
    content: talents,
  - type: note
    content: A talent was a monetary unit worth about twenty years’ wages for a laborer
  - type: text
    content: ' '
  - type: text
    content: 'to another two, to another one, '
  - type: note
    content: '[Rom. 12:6; 1 Cor. 12:11; Eph. 4:7; 1 Pet. 4:10]'
  - type: text
    content: 'to each according to his ability. Then he '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: went away.
  - type: text
    content: ' '
  '16':
  - type: text
    content: He who had received the five talents went at once and traded with them, and he made five talents more.
  - type: text
    content: ' '
  '17':
  - type: text
    content: So also he who had the two talents made two talents more.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'But he who had received the one talent went and '
  - type: note
    content: '[ch. 13:44]'
  - type: text
    content: dug in the ground and hid his master’s money.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Now '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'after a long time the master of those servants came and '
  - type: note
    content: ch. 18:23; Rom. 14:12; [Luke 16:2]
  - type: text
    content: settled accounts with them.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Five of them were foolish, and five were '
  - type: note
    content: '[See ch. 24:45 above]'
  - type: text
    content: wise.
  - type: text
    content: ' '
  '20':
  - type: text
    content: And he who had received the five talents came forward, bringing five talents more, saying, ‘Master, you delivered to me five talents; here, I have made five talents more.’
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'His master said to him, ‘Well done, good and '
  - type: note
    content: ver. 23; ch. 24:45
  - type: text
    content: faithful servant.
  - type: note
    content: Or bondservant; also verses 23, 26, 30
  - type: text
    content: ' '
  - type: note
    content: Luke 16:10; 1 Cor. 4:2; [1 Tim. 3:13]
  - type: text
    content: 'You have been faithful over a little; '
  - type: note
    content: ch. 24:47
  - type: text
    content: 'I will set you over much. Enter into '
  - type: note
    content: Heb. 12:2; [John 15:11]
  - type: text
    content: the joy of your master.’
  - type: text
    content: ' '
  '22':
  - type: text
    content: And he also who had the two talents came forward, saying, ‘Master, you delivered to me two talents; here, I have made two talents more.’
  - type: text
    content: ' '
  '23':
  - type: text
    content: His master said to him, ‘Well done, good and faithful servant. You have been faithful over a little; I will set you over much. Enter into the joy of your master.’
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'He also who had received the one talent came forward, saying, ‘Master, I knew you to be '
  - type: note
    content: 1 Sam. 25:3
  - type: text
    content: 'a hard man, reaping '
  - type: note
    content: '[2 Cor. 8:12]'
  - type: text
    content: where you did not sow, and gathering where you scattered no seed,
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'so I was afraid, and I went and hid your talent in the ground. Here, '
  - type: note
    content: ch. 20:14
  - type: text
    content: you have what is yours.’
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But his master answered him, ‘You '
  - type: note
    content: ch. 18:32; Prov. 20:4; Rom. 12:11
  - type: text
    content: 'wicked and '
  - type: note
    content: ch. 18:32; Prov. 20:4; Rom. 12:11
  - type: text
    content: slothful servant! You knew that I reap where I have not sown and gather where I scattered no seed?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Then you ought to have invested my money with the bankers, and at my coming I should have received what was my own with interest.
  - type: text
    content: ' '
  '28':
  - type: text
    content: So take the talent from him and give it to him who has the ten talents.
  - type: text
    content: ' '
  '29':
  - type: note
    content: '[Luke 12:48]; See ch. 13:12'
  - type: text
    content: For to everyone who has will more be given, and he will have an abundance. But from the one who has not, even what he has will be taken away.
  - type: text
    content: ' '
  '3':
  - type: text
    content: For when the foolish took their lamps, they took no oil with them,
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 8:12
  - type: text
    content: 'cast '
  - type: note
    content: '[Luke 17:10]'
  - type: text
    content: 'the worthless servant into the outer darkness. In that place '
  - type: note
    content: See ch. 8:12
  - type: text
    content: there will be weeping and gnashing of teeth.’
  - type: heading
    content: The Final Judgment
  '31':
  - type: text
    content: ' '
  - type: note
    content: See ch. 16:27, 28
  - type: text
    content: '“When the Son of Man comes in his glory, and all the angels with him, '
  - type: note
    content: ch. 19:28
  - type: text
    content: then he will sit on his glorious throne.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Before him '
  - type: note
    content: '[ch. 24:31]'
  - type: text
    content: 'will be gathered '
  - type: note
    content: Joel 3:12; [ch. 24:14; 28:19]
  - type: text
    content: 'all the nations, and '
  - type: note
    content: ch. 13:49
  - type: text
    content: 'he will separate people one from another as a shepherd separates '
  - type: note
    content: Ezek. 34:17
  - type: text
    content: the sheep from the goats.
  - type: text
    content: ' '
  '33':
  - type: text
    content: And he will place the sheep on his right, but the goats on the left.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 40; Luke 19:38; Rev. 17:14; 19:16; [Isa. 6:5]
  - type: text
    content: 'the King will say to '
  - type: note
    content: 1 Kgs. 2:19; Ps. 45:9; 110:1
  - type: text
    content: 'those on his right, ‘Come, you '
  - type: note
    content: '[Ps. 37:22; Isa. 65:23; Eph. 1:3]'
  - type: text
    content: 'who are blessed by my Father, '
  - type: note
    content: ch. 19:29; Rev. 21:7
  - type: text
    content: 'inherit '
  - type: note
    content: Luke 12:32; 22:29
  - type: text
    content: 'the kingdom '
  - type: note
    content: ch. 20:23; [1 Cor. 2:9; Heb. 11:16]
  - type: text
    content: 'prepared for you '
  - type: note
    content: See ch. 13:35
  - type: text
    content: from the foundation of the world.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'For '
  - type: note
    content: Isa. 58:7; Ezek. 18:7, 16; [James 2:15, 16]
  - type: text
    content: 'I was hungry and you gave me food, I was thirsty and you '
  - type: note
    content: ch. 10:42
  - type: text
    content: 'gave me drink, '
  - type: note
    content: Job 31:32; Rom. 12:13; Heb. 13:1, 2; 3 John 5
  - type: text
    content: I was a stranger and you welcomed me,
  - type: text
    content: ' '
  '36':
  - type: note
    content: '[See ver. 35 above]'
  - type: text
    content: 'I was naked and you clothed me, '
  - type: note
    content: '[Luke 10:33, 34]'
  - type: text
    content: 'I was sick and you '
  - type: note
    content: James 1:27
  - type: text
    content: 'visited me, '
  - type: note
    content: 2 Tim. 1:16; [Heb. 10:34; 13:3]
  - type: text
    content: I was in prison and you came to me.’
  - type: text
    content: ' '
  '37':
  - type: text
    content: Then the righteous will answer him, saying, ‘Lord, when did we see you hungry and feed you, or thirsty and give you drink?
  - type: text
    content: ' '
  '38':
  - type: text
    content: And when did we see you a stranger and welcome you, or naked and clothe you?
  - type: text
    content: ' '
  '39':
  - type: text
    content: And when did we see you sick or in prison and visit you?’
  - type: text
    content: ' '
  '4':
  - type: text
    content: but the wise took flasks of oil with their lamps.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And '
  - type: note
    content: ver. 34
  - type: text
    content: 'the King will answer them, '
  - type: note
    content: See ch. 10:40, 42
  - type: text
    content: '‘Truly, I say to you, as you did it to one of the least of these '
  - type: note
    content: ch. 28:10; John 20:17; Rom. 8:29; Heb. 2:11; [ch. 12:50]
  - type: text
    content: my brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' '
  - type: text
    content: you did it to me.’
  '41':
  - type: text
    content: ' '
  - type: text
    content: '“Then he will say to those on his left, '
  - type: note
    content: ch. 7:23
  - type: text
    content: '‘Depart from me, you '
  - type: note
    content: '[ Heb. 6:8 ]'
  - type: text
    content: 'cursed, into '
  - type: note
    content: ch. 13:40, 42; 18:8; Mark 9:43, 48; Jude 7; [ Luke 16:24 ]; See 2 Thess. 1:8
  - type: text
    content: 'the eternal fire prepared for '
  - type: note
    content: 2 Pet. 2:4; Jude 6; Rev. 12:7
  - type: text
    content: the devil and his angels.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'For '
  - type: note
    content: Job 22:7
  - type: text
    content: I was hungry and you gave me no food, I was thirsty and you gave me no drink,
  - type: text
    content: ' '
  '43':
  - type: text
    content: I was a stranger and you did not welcome me, naked and you did not clothe me, sick and in prison and you did not visit me.’
  - type: text
    content: ' '
  '44':
  - type: text
    content: Then they also will answer, saying, ‘Lord, when did we see you hungry or thirsty or a stranger or naked or sick or in prison, and did not minister to you?’
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then he will answer them, saying, ‘Truly, I say to you, as you did not do it to one of the least of these, '
  - type: note
    content: '[Luke 10:16; Acts 9:5; 1 Cor. 8:12]'
  - type: text
    content: you did not do it to me.’
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'And these will go away '
  - type: note
    content: Dan. 12:2; [John 5:29; Acts 24:15]
  - type: text
    content: 'into eternal punishment, but the righteous '
  - type: note
    content: Dan. 12:2; [John 5:29; Acts 24:15]
  - type: text
    content: 'into '
  - type: note
    content: Rom. 2:7; 5:21; 6:23
  - type: text
    content: eternal life.”
  '5':
  - type: text
    content: 'As the bridegroom '
  - type: note
    content: ch. 24:48; [ver. 19; Heb. 10:37; 2 Pet. 3:4, 9]
  - type: text
    content: was delayed, they all became drowsy and slept.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: Mark 13:35
  - type: text
    content: at midnight there was a cry, ‘Here is the bridegroom! Come out to meet him.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then all those virgins rose and '
  - type: note
    content: '[Luke 12:35]'
  - type: text
    content: trimmed their lamps.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And the foolish said to the wise, ‘Give us some of your oil, for our lamps are going out.’
  - type: text
    content: ' '
  '9':
  - type: text
    content: But the wise answered, saying, ‘Since there will not be enough for us and for you, go rather to the dealers and buy for yourselves.’
  - type: text
    content: ' '
