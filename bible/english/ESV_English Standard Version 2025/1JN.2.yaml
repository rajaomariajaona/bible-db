document_id: 1JN.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ Our Advocate
  - type: text
    content: 'My little children, I am writing these things to you so that you may not sin. But if anyone does sin, '
  - type: note
    content: Rom. 8:34; 1 Tim. 2:5; Heb. 7:25
  - type: text
    content: 'we have an advocate with the Father, Jesus Christ the righteous. '
  '10':
  - type: text
    content: Whoever loves his brother abides in the light, and in him
  - type: note
    content: Or it
  - type: text
    content: ' there is no '
  - type: note
    content: John 11:10; [Prov. 4:19; 2 Pet. 1:10]
  - type: text
    content: 'cause for stumbling. '
  '11':
  - type: text
    content: 'But whoever hates his brother is in the darkness and '
  - type: note
    content: See ch. 1:6
  - type: text
    content: walks in the darkness, and does not know where he is going, because the darkness has blinded his eyes.
  '12':
  - type: text
    content: I am writing to you, little children,
  - type: text
    content: 'because '
  - type: note
    content: Luke 24:47; Acts 10:43; 13:38
  - type: text
    content: your sins are forgiven for his name’s sake.
  '13':
  - type: text
    content: I am writing to you, fathers,
  - type: text
    content: 'because you know '
  - type: note
    content: '[ch. 1:1]'
  - type: text
    content: him who is from the beginning.
  - type: text
    content: I am writing to you, young men,
  - type: text
    content: 'because '
  - type: note
    content: Eph. 6:10; [ch. 5:4, 5]
  - type: text
    content: you have overcome the evil one.
  - type: text
    content: I write to you, children,
  - type: text
    content: 'because '
  - type: note
    content: John 14:7
  - type: text
    content: you know the Father.
  '14':
  - type: text
    content: I write to you, fathers,
  - type: text
    content: 'because you know '
  - type: note
    content: '[See ver. 2:13 above]'
  - type: text
    content: him who is from the beginning.
  - type: text
    content: I write to you, young men,
  - type: text
    content: 'because '
  - type: note
    content: '[See ver. 2:13 above]'
  - type: text
    content: you are strong,
  - type: text
    content: and the word of God abides in you,
  - type: text
    content: and you have overcome the evil one.
  - type: heading
    content: Do Not Love the World
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Rom. 12:2; 2 Tim. 4:10 ]'
  - type: text
    content: 'Do not love the world or the things in the world. '
  - type: note
    content: See James 4:4
  - type: text
    content: 'If anyone loves the world, the love of the Father is not in him. '
  '16':
  - type: text
    content: For all that is in the world—
  - type: note
    content: Rom. 13:14; Eph. 2:3; 1 Pet. 4:2; 2 Pet. 2:18
  - type: text
    content: 'the desires of the flesh and '
  - type: note
    content: Eccles. 4:8; 5:11
  - type: text
    content: the desires of the eyes and pride of life
  - type: note
    content: Or pride in possessions
  - type: text
    content: '—is not from the Father but is from the world. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: See 1 Cor. 7:31
  - type: text
    content: the world is passing away along with its desires, but whoever does the will of God abides forever.
  - type: heading
    content: Warning Concerning Antichrists
  '18':
  - type: text
    content: 'Children, '
  - type: note
    content: '[2 Tim. 3:1; James 5:3; 2 Pet. 3:3; Jude 18]'
  - type: text
    content: 'it is the last hour, and as you have heard that '
  - type: note
    content: ver. 22; ch. 4:3; 2 John 7; [Matt. 24:5, 24]
  - type: text
    content: 'antichrist is coming, so now '
  - type: note
    content: '[ch. 4:1; Matt. 24:5]'
  - type: text
    content: 'many antichrists have come. '
  - type: note
    content: 1 Tim. 4:1
  - type: text
    content: 'Therefore we know that it is the last hour. '
  '19':
  - type: note
    content: Deut. 13:13; Acts 20:30
  - type: text
    content: 'They went out from us, but they were not of us; for '
  - type: note
    content: See John 17:12
  - type: text
    content: 'if they had been of us, they would have continued with us. But they went out, '
  - type: note
    content: 1 Cor. 11:19
  - type: text
    content: 'that it might become plain that they all are not of us. '
  '2':
  - type: note
    content: ch. 4:10; Rom. 3:25; [2 Cor. 5:18, 19; Col. 1:20]
  - type: text
    content: 'He is the propitiation for our sins, and not for ours only but '
  - type: note
    content: ch. 4:14; John 1:29; 4:42; 11:51, 52; 12:32
  - type: text
    content: 'also for the sins of the whole world. '
  '20':
  - type: text
    content: 'But you have been '
  - type: note
    content: ver. 27; [2 Cor. 1:21]
  - type: text
    content: 'anointed by '
  - type: note
    content: See Mark 1:24
  - type: text
    content: 'the Holy One, and '
  - type: note
    content: ver. 27; See John 14:26
  - type: text
    content: you all have knowledge.
  - type: note
    content: Some manuscripts you know everything
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'I write to you, not because you do not know the truth, but because you know it, and because no lie is of the truth. '
  '22':
  - type: text
    content: 'Who is the liar but '
  - type: note
    content: ch. 4:3; 2 John 7
  - type: text
    content: 'he who denies that Jesus is the Christ? This is '
  - type: note
    content: '[See ver. 18above]'
  - type: text
    content: 'the antichrist, he who denies the Father and the Son. '
  '23':
  - type: note
    content: ch. 4:15; 5:1; 2 John 9
  - type: text
    content: 'No one who denies the Son has the Father. Whoever confesses the Son has the Father also. '
  '24':
  - type: text
    content: 'Let '
  - type: note
    content: ch. 3:11; 2 John 6
  - type: text
    content: 'what you heard from the beginning abide in you. If what you heard from the beginning abides in you, then '
  - type: note
    content: '[John 14:23]; See ch. 1:3'
  - type: text
    content: 'you too will abide in the Son and in the Father. '
  '25':
  - type: text
    content: And this is the promise that he made to us
  - type: note
    content: Some manuscripts you
  - type: text
    content: —
  - type: note
    content: John 17:2
  - type: text
    content: eternal life.
  '26':
  - type: text
    content: 'I write these things to you about '
  - type: note
    content: ch. 3:7; 2 John 7
  - type: text
    content: 'those who are trying to deceive you. '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: ver. 20
  - type: text
    content: 'the anointing that you received from him abides in you, and '
  - type: note
    content: Jer. 31:34; Heb. 8:11
  - type: text
    content: 'you have no need that anyone should teach you. But as his anointing teaches you about everything, and '
  - type: note
    content: John 14:17
  - type: text
    content: is true, and is no lie—just as it has taught you, abide in him.
  - type: heading
    content: Children of God
  '28':
  - type: text
    content: 'And now, little children, abide in him, so that '
  - type: note
    content: ch. 3:2; [Col. 3:4]
  - type: text
    content: 'when he appears '
  - type: note
    content: ch. 3:21; 4:17; 5:14
  - type: text
    content: 'we may have confidence and not shrink from him in shame at his '
  - type: note
    content: See 1 Thess. 2:19
  - type: text
    content: 'coming. '
  '29':
  - type: text
    content: 'If you know that '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'he is righteous, you may be sure that '
  - type: note
    content: ch. 3:9; 4:7; 5:1, 4, 18; 3 John 11
  - type: text
    content: everyone who practices righteousness has been born of him.
  '3':
  - type: text
    content: 'And by this we know that we have come to know him, if we '
  - type: note
    content: John 14:15; 15:10
  - type: text
    content: 'keep his commandments. '
  '4':
  - type: text
    content: 'Whoever says “I know him” but does not keep his commandments '
  - type: note
    content: ch. 1:8; John 8:44
  - type: text
    content: 'is a liar, and '
  - type: note
    content: ch. 1:8; John 8:44
  - type: text
    content: 'the truth is not in him, '
  '5':
  - type: text
    content: 'but whoever '
  - type: note
    content: ch. 5:3; John 14:23
  - type: text
    content: 'keeps his word, in him truly '
  - type: note
    content: ch. 4:12
  - type: text
    content: 'the love of God is perfected. '
  - type: note
    content: ch. 3:24; 4:13; 5:2
  - type: text
    content: 'By this we may know that we are in him: '
  '6':
  - type: text
    content: 'whoever says he '
  - type: note
    content: John 15:4, 5, 7
  - type: text
    content: 'abides in him '
  - type: note
    content: See Matt. 11:29
  - type: text
    content: ought to walk in the same way in which he walked.
  - type: heading
    content: The New Commandment
  '7':
  - type: text
    content: 'Beloved, I am writing you '
  - type: note
    content: 2 John 5
  - type: text
    content: 'no new commandment, but '
  - type: note
    content: Lev. 19:18
  - type: text
    content: 'an old commandment '
  - type: note
    content: '[ver. 24; ch. 3:11; 2 John 5, 6]'
  - type: text
    content: 'that you had from the beginning. The old commandment is the word that you have heard. '
  '8':
  - type: text
    content: 'At the same time, it is '
  - type: note
    content: See John 13:34
  - type: text
    content: a new commandment that I am writing to you, which is true in him and in you, because
  - type: note
    content: Or that
  - type: text
    content: ' '
  - type: note
    content: Rom. 13:12; Eph. 5:8; 1 Thess. 5:4, 5
  - type: text
    content: 'the darkness is passing away and '
  - type: note
    content: John 1:9; 8:12
  - type: text
    content: 'the true light is already shining. '
  '9':
  - type: text
    content: 'Whoever says he is in the light and '
  - type: note
    content: ch. 4:20; [ch. 3:14, 15; Titus 3:3]
  - type: text
    content: 'hates his brother is still in darkness. '
