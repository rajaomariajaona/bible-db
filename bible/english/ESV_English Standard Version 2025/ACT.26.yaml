document_id: ACT.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Defense Before Agrippa
  - type: text
    content: 'So '
  - type: note
    content: See ch. 9:15
  - type: text
    content: 'Agrippa said to Paul, “You have permission to speak for yourself.” Then Paul stretched out his hand and made his defense:'
  '10':
  - type: note
    content: See ch. 8:3
  - type: text
    content: 'And I did so in Jerusalem. I not only locked up many of the saints in prison after receiving authority '
  - type: note
    content: ver. 12; ch. 9:1, 2, 14, 21; 22:4, 5
  - type: text
    content: 'from the chief priests, but '
  - type: note
    content: See ch. 22:20
  - type: text
    content: 'when they were put to death I cast my vote against them. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ch. 22:19
  - type: text
    content: 'I punished them often in all the synagogues and tried to make them '
  - type: note
    content: See ch. 13:45
  - type: text
    content: 'blaspheme, and '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'in raging fury against them I '
  - type: note
    content: ch. 22:5
  - type: text
    content: persecuted them even to foreign cities.
  - type: heading
    content: Paul Tells of His Conversion
  '12':
  - type: text
    content: '“In this connection '
  - type: note
    content: For ver. 12-18, see ch. 9:3-8; 22:6-11
  - type: text
    content: 'I journeyed to Damascus with the authority and commission of the chief priests. '
  '13':
  - type: text
    content: 'At midday, O king, I saw on the way a light from heaven, brighter than the sun, that shone around me and those who journeyed with me. '
  '14':
  - type: text
    content: 'And when we had all fallen to the ground, I heard a voice saying to me '
  - type: note
    content: ch. 21:40; 22:2
  - type: text
    content: in the Hebrew language,
  - type: note
    content: Or the Hebrew dialect (probably Aramaic)
  - type: text
    content: ' '
  - type: text
    content: ‘Saul, Saul, why are you persecuting me? It is hard for you to kick against the goads.’
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And I said, ‘Who are you, Lord?’ And the Lord said, '
  - type: text
    content: ‘I am Jesus whom you are persecuting.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But rise and '
  - type: note
    content: Ezek. 2:1; Dan. 10:11
  - type: text
    content: 'stand upon your feet, for I have appeared to you for this purpose, '
  - type: note
    content: See ch. 22:14, 15
  - type: text
    content: to appoint you as a servant and witness to the things in which you have seen me and to those in which I will appear to you,
  - type: text
    content: ' '
  '17':
  - type: note
    content: '[ch. 12:11; 1 Chr. 16:35; Jer. 1:8, 19; 15:20]'
  - type: text
    content: delivering you from your people and from the Gentiles—
  - type: note
    content: See ch. 9:15
  - type: text
    content: 'to whom I '
  - type: note
    content: '[Rom. 11:13; 1 Tim. 2:7]'
  - type: text
    content: am sending you
  - type: text
    content: ' '
  '18':
  - type: note
    content: Isa. 35:5; 42:7
  - type: text
    content: 'to open their eyes, so that they may turn from darkness to light and from '
  - type: note
    content: See Luke 22:53; 1 Cor. 5:5
  - type: text
    content: 'the power of Satan to God, that they may receive '
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'forgiveness of sins and '
  - type: note
    content: See ch. 20:32
  - type: text
    content: 'a place among those who are sanctified '
  - type: note
    content: '[ch. 15:9; 2 Thess. 2:13]'
  - type: text
    content: by faith in me.’
  '19':
  - type: text
    content: '“Therefore, O King Agrippa, I was not disobedient to '
  - type: note
    content: ver. 13
  - type: text
    content: 'the heavenly vision, '
  '2':
  - type: text
    content: '“I consider myself fortunate that it is before you, King Agrippa, I am going to make my defense today '
  - type: note
    content: ch. 25:7, 19; [ver. 7]
  - type: text
    content: 'against all the accusations of the Jews, '
  '20':
  - type: text
    content: 'but declared first '
  - type: note
    content: ch. 9:19, 20
  - type: text
    content: 'to those in Damascus, '
  - type: note
    content: ch. 9:26-29; 22:17-20
  - type: text
    content: 'then in Jerusalem and throughout all the region of Judea, and also '
  - type: note
    content: See ch. 13:46
  - type: text
    content: 'to the Gentiles, that they should '
  - type: note
    content: See ch. 2:38
  - type: text
    content: 'repent and '
  - type: note
    content: See ch. 14:15
  - type: text
    content: 'turn to God, performing deeds '
  - type: note
    content: Matt. 3:8; Luke 3:8
  - type: text
    content: 'in keeping with their repentance. '
  '21':
  - type: text
    content: 'For this reason '
  - type: note
    content: ch. 21:27, 30, 31; 24:18
  - type: text
    content: 'the Jews seized me in the temple and tried to kill me. '
  '22':
  - type: note
    content: 2 Cor. 1:10; [Heb. 13:5, 6]
  - type: text
    content: 'To this day I have had the help that comes from God, and so '
  - type: note
    content: '[Eph. 6:13]'
  - type: text
    content: 'I stand here testifying both to small and great, saying nothing but what '
  - type: note
    content: See ch. 10:43; 24:14
  - type: text
    content: 'the prophets and Moses said would come to pass: '
  '23':
  - type: note
    content: '[Luke 24:26; Heb. 2:10]; See ch. 3:18'
  - type: text
    content: 'that the Christ '
  - type: note
    content: '[John 12:34]'
  - type: text
    content: 'must suffer and that, '
  - type: note
    content: 1 Cor. 15:20, 23; Col. 1:18; Rev. 1:5
  - type: text
    content: 'by being the first '
  - type: note
    content: Rom. 1:4
  - type: text
    content: 'to rise from the dead, '
  - type: note
    content: '[Eph. 2:17]'
  - type: text
    content: 'he would proclaim '
  - type: note
    content: ver. 18; See Luke 2:32
  - type: text
    content: light both to our people and to the Gentiles.”
  '24':
  - type: text
    content: 'And as he was saying these things in his defense, Festus said with a loud voice, “Paul, '
  - type: note
    content: ch. 12:15; [ver. 8; ch. 17:32; 2 Kgs. 9:11; Jer. 29:26; Mark 3:21; John 10:20; 1 Cor. 1:23; 2:14; 4:10]
  - type: text
    content: 'you are out of your mind; your great learning is driving you out of your mind.” '
  '25':
  - type: text
    content: 'But Paul said, “I am not out of my mind, '
  - type: note
    content: See ch. 24:2
  - type: text
    content: 'most excellent Festus, but I am speaking '
  - type: note
    content: '[2 Pet. 1:16]'
  - type: text
    content: 'true and '
  - type: note
    content: '[2 Cor. 5:13]'
  - type: text
    content: 'rational words. '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'the king knows about these things, and to him I speak boldly. For I am persuaded that none of these things has escaped his notice, for this has not been done in a corner. '
  '27':
  - type: text
    content: 'King Agrippa, do you believe the prophets? I know that you believe.” '
  '28':
  - type: text
    content: 'And Agrippa said to Paul, “In a short time would you persuade me to be '
  - type: note
    content: ch. 11:26; 1 Pet. 4:16
  - type: text
    content: a Christian?”
  - type: note
    content: Or In a short time you would persuade me to act like a Christian!
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And Paul said, “Whether short or long, I would to God that not only you but also all who hear me this day '
  - type: note
    content: '[1 Cor. 7:7]'
  - type: text
    content: 'might become such as I am—except for '
  - type: note
    content: See ch. 21:33
  - type: text
    content: these chains.”
  '3':
  - type: text
    content: 'especially because you are familiar with all the '
  - type: note
    content: See ch. 6:14
  - type: text
    content: 'customs and '
  - type: note
    content: See ch. 18:15
  - type: text
    content: controversies of the Jews. Therefore I beg you to listen to me patiently.
  '30':
  - type: text
    content: 'Then the king rose, and '
  - type: note
    content: See ch. 23:24
  - type: text
    content: 'the governor and Bernice and those who were sitting with them. '
  '31':
  - type: text
    content: 'And when they had withdrawn, they said to one another, '
  - type: note
    content: See ch. 23:29
  - type: text
    content: '“This man is doing nothing to deserve death or imprisonment.” '
  '32':
  - type: text
    content: 'And Agrippa said to Festus, '
  - type: note
    content: ch. 28:18
  - type: text
    content: '“This man could have been set '
  - type: note
    content: ch. 25:11; 28:19
  - type: text
    content: 'free if he had not appealed '
  - type: note
    content: See ch. 9:15
  - type: text
    content: to Caesar.”
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Gal. 1:13 ]'
  - type: text
    content: '“My manner of life from my youth, spent from the beginning among '
  - type: note
    content: ch. 24:17; 28:19
  - type: text
    content: 'my own nation and in Jerusalem, is known by all the Jews. '
  '5':
  - type: text
    content: 'They have known for a long time, if they are willing to testify, that '
  - type: note
    content: ch. 22:3
  - type: text
    content: 'according to the strictest '
  - type: note
    content: See ch. 24:5
  - type: text
    content: 'party of our '
  - type: note
    content: James 1:26, 27
  - type: text
    content: 'religion I have lived as '
  - type: note
    content: ch. 23:6
  - type: text
    content: 'a Pharisee. '
  '6':
  - type: text
    content: 'And now I stand here on trial because of my hope in '
  - type: note
    content: See ch. 13:32
  - type: text
    content: 'the promise made by God to our fathers, '
  '7':
  - type: note
    content: '[ch. 2:33; Heb. 10:36; 11:13, 39]'
  - type: text
    content: 'to which '
  - type: note
    content: Matt. 19:28; Luke 22:30; James 1:1; Rev. 21:12; [Ezra 6:17]
  - type: text
    content: 'our twelve tribes hope to '
  - type: note
    content: Phil. 3:11
  - type: text
    content: 'attain, as they earnestly worship night and day. And for this hope '
  - type: note
    content: ver. 2
  - type: text
    content: 'I am accused by Jews, O king! '
  '8':
  - type: text
    content: 'Why is it thought '
  - type: note
    content: '[ch. 17:3; 1 Cor. 15:12]'
  - type: text
    content: incredible by any of you that God raises the dead?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1 Tim. 1:13; [ John 16:2 ]; See ch. 3:17
  - type: text
    content: '“I myself was convinced that I ought to do many things in opposing the name of '
  - type: note
    content: ch. 22:8
  - type: text
    content: 'Jesus of Nazareth. '
