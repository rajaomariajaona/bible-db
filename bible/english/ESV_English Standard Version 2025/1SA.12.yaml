document_id: 1SA.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel’s Farewell Address
  - type: text
    content: 'And Samuel said to all Israel, “Behold, I have obeyed '
  - type: note
    content: ch. 8:5, 19, 20
  - type: text
    content: 'your voice in all that you have said to me '
  - type: note
    content: ch. 10:24; 11:14, 15
  - type: text
    content: 'and have made a king over you. '
  '10':
  - type: note
    content: Judg. 10:10; [Judg. 3:9]
  - type: text
    content: 'And they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, ‘We have sinned, because we have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Judg. 2:13
  - type: text
    content: 'and have served the Baals and the Ashtaroth. But now '
  - type: note
    content: Judg. 10:15
  - type: text
    content: 'deliver us out of the hand of our enemies, that we may serve you.’ '
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' sent '
  - type: note
    content: Judg. 6:14, 32
  - type: text
    content: 'Jerubbaal '
  - type: note
    content: Judg. 4:6, 8, 10
  - type: text
    content: and Barak
  - type: note
    content: Septuagint, Syriac; Hebrew Bedan
  - type: text
    content: ' '
  - type: note
    content: Judg. 11:1
  - type: text
    content: 'and Jephthah and '
  - type: note
    content: See ch. 7:10-13
  - type: text
    content: 'Samuel and delivered you out of the hand of your enemies on every side, and you lived in safety. '
  '12':
  - type: text
    content: 'And when you saw that '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'Nahash the king of the Ammonites came against you, '
  - type: note
    content: ch. 8:5, 19
  - type: text
    content: 'you said to me, ‘No, but a king shall reign over us,’ '
  - type: note
    content: '[ch. 8:7; 10:19; Judg. 8:23]'
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God was your king. '
  '13':
  - type: text
    content: 'And now '
  - type: note
    content: ch. 10:24
  - type: text
    content: 'behold the king whom you have chosen, for whom you have asked; behold, '
  - type: note
    content: ch. 9:16, 17; [Hos. 13:11]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has set a king over you. '
  '14':
  - type: text
    content: 'If you will '
  - type: note
    content: ver. 24; Deut. 6:2; Josh. 24:14
  - type: text
    content: 'fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him and obey his voice and not rebel against the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ', and if both you and the king who reigns over you will follow the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, it will be well. '
  '15':
  - type: text
    content: 'But '
  - type: note
    content: Lev. 26:14, 15; Deut. 28:15; Josh. 24:20
  - type: text
    content: 'if you will not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ', but rebel against the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ', then '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be against you and '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: your king.
  - type: note
    content: Septuagint; Hebrew fathers
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Now therefore '
  - type: note
    content: Ex. 14:13
  - type: text
    content: 'stand still and see this great thing that the '
  - type: text
    content: Lord
  - type: text
    content: ' will do before your eyes. '
  '17':
  - type: note
    content: '[Prov. 26:1]'
  - type: text
    content: 'Is it not wheat harvest today? '
  - type: note
    content: ch. 7:9, 10; [James 5:16-18]
  - type: text
    content: 'I will call upon the '
  - type: text
    content: Lord
  - type: text
    content: ', that he may send thunder and rain. And you shall know and see that '
  - type: note
    content: ch. 8:7
  - type: text
    content: 'your wickedness is great, which you have done in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', in asking for yourselves a king.” '
  '18':
  - type: text
    content: 'So Samuel called upon the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' sent thunder and rain that day, '
  - type: note
    content: Ex. 14:31; [Ezra 10:9]
  - type: text
    content: 'and all the people greatly feared the '
  - type: text
    content: Lord
  - type: text
    content: ' and Samuel.'
  '19':
  - type: text
    content: 'And all the people said to Samuel, '
  - type: note
    content: ver. 23; [Ex. 9:28; 10:17; Jer. 15:1]
  - type: text
    content: '“Pray for your servants to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, that we may not die, for we have added to all our sins this evil, to ask for ourselves a king.” '
  '2':
  - type: text
    content: 'And now, behold, the king '
  - type: note
    content: '[ch. 8:20; Num. 27:17]'
  - type: text
    content: 'walks before you, '
  - type: note
    content: ch. 8:1, 5
  - type: text
    content: 'and I am old and gray; and behold, my sons are with you. I have walked before you from my youth until this day. '
  '20':
  - type: text
    content: 'And Samuel said to the people, “Do not be afraid; you have done all this evil. Yet '
  - type: note
    content: Deut. 11:16
  - type: text
    content: 'do not turn aside from following the '
  - type: text
    content: Lord
  - type: text
    content: ', but serve the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your heart. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'do not turn aside after '
  - type: note
    content: Jer. 16:19; Hab. 2:18; [1 Cor. 8:4]
  - type: text
    content: 'empty things that cannot profit or deliver, for they are empty. '
  '22':
  - type: note
    content: 1 Kgs. 6:13; Ps. 94:14; [1 Kgs. 8:57]
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will not forsake his people, '
  - type: note
    content: Josh. 7:9; Ps. 106:8; Jer. 14:21; Ezek. 20:9, 14, 22
  - type: text
    content: 'for his great name’s sake, because '
  - type: note
    content: Deut. 7:7, 8; 14:2; [1 Pet. 2:9]
  - type: text
    content: 'it has pleased the '
  - type: text
    content: Lord
  - type: text
    content: ' to make you a people for himself. '
  '23':
  - type: text
    content: 'Moreover, as for me, far be it from me that I should sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' by ceasing '
  - type: note
    content: See ver. 19
  - type: text
    content: 'to pray for you, '
  - type: note
    content: 1 Kgs. 8:36; 2 Chr. 6:27; Ps. 27:11; [Prov. 4:11; Jer. 6:16]
  - type: text
    content: 'and I will instruct you in the good and the right way. '
  '24':
  - type: note
    content: ver. 14; [Eccles. 12:13]
  - type: text
    content: 'Only fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him faithfully with all your heart. For consider '
  - type: note
    content: Deut. 10:21; Ps. 126:2, 3
  - type: text
    content: 'what great things he has done for you. '
  '25':
  - type: text
    content: 'But if you still do wickedly, '
  - type: note
    content: Josh. 24:20; [Num. 16:26]
  - type: text
    content: 'you shall be swept away, '
  - type: note
    content: '[Deut. 28:36]'
  - type: text
    content: both you and your king.”
  '3':
  - type: text
    content: 'Here I am; testify against me before the '
  - type: text
    content: Lord
  - type: text
    content: ' and before '
  - type: note
    content: ch. 24:6; 26:9, 11, 16; 2 Sam. 1:14, 16; [ch. 10:1]
  - type: text
    content: 'his anointed. '
  - type: note
    content: '[Ex. 20:17; Num. 16:15]'
  - type: text
    content: Whose ox have I taken? Or whose donkey have I taken? Or whom have I defrauded? Whom have I oppressed? Or from whose hand have I taken a bribe to blind my eyes with it? Testify against me
  - type: note
    content: Septuagint; Hebrew lacks Testify against me
  - type: text
    content: ' and I will restore it to you.” '
  '4':
  - type: text
    content: 'They said, “You have not defrauded us or oppressed us or taken anything from any man’s hand.” '
  '5':
  - type: text
    content: 'And he said to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is witness against you, and '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'his anointed is witness this day, that you have not found anything '
  - type: note
    content: Ex. 21:16; 22:4
  - type: text
    content: in my hand.” And they said, “He is witness.”
  '6':
  - type: text
    content: 'And Samuel said to the people, '
  - type: note
    content: '[Mic. 6:4]'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is witness,'
  - type: note
    content: Septuagint; Hebrew lacks is witness
  - type: text
    content: ' who appointed Moses and Aaron and brought your fathers up out of the land of Egypt. '
  '7':
  - type: text
    content: 'Now therefore stand still that I may plead with you before the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning all the righteous deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he performed for you and for your fathers. '
  '8':
  - type: note
    content: Gen. 46:5, 6
  - type: text
    content: When Jacob went into Egypt, and the Egyptians oppressed them,
  - type: note
    content: Septuagint; Hebrew lacks and the Egyptians oppressed them
  - type: text
    content: ' '
  - type: note
    content: Ex. 2:23
  - type: text
    content: 'then your fathers cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Ex. 3:10; 4:14-16
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Moses and Aaron, '
  - type: note
    content: '[ch. 10:18]'
  - type: text
    content: 'who brought your fathers out of Egypt and made them dwell in this place. '
  '9':
  - type: text
    content: 'But '
  - type: note
    content: Judg. 3:7
  - type: text
    content: 'they forgot the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  - type: note
    content: Judg. 4:2
  - type: text
    content: And he sold them into the hand of Sisera, commander of the army of Hazor,
  - type: note
    content: Septuagint the army of Jabin king of Hazor
  - type: text
    content: ' '
  - type: note
    content: Judg. 10:7; 13:1; [Judg. 3:31]
  - type: text
    content: 'and into the hand of the Philistines, '
  - type: note
    content: Judg. 3:12
  - type: text
    content: 'and into the hand of the king of Moab. And they fought against them. '
