document_id: DEU.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wilderness Years
  - type: text
    content: '“Then we turned and journeyed into the wilderness in the direction of the Red Sea, '
  - type: note
    content: ch. 1:40; Num. 14:25
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' told me. And for many days we traveled around Mount Seir. '
  '10':
  - type: text
    content: (
  - type: note
    content: Gen. 14:5
  - type: text
    content: 'The Emim formerly lived there, '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'a people great and many, and tall '
  - type: note
    content: See Num. 13:22
  - type: text
    content: 'as the Anakim. '
  '11':
  - type: text
    content: 'Like the Anakim they are also counted as '
  - type: note
    content: See Gen. 14:5
  - type: text
    content: 'Rephaim, but the Moabites call them Emim. '
  '12':
  - type: note
    content: ver. 22; Gen. 14:6; See Gen. 36:20-30
  - type: text
    content: 'The Horites also lived in Seir formerly, but the people of Esau dispossessed them and destroyed them from before them and settled in their place, '
  - type: note
    content: Num. 21:24, 31, 35
  - type: text
    content: 'as Israel did to the land of their possession, which the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to them.) '
  '13':
  - type: text
    content: '‘Now rise up and go over '
  - type: note
    content: '[Num. 21:12]'
  - type: text
    content: 'the brook Zered.’ So we went over '
  - type: note
    content: '[Num. 21:12]'
  - type: text
    content: 'the brook Zered. '
  '14':
  - type: text
    content: 'And the time from our leaving '
  - type: note
    content: See ch. 1:2, 19
  - type: text
    content: 'Kadesh-barnea until we crossed '
  - type: note
    content: '[Num. 21:12]'
  - type: text
    content: 'the brook Zered was thirty-eight years, '
  - type: note
    content: Num. 14:33, 35; 26:64; Ps. 78:33; 95:11; 106:26; Ezek. 20:15; [1 Cor. 10:5; Heb. 3:17]; See ch. 1:35
  - type: text
    content: 'until the entire generation, that is, the men of war, had perished from the camp, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had sworn to them. '
  '15':
  - type: text
    content: 'For indeed the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was against them, to destroy them from the camp, until they had perished.'
  '16':
  - type: text
    content: '“So as soon as all the men of war had perished and were dead from among the people, '
  '17':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '18':
  - type: text
    content: '‘Today you are to cross the border of Moab at Ar. '
  '19':
  - type: text
    content: 'And when you approach the territory of the people of Ammon, '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'do not harass them or contend with them, for I will not give you any of the land of the people of Ammon as a possession, because I have given it to '
  - type: note
    content: Gen. 19:36, 38
  - type: text
    content: 'the sons of Lot for a possession.’ '
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '20':
  - type: text
    content: '(It is also counted as a land of '
  - type: note
    content: See Gen. 14:5
  - type: text
    content: 'Rephaim. Rephaim formerly lived there—but the Ammonites call them Zamzummim— '
  '21':
  - type: note
    content: '[ver. 10]'
  - type: text
    content: 'a people great and many, and tall as the Anakim; but the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed them before the Ammonites,'
  - type: note
    content: Hebrew them
  - type: text
    content: ' and they dispossessed them and settled in their place, '
  '22':
  - type: text
    content: 'as he did for the people of Esau, who live in Seir, when he destroyed '
  - type: note
    content: Gen. 14:6; See Gen. 36:20-30
  - type: text
    content: 'the Horites before them and they dispossessed them and settled in their place even to this day. '
  '23':
  - type: text
    content: 'As for '
  - type: note
    content: Josh. 13:3, 4
  - type: text
    content: 'the Avvim, who lived in villages as far as '
  - type: note
    content: Gen. 10:19; Jer. 25:20
  - type: text
    content: 'Gaza, '
  - type: note
    content: See Gen. 10:14
  - type: text
    content: 'the Caphtorim, who came from Caphtor, destroyed them and settled in their place.) '
  '24':
  - type: text
    content: '‘Rise up, set out on your journey and '
  - type: note
    content: Num. 21:13, 14; Judg. 11:18, 21
  - type: text
    content: 'go over the Valley of the Arnon. Behold, I have given into your hand Sihon the Amorite, king of '
  - type: note
    content: Num. 21:27, 28, 30
  - type: text
    content: 'Heshbon, and his land. Begin to take possession, and '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'contend with him in battle. '
  '25':
  - type: text
    content: 'This day I will begin to put '
  - type: note
    content: ch. 11:25; 28:10; See Ex. 15:14-16; Josh. 2:9-11
  - type: text
    content: the dread and fear of you on the peoples who are under the whole heaven, who shall hear the report of you and shall tremble and be in anguish because of you.’
  - type: heading
    content: The Defeat of King Sihon
  '26':
  - type: text
    content: '“So I sent messengers from the wilderness of '
  - type: note
    content: Josh. 13:18; 1 Chr. 6:79
  - type: text
    content: 'Kedemoth to Sihon the king of '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'Heshbon, '
  - type: note
    content: '[ch. 20:10]'
  - type: text
    content: 'with words of peace, saying, '
  '27':
  - type: note
    content: Num. 21:21, 22; Judg. 11:19
  - type: text
    content: '‘Let me pass through your land. I will go only by the road; I will turn aside neither to the right nor to the left. '
  '28':
  - type: note
    content: ver. 6; Num. 20:19
  - type: text
    content: 'You shall sell me food for money, that I may eat, and give me water for money, that I may drink. Only let me pass through on foot, '
  '29':
  - type: note
    content: ver. 5, 9; [ch. 23:3, 4; Num. 20:18; Judg. 11:17, 18]
  - type: text
    content: 'as the sons of Esau who live in Seir and the Moabites who live in Ar did for me, until I go over the Jordan into the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is giving to us.’ '
  '3':
  - type: text
    content: '‘You have been traveling around this mountain country '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'long enough. Turn northward '
  '30':
  - type: text
    content: 'But '
  - type: note
    content: Num. 21:23
  - type: text
    content: 'Sihon the king of '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'Heshbon would not let us pass by him, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: See Ex. 4:21
  - type: text
    content: 'hardened his spirit and made his heart obstinate, that he might give him into your hand, as he is this day. '
  '31':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Behold, I have begun to give Sihon and his land over to you. Begin to take possession, that you may occupy his land.’ '
  '32':
  - type: text
    content: 'Then '
  - type: note
    content: See Num. 21:23-30
  - type: text
    content: 'Sihon came out against us, he and all his people, to battle at Jahaz. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 7:2]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' our God gave him over to us, and '
  - type: note
    content: ch. 29:7
  - type: text
    content: 'we defeated him and his sons and all his people. '
  '34':
  - type: text
    content: And we captured all his cities at that time and devoted to destruction
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  - type: text
    content: ' every '
  - type: note
    content: ch. 3:6
  - type: text
    content: 'city, men, women, and children. We left no survivors. '
  '35':
  - type: text
    content: 'Only the livestock we took as spoil for ourselves, with the plunder of the cities that we captured. '
  '36':
  - type: note
    content: ch. 3:12; 4:48; Josh. 12:2; 13:9, 16; 2 Kgs. 10:33
  - type: text
    content: 'From Aroer, which is on the edge of the Valley of the Arnon, and from '
  - type: note
    content: Josh. 13:9, 16; 2 Sam. 24:5
  - type: text
    content: 'the city that is in the valley, as far as Gilead, there was not a city too high for us. '
  - type: note
    content: Ps. 44:3
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' our God gave all into our hands. '
  '37':
  - type: text
    content: 'Only to the land of the sons of Ammon you did not draw near, that is, to all the banks of the river '
  - type: note
    content: ch. 3:16; Gen. 32:22; Num. 21:24; Josh. 12:2; Judg. 11:22
  - type: text
    content: 'Jabbok and the cities of the hill country, whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' our God had forbidden us.'
  '4':
  - type: text
    content: 'and command the people, “You are about to pass through the territory of '
  - type: note
    content: ch. 23:7; Amos 1:11; Obad. 10, 12
  - type: text
    content: 'your brothers, the people of Esau, '
  - type: note
    content: See Gen. 32:3
  - type: text
    content: 'who live in Seir; and '
  - type: note
    content: See Num. 20:18-21
  - type: text
    content: 'they will be afraid of you. So be very careful. '
  '5':
  - type: text
    content: 'Do not contend with them, for I will not give you any of their land, no, not so much as for the sole of the foot to tread on, because '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'I have given Mount Seir to Esau as a possession. '
  '6':
  - type: note
    content: ver. 28
  - type: text
    content: 'You shall purchase food from them with money, that you may eat, and you shall also buy water from them with money, that you may drink. '
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you in all the work of your hands. '
  - type: note
    content: '[Job 23:10]'
  - type: text
    content: 'He knows your going through this great wilderness. '
  - type: note
    content: See ch. 8:2-4
  - type: text
    content: 'These forty years the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has been with you. You have lacked nothing.”’ '
  '8':
  - type: text
    content: 'So '
  - type: note
    content: Judg. 11:18
  - type: text
    content: 'we went on, away from our brothers, the people of Esau, who live in Seir, away from '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'the Arabah road from '
  - type: note
    content: 1 Kgs. 9:26; [2 Kgs. 14:22; 16:6; 2 Chr. 26:2]
  - type: text
    content: 'Elath and '
  - type: note
    content: See Num. 33:35
  - type: text
    content: Ezion-geber.
  - type: text
    content: '“And we turned and went in the direction of the wilderness of Moab. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: ver. 19, 29
  - type: text
    content: '‘Do not harass Moab or contend with them in battle, for I will not give you any of their land for a possession, because I have given '
  - type: note
    content: ver. 18; Num. 21:15; Isa. 15:1
  - type: text
    content: 'Ar to '
  - type: note
    content: ver. 19; Gen. 19:36, 37
  - type: text
    content: 'the people of Lot for a possession.’ '
