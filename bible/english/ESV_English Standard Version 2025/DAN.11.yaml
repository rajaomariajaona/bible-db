document_id: DAN.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Kings of the South and the North
  - type: text
    content: '“And as for me, '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'in the first year of '
  - type: note
    content: ch. 9:1
  - type: text
    content: Darius the Mede, I stood up to confirm and strengthen him.
  '10':
  - type: text
    content: '“His sons shall wage war and assemble a multitude of great forces, which shall keep coming '
  - type: note
    content: ver. 26, 40; Isa. 8:8
  - type: text
    content: 'and overflow and pass through, and again shall carry the war as far as his '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'fortress. '
  '11':
  - type: text
    content: 'Then the king of the south, '
  - type: note
    content: ch. 8:7
  - type: text
    content: 'moved with rage, shall come out and fight against the king of the north. '
  - type: note
    content: ver. 13
  - type: text
    content: 'And he shall raise a great multitude, but it shall be given into his hand. '
  '12':
  - type: text
    content: 'And when the multitude is taken away, his heart shall be exalted, and he shall cast down tens of thousands, but he shall not prevail. '
  '13':
  - type: text
    content: 'For the king of the north shall again '
  - type: note
    content: ver. 11
  - type: text
    content: 'raise a multitude, greater than the first. And '
  - type: note
    content: '[ch. 4:16]'
  - type: text
    content: after some years
  - type: note
    content: Hebrew at the end of the times
  - type: text
    content: ' he shall come on with a great army and abundant supplies.'
  '14':
  - type: text
    content: '“In those times many shall rise against the king of the south, and the violent among your own people shall lift themselves up in order to fulfill the vision, but '
  - type: note
    content: ver. 19, 33, 34
  - type: text
    content: 'they shall fail. '
  '15':
  - type: text
    content: 'Then the king of the north shall come and '
  - type: note
    content: See Ezek. 4:2
  - type: text
    content: 'throw up siegeworks and take a well-fortified city. And the forces of the south shall not stand, or even his best troops, for there shall be no strength to stand. '
  '16':
  - type: text
    content: 'But he who comes against him shall '
  - type: note
    content: ver. 3, 36
  - type: text
    content: 'do as he wills, and '
  - type: note
    content: '[Josh. 10:8]'
  - type: text
    content: 'none shall stand before him. And he shall stand in '
  - type: note
    content: ver. 41; See ch. 8:9
  - type: text
    content: 'the glorious land, with destruction in his hand. '
  '17':
  - type: text
    content: 'He shall '
  - type: note
    content: See Jer. 42:15
  - type: text
    content: set his face to come with the strength of his whole kingdom, and he shall bring terms of an agreement and perform them. He shall give him the daughter of women to destroy the kingdom,
  - type: note
    content: Hebrew her, or it
  - type: text
    content: ' but it shall not stand or be to his advantage. '
  '18':
  - type: text
    content: Afterward he shall turn his face to the coastlands and shall capture many of them, but a commander shall put an end to his insolence. Indeed,
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' he '
  - type: note
    content: '[Hos. 12:14]'
  - type: text
    content: 'shall turn his insolence back upon him. '
  '19':
  - type: text
    content: 'Then he shall turn his face back toward the '
  - type: note
    content: '[ver. 7, 10, 38, 39]'
  - type: text
    content: 'fortresses of his own land, but he shall '
  - type: note
    content: Jer. 46:6
  - type: text
    content: 'stumble and fall, '
  - type: note
    content: Job 20:8; Ps. 37:36; Ezek. 26:21
  - type: text
    content: and shall not be found.
  '2':
  - type: text
    content: '“And now I will show you '
  - type: note
    content: ch. 10:21
  - type: text
    content: 'the truth. Behold, three more kings shall arise in Persia, and a fourth shall be far richer than all of them. And when he has become strong through his riches, he shall stir up all against the kingdom of Greece. '
  '20':
  - type: text
    content: '“Then shall arise in his place one who shall send an '
  - type: note
    content: '[Isa. 60:17; Zech. 9:8]'
  - type: text
    content: 'exactor of tribute for the glory of the kingdom. But within a few days he shall be broken, neither in anger nor in battle. '
  '21':
  - type: text
    content: 'In his place shall arise a contemptible person to whom royal majesty has not been given. '
  - type: note
    content: ver. 24
  - type: text
    content: 'He shall come in without warning and obtain the kingdom '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'by flatteries. '
  '22':
  - type: text
    content: 'Armies shall be '
  - type: note
    content: '[ver. 10; Jer. 46:7]'
  - type: text
    content: 'utterly swept away before him and broken, even the prince of the covenant. '
  '23':
  - type: text
    content: 'And from the time that an alliance is made with him he shall act deceitfully, and he shall become strong with a small people. '
  '24':
  - type: note
    content: ver. 21
  - type: text
    content: 'Without warning he shall come into '
  - type: note
    content: '[Gen. 27:28, 39]'
  - type: text
    content: the richest parts
  - type: note
    content: Or among the richest men
  - type: text
    content: ' of the province, and he shall do what neither his fathers nor his fathers’ fathers have done, scattering among them plunder, spoil, and goods. He shall devise plans against strongholds, but only for a time. '
  '25':
  - type: text
    content: 'And he shall stir up his power and his heart against '
  - type: note
    content: '[ch. 8:9]'
  - type: text
    content: 'the king of the south with a great army. And the king of the south shall wage war with an exceedingly great and mighty army, but he shall not stand, for plots shall be devised against him. '
  '26':
  - type: text
    content: 'Even those who eat his food shall break him. His army shall be '
  - type: note
    content: ver. 10, 40
  - type: text
    content: 'swept away, and many shall fall down slain. '
  '27':
  - type: text
    content: 'And as for the two kings, their hearts shall be bent on doing evil. They shall speak lies at the same table, but to no avail, for '
  - type: note
    content: '[ver. 35]'
  - type: text
    content: 'the end is yet to be at the time appointed. '
  '28':
  - type: text
    content: And he shall return to his land with great wealth, but his heart shall be set against the holy covenant. And he shall work his will and return to his own land.
  '29':
  - type: text
    content: '“At the time appointed he shall return and come into the south, but it shall not be this time as it was before. '
  '3':
  - type: text
    content: 'Then '
  - type: note
    content: '[ch. 7:6; 8:5, 21]'
  - type: text
    content: 'a mighty king shall arise, who shall rule with great dominion and '
  - type: note
    content: ver. 16, 36; [ch. 8:4]
  - type: text
    content: 'do as he wills. '
  '30':
  - type: text
    content: 'For ships of '
  - type: note
    content: Gen. 10:4; Num. 24:24
  - type: text
    content: 'Kittim shall come against him, and he shall be afraid and withdraw, and shall turn back and '
  - type: note
    content: See ver. 28
  - type: text
    content: 'be enraged and '
  - type: note
    content: See ver. 28
  - type: text
    content: 'take action against the holy covenant. He shall turn back and pay attention to those who forsake the holy covenant. '
  '31':
  - type: text
    content: 'Forces from him shall appear and '
  - type: note
    content: '[ch. 12:11]'
  - type: text
    content: 'profane the temple and fortress, and shall take away the regular burnt offering. And '
  - type: note
    content: Matt. 24:15; Mark 13:14; [ch. 8:13; 12:11]
  - type: text
    content: 'they shall set up the abomination that makes desolate. '
  '32':
  - type: text
    content: 'He shall seduce with flattery those who violate the covenant, but the people who know their God shall stand firm and take action. '
  '33':
  - type: note
    content: ch. 12:3, 10
  - type: text
    content: 'And the wise among the people shall make many understand, though for some days they shall stumble by sword and flame, by captivity and plunder. '
  '34':
  - type: text
    content: 'When they stumble, they shall receive a little help. And many shall join themselves to them with flattery, '
  '35':
  - type: text
    content: 'and some of the wise shall stumble, so that they may be refined, '
  - type: note
    content: '[Mal. 3:3, 4]'
  - type: text
    content: 'purified, and '
  - type: note
    content: '[Rev. 7:14]'
  - type: text
    content: 'made white, until '
  - type: note
    content: '[ver. 27, 40]'
  - type: text
    content: 'the time of the end, '
  - type: note
    content: '[ver. 27, 40]'
  - type: text
    content: for it still awaits the appointed time.
  '36':
  - type: text
    content: '“And the king shall '
  - type: note
    content: ver. 3, 16
  - type: text
    content: 'do as he wills. '
  - type: note
    content: '[ch. 7:25; 2 Thess. 2:4]'
  - type: text
    content: 'He shall exalt himself and magnify himself above every god, '
  - type: note
    content: '[ch. 7:25; Rev. 13:5, 6]'
  - type: text
    content: 'and shall speak astonishing things against '
  - type: note
    content: Deut. 10:17
  - type: text
    content: 'the God of gods. '
  - type: note
    content: '[ch. 8:12]'
  - type: text
    content: 'He shall prosper '
  - type: note
    content: '[Isa. 10:25]; ch. 9:27'
  - type: text
    content: 'till the indignation is accomplished; for what is decreed shall be done. '
  '37':
  - type: text
    content: 'He shall pay no attention to the gods of his fathers, or to the one beloved by women. He shall not pay attention to any other god, for '
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'he shall magnify himself above all. '
  '38':
  - type: text
    content: 'He shall honor the god of fortresses instead of these. A god whom his fathers did not know he shall honor '
  - type: note
    content: '[Joel 3:5]'
  - type: text
    content: 'with gold and silver, with precious stones and costly gifts. '
  '39':
  - type: text
    content: 'He shall deal with the strongest fortresses with the help of a foreign god. Those who acknowledge him he shall load with honor. He shall make them rulers over many and '
  - type: note
    content: '[Lam. 5:2, 6]'
  - type: text
    content: shall divide the land for a price.
  - type: note
    content: Or land as payment
  '4':
  - type: text
    content: 'And as soon as he has arisen, '
  - type: note
    content: '[ch. 8:8, 22]'
  - type: text
    content: 'his kingdom shall be broken and divided '
  - type: note
    content: '[ch. 8:8, 22]'
  - type: text
    content: 'toward the '
  - type: note
    content: See ch. 7:2
  - type: text
    content: 'four winds of heaven, but '
  - type: note
    content: Ps. 109:13
  - type: text
    content: not to his posterity, nor according to the authority with which he ruled, for his kingdom shall be plucked up and go to others besides these.
  '40':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 27, 35 ]'
  - type: text
    content: “At the time of the end, the king of the south shall attack
  - type: note
    content: Hebrew thrust at
  - type: text
    content: ' him, but the king of the north shall rush upon him '
  - type: note
    content: Zech. 9:14
  - type: text
    content: 'like a whirlwind, with chariots and horsemen, and with many ships. And he shall come into countries and '
  - type: note
    content: ver. 10, 26
  - type: text
    content: 'shall overflow and pass through. '
  '41':
  - type: text
    content: 'He shall come into '
  - type: note
    content: ver. 16; See ch. 8:9
  - type: text
    content: 'the glorious land. And tens of thousands shall fall, but these shall be delivered out of his hand: '
  - type: note
    content: '[Isa. 11:14]'
  - type: text
    content: 'Edom and '
  - type: note
    content: '[Isa. 11:14]'
  - type: text
    content: 'Moab and the main part of the '
  - type: note
    content: '[Isa. 11:14]'
  - type: text
    content: 'Ammonites. '
  '42':
  - type: text
    content: 'He shall stretch out his hand against the countries, and the land of Egypt shall not escape. '
  '43':
  - type: text
    content: 'He shall become ruler of the treasures of gold and of silver, and all the precious things of Egypt, and the '
  - type: note
    content: '[2 Chr. 12:3]'
  - type: text
    content: 'Libyans and the '
  - type: note
    content: 2 Chr. 12:3; Ezek. 30:4, 5; Nah. 3:9
  - type: text
    content: 'Cushites shall follow in his train. '
  '44':
  - type: text
    content: 'But news from the east and the north shall alarm him, and he shall go out with great fury to destroy and devote many to destruction. '
  '45':
  - type: text
    content: And he shall pitch his palatial tents between the sea and the glorious holy mountain. Yet he shall come to his end, with none to help him.
  '5':
  - type: text
    content: '“Then the king of the south shall be strong, but one of his princes shall be stronger than he '
  - type: note
    content: '[ch. 7:6]'
  - type: text
    content: 'and shall rule, and his authority shall be a great authority. '
  '6':
  - type: text
    content: 'After some years '
  - type: note
    content: '[ver. 23]'
  - type: text
    content: they shall make an alliance, and the daughter of the king of the south shall come to the king of the north to make an agreement. But she shall not retain the strength of her arm, and he and his arm shall not endure, but she shall be given up, and her attendants, he who fathered her, and he who supported
  - type: note
    content: Or obtained
  - type: text
    content: ' her in those times.'
  '7':
  - type: text
    content: '“And from a branch from her roots one shall arise in his place. He shall come against the army and enter the '
  - type: note
    content: '[ver. 10, 19, 38, 39]'
  - type: text
    content: 'fortress of the king of the north, and he shall deal with them and shall prevail. '
  '8':
  - type: text
    content: 'He shall also carry off to Egypt their gods with their metal images and their precious '
  - type: note
    content: '[ver. 43]'
  - type: text
    content: 'vessels of silver and gold, and for some years he shall refrain from attacking the king of the north. '
  '9':
  - type: text
    content: Then the latter shall come into the realm of the king of the south but shall return to his own land.
