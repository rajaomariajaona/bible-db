document_id: 1KI.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy Against Jeroboam
  - type: text
    content: 'At that time Abijah the son of Jeroboam fell sick. '
  '10':
  - type: text
    content: 'therefore behold, I will bring harm upon the house of Jeroboam and '
  - type: note
    content: ch. 21:21; 2 Kgs. 9:8
  - type: text
    content: 'will cut off from Jeroboam every male, '
  - type: note
    content: Deut. 32:36; 2 Kgs. 14:26
  - type: text
    content: 'both bond and free in Israel, and '
  - type: note
    content: ch. 16:3
  - type: text
    content: 'will burn up the house of Jeroboam, as a man burns up dung until it is all gone. '
  '11':
  - type: note
    content: ch. 16:4; 21:24
  - type: text
    content: 'Anyone belonging to Jeroboam who dies in the city the dogs shall eat, and anyone who dies in the open country the birds of the heavens shall eat, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken it.”’ '
  '12':
  - type: text
    content: 'Arise therefore, go to your house. '
  - type: note
    content: ver. 17
  - type: text
    content: 'When your feet enter the city, the child shall die. '
  '13':
  - type: text
    content: 'And all Israel shall mourn for him and bury him, for he only of Jeroboam shall come to the grave, because in him '
  - type: note
    content: 2 Chr. 12:12; 19:3
  - type: text
    content: 'there is found something pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, in the house of Jeroboam. '
  '14':
  - type: note
    content: See ch. 15:27-29
  - type: text
    content: 'Moreover, the '
  - type: text
    content: Lord
  - type: text
    content: ' will raise up for himself a king over Israel who shall cut off the house of Jeroboam today. And henceforth, '
  '15':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike Israel as a reed is shaken in the water, and '
  - type: note
    content: Deut. 29:28; Ps. 52:5; Prov. 2:22
  - type: text
    content: 'root up Israel out of '
  - type: note
    content: Josh. 23:15, 16
  - type: text
    content: 'this good land that he gave to their fathers and scatter them '
  - type: note
    content: '[2 Kgs. 15:29]'
  - type: text
    content: beyond the Euphrates,
  - type: note
    content: Hebrew the River
  - type: text
    content: ' because they have made their '
  - type: note
    content: Ex. 34:13; Deut. 12:3
  - type: text
    content: 'Asherim, provoking the '
  - type: text
    content: Lord
  - type: text
    content: ' to anger. '
  '16':
  - type: text
    content: And he will give Israel up because of the sins of Jeroboam, which he sinned and made Israel to sin.”
  '17':
  - type: text
    content: 'Then Jeroboam’s wife arose and departed and came to '
  - type: note
    content: ch. 15:21, 33; 16:6, 8, 15, 23
  - type: text
    content: 'Tirzah. And '
  - type: note
    content: ver. 12
  - type: text
    content: 'as she came to the threshold of the house, the child died. '
  '18':
  - type: text
    content: 'And all Israel buried him and mourned for him, '
  - type: note
    content: ver. 13
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he spoke by his servant Ahijah the prophet.'
  - type: heading
    content: The Death of Jeroboam
  '19':
  - type: text
    content: 'Now the rest of the acts of Jeroboam, '
  - type: note
    content: See 2 Chr. 13:2-20
  - type: text
    content: 'how he warred and how he reigned, behold, they are written in the Book of the Chronicles of the Kings of Israel. '
  '2':
  - type: text
    content: 'And Jeroboam said to his wife, “Arise, and disguise yourself, that it not be known that you are the wife of Jeroboam, and go to '
  - type: note
    content: See Josh. 18:1
  - type: text
    content: 'Shiloh. Behold, Ahijah the prophet is there, '
  - type: note
    content: See ch. 11:29-31
  - type: text
    content: 'who said of me that I should be king over this people. '
  '20':
  - type: text
    content: And the time that Jeroboam reigned was twenty-two years. And he slept with his fathers, and Nadab his son reigned in his place.
  - type: heading
    content: Rehoboam Reigns in Judah
  '21':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 12:13
  - type: text
    content: 'Now Rehoboam the son of Solomon reigned in Judah. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, '
  - type: note
    content: ch. 11:32, 36
  - type: text
    content: 'the city that the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen out of all the tribes of Israel, to put his name there. '
  - type: note
    content: 2 Chr. 12:13
  - type: text
    content: 'His mother’s name was Naamah the Ammonite. '
  '22':
  - type: note
    content: '[2 Chr. 12:1, 14]'
  - type: text
    content: 'And Judah did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and they '
  - type: note
    content: See Num. 25:11
  - type: text
    content: 'provoked him to jealousy with their sins that they committed, more than all that their fathers had done. '
  '23':
  - type: text
    content: 'For they also built for themselves '
  - type: note
    content: See Deut. 12:2
  - type: text
    content: 'high places '
  - type: note
    content: See Ex. 23:24
  - type: text
    content: 'and pillars and '
  - type: note
    content: ver. 15
  - type: text
    content: 'Asherim on every high hill and '
  - type: note
    content: Deut. 12:2; 2 Kgs. 16:4; Isa. 57:5; Jer. 2:20
  - type: text
    content: 'under every green tree, '
  '24':
  - type: text
    content: 'and there were also '
  - type: note
    content: See Deut. 23:17
  - type: text
    content: 'male cult prostitutes in the land. They did according to all the abominations of the nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before the people of Israel.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 12:2, 9-11
  - type: text
    content: 'In the fifth year of King Rehoboam, Shishak king of Egypt came up against Jerusalem. '
  '26':
  - type: text
    content: 'He took away the treasures of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the treasures of the king’s house. '
  - type: note
    content: '[ch. 15:18]'
  - type: text
    content: 'He took away everything. He also took away all the shields of gold '
  - type: note
    content: ch. 10:17
  - type: text
    content: 'that Solomon had made, '
  '27':
  - type: text
    content: 'and King Rehoboam made in their place shields of bronze, and committed them to the hands of the officers of the guard, who kept the door of the king’s house. '
  '28':
  - type: text
    content: 'And as often as the king went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the guard carried them and brought them back to the guardroom.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-31, see 2 Chr. 12:15, 16
  - type: text
    content: 'Now the rest of the acts of Rehoboam and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '3':
  - type: note
    content: '[1 Sam. 9:7, 8]'
  - type: text
    content: Take with you ten loaves, some cakes, and a jar of honey, and go to him. He will tell you what shall happen to the child.”
  '30':
  - type: note
    content: ch. 15:6; [ch. 12:21-24]
  - type: text
    content: 'And there was war between Rehoboam and Jeroboam continually. '
  '31':
  - type: text
    content: 'And Rehoboam slept with his fathers and was buried with his fathers in the city of David. '
  - type: note
    content: 2 Chr. 12:13
  - type: text
    content: 'His mother’s name was Naamah the Ammonite. And '
  - type: note
    content: '[Matt. 1:7]'
  - type: text
    content: Abijam his son reigned in his place.
  '4':
  - type: text
    content: 'Jeroboam’s wife did so. She arose and went to '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Shiloh and came to the house of '
  - type: note
    content: ch. 11:29
  - type: text
    content: 'Ahijah. Now '
  - type: note
    content: ch. 11:29
  - type: text
    content: 'Ahijah could not see, for his eyes were dim because of his age. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: Ahijah, “Behold, the wife of Jeroboam is coming to inquire of you concerning her son, for he is sick. Thus and thus shall you say to her.”
  - type: text
    content: 'When she came, she pretended to be another woman. '
  '6':
  - type: text
    content: 'But when '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'Ahijah heard the sound of her feet, as she came in at the door, he said, “Come in, wife of Jeroboam. Why do you pretend to be another? For I am charged with unbearable news for you. '
  '7':
  - type: text
    content: 'Go, tell Jeroboam, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: '
  - type: note
    content: ch. 16:2; [2 Sam. 12:7, 8]
  - type: text
    content: '“Because I exalted you from among the people and made you leader over my people Israel '
  '8':
  - type: text
    content: 'and '
  - type: note
    content: ch. 11:31
  - type: text
    content: 'tore the kingdom away from the house of David and gave it to you, and yet you have not been '
  - type: note
    content: ch. 11:33, 38; 15:5; [ch. 9:4]
  - type: text
    content: 'like my servant David, who kept my commandments and followed me with all his heart, doing only that which was right in my eyes, '
  '9':
  - type: text
    content: 'but you have done evil above all who were before you and have gone and '
  - type: note
    content: ch. 12:28; 2 Chr. 11:15
  - type: text
    content: 'made for yourself other gods and '
  - type: note
    content: '[Ex. 34:17]'
  - type: text
    content: 'metal images, provoking me to anger, and '
  - type: note
    content: Ezek. 23:35; [Neh. 9:26; Ps. 50:17]
  - type: text
    content: 'have cast me behind your back, '
