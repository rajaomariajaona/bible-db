      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 17:2
      marker-yv: yv-n
    - type: text
      text: 'drew up his line of battle against him with 800,000 chosen mighty warriors. '
  '4':
  - type: usfm
