        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:4
      marker-yv: yv-n
    - type: text
      text: 'every morning and every evening burnt offerings and incense of sweet spices, set out '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 24:5-9
      marker-yv: yv-n
    - type: text
