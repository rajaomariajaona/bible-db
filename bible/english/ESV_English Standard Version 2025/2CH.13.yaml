      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 5:39
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'do not fight against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers, for you cannot succeed.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeroboam had sent '
    - type: usfm
      marker: x
