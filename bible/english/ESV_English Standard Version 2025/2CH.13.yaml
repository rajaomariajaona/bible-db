    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soft of heart
      marker-yv: yv-n
    - type: text
      text: ' and could not withstand them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And now you think to withstand the kingdom of the '
    - type: usfm
      marker: nd
      children:
