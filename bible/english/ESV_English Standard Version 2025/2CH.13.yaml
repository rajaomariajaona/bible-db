        children:
        - type: text
          text: 1 Sam. 25:38
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck him down, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 14:20
      marker-yv: yv-n
    - type: text
      text: 'and he died. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abijah grew mighty. And he took fourteen wives and had twenty-two sons and sixteen daughters. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
