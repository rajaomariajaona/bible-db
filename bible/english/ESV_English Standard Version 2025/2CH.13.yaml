        children:
        - type: text
          text: Josh. 24:33
      marker-yv: yv-n
    - type: text
      text: 'the hill country of Ephraim and said, “Hear me, O Jeroboam and all Israel! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ought you not to know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 7:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
