document_id: 2CH.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 15:1, 2
  - type: text
    content: 'In the eighteenth year of King Jeroboam, '
  - type: note
    content: '[See ch. 12:16 above]'
  - type: text
    content: 'Abijah began to reign over Judah. '
  '10':
  - type: text
    content: 'But as for us, the '
  - type: text
    content: Lord
  - type: text
    content: ' is our God, and we have not forsaken him. We have priests ministering to the '
  - type: text
    content: Lord
  - type: text
    content: ' who are sons of Aaron, and Levites for their service. '
  '11':
  - type: text
    content: 'They offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'every morning and every evening burnt offerings and incense of sweet spices, set out '
  - type: note
    content: See Lev. 24:5-9
  - type: text
    content: 'the showbread on the table of pure gold, '
  - type: note
    content: See Ex. 25:31-39
  - type: text
    content: 'and care for the golden lampstand that its lamps may '
  - type: note
    content: Ex. 27:20, 21; Lev. 24:2-4
  - type: text
    content: 'burn every evening. For we '
  - type: note
    content: Num. 1:53
  - type: text
    content: 'keep the charge of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, but you have forsaken him. '
  '12':
  - type: text
    content: 'Behold, God is with us at our head, and his priests '
  - type: note
    content: Num. 10:9
  - type: text
    content: 'with their battle trumpets to sound the call to battle against you. O sons of Israel, '
  - type: note
    content: '[Acts 5:39]'
  - type: text
    content: 'do not fight against the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, for you cannot succeed.”'
  '13':
  - type: text
    content: 'Jeroboam had sent '
  - type: note
    content: '[Josh. 8:9]'
  - type: text
    content: an ambush around to come upon them from behind. Thus his troops
  - type: note
    content: Hebrew they
  - type: text
    content: ' were in front of Judah, and the ambush was behind them. '
  '14':
  - type: text
    content: 'And when Judah looked, behold, the battle was in front of and behind them. '
  - type: note
    content: ch. 14:11
  - type: text
    content: 'And they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the priests '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'blew the trumpets. '
  '15':
  - type: text
    content: 'Then the men of Judah raised the battle shout. And when the men of Judah shouted, '
  - type: note
    content: ch. 14:12
  - type: text
    content: 'God defeated Jeroboam and all Israel before Abijah and Judah. '
  '16':
  - type: text
    content: 'The men of Israel fled before Judah, '
  - type: note
    content: ch. 16:8
  - type: text
    content: 'and God gave them into their hand. '
  '17':
  - type: text
    content: 'Abijah and his people struck them with great force, so there fell slain of Israel 500,000 chosen men. '
  '18':
  - type: text
    content: 'Thus the men of Israel were subdued at that time, and the men of Judah prevailed, '
  - type: note
    content: '[ch. 14:11; 16:7, 8]'
  - type: text
    content: 'because they relied on the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers. '
  '19':
  - type: text
    content: 'And Abijah pursued Jeroboam '
  - type: note
    content: '[ch. 15:8; 17:2]'
  - type: text
    content: 'and took cities from him, Bethel with its villages and Jeshanah with its villages and '
  - type: note
    content: '[Josh. 15:9]'
  - type: text
    content: Ephron
  - type: note
    content: Or Ephrain
  - type: text
    content: ' with its villages. '
  '2':
  - type: text
    content: 'He reigned for three years in Jerusalem. His mother’s name was '
  - type: note
    content: '[ch. 11:20]'
  - type: text
    content: Micaiah
  - type: note
    content: Spelled Maacah in 1 Kings 15:2
  - type: text
    content: ' the daughter of Uriel of Gibeah.'
  - type: note
    content: 1 Kgs. 15:7
  - type: text
    content: 'Now there was war between Abijah and Jeroboam. '
  '20':
  - type: text
    content: 'Jeroboam did not recover his power in the days of Abijah. '
  - type: note
    content: 1 Sam. 25:38
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' struck him down, '
  - type: note
    content: 1 Kgs. 14:20
  - type: text
    content: 'and he died. '
  '21':
  - type: text
    content: 'But Abijah grew mighty. And he took fourteen wives and had twenty-two sons and sixteen daughters. '
  '22':
  - type: text
    content: 'The rest of the acts of Abijah, his ways and his sayings, are written in the '
  - type: note
    content: ch. 24:27
  - type: text
    content: 'story of the prophet '
  - type: note
    content: ch. 9:29; 12:15
  - type: text
    content: Iddo.
  '3':
  - type: text
    content: 'Abijah went out to battle, having an army of valiant men of war, 400,000 chosen men. And Jeroboam '
  - type: note
    content: ch. 14:10; Judg. 20:22; 1 Sam. 17:2
  - type: text
    content: 'drew up his line of battle against him with 800,000 chosen mighty warriors. '
  '4':
  - type: text
    content: 'Then Abijah stood up on Mount '
  - type: note
    content: Josh. 18:22
  - type: text
    content: 'Zemaraim that is in '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim and said, “Hear me, O Jeroboam and all Israel! '
  '5':
  - type: text
    content: 'Ought you not to know that the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel '
  - type: note
    content: 2 Sam. 7:12, 13, 16
  - type: text
    content: 'gave the kingship over Israel forever to David and his sons by '
  - type: note
    content: Num. 18:19
  - type: text
    content: 'a covenant of salt? '
  '6':
  - type: text
    content: 'Yet Jeroboam the son of Nebat, a servant of Solomon the son of David, rose up '
  - type: note
    content: 1 Kgs. 11:26; 12:19, 20
  - type: text
    content: 'and rebelled against his lord, '
  '7':
  - type: text
    content: 'and certain '
  - type: note
    content: See Judg. 9:4
  - type: text
    content: worthless scoundrels
  - type: note
    content: Hebrew worthless men, sons of Belial
  - type: text
    content: ' gathered about him and defied Rehoboam the son of Solomon, when Rehoboam was '
  - type: note
    content: '[ch. 12:13; 1 Kgs. 14:21]'
  - type: text
    content: young and irresolute
  - type: note
    content: Hebrew soft of heart
  - type: text
    content: ' and could not withstand them.'
  '8':
  - type: text
    content: '“And now you think to withstand the kingdom of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the hand of the sons of David, because you are a great multitude and have with you '
  - type: note
    content: See 1 Kgs. 12:28
  - type: text
    content: 'the golden calves that Jeroboam made you for gods. '
  '9':
  - type: note
    content: ch. 11:14, 15
  - type: text
    content: 'Have you not driven out the priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', the sons of Aaron, and the Levites, and made priests for yourselves like the peoples of other lands? Whoever comes '
  - type: note
    content: ch. 29:31
  - type: text
    content: for ordination
  - type: note
    content: Hebrew to fill his hand
  - type: text
    content: ' with a young bull or seven rams becomes a priest of what are '
  - type: note
    content: Jer. 5:7
  - type: text
    content: 'not gods. '
