    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:53
      marker-yv: yv-n
    - type: text
      text: 'keep the charge of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, but you have forsaken him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, God is with us at our head, and his priests '
    - type: usfm
