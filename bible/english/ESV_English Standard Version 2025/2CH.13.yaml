      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:11
      marker-yv: yv-n
    - type: text
      text: 'And they cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the priests '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
