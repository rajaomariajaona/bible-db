        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Abijah began to reign over Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for us, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our God, and we have not forsaken him. We have priests ministering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who are sons of Aaron, and Levites for their service. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They offer to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
