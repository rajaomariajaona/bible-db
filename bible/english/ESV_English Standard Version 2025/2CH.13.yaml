  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men of Judah raised the battle shout. And when the men of Judah shouted, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:12
      marker-yv: yv-n
    - type: text
      text: 'God defeated Jeroboam and all Israel before Abijah and Judah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men of Israel fled before Judah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:8
      marker-yv: yv-n
    - type: text
      text: 'and God gave them into their hand. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abijah and his people struck them with great force, so there fell slain of Israel 500,000 chosen men. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus the men of Israel were subdued at that time, and the men of Judah prevailed, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'because they relied on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their fathers. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abijah pursued Jeroboam '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and took cities from him, Bethel with its villages and Jeshanah with its villages and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
