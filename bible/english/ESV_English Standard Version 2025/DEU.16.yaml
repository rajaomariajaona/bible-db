document_id: DEU.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Passover
  - type: text
    content: '“Observe the '
  - type: note
    content: For ver. 1-8, see Ex. 12:2-39
  - type: text
    content: 'month of Abib and keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, for '
  - type: note
    content: Ex. 13:4; 34:18
  - type: text
    content: 'in the month of Abib the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brought you out of Egypt by night. '
  '10':
  - type: text
    content: 'Then you shall keep '
  - type: note
    content: 2 Chr. 8:13
  - type: text
    content: 'the Feast of Weeks to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with '
  - type: note
    content: See ch. 26:1-11
  - type: text
    content: 'the tribute of a freewill offering from your hand, which you shall give '
  - type: note
    content: ch. 12:15; [1 Cor. 16:2]
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God blesses you. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:7, 12, 18; 14:26; See Neh. 8:9-12
  - type: text
    content: 'you shall rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you and your son and your daughter, your male servant and your female servant, the Levite who is within your towns, the sojourner, the fatherless, and the widow who are among you, at the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose, to make his name dwell there. '
  '12':
  - type: note
    content: See ch. 5:15
  - type: text
    content: You shall remember that you were a slave in Egypt; and you shall be careful to observe these statutes.
  - type: heading
    content: The Feast of Booths
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex. 23:16; See Lev. 23:34
  - type: text
    content: '“You shall keep the Feast of Booths seven days, when you have gathered in the produce from your threshing floor and your winepress. '
  '14':
  - type: note
    content: ver. 11; See Neh. 8:9-12
  - type: text
    content: 'You shall rejoice in your feast, you and your son and your daughter, your male servant and your female servant, the Levite, the sojourner, the fatherless, and the widow who are within your towns. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: Lev. 23:39
  - type: text
    content: 'seven days you shall keep the feast to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in all your produce and in all the work of your hands, so that you will be altogether joyful.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 31:11; Ex. 23:14, 17; 34:23
  - type: text
    content: '“Three times a year all your males shall appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place that he will choose: at the Feast of Unleavened Bread, at the Feast of Weeks, and at the Feast of Booths. '
  - type: note
    content: Ex. 23:15
  - type: text
    content: 'They shall not appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' empty-handed. '
  '17':
  - type: text
    content: 'Every man '
  - type: note
    content: '[Ezek. 46:5, 11; 2 Cor. 8:12]'
  - type: text
    content: 'shall give as he is able, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'according to the blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that he has given you.'
  - type: heading
    content: Justice
  '18':
  - type: text
    content: '“You shall appoint '
  - type: note
    content: ch. 1:16; Num. 11:16; Josh. 1:10; 1 Chr. 23:4; 26:29
  - type: text
    content: 'judges and officers in all your towns that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, according to your tribes, and they shall judge the people with righteous judgment. '
  '19':
  - type: note
    content: ch. 27:19; Ex. 23:2, 6; Isa. 10:2; Amos 5:12; [Lev. 19:15]; See ch. 24:17
  - type: text
    content: 'You shall not pervert justice. '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'You shall not show partiality, '
  - type: note
    content: See Ex. 23:8
  - type: text
    content: 'and you shall not accept a bribe, for a bribe blinds the eyes of the wise and subverts the cause of the righteous. '
  '2':
  - type: text
    content: 'And you shall offer the Passover sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, from the flock or '
  - type: note
    content: Num. 28:19
  - type: text
    content: 'the herd, '
  - type: note
    content: See ch. 12:5
  - type: text
    content: 'at the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose, to make his name dwell there. '
  '20':
  - type: text
    content: 'Justice, and only justice, you shall follow, that you may live and inherit the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.'
  - type: heading
    content: Forbidden Forms of Worship
  '21':
  - type: text
    content: '“You shall not plant any tree as '
  - type: note
    content: Ex. 34:13; Judg. 6:25; 1 Kgs. 14:15; 16:33; 2 Kgs. 13:6; 17:16; 2 Chr. 33:3
  - type: text
    content: 'an Asherah beside the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that you shall make. '
  '22':
  - type: text
    content: 'And you shall not set up a pillar, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God hates.'
  '3':
  - type: text
    content: 'You shall eat no leavened bread with it. '
  - type: note
    content: Ex. 13:6
  - type: text
    content: 'Seven days you shall eat it with unleavened bread, the bread of affliction—for you came out of the land of Egypt '
  - type: note
    content: Ex. 12:11; [Isa. 52:12]
  - type: text
    content: 'in haste—that all the days of your life you may remember the day when you came out of the land of Egypt. '
  '4':
  - type: note
    content: Ex. 13:7
  - type: text
    content: 'No leaven shall be seen with you in all your territory for seven days, '
  - type: note
    content: Ex. 34:25
  - type: text
    content: 'nor shall any of the flesh that you sacrifice on the evening of the first day remain all night until morning. '
  '5':
  - type: text
    content: 'You may not offer the Passover sacrifice within any of your towns that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, '
  '6':
  - type: text
    content: 'but at the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose, to make his name dwell in it, there you shall offer the Passover sacrifice, in the evening at sunset, at the time you came out of Egypt. '
  '7':
  - type: text
    content: 'And you shall cook it and eat it at the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose. And in the morning you shall turn and go to your tents. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: '[Ex. 13:6]'
  - type: text
    content: 'six days you shall eat unleavened bread, and on the seventh day there shall be '
  - type: note
    content: Lev. 23:8, 36
  - type: text
    content: 'a solemn assembly to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You shall do no work on it.'
  - type: heading
    content: The Feast of Weeks
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex. 23:16; 34:22; Lev. 23:15; Num. 28:26; [ Acts 2:1 ]
  - type: text
    content: '“You shall count seven weeks. Begin to count the seven weeks from the time the sickle is first put to the standing grain. '
