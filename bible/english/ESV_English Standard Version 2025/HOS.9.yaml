document_id: HOS.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Punish Israel
  - type: text
    content: Rejoice not, O Israel!
  - type: text
    content: Exult not like the peoples;
  - type: note
    content: ch. 1:2
  - type: text
    content: for you have played the whore, forsaking your God.
  - type: note
    content: ch. 2:5; Jer. 44:17
  - type: text
    content: You have loved a prostitute’s wages
  - type: text
    content: on all threshing floors.
  '10':
  - type: text
    content: Like grapes in the wilderness,
  - type: note
    content: '[ Ps. 80:8; Isa. 5:1 ]'
  - type: text
    content: I found Israel.
  - type: text
    content: Like the first fruit on the fig tree
  - type: text
    content: in its first season,
  - type: text
    content: I saw your fathers.
  - type: text
    content: 'But '
  - type: note
    content: Num. 25:3; Ps. 106:28
  - type: text
    content: they came to Baal-peor
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 4:14]'
  - type: text
    content: consecrated themselves to the thing of shame,
  - type: text
    content: 'and '
  - type: note
    content: '[Rom. 1:28, 29]'
  - type: text
    content: became detestable like the thing they loved.
  '11':
  - type: text
    content: 'Ephraim’s '
  - type: note
    content: ch. 10:5; [ch. 4:7]
  - type: text
    content: glory shall fly away like a bird—
  - type: note
    content: '[ Isa. 26:18 ]'
  - type: text
    content: no birth, no pregnancy, no conception!
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:16
  - type: text
    content: Even if they bring up children,
  - type: text
    content: I will bereave them till none is left.
  - type: note
    content: ch. 7:13
  - type: text
    content: Woe to them
  - type: text
    content: 'when '
  - type: note
    content: ch. 5:6; 1 Sam. 28:15, 16; Ezek. 10:18
  - type: text
    content: I depart from them!
  '13':
  - type: text
    content: 'Ephraim, '
  - type: note
    content: '[Ezek. 27:3]'
  - type: text
    content: as I have seen, was like a young palm
  - type: note
    content: Or like Tyre
  - type: text
    content: ' planted in a meadow;'
  - type: text
    content: 'but '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: Ephraim must lead his children out to slaughter.
  - type: note
    content: Hebrew to him who slaughters
  '14':
  - type: text
    content: 'Give them, O '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: what will you give?
  - type: text
    content: 'Give them '
  - type: note
    content: '[Luke 23:29]'
  - type: text
    content: a miscarrying womb
  - type: text
    content: and dry breasts.
  '15':
  - type: text
    content: 'Every evil of theirs is in '
  - type: note
    content: ch. 4:15; 12:11
  - type: text
    content: Gilgal;
  - type: text
    content: there I began to hate them.
  - type: text
    content: Because of the wickedness of their deeds
  - type: text
    content: I will drive them out of my house.
  - type: text
    content: I will love them no more;
  - type: text
    content: 'all '
  - type: note
    content: ch. 8:4
  - type: text
    content: 'their princes are '
  - type: note
    content: '[ch. 5:2]'
  - type: text
    content: rebels.
  '16':
  - type: text
    content: Ephraim is stricken;
  - type: note
    content: '[ver. 11 ]'
  - type: text
    content: their root is dried up;
  - type: text
    content: they shall bear no fruit.
  - type: text
    content: 'Even '
  - type: note
    content: '[ver. 12, 13]'
  - type: text
    content: though they give birth,
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: I will put their beloved children to death.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:5 ]'
  - type: text
    content: My God will reject them
  - type: text
    content: because they have not listened to him;
  - type: note
    content: Deut. 28:64, 65
  - type: text
    content: they shall be wanderers among the nations.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:9 ]'
  - type: text
    content: Threshing floor and wine vat shall not feed them,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 2:9]'
  - type: text
    content: the new wine shall fail them.
  '3':
  - type: text
    content: 'They shall not remain in '
  - type: note
    content: Jer. 2:7; 16:18; See Lev. 25:23
  - type: text
    content: 'the land of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'but '
  - type: note
    content: See ch. 8:13
  - type: text
    content: Ephraim shall return to Egypt,
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 4:13; Dan. 1:8
  - type: text
    content: they shall eat unclean food in Assyria.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:4 ]'
  - type: text
    content: 'They shall not pour drink offerings of wine to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 8:13 ]'
  - type: text
    content: and their sacrifices shall not please him.
  - type: text
    content: 'It shall be like '
  - type: note
    content: Deut. 26:14; Ezek. 24:17
  - type: text
    content: mourners’ bread to them;
  - type: text
    content: all who eat of it shall be defiled;
  - type: text
    content: for their bread shall be for their hunger only;
  - type: note
    content: '[ Hag. 2:13 ]'
  - type: text
    content: 'it shall not come to the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 10:3 ]'
  - type: text
    content: What will you do on the day of the appointed festival,
  - type: text
    content: 'and on the day of the feast of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '6':
  - type: text
    content: For behold, they are going away from destruction;
  - type: text
    content: 'but '
  - type: note
    content: See ch. 8:13
  - type: text
    content: Egypt shall gather them;
  - type: text
    content: Memphis shall bury them.
  - type: text
    content: 'Nettles shall possess '
  - type: note
    content: '[ch. 10:8; Isa. 2:20]'
  - type: text
    content: their precious things of silver;
  - type: note
    content: '[ch. 10:8 ]'
  - type: text
    content: thorns shall be in their tents.
  '7':
  - type: text
    content: ' '
  - type: note
    content: See Isa. 10:3
  - type: text
    content: The days of punishment have come;
  - type: text
    content: the days of recompense have come;
  - type: text
    content: Israel shall know it.
  - type: note
    content: Ezek. 13:3
  - type: text
    content: The prophet is a fool;
  - type: text
    content: the man of the spirit is mad,
  - type: text
    content: because of your great iniquity
  - type: text
    content: and great hatred.
  '8':
  - type: text
    content: 'The prophet is '
  - type: note
    content: Ezek. 3:17
  - type: text
    content: the watchman of Ephraim with my God;
  - type: text
    content: 'yet '
  - type: note
    content: Ps. 91:3; [ch. 5:1]
  - type: text
    content: a fowler’s snare is on all his ways,
  - type: text
    content: and hatred in the house of his God.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 5:2 ]'
  - type: text
    content: They have deeply corrupted themselves
  - type: text
    content: 'as '
  - type: note
    content: ch. 10:9; Judg. 19:22
  - type: text
    content: 'in the days of Gibeah:'
  - type: note
    content: '[ch. 5:2 ]'
  - type: text
    content: he will remember their iniquity;
  - type: text
    content: he will punish their sins.
