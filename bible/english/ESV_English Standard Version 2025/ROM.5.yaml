document_id: ROM.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Peace with God Through Faith
  - type: text
    content: ' '
  - type: note
    content: ch. 3:28
  - type: text
    content: 'Therefore, since we have been justified by faith, '
  - type: note
    content: '[ch. 15:13; Heb. 12:28]'
  - type: text
    content: we
  - type: note
    content: Some manuscripts let us
  - type: text
    content: ' have peace with God through our Lord Jesus Christ. '
  '10':
  - type: text
    content: 'For if '
  - type: note
    content: ver. 6, 8; Col. 1:21; [ch. 8:32]
  - type: text
    content: 'while we were enemies '
  - type: note
    content: 2 Cor. 5:18-20; Eph. 2:16; Col. 1:20, 21
  - type: text
    content: 'we were reconciled to God by the death of his Son, much more, now that we are reconciled, shall we be saved by '
  - type: note
    content: 2 Cor. 4:10, 11
  - type: text
    content: 'his life. '
  '11':
  - type: text
    content: 'More than that, we also rejoice in God through our Lord Jesus Christ, through whom we have now received '
  - type: note
    content: ch. 11:15; 2 Cor. 5:18, 19
  - type: text
    content: reconciliation.
  - type: heading
    content: Death in Adam, Life in Christ
  '12':
  - type: text
    content: 'Therefore, just as '
  - type: note
    content: Gen. 2:17; 3:6; 1 Cor. 15:21, 22; [ver. 15-17; ch. 6:9; Ps. 51:5]
  - type: text
    content: 'sin came into the world through one man, and '
  - type: note
    content: ch. 6:23; James 1:15
  - type: text
    content: 'death through sin, and '
  - type: note
    content: '[ver. 14, 21; 1 Cor. 15:22]'
  - type: text
    content: so death spread to all men
  - type: note
    content: The Greek word anthropoi refers here to both men and women; also twice in verse 18
  - type: text
    content: ' because '
  - type: note
    content: Eph. 2:3
  - type: text
    content: 'all sinned— '
  '13':
  - type: text
    content: 'for sin indeed was in the world before the law was given, but '
  - type: note
    content: See ch. 3:20
  - type: text
    content: 'sin is not counted where there is no law. '
  '14':
  - type: text
    content: 'Yet death reigned from Adam to Moses, even over those whose sinning was not '
  - type: note
    content: Hos. 6:7
  - type: text
    content: 'like the transgression of Adam, '
  - type: note
    content: 1 Cor. 15:45
  - type: text
    content: 'who was a type of '
  - type: note
    content: '[Matt. 11:3]'
  - type: text
    content: the one who was to come.
  '15':
  - type: text
    content: 'But the free gift is not like the trespass. For if many died through one man’s trespass, much more have the grace of God and the free gift by the grace of that one man Jesus Christ abounded for '
  - type: note
    content: ver. 19; Isa. 53:11
  - type: text
    content: 'many. '
  '16':
  - type: text
    content: 'And the free gift is not like the result of that one man’s sin. For '
  - type: note
    content: 1 Cor. 11:32
  - type: text
    content: 'the judgment following one trespass brought condemnation, but the free gift following many trespasses brought '
  - type: note
    content: ver. 18
  - type: text
    content: 'justification. '
  '17':
  - type: text
    content: 'For if, because of one man’s trespass, death reigned through that one man, much more will those who receive the abundance of grace and the free gift of righteousness '
  - type: note
    content: Rev. 22:5
  - type: text
    content: reign in life through the one man Jesus Christ.
  '18':
  - type: text
    content: Therefore, as one trespass
  - type: note
    content: Or the trespass of one
  - type: text
    content: ' led to condemnation for all men, so one act of righteousness'
  - type: note
    content: Or the act of righteousness of one
  - type: text
    content: ' leads to justification and life for '
  - type: note
    content: See John 12:32
  - type: text
    content: 'all men. '
  '19':
  - type: text
    content: 'For as by the one man’s '
  - type: note
    content: '[2 Cor. 10:6]'
  - type: text
    content: 'disobedience the many were made sinners, so by the one man’s '
  - type: note
    content: Heb. 5:8; [Phil. 2:8]
  - type: text
    content: 'obedience the many will be made righteous. '
  '2':
  - type: text
    content: 'Through him we have also '
  - type: note
    content: Eph. 2:18; 3:12; [Heb. 10:19, 20; 1 Pet. 3:18]
  - type: text
    content: obtained access by faith
  - type: note
    content: Some manuscripts omit by faith
  - type: text
    content: ' into this grace '
  - type: note
    content: 1 Cor. 15:1
  - type: text
    content: 'in which we stand, and '
  - type: note
    content: ver. 11; Heb. 3:6; [ch. 12:12]
  - type: text
    content: we
  - type: note
    content: Or let us; also verse 3
  - type: text
    content: ' rejoice'
  - type: note
    content: Or boast; also verses 3, 11
  - type: text
    content: ' in hope of the glory of God. '
  '20':
  - type: text
    content: 'Now '
  - type: note
    content: Gal. 3:19; See ch. 3:20
  - type: text
    content: 'the law came in to increase the trespass, but where sin increased, '
  - type: note
    content: 1 Tim. 1:14
  - type: text
    content: 'grace abounded all the more, '
  '21':
  - type: text
    content: 'so that, '
  - type: note
    content: '[ver. 12, 14]'
  - type: text
    content: 'as sin reigned in death, '
  - type: note
    content: See John 1:17
  - type: text
    content: grace also might reign through righteousness leading to eternal life through Jesus Christ our Lord.
  '3':
  - type: text
    content: 'Not only that, but we '
  - type: note
    content: See Matt. 5:12
  - type: text
    content: 'rejoice in our sufferings, knowing that suffering '
  - type: note
    content: See Luke 21:19; James 1:3
  - type: text
    content: 'produces endurance, '
  '4':
  - type: text
    content: 'and endurance produces character, and character produces hope, '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 119:116; Phil. 1:20
  - type: text
    content: 'hope does not put us to shame, because God’s love '
  - type: note
    content: Acts 2:17, 18, 33; Titus 3:6; [Gal. 4:6]
  - type: text
    content: has been poured into our hearts through the Holy Spirit who has been given to us.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: ver. 8, 10; [Hos. 13:9; Eph. 2:5]
  - type: text
    content: 'while we were still weak, at the right time '
  - type: note
    content: See ch. 4:25
  - type: text
    content: 'Christ died for the ungodly. '
  '7':
  - type: text
    content: 'For one will scarcely die for a righteous person—though perhaps for a good person one would dare even to die— '
  '8':
  - type: text
    content: 'but '
  - type: note
    content: See John 3:16
  - type: text
    content: 'God shows his love for us in that '
  - type: note
    content: ver. 6, 10
  - type: text
    content: 'while we were still sinners, Christ died for us. '
  '9':
  - type: text
    content: 'Since, therefore, '
  - type: note
    content: See ch. 3:25
  - type: text
    content: 'we have now been justified by his blood, much more shall we be saved by him from '
  - type: note
    content: 1 Thess. 1:10; 2:16; See ch. 1:18
  - type: text
    content: 'the wrath of God. '
