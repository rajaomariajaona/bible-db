document_id: 1TH.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of the Lord
  - type: text
    content: 'Now concerning '
  - type: note
    content: Dan. 2:21; Acts 1:7
  - type: text
    content: the times and the seasons, brothers,
  - type: note
    content: Or brothers and sisters; also verses 4, 12, 14, 25, 26, 27
  - type: text
    content: ' '
  - type: note
    content: ch. 4:9
  - type: text
    content: 'you have no need to have anything written to you. '
  '10':
  - type: note
    content: Rom. 14:9; [2 Tim. 2:11]
  - type: text
    content: 'who died for us so that whether we are awake or asleep we might live with him. '
  '11':
  - type: text
    content: Therefore encourage one another and build one another up, just as you are doing.
  - type: heading
    content: Final Instructions and Benediction
  '12':
  - type: text
    content: 'We ask you, brothers, '
  - type: note
    content: 1 Cor. 16:18; Phil. 2:29
  - type: text
    content: 'to respect those who labor among you and '
  - type: note
    content: 1 Cor. 16:16; Heb. 13:17
  - type: text
    content: 'are over you in the Lord and admonish you, '
  '13':
  - type: text
    content: 'and to esteem them very highly in love because of their work. '
  - type: note
    content: See Mark 9:50
  - type: text
    content: 'Be at peace among yourselves. '
  '14':
  - type: text
    content: 'And we urge you, brothers, admonish '
  - type: note
    content: 2 Thess. 3:6, 7, 11
  - type: text
    content: the idle,
  - type: note
    content: Or disorderly, or undisciplined
  - type: text
    content: ' '
  - type: note
    content: Isa. 35:4; [Heb. 12:12]
  - type: text
    content: 'encourage the fainthearted, '
  - type: note
    content: Acts 20:35; See Rom. 15:1
  - type: text
    content: 'help the weak, '
  - type: note
    content: See 1 Cor. 13:4
  - type: text
    content: 'be patient with them all. '
  '15':
  - type: text
    content: 'See that '
  - type: note
    content: 1 Pet. 3:9; See Rom. 12:17
  - type: text
    content: 'no one repays anyone evil for evil, but always '
  - type: note
    content: '[Rom. 12:9]; See Gal. 6:10'
  - type: text
    content: 'seek to do good to one another and to everyone. '
  '16':
  - type: note
    content: Phil. 4:4
  - type: text
    content: 'Rejoice always, '
  '17':
  - type: note
    content: See Luke 18:1
  - type: text
    content: 'pray without ceasing, '
  '18':
  - type: note
    content: See Eph. 5:20
  - type: text
    content: 'give thanks in all circumstances; for this is the will of God in Christ Jesus for you. '
  '19':
  - type: note
    content: '[1 Cor. 14:30; Eph. 4:30; 1 Tim. 4:14; 2 Tim. 1:6]'
  - type: text
    content: 'Do not quench the Spirit. '
  '2':
  - type: text
    content: 'For you yourselves are fully aware that '
  - type: note
    content: '[2 Thess. 2:2]; See Matt. 24:43; Luke 17:24'
  - type: text
    content: 'the day of the Lord will come like a thief in the night. '
  '20':
  - type: text
    content: 'Do not despise '
  - type: note
    content: See 1 Cor. 11:4
  - type: text
    content: 'prophecies, '
  '21':
  - type: text
    content: 'but '
  - type: note
    content: 1 John 4:1; [Job 34:4]; See Eph. 5:10
  - type: text
    content: 'test everything; hold fast what is good. '
  '22':
  - type: text
    content: Abstain from every form of evil.
  '23':
  - type: text
    content: 'Now may '
  - type: note
    content: See Rom. 15:33
  - type: text
    content: 'the God of peace himself '
  - type: note
    content: Ex. 31:13; John 17:17
  - type: text
    content: 'sanctify you completely, and may your '
  - type: note
    content: 2 Pet. 3:14; Jude 1
  - type: text
    content: 'whole '
  - type: note
    content: Luke 1:46, 47; Heb. 4:12; [1 Cor. 14:14]
  - type: text
    content: 'spirit and soul and body be kept blameless at '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'the coming of our Lord Jesus Christ. '
  '24':
  - type: note
    content: See 1 Cor. 1:9
  - type: text
    content: 'He who calls you is faithful; '
  - type: note
    content: '[Phil. 1:6]'
  - type: text
    content: he will surely do it.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 2 Thess. 3:1; Heb. 13:18
  - type: text
    content: Brothers, pray for us.
  '26':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 16:16
  - type: text
    content: Greet all the brothers with a holy kiss.
  '27':
  - type: text
    content: 'I put you under oath before the Lord to have '
  - type: note
    content: Col. 4:16
  - type: text
    content: this letter read to all the brothers.
  '28':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 16:20
  - type: text
    content: The grace of our Lord Jesus Christ be with you.
  '3':
  - type: text
    content: 'While people are saying, “There is peace and security,” then '
  - type: note
    content: Luke 21:34; [Ps. 35:8; Luke 17:26-30; 2 Thess. 1:9]
  - type: text
    content: 'sudden destruction will come upon them '
  - type: note
    content: See Isa. 13:8
  - type: text
    content: 'as labor pains come upon a pregnant woman, and they will not escape. '
  '4':
  - type: text
    content: 'But you '
  - type: note
    content: 1 John 2:8
  - type: text
    content: 'are not in darkness, brothers, for that day to surprise you like a thief. '
  '5':
  - type: text
    content: 'For you are all '
  - type: note
    content: See Luke 16:8
  - type: text
    content: children
  - type: note
    content: Or sons; twice in this verse
  - type: text
    content: ' of light, children of the day. We are not of the night or of the darkness. '
  '6':
  - type: text
    content: 'So then '
  - type: note
    content: '[Mark 13:36]; See Rom. 13:11-13'
  - type: text
    content: 'let us not sleep, as others do, but let us '
  - type: note
    content: See Matt. 24:42
  - type: text
    content: 'keep awake and '
  - type: note
    content: See 1 Pet. 1:13
  - type: text
    content: 'be sober. '
  '7':
  - type: text
    content: 'For those who sleep, sleep at night, and those who get drunk, '
  - type: note
    content: '[Acts 2:15; 2 Pet. 2:13]'
  - type: text
    content: 'are drunk at night. '
  '8':
  - type: text
    content: 'But since we belong to the day, let us be sober, '
  - type: note
    content: Isa. 59:17; Eph. 6:14, 17
  - type: text
    content: 'having put on the breastplate of '
  - type: note
    content: '[Eph. 6:23]'
  - type: text
    content: 'faith and love, and for a helmet the hope of salvation. '
  '9':
  - type: text
    content: 'For God has not destined us for '
  - type: note
    content: See ch. 1:10
  - type: text
    content: 'wrath, but '
  - type: note
    content: 2 Thess. 2:13, 14; [Heb. 10:39]
  - type: text
    content: 'to obtain salvation through our Lord Jesus Christ, '
