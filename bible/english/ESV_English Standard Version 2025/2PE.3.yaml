document_id: 2PE.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of the Lord Will Come
  - type: text
    content: 'This is now the second letter that I am writing to you, beloved. In both of them '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'I am stirring up your sincere mind by way of reminder, '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: See Matt. 24:43
  - type: text
    content: 'the day of the Lord will come like a thief, and then '
  - type: note
    content: '[Rev. 6:14; 20:11; 21:1]; See Matt. 24:35'
  - type: text
    content: 'the heavens will pass away with a roar, and '
  - type: note
    content: Isa. 34:4; [Isa. 24:19; Mic. 1:4; Nah. 1:5]
  - type: text
    content: the heavenly bodies
  - type: note
    content: Or elements; also verse 12
  - type: text
    content: ' will be burned up and dissolved, and the earth and the works that are done on it will be exposed.'
  - type: note
    content: Greek found; some manuscripts will be burned up
  '11':
  - type: text
    content: 'Since all these things are thus to be dissolved, '
  - type: note
    content: 1 Pet. 1:15
  - type: text
    content: 'what sort of people ought you to be in lives of holiness and godliness, '
  '12':
  - type: note
    content: '[Luke 12:36; 1 Cor. 1:7; 1 Thess. 1:10; Titus 2:13; Jude 21]'
  - type: text
    content: 'waiting for and hastening the coming of the day of God, because of which the heavens will be set on fire and dissolved, and '
  - type: note
    content: See ver. 10
  - type: text
    content: 'the heavenly bodies will melt as they burn! '
  '13':
  - type: text
    content: 'But according to his promise we are waiting for '
  - type: note
    content: Isa. 65:17; 66:22; Rev. 21:1
  - type: text
    content: 'new heavens and a new earth '
  - type: note
    content: Isa. 60:21; Rev. 21:27
  - type: text
    content: in which righteousness dwells.
  - type: heading
    content: Final Words
  '14':
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 15:58
  - type: text
    content: 'Therefore, beloved, since you are waiting for these, be diligent to be found by him '
  - type: note
    content: James 1:27
  - type: text
    content: 'without spot or '
  - type: note
    content: Phil. 2:15; [Phil. 1:10; 1 Thess. 3:13]
  - type: text
    content: 'blemish, and '
  - type: note
    content: '[1 Thess. 5:23]'
  - type: text
    content: 'at peace. '
  '15':
  - type: text
    content: 'And count '
  - type: note
    content: See ver. 9
  - type: text
    content: 'the patience of our Lord as salvation, just as '
  - type: note
    content: '[Acts 15:25]'
  - type: text
    content: 'our beloved brother Paul also wrote to you '
  - type: note
    content: 1 Cor. 3:10
  - type: text
    content: 'according to the wisdom given him, '
  '16':
  - type: text
    content: 'as he does in all his letters when he speaks in them of these matters. '
  - type: note
    content: '[Heb. 5:11]'
  - type: text
    content: 'There are some things in them that are hard to understand, which the ignorant and unstable twist to their own destruction, '
  - type: note
    content: '[Isa. 28:13]'
  - type: text
    content: 'as they do the other Scriptures. '
  '17':
  - type: text
    content: 'You therefore, beloved, '
  - type: note
    content: ch. 1:12; [Mark 13:23]
  - type: text
    content: 'knowing this beforehand, '
  - type: note
    content: ch. 1:10; 1 Cor. 10:12
  - type: text
    content: 'take care that you are not carried away with the error of lawless people and lose your own stability. '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: ch. 1:5; Eph. 4:15; Col. 1:10; 2:19; 1 Pet. 2:2
  - type: text
    content: 'grow in the grace and knowledge of our Lord and Savior Jesus Christ. '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: 'To him be the glory both now and to the day of '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: eternity. Amen.
  '2':
  - type: note
    content: Jude 17
  - type: text
    content: 'that you should remember the predictions of '
  - type: note
    content: Luke 1:70; Acts 3:21
  - type: text
    content: 'the holy prophets and the commandment of the Lord and Savior through your apostles, '
  '3':
  - type: text
    content: 'knowing this first of all, that scoffers will come '
  - type: note
    content: Jude 18
  - type: text
    content: 'in the last days with scoffing, '
  - type: note
    content: ch. 2:10
  - type: text
    content: 'following their own sinful desires. '
  '4':
  - type: note
    content: Isa. 5:19; Jer. 17:15; Ezek. 11:3; 12:22, 27; Mal. 2:17
  - type: text
    content: 'They will say, “Where is the promise of '
  - type: note
    content: See 1 Thess. 2:19
  - type: text
    content: 'his coming? For ever since the fathers fell asleep, all things are continuing as they were from the beginning of creation.” '
  '5':
  - type: text
    content: 'For they deliberately overlook this fact, that the heavens existed long ago, and the earth '
  - type: note
    content: Ps. 24:2; 136:6
  - type: text
    content: 'was formed out of water and through water '
  - type: note
    content: Gen. 1:6, 9; Ps. 33:6; [Heb. 11:3]
  - type: text
    content: 'by the word of God, '
  '6':
  - type: text
    content: 'and that by means of these the world that then existed '
  - type: note
    content: ch. 2:5
  - type: text
    content: 'was deluged with water and '
  - type: note
    content: Gen. 7:11, 21
  - type: text
    content: 'perished. '
  '7':
  - type: text
    content: 'But by the same word '
  - type: note
    content: ver. 10, 12
  - type: text
    content: 'the heavens and earth that now exist are stored up for fire, being kept until the day of judgment and '
  - type: note
    content: '[2 Thess. 1:9]'
  - type: text
    content: destruction of the ungodly.
  '8':
  - type: text
    content: 'But do not overlook this one fact, beloved, that with the Lord one day is as a thousand years, and '
  - type: note
    content: Ps. 90:4
  - type: text
    content: 'a thousand years as one day. '
  '9':
  - type: note
    content: Hab. 2:3; Heb. 10:37
  - type: text
    content: 'The Lord is not slow to fulfill his promise '
  - type: note
    content: '[Eccles. 8:11; Rev. 2:21]'
  - type: text
    content: 'as some count slowness, but '
  - type: note
    content: Isa. 30:18; Luke 18:7
  - type: text
    content: is patient toward you,
  - type: note
    content: Some manuscripts on your account
  - type: text
    content: ' '
  - type: note
    content: Ezek. 18:23, 32; 33:11
  - type: text
    content: 'not wishing that any should perish, but '
  - type: note
    content: 1 Tim. 2:4
  - type: text
    content: 'that all should reach repentance. '
