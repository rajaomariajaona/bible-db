document_id: 2CO.6,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Mark 16:20; 1 Cor. 3:9; [ Acts 15:4 ]
  - type: text
    content: 'Working together with him, then, '
  - type: note
    content: ch. 5:20
  - type: text
    content: 'we appeal to you '
  - type: note
    content: '[Heb. 12:15]'
  - type: text
    content: 'not to receive the grace of God in vain. '
  '10':
  - type: note
    content: John 16:22; [ch. 7:4]
  - type: text
    content: 'as sorrowful, yet always rejoicing; '
  - type: note
    content: '[ch. 8:9; Prov. 13:7; 1 Cor. 1:5]'
  - type: text
    content: 'as poor, yet making many rich; '
  - type: note
    content: Acts 3:6
  - type: text
    content: 'as having nothing, '
  - type: note
    content: 1 Cor. 7:30
  - type: text
    content: yet possessing everything.
  '11':
  - type: text
    content: We have spoken freely to you,
  - type: note
    content: Greek Our mouth is open to you
  - type: text
    content: ' Corinthians; '
  - type: note
    content: ch. 7:3; [ch. 11:11; 12:15; Ps. 119:32]
  - type: text
    content: 'our heart is wide open. '
  '12':
  - type: text
    content: 'You are not restricted by us, but '
  - type: note
    content: ch. 7:2
  - type: text
    content: 'you are restricted in your own affections. '
  '13':
  - type: note
    content: '[Gal. 4:12]'
  - type: text
    content: 'In return (I speak '
  - type: note
    content: 1 Cor. 4:14
  - type: text
    content: as to children) widen your hearts also.
  - type: heading
    content: The Temple of the Living God
  '14':
  - type: text
    content: ' '
  - type: note
    content: Deut. 7:3; Josh. 23:12; Ezra 9:2; Neh. 13:25; [ 1 Cor. 7:39 ]
  - type: text
    content: 'Do not be unequally yoked with unbelievers. For '
  - type: note
    content: Eph. 5:7, 11; 1 John 1:6
  - type: text
    content: 'what partnership has righteousness with lawlessness? Or '
  - type: note
    content: See Acts 26:18
  - type: text
    content: 'what fellowship has light with darkness? '
  '15':
  - type: note
    content: '[1 Cor. 10:21]'
  - type: text
    content: What accord has Christ with Belial?
  - type: note
    content: Greek Beliar
  - type: text
    content: ' Or what portion does a believer share with an unbeliever? '
  '16':
  - type: text
    content: 'What agreement has the temple of God with idols? For '
  - type: note
    content: '[Eph. 2:22]; See 1 Cor. 3:16'
  - type: text
    content: we are the temple of the living God; as God said,
  - type: note
    content: Cited from Lev. 26:12; See Ex. 29:45
  - type: text
    content: '“I will make my dwelling among them and '
  - type: note
    content: '[Rev. 2:1; 21:3]'
  - type: text
    content: walk among them,
  - type: text
    content: 'and '
  - type: note
    content: Ex. 6:7; Jer. 31:33; Ezek. 11:20
  - type: text
    content: I will be their God,
  - type: text
    content: and they shall be my people.
  '17':
  - type: text
    content: 'Therefore '
  - type: note
    content: Cited from Isa. 52:11; [ch. 7:1; Ezek. 20:34, 41; Zeph. 3:20; Rev. 18:4]
  - type: text
    content: go out from their midst,
  - type: text
    content: and be separate from them, says the Lord,
  - type: text
    content: and touch no unclean thing;
  - type: text
    content: then I will welcome you,
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 4:22; 2 Sam. 7:8, 14; Isa. 43:6; Jer. 31:9; Hos. 1:10; Rev. 21:7 ]'
  - type: text
    content: and I will be a father to you,
  - type: text
    content: and you shall be sons and daughters to me,
  - type: text
    content: says the Lord Almighty.”
  '2':
  - type: text
    content: For he says,
  - type: note
    content: Cited from Isa. 49:8
  - type: text
    content: “In a favorable time I listened to you,
  - type: text
    content: and in a day of salvation I have helped you.”
  - type: text
    content: 'Behold, '
  - type: note
    content: '[Ps. 32:6; 69:13; Isa. 55:6; Heb. 3:13]'
  - type: text
    content: 'now is the '
  - type: note
    content: '[Luke 4:19]'
  - type: text
    content: 'favorable time; behold, now is the day of salvation. '
  '3':
  - type: text
    content: 'We '
  - type: note
    content: See 1 Cor. 8:13; 9:12
  - type: text
    content: 'put no obstacle in anyone’s way, so that no fault may be found with our ministry, '
  '4':
  - type: text
    content: 'but '
  - type: note
    content: '[1 Thess. 3:2; 2 Tim. 2:24, 25]; See ch. 3:6'
  - type: text
    content: 'as servants of God we commend ourselves in every way: '
  - type: note
    content: ch. 12:12; 2 Tim. 3:10
  - type: text
    content: 'by great endurance, '
  - type: note
    content: Acts 9:16
  - type: text
    content: 'in afflictions, '
  - type: note
    content: ch. 12:10
  - type: text
    content: 'hardships, calamities, '
  '5':
  - type: note
    content: ch. 11:23-27; Acts 16:23
  - type: text
    content: 'beatings, imprisonments, '
  - type: note
    content: Acts 17:5
  - type: text
    content: 'riots, labors, sleepless nights, hunger; '
  '6':
  - type: note
    content: 1 Thess. 2:10
  - type: text
    content: 'by purity, '
  - type: note
    content: ch. 11:6
  - type: text
    content: 'knowledge, patience, kindness, '
  - type: note
    content: Rom. 15:19; 1 Thess. 1:5
  - type: text
    content: 'the Holy Spirit, '
  - type: note
    content: Rom. 12:9; [James 3:17]
  - type: text
    content: 'genuine love; '
  '7':
  - type: text
    content: 'by '
  - type: note
    content: Eph. 1:13; Col. 1:5
  - type: text
    content: 'truthful speech, and '
  - type: note
    content: See 1 Cor. 2:5
  - type: text
    content: 'the power of God; with '
  - type: note
    content: ch. 10:4; Eph. 6:11-17
  - type: text
    content: 'the weapons of righteousness for the right hand and for the left; '
  '8':
  - type: text
    content: 'through honor and dishonor, '
  - type: note
    content: Rom. 3:8
  - type: text
    content: 'through slander and praise. We are treated as impostors, and yet are true; '
  '9':
  - type: text
    content: 'as unknown, and '
  - type: note
    content: '[ch. 11:6]'
  - type: text
    content: 'yet well known; '
  - type: note
    content: See ch. 4:10
  - type: text
    content: 'as dying, and behold, we live; '
  - type: note
    content: Ps. 118:18
  - type: text
    content: 'as punished, and yet not killed; '
