document_id: 2CH.17,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat his son reigned in his place and strengthened himself against Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:29
      marker-yv: yv-n
    - type: text
      text: 'And the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fell upon all the kingdoms of the lands that were around Judah, and they made no war against Jehoshaphat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the Philistines '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 8:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'brought Jehoshaphat presents and silver for tribute, and the Arabians also brought him 7,700 rams and 7,700 goats. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat grew steadily greater. He built in Judah fortresses and store cities, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he had large supplies in the cities of Judah. He had soldiers, mighty men of valor, in Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was the muster of them by fathers’ houses: Of Judah, the commanders of thousands: Adnah the commander, with 300,000 mighty men of valor; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and next to him Jehohanan the commander, with 280,000; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and next to him Amasiah the son of Zichri, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 5:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 11:2
      marker-yv: yv-n
    - type: text
      text: 'a volunteer for the service of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with 200,000 mighty men of valor. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Benjamin: Eliada, a mighty man of valor, with 200,000 men '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 12:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'armed with bow and shield; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and next to him Jehozabad with 180,000 armed for war. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were in the service of the king, besides '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: those whom the king had placed in the fortified cities throughout all Judah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He placed forces in all the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:5
      marker-yv: yv-n
    - type: text
      text: 'fortified cities of Judah and set garrisons in the land of Judah, and in the cities of Ephraim '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      marker-yv: yv-n
    - type: text
      text: 'that Asa his father had captured. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Jehoshaphat, because he walked in the earlier ways of his father David. He did not seek the Baals, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but sought the God of his father and walked in his commandments, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 12:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and not according to the practices of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' established the kingdom in his hand. And all Judah '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:23
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'brought tribute to Jehoshaphat, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      marker-yv: yv-n
    - type: text
      text: 'and he had great riches and honor. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His heart was courageous in the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And furthermore, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:43
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: he took the high places and the Asherim out of Judah.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the third year of his reign he sent his officials, Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:3
      marker-yv: yv-n
    - type: text
      text: 'to teach in the cities of Judah; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:8
      marker-yv: yv-n
    - type: text
      text: 'and with them the Levites, Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tobadonijah; and with these Levites, the priests Elishama and Jehoram. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'they taught in Judah, having the Book of the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with them. They went about through all the cities of Judah and taught among the people.'
