document_id: 2CH.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat Reigns in Judah
  - type: text
    content: 'Jehoshaphat his son reigned in his place and strengthened himself against Israel. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:14; 20:29
  - type: text
    content: 'And the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' fell upon all the kingdoms of the lands that were around Judah, and they made no war against Jehoshaphat. '
  '11':
  - type: text
    content: 'Some of the Philistines '
  - type: note
    content: '[ch. 26:8; 2 Sam. 8:2]'
  - type: text
    content: 'brought Jehoshaphat presents and silver for tribute, and the Arabians also brought him 7,700 rams and 7,700 goats. '
  '12':
  - type: text
    content: 'And Jehoshaphat grew steadily greater. He built in Judah fortresses and store cities, '
  '13':
  - type: text
    content: 'and he had large supplies in the cities of Judah. He had soldiers, mighty men of valor, in Jerusalem. '
  '14':
  - type: text
    content: 'This was the muster of them by fathers’ houses: Of Judah, the commanders of thousands: Adnah the commander, with 300,000 mighty men of valor; '
  '15':
  - type: text
    content: 'and next to him Jehohanan the commander, with 280,000; '
  '16':
  - type: text
    content: 'and next to him Amasiah the son of Zichri, '
  - type: note
    content: Judg. 5:2, 9; Neh. 11:2
  - type: text
    content: 'a volunteer for the service of the '
  - type: text
    content: Lord
  - type: text
    content: ', with 200,000 mighty men of valor. '
  '17':
  - type: text
    content: 'Of Benjamin: Eliada, a mighty man of valor, with 200,000 men '
  - type: note
    content: '[1 Chr. 12:2]'
  - type: text
    content: 'armed with bow and shield; '
  '18':
  - type: text
    content: 'and next to him Jehozabad with 180,000 armed for war. '
  '19':
  - type: text
    content: 'These were in the service of the king, besides '
  - type: note
    content: ver. 2
  - type: text
    content: those whom the king had placed in the fortified cities throughout all Judah.
  '2':
  - type: text
    content: 'He placed forces in all the '
  - type: note
    content: See ch. 11:5
  - type: text
    content: 'fortified cities of Judah and set garrisons in the land of Judah, and in the cities of Ephraim '
  - type: note
    content: ch. 15:8
  - type: text
    content: 'that Asa his father had captured. '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with Jehoshaphat, because he walked in the earlier ways of his father David. He did not seek the Baals, '
  '4':
  - type: text
    content: 'but sought the God of his father and walked in his commandments, '
  - type: note
    content: '[1 Kgs. 12:28]'
  - type: text
    content: 'and not according to the practices of Israel. '
  '5':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' established the kingdom in his hand. And all Judah '
  - type: note
    content: '[ch. 32:23]'
  - type: text
    content: 'brought tribute to Jehoshaphat, '
  - type: note
    content: ch. 18:1
  - type: text
    content: 'and he had great riches and honor. '
  '6':
  - type: text
    content: 'His heart was courageous in the ways of the '
  - type: text
    content: Lord
  - type: text
    content: '. And furthermore, '
  - type: note
    content: '[ch. 15:17; 20:33; 1 Kgs. 22:43]'
  - type: text
    content: he took the high places and the Asherim out of Judah.
  '7':
  - type: text
    content: 'In the third year of his reign he sent his officials, Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah, '
  - type: note
    content: See ch. 35:3
  - type: text
    content: 'to teach in the cities of Judah; '
  '8':
  - type: note
    content: ch. 19:8
  - type: text
    content: 'and with them the Levites, Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tobadonijah; and with these Levites, the priests Elishama and Jehoram. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'they taught in Judah, having the Book of the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' with them. They went about through all the cities of Judah and taught among the people.'
