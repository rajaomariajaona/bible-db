document_id: 2KI.12,59
type_code: eng
verses:
  '1':
  - type: text
    content: In the seventh year of Jehu, Jehoash
  - type: note
    content: Jehoash is an alternate spelling of Joash (son of Ahaziah) as in 11:2; also verses 2, 4, 6, 7, 18
  - type: text
    content: ' began to reign, and he reigned forty years in Jerusalem. His mother’s name was Zibiah of Beersheba. '
  '10':
  - type: text
    content: 'And whenever they saw that there was much money in the chest, the king’s secretary and the high priest came up and they bagged and counted '
  - type: note
    content: '[ch. 22:4]'
  - type: text
    content: 'the money that was found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Then they would give the money that was weighed out into the hands of the workmen who had the oversight of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And they paid it out to the carpenters and the builders who worked on the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '12':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 22:5, 6]'
  - type: text
    content: 'to the masons and the stonecutters, as well as to buy timber and quarried stone for making repairs on the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and for any outlay for the repairs of the house. '
  '13':
  - type: note
    content: '[2 Chr. 24:14]'
  - type: text
    content: 'But there were not made for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 7:50
  - type: text
    content: 'basins of silver, snuffers, bowls, trumpets, or any vessels of gold, or of silver, from the money that was brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '14':
  - type: text
    content: 'for that was given to the workmen who were repairing the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' with it. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: ch. 22:7
  - type: text
    content: 'they did not ask for an accounting from the men into whose hand they delivered the money to pay out to the workmen, for they dealt honestly. '
  '16':
  - type: text
    content: 'The money from '
  - type: note
    content: Lev. 5:15, 18
  - type: text
    content: 'the guilt offerings and the money from the '
  - type: note
    content: Lev. 4:24, 29
  - type: text
    content: 'sin offerings was not brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: Lev. 7:7; Num. 18:19
  - type: text
    content: it belonged to the priests.
  '17':
  - type: text
    content: 'At that time '
  - type: note
    content: ch. 8:12; [1 Kgs. 19:17]
  - type: text
    content: 'Hazael king of Syria went up and fought against Gath and took it. But when Hazael set his face '
  - type: note
    content: '[2 Chr. 24:23, 24]'
  - type: text
    content: 'to go up against Jerusalem, '
  '18':
  - type: text
    content: 'Jehoash king of Judah '
  - type: note
    content: ch. 16:8; 18:15, 16; 1 Kgs. 15:18; [ch. 14:14; 1 Kgs. 14:26]
  - type: text
    content: 'took all the sacred gifts that Jehoshaphat and Jehoram and Ahaziah his fathers, the kings of Judah, had dedicated, '
  - type: note
    content: ver. 4
  - type: text
    content: 'and his own sacred gifts, and all the gold that was found in the treasuries of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and of the king’s house, and sent these to Hazael king of Syria. Then Hazael went away from Jerusalem.'
  - type: heading
    content: The Death of Joash
  '19':
  - type: text
    content: 'Now the rest of the acts of Joash and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '2':
  - type: text
    content: 'And Jehoash did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' all his days, because Jehoiada the priest instructed him. '
  '20':
  - type: note
    content: For ver. 20, 21, see 2 Chr. 24:25-27
  - type: text
    content: 'His servants arose and made a conspiracy '
  - type: note
    content: ch. 14:5
  - type: text
    content: 'and struck down Joash in the house of '
  - type: note
    content: '[2 Sam. 5:9]'
  - type: text
    content: 'Millo, on the way that goes down to Silla. '
  '21':
  - type: text
    content: 'It was '
  - type: note
    content: '[2 Chr. 24:26]'
  - type: text
    content: 'Jozacar the son of Shimeath and Jehozabad the son of '
  - type: note
    content: '[2 Chr. 24:26]'
  - type: text
    content: 'Shomer, his servants, who struck him down, so that he died. And they buried him with his fathers in the city of David, '
  - type: note
    content: ch. 14:1
  - type: text
    content: and Amaziah his son reigned in his place.
  '3':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: ch. 14:4; 15:35; 1 Kgs. 15:14; 22:43
  - type: text
    content: the high places were not taken away; the people continued to sacrifice and make offerings on the high places.
  - type: heading
    content: Jehoash Repairs the Temple
  '4':
  - type: text
    content: 'Jehoash said to the priests, “All the money of the holy things '
  - type: note
    content: ch. 22:4
  - type: text
    content: 'that is brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the money for which each man is assessed—the money from the assessment of persons—and '
  - type: note
    content: '[Ex. 35:5; 1 Chr. 29:9]'
  - type: text
    content: 'the money that a man’s heart prompts him to bring into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '5':
  - type: text
    content: 'let the priests take, each from his donor, and let them repair the house wherever any need of repairs is discovered.” '
  '6':
  - type: text
    content: 'But by the twenty-third year of King Jehoash, the priests had made no repairs on the house. '
  '7':
  - type: text
    content: 'Therefore King Jehoash summoned Jehoiada the priest and the other priests and said to them, “Why are you not repairing the house? Now therefore take no more money from your donors, but hand it over for the repair of the house.” '
  '8':
  - type: text
    content: So the priests agreed that they should take no more money from the people, and that they should not repair the house.
  '9':
  - type: text
    content: 'Then Jehoiada the priest took '
  - type: note
    content: '[Mark 12:41; Luke 21:1]'
  - type: text
    content: 'a chest and bored a hole in the lid of it and set it beside the altar on the right side as one entered the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And the priests who guarded the threshold put in it all the money that was brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
