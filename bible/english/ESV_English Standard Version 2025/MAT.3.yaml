document_id: MAT.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-12, see Mark 1:2-8; Luke 3:2-17
  - type: text
    content: 'In those days '
  - type: note
    content: John 1:6, 7
  - type: text
    content: 'John the Baptist came preaching in '
  - type: note
    content: Josh. 15:61; [Judg. 1:16]
  - type: text
    content: 'the wilderness of Judea, '
  '10':
  - type: text
    content: 'Even now the axe is laid to the root of the trees. '
  - type: note
    content: ch. 7:19; Luke 13:7, 9; John 15:2, 6
  - type: text
    content: Every tree therefore that does not bear good fruit is cut down and thrown into the fire.
  '11':
  - type: text
    content: ' '
  - type: note
    content: John 1:26; Acts 1:5
  - type: text
    content: '“I baptize you with water '
  - type: note
    content: Acts 13:24; 19:4
  - type: text
    content: 'for repentance, but '
  - type: note
    content: John 1:15, 27; 3:30, 31; Acts 13:25
  - type: text
    content: 'he who is coming after me is mightier than I, whose sandals I am not worthy to carry. He will baptize you '
  - type: note
    content: John 1:33; Acts 11:16
  - type: text
    content: 'with the Holy Spirit and '
  - type: note
    content: '[Isa. 4:4; Mal. 3:2, 3; Acts 2:3]'
  - type: text
    content: 'fire. '
  '12':
  - type: text
    content: 'His '
  - type: note
    content: Isa. 30:24
  - type: text
    content: 'winnowing fork is in his hand, and he will clear his threshing floor and '
  - type: note
    content: ch. 13:30
  - type: text
    content: 'gather his wheat into the barn, '
  - type: note
    content: Mal. 4:1
  - type: text
    content: 'but the chaff he will burn with '
  - type: note
    content: Mark 9:43, 48
  - type: text
    content: unquenchable fire.”
  - type: heading
    content: The Baptism of Jesus
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-17, see Mark 1:9-11; Luke 3:21, 22; [ John 1:32-34 ]
  - type: text
    content: 'Then Jesus came '
  - type: note
    content: ch. 2:22
  - type: text
    content: 'from Galilee to the Jordan to John, to be baptized by him. '
  '14':
  - type: note
    content: '[John 13:6]'
  - type: text
    content: 'John would have prevented him, saying, “I need to be baptized by you, and do you come to me?” '
  '15':
  - type: text
    content: 'But Jesus answered him, '
  - type: text
    content: “Let it be so now, for thus it is fitting for us to fulfill all righteousness.”
  - type: text
    content: ' Then he consented. '
  '16':
  - type: text
    content: 'And when Jesus was baptized, immediately he went up from the water, and behold, '
  - type: note
    content: Acts 7:56
  - type: text
    content: the heavens were opened to him,
  - type: note
    content: Some manuscripts omit to him
  - type: text
    content: ' and he '
  - type: note
    content: John 1:32, 33; [Luke 4:18, 21; Acts 10:38]
  - type: text
    content: 'saw the Spirit of God descending like a dove and coming to rest on him; '
  '17':
  - type: text
    content: 'and behold, '
  - type: note
    content: John 12:28
  - type: text
    content: 'a voice from heaven said, '
  - type: note
    content: ch. 17:5; 2 Pet. 1:17; [Ps. 2:7; Isa. 42:1; Eph. 1:6; Col. 1:13; 1 John 5:9]
  - type: text
    content: “This is my beloved Son,
  - type: note
    content: Or my Son, my (or the) Beloved
  - type: text
    content: ' with whom I am well pleased.”'
  '2':
  - type: note
    content: ch. 4:17; Mark 1:15
  - type: text
    content: '“Repent, for '
  - type: note
    content: ch. 10:7; Dan. 2:44; [ch. 6:10]
  - type: text
    content: the kingdom of heaven is at hand.”
  - type: note
    content: Or the kingdom of heaven has come near
  - type: text
    content: ' '
  '3':
  - type: text
    content: For this is he who was spoken of by the prophet Isaiah when he said,
  - type: note
    content: John 1:23; Cited from Isa. 40:3
  - type: text
    content: '“The voice of one crying in the wilderness:'
  - type: note
    content: Luke 1:76
  - type: text
    content: ‘Prepare
  - type: note
    content: 'Or crying: Prepare in the wilderness'
  - type: text
    content: ' the way of the Lord;'
  - type: text
    content: make his paths straight.’”
  '4':
  - type: text
    content: 'Now John wore '
  - type: note
    content: 2 Kgs. 1:8; Zech. 13:4; [Heb. 11:37]
  - type: text
    content: 'a garment of camel’s hair and a leather belt around his waist, and his food was '
  - type: note
    content: Lev. 11:22
  - type: text
    content: 'locusts and '
  - type: note
    content: 1 Sam. 14:26
  - type: text
    content: 'wild honey. '
  '5':
  - type: text
    content: 'Then Jerusalem and all Judea and all the region about the Jordan were going out to him, '
  '6':
  - type: text
    content: 'and they were baptized by him in the river Jordan, '
  - type: note
    content: Acts 19:18
  - type: text
    content: confessing their sins.
  '7':
  - type: text
    content: 'But when he saw many of '
  - type: note
    content: ch. 23:13, 15
  - type: text
    content: 'the Pharisees and '
  - type: note
    content: ch. 22:23
  - type: text
    content: 'Sadducees coming to his baptism, he said to them, '
  - type: note
    content: ch. 12:34; 23:33
  - type: text
    content: '“You brood of '
  - type: note
    content: Ps. 140:3
  - type: text
    content: 'vipers! Who warned you to flee from '
  - type: note
    content: Rom. 5:9; Eph. 5:6; Col. 3:6; 1 Thess. 1:10
  - type: text
    content: 'the wrath to come? '
  '8':
  - type: text
    content: 'Bear fruit '
  - type: note
    content: Acts 26:20
  - type: text
    content: 'in keeping with repentance. '
  '9':
  - type: text
    content: 'And do not presume to say to yourselves, '
  - type: note
    content: John 8:39
  - type: text
    content: '‘We have Abraham as our father,’ for I tell you, God is able from '
  - type: note
    content: '[ch. 4:3]'
  - type: text
    content: 'these stones to raise up children for Abraham. '
