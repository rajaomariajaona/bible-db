document_id: COL.2,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'For I want you to know '
  - type: note
    content: Phil. 1:30
  - type: text
    content: 'how great a '
  - type: note
    content: '[See ch. 1:29 above]'
  - type: text
    content: 'struggle I have for you and for those at Laodicea and for all who have not seen me face to face, '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: Eph. 3:19
  - type: text
    content: 'you have been filled in him, who is '
  - type: note
    content: See Eph. 1:21, 22
  - type: text
    content: 'the head of all rule and authority. '
  '11':
  - type: text
    content: 'In him also '
  - type: note
    content: '[Eph. 2:11]; See Rom. 2:29'
  - type: text
    content: 'you were circumcised with a circumcision made without hands, by '
  - type: note
    content: ver. 15; ch. 3:9
  - type: text
    content: 'putting off the body of the flesh, by the circumcision of Christ, '
  '12':
  - type: note
    content: Rom. 6:4
  - type: text
    content: 'having been buried with him in baptism, in which '
  - type: note
    content: ch. 3:1; [Rom. 6:5]
  - type: text
    content: 'you were also raised with him through faith in '
  - type: note
    content: '[1 Cor. 6:14]; See Acts 2:24; Eph. 1:19'
  - type: text
    content: 'the powerful working of God, '
  - type: note
    content: '[1 Cor. 6:14]; See Acts 2:24; Eph. 1:19'
  - type: text
    content: 'who raised him from the dead. '
  '13':
  - type: note
    content: See Eph. 2:1
  - type: text
    content: 'And you, who were dead in your trespasses and the uncircumcision of your flesh, God '
  - type: note
    content: See Eph. 2:5
  - type: text
    content: 'made alive together with him, having forgiven us all our trespasses, '
  '14':
  - type: text
    content: 'by '
  - type: note
    content: See Acts 3:19
  - type: text
    content: 'canceling '
  - type: note
    content: See Rom. 7:4
  - type: text
    content: 'the record of debt that stood against us with its legal demands. This he set aside, nailing it to the cross. '
  '15':
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: He disarmed the rulers and authorities
  - type: note
    content: Probably demonic rulers and authorities
  - type: text
    content: ' and '
  - type: note
    content: '[Gen. 3:15; Ps. 68:18; Isa. 53:12; Matt. 12:29; Luke 10:18; John 12:31; 16:11; Eph. 4:8; Heb. 2:14]'
  - type: text
    content: 'put them to open shame, by '
  - type: note
    content: Eph. 2:16
  - type: text
    content: triumphing over them in him.
  - type: note
    content: Or in it (that is, the cross)
  - type: heading
    content: Let No One Disqualify You
  '16':
  - type: text
    content: 'Therefore let no one '
  - type: note
    content: Rom. 14:3, 10, 13
  - type: text
    content: 'pass judgment on you '
  - type: note
    content: Rom. 14:17; Heb. 9:10; See Lev. 11:2
  - type: text
    content: 'in questions of food and drink, or with regard to '
  - type: note
    content: Lev. 23:2; Rom. 14:5
  - type: text
    content: 'a festival or '
  - type: note
    content: '[Mark 2:28]; See Num. 28:11'
  - type: text
    content: 'a new moon or a Sabbath. '
  '17':
  - type: note
    content: Heb. 8:5; 10:1
  - type: text
    content: 'These are a shadow of the things to come, but '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'the substance belongs to Christ. '
  '18':
  - type: text
    content: 'Let no one '
  - type: note
    content: 1 Cor. 9:24
  - type: text
    content: 'disqualify you, '
  - type: note
    content: ver. 23
  - type: text
    content: 'insisting on asceticism and worship of angels, '
  - type: note
    content: '[Ezek. 13:7; 1 Tim. 1:7]'
  - type: text
    content: going on in detail about visions,
  - type: note
    content: Or about the things he has seen
  - type: text
    content: ' '
  - type: note
    content: '[Eph. 4:17]'
  - type: text
    content: 'puffed up without reason by '
  - type: note
    content: '[Rom. 8:7]'
  - type: text
    content: 'his sensuous mind, '
  '19':
  - type: text
    content: 'and '
  - type: note
    content: See Eph. 4:15, 16
  - type: text
    content: 'not '
  - type: note
    content: Rev. 2:13; 3:11
  - type: text
    content: holding fast to the Head, from whom the whole body, nourished and knit together through its joints and ligaments, grows with a growth that is from God.
  '2':
  - type: text
    content: 'that '
  - type: note
    content: ch. 4:8; Eph. 6:22
  - type: text
    content: 'their hearts may be encouraged, being '
  - type: note
    content: '[ch. 3:14]'
  - type: text
    content: 'knit together in love, to reach all the riches of full assurance of understanding and the knowledge of '
  - type: note
    content: See ch. 1:27
  - type: text
    content: 'God’s mystery, which is Christ, '
  '20':
  - type: text
    content: 'If with Christ '
  - type: note
    content: See Rom. 6:2
  - type: text
    content: 'you died to the '
  - type: note
    content: ver. 8
  - type: text
    content: 'elemental spirits of the world, '
  - type: note
    content: '[Gal. 4:9]'
  - type: text
    content: 'why, as if you were still alive in the world, do you submit to regulations— '
  '21':
  - type: note
    content: ver. 16; 1 Tim. 4:3
  - type: text
    content: '“Do not handle, Do not taste, Do not touch” '
  '22':
  - type: text
    content: (
  - type: note
    content: 1 Cor. 6:13
  - type: text
    content: 'referring to things that all perish as they are used)—according to '
  - type: note
    content: Isa. 29:13; Matt. 15:9; [Titus 1:14]
  - type: text
    content: 'human precepts and teachings? '
  '23':
  - type: text
    content: 'These have indeed an appearance of wisdom in '
  - type: note
    content: ver. 18
  - type: text
    content: 'promoting self-made religion and asceticism and severity to the body, but they are '
  - type: note
    content: '[1 Tim. 4:8]'
  - type: text
    content: of no value in stopping the indulgence of the flesh.
  '3':
  - type: note
    content: Isa. 11:2; 45:3; 1 Cor. 1:24, 30; 2:6, 7; [Luke 11:49; Eph. 1:8]
  - type: text
    content: 'in whom are hidden all the treasures of wisdom and knowledge. '
  '4':
  - type: text
    content: 'I say this in order '
  - type: note
    content: Rom. 16:18; [Eph. 5:6; 2 Pet. 2:3]
  - type: text
    content: 'that no one may delude you with plausible arguments. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 5:3
  - type: text
    content: 'though I am absent in body, yet I am with you in spirit, rejoicing to see your '
  - type: note
    content: 1 Cor. 14:40
  - type: text
    content: 'good order and '
  - type: note
    content: 1 Pet. 5:9
  - type: text
    content: the firmness of your faith in Christ.
  - type: heading
    content: Alive in Christ
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:10; 1 Thess. 4:1
  - type: text
    content: 'Therefore, as you received Christ Jesus the Lord, so walk in him, '
  '7':
  - type: note
    content: Eph. 3:17
  - type: text
    content: 'rooted and '
  - type: note
    content: Acts 20:32; Eph. 2:20; See 1 Cor. 3:9
  - type: text
    content: 'built up in him and '
  - type: note
    content: Heb. 13:9
  - type: text
    content: 'established in the faith, just '
  - type: note
    content: Eph. 4:21
  - type: text
    content: 'as you were taught, abounding '
  - type: note
    content: ch. 4:2; Eph. 5:20
  - type: text
    content: in thanksgiving.
  '8':
  - type: text
    content: 'See to it that no one takes you captive by '
  - type: note
    content: '[1 Tim. 6:20]'
  - type: text
    content: 'philosophy and '
  - type: note
    content: Eph. 5:6
  - type: text
    content: 'empty deceit, according to '
  - type: note
    content: See Matt. 15:2
  - type: text
    content: 'human tradition, according to the '
  - type: note
    content: ver. 20
  - type: text
    content: elemental spirits
  - type: note
    content: Or elementary principles; also verse 20
  - type: text
    content: ' of the world, and not according to Christ. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: ch. 1:19; John 1:14
  - type: text
    content: 'in him the whole fullness of deity dwells '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'bodily, '
