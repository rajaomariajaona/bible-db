document_id: ACT.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and Barnabas at Iconium
  - type: text
    content: 'Now at Iconium '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'they entered together into the Jewish synagogue and spoke in such a way that a great number of both Jews and Greeks believed. '
  '10':
  - type: text
    content: 'said in a loud voice, “Stand upright on your feet.” And he '
  - type: note
    content: ch. 3:8; Isa. 35:6
  - type: text
    content: 'sprang up and began walking. '
  '11':
  - type: text
    content: 'And when the crowds saw what Paul had done, they lifted up their voices, saying in Lycaonian, '
  - type: note
    content: ch. 8:10; 28:6
  - type: text
    content: '“The gods have come down to us in the likeness of men!” '
  '12':
  - type: text
    content: 'Barnabas they called '
  - type: note
    content: '[ch. 19:35; 28:11 (Gk.)]'
  - type: text
    content: 'Zeus, and Paul, Hermes, because he was the chief speaker. '
  '13':
  - type: text
    content: 'And the priest of '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Zeus, whose temple was at the entrance to the city, brought oxen and garlands to the gates and '
  - type: note
    content: '[Dan. 2:46]'
  - type: text
    content: 'wanted to offer sacrifice with the crowds. '
  '14':
  - type: text
    content: 'But when the apostles Barnabas and Paul heard of it, they '
  - type: note
    content: See Gen. 37:29
  - type: text
    content: 'tore their garments and rushed out into the crowd, crying out, '
  '15':
  - type: text
    content: '“Men, '
  - type: note
    content: See ch. 10:26
  - type: text
    content: 'why are you doing these things? We also are men, '
  - type: note
    content: James 5:17
  - type: text
    content: 'of like nature with you, and we bring you good news, that '
  - type: note
    content: ch. 15:19; 26:18, 20; Luke 1:16; 1 Thess. 1:9; [ch. 15:3; James 5:19, 20]; See ch. 9:35
  - type: text
    content: 'you should turn from these '
  - type: note
    content: Deut. 32:21; 1 Sam. 12:21; Jer. 14:22; [1 Cor. 8:4]
  - type: text
    content: 'vain things to '
  - type: note
    content: See Matt. 16:16
  - type: text
    content: 'a living God, '
  - type: note
    content: ch. 17:24; Gen. 1:1; Ex. 20:11; Ps. 146:6; Rev. 4:11; 10:6; 14:7
  - type: text
    content: 'who made the heaven and the earth and the sea and all that is in them. '
  '16':
  - type: text
    content: 'In past generations he '
  - type: note
    content: '[ch. 17:30; 1 Pet. 4:3]'
  - type: text
    content: 'allowed all the nations '
  - type: note
    content: '[Ps. 81:13; Mic. 4:5]'
  - type: text
    content: 'to walk in their own ways. '
  '17':
  - type: text
    content: 'Yet '
  - type: note
    content: '[ch. 17:27; Rom. 1:19, 20]'
  - type: text
    content: 'he did not leave himself without witness, for he '
  - type: note
    content: Num. 10:32
  - type: text
    content: 'did good by '
  - type: note
    content: Lev. 26:4; Deut. 11:14; 28:12; Job 5:10; Ps. 65:10; 147:8, 18; Ezek. 34:26; Joel 2:23
  - type: text
    content: 'giving you rains from heaven and '
  - type: note
    content: Ps. 67:6; 85:12; Ezek. 34:27; Joel 2:24; Zech. 8:12
  - type: text
    content: 'fruitful seasons, satisfying your hearts with '
  - type: note
    content: Ps. 104:27
  - type: text
    content: 'food and '
  - type: note
    content: Ps. 104:15
  - type: text
    content: 'gladness.” '
  '18':
  - type: text
    content: Even with these words they scarcely restrained the people from offering sacrifice to them.
  - type: heading
    content: Paul Stoned at Lystra
  '19':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:45, 50
  - type: text
    content: 'But Jews came from Antioch and Iconium, and having persuaded the crowds, '
  - type: note
    content: 2 Cor. 11:25; [ver. 5; 2 Tim. 3:11]; See ch. 7:58
  - type: text
    content: 'they stoned Paul and dragged him out of the city, supposing that he was dead. '
  '2':
  - type: note
    content: See ch. 13:50
  - type: text
    content: 'But the '
  - type: note
    content: ch. 19:9; John 3:36; Rom. 15:31
  - type: text
    content: 'unbelieving Jews stirred up the Gentiles and poisoned their minds against '
  - type: note
    content: See John 21:23
  - type: text
    content: the brothers.
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'But when the disciples gathered about him, he rose up and entered the city, and on the next day he went on with Barnabas to Derbe. '
  '21':
  - type: text
    content: 'When they had preached the gospel to that city and had '
  - type: note
    content: Matt. 28:19
  - type: text
    content: 'made many disciples, they returned to Lystra and to Iconium and to Antioch, '
  '22':
  - type: note
    content: ch. 15:32, 41; [ch. 18:23; 1 Thess. 3:2, 13]
  - type: text
    content: 'strengthening the souls of the disciples, encouraging them '
  - type: note
    content: ch. 13:43; Col. 1:23
  - type: text
    content: 'to continue in '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'the faith, and saying that '
  - type: note
    content: John 15:20; 16:33; 1 Thess. 3:3; 2 Tim. 3:12; [ch. 9:16; Mark 10:30; Luke 22:28, 29; Rom. 8:17; Phil. 1:20; 2 Thess. 1:5; 2 Tim. 2:12; 1 Pet. 5:10; Rev. 1:9]
  - type: text
    content: 'through many tribulations we must enter the kingdom of God. '
  '23':
  - type: text
    content: 'And when they had '
  - type: note
    content: '[Titus 1:5]'
  - type: text
    content: 'appointed '
  - type: note
    content: See ch. 11:30
  - type: text
    content: 'elders for them in every church, with prayer and fasting '
  - type: note
    content: ch. 20:32
  - type: text
    content: they committed them to the Lord in whom they had believed.
  - type: heading
    content: Paul and Barnabas Return to Antioch in Syria
  '24':
  - type: text
    content: 'Then they passed through Pisidia and came to Pamphylia. '
  '25':
  - type: text
    content: 'And when they had spoken the word in Perga, they went down to Attalia, '
  '26':
  - type: text
    content: 'and from there they sailed to Antioch, '
  - type: note
    content: ch. 13:3
  - type: text
    content: 'where they had been '
  - type: note
    content: ch. 15:40
  - type: text
    content: 'commended to the grace of God for the work that they had fulfilled. '
  '27':
  - type: text
    content: 'And when they arrived and gathered the church together, '
  - type: note
    content: ch. 15:4; [ch. 15:3, 12; 21:19]
  - type: text
    content: 'they declared all that God had done with them, and '
  - type: note
    content: '[ch. 11:18]'
  - type: text
    content: 'how he had '
  - type: note
    content: 1 Cor. 16:9; 2 Cor. 2:12; Col. 4:3; Rev. 3:8
  - type: text
    content: 'opened '
  - type: note
    content: '[Hos. 2:15]'
  - type: text
    content: 'a door of faith to the Gentiles. '
  '28':
  - type: text
    content: And they remained no little time with the disciples.
  '3':
  - type: text
    content: 'So they remained for a long time, speaking boldly for '
  - type: note
    content: ch. 15:8; Heb. 2:4; [Mark 16:20]
  - type: text
    content: 'the Lord, who bore witness to '
  - type: note
    content: ch. 20:32
  - type: text
    content: 'the word of his grace, '
  - type: note
    content: ch. 4:29, 30
  - type: text
    content: 'granting signs and wonders to be done by their hands. '
  '4':
  - type: text
    content: 'But the people of the city '
  - type: note
    content: '[ch. 23:7]'
  - type: text
    content: 'were divided; '
  - type: note
    content: '[ch. 17:4, 5; 19:9; 28:24]'
  - type: text
    content: 'some sided with the Jews and some with the apostles. '
  '5':
  - type: text
    content: 'When an attempt was made by both Gentiles and Jews, with their rulers, '
  - type: note
    content: 1 Thess. 2:2; [2 Cor. 12:10]
  - type: text
    content: 'to mistreat them and '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'to stone them, '
  '6':
  - type: text
    content: 'they learned of it and '
  - type: note
    content: See Matt. 10:23
  - type: text
    content: 'fled to '
  - type: note
    content: 2 Tim. 3:11
  - type: text
    content: 'Lystra and Derbe, cities of Lycaonia, and to the surrounding country, '
  '7':
  - type: text
    content: and there they continued to preach the gospel.
  - type: heading
    content: Paul and Barnabas at Lystra
  '8':
  - type: text
    content: 'Now at Lystra there was a man sitting who could not use his feet. He was '
  - type: note
    content: ch. 3:2
  - type: text
    content: 'crippled from birth and had never walked. '
  '9':
  - type: text
    content: 'He listened to Paul speaking. And Paul, looking intently at him and '
  - type: note
    content: See Matt. 9:2
  - type: text
    content: seeing that he had faith to be made well,
  - type: note
    content: Or be saved
  - type: text
    content: ' '
