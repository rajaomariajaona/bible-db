document_id: 1CH.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Anointed King
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see 2 Sam. 5:1-3, 6-10
  - type: text
    content: 'Then all Israel gathered together to David at Hebron and said, “Behold, we are your bone and flesh. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10-41, see 2 Sam. 23:8-39
  - type: text
    content: 'Now these are the chiefs of David’s mighty men, who gave him strong support in his kingdom, together with all Israel, to make him king, '
  - type: note
    content: ver. 3
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Israel. '
  '11':
  - type: text
    content: 'This is an account of David’s mighty men: '
  - type: note
    content: '[2 Sam. 23:8]'
  - type: text
    content: 'Jashobeam, a '
  - type: note
    content: '[2 Sam. 23:8]'
  - type: text
    content: 'Hachmonite, was '
  - type: note
    content: '[ch. 12:18]'
  - type: text
    content: chief of the three.
  - type: note
    content: Compare 2 Samuel 23:8; Hebrew thirty, or captains
  - type: text
    content: ' He wielded his spear against 300 whom he killed at one time.'
  '12':
  - type: text
    content: 'And next to him among the three mighty men was Eleazar the son of '
  - type: note
    content: '[ch. 27:4]'
  - type: text
    content: 'Dodo, the Ahohite. '
  '13':
  - type: text
    content: 'He was with David at Pas-dammim '
  - type: note
    content: '[2 Sam. 23:11, 12]'
  - type: text
    content: 'when the Philistines were gathered there for battle. There was a plot of ground full of barley, and the men fled from the Philistines. '
  '14':
  - type: text
    content: But he took his
  - type: note
    content: Compare 2 Samuel 23:12; Hebrew they . . . their
  - type: text
    content: ' stand in the midst of the plot and defended it and killed the Philistines. And the '
  - type: text
    content: Lord
  - type: text
    content: ' saved them by a great victory.'
  '15':
  - type: text
    content: 'Three of the thirty chief men went down to the rock to David at the cave of Adullam, when the army of Philistines was encamped in the '
  - type: note
    content: ch. 14:8
  - type: text
    content: 'Valley of Rephaim. '
  '16':
  - type: text
    content: 'David was then in the stronghold, and the '
  - type: note
    content: '[1 Sam. 10:5]'
  - type: text
    content: 'garrison of the Philistines was then at Bethlehem. '
  '17':
  - type: text
    content: 'And David said longingly, “Oh that someone would give me water to drink from the well of Bethlehem that is by the gate!” '
  '18':
  - type: text
    content: 'Then the three mighty men broke through the camp of the Philistines and drew water out of the well of Bethlehem that was by the gate and took it and brought it to David. But David would not drink it. He poured it out to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '19':
  - type: text
    content: and said, “Far be it from me before my God that I should do this. Shall I drink the lifeblood of these men? For at the risk of their lives they brought it.” Therefore he would not drink it. These things did the three mighty men.
  '2':
  - type: text
    content: 'In times past, even when Saul was king, it was you who led out and brought in Israel. And the '
  - type: text
    content: Lord
  - type: text
    content: ' your God said to you, '
  - type: note
    content: Ezek. 34:23
  - type: text
    content: '‘You shall be shepherd of my people Israel, and you shall be prince over my people Israel.’” '
  '20':
  - type: text
    content: Now Abishai, the brother of Joab, was chief of the thirty.
  - type: note
    content: Syriac; Hebrew three
  - type: text
    content: ' And he wielded his spear against 300 men and killed them and won a name beside the three. '
  '21':
  - type: text
    content: He was the most renowned
  - type: note
    content: Compare 2 Samuel 23:19; Hebrew more renowned among the two
  - type: text
    content: ' of the thirty'
  - type: note
    content: Syriac; Hebrew three
  - type: text
    content: ' and became their commander, but he did not attain to the three.'
  '22':
  - type: text
    content: And Benaiah the son of Jehoiada was a valiant man
  - type: note
    content: Syriac; Hebrew the son of a valiant man
  - type: text
    content: ' of Kabzeel, a doer of great deeds. He struck down two heroes of Moab. He also went down and struck down a lion in a pit on a day when snow had fallen. '
  '23':
  - type: text
    content: And he struck down an Egyptian, a man of great stature, five cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' tall. The Egyptian had in his hand a spear '
  - type: note
    content: 1 Sam. 17:7
  - type: text
    content: 'like a weaver’s beam, but Benaiah went down to him with a staff and snatched the spear out of the Egyptian’s hand and killed him with his own spear. '
  '24':
  - type: text
    content: 'These things did Benaiah the son of Jehoiada and won a name beside the three mighty men. '
  '25':
  - type: text
    content: He was renowned among the thirty, but he did not attain to the three. And David set him over his bodyguard.
  '26':
  - type: text
    content: 'The mighty men were '
  - type: note
    content: ch. 27:7
  - type: text
    content: 'Asahel the brother of Joab, Elhanan the son of Dodo of Bethlehem, '
  '27':
  - type: text
    content: Shammoth of Harod,
  - type: note
    content: Compare 2 Samuel 23:25; Hebrew the Harorite
  - type: text
    content: ' Helez the Pelonite, '
  '28':
  - type: text
    content: 'Ira the son of Ikkesh of Tekoa, Abiezer of Anathoth, '
  '29':
  - type: text
    content: 'Sibbecai the Hushathite, Ilai the Ahohite, '
  '3':
  - type: text
    content: 'So all the elders of Israel came to the king at Hebron, and David made a covenant with them at Hebron before the '
  - type: text
    content: Lord
  - type: text
    content: '. And they anointed David king over Israel, '
  - type: note
    content: ver. 10; ch. 12:23; 1 Sam. 16:1, 3, 12, 13
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' by Samuel.'
  - type: heading
    content: David Takes Jerusalem
  '30':
  - type: text
    content: 'Maharai of Netophah, Heled the son of Baanah of Netophah, '
  '31':
  - type: text
    content: 'Ithai the son of Ribai of Gibeah of the people of Benjamin, Benaiah of Pirathon, '
  '32':
  - type: text
    content: 'Hurai of the brooks of Gaash, Abiel the Arbathite, '
  '33':
  - type: text
    content: 'Azmaveth of Baharum, Eliahba the Shaalbonite, '
  '34':
  - type: text
    content: Hashem
  - type: note
    content: Compare Septuagint and 2 Samuel 23:32; Hebrew the sons of Hashem
  - type: text
    content: ' the Gizonite, Jonathan the son of Shagee the Hararite, '
  '35':
  - type: text
    content: 'Ahiam the son of Sachar the Hararite, Eliphal the son of Ur, '
  '36':
  - type: text
    content: 'Hepher the Mecherathite, Ahijah the Pelonite, '
  '37':
  - type: text
    content: 'Hezro of Carmel, Naarai the son of Ezbai, '
  '38':
  - type: text
    content: 'Joel the brother of Nathan, Mibhar the son of '
  - type: note
    content: '[ch. 5:10]'
  - type: text
    content: 'Hagri, '
  '39':
  - type: text
    content: 'Zelek the Ammonite, Naharai of Beeroth, the armor-bearer of Joab the son of Zeruiah, '
  '4':
  - type: text
    content: 'And David and all Israel went to Jerusalem, '
  - type: note
    content: See Josh. 15:8
  - type: text
    content: 'that is, Jebus, where the Jebusites were, '
  - type: note
    content: Judg. 1:21
  - type: text
    content: 'the inhabitants of the land. '
  '40':
  - type: text
    content: 'Ira the Ithrite, Gareb the Ithrite, '
  '41':
  - type: text
    content: 'Uriah the Hittite, '
  - type: note
    content: '[ch. 2:36]'
  - type: text
    content: 'Zabad the son of Ahlai, '
  '42':
  - type: text
    content: 'Adina the son of Shiza the Reubenite, a leader of the Reubenites, and thirty with him, '
  '43':
  - type: text
    content: 'Hanan the son of Maacah, and Joshaphat the Mithnite, '
  '44':
  - type: text
    content: 'Uzzia the Ashterathite, Shama and Jeiel the sons of Hotham the Aroerite, '
  '45':
  - type: text
    content: 'Jediael the son of Shimri, and Joha his brother, the Tizite, '
  '46':
  - type: text
    content: 'Eliel the Mahavite, and Jeribai, and Joshaviah, the sons of Elnaam, and Ithmah the Moabite, '
  '47':
  - type: text
    content: Eliel, and Obed, and Jaasiel the Mezobaite.
  '5':
  - type: text
    content: 'The inhabitants of Jebus said to David, “You will not come in here.” Nevertheless, David took the stronghold of Zion, that is, the city of David. '
  '6':
  - type: text
    content: 'David said, “Whoever strikes the Jebusites first '
  - type: note
    content: 2 Sam. 8:16
  - type: text
    content: 'shall be chief and commander.” And Joab the son of Zeruiah went up first, so he became chief. '
  '7':
  - type: text
    content: 'And David lived in the stronghold; therefore it was called the city of David. '
  '8':
  - type: text
    content: 'And he built the city all around from the Millo in complete circuit, and Joab repaired the rest of the city. '
  '9':
  - type: text
    content: 'And David '
  - type: note
    content: Esth. 9:4
  - type: text
    content: 'became greater and greater, for the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts was with him.'
  - type: heading
    content: David’s Mighty Men
