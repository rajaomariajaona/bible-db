document_id: EZK.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Pharaoh to Be Slain
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the eleventh year, in the third month, on the first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: it
  - type: note
    content: Syriac, Vulgate; Hebrew you
  - type: text
    content: ' towered high and set its top among the clouds,'
  - type: note
    content: Or its top through the thick boughs
  - type: text
    content: ' and '
  - type: note
    content: Dan. 5:20; [Isa. 10:12]
  - type: text
    content: 'its heart was proud of its height, '
  '11':
  - type: text
    content: 'I will give it into the hand of a mighty one of the nations. He shall surely deal with it as its wickedness deserves. I have cast it out. '
  '12':
  - type: note
    content: See ch. 28:7
  - type: text
    content: 'Foreigners, '
  - type: note
    content: See ch. 28:7
  - type: text
    content: 'the most ruthless of nations, have cut it down and left it. '
  - type: note
    content: '[ch. 32:5]'
  - type: text
    content: 'On the mountains and in all the valleys its branches have fallen, and its boughs have been broken in all '
  - type: note
    content: '[ch. 6:3]'
  - type: text
    content: 'the ravines of the land, and '
  - type: note
    content: '[Dan. 4:14]'
  - type: text
    content: 'all the peoples of the earth have gone away from its shadow and left it. '
  '13':
  - type: note
    content: ch. 32:4
  - type: text
    content: 'On its fallen trunk dwell all the birds of the heavens, and on its branches are all the beasts of the field. '
  '14':
  - type: note
    content: '[ver. 5]'
  - type: text
    content: All this is in order that no trees by the waters may grow to towering height or set their tops among the clouds,
  - type: note
    content: Or their tops through the thick boughs
  - type: text
    content: ' and that no trees that drink water may reach up to them in height. For they are all given over to death, '
  - type: note
    content: '[ver. 16, 18; ch. 26:20; 32:18, 24]'
  - type: text
    content: 'to the world '
  - type: note
    content: Ps. 63:9
  - type: text
    content: below, among the children of man,
  - type: note
    content: Or of Adam
  - type: text
    content: ' with those who go down to the pit.'
  '15':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': On the day '
  - type: note
    content: '[ch. 32:18, 21; Isa. 14:9, 10]'
  - type: text
    content: the cedar
  - type: note
    content: Hebrew it
  - type: text
    content: ' went down to Sheol I caused mourning; I closed the deep over it, and restrained its rivers, and many waters were stopped. I clothed Lebanon in gloom for it, and all the trees of the field fainted because of it. '
  '16':
  - type: note
    content: '[ch. 26:15]'
  - type: text
    content: 'I made the nations quake at the sound of its fall, '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'when I cast it down to Sheol with those who go down to the pit. '
  - type: note
    content: ver. 9; [Isa. 14:8]
  - type: text
    content: 'And all the trees of Eden, the choice and best of Lebanon, all that drink water, '
  - type: note
    content: '[ch. 32:31]'
  - type: text
    content: 'were comforted in the world below. '
  '17':
  - type: text
    content: 'They also went down to Sheol with it, '
  - type: note
    content: ch. 32:20, 21; 35:8
  - type: text
    content: 'to those who are slain by the sword; yes, '
  - type: note
    content: '[ch. 30:5, 6, 8]'
  - type: text
    content: 'those who were its arm, '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: who lived under its shadow among the nations.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: '“Whom are you thus like in glory and in greatness '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'among the trees of Eden? '
  - type: note
    content: '[Matt. 11:23; Luke 10:15]'
  - type: text
    content: 'You shall be brought down with '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'the trees of Eden to the world below. '
  - type: note
    content: ch. 28:10; 32:19, 21, 24, 25, 28
  - type: text
    content: 'You shall lie among the uncircumcised, '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: with those who are slain by the sword.
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: '“This is Pharaoh and all his multitude, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, say to Pharaoh king of Egypt and to '
  - type: note
    content: '[ch. 29:19; 30:4; 32:12, 16, 20, 31, 32]'
  - type: text
    content: 'his multitude:'
  - type: note
    content: '[ver. 18; ch. 32:19 ]'
  - type: text
    content: “Whom are you like in your greatness?
  '3':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[Isa. 10:34]; See Dan. 4:10, 20-22'
  - type: text
    content: 'Assyria was a '
  - type: note
    content: See Judg. 9:15
  - type: text
    content: 'cedar in '
  - type: note
    content: '[ver. 15, 16]'
  - type: text
    content: Lebanon,
  - type: text
    content: 'with beautiful branches and '
  - type: note
    content: '[ch. 17:23]'
  - type: text
    content: forest shade,
  - type: note
    content: '[ Isa. 10:33 ]'
  - type: text
    content: and of towering height,
  - type: text
    content: its top among the clouds.
  - type: note
    content: Or its top went through the thick boughs
  '4':
  - type: text
    content: The waters nourished it;
  - type: text
    content: the deep made it grow tall,
  - type: text
    content: 'making '
  - type: note
    content: '[ch. 17:7]'
  - type: text
    content: its rivers flow
  - type: text
    content: around the place of its planting,
  - type: text
    content: sending forth its streams
  - type: text
    content: to all the trees of the field.
  '5':
  - type: text
    content: 'So '
  - type: note
    content: '[Dan. 4:11]'
  - type: text
    content: it towered high
  - type: text
    content: above all the trees of the field;
  - type: text
    content: its boughs grew large
  - type: text
    content: and its branches long
  - type: text
    content: 'from '
  - type: note
    content: ch. 17:5; [Ps. 1:3]
  - type: text
    content: abundant water in its shoots.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:23; Dan. 4:12, 21
  - type: text
    content: All the birds of the heavens
  - type: text
    content: made their nests in its boughs;
  - type: text
    content: under its branches all the beasts of the field
  - type: text
    content: gave birth to their young,
  - type: text
    content: and under its shadow
  - type: text
    content: lived all great nations.
  '7':
  - type: text
    content: 'It was '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: beautiful in its greatness,
  - type: text
    content: in the length of its branches;
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: for its roots went down
  - type: text
    content: to abundant waters.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Amos 2:9 ]'
  - type: text
    content: 'The cedars '
  - type: note
    content: ch. 28:13; [ver. 16, 18]
  - type: text
    content: in the garden of God could not rival it,
  - type: text
    content: nor the fir trees equal its boughs;
  - type: text
    content: neither were the plane trees
  - type: text
    content: like its branches;
  - type: text
    content: 'no tree '
  - type: note
    content: ch. 28:13; [ver. 16, 18]
  - type: text
    content: in the garden of God
  - type: text
    content: was its equal in beauty.
  '9':
  - type: text
    content: I made it beautiful
  - type: text
    content: in the mass of its branches,
  - type: text
    content: 'and all the trees of '
  - type: note
    content: See Isa. 51:3
  - type: text
    content: Eden envied it,
  - type: text
    content: that were in the garden of God.
