document_id: ISA.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Judgment of Babylon
  - type: text
    content: 'The oracle concerning '
  - type: note
    content: ver. 19; ch. 14:4; 21:9; 47:1; See Jer. 51–52
  - type: text
    content: 'Babylon which '
  - type: note
    content: ch. 1:1
  - type: text
    content: Isaiah the son of Amoz saw.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 34:4 ]'
  - type: text
    content: For the stars of the heavens and their constellations
  - type: text
    content: will not give their light;
  - type: note
    content: Ezek. 32:7; Joel 2:31; 3:15; Matt. 24:29; Mark 13:24; Luke 21:25
  - type: text
    content: the sun will be dark at its rising,
  - type: text
    content: and the moon will not shed its light.
  '11':
  - type: text
    content: 'I will punish '
  - type: note
    content: ch. 24:21
  - type: text
    content: the world for its evil,
  - type: text
    content: and the wicked for their iniquity;
  - type: text
    content: 'I will '
  - type: note
    content: '[ch. 24:4]'
  - type: text
    content: put an end to the pomp of the arrogant,
  - type: note
    content: '[ch. 2:11, 17 ]'
  - type: text
    content: and lay low the pompous pride of the ruthless.
  '12':
  - type: text
    content: 'I will make '
  - type: note
    content: ch. 24:6
  - type: text
    content: people more rare than fine gold,
  - type: text
    content: 'and mankind than the '
  - type: note
    content: 1 Kgs. 10:11; Job 28:16
  - type: text
    content: gold of Ophir.
  '13':
  - type: text
    content: 'Therefore '
  - type: note
    content: Hag. 2:6
  - type: text
    content: I will make the heavens tremble,
  - type: text
    content: and the earth will be shaken out of its place,
  - type: text
    content: 'at the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: in the day of his fierce anger.
  '14':
  - type: text
    content: And like a hunted gazelle,
  - type: text
    content: or like sheep with none to gather them,
  - type: note
    content: Jer. 50:16; 51:9; [ 1 Kgs. 22:36 ]
  - type: text
    content: each will turn to his own people,
  - type: text
    content: and each will flee to his own land.
  '15':
  - type: text
    content: Whoever is found will be thrust through,
  - type: text
    content: and whoever is caught will fall by the sword.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps. 137:9; Nah. 3:10
  - type: text
    content: Their infants will be dashed in pieces
  - type: text
    content: before their eyes;
  - type: text
    content: their houses will be plundered
  - type: text
    content: and their wives ravished.
  '17':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 21:2; Jer. 51:11, 28; Dan. 5:28, 31
  - type: text
    content: I am stirring up the Medes against them,
  - type: text
    content: who have no regard for silver
  - type: text
    content: and do not delight in gold.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Jer. 50:14, 29; 51:3
  - type: text
    content: Their bows will slaughter
  - type: note
    content: Hebrew dash in pieces
  - type: text
    content: ' the young men;'
  - type: text
    content: they will have no mercy on the fruit of the womb;
  - type: text
    content: their eyes will not pity children.
  '19':
  - type: text
    content: 'And Babylon, '
  - type: note
    content: '[ch. 47:5]'
  - type: text
    content: the glory of kingdoms,
  - type: text
    content: the splendor and pomp of the Chaldeans,
  - type: text
    content: 'will be '
  - type: note
    content: ch. 1:9; Gen. 19:24; Jer. 50:40; Amos 4:11
  - type: text
    content: like Sodom and Gomorrah
  - type: text
    content: when God overthrew them.
  '2':
  - type: text
    content: 'On a bare hill '
  - type: note
    content: ch. 5:26
  - type: text
    content: raise a signal;
  - type: text
    content: cry aloud to them;
  - type: text
    content: 'wave the hand for '
  - type: note
    content: '[ch. 41:25]'
  - type: text
    content: them to enter
  - type: text
    content: the gates of the nobles.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Jer. 51:37, 43
  - type: text
    content: It will never be inhabited
  - type: text
    content: or lived in for all generations;
  - type: text
    content: 'no '
  - type: note
    content: Jer. 3:2
  - type: text
    content: Arab will pitch his tent there;
  - type: text
    content: 'no '
  - type: note
    content: Jer. 33:12
  - type: text
    content: shepherds will make their flocks lie down there.
  '21':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 34:13, 14]'
  - type: text
    content: wild animals will lie down there,
  - type: text
    content: and their houses will be full of howling creatures;
  - type: text
    content: 'there '
  - type: note
    content: ch. 34:13; Jer. 50:39
  - type: text
    content: ostriches
  - type: note
    content: Or owls
  - type: text
    content: ' will dwell,'
  - type: text
    content: and there wild goats will dance.
  '22':
  - type: text
    content: Hyenas
  - type: note
    content: Or foxes
  - type: text
    content: ' will cry in its towers,'
  - type: text
    content: 'and '
  - type: note
    content: ch. 35:7; Jer. 51:37
  - type: text
    content: 'jackals in '
  - type: note
    content: '[ch. 25:2; Amos 3:15]'
  - type: text
    content: the pleasant palaces;
  - type: text
    content: its time is close at hand
  - type: text
    content: and its days will not be prolonged.
  '3':
  - type: text
    content: I myself have commanded my consecrated ones,
  - type: text
    content: and have summoned my mighty men to execute my anger,
  - type: text
    content: my proudly exulting ones.
  - type: note
    content: Or those who exult in my majesty
  '4':
  - type: text
    content: 'The sound '
  - type: note
    content: '[ch. 22:5]'
  - type: text
    content: of a tumult is on the mountains
  - type: text
    content: as of a great multitude!
  - type: text
    content: The sound of an uproar of kingdoms,
  - type: text
    content: of nations gathering together!
  - type: note
    content: '[ Josh. 5:13, 14 ]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is mustering'
  - type: text
    content: a host for battle.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 46:11 ]'
  - type: text
    content: They come from a distant land,
  - type: text
    content: from the end of the heavens,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' and the weapons of his indignation,'
  - type: text
    content: to destroy the whole land.
  - type: note
    content: Or earth; also verse 9
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:31; 15:2, 3, 8; 16:7; Jer. 51:8; Ezek. 30:2
  - type: text
    content: 'Wail, for '
  - type: note
    content: ch. 2:12; Joel 1:15; Zeph. 1:7
  - type: text
    content: 'the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near;'
  - type: text
    content: as destruction from the Almighty
  - type: note
    content: The Hebrew words for destruction and almighty sound alike
  - type: text
    content: ' it will come!'
  '7':
  - type: text
    content: Therefore all hands will be feeble,
  - type: text
    content: 'and every human heart '
  - type: note
    content: See Josh. 2:11
  - type: text
    content: will melt.
  '8':
  - type: text
    content: 'They will be dismayed:'
  - type: note
    content: '[ Nah. 2:10 ]'
  - type: text
    content: pangs and agony will seize them;
  - type: note
    content: ch. 26:17; Jer. 4:31; 6:24; Mic. 4:9, 10; John 16:21
  - type: text
    content: they will be in anguish like a woman in labor.
  - type: text
    content: They will look aghast at one another;
  - type: text
    content: their faces will be aflame.
  '9':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' comes,'
  - type: text
    content: cruel, with wrath and fierce anger,
  - type: text
    content: to make the land a desolation
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 104:35]'
  - type: text
    content: to destroy its sinners from it.
