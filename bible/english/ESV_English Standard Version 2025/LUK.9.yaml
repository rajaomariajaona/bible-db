document_id: LUK.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out the Twelve Apostles
  - type: text
    content: ' '
  - type: note
    content: Matt. 10:1; Mark 3:13-15; 6:7
  - type: text
    content: 'And he called the twelve together and gave them power and authority over all demons and to cure diseases, '
  '10':
  - type: text
    content: 'On their return '
  - type: note
    content: Mark 6:30
  - type: text
    content: 'the apostles told him all that they had done. '
  - type: note
    content: For ver. 10-17, see Matt. 14:13-21; Mark 6:32-44; John 6:1-13; [Matt. 15:32-38; Mark 8:2-9]
  - type: text
    content: 'And he took them and withdrew apart to a town called Bethsaida. '
  '11':
  - type: text
    content: 'When the crowds learned it, they followed him, and he '
  - type: note
    content: ch. 8:40
  - type: text
    content: 'welcomed them and '
  - type: note
    content: ver. 2
  - type: text
    content: 'spoke to them of the kingdom of God and '
  - type: note
    content: ver. 2
  - type: text
    content: 'cured those who had need of healing. '
  '12':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 24:29 (Gk.); Jer. 6:4
  - type: text
    content: 'the day began to wear away, and the twelve came and said to him, '
  - type: note
    content: '[Matt. 15:23]'
  - type: text
    content: '“Send the crowd away to go into the surrounding villages and countryside to find lodging and get provisions, for we are here in a desolate place.” '
  '13':
  - type: text
    content: 'But he said to them, '
  - type: note
    content: '[2 Kgs. 4:42-44]'
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: ' They said, “We have no more than '
  - type: note
    content: Matt. 16:9; Mark 8:19
  - type: text
    content: 'five loaves and two fish—unless we are to go and buy food for all these people.” '
  '14':
  - type: text
    content: 'For there were about five thousand men. And he said to his disciples, '
  - type: text
    content: “Have them sit down in groups of about fifty each.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And they did so, and had them all sit down. '
  '16':
  - type: text
    content: 'And taking the five loaves and the two fish, '
  - type: note
    content: Mark 7:34; John 11:41; 17:1
  - type: text
    content: 'he looked up to heaven and '
  - type: note
    content: ch. 24:30; 1 Sam. 9:13; Matt. 26:26; Mark 8:7; 14:22; [1 Cor. 14:16]
  - type: text
    content: 'said a blessing over them. Then he broke the loaves and gave them to the disciples to set before the crowd. '
  '17':
  - type: text
    content: And they all ate and were satisfied. And what was left over was picked up, twelve baskets of broken pieces.
  - type: heading
    content: Peter Confesses Jesus as the Christ
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-20, see Matt. 16:13-16; Mark 8:27-29
  - type: text
    content: 'Now it happened that as he was praying alone, the disciples were with him. And he asked them, '
  - type: text
    content: “Who do the crowds say that I am?”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And they answered, '
  - type: note
    content: ver. 7; Matt. 14:2; Mark 6:14
  - type: text
    content: '“John the Baptist. But others say, '
  - type: note
    content: ver. 8; Mark 6:15; [Matt. 17:10; Mark 9:11; John 1:21]
  - type: text
    content: 'Elijah, and others, that one of the prophets of old has risen.” '
  '2':
  - type: note
    content: Matt. 10:5, 7, 8; [ver. 11; ch. 10:1, 9]
  - type: text
    content: 'and he sent them out to '
  - type: note
    content: ver. 11, 60; See ch. 4:43
  - type: text
    content: 'proclaim the kingdom of God and to heal. '
  '20':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “But who do you say that I am?”
  - type: text
    content: ' And Peter answered, '
  - type: note
    content: ch. 23:35; Acts 3:18; Rev. 12:10; See Matt. 1:17
  - type: text
    content: “The Christ of God.”
  - type: heading
    content: Jesus Foretells His Death
  '21':
  - type: text
    content: ' '
  - type: note
    content: Matt. 16:20; Mark 8:30; See Matt. 12:16
  - type: text
    content: 'And he strictly charged and commanded them to tell this to no one, '
  '22':
  - type: note
    content: For ver. 22-27, see Matt. 16:21-28; Mark 8:31–9:1
  - type: text
    content: 'saying, '
  - type: note
    content: ch. 18:31; [ch. 13:33]
  - type: text
    content: '“The Son of Man must '
  - type: note
    content: ch. 24:7; Matt. 17:12, 22, 23; Mark 9:30, 31
  - type: text
    content: 'suffer many things and '
  - type: note
    content: ch. 17:25; 1 Pet. 2:4; [ch. 20:17]
  - type: text
    content: 'be rejected by the elders and chief priests and scribes, and be killed, and on '
  - type: note
    content: ch. 18:33; 24:7, 46; See Matt. 27:63; John 2:19
  - type: text
    content: the third day be raised.”
  - type: heading
    content: Take Up Your Cross and Follow Jesus
  '23':
  - type: text
    content: 'And he said to all, '
  - type: text
    content: '“If anyone would come after me, let him '
  - type: note
    content: '[2 Tim. 2:12, 13]'
  - type: text
    content: 'deny himself and '
  - type: note
    content: See Matt. 10:38, 39
  - type: text
    content: 'take up his cross '
  - type: note
    content: 1 Cor. 15:31
  - type: text
    content: daily and follow me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: whoever would save his life will lose it, but whoever loses his life for my sake will save it.
  - type: text
    content: ' '
  '25':
  - type: note
    content: '[ch. 12:20]'
  - type: text
    content: For what does it profit a man if he gains the whole world and loses or forfeits himself?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 1:16; 2 Tim. 1:8, 12, 16; Heb. 11:16; 1 John 2:28; [Matt. 10:33]
  - type: text
    content: 'whoever is ashamed of me and of my words, of him will the Son of Man be ashamed '
  - type: note
    content: Dan. 7:10, 13; Zech. 14:5; Matt. 24:30; 25:31; 26:64; John 1:51; Acts 1:11; 1 Thess. 1:10; 4:16; Jude 14; Rev. 1:7; [Deut. 33:2]
  - type: text
    content: 'when he comes in '
  - type: note
    content: Matt. 19:28; 25:31; Mark 10:37; John 17:24
  - type: text
    content: 'his glory and the glory of the Father and of '
  - type: note
    content: Acts 10:22; Rev. 14:10; [Matt. 13:41; 16:27]
  - type: text
    content: the holy angels.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But I tell you truly, there are some standing here who will not '
  - type: note
    content: John 8:52; Heb. 2:9
  - type: text
    content: 'taste death '
  - type: note
    content: '[ch. 21:31, 32; Matt. 10:23; 23:36; 24:34; Mark 13:30]'
  - type: text
    content: until they see the kingdom of God.”
  - type: heading
    content: The Transfiguration
  '28':
  - type: text
    content: ' '
  - type: note
    content: For ver. 28-36, see Matt. 17:1-8; Mark 9:2-8
  - type: text
    content: 'Now about eight days after these sayings he took with him '
  - type: note
    content: ch. 8:51; Mark 14:33
  - type: text
    content: 'Peter and John and James and '
  - type: note
    content: See Matt. 14:23
  - type: text
    content: 'went up on the mountain to pray. '
  '29':
  - type: text
    content: 'And as he was praying, the appearance of his face was '
  - type: note
    content: Mark 16:12 (Gk.)
  - type: text
    content: 'altered, and '
  - type: note
    content: Dan. 7:9; [Ps. 104:2; Matt. 28:3]
  - type: text
    content: 'his clothing became dazzling white. '
  '3':
  - type: note
    content: For ver. 3-5, see Matt. 10:9-14; Mark 6:8-11; [ch. 10:4-11; 22:35]
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Take nothing for your journey, '
  - type: note
    content: '[Mark 6:8]'
  - type: text
    content: no staff, nor bag, nor bread, nor money; and do not have two tunics.
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And behold, two men were talking with him, Moses and Elijah, '
  '31':
  - type: text
    content: who appeared in glory and spoke of his departure,
  - type: note
    content: Greek exodus
  - type: text
    content: ' which he was about to accomplish at Jerusalem. '
  '32':
  - type: text
    content: 'Now Peter and those who were with him '
  - type: note
    content: Dan. 8:18; Matt. 26:43
  - type: text
    content: 'were heavy with sleep, but when they became fully awake '
  - type: note
    content: See John 1:14
  - type: text
    content: 'they saw his glory and the two men who stood with him. '
  '33':
  - type: text
    content: 'And as the men were parting from him, Peter said to Jesus, “Master, it is good that we are here. Let us make three '
  - type: note
    content: '[Neh. 8:15]'
  - type: text
    content: tents, one for you and one for Moses and one for Elijah”—
  - type: note
    content: '[Mark 9:6; 14:40]'
  - type: text
    content: 'not knowing what he said. '
  '34':
  - type: text
    content: 'As he was saying these things, '
  - type: note
    content: 2 Pet. 1:17; [Ex. 24:15, 16]
  - type: text
    content: 'a cloud came and overshadowed them, and they were afraid as they entered the cloud. '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 34above]'
  - type: text
    content: 'a voice came out of the cloud, saying, “This is my Son, '
  - type: note
    content: ch. 23:35; Isa. 42:1; [Ps. 89:3; Isa. 49:7]
  - type: text
    content: my Chosen One;
  - type: note
    content: Some manuscripts my Beloved
  - type: text
    content: ' '
  - type: note
    content: Acts 3:22
  - type: text
    content: 'listen to him!” '
  '36':
  - type: text
    content: 'And when the voice had spoken, Jesus was found alone. '
  - type: note
    content: Matt. 17:9; Mark 9:9, 10
  - type: text
    content: And they kept silent and told no one in those days anything of what they had seen.
  - type: heading
    content: Jesus Heals a Boy with an Unclean Spirit
  '37':
  - type: text
    content: ' '
  - type: note
    content: For ver. 37-42, see Matt. 17:14-19; Mark 9:14-28
  - type: text
    content: 'On the next day, when they had come down from the mountain, a great crowd met him. '
  '38':
  - type: text
    content: 'And behold, a man from the crowd cried out, “Teacher, I beg you to look at my son, for '
  - type: note
    content: See ch. 7:12
  - type: text
    content: 'he is my only child. '
  '39':
  - type: text
    content: 'And behold, a spirit seizes him, and he suddenly cries out. It convulses him so that he foams at the mouth, and shatters him, and will hardly leave him. '
  '4':
  - type: text
    content: And whatever house you enter, stay there, and from there depart.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And I begged your disciples to cast it out, but '
  - type: note
    content: '[ver. 1; ch. 10:17; Matt. 10:1; Mark 6:7]'
  - type: text
    content: 'they could not.” '
  '41':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“O '
  - type: note
    content: Phil. 2:15; [John 20:27]
  - type: text
    content: 'faithless and twisted generation, '
  - type: note
    content: '[John 14:9]'
  - type: text
    content: how long am I to be with you and bear with you? Bring your son here.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'While he was coming, the demon threw him to the ground and convulsed him. But Jesus '
  - type: note
    content: ch. 4:35, 39; Zech. 3:2; Matt. 8:26; Mark 1:25; Jude 9
  - type: text
    content: 'rebuked the unclean spirit and healed the boy, and '
  - type: note
    content: See ch. 7:15
  - type: text
    content: 'gave him back to his father. '
  '43':
  - type: text
    content: 'And all were astonished at '
  - type: note
    content: 2 Pet. 1:16
  - type: text
    content: the majesty of God.
  - type: heading
    content: Jesus Again Foretells His Death
  - type: note
    content: For ver. 43-45, see Matt. 17:22, 23; Mark 9:30-32
  - type: text
    content: But while they were all marveling at everything he was doing, Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' said '
  - type: note
    content: ver. 22
  - type: text
    content: 'to his disciples, '
  '44':
  - type: text
    content: '“Let these words sink into your ears: '
  - type: note
    content: '[See ver. 43 above]'
  - type: text
    content: The Son of Man is about to be delivered into the hands of men.”
  - type: text
    content: ' '
  '45':
  - type: note
    content: ch. 2:50; 18:34; Mark 6:52; John 10:6; 12:16; 16:17-19; [Matt. 17:13; Mark 9:10]
  - type: text
    content: 'But they did not understand this saying, and '
  - type: note
    content: ch. 18:34; [ch. 24:16]
  - type: text
    content: it was concealed from them, so that they might not perceive it. And they were afraid to ask him about this saying.
  - type: heading
    content: Who Is the Greatest?
  '46':
  - type: text
    content: ' '
  - type: note
    content: For ver. 46-48, see Matt. 18:1-5; Mark 9:33-37; [ Matt. 20:20-28; Mark 10:35-45 ]
  - type: text
    content: 'An argument arose among them as to which of them was the greatest. '
  '47':
  - type: text
    content: 'But Jesus, knowing the reasoning of their hearts, took a child and put him by his side '
  '48':
  - type: text
    content: 'and said to them, '
  - type: note
    content: '[Matt. 10:40, 42]'
  - type: text
    content: '“Whoever receives this child in my name receives me, and '
  - type: note
    content: '[Matt. 10:40, 42]'
  - type: text
    content: 'whoever receives me receives him who sent me. For '
  - type: note
    content: ch. 22:26
  - type: text
    content: he who is least among you all is the one who is great.”
  - type: heading
    content: Anyone Not Against Us Is For Us
  '49':
  - type: text
    content: ' '
  - type: note
    content: For ver. 49, 50, see Mark 9:38-40
  - type: text
    content: 'John answered, “Master, we saw someone '
  - type: note
    content: ch. 10:17; Matt. 7:22; Mark 16:17; Acts 19:13; [Matt. 12:27]
  - type: text
    content: 'casting out demons in your name, and '
  - type: note
    content: '[Num. 11:28]'
  - type: text
    content: 'we tried to stop him, because he does not follow with us.” '
  '5':
  - type: text
    content: 'And wherever they do not receive you, when you leave that town '
  - type: note
    content: Acts 13:51; [Neh. 5:13; Acts 18:6]
  - type: text
    content: 'shake off the dust from your feet '
  - type: note
    content: See Mark 1:44
  - type: text
    content: 'as a testimony '
  - type: note
    content: James 5:3
  - type: text
    content: against them.”
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'But Jesus said to him, '
  - type: text
    content: '“Do not stop him, '
  - type: note
    content: '[ch. 11:23; Matt. 12:30]'
  - type: text
    content: for the one who is not against you is for you.”
  - type: heading
    content: A Samaritan Village Rejects Jesus
  '51':
  - type: text
    content: 'When the days drew near for '
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'him to be taken up, '
  - type: note
    content: 2 Kgs. 12:17; Isa. 50:7; Jer. 42:15
  - type: text
    content: 'he set his face '
  - type: note
    content: ch. 13:22; 17:11; 18:31; 19:11, 28
  - type: text
    content: 'to go to Jerusalem. '
  '52':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 10:1]'
  - type: text
    content: 'he sent messengers ahead of him, who went and entered a village of '
  - type: note
    content: See Matt. 10:5
  - type: text
    content: 'the Samaritans, to make preparations for him. '
  '53':
  - type: text
    content: 'But '
  - type: note
    content: John 4:9; [ch. 10:33]
  - type: text
    content: 'the people did not receive him, because '
  - type: note
    content: John 4:20
  - type: text
    content: 'his face was set toward Jerusalem. '
  '54':
  - type: text
    content: 'And when his disciples James and John saw it, they said, “Lord, do you want us to tell '
  - type: note
    content: See Rev. 13:13
  - type: text
    content: fire to come down from heaven and consume them?”
  - type: note
    content: Some manuscripts add as Elijah did
  - type: text
    content: ' '
  '55':
  - type: text
    content: But he turned and rebuked them.
  - type: note
    content: Some manuscripts add And he said, “You do not know what manner of spirit you are of; 56for the Son of Man came not to destroy people’s lives but to save them”
  - type: text
    content: ' '
  '56':
  - type: text
    content: And they went on to another village.
  - type: heading
    content: The Cost of Following Jesus
  '57':
  - type: text
    content: 'As they were going '
  - type: note
    content: ver. 51
  - type: text
    content: 'along the road, '
  - type: note
    content: For ver. 57-60, see Matt. 8:19-22
  - type: text
    content: 'someone said to him, “I will follow you wherever you go.” '
  '58':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: “Foxes have holes, and birds of the air have nests, but the Son of Man has nowhere to lay his head.”
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'To another he said, '
  - type: text
    content: “Follow me.”
  - type: text
    content: ' But he said, “Lord, let me first go and bury my father.” '
  '6':
  - type: note
    content: Mark 6:12
  - type: text
    content: And they departed and went through the villages, preaching the gospel and healing everywhere.
  - type: heading
    content: Herod Is Perplexed by Jesus
  '60':
  - type: text
    content: And Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' said to him, '
  - type: text
    content: '“Leave '
  - type: note
    content: '[John 5:25]'
  - type: text
    content: 'the dead to bury their own dead. But as for you, go and '
  - type: note
    content: ver. 2
  - type: text
    content: proclaim the kingdom of God.”
  - type: text
    content: ' '
  '61':
  - type: text
    content: 'Yet another said, “I will follow you, Lord, '
  - type: note
    content: '[1 Kgs. 19:20]'
  - type: text
    content: 'but let me first say farewell to those at my home.” '
  '62':
  - type: text
    content: 'Jesus said to him, '
  - type: note
    content: '[Phil. 3:13]'
  - type: text
    content: “No one who puts his hand to the plow and looks back is fit for the kingdom of God.”
  '7':
  - type: text
    content: ' '
  - type: note
    content: For ver. 7-9, see Matt. 14:1-12; Mark 6:14-29
  - type: text
    content: 'Now '
  - type: note
    content: ch. 3:1, 19; Acts 13:1
  - type: text
    content: 'Herod the tetrarch heard about all that was happening, and he was perplexed, because it was said by some that '
  - type: note
    content: ver. 19
  - type: text
    content: 'John had been raised from the dead, '
  '8':
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'by some that Elijah had appeared, and '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'by others that one of the prophets of old had risen. '
  '9':
  - type: text
    content: 'Herod said, “John I beheaded, but who is this about whom I hear such things?” And '
  - type: note
    content: ch. 23:8
  - type: text
    content: he sought to see him.
  - type: heading
    content: Jesus Feeds the Five Thousand
