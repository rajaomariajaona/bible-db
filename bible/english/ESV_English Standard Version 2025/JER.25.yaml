document_id: JER.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Seventy Years of Captivity
  - type: text
    content: ' '
  - type: note
    content: ch. 1:3; 36:1; [ 2 Kgs. 24:1 ]
  - type: text
    content: 'The word that came to Jeremiah concerning all the people of Judah, in the fourth year of Jehoiakim the son of Josiah, king of Judah (that was the first year of Nebuchadnezzar king of Babylon), '
  '10':
  - type: text
    content: 'Moreover, '
  - type: note
    content: See ch. 7:34
  - type: text
    content: 'I will banish from them the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride, '
  - type: note
    content: Eccles. 12:4; Rev. 18:22
  - type: text
    content: 'the grinding of the millstones and '
  - type: note
    content: Rev. 18:23
  - type: text
    content: 'the light of the lamp. '
  '11':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'This whole land shall become a ruin and a waste, and '
  - type: note
    content: '[ch. 28:14]; See ch. 27:3-6'
  - type: text
    content: 'these nations shall serve the king of Babylon '
  - type: note
    content: 2 Chr. 36:21, 22; Ezra 1:1; Dan. 9:2; [Isa. 23:15]
  - type: text
    content: 'seventy years. '
  '12':
  - type: text
    content: 'Then after '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'seventy years are completed, '
  - type: note
    content: ch. 51:24, 26, 62; Isa. 13:19
  - type: text
    content: 'I will punish the king of Babylon and that nation, '
  - type: note
    content: ch. 51:24, 26, 62; Isa. 13:19
  - type: text
    content: 'the land of the Chaldeans, for their iniquity, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 51:24, 26, 62; Isa. 13:19
  - type: text
    content: 'making the land an everlasting waste. '
  '13':
  - type: text
    content: 'I will bring upon that land all the words that I have uttered against it, everything written '
  - type: note
    content: See ch. 46–51
  - type: text
    content: 'in this book, which Jeremiah prophesied against all the nations. '
  '14':
  - type: note
    content: ch. 27:7; 50:9, 41; 51:27, 28
  - type: text
    content: 'For many nations '
  - type: note
    content: ch. 27:7; 50:9, 41; 51:27, 28
  - type: text
    content: 'and great kings shall make slaves even of them, '
  - type: note
    content: ch. 50:29; 51:6, 24
  - type: text
    content: and I will recompense them according to their deeds and the work of their hands.”
  - type: heading
    content: The Cup of the Lord’s Wrath
  '15':
  - type: text
    content: 'Thus the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, said to me: '
  - type: note
    content: ch. 49:12; 51:7; Job 21:20; Ps. 60:3; 75:8; Isa. 51:17; Lam. 4:21; Rev. 14:10
  - type: text
    content: '“Take from my hand this cup of the wine of wrath, and make all the nations to whom I send you drink it. '
  '16':
  - type: text
    content: 'They shall drink and stagger and be crazed because of '
  - type: note
    content: '[ch. 47:6]'
  - type: text
    content: the sword that I am sending among them.”
  '17':
  - type: text
    content: 'So I took the cup from the '
  - type: text
    content: Lord
  - type: text
    content: '’s hand, '
  - type: note
    content: '[Isa. 51:22, 23]'
  - type: text
    content: 'and made all the nations to whom the '
  - type: text
    content: Lord
  - type: text
    content: ' sent me drink it: '
  '18':
  - type: note
    content: '[Zech. 12:2]'
  - type: text
    content: 'Jerusalem and the cities of Judah, its kings and officials, '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'to make them a desolation and a waste, a hissing and a curse, as at this day; '
  '19':
  - type: note
    content: ch. 46:25
  - type: text
    content: 'Pharaoh king of Egypt, his servants, his officials, all his people, '
  '2':
  - type: text
    content: 'which Jeremiah the prophet spoke to all the people of Judah and all the inhabitants of Jerusalem: '
  '20':
  - type: text
    content: 'and '
  - type: note
    content: ch. 50:37; [Ex. 12:38; Ezek. 30:5]
  - type: text
    content: 'all the mixed tribes among them; all the kings of '
  - type: note
    content: Job 1:1; Lam. 4:21
  - type: text
    content: 'the land of Uz and all the kings of '
  - type: note
    content: ch. 47:1, 4, 5
  - type: text
    content: the land of the Philistines (
  - type: note
    content: ch. 47:1, 4, 5
  - type: text
    content: 'Ashkelon, '
  - type: note
    content: ch. 47:1, 4, 5
  - type: text
    content: 'Gaza, Ekron, and the remnant of '
  - type: note
    content: '[Isa. 20:1]'
  - type: text
    content: 'Ashdod); '
  '21':
  - type: note
    content: ch. 9:26; See ch. 49:7-22
  - type: text
    content: 'Edom, '
  - type: note
    content: See ch. 48
  - type: text
    content: 'Moab, and the sons of '
  - type: note
    content: See ch. 49:1-6
  - type: text
    content: 'Ammon; '
  '22':
  - type: text
    content: 'all the kings of '
  - type: note
    content: ch. 47:4; Isa. 23:1, 2
  - type: text
    content: 'Tyre, all the kings of '
  - type: note
    content: ch. 47:4; Isa. 23:1, 2
  - type: text
    content: 'Sidon, and the kings of the coastland across '
  - type: note
    content: '[ch. 49:23]'
  - type: text
    content: 'the sea; '
  '23':
  - type: note
    content: ch. 49:8; Isa. 21:13
  - type: text
    content: 'Dedan, '
  - type: note
    content: Job 6:19
  - type: text
    content: 'Tema, '
  - type: note
    content: '[Job 32:2, 6]'
  - type: text
    content: 'Buz, and all who cut '
  - type: note
    content: See ch. 9:26
  - type: text
    content: 'the corners of their hair; '
  '24':
  - type: text
    content: 'all the '
  - type: note
    content: 2 Chr. 9:14
  - type: text
    content: 'kings of Arabia and all the kings of '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'the mixed tribes who dwell in the desert; '
  '25':
  - type: text
    content: 'all the kings of Zimri, all the kings of '
  - type: note
    content: Isa. 11:11; See ch. 49:34-39
  - type: text
    content: 'Elam, and all the kings of '
  - type: note
    content: '[2 Kgs. 17:6]'
  - type: text
    content: 'Media; '
  '26':
  - type: text
    content: 'all the kings of '
  - type: note
    content: ch. 50:9
  - type: text
    content: 'the north, far and near, one after another, and all the kingdoms of the world that are on the face of the earth. And after them the king of '
  - type: note
    content: ch. 51:41
  - type: text
    content: Babylon
  - type: note
    content: Hebrew Sheshach, a code name for Babylon
  - type: text
    content: ' shall drink.'
  '27':
  - type: text
    content: '“Then you shall say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: Hab. 2:16
  - type: text
    content: 'Drink, be drunk and vomit, fall and rise no more, because of '
  - type: note
    content: Ezek. 38:21; [ver. 16]
  - type: text
    content: the sword that I am sending among you.’
  '28':
  - type: text
    content: '“And if they refuse to accept the cup from your hand to drink, then you shall say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: ch. 49:12
  - type: text
    content: 'You must drink! '
  '29':
  - type: text
    content: 'For behold, '
  - type: note
    content: Prov. 11:31; Isa. 10:12; Amos 3:2; Obad. 16; [1 Pet. 4:17]
  - type: text
    content: 'I begin to work disaster at the city that is called by my name, and shall you go unpunished? You shall not go unpunished, '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: 'for I am summoning a sword against all the inhabitants of the earth, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.’'
  '3':
  - type: text
    content: '“For twenty-three years, '
  - type: note
    content: ch. 1:2
  - type: text
    content: 'from the thirteenth year of Josiah the son of Amon, king of Judah, to this day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' has come to me, and I have spoken '
  - type: note
    content: ch. 7:13; 11:7, 8; 26:5; 29:19; 32:33; 35:14; 2 Chr. 36:15
  - type: text
    content: 'persistently to you, '
  - type: note
    content: See ch. 7:13
  - type: text
    content: 'but you have not listened. '
  '30':
  - type: text
    content: '“You, therefore, shall prophesy against them all these words, and say to them:'
  - type: note
    content: Joel 3:16; Amos 1:2
  - type: text
    content: '“‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will roar from on high,'
  - type: text
    content: and from his holy habitation utter his voice;
  - type: text
    content: he will roar mightily against his fold,
  - type: note
    content: '[ Judg. 9:27; Isa. 16:9 ]'
  - type: text
    content: and shout, like those who tread grapes,
  - type: text
    content: against all the inhabitants of the earth.
  '31':
  - type: text
    content: The clamor will resound to the ends of the earth,
  - type: text
    content: 'for '
  - type: note
    content: Hos. 4:1
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has an indictment against the nations;'
  - type: note
    content: Isa. 66:16; [ Joel 3:2 ]
  - type: text
    content: he is entering into judgment with all flesh,
  - type: text
    content: and the wicked he will put to the sword,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '32':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: text
    content: Behold, disaster is going forth
  - type: text
    content: from nation to nation,
  - type: note
    content: ch. 23:19; 30:23
  - type: text
    content: and a great tempest is stirring
  - type: note
    content: ch. 6:22
  - type: text
    content: from the farthest parts of the earth!
  '33':
  - type: text
    content: ' '
  - type: note
    content: Isa. 66:16
  - type: text
    content: '“And those pierced by the '
  - type: text
    content: Lord
  - type: text
    content: ' on that day shall extend from one end of the earth to the other. '
  - type: note
    content: See ch. 16:4
  - type: text
    content: 'They shall not be lamented, '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'or gathered, or buried; '
  - type: note
    content: See ch. 8:2
  - type: text
    content: they shall be dung on the surface of the ground.
  '34':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:8
  - type: text
    content: '“Wail, '
  - type: note
    content: See ch. 23:1
  - type: text
    content: you shepherds, and cry out,
  - type: note
    content: ch. 6:26
  - type: text
    content: and roll in ashes, you lords of the flock,
  - type: text
    content: for the days of your slaughter and dispersion have come,
  - type: text
    content: and you shall fall like a choice vessel.
  '35':
  - type: text
    content: 'No refuge will remain '
  - type: note
    content: See ch. 23:1
  - type: text
    content: for the shepherds,
  - type: text
    content: nor escape for the lords of the flock.
  '36':
  - type: text
    content: 'A voice—the cry '
  - type: note
    content: '[See ver. 35 above]'
  - type: text
    content: of the shepherds,
  - type: note
    content: ch. 4:8
  - type: text
    content: and the wail of the lords of the flock!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is laying waste their pasture,'
  '37':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 32:18 ]'
  - type: text
    content: and the peaceful folds are devastated
  - type: note
    content: See ch. 12:13
  - type: text
    content: 'because of the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '38':
  - type: text
    content: 'Like a lion '
  - type: note
    content: '[Job 38:40]'
  - type: text
    content: he has left his lair,
  - type: text
    content: for their land has become a waste
  - type: text
    content: 'because of '
  - type: note
    content: ch. 46:16; 50:16
  - type: text
    content: the sword of the oppressor,
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: and because of his fierce anger.”
  '4':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'You have neither listened nor inclined your ears to hear, although the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'persistently sent to you all his servants the prophets, '
  '5':
  - type: text
    content: 'saying, '
  - type: note
    content: See ch. 18:11
  - type: text
    content: '‘Turn now, every one of you, '
  - type: note
    content: ch. 23:22
  - type: text
    content: 'from his evil way and evil deeds, and '
  - type: note
    content: ch. 7:7
  - type: text
    content: 'dwell upon the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given to you and your fathers from of old and forever. '
  '6':
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'Do not go after other gods to serve and worship them, '
  - type: note
    content: '[ch. 32:30]'
  - type: text
    content: 'or provoke me to anger '
  - type: note
    content: '[ch. 32:30]'
  - type: text
    content: 'with the work of your hands. Then I will do you no harm.’ '
  '7':
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Yet you have not listened to me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'that you might provoke me to anger '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: with the work of your hands to your own harm.
  '8':
  - type: text
    content: '“Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: Because you have not obeyed my words, '
  '9':
  - type: note
    content: ch. 1:15
  - type: text
    content: 'behold, I will send for all the tribes of the north, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and for Nebuchadnezzar the king of Babylon, '
  - type: note
    content: ch. 27:6; 43:10; [Isa. 44:28; 45:1]; See Ezek. 29:18-20
  - type: text
    content: 'my servant, and I will bring them against this land and its inhabitants, and against all these surrounding nations. I will devote them to destruction, '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'and make them a horror, a hissing, and an everlasting desolation. '
