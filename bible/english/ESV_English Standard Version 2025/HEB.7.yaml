document_id: HEB.7,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priestly Order of Melchizedek
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 14:18-20
      marker-yv: yv-n
    - type: text
      text: 'Melchizedek, king of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 76:2
      marker-yv: yv-n
    - type: text
      text: 'Salem, priest of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 24:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 32:8
      marker-yv: yv-n
    - type: text
      text: 'the Most High God, met Abraham returning from the slaughter of the kings and blessed him, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for he was still in the loins of his ancestor when Melchizedek met him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Compared to Melchizedek
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18, 19
      - type: text
        text: ' ; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:7
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 2:21
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Now if perfection had been attainable through the Levitical priesthood (for under it the people received the law), what further need would there have been for another priest to arise after the order of Melchizedek, rather than one named after the order of Aaron? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when there is a change in the priesthood, there is necessarily a change in the law as well. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the one of whom these things are spoken belonged to another tribe, from which no one has ever served at the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is evident that our Lord was descended '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 5:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 3:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 5:5
      marker-yv: yv-n
    - type: text
      text: from Judah, and in connection with that tribe Moses said nothing about priests.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This becomes even more evident when another priest arises in the likeness of Melchizedek, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who has become a priest, not on the basis of a legal requirement concerning bodily descent, but by the power of an indestructible life. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For it is witnessed of him,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: ' ; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'Cited from '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 110:4
      marker-yv: yv-n
    - type: text
      text: “You are a priest forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after the order of Melchizedek.”
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For on the one hand, a former commandment is set aside '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:9
      marker-yv: yv-n
    - type: text
      text: 'because of its weakness and uselessness '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 16:16
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 13:39
      marker-yv: yv-n
    - type: text
      text: 'the law made nothing perfect); but on the other hand, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:18
      marker-yv: yv-n
    - type: text
      text: 'a better hope is introduced, through which '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. 25; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 10:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:16
      marker-yv: yv-n
    - type: text
      text: we draw near to God.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to him Abraham apportioned a tenth part of everything. He is first, by translation of his name, king of righteousness, and then he is also king of Salem, that is, king of peace. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was not without an oath. For those who formerly became priests were made such without an oath, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but this one was made a priest with an oath by the one who said to him:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: “The Lord has sworn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not change his mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You are a priest forever.’”
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This makes Jesus the guarantor of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:6
      marker-yv: yv-n
    - type: text
      text: a better covenant.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The former priests were many in number, because they were prevented by death from continuing in office, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but he holds his priesthood permanently, because he continues '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21, 28
      marker-yv: yv-n
    - type: text
      text: 'forever. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Consequently, he is able to save to the uttermost
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'That is, completely; or '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: at all times
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'those who draw near to God '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 14:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'through him, since he always lives '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:24
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:34
      marker-yv: yv-n
    - type: text
      text: to make intercession for them.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it was indeed fitting that we should have such a high priest, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 16:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 15:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:5
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 1:24
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'holy, innocent, unstained, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:15
      marker-yv: yv-n
    - type: text
      text: 'separated from sinners, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      marker-yv: yv-n
    - type: text
      text: 'exalted above the heavens. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He has no need, like those high priests, to offer sacrifices daily, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:3
      marker-yv: yv-n
    - type: text
      text: 'first for his own sins and then for those of the people, since he did this '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:10
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'once for all when he offered up himself. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the law appoints men '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in their weakness as high priests, but the word of the oath, which came later than the law, appoints a Son who has been made '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:9
      marker-yv: yv-n
    - type: text
      text: perfect forever.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is without father or mother '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: or genealogy, having neither beginning of days nor end of life, but resembling the Son of God he continues a priest forever.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See how great this man was to whom Abraham '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the patriarch gave a tenth of the spoils! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 18:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 31:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      marker-yv: yv-n
    - type: text
      text: those descendants of Levi who receive the priestly office have a commandment in the law to take tithes from the people, that is, from their brothers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers and sisters
      marker-yv: yv-n
    - type: text
      text: ' though these also are descended from Abraham. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But this man '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'who does not have his descent from them received tithes from Abraham and blessed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 4:13
      marker-yv: yv-n
    - type: text
      text: 'him who had the promises. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is beyond dispute that the inferior is blessed by the superior. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the one case tithes are received by mortal men, but in the other case, by one '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'of whom it is testified that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 6:57
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he lives. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One might even say that Levi himself, who receives tithes, paid tithes through Abraham, '
