document_id: HEB.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Priestly Order of Melchizedek
  - type: text
    content: 'For this '
  - type: note
    content: Gen. 14:18-20
  - type: text
    content: 'Melchizedek, king of '
  - type: note
    content: Ps. 76:2
  - type: text
    content: 'Salem, priest of '
  - type: note
    content: Num. 24:16; Deut. 32:8
  - type: text
    content: 'the Most High God, met Abraham returning from the slaughter of the kings and blessed him, '
  '10':
  - type: text
    content: for he was still in the loins of his ancestor when Melchizedek met him.
  - type: heading
    content: Jesus Compared to Melchizedek
  '11':
  - type: text
    content: ' '
  - type: note
    content: ver. 18, 19 ; ch. 8:7; [Gal. 2:21]
  - type: text
    content: 'Now if perfection had been attainable through the Levitical priesthood (for under it the people received the law), what further need would there have been for another priest to arise after the order of Melchizedek, rather than one named after the order of Aaron? '
  '12':
  - type: text
    content: 'For when there is a change in the priesthood, there is necessarily a change in the law as well. '
  '13':
  - type: text
    content: 'For the one of whom these things are spoken belonged to another tribe, from which no one has ever served at the altar. '
  '14':
  - type: text
    content: 'For it is evident that our Lord was descended '
  - type: note
    content: Isa. 11:1; Mic. 5:2; Matt. 1:3; Luke 3:33; Rev. 5:5
  - type: text
    content: from Judah, and in connection with that tribe Moses said nothing about priests.
  '15':
  - type: text
    content: 'This becomes even more evident when another priest arises in the likeness of Melchizedek, '
  '16':
  - type: text
    content: 'who has become a priest, not on the basis of a legal requirement concerning bodily descent, but by the power of an indestructible life. '
  '17':
  - type: text
    content: For it is witnessed of him,
  - type: note
    content: ver. 21 ; ch. 5:6; 6:20; Cited from Ps. 110:4
  - type: text
    content: “You are a priest forever,
  - type: text
    content: after the order of Melchizedek.”
  '18':
  - type: text
    content: 'For on the one hand, a former commandment is set aside '
  - type: note
    content: Rom. 8:3; Gal. 4:9
  - type: text
    content: 'because of its weakness and uselessness '
  '19':
  - type: text
    content: '(for '
  - type: note
    content: ch. 9:9; 10:1; Lev. 16:16; See Acts 13:39
  - type: text
    content: 'the law made nothing perfect); but on the other hand, '
  - type: note
    content: ch. 6:18
  - type: text
    content: 'a better hope is introduced, through which '
  - type: note
    content: '[ver. 25; Lev. 10:3]; See ch. 4:16'
  - type: text
    content: we draw near to God.
  '2':
  - type: text
    content: 'and to him Abraham apportioned a tenth part of everything. He is first, by translation of his name, king of righteousness, and then he is also king of Salem, that is, king of peace. '
  '20':
  - type: text
    content: 'And it was not without an oath. For those who formerly became priests were made such without an oath, '
  '21':
  - type: text
    content: 'but this one was made a priest with an oath by the one who said to him:'
  - type: note
    content: See ver. 17
  - type: text
    content: “The Lord has sworn
  - type: text
    content: and will not change his mind,
  - type: text
    content: ‘You are a priest forever.’”
  '22':
  - type: text
    content: 'This makes Jesus the guarantor of '
  - type: note
    content: ch. 8:6
  - type: text
    content: a better covenant.
  '23':
  - type: text
    content: 'The former priests were many in number, because they were prevented by death from continuing in office, '
  '24':
  - type: text
    content: 'but he holds his priesthood permanently, because he continues '
  - type: note
    content: ver. 21, 28
  - type: text
    content: 'forever. '
  '25':
  - type: text
    content: Consequently, he is able to save to the uttermost
  - type: note
    content: That is, completely; or at all times
  - type: text
    content: ' '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'those who draw near to God '
  - type: note
    content: '[John 14:6]'
  - type: text
    content: 'through him, since he always lives '
  - type: note
    content: ch. 9:24; See Rom. 8:34
  - type: text
    content: to make intercession for them.
  '26':
  - type: text
    content: 'For it was indeed fitting that we should have such a high priest, '
  - type: note
    content: Ps. 16:10; Rev. 15:4; 16:5; [Mark 1:24]
  - type: text
    content: 'holy, innocent, unstained, '
  - type: note
    content: See ch. 4:15
  - type: text
    content: 'separated from sinners, and '
  - type: note
    content: '[ch. 8:1]; See ch. 4:14'
  - type: text
    content: 'exalted above the heavens. '
  '27':
  - type: text
    content: 'He has no need, like those high priests, to offer sacrifices daily, '
  - type: note
    content: See ch. 5:3
  - type: text
    content: 'first for his own sins and then for those of the people, since he did this '
  - type: note
    content: ch. 9:12; 10:10; [ch. 9:28]
  - type: text
    content: 'once for all when he offered up himself. '
  '28':
  - type: text
    content: 'For the law appoints men '
  - type: note
    content: '[ch. 5:2]'
  - type: text
    content: 'in their weakness as high priests, but the word of the oath, which came later than the law, appoints a Son who has been made '
  - type: note
    content: ch. 2:10; 5:9
  - type: text
    content: perfect forever.
  '3':
  - type: text
    content: 'He is without father or mother '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: or genealogy, having neither beginning of days nor end of life, but resembling the Son of God he continues a priest forever.
  '4':
  - type: text
    content: 'See how great this man was to whom Abraham '
  - type: note
    content: '[Acts 2:29; 7:8, 9]'
  - type: text
    content: 'the patriarch gave a tenth of the spoils! '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: Num. 18:21, 26; 2 Chr. 31:4, 5
  - type: text
    content: those descendants of Levi who receive the priestly office have a commandment in the law to take tithes from the people, that is, from their brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' though these also are descended from Abraham. '
  '6':
  - type: text
    content: 'But this man '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'who does not have his descent from them received tithes from Abraham and blessed '
  - type: note
    content: See Rom. 4:13
  - type: text
    content: 'him who had the promises. '
  '7':
  - type: text
    content: 'It is beyond dispute that the inferior is blessed by the superior. '
  '8':
  - type: text
    content: 'In the one case tithes are received by mortal men, but in the other case, by one '
  - type: note
    content: '[ch. 5:6; 6:20]'
  - type: text
    content: 'of whom it is testified that '
  - type: note
    content: '[John 6:57; Rev. 1:17, 18]'
  - type: text
    content: 'he lives. '
  '9':
  - type: text
    content: 'One might even say that Levi himself, who receives tithes, paid tithes through Abraham, '
