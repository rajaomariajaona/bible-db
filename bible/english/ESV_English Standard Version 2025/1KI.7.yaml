document_id: 1KI.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds His Palace
  - type: text
    content: 'Solomon was '
  - type: note
    content: ch. 3:1; 9:10; 2 Chr. 8:1
  - type: text
    content: building his own house thirteen years, and he finished his entire house.
  '10':
  - type: text
    content: 'The foundation was of costly stones, huge stones, stones of eight and ten cubits. '
  '11':
  - type: text
    content: 'And above were costly stones, cut according to measurement, and cedar. '
  '12':
  - type: note
    content: ch. 6:36
  - type: text
    content: 'The great court had three courses of cut stone all around, and a course of cedar beams; so had the inner court of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: the vestibule of the house.
  - type: heading
    content: The Temple Furnishings
  '13':
  - type: text
    content: 'And King Solomon sent and brought '
  - type: note
    content: '[2 Chr. 2:14]'
  - type: text
    content: 'Hiram from Tyre. '
  '14':
  - type: text
    content: 'He was the son of a widow of the tribe of Naphtali, and his father was a man of Tyre, a worker in bronze. And '
  - type: note
    content: '[Ex. 31:3-5; 35:31]'
  - type: text
    content: he was full of wisdom, understanding, and skill for making any work in bronze. He came to King Solomon and did all his work.
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15-21, see 2 Chr. 3:15-17
  - type: text
    content: 'He cast '
  - type: note
    content: 2 Kgs. 25:17; 1 Chr. 18:8; 2 Chr. 4:12; Jer. 52:21-23
  - type: text
    content: 'two pillars of bronze. '
  - type: note
    content: ver. 41
  - type: text
    content: Eighteen cubits was the height of one pillar, and a line of twelve cubits measured its circumference. It was hollow, and its thickness was four fingers. The second pillar was the same.
  - type: note
    content: Targum, Syriac (compare Septuagint and Jeremiah 52:21); Hebrew and a line of twelve cubits measured the circumference of the second pillar
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'He also made two capitals of cast bronze to set on the tops of the pillars. The height of the one capital was five cubits, and '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'the height of the other capital was five cubits. '
  '17':
  - type: text
    content: There were lattices of checker work with wreaths of chain work for the capitals on the tops of the pillars, a lattice
  - type: note
    content: Septuagint; Hebrew seven; twice in this verse
  - type: text
    content: ' for the one capital and a lattice for the other capital. '
  '18':
  - type: text
    content: Likewise he made pomegranates
  - type: note
    content: Two manuscripts (compare Septuagint); Hebrew pillars
  - type: text
    content: ' in two rows around the one latticework to cover the capital that was on the top of the pillar, and he did the same with the other capital. '
  '19':
  - type: text
    content: 'Now the capitals that were on the tops of the pillars in the vestibule were of lily-work, four cubits. '
  '2':
  - type: text
    content: 'He built '
  - type: note
    content: ch. 10:17, 21
  - type: text
    content: the House of the Forest of Lebanon. Its length was a hundred cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and its breadth fifty cubits and its height thirty cubits, and it was built on four'
  - type: note
    content: Septuagint three
  - type: text
    content: ' rows of cedar pillars, with cedar beams on the pillars. '
  '20':
  - type: text
    content: 'The capitals were on the two pillars and also above the rounded projection which was beside the latticework. There were '
  - type: note
    content: '[ver. 42; 2 Chr. 3:16; 4:13; Jer. 52:23]'
  - type: text
    content: 'two hundred pomegranates in two rows all around, and so with the other capital. '
  '21':
  - type: note
    content: 2 Chr. 3:17
  - type: text
    content: 'He set up the pillars at the vestibule of the temple. He set up the pillar on the south and called its name Jachin, and he set up the pillar on the north and called its name Boaz. '
  '22':
  - type: text
    content: And on the tops of the pillars was lily-work. Thus the work of the pillars was finished.
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-26, see 2 Chr. 4:2-5
  - type: text
    content: 'Then he made '
  - type: note
    content: 2 Kgs. 16:17; 25:13; 1 Chr. 18:8; Jer. 52:17; [Ex. 30:18]
  - type: text
    content: 'the sea of cast metal. It was round, ten cubits from brim to brim, and five cubits high, and a line of thirty cubits measured its circumference. '
  '24':
  - type: text
    content: 'Under its brim were '
  - type: note
    content: '[ch. 6:18]'
  - type: text
    content: 'gourds, for ten cubits, compassing the sea all around. The gourds were in two rows, cast with it when it was cast. '
  '25':
  - type: text
    content: 'It stood on '
  - type: note
    content: Jer. 52:20
  - type: text
    content: 'twelve oxen, three facing north, three facing west, three facing south, and three facing east. The sea was set on them, and all their rear parts were inward. '
  '26':
  - type: text
    content: Its thickness was a handbreadth,
  - type: note
    content: A handbreadth was about 3 inches or 7.5 centimeters
  - type: text
    content: ' and its brim was made like the brim of a cup, like the flower of a lily. It held two thousand baths.'
  - type: note
    content: A bath was about 6 gallons or 22 liters
  '27':
  - type: text
    content: 'He also made the '
  - type: note
    content: 2 Kgs. 25:13; 2 Chr. 4:14; Jer. 52:17
  - type: text
    content: 'ten stands of bronze. Each stand was four cubits long, four cubits wide, and three cubits high. '
  '28':
  - type: text
    content: 'This was the construction of the stands: they had panels, and the panels were set in the frames, '
  '29':
  - type: text
    content: 'and on the panels that were set in the frames were lions, oxen, and cherubim. On the frames, both above and below the lions and oxen, there were wreaths of beveled work. '
  '3':
  - type: text
    content: 'And it was covered with cedar above the chambers that were on the forty-five pillars, fifteen in each row. '
  '30':
  - type: text
    content: 'Moreover, each stand had four bronze wheels and axles of bronze, and at the four corners were supports for a basin. The supports were cast with wreaths at the side of each. '
  '31':
  - type: text
    content: 'Its opening was within a crown that projected upward one cubit. Its opening was round, as a pedestal is made, a cubit and a half deep. At its opening there were carvings, and its panels were square, not round. '
  '32':
  - type: text
    content: 'And the four wheels were underneath the panels. The axles of the wheels were of one piece with the stands, and the height of a wheel was a cubit and a half. '
  '33':
  - type: text
    content: 'The wheels were made like a chariot wheel; their axles, their rims, their spokes, and their hubs were all cast. '
  '34':
  - type: text
    content: 'There were four supports at the four corners of each stand. The supports were of one piece with the stands. '
  '35':
  - type: text
    content: 'And on the top of the stand there was a round band half a cubit high; and on the top of the stand its stays and its panels were of one piece with it. '
  '36':
  - type: text
    content: 'And on the surfaces of its stays and on its panels, he carved cherubim, lions, and palm trees, according to the space of each, with wreaths all around. '
  '37':
  - type: text
    content: 'After this manner he made '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: the ten stands. All of them were cast alike, of the same measure and the same form.
  '38':
  - type: text
    content: 'And he made '
  - type: note
    content: 2 Chr. 4:6; [Ex. 30:18]
  - type: text
    content: 'ten basins of bronze. Each basin held forty baths, each basin measured four cubits, and there was a basin for each of the ten stands. '
  '39':
  - type: text
    content: And he set the stands, five on the south side of the house, and five on the north side of the house. And he set the sea at the southeast corner of the house.
  '4':
  - type: text
    content: 'There were window frames in three rows, and window opposite window in three tiers. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: For ver. 40-51, see 2 Chr. 4:11–5:1
  - type: text
    content: 'Hiram also made '
  - type: note
    content: Ex. 27:3; 38:3
  - type: text
    content: 'the pots, the shovels, and the basins. So Hiram finished all the work that he did for King Solomon on the house of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '41':
  - type: text
    content: 'the two pillars, the two bowls of the capitals that were on the tops of the pillars, and the two '
  - type: note
    content: ver. 17, 18
  - type: text
    content: 'latticeworks to cover the two bowls of the capitals that were on the tops of the pillars; '
  '42':
  - type: text
    content: 'and the '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'four hundred pomegranates for the two latticeworks, two rows of pomegranates for each latticework, to cover the two bowls of the capitals that were on the pillars; '
  '43':
  - type: text
    content: 'the ten stands, and the ten basins on the stands; '
  '44':
  - type: text
    content: 'and '
  - type: note
    content: ver. 23, 25
  - type: text
    content: the one sea, and the twelve oxen underneath the sea.
  '45':
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 27:3; 38:3
  - type: text
    content: 'the pots, the shovels, and the basins, all these vessels in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', which Hiram made for King Solomon, were of burnished bronze. '
  '46':
  - type: text
    content: 'In the plain of the Jordan the king cast them, in the clay ground between '
  - type: note
    content: Josh. 13:27
  - type: text
    content: 'Succoth and '
  - type: note
    content: Josh. 3:16
  - type: text
    content: 'Zarethan. '
  '47':
  - type: text
    content: 'And Solomon left all the vessels unweighed, because there were so many of them; '
  - type: note
    content: '[1 Chr. 22:3, 14]'
  - type: text
    content: the weight of the bronze was not ascertained.
  '48':
  - type: text
    content: 'So Solomon made all the vessels that were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See Ex. 37:25-29
  - type: text
    content: 'the golden altar, '
  - type: note
    content: '[2 Chr. 4:8]; See Ex. 37:10-16'
  - type: text
    content: 'the golden table for '
  - type: note
    content: Ex. 25:30; See Lev. 24:5-8
  - type: text
    content: 'the bread of the Presence, '
  '49':
  - type: note
    content: 2 Chr. 4:7
  - type: text
    content: 'the lampstands of pure gold, five on the south side and five on the north, before the inner sanctuary; '
  - type: note
    content: See Ex. 25:31-38
  - type: text
    content: 'the flowers, the lamps, and the tongs, of gold; '
  '5':
  - type: text
    content: All the doorways and windows
  - type: note
    content: Septuagint; Hebrew posts
  - type: text
    content: ' had square frames, and window was opposite window in three tiers.'
  '50':
  - type: text
    content: 'the cups, snuffers, basins, dishes for incense, and '
  - type: note
    content: Ex. 27:3
  - type: text
    content: 'fire pans, of pure gold; and the sockets of gold, for the doors of the innermost part of the house, '
  - type: note
    content: See ch. 6:16
  - type: text
    content: the Most Holy Place, and for the doors of the nave of the temple.
  '51':
  - type: text
    content: 'Thus all the work that King Solomon did on the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was finished. And Solomon brought in '
  - type: note
    content: 2 Sam. 8:11
  - type: text
    content: 'the things that David his father had dedicated, the silver, the gold, and the vessels, and stored them in the treasuries of the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'And he made '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'the Hall of Pillars; its length was fifty cubits, and its breadth thirty cubits. There was a porch in front with pillars, and '
  - type: note
    content: Ezek. 41:25, 26
  - type: text
    content: a canopy in front of them.
  '7':
  - type: text
    content: 'And he made the Hall of the Throne where he was to pronounce judgment, even the Hall of Judgment. '
  - type: note
    content: ch. 6:15, 16
  - type: text
    content: It was finished with cedar from floor to rafters.
  - type: note
    content: Syriac, Vulgate; Hebrew floor
  '8':
  - type: text
    content: 'His own house where he was to dwell, in the other court at the back of the hall, was of like workmanship. Solomon also made a house like this hall for Pharaoh’s daughter '
  - type: note
    content: ch. 3:1; 2 Chr. 8:11
  - type: text
    content: whom he had taken in marriage.
  '9':
  - type: text
    content: 'All these were made of costly stones, cut according to measure, sawed with saws, back and front, even from the foundation to the coping, and from the outside to the great court. '
