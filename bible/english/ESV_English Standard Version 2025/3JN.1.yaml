      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 John 12
      marker-yv: yv-n
    - type: text
      text: 'I had much to write to you, but I would rather not write with pen and ink. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I hope to see you soon, and we will talk face to face.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peace be to you. The friends greet you. Greet the friends, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 10:3
      marker-yv: yv-n
    - type: text
      text: each by name.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, I pray that all may go well with you and that you may be in good health, as it goes well with your soul. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 John 4
      marker-yv: yv-n
