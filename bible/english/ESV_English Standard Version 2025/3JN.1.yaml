          text: 'adelphoi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(translated “brothers”) may refer either to '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brothers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or to '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: brothers and sisters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verses 5, 10
      marker-yv: yv-n
    - type: text
      text: ' came and testified to your truth, as indeed you are walking in the truth. '
