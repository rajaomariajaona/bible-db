document_id: 3JN.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: ' '
  - type: note
    content: 2 John 1
  - type: text
    content: 'The elder to the beloved Gaius, '
  - type: note
    content: 1 John 3:18; 2 John 1
  - type: text
    content: whom I love in truth.
  '10':
  - type: text
    content: So if I come, I will bring up what he is doing, talking wicked nonsense against us. And not content with that, he refuses to welcome the brothers, and also stops those who want to and puts them out of the church.
  '11':
  - type: text
    content: 'Beloved, '
  - type: note
    content: '[Ps. 34:14; 37:27; Isa. 1:16, 17]'
  - type: text
    content: 'do not imitate evil but imitate good. '
  - type: note
    content: 1 John 2:29
  - type: text
    content: 'Whoever does good is from God; '
  - type: note
    content: See 1 John 3:6
  - type: text
    content: 'whoever does evil has not seen God. '
  '12':
  - type: text
    content: 'Demetrius '
  - type: note
    content: '[1 Tim. 3:7]'
  - type: text
    content: 'has received a good testimony from everyone, and from the truth itself. We also add our testimony, and '
  - type: note
    content: John 21:24
  - type: text
    content: you know that our testimony is true.
  - type: heading
    content: Final Greetings
  '13':
  - type: text
    content: ' '
  - type: note
    content: 2 John 12
  - type: text
    content: 'I had much to write to you, but I would rather not write with pen and ink. '
  '14':
  - type: text
    content: I hope to see you soon, and we will talk face to face.
  '15':
  - type: text
    content: 'Peace be to you. The friends greet you. Greet the friends, '
  - type: note
    content: John 10:3
  - type: text
    content: each by name.
  '2':
  - type: text
    content: 'Beloved, I pray that all may go well with you and that you may be in good health, as it goes well with your soul. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: 2 John 4
  - type: text
    content: I rejoiced greatly when the brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verses 5, 10
  - type: text
    content: ' came and testified to your truth, as indeed you are walking in the truth. '
  '4':
  - type: text
    content: 'I have no greater joy than to hear that '
  - type: note
    content: '[1 Cor. 4:14, 15; Gal. 4:19; 1 Tim. 1:2; 2 Tim. 1:2; Titus 1:4; Philem. 10]'
  - type: text
    content: my children are walking in the truth.
  - type: heading
    content: Support and Opposition
  '5':
  - type: text
    content: 'Beloved, it is a faithful thing you do in all your efforts for '
  - type: note
    content: '[Gal. 6:10; Heb. 13:1]'
  - type: text
    content: 'these brothers, '
  - type: note
    content: See Matt. 25:35
  - type: text
    content: 'strangers as they are, '
  '6':
  - type: text
    content: 'who testified to your love before the church. You will do well to send them on their journey in a manner '
  - type: note
    content: 1 Thess. 2:12; [Col. 1:10]
  - type: text
    content: 'worthy of God. '
  '7':
  - type: text
    content: 'For they have gone out for the sake of '
  - type: note
    content: See Acts 5:41
  - type: text
    content: 'the name, '
  - type: note
    content: 1 Cor. 9:12, 15
  - type: text
    content: 'accepting nothing from the Gentiles. '
  '8':
  - type: text
    content: Therefore we ought to support people like these, that we may be fellow workers for the truth.
  '9':
  - type: text
    content: 'I have written something to the church, but Diotrephes, who likes to put himself first, does not acknowledge our authority. '
