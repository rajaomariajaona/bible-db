document_id: JER.41,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Gedaliah Murdered
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 25:25
  - type: text
    content: 'In the seventh month, Ishmael the son of Nethaniah, son of Elishama, of the royal family, one of the chief officers of the king, came with ten men to Gedaliah the son of Ahikam, at '
  - type: note
    content: See ch. 40:6, 8, 10
  - type: text
    content: 'Mizpah. As they '
  - type: note
    content: '[Ps. 41:9]'
  - type: text
    content: 'ate bread together there at Mizpah, '
  '10':
  - type: text
    content: 'Then Ishmael took captive all the rest of the people who were in Mizpah, '
  - type: note
    content: See ch. 38:23
  - type: text
    content: 'the king’s daughters and all the people who were left at Mizpah, whom '
  - type: note
    content: '[ch. 40:7]'
  - type: text
    content: 'Nebuzaradan, the captain of the guard, had committed to Gedaliah the son of Ahikam. Ishmael the son of Nethaniah took them captive and set out to cross over to '
  - type: note
    content: '[ch. 40:14]'
  - type: text
    content: the Ammonites.
  '11':
  - type: text
    content: 'But when '
  - type: note
    content: See ch. 40:8
  - type: text
    content: 'Johanan the son of Kareah and '
  - type: note
    content: ch. 40:13
  - type: text
    content: 'all the leaders of the forces with him heard of all the evil that Ishmael the son of Nethaniah had done, '
  '12':
  - type: text
    content: 'they took all their men and went to fight against Ishmael the son of Nethaniah. They came upon him at '
  - type: note
    content: '[2 Sam. 2:13]'
  - type: text
    content: 'the great pool that is in '
  - type: note
    content: Josh. 9:3, 17
  - type: text
    content: 'Gibeon. '
  '13':
  - type: text
    content: 'And when all the people who were with Ishmael saw Johanan the son of Kareah and '
  - type: note
    content: ch. 40:13
  - type: text
    content: 'all the leaders of the forces with him, they rejoiced. '
  '14':
  - type: note
    content: ver. 10, 16
  - type: text
    content: 'So all the people whom Ishmael had carried away captive from Mizpah turned around and came back, and went to Johanan the son of Kareah. '
  '15':
  - type: text
    content: 'But Ishmael the son of Nethaniah escaped from Johanan with eight men, and went to '
  - type: note
    content: '[ch. 40:14]'
  - type: text
    content: 'the Ammonites. '
  '16':
  - type: text
    content: 'Then Johanan the son of Kareah and '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'all the leaders of the forces with him took from Mizpah all the rest of the people whom he had recovered from Ishmael the son of Nethaniah, after he had struck down Gedaliah the son of Ahikam—soldiers, '
  - type: note
    content: ch. 40:7
  - type: text
    content: 'women, children, and eunuchs, whom Johanan brought back from '
  - type: note
    content: Josh. 9:3, 17
  - type: text
    content: 'Gibeon. '
  '17':
  - type: text
    content: 'And they went and stayed at Geruth '
  - type: note
    content: '[2 Sam. 19:37, 38]'
  - type: text
    content: 'Chimham near '
  - type: note
    content: '[Matt. 2:1, 14]; See Gen. 35:19'
  - type: text
    content: 'Bethlehem, intending to go to Egypt '
  '18':
  - type: text
    content: 'because of the Chaldeans. For they were afraid of them, because Ishmael the son of Nethaniah had struck down Gedaliah the son of Ahikam, '
  - type: note
    content: ver. 2; ch. 40:5
  - type: text
    content: whom the king of Babylon had made governor over the land.
  '2':
  - type: note
    content: '[2 Sam. 13:28, 29]'
  - type: text
    content: 'Ishmael the son of Nethaniah and the ten men with him rose up and struck down Gedaliah the son of Ahikam, son of Shaphan, with the sword, and killed him, '
  - type: note
    content: ch. 40:5
  - type: text
    content: 'whom the king of Babylon had appointed governor in the land. '
  '3':
  - type: text
    content: 'Ishmael also struck down all the Judeans who were with Gedaliah at '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: Mizpah, and the Chaldean soldiers who happened to be there.
  '4':
  - type: text
    content: 'On the day after the murder of Gedaliah, before anyone knew of it, '
  '5':
  - type: text
    content: 'eighty men arrived from '
  - type: note
    content: Josh. 17:7
  - type: text
    content: 'Shechem and '
  - type: note
    content: Josh. 18:1
  - type: text
    content: 'Shiloh and '
  - type: note
    content: 1 Kgs. 16:24; See ch. 23:13
  - type: text
    content: 'Samaria, with '
  - type: note
    content: '[ch. 48:37; Deut. 14:1; Isa. 15:2]'
  - type: text
    content: 'their beards shaved and '
  - type: note
    content: ch. 36:24
  - type: text
    content: 'their clothes torn, and '
  - type: note
    content: '[ch. 48:37; Deut. 14:1; Isa. 15:2]'
  - type: text
    content: 'their bodies gashed, '
  - type: note
    content: '[2 Kgs. 25:9]'
  - type: text
    content: 'bringing grain offerings and incense to present at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And Ishmael the son of Nethaniah came out from '
  - type: note
    content: ch. 40:6, 8, 10
  - type: text
    content: 'Mizpah to meet them, weeping as he came. As he met them, he said to them, “Come in to Gedaliah the son of Ahikam.” '
  '7':
  - type: text
    content: 'When they came into the city, Ishmael the son of Nethaniah and the men with him slaughtered them and cast them into a cistern. '
  '8':
  - type: text
    content: 'But there were ten men among them who said to Ishmael, “Do not put us to death, for we have '
  - type: note
    content: '[Judg. 6:11]'
  - type: text
    content: stores of wheat, barley, oil, and honey hidden in the fields.” So he refrained and did not put them to death with their companions.
  '9':
  - type: text
    content: Now the cistern into which Ishmael had thrown all the bodies of the men whom he had struck down along with
  - type: note
    content: Hebrew by the hand of
  - type: text
    content: ' Gedaliah was the large cistern that '
  - type: note
    content: '[1 Kgs. 15:22; 2 Chr. 16:6]'
  - type: text
    content: 'King Asa had made for defense against '
  - type: note
    content: '[1 Kgs. 15:22; 2 Chr. 16:6]'
  - type: text
    content: 'Baasha king of Israel; Ishmael the son of Nethaniah filled it with the slain. '
