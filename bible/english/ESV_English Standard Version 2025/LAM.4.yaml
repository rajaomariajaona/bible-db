document_id: LAM.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Holy Stones Lie Scattered
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 1:22; Jer. 6:30 ]'
  - type: text
    content: How the gold has grown dim,
  - type: text
    content: how the pure gold is changed!
  - type: text
    content: The holy stones lie scattered
  - type: note
    content: ch. 2:19
  - type: text
    content: at the head of every street.
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Jer. 19:9
  - type: text
    content: 'The hands of '
  - type: note
    content: '[1 Kgs. 3:26; Isa. 49:15]'
  - type: text
    content: compassionate women
  - type: note
    content: '[ 2 Kgs. 6:29 ]'
  - type: text
    content: have boiled their own children;
  - type: note
    content: Deut. 28:57
  - type: text
    content: they became their food
  - type: text
    content: during the destruction of the daughter of my people.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 5:13
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave full vent to his wrath;'
  - type: text
    content: he poured out his hot anger,
  - type: text
    content: 'and '
  - type: note
    content: See Jer. 17:27
  - type: text
    content: he kindled a fire in Zion
  - type: text
    content: that consumed its foundations.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 52:15; 53:1 ]'
  - type: text
    content: The kings of the earth did not believe,
  - type: text
    content: nor any of the inhabitants of the world,
  - type: text
    content: that foe or enemy could enter
  - type: text
    content: the gates of Jerusalem.
  '13':
  - type: text
    content: 'This was for '
  - type: note
    content: '[ch. 2:20]; See Jer. 5:31; 23:21'
  - type: text
    content: the sins of her prophets
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 2:20]; See Jer. 5:31; 23:21'
  - type: text
    content: the iniquities of her priests,
  - type: text
    content: who shed in the midst of her
  - type: text
    content: the blood of the righteous.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 59:10 ]'
  - type: text
    content: They wandered, blind, through the streets;
  - type: text
    content: they were so defiled with blood
  - type: note
    content: '[ Num. 19:16 ]'
  - type: text
    content: that no one was able to touch
  - type: text
    content: their garments.
  '15':
  - type: text
    content: '“Away! '
  - type: note
    content: '[Lev. 13:45]'
  - type: text
    content: Unclean!” people cried at them.
  - type: text
    content: “Away! Away! Do not touch!”
  - type: text
    content: So they became fugitives and wanderers;
  - type: text
    content: people said among the nations,
  - type: text
    content: “They shall stay with us no longer.”
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' himself'
  - type: note
    content: Hebrew The face of the Lord
  - type: text
    content: has scattered them;
  - type: text
    content: he will regard them no more;
  - type: note
    content: '[ Isa. 24:2 ]'
  - type: text
    content: no honor was shown to the priests,
  - type: note
    content: ch. 5:12
  - type: text
    content: no favor to the elders.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 119:82, 123; [ Jer. 3:23 ]
  - type: text
    content: Our eyes failed, ever watching
  - type: note
    content: Ps. 119:82, 123; [ Jer. 3:23 ]
  - type: text
    content: vainly for help;
  - type: text
    content: in our watching we watched
  - type: text
    content: 'for '
  - type: note
    content: Jer. 37:7, 8
  - type: text
    content: a nation which could not save.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:52
  - type: text
    content: They dogged our steps
  - type: text
    content: so that we could not walk in our streets;
  - type: note
    content: Ezek. 7:2, 3, 6; Amos 8:2
  - type: text
    content: our end drew near; our days were numbered,
  - type: text
    content: for our end had come.
  '19':
  - type: text
    content: 'Our pursuers were '
  - type: note
    content: Jer. 4:13; [2 Sam. 1:23; Hab. 1:8]
  - type: text
    content: swifter
  - type: text
    content: than the eagles in the heavens;
  - type: text
    content: they chased us on the mountains;
  - type: text
    content: they lay in wait for us in the wilderness.
  '2':
  - type: text
    content: The precious sons of Zion,
  - type: text
    content: 'worth their weight in '
  - type: note
    content: Ps. 19:10
  - type: text
    content: fine gold,
  - type: text
    content: 'how they are regarded as '
  - type: note
    content: See Jer. 19:11
  - type: text
    content: earthen pots,
  - type: text
    content: the work of a potter’s hands!
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 2:7 ]'
  - type: text
    content: 'The breath of our nostrils, '
  - type: note
    content: '[ch. 2:9; 2 Kgs. 25:5, 6]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed,
  - type: text
    content: 'was captured '
  - type: note
    content: '[Ezek. 12:13; 17:20; 19:4, 8]'
  - type: text
    content: in their pits,
  - type: text
    content: 'of whom we said, '
  - type: note
    content: '[Judg. 9:15; Ezek. 31:6, 17]'
  - type: text
    content: “Under his shadow
  - type: text
    content: we shall live among the nations.”
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:21 ]'
  - type: text
    content: Rejoice and be glad, O daughter of Edom,
  - type: text
    content: 'you who dwell in '
  - type: note
    content: Job 1:1; Jer. 25:20
  - type: text
    content: the land of Uz;
  - type: text
    content: 'but to you also '
  - type: note
    content: See Jer. 25:15, 16
  - type: text
    content: the cup shall pass;
  - type: text
    content: you shall become drunk and strip yourself bare.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 40:2 ]'
  - type: text
    content: The punishment of your iniquity, O daughter of Zion, is accomplished;
  - type: text
    content: he will keep you in exile no longer;
  - type: note
    content: Or he will not exile you again
  - type: text
    content: 'but '
  - type: note
    content: Obad. 10
  - type: text
    content: your iniquity, O daughter of Edom, he will punish;
  - type: text
    content: he will uncover your sins.
  '3':
  - type: text
    content: Even jackals offer the breast;
  - type: text
    content: they nurse their young;
  - type: text
    content: but the daughter of my people has become cruel,
  - type: text
    content: like the ostriches in the wilderness.
  '4':
  - type: text
    content: 'The tongue of the nursing infant '
  - type: note
    content: Ps. 22:15
  - type: text
    content: sticks
  - type: text
    content: to the roof of its mouth for thirst;
  - type: note
    content: '[ch. 2:11 ]'
  - type: text
    content: the children beg for food,
  - type: text
    content: but no one gives to them.
  '5':
  - type: text
    content: Those who once feasted on delicacies
  - type: text
    content: perish in the streets;
  - type: note
    content: '[ 2 Sam. 1:24 ]'
  - type: text
    content: those who were brought up in purple
  - type: text
    content: embrace ash heaps.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Matt. 10:15; Luke 10:12
  - type: text
    content: For the chastisement
  - type: note
    content: Or iniquity
  - type: text
    content: ' of the daughter of my people has been greater'
  - type: text
    content: than the punishment
  - type: note
    content: Or sin
  - type: text
    content: ' of Sodom,'
  - type: note
    content: Gen. 19:25; 2 Pet. 2:6; Jude 7
  - type: text
    content: which was overthrown in a moment,
  - type: text
    content: and no hands were wrung for her.
  - type: note
    content: The meaning of the Hebrew is uncertain
  '7':
  - type: text
    content: Her princes were purer than snow,
  - type: text
    content: whiter than milk;
  - type: text
    content: their bodies were more ruddy than coral,
  - type: text
    content: the beauty of their form
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' was like sapphire.'
  - type: note
    content: Hebrew lapis lazuli
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:10; Job 30:30; [ Ps. 119:83 ]
  - type: text
    content: Now their face is blacker than soot;
  - type: text
    content: they are not recognized in the streets;
  - type: text
    content: their skin has shriveled on their bones;
  - type: text
    content: it has become as dry as wood.
  '9':
  - type: text
    content: Happier were the victims of the sword
  - type: text
    content: than the victims of hunger,
  - type: text
    content: who wasted away, pierced
  - type: text
    content: by lack of the fruits of the field.
