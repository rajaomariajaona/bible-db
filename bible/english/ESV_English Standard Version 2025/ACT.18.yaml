document_id: ACT.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul in Corinth
  - type: text
    content: After this Paul
  - type: note
    content: Greek he
  - type: text
    content: ' left Athens and went to Corinth. '
  '10':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'for I am with you, and '
  - type: note
    content: '[Luke 21:18; 2 Thess. 3:2]'
  - type: text
    content: 'no one will attack you to harm you, for '
  - type: note
    content: '[John 10:16]'
  - type: text
    content: I have many in this city who are my people.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: And he stayed a year and six months, teaching the word of God among them.
  '12':
  - type: text
    content: 'But when Gallio was '
  - type: note
    content: See ch. 13:7
  - type: text
    content: 'proconsul of Achaia, '
  - type: note
    content: See ch. 13:50
  - type: text
    content: the Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verses 14 (twice), 28
  - type: text
    content: ' made a united attack on Paul and '
  - type: note
    content: See ch. 16:19
  - type: text
    content: 'brought him before the tribunal, '
  '13':
  - type: text
    content: 'saying, “This man is persuading people to worship God contrary to '
  - type: note
    content: ver. 15
  - type: text
    content: 'the law.” '
  '14':
  - type: text
    content: 'But when Paul was about to open his mouth, Gallio said to the Jews, “If it were a matter of wrongdoing or vicious '
  - type: note
    content: '[ch. 13:10]'
  - type: text
    content: 'crime, O Jews, I would have reason to accept your complaint. '
  '15':
  - type: text
    content: 'But '
  - type: note
    content: ch. 23:29; 25:19; [1 Tim. 6:4; 2 Tim. 2:14]
  - type: text
    content: 'since it is a matter of questions about words and names and '
  - type: note
    content: ver. 13
  - type: text
    content: 'your own law, see to it yourselves. I refuse to be a judge of these things.” '
  '16':
  - type: text
    content: 'And he drove them from the tribunal. '
  '17':
  - type: text
    content: And they all seized Sosthenes, the ruler of the synagogue, and beat him in front of the tribunal. But Gallio paid no attention to any of this.
  - type: heading
    content: Paul Returns to Antioch
  '18':
  - type: text
    content: 'After this, Paul stayed many days longer and then took leave of '
  - type: note
    content: See John 21:23
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters; also verse 27
  - type: text
    content: ' and set sail for Syria, and with him '
  - type: note
    content: ver. 2
  - type: text
    content: 'Priscilla and Aquila. At '
  - type: note
    content: Rom. 16:1
  - type: text
    content: 'Cenchreae '
  - type: note
    content: '[ch. 21:23, 24; Num. 6:2, 18]'
  - type: text
    content: 'he had cut his hair, for he was under a vow. '
  '19':
  - type: text
    content: 'And they came to '
  - type: note
    content: ch. 19:1; 20:16, 17; 1 Cor. 15:32; 16:8; Eph. 1:1; 1 Tim. 1:3; 2 Tim. 1:18
  - type: text
    content: 'Ephesus, and he left them there, but '
  - type: note
    content: ver. 4
  - type: text
    content: 'he himself went into the synagogue and reasoned with the Jews. '
  '2':
  - type: text
    content: 'And he found a Jew named '
  - type: note
    content: ver. 18, 26; Rom. 16:3; 1 Cor. 16:19; 2 Tim. 4:19
  - type: text
    content: 'Aquila, a native of Pontus, recently come from Italy with his wife '
  - type: note
    content: ver. 18, 26; Rom. 16:3; 1 Cor. 16:19; 2 Tim. 4:19
  - type: text
    content: 'Priscilla, because '
  - type: note
    content: ch. 11:28
  - type: text
    content: 'Claudius had commanded all the Jews to leave Rome. And he went to see them, '
  '20':
  - type: text
    content: 'When they asked him to stay for a longer period, he declined. '
  '21':
  - type: text
    content: 'But on taking leave of them he said, “I will return to you '
  - type: note
    content: 1 Cor. 4:19; 16:7; Heb. 6:3; James 4:15; [Rom. 15:32; 1 Pet. 3:17]
  - type: text
    content: if God wills,” and he set sail from Ephesus.
  '22':
  - type: text
    content: 'When he had landed at Caesarea, he '
  - type: note
    content: ch. 11:2; 21:15
  - type: text
    content: 'went up and greeted the church, and then went down to Antioch. '
  '23':
  - type: text
    content: 'After spending some time there, he departed and '
  - type: note
    content: ch. 16:6
  - type: text
    content: 'went from one place to the next through the region of Galatia and Phrygia, '
  - type: note
    content: See ch. 14:22
  - type: text
    content: strengthening all the disciples.
  - type: heading
    content: Apollos Speaks Boldly in Ephesus
  '24':
  - type: text
    content: 'Now a Jew named '
  - type: note
    content: ch. 19:1; 1 Cor. 1:12; 3:5, 6; 4:6; 16:12; Titus 3:13
  - type: text
    content: 'Apollos, a native of Alexandria, came to Ephesus. He was an eloquent man, '
  - type: note
    content: '[Ezra 7:6]'
  - type: text
    content: 'competent in the Scriptures. '
  '25':
  - type: text
    content: 'He had been instructed in '
  - type: note
    content: See ch. 9:2
  - type: text
    content: 'the way of the Lord. And '
  - type: note
    content: Rom. 12:11
  - type: text
    content: being fervent in spirit,
  - type: note
    content: Or in the Spirit
  - type: text
    content: ' he spoke and taught accurately the things concerning Jesus, though he knew only '
  - type: note
    content: ch. 19:3; Luke 7:29
  - type: text
    content: 'the baptism of John. '
  '26':
  - type: text
    content: 'He began to speak boldly in the synagogue, but when '
  - type: note
    content: See ver. 2
  - type: text
    content: 'Priscilla and Aquila heard him, they took him aside and explained to him '
  - type: note
    content: Matt. 22:16; [ver. 25]
  - type: text
    content: 'the way of God more accurately. '
  '27':
  - type: text
    content: 'And when he wished to cross to '
  - type: note
    content: '[ch. 19:1]'
  - type: text
    content: 'Achaia, '
  - type: note
    content: ver. 18
  - type: text
    content: 'the brothers encouraged him and '
  - type: note
    content: '[2 Cor. 3:1]'
  - type: text
    content: 'wrote to the disciples to welcome him. When he arrived, '
  - type: note
    content: 1 Cor. 3:6; [ch. 11:21, 23; 15:11; Eph. 2:8]
  - type: text
    content: 'he greatly helped those who through grace had believed, '
  '28':
  - type: text
    content: 'for he powerfully refuted the Jews in public, showing by the Scriptures '
  - type: note
    content: See ver. 5
  - type: text
    content: that the Christ was Jesus.
  '3':
  - type: text
    content: 'and '
  - type: note
    content: ch. 20:34; 1 Cor. 4:12; 9:15; 2 Cor. 11:7; 12:13; 1 Thess. 2:9; 2 Thess. 3:8
  - type: text
    content: 'because he was of the same trade he stayed with them and worked, for they were tentmakers by trade. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: ch. 17:17; See ch. 13:5, 14
  - type: text
    content: 'he reasoned in the synagogue '
  - type: note
    content: ch. 17:17; See ch. 13:5, 14
  - type: text
    content: every Sabbath, and tried to persuade Jews and Greeks.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:15; 1 Thess. 3:6
  - type: text
    content: 'When Silas and Timothy arrived from Macedonia, Paul '
  - type: note
    content: 2 Cor. 5:14; [Job 32:18; Jer. 6:11; 20:9; Amos 3:8]
  - type: text
    content: 'was occupied with the word, '
  - type: note
    content: ch. 20:21
  - type: text
    content: 'testifying to the Jews that the Christ was '
  - type: note
    content: ver. 28; ch. 2:36; 5:42; 17:3; [ch. 3:20; 8:5; 9:22]
  - type: text
    content: 'Jesus. '
  '6':
  - type: text
    content: 'And when they opposed and reviled him, '
  - type: note
    content: Neh. 5:13; [ch. 13:51]
  - type: text
    content: 'he shook out his garments and said to them, '
  - type: note
    content: Ezek. 18:13; 33:4; [2 Sam. 1:16; Matt. 27:25]
  - type: text
    content: '“Your blood be on your own heads! '
  - type: note
    content: ch. 20:26 (Gk.); [Ezek. 3:18, 19]
  - type: text
    content: 'I am innocent. '
  - type: note
    content: See ch. 13:46
  - type: text
    content: 'From now on I will go to the Gentiles.” '
  '7':
  - type: text
    content: 'And he left there and went to the house of a man named Titius '
  - type: note
    content: '[ch. 1:23; Col. 4:11]'
  - type: text
    content: 'Justus, '
  - type: note
    content: ch. 16:14
  - type: text
    content: 'a worshiper of God. His house was next door to the synagogue. '
  '8':
  - type: note
    content: 1 Cor. 1:14
  - type: text
    content: 'Crispus, the ruler of the synagogue, believed in the Lord, together '
  - type: note
    content: See ch. 11:14
  - type: text
    content: 'with his entire household. And many of the Corinthians hearing Paul believed and were baptized. '
  '9':
  - type: text
    content: 'And the Lord said to Paul '
  - type: note
    content: ch. 23:11; 27:23
  - type: text
    content: 'one night in '
  - type: note
    content: '[ch. 26:16; 2 Cor. 12:1-4]'
  - type: text
    content: 'a vision, '
  - type: note
    content: ch. 27:24; Josh. 1:5, 6; Jer. 1:8; Matt. 28:20
  - type: text
    content: “Do not be afraid, but go on speaking and do not be silent,
  - type: text
    content: ' '
