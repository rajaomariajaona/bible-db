document_id: JDG.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah’s Conflict with Ephraim
  - type: text
    content: ' '
  - type: note
    content: ch. 8:1
  - type: text
    content: 'The men of Ephraim were called to arms, and they crossed to Zaphon and said to Jephthah, “Why did you cross over to fight against the Ammonites and did not call us to go with you? We will burn your house over you with fire.” '
  '10':
  - type: text
    content: Then Ibzan died and was buried at Bethlehem.
  '11':
  - type: text
    content: 'After him Elon the Zebulunite judged Israel, and he judged Israel ten years. '
  '12':
  - type: text
    content: Then Elon the Zebulunite died and was buried at Aijalon in the land of Zebulun.
  '13':
  - type: text
    content: 'After him Abdon the son of Hillel the Pirathonite judged Israel. '
  '14':
  - type: text
    content: 'He had forty '
  - type: note
    content: Job 18:19; Isa. 14:22; [1 Tim. 5:4]
  - type: text
    content: 'sons and thirty grandsons, who '
  - type: note
    content: ch. 5:10
  - type: text
    content: 'rode on seventy donkeys, and he judged Israel eight years. '
  '15':
  - type: text
    content: Then Abdon the son of Hillel the Pirathonite died and was buried at Pirathon in the land of Ephraim, in the hill country of the Amalekites.
  '2':
  - type: text
    content: 'And Jephthah said to them, “I and my people had a great dispute with the Ammonites, and when I called you, you did not save me from their hand. '
  '3':
  - type: text
    content: 'And when I saw that you would not save me, '
  - type: note
    content: 1 Sam. 19:5; 28:21; Job 13:14; [Ps. 119:109]
  - type: text
    content: 'I took my life in my hand and crossed over against the Ammonites, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into my hand. Why then have you come up to me this day to fight against me?” '
  '4':
  - type: text
    content: 'Then Jephthah gathered all the men of Gilead and fought with Ephraim. And the men of Gilead struck Ephraim, because they said, '
  - type: note
    content: '[1 Sam. 25:10]'
  - type: text
    content: '“You are fugitives of Ephraim, you Gileadites, in the midst of Ephraim and Manasseh.” '
  '5':
  - type: text
    content: 'And the Gileadites captured '
  - type: note
    content: See ch. 3:28
  - type: text
    content: 'the fords of the Jordan against the Ephraimites. And when any of the fugitives of Ephraim said, “Let me go over,” the men of Gilead said to him, “Are you an Ephraimite?” When he said, “No,” '
  '6':
  - type: text
    content: 'they said to him, “Then say Shibboleth,” and he said, “Sibboleth,” for he could not pronounce it right. Then they seized him and slaughtered him at '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: the fords of the Jordan. At that time 42,000 of the Ephraimites fell.
  '7':
  - type: text
    content: Jephthah judged Israel six years. Then Jephthah the Gileadite died and was buried in his city in Gilead.
  - type: note
    content: Septuagint; Hebrew in the cities of Gilead
  - type: heading
    content: Ibzan, Elon, and Abdon
  '8':
  - type: text
    content: 'After him Ibzan of Bethlehem judged Israel. '
  '9':
  - type: text
    content: 'He had thirty sons, and thirty daughters he gave in marriage outside his clan, and thirty daughters he brought in from outside for his sons. And he judged Israel seven years. '
