  - type: text
    content: 'the countries all around her; for they have rejected my rules and have not walked in my statutes. '
  '7':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because you are '
  - type: note
