document_id: LEV.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Is Holy
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'And you shall not strip your vineyard bare, neither shall you gather the fallen grapes of your vineyard. You shall leave them for the poor and for the sojourner: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 20:15
  - type: text
    content: '“You shall not steal; '
  - type: note
    content: '[ch. 6:2, 3; Eph. 4:15, 25; Col. 3:9]'
  - type: text
    content: 'you shall not deal falsely; you shall not lie to one another. '
  '12':
  - type: note
    content: See Ex. 20:7
  - type: text
    content: 'You shall not swear by my name falsely, and so '
  - type: note
    content: See ch. 18:21
  - type: text
    content: 'profane the name of your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:2, 3
  - type: text
    content: '“You shall not oppress your neighbor or rob him. '
  - type: note
    content: Deut. 24:14, 15; Mal. 3:5; [James 5:4]
  - type: text
    content: 'The wages of a hired worker shall not remain with you all night until the morning. '
  '14':
  - type: note
    content: Deut. 27:18
  - type: text
    content: 'You shall not curse the deaf or put a stumbling block before the blind, but you shall '
  - type: note
    content: ver. 32; ch. 25:17; Eccles. 5:7; 12:13; 1 Pet. 2:17
  - type: text
    content: 'fear your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex. 23:2, 3; Deut. 1:17; 16:19; 27:19; Ps. 82:2; Prov. 24:23; James 2:9; [ 2 Chr. 19:6, 7 ]
  - type: text
    content: '“You shall do no injustice in court. You shall not be partial to the poor or defer to the great, but in righteousness shall you judge your neighbor. '
  '16':
  - type: note
    content: Prov. 11:13; 20:19
  - type: text
    content: 'You shall not go around as a slanderer among your people, and you shall not '
  - type: note
    content: Ex. 23:1, 7; [Matt. 26:60, 61]; See 1 Kgs. 21:10-13; Acts 6:11-13
  - type: text
    content: stand up against the life
  - type: note
    content: Hebrew blood
  - type: text
    content: ' of your neighbor: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 1 John 2:9, 11; 3:15
  - type: text
    content: '“You shall not hate your brother in your heart, but '
  - type: note
    content: Prov. 27:5, 6; Matt. 18:15; Luke 17:3; Gal. 6:1; Eph. 5:11
  - type: text
    content: 'you shall reason frankly with your neighbor, lest you '
  - type: note
    content: '[ch. 22:16; Rom. 1:32; 1 Tim. 5:22; 2 John 11]'
  - type: text
    content: 'incur sin because of him. '
  '18':
  - type: note
    content: Prov. 20:22; Rom. 12:17, 19; Heb. 10:30
  - type: text
    content: 'You shall not take vengeance or bear a grudge against the sons of your own people, but '
  - type: note
    content: Matt. 5:43; Cited Matt. 19:19; 22:39; Mark 12:31; Luke 10:27; Rom. 13:9; Gal. 5:14; James 2:8
  - type: text
    content: 'you shall love your neighbor as yourself: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: You Shall Keep My Statutes
  '19':
  - type: text
    content: ' '
  - type: note
    content: See ch. 18:4, 5
  - type: text
    content: '“You shall keep my statutes. You shall not let your cattle breed with a different kind. '
  - type: note
    content: Deut. 22:9-11
  - type: text
    content: You shall not sow your field with two kinds of seed, nor shall you wear a garment of cloth made of two kinds of material.
  '2':
  - type: text
    content: '“Speak to all the congregation of the people of Israel and say to them, '
  - type: note
    content: See ch. 11:44, 45
  - type: text
    content: 'You shall be holy, for I the '
  - type: text
    content: Lord
  - type: text
    content: ' your God am holy. '
  '20':
  - type: text
    content: '“If a man lies sexually with a woman who is a slave, assigned to another man and not yet ransomed or given her freedom, a distinction shall be made. They shall not be put to death, because she was not free; '
  '21':
  - type: text
    content: 'but '
  - type: note
    content: ch. 5:15; 6:6, 7
  - type: text
    content: 'he shall bring his compensation to the '
  - type: text
    content: Lord
  - type: text
    content: ', to the entrance of the tent of meeting, a ram for a guilt offering. '
  '22':
  - type: text
    content: 'And the priest shall make atonement for him with the ram of the guilt offering before the '
  - type: text
    content: Lord
  - type: text
    content: ' for his sin that he has committed, and he shall be forgiven for the sin that he has committed.'
  '23':
  - type: text
    content: “When you come into the land and plant any kind of tree for food, then you shall regard its fruit as forbidden.
  - type: note
    content: Hebrew as its uncircumcision
  - type: text
    content: ' Three years it shall be forbidden to you; it must not be eaten. '
  '24':
  - type: text
    content: 'And in the fourth year all its fruit shall be holy, an offering of praise to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'But in the fifth year you may eat of its fruit, to increase its yield for you: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:17
  - type: text
    content: '“You shall not eat any flesh with the blood in it. '
  - type: note
    content: Deut. 18:10; 2 Kgs. 17:17
  - type: text
    content: 'You shall not interpret omens or '
  - type: note
    content: 2 Kgs. 21:6; 2 Chr. 33:6
  - type: text
    content: 'tell fortunes. '
  '27':
  - type: note
    content: ch. 21:5; [Isa. 15:2; Jer. 9:26; 48:37]
  - type: text
    content: 'You shall not round off the hair on your temples or mar the edges of your beard. '
  '28':
  - type: text
    content: 'You shall not make any '
  - type: note
    content: ch. 21:1, 4, 5; Deut. 14:1; 1 Kgs. 18:28; Jer. 16:6; 41:5; 47:5; 48:37
  - type: text
    content: 'cuts on your body for the dead or tattoo yourselves: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 23:17 ]'
  - type: text
    content: '“Do not profane your daughter by making her a prostitute, lest the land fall into prostitution and the land become full of depravity. '
  '3':
  - type: note
    content: See Ex. 20:12
  - type: text
    content: 'Every one of you shall revere his mother and his father, and '
  - type: note
    content: See Ex. 20:8
  - type: text
    content: 'you shall keep my Sabbaths: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '30':
  - type: note
    content: ver. 3; ch. 26:2; See Ex. 20:8
  - type: text
    content: 'You shall keep my Sabbaths and '
  - type: note
    content: Eccles. 5:1; [Matt. 21:12, 13; Mark 11:15-17; Luke 19:45, 46; John 2:14-16]
  - type: text
    content: 'reverence my sanctuary: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 20:6, 27; Deut. 18:11; Isa. 8:19; [ Ex. 22:18; 1 Sam. 28:3, 7, 9; 1 Chr. 10:13; Acts 16:16 ]
  - type: text
    content: '“Do not turn to mediums or necromancers; do not seek them out, and so make yourselves unclean by them: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Prov. 20:29; [ Lam. 5:12 ]
  - type: text
    content: '“You shall stand up before the gray head and honor the face of an old man, and you shall '
  - type: note
    content: See ver. 14
  - type: text
    content: 'fear your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: ' '
  - type: note
    content: Ex. 22:21; 23:9; Mal. 3:5
  - type: text
    content: '“When a stranger sojourns with you in your land, you shall not do him wrong. '
  '34':
  - type: note
    content: See ch. 16:29
  - type: text
    content: 'You shall treat the stranger who sojourns with you as the native among you, and '
  - type: note
    content: Deut. 10:19; See ver. 18
  - type: text
    content: 'you shall love him as yourself, for you were strangers in the land of Egypt: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: See ver. 15
  - type: text
    content: '“You shall do no wrong in judgment, in measures of length or weight or quantity. '
  '36':
  - type: note
    content: Deut. 25:13, 15; Prov. 11:1; 16:11; 20:10; Ezek. 45:10; [Amos 8:5; Mic. 6:11]
  - type: text
    content: 'You shall have just balances, just weights, a just ephah, and a just hin:'
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters; a hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt. '
  '37':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 18:4, 5
  - type: text
    content: 'you shall observe all my statutes and all my rules, and do them: I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: note
    content: ch. 26:1; 1 John 5:21; See Ex. 20:3-5
  - type: text
    content: 'Do not turn to idols '
  - type: note
    content: Ex. 34:17; [Deut. 27:15]
  - type: text
    content: 'or make for yourselves any gods of cast metal: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 7:15-18
  - type: text
    content: '“When you offer a sacrifice of peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', you shall offer it so '
  - type: note
    content: ch. 1:3; 22:19
  - type: text
    content: 'that you may be accepted. '
  '6':
  - type: text
    content: 'It shall be eaten the same day you offer it or on the day after, and anything left over until the third day shall be burned up with fire. '
  '7':
  - type: text
    content: 'If it is eaten at all on the third day, it is '
  - type: note
    content: ch. 7:18
  - type: text
    content: 'tainted; it will not be accepted, '
  '8':
  - type: text
    content: 'and everyone who eats it shall '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'bear his iniquity, because '
  - type: note
    content: ch. 22:15
  - type: text
    content: 'he has profaned what is holy to the '
  - type: text
    content: Lord
  - type: text
    content: ', and that person shall be cut off from his people.'
  - type: heading
    content: Love Your Neighbor as Yourself
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:22; Deut. 24:19-21; [ Ruth 2:15, 16 ]
  - type: text
    content: '“When you reap the harvest of your land, you shall not reap your field right up to its edge, neither shall you gather the gleanings after your harvest. '
