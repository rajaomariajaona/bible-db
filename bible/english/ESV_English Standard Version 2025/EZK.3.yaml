document_id: EZK.3,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: '[See ch. 2:1 above]'
  - type: text
    content: '“Son of man, eat whatever you find here. '
  - type: note
    content: '[ch. 2:8]'
  - type: text
    content: 'Eat this scroll, and go, speak to the house of Israel.” '
  '10':
  - type: text
    content: 'Moreover, he said to me, “Son of man, '
  - type: note
    content: Jer. 26:2
  - type: text
    content: 'all my words that I shall speak to you receive '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'in your heart, and hear with your ears. '
  '11':
  - type: text
    content: 'And go to the exiles, '
  - type: note
    content: ch. 33:2, 12, 17, 30
  - type: text
    content: 'to your people, and speak to them and say to them, '
  - type: note
    content: ver. 27
  - type: text
    content: '‘Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ',’ '
  - type: note
    content: ch. 2:7
  - type: text
    content: whether they hear or refuse to hear.”
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:3; 11:1, 24; 43:5; [ch. 37:1 ]
  - type: text
    content: Then the Spirit
  - type: note
    content: Or the wind; also verse 14
  - type: text
    content: ' lifted me up, and I heard behind me the voice'
  - type: note
    content: Or sound
  - type: text
    content: ' of '
  - type: note
    content: '[ch. 1:24]'
  - type: text
    content: 'a great earthquake: “Blessed be the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' from its place!” '
  '13':
  - type: text
    content: 'It was the sound of the wings of '
  - type: note
    content: ch. 1:5, 15
  - type: text
    content: 'the living creatures as they touched one another, and the sound of the wheels beside them, and the sound of '
  - type: note
    content: '[ch. 1:24]'
  - type: text
    content: 'a great earthquake. '
  '14':
  - type: note
    content: ch. 8:3; 11:1, 24; 43:5; [ch. 37:1]
  - type: text
    content: 'The Spirit lifted me up and took me away, and I went in bitterness in the heat of my spirit, the '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' being strong upon me. '
  '15':
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'And I came to the exiles at Tel-abib, who were dwelling '
  - type: note
    content: See ch. 1:1
  - type: text
    content: by the Chebar canal, and I sat where they were dwelling.
  - type: note
    content: Or Chebar, and to where they dwelt
  - type: text
    content: ' And '
  - type: note
    content: Job 2:13; Ps. 137:1; Lam. 2:10
  - type: text
    content: 'I sat there '
  - type: note
    content: ch. 4:17; Isa. 52:14; Jer. 14:9
  - type: text
    content: 'overwhelmed among them '
  - type: note
    content: '[Gen. 50:10; 1 Sam. 31:13]'
  - type: text
    content: seven days.
  - type: heading
    content: A Watchman for Israel
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 42:7 ]'
  - type: text
    content: 'And at the end of seven days, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '17':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: ch. 33:7; Isa. 52:8; 56:10; Jer. 6:17; [Heb. 13:17]
  - type: text
    content: 'I have made you a watchman for the house of Israel. Whenever you hear a word from my mouth, you shall '
  - type: note
    content: 2 Chr. 19:10; [2 Kgs. 6:10]; See ver. 18-21; ch. 33:4-6
  - type: text
    content: 'give them warning from me. '
  '18':
  - type: note
    content: ch. 33:8
  - type: text
    content: 'If I say to the wicked, '
  - type: note
    content: Gen. 2:17
  - type: text
    content: '‘You shall surely die,’ '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'and you give him no warning, nor speak to warn the wicked from his wicked way, in order to save his life, that wicked person '
  - type: note
    content: ch. 18:18; Jer. 31:30; [John 8:21, 24]
  - type: text
    content: shall die for
  - type: note
    content: Or in; also verses 19, 20
  - type: text
    content: ' his iniquity, '
  - type: note
    content: ver. 20; ch. 33:6, 8; 34:10; [ch. 18:13; Acts 18:6; 20:26]
  - type: text
    content: 'but his blood I will require at your hand. '
  '19':
  - type: note
    content: ch. 33:9
  - type: text
    content: 'But if you warn the wicked, and he does not turn from his wickedness, or from his wicked way, he shall die for his iniquity, '
  - type: note
    content: '[1 Tim. 4:16]'
  - type: text
    content: 'but you '
  - type: note
    content: ch. 14:14, 20
  - type: text
    content: 'will have delivered your soul. '
  '2':
  - type: text
    content: 'So I opened my mouth, and he gave me this scroll to eat. '
  '20':
  - type: note
    content: See ch. 18:24
  - type: text
    content: 'Again, if a righteous person turns from his righteousness and commits injustice, '
  - type: note
    content: Jer. 6:21
  - type: text
    content: 'and I lay a stumbling block before him, he shall die. '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'Because you have not warned him, he shall die for his sin, '
  - type: note
    content: See ch. 18:24
  - type: text
    content: 'and his righteous deeds that he has done shall not be remembered, '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'but his blood I will require at your hand. '
  '21':
  - type: text
    content: But if you warn the righteous person not to sin, and he does not sin, he shall surely live, because he took warning, and you will have delivered your soul.”
  '22':
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'And the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon me there. And he said to me, “Arise, go out into '
  - type: note
    content: ch. 8:4; 37:1; Gen. 11:2
  - type: text
    content: the valley,
  - type: note
    content: Or plain; also verse 23
  - type: text
    content: ' and '
  - type: note
    content: '[Acts 9:6; 22:10]'
  - type: text
    content: 'there I will speak with you.” '
  '23':
  - type: text
    content: 'So I arose and went out into the valley, and behold, '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood there, like the glory that I had seen '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'by the Chebar canal, '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'and I fell on my face. '
  '24':
  - type: note
    content: See ch. 2:2
  - type: text
    content: 'But the Spirit entered into me and set me on my feet, and he spoke with me and said to me, “Go, shut yourself within your house. '
  '25':
  - type: text
    content: 'And you, O son of man, behold, '
  - type: note
    content: ch. 4:8
  - type: text
    content: 'cords will be placed upon you, and you shall be bound with them, so that you cannot go out among the people. '
  '26':
  - type: text
    content: 'And I will make your tongue cling to the roof of your mouth, so that '
  - type: note
    content: '[Isa. 8:16]'
  - type: text
    content: 'you shall be mute and unable to reprove them, '
  - type: note
    content: '[ch. 2:3]'
  - type: text
    content: 'for they are a rebellious house. '
  '27':
  - type: note
    content: '[ch. 24:27; 29:21]'
  - type: text
    content: 'But when I speak with you, I will open your mouth, and you shall say to them, '
  - type: note
    content: ver. 11
  - type: text
    content: '‘Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: '.’ '
  - type: note
    content: '[Rev. 22:11]'
  - type: text
    content: He who will hear, let him hear; and he who will refuse to hear, let him refuse, for they are a rebellious house.
  '3':
  - type: text
    content: 'And he said to me, “Son of man, feed your belly with this scroll that I give you and fill your stomach with it.” '
  - type: note
    content: Jer. 15:16; Rev. 10:9, 10
  - type: text
    content: 'Then I ate it, and it was in my mouth '
  - type: note
    content: '[Ps. 19:10; 119:103]'
  - type: text
    content: as sweet as honey.
  '4':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, go to the house of Israel and speak with my words to them. '
  '5':
  - type: text
    content: 'For you are not sent to a people of foreign speech and a hard language, but to the house of Israel— '
  '6':
  - type: text
    content: 'not to many peoples of foreign speech and a hard language, whose words you cannot understand. '
  - type: note
    content: '[Matt. 11:21, 23]'
  - type: text
    content: 'Surely, if I sent you to such, they would listen to you. '
  '7':
  - type: note
    content: '[John 15:20]'
  - type: text
    content: 'But the house of Israel will not be willing to listen to you, for they are not willing to listen to me: because all the house of Israel '
  - type: note
    content: '[ch. 2:4]'
  - type: text
    content: 'have a hard forehead and a stubborn heart. '
  '8':
  - type: note
    content: See Jer. 1:18
  - type: text
    content: 'Behold, I have made your face as hard as their faces, and your forehead as hard as their foreheads. '
  '9':
  - type: text
    content: 'Like '
  - type: note
    content: '[Isa. 50:7]'
  - type: text
    content: 'emery harder than flint have I made your forehead. '
  - type: note
    content: ch. 2:6
  - type: text
    content: 'Fear them not, nor be dismayed at their looks, for they are a rebellious house.” '
