document_id: GEN.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac and Rebekah
  - type: text
    content: 'Now Abraham was old, well advanced in years. And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 35; ch. 13:2
  - type: text
    content: 'had blessed Abraham in all things. '
  '10':
  - type: text
    content: 'Then the servant took ten of his master’s camels and departed, taking all sorts of choice gifts from his master; and he arose and went to '
  - type: note
    content: Deut. 23:4; Judg. 3:8
  - type: text
    content: Mesopotamia
  - type: note
    content: Hebrew Aram-naharaim
  - type: text
    content: ' to the city of Nahor. '
  '11':
  - type: text
    content: 'And he made the camels kneel down outside the city by the well of water at the time of evening, the time when '
  - type: note
    content: 1 Sam. 9:11; John 4:7
  - type: text
    content: 'women go out to draw water. '
  '12':
  - type: text
    content: 'And he said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 27, 42, 48
  - type: text
    content: 'God of my master Abraham, '
  - type: note
    content: ch. 27:20
  - type: text
    content: 'please grant me success today and show steadfast love to my master Abraham. '
  '13':
  - type: text
    content: 'Behold, '
  - type: note
    content: ver. 43
  - type: text
    content: 'I am standing by the spring of water, and the daughters of the men of the city are coming out to draw water. '
  '14':
  - type: text
    content: 'Let the young woman to whom I shall say, ‘Please let down your jar that I may drink,’ and who shall say, ‘Drink, and I will water your camels’—let her be the one whom you have appointed for your servant Isaac. '
  - type: note
    content: See ch. 15:8
  - type: text
    content: By this
  - type: note
    content: Or By her
  - type: text
    content: ' I shall know that you have shown steadfast love to my master.”'
  '15':
  - type: text
    content: 'Before he had finished speaking, behold, Rebekah, who was born to Bethuel the son of '
  - type: note
    content: ch. 11:29; 22:23
  - type: text
    content: 'Milcah, the wife of Nahor, Abraham’s brother, came out with her water jar on her shoulder. '
  '16':
  - type: text
    content: 'The young woman '
  - type: note
    content: ch. 26:7
  - type: text
    content: was very attractive in appearance, a maiden
  - type: note
    content: Or a woman of marriageable age
  - type: text
    content: ' whom no man had known. She went down to the spring and filled her jar and came up. '
  '17':
  - type: text
    content: 'Then the servant ran to meet her and said, “Please give me a little water to drink from your jar.” '
  '18':
  - type: text
    content: 'She said, “Drink, my lord.” And she quickly let down her jar upon her hand and gave him a drink. '
  '19':
  - type: text
    content: 'When she had finished giving him a drink, she said, “I will draw water for your camels also, until they have finished drinking.” '
  '2':
  - type: text
    content: 'And Abraham said to his servant, '
  - type: note
    content: '[ch. 15:2]'
  - type: text
    content: 'the oldest of his household, who had charge of all that he had, '
  - type: note
    content: ver. 9; ch. 47:29
  - type: text
    content: '“Put your hand under my thigh, '
  '20':
  - type: text
    content: 'So she quickly emptied her jar into the trough and ran again to the well to draw water, and she drew for all his camels. '
  '21':
  - type: text
    content: 'The man gazed at her in silence to learn whether the '
  - type: text
    content: Lord
  - type: text
    content: ' had prospered his journey or not.'
  '22':
  - type: text
    content: When the camels had finished drinking, the man took a gold ring weighing a half shekel,
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' and two bracelets for her arms weighing ten gold shekels, '
  '23':
  - type: text
    content: 'and said, “Please tell me whose daughter you are. Is there room in your father’s house for us to spend the night?” '
  '24':
  - type: text
    content: 'She said to him, '
  - type: note
    content: ver. 15; ch. 22:23
  - type: text
    content: '“I am the daughter of Bethuel the son of Milcah, whom she bore to Nahor.” '
  '25':
  - type: text
    content: 'She added, “We have plenty of both straw and fodder, and room to spend the night.” '
  '26':
  - type: note
    content: ver. 48, 52; Ex. 4:31
  - type: text
    content: 'The man bowed his head and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and said, “Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 12, 42, 48
  - type: text
    content: 'the God of my master Abraham, who has not forsaken '
  - type: note
    content: ch. 32:10; Ps. 98:3
  - type: text
    content: 'his steadfast love and his faithfulness toward my master. As for me, the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 48
  - type: text
    content: 'has led me in the way to the house of my master’s kinsmen.” '
  '28':
  - type: text
    content: Then the young woman ran and told her mother’s household about these things.
  '29':
  - type: text
    content: 'Rebekah had a brother whose name was '
  - type: note
    content: ch. 25:20; 28:2; 29:5
  - type: text
    content: 'Laban. Laban ran out toward the man, to the spring. '
  '3':
  - type: text
    content: 'that I may make you swear by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven and God of the earth, that '
  - type: note
    content: ch. 26:34, 35; 27:46; Deut. 7:3; [2 Cor. 6:14]
  - type: text
    content: 'you will not take a wife for my son from the daughters of the Canaanites, among whom I dwell, '
  '30':
  - type: text
    content: 'As soon as he saw the ring and the bracelets on his sister’s arms, and heard the words of Rebekah his sister, “Thus the man spoke to me,” he went to the man. And behold, he was standing by the camels at the spring. '
  '31':
  - type: text
    content: 'He said, “Come in, '
  - type: note
    content: '[ch. 26:29; Judg. 17:2; Ruth 3:10]'
  - type: text
    content: 'O blessed of the '
  - type: text
    content: Lord
  - type: text
    content: '. Why do you stand outside? For I have prepared the house and a place for the camels.” '
  '32':
  - type: text
    content: 'So the man came to the house and unharnessed the camels, and gave '
  - type: note
    content: ch. 43:24; Judg. 19:21
  - type: text
    content: 'straw and fodder to the camels, and there was '
  - type: note
    content: See ch. 18:4
  - type: text
    content: 'water to wash his feet and the feet of the men who were with him. '
  '33':
  - type: text
    content: Then food was set before him to eat. But he said, “I will not eat until I have said what I have to say.” He said, “Speak on.”
  '34':
  - type: text
    content: 'So he said, “I am Abraham’s servant. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 1
  - type: text
    content: 'has greatly blessed my master, and he has become great. He has given him flocks and herds, silver and gold, male servants and female servants, camels and donkeys. '
  '36':
  - type: text
    content: 'And Sarah my master’s wife '
  - type: note
    content: ch. 21:2
  - type: text
    content: 'bore a son to my master when she was old, and '
  - type: note
    content: ch. 25:5
  - type: text
    content: 'to him he has given all that he has. '
  '37':
  - type: note
    content: ver. 3-8
  - type: text
    content: 'My master made me swear, saying, ‘You shall not take a wife for my son from the daughters of the Canaanites, in whose land I dwell, '
  '38':
  - type: text
    content: 'but you shall go to my father’s house and to my clan and take a wife for my son.’ '
  '39':
  - type: text
    content: 'I said to my master, ‘Perhaps the woman will not follow me.’ '
  '4':
  - type: note
    content: '[ch. 28:2]'
  - type: text
    content: 'but will go to my country and to my kindred, and take a wife for my son Isaac.” '
  '40':
  - type: text
    content: 'But he said to me, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 17:1
  - type: text
    content: 'before whom I have walked, will send his angel with you and '
  - type: note
    content: ver. 21
  - type: text
    content: 'prosper your way. You shall take a wife for my son from my clan and from my father’s house. '
  '41':
  - type: text
    content: Then you will be free from my oath, when you come to my clan. And if they will not give her to you, you will be free from my oath.’
  '42':
  - type: text
    content: '“I came today to the spring and said, '
  - type: note
    content: ver. 12, 27
  - type: text
    content: '‘O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my master Abraham, if now you '
  - type: note
    content: '[See ver. 40 above]'
  - type: text
    content: 'are prospering the way that I go, '
  '43':
  - type: text
    content: 'behold, I am standing '
  - type: note
    content: ver. 13
  - type: text
    content: 'by the spring of water. Let the virgin who comes out to draw water, to whom I shall say, “Please give me a little water from your jar to drink,” '
  '44':
  - type: note
    content: ver. 14, 18
  - type: text
    content: 'and who will say to me, “Drink, and I will draw for your camels also,” let her be the woman whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has appointed for my master’s son.’'
  '45':
  - type: text
    content: '“Before I had finished '
  - type: note
    content: 1 Sam. 1:13
  - type: text
    content: 'speaking in my heart, behold, Rebekah came out with her water jar on her shoulder, and she went down to the spring and drew water. I said to her, ‘Please let me drink.’ '
  '46':
  - type: text
    content: 'She quickly let down her jar from her shoulder and said, ‘Drink, and I will give your camels drink also.’ So I drank, and she gave the camels drink also. '
  '47':
  - type: text
    content: 'Then I asked her, ‘Whose daughter are you?’ She said, ‘The daughter of Bethuel, Nahor’s son, whom Milcah bore to him.’ '
  - type: note
    content: '[Ezek. 16:11, 12]'
  - type: text
    content: 'So I put the ring on her nose and the bracelets on her arms. '
  '48':
  - type: note
    content: ver. 26, 52
  - type: text
    content: 'Then I bowed my head and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' and blessed the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 42 above]'
  - type: text
    content: the God of my master Abraham, who had led me by the right way
  - type: note
    content: Or faithfully
  - type: text
    content: ' to take '
  - type: note
    content: '[ch. 22:23]'
  - type: text
    content: 'the daughter of my master’s kinsman for his son. '
  '49':
  - type: text
    content: 'Now then, if you are going to '
  - type: note
    content: ch. 47:29; Josh. 2:14
  - type: text
    content: show steadfast love and faithfulness to my master, tell me; and if not, tell me, that I may turn to the right hand or to the left.”
  '5':
  - type: text
    content: 'The servant said to him, “Perhaps the woman may not be willing to follow me to this land. Must I then take your son back to the land from which you came?” '
  '50':
  - type: text
    content: 'Then Laban and Bethuel answered and said, “The thing has come from the '
  - type: text
    content: Lord
  - type: text
    content: '; we cannot '
  - type: note
    content: ch. 31:24; 2 Sam. 13:22
  - type: text
    content: 'speak to you bad or good. '
  '51':
  - type: text
    content: 'Behold, Rebekah is before you; take her and go, and let her be the wife of your master’s son, '
  - type: note
    content: See ver. 13-15
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.”'
  '52':
  - type: text
    content: 'When Abraham’s servant heard their words, '
  - type: note
    content: '[See ver. 48above]'
  - type: text
    content: 'he bowed himself to the earth before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'And the servant brought out jewelry of silver and of gold, and garments, and gave them to Rebekah. He also gave to her brother and to her mother costly ornaments. '
  '54':
  - type: text
    content: 'And he and the men who were with him ate and drank, and they spent the night there. When they arose in the morning, he said, '
  - type: note
    content: ver. 56, 59
  - type: text
    content: '“Send me away to my master.” '
  '55':
  - type: text
    content: 'Her brother and her mother said, “Let the young woman remain with us a while, at least ten days; after that she may go.” '
  '56':
  - type: text
    content: 'But he said to them, “Do not delay me, since the '
  - type: text
    content: Lord
  - type: text
    content: ' has prospered my way. Send me away that I may go to my master.” '
  '57':
  - type: text
    content: 'They said, “Let us call the young woman and ask her.” '
  '58':
  - type: text
    content: 'And they called Rebekah and said to her, “Will you go with this man?” She said, “I will go.” '
  '59':
  - type: text
    content: 'So they sent away Rebekah their sister and '
  - type: note
    content: ch. 35:8
  - type: text
    content: 'her nurse, and Abraham’s servant and his men. '
  '6':
  - type: text
    content: 'Abraham said to him, “See to it that you do not take my son back there. '
  '60':
  - type: text
    content: And they blessed Rebekah and said to her,
  - type: text
    content: '“Our sister, may you '
  - type: note
    content: ch. 17:16
  - type: text
    content: become
  - type: text
    content: thousands of ten thousands,
  - type: text
    content: 'and '
  - type: note
    content: ch. 22:17
  - type: text
    content: may your offspring possess
  - type: text
    content: the gate of those who hate him!”
  - type: note
    content: Or hate them
  '61':
  - type: text
    content: Then Rebekah and her young women arose and rode on the camels and followed the man. Thus the servant took Rebekah and went his way.
  '62':
  - type: text
    content: 'Now Isaac had returned from '
  - type: note
    content: ch. 16:14; 25:11
  - type: text
    content: 'Beer-lahai-roi and was dwelling in the Negeb. '
  '63':
  - type: text
    content: 'And Isaac went out '
  - type: note
    content: Ps. 77:12; 143:5
  - type: text
    content: 'to meditate in the field toward evening. And he lifted up his eyes and saw, and behold, there were camels coming. '
  '64':
  - type: text
    content: 'And Rebekah lifted up her eyes, and when she saw Isaac, she dismounted from the camel '
  '65':
  - type: text
    content: 'and said to the servant, “Who is that man, walking in the field to meet us?” The servant said, “It is my master.” So she took her veil and covered herself. '
  '66':
  - type: text
    content: 'And the servant told Isaac all the things that he had done. '
  '67':
  - type: text
    content: 'Then Isaac brought her into the tent of Sarah his mother and took Rebekah, and she became his wife, and he loved her. So Isaac was '
  - type: note
    content: ch. 37:35; 38:12
  - type: text
    content: 'comforted after his mother’s '
  - type: note
    content: ch. 23:2
  - type: text
    content: death.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'who took me from my father’s house and from the land of my kindred, and who spoke to me and swore to me, '
  - type: note
    content: See ch. 12:7
  - type: text
    content: '‘To your offspring I will give this land,’ '
  - type: note
    content: Ex. 23:20, 23; 33:2; [Heb. 1:14]
  - type: text
    content: 'he will send his angel before you, and you shall take a wife for my son from there. '
  '8':
  - type: text
    content: 'But if the woman is not willing to follow you, then '
  - type: note
    content: See Josh. 2:17-20
  - type: text
    content: 'you will be free from this oath of mine; only you must not take my son back there.” '
  '9':
  - type: text
    content: 'So the servant '
  - type: note
    content: ver. 2
  - type: text
    content: put his hand under the thigh of Abraham his master and swore to him concerning this matter.
