document_id: JHN.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: ' '
  - type: note
    content: Matt. 28:1; Mark 16:1, 2; Luke 24:1
  - type: text
    content: 'Now on the first day of the week Mary Magdalene came to the tomb early, while it was still dark, and saw that '
  - type: note
    content: Matt. 27:60, 66; 28:2; Mark 15:46; 16:3, 4; Luke 24:2
  - type: text
    content: 'the stone had been taken away from the tomb. '
  '10':
  - type: text
    content: Then the disciples went back to their homes.
  - type: heading
    content: Jesus Appears to Mary Magdalene
  '11':
  - type: text
    content: 'But Mary stood weeping outside the tomb, and as she wept she stooped to look into the tomb. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: '[Mark 16:5]'
  - type: text
    content: 'she saw '
  - type: note
    content: Luke 24:4
  - type: text
    content: 'two angels in white, sitting where the body of Jesus had lain, one at the head and one at the feet. '
  '13':
  - type: text
    content: 'They said to her, '
  - type: note
    content: ver. 15; [ch. 2:4]
  - type: text
    content: '“Woman, why are you weeping?” She said to them, '
  - type: note
    content: ver. 2
  - type: text
    content: '“They have taken away my Lord, and I do not know where they have laid him.” '
  '14':
  - type: text
    content: 'Having said this, she turned around and '
  - type: note
    content: Mark 16:9; [Matt. 28:9]
  - type: text
    content: 'saw Jesus standing, '
  - type: note
    content: ch. 21:4; Luke 24:16, 31
  - type: text
    content: 'but she did not know that it was Jesus. '
  '15':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: ver. 13
  - type: text
    content: '“Woman, why are you weeping? '
  - type: note
    content: ch. 1:38; 18:4, 7
  - type: text
    content: Whom are you seeking?”
  - type: text
    content: ' Supposing him to be '
  - type: note
    content: '[ch. 19:41]'
  - type: text
    content: 'the gardener, she said to him, “Sir, if you have carried him away, tell me where you have laid him, and I will take him away.” '
  '16':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Mary.”
  - type: text
    content: ' She turned and said to him in Aramaic,'
  - type: note
    content: Or Hebrew
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:38
  - type: text
    content: '“Rabboni!” (which means Teacher). '
  '17':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: '“Do not cling to me, for I have not yet ascended to the Father; but go to '
  - type: note
    content: See Matt. 28:10
  - type: text
    content: 'my brothers and say to them, '
  - type: note
    content: '[Mark 16:19]; See ch. 14:12'
  - type: text
    content: '‘I am ascending to my Father and your Father, to '
  - type: note
    content: Matt. 27:46; Eph. 1:17; Rev. 3:2, 12; [1 Cor. 3:23]
  - type: text
    content: my God and your God.’”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Mary Magdalene '
  - type: note
    content: Mark 16:10; [Matt. 28:10; Luke 24:10, 22, 23]
  - type: text
    content: went and announced to the disciples, “I have seen the Lord”—and that he had said these things to her.
  - type: heading
    content: Jesus Appears to the Disciples
  '19':
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 15:5; [ver. 26 ]
  - type: text
    content: 'On the evening '
  - type: note
    content: Luke 24:33, 36
  - type: text
    content: 'of that day, the first day of the week, '
  - type: note
    content: ver. 26
  - type: text
    content: 'the doors being locked where the disciples were '
  - type: note
    content: See ch. 7:13
  - type: text
    content: for fear of the Jews,
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time
  - type: text
    content: ' Jesus came and stood among them and said to them, '
  - type: note
    content: See ch. 14:27
  - type: text
    content: “Peace be with you.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So she ran and went to Simon Peter and the other disciple, '
  - type: note
    content: See ch. 13:23
  - type: text
    content: 'the one whom Jesus loved, and said to them, “They have taken the Lord out of the tomb, and '
  - type: note
    content: ver. 13
  - type: text
    content: 'we do not know where they have laid him.” '
  '20':
  - type: text
    content: 'When he had said this, '
  - type: note
    content: Luke 24:40
  - type: text
    content: 'he showed them his hands and his side. Then '
  - type: note
    content: ch. 16:22
  - type: text
    content: 'the disciples were glad when they saw the Lord. '
  '21':
  - type: text
    content: 'Jesus said to them again, '
  - type: text
    content: '“Peace be with you. As '
  - type: note
    content: ch. 17:18; See ch. 3:17
  - type: text
    content: 'the Father has sent me, '
  - type: note
    content: ch. 13:20; See Acts 1:2
  - type: text
    content: even so I am sending you.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And when he had said this, he '
  - type: note
    content: Gen. 2:7
  - type: text
    content: 'breathed on them and said to them, '
  - type: note
    content: '[Acts 2:4]; See ch. 7:39'
  - type: text
    content: “Receive the Holy Spirit.
  - type: text
    content: ' '
  '23':
  - type: note
    content: '[Matt. 16:19; 18:18; 1 Cor. 5:4, 5]'
  - type: text
    content: If you forgive the sins of any, they are forgiven them; if you withhold forgiveness from any, it is withheld.”
  - type: heading
    content: Jesus and Thomas
  '24':
  - type: text
    content: 'Now '
  - type: note
    content: See ch. 11:16
  - type: text
    content: Thomas, one of the twelve, called the Twin,
  - type: note
    content: Greek Didymus
  - type: text
    content: ' was not with them when Jesus came. '
  '25':
  - type: text
    content: 'So the other disciples told him, “We have seen the Lord.” But he said to them, '
  - type: note
    content: ver. 20; [Ps. 22:16]
  - type: text
    content: “Unless I see in his hands the mark of the nails, and place my finger into the mark of the nails, and place my hand into his side, I will never believe.”
  '26':
  - type: text
    content: 'Eight days later, his disciples were inside again, and Thomas was with them. '
  - type: note
    content: ver. 19
  - type: text
    content: 'Although the doors were locked, Jesus came and stood among them and said, '
  - type: note
    content: ver. 19
  - type: text
    content: “Peace be with you.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then he said to Thomas, '
  - type: note
    content: ver. 20; 1 John 1:1; [Luke 24:39]
  - type: text
    content: “Put your finger here, and see my hands; and put out your hand, and place it in my side. Do not disbelieve, but believe.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Thomas answered him, '
  - type: note
    content: '[ch. 1:1, 49]'
  - type: text
    content: '“My Lord and my God!” '
  '29':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“Have you believed because you have seen me? '
  - type: note
    content: 1 Pet. 1:8; [2 Cor. 5:7]
  - type: text
    content: Blessed are those who have not seen and yet have believed.”
  - type: heading
    content: The Purpose of This Book
  '3':
  - type: note
    content: Luke 24:12
  - type: text
    content: 'So Peter went out with the other disciple, and they were going toward the tomb. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: ch. 21:25
  - type: text
    content: 'Now Jesus did many other signs '
  - type: note
    content: Acts 10:41
  - type: text
    content: 'in the presence of the disciples, which are not written in this book; '
  '31':
  - type: note
    content: 1 John 5:13
  - type: text
    content: 'but these are written so that you may '
  - type: note
    content: See ch. 11:27
  - type: text
    content: 'believe that Jesus is the Christ, '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God, and that by believing '
  - type: note
    content: ch. 3:15, 16; 5:40; 6:53; 10:10
  - type: text
    content: 'you may have life '
  - type: note
    content: '[Acts 10:43; 1 Cor. 6:11]; See Acts 3:6'
  - type: text
    content: in his name.
  '4':
  - type: text
    content: 'Both of them were running together, but the other disciple outran Peter and reached the tomb first. '
  '5':
  - type: text
    content: 'And stooping to look in, he saw '
  - type: note
    content: ch. 19:40
  - type: text
    content: 'the linen cloths lying there, but he did not go in. '
  '6':
  - type: text
    content: 'Then Simon Peter came, following him, and went into the tomb. He saw the linen cloths lying there, '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: ch. 11:44
  - type: text
    content: the face cloth, which had been on Jesus’
  - type: note
    content: Greek his
  - type: text
    content: ' head, not lying with the linen cloths but folded up in a place by itself. '
  '8':
  - type: text
    content: 'Then the other disciple, '
  - type: note
    content: ver. 4
  - type: text
    content: 'who had reached the tomb first, also went in, and he saw and believed; '
  '9':
  - type: text
    content: 'for as yet '
  - type: note
    content: Matt. 22:29
  - type: text
    content: 'they did not understand the Scripture, '
  - type: note
    content: Ps. 16:10; Luke 24:46; Acts 2:25-31; 13:34, 35; 17:3; 1 Cor. 15:4
  - type: text
    content: 'that he must rise from the dead. '
