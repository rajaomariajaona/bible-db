document_id: ISA.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ransomed Shall Return
  - type: text
    content: ' '
  - type: note
    content: ch. 55:12, 13
  - type: text
    content: The wilderness and the dry land shall be glad;
  - type: note
    content: '[ch. 32:15 ]'
  - type: text
    content: the desert shall rejoice and blossom like the crocus;
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 51:11
  - type: text
    content: 'And the ransomed of the '
  - type: text
    content: Lord
  - type: text
    content: ' shall return'
  - type: text
    content: and come to Zion with singing;
  - type: note
    content: ch. 65:19; [ch. 25:8; Rev. 7:17; 21:4 ]
  - type: text
    content: everlasting joy shall be upon their heads;
  - type: text
    content: they shall obtain gladness and joy,
  - type: text
    content: and sorrow and sighing shall flee away.
  '2':
  - type: text
    content: it shall blossom abundantly
  - type: text
    content: and rejoice with joy and singing.
  - type: note
    content: Song 5:15
  - type: text
    content: The glory of Lebanon shall be given to it,
  - type: text
    content: 'the majesty of '
  - type: note
    content: Song 7:5
  - type: text
    content: 'Carmel and '
  - type: note
    content: ch. 33:9; Song 2:1
  - type: text
    content: Sharon.
  - type: note
    content: ch. 40:5
  - type: text
    content: 'They shall see the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the majesty of our God.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cited Heb. 12:12; [ch. 40:1 ]
  - type: text
    content: Strengthen the weak hands,
  - type: text
    content: and make firm the feeble knees.
  '4':
  - type: text
    content: Say to those who have an anxious heart,
  - type: text
    content: “Be strong; fear not!
  - type: note
    content: '[ch. 40:10, 11 ]'
  - type: text
    content: Behold, your God
  - type: text
    content: will come with vengeance,
  - type: text
    content: with the recompense of God.
  - type: text
    content: He will come and save you.”
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 32:3, 4
  - type: text
    content: Then the eyes of the blind shall be opened,
  - type: text
    content: and the ears of the deaf unstopped;
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: then shall the lame man leap like a deer,
  - type: text
    content: and the tongue of the mute sing for joy.
  - type: note
    content: '[ver. 1; ch. 41:18; 43:19; 44:3, 4; John 7:38, 39 ]'
  - type: text
    content: For waters break forth in the wilderness,
  - type: text
    content: and streams in the desert;
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 48:20, 21; 49:10
  - type: text
    content: the burning sand shall become a pool,
  - type: text
    content: and the thirsty ground springs of water;
  - type: text
    content: 'in the haunt of '
  - type: note
    content: See ch. 13:22
  - type: text
    content: jackals, where they lie down,
  - type: text
    content: the grass shall become reeds and rushes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 40:3
  - type: text
    content: And a highway shall be there,
  - type: text
    content: and it shall be called the Way of Holiness;
  - type: note
    content: ch. 52:1
  - type: text
    content: the unclean shall not pass over it.
  - type: text
    content: It shall belong to those who walk on the way;
  - type: text
    content: even if they are fools, they shall not go astray.
  - type: note
    content: Or if they are fools, they shall not wander in it
  '9':
  - type: text
    content: No lion shall be there,
  - type: text
    content: nor shall any ravenous beast come up on it;
  - type: text
    content: they shall not be found there,
  - type: text
    content: but the redeemed shall walk there.
