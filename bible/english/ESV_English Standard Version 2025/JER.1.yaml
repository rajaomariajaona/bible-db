document_id: JER.1,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'The words of Jeremiah, the son of Hilkiah, one '
  - type: note
    content: Ezek. 1:3
  - type: text
    content: 'of the priests who were in '
  - type: note
    content: ch. 29:27; 32:7; Josh. 21:18
  - type: text
    content: 'Anathoth in the land of Benjamin, '
  '10':
  - type: text
    content: 'See, I have set you this day '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: over nations and over kingdoms,
  - type: note
    content: ch. 18:7; 31:28; 45:4; [ 2 Cor. 10:4, 5 ]
  - type: text
    content: to pluck up and to break down,
  - type: text
    content: to destroy and to overthrow,
  - type: text
    content: to build and to plant.”
  '11':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me, saying, '
  - type: note
    content: '[Amos 7:8]'
  - type: text
    content: “Jeremiah, what do you see?” And I said, “I see an almond
  - type: note
    content: Almond sounds like the Hebrew for watching (compare verse 12)
  - type: text
    content: ' branch.” '
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “You have seen well, for I am watching over my word to perform it.”'
  '13':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me a second time, saying, “What do you see?” And I said, “I see '
  - type: note
    content: Ezek. 24:3; [Ezek. 22:21]
  - type: text
    content: 'a boiling pot, facing away '
  - type: note
    content: ch. 4:6; 6:1; 10:22
  - type: text
    content: 'from the north.” '
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: “Out of the north disaster
  - type: note
    content: The Hebrew word can mean evil, harm, or disaster, depending on the context; so throughout Jeremiah
  - type: text
    content: ' shall be let loose upon all the inhabitants of the land. '
  '15':
  - type: text
    content: 'For behold, '
  - type: note
    content: '[ch. 25:9]'
  - type: text
    content: 'I am calling all the tribes of the kingdoms of the north, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 39:3; 43:10]'
  - type: text
    content: 'and they shall come, and every one shall set his throne at the entrance of the gates of Jerusalem, against all its walls all around and against all the cities of Judah. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:12
  - type: text
    content: 'I will declare my judgments against them, for all their evil '
  - type: note
    content: ch. 19:4; 22:9
  - type: text
    content: 'in forsaking me. '
  - type: note
    content: ch. 7:9; 44:3
  - type: text
    content: 'They have made offerings to other gods and '
  - type: note
    content: ch. 25:6, 7; Isa. 2:8; Acts 7:41
  - type: text
    content: 'worshiped the works of their own hands. '
  '17':
  - type: text
    content: 'But you, '
  - type: note
    content: '[1 Kgs. 18:46; 1 Pet. 1:13]'
  - type: text
    content: dress yourself for work;
  - type: note
    content: Hebrew gird up your loins
  - type: text
    content: ' arise, and '
  - type: note
    content: ver. 7
  - type: text
    content: 'say to them everything that I command you. '
  - type: note
    content: ver. 8; Ezek. 3:9
  - type: text
    content: 'Do not be dismayed by them, lest I dismay you before them. '
  '18':
  - type: text
    content: 'And I, behold, I make you this day '
  - type: note
    content: '[Isa. 50:7]'
  - type: text
    content: 'a fortified city, '
  - type: note
    content: Rev. 3:12
  - type: text
    content: 'an iron pillar, and '
  - type: note
    content: ch. 15:20; [ch. 6:27]
  - type: text
    content: 'bronze walls, against the whole land, against the kings of Judah, its officials, its priests, and the people of the land. '
  '19':
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'They will fight against you, but they shall not prevail against you, for '
  - type: note
    content: ver. 8; [Acts 18:9, 10]
  - type: text
    content: 'I am with you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', to deliver you.”'
  '2':
  - type: text
    content: 'to whom the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came in the days of '
  - type: note
    content: See 2 Kgs. 22; 23:1-30
  - type: text
    content: 'Josiah the son of Amon, king of Judah, in '
  - type: note
    content: ch. 25:3; 36:2
  - type: text
    content: 'the thirteenth year of his reign. '
  '3':
  - type: text
    content: 'It came also in the days of '
  - type: note
    content: ch. 25:1; 36:1; See 2 Kgs. 23:34–24:6
  - type: text
    content: 'Jehoiakim the son of Josiah, king of Judah, and '
  - type: note
    content: ch. 39:2
  - type: text
    content: 'until the end of the eleventh year of '
  - type: note
    content: See 2 Kgs. 24:17–25:7
  - type: text
    content: 'Zedekiah, the son of Josiah, king of Judah, '
  - type: note
    content: See 2 Kgs. 25:8-11
  - type: text
    content: until the captivity of Jerusalem in the fifth month.
  - type: heading
    content: The Call of Jeremiah
  '4':
  - type: text
    content: 'Now the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me, saying,'
  '5':
  - type: text
    content: ' '
  - type: note
    content: See Isa. 44:2
  - type: text
    content: “Before I formed you in the womb I knew you,
  - type: text
    content: 'and before you were born '
  - type: note
    content: '[John 10:36]'
  - type: text
    content: I consecrated you;
  - type: text
    content: 'I appointed you a prophet '
  - type: note
    content: '[Isa. 49:6]; See ch. 25:15-29; ch. 46–51'
  - type: text
    content: to the nations.”
  '6':
  - type: text
    content: 'Then I said, “Ah, Lord '
  - type: text
    content: God
  - type: text
    content: '! Behold, '
  - type: note
    content: '[Ex. 4:10]'
  - type: text
    content: 'I do not know how to speak, '
  - type: note
    content: '[1 Kgs. 3:7]'
  - type: text
    content: 'for I am only a youth.” '
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me,'
  - type: text
    content: “Do not say, ‘I am only a youth’;
  - type: text
    content: for to all to whom I send you, you shall go,
  - type: text
    content: 'and '
  - type: note
    content: ver. 17; Ezek. 2:7
  - type: text
    content: whatever I command you, you shall speak.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 2:6; 3:9
  - type: text
    content: Do not be afraid of them,
  - type: note
    content: ch. 15:20; See Ex. 3:12
  - type: text
    content: for I am with you to deliver you,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 2:9 ]'
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' put out his hand and '
  - type: note
    content: '[Isa. 6:7]'
  - type: text
    content: 'touched my mouth. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me,'
  - type: text
    content: '“Behold, I have put '
  - type: note
    content: ch. 5:14
  - type: text
    content: my words in your mouth.
