document_id: JER.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Buys a Field During the Siege
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 37:5, 11; 39:1, 2; 52:4; 2 Kgs. 25:2]'
  - type: text
    content: 'in the tenth year of Zedekiah king of Judah, '
  - type: note
    content: '[ch. 52:12; 2 Kgs. 25:8]'
  - type: text
    content: 'which was the eighteenth year of Nebuchadnezzar. '
  '10':
  - type: note
    content: ver. 44
  - type: text
    content: 'I signed the deed, '
  - type: note
    content: Esth. 3:12
  - type: text
    content: 'sealed it, '
  - type: note
    content: ver. 25
  - type: text
    content: 'got witnesses, and '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'weighed the money on scales. '
  '11':
  - type: text
    content: 'Then I took the sealed deed of purchase, containing the terms and conditions and the open copy. '
  '12':
  - type: text
    content: 'And I gave the deed of purchase to '
  - type: note
    content: ch. 36:4, 8, 10, 14, 26, 32; 43:3, 6; 45:1-3
  - type: text
    content: 'Baruch the son of Neriah son of Mahseiah, in the presence of Hanamel my cousin, in the presence of '
  - type: note
    content: '[Isa. 8:2]'
  - type: text
    content: 'the witnesses who signed the deed of purchase, and in the presence of all the Judeans who were sitting in '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the court of the guard. '
  '13':
  - type: text
    content: 'I charged '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Baruch in their presence, saying, '
  '14':
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Take these deeds, both this sealed deed of purchase and this open deed, and put them in an earthenware vessel, that they may last for a long time. '
  '15':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Houses and '
  - type: note
    content: ver. 43
  - type: text
    content: fields and vineyards shall again be bought in this land.’
  - type: heading
    content: Jeremiah Prays for Understanding
  '16':
  - type: text
    content: '“After I had given the deed of purchase to '
  - type: note
    content: See ver. 12
  - type: text
    content: 'Baruch the son of Neriah, I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying: '
  '17':
  - type: text
    content: '‘Ah, Lord '
  - type: text
    content: God
  - type: text
    content: '! It is '
  - type: note
    content: Isa. 37:16
  - type: text
    content: 'you who have made the heavens and the earth by your great power and by '
  - type: note
    content: See ch. 21:5
  - type: text
    content: 'your outstretched arm! '
  - type: note
    content: ver. 27; See Gen. 18:14
  - type: text
    content: 'Nothing is too hard for you. '
  '18':
  - type: note
    content: Ex. 20:6; 34:7; Deut. 5:9, 10
  - type: text
    content: 'You show steadfast love to thousands, '
  - type: note
    content: Ex. 20:6; 34:7; Deut. 5:9, 10
  - type: text
    content: 'but you repay the guilt of fathers '
  - type: note
    content: '[Ps. 79:12; Isa. 65:6-7]'
  - type: text
    content: 'to their children after them, O great and '
  - type: note
    content: Isa. 9:6
  - type: text
    content: 'mighty God, whose name is the '
  - type: note
    content: See ch. 10:16
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  '19':
  - type: note
    content: Isa. 28:29
  - type: text
    content: 'great in counsel and '
  - type: note
    content: '[Ps. 66:3, 5]'
  - type: text
    content: 'mighty in deed, '
  - type: note
    content: See ch. 16:17
  - type: text
    content: 'whose eyes are open to all the ways of the children of man, '
  - type: note
    content: See ch. 17:10
  - type: text
    content: 'rewarding each one according to his ways and according to the fruit of his deeds. '
  '2':
  - type: text
    content: 'At that time the army of the king of Babylon was besieging Jerusalem, and Jeremiah the prophet '
  - type: note
    content: Ps. 88:8
  - type: text
    content: 'was shut up in '
  - type: note
    content: ver. 8, 12; ch. 33:1; 37:21; 38:6, 13; 39:14; [Neh. 3:25]
  - type: text
    content: 'the court of the guard that was in the palace of the king of Judah. '
  '20':
  - type: text
    content: 'You have shown '
  - type: note
    content: Ps. 135:9
  - type: text
    content: 'signs and wonders in the land of Egypt, and to this day in Israel and among all mankind, '
  - type: note
    content: 2 Sam. 7:23; See Neh. 9:10
  - type: text
    content: 'and have made a name for yourself, as at this day. '
  '21':
  - type: note
    content: Ex. 6:6; Deut. 4:34; 1 Chr. 17:21
  - type: text
    content: 'You brought your people Israel out of the land of Egypt with signs and wonders, with a strong hand and '
  - type: note
    content: See ch. 21:5
  - type: text
    content: 'outstretched arm, '
  - type: note
    content: Ex. 6:6; Deut. 4:34; 1 Chr. 17:21
  - type: text
    content: 'and with great terror. '
  '22':
  - type: text
    content: 'And you gave them this land, '
  - type: note
    content: Deut. 26:15; See Ex. 3:8
  - type: text
    content: 'which you swore to their fathers to give them, '
  - type: note
    content: Deut. 26:15; See Ex. 3:8
  - type: text
    content: 'a land flowing with milk and honey. '
  '23':
  - type: text
    content: 'And they entered and took possession of it. '
  - type: note
    content: Neh. 9:26, 27; See ch. 11:8; Dan. 9:10-14
  - type: text
    content: 'But they did not obey your voice or walk in your law. They did nothing of all you commanded them to do. Therefore you have made all this disaster come upon them. '
  '24':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 33:4; See ch. 6:6
  - type: text
    content: 'the siege mounds have come up to the city to take it, and '
  - type: note
    content: ver. 36; See ch. 14:12
  - type: text
    content: 'because of sword and famine and pestilence '
  - type: note
    content: See ver. 3
  - type: text
    content: 'the city is given into the hands of the Chaldeans who are fighting against it. What you spoke has come to pass, and behold, you see it. '
  '25':
  - type: text
    content: 'Yet you, O Lord '
  - type: text
    content: God
  - type: text
    content: ', have said to me, '
  - type: note
    content: ver. 7
  - type: text
    content: '“Buy the field for money '
  - type: note
    content: ver. 10
  - type: text
    content: 'and get witnesses”—though '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: the city is given into the hands of the Chaldeans.’”
  '26':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '27':
  - type: text
    content: '“Behold, I am the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 16:22
  - type: text
    content: 'the God of all flesh. '
  - type: note
    content: See Gen. 18:14
  - type: text
    content: 'Is anything too hard for me? '
  '28':
  - type: text
    content: 'Therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ver. 3
  - type: text
    content: 'Behold, I am giving this city into the hands of the Chaldeans and into the hand of Nebuchadnezzar king of Babylon, and he shall capture it. '
  '29':
  - type: text
    content: 'The Chaldeans who are fighting against this city '
  - type: note
    content: See ch. 21:10
  - type: text
    content: 'shall come and set this city on fire and burn it, '
  - type: note
    content: See ch. 19:13
  - type: text
    content: 'with the houses on whose roofs offerings have been made to Baal '
  - type: note
    content: See ch. 19:13
  - type: text
    content: 'and drink offerings have been poured out to other gods, '
  - type: note
    content: See ch. 7:18
  - type: text
    content: 'to provoke me to anger. '
  '3':
  - type: text
    content: 'For Zedekiah king of Judah had imprisoned him, saying, “Why do you prophesy and say, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ver. 25, 36, 43; ch. 21:10; 34:2; 37:17; 38:3
  - type: text
    content: 'Behold, I am giving this city into the hand of the king of Babylon, and he shall capture it; '
  '30':
  - type: text
    content: 'For the children of Israel and the children of Judah have done nothing but evil in my sight '
  - type: note
    content: ch. 3:25
  - type: text
    content: 'from their youth. The children of Israel have done nothing but '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'provoke me to anger '
  - type: note
    content: ch. 25:6, 7
  - type: text
    content: 'by the work of their hands, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'This city has aroused my anger and wrath, from the day it was built to this day, '
  - type: note
    content: 2 Kgs. 23:27; 24:3
  - type: text
    content: 'so that I will remove it from my sight '
  '32':
  - type: text
    content: because of all the evil of the children of Israel and the children of Judah that they did to provoke me to anger—
  - type: note
    content: ch. 2:26
  - type: text
    content: 'their kings and their officials, their priests and their prophets, the men of Judah and the inhabitants of Jerusalem. '
  '33':
  - type: note
    content: ch. 2:27; [Ezek. 8:16]; See ch. 7:24
  - type: text
    content: 'They have turned to me their back and not their face. And though I have taught them '
  - type: note
    content: See ch. 25:3
  - type: text
    content: 'persistently, they have not listened '
  - type: note
    content: See ch. 5:3
  - type: text
    content: 'to receive instruction. '
  '34':
  - type: text
    content: 'They set up '
  - type: note
    content: See ch. 7:30; 23:11
  - type: text
    content: 'their abominations in the house that is called by my name, to defile it. '
  '35':
  - type: text
    content: 'They built the high places of Baal '
  - type: note
    content: ch. 7:31; See Josh. 18:16
  - type: text
    content: 'in the Valley of the Son of Hinnom, '
  - type: note
    content: Lev. 18:21
  - type: text
    content: 'to offer up their sons and daughters to Molech, '
  - type: note
    content: ch. 7:31
  - type: text
    content: 'though I did not command them, nor did it enter into my mind, that they should do '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'this abomination, '
  - type: note
    content: '[1 Kgs. 16:19]'
  - type: text
    content: to cause Judah to sin.
  - type: heading
    content: They Shall Be My People; I Will Be Their God
  '36':
  - type: text
    content: '“Now therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, concerning this city of which you say, '
  - type: note
    content: See ver. 3
  - type: text
    content: '‘It is given into the hand of the king of Babylon by sword, by famine, and by pestilence’: '
  '37':
  - type: note
    content: See ch. 23:3
  - type: text
    content: 'Behold, I will gather them from all the countries '
  - type: note
    content: See ch. 8:3
  - type: text
    content: 'to which I drove them in '
  - type: note
    content: ch. 21:5; Deut. 29:28
  - type: text
    content: 'my anger and my wrath and in great indignation. I will bring them back to this place, '
  - type: note
    content: ch. 23:6; 33:16; Ezek. 34:25
  - type: text
    content: 'and I will make them dwell in safety. '
  '38':
  - type: note
    content: See ch. 30:22; 31:33
  - type: text
    content: 'And they shall be my people, and I will be their God. '
  '39':
  - type: note
    content: Ezek. 11:19, 20
  - type: text
    content: 'I will give them one heart and one way, that they may fear me forever, '
  - type: note
    content: Deut. 6:24
  - type: text
    content: 'for their own good and the good of their children after them. '
  '4':
  - type: note
    content: ch. 34:3
  - type: text
    content: 'Zedekiah king of Judah shall not escape out of the hand of the Chaldeans, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'but shall surely be given into the hand of the king of Babylon, and shall speak with him face to face and see him eye to eye. '
  '40':
  - type: note
    content: ch. 50:5; Ps. 89:34; Isa. 55:3; Ezek. 16:60
  - type: text
    content: 'I will make with them an everlasting covenant, that I will not turn away from doing good to them. '
  - type: note
    content: See ch. 31:33
  - type: text
    content: 'And I will put the fear of me in their hearts, that they may not turn from me. '
  '41':
  - type: note
    content: '[Deut. 28:63]'
  - type: text
    content: 'I will rejoice in doing them good, '
  - type: note
    content: See ch. 24:6
  - type: text
    content: and I will plant them in this land in faithfulness, with all my heart and all my soul.
  '42':
  - type: text
    content: '“For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: '[ch. 31:28]'
  - type: text
    content: 'Just as I have brought all this great disaster upon this people, so I will bring upon them all the good that I promise them. '
  '43':
  - type: note
    content: ver. 15
  - type: text
    content: 'Fields shall be bought in this land '
  - type: note
    content: ch. 33:10
  - type: text
    content: 'of which you are saying, ‘It is a desolation, without man or beast; '
  - type: note
    content: See ver. 3
  - type: text
    content: 'it is given into the hand of the Chaldeans.’ '
  '44':
  - type: text
    content: 'Fields shall be bought for money, and '
  - type: note
    content: ver. 10
  - type: text
    content: 'deeds shall be signed and '
  - type: note
    content: ver. 10
  - type: text
    content: 'sealed and '
  - type: note
    content: ver. 10
  - type: text
    content: 'witnessed, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'in the land of Benjamin, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'in the places about Jerusalem, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'and in the cities of Judah, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'in the cities of the hill country, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'in the cities of the Shephelah, and in the cities of the Negeb; for '
  - type: note
    content: See ch. 30:3
  - type: text
    content: 'I will restore their fortunes, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ch. 39:7; 52:11
  - type: text
    content: 'he shall take Zedekiah to Babylon, and there he shall remain until I visit him, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[ch. 21:4; 33:5]'
  - type: text
    content: Though you fight against the Chaldeans, you shall not succeed’?”
  '6':
  - type: text
    content: 'Jeremiah said, “The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '7':
  - type: text
    content: 'Behold, Hanamel the son of Shallum your uncle will come to you and say, '
  - type: note
    content: ver. 25
  - type: text
    content: '‘Buy my field that is at '
  - type: note
    content: ch. 1:1; 29:27; Josh. 21:18
  - type: text
    content: 'Anathoth, '
  - type: note
    content: Lev. 25:25; [Ruth 4:4]
  - type: text
    content: 'for the right of redemption by purchase is yours.’ '
  '8':
  - type: text
    content: 'Then Hanamel my cousin came to me in '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the court of the guard, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', and said to me, ‘Buy my field that is at '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Anathoth in the land of Benjamin, for the right of possession and redemption is yours; buy it for yourself.’ Then I knew that this was the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“And I bought the field at '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Anathoth from Hanamel my cousin, and '
  - type: note
    content: Gen. 23:16; Zech. 11:12; [Matt. 26:15]
  - type: text
    content: 'weighed out the money to him, seventeen shekels of silver. '
