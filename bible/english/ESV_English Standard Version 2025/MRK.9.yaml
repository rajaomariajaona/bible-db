document_id: MRK.9,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Truly, I say to you, there are some standing here who will not '
  - type: note
    content: John 8:52; Heb. 2:9
  - type: text
    content: 'taste death '
  - type: note
    content: '[ch. 13:30; Matt. 10:23; 23:36; 24:34]'
  - type: text
    content: 'until they see the kingdom of God after it has come '
  - type: note
    content: ch. 13:26; 14:62; [Matt. 25:31]
  - type: text
    content: with power.”
  - type: heading
    content: The Transfiguration
  '10':
  - type: note
    content: Luke 9:36
  - type: text
    content: 'So they kept the matter to themselves, '
  - type: note
    content: '[John 16:17]'
  - type: text
    content: 'questioning what this rising from the dead might mean. '
  '11':
  - type: text
    content: 'And they asked him, “Why do the scribes say '
  - type: note
    content: See Matt. 11:14
  - type: text
    content: 'that first Elijah must come?” '
  '12':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Elijah does come first '
  - type: note
    content: Mal. 4:6; Luke 1:16, 17; [Acts 1:6; 3:21]
  - type: text
    content: 'to restore all things. And '
  - type: note
    content: Ps. 22:6, 7; Isa. 53:2, 3; Dan. 9:26; Zech. 13:7; [Phil. 2:7]; See Matt. 26:24
  - type: text
    content: 'how is it written of the Son of Man that he should '
  - type: note
    content: See ch. 8:31
  - type: text
    content: 'suffer many things and '
  - type: note
    content: Luke 23:11; Acts 4:11
  - type: text
    content: be treated with contempt?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But I tell you that Elijah has come, and '
  - type: note
    content: ch. 6:17, 27
  - type: text
    content: they did to him whatever they pleased, as it is written of him.”
  - type: heading
    content: Jesus Heals a Boy with an Unclean Spirit
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-28, see Matt. 17:14-19; Luke 9:37-42
  - type: text
    content: 'And when they came to the disciples, they saw a great crowd around them, and scribes arguing with them. '
  '15':
  - type: text
    content: 'And immediately all the crowd, when they saw him, '
  - type: note
    content: '[ch. 10:32]'
  - type: text
    content: 'were greatly amazed and ran up to him and greeted him. '
  '16':
  - type: text
    content: 'And he asked them, '
  - type: text
    content: “What are you arguing about with them?”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And someone from the crowd answered him, “Teacher, I brought my son to you, for he has '
  - type: note
    content: ver. 25; Luke 11:14
  - type: text
    content: 'a spirit that makes him mute. '
  '18':
  - type: text
    content: 'And whenever it seizes him, it throws him down, and he foams and grinds his teeth and becomes rigid. So I asked your disciples to cast it out, and '
  - type: note
    content: '[ch. 6:7; Matt. 10:1; Luke 10:17]'
  - type: text
    content: 'they were not able.” '
  '19':
  - type: text
    content: 'And he answered them, '
  - type: text
    content: '“O '
  - type: note
    content: '[John 14:9; 20:27]'
  - type: text
    content: 'faithless generation, '
  - type: note
    content: '[John 14:9; 20:27]'
  - type: text
    content: how long am I to be with you? How long am I to bear with you? Bring him to me.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 2-8, see Matt. 17:1-8; Luke 9:28-36
  - type: text
    content: 'And after six days Jesus took with him '
  - type: note
    content: ch. 5:37; 14:33
  - type: text
    content: 'Peter and James and John, and led them up a high mountain by themselves. And he was '
  - type: note
    content: '[2 Cor. 3:18 (Gk.)]'
  - type: text
    content: 'transfigured before them, '
  '20':
  - type: text
    content: 'And they brought the boy to him. And when the spirit saw him, immediately it '
  - type: note
    content: ch. 1:26
  - type: text
    content: 'convulsed the boy, and he fell on the ground and rolled about, foaming at the mouth. '
  '21':
  - type: text
    content: 'And Jesus asked his father, '
  - type: text
    content: “How long has this been happening to him?”
  - type: text
    content: ' And he said, “From childhood. '
  '22':
  - type: text
    content: 'And it has often cast him into fire and into water, to destroy him. But '
  - type: note
    content: '[ch. 1:40; Matt. 9:28]'
  - type: text
    content: 'if you can do anything, have compassion on us and help us.” '
  '23':
  - type: text
    content: 'And Jesus said to him, '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: '“‘If you can’! '
  - type: note
    content: '[ch. 6:5, 6; Matt. 17:20]'
  - type: text
    content: All things are possible for one who believes.”
  - type: text
    content: ' '
  '24':
  - type: text
    content: Immediately the father of the child cried out
  - type: note
    content: Some manuscripts add with tears
  - type: text
    content: ' and said, “I believe; '
  - type: note
    content: '[Luke 17:5]'
  - type: text
    content: 'help my unbelief!” '
  '25':
  - type: text
    content: 'And when Jesus saw that '
  - type: note
    content: ver. 15
  - type: text
    content: 'a crowd came running together, he rebuked the unclean spirit, saying to it, '
  - type: note
    content: ver. 17
  - type: text
    content: “You mute and deaf spirit, I command you, come out of him and never enter him again.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And after crying out and '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'convulsing him terribly, it came out, and the boy was like a corpse, so that most of them said, “He is dead.” '
  '27':
  - type: text
    content: 'But Jesus '
  - type: note
    content: See ch. 1:31
  - type: text
    content: 'took him by the hand and lifted him up, and he arose. '
  '28':
  - type: text
    content: 'And when he had '
  - type: note
    content: ch. 7:17
  - type: text
    content: 'entered the house, his disciples asked him privately, “Why could we not cast it out?” '
  '29':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “This kind cannot be driven out by anything but prayer.”
  - type: note
    content: Some manuscripts add and fasting
  - type: heading
    content: Jesus Again Foretells Death, Resurrection
  '3':
  - type: text
    content: 'and '
  - type: note
    content: Dan. 7:9; [Ps. 104:2; Matt. 28:3]
  - type: text
    content: his clothes became radiant, intensely white, as no one
  - type: note
    content: Greek launderer (gnapheus)
  - type: text
    content: ' on earth could bleach them. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: For ver. 30-32, see Matt. 17:22, 23; Luke 9:43-45; [ch. 8:31; 10:32-34 ]
  - type: text
    content: 'They went on from there and passed through Galilee. And he did not want anyone to know, '
  '31':
  - type: text
    content: 'for he was teaching his disciples, saying to them, '
  - type: text
    content: '“The Son of Man is going to be delivered into the hands of men, and they will kill him. And when he is killed, '
  - type: note
    content: See ch. 8:31
  - type: text
    content: after three days he will rise.”
  - type: text
    content: ' '
  '32':
  - type: note
    content: ch. 6:52; Luke 2:50; 18:34; 24:25; John 10:6; 12:16; 16:17-19; [ver. 10]
  - type: text
    content: But they did not understand the saying, and were afraid to ask him.
  - type: heading
    content: Who Is the Greatest?
  '33':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 17:24
  - type: text
    content: 'they came to Capernaum. And when he was in the house '
  - type: note
    content: For ver. 33-37, see Matt. 18:1-5; Luke 9:46-48; [ch. 10:35-45]
  - type: text
    content: 'he asked them, '
  - type: text
    content: “What were you discussing on the way?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But they kept silent, for on the way '
  - type: note
    content: Luke 22:24; [ver. 50]
  - type: text
    content: 'they had argued with one another about who was the greatest. '
  '35':
  - type: text
    content: 'And he sat down and called the twelve. And he said to them, '
  - type: note
    content: ch. 10:43, 44; Matt. 20:26, 27; 23:11, 12; Luke 22:26
  - type: text
    content: “If anyone would be first, he must be last of all and servant of all.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'And he took a child and put him in the midst of them, and '
  - type: note
    content: ch. 10:16
  - type: text
    content: 'taking him in his arms, he said to them, '
  '37':
  - type: note
    content: '[Matt. 10:40, 42]'
  - type: text
    content: '“Whoever receives one such child in my name receives me, and '
  - type: note
    content: '[Matt. 10:40, 42]'
  - type: text
    content: whoever receives me, receives not me but him who sent me.”
  - type: heading
    content: Anyone Not Against Us Is for Us
  '38':
  - type: text
    content: ' '
  - type: note
    content: For ver. 38-40, see Luke 9:49, 50
  - type: text
    content: 'John said to him, “Teacher, we saw someone '
  - type: note
    content: ch. 16:17; Matt. 7:22; Luke 10:17; Acts 19:13; [Matt. 12:27]
  - type: text
    content: casting out demons in your name,
  - type: note
    content: Some manuscripts add who does not follow us
  - type: text
    content: ' and '
  - type: note
    content: '[Num. 11:28]'
  - type: text
    content: 'we tried to stop him, because he was not following us.” '
  '39':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Do not stop him, for no one who does a mighty work in my name will be able soon afterward to speak evil of me.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And there appeared to them Elijah with Moses, and they were talking with Jesus. '
  '40':
  - type: note
    content: '[Matt. 12:30; Luke 11:23]'
  - type: text
    content: For the one who is not against us is for us.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'For truly, I say to you, '
  - type: note
    content: See Matt. 10:42
  - type: text
    content: whoever gives you a cup of water to drink because
  - type: note
    content: Greek in name that
  - type: text
    content: ' '
  - type: text
    content: you belong to Christ will by no means lose his reward.
  - type: heading
    content: Temptations to Sin
  '42':
  - type: text
    content: ' '
  - type: note
    content: Matt. 18:6; Luke 17:2; [ 1 Cor. 8:12 ]
  - type: text
    content: '“Whoever causes one of '
  - type: note
    content: '[ Zech. 13:7 ]'
  - type: text
    content: these little ones who believe in me to sin,
  - type: text
    content: ' '
  - type: note
    content: Greek to stumble ; also verses 43, 45, 47
  - type: note
    content: '[ch. 14:21]'
  - type: text
    content: it would be better for him if a great millstone were hung around his neck and he were thrown into the sea.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Matt. 5:30; 18:8
  - type: text
    content: 'And if your hand causes you to sin, cut it off. It is better for you to enter life crippled than with two hands to go to '
  - type: note
    content: See Matt. 5:22, 29
  - type: text
    content: hell,
  - type: note
    content: Greek Gehenna; also verse 47
  - type: text
    content: ' '
  - type: text
    content: 'to '
  - type: note
    content: ver. 48; Matt. 3:12; See Matt. 25:41
  - type: text
    content: the unquenchable fire.
  - type: note
    content: Some manuscripts add verses 44 and 46 (which are identical with verse 48)
  - type: text
    content: ' '
  '45':
  - type: note
    content: Matt. 18:8
  - type: text
    content: 'And if your foot causes you to sin, cut it off. It is better for you to enter life lame than with two feet to be thrown into '
  - type: note
    content: '[See ver. 43 above]'
  - type: text
    content: hell.
  - type: text
    content: ' '
  '47':
  - type: note
    content: Matt. 5:29; 18:9
  - type: text
    content: 'And if your eye causes you to sin, tear it out. It is better for you to enter the kingdom of God with one eye than with two eyes to be thrown into '
  - type: note
    content: See Matt. 5:22, 29
  - type: text
    content: hell,
  - type: text
    content: ' '
  '48':
  - type: text
    content: '‘where '
  - type: note
    content: Isa. 66:24
  - type: text
    content: their worm does not die and the fire is not quenched.’
  - type: text
    content: ' '
  '49':
  - type: text
    content: For everyone will be salted with fire.
  - type: note
    content: Some manuscripts add and every sacrifice will be salted with salt
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And Peter said to Jesus, '
  - type: note
    content: See John 1:38
  - type: text
    content: “Rabbi,
  - type: note
    content: Rabbi means my teacher, or my master
  - type: text
    content: ' it is good that we are here. Let us make three '
  - type: note
    content: '[Neh. 8:15]'
  - type: text
    content: 'tents, one for you and one for Moses and one for Elijah.” '
  '50':
  - type: note
    content: Luke 14:34
  - type: text
    content: 'Salt is good, '
  - type: note
    content: Matt. 5:13
  - type: text
    content: 'but if the salt has lost its saltiness, how will you make it salty again? '
  - type: note
    content: Ezek. 43:24; Col. 4:6; [Eph. 4:29]
  - type: text
    content: 'Have salt in yourselves, and '
  - type: note
    content: Rom. 12:18; 2 Cor. 13:11; 1 Thess. 5:13; [ver. 34]; See Rom. 14:19
  - type: text
    content: be at peace with one another.”
  '6':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 14:40; Luke 9:33]'
  - type: text
    content: 'he did not know what to say, for they were terrified. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: 2 Pet. 1:17; [Ex. 24:15, 16]
  - type: text
    content: 'a cloud overshadowed them, and '
  - type: note
    content: 2 Pet. 1:17; [Ex. 24:15, 16]
  - type: text
    content: 'a voice came out of the cloud, '
  - type: note
    content: ch. 12:6; See Matt. 3:17
  - type: text
    content: “This is my beloved Son;
  - type: note
    content: Or my Son, my (or the) Beloved
  - type: text
    content: ' '
  - type: note
    content: Acts 3:22
  - type: text
    content: 'listen to him.” '
  '8':
  - type: text
    content: And suddenly, looking around, they no longer saw anyone with them but Jesus only.
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-13, see Matt. 17:9-13
  - type: text
    content: 'And as they were coming down the mountain, '
  - type: note
    content: ch. 5:43; See Matt. 8:4
  - type: text
    content: 'he charged them to tell no one what they had seen, '
  - type: note
    content: ch. 8:31
  - type: text
    content: 'until the Son of Man had risen from the dead. '
