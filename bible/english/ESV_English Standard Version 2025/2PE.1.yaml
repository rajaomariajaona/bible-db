document_id: 2PE.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Simeon
  - type: note
    content: Some manuscripts Simon
  - type: text
    content: ' Peter, a servant'
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' and apostle of Jesus Christ,'
  - type: text
    content: 'To those who have obtained '
  - type: note
    content: Rom. 1:12; 2 Cor. 4:13; Titus 1:4
  - type: text
    content: 'a faith of equal standing with ours '
  - type: note
    content: Rom. 3:21-26
  - type: text
    content: 'by the righteousness of our '
  - type: note
    content: Titus 2:13
  - type: text
    content: 'God and Savior Jesus Christ:'
  '10':
  - type: text
    content: Therefore, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' be all the more diligent to confirm your calling and '
  - type: note
    content: 1 Thess. 1:4
  - type: text
    content: 'election, for if you practice these qualities '
  - type: note
    content: '[ch. 3:17; 1 John 2:10]'
  - type: text
    content: 'you will never fall. '
  '11':
  - type: text
    content: 'For in this way there will be richly provided for you '
  - type: note
    content: Col. 1:13; [Acts 14:22]
  - type: text
    content: an entrance into the eternal kingdom of our Lord and Savior Jesus Christ.
  '12':
  - type: text
    content: 'Therefore I intend '
  - type: note
    content: Jude 5; [Rom. 15:14, 15; Phil. 3:1; 1 John 2:21]
  - type: text
    content: 'always to remind you of these qualities, though you know them and are established in '
  - type: note
    content: 2 John 2
  - type: text
    content: 'the truth that you have. '
  '13':
  - type: text
    content: 'I think it right, as long as I am in this '
  - type: note
    content: 2 Cor. 5:1, 4
  - type: text
    content: body,
  - type: note
    content: Greek tent; also verse 14
  - type: text
    content: ' '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'to stir you up by way of reminder, '
  '14':
  - type: note
    content: '[Deut. 4:21, 22; 31:14; 2 Tim. 4:6]'
  - type: text
    content: 'since I know that the putting off of my body will be soon, '
  - type: note
    content: John 21:18, 19
  - type: text
    content: 'as our Lord Jesus Christ made clear to me. '
  '15':
  - type: text
    content: And I will make every effort so that after my departure you may be able at any time to recall these things.
  - type: heading
    content: Christ’s Glory and the Prophetic Word
  '16':
  - type: text
    content: 'For we did not follow '
  - type: note
    content: See 1 Cor. 1:17
  - type: text
    content: 'cleverly devised '
  - type: note
    content: See 1 Tim. 1:4
  - type: text
    content: 'myths when we made known to you '
  - type: note
    content: 1 Cor. 2:4
  - type: text
    content: 'the power and '
  - type: note
    content: See 1 Thess. 2:19
  - type: text
    content: 'coming of our Lord Jesus Christ, but '
  - type: note
    content: Matt. 17:1, 2, 6; Mark 9:2; Luke 9:28, 29; John 1:14
  - type: text
    content: 'we were eyewitnesses of his majesty. '
  '17':
  - type: text
    content: 'For when he received honor and glory from God the Father, and the voice was borne to him by the Majestic Glory, '
  - type: note
    content: Matt. 17:5; Mark 9:7; Luke 9:35; [Matt. 3:17]
  - type: text
    content: “This is my beloved Son,
  - type: note
    content: Or my Son, my (or the) Beloved
  - type: text
    content: ' with whom I am well pleased,” '
  '18':
  - type: text
    content: 'we ourselves heard this very voice borne from heaven, for we were with him on '
  - type: note
    content: '[Ex. 3:5; Josh. 5:15]'
  - type: text
    content: 'the holy mountain. '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: See 1 Pet. 1:10
  - type: text
    content: 'we have the prophetic word more fully confirmed, to which you will do well to pay attention '
  - type: note
    content: Ps. 119:105; John 5:35
  - type: text
    content: 'as to a lamp shining in a dark place, until '
  - type: note
    content: Rev. 2:28; 22:16; [Mal. 4:2]
  - type: text
    content: 'the day '
  - type: note
    content: 2 Cor. 4:6
  - type: text
    content: 'dawns and the morning star rises in your hearts, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 1 Pet. 1:2; Jude 2
  - type: text
    content: 'May grace and peace be multiplied to you '
  - type: note
    content: ver. 3, 8; ch. 2:20; [John 17:3; Phil. 3:8]
  - type: text
    content: in the knowledge of God and of Jesus our Lord.
  - type: heading
    content: Confirm Your Calling and Election
  '20':
  - type: text
    content: 'knowing this first of all, that no prophecy of Scripture comes from someone’s own interpretation. '
  '21':
  - type: text
    content: 'For '
  - type: note
    content: 2 Tim. 3:16
  - type: text
    content: 'no prophecy was ever produced by the will of man, but men spoke from God '
  - type: note
    content: 1 Pet. 1:11; [2 Sam. 23:2; Luke 1:70; Acts 1:16; 3:18]
  - type: text
    content: as they were carried along by the Holy Spirit.
  '3':
  - type: text
    content: 'His divine power has granted to us all things that pertain to life and godliness, through the knowledge of him '
  - type: note
    content: '[1 Thess. 2:12; 2 Thess. 2:14; 2 Tim. 1:9; 1 Pet. 5:10]'
  - type: text
    content: who called us to
  - type: note
    content: Or by
  - type: text
    content: ' his own glory and excellence,'
  - type: note
    content: Or virtue
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'by which he has granted to us his precious and very great promises, so that through them you may become '
  - type: note
    content: '[Eph. 4:24; Heb. 12:10; 1 John 3:2]'
  - type: text
    content: 'partakers of the divine nature, '
  - type: note
    content: ch. 2:18, 20
  - type: text
    content: 'having escaped from the corruption that is in the world because of sinful desire. '
  '5':
  - type: text
    content: 'For this very reason, make every effort to supplement your faith '
  - type: note
    content: Phil. 4:8
  - type: text
    content: with virtue,
  - type: note
    content: Or excellence; twice in this verse
  - type: text
    content: ' and virtue '
  - type: note
    content: 1 Pet. 3:7
  - type: text
    content: 'with knowledge, '
  '6':
  - type: text
    content: 'and knowledge with self-control, and self-control '
  - type: note
    content: See Heb. 10:36; James 1:3
  - type: text
    content: 'with steadfastness, and steadfastness with godliness, '
  '7':
  - type: text
    content: 'and godliness '
  - type: note
    content: See Heb. 13:1
  - type: text
    content: 'with brotherly affection, and brotherly affection '
  - type: note
    content: 1 Cor. 13; 1 John 4:16
  - type: text
    content: 'with love. '
  '8':
  - type: text
    content: For if these qualities
  - type: note
    content: Greek these things; also verses 9, 10, 12
  - type: text
    content: ' are yours and are increasing, they keep you from being ineffective or '
  - type: note
    content: See John 15:2; Titus 3:14
  - type: text
    content: 'unfruitful in the knowledge of our Lord Jesus Christ. '
  '9':
  - type: text
    content: 'For whoever lacks these qualities is so nearsighted that he '
  - type: note
    content: Job 5:14; 12:25; Isa. 59:10; Zeph. 1:17; [1 John 2:9-11]
  - type: text
    content: 'is blind, having forgotten that he was '
  - type: note
    content: Eph. 5:26; Titus 2:14; Heb. 9:14; 1 John 1:7; Rev. 7:14
  - type: text
    content: 'cleansed from his former sins. '
