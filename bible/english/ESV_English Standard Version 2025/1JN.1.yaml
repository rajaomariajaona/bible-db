document_id: 1JN.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Word of Life
  - type: text
    content: ' '
  - type: note
    content: See John 1:1
  - type: text
    content: 'That which was '
  - type: note
    content: '[ch. 2:13, 14]'
  - type: text
    content: 'from the beginning, '
  - type: note
    content: Acts 4:20
  - type: text
    content: 'which we have heard, '
  - type: note
    content: John 19:35
  - type: text
    content: 'which we have seen with our eyes, '
  - type: note
    content: ch. 4:14; John 1:14; 2 Pet. 1:16
  - type: text
    content: 'which we looked upon and '
  - type: note
    content: Luke 24:39; John 20:27
  - type: text
    content: have touched with our hands, concerning the word
  - type: note
    content: Or Word
  - type: text
    content: ' of life— '
  '10':
  - type: text
    content: 'If we say we have not sinned, '
  - type: note
    content: ch. 5:10
  - type: text
    content: 'we make him a liar, and '
  - type: note
    content: John 5:38; 8:37
  - type: text
    content: his word is not in us.
  '2':
  - type: note
    content: John 1:4; 11:25; 14:6
  - type: text
    content: 'the life '
  - type: note
    content: ch. 3:5, 8; Rom. 16:26; 1 Tim. 3:16
  - type: text
    content: 'was made manifest, and we have seen it, and '
  - type: note
    content: See John 15:27
  - type: text
    content: 'testify to it and proclaim to you the eternal life, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'which was with the Father and '
  - type: note
    content: ch. 3:5, 8; Rom. 16:26; 1 Tim. 3:16
  - type: text
    content: 'was made manifest to us— '
  '3':
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'that which we have seen and heard we proclaim also to you, so that you too may have fellowship with us; and indeed '
  - type: note
    content: John 17:21; 1 Cor. 1:9; [ch. 2:24]
  - type: text
    content: 'our fellowship is with the Father and with his Son Jesus Christ. '
  '4':
  - type: text
    content: 'And we are writing these things so '
  - type: note
    content: John 15:11; 16:24
  - type: text
    content: that our
  - type: note
    content: Some manuscripts your
  - type: text
    content: ' joy may be complete.'
  - type: heading
    content: Walking in the Light
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:11
  - type: text
    content: 'This is the message we have heard from him and proclaim to you, that '
  - type: note
    content: James 1:17; [ch. 4:8; John 4:24]
  - type: text
    content: 'God is light, and in him is no darkness at all. '
  '6':
  - type: note
    content: ch. 2:11; John 12:35; 2 Cor. 6:14
  - type: text
    content: 'If we say we have fellowship with him while we walk in darkness, we lie and '
  - type: note
    content: John 3:21
  - type: text
    content: 'do not practice the truth. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: '[Isa. 2:5]'
  - type: text
    content: 'if we walk in the light, '
  - type: note
    content: '[Ps. 104:2; 1 Tim. 6:16]'
  - type: text
    content: 'as he is in the light, we have fellowship with one another, and '
  - type: note
    content: Eph. 1:7; Heb. 9:14; 1 Pet. 1:19; Rev. 5:9; 7:14; 12:11
  - type: text
    content: 'the blood of Jesus his Son cleanses us from all sin. '
  '8':
  - type: note
    content: '[Job 15:14; Jer. 2:35]; See James 3:2'
  - type: text
    content: 'If we say we have no sin, we deceive ourselves, and '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'the truth is not in us. '
  '9':
  - type: note
    content: Ps. 32:5; 51:3; Prov. 28:13
  - type: text
    content: 'If we confess our sins, he is '
  - type: note
    content: '[Ps. 143:1; Rom. 3:26]'
  - type: text
    content: 'faithful and just to forgive us our sins and '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'to cleanse us from all unrighteousness. '
