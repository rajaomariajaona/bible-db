document_id: PRO.13,59
type_code: eng
verses:
  '1':
  - type: text
    content: A wise son hears his father’s instruction,
  - type: text
    content: 'but '
  - type: note
    content: ch. 1:22; See Ps. 1:1
  - type: text
    content: a scoffer does not listen to rebuke.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 28:25 ]'
  - type: text
    content: By insolence comes nothing but strife,
  - type: text
    content: but with those who take advice is wisdom.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:2; 20:21; 21:6; 28:20, 22 ]'
  - type: text
    content: Wealth gained hastily
  - type: note
    content: Or by fraud
  - type: text
    content: ' will dwindle,'
  - type: text
    content: but whoever gathers little by little will increase it.
  '12':
  - type: text
    content: Hope deferred makes the heart sick,
  - type: note
    content: '[ver. 19 ]'
  - type: text
    content: 'but a desire fulfilled is '
  - type: note
    content: See ch. 3:18
  - type: text
    content: a tree of life.
  '13':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[ch. 19:16; Num. 15:31; 2 Chr. 36:16]'
  - type: text
    content: 'despises '
  - type: note
    content: ch. 16:20; Deut. 30:14
  - type: text
    content: the word
  - type: note
    content: Or a word
  - type: text
    content: ' brings destruction on himself,'
  - type: text
    content: but he who reveres the commandment
  - type: note
    content: Or a commandment
  - type: text
    content: ' will be '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: rewarded.
  '14':
  - type: text
    content: 'The teaching of the wise is '
  - type: note
    content: See ch. 10:11
  - type: text
    content: a fountain of life,
  - type: text
    content: 'that one may '
  - type: note
    content: ch. 14:27; [Ps. 18:5; 2 Tim. 2:26]
  - type: text
    content: turn away from the snares of death.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 2:52 ]; See Ps. 111:10'
  - type: text
    content: 'Good sense wins '
  - type: note
    content: ch. 3:4; 22:1
  - type: text
    content: favor,
  - type: text
    content: but the way of the treacherous is their ruin.
  - type: note
    content: Probable reading (compare Septuagint, Syriac, Vulgate); Hebrew is rugged, or is an enduring rut
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:23; 15:2 ]'
  - type: text
    content: Every prudent man acts with knowledge,
  - type: note
    content: '[ch. 18:2; Eccles. 10:3 ]'
  - type: text
    content: but a fool flaunts his folly.
  '17':
  - type: text
    content: A wicked messenger falls into trouble,
  - type: text
    content: 'but '
  - type: note
    content: ch. 25:13; [ch. 14:5]
  - type: text
    content: a faithful envoy brings healing.
  '18':
  - type: text
    content: 'Poverty and disgrace come to him who '
  - type: note
    content: '[ch. 15:5, 31, 32]'
  - type: text
    content: ignores instruction,
  - type: note
    content: '[ch. 15:5 ]'
  - type: text
    content: 'but whoever '
  - type: note
    content: '[ch. 15:31]'
  - type: text
    content: heeds reproof is honored.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 12 ]'
  - type: text
    content: A desire fulfilled is sweet to the soul,
  - type: text
    content: but to turn away from evil is an abomination to fools.
  '2':
  - type: text
    content: 'From the fruit of his mouth a man '
  - type: note
    content: ch. 12:14
  - type: text
    content: eats what is good,
  - type: text
    content: 'but the desire of the treacherous '
  - type: note
    content: '[ch. 1:31; 26:6]'
  - type: text
    content: is for violence.
  '20':
  - type: text
    content: Whoever walks with the wise becomes wise,
  - type: text
    content: but the companion of fools will suffer harm.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 11:6; 32:10 ]'
  - type: text
    content: Disaster
  - type: note
    content: Or Evil
  - type: text
    content: ' pursues sinners,'
  - type: note
    content: '[ver. 13; Luke 6:38 ]'
  - type: text
    content: but the righteous are rewarded with good.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezra 9:12; Ps. 37:25 ]'
  - type: text
    content: A good man leaves an inheritance to his children’s children,
  - type: text
    content: 'but '
  - type: note
    content: ch. 28:8; See Job 27:16, 17
  - type: text
    content: the sinner’s wealth is laid up for the righteous.
  '23':
  - type: text
    content: The fallow ground of the poor would yield much food,
  - type: text
    content: 'but it is swept away through '
  - type: note
    content: '[ch. 16:8]'
  - type: text
    content: injustice.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 19:18; 22:15; 23:13, 14; 29:15, 17 ]'
  - type: text
    content: Whoever spares the rod hates his son,
  - type: text
    content: but he who loves him is diligent to discipline him.
  - type: note
    content: Or who loves him disciplines him early
  '25':
  - type: text
    content: ' '
  - type: note
    content: See ch. 10:3
  - type: text
    content: The righteous has enough to satisfy his appetite,
  - type: text
    content: but the belly of the wicked suffers want.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 21:23; [ch. 12:13; 18:21; James 3:2 ]
  - type: text
    content: Whoever guards his mouth preserves his life;
  - type: note
    content: ch. 20:19
  - type: text
    content: 'he who opens wide his lips '
  - type: note
    content: ch. 18:7
  - type: text
    content: comes to ruin.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See ch. 6:9-11
  - type: text
    content: The soul of the sluggard craves and gets nothing,
  - type: text
    content: 'while the soul of the diligent '
  - type: note
    content: ch. 11:25
  - type: text
    content: is richly supplied.
  '5':
  - type: text
    content: The righteous hates falsehood,
  - type: text
    content: but the wicked brings shame
  - type: note
    content: Or stench
  - type: text
    content: ' and disgrace.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:3, 5, 6
  - type: text
    content: 'Righteousness guards him whose '
  - type: note
    content: ch. 11:20
  - type: text
    content: way is blameless,
  - type: text
    content: but sin overthrows the wicked.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:24; [ Luke 12:21; Rev. 3:17 ]
  - type: text
    content: One pretends to be rich,
  - type: note
    content: Or One makes himself rich
  - type: text
    content: ' yet has nothing;'
  - type: note
    content: '[ Luke 12:33; 2 Cor. 6:10; James 2:5 ]'
  - type: text
    content: another pretends to be poor,
  - type: note
    content: Or another makes himself poor
  - type: text
    content: ' yet has great wealth.'
  '8':
  - type: text
    content: The ransom of a man’s life is his wealth,
  - type: text
    content: 'but a poor man '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: hears no threat.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 29:3 ]'
  - type: text
    content: The light of the righteous rejoices,
  - type: text
    content: 'but '
  - type: note
    content: See Job 18:5
  - type: text
    content: the lamp of the wicked will be put out.
