    children:
    - type: text
      text: '1'
  - type: text
    text: '“Bezalel and Oholiab and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:3
      metadata:
        usfm: EXO.28.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:6
      metadata:
        usfm: EXO.31.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:10
      metadata:
        usfm: EXO.35.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: EXO.35.25
    marker-yv: yv-n
  - type: text
    text: 'every craftsman in whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has put skill and intelligence to know how to do any work in the construction of the sanctuary shall work in accordance with all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Moses called Bezalel and Oholiab and every craftsman in whose mind the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had put skill, everyone '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:2
      metadata:
        usfm: EXO.25.2
    marker-yv: yv-n
  - type: text
    text: 'whose heart stirred him up to come to do the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they received from Moses all the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:24
      metadata:
        usfm: EXO.35.24
    marker-yv: yv-n
  - type: text
    text: 'contribution that the people of Israel had brought for doing the work on the sanctuary. They still kept bringing him '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:29
      metadata:
        usfm: EXO.35.29
    marker-yv: yv-n
  - type: text
    text: 'freewill offerings every morning, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'so that all the craftsmen who were doing every sort of task on the sanctuary came, each from the task that he was doing, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and said to Moses, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 31:10
      metadata:
        usfm: 2CH.31.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 8:2
      metadata:
        usfm: 2CO.8.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 2CO.8.3
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '“The people bring much more than enough for doing the work that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded us to do.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Moses gave command, and word was proclaimed throughout the camp, “Let no man or woman do anything more for the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: EXO.36.3
    marker-yv: yv-n
  - type: text
    text: 'contribution for the sanctuary.” So the people were restrained from bringing, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: for the material they had was sufficient to do all the work, and more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 8-19, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:1-14
      metadata:
        usfm: EXO.26.1+EXO.26.2+EXO.26.3+EXO.26.4+EXO.26.5+EXO.26.6+EXO.26.7+EXO.26.8+EXO.26.9+EXO.26.10+EXO.26.11+EXO.26.12+EXO.26.13+EXO.26.14
    marker-yv: yv-n
  - type: text
    text: 'And all the craftsmen among the workmen made the tabernacle with ten curtains. They were made of fine twined linen and blue and purple and scarlet yarns, with cherubim skillfully worked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The length of each curtain was twenty-eight cubits,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cubit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was about 18 inches or 45 centimeters
    marker-yv: yv-n
  - type: text
    text: ' and the breadth of each curtain four cubits. All the curtains were the same size.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably Bezalel (compare 35:30; 37:1)
    marker-yv: yv-n
  - type: text
    text: ' coupled five curtains to one another, and the other five curtains he coupled to one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He made loops of blue on the edge of the outermost curtain of the first set. Likewise he made them on the edge of the outermost curtain of the second set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He made fifty loops on the one curtain, and he made fifty loops on the edge of the curtain that was in the second set. The loops were opposite one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And he made fifty clasps of gold, and coupled the curtains one to the other with clasps. So the tabernacle was a single whole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He also made curtains of goats’ hair for a tent over the tabernacle. He made eleven curtains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The length of each curtain was thirty cubits, and the breadth of each curtain four cubits. The eleven curtains were the same size. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He coupled five curtains by themselves, and six curtains by themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he made fifty loops on the edge of the outermost curtain of the one set, and fifty loops on the edge of the other connecting curtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he made fifty clasps of bronze to couple the tent together that it might be a single whole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And he made for the tent a covering of tanned rams’ skins and goatskins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 20-34, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:15-29
      metadata:
        usfm: EXO.26.15+EXO.26.16+EXO.26.17+EXO.26.18+EXO.26.19+EXO.26.20+EXO.26.21+EXO.26.22+EXO.26.23+EXO.26.24+EXO.26.25+EXO.26.26+EXO.26.27+EXO.26.28+EXO.26.29
    marker-yv: yv-n
  - type: text
    text: 'Then he made the upright frames for the tabernacle of '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:5
      metadata:
        usfm: EXO.25.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: EXO.25.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:5
      metadata:
        usfm: EXO.30.5
    marker-yv: yv-n
  - type: text
    text: 'acacia wood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ten cubits was the length of a frame, and a cubit and a half the breadth of each frame. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Each frame had two tenons for fitting together. He did this for all the frames of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The frames for the tabernacle he made thus: twenty frames for the south side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he made forty bases of silver under the twenty frames, two bases under one frame for its two tenons, and two bases under the next frame for its two tenons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For the second side of the tabernacle, on the north side, he made twenty frames '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and their forty bases of silver, two bases under one frame and two bases under the next frame. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For the rear of the tabernacle westward he made six frames. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He made two frames for corners of the tabernacle in the rear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And they were separate beneath but joined at the top, at the first ring. He made two of them this way for the two corners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'There were eight frames with their bases of silver: sixteen bases, under every frame two bases.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He made bars of acacia wood, five for the frames of the one side of the tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and five bars for the frames of the other side of the tabernacle, and five bars for the frames of the tabernacle at the rear westward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he made the middle bar to run from end to end halfway up the frames. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And he overlaid the frames with gold, and made their rings of gold for holders for the bars, and overlaid the bars with gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 35-38, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:31-37
      metadata:
        usfm: EXO.26.31+EXO.26.32+EXO.26.33+EXO.26.34+EXO.26.35+EXO.26.36+EXO.26.37
    marker-yv: yv-n
  - type: text
    text: 'He made the veil of blue and purple and scarlet yarns and fine twined linen; with cherubim skillfully worked into it he made it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And for it he made four pillars of acacia and overlaid them with gold. Their hooks were of gold, and he cast for them four bases of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He also made a screen for the entrance of the tent, of blue and purple and scarlet yarns and fine twined linen, embroidered with needlework, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: and its five pillars with their hooks. He overlaid their capitals, and their fillets were of gold, but their five bases were of bronze.
