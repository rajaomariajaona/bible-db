  - type: text
    content: for their pride,
  - type: text
    content: because they taunted and boasted
  - type: text
    content: 'against the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will be awesome against them;'
  - type: note
    content: '[ Isa. 17:4 ]'
  - type: text
    content: for he will famish all the gods of the earth,
  - type: text
    content: 'and '
  - type: note
