  - type: text
    content: you may be hidden
  - type: text
    content: 'on the day of the anger of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: Zech. 9:5, 6; [ Jer. 47:5 ]; See Amos 1:6-8
  - type: text
    content: For Gaza shall be deserted,
  - type: text
    content: and Ashkelon shall become a desolation;
  - type: text
    content: Ashdod’s people shall be driven out at noon,
  - type: text
    content: and Ekron shall be uprooted.
  '5':
  - type: text
    content: 'Woe to '
  - type: note
    content: Jer. 47:7; Ezek. 25:16
  - type: text
    content: you inhabitants of the seacoast,
  - type: text
    content: 'you nation of '
  - type: note
    content: See 1 Sam. 30:14
  - type: text
    content: the Cherethites!
  - type: note
    content: '[ Nah. 2:13 ]'
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is against you,'
  - type: note
    content: '[ Josh. 13:3 ]'
  - type: text
    content: O Canaan, land of the Philistines;
  - type: text
    content: 'and I will destroy you '
  - type: note
    content: ch. 3:6
  - type: text
    content: until no inhabitant is left.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 7
  - type: text
    content: 'And you, O seacoast, '
  - type: note
    content: Isa. 65:10
  - type: text
    content: shall be pastures,
  - type: text
    content: with meadows
  - type: note
    content: Or caves
  - type: text
    content: ' for shepherds'
  - type: text
    content: and folds for flocks.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 19:29 ]'
  - type: text
    content: The seacoast shall become the possession
  - type: text
    content: 'of '
  - type: note
    content: '[ch. 3:13; Obad. 19]'
  - type: text
    content: the remnant of the house of Judah,
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: on which they shall graze,
  - type: text
    content: and in the houses of Ashkelon
  - type: text
    content: they shall lie down at evening.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' their God '
  - type: note
    content: Zech. 10:3; Luke 1:68
  - type: text
    content: will be mindful of them
  - type: text
    content: 'and '
  - type: note
    content: ch. 3:20
  - type: text
    content: restore their fortunes.
  '8':
  - type: text
    content: '“I have heard '
  - type: note
    content: '[Jer. 48:27]'
  - type: text
    content: the taunts of Moab
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 25:3, 6
  - type: text
    content: the revilings of the Ammonites,
  - type: text
    content: how they have taunted my people
  - type: text
    content: 'and made boasts '
  - type: note
    content: '[Jer. 49:1]'
  - type: text
    content: against their territory.
  '9':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Isa. 49:18; See Ezek. 16:48
  - type: text
    content: 'as I live,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: text
    content: the God of Israel,
  - type: text
    content: '“Moab shall become '
  - type: note
    content: Deut. 29:23; See Isa. 13:19
  - type: text
    content: like Sodom,
  - type: text
    content: 'and the Ammonites '
  - type: note
    content: Deut. 29:23; See Isa. 13:19
  - type: text
    content: like Gomorrah,
  - type: text
    content: a land possessed by nettles and salt pits,
  - type: text
    content: and a waste forever.
  - type: text
    content: The remnant of my people shall plunder them,
  - type: text
    content: and the survivors of my nation shall possess them.”
