    content: the lands of the nations.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:10 ]'
  - type: text
    content: You also, O Cushites,
  - type: text
    content: shall be slain by my sword.
  '13':
  - type: text
    content: And he will stretch out his hand against the north
  - type: note
    content: '[ Isa. 10:12 ]'
  - type: text
    content: and destroy Assyria,
  - type: text
    content: 'and he '
  - type: note
    content: Nah. 3:7
  - type: text
    content: will make Nineveh a desolation,
  - type: text
    content: a dry waste like the desert.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Isa. 13:21, 22; 34:14
  - type: text
    content: Herds shall lie down in her midst,
  - type: text
    content: all kinds of beasts;
  - type: note
    content: Hebrew beasts of every nation
  - type: note
    content: Isa. 34:11
  - type: text
    content: even the owl and the hedgehog
  - type: note
    content: The identity of the animals rendered owl and hedgehog is uncertain
  - type: text
    content: shall lodge in her capitals;
  - type: text
    content: a voice shall hoot in the window;
  - type: text
    content: devastation will be on the threshold;
  - type: text
    content: 'for '
  - type: note
    content: '[Jer. 22:14, 15]'
  - type: text
    content: her cedar work will be laid bare.
  '15':
  - type: text
    content: This is the exultant city
  - type: note
    content: Isa. 47:8
  - type: text
    content: that lived securely,
  - type: text
    content: that said in her heart,
  - type: text
    content: “I am, and there is no one else.”
  - type: text
    content: What a desolation she has become,
  - type: note
    content: '[ Ezek. 25:5 ]'
  - type: text
    content: a lair for wild beasts!
  - type: note
    content: Jer. 19:8
  - type: text
    content: Everyone who passes by her
  - type: text
    content: 'hisses and '
  - type: note
    content: '[Nah. 3:19]'
  - type: text
    content: shakes his fist.
