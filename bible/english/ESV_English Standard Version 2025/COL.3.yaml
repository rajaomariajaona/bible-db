document_id: COL.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Put On the New Self
  - type: text
    content: ' '
  - type: note
    content: ch. 2:12
  - type: text
    content: 'If then you have been raised with Christ, seek '
  - type: note
    content: '[Phil. 3:14]'
  - type: text
    content: 'the things that are above, where Christ is, '
  - type: note
    content: See Eph. 1:20
  - type: text
    content: 'seated at the right hand of God. '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: Eph. 4:24
  - type: text
    content: 'have put on '
  - type: note
    content: See Rom. 6:4
  - type: text
    content: 'the new self, '
  - type: note
    content: See Rom. 12:2
  - type: text
    content: 'which is being renewed in knowledge '
  - type: note
    content: See Rom. 8:29
  - type: text
    content: 'after the image of '
  - type: note
    content: '[Eph. 2:10]'
  - type: text
    content: 'its creator. '
  '11':
  - type: note
    content: '[Rom. 10:12]; See 1 Cor. 12:13; Gal. 5:6'
  - type: text
    content: Here there is not Greek and Jew, circumcised and uncircumcised, barbarian, Scythian, slave,
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; likewise for Bondservants in verse 22
  - type: text
    content: ' free; but Christ is '
  - type: note
    content: Eph. 1:23
  - type: text
    content: all, and in all.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ver. 10
  - type: text
    content: 'Put on then, as '
  - type: note
    content: Rom. 8:33
  - type: text
    content: 'God’s chosen ones, holy and beloved, '
  - type: note
    content: Phil. 2:1
  - type: text
    content: 'compassionate hearts, '
  - type: note
    content: Eph. 4:32
  - type: text
    content: 'kindness, '
  - type: note
    content: See Eph. 4:2
  - type: text
    content: 'humility, meekness, and patience, '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'bearing with one another and, '
  - type: note
    content: Mark 11:25
  - type: text
    content: 'if one has a complaint against another, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'forgiving each other; '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'as the Lord has forgiven you, so you also must forgive. '
  '14':
  - type: text
    content: 'And above all these put on '
  - type: note
    content: '[1 Thess. 5:8]; See Eph. 5:2'
  - type: text
    content: 'love, which '
  - type: note
    content: Eph. 4:3
  - type: text
    content: 'binds everything together in '
  - type: note
    content: Heb. 6:1; [John 17:23]
  - type: text
    content: 'perfect harmony. '
  '15':
  - type: text
    content: 'And let '
  - type: note
    content: See Phil. 4:7
  - type: text
    content: 'the peace of Christ rule in your hearts, to which indeed you were called '
  - type: note
    content: Eph. 2:16
  - type: text
    content: 'in one body. And '
  - type: note
    content: ver. 17
  - type: text
    content: 'be thankful. '
  '16':
  - type: text
    content: 'Let '
  - type: note
    content: John 15:3
  - type: text
    content: 'the word of Christ dwell in you richly, teaching and admonishing one another in all wisdom, '
  - type: note
    content: See Eph. 5:19
  - type: text
    content: 'singing psalms and hymns and spiritual songs, '
  - type: note
    content: ch. 4:6
  - type: text
    content: 'with thankfulness in your hearts to God. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: ver. 23; 1 Cor. 10:31
  - type: text
    content: 'whatever you do, in word or deed, do everything in the name of the Lord Jesus, '
  - type: note
    content: ch. 1:12; 4:2; See Eph. 5:20
  - type: text
    content: giving thanks to God the Father through him.
  - type: heading
    content: Rules for Christian Households
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ch. 3:18–4:1, see Eph. 5:22–6:9
  - type: text
    content: 'Wives, submit to your husbands, as '
  - type: note
    content: Eph. 5:4; Philem. 8
  - type: text
    content: 'is fitting in the Lord. '
  '19':
  - type: text
    content: 'Husbands, love your wives, and '
  - type: note
    content: Eph. 4:31
  - type: text
    content: 'do not be harsh with them. '
  '2':
  - type: note
    content: See Matt. 16:23
  - type: text
    content: 'Set your minds on things that are above, not on things that are on earth. '
  '20':
  - type: text
    content: 'Children, obey your parents '
  - type: note
    content: '[Eph. 5:24; Titus 2:9]'
  - type: text
    content: 'in everything, for this pleases the Lord. '
  '21':
  - type: text
    content: 'Fathers, do not provoke your children, lest they become discouraged. '
  '22':
  - type: text
    content: 'Bondservants, obey '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: in everything those who are your earthly masters,
  - type: note
    content: Or your masters according to the flesh
  - type: text
    content: ' not by way of eye-service, as people-pleasers, but with sincerity of heart, fearing the Lord. '
  '23':
  - type: note
    content: ver. 17
  - type: text
    content: 'Whatever you do, work heartily, '
  - type: note
    content: '[Philem. 16]'
  - type: text
    content: 'as for the Lord and not for men, '
  '24':
  - type: text
    content: 'knowing that from the Lord '
  - type: note
    content: '[Eph. 6:8]'
  - type: text
    content: 'you will receive the inheritance as your reward. '
  - type: note
    content: '[1 Cor. 7:22]'
  - type: text
    content: 'You are serving the Lord Christ. '
  '25':
  - type: text
    content: For the wrongdoer will be paid back for the wrong he has done, and there is no partiality.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: ch. 2:20; See Rom. 6:2
  - type: text
    content: 'you have died, and your life is hidden with Christ in God. '
  '4':
  - type: text
    content: 'When Christ '
  - type: note
    content: See John 11:25
  - type: text
    content: who is your
  - type: note
    content: Some manuscripts our
  - type: text
    content: ' life '
  - type: note
    content: '[Phil. 3:21; 1 Pet. 1:1, 7, 13; 1 John 2:28; 3:2]'
  - type: text
    content: 'appears, then you also will appear with him '
  - type: note
    content: 1 Cor. 15:43
  - type: text
    content: in glory.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Rom. 8:13; [ Gal. 5:24 ]
  - type: text
    content: 'Put to death therefore '
  - type: note
    content: Rom. 6:13
  - type: text
    content: 'what is earthly in you:'
  - type: note
    content: Greek therefore your members that are on the earth
  - type: text
    content: ' '
  - type: note
    content: See Eph. 5:3, 5
  - type: text
    content: 'sexual immorality, impurity, '
  - type: note
    content: Rom. 1:26
  - type: text
    content: 'passion, evil desire, and covetousness, '
  - type: note
    content: '[Job 31:25, 26]'
  - type: text
    content: 'which is idolatry. '
  '6':
  - type: note
    content: See Eph. 5:6
  - type: text
    content: On account of these the wrath of God is coming.
  - type: note
    content: Some manuscripts add upon the sons of disobedience
  - type: text
    content: ' '
  '7':
  - type: note
    content: See Eph. 2:2, 11
  - type: text
    content: 'In these you too once walked, when you were living in them. '
  '8':
  - type: text
    content: 'But now '
  - type: note
    content: See Eph. 4:22
  - type: text
    content: 'you must put them all away: '
  - type: note
    content: Eph. 4:31
  - type: text
    content: 'anger, wrath, malice, '
  - type: note
    content: See Eph. 4:29
  - type: text
    content: 'slander, and obscene talk from your mouth. '
  '9':
  - type: note
    content: Lev. 19:11; See Eph. 4:25
  - type: text
    content: 'Do not lie to one another, seeing that '
  - type: note
    content: ch. 2:11
  - type: text
    content: 'you have put off '
  - type: note
    content: Rom. 6:6; Eph. 4:22
  - type: text
    content: the old self
  - type: note
    content: Greek man; also as supplied in verse 10
  - type: text
    content: ' with its practices '
