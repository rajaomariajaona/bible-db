document_id: JOS.21,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cities and Pasturelands Allotted to Levi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the heads of the fathers’ houses of the Levites came '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 34:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      marker-yv: yv-n
    - type: text
      text: 'to Eleazar the priest and to Joshua the son of Nun and to the heads of the fathers’ houses of the tribes of the people of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which went to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'the descendants of Aaron, one of the clans of the Kohathites who belonged to the people of Levi; since the lot fell to them first. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 11-19, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:54-60
      marker-yv: yv-n
    - type: text
      text: 'They gave them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:13-15
      marker-yv: yv-n
    - type: text
      text: 'Kiriath-arba (Arba being the father of Anak), that is Hebron, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 1:39
      marker-yv: yv-n
    - type: text
      text: 'in the hill country of Judah, along with the pasturelands around it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the fields of the city and its villages had been given to Caleb the son of Jephunneh as his possession.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to the descendants of Aaron the priest they gave Hebron, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:7
      marker-yv: yv-n
    - type: text
      text: 'the city of refuge for the manslayer, with its pasturelands, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:29
      marker-yv: yv-n
    - type: text
      text: 'Libnah with its pasturelands, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jattir with its pasturelands, Eshtemoa with its pasturelands, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Holon with its pasturelands, Debir with its pasturelands, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ain with its pasturelands, Juttah with its pasturelands, Beth-shemesh with its pasturelands—nine cities out of these two tribes; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then out of the tribe of Benjamin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:3
      marker-yv: yv-n
    - type: text
      text: 'Gibeon with its pasturelands, Geba with its pasturelands, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anathoth with its pasturelands, and Almon with its pasturelands—four cities. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The cities of the descendants of Aaron, the priests, were in all thirteen cities with their pasturelands.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      marker-yv: yv-n
    - type: text
      text: 'at Shiloh in the land of Canaan, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:2
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded through Moses that we be given cities to dwell in, along with their pasturelands for our livestock.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 20-26, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:66-70
      marker-yv: yv-n
    - type: text
      text: 'As to the rest of the Kohathites belonging to the Kohathite clans of the Levites, the cities allotted to them were out of the tribe of Ephraim. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To them were given Shechem, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'the city of refuge for the manslayer, with its pasturelands in the hill country of Ephraim, Gezer with its pasturelands, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kibzaim with its pasturelands, Beth-horon with its pasturelands—four cities; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the tribe of Dan, Elteke with its pasturelands, Gibbethon with its pasturelands, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aijalon with its pasturelands, Gath-rimmon with its pasturelands—four cities; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the half-tribe of Manasseh, Taanach with its pasturelands, and Gath-rimmon with its pasturelands—two cities. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The cities of the clans of the rest of the Kohathites were ten in all with their pasturelands.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 27-33, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:71-76
      marker-yv: yv-n
    - type: text
      text: 'And to the Gershonites, one of the clans of the Levites, were given out of the half-tribe of Manasseh, Golan in Bashan with its pasturelands, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'the city of refuge for the manslayer, and Beeshterah with its pasturelands—two cities; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the tribe of Issachar, Kishion with its pasturelands, Daberath with its pasturelands, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jarmuth with its pasturelands, En-gannim with its pasturelands—four cities; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So by command of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the people of Israel gave to the Levites the following cities and pasturelands out of their inheritance.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the tribe of Asher, Mishal with its pasturelands, Abdon with its pasturelands, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Helkath with its pasturelands, and Rehob with its pasturelands—four cities; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the tribe of Naphtali, Kedesh in Galilee with its pasturelands, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'the city of refuge for the manslayer, Hammoth-dor with its pasturelands, and Kartan with its pasturelands—three cities. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The cities of the several clans of the Gershonites were in all thirteen cities with their pasturelands.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 34-40, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:77-81
      marker-yv: yv-n
    - type: text
      text: 'And to the rest of the Levites, the Merarite clans, were given out of the tribe of Zebulun, Jokneam with its pasturelands, Kartah with its pasturelands, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimnah with its pasturelands, Nahalal with its pasturelands—four cities; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the tribe of Reuben, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:8
      marker-yv: yv-n
    - type: text
      text: 'Bezer with its pasturelands, Jahaz with its pasturelands, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kedemoth with its pasturelands, and Mephaath with its pasturelands—four cities; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the tribe of Gad, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Ramoth in Gilead with its pasturelands, the city of refuge for the manslayer, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:26
      marker-yv: yv-n
    - type: text
      text: 'Mahanaim with its pasturelands, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Heshbon with its pasturelands, Jazer with its pasturelands—four cities in all. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The lot came out for the clans of the Kohathites. So those Levites who were descendants of Aaron the priest '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9-19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 6:16-19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 3:17-20
      marker-yv: yv-n
    - type: text
      text: received by lot from the tribes of Judah, Simeon, and Benjamin, thirteen cities.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As for the cities of the several Merarite clans, that is, the remainder of the clans of the Levites, those allotted to them were in all twelve cities.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:7
      marker-yv: yv-n
    - type: text
      text: 'The cities of the Levites in the midst of the possession of the people of Israel were in all forty-eight cities with their pasturelands. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These cities each had its pasturelands around it. So it was with all these cities.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 13:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      marker-yv: yv-n
    - type: text
      text: 'Thus the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave to Israel all the land that he swore to give to their fathers. And they took possession of it, and they settled there. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:23
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them rest on every side just as he had sworn to their fathers. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:9
      marker-yv: yv-n
    - type: text
      text: 'Not one of all their enemies had withstood them, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:24
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given all their enemies into their hands. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'Not one word of all the good promises that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had made to the house of Israel had failed; all came to pass.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rest of the Kohathites received by lot '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20-26
      marker-yv: yv-n
    - type: text
      text: from the clans of the tribe of Ephraim, from the tribe of Dan and the half-tribe of Manasseh, ten cities.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27-33
      marker-yv: yv-n
    - type: text
      text: Gershonites received by lot from the clans of the tribe of Issachar, from the tribe of Asher, from the tribe of Naphtali, and from the half-tribe of Manasseh in Bashan, thirteen cities.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34-40
      marker-yv: yv-n
    - type: text
      text: Merarites according to their clans received from the tribe of Reuben, the tribe of Gad, and the tribe of Zebulun, twelve cities.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These cities and their pasturelands the people of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'gave by lot to the Levites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:2
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:3-5
      marker-yv: yv-n
    - type: text
      text: 'as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded through Moses.'
