document_id: JOS.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Cities and Pasturelands Allotted to Levi
  - type: text
    content: 'Then the heads of the fathers’ houses of the Levites came '
  - type: note
    content: ch. 14:1; 17:4; 19:51; Num. 34:17, 18
  - type: text
    content: 'to Eleazar the priest and to Joshua the son of Nun and to the heads of the fathers’ houses of the tribes of the people of Israel. '
  '10':
  - type: text
    content: 'which went to '
  - type: note
    content: ver. 4
  - type: text
    content: 'the descendants of Aaron, one of the clans of the Kohathites who belonged to the people of Levi; since the lot fell to them first. '
  '11':
  - type: note
    content: For ver. 11-19, see 1 Chr. 6:54-60
  - type: text
    content: 'They gave them '
  - type: note
    content: See ch. 14:13-15
  - type: text
    content: 'Kiriath-arba (Arba being the father of Anak), that is Hebron, '
  - type: note
    content: ch. 20:7; Luke 1:39
  - type: text
    content: 'in the hill country of Judah, along with the pasturelands around it. '
  '12':
  - type: text
    content: But the fields of the city and its villages had been given to Caleb the son of Jephunneh as his possession.
  '13':
  - type: text
    content: 'And to the descendants of Aaron the priest they gave Hebron, '
  - type: note
    content: ch. 20:7
  - type: text
    content: 'the city of refuge for the manslayer, with its pasturelands, '
  - type: note
    content: ch. 10:29
  - type: text
    content: 'Libnah with its pasturelands, '
  '14':
  - type: text
    content: 'Jattir with its pasturelands, Eshtemoa with its pasturelands, '
  '15':
  - type: text
    content: 'Holon with its pasturelands, Debir with its pasturelands, '
  '16':
  - type: text
    content: 'Ain with its pasturelands, Juttah with its pasturelands, Beth-shemesh with its pasturelands—nine cities out of these two tribes; '
  '17':
  - type: text
    content: 'then out of the tribe of Benjamin, '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'Gibeon with its pasturelands, Geba with its pasturelands, '
  '18':
  - type: text
    content: 'Anathoth with its pasturelands, and Almon with its pasturelands—four cities. '
  '19':
  - type: text
    content: The cities of the descendants of Aaron, the priests, were in all thirteen cities with their pasturelands.
  '2':
  - type: text
    content: 'And they said to them '
  - type: note
    content: See ch. 18:1
  - type: text
    content: 'at Shiloh in the land of Canaan, '
  - type: note
    content: Num. 35:2
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded through Moses that we be given cities to dwell in, along with their pasturelands for our livestock.” '
  '20':
  - type: text
    content: ' '
  - type: note
    content: For ver. 20-26, see 1 Chr. 6:66-70
  - type: text
    content: 'As to the rest of the Kohathites belonging to the Kohathite clans of the Levites, the cities allotted to them were out of the tribe of Ephraim. '
  '21':
  - type: text
    content: 'To them were given Shechem, '
  - type: note
    content: ch. 20:7, 8
  - type: text
    content: 'the city of refuge for the manslayer, with its pasturelands in the hill country of Ephraim, Gezer with its pasturelands, '
  '22':
  - type: text
    content: 'Kibzaim with its pasturelands, Beth-horon with its pasturelands—four cities; '
  '23':
  - type: text
    content: 'and out of the tribe of Dan, Elteke with its pasturelands, Gibbethon with its pasturelands, '
  '24':
  - type: text
    content: 'Aijalon with its pasturelands, Gath-rimmon with its pasturelands—four cities; '
  '25':
  - type: text
    content: 'and out of the half-tribe of Manasseh, Taanach with its pasturelands, and Gath-rimmon with its pasturelands—two cities. '
  '26':
  - type: text
    content: The cities of the clans of the rest of the Kohathites were ten in all with their pasturelands.
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27-33, see 1 Chr. 6:71-76
  - type: text
    content: 'And to the Gershonites, one of the clans of the Levites, were given out of the half-tribe of Manasseh, Golan in Bashan with its pasturelands, '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'the city of refuge for the manslayer, and Beeshterah with its pasturelands—two cities; '
  '28':
  - type: text
    content: 'and out of the tribe of Issachar, Kishion with its pasturelands, Daberath with its pasturelands, '
  '29':
  - type: text
    content: 'Jarmuth with its pasturelands, En-gannim with its pasturelands—four cities; '
  '3':
  - type: text
    content: 'So by command of the '
  - type: text
    content: Lord
  - type: text
    content: ' the people of Israel gave to the Levites the following cities and pasturelands out of their inheritance.'
  '30':
  - type: text
    content: 'and out of the tribe of Asher, Mishal with its pasturelands, Abdon with its pasturelands, '
  '31':
  - type: text
    content: 'Helkath with its pasturelands, and Rehob with its pasturelands—four cities; '
  '32':
  - type: text
    content: 'and out of the tribe of Naphtali, Kedesh in Galilee with its pasturelands, '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'the city of refuge for the manslayer, Hammoth-dor with its pasturelands, and Kartan with its pasturelands—three cities. '
  '33':
  - type: text
    content: The cities of the several clans of the Gershonites were in all thirteen cities with their pasturelands.
  '34':
  - type: text
    content: ' '
  - type: note
    content: For ver. 34-40, see 1 Chr. 6:77-81
  - type: text
    content: 'And to the rest of the Levites, the Merarite clans, were given out of the tribe of Zebulun, Jokneam with its pasturelands, Kartah with its pasturelands, '
  '35':
  - type: text
    content: 'Dimnah with its pasturelands, Nahalal with its pasturelands—four cities; '
  '36':
  - type: text
    content: 'and out of the tribe of Reuben, '
  - type: note
    content: ch. 20:8
  - type: text
    content: 'Bezer with its pasturelands, Jahaz with its pasturelands, '
  '37':
  - type: text
    content: 'Kedemoth with its pasturelands, and Mephaath with its pasturelands—four cities; '
  '38':
  - type: text
    content: 'and out of the tribe of Gad, '
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'Ramoth in Gilead with its pasturelands, the city of refuge for the manslayer, '
  - type: note
    content: See ch. 13:26
  - type: text
    content: 'Mahanaim with its pasturelands, '
  '39':
  - type: note
    content: '[See ver. 38 above]'
  - type: text
    content: 'Heshbon with its pasturelands, Jazer with its pasturelands—four cities in all. '
  '4':
  - type: text
    content: 'The lot came out for the clans of the Kohathites. So those Levites who were descendants of Aaron the priest '
  - type: note
    content: See ver. 9-19; Ex. 6:16-19; Num. 3:17-20
  - type: text
    content: received by lot from the tribes of Judah, Simeon, and Benjamin, thirteen cities.
  '40':
  - type: text
    content: As for the cities of the several Merarite clans, that is, the remainder of the clans of the Levites, those allotted to them were in all twelve cities.
  '41':
  - type: text
    content: ' '
  - type: note
    content: Num. 35:7
  - type: text
    content: 'The cities of the Levites in the midst of the possession of the people of Israel were in all forty-eight cities with their pasturelands. '
  '42':
  - type: text
    content: These cities each had its pasturelands around it. So it was with all these cities.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Gen. 13:15; 15:18; 26:3; 28:4, 13
  - type: text
    content: 'Thus the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to Israel all the land that he swore to give to their fathers. And they took possession of it, and they settled there. '
  '44':
  - type: note
    content: See ch. 11:23
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest on every side just as he had sworn to their fathers. '
  - type: note
    content: ch. 10:8; 23:9
  - type: text
    content: 'Not one of all their enemies had withstood them, for '
  - type: note
    content: ch. 2:24; Deut. 7:24
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' had given all their enemies into their hands. '
  '45':
  - type: note
    content: ch. 23:14, 15
  - type: text
    content: 'Not one word of all the good promises that the '
  - type: text
    content: Lord
  - type: text
    content: ' had made to the house of Israel had failed; all came to pass.'
  '5':
  - type: text
    content: 'And the rest of the Kohathites received by lot '
  - type: note
    content: See ver. 20-26
  - type: text
    content: from the clans of the tribe of Ephraim, from the tribe of Dan and the half-tribe of Manasseh, ten cities.
  '6':
  - type: text
    content: 'The '
  - type: note
    content: See ver. 27-33
  - type: text
    content: Gershonites received by lot from the clans of the tribe of Issachar, from the tribe of Asher, from the tribe of Naphtali, and from the half-tribe of Manasseh in Bashan, thirteen cities.
  '7':
  - type: text
    content: 'The '
  - type: note
    content: See ver. 34-40
  - type: text
    content: Merarites according to their clans received from the tribe of Reuben, the tribe of Gad, and the tribe of Zebulun, twelve cities.
  '8':
  - type: text
    content: 'These cities and their pasturelands the people of Israel '
  - type: note
    content: ver. 3
  - type: text
    content: 'gave by lot to the Levites, '
  - type: note
    content: Num. 35:2; See ch. 14:3-5
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses.'
  '9':
  - type: text
    content: 'Out of the tribe of the people of Judah and the tribe of the people of Simeon they gave the following cities mentioned by name, '
