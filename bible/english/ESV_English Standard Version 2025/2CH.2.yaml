document_id: 2CH.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparing to Build the Temple
  - type: text
    content: ' '
  - type: note
    content: Ch 1:18 in Hebrew
  - type: note
    content: 1 Kgs. 5:5
  - type: text
    content: 'Now Solomon purposed to build a temple for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', and a royal palace for himself. '
  '10':
  - type: note
    content: '[1 Kgs. 5:11]'
  - type: text
    content: I will give for your servants, the woodsmen who cut timber, 20,000 cors
  - type: note
    content: A cor was about 6 bushels or 220 liters
  - type: text
    content: ' of crushed wheat, 20,000 cors of barley, 20,000 baths'
  - type: note
    content: A bath was about 6 gallons or 22 liters
  - type: text
    content: ' of wine, and 20,000 baths of oil.”'
  '11':
  - type: text
    content: 'Then Hiram the king of Tyre answered in a letter that he sent to Solomon, '
  - type: note
    content: ch. 9:8; 1 Kgs. 10:9
  - type: text
    content: '“Because the '
  - type: text
    content: Lord
  - type: text
    content: ' loves his people, he has made you king over them.” '
  '12':
  - type: text
    content: 'Hiram also said, “Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel, '
  - type: note
    content: See Gen. 1:1
  - type: text
    content: 'who made heaven and earth, who has given King David a wise son, who has discretion and understanding, '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'who will build a temple for the '
  - type: text
    content: Lord
  - type: text
    content: ' and a royal palace for himself.'
  '13':
  - type: text
    content: '“Now I have sent a skilled man, who has understanding, Huram-abi, '
  '14':
  - type: note
    content: 1 Kgs. 7:14
  - type: text
    content: 'the son of a woman of the daughters of Dan, and his father was a man of Tyre. He is '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'trained to work in gold, silver, bronze, iron, stone, and wood, and in purple, blue, and crimson fabrics and fine linen, and to do all sorts of engraving and execute any design that may be assigned him, with your craftsmen, the craftsmen of my lord, David your father. '
  '15':
  - type: text
    content: 'Now therefore the wheat and barley, oil and wine, '
  - type: note
    content: ver. 10
  - type: text
    content: 'of which my lord has spoken, let him send to his servants. '
  '16':
  - type: note
    content: '[1 Kgs. 5:9]'
  - type: text
    content: 'And we will cut whatever timber you need from Lebanon and bring it to you in rafts by sea to '
  - type: note
    content: See Josh. 19:46
  - type: text
    content: Joppa, so that you may take it up to Jerusalem.”
  '17':
  - type: text
    content: 'Then Solomon counted all the resident aliens who were in the land of Israel, '
  - type: note
    content: '[1 Chr. 22:2]'
  - type: text
    content: 'after the census of them that David his father had taken, and there were found 153,600. '
  '18':
  - type: note
    content: See ver. 2
  - type: text
    content: Seventy thousand of them he assigned to bear burdens, 80,000 to quarry in the hill country, and 3,600 as overseers to make the people work.
  '2':
  - type: note
    content: Ch 2:1 in Hebrew
  - type: text
    content: ' '
  - type: note
    content: ver. 18; 1 Kgs. 5:15, 16; [ch. 8:7, 8; 1 Kgs. 9:20, 21]
  - type: text
    content: 'And Solomon assigned 70,000 men to bear burdens and 80,000 to quarry in the hill country, and '
  - type: note
    content: '[1 Kgs. 5:16]'
  - type: text
    content: '3,600 to oversee them. '
  '3':
  - type: note
    content: For ver. 3-16, see 1 Kgs. 5:2-11
  - type: text
    content: 'And Solomon sent word to Hiram the king of Tyre: '
  - type: note
    content: 1 Chr. 14:1
  - type: text
    content: '“As you dealt with David my father and sent him cedar to build himself a house to dwell in, so deal with me. '
  '4':
  - type: text
    content: 'Behold, I am about to build a house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God and dedicate it to him for the burning of '
  - type: note
    content: See Ex. 30:7
  - type: text
    content: 'incense of sweet spices before him, and for '
  - type: note
    content: See Lev. 24:5-8
  - type: text
    content: 'the regular arrangement of the showbread, and for '
  - type: note
    content: See Num. 28:3-8
  - type: text
    content: 'burnt offerings morning and evening, '
  - type: note
    content: ch. 8:13; Num. 28:9, 11, 19, 26
  - type: text
    content: 'on the Sabbaths and the new moons and the appointed feasts of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, as ordained forever for Israel. '
  '5':
  - type: text
    content: 'The house that I am to build will be great, '
  - type: note
    content: Ps. 135:5; [Ex. 15:11; 1 Chr. 16:25; Ps. 86:8]
  - type: text
    content: 'for our God is greater than all gods. '
  '6':
  - type: note
    content: ch. 6:18; 1 Kgs. 8:27; Isa. 66:1; Acts 7:49
  - type: text
    content: 'But who is able to build him a house, since '
  - type: note
    content: ch. 6:18; 1 Kgs. 8:27; Isa. 66:1; Acts 7:49
  - type: text
    content: 'heaven, even highest heaven, cannot contain him? Who am I to build a house for him, except as a place to make offerings before him? '
  '7':
  - type: text
    content: 'So now '
  - type: note
    content: ver. 13, 14
  - type: text
    content: 'send me a man skilled to work in gold, silver, bronze, and iron, and in purple, crimson, and blue fabrics, trained also in engraving, to be with the skilled workers who are with me in Judah and Jerusalem, '
  - type: note
    content: 1 Chr. 22:15
  - type: text
    content: 'whom David my father provided. '
  '8':
  - type: text
    content: 'Send me also cedar, cypress, and algum timber from Lebanon, for I know that '
  - type: note
    content: ch. 9:10, 11
  - type: text
    content: 'your servants know how to cut timber in Lebanon. And my servants will be with your servants, '
  '9':
  - type: text
    content: 'to prepare timber for me in abundance, for the house I am to build will be great and wonderful. '
