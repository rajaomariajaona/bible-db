  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will be a light to me.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 10:19 ]'
  - type: text
    content: 'I will bear the indignation of the '
  - type: text
    content: Lord
  - type: text
    content: because I have sinned against him,
  - type: text
    content: 'until '
