  - type: text
    content: ' marvelous things.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 26:11; 52:15 ]'
  - type: text
    content: The nations shall see and be ashamed of all their might;
  - type: note
    content: See Judg. 18:19
  - type: text
    content: they shall lay their hands on their mouths;
  - type: text
    content: their ears shall be deaf;
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 72:9; Isa. 49:23
  - type: text
    content: they shall lick the dust like a serpent,
  - type: text
    content: like the crawling things of the earth;
  - type: note
    content: Ps. 18:45
  - type: text
    content: they shall come trembling out of their strongholds;
  - type: note
    content: '[ch. 4:1 ]'
  - type: text
    content: 'they shall turn in dread to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: and they shall be in fear of you.
  - type: heading
    content: God’s Steadfast Love and Compassion
  '18':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 15:11
  - type: text
    content: 'Who is a God like you, '
  - type: note
    content: Jer. 50:20; See Ex. 34:7
  - type: text
    content: pardoning iniquity
  - type: text
    content: and passing over transgression
  - type: note
    content: Jer. 50:20; See Ex. 34:7
  - type: text
    content: for the remnant of his inheritance?
  - type: note
    content: Ps. 103:9
  - type: text
    content: He does not retain his anger forever,
  - type: text
    content: because he delights in steadfast love.
  '19':
  - type: text
    content: 'He will '
  - type: note
    content: Ps. 80:14
  - type: text
    content: again have compassion on us;
  - type: note
    content: '[ Rom. 6:14 ]'
  - type: text
    content: he will tread our iniquities underfoot.
  - type: note
    content: '[ Isa. 38:17 ]'
  - type: text
    content: You will cast all our
  - type: note
    content: Hebrew their
  - type: text
    content: ' sins'
  - type: text
    content: into the depths of the sea.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 12:1; Isa. 57:1 ]'
  - type: text
    content: The godly has perished from the earth,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 14:1, 3
  - type: text
    content: there is no one upright among mankind;
  - type: note
    content: '[ Ps. 10:9; Hos. 6:8, 9 ]'
  - type: text
    content: they all lie in wait for blood,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 9:19
  - type: text
    content: each hunts the other with a net.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 1:72, 73 ]'
  - type: text
    content: You will show faithfulness to Jacob
  - type: text
    content: and steadfast love to Abraham,
  - type: note
    content: Ps. 105:9, 10
  - type: text
    content: as you have sworn to our fathers
  - type: text
    content: from the days of old.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Zeph. 3:7 ]'
  - type: text
    content: Their hands are on what is evil, to do it well;
  - type: note
    content: '[ Ps. 82:1, 2 ]'
  - type: text
    content: 'the prince and '
  - type: note
    content: ch. 3:11
  - type: text
    content: the judge ask for a bribe,
  - type: text
    content: and the great man utters the evil desire of his soul;
  - type: text
    content: thus they weave it together.
  '4':
  - type: text
    content: 'The best of them is '
  - type: note
    content: '[2 Sam. 23:6, 7; Nah. 1:10]; See Ezek. 2:6'
  - type: text
    content: like a brier,
  - type: text
    content: the most upright of them a thorn hedge.
  - type: text
    content: 'The day of '
  - type: note
    content: See Ezek. 33:2
  - type: text
    content: your watchmen, of your punishment, has come;
  - type: note
    content: '[ch. 3:6, 7; Isa. 22:5 ]'
  - type: text
    content: now their confusion is at hand.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jer. 9:4
  - type: text
    content: Put no trust in a neighbor;
  - type: text
    content: have no confidence in a friend;
  - type: text
    content: 'guard '
  - type: note
    content: '[Ps. 141:3]'
  - type: text
    content: the doors of your mouth
  - type: text
    content: from her who lies in your arms;
  - type: note
    content: Hebrew bosom
  '6':
  - type: text
    content: 'for '
  - type: note
    content: Ezek. 22:7; [Matt. 10:21, 35; Luke 12:53]
  - type: text
    content: the son treats the father with contempt,
  - type: text
    content: the daughter rises up against her mother,
  - type: text
    content: the daughter-in-law against her mother-in-law;
  - type: note
    content: Cited Matt. 10:36
  - type: text
    content: a man’s enemies are the men of his own house.
  '7':
  - type: text
    content: 'But as for me, I will look to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: '[ Lam. 3:26 ]'
  - type: text
    content: I will wait for the God of my salvation;
  - type: text
    content: my God will hear me.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 50:11; Lam. 4:21 ]'
  - type: text
    content: 'Rejoice not over me, O '
  - type: note
    content: ver. 10
  - type: text
    content: my enemy;
