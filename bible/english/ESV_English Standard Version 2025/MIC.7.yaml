    content: there is no cluster to eat,
  - type: text
    content: 'no '
  - type: note
    content: Hos. 9:10
  - type: text
    content: first-ripe fig that my soul desires.
  '10':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 8
  - type: text
    content: my enemy will see,
  - type: text
    content: 'and shame will cover her who '
