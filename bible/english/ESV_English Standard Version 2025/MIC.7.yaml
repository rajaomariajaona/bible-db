  '13':
  - type: text
    content: 'But '
  - type: note
    content: ch. 6:13
  - type: text
    content: the earth will be desolate
  - type: text
    content: because of its inhabitants,
  - type: text
    content: for the fruit of their deeds.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps. 28:9; [ch. 5:4 ]
  - type: text
    content: 'Shepherd your people '
