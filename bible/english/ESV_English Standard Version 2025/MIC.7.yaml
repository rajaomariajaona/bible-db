  '1':
  - type: heading
    content: Wait for the God of Salvation
  - type: text
    content: Woe is me! For I have become
  - type: note
    content: Isa. 24:13; [ Isa. 17:6 ]
  - type: text
    content: as when the summer fruit has been gathered,
  - type: text
    content: 'as when the grapes have been gleaned:'
