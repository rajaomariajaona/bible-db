document_id: JOB.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job Replies: The Wicked Do Prosper'
  - type: text
    content: 'Then Job answered and said:'
  '10':
  - type: text
    content: Their bull breeds without fail;
  - type: text
    content: 'their cow calves and '
  - type: note
    content: Ex. 23:26
  - type: text
    content: does not miscarry.
  '11':
  - type: text
    content: 'They send out their '
  - type: note
    content: '[Ps. 17:14]'
  - type: text
    content: little boys like a flock,
  - type: text
    content: and their children dance.
  '12':
  - type: text
    content: 'They sing to '
  - type: note
    content: Ex. 15:20
  - type: text
    content: 'the tambourine and '
  - type: note
    content: ch. 30:31; Gen. 4:21
  - type: text
    content: the lyre
  - type: text
    content: 'and rejoice to the sound of '
  - type: note
    content: ch. 30:31; Gen. 4:21
  - type: text
    content: the pipe.
  '13':
  - type: text
    content: 'They '
  - type: note
    content: ch. 36:11
  - type: text
    content: spend their days in prosperity,
  - type: text
    content: 'and in '
  - type: note
    content: ch. 34:20; [ch. 24:19]
  - type: text
    content: 'peace they go down to '
  - type: note
    content: ch. 7:9; 14:13; 17:13; See Ps. 16:10
  - type: text
    content: Sheol.
  '14':
  - type: text
    content: 'They say to God, '
  - type: note
    content: ch. 22:17
  - type: text
    content: ‘Depart from us!
  - type: text
    content: We do not desire the knowledge of your ways.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 5:2 ]'
  - type: text
    content: What is the Almighty, that we should serve him?
  - type: text
    content: 'And what '
  - type: note
    content: See ch. 34:9
  - type: text
    content: profit do we get if we pray to him?’
  '16':
  - type: text
    content: Behold, is not their prosperity in their hand?
  - type: note
    content: ch. 22:18; [ Ps. 1:1 ]
  - type: text
    content: The counsel of the wicked is far from me.
  '17':
  - type: text
    content: '“How often is it that '
  - type: note
    content: See ch. 18:5, 6
  - type: text
    content: the lamp of the wicked is put out?
  - type: text
    content: That their calamity comes upon them?
  - type: text
    content: That God
  - type: note
    content: Hebrew he
  - type: text
    content: ' distributes pains in his anger?'
  '18':
  - type: text
    content: 'That they are like '
  - type: note
    content: ch. 13:25; Ps. 83:13
  - type: text
    content: straw before the wind,
  - type: text
    content: 'and like '
  - type: note
    content: Ps. 1:4; 35:5; Isa. 17:13; 29:5
  - type: text
    content: chaff that the storm carries away?
  '19':
  - type: text
    content: 'You say, ‘God '
  - type: note
    content: ch. 15:20
  - type: text
    content: 'stores up their iniquity for their '
  - type: note
    content: Ex. 20:5
  - type: text
    content: children.’
  - type: text
    content: 'Let him pay it out to them, that they may '
  - type: note
    content: Isa. 9:9; Ezek. 25:14; Hos. 9:7
  - type: text
    content: know it.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:17
  - type: text
    content: “Keep listening to my words,
  - type: text
    content: and let this be your comfort.
  '20':
  - type: text
    content: Let their own eyes see their destruction,
  - type: text
    content: 'and let them '
  - type: note
    content: Ps. 60:3; 75:8; Isa. 51:17, 22; Jer. 25:15; Obad. 16; Rev. 14:10
  - type: text
    content: drink of the wrath of the Almighty.
  '21':
  - type: text
    content: For what do they care for their houses after them,
  - type: text
    content: 'when '
  - type: note
    content: ch. 14:5
  - type: text
    content: the number of their months is cut off?
  '22':
  - type: text
    content: ' '
  - type: note
    content: Isa. 40:14; Rom. 11:34; 1 Cor. 2:16
  - type: text
    content: Will any teach God knowledge,
  - type: text
    content: 'seeing that he '
  - type: note
    content: '[ch. 4:18; 15:15]'
  - type: text
    content: judges those who are on high?
  '23':
  - type: text
    content: One dies in his full vigor,
  - type: text
    content: being wholly at ease and secure,
  '24':
  - type: text
    content: his pails
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' full of milk'
  - type: text
    content: 'and '
  - type: note
    content: Prov. 3:8; [Isa. 58:11; 66:14]
  - type: text
    content: the marrow of his bones moist.
  '25':
  - type: text
    content: 'Another dies in '
  - type: note
    content: See ch. 7:11
  - type: text
    content: bitterness of soul,
  - type: text
    content: never having tasted of prosperity.
  '26':
  - type: text
    content: 'They '
  - type: note
    content: ch. 20:11; [Eccles. 9:2]
  - type: text
    content: lie down alike in the dust,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 14:11
  - type: text
    content: the worms cover them.
  '27':
  - type: text
    content: “Behold, I know your thoughts
  - type: text
    content: and your schemes to wrong me.
  '28':
  - type: text
    content: 'For you say, '
  - type: note
    content: '[ch. 20:6, 7]'
  - type: text
    content: ‘Where is the house of the prince?
  - type: text
    content: 'Where is '
  - type: note
    content: '[ch. 8:22; 15:34]'
  - type: text
    content: the tent in which the wicked lived?’
  '29':
  - type: text
    content: Have you not asked those who travel the roads,
  - type: text
    content: and do you not accept their testimony
  '3':
  - type: text
    content: Bear with me, and I will speak,
  - type: text
    content: 'and after I have spoken, '
  - type: note
    content: '[ch. 16:10, 20; 17:2]'
  - type: text
    content: mock on.
  '30':
  - type: text
    content: 'that '
  - type: note
    content: '[Prov. 16:4; 2 Pet. 2:9]'
  - type: text
    content: the evil man is spared in the day of calamity,
  - type: text
    content: that he is rescued in the day of wrath?
  '31':
  - type: text
    content: 'Who declares his way '
  - type: note
    content: Deut. 7:10; Hos. 5:5; Gal. 2:11
  - type: text
    content: to his face,
  - type: text
    content: 'and who '
  - type: note
    content: Deut. 7:10
  - type: text
    content: repays him for what he has done?
  '32':
  - type: text
    content: 'When he is '
  - type: note
    content: ch. 10:19
  - type: text
    content: carried to the grave,
  - type: text
    content: watch is kept over his tomb.
  '33':
  - type: text
    content: ' '
  - type: note
    content: ch. 38:38
  - type: text
    content: The clods of the valley are sweet to him;
  - type: note
    content: '[ch. 30:23; Heb. 9:27 ]'
  - type: text
    content: all mankind follows after him,
  - type: text
    content: and those who go before him are innumerable.
  '34':
  - type: text
    content: How then will you comfort me with empty nothings?
  - type: text
    content: There is nothing left of your answers but falsehood.”
  '4':
  - type: text
    content: 'As for me, is my '
  - type: note
    content: ch. 10:1; 23:2
  - type: text
    content: complaint against man?
  - type: text
    content: Why should I not be impatient?
  '5':
  - type: text
    content: Look at me and be appalled,
  - type: text
    content: 'and '
  - type: note
    content: ch. 29:9; 40:4; Judg. 18:19
  - type: text
    content: lay your hand over your mouth.
  '6':
  - type: text
    content: When I remember, I am dismayed,
  - type: text
    content: and shuddering seizes my flesh.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:6; Ps. 17:14; 37:1, 35; 73:3, 5; 92:7; Eccles. 8:14; Jer. 12:1, 2; Hab. 1:13, 16; Mal. 3:14, 15
  - type: text
    content: Why do the wicked live,
  - type: text
    content: reach old age, and grow mighty in power?
  '8':
  - type: text
    content: 'Their '
  - type: note
    content: '[ch. 5:25]'
  - type: text
    content: offspring are established in their presence,
  - type: text
    content: and their descendants before their eyes.
  '9':
  - type: text
    content: 'Their houses are '
  - type: note
    content: '[ch. 5:24]'
  - type: text
    content: safe from fear,
  - type: text
    content: 'and '
  - type: note
    content: See ch. 9:34
  - type: text
    content: no rod of God is upon them.
