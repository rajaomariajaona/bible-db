document_id: 1SA.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Samuel
  - type: text
    content: 'There was a certain man of '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'Ramathaim-zophim of '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim whose name was Elkanah the son of Jeroham, son of Elihu, son of Tohu, son of Zuph, '
  - type: note
    content: '[1 Kgs. 11:26]'
  - type: text
    content: 'an Ephrathite. '
  '10':
  - type: text
    content: 'She was '
  - type: note
    content: Job 7:11; 10:1
  - type: text
    content: 'deeply distressed and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and wept bitterly. '
  '11':
  - type: text
    content: 'And she '
  - type: note
    content: Gen. 28:20; Judg. 11:30
  - type: text
    content: 'vowed a vow and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, if you will indeed '
  - type: note
    content: Gen. 29:32
  - type: text
    content: 'look on the affliction of your servant and '
  - type: note
    content: ver. 19; [Gen. 30:22]
  - type: text
    content: 'remember me and not forget your servant, but will give to your servant a son, then I will give him to the '
  - type: text
    content: Lord
  - type: text
    content: ' all the days of his life, '
  - type: note
    content: Judg. 13:5; [Num. 6:5]
  - type: text
    content: and no razor shall touch his head.”
  '12':
  - type: text
    content: 'As she continued praying before the '
  - type: text
    content: Lord
  - type: text
    content: ', Eli observed her mouth. '
  '13':
  - type: text
    content: 'Hannah was speaking in her heart; only her lips moved, and her voice was not heard. Therefore Eli took her to be a drunken woman. '
  '14':
  - type: text
    content: 'And Eli said to her, “How long will you go on being drunk? Put your wine away from you.” '
  '15':
  - type: text
    content: 'But Hannah answered, “No, my lord, I am a woman troubled in spirit. I have drunk neither wine nor strong drink, but '
  - type: note
    content: Job 30:16; Ps. 42:4; Lam. 2:19; [Ps. 62:8]
  - type: text
    content: 'I have been pouring out my soul before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Do not regard your servant as '
  - type: note
    content: ch. 2:12; Judg. 19:22
  - type: text
    content: 'a worthless woman, for all along I have been speaking out of my great anxiety and vexation.” '
  '17':
  - type: text
    content: 'Then Eli answered, '
  - type: note
    content: ch. 20:42; Judg. 18:6; 2 Kgs. 5:19; Mark 5:34
  - type: text
    content: '“Go in peace, and the God of Israel '
  - type: note
    content: Ps. 20:4, 5
  - type: text
    content: 'grant your petition that you have made to him.” '
  '18':
  - type: text
    content: 'And she said, '
  - type: note
    content: Gen. 33:15; Ruth 2:13
  - type: text
    content: '“Let your servant find favor in your eyes.” Then the woman '
  - type: note
    content: '[Eccles. 9:7]'
  - type: text
    content: went her way and ate, and her face was no longer sad.
  '19':
  - type: text
    content: 'They rose early in the morning and worshiped before the '
  - type: text
    content: Lord
  - type: text
    content: '; then they went back to their house at '
  - type: note
    content: ch. 2:11; [ver. 1]
  - type: text
    content: 'Ramah. And Elkanah knew Hannah his wife, and the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 11
  - type: text
    content: 'remembered her. '
  '2':
  - type: text
    content: He had two wives. The name of the one was Hannah, and the name of the other, Peninnah. And Peninnah had children, but Hannah had no children.
  '20':
  - type: text
    content: 'And in due time Hannah conceived and bore a son, and she called his name Samuel, for she said, “I have asked for him from the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: note
    content: Samuel sounds like the Hebrew for heard of God
  - type: heading
    content: Samuel Given to the Lord
  '21':
  - type: text
    content: 'The man Elkanah and all his house '
  - type: note
    content: ver. 3
  - type: text
    content: 'went up to offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' the yearly sacrifice and to pay his vow. '
  '22':
  - type: text
    content: 'But Hannah did not go up, for she said to her husband, “As soon as the child is weaned, I will bring him, so that he may appear in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 11, 28; [ch. 2:11, 18; 3:1]
  - type: text
    content: 'and dwell there forever.” '
  '23':
  - type: note
    content: '[Num. 30:7]'
  - type: text
    content: 'Elkanah her husband said to her, “Do what seems best to you; wait until you have weaned him; '
  - type: note
    content: 2 Sam. 7:25
  - type: text
    content: 'only, may the '
  - type: text
    content: Lord
  - type: text
    content: ' establish his word.” So the woman remained and nursed her son until she weaned him. '
  '24':
  - type: text
    content: 'And when she had weaned him, '
  - type: note
    content: Deut. 12:5, 6, 11
  - type: text
    content: she took him up with her, along with a three-year-old bull,
  - type: note
    content: Dead Sea Scroll, Septuagint, Syriac; Masoretic Text three bulls
  - type: text
    content: ' an ephah'
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of flour, and a skin of wine, and she brought him to '
  - type: note
    content: ver. 3, 9; [Josh. 18:1]
  - type: text
    content: 'the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Shiloh. And the child was young. '
  '25':
  - type: text
    content: 'Then they slaughtered the bull, and they brought the child to Eli. '
  '26':
  - type: text
    content: 'And she said, “Oh, my lord! '
  - type: note
    content: ch. 17:55; 20:3; 2 Sam. 11:11; 2 Kgs. 2:2, 4, 6; 4:30
  - type: text
    content: 'As you live, my lord, I am the woman who was standing here in your presence, praying to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'For this child I prayed, '
  - type: note
    content: ver. 17; [Ps. 6:9]
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' has granted me my petition that I made to him. '
  '28':
  - type: text
    content: 'Therefore I have lent him to the '
  - type: text
    content: Lord
  - type: text
    content: '. As long as he lives, he is lent to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: note
    content: Gen. 24:26, 52
  - type: text
    content: 'And he worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' there.'
  '3':
  - type: text
    content: 'Now this man used to go up '
  - type: note
    content: ver. 21; Ex. 23:14; Deut. 16:16; [Luke 2:41]
  - type: text
    content: 'year by year from his city '
  - type: note
    content: See Deut. 12:5-7
  - type: text
    content: 'to worship and to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts '
  - type: note
    content: '[Josh. 18:1]'
  - type: text
    content: 'at Shiloh, where the two sons of Eli, Hophni and Phinehas, were priests of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'On the day when Elkanah sacrificed, '
  - type: note
    content: Deut. 12:17, 18; 16:11; [Neh. 8:10, 12]
  - type: text
    content: 'he would give portions to Peninnah his wife and to all her sons and daughters. '
  '5':
  - type: text
    content: 'But to Hannah he gave a double portion, because he loved her, though the '
  - type: text
    content: Lord
  - type: text
    content: ' had closed her womb.'
  - type: note
    content: Syriac; the meaning of the Hebrew is uncertain. Septuagint And, although he loved Hannah, he would give Hannah only one portion, because the Lord had closed her womb
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And her rival used to provoke her grievously to irritate her, because the '
  - type: text
    content: Lord
  - type: text
    content: ' had closed her womb. '
  '7':
  - type: text
    content: 'So it went on year by year. As often as she went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', she used to provoke her. Therefore Hannah wept and would not eat. '
  '8':
  - type: text
    content: 'And Elkanah, her husband, said to her, “Hannah, why do you weep? And why do you not eat? And why is your heart sad? '
  - type: note
    content: Ruth 4:15
  - type: text
    content: Am I not more to you than ten sons?”
  '9':
  - type: text
    content: 'After they had eaten and drunk in Shiloh, Hannah rose. Now Eli the priest was sitting on the seat beside the doorpost of '
  - type: note
    content: ch. 3:3
  - type: text
    content: 'the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
