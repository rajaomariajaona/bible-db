verses:
  '1':
  - type: heading
    content: Restore Us, O God
  - type: text
    content: 'To the choirmaster: according to '
  - type: note
    content: Ps. 60, title
  - type: text
    content: 'Lilies. A Testimony. Of '
  - type: note
    content: Ps. 50, title
  - type: text
    content: Asaph, a Psalm.
  - type: text
    content: Give ear, O Shepherd of Israel,
  - type: text
    content: 'you who lead '
  - type: note
    content: Ps. 78:67; 81:5
  - type: text
    content: 'Joseph like '
  - type: note
    content: '[Ps. 95:7]; See Ps. 77:20'
  - type: text
    content: a flock.
  - type: text
    content: 'You who are '
  - type: note
    content: Ps. 99:1; Ex. 25:22; 1 Sam. 4:4; 2 Sam. 6:2
  - type: text
    content: 'enthroned upon the cherubim, '
  - type: note
    content: See Ps. 50:2
  - type: text
    content: shine forth.
  '10':
  - type: text
    content: The mountains were covered with its shade,
  - type: text
    content: the mighty cedars with its branches.
  '11':
  - type: text
    content: 'It sent out its branches to '
  - type: note
    content: See Ps. 72:8
  - type: text
    content: the sea
  - type: text
    content: 'and its shoots to '
  - type: note
    content: See Ps. 72:8
  - type: text
    content: the River.
  - type: note
    content: That is, the Euphrates
  '12':
  - type: text
    content: 'Why then have you '
  - type: note
    content: Ps. 89:40; Isa. 5:5
  - type: text
    content: broken down its walls,
  - type: text
    content: so that all who pass along the way pluck its fruit?
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 5:6 ]'
  - type: text
    content: The boar from the forest ravages it,
  - type: text
    content: and all that move in the field feed on it.
  '14':
  - type: text
    content: Turn again, O God of hosts!
  - type: note
    content: '[ Isa. 63:15 ]'
  - type: text
    content: Look down from heaven, and see;
  - type: text
    content: have regard for this vine,
  '15':
  - type: text
    content: the stock that your right hand planted,
  - type: text
    content: and for the son whom you made strong for yourself.
  '16':
  - type: text
    content: 'They have '
  - type: note
    content: Isa. 33:12
  - type: text
    content: 'burned it with fire; they have '
  - type: note
    content: Isa. 33:12
  - type: text
    content: cut it down;
  - type: text
    content: 'may they perish at '
  - type: note
    content: Ps. 76:6; [Ps. 39:11]
  - type: text
    content: the rebuke of your face!
  '17':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 89:21
  - type: text
    content: let your hand be on the man of your right hand,
  - type: text
    content: the son of man whom you have made strong for yourself!
  '18':
  - type: text
    content: Then we shall not turn back from you;
  - type: note
    content: See Ps. 71:20
  - type: text
    content: give us life, and we will call upon your name!
  '19':
  - type: text
    content: ' '
  - type: note
    content: ver. 3, 7
  - type: text
    content: 'Restore us, O '
  - type: text
    content: Lord
  - type: text
    content: ' God of hosts!'
  - type: text
    content: Let your face shine, that we may be saved!
  '2':
  - type: text
    content: 'Before '
  - type: note
    content: See Num. 2:18-24
  - type: text
    content: Ephraim and Benjamin and Manasseh,
  - type: note
    content: See Ps. 35:23
  - type: text
    content: stir up your might
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 118:14, 21]'
  - type: text
    content: come to save us!
  '3':
  - type: text
    content: ' '
  - type: note
    content: ver. 19 ; Ps. 60:1; 85:4; Lam. 5:21
  - type: text
    content: Restore us,
  - type: note
    content: Or Turn us again; also verses 7, 19
  - type: text
    content: ' O God;'
  - type: note
    content: Num. 6:25; See Ps. 4:6
  - type: text
    content: let your face shine, that we may be saved!
  '4':
  - type: text
    content: 'O '
  - type: note
    content: See Ps. 59:5
  - type: text
    content: Lord
  - type: text
    content: ' God of hosts,'
  - type: note
    content: '[ Ps. 74:10; 79:5 ]'
  - type: text
    content: how long will you be angry with your people’s prayers?
  '5':
  - type: text
    content: 'You have fed them with '
  - type: note
    content: Ps. 42:3; 102:9; [1 Kgs. 22:27; Isa. 30:20]
  - type: text
    content: the bread of tears
  - type: text
    content: and given them tears to drink in full measure.
  '6':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 44:13
  - type: text
    content: 'You make us an object of contention for our '
  - type: note
    content: See Ps. 44:13
  - type: text
    content: neighbors,
  - type: text
    content: and our enemies laugh among themselves.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: Restore us, O God of hosts;
  - type: text
    content: let your face shine, that we may be saved!
  '8':
  - type: text
    content: 'You brought '
  - type: note
    content: Isa. 5:1; 27:2; Jer. 2:21; 12:10; Ezek. 17:6; Matt. 21:33; Mark 12:1; Luke 20:9
  - type: text
    content: a vine out of Egypt;
  - type: text
    content: 'you '
  - type: note
    content: See Ps. 44:2
  - type: text
    content: drove out the nations and planted it.
  '9':
  - type: text
    content: 'You '
  - type: note
    content: '[Josh. 24:12]'
  - type: text
    content: cleared the ground for it;
  - type: text
    content: it took deep root and filled the land.
