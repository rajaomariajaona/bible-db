document_id: DEU.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Not Because of Righteousness
  - type: text
    content: '“Hear, O Israel: you are '
  - type: note
    content: ch. 11:31; 12:10; Josh. 1:11
  - type: text
    content: 'to cross over the Jordan today, to go in to dispossess nations '
  - type: note
    content: See ch. 4:38
  - type: text
    content: 'greater and mightier than you, cities great and fortified up to heaven, '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 31:18
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me the two tablets of stone written with the finger of God, and on them were all the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken with you on the mountain out of the midst of the fire '
  - type: note
    content: ch. 4:10; 10:4; 18:16; Ex. 19:17
  - type: text
    content: 'on the day of the assembly. '
  '11':
  - type: text
    content: 'And at the end of forty days and forty nights the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me the two tablets of stone, the tablets of the covenant. '
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Ex. 32:7, 8
  - type: text
    content: '‘Arise, go down quickly from here, for your people whom you have brought from Egypt have acted corruptly. They have '
  - type: note
    content: '[ch. 31:29; Judg. 2:17]'
  - type: text
    content: turned aside quickly out of the way that I commanded them; they have made themselves a metal image.’
  - type: heading
    content: The Golden Calf
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex. 32:9
  - type: text
    content: '“Furthermore, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘I have seen this people, and behold, it is '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'a stubborn people. '
  '14':
  - type: note
    content: Ex. 32:10
  - type: text
    content: 'Let me alone, that I may destroy them and '
  - type: note
    content: ch. 7:24; 25:19; 29:20; Ex. 17:14
  - type: text
    content: 'blot out their name from under heaven. And '
  - type: note
    content: Num. 14:12
  - type: text
    content: 'I will make of you a nation mightier and greater than they.’ '
  '15':
  - type: note
    content: Ex. 32:15
  - type: text
    content: 'So I turned and came down from the mountain, and '
  - type: note
    content: ch. 4:11; 5:23; Ex. 19:18
  - type: text
    content: 'the mountain was burning with fire. And the two tablets of the covenant were in my two hands. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 32:19
  - type: text
    content: 'I looked, and behold, you had sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You had made yourselves a golden'
  - type: note
    content: Hebrew cast metal
  - type: text
    content: ' calf. '
  - type: note
    content: '[ch. 31:29; Judg. 2:17]'
  - type: text
    content: 'You had turned aside quickly from the way that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded you. '
  '17':
  - type: text
    content: 'So I took hold of the two tablets and threw them out of my two hands and broke them before your eyes. '
  '18':
  - type: text
    content: 'Then I '
  - type: note
    content: Ex. 34:28; [Ps. 106:23]
  - type: text
    content: 'lay prostrate before the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 9; ch. 10:10
  - type: text
    content: 'as before, forty days and forty nights. I neither ate bread nor drank water, because of all the sin that you had committed, '
  - type: note
    content: ch. 4:25
  - type: text
    content: 'in doing what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' to provoke him to anger. '
  '19':
  - type: text
    content: 'For I was afraid of the anger and hot displeasure that the '
  - type: text
    content: Lord
  - type: text
    content: ' bore against you, so that he was ready to destroy you. '
  - type: note
    content: ch. 10:10; Ex. 32:14; 33:17
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to me that time also. '
  '2':
  - type: text
    content: 'a people great and tall, '
  - type: note
    content: See Num. 13:22
  - type: text
    content: 'the sons of the Anakim, '
  - type: note
    content: ch. 1:28
  - type: text
    content: 'whom you know, and of whom you have heard it said, ‘Who can stand before the sons of Anak?’ '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was so angry with Aaron that he was ready to destroy him. And I prayed for Aaron also at the same time. '
  '21':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 32:20
  - type: text
    content: I took the sinful thing, the calf that you had made, and burned it with fire and crushed it, grinding it very small, until it was as fine as dust. And I threw the dust of it into the brook that ran down from the mountain.
  '22':
  - type: text
    content: '“At '
  - type: note
    content: Num. 11:1-3
  - type: text
    content: 'Taberah also, and at '
  - type: note
    content: Ex. 17:7
  - type: text
    content: 'Massah and at '
  - type: note
    content: Num. 11:34
  - type: text
    content: 'Kibroth-hattaavah you provoked the '
  - type: text
    content: Lord
  - type: text
    content: ' to wrath. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: Num. 13:3; 14:1-4
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' sent you from Kadesh-barnea, saying, ‘Go up and take possession of the land that I have given you,’ then you rebelled against the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and '
  - type: note
    content: Ps. 106:24, 25
  - type: text
    content: 'did not believe him or obey his voice. '
  '24':
  - type: note
    content: ver. 7; ch. 31:27
  - type: text
    content: 'You have been rebellious against the '
  - type: text
    content: Lord
  - type: text
    content: ' from the day that I knew you.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: '“So I lay prostrate before the '
  - type: text
    content: Lord
  - type: text
    content: ' for these forty days and forty nights, because the '
  - type: text
    content: Lord
  - type: text
    content: ' had said he would destroy you. '
  '26':
  - type: note
    content: See Ex. 32:11-13
  - type: text
    content: 'And I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘O Lord '
  - type: text
    content: God
  - type: text
    content: ', do not destroy your people and your heritage, whom you have redeemed through your greatness, whom you have brought out of Egypt with a mighty hand. '
  '27':
  - type: text
    content: 'Remember your servants, Abraham, Isaac, and Jacob. Do not regard the stubbornness of this people, or their wickedness or their sin, '
  '28':
  - type: text
    content: 'lest the land from which you brought us say, '
  - type: note
    content: Num. 14:16
  - type: text
    content: '“Because the '
  - type: text
    content: Lord
  - type: text
    content: ' was not able to bring them into the land that he promised them, and because he hated them, he has brought them out to put them to death in the wilderness.” '
  '29':
  - type: note
    content: ch. 4:20; 1 Kgs. 8:51; Neh. 1:10; [Ps. 95:7]
  - type: text
    content: For they are your people and your heritage, whom you brought out by your great power and by your outstretched arm.’
  '3':
  - type: text
    content: 'Know therefore today that he who '
  - type: note
    content: ch. 31:3; [Josh. 3:11]
  - type: text
    content: 'goes over before you '
  - type: note
    content: See ch. 4:24
  - type: text
    content: 'as a consuming fire is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. He will destroy them and subdue them before you. '
  - type: note
    content: ch. 7:24; Ex. 23:29-31
  - type: text
    content: 'So you shall drive them out and make them perish quickly, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised you.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:17 ]'
  - type: text
    content: '“Do not say in your heart, after the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has thrust them out before you, ‘It is because of my righteousness that the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought me in to possess this land,’ whereas it is '
  - type: note
    content: ch. 18:12; Lev. 18:24, 25; 20:23; [ch. 20:18]
  - type: text
    content: 'because of the wickedness of these nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' is driving them out before you. '
  '5':
  - type: note
    content: '[Titus 3:5]'
  - type: text
    content: 'Not because of your righteousness or the uprightness of your heart are you going in to possess their land, but because of the wickedness of these nations the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is driving them out from before you, and that he may confirm '
  - type: note
    content: See Gen. 50:24
  - type: text
    content: 'the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to your fathers, to Abraham, to Isaac, and to Jacob.'
  '6':
  - type: text
    content: '“Know, therefore, that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is not giving you this good land to possess because of your righteousness, for you are '
  - type: note
    content: ch. 10:16
  - type: text
    content: 'a stubborn people. '
  '7':
  - type: text
    content: 'Remember and do not forget how you provoked the '
  - type: text
    content: Lord
  - type: text
    content: ' your God to wrath in the wilderness. '
  - type: note
    content: ver. 24; ch. 31:27; [Ex. 14:11; 15:24; 16:2; 17:2; Num. 11:4; 14:2, 11, 41; 20:2; 21:5; 25:2]
  - type: text
    content: 'From the day you came out of the land of Egypt until you came to this place, you have been rebellious against the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Even '
  - type: note
    content: Ex. 32:4; Ps. 106:19
  - type: text
    content: 'at Horeb you provoked the '
  - type: text
    content: Lord
  - type: text
    content: ' to wrath, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was so angry with you that he was ready to destroy you. '
  '9':
  - type: note
    content: Ex. 24:12, 15
  - type: text
    content: 'When I went up the mountain to receive the tablets of stone, the tablets of the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' made with you, I remained on the mountain '
  - type: note
    content: Ex. 24:18; 34:28; [1 Kgs. 19:8; Matt. 4:2; Luke 4:1, 2]
  - type: text
    content: 'forty days and forty nights. I neither ate bread nor drank water. '
