document_id: ACT.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Stephen’s Speech
  - type: text
    content: 'And the high priest said, “Are these things so?” '
  '10':
  - type: text
    content: 'and rescued him out of all his afflictions and '
  - type: note
    content: Gen. 41:37-40
  - type: text
    content: 'gave him favor and wisdom before Pharaoh, king of Egypt, '
  - type: note
    content: Gen. 41:41, 43, 46; 42:6; Ps. 105:21
  - type: text
    content: 'who made him ruler over Egypt and over all his household. '
  '11':
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 41:54, 55; 42:5; Ps. 105:16
  - type: text
    content: 'there came a famine throughout all Egypt and Canaan, and great affliction, and our fathers could find no food. '
  '12':
  - type: note
    content: Gen. 42:1-3
  - type: text
    content: 'But when Jacob heard that there was grain in Egypt, he sent out our fathers on their first visit. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 43:2-15
  - type: text
    content: 'on the second visit '
  - type: note
    content: Gen. 45:1-4
  - type: text
    content: 'Joseph made himself known to his brothers, and '
  - type: note
    content: Gen. 45:16
  - type: text
    content: 'Joseph’s family became known to Pharaoh. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 45:9, 10, 27
  - type: text
    content: 'Joseph sent and summoned Jacob his father and all his kindred, '
  - type: note
    content: '[Gen. 46:26, 27; Ex. 1:5; Deut. 10:22]'
  - type: text
    content: 'seventy-five persons in all. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 46:5, 28; Ps. 105:23
  - type: text
    content: 'Jacob went down into Egypt, and '
  - type: note
    content: Gen. 49:33
  - type: text
    content: 'he died, he '
  - type: note
    content: Ex. 1:6
  - type: text
    content: 'and our fathers, '
  '16':
  - type: text
    content: 'and '
  - type: note
    content: Gen. 50:25; Ex. 13:19; Josh. 24:32
  - type: text
    content: 'they were carried back to Shechem and laid in the tomb that '
  - type: note
    content: '[Gen. 23:16 with Gen. 33:19; Josh. 24:32]'
  - type: text
    content: Abraham had bought for a sum of silver from the sons of Hamor in Shechem.
  '17':
  - type: text
    content: '“But '
  - type: note
    content: ver. 5-7
  - type: text
    content: 'as the time of the promise drew near, which God had granted to Abraham, '
  - type: note
    content: ch. 13:17; Ex. 1:7, 12; Ps. 105:24
  - type: text
    content: 'the people increased and multiplied in Egypt '
  '18':
  - type: text
    content: 'until there arose over Egypt another king '
  - type: note
    content: Cited from Ex. 1:8
  - type: text
    content: 'who did not know Joseph. '
  '19':
  - type: note
    content: Ex. 1:9, 10; Ps. 105:25
  - type: text
    content: 'He dealt shrewdly with our race and forced our fathers to expose their infants, '
  - type: note
    content: Ex. 1:16-18, 22
  - type: text
    content: 'so that they would not be kept alive. '
  '2':
  - type: text
    content: 'And Stephen said:'
  - type: note
    content: ch. 22:1
  - type: text
    content: '“Brothers and fathers, hear me. '
  - type: note
    content: '[Gen. 15:7; Josh. 24:3; Neh. 9:7]'
  - type: text
    content: 'The God '
  - type: note
    content: Ps. 29:3; [1 Cor. 2:8; James 2:1]
  - type: text
    content: 'of glory appeared to our father Abraham when he was in Mesopotamia, '
  - type: note
    content: Gen. 11:31
  - type: text
    content: 'before he lived in Haran, '
  '20':
  - type: note
    content: Ex. 2:2; Heb. 11:23
  - type: text
    content: 'At this time Moses was born; and he was beautiful in God’s sight. And he was brought up for three months in his father’s house, '
  '21':
  - type: text
    content: 'and '
  - type: note
    content: Ex. 2:3-10
  - type: text
    content: 'when he was exposed, Pharaoh’s daughter adopted him and brought him up as her own son. '
  '22':
  - type: text
    content: 'And Moses '
  - type: note
    content: '[Dan. 1:4, 17]'
  - type: text
    content: 'was instructed in '
  - type: note
    content: 1 Kgs. 4:30; [Isa. 19:11]
  - type: text
    content: 'all the wisdom of the Egyptians, and he was '
  - type: note
    content: '[Luke 24:19]'
  - type: text
    content: mighty in his words and deeds.
  '23':
  - type: text
    content: '“When he was forty years old, it came into his heart '
  - type: note
    content: Ex. 2:11, 12
  - type: text
    content: 'to visit his brothers, the children of Israel. '
  '24':
  - type: text
    content: 'And seeing one of them being wronged, he defended the oppressed man and avenged him by striking down the Egyptian. '
  '25':
  - type: text
    content: 'He supposed that his brothers would understand that God was giving them salvation by his hand, but they did not understand. '
  '26':
  - type: note
    content: Ex. 2:13, 14
  - type: text
    content: 'And on the following day he appeared to them as they were quarreling and tried to reconcile them, saying, ‘Men, you are brothers. Why do you wrong each other?’ '
  '27':
  - type: text
    content: 'But the man who was wronging his neighbor thrust him aside, saying, '
  - type: note
    content: ver. 35; [Luke 12:14]
  - type: text
    content: '‘Who made you a ruler and a judge over us? '
  '28':
  - type: text
    content: 'Do you want to kill me as you killed the Egyptian yesterday?’ '
  '29':
  - type: text
    content: 'At this retort '
  - type: note
    content: Ex. 2:15
  - type: text
    content: 'Moses fled and became an exile in the land of Midian, '
  - type: note
    content: Ex. 2:22; 18:3, 4
  - type: text
    content: where he became the father of two sons.
  '3':
  - type: text
    content: 'and said to him, '
  - type: note
    content: Cited from Gen. 12:1
  - type: text
    content: '‘Go out from your land and from your kindred and go into the land that I will show you.’ '
  '30':
  - type: text
    content: '“Now when forty years had passed, '
  - type: note
    content: Ex. 3:2
  - type: text
    content: 'an angel appeared to him '
  - type: note
    content: '[Ex. 3:1]'
  - type: text
    content: 'in the wilderness of Mount Sinai, in a flame of fire in a bush. '
  '31':
  - type: text
    content: 'When Moses saw it, he was amazed at the sight, and as he drew near to look, there came the voice of the Lord: '
  '32':
  - type: note
    content: Cited from Ex. 3:6
  - type: text
    content: '‘I am the God of your fathers, the God of Abraham and of Isaac and of Jacob.’ And Moses trembled and did not dare to look. '
  '33':
  - type: text
    content: 'Then the Lord said to him, '
  - type: note
    content: Ex. 3:5; Josh. 5:15
  - type: text
    content: '‘Take off the sandals from your feet, for the place where you are standing is holy ground. '
  '34':
  - type: note
    content: Ex. 3:7
  - type: text
    content: 'I have surely seen the affliction of my people who are in Egypt, and '
  - type: note
    content: Ex. 2:24
  - type: text
    content: 'have heard their groaning, and '
  - type: note
    content: Ex. 3:8
  - type: text
    content: 'I have come down to deliver them. '
  - type: note
    content: Ex. 3:10
  - type: text
    content: And now come, I will send you to Egypt.’
  '35':
  - type: text
    content: '“This Moses, whom they rejected, '
  - type: note
    content: ver. 27
  - type: text
    content: 'saying, ‘Who made you a ruler and a judge?’—this man God sent as both ruler and redeemer '
  - type: note
    content: '[Ex. 3:2; 14:19; 23:20; Num. 20:16]'
  - type: text
    content: 'by the hand of the angel who appeared to him in the bush. '
  '36':
  - type: note
    content: Ex. 12:41; 33:1; Heb. 8:9
  - type: text
    content: 'This man led them out, performing '
  - type: note
    content: Ex. 7:3
  - type: text
    content: 'wonders and signs '
  - type: note
    content: Ex. 7–12; Ps. 78:43-51; 105:27-36
  - type: text
    content: 'in Egypt and '
  - type: note
    content: Ex. 14:21, 27-31; Ps. 78:53; 106:9
  - type: text
    content: 'at the Red Sea and '
  - type: note
    content: Ex. 16:1, 35; 17:1-6; Ps. 78:15
  - type: text
    content: 'in the wilderness for '
  - type: note
    content: ver. 42; ch. 13:18; Ex. 16:35; Num. 14:33, 34; Ps. 95:10; Heb. 3:9, 17
  - type: text
    content: 'forty years. '
  '37':
  - type: text
    content: 'This is the Moses who said to the Israelites, ‘God will raise up for you '
  - type: note
    content: ch. 3:22; Cited from Deut. 18:15
  - type: text
    content: 'a prophet like me from your brothers.’ '
  '38':
  - type: text
    content: 'This is the one '
  - type: note
    content: Ex. 19:3, 17, 18
  - type: text
    content: 'who was in the congregation in the wilderness with '
  - type: note
    content: '[ver. 53; Isa. 63:9]'
  - type: text
    content: 'the angel who spoke to him at Mount Sinai, and with our fathers. '
  - type: note
    content: Deut. 5:27, 31; 33:4; See John 1:17
  - type: text
    content: 'He received '
  - type: note
    content: '[Deut. 32:47]'
  - type: text
    content: 'living '
  - type: note
    content: Rom. 3:2; Heb. 5:12; 1 Pet. 4:11
  - type: text
    content: 'oracles to give to us. '
  '39':
  - type: text
    content: 'Our fathers refused to obey him, but thrust him aside, and '
  - type: note
    content: Ex. 16:3; Num. 11:4, 5; 14:3, 4; Ezek. 20:8, 24
  - type: text
    content: 'in their hearts they turned to Egypt, '
  '4':
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Then he went out from the land of the Chaldeans and lived in Haran. And '
  - type: note
    content: Gen. 11:32
  - type: text
    content: 'after his father died, '
  - type: note
    content: Gen. 12:4, 5
  - type: text
    content: 'God removed him from there into this land in which you are now living. '
  '40':
  - type: text
    content: 'saying to Aaron, '
  - type: note
    content: Cited from Ex. 32:1, 23
  - type: text
    content: '‘Make for us gods who will go before us. As for this Moses who led us out from the land of Egypt, we do not know what has become of him.’ '
  '41':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 32:4-6, 35; Deut. 9:16; Ps. 106:19
  - type: text
    content: 'they made a calf in those days, and offered a sacrifice to the idol and '
  - type: note
    content: Amos 6:13
  - type: text
    content: 'were rejoicing in '
  - type: note
    content: Isa. 2:8; Jer. 1:16; 25:6, 7
  - type: text
    content: 'the works of their hands. '
  '42':
  - type: text
    content: 'But '
  - type: note
    content: '[Josh. 24:20; Isa. 63:10]'
  - type: text
    content: 'God turned away and '
  - type: note
    content: Ps. 81:12; Ezek. 20:39; Rom. 1:28
  - type: text
    content: 'gave them over to worship '
  - type: note
    content: Deut. 4:19; 2 Kgs. 17:16; 21:3; 23:5; Jer. 19:13; Zeph. 1:5
  - type: text
    content: 'the host of heaven, as it is written in the book of the prophets:'
  - type: note
    content: Cited from Amos 5:25-27
  - type: text
    content: “‘Did you bring to me slain beasts and sacrifices,
  - type: note
    content: See ver. 36
  - type: text
    content: during the forty years in the wilderness, O house of Israel?
  '43':
  - type: text
    content: 'You took up the tent of '
  - type: note
    content: See 1 Kgs. 11:7
  - type: text
    content: Moloch
  - type: text
    content: and the star of your god Rephan,
  - type: text
    content: the images that you made to worship;
  - type: text
    content: and I will send you into exile beyond Babylon.’
  '44':
  - type: text
    content: '“Our fathers had '
  - type: note
    content: Rev. 15:5; See Ex. 38:21
  - type: text
    content: 'the tent of witness in the wilderness, just as he who spoke to Moses '
  - type: note
    content: See Ex. 25:40
  - type: text
    content: 'directed him to make it, according to the pattern that he had seen. '
  '45':
  - type: text
    content: 'Our fathers in turn '
  - type: note
    content: Josh. 3:14-17
  - type: text
    content: 'brought it in with Joshua when they '
  - type: note
    content: Num. 32:5; Deut. 32:49
  - type: text
    content: 'dispossessed the nations '
  - type: note
    content: ch. 13:19; Josh. 3:10; 23:9; 24:18; 2 Chr. 20:7
  - type: text
    content: 'that God drove out before our fathers. So it was '
  - type: note
    content: 2 Sam. 7:1
  - type: text
    content: 'until the days of David, '
  '46':
  - type: note
    content: ch. 13:22; 1 Sam. 16:1; Ps. 89:19
  - type: text
    content: 'who found favor in the sight of God and '
  - type: note
    content: 1 Kgs. 8:17; 1 Chr. 22:7; Ps. 132:5
  - type: text
    content: 'asked to find a dwelling place for '
  - type: note
    content: '[Gen. 49:24; Isa. 49:26]'
  - type: text
    content: the God of Jacob.
  - type: note
    content: Some manuscripts for the house of Jacob
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'But it was '
  - type: note
    content: 2 Sam. 7:13; 1 Kgs. 6:1, 2; 8:20; 2 Chr. 3:1
  - type: text
    content: 'Solomon who built a house for him. '
  '48':
  - type: note
    content: '[1 Kgs. 8:27; 2 Chr. 2:6]'
  - type: text
    content: 'Yet the Most High does not dwell '
  - type: note
    content: ch. 17:24
  - type: text
    content: in houses made by hands, as the prophet says,
  '49':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 11:4 ]'
  - type: text
    content: “‘Heaven is my throne,
  - type: note
    content: Matt. 5:34, 35; Cited from Isa. 66:1, 2
  - type: text
    content: and the earth is my footstool.
  - type: text
    content: What kind of house will you build for me, says the Lord,
  - type: text
    content: or what is the place of my rest?
  '5':
  - type: text
    content: 'Yet he gave him no inheritance in it, not even a foot’s length, but promised '
  - type: note
    content: Gen. 12:7; 13:15; 15:18; 17:8; 48:4; Heb. 11:8, 9
  - type: text
    content: 'to give it to him as a possession and to his offspring after him, '
  - type: note
    content: Gen. 15:3; 18:10
  - type: text
    content: 'though he had no child. '
  '50':
  - type: text
    content: Did not my hand make all these things?’
  '51':
  - type: text
    content: ' '
  - type: note
    content: Deut. 10:16; See Ex. 32:9
  - type: text
    content: '“You stiff-necked people, '
  - type: note
    content: Lev. 26:41; Jer. 6:10; 9:26; Ezek. 44:7, 9
  - type: text
    content: 'uncircumcised in heart and ears, you always resist the Holy Spirit. '
  - type: note
    content: Mal. 3:7
  - type: text
    content: 'As your fathers did, so do you. '
  '52':
  - type: note
    content: 1 Kgs. 19:10; 2 Chr. 36:16; Jer. 2:30; Matt. 23:31, 37; See Matt. 5:12; 21:35
  - type: text
    content: 'Which of the prophets did your fathers not persecute? And they killed those who announced beforehand the coming of '
  - type: note
    content: See ch. 3:14
  - type: text
    content: 'the Righteous One, '
  - type: note
    content: See ch. 5:28
  - type: text
    content: 'whom you have now betrayed and murdered, '
  '53':
  - type: text
    content: 'you who received the law '
  - type: note
    content: Gal. 3:19; Heb. 2:2; [ver. 38; Deut. 33:2]
  - type: text
    content: 'as delivered by angels and '
  - type: note
    content: John 7:19
  - type: text
    content: did not keep it.”
  - type: heading
    content: The Stoning of Stephen
  '54':
  - type: text
    content: 'Now when they heard these things '
  - type: note
    content: ch. 5:33; [ch. 2:37]
  - type: text
    content: 'they were enraged, and they '
  - type: note
    content: Job 16:9; Ps. 35:16; 37:12
  - type: text
    content: 'ground their teeth at him. '
  '55':
  - type: text
    content: 'But he, '
  - type: note
    content: ch. 6:5
  - type: text
    content: 'full of the Holy Spirit, gazed into heaven and saw '
  - type: note
    content: Ex. 24:16; Luke 2:9; John 12:41
  - type: text
    content: 'the glory of God, and Jesus standing '
  - type: note
    content: Ps. 110:1; See Mark 16:19
  - type: text
    content: 'at the right hand of God. '
  '56':
  - type: text
    content: 'And he said, “Behold, I see '
  - type: note
    content: See John 1:51
  - type: text
    content: 'the heavens opened, and '
  - type: note
    content: See Dan. 7:13
  - type: text
    content: 'the Son of Man standing '
  - type: note
    content: '[See ver. 55above]'
  - type: text
    content: 'at the right hand of God.” '
  '57':
  - type: text
    content: But they cried out with a loud voice and stopped their ears and rushed together
  - type: note
    content: Or rushed with one mind
  - type: text
    content: ' at him. '
  '58':
  - type: text
    content: 'Then '
  - type: note
    content: Lev. 24:14-16; Num. 15:35; 1 Kgs. 21:13; [Luke 4:29; Heb. 13:12]
  - type: text
    content: 'they cast him out of the city and '
  - type: note
    content: Matt. 21:35; 23:37; Heb. 11:37
  - type: text
    content: 'stoned him. And '
  - type: note
    content: ch. 6:13; [Deut. 13:9, 10; 17:7]
  - type: text
    content: 'the witnesses laid down their garments '
  - type: note
    content: ch. 8:1; 22:20; [ch. 22:4]
  - type: text
    content: 'at the feet of a young man named Saul. '
  '59':
  - type: text
    content: 'And as they were stoning Stephen, '
  - type: note
    content: ch. 9:14
  - type: text
    content: 'he called out, “Lord Jesus, '
  - type: note
    content: Ps. 31:5; Luke 23:46
  - type: text
    content: 'receive my spirit.” '
  '6':
  - type: text
    content: 'And God spoke to this effect—that '
  - type: note
    content: Cited from Gen. 15:13, 14
  - type: text
    content: 'his offspring would '
  - type: note
    content: '[Ex. 2:22; Heb. 11:9]'
  - type: text
    content: 'be sojourners in a land belonging to others, who would enslave them and afflict them '
  - type: note
    content: ver. 17; See Ex. 12:40
  - type: text
    content: 'four hundred years. '
  '60':
  - type: text
    content: 'And '
  - type: note
    content: ch. 9:40; 20:36; 21:5; Luke 22:41; Eph. 3:14
  - type: text
    content: 'falling to his knees he cried out with a loud voice, '
  - type: note
    content: See Matt. 5:44
  - type: text
    content: '“Lord, do not hold this sin against them.” And when he had said this, '
  - type: note
    content: See Matt. 27:52
  - type: text
    content: he fell asleep.
  '7':
  - type: text
    content: '‘But '
  - type: note
    content: '[Jer. 25:12; 30:20]'
  - type: text
    content: 'I will judge the nation that they serve,’ said God, ‘and after that they shall come out '
  - type: note
    content: '[Ex. 3:12]'
  - type: text
    content: 'and worship me in this place.’ '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 17:9-12
  - type: text
    content: 'he gave him the covenant of circumcision. And '
  - type: note
    content: Gen. 21:2-4
  - type: text
    content: 'so Abraham became the father of Isaac, and '
  - type: note
    content: See Luke 1:59
  - type: text
    content: 'circumcised him on the eighth day, and '
  - type: note
    content: Gen. 25:26
  - type: text
    content: 'Isaac became the father of Jacob, and '
  - type: note
    content: Gen. 29:31-35; 30:5-24; 35:18, 23-26
  - type: text
    content: Jacob of the twelve patriarchs.
  '9':
  - type: text
    content: '“And the patriarchs, '
  - type: note
    content: Gen. 37:11
  - type: text
    content: 'jealous of Joseph, '
  - type: note
    content: Gen. 37:28; 45:4; Ps. 105:17
  - type: text
    content: 'sold him into Egypt; but '
  - type: note
    content: Gen. 39:2, 21, 23
  - type: text
    content: 'God was with him '
