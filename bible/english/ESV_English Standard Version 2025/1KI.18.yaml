document_id: 1KI.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Confronts Ahab
  - type: text
    content: ' '
  - type: note
    content: See ch. 17:1
  - type: text
    content: 'After many days the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah, in the third year, saying, “Go, show yourself to Ahab, and I will send rain upon the earth.” '
  '10':
  - type: note
    content: See ch. 17:1
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' your God lives, there is no nation or kingdom where my lord has not sent to seek you. And when they would say, ‘He is not here,’ he would take an oath of the kingdom or nation, that they had not found you. '
  '11':
  - type: text
    content: 'And now you say, ‘Go, tell your lord, “Behold, Elijah is here.”’ '
  '12':
  - type: text
    content: 'And as soon as I have gone from you, '
  - type: note
    content: 2 Kgs. 2:16; Ezek. 3:12, 14; 8:3; Acts 8:39
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' will carry you I know not where. And so, when I come and tell Ahab and he cannot find you, he will kill me, although I your servant have feared the '
  - type: text
    content: Lord
  - type: text
    content: ' from my youth. '
  '13':
  - type: text
    content: 'Has it not been told my lord what I did '
  - type: note
    content: ver. 4
  - type: text
    content: 'when Jezebel killed the prophets of the '
  - type: text
    content: Lord
  - type: text
    content: ', how I hid a hundred men of the '
  - type: text
    content: Lord
  - type: text
    content: '’s prophets by fifties in a cave and fed them with bread and water? '
  '14':
  - type: text
    content: 'And now you say, ‘Go, tell your lord, “Behold, Elijah is here”’; and he will kill me.” '
  '15':
  - type: text
    content: 'And Elijah said, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts lives, before whom I stand, I will surely show myself to him today.” '
  '16':
  - type: text
    content: So Obadiah went to meet Ahab, and told him. And Ahab went to meet Elijah.
  '17':
  - type: text
    content: 'When Ahab saw Elijah, Ahab said to him, '
  - type: note
    content: '[ch. 21:20]'
  - type: text
    content: '“Is it you, you '
  - type: note
    content: '[Josh. 7:25]'
  - type: text
    content: 'troubler of Israel?” '
  '18':
  - type: text
    content: 'And he answered, “I have not troubled Israel, but you have, and your father’s house, because you have '
  - type: note
    content: ch. 9:9; 2 Chr. 15:2; 24:20
  - type: text
    content: 'abandoned the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: ch. 16:31
  - type: text
    content: 'followed the Baals. '
  '19':
  - type: text
    content: 'Now therefore send and gather all Israel to me at Mount '
  - type: note
    content: See Josh. 19:26
  - type: text
    content: 'Carmel, and the '
  - type: note
    content: ver. 22
  - type: text
    content: '450 prophets of Baal and '
  - type: note
    content: See ch. 16:33
  - type: text
    content: 'the 400 prophets of Asherah, '
  - type: note
    content: '[2 Kgs. 3:13]'
  - type: text
    content: who eat at Jezebel’s table.”
  - type: heading
    content: The Prophets of Baal Defeated
  '2':
  - type: text
    content: 'So Elijah went to show himself to Ahab. Now the famine was severe in Samaria. '
  '20':
  - type: text
    content: 'So Ahab sent to all the people of Israel and gathered the prophets together at Mount Carmel. '
  '21':
  - type: text
    content: 'And Elijah came near to all the people and said, “How long '
  - type: note
    content: '[2 Kgs. 17:41]'
  - type: text
    content: 'will you go limping between two different opinions? '
  - type: note
    content: Josh. 24:15; [Matt. 6:24]
  - type: text
    content: 'If the '
  - type: text
    content: Lord
  - type: text
    content: ' is God, follow him; but if Baal, then follow him.” And the people did not answer him a word. '
  '22':
  - type: text
    content: 'Then Elijah said to the people, '
  - type: note
    content: ch. 19:10, 14
  - type: text
    content: '“I, even I only, am left a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ', but Baal’s prophets are '
  - type: note
    content: ver. 19
  - type: text
    content: '450 men. '
  '23':
  - type: text
    content: 'Let two bulls be given to us, and let them choose one bull for themselves and cut it in pieces and lay it on the wood, but put no fire to it. And I will prepare the other bull and lay it on the wood and put no fire to it. '
  '24':
  - type: text
    content: 'And you call upon the name of your god, and I will call upon the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the God who '
  - type: note
    content: See ver. 38
  - type: text
    content: 'answers by fire, he is God.” And all the people answered, “It is well spoken.” '
  '25':
  - type: text
    content: 'Then Elijah said to the prophets of Baal, “Choose for yourselves one bull and prepare it first, for you are many, and call upon the name of your god, but put no fire to it.” '
  '26':
  - type: text
    content: 'And they took the bull that was given them, and they prepared it and called upon the name of Baal from morning until noon, saying, “O Baal, answer us!” But there was no voice, and no one answered. And they limped around the altar that they had made. '
  '27':
  - type: text
    content: 'And at noon Elijah mocked them, saying, “Cry aloud, for he is a god. Either he is musing, or he is relieving himself, or he is on a journey, or perhaps he is asleep and must be awakened.” '
  '28':
  - type: text
    content: 'And they cried aloud and '
  - type: note
    content: '[Lev. 19:28; Deut. 14:1]'
  - type: text
    content: 'cut themselves after their custom with swords and lances, until the blood gushed out upon them. '
  '29':
  - type: text
    content: 'And as midday passed, they raved on until the time of '
  - type: note
    content: '[Ex. 29:39, 41]'
  - type: text
    content: the offering of the oblation, but there was no voice. No one answered; no one paid attention.
  '3':
  - type: text
    content: 'And Ahab called Obadiah, who was '
  - type: note
    content: ch. 16:9
  - type: text
    content: 'over the household. (Now Obadiah feared the '
  - type: text
    content: Lord
  - type: text
    content: ' greatly, '
  '30':
  - type: text
    content: 'Then Elijah said to all the people, “Come near to me.” And all the people came near to him. And he repaired the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' that had been '
  - type: note
    content: ch. 19:10, 14
  - type: text
    content: 'thrown down. '
  '31':
  - type: text
    content: 'Elijah took twelve stones, according to the number of the tribes of the sons of Jacob, to whom the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came, saying, '
  - type: note
    content: Gen. 32:28; 35:10; 2 Kgs. 17:34
  - type: text
    content: '“Israel shall be your name,” '
  '32':
  - type: text
    content: 'and with the stones he built an altar in the name of the '
  - type: text
    content: Lord
  - type: text
    content: . And he made a trench about the altar, as great as would contain two seahs
  - type: note
    content: A seah was about 7.7 quarts or 7.3 liters
  - type: text
    content: ' of seed. '
  '33':
  - type: note
    content: Gen. 22:9; Lev. 1:7
  - type: text
    content: 'And he put the wood in order and cut the bull in pieces and laid it on the wood. And he said, “Fill four jars with water and '
  - type: note
    content: '[Judg. 6:20]'
  - type: text
    content: 'pour it on the burnt offering and on the wood.” '
  '34':
  - type: text
    content: 'And he said, “Do it a second time.” And they did it a second time. And he said, “Do it a third time.” And they did it a third time. '
  '35':
  - type: text
    content: And the water ran around the altar and filled the trench also with water.
  '36':
  - type: text
    content: 'And at the time of '
  - type: note
    content: ver. 29
  - type: text
    content: 'the offering of the oblation, Elijah the prophet came near and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Ex. 3:6
  - type: text
    content: 'God of Abraham, Isaac, and Israel, let it be known this day that '
  - type: note
    content: Josh. 4:24; 1 Sam. 17:46
  - type: text
    content: 'you are God in Israel, and that I am your servant, and that '
  - type: note
    content: '[Num. 16:28]'
  - type: text
    content: 'I have done all these things at your word. '
  '37':
  - type: text
    content: 'Answer me, O '
  - type: text
    content: Lord
  - type: text
    content: ', answer me, that this people may know that you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are God, and that you have turned their hearts back.” '
  '38':
  - type: note
    content: ver. 24; See Lev. 9:24
  - type: text
    content: 'Then the fire of the '
  - type: text
    content: Lord
  - type: text
    content: ' fell and consumed the burnt offering and the wood and the stones and the dust, and licked up the water that was in the trench. '
  '39':
  - type: text
    content: 'And when all the people saw it, they fell on their faces and said, '
  - type: note
    content: ver. 24
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ', he is God; the '
  - type: text
    content: Lord
  - type: text
    content: ', he is God.” '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: ver. 13
  - type: text
    content: 'when Jezebel cut off the prophets of the '
  - type: text
    content: Lord
  - type: text
    content: ', Obadiah took a hundred prophets and hid them by fifties in a cave and fed them with bread and water.) '
  '40':
  - type: text
    content: 'And Elijah said to them, “Seize the prophets of Baal; let not one of them escape.” And they seized them. And Elijah brought them down to '
  - type: note
    content: Judg. 4:7
  - type: text
    content: 'the brook Kishon and '
  - type: note
    content: '[2 Kgs. 10:25]'
  - type: text
    content: slaughtered them there.
  - type: heading
    content: The Lord Sends Rain
  '41':
  - type: text
    content: 'And Elijah said to Ahab, “Go up, eat and drink, for there is a sound of the rushing of rain.” '
  '42':
  - type: text
    content: 'So Ahab went up to eat and to drink. And Elijah went up to the top of Mount Carmel. '
  - type: note
    content: '[James 5:17, 18]'
  - type: text
    content: 'And he bowed himself down on the earth and put his face between his knees. '
  '43':
  - type: text
    content: 'And he said to his servant, “Go up now, look toward the sea.” And he went up and looked and said, “There is nothing.” And he said, “Go again,” seven times. '
  '44':
  - type: text
    content: 'And at the seventh time he said, “Behold, '
  - type: note
    content: '[Luke 12:54]'
  - type: text
    content: 'a little cloud like a man’s hand is rising from the sea.” And he said, “Go up, say to Ahab, ‘Prepare your chariot and go down, lest the rain stop you.’” '
  '45':
  - type: text
    content: 'And in a little while the heavens grew black with clouds and wind, and there was a great rain. And Ahab rode and went to '
  - type: note
    content: Josh. 17:16
  - type: text
    content: 'Jezreel. '
  '46':
  - type: note
    content: 2 Kgs. 3:15; Ezek. 1:3; 3:14
  - type: text
    content: 'And the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on Elijah, '
  - type: note
    content: Ex. 12:11; 2 Kgs. 4:29; 9:1; Jer. 1:17
  - type: text
    content: 'and he gathered up his garment and ran before Ahab to the entrance of '
  - type: note
    content: Josh. 17:16
  - type: text
    content: Jezreel.
  '5':
  - type: text
    content: 'And Ahab said to Obadiah, “Go through the land to all the springs of water and to all the valleys. Perhaps we may find grass and save the horses and mules alive, and not lose some of the animals.” '
  '6':
  - type: text
    content: So they divided the land between them to pass through it. Ahab went in one direction by himself, and Obadiah went in another direction by himself.
  '7':
  - type: text
    content: 'And as Obadiah was on the way, behold, Elijah met him. And Obadiah recognized him and fell on his face and said, “Is it you, my lord Elijah?” '
  '8':
  - type: text
    content: 'And he answered him, “It is I. Go, tell your lord, ‘Behold, Elijah is here.’” '
  '9':
  - type: text
    content: 'And he said, “How have I sinned, that you would give your servant into the hand of Ahab, to kill me? '
