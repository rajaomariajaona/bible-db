document_id: PHP.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Righteousness Through Faith in Christ
  - type: text
    content: Finally, my brothers,
  - type: note
    content: Or brothers and sisters; also verses 13, 17
  - type: text
    content: ' '
  - type: note
    content: ch. 4:4; 1 Thess. 5:16
  - type: text
    content: 'rejoice in the Lord. '
  - type: note
    content: '[2 Pet. 1:12]'
  - type: text
    content: To write the same things to you is no trouble to me and is safe for you.
  '10':
  - type: note
    content: '[Eph. 4:13]'
  - type: text
    content: 'that I may know him and '
  - type: note
    content: '[Rom. 1:4; 6:5]'
  - type: text
    content: 'the power of his resurrection, and '
  - type: note
    content: 1 Pet. 4:13; See 2 Cor. 1:5
  - type: text
    content: 'may share his sufferings, becoming like him in his death, '
  '11':
  - type: text
    content: 'that by any means possible I may '
  - type: note
    content: Acts 26:7
  - type: text
    content: attain the resurrection from the dead.
  - type: heading
    content: Straining Toward the Goal
  '12':
  - type: text
    content: 'Not that I have already '
  - type: note
    content: '[1 Tim. 6:12, 19]'
  - type: text
    content: 'obtained this or '
  - type: note
    content: Heb. 11:40; 12:23; [Heb. 5:9]
  - type: text
    content: 'am already perfect, but I press on to make it my own, because Christ Jesus has made me his own. '
  '13':
  - type: text
    content: 'Brothers, I do not consider that I have made it my own. But one thing I do: '
  - type: note
    content: '[Ps. 45:10; Luke 9:62; Heb. 6:1]'
  - type: text
    content: 'forgetting what lies behind and straining forward to what lies ahead, '
  '14':
  - type: text
    content: 'I press on toward the goal for '
  - type: note
    content: 1 Cor. 9:24
  - type: text
    content: 'the prize of the upward '
  - type: note
    content: '[Heb. 3:1; 1 Pet. 5:10]; See Rom. 8:28'
  - type: text
    content: 'call of God in Christ Jesus. '
  '15':
  - type: text
    content: 'Let those of us who are '
  - type: note
    content: 1 Cor. 2:6; See Matt. 5:48
  - type: text
    content: 'mature think this way, and if in anything '
  - type: note
    content: '[Gal. 5:10]'
  - type: text
    content: 'you think otherwise, '
  - type: note
    content: '[John 7:17]'
  - type: text
    content: 'God will reveal that also to you. '
  '16':
  - type: text
    content: 'Only '
  - type: note
    content: Gal. 6:16
  - type: text
    content: let us hold true to what we have attained.
  '17':
  - type: text
    content: 'Brothers, '
  - type: note
    content: '[ch. 4:9]; See 1 Cor. 4:16'
  - type: text
    content: 'join in imitating me, and keep your eyes on those who walk '
  - type: note
    content: 1 Pet. 5:3
  - type: text
    content: 'according to the example you have in us. '
  '18':
  - type: text
    content: 'For '
  - type: note
    content: See 2 Cor. 11:13
  - type: text
    content: 'many, of whom I have often told you and now tell you '
  - type: note
    content: '[Acts 20:31]'
  - type: text
    content: 'even with tears, walk as enemies of the cross of Christ. '
  '19':
  - type: note
    content: 2 Cor. 11:15; [2 Thess. 1:9; 2 Pet. 2:1, 3]
  - type: text
    content: 'Their end is destruction, '
  - type: note
    content: See Rom. 16:18
  - type: text
    content: 'their god is their belly, and '
  - type: note
    content: '[Hos. 4:7; 2 Cor. 11:12; Gal. 6:13; Jude 13]'
  - type: text
    content: 'they glory in their shame, with '
  - type: note
    content: Rom. 8:5; Col. 3:2
  - type: text
    content: 'minds set on earthly things. '
  '2':
  - type: text
    content: 'Look out for '
  - type: note
    content: Ps. 22:16, 20; Isa. 56:10, 11; Rev. 22:15; [Gal. 5:15]
  - type: text
    content: 'the dogs, look out for '
  - type: note
    content: '[2 Cor. 11:13]'
  - type: text
    content: 'the evildoers, look out for those who mutilate the flesh. '
  '20':
  - type: text
    content: 'But '
  - type: note
    content: See Eph. 2:19
  - type: text
    content: 'our citizenship is in heaven, and '
  - type: note
    content: Acts 1:11
  - type: text
    content: 'from it we '
  - type: note
    content: See 1 Cor. 1:7
  - type: text
    content: 'await a Savior, the Lord Jesus Christ, '
  '21':
  - type: text
    content: 'who will transform '
  - type: note
    content: '[1 Cor. 15:43-53]'
  - type: text
    content: 'our lowly body '
  - type: note
    content: '[ver. 10; Col. 3:4]; See Rom. 8:29'
  - type: text
    content: 'to be like his glorious body, '
  - type: note
    content: See Eph. 1:19
  - type: text
    content: 'by the power that enables him even '
  - type: note
    content: 1 Cor. 15:28
  - type: text
    content: to subject all things to himself.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: See Rom. 2:29
  - type: text
    content: 'we are the circumcision, '
  - type: note
    content: '[John 4:23]'
  - type: text
    content: 'who worship '
  - type: note
    content: '[Gal. 5:25; Jude 20]'
  - type: text
    content: by the Spirit of God
  - type: note
    content: Some manuscripts God in spirit
  - type: text
    content: ' and '
  - type: note
    content: Rom. 15:17; [Gal. 6:14]
  - type: text
    content: 'glory in Christ Jesus and put no confidence in the flesh— '
  '4':
  - type: note
    content: 2 Cor. 11:18
  - type: text
    content: 'though I myself have reason for confidence in the flesh also. If anyone else thinks he has reason for confidence in the flesh, I have more: '
  '5':
  - type: note
    content: See Gen. 17:12
  - type: text
    content: 'circumcised on the eighth day, '
  - type: note
    content: 2 Cor. 11:22
  - type: text
    content: 'of the people of Israel, '
  - type: note
    content: Rom. 11:1
  - type: text
    content: 'of the tribe of Benjamin, '
  - type: note
    content: 2 Cor. 11:22
  - type: text
    content: 'a Hebrew of Hebrews; as to the law, '
  - type: note
    content: Acts 23:6; 26:5
  - type: text
    content: 'a Pharisee; '
  '6':
  - type: note
    content: Acts 22:3, 4; Gal. 1:13, 14
  - type: text
    content: 'as to zeal, '
  - type: note
    content: See Acts 8:3
  - type: text
    content: 'a persecutor of the church; '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: as to righteousness under the law,
  - type: note
    content: Greek in the law
  - type: text
    content: ' blameless. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: '[Luke 14:33]'
  - type: text
    content: 'whatever gain I had, '
  - type: note
    content: '[Heb. 11:26]'
  - type: text
    content: 'I counted as loss for the sake of Christ. '
  '8':
  - type: text
    content: 'Indeed, I count everything as loss because of '
  - type: note
    content: '[2 Cor. 5:15]'
  - type: text
    content: 'the surpassing worth of '
  - type: note
    content: Isa. 53:11; Jer. 9:23, 24; John 17:3; 2 Pet. 1:3
  - type: text
    content: 'knowing Christ Jesus my Lord. For his sake I '
  - type: note
    content: Luke 9:25 (Gk.)
  - type: text
    content: 'have suffered the loss of all things and count them as rubbish, in order that I may gain Christ '
  '9':
  - type: text
    content: 'and be found in him, not having '
  - type: note
    content: Rom. 10:5; [ver. 6]
  - type: text
    content: 'a righteousness of my own that comes from the law, but '
  - type: note
    content: See Rom. 9:30; 1 Cor. 1:30
  - type: text
    content: 'that which comes through faith in Christ, the righteousness from God that depends on faith— '
