document_id: PSA.143,59
type_code: eng
verses:
  '1':
  - type: heading
    content: My Soul Thirsts for You
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'Hear my prayer, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: Ps. 140:6
  - type: text
    content: give ear to my pleas for mercy!
  - type: text
    content: 'In your '
  - type: note
    content: 1 John 1:9; [Ps. 31:1]
  - type: text
    content: 'faithfulness answer me, in your '
  - type: note
    content: 1 John 1:9; [Ps. 31:1]
  - type: text
    content: righteousness!
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 119:12 ]'
  - type: text
    content: Teach me to do your will,
  - type: text
    content: for you are my God!
  - type: note
    content: Neh. 9:20
  - type: text
    content: 'Let your good Spirit '
  - type: note
    content: See Ps. 23:3
  - type: text
    content: lead me
  - type: text
    content: 'on '
  - type: note
    content: Isa. 26:10; [Ps. 27:11]
  - type: text
    content: level ground!
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 23:3; 25:11
  - type: text
    content: 'For your name’s sake, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Ps. 71:20
  - type: text
    content: preserve my life!
  - type: text
    content: 'In your righteousness '
  - type: note
    content: Ps. 142:7
  - type: text
    content: bring my soul out of trouble!
  '12':
  - type: text
    content: 'And in your steadfast love you will '
  - type: note
    content: Ps. 54:5
  - type: text
    content: cut off my enemies,
  - type: text
    content: and you will destroy all the adversaries of my soul,
  - type: text
    content: 'for I am your '
  - type: note
    content: See Ps. 116:16
  - type: text
    content: servant.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 14:3 ]'
  - type: text
    content: Enter not into judgment with your servant,
  - type: text
    content: 'for no one living is righteous '
  - type: note
    content: Ps. 130:3; 1 Kgs. 8:46; Job 9:2; 15:14; 25:4; Eccles. 7:20; Rom. 3:23; 1 Cor. 4:4
  - type: text
    content: before you.
  '3':
  - type: text
    content: For the enemy has pursued my soul;
  - type: note
    content: See Ps. 88:3-6
  - type: text
    content: he has crushed my life to the ground;
  - type: note
    content: Lam. 3:6
  - type: text
    content: he has made me sit in darkness like those long dead.
  '4':
  - type: text
    content: 'Therefore my spirit '
  - type: note
    content: See Ps. 77:3
  - type: text
    content: faints within me;
  - type: text
    content: my heart within me is appalled.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps. 77:5, 11
  - type: text
    content: I remember the days of old;
  - type: note
    content: Ps. 77:12; 111:2
  - type: text
    content: I meditate on all that you have done;
  - type: text
    content: I ponder the work of your hands.
  '6':
  - type: text
    content: ' '
  - type: note
    content: See Job 11:13
  - type: text
    content: I stretch out my hands to you;
  - type: note
    content: Ps. 42:2
  - type: text
    content: 'my soul thirsts for you like '
  - type: note
    content: '[Ps. 63:1]'
  - type: text
    content: 'a parched land. '
  - type: text
    content: Selah
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 69:17; 102:2
  - type: text
    content: 'Answer me quickly, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: note
    content: '[ Ps. 84:2 ]'
  - type: text
    content: My spirit fails!
  - type: note
    content: Ps. 27:9
  - type: text
    content: Hide not your face from me,
  - type: note
    content: Ps. 28:1; 88:4
  - type: text
    content: lest I be like those who go down to the pit.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 90:14 ]'
  - type: text
    content: Let me hear in the morning of your steadfast love,
  - type: text
    content: 'for in you I '
  - type: note
    content: Ps. 11:1; 25:2
  - type: text
    content: trust.
  - type: note
    content: Ps. 25:4
  - type: text
    content: Make me know the way I should go,
  - type: note
    content: Ps. 25:1
  - type: text
    content: for to you I lift up my soul.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 59:1; 142:6
  - type: text
    content: 'Deliver me from my enemies, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: I have fled to you for refuge.
  - type: note
    content: One Hebrew manuscript, Septuagint; most Hebrew manuscripts To you I have covered
