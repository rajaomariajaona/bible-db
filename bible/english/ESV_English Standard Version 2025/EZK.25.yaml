document_id: EZK.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy Against Ammon
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'I will give it '
  - type: note
    content: ver. 2
  - type: text
    content: 'along with the Ammonites '
  - type: note
    content: ver. 4
  - type: text
    content: 'to the people of the East as a possession, '
  - type: note
    content: ch. 21:32
  - type: text
    content: 'that the Ammonites may be remembered no more among the nations, '
  '11':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'and I will execute judgments upon Moab. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Prophecy Against Edom
  '12':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because '
  - type: note
    content: ver. 8; ch. 32:29; 35:2, 5; 2 Chr. 28:17; Ps. 137:7; Isa. 21:11; 34:5; Amos 1:11, 12; See Jer. 49:7-22; Obad. 1-21
  - type: text
    content: 'Edom acted revengefully against the house of Judah and has grievously offended '
  - type: note
    content: ver. 15
  - type: text
    content: 'in taking vengeance on them, '
  '13':
  - type: text
    content: 'therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: See ch. 6:14
  - type: text
    content: 'I will stretch out my hand against Edom and cut off from it man and beast. And I will make it desolate; from '
  - type: note
    content: 1 Chr. 1:45; Amos 1:12
  - type: text
    content: 'Teman even to '
  - type: note
    content: ch. 27:15, 20; 38:13; Isa. 21:13
  - type: text
    content: 'Dedan they shall fall by the sword. '
  '14':
  - type: text
    content: 'And I will lay my vengeance upon Edom '
  - type: note
    content: Amos 9:12; Obad. 18
  - type: text
    content: 'by the hand of my people Israel, and they shall do in Edom according to my anger and according to my wrath, and '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'they shall know my vengeance, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  - type: heading
    content: Prophecy Against Philistia
  '15':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because '
  - type: note
    content: Jer. 25:20; 47:1; Joel 3:4; Amos 1:6; Zeph. 2:4; See Isa. 14:29-31
  - type: text
    content: 'the Philistines '
  - type: note
    content: ver. 12
  - type: text
    content: 'acted revengefully and took vengeance '
  - type: note
    content: ver. 6; ch. 36:5
  - type: text
    content: 'with malice of soul to destroy in never-ending enmity, '
  '16':
  - type: text
    content: 'therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'Behold, I will stretch out my hand against the Philistines, and I will cut off '
  - type: note
    content: See 1 Sam. 30:14
  - type: text
    content: 'the Cherethites and destroy the rest of the seacoast. '
  '17':
  - type: text
    content: 'I will execute great vengeance on them '
  - type: note
    content: ch. 5:15
  - type: text
    content: 'with wrathful rebukes. '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I lay my vengeance upon them.”'
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'set your face toward '
  - type: note
    content: ch. 21:20, 28; See Jer. 49:1-6
  - type: text
    content: 'the Ammonites and prophesy against them. '
  '3':
  - type: text
    content: 'Say to the Ammonites, Hear the word of the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 2:4; 3:11, 27
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ', Because you said, '
  - type: note
    content: ch. 26:2; 36:2
  - type: text
    content: '‘Aha!’ over my '
  - type: note
    content: See ch. 7:22
  - type: text
    content: 'sanctuary when it was profaned, and over the land of Israel when it was made desolate, and over the house of Judah when they went into exile, '
  '4':
  - type: text
    content: 'therefore behold, I am handing you over to '
  - type: note
    content: Judg. 6:3
  - type: text
    content: 'the people of the East for a possession, and they shall set their encampments among you and make their dwellings in your midst. They shall eat your fruit, and they shall drink your milk. '
  '5':
  - type: text
    content: 'I will make '
  - type: note
    content: 2 Sam. 11:1; 12:26; See ch. 21:20
  - type: text
    content: 'Rabbah a '
  - type: note
    content: '[Zeph. 2:15]'
  - type: text
    content: pasture for camels and Ammon
  - type: note
    content: Hebrew and the Ammonites
  - type: text
    content: ' '
  - type: note
    content: '[Zeph. 2:15]'
  - type: text
    content: 'a fold for flocks. '
  - type: note
    content: '[See ch. 24:27 above]'
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because '
  - type: note
    content: Ps. 98:8; Isa. 55:12
  - type: text
    content: 'you have clapped your hands '
  - type: note
    content: '[ch. 6:11]'
  - type: text
    content: 'and stamped your feet and '
  - type: note
    content: '[Zeph. 2:8, 10]'
  - type: text
    content: 'rejoiced with all the '
  - type: note
    content: ver. 15; ch. 36:5
  - type: text
    content: 'malice within your soul against the land of Israel, '
  '7':
  - type: text
    content: 'therefore, behold, '
  - type: note
    content: See ch. 6:14
  - type: text
    content: 'I have stretched out my hand against you, and '
  - type: note
    content: '[ver. 4; ch. 7:21]'
  - type: text
    content: 'will hand you over as plunder to the nations. And I will cut you off from the peoples and will make you perish out of the countries; I will destroy you. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Prophecy Against Moab and Seir
  '8':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because '
  - type: note
    content: See Isa. 15:1-9; Jer. 48:1-47
  - type: text
    content: 'Moab and '
  - type: note
    content: See ver. 12
  - type: text
    content: Seir
  - type: note
    content: Septuagint lacks and Seir
  - type: text
    content: ' said, ‘Behold, the '
  - type: note
    content: See Jer. 25:17-26
  - type: text
    content: 'house of Judah is like all the other nations,’ '
  '9':
  - type: text
    content: 'therefore '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'I will lay open the flank of Moab from the cities, from its cities on its frontier, the glory of the country, '
  - type: note
    content: Josh. 12:3
  - type: text
    content: 'Beth-jeshimoth, '
  - type: note
    content: 1 Chr. 5:8
  - type: text
    content: 'Baal-meon, and '
  - type: note
