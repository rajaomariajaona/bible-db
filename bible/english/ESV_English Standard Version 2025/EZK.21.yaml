document_id: EZK.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Has Drawn His Sword
  - type: text
    content: ' '
  - type: note
    content: Ch 21:6 in Hebrew
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 15, 28 ]'
  - type: text
    content: sharpened for slaughter,
  - type: note
    content: '[ver. 15, 28 ]'
  - type: text
    content: polished to flash like lightning!
  - type: text
    content: '(Or '
  - type: note
    content: '[James 5:5]'
  - type: text
    content: 'shall we rejoice? You have despised the rod, my son, '
  - type: note
    content: '[ch. 20:47]'
  - type: text
    content: with everything of wood.)
  - type: note
    content: Probable reading; Hebrew The rod of my son despises everything of wood
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'So the sword is given to be polished, that it may be grasped in the hand. It is sharpened and polished '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'to be given into the hand of the slayer. '
  '12':
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'Cry out and wail, son of man, for it is against my people. It is against all the princes of Israel. They are delivered over to the sword with my people. '
  - type: note
    content: Jer. 31:19
  - type: text
    content: 'Strike therefore upon your thigh. '
  '13':
  - type: text
    content: 'For it will not be a testing—what could it do if you despise '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: the rod?”
  - type: note
    content: Or For it is a testing; and what if even the rod despises? It shall not be!
  - type: text
    content: ' declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '14':
  - type: text
    content: '“As for you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, prophesy. '
  - type: note
    content: ch. 22:13; Num. 24:10
  - type: text
    content: 'Clap your hands and let the sword come down twice, '
  - type: note
    content: '[2 Kgs. 24:1, 10; 25:1]'
  - type: text
    content: yes, three times,
  - type: note
    content: Hebrew its third
  - type: text
    content: ' the sword for those to be slain. It is the sword for the great slaughter, which surrounds them, '
  '15':
  - type: text
    content: that their hearts may melt, and many stumble.
  - type: note
    content: Hebrew many stumbling blocks
  - type: text
    content: ' At all their gates I have given the glittering sword. Ah, it is made like lightning; '
  - type: note
    content: ver. 10
  - type: text
    content: it is taken up
  - type: note
    content: The meaning of the Hebrew word rendered taken up is uncertain
  - type: text
    content: ' for slaughter. '
  '16':
  - type: text
    content: 'Cut sharply to the right; set yourself to the left, wherever your face is directed. '
  '17':
  - type: text
    content: 'I also will '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'clap my hands, '
  - type: note
    content: See ch. 5:13
  - type: text
    content: 'and I will satisfy my fury; '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.”'
  '18':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me again: '
  '19':
  - type: text
    content: '“As for you, son of man, mark two ways for '
  - type: note
    content: ver. 11
  - type: text
    content: 'the sword of the king of Babylon to come. Both of them shall come from the same land. And make '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'a signpost; make it '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'at the head of the way to a city. '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[ch. 20:46]'
  - type: text
    content: 'set your face toward Jerusalem and '
  - type: note
    content: See ch. 20:46
  - type: text
    content: preach against the sanctuaries.
  - type: note
    content: Some Hebrew manuscripts; compare Septuagint; Syriac against their sanctuary
  - type: text
    content: ' Prophesy against the land of Israel '
  '20':
  - type: text
    content: 'Mark a way '
  - type: note
    content: See ch. 25:1-5; Jer. 49:1-6; Amos 1:13-15
  - type: text
    content: 'for the sword to come to Rabbah of the Ammonites and to Judah, into Jerusalem the fortified. '
  '21':
  - type: text
    content: 'For the king of Babylon stands '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'at the parting of the way, at the head of the two ways, to use divination. He shakes the arrows; he consults '
  - type: note
    content: See Gen. 31:19
  - type: text
    content: the teraphim;
  - type: note
    content: Or household idols
  - type: text
    content: ' he looks at the liver. '
  '22':
  - type: text
    content: 'Into his right hand comes the divination for Jerusalem, '
  - type: note
    content: ch. 4:2; 26:9
  - type: text
    content: 'to set battering rams, to open the mouth with murder, to lift up the voice with shouting, to set battering rams against the gates, '
  - type: note
    content: See ch. 4:2
  - type: text
    content: 'to cast up mounds, to build siege towers. '
  '23':
  - type: text
    content: 'But to them it will seem like a false divination. '
  - type: note
    content: '[ch. 17:13]'
  - type: text
    content: 'They have sworn solemn oaths, but he brings their guilt to remembrance, '
  - type: note
    content: '[ch. 17:20]'
  - type: text
    content: that they may be taken.
  '24':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because you have made your guilt to be remembered, in that your transgressions are uncovered, so that in all your deeds your sins appear—because you have come to remembrance, '
  - type: note
    content: '[ch. 17:20]'
  - type: text
    content: 'you shall be taken in hand. '
  '25':
  - type: text
    content: And you, O profane
  - type: note
    content: Or slain; also verse 29
  - type: text
    content: ' '
  - type: note
    content: '[ch. 17:19; 2 Chr. 36:13; Jer. 52:2]'
  - type: text
    content: 'wicked one, prince of Israel, '
  - type: note
    content: ver. 29; ch. 22:3, 4
  - type: text
    content: 'whose day has come, '
  - type: note
    content: ch. 35:5
  - type: text
    content: 'the time of your final punishment, '
  '26':
  - type: text
    content: 'thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Remove the turban and take off the crown. Things shall not remain as they are. '
  - type: note
    content: '[ch. 17:24; Luke 1:52]'
  - type: text
    content: 'Exalt that which is low, and bring low that which is exalted. '
  '27':
  - type: text
    content: 'A ruin, ruin, ruin I will make it. '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'This also shall not be, '
  - type: note
    content: Gen. 49:10; Zech. 6:12, 13; John 1:49; [Rev. 17:14]
  - type: text
    content: until he comes, the one to whom judgment belongs, and I will give it to him.
  '28':
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, prophesy, and say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' '
  - type: note
    content: See ver. 20
  - type: text
    content: 'concerning the Ammonites and concerning their reproach; say, '
  - type: note
    content: '[ver. 9, 10]'
  - type: text
    content: 'A sword, a sword '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'is drawn for the slaughter. '
  - type: note
    content: '[ver. 9, 10]'
  - type: text
    content: 'It is polished to consume and to flash like lightning— '
  '29':
  - type: text
    content: 'while '
  - type: note
    content: See ch. 13:6
  - type: text
    content: 'they see for you false visions, while they divine lies for you—to place you on the necks of the profane wicked, '
  - type: note
    content: ver. 25
  - type: text
    content: 'whose day has come, the time of their final punishment. '
  '3':
  - type: text
    content: 'and say to the land of Israel, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'Behold, I am against you and will draw '
  - type: note
    content: ver. 19, 30; [Deut. 32:41; Jer. 47:6]
  - type: text
    content: 'my sword from its sheath and '
  - type: note
    content: '[ch. 20:47; Job 9:22]'
  - type: text
    content: 'will cut off from you both righteous and wicked. '
  '30':
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'Return it to its sheath. In the place where you were created, in the land of your origin, '
  - type: note
    content: ch. 16:38
  - type: text
    content: 'I will judge you. '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 7:8
  - type: text
    content: 'I will pour out my indignation upon you; '
  - type: note
    content: ch. 22:20, 21
  - type: text
    content: 'I will blow upon you with the fire of my wrath, and I will deliver you into the hands of '
  - type: note
    content: See Ps. 49:10
  - type: text
    content: 'brutish men, skillful to destroy. '
  '32':
  - type: text
    content: 'You shall be fuel for the fire. Your blood shall be in the midst of the land. '
  - type: note
    content: ch. 25:10
  - type: text
    content: 'You shall be no more remembered, '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'for I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.”'
  '4':
  - type: text
    content: 'Because I will cut off from you both righteous and wicked, therefore my sword shall be drawn from its sheath against all flesh from south to north. '
  '5':
  - type: note
    content: '[ch. 20:48]'
  - type: text
    content: 'And all flesh shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. I have drawn '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'my sword from its sheath; '
  - type: note
    content: '[ver. 30]'
  - type: text
    content: it shall not be sheathed again.
  '6':
  - type: text
    content: '“As for you, son of man, '
  - type: note
    content: '[ch. 6:11; 12:18]'
  - type: text
    content: 'groan; with breaking heart and bitter grief, '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'groan before their eyes. '
  '7':
  - type: note
    content: '[ch. 12:9]'
  - type: text
    content: 'And when they say to you, ‘Why do you groan?’ you shall say, ‘Because of the news '
  - type: note
    content: '[ch. 7:5, 6]'
  - type: text
    content: 'that it is coming. '
  - type: note
    content: See Josh. 2:11
  - type: text
    content: 'Every heart will melt, and '
  - type: note
    content: See ch. 7:17
  - type: text
    content: 'all hands will be feeble; every spirit will faint, and '
  - type: note
    content: See ch. 7:17
  - type: text
    content: 'all knees will be weak as water. '
  - type: note
    content: ch. 39:8
  - type: text
    content: 'Behold, it is '
  - type: note
    content: '[ch. 7:5, 6]'
  - type: text
    content: 'coming, and it will be fulfilled,’” declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '8':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '9':
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '“Son of man, prophesy and say, Thus says the Lord, say:'
  - type: note
    content: See ver. 3
  - type: text
    content: “A sword, a sword is sharpened
  - type: text
    content: and also polished,
