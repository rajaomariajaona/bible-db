document_id: EXO.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Moses
  - type: text
    content: 'Then Moses and the people of Israel '
  - type: note
    content: Ps. 106:12; [Judg. 5:1; 2 Sam. 22:1]
  - type: text
    content: 'sang this song to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying,'
  - type: note
    content: ver. 21
  - type: text
    content: '“I will sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has triumphed gloriously;'
  - type: text
    content: the horse and his rider
  - type: note
    content: Or its chariot; also verse 21
  - type: text
    content: ' he has thrown into the sea.'
  '10':
  - type: text
    content: 'You '
  - type: note
    content: ch. 14:21; [Isa. 11:15; 40:24]
  - type: text
    content: 'blew with your wind; the '
  - type: note
    content: ver. 5; ch. 14:28
  - type: text
    content: sea covered them;
  - type: text
    content: they sank like lead in the mighty waters.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Deut. 3:24; 1 Sam. 2:2; 2 Sam. 7:22; 1 Kgs. 8:23; 2 Chr. 6:14; Jer. 10:6
  - type: text
    content: '“Who is like you, O '
  - type: text
    content: Lord
  - type: text
    content: ', among the gods?'
  - type: text
    content: Who is like you, majestic in holiness,
  - type: text
    content: 'awesome in '
  - type: note
    content: '[Isa. 6:3; Rev. 4:8]'
  - type: text
    content: 'glorious deeds, '
  - type: note
    content: Ps. 77:14
  - type: text
    content: doing wonders?
  '12':
  - type: text
    content: 'You stretched out '
  - type: note
    content: ver. 6
  - type: text
    content: your right hand;
  - type: text
    content: the earth swallowed them.
  '13':
  - type: text
    content: '“You have '
  - type: note
    content: Ps. 77:20
  - type: text
    content: 'led in your steadfast love the people whom '
  - type: note
    content: Ps. 77:15
  - type: text
    content: you have redeemed;
  - type: text
    content: 'you have '
  - type: note
    content: Ps. 78:54
  - type: text
    content: guided them by your strength to your holy abode.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Num. 14:14; Deut. 2:25; Josh. 2:9, 10; 9:24
  - type: text
    content: The peoples have heard; they tremble;
  - type: text
    content: pangs have seized the inhabitants of Philistia.
  '15':
  - type: text
    content: 'Now are the chiefs of Edom '
  - type: note
    content: '[Deut. 2:4]'
  - type: text
    content: dismayed;
  - type: text
    content: 'trembling seizes the leaders of '
  - type: note
    content: Num. 22:3
  - type: text
    content: Moab;
  - type: note
    content: Josh. 2:9, 11, 24; 5:1
  - type: text
    content: all the inhabitants of Canaan have melted away.
  '16':
  - type: text
    content: 'Terror and '
  - type: note
    content: Deut. 2:25; 11:25
  - type: text
    content: dread fall upon them;
  - type: text
    content: 'because of the greatness of your arm, they are still '
  - type: note
    content: 1 Sam. 25:37
  - type: text
    content: as a stone,
  - type: text
    content: 'till your people, O '
  - type: text
    content: Lord
  - type: text
    content: ', pass by,'
  - type: text
    content: 'till the people pass by whom '
  - type: note
    content: Ps. 74:2; [1 Pet. 2:9]
  - type: text
    content: you have purchased.
  '17':
  - type: text
    content: 'You will bring them in and '
  - type: note
    content: Ps. 44:2; 80:8; [Jer. 32:41]
  - type: text
    content: plant them on your own mountain,
  - type: text
    content: 'the place, O '
  - type: text
    content: Lord
  - type: text
    content: ', which you have made for your abode,'
  - type: note
    content: Ps. 78:54; 132:13, 14
  - type: text
    content: the sanctuary, O Lord, which your hands have established.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps. 10:16; 29:10; 45:6; 146:10; Rev. 11:15
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will reign forever and ever.”'
  '19':
  - type: text
    content: 'For when '
  - type: note
    content: ch. 14:23
  - type: text
    content: 'the horses of Pharaoh with his chariots and his horsemen went into the sea, '
  - type: note
    content: ch. 14:28, 29
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' brought back the waters of the sea upon them, but the people of Israel walked on dry ground in the midst of the sea. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps. 18:1, 2; 59:17; 118:14; 140:7; Isa. 12:2
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength and my '
  - type: note
    content: Deut. 10:21; Ps. 109:1
  - type: text
    content: song,
  - type: text
    content: 'and he has become '
  - type: note
    content: Ps. 18:46; Hab. 3:18
  - type: text
    content: my salvation;
  - type: text
    content: this is my God, and I will praise him,
  - type: note
    content: ch. 3:6, 15, 16
  - type: text
    content: 'my father’s God, and '
  - type: note
    content: 2 Sam. 22:47; Ps. 34:3; 99:5, 9; 118:28; 145:1; Isa. 25:1
  - type: text
    content: I will exalt him.
  '20':
  - type: text
    content: 'Then '
  - type: note
    content: Mic. 6:4
  - type: text
    content: 'Miriam '
  - type: note
    content: '[Judg. 4:4; 2 Kgs. 22:14; Neh. 6:14; Luke 2:36]'
  - type: text
    content: 'the prophetess, the '
  - type: note
    content: ch. 2:4; Num. 26:59
  - type: text
    content: 'sister of Aaron, took a tambourine in her hand, and '
  - type: note
    content: Judg. 11:34; 1 Sam. 18:6; Ps. 68:25; 149:3; 150:4
  - type: text
    content: 'all the women went out after her with tambourines and dancing. '
  '21':
  - type: text
    content: 'And Miriam sang to them:'
  - type: note
    content: ver. 1
  - type: text
    content: '“Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has triumphed gloriously;'
  - type: text
    content: the horse and his rider he has thrown into the sea.”
  - type: heading
    content: Bitter Water Made Sweet
  '22':
  - type: text
    content: 'Then Moses made Israel set out from the Red Sea, and they went into the wilderness of '
  - type: note
    content: Gen. 16:7; 25:18; 1 Sam. 15:7
  - type: text
    content: 'Shur. They went three days in the wilderness and found no water. '
  '23':
  - type: text
    content: 'When they came to '
  - type: note
    content: '[Ruth 1:20]'
  - type: text
    content: Marah, they could not drink the water of Marah because it was bitter; therefore it was named Marah.
  - type: note
    content: Marah means bitterness
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And the people '
  - type: note
    content: ch. 16:2; 17:3
  - type: text
    content: 'grumbled against Moses, saying, “What shall we drink?” '
  '25':
  - type: text
    content: 'And he '
  - type: note
    content: ch. 14:10; 17:4
  - type: text
    content: 'cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' showed him a log,'
  - type: note
    content: Or tree
  - type: text
    content: ' and he '
  - type: note
    content: '[2 Kgs. 2:21; 4:41]'
  - type: text
    content: threw it into the water, and the water became sweet.
  - type: text
    content: 'There the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew he
  - type: text
    content: ' made for them a statute and a rule, and there he '
  - type: note
    content: ch. 16:4; Deut. 8:2, 16; Judg. 2:22; 3:1, 4; Ps. 66:10
  - type: text
    content: 'tested them, '
  '26':
  - type: text
    content: 'saying, '
  - type: note
    content: See Lev. 26:3-13; Deut. 7:12-15
  - type: text
    content: '“If you will diligently listen to the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and do that which is right in his eyes, and give ear to his commandments and keep all his statutes, I will put none of the '
  - type: note
    content: Deut. 28:27, 60
  - type: text
    content: 'diseases on you that I put on the Egyptians, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 23:25; Ps. 103:3; 147:3; Hos. 6:1
  - type: text
    content: your healer.”
  '27':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 33:9
  - type: text
    content: they came to Elim, where there were twelve springs of water and seventy palm trees, and they encamped there by the water.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: Ps. 24:8; Rev. 19:11
  - type: text
    content: a man of war;
  - type: note
    content: ch. 3:15; 6:3; Ps. 83:18; Isa. 42:8; Mal. 3:6
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:28
  - type: text
    content: “Pharaoh’s chariots and his host he cast into the sea,
  - type: text
    content: 'and his chosen '
  - type: note
    content: ch. 14:7
  - type: text
    content: officers were sunk in the Red Sea.
  '5':
  - type: text
    content: 'The '
  - type: note
    content: ver. 10; ch. 14:28
  - type: text
    content: floods covered them;
  - type: text
    content: 'they '
  - type: note
    content: Neh. 9:11
  - type: text
    content: went down into the depths like a stone.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 12 ; Ps. 118:15, 16; Isa. 51:9
  - type: text
    content: 'Your right hand, O '
  - type: text
    content: Lord
  - type: text
    content: ', glorious in power,'
  - type: text
    content: 'your right hand, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 2:9; Rev. 2:27
  - type: text
    content: shatters the enemy.
  '7':
  - type: text
    content: 'In the '
  - type: note
    content: Deut. 33:26
  - type: text
    content: greatness of your majesty you overthrow your adversaries;
  - type: text
    content: 'you send out your fury; it '
  - type: note
    content: '[Isa. 5:24; 47:14; Mal. 4:1]'
  - type: text
    content: consumes them like stubble.
  '8':
  - type: text
    content: 'At the '
  - type: note
    content: ch. 14:21, 22; 2 Sam. 22:16; Job 4:9; Ps. 18:15; [2 Thess. 2:8]
  - type: text
    content: blast of your nostrils the waters piled up;
  - type: text
    content: 'the '
  - type: note
    content: Ps. 78:13; [Josh. 3:16; Hab. 3:10]
  - type: text
    content: floods stood up in a heap;
  - type: text
    content: the deeps congealed in the heart of the sea.
  '9':
  - type: text
    content: 'The enemy said, '
  - type: note
    content: ch. 14:9
  - type: text
    content: ‘I will pursue, I will overtake,
  - type: text
    content: 'I '
  - type: note
    content: Gen. 49:27; Judg. 5:30; Isa. 53:12; Luke 11:22
  - type: text
    content: will divide the spoil, my desire shall have its fill of them.
  - type: text
    content: I will draw my sword; my hand shall destroy them.’
