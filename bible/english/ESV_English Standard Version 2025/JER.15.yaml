document_id: JER.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Not Relent
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Ps. 99:6; [Ezek. 14:14]
  - type: text
    content: '“Though '
  - type: note
    content: '[Ps. 106:23]; See Ex. 32:11-13'
  - type: text
    content: 'Moses '
  - type: note
    content: '[1 Sam. 7:9; 8:6; 12:23; 15:11]'
  - type: text
    content: 'and Samuel '
  - type: note
    content: ch. 35:19; [ver. 19]
  - type: text
    content: 'stood before me, yet my heart would not turn toward this people. Send them out of my sight, and let them go! '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 20:14
  - type: text
    content: 'Woe is me, my mother, that you bore me, a man of strife and contention to the whole land! '
  - type: note
    content: Ex. 22:25; Ps. 15:5; Isa. 24:2
  - type: text
    content: 'I have not lent, nor have I borrowed, yet all of them curse me. '
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Have I not'
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' set you free for their good? Have I not pleaded for you before the enemy in the time of trouble and in the time of distress? '
  '12':
  - type: text
    content: 'Can one break iron, iron '
  - type: note
    content: See ch. 1:13
  - type: text
    content: from the north, and bronze?
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:3
  - type: text
    content: '“Your wealth and your treasures I will give as '
  - type: note
    content: Ps. 44:12
  - type: text
    content: 'spoil, without price, for all your sins, throughout all your territory. '
  '14':
  - type: text
    content: 'I will make you serve your enemies '
  - type: note
    content: ch. 9:16; 16:13; 17:4; 22:28
  - type: text
    content: 'in a land that you do not know, '
  - type: note
    content: Deut. 32:22
  - type: text
    content: for in my anger a fire is kindled that shall burn forever.”
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:3
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you know;'
  - type: note
    content: '[ Judg. 16:28 ]'
  - type: text
    content: remember me and visit me,
  - type: note
    content: '[ Judg. 16:28 ]'
  - type: note
    content: ch. 11:20; 20:12
  - type: text
    content: and take vengeance for me on my persecutors.
  - type: text
    content: In your forbearance take me not away;
  - type: note
    content: ch. 17:16
  - type: text
    content: 'know that '
  - type: note
    content: Ps. 69:7
  - type: text
    content: for your sake I bear reproach.
  '16':
  - type: text
    content: 'Your words were found, '
  - type: note
    content: Ezek. 3:1, 3; Rev. 10:9, 10
  - type: text
    content: and I ate them,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 119:111, 162
  - type: text
    content: your words became to me a joy
  - type: text
    content: and the delight of my heart,
  - type: note
    content: ch. 14:9
  - type: text
    content: for I am called by your name,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', God of hosts.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 26:4
  - type: text
    content: I did not sit in the company of revelers,
  - type: text
    content: nor did I rejoice;
  - type: note
    content: Ps. 102:7; Lam. 3:28
  - type: text
    content: I sat alone, because your hand was upon me,
  - type: text
    content: for you had filled me with indignation.
  '18':
  - type: text
    content: Why is my pain unceasing,
  - type: note
    content: ch. 30:15; Job 34:6
  - type: text
    content: my wound incurable,
  - type: text
    content: refusing to be healed?
  - type: text
    content: 'Will you be to me '
  - type: note
    content: Job 6:15; Isa. 58:11
  - type: text
    content: like a deceitful brook,
  - type: text
    content: like waters that fail?
  '19':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: ch. 3:14
  - type: text
    content: “If you return, I will restore you,
  - type: text
    content: 'and you shall '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: stand before me.
  - type: text
    content: If you utter what is precious, and not what is worthless,
  - type: text
    content: you shall be as my mouth.
  - type: text
    content: They shall turn to you,
  - type: text
    content: but you shall not turn to them.
  '2':
  - type: text
    content: 'And when they ask you, ‘Where shall we go?’ you shall say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: ch. 14:12; 16:4; 21:9; 43:11; Ezek. 5:12; 6:11, 12; Zech. 11:9
  - type: text
    content: “‘Those who are for pestilence, to pestilence,
  - type: text
    content: and those who are for the sword, to the sword;
  - type: text
    content: those who are for famine, to famine,
  - type: text
    content: and those who are for captivity, to captivity.’
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:18; 6:27 ]'
  - type: text
    content: And I will make you to this people
  - type: text
    content: a fortified wall of bronze;
  - type: text
    content: they will fight against you,
  - type: note
    content: ch. 1:19; 20:11
  - type: text
    content: but they shall not prevail over you,
  - type: note
    content: See ch. 1:8
  - type: text
    content: for I am with you
  - type: text
    content: to save you and deliver you,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: I will deliver you out of the hand of the wicked,
  - type: text
    content: 'and redeem you from the grasp of '
  - type: note
    content: Isa. 13:11; 25:4, 5; 29:5
  - type: text
    content: the ruthless.”
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 26:16-22
  - type: text
    content: 'I will appoint over them four kinds of destroyers, declares the '
  - type: text
    content: Lord
  - type: text
    content: ': the sword to kill, the dogs to tear, and '
  - type: note
    content: Deut. 28:26
  - type: text
    content: 'the birds of the air '
  - type: note
    content: Rev. 6:8
  - type: text
    content: 'and the beasts of the earth to devour and destroy. '
  '4':
  - type: note
    content: ch. 24:9; 29:18; 34:17; Deut. 28:25
  - type: text
    content: 'And I will make them a horror to all the kingdoms of the earth because of what '
  - type: note
    content: '[2 Kgs. 21:2, 11, 16, 17; 23:26; 24:3, 4]'
  - type: text
    content: Manasseh the son of Hezekiah, king of Judah, did in Jerusalem.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Isa. 51:19; [ Nah. 3:7 ]
  - type: text
    content: “Who will have pity on you, O Jerusalem,
  - type: note
    content: Isa. 51:19; [ Nah. 3:7 ]
  - type: text
    content: or who will grieve for you?
  - type: text
    content: Who will turn aside
  - type: text
    content: to ask about your welfare?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:15
  - type: text
    content: 'You have rejected me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: See ch. 7:24
  - type: text
    content: you keep going backward,
  - type: text
    content: so I have stretched out my hand against you and destroyed you—
  - type: note
    content: '[ Hos. 13:14 ]'
  - type: text
    content: I am weary of relenting.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 51:2; Isa. 41:16; Matt. 3:12; Luke 3:17 ]'
  - type: text
    content: 'I have winnowed them with '
  - type: note
    content: Isa. 30:24
  - type: text
    content: a winnowing fork
  - type: text
    content: in the gates of the land;
  - type: text
    content: I have bereaved them; I have destroyed my people;
  - type: note
    content: ch. 5:3; Isa. 9:13; Amos 4:6, 8-11
  - type: text
    content: they did not turn from their ways.
  '8':
  - type: text
    content: I have made their widows more in number
  - type: text
    content: 'than '
  - type: note
    content: Gen. 22:17; Ps. 139:18
  - type: text
    content: the sand of the seas;
  - type: text
    content: I have brought against the mothers of young men
  - type: text
    content: a destroyer at noonday;
  - type: text
    content: I have made anguish and terror
  - type: text
    content: fall upon them suddenly.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 2:5; [ Lam. 1:1 ]
  - type: text
    content: She who bore seven has grown feeble;
  - type: note
    content: Job 11:20
  - type: text
    content: she has fainted away;
  - type: note
    content: Amos 8:9
  - type: text
    content: her sun went down while it was yet day;
  - type: text
    content: she has been shamed and disgraced.
  - type: text
    content: And the rest of them I will give to the sword
  - type: text
    content: before their enemies,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Jeremiah’s Complaint
