  - type: text
    content: 'the region of Judea beyond the Jordan. '
  '10':
  - type: text
    content: 'The disciples said to him, “If such is the case of a man with his wife, it is better not to marry.” '
  '11':
  - type: text
    content: 'But he said to them, '
  - type: note
    content: 1 Cor. 7:2, 7-9, 17
  - type: text
