  - type: text
    content: whom it is given.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'For there are eunuchs who have been so from birth, and there are eunuchs who have been made eunuchs by men, and there are eunuchs who have made themselves eunuchs '
  - type: note
    content: '[1 Cor. 7:32]'
  - type: text
    content: for the sake of the kingdom of heaven. Let the one who is able to receive this receive it.”
  - type: heading
    content: Let the Children Come to Me
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-15, see Mark 10:13-16; Luke 18:15-17
  - type: text
    content: 'Then children were brought to him that he might lay his hands on them and pray. The disciples '
  - type: note
    content: Mark 10:48
  - type: text
    content: 'rebuked the people, '
  '14':
  - type: text
    content: 'but Jesus said, '
  - type: note
    content: ch. 18:3
  - type: text
    content: '“Let the little children '
  - type: note
    content: '[Mark 9:39]'
  - type: text
    content: come to me and do not hinder them, for to such belongs the kingdom of heaven.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: And he laid his hands on them and went away.
  - type: heading
    content: The Rich Young Man
  '16':
  - type: text
    content: ' '
  - type: note
    content: For ver. 16-29, see Mark 10:17-30; Luke 18:18-30; [ Luke 10:25-28 ]
  - type: text
    content: 'And behold, a man came up to him, saying, “Teacher, what good deed must I do to '
  - type: note
    content: '[ver. 29]'
  - type: text
    content: 'have '
  - type: note
    content: ch. 25:46; [ch. 18:8]
  - type: text
    content: 'eternal life?” '
  '17':
  - type: text
    content: 'And he said to him, '
  - type: text
    content: '“Why do you ask me about what is good? There is only one who is good. '
  - type: note
    content: Lev. 18:5; Neh. 9:29; Ezek. 20:11, 13, 21; Rom. 10:5; Gal. 3:12
  - type: text
    content: If you would enter life, keep the commandments.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'He said to him, “Which ones?” And Jesus said, '
  - type: note
    content: Rom. 13:9; Cited from Ex. 20:12-16; Deut. 5:16-20; [ch. 5:21, 27]
  - type: text
    content: “You shall not murder, You shall not commit adultery, You shall not steal, You shall not bear false witness,
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Honor your father and mother, and, '
  - type: note
    content: ch. 5:43; 22:39; Mark 12:31; Luke 10:27; Gal. 5:14; James 2:8; Cited from Lev. 19:18
  - type: text
    content: You shall love your neighbor as yourself.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:15
  - type: text
    content: large crowds followed him, and he healed them there.
  '20':
  - type: text
    content: 'The young man said to him, '
  - type: note
    content: '[Phil. 3:6]'
  - type: text
    content: '“All these I have kept. What do I still lack?” '
  '21':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“If you would be '
  - type: note
    content: See ch. 5:48
  - type: text
    content: 'perfect, go, '
  - type: note
    content: Luke 12:33; [Luke 16:9; 19:8; Acts 2:45; 4:34, 35; 1 Tim. 6:18, 19]
  - type: text
    content: 'sell what you possess and give to the poor, and you will have '
  - type: note
    content: ch. 6:19, 20
  - type: text
    content: treasure in heaven; and come, follow me.”
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[Ezek. 33:31]'
  - type: text
    content: When the young man heard this he went away sorrowful, for he had great possessions.
  '23':
  - type: text
    content: 'And Jesus said to his disciples, '
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: '[1 Cor. 1:26]; See ch. 13:22'
  - type: text
    content: only with difficulty will a rich person enter the kingdom of heaven.
  - type: text
    content: ' '
  '24':
  - type: note
    content: '[Mark 10:24]'
  - type: text
    content: 'Again I tell you, it is easier for a camel to go through the eye of a needle than for a rich person to enter '
  - type: note
    content: See ch. 12:28
  - type: text
    content: the kingdom of God.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'When the disciples heard this, they were greatly astonished, saying, “Who then can be saved?” '
  '26':
  - type: text
    content: 'But Jesus '
  - type: note
    content: Mark 10:21; Luke 22:61
  - type: text
    content: 'looked at them and said, '
  - type: note
    content: Gen. 18:14; Job 42:2; Jer. 32:17, 27; Zech. 8:6; Mark 14:36; Luke 1:37
  - type: text
    content: “With man this is impossible, but with God all things are possible.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then Peter said in reply, “See, '
  - type: note
    content: ch. 4:20, 22; Mark 1:18, 20
  - type: text
    content: 'we have left everything and followed you. What then will we have?” '
  '28':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Truly, I say to you, in the new world,
  - type: note
    content: Greek in the regeneration
  - type: text
    content: ' '
  - type: note
    content: See ch. 16:27
  - type: text
    content: 'when the Son of Man will sit on his glorious throne, you who have followed me '
  - type: note
    content: Luke 22:30; Rev. 3:21
  - type: text
    content: 'will also sit on twelve thrones, '
  - type: note
    content: '[1 Cor. 6:2]'
  - type: text
    content: judging the twelve tribes of Israel.
  - type: text
    content: ' '
  '29':
  - type: note
    content: '[Luke 14:26]'
  - type: text
    content: And everyone who has left houses or brothers or sisters or father or mother or children or lands, for my name’s sake, will receive a hundredfold
  - type: note
    content: Some manuscripts manifold
  - type: text
    content: ' '
  - type: text
    content: 'and will '
  - type: note
    content: '[ver. 16]; See ch. 25:34'
  - type: text
    content: inherit eternal life.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Pharisees came up to him and '
  - type: note
    content: John 8:6
  - type: text
    content: 'tested him by asking, '
  - type: note
    content: ch. 5:31
  - type: text
    content: '“Is it lawful to divorce one’s wife for any cause?” '
  '30':
  - type: text
    content: 'But '
  - type: note
    content: ch. 20:16; Mark 10:31; Luke 13:30
  - type: text
    content: 'many who are '
  - type: note
    content: '[ch. 21:31, 32]'
  - type: text
    content: first will be last, and the last first.
  '4':
  - type: text
    content: 'He answered, '
  - type: note
    content: Gen. 1:27; 2:18, 21-23; 5:2; [ch. 21:16]
  - type: text
    content: “Have you not read that he who created them from the beginning made them male and female,
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'and said, '
  - type: note
    content: Eph. 5:31; Cited from Gen. 2:24
  - type: text
    content: '‘Therefore a man shall leave his father and his mother and hold fast to his wife, and '
  - type: note
    content: 1 Cor. 6:16; [Mal. 2:15]
  - type: text
    content: the two shall become one flesh’?
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'So they are no longer two but one flesh. '
  - type: note
    content: 1 Cor. 7:10
  - type: text
    content: What therefore God has joined together, let not man separate.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'They said to him, '
  - type: note
    content: Deut. 24:1-4
  - type: text
    content: '“Why then did Moses command one to give a certificate of divorce and to send her away?” '
  '8':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“Because of your '
  - type: note
    content: Mark 16:14; [Mark 3:5; 6:52; Heb. 3:8]
  - type: text
    content: hardness of heart Moses allowed you to divorce your wives, but from the beginning it was not so.
  - type: text
    content: ' '
  '9':
  - type: note
    content: See ch. 5:32
  - type: text
    content: 'And I say to you: whoever divorces his wife, except for sexual immorality, and marries another, commits adultery.”'
  - type: note
    content: Some manuscripts add and whoever marries a divorced woman commits adultery; other manuscripts except for sexual immorality, makes her commit adultery, and whoever marries a divorced woman commits adultery
