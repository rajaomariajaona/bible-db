        - type: text
          text: Num. 26:29-33
      marker-yv: yv-n
    - type: text
      text: 'The sons of Manasseh: Asriel, whom his Aramean concubine bore; she bore '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
