document_id: 1CH.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Issachar
  - type: text
    content: The sons
  - type: note
    content: Syriac (compare Vulgate); Hebrew And to the sons
  - type: text
    content: ' of Issachar: Tola, '
  - type: note
    content: '[Num. 26:23]'
  - type: text
    content: 'Puah, '
  - type: note
    content: '[Gen. 46:13]'
  - type: text
    content: 'Jashub, and Shimron, four. '
  '10':
  - type: text
    content: 'The son of Jediael: Bilhan. And the sons of Bilhan: Jeush, Benjamin, Ehud, Chenaanah, Zethan, Tarshish, and Ahishahar. '
  '11':
  - type: text
    content: 'All these were the sons of Jediael according to the heads of their fathers’ houses, mighty warriors, 17,200, able to go to war. '
  '12':
  - type: text
    content: 'And Shuppim and Huppim were the sons of Ir, Hushim the son of '
  - type: note
    content: '[ch. 8:1]'
  - type: text
    content: Aher.
  - type: heading
    content: Descendants of Naphtali
  '13':
  - type: text
    content: ' '
  - type: note
    content: Num. 26:48-50
  - type: text
    content: 'The sons of Naphtali: '
  - type: note
    content: '[Num. 26:48]'
  - type: text
    content: 'Jahziel, Guni, Jezer and '
  - type: note
    content: '[Num. 26:49]'
  - type: text
    content: Shallum, the descendants of Bilhah.
  - type: heading
    content: Descendants of Manasseh
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-19, see Num. 26:29-33
  - type: text
    content: 'The sons of Manasseh: Asriel, whom his Aramean concubine bore; she bore '
  - type: note
    content: See Josh. 17:1
  - type: text
    content: 'Machir the father of Gilead. '
  '15':
  - type: text
    content: 'And Machir took a wife for Huppim and for Shuppim. The name of his sister was Maacah. And the name of the second was Zelophehad, and '
  - type: note
    content: Num. 27:1; 36:11; Josh. 17:3
  - type: text
    content: 'Zelophehad had daughters. '
  '16':
  - type: text
    content: 'And Maacah the wife of Machir bore a son, and she called his name Peresh; and the name of his brother was Sheresh; and his sons were Ulam and Rakem. '
  '17':
  - type: text
    content: 'The son of Ulam: '
  - type: note
    content: 1 Sam. 12:11
  - type: text
    content: 'Bedan. These were the sons of Gilead the son of Machir, son of Manasseh. '
  '18':
  - type: text
    content: 'And his sister Hammolecheth bore Ishhod, Abiezer, and Mahlah. '
  '19':
  - type: text
    content: The sons of Shemida were Ahian, Shechem, Likhi, and Aniam.
  - type: heading
    content: Descendants of Ephraim
  '2':
  - type: text
    content: 'The sons of Tola: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Shemuel, heads of their fathers’ houses, namely of Tola, mighty warriors of their generations, their number '
  - type: note
    content: 2 Sam. 24:1, 2, 9
  - type: text
    content: 'in the days of David being 22,600. '
  '20':
  - type: text
    content: 'The '
  - type: note
    content: Num. 26:35
  - type: text
    content: 'sons of Ephraim: Shuthelah, and Bered his son, Tahath his son, Eleadah his son, Tahath his son, '
  '21':
  - type: text
    content: 'Zabad his son, Shuthelah his son, and Ezer and Elead, whom the men of Gath who were born in the land killed, because they came down to raid their livestock. '
  '22':
  - type: text
    content: 'And Ephraim their father mourned many days, and his brothers came to comfort him. '
  '23':
  - type: text
    content: And Ephraim went in to his wife, and she conceived and bore a son. And he called his name Beriah, because disaster had befallen his house.
  - type: note
    content: Beriah sounds like the Hebrew for disaster
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'His daughter was Sheerah, who built both Lower and Upper '
  - type: note
    content: See Josh. 10:10, 11
  - type: text
    content: 'Beth-horon, and Uzzen-sheerah. '
  '25':
  - type: text
    content: 'Rephah was his son, Resheph his son, Telah his son, Tahan his son, '
  '26':
  - type: text
    content: 'Ladan his son, Ammihud his son, '
  - type: note
    content: Num. 1:10; 7:48
  - type: text
    content: 'Elishama his son, '
  '27':
  - type: text
    content: Nun
  - type: note
    content: Hebrew Non
  - type: text
    content: ' his son, '
  - type: note
    content: Num. 13:8, 16
  - type: text
    content: 'Joshua his son. '
  '28':
  - type: note
    content: Josh. 16:2, 3
  - type: text
    content: 'Their possessions and settlements were Bethel and its towns, and to the east Naaran, and to the west '
  - type: note
    content: Josh. 16:3
  - type: text
    content: 'Gezer and its towns, Shechem and its towns, and Ayyah and its towns; '
  '29':
  - type: note
    content: Josh. 17:7
  - type: text
    content: 'also in possession of the Manassites, '
  - type: note
    content: Josh. 17:11
  - type: text
    content: Beth-shean and its towns, Taanach and its towns, Megiddo and its towns, Dor and its towns. In these lived the sons of Joseph the son of Israel.
  - type: heading
    content: Descendants of Asher
  '3':
  - type: text
    content: The son
  - type: note
    content: Hebrew sons; also verses 10, 12, 17
  - type: text
    content: ' of Uzzi: Izrahiah. And the sons of Izrahiah: Michael, Obadiah, Joel, and Isshiah, all five of them were chief men. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Gen. 46:17; Num. 26:44
  - type: text
    content: 'The sons of Asher: Imnah, Ishvah, Ishvi, Beriah, and their sister Serah. '
  '31':
  - type: text
    content: 'The sons of Beriah: Heber, and Malchiel, who fathered Birzaith. '
  '32':
  - type: text
    content: 'Heber fathered Japhlet, Shomer, Hotham, and their sister Shua. '
  '33':
  - type: text
    content: 'The sons of Japhlet: Pasach, Bimhal, and Ashvath. These are the sons of Japhlet. '
  '34':
  - type: text
    content: 'The sons of Shemer his brother: Rohgah, Jehubbah, and Aram. '
  '35':
  - type: text
    content: 'The sons of Helem his brother: Zophah, Imna, Shelesh, and Amal. '
  '36':
  - type: text
    content: 'The sons of Zophah: Suah, Harnepher, Shual, Beri, Imrah. '
  '37':
  - type: text
    content: 'Bezer, Hod, Shamma, Shilshah, Ithran, and Beera. '
  '38':
  - type: text
    content: 'The sons of Jether: Jephunneh, Pispa, and Ara. '
  '39':
  - type: text
    content: 'The sons of Ulla: Arah, Hanniel, and Rizia. '
  '4':
  - type: text
    content: 'And along with them, by their generations, according to their fathers’ houses, were units of the army for war, 36,000, for they had many wives and sons. '
  '40':
  - type: text
    content: All of these were men of Asher, heads of fathers’ houses, approved, mighty warriors, chiefs of the princes. Their number enrolled by genealogies, for service in war, was 26,000 men.
  '5':
  - type: text
    content: Their kinsmen belonging to all the clans of Issachar were in all 87,000 mighty warriors, enrolled by genealogy.
  - type: heading
    content: Descendants of Benjamin
  '6':
  - type: text
    content: ' '
  - type: note
    content: Gen. 46:21; Num. 26:38; See ch. 8:1-40
  - type: text
    content: 'The sons of Benjamin: Bela, Becher, and Jediael, three. '
  '7':
  - type: text
    content: 'The sons of Bela: Ezbon, Uzzi, Uzziel, Jerimoth, and Iri, five, heads of fathers’ houses, mighty warriors. And their enrollment by genealogies was 22,034. '
  '8':
  - type: text
    content: 'The sons of Becher: Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, '
  - type: note
    content: '[ch. 6:60]'
  - type: text
    content: 'Anathoth, and Alemeth. All these were the sons of Becher. '
  '9':
  - type: text
    content: 'And their enrollment by genealogies, according to their generations, as heads of their fathers’ houses, mighty warriors, was 20,200. '
