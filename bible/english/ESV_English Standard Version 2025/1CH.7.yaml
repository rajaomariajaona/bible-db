      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 17:1
      marker-yv: yv-n
    - type: text
      text: 'Machir the father of Gilead. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Machir took a wife for Huppim and for Shuppim. The name of his sister was Maacah. And the name of the second was Zelophehad, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 27:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 17:3
      marker-yv: yv-n
    - type: text
      text: 'Zelophehad had daughters. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Maacah the wife of Machir bore a son, and she called his name Peresh; and the name of his brother was Sheresh; and his sons were Ulam and Rakem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The son of Ulam: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 12:11
      marker-yv: yv-n
    - type: text
      text: 'Bedan. These were the sons of Gilead the son of Machir, son of Manasseh. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And his sister Hammolecheth bore Ishhod, Abiezer, and Mahlah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The sons of Shemida were Ahian, Shechem, Likhi, and Aniam.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Ephraim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The sons of Tola: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Shemuel, heads of their fathers’ houses, namely of Tola, mighty warriors of their generations, their number '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 24:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'in the days of David being 22,600. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 26:35
      marker-yv: yv-n
    - type: text
      text: 'sons of Ephraim: Shuthelah, and Bered his son, Tahath his son, Eleadah his son, Tahath his son, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Zabad his son, Shuthelah his son, and Ezer and Elead, whom the men of Gath who were born in the land killed, because they came down to raid their livestock. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Ephraim their father mourned many days, and his brothers came to comfort him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And Ephraim went in to his wife, and she conceived and bore a son. And he called his name Beriah, because disaster had befallen his house.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beriah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: disaster
      marker-yv: yv-n
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'His daughter was Sheerah, who built both Lower and Upper '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 10:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      marker-yv: yv-n
    - type: text
      text: 'Beth-horon, and Uzzen-sheerah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rephah was his son, Resheph his son, Telah his son, Tahan his son, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
