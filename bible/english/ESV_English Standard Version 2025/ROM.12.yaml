document_id: ROM.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Living Sacrifice
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 1:10; 2 Cor. 10:1; Eph. 4:1
  - type: text
    content: I appeal to you therefore, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' by the mercies of God, '
  - type: note
    content: ch. 6:13, 16, 19; [Ps. 50:13, 14; 1 Cor. 6:20]; See 1 Pet. 2:5
  - type: text
    content: 'to present your bodies '
  - type: note
    content: Heb. 10:20
  - type: text
    content: as a living sacrifice, holy and acceptable to God, which is your spiritual worship.
  - type: note
    content: Or your rational service
  - type: text
    content: ' '
  '10':
  - type: note
    content: See Heb. 13:1
  - type: text
    content: 'Love one another with brotherly affection. '
  - type: note
    content: ch. 13:7; Phil. 2:3; 1 Pet. 2:17
  - type: text
    content: 'Outdo one another in showing honor. '
  '11':
  - type: text
    content: 'Do not be slothful in zeal, '
  - type: note
    content: Acts 18:25
  - type: text
    content: be fervent in spirit,
  - type: note
    content: Or fervent in the Spirit
  - type: text
    content: ' '
  - type: note
    content: Acts 20:19
  - type: text
    content: 'serve the Lord. '
  '12':
  - type: note
    content: See ch. 5:2
  - type: text
    content: 'Rejoice in hope, '
  - type: note
    content: See Heb. 10:36
  - type: text
    content: 'be patient in tribulation, '
  - type: note
    content: See Acts 1:14
  - type: text
    content: 'be constant in prayer. '
  '13':
  - type: note
    content: ch. 15:25; 1 Cor. 16:1, 15; 2 Cor. 9:1, 12; Heb. 6:10; 13:16; [1 Tim. 6:18]
  - type: text
    content: 'Contribute to the needs of the saints and '
  - type: note
    content: See Matt. 25:35
  - type: text
    content: seek to show hospitality.
  '14':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 5:44; 1 Pet. 3:9
  - type: text
    content: 'Bless those who persecute you; bless and do not curse them. '
  '15':
  - type: note
    content: 1 Cor. 12:26; [Job 30:25; Heb. 13:3]
  - type: text
    content: 'Rejoice with those who rejoice, weep with those who weep. '
  '16':
  - type: note
    content: ch. 15:5; 2 Cor. 13:11; Phil. 2:2; 4:2; 1 Pet. 3:8
  - type: text
    content: 'Live in harmony with one another. '
  - type: note
    content: ver. 3; Ps. 131:1; Jer. 45:5
  - type: text
    content: Do not be haughty, but associate with the lowly.
  - type: note
    content: Or give yourselves to humble tasks
  - type: text
    content: ' '
  - type: note
    content: ch. 11:25; Prov. 3:7
  - type: text
    content: 'Never be wise in your own sight. '
  '17':
  - type: note
    content: Prov. 20:22; Matt. 5:39; [ch. 14:19]
  - type: text
    content: 'Repay no one evil for evil, but '
  - type: note
    content: 2 Cor. 8:21; [ch. 14:16]
  - type: text
    content: 'give thought to do what is honorable in the sight of all. '
  '18':
  - type: text
    content: 'If possible, so far as it depends on you, '
  - type: note
    content: See Mark 9:50
  - type: text
    content: 'live peaceably with all. '
  '19':
  - type: text
    content: 'Beloved, '
  - type: note
    content: Prov. 20:22; Matt. 5:39; [ch. 14:19]
  - type: text
    content: never avenge yourselves, but leave it
  - type: note
    content: Greek give place
  - type: text
    content: ' to the wrath of God, for it is written, '
  - type: note
    content: Heb. 10:30; Cited from Deut. 32:35; [Ps. 94:1; 1 Thess. 4:6]
  - type: text
    content: '“Vengeance is mine, I will repay, says the Lord.” '
  '2':
  - type: note
    content: 1 Pet. 1:14; [1 John 2:15]
  - type: text
    content: Do not be conformed to this world,
  - type: note
    content: Greek age
  - type: text
    content: ' but be transformed by '
  - type: note
    content: Titus 3:5; [Ps. 51:10; 2 Cor. 4:16; Eph. 4:23; Col. 3:10]
  - type: text
    content: 'the renewal of your mind, that by testing you may '
  - type: note
    content: Eph. 5:10; 1 Thess. 4:3
  - type: text
    content: discern what is the will of God, what is good and acceptable and perfect.
  - type: note
    content: Or what is the good and acceptable and perfect will of God
  - type: heading
    content: Gifts of Grace
  '20':
  - type: text
    content: 'To the contrary, '
  - type: note
    content: Cited from Prov. 25:21, 22; [Ex. 23:4, 5; 2 Kgs. 6:22; Luke 6:27]
  - type: text
    content: '“if your enemy is hungry, feed him; if he is thirsty, give him something to drink; for by so doing you will heap burning coals on his head.” '
  '21':
  - type: text
    content: Do not be overcome by evil, but overcome evil with good.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'by the grace given to me I say to everyone among you '
  - type: note
    content: ver. 16; ch. 11:20
  - type: text
    content: 'not to think of himself more highly than he ought to think, but to think with sober judgment, '
  - type: note
    content: 1 Cor. 7:17
  - type: text
    content: 'each according to '
  - type: note
    content: Eph. 4:7
  - type: text
    content: 'the measure of faith that God has assigned. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 12:12-14; Eph. 4:4, 16
  - type: text
    content: as in one body we have many members,
  - type: note
    content: Greek parts; also verse 5
  - type: text
    content: ' and the members do not all have the same function, '
  '5':
  - type: text
    content: 'so we, '
  - type: note
    content: 1 Cor. 10:17, 33
  - type: text
    content: 'though many, '
  - type: note
    content: 1 Cor. 12:20; Eph. 4:13; See John 17:11
  - type: text
    content: 'are one body in Christ, and individually '
  - type: note
    content: Eph. 4:25; [1 Cor. 6:15; 12:27]
  - type: text
    content: 'members one of another. '
  '6':
  - type: note
    content: 1 Cor. 12:4; 1 Pet. 4:10, 11; [1 Cor. 7:7; 12:7-11]
  - type: text
    content: 'Having gifts that differ according to the grace given to us, let us use them: if '
  - type: note
    content: 1 Cor. 12:10; See Acts 13:1
  - type: text
    content: 'prophecy, '
  - type: note
    content: '[2 Tim. 2:15]'
  - type: text
    content: 'in proportion to our faith; '
  '7':
  - type: text
    content: 'if '
  - type: note
    content: See Acts 6:1
  - type: text
    content: 'service, in our serving; the one who teaches, in his teaching; '
  '8':
  - type: text
    content: 'the one who exhorts, in his exhortation; the one who contributes, in generosity; '
  - type: note
    content: 1 Tim. 5:17; [1 Cor. 12:28]
  - type: text
    content: the one who leads,
  - type: note
    content: Or gives aid
  - type: text
    content: ' with zeal; the one who does acts of mercy, with '
  - type: note
    content: 2 Cor. 9:7
  - type: text
    content: cheerfulness.
  - type: heading
    content: Marks of the True Christian
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 6:6; 1 Tim. 1:5; 1 Pet. 1:22
  - type: text
    content: 'Let love be genuine. '
  - type: note
    content: Ps. 97:10; 101:3; Amos 5:15; [1 Thess. 5:21, 22]
  - type: text
    content: 'Abhor what is evil; hold fast to what is good. '
