document_id: 1SA.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Defeats the Ammonites
  - type: text
    content: ' '
  - type: note
    content: ch. 12:12
  - type: text
    content: 'Then Nahash the Ammonite went up and besieged '
  - type: note
    content: Judg. 21:8
  - type: text
    content: 'Jabesh-gilead, and all the men of Jabesh said to Nahash, '
  - type: note
    content: Gen. 26:28; 1 Kgs. 20:34; Ezek. 17:13; [Ex. 23:32; 34:12, 15; Deut. 7:2]
  - type: text
    content: '“Make a treaty with us, and we will serve you.” '
  '10':
  - type: text
    content: 'Therefore the men of Jabesh said, '
  - type: note
    content: ver. 3
  - type: text
    content: '“Tomorrow we will give ourselves up to you, and you may do to us whatever seems good to you.” '
  '11':
  - type: note
    content: '[ch. 31:11]'
  - type: text
    content: 'And the next day Saul put the people '
  - type: note
    content: Judg. 7:16
  - type: text
    content: in three companies. And they came into the midst of the camp in the morning watch and struck down the Ammonites until the heat of the day. And those who survived were scattered, so that no two of them were left together.
  - type: heading
    content: The Kingdom Is Renewed
  '12':
  - type: text
    content: 'Then the people said to Samuel, '
  - type: note
    content: ch. 10:27
  - type: text
    content: '“Who is it that said, ‘Shall Saul reign over us?’ '
  - type: note
    content: '[Luke 19:27]'
  - type: text
    content: 'Bring the men, that we may put them to death.” '
  '13':
  - type: text
    content: 'But Saul said, '
  - type: note
    content: 2 Sam. 19:22
  - type: text
    content: '“Not a man shall be put to death this day, for today '
  - type: note
    content: '[ch. 19:5; Ex. 14:13]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has worked '
  - type: note
    content: ver. 9
  - type: text
    content: 'salvation in Israel.” '
  '14':
  - type: text
    content: 'Then Samuel said to the people, “Come, let us go to Gilgal and there renew the kingdom.” '
  '15':
  - type: text
    content: 'So all the people went to '
  - type: note
    content: ch. 10:8
  - type: text
    content: 'Gilgal, and there they made Saul king '
  - type: note
    content: ch. 15:33; [ch. 10:17; Judg. 11:11]
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ' in Gilgal. There '
  - type: note
    content: ch. 10:8
  - type: text
    content: 'they sacrificed peace offerings before the '
  - type: text
    content: Lord
  - type: text
    content: ', and there Saul and all the men of Israel rejoiced greatly.'
  '2':
  - type: text
    content: 'But Nahash the Ammonite said to them, “On this condition I will make a treaty with you, '
  - type: note
    content: '[Num. 16:14]'
  - type: text
    content: 'that I gouge out all your right eyes, and thus '
  - type: note
    content: ch. 17:26; Gen. 34:14
  - type: text
    content: 'bring disgrace on all Israel.” '
  '3':
  - type: text
    content: 'The elders of Jabesh said to him, “Give us seven days’ respite that we may send messengers through all the territory of Israel. Then, if there is no one to save us, we will give ourselves up to you.” '
  '4':
  - type: text
    content: 'When the messengers came to '
  - type: note
    content: ch. 10:26
  - type: text
    content: 'Gibeah of Saul, they reported the matter in the ears of the people, '
  - type: note
    content: Judg. 2:4; 21:2
  - type: text
    content: and all the people wept aloud.
  '5':
  - type: text
    content: 'Now, behold, Saul was coming from the field behind the oxen. And Saul said, “What is wrong with the people, that they are weeping?” So they told him the news of the men of Jabesh. '
  '6':
  - type: note
    content: See ch. 10:6, 10
  - type: text
    content: 'And the Spirit of God rushed upon Saul when he heard these words, and his anger was greatly kindled. '
  '7':
  - type: text
    content: 'He took a yoke of oxen '
  - type: note
    content: '[Judg. 19:29]'
  - type: text
    content: 'and cut them in pieces and sent them throughout all the territory of Israel by the hand of the messengers, saying, '
  - type: note
    content: Judg. 21:5, 8, 10
  - type: text
    content: '“Whoever does not come out after Saul and Samuel, so shall it be done to his oxen!” Then the dread of the '
  - type: text
    content: Lord
  - type: text
    content: ' fell upon the people, and they came out '
  - type: note
    content: Judg. 20:1
  - type: text
    content: 'as one man. '
  '8':
  - type: text
    content: 'When he mustered them at '
  - type: note
    content: Judg. 1:5
  - type: text
    content: 'Bezek, '
  - type: note
    content: '[Judg. 20:15-17; 2 Sam. 24:9]'
  - type: text
    content: 'the people of Israel were three hundred thousand, and the men of Judah thirty thousand. '
  '9':
  - type: text
    content: 'And they said to the messengers who had come, “Thus shall you say to the men of Jabesh-gilead: ‘Tomorrow, by the time the sun is hot, you shall have '
  - type: note
    content: ver. 13
  - type: text
    content: 'salvation.’” When the messengers came and told the men of Jabesh, they were glad. '
