document_id: JON.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Goes to Nineveh
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jonah the second time, saying, '
  '10':
  - type: text
    content: 'When God saw what they did, '
  - type: note
    content: '[Jer. 18:8]'
  - type: text
    content: 'how they turned from their evil way, '
  - type: note
    content: '[Jer. 18:8]'
  - type: text
    content: God relented of the disaster that he had said he would do to them, and he did not do it.
  '2':
  - type: text
    content: '“Arise, go to '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'Nineveh, that great city, and call out against it the message that I tell you.” '
  '3':
  - type: text
    content: 'So Jonah arose and went to Nineveh, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. Now '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: Nineveh was an exceedingly great city,
  - type: note
    content: Hebrew a great city to God
  - type: text
    content: ' three days’ journey in breadth.'
  - type: note
    content: Or a visit was a three days’ journey
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Jonah began to go into the city, going a day’s journey. And he called out, “Yet forty days, and Nineveh shall be overthrown!” '
  '5':
  - type: note
    content: '[Matt. 12:41; Luke 11:32]'
  - type: text
    content: 'And the people of Nineveh believed God. '
  - type: note
    content: See 2 Chr. 20:3
  - type: text
    content: 'They called for a fast and '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: put on sackcloth, from the greatest of them to the least of them.
  - type: heading
    content: The People of Nineveh Repent
  '6':
  - type: text
    content: The word reached
  - type: note
    content: Or had reached
  - type: text
    content: ' the king of Nineveh, and '
  - type: note
    content: '[Job 1:20; Ezek. 26:16]'
  - type: text
    content: 'he arose from his throne, removed his robe, covered himself with sackcloth, '
  - type: note
    content: Job 2:8
  - type: text
    content: 'and sat in ashes. '
  '7':
  - type: text
    content: 'And he issued a proclamation and published through Nineveh, '
  - type: note
    content: '[Dan. 6:26]'
  - type: text
    content: '“By the decree of the king and his nobles: Let neither man nor '
  - type: note
    content: '[ch. 4:11; Ps. 36:6; Joel 1:18, 20]'
  - type: text
    content: 'beast, herd nor flock, taste anything. Let them not feed or drink water, '
  '8':
  - type: text
    content: 'but let man and '
  - type: note
    content: '[See ver. 7above]'
  - type: text
    content: 'beast be covered with sackcloth, and let them call out mightily to God. '
  - type: note
    content: Jer. 18:11; 36:3
  - type: text
    content: 'Let everyone turn from his evil way and from '
  - type: note
    content: Isa. 59:6
  - type: text
    content: 'the violence that is in his hands. '
  '9':
  - type: note
    content: 2 Sam. 12:22; Joel 2:14
  - type: text
    content: 'Who knows? God may turn and relent '
  - type: note
    content: Ps. 85:3
  - type: text
    content: and turn from his fierce anger, so that we may not perish.”
