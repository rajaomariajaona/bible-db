document_id: JDG.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abimelech’s Conspiracy
  - type: text
    content: 'Now Abimelech the son of Jerubbaal went to Shechem to '
  - type: note
    content: ch. 8:31
  - type: text
    content: 'his mother’s relatives and said to them and to the whole clan of his mother’s family, '
  '10':
  - type: text
    content: 'And the trees said to the fig tree, ‘You come and reign over us.’ '
  '11':
  - type: text
    content: 'But the fig tree said to them, ‘Shall I leave my sweetness and my good fruit and go hold sway over the trees?’ '
  '12':
  - type: text
    content: 'And the trees said to the vine, ‘You come and reign over us.’ '
  '13':
  - type: text
    content: 'But the vine said to them, ‘Shall I leave my wine that '
  - type: note
    content: Ps. 104:15
  - type: text
    content: 'cheers God and men and go hold sway over the trees?’ '
  '14':
  - type: text
    content: 'Then all the trees said to the bramble, ‘You come and reign over us.’ '
  '15':
  - type: text
    content: 'And the bramble said to the trees, ‘If in good faith you are anointing me king over you, then come and '
  - type: note
    content: Dan. 4:12; Hos. 14:7; [Isa. 30:2]
  - type: text
    content: 'take refuge in my shade, but if not, '
  - type: note
    content: ver. 20; [Num. 21:28; Ezek. 19:14]
  - type: text
    content: 'let fire come out of the bramble and devour '
  - type: note
    content: 1 Kgs. 4:33; 2 Kgs. 14:9; 19:23; Ps. 104:16; Isa. 2:13; 37:24
  - type: text
    content: the cedars of Lebanon.’
  '16':
  - type: text
    content: '“Now therefore, if you acted in good faith and integrity when you made Abimelech king, and if you have dealt well with '
  - type: note
    content: See ch. 6:32
  - type: text
    content: 'Jerubbaal and his house and have done to him '
  - type: note
    content: Prov. 12:14; Isa. 3:11; [ch. 8:35]
  - type: text
    content: 'as his deeds deserved— '
  '17':
  - type: text
    content: 'for my father fought for you and risked his life and delivered you from the hand of Midian, '
  '18':
  - type: text
    content: 'and you have risen up against my father’s house this day '
  - type: note
    content: ver. 5, 6
  - type: text
    content: 'and have killed his sons, seventy men on one stone, and have made '
  - type: note
    content: ch. 8:31
  - type: text
    content: 'Abimelech, the son of his female servant, king over the leaders of Shechem, '
  - type: note
    content: ver. 3
  - type: text
    content: 'because he is your relative— '
  '19':
  - type: text
    content: 'if you then have acted in good faith and integrity with Jerubbaal and with his house this day, then '
  - type: note
    content: '[Isa. 8:6]'
  - type: text
    content: 'rejoice in Abimelech, and let him also rejoice in you. '
  '2':
  - type: text
    content: '“Say in the ears of all the leaders of Shechem, ‘Which is better for you, that all '
  - type: note
    content: ch. 8:30
  - type: text
    content: 'seventy of the sons of Jerubbaal rule over you, or that one rule over you?’ Remember also that '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'I am '
  - type: note
    content: Gen. 29:14
  - type: text
    content: your bone and your flesh.”
  '20':
  - type: text
    content: 'But if not, '
  - type: note
    content: ver. 15; [ver. 56, 57]
  - type: text
    content: 'let fire come out from Abimelech and devour the leaders of Shechem and Beth-millo; and let fire come out from the leaders of Shechem and from Beth-millo and devour Abimelech.” '
  '21':
  - type: text
    content: 'And Jotham ran away and fled and went to '
  - type: note
    content: Num. 21:16
  - type: text
    content: Beer and lived there, because of Abimelech his brother.
  - type: heading
    content: The Downfall of Abimelech
  '22':
  - type: text
    content: 'Abimelech ruled over Israel three years. '
  '23':
  - type: note
    content: '[1 Sam. 16:14; 18:10; 19:9]'
  - type: text
    content: 'And God sent an evil spirit between Abimelech and the leaders of Shechem, and the leaders of Shechem '
  - type: note
    content: Isa. 33:1
  - type: text
    content: 'dealt treacherously with Abimelech, '
  '24':
  - type: note
    content: ver. 56; [1 Kgs. 2:32; Esth. 9:25; Ps. 7:16; Matt. 23:35, 36]
  - type: text
    content: 'that the violence done to the seventy sons of Jerubbaal might come, and their blood be laid on Abimelech their brother, who killed them, and on the men of Shechem, who strengthened his hands to kill his brothers. '
  '25':
  - type: text
    content: And the leaders of Shechem put men in ambush against him on the mountaintops, and they robbed all who passed by them along that way. And it was told to Abimelech.
  '26':
  - type: text
    content: 'And Gaal the son of Ebed moved into Shechem with his relatives, and the leaders of Shechem put confidence in him. '
  '27':
  - type: text
    content: 'And they went out into the field and gathered the grapes from their vineyards and trod them and held a festival; and they went into '
  - type: note
    content: ver. 4, 46
  - type: text
    content: 'the house of their god and ate and drank and reviled Abimelech. '
  '28':
  - type: text
    content: 'And Gaal the son of Ebed said, '
  - type: note
    content: '[1 Sam. 25:10]'
  - type: text
    content: '“Who is Abimelech, and who are we of Shechem, that we should serve him? Is he not the son of Jerubbaal, and is not Zebul his officer? Serve the men of '
  - type: note
    content: Gen. 34:2, 6
  - type: text
    content: 'Hamor the father of Shechem; but why should we serve him? '
  '29':
  - type: text
    content: Would that this people were under my hand! Then I would remove Abimelech. I would say
  - type: note
    content: Septuagint; Hebrew and he said
  - type: text
    content: ' to Abimelech, ‘Increase your army, and come out.’”'
  '3':
  - type: text
    content: 'And his mother’s relatives spoke all these words on his behalf in the ears of all the leaders of Shechem, and their hearts inclined to follow Abimelech, for they said, '
  - type: note
    content: ver. 18
  - type: text
    content: '“He is our brother.” '
  '30':
  - type: text
    content: 'When Zebul the ruler of the city heard the words of Gaal the son of Ebed, his anger was kindled. '
  '31':
  - type: text
    content: And he sent messengers to Abimelech secretly,
  - type: note
    content: Or at Tormah
  - type: text
    content: ' saying, “Behold, Gaal the son of Ebed and his relatives have come to Shechem, and they are stirring up'
  - type: note
    content: Hebrew besieging, or closing up
  - type: text
    content: ' the city against you. '
  '32':
  - type: text
    content: 'Now therefore, go by night, you and the people who are with you, and set an ambush in the field. '
  '33':
  - type: text
    content: 'Then in the morning, as soon as the sun is up, rise early and rush upon the city. And when he and the people who are with him come out against you, you may do to them '
  - type: note
    content: Eccles. 9:10
  - type: text
    content: as your hand finds to do.”
  '34':
  - type: text
    content: 'So Abimelech and all the men who were with him rose up by night and set an ambush against Shechem in four companies. '
  '35':
  - type: text
    content: 'And Gaal the son of Ebed went out and stood in the entrance of the gate of the city, and Abimelech and the people who were with him rose from the ambush. '
  '36':
  - type: text
    content: 'And when Gaal saw the people, he said to Zebul, “Look, people are coming down from '
  - type: note
    content: ver. 7, 25
  - type: text
    content: the mountaintops!” And Zebul said to him, “You mistake
  - type: note
    content: Hebrew You see
  - type: text
    content: ' the shadow of the mountains for men.” '
  '37':
  - type: text
    content: 'Gaal spoke again and said, “Look, people are coming down from the center of the land, and one company is coming from the direction of the Diviners’ Oak.” '
  '38':
  - type: text
    content: 'Then Zebul said to him, “Where is your mouth now, you who said, '
  - type: note
    content: ver. 28, 29
  - type: text
    content: '‘Who is Abimelech, that we should serve him?’ Are not these the people whom you despised? Go out now and fight with them.” '
  '39':
  - type: text
    content: 'And Gaal went out at the head of the leaders of Shechem and fought with Abimelech. '
  '4':
  - type: text
    content: 'And they gave him seventy pieces of silver out of the house of '
  - type: note
    content: ch. 8:33; [ver. 46]
  - type: text
    content: 'Baal-berith with which Abimelech hired '
  - type: note
    content: ch. 11:3; 2 Chr. 13:7; [Prov. 12:11; Acts 17:5]
  - type: text
    content: 'worthless and reckless fellows, who followed him. '
  '40':
  - type: text
    content: 'And Abimelech chased him, and he fled before him. And many fell wounded, up to the entrance of the gate. '
  '41':
  - type: text
    content: And Abimelech lived at Arumah, and Zebul drove out Gaal and his relatives, so that they could not dwell at Shechem.
  '42':
  - type: text
    content: 'On the following day, the people went out into the field, and Abimelech was told. '
  '43':
  - type: text
    content: 'He took his people and divided them into three companies and set an ambush in the fields. And he looked and saw the people coming out of the city. So he rose against them and killed them. '
  '44':
  - type: text
    content: 'Abimelech and the company that was with him '
  - type: note
    content: ch. 20:37
  - type: text
    content: 'rushed forward and stood at the entrance of the gate of the city, while the two companies rushed upon all who were in the field and killed them. '
  '45':
  - type: text
    content: 'And Abimelech fought against the city all that day. He captured the city and killed the people who were in it, and '
  - type: note
    content: 2 Kgs. 3:25
  - type: text
    content: 'he razed the city and '
  - type: note
    content: Deut. 29:23
  - type: text
    content: sowed it with salt.
  '46':
  - type: text
    content: 'When all the leaders of the Tower of Shechem heard of it, they entered '
  - type: note
    content: ver. 49
  - type: text
    content: 'the stronghold of the house of '
  - type: note
    content: ver. 4; ch. 8:33
  - type: text
    content: 'El-berith. '
  '47':
  - type: text
    content: 'Abimelech was told that all the leaders of the Tower of Shechem were gathered together. '
  '48':
  - type: text
    content: 'And Abimelech went up to Mount '
  - type: note
    content: Ps. 68:14
  - type: text
    content: 'Zalmon, he and all the people who were with him. And Abimelech took an axe in his hand and cut down a bundle of brushwood and took it up and laid it on his shoulder. And he said to the men who were with him, “What you have seen me do, hurry and do as I have done.” '
  '49':
  - type: text
    content: 'So every one of the people cut down his bundle and following Abimelech put it against '
  - type: note
    content: ver. 46
  - type: text
    content: the stronghold, and they set the stronghold on fire over them, so that all the people of the Tower of Shechem also died, about 1,000 men and women.
  '5':
  - type: text
    content: 'And he went to his father’s house at '
  - type: note
    content: ch. 6:24
  - type: text
    content: 'Ophrah '
  - type: note
    content: '[2 Kgs. 11:1, 2]'
  - type: text
    content: 'and killed his brothers the sons of Jerubbaal, seventy men, on one stone. But Jotham the youngest son of Jerubbaal was left, for he hid himself. '
  '50':
  - type: text
    content: 'Then Abimelech went to Thebez and encamped against Thebez and captured it. '
  '51':
  - type: text
    content: 'But there was a strong tower within the city, and all the men and women and all the leaders of the city fled to it and shut themselves in, and they went up to the roof of the tower. '
  '52':
  - type: text
    content: 'And Abimelech came to the tower and fought against it and drew near to the door of the tower to burn it with fire. '
  '53':
  - type: note
    content: 2 Sam. 11:21
  - type: text
    content: 'And a certain woman threw an upper millstone on Abimelech’s head and crushed his skull. '
  '54':
  - type: note
    content: '[1 Sam. 31:4]'
  - type: text
    content: 'Then he called quickly to the young man his armor-bearer and said to him, “Draw your sword and kill me, lest they say of me, ‘A woman killed him.’” And his young man thrust him through, and he died. '
  '55':
  - type: text
    content: 'And when the men of Israel saw that Abimelech was dead, everyone departed to his home. '
  '56':
  - type: note
    content: '[Job 31:8; Ps. 94:23; Prov. 5:22]; See ver. 24'
  - type: text
    content: 'Thus God returned the evil of Abimelech, which he committed against his father in killing his seventy brothers. '
  '57':
  - type: text
    content: 'And God also made all the evil of the men of Shechem return on their heads, and upon them came '
  - type: note
    content: ver. 20
  - type: text
    content: the curse of Jotham the son of Jerubbaal.
  '6':
  - type: text
    content: 'And all the leaders of Shechem came together, and all '
  - type: note
    content: ver. 20; [2 Sam. 5:9]
  - type: text
    content: Beth-millo, and they went and made Abimelech king, by the oak of the pillar at Shechem.
  '7':
  - type: text
    content: 'When it was told to Jotham, he went and stood on top of '
  - type: note
    content: Deut. 11:29; 27:12; Josh. 8:33; [John 4:20]
  - type: text
    content: 'Mount Gerizim and cried aloud and said to them, “Listen to me, you leaders of Shechem, that God may listen to you. '
  '8':
  - type: note
    content: '[2 Kgs. 14:9]'
  - type: text
    content: 'The trees once went out to anoint a king over them, and they said to the olive tree, '
  - type: note
    content: ch. 8:22, 23
  - type: text
    content: '‘Reign over us.’ '
  '9':
  - type: text
    content: 'But the olive tree said to them, ‘Shall I leave my abundance, by which gods and men are honored, and go hold sway over the trees?’ '
