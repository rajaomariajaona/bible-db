document_id: DEU.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ten Commandments
  - type: text
    content: 'And Moses summoned all Israel and said to them, “Hear, O Israel, the statutes and the rules that I speak in your hearing today, and you shall learn them and be careful to do them. '
  '10':
  - type: text
    content: 'but showing steadfast love to '
  - type: note
    content: Ex. 20:6; Jer. 32:18
  - type: text
    content: thousands
  - type: note
    content: Or to the thousandth generation
  - type: text
    content: ' of those who love me and keep my commandments.'
  '11':
  - type: text
    content: '“‘You shall not take the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in vain, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will not hold him guiltless who takes his name in vain.'
  '12':
  - type: text
    content: '“‘Observe the Sabbath day, to keep it holy, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you. '
  '13':
  - type: text
    content: 'Six days you shall labor and do all your work, '
  '14':
  - type: text
    content: 'but '
  - type: note
    content: Ex. 16:29, 30; Heb. 4:4
  - type: text
    content: 'the seventh day is a Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. On it you shall not do any work, you or your son or your daughter or your male servant or your female servant, or your ox or your donkey or any of your livestock, or the sojourner who is within your gates, '
  - type: note
    content: '[Ex. 23:12]'
  - type: text
    content: 'that your male servant and your female servant may rest as well as you. '
  '15':
  - type: note
    content: ch. 15:15; 16:12; 24:18, 22
  - type: text
    content: You shall remember that you were a slave
  - type: note
    content: Or servant
  - type: text
    content: ' in the land of Egypt, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brought you out from there '
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'with a mighty hand and an outstretched arm. Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you to keep the Sabbath day.'
  '16':
  - type: text
    content: '“‘Honor your father and your mother, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you, '
  - type: note
    content: See ch. 4:40
  - type: text
    content: 'that your days may be long, and that it may go well with you in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Matt. 5:21, 27; Luke 18:20; James 2:11
  - type: text
    content: “‘You shall not murder.
  - type: note
    content: The Hebrew word also covers causing human death through carelessness or negligence
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: “‘And you shall not commit adultery.
  '19':
  - type: text
    content: “‘And you shall not steal.
  '2':
  - type: note
    content: ch. 4:23; Ex. 19:5
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' our God made a covenant with us in Horeb. '
  '20':
  - type: text
    content: “‘And you shall not bear false witness against your neighbor.
  '21':
  - type: text
    content: “‘And you shall not covet your neighbor’s wife. And you shall not desire your neighbor’s house, his field, or his male servant, or his female servant, his ox, or his donkey, or anything that is your neighbor’s.’
  '22':
  - type: text
    content: '“These words the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to all your assembly '
  - type: note
    content: See ch. 4:11
  - type: text
    content: 'at the mountain out of the midst of the fire, the cloud, and the thick darkness, with a loud voice; and he added no more. And '
  - type: note
    content: ch. 9:10, 11; Ex. 24:12
  - type: text
    content: 'he wrote them on two tablets of stone and gave them to me. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 4:12
  - type: text
    content: 'as soon as you heard the voice out of the midst of the darkness, while the mountain was burning with fire, you came near to me, all the heads of your tribes, and your elders. '
  '24':
  - type: text
    content: 'And you said, ‘Behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has shown us his glory and '
  - type: note
    content: See ch. 3:24
  - type: text
    content: 'greatness, and '
  - type: note
    content: Ex. 19:19
  - type: text
    content: 'we have heard his voice out of the midst of the fire. This day we have seen God speak with man, and man '
  - type: note
    content: See ch. 4:33
  - type: text
    content: 'still live. '
  '25':
  - type: text
    content: 'Now therefore why should we die? For this great fire will consume us. '
  - type: note
    content: ch. 18:16
  - type: text
    content: 'If we hear the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God any more, we shall die. '
  '26':
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'For who is there of all flesh, that has heard the voice of the living God speaking out of the midst of fire as we have, and has still lived? '
  '27':
  - type: text
    content: 'Go near and hear all that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God will say, and '
  - type: note
    content: See Ex. 20:19
  - type: text
    content: 'speak to us all that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God will speak to you, and we will hear and do it.’'
  '28':
  - type: text
    content: '“And the '
  - type: text
    content: Lord
  - type: text
    content: ' heard your words, when you spoke to me. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘I have heard the words of this people, which they have spoken to you. '
  - type: note
    content: ch. 18:17
  - type: text
    content: 'They are right in all that they have spoken. '
  '29':
  - type: note
    content: ch. 32:29; Ps. 81:13; Isa. 48:18; [Matt. 23:37; Luke 19:42]
  - type: text
    content: 'Oh that they had such a heart as this always, to fear me and to keep all my commandments, '
  - type: note
    content: See ch. 4:40
  - type: text
    content: that it might go well with them and with their descendants
  - type: note
    content: Or sons
  - type: text
    content: ' forever! '
  '3':
  - type: note
    content: '[Heb. 8:9]'
  - type: text
    content: 'Not with our fathers did the '
  - type: text
    content: Lord
  - type: text
    content: ' make this covenant, but with us, who are all of us here alive today. '
  '30':
  - type: text
    content: 'Go and say to them, “Return to your tents.” '
  '31':
  - type: text
    content: 'But you, stand here by me, and '
  - type: note
    content: Gal. 3:19
  - type: text
    content: 'I will tell you the whole commandment and the statutes and the rules that you shall teach them, that they may do them in the land that I am giving them to possess.’ '
  '32':
  - type: text
    content: 'You shall be careful therefore to do as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you. '
  - type: note
    content: ch. 17:20; 28:14; Josh. 1:7; 23:6; 2 Kgs. 22:2; Prov. 4:27
  - type: text
    content: 'You shall not turn aside to the right hand or to the left. '
  '33':
  - type: note
    content: ch. 10:12; 30:16; Jer. 7:23; [Luke 1:6]
  - type: text
    content: 'You shall walk in all the way that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you, that you may live, and '
  - type: note
    content: See ch. 4:40
  - type: text
    content: that it may go well with you, and that you may live long in the land that you shall possess.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke with you '
  - type: note
    content: '[ch. 34:10; Ex. 33:11; Num. 14:14; Judg. 6:22]'
  - type: text
    content: 'face to face at the mountain, out of the midst of the fire, '
  '5':
  - type: note
    content: Ex. 20:21; [Gal. 3:19]
  - type: text
    content: 'while I stood between the '
  - type: text
    content: Lord
  - type: text
    content: ' and you at that time, to declare to you the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. For '
  - type: note
    content: Ex. 19:16; 20:18; 24:2
  - type: text
    content: 'you were afraid because of the fire, and you did not go up into the mountain. He said:'
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-21, see Ex. 20:2-17
  - type: text
    content: '“‘I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, out of the house of slavery.'
  '7':
  - type: text
    content: “‘You shall have no other gods before
  - type: note
    content: Or besides
  - type: text
    content: ' me.'
  '8':
  - type: text
    content: '“‘You shall not make for yourself a carved image, or any likeness of anything that is in heaven above, or that is on the earth beneath, or that is in the water under the earth. '
  '9':
  - type: text
    content: 'You shall not bow down to them or serve them, for I the '
  - type: text
    content: Lord
  - type: text
    content: ' your God am a jealous God, visiting the iniquity of the fathers on the children to the third and fourth generation of those who hate me, '
