  '1':
  - type: text
    content: ' '
  - type: note
    content: See Isa. 13:1
  - type: text
    content: 'An oracle concerning '
  - type: note
    content: ch. 2:8; 3:7; See Jonah 1:2
  - type: text
    content: Nineveh. The book of the vision of Nahum of Elkosh.
  - type: heading
    content: God’s Wrath Against Nineveh
  '10':
  - type: text
    content: 'For they are '
  - type: note
    content: See Mic. 7:4
  - type: text
    content: like entangled thorns,
  - type: text
    content: like drunkards as they drink;
  - type: note
    content: See Joel 2:5
  - type: text
    content: they are consumed like stubble fully dried.
  '11':
  - type: text
    content: From you came one
  - type: note
    content: '[ver. 9; 2 Kgs. 19:22, 23 ]'
  - type: text
    content: 'who plotted evil against the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: a worthless counselor.
  '12':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “Though they are at full strength and many,
  - type: note
    content: Isa. 10:33, 34; [ Isa. 37:36 ]
  - type: text
    content: they will be cut down and pass away.
  - type: note
    content: ver. 9 ; [Isa. 9:1]
  - type: text
    content: Though I have afflicted you,
  - type: text
    content: I will afflict you no more.
  '13':
  - type: text
    content: 'And now '
  - type: note
    content: '[Isa. 9:4; 10:27; 14:25]'
  - type: text
    content: I will break his yoke from off you
  - type: text
    content: and will burst your bonds apart.”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has given commandment about you:'
  - type: note
    content: '[ Ps. 109:13 ]'
  - type: text
    content: “No more shall your name be perpetuated;
  - type: text
    content: 'from '
  - type: note
    content: '[2 Kgs. 19:37]'
  - type: text
    content: the house of your gods I will cut off
  - type: text
    content: the carved image and the metal image.
  - type: note
    content: '[ Isa. 30:33 ]; See Ezek. 32:21-23'
  - type: text
    content: 'I will make your grave, '
  - type: note
    content: '[ch. 3:6]'
  - type: text
    content: for you are vile.”
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ch 2:1 in Hebrew
  - type: note
    content: See Isa. 52:7
  - type: text
    content: 'Behold, upon the mountains, '
  - type: note
    content: '[Rom. 10:15]'
  - type: text
    content: the feet of him
  - type: text
    content: who brings good news,
  - type: text
    content: who publishes peace!
  - type: note
    content: '[ Isa. 30:29 ]'
  - type: text
    content: Keep your feasts, O Judah;
  - type: note
    content: See Num. 30:2
  - type: text
    content: fulfill your vows,
  - type: note
    content: '[ver. 12 ]; See Joel 3:17'
  - type: text
    content: for never again shall the worthless pass through you;
  - type: text
    content: he is utterly cut off.
  '2':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 20:5
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a jealous and avenging God;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is avenging and wrathful;'
  - type: note
    content: '[ Ps. 92:9 ]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' takes vengeance on his adversaries'
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 103:9]'
  - type: text
    content: keeps wrath for his enemies.
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 34:6
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is slow to anger and '
  - type: note
    content: Job 9:4; Ps. 147:5
  - type: text
    content: great in power,
  - type: text
    content: 'and '
  - type: note
    content: See Ex. 34:7
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will by no means clear the guilty.'
  - type: note
    content: '[ Ps. 97:2 ]; See Ps. 18:9-13'
  - type: text
    content: His way is in whirlwind and storm,
  - type: text
    content: and the clouds are the dust of his feet.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps. 106:9; [ Isa. 50:2 ]
  - type: text
    content: He rebukes the sea and makes it dry;
  - type: text
    content: he dries up all the rivers;
  - type: note
    content: Isa. 33:9
  - type: text
    content: 'Bashan and '
  - type: note
    content: See Josh. 19:26
  - type: text
    content: Carmel wither;
  - type: text
    content: 'the bloom of '
  - type: note
    content: Isa. 33:9
  - type: text
    content: Lebanon withers.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 4:24; Hab. 3:6 ]'
  - type: text
    content: The mountains quake before him;
  - type: note
    content: Amos 9:13
  - type: text
    content: the hills melt;
  - type: text
    content: the earth heaves before him,
  - type: note
    content: Ps. 98:7
  - type: text
    content: the world and all who dwell in it.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Mal. 3:2 ]'
  - type: text
    content: Who can stand before his indignation?
  - type: text
    content: Who can endure the heat of his anger?
  - type: text
    content: 'His wrath '
  - type: note
    content: 2 Chr. 34:21; [Ps. 79:6]
  - type: text
    content: is poured out like fire,
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 38:20
  - type: text
    content: the rocks are broken into pieces by him.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Jer. 33:11; See Ps. 100:5
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good,'
  - type: note
    content: Ps. 46:1; Isa. 25:4
  - type: text
    content: a stronghold in the day of trouble;
  - type: note
    content: Ps. 1:6; John 10:14, 27; 1 Cor. 8:3; 2 Tim. 2:19
  - type: text
    content: he knows those who take refuge in him.
  '8':
  - type: text
    content: 'But '
  - type: note
    content: '[Isa. 30:28]'
  - type: text
    content: with an overflowing flood
  - type: text
    content: he will make a complete end of the adversaries,
  - type: note
    content: Hebrew of her place
  - type: text
    content: 'and '
  - type: note
    content: Isa. 8:22
  - type: text
    content: will pursue his enemies into darkness.
  '9':
  - type: text
    content: 'What '
  - type: note
    content: '[Isa. 10:7]'
  - type: text
    content: 'do you plot against the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: note
    content: '[ Jer. 4:27 ]'
  - type: text
    content: He will make a complete end;
  - type: text
    content: trouble will not rise up a second time.
