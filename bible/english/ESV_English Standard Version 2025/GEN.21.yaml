  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then she went and sat down opposite him a good way off, about the distance of a bowshot, for she said, “Let me not look on the death of the child.” And as she sat opposite him, she lifted up her voice and wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
