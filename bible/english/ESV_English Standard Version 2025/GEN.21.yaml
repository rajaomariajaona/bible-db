document_id: GEN.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Isaac
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 2:21
  - type: text
    content: 'visited Sarah as he had said, and the '
  - type: text
    content: Lord
  - type: text
    content: ' did to Sarah '
  - type: note
    content: ch. 17:19; 18:10, 14
  - type: text
    content: 'as he had promised. '
  '10':
  - type: text
    content: 'So she said to Abraham, '
  - type: note
    content: Cited Gal. 4:30
  - type: text
    content: '“Cast out this slave woman with her son, for the son of this slave woman shall not be heir with my son Isaac.” '
  '11':
  - type: text
    content: 'And the thing was very displeasing to Abraham on account of his son. '
  '12':
  - type: text
    content: 'But God said to Abraham, “Be not displeased because of the boy and because of your slave woman. Whatever Sarah says to you, do as she tells you, for '
  - type: note
    content: Cited Rom. 9:7; Heb. 11:18
  - type: text
    content: 'through Isaac shall your offspring be named. '
  '13':
  - type: text
    content: 'And I will make '
  - type: note
    content: ver. 18; ch. 16:10; 17:20
  - type: text
    content: 'a nation of the son of the slave woman also, because he is your offspring.” '
  '14':
  - type: text
    content: 'So Abraham rose early in the morning and took bread and a skin of water and gave it to Hagar, putting it on her shoulder, along with the child, and sent her away. And she departed and wandered in the wilderness of '
  - type: note
    content: ver. 31
  - type: text
    content: Beersheba.
  '15':
  - type: text
    content: 'When the water in the skin was gone, she put the child under one of the bushes. '
  '16':
  - type: text
    content: 'Then she went and sat down opposite him a good way off, about the distance of a bowshot, for she said, “Let me not look on the death of the child.” And as she sat opposite him, she lifted up her voice and wept. '
  '17':
  - type: text
    content: 'And God heard the voice of the boy, and the angel of God called to Hagar from heaven and said to her, “What troubles you, Hagar? Fear not, for God has heard the voice of the boy where he is. '
  '18':
  - type: text
    content: 'Up! Lift up the boy, and hold him fast with your hand, for I will make him into a great nation.” '
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 22:31; 2 Kgs. 6:17, 18, 20; [Luke 24:16, 31]
  - type: text
    content: 'God opened her eyes, and she saw a well of water. And she went and filled the skin with water and gave the boy a drink. '
  '2':
  - type: text
    content: 'And Sarah '
  - type: note
    content: Heb. 11:11; [Gal. 4:22]
  - type: text
    content: 'conceived and bore Abraham a son in his old age '
  - type: note
    content: ch. 17:21
  - type: text
    content: 'at the time of which God had spoken to him. '
  '20':
  - type: text
    content: 'And God was with the boy, and he grew up. He lived in the wilderness '
  - type: note
    content: ch. 16:12
  - type: text
    content: 'and became an expert with the bow. '
  '21':
  - type: text
    content: He lived in the wilderness of Paran, and his mother took a wife for him from the land of Egypt.
  - type: heading
    content: A Treaty with Abimelech
  '22':
  - type: text
    content: 'At that time '
  - type: note
    content: ch. 20:2; [ch. 26:1, 26]
  - type: text
    content: 'Abimelech and Phicol the commander of his army said to Abraham, '
  - type: note
    content: '[ch. 26:28]'
  - type: text
    content: '“God is with you in all that you do. '
  '23':
  - type: text
    content: 'Now therefore swear to me here by God that you will not deal falsely with me or with my descendants or with my posterity, but '
  - type: note
    content: ch. 20:14
  - type: text
    content: 'as I have dealt kindly with you, so you will deal with me and with the land where you have sojourned.” '
  '24':
  - type: text
    content: And Abraham said, “I will swear.”
  '25':
  - type: text
    content: 'When Abraham reproved Abimelech about a well of water that Abimelech’s servants '
  - type: note
    content: '[ch. 26:15, 18, 20-22]'
  - type: text
    content: 'had seized, '
  '26':
  - type: text
    content: 'Abimelech said, “I do not know who has done this thing; you did not tell me, and I have not heard of it until today.” '
  '27':
  - type: text
    content: 'So Abraham took sheep and oxen and gave them to Abimelech, and the two men '
  - type: note
    content: ch. 26:31
  - type: text
    content: 'made a covenant. '
  '28':
  - type: text
    content: 'Abraham set seven ewe lambs of the flock apart. '
  '29':
  - type: text
    content: 'And Abimelech said to Abraham, “What is the meaning of these seven ewe lambs that you have set apart?” '
  '3':
  - type: text
    content: 'Abraham called the name of his son who was born to him, whom Sarah bore him, '
  - type: note
    content: ch. 17:19
  - type: text
    content: Isaac.
  - type: note
    content: Isaac means he laughs
  - type: text
    content: ' '
  '30':
  - type: text
    content: He said, “These seven ewe lambs you will take from my hand, that this
  - type: note
    content: Or you
  - type: text
    content: ' may be a witness for me that I dug this well.” '
  '31':
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 26:33
  - type: text
    content: that place was called Beersheba,
  - type: note
    content: Beersheba means well of seven or well of the oath
  - type: text
    content: ' because there both of them swore an oath. '
  '32':
  - type: text
    content: 'So they made a covenant at Beersheba. Then Abimelech and Phicol the commander of his army rose up and returned to the land of the Philistines. '
  '33':
  - type: text
    content: 'Abraham planted a tamarisk tree in Beersheba and '
  - type: note
    content: ch. 4:26; 12:8
  - type: text
    content: 'called there on the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Isa. 40:28; [Ps. 90:2]
  - type: text
    content: 'the Everlasting God. '
  '34':
  - type: text
    content: And Abraham sojourned many days in the land of the Philistines.
  '4':
  - type: text
    content: 'And Abraham '
  - type: note
    content: Acts 7:8
  - type: text
    content: 'circumcised his son Isaac when he was eight days old, '
  - type: note
    content: ch. 17:10, 12
  - type: text
    content: 'as God had commanded him. '
  '5':
  - type: note
    content: ch. 17:1, 17; Rom. 4:19
  - type: text
    content: 'Abraham was a hundred years old when his son Isaac was born to him. '
  '6':
  - type: text
    content: 'And Sarah said, '
  - type: note
    content: '[Isa. 54:1; Gal. 4:27]'
  - type: text
    content: '“God has made laughter for me; everyone who hears will laugh over me.” '
  '7':
  - type: text
    content: 'And she said, “Who would have said to Abraham that Sarah would nurse children? '
  - type: note
    content: ch. 18:11, 12
  - type: text
    content: Yet I have borne him a son in his old age.”
  - type: heading
    content: God Protects Hagar and Ishmael
  '8':
  - type: text
    content: 'And the child grew and was weaned. And Abraham made a great feast on the day that Isaac was weaned. '
  '9':
  - type: text
    content: 'But Sarah '
  - type: note
    content: ch. 16:1, 15
  - type: text
    content: 'saw the son of Hagar the Egyptian, whom she had borne to Abraham, '
  - type: note
    content: '[Gal. 4:29]'
  - type: text
    content: laughing.
  - type: note
    content: Possibly laughing in mockery
  - type: text
    content: ' '
