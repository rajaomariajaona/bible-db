document_id: ZEP.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Jerusalem and the Nations
  - type: text
    content: Woe to her who is rebellious and defiled,
  - type: note
    content: Jer. 6:6
  - type: text
    content: the oppressing city!
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 68:31; Isa. 11:11; 60:4
  - type: text
    content: 'From beyond the rivers '
  - type: note
    content: '[ch. 2:12]'
  - type: text
    content: of Cush
  - type: text
    content: my worshipers, the daughter of my dispersed ones,
  - type: text
    content: shall bring my offering.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Isa. 2:11
  - type: text
    content: '“On that day '
  - type: note
    content: '[Isa. 54:4]'
  - type: text
    content: you shall not be put to shame
  - type: text
    content: because of the deeds by which you have rebelled against me;
  - type: text
    content: 'for then '
  - type: note
    content: '[Mal. 4:1]'
  - type: text
    content: I will remove from your midst
  - type: text
    content: your proudly exultant ones,
  - type: text
    content: 'and '
  - type: note
    content: Jer. 7:4; [Matt. 3:9]
  - type: text
    content: you shall no longer be haughty
  - type: text
    content: in my holy mountain.
  '12':
  - type: text
    content: But I will leave in your midst
  - type: text
    content: 'a people '
  - type: note
    content: Isa. 14:32; [Matt. 5:3]
  - type: text
    content: humble and lowly.
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: 'They shall seek refuge in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:7 ]'
  - type: text
    content: those who are left in Israel;
  - type: text
    content: 'they '
  - type: note
    content: Isa. 60:21
  - type: text
    content: shall do no injustice
  - type: text
    content: and speak no lies,
  - type: note
    content: '[ Rev. 14:5 ]'
  - type: text
    content: nor shall there be found in their mouth
  - type: text
    content: a deceitful tongue.
  - type: note
    content: See Mic. 5:4
  - type: text
    content: For they shall graze and lie down,
  - type: text
    content: and none shall make them afraid.”
  - type: heading
    content: Israel’s Joy and Restoration
  '14':
  - type: text
    content: ' '
  - type: note
    content: Isa. 12:6; 54:1; Zech. 2:10; 9:9
  - type: text
    content: Sing aloud, O daughter of Zion;
  - type: text
    content: shout, O Israel!
  - type: text
    content: Rejoice and exult with all your heart,
  - type: text
    content: O daughter of Jerusalem!
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has taken away the judgments against you;'
  - type: text
    content: he has cleared away your enemies.
  - type: note
    content: Matt. 27:42; John 1:49
  - type: text
    content: 'The King of Israel, '
  - type: note
    content: Ps. 46:5; Zech. 2:10; [Rev. 21:3]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', is in your midst;'
  - type: text
    content: you shall never again fear evil.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'On that day it shall be said to Jerusalem:'
  - type: text
    content: “Fear not, O Zion;
  - type: note
    content: '[ Isa. 35:3; Heb. 12:12 ]'
  - type: text
    content: let not your hands grow weak.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is in your midst,'
  - type: note
    content: '[ Isa. 63:1 ]'
  - type: text
    content: a mighty one who will save;
  - type: note
    content: Isa. 62:5; Jer. 32:41
  - type: text
    content: he will rejoice over you with gladness;
  - type: text
    content: he will quiet you by his love;
  - type: text
    content: he will exult over you with loud singing.
  '18':
  - type: text
    content: 'I will gather those of you who mourn '
  - type: note
    content: Lam. 1:4; 2:6
  - type: text
    content: for the festival,
  - type: text
    content: so that you will no longer suffer reproach.
  - type: note
    content: The meaning of the Hebrew is uncertain
  '19':
  - type: text
    content: 'Behold, at that time '
  - type: note
    content: '[Isa. 60:14]'
  - type: text
    content: I will deal
  - type: text
    content: with all your oppressors.
  - type: text
    content: 'And '
  - type: note
    content: Mic. 4:6, 7
  - type: text
    content: I will save the lame
  - type: text
    content: and gather the outcast,
  - type: text
    content: 'and I will change '
  - type: note
    content: Isa. 61:7
  - type: text
    content: 'their shame into '
  - type: note
    content: '[Jer. 13:11; 33:9]'
  - type: text
    content: praise
  - type: text
    content: and renown in all the earth.
  '2':
  - type: text
    content: She listens to no voice;
  - type: note
    content: Jer. 5:3
  - type: text
    content: she accepts no correction.
  - type: note
    content: '[ver. 12 ]'
  - type: text
    content: 'She does not trust in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: she does not draw near to her God.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Isa. 11:12; Jer. 32:37; Ezek. 11:17
  - type: text
    content: At that time I will bring you in,
  - type: text
    content: at the time when I gather you together;
  - type: text
    content: for I will make you renowned and praised
  - type: text
    content: among all the peoples of the earth,
  - type: note
    content: ch. 2:7
  - type: text
    content: when I restore your fortunes
  - type: text
    content: 'before your eyes,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 22:27; [ Mic. 3:9, 10 ]
  - type: text
    content: Her officials within her
  - type: text
    content: are roaring lions;
  - type: text
    content: 'her judges are '
  - type: note
    content: Hab. 1:8
  - type: text
    content: evening wolves
  - type: text
    content: that leave nothing till the morning.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jer. 23:11; Hos. 9:7
  - type: text
    content: Her prophets are fickle, treacherous men;
  - type: note
    content: Jer. 23:11; Hos. 9:7
  - type: text
    content: 'her priests '
  - type: note
    content: Ezek. 22:26
  - type: text
    content: profane what is holy;
  - type: text
    content: they do violence to the law.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' within her '
  - type: note
    content: '[Jer. 12:1]'
  - type: text
    content: is righteous;
  - type: text
    content: he does no injustice;
  - type: text
    content: every morning he shows forth his justice;
  - type: text
    content: each dawn he does not fail;
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 2:1]'
  - type: text
    content: the unjust knows no shame.
  '6':
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:4-15
  - type: text
    content: “I have cut off nations;
  - type: text
    content: their battlements are in ruins;
  - type: text
    content: I have laid waste their streets
  - type: note
    content: '[ Zech. 7:14; 9:8 ]'
  - type: text
    content: so that no one walks in them;
  - type: text
    content: their cities have been made desolate,
  - type: text
    content: without a man, without an inhabitant.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 36:3 ]'
  - type: text
    content: I said, ‘Surely you will fear me;
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: you will accept correction.
  - type: text
    content: Then your
  - type: note
    content: Hebrew her
  - type: text
    content: ' dwelling would not be cut off'
  - type: text
    content: according to all that I have appointed against you.’
  - type: note
    content: Hebrew her
  - type: text
    content: 'But '
  - type: note
    content: '[Mic. 7:3]'
  - type: text
    content: all the more they were eager
  - type: text
    content: to make all their deeds corrupt.
  '8':
  - type: text
    content: '“Therefore '
  - type: note
    content: Hab. 2:3; See Isa. 8:17
  - type: text
    content: 'wait for me,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “for the day when I rise up to seize the prey.
  - type: text
    content: 'For my decision is '
  - type: note
    content: Joel 3:2
  - type: text
    content: to gather nations,
  - type: text
    content: to assemble kingdoms,
  - type: text
    content: to pour out upon them my indignation,
  - type: text
    content: all my burning anger;
  - type: text
    content: for in the fire of my jealousy
  - type: note
    content: '[ch. 1:18 ]'
  - type: text
    content: all the earth shall be consumed.
  - type: heading
    content: The Conversion of the Nations
  '9':
  - type: text
    content: “For at that time I will change the speech of the peoples
  - type: text
    content: 'to '
  - type: note
    content: Isa. 19:18
  - type: text
    content: a pure speech,
  - type: text
    content: 'that all of them may call upon the name of the '
  - type: text
