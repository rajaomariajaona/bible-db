document_id: ECC.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Evil Under the Sun
  - type: text
    content: ' '
  - type: note
    content: ch. 9:11
  - type: text
    content: 'Again I '
  - type: note
    content: ch. 3:16
  - type: text
    content: 'saw all '
  - type: note
    content: ch. 5:8; Job 35:9
  - type: text
    content: 'the oppressions that are done under the sun. And behold, the tears of the oppressed, and they had '
  - type: note
    content: Lam. 1:2
  - type: text
    content: 'no one to comfort them! On the side of their oppressors there was power, and there was no one to comfort them. '
  '10':
  - type: text
    content: 'For if they fall, one will lift up his fellow. But woe to him who is alone when he falls and has not another to lift him up! '
  '11':
  - type: text
    content: 'Again, if two lie together, they keep warm, '
  - type: note
    content: See 1 Kgs. 1:1-4
  - type: text
    content: 'but how can one keep warm alone? '
  '12':
  - type: text
    content: And though a man might prevail against one who is alone, two will withstand him—a threefold cord is not quickly broken.
  '13':
  - type: text
    content: 'Better was '
  - type: note
    content: '[ch. 9:15, 16]'
  - type: text
    content: 'a poor and wise youth than an old and foolish king who no longer knew how '
  - type: note
    content: '[Prov. 12:15]'
  - type: text
    content: 'to take advice. '
  '14':
  - type: text
    content: 'For he went '
  - type: note
    content: See Gen. 41:14, 41-43
  - type: text
    content: 'from prison to the throne, though in his own kingdom he had been born poor. '
  '15':
  - type: text
    content: I saw all the living who move about under the sun, along with that
  - type: note
    content: Hebrew the second
  - type: text
    content: ' youth who was to stand in the king’s'
  - type: note
    content: Hebrew his
  - type: text
    content: ' place. '
  '16':
  - type: text
    content: 'There was no end of all the people, all of whom he led. Yet those who come later will not rejoice in him. Surely this also is '
  - type: note
    content: See ch. 1:14
  - type: text
    content: vanity and a striving after wind.
  '2':
  - type: text
    content: 'And I '
  - type: note
    content: See Job 3:11-26
  - type: text
    content: 'thought the dead who are already dead more fortunate than the living who are still alive. '
  '3':
  - type: text
    content: 'But '
  - type: note
    content: ch. 6:3
  - type: text
    content: better than both is he who has not yet been and has not seen the evil deeds that are done under the sun.
  '4':
  - type: text
    content: 'Then I saw that all toil and all skill in work come from a man’s envy of his neighbor. This also is '
  - type: note
    content: See ch. 1:14
  - type: text
    content: vanity
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath”; also verses 7, 8, 16 (see note on 1:2)
  - type: text
    content: ' and a striving after wind.'
  '5':
  - type: text
    content: 'The fool '
  - type: note
    content: Prov. 6:10; 24:33
  - type: text
    content: 'folds his hands and '
  - type: note
    content: '[Isa. 9:20]'
  - type: text
    content: eats his own flesh.
  '6':
  - type: text
    content: ' '
  - type: note
    content: See Prov. 15:16
  - type: text
    content: 'Better is a handful of '
  - type: note
    content: ch. 6:5
  - type: text
    content: quietness than two hands full of toil and a striving after wind.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Again, I saw vanity under the sun: '
  '8':
  - type: text
    content: 'one person who has no other, either son or brother, yet there is no end to all his toil, and his '
  - type: note
    content: ch. 1:8; [Prov. 27:20; 1 John 2:16]
  - type: text
    content: 'eyes are never satisfied with riches, so that he never asks, '
  - type: note
    content: ch. 2:18; Ps. 39:6
  - type: text
    content: '“For whom am I toiling and depriving myself of pleasure?” This also is vanity and an unhappy '
  - type: note
    content: See ch. 1:13
  - type: text
    content: business.
  '9':
  - type: text
    content: 'Two are better than one, because they have a good reward for their toil. '
