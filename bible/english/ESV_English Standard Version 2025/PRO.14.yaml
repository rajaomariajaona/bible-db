document_id: PRO.14,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:1; 24:3 ]'
  - type: text
    content: 'The wisest of women '
  - type: note
    content: Deut. 25:9; Ruth 4:11
  - type: text
    content: builds her house,
  - type: text
    content: 'but folly with her own hands '
  - type: note
    content: '[ch. 11:11]'
  - type: text
    content: tears it down.
  '10':
  - type: text
    content: 'The heart knows its own '
  - type: note
    content: '[1 Sam. 1:10]; See Job 3:20'
  - type: text
    content: bitterness,
  - type: text
    content: and no stranger shares its joy.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:33; 15:25; Job 8:15; 21:28 ]'
  - type: text
    content: The house of the wicked will be destroyed,
  - type: text
    content: but the tent of the upright will flourish.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 16:25; See ch. 12:15
  - type: text
    content: There is a way that seems right to a man,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 5:5; Rom. 6:21]; See ch. 7:27'
  - type: text
    content: its end is the way to death.
  - type: note
    content: Hebrew ways of death
  '13':
  - type: text
    content: Even in laughter the heart may ache,
  - type: text
    content: 'and '
  - type: note
    content: '[Eccles. 2:2; Luke 6:25]'
  - type: text
    content: 'the end of joy may be '
  - type: note
    content: ch. 10:1
  - type: text
    content: grief.
  '14':
  - type: text
    content: 'The backslider in heart will be '
  - type: note
    content: '[ch. 1:31; Matt. 6:2, 5]'
  - type: text
    content: filled with the fruit of his ways,
  - type: text
    content: 'and '
  - type: note
    content: ch. 12:14; Isa. 3:10
  - type: text
    content: a good man will be filled with the fruit of his ways.
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:4
  - type: text
    content: The simple believes everything,
  - type: text
    content: but the prudent gives thought to his steps.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 22:3; 27:12 ]'
  - type: text
    content: One who is wise is cautious
  - type: note
    content: Or fears [the Lord]
  - type: text
    content: ' and '
  - type: note
    content: '[ch. 3:7]; See Job 28:28; Ps. 34:14'
  - type: text
    content: turns away from evil,
  - type: text
    content: but a fool is reckless and careless.
  '17':
  - type: text
    content: 'A man of '
  - type: note
    content: '[ver. 29]'
  - type: text
    content: quick temper acts foolishly,
  - type: text
    content: and a man of evil devices is hated.
  '18':
  - type: text
    content: The simple inherit folly,
  - type: text
    content: but the prudent are crowned with knowledge.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 42:6; 1 Sam. 2:36 ]'
  - type: text
    content: The evil bow down before the good,
  - type: text
    content: the wicked at the gates of the righteous.
  '2':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 19:1; 28:6
  - type: text
    content: 'walks in uprightness fears the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'but he who is '
  - type: note
    content: ch. 2:15
  - type: text
    content: devious in his ways despises him.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:7
  - type: text
    content: The poor is disliked even by his neighbor,
  - type: note
    content: ch. 19:4
  - type: text
    content: but the rich has many friends.
  '21':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 11:12
  - type: text
    content: despises his neighbor is a sinner,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 41:1
  - type: text
    content: blessed is he who is generous to the poor.
  '22':
  - type: text
    content: 'Do they not go astray who '
  - type: note
    content: See ch. 3:29
  - type: text
    content: devise evil?
  - type: text
    content: Those who devise good meet
  - type: note
    content: Or show
  - type: text
    content: ' '
  - type: note
    content: ch. 3:3
  - type: text
    content: steadfast love and faithfulness.
  '23':
  - type: text
    content: In all toil there is profit,
  - type: text
    content: 'but mere talk '
  - type: note
    content: '[ch. 11:24; 21:5; 22:16]'
  - type: text
    content: tends only to poverty.
  '24':
  - type: text
    content: The crown of the wise is their wealth,
  - type: text
    content: but the folly of fools brings folly.
  '25':
  - type: text
    content: A truthful witness saves lives,
  - type: text
    content: 'but one who '
  - type: note
    content: ver. 5
  - type: text
    content: breathes out lies is deceitful.
  '26':
  - type: text
    content: 'In the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' one has '
  - type: note
    content: '[ch. 1:33]'
  - type: text
    content: strong confidence,
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 73:15]'
  - type: text
    content: 'his children will have '
  - type: note
    content: See Ps. 14:6
  - type: text
    content: a refuge.
  '27':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: See ch. 10:11
  - type: text
    content: a fountain of life,
  - type: text
    content: 'that one may '
  - type: note
    content: See ch. 13:14
  - type: text
    content: turn away from the snares of death.
  '28':
  - type: text
    content: 'In '
  - type: note
    content: '[1 Kgs. 4:20]'
  - type: text
    content: a multitude of people is the glory of a king,
  - type: text
    content: but without people a prince is ruined.
  '29':
  - type: text
    content: 'Whoever is '
  - type: note
    content: ch. 16:32; 19:11; [ver. 17; Eccles. 7:9; James 1:19]
  - type: text
    content: slow to anger has great understanding,
  - type: text
    content: but he who has a hasty temper exalts folly.
  '3':
  - type: text
    content: 'By the mouth of a fool comes '
  - type: note
    content: '[Jer. 18:18]'
  - type: text
    content: a rod for his back,
  - type: note
    content: Or In the mouth of a fool is a rod of pride
  - type: note
    content: ch. 12:6
  - type: text
    content: but the lips of the wise will preserve them.
  '30':
  - type: text
    content: A tranquil
  - type: note
    content: Or healing
  - type: text
    content: ' heart gives '
  - type: note
    content: See ch. 4:22
  - type: text
    content: life to the flesh,
  - type: text
    content: 'but '
  - type: note
    content: '[Ps. 112:10]'
  - type: text
    content: envy
  - type: note
    content: Or jealousy
  - type: text
    content: ' makes '
  - type: note
    content: ch. 12:4
  - type: text
    content: the bones rot.
  '31':
  - type: text
    content: 'Whoever oppresses a poor man '
  - type: note
    content: ch. 17:5; [Matt. 25:40, 45]
  - type: text
    content: 'insults his '
  - type: note
    content: ch. 22:2; See Job 35:10
  - type: text
    content: Maker,
  - type: note
    content: ch. 28:8
  - type: text
    content: but he who is generous to the needy honors him.
  '32':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:16
  - type: text
    content: The wicked is overthrown through his evildoing,
  - type: text
    content: 'but '
  - type: note
    content: Gen. 49:18; Ps. 16:11; 17:15; 23:4; 2 Cor. 1:9; 5:8; 2 Tim. 4:18; [Num. 23:10]; See Job 19:25-27
  - type: text
    content: the righteous finds refuge in his death.
  '33':
  - type: text
    content: 'Wisdom '
  - type: note
    content: Eccles. 7:9; ch. 12:16; 29:11
  - type: text
    content: rests in the heart of a man of understanding,
  - type: text
    content: but it makes itself known even in the midst of fools.
  - type: note
    content: Or Wisdom rests quietly in the heart of a man of understanding, but makes itself known in the midst of fools
  '34':
  - type: text
    content: Righteousness exalts a nation,
  - type: text
    content: but sin is a reproach to any people.
  '35':
  - type: text
    content: 'A servant who deals wisely has '
  - type: note
    content: '[ch. 16:13; 22:11]; See Matt. 24:45-47'
  - type: text
    content: the king’s favor,
  - type: text
    content: but his wrath falls on one who acts shamefully.
  '4':
  - type: text
    content: Where there are no oxen, the manger is clean,
  - type: text
    content: but abundant crops come by the strength of the ox.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 23:1 ]'
  - type: text
    content: A faithful witness does not lie,
  - type: text
    content: 'but '
  - type: note
    content: See ch. 6:19
  - type: text
    content: a false witness breathes out lies.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 24:7 ]'
  - type: text
    content: 'A scoffer seeks wisdom '
  - type: note
    content: '[Ps. 25:9; 1 Pet. 5:5]'
  - type: text
    content: in vain,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 8:9; 15:14; 17:24]'
  - type: text
    content: knowledge is easy for a man of understanding.
  '7':
  - type: text
    content: Leave the presence of a fool,
  - type: text
    content: for there you do not meet words of knowledge.
  '8':
  - type: text
    content: The wisdom of the prudent is to discern his way,
  - type: text
    content: but the folly of fools is deceiving.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:23 ]'
  - type: text
    content: Fools mock at the guilt offering,
  - type: text
    content: but the upright enjoy acceptance.
  - type: note
    content: Hebrew but among the upright is acceptance
