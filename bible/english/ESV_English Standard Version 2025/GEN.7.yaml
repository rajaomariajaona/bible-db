document_id: GEN.7,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Noah, '
  - type: note
    content: Matt. 24:38, 39; Luke 17:26, 27; Heb. 11:7; 1 Pet. 3:20; 2 Pet. 2:5
  - type: text
    content: '“Go into the ark, you and all your household, for I have seen that '
  - type: note
    content: ch. 6:9
  - type: text
    content: 'you are righteous before me in this generation. '
  '10':
  - type: text
    content: And after seven days the waters of the flood came upon the earth.
  '11':
  - type: text
    content: 'In the six hundredth year of Noah’s life, in the second month, on the seventeenth day of the month, on that day all the '
  - type: note
    content: ch. 8:2; Prov. 8:28; [Amos 9:6]
  - type: text
    content: 'fountains of the great deep burst forth, and '
  - type: note
    content: ch. 8:2; 2 Kgs. 7:19; Isa. 24:18; Mal. 3:10; [Ps. 78:23]
  - type: text
    content: 'the windows of the heavens were opened. '
  '12':
  - type: text
    content: 'And rain fell upon the earth forty days and forty nights. '
  '13':
  - type: text
    content: 'On the very same day Noah and his sons, Shem and Ham and Japheth, and Noah’s wife and the three wives of his sons with them entered the ark, '
  '14':
  - type: text
    content: 'they and every beast, according to its kind, and all the livestock according to their kinds, and every creeping thing that creeps on the earth, according to its kind, and every bird, according to its kind, every winged creature. '
  '15':
  - type: text
    content: 'They '
  - type: note
    content: ch. 6:20
  - type: text
    content: 'went into the ark with Noah, two and two of all flesh in which there was the breath of life. '
  '16':
  - type: text
    content: 'And those that entered, male and female of all flesh, went in '
  - type: note
    content: ver. 2, 3
  - type: text
    content: 'as God had commanded him. And the '
  - type: text
    content: Lord
  - type: text
    content: ' shut him in.'
  '17':
  - type: text
    content: 'The flood '
  - type: note
    content: ver. 4, 12
  - type: text
    content: 'continued forty days on the earth. The waters increased and bore up the ark, and it rose high above the earth. '
  '18':
  - type: text
    content: 'The waters prevailed and increased greatly on the earth, and the ark floated on the face of the waters. '
  '19':
  - type: text
    content: 'And the waters prevailed so mightily on the earth that all the high mountains under the whole heaven were covered. '
  '2':
  - type: text
    content: 'Take with you seven pairs of all '
  - type: note
    content: ch. 8:20; [Lev. 11]
  - type: text
    content: clean animals,
  - type: note
    content: Or seven of each kind of clean animal
  - type: text
    content: ' the male and his mate, and a pair of the animals that are not clean, the male and his mate, '
  '20':
  - type: text
    content: The waters prevailed above the mountains, covering them fifteen cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' deep. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ver. 4; ch. 6:13, 17; 2 Pet. 3:6
  - type: text
    content: 'all flesh died that moved on the earth, birds, livestock, beasts, all swarming creatures that swarm on the earth, and all mankind. '
  '22':
  - type: text
    content: 'Everything on the dry land '
  - type: note
    content: ch. 2:7
  - type: text
    content: 'in whose nostrils was the breath of life died. '
  '23':
  - type: text
    content: 'He blotted out every living thing that was on the face of the ground, man and animals and creeping things and birds of the heavens. They were blotted out from the earth. Only '
  - type: note
    content: 2 Pet. 2:5
  - type: text
    content: 'Noah was left, and those who were with him in the ark. '
  '24':
  - type: text
    content: And the waters prevailed on the earth 150 days.
  '3':
  - type: text
    content: and seven pairs
  - type: note
    content: Or seven of each kind
  - type: text
    content: ' of the birds of the heavens also, male and female, to keep their offspring alive on the face of all the earth. '
  '4':
  - type: text
    content: 'For in seven days '
  - type: note
    content: ver. 12, 17; [Job 37:11-13]
  - type: text
    content: 'I will send rain on the earth forty days and forty nights, '
  - type: note
    content: ch. 6:17
  - type: text
    content: and every living thing
  - type: note
    content: Hebrew all existence; also verse 23
  - type: text
    content: ' that I have made I will blot out from the face of the ground.” '
  '5':
  - type: note
    content: ch. 6:22
  - type: text
    content: 'And Noah did all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '6':
  - type: text
    content: 'Noah was six hundred years old when the flood of waters came upon the earth. '
  '7':
  - type: text
    content: 'And Noah and his sons and his wife and his sons’ wives with him went into the ark to escape the waters of the flood. '
  '8':
  - type: text
    content: 'Of clean animals, and of animals that are not clean, and of birds, and of everything that creeps on the ground, '
  '9':
  - type: text
    content: 'two and two, male and female, went into the ark with Noah, as God had commanded Noah. '
