    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Noah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 24:38
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 17:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
