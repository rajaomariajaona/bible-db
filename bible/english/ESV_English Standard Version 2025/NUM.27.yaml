document_id: NUM.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Daughters of Zelophehad
  - type: text
    content: 'Then drew near the daughters of '
  - type: note
    content: ch. 26:33; 36:11; Josh. 17:3
  - type: text
    content: 'Zelophehad the son of Hepher, son of Gilead, son of Machir, son of Manasseh, from the clans of Manasseh the son of Joseph. The names of his daughters were: Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '10':
  - type: text
    content: 'And if he has no brothers, then you shall give his inheritance to his father’s brothers. '
  '11':
  - type: text
    content: 'And if his father has no brothers, then you shall give his inheritance to the nearest '
  - type: note
    content: See Ruth 4:3-6; Jer. 32:6-9
  - type: text
    content: 'kinsman of his clan, and he shall possess it. And it shall be for the people of Israel '
  - type: note
    content: ch. 35:29
  - type: text
    content: 'a statute and rule, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.’”'
  - type: heading
    content: Joshua to Succeed Moses
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go up into '
  - type: note
    content: ch. 21:11; 33:44, 47; Deut. 32:49; [Deut. 3:27; 34:1]
  - type: text
    content: 'this mountain of Abarim and see the land that I have given to the people of Israel. '
  '13':
  - type: text
    content: 'When you have seen it, you also '
  - type: note
    content: See ch. 20:24
  - type: text
    content: 'shall be gathered to your people, as your brother Aaron was, '
  '14':
  - type: note
    content: ch. 20:12, 24
  - type: text
    content: 'because you rebelled against my word in the wilderness of Zin when the congregation quarreled, failing '
  - type: note
    content: ch. 20:12, 13
  - type: text
    content: 'to uphold me as holy at the waters before their eyes.” (These are '
  - type: note
    content: ch. 20:13; Deut. 32:51; [Ex. 17:7]
  - type: text
    content: 'the waters of Meribah of Kadesh in the wilderness of Zin.) '
  '15':
  - type: text
    content: 'Moses spoke to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, '
  '16':
  - type: text
    content: '“Let the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 16:22
  - type: text
    content: 'the God of the spirits of all flesh, appoint a man over the congregation '
  '17':
  - type: text
    content: 'who '
  - type: note
    content: Deut. 31:2; 1 Sam. 8:20; 18:13; 1 Kgs. 3:7; 2 Chr. 1:10; [Josh. 14:11]
  - type: text
    content: 'shall go out before them and come in before them, who shall lead them out and bring them in, that the congregation of the '
  - type: text
    content: Lord
  - type: text
    content: ' may not be '
  - type: note
    content: 1 Kgs. 22:17; Ezek. 34:5; Zech. 10:2; Matt. 9:36; Mark 6:34
  - type: text
    content: 'as sheep that have no shepherd.” '
  '18':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Take '
  - type: note
    content: ch. 32:28
  - type: text
    content: 'Joshua the son of Nun, a man '
  - type: note
    content: Gen. 41:38; See Judg. 3:10
  - type: text
    content: 'in whom is the Spirit, and '
  - type: note
    content: Deut. 34:9
  - type: text
    content: 'lay your hand on him. '
  '19':
  - type: text
    content: 'Make him stand before Eleazar the priest and all the congregation, and you shall '
  - type: note
    content: Deut. 3:28; 31:7, 8
  - type: text
    content: 'commission him in their sight. '
  '2':
  - type: text
    content: 'And they stood before Moses and before Eleazar the priest and before the chiefs and all the congregation, at the entrance of the tent of meeting, saying, '
  '20':
  - type: text
    content: 'You shall invest him with some of your authority, '
  - type: note
    content: See Josh. 1:16-18
  - type: text
    content: 'that all the congregation of the people of Israel may obey. '
  '21':
  - type: text
    content: 'And he shall stand before Eleazar the priest, who shall inquire for him '
  - type: note
    content: See Ex. 28:30
  - type: text
    content: 'by the judgment of the Urim before the '
  - type: text
    content: Lord
  - type: text
    content: '. At his word they shall go out, and at his word they shall come in, both he and all the people of Israel with him, the whole congregation.” '
  '22':
  - type: text
    content: 'And Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him. He took Joshua and made him stand before Eleazar the priest and the whole congregation, '
  '23':
  - type: text
    content: 'and he laid his hands on him and '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'commissioned him as the '
  - type: text
    content: Lord
  - type: text
    content: ' directed through Moses.'
  '3':
  - type: text
    content: '“Our father '
  - type: note
    content: ch. 14:35; 26:64, 65
  - type: text
    content: 'died in the wilderness. He was not among the company of those who gathered themselves together against the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 16:1, 2
  - type: text
    content: 'in the company of Korah, but '
  - type: note
    content: '[Ezek. 18:4]'
  - type: text
    content: 'died for his own sin. And he had no sons. '
  '4':
  - type: text
    content: 'Why should the name of our father be taken away from his clan because he had no son? '
  - type: note
    content: Josh. 17:4
  - type: text
    content: Give to us a possession among our father’s brothers.”
  '5':
  - type: text
    content: 'Moses '
  - type: note
    content: Ex. 18:19
  - type: text
    content: 'brought their case before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '7':
  - type: text
    content: '“The daughters of Zelophehad '
  - type: note
    content: ch. 36:5
  - type: text
    content: 'are right. '
  - type: note
    content: ch. 36:2
  - type: text
    content: 'You shall give them possession of an inheritance among their father’s brothers and transfer the inheritance of their father to them. '
  '8':
  - type: text
    content: 'And you shall speak to the people of Israel, saying, ‘If a man dies and has no son, then you shall transfer his inheritance to his daughter. '
  '9':
  - type: text
    content: 'And if he has no daughter, then you shall give his inheritance to his brothers. '
