document_id: ECC.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Contrast of Wisdom and Folly
  - type: text
    content: ' '
  - type: note
    content: Prov. 22:1; [ Song 1:3 ]
  - type: text
    content: A good name is better than precious ointment,
  - type: text
    content: 'and '
  - type: note
    content: ch. 4:2
  - type: text
    content: the day of death than the day of birth.
  '10':
  - type: text
    content: Say not, “Why were the former days better than these?”
  - type: text
    content: For it is not from wisdom that you ask this.
  '11':
  - type: text
    content: Wisdom is good with an inheritance,
  - type: text
    content: 'an advantage to those who '
  - type: note
    content: ch. 6:5; 11:7
  - type: text
    content: see the sun.
  '12':
  - type: text
    content: 'For the protection of wisdom is like '
  - type: note
    content: '[ch. 10:19]'
  - type: text
    content: the protection of money,
  - type: text
    content: 'and the advantage of knowledge is that '
  - type: note
    content: Prov. 3:18
  - type: text
    content: wisdom preserves the life of him who has it.
  '13':
  - type: text
    content: 'Consider '
  - type: note
    content: '[ch. 3:11]'
  - type: text
    content: 'the work of God:'
  - type: note
    content: '[ch. 1:15; Job 12:14; Isa. 14:27 ]'
  - type: text
    content: who can make straight what he has made crooked?
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:4, 22; Deut. 28:47 ]'
  - type: text
    content: 'In the day of prosperity be joyful, and in the day of adversity consider: God has made the one as well as the other, '
  - type: note
    content: '[ch. 3:22; 6:12]'
  - type: text
    content: so that man may not find out anything that will be after him.
  '15':
  - type: text
    content: 'In my '
  - type: note
    content: ch. 6:12; 9:9
  - type: text
    content: vain
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath” (see note on 1:2)
  - type: text
    content: ' life I have seen everything. There is '
  - type: note
    content: See ch. 8:14
  - type: text
    content: 'a righteous man who perishes in his righteousness, and there is a wicked man who '
  - type: note
    content: ch. 8:12, 13
  - type: text
    content: 'prolongs his life in his evildoing. '
  '16':
  - type: text
    content: 'Be not overly righteous, and do not '
  - type: note
    content: '[Rom. 12:3]'
  - type: text
    content: 'make yourself too wise. Why should you destroy yourself? '
  '17':
  - type: text
    content: 'Be not overly wicked, neither be a fool. '
  - type: note
    content: '[Prov. 10:27]; See Job 22:16'
  - type: text
    content: 'Why should you die before your time? '
  '18':
  - type: text
    content: 'It is good that you should take hold of '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'this, and from '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'that '
  - type: note
    content: ch. 11:6
  - type: text
    content: withhold not your hand, for the one who fears God shall come out from both of them.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:16, 18; Prov. 21:22; 24:5
  - type: text
    content: Wisdom gives strength to the wise man more than ten rulers who are in a city.
  '2':
  - type: text
    content: It is better to go to the house of mourning
  - type: text
    content: than to go to the house of feasting,
  - type: text
    content: for this is the end of all mankind,
  - type: text
    content: 'and the living will '
  - type: note
    content: '[Ps. 90:12]'
  - type: text
    content: lay it to heart.
  '20':
  - type: text
    content: 'Surely '
  - type: note
    content: See 1 Kgs. 8:46
  - type: text
    content: there is not a righteous man on earth who does good and never sins.
  '21':
  - type: text
    content: 'Do not take to heart all the things that people say, lest you hear '
  - type: note
    content: Prov. 30:10
  - type: text
    content: 'your servant cursing you. '
  '22':
  - type: text
    content: 'Your heart knows that '
  - type: note
    content: '[Gal. 6:1]'
  - type: text
    content: many times you yourself have cursed others.
  '23':
  - type: text
    content: 'All this I have tested by wisdom. '
  - type: note
    content: '[Rom. 1:22]'
  - type: text
    content: 'I said, “I will be wise,” but it was far from me. '
  '24':
  - type: text
    content: 'That which has been is far off, and '
  - type: note
    content: '[Rom. 11:33]'
  - type: text
    content: 'deep, very deep; '
  - type: note
    content: Job 28:12, 20; [1 Tim. 6:16]
  - type: text
    content: who can find it out?
  '25':
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'I turned my heart to know and to search out and to seek wisdom and the scheme of things, and to know the wickedness of folly and the foolishness that is madness. '
  '26':
  - type: text
    content: 'And I find something more '
  - type: note
    content: Prov. 5:4
  - type: text
    content: 'bitter than death: '
  - type: note
    content: See Prov. 2:16
  - type: text
    content: 'the woman whose heart is '
  - type: note
    content: Prov. 12:12; [Prov. 23:28]
  - type: text
    content: 'snares and nets, and whose hands are fetters. He who pleases God escapes her, but '
  - type: note
    content: Prov. 22:14
  - type: text
    content: 'the sinner is taken by her. '
  '27':
  - type: text
    content: 'Behold, this is what I found, says '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'the Preacher, while adding one thing to another to find the scheme of things— '
  '28':
  - type: text
    content: 'which my soul has sought repeatedly, but I have not found. '
  - type: note
    content: Job 33:23; [ver. 20]
  - type: text
    content: 'One man among a thousand I found, but '
  - type: note
    content: '[1 Kgs. 11:3]'
  - type: text
    content: 'a woman among all these I have not found. '
  '29':
  - type: text
    content: 'See, this alone I found, that '
  - type: note
    content: '[Gen. 1:27]'
  - type: text
    content: 'God made man upright, but '
  - type: note
    content: '[Gen. 3:6, 7]'
  - type: text
    content: they have sought out many schemes.
  '3':
  - type: text
    content: Sorrow is better than laughter,
  - type: note
    content: '[ 2 Cor. 7:10 ]'
  - type: text
    content: for by sadness of face the heart is made glad.
  '4':
  - type: text
    content: The heart of the wise is in the house of mourning,
  - type: text
    content: but the heart of fools is in the house of mirth.
  '5':
  - type: text
    content: 'It is '
  - type: note
    content: Prov. 13:18; 15:31, 32; [Ps. 141:5]
  - type: text
    content: better for a man to hear the rebuke of the wise
  - type: text
    content: than to hear the song of fools.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Joel 2:5 ]'
  - type: text
    content: 'For as the crackling of '
  - type: note
    content: '[Ps. 58:9; 118:12]'
  - type: text
    content: thorns under a pot,
  - type: text
    content: so is the laughter of the fools;
  - type: text
    content: this also is vanity.
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath” (see note on 1:2)
  '7':
  - type: text
    content: 'Surely '
  - type: note
    content: '[ch. 4:1]'
  - type: text
    content: oppression drives the wise into madness,
  - type: text
    content: 'and '
  - type: note
    content: Deut. 16:19; See Prov. 17:8
  - type: text
    content: a bribe corrupts the heart.
  '8':
  - type: text
    content: Better is the end of a thing than its beginning,
  - type: text
    content: 'and '
  - type: note
    content: See Prov. 14:29
  - type: text
    content: the patient in spirit is better than the proud in spirit.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 14:17; 16:32; James 1:19 ]'
  - type: text
    content: Be not quick in your spirit to become angry,
  - type: note
    content: '[ Eph. 4:26 ]'
  - type: text
    content: for anger lodges in the heart
  - type: note
    content: Hebrew in the bosom
  - type: text
    content: ' of fools.'
