document_id: ZEC.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Peace and Prosperity of Zion
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts came, saying, '
  '10':
  - type: text
    content: 'For before those days '
  - type: note
    content: '[Hag. 1:6]'
  - type: text
    content: 'there was no wage for man or any wage for beast, neither was there any safety from the foe for him who went out or came in, for I set every man against his neighbor. '
  '11':
  - type: text
    content: 'But now I will not deal with the remnant of this people as in the former days, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '12':
  - type: note
    content: Hos. 2:21, 22; Hag. 2:19
  - type: text
    content: 'For there shall be a sowing of peace. The vine shall give its fruit, and the ground shall give its produce, '
  - type: note
    content: '[Hag. 1:10]'
  - type: text
    content: 'and the heavens shall give their dew. '
  - type: note
    content: See Jer. 3:18
  - type: text
    content: 'And I will cause the remnant of this people to possess all these things. '
  '13':
  - type: text
    content: 'And as '
  - type: note
    content: '[Isa. 43:28; 65:15]'
  - type: text
    content: 'you have been a byword of cursing among the nations, O house of Judah and house of Israel, '
  - type: note
    content: ch. 10:6
  - type: text
    content: 'so will I save you, and '
  - type: note
    content: See Gen. 12:2, 3
  - type: text
    content: 'you shall be a blessing. '
  - type: note
    content: Hag. 2:5
  - type: text
    content: 'Fear not, but '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: let your hands be strong.”
  '14':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[Jer. 31:28; 32:42]'
  - type: text
    content: '“As I purposed to bring disaster to you when your fathers provoked me to wrath, and I did not relent, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  '15':
  - type: text
    content: 'so again have I purposed in these days to bring good to Jerusalem and to the house of Judah; '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'fear not. '
  '16':
  - type: text
    content: 'These are the things that you shall do: '
  - type: note
    content: Cited Eph. 4:25; See Ps. 15:2
  - type: text
    content: 'Speak the truth to one another; '
  - type: note
    content: See ch. 7:9
  - type: text
    content: 'render in your gates judgments '
  - type: note
    content: ver. 19
  - type: text
    content: 'that are true and make for peace; '
  '17':
  - type: note
    content: ch. 7:10
  - type: text
    content: 'do not devise evil in your hearts against one another, and '
  - type: note
    content: See ch. 5:4
  - type: text
    content: 'love no false oath, for all these things I hate, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '18':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts came to me, saying, '
  '19':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: The fast of the '
  - type: note
    content: '[Jer. 39:2]'
  - type: text
    content: 'fourth month and the fast of the '
  - type: note
    content: ch. 7:3
  - type: text
    content: 'fifth and the fast of the '
  - type: note
    content: ch. 7:5
  - type: text
    content: 'seventh and the fast of the '
  - type: note
    content: 2 Kgs. 25:1
  - type: text
    content: 'tenth shall be to the house of Judah '
  - type: note
    content: Isa. 35:10
  - type: text
    content: 'seasons of joy and gladness and cheerful feasts. Therefore love '
  - type: note
    content: ver. 16
  - type: text
    content: truth and peace.
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: ch. 1:14
  - type: text
    content: 'I am jealous for Zion with great jealousy, and I am jealous for her with great wrath. '
  '20':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: Peoples shall yet come, even the inhabitants of many cities. '
  '21':
  - type: text
    content: 'The inhabitants of one city shall go to another, saying, '
  - type: note
    content: '[ch. 2:11; 14:16; Isa. 2:3]'
  - type: text
    content: '‘Let us go at once '
  - type: note
    content: See ch. 7:2
  - type: text
    content: 'to entreat the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts; I myself am going.’ '
  '22':
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'Many peoples and strong nations shall come to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts in Jerusalem and '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'to entreat the favor of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: In those days '
  - type: note
    content: See Gen. 31:7
  - type: text
    content: 'ten men '
  - type: note
    content: '[Isa. 66:18; Rev. 5:9]'
  - type: text
    content: 'from the nations of every tongue shall take hold of the robe of a Jew, saying, ‘Let us go with you, for '
  - type: note
    content: '[1 Cor. 14:25]'
  - type: text
    content: we have heard that God is with you.’”
  '3':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'I have returned to Zion and '
  - type: note
    content: See ch. 2:10
  - type: text
    content: 'will dwell in the midst of Jerusalem, '
  - type: note
    content: '[Isa. 1:26]'
  - type: text
    content: 'and Jerusalem shall be called the faithful city, '
  - type: note
    content: See Isa. 2:3
  - type: text
    content: 'and the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the holy mountain. '
  '4':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[Ps. 128:6; Prov. 10:27]'
  - type: text
    content: 'Old men and old women shall again sit in the streets of Jerusalem, each with staff in hand because of great age. '
  '5':
  - type: text
    content: 'And the streets of the city shall be full of boys and girls playing in its streets. '
  '6':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[Ps. 118:23]'
  - type: text
    content: 'If it is marvelous in the sight of the remnant of this people in those days, '
  - type: note
    content: See Gen. 18:14
  - type: text
    content: 'should it also be marvelous in my sight, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts? '
  '7':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: Behold, '
  - type: note
    content: ch. 10:6
  - type: text
    content: 'I will save my people '
  - type: note
    content: Ps. 107:3; Isa. 43:5; [Isa. 49:12; Ezek. 37:21]
  - type: text
    content: 'from the east country and from the west country, '
  '8':
  - type: text
    content: 'and I will bring them to dwell in the midst of Jerusalem. '
  - type: note
    content: ch. 13:9; See Jer. 31:33
  - type: text
    content: 'And they shall be my people, and I will be their God, '
  - type: note
    content: Jer. 4:2
  - type: text
    content: in faithfulness and in righteousness.”
  '9':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: 2 Sam. 16:21; [Hag. 2:4]
  - type: text
    content: '“Let your hands be strong, you who in these days have been hearing these words from the mouth of '
  - type: note
    content: ch. 7:3; Ezra 5:1, 2
  - type: text
    content: 'the prophets who were present on '
  - type: note
    content: Hag. 2:18
  - type: text
    content: 'the day that the foundation of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts was laid, that the temple might be built. '
