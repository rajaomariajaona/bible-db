document_id: ISA.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: An Oracle Concerning Egypt
  - type: text
    content: 'An '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'oracle concerning '
  - type: note
    content: '[Joel 3:19]; See Jer. 46:13-26; Ezek. 29:1–31:2; 31:18–32:32'
  - type: text
    content: Egypt.
  - type: text
    content: 'Behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 18:10, 11; 104:3; [Matt. 26:64; Rev. 1:7]
  - type: text
    content: is riding on a swift cloud
  - type: text
    content: and comes to Egypt;
  - type: text
    content: 'and '
  - type: note
    content: Ex. 12:12; [1 Sam. 5:3; Jer. 43:12; 50:2]
  - type: text
    content: the idols of Egypt will tremble at his presence,
  - type: text
    content: 'and the heart of the Egyptians will '
  - type: note
    content: ch. 13:7; See Josh. 2:11
  - type: text
    content: melt within them.
  '10':
  - type: text
    content: 'Those who are the '
  - type: note
    content: '[Gal. 2:9]'
  - type: text
    content: pillars of the land will be crushed,
  - type: text
    content: 'and all who '
  - type: note
    content: Jer. 46:21
  - type: text
    content: work for pay will be grieved.
  '11':
  - type: text
    content: 'The princes of '
  - type: note
    content: ch. 30:4; Num. 13:22; Ps. 78:43
  - type: text
    content: Zoan are utterly foolish;
  - type: text
    content: the wisest counselors of Pharaoh give stupid counsel.
  - type: text
    content: How can you say to Pharaoh,
  - type: text
    content: “I am a son of the wise,
  - type: text
    content: a son of ancient kings”?
  '12':
  - type: text
    content: 'Where then are your '
  - type: note
    content: 1 Kgs. 4:30; Acts 7:22
  - type: text
    content: wise men?
  - type: text
    content: Let them tell you
  - type: text
    content: 'that they might know what the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has purposed against Egypt.'
  '13':
  - type: text
    content: 'The princes of '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: Zoan have become fools,
  - type: text
    content: 'and the princes of '
  - type: note
    content: Jer. 2:16; 44:1; 46:14, 19; Ezek. 30:13, 16
  - type: text
    content: Memphis are deluded;
  - type: text
    content: 'those who are the '
  - type: note
    content: '[Zech. 10:4]'
  - type: text
    content: cornerstones of her tribes
  - type: text
    content: have made Egypt stagger.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has mingled within her '
  - type: note
    content: '[1 Kgs. 22:22]'
  - type: text
    content: a spirit of confusion,
  - type: text
    content: and they will make Egypt stagger in all its deeds,
  - type: note
    content: '[ch. 24:20; 29:9 ]'
  - type: text
    content: as a drunken man staggers in his vomit.
  '15':
  - type: text
    content: And there will be nothing for Egypt
  - type: text
    content: 'that '
  - type: note
    content: ch. 9:14
  - type: text
    content: head or tail, palm branch or reed, may do.
  - type: heading
    content: Egypt, Assyria, Israel Blessed
  '16':
  - type: text
    content: 'In that day the Egyptians will be '
  - type: note
    content: Jer. 50:37; 51:30; Nah. 3:13
  - type: text
    content: 'like women, and '
  - type: note
    content: ch. 10:32
  - type: text
    content: 'tremble with fear before the hand that the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts shakes over them. '
  '17':
  - type: text
    content: 'And the land of Judah will become a terror to the Egyptians. Everyone to whom it is mentioned will fear because of the purpose that the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has purposed against them.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: ver. 21
  - type: text
    content: 'In that day there will be '
  - type: note
    content: '[ch. 30:17; 2 Kgs. 7:13]'
  - type: text
    content: 'five cities in the land of Egypt that '
  - type: note
    content: '[Zeph. 3:9]'
  - type: text
    content: 'speak the language of Canaan and swear allegiance to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. One of these will be called the City of Destruction.'
  - type: note
    content: Dead Sea Scroll and some other manuscripts City of the Sun
  '19':
  - type: text
    content: 'In that day there will be an '
  - type: note
    content: '[2 Kgs. 5:17]'
  - type: text
    content: 'altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the midst of the land of Egypt, and a '
  - type: note
    content: '[Gen. 28:18]'
  - type: text
    content: 'pillar to the '
  - type: text
    content: Lord
  - type: text
    content: ' at its border. '
  '2':
  - type: text
    content: And I will stir up Egyptians against Egyptians,
  - type: note
    content: '[ Judg. 7:22 ]'
  - type: text
    content: and they will fight, each against another
  - type: text
    content: and each against his neighbor,
  - type: text
    content: city against city, kingdom against kingdom;
  '20':
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'It will be a sign and a witness to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts in the land of Egypt. When they cry to the '
  - type: text
    content: Lord
  - type: text
    content: ' because of oppressors, '
  - type: note
    content: '[Obad. 21]'
  - type: text
    content: 'he will send them a savior and defender, and deliver them. '
  '21':
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will make himself known to the Egyptians, and the Egyptians will know the '
  - type: text
    content: Lord
  - type: text
    content: ' in that day '
  - type: note
    content: Zech. 14:16-18; [ch. 2:2]
  - type: text
    content: 'and worship with sacrifice and offering, and they will make vows to the '
  - type: text
    content: Lord
  - type: text
    content: ' and perform them. '
  '22':
  - type: note
    content: Jer. 46:25, 26
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike Egypt, striking and healing, and they will return to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will listen to their pleas for mercy and heal them.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:16
  - type: text
    content: 'In that day there will be a highway from Egypt to Assyria, and Assyria will come into Egypt, and Egypt into Assyria, '
  - type: note
    content: '[ver. 18, 21; Zeph. 3:9]'
  - type: text
    content: and the Egyptians will worship with the Assyrians.
  '24':
  - type: text
    content: 'In that day Israel will be the third with Egypt and Assyria, '
  - type: note
    content: '[Gen. 12:2, 3]'
  - type: text
    content: 'a blessing in the midst of the earth, '
  '25':
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has blessed, saying, “Blessed be Egypt '
  - type: note
    content: '[Hos. 2:23]'
  - type: text
    content: 'my people, and Assyria '
  - type: note
    content: ch. 29:23
  - type: text
    content: 'the work of my hands, and '
  - type: note
    content: Deut. 32:9
  - type: text
    content: Israel my inheritance.”
  '3':
  - type: text
    content: and the spirit of the Egyptians within them will be emptied out,
  - type: text
    content: and I will confound
  - type: note
    content: Or I will swallow up
  - type: text
    content: ' their '
  - type: note
    content: ver. 11
  - type: text
    content: counsel;
  - type: text
    content: and they will inquire of the idols and the sorcerers,
  - type: text
    content: 'and '
  - type: note
    content: ch. 8:19
  - type: text
    content: the mediums and the necromancers;
  '4':
  - type: text
    content: and I will give over the Egyptians
  - type: text
    content: 'into the hand of '
  - type: note
    content: ch. 20:4; Jer. 46:26; Ezek. 29:19
  - type: text
    content: a hard master,
  - type: text
    content: and a fierce king will rule over them,
  - type: text
    content: 'declares the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts.'
  '5':
  - type: text
    content: And the waters of the sea will be dried up,
  - type: text
    content: and the river will be dry and parched,
  '6':
  - type: text
    content: and its canals will become foul,
  - type: text
    content: and the branches of Egypt’s Nile will diminish and dry up,
  - type: text
    content: reeds and rushes will rot away.
  '7':
  - type: text
    content: There will be bare places by the Nile,
  - type: text
    content: on the brink of the Nile,
  - type: text
    content: and all that is sown by the Nile will be parched,
  - type: text
    content: will be driven away, and will be no more.
  '8':
  - type: text
    content: 'The '
  - type: note
    content: '[Num. 11:5]'
  - type: text
    content: fishermen will mourn and lament,
  - type: text
    content: all who cast a hook in the Nile;
  - type: text
    content: and they will languish
  - type: text
    content: who spread nets on the water.
  '9':
  - type: text
    content: 'The workers in '
  - type: note
    content: '[Ezek. 27:7]'
  - type: text
    content: combed flax will be in despair,
  - type: text
    content: and the weavers of white cotton.
