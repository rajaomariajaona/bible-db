  - type: note
    content: Ezra 2:2; Hag. 1:1, 12, 14; Zech. 4:6
  - type: text
    content: 'Zerubbabel and Shimei; and the sons of '
  - type: note
    content: Ezra 2:2; Hag. 1:1, 12, 14; Zech. 4:6
  - type: text
    content: 'Zerubbabel: Meshullam and Hananiah, and Shelomith was their sister; '
  '2':
  - type: text
    content: 'the third, Absalom, whose mother was Maacah, the daughter of Talmai, king of Geshur; the fourth, Adonijah, whose mother was Haggith; '
  '20':
  - type: text
    content: 'and Hashubah, Ohel, Berechiah, Hasadiah, and Jushab-hesed, five. '
  '21':
  - type: text
    content: 'The sons of Hananiah: Pelatiah and Jeshaiah, his son'
  - type: note
    content: Septuagint (compare Syriac, Vulgate); Hebrew sons of; four times in this verse
  - type: text
    content: ' Rephaiah, his son Arnan, his son Obadiah, his son Shecaniah. '
  '22':
  - type: text
    content: The son
  - type: note
    content: Hebrew sons
  - type: text
    content: ' of Shecaniah: '
  - type: note
    content: Neh. 3:29
  - type: text
    content: 'Shemaiah. And the sons of Shemaiah: '
  - type: note
    content: Ezra 8:2
  - type: text
    content: 'Hattush, Igal, Bariah, Neariah, and Shaphat, six. '
  '23':
  - type: text
    content: 'The sons of Neariah: Elioenai, Hizkiah, and Azrikam, three. '
  '24':
  - type: text
    content: 'The sons of Elioenai: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani, seven.'
  '3':
  - type: text
    content: 'the fifth, Shephatiah, by Abital; the sixth, Ithream, by his wife Eglah; '
  '4':
  - type: text
    content: 'six were born to him in Hebron, '
  - type: note
    content: 2 Sam. 2:11
  - type: text
    content: 'where he reigned for seven years and six months. '
  - type: note
    content: 2 Sam. 5:5
  - type: text
    content: 'And he reigned thirty-three years in Jerusalem. '
  '5':
  - type: note
    content: For ver. 5-8, see ch. 14:4-7; 2 Sam. 5:14-16
  - type: text
    content: 'These were born to him in Jerusalem: '
  - type: note
    content: '[ch. 14:4; 2 Sam. 5:14]'
  - type: text
    content: 'Shimea, Shobab, Nathan and '
  - type: note
    content: 2 Sam. 12:24
  - type: text
    content: 'Solomon, four by '
  - type: note
    content: '[2 Sam. 11:3]'
  - type: text
    content: 'Bath-shua, the daughter of '
  - type: note
    content: '[2 Sam. 11:3]'
  - type: text
    content: 'Ammiel; '
  '6':
  - type: text
    content: 'then Ibhar, '
  - type: note
    content: '[ch. 14:5; 2 Sam. 5:15]'
  - type: text
    content: 'Elishama, Eliphelet, '
