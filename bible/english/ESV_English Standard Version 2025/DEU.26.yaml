document_id: DEU.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings of Firstfruits and Tithes
  - type: text
    content: '“When you come into the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance and have taken possession of it and live in it, '
  '10':
  - type: text
    content: 'And behold, now I bring the first of the fruit of the ground, which you, O '
  - type: text
    content: Lord
  - type: text
    content: ', have given me.’ And you shall set it down before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and worship before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 12:7
  - type: text
    content: 'you shall rejoice in all the good that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given to you and to your house, you, and the Levite, and the sojourner who is among you.'
  '12':
  - type: text
    content: '“When you have finished paying all '
  - type: note
    content: See Lev. 27:30
  - type: text
    content: 'the tithe of your produce in the third year, which is '
  - type: note
    content: ch. 14:28, 29; [Amos 4:4]
  - type: text
    content: 'the year of tithing, giving it to the Levite, the sojourner, the fatherless, and the widow, so that they may eat within your towns and be filled, '
  '13':
  - type: text
    content: 'then you shall say before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, ‘I have removed the sacred portion out of my house, and moreover, I have given it to the Levite, the sojourner, the fatherless, and the widow, according to all your commandment that you have commanded me. I have not transgressed any of your commandments, '
  - type: note
    content: Ps. 119:141, 153, 176
  - type: text
    content: 'nor have I forgotten them. '
  '14':
  - type: note
    content: Lev. 7:20; 21:1, 11; Hos. 9:4
  - type: text
    content: 'I have not eaten of the tithe while I was mourning, or removed any of it while I was unclean, or offered any of it '
  - type: note
    content: '[Jer. 16:7]'
  - type: text
    content: 'to the dead. I have obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. I have done according to all that you have commanded me. '
  '15':
  - type: note
    content: Isa. 63:15; Zech. 2:13
  - type: text
    content: Look down from your holy habitation, from heaven, and bless your people Israel and the ground that you have given us, as you swore to our fathers, a land flowing with milk and honey.’
  '16':
  - type: text
    content: '“This day the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commands you to do these statutes and rules. You shall therefore be careful to do them with all your heart and with all your soul. '
  '17':
  - type: note
    content: '[Ex. 24:7]'
  - type: text
    content: 'You have declared today that the '
  - type: text
    content: Lord
  - type: text
    content: ' is your God, and that you will walk in his ways, and keep his statutes and his commandments and his rules, and will obey his voice. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' has declared today that you are '
  - type: note
    content: ch. 7:6; 14:2; See Ex. 19:5
  - type: text
    content: 'a people for his treasured possession, as he has promised you, and that you are to keep all his commandments, '
  '19':
  - type: text
    content: 'and that he will set you in praise and in fame and in honor '
  - type: note
    content: ch. 28:1; [ch. 32:8]
  - type: text
    content: 'high above all nations '
  - type: note
    content: Ps. 86:9
  - type: text
    content: 'that he has made, and that you shall be '
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as he promised.”'
  '2':
  - type: note
    content: ch. 16:10; Ex. 23:19; 34:26; Num. 15:20; 18:13; Prov. 3:9
  - type: text
    content: 'you shall take some of the first of all the fruit of the ground, which you harvest from your land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, and you shall put it in a basket, and you shall '
  - type: note
    content: See ch. 12:5
  - type: text
    content: 'go to the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose, to make his name to dwell there. '
  '3':
  - type: text
    content: 'And you shall go to the priest who is in office at that time and say to him, ‘I declare today to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I have come into the land '
  - type: note
    content: Ex. 13:5; See ch. 1:8
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to our fathers to give us.’ '
  '4':
  - type: text
    content: 'Then the priest shall take the basket from your hand and set it down before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: '“And you shall make response before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, ‘A '
  - type: note
    content: Gen. 43:1, 2
  - type: text
    content: 'wandering Aramean was my father. And he went down into Egypt and sojourned there, '
  - type: note
    content: '[ch. 10:22; Gen. 46:27; Acts 7:14, 15]'
  - type: text
    content: 'few in number, and there he became a nation, great, mighty, and populous. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 1:11, 14; Num. 20:15
  - type: text
    content: 'the Egyptians treated us harshly and humiliated us and laid on us hard labor. '
  '7':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 2:23-25; 3:9; Num. 20:16
  - type: text
    content: 'we cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our fathers, and the '
  - type: text
    content: Lord
  - type: text
    content: ' heard our voice and saw our affliction, our toil, and our oppression. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 12:37, 51
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt '
  - type: note
    content: See ch. 4:34
  - type: text
    content: with a mighty hand and an outstretched arm, with great deeds of terror,
  - type: note
    content: Hebrew with great terror
  - type: text
    content: ' with signs and wonders. '
  '9':
  - type: text
    content: 'And he brought us into this place and gave us this land, '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'a land flowing with milk and honey. '
