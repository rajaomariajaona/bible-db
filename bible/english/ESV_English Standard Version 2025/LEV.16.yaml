document_id: LEV.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of Atonement
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses after '
  - type: note
    content: ch. 10:1, 2
  - type: text
    content: 'the death of the two sons of Aaron, when they drew near before the '
  - type: text
    content: Lord
  - type: text
    content: ' and died, '
  '10':
  - type: text
    content: 'but the goat on which the lot fell for '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'Azazel shall be presented alive before the '
  - type: text
    content: Lord
  - type: text
    content: ' to make atonement over it, that it may be sent away into the wilderness to '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: Azazel.
  '11':
  - type: text
    content: '“Aaron shall present '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the bull as a sin offering for himself, and shall make atonement for himself and for his house. He shall kill the bull as a sin offering for himself. '
  '12':
  - type: text
    content: 'And he shall take '
  - type: note
    content: ch. 10:1; Num. 16:46; Rev. 8:3-5
  - type: text
    content: 'a censer full of coals of fire from the altar before the '
  - type: text
    content: Lord
  - type: text
    content: ', and two handfuls of sweet incense beaten small, and he shall bring it inside the veil '
  '13':
  - type: note
    content: Ex. 30:1, 7, 8
  - type: text
    content: 'and put the incense on the fire before the '
  - type: text
    content: Lord
  - type: text
    content: ', that the cloud of the incense may cover '
  - type: note
    content: Ex. 25:21
  - type: text
    content: 'the mercy seat that is over the testimony, so that he does not die. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: Heb. 9:13, 25; 10:4; See ch. 4:5, 6
  - type: text
    content: he shall take some of the blood of the bull and sprinkle it with his finger on the front of the mercy seat on the east side, and in front of the mercy seat he shall sprinkle some of the blood with his finger seven times.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Heb. 2:17; 5:1; 9:7
  - type: text
    content: '“Then he shall kill the goat of the sin offering that is for the people and bring its blood '
  - type: note
    content: ver. 2; Heb. 6:19; 9:3, 7
  - type: text
    content: 'inside the veil and do with its blood as he did with the blood of the bull, sprinkling it over the mercy seat and in front of the mercy seat. '
  '16':
  - type: text
    content: 'Thus he shall '
  - type: note
    content: ver. 18; [Ex. 29:36; Ezek. 45:18; Heb. 9:22, 23]
  - type: text
    content: 'make atonement for the Holy Place, because of the uncleannesses of the people of Israel and because of their transgressions, all their sins. And so he shall do for the tent of meeting, which dwells with them in the midst of their uncleannesses. '
  '17':
  - type: note
    content: '[Luke 1:10, 21]'
  - type: text
    content: 'No one may be in the tent of meeting from the time he enters to make atonement in the Holy Place until he comes out and has made atonement for himself and for his house and for all the assembly of Israel. '
  '18':
  - type: text
    content: 'Then he shall go out to the altar that is '
  - type: note
    content: ch. 1:5; 4:24
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: ver. 16; ch. 4:7, 18; Ex. 30:6, 10
  - type: text
    content: 'make atonement for it, and shall take some of the blood of the bull and some of the blood of the goat, and put it on the horns of the altar all around. '
  '19':
  - type: text
    content: And he shall sprinkle some of the blood on it with his finger seven times, and cleanse it and consecrate it from the uncleannesses of the people of Israel.
  '2':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Tell Aaron your brother not to '
  - type: note
    content: '[Ex. 30:10; Heb. 9:7, 12, 24, 25; 10:19-22]'
  - type: text
    content: 'come at any time into the Holy Place inside the veil, before the mercy seat that is on the ark, so that he may not die. For '
  - type: note
    content: Ex. 25:22; 40:34, 35; [1 Kgs. 8:10-12]
  - type: text
    content: 'I will appear in the cloud over the mercy seat. '
  '20':
  - type: text
    content: '“And when he has made an end of '
  - type: note
    content: ver. 16, 18; Ezek. 43:20; 45:20
  - type: text
    content: 'atoning for the Holy Place and the tent of meeting and the altar, he shall present the live goat. '
  '21':
  - type: text
    content: 'And Aaron shall lay both his hands on the head of the live goat, and confess over it all the iniquities of the people of Israel, and all their transgressions, all their sins. And he shall '
  - type: note
    content: '[Isa. 53:6; 2 Cor. 5:21]'
  - type: text
    content: 'put them on the head of the goat and send it away into the wilderness by the hand of a man who is in readiness. '
  '22':
  - type: text
    content: 'The goat shall '
  - type: note
    content: '[Isa. 53:11, 12; John 1:29; Heb. 9:28; 1 Pet. 2:24]'
  - type: text
    content: 'bear all their iniquities on itself to a remote area, and '
  - type: note
    content: '[ch. 14:7]'
  - type: text
    content: he shall let the goat go free in the wilderness.
  '23':
  - type: text
    content: '“Then Aaron shall come into the tent of meeting and '
  - type: note
    content: See ch. 6:11
  - type: text
    content: 'shall take off the linen garments that he put on when he went into the Holy Place and shall leave them there. '
  '24':
  - type: text
    content: 'And he shall bathe his body in water in a holy place and put on his garments and come out and '
  - type: note
    content: ver. 3, 5
  - type: text
    content: 'offer his burnt offering and the burnt offering of the people and make atonement for himself and for the people. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:8-10; Ex. 29:13
  - type: text
    content: 'the fat of the sin offering he shall burn on the altar. '
  '26':
  - type: text
    content: 'And he who lets the goat go to '
  - type: note
    content: ver. 8, 10
  - type: text
    content: 'Azazel shall wash his clothes and '
  - type: note
    content: '[ch. 15:5; 17:15]'
  - type: text
    content: 'bathe his body in water, and afterward he may come into the camp. '
  '27':
  - type: note
    content: ch. 4:11, 12, 21; 6:30; Heb. 13:11, 12
  - type: text
    content: 'And the bull for the sin offering and the goat for the sin offering, whose blood was brought in to make atonement in the Holy Place, shall be carried outside the camp. Their skin and their flesh and their dung shall be burned up with fire. '
  '28':
  - type: text
    content: And he who burns them shall wash his clothes and bathe his body in water, and afterward he may come into the camp.
  '29':
  - type: text
    content: '“And it shall be a statute to you forever that '
  - type: note
    content: ch. 23:27; Num. 29:7
  - type: text
    content: 'in the seventh month, on the tenth day of the month, you shall '
  - type: note
    content: ch. 23:32; Ps. 35:13; Isa. 58:3, 5; Dan. 10:12
  - type: text
    content: afflict yourselves
  - type: note
    content: Or shall fast; also verse 31
  - type: text
    content: ' and shall do no work, either '
  - type: note
    content: ch. 17:15; 18:26; 19:34; [Ex. 12:49]
  - type: text
    content: 'the native or the stranger who sojourns among you. '
  '3':
  - type: text
    content: 'But in this way Aaron shall come into the Holy Place: '
  - type: note
    content: ch. 4:3
  - type: text
    content: 'with a bull from the herd for a sin offering and '
  - type: note
    content: ch. 1:10; 8:18
  - type: text
    content: 'a ram for a burnt offering. '
  '30':
  - type: text
    content: 'For on this day shall atonement be made for you '
  - type: note
    content: Ps. 51:2; Jer. 33:8; Heb. 10:1, 2; 1 John 1:7, 9
  - type: text
    content: 'to cleanse you. You shall be clean before the '
  - type: text
    content: Lord
  - type: text
    content: ' from all your sins. '
  '31':
  - type: note
    content: ch. 23:32
  - type: text
    content: 'It is a Sabbath of solemn rest to you, and you shall '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'afflict yourselves; it is a statute forever. '
  '32':
  - type: note
    content: '[ch. 21:10]'
  - type: text
    content: 'And the priest who is anointed and '
  - type: note
    content: Ex. 29:29, 30; [Num. 20:28]
  - type: text
    content: 'consecrated as priest in his father’s place '
  - type: note
    content: ver. 4
  - type: text
    content: 'shall make atonement, wearing the holy linen garments. '
  '33':
  - type: text
    content: 'He shall make atonement for '
  - type: note
    content: ver. 16
  - type: text
    content: 'the holy sanctuary, and he shall make atonement for the tent of meeting and for '
  - type: note
    content: ver. 18
  - type: text
    content: 'the altar, and he shall make atonement for '
  - type: note
    content: ver. 6
  - type: text
    content: 'the priests and for '
  - type: note
    content: ver. 24
  - type: text
    content: 'all the people of the assembly. '
  '34':
  - type: text
    content: 'And this shall be a statute forever for you, that atonement may be made for the people of Israel '
  - type: note
    content: Ex. 30:10; Heb. 9:7, 25
  - type: text
    content: once in the year because of all their sins.” And Aaron
  - type: note
    content: Hebrew he
  - type: text
    content: ' did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '4':
  - type: text
    content: 'He shall put on '
  - type: note
    content: ch. 6:10; 8:7; Ezek. 44:17, 18; See Ex. 28:39-43
  - type: text
    content: 'the holy linen coat and shall have the linen undergarment on his body, and he shall tie the linen sash around his waist, and wear the linen turban; these are the holy garments. '
  - type: note
    content: ch. 8:6, 7; Ex. 30:20
  - type: text
    content: 'He shall bathe his body in water and then put them on. '
  '5':
  - type: text
    content: 'And he shall take from '
  - type: note
    content: ch. 4:14; Num. 29:11; 2 Chr. 29:21; Ezra 6:17
  - type: text
    content: the congregation of the people of Israel two male goats for a sin offering, and one ram for a burnt offering.
  '6':
  - type: text
    content: '“Aaron shall '
  - type: note
    content: Ezek. 45:22
  - type: text
    content: 'offer the bull as a sin offering for himself and shall '
  - type: note
    content: ver. 17, 24; ch. 9:7; Heb. 7:27, 28; 9:7
  - type: text
    content: 'make atonement for himself and for his house. '
  '7':
  - type: text
    content: 'Then he shall take the two goats and set them before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the tent of meeting. '
  '8':
  - type: text
    content: 'And Aaron shall cast lots over the two goats, one lot for the '
  - type: text
    content: Lord
  - type: text
    content: ' and the other lot for '
  - type: note
    content: ver. 26
  - type: text
    content: Azazel.
  - type: note
    content: The meaning of Azazel is uncertain; possibly the name of a place or a demon, traditionally a scapegoat; also verses 10, 26
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And Aaron shall present the goat on which the lot fell for the '
  - type: text
    content: Lord
  - type: text
    content: ' and use it as a sin offering, '
