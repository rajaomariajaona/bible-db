document_id: EST.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Agrees to Help the Jews
  - type: text
    content: 'When Mordecai learned all that had been done, Mordecai tore his clothes '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: 'and put on sackcloth and ashes, and went out into the midst of the city, and he cried out with a loud and bitter cry. '
  '10':
  - type: text
    content: 'Then Esther spoke to Hathach and commanded him to go to Mordecai and say, '
  '11':
  - type: text
    content: '“All the king’s servants and the people of the king’s provinces know that if any man or woman goes to the king inside '
  - type: note
    content: ch. 5:1; [ch. 6:4]
  - type: text
    content: 'the inner court without being called, '
  - type: note
    content: Dan. 2:9
  - type: text
    content: 'there is but one law—to be put to death, except the one '
  - type: note
    content: ch. 5:2; 8:4
  - type: text
    content: to whom the king holds out the golden scepter so that he may live. But as for me, I have not been called to come in to the king these thirty days.”
  '12':
  - type: text
    content: 'And they told Mordecai what Esther had said. '
  '13':
  - type: text
    content: 'Then Mordecai told them to reply to Esther, “Do not think to yourself that in the king’s palace you will escape any more than all the other Jews. '
  '14':
  - type: text
    content: 'For if you keep silent at this time, relief and deliverance will rise for the Jews from another place, but you and your father’s house will perish. And who knows whether you have not come to the kingdom for such a time as this?” '
  '15':
  - type: text
    content: 'Then Esther told them to reply to Mordecai, '
  '16':
  - type: text
    content: '“Go, gather all the Jews to be found in Susa, and hold a fast on my behalf, and do not eat or drink for '
  - type: note
    content: '[ch. 5:1]'
  - type: text
    content: 'three days, night or day. I and my young women will also fast as you do. Then I will go to the king, though it is against the law, '
  - type: note
    content: '[Gen. 43:14]'
  - type: text
    content: and if I perish, I perish.”
  - type: note
    content: Hebrew if I am destroyed, then I will be destroyed
  - type: text
    content: ' '
  '17':
  - type: text
    content: Mordecai then went away and did everything as Esther had ordered him.
  '2':
  - type: text
    content: 'He went up to the entrance of the king’s gate, for no one was allowed to enter the king’s gate clothed in sackcloth. '
  '3':
  - type: text
    content: 'And in every province, wherever the king’s command and his decree reached, there was great mourning among the Jews, '
  - type: note
    content: ver. 16; ch. 9:31
  - type: text
    content: 'with fasting and weeping and lamenting, and many of them '
  - type: note
    content: Dan. 9:3; [Isa. 58:5]
  - type: text
    content: lay in sackcloth and ashes.
  '4':
  - type: text
    content: 'When Esther’s young women and her eunuchs came and told her, the queen was deeply distressed. She sent garments to clothe Mordecai, so that he might take off his sackcloth, but he would not accept them. '
  '5':
  - type: text
    content: 'Then Esther called for Hathach, one of the king’s eunuchs, who had been appointed to attend her, and ordered him to go to Mordecai to learn what this was and why it was. '
  '6':
  - type: text
    content: 'Hathach went out to Mordecai in the open square of the city in front of the king’s gate, '
  '7':
  - type: text
    content: 'and Mordecai told him all that had happened to him, '
  - type: note
    content: ch. 3:9
  - type: text
    content: 'and the exact sum of money that Haman had promised to pay into the king’s treasuries for the destruction of the Jews. '
  '8':
  - type: text
    content: 'Mordecai also gave him '
  - type: note
    content: ch. 3:14; 8:13
  - type: text
    content: a copy of the written decree issued in Susa for their destruction,
  - type: note
    content: Or annihilation
  - type: text
    content: ' that he might show it to Esther and explain it to her and command her to go to the king to beg his favor and plead with him'
  - type: note
    content: Hebrew and seek from before his face
  - type: text
    content: ' on behalf of her people. '
  '9':
  - type: text
    content: 'And Hathach went and told Esther what Mordecai had said. '
