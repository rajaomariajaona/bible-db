document_id: GEN.46,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Brings His Family to Egypt
  - type: text
    content: 'So Israel took his journey with all that he had and came to '
  - type: note
    content: ch. 21:31, 33; 26:33; 28:10
  - type: text
    content: 'Beersheba, and offered sacrifices '
  - type: note
    content: ch. 26:24, 25; 28:13; 31:42
  - type: text
    content: 'to the God of his father Isaac. '
  '10':
  - type: text
    content: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul, the son of a Canaanite woman. '
  '11':
  - type: text
    content: 'The sons of '
  - type: note
    content: 1 Chr. 6:1
  - type: text
    content: 'Levi: Gershon, Kohath, and Merari. '
  '12':
  - type: text
    content: 'The sons of '
  - type: note
    content: 1 Chr. 2:3; 4:21
  - type: text
    content: 'Judah: Er, Onan, Shelah, Perez, and Zerah (but '
  - type: note
    content: ch. 38:3, 7, 10
  - type: text
    content: 'Er and Onan died in the land of Canaan); and the sons of '
  - type: note
    content: ch. 38:29; 1 Chr. 2:5
  - type: text
    content: 'Perez were Hezron and Hamul. '
  '13':
  - type: note
    content: 1 Chr. 7:1
  - type: text
    content: 'The sons of Issachar: Tola, Puvah, Yob, and Shimron. '
  '14':
  - type: text
    content: 'The sons of Zebulun: Sered, Elon, and Jahleel. '
  '15':
  - type: text
    content: 'These are the sons of Leah, '
  - type: note
    content: See ch. 29:32-35; 30:1-21
  - type: text
    content: whom she bore to Jacob in Paddan-aram, together with his daughter Dinah; altogether his sons and his daughters numbered thirty-three.
  '16':
  - type: text
    content: 'The sons of Gad: Ziphion, Haggi, Shuni, Ezbon, Eri, Arodi, and Areli. '
  '17':
  - type: note
    content: 1 Chr. 7:30
  - type: text
    content: 'The sons of Asher: Imnah, Ishvah, Ishvi, Beriah, with Serah their sister. And the sons of Beriah: Heber and Malchiel. '
  '18':
  - type: note
    content: See ch. 30:10-13
  - type: text
    content: 'These are the sons of Zilpah, '
  - type: note
    content: ch. 29:24
  - type: text
    content: whom Laban gave to Leah his daughter; and these she bore to Jacob—sixteen persons.
  '19':
  - type: text
    content: 'The sons of Rachel, Jacob’s wife: Joseph and Benjamin. '
  '2':
  - type: text
    content: 'And God spoke to Israel '
  - type: note
    content: ch. 15:1; Job 33:14, 15
  - type: text
    content: 'in visions of the night and said, “Jacob, Jacob.” And he said, “Here I am.” '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: ch. 41:50-52
  - type: text
    content: 'to Joseph in the land of Egypt were born Manasseh and Ephraim, whom Asenath, the daughter of Potiphera the priest of '
  - type: note
    content: ch. 41:45
  - type: text
    content: 'On, bore to him. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: See Num. 26:38-40; 1 Chr. 7:6-12; 8:1
  - type: text
    content: 'the sons of Benjamin: Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard. '
  '22':
  - type: text
    content: These are the sons of Rachel, who were born to Jacob—fourteen persons in all.
  '23':
  - type: text
    content: The son
  - type: note
    content: Hebrew sons
  - type: text
    content: ' of Dan: Hushim. '
  '24':
  - type: note
    content: 1 Chr. 7:13
  - type: text
    content: 'The sons of Naphtali: Jahzeel, Guni, Jezer, and Shillem. '
  '25':
  - type: note
    content: See ch. 30:5-8
  - type: text
    content: 'These are the sons of Bilhah, '
  - type: note
    content: ch. 29:29
  - type: text
    content: whom Laban gave to Rachel his daughter, and these she bore to Jacob—seven persons in all.
  '26':
  - type: text
    content: 'All the persons belonging to Jacob who came into Egypt, who were his own descendants, not including Jacob’s sons’ wives, were sixty-six persons in all. '
  '27':
  - type: text
    content: 'And the sons of Joseph, who were born to him in Egypt, were two. '
  - type: note
    content: Ex. 1:5; Deut. 10:22; [Acts 7:14]
  - type: text
    content: All the persons of the house of Jacob who came into Egypt were seventy.
  - type: heading
    content: Jacob and Joseph Reunited
  '28':
  - type: text
    content: 'He had sent Judah ahead of him to Joseph to show the way before him in Goshen, and they came '
  - type: note
    content: See ch. 45:10
  - type: text
    content: 'into the land of Goshen. '
  '29':
  - type: text
    content: 'Then Joseph prepared his chariot and went up to meet Israel his father in Goshen. He presented himself to him and '
  - type: note
    content: '[ch. 45:14]'
  - type: text
    content: 'fell on his neck and wept on his neck a good while. '
  '3':
  - type: text
    content: 'Then he said, “I am God, '
  - type: note
    content: ch. 28:13
  - type: text
    content: 'the God of your father. Do not be afraid to go down to Egypt, for there I will '
  - type: note
    content: ch. 35:11; [ch. 12:2; Ex. 1:7, 9; Deut. 26:5]
  - type: text
    content: 'make you into a great nation. '
  '30':
  - type: text
    content: 'Israel said to Joseph, '
  - type: note
    content: '[Luke 2:29, 30]'
  - type: text
    content: '“Now let me die, since I have seen your face and know that you are still alive.” '
  '31':
  - type: text
    content: 'Joseph said to his brothers and to his father’s household, '
  - type: note
    content: ch. 47:1
  - type: text
    content: '“I will go up and tell Pharaoh and will say to him, ‘My brothers and my father’s household, who were in the land of Canaan, have come to me. '
  '32':
  - type: note
    content: ch. 47:3
  - type: text
    content: 'And the men are shepherds, for they have been keepers of livestock, and they have brought their flocks and their herds and all that they have.’ '
  '33':
  - type: text
    content: 'When Pharaoh calls you and says, '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: '‘What is your occupation?’ '
  '34':
  - type: text
    content: 'you shall say, '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: '‘Your servants have been keepers of livestock '
  - type: note
    content: ch. 37:12
  - type: text
    content: 'from our youth even until now, both we and our fathers,’ in order that you may dwell '
  - type: note
    content: ver. 28
  - type: text
    content: 'in the land of Goshen, for every shepherd is '
  - type: note
    content: ch. 43:32; Ex. 8:26
  - type: text
    content: an abomination to the Egyptians.”
  '4':
  - type: text
    content: 'I myself will go down with you to Egypt, and I will also '
  - type: note
    content: ch. 15:16; 28:15; 48:21; 50:24; Ex. 3:8
  - type: text
    content: 'bring you up again, and '
  - type: note
    content: ch. 50:1
  - type: text
    content: Joseph’s hand shall close your eyes.”
  '5':
  - type: text
    content: 'Then Jacob set out from Beersheba. The sons of Israel carried Jacob their father, their little ones, and their wives, in the wagons '
  - type: note
    content: ch. 45:19, 21, 27
  - type: text
    content: 'that Pharaoh had sent to carry him. '
  '6':
  - type: text
    content: 'They also took their livestock and their goods, which they had gained in the land of Canaan, and '
  - type: note
    content: Josh. 24:4; Ps. 105:23; Isa. 52:4; Acts 7:14, 15
  - type: text
    content: 'came into Egypt, Jacob and all his offspring with him, '
  '7':
  - type: text
    content: his sons, and his sons’ sons with him, his daughters, and his sons’ daughters. All his offspring he brought with him into Egypt.
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-11, see Ex. 6:14-16
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 1:1-5
  - type: text
    content: 'these are the names of the descendants of Israel, who came into Egypt, Jacob and his sons. '
  - type: note
    content: Num. 26:5; 1 Chr. 5:1-3
  - type: text
    content: 'Reuben, Jacob’s firstborn, '
  '9':
  - type: text
    content: 'and the sons of Reuben: Hanoch, Pallu, Hezron, and Carmi. '
