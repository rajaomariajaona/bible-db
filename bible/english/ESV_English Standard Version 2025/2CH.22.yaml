document_id: 2CH.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaziah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-6, see 2 Kgs. 8:24-29
  - type: text
    content: 'And the inhabitants of Jerusalem made Ahaziah, his youngest son, king in his place, for the band of men that came with '
  - type: note
    content: See ch. 21:16
  - type: text
    content: 'the Arabians to the camp had killed all the older sons. So Ahaziah the son of Jehoram king of Judah reigned. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10-12, see 2 Kgs. 11:1-3
  - type: text
    content: 'Now when Athaliah the mother of Ahaziah saw that her son was dead, she arose and destroyed all the royal family of the house of Judah. '
  '11':
  - type: text
    content: But Jehoshabeath,
  - type: note
    content: Spelled Jehosheba in 2 Kings 11:2
  - type: text
    content: ' the daughter of the king, took Joash the son of Ahaziah and stole him away from among the king’s sons who were about to be put to death, and she put him and his nurse in a bedroom. Thus Jehoshabeath, the daughter of King Jehoram and wife of Jehoiada the priest, because she was a sister of Ahaziah, hid him'
  - type: note
    content: That is, Joash
  - type: text
    content: ' from Athaliah, so that she did not put him to death. '
  '12':
  - type: text
    content: And he remained with them six years, hidden in the house of God, while Athaliah reigned over the land.
  '2':
  - type: text
    content: Ahaziah was twenty-two
  - type: note
    content: See 2 Kings 8:26; Hebrew forty-two; Septuagint twenty
  - type: text
    content: ' years old when he began to reign, and he reigned one year in Jerusalem. His mother’s name was Athaliah, '
  - type: note
    content: '[ch. 21:6]'
  - type: text
    content: 'the granddaughter of Omri. '
  '3':
  - type: text
    content: 'He also walked in the ways of the house of Ahab, for his mother was his counselor in doing wickedly. '
  '4':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', as the house of Ahab had done. For after the death of his father they were his counselors, to his undoing. '
  '5':
  - type: text
    content: 'He even followed their counsel and went with Jehoram the son of Ahab king of Israel to make war against Hazael king of Syria at Ramoth-gilead. And the Syrians wounded Joram, '
  '6':
  - type: text
    content: and he returned to be healed in Jezreel of the wounds that he had received at Ramah, when he fought against Hazael king of Syria. And Ahaziah the son of Jehoram king of Judah went down to see Joram the son of Ahab in Jezreel, because he was wounded.
  '7':
  - type: text
    content: But it was ordained by
  - type: note
    content: Hebrew was from
  - type: text
    content: ' God that the downfall of Ahaziah should come about through his going to visit Joram. For when he came there, '
  - type: note
    content: 2 Kgs. 9:21
  - type: text
    content: 'he went out with Jehoram to meet Jehu the son of Nimshi, '
  - type: note
    content: 2 Kgs. 9:6, 7
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had anointed to destroy the house of Ahab. '
  '8':
  - type: note
    content: See 2 Kgs. 10:11-14
  - type: text
    content: 'And when Jehu was '
  - type: note
    content: '[ch. 24:24]'
  - type: text
    content: 'executing judgment on the house of Ahab, he met the princes of Judah and the sons of Ahaziah’s brothers, who attended Ahaziah, and he killed them. '
  '9':
  - type: note
    content: '[2 Kgs. 9:27]'
  - type: text
    content: 'He searched for Ahaziah, and he was captured while hiding in Samaria, and he was brought to Jehu and put to death. '
  - type: note
    content: 2 Kgs. 9:28
  - type: text
    content: 'They buried him, for they said, “He is the grandson of Jehoshaphat, '
  - type: note
    content: ch. 17:4
  - type: text
    content: 'who sought the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his heart.” And the house of Ahaziah had no one able to rule the kingdom.'
  - type: heading
    content: Athaliah Reigns in Judah
