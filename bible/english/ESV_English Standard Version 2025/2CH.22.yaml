document_id: 2CH.22,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaziah Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-6, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 8:24-29
      marker-yv: yv-n
    - type: text
      text: 'And the inhabitants of Jerusalem made Ahaziah, his youngest son, king in his place, for the band of men that came with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:16
      marker-yv: yv-n
    - type: text
      text: 'the Arabians to the camp had killed all the older sons. So Ahaziah the son of Jehoram king of Judah reigned. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 10-12, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 11:1-3
      marker-yv: yv-n
    - type: text
      text: 'Now when Athaliah the mother of Ahaziah saw that her son was dead, she arose and destroyed all the royal family of the house of Judah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But Jehoshabeath,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Spelled '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jehosheba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in 2 Kings 11:2
      marker-yv: yv-n
    - type: text
      text: ' the daughter of the king, took Joash the son of Ahaziah and stole him away from among the king’s sons who were about to be put to death, and she put him and his nurse in a bedroom. Thus Jehoshabeath, the daughter of King Jehoram and wife of Jehoiada the priest, because she was a sister of Ahaziah, hid him'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Joash
      marker-yv: yv-n
    - type: text
      text: ' from Athaliah, so that she did not put him to death. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And he remained with them six years, hidden in the house of God, while Athaliah reigned over the land.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ahaziah was twenty-two
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See 2 Kings 8:26; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: forty-two
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; Septuagint '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: twenty
      marker-yv: yv-n
    - type: text
      text: ' years old when he began to reign, and he reigned one year in Jerusalem. His mother’s name was Athaliah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the granddaughter of Omri. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He also walked in the ways of the house of Ahab, for his mother was his counselor in doing wickedly. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as the house of Ahab had done. For after the death of his father they were his counselors, to his undoing. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He even followed their counsel and went with Jehoram the son of Ahab king of Israel to make war against Hazael king of Syria at Ramoth-gilead. And the Syrians wounded Joram, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and he returned to be healed in Jezreel of the wounds that he had received at Ramah, when he fought against Hazael king of Syria. And Ahaziah the son of Jehoram king of Judah went down to see Joram the son of Ahab in Jezreel, because he was wounded.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But it was ordained by
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: was from
      marker-yv: yv-n
    - type: text
      text: ' God that the downfall of Ahaziah should come about through his going to visit Joram. For when he came there, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 9:21
      marker-yv: yv-n
    - type: text
      text: 'he went out with Jehoram to meet Jehu the son of Nimshi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 9:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      marker-yv: yv-n
    - type: text
      text: 'whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had anointed to destroy the house of Ahab. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 10:11-14
      marker-yv: yv-n
    - type: text
      text: 'And when Jehu was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:24
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'executing judgment on the house of Ahab, he met the princes of Judah and the sons of Ahaziah’s brothers, who attended Ahaziah, and he killed them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 9:27
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'He searched for Ahaziah, and he was captured while hiding in Samaria, and he was brought to Jehu and put to death. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 9:28
      marker-yv: yv-n
    - type: text
      text: 'They buried him, for they said, “He is the grandson of Jehoshaphat, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:4
      marker-yv: yv-n
    - type: text
      text: 'who sought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all his heart.” And the house of Ahaziah had no one able to rule the kingdom.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Athaliah Reigns in Judah
    marker-yv: yv-h
