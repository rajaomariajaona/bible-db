document_id: LUK.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and Zacchaeus
  - type: text
    content: ' '
  - type: note
    content: ch. 18:35; [ Matt. 20:29; Mark 10:46 ]
  - type: text
    content: 'He entered Jericho and was passing through. '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Ezek. 34:11, 16; [ch. 15:4; Matt. 9:13; 10:6; 15:24; 18:12]
  - type: text
    content: the Son of Man came to seek and to save the lost.”
  - type: heading
    content: The Parable of the Ten Minas
  '11':
  - type: text
    content: 'As they heard these things, he proceeded to tell a parable, because he was near to Jerusalem, and because '
  - type: note
    content: '[ch. 17:20; Acts 1:6]'
  - type: text
    content: 'they supposed that the kingdom of God was to appear immediately. '
  '12':
  - type: text
    content: 'He said therefore, '
  - type: note
    content: For ver. 12-27, [Matt. 25:14-30; Mark 13:34]
  - type: text
    content: “A nobleman went into a far country to receive for himself a kingdom and then return.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Calling '
  - type: note
    content: Matt. 25:1
  - type: text
    content: ten of his servants,
  - type: note
    content: Or bondservants; also verse 15
  - type: text
    content: ' '
  - type: text
    content: he gave them ten minas,
  - type: note
    content: A mina was about three months’ wages for a laborer
  - type: text
    content: ' '
  - type: text
    content: 'and said to them, ‘Engage in business '
  - type: note
    content: '[John 21:22, 23]'
  - type: text
    content: until I come.’
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But '
  - type: note
    content: '[John 1:14]'
  - type: text
    content: his citizens hated him and sent a delegation after him, saying, ‘We do not want this man to reign over us.’
  - type: text
    content: ' '
  '15':
  - type: text
    content: When he returned, having received the kingdom, he ordered these servants to whom he had given the money to be called to him, that he might know what they had gained by doing business.
  - type: text
    content: ' '
  '16':
  - type: text
    content: The first came before him, saying, ‘Lord, your mina has made ten minas more.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: And he said to him, ‘Well done, good servant!
  - type: note
    content: Or bondservant; also verse 22
  - type: text
    content: ' '
  - type: text
    content: 'Because you have been '
  - type: note
    content: ch. 16:10; 1 Cor. 4:2; [1 Tim. 3:13]
  - type: text
    content: 'faithful in a very little, '
  - type: note
    content: '[Matt. 24:47]'
  - type: text
    content: you shall have authority over ten cities.’
  - type: text
    content: ' '
  '18':
  - type: text
    content: And the second came, saying, ‘Lord, your mina has made five minas.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: And he said to him, ‘And you are to be over five cities.’
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And behold, there was a man named Zacchaeus. He was a chief tax collector and was rich. '
  '20':
  - type: text
    content: 'Then another came, saying, ‘Lord, here is your mina, which I kept laid away in '
  - type: note
    content: John 11:44; 20:7; Acts 19:12 (Gk.)
  - type: text
    content: a handkerchief;
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'for I was afraid of you, because you are '
  - type: note
    content: '[1 Sam. 25:3]'
  - type: text
    content: 'a severe man. You take '
  - type: note
    content: '[2 Cor. 8:12]'
  - type: text
    content: what you did not deposit, and reap what you did not sow.’
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'He said to him, '
  - type: note
    content: 2 Sam. 1:16; Job 9:20; 15:6
  - type: text
    content: '‘I will condemn you with your own words, '
  - type: note
    content: Matt. 18:32
  - type: text
    content: 'you wicked servant! You knew that I was '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: a severe man, taking what I did not deposit and reaping what I did not sow?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Why then did you not put my money in the bank, and at my coming I might have collected it with interest?’
  - type: text
    content: ' '
  '24':
  - type: text
    content: And he said to those who stood by, ‘Take the mina from him, and give it to the one who has the ten minas.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: And they said to him, ‘Lord, he has ten minas!’
  - type: text
    content: ' '
  '26':
  - type: text
    content: '‘I tell you that '
  - type: note
    content: '[ch. 12:48]; See Matt. 13:12'
  - type: text
    content: to everyone who has, more will be given, but from the one who has not, even what he has will be taken away.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'as for these enemies of mine, who did not want me to reign over them, bring them here and '
  - type: note
    content: ch. 20:16; Matt. 22:7; [1 Sam. 15:33]
  - type: text
    content: slaughter them before me.’”
  - type: heading
    content: The Triumphal Entry
  '28':
  - type: text
    content: 'And when he had said these things, '
  - type: note
    content: Mark 10:32
  - type: text
    content: 'he went on ahead, '
  - type: note
    content: See ch. 9:51; 10:30
  - type: text
    content: 'going up to Jerusalem. '
  '29':
  - type: note
    content: For ver. 29-38, see Matt. 21:1-9; Mark 11:1-10; John 12:12-15; [Zech. 9:9]
  - type: text
    content: 'When he drew near to Bethphage and '
  - type: note
    content: ch. 24:50; Matt. 21:17; John 11:18
  - type: text
    content: 'Bethany, at '
  - type: note
    content: Zech. 14:4; Matt. 24:3; 26:30; [John 8:1]; [Acts 1:12]
  - type: text
    content: 'the mount that is called Olivet, he sent '
  - type: note
    content: '[Mark 14:13]'
  - type: text
    content: 'two of the disciples, '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: '[John 12:21]'
  - type: text
    content: 'he was seeking to see who Jesus was, but on account of the crowd he could not, because he was small in stature. '
  '30':
  - type: text
    content: 'saying, '
  - type: text
    content: '“Go into the village in front of you, where on entering you will find a colt tied, '
  - type: note
    content: '[ch. 23:53]'
  - type: text
    content: on which no one has ever yet sat. Untie it and bring it here.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'If anyone asks you, ‘Why are you untying it?’ you shall say this: ‘The Lord has need of it.’”'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'So those who were sent went away and found it '
  - type: note
    content: ch. 22:13
  - type: text
    content: 'just as he had told them. '
  '33':
  - type: text
    content: 'And as they were untying the colt, its owners said to them, “Why are you untying the colt?” '
  '34':
  - type: text
    content: 'And they said, “The Lord has need of it.” '
  '35':
  - type: text
    content: 'And they brought it to Jesus, and throwing their cloaks on the colt, they set Jesus on it. '
  '36':
  - type: text
    content: 'And as he rode along, they '
  - type: note
    content: 2 Kgs. 9:13
  - type: text
    content: 'spread their cloaks on the road. '
  '37':
  - type: text
    content: As he was drawing near—already on the way down the Mount of Olives—
  - type: note
    content: '[ch. 18:43]'
  - type: text
    content: 'the whole multitude of his disciples began to rejoice and praise God with a loud voice '
  - type: note
    content: '[John 12:17, 18]'
  - type: text
    content: 'for all the mighty works that they had seen, '
  '38':
  - type: text
    content: 'saying, '
  - type: note
    content: ch. 13:35; Cited from Ps. 118:26
  - type: text
    content: '“Blessed is '
  - type: note
    content: See Matt. 25:34; John 1:49
  - type: text
    content: 'the King who comes in the name of the Lord! Peace in heaven and '
  - type: note
    content: ch. 2:14; [Ps. 148:1]
  - type: text
    content: 'glory in the highest!” '
  '39':
  - type: note
    content: '[Matt. 21:15, 16]'
  - type: text
    content: 'And some of the Pharisees in the crowd said to him, “Teacher, rebuke your disciples.” '
  '4':
  - type: text
    content: 'So he ran on ahead and climbed up into '
  - type: note
    content: 1 Kgs. 10:27; 1 Chr. 27:28; Ps. 78:47; Isa. 9:10
  - type: text
    content: 'a sycamore tree to see him, for he was about to pass that way. '
  '40':
  - type: text
    content: 'He answered, '
  - type: text
    content: '“I tell you, if these were silent, '
  - type: note
    content: Hab. 2:11
  - type: text
    content: the very stones would cry out.”
  - type: heading
    content: Jesus Weeps over Jerusalem
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-44, [ch. 13:34, 35; 23:28-31 ]
  - type: text
    content: 'And when he drew near and saw the city, '
  - type: note
    content: '[John 11:35; Heb. 5:7]'
  - type: text
    content: 'he wept over it, '
  '42':
  - type: text
    content: 'saying, '
  - type: note
    content: '[Deut. 32:29]'
  - type: text
    content: '“Would that you, even you, had known on this day the things that make for peace! But now '
  - type: note
    content: '[John 12:40]'
  - type: text
    content: they are hidden from your eyes.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 17:22
  - type: text
    content: 'the days will come upon you, when your enemies '
  - type: note
    content: Isa. 29:3; 37:33; Jer. 6:6; Ezek. 4:2; 26:8
  - type: text
    content: 'will set up a barricade around you and '
  - type: note
    content: ch. 21:20
  - type: text
    content: surround you and hem you in on every side
  - type: text
    content: ' '
  '44':
  - type: note
    content: '[Ps. 137:9; Hos. 13:16; Nah. 3:10]'
  - type: text
    content: 'and tear you down to the ground, you and your children within you. And '
  - type: note
    content: ch. 21:6
  - type: text
    content: 'they will not leave one stone upon another in you, because you did not know '
  - type: note
    content: '[Dan. 9:24]'
  - type: text
    content: 'the time of your '
  - type: note
    content: 1 Pet. 2:12
  - type: text
    content: visitation.”
  - type: heading
    content: Jesus Cleanses the Temple
  '45':
  - type: text
    content: ' '
  - type: note
    content: For ver. 45-47, see Matt. 21:12-16; Mark 11:15-18; [ John 2:14-16 ]
  - type: text
    content: 'And he entered the temple and began to drive out those who sold, '
  '46':
  - type: text
    content: 'saying to them, '
  - type: text
    content: '“It is written, '
  - type: note
    content: Cited from Isa. 56:7
  - type: text
    content: '‘My house shall be a house of prayer,’ but '
  - type: note
    content: Jer. 7:11
  - type: text
    content: you have made it a den of robbers.”
  '47':
  - type: text
    content: ' '
  - type: note
    content: ch. 20:1; See Matt. 26:55
  - type: text
    content: 'And he was teaching daily in the temple. '
  - type: note
    content: See Matt. 21:46
  - type: text
    content: 'The chief priests and the scribes and the principal men of the people were seeking to destroy him, '
  '48':
  - type: text
    content: but they did not find anything they could do, for all the people were hanging on his words.
  '5':
  - type: text
    content: 'And when Jesus came to the place, he looked up and said to him, '
  - type: text
    content: '“Zacchaeus, hurry and come down, for '
  - type: note
    content: '[ch. 13:33]'
  - type: text
    content: I must stay at your house today.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'So he hurried and came down and '
  - type: note
    content: ch. 10:38
  - type: text
    content: 'received him joyfully. '
  '7':
  - type: text
    content: 'And when they saw it, they all '
  - type: note
    content: See ch. 15:2
  - type: text
    content: 'grumbled, “He has gone in to be the guest of a man who is a sinner.” '
  '8':
  - type: text
    content: 'And Zacchaeus stood and said to the Lord, “Behold, Lord, the half of my goods '
  - type: note
    content: '[ch. 18:22]'
  - type: text
    content: 'I give to the poor. And if I have '
  - type: note
    content: ch. 3:14
  - type: text
    content: 'defrauded anyone of anything, I restore it '
  - type: note
    content: Ex. 22:1; 2 Sam. 12:6
  - type: text
    content: 'fourfold.” '
  '9':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Today salvation has come to this house, since '
  - type: note
    content: John 8:33; Rom. 4:11, 12, 16; Gal. 3:7
  - type: text
    content: he also is a son of Abraham.
  - type: text
    content: ' '
