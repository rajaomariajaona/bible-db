document_id: GAL.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, an '
  - type: note
    content: See 2 Cor. 1:1
  - type: text
    content: apostle—
  - type: note
    content: ver. 11, 12
  - type: text
    content: 'not from men nor through man, but '
  - type: note
    content: Acts 9:6; 20:24; 22:10, 15, 21; 26:16; [1 Tim. 1:1; Titus 1:3]
  - type: text
    content: 'through Jesus Christ and God the Father, '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'who raised him from the dead— '
  '10':
  - type: text
    content: 'For am I now seeking the approval of man, or of God? Or am I trying '
  - type: note
    content: 1 Thess. 2:4; [Rom. 2:29; 1 Cor. 10:33; Eph. 6:6; Col. 3:22]
  - type: text
    content: 'to please man? If I were still trying to please man, I would not be a '
  - type: note
    content: '[Rom. 1:1]'
  - type: text
    content: servant
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' of Christ.'
  - type: heading
    content: Paul Called by God
  '11':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 15:1
  - type: text
    content: 'I would have you know, brothers, that '
  - type: note
    content: See Rom. 2:16
  - type: text
    content: the gospel that was preached by me is not man’s gospel.
  - type: note
    content: Greek not according to man
  - type: text
    content: ' '
  '12':
  - type: note
    content: ver. 1; 1 Cor. 11:23; 15:3; [Acts 22:14]
  - type: text
    content: 'For I did not receive it from any man, nor was I taught it, but I received it '
  - type: note
    content: ver. 16; See 1 Cor. 2:10; 2 Cor. 12:1
  - type: text
    content: 'through a revelation of Jesus Christ. '
  '13':
  - type: text
    content: 'For you have heard of '
  - type: note
    content: '[Acts 26:4]'
  - type: text
    content: 'my former life in Judaism, how '
  - type: note
    content: See Acts 8:3
  - type: text
    content: 'I persecuted the church of God violently and tried to destroy it. '
  '14':
  - type: text
    content: 'And I was advancing in Judaism beyond many of my own age among my people, so extremely '
  - type: note
    content: Phil. 3:6; See Acts 21:20
  - type: text
    content: 'zealous was I for '
  - type: note
    content: '[Jer. 9:14; 2 Tim. 1:3]; See Matt. 15:2'
  - type: text
    content: 'the traditions of my fathers. '
  '15':
  - type: text
    content: 'But when he '
  - type: note
    content: Acts 13:2; Rom. 1:1
  - type: text
    content: 'who had set me apart '
  - type: note
    content: Isa. 49:1, 5; Jer. 1:5; Luke 1:15
  - type: text
    content: before I was born,
  - type: note
    content: Greek set me apart from my mother’s womb
  - type: text
    content: ' and who '
  - type: note
    content: ver. 6
  - type: text
    content: 'called me by his grace, '
  '16':
  - type: text
    content: was pleased to reveal his Son to
  - type: note
    content: Greek in
  - type: text
    content: ' me, in order '
  - type: note
    content: ch. 2:9; See Acts 9:15
  - type: text
    content: that I might preach him among the Gentiles, I did not immediately consult with anyone;
  - type: note
    content: Greek with flesh and blood
  - type: text
    content: ' '
  '17':
  - type: text
    content: nor did I go up to Jerusalem to those who were apostles before me, but I went away into Arabia, and returned again to Damascus.
  '18':
  - type: text
    content: 'Then '
  - type: note
    content: '[Acts 9:22, 23]'
  - type: text
    content: 'after three years I went up to Jerusalem to visit Cephas and remained with him fifteen days. '
  '19':
  - type: text
    content: 'But I saw none of the other apostles except James '
  - type: note
    content: See Matt. 12:46; Acts 12:17
  - type: text
    content: 'the Lord’s brother. '
  '2':
  - type: text
    content: 'and all '
  - type: note
    content: Phil. 4:21
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verse 11
  - type: text
    content: ' who are with me,'
  - type: text
    content: 'To '
  - type: note
    content: Acts 16:6; 1 Cor. 16:1
  - type: text
    content: 'the churches of Galatia:'
  '20':
  - type: text
    content: '(In what I am writing to you, '
  - type: note
    content: See Rom. 1:9; 9:1
  - type: text
    content: 'before God, I do not lie!) '
  '21':
  - type: note
    content: '[Acts 9:30; 11:25, 26; 13:1]'
  - type: text
    content: 'Then I went into the regions of Syria and Cilicia. '
  '22':
  - type: text
    content: 'And I was still unknown in person to '
  - type: note
    content: 1 Thess. 2:14
  - type: text
    content: 'the churches of Judea that are in Christ. '
  '23':
  - type: text
    content: 'They only were hearing it said, “He who used to persecute us is now preaching the faith he once tried to destroy.” '
  '24':
  - type: text
    content: And they glorified God because of me.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Rom. 1:7; 1 Cor. 1:3
  - type: text
    content: 'Grace to you and peace '
  - type: note
    content: 1 Tim. 1:2
  - type: text
    content: 'from God our Father and the Lord Jesus Christ, '
  '4':
  - type: note
    content: See Matt. 20:28; Rom. 4:25; 1 Cor. 15:3
  - type: text
    content: 'who gave himself for our sins to deliver us from the present '
  - type: note
    content: '[Eph. 2:2; 1 John 5:19]; See John 15:19'
  - type: text
    content: 'evil age, according to the will of '
  - type: note
    content: Phil. 4:20; 1 Thess. 1:3; 3:11, 13
  - type: text
    content: 'our God and Father, '
  '5':
  - type: text
    content: to whom be the glory forever and ever. Amen.
  - type: heading
    content: No Other Gospel
  '6':
  - type: text
    content: 'I am astonished that you are '
  - type: note
    content: '[ch. 4:13; Acts 16:6; 18:23]'
  - type: text
    content: 'so quickly deserting '
  - type: note
    content: ch. 5:8
  - type: text
    content: 'him who called you in the grace of Christ and are turning to '
  - type: note
    content: 2 Cor. 11:4; [1 Tim. 1:3]
  - type: text
    content: 'a different gospel— '
  '7':
  - type: note
    content: '[Acts 4:12; 1 Cor. 3:11]'
  - type: text
    content: 'not that there is another one, but '
  - type: note
    content: ch. 5:10; Acts 15:24; See 2 Cor. 11:13
  - type: text
    content: 'there are some who trouble you and want to distort the gospel of Christ. '
  '8':
  - type: text
    content: 'But even if we or '
  - type: note
    content: 2 Cor. 11:14
  - type: text
    content: 'an angel from heaven should preach to you a gospel contrary to the one we preached to you, '
  - type: note
    content: See Rom. 9:3
  - type: text
    content: 'let him be accursed. '
  '9':
  - type: text
    content: 'As we have said before, so now I say again: If anyone is preaching to you a gospel contrary to the one you received, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: let him be accursed.
