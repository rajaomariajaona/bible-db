document_id: 2SA.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Kindness to Mephibosheth
  - type: text
    content: 'And David said, “Is there still anyone left of the house of Saul, that I may '
  - type: note
    content: 1 Sam. 18:3; 20:14, 15, 42
  - type: text
    content: 'show him kindness for Jonathan’s sake?” '
  '10':
  - type: text
    content: 'And you and your sons and your servants shall till the land for him and shall bring in the produce, that your master’s grandson may have bread to eat. But Mephibosheth your master’s grandson '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'shall always eat at my table.” Now Ziba had '
  - type: note
    content: ch. 19:17
  - type: text
    content: 'fifteen sons and twenty servants. '
  '11':
  - type: text
    content: 'Then Ziba said to the king, “According to all that my lord the king commands his servant, so will your servant do.” So Mephibosheth '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: ate at David’s
  - type: note
    content: Septuagint; Hebrew my
  - type: text
    content: ' table, like one of the king’s sons. '
  '12':
  - type: text
    content: 'And Mephibosheth had a young son, '
  - type: note
    content: 1 Chr. 8:34
  - type: text
    content: 'whose name was Mica. And all who lived in Ziba’s house became Mephibosheth’s servants. '
  '13':
  - type: text
    content: 'So Mephibosheth lived in Jerusalem, for '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'he ate always at the king’s table. Now '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: he was lame in both his feet.
  '2':
  - type: text
    content: 'Now there was a servant of the house of Saul whose name was '
  - type: note
    content: ch. 16:1-4; 19:17, 29
  - type: text
    content: 'Ziba, and they called him to David. And the king said to him, “Are you Ziba?” And he said, “I am your servant.” '
  '3':
  - type: text
    content: 'And the king said, “Is there not still someone of the house of Saul, that I may show '
  - type: note
    content: 1 Sam. 20:14
  - type: text
    content: 'the kindness of God to him?” Ziba said to the king, “There is still a son of '
  - type: note
    content: ch. 4:4
  - type: text
    content: 'Jonathan; he is crippled in his feet.” '
  '4':
  - type: text
    content: 'The king said to him, “Where is he?” And Ziba said to the king, “He is in the house of '
  - type: note
    content: ch. 17:27
  - type: text
    content: 'Machir the son of Ammiel, at Lo-debar.” '
  '5':
  - type: text
    content: 'Then King David sent and brought him from the house of Machir the son of Ammiel, at Lo-debar. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: ch. 16:4; 19:24, 25, 30; 21:7; [1 Chr. 8:34; 9:40]
  - type: text
    content: 'Mephibosheth the son of Jonathan, son of Saul, came to David and fell on his face and paid homage. And David said, “Mephibosheth!” And he answered, “Behold, I am your servant.” '
  '7':
  - type: text
    content: 'And David said to him, “Do not fear, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'for I will show you kindness for the sake of your father Jonathan, and I will restore to you all the land of Saul your father, and '
  - type: note
    content: ch. 19:28; 1 Kgs. 2:7; [2 Kgs. 25:29]
  - type: text
    content: 'you shall eat at my table always.” '
  '8':
  - type: text
    content: 'And he paid homage and said, “What is your servant, that you should show regard for '
  - type: note
    content: ch. 16:9; 1 Sam. 24:14
  - type: text
    content: a dead dog such as I?”
  '9':
  - type: text
    content: 'Then the king called Ziba, Saul’s servant, and said to him, “All that belonged to Saul and to all his house I have given to your master’s grandson. '
