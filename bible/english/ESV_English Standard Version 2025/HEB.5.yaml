document_id: HEB.5,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'For every high priest chosen from among men '
  - type: note
    content: ch. 8:3
  - type: text
    content: 'is appointed to act on behalf of men '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'in relation to God, '
  - type: note
    content: ch. 8:3, 4; 9:9; 10:11; 11:4
  - type: text
    content: 'to offer gifts and sacrifices for sins. '
  '10':
  - type: text
    content: 'being designated by God a high priest '
  - type: note
    content: ver. 6; ch. 6:20
  - type: text
    content: after the order of Melchizedek.
  - type: heading
    content: Warning Against Apostasy
  '11':
  - type: text
    content: 'About this we have much to say, and it is '
  - type: note
    content: '[2 Pet. 3:16]'
  - type: text
    content: 'hard to explain, since you have become dull of hearing. '
  '12':
  - type: text
    content: 'For though by this time you ought to be teachers, you need someone to teach you again '
  - type: note
    content: ch. 6:1
  - type: text
    content: 'the basic principles of the oracles of God. You need '
  - type: note
    content: 1 Cor. 3:2
  - type: text
    content: 'milk, not solid food, '
  '13':
  - type: text
    content: 'for everyone who lives on milk is unskilled in the word of righteousness, since he is '
  - type: note
    content: 1 Cor. 3:1; [1 Pet. 2:2]
  - type: text
    content: 'a child. '
  '14':
  - type: text
    content: 'But solid food is for '
  - type: note
    content: Eph. 4:13
  - type: text
    content: 'the mature, for those who have their powers '
  - type: note
    content: Gen. 3:22; 1 Kgs. 3:9; Isa. 7:15
  - type: text
    content: of discernment trained by constant practice to distinguish good from evil.
  '2':
  - type: note
    content: ch. 2:18; 4:15
  - type: text
    content: 'He can deal gently with the ignorant and wayward, since he himself '
  - type: note
    content: '[ch. 7:28]'
  - type: text
    content: 'is beset with weakness. '
  '3':
  - type: text
    content: 'Because of this he is obligated to offer sacrifice for his own sins '
  - type: note
    content: ch. 7:27; 9:7; Lev. 4:3; 9:7; 16:6
  - type: text
    content: 'just as he does for those of the people. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Num. 16:5, 40; 18:7; 2 Chr. 26:18
  - type: text
    content: 'no one takes this honor for himself, but only when called by God, '
  - type: note
    content: Ex. 28:1; 1 Chr. 23:13
  - type: text
    content: just as Aaron was.
  '5':
  - type: text
    content: 'So also Christ '
  - type: note
    content: John 8:54
  - type: text
    content: did not exalt himself to be made a high priest, but was appointed by him who said to him,
  - type: note
    content: See ch. 1:5
  - type: text
    content: “You are my Son,
  - type: text
    content: today I have begotten you”;
  '6':
  - type: text
    content: as he says also in another place,
  - type: note
    content: ch. 7:17, 21; Cited from Ps. 110:4
  - type: text
    content: “You are a priest forever,
  - type: text
    content: after the order of Melchizedek.”
  '7':
  - type: text
    content: 'In the days of his flesh, '
  - type: note
    content: Matt. 26:39, 44; Mark 14:36, 39; Luke 22:41, 44
  - type: text
    content: Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' offered up prayers and supplications, '
  - type: note
    content: Ps. 22:1, 2; [Matt. 27:46, 50; Mark 15:34, 37; Luke 23:46]
  - type: text
    content: 'with loud cries and tears, to him '
  - type: note
    content: Mark 14:36
  - type: text
    content: 'who was able to save him from death, and '
  - type: note
    content: Ps. 22:24
  - type: text
    content: 'he was heard because of his reverence. '
  '8':
  - type: text
    content: 'Although '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'he was a son, '
  - type: note
    content: Phil. 2:8
  - type: text
    content: 'he learned obedience through what he suffered. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 2:10
  - type: text
    content: 'being made perfect, he became the source of eternal salvation to all who obey him, '
