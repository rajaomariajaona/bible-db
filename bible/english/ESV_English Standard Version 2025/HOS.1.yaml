document_id: HOS.1,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Hosea, the son of Beeri, '
  - type: note
    content: Isa. 1:1; Amos 1:1; Mic. 1:1
  - type: text
    content: 'in the days of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah, and in the days of '
  - type: note
    content: 2 Kgs. 14:23; 15:1
  - type: text
    content: Jeroboam the son of Joash, king of Israel.
  - type: heading
    content: Hosea’s Wife and Children
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ch 2:1 in Hebrew
  - type: text
    content: 'Yet '
  - type: note
    content: '[Ezek. 36:10, 37]'
  - type: text
    content: 'the number of the children of Israel shall be '
  - type: note
    content: Gen. 22:17; See Gen. 13:16
  - type: text
    content: 'like the sand of the sea, which cannot be measured or numbered. '
  - type: note
    content: Cited Rom. 9:26
  - type: text
    content: 'And '
  - type: note
    content: Isa. 62:4
  - type: text
    content: 'in the place where it was said to them, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: '“You are not my people,” it shall be said to them, '
  - type: note
    content: Deut. 14:1; [2 Cor. 6:18]
  - type: text
    content: “Children
  - type: note
    content: Or Sons
  - type: text
    content: ' of '
  - type: note
    content: Ps. 42:2; See Josh. 3:10
  - type: text
    content: 'the living God.” '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Isa. 11:12, 13; Jer. 3:18; 50:4; Ezek. 34:23; Zech. 10:6; See Ezek. 37:16-24
  - type: text
    content: 'the children of Judah and the children of Israel shall be gathered together, and '
  - type: note
    content: '[ch. 3:5]'
  - type: text
    content: they shall appoint for themselves one head. And they shall go up from the land, for great shall be the day of Jezreel.
  '2':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' first spoke through Hosea, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Hosea, '
  - type: note
    content: '[ch. 3:1]'
  - type: text
    content: '“Go, take to yourself a wife of whoredom and have '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'children of whoredom, for '
  - type: note
    content: '[ch. 2:5]; See Ezek. 16:15'
  - type: text
    content: 'the land commits great whoredom by forsaking the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: So he went and took Gomer, the daughter of Diblaim, and she conceived and bore him a son.
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Call his name Jezreel, for in just a little while '
  - type: note
    content: '[2 Kgs. 10:11]'
  - type: text
    content: 'I will punish the house of Jehu for the blood of Jezreel, and '
  - type: note
    content: '[Amos 7:9]'
  - type: text
    content: 'I will put an end to the kingdom of the house of Israel. '
  '5':
  - type: text
    content: 'And on that day '
  - type: note
    content: '[2 Kgs. 15:29]'
  - type: text
    content: 'I will break the bow of Israel '
  - type: note
    content: Josh. 17:16; Judg. 6:33
  - type: text
    content: in the Valley of Jezreel.”
  '6':
  - type: text
    content: 'She conceived again and bore a daughter. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  - type: note
    content: '[ver. 9; ch. 2:1, 23; Rom. 9:25; 1 Pet. 2:10]'
  - type: text
    content: “Call her name No Mercy,
  - type: note
    content: Hebrew Lo-ruhama, which means she has not received mercy
  - type: text
    content: ' for '
  - type: note
    content: ch. 2:4; 2 Kgs. 17:6, 23
  - type: text
    content: 'I will no more have mercy on the house of Israel, to forgive them at all. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 11:12; 2 Kgs. 19:35]'
  - type: text
    content: 'I will have mercy on the house of Judah, and I will save them by the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. I '
  - type: note
    content: '[ch. 2:18; Zech. 4:6; 9:10]'
  - type: text
    content: will not save them by bow or by sword or by war or by horses or by horsemen.”
  '8':
  - type: text
    content: 'When she had weaned No Mercy, she conceived and bore a son. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: ver. 4, 6
  - type: text
    content: “Call his name Not My People,
  - type: note
    content: Hebrew Lo-ammi, which means not my people
  - type: text
    content: ' for '
  - type: note
    content: ch. 2:23; [Lev. 26:12]
  - type: text
    content: you are not my people, and I am not your God.”
  - type: note
    content: Hebrew I am not yours
