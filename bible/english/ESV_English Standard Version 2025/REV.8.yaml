document_id: REV.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seventh Seal and the Golden Censer
  - type: text
    content: 'When the Lamb opened '
  - type: note
    content: ch. 5:1; 6:1
  - type: text
    content: 'the seventh seal, there was silence in heaven for about half an hour. '
  '10':
  - type: text
    content: 'The third angel blew his trumpet, and '
  - type: note
    content: ch. 9:1; [Isa. 14:12]
  - type: text
    content: 'a great star fell from heaven, blazing like a torch, and it fell on a third of the rivers and on '
  - type: note
    content: ch. 14:7; 16:4
  - type: text
    content: 'the springs of water. '
  '11':
  - type: text
    content: The name of the star is Wormwood.
  - type: note
    content: Wormwood is the name of a plant and of the bitter-tasting extract derived from it
  - type: text
    content: ' A third of the waters '
  - type: note
    content: Deut. 29:18; Jer. 9:15; 23:15
  - type: text
    content: 'became wormwood, and many people died from the water, '
  - type: note
    content: '[Ex. 15:23]'
  - type: text
    content: because it had been made bitter.
  '12':
  - type: text
    content: 'The fourth angel blew his trumpet, and a third of '
  - type: note
    content: '[Ex. 10:21-23; Isa. 13:10; 30:26]'
  - type: text
    content: the sun was struck, and a third of the moon, and a third of the stars, so that a third of their light might be darkened, and a third of the day might be kept from shining, and likewise a third of the night.
  '13':
  - type: text
    content: 'Then I looked, and I heard an eagle crying with a loud voice as it flew directly overhead, '
  - type: note
    content: '[ch. 9:12; 11:14]'
  - type: text
    content: “Woe, woe, woe to those who dwell on the earth, at the blasts of the other trumpets that the three angels are about to blow!”
  '2':
  - type: text
    content: 'Then I saw the seven angels '
  - type: note
    content: Luke 1:19
  - type: text
    content: 'who stand before God, and seven trumpets were given to them. '
  '3':
  - type: text
    content: 'And another angel came and stood '
  - type: note
    content: Amos 9:1
  - type: text
    content: 'at the altar with a golden censer, and he was given much incense to offer with '
  - type: note
    content: ch. 5:8
  - type: text
    content: 'the prayers of all the saints on '
  - type: note
    content: ch. 9:13; Ex. 30:1, 3
  - type: text
    content: 'the golden altar before the throne, '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 141:2]'
  - type: text
    content: 'the smoke of the incense, with the prayers of the saints, rose before God from the hand of the angel. '
  '5':
  - type: text
    content: 'Then the angel took the censer and '
  - type: note
    content: Lev. 16:12
  - type: text
    content: 'filled it with fire from the altar and threw it on the earth, and '
  - type: note
    content: '[Ps. 18:7, 8]'
  - type: text
    content: 'there were peals of '
  - type: note
    content: See ch. 4:5
  - type: text
    content: thunder, rumblings,
  - type: note
    content: Or voices, or sounds
  - type: text
    content: ' flashes of lightning, and an earthquake.'
  - type: heading
    content: The Seven Trumpets
  '6':
  - type: text
    content: Now the seven angels who had the seven trumpets prepared to blow them.
  '7':
  - type: text
    content: 'The first angel blew his trumpet, and there followed '
  - type: note
    content: Ex. 9:23, 24; Ps. 18:13; Ezek. 38:22
  - type: text
    content: 'hail and '
  - type: note
    content: Joel 2:30
  - type: text
    content: 'fire, mixed with blood, and these were thrown upon the earth. And a '
  - type: note
    content: ver. 8-12; ch. 9:15, 18; 12:4; [Zech. 13:8, 9]
  - type: text
    content: 'third of the earth was burned up, and a third of '
  - type: note
    content: ch. 9:4; Isa. 2:13
  - type: text
    content: the trees were burned up, and all green grass was burned up.
  '8':
  - type: text
    content: 'The second angel blew his trumpet, and something like '
  - type: note
    content: Jer. 51:25; [Mark 11:23]
  - type: text
    content: 'a great mountain, burning with fire, was thrown into the sea, and a third of the sea '
  - type: note
    content: ch. 11:6; [Ex. 7:17, 19]
  - type: text
    content: 'became blood. '
  '9':
  - type: text
    content: 'A third of the living creatures in the sea died, and a third of '
  - type: note
    content: Isa. 2:16
  - type: text
    content: the ships were destroyed.
