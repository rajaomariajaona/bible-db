document_id: EXO.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'The Second Plague: Frogs'
  - type: text
    content: ' '
  - type: note
    content: Ch 7:26 in Hebrew
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go in to Pharaoh and say to him, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', “Let my people go, that '
  - type: note
    content: ver. 20; ch. 3:12, 18
  - type: text
    content: 'they may serve me. '
  '10':
  - type: text
    content: 'And he said, “Tomorrow.” Moses said, “Be it as you say, so '
  - type: note
    content: ver. 22; ch. 7:17
  - type: text
    content: 'that you may know that '
  - type: note
    content: ch. 9:14; Deut. 33:26; 2 Sam. 7:22; 1 Chr. 17:20; Ps. 86:8; Isa. 46:9; Jer. 10:6, 7
  - type: text
    content: 'there is no one like the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '11':
  - type: text
    content: 'The frogs shall go away from you and your houses and your servants and your people. They shall be left only in the Nile.” '
  '12':
  - type: text
    content: 'So Moses and Aaron went out from Pharaoh, and Moses cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' about the frogs, as he had agreed with Pharaoh.'
  - type: note
    content: Or which he had brought upon Pharaoh
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did according to the word of Moses. The frogs died out in the houses, the courtyards, and the fields. '
  '14':
  - type: text
    content: 'And they gathered them together in heaps, and the land stank. '
  '15':
  - type: text
    content: 'But when Pharaoh saw that there was a '
  - type: note
    content: '[Eccles. 8:11]'
  - type: text
    content: 'respite, he '
  - type: note
    content: ver. 32; ch. 7:14; 9:7, 34; 10:1
  - type: text
    content: 'hardened his heart and would not listen to them, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  - type: heading
    content: 'The Third Plague: Gnats'
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Say to Aaron, '
  - type: note
    content: See ch. 7:19
  - type: text
    content: '‘Stretch out your staff and strike the dust of the earth, so that it may become gnats in all the land of Egypt.’” '
  '17':
  - type: text
    content: 'And they did so. Aaron stretched out his hand with his staff and struck the dust of the earth, and '
  - type: note
    content: Ps. 105:31
  - type: text
    content: 'there were gnats on man and beast. All the dust of the earth became gnats in all the land of Egypt. '
  '18':
  - type: text
    content: 'The '
  - type: note
    content: See ch. 7:11
  - type: text
    content: 'magicians tried by their secret arts to produce gnats, but they could not. So there were gnats on man and beast. '
  '19':
  - type: text
    content: 'Then the magicians said to Pharaoh, “This is '
  - type: note
    content: ch. 31:18; Ps. 8:3; Luke 11:20
  - type: text
    content: 'the finger of God.” But Pharaoh’s heart was hardened, and he would not listen to them, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  - type: heading
    content: 'The Fourth Plague: Flies'
  '2':
  - type: text
    content: 'But if you '
  - type: note
    content: ch. 7:14; 9:2
  - type: text
    content: 'refuse to let them go, behold, I will plague all your country with '
  - type: note
    content: '[Rev. 16:13]'
  - type: text
    content: 'frogs. '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ch. 7:15; 9:13
  - type: text
    content: '“Rise up early in the morning and present yourself to Pharaoh, as he goes out to the water, and say to him, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 1
  - type: text
    content: '“Let my people go, that they may serve me. '
  '21':
  - type: text
    content: 'Or else, if you will not let my people go, behold, I will send swarms of flies on you and your servants and your people, and into your houses. And the houses of the Egyptians shall be filled with swarms of flies, and also the ground on which they stand. '
  '22':
  - type: text
    content: 'But on that day '
  - type: note
    content: ch. 9:4; 11:7; [Mal. 3:18]
  - type: text
    content: 'I will set apart the land of Goshen, where my people dwell, so that no swarms of flies shall be there, '
  - type: note
    content: ver. 10; ch. 7:17
  - type: text
    content: 'that you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' in the midst of the earth.'
  - type: note
    content: Or that I the Lord am in the land
  - type: text
    content: ' '
  '23':
  - type: text
    content: Thus I will put a division
  - type: note
    content: Septuagint, Vulgate; Hebrew set redemption
  - type: text
    content: ' between my people and your people. Tomorrow this sign shall happen.”’” '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did so. '
  - type: note
    content: Ps. 78:45; 105:31; [Isa. 7:18]
  - type: text
    content: There came great swarms of flies into the house of Pharaoh and into his servants’ houses. Throughout all the land of Egypt the land was ruined by the swarms of flies.
  '25':
  - type: text
    content: 'Then Pharaoh called Moses and Aaron and said, “Go, sacrifice to your God within the land.” '
  '26':
  - type: text
    content: 'But Moses said, “It would not be right to do so, for the offerings we shall sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God are an '
  - type: note
    content: '[Gen. 43:32; 46:34]'
  - type: text
    content: 'abomination to the Egyptians. If we sacrifice offerings '
  - type: note
    content: '[Gen. 43:32; 46:34]'
  - type: text
    content: 'abominable to the Egyptians before their eyes, will they not stone us? '
  '27':
  - type: text
    content: 'We must go '
  - type: note
    content: ch. 3:18
  - type: text
    content: 'three days’ journey into the wilderness and sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'as he tells us.” '
  '28':
  - type: text
    content: 'So Pharaoh said, “I will let you go to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in the wilderness; only you must not go very far away. '
  - type: note
    content: See ver. 8
  - type: text
    content: 'Plead for me.” '
  '29':
  - type: text
    content: 'Then Moses said, “Behold, I am going out from you and I will plead with the '
  - type: text
    content: Lord
  - type: text
    content: ' that the swarms of flies may depart from Pharaoh, from his servants, and from his people, tomorrow. Only let not Pharaoh '
  - type: note
    content: ver. 15; [Jer. 42:20, 21]
  - type: text
    content: 'cheat again by not letting the people go to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: 'The Nile shall swarm with frogs that shall come up into your house and into '
  - type: note
    content: Ps. 105:30
  - type: text
    content: your bedroom and on your bed and into the houses of your servants and your people,
  - type: note
    content: Or among your people
  - type: text
    content: ' and into your ovens and your kneading bowls. '
  '30':
  - type: text
    content: 'So Moses went out from Pharaoh and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did as Moses asked, and removed the swarms of flies from Pharaoh, from his servants, and from his people; not one remained. '
  '32':
  - type: text
    content: 'But Pharaoh '
  - type: note
    content: ver. 15
  - type: text
    content: hardened his heart this time also, and did not let the people go.
  '4':
  - type: text
    content: 'The frogs shall come up on you and on your people and on all your servants.”’” '
  '5':
  - type: note
    content: Ch 8:1 in Hebrew
  - type: text
    content: ' And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Say to Aaron, '
  - type: note
    content: See ch. 7:19
  - type: text
    content: '‘Stretch out your hand with your staff over the rivers, over the canals and over the pools, and make frogs come up on the land of Egypt!’” '
  '6':
  - type: text
    content: 'So Aaron stretched out his hand over the waters of Egypt, and '
  - type: note
    content: Ps. 78:45; 105:30
  - type: text
    content: 'the frogs came up and covered the land of Egypt. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 7:11
  - type: text
    content: the magicians did the same by their secret arts and made frogs come up on the land of Egypt.
  '8':
  - type: text
    content: 'Then Pharaoh called Moses and Aaron and said, '
  - type: note
    content: ver. 28, 30; ch. 9:28; 10:17, 18; [Num. 21:7; 1 Kgs. 13:6; Acts 8:24]
  - type: text
    content: '“Plead with the '
  - type: text
    content: Lord
  - type: text
    content: ' to take away the frogs from me and from my people, and '
  - type: note
    content: ver. 25-28; ch. 10:8, 24; 12:31, 32
  - type: text
    content: 'I will let the people go to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '9':
  - type: text
    content: 'Moses said to Pharaoh, “Be pleased to command me when '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'I am to plead for you and for your servants and for your people, that the frogs be cut off from you and your houses and be left only in the Nile.” '
