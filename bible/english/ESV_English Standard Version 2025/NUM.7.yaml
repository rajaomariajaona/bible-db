document_id: NUM.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings at the Tabernacle’s Consecration
  - type: text
    content: 'On the day when Moses had finished '
  - type: note
    content: Ex. 40:17, 18
  - type: text
    content: 'setting up the tabernacle and had anointed and '
  - type: note
    content: Lev. 8:10, 11
  - type: text
    content: 'consecrated it with all its furnishings and had anointed and consecrated the altar with all its utensils, '
  '10':
  - type: text
    content: 'And the chiefs offered offerings for the '
  - type: note
    content: Deut. 20:5; 1 Kgs. 8:63; 2 Chr. 7:5, 9; Ezra 6:16; Neh. 12:27
  - type: text
    content: 'dedication of the altar on the day it was anointed; and the chiefs offered their offering before the altar. '
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “They shall offer their offerings, one chief each day, for the dedication of the altar.”'
  '12':
  - type: text
    content: 'He who offered his offering the first day was '
  - type: note
    content: See Ex. 6:23
  - type: text
    content: 'Nahshon the son of Amminadab, of the tribe of Judah. '
  '13':
  - type: text
    content: And his offering was one silver plate whose weight was 130 shekels,
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' one silver basin of 70 shekels, according to '
  - type: note
    content: See Ex. 30:13
  - type: text
    content: 'the shekel of the sanctuary, both of them full of fine flour mixed with oil for a '
  - type: note
    content: ch. 8:8; See Ex. 29:41
  - type: text
    content: 'grain offering; '
  '14':
  - type: text
    content: 'one golden dish of 10 shekels, full of '
  - type: note
    content: Ex. 30:34, 35
  - type: text
    content: 'incense; '
  '15':
  - type: note
    content: Lev. 1:2, 3
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '16':
  - type: text
    content: 'one male goat for a '
  - type: note
    content: Lev. 4:23, 24
  - type: text
    content: 'sin offering; '
  '17':
  - type: text
    content: 'and for '
  - type: note
    content: Lev. 3:1
  - type: text
    content: the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Nahshon the son of Amminadab.
  '18':
  - type: text
    content: 'On the second day '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'Nethanel the son of Zuar, the chief of Issachar, made an offering. '
  '19':
  - type: text
    content: 'He offered for his offering one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '2':
  - type: note
    content: ch. 1:4
  - type: text
    content: 'the chiefs of Israel, heads of their fathers’ houses, who were the chiefs of the tribes, who were over those who were listed, approached '
  '20':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '21':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '22':
  - type: text
    content: 'one male goat for a sin offering; '
  '23':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Nethanel the son of Zuar.
  '24':
  - type: text
    content: 'On the third day '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'Eliab the son of Helon, the chief of the people of Zebulun: '
  '25':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '26':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '27':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '28':
  - type: text
    content: 'one male goat for a sin offering; '
  '29':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Eliab the son of Helon.
  '3':
  - type: text
    content: 'and brought their offerings before the '
  - type: text
    content: Lord
  - type: text
    content: ', six wagons and twelve oxen, a wagon for every two of the chiefs, and for each one an ox. They brought them before the tabernacle. '
  '30':
  - type: text
    content: 'On the fourth day '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'Elizur the son of Shedeur, the chief of the people of Reuben: '
  '31':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '32':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '33':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '34':
  - type: text
    content: 'one male goat for a sin offering; '
  '35':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Elizur the son of Shedeur.
  '36':
  - type: text
    content: 'On the fifth day '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'Shelumiel the son of Zurishaddai, the chief of the people of Simeon: '
  '37':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '38':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '39':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '40':
  - type: text
    content: 'one male goat for a sin offering; '
  '41':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Shelumiel the son of Zurishaddai.
  '42':
  - type: text
    content: 'On the sixth day '
  - type: note
    content: ch. 1:14; [ch. 2:14]
  - type: text
    content: 'Eliasaph the son of Deuel, the chief of the people of Gad: '
  '43':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '44':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '45':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '46':
  - type: text
    content: 'one male goat for a sin offering; '
  '47':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Eliasaph the son of Deuel.
  '48':
  - type: text
    content: 'On the seventh day '
  - type: note
    content: ch. 1:10
  - type: text
    content: 'Elishama the son of Ammihud, the chief of the people of Ephraim: '
  '49':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '5':
  - type: text
    content: '“Accept these from them, that they may be used in the service of the tent of meeting, and give them to the Levites, to each man according to his service.” '
  '50':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '51':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '52':
  - type: text
    content: 'one male goat for a sin offering; '
  '53':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Elishama the son of Ammihud.
  '54':
  - type: text
    content: 'On the eighth day '
  - type: note
    content: ch. 1:10
  - type: text
    content: 'Gamaliel the son of Pedahzur, the chief of the people of Manasseh: '
  '55':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '56':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '57':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '58':
  - type: text
    content: 'one male goat for a sin offering; '
  '59':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Gamaliel the son of Pedahzur.
  '6':
  - type: text
    content: 'So Moses took the wagons and the oxen and gave them to the Levites. '
  '60':
  - type: text
    content: 'On the ninth day '
  - type: note
    content: ch. 1:11
  - type: text
    content: 'Abidan the son of Gideoni, the chief of the people of Benjamin: '
  '61':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '62':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '63':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '64':
  - type: text
    content: 'one male goat for a sin offering; '
  '65':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Abidan the son of Gideoni.
  '66':
  - type: text
    content: 'On the tenth day '
  - type: note
    content: ch. 1:12
  - type: text
    content: 'Ahiezer the son of Ammishaddai, the chief of the people of Dan: '
  '67':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '68':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '69':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '7':
  - type: text
    content: 'Two wagons and four oxen '
  - type: note
    content: ch. 4:25, 28
  - type: text
    content: 'he gave to the sons of Gershon, according to their service. '
  '70':
  - type: text
    content: 'one male goat for a sin offering; '
  '71':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Ahiezer the son of Ammishaddai.
  '72':
  - type: text
    content: 'On the eleventh day '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'Pagiel the son of Ochran, the chief of the people of Asher: '
  '73':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '74':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '75':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '76':
  - type: text
    content: 'one male goat for a sin offering; '
  '77':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Pagiel the son of Ochran.
  '78':
  - type: text
    content: 'On the twelfth day '
  - type: note
    content: ch. 1:15
  - type: text
    content: 'Ahira the son of Enan, the chief of the people of Naphtali: '
  '79':
  - type: text
    content: 'his offering was one silver plate whose weight was 130 shekels, one silver basin of 70 shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a grain offering; '
  '8':
  - type: text
    content: 'And four wagons and eight oxen '
  - type: note
    content: ch. 4:29, 31, 33
  - type: text
    content: 'he gave to the sons of Merari, according to their service, under the direction of Ithamar the son of Aaron the priest. '
  '80':
  - type: text
    content: 'one golden dish of 10 shekels, full of incense; '
  '81':
  - type: text
    content: 'one bull from the herd, one ram, one male lamb a year old, for a burnt offering; '
  '82':
  - type: text
    content: 'one male goat for a sin offering; '
  '83':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, and five male lambs a year old. This was the offering of Ahira the son of Enan.
  '84':
  - type: text
    content: 'This was the dedication offering for the altar on the day when it was anointed, from the chiefs of Israel: twelve silver plates, twelve silver basins, twelve golden dishes, '
  '85':
  - type: text
    content: 'each silver plate weighing 130 shekels and each basin 70, all the silver of the vessels 2,400 shekels according to the shekel of the sanctuary, '
  '86':
  - type: text
    content: 'the twelve golden dishes, full of incense, weighing 10 shekels apiece according to the shekel of the sanctuary, all the gold of the dishes being 120 shekels; '
  '87':
  - type: text
    content: 'all the cattle for the burnt offering twelve bulls, twelve rams, twelve male lambs a year old, with their grain offering; and twelve male goats for a sin offering; '
  '88':
  - type: text
    content: 'and all the cattle for the sacrifice of peace offerings twenty-four bulls, the rams sixty, the male goats sixty, the male lambs a year old sixty. This was the dedication offering for the altar after it '
  - type: note
    content: ver. 1, 10
  - type: text
    content: was anointed.
  '89':
  - type: text
    content: 'And when Moses went into the tent of meeting '
  - type: note
    content: ch. 12:8; See Ex. 33:9-11
  - type: text
    content: 'to speak with the '
  - type: text
    content: Lord
  - type: text
    content: ', he heard '
  - type: note
    content: See Ex. 25:22
  - type: text
    content: the voice speaking to him from above the mercy seat that was on the ark of the testimony, from between the two cherubim; and it spoke to him.
  '9':
  - type: text
    content: 'But to the sons of Kohath he gave none, because they were charged with '
  - type: note
    content: ch. 3:31; See ch. 4:4-15
  - type: text
    content: 'the service of the holy things that '
  - type: note
    content: '[2 Sam. 6:13; 1 Chr. 15:5, 15]'
  - type: text
    content: 'had to be carried on the shoulder. '
