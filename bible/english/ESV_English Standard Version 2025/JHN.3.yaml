document_id: JHN.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: You Must Be Born Again
  - type: text
    content: 'Now there was a man of the Pharisees named '
  - type: note
    content: ch. 7:50; 19:39
  - type: text
    content: 'Nicodemus, '
  - type: note
    content: See Luke 24:20
  - type: text
    content: 'a ruler of the Jews. '
  '10':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“Are you the teacher of Israel '
  - type: note
    content: '[ch. 9:30]'
  - type: text
    content: and yet you do not understand these things?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: See ver. 32
  - type: text
    content: 'we speak of what we know, and bear witness to what we have seen, but '
  - type: note
    content: See ver. 32
  - type: text
    content: you
  - type: note
    content: The Greek for you is plural here; also four times in verse 12
  - type: text
    content: ' '
  - type: text
    content: do not receive our testimony.
  - type: text
    content: ' '
  '12':
  - type: text
    content: If I have told you earthly things and you do not believe, how can you believe if I tell you heavenly things?
  - type: text
    content: ' '
  '13':
  - type: note
    content: Prov. 30:4; [Acts 2:34; Eph. 4:9]
  - type: text
    content: 'No one has '
  - type: note
    content: '[ch. 7:34]'
  - type: text
    content: 'ascended into heaven except '
  - type: note
    content: ver. 31; ch. 6:38, 42, 62; 1 Cor. 15:47; [Rom. 10:6]
  - type: text
    content: he who descended from heaven, the Son of Man.
  - type: note
    content: Some manuscripts add who is in heaven
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: Num. 21:9
  - type: text
    content: 'as Moses lifted up the serpent in the wilderness, so must the Son of Man '
  - type: note
    content: ch. 8:28; 12:32, 34
  - type: text
    content: be lifted up,
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'that whoever believes '
  - type: note
    content: '[ch. 15:4; 16:33; 1 John 5:12, 20]'
  - type: text
    content: 'in him '
  - type: note
    content: ver. 36
  - type: text
    content: may have eternal life.
  - type: note
    content: Some interpreters hold that the quotation ends at verse 15
  - type: heading
    content: For God So Loved the World
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“For '
  - type: note
    content: Rom. 5:8; Eph. 2:4; 2 Thess. 2:16; 1 John 3:1; 4:9, 10
  - type: text
    content: 'God so loved '
  - type: note
    content: See ch. 1:29
  - type: text
    content: the world,
  - type: text
    content: ' '
  - type: note
    content: Or For this is how God loved the world
  - type: note
    content: Rom. 8:32
  - type: text
    content: 'that he gave his only Son, that whoever believes in him should not '
  - type: note
    content: ch. 10:28
  - type: text
    content: perish but have eternal life.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: ch. 5:36, 38; 6:29, 57; 7:29; 8:42; 10:36; 11:42; 17:3; 20:21; Rom. 8:3; 1 John 4:9, 10, 14
  - type: text
    content: 'God did not send his Son into the world '
  - type: note
    content: ch. 5:45; 8:15; 12:47
  - type: text
    content: to condemn the world, but in order that the world might be saved through him.
  - type: text
    content: ' '
  '18':
  - type: note
    content: ch. 5:24; [Mark 16:16]
  - type: text
    content: 'Whoever believes in him is not condemned, but whoever does not believe is condemned already, because he has not '
  - type: note
    content: See 1 John 5:13
  - type: text
    content: believed in the name of the only Son of God.
  - type: text
    content: ' '
  '19':
  - type: note
    content: '[ch. 9:39]'
  - type: text
    content: 'And this is the judgment: '
  - type: note
    content: See ch. 1:4, 5, 9
  - type: text
    content: 'the light has come into the world, and '
  - type: note
    content: '[Isa. 30:10; Jer. 5:31]'
  - type: text
    content: 'people loved the darkness rather than the light because '
  - type: note
    content: ch. 7:7
  - type: text
    content: their works were evil.
  - type: text
    content: ' '
  '2':
  - type: text
    content: This man came to Jesus
  - type: note
    content: Greek him
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:42]'
  - type: text
    content: 'by night and said to him, '
  - type: note
    content: See ch. 1:38
  - type: text
    content: '“Rabbi, '
  - type: note
    content: '[ch. 9:29; Matt. 22:16]'
  - type: text
    content: 'we know that you are a teacher come from God, for no one can do these signs that you do '
  - type: note
    content: Acts 10:38; [ch. 5:36; 9:33; Acts 2:22]
  - type: text
    content: 'unless God is with him.” '
  '20':
  - type: note
    content: '[Job 24:13; Rom. 13:12; Eph. 5:13]'
  - type: text
    content: 'For everyone who does wicked things hates the light and does not come to the light, '
  - type: note
    content: Eph. 5:11, 13
  - type: text
    content: lest his works should be exposed.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'But whoever '
  - type: note
    content: 1 John 1:6
  - type: text
    content: 'does what is true '
  - type: note
    content: Ps. 139:23, 24
  - type: text
    content: comes to the light, so that it may be clearly seen that his works have been carried out in God.”
  - type: heading
    content: John the Baptist Exalts Christ
  '22':
  - type: text
    content: 'After this Jesus and his disciples went into the Judean countryside, and he remained there with them and '
  - type: note
    content: ver. 26; ch. 4:1, 2
  - type: text
    content: 'was baptizing. '
  '23':
  - type: text
    content: 'John also was baptizing at Aenon near Salim, because water was plentiful there, and people were coming and being baptized '
  '24':
  - type: text
    content: '(for '
  - type: note
    content: '[ch. 5:35]; See Matt. 4:12'
  - type: text
    content: John had not yet been put in prison).
  '25':
  - type: text
    content: 'Now a discussion arose between some of John’s disciples and a Jew over '
  - type: note
    content: ch. 2:6
  - type: text
    content: 'purification. '
  '26':
  - type: text
    content: 'And they came to John and said to him, '
  - type: note
    content: ver. 2
  - type: text
    content: '“Rabbi, he who was with you across the Jordan, '
  - type: note
    content: See ch. 1:7
  - type: text
    content: 'to whom you bore witness—look, he is baptizing, and '
  - type: note
    content: ch. 12:19
  - type: text
    content: 'all are going to him.” '
  '27':
  - type: text
    content: 'John answered, '
  - type: note
    content: 1 Cor. 4:7; Heb. 5:4
  - type: text
    content: '“A person cannot receive even one thing '
  - type: note
    content: ch. 6:65; [James 1:17]
  - type: text
    content: 'unless it is given him '
  - type: note
    content: See Matt. 21:25
  - type: text
    content: 'from heaven. '
  '28':
  - type: text
    content: 'You yourselves bear me witness, that I said, '
  - type: note
    content: See ch. 1:20
  - type: text
    content: '‘I am not the Christ, but '
  - type: note
    content: Mal. 3:1; Mark 1:2; Luke 1:17; Acts 19:4
  - type: text
    content: 'I have been sent before him.’ '
  '29':
  - type: note
    content: See Matt. 25:1
  - type: text
    content: 'The one who has the bride is the bridegroom. '
  - type: note
    content: Judg. 14:20; Song 5:1
  - type: text
    content: 'The friend of the bridegroom, who stands and hears him, '
  - type: note
    content: Matt. 9:15
  - type: text
    content: 'rejoices greatly at the bridegroom’s voice. Therefore this joy of mine is now complete. '
  '3':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“Truly, truly, I say to you, unless one is '
  - type: note
    content: See ch. 1:13
  - type: text
    content: 'born '
  - type: note
    content: '[2 Cor. 5:17; Gal. 6:15; 1 Pet. 1:3, 23]'
  - type: text
    content: again
  - type: note
    content: Or from above; the Greek is purposely ambiguous and can mean both again and from above; also verse 7
  - type: text
    content: ' '
  - type: text
    content: 'he cannot '
  - type: note
    content: ver. 36
  - type: text
    content: see the kingdom of God.”
  - type: text
    content: ' '
  '30':
  - type: note
    content: Matt. 3:11
  - type: text
    content: He must increase, but I must decrease.”
  - type: note
    content: Some interpreters hold that the quotation continues through verse 36
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:23
  - type: text
    content: 'He who comes from above '
  - type: note
    content: Rom. 9:5; Eph. 1:21
  - type: text
    content: 'is above all. He who is of the earth belongs to the earth and '
  - type: note
    content: '[1 John 4:5]'
  - type: text
    content: 'speaks in an earthly way. '
  - type: note
    content: See ver. 13
  - type: text
    content: 'He who comes from heaven '
  - type: note
    content: Rom. 9:5; Eph. 1:21
  - type: text
    content: 'is above all. '
  '32':
  - type: note
    content: ver. 11
  - type: text
    content: 'He bears witness to what he has seen and heard, '
  - type: note
    content: '[ver. 19; ch. 1:11; 5:43; 12:37]'
  - type: text
    content: 'yet no one receives his testimony. '
  '33':
  - type: text
    content: 'Whoever receives his testimony '
  - type: note
    content: '[ch. 6:27; 2 Cor. 1:22; Eph. 1:13; Rev. 7:3-8]'
  - type: text
    content: 'sets his seal to this, '
  - type: note
    content: '[1 John 5:10]'
  - type: text
    content: 'that God is true. '
  '34':
  - type: text
    content: 'For he whom '
  - type: note
    content: See ver. 17
  - type: text
    content: 'God has sent utters the words of God, for he gives the Spirit '
  - type: note
    content: '[Ezek. 4:11, 16]'
  - type: text
    content: 'without measure. '
  '35':
  - type: note
    content: See ch. 5:20
  - type: text
    content: 'The Father loves the Son and '
  - type: note
    content: See Matt. 28:18
  - type: text
    content: 'has given all things into his hand. '
  '36':
  - type: note
    content: ver. 15, 16; ch. 5:24; 6:40, 47, 54; 1 John 5:12, 13; [ch. 11:25, 26; 20:31]; See Matt. 19:16
  - type: text
    content: 'Whoever believes in the Son has eternal life; '
  - type: note
    content: '[Rom. 2:8; Eph. 5:6; Col. 3:6]'
  - type: text
    content: 'whoever does not obey the Son shall not '
  - type: note
    content: ver. 3
  - type: text
    content: see life, but the wrath of God remains on him.
  '4':
  - type: text
    content: 'Nicodemus said to him, “How can a man be born when he is old? Can he enter a second time into his mother’s womb and be born?” '
  '5':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Truly, truly, I say to you, unless one is born '
  - type: note
    content: '[Ezek. 36:25-27; Mark 16:16; Acts 2:38; Eph. 5:26; Titus 3:5; Heb. 10:22]'
  - type: text
    content: of water and the Spirit, he cannot enter the kingdom of God.
  - type: text
    content: ' '
  '6':
  - type: note
    content: 1 Cor. 15:50
  - type: text
    content: 'That which is born of the flesh is '
  - type: note
    content: ch. 6:63
  - type: text
    content: flesh, and that which is born of the Spirit is spirit.
  - type: note
    content: The same Greek word means both wind and spirit
  - type: text
    content: ' '
  '7':
  - type: note
    content: ch. 5:28
  - type: text
    content: Do not marvel that I said to you, ‘You
  - type: note
    content: The Greek for you is plural here
  - type: text
    content: ' '
  - type: text
    content: 'must be born '
  - type: note
    content: See ver. 3
  - type: text
    content: again.’
  - type: text
    content: ' '
  '8':
  - type: note
    content: '[Eccles. 11:5; Ezek. 37:9]'
  - type: text
    content: The wind
  - type: note
    content: The same Greek word means both wind and spirit
  - type: text
    content: ' '
  - type: text
    content: 'blows '
  - type: note
    content: 1 Cor. 12:11
  - type: text
    content: where it wishes, and you hear its sound, but you do not know where it comes from or where it goes. So it is with everyone who is born of the Spirit.”
  '9':
  - type: text
    content: 'Nicodemus said to him, '
  - type: note
    content: ch. 6:52, 60
  - type: text
    content: '“How can these things be?” '
