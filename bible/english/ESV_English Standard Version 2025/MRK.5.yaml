document_id: MRK.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Man with a Demon
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-21, see Matt. 8:28–9:1; Luke 8:26-40
  - type: text
    content: They came to the other side of the sea, to the country of the Gerasenes.
  - type: note
    content: Some manuscripts Gergesenes; some Gadarenes
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And he begged him earnestly not to send them out of the country. '
  '11':
  - type: text
    content: 'Now a great herd of pigs was feeding there on the hillside, '
  '12':
  - type: text
    content: 'and they begged him, saying, “Send us to the pigs; let us enter them.” '
  '13':
  - type: text
    content: So he gave them permission. And the unclean spirits came out and entered the pigs; and the herd, numbering about two thousand, rushed down the steep bank into the sea and drowned in the sea.
  '14':
  - type: text
    content: 'The herdsmen fled and told it in the city and in the country. And people came to see what it was that had happened. '
  '15':
  - type: text
    content: And they came to Jesus and saw the demon-possessed
  - type: note
    content: Greek daimonizomai (demonized); also verses 16, 18; elsewhere rendered oppressed by demons
  - type: text
    content: ' man, the one who had had '
  - type: note
    content: '[Luke 8:27]'
  - type: text
    content: 'the legion, sitting there, '
  - type: note
    content: ver. 9
  - type: text
    content: 'clothed and in his right mind, and they were afraid. '
  '16':
  - type: text
    content: 'And those who had seen it described to them what had happened to the demon-possessed man and to the pigs. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: '[Luke 5:8; Acts 16:39]'
  - type: text
    content: they began to beg Jesus
  - type: note
    content: Greek him
  - type: text
    content: ' to depart from their region. '
  '18':
  - type: text
    content: 'As he was getting into the boat, the man who had been possessed with demons begged him that he might be with him. '
  '19':
  - type: text
    content: 'And he did not permit him but said to him, '
  - type: text
    content: '“Go home to your friends and '
  - type: note
    content: Ps. 66:16; [ch. 1:44]
  - type: text
    content: tell them how much the Lord has done for you, and how he has had mercy on you.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: And when Jesus
  - type: note
    content: Greek he; also verse 9
  - type: text
    content: ' had stepped out of the boat, immediately there met him out of the tombs a man with an unclean spirit. '
  '20':
  - type: text
    content: 'And he went away and began to proclaim in '
  - type: note
    content: ch. 7:31; Matt. 4:25
  - type: text
    content: the Decapolis how much Jesus had done for him, and everyone marveled.
  - type: heading
    content: Jesus Heals a Woman and Jairus’s Daughter
  '21':
  - type: text
    content: 'And when Jesus had crossed again in the boat to the other side, a great crowd gathered about him, and he was beside the sea. '
  '22':
  - type: note
    content: For ver. 22-43, see Matt. 9:18-26; Luke 8:41-56
  - type: text
    content: 'Then came one of '
  - type: note
    content: Luke 13:14; Acts 13:15; 18:8, 17
  - type: text
    content: 'the rulers of the synagogue, Jairus by name, and seeing him, he fell at his feet '
  '23':
  - type: text
    content: 'and implored him earnestly, saying, “My little daughter is at the point of death. Come and '
  - type: note
    content: ch. 6:5; 7:32; 8:23, 25; 16:18; Matt. 9:18; Luke 4:40; 13:13; Acts 9:12, 17; 28:8
  - type: text
    content: 'lay your hands on her, so that she may be made well and live.” '
  '24':
  - type: text
    content: And he went with him.
  - type: text
    content: 'And a great crowd followed him and '
  - type: note
    content: ver. 31; ch. 3:9
  - type: text
    content: 'thronged about him. '
  '25':
  - type: text
    content: 'And there was a woman '
  - type: note
    content: Lev. 15:25
  - type: text
    content: 'who had had a discharge of blood for twelve years, '
  '26':
  - type: text
    content: 'and who had suffered much under many physicians, and had spent all that she had, and was no better but rather grew worse. '
  '27':
  - type: text
    content: 'She had heard the reports about Jesus and came up behind him in the crowd and touched his garment. '
  '28':
  - type: text
    content: 'For she said, “If I touch even his garments, I will be made well.” '
  '29':
  - type: note
    content: Matt. 15:28; 17:18
  - type: text
    content: 'And immediately the flow of blood dried up, and she felt in her body that she was healed of her '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'disease. '
  '3':
  - type: note
    content: '[Rev. 18:2]'
  - type: text
    content: 'He lived among the tombs. And no one could bind him anymore, not even with a chain, '
  '30':
  - type: text
    content: 'And Jesus, perceiving in himself that '
  - type: note
    content: Luke 5:17; 6:19; 8:46; [Acts 10:38]
  - type: text
    content: 'power had gone out from him, immediately turned about in the crowd and said, '
  - type: text
    content: “Who touched my garments?”
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And his disciples said to him, “You see the crowd pressing around you, and yet you say, '
  - type: text
    content: ‘Who touched me?’
  - type: text
    content: '” '
  '32':
  - type: text
    content: 'And he looked around to see who had done it. '
  '33':
  - type: text
    content: 'But the woman, knowing what had happened to her, came in fear and trembling and fell down before him and told him the whole truth. '
  '34':
  - type: text
    content: 'And he said to her, '
  - type: text
    content: '“Daughter, '
  - type: note
    content: See Luke 7:50
  - type: text
    content: 'your faith has made you well; '
  - type: note
    content: See Luke 7:50
  - type: text
    content: 'go in peace, and be healed of your '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: disease.”
  '35':
  - type: text
    content: 'While he was still speaking, there came from '
  - type: note
    content: ver. 22
  - type: text
    content: 'the ruler’s house some who said, “Your daughter is dead. Why '
  - type: note
    content: Luke 7:6
  - type: text
    content: 'trouble '
  - type: note
    content: See John 11:28
  - type: text
    content: 'the Teacher any further?” '
  '36':
  - type: text
    content: But overhearing
  - type: note
    content: Or ignoring; some manuscripts hearing
  - type: text
    content: ' what they said, Jesus said to '
  - type: note
    content: '[See ver. 35 above]'
  - type: text
    content: 'the ruler of the synagogue, '
  - type: text
    content: “Do not fear, only believe.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And he allowed no one to follow him except '
  - type: note
    content: ch. 9:2; 14:33
  - type: text
    content: 'Peter and James and '
  - type: note
    content: ch. 3:17
  - type: text
    content: 'John the brother of James. '
  '38':
  - type: text
    content: They came to the house of the ruler of the synagogue, and Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' saw a commotion, people weeping and wailing loudly. '
  '39':
  - type: text
    content: 'And when he had entered, he said to them, '
  - type: note
    content: '[Acts 20:10]'
  - type: text
    content: '“Why are you making a commotion and weeping? The child is not dead but '
  - type: note
    content: John 11:4, 11
  - type: text
    content: sleeping.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'for he had often been bound with shackles and chains, but he wrenched the chains apart, and he broke the shackles in pieces. No one had the strength to subdue him. '
  '40':
  - type: text
    content: 'And they laughed at him. But he '
  - type: note
    content: Acts 9:40
  - type: text
    content: 'put them all outside and took the child’s father and mother and those who were with him and went in where the child was. '
  '41':
  - type: note
    content: See ch. 1:31
  - type: text
    content: 'Taking her by the hand he said to her, '
  - type: text
    content: “Talitha cumi,”
  - type: text
    content: ' which means, '
  - type: text
    content: '“Little girl, I say to you, '
  - type: note
    content: Luke 7:14, 22; [Matt. 11:5; John 11:43]
  - type: text
    content: arise.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And immediately the girl got up and began walking (for she was twelve years of age), and they were immediately overcome with amazement. '
  '43':
  - type: text
    content: 'And '
  - type: note
    content: ch. 9:9; See Matt. 8:4
  - type: text
    content: he strictly charged them that no one should know this, and told them to give her something to eat.
  '5':
  - type: text
    content: 'Night and day among the tombs and on the mountains he was always crying out and cutting himself with stones. '
  '6':
  - type: text
    content: 'And when he saw Jesus from afar, he ran and '
  - type: note
    content: See Matt. 8:2
  - type: text
    content: 'fell down before him. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ch. 1:26; Acts 8:7
  - type: text
    content: 'crying out with a loud voice, he said, “What have you to do with me, Jesus, '
  - type: note
    content: '[Matt. 4:3, 6]; See Matt. 14:33'
  - type: text
    content: 'Son of '
  - type: note
    content: Gen. 14:18; Num. 24:16; Ps. 57:2; Dan. 3:26; Luke 1:32; 6:35; Acts 16:17
  - type: text
    content: 'the Most High God? '
  - type: note
    content: Matt. 26:63; Acts 19:13; [James 2:19]
  - type: text
    content: 'I adjure you by God, do not torment me.” '
  '8':
  - type: text
    content: 'For he was saying to him, '
  - type: text
    content: “Come out of the man, you unclean spirit!”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And Jesus asked him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: ' He replied, “My name is '
  - type: note
    content: Matt. 26:53
  - type: text
    content: 'Legion, for we are many.” '
