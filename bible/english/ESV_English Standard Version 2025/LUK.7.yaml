document_id: LUK.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Centurion’s Servant
  - type: text
    content: 'After he had finished all his sayings in the hearing of the people, '
  - type: note
    content: For ver. 1-10, see Matt. 8:5-13
  - type: text
    content: 'he entered Capernaum. '
  '10':
  - type: text
    content: And when those who had been sent returned to the house, they found the servant well.
  - type: heading
    content: Jesus Raises a Widow’s Son
  '11':
  - type: text
    content: Soon afterward
  - type: note
    content: Some manuscripts The next day
  - type: text
    content: ' he went to a town called Nain, and his disciples and a great crowd went with him. '
  '12':
  - type: text
    content: 'As he drew near to the gate of the town, behold, a man who had died was being carried out, '
  - type: note
    content: '[ch. 8:42; 9:38; Judg. 11:34; Heb. 11:17]'
  - type: text
    content: 'the only son of his mother, and she was a widow, and a considerable crowd from the town was with her. '
  '13':
  - type: text
    content: 'And when the Lord saw her, '
  - type: note
    content: Matt. 20:34
  - type: text
    content: 'he had compassion on her and '
  - type: note
    content: ch. 8:52
  - type: text
    content: 'said to her, '
  - type: text
    content: “Do not weep.”
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Then he came up and touched '
  - type: note
    content: 2 Sam. 3:31
  - type: text
    content: 'the bier, and the bearers stood still. And he said, '
  - type: text
    content: '“Young man, I say to you, '
  - type: note
    content: ch. 8:54; Mark 5:41; [ver. 22; Matt. 11:5; John 11:43; Acts 9:40]
  - type: text
    content: arise.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: And the dead man sat up and began to speak, and Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' '
  - type: note
    content: '[1 Kgs. 17:23; 2 Kgs. 4:36; Heb. 11:35]'
  - type: text
    content: 'gave him to his mother. '
  '16':
  - type: text
    content: 'Fear seized them all, and '
  - type: note
    content: ch. 2:20; Matt. 9:8; 15:31; Acts 11:18; 21:20; [Matt. 5:16]; See ch. 13:13
  - type: text
    content: 'they glorified God, saying, '
  - type: note
    content: ver. 39; See Deut. 18:15; Matt. 21:11
  - type: text
    content: '“A great prophet has arisen among us!” and '
  - type: note
    content: See ch. 1:68
  - type: text
    content: '“God has visited his people!” '
  '17':
  - type: text
    content: And this report about him spread through the whole of Judea and all the surrounding country.
  - type: heading
    content: Messengers from John the Baptist
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-35, see Matt. 11:2-19
  - type: note
    content: See Matt. 9:14
  - type: text
    content: 'The disciples of John reported all these things to him. And John, '
  '19':
  - type: text
    content: 'calling two of his disciples to him, sent them to the Lord, saying, “Are you the one '
  - type: note
    content: John 4:25; 6:14; 11:27
  - type: text
    content: 'who is to come, or '
  - type: note
    content: '[ch. 3:15]'
  - type: text
    content: 'shall we look for another?” '
  '2':
  - type: text
    content: Now a centurion had a servant
  - type: note
    content: Or bondservant; also verses 3, 8, 10
  - type: text
    content: ' who was sick and at the point of death, who was highly valued by him. '
  '20':
  - type: text
    content: 'And when the men had come to him, they said, “John the Baptist has sent us to you, saying, ‘Are you the one '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'who is to come, or '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'shall we look for another?’” '
  '21':
  - type: text
    content: 'In that hour '
  - type: note
    content: Mark 1:34
  - type: text
    content: 'he healed many people of diseases and plagues and evil spirits, and '
  - type: note
    content: ch. 18:42; Matt. 9:30; 12:22; 15:31; 20:34; 21:14; Mark 8:25; John 9:7
  - type: text
    content: 'on many who were blind he bestowed sight. '
  '22':
  - type: text
    content: 'And he answered them, '
  - type: text
    content: '“Go and tell John what you have seen and heard: '
  - type: note
    content: Isa. 29:18; 35:5, 6; Matt. 15:30
  - type: text
    content: 'the blind receive their sight, the lame walk, '
  - type: note
    content: ch. 17:14
  - type: text
    content: lepers
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' '
  - type: text
    content: 'are cleansed, and '
  - type: note
    content: Mark 7:35
  - type: text
    content: 'the deaf hear, '
  - type: note
    content: See ver. 14
  - type: text
    content: 'the dead are raised up, '
  - type: note
    content: ch. 4:18; [Matt. 5:3; James 2:5]
  - type: text
    content: the poor have good news preached to them.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And blessed is the one who is '
  - type: note
    content: Isa. 8:14, 15; John 6:61
  - type: text
    content: not offended by me.”
  '24':
  - type: text
    content: When John’s messengers had gone, Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' began to speak to the crowds concerning John: '
  - type: text
    content: '“What did you go out '
  - type: note
    content: ch. 1:80; 3:2
  - type: text
    content: 'into the wilderness to see? '
  - type: note
    content: '[Eph. 4:14; James 1:6]'
  - type: text
    content: A reed shaken by the wind?
  - type: text
    content: ' '
  '25':
  - type: text
    content: What then did you go out to see? A man dressed in soft clothing? Behold, those who are dressed in splendid clothing and live in luxury are in kings’ courts.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'What then did you go out to see? '
  - type: note
    content: ch. 1:76; 20:6; Matt. 14:5
  - type: text
    content: A prophet? Yes, I tell you, and more than a prophet.
  - type: text
    content: ' '
  '27':
  - type: text
    content: This is he of whom it is written,
  - type: note
    content: Mark 1:2; Cited from Mal. 3:1; [ch. 1:17, 76 ]
  - type: text
    content: “‘Behold, I send my messenger before your face,
  - type: text
    content: who will prepare your way before you.’
  '28':
  - type: text
    content: ' '
  - type: text
    content: I tell you, among those born of women none is greater than John. Yet the one who is least in the kingdom of God is greater than he.”
  - type: text
    content: ' '
  '29':
  - type: text
    content: (
  - type: note
    content: '[ch. 20:6]'
  - type: text
    content: 'When all the people heard this, and '
  - type: note
    content: ch. 3:12; Matt. 21:32
  - type: text
    content: the tax collectors too, they declared God just,
  - type: note
    content: Greek they justified God
  - type: text
    content: ' '
  - type: note
    content: ch. 3:12; Matt. 21:32
  - type: text
    content: 'having been baptized with '
  - type: note
    content: Acts 18:25; 19:3
  - type: text
    content: 'the baptism of John, '
  '3':
  - type: text
    content: When the centurion
  - type: note
    content: Greek he
  - type: text
    content: ' heard about Jesus, '
  - type: note
    content: '[Matt. 8:5]'
  - type: text
    content: 'he sent to him elders of the Jews, asking him to come and heal his servant. '
  '30':
  - type: note
    content: '[Matt. 21:25, 32; 23:13]'
  - type: text
    content: 'but the Pharisees and '
  - type: note
    content: ch. 10:25; 11:45, 46, 52; 14:3; Matt. 22:35
  - type: text
    content: 'the lawyers '
  - type: note
    content: See Mark 7:9
  - type: text
    content: 'rejected '
  - type: note
    content: Acts 2:23; 13:36
  - type: text
    content: the purpose of God for themselves, not having been baptized by him.)
  '31':
  - type: text
    content: ' '
  - type: text
    content: “To what then shall I compare the people of this generation, and what are they like?
  - type: text
    content: ' '
  '32':
  - type: text
    content: They are like children sitting in the marketplace and calling to one another,
  - type: text
    content: “‘We played the flute for you, and you did not dance;
  - type: text
    content: we sang a dirge, and you did not weep.’
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'For John the Baptist has come '
  - type: note
    content: Matt. 3:4; Mark 1:6
  - type: text
    content: 'eating no bread and '
  - type: note
    content: ch. 1:15
  - type: text
    content: drinking no wine, and you say, ‘He has a demon.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'The Son of Man has come '
  - type: note
    content: ver. 36; ch. 14:1; Matt. 9:10; John 2:1; 12:2
  - type: text
    content: 'eating and drinking, and you say, ‘Look at him! A glutton and a drunkard, '
  - type: note
    content: ch. 15:2; 19:7; Matt. 9:11
  - type: text
    content: a friend of tax collectors and sinners!’
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Yet '
  - type: note
    content: '[ch. 11:49; Prov. 8:1-36]'
  - type: text
    content: wisdom is justified by all her children.”
  - type: heading
    content: A Sinful Woman Forgiven
  '36':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:37; 14:1
  - type: text
    content: 'One of the Pharisees asked him to eat with him, and he went into the Pharisee’s house and reclined at table. '
  '37':
  - type: note
    content: For ver. 37-39, [Matt. 26:6-13; Mark 14:3-9; John 12:1-8]
  - type: text
    content: 'And behold, a woman of the city, who was a sinner, when she learned that he was reclining at table in the Pharisee’s house, brought an alabaster flask of ointment, '
  '38':
  - type: text
    content: 'and standing behind him at his feet, weeping, she began to wet his feet with her tears and '
  - type: note
    content: ver. 44; John 11:2
  - type: text
    content: 'wiped them with the hair of her head and kissed his feet and anointed them with the ointment. '
  '39':
  - type: text
    content: 'Now when the Pharisee who had invited him saw this, he said to himself, “If '
  - type: note
    content: '[ch. 15:2]'
  - type: text
    content: 'this man were '
  - type: note
    content: ver. 16; John 4:19
  - type: text
    content: 'a prophet, he '
  - type: note
    content: '[ch. 22:64]'
  - type: text
    content: 'would have known who and what sort of woman this is who is touching him, for she is a sinner.” '
  '4':
  - type: text
    content: 'And when they came to Jesus, they pleaded with him earnestly, saying, '
  - type: note
    content: '[Acts 10:22]'
  - type: text
    content: '“He is worthy to have you do this for him, '
  '40':
  - type: text
    content: 'And Jesus answering said to him, '
  - type: text
    content: “Simon, I have something to say to you.”
  - type: text
    content: ' And he answered, “Say it, Teacher.”'
  '41':
  - type: text
    content: ' '
  - type: text
    content: '“A certain moneylender had two debtors. One owed five hundred '
  - type: note
    content: See Matt. 18:28
  - type: text
    content: denarii, and the other fifty.
  - type: text
    content: ' '
  '42':
  - type: note
    content: Matt. 18:25
  - type: text
    content: 'When they could not pay, he '
  - type: note
    content: '[Rom. 8:32 (Gk.)]'
  - type: text
    content: cancelled the debt of both. Now which of them will love him more?”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Simon answered, “The one, I suppose, for whom he cancelled the larger debt.” And he said to him, '
  - type: text
    content: “You have judged rightly.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Then turning toward the woman he said to Simon, '
  - type: text
    content: '“Do you see this woman? I entered your house; '
  - type: note
    content: 1 Tim. 5:10; See Gen. 18:4
  - type: text
    content: 'you gave me no water for my feet, but '
  - type: note
    content: ver. 38
  - type: text
    content: she has wet my feet with her tears and wiped them with her hair.
  - type: text
    content: ' '
  '45':
  - type: note
    content: 2 Sam. 15:5; 19:39; 20:9
  - type: text
    content: 'You gave me no kiss, but from the time I came in she has not ceased to '
  - type: note
    content: ver. 38
  - type: text
    content: kiss my feet.
  - type: text
    content: ' '
  '46':
  - type: note
    content: Ps. 23:5; 141:5; Eccles. 9:8; Matt. 6:17
  - type: text
    content: You did not anoint my head with oil, but she has anointed my feet with ointment.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Therefore I tell you, her sins, '
  - type: note
    content: '[ver. 39]'
  - type: text
    content: which are many, are forgiven—for she loved much. But he who is forgiven little, loves little.”
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'And he said to her, '
  - type: note
    content: ch. 5:20; Matt. 9:2; Mark 2:5; James 5:15; 1 John 2:12; [John 20:23]
  - type: text
    content: “Your sins are forgiven.”
  - type: text
    content: ' '
  '49':
  - type: text
    content: Then those who were at table with him began to say among
  - type: note
    content: Or to
  - type: text
    content: ' themselves, '
  - type: note
    content: ch. 5:21
  - type: text
    content: '“Who is this, who even forgives sins?” '
  '5':
  - type: text
    content: 'for he loves our nation, and he is the one who built us '
  - type: note
    content: ch. 4:31, 33
  - type: text
    content: 'our synagogue.” '
  '50':
  - type: text
    content: 'And he said to the woman, '
  - type: note
    content: ver. 9; [ver. 47; 1 Tim. 1:14]; See Mark 10:52; Eph. 2:8
  - type: text
    content: '“Your faith has saved you; '
  - type: note
    content: ch. 8:48; 1 Sam. 1:17; Mark 5:34
  - type: text
    content: go in peace.”
  '6':
  - type: text
    content: 'And Jesus went with them. When he was not far from the house, the centurion sent friends, saying to him, “Lord, '
  - type: note
    content: ch. 8:49; Mark 5:35; [Matt. 9:36 (Gk.)]
  - type: text
    content: 'do not trouble yourself, for I am not worthy to have you come under my roof. '
  '7':
  - type: text
    content: 'Therefore I did not presume to come to you. But '
  - type: note
    content: Ps. 107:20; [Matt. 8:16]
  - type: text
    content: 'say the word, and let my servant be healed. '
  '8':
  - type: text
    content: 'For I too am a man set under authority, with soldiers under me: and I say to one, ‘Go,’ and he goes; and to another, ‘Come,’ and he comes; and to my servant, ‘Do this,’ and he does it.” '
  '9':
  - type: text
    content: 'When Jesus heard these things, '
  - type: note
    content: '[Mark 6:6]'
  - type: text
    content: 'he marveled at him, and turning to the crowd that followed him, said, '
  - type: text
    content: '“I tell you, not even in Israel have I found such '
  - type: note
    content: See Matt. 9:2
  - type: text
    content: faith.”
  - type: text
    content: ' '
