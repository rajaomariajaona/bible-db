document_id: 1SA.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Tries to Kill David
  - type: text
    content: 'And Saul spoke to Jonathan his son and to all his servants, that they should kill David. '
  - type: note
    content: ch. 18:1
  - type: text
    content: 'But Jonathan, Saul’s son, delighted much in David. '
  '10':
  - type: note
    content: ch. 18:11; 20:33
  - type: text
    content: And Saul sought to pin David to the wall with the spear, but he eluded Saul, so that he struck the spear into the wall. And David fled and escaped that night.
  '11':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 59
  - type: text
    content: 'Saul sent messengers to David’s house to watch him, that he might kill him in the morning. But Michal, David’s wife, told him, “If you do not escape with your life tonight, tomorrow you will be killed.” '
  '12':
  - type: note
    content: '[Josh. 2:15; Acts 9:24, 25]; 2 Cor. 11:33'
  - type: text
    content: 'So Michal let David down through the window, and he fled away and escaped. '
  '13':
  - type: text
    content: 'Michal took '
  - type: note
    content: See Gen. 31:19
  - type: text
    content: an image
  - type: note
    content: Or a household god
  - type: text
    content: ' and laid it on the bed and put a pillow of goats’ hair at its head and covered it with the clothes. '
  '14':
  - type: text
    content: 'And when Saul sent messengers to take David, she said, “He is sick.” '
  '15':
  - type: text
    content: 'Then Saul sent the messengers to see David, saying, “Bring him up to me in the bed, that I may kill him.” '
  '16':
  - type: text
    content: 'And when the messengers came in, behold, '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'the image was in the bed, with the pillow of goats’ hair at its head. '
  '17':
  - type: text
    content: 'Saul said to Michal, “Why have you deceived me thus and let my enemy go, so that he has escaped?” And Michal answered Saul, “He said to me, ‘Let me go. '
  - type: note
    content: '[2 Sam. 2:22]'
  - type: text
    content: Why should I kill you?’”
  '18':
  - type: text
    content: 'Now David fled and escaped, and he came to Samuel at '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'Ramah and told him all that Saul had done to him. And he and Samuel went and lived at Naioth. '
  '19':
  - type: text
    content: 'And it was told Saul, “Behold, David is at Naioth in Ramah.” '
  '2':
  - type: text
    content: 'And Jonathan told David, “Saul my father seeks to kill you. Therefore be on your guard in the morning. Stay in a secret place and hide yourself. '
  '20':
  - type: text
    content: 'Then Saul sent messengers to take David, and when they saw the company of the prophets prophesying, and Samuel standing as head over them, '
  - type: note
    content: '[ch. 10:5, 6, 10]'
  - type: text
    content: 'the Spirit of God came upon the messengers of Saul, '
  - type: note
    content: '[Num. 11:25; Joel 2:28]'
  - type: text
    content: 'and they also prophesied. '
  '21':
  - type: text
    content: 'When it was told Saul, he sent other messengers, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'and they also prophesied. And Saul sent messengers again the third time, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'and they also prophesied. '
  '22':
  - type: text
    content: 'Then he himself went to Ramah and came to the great well that is in Secu. And he asked, “Where are Samuel and David?” And one said, “Behold, they are at Naioth in '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Ramah.” '
  '23':
  - type: text
    content: 'And he went there to Naioth in Ramah. '
  - type: note
    content: '[ch. 18:10]'
  - type: text
    content: 'And the Spirit of God came upon him also, and as he went he prophesied until he came to Naioth in Ramah. '
  '24':
  - type: note
    content: Isa. 20:2; Mic. 1:8; [2 Sam. 6:20]
  - type: text
    content: 'And he too stripped off his clothes, and he too prophesied before Samuel and lay naked all that day and all that night. Thus it is said, '
  - type: note
    content: ch. 10:11, 12
  - type: text
    content: “Is Saul also among the prophets?”
  '3':
  - type: text
    content: 'And I will go out and stand beside my father in the field where you are, and I will speak to my father about you. And if I learn anything I will tell you.” '
  '4':
  - type: text
    content: 'And Jonathan spoke well of David to Saul his father and said to him, “Let not the king '
  - type: note
    content: '[Gen. 42:22]'
  - type: text
    content: 'sin against his servant David, because he has not sinned against you, and because his deeds have brought good to you. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: ch. 28:21; Judg. 12:3; [Judg. 9:17]
  - type: text
    content: 'he took his life in his hand '
  - type: note
    content: ch. 17:49, 50
  - type: text
    content: 'and he struck down the Philistine, '
  - type: note
    content: '[ch. 11:13; 1 Chr. 11:14]'
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' worked a great salvation for all Israel. You saw it, and rejoiced. Why then will you sin against '
  - type: note
    content: Matt. 27:4
  - type: text
    content: 'innocent blood by killing David without cause?” '
  '6':
  - type: text
    content: 'And Saul listened to the voice of Jonathan. Saul swore, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, he shall not be put to death.” '
  '7':
  - type: text
    content: 'And Jonathan called David, and Jonathan reported to him all these things. And Jonathan brought David to Saul, and he was in his presence '
  - type: note
    content: ch. 16:21; 18:2, 13
  - type: text
    content: as before.
  '8':
  - type: text
    content: 'And there was war again. And David went out and fought with the Philistines and struck them with a great blow, so that they fled before him. '
  '9':
  - type: note
    content: See ch. 16:14
  - type: text
    content: 'Then a harmful spirit from the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon Saul, as he sat in his house with his spear in his hand. '
  - type: note
    content: See ch. 16:16
  - type: text
    content: 'And David was playing the lyre. '
