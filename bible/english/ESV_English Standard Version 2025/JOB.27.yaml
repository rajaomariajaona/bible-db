verses:
  '1':
  - type: heading
    content: 'Job Continues: I Will Maintain My Integrity'
  - type: text
    content: 'And Job again '
  - type: note
    content: ch. 29:1; See Num. 23:7
  - type: text
    content: 'took up his discourse, and said:'
  '10':
  - type: text
    content: 'Will he '
  - type: note
    content: See ch. 22:26
  - type: text
    content: take delight in the Almighty?
  - type: text
    content: Will he call upon God at all times?
  '11':
  - type: text
    content: I will teach you concerning the hand of God;
  - type: note
    content: ch. 10:13; 23:14
  - type: text
    content: what is with the Almighty I will not conceal.
  '12':
  - type: text
    content: Behold, all of you have seen it yourselves;
  - type: text
    content: why then have you become altogether vain?
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 20:29; [ch. 18:21; 31:2 ]
  - type: text
    content: “This is the portion of a wicked man with God,
  - type: text
    content: 'and the heritage that '
  - type: note
    content: ch. 6:23; 15:20
  - type: text
    content: 'oppressors receive from the Almighty:'
  '14':
  - type: text
    content: 'If his '
  - type: note
    content: Deut. 28:41; Hos. 9:13, 16
  - type: text
    content: 'children are multiplied, it is for '
  - type: note
    content: Jer. 15:2
  - type: text
    content: the sword,
  - type: text
    content: and his descendants have not enough bread.
  '15':
  - type: text
    content: Those who survive him the pestilence buries,
  - type: text
    content: 'and his '
  - type: note
    content: Ps. 78:64
  - type: text
    content: widows do not weep.
  '16':
  - type: text
    content: 'Though he '
  - type: note
    content: Zech. 9:3
  - type: text
    content: heap up silver like dust,
  - type: text
    content: and pile up clothing like clay,
  '17':
  - type: text
    content: he may pile it up, but the righteous will wear it,
  - type: text
    content: 'and '
  - type: note
    content: '[Prov. 13:22; Eccles. 2:26]'
  - type: text
    content: the innocent will divide the silver.
  '18':
  - type: text
    content: 'He builds his '
  - type: note
    content: ch. 8:14, 15
  - type: text
    content: house like a moth’s,
  - type: text
    content: 'like '
  - type: note
    content: Isa. 1:8
  - type: text
    content: 'a booth that '
  - type: note
    content: Song 1:6; 8:11, 12
  - type: text
    content: a watchman makes.
  '19':
  - type: text
    content: 'He goes to bed rich, but will '
  - type: note
    content: Jer. 8:2; Ezek. 29:5
  - type: text
    content: do so no more;
  - type: text
    content: 'he opens his eyes, and '
  - type: note
    content: ch. 24:24
  - type: text
    content: his wealth is gone.
  '2':
  - type: text
    content: '“As God lives, who has '
  - type: note
    content: ch. 34:5
  - type: text
    content: taken away my right,
  - type: text
    content: 'and the Almighty, who has '
  - type: note
    content: '[Ruth 1:20; 2 Kgs. 4:27]'
  - type: text
    content: made my soul bitter,
  '20':
  - type: text
    content: ' '
  - type: note
    content: See ch. 18:11
  - type: text
    content: 'Terrors overtake him like '
  - type: note
    content: See ch. 22:11
  - type: text
    content: a flood;
  - type: text
    content: 'in the night a whirlwind '
  - type: note
    content: ch. 34:20, 25; 36:20
  - type: text
    content: carries him off.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 30:22 ]'
  - type: text
    content: The east wind lifts him up and he is gone;
  - type: text
    content: 'it '
  - type: note
    content: ch. 8:18
  - type: text
    content: sweeps him out of his place.
  '22':
  - type: text
    content: It
  - type: note
    content: Or He (that is, God); also verse 23
  - type: text
    content: ' hurls at him '
  - type: note
    content: ch. 16:13
  - type: text
    content: without pity;
  - type: text
    content: he flees from its
  - type: note
    content: Or his; also verse 23
  - type: text
    content: ' power in headlong flight.'
  '23':
  - type: text
    content: 'It '
  - type: note
    content: Lam. 2:15; Ezek. 25:6; Nah. 3:19
  - type: text
    content: claps its hands at him
  - type: text
    content: 'and '
  - type: note
    content: '[2 Chr. 29:8; Jer. 49:17; Lam. 2:15; Ezek. 27:36; Zeph. 2:15]'
  - type: text
    content: hisses at him from its place.
  '3':
  - type: text
    content: as long as my breath is in me,
  - type: text
    content: 'and '
  - type: note
    content: ch. 33:4; [Gen. 2:7]
  - type: text
    content: the spirit of God is in my nostrils,
  '4':
  - type: text
    content: 'my lips will not speak '
  - type: note
    content: ch. 13:7
  - type: text
    content: falsehood,
  - type: text
    content: 'and my tongue will not utter '
  - type: note
    content: ch. 13:7
  - type: text
    content: deceit.
  '5':
  - type: text
    content: Far be it from me to say that you are right;
  - type: text
    content: 'till I die I will not put away my '
  - type: note
    content: ch. 2:3, 9; [ch. 13:15]
  - type: text
    content: integrity from me.
  '6':
  - type: text
    content: 'I '
  - type: note
    content: ch. 2:3
  - type: text
    content: hold fast my righteousness and will not let it go;
  - type: text
    content: 'my heart does not '
  - type: note
    content: '[Acts 23:1; 24:16; 1 Cor. 4:4]'
  - type: text
    content: reproach me for any of my days.
  '7':
  - type: text
    content: “Let my enemy be as the wicked,
  - type: text
    content: and let him who rises up against me be as the unrighteous.
  '8':
  - type: text
    content: ' '
  - type: note
    content: See ch. 8:13
  - type: text
    content: 'For what is the hope of the godless '
  - type: note
    content: Matt. 16:26; [Luke 12:20]
  - type: text
    content: when God cuts him off,
  - type: text
    content: when God takes away his life?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 18:41; Prov. 1:28; 15:29; Isa. 1:15; Jer. 11:11; 14:12; Ezek. 8:18; Mic. 3:4; Zech. 7:13; [ch. 35:12, 13 ]; See Ps. 66:18
  - type: text
    content: Will God hear his cry
  - type: text
    content: when distress comes upon him?
