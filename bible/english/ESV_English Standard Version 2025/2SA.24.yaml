document_id: 2SA.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Census
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-25, see 1 Chr. 21:1-28
  - type: note
    content: '[ 1 Chr. 21:1 ]'
  - type: text
    content: 'Again the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel, and he incited David against them, saying, '
  - type: note
    content: '[1 Chr. 27:23, 24]'
  - type: text
    content: '“Go, number Israel and Judah.” '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: 1 Sam. 24:5
  - type: text
    content: 'David’s heart struck him after he had numbered the people. And David said to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 12:13
  - type: text
    content: '“I have sinned greatly in what I have done. But now, O '
  - type: text
    content: Lord
  - type: text
    content: ', please take away the iniquity of your servant, for I have done '
  - type: note
    content: See 1 Sam. 13:13
  - type: text
    content: 'very foolishly.” '
  '11':
  - type: text
    content: 'And when David arose in the morning, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to '
  - type: note
    content: See 1 Sam. 22:5
  - type: text
    content: 'the prophet Gad, David’s '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'seer, saying, '
  '12':
  - type: text
    content: '“Go and say to David, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Three things I offer'
  - type: note
    content: Or hold over
  - type: text
    content: ' you. Choose one of them, that I may do it to you.’” '
  '13':
  - type: text
    content: 'So Gad came to David and told him, and said to him, “Shall '
  - type: note
    content: '[1 Chr. 21:12]'
  - type: text
    content: three
  - type: note
    content: Compare 1 Chronicles 21:12, Septuagint; Hebrew seven
  - type: text
    content: ' years of famine come to you in your land? Or will you flee three months before your foes while they pursue you? Or shall there be three days’ pestilence in your land? Now consider, and decide what answer I shall return to him who sent me.” '
  '14':
  - type: text
    content: 'Then David said to Gad, “I am in great distress. Let us fall into the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 119:156
  - type: text
    content: for his mercy is great; but let me not fall into the hand of man.”
  '15':
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 27:24
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a pestilence on Israel from the morning until the appointed time. And there died of the people from '
  - type: note
    content: ver. 2
  - type: text
    content: 'Dan to Beersheba 70,000 men. '
  '16':
  - type: text
    content: 'And when '
  - type: note
    content: 2 Kgs. 19:35; 2 Chr. 32:21; Isa. 37:36; Acts 12:23
  - type: text
    content: 'the angel stretched out his hand toward Jerusalem '
  - type: note
    content: Ex. 12:13, 23
  - type: text
    content: 'to destroy it, '
  - type: note
    content: Gen. 6:6; 1 Sam. 15:11; Joel 2:13, 14; Jonah 3:10
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' relented from the calamity and said to the angel '
  - type: note
    content: Ex. 12:13, 23
  - type: text
    content: 'who was working destruction among the people, “It is enough; now stay your hand.” And '
  - type: note
    content: 2 Kgs. 19:35; 2 Chr. 32:21; Isa. 37:36; Acts 12:23
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was by the threshing floor of '
  - type: note
    content: '[2 Chr. 3:1]'
  - type: text
    content: 'Araunah the Jebusite. '
  '17':
  - type: text
    content: 'Then David spoke to the '
  - type: text
    content: Lord
  - type: text
    content: ' when he saw the angel who was striking the people, and said, “Behold, I have sinned, and I have done wickedly. But these sheep, what have they done? Please let your hand be against me and against my father’s house.”'
  - type: heading
    content: David Builds an Altar
  '18':
  - type: text
    content: 'And Gad came that day to David and said to him, “Go up, raise an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the threshing floor of '
  - type: note
    content: '[2 Chr. 3:1]'
  - type: text
    content: 'Araunah the Jebusite.” '
  '19':
  - type: text
    content: 'So David went up at Gad’s word, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. '
  '2':
  - type: text
    content: So the king said to Joab, the commander of the army,
  - type: note
    content: Septuagint to Joab and the commanders of the army
  - type: text
    content: ' who was with him, “Go through all the tribes of Israel, '
  - type: note
    content: ver. 15; See ch. 3:10
  - type: text
    content: 'from Dan to Beersheba, and number the people, that I may know the number of the people.” '
  '20':
  - type: text
    content: 'And when Araunah looked down, he saw the king and his servants coming on toward him. And Araunah went out and paid homage to the king with his face to the ground. '
  '21':
  - type: text
    content: 'And Araunah said, “Why has my lord the king come to his servant?” David said, “To buy the threshing floor from you, in order to build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', that the plague '
  - type: note
    content: Num. 16:48, 50
  - type: text
    content: 'may be averted from the people.” '
  '22':
  - type: text
    content: 'Then Araunah said to David, “Let my lord the king take and offer up what seems good to him. Here are the oxen for the burnt offering and the '
  - type: note
    content: 1 Kgs. 19:21
  - type: text
    content: 'threshing sledges and the yokes of the oxen for the wood. '
  '23':
  - type: text
    content: 'All this, O king, Araunah gives to the king.” And Araunah said to the king, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Deut. 33:11; [Ps. 20:3]
  - type: text
    content: 'accept you.” '
  '24':
  - type: text
    content: 'But the king said to Araunah, “No, but I will buy it from you for a price. I will not offer burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God that cost me nothing.” So David bought the threshing floor and the oxen for fifty shekels'
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver. '
  '25':
  - type: text
    content: 'And David built there an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' and offered burnt offerings and peace offerings. '
  - type: note
    content: ch. 21:14
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' responded to the plea for the land, and the plague was averted from Israel.'
  '3':
  - type: text
    content: 'But Joab said to the king, '
  - type: note
    content: Deut. 1:11
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God add to the people a hundred times as many as they are, while the eyes of my lord the king still see it, but why does my lord the king delight in this thing?” '
  '4':
  - type: text
    content: 'But the king’s word prevailed against Joab and the commanders of the army. So Joab and the commanders of the army went out from the presence of the king to number the people of Israel. '
  '5':
  - type: text
    content: 'They crossed the Jordan and began from '
  - type: note
    content: Deut. 2:36; Josh. 13:9, 16
  - type: text
    content: Aroer,
  - type: note
    content: Septuagint; Hebrew encamped in Aroer
  - type: text
    content: ' and from the city that is in the middle of the '
  - type: note
    content: '[Num. 13:23]'
  - type: text
    content: 'valley, toward Gad and on to '
  - type: note
    content: Num. 21:32; 32:1, 3
  - type: text
    content: 'Jazer. '
  '6':
  - type: text
    content: Then they came to Gilead, and to Kadesh in the land of the Hittites;
  - type: note
    content: Septuagint; Hebrew to the land of Tahtim-hodshi
  - type: text
    content: ' and they came to Dan, and from Dan'
  - type: note
    content: Septuagint; Hebrew they came to Dan-jaan and
  - type: text
    content: ' they went around to '
  - type: note
    content: Josh. 19:28; Judg. 18:28
  - type: text
    content: 'Sidon, '
  '7':
  - type: text
    content: 'and came to the fortress of Tyre and to all the cities of the '
  - type: note
    content: Josh. 11:3; Judg. 3:3
  - type: text
    content: 'Hivites and '
  - type: note
    content: Josh. 11:3; Judg. 3:3
  - type: text
    content: 'Canaanites; and they went out to the Negeb of Judah at Beersheba. '
  '8':
  - type: text
    content: 'So when they had gone through all the land, they came to Jerusalem at the end of nine months and twenty days. '
  '9':
  - type: text
    content: 'And Joab gave the sum of the numbering of the people to the king: in Israel there were 800,000 valiant men '
  - type: note
    content: Judg. 8:10
  - type: text
    content: who drew the sword, and the men of Judah were 500,000.
  - type: heading
    content: The Lord’s Judgment of David’s Sin
