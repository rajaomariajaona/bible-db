document_id: JOS.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Ai
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  - type: note
    content: ch. 1:9; 10:25; Deut. 1:21; 7:18; 31:8
  - type: text
    content: '“Do not fear and do not be dismayed. Take all the fighting men with you, and arise, go up to Ai. See, '
  - type: note
    content: ch. 2:24; 6:2
  - type: text
    content: 'I have given into your hand the king of Ai, and his people, his city, and his land. '
  '10':
  - type: text
    content: 'Joshua arose early in the morning and mustered the people and went up, he and the elders of Israel, before the people to Ai. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ver. 5
  - type: text
    content: 'all the fighting men who were with him went up and drew near before the city and encamped on the north side of Ai, with a ravine between them and Ai. '
  '12':
  - type: text
    content: 'He took about 5,000 men and set them in ambush between Bethel and Ai, to the west of the city. '
  '13':
  - type: text
    content: 'So they stationed the forces, the main encampment that was north of the city and its rear guard west of the city. But Joshua spent that night in the valley. '
  '14':
  - type: text
    content: And as soon as the king of Ai saw this, he and all his people, the men of the city, hurried and went out early to the appointed place
  - type: note
    content: Hebrew appointed time
  - type: text
    content: ' toward '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'the Arabah to meet Israel in battle. '
  - type: note
    content: Judg. 20:34
  - type: text
    content: 'But he did not know that there was an ambush against him behind the city. '
  '15':
  - type: text
    content: 'And Joshua and all Israel '
  - type: note
    content: Judg. 20:36
  - type: text
    content: 'pretended to be beaten before them and fled in the direction of the wilderness. '
  '16':
  - type: text
    content: 'So all the people who were in the city were called together to pursue them, and as they pursued Joshua they '
  - type: note
    content: ver. 6
  - type: text
    content: 'were drawn away from the city. '
  '17':
  - type: text
    content: Not a man was left in Ai or Bethel who did not go out after Israel. They left the city open and pursued Israel.
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  - type: note
    content: ver. 26
  - type: text
    content: '“Stretch out the javelin that is in your hand toward Ai, for I will give it into your hand.” And Joshua stretched out the javelin that was in his hand toward the city. '
  '19':
  - type: text
    content: 'And the men in the ambush rose quickly out of their place, and as soon as he had stretched out his hand, they ran and entered the city and captured it. And they hurried to set the city on fire. '
  '2':
  - type: text
    content: 'And you shall do to Ai and its king as you did '
  - type: note
    content: ch. 6:21
  - type: text
    content: 'to Jericho and its king. Only '
  - type: note
    content: ver. 27; Deut. 20:14
  - type: text
    content: its spoil and its livestock you shall take as plunder for yourselves. Lay an ambush against the city, behind it.”
  '20':
  - type: text
    content: 'So when the men of Ai looked back, behold, the smoke of the city went up to heaven, and they had no power to flee this way or that, for the people who fled to the wilderness turned back against the pursuers. '
  '21':
  - type: text
    content: 'And when Joshua and all Israel saw that the ambush had captured the city, and that the smoke of the city went up, then they turned back and struck down the men of Ai. '
  '22':
  - type: text
    content: 'And the others came out from the city against them, so they were in the midst of Israel, some on this side, and some on that side. And Israel struck them down, until there was '
  - type: note
    content: Deut. 7:2
  - type: text
    content: 'left none that survived or escaped. '
  '23':
  - type: text
    content: But the king of Ai they took alive, and brought him near to Joshua.
  '24':
  - type: text
    content: 'When Israel had finished killing all the inhabitants of Ai in the open wilderness where they pursued them, and all of them to the very last had fallen by the edge of the sword, all Israel returned to Ai and struck it down with the edge of the sword. '
  '25':
  - type: text
    content: 'And all who fell that day, both men and women, were 12,000, all the people of Ai. '
  '26':
  - type: text
    content: 'But Joshua did not draw back his hand with which he '
  - type: note
    content: ver. 18
  - type: text
    content: stretched out the javelin until he had devoted all the inhabitants of Ai to destruction.
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Only the livestock and the spoil of that city Israel took as their plunder, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he '
  - type: note
    content: ver. 2
  - type: text
    content: 'commanded Joshua. '
  '28':
  - type: text
    content: 'So Joshua burned Ai and made it forever a '
  - type: note
    content: Deut. 13:16
  - type: text
    content: 'heap of ruins, as it is to this day. '
  '29':
  - type: note
    content: ch. 10:26
  - type: text
    content: 'And he hanged the king of Ai on a tree until evening. '
  - type: note
    content: Deut. 21:23
  - type: text
    content: 'And at sunset Joshua commanded, and they took his body down from the tree and threw it at the entrance of the gate of the city and '
  - type: note
    content: ch. 7:26
  - type: text
    content: raised over it a great heap of stones, which stands there to this day.
  - type: heading
    content: Joshua Renews the Covenant
  '3':
  - type: text
    content: 'So Joshua and all the fighting men arose to go up to Ai. And Joshua chose 30,000 mighty men of valor and sent them out by night. '
  '30':
  - type: text
    content: 'At that time Joshua built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: See Ex. 20:24, 25; Deut. 27:4-6
  - type: text
    content: 'on Mount Ebal, '
  '31':
  - type: text
    content: 'just as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded the people of Israel, as it is written in the Book of the Law of Moses, “an altar of uncut stones, upon which no man has wielded an iron tool.” And they offered on it burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' and sacrificed peace offerings. '
  '32':
  - type: text
    content: 'And there, in the presence of the people of Israel, he wrote on '
  - type: note
    content: Deut. 27:2-4
  - type: text
    content: 'the stones a copy of the law of Moses, which he had written. '
  '33':
  - type: text
    content: 'And all Israel, '
  - type: note
    content: Deut. 31:12
  - type: text
    content: 'sojourner as well as native born, with their elders and officers and their judges, stood on opposite sides of the ark before the Levitical priests '
  - type: note
    content: Deut. 31:9, 25
  - type: text
    content: 'who carried the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', half of them in front of Mount Gerizim and half of them in front of Mount Ebal, '
  - type: note
    content: Deut. 11:29; 27:11-13
  - type: text
    content: 'just as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded at the first, to bless the people of Israel. '
  '34':
  - type: text
    content: 'And afterward '
  - type: note
    content: Deut. 31:11; Neh. 8:2, 3; 13:1
  - type: text
    content: 'he read all the words of the law, '
  - type: note
    content: Deut. 30:19; See Deut. 28:2-68
  - type: text
    content: 'the blessing and the curse, according to all that is written in the Book of the Law. '
  '35':
  - type: text
    content: 'There was not a word of all that Moses commanded that Joshua did not read before all the assembly of Israel, '
  - type: note
    content: Deut. 31:12
  - type: text
    content: 'and the women, and the little ones, and '
  - type: note
    content: ver. 33
  - type: text
    content: the sojourners who lived
  - type: note
    content: Or traveled
  - type: text
    content: ' among them.'
  '4':
  - type: text
    content: 'And he commanded them, “Behold, '
  - type: note
    content: '[Judg. 20:29]'
  - type: text
    content: 'you shall lie in ambush against the city, behind it. Do not go very far from the city, but all of you remain ready. '
  '5':
  - type: text
    content: 'And I and all the people who are with me will approach the city. And when they come out against us '
  - type: note
    content: ch. 7:5
  - type: text
    content: 'just as before, we shall flee before them. '
  '6':
  - type: text
    content: 'And they will come out after us, until we have '
  - type: note
    content: ver. 16
  - type: text
    content: 'drawn them away from the city. For they will say, ‘They are fleeing from us, just as before.’ So we will flee before them. '
  '7':
  - type: text
    content: 'Then you shall rise up from the ambush and seize the city, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will give it into your hand. '
  '8':
  - type: text
    content: 'And as soon as you have taken the city, you shall set the city on fire. You shall do according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: 2 Sam. 13:28
  - type: text
    content: 'See, I have commanded you.” '
  '9':
  - type: text
    content: So Joshua sent them out. And they went to the place of ambush and lay between Bethel and Ai, to the west of Ai, but Joshua spent that night among the people.
