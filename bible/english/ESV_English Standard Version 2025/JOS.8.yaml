document_id: JOS.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Ai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:9
      metadata:
        usfm: JOS.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:25
      metadata:
        usfm: JOS.10.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 1:21
      metadata:
        usfm: DEU.1.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:18
      metadata:
        usfm: DEU.7.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:8
      metadata:
        usfm: DEU.31.8
    marker-yv: yv-n
  - type: text
    text: '“Do not fear and do not be dismayed. Take all the fighting men with you, and arise, go up to Ai. See, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:24
      metadata:
        usfm: JOS.2.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:2
      metadata:
        usfm: JOS.6.2
    marker-yv: yv-n
  - type: text
    text: 'I have given into your hand the king of Ai, and his people, his city, and his land. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And you shall do to Ai and its king as you did '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:21
      metadata:
        usfm: JOS.6.21
    marker-yv: yv-n
  - type: text
    text: 'to Jericho and its king. Only '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: JOS.8.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 20:14
      metadata:
        usfm: DEU.20.14
    marker-yv: yv-n
  - type: text
    text: its spoil and its livestock you shall take as plunder for yourselves. Lay an ambush against the city, behind it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Joshua and all the fighting men arose to go up to Ai. And Joshua chose 30,000 mighty men of valor and sent them out by night. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he commanded them, “Behold, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 20:29
      metadata:
        usfm: JDG.20.29
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'you shall lie in ambush against the city, behind it. Do not go very far from the city, but all of you remain ready. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I and all the people who are with me will approach the city. And when they come out against us '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:5
      metadata:
        usfm: JOS.7.5
    marker-yv: yv-n
  - type: text
    text: 'just as before, we shall flee before them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they will come out after us, until we have '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: JOS.8.16
    marker-yv: yv-n
  - type: text
    text: 'drawn them away from the city. For they will say, ‘They are fleeing from us, just as before.’ So we will flee before them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then you shall rise up from the ambush and seize the city, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will give it into your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And as soon as you have taken the city, you shall set the city on fire. You shall do according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 13:28
      metadata:
        usfm: 2SA.13.28
    marker-yv: yv-n
  - type: text
    text: 'See, I have commanded you.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Joshua sent them out. And they went to the place of ambush and lay between Bethel and Ai, to the west of Ai, but Joshua spent that night among the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Joshua arose early in the morning and mustered the people and went up, he and the elders of Israel, before the people to Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: JOS.8.5
    marker-yv: yv-n
  - type: text
    text: 'all the fighting men who were with him went up and drew near before the city and encamped on the north side of Ai, with a ravine between them and Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He took about 5,000 men and set them in ambush between Bethel and Ai, to the west of the city. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they stationed the forces, the main encampment that was north of the city and its rear guard west of the city. But Joshua spent that night in the valley. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And as soon as the king of Ai saw this, he and all his people, the men of the city, hurried and went out early to the appointed place
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: appointed time
    marker-yv: yv-n
  - type: text
    text: ' toward '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 1:1
      metadata:
        usfm: DEU.1.1
    marker-yv: yv-n
  - type: text
    text: 'the Arabah to meet Israel in battle. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 20:34
      metadata:
        usfm: JDG.20.34
    marker-yv: yv-n
  - type: text
    text: 'But he did not know that there was an ambush against him behind the city. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Joshua and all Israel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 20:36
      metadata:
        usfm: JDG.20.36
    marker-yv: yv-n
  - type: text
    text: 'pretended to be beaten before them and fled in the direction of the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So all the people who were in the city were called together to pursue them, and as they pursued Joshua they '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JOS.8.6
    marker-yv: yv-n
  - type: text
    text: 'were drawn away from the city. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Not a man was left in Ai or Bethel who did not go out after Israel. They left the city open and pursued Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: JOS.8.26
    marker-yv: yv-n
  - type: text
    text: '“Stretch out the javelin that is in your hand toward Ai, for I will give it into your hand.” And Joshua stretched out the javelin that was in his hand toward the city. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the men in the ambush rose quickly out of their place, and as soon as he had stretched out his hand, they ran and entered the city and captured it. And they hurried to set the city on fire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So when the men of Ai looked back, behold, the smoke of the city went up to heaven, and they had no power to flee this way or that, for the people who fled to the wilderness turned back against the pursuers. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when Joshua and all Israel saw that the ambush had captured the city, and that the smoke of the city went up, then they turned back and struck down the men of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the others came out from the city against them, so they were in the midst of Israel, some on this side, and some on that side. And Israel struck them down, until there was '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 7:2
      metadata:
        usfm: DEU.7.2
    marker-yv: yv-n
  - type: text
    text: 'left none that survived or escaped. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But the king of Ai they took alive, and brought him near to Joshua.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Israel had finished killing all the inhabitants of Ai in the open wilderness where they pursued them, and all of them to the very last had fallen by the edge of the sword, all Israel returned to Ai and struck it down with the edge of the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And all who fell that day, both men and women, were 12,000, all the people of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Joshua did not draw back his hand with which he '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: JOS.8.18
    marker-yv: yv-n
  - type: text
    text: stretched out the javelin until he had devoted all the inhabitants of Ai to destruction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, set apart (devoted) as an offering to the Lord (for destruction)
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Only the livestock and the spoil of that city Israel took as their plunder, according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that he '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JOS.8.2
    marker-yv: yv-n
  - type: text
    text: 'commanded Joshua. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Joshua burned Ai and made it forever a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 13:16
      metadata:
        usfm: DEU.13.16
    marker-yv: yv-n
  - type: text
    text: 'heap of ruins, as it is to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:26
      metadata:
        usfm: JOS.10.26
    marker-yv: yv-n
  - type: text
    text: 'And he hanged the king of Ai on a tree until evening. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 21:23
      metadata:
        usfm: DEU.21.23
    marker-yv: yv-n
  - type: text
    text: 'And at sunset Joshua commanded, and they took his body down from the tree and threw it at the entrance of the gate of the city and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:26
      metadata:
        usfm: JOS.7.26
    marker-yv: yv-n
  - type: text
    text: raised over it a great heap of stones, which stands there to this day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joshua Renews the Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'At that time Joshua built an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 20:24
      metadata:
        usfm: EXO.20.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: EXO.20.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 27:4-6
      metadata:
        usfm: DEU.27.4+DEU.27.5+DEU.27.6
    marker-yv: yv-n
  - type: text
    text: 'on Mount Ebal, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'just as Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded the people of Israel, as it is written in the Book of the Law of Moses, “an altar of uncut stones, upon which no man has wielded an iron tool.” And they offered on it burnt offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and sacrificed peace offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And there, in the presence of the people of Israel, he wrote on '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 27:2-4
      metadata:
        usfm: DEU.27.2+DEU.27.3+DEU.27.4
    marker-yv: yv-n
  - type: text
    text: 'the stones a copy of the law of Moses, which he had written. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And all Israel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 31:12
      metadata:
        usfm: DEU.31.12
    marker-yv: yv-n
  - type: text
    text: 'sojourner as well as native born, with their elders and officers and their judges, stood on opposite sides of the ark before the Levitical priests '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 31:9
      metadata:
