document_id: LAM.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Restore Us to Yourself, O Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 89:50
  - type: text
    content: 'Remember, O '
  - type: text
    content: Lord
  - type: text
    content: ', what has befallen us;'
  - type: text
    content: 'look, and see '
  - type: note
    content: ch. 3:61
  - type: text
    content: our disgrace!
  '10':
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:8
  - type: text
    content: Our skin is hot as an oven
  - type: text
    content: 'with '
  - type: note
    content: '[Deut. 32:24]'
  - type: text
    content: the burning heat of famine.
  '11':
  - type: text
    content: Women are raped in Zion,
  - type: text
    content: young women in the towns of Judah.
  '12':
  - type: text
    content: ' '
  - type: note
    content: See 2 Kgs. 25:19-21
  - type: text
    content: Princes are hung up by their hands;
  - type: note
    content: ch. 4:16
  - type: text
    content: no respect is shown to the elders.
  '13':
  - type: text
    content: 'Young men are compelled to '
  - type: note
    content: '[Judg. 16:21]'
  - type: text
    content: grind at the mill,
  - type: text
    content: 'and boys stagger '
  - type: note
    content: '[Josh. 9:27]'
  - type: text
    content: under loads of wood.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: The old men have left the city gate,
  - type: text
    content: 'the young men '
  - type: note
    content: '[Isa. 24:8]'
  - type: text
    content: their music.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: The joy of our hearts has ceased;
  - type: note
    content: '[ Amos 8:10 ]'
  - type: text
    content: our dancing has been turned to mourning.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps. 89:39; Jer. 13:18; [ch. 1:1 ]
  - type: text
    content: The crown has fallen from our head;
  - type: text
    content: woe to us, for we have sinned!
  '17':
  - type: text
    content: 'For this '
  - type: note
    content: Isa. 1:5
  - type: text
    content: our heart has become sick,
  - type: text
    content: 'for these things '
  - type: note
    content: See ch. 2:11
  - type: text
    content: our eyes have grown dim,
  '18':
  - type: text
    content: for Mount Zion which lies desolate;
  - type: note
    content: '[ Isa. 34:13 ]'
  - type: text
    content: jackals prowl over it.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps. 9:7; 102:12; 145:13
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', reign forever;'
  - type: text
    content: your throne endures to all generations.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps. 79:1
  - type: text
    content: Our inheritance has been turned over to strangers,
  - type: text
    content: our homes to foreigners.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps. 13:1
  - type: text
    content: Why do you forget us forever,
  - type: text
    content: why do you forsake us for so many days?
  '21':
  - type: text
    content: ' '
  - type: note
    content: Jer. 31:18; [ Ps. 80:3, 7, 19 ]
  - type: text
    content: 'Restore us to yourself, O '
  - type: text
    content: Lord
  - type: text
    content: ', that we may be restored!'
  - type: text
    content: Renew our days as of old—
  '22':
  - type: text
    content: ' '
  - type: note
    content: Jer. 14:19
  - type: text
    content: unless you have utterly rejected us,
  - type: text
    content: and you remain exceedingly angry with us.
  '3':
  - type: text
    content: We have become orphans, fatherless;
  - type: text
    content: our mothers are like widows.
  '4':
  - type: text
    content: We must pay for the water we drink;
  - type: text
    content: the wood we get must be bought.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Josh. 10:24 ]'
  - type: text
    content: Our pursuers are at our necks;
  - type: text
    content: we are weary; we are given no rest.
  '6':
  - type: text
    content: 'We have given the hand to '
  - type: note
    content: '[Hos. 12:1]'
  - type: text
    content: 'Egypt, and to '
  - type: note
    content: '[Hos. 12:1]'
  - type: text
    content: Assyria,
  - type: text
    content: to get bread enough.
  '7':
  - type: text
    content: Our fathers sinned, and are no more;
  - type: note
    content: Jer. 31:29; Ezek. 18:2
  - type: text
    content: and we bear their iniquities.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 30:21, 22 ]'
  - type: text
    content: Slaves rule over us;
  - type: text
    content: there is none to deliver us from their hand.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 6:25 ]'
  - type: text
    content: We get our bread at the peril of our lives,
  - type: text
    content: because of the sword in the wilderness.
