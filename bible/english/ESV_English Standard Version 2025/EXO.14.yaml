document_id: EXO.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Crossing the Red Sea
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'When Pharaoh drew near, the people of Israel lifted up their eyes, and behold, the Egyptians were marching after them, and they feared greatly. And the people of Israel '
  - type: note
    content: Josh. 24:7; Neh. 9:9
  - type: text
    content: 'cried out to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'They '
  - type: note
    content: Ps. 106:7; [ch. 13:17]
  - type: text
    content: 'said to Moses, “Is it because there are no graves in Egypt that you have taken us away to die in the wilderness? What have you done to us in bringing us out of Egypt? '
  '12':
  - type: text
    content: 'Is not this what '
  - type: note
    content: ch. 5:21; 6:9
  - type: text
    content: 'we said to you in Egypt: ‘Leave us alone that we may serve the Egyptians’? For it would have been better for us to serve the Egyptians than to die in the wilderness.” '
  '13':
  - type: text
    content: 'And Moses said to the people, '
  - type: note
    content: 2 Chr. 20:15, 17; Isa. 41:10, 13, 14
  - type: text
    content: '“Fear not, stand firm, and see the salvation of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he will work for you today. For '
  - type: note
    content: '[ver. 30]'
  - type: text
    content: 'the Egyptians whom you see today, you shall never see again. '
  '14':
  - type: note
    content: ver. 25; Deut. 1:30; 3:22; 20:4; Josh. 10:14, 42; 23:3; 2 Chr. 20:15, 29; Neh. 4:20
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will fight for you, and you have only '
  - type: note
    content: '[Isa. 30:15]'
  - type: text
    content: to be silent.”
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Why do you cry to me? Tell the people of Israel to go forward. '
  '16':
  - type: note
    content: See ch. 7:19
  - type: text
    content: 'Lift up your staff, and '
  - type: note
    content: See ch. 7:19
  - type: text
    content: 'stretch out your hand over the sea and divide it, that the people of Israel may go through the sea on dry ground. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 4, 8]'
  - type: text
    content: 'I will harden the hearts of the Egyptians so that they shall go in after them, and '
  - type: note
    content: ver. 4
  - type: text
    content: 'I will get glory over Pharaoh and all his host, his chariots, and his horsemen. '
  '18':
  - type: text
    content: 'And the Egyptians '
  - type: note
    content: ch. 7:5
  - type: text
    content: 'shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: when I have gotten glory over Pharaoh, his chariots, and his horsemen.”
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:20; 32:34; Num. 20:16; Isa. 63:9; [ch. 13:21 ]
  - type: text
    content: 'Then the angel of God who was going before the host of Israel moved and went behind them, and the pillar of cloud moved from before them and stood behind them, '
  '2':
  - type: text
    content: '“Tell the people of Israel to '
  - type: note
    content: ch. 13:18, 20; Num. 33:7, 8
  - type: text
    content: 'turn back and encamp in front of Pi-hahiroth, between '
  - type: note
    content: Jer. 44:1
  - type: text
    content: 'Migdol and the sea, in front of Baal-zephon; you shall encamp facing it, by the sea. '
  '20':
  - type: text
    content: coming between the host of Egypt and the host of Israel. And there was the cloud and the darkness. And it lit up the night
  - type: note
    content: Septuagint and the night passed
  - type: text
    content: ' without one coming near the other all night.'
  '21':
  - type: text
    content: 'Then Moses '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'stretched out his hand over the sea, and the '
  - type: text
    content: Lord
  - type: text
    content: ' drove the sea back by '
  - type: note
    content: ch. 15:10
  - type: text
    content: 'a strong east wind all night and '
  - type: note
    content: Ps. 66:6
  - type: text
    content: 'made the sea dry land, and the waters were '
  - type: note
    content: ch. 15:8; Neh. 9:11; Ps. 74:13; 78:13; 106:9; 114:3; Isa. 51:10; 63:12; [Josh. 3:16; 4:23; Isa. 10:26; 11:15, 16]
  - type: text
    content: 'divided. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: ver. 29; ch. 15:19; Num. 33:8; Ps. 66:6; Isa. 63:13; 1 Cor. 10:1; Heb. 11:29; [Ps. 77:19]
  - type: text
    content: 'the people of Israel went into the midst of the sea on dry ground, the waters being '
  - type: note
    content: Ps. 78:13; [Hab. 3:10]
  - type: text
    content: 'a wall to them on their right hand and on their left. '
  '23':
  - type: text
    content: 'The Egyptians pursued and went in after them into the midst of the sea, all Pharaoh’s horses, his chariots, and his horsemen. '
  '24':
  - type: text
    content: 'And in the morning watch the '
  - type: text
    content: Lord
  - type: text
    content: ' in the pillar of fire and of cloud looked down on the Egyptian forces and threw the Egyptian forces into a panic, '
  '25':
  - type: text
    content: clogging
  - type: note
    content: Or binding (compare Samaritan, Septuagint, Syriac); Hebrew removing
  - type: text
    content: ' their chariot wheels so that they drove heavily. And the Egyptians said, “Let us flee from before Israel, for the '
  - type: note
    content: ver. 14
  - type: text
    content: Lord
  - type: text
    content: ' fights for them against the Egyptians.”'
  '26':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ver. 16, 21
  - type: text
    content: '“Stretch out your hand over the sea, that the water may come back upon the Egyptians, upon their chariots, and upon their horsemen.” '
  '27':
  - type: note
    content: ver. 21
  - type: text
    content: 'So Moses stretched out his hand over the sea, and the sea '
  - type: note
    content: '[Josh. 4:18]'
  - type: text
    content: 'returned to its normal course when the morning appeared. And as the Egyptians fled into it, the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 15:1, 7; Deut. 11:4; Ps. 78:53; Heb. 11:29
  - type: text
    content: threw
  - type: note
    content: Hebrew shook off
  - type: text
    content: ' the Egyptians into the midst of the sea. '
  '28':
  - type: text
    content: 'The '
  - type: note
    content: '[Hab. 3:8-13]'
  - type: text
    content: 'waters returned and covered the chariots and the horsemen; of all the host of Pharaoh that had followed them into the sea, '
  - type: note
    content: Ps. 106:11
  - type: text
    content: 'not one of them remained. '
  '29':
  - type: text
    content: 'But the '
  - type: note
    content: See ver. 22
  - type: text
    content: people of Israel walked on dry ground through the sea, the waters being a wall to them on their right hand and on their left.
  '3':
  - type: text
    content: 'For Pharaoh will say of the people of Israel, ‘They are wandering in the land; the wilderness has shut them in.’ '
  '30':
  - type: text
    content: 'Thus the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 106:8, 10
  - type: text
    content: 'saved Israel that day from the hand of the Egyptians, and Israel saw the Egyptians dead on the seashore. '
  '31':
  - type: note
    content: Ps. 92:9-11; [ver. 13]
  - type: text
    content: 'Israel saw the great power that the '
  - type: text
    content: Lord
  - type: text
    content: ' used against the Egyptians, so the people feared the '
  - type: text
    content: Lord
  - type: text
    content: ', and they '
  - type: note
    content: Ps. 106:12; [John 2:11; 11:45]
  - type: text
    content: 'believed in the '
  - type: text
    content: Lord
  - type: text
    content: ' and in his servant Moses.'
  '4':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 4:21
  - type: text
    content: 'I will harden Pharaoh’s heart, and he will pursue them, and I will '
  - type: note
    content: Rom. 9:17, 22, 23; See ch. 9:16
  - type: text
    content: 'get glory over Pharaoh and all his host, '
  - type: note
    content: ch. 7:5
  - type: text
    content: 'and the Egyptians shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .” And they did so.
  '5':
  - type: text
    content: 'When the king of Egypt was told that the people had fled, the '
  - type: note
    content: Ps. 105:25
  - type: text
    content: 'mind of Pharaoh and his servants was changed toward the people, and they said, “What is this we have done, that we have let Israel go from serving us?” '
  '6':
  - type: text
    content: 'So he made ready his chariot and took his army with him, '
  '7':
  - type: text
    content: 'and took '
  - type: note
    content: ch. 15:4; [Isa. 31:1]
  - type: text
    content: 'six hundred chosen chariots and all the other chariots of Egypt with officers over all of them. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened the heart of Pharaoh king of Egypt, and he pursued the people of Israel while '
  - type: note
    content: ch. 6:1; 13:3, 9, 16; Num. 33:3; Deut. 26:8; Acts 13:17; [ch. 3:19]
  - type: text
    content: 'the people of Israel were going out defiantly. '
  '9':
  - type: text
    content: 'The '
  - type: note
    content: ch. 15:9; Josh. 24:6
  - type: text
    content: 'Egyptians pursued them, all Pharaoh’s horses and chariots and his horsemen and his army, and overtook them '
  - type: note
    content: ver. 2
  - type: text
    content: encamped at the sea, by Pi-hahiroth, in front of Baal-zephon.
