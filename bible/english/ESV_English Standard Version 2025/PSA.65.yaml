document_id: PSA.65,59
type_code: eng
verses:
  '1':
  - type: heading
    content: O God of Our Salvation
  - type: text
    content: To the choirmaster. A Psalm of David. A Song.
  - type: text
    content: 'Praise '
  - type: note
    content: Ps. 62:1
  - type: text
    content: is due to you,
  - type: note
    content: Or Praise waits for you in silence
  - type: text
    content: ' O God, in Zion,'
  - type: text
    content: 'and to you shall '
  - type: note
    content: See Ps. 50:14
  - type: text
    content: vows be performed.
  '10':
  - type: text
    content: You water its furrows abundantly,
  - type: text
    content: settling its ridges,
  - type: text
    content: 'softening it with '
  - type: note
    content: Deut. 32:2
  - type: text
    content: showers,
  - type: text
    content: and blessing its growth.
  '11':
  - type: text
    content: You crown the year with your bounty;
  - type: text
    content: 'your wagon tracks '
  - type: note
    content: Job 36:28
  - type: text
    content: overflow with abundance.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Joel 2:22; [ Job 38:26, 27 ]
  - type: text
    content: The pastures of the wilderness overflow,
  - type: text
    content: 'the hills '
  - type: note
    content: Isa. 55:12
  - type: text
    content: gird themselves with joy,
  '13':
  - type: text
    content: ' '
  - type: note
    content: Isa. 30:23
  - type: text
    content: the meadows clothe themselves with flocks,
  - type: text
    content: the valleys deck themselves with grain,
  - type: text
    content: 'they '
  - type: note
    content: Ps. 98:8; [Isa. 44:23]
  - type: text
    content: shout and sing together for joy.
  '2':
  - type: text
    content: 'O you who '
  - type: note
    content: 2 Kgs. 19:20
  - type: text
    content: hear prayer,
  - type: text
    content: 'to you '
  - type: note
    content: See Ps. 86:9
  - type: text
    content: shall all flesh come.
  '3':
  - type: text
    content: 'When '
  - type: note
    content: See Ps. 38:4
  - type: text
    content: iniquities prevail against me,
  - type: text
    content: 'you '
  - type: note
    content: Ps. 79:9; Isa. 6:7; See Ps. 51:2
  - type: text
    content: atone for our transgressions.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 33:12 ]'
  - type: text
    content: Blessed is the one you choose and bring near,
  - type: text
    content: 'to '
  - type: note
    content: Ps. 84:4; See Ps. 27:4
  - type: text
    content: dwell in your courts!
  - type: text
    content: 'We shall be '
  - type: note
    content: See Ps. 16:11
  - type: text
    content: satisfied with the goodness of your house,
  - type: text
    content: the holiness of your temple!
  '5':
  - type: text
    content: 'By '
  - type: note
    content: Ps. 45:4; 106:22; Deut. 10:21; 2 Sam. 7:23; [Rev. 15:3]
  - type: text
    content: awesome deeds you answer us with righteousness,
  - type: text
    content: O God of our salvation,
  - type: text
    content: 'the hope of all '
  - type: note
    content: See Ps. 22:27
  - type: text
    content: the ends of the earth
  - type: text
    content: and of the farthest seas;
  '6':
  - type: text
    content: the one who by his strength established the mountains,
  - type: text
    content: 'being '
  - type: note
    content: Ps. 93:1
  - type: text
    content: girded with might;
  '7':
  - type: text
    content: 'who '
  - type: note
    content: Ps. 89:9; 93:3, 4; 107:29; Matt. 8:26; [Jer. 5:22]
  - type: text
    content: stills the roaring of the seas,
  - type: text
    content: the roaring of their waves,
  - type: note
    content: Ps. 74:23; Isa. 17:12, 13
  - type: text
    content: the tumult of the peoples,
  '8':
  - type: text
    content: so that those who dwell at the ends of the earth are in awe at your signs.
  - type: text
    content: You make the going out of the morning and the evening to shout for joy.
  '9':
  - type: text
    content: 'You visit the earth and '
  - type: note
    content: Ps. 68:9; 72:6; Lev. 26:4; See Job 5:10
  - type: text
    content: water it;
  - type: note
    content: Or and make it overflow
  - type: text
    content: you greatly enrich it;
  - type: note
    content: '[ Ps. 46:4 ]'
  - type: text
    content: the river of God is full of water;
  - type: note
    content: '[ Ps. 147:14 ]'
  - type: text
    content: you provide their grain,
  - type: text
    content: for so you have prepared it.
