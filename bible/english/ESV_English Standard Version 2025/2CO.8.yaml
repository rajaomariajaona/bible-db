document_id: 2CO.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Encouragement to Give Generously
  - type: text
    content: We want you to know, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' about the grace of God that has been '
  - type: note
    content: ver. 5
  - type: text
    content: 'given among the churches of Macedonia, '
  '10':
  - type: text
    content: 'And in this matter '
  - type: note
    content: 1 Cor. 7:25
  - type: text
    content: 'I give my judgment: '
  - type: note
    content: Deut. 15:7, 8; Prov. 19:17; 28:27; 1 Tim. 6:18, 19; Heb. 13:16
  - type: text
    content: 'this benefits you, who '
  - type: note
    content: ch. 9:2
  - type: text
    content: 'a year ago started not only to do this work but also to desire to do it. '
  '11':
  - type: text
    content: 'So now finish doing it as well, so that your readiness in desiring it may be matched by your completing it out of what you have. '
  '12':
  - type: text
    content: 'For if the readiness is there, it is acceptable '
  - type: note
    content: '[ch. 9:7; Mark 12:43, 44; Luke 21:3]'
  - type: text
    content: 'according to what a person has, not according to what he does not have. '
  '13':
  - type: text
    content: 'For I do not mean that others should be eased and you burdened, but that as a matter of fairness '
  '14':
  - type: text
    content: 'your abundance at the present time should supply '
  - type: note
    content: ch. 9:12; [Acts 4:34]
  - type: text
    content: 'their need, so that their abundance may supply your need, that there may be fairness. '
  '15':
  - type: text
    content: 'As it is written, '
  - type: note
    content: Cited from Ex. 16:18
  - type: text
    content: “Whoever gathered much had nothing left over, and whoever gathered little had no lack.”
  - type: heading
    content: Commendation of Titus
  '16':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 2:14
  - type: text
    content: 'thanks be to God, '
  - type: note
    content: Rev. 17:17
  - type: text
    content: 'who put into the heart of Titus the same earnest care I have for you. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: ver. 6
  - type: text
    content: he not only accepted our appeal, but being himself very earnest he is going
  - type: note
    content: Or he went
  - type: text
    content: ' to you of his own accord. '
  '18':
  - type: text
    content: With him we are sending
  - type: note
    content: Or we sent; also verse 22
  - type: text
    content: ' '
  - type: note
    content: ch. 12:18
  - type: text
    content: 'the brother who is famous among '
  - type: note
    content: See 1 Cor. 7:17
  - type: text
    content: 'all the churches for his preaching of the gospel. '
  '19':
  - type: text
    content: 'And not only that, but he has been '
  - type: note
    content: '[1 Cor. 16:3, 4]'
  - type: text
    content: 'appointed by the churches to travel with us as we carry out this act of '
  - type: note
    content: ver. 6
  - type: text
    content: 'grace that is being ministered by us, '
  - type: note
    content: ch. 4:15
  - type: text
    content: 'for the glory of the Lord himself and to show our good will. '
  '2':
  - type: text
    content: 'for in a severe test of affliction, their abundance of joy and '
  - type: note
    content: '[Mark 12:44]'
  - type: text
    content: 'their extreme poverty have overflowed in a wealth of generosity on their part. '
  '20':
  - type: text
    content: 'We take this course so that no one should blame us about this generous gift that is being administered by us, '
  '21':
  - type: text
    content: 'for '
  - type: note
    content: See Rom. 12:17
  - type: text
    content: 'we aim at what is honorable '
  - type: note
    content: '[Rom. 14:18; Phil. 4:8; 1 Pet. 2:12]'
  - type: text
    content: 'not only in the Lord’s sight but also in the sight of man. '
  '22':
  - type: text
    content: 'And with them we are sending our brother whom we have often tested and found earnest in many matters, but who is now more earnest than ever because of his great confidence in you. '
  '23':
  - type: text
    content: 'As for Titus, he is '
  - type: note
    content: '[Philem. 17]'
  - type: text
    content: my partner and fellow worker for your benefit. And as for our brothers, they are messengers
  - type: note
    content: Greek apostles
  - type: text
    content: ' of the churches, the glory of Christ. '
  '24':
  - type: text
    content: 'So give proof before the churches of your love and of '
  - type: note
    content: ch. 7:4, 14; 9:2, 3
  - type: text
    content: our boasting about you to these men.
  '3':
  - type: text
    content: 'For they gave '
  - type: note
    content: ver. 11; 1 Cor. 16:2
  - type: text
    content: 'according to their means, as I can testify, and beyond their means, of their own accord, '
  '4':
  - type: text
    content: 'begging us earnestly '
  - type: note
    content: ch. 9:2; Rom. 15:25, 26; See Acts 24:17
  - type: text
    content: for the favor
  - type: note
    content: The Greek word charis can mean favor or grace or thanks, depending on the context
  - type: text
    content: ' of taking part in '
  - type: note
    content: See Rom. 15:31
  - type: text
    content: 'the relief of the saints— '
  '5':
  - type: text
    content: 'and this, not as we expected, but they '
  - type: note
    content: ver. 1
  - type: text
    content: 'gave themselves first to the Lord and then by the will of God to us. '
  '6':
  - type: text
    content: 'Accordingly, '
  - type: note
    content: ver. 17; ch. 12:18
  - type: text
    content: 'we urged Titus that as he had started, so he should complete among you '
  - type: note
    content: ver. 19; [ver. 4]
  - type: text
    content: 'this act of grace. '
  '7':
  - type: text
    content: 'But as '
  - type: note
    content: See 1 Cor. 1:5
  - type: text
    content: you excel in everything—in faith, in speech, in knowledge, in all earnestness, and in our love for you
  - type: note
    content: Some manuscripts in your love for us
  - type: text
    content: —
  - type: note
    content: ch. 9:8
  - type: text
    content: see that you excel in this act of grace also.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 7:6
  - type: text
    content: 'I say this not as a command, but to prove by the earnestness of others that your love also is genuine. '
  '9':
  - type: text
    content: 'For you know the grace of our Lord Jesus Christ, that '
  - type: note
    content: Phil. 2:6, 7; [ch. 6:10; Matt. 20:28]
  - type: text
    content: 'though he was rich, yet for your sake he became poor, so that you by his poverty might become rich. '
