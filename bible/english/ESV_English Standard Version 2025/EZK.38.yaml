  - type: text
    content: 'all of them riding on horses, a great host, a mighty army. '
  '16':
  - type: text
    content: 'You will come up against my people Israel, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'like a cloud covering the land. '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'In the latter days I will bring you against my land, that the nations may know me, when through you, O Gog, '
  - type: note
    content: ver. 23; [ch. 39:13]; See ch. 20:41
  - type: text
    content: I vindicate my holiness before their eyes.
  '17':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Are you '
  - type: note
    content: '[Jer. 6:22, 23]'
  - type: text
    content: 'he of whom I spoke in former days by my servants the prophets of Israel, who in those days prophesied for years that I would bring you against them? '
  '18':
  - type: text
    content: 'But on that day, the day that Gog shall come against the land of Israel, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: '[Ps. 18:8]'
  - type: text
    content: 'my wrath will be roused in my anger. '
