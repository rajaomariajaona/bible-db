  '1':
  - type: heading
    content: Prophecy Against Gog
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': On that day, '
  - type: note
    content: See ch. 11:5
  - type: text
    content: 'thoughts will come into your mind, and you will devise an evil scheme '
  '11':
  - type: text
    content: 'and say, ‘I will go up against '
  - type: note
    content: '[Zech. 2:4, 5]'
  - type: text
    content: 'the land of unwalled villages. I will fall upon '
  - type: note
    content: '[Jer. 49:31]'
  - type: text
    content: 'the quiet people who dwell securely, all of them dwelling without walls, and having no bars or gates,’ '
  '12':
  - type: text
    content: 'to seize spoil and carry off plunder, to turn your hand against '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'the waste places that are now inhabited, and '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'the people who were gathered from the nations, who have acquired livestock and goods, '
  - type: note
    content: '[ch. 5:5, 7, 14, 15]'
  - type: text
    content: 'who dwell at the center of the earth. '
  '13':
  - type: note
    content: ch. 27:22
  - type: text
    content: 'Sheba and '
  - type: note
    content: ch. 25:13; 27:15
  - type: text
    content: 'Dedan and the merchants of Tarshish and all '
  - type: note
    content: '[ch. 32:2; Ps. 17:12]'
  - type: text
    content: its leaders
  - type: note
    content: Hebrew young lions
  - type: text
    content: ' will say to you, ‘Have you come to seize spoil? Have you assembled your hosts to carry off plunder, to carry away silver and gold, to take away livestock and goods, to seize great spoil?’'
  '14':
  - type: text
    content: '“Therefore, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, prophesy, and say to '
  - type: note
