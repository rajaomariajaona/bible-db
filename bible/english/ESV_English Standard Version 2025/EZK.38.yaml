    content: '[See ver. 8 above]'
  - type: text
    content: 'dwelling securely, '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'will you not know it? '
  '15':
  - type: text
    content: 'You will come from your place out of '
  - type: note
