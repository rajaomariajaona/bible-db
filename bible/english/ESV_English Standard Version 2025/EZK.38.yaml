  - type: text
    content: 'in my jealousy and in my blazing wrath I declare, On that day '
  - type: note
    content: '[Hag. 2:6, 7; Rev. 16:18]'
  - type: text
    content: 'there shall be a great earthquake in the land of Israel. '
