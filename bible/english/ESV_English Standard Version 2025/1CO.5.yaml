document_id: 1CO.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sexual Immorality Defiles the Church
  - type: text
    content: 'It is actually reported that there is '
  - type: note
    content: 2 Cor. 12:21
  - type: text
    content: 'sexual immorality among you, and of a kind that is not tolerated even among pagans, '
  - type: note
    content: Lev. 18:8; Deut. 22:30; 27:20
  - type: text
    content: 'for a man has his father’s wife. '
  '10':
  - type: note
    content: '[ch. 10:27]'
  - type: text
    content: 'not at all meaning '
  - type: note
    content: Eph. 5:5; Col. 3:5; [ch. 6:9]
  - type: text
    content: 'the sexually immoral of this world, or the greedy and swindlers, or idolaters, '
  - type: note
    content: '[John 17:15]'
  - type: text
    content: 'since then you would need to go out of the world. '
  '11':
  - type: text
    content: 'But now I am writing to you not to associate with anyone '
  - type: note
    content: 2 Thess. 3:6
  - type: text
    content: 'who bears the name of brother if he is guilty of sexual immorality or greed, or is an idolater, reviler, drunkard, or swindler—not even to eat with such a one. '
  '12':
  - type: text
    content: 'For what have I to do with judging '
  - type: note
    content: See Mark 4:11
  - type: text
    content: 'outsiders? '
  - type: note
    content: '[ch. 6:1-4]'
  - type: text
    content: Is it not those inside the church
  - type: note
    content: Greek those inside
  - type: text
    content: ' whom you are to judge? '
  '13':
  - type: text
    content: God judges
  - type: note
    content: Or will judge
  - type: text
    content: ' those outside. '
  - type: note
    content: '[Deut. 13:5; 17:7, 12; 21:21; 22:21, 22, 24; Judg. 20:13]'
  - type: text
    content: “Purge the evil person from among you.”
  '2':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 4:6
  - type: text
    content: 'you are arrogant! Ought you '
  - type: note
    content: '[2 Cor. 7:7-10]'
  - type: text
    content: not rather to mourn? Let him who has done this be removed from among you.
  '3':
  - type: text
    content: 'For though '
  - type: note
    content: Col. 2:5; [1 Thess. 2:17]
  - type: text
    content: 'absent in body, I am present in spirit; and as if present, I have already pronounced judgment on the one who did such a thing. '
  '4':
  - type: text
    content: 'When you are assembled '
  - type: note
    content: 2 Thess. 3:6; [Matt. 16:19; 18:18; John 20:23; 2 Cor. 13:3, 10; 1 Tim. 5:20]
  - type: text
    content: 'in the name of the Lord Jesus and my spirit is present, with the power of our Lord Jesus, '
  '5':
  - type: text
    content: 'you are '
  - type: note
    content: 1 Tim. 1:20; [Job 2:6; Acts 26:18]
  - type: text
    content: 'to deliver this man to Satan for the destruction of the flesh, so '
  - type: note
    content: '[Prov. 23:14]'
  - type: text
    content: 'that his spirit may be saved '
  - type: note
    content: See ch. 1:8
  - type: text
    content: in the day of the Lord.
  - type: note
    content: Some manuscripts add Jesus
  '6':
  - type: text
    content: ' '
  - type: note
    content: James 4:16; [ver. 2 ]
  - type: text
    content: 'Your boasting is not good. Do you not know that '
  - type: note
    content: Gal. 5:9; [ch. 15:33]
  - type: text
    content: 'a little leaven leavens the whole lump? '
  '7':
  - type: text
    content: 'Cleanse out the old leaven that you may be a new lump, as you really are unleavened. For Christ, our Passover lamb, has been sacrificed. '
  '8':
  - type: text
    content: 'Let us therefore celebrate the festival, '
  - type: note
    content: Ex. 12:15; Deut. 16:3
  - type: text
    content: 'not with the old leaven, '
  - type: note
    content: '[Matt. 16:6, 12; Mark 8:15; Luke 12:1]'
  - type: text
    content: the leaven of malice and evil, but with the unleavened bread of sincerity and truth.
  '9':
  - type: text
    content: 'I wrote to you in my letter '
  - type: note
    content: '[2 Cor. 6:14; Eph. 5:11; 2 Thess. 3:6, 14]'
  - type: text
    content: 'not to associate with sexually immoral people— '
