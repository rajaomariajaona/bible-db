document_id: EZR.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Proclamation of Cyrus
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-3, see 2 Chr. 36:22, 23
  - type: text
    content: 'In the first year of Cyrus king of Persia, '
  - type: note
    content: Jer. 25:12, 13; 29:10
  - type: text
    content: 'that the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' by the mouth of Jeremiah might be fulfilled, the '
  - type: text
    content: Lord
  - type: text
    content: ' stirred up the spirit of Cyrus king of Persia, so '
  - type: note
    content: ch. 5:13
  - type: text
    content: 'that he made a proclamation throughout all his kingdom and also put it in writing:'
  '10':
  - type: text
    content: '30 bowls of gold, 410 bowls of silver, and 1,000 other vessels; '
  '11':
  - type: text
    content: all the vessels of gold and of silver were 5,400. All these did Sheshbazzar bring up, when the exiles were brought up from Babylonia to Jerusalem.
  '2':
  - type: text
    content: '“Thus says Cyrus king of Persia: The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth, and '
  - type: note
    content: Isa. 44:28; [Isa. 45:1, 13]
  - type: text
    content: 'he has charged me to build him a house at Jerusalem, which is in Judah. '
  '3':
  - type: text
    content: 'Whoever is among you of all his people, may his God be with him, and let him go up to Jerusalem, which is in Judah, and rebuild the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel—'
  - type: note
    content: Dan. 6:26
  - type: text
    content: 'he is the God who is in Jerusalem. '
  '4':
  - type: text
    content: And let each survivor, in whatever place he sojourns, be assisted by the men of his place with silver and gold, with goods and with beasts, besides freewill offerings for the house of God that is in Jerusalem.”
  '5':
  - type: text
    content: 'Then rose up the heads of the fathers’ houses of Judah and Benjamin, and the priests and the Levites, '
  - type: note
    content: '[Phil. 2:13]'
  - type: text
    content: 'everyone whose spirit '
  - type: note
    content: ver. 1
  - type: text
    content: 'God had stirred to go up to rebuild the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' that is in Jerusalem. '
  '6':
  - type: text
    content: 'And all who were about them '
  - type: note
    content: '[ch. 4:4]; Jer. 38:4'
  - type: text
    content: 'aided them with vessels of silver, with gold, with goods, with beasts, and with costly wares, besides all that was freely offered. '
  '7':
  - type: note
    content: ch. 5:14; 6:5
  - type: text
    content: 'Cyrus the king also brought out the vessels of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' that '
  - type: note
    content: 2 Kgs. 24:13; 2 Chr. 36:7
  - type: text
    content: 'Nebuchadnezzar had carried away from Jerusalem and placed in the house of his gods. '
  '8':
  - type: text
    content: 'Cyrus king of Persia brought these out in the charge of '
  - type: note
    content: ch. 4:7
  - type: text
    content: 'Mithredath the treasurer, who counted them out to '
  - type: note
    content: ch. 5:14
  - type: text
    content: 'Sheshbazzar the prince of Judah. '
  '9':
  - type: text
    content: 'And this was the number of them: '
  - type: note
    content: '[ch. 8:27; 1 Chr. 28:17]'
  - type: text
    content: '30 basins of gold, 1,000 basins of silver, 29 censers, '
