document_id: EZR.1,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Proclamation of Cyrus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-3, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 36:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      marker-yv: yv-n
    - type: text
      text: 'In the first year of Cyrus king of Persia, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 25:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:10
      marker-yv: yv-n
    - type: text
      text: 'that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by the mouth of Jeremiah might be fulfilled, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stirred up the spirit of Cyrus king of Persia, so '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:13
      marker-yv: yv-n
    - type: text
      text: 'that he made a proclamation throughout all his kingdom and also put it in writing:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '30 bowls of gold, 410 bowls of silver, and 1,000 other vessels; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: all the vessels of gold and of silver were 5,400. All these did Sheshbazzar bring up, when the exiles were brought up from Babylonia to Jerusalem.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says Cyrus king of Persia: The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven, has given me all the kingdoms of the earth, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 44:28
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 45:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he has charged me to build him a house at Jerusalem, which is in Judah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever is among you of all his people, may his God be with him, and let him go up to Jerusalem, which is in Judah, and rebuild the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel—'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 6:26
      marker-yv: yv-n
    - type: text
      text: 'he is the God who is in Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And let each survivor, in whatever place he sojourns, be assisted by the men of his place with silver and gold, with goods and with beasts, besides freewill offerings for the house of God that is in Jerusalem.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then rose up the heads of the fathers’ houses of Judah and Benjamin, and the priests and the Levites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'everyone whose spirit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      marker-yv: yv-n
    - type: text
      text: 'God had stirred to go up to rebuild the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that is in Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all who were about them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; Jer. 38:4'
      marker-yv: yv-n
    - type: text
      text: 'aided them with vessels of silver, with gold, with goods, with beasts, and with costly wares, besides all that was freely offered. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:5
      marker-yv: yv-n
    - type: text
      text: 'Cyrus the king also brought out the vessels of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 24:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 36:7
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar had carried away from Jerusalem and placed in the house of his gods. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cyrus king of Persia brought these out in the charge of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:7
      marker-yv: yv-n
    - type: text
      text: 'Mithredath the treasurer, who counted them out to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:14
      marker-yv: yv-n
    - type: text
      text: 'Sheshbazzar the prince of Judah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this was the number of them: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 28:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '30 basins of gold, 1,000 basins of silver, 29 censers, '
