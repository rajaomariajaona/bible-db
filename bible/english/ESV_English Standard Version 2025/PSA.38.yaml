document_id: PSA.38,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Not Forsake Me, O Lord
  - type: text
    content: 'A Psalm of David, '
  - type: note
    content: Ps. 70, title; [1 Chr. 16:4]
  - type: text
    content: for the memorial offering.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 6:1
  - type: text
    content: rebuke me not in your anger,
  - type: text
    content: nor discipline me in your wrath!
  '10':
  - type: text
    content: My heart throbs; my strength fails me,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 6:7
  - type: text
    content: the light of my eyes—it also has gone from me.
  '11':
  - type: text
    content: 'My '
  - type: note
    content: Ps. 88:18; See Job 19:13-20
  - type: text
    content: 'friends and companions '
  - type: note
    content: '[Luke 10:31, 32]'
  - type: text
    content: 'stand aloof from my '
  - type: note
    content: Ps. 39:10; Isa. 53:4, 8
  - type: text
    content: plague,
  - type: text
    content: 'and my nearest kin '
  - type: note
    content: '[Matt. 27:55; Mark 15:40; Luke 23:49]'
  - type: text
    content: stand far off.
  '12':
  - type: text
    content: 'Those who seek my life '
  - type: note
    content: '[Matt. 22:15]; Mark 12:13; Luke 20:20; See 2 Sam. 17:1-3'
  - type: text
    content: lay their snares;
  - type: text
    content: 'those who seek my hurt '
  - type: note
    content: '[2 Sam. 16:7, 8]'
  - type: text
    content: speak of ruin
  - type: text
    content: 'and meditate '
  - type: note
    content: Ps. 35:20
  - type: text
    content: treachery all day long.
  '13':
  - type: text
    content: But I am like a deaf man; I do not hear,
  - type: text
    content: 'like '
  - type: note
    content: Ps. 39:2, 9; Isa. 53:7; 1 Pet. 2:23
  - type: text
    content: a mute man who does not open his mouth.
  '14':
  - type: text
    content: I have become like a man who does not hear,
  - type: text
    content: 'and in whose mouth are no '
  - type: note
    content: '[Job 23:4]'
  - type: text
    content: rebukes.
  '15':
  - type: text
    content: 'But for '
  - type: note
    content: Ps. 39:7; [2 Sam. 16:12]
  - type: text
    content: 'you, O '
  - type: text
    content: Lord
  - type: text
    content: ', do I wait;'
  - type: text
    content: it is you, O Lord my God, who will answer.
  '16':
  - type: text
    content: 'For I said, “Only '
  - type: note
    content: '[Ps. 13:4]'
  - type: text
    content: let them not rejoice over me,
  - type: text
    content: 'who '
  - type: note
    content: See Job 19:5
  - type: text
    content: 'boast against me when my '
  - type: note
    content: Ps. 94:18
  - type: text
    content: foot slips!”
  '17':
  - type: text
    content: 'For I am '
  - type: note
    content: Ps. 35:15; Jer. 20:10
  - type: text
    content: ready to fall,
  - type: text
    content: and my pain is ever before me.
  '18':
  - type: text
    content: 'I '
  - type: note
    content: See Ps. 32:5
  - type: text
    content: confess my iniquity;
  - type: text
    content: 'I am '
  - type: note
    content: '[2 Cor. 7:9, 10]'
  - type: text
    content: sorry for my sin.
  '19':
  - type: text
    content: But my foes are vigorous, they are mighty,
  - type: text
    content: 'and many are those who hate me '
  - type: note
    content: Ps. 35:19
  - type: text
    content: wrongfully.
  '2':
  - type: text
    content: 'For your '
  - type: note
    content: Job 6:4
  - type: text
    content: arrows have sunk into me,
  - type: text
    content: 'and your hand '
  - type: note
    content: See Ps. 32:4
  - type: text
    content: has come down on me.
  '20':
  - type: text
    content: 'Those who '
  - type: note
    content: See Ps. 35:12
  - type: text
    content: render me evil for good
  - type: note
    content: Ps. 109:4
  - type: text
    content: 'accuse me because I '
  - type: note
    content: '[3 John 11]'
  - type: text
    content: follow after good.
  '21':
  - type: text
    content: 'Do not forsake me, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'O my God, be not '
  - type: note
    content: See Ps. 10:1
  - type: text
    content: far from me!
  '22':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 40:13
  - type: text
    content: Make haste to help me,
  - type: text
    content: 'O Lord, my '
  - type: note
    content: See Ps. 27:1
  - type: text
    content: salvation!
  '3':
  - type: text
    content: 'There is '
  - type: note
    content: Isa. 1:6
  - type: text
    content: no soundness in my flesh
  - type: text
    content: because of your indignation;
  - type: text
    content: 'there is no health in my '
  - type: note
    content: See Ps. 31:10
  - type: text
    content: bones
  - type: text
    content: because of my sin.
  '4':
  - type: text
    content: 'For my '
  - type: note
    content: Ps. 40:12; Ezra 9:6
  - type: text
    content: iniquities have gone over my head;
  - type: text
    content: like a heavy burden, they are too heavy for me.
  '5':
  - type: text
    content: My wounds stink and fester
  - type: text
    content: because of my foolishness,
  '6':
  - type: text
    content: 'I am '
  - type: note
    content: Ps. 35:14; 42:5, 6, 11; 43:5
  - type: text
    content: 'utterly bowed down and '
  - type: note
    content: Isa. 21:3
  - type: text
    content: prostrate;
  - type: text
    content: 'all the day I '
  - type: note
    content: '[Job 30:28]'
  - type: text
    content: go about mourning.
  '7':
  - type: text
    content: For my sides are filled with burning,
  - type: text
    content: 'and there is '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: no soundness in my flesh.
  '8':
  - type: text
    content: I am feeble and crushed;
  - type: text
    content: 'I '
  - type: note
    content: See Ps. 22:1
  - type: text
    content: groan because of the tumult of my heart.
  '9':
  - type: text
    content: O Lord, all my longing is before you;
  - type: text
    content: 'my '
  - type: note
    content: Ps. 6:6
  - type: text
    content: sighing is not hidden from you.
