document_id: JER.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Famine, Sword, and Pestilence
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Jeremiah concerning '
  - type: note
    content: ch. 17:8
  - type: text
    content: 'the drought:'
  '10':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning this people:'
  - type: text
    content: “They have loved to wander thus;
  - type: text
    content: they have not restrained their feet;
  - type: note
    content: Hos. 8:13
  - type: text
    content: 'therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' does not accept them;'
  - type: note
    content: Hos. 9:9
  - type: text
    content: now he will remember their iniquity
  - type: text
    content: and punish their sins.”
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: '
  - type: note
    content: See ch. 7:16
  - type: text
    content: '“Do not pray for the welfare of this people. '
  '12':
  - type: text
    content: 'Though they fast, I will not hear their cry, '
  - type: note
    content: Prov. 1:28; Isa. 1:15; Ezek. 8:18; Mic. 3:4; See ch. 6:20
  - type: text
    content: 'and though they offer burnt offering and grain offering, I will not accept them. But I will consume them '
  - type: note
    content: ch. 16:4; 24:10; 32:24; Ezek. 14:21
  - type: text
    content: by the sword, by famine, and by pestilence.”
  - type: heading
    content: Lying Prophets
  '13':
  - type: text
    content: 'Then I said: “Ah, Lord '
  - type: text
    content: God
  - type: text
    content: ', behold, the prophets '
  - type: note
    content: '[ch. 4:10; 6:14]'
  - type: text
    content: 'say to them, ‘You shall not see the sword, nor shall you have famine, but I will give you assured peace in this place.’” '
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “The '
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'prophets are prophesying lies in my name. '
  - type: note
    content: ch. 23:21; 27:15; Deut. 18:20; [Matt. 7:15; Mark 13:22]
  - type: text
    content: 'I did not send them, nor did I command them or speak to them. They are prophesying to you a lying vision, '
  - type: note
    content: Ezek. 13:6; [ch. 27:9; 29:8]
  - type: text
    content: 'worthless divination, and '
  - type: note
    content: ch. 23:26
  - type: text
    content: 'the deceit of their own minds. '
  '15':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the prophets who prophesy in my name although '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'I did not send them, and who say, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: '‘Sword and famine shall not come upon this land’: '
  - type: note
    content: '[ch. 23:34]'
  - type: text
    content: 'By sword and famine those prophets shall be consumed. '
  '16':
  - type: text
    content: 'And the people to whom they prophesy shall be cast out in the streets of Jerusalem, victims of famine and sword, '
  - type: note
    content: Ps. 79:3
  - type: text
    content: with none to bury them—them, their wives, their sons, and their daughters. For I will pour out their evil upon them.
  '17':
  - type: text
    content: '“You shall say to them this word:'
  - type: note
    content: See ch. 13:17
  - type: text
    content: ‘Let my eyes run down with tears night and day,
  - type: text
    content: and let them not cease,
  - type: text
    content: 'for the virgin '
  - type: note
    content: See ch. 8:21
  - type: text
    content: daughter of my people is shattered with a great wound,
  - type: note
    content: ch. 10:19; 30:12
  - type: text
    content: with a very grievous blow.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 7:15
  - type: text
    content: If I go out into the field,
  - type: text
    content: behold, those pierced by the sword!
  - type: note
    content: Ezek. 7:15
  - type: text
    content: And if I enter the city,
  - type: text
    content: behold, the diseases of famine!
  - type: note
    content: '[ch. 5:31 ]'
  - type: text
    content: For both prophet and priest ply their trade through the land
  - type: text
    content: and have no knowledge.’”
  '19':
  - type: text
    content: ' '
  - type: note
    content: Lam. 5:22
  - type: text
    content: Have you utterly rejected Judah?
  - type: text
    content: Does your soul loathe Zion?
  - type: text
    content: Why have you struck us down
  - type: note
    content: '[ch. 15:18 ]'
  - type: text
    content: so that there is no healing for us?
  - type: note
    content: ch. 8:15
  - type: text
    content: We looked for peace, but no good came;
  - type: note
    content: ch. 8:15
  - type: text
    content: for a time of healing, but behold, terror.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Lam. 1:4
  - type: text
    content: “Judah mourns,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 3:26; [Lam. 2:8]
  - type: text
    content: her gates languish;
  - type: text
    content: her people lament on the ground,
  - type: text
    content: 'and '
  - type: note
    content: '[1 Sam. 5:12]'
  - type: text
    content: the cry of Jerusalem goes up.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 106:6; Dan. 9:5, 8 ]'
  - type: text
    content: 'We acknowledge our wickedness, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and the iniquity of our fathers,
  - type: note
    content: '[ Ps. 106:6; Dan. 9:5, 8 ]'
  - type: text
    content: for we have sinned against you.
  '21':
  - type: text
    content: 'Do not spurn us, '
  - type: note
    content: ver. 7
  - type: text
    content: for your name’s sake;
  - type: text
    content: do not dishonor your glorious throne;
  - type: note
    content: Lev. 26:42; Ps. 106:45
  - type: text
    content: remember and do not break your covenant with us.
  '22':
  - type: text
    content: 'Are there any among '
  - type: note
    content: ch. 10:15; [Deut. 32:21]
  - type: text
    content: 'the false gods of the nations '
  - type: note
    content: Job 28:26; 38:26, 28; Zech. 10:1, 2
  - type: text
    content: that can bring rain?
  - type: text
    content: Or can the heavens give showers?
  - type: text
    content: 'Are you not he, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God?'
  - type: text
    content: We set our hope on you,
  - type: note
    content: Job 12:9; Isa. 66:2
  - type: text
    content: for you do all these things.
  '3':
  - type: text
    content: Her nobles send their servants for water;
  - type: text
    content: they come to the cisterns;
  - type: text
    content: they find no water;
  - type: text
    content: they return with their vessels empty;
  - type: text
    content: 'they are '
  - type: note
    content: Ps. 40:14
  - type: text
    content: ashamed and confounded
  - type: text
    content: 'and '
  - type: note
    content: '[2 Sam. 15:30]'
  - type: text
    content: cover their heads.
  '4':
  - type: text
    content: Because of the ground that is dismayed,
  - type: text
    content: 'since there is '
  - type: note
    content: ch. 3:3
  - type: text
    content: no rain on the land,
  - type: text
    content: the farmers are ashamed;
  - type: text
    content: they cover their heads.
  '5':
  - type: text
    content: 'Even '
  - type: note
    content: Job 39:1; Ps. 29:9
  - type: text
    content: the doe in the field forsakes her newborn fawn
  - type: text
    content: because there is no grass.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:24
  - type: text
    content: The wild donkeys stand on the bare heights;
  - type: text
    content: they pant for air like jackals;
  - type: text
    content: their eyes fail
  - type: text
    content: because there is no vegetation.
  '7':
  - type: text
    content: “Though our iniquities testify against us,
  - type: text
    content: 'act, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 21; Ps. 25:11
  - type: text
    content: for your name’s sake;
  - type: note
    content: ch. 2:19
  - type: text
    content: for our backslidings are many;
  - type: note
    content: ver. 20
  - type: text
    content: we have sinned against you.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:13; 50:7; Ps. 71:5
  - type: text
    content: O you hope of Israel,
  - type: text
    content: its savior in time of trouble,
  - type: text
    content: why should you be like a stranger in the land,
  - type: text
    content: like a traveler who turns aside to tarry for a night?
  '9':
  - type: text
    content: Why should you be like a man confused,
  - type: note
    content: '[ Isa. 59:1 ]'
  - type: text
    content: like a mighty warrior who cannot save?
  - type: text
    content: 'Yet '
  - type: note
    content: '[Ex. 29:45]'
  - type: text
    content: 'you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are in the midst of us,'
  - type: text
    content: 'and '
  - type: note
    content: Dan. 9:18; [Eph. 3:15]
  - type: text
    content: we are called by your name;
  - type: note
    content: Ps. 119:121
  - type: text
    content: do not leave us.”
