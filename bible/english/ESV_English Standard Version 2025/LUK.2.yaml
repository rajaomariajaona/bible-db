document_id: LUK.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Jesus Christ
  - type: text
    content: 'In those days '
  - type: note
    content: Acts 17:7
  - type: text
    content: 'a decree went out from '
  - type: note
    content: '[ch. 3:1]'
  - type: text
    content: 'Caesar Augustus that all the world should be '
  - type: note
    content: '[Acts 5:37]'
  - type: text
    content: 'registered. '
  '10':
  - type: text
    content: 'And the angel said to them, “Fear not, for behold, I bring you good news of great joy that will be for all '
  - type: note
    content: ver. 2:32; John 11:50; [Zech. 9:9]
  - type: text
    content: 'the people. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: Isa. 9:6
  - type: text
    content: 'unto you is born this day in '
  - type: note
    content: ver. 4
  - type: text
    content: 'the city of David '
  - type: note
    content: Matt. 1:21; John 4:42
  - type: text
    content: 'a Savior, who is '
  - type: note
    content: Acts 2:36; 10:36; [ch. 23:2]; See Matt. 1:17
  - type: text
    content: 'Christ '
  - type: note
    content: '[ch. 1:43]'
  - type: text
    content: 'the Lord. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 2:34; 2 Kgs. 19:29; 20:8, 9; Isa. 7:11, 14
  - type: text
    content: 'this will be a sign for you: you will find a baby '
  - type: note
    content: ver. 7
  - type: text
    content: 'wrapped in swaddling cloths and lying in a manger.” '
  '13':
  - type: text
    content: 'And suddenly there was with the angel '
  - type: note
    content: Gen. 28:12; 32:1, 2; 1 Kgs. 22:19; 2 Chr. 18:18; Ps. 103:21; 148:2; Dan. 7:10; Rev. 5:11
  - type: text
    content: a multitude of the heavenly host praising God and saying,
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:38; [ Ps. 148:1; Matt. 21:9 ]
  - type: text
    content: '“Glory to God '
  - type: note
    content: '[ch. 10:21; Matt. 6:10; 28:18; John 17:4; Acts 7:49; Eph. 3:15; Col. 1:16, 20; Rev. 5:13]'
  - type: text
    content: in the highest,
  - type: note
    content: '[ch. 10:21; Matt. 6:10; 28:18; John 17:4; Acts 7:49; Eph. 3:15; Col. 1:16, 20; Rev. 5:13 ]'
  - type: text
    content: 'and on earth '
  - type: note
    content: ch. 1:79; Ps. 85:10; Isa. 9:6, 7; Hag. 2:9; Acts 10:36; Rom. 5:1; Eph. 2:14, 17; Col. 1:20
  - type: text
    content: 'peace '
  - type: note
    content: '[ch. 3:22; 12:32; Eph. 1:5, 9; Phil. 2:13]'
  - type: text
    content: among those with whom he is pleased!”
  - type: note
    content: Some manuscripts peace, good will among men
  '15':
  - type: text
    content: 'When the angels went away from them into heaven, the shepherds said to one another, “Let us go over to Bethlehem and see this thing that has happened, which the Lord has made known to us.” '
  '16':
  - type: text
    content: 'And they went with haste and found Mary and Joseph, and the baby '
  - type: note
    content: ver. 2:7, 12
  - type: text
    content: 'lying in a manger. '
  '17':
  - type: text
    content: 'And when they saw it, they made known the saying that had been told them concerning this child. '
  '18':
  - type: text
    content: 'And all who heard it wondered at what the shepherds told them. '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: ver. 2:51; [ch. 1:66; Gen. 37:11]
  - type: text
    content: 'Mary treasured up all these things, pondering them in her heart. '
  '2':
  - type: text
    content: 'This was the first '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: registration when
  - type: note
    content: Or This was the registration before
  - type: text
    content: ' Quirinius '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'was governor of Syria. '
  '20':
  - type: text
    content: 'And the shepherds returned, '
  - type: note
    content: See ch. 7:16
  - type: text
    content: glorifying and praising God for all they had heard and seen, as it had been told them.
  '21':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 1:59
  - type: text
    content: 'at the end of eight days, when he was circumcised, '
  - type: note
    content: ch. 1:31; Matt. 1:21, 25
  - type: text
    content: he was called Jesus, the name given by the angel before he was conceived in the womb.
  - type: heading
    content: Jesus Presented at the Temple
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 12; [ver. 21, 27; Gal. 4:4]
  - type: text
    content: 'when the time came for their purification according to the Law of Moses, they brought him up to Jerusalem '
  - type: note
    content: '[1 Sam. 1:22, 24]'
  - type: text
    content: 'to present him to the Lord '
  '23':
  - type: text
    content: '(as it is written in '
  - type: note
    content: ver. 2:39; Ex. 13:9; 2 Chr. 31:3
  - type: text
    content: 'the Law of the Lord, '
  - type: note
    content: '[Ex. 13:2, 12]'
  - type: text
    content: '“Every male who first opens the womb shall be called holy to the Lord”) '
  '24':
  - type: text
    content: 'and to offer a sacrifice according to what is said in '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'the Law of the Lord, '
  - type: note
    content: Cited from Lev. 12:8
  - type: text
    content: '“a pair of turtledoves, or two young pigeons.” '
  '25':
  - type: text
    content: 'Now there was a man in Jerusalem, whose name was Simeon, and this man was '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'righteous and '
  - type: note
    content: Acts 2:5; 8:2; 22:12
  - type: text
    content: 'devout, '
  - type: note
    content: ver. 2:38; ch. 23:51; Isa. 25:9; Mark 15:43; [Gen. 49:18]
  - type: text
    content: 'waiting for '
  - type: note
    content: Isa. 40:1; 57:18
  - type: text
    content: 'the consolation of Israel, and the Holy Spirit was upon him. '
  '26':
  - type: text
    content: 'And it had been revealed to him by the Holy Spirit that he would not '
  - type: note
    content: Ps. 89:48; John 8:51; Heb. 11:5; [Acts 2:27]
  - type: text
    content: 'see death before he had seen '
  - type: note
    content: '[ch. 9:20; 23:35; 1 Sam. 24:6]'
  - type: text
    content: 'the Lord’s Christ. '
  '27':
  - type: text
    content: 'And he came in the Spirit into the temple, and when '
  - type: note
    content: ver. 2:33, 41, 43, 48-51
  - type: text
    content: 'the parents brought in the child Jesus, to do for him according to the custom of the Law, '
  '28':
  - type: text
    content: 'he took him up in his arms and '
  - type: note
    content: ch. 1:64
  - type: text
    content: blessed God and said,
  '29':
  - type: text
    content: “Lord, now you are letting your servant
  - type: note
    content: Or bondservant
  - type: text
    content: ' depart '
  - type: note
    content: Gen. 15:15
  - type: text
    content: in peace,
  - type: note
    content: ver. 2:26
  - type: text
    content: according to your word;
  '3':
  - type: text
    content: 'And all went to be registered, each to his own town. '
  '30':
  - type: text
    content: 'for '
  - type: note
    content: Isa. 52:10
  - type: text
    content: 'my eyes have seen your '
  - type: note
    content: See ch. 3:6
  - type: text
    content: salvation
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ps. 98:2; See ch. Luke 24:47
  - type: text
    content: that you have prepared in the presence of all peoples,
  '32':
  - type: text
    content: ' '
  - type: note
    content: Isa. 42:6; 49:6; 52:10; 60:3; John 8:12; Acts 13:47; 26:23
  - type: text
    content: a light for revelation to the Gentiles,
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 45:25; 46:13]'
  - type: text
    content: 'for glory to '
  - type: note
    content: ver. 10
  - type: text
    content: your people Israel.”
  '33':
  - type: text
    content: 'And '
  - type: note
    content: ver. 27
  - type: text
    content: 'his father and his mother marveled at what was said about him. '
  '34':
  - type: text
    content: 'And Simeon blessed them and said to Mary his mother, “Behold, this child is appointed '
  - type: note
    content: '[Isa. 8:14; Matt. 21:44; John 9:39; 1 Cor. 1:23, 24; 2 Cor. 2:16; 1 Pet. 2:8, 9]'
  - type: text
    content: 'for the fall and rising of many in Israel, and for a sign '
  - type: note
    content: Acts 28:22
  - type: text
    content: 'that is opposed '
  '35':
  - type: text
    content: (and a sword will pierce through your own soul also), so that thoughts from many hearts may be revealed.”
  '36':
  - type: text
    content: 'And there was '
  - type: note
    content: See Ex. 15:20
  - type: text
    content: 'a prophetess, Anna, the daughter of Phanuel, of the tribe of Asher. She was advanced in years, having lived with her husband seven years from when she was a virgin, '
  '37':
  - type: text
    content: and then as a widow until she was eighty-four.
  - type: note
    content: Or as a widow for eighty-four years
  - type: text
    content: ' She did not depart from the temple, '
  - type: note
    content: 1 Tim. 5:5
  - type: text
    content: 'worshiping with '
  - type: note
    content: ch. 5:33; Matt. 6:16-18; Acts 13:2; 14:23; 2 Cor. 6:5; 11:27
  - type: text
    content: 'fasting and prayer night and day. '
  '38':
  - type: text
    content: 'And coming up at that very hour she began to give thanks to God and to speak of him to all who were '
  - type: note
    content: ver. 2:25; See ch. 1:68
  - type: text
    content: waiting for the redemption of Jerusalem.
  - type: heading
    content: The Return to Nazareth
  '39':
  - type: text
    content: 'And when they had performed everything according to '
  - type: note
    content: ver. 23
  - type: text
    content: 'the Law of the Lord, they returned into Galilee, to their own town of '
  - type: note
    content: ver. 4
  - type: text
    content: 'Nazareth. '
  '4':
  - type: text
    content: 'And Joseph also went up '
  - type: note
    content: ch. 1:26
  - type: text
    content: 'from Galilee, from the town of '
  - type: note
    content: See Matt. 2:23
  - type: text
    content: 'Nazareth, to Judea, to '
  - type: note
    content: ver. 11; John 7:42; [1 Sam. 16:1]
  - type: text
    content: 'the city of David, which is called '
  - type: note
    content: Matt. 2:1
  - type: text
    content: 'Bethlehem, '
  - type: note
    content: ch. 1:27
  - type: text
    content: 'because he was of the house and lineage of David, '
  '40':
  - type: note
    content: ch. 1:80
  - type: text
    content: And the child grew and became strong, filled with wisdom. And the favor of God was upon him.
  - type: heading
    content: The Boy Jesus in the Temple
  '41':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 2:27
  - type: text
    content: 'his parents went '
  - type: note
    content: '[1 Sam. 1:3]'
  - type: text
    content: 'to Jerusalem every year at '
  - type: note
    content: Ex. 23:15; Deut. 16:1; John 2:13
  - type: text
    content: 'the Feast of the Passover. '
  '42':
  - type: text
    content: 'And when he was twelve years old, '
  - type: note
    content: John 11:55
  - type: text
    content: 'they went up according to custom. '
  '43':
  - type: text
    content: 'And when the feast '
  - type: note
    content: Ex. 12:15; Lev. 23:8; Deut. 16:3
  - type: text
    content: 'was ended, as they were returning, the boy Jesus stayed behind in Jerusalem. '
  - type: note
    content: '[See ver. 2:41 above]'
  - type: text
    content: 'His parents did not know it, '
  '44':
  - type: text
    content: 'but supposing him to be in the group they went a day’s journey, but then they began to search for him among their relatives and acquaintances, '
  '45':
  - type: text
    content: 'and when they did not find him, they returned to Jerusalem, searching for him. '
  '46':
  - type: text
    content: 'After three days they found him in the temple, '
  - type: note
    content: See Matt. 26:55
  - type: text
    content: 'sitting among '
  - type: note
    content: ch. 5:17
  - type: text
    content: 'the teachers, listening to them and asking them questions. '
  '47':
  - type: text
    content: 'And all who heard him were amazed at his understanding and his answers. '
  '48':
  - type: text
    content: And when his parents
  - type: note
    content: Greek they
  - type: text
    content: ' saw him, they were astonished. And his mother said to him, “Son, why have you treated us so? Behold, '
  - type: note
    content: ver. 27; [ver. 49]
  - type: text
    content: 'your father and I have been searching for you in great distress.” '
  '49':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Why were you looking for me? Did you not know that '
  - type: note
    content: See ch. 13:33
  - type: text
    content: 'I must be in '
  - type: note
    content: John 2:16; 14:2
  - type: text
    content: my Father’s house?”
  - type: note
    content: Or about my Father’s business
  - type: text
    content: ' '
  '5':
  - type: text
    content: to be registered with Mary, his betrothed,
  - type: note
    content: That is, one legally pledged to be married
  - type: text
    content: ' who was with child. '
  '50':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 18:34]; See Mark 9:32'
  - type: text
    content: 'they did not understand the saying that he spoke to them. '
  '51':
  - type: text
    content: 'And he went down with them and came to Nazareth and was submissive to them. And '
  - type: note
    content: See ver. 19
  - type: text
    content: his mother treasured up all these things in her heart.
  '52':
  - type: text
    content: 'And Jesus '
  - type: note
    content: '[1 Sam. 2:26]'
  - type: text
    content: increased in wisdom and in stature
  - type: note
    content: Or years
  - type: text
    content: ' and in '
  - type: note
    content: '[1 Sam. 2:26]'
  - type: text
    content: favor with God and man.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'while they were there, the time came for her to give birth. '
  '7':
  - type: text
    content: 'And she gave birth to her firstborn son and '
  - type: note
    content: ver. 12
  - type: text
    content: 'wrapped him in swaddling cloths and '
  - type: note
    content: ver. 16
  - type: text
    content: 'laid him in a manger, because there was no place for them in '
  - type: note
    content: ch. 22:11 (Gk.)
  - type: text
    content: the inn.
  - type: note
    content: Or guest room
  - type: heading
    content: The Shepherds and the Angels
  '8':
  - type: text
    content: 'And in the same region there were shepherds out in the field, keeping watch over their flock by night. '
  '9':
  - type: text
    content: 'And an angel of the Lord '
  - type: note
    content: ch. 24:4; Acts 12:7
  - type: text
    content: 'appeared to them, and '
  - type: note
    content: ch. 9:31; Acts 7:55; 2 Cor. 3:18
  - type: text
    content: 'the glory of the Lord shone around them, and they were filled with great fear. '
