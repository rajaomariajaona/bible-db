document_id: EZK.40,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Vision of the New Temple
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the twenty-fifth year '
  - type: note
    content: ch. 33:21; See ch. 1:2
  - type: text
    content: 'of our exile, at the beginning of the year, on the tenth day of the month, '
  - type: note
    content: '[ch. 26:1, 2]'
  - type: text
    content: 'in the fourteenth year after the city was struck down, on that very day, '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon me, and he brought me to the city.'
  - type: note
    content: Hebrew brought me there
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And there were three side rooms on either side of the east gate. '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'The three were of the same size, and the jambs on either side were of the same size. '
  '11':
  - type: text
    content: 'Then he measured the width of the opening of the gateway, ten cubits; and the length of the gateway, thirteen cubits. '
  '12':
  - type: text
    content: 'There was a barrier before the side rooms, one cubit on either side. And the side rooms were six cubits on either side. '
  '13':
  - type: text
    content: 'Then he measured the gate from the ceiling of the one side room to the ceiling of the other, a breadth of twenty-five cubits; the openings faced each other. '
  '14':
  - type: text
    content: 'He measured also '
  - type: note
    content: ver. 9, 16
  - type: text
    content: the vestibule, sixty cubits. And around the vestibule of the gateway was the court.
  - type: note
    content: Text uncertain; Hebrew And he made the jambs sixty cubits, and to the jamb of the court was the gateway all around
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'From the front of the gate at the entrance to the front of the inner vestibule of the gate was fifty cubits. '
  '16':
  - type: text
    content: 'And the gateway had '
  - type: note
    content: ch. 41:16, 26; [1 Kgs. 6:4]
  - type: text
    content: 'windows all around, narrowing inwards toward the side rooms and toward their '
  - type: note
    content: ver. 9, 14
  - type: text
    content: 'jambs, and likewise the vestibule had windows all around inside, and on the jambs were '
  - type: note
    content: ch. 41:18
  - type: text
    content: palm trees.
  - type: heading
    content: The Outer Court
  '17':
  - type: text
    content: 'Then he brought me into '
  - type: note
    content: ch. 42:1; [Rev. 11:2]
  - type: text
    content: 'the outer court. And behold, there were '
  - type: note
    content: ver. 38, 44, 45, 46; ch. 41:10; See 2 Kgs. 23:11
  - type: text
    content: 'chambers and a '
  - type: note
    content: '[2 Chr. 7:3]'
  - type: text
    content: 'pavement, all around the court. '
  - type: note
    content: ch. 41:6; [ch. 45:5]
  - type: text
    content: 'Thirty chambers faced the pavement. '
  '18':
  - type: text
    content: 'And the pavement ran along the side of the gates, corresponding to the length of the gates. This was the lower pavement. '
  '19':
  - type: text
    content: Then he measured the distance from the inner front of the lower gate to the outer front of the inner court,
  - type: note
    content: Hebrew distance from before the low gate before the inner court to the outside
  - type: text
    content: ' a hundred cubits on the east side and on the north side.'
  - type: note
    content: Or cubits. So far the eastern gate; now to the northern gate
  - type: heading
    content: The North Gate
  '2':
  - type: text
    content: 'In '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'visions of God he brought me to the land of Israel, and set me down on '
  - type: note
    content: '[ch. 43:12; Rev. 21:10]'
  - type: text
    content: 'a very high mountain, on which was a structure like a city to the south. '
  '20':
  - type: text
    content: 'As for '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'the gate that faced toward the north, belonging to '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the outer court, he measured its length and its breadth. '
  '21':
  - type: text
    content: 'Its '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'side rooms, three on either side, and its jambs and its vestibule were of the same size as those of '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'the first gate. Its length was '
  - type: note
    content: '[ver. 15]'
  - type: text
    content: 'fifty cubits, and its breadth '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'twenty-five cubits. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'its windows, its vestibule, and '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'its palm trees were of the same size as those of the gate that faced toward the east. And by seven steps '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'people would go up to it, and find its vestibule before them. '
  '23':
  - type: text
    content: 'And opposite the gate on the north, as on the east, was a gate to '
  - type: note
    content: ver. 28; [ch. 8:3]
  - type: text
    content: 'the inner court. And '
  - type: note
    content: ver. 27
  - type: text
    content: he measured from gate to gate, a hundred cubits.
  - type: heading
    content: The South Gate
  '24':
  - type: text
    content: 'And he led me toward the south, and behold, there was a gate on the south. And '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'he measured its jambs and its vestibule; they had the same size as the others. '
  '25':
  - type: text
    content: 'Both it and its vestibule '
  - type: note
    content: ver. 22
  - type: text
    content: 'had windows all around, like the windows of the others. Its length was fifty cubits, and its breadth twenty-five cubits. '
  '26':
  - type: text
    content: 'And there were seven steps leading up to it, and its vestibule was before them, and it had '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'palm trees on its jambs, one on either side. '
  '27':
  - type: text
    content: 'And there was a gate on the south of '
  - type: note
    content: ver. 23; ch. 8:16
  - type: text
    content: the inner court. And he measured from gate to gate toward the south, a hundred cubits.
  - type: heading
    content: The Inner Court
  '28':
  - type: text
    content: 'Then he brought me to '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: 'the inner court through the south gate, and '
  - type: note
    content: '[ver. 24]'
  - type: text
    content: 'he measured the south gate. It was of the same size as the others. '
  '29':
  - type: text
    content: 'Its '
  - type: note
    content: See ver. 7
  - type: text
    content: 'side rooms, its jambs, and its vestibule were of the same size as the others, and both it and its vestibule '
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'had windows all around. '
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'Its length was fifty cubits, and its breadth twenty-five cubits. '
  '3':
  - type: text
    content: 'When he brought me there, behold, there was '
  - type: note
    content: ch. 43:6; 47:3; See ch. 9:2
  - type: text
    content: 'a man whose appearance was '
  - type: note
    content: See ch. 1:7
  - type: text
    content: 'like bronze, with '
  - type: note
    content: '[ch. 47:3]'
  - type: text
    content: 'a linen cord and '
  - type: note
    content: '[Rev. 11:1]; See ch. 42:16-19'
  - type: text
    content: 'a measuring reed in his hand. And he was standing in the gateway. '
  '30':
  - type: text
    content: 'And there were vestibules all around, twenty-five cubits long and five cubits broad. '
  '31':
  - type: text
    content: 'Its vestibule faced the outer court, and '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'palm trees were on its jambs, and '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: its stairway had eight steps.
  '32':
  - type: text
    content: 'Then he brought me to the inner court on the east side, and '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'he measured the gate. It was of the same size as the others. '
  '33':
  - type: text
    content: 'Its side rooms, its jambs, and its vestibule were of the same size as the others, and both it and its vestibule had windows all around. Its length was fifty cubits, and its breadth twenty-five cubits. '
  '34':
  - type: note
    content: ver. 31
  - type: text
    content: Its vestibule faced the outer court, and it had palm trees on its jambs, on either side, and its stairway had eight steps.
  '35':
  - type: text
    content: 'Then he brought me to '
  - type: note
    content: ch. 47:2
  - type: text
    content: 'the north gate, and '
  - type: note
    content: ver. 32, 33
  - type: text
    content: 'he measured it. It had the same size as the others. '
  '36':
  - type: text
    content: Its side rooms, its jambs, and its vestibule were of the same size as the others,
  - type: note
    content: One manuscript (compare verses 29 and 33); most manuscripts lack were of the same size as the others
  - type: text
    content: ' and it had windows all around. Its length was fifty cubits, and its breadth twenty-five cubits. '
  '37':
  - type: text
    content: Its vestibule
  - type: note
    content: Septuagint, Vulgate (compare verses 26, 31, 34); Hebrew jambs
  - type: text
    content: ' faced the outer court, and it had palm trees on its jambs, on either side, and its stairway had eight steps.'
  '38':
  - type: text
    content: 'There was '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: a chamber with its door in the vestibule of the gate,
  - type: note
    content: Hebrew at the jambs, the gates
  - type: text
    content: ' '
  - type: note
    content: '[ch. 46:2; 2 Chr. 4:6]'
  - type: text
    content: 'where the burnt offering was to be washed. '
  '39':
  - type: text
    content: 'And in the vestibule of the gate were two '
  - type: note
    content: '[ver. 42]'
  - type: text
    content: 'tables on either side, on which the '
  - type: note
    content: '[ch. 46:2]; See Lev. 1:3, 4'
  - type: text
    content: 'burnt offering and the '
  - type: note
    content: ch. 42:13; See Lev. 4:2, 3
  - type: text
    content: 'sin offering and the '
  - type: note
    content: ch. 42:13; 46:20; See Lev. 5:1-6
  - type: text
    content: 'guilt offering were to be slaughtered. '
  '4':
  - type: text
    content: 'And the man said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: ch. 44:5
  - type: text
    content: 'look with your eyes, and '
  - type: note
    content: ch. 44:5
  - type: text
    content: 'hear with your ears, and set your heart upon all that I shall show you, for you were brought here in order that I might show it to you. '
  - type: note
    content: ch. 43:10
  - type: text
    content: Declare all that you see to the house of Israel.”
  - type: heading
    content: The East Gate to the Outer Court
  '40':
  - type: text
    content: 'And off to the side, on the outside as one goes up to the entrance of the north gate, were two tables; and off to the other side of the vestibule of the gate were two tables. '
  '41':
  - type: note
    content: '[ver. 39, 40]'
  - type: text
    content: 'Four tables were on either side of the gate, eight tables, '
  - type: note
    content: '[ver. 38]'
  - type: text
    content: 'on which to slaughter. '
  '42':
  - type: text
    content: 'And there were four tables '
  - type: note
    content: '[Ex. 20:25]'
  - type: text
    content: 'of hewn stone for the burnt offering, a cubit and a half long, and a cubit and a half broad, and one cubit high, on which the instruments were to be laid with which the '
  - type: note
    content: '[See ver. 39 above]'
  - type: text
    content: 'burnt offerings and the sacrifices were slaughtered. '
  '43':
  - type: text
    content: And hooks,
  - type: note
    content: Or shelves
  - type: text
    content: ' a handbreadth long, were fastened all around within. And on the tables the flesh of the offering was to be laid.'
  - type: heading
    content: Chambers for the Priests
  '44':
  - type: text
    content: 'On the outside of the inner gateway there were two '
  - type: note
    content: '[ver. 17, 38]'
  - type: text
    content: chambers
  - type: note
    content: Septuagint; Hebrew were chambers for singers
  - type: text
    content: ' in the '
  - type: note
    content: 1 Chr. 6:31, 32
  - type: text
    content: inner court, one
  - type: note
    content: Hebrew lacks one
  - type: text
    content: ' at the side of the north gate facing south, the other at the side of the south'
  - type: note
    content: Septuagint; Hebrew east
  - type: text
    content: ' gate facing north. '
  '45':
  - type: text
    content: 'And he said to me, “This chamber that faces south is for the priests '
  - type: note
    content: 1 Chr. 9:23; [ch. 44:8, 14, 15, 16; 48:11]; See Lev. 8:35; Num. 1:53
  - type: text
    content: 'who have charge of the temple, '
  '46':
  - type: text
    content: 'and the chamber that faces north is for the priests '
  - type: note
    content: '[Num. 3:31]; See Num. 18:5'
  - type: text
    content: 'who have charge of the altar. These are '
  - type: note
    content: ch. 43:19; 44:15; [1 Kgs. 2:35; 1 Chr. 24:3, 6]
  - type: text
    content: the sons of Zadok, who alone
  - type: note
    content: Hebrew lacks alone
  - type: text
    content: ' among the sons of Levi may come '
  - type: note
    content: ch. 42:13; 45:4
  - type: text
    content: 'near to the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister to him.” '
  '47':
  - type: text
    content: 'And he measured the court, '
  - type: note
    content: See ch. 41:13-15
  - type: text
    content: 'a hundred cubits long and '
  - type: note
    content: See ch. 41:13-15
  - type: text
    content: 'a hundred cubits broad, a square. And '
  - type: note
    content: '[ch. 43:13; Ex. 40:29; Matt. 23:35]'
  - type: text
    content: the altar was in front of the temple.
  - type: heading
    content: The Vestibule of the Temple
  '48':
  - type: text
    content: 'Then he brought me to '
  - type: note
    content: ch. 41:25, 26
  - type: text
    content: 'the vestibule of the temple and measured the '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: jambs of the vestibule, five cubits on either side. And the breadth of the gate was fourteen cubits, and the sidewalls of the gate
  - type: note
    content: Septuagint; Hebrew lacks was fourteen cubits, and the sidewalls of the gate
  - type: text
    content: ' were three cubits on either side. '
  '49':
  - type: note
    content: 1 Kgs. 6:3
  - type: text
    content: The length of the vestibule was twenty cubits, and the breadth twelve
  - type: note
    content: Septuagint; Hebrew eleven
  - type: text
    content: ' cubits, and people would go up to it by ten steps.'
  - type: note
    content: Septuagint; Hebrew and by steps that would go up to it
  - type: text
    content: ' And there were pillars beside the jambs, one on either side.'
  '5':
  - type: text
    content: 'And behold, there was '
  - type: note
    content: ch. 42:20
  - type: text
    content: 'a wall all around the outside of the temple area, and the length of the measuring reed in the man’s hand was six long cubits, '
  - type: note
    content: '[ch. 41:8; 43:13]'
  - type: text
    content: each being a cubit and a handbreadth
  - type: note
    content: A cubit was about 18 inches or 45 centimeters; a handbreadth was about 3 inches or 7.5 centimeters
  - type: text
    content: ' in length. So he measured the thickness of the wall, one reed; and the height, one reed. '
  '6':
  - type: text
    content: 'Then he went into '
  - type: note
    content: See ch. 43:1
  - type: text
    content: 'the gateway facing east, '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: going up its steps, and measured the threshold of the gate, one reed deep.
  - type: note
    content: Hebrew deep, and one threshold, one reed deep
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ver. 29, 33, 36
  - type: text
    content: 'the side rooms, one reed long and one reed broad; and the space between the side rooms, five cubits; and the threshold of the gate by the vestibule of the gate at the inner end, one reed. '
  '8':
  - type: text
    content: 'Then he measured the vestibule of the gateway, on the inside, one reed. '
  '9':
  - type: text
    content: 'Then he measured the vestibule of the gateway, eight cubits; '
  - type: note
    content: ch. 41:1
  - type: text
    content: 'and its jambs, two cubits; and the vestibule of the gate was at the inner end. '
