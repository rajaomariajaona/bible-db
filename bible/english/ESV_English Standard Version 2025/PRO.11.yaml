document_id: PRO.11,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: ch. 16:11; 20:10, 23; See Lev. 19:35, 36
  - type: text
    content: 'A false balance is an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 12:22 ]'
  - type: text
    content: but a just weight is his delight.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 28:12; Esth. 8:15 ]'
  - type: text
    content: When it goes well with the righteous, the city rejoices,
  - type: text
    content: and when the wicked perish there are shouts of gladness.
  '11':
  - type: text
    content: By the blessing of the upright a city is exalted,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 10:7
  - type: text
    content: 'by the mouth of the wicked '
  - type: note
    content: '[ch. 14:1; 29:8]'
  - type: text
    content: it is overthrown.
  '12':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 14:21; [Matt. 7:1]
  - type: text
    content: belittles his neighbor lacks sense,
  - type: text
    content: but a man of understanding remains silent.
  '13':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 20:19; Lev. 19:16
  - type: text
    content: goes about slandering reveals secrets,
  - type: text
    content: but he who is trustworthy in spirit keeps a thing covered.
  '14':
  - type: text
    content: 'Where there is '
  - type: note
    content: ch. 15:22; 20:18; 24:6
  - type: text
    content: no guidance, a people falls,
  - type: note
    content: ch. 15:22; 20:18; 24:6
  - type: text
    content: but in an abundance of counselors there is safety.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 6:1; Job 17:3 ]'
  - type: text
    content: Whoever puts up security for a stranger will surely suffer harm,
  - type: text
    content: but he who hates striking hands in pledge is secure.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 31:30 ]'
  - type: text
    content: A gracious woman gets honor,
  - type: text
    content: 'and '
  - type: note
    content: '[Luke 11:21]'
  - type: text
    content: violent men get riches.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 5:7 ]; See Matt. 25:34-40'
  - type: text
    content: A man who is kind benefits himself,
  - type: text
    content: but a cruel man hurts himself.
  '18':
  - type: text
    content: The wicked earns deceptive wages,
  - type: text
    content: 'but one who '
  - type: note
    content: Hos. 10:12; Gal. 6:8, 9; [James 3:18]
  - type: text
    content: sows righteousness gets a sure reward.
  '19':
  - type: text
    content: 'Whoever is steadfast in righteousness '
  - type: note
    content: ch. 10:16; 19:23
  - type: text
    content: will live,
  - type: text
    content: 'but '
  - type: note
    content: '[Rom. 6:23; Gal. 6:8]'
  - type: text
    content: he who pursues evil will die.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 16:18; 18:12; 29:23; [ Dan. 4:30, 31 ]
  - type: text
    content: When pride comes, then comes disgrace,
  - type: text
    content: 'but with '
  - type: note
    content: Mic. 6:8
  - type: text
    content: the humble is wisdom.
  '20':
  - type: text
    content: 'Those of '
  - type: note
    content: '[ch. 17:20]'
  - type: text
    content: 'crooked heart are '
  - type: note
    content: ch. 12:22; 16:5
  - type: text
    content: 'an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'but those of '
  - type: note
    content: ch. 13:6; Ps. 119:1
  - type: text
    content: 'blameless ways are '
  - type: note
    content: 1 Chr. 29:17
  - type: text
    content: his delight.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 16:5
  - type: text
    content: 'Be assured, '
  - type: note
    content: ch. 12:7; [Ps. 37:2, 9]; See Isa. 28:15-18
  - type: text
    content: an evil person will not go unpunished,
  - type: text
    content: 'but '
  - type: note
    content: See Ps. 112:2
  - type: text
    content: the offspring of the righteous will be delivered.
  '22':
  - type: text
    content: 'Like '
  - type: note
    content: '[Gen. 24:47; Isa. 3:21; Ezek. 16:12]'
  - type: text
    content: a gold ring in a pig’s snout
  - type: text
    content: is a beautiful woman without discretion.
  '23':
  - type: text
    content: The desire of the righteous ends only in good,
  - type: note
    content: Rom. 2:8, 9
  - type: text
    content: the expectation of the wicked in wrath.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:7
  - type: text
    content: 'One gives '
  - type: note
    content: Ps. 37:21; 112:9; [ch. 19:17]
  - type: text
    content: freely, yet grows all the richer;
  - type: text
    content: another withholds what he should give, and only suffers want.
  '25':
  - type: text
    content: ' '
  - type: note
    content: See 2 Cor. 9:6-11
  - type: text
    content: 'Whoever brings blessing '
  - type: note
    content: ch. 13:4; 28:25
  - type: text
    content: will be enriched,
  - type: text
    content: 'and '
  - type: note
    content: '[Matt. 7:2]'
  - type: text
    content: one who waters will himself be watered.
  '26':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:24
  - type: text
    content: The people curse him who holds back grain,
  - type: text
    content: 'but '
  - type: note
    content: '[Job 29:13]'
  - type: text
    content: 'a blessing is on the head of him who '
  - type: note
    content: '[Gen. 42:6]'
  - type: text
    content: sells it.
  '27':
  - type: text
    content: Whoever diligently seeks good seeks favor,
  - type: note
    content: Or acceptance
  - type: text
    content: 'but evil comes to '
  - type: note
    content: See Ps. 7:16
  - type: text
    content: him who searches for it.
  '28':
  - type: text
    content: 'Whoever '
  - type: note
    content: See Ps. 49:6
  - type: text
    content: trusts in his riches will fall,
  - type: text
    content: 'but the righteous will '
  - type: note
    content: Jer. 17:8; See Ps. 92:12
  - type: text
    content: flourish like a green leaf.
  '29':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 15:27
  - type: text
    content: 'troubles his own household will '
  - type: note
    content: '[Eccles. 5:16]'
  - type: text
    content: inherit the wind,
  - type: text
    content: and the fool will be servant to the wise of heart.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:6
  - type: text
    content: The integrity of the upright guides them,
  - type: note
    content: ch. 19:3
  - type: text
    content: but the crookedness of the treacherous destroys them.
  '30':
  - type: text
    content: 'The fruit of the righteous is '
  - type: note
    content: See ch. 3:18
  - type: text
    content: a tree of life,
  - type: text
    content: 'and whoever '
  - type: note
    content: Dan. 12:3; James 5:20; See 1 Cor. 9:19-22
  - type: text
    content: captures souls is wise.
  '31':
  - type: text
    content: 'If '
  - type: note
    content: '[Jer. 25:29; 1 Pet. 4:18]'
  - type: text
    content: the righteous is repaid on earth,
  - type: text
    content: how much more the wicked and the sinner!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Zeph. 1:18; See ch. 10:2
  - type: text
    content: Riches do not profit in the day of wrath,
  - type: note
    content: '[ Gen. 7:1 ]'
  - type: text
    content: but righteousness delivers from death.
  '5':
  - type: text
    content: 'The righteousness of the blameless '
  - type: note
    content: ch. 3:6
  - type: text
    content: keeps his way straight,
  - type: text
    content: but the wicked falls by his own wickedness.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: The righteousness of the upright delivers them,
  - type: text
    content: 'but the treacherous '
  - type: note
    content: See Ps. 7:15, 16
  - type: text
    content: are taken captive by their lust.
  '7':
  - type: text
    content: 'When the wicked dies, his '
  - type: note
    content: ch. 10:28
  - type: text
    content: hope will perish,
  - type: text
    content: 'and '
  - type: note
    content: See Job 8:13, 14
  - type: text
    content: the expectation of wealth
  - type: note
    content: Or of his strength, or of iniquity
  - type: text
    content: ' perishes too.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: ver. 6 ; [ch. 21:18]
  - type: text
    content: The righteous is delivered from trouble,
  - type: text
    content: and the wicked walks into it instead.
  '9':
  - type: text
    content: With his mouth the godless man would destroy his neighbor,
  - type: text
    content: but by knowledge the righteous are delivered.
