  '1':
  - type: heading
    content: Prophecy Against the Prince of Tyre
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 31:18; 32:19, 21, 24, 25
  - type: text
    content: You shall die the death of the uncircumcised
  - type: text
    content: by the hand of foreigners;
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'for I have spoken, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  - type: heading
    content: A Lament over the King of Tyre
  '11':
  - type: text
    content: 'Moreover, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '12':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: See ch. 19:1
  - type: text
    content: 'raise a lamentation over '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'the king of Tyre, and say to him, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “You were the signet of perfection,
  - type: note
    content: The meaning of the Hebrew phrase is uncertain
  - type: note
    content: '[ver. 3 ]'
  - type: text
    content: 'full of wisdom and '
  - type: note
    content: ch. 27:3
  - type: text
    content: perfect in beauty.
  '13':
  - type: text
    content: 'You were in '
  - type: note
    content: ch. 31:8, 9; See Isa. 51:3
  - type: text
    content: Eden, the garden of God;
  - type: note
    content: '[ch. 27:16 ]'
  - type: text
    content: every precious stone was your covering,
  - type: note
    content: Rev. 4:3; 21:19, 20
  - type: text
    content: sardius, topaz, and diamond,
  - type: text
    content: beryl, onyx, and jasper,
  - type: text
    content: sapphire,
  - type: note
    content: Or lapis lazuli
  - type: text
    content: ' '
  - type: note
    content: '[ch. 27:16]'
  - type: text
    content: emerald, and carbuncle;
  - type: text
    content: and crafted in gold were your settings
  - type: text
    content: and your engravings.
  - type: note
    content: The meaning of the Hebrew phrase is uncertain
  - type: note
    content: ver. 15
  - type: text
    content: On the day that you were created
  - type: text
    content: they were prepared.
  '14':
  - type: text
    content: 'You were an anointed '
  - type: note
    content: Ex. 25:20; 1 Kgs. 8:7
  - type: text
    content: guardian cherub.
  - type: text
    content: I placed you;
  - type: note
    content: The meaning of the Hebrew phrase is uncertain
  - type: text
    content: ' you were on '
  - type: note
    content: '[ch. 20:40]'
  - type: text
    content: the holy mountain of God;
  - type: text
    content: in the midst of the stones of fire you walked.
  '15':
  - type: text
    content: You were blameless in your ways
  - type: note
    content: ver. 13
  - type: text
    content: from the day you were created,
  - type: text
    content: till unrighteousness was found in you.
  '16':
  - type: text
    content: 'In the abundance of '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: your trade
  - type: text
    content: you were filled with violence in your midst, and you sinned;
  - type: text
    content: 'so I cast you as a profane thing from '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: the mountain of God,
  - type: text
    content: and I destroyed you,
  - type: note
    content: Or banished you
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: O guardian cherub,
  - type: text
    content: from the midst of the stones of fire.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ver. 2, 5
  - type: text
    content: 'Your heart was proud because of '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: your beauty;
  - type: text
    content: you corrupted your wisdom for the sake of your splendor.
  - type: text
    content: I cast you to the ground;
  - type: text
    content: I exposed you before kings,
  - type: text
    content: to feast their eyes on you.
  '18':
  - type: text
    content: By the multitude of your iniquities,
  - type: text
    content: in the unrighteousness of your trade
  - type: text
    content: you profaned your sanctuaries;
  - type: text
    content: 'so '
  - type: note
    content: '[ch. 30:8, 14, 16; Rev. 18:8]'
  - type: text
    content: I brought fire out from your midst;
  - type: text
    content: it consumed you,
  - type: text
    content: and I turned you to ashes on the earth
  - type: note
    content: '[ver. 17 ]'
  - type: text
    content: in the sight of all who saw you.
  '19':
  - type: text
    content: All who know you among the peoples
  - type: text
    content: are appalled at you;
  - type: note
    content: ch. 26:21; 27:36
  - type: text
    content: you have come to a dreadful end
  - type: text
    content: and shall be no more forever.”
  - type: heading
    content: Prophecy Against Sidon
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, say to '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'the prince of Tyre, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: note
    content: '[ Rev. 18:7 ]'
  - type: text
    content: “Because your heart is proud,
  - type: text
    content: 'and '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: you have said, ‘I am a god,
  - type: text
    content: I sit in the seat of the gods,
  - type: text
    content: in the heart of the seas,’
  - type: text
    content: 'yet '
  - type: note
    content: Isa. 31:3
  - type: text
    content: you are but a man, and no god,
  - type: note
    content: ver. 6
  - type: text
    content: though you make your heart like the heart of a god—
  '20':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '21':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'set your face toward '
  - type: note
    content: See Isa. 23:2
  - type: text
    content: 'Sidon, and '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'prophesy against her '
  '22':
  - type: text
    content: 'and say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: '“Behold, '
  - type: note
    content: See ch. 13:8
  - type: text
    content: I am against you, O Sidon,
  - type: text
    content: 'and '
  - type: note
    content: ch. 39:13; [Ex. 14:4, 17, 18]
  - type: text
    content: I will manifest my glory in your midst.
  - type: text
    content: 'And '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'they shall know that I am the '
  - type: text
    content: Lord
  - type: note
    content: ver. 26
  - type: text
    content: when I execute judgments in her
  - type: text
    content: 'and '
  - type: note
    content: See ch. 20:41
  - type: text
    content: manifest my holiness in her;
  '23':
  - type: text
    content: 'for I will send '
  - type: note
    content: ch. 38:22
  - type: text
    content: pestilence into her,
  - type: text
    content: and blood into her streets;
  - type: text
    content: and the slain shall fall in her midst,
  - type: text
    content: by the sword that is against her on every side.
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '24':
  - type: text
    content: '“And for the house of Israel '
  - type: note
    content: Num. 33:55; Josh. 23:13
  - type: text
    content: 'there shall be no more a brier to prick or '
  - type: note
    content: '[2 Cor. 12:7]'
  - type: text
    content: 'a thorn to hurt them among all their neighbors '
  - type: note
    content: ch. 16:57
  - type: text
    content: 'who have treated them with contempt. Then they will know that I am the Lord '
  - type: text
    content: God
  - type: text
    content: .
  - type: heading
    content: Israel Gathered in Security
  '25':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See ch. 11:17
  - type: text
    content: 'When I gather the house of Israel from the peoples among whom they are scattered, and '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'manifest my holiness in them in the sight of the nations, '
  - type: note
    content: ch. 36:28; 37:25
  - type: text
    content: 'then they shall dwell in their own land that I gave to my servant Jacob. '
  '26':
  - type: note
    content: Jer. 23:6; 32:37
  - type: text
    content: 'And they shall dwell securely in it, and they shall build houses and plant vineyards. They shall dwell securely, '
  - type: note
    content: ver. 22
  - type: text
    content: 'when I execute judgments upon all their neighbors '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'who have treated them with contempt. '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.”'
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 12; Zech. 9:2 ]'
  - type: text
    content: 'you are indeed wiser '
  - type: note
    content: Dan. 1:17
  - type: text
    content: 'than '
  - type: note
    content: ch. 14:14
  - type: text
    content: Daniel;
  - type: text
    content: no secret is hidden from you;
  '4':
  - type: text
    content: by your wisdom and your understanding
  - type: note
    content: '[ Zech. 9:3 ]'
  - type: text
    content: you have made wealth for yourself,
  - type: text
    content: and have gathered gold and silver
  - type: text
    content: into your treasuries;
  '5':
  - type: text
    content: by your great wisdom in your trade
  - type: text
    content: you have increased your wealth,
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: your heart has become proud in your wealth—
  '6':
  - type: text
    content: 'therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: note
    content: ver. 2
  - type: text
    content: Because you make your heart
  - type: text
    content: like the heart of a god,
  '7':
  - type: text
    content: 'therefore, behold, I will bring '
  - type: note
    content: ver. 10; ch. 7:21; 30:12; 31:12
  - type: text
    content: foreigners upon you,
  - type: text
    content: the most ruthless of the nations;
  - type: text
    content: 'and they shall draw their swords against '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: the beauty of your wisdom
  - type: text
    content: 'and defile '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: your splendor.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 32:18, 19 ]'
  - type: text
    content: They shall thrust you down into the pit,
  - type: note
    content: '[ch. 32:20 ]'
  - type: text
    content: and you shall die the death of the slain
  - type: text
    content: in the heart of the seas.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: Will you still say, ‘I am a god,’
  - type: text
    content: in the presence of those who kill you,
  - type: text
    content: 'though '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: you are but a man, and no god,
  - type: text
    content: in the hands of those who slay you?
