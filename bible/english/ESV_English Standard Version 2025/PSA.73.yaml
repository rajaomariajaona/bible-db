  - type: text
    content: pure in heart.
  '10':
  - type: text
    content: Therefore his people turn back to them,
  - type: text
    content: 'and find '
  - type: note
    content: '[Job 15:16]'
  - type: text
    content: no fault in them.
  - type: note
    content: Probable reading; Hebrew the waters of a full cup are drained by them
  '11':
  - type: text
    content: 'And they say, '
  - type: note
