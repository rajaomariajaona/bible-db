  - type: text
    content: slippery places;
  - type: text
    content: you make them fall to ruin.
  '19':
  - type: text
    content: 'How they are destroyed '
  - type: note
    content: '[Num. 16:21]'
  - type: text
    content: in a moment,
  - type: text
    content: 'swept away utterly by '
  - type: note
    content: See Job 18:11
  - type: text
    content: terrors!
  '2':
  - type: text
    content: But as for me, my feet had almost stumbled,
  - type: text
    content: my steps had nearly slipped.
  '20':
  - type: text
    content: 'Like '
  - type: note
    content: See Job 20:8
  - type: text
    content: a dream when one awakes,
  - type: text
    content: 'O Lord, when '
  - type: note
    content: Ps. 78:65
  - type: text
    content: you rouse yourself, you despise them as phantoms.
  '21':
  - type: text
    content: When my soul was embittered,
  - type: text
    content: when I was pricked in heart,
  '22':
  - type: text
    content: 'I was '
  - type: note
    content: See Ps. 49:10
  - type: text
    content: brutish and ignorant;
  - type: text
    content: 'I was like '
  - type: note
