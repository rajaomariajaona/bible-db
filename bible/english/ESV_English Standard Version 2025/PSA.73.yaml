  - type: text
    content: unfaithful to you.
  '28':
  - type: text
    content: 'But for me it is good to '
  - type: note
    content: James 4:8; [Heb. 10:22]
  - type: text
    content: be near God;
  - type: text
    content: 'I have made the Lord '
  - type: text
    content: God
  - type: text
    content: ' my '
