  - type: text
    content: “How can God know?
  - type: text
    content: Is there knowledge in the Most High?”
  '12':
  - type: text
    content: Behold, these are the wicked;
  - type: text
    content: 'always at ease, they '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: increase in riches.
  '13':
  - type: text
    content: 'All in vain have I '
