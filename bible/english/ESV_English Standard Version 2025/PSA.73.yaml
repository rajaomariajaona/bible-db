  - type: text
    content: If I had said, “I will speak thus,”
  - type: text
    content: 'I would have betrayed '
  - type: note
    content: '[Ps. 14:5]'
  - type: text
    content: the generation of your children.
  '16':
  - type: text
    content: But when I thought how to understand this,
  - type: text
    content: 'it seemed to me '
  - type: note
