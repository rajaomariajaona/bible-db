  - type: text
    content: tell of all your works.
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Job 21:7
  - type: text
    content: 'For I was '
  - type: note
    content: Ps. 37:1; Prov. 23:17
  - type: text
    content: envious of the arrogant
  - type: text
    content: 'when I saw the '
  - type: note
    content: '[Ps. 37:7; 92:7; Jer. 12:1]'
  - type: text
    content: prosperity of the wicked.
  '4':
  - type: text
    content: For they have no pangs until death;
  - type: text
    content: their bodies are fat and sleek.
  '5':
  - type: text
    content: They are not in trouble as others are;
  - type: text
    content: 'they are not '
  - type: note
    content: '[Isa. 53:4]'
  - type: text
    content: stricken like the rest of mankind.
  '6':
  - type: text
    content: 'Therefore pride is '
  - type: note
    content: '[Judg. 8:26]'
  - type: text
    content: their necklace;
  - type: text
    content: 'violence covers them as '
  - type: note
    content: '[Ps. 109:18]'
  - type: text
    content: a garment.
  '7':
  - type: text
    content: 'Their '
  - type: note
    content: See Job 15:27
  - type: text
    content: eyes swell out through fatness;
  - type: text
    content: their hearts overflow with follies.
  '8':
  - type: text
    content: 'They scoff and '
  - type: note
    content: '[2 Pet. 2:18; Jude 16]'
  - type: text
    content: speak with malice;
  - type: text
    content: loftily they threaten oppression.
  '9':
  - type: text
    content: They set their mouths against the heavens,
  - type: text
    content: and their tongue struts through the earth.
