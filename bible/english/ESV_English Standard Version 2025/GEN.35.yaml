document_id: GEN.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Blesses and Renames Jacob
  - type: text
    content: 'God said to Jacob, “Arise, go up to '
  - type: note
    content: ch. 28:19
  - type: text
    content: 'Bethel and dwell there. Make an altar there to the God who appeared to you '
  - type: note
    content: ch. 27:43
  - type: text
    content: 'when you fled from your brother Esau.” '
  '10':
  - type: text
    content: 'And God said to him, “Your name is Jacob; '
  - type: note
    content: '[ch. 17:5, 15]'
  - type: text
    content: 'no longer shall your name be called Jacob, but '
  - type: note
    content: ch. 32:28
  - type: text
    content: 'Israel shall be your name.” So he called his name Israel. '
  '11':
  - type: text
    content: 'And God said to him, '
  - type: note
    content: See ch. 17:1
  - type: text
    content: '“I am God Almighty:'
  - type: note
    content: Hebrew El Shaddai
  - type: text
    content: ' be '
  - type: note
    content: ch. 28:3; 48:4
  - type: text
    content: 'fruitful and multiply. '
  - type: note
    content: ch. 17:5, 6, 16; 26:4
  - type: text
    content: A nation and a company of nations shall come from you, and kings shall come from your own body.
  - type: note
    content: Hebrew from your loins
  - type: text
    content: ' '
  '12':
  - type: note
    content: ch. 12:7; 13:15; 17:8; 26:3; 28:13
  - type: text
    content: 'The land that I gave to Abraham and Isaac I will give to you, and I will give the land to your offspring after you.” '
  '13':
  - type: text
    content: 'Then God '
  - type: note
    content: ch. 17:22
  - type: text
    content: 'went up from him in the place where he had spoken with him. '
  '14':
  - type: text
    content: 'And Jacob '
  - type: note
    content: ch. 28:18; 31:45
  - type: text
    content: 'set up a pillar in the place where he had spoken with him, a pillar of stone. He poured out a drink offering on it and poured oil on it. '
  '15':
  - type: text
    content: 'So Jacob called the name of the place where God had spoken with him '
  - type: note
    content: ch. 28:19
  - type: text
    content: Bethel.
  - type: heading
    content: The Deaths of Rachel and Isaac
  '16':
  - type: text
    content: Then they journeyed from Bethel. When they were still some distance
  - type: note
    content: Or about two hours’ distance
  - type: text
    content: ' from Ephrath, Rachel went into labor, and she had hard labor. '
  '17':
  - type: text
    content: 'And when her labor was at its hardest, the midwife said to her, “Do not fear, for '
  - type: note
    content: ch. 30:24
  - type: text
    content: 'you have another son.” '
  '18':
  - type: text
    content: And as her soul was departing (for she was dying), she called his name Ben-oni;
  - type: note
    content: Ben-oni could mean son of my sorrow, or son of my strength
  - type: text
    content: ' '
  - type: note
    content: '[Luke 1:59, 60]'
  - type: text
    content: but his father called him Benjamin.
  - type: note
    content: Benjamin means son of the right hand
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'So '
  - type: note
    content: ch. 48:7
  - type: text
    content: 'Rachel died, and she was buried on the way to '
  - type: note
    content: Ruth 1:2; 4:11; Mic. 5:2; Matt. 2:6, 16-18
  - type: text
    content: 'Ephrath (that is, Bethlehem), '
  '2':
  - type: text
    content: 'So Jacob said to his '
  - type: note
    content: ch. 18:19; Josh. 24:15
  - type: text
    content: 'household and to all who were with him, “Put away '
  - type: note
    content: '[ch. 31:19; Josh. 24:23; 1 Sam. 7:3]'
  - type: text
    content: 'the foreign gods that are among you and '
  - type: note
    content: Ex. 19:10
  - type: text
    content: 'purify yourselves and change your garments. '
  '20':
  - type: text
    content: 'and Jacob set up a pillar over her tomb. It is '
  - type: note
    content: 1 Sam. 10:2; [2 Sam. 18:18]
  - type: text
    content: 'the pillar of Rachel’s tomb, which is there to this day. '
  '21':
  - type: text
    content: Israel journeyed on and pitched his tent beyond the tower of Eder.
  '22':
  - type: text
    content: 'While Israel lived in that land, Reuben went and '
  - type: note
    content: ch. 49:4; 1 Chr. 5:1; [2 Sam. 16:22; 20:3; 1 Cor. 5:1]
  - type: text
    content: lay with Bilhah his father’s concubine. And Israel heard of it.
  - type: text
    content: 'Now the sons of Jacob were twelve. '
  '23':
  - type: text
    content: 'The sons of Leah: '
  - type: note
    content: For ver. 23-26, see ch. 46:8-27; Ex. 1:2-4
  - type: text
    content: 'Reuben (Jacob’s firstborn), Simeon, Levi, Judah, Issachar, and Zebulun. '
  '24':
  - type: text
    content: 'The sons of Rachel: Joseph and Benjamin. '
  '25':
  - type: text
    content: 'The sons of Bilhah, Rachel’s servant: Dan and Naphtali. '
  '26':
  - type: text
    content: 'The sons of Zilpah, Leah’s servant: Gad and Asher. These were the sons of Jacob who were born to him in Paddan-aram.'
  '27':
  - type: text
    content: 'And Jacob came to his father Isaac at '
  - type: note
    content: ch. 13:18; 23:19
  - type: text
    content: 'Mamre, or '
  - type: note
    content: ch. 23:2; Josh. 14:15; 15:13
  - type: text
    content: 'Kiriath-arba (that is, Hebron), where Abraham and Isaac had sojourned. '
  '28':
  - type: text
    content: 'Now the days of Isaac were 180 years. '
  '29':
  - type: text
    content: 'And Isaac breathed his last, and he died '
  - type: note
    content: ch. 15:15; 25:8
  - type: text
    content: 'and was gathered to his people, old and full of days. And '
  - type: note
    content: ch. 25:9; 49:31
  - type: text
    content: his sons Esau and Jacob buried him.
  '3':
  - type: text
    content: 'Then let us arise and go up to Bethel, so that I may make there an altar to the God '
  - type: note
    content: ch. 32:7, 24
  - type: text
    content: 'who answers me in the day of my distress and '
  - type: note
    content: ch. 28:20; 31:3
  - type: text
    content: 'has been with me wherever I have gone.” '
  '4':
  - type: text
    content: 'So they gave to Jacob all the foreign gods that they had, and the rings that were in their ears. Jacob hid them under '
  - type: note
    content: Josh. 24:26; Judg. 9:6
  - type: text
    content: the terebinth tree that was near Shechem.
  '5':
  - type: text
    content: 'And as they journeyed, a terror from God fell upon the cities that were around them, so that they did not pursue the sons of Jacob. '
  '6':
  - type: text
    content: 'And Jacob came to '
  - type: note
    content: ch. 28:19
  - type: text
    content: 'Luz (that is, Bethel), which is in the land of Canaan, he and all the people who were with him, '
  '7':
  - type: text
    content: and there he built an altar and called the place El-bethel,
  - type: note
    content: El-bethel means God of Bethel
  - type: text
    content: ' because '
  - type: note
    content: ver. 1
  - type: text
    content: 'there God had revealed himself to him when he fled from his brother. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: ch. 24:59
  - type: text
    content: Deborah, Rebekah’s nurse, died, and she was buried under an oak below Bethel. So he called its name Allon-bacuth.
  - type: note
    content: Allon-bacuth means oak of weeping
  '9':
  - type: text
    content: God appeared
  - type: note
    content: Or had appeared
  - type: text
    content: ' to Jacob again, when he came from Paddan-aram, and blessed him. '
