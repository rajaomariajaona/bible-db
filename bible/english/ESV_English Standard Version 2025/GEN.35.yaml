    - type: text
      text: 'The sons of Bilhah, Rachel’s servant: Dan and Naphtali. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Zilpah, Leah’s servant: Gad and Asher. These were the sons of Jacob who were born to him in Paddan-aram.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob came to his father Isaac at '
    - type: usfm
