      marker-yv: yv-n
    - type: text
      text: ' from Ephrath, Rachel went into labor, and she had hard labor. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when her labor was at its hardest, the midwife said to her, “Do not fear, for '
    - type: usfm
